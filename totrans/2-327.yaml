- en: Building AI Applications in Ruby
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/building-ai-applications-in-ruby/](https://towardsdatascience.com/building-ai-applications-in-ruby/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*📗 This is the <mdspan datatext="el1747799691394" class="mdspan-comment">second
    in a multi-part</mdspan> series on creating web applications with generative AI
    integration. Part 1 focused on explaining the AI stack and why the application
    layer is the best place in the stack to be. Check it *[*out here*](https://towardsdatascience.com/layers-ai-stack/)*.*'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: '**Table of Contents**'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: '[Introduction](#introduction)'
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[I thought spas were supposed to be relaxing?](#spas)'
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
