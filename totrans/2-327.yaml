- en: Introduction
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 简介
- en: It’s not often that you hear the Ruby language mentioned when discussing AI.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 当讨论AI时，很少听到Ruby语言被提及。
- en: Python, of course, is the king in this world, and for good reason. The community
    has coalesced around the language. Most model training is done in PyTorch or TensorFlow
    these days. Scikit-learn and Keras are also very popular. RAG frameworks such
    as LangChain and LlamaIndex cater primarily to Python.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，Python是这个领域的王者，而且有很好的理由。社区已经围绕这个语言聚集起来。如今，大多数模型训练都是在PyTorch或TensorFlow中完成的。Scikit-learn和Keras也非常受欢迎。LangChain和LlamaIndex等RAG框架主要针对Python。
- en: However, when it comes to building web applications with AI integration, I believe
    Ruby is the better language.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，当涉及到构建具有AI集成的Web应用时，我相信Ruby是更好的语言。
- en: 'As the co-founder of an [agency](https://losangelesaiapps.com/) dedicated to
    building MVPs with generative AI integration, I frequently hear potential clients
    complaining about two things:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一家致力于将生成式AI集成到MVP中的应用程序开发机构的联合创始人，我经常听到潜在客户抱怨两件事：
- en: Applications take too long to build
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 应用程序构建时间过长
- en: Developers are quoting insane prices to build custom web apps
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 开发者报价建造定制网络应用的价格离谱
- en: These complaints have a common source: **complexity**. Modern web apps have
    a lot more complexity in them than in the good ol’ days. But why is this? Are
    the benefits brought by complexity worth the cost?
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: '这些抱怨有一个共同的原因：**复杂性**。现代Web应用比过去有更多的复杂性。但这是为什么？复杂性带来的好处是否值得其成本？ '
- en: I thought spas were supposed to be relaxing?
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我以为水疗中心应该是放松的？
- en: 'One big piece of the puzzle is the recent rise of single-page applications
    (SPAs). The most popular stack used today in building modern SPAs is **MERN** (MongoDB,
    Express.js, React.js, Node.js). The stack is popular for a few reasons:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 拼图中的一块重要部分是单页应用（SPAs）的近期兴起。目前用于构建现代SPAs最受欢迎的框架是**MERN**（MongoDB, Express.js,
    React.js, Node.js）。这个框架之所以受欢迎，有几个原因：
- en: It is a JavaScript-only stack, across both front-end and back-end. Having to
    only code in only one language is pretty nice!
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这是一个仅使用JavaScript的框架，涵盖前端和后端。只需要用一种语言编写代码是非常好的！
- en: SPAs can offer dynamic designs and a “smooth” user experience. Smooth here means
    that when some piece of data changes, only a part of the site is updated, as opposed
    to having to reload the whole page. Of course, if you don’t have a modern smartphone,
    SPAs won’t feel so smooth, as they tend to be pretty heavy. All that JavaScript
    starts to drag down the performance.
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: SPAs可以提供动态设计和“流畅”的用户体验。这里的“流畅”意味着当某些数据发生变化时，只有网站的一部分需要更新，而不是整个页面都需要重新加载。当然，如果你没有现代智能手机，SPAs可能不会感觉那么流畅，因为它们通常相当重。所有这些JavaScript开始拖慢性能。
- en: 'There is a large ecosystem of libraries and developers with experience in this
    stack. This is pretty circular logic: is the stack popular because of the ecosystem,
    or is there an ecosystem because of the popularity? Either way, this point stands.'
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 有一个庞大的库和开发者生态系统，他们在这个框架上有经验。这是一个相当循环的逻辑：这个框架之所以受欢迎是因为生态系统，还是因为生态系统才有了它的流行？无论如何，这个观点是成立的。
- en: React was created by Meta.
  id: totrans-23
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: React是由Meta创建的。
- en: Lots of money and effort has been thrown at the library, helping to polish and
    promote the product.
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 已经投入了大量资金和努力到这个库中，帮助其完善和推广产品。
- en: Unfortunately, there are some downsides of working in the MERN stack, the most
    critical being the sheer **complexity**.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 不幸的是，在MERN栈中工作有一些缺点，其中最重要的是其**复杂性**。
- en: Traditional web development was done using the Model-View-Controller (MVC) paradigm.
    In MVC, all of the logic managing a user’s session is handled in the backend,
    on the server. Something like fetching a user’s data was done via function calls
    and SQL statements in the backend. The backend then serves fully built HTML and
    CSS to the browser, which just has to display it. Hence the name “server”.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 传统的Web开发使用的是模型-视图-控制器（MVC）范式。在MVC中，管理用户会话的所有逻辑都在后端，即服务器上处理。例如，获取用户数据是通过后端的功能调用和SQL语句完成的。然后后端向浏览器提供完全构建好的HTML和CSS，浏览器只需显示它。因此得名“服务器”。
- en: In a SPA, this logic is handled on the user’s browser, in the frontend. SPAs
    have to handle UI state, application state, and sometimes even server state all
    in the browser. API calls have to be made to the backend to fetch user data. There
    is still quite a bit of logic on the backend, mainly exposing data and functionality
    through APIs.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 在SPA中，这种逻辑由用户的浏览器在前端处理。SPA必须在浏览器中处理UI状态、应用状态，有时甚至还要处理服务器状态。API调用必须发送到后端以获取用户数据。后端仍然有很多逻辑，主要是通过API公开数据和功能。
- en: To illustrate the difference, let me use the analogy of a commercial kitchen.
    The customer will be the frontend and the kitchen will be the backend.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 为了说明这种差异，让我用一个商业厨房的类比。顾客将是前端，厨房将是后端。
- en: '![mvs vs spa](../Images/45ea0d1b941e41b58d426255055f78e6.png)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
  zh: '![mvs vs spa](../Images/45ea0d1b941e41b58d426255055f78e6.png)'
- en: MVCs vs. SPAs. Image generated by ChatGPT.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: MVC与SPA的比较。图像由ChatGPT生成。
- en: 'Traditional MVC apps are like dining at a full-service restaurant. Yes, there
    is a lot of complexity (and yelling, if *The Bear* is to be believed) in the backend.
    But the frontend experience is simple and satisfying: all the customer has to
    do is pick up a fork and eat their food.'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 传统的MVC应用就像在一家全服务餐厅用餐。是的，后端有很多复杂性（如果相信《熊》的话，还会有很多喊叫）。但前端体验简单且令人满意：顾客只需拿起一把叉子，吃他们的食物即可。
- en: SPAs are like eating at a buffet-style dining restaurant. There is still quite
    a bit of complexity in the kitchen. But now the customer also has to decide what
    food to grab, how to combine them, how to arrange them on the plate, where to
    put the plate when finished, etc.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: SPA就像在自助餐厅用餐。厨房里仍然有很多复杂性。但现在顾客还必须决定要拿什么食物，如何搭配它们，如何将它们摆放在盘子上，完成用餐后把盘子放在哪里等。
- en: Andrej Karpathy had a tweet recently discussing his frustration with attempting
    to build web apps in 2025\. It can be overwhelming for those new to the space.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 安德烈·卡帕西最近发了一条推文，讨论了他试图在2025年构建Web应用的挫败感。对于新手来说，这可能会让人感到不知所措。
- en: 'The reality of building web apps in 2025 is that it''s a bit like assembling
    IKEA furniture. There''s no "full-stack" product with batteries included, you
    have to piece together and configure many individual services:'
  id: totrans-34
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 2025年构建Web应用的现实情况有点像组装宜家家具。没有“全栈”产品附带电池，你必须拼凑和配置许多单个服务：
- en: ''
  id: totrans-35
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: – frontend / backend (e.g. React, Next.js, APIs)
  id: totrans-36
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: – 前端 / 后端（例如 React, Next.js, APIs）
- en: – hosting…
  id: totrans-37
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: – 域名托管…
- en: ''
  id: totrans-38
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — Andrej Karpathy (@karpathy) [March 27, 2025](https://twitter.com/karpathy/status/1905051558783418370?ref_src=twsrc%5Etfw)
  id: totrans-39
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — 安德烈·卡帕西 (@karpathy) [2025年3月27日](https://twitter.com/karpathy/status/1905051558783418370?ref_src=twsrc%5Etfw)
- en: In order to build MVPs with AI integration rapidly, our agency has decided to
    forgo the SPA and instead go with the traditional MVC approach. In particular,
    we have found Ruby on Rails (often denoted as Rails) to be the framework best
    suited to quickly developing and deploying quality apps with AI integration. Ruby
    on Rails was developed by David Heinemeier Hansson in 2004 and has long been known
    as a great web framework, but I would argue it has recently made leaps in its
    ability to incorporate AI into apps, as we will see.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 为了快速构建具有AI集成的MVP，我们的机构决定放弃SPA，转而采用传统的MVC方法。特别是，我们发现Ruby on Rails（通常简称为Rails）是快速开发和部署具有AI集成的高质量应用的框架。Ruby
    on Rails由David Heinemeier Hansson于2004年开发，长期以来一直被誉为优秀的Web框架，但我认为它最近在将AI集成到应用中的能力上取得了飞跃，正如我们将看到的。
- en: Django is the most popular Python web framework, and also has a more traditional
    pattern of development. Unfortunately, in our testing we found Django was simply
    not as full-featured or “batteries included” as Rails is. As a simple example, **Django
    has no built-in background job system**. Nearly all of our apps incorporate background
    jobs, so to not include this was disappointing. We also prefer how Rails emphasizes
    simplicity, with Rails 8 encouraging developers to [easily self-host their apps](https://kamal-deploy.org/) instead
    of going through a provider like Heroku. They also recently released a stack of
    tools meant to replace external [services like Redis](https://rubyonrails.org/2024/11/7/rails-8-no-paas-required).
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: Django 是最受欢迎的 Python 网络框架，同时也拥有更传统的开发模式。不幸的是，在我们的测试中我们发现 Django 的功能并不像 Rails
    那样全面或“内置电池”。一个简单的例子是，**Django 没有内置的后台作业系统**。我们的大部分应用程序都集成了后台作业，因此没有包含这一点令人失望。我们还更喜欢
    Rails 强调的简洁性，Rails 8 鼓励开发者**轻松自托管应用程序**（[https://kamal-deploy.org/](https://kamal-deploy.org/)），而不是通过像
    Heroku 这样的提供商。他们最近还发布了一系列旨在替代外部[服务如 Redis](https://rubyonrails.org/2024/11/7/rails-8-no-paas-required)的工具。
- en: “But what about the smooth user experience?” you might ask. The truth is that
    modern Rails includes several ways of crafting SPA-like experiences without all
    of the heavy JavaScript. The primary tool is [Hotwire](https://hotwired.dev/),
    which bundles tools like **Turbo** and **Stimulus**. Turbo lets you dynamically
    change pieces of HTML on your webpage without writing custom JavaScript. For the
    times where you do need to include custom JavaScript, Stimulus is a minimal JavaScript
    framework that lets you do just that. Even if you want to use React, you can do
    so with the [react-rails gem](https://github.com/reactjs/react-rails). So you
    can have your cake, and eat it too!
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: “但是，用户体验如何保持流畅呢？”你可能会问。事实是，现代 Rails 包括几种方法来创建类似 SPA 的体验，而不需要所有的重型 JavaScript。主要工具是
    [Hotwire](https://hotwired.dev/)，它捆绑了像 **Turbo** 和 **Stimulus** 这样的工具。Turbo 允许你动态地更改网页上的
    HTML 片段，而无需编写自定义 JavaScript。当你确实需要包含自定义 JavaScript 时，Stimulus 是一个最小的 JavaScript
    框架，允许你做到这一点。即使你想使用 React，你也可以通过 [react-rails 珠宝](https://github.com/reactjs/react-rails)
    来做到这一点。所以你可以既享受蛋糕，又吃掉它！
- en: SPAs are not the only reason for the increase in complexity, however. Another
    has to do with the advent of the **microservices architecture**.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，单页面应用（SPAs）并不是复杂性增加的唯一原因。另一个原因与**微服务架构**的出现有关。
- en: Microservices are for Macrocompanies
  id: totrans-44
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 微服务适用于大型企业
- en: Once again, we find ourselves comparing the simple past with the complexity
    of today.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 再次，我们发现自己在比较过去的简单与今天的复杂性。
- en: In the past, software was primarily developed as **monoliths**. A monolithic
    application means that all the different parts of your app — such as the user
    interface, business logic, and data handling — are developed, tested, and deployed
    as one single unit. The code is all typically housed in a single repo.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去，软件主要是以**单体**的形式开发的。单体应用程序意味着你的应用程序的所有不同部分——例如用户界面、业务逻辑和数据处理——都是作为一个单一单元开发、测试和部署的。代码通常都存放在单个仓库中。
- en: Working with a monolith is simple and satisfying. Running a development setup
    for testing purposes is easy. You are working with a single database schema containing
    all of your tables, making queries and joins straightforward. Deployment is simple,
    since you just have one container to look at and modify.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 与单体应用一起工作既简单又令人满意。为测试目的运行开发环境很容易。你正在使用一个包含所有表的单一数据库模式，这使得查询和连接变得简单直接。部署也很简单，因为你只需要查看和修改一个容器。
- en: However, once your company scales to the size of a Google or Amazon, real problems
    begin to emerge. With hundreds or thousands of developers contributing simultaneously
    to a single codebase, coordinating changes and managing merge conflicts becomes
    increasingly difficult. Deployments also become more complex and risky, since
    even minor changes can blow up the entire application!
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，一旦你的公司规模扩大到谷歌或亚马逊那样的大小，真正的难题就开始出现了。当数百或数千名开发者同时向单个代码库贡献时，协调更改和管理合并冲突变得越来越困难。部署也变得更加复杂和风险，因为即使是微小的更改也可能使整个应用程序崩溃！
- en: To manage these issues, large companies began to coalesce around the **microservices
    architecture**. This is a style of programming where you design your codebase
    as a set of small, autonomous services. Each service owns its own codebase, data
    storage, and deployment pipelines. As a simple example, instead of stuffing all
    of your logic regarding an OpenAI client into your main app, you can move that
    logic into its own service. To call that service, you would then typically make
    REST calls, as opposed to function calls. This ups the complexity, but resolves
    the merge conflict and deployment issues, since each team in the organization
    gets to work on their own island of code.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 为了管理这些问题，大型公司开始围绕**微服务架构**聚集在一起。这是一种编程风格，你将你的代码库设计成一系列小型、自主的服务。每个服务拥有自己的代码库、数据存储和部署管道。作为一个简单的例子，你不必将所有关于OpenAI客户端的逻辑都塞进你的主应用中，你可以将其逻辑移动到自己的服务中。要调用该服务，你通常会进行REST调用，而不是函数调用。这增加了复杂性，但解决了合并冲突和部署问题，因为组织中的每个团队都可以在自己的代码岛上工作。
- en: 'Another benefit to using microservices is that they allow for a **polyglot
    tech stack**. This means that each team can code up their service using whatever
    language they prefer. If one team prefers JavaScript while another likes Python,
    this is no issue. When we first began our agency, this idea of a polyglot stack
    pushed us to use a microservices architecture. Not because we had a large team,
    but because we each wanted to use the “best” language for each functionality.
    This meant:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 使用微服务的另一个好处是它们允许使用**多语言技术栈**。这意味着每个团队都可以使用他们喜欢的任何语言来编写他们的服务。如果一个团队喜欢JavaScript，而另一个团队喜欢Python，这没问题。当我们最初开始我们的代理机构时，这种多语言栈的想法推动我们使用微服务架构。不是因为我们的团队很大，而是因为我们每个人都想为每个功能使用“最好的”语言。这意味着：
- en: Using **Ruby on Rails** for web development. It’s been battle-tested in this
    area for decades.
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用**Ruby on Rails**进行Web开发。在这个领域已经经过几十年的实战检验。
- en: Using **Python** for the AI integration, perhaps deployed with something like
    FastAPI. Serious AI work requires Python, I was led to believe.
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用**Python**进行AI集成，可能部署类似于FastAPI的东西。我被告知，严肃的AI工作需要Python。
- en: Two different languages, each focused on its area of specialty. What could go
    wrong?
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 两种不同的语言，各自专注于其专业领域。可能会出什么问题？
- en: Unfortunately, we found the process of development frustrating. Just setting
    up our dev environment was time-consuming. Having to wrangle Docker compose files
    and manage inter-service communication made us wish we could go back to the beauty
    and simplicity of the monolith. Having to make a REST call and set up the appropriate
    routing in FastAPI instead of making a simple function call sucked.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 不幸的是，我们发现开发过程令人沮丧。仅仅设置我们的开发环境就花费了大量的时间。不得不处理Docker compose文件和管理服务间的通信让我们渴望回到单体应用的美丽和简洁。不得不进行REST调用并在FastAPI中设置适当的路由，而不是简单地做一个函数调用，这让人感到很糟糕。
- en: '*“Surely we can’t develop AI apps in pure Ruby,”* I thought. And then I gave
    it a try.'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: “我们当然不能只用纯Ruby来开发AI应用，”我想。然后我试了一下。
- en: And I’m glad I did.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 我很高兴我做到了。
- en: I found the process of developing an MVP with AI integration in Ruby very satisfying.
    We were able to sprint where before we were jogging. I loved the emphasis on beauty,
    simplicity, and developer happiness in the Ruby community. And I found the state
    of the AI ecosystem in Ruby to be surprisingly mature and getting better every
    day.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 我发现使用Ruby开发具有AI集成的MVP的过程非常令人满意。我们能够加速开发，而之前我们只是在慢跑。我喜欢Ruby社区对美观、简洁和开发者幸福感的重视。我发现Ruby的AI生态系统出人意料地成熟，并且每天都在变得更好。
- en: If you are a Python programmer and are scared off by learning a new language
    like I was, let me comfort you by discussing the similarities between the Ruby
    and Python languages.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你是一名Python程序员，像我一样被学习新语言吓到，让我通过讨论Ruby和Python语言之间的相似性来安慰你。
- en: 'Ruby and Python: Two Sides of the Same Coin'
  id: totrans-59
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Ruby和Python：同一枚硬币的两面
- en: 'I consider Python and Ruby to be like cousins. Both languages incorporate:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为Python和Ruby就像堂兄妹。这两种语言都包含了：
- en: '**High-level Interpretation:** This means they abstract away a lot of the complexity
    of low-level programming details, such as memory management.'
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**高级解释**：这意味着他们抽象掉了许多低级编程细节的复杂性，例如内存管理。'
- en: '**Dynamic Typing:** Neither language requires you to specify if a variable
    is an `int`, `float`, `string`, etc. The types are checked at runtime.'
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**动态类型**：这两种语言都不需要你指定变量是`int`、`float`、`string`等类型。类型检查是在运行时进行的。'
- en: '**Object-Oriented Programming:** Both languages are object-oriented. Both support
    classes, inheritance, polymorphism, etc. Ruby is more “pure”, in the sense that
    literally everything is an object, whereas in Python a few things (such as `if` and `for` statements)
    are not objects.'
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**面向对象编程**：两种语言都是面向对象的。两者都支持类、继承、多态等。Ruby 更“纯粹”，在字面上，一切都是对象，而 Python 中有一些东西（如
    `if` 和 `for` 语句）不是对象。'
- en: '**Readable and Concise Syntax:** Both are considered easy to learn. Either
    is great for a first-time learner.'
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可读且简洁的语法**：两者都认为容易学习。对初学者来说都很棒。'
- en: '**Wide Ecosystem of Packages:** Packages to do all sorts of cool things are
    available in both languages. In Python they are called libraries, and in Ruby
    they are called gems.'
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**广泛的包生态系统**：两种语言都提供了各种酷炫功能的包。在 Python 中它们被称为库，在 Ruby 中它们被称为 gems。'
- en: 'The primary difference between the two languages lies in their **philosophy
    and design principles.** Python’s core philosophy can be described as:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 两种语言之间的主要区别在于它们的**哲学和设计原则**。Python 的核心哲学可以描述为：
- en: There should be one — and preferably only one — obvious way to do something.
  id: totrans-67
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 应该只有一个——最好是只有一个——明显的做事方式。
- en: 'In theory, this should emphasize simplicity, readability, and clarity. Ruby’s
    philosophy can be described as:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 理论上，这应该强调简单性、可读性和清晰性。Ruby 的哲学可以描述为：
- en: There’s always more than one way to do something. Maximize developer happiness.
  id: totrans-69
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 总是会有不止一种方法来做某事。最大化开发者快乐。
- en: 'This was a shock to me when I switched over from Python. Check out this simple
    example emphasizing this philosophical difference:'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 当我从 Python 转换到 Python 时，这对我来说是个震惊。看看这个强调这种哲学差异的简单例子：
- en: '[PRE0]'
  id: totrans-71
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Another difference between the two is **syntax style**. Python primarily uses
    indentation to denote code blocks, while Ruby uses `do…end` or `{…}` blocks. Most
    include indentation inside Ruby blocks, but this is entirely optional. Examples
    of these syntactic differences can be seen in the code shown above.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 这两种语言之间的另一个区别是**语法风格**。Python 主要使用缩进来表示代码块，而 Ruby 使用 `do…end` 或 `{…}` 块。大多数
    Ruby 块内部都包含缩进，但这完全是可选的。这些语法差异的例子可以在上面的代码中看到。
- en: 'There are a lot of other little differences to learn. For example, in Python
    string interpolation is done using f-strings: `f"Hello, {name}!"`, while in Ruby
    they are done using hashtags: `"Hello, #{name}!"`. Within a few months, I think
    any competent Python programmer can transfer their proficiency over to Ruby.'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: '有很多其他的小差异需要学习。例如，在 Python 中字符串插值使用 f-strings：`f"Hello, {name}!"`，而在 Ruby 中使用井号：`"Hello,
    #{name}!"`。几个月内，我认为任何合格的 Python 程序员都可以将他们的技能转移到 Ruby 上。'
- en: Recent AI-based Gems
  id: totrans-74
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 近期基于 AI 的亮点
- en: 'Despite not being in the conversation when discussing AI, Ruby has had some
    recent advancements in the world of gems. I will highlight some of the most impressive
    recent releases that we have been using in our agency to build AI apps:'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管在讨论 AI 时没有参与对话，Ruby 在 gems 领域最近也有一些进步。我将突出我们机构在构建 AI 应用程序时使用的一些最令人印象深刻的最新发布：
- en: '**RubyLLM ([link](https://rubyllm.com/))** — Any GitHub repo that gets more
    than 2k stars within a few weeks of release deserves a mention, and RubyLLM is
    definitely worthy. I have used many clunky implementations of LLM providers from
    libraries like LangChain and LlamaIndex, so using RubyLLM was like a breath of
    fresh air. As a simple example, let’s take a look at a tutorial demonstrating
    multi-turn conversations:'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: '**RubyLLM ([链接](https://rubyllm.com/))** — 任何在发布几周内获得超过 2k 星标的 GitHub 仓库都值得提及，RubyLLM
    确实值得。我使用过许多来自 LangChain 和 LlamaIndex 等库的笨拙的 LLM 提供者实现，所以使用 RubyLLM 就像一股清新的空气。作为一个简单的例子，让我们看看一个演示多轮对话的教程：'
- en: '[PRE1]ruby'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: '[PRE1]ruby'
- en: class Person
  id: totrans-78
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: class Person
- en: attr...
  id: totrans-79
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: attr...
- en: '[PRE2]'
  id: totrans-80
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: from langchain_openai import ChatOpenAI
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: from langchain_openai import ChatOpenAI
- en: from langchain_core.schema import SystemMessage, HumanMessage, AIMessage
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: from langchain_core.schema import SystemMessage, HumanMessage, AIMessage
- en: from langchain_core.callbacks.streaming_stdout import StreamingStdOutCallbackHandler
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: from langchain_core.callbacks.streaming_stdout import StreamingStdOutCallbackHandler
- en: SYSTEM_PROMPT = "You are a friendly Ruby expert who loves to help beginners."
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: SYSTEM_PROMPT = "You are a friendly Ruby expert who loves to help beginners."
- en: chat = ChatOpenAI(streaming=True, callbacks=[StreamingStdOutCallbackHandler()])
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: chat = ChatOpenAI(streaming=True, callbacks=[StreamingStdOutCallbackHandler()])
- en: history = [SystemMessage(content=SYSTEM_PROMPT)]
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: history = [SystemMessage(content=SYSTEM_PROMPT)]
- en: 'def ask(user_text: str) -> None:'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 'def ask(user_text: str) -> None:'
- en: '"""Stream the answer token-by-token and keep the context in memory."""'
  id: totrans-88
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"""按字符流输出答案并保持上下文在内存中。”'
- en: history.append(HumanMessage(content=user_text))
  id: totrans-89
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: history.append(HumanMessage(content=user_text))
- en: .stream yields message chunks as they arrive
  id: totrans-90
  prefs:
  - PREF_IND
  - PREF_H1
  type: TYPE_NORMAL
  zh: .stream 在消息到达时产生消息块
- en: 'for chunk in chat.stream(history):'
  id: totrans-91
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 'for chunk in chat.stream(history):'
- en: print(chunk.content, end="", flush=True)
  id: totrans-92
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
  zh: print(chunk.content, end="", flush=True)
- en: 'print()                                          # newline after the answer'
  id: totrans-93
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 'print()                                          # 答案后换行'
- en: the final chunk has the full message content
  id: totrans-94
  prefs:
  - PREF_IND
  - PREF_H1
  type: TYPE_NORMAL
  zh: 最后一段包含完整的消息内容
- en: history.append(AIMessage(content=chunk.content))
  id: totrans-95
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: history.append(AIMessage(content=chunk.content))
- en: ask("Hi! What does attr_reader do in Ruby?")
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: ask("嗨！在 Ruby 中 attr_reader 是做什么用的？")
- en: ask("Great - could you show a short example with attr_accessor?")
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: ask("太好了 - 你能展示一个使用 attr_accessor 的简短示例吗？")
- en: '```'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: '```'
- en: Yikes. And it’s important to note that this is a [grug](https://grugbrain.dev/) implementation.
    Want to know how LangChain really expects you to manage memory? Check [out](https://python.langchain.com/api_reference/core/runnables/langchain_core.runnables.history.RunnableWithMessageHistory.html) [these](https://langchain-ai.github.io/langgraph/concepts/persistence/) [links](https://langchain-ai.github.io/langgraph/concepts/memory/),
    but grab a bucket first; you may get sick.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 哎呀。重要的是要注意，这是一个 [grug](https://grugbrain.dev/) 实现。想知道 LangChain 真正期望你如何管理内存吗？查看 [out](https://python.langchain.com/api_reference/core/runnables/langchain_core.runnables.history.RunnableWithMessageHistory.html) [这些](https://langchain-ai.github.io/langgraph/concepts/persistence/) [链接](https://langchain-ai.github.io/langgraph/concepts/memory/)，但先拿个桶；你可能要生病了。
- en: '**Neighbors ([link](https://github.com/ankane/neighbor))** — This is an excellent
    library to use for nearest-neighbors search in a Rails application. Very useful
    in a RAG setup. It integrates with Postgres, SQLite, MySQL, MariaDB, and more.
    It was written by [Andrew Kane](https://github.com/ankane), the same guy who wrote
    the pgvector extension that allows Postgres to behave as a vector database.'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: '**Neighbors ([link](https://github.com/ankane/neighbor))** — 这是一个用于在 Rails
    应用中进行最近邻搜索的优秀库。在 RAG 设置中非常有用。它集成了 Postgres、SQLite、MySQL、MariaDB 等。它是由 [Andrew
    Kane](https://github.com/ankane) 编写的，同一个人还编写了 pgvector 扩展，该扩展允许 Postgres 作为向量数据库运行。'
- en: '**Async ([link](https://socketry.github.io/async/))** — This gem had its first
    official release back in December 2024, and it has been making waves in the Ruby
    community. Async is a fiber-based framework for Ruby that runs non-blocking I/O
    tasks concurrently while letting you write simple, sequential code. Fibers are
    like mini-threads that each have their own mini call stack. While not strictly
    a gem for AI, it has helped us create features like web scrapers that run blazingly
    fast across thousands of pages. We have also used it to handle streaming of chunks
    from LLMs.'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: '**Async ([link](https://socketry.github.io/async/))** — 这个宝石在 2024 年 12 月首次正式发布，并在
    Ruby 社区引起了轰动。Async 是一个基于纤程的 Ruby 框架，它可以在执行非阻塞 I/O 任务的同时让你编写简单、顺序化的代码。纤程就像迷你线程，每个都有自己的迷你调用栈。虽然它不是一个专门用于
    AI 的宝石，但它帮助我们创建了像网络爬虫这样的功能，这些爬虫可以在数千个页面上以极快的速度运行。我们还用它来处理从 LLMs 流出的块。'
- en: '**Torch.rb ([link](https://github.com/ankane/torch.rb))** — If you are interested
    in training deep learning models, then surely you have heard of PyTorch. Well,
    PyTorch is built on LibTorch, which essentially has a lot of C/C++ code under
    the hood to perform ML operations quickly. Andrew Kane took LibTorch and made
    a Ruby adapter over it to create Torch.rb, essentially a Ruby version of PyTorch.
    Andrew Kane has been a hero in the Ruby AI world, [authoring dozens](https://ankane.org/new-ml-gems) of
    ML gems for Ruby.'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: '**Torch.rb ([link](https://github.com/ankane/torch.rb))** — 如果你感兴趣于训练深度学习模型，那么你肯定听说过
    PyTorch。好吧，PyTorch 是基于 LibTorch 构建的，本质上在底层有很多 C/C++ 代码来快速执行 ML 操作。Andrew Kane
    在 LibTorch 上创建了一个 Ruby 适配器，即 Torch.rb，本质上是一个 PyTorch 的 Ruby 版本。Andrew Kane 在 Ruby
    AI 世界中是一位英雄，他 [编写了数十个](https://ankane.org/new-ml-gems) ML 宝石用于 Ruby。'
- en: Summary
  id: totrans-103
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: '**In short: building a web application with AI integration quickly and cheaply
    requires a monolithic architecture.** A monolith demands a monolingual application,
    which is necessary if your end goal is quality apps delivered with speed. Your
    main options are either Python or Ruby. If you go with Python, you will probably
    use Django for your web framework. If you go with Ruby, you will be using Ruby
    on Rails. At our agency, we found Django’s lack of features disappointing. Rails
    has impressed us with its feature set and emphasis on simplicity. We were thrilled
    to find almost no issues on the AI side.'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: '**简而言之：快速且低成本地将 AI 集成到 Web 应用程序中需要单体架构。** 单体架构要求应用是单语的，这对于你最终目标是快速交付高质量应用来说是必要的。你的主要选择是
    Python 或 Ruby。如果你选择 Python，你可能会使用 Django 作为你的 Web 框架。如果你选择 Ruby，你将使用 Ruby on Rails。在我们的代理机构中，我们发现
    Django 的功能不足令人失望。Rails 以其功能集和对简单性的重视给我们留下了深刻印象。我们在 AI 方面几乎没有发现任何问题。'
- en: Of course, there are times where you will not want to use Ruby. If you are conducting
    research in AI or training machine learning models from scratch, then you will
    likely want to stick with Python. Research almost never involves building web
    applications. At most you’ll build a simple interface or dashboard in a notebook,
    but nothing production-ready. You’ll likely want the latest PyTorch updates to
    ensure your training runs quickly. You may even dive into low-level C/C++ programming
    to squeeze as much performance as you can out of your hardware. Maybe you’ll even
    try your hand at [Mojo](https://www.modular.com/mojo).
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，有些时候你可能不想使用 Ruby。如果你正在进行人工智能研究或从头开始训练机器学习模型，那么你可能会想坚持使用 Python。研究几乎从不涉及构建网络应用程序。最多你可能会在笔记本中构建一个简单的界面或仪表板，但不会是用于生产的。你可能还希望获取最新的
    PyTorch 更新以确保你的训练运行得更快。你甚至可能会深入到低级别的 C/C++ 编程，以从你的硬件中获得尽可能多的性能。也许你还会尝试你的手艺去尝试[Mojo](https://www.modular.com/mojo)。
- en: But if your goal is to integrate the latest LLMs — either open or closed source
    — into web applications, then we believe Ruby to be the far superior option. Give
    it a shot yourselves!
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 但如果你的目标是将最新的 LLM（无论是开源还是闭源）集成到网络应用程序中，那么我们认为 Ruby 是一个远优于其他选项的选择。自己试试看吧！
- en: In part three of this series, I will dive into a fun experiment: **just how
    simple can we make a web application with AI integration?** Stay tuned.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 在本系列的第三部分，我将进行一个有趣的实验：**我们如何能够使具有人工智能集成的网络应用程序变得尽可能简单？**请保持关注。
- en: 🔥* If you’d like a custom web application with generative AI integration, visit *[*losangelesaiapps.com*](https://losangelesaiapps.com/)
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 🔥* 如果你想定制一个具有生成式人工智能集成的网络应用程序，请访问[*losangelesaiapps.com*](https://losangelesaiapps.com/)
