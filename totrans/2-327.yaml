  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Ruby and Python: Two Sides of the Same Coin](#ruby)'
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Recent AI Based Gems](#ai)'
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
