- en: You Think 80% Means 80%? Why Prediction Probabilities Need a Second Look
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/you-think-80-means-80-why-prediction-probabilities-need-a-second-look-ebc8b650cf21/](https://towardsdatascience.com/you-think-80-means-80-why-prediction-probabilities-need-a-second-look-ebc8b650cf21/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![Real world occurrences versus model confidence scores. Image created with
    Dall·E by the author.](../Images/7412356cbc93b0354f3e2fa559c7fd16.png)'
  prefs: []
  type: TYPE_IMG
- en: Real world occurrences versus model confidence scores. Image created with Dall·E
    by the author.
  prefs: []
  type: TYPE_NORMAL
- en: '**How reliable are probabilities predicted by a machine learning model? What
    does a predicted probability of 80% mean? Is it similar to 80% chance of an event
    occurring? In this beginner friendly post, you’ll learn the basics of prediction
    probabilities, calibration, and how to interpret these numbers in a practical
    context. I will show with a demo how you can evaluate and improve these probabilities
    for better decision-making.**'
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: What do prediction probabilities represent?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Instead of calling `model.predict(data)`, which gives you a 0 or 1 prediction
    for a binary classification problem, you might have used `model.predict_proba(data)`.
    This will give you probabilities instead of zeroes and ones. In many data science
    cases this is useful, because it gives you more insights. But what do these probabilities
    actually mean?
  prefs: []
  type: TYPE_NORMAL
- en: 'A predicted probability of 0.8 means that the model is 80% confident that an
    instance belongs to the positive class. Let’s repeat that: *the model is 80% confident
    that an instance belongs to the positive class*. So it doesn’t mean: *there is
    an 80% real-world likelihood of the event occurring*. These are two different
    things. It’s important to make this distinction, especially in use cases where
    probabilities drive the -for example in fraud detection, medical diagnoses, or
    risk assessment.'
  prefs: []
  type: TYPE_NORMAL
- en: 'This touches my motivation to write this post: I noticed that many people easily
    make this mistake. As a data scientist, it can be important to explain this difference
    if your model is ‘guilty’, because business stakeholders might assume that 80%
    prediction probability means an 80% real-world likelihood of the event occurring.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The problem with interpreting model confidence scores as probabilities
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Why can it be a problem to interpret scores from `predict_proba` as real-world
    likelihood?
  prefs: []
  type: TYPE_NORMAL
- en: 'Some models are overconfident: An overconfident model produces high confidence
    scores while not being right. Other models are underconfident: They produce low
    confidence scores while being right. If model confidence scores are not calibrated
    this can be misleading.'
  prefs: []
  type: TYPE_NORMAL
- en: Another thing to keep in mind is that confidence scores are based on patterns
    learned from the training data. If the data is imbalanced or biased, the confidence
    scores might not reflect true probabilities in real-world scenarios.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s take a look at an example. It can happen that when your XGBoost model
    predicts 80% as probability, that in reality, the event occurs only 65% of the
    time when the model outputs 80%. Of course we would like to see that if the model
    predicted 80% for 100 cases, the event occurs in approximately 80 of the cases.
    Otherwise we can’t trust the probabilities.
  prefs: []
  type: TYPE_NORMAL
- en: How can we determine if a model is well-calibrated, meaning that the model confidence
    scores match the true likelihood of the event? Let’s take a look at calibration
    and ways to improve it.
  prefs: []
  type: TYPE_NORMAL
- en: Calibrating model confidence scores
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'First, we want to visualize the alignment between model confidence scores and
    true outcomes on the test set. It’s super easy:'
  prefs: []
  type: TYPE_NORMAL
- en: Group prediction probabilities into bins, below I used 20 bins.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Compute the fraction of positive cases for each bin. This corresponds with the
    true probability of the event occurring in this bin.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Plot these true probabilities against the predicted probabilities.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'And of course, if the model is perfectly calibrated, the points will lie on
    the diagonal line. For example: out of all cases in the 10% bin, the true probability
    (fraction of positives) is around 10%. Below you can see examples of a quite good
    calibrated XGBoost model, versus a not-so-perfect calibrated Naive Bayes model.
    These models are trained on the [adult dataset](https://www.openml.org/search?type=data&status=active&sort=nr_of_likes&id=1590).'
  prefs: []
  type: TYPE_NORMAL
- en: '![Plotting calibration curves on the test set for the adult dataset for XGBoost
    and Naive Bayes prediction scores. Image by author.](../Images/10b049725db2af31a6cd4a5ede825470.png)'
  prefs: []
  type: TYPE_IMG
- en: Plotting calibration curves on the test set for the adult dataset for XGBoost
    and Naive Bayes prediction scores. Image by author.
  prefs: []
  type: TYPE_NORMAL
- en: 'Another way to check how well the model is calibrated is by using the Brier
    Score. This is also easy! It measures the mean squared difference between the
    predicted probabilities and the actual outcomes (so the lower the better):'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/0ba4a672944c65d21e8af0b1708d148a.png)'
  prefs: []
  type: TYPE_IMG
- en: 'If we calculate the Brier Score for the two models above, we get the following
    results:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: What we can conclude from the calibration plots, is that the calibration from
    the XGBoost model is quite good. The one for Naive Bayes is far from perfect,
    because the curve is deviating from the diagonal line, and the Brier Score is
    high (almost twice as high as the Brier Score for the XGBoost model). Let’s continue
    with the Naive Bayes model to show how we can improve the calibration! There are
    different ways of improving it, in this post we will take a look at Platt Scaling
    and Isotonic Regression.
  prefs: []
  type: TYPE_NORMAL
- en: 'The calibration curve and Brier score are implemented in scikit-learn, you
    can import and create them by using the following code:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Platt Scaling
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Platt Scaling is a simple and effective method for calibrating predicted probabilities.
    It works by fitting a logistic regression model to the output of the uncalibrated
    model’s probabilities. Specifically, it minimizes the log-loss on a validation
    set, ensuring that the calibrated probabilities better reflect the true likelihood
    of the events.
  prefs: []
  type: TYPE_NORMAL
- en: 'To apply Platt Scaling, you split your data into training and validation sets.
    The first step is to train your model on the training set and generate uncalibrated
    probabilities for the validation set. Then you can use these probabilities as
    input features to fit a logistic regression model that adjusts the predictions.
    This approach is particularly effective for models that produce continuous scores,
    such as SVMs or Naive Bayes. One note: Platt Scaling assumes a monotonic relationship
    between predicted probabilities and true outcomes, which might not always hold.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Here you can see the code for applying Platt Scaling, and the new calibration
    curve if we apply Platt Scaling to our Naive Bayes classifier on the adult dataset:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/99afb725f413f74a902685c6592c1091.png)'
  prefs: []
  type: TYPE_IMG
- en: Isotonic Regression
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Another common calibration technique is Isotonic Regression. This is a non-parametric
    technique for calibrating probabilities. Meaning that unlike Platt Scaling, it
    does not make assumptions, making it more flexible but also potentially prone
    to overfitting when you are working with a smaller dataset. This method creates
    a step-by-step function that adjusts the predicted probabilities so they align
    better with the actual outcomes. The adjustment ensures that the probabilities
    stay in order, meaning higher predictions will still represent a higher likelihood
    of the event happening compared to lower predictions.
  prefs: []
  type: TYPE_NORMAL
- en: To implement Isotonic Regression, you again split your data and train the base
    model on the training set. The predicted probabilities on the validation set are
    used as inputs to fit an isotonic regression model, which adjusts the probabilities.
    It tends to produce better calibration than Platt Scaling in cases where the true
    probability distribution is irregular, like in our example. But watch out with
    small datasets, because Isotonic Regression can introduce artifacts like sharp
    jumps or dips in the calibration curve.
  prefs: []
  type: TYPE_NORMAL
- en: Below again the code and calibration curve. You can clearly spot the jump and
    dip at mean predicted probability 0.6! Besides that, the curve looks nice.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/bec588266a6fefcd4114e915b2fe031a.png)'
  prefs: []
  type: TYPE_IMG
- en: Comparing Calibration Methods
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'If we combine all the plots of the Naive Bayes model on the adult dataset (uncalibrated
    model, Platt Scaling, and Isotonic Regression), to compare them, this is the result:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Uncalibrated Naive Bayes model, Platt Scaling, and Isotonic Regression. Image
    by author.](../Images/d2d0d28fc5559009a02ed8c43b2e9c5e.png)'
  prefs: []
  type: TYPE_IMG
- en: Uncalibrated Naive Bayes model, Platt Scaling, and Isotonic Regression. Image
    by author.
  prefs: []
  type: TYPE_NORMAL
- en: 'Looking at this plot, the Isotonic Regression calibration plot seems to fit
    best in this example. It only has this strange jump and dip at 0.6 mean predicted
    probability mentioned earlier. We can perform an extra check by calculating the
    Brier Scores:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: Indeed! Isotonic Regression has the best score.
  prefs: []
  type: TYPE_NORMAL
- en: You may have noticed that the uncalibrated XGBoost model had an even better
    Brier Score and calibration plot, and you are right. We could save ourselves the
    hassle of calibrating the results of the Naive Bayes model and go for XGBoost
    for this dataset! Of course, if you test this in real life on your own data, it’s
    not guaranteed that this is the case 🙂
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion and Further Reading
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Calibration is often overlooked but can be critical in decision-sensitive applications.
    Many models, including tree-based ensembles like XGBoost and LightGBM, use indirect
    techniques to improve calibration during training, such as minimizing log-loss.
    This *does* *not directly address probability calibration* (especially for imbalanced
    datasets or datasets that contain noisy labels). It is generally good practice
    to validate calibration using plots and metrics like the Brier Score.
  prefs: []
  type: TYPE_NORMAL
- en: 'It is most crucial to calibrate your results if probabilities are used for
    decision making rather than ranking. In healthcare for example, a calibrated probability
    could help estimate risk more accurately, enabling better resource allocation.
    If this post sparked your interest, related topics are Bayesian methods for uncertainty
    quantification, advanced ensembling techniques, and deeper insights into confidence
    intervals for predicted probabilities. You might be interested in other calibration
    methods, for example [Logistic Correction](https://arxiv.org/pdf/1207.1403). Some
    interesting research papers about these topics:'
  prefs: []
  type: TYPE_NORMAL
- en: '[Predicting Good Probabilities With Supervised Learning](https://www.cs.cornell.edu/~alexn/papers/calibration.icml05.crc.rev3.pdf)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Beyond sigmoids: How to obtain well-calibrated probabilities from binary classifiers
    with beta calibration](https://projecteuclid.org/journals/electronic-journal-of-statistics/volume-11/issue-2/Beyond-sigmoids--How-to-obtain-well-calibrated-probabilities-from/10.1214/17-EJS1338SI.full)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Transforming classifier scores into accurate multiclass probability estimates](https://www.researchgate.net/publication/2571315_Transforming_Classifier_Scores_into_Accurate_Multiclass_Probability_Estimates)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[A Review on Bayesian Methods for Uncertainty Quantification in Machine Learning
    Models Enhancing Predictive Accuracy and Model Interpretability](https://ieeexplore.ieee.org/document/10696308)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Accurate Uncertainty Estimation and Decomposition in Ensemble Learning](https://arxiv.org/abs/1911.04061)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
