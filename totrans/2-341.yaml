- en: Boost 2-Bit LLM Accuracy with EoRA
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/boost-2-bit-llm-accuracy-with-eora/](https://towardsdatascience.com/boost-2-bit-llm-accuracy-with-eora/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1747288055104" class="mdspan-comment">Quantization</mdspan>
    is one of the key techniques for reducing the memory footprint of large language
    models (LLMs). It works by converting the data type of model parameters from higher-precision
    formats such as 32-bit floating point (FP32) or 16-bit floating point (FP16/BF16)
    to lower-precision integer formats, typically INT8 or INT4\. For example, quantizing
    a model to 4-bit means each parameter uses only 0.5 bytes, compared to 4 bytes
    in FP32.
  prefs: []
  type: TYPE_NORMAL
- en: Post-training quantization methods like GPTQ and AWQ can dramatically reduce
    the size of large models. A model like Llama 3 with 70 billion parameters can
    occupy around 140 GB in FP16, but this can be reduced to approximately 40 GB using
    4-bit quantization, while still maintaining strong performance on downstream tasks.
  prefs: []
  type: TYPE_NORMAL
- en: However, despite this substantial reduction, such models still exceed the memory
    capacity of most consumer-grade GPUs, which typically offer 24 GB to 32 GB of
    VRAM. To make these models truly accessible, quantization to even lower bitwidths,
    such as 2-bit, is required. While recent advances in low-bit quantization are
    promising, achieving stable and accurate 2-bit quantization remains a significant
    challenge.
  prefs: []
  type: TYPE_NORMAL
- en: In this article, we review a technique called **EoRA** that helps compensate
    for quantization-induced errors. EoRA is a *training-free* method, meaning it
    can be applied quickly and efficiently to any model, even the largest ones. We’ll
    check how EoRA works and demonstrate how it can significantly improve the performance
    of 2-bit quantized models, bringing them close to the accuracy of their full-precision
    counterparts while being up to 5.5x smaller.
  prefs: []
  type: TYPE_NORMAL
- en: We’ll analyze experimental results obtained using large models such as Qwen3-32B
    and Qwen2.5-72B, both quantized to 2-bit using state-of-the-art quantization techniques,
    to illustrate the effectiveness of EoRA.
  prefs: []
  type: TYPE_NORMAL
- en: Diving into the Eigenspace in Search of an Adapter
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Post-training quantization or, more generally, compression aims to reduce model
    size or inference cost by minimizing the output difference between the original
    weights *W[l]​* and compressed weights *Ŵ[l]* using only a small calibration dataset.
  prefs: []
  type: TYPE_NORMAL
- en: Most quantization methods are framed layer-wise, but the choice of compression
    formats is rigid and limits flexibility across diverse deployment needs.
  prefs: []
  type: TYPE_NORMAL
- en: To bypass format constraints and improve accuracy, previous work, such as QLoRA
    [1] and HQQ+ [2], directly fine-tuned a LoRA adapter on top of the frozen quantized
    models.
  prefs: []
  type: TYPE_NORMAL
- en: 'It is also possible to reframe compression as a *compensation* problem: given
    a compressed model, introduce low-rank residual paths that specifically correct
    compression errors.'
  prefs: []
  type: TYPE_NORMAL
- en: 'A straightforward method uses SVD to decompose the compression error:'
  prefs: []
  type: TYPE_NORMAL
- en: \[\Delta W_l = W_l – \hat{W}_l\]
  prefs: []
  type: TYPE_NORMAL
- en: into
  prefs: []
  type: TYPE_NORMAL
- en: \[U_l \Sigma_l V_l^T\]
  prefs: []
  type: TYPE_NORMAL
- en: 'forming low-rank approximations via two matrices:'
  prefs: []
  type: TYPE_NORMAL
- en: \[B_l = U_l \Sigma_l \]
  prefs: []
  type: TYPE_NORMAL
- en: \[A_l = V_l^T\]
  prefs: []
  type: TYPE_NORMAL
- en: where *A[l]* and *B[l]* are the standard tensors of a LoRA adapter.
  prefs: []
  type: TYPE_NORMAL
- en: 'However, plain SVD has two limitations: it does not minimize the original layerwise
    compression loss directly, and it allocates capacity uniformly across all error
    components, ignoring the varying importance of different parts of the model.'
  prefs: []
  type: TYPE_NORMAL
- en: To address this, NVIDIA proposes **EoRA** [3].
  prefs: []
  type: TYPE_NORMAL
- en: '[EoRA: Training-free Compensation for Compressed LLM with Eigenspace Low-Rank
    Approximation](https://arxiv.org/html/2410.21271v1)'
  prefs: []
  type: TYPE_NORMAL
- en: 'EoRA first projects the compression error into the eigenspace defined by the
    input activation covariance:'
  prefs: []
  type: TYPE_NORMAL
- en: \[\tilde{X} \tilde{X}^T\]
  prefs: []
  type: TYPE_NORMAL
- en: 'where *X̃* is the average activation over the calibration set. Then, by performing
    eigendecomposition, we get:'
  prefs: []
  type: TYPE_NORMAL
- en: \[\tilde{X} \tilde{X}^T = Q \Lambda Q^T\]
  prefs: []
  type: TYPE_NORMAL
- en: 'The compression error *ΔW* is projected as:'
  prefs: []
  type: TYPE_NORMAL
- en: \[\Delta W’ = \Delta W Q’\]
  prefs: []
  type: TYPE_NORMAL
- en: where *Q′=QΛ*. Then SVD is applied on *ΔW′* to produce a low-rank approximation,
    and the result is projected back to the original space, adjusting the low-rank
    factors accordingly.
  prefs: []
  type: TYPE_NORMAL
- en: 'This eigenspace projection changes the optimization objective: it weights the
    importance of different error components according to their contribution to the
    layerwise output (via eigenvalues), making the approximation more efficient. It
    can be computed quickly without any training, requires only calibration activations,
    and does not introduce extra inference latency. Moreover, the derivation shows
    that this approach leads to a direct minimization of the layerwise compression
    loss, not just the raw weight error.'
  prefs: []
  type: TYPE_NORMAL
- en: Analytically, truncating a singular value in the projected space corresponds
    to minimizing the true compression error under reasonable assumptions about the
    calibration activations.
  prefs: []
  type: TYPE_NORMAL
- en: In their paper, NVIDIA presents a wide range of strong results showing that
    EoRA can significantly boost the accuracy of quantized models. However, their
    experiments focus mostly on older quantization methods like GPTQ and are limited
    to mid-sized LLMs, up to 13B parameters, at 3-bit and 4-bit precisions.
  prefs: []
  type: TYPE_NORMAL
- en: 'This leaves an open question: *can EoRA still be effective for much larger
    models, using more modern quantization techniques, and even pushing down to 2-bit
    precision?*'
  prefs: []
  type: TYPE_NORMAL
- en: Let’s find out.
  prefs: []
  type: TYPE_NORMAL
- en: Calibrating an EoRA Adapter
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Suppose we have quantized models that show significantly degraded performance
    compared to their full-precision counterparts on certain tasks. Our goal is to
    reduce this performance gap using EoRA.
  prefs: []
  type: TYPE_NORMAL
- en: For the experiments, I used Qwen2.5-72B Instruct and Qwen3-32B, both quantized
    to 2-bit using [AutoRound (Apache 2.0 license), a state-of-the-art quantization
    algorithm developed by Intel](https://github.com/intel/auto-round). AutoRound
    leverages SignSGD optimization to fine-tune quantization, and is particularly
    effective for low-bit settings.
  prefs: []
  type: TYPE_NORMAL
- en: 'All the models I made are available here (Apache 2.0 license):'
  prefs: []
  type: TYPE_NORMAL
- en: '[Quantized Qwen3](https://huggingface.co/collections/kaitchup/quantized-qwen3-68132ed4ca82afb00ba988ea)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Quantized Qwen2.5](https://huggingface.co/collections/kaitchup/2-bit-qwen25-72b-instruct-680d6b70291aa4507d0f78fa)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The 2-bit models were quantized with a group size of 32, except for which used
    a group size of 128\. A larger group size reduces model size by storing less quantization
    metadata, but it introduces greater quantization error.
  prefs: []
  type: TYPE_NORMAL
- en: I evaluated the models on IFEval, a benchmark that measures instruction-following
    capabilities. Results showed a noticeable drop in performance for the quantized
    versions.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/da24726237dff568a31f58ed60ebd7d9.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  prefs: []
  type: TYPE_NORMAL
- en: 'To compensate for this degradation, I applied an EoRA adapter using the implementation
    provided in the [GPTQModel library](https://github.com/ModelCloud/GPTQModel) (licensed
    under Apache 2.0). The integration is straightforward. If you’re curious about
    how it’s implemented in PyTorch, the codebase is compact, clean, and easy to follow:'
  prefs: []
  type: TYPE_NORMAL
- en: 'GPTQModel’s EoRA implementation: [eora.py](https://github.com/ModelCloud/GPTQModel/blob/main/gptqmodel/eora/eora.py)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: EoRA requires a calibration dataset. Ideally, this dataset should reflect the
    model’s intended use case. However, since we don’t have a specific target task
    in this context and aim to preserve the model’s general capabilities, I used 1,024
    randomly sampled examples from the [C4 dataset](https://huggingface.co/datasets/allenai/c4)
    (licensed under ODC-BY).
  prefs: []
  type: TYPE_NORMAL
- en: Another key parameter is the LoRA rank, which greatly influences the effectiveness
    of the EoRA adapter. Its optimal value depends on the model architecture, the
    target task, and the calibration data. A higher rank may yield better performance
    but risks overfitting to the calibration set. It also increases the size of the
    adapter, counterproductive when the overall goal of quantization is to reduce
    memory usage. Conversely, a lower rank keeps the adapter lightweight but might
    not capture enough information to effectively compensate for quantization errors.
  prefs: []
  type: TYPE_NORMAL
- en: In my experiments, I tested LoRA ranks of 32, 64, and 256.
  prefs: []
  type: TYPE_NORMAL
- en: 'Below is the code used to create the EoRA adapter with GPTQModel:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Using an NVIDIA A100 GPU on [RunPod (referral link)](https://runpod.io?ref=1ip9lvtj),
    it took approximately 4 hours to generate the EoRA adapter for the model Qwen3-32B-autoround-2bit-gptq.
  prefs: []
  type: TYPE_NORMAL
- en: 'All EoRA adapters created for these models are publicly available (Apache 2.0
    license):'
  prefs: []
  type: TYPE_NORMAL
- en: '[EoRA Adapters for Qwen2.5 and Qwen3](https://huggingface.co/collections/kaitchup/eora-adapters-for-qwen25-and-qwen3-6821e72b551eaf5b4381a4aa)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Evaluating EoRA Adapters for 2-bit LLMs
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let’s evaluate the effect of the EoRA adapters. Do they improve the accuracy
    of the 2-bit models?
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/0c78a19449552e69af5eec02559147e3.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  prefs: []
  type: TYPE_NORMAL
- en: It works!
  prefs: []
  type: TYPE_NORMAL
- en: The improvements are particularly notable for Qwen3-14B and Qwen3-32B. For instance,
    applying EoRA to Qwen3-32B, quantized to 2-bit with a group size of 128, resulted
    in an accuracy gain of nearly 7.5 points. Increasing the LoRA rank, from 32 to
    64, also led to improvements, highlighting the impact of rank on performance.
  prefs: []
  type: TYPE_NORMAL
- en: EoRA is also effective on larger models like Qwen2.5-72B, though the gains are
    more modest. Lower-rank adapters showed little to no benefit on this model; it
    wasn’t until I increased the rank to 256 that significant improvements began to
    appear.
  prefs: []
  type: TYPE_NORMAL
- en: Memory Consumption of EoRA
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Using the EoRA adapter during inference results in the following increase in
    memory consumption:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/eb7d209499d8d7a029c1b1d97f1b6534.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  prefs: []
  type: TYPE_NORMAL
- en: The overhead is generally negligible. For instance for 2-bit Qwen3-14B, the
    adapters only add 257 MB and 514 MB to the total model size, with ranks of 32
    and 64\. With larger ranks, using an EoRA adapter becomes questionable as the
    total memory consumption may surpass the memory consumption of the same model
    quantized at a higher precision. For instance, 2-bit Qwen2.5 72B with an EoRA
    adapter of rank 256 is larger than 3-bit Qwen2.5 72B.
  prefs: []
  type: TYPE_NORMAL
- en: '*Note: This estimate includes only the memory consumed by the adapter’s parameters.
    For completeness, we could also account for the memory used by adapter activations
    during inference. However, these are extremely small relative to other tensors
    (such as the model’s attention and MLP layers) and can safely be considered negligible.*'
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**EoRA works.** We’ve confirmed that it’s a simple yet effective method for
    compensating quantization errors, even at 2-bit precision. It’s intuitive, training-free,
    and delivers meaningful performance gains. That said, there are a few trade-offs
    to consider:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Rank search:** Finding the optimal LoRA rank requires experimentation. It’s
    difficult to predict in advance whether a rank of 32 will be sufficient or whether
    a higher rank, like 256, will cause overfitting. The optimal value depends on
    the model, calibration data, and target task.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Increased memory consumption:** The goal of quantization is to reduce memory
    usage, often for highly constrained environments. While EoRA adapters are relatively
    lightweight at lower ranks, they do slightly increase memory consumption, particularly
    at higher ranks, reducing the overall efficiency of 2-bit quantization.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Looking ahead, NVIDIA’s paper also demonstrates that EoRA adapters make excellent
    starting points for QLoRA fine-tuning. In other words, if you plan to fine-tune
    a 2-bit model using QLoRA, initializing from an EoRA-adapted model can lead to
    better results with less training effort. I’ve written about fine-tuning adapters
    for GPTQ model last year, in my newsletter:'
  prefs: []
  type: TYPE_NORMAL
- en: '[QLoRA with AutoRound: Cheaper and Better LLM Fine-tuning on Your GPU](https://kaitchup.substack.com/p/qlora-with-autoround-cheaper-and)'
  prefs: []
  type: TYPE_NORMAL
- en: The main difference is that instead of initializing the adapter from scratch,
    we would load the EoRA adapter. This adapter will be fine-tuned.
  prefs: []
  type: TYPE_NORMAL
- en: References
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '[1] Dettmers et al, [QLoRA: Efficient Finetuning of Quantized LLMs](https://arxiv.org/abs/2305.14314)
    (2023), arXiv'
  prefs: []
  type: TYPE_NORMAL
- en: '[2] Badri and Shaji, [Towards 1-bit Machine Learning Models](https://mobiusml.github.io/1bit_blog/)
    (2024), Mobius Labs’ Blog'
  prefs: []
  type: TYPE_NORMAL
- en: '[3] Liu et al., [EoRA: Training-free Compensation for Compressed LLM with Eigenspace
    Low-Rank Approximation](https://arxiv.org/html/2410.21271v1) (2024), arXiv'
  prefs: []
  type: TYPE_NORMAL
