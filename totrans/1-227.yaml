    the 41st International conference on Machine Learning, Vienna, Austria.'
  prefs: []
  type: TYPE_NORMAL
- en: '[4] F. Mahdisoltani, J. Biega, and F.M. Suchanek. [Yago3: A knowledge base
    from multilingual wikipedias](https://asiabiega.github.io/papers/yago3_cidr2015.pdf)
    (2013), in CIDR.'
  prefs: []
  type: TYPE_NORMAL
- en: '[5] J. Gardner, J.C. Perdomo, L. Schmidt. Large Scale Transfer Learning for
