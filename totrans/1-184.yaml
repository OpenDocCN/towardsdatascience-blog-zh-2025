- en: Python 3.14 and the End of the GIL
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/python-3-14-and-the-end-of-the-gil/](https://towardsdatascience.com/python-3-14-and-the-end-of-the-gil/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '<mdspan datatext="el1760675204264" class="mdspan-comment">Python 3.14, one</mdspan>
    of the most eagerly awaited releases in recent times, is finally here. The reason
    for this is that several exciting enhancements have been implemented in this release,
    including:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Sub-interpreters**. These have been available in Python for 20 years, but
    to use them, you had to drop down to coding in C. Now they can be used straight
    from Python itself.'
  prefs: []
  type: TYPE_NORMAL
- en: '**T-Strings**. Template strings are a new method for custom string processing.
    They use the familiar syntax of f-strings, but, unlike f-strings, they return
    an object representing both the static and interpolated parts of the string, instead
    of a simple string.'
  prefs: []
  type: TYPE_NORMAL
- en: '**A just-in-time compiler.** This is still an experimental feature and should
    not be used in production systems; however, it promises a performance boost for
    specific use cases.'
  prefs: []
  type: TYPE_NORMAL
- en: There are many more enhancements in Python 3.14, but this article is not about
    those or the ones we mentioned above.
  prefs: []
  type: TYPE_NORMAL
- en: 'Instead, we will be discussing what is probably the most anticipated feature
    in this release: free-threaded Python, also known as GIL-free Python. Note that
    regular Python 3.14 will still run with the GIL enabled, but you can download
    (or build) a separate, free-threaded version. I’ll show you how to download and
    install it, and through several coding examples, demonstrate a comparison of run
    times between regular and GIL-free Python 3.14.'
  prefs: []
  type: TYPE_NORMAL
- en: What is the GIL?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Many of you will be aware of the Global Interpreter Lock (GIL) in Python. The
    GIL is a mutex—a locking mechanism—used to synchronise access to resources, and
    in Python, ensures that only one thread is executing bytecode at a time.
  prefs: []
  type: TYPE_NORMAL
- en: On the one hand, this has several advantages, including making it easier to
    perform thread and memory management, avoiding race conditions, and integrating
    Python with C/C++ libraries.
  prefs: []
  type: TYPE_NORMAL
- en: On the other hand, the GIL can stifle parallelism. With the GIL in place, true
    parallelism for CPU-bound tasks across multiple CPU cores within a single Python
    process is not possible.
  prefs: []
  type: TYPE_NORMAL
- en: Why this matters
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In a word, **“performance”.**
  prefs: []
  type: TYPE_NORMAL
- en: Because free-threaded execution can use all the available cores on your system
    simultaneously, code will often run faster. As data scientists and ML or data
    engineers, this applies not only to your code but also to the code that builds
    the systems, frameworks, and libraries that you rely on.
  prefs: []
  type: TYPE_NORMAL
- en: Many machine learning and data science tasks are CPU-intensive, particularly
    during model training and data preprocessing. The removal of the GIL could lead
    to significant performance improvements for these CPU-bound tasks.
  prefs: []
  type: TYPE_NORMAL
- en: A lot of popular libraries in Python face constraints because they have had
    to work around the GIL. Its removal could lead to:-
  prefs: []
  type: TYPE_NORMAL
- en: Simplified and potentially more efficient implementations of these libraries
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: New optimisation opportunities in existing libraries
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Development of new libraries that can take full advantage of parallel processing
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Installing the free-threaded Python version
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: If you’re a Linux user, the only way to obtain free threading Python is to build
    it yourself. If, like me, you’re on Windows (or macOS), you can install it using
    the official installers from the Python website. During the process, you’ll have
    an option to customise your installation. Look for a checkbox to include the free-threaded
    binaries. This will install a separate interpreter that you can use to run your
    code without the GIL. I’ll demonstrate how the installation works on a 64-bit
    Windows system.
  prefs: []
  type: TYPE_NORMAL
- en: 'To get started, click the following URL:'
  prefs: []
  type: TYPE_NORMAL
- en: '[https://www.python.org/downloads/release/python-3140](https://www.python.org/downloads/release/python-3140)'
  prefs: []
  type: TYPE_NORMAL
- en: And scroll down until you see a table that looks like this.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f643b821a77e2dca30a57112ed81303d.png)'
  prefs: []
  type: TYPE_IMG
- en: Image from Python website
  prefs: []
  type: TYPE_NORMAL
- en: Now, click on the Windows Installer (64-bit) link. Once the executable has been
    downloaded, open it and, on the first installation screen that’s displayed, click
    on the **Customize Installation** link. Note that I also checked the **Add Python.exe
    to path** checkbox.
  prefs: []
  type: TYPE_NORMAL
- en: On the next screen, select the optional extras you want to add to the installation,
    then click **Next** again**.** At this point, you should see a screen like this,
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/6e92867dd27546cd6f53b779dafa6fcf.png)'
  prefs: []
  type: TYPE_IMG
- en: Image from Python installer
  prefs: []
  type: TYPE_NORMAL
- en: Ensure the checkbox next to **Download free-threaded binaries** is selected.
    I also checked the **Install Python 3.14 for all users** option.
  prefs: []
  type: TYPE_NORMAL
- en: Click the Install button.
  prefs: []
  type: TYPE_NORMAL
- en: Once the download has finished, in the install folder, look for a Python application
    file with a ‘t’ on the end of its name. This is the GIL-free version of Python.
    The application file, called Python, is the regular Python executable. In my case,
    the GIL-free Python was called Python3.14t. You can check that it’s been correctly
    installed by typing this into a command line.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: If you see this, you’re all set. Otherwise, check that the installation location
    has been added to your PATH environment variable and/or double-check your installation
    steps.
  prefs: []
  type: TYPE_NORMAL
- en: As we’ll be comparing the GIL-free Python runtimes with the regular Python runtimes,
    we should also verify that this is also installed correctly.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: GIL vs GIL-free Python
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
