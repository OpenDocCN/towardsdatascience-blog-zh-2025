- en: '**Example 3 — matrix multiplication**'
  prefs: []
  type: TYPE_NORMAL
- en: We’ll use the **threading** module for this. Here is the code we’ll be running.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: The code performs matrix multiplication of two 1000×1000 matrices in parallel
    using multiple CPU cores. It divides the result matrix into chunks, assigns each
    chunk to a separate process (equal to the number of CPU cores), and each process
    calculates its assigned portion of the matrix multiplication independently. Finally,
    it waits for all processes to finish and reports the total execution time, demonstrating
    how to leverage multiprocessing to speed up CPU-bound tasks.
  prefs: []
  type: TYPE_NORMAL
