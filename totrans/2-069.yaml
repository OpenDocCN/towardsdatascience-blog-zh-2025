- en: Stellar Flare Detection and Prediction Using Clustering and Machine Learning
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 基于聚类和机器学习的恒星爆发检测与预测
- en: 原文：[https://towardsdatascience.com/stellar-flare-detection-and-prediction-using-clustering-and-machine-learning-2/](https://towardsdatascience.com/stellar-flare-detection-and-prediction-using-clustering-and-machine-learning-2/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/stellar-flare-detection-and-prediction-using-clustering-and-machine-learning-2/](https://towardsdatascience.com/stellar-flare-detection-and-prediction-using-clustering-and-machine-learning-2/)
- en: <mdspan datatext="el1754213402784" class="mdspan-comment">Introdu</mdspan>ction
    and Motivation
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1754213402784" class="mdspan-comment">引言和动机</mdspan>
- en: Stellar flares are bursts of energy released by stars, believed to be caused
    by magnetic line reconnection [1,2]. It is characterized by a sudden spike in
    the star’s brightness, followed by a slow exponential decay [1,2]. But why care
    about detecting them? The reason is that they play an important role in our understanding
    of the universe. They help us gain insight into topics such as stellar magnetic
    fields, rotation, mass-loss rates, and atmospheric evolution of these stars’ orbiting
    planets [1,2]. However, as you probably expected, it’s not as easy as it sounds.
    Firstly, stellar flares don’t usually occur at consistent time intervals, which
    makes them hard to predict [1]. Secondly, low-energy flares often remain undetected
    as data-preprocessing steps tend to eliminate their signatures [1]. Thirdly, these
    datasets are unsupervised, meaning that the flares are not pre-labelled, making
    it quite challenging to evaluate flare detection models.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 星斑是恒星释放的能量爆发，据信是由磁线重连引起的[1,2]。它以恒星亮度突然上升为特征，随后是缓慢的指数衰减[1,2]。但为什么关心检测它们呢？原因在于它们在我们对宇宙的理解中扮演着重要角色。它们帮助我们深入了解诸如恒星磁场、旋转、质量损失率和这些恒星轨道行星的大气演化等主题[1,2]。然而，正如你可能预料的那样，这并不像听起来那么简单。首先，恒星爆发通常不会以一致的时间间隔发生，这使得它们难以预测[1]。其次，低能量爆发往往未被检测到，因为数据预处理步骤往往会消除它们的特征[1]。第三，这些数据集是无监督的，这意味着爆发没有预先标记，这使得评估爆发检测模型相当具有挑战性。
- en: Recent studies have proposed a few different ways to approach these challenges.
    One study combined a hidden Markov model (HMM) with a *celerite* model to account
    for quasi-periodic oscillations (i.e., oscillations that follow a regular pattern,
    but don’t have a fixed period), improving the detection of low-energy flares compared
    to traditional methods [1]. Another study used Recurrent Neural Networks (RNNs)
    to detect flares [2]. However, both approaches are highly computationally intensive,
    taking even hours to analyze data for a single star [1,2]. Moreover, I felt that
    these studies did not explore the potential of building prediction models to capture
    future flares. Such a model would be very useful, as scientists would know when
    to expect these flares and perhaps allocate resources to map these flares more
    effectively for in-depth research into their characteristics. In summary, my goal
    for this project was to develop a method that detects stellar flares with high
    accuracy and build a predictive model capable of capturing future flares. Achieving
    this will provide astronomers with a powerful tool to deepen our understanding
    of stellar systems and our universe as a whole.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 最近的研究提出了一些不同的方法来应对这些挑战。一项研究将隐马尔可夫模型（HMM）与*celerite*模型相结合，以解释准周期振荡（即遵循规律模式但无固定周期的振荡），与传统方法相比，提高了对低能量爆发的检测能力[1]。另一项研究使用了循环神经网络（RNN）来检测爆发[2]。然而，这两种方法都高度计算密集，分析单个恒星的数据可能需要数小时[1,2]。此外，我觉得这些研究没有探索构建预测模型以捕捉未来爆发的潜力。这样的模型将非常有用，因为科学家将知道何时可以期待这些爆发，并可能分配资源以更有效地绘制这些爆发，以便进行深入的研究。总之，这个项目的目标是开发一种能够以高精度检测恒星爆发的方法，并构建一个能够捕捉未来爆发的预测模型。实现这一点将为天文学家提供一种强大的工具，以深化我们对恒星系统和整个宇宙的理解。
- en: The Data
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据
- en: 'For this project, I analyzed time-series data for star TIC 0131799991, observed
    at a two-minute cadence by NASA’s Transiting Exoplanet Survey Satellite (TESS).
    While the original dataset has several features, I focused on just two for this
    study: time and PDCSAP (Pre-search Data Conditioning Simple Aperture Photometry)
    flux. PDCSAP flux represents the brightness of the star corrected for long-term
    trends. Flux measurements are missing during periods when the satellite was turned
    off, resulting in a total of 13,372 valid flux observations in this dataset.'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这个项目，我分析了NASA的凌星系外行星巡天卫星（TESS）以两分钟的时间间隔观测到的恒星TIC 0131799991的时间序列数据。虽然原始数据集有几个特征，但我只关注了这个研究中的两个：时间和PDCSAP（预搜索数据条件简单孔径光度计）通量。PDCSAP通量表示经过长期趋势校正的恒星亮度。在卫星关闭期间，通量测量缺失，导致这个数据集中共有13,372个有效的通量观测值。
- en: The data can be downloaded directly from the TESS website by following [this
    tutorial](https://heasarc.gsfc.nasa.gov/docs/tess/LightCurveFile-Object-Tutorial.html).
    Alternatively, a copy is available on my [GitHub repository](https://github.com/dikshasen24/Stellar-Series)
    for this project.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以通过遵循[这个教程](https://heasarc.gsfc.nasa.gov/docs/tess/LightCurveFile-Object-Tutorial.html)直接从TESS网站下载数据。或者，这个项目的副本可在我的[GitHub仓库](https://github.com/dikshasen24/Stellar-Series)中找到。
- en: Results
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结果
- en: Figure 1A shows the flux measurements of this star over time. Flares are characterized
    by sharp increases in flux; however, it’s clear that they don’t occur at perfectly
    consistent intervals. My first goal was to impute the missing values in this time
    series. To understand the underlying patterns better, I plotted the autocorrelation
    function (ACF) for the first 500 lags using the initial portion of the data, shown
    in Figure 1B. We observe that the ACF oscillates with a consistent frequency,
    with the distance between consecutive peaks being about 150 time units. Using
    this periodicity, I applied STL decomposition to separate the time series into
    trend and seasonal components. I then extrapolated these components to estimate
    the flux values for the missing portion of the data, as shown in Figure 1C. This
    method is quite successful, as we see that the imputed values preserve the overall
    structure of the data.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 图1A显示了这颗恒星随时间变化的通量测量结果。耀斑的特征是通量的急剧增加；然而，很明显，它们并不以完全一致的时间间隔发生。我的第一个目标是填补这个时间序列中缺失的值。为了更好地理解潜在的规律，我使用数据的前一部分绘制了前500个滞后值的自相关函数（ACF），如图1B所示。我们观察到ACF以一致的频率振荡，连续峰值之间的距离大约为150个时间单位。利用这种周期性，我应用了STL分解将时间序列分解为趋势和季节性成分。然后，我将这些成分外推以估计数据缺失部分的通量值，如图1C所示。这种方法相当成功，因为我们看到填补的值保留了数据的整体结构。
- en: '![](../Images/f824d54b731f352becff1980a8872a84.png)'
  id: totrans-10
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f824d54b731f352becff1980a8872a84.png)'
- en: '**Figure 1:** Stellar flux time series and imputation. (A) Time series of PDCSAP
    flux measurements for TIC0131799991 (B) ACF plot for Star 1’s PDCSAP flux values
    (C) Time series plot with imputed PDCSAP flux values'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: '**图1：恒星通量时间序列和填补。**(A) TIC0131799991的PDCSAP通量测量的时间序列(B) 星1的PDCSAP通量值的ACF图(C)
    带有填补的PDCSAP通量值的时间序列图'
- en: To build the flare detection model, I created a few additional features. One
    such feature was the flux rolling mean. To determine the optimal window size,
    I tested out multiple lags and visualized their effects over the first 2000 time
    points. A lag of 10 was highly erratic and noisy, while a lag of 200 resulted
    in an overly smoothed series, failing to detect the flare event around time point
    1500\. Between lags of 50 and 100, 100 provided the best balance between smoothing
    the data yet capturing the flare signature at time 1500\. Choosing such a window
    size is essential, as it ensures that the rolling mean recognizes the periodic
    structure of the data while remaining sensitive enough to capture flare peaks.
    Additional features constructed were flux rolling standard deviation, flux difference,
    and flux ratio.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 为了构建耀斑检测模型，我创建了一些额外的特征。其中一个特征是通量滚动平均值。为了确定最佳窗口大小，我测试了多个滞后值，并在前2000个时间点可视化它们的效果。滞后10的值非常不规则且噪声大，而滞后200的结果导致序列过度平滑，未能检测到1500个时间点附近的耀斑事件。在滞后50和100之间，100提供了在平滑数据和捕捉1500个时间点的耀斑特征之间取得最佳平衡。选择这样的窗口大小至关重要，因为它确保滚动平均值能够识别数据的周期性结构，同时保持对捕捉耀斑峰值的敏感性。构建的其他特征包括通量滚动标准差、通量差异和通量比率。
- en: For my flare detection model, I used DBSCAN (Density-Based Spatial Clustering
    of Applications with Noise). DBSCAN is an unsupervised clustering algorithm that
    identifies clusters based on data density and flags outliers as noise. For this
    project, I defined a point to be a flare if it was classified as noise by DBSCAN
    and exceeded the 95th percentile of flux values, since flare events are considered
    rare. I tested out different parameter values and chose the set that was sensitive
    enough to detect both strong and weak flares, while minimizing false positives
    (shown in Figure 2).
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我的耀斑检测模型，我使用了 DBSCAN（基于密度的空间聚类应用噪声）。DBSCAN 是一种无监督聚类算法，它根据数据密度识别簇，并将异常值标记为噪声。对于这个项目，我定义一个点为耀斑，如果它被
    DBSCAN 标记为噪声并且超过了通量值的 95 分位数，因为耀斑事件被认为是罕见的。我测试了不同的参数值，并选择了能够检测到强和弱耀斑且最小化假阳性的参数集（如图
    2 所示）。
- en: '![](../Images/f777769a706429224f2aa3cdb08f030e.png)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f777769a706429224f2aa3cdb08f030e.png)'
- en: '**Figure 2:** DBSCAN with parameters epsilon = 4 and min_points = 50 provides
    the best balance between detecting flares and minimizing (likely) false positives.'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: '**图 2:** 使用参数 epsilon = 4 和 min_points = 50 的 DBSCAN 提供了在检测耀斑和最小化（可能的）假阳性之间的最佳平衡。'
- en: A while ago, I mentioned one of the primary issues with the data being its unsupervised
    nature. So how do we know whether DBSCAN actually detects flares? This is where
    simulations come in handy since the ground truth is known, and we can evaluate
    our model accordingly. Table 1 summarizes the evaluation metrics of the two simulations
    I performed. For the first one, I used a randomized baseline and injected Pareto-distributed
    flares in this series. The DBSCAN algorithm achieved a sensitivity of 0.9 with
    no false positives! This strong performance is likely due to the high signal-to-noise
    ratio in the data, as the baseline was sampled from a Normal distribution (mean
    = 1, sd = 0.02).
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 一段时间以前，我提到了数据的一个主要问题，那就是它的无监督性质。那么我们如何知道 DBSCAN 是否真正检测到了耀斑呢？这就是模拟派上用场的地方，因为已知真实情况，我们可以相应地评估我们的模型。表
    1 总结了我进行的两个模拟的评估指标。对于第一个模拟，我使用了一个随机基线，并在这一系列中注入了帕累托分布的耀斑。DBSCAN 算法达到了 0.9 的灵敏度，没有假阳性！这种强劲的性能可能是由于数据中的高信噪比，因为基线是从正态分布（均值
    = 1，标准差 = 0.02）中抽取的。
- en: For a more realistic approach, my second simulation used a baseline, as well
    as flare intensities, aligned with the actual stellar data. In this case, the
    sensitivity remained at 0.9, with a slightly lower precision of 0.75\. Upon closer
    examination, the three false positives detected occurred shortly after the actual
    flare events, just slightly beyond the defined flare duration. This however is
    not a cause of major concern since the primary flare events were successfully
    captured. This aspect can be improved by consulting domain experts regarding flare
    morphology and perhaps creating tolerance windows. In summary, the results suggest
    that the DBSCAN parameters are optimized and may generalize well to other stars
    with similar periodicity and flare patterns.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 为了更现实的方法，我的第二个模拟使用了与实际恒星数据对齐的基线和耀斑强度。在这种情况下，灵敏度保持在 0.9，但精度略有下降，为 0.75。仔细检查后，发现三个假阳性发生在实际耀斑事件之后不久，略超过定义的耀斑持续时间。然而，这并不是一个严重的问题，因为主要的耀斑事件已被成功捕获。通过咨询领域专家关于耀斑形态，并可能创建容差窗口，可以改进这一方面。总之，结果表明
    DBSCAN 参数已优化，可能很好地推广到具有类似周期性和耀斑模式的其他恒星。
- en: '![](../Images/eb3ea4b373d8690354798c9c8316f35e.png)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/eb3ea4b373d8690354798c9c8316f35e.png)'
- en: '**Table 1:** Evaluation metrics from simulations. The algorithm demonstrates
    strong sensitivity in both cases, with slightly reduced precision in the more
    realistic star-based simulation due to near-flare false positives.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '**表 1:** 模拟中的评估指标。算法在两种情况下都表现出强烈的敏感性，但在更现实的基于恒星模拟中，由于接近耀斑的假阳性，精度略有降低。'
- en: With a detection algorithm in place, my next step was to build a model that
    could predict flares. Since traditional ML algorithms assume independent observations,
    I included lagged features in the feature list to capture the time-dependent nature
    of the data. The binary flare variable (‘flare’ vs ‘not flare’) from DBSCAN served
    as the response. To respect the temporal structure of the data, I trained the
    model on the first 80% of the data and evaluated it on the last 20%. Table 2 summarizes
    the evaluation metrics on the test data from the XGBoost classification model.
    The model performs exceptionally well on non-flare points, while the sensitivity
    and precision are lower for flare points.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 在部署了检测算法之后，我的下一步是构建一个可以预测耀斑的模型。由于传统的机器学习算法假设独立观察，我在特征列表中包括了滞后特征，以捕捉数据的时序特性。来自DBSCAN的二进制耀斑变量（“耀斑”与“非耀斑”）作为响应变量。为了尊重数据的时序结构，我在数据的前80%上训练了模型，并在最后20%上评估它。表2总结了XGBoost分类模型在测试数据上的评估指标。该模型在非耀斑点上表现出色，而对于耀斑点，敏感度和精确度较低。
- en: '![](../Images/533ef58d632425f254ff4558791d4575.png)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/533ef58d632425f254ff4558791d4575.png)'
- en: '**Table 2:** Evaluation metrics on the test data from the XGBoost model. The
    model performs exceptionally well in identifying non-flare events and shows promising
    performance in detecting flares, despite their relative rarity.'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '**表2：XGBoost模型在测试数据上的评估指标。该模型在识别非耀斑事件方面表现出色，尽管耀斑相对罕见，但在检测耀斑方面也显示出有希望的性能。**'
- en: Upon visual inspection of the test set (Figure 3A), we see that the predicted
    flare points appear very close to the actual flare events. This suggests that
    the model can predict the correct events; however, since XGBoost evaluates predictions
    at an individual time point level, even small misalignments lead to reduced reported
    accuracy. This aspect can be improved by consultation with domain experts, perhaps
    by defining tolerance windows such that predictions within such a window are considered
    a correct detection. Overall, the XGBoost model shows good potential as a tool
    to forecast future flares, given that performance is assessed at an event level
    rather than exact pointwise matches.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 在对测试集（图3A）进行视觉检查后，我们发现预测的耀斑点与实际耀斑事件非常接近。这表明模型可以预测正确的事件；然而，由于XGBoost在单个时间点级别评估预测，即使是微小的偏差也会导致报告的准确性降低。通过与领域专家协商，或许可以通过定义容忍窗口，使得该窗口内的预测被视为正确检测，从而改善这一方面。总的来说，鉴于性能是在事件级别而不是精确的点对点匹配上评估的，XGBoost模型作为预测未来耀斑的工具显示出良好的潜力。
- en: To compare the above model with a more traditional time series-based model,
    I also trained an LSTM. Unlike XGBoost where a point is either labelled ‘flare’
    or ‘non-flare’, the LSTM model predicts flux values directly. Thus, to define
    a flare point in this case, I set the threshold to be the minimum flux value among
    all points labeled as flares by DBSCAN in this star’s data. Figure 3B visually
    summarizes the LSTM test set results. On comparing the XGBoost and LSTM models,
    it is evident that XGBoost successfully captured several smaller flares that the
    LSTM model did not. This is a good sign, considering LSTM models are considered
    the go-to for time series predictions. One might argue that the smaller flares
    detected by XGBoost that LSTM missed are false positives; however, it is unlikely,
    since we observed during the simulation stage that all false positives detected
    occurred at the end of actual flare events. Thus, we can reasonably assume that
    the flares captured by DBSCAN in this case are valid detections. Another advantage
    of the XGBoost model is the training time. While the LSTM model took nearly thirty
    minutes to train, the XGBoost took less than ten seconds, further highlighting
    its potential as a computationally friendly predictive model.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 为了将上述模型与一个更传统的基于时间序列的模型进行比较，我还训练了一个LSTM模型。与XGBoost不同，其中某个点要么被标记为“耀斑”，要么被标记为“非耀斑”，LSTM模型直接预测通量值。因此，在这种情况下定义耀斑点，我将阈值设置为所有点中DBSCAN标记为该恒星数据的耀斑的最小通量值。图3B直观地总结了LSTM测试集的结果。在比较XGBoost和LSTM模型时，很明显XGBoost成功地捕捉到了LSTM模型未捕捉到的几个较小的耀斑。考虑到LSTM模型被认为是时间序列预测的首选，这是一个好兆头。有人可能会争辩说，XGBoost检测到的LSTM未检测到的较小耀斑是假阳性；然而，这种情况不太可能，因为我们观察到在模拟阶段，所有检测到的假阳性都发生在实际耀斑事件的末尾。因此，我们可以合理地假设DBSCAN在这种情况下捕捉到的耀斑是有效检测。XGBoost模型的另一个优点是训练时间。虽然LSTM模型训练了近三十分钟，而XGBoost模型只需不到十秒，这进一步突显了其作为计算友好型预测模型的潜力。
- en: '![](../Images/2f0d0018c2afb8347bd63855c492502a.png)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/2f0d0018c2afb8347bd63855c492502a.png)'
- en: '**Figure 3:** Visualizing flare prediction results on the test set. (A) XGBoost
    model. (B) LSTM model. XGBoost captures both small and large flares, while LSTM
    primarily detects larger flares.'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: '**图3**：在测试集上可视化耀斑预测结果。（A）XGBoost模型。（B）LSTM模型。XGBoost模型能够捕捉到大小不同的耀斑，而LSTM模型主要检测较大的耀斑。'
- en: Conclusion and Future Work
  id: totrans-27
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论与未来工作
- en: In summary, this project used DBSCAN to detect stellar flares in time-series
    flux data from star TIC 0131799991, recorded by TESS. The selected parameters
    provided a strong balance between detecting both strong and weak flares, while
    also minimizing false positives. Simulations demonstrated that these parameters
    are well-suited for this star and might generalize well to others with similar
    flare patterns and characteristics. Future work could look into testing whether
    these parameters generalize well to other stars, particularly ones with more irregular
    flare patterns or high noise. Additionally, we could also compare DBSCAN’s performance
    with existing methods on the same dataset to check relative model performance.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，该项目使用DBSCAN检测了来自恒星TIC 0131799991的时间序列光通量数据中的星体耀斑，该数据由TESS记录。所选参数在检测强和弱耀斑之间提供了良好的平衡，同时最大限度地减少了误报。模拟表明，这些参数非常适合该恒星，并且可能很好地推广到具有类似耀斑模式和特征的其它恒星。未来的工作可以研究这些参数是否能够很好地推广到其他恒星，特别是那些具有更多不规则耀斑模式或高噪声的恒星。此外，我们还可以将DBSCAN的性能与同一数据集上的现有方法进行比较，以检查相对模型性能。
- en: With a good flare detection model in place, I then built a flare prediction
    model employing XGBoost, with the flare labels generated by DBSCAN serving as
    the response. The XGBoost model did a good job, but tended to detect points close
    to (but not exactly) the actual flare events. Since XGBoost evaluates model performance
    on a pointwise level, these minor misalignments impacted the reported accuracy.
    We can reduce these false negatives via discussion with domain experts, who can
    perhaps help define tolerance windows that would account for such temporal proximity.
    Compared to LSTM, the XGBoost model was able to detect smaller flares and take
    far less training time, proving to be a computationally friendly tool as well.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 在建立了良好的耀斑检测模型之后，我接着构建了一个使用XGBoost的耀斑预测模型，其中DBSCAN生成的耀斑标签作为响应。XGBoost模型做得很好，但倾向于检测接近（但不完全）实际耀斑事件的位置。由于XGBoost在点对点级别评估模型性能，这些轻微的不匹配影响了报告的准确性。我们可以通过与领域专家讨论来减少这些误判，他们可能有助于定义考虑这种时间接近性的容忍窗口。与LSTM相比，XGBoost模型能够检测到更小的耀斑，并且训练时间远短，证明它是一个计算友好的工具。
- en: This study combines unsupervised clustering with supervised learning to present
    a robust, generalizable and computationally efficient pipeline for stellar flare
    detection and prediction, one that can be adapted to different families of stars.
    It uses a novel approach for detection, and explores the possibility of prediction
    –  a direction that has been largely unexplored in literature. Looking ahead,
    improving the model’s flare labeling accuracy and validating the approach across
    different stellar environments will be key for the wider adoption of this approach
    for flare detection and prediction. Ultimately, this work lays the foundation
    to support deeper insights into stellar behavior and our understanding of the
    universe.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 本研究结合无监督聚类和监督学习，提出了一种鲁棒、通用且计算效率高的星体耀斑检测和预测流程，该流程可以适应不同类型的恒星。它采用了一种新颖的检测方法，并探讨了预测的可能性——这是文献中很少被探索的方向。展望未来，提高模型耀斑标记的准确性，并在不同的恒星环境中验证该方法，将是更广泛采用该耀斑检测和预测方法的关键。最终，这项工作为深入理解恒星行为和我们对宇宙的理解奠定了基础。
