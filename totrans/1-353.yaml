- en: A Visual Guide to Tuning Decision-Tree Hyperparameters
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/visualising-decision-trees/](https://towardsdatascience.com/visualising-decision-trees/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Introduction
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <mdspan datatext="el1756317823059" class="mdspan-comment">Decision trees</mdspan>
    are one of the oldest and most popular forms of machine learning used for classification
    and regression. It’s unsurprising, then, that there’s a lot of content about them.
    However, most of it seems to focus on how the algorithms work, covering areas
    such as Gini impurity or error-minimisation. While this is useful knowledge, I’m
    more interested in how best to use decision trees to get the results I want —
    after all, my job doesn’t involve reinventing the tree, only growing them. Additionally,
    decision trees are some of the most easily visualised machine learning techniques,
    providing high interpretability, yet often content is primarily textual, with
    minimal, if any, graphics.
  prefs: []
  type: TYPE_NORMAL
- en: Based on these two factors, I’ve decided to do an exploration of how different
    decision tree hyperparameters affect both the performance of the tree (measured
    by factors such as MAE, RMSE, and R²) and visually how it looks (to see factors
    such as depth, node/leaf counts, and overall structure).
  prefs: []
  type: TYPE_NORMAL
- en: For the model, I’ll use scikit-learn’s `DecisionTreeRegressor`. Classification
    decision trees requires similar hyperparameter tuning to regression ones, so I
    won’t discuss them separately. The hyperparameters I’ll look at are `max_depth`, `ccp_alpha`, `min_samples_split`, `min_samples_leaf`,
    and `max_leaf_nodes`. I’ll use the California housing dataset, available through
    scikit-learn ([more info here](https://scikit-learn.org/stable/datasets/real_world.html#california-housing-dataset))
    (CC-BY). All images below are created by me. The code for this little project,
    if you want to have a play yourself, is available in my GitHub: [https://github.com/jamesdeluk/data-projects/tree/main/visualising-trees](https://github.com/jamesdeluk/data-projects/tree/main/visualising-trees)
  prefs: []
  type: TYPE_NORMAL
- en: The data
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'This is the data (transposed for visual purposes):'
  prefs: []
  type: TYPE_NORMAL
- en: '| Feature | Row 1 | Row 2 | Row 3 |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| MedInc | 8.3252 | 8.3014 | 7.2574 |'
  prefs: []
  type: TYPE_TB
- en: '| HouseAge | 41 | 21 | 52 |'
  prefs: []
  type: TYPE_TB
- en: '| AveRooms | 6.98412698 | 6.23813708 | 8.28813559 |'
  prefs: []
  type: TYPE_TB
- en: '| AveBedrms | 1.02380952 | 0.97188049 | 1.07344633 |'
  prefs: []
  type: TYPE_TB
- en: '| Population | 322 | 2401 | 496 |'
  prefs: []
  type: TYPE_TB
- en: '| AveOccup | 2.55555556 | 2.10984183 | 2.80225989 |'
  prefs: []
  type: TYPE_TB
- en: '| Latitude | 37.88 | 37.86 | 37.85 |'
  prefs: []
  type: TYPE_TB
- en: '| Longitude | -122.23 | -122.22 | -122.24 |'
  prefs: []
  type: TYPE_TB
- en: '| MedHouseVal | 4.526 | 3.585 | 3.521 |'
  prefs: []
  type: TYPE_TB
- en: 'Each row is a “block group”, a geographical area. The columns are, in order:
    median income, median house age, average number of rooms, average number of bedrooms,
    population, average number of occupants, latitude, longitude, and the median house
    value (the target). The target values range from 0.15 to 5.00, with a mean of
    2.1.'
  prefs: []
  type: TYPE_NORMAL
- en: 'I set aside the last item to use as my own personal tester:'
  prefs: []
  type: TYPE_NORMAL
- en: '| Feature | Value |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| MedInc | 2.3886 |'
  prefs: []
  type: TYPE_TB
- en: '| HouseAge | 16 |'
  prefs: []
  type: TYPE_TB
- en: '| AveRooms | 5.25471698 |'
  prefs: []
  type: TYPE_TB
- en: '| AveBedrms | 1.16226415 |'
  prefs: []
  type: TYPE_TB
- en: '| Population | 1387 |'
  prefs: []
  type: TYPE_TB
- en: '| AveOccup | 2.61698113 |'
  prefs: []
  type: TYPE_TB
- en: '| Latitude | 39.37 |'
  prefs: []
  type: TYPE_TB
- en: '| Longitude | -121.24 |'
  prefs: []
  type: TYPE_TB
- en: '| MedHouseVal | 0.894 |'
  prefs: []
  type: TYPE_TB
- en: I’ll use `train_test_split` to create training and testing data, which I’ll
    use to compare the trees.
  prefs: []
  type: TYPE_NORMAL
- en: Tree depth
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Shallow
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: I’ll start with a small tree, with `max_depth` of 3\. I’ll use `timeit` to record
    how long it takes to fit and predict. Of course, this is based on my machine;
    the objective is to give an idea of relative, not absolute, times. To get a more
    accurate timing, I took the mean of 10 fit-and-predicts.
  prefs: []
  type: TYPE_NORMAL
- en: It took 0.024s to fit, 0.0002 to predict, and resulted in a mean absolute error
    (MAE) of 0.6, a mean absolute percentage error (MAPE) of 0.38 (i.e. 38%), a mean
    squared error (MSE) of 0.65, a root mean squared error (RMSE) of 0.80, and an
    R² of 0.50\. Note that for R², unlike the previous error stats, the higher the
    better. For my chosen block, it predicted 1.183, vs 0.894 actual. Overall, not
    great.
  prefs: []
  type: TYPE_NORMAL
- en: 'This is the tree itself, using `plot_tree`:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/effef43f8650ae2f3271ac31cb2c6a98.png)'
  prefs: []
  type: TYPE_IMG
- en: You can see it only uses the MedInc, AveRooms, and AveOccup features – in other
    words, removing HouseAge, AveBedrms, Population, Latitude, and Longitude from
    the dataset would give the same predictions.
  prefs: []
  type: TYPE_NORMAL
- en: Deep
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Let’s go to `max_depth` of `None`, i.e. unlimited.
  prefs: []
  type: TYPE_NORMAL
- en: It took 0.09s to fit (~4x longer), 0.0007 to predict (~4x longer), and resulted
    in an MAE of 0.47, an MAPE of 0.26, an MSE of 0.53, an RMSE of 0.73, and an R²
    of 0.60\. For my chosen block, it predicted 0.819, vs 0.894 actual. Much better.
  prefs: []
  type: TYPE_NORMAL
- en: 'The tree:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/cdc0fe2dcfcfbb763f5be1aec91519e4.png)'
  prefs: []
  type: TYPE_IMG
- en: Wow. It has 34 levels (`.get_depth()`), 29,749 nodes (`.tree_.node_count`),
    and 14,875 individual branches (`.get_n_leaves()`) – in other words, up to 14,875
    different final values for MedHouseVal.
  prefs: []
  type: TYPE_NORMAL
- en: 'Using some custom code, I can plot one of the branches:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/eb0d56850a6d8d4dc00bac7a0362d111.png)'
  prefs: []
  type: TYPE_IMG
- en: This branch alone uses six of the eight features, so it’s likely that, across
    all ~15,000 branches, all features are represented.
  prefs: []
  type: TYPE_NORMAL
- en: However, a tree this complex can lead to overfitting, as it can split into very
    small groups and capture noise.
  prefs: []
  type: TYPE_NORMAL
- en: Pruned
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The `ccp_alpha` parameter (ccp = cost-complexity pruning) can prune a tree after
    it’s built. Adding in a value of 0.005 to the unlimited depth tree results in
    an MAE of 0.53, an MAPE of 0.33, an MSE of 0.52, an RMSE of 0.72, and an R² of
    0.60 – so it performed between the deep and shallow trees. For my chosen block,
    it predicted 1.279, so in this case, worse than the shallow one. It took 0.64s
    to fit (>6x longer than the deep tree) and 0.0002 to predict (the same as the
    shallow tree) – so, it’s slow to fit, but fast to predict.
  prefs: []
  type: TYPE_NORMAL
- en: 'This tree looks like:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/242d06965c3aa245d0f609da45e04f21.png)'
  prefs: []
  type: TYPE_IMG
- en: Cross validating
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: What if we mix up the data? Within a loop, I used `train_test_split` *without
    a random state* (to get new data each time), and fitted and predicted each tree
    based on the new data. Every loop I recorded the MAE/MAPE/MSE/RMSE/R², and then
    found the mean and standard deviation for each. I did 1000 loops. This helps (as
    the name suggests) validate our results – a single high or low error result could
    simply be a fluke, so taking the mean gives a better idea of the typical error
    on new data, and the standard deviation helps understand how stable/reliable a
    model is.
  prefs: []
  type: TYPE_NORMAL
- en: It’s worth noting that sklearn has some built-in tools for this form of validation,
    namely `cross_validation`, using `ShuffleSplit` or `RepeatedKFold`, and they’re
    typically much faster; I just did it manually to make it clearer what was going
    on, and to emphasise the time difference.
  prefs: []
  type: TYPE_NORMAL
- en: '`max_depth=3` (time: 22.1s)'
  prefs: []
  type: TYPE_NORMAL
- en: '| Metric | Mean | Std |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| MAE | 0.597 | 0.007 |'
  prefs: []
  type: TYPE_TB
- en: '| MAPE | 0.378 | 0.008 |'
  prefs: []
  type: TYPE_TB
- en: '| MSE | 0.633 | 0.015 |'
  prefs: []
  type: TYPE_TB
- en: '| RMSE | 0.795 | 0.009 |'
  prefs: []
  type: TYPE_TB
- en: '| R² | 0.524 | 0.011 |'
  prefs: []
  type: TYPE_TB
- en: '`max_depth=None` (time: 100.0s)'
  prefs: []
  type: TYPE_NORMAL
- en: '| Metric | Mean | Std |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| MAE | 0.463 | 0.010 |'
  prefs: []
  type: TYPE_TB
- en: '| MAPE | 0.253 | 0.008 |'
  prefs: []
  type: TYPE_TB
- en: '| MSE | 0.524 | 0.023 |'
  prefs: []
  type: TYPE_TB
- en: '| RMSE | 0.724 | 0.016 |'
  prefs: []
  type: TYPE_TB
- en: '| R² | 0.606 | 0.018 |'
  prefs: []
  type: TYPE_TB
- en: '`max_depth=None, ccp_alpha=0.005` (time: 650.2s)'
  prefs: []
  type: TYPE_NORMAL
- en: '| Metric | Mean | Std |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| MAE | 0.531 | 0.012 |'
  prefs: []
  type: TYPE_TB
- en: '| MAPE | 0.325 | 0.012 |'
  prefs: []
  type: TYPE_TB
- en: '| MSE | 0.521 | 0.021 |'
  prefs: []
  type: TYPE_TB
- en: '| RMSE | 0.722 | 0.015 |'
  prefs: []
  type: TYPE_TB
- en: '| R² | 0.609 | 0.016 |'
  prefs: []
  type: TYPE_TB
- en: Compared with the deep tree, across all error stats, the shallow tree has higher
    errors (also known as biases), but lower standard deviations (also known as variances).
    In more casual terminology, there’s a trade-off between precision (all predictions
    being close together) and accuracy (all predictions being near the true value).
    The pruned deep tree generally performed between the two, but took far longer
    to fit.
  prefs: []
  type: TYPE_NORMAL
- en: 'We can visualise all the stats these with box plots:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c936a21fd7cbc19a8980e171ab6f584c.png)'
  prefs: []
  type: TYPE_IMG
- en: 'We can see the deep trees (green boxes) typically have lower errors (smaller
    y-axis value) but larger variations (larger gap between the lines) than the shallow
    tree (blue boxes). Normalising the means (so they’re all 0), we can see the variation
    more clearly; for example, for the MAEs:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/35bc2679c92ab3c74e9424e5ed106c70.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Histograms can also be interesting. Again for the MAEs:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/2bdcfcd22e38126c2ffa62378dd88903.png)'
  prefs: []
  type: TYPE_IMG
- en: The green (deep) has lower errors, but the blue (shallow) has a narrower band.
    Interestingly, the pruned tree results are less normal than the other two – although
    this is not typical behaviour.
  prefs: []
  type: TYPE_NORMAL
- en: Other hyperparameters
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: What are the other hyperparameters we can tweak? The full list can be found
    in the docs: [https://scikit-learn.org/stable/modules/generated/sklearn.tree.DecisionTreeClassifier.html](https://scikit-learn.org/stable/modules/generated/sklearn.tree.DecisionTreeClassifier.html)
  prefs: []
  type: TYPE_NORMAL
- en: Minimum samples to split
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This is the minimum number of samples *of the total* that an individual node
    can contain to allow splitting. It can be a number or a percentage (implemented
    as a float between 0 and 1). It helps avoid overfitting by ensure each branch
    contains a decent number of results, rather than splitting into smaller and smaller
    branches based on only a few samples.
  prefs: []
  type: TYPE_NORMAL
- en: 'For example, `max_depth=10`, which I’ll use as a reference, looks like:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/4f8070dc9dd15ef36c1e263c2b2a8c69.png)'
  prefs: []
  type: TYPE_IMG
- en: '| Metric | Mean | Std |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| MAE | 0.426 | 0.010 |'
  prefs: []
  type: TYPE_TB
- en: '| MAPE | 0.240 | 0.008 |'
  prefs: []
  type: TYPE_TB
- en: '| MSE | 0.413 | 0.018 |'
  prefs: []
  type: TYPE_TB
- en: '| RMSE | 0.643 | 0.014 |'
  prefs: []
  type: TYPE_TB
- en: '| R² | 0.690 | 0.014 |'
  prefs: []
  type: TYPE_TB
- en: That’s 1563 nodes and 782 leaves.
  prefs: []
  type: TYPE_NORMAL
- en: 'Whereas `max_depth=10, min_samples_split=0.2` looks like:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/1000d477ecd90f5265d09f84847b2804.png)'
  prefs: []
  type: TYPE_IMG
- en: '| Metric | Mean | Std |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| MAE | 0.605 | 0.013 |'
  prefs: []
  type: TYPE_TB
- en: '| MAPE | 0.367 | 0.007 |'
  prefs: []
  type: TYPE_TB
- en: '| MSE | 0.652 | 0.027 |'
  prefs: []
  type: TYPE_TB
- en: '| RMSE | 0.807 | 0.016 |'
  prefs: []
  type: TYPE_TB
- en: '| R² | 0.510 | 0.019 |'
  prefs: []
  type: TYPE_TB
- en: Because it can’t split any node with fewer than 20% (0.2) of the total samples
    (as you can see in the leaves samples %), it’s limited to a depth of 4, with only
    15 nodes and 8 leaves.
  prefs: []
  type: TYPE_NORMAL
- en: For the tree with depth 10, many of the leaves contained a single sample. Having
    so many leaves with so few sample can be a sign of overfitting. For the constrained
    tree, the smallest leaf contains over 1000 samples.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this case, the constrained tree is worse than the unconstrained tree on
    all counts; however, setting `min_samples_split` to 10 (i.e. 10 samples, not 10%)
    improved the results:'
  prefs: []
  type: TYPE_NORMAL
- en: '| Metric | Mean | Std |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| MAE | 0.425 | 0.009 |'
  prefs: []
  type: TYPE_TB
- en: '| MAPE | 0.240 | 0.008 |'
  prefs: []
  type: TYPE_TB
- en: '| MSE | 0.407 | 0.017 |'
  prefs: []
  type: TYPE_TB
- en: '| RMSE | 0.638 | 0.013 |'
  prefs: []
  type: TYPE_TB
- en: '| R² | 0.695 | 0.013 |'
  prefs: []
  type: TYPE_TB
- en: This one was back to depth 10, with 1133 nodes and 567 leaves (so about 1/3
    less than the unconstrained tree). Many of these leaves also contain a single
    sample.
  prefs: []
  type: TYPE_NORMAL
- en: Minimum samples per leaf
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Another way of constraining a tree is by setting a minimum number of samples
    a leaf can have. Again, this can be a number or a percentage.
  prefs: []
  type: TYPE_NORMAL
- en: 'With `max_depth=10, min_samples_leaf=0.1`:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/2614c2a3f2d34d7d08fff6eb1c0989dd.png)'
  prefs: []
  type: TYPE_IMG
- en: Similar to the first `min_samples_split` one, it has a depth of 4, 15 nodes,
    and 8 leaves. However, notice the nodes and leaves are different; for example,
    in the right-most leaf in the `min_samples_split` tree, there were 5.8% of the
    samples, whereas in this one, the “same” leaf has 10% (that’s the 0.1).
  prefs: []
  type: TYPE_NORMAL
- en: 'The stats are similar to that one also:'
  prefs: []
  type: TYPE_NORMAL
- en: '| Metric | Mean | Std |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| MAE | 0.609 | 0.010 |'
  prefs: []
  type: TYPE_TB
- en: '| MAPE | 0.367 | 0.007 |'
  prefs: []
  type: TYPE_TB
- en: '| MSE | 0.659 | 0.023 |'
  prefs: []
  type: TYPE_TB
- en: '| RMSE | 0.811 | 0.014 |'
  prefs: []
  type: TYPE_TB
- en: '| R² | 0.505 | 0.016 |'
  prefs: []
  type: TYPE_TB
- en: Allowing “larger” leaves can improve results. `min_samples_leaf=10` has depth
    10, 961 nodes and 481 leaves – so similar to a `min_samples_split=10`. It gives
    our best results so far, suggesting limiting the number of 1-sample leaves has
    indeed reduced overfitting.
  prefs: []
  type: TYPE_NORMAL
- en: '| Metric | Mean | Std |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| MAE | 0.417 | 0.010 |'
  prefs: []
  type: TYPE_TB
- en: '| MAPE | 0.235 | 0.008 |'
  prefs: []
  type: TYPE_TB
- en: '| MSE | 0.380 | 0.017 |'
  prefs: []
  type: TYPE_TB
- en: '| RMSE | 0.616 | 0.014 |'
  prefs: []
  type: TYPE_TB
- en: '| R² | 0.714 | 0.013 |'
  prefs: []
  type: TYPE_TB
- en: Maximum leaf nodes
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Another way to stop having too many leaves with too few samples is to limit
    the number of leaves directly with `max_leaf_nodes` (technically it could still
    result in a single-sample leaf, but it’s less likely). The trees above above varied
    from 8 to almost 800 leaves. With `max_depth=10, max_leaf_nodes=100`:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/29b31490d6c530e51ca20863cb156eb5.png)'
  prefs: []
  type: TYPE_IMG
- en: 'This has a depth of 10 again, with 199 nodes and 100 leaves. In this case,
    there was only one leaf with a single sample, and only nine of them had fewer
    than ten samples. The results were decent too:'
  prefs: []
  type: TYPE_NORMAL
- en: '| Metric | Mean | Std |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| MAE | 0.450 | 0.010 |'
  prefs: []
  type: TYPE_TB
- en: '| MAPE | 0.264 | 0.010 |'
  prefs: []
  type: TYPE_TB
- en: '| MSE | 0.414 | 0.018 |'
  prefs: []
  type: TYPE_TB
- en: '| RMSE | 0.644 | 0.014 |'
  prefs: []
  type: TYPE_TB
- en: '| R² | 0.689 | 0.013 |'
  prefs: []
  type: TYPE_TB
- en: Bayes searching
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Finally, what’s the “perfect” tree for this data? Sure, it’s possible to use
    trial-and-error with the above hyperparamters, but it’s much easier to use something
    like `BayesSearchCV` (assuming you have the time to let it run). In 20 minutes
    it performed 200 iterations (i.e. hyperparameter combinations) with five cross-validations
    (similar to five `train_test_split`s) each.
  prefs: []
  type: TYPE_NORMAL
- en: 'The hyperparameters it found: `{''ccp_alpha'': 0.0, ''criterion'': ''squared_error'',
    ''max_depth'': 100, ''max_features'': 0.9193546958301854, ''min_samples_leaf'':
    15, ''min_samples_split'': 24}`.'
  prefs: []
  type: TYPE_NORMAL
- en: The tree was depth 20, with 798 leaves and 1595 nodes, so significantly less
    than the fully deep tree. This clearly demonstrates how increasing `min_samples_` can
    help; while the numbers of leaves and nodes are similar to the depth 10 tree,
    having “larger” leaves with a deeper tree has improved the results. I haven’t
    talked about `max_features` so far, but it’s as it sounds – how many features
    to consider at each split. Given this data has 8 features, and ~0.9 ✕ 8 = ~7.2,
    at each split 7 of the 8 features will be considered to find the best score.
  prefs: []
  type: TYPE_NORMAL
- en: For my single block it predicted 0.81632, so pretty close to the true value.
  prefs: []
  type: TYPE_NORMAL
- en: 'After putting it through the 1000 loops (which took just over 60 seconds –
    showing that the longest factor when fitting a tree is the pruning), the final
    scores:'
  prefs: []
  type: TYPE_NORMAL
