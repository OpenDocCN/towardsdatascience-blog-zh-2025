- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Visualising a tree makes seeing the how it functions clear – you could manually
    pick a row, follow the flow, and get your result. This is, of course, much easier
    with a shallow tree with few leaves. However, as we saw, it didn’t perform well
    – after all, 16,000 training rows were regressed into only 8 values, and then
    these were used to predict 4,000 test rows.
  prefs: []
  type: TYPE_NORMAL
- en: The tens of thousands of nodes in a deep tree performed better and, although
    it would be far harder to manually follow the flow, it’s still possible. Yet this
    led to overfitting – which isn’t necessarily surprising, as the number of leaves
    almost matched the number of rows of data, and the ratio of values to training
    rows was ~1:4 (compared with ~1:2000 for the shallow tree).
  prefs: []
  type: TYPE_NORMAL
- en: Pruning can help reduce overfitting and improve performances, and decrease prediction
    time (counteracted by the much longer fitting time), although adjusting other
    factors such as the number of samples to split on, the number of samples per leaf,
    and the maximum number of leaves, typically does a far superior job. The real-life
    tree analogy is strong – it’s more effective and efficient to care for a tree
    as it grows, ensuring it branches out in the optimal way, rather than let it grow
    wild for years then try and prune it back.
  prefs: []
  type: TYPE_NORMAL
- en: Balancing all these hyperparameters manually is a challenge, but fortunately,
    one thing computers do well is run a lot of computations quickly, so it’s wise
    to use searching algorithms such as BayesSearchCV to get the optimum hyperparameters.
    So why not just forget everything above and do a grid search, testing every possible
    combination? Well, running millions of computations still takes, especially with
    large datasets, so being able to narrow the hyperparameter windows can speed things
    up significantly.
  prefs: []
  type: TYPE_NORMAL
