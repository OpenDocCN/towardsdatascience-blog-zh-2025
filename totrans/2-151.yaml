- en: Dynamic Inventory Optimization with Censored Demand
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 受限制需求的动态库存优化
- en: 原文：[https://towardsdatascience.com/dynamic-inventory-optimization-with-censored-demand-2/](https://towardsdatascience.com/dynamic-inventory-optimization-with-censored-demand-2/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/dynamic-inventory-optimization-with-censored-demand-2/](https://towardsdatascience.com/dynamic-inventory-optimization-with-censored-demand-2/)
- en: <mdspan datatext="el1752530776655" class="mdspan-comment">We often make decisions</mdspan>
    under uncertainty. Not just once, but in a sequence over time. We rely on our
    past experiences and expectations of the future to make the most informed and
    optimal choices possible.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1752530776655" class="mdspan-comment">我们经常在不确定性下做出决策</mdspan>。不仅一次，而是在一段时间内连续做出决策。我们依靠我们的过去经验和对未来预期的期望来做出最明智和最优化选择。
- en: Think of a business that offers several products. These products are procured
    at a cost and sold for a profit. However, unsold inventory may incur a restocking
    fee, may carry salvage value, or in some cases, must be scrapped entirely.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一家提供多种产品的企业。这些产品以成本采购并以利润出售。然而，未售出的库存可能会产生补货费用，可能具有残值，或者在某些情况下，必须完全报废。
- en: 'Businesses, therefore, faces a crucial question: how much to stock? This decision
    must often be made before demand is fully known; that is, under censored demand.
    If the business overstocks, it observes the full demand, since all customer requests
    are fulfilled. But if it understocks, it only sees that demand exceeded supply
    and the actual demand remains unknown, making it a censored observation.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，企业面临一个关键问题：要储备多少？这个决定通常在需求完全知晓之前就必须做出；也就是说，在受限制的需求下。如果企业库存过多，它会观察到全部需求，因为所有客户请求都得到了满足。但如果它库存不足，它只能看到需求超过了供应，而实际需求仍然未知，这使得它成为一个受限制的观察。
- en: '![](../Images/f7a905628f90fab2871bfd5379ed5fc9.png)'
  id: totrans-5
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f7a905628f90fab2871bfd5379ed5fc9.png)'
- en: Image Generated by Author via DALL-E
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 由作者通过 DALL-E 生成的图像
- en: This type of problem is often referred to as a **Newsvendor Model**. In fields
    such as operations research and applied mathematics, the optimal stocking decision
    has been studied by framing it as a classic newspaper stocking problem; hence
    the name.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 这种类型的问题通常被称为**新闻销售商模型**。在运筹学和应用数学等领域，最优库存决策是通过将其表述为经典报纸库存问题来研究的；因此得名。
- en: In this article, we explore a **Sequential Decision-Making** framework for the
    stocking problem under uncertainty and develop a dynamic optimization algorithm
    using Bayesian learning.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我们探讨了一种在不确定性下的库存问题**顺序决策**框架，并开发了一种使用贝叶斯学习的动态优化算法。
- en: Our approach closely follows the framework laid out by [Warren B. Powell, Reinforcement
    Learning and Stochastic Optimization (2019)](https://castle.princeton.edu/wp-content/uploads/2019/10/Powell-Reinforcement-Learning-and-Stochastic-Optimization.pdf)
    and implements the paper from [Negoescu, Powell, and Frazier (2011), Optimal Learning
    Policies for the Newsvendor Problem with Censored Demand and Unobservable Lost
    Sales](https://people.orie.cornell.edu/pfrazier/pub/learning_newsvendor.pdf),
    published in Operations Research.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的方法紧密遵循 [Warren B. Powell, 强化学习与随机优化 (2019)](https://castle.princeton.edu/wp-content/uploads/2019/10/Powell-Reinforcement-Learning-and-Stochastic-Optimization.pdf)
    中提出的框架，并实现了 [Negoescu, Powell, 和 Frazier (2011)，《具有受限制需求和不可观察丢失销售的新闻销售商问题的最优学习策略》](https://people.orie.cornell.edu/pfrazier/pub/learning_newsvendor.pdf)，该论文发表在《运筹学》杂志上。
- en: Problem Setup
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 问题设置
- en: Following a similar setup to that of Negoescu et al., we frame the problem as
    optimizing the inventory level for a single item over a sequence of time steps.
    The cost and selling price are considered fixed. Unsold inventory is discarded
    with no salvage value, while each unit sold generates revenue. Demand is unknown,
    and when the available stock is less than actual demand, the demand observation
    is considered censored.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 沿用 Negoescu 等人的类似设置，我们将问题表述为在一系列时间步骤中优化单一商品的库存水平。成本和销售价格被认为是固定的。未售出的库存没有残值，而每单位销售的生成收入。需求是未知的，当可用库存少于实际需求时，需求观察被认为是受限制的。
- en: Demand \( W \) in each period is drawn from an exponential distribution with
    an unknown rate parameter, for simulation purposes.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 每个时期的**需求 \( W \)**是从一个具有未知速率参数的指数分布中抽取的，用于模拟目的。
- en: \[
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \begin{aligned}
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: \begin{aligned}
- en: 'x &\in \mathbb{R}_+ &&: \text{Order quantity (decision variable)} \\'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: '\( x \in \mathbb{R}_+ \) &&: 订单数量（决策变量） \\'
- en: 'W &\sim \mathrm{Exponential}(\lambda) &&: \text{Random demand with unknown
    rate parameter } \lambda \\'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: '\( W \sim \mathrm{Exponential}(\lambda) \) &&: 具有未知速率参数 \( \lambda \) 的随机需求
    \\'
- en: '\lambda &&&: \text{Demand rate (unknown, to be estimated)} \\'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: '\lambda &&&: \text{需求率（未知，待估计）} \\'
- en: 'c &&&: \text{Unit cost to procure or produce the item} \\'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 'c &&&: \text{采购或生产该物品的单位成本} \\'
- en: 'p &&&: \text{Unit selling price (assume } p > c \text{ for profitability)}'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 'p &&&: \text{单位售价（假设 } p > c \text{ 以保证盈利）}'
- en: \end{aligned}
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: \end{aligned}
- en: \]
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: The parameter \(\lambda\) in the exponential distribution represents the **rate
    of demand**; that is, how quickly demand events occur. The **average demand**
    is given by \(\mathbb{E}[W] = \frac{1}{\lambda}\).
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 指数分布中的参数 \(\lambda\) 代表了**需求率**；也就是说，需求事件发生的速度。**平均需求**由 \(\mathbb{E}[W] = \frac{1}{\lambda}\)
    给出。
- en: '![](../Images/5e01bed964a795f0c6416d9bed0135c6.png)'
  id: totrans-23
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/5e01bed964a795f0c6416d9bed0135c6.png)'
- en: Image by Author
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: We can observe from the **Probability Density Function** (PDF) of the Exponential
    distribution that higher values of demand \(W\) become less likely. Thus, the
    Exponential distribution serves as an appropriate choice for demand modeling.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以从指数分布的**概率密度函数**（PDF）中观察到，需求 \(W\) 的较高值变得不太可能。因此，指数分布是需求建模的一个合适选择。
- en: Sequential Decision Formulation
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 顺序决策表述
- en: We formulate the inventory control problem as sequential decision process under
    uncertainty. The goal is to maximize total expected profit over a finite time
    horizon \( N \), while learning unknown demand rate by applying Bayesian Learning
    principals.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将库存控制问题表述为在不确定性下的顺序决策过程。目标是最大化在有限时间范围 \( N \) 内的总期望利润，同时通过应用贝叶斯学习原理来学习未知的需求率。
- en: We define a model with an initial state and a probabilistic model that represents
    its belief about future states over time. At each time step, the model makes a
    decision based on a policy that maps its current belief to an action. The goal
    is to find the **optimal policy** that maximizes a predefined reward function.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 我们定义了一个具有初始状态和随时间变化的概率模型，该模型代表其对未来状态的信念。在每一个时间步，模型根据将当前信念映射到行动的策略做出决策。目标是找到**最优策略**，以最大化预定义的奖励函数。
- en: After taking an action, the model observes the resulting state and updates its
    belief, accordingly, continuing this cycle of decision, observation, and belief
    update.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 在采取行动后，模型观察到的结果状态并相应地更新其信念，从而继续这一决策、观察和信念更新的循环。
- en: '![](../Images/f5538e95b8cf29c5ad4995cf1a0b1010.png)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f5538e95b8cf29c5ad4995cf1a0b1010.png)'
- en: 1) State Variable
  id: totrans-31
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1) 状态变量
- en: 'We model demand in each period as a random variable drawn from an Exponential
    distribution with an unknown rate parameter λ. Since \( \lambda \) is not directly
    observable, we encode our uncertainty about its value using a Gamma prior:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在每个期间将需求建模为一个从具有未知速率参数 \(\lambda\) 的指数分布中抽取的随机变量。由于 \(\lambda\) 不能直接观察到，我们使用伽马先验来编码对其值的不确定性：
- en: \[
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \lambda \sim \mathrm{Gamma}(a_0, b_0)
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: \lambda \sim \mathrm{Gamma}(a_0, b_0)
- en: \]
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: The parameters \( a_0 \) and \( b_0 \) define the shape and rate of our initial
    belief about the demand rate. These two parameters serve as our **state variables**.
    At each time step, they summarize all past information and are updated as new
    demand observations become available.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 参数 \( a_0 \) 和 \( b_0 \) 定义了我们对于需求率的初始信念的形状和速率。这两个参数作为我们的**状态变量**。在每一个时间步，它们总结所有过去的信息，并在新的需求观察数据可用时进行更新。
- en: As we collect more data, the posterior distribution over \(lambda\) evolves
    from a wide and uncertain shape to a narrower and more confident one, gradually
    concentrating around the true demand rate.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 随着我们收集更多的数据，关于 \(\lambda\) 的后验分布从宽泛且不确定的形状逐渐变为更窄且更自信的形状，逐渐集中在真实的需求率周围。
- en: 'This process is captured naturally by the Gamma distribution, which flexibly
    adjusts its shape based on the amount of information we’ve seen. Early on, the
    distribution is diffuse, signaling high uncertainty. As observations accumulate,
    the belief becomes sharper, allowing for more reliable and responsive decision-making.
    Probability Density Function (PDF) of Gamma distribution can be seen below:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 这个过程自然地被伽马分布所捕捉，它可以根据我们所看到的信息量灵活调整其形状。一开始，分布是扩散的，表明高度的不确定性。随着观察数据的积累，信念变得更加清晰，允许做出更可靠和响应迅速的决策。伽马分布的概率密度函数（PDF）如下所示：
- en: '![](../Images/69abd36df2ace42310472c53d9f6bc7e.png)'
  id: totrans-39
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/69abd36df2ace42310472c53d9f6bc7e.png)'
- en: Image by Author
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: We will later define a **transition function** that updates the state, that
    is, how \( (a_n, b_n) \) evolves to \( (a_{n+1}, b_{n+1}) \), based on newly observed
    data. This allows the model to continuously refine its belief about demand and
    make more informed inventory decisions over time.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将后来定义一个**转移函数**，该函数根据新的观测数据更新状态，即 \( (a_n, b_n) \) 如何演变到 \( (a_{n+1}, b_{n+1})
    \)，这允许模型持续改进其对需求的信念，并在时间上做出更明智的库存决策。
- en: 'Note that expected value of the Gamma distribution is defined as:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，伽马分布的期望值定义为：
- en: \[
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \mathbb{E}[\lambda] = \frac{a}{b}
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: \mathbb{E}[\lambda] = \frac{a}{b}
- en: \]
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: 2) Decision Variable
  id: totrans-46
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2) 决策变量
- en: 'The **decision variable** at time \( n \) is the stocking level:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 时间 \( n \) 的**决策变量**是库存水平：
- en: \[
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: x_n \in \mathbb{R}_+
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: x_n \in \mathbb{R}_+
- en: \]
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: This is the number of units to order before demand \( W_{n+1} \) is realized.
    The decision depends only on the current belief \( (a_n, b_n) \).
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 这是需求 \( W_{n+1} \) 实现之前需要订购的单位数量。该决策仅取决于当前的信念 \( (a_n, b_n) \)。
- en: 3) Exogenous Information
  id: totrans-52
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3) 外生信息
- en: 'After selecting \( x_n \), demand \( W_{n+1} \) is revealed:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 在选择 \( x_n \) 后，需求 \( W_{n+1} \) 被揭示：
- en: \[
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: W_{n+1} \sim \text{Exp}(\lambda)
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: W_{n+1} \sim \text{Exp}(\lambda)
- en: \]
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: 'Since \( \lambda \) is unknown, demand is random. Observations are:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 由于 \( \lambda \) 是未知的，需求是随机的。观测值如下：
- en: '**Uncensored** if \( W_{n+1} < x_n \) (we observe the actual demand)'
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**未截断**如果 \( W_{n+1} < x_n \)（我们观察到实际需求）'
- en: '**Censored** if \( W_{n+1} \ge x_n \) (we only know demand exceeding supply
    levels)'
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**截断**如果 \( W_{n+1} \ge x_n \)（我们只知道需求超过供应水平）'
- en: This censoring limits the information available for belief updating. Even though
    the full demand isn’t observed, the censored observation still carries valuable
    information and should not be ignored in our modeling approach.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 这种截断限制了可用于信念更新的信息。即使没有观察到完整的需求，截断观测仍然携带有价值的信息，并且不应在我们的建模方法中被忽视。
- en: 4) Transition Function
  id: totrans-61
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4) 转移函数
- en: The transition function defines how the model’s belief, represented by the state
    variables, is updated over time. It maps the prior state to the expected future
    state, and in our case, this update is governed by Bayesian learning.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 转移函数定义了模型信念（由状态变量表示）随时间更新的方式。它将先验状态映射到预期的未来状态，在我们的情况下，这种更新由贝叶斯学习控制。
- en: Bayesian Uncertainty Modelling
  id: totrans-63
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 贝叶斯不确定性建模
- en: Bayes’ theorem combines prior belief with observed data to form a posterior
    distribution. This updated distribution reflects both prior knowledge and the
    newly observed information.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 贝叶斯定理将先验信念与观察数据相结合，形成后验分布。这个更新的分布反映了先验知识和新观察到的信息。
- en: \[
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: p_{n+1}(\lambda \mid w_{n+1}) = \frac{p(w_{n+1} \mid \lambda) \cdot p_n(\lambda)}{p(w_{n+1})}
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: p_{n+1}(\lambda \mid w_{n+1}) = \frac{p(w_{n+1} \mid \lambda) \cdot p_n(\lambda)}{p(w_{n+1})}
- en: \]
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: 'Where:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 其中：
- en: \[
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: 'p(w_{n+1} \mid \lambda) : \text{ Likelihood of new observation at time } n+1'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 'p(w_{n+1} \mid \lambda) : \text{在时间 } n+1 \text{ 的新观测值的似然性}'
- en: \]
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: \[
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: 'p_n(\lambda) : \text{ Prior at time } n'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 'p_n(\lambda) : \text{时间 } n \text{ 的先验分布}'
- en: \] \[
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: \] \[
- en: 'p(w_{n+1}) : \text{ Marginal likelihood (normalizing constant) at time } n+1'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 'p(w_{n+1}) : \text{在时间 } n+1 \text{ 的边际似然性（归一化常数）}'
- en: \] \[
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: \] \[
- en: 'p_{n+1}(\lambda \mid w_{n+1}) : \text{ Posterior after observing } w_{n+1}'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 'p_{n+1}(\lambda \mid w_{n+1}) : \text{观察 } w_{n+1} \text{ 后的后验分布}'
- en: \]
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: We set up our problem such that in each period, demand W is drawn from an Exponential
    distribution. Prior belief over λ will be modelled using a Gamma distribution.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 我们设定问题，使得在每个周期，需求 \( W \) 从指数分布中抽取。对 \( \lambda \) 的先验信念将使用伽马分布来建模。
- en: \[
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: p_{n+1}(\lambda \mid w_{n+1})
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: p_{n+1}(\lambda \mid w_{n+1})
- en: '='
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: '='
- en: \frac{
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: \frac{
- en: \underbrace{\lambda e^{-\lambda w_{n+1}}}_{\text{Likelihood}}
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: \underbrace{\lambda e^{-\lambda w_{n+1}}}_{\text{似然性}}
- en: \cdot
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: \cdot
- en: \underbrace{\frac{b_n^{a_n}}{\Gamma(a_n)} \lambda^{a_n – 1} e^{-b_n \lambda}}_{\text{Prior
    (Gamma)}}
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: \underbrace{\frac{b_n^{a_n}}{\Gamma(a_n)} \lambda^{a_n – 1} e^{-b_n \lambda}}_{\text{先验（伽马分布）}}
- en: '}{'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: '}{'
- en: \underbrace{
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: \underbrace{
- en: \int_0^\infty \lambda e^{-\lambda w_{n+1}} \cdot \frac{b_n^{a_n}}{\Gamma(a_n)}
    \lambda^{a_n – 1} e^{-b_n \lambda} \, d\lambda
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: \int_0^\infty \lambda e^{-\lambda w_{n+1}} \cdot \frac{b_n^{a_n}}{\Gamma(a_n)}
    \lambda^{a_n – 1} e^{-b_n \lambda} \, d\lambda
- en: '}_{\text{Marginal (evidence)}}'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: '}_{\text{边际（证据）}}'
- en: '}'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: '}'
- en: \]
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: The Gamma and Exponential distributions form a well-known **conjugate prior**
    in Bayesian statistics. When using a Gamma prior and an Exponential likelihood,
    the resulting posterior is also a Gamma distribution. This property of the prior
    and posterior belonging to the same distributional family is what defines a conjugate
    prior. Posterior also belongs to the Gamma family; a property that simplifies
    Bayesian updating significantly.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 高斯分布和指数分布是贝叶斯统计中一个著名的**共轭先验**。当使用高斯先验和指数似然时，得到的后验也是一个高斯分布。先验和后验属于同一分布族的性质定义了共轭先验。后验也属于高斯族；这是一个显著简化贝叶斯更新的性质。
- en: 'For reference, closed-form conjugate updates like this can be found in standard
    conjugate prior tables, such as the one on [Wikipedia](https://en.wikipedia.org/wiki/Conjugate_prior).
    Using this reference, we can formulate the posterior as:'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 为了参考，可以找到类似的标准共轭先验表中的封闭形式共轭更新，例如[维基百科](https://en.wikipedia.org/wiki/Conjugate_prior)上的那个。使用这个参考，我们可以将后验表示为：
- en: 'Let:'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 'Let:'
- en: \[
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \lambda \mid w_1, \dots, w_n \sim \mathrm{Gamma}\left(a_0 + n,\ b_0 + \sum_{i=1}^n
    w_i\right)
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: \(\lambda \mid w_1, \dots, w_n \sim \mathrm{Gamma}\left(a_0 + n,\ b_0 + \sum_{i=1}^n
    w_i\right)\)
- en: \]
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: \[
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: '\lambda \sim \mathrm{Gamma}(a_0, b_0) \quad : \text{ Prior}'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: '\(\lambda \sim \mathrm{Gamma}(a_0, b_0)\) \quad : \text{ 先验}'
- en: \]
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: \[
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: 'w \sim \mathrm{Exp}(\lambda) \quad : \text{ Likelihood}'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: '\( w \sim \mathrm{Exp}(\lambda) \quad : \text{ 似然}\)'
- en: \]
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: 'For *n* independent observations \( w_1, \dots, w_n \), the Gamma prior and
    Exponential likelihood result in a Gamma posterior:'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 对于 *n* 个独立的观察 \( w_1, \dots, w_n \)，高斯先验和指数似然导致高斯后验：
- en: 'After observing a single (uncensored) demand \( w \), the posterior simplifies
    to below by leveraging conjugate priors:'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 在观察到单个（未过滤）需求 \( w \) 后，通过利用共轭先验，后验简化为以下内容：
- en: \[
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \lambda \mid w \sim \mathrm{Gamma}(a_0 + 1,\ b_0 + w)
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: \(\lambda \mid w \sim \mathrm{Gamma}(a_0 + 1,\ b_0 + w)\)
- en: \]
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: The shape parameter increases by **1** because one new data point has been observed.
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 形状参数增加**1**，因为已经观察到一个新的数据点。
- en: The rate parameter increases by **\( w \)** because the Exponential likelihood
    includes the term \( e^{-\lambda w} \), which combines with the prior’s exponential
    term and adds to the total exponent.
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 速率参数增加**\( w \)**，因为指数似然包括 \( e^{-\lambda w} \) 这一项，它与先验的指数项结合并加到总指数上。
- en: The Update Function
  id: totrans-112
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 更新函数
- en: 'The posterior parameters (state variables) are updated based on the nature
    of the observation:'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 后验参数（状态变量）根据观察的性质进行更新：
- en: '**Uncensored** (\( W_{n+1} < x_n \)):'
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**未过滤** (\( W_{n+1} < x_n \)):'
- en: \[
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: a_{n+1} = a_n + 1, \quad b_{n+1} = b_n + W_{n+1}
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: a_{n+1} = a_n + 1, \quad b_{n+1} = b_n + W_{n+1}
- en: \]
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: '**Censored** (\( W_{n+1} \ge x_n \)):'
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**过滤** (\( W_{n+1} \ge x_n \)):'
- en: \[
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: a_{n+1} = a_n, \quad b_{n+1} = b_n + x_{n}
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: \( a_{n+1} = a_n, \quad b_{n+1} = b_n + x_{n} \)
- en: \]
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: These updates reflect how each observation, full or partial, informs the posterior
    belief over \( \lambda \).
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 这些更新反映了每个观察（完整或部分）如何影响对 \( \lambda \) 的后验信念。
- en: 'We can define the transition function in Python as below:'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以在Python中将转移函数定义为以下内容：
- en: '[PRE0]'
  id: totrans-124
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 5) Objective Function
  id: totrans-125
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5) 目标函数
- en: The model seeks a policy \( \pi \), mapping beliefs to stocking decisions in
    order to maximize total expected profit.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 模型寻求一个策略 \( \pi \)，将信念映射到库存决策，以最大化总预期利润。
- en: 'Profit from ordering \( x_n \) units and facing demand \( W_{n+1} \):'
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 订购 \( x_n \) 单位并面对需求 \( W_{n+1} \) 的利润：
- en: \[
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: F(x_n, W_{n+1}) = p \cdot \min(x_n, W_{n+1}) – c \cdot x_n
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: \( F(x_n, W_{n+1}) = p \cdot \min(x_n, W_{n+1}) – c \cdot x_n \)
- en: \]
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: 'The cumulative objective is:'
  id: totrans-131
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 累积目标函数为：
- en: \[
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \max_\pi \mathbb{E} \left[ \sum_{n=0}^{N-1} F(x_n, W_{n+1}) \right]
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: \(\max_\pi \mathbb{E} \left[ \sum_{n=0}^{N-1} F(x_n, W_{n+1}) \right]\)
- en: \]
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: \( \pi \) maps \( (a_n, b_n) \) to \( x_n \)
  id: totrans-135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: \( \pi \) 将 \( (a_n, b_n) \) 映射到 \( x_n \)
- en: \( p \) is the selling price per unit sold
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: \( p \) 是每单位销售的售价
- en: \( c \) is the unit cost of ordering
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: \( c \) 是订购的单位成本
- en: Unsold units are discarded with no salvage value
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 未售出的单位没有回收价值
- en: Note that this objective function maximizes only the expected immediate reward
    across the entire time horizon. In the next section, we introduce an expanded
    version that incorporates the value of future learning. This encourages the model
    to explore, accounting for the information that censored demand can reveal over
    time.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，这个目标函数仅在整个时间范围内最大化预期的即时奖励。在下一节中，我们将介绍一个扩展版本，该版本结合了未来学习的价值。这鼓励模型进行探索，考虑到过滤需求随时间可能揭示的信息。
- en: 'We can define the profit function in Python as below:'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以在Python中将利润函数定义为以下内容：
- en: '[PRE1]'
  id: totrans-141
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Policy Functions
  id: totrans-142
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 政策函数
- en: We will define several policy functions as defined by Negoescu et al, which
    will update the value of \(x_{n+1}\) (stocking level) based on our current belief
    of the state \((a_{n}, b_{n})\).
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将定义几个策略函数，如Negoescu等人所定义，这些函数将根据我们对当前状态 \((a_{n}, b_{n})\) 的信念更新 \(x_{n+1}\)（库存水平）的值。
- en: 1) Point Estimate Policy
  id: totrans-144
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1) 点估计策略
- en: Under this policy, model estimates the unknown demand rate \(\lambda\) using
    the current posterior and chooses and order quantity \( x_{n+1} \) to maximize
    the immediate expected profit.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 在此策略下，模型使用当前后验估计未知的需求率 \(\lambda\)，并选择一个订单数量 \( x_{n+1} \) 以最大化即时预期利润。
- en: 'At time \(n\), current posterior about \(\lambda ~ Gamma(a_{n}, b_{n})\) is:'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 在时间 \(n\)，关于 \(\lambda ~ Gamma(a_{n}, b_{n})\) 的当前后验概率是：
- en: \[
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \hat{\lambda}_n = \frac{a_n}{b_n}
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: \hat{\lambda}_n = \frac{a_n}{b_n}
- en: \]
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: We treat this estimate as the “true” value of \(\lambda\) and assume demand
    \(W \sim \text{Exp}(\hat{\lambda}_n)\).
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将这个估计视为“真实”的 \(\lambda\) 值，并假设需求 \(W \sim \text{Exp}(\hat{\lambda}_n)\)。
- en: Expected Value
  id: totrans-151
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 期望值
- en: 'The profit for order quantity \(x\) and realized demand \(W\) is:'
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 订单数量 \(x\) 和实际需求 \(W\) 的利润为：
- en: \[
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: F(x, W) = p \cdot \min(x, W) – c \cdot x
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: F(x, W) = p \cdot \min(x, W) – c \cdot x
- en: \]
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: We seek to maximize the expected profit.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 我们寻求最大化预期利润。
- en: \[
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \max_{x \geq 0} \quad \mathbb{E}_W \left[ p \min(x, W) – c x \right]
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: \max_{x \geq 0} \quad \mathbb{E}_W \left[ p \min(x, W) – c x \right]
- en: \]
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: 'Expected value of a random variable is:'
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 随机变量的期望值是：
- en: \[
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \mathbb{E}[X] = \int_{-\infty}^{\infty} x \cdot f(x) \, dx
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: \mathbb{E}[X] = \int_{-\infty}^{\infty} x \cdot f(x) \, dx
- en: \]
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: 'Thus, the objective function can be written as:'
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，目标函数可以写成：
- en: \[
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \max_{x \geq 0} \left[ p \left( \int_0^x w f_W(w) \, dw + x \int_x^\infty f_W(w)
    \, dw \right) – c x \right]
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: \max_{x \geq 0} \left[ p \left( \int_0^x w f_W(w) \, dw + x \int_x^\infty f_W(w)
    \, dw \right) – c x \right]
- en: \]
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: 'Where:'
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 'Where:'
- en: '\(f_W(x)\): Probability density function (PDF) of demand evaluated at \(x\)'
  id: totrans-169
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: \(f_W(x)\)：在 \(x\) 处评估的需求的概率密度函数（PDF）
- en: 'PDF of \(Exponential(\lambda)\) is:'
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 指数分布 \(Exponential(\lambda)\) 的概率密度函数（PDF）是：
- en: \[
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: f_W(w) = \hat{\lambda}_n e^{-\hat{\lambda}_n w}
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: f_W(w) = \hat{\lambda}_n e^{-\hat{\lambda}_n w}
- en: \]
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: 'This can be solved as:'
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 这可以通过以下方式解决：
- en: \[
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \mathbb{E}[F(x, W)] = p \cdot \frac{1 – e^{-\hat{\lambda}_n x}}{\hat{\lambda}_n}
    – c x
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: \mathbb{E}[F(x, W)] = p \cdot \frac{1 – e^{-\hat{\lambda}_n x}}{\hat{\lambda}_n}
    – c x
- en: \]
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: First Order Optimality Condition
  id: totrans-178
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 一阶最优性条件
- en: 'We set the derivative of the expected profit function to zero, and solve for
    \(x\) to find the stocking value which maximize the expected profit:'
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将预期利润函数的导数设为零，并解出 \(x\) 以找到最大化预期利润的库存值：
- en: \[
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \frac{d}{dx} \mathbb{E}[F(x, W)] = p e^{-\hat{\lambda}_n x} – c = 0
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: \frac{d}{dx} \mathbb{E}[F(x, W)] = p e^{-\hat{\lambda}_n x} – c = 0
- en: \]
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: \[
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: e^{-\hat{\lambda}_n x^*} = \frac{c}{p}
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: e^{-\hat{\lambda}_n x^*} = \frac{c}{p}
- en: \quad \Rightarrow \quad
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: \quad \Rightarrow \quad
- en: x^* = \frac{1}{\hat{\lambda}_n} \log\left( \frac{p}{c} \right)
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: x^* = \frac{1}{\hat{\lambda}_n} \log\left( \frac{p}{c} \right)
- en: \]
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: 'Substitute \(\hat{\lambda}_n = \frac{a_n}{b_n}\):'
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 将 \(\hat{\lambda}_n = \frac{a_n}{b_n}\) 代入：
- en: \[
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: x_n = \frac{b_n}{a_n} \log\left( \frac{p}{c} \right)
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: x_n = \frac{b_n}{a_n} \log\left( \frac{p}{c} \right)
- en: \]
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: 'Python implementation:'
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: Python实现：
- en: '[PRE2]'
  id: totrans-193
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 2) Distribution Policy
  id: totrans-194
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2) 分配策略
- en: The Distribution Policy optimizes the expected immediate profit by integrating
    over the entire current belief distribution of the demand rate \(\lambda\). Unlike
    the Point Estimate Policy, it does not collapse the posterior to a single value.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 分配策略通过在整个当前需求率 \(\lambda\) 的信念分布上积分来优化预期即时利润。与点估计策略不同，它不会将后验概率合并为一个单一值。
- en: 'At time \(n\), the belief about \(\lambda\) is:'
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: 在时间 \(n\)，关于 \(\lambda\) 的信念是：
- en: \[
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \lambda \sim \text{Gamma}(a_n, b_n)
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: \lambda \sim \text{Gamma}(a_n, b_n)
- en: \]
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: 'Demand is modelled as:'
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 需求被建模为：
- en: \[
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: W \sim \text{Exp}(\lambda)
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: W \sim \text{Exp}(\lambda)
- en: \]
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: This policy chooses order quantity \(x_{n}\) by maximizing the expected immediate
    profit, averaged over both the uncertainty in demand and the uncertainty in \(\lambda\)
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 这种策略通过最大化预期即时利润，并平均考虑需求的不确定性和 \(\lambda\) 的不确定性来选择订单数量 \(x_{n}\)。
- en: \[
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: x_n = \arg\max_{x \ge 0} \ \mathbb{E}_{\lambda \sim \text{Gamma}(a_n, b_n)}
    \left[ \mathbb{E}_{W \sim \text{Exp}(\lambda)} \left[ p \cdot \min(x, W) – c x
    \right] \right]
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: x_n = \arg\max_{x \ge 0} \ \mathbb{E}_{\lambda \sim \text{Gamma}(a_n, b_n)}
    \left[ \mathbb{E}_{W \sim \text{Exp}(\lambda)} \left[ p \cdot \min(x, W) – c x
    \right] \right]
- en: \]
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: This is the expected immediate profit, averaged over both the uncertainty in
    demand **and** the uncertainty in \(\lambda\).
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 这是平均考虑需求的不确定性和 \(\lambda\) 的不确定性的预期即时利润。
- en: Expected Value
  id: totrans-209
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 期望值
- en: 'From the previous policy, we know that:'
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 从先前的策略中，我们知道：
- en: \[
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \mathbb{E}_W[\min(x, W)] = \frac{1 – e^{-\hat{\lambda}_n x}}{\hat{\lambda}_n}
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: \mathbb{E}_W[\min(x, W)] = \frac{1 – e^{-\hat{\lambda}_n x}}{\hat{\lambda}_n}
- en: \]
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: 'Thus:'
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 因此：
- en: \[
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \mathbb{E}_{\lambda} \left[ \mathbb{E}_{W \mid \lambda}[\min(x, W)] \right]
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: \mathbb{E}_{\lambda} \left[ \mathbb{E}_{W \mid \lambda}[\min(x, W)] \right]
- en: = \mathbb{E}_{\lambda} \left[ \frac{1 – e^{-\lambda x}}{\lambda} \right]
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: = \mathbb{E}_{\lambda} \left[ \frac{1 – e^{-\lambda x}}{\lambda} \right]
- en: \]
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: 'If we denote the Gamma density as:'
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们用伽马密度表示：
- en: \[
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: f(\lambda) = \frac{b^a}{\Gamma(a)} \lambda^{a – 1} e^{-b \lambda}
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: f(\lambda) = \frac{b^a}{\Gamma(a)} \lambda^{a – 1} e^{-b \lambda}
- en: \]
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: 'Then expectation becomes:'
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，期望变为：
- en: \[
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \mathbb{E}_\lambda \left[ \frac{1 – e^{-\lambda x}}{\lambda} \right]
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: \mathbb{E}_\lambda \left[ \frac{1 – e^{-\lambda x}}{\lambda} \right]
- en: =\int_0^\infty \frac{1 – e^{-\lambda x}}{\lambda} f(\lambda) \, d\lambda
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: =\int_0^\infty \frac{1 – e^{-\lambda x}}{\lambda} f(\lambda) \, d\lambda
- en: = \frac{b^a}{\Gamma(a)} \int_0^\infty (1 – e^{-\lambda x}) \lambda^{a – 2} e^{-b
    \lambda} \, d\lambda
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: = \frac{b^a}{\Gamma(a)} \int_0^\infty (1 – e^{-\lambda x}) \lambda^{a – 2} e^{-b
    \lambda} \, d\lambda
- en: \]
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: 'Without going over the full proof, expectation becomes:'
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 不展开完整的证明，期望变为：
- en: \[
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \mathbb{E}[\text{Profit}] = p \cdot \mathbb{E}_{\lambda} \left[ \frac{1 – e^{-\lambda
    x}}{\lambda} \right] – c x
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: \mathbb{E}[\text{利润}] = p \cdot \mathbb{E}_{\lambda} \left[ \frac{1 – e^{-\lambda
    x}}{\lambda} \right] – c x
- en: = p \cdot \frac{b}{a – 1} \left(1 – \left( \frac{b}{b + x} \right)^{a – 1} \right)
    – c x
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: = p \cdot \frac{b}{a – 1} \left(1 – \left( \frac{b}{b + x} \right)^{a – 1} \right)
    – c x
- en: \]
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: First Order Optimality Condition
  id: totrans-234
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 首阶最优条件
- en: 'Again, we set the derivative of the expected profit function to zero, and solve
    for \(x\) to find the stocking value which maximize the expected profit:'
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 再次，我们将期望利润函数的导数设为零，求解 \(x\) 以找到最大化期望利润的库存价值：
- en: \[
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \frac{d}{dx} \mathbb{E}[\text{Profit}]
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: \frac{d}{dx} \mathbb{E}[\text{利润}]
- en: = \frac{d}{dx} \left[ p \cdot \frac{b}{a – 1} \left(1 – \left( \frac{b}{b +
    x} \right)^{a – 1} \right) – c x \right] = 0
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: = \frac{d}{dx} \left[ p \cdot \frac{b}{a – 1} \left(1 – \left( \frac{b}{b +
    x} \right)^{a – 1} \right) – c x \right] = 0
- en: \]
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: 'Without going over the proof, closed form expresion based on Negoescu et al’s
    paper is:'
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 不展开证明，基于 Negoescu 等人的论文的闭式表达式为：
- en: \[
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: x_n = b_n \left( \left( \frac{p}{c} \right)^{1/a_n} – 1 \right)
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: x_n = b_n \left( \left( \frac{p}{c} \right)^{1/a_n} – 1 \right)
- en: \]
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: 'Python implementation:'
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: Python 实现：
- en: '[PRE3]'
  id: totrans-245
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Knowledge Gradient (KG) Policy
  id: totrans-246
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 知识梯度（KG）策略
- en: The Knowledge Gradient (KG) policy is a Bayesian learning policy that balances
    *exploitation* (maximizing immediate profit) and *exploration* (ordering to gain
    information about demand for future decisions).
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 知识梯度（KG）策略是一种贝叶斯学习策略，它平衡了 *利用*（最大化即时利润）和 *探索*（订购以获取关于未来决策需求的信息）。
- en: 'Instead of just maximizing today’s profit, KG chooses the order quantity that
    maximizes:'
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: KG策略不是仅仅最大化今天的利润，而是选择一个订单量，以最大化：
- en: '**Profit now + Value of information gained for the future**'
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: '**当前利润 + 未来获得的信息价值**'
- en: \[
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: x_n = \arg\max_x \ \mathbb{E}\left[ p \cdot \min(x, W_{n+1}) – c x + V(a_{n+1},
    b_{n+1}) \mid a_n, b_n, x \right]
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
  zh: x_n = \arg\max_x \ \mathbb{E}\left[ p \cdot \min(x, W_{n+1}) – c x + V(a_{n+1},
    b_{n+1}) \mid a_n, b_n, x \right]
- en: \]
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: 'Where:'
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 其中：
- en: \(W_{n+1} \sim \text{Exp}(\lambda)\) (with \(\lambda \sim \text{Gamma}(a_n,
    b_n)\))
  id: totrans-254
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: \(W_{n+1} \sim \text{Exp}(\lambda)\) (with \(\lambda \sim \text{Gamma}(a_n,
    b_n)\))
- en: \(V(a_{n+1}, b_{n+1})\) is the value of expected future profits under updated
    beliefs after observing \(W_{n+1}\)
  id: totrans-255
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: \(V(a_{n+1}, b_{n+1})\) 是在观察 \(W_{n+1}\) 后更新信念下的预期未来利润的价值
- en: We do not know \(a_{n+1}, b_{n+1}\) at time \(n\) because we haven’t yet observed
    demand. So, we compute their expected value under the possible observation outcomes
    (censored vs uncensored).
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 在时间 \(n\)，我们不知道 \(a_{n+1}, b_{n+1}\)，因为我们还没有观察到需求。因此，我们根据可能的观察结果（截尾与非截尾）计算它们的期望值。
- en: 'The KG policy then evaluates each candidate stocking quantity \(x\) by:'
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
  zh: 知识梯度（KG）策略随后评估每个候选库存量 \(x\)：
- en: Simulating its effect on posterior beliefs
  id: totrans-258
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模拟其对后验信念的影响
- en: Computing the immediate profit
  id: totrans-259
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 计算即时利润
- en: Computing the value of future learning based on belief updates
  id: totrans-260
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 基于信念更新计算未来学习价值
- en: Objective Function
  id: totrans-261
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 目标函数
- en: 'We define the total value of choosing \(x\) at time \(n\) as:'
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 我们定义在时间 \(n\) 选择 \(x\) 的总价值为：
- en: \[
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: F_{\text{KG}}(x) = \underbrace{\mathbb{E}[p \cdot \min(x, W) – c x]}_{\text{Immediate
    profit}} + \underbrace{(N – n) \cdot \mathbb{E}_{\text{posterior}} \left[ \max_{x’}
    \mathbb{E}_{\lambda \sim \text{posterior}}[ p \cdot \min(x’, W) – c x’ ] \right]}_{\text{Value
    of learning}}
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: F_{\text{KG}}(x) = \underbrace{\mathbb{E}[p \cdot \min(x, W) – c x]}_{\text{即时利润}}
    + \underbrace{(N – n) \cdot \mathbb{E}_{\text{posterior}} \left[ \max_{x’} \mathbb{E}_{\lambda
    \sim \text{posterior}}[ p \cdot \min(x’， W) – c x’ ] \right]}_{\text{学习价值}}
- en: \]
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: The first term is just expected immediate profit.
  id: totrans-266
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第一项只是预期即时利润。
- en: The second term accounts for how this choice improves future profit by sharpening
    our belief about \(\lambda\).
  id: totrans-267
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第二项解释了这种选择如何通过加强我们对 \(\lambda\) 的信念来提高未来的利润。
- en: 'Horizon Factor \((N-n)\): We will make \((N-n)\) more decisions in the future.
    So the value of better decisions due to learning today gets multiplied by this
    factor.'
  id: totrans-268
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '预期时间因子 \((N-n)\): 我们将在未来做出 \((N-n)\) 个更多决策。因此，由于今天的学习而做出的更好决策的价值将乘以这个因子。'
- en: 'Posterior Averaging \(\mathbb{E}_{\text{posterior}}[⋅]\): This means we are
    averaging over all the possible posterior beliefs we might end up with after observing
    the outcome of demand; because demand is random and possibly censored, we won’t
    get perfect information, but we will update our belief.'
  id: totrans-269
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '后验平均 \(\mathbb{E}_{\text{posterior}}[⋅]\): 这意味着我们在观察需求结果后可能得到的所有可能的后验信念上进行平均；因为需求是随机的，可能被截断，我们不会得到完美的信息，但我们会更新我们的信念。'
- en: 'The paper uses previously discussed Distribution Policy as proxy for estimating
    the Future Value function. Thus:'
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: 论文使用之前讨论的分配策略作为估计未来价值函数的代理。因此：
- en: \[
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: x^*(a, b) = V(a, b) = \frac{b p}{a – 1} \left( 1 – \left( \frac{b}{b + x^*}
    \right)^{a – 1} \right) – c x^* = b \left( \left( \frac{p}{c} \right)^{1/a} –
    1 \right)
  id: totrans-272
  prefs: []
  type: TYPE_NORMAL
  zh: x^*(a, b) = V(a, b) = \frac{b p}{a – 1} \left( 1 – \left( \frac{b}{b + x^*}
    \right)^{a – 1} \right) – c x^* = b \left( \left( \frac{p}{c} \right)^{1/a} –
    1 \right)
- en: \]
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: Expected Value
  id: totrans-274
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 期望值
- en: Expected value of \(V\) is expressed as below per Negoescu et al. As the proof
    of this equation is quite complex, we’ll not be going over the details.
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: 根据 Negoescu 等人的表述，\(V\) 的期望值如下。由于这个方程的证明相当复杂，我们不会深入探讨细节。
- en: \[
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \begin{align*}
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: \begin{align*}
- en: \mathbb{E}[V] &= \mathbb{E} \left[ \mathbb{E} \left[ b^{n+1} \left( \frac{p}{a^{n+1}
    – 1} \left( 1 – \left( \frac{c}{p} \right)^{1 – \frac{1}{a^{n+1}}} \right) – c
    \left( \left( \frac{c}{p} \right)^{-\frac{1}{a^{n+1}}} – 1 \right) \right) \Big|
    \lambda \right] \Big| a^n, b^n, x^n \right] \\
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: \mathbb{E}[V] &= \mathbb{E} \left[ \mathbb{E} \left[ b^{n+1} \left( \frac{p}{a^{n+1}
    – 1} \left( 1 – \left( \frac{c}{p} \right)^{1 – \frac{1}{a^{n+1}}} \right) – c
    \left( \left( \frac{c}{p} \right)^{-\frac{1}{a^{n+1}}} – 1 \right) \right) \Big|
    \lambda \right] \Big| a^n, b^n, x^n \right] \\
- en: '&= \mathbb{E} \left[ \int_0^{x^n} \left( b^n + y \right) \left( \frac{p}{a^n}
    \left( 1 – \left( \frac{c}{p} \right)^{1 – \frac{1}{a^{n+1}}} \right) – c \left(
    \left( \frac{c}{p} \right)^{-\frac{1}{a^{n+1}}} – 1 \right) \right) \lambda e^{-\lambda
    y} \, dy \right. \\'
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
  zh: '&= \mathbb{E} \left[ \int_0^{x^n} \left( b^n + y \right) \left( \frac{p}{a^n}
    \left( 1 – \left( \frac{c}{p} \right)^{1 – \frac{1}{a^{n+1}}} \right) – c \left(
    \left( \frac{c}{p} \right)^{-\frac{1}{a^{n+1}}} – 1 \right) \right) \lambda e^{-\lambda
    y} \, dy \right. \\'
- en: '&\quad + \left. \int_{x^n}^{\infty} \left( b^n + x^n \right) \left( \frac{p}{a^n
    – 1} \left( 1 – \left( \frac{c}{p} \right)^{1 – \frac{1}{a^n}} \right) – c \left(
    \left( \frac{c}{p} \right)^{-\frac{1}{a^n}} – 1 \right) \right) \lambda e^{-\lambda
    y} \, dy \right].'
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: '&\quad + \left. \int_{x^n}^{\infty} \left( b^n + x^n \right) \left( \frac{p}{a^n
    – 1} \left( 1 – \left( \frac{c}{p} \right)^{1 – \frac{1}{a^n}} \right) – c \left(
    \left( \frac{c}{p} \right)^{-\frac{1}{a^n}} – 1 \right) \right) \lambda e^{-\lambda
    y} \, dy \right].'
- en: \end{align*}
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: \end{align*}
- en: \]
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: As we already know the expected value of the immediate profit function as described
    under previous policies, we can express the additive expected value of KG policy
    as summation. As this equation is quite long, we’ll not be going over the details,
    but it can be found in the paper.
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们已经知道在先前策略下描述的即时利润函数的期望值，我们可以将 KG 策略的加性期望值表示为求和。由于这个方程相当长，我们不会深入探讨细节，但它可以在论文中找到。
- en: First Order Optimality Condition
  id: totrans-284
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 一阶最优性条件
- en: 'In this policy as well, we set the derivative of the expected profit function
    to zero, and solve for \(x\) to find the stocking value which maximize the expected
    profit. Closed form solution of the equation based on the paper is:'
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个策略中，我们同样将期望利润函数的导数设为零，并求解 \(x\) 以找到最大化期望利润的库存价值。基于论文的方程的闭式解如下：
- en: \[
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: x_n = b_n \left[ \left( \frac{r}{1 + (N – n) \cdot \left( 1 + \frac{a_n r}{a_n
    – 1} – \frac{(a_n + 1) r}{a_n} \right)} \right)^{-1 / a_n} – 1 \right]
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: \(x_n = b_n \left[ \left( \frac{r}{1 + (N – n) \cdot \left( 1 + \frac{a_n r}{a_n
    – 1} – \frac{(a_n + 1) r}{a_n} \right)} \right)^{-1 / a_n} – 1 \right]
- en: \]
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: 'Where:'
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: 假设：
- en: '\(r = \frac{c}{p}\): Cost to price ratio'
  id: totrans-290
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '\(r = \frac{c}{p}\): 成本与价格比'
- en: 'Python implementation:'
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: Python 实现：
- en: '[PRE4]'
  id: totrans-292
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Monte Carlo Policy Evaluation
  id: totrans-293
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 蒙特卡洛策略评估
- en: To evaluate a policy \(\pi\) in a stochastic environment, we simulate its performance
    over multiple sample demand paths.
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
  zh: 为了评估一个策略 \(\pi\) 在随机环境中的性能，我们模拟其在多个样本需求路径上的表现。
- en: 'Let:'
  id: totrans-295
  prefs: []
  type: TYPE_NORMAL
  zh: 让：
- en: \(M\) be the number of independent simulations (demand paths), each denoted
    \(\omega^m\) for \(m = 1, 2, \dots, M\)
  id: totrans-296
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: \(M\) 为独立模拟（需求路径）的数量，每个用 \(\omega^m\) 表示，其中 \(m = 1, 2, \dots, M\)
- en: \(N\) be the time horizon
  id: totrans-297
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: \(N\) 为时间范围
- en: \(p_n(\omega^m)\) be the simulated price at time \(n\) on path \(m\)
  id: totrans-298
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: \(p_n(\omega^m)\) 是在路径 \(m\) 时刻模拟的价格
- en: \(x_n(\omega^m)\) be the decision taken at time \(n\) under policy \(\pi\) on
    path \(n\)
  id: totrans-299
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: \(x_n(\omega^m)\) 是在策略 \(\pi\) 下，在路径 \(n\) 时刻做出的决策
- en: Cumulative Reward on a Single Path
  id: totrans-300
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 单一路径上的累积奖励
- en: 'For each sample path \(\omega^m\), compute the total reward:'
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
  zh: 对于每个样本路径 \(\omega^m\)，计算总奖励：
- en: \[
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \hat{F}^\pi(\omega^m) = \sum_{n=0}^{N-1} \left[ p \cdot \min\left(x_n(\omega^m),
    W_{n+1}(\omega^m)\right) – c \cdot x_n(\omega^m) \right]
  id: totrans-303
  prefs: []
  type: TYPE_NORMAL
  zh: \hat{F}^\pi(\omega^m) = \sum_{n=0}^{N-1} \left[ p \cdot \min\left(x_n(\omega^m),
    W_{n+1}(\omega^m)\right) – c \cdot x_n(\omega^m) \right]
- en: \]
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: This represents the realized value of the policy \(\pi\) along that specific
    trajectory.
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
  zh: 这代表了沿特定轨迹的政策 \(\pi\) 的实现价值。
- en: 'Python implementation:'
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
  zh: Python 实现：
- en: '[PRE5]'
  id: totrans-307
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Estimate Expected Value by Averaging
  id: totrans-308
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 通过平均估计期望值
- en: 'The expected reward of policy \(\pi\) is approximated using the sample average
    across all \(M\) simulations:'
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: 政策 \(\pi\) 的期望奖励是通过对所有 \(M\) 次模拟的样本平均来近似的：
- en: \[
  id: totrans-310
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \bar{F}^\pi = \frac{1}{N} \sum_{m=1}^{N} \hat{F}^\pi(\omega^m)
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: \bar{F}^\pi = \frac{1}{N} \sum_{m=1}^{N} \hat{F}^\pi(\omega^m)
- en: \]
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: This \(\bar{F}^\pi\) is an unbiased estimator of the true expected reward under
    policy \(\pi\).
  id: totrans-313
  prefs: []
  type: TYPE_NORMAL
  zh: 这个 \(\bar{F}^\pi\) 是在政策 \(\pi\) 下真实期望奖励的无偏估计器。
- en: 'Python implementation:'
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
  zh: Python 实现：
- en: '[PRE6]'
  id: totrans-315
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: '[PRE7]'
  id: totrans-316
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: Results
  id: totrans-317
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 结果
- en: '![](../Images/07e9af7b0b271a13df74b468eea8340f.png)![](../Images/6fe7a0c3ba617f7e6ca977622248b666.png)'
  id: totrans-318
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/07e9af7b0b271a13df74b468eea8340f.png)![](../Images/6fe7a0c3ba617f7e6ca977622248b666.png)'
- en: The left plot shows how average cumulative profit evolves over time, while the
    right plot shows the average reward per time step. From this simulation, we observe
    that the Knowledge Gradient (KG) policy significantly outperforms the other two,
    as it optimizes not only immediate rewards but also the future value of cumulative
    rewards. Both the Point Estimate and Distribution policies perform similarly.
  id: totrans-319
  prefs: []
  type: TYPE_NORMAL
  zh: 左图显示了平均累积利润随时间的变化，而右图显示了每一步的平均奖励。从这个模拟中，我们可以观察到知识梯度（KG）策略显著优于其他两种策略，因为它不仅优化了即时奖励，还优化了累积奖励的未来价值。点估计和分布策略的表现相似。
- en: '![](../Images/eb4510c8291aa47188b22760cbe8d74f.png)'
  id: totrans-320
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/eb4510c8291aa47188b22760cbe8d74f.png)'
- en: We can observe from above plots that the Bayesian Learning algorithm gradually
    converges to the true mean demand \(W\).
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以从上面的图中观察到贝叶斯学习算法逐渐收敛到真实平均需求 \(W\)。
- en: These findings highlight the importance of incorporating the value of information
    in sequential decision making under uncertainty. While simpler heuristics like
    the Point Estimate and Distribution policies focus solely on immediate gains,
    the Knowledge Gradient policy leverages future learning potential, yielding superior
    long-term performance.
  id: totrans-322
  prefs: []
  type: TYPE_NORMAL
  zh: 这些发现突出了在不确定性下的顺序决策中纳入信息价值的重要性。虽然像点估计和分布策略这样的简单启发式方法只关注即时收益，但知识梯度策略利用了未来的学习潜力，从而实现了更优越的长期性能。
