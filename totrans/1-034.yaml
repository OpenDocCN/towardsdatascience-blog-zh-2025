- en: The Machine Learning Lessons I’ve Learned This Month
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 本月我学到的机器学习经验教训
- en: 原文：[https://towardsdatascience.com/the-machine-learning-lessons-ive-learned-this-month-3/](https://towardsdatascience.com/the-machine-learning-lessons-ive-learned-this-month-3/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/the-machine-learning-lessons-ive-learned-this-month-3/](https://towardsdatascience.com/the-machine-learning-lessons-ive-learned-this-month-3/)
- en: <mdspan datatext="el1764618976716" class="mdspan-comment">Most days (and months</mdspan>)
    in machine learning work are the same.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1764618976716" class="mdspan-comment">在机器学习工作中，大多数日子（和月份）都是一样的。</mdspan>
- en: Coding, waiting for results, interpreting them, returning back to coding. Plus,
    some intermediate presentations of one’s progress to the management*. But, things
    mostly being the same does not mean that there’s nothing to learn. Quite the contrary!
    Two to three years ago, I started a daily habit of writing down lessons that I
    learned from my ML work. Still, until this day, each month leaves me with a handful
    of small lessons. Here are three lessons from this past month.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 编码、等待结果、解释结果、返回编码。此外，还需要向管理层汇报自己的进度的一些中间展示。但，事情大多相同并不意味着没有东西可以学习。恰恰相反！两到三年前，我开始养成一个习惯，每天写下我从机器学习工作中学到的经验教训。然而，直到今天，每个月都让我有一些小的经验教训。以下是这个月的三条经验教训。
- en: Connecting with humans (*no ML involved*)
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 与人类连接（不涉及机器学习*）
- en: As the Christmas holiday season approaches, the year-end gatherings start. Often,
    these gatherings are made of informal chats. Not much “work” gets done — which
    is natural, as these are commonly after-work events. Usually, I skip such events.
    For the Christmas season, however, I didn’t. I joined some after-work get-together
    over the past weeks and just talked — nothing urgent, nothing profound. The socializing
    was good, and I had a lot of fun.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 随着圣诞节假期的临近，年终聚会开始了。这些聚会通常是非正式的聊天。工作很少“完成”——这是自然的，因为这些通常是下班后的活动。通常，我会避开这样的活动。然而，对于圣诞节，我没有。在过去的几周里，我参加了一些下班后的聚会，只是聊天——没有紧急的事情，也没有深刻的内容。社交活动很好，我玩得很开心。
- en: It reminded me that our work projects don’t run only on code and compute. They
    run on working-together-with-others-for-long-time fuel. Here, small moments —
    a joke, a quick story, a shared complaint about flaky GPUs — can re-fuel the engine
    and make collaboration smoother when things get tense later.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 这让我想起，我们的工作项目不仅仅依赖于代码和计算。它们依赖于与他人长期合作的燃料。在这里，一些小瞬间——一个笑话、一个简短的故事、关于不稳定GPU的共同抱怨——可以在事情紧张时重新点燃引擎，使合作更加顺畅。
- en: 'Just think about it from another perspective: your colleagues have to live
    with you for years to come. And you with them. If this would be a “bearing” –
    nono, not good. But, if this is a “together” – yes, definitely good.'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 只是从另一个角度想想：你的同事未来几年都要和你一起生活。而你也要和他们在一起。如果这是“忍受”——不，不好。但如果这是“一起”——是的，绝对好。
- en: 'So, when your company’s or research institute’s get-together invites roll into
    your mailbox: join.'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，当你的公司或研究机构的聚会邀请滚入你的邮箱时：参加。
- en: Copilot didn’t necessarily make me faster
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Copilot并不一定让我更快
- en: This past month, I’ve been setting up a new project and adapting a list of algorithms
    to a new problem.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 这个月，我一直在设置一个新的项目，并将一系列算法适应到一个新的问题上。
- en: Some day, while mindlessly wasting time on the web, I came across a MIT study**
    suggesting that (heavy) AI assistance — especially *before* doing the work — can
    significantly lower recall, reduce engagement, and weaken identification *with*
    the outcome. Granted, the study used essay writing at the test objective, but
    coding an algorithm is a similarly creative task.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 有天，我在漫无目的地在网上浪费时间时，偶然发现了一项麻省理工学院的研究**建议，(重型) AI辅助——尤其是在工作之前——可以显著降低回忆能力，减少参与度，并削弱对结果的认同*。当然，这项研究使用了论文写作作为测试目标，但编写算法是一项同样具有创造性的任务。
- en: 'So I tried something simple: I completely disabled Copilot in VS Code.'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我尝试了简单的方法：我在VS Code中完全禁用了Copilot。
- en: After some weeks, my (subjective and self-assessed, thus heavily-biased) results
    were: **no noticeable difference** for my core tasks.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 几周后，我的（主观自我评估，因此有严重偏见）结果是：对于我的核心任务**没有明显差异**。
- en: For writing training loops, the loaders, the training anatomy — I know them
    well. In these cases, AI suggestions didn’t add speed; they sometimes even added
    friction. Just think about *correcting AI outputs that are **almost** correct*.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 对于编写训练循环、加载器、训练结构——我非常了解它们。在这些情况下，AI建议并没有增加速度；有时甚至增加了摩擦。想想看*纠正几乎正确的AI输出*。
- en: That finding is a bit in contrast to how I felt a month or two ago when I had
    the impression that Copilot made me more efficient.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 那个发现与我在一两个月前的感觉有些不同，当时我有一种印象，Copilot让我变得更有效率。
- en: Thinking about the differences between the two moments, it came to me that the
    effect seems **domain-dependent**. When I’m in a new area (say, load scheduling),
    assistance helps me get into the field more quickly. In my home domains, the gains
    are marginal — and may come with hidden downsides that take years to notice.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 想到这两个时刻之间的差异，我意识到效果似乎**与领域相关**。当我处于一个新领域（比如，负载调度）时，辅助工具帮助我更快地进入该领域。在我的主场领域，收益微乎其微——并且可能伴随着需要多年才能注意到的潜在弊端。
- en: 'My current take on the AI assistants (which I’ve only used for coding through
    Copilot): they are good to **ramp** **up** to unfamiliar territory. For core work
    that defines the majority of your salary, it’s optional at best.'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 我目前对AI助手的看法（我只通过Copilot进行编码）：它们在**逐步**进入不熟悉的领域时很有用。对于定义你大部分工资的核心工作，它至多是一个可选的选项。
- en: Thus, for the future, I can recommend other to
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，对于未来，我可以向其他人推荐
- en: '**Write the first pass yourself**; use AI only for polish (naming, small refactors,
    tests).'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自己先写第一遍**；只用AI进行润色（命名、小重构、测试）。'
- en: '**Honestly check AI’s proclaimed benefits:** 5 days with AI off, 5 days with
    it on. Between them, track: tasks completed, bugs found, time to finish, how well
    you can remember and explain the code a day later.'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**诚实地检查AI宣称的好处**：关闭AI 5天，开启AI 5天。在这两者之间，跟踪：完成的任务、发现的错误、完成任务的时间、你一天后能多好地记住和解释代码。'
- en: '**Toggle at your fingertips:** bind a hotkey to enable/disable suggestions.
    If you’re reaching for it every minute, you’re probably using it too extensively.'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**一键切换**：绑定一个快捷键来启用/禁用建议。如果你每分钟都在使用它，你可能过度使用了。'
- en: Carefully calibrated pragmatism
  id: totrans-22
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 仔细校准的实用主义
- en: As ML folks, we can overthink details. An example is which Learning Rate to
    use for training. Or, using a fixed learning rate versus decaying them at fixed
    steps. Or, whether to use a cosine annealing strategy.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 作为机器学习人员，我们可能会过度思考细节。一个例子是选择哪个学习率进行训练。或者，使用固定的学习率与在固定步骤中衰减它们。或者，是否使用余弦退火策略。
- en: You see, even for the simple LR case, one can quickly come up with a lot of
    options; which should we choose? I went in circles on a version of this recently.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 你看，即使是简单的LR案例，人们也可以很快想出很多选项；我们应该选择哪一个？我最近在这个问题上兜了一圈。
- en: 'In these moments, it helped me to zoom out: what does the **end user** care
    about? Mostly, it is latency, accuracy, stability, and, often primarily, cost.
    They don’t care which LR schedule you chose — unless it affects those four. That
    suggests a boring but useful approach: **pick the simplest viable option, and
    stick to it.**'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 在这些时刻，它帮助我放大视野：最终用户关心的是什么？主要是延迟、准确性、稳定性和，通常主要是成本。他们不关心你选择了哪种LR（学习率）调度——除非它影响那四个方面。这表明一个无聊但有用的方法：**选择最简单的可行选项，并坚持下去**。
- en: A few defaults cover most cases. Baseline optimizer. Vanilla LR with one decay
    milestone. A plain early-stopping rule. If metrics are bad, escalate to fancier
    choices. If they’re good, move on. But don’t throw everything at the problem all
    at once.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 几个默认设置覆盖了大多数情况。基线优化器。简单的LR（学习率）衰减里程碑。一个简单的提前停止规则。如果指标不好，升级到更复杂的选项。如果它们很好，就继续前进。但不要一次性把所有东西都投入到问题上。
- en: '* * *'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '* It seems to be that even at Deepmind, probably the most successful pure-research
    institute (at least formerly), [researchers have management to satisfy](https://louisedeason.substack.com/p/the-dumbest-girl-in-the-room-survival)'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: '* 看起来即使在Deepmind，可能最成功的纯研究机构（至少以前是这样），[研究人员也有管理要满足](https://louisedeason.substack.com/p/the-dumbest-girl-in-the-room-survival)'
- en: '** The study is available or arXiv at: [https://arxiv.org/abs/2506.08872](https://arxiv.org/abs/2506.08872)'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: '**该研究可在arXiv或以下链接找到：[https://arxiv.org/abs/2506.08872](https://arxiv.org/abs/2506.08872)'
