- en: Using Optimization to Solve Adversarial Problems
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/using-optimization-to-solve-adversarial-problems-99943614dde8/](https://towardsdatascience.com/using-optimization-to-solve-adversarial-problems-99943614dde8/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: In the previous article on optimization, I looked at finding an optimal strategy
    for the [Betting on the World Series problem](https://medium.com/towards-data-science/solving-the-classic-betting-on-the-world-series-problem-using-hill-climbing-5e9766e1565d).
    In this article, I look at a more difficult problem, developing a policy for two
    adversarial players in a board game.
  prefs: []
  type: TYPE_NORMAL
- en: I look specifically at the cat and mouse game, where we have two players, the
    cat and mouse, placed on an n x m grid, similar to a chess board, but where it
    is possible to have any number of rows and any number of columns. Either the cat
    or mouse may move first, and they then take turns until there is a winner. At
    each step, they must move either left, right, up, or down; they cannot remain
    in the same cell, and cannot move diagonally. So, they generally have four possible
    moves, though if at an edge will have only three, and if in a corner, only two.
  prefs: []
  type: TYPE_NORMAL
- en: The cat wins if it’s able to capture the mouse, which is achieved by moving
    to the same cell the mouse is on. The mouse wins by evading capture for sufficiently
    long. We’ll look at a couple of ways to define that.
  prefs: []
  type: TYPE_NORMAL
- en: 'Each starts in opposite corners, with the cat in the bottom-left, and the mouse
    in the top-right, so at the beginning (if we have 8 rows and 7 columns), the board
    looks like:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Starting position for the cat and mouse game with an 8 x 7 board.](../Images/62ced31bca68d0ac74ceee0ae3bbf1d9.png)'
  prefs: []
  type: TYPE_IMG
- en: Starting position for the cat and mouse game with an 8 x 7 board.
  prefs: []
  type: TYPE_NORMAL
- en: 'There are a number of approaches to training the cat and the mouse to play
    well at this game. At a high level, we can group these into two main types of
    approach: 1) where the players each determine their moves as they play; and 2)
    where the players each determine, prior to play, a complete policy related to
    how they’ll move in each situation.'
  prefs: []
  type: TYPE_NORMAL
- en: The first type of approach is what’s more generally used with games and is usually
    more scalable and robust, at least with more complex games. For this problem,
    though, as it’s relatively straightforward, I’ll look at methods to learn a complete,
    deterministic policy for each player, which they can simply execute during play.
  prefs: []
  type: TYPE_NORMAL
- en: Determining each move during play
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: So, while determining a complete policy ahead of time is feasible for the cat
    and mouse game, this is not the case more more complex games. With an application
    trained to play, for example, chess, it cannot feasibly develop a policy ahead
    of time that could indicate how to handle every situation it may encounter during
    a game; chess is far too complex to allow this.
  prefs: []
  type: TYPE_NORMAL
- en: In future articles, I’ll look at techniques to allow players to assess their
    current situation each step, and move based on their evaluations during play.
    For here, though, I’ll just provide a very quick overview of techniques to determine
    the moves to make during play.
  prefs: []
  type: TYPE_NORMAL
- en: There are different ways to develop, for example, a chess-playing application,
    but the traditional method is to construct what’s called a *game tree*. As well,
    reinforcement learning is often used to develop game-playing applications, and
    a combination can also be used.
  prefs: []
  type: TYPE_NORMAL
- en: A game tree describes each possible sequence of moves each player can make,
    starting at the current board. For example, in chess, it may be black’s turn and
    black may have, say, 8 legal moves. The root node of the game tree will represent
    the current board. The boards that result from black’s current possible moves
    are the next level of the tree, so the 2nd level of the tree will have 8 possible
    boards. For each of these, white has some set of legal moves. If the 8 boards
    in the 2nd layer each have, say, 10 legal responses from white, then there are
    80 boards at the 3rd level. The 4th level is then the boards the result from all
    the possible moves black could make given the boards in the 3rd level, and so
    on. In this way, each layer of the tree is many times larger than the previous
    layer.
  prefs: []
  type: TYPE_NORMAL
- en: For simple games like tic-tac-toe or Connect 4, it’s possible to create the
    full game tree and determine definitively the best move at each step. For more
    complex games such as checkers, chess, go, and so on, this isn’t possible. Instead,
    though, we may build the game trees out for only a finite number of steps, and
    estimate the quality of the board for the current player at each leaf node.
  prefs: []
  type: TYPE_NORMAL
- en: So, if the tree extends, say, five levels deep, we will have set of boards on
    the fifth level of the tree, but few of these will be a win for either player.
    We must, though, assess if the board is better for one player or the other. For
    checkers or chess and similar games, this can be done by simply counting the pieces.
    A more effective, but slower, method is to also look at the board position. For
    example, with chess we can evaluate how advanced each piece is, how exposed, and
    so on.
  prefs: []
  type: TYPE_NORMAL
- en: It’s also possible to use what’s called _Monte Carlo Tree Search. H_ere the
    tree leaves are expanded by playing each board out to completion, but through
    a set of some number of random games (where both player play entirely randomly).
    This is a means of evaluating each board, but without analyzing the board itself.
    So, it a tree is built out to 5 layers, there may be 1000 boards at that level.
    To evaluate each of these, we can perform some fixed number of random games starting
    from each of these boards and count how often each player wins, which gives a
    decent estimate of how strong the board is for both players.
  prefs: []
  type: TYPE_NORMAL
- en: Policy-based solutions for the cat and mouse game
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The cat and mouse game is fairly straight-forward, and developing a single fully-defined
    policy for the cat, and another for the mouse, (allowing both to simply follow
    this in a deterministic manner during play) is actually feasible. This is particularly
    true with the first case we look at, where we assume the board is a known, fixed
    size, and where this is relatively small. We look at the more difficult case,
    where the board size is very large, later.
  prefs: []
  type: TYPE_NORMAL
- en: '![The cat and mouse game on a 3x3 board](../Images/85fa2df626f59ba66ddb613996e7824d.png)'
  prefs: []
  type: TYPE_IMG
- en: The cat and mouse game on a 3×3 board
  prefs: []
  type: TYPE_NORMAL
- en: In the image here, there’s a very small, 3×3 board. It’s fairly easy to see
    in this case that the cat could develop a fully-defined policy, specifying what
    it would do when it is in any one of the 9 squares and the mouse is in any one
    of the 9 squares. Taking every combination of where the cat may be and the mouse
    may be, there are only 81 combinations, and it’s possible to train a policy to
    play optimally in each of these 81 scenarios. That is, in the case of the cat’s
    policy, in each of the 81 cases, we have a direction (either left, right, up,
    or down) that the cat will move, and similarly for the mouse’s policy.
  prefs: []
  type: TYPE_NORMAL
- en: Optimal play in the cat and mouse game
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Depending on the size and shape of the board and which player goes first, with
    perfect play (where neither player makes a mistake), there is actually a known
    winner for the cat and mouse game.
  prefs: []
  type: TYPE_NORMAL
- en: To picture this, consider the case of a 3×3 board. Similar to tic-tac-toe, it’s
    possible for the cat (and similarly for the mouse) to create a game tree covering
    every move it can make, every response the mouse can make, every next move for
    the cat, and so on for as many moves as it takes until the game is over (either
    the cat captures the mouse, or the mouse evades capture for sufficiently long).
    Doing this, given that a game has a finite and relatively small length, it’s possible
    to consider every possible sequence of moves, and determine the ideal move in
    each possible scenario.
  prefs: []
  type: TYPE_NORMAL
- en: However, we also want to support much larger boards, for example 8 x 8 boards,
    where considering every possible sequence of moves may be infeasible. Here, the
    game trees may grow to enormous sizes. So, as indicated above, developing partial
    games trees and then assessing the boards in the leaf nodes would be quite possible.
    But, developing a complete game trees is not feasible.
  prefs: []
  type: TYPE_NORMAL
- en: In these case, though, it’s still possible to develop a full policy for both
    players using a Hill-Climbing optimization technique. In an example below, we
    do this for a 8×7 board. Here there are 56 square on the board, so 56 places the
    cat may be and 56 places the mouse may be (actually 55 given that if they’re on
    the same square, the game is over and the cat has already won, but we’ll simplify
    this by assuming each player may be on any square).
  prefs: []
  type: TYPE_NORMAL
- en: There are then 3,136 possible combinations of their locations, and so developing
    a policy for play for each player (at least when using the first, and simplest,
    method I’ll describe here – where each player has a defined move, either left,
    right, up, or down, for each combination of cat and mouse position) requires developing
    a policy of size 3,136.
  prefs: []
  type: TYPE_NORMAL
- en: This will not scale up to much larger boards (we’ll cover a similar method,
    that does cover arbitrarily large boards later), but does cover moderate sized
    boards well, and is a good place to begin.
  prefs: []
  type: TYPE_NORMAL
- en: When does the cat win?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Before we look at an algorithmic solution to this problem, the cat and mouse
    game is an interesting problem in itself, and may be good to stop here for a bit
    and think about: when is the game winnable for the cat, and when is it not (so
    that the mouse is able to win)? I’ll give you a little time to think about that
    before going over the answer.'
  prefs: []
  type: TYPE_NORMAL
- en: . . .
  prefs: []
  type: TYPE_NORMAL
- en: Thinking…
  prefs: []
  type: TYPE_NORMAL
- en: . . .
  prefs: []
  type: TYPE_NORMAL
- en: Thinking some more…
  prefs: []
  type: TYPE_NORMAL
- en: . . .
  prefs: []
  type: TYPE_NORMAL
- en: Don’t look until you’re ready to see the answer…
  prefs: []
  type: TYPE_NORMAL
- en: . . .
  prefs: []
  type: TYPE_NORMAL
- en: Okay, I’ll go over at least one way to look at this. Like a lot of similar problems,
    this can be viewed in terms of the colours on a chess board. The squares alternate
    between black and white. Each move, the mouse moves from one colour to the other
    and the mouse does as well.
  prefs: []
  type: TYPE_NORMAL
- en: Both players start on a certain colour of square. Let’s say the cat (in the
    bottom-left) is on a black square. If there are an even number of rows and an
    even number of columns (as with an 8 x 8 chess board), the square where the mouse
    starts (in the top-right) will also be black.
  prefs: []
  type: TYPE_NORMAL
- en: If the cat plays first, it moves from a black square to a white. The mouse will
    then as well. So after each time the cat and the mouse move, they will both be
    on the same colour (both on black, or both on white). Which means, when the cat
    moves, it is moving to a square of the opposite colour as what the mouse is currently
    on. The cat can never catch the mouse.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this case, there’s actually no winnable policy for the mouse per se: it
    can just move randomly, so long as it does not move into the cat (essentially,
    a suicidal move). But, the cat does require a good policy (or it will not be able
    to capture the mouse before an allowed number of moves), and moving randomly will
    not likely result in a win (though interestingly can quite often with a sufficiently
    small board).'
  prefs: []
  type: TYPE_NORMAL
- en: For the mouse, though there is no winnable strategy in this case, there is still
    a sense of optimal play – that it avoids capture for at least as long as is possible.
  prefs: []
  type: TYPE_NORMAL
- en: If the number of rows or columns is odd, or if the mouse moves first, on the
    other hand, the cat can capture the mouse. To do this, it just needs to approach
    the mouse so that it is diagonally next to the mouse, which will force the mouse
    away from the cat, in one of two possible directions, depending specifically how
    they are situated. The cat can then follow the mouse, remaining diagonally next
    to the mouse until it is eventually forced into a corner and captured.
  prefs: []
  type: TYPE_NORMAL
- en: In this case, the mouse cannot win when the cat is playing optimally, but can
    still win where the cat is not, as it just has to avoid capture for some defined
    number of moves.
  prefs: []
  type: TYPE_NORMAL
- en: The next image has an example where the cat has moved diagonally next to the
    mouse, forcing the mouse towards one of the corners (in this case, the top-right
    corner).
  prefs: []
  type: TYPE_NORMAL
- en: '![The cat is diagonally next to the mouse, leaving the mouse only two legal
    moves (up and right) that aren''t to cells next to the cat, both taking it closer
    to the corner. If the mouse were, instead to move left or down, placing itself
    next to the cat, the cat would simply capture it the next move.](../Images/4b2c78877f4ddf6265032264db0d85c0.png)'
  prefs: []
  type: TYPE_IMG
- en: The cat is diagonally next to the mouse, leaving the mouse only two legal moves
    (up and right) that aren’t to cells next to the cat, both taking it closer to
    the corner. If the mouse were, instead to move left or down, placing itself next
    to the cat, the cat would simply capture it the next move.
  prefs: []
  type: TYPE_NORMAL
- en: Once the mouse is in a corner (as shown below), if the cat is diagonally next
    to the mouse, the mouse will lose the next move. It will have only two legal moves,
    both to squares adjacent to the cat, where the cat can move onto the mouse its
    next move.
  prefs: []
  type: TYPE_NORMAL
- en: '![The mouse is now cornered and can move only left or down. Both moves allow
    the cat to capture it the following move.](../Images/867f0dbddad100c3384792c1c1aa17af.png)'
  prefs: []
  type: TYPE_IMG
- en: The mouse is now cornered and can move only left or down. Both moves allow the
    cat to capture it the following move.
  prefs: []
  type: TYPE_NORMAL
- en: Training two separate strategies
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The question, then, is how to train the two players, starting from no knowledge,
    to play a perfect game, meaning both players play optimally and neither makes
    a mistake.
  prefs: []
  type: TYPE_NORMAL
- en: 'We can consider two cases:'
  prefs: []
  type: TYPE_NORMAL
- en: Where the game is winnable for the cat. In this case, we want to ensure we can
    train a cat to reliably win, regardless of how the mouse plays. This means learning
    to move close to the mouse, and to corner it. And, we wish to ensure the mouse
    evades capture for as long as possible.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Where the game is unwinnable for the cat. In this case, we want to ensure that
    we’ve trained the mouse well enough to evade capture for long enough be declared
    the winner. And, we want to ensure the cat is trained well enough that it can
    capture the mouse if the mouse does make a mistake.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Clearly the cat and mouse game is far simpler than games like chess, checker,
    Go, or Othello, but it does have one difficulty, which is that the game is asymmetric,
    and the two players must each develop separate strategies.
  prefs: []
  type: TYPE_NORMAL
- en: With games where there is only one strategy required, it’s possible to let two
    players play against each other, and develop progressively better strategies over
    time. This is the approach we’re going to take here as well, but, similar to what’s
    often done when training a Generative Adversarial Network, the code actually alternates
    between training the cat, and training the mouse. That is, it trains the cat until
    it is able to win, then the mouse until it’s able to win, then the cat, and so
    on.
  prefs: []
  type: TYPE_NORMAL
- en: Approaches to Determining an optimal policy
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As the goal is to develop an optimal policy, it’s fairly natural to use an optimization
    technique, which we do here. Some choices for this include hill climbing, simulated
    annealing, genetic algorithms, and swarm intelligence algorithms.
  prefs: []
  type: TYPE_NORMAL
- en: Each have their merits, but for this article, as with the [Betting on the World
    Series](https://medium.com/towards-data-science/solving-the-classic-betting-on-the-world-series-problem-using-hill-climbing-5e9766e1565d)
    article, we’ll look at hill-climbing approaches to develop a policy for both players.
    Hill climbing is likely the simplest of the optimization techniques just listed,
    but is sufficient to handle this problem. In future articles I’ll cover more difficult
    problems and more involved solutions to these.
  prefs: []
  type: TYPE_NORMAL
- en: Hill climbing, for either player in a game such as this, starts with some policy
    (often created randomly, or initialized to something somewhat reasonable), and
    then gradually improves, through a process of repeatedly trying small variations,
    selecting the best of these, trying small variations to that, and so on until
    eventually what looks like an optimal solution is reached.
  prefs: []
  type: TYPE_NORMAL
- en: Using a small, fixed board size
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'As indicated, in the first approach we look at, we develop a policy in likely
    the simplest manner we can: the cat’s policy specifies the specific move to make
    given each combination of the cat’s location and the mouse’s location. Similarly
    for the mouse’s policy.'
  prefs: []
  type: TYPE_NORMAL
- en: 'For an 8×7 board, this requires a policy of size 3,136 for each player. Initially,
    the policy will be set to be very poor: in this example, we specify for both players
    to simply always move up, unless on the top row, in which case, they move down.
    But, over time, the hill climbing process moves towards increasingly strong policies
    for both players.'
  prefs: []
  type: TYPE_NORMAL
- en: The code related to this article is hosted on github, in the [CatAndMouseGame](https://github.com/Brett-Kennedy/CatAndMouseGame/tree/main)
    repository. What we’re considering now is in the version_1 notebook.
  prefs: []
  type: TYPE_NORMAL
- en: The first cell contains some options, which you can adjust to see how the training
    proceeds with different values.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: For brevity, I won’t cover the INITIAL_CAT_POLICY for this, and will assume
    it’s set to ‘weak’, but if set to ‘strong’, the cat will be initialized to always
    move towards the mouse (if set to ‘weak’, it must learn this).
  prefs: []
  type: TYPE_NORMAL
- en: The code starts with initializing the board, so that the two players are in
    opposite corners. It also initializes the policies for both players (as described
    above – so both player always move up unless on the top row, in which case they
    move down).
  prefs: []
  type: TYPE_NORMAL
- en: It then plays one game. As the games are deterministic, it requires only one
    game to determine the winner for a given cat policy and given mouse policy. The
    results of this first game are the baseline the cat then tries to repeatedly improve
    on until it’s able to beat the mouse. We then repeatedly improve the mouse until
    it’s able to be the cat, and so on.
  prefs: []
  type: TYPE_NORMAL
- en: This is set to execute for 100,000 iterations, which executes in a few minutes,
    and is enough to establish quite good play for both players.
  prefs: []
  type: TYPE_NORMAL
- en: Evaluating each game
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'As the cat learns, it has, at any point in time, the current policy: the best
    policy discovered so far. It then creates a number of variations on this, each
    with a small number of modifications to this current-best policy (changing the
    direction moved by the cat in a small number of the 3,126 cells of the policy).
    It then evaluates each of these by playing against the current-best policy for
    the mouse. The cat then takes the best-performing of these candidate new policies
    (unless none improve over the current best policy for the cat, in which case it
    continues generating random variations until at least one is discovered that improves
    over this.)'
  prefs: []
  type: TYPE_NORMAL
- en: For Hill climbing to work well, it needs to be able to detect even small improvements
    from one policy to the next. So, it would be difficult to implement this if the
    player knew only, after each game, if they won or not.
  prefs: []
  type: TYPE_NORMAL
- en: 'Instead, after each game, we report the number of moves until there was a winner,
    and the distance the two players were apart at the end of the game. When the cat
    wins, this will be zero. Where the mouse wins, though, the cat wants to minimize
    this: it wants to end at least close to the mouse. And the mouse wants to maximize
    this: it wants to end far from the cat.'
  prefs: []
  type: TYPE_NORMAL
- en: In general, for the cat, an improvement is found if the previous-best resulted
    in a win for the mouse and a new policy results in a win for the cat. But, also,
    if the mouse won in the previous best, and the mouse still wins, but the cat ends
    in a position closer to the mouse. Or, if the cat won in the previous best and
    still wins, but does so in fewer moves.
  prefs: []
  type: TYPE_NORMAL
- en: Interestingly, it’s also useful here to reward longer games for the cat, at
    least to an extent. This encourages the cat to move around more, and to not stay
    in the same area. We do have to be careful though, as we do not wish to encourage
    the cat to proceed slower than necessary when it is able to capture the mouse.
  prefs: []
  type: TYPE_NORMAL
- en: For the mouse, an improvement is found if the previous-best resulted in a win
    for the cat and a new policy results in a win for the mouse. As well, there is
    an improvement if the cat won with the previous best and the cat still wins, but
    the game is longer. And there is an improvement if the mouse won in the previous
    best and the mouse still does, but ends further from the cat.
  prefs: []
  type: TYPE_NORMAL
- en: Code for Version 1
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The full code is provided here, as well as on github.
  prefs: []
  type: TYPE_NORMAL
- en: In each iteration, either the cat is learning or the mouse is learning, where
    learning here means trying new policies and selecting the best of these.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Animating the moves
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As the notebook executes, every 10,000 iterations, it plays out a game given
    the policies (at that time) of the cat and of the mouse. Over the course of time,
    we see both players playing progressively more sensible games. To do this, it
    calls, clear_output() (provided in IPython.display), as it draws each move, so
    clears the notebook’s output cell and redraws the current board positions of the
    two players, which creates the effect of animation.
  prefs: []
  type: TYPE_NORMAL
- en: There are also print statements describing the progress of both players learning
    better play.
  prefs: []
  type: TYPE_NORMAL
- en: Limitations of the Version 1 code
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The Version 1 notebook demonstrates the basic idea of developing a full policy
    for a player in a game, but does not handle all the issues we would wish for in
    a production-quality system. This is okay, since this is merely a simple example
    of the idea, but I’ll list here a few places this could be improved (though making
    the code somewhat more complicated) in another environment.
  prefs: []
  type: TYPE_NORMAL
- en: First, for this version, as a simplification, we declare the mouse the winner
    if the players repeat a board position. This isn’t ideal, but makes some sense
    in this case, since the policies for both players are deterministic – if they
    enter the same position twice, we know the pattern will continue to repeat, and
    the cat will not capture the mouse.
  prefs: []
  type: TYPE_NORMAL
- en: The code can also be improved to detect when neither player has improved for
    some time, to allow either early stopping, or to allow something like simulated
    annealing (to allow moving to policies that appear to be weaker, to break out
    of a local optima), or to allow testing new policies that are not only small modifications
    to the current best, but larger modifications.
  prefs: []
  type: TYPE_NORMAL
- en: It is also possible, once one player is unable to beat the other, to nevertheless
    allow the other to continue learning, to develop and ever-stronger policy.
  prefs: []
  type: TYPE_NORMAL
- en: Another simplification taken here is that the players each try to simply beat
    the current policy of the other player. This works reasonable well (as the other
    player is also continuously improving), but to create more robust players, it
    is preferred to evaluate each policy based not just on how it performs against
    the other player’s current policy, but against any arbitrary policy, or at least
    against a large number of policies known to be reasonably strong. This, however,
    is a slower process, so skipped for this notebook.
  prefs: []
  type: TYPE_NORMAL
- en: Some of these are addressed in the second solution to this problem (which focusses
    on handling larger, unknown board sizes, but does provide some other improvements
    as well), covered below.
  prefs: []
  type: TYPE_NORMAL
- en: Observations on the Version 1 process
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'This type of learning can be referred to as co-evolution, where two agents
    learn together. As one becomes stronger, it helps the other learn to be stronger
    as well. In this case, both players end up winning about half the games over the
    training process. Printing the number of total wins for each at the end of the
    notebook, we have:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: As they train, there can be some unexpected moves made by both. These are unlikely
    to be anything like Move 78 in Alpha Go’s game against Lee Sedol (a very strong,
    but new and unexpected move). These are generally just combinations (the cat’s
    position and the mouse’s position) for which the policy does not yet have a reasonable
    move defined. As training continues, these decrease in number.
  prefs: []
  type: TYPE_NORMAL
- en: Using more general policies, allowing players to play on any board size
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The approach used above can work satisfactorily where the board is relatively
    small, but if the board is much larger, say, 20 x 20, or 30 x 35, this is not
    practical. With 30 x 35, for example, we’d have policies of size 30 x 35 x 30
    x 35, which is over a million parameters to tune.
  prefs: []
  type: TYPE_NORMAL
- en: And it’s quite unnecessary, since how the cat moves when the mouse is relatively
    far away is likely the same regardless of specifically where they are on the board;
    and how the cat moves when the mouse is very close and not near any edge, is likewise
    likely the same, regardless of the exact location, and so on for other such scenarios.
  prefs: []
  type: TYPE_NORMAL
- en: It’s possible to define a policy that describes how to play in more general
    terms, without reference to the specific cells of the board.
  prefs: []
  type: TYPE_NORMAL
- en: A policy can be defined for the cat (the mouse’s would be similar), in terms
    of properties of their positions that are fairly general, but describe their locations
    with enough detail that good policies can be developed.
  prefs: []
  type: TYPE_NORMAL
- en: 'This can include, for example:'
  prefs: []
  type: TYPE_NORMAL
- en: Is the mouse above, below, or in the same row as the cat
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Is the mouse to the left, to the right, or in the same column as the cat
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Is the mouse closer to the cat vertically or horizontally
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Is the mouse in a corner
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Is the mouse on an edge
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Is the mouse not quite on, but near, the top / bottom / left / right edge
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We can also consider if the mouse is an odd or even number of spaces away from
    the edge in each dimension, and if it’s and odd or even number of spaces from
    each edge – as the cat is trying to avoid the mouse getting into a circle with
    it.
  prefs: []
  type: TYPE_NORMAL
- en: Another way we can address this is to develop, not a single policy, but a set
    of small sub-policies, each similar to those developed in the first approach.
    There, if we had a 5 x 6 board, we’d develop a 5 x 6 x 5 x 6 policy. But it’s
    also possible to define, for example, a series of 3 x 3 policies for each player
    to determine how they would move in the various scenarios they can be in where
    the two players are close to each other (they would also have one or more sub-policies
    to describe how the players would move when far apart).
  prefs: []
  type: TYPE_NORMAL
- en: For example, we can define a 3 x 3 policy for how the cat should move when both
    players are in the 3 x 3 region in the top-left corner of the board, another for
    when they’re in the 3 x 3 region in the top-right of the board, for when they’re
    on the top edge (but not in a corner), and so on.
  prefs: []
  type: TYPE_NORMAL
- en: To simplify this, we can actually just define one policy for the corners (rotating
    it depending which corner the players are in). Similarly for the four edges, where
    only one policy (and not four) is strictly needed, and so on.
  prefs: []
  type: TYPE_NORMAL
- en: The following image shows where the cat and mouse are close to each other and
    are both in the top-right corner area, and may use a sub-policy related to this
    situation, just considering the 3 x 3 area outlined here.
  prefs: []
  type: TYPE_NORMAL
- en: '![Here the cat and mouse are both in the 3 x 3 region in the top-right corner](../Images/dac15737f0efc206cf5b069a7f065e94.png)'
  prefs: []
  type: TYPE_IMG
- en: Here the cat and mouse are both in the 3 x 3 region in the top-right corner
  prefs: []
  type: TYPE_NORMAL
- en: The next image shows just this 3 x 3 region. The sub-policy for this region
    can be optimized and made part of the full policy for the player. Optimizing for
    this region of the board is a smaller, manageable problem that can be separated
    from the other concerns in the rest of the board.
  prefs: []
  type: TYPE_NORMAL
- en: '![A 3 x 3 region, in this case specifically representing the 3 x 3 region in
    the top-right corner of the full board. A sub-policy may be optimized specifically
    for this region.](../Images/60530cf7e4ef150b286926eefeacce19.png)'
  prefs: []
  type: TYPE_IMG
- en: A 3 x 3 region, in this case specifically representing the 3 x 3 region in the
    top-right corner of the full board. A sub-policy may be optimized specifically
    for this region.
  prefs: []
  type: TYPE_NORMAL
- en: As indicated, only one such 3 x 3 policy needs to be optimized to handle the
    four corners, as a single policy can be used in all four cases, by rotating it
    to match the full board.
  prefs: []
  type: TYPE_NORMAL
- en: Version 2 Notebook
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In Version 2 of this (coded in a second notebook called [version_2](https://github.com/Brett-Kennedy/CatAndMouseGame/blob/main/version_2.ipynb)),
    we take a generic approach to training a policy, in the sense that we do not assume
    any specific size of board. This is actually a bit different than some of the
    approaches for a generic solution just described, but along the same lines, showing
    another possible approach.
  prefs: []
  type: TYPE_NORMAL
- en: This is again based on defining a policy for when the cat and mouse are close
    to each other, which is again defined to mean within some common 3 x 3 space.
    In this case, instead of rotating the 3 x 3 spaces, we keep the same orientation
    as the full board, but add other dimensions to the policy indicating if we are
    on one or more of the board’s edges.
  prefs: []
  type: TYPE_NORMAL
- en: 'So, this uses a 3 x 3 x 3 x 3 x 3 x 3 (size 729) policy. The first 4 elements
    represent the x and y positions of the cat and of the mouse. The next element
    has dimension three, specifying how the mouse is positioned relative to the left
    and right edges of the board. This can be one of:'
  prefs: []
  type: TYPE_NORMAL
- en: There is no edge on either side
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The edge on the left side board is on the left side of the of the 3×3 region
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The edge on the right side board is on the right side of the of the 3×3 region.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Similarly for the last dimension, but this is related to the top and bottom
    edges of the full board.
  prefs: []
  type: TYPE_NORMAL
- en: 'That is, we have a specific policy for each combination of:'
  prefs: []
  type: TYPE_NORMAL
- en: The cat’s x position within this 3 x 3 region
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The cat’s y position within this 3 x 3 region
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The mouse’s x position within this 3 x 3 region
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The mouse’s y position within this 3 x 3 region
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If the left side of this 3 x 3 region is at the left-most edge of the full space,
    if the right side of this 3 x 3 region is at the right-most edge of the full space,
    or if neither is the case.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If the bottom side of this 3 x 3 region is at the bottom of the full space,
    if the top side of this 3 x 3 region is at the top of the full space, or if neither
    is the case.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: As an example, when the cat and mouse are with a 3 x 3 grid anywhere on the
    board, we can enact the policy for this, which also considers if the 3 x 3 region
    borders the edges of the full board (shown in this image a thick lines)
  prefs: []
  type: TYPE_NORMAL
- en: '![When the cat and mouse are within a 3 x 3 space relative to each other, we
    can enact a sub-policy related to this situation](../Images/821b0570a6573787c503a14a4c4f3ebd.png)'
  prefs: []
  type: TYPE_IMG
- en: When the cat and mouse are within a 3 x 3 space relative to each other, we can
    enact a sub-policy related to this situation
  prefs: []
  type: TYPE_NORMAL
- en: The following shows the 3 x 3 space they may be viewed in. Developing a sub-policy
    for this simple case allows us to ignore other parts of the board and just focus
    on their relative locations and if there are edges nearby.
  prefs: []
  type: TYPE_NORMAL
- en: '![The 3 x 3 space the cat and mouse may be projected onto.](../Images/5df76358c62eaef9b3ddc85ae7734bec.png)'
  prefs: []
  type: TYPE_IMG
- en: The 3 x 3 space the cat and mouse may be projected onto.
  prefs: []
  type: TYPE_NORMAL
- en: So, these sub-policies are only used when the two players are close to each
    other.
  prefs: []
  type: TYPE_NORMAL
- en: As a simplification for this notebook, if the cat and mouse are not close enough
    to be projected onto a 3 x 3 sub-region, then the cat simply moves so as to reduce
    the Euclidean distance to the mouse. This can be learned as easily as well, but
    to keep this example simple, it covers only learning the policy for when they
    are close.
  prefs: []
  type: TYPE_NORMAL
- en: As an other simplification, this notebook trains only the cat. The mouse moves
    randomly, which allows the cat to develop a more robust policy, as it can be trained
    until it consistently beats the mouse in 100% of any given number of games, regardless
    of how the mouse moves.
  prefs: []
  type: TYPE_NORMAL
- en: The mouse can be trained as well simply enough, using the process shown in the
    previous notebook. But, for this example, I wanted to focus primarily on expanding
    the example above to define policies that can handle any board size.
  prefs: []
  type: TYPE_NORMAL
- en: As this notebook focuses on training the cat, we demonstrate with a case where
    the game is winnable for the cat.
  prefs: []
  type: TYPE_NORMAL
- en: Training process for Version 2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The cat is trained by keeping, as in Version 1, a current best policy. Each
    iteration it generates 10 random, small variations on this and determines if any
    beat the previous version (and if so, taking the best of these as its new current
    best policy).
  prefs: []
  type: TYPE_NORMAL
- en: To evaluate each candidate policy, we play, using that candidate, 1000 games
    against the mouse. The policies are compared primarily based on the number of
    games out of 1,000 they beat a randomly moving mouse. It also looks at (so that
    the process can select slightly better policies for the cat, even if both result
    in the same number of wins out of 1000), the average number of moves until a win
    (lower is better), and the average distance (over all moves in all games) from
    the mouse (here as well, lower is better).
  prefs: []
  type: TYPE_NORMAL
- en: The code is actually divided into two steps. In the first, the cat plays against
    a mouse moving purely randomly, and does so until it is able to beat this consistently.
    It then plays against a slightly-smarter mouse, in that the mouse will not, unless
    there is no other legal choice, move to a square next to the cat.
  prefs: []
  type: TYPE_NORMAL
- en: Dividing training into two steps like this isn’t strictly necessary. In a larger
    version of this (not available on github at present, but may be added soon – it
    has some further small improvements, including training both players), this was
    simplified to just have one training loop, with little impact on the time required
    for training the cat.
  prefs: []
  type: TYPE_NORMAL
- en: 'But it does present an important idea with Hill Climbing: it’s important to
    create a situation where small improvements in the policy can be detected, in
    this case, allowing the cat more wins out of 1000 games (as it initially played
    in a situation where wins were quite possible).'
  prefs: []
  type: TYPE_NORMAL
- en: Running the Version 2 notebook, the cat requires 30 iterations until it’s able
    to beat the mouse all 1000 games. It then begins playing the smarter mouse. Initially
    it can win only 821 out of 1000 games, but after 17 additional iterations, is
    able to consistently beat it all 1000 games. At that point, it attempts to reduce
    the number of moves necessary until a win.
  prefs: []
  type: TYPE_NORMAL
- en: 'The following shows the output from the first 16 iterations after switching
    to a smarter mouse:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: Using 1000 games is large enough to evaluate the cat reasonably well, and also
    to detect even relatively small improvements in the cat’s policy, for example,
    when it moves from winning, say, 678 to 679 out of the 1000 games. Even though
    this is only a modest improvement, it is an improvement.
  prefs: []
  type: TYPE_NORMAL
- en: In all, only about 200 iterations are necessary to train a strong policy for
    the cat.
  prefs: []
  type: TYPE_NORMAL
- en: In the notebook, training is done with a 5 x 5 board, as this allows fast execution
    of the games, and allows developing separate policies for each of the four corners,
    and the edges between the corners. The last cell of the notebook executes the
    policy on a 15 x 15 board, which demonstrates that the policies discovered can
    be applied to any board size.
  prefs: []
  type: TYPE_NORMAL
- en: 'For Version 2, we defined the mouse wining as evading capture for at least
    a specified number of moves, where this is: (NUM_ROWS + NUM_COLS) * 2\. That’s
    a number of moves in which the cat should, if performing well, be able to capture
    the mouse (it’s actually slightly longer than is necessary, giving the cat some
    flexibility). This is a preferable way to define the mouse as having won, and
    is possible here since the mouse moves in a non-deterministic way.'
  prefs: []
  type: TYPE_NORMAL
- en: Compared to Version 1, this also updates the fitness function for the cat, as
    as to look at the average distance from the mouse at each step, as opposed to
    the distance at the end of the game. This also allows for a steady, gradual improvement
    in play, once the cat is able to win all 1000 games reliably.
  prefs: []
  type: TYPE_NORMAL
- en: Training a policy for when the players are farther apart
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This example covered only developing a sub-policy to handle where the players
    are close, but a full solution would also require a sub-policy to handle where
    they are farther apart. This can be hard-coded, as in this notebook, but it’s
    generally preferable to allow the optimization process (or game tree, Monte Carlo
    Game Tree, or some other such method) to discover this.
  prefs: []
  type: TYPE_NORMAL
- en: To model the choices when the players are farther apart, we want to capture
    the relevant properties of the their positions, but not additional properties
    (as this will require more effort to optimize). But, choosing the parameters can
    be a case of begging the question – that is, determining ahead of time what the
    optimal strategy is, and then simply defining the parameters necessary to capture
    that.
  prefs: []
  type: TYPE_NORMAL
- en: For example, we may assume that the best policy for the cat when the players
    are far apart is to minimize the travel distance to the mouse (which is the Manhattan
    distance). So, we may represent their board positions simply as a single variable
    with four possible values, indicating if the mouse is closest to the left, right,
    up or down. But using the Euclidean distance can actually work better for the
    cat and mouse game than the Manhattan. As well, it may be useful to capture information
    about the edges of the board, so that the cat can push the mouse towards the closest
    corner.
  prefs: []
  type: TYPE_NORMAL
- en: That is, starting with an assumption of the best policy and capturing only properties
    of the board necessary to execute that policy can preclude us from finding a truly-optimal
    solution.
  prefs: []
  type: TYPE_NORMAL
- en: 'We may want to include some extra parameters to capture factors that are only
    potentially relevant, even where we suspect they are not. A potential set is,
    as before:'
  prefs: []
  type: TYPE_NORMAL
- en: Is the mouse above, below, or in the same row as the cat
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Is the mouse to the left, to the right, or in the same column as the cat
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Is the mouse closer to the cat vertically or horizontally
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Is the mouse in a corner
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Is the mouse on an edge
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Is the mouse not quite on, but near, the top / bottom / left / right edge
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: As with any case of modeling, it’s a balancing act between capturing too much
    detail (and being slow to train, and harder to interpret) and too little (resulting
    in sub-optimal play).
  prefs: []
  type: TYPE_NORMAL
- en: Conclusions
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The two examples shown here are viable options to solve this problem, and are
    useful examples of this approach: defining a complete policy for game play based
    on an optimization algorithm (in this case, hill climbing).'
  prefs: []
  type: TYPE_NORMAL
- en: The ideas here are fairly simple, and do directly not extend to substantially
    more sophisticated games, but can handle well problems of similar, and even somewhat
    greater, complexity. For example, they can handle a reasonable number of complications
    that can be added to the cat and mouse game as it was presented here, for example,
    the placement of obstacles on the board, the ability of one player to travel at
    different speed, the presence of multiple cats, or multiple mice, and so on.
  prefs: []
  type: TYPE_NORMAL
- en: As well, the idea of well-defined sub-policies that take effect in specific
    conditions is a useful idea that can be incorporated into even solutions for much
    more complicated problems, defining these either through game trees, or through
    optimization techniques such as were shown here.
  prefs: []
  type: TYPE_NORMAL
- en: I’ll cover more advanced methods in future articles, but this can be a useful
    method where applicable.
  prefs: []
  type: TYPE_NORMAL
- en: All images by the author.
  prefs: []
  type: TYPE_NORMAL
