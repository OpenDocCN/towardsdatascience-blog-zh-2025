- en: Designing, Building & Deploying an AI Chat App from Scratch (Part 1)
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/designing-building-deploying-an-ai-chat-app-from-scratch-part-1-f1ebf5232d4d/](https://towardsdatascience.com/designing-building-deploying-an-ai-chat-app-from-scratch-part-1-f1ebf5232d4d/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![Photo by Danist Soh on Unsplash](../Images/feaed39bfc495ecab2b12a9bafadbea5.png)'
  prefs: []
  type: TYPE_IMG
- en: Photo by [Danist Soh](https://unsplash.com/@danist07?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  prefs: []
  type: TYPE_NORMAL
- en: Introduction
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The aim of this project is to learn about the fundamentals of modern, scalable
    web applications by designing, building and deploying an AI-powered chat app from
    scratch. We won’t use fancy frameworks or commercial platforms like ChatGPT. This
    will provide a better understanding of how real-world systems may work under the
    hood, and give us full control over the language model, infrastructure, data and
    costs. The focus will be on engineering, backend and cloud deployment, rather
    than the language model or a fancy frontend.
  prefs: []
  type: TYPE_NORMAL
- en: This is part 1\. We will design and build a cloud-native app with several APIs,
    a database, private network, reverse proxy, and simple user interface with sessions.
    Everything runs on our local computer. In [part 2](https://towardsdatascience.com/designing-building-deploying-an-ai-chat-app-from-scratch-part-2-c75f712eebe5),
    we will deploy our application to a cloud platform like AWS, GCP or Azure with
    a focus on scalability so actual users can reach it over the internet.
  prefs: []
  type: TYPE_NORMAL
- en: '![A quick demo of the app. We start a new chat, come back to that same chat,
    and start another chat. We will now build this app locally and make it available
    at localhost.](../Images/114434b7f4457b1b57c9d8baf16a75dc.png)'
  prefs: []
  type: TYPE_IMG
- en: A quick demo of the app[.](https://chat.jorisbaan.nl.) We start a new chat,
    come back to that same chat, and start another chat. We will now build this app
    locally and make it available at localhost.
  prefs: []
  type: TYPE_NORMAL
- en: You can find the codebase at [https://github.com/jsbaan/ai-app-from-scratch](https://github.com/jsbaan/ai-app-from-scratch).
    Throughout this post I will link to specific lines of code with this hyperlink
    robot [🤖](https://github.com/jsbaan/ai-app-from-scratch) (try it!)
  prefs: []
  type: TYPE_NORMAL
- en: Microservices and APIs
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Modern web applications are often built using microservices – small, independent
    software components with a specific role. Each service runs in its own Docker
    container – an isolated environment independent of the underlying operating system
    and hardware. Services communicate with each other over a network using REST APIs.
  prefs: []
  type: TYPE_NORMAL
- en: You can think of a REST API as the interface that defines how to interact with
    a service by defining *endpoints* – specific URLs that represent the possible
    resources or actions, formatted like [http://hostname](http://hostname):port/endpoint-name
    Endpoints, also called paths or routes, are accessed with HTTP requests that can
    have various types like GET to retrieve data or POST to create data. Parameters
    can be passed in the URL itself or in the request body or header.
  prefs: []
  type: TYPE_NORMAL
- en: Architecture
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Let’s make this more concrete. We want a web page where users can chat with
    a language model and come back to their previous chats. Our architecture will
    look like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Local architecture of the app. Each service runs in its own Docker container
    and communicates over a private network. Made by author in draw.io.](../Images/6a327310808396833592bff41f3535cd.png)'
  prefs: []
  type: TYPE_IMG
- en: Local architecture of the app. Each service runs in its own Docker container
    and communicates over a private network. Made by author in draw.io.
  prefs: []
  type: TYPE_NORMAL
- en: The above architecture diagram shows how a user’s HTTP request to [localhost](http://localhost)
    on the left flows through the system. We will discuss and set up each individual
    service, starting with the backend services on the right. Finally, we discuss
    communication, networking and container orchestration.
  prefs: []
  type: TYPE_NORMAL
- en: 'The structure of this post follows the components in our architecture (click
    to jump to the section):'
  prefs: []
  type: TYPE_NORMAL
- en: '**[Language model API](https://towardsdatascience.com/designing-building-deploying-an-ai-chat-app-from-scratch-part-1-f1ebf5232d4d#35f8).**
    A llama.cpp language model inference server running the quantized Qwen2.5–0.5B-Instruct
    model [🤖.](https://github.com/jsbaan/ai-app-from-scratch/tree/main/lm-api)'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**[PostgreSQL database server](https://towardsdatascience.com/designing-building-deploying-an-ai-chat-app-from-scratch-part-1-f1ebf5232d4d#65d7).**
    A database that stores chats and messages [🤖.](https://github.com/jsbaan/ai-app-from-scratch/tree/main/db)'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**[Database API](https://towardsdatascience.com/designing-building-deploying-an-ai-chat-app-from-scratch-part-1-f1ebf5232d4d#7e22).**
    A FastAPI and Uvicorn Python server that queries the PostgreSQL database [🤖.](https://github.com/jsbaan/ai-app-from-scratch/tree/main/db-api)'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**[User interface](https://towardsdatascience.com/designing-building-deploying-an-ai-chat-app-from-scratch-part-1-f1ebf5232d4d#b75e).**
    A FastAPI and Uvicorn Python server that serves HTML and support session-based
    authentication [🤖.](https://github.com/jsbaan/ai-app-from-scratch/tree/main/chat-ui)'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**[Private Docker network](https://towardsdatascience.com/designing-building-deploying-an-ai-chat-app-from-scratch-part-1-f1ebf5232d4d#e572).**
    For communication between microservices [🤖.](https://github.com/jsbaan/ai-app-from-scratch/blob/main/compose.yaml#L2)'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Nginx** **reverse proxy.** A gateway between the outside world and network-isolated
    services [🤖.](https://github.com/jsbaan/ai-app-from-scratch/tree/main/nginx)'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**[Docker Compose](https://towardsdatascience.com/designing-building-deploying-an-ai-chat-app-from-scratch-part-1-f1ebf5232d4d#c29f).**
    A container orchestration tool to easily run manage our services together [🤖.](https://github.com/jsbaan/ai-app-from-scratch/blob/main/compose.yaml)'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 1\. Language model API
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Setting up the actual language model is pretty easy, nicely demonstrating that
    ML engineering is usually more about engineering than ML. Since I want our app
    to run on a laptop, model inference should be fast and CPU-based with low memory.
  prefs: []
  type: TYPE_NORMAL
- en: I looked at several inference engines, like [Fastchat with vLLM](https://github.com/lm-sys/FastChat/blob/main/docs/vllm_integration.md)
    or [Huggingface TGI](https://huggingface.co/docs/text-generation-inference/en/index),
    but went with [llama.cpp](https://github.com/ggerganov/llama.cpp/tree/master)
    because it’s popular, fast, lightweight and supports CPU-based inference. Llama.cpp
    is written in C/C++ and [conveniently provides a Docker image](https://github.com/ggerganov/llama.cpp/blob/master/examples/server/README.md)
    with its inference engine and a simple web server that implements the popular
    [OpenAI API specification](https://github.com/openai/openai-openapi?tab=readme-ov-file).
    It comes with a basic UI for experimenting, but we’ll build our own UI shortly.
  prefs: []
  type: TYPE_NORMAL
- en: As for the actual language model, I chose the quantized [Qwen2.5–0.5B-Instruct](https://huggingface.co/Qwen/Qwen2.5-0.5B-Instruct-GGUF)
    model from Alibaba Cloud, whose responses are surprisingly coherent given how
    small it is.
  prefs: []
  type: TYPE_NORMAL
- en: 1.1 Running the language model API
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The beauty of containerized applications is that, given a Docker image, we can
    have it running in seconds without installing any packages. The `docker run` command
    below pulls the llama.cpp server image, mounts the model file that we downloaded
    earlier to the container’s filesystem, and runs a container with the llama.cpp
    server listening for HTTP requests at port 80\. It uses flash attention and has
    max generation length of 512 tokens.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Ultimately we will use Docker Compose to run this container together with the
    others [🤖.](https://github.com/jsbaan/ai-app-from-scratch/blob/main/compose.yaml#L52)
  prefs: []
  type: TYPE_NORMAL
- en: 1.2 Accessing the container
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Since Docker containers are completely isolated from everything else on their
    host machine, i.e., our computer, we can’t reach our language model API yet.
  prefs: []
  type: TYPE_NORMAL
- en: However, we can break through a bit of networking isolation by publishing the
    container’s port 80 to our host machine’s port 8000 with `--publish 8000:80` in
    the docker run command. This makes the llama.cpp server available at [http://localhost:8000](http://localhost:8000).
  prefs: []
  type: TYPE_NORMAL
- en: The hostname [localhost](http://localhost) resolves to the loopback IP address
    127.0.0.1 and is part of the loopback network interface that allows a computer
    to communicate with itself. When we visit [http://localhost:8000](http://localhost:8000),
    our browser sends an HTTP GET request to our own computer on port 8000, which
    gets forwarded to the llama.cpp container listening at port 80.
  prefs: []
  type: TYPE_NORMAL
- en: 1.3 Testing the language model API
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let’s test the language model server by sending a POST request with a short
    chat history.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 'The response is JSON and the generated text is under `choices.message.content`:
    "An API (Application Programming Interface) is a specification…".'
  prefs: []
  type: TYPE_NORMAL
- en: Perfect! Ultimately, our UI service will be the one to send requests to the
    language model API, and define the system prompt and opening message [🤖.](https://github.com/jsbaan/ai-app-from-scratch/blob/main/chat-ui/app/main.py#L216)
  prefs: []
  type: TYPE_NORMAL
- en: 2\. PostgreSQL database server
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Next, let’s look into storing chats and messages. [PostgreSQL](https://www.postgresql.org/)
    is a powerful, open-source relational database and running a PostgreSQL server
    locally is just another another `docker run` command using its official image.
    We’ll pass some extra environment variables to configure the database name, username,
    and password.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: After publishing port 5432, the database server is available on localhost:5432\.
    PostgreSQL uses its own protocol for communication and doesn’t understand HTTP
    requests. We can use a database client like [psql](https://www.postgresql.org/docs/current/app-psql.html)
    to test the connection.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: When we deploy our application in [part 2](https://medium.com/towards-data-science/designing-building-deploying-an-ai-chat-app-from-scratch-part-2-c75f712eebe5),
    we will use a database managed by a cloud provider to make our lives easier and
    add more security, reliability and scalability. However, setting one up locally
    like this is useful for local development and, perhaps later on, integration tests.
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Database API
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Databases often have a separate API server sitting in front to control access,
    enforce extra security, and provide a simple, standardized interface that abstracts
    away the database’s complexity.
  prefs: []
  type: TYPE_NORMAL
- en: We will build this API from scratch with [FastAPI](https://fastapi.tiangolo.com/),
    a modern framework for building fast, production-ready Python APIs. We will run
    the API with [Uvicorn](https://www.uvicorn.org/), a high-performance Python web
    server that handles things like network communication and simultaneous requests.
  prefs: []
  type: TYPE_NORMAL
- en: 3.1 Quick FastAPI example
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let’s quickly get a feeling for FastAPI and look at a minimal example app with
    a single GET endpoint `/hello`.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: We can serve our app at [http://localhost:8080](http://localhost:8080) by running
    the Uvicorn server.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: 'If we now send a GET request to our endpoint by visiting [http://localhost:8080/hello](http://localhost:8080/hello)
    in our browser, we receive the JSON response `{"Hello": "World"}` !'
  prefs: []
  type: TYPE_NORMAL
- en: 3.2 Connecting to the database
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: On to the actual database API. We define four endpoints in [main.py 🤖](https://github.com/jsbaan/ai-app-from-scratch/blob/main/db-api/app/main.py)
    for creating or fetching chats and messages. You get a nice visual summary of
    these in the auto-generated docs, see below. The UI will call these endpoints
    to process user data.
  prefs: []
  type: TYPE_NORMAL
- en: '![A cool feature of FastAPI is that it automatically generates interactive
    documentation according to the OpenAPI specification with Swagger. If the Uvicorn
    server is running we can find it at http://hostname:port/docs. This is a screenshot
    of the doc web page.](../Images/c97e00c98146876c2976f36aa8f58ecf.png)'
  prefs: []
  type: TYPE_IMG
- en: A cool feature of FastAPI is that it automatically generates interactive documentation
    according to the [OpenAPI specification](https://www.openapis.org/) with [Swagger](https://swagger.io/).
    If the Uvicorn server is running we can find it at `http://hostname:port/docs`.
    This is a screenshot of the doc web page.
  prefs: []
  type: TYPE_NORMAL
- en: The first thing we need to do is to connect the database API to the database
    server. We use [SQLAlchemy](https://docs.sqlalchemy.org/en/13/orm/tutorial.html),
    a popular Python SQL toolkit and Object-Relational Mapper (ORM) that abstracts
    away writing manual SQL queries.
  prefs: []
  type: TYPE_NORMAL
- en: We establish this connection in [database.py 🤖](https://github.com/jsbaan/ai-app-from-scratch/blob/main/db-api/app/database.py)
    by creating the SQLAlchemy engine with a connection URL that includes the database
    hostname, username and password (remember, we configured these by passing them
    as environment variables to the PostgreSQL server). We also create a session factory
    that creates a new database session for each request to the database API.
  prefs: []
  type: TYPE_NORMAL
- en: 3.3 Interacting with the database
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Now let’s design our database. We define two SQLAlchemy data models in [models.py
    🤖](https://github.com/jsbaan/ai-app-from-scratch/blob/main/db-api/app/models.py)
    that will be mapped to actual database tables. The first is a M[essage model 🤖
    w](https://github.com/jsbaan/ai-app-from-scratch/blob/main/db-api/app/models.py#L43)ith
    an id, content, speaker role, owner_id, and session_id (more on this later). The
    second is a Ch[at model 🤖, w](https://github.com/jsbaan/ai-app-from-scratch/blob/main/db-api/app/models.py#L21)hich
    I’ll show here to get a better feeling for SQLAlchemy models:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: Database tables are typically created using migration tools like Alembic, but
    we’ll simply ask SQLAlchemy to create them in [main.py 🤖.](https://github.com/jsbaan/ai-app-from-scratch/blob/main/db-api/app/main.py#L19)
  prefs: []
  type: TYPE_NORMAL
- en: Next, we define the CRUD (Create, Read, Update, Delete) methods in [crud[.](https://github.com/jsbaan/ai-app-from-scratch/blob/main/db-api/app/main.py#L56)py
    🤖.](https://github.com/jsbaan/ai-app-from-scratch/blob/main/db-api/app/crud.py)
    These methods use a fresh database session from our factory to query the database
    and create new rows in our tables. The endpoints in m[ain.py](http://main.py)
    will import and use these CRUD methods 🤖.
  prefs: []
  type: TYPE_NORMAL
- en: 3.4 Endpoint request and response validation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: FastAPI is heavily based on [Python’s type annotations](https://fastapi.tiangolo.com/python-types/)
    and the data validation library [Pydantic](https://docs.pydantic.dev/latest/).
    For each endpoint, we can define a request and response schema that defines the
    input/output format we expect. Each request to or response from an endpoint is
    automatically validated and converted to the right data type and included in our
    API’s automatically generated documentation. If something about a request or response
    is missing or wrong, an informative error is thrown.
  prefs: []
  type: TYPE_NORMAL
- en: 'We define the Pydantic schemas for the database-api in [schemas.py 🤖](https://github.com/jsbaan/ai-app-from-scratch/blob/main/db-api/app/schemas.py)
    and use them in the endpoint definitions in m[ain.py 🤖,](https://github.com/jsbaan/ai-app-from-scratch/blob/main/db-api/app/main.py#L45)
    too. For example, this is the endpoint to create a new chat:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: We can see that it expects a ChatCreate request body and Chat response body.
    FastAPI verifies and converts the request and response bodies according to these
    schemas [🤖:](https://github.com/jsbaan/ai-app-from-scratch/blob/main/db-api/app/schemas.py)
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: 'Note: our SQLAlchemy models for the database should not be confused with these
    Pydantic schemas for endpoint input/output validation.'
  prefs: []
  type: TYPE_NORMAL
- en: 3.5 Running the database API
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We can serve the database API using Uvicorn, making it available at [http://localhost:8001](http://localhost:8001).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: To run the Uvicorn server in its own Docker container, we create a [Dockerfile
    🤖](https://github.com/jsbaan/ai-app-from-scratch/blob/main/db-api/Dockerfile)
    that specifies how to incrementally build the Docker image. We can then build
    the image and run the container, again making the database API available at h[ttp://localhost:8001](http://localhost:8001)
    after publishing the container’s port 80 to host port 8001\. We pass the database
    credentials and hostname as environment variables.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: 4\. User interface
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: With the backend in place, let’s build the frontend. A web interface typically
    consists of HTML for structure, CSS for styling and Javascript for interactivity.
    Frameworks like React, Vue, and Angular use higher-level abstractions like JSX
    that can ultimately be transformed into HTML, CSS, and JS files to be bundled
    and served by a web server like Nginx.
  prefs: []
  type: TYPE_NORMAL
- en: Since I want to focus on the backend, I hacked together a simple UI with FastAPI.
    Instead of JSON responses, its endpoints now return HTML based on template files
    that are rendered by [Jinja](https://jinja.palletsprojects.com/en/stable/), a
    templating engine that replaces variables in the template with real data like
    chat messages.
  prefs: []
  type: TYPE_NORMAL
- en: To handle user input and interact with the backend (e[.](https://github.com/jsbaan/ai-app-from-scratch/blob/main/chat-ui/app/main.py#L107)g.,
    retrieve chat history from the database API or generate a reply via the language
    model API), I’ve avoided JavaScript altogether by using [HTML forms 🤖](https://github.com/jsbaan/ai-app-from-scratch/blob/main/chat-ui/app/templates/home.html#L15)
    that trigger internal POST endpoints. These endpoints then simply use Python’s
    h[ttpx](https://www.python-httpx.org/) library to make HTTP requests 🤖.
  prefs: []
  type: TYPE_NORMAL
- en: Endpoints are defined in [main.py 🤖,](https://github.com/jsbaan/ai-app-from-scratch/blob/main/chat-ui/app/main.py)
    HTML templates are in the a[pp/templates directory 🤖,](https://github.com/jsbaan/ai-app-from-scratch/tree/main/chat-ui/app/templates)
    and the static CSS file for styling the pages is in the ap[p/static directory
    🤖. F](https://github.com/jsbaan/ai-app-from-scratch/tree/main/chat-ui/app/static)astAPI
    serves the CSS file at htt[p://hostname/static/style.css so](https://hostname/static/style.css)
    the browser can find it.
  prefs: []
  type: TYPE_NORMAL
- en: '![Screenshot of the UI''s interactive documentation.](../Images/9272207841a2b98c5d226bb9b5e9f260.png)'
  prefs: []
  type: TYPE_IMG
- en: Screenshot of the UI’s interactive documentation.
  prefs: []
  type: TYPE_NORMAL
- en: 4.1 Homepage
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The homepage allows users to enter their name to start or return to a chat [🤖.](https://github.com/jsbaan/ai-app-from-scratch/blob/main/chat-ui/app/main.py#L76)
    The submit button triggers a POST request to the internal /`chats` endpoint with
    username as form parameter, which calls the database API to create a new chat
    and then redirects to the C[hat Page 🤖.](https://github.com/jsbaan/ai-app-from-scratch/blob/main/chat-ui/app/main.py#L89)
  prefs: []
  type: TYPE_NORMAL
- en: 4.2 Chat Page
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The chat page calls the database API to retrieve the chat history [🤖[.](https://github.com/jsbaan/ai-app-from-scratch/blob/main/chat-ui/app/main.py#L184)](https://github.com/jsbaan/ai-app-from-scratch/blob/main/chat-ui/app/main.py#L143)
    Users can then enter a message that triggers a POST request to the internal /`generate/{chat_id}`
    endpoint with the message as form parameter 🤖.
  prefs: []
  type: TYPE_NORMAL
- en: The generate endpoint calls the database API to add the user’s message to the
    chat history, and then the language model API with the full chat history to generate
    a reply [🤖.](https://github.com/jsbaan/ai-app-from-scratch/blob/main/chat-ui/app/main.py#L216)
    After adding the reply to the chat history, the endpoint redirects to the chat
    page, that again retrieves and displays the latest chat history. We send POST
    request to the LM API using httpx, but we could use a more standardized LM API
    package like langchain to invoke its completion endpoint.
  prefs: []
  type: TYPE_NORMAL
- en: 4.3 Authentication & user sessions
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: So far, all users can access all endpoints and all data. This means anyone can
    see your chat given your username or chat id. To remedy that, we will use session-based
    authentication and authorization.
  prefs: []
  type: TYPE_NORMAL
- en: We will store a first party & GDRP compliant signed session cookie in the user’s
    browser [🤖.](https://github.com/jsbaan/ai-app-from-scratch/blob/main/chat-ui/app/main.py#L61)
    This is just an encrypted dict-like object in the request/response header. The
    user’s browser will send that session cookie with each request to our hostname,
    so that we can identify and verify a user user and show them their own chats only.
  prefs: []
  type: TYPE_NORMAL
- en: As an extra layer of security, we "scope" the database API such that each chat
    row and each message row in the database contains a session id. For each request
    to the database API, we include the current user’s session id in the request header
    and query the database with both the chat id (or username) AND that session id.
    This way, the database can only ever return chats for the current user with its
    unique session id [🤖.](https://github.com/jsbaan/ai-app-from-scratch/blob/main/db-api/app/crud.py#L65)
  prefs: []
  type: TYPE_NORMAL
- en: 4.4 Running the UI
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To run the UI in a Docker container, we follow the same recipe as the database
    API, adding the hostnames of the database API and language model API as environment
    variables.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: How do we know the hostnames of the two APIs? We will look networking and communication
    next.
  prefs: []
  type: TYPE_NORMAL
- en: 5\. Private Docker network
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Let’s zoom out and take a look at our architecture again. By now, we have four
    containers: the UI, DB API, LM API, and PostgreSQL database. What’s missing is
    the network, reverse proxy and container orchestration.'
  prefs: []
  type: TYPE_NORMAL
- en: '![Our app''s microservices architecture. Made by author in draw.io.](../Images/6a327310808396833592bff41f3535cd.png)'
  prefs: []
  type: TYPE_IMG
- en: Our app’s microservices architecture. Made by author in draw.io.
  prefs: []
  type: TYPE_NORMAL
- en: Until now, we used our computer’s [localhost](http://localhost) loopback network
    to send requests to an individual container. This was possible because we published
    their ports to our localhost. However, for containers to communicate with each
    other, they must be connected to the same network and know each others hostname/IP
    address and port.
  prefs: []
  type: TYPE_NORMAL
- en: 'We will create a [user-defined bridge Docker network](https://docs.docker.com/network/drivers/bridge/#differences-between-user-defined-bridges-and-the-default-bridge)
    that provides automatic DNS resolution. This means that container names are resolved
    to their dynamic container’s IP address. The network also provides isolation,
    and therefore security: you have to be on the same network to be able to reach
    our containers.'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: We connect all containers to it by adding `--network chat-net` to their docker
    run command. Now, the database API can reach the database at db:5432 and the UI
    can reach the database API at [http://db-api](http://db-api) and the language
    model API at [http://lm-api](http://lm-api). Port 80 is default for HTTP requests
    so we can omit it.
  prefs: []
  type: TYPE_NORMAL
- en: 6\. Nginx reverse proxy
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now, how do we – the user – reach our network-isolated containers? During development
    we published the UI container port to our [localhost](http://localhost), but in
    a realistic scenario you typically use a reverse proxy. This is another web server
    that acts like a gateway, forwarding HTTP requests to containers in their private
    network, enforcing security and isolation.
  prefs: []
  type: TYPE_NORMAL
- en: '[Nginx](https://nginx.org/en/) is a web server often used as reverse proxy.
    We can easily run it using its official [Docker image](https://hub.docker.com/_/nginx).
    We also mount a [configuration file 🤖](https://github.com/jsbaan/ai-app-from-scratch/blob/main/nginx/nginx.conf)
    in which we specify how Nginx should route incoming requests. As an example, the
    simplest possible configuration forwards all requests (location / ) from Nginx
    container’s port 80 to the UI container at h[ttp://chat-ui.](http://chat-ui)'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: Since the Nginx container is in same private network, we can’t reach it either.
    However, we can publish its port so it becomes the only access point of our entire
    app [🤖.](https://github.com/jsbaan/ai-app-from-scratch/blob/main/compose.yaml#L64)
    A request to l[ocalhost](http://localhost) now goes to the Nginx container, who
    forwards it to the UI and the UI’s response back to us.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: In [part 2](https://medium.com/towards-data-science/designing-building-deploying-an-ai-chat-app-from-scratch-part-2-c75f712eebe5)
    we will see that these gateway servers can also distribute incoming requests over
    copies of the same containers (load balancing) for scalability; enable secure
    HTTPS traffic; and do advanced routing and caching. We will use an Azure-managed
    reverse proxy rather this Nginx container, but I think it’s very useful to understand
    how they work and how to set one up yourself. It can also be significantly cheaper
    compared to a managed reverse proxy.
  prefs: []
  type: TYPE_NORMAL
- en: 7\. Docker Compose
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Let’s put everything together. Throughout this post we manually pulled or built
    each image and ran its container. However, in the codebase I’m actually using
    [Docker Compose](https://docs.docker.com/compose/): a tool designed to define,
    run and stop multi-container applications on a single host like our computer.'
  prefs: []
  type: TYPE_NORMAL
- en: To use Docker Compose, we simply specify a [compose.yml file 🤖](https://github.com/jsbaan/ai-app-from-scratch/blob/main/compose.yaml)
    with build and run instructions for each service. A cool feature is that it automatically
    creates a user-defined bridge network to connect our services. Docker DNS will
    resolve the service names to container IP addresses.
  prefs: []
  type: TYPE_NORMAL
- en: 'Inside the project directory we can start all services with a single command:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: Final thoughts
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: That wraps it up! We built an AI-powered chat web application that runs on our
    local computer, learning about microservices, REST APIs, FastAPI, Docker (Compose),
    reverse proxies, PostgreSQL databases, SQLAlchemy, and llama.cpp. We’ve built
    it with a cloud-native architecture in mind so we can deploy our app without changing
    a single line of code.
  prefs: []
  type: TYPE_NORMAL
- en: We will discuss deployment in [part 2](https://medium.com/towards-data-science/designing-building-deploying-an-ai-chat-app-from-scratch-part-2-c75f712eebe5)
    and cover Kubernetes, the industry-standard container orchestration tool for large-scale
    applications across multiple hosts; Azure Container Apps, a serverless platform
    that abstracts away some of Kubernetes’ complexities; and concepts like load balancing,
    horizontal scaling, HTTPS, etc.
  prefs: []
  type: TYPE_NORMAL
- en: Roadmap
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: There is a lot we could do to improve this app. Here are some things I would
    work on given more time.
  prefs: []
  type: TYPE_NORMAL
- en: '**Language model.** We now use a very general instruction-tuned language model
    as virtual assistant. I originally started this project to have a "virtual representation
    of me" on my website for visitors to discuss my research with, based on my scientific
    publications. For such a use case, an important direction is to improve and tweak
    the language model output. Perhaps that’ll become a part 3 of this series in the
    future.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Frontend.** Instead of a quick FastAPI UI, I’d build a proper frontend using
    something like React, Angular or Vue to allow things like steaming LM responses
    and dynamic views rather than reloading the page every time. A more lightweight
    alternative that I’d like to experiment with is htmx, a library that provides
    modern browser features directly from HTML rather than javascript. It would be
    pretty straightforward to implement LM response streaming, for example.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Reliability.** To make the system more mature, I’d add unit and integration
    tests and a better database setup like Alembic allowing for migrations.'
  prefs: []
  type: TYPE_NORMAL
- en: Acknowledgements
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Thanks to Dennis Ulmer, Bryan Eikema and David Stap for initial feedback or
    proofreading.
  prefs: []
  type: TYPE_NORMAL
- en: AI usage
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I used Pycharm’s CoPilot plugin for code completion, and ChatGPT for a first
    version of the HTML and CSS template files. Towards the end, I started experimenting
    more with debugging and sparring too, which proved surprisingly useful. For example,
    I used it to learn about Nginx configurations and session cookies in FastAPI.
    I did not use AI to write this post, though I did use ChatGPT to paraphrase a
    few bad-running sentences.
  prefs: []
  type: TYPE_NORMAL
