- en: How I Built and Deployed an App in 2 days with Lovable, Supabase, and Netlify
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何在2天内使用Lovable、Supabase和Netlify构建和部署应用程序
- en: 原文：[https://towardsdatascience.com/how-i-built-and-deployed-an-app-in-2-days-with-lovable-supabase-and-netlify/](https://towardsdatascience.com/how-i-built-and-deployed-an-app-in-2-days-with-lovable-supabase-and-netlify/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/how-i-built-and-deployed-an-app-in-2-days-with-lovable-supabase-and-netlify/](https://towardsdatascience.com/how-i-built-and-deployed-an-app-in-2-days-with-lovable-supabase-and-netlify/)
- en: <mdspan datatext="el1758043563006" class="mdspan-comment">I always wanted</mdspan>
    to create something on my own. I had ideas but did not have the time and resources
    to work on them.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1758043563006" class="mdspan-comment">我一直想</mdspan>自己创造一些东西。我有想法，但没有时间和资源去实现它们。
- en: The chance of developing apps or other software products for non-developers
    has greatly increased with the advancements of LLMs, as Andrej Karpathy also emphasized
    with the term “vibe coding”.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 随着LLMs（例如Andrej Karpathy用“氛围编码”一词强调的）的进步，非开发者开发应用程序或其他软件产品的机会大大增加。
- en: There's a new kind of coding I call "vibe coding", where you fully give in to
    the vibes, embrace exponentials, and forget that the code even exists. It's possible
    because the LLMs (e.g. Cursor Composer w Sonnet) are getting too good. Also I
    just talk to Composer with SuperWhisper…
  id: totrans-4
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我称这种新的编码方式为“氛围编码”，其中你完全沉浸在其中，拥抱指数增长，并忘记代码的存在。这是可能的，因为LLMs（例如Cursor Composer
    w Sonnet）变得越来越好。此外，我只是用SuperWhisper与Composer交谈…
- en: ''
  id: totrans-5
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — Andrej Karpathy (@karpathy) [February 2, 2025](https://twitter.com/karpathy/status/1886192184808149383?ref_src=twsrc%5Etfw)
  id: totrans-6
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — Andrej Karpathy (@karpathy) [2025年2月2日](https://twitter.com/karpathy/status/1886192184808149383?ref_src=twsrc%5Etfw)
- en: I wanted to take my chance with vibe coding and create a web app. This was more
    of an experiment to prove that I can build and deploy an app in 2 days. It didn’t
    have to be perfect, the minimum viable product would do the job.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 我想尝试氛围编码，并创建一个网络应用程序。这更像是一个实验，旨在证明我可以在两天内构建和部署一个应用程序。它不必完美，最小可行产品就能完成任务。
- en: In this article, I’ll provide a high-level overview of the process including
    some tips and tricks about the tools I used and how much I spent on them. If you’d
    like to see the end product first, it’s [drawcraft.io](https://drawcraft.io/).
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我将提供一个高级概述的过程，包括一些关于我使用的工具和我在它们上的花费的技巧和窍门。如果你想先看看最终产品，请访问 [drawcraft.io](https://drawcraft.io/)。
- en: I used Lovable, Supabase, and Netlify in this project.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个项目中，我使用了Lovable、Supabase和Netlify。
- en: Lovable is a highly popular AI app builder.
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Lovable 是一个非常受欢迎的AI应用程序构建器。
- en: Supabase is a development platform handling all backend-related processes. The
    seamless integration between Lovable and Supabase is an important advantage.
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Supabase 是一个处理所有后端相关流程的开发平台。Lovable和Supabase之间的无缝集成是一个重要的优势。
- en: Netlify is used for deploying the app. It also handles domain name purchases
    (if desired).
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Netlify 用于部署应用程序。它还处理域名购买（如果需要）。
- en: Before I start using any of these tools, I watched a few Youtube videos on people
    using and developing with them. I’d like to point out that I don’t have any affiliation
    with any of these tools.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 在我开始使用这些工具之前，我观看了几个关于人们使用和开发这些工具的YouTube视频。我想指出的是，我与这些工具中的任何一方都没有任何关联。
- en: Building with Lovable
  id: totrans-14
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用Lovable进行构建
- en: Lovable has both free and paid plans. The pro plan has multiple pricing options
    with different credit amounts. I purchased the cheapest one for $25 per month,
    which gives you 100 credits. You also get 5 free credits per day.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: Lovable 提供免费和付费计划。专业计划有多种定价选项，不同积分数量。我购买了最便宜的每月25美元的计划，这给你100个积分。你每天还可以获得5个免费积分。
- en: 100 credit does not mean exactly 100 prompts but the number of credits you spend
    is directly proportional to the number of messages (i.e. prompts).
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 100个积分并不完全等于100个提示，但你花费的积分数量与消息数量（即提示数量）成正比。
- en: When you build with Lovable, it’s suggested to have a detailed first prompt
    with clear instructions. If you write a very simple first prompt (e.g. Build a
    calendar app), you’ll need to write a lot of messages (i.e. spend credits) to
    customize it. Also, adding complex features afterwards may be slightly more complicated
    than declaring them at first.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 当你使用Lovable进行构建时，建议有一个详细的第一条提示，并包含清晰的指示。如果你写一个非常简单的第一条提示（例如，构建一个日历应用程序），你可能需要写很多消息（即花费积分）来定制它。此外，之后添加复杂功能可能比一开始就声明它们稍微复杂一些。
- en: 'With that being said, here is the first prompt I used:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 话虽如此，这是我使用的第一个提示：
- en: '[PRE0]'
  id: totrans-19
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: The first design turned out to be pretty good but I had to make some adjustments.
    After the initial prompt, I mainly used messages with only one instruction. You
    can also edit the code on Lovable UI for making changes and these changes do not
    consume your credits.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个设计结果相当不错，但我不得不做一些调整。在初始提示之后，我主要使用只有一条指令的消息。你也可以在 Lovable UI 上编辑代码来做出更改，这些更改不会消耗你的积分。
- en: Supabase integration
  id: totrans-21
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Supabase 集成
- en: Although I wrote in my initial prompt to add authentication and subscription,
    it didn’t work because of lacking a proper backend. This is where Supabase came
    into play.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然我在初始提示中提到要添加身份验证和订阅，但由于缺乏适当的后端，它并没有起作用。这就是 Supabase 发挥作用的地方。
- en: It’s very easy to add Supabase in your Lovable projects. You just create a Supabase
    account and follow the steps to integrate it to your project on Lovable UI.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Lovable 项目中添加 Supabase 非常简单。你只需创建一个 Supabase 账户，然后按照步骤在 Lovable UI 上将其集成到你的项目中。
- en: Once Supabase integration is complete, Lovable can write the code for adding
    user authentication, creating database tables, adding edge functions to handle
    backend tasks.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦完成 Supabase 集成，Lovable 就可以编写代码来添加用户身份验证、创建数据库表、添加边缘函数来处理后端任务。
- en: One **problem** I had was that it was continuously sending requests to check
    user subscription status. I detected this problem by manually checking the network
    activity. I had to spend a few messages for Lovable to fix this problem. This
    could have been an easy fix if you are a developer. I could solve it on my own
    but had to spend some time on it. I just wanted to move fast and use Lovable for
    everything.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 我遇到的另一个**问题**是它持续发送请求来检查用户订阅状态。我通过手动检查网络活动来检测这个问题。我不得不花几条消息让 Lovable 修复这个问题。如果你是开发者，这可能是一个简单的修复。我自己可以解决这个问题，但花了一些时间。我只是想快速行动并使用
    Lovable 做所有事情。
- en: Supabase free tier limits were quickly consumed and I had to upgrade to a paid
    plan, which costs $25 per month. I think the problem I mentioned above consumed
    most of my limit.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: Supabase 免费层限制很快就被用完了，我不得不升级到付费计划，每月费用为 25 美元。我认为我提到的问题消耗了我大部分的限制。
- en: GitHub Integration
  id: totrans-27
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: GitHub 集成
- en: Lovable makes it very easy to integrate your GitHub account. You can follow
    the instructions on Lovable UI to complete the integration and create the project
    in GitHub.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: Lovable 使得集成 GitHub 账户变得非常简单。你可以按照 Lovable UI 上的说明完成集成，并在 GitHub 中创建项目。
- en: '![](../Images/4cc30bf9524eed88f9dc02a5100c36a8.png)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/4cc30bf9524eed88f9dc02a5100c36a8.png)'
- en: '**Important**: Keep in mind that every change Lovable makes on your project
    is automatically committed to the default branch on GitHub. This is a two-way
    integration so if you make changes on the default branch using an IDE or GitHub
    UI, these changes are automatically applied to your Lovable project.'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: '**重要**：请记住，Lovable 在你的项目上所做的每个更改都会自动提交到 GitHub 上的默认分支。这是一个双向集成，所以如果你使用 IDE
    或 GitHub UI 在默认分支上做出更改，这些更改会自动应用到你的 Lovable 项目上。'
- en: Another **problem** I had was about working with multiple branches. In Lovable
    docs, it’s stated that Lovable always commits to the default branch. The default
    branch was the main branch at first. However, when I created a new branch and
    set it as default branch, this change wasn’t reflected on Lovable. It kept committing
    to the main branch.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 我遇到的另一个**问题**是关于处理多个分支。在 Lovable 文档中，提到 Lovable 总是提交到默认分支。最初，默认分支是主分支。然而，当我创建了一个新的分支并将其设置为默认分支时，这个更改并没有在
    Lovable 上反映出来。它仍然提交到主分支。
- en: One of Youtube videos shows an option to change the branch on Lovable UI but
    I could not find it. It seems like Lovable UI changed after that. Maybe it doesn’t
    exist anymore. This wasn’t a blockage for me so I moved on but I definitely want
    to learn the solution to this problem.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 一段 YouTube 视频展示了在 Lovable UI 上更改分支的选项，但我找不到它。看起来 Lovable UI 在那之后有所改变。也许它已经不再存在了。这对我来说并不是一个障碍，所以我继续前进，但我确实想学习这个问题的解决方案。
- en: Deploying the App
  id: totrans-33
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 部署应用
- en: There are many alternatives to deploy your app. I didn’t give much thoughts
    to this step. I’ve seen a few people using Netlify so I just wanted to try it.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 部署你的应用有许多替代方案。我没有在这个步骤上花太多心思。我看到一些人使用 Netlify，所以我只是想试一试。
- en: Netlify offers a free plan, which was enough for me. It gives you 300 credits
    and each deploy costs 15 credits.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: Netlify 提供了一个免费计划，对我来说已经足够了。它给你 300 个积分，每次部署需要 15 个积分。
- en: Once you create an account, you can add your GitHub project on Netlify by following
    the instructions.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你创建了账户，你可以按照说明将你的 GitHub 项目添加到 Netlify。
- en: You can use a Netlify domain name for free or buy a custom domain name through
    Netlify. You can of course buy your domain elsewhere and use it on Netlify.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以使用Netlify提供的免费域名，或者通过Netlify购买自定义域名。当然，您也可以在其他地方购买域名并在Netlify上使用。
- en: '**Important**: By default, Netlify automatically deploys your site whenever
    you commit to your production branch. As I mentioned earlier, Lovable automatically
    push commits to the default branch. So if your default branch is used as your
    production branch, which is definitely not a good practice, whenever you make
    a change on Lovable, Netlify will make a deployment. The problem with this is
    you’ll quickly consume your free Netlify credits.'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: '**重要提示**：默认情况下，Netlify会在您对生产分支进行提交时自动部署您的网站。正如我之前提到的，Lovable会自动将提交推送到默认分支。所以如果您的默认分支被用作生产分支，这绝对不是一种好做法，每次您在Lovable上做出更改时，Netlify都会进行部署。问题是您会很快消耗掉您的免费Netlify积分。'
- en: Lovable’s Performance
  id: totrans-39
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Lovable的表现
- en: Lovable did a great job putting together an entire web app. However, the end
    product is not perfect. Once I deployed the site and started using it, I noticed
    some problems. The good thing is they were all minor problems and I was able to
    have Lovable fix them.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: Lovable出色地整合了一个完整的Web应用程序。然而，最终产品并不完美。一旦我部署了网站并开始使用它，我就发现了某些问题。幸运的是，这些问题都是小问题，并且我能够让Lovable修复它们。
- en: I also wanted to add some sample drawings to drawcraft.io. I tried doing it
    through Lovable by attaching drawings in the chat but it didn’t work. Then, I
    uploaded the sample drawings on GitHub UI and asked Lovable to create a “free
    sample drawings” box on the site using those images and it worked.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 我还想要在drawcraft.io上添加一些示例绘图。我尝试通过Lovable在聊天中附加绘图来完成，但失败了。然后，我在GitHub UI上上传了示例绘图，并要求Lovable在网站上使用这些图像创建一个“免费示例绘图”框，这样它就成功了。
- en: How Much I Spent
  id: totrans-42
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 我花费了多少钱
- en: '|  | Cost (USD) | Detail |'
  id: totrans-43
  prefs: []
  type: TYPE_TB
  zh: '|  | 成本（美元） | 详细信息 |'
- en: '| Lovable | 25 | Monthly subscription |'
  id: totrans-44
  prefs: []
  type: TYPE_TB
  zh: '| Lovable | 25 | 每月订阅费 |'
- en: '| Supabase | 25 | Monthly subscription |'
  id: totrans-45
  prefs: []
  type: TYPE_TB
  zh: '| Supabase | 25 | 每月订阅费 |'
- en: '| drawcraft.io | 47 | Domain name purchase for 1 year |'
  id: totrans-46
  prefs: []
  type: TYPE_TB
  zh: '| drawcraft.io | 47 | 1年域名购买费用 |'
- en: '| OpenAI API | 5 | Cost of API calls for prompting and testing |'
  id: totrans-47
  prefs: []
  type: TYPE_TB
  zh: '| OpenAI API | 5 | 提示和测试API调用的费用 |'
- en: I spent a total of $102 to create my first web app. It’s a simple app that does
    a simple thing but my goal was to see if I would actually be able to create a
    functional website using AI-based tools.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 我总共花费了102美元来创建我的第一个Web应用程序。这是一个简单的应用程序，只做简单的事情，但我的目标是看看我是否真的能够使用基于AI的工具创建一个功能性的网站。
- en: It’s important to note that some of these spendings can be used for other projects.
    Now, it’s up to me to come up with more ideas and turn them into action.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 重要的是要注意，这些支出中的一些可以用作其他项目。现在，取决于我能否想出更多想法并将它们付诸行动。
- en: Thanks for reading. Please let me know if you have any feedback.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢您的阅读。如果您有任何反馈，请告诉我。
