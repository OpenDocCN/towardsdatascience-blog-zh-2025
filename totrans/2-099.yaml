- en: What Is a Query Folding in Power BI and Why should You Care?
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 什么是Power BI中的查询折叠，为什么你应该关心？
- en: 原文：[https://towardsdatascience.com/what-is-a-query-folding-in-power-bi-and-why-should-i-care/](https://towardsdatascience.com/what-is-a-query-folding-in-power-bi-and-why-should-i-care/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/what-is-a-query-folding-in-power-bi-and-why-should-i-care/](https://towardsdatascience.com/what-is-a-query-folding-in-power-bi-and-why-should-i-care/)
- en: '<mdspan datatext="el1753475468667" class="mdspan-comment">“Will that break</mdspan>
    a query folding?” “Does your query fold?”… Maybe someone asked you those questions,
    but you were like: “Query…Whaaaat?!”'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '[“那会破坏查询折叠吗？” “你的查询会折叠吗？”……也许有人问过你这些问题，但你可能像这样回答：“查询……什么？！”]'
- en: Or, maybe you’ve heard about query folding in Power BI, but didn’t know how
    to take advantage of it in real-life scenarios.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，也许你听说过Power BI中的查询折叠，但不知道如何在现实场景中利用它。
- en: If you recognized yourself in (at least) one of the two situations specified
    above, then please continue reading this article.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你（至少）在上述两种情况中认识到了自己，那么请继续阅读这篇文章。
- en: Fine, you are curious to find out what a Query folding is. But, first things
    first…Before you proceed, we need to establish some theoretical foundations, which
    will put the Query folding feature in the proper context.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧，你对查询折叠是什么感到好奇。但是，首先……在你继续之前，我们需要建立一些理论基础，这将把查询折叠功能置于适当的背景中。
- en: Data Shaping
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据塑形
- en: '[<mdspan datatext="el1753474722551" class="mdspan-comment">I’ve already written
    about data shaping</mdspan>](https://data-mozart.com/power-bi-data-shaping-in-a-nutshell/) and
    why it is one of the key concepts in the data preparation phase. Now, I would
    like to expand on that in a (maybe) unusual way:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: '[我已经写过了数据塑形](https://data-mozart.com/power-bi-data-shaping-in-a-nutshell/)以及为什么它是数据准备阶段的关键概念之一。现在，我想以一种（可能）不寻常的方式进一步探讨：'
- en: I guess you all know about the book written by Thomas More, called “Utopia”.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 我想你们都知道托马斯·莫尔写的书，名为“乌托邦”。
- en: In that story, everything is perfect and everyone is satisfied. In an ideal
    world, let’s call it “Data Utopia”, we have clean, high-quality data that just
    flies into our reports “as-is”, without needing to perform any kind of face-lifting
    or transformations along the way. Unfortunately, “Data Utopia” can exist only
    in books — the reality is crueler — as we have to deal with numerous challenges
    while nurturing our data.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 在那个故事中，一切都很完美，每个人都感到满意。在一个理想的世界里，让我们称之为“数据乌托邦”，我们有干净、高质量的数据直接飞入我们的报告“原样”，无需在途中进行任何美容或转换。不幸的是，“数据乌托邦”只存在于书中——现实是残酷的——因为我们必须在我们培养数据的同时应对众多挑战。
- en: That being said, one of the key concepts that we have to absorb is Data Shaping.
    Data shaping is the process you should perform once you get familiar with your
    data, and become aware of possible pitfalls within the data you are planning to
    use in your ***business intelligence*** solution.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 话虽如此，我们必须吸收的一个关键概念是数据塑形。数据塑形是在你熟悉你的数据，并意识到你计划在你的**商业智能**解决方案中使用的数据中可能存在的潜在陷阱之后应该执行的过程。
- en: I’ve intentionally used the term “Business Intelligence” instead of “Power BI”,
    as this is a general concept that should be used outside of Power BI solutions
    too.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 我故意使用了“商业智能”这个词而不是“Power BI”，因为这是一个应该用于Power BI解决方案之外的一般概念。
- en: 'In simple words, data shaping is the process of data consolidation, **BEFORE**
    it becomes part of your data model. The key thing to keep in mind is the word:
    BEFORE! So, one would perform data shaping before the data goes into the report
    itself. Data shaping can be done at different places, and, depending on where
    you apply data shaping techniques, at different points in time during the data
    preparation process.'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 简单来说，数据塑形是数据整合的过程，**在**它成为你的数据模型的一部分之前。关键是要记住这个词：**在**！所以，一个人会在数据进入报告本身之前进行数据塑形。数据塑形可以在不同的地方进行，并且，根据你应用数据塑形技术的位置，在数据准备过程中的不同时间点进行。
- en: '*WHERE should you perform data shaping?*'
  id: totrans-13
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '*在哪里执行数据塑形？*'
- en: Source Database — This is the most obvious choice and in most cases the most
    desirable scenario. It is based on traditional data warehousing principles of Extracting-Transforming-Loading
    (ETL) data. In this scenario, you define what data you want to extract (not all
    data from the database is needed, and [it’s usually not a good idea to import
    all the data](https://data-mozart.com/how-to-reduce-your-power-bi-model-size-by-90/)). Then,
    you decide if your data needs to be transformed along the way, to suit your reporting
    needs better — for example, do you want to perform currency conversion, or do
    you need to conform country and city names?
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 源数据库——这是最明显的选择，并且在大多数情况下是最理想的情况。它基于传统的数据仓库原则，即提取-转换-加载（ETL）数据。在这种情况下，你定义你想要提取的数据（不是数据库中的所有数据都是必需的，并且通常不建议导入所有数据。[如何通过90%减少你的Power
    BI模型大小](https://data-mozart.com/how-to-reduce-your-power-bi-model-size-by-90/)）。然后，你决定你的数据是否需要在转换过程中进行转换，以更好地满足你的报告需求——例如，你是否需要进行货币转换，或者你是否需要统一国家和城市名称？
- en: Do you recognize the city in the following image?
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 你能认出以下图片中的城市吗？
- en: '![](../Images/5d88828cdde667d0d27683d727739f5e.png)'
  id: totrans-16
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/5d88828cdde667d0d27683d727739f5e.png)'
- en: '[Image by Lukas Kloeppel on Pexels](https://www.pexels.com/photo/empire-state-building-new-york-466685/)'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: '[图片由Lukas Kloeppel在Pexels提供](https://www.pexels.com/photo/empire-state-building-new-york-466685/)'
- en: Yes, it’s New York. Or, is it NYC? Or, is it New York City? Which one of these
    three names is correct? Yes, all of them are correct — but if you import the data
    into your data model like this, you will get incorrect results — as each New York,
    NYC, and New York City will be treated as a separate entity. This, and many more
    potential caveats, need to be solved during the Data Shaping phase, and that’s
    why it’s important to spend some time massaging your data.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，它是纽约。或者，它是NYC？或者，它是纽约市？这三个名称中的哪一个才是正确的？是的，它们都是正确的——但是如果你以这种方式将数据导入你的数据模型，你将得到错误的结果——因为每个New
    York、NYC和New York City都将被视为一个单独的实体。这一点以及许多其他潜在的问题，都需要在数据塑形阶段解决，这就是为什么花些时间对数据进行“按摩”很重要。
- en: Power Query
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Power Query
- en: If you don’t perform data transformations on the source side, the next station
    is Power Query — it’s the built-in tool within Power BI, that [enables you to
    perform all kinds of transformations to your data](https://data-mozart.com/power-query-tips-for-every-power-bi-developer/).
    According to Microsoft’s official documentation, you can apply more than 300 different
    transformations!
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不在源端执行数据转换，下一个站点就是Power Query——它是Power BI内置的工具，它[使你能够对你的数据进行各种转换](https://data-mozart.com/power-query-tips-for-every-power-bi-developer/)。根据微软的官方文档，你可以应用超过300种不同的转换！
- en: The key advantage of Power Query is that you can perform complex data transformations
    with little or no coding skills! Additionally, all steps you’ve applied during
    the data transformation process are being saved, so every time you refresh your
    dataset, those steps will be automatically applied to shape your data and prepare
    it for consumption via reports.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: Power Query的关键优势在于，你可以用很少或没有编程技能来执行复杂的数据转换！此外，你在数据转换过程中应用的每一个步骤都被保存下来，所以每次你刷新你的数据集时，这些步骤都会自动应用来塑造你的数据，并准备通过报告进行消费。
- en: Under the hood of Power Query is a Mashup engine, that enables your data shaping
    to run smoothly. Power Query uses a very powerful M language for data manipulation.
    And, now you are probably asking yourselves, what does all this story about data
    shaping, Power Query, Mashup engine, M language, etc. have to do with Query folding?
    I don’t blame you, it’s a fair question, but we will come back soon to answer
    it.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 在Power Query的底层是一个Mashup引擎，它使你的数据塑形能够顺利运行。Power Query使用一种非常强大的M语言进行数据处理。现在你可能正在问自己，关于数据塑形、Power
    Query、Mashup引擎、M语言等的故事与查询折叠有什么关系？我不怪你，这是一个合理的问题，但我们很快就会回来回答它。
- en: What is a Query folding?
  id: totrans-23
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是查询折叠？
- en: For some data sources, such as relational databases, but also non-relational
    data sources, for example, OData, AD, or Exchange, the Mashup engine is able to
    “translate” M language to a language that the underlying data source will “understand”
    — in most cases, it’s SQL.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 对于某些数据源，例如关系型数据库，以及非关系型数据源，例如OData、AD或Exchange，Mashup引擎能够将M语言“翻译”成底层数据源能够“理解”的语言——在大多数情况下，它是SQL。
- en: '![](../Images/c0b11dcb654380bc7ac7beec15e39464.png)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/c0b11dcb654380bc7ac7beec15e39464.png)'
- en: '[Photo by Josh Sorenson on Pexels](https://www.pexels.com/photo/ethernet-cables-plugged-on-a-server-rack-1054397/)'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: '[照片由Josh Sorenson在Pexels提供](https://www.pexels.com/photo/ethernet-cables-plugged-on-a-server-rack-1054397/)'
- en: By pushing complex calculations and transformations directly to a source, Power
    Query leverages the capabilities of the robust relational database engines, that
    are built to cope with large volumes of data in the most efficient way.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 通过直接将复杂的计算和转换推送到源，Power Query 利用强大关系数据库引擎的能力，这些引擎旨在以最有效的方式处理大量数据。
- en: That ability of Power Query’s Mashup engine to create a single SQL statement
    combining all M statements behind your transformations is what we call Query folding.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: Power Query 的 Mashup 引擎能够创建一个结合所有 M 语句的单一 SQL 语句的能力，我们称之为查询折叠。
- en: Or, let`s make it simple: ***if the Mashup engine is able to generate a single
    SQL query that is going to be executed on the data source side, we say that the
    query folds***.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，让我们简单一点：**如果 Mashup 引擎能够生成一个将在数据源端执行的单个 SQL 查询，我们称该查询为折叠**。
- en: Data sources that support Query folding
  id: totrans-30
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 支持查询折叠的数据源
- en: As already mentioned, the most obvious beneficiary of query folding is relational
    database sources, such as SQL Server, Oracle, or MySQL. However, it`s not just
    that SQL databases take advantage of the query folding concept. Essentially, any
    data source that supports some kind of querying language can possibly take advantage
    of query folding. Those other data sources are OData, SSAS, SharePoint lists,
    Exchange, and Entra ID.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，查询折叠的最大受益者是关系数据库源，例如 SQL Server、Oracle 或 MySQL。然而，并不仅仅是 SQL 数据库利用了查询折叠的概念。本质上，任何支持某种查询语言的数据源都可能利用查询折叠。这些其他数据源包括
    OData、SSAS、SharePoint 列表、Exchange 和 Entra ID。
- en: On the other hand, when you use data sources such as Excel files, BLOB storage
    files, flat files, etc. in your Power BI datasets, the query can’t fold.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，当你使用 Excel 文件、BLOB 存储文件、平面文件等数据源作为你的 Power BI 数据集时，查询无法折叠。
- en: Data Transformations that support Query folding
  id: totrans-33
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 支持查询折叠的数据转换
- en: However, when it comes to data sources that support query folding in general,
    it’s important to keep in mind that **not all transformations** can be folded
    and pushed to a data source. So, just to be clear, the fact that a SQL database
    supports query folding doesn’t necessarily mean that your query will fold! There
    are some Power Query transformations that simply can`t be pushed to a SQL database
    engine.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，当涉及到通常支持查询折叠的数据源时，重要的是要记住，**并非所有转换**都可以折叠并推送到数据源。所以，为了明确起见，一个 SQL 数据库支持查询折叠并不一定意味着你的查询会折叠！有些
    Power Query 转换根本不能推送到 SQL 数据库引擎。
- en: Very often, some subtle differences in the Power Query transformations can be
    decisive in the final outcome, and whether your query will fold or not. I’ll show
    you a few of those subtle differences in the following sections.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 很常见，Power Query 转换中的一些细微差异在最终结果中可能是决定性的，以及你的查询是否会折叠。我将在以下部分中展示这些细微差异中的几个。
- en: 'Generally speaking, the following transformations, when applied in Power Query,
    can be “translated” to a single SQL statement:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 通常来说，以下在 Power Query 中应用的转换可以“翻译”为单个 SQL 语句：
- en: Removing columns
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 删除列
- en: Renaming columns
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 重命名列
- en: Filtering rows, with static values or Power Query parameters, as they are treated
    as WHERE clause predicates in SQL
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用静态值或 Power Query 参数过滤行，因为它们在 SQL 中被视为 WHERE 子句谓词
- en: Grouping and summarizing, which are equivalent to SQL’s Group by clause
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分组和汇总，相当于 SQL 的 Group By 子句
- en: Merging of **foldable** queries based on the same source, as this operation
    can be translated to JOIN in SQL. When I said, merging of foldable queries — that
    means it will work if you are joining two SQL server tables, but it will not work
    if you are trying to join a SQL table and an Excel file
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 基于同一源合并**可折叠**的查询，因为这个操作可以翻译为 SQL 中的 JOIN。当我说合并可折叠查询时——这意味着如果你正在连接两个 SQL 服务器表，它将工作，但如果你试图连接一个
    SQL 表和一个 Excel 文件，则不会工作
- en: Appending **foldable** queries based on the same source — this transformation
    relates to the UNION ALL operator in SQL
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 基于同一源追加**可折叠**的查询——这个转换与 SQL 中的 UNION ALL 操作符相关
- en: Adding custom columns with simple logic. What does simple logic mean? Using
    M functions that have equivalents in SQL language, for example, mathematical functions,
    or text manipulation functions
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用简单逻辑添加自定义列。简单逻辑是什么意思？使用在 SQL 语言中有等价函数的 M 函数，例如数学函数或文本操作函数
- en: Pivot and Unpivot transformations
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 透视和逆透视转换
- en: 'On the other hand, some transformations that will prevent the query from folding
    are:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，一些会阻止查询折叠的转换包括：
- en: Merging queries based on different sources, as explained previously
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 基于不同来源的查询合并，如前所述
- en: Appending (union-ing) queries based on different sources — similar logic as
    in the previous case
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 基于不同来源的追加（并集）查询——与上一个案例中的类似逻辑
- en: Adding custom columns with complex logic or using some M functions that don’t
    have a counterpart in SQL
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 添加具有复杂逻辑的自定义列或使用一些没有SQL对应项的M函数
- en: Adding index columns
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 添加索引列
- en: Changing a column data type. This one is a typical “it depends” case. I will
    show you soon what it depends on, but just keep in mind that changing a column
    data type can be both a foldable and a non-foldable transformation
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 改变列的数据类型。这是一个典型的“视情况而定”的案例。我很快就会向你展示它取决于什么，但请记住，改变列的数据类型可以是可折叠的也可以是不可折叠的转换。
- en: Now, let’s examine why it is important to achieve this behavior — or, maybe
    it’s better to say, why should you care if the query folds or not?
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们来探讨为什么实现这种行为很重要——或者，也许更好的说法是，为什么你应该关心查询是否折叠？
- en: Why should you care about Query folding?
  id: totrans-52
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么你应该关心查询折叠？
- en: When you’re using Import mode in Power BI, the data refresh process will work
    more efficiently when the query folds, both in terms of refresh speed and resource
    consumption.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 当你在Power BI中使用导入模式时，当查询折叠时，数据刷新过程将更加高效，无论是在刷新速度还是资源消耗方面。
- en: If you are working with DirectQuery or Dual storage mode, as you are targeting
    the SQL database directly, all your transformations **MUST** fold — or your solution
    will not work.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你正在使用DirectQuery或双存储模式，因为你直接针对SQL数据库，所以所有的转换**必须**折叠——否则你的解决方案将无法工作。
- en: Finally, query folding is also of key importance for Incremental refresh — it’s
    so important that Power BI will warn you once it determines that query folding
    can’t be achieved. It will not break your incremental refresh “per-se”, but without
    query folding in place, an incremental refresh wouldn’t serve its main purpose
    — to reduce the amount of data that needs to be refreshed in your data model —
    as without query folding, Mashup engine needs to retrieve all data from the source
    and then apply subsequent steps to filter the data.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，查询折叠对于增量刷新也非常重要——它如此重要，以至于Power BI会在确定无法实现查询折叠时警告你。它不会破坏你的增量刷新“本身”，但没有查询折叠，增量刷新就无法实现其主要目的——减少在数据模型中需要刷新的数据量——因为没有查询折叠，Mashup引擎需要从源中检索所有数据，然后应用后续步骤来过滤数据。
- en: With all these in mind, you should tend to achieve query folding whenever possible.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到所有这些，你应该尽可能实现查询折叠。
- en: Slow report — don’t blame Query folding!
  id: totrans-57
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 慢速报告——不要责怪查询折叠！
- en: 'One important disclaimer here, and this is one of the key takeaways from this
    series of blog posts: if your report is slow, or your [visuals need a lot of time
    to render](https://data-mozart.com/how-i-speed-up-my-power-bi-report-5x/), or
    your [data model size is large](https://data-mozart.com/how-to-reduce-your-power-bi-model-size-by-90/),
    query folding has nothing to do with it!'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个重要的免责声明，这也是本系列博客文章的关键要点之一：如果你的报告很慢，或者你的[视觉效果需要很长时间才能渲染](https://data-mozart.com/how-i-speed-up-my-power-bi-report-5x/)，或者你的[数据模型大小很大](https://data-mozart.com/how-to-reduce-your-power-bi-model-size-by-90/)，查询折叠与此无关！
- en: Only if your data refresh or incremental refresh is slow and inefficient, you
    should investigate your Power Query steps in more depth.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 只有如果你的数据刷新或增量刷新很慢且效率低下，你才应该更深入地调查你的Power Query步骤。
- en: All or nothing?
  id: totrans-60
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 全有或全无？
- en: A few more things to keep in mind regarding query folding. It’s not an all-or-nothing
    process. That means if you have, let’s say, 10 transformation steps within Power
    Query, and your query folds until the 6th step, you will still get some benefit
    from partial query folding. However, once the query folding is broken, it can’t
    be achieved anymore.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 关于查询折叠还有一些其他需要注意的事情。它不是一个全有或全无的过程。这意味着如果你在Power Query中有，比如说，10个转换步骤，并且你的查询折叠到第6步，你仍然会从部分查询折叠中获得一些好处。然而，一旦查询折叠被破坏，就无法再实现了。
- en: '![](../Images/4690117b4ef1db123ba2568f0efb8ec3.png)'
  id: totrans-62
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/4690117b4ef1db123ba2568f0efb8ec3.png)'
- en: Image by author
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: To simplify, if you have 10 transformation steps, and your query folding is
    broken in the 5th step, all previous steps will fold, but once the folding is
    broken, it can’t be achieved again, even if you have transformations that support
    query folding by default in steps 6 to 10 — like in our example where filtering
    should be a foldable step, these steps will not fold. Keep that in mind, and try
    to push all non-foldable steps down the pipeline as much as possible.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 简单来说，如果你有10个转换步骤，并且你的查询折叠在第五步失败，所有之前的步骤都会折叠，但一旦折叠失败，就无法再次实现，即使你在第六步到第十步有默认支持查询折叠的转换步骤——就像在我们的例子中，过滤应该是一个可折叠的步骤，这些步骤也不会折叠。记住这一点，并尽可能将所有不可折叠的步骤推到管道的底部。
- en: How do you know if the query folds?
  id: totrans-65
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 你怎么知道查询是否折叠了？
- en: Ok, now we are not rookies anymore. We know what query folding is, why we should
    strive to achieve it, and some subtle tricks that can make a huge difference.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 好的，现在我们不再是新手了。我们知道什么是查询折叠，为什么我们应该努力实现它，以及一些可以带来巨大差异的微妙技巧。
- en: Now, it’s time to learn how to check if the specific query folds or not. The
    first and most obvious way is to right-click on the step and check what the *View
    Native Query* option looks like.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，是时候学习如何检查特定查询是否折叠了。最简单直接的方法是右键点击步骤，查看*查看原生查询*选项的样式。
- en: 'If it’s greyed out, this step probably does not fold. On the other hand, if
    you are able to click on this option, that means that your query will fold. I
    guess you are maybe confused with the word: PROBABLY!'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 如果它变灰了，这个步骤可能不会折叠。另一方面，如果你可以点击这个选项，这意味着你的查询会折叠。我想你可能对这个词感到困惑：**可能**！
- en: '![](../Images/64f65bad9d29b2ac438f17b5c801dff2.png)'
  id: totrans-69
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/64f65bad9d29b2ac438f17b5c801dff2.png)'
- en: Image by author
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: But, that’s the proper word, as you can’t be 100% sure that if the *View Native
    Query* option is disabled, your query doesn’t fold. I will show you later how
    this option can trick us into thinking that the query folding was broken, even
    though, in reality, folding actually occurs.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，这个词用得恰当，因为你不能100%确定如果*查看原生查询*选项被禁用，你的查询就不会折叠。我稍后会向你展示这个选项如何让我们误以为查询折叠出了问题，尽管实际上折叠确实发生了。
- en: Instead, when you want to be sure if your query folds or not, you can use the *Query
    Diagnostics* feature within Power Query Editor, or *SQL Server Profiler*, like
    a good old and reliable way to check the queries sent to a database by the Power
    BI engine.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，当你想要确定你的查询是否折叠时，你可以在Power Query编辑器中使用*查询诊断*功能，或者使用*SQL Server Profiler*，这是一种古老而可靠的检查Power
    BI引擎发送到数据库的查询的方法。
- en: Additionally, there is a cool feature in Power Query Online, where each step
    is marked with the icon that shows if that step folds, does not fold, or is unknown.
    As I said, this feature is available only in Power Query Online at this moment,
    so let’s hope that the Power BI team will implement it in the Desktop version
    soon.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，Power Query Online中有一个很酷的功能，每个步骤都有一个图标，显示该步骤是否折叠、未折叠或未知。正如我所说，这个功能目前仅在Power
    Query Online中可用，所以我们希望Power BI团队很快将其实现到桌面版本中。
- en: '![](../Images/9599a6ad1d5080cb68fe75f3c19f2a4a.png)'
  id: totrans-74
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/9599a6ad1d5080cb68fe75f3c19f2a4a.png)'
- en: Image by author
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: The devil is in the details…
  id: totrans-76
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 细节决定成败…
- en: Fine…You’ve probably heard about the saying that the devil is in the details.
    Now, it’s time to understand how little nuances can make a big difference in our
    data transformation process.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 好的…你可能听说过“魔鬼藏在细节里”这句话。现在，是时候理解这些微小的细节如何在我们数据处理过程中产生重大影响了。
- en: Let’s start with one of the most curious cases in Power Query editor…
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从Power Query编辑器中最有趣的一个案例开始…
- en: 'Devil #1 — Merge Join'
  id: totrans-79
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 恶魔#1 — 合并连接
- en: This one is very interesting, as you will hardly assume what is happening in
    the background. Let’s say that I want to combine two of my queries into one. I
    will use the *Adventure Works* sample database, and I need to merge the FactInternet
    Sales and DimCustomer tables.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 这个案例非常有趣，因为你几乎无法想象后台发生了什么。假设我想将我的两个查询合并成一个。我将使用*Adventure Works*样本数据库，并且需要合并FactInternet
    Sales和DimCustomer表。
- en: I’ll remove some of the columns from my fact table, and keep only the CustomerKey
    column, as this is a foreign key to a DimCustomer table, and the Sales Amount
    column. I will join the DimCustomer table as it is, without any additional steps
    before merging.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 我将从我的事实表中删除一些列，只保留CustomerKey列，因为这是DimCustomer表的外键，以及销售额列。我将直接将DimCustomer表连接起来，在合并之前不需要任何额外的步骤。
- en: '![](../Images/94d3dc8f92fde286c28c4114f571ce80.png)'
  id: totrans-82
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/94d3dc8f92fde286c28c4114f571ce80.png)'
- en: Image by author
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: Merging tables is equivalent to JOIN operation in SQL. Essentially, we choose
    the column on which we want to perform MERGE operation, and the type of join (left,
    outer, or inner).
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 合并表在SQL中相当于JOIN操作。本质上，我们选择要执行MERGE操作的列，以及连接类型（左连接、外连接或内连接）。
- en: '![](../Images/74cdd76072c14dda00428047f2953865.png)'
  id: totrans-85
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/74cdd76072c14dda00428047f2953865.png)'
- en: Image by author
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: The problem is that by default, when you’re merging two queries, Power Query
    will generate a nested join statement, which can’t be properly translated in SQL.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 问题在于默认情况下，当你合并两个查询时，Power Query会生成一个嵌套的连接语句，这在SQL中无法正确转换。
- en: '![](../Images/69af231d0811ddc91115e7fac8520a64.png)'
  id: totrans-88
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/69af231d0811ddc91115e7fac8520a64.png)'
- en: Image by author
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: If I go to the Tools tab and click on Diagnose Step, I can see that the Mashup
    engine fired two separate queries to my underlying SQL Server database — in other
    words, those two queries couldn’t be executed as a single SQL statement, and that
    means that query didn’t fold!
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我转到工具选项卡并点击诊断步骤，我可以看到Mashup引擎向我的底层SQL Server数据库发出了两个独立的查询——换句话说，这两个查询不能作为一个单一的SQL语句执行，这意味着查询没有折叠！
- en: '![](../Images/9300930aeb633c0ef06f1f32e318b28b.png)'
  id: totrans-91
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/9300930aeb633c0ef06f1f32e318b28b.png)'
- en: Image by author
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: How do we solve this? Let’s just choose a blank query and write our M code by
    hand to achieve exactly the same result.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 我们该如何解决这个问题？让我们选择一个空白查询，手动编写我们的M代码，以实现完全相同的结果。
- en: '![](../Images/e6fbca3440f9dabb7f2da7734d6c5b47.png)'
  id: totrans-94
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e6fbca3440f9dabb7f2da7734d6c5b47.png)'
- en: Image by author
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: The key thing is that we will use a similar, but still different M function: ***Table.Join***.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 关键在于我们将使用一个类似但仍然不同的M函数：**Table.Join**。
- en: '![](../Images/dff82f7ccfb95d682563ae093bfb17d7.png)'
  id: totrans-97
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/dff82f7ccfb95d682563ae093bfb17d7.png)'
- en: We are now using Table.Join function – Image by author
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在使用Table.Join函数——图片由作者提供
- en: All function arguments are exactly the same as previously, and let’s now check
    the outcome.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 所有函数参数与之前完全相同，现在让我们检查一下结果。
- en: You remember once I told you that when the *View Native Query* is greyed out,
    your query probably doesn’t fold, but it’s not 100% correct. And, this is a good
    example. If you take a look at *View Native Query*, it still shows that our query
    doesn’t fold…
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 你记得我之前告诉过你，当*查看原生查询*变灰时，你的查询可能没有折叠，但这并不一定是100%正确的。这是一个很好的例子。如果你查看*查看原生查询*，它仍然显示我们的查询没有折叠…
- en: '![](../Images/cffd2aa4e0befb450f5a43ae8d4e2b8c.png)'
  id: totrans-101
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/cffd2aa4e0befb450f5a43ae8d4e2b8c.png)'
- en: Image by author
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: …but let’s go to Diagnostics and check if that’s true.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: …但是让我们转到诊断并检查这是否属实。
- en: '![](../Images/b66e25048da66e4feec18a72d286e7a0.png)'
  id: totrans-104
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b66e25048da66e4feec18a72d286e7a0.png)'
- en: Image by author
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: Oh, boy, we were tricked — this step indeed folded! As you can see in the illustration
    above, we have a single SQL query generated and sent to a SQL Server source database
    to be executed.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 哦，天哪，我们被骗了——这一步确实折叠了！正如上图所示，我们生成并发送了一个单一的SQL查询到SQL Server源数据库以执行。
- en: So, we found two devils in this example — the first one was a join type, which
    we were able to solve by tweaking the automatically generated M code. And, the
    other one was the incorrect behavior of the *View Native Query* option. I’ll show
    you in the next part of the series one more example when *View Native Query* lies.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们在本例中发现了两个问题——第一个是一个连接类型，我们可以通过调整自动生成的M代码来解决。另一个问题是*查看原生查询*选项的不正确行为。我将在本系列的下一部分再给你一个例子，说明*查看原生查询*何时会出错。
- en: Query folding in Power BI — tricks, lies & ultimate performance test
  id: totrans-108
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Power BI中的查询折叠——技巧、谎言和最终性能测试
- en: I assume you are now familiar with the concept of query folding in Power BI,
    and especially with its importance for data refresh and incremental refresh processes.
    We’ve also started to scratch some interesting behaviors of Power Query transformations,
    and in this final part of the article, I will show you a few more interesting
    findings.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 我假设你现在已经熟悉了Power BI中查询折叠的概念，特别是它对于数据刷新和增量刷新过程的重要性。我们还开始探讨Power Query转换的一些有趣行为，在本文章的最后一部分，我将向你展示一些更有趣的发现。
- en: Finally, we will wrap it up with the ultimate performance test — I will show
    you the exact numbers behind two identical queries — one folds, and the other
    does not!
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们将通过最终的性能测试来总结——我将向你展示两个相同查询背后的确切数字——一个折叠了，另一个没有！
- en: Changing Data types
  id: totrans-111
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 更改数据类型
- en: One of the most common transformations in Power Query is changing data type.
    It’s a well-known [best practice to use proper data types](https://data-mozart.com/how-to-reduce-your-power-bi-model-size-by-90/) in
    your data model — for example, if you don’t need hours, minutes, and seconds level
    of granularity in your reports, you should be better off getting rid of them and
    changing the data type of that column from Date/Time to Date only.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 在Power Query中最常见的转换之一是更改数据类型。这是一个众所周知的数据模型[最佳实践，使用适当的数据类型](https://data-mozart.com/how-to-reduce-your-power-bi-model-size-by-90/)——例如，如果你在报告中不需要小时、分钟和秒的粒度，你最好去掉它们，并将该列的数据类型从日期/时间更改为仅日期。
- en: However, the road to hell is paved with good intentions:)…So, let me show you
    one subtle difference that can cause your query to become damn slow, even though
    you’ve stuck with the recommendation to use a proper data type!
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，通往地狱的道路是由善良的意图铺就的……所以，让我向你展示一个可能使你的查询变得非常慢的微妙差异，即使你坚持使用适当的数据类型的建议！
- en: '![](../Images/59a07cd88aee8edec9dfc2e7e4d4047d.png)'
  id: totrans-114
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/59a07cd88aee8edec9dfc2e7e4d4047d.png)'
- en: Image by author
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: 'As you can spot in the illustration above, my OrderDate column is of Date/Time
    data type. And, I want to switch it to Date only. There are (at least) two possible
    options to do this — the first one is to right-click on the column, expand the
    drop-down for the Change Type option (like I did in the illustration), and select
    Date type (just below the Date/Time):'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 正如你在上面的插图中所能看到的，我的OrderDate列是日期/时间数据类型。而且，我想将其更改为仅日期。为此，至少有两种可能的方法——第一种是在列上右键单击，展开更改类型选项的下拉菜单（就像我在插图中所做的那样），并选择日期类型（位于日期/时间下方）：
- en: '![](../Images/d9cc8bdcb183a039342eab0d0ef7f787.png)'
  id: totrans-117
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d9cc8bdcb183a039342eab0d0ef7f787.png)'
- en: Image by author
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: 'A few important things happened here, so let me explain each of those:'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 这里发生了一些重要的事情，让我逐一解释：
- en: In the Applied Steps pane, you can notice that our transformation step had been
    recorded
  id: totrans-120
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在应用步骤面板中，你可以注意到我们的转换步骤已被记录
- en: In the column itself, you can see that the time portion disappeared
  id: totrans-121
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在该列本身中，你可以看到时间部分消失了
- en: When I’ve opened the View Native Query dialog box, you can see that the Mashup
    engine nicely translated our transformation to a T-SQL *CONVERT()* function
  id: totrans-122
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 当我打开查看原生查询对话框时，你可以看到Mashup引擎很好地将我们的转换转换为一个T-SQL的*CONVERT()*函数
- en: The M formula applied to this transformation step is: *Table.TransformColumnTypes()*
  id: totrans-123
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 应用到此转换步骤的M公式是：*Table.TransformColumnTypes()*
- en: 'Let’s now examine the other option to change data type of our column:'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们来检查更改我们列数据类型的另一种方法：
- en: '![](../Images/7bad01ee31f6d443146af96ecd17cb5b.png)'
  id: totrans-125
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7bad01ee31f6d443146af96ecd17cb5b.png)'
- en: Image by author
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: 'Just below our previous Change Type option, there is a Transform option. Once
    you expand the drop-down, you can see the Date Only transformation. Let’s click
    on it and check what happens:'
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们之前的更改类型选项下方，有一个转换选项。一旦展开下拉菜单，你可以看到仅日期的转换。让我们点击它并查看会发生什么：
- en: '![](../Images/23ced59f0853031145c21f705c550b73.png)'
  id: totrans-128
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/23ced59f0853031145c21f705c550b73.png)'
- en: Image by author
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: 'Looks quite similar, does it? But, let’s walk through all the things that happened
    now:'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 看起来很相似，对吧？但是，让我们回顾一下现在发生的一切：
- en: Instead of the Changed Type step, we now have a step called Extracted Date
  id: totrans-131
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们现在有一个名为“提取日期”的步骤，而不是之前的“更改类型”步骤
- en: The column itself looks exactly the same as in the previous example — no time
    part in there
  id: totrans-132
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 该列本身看起来与上一个例子完全相同——没有时间部分
- en: Ooops, the query doesn’t fold anymore! As you can see, the View Native Query
    option is greyed out!
  id: totrans-133
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 哎呀，查询不再折叠了！正如你所见，查看原生查询选项已变灰！
- en: This time, M formula applied is: *Table.TransformColumns()*
  id: totrans-134
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 这次，应用的M公式是：*Table.TransformColumns()*
- en: So, one single different word in the M formula (*Table.TransformColumnTypes* vs *Table.TransformColumns*)
    affected our query so hard that it couldn’t be translated to SQL!
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，M公式中的一个单词的不同（*Table.TransformColumnTypes* 与 *Table.TransformColumns*）对我们的查询产生了如此大的影响，以至于它无法被翻译成SQL！
- en: 'Takeover from this story: be careful, and watch out when you’re choosing options
    for changing data types!'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 从这个故事中吸取教训：在选择更改数据类型的选项时要小心，要留意！
- en: Liar, Liar…
  id: totrans-137
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 说谎者，说谎者…
- en: I’ve promised in the previous part of the article that I will show you one more
    example when the View Native Query option can fool you into thinking that query
    folding was broken, even if in reality it’s not true…
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 在文章的前一部分，我承诺将向你展示一个例子，当“查看原生查询”选项会欺骗你，让你认为查询折叠已损坏，即使实际上并非如此…
- en: 'Let’s say that we want to keep only the top X rows from our table. In my case,
    I want to preserve the top 2000 rows from my fact table:'
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我们只想保留表格中的顶部X行。在我的情况下，我想保留我的事实表中的前2000行：
- en: '![](../Images/35e2a3ad771dc015a0eea2157495f424.png)'
  id: totrans-140
  prefs: []
  type: TYPE_IMG
  zh: '![插图](../Images/35e2a3ad771dc015a0eea2157495f424.png)'
- en: Image by author
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: 'Once I’ve applied this step and checked the View Native Query, I can realize
    that my query folds, as my transformation was translated to a TOP clause in SQL:'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦我应用了这个步骤并检查了原生查询视图，我就能意识到我的查询是折叠的，因为我的转换被翻译成了SQL中的TOP子句：
- en: '![](../Images/ca3ac92d874a9668462258b6d06e368e.png)'
  id: totrans-143
  prefs: []
  type: TYPE_IMG
  zh: '![插图](../Images/ca3ac92d874a9668462258b6d06e368e.png)'
- en: Image by author
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: 'Now, let’s say that I want to apply Absolute value transformation on my Sales
    Amount column. Normally, this transformation easily folds, as there is an ABS
    function in T-SQL:'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，假设我想在我的销售额列上应用绝对值转换。通常，这种转换很容易折叠，因为T-SQL中有ABS函数：
- en: '![](../Images/52084ff5b8938352468a72bd669fc7e7.png)'
  id: totrans-146
  prefs: []
  type: TYPE_IMG
  zh: '![插图](../Images/52084ff5b8938352468a72bd669fc7e7.png)'
- en: Image by author
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: However, if I right-click on this step, I will see that the View Native Query
    option is greyed out, so I would assume that this step broke my query folding!
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，如果我右键点击这个步骤，我会看到原生查询视图选项被灰色显示，所以我就会假设这个步骤破坏了我的查询折叠！
- en: '![](../Images/be90ca59199459446412eb733036218f.png)'
  id: totrans-149
  prefs: []
  type: TYPE_IMG
  zh: '![插图](../Images/be90ca59199459446412eb733036218f.png)'
- en: Image by author
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: 'Let’s check this in our Query Diagnostics tool:'
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们在我们的查询诊断工具中检查一下：
- en: '![](../Images/d59a1a8739ca88bdea51a73a19b41f78.png)'
  id: totrans-152
  prefs: []
  type: TYPE_IMG
  zh: '![插图](../Images/d59a1a8739ca88bdea51a73a19b41f78.png)'
- en: Image by author
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: Oh, my God! This step folded indeed! So, we were tricked by the View Native
    Query option again!
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 哦，我的天！这个步骤确实折叠了！所以，我们又再次被原生查询视图选项欺骗了！
- en: 'The key takeover here is: whenever you’re assuming that a specific transformation
    step can be folded (like in this example, when we knew that SQL has an ABS function
    to support our transformation), double-check what really happens under the hood!'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 关键点在于：无论何时您认为特定的转换步骤可以折叠（就像在这个例子中，我们知道SQL中有ABS函数来支持我们的转换），都要检查底层实际发生了什么！
- en: The ultimate performance test
  id: totrans-156
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最终的性能测试
- en: Ok, if I didn’t manage to convince you so far, why you should strive to achieve
    query folding, let me now pull my last ace up my sleeve!
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 好的，如果我没有说服您到目前为止，为什么您应该努力实现查询折叠，那么现在让我拿出我的最后一张王牌！
- en: I want to show you the difference in data refresh performance between the queries
    that return exactly the same results — one of them folds, and the other does not!
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 我想向您展示返回相同结果的查询之间的数据刷新性能差异——其中一个折叠，另一个没有折叠！
- en: 'Test #1 Query folding ON'
  id: totrans-159
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 测试#1 查询折叠开启
- en: For this testing, I’ll use the FactOnlineSales table from the Contoso sample
    database. This table has around 12.6 million rows, and it’s good to demonstrate
    the magnitude of importance of the query folding concept.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这次测试，我将使用Contoso样本数据库中的FactOnlineSales表。这个表大约有1260万行，这对于展示查询折叠概念的重要性是很好的例子。
- en: 'In the first example, I’ve applied 9 different transformation steps, and all
    of them are foldable, as you can see in the following illustration:'
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 在第一个例子中，我应用了9个不同的转换步骤，所有这些步骤都是可折叠的，正如您可以在下面的插图中所见：
- en: '![](../Images/4ff6a9d59b4d7e48e4192b41060288e2.png)'
  id: totrans-162
  prefs: []
  type: TYPE_IMG
  zh: '![插图](../Images/4ff6a9d59b4d7e48e4192b41060288e2.png)'
- en: Image by author
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: 'Don’t pay attention to the SQL code that the Mashup engine generated: if you
    are a SQL professional, of course, you could write much more optimal SQL code
    — however, keep in mind that with auto-generated scripts by the Mashup engine, you
    are not getting the ***most optimal SQL — you are just getting correct SQL***!'
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 请不要关注Mashup引擎生成的SQL代码：如果您是SQL专业人士，当然，您能写出更优化的SQL代码——然而，请记住，通过Mashup引擎自动生成的脚本，您并没有得到最优化SQL——您只是得到了正确的SQL！
- en: I will hit Close & Apply and turn on my stopwatch to measure how much time my
    data refresh lasts.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 我将点击关闭并应用，并打开我的秒表来测量我的数据刷新所需的时间。
- en: '![](../Images/244634db05ff0f539e6451f02b1f92d5.png)'
  id: totrans-166
  prefs: []
  type: TYPE_IMG
  zh: '![插图](../Images/244634db05ff0f539e6451f02b1f92d5.png)'
- en: Image by author
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: This query took 32 seconds to load 2.8 million records in my Power BI report.
    Data was loaded in batches of 100.000–150.000 records, which is a good indicator
    that the query folding is in place.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 这个查询在我的Power BI报告中加载了280万条记录，耗时32秒。数据以每批100,000至150,000条记录的批次加载，这是查询折叠已经实施的良好指标。
- en: 'Test #2 Query folding OFF'
  id: totrans-169
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 测试#2 查询折叠关闭
- en: 'Now, I will go back to Power Query Editor, and intentionally break query folding
    at the 3rd step (remember the example above with changing Date/Time type to Date),
    using the transformation for which I know that is not foldable:'
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我将回到Power Query编辑器，并故意在第3步打破查询折叠（记得上面改变日期/时间类型为日期的例子），使用我知道无法折叠的转换：
- en: '![](../Images/edfcaa0d1dc5ac484f1c2fc31f09a189.png)'
  id: totrans-171
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/edfcaa0d1dc5ac484f1c2fc31f09a189.png)'
- en: Image by author
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: Truth to be said, I will achieve a partial folding here, as first two steps
    will fold, but all subsequent steps after the Extracted Date transformation will
    not fold!
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 实话实说，在这里我将实现部分折叠，因为前两步将会折叠，但Extracted Date转换之后的所有后续步骤将不会折叠！
- en: 'Let’s turn on the stopwatch again and check what happens:'
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们再次启动秒表并检查发生了什么：
- en: '![](../Images/840c772c4d619972845f5d569782bfcb.png)'
  id: totrans-175
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/840c772c4d619972845f5d569782bfcb.png)'
- en: Image by author
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: 'The first thing to notice: this query took 4 minutes and 41 seconds to load
    into our Power BI report, which is approximately ***10 times more*** than in our
    previous case when the query folded. This time, batches of loaded data were between
    10.000 and 20.000 records.'
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 首先要注意的是：这个查询加载到我们的Power BI报告中花费了4分钟41秒，这大约是之前查询折叠情况下的**10倍**。这次，加载的数据批次在10,000到20,000条记录之间。
- en: But, what’s even more concerning — you can see that the total number of records
    loaded was almost 11 million!!! Instead of 2.8 million in the previous example!
    Why is it happening? Well, in the previous sections, I explained that when the
    Mashup engine can’t translate M language to SQL, it needs to pull **ALL** the
    data (from the moment when the query folding was broken), and **THEN** apply transformations
    on the whole chunk of imported data!
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，更令人担忧的是——你可以看到加载的记录总数几乎达到了1100万！！！而之前的例子中只有280万！这是为什么？好吧，在前面的章节中，我解释了当Mashup引擎无法将M语言转换为SQL时，它需要拉取**所有**数据（从查询折叠损坏的那一刻起），然后**然后**对整个导入的数据块应用转换！
- en: The final result is exactly the same — we have 2.830.017 records in our Power
    BI report — but, with query folding in place, all necessary transformations were
    performed on the SQL database side, and the Mashup engine got an already prepared
    data set. While in the second scenario, after we broke the query folding, the
    Mashup engine pulled the whole remaining rows (approx. 11 million), and only after
    that was it able to apply other transformation steps.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 最终结果完全相同——我们在Power BI报告中有了2,830,017条记录——但是，在查询折叠到位的情况下，所有必要的转换都在SQL数据库端执行，Mashup引擎得到了已经准备好的数据集。而在第二种情况下，在我们打破查询折叠之后，Mashup引擎拉取了剩余的所有行（大约1100万），然后才能应用其他转换步骤。
- en: And, this was just a basic example, with one single table, and not so big in
    terms of data volume! Simply imagine the magnitude of implications on a larger
    dataset, with multiple tables in it.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 而且，这只是一个基本示例，只有一个表，数据量也不是很大！简单想象一下，在一个包含多个表的大型数据集上，这种影响的程度。
- en: Conclusion
  id: totrans-181
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: Well, we covered a lot in this article. We learned about the data shaping concept,
    we introduced Power Query fundamentals, and we also learned what query folding
    is and why we should do our best to achieve it.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧，我们在这篇文章中涵盖了大量的内容。我们学习了数据塑形的概念，介绍了Power Query的基本知识，还学习了什么是查询折叠以及为什么我们应该尽力实现它。
- en: I’ve also shared with you some basic examples and neat tricks on how to achieve
    query folding in some common use cases.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 我还与你分享了一些基本示例和一些巧妙的小技巧，展示了如何在一些常见用例中实现查询折叠。
- en: In the end, please be aware that the query folding is a work in progress, and
    folks from the Power BI team are constantly improving this feature. So, it can
    happen that some of the issues with query folding I’ve shown you here are resolved
    in the meantime. Therefore, be sure to stay up to date with the latest improvements.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，请注意，查询折叠是一个持续进行中的工作，来自Power BI团队的人们正在不断改进这个功能。因此，可能在我展示的查询折叠问题中，有些问题在这期间已经得到了解决。因此，请确保与最新的改进保持同步。
- en: Thanks for reading!
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢阅读！
