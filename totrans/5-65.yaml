- en: Now we see that the LED light (only in the console) switches back and forth
    between ON-OFF. In this simulator example, I only used the time library for the
    delay. To run the example with real hardware, you should use additional libraries
    such as ‘machine’ or ‘utime’.
  prefs: []
  type: TYPE_NORMAL
- en: '![In a web simulator, we can write a ''hello world'' by writing a small script
    to output a flashing LED.](../Images/8cae20b3eed4b79066dfee13b04764b3.png)'
  prefs: []
  type: TYPE_IMG
- en: In a web simulator, we can write a ‘hello world’ by writing a small script to
    output a flashing LED.
  prefs: []
  type: TYPE_NORMAL
- en: Final Thoughts
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: MicroPython is certainly important for people working in hardware projects such
    as IoT and edge computing. But due to its easy accessibility and because anyone
    who knows Python can also use MicroPython, the language bridges a gap between
    data science, AI and hardware technology. It is certainly good to at least know
    the purpose of MicroPython and the differences to Python. If you are interested
    in trying out smart home devices or IoT for yourself, it is certainly a accessible
    entry point.
  prefs: []
  type: TYPE_NORMAL
