- en: Never miss a new edition of *The Variable*, our weekly newsletter featuring
    a top-notch selection of editors’ picks, deep dives, community news, and more.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[Subscribe today](https://newsletter.towardsdatascience.com/subscription-to-the-newsletter)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The universe of large language model [optimization tools](https://towardsdatascience.com/tag/optimization/?utm_source=newsletter&utm_medium=email&utm_campaign=tds%20variable) continues
    to expand at a rapid clip. If you’re an MLOps specialist, data engineer, or a
    generalist looking to branch into AI applications, you need to stay abreast of
    the latest developments in the field — and we’re here to help.
  prefs: []
  type: TYPE_NORMAL
- en: We’ve selected some of our top articles from the past couple of weeks, focusing
    on cutting-edge workflows, new libraries, and more, and invite you to explore
    this dynamic field through the lens of our authors’ expertise.
  prefs: []
  type: TYPE_NORMAL
- en: Before we dive in, we’re thrilled to share [our latest Author Spotlight Q&A](https://towardsdatascience.com/my-biggest-lesson-was-realizing-that-domain-expertise-matters-more-than-algorithmic-complexity/?utm_source=newsletter&utm_medium=email&utm_campaign=tds%20variable),
    with AI entrepreneur and data scientist Claudia Ng, who discusses her career path
    and shares insights on the importance of picking the right “lane” for growth.
    Be sure to bookmark it!
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Introducing Google’s LangExtract tool
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A powerful new NLP and data extraction library is always a cause for celebration—and
    exploration. [Thomas Reid](https://towardsdatascience.com/author/thomas_reid/?utm_source=newsletter&utm_medium=email&utm_campaign=tds%20variable) walks
    us through the inner workings of LangExtract, and shows how it can “perform RAG-like
    operations without the need for traditional RAG processing.”
  prefs: []
  type: TYPE_NORMAL
- en: '[Introducing Google’s LangExtract tool](https://towardsdatascience.com/introducing-googles-langextract-tool-2/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Can LangExtract Turn Messy Clinical Notes into Structured Data?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: If you’re interested in digging deeper into LangExtract’s potential use cases,
    Parul Pandey presents a comprehensive guide using the example of unstructured
    medical data.
  prefs: []
  type: TYPE_NORMAL
- en: '[Can LangExtract Turn Messy Clinical Notes into Structured Data?](https://towardsdatascience.com/can-langextract-turn-messy-clinical-notes-into-structured-data/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Advanced Prompt Engineering for Data Science Projects
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Data practitioners looking for ways to streamline their daily tasks shouldn’t
    miss Sara Nobrega’s new guide to prompt design for features, modeling, and evaluation.
  prefs: []
  type: TYPE_NORMAL
- en: '[Advanced Prompt Engineering for Data Science Projects](https://towardsdatascience.com/advanced-prompt-engineering-for-data-science-projects/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Maximizing AI/ML Model Performance with PyTorch Compilation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Chaim Rand’s deep dive on torch.compile explains how it works, demonstrates
    its use, and discusses a few strategies for applying it effectively.
  prefs: []
  type: TYPE_NORMAL
- en: '[Maximizing AI/ML Model Performance with PyTorch Compilation](https://towardsdatascience.com/maximizing-ai-ml-model-performance-with-pytorch-compilation/)'
