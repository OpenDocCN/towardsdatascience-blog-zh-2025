- en: AI Agents Processing Time Series and Large Dataframes
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: AI 代理处理时间序列和大型数据框
- en: 原文：[https://towardsdatascience.com/ai-agents-processing-timeseries-and-large-dataframes/](https://towardsdatascience.com/ai-agents-processing-timeseries-and-large-dataframes/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/ai-agents-processing-timeseries-and-large-dataframes/](https://towardsdatascience.com/ai-agents-processing-timeseries-and-large-dataframes/)
- en: <mdspan datatext="el1745296097126" class="mdspan-comment">Intro</mdspan>
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1745296097126" class="mdspan-comment">简介</mdspan>
- en: Agents are AI systems, powered by LLMs, that can reason about their objectives
    and take actions to achieve a final goal. They are designed not just to respond
    to queries, but to orchestrate a sequence of operations, including processing
    data (i.e. dataframes and time series). This ability unlocks numerous real-world
    applications for democratizing access to data analysis, such as automating reporting,
    no-code queries, support on data cleaning and manipulation.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 代理是受 LLM 驱动的 AI 系统，可以对其目标进行推理并采取行动以实现最终目标。它们不仅被设计来响应用户查询，还旨在编排一系列操作，包括处理数据（即数据框和时间序列）。这种能力解锁了众多现实世界的应用，例如自动化报告、无代码查询、数据清洗和操作支持。
- en: 'Agents that can interact with dataframes in two different ways:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 可以以两种不同方式与数据框交互的代理：
- en: with **natural language** —the LLM reads the table as a stringand tries to make
    sense of it based on its knowledge base
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 **自然语言** —— LLM 将表格作为字符串读取，并基于其知识库尝试理解其含义
- en: by **generating and executing code** — the Agent activates tools to process
    the dataset as an object.
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过 **生成和执行代码** —— 代理激活工具以对象的形式处理数据集。
- en: '![](../Images/855b5b5c3620bba73cf85eec6edc45a4.png)So, by combining the power
    of NLP with the precision of code execution, AI Agents enable a broader range
    of users to interact with complex datasets and derive insights.'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: '![](../Images/855b5b5c3620bba73cf85eec6edc45a4.png)因此，通过结合自然语言处理的力量和代码执行的精确性，AI
    代理使更广泛的用户能够与复杂的数据集交互并得出见解。'
- en: In this tutorial, I’m going to show how to **process dataframes and time series
    with AI Agents**. I will present some useful Python code that can be easily applied
    in other similar cases (just copy, paste, run) and walk through every line of
    code with comments so that you can replicate this example (link to full code at
    the end of the article).
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 在本教程中，我将展示如何使用 AI 代理 **处理数据框和时间序列**。我将展示一些易于在其他类似情况下应用的 Python 代码（只需复制、粘贴、运行），并逐行带注释地解释代码，以便您可以复制此示例（文章末尾有完整代码的链接）。
- en: Setup
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 设置
- en: Let’s start by setting up [***Ollama***](https://ollama.com/)(`pip install ollama==0.4.7`),
    a library that allows users to run open-source LLMs locally, without needing cloud-based
    services, giving more control over data privacy and performance. Since it runs
    locally, any conversation data does not leave your machine.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从设置 [***Ollama***](https://ollama.com/)(`pip install ollama==0.4.7`) 开始，这是一个允许用户在本地运行开源
    LLM 的库，无需云服务，从而在数据隐私和性能方面提供更多控制。由于它是在本地运行的，任何对话数据都不会离开您的机器。
- en: First of all, you need to download *Ollama* from the website.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，您需要从网站下载 *Ollama*。
- en: '![](../Images/d90f38a72bde7bd1406eacedafae8f4e.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/d90f38a72bde7bd1406eacedafae8f4e.png)'
- en: Then, on the prompt shell of your laptop, use the command to download the selected
    LLM. I’m going with Alibaba’s ***Qwen***, as it’s both smart and light.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，在您的笔记本电脑的提示壳中，使用命令下载所选的 LLM。我选择阿里巴巴的 ***Qwen***，因为它既智能又轻便。
- en: '![](../Images/81f5386d8c3805c35d9fa511fd494ab4.png)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/81f5386d8c3805c35d9fa511fd494ab4.png)'
- en: After the download is completed, you can move on to Python and start writing
    code.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 下载完成后，您可以继续使用 Python 并开始编写代码。
- en: '[PRE0]'
  id: totrans-16
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'Let’s test the LLM:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们测试 LLM：
- en: '[PRE1]'
  id: totrans-18
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '![](../Images/6959b9689c74fa5ceca40bdad86f38cb.png)'
  id: totrans-19
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/6959b9689c74fa5ceca40bdad86f38cb.png)'
- en: Time Series
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 时间序列
- en: A time series is a sequence of data points measured over time, often used for
    analysis and forecasting. It allows us to see how variables change over time,
    and it’s used to identify trends and seasonal patterns.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 时间序列是一系列随时间测量的数据点，通常用于分析和预测。它使我们能够看到变量随时间的变化，并用于识别趋势和季节性模式。
- en: I’m going to generate a fake time series dataset to use as an example.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 我将生成一个假的时间序列数据集作为示例。
- en: '[PRE2]'
  id: totrans-23
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '![](../Images/93843a94dc8353f99ebc9ba3a856f0bc.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/93843a94dc8353f99ebc9ba3a856f0bc.png)'
- en: Usually, time series datasets have a really simple structure with the main variable
    as a column and the time as the index.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，时间序列数据集具有非常简单的结构，主要变量作为列，时间作为索引。
- en: '![](../Images/8b36161dfdbc8b81dcccf4d811605261.png)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/8b36161dfdbc8b81dcccf4d811605261.png)'
- en: Before transforming it into a string, I want to make sure that everything is
    placed under a column, so that we don’t lose any piece of information.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 在将其转换为字符串之前，我想确保所有内容都放在一个列下，这样我们就不会丢失任何信息片段。
- en: '[PRE3]'
  id: totrans-28
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '![](../Images/b9f39156e1a55341792d4d5394ee8d2e.png)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b9f39156e1a55341792d4d5394ee8d2e.png)'
- en: Then, I shall change the data type **from dataframe to dictionary**.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我将数据类型**从dataframe转换为dictionary**。
- en: '[PRE4]'
  id: totrans-31
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: '![](../Images/ecead947902115628cec97e5eaa18cf2.png)'
  id: totrans-32
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ecead947902115628cec97e5eaa18cf2.png)'
- en: Finally, **from dictionary to string**.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，**从dictionary转换为string**。
- en: '[PRE5]'
  id: totrans-34
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: '![](../Images/4cdce3278aa35542fd802f5ff8ff3c18.png)'
  id: totrans-35
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/4cdce3278aa35542fd802f5ff8ff3c18.png)'
- en: Now that we have a string, it can be **included in a prompt** that any language
    model is able to process. When you paste a dataset into a prompt, the LLM reads
    the data as plain text, but can still understand the structure and meaning based
    on patterns seen during training.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们有了字符串，它可以被包含在一个任何语言模型都能处理的提示中。当你将数据集粘贴到提示中时，LLM将数据作为纯文本读取，但仍然可以根据训练期间看到的模式理解结构和意义。
- en: '[PRE6]'
  id: totrans-37
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: We can easily start a chat with the LLM. Please note that, right now, this is
    not an Agent as it doesn’t have any Tool, we’re just using the language model.
    While it doesn’t process numbers like a computer, the LLM can recognize column
    names, time-based patterns, trends, and outliers, especially with smaller datasets.
    It can simulate analysis and explain findings, but it won’t perform precise calculations
    independently, as it’s not executing code like an Agent.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以轻松地与LLM开始聊天。请注意，目前这还不是智能体，因为它没有任何工具，我们只是在使用语言模型。虽然它不像计算机那样处理数字，但LLM可以识别列名、基于时间的模式、趋势和异常值，尤其是在较小的数据集上。它可以模拟分析和解释发现，但不会独立执行精确的计算，因为它不像智能体那样执行代码。
- en: '[PRE7]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: '![](../Images/f2acffb9890a1d2836e0723dc51a2978.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f2acffb9890a1d2836e0723dc51a2978.png)'
- en: The LLM recognizes numbers and understands thegeneral context, the same way
    it might understand a recipe or a line of code.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: LLM识别数字并理解一般上下文，就像它可能理解一个食谱或一行代码一样。
- en: '![](../Images/7f8cab95728c2ac73305053b5f417300.png)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7f8cab95728c2ac73305053b5f417300.png)'
- en: As you can see, using LLMs to analyze time series is great for quick and conversational
    insights.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 正如你所见，使用LLM分析时间序列对于快速和对话式的洞察力来说是非常好的。
- en: Agent
  id: totrans-44
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 智能体
- en: LLMs are good for brainstorming and lite exploration, while an Agent can run
    code. Therefore, it can handle more complex tasks like plotting, forecasting,
    and anomaly detection. So, let’s create the Tools.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: LLMs适合头脑风暴和轻量级探索，而智能体可以运行代码。因此，它可以处理更复杂的任务，如绘图、预测和异常检测。所以，让我们创建工具。
- en: Sometimes, it can be more effective to treat the **“final answer” as a Tool**.
    For example, if the Agent does multiple actions to generate intermediate results,
    the final answer can be thought of as the Tool that integrates all of this information
    into a cohesive response. By designing it this way, you have more customization
    and control over the results.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 有时，将**“最终答案”视为一个工具**可能更有效。例如，如果智能体执行多个动作以生成中间结果，最终答案可以被视为将所有这些信息整合成一个连贯响应的工具。通过这种方式设计，你可以对结果有更多的定制和控制。
- en: '[PRE8]'
  id: totrans-47
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Then, the **coding Tool**.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，是**编码工具**。
- en: '[PRE9]'
  id: totrans-49
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Moreover, I shall add a couple of **utils functions** for Tool usage and to
    run the Agent.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我将添加几个**实用函数**用于工具使用和运行智能体。
- en: '[PRE10]'
  id: totrans-51
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: When the Agent is trying to solve a task, I want it to keep track of the Tools
    that have been used, the inputs that it tried, and the results it gets. The iteration
    should stop only when the model is ready to give the final answer.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 当智能体尝试解决一个任务时，我希望它能记录下已使用的工具、尝试的输入以及得到的结果。迭代只有在模型准备好给出最终答案时才应停止。
- en: '[PRE11]'
  id: totrans-53
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: In regard to the coding Tool, I’ve noticed that Agents tend to recreate the
    dataframe at every step. So I will use a **memory reinforcement** to remind the
    model that the dataset already exists. A trick commonly used to get the desired
    behaviour. Ultimately, memory reinforcements help you to get more meaningful and
    effective interactions.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 关于编码工具，我注意到智能体倾向于在每一步都重新创建dataframe。因此，我将使用**记忆强化**来提醒模型数据集已经存在。这是一个常用的技巧，以获得期望的行为。最终，记忆强化有助于你获得更有意义和有效的交互。
- en: '[PRE12]'
  id: totrans-55
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: '![](../Images/9866308c60135067e21d9929d57c5d1d.png)'
  id: totrans-56
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/9866308c60135067e21d9929d57c5d1d.png)'
- en: Creating a plot is something that the LLM alone can’t do. But keep in mind that
    even if Agents can create images, they can’t see them, because after all, the
    engine is still a language model. So the user is the only one who visualises the
    plot.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 创建图表是LLM单独无法做到的事情。但请记住，即使代理可以创建图像，它们也无法看到它们，因为毕竟，引擎仍然是一个语言模型。所以，用户是唯一一个可视化图表的人。
- en: '![](../Images/c0bd32f43292d204353db907a483776e.png)'
  id: totrans-58
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c0bd32f43292d204353db907a483776e.png)'
- en: The Agent is using the library [*statsmodels*](https://www.statsmodels.org/stable/index.html)to
    train a model and forecast the time series.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 代理正在使用[*statsmodels*](https://www.statsmodels.org/stable/index.html)库来训练模型并预测时间序列。
- en: '![](../Images/531b9d7f6eae0c95379b91d5c9c69b17.png)'
  id: totrans-60
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/531b9d7f6eae0c95379b91d5c9c69b17.png)'
- en: Large Dataframes
  id: totrans-61
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 大型数据框
- en: LLMs have limited memory, which restricts how much information they can process
    at once, even the most advanced models have token limits (a few hundred pages
    of text). Additionally, LLMs don’t retain memory across sessions unless a retrieval
    system is integrated. In practice, to effectively work with large dataframes,
    developers often use strategies like chunking, RAG, vector databases, and summarizing
    content before feeding it into the model.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: LLMs的内存有限，这限制了它们一次可以处理多少信息，即使是最高级的模型也有令牌限制（几百页的文本）。此外，除非集成检索系统，否则LLMs不会在会话之间保留记忆。在实践中，为了有效地处理大型数据框，开发者通常会使用分块、RAG、向量数据库和总结内容等策略，在将其输入模型之前。
- en: Let’s create a big dataset to play with.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们创建一个大型数据集来玩耍。
- en: '[PRE13]'
  id: totrans-64
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: '![](../Images/3076b1c72a05502320cae42679ed64f9.png)'
  id: totrans-65
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/3076b1c72a05502320cae42679ed64f9.png)'
- en: I’ll add a **web-searching Tool**, so that, with the ability to execute Python
    code and search the internet, a general-purpose AI gains access to all the available
    knowledge and can make data-driven decisions.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 我将添加一个**网络搜索工具**，这样，具备执行Python代码和搜索互联网的能力，通用人工智能就能访问所有可用知识，并做出数据驱动的决策。
- en: In Python, the easiest way to create a web-searching Tool is with the famous
    private browser [*DuckDuckGo*](https://pypi.org/project/duckduckgo-search/)(`pip
    install duckduckgo-search==6.3.5`). You can directly use the original library
    or import the [*LangChain*](https://www.langchain.com/) wrapper (`pip install
    langchain-community==0.3.17`).
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 在Python中，创建网络搜索工具最简单的方法是使用著名的私有浏览器[*DuckDuckGo*](https://pypi.org/project/duckduckgo-search/)(`pip
    install duckduckgo-search==6.3.5`)。您可以直接使用原始库或导入[*LangChain*](https://www.langchain.com/)包装器(`pip
    install langchain-community==0.3.17`)。
- en: '[PRE14]'
  id: totrans-68
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: '![](../Images/ae8a3c1805de80a214dbe6d60a119f24.png)'
  id: totrans-69
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ae8a3c1805de80a214dbe6d60a119f24.png)'
- en: In total, the Agent now has 3 tools.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 总的来说，代理现在有3个工具。
- en: '[PRE15]'
  id: totrans-71
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: Since I can’t add the full dataframe in the prompt, I shall feed only the first
    10 rows so that the LLM can understand the general context of the dataset. Additionally,
    I will specify where to find the full dataset.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我无法在提示中添加完整的数据框，我将只提供前10行，以便LLM可以理解数据集的一般背景。此外，我将指定如何找到完整的数据集。
- en: '[PRE16]'
  id: totrans-73
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: Finally, we can run the Agent.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们可以运行代理。
- en: '[PRE17]'
  id: totrans-75
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: '![](../Images/cf2134da54b1b9225babb62e34c97842.png)'
  id: totrans-76
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/cf2134da54b1b9225babb62e34c97842.png)'
- en: In this interaction, the Agent used the coding Tool properly. Now, I want to
    make it utilize the other tool as well.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 在这次交互中，代理正确地使用了编码工具。现在，我想让它也利用其他工具。
- en: '![](../Images/be760b347309a8e7a814f32032dfc5d6.png)'
  id: totrans-78
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/be760b347309a8e7a814f32032dfc5d6.png)'
- en: At last, I need the Agent to put together all the pieces of information obtained
    so far from this chat.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我需要代理将到目前为止从这次聊天中获得的所有信息整合在一起。
- en: Conclusion
  id: totrans-80
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: 'This article has been a tutorial to demonstrate **how to build from scratch
    Agents that process time series and large dataframes**. We covered both ways that
    models can interact with the data: through natural language, where the LLM interprets
    the table as a string using its knowledge base, and by generating and executing
    code, leveraging tools to process the dataset as an object.'
  id: totrans-81
  prefs: []
