  zh: 这篇文章是一个教程，展示了**如何从头开始构建处理时间序列和大型数据框的代理**。我们涵盖了模型与数据交互的两种方式：通过自然语言，其中LLM使用其知识库将表格解释为字符串，以及通过生成和执行代码，利用工具将数据集作为对象处理。
