- en: Animating Linear Transformations with Quiver
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用矢量场动画线性变换
- en: 原文：[https://towardsdatascience.com/animating-linear-transformations-with-quiver/](https://towardsdatascience.com/animating-linear-transformations-with-quiver/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/animating-linear-transformations-with-quiver/](https://towardsdatascience.com/animating-linear-transformations-with-quiver/)
- en: <mdspan datatext="el1750274715538" class="mdspan-comment">Working as a data</mdspan>
    scientist inevitably means working on multiple layers of abstraction, foremost
    abstractions of code and math. This is great, because this allows you to get astonishing
    results quickly. But sometimes it is well-advised to pause for a second and ponder
    what actually happens behind a neat interface. This process of pondering is often
    assisted by visualizations. In this article, I want to present how animated quiver
    plots can help to ponder about linear transformations, which often toil away reliably
    in the obscurity of machine learning algorithms and associated interfaces. In
    the end, we will be able to visualize concepts like Singular Value Decomposition
    with our quiver plot.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1750274715538" class="mdspan-comment">作为一名数据科学家工作不可避免地意味着在多个抽象层上工作，首先是代码和数学的抽象。这很好，因为这让你能够快速获得惊人的结果。但有时停下来思考一下整洁界面背后实际发生了什么是很明智的。这个过程通常由可视化辅助。在这篇文章中，我想介绍如何使用动画矢量场图来思考线性变换，这些变换通常在机器学习算法和相关界面的阴暗角落中可靠地默默工作。最后，我们将能够用我们的矢量场图可视化像奇异值分解这样的概念。
- en: Plotting Static Quiver Plots
  id: totrans-3
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 绘制静态矢量场图
- en: 'A quiver plot from the `matplotlib` python package allows us to plot arrows
    (which in our case represent vectors). Let’s first take a look at a static quiver
    plot:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 来自 `matplotlib` Python 包的矢量场图允许我们绘制箭头（在我们的情况下代表向量）。让我们先看看一个静态矢量场图：
- en: '![](../Images/156c2f850d6192e060ef7a7b441b754b.png)'
  id: totrans-5
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/156c2f850d6192e060ef7a7b441b754b.png)'
- en: Image by Author
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: 'We can directly derive the transformation matrix from the image by looking
    at the target positions of the two base vectors. The first base vector is starting
    at position (1, 0) and landing on (1, 1), while the second base vector travels
    from (0, 1) to (-1, 1). Therefore the matrix, that describes this transformation
    is:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以直接从图像中通过查看两个基向量的目标位置来推导出变换矩阵。第一个基向量从位置 (1, 0) 开始，落在 (1, 1) 上，而第二个基向量从 (0,
    1) 移动到 (-1, 1)。因此，描述这个变换的矩阵是：
- en: \[
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \begin{pmatrix}
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: \begin{pmatrix}
- en: 1 & -1 \\
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 1 & -1 \\
- en: 1 & 1 \\
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 1 & 1 \\
- en: \end{pmatrix}
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: \end{pmatrix}
- en: \]
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: Visually this corresponds to an anti-clockwise rotation by 45 degrees (or \(\pi/4\)
    in radian) and a slight stretch (by the factor \(\sqrt{2}\)).
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 从视觉上看，这相当于逆时针旋转45度（或 \(\pi/4\) 弧度）和轻微拉伸（因子 \(\sqrt{2}\)）。
- en: 'With this information, let’s look at how this is implemented with quiver (Note
    that I omit some boilerplate code like scaling of axis):'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 带着这些信息，让我们看看如何使用矢量场实现这一点（注意，我省略了一些样板代码，如轴的缩放）：
- en: '[PRE0]'
  id: totrans-16
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: As you can see we defined one quiver plot per vector. This is just for illustrative
    purposes. If we look at the signature of the quiver function – `quiver([X, Y],
    U, V, [C], /, **kwargs)` – we can observe that U and V take numpy arrays as input,
    which is better than providing scalar values. Let’s refactor this function to
    using only one quiver invocation. Additionally, let’s add a vector v = (1.5, -0.5)
    to see the transformation applied on it.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，我们为每个向量定义了一个矢量场图。这只是为了说明目的。如果我们看看矢量函数的签名 – `quiver([X, Y], U, V, [C], /,
    **kwargs)` – 我们可以观察到 U 和 V 接收 numpy 数组作为输入，这比提供标量值要好。让我们重构这个函数，使其只使用一次矢量调用。此外，让我们添加一个向量
    v = (1.5, -0.5) 来查看它上的变换。
- en: '[PRE1]'
  id: totrans-18
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'This is much shorter and convenient than the first example. What we did here
    was to stack each vector horizontally producing the following array:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 这比第一个例子要短得多，也更方便。我们在这里做的是水平堆叠每个向量，产生以下数组：
- en: '![](../Images/d0af1733d6f2ebe20a9fb8e71fe6bf9f.png)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/d0af1733d6f2ebe20a9fb8e71fe6bf9f.png)'
- en: 'The first row corresponds to the U-parameter of `quiver` and the second to
    V. While the columns hold our vectors, where \(\vec{i}\) is the first base vector,
    \(\vec{j}\) is the second and \(\vec{v}\) is our custom vector. The indices, b
    and a, stand for *before* and *after* (i.e. whetherthe linear transformation is
    applied or not). Let’s look at the output:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 第一行对应于 `quiver` 的 U 参数，第二行对应于 V。而列代表我们的向量，其中 \(\vec{i}\) 是第一个基向量，\(\vec{j}\)
    是第二个，\(\vec{v}\) 是我们的自定义向量。索引 b 和 a 代表 *before* 和 *after*（即线性变换是否应用）。让我们看看输出：
- en: '![](../Images/1e542ac150e8b9615fc63bb980b13f49.png)'
  id: totrans-22
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/1e542ac150e8b9615fc63bb980b13f49.png)'
- en: Linear Transformation of base vectors and \(\vec{v}\)
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 基向量与 \(\vec{v}\) 的线性变换
- en: Image by Author
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: 'Taking a second look at the code it might be confusing what happened to our
    neat and simple transformation matrix, which was restated to:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 重新审视代码，可能会让人困惑我们整洁简单的变换矩阵发生了什么，它被重新表述为：
- en: \[
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: '{\scriptsize'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: '{\scriptsize'
- en: M=\begin{pmatrix}
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: M=\begin{pmatrix}
- en: '{1}&{-1}\\'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: '{1}&{-1}\\'
- en: '{1}&{1}\\'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: '{1}&{1}\\'
- en: \end{pmatrix}={\sqrt{2}}
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: \end{pmatrix}={\sqrt{2}}
- en: \begin{pmatrix}
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: \begin{pmatrix}
- en: '{\cos\left(\frac{1}{4}\pi\right)}&{\cos\left(\frac{3}{4}\pi\right)}\\'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: '{\cos\left(\frac{1}{4}\pi\right)}&{\cos\left(\frac{3}{4}\pi\right)}\\'
- en: '{\sin\left(\frac{1}{4}\pi\right)}&{\sin\left(\frac{3}{4}\pi\right)}\\'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: '{\sin\left(\frac{1}{4}\pi\right)}&{\sin\left(\frac{3}{4}\pi\right)}\\'
- en: \end{pmatrix}
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: \end{pmatrix}
- en: '}'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: '}'
- en: \]
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: The reason is, as we move on by adding animations, this representation will
    come in handy. The scalar multiplication by the square root of two represents
    how much our vectors get stretched, while the elements of the matrix are rewritten
    in trigonometric notation to depict the rotation in the unit circle.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 原因在于，随着我们添加动画，这种表示方法将变得非常有用。通过平方根的标量乘法表示我们的向量拉伸了多少，而矩阵的元素则用三角函数表示，以描绘单位圆中的旋转。
- en: Let’s animate
  id: totrans-39
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 让我们开始动画
- en: 'Reasons to add animations may include cleaner plots as we can get rid of the
    ghost vectors and create a more engaging experience for presentations. In order
    to enhance our plot with animations we can stay in the matplotlib ecosystem by
    utilizing the `FuncAnimation()` function from `matplotlib.animation`. The function
    takes the following arguments:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 添加动画的原因可能包括更清晰的图表，我们可以去除幽灵向量，并为演示创造更吸引人的体验。为了通过动画增强我们的图表，我们可以通过使用`matplotlib.animation`中的`FuncAnimation()`函数留在matplotlib生态系统中。该函数接受以下参数：
- en: a `matplotlib.figure.Figure` object
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: a `matplotlib.figure.Figure` object
- en: an update function
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个更新函数
- en: the number of frames
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 帧数
- en: For each frame the update function gets invoked producing an updated version
    of the initial quiver plot. For more details check the [official documentation](https://matplotlib.org/stable/api/_as_gen/matplotlib.pyplot.quiver.html)
    from matplotlib.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 对于每一帧，更新函数都会被调用，生成初始矢量图的更新版本。更多详情请查看matplotlib的[官方文档](https://matplotlib.org/stable/api/_as_gen/matplotlib.pyplot.quiver.html)。
- en: With this information in mind our task is to define the logic to implement in
    the update function. Let’s start simple with only three frames and our base vectors.
    On frame 0 we are in the initial state. While on the last frame (frame 2) we need
    to arrive at the restated matrix M. Therefore we would expect to be half way there
    on frame 1\. Because the arguments of \(\cos\) and \(\sin\) in M show the radians
    (i.e. how far we have traveled on the unit circle), we can divide them by two
    in order to get our desired rotation. (The second vector gets a negative \(\cos\)
    , because we are now in the second quadrant). Similarly we need to account for
    the stretch, represented by the scalar factor. We do this by computing the change
    in magnitude, which is \(\sqrt{2}-1\), and adding half of that change to the initial
    scaling.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到这些信息，我们的任务是定义在更新函数中实现的逻辑。让我们从只有三个帧和基向量开始简单。在帧0时，我们处于初始状态。而在最后一帧（帧2）时，我们需要到达重新表述的矩阵M。因此，我们预计在帧1时会达到一半。因为M中\(\cos\)和\(\sin\)的参数表示弧度（即我们在单位圆上走了多远），我们可以将它们除以二以获得所需的旋转。（第二个向量得到一个负的\(\cos\)，因为我们现在处于第二象限）。同样，我们需要考虑拉伸，由标量因子表示。我们通过计算变化量来完成，这个变化量是\(\sqrt{2}-1\)，并将这个变化量的一半加到初始缩放上。
- en: \[
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: '{\scriptsize'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: '{\scriptsize'
- en: \begin{aligned}
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: \begin{aligned}
- en: \text{Frame 0:} \quad &
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: \text{第0帧:} \quad &
- en: \begin{pmatrix}
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: \begin{pmatrix}
- en: \cos(0) & \cos\left(\frac{\pi}{2}\right) \\
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: \cos(0) & \cos\left(\frac{\pi}{2}\right) \\
- en: \sin(0) & \sin\left(\frac{\pi}{2}\right)
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: \sin(0) & \sin\left(\frac{\pi}{2}\right)
- en: \end{pmatrix}
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: \end{pmatrix}
- en: \\[1em]
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: \\[1em]
- en: \text{Frame 1:} \quad &
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: \text{第1帧:} \quad &
- en: s \cdot \begin{pmatrix}
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: s \cdot \begin{pmatrix}
- en: \cos\left(\frac{1}{2} \cdot \frac{\pi}{4}\right) & -\cos\left(\frac{1}{2} \cdot
    \frac{3\pi}{4}\right) \\
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: \cos\left(\frac{1}{2} \cdot \frac{\pi}{4}\right) & -\cos\left(\frac{1}{2} \cdot
    \frac{3\pi}{4}\right) \\
- en: \sin\left(\frac{1}{2} \cdot \frac{\pi}{4}\right) & \sin\left(\frac{1}{2} \cdot
    \frac{3\pi}{4}\right)
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: \sin\left(\frac{1}{2} \cdot \frac{\pi}{4}\right) & \sin\left(\frac{1}{2} \cdot
    \frac{3\pi}{4}\right)
- en: \end{pmatrix}, \quad \text{with } s = 1 + \frac{\sqrt{2} – 1}{2}
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: \end{pmatrix}, \quad \text{其中 } s = 1 + \frac{\sqrt{2} – 1}{2}
- en: \\[1em]
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: \\[1em]
- en: \text{Frame 2:} \quad &
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: \text{第2帧:} \quad &
- en: \sqrt{2} \cdot \begin{pmatrix}
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: \sqrt{2} \cdot \begin{pmatrix}
- en: \cos\left(\frac{\pi}{4}\right) & \cos\left(\frac{3\pi}{4}\right) \\
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: \cos\left(\frac{\pi}{4}\right) & \cos\left(\frac{3\pi}{4}\right) \\
- en: \sin\left(\frac{\pi}{4}\right) & \sin\left(\frac{3\pi}{4}\right)
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: \sin\left(\frac{\pi}{4}\right) & \sin\left(\frac{3\pi}{4}\right)
- en: \end{pmatrix}
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: \end{pmatrix}
- en: \end{aligned}
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: \end{aligned}
- en: '}'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: '}'
- en: \]
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: '![](../Images/faadf8c18f3fdabd7eb86ea68606b857.png)'
  id: totrans-69
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/faadf8c18f3fdabd7eb86ea68606b857.png)'
- en: The matrices describe where the two base vectors land on each frame
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: The matrices describe where the two base vectors land on each frame
- en: GIF by Author
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: GIF by Author
- en: 'One Caveat to the explanation above: It serves the purpose to give intuition
    to the implementation idea and holds true for the base vectors. However the actual
    implementation contains some more steps, e.g. some transformations with \(\arctan\)
    to get the desired behavior for all vectors in the two-dimensional space.'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 'One Caveat to the explanation above: It serves the purpose to give intuition
    to the implementation idea and holds true for the base vectors. However the actual
    implementation contains some more steps, e.g. some transformations with \(\arctan\)
    to get the desired behavior for all vectors in the two-dimensional space.'
- en: So let’s inspect the main parts of the implementation. The full code can be
    found on my [github](https://github.com/KendamaQQ/lin_transform).
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: So let’s inspect the main parts of the implementation. The full code can be
    found on my [github](https://github.com/KendamaQQ/lin_transform).
- en: '[PRE2]'
  id: totrans-74
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: The `animate()` method belongs to a custom class, which is called `AnimationPlotter`.
    It does what we already learned with the inputs as provided above. The second
    class on the scene is a custom class `Transformer`, which takes care of computing
    the linear transformations and intermediate vectors for each frame. The main logic
    lies within the `AnimationPlotter.update_quiver()` and `Transformer.get_intermediate_vectors()`
    methods, and looks as follows.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: The `animate()` method belongs to a custom class, which is called `AnimationPlotter`.
    It does what we already learned with the inputs as provided above. The second
    class on the scene is a custom class `Transformer`, which takes care of computing
    the linear transformations and intermediate vectors for each frame. The main logic
    lies within the `AnimationPlotter.update_quiver()` and `Transformer.get_intermediate_vectors()`
    methods, and looks as follows.
- en: '[PRE3]'
  id: totrans-76
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: What happens here is that for each frame the intermediate vectors get computed.
    This is done by taking the difference between the end and start directions (which
    represent vector angles). The change in direction/angle is then normalized to
    the range \([-\pi, \pi]\) and added to the initial direction by a ratio. The ratio
    is determined by the current and total frames. The magnitude is determined as
    already described. Finally, the incremented vector gets computed based on the
    direction and magnitude and this is what we see at each frame in the animation.
    Increasing the frames to say 30 or 60 makes the animation smooth.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: What happens here is that for each frame the intermediate vectors get computed.
    This is done by taking the difference between the end and start directions (which
    represent vector angles). The change in direction/angle is then normalized to
    the range \([-\pi, \pi]\) and added to the initial direction by a ratio. The ratio
    is determined by the current and total frames. The magnitude is determined as
    already described. Finally, the incremented vector gets computed based on the
    direction and magnitude and this is what we see at each frame in the animation.
    Increasing the frames to say 30 or 60 makes the animation smooth.
- en: Animating Singular Value Decomposition (SVD)
  id: totrans-78
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 动画奇异值分解（SVD）
- en: 'Finally I want to showcase how the introductory animation was created. It shows
    how 4 vectors (each for every quadrant) get transformed consecutively three times.
    Indeed, the three transformations applied correspond to our meanwhile well-known
    transformation matrix M from above, but decomposed via Singular Value Decomposition
    (SVD). You can gain or refresh your knowledge about SVD in [this](https://towardsdatascience.com/svd-8c2f72e264f/)
    great and intuitive tds article. Or take a look [here](https://towardsdatascience.com/singular-value-decomposition-svd-demystified-57fc44b802a0/)
    if you prefer a more math-focused read. However, with `numpy.linalg.svd()` it
    is straightforward to compute the SVD of our matrix M. Doing so results in the
    following decomposition:'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 最后我想展示一下如何创建介绍性动画。它展示了4个向量（每个象限一个）依次进行三次变换。确实，应用的三次变换对应于我们上面已知的变换矩阵M，但通过奇异值分解（SVD）进行分解。您可以在[这篇文章](https://towardsdatascience.com/svd-8c2f72e264f/)中获取或更新您关于SVD的知识，这是一篇非常好且直观的tds文章。或者如果您更喜欢更数学化的阅读，可以[在这里](https://towardsdatascience.com/singular-value-decomposition-svd-demystified-57fc44b802a0/)查看。然而，使用`numpy.linalg.svd()`计算矩阵M的奇异值分解非常简单。这样做会导致以下分解：
