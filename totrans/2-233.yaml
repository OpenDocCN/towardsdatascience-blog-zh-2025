- en: Conclusion
  id: totrans-107
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 结论
- en: To wrap it up, we can use `quiver()` to display vectors in 2D space and, with
    the help of `matplotlib.animation.FuncAnimation(),` add appealing animations on
    top. This results in clear visualizations of linear transformations that you can
    use, for instance, to demonstrate the underlying mechanics of your machine learning
    algorithms. Feel free to fork my repository and implement your own visualizations.
    I hope you enjoyed the read!
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，我们可以使用 `quiver()` 函数在二维空间中显示向量，并借助 `matplotlib.animation.FuncAnimation()`
    添加吸引人的动画效果。这可以清晰地展示线性变换，例如，你可以用它来演示机器学习算法的底层机制。欢迎您fork我的仓库并实现您自己的可视化。希望您喜欢阅读！
