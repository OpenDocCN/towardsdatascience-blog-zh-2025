- en: Anatomy of a Gradio App
  id: totrans-23
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Gradio应用的解剖结构
- en: 'A typical Gradio app comprises the following components:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 一个典型的Gradio应用由以下组件组成：
- en: '**Interface** for defining inputs and outputs'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**接口**用于定义输入和输出'
- en: '**Components** such as `Textbox`, `Dropdown`, and `Audio`'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**组件**如`Textbox`、`Dropdown`和`Audio`'
- en: '**Functions** for linking the backend logic'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**函数**用于链接后端逻辑'
- en: '**.launch()** to spin up and optionally share the app with the option `share=True`.'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**.launch()**启动应用，并可选择使用`share=True`选项共享应用。'
- en: 'The [**Interface**](https://www.gradio.app/main/docs/gradio/interface) class
    has three core arguments: **fn**, **inputs**, and **outputs**. Assign (or set)
    the `fn` argument to any Python function that you want to wrap with a user interface
    (UI). The inputs and outputs take one or more Gradio components. You can pass
    in the name of these components as a string, such as `"textbox"` or `"text"`,
    or for more customizability, an instance of a class like [Textbox()](https://www.gradio.app/main/docs/gradio/textbox).'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: '`**Interface**` 类有三个核心参数：**fn**、**inputs** 和 **outputs**。将 `fn` 参数分配（或设置）为任何您想要用用户界面（UI）包装的
    Python 函数。输入和输出接受一个或多个 Gradio 组件。您可以将这些组件的名称作为字符串传入，例如 `"textbox"` 或 `"text"`，或者为了更高的可定制性，传入一个类实例，如
    `[Textbox()](https://www.gradio.app/main/docs/gradio/textbox)`。'
- en: '[PRE8]'
  id: totrans-30
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: '![](../Images/185cdf6aff087bf0bf560739bd7f8f8a.png)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/185cdf6aff087bf0bf560739bd7f8f8a.png)'
- en: Image by author
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: 'The [**Flag**](https://www.gradio.app/guides/using-flagging) button appears
    by default in the Interface so the user can flag any “interesting” combination.
    In our example, if we press the flag button, Gradio will generate a CSV log file
    under `.gradio\flagged` with the following content:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 默认情况下，`**Flag**` 按钮出现在 Interface 中，以便用户可以标记任何“有趣”的组合。在我们的示例中，如果我们按下标记按钮，Gradio
    将在 `.gradio\flagged` 下生成一个包含以下内容的 CSV 日志文件：
- en: '[PRE9]'
  id: totrans-34
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: You may turn off this flagging option by setting `flagging_mode="never"` within
    the Interface.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以通过在 Interface 中设置 `flagging_mode="never"` 来关闭此标记选项。
- en: Also note that we can remove the Submit button and automatically trigger the
    `multiply` function via setting `live=True` in Interface.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 还请注意，我们可以通过在 Interface 中设置 `live=True` 来移除提交按钮并自动触发 `multiply` 函数。
- en: Converting Our TTS Script to a Gradio App
  id: totrans-37
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 将我们的 TTS 脚本转换为 Gradio 应用
- en: 'As demonstrated, Gradio’s core concept is simple: you wrap your Python function
    with a UI using the `Interface` class. Here’s how you can turn the TTS script
    into a web app:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 如所示，Gradio 的核心概念很简单：您可以使用 `Interface` 类将您的 Python 函数包装在一个 UI 中。以下是您如何将 TTS 脚本转换为
    Web 应用的方法：
- en: '[PRE10]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: '![](../Images/fb50ace2df960606fbdf8e034cfa8b13.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/fb50ace2df960606fbdf8e034cfa8b13.png)'
- en: Image by author
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: <https://contributor.insightmediagroup.io/wp-content/uploads/2025/07/bug.wav?_=1>
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: <https://contributor.insightmediagroup.io/wp-content/uploads/2025/07/bug.wav?_=1>
- en: '[https://contributor.insightmediagroup.io/wp-content/uploads/2025/07/bug.wav](https://contributor.insightmediagroup.io/wp-content/uploads/2025/07/bug.wav)'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://contributor.insightmediagroup.io/wp-content/uploads/2025/07/bug.wav](https://contributor.insightmediagroup.io/wp-content/uploads/2025/07/bug.wav)'
- en: With just a few lines, you can have a web app where users can type text, pick
    a speaker, and listen to the generated audio—all running locally. Sharing this
    app is as simple as replacing the last line with `demo.launch(share=True)`, which
    gives you a public URL instantly. For production or persistent hosting, you can
    deploy Gradio apps for free on [Hugging Face Spaces](https://huggingface.co/spaces),
    or run them on your own server.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 只需几行代码，您就可以拥有一个 Web 应用，用户可以在其中输入文本、选择说话者并收听生成的音频——所有操作都在本地进行。分享此应用只需将最后一行替换为
    `demo.launch(share=True)`，这会立即为您提供公共 URL。对于生产或持久托管，您可以在 [Hugging Face Spaces](https://huggingface.co/spaces)
    上免费部署 Gradio 应用，或者在自己的服务器上运行它们。
- en: 'Beyond Interface: Blocks for Power Users'
  id: totrans-45
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 除此之外：为高级用户提供的块
- en: 'While Interface is suitable for most use cases, Gradio also offers [**Blocks**](https://www.gradio.app/main/docs/gradio/blocks),
    a lower-level API for building complex, multi-step apps with custom layouts, multiple
    functions, and dynamic interactivity. With Blocks, you can:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然 Interface 适用于大多数用例，但 Gradio 还提供了 `[**Blocks**](https://www.gradio.app/main/docs/gradio/blocks)`，这是一个更底层的
    API，用于构建具有自定义布局、多个函数和动态交互的复杂、多步骤应用。使用 Blocks，您可以：
- en: Arrange components in rows, columns, or tabs
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 以行、列或选项卡的形式排列组件
- en: Chain outputs as inputs for other functions
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将输出作为其他函数的输入链式连接
- en: Update component properties dynamically (e.g., hide/show, enable/disable)
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 动态更新组件属性（例如，隐藏/显示、启用/禁用）
- en: Build dashboards, multi-modal apps, or even full-featured web UIs
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 构建仪表板、多模态应用或甚至全功能的 Web UI
- en: 'Here’s a taste of what’s possible with a simple app that counts the number
    of words as soon as the user finishes typing, and lets the user clear the input
    and output with a single button. The example shows how you can control the layout
    of the app with [**Row**](https://www.gradio.app/main/docs/gradio/row) and showcases
    two key event types: `.change()` and `.click()`.'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 这只是一个简单的应用的示例，该应用在用户完成输入后立即计算单词数量，并允许用户通过单个按钮清除输入和输出。示例展示了如何使用 `[**Row**](https://www.gradio.app/main/docs/gradio/row)`
    控制应用的布局，并展示了两个关键事件类型：`.change()` 和 `.click()`。
- en: '[PRE11]'
  id: totrans-52
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: '![](../Images/787109117ed04c693149e1f5f7bd0f48.png)'
  id: totrans-53
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/787109117ed04c693149e1f5f7bd0f48.png)'
- en: Image by author
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: In case you’re curious about the type of these components, try
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你对此类组件的类型感到好奇，可以尝试
- en: '[PRE12]'
  id: totrans-56
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: Note that at runtime, you cannot directly “read” the value of a `Textbox` like
    a variable. Gradio components are not live-bound to Python variables—they just
    define the UI and behavior. The actual value of a `Textbox` exists on the client
    (in the browser), and it’s passed to your Python functions only when a user interaction
    occurs (like `.click()` or `.change()`). If you’re exploring advanced flows (like
    maintaining or syncing state), Gradio’s [**State**](https://www.gradio.app/guides/state-in-blocks)
    can be handy.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，在运行时，你不能像变量一样直接“读取”`Textbox`的值。Gradio 组件不是与 Python 变量实时绑定——它们只是定义 UI 和行为。`Textbox`的实际值存在于客户端（浏览器中），并且只有在用户交互发生时（如`.click()`或`.change()`）才会传递到你的
    Python 函数中。如果你正在探索高级流程（如维护或同步状态），Gradio 的[**状态**](https://www.gradio.app/guides/state-in-blocks)可能会有所帮助。
- en: Updating Gradio Components
  id: totrans-58
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 更新 Gradio 组件
- en: 'Gradio gives you some flexibility when it comes to updating components. Consider
    the following two code snippets—although they look a little different, but they
    do the same thing: update the text inside a `Textbox` when a button is clicked.'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 在更新组件方面，Gradio 给你提供了一些灵活性。考虑以下两个代码片段——尽管它们看起来有些不同，但它们做的是同一件事：在按钮点击时更新`Textbox`内的文本。
- en: '**Option 1:** Returning the new value directly'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: '**选项 1：直接返回新值**'
- en: '[PRE13]'
  id: totrans-61
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: '**Option 2:** Using `gr.update()`'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: '**选项 2：使用 `gr.update()`**'
- en: '[PRE14]'
  id: totrans-63
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: '![](../Images/c1862817e8f5a2754b29667d7ad14c57.png)'
  id: totrans-64
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c1862817e8f5a2754b29667d7ad14c57.png)'
- en: Image by author
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: So which should you use? If you’re just updating the `value` of a component,
    returning a plain string (or number, or whatever the component expects) is totally
    fine. However, if you want to update other properties—like hiding a component,
    changing its label, or disabling it—then `gr.update()` is the way to go.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，你应该使用哪一个呢？如果你只是更新组件的`value`，返回一个纯字符串（或数字，或组件期望的任何内容）是完全可以的。然而，如果你想更新其他属性——比如隐藏组件、更改其标签或禁用它——那么`gr.update()`就是你的选择。
- en: 'It’s also helpful to understand what kind of object `gr.update()` returns,
    to dispel some of the mystery around it. For example, under the hood, `gr.update(visible=False)`
    is just a dictionary:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 理解 `gr.update()` 返回的对象类型也有帮助，以消除一些围绕它的神秘感。例如，在底层，`gr.update(visible=False)`
    只是一个字典：
- en: '[PRE15]'
  id: totrans-68
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: It’s a small detail, but knowing when and how to use `gr.update()` can make
    your Gradio apps more dynamic and responsive.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 这只是一个小的细节，但知道何时以及如何使用 `gr.update()` 可以让你的 Gradio 应用程序更加动态和响应。
