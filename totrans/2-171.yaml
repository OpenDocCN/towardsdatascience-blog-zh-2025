  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: For this blog, we will use the `XTTS-v2` model, which supports 17 languages
    and 58 speaker voices. You may load the model and view the speakers via
