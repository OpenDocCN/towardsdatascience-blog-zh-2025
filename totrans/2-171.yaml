    the original package with `pip install TTS`.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Next, we can make the necessary imports for our script:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: Currently, `TTS` gives you access to 94 models that you can list by running
