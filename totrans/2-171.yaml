- en: Build Interactive Machine Learning Apps with Gradio
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用Gradio构建交互式机器学习应用
- en: 原文：[https://towardsdatascience.com/build-interactive-machine-learning-apps-with-gradio/](https://towardsdatascience.com/build-interactive-machine-learning-apps-with-gradio/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/build-interactive-machine-learning-apps-with-gradio/](https://towardsdatascience.com/build-interactive-machine-learning-apps-with-gradio/)
- en: As a developer working with machine learning models, you likely spend hours
    writing scripts and adjusting hyperparameters. But when it comes to sharing your
    work or letting others interact with your models, the gap between a Python script
    and a usable web app can feel enormous. [**Gradio**](https://www.gradio.app/)
    is an open source Python library that lets you turn your Python scripts into interactive
    web applications without requiring frontend expertise.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 作为与机器学习模型一起工作的开发者，你可能花费数小时编写脚本和调整超参数。但当涉及到分享你的工作或让其他人与你交互模型时，Python脚本和可用Web应用之间的差距可能感觉巨大。[**Gradio**](https://www.gradio.app/)是一个开源Python库，它允许你将Python脚本转换为交互式Web应用，而无需前端专业知识。
- en: 'In this blog, we’ll take a fun, hands-on approach to learning the key Gradio
    components by building a **text-to-speech** (TTS) web application that you can
    run on an [**AI PC**](https://www.intel.com/content/www/us/en/ai-pc/overview.html)
    or [**Intel® Tiber™ AI Cloud**](https://ai.cloud.intel.com/) and share with others.
    (Full disclosure: the author is affiliated with Intel.)'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇博客中，我们将通过构建一个可以在[**AI PC**](https://www.intel.com/content/www/us/en/ai-pc/overview.html)或[**Intel®
    Tiber™ AI Cloud**](https://ai.cloud.intel.com/)上运行并与他人分享的**文本到语音**（TTS）Web应用来有趣地、动手地学习Gradio的关键组件。（完全披露：作者与Intel有合作关系。）
