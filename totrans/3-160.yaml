- en: 'Mastering the Poisson Distribution: Intuition and Foundations'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 掌握泊松分布：直觉与基础
- en: 原文：[https://towardsdatascience.com/mastering-the-poisson-distribution-intuition-and-foundations/](https://towardsdatascience.com/mastering-the-poisson-distribution-intuition-and-foundations/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/mastering-the-poisson-distribution-intuition-and-foundations/](https://towardsdatascience.com/mastering-the-poisson-distribution-intuition-and-foundations/)
- en: 'You’ve probably used the normal distribution one or two times too many. We
    all have — It’s a true workhorse. But sometimes, we run into problems. For instance,
    when predicting or forecasting values, simulating data given a particular data-generating
    process, or when we try to visualise model output and explain them intuitively
    to non-technical stakeholders. Suddenly, things don’t make much sense: can a user
    really have made -8 clicks on the banner? Or even 4.3 clicks? Both are examples
    of how count data doesn’t behave.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能过度使用了正态分布一两次。我们都有——它是一匹真正的马。但有时，我们会遇到问题。例如，在预测或预测值时，根据特定的数据生成过程模拟数据，或者当我们试图可视化模型输出并向非技术利益相关者直观解释时。突然之间，事情没有太多意义：用户真的会在横幅上点击-8次吗？或者甚至4.3次？这两个都是计数数据如何不表现出来的例子。
- en: I’ve found that better encapsulating the data generating process into my modelling
    has been key to having sensible model output. Using the Poisson distribution when
    it was appropriate has not only helped me convey more meaningful insights to stakeholders,
    but it has also enabled me to produce more accurate error estimates, better inference,
    and sound decision-making.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 我发现，将数据生成过程更好地封装到我的模型中对于获得合理的模型输出至关重要。在适当的时候使用泊松分布不仅帮助我向利益相关者传达更有意义的见解，还使我能够产生更准确的误差估计、更好的推理和明智的决策。
- en: In this post, my aim is to help you get a deep intuitive feel for the Poisson
    distribution by walking through example applications, and taking a dive into the
    foundations — the maths. I hope you learn not just how it works, but also why
    it works, and when to apply the distribution.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我的目标是通过对示例应用进行讲解，并深入探讨基础——数学，帮助你深入理解泊松分布。我希望你不仅学会它是如何工作的，还学会为什么它会工作，以及何时应用这个分布。
- en: '*If you know of a resource that has helped you grasp the concepts in this blog
    particularly well, you’re invited to share it in the comments!*'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: '*如果你知道某个资源特别有助于你掌握这个博客中的概念，请邀请你在评论中分享！*'
- en: Outline
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 概述
- en: '**Examples and use cases:** Let’s walk through some use cases and sharpen the
    intuition I just mentioned. Along the way, the relevance of the Poisson distribution
    will become clear.'
  id: totrans-7
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**示例和用例：**让我们通过一些用例来加深我刚才提到的直觉，在这个过程中，泊松分布的相关性将变得清晰。'
- en: '**The foundations:** Next, let’s break down the equation into its individual
    components. By studying each part, we’ll uncover why the distribution works the
    way it does.'
  id: totrans-8
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**基础：**接下来，让我们将方程分解为其各个组成部分。通过研究每一部分，我们将揭示分布为何以这种方式工作。'
- en: '**The assumptions:** Equipped with some formality, it will be easier to understand
    the assumptions that power the distribution, and at the same time set the boundaries
    for when it works, and when not.'
  id: totrans-9
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**假设：**有了某种形式性，我们将更容易理解推动分布的假设，同时为它何时有效和何时无效设定边界。'
- en: '**When real life deviates from the model:** Finally, let’s explore the special
    links that the Poisson distribution has with the Negative Binomial distribution.
    Understanding these relationships can deepen our understanding, and provide alternatives
    when the Poisson distribution is not suited for the job.'
  id: totrans-10
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**当现实生活偏离模型时：**最后，让我们探索泊松分布与负二项分布之间的特殊联系。理解这些关系可以加深我们的理解，并在泊松分布不适合工作时提供替代方案。'
- en: Example in an online marketplace
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在线市场的例子
- en: 'I chose to deep dive into the Poisson distribution because it frequently appears
    in my day-to-day work. Online marketplaces rely on binary user choices from two
    sides: a seller deciding to list an item and a buyer deciding to make a purchase.
    These micro-behaviours drive supply and demand, both in the short and long term.
    A marketplace is born.'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 我选择深入研究泊松分布，因为它经常出现在我的日常工作中。在线市场依赖于两方面的二元用户选择：卖家决定列出商品和买家决定进行购买。这些微观行为在短期和长期都驱动着供需。一个市场就诞生了。
- en: Binary choices aggregate into counts — the sum of many such decisions as they
    occur. Attach a timeframe to this counting process, and you’ll start seeing Poisson
    distributions everywhere. Let’s explore a concrete example next.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 二元选择汇总为计数——许多此类决策的总和。将时间框架附加到这个计数过程，你将开始看到到处都是泊松分布。让我们接下来探讨一个具体的例子。
- en: Consider a seller on a platform. In a given month, the seller may or may not
    list an item for sale (a binary choice). We would only know if she did because
    then we’d have a measurable count of the event. Nothing stops her from listing
    another item in the same month. If she does, we count those events. The total
    could be zero for an inactive seller or, say, 120 for a highly engaged seller.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑一个平台上的卖家。在一个月内，卖家可能列出也可能不列出待售商品（一个二元选择）。我们只会知道她是否这样做，因为那时我们会有一个可测量的事件计数。没有任何东西阻止她在同一个月内列出另一件商品。如果她这样做，我们会计算这些事件。对于不活跃的卖家，总数可能为零，或者对于一个高度参与的卖家，可能是120。
- en: Over several months, we would observe a varying number of listed items by this
    seller — sometimes fewer, sometimes more — hovering around an average monthly
    listing rate. That is essentially a Poisson process. When we get to the assumptions
    section, you’ll see what we had to assume away to make this example work.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 在几个月内，我们会观察到这个卖家列出的商品数量会有所不同——有时较少，有时较多——围绕着平均每月列表率。这本质上是一个泊松过程。当我们到达假设部分时，你会看到我们为了使这个例子工作而必须放弃的假设。
- en: Other examples
  id: totrans-16
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 其他示例
- en: 'Other phenomena that can be modelled with a Poisson distribution include:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 其他可以用泊松分布建模的现象包括：
- en: '**Sports analytics**: The number of goals scored in a match between two teams.'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**体育分析**：两支球队之间比赛中进球的数量。'
- en: '**Queuing**: Customers arriving at a help desk or customer support calls.'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**排队**：客户到达帮助台或客户支持电话。'
- en: '**Insurance**: The number of claims made within a given period.'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**保险**：在一定时期内提出的索赔数量。'
- en: Each of these examples warrants further inspection, but for the remainder of
    this post, we’ll use the marketplace example to illustrate the inner workings
    of the distribution.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 这些每个例子都值得进一步检查，但在这篇帖子的剩余部分，我们将使用市场示例来说明分布的内部工作原理。
- en: The mathy bit
  id: totrans-22
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数学部分
- en: '*… or foundations.*'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: '*…或者基础。*'
- en: 'I find opening up the probability mass function (PMF) of distributions helpful
    to understanding why things work as they do. The PMF of the Poisson distribution
    goes like:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 我发现打开分布的概率质量函数（PMF）有助于理解为什么事物会按照它们的方式运作。泊松分布的PMF如下所示：
- en: '![](../Images/7e03a39aba0fa47e2b7a4a5fad01ba46.png)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/7e03a39aba0fa47e2b7a4a5fad01ba46.png)'
- en: Where λ is the rate parameter, and 𝑘 is the manifested count of the random variable
    (𝑘 = 0, 1, 2, 3, … events). Very neat and compact.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 其中λ是速率参数，而𝑘是随机变量的显现计数（𝑘 = 0, 1, 2, 3, …事件）。非常整洁且紧凑。
- en: '![Graph: The probability mass function of the Poisson distribution, for a few
    different lambdas.](../Images/8e71f2e3ea930a7d7e5c5dbb9db1532a.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![图：泊松分布的概率质量函数，对于几个不同的λ值。](../Images/8e71f2e3ea930a7d7e5c5dbb9db1532a.png)'
- en: The probability mass function of the Poisson distribution, for a few different
    lambdas.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 泊松分布的概率质量函数，对于几个不同的λ值。
- en: 'Contextualising λ and k: the marketplace example'
  id: totrans-29
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: λ和k的上下文：市场示例
- en: 'In the context of our earlier example — a seller listing items on our platform
    — λ represents the seller’s average monthly listings. As the expected monthly
    value for this seller, λ orchestrates the number of items she would list in a
    month. Note that λ is a Greek letter, so read: λ is a parameter that we can estimate
    from data. On the other hand, 𝑘 does not hold any information about the seller’s
    idiosyncratic behaviour. It’s the target value we set for the number of events
    that may happen to learn about its probability.'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们之前的例子——一个在我们的平台上列出商品的卖家——的背景下，λ代表卖家的平均每月列表数。作为这个卖家的预期月度值，λ协调她一个月内会列出多少商品。请注意，λ是希腊字母，所以读作：λ是我们可以从数据中估计的参数。另一方面，𝑘不包含任何关于卖家独特行为的任何信息。它是我们为可能发生的事件数量设定的目标值，以了解其概率。
- en: The dual role of λ as the mean and variance
  id: totrans-31
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: λ作为平均值和方差的二重角色
- en: When I said that λ orchestrates the number of monthly listings for the seller,
    I meant it quite literally. Namely, λ is both the expected value and variance
    of the distribution, indifferently, for all values of λ. This means that the mean-to-variance
    ratio (index of dispersion) is always 1.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 当我说λ协调卖家每月的列表数量时，我是字面意义上的。也就是说，λ对于所有λ的值，既是分布的期望值也是方差，无差别。这意味着均值到方差的比例（离散指数）始终为1。
- en: To put this into perspective, the normal distribution requires two parameters
    — 𝜇 and 𝜎², the average and variance respectively — to fully describe it. The
    Poisson distribution achieves the same with just one.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 为了将这一点置于正确的视角，正态分布需要两个参数——𝜇 和 𝜎²，分别是平均值和方差——来完全描述它。泊松分布只需一个参数就能达到同样的效果。
- en: Having to estimate only one parameter can be beneficial for parametric inference.
    Specifically, by reducing the variance of the model and increasing the statistical
    power. On the other hand, it can be too limiting of an assumption. Alternatives
    like the Negative Binomial distribution can alleviate this limitation. We’ll explore
    that later.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 只需要估计一个参数可能对参数推断有益。具体来说，通过减少模型的方差并增加统计功效。另一方面，这个假设可能过于限制。像负二项分布这样的替代方案可以缓解这种限制。我们将在以后探讨这一点。
- en: Breaking down the probability mass function
  id: totrans-35
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 拆解概率质量函数
- en: 'Now that we know the smallest building blocks, let’s zoom out one step: what
    is λᵏ, 𝑒^⁻λ, and 𝑘!, and more importantly, what is each of these components’ function
    in the whole?'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们知道了最小的构建块，让我们退后一步：λᵏ、𝑒^⁻λ 和 𝑘! 是什么，更重要的是，这些组成部分在整个函数中的作用是什么？
- en: '**λᵏ **is a weight that expresses how likely it is for 𝑘 events to happen,
    given that the expectation is λ. Note that “likely” here does not mean a probability,
    yet. It’s merely a signal strength.'
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**λᵏ** 是一个权重，表示在期望值为 λ 的情况下 𝑘 个事件发生的可能性。请注意，“可能性”在这里并不意味着概率，而仅仅是一个信号强度。'
- en: '**𝑘!** is a combinatorial correction so that we can say that the order of the
    events is irrelevant. The events are interchangeable.'
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**𝑘!** 是一个组合校正项，因此我们可以认为事件发生的顺序是不相关的。事件是可以互换的。'
- en: '**𝑒^⁻λ** normalises the integral of the PMF function to sum up to 1\. It’s
    called the partition function of exponential-family distributions.'
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**𝑒^⁻λ** 正则化 PMF 函数的积分，使其总和为 1。它被称为指数族分布的配分函数。'
- en: In more detail, λᵏ relates the observed value 𝑘 to the expected value of the
    random variable, λ. Intuitively, more probability mass lies around the expected
    value. Hence, if the observed value lies close to the expectation, the probability
    of occurring is larger than the probability of an observation far removed from
    the expectation. Before we can cross-check our intuition with the numerical behaviour
    of λᵏ, we need to consider what 𝑘! does.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 更详细地说，λᵏ 将观察到的值 𝑘 与随机变量的期望值 λ 相关联。直观上，更多的概率质量位于期望值周围。因此，如果观察到的值接近期望值，发生的概率大于远离期望值的观察值的概率。在我们能够用
    λᵏ 的数值行为来交叉检查我们的直觉之前，我们需要考虑 𝑘! 是什么。
- en: Interchangeable events
  id: totrans-41
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 可互换事件
- en: Had we cared about the order of events, then each unique event could be ordered
    in 𝑘! ways. But because we don’t, and we deem each event interchangeable, we “divide
    out” 𝑘! from λᵏ to correct for the overcounting.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们关心事件发生的顺序，那么每个独特的事件可以以 𝑘! 种方式排序。但因为我们不关心，并且我们认为每个事件可以互换，所以我们“除以” 𝑘! 来校正过度计数。
- en: 'Since λᵏ is an exponential term, the output will always be larger as 𝑘 grows,
    holding λ constant. That is the opposite of our intuition that there is maximum
    probability when λ = 𝑘, as the output is larger when 𝑘 = λ + 1\. But now that
    we know about the interchangeable events assumption — and the overcounting issue
    — we know that we have to factor in 𝑘! like so: λᵏ 𝑒^⁻λ / 𝑘!, to see the behaviour
    we expect.'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 由于 λᵏ 是一个指数项，当 𝑘 增加时，输出值总是更大的，保持 λ 不变。这与我们的直觉相反，即当 λ = 𝑘 时存在最大概率，因为当 𝑘 = λ +
    1 时，输出值更大。但现在我们知道了关于可互换事件假设——以及过度计数问题——我们知道我们必须考虑 𝑘!，如下所示：λᵏ 𝑒^⁻λ / 𝑘!，以看到我们期望的行为。
- en: 'Now let’s check the intuition of the relationship between λ and 𝑘 through λᵏ,
    corrected for 𝑘!. For the same λ, say λ = 4, we should see λᵏ 𝑒^⁻λ / 𝑘! to be
    smaller for values of 𝑘 that are far removed from 4, compared to values of 𝑘 that
    lie close to 4\. Like so: inline code: 4²/2 = 8 is smaller than 4⁴/24 = 10.7\.
    This is consistent with the intuition of a higher likelihood of 𝑘 when it’s near
    the expectation. The image below shows this relationship more generally, where
    you see that the output is larger as 𝑘 approaches λ.'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们通过 λᵏ 来检查 λ 和 𝑘 之间关系的感觉，这里已经对 𝑘! 进行了校正。对于相同的 λ，比如说 λ = 4，我们应该看到当 𝑘 的值远离
    4 时，λᵏ 𝑒^⁻λ / 𝑘! 的值应该比 𝑘 的值接近 4 时的值要小。例如：内联代码：4²/2 = 8 小于 4⁴/24 = 10.7。这与当 𝑘 接近期望值时其可能性更高的直觉一致。下面的图像更普遍地展示了这种关系，其中你可以看到当
    𝑘 接近 λ 时，输出值更大。
- en: '![Graph: The probability mass function without the normalising component e^-lambda.](../Images/1b619775d14392c13fb04037f87f8333.png)'
  id: totrans-45
  prefs: []
  type: TYPE_IMG
  zh: '![Graph: The probability mass function without the normalising component e^-lambda.](../Images/1b619775d14392c13fb04037f87f8333.png)'
- en: The probability mass function without the normalising component e^-lambda.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 没有归一化成分e^-lambda的概率质量函数。
- en: The assumptions
  id: totrans-47
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 假设
- en: 'First, let’s get one thing off the table: the difference between a *Poisson
    process*, and the *Poisson distribution*. The *process* is a stochastic continuous-time
    model of points happening in given interval: 1D, a line; 2D, an area, or higher
    dimensions. We, data scientists, most often deal with the one-dimensional case,
    where the “line” is time, and the points are the events of interest — I dare to
    say.'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们澄清一点：**泊松过程**和**泊松分布**之间的区别。**过程**是一个随机连续时间模型，描述在给定区间内发生的事件：一维，一条线；二维，一个区域，或更高维度。我们数据科学家最常处理的是一维情况，其中“线”是时间，而“点”是感兴趣的事件——我敢这么说。
- en: 'These are the assumptions of the Poisson process:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是泊松过程的假设：
- en: '**The occurrence of one event does not affect the probability of a second event.** Think
    of our seller going on to list another item tomorrow indifferently of having done
    so already today, or the one from five days ago for that matter. The point here
    is that there is no memory between events.'
  id: totrans-50
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**一个事件的发生不会影响第二个事件发生的概率。**想象一下我们的卖家明天继续列出另一个商品，无论他今天是否已经这样做，或者五天前的情况也是如此。这里的要点是事件之间没有记忆。'
- en: '**The average rate at which events occur, is independent of any occurrence.** In
    other words, no event that happened (or will happen) alters λ, which remains constant
    throughout the observed timeframe. In our seller example, this means that listing
    an item today does not increase or decrease the seller’s motivation or likelihood
    of listing another item tomorrow.'
  id: totrans-51
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**事件发生的平均速率与任何发生的事件无关。**换句话说，任何已经发生（或将要发生）的事件都不会改变λ，它在整个观察时间段内保持恒定。在我们的卖家例子中，这意味着今天列出商品不会增加或减少卖家明天再列出商品的动机或可能性。'
- en: '**Two events cannot occur at exactly the same instant.** If we were to zoom
    at an infinite granular level on the timescale, no two listings could have been
    placed simultaneously; always sequentially.'
  id: totrans-52
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**两个事件不能在完全相同的时刻发生。**如果我们无限放大时间尺度上的粒度，就没有两个列出行为可以同时发生；总是按顺序发生。'
- en: From these assumptions — no memory, constant rate, events happening alone —
    it follows that 1) any interval’s number of events is Poisson-distributed with
    parameter λₜ and 2) that disjoint intervals are independent — two key properties
    of a Poisson process.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 从这些假设——无记忆、恒定速率、事件独立发生——可以得出以下结论：1）任何区间的发生事件数量都服从参数λₜ的泊松分布；2）不相交的区间是独立的——泊松过程的两个关键特性。
- en: '*A Note on the distribution:* The distribution simply describes probabilities
    for various numbers of counts in an interval. Strictly speaking, one can use the
    distribution pragmatically whenever the data is nonnegative, can be unbounded
    on the right, has mean λ, and reasonably models the data. It would be just convenient
    if the underlying process is a Poisson one, and actually justifies using the distribution.'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: '*关于分布的说明：*分布只是描述区间内各种计数数的概率。严格来说，只要数据非负，可以在右侧无界，具有均值λ，并且合理地模拟数据，就可以实用地使用分布。如果底层过程是泊松过程，那么使用分布将是方便的，并且实际上可以证明使用分布的合理性。'
- en: 'The marketplace example: Implications'
  id: totrans-55
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 市场例子：影响
- en: So, can we justify using the Poisson distribution for our marketplace example?
    Let’s open up the assumptions of a Poisson process and take the test.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，我们能否为我们的市场例子证明使用泊松分布的合理性？让我们打开泊松过程的假设，进行测试。
- en: '**Constant λ**'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: '**恒定的λ**'
- en: '*Why it may fail: *The seller has patterned online activity; holidays; promotions;
    listings are seasonal goods.'
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*可能失败的原因：*卖家有模式化的在线活动；节假日；促销；列出商品是季节性商品。'
- en: '*Consequence:* λ is not constant, leading to overdispersion (mean-to-variance
    ratio is larger than 1, or to temporal patterns.'
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*后果：*λ不是恒定的，导致过度分散（均值与方差比大于1，或时间模式）。'
- en: '**Independence and memorylessness**'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: '**独立性和无记忆性**'
- en: '*Why it may fail:* The propensity to list again is higher after a successful
    listing, or conversely, listing once depletes the stock and intervenes with the
    propensity of listing again.'
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*可能失败的原因：*在成功列出商品后，再次列出的倾向更高，或者相反，一次列出会耗尽库存并干扰再次列出的倾向。'
- en: '*Consequence:* Two events are no longer independent, as the occurrence of one
    informs the occurrence of the other.'
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*后果：*两个事件不再相互独立，因为一个事件的发生会告知另一个事件的发生。'
- en: '**Simultaneous events**'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: '**同时发生的事件**'
- en: '*Why it may fail:* Batch-listing, a new feature, was introduced to help the
    sellers.'
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*可能失败的原因：*为了帮助卖家，引入了批量列出这一新功能。'
- en: '*Consequence:* Multiple listings would come online at the same time, clumped
    together, and they would be counted simultaneously.'
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*后果*：多个列表将同时上线，聚集在一起，并且它们将被同时计算。'
- en: Balancing rigour and pragmatism
  id: totrans-66
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 平衡严谨和实用主义
- en: 'As Data Scientists on the job, we may feel trapped between rigour and pragmatism.
    The three steps below should give you a sound foundation to decide on which side
    to err, when the Poisson distribution falls short:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 作为在职的数据科学家，我们可能会感到在严谨和实用主义之间感到被困。以下三个步骤应该为你提供一个坚实的基础，以决定在泊松分布不足时，应该偏向哪一方：
- en: '**Pinpoint your goal:** is it inference, simulation or prediction, and is it
    about high-stakes output? List the worst thing that can happen, and the cost of
    it for the business.'
  id: totrans-68
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**明确你的目标**：是推理、模拟还是预测，以及它是否关乎高风险的输出？列出可能发生的最糟糕的事情，以及对企业造成的成本。'
- en: '**Identify the problem and solution**: why does the Poisson distribution not
    fit, and what can you do about it? list 2-3 solutions, including changing nothing.'
  id: totrans-69
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**识别问题和解决方案**：为什么泊松分布不适用，你能做些什么？列出2-3个解决方案，包括什么都不做。'
- en: '**Balance gains and costs:** Will your workaround improve things, or make it
    worse? and at what cost: interpretability, new assumptions introduced and resources
    used. Does it help you in achieving your goal?'
  id: totrans-70
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**平衡收益和成本**：你的解决方案会改善事情，还是会变得更糟？以及代价是什么：可解释性、引入的新假设和使用的资源。这有助于你实现目标吗？'
- en: That said, here are some counters I use when needed.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 话虽如此，以下是一些我在需要时使用的反例。
- en: When real life deviates from your model
  id: totrans-72
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 当现实生活偏离你的模型时
- en: Everything described so far pertains to the standard, or homogenous, Poisson
    process. But what if reality begs for something different?
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止所描述的一切都适用于标准的或同质泊松过程。但现实可能需要不同的东西？
- en: 'In the next section, we’ll cover two extensions of the Poisson distribution
    when the constant λ assumption does not hold. These are not mutually exclusive,
    but neither they are the same:'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一节中，我们将介绍泊松分布的两个扩展，当常数λ假设不成立时。这些扩展不是相互排斥的，但它们也不相同：
- en: '**Time-varying **λ**:** a single seller whose listing rate ramps up before
    holidays and slows down afterward'
  id: totrans-75
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**时间变化的λ**：一个卖家在节假日前的列表速率上升，之后放缓'
- en: '**Mixed Poisson distribution:** multiple sellers listing items, each with their
    own λ can be seen as a mixture of various Poisson processes'
  id: totrans-76
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**混合泊松分布**：多个卖家列出物品，每个卖家都有自己的λ，可以看作是各种泊松过程的混合'
- en: Time-varying λ
  id: totrans-77
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 时间变化的λ
- en: The first extension allows λ to have its own value for each time *t*. The PMF
    then becomes
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个扩展允许λ对于每个时间*t*有自己的值。此时，概率质量函数（PMF）变为
- en: '![](../Images/7901d69b05584bcd7f01102b7d044736.png)'
  id: totrans-79
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7901d69b05584bcd7f01102b7d044736.png)'
- en: 'Where the number of events 𝐾(𝑇) in an interval 𝑇 follows the Poisson distribution
    with a rate no longer equal to a fixed λ, but one equal to:'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 在区间𝑇内事件的数量𝐾(𝑇)遵循泊松分布，其速率不再等于固定的λ，而是等于：
- en: '![](../Images/50983d82dec4a3f40b360812a403a659.png)'
  id: totrans-81
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/50983d82dec4a3f40b360812a403a659.png)'
- en: 'More intuitively, integrating over the interval 𝑡 to 𝑡 + 𝑖 gives us a single
    number: the expected value of events over that interval. The integral will vary
    by each arbitrary interval, and that’s what makes λ change over time. To understand
    how that integration works, it was helpful for me to think of it like this: if
    the interval 𝑡 to 𝑡₁ integrates to 3, and 𝑡₁ to 𝑡₂ integrates to 5, then the interval
    𝑡 to 𝑡₂ integrates to 8 = 3 + 5\. That’s the two expectations summed up, and now
    the expectation of the entire interval.'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 更直观地说，对区间𝑡到𝑡 + 𝑖进行积分，我们得到一个单一的数字：该区间内事件期望值。积分将根据每个任意区间而变化，这就是λ随时间变化的原因。为了理解这种积分是如何工作的，对我来说，将其想象成这样是有帮助的：如果区间𝑡到𝑡₁的积分是3，而𝑡₁到𝑡₂的积分是5，那么区间𝑡到𝑡₂的积分就是8
    = 3 + 5。这是两个期望值的总和，现在整个区间的期望值。
- en: '**Practical implication **'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: '**实际影响**'
- en: 'One may want to modeling the expected value of the Poisson distribution as
    a function of time. For instance, to model an overall change in trend, or seasonality.
    In generative model notation:'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 有些人可能想要将泊松分布的期望值建模为时间的函数。例如，为了模拟趋势的整体变化或季节性。在生成模型符号中：
- en: '![](../Images/ffa4414623078fdf65f654d69a5c1033.png)'
  id: totrans-85
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ffa4414623078fdf65f654d69a5c1033.png)'
- en: Time may be a continuous variable, or an arbitrary function of it.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 时间可能是一个连续变量，或者是对其的任意函数。
- en: 'Process-varying λ: Mixed Poisson distribution'
  id: totrans-87
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 过程变化的λ：混合泊松分布
- en: But then there’s a gotcha. Remember when I said that λ has a dual role as the
    mean and variance? That still applies here. Looking at the “relaxed” PMF*, the
    only thing that changes is that λ can vary freely with time. But it’s still the
    one and only λ that orchestrates both the expected value and the dispersion of
    the PMF*. More precisely, 𝔼[𝑋] = Var(𝑋) still holds.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 但然后有一个问题。记得我提到λ具有均值和方差的双重角色吗？这一点在这里仍然适用。查看“放松”的PMF*，唯一改变的是λ可以自由地随时间变化。但它仍然是唯一一个λ，它协调了PMF*的期望值和分散。更精确地说，𝔼[𝑋]
    = Var(𝑋)仍然成立。
- en: There are various reasons for this constraint not to hold in reality. Model
    misspecification, event interdependence and unaccounted for heterogeneity could
    be the issues at hand. I’d like to focus on the latter case, as it justifies the
    Negative Binomial distribution — one of the topics I promised to open up.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 实际上，这个约束不成立有多种原因。模型误设、事件相互依赖和未考虑到的异质性可能是问题所在。我想重点讨论后者，因为它证明了负二项分布——我承诺要展开讨论的一个主题。
- en: '**Heterogeneity and overdispersion**'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: '**异质性和过度分散**'
- en: Imagine we are not dealing with one seller, but with 10 of them listing at different
    intensity levels, λᵢ, where 𝑖 = 1, 2, 3, …, 10 sellers. Then, essentially, we
    have 10 Poisson processes going on. If we unify the processes and estimate the
    grand λ, we simplify the mixture away. Meaning, we get a correct estimate of all
    sellers on average, but the resulting grand λ is naive and does not know about
    the original spread of λᵢ. It still assumes that the variance and mean are equal,
    as per the axioms of the distribution. This will lead to overdispersion and, in
    turn, to underestimated errors. Ultimately, it inflates the false positive rate
    and drives poor decision-making. *We need a way to embrace the heterogeneity amongst
    sellers’ λᵢ.*
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下，我们不是处理一个卖家，而是处理10个卖家，他们以不同的强度水平λᵢ列表，其中𝑖 = 1, 2, 3, …, 10个卖家。那么，本质上，我们有10个泊松过程在进行。如果我们统一这些过程并估计总体λ，我们就简化了混合。这意味着我们得到了所有卖家平均的正确估计，但得到的总体λ是天真且不了解λᵢ的原始分布。它仍然假设方差和均值相等，这是分布公理。这将导致过度分散，进而导致误差估计不足。最终，它增加了假阳性率，并导致不良决策。*我们需要一种方法来接受卖家λᵢ之间的异质性。*
- en: '**Negative binomial: Extending the Poisson distribution**'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: '**负二项分布：扩展泊松分布**'
- en: 'Among the few ways one can look at the Negative Binomial distribution, one
    way is to see it as a compound Poisson process — 10 sellers, sounds familiar yet?
    That means multiple independent Poisson processes are summed up to a single one.
    Mathematically, first we draw λ from a Gamma distribution: λ ~ Γ(r, θ), then we
    draw the count 𝑋 | λ ~ Poisson(λ).'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 在看待负二项分布的几种方法中，一种方法是将它视为复合泊松过程——10个卖家，听起来熟悉吗？这意味着多个独立的泊松过程汇总为一个。数学上，首先我们从伽马分布中抽取λ：λ
    ~ Γ(r, θ)，然后我们抽取计数𝑋 | λ ~ 泊松(λ)。
- en: In one image, it is as if we would sample from plenty Poisson distributions,
    corresponding to each seller.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 在一个图像中，就好像我们会从许多泊松分布中进行抽样，对应于每个卖家。
- en: '![A negative Binomial distribution arises from many Poisson distributions.](../Images/b98db806b6f74f05504adbf8cff4fb9c.png)'
  id: totrans-95
  prefs: []
  type: TYPE_IMG
  zh: '![许多泊松分布产生负二项分布](../Images/b98db806b6f74f05504adbf8cff4fb9c.png)'
- en: A negative Binomial distribution arises from many Poisson distributions.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 许多泊松分布产生负二项分布。
- en: 'The more exposing alias of the Negative binomial distribution is *Gamma-Poisson
    mixture distribution*, and now we know why: the dictating λ comes from a continuous
    mixture. That’s what we needed to explain the heterogeneity amongst sellers.'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 负二项分布的更常见的别称是*伽马泊松混合分布*，现在我们知道了原因：主导的λ来自一个连续混合。这正是我们需要解释卖家之间异质性的原因。
- en: Let’s simulate this scenario to gain more intuition.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们模拟这个场景，以获得更多的直观感受。
- en: '![Gamma mixture of lambda.](../Images/684a499e740c1170f76d8a0bf1728d13.png)'
  id: totrans-99
  prefs: []
  type: TYPE_IMG
  zh: '![λ的伽马混合图](../Images/684a499e740c1170f76d8a0bf1728d13.png)'
- en: Gamma mixture of lambda.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: λ的伽马混合。
- en: 'First, we draw λᵢ from a Gamma distribution: λᵢ ~ Γ(r, θ). Intuitively, the
    Gamma distribution tells us about the variety in the intensity — listing rate
    — amongst the sellers.'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们从伽马分布中抽取λᵢ：λᵢ ~ Γ(r, θ)。直观上，伽马分布告诉我们卖家之间强度——列表率——的多样性。
- en: On a practical note, one can instill their assumptions about the degree of heterogeneity
    in this step of the model: *how* different are sellers? By varying the levels
    of heterogeneity, one can observe the impact on the final Poisson-like distribution.
    Doing this type of checks (i.e., posterior predictive check), is common in Bayesian
    modeling, where the assumptions are set explicitly.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 在实际方面，一个人可以在模型的这一步设定他们对异构程度的假设：卖家**如何**不同？通过改变异构性的水平，可以观察对最终泊松分布的影响。进行此类检查（即后验预测检查）在贝叶斯建模中很常见，其中假设被明确设定。
- en: '![Gamma-Poisson mixture distribution versus homogenous Poisson distribution.
    Τhe dashed line reflects λ, which is 4 for both distributions.](../Images/3cd38845258c54fd59d3101e33ef68c9.png)'
  id: totrans-103
  prefs: []
  type: TYPE_IMG
  zh: '![伽马泊松混合分布与同质泊松分布的比较。虚线反映λ，两个分布均为4。](../Images/3cd38845258c54fd59d3101e33ef68c9.png)'
- en: '*Gamma-Poisson mixture distribution versus homogenous Poisson distribution.
    Τhe dashed line reflects λ, which is 4 for both distributions.*'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: '*伽马泊松混合分布与同质泊松分布的比较。虚线反映λ，两个分布均为4。*'
- en: 'In the second step, we plug the obtained λ into the Poisson distribution: 𝑋
    | λ ~ Poisson(λ), and obtain a Poisson-like distribution that represents the summed
    subprocesses. Notably, this unified process has a larger dispersion than expected
    from a homogeneous Poisson distribution, but it is in line with the Gamma mixture
    of λ.'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 在第二步中，我们将获得的λ插入泊松分布：𝑋 | λ ~ Poisson(λ)，并得到一个表示总和子过程的泊松分布。值得注意的是，这个统一过程比同质泊松分布预期的分散性更大，但它与λ的伽马混合一致。
- en: Heterogeneous λ and inference
  id: totrans-106
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 异构λ和推理
- en: A practical consequence of introducing flexibility into your assumed distribution
    is that inference becomes more challenging. More parameters (i.e., the Gamma parameters)
    need to be estimated. Parameters act as flexible explainers of the data, tending
    to overfit and explain away variance in your variable. The more parameters you
    have, the better the explanation may seem, but the model also becomes more susceptible
    to noise in the data. Higher variance reduces the power to identify a difference
    in means, if one exists, because — well — it gets lost in the variance.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 将灵活性引入假设分布的实践后果是推理变得更加困难。需要估计更多的参数（即伽马参数）。参数作为数据的灵活解释者，倾向于过度拟合并解释变量中的方差。参数越多，解释可能看起来越好，但模型也更容易受到数据噪声的影响。更高的方差会降低识别均值差异的能力，如果存在的话，因为——好吧——它丢失在方差中了。
- en: '**Countering the loss of power**'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: '**对抗功效损失**'
- en: Confirm whether you indeed need to extend the standard Poisson distribution.
    If not, simplify to the simplest, most fit model. A quick check on overdispersion
    may suffice for this.
  id: totrans-109
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确认你是否确实需要扩展标准的泊松分布。如果不是，简化到最简单、最合适的模型。对此进行快速检查过度分散可能就足够了。
- en: 'Pin down the estimates of the Gamma mixture distribution parameters using regularising,
    informative priors (think: Bayes).'
  id: totrans-110
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用正则化、信息先验（想想：贝叶斯）来锁定伽马混合分布参数的估计。
- en: 'During my research process for writing this blog, I learned a great deal about
    the connective tissue underlying all of this: how the binomial distribution plays
    a fundamental role in the processes we’ve discussed. And while I’d love to ramble
    on about this, I’ll save it for another post, perhaps. In the meantime, feel free
    to share your understanding in the comments section below 👍.'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 在撰写这篇博客的研究过程中，我学到了很多关于所有这些背后的连接组织：二项分布在我们讨论的过程中扮演着基本角色。虽然我很想就此展开讨论，但我可能留到另一篇帖子中，也许吧。在此期间，请随时在下面的评论部分分享你的理解
    👍。
- en: Conclusion
  id: totrans-112
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: 'The Poisson distribution is a simple distribution that can be highly suitable
    for modelling count data. However, when the assumptions do not hold, one can extend
    the distribution by allowing the rate parameter to vary as a function of time
    or other factors, or by assuming subprocesses that collectively make up the count
    data. This added flexibility can address the limitations, but it comes at a cost:
    increased flexibility in your modelling raises the variance and, consequently,
    undermines the statistical power of your model.'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 泊松分布是一种简单的分布，非常适合用于建模计数数据。然而，当假设不成立时，可以通过允许速率参数随时间或其他因素变化，或者通过假设构成计数数据的子过程来扩展分布。这种增加的灵活性可以解决局限性，但代价是：模型中的灵活性增加会导致方差增加，从而削弱模型的统计功效。
- en: 'If your end goal is inference, you may want to think twice and consider exploring
    simpler models for the data. Alternatively, switch to the Bayesian paradigm and
    leverage its built-in solution to regularise estimates: informative priors.'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的最终目标是推断，你可能需要三思而后行，并考虑探索数据更简单的模型。或者，切换到贝叶斯范式，利用其内置的解决方案来正则化估计：信息先验。
- en: I hope this has given you what you came for — a better intuition about the Poisson
    distribution. I’d love to hear your thoughts about this in the comments!
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 希望这已经给了你你想要的——对泊松分布的更好直觉。我很乐意在评论中听到你对这个的看法！
