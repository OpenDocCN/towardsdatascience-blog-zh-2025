- en: 'Why Regularization Isn’t Enough: A Better Way to Train Neural Networks with
    Two Objectives'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/why-regularization-isnt-enough-a-better-way-to-train-neural-networks-with-two-objectives/](https://towardsdatascience.com/why-regularization-isnt-enough-a-better-way-to-train-neural-networks-with-two-objectives/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1748303089072" class="mdspan-comment">When training</mdspan>
    neural networks, we often juggle **two competing objectives. **For example, maximizing
    predictive performance while also meeting a secondary goal like fairness, interpretability,
    or energy efficiency. The **default approach** is usually to fold the secondary
    objective into the loss function as a weighted regularization term. This *one-size-fits-all
    loss* might be simple to implement, but it isn’t always ideal. In fact, research
    has shown that **just adding a regularization term can overlook complex interdependencies
    between objectives and lead to suboptimal trade-offs**.
  prefs: []
  type: TYPE_NORMAL
- en: Enter **bilevel optimization**, a strategy that treats the problem as two linked
    sub-problems (a leader and a follower) instead of a single blended objective.
    In this post, we’ll explore why the naive regularization approach can fall short
    for multi-objective problems, and how a bilevel formulation with dedicated model
    components for each goal can significantly improve both clarity and convergence
    in practice. We’ll use examples beyond fairness (like interpretability vs. performance,
    or domain-specific constraints in bioinformatics and robotics) to illustrate the
    point. We’ll also dive into some **actual code snippets** from the open-source *FairBiNN* project,
    which uses a bilevel strategy for fairness vs. accuracy, and discuss practical
    considerations from the original paper including its limitations in scalability,
    continuity assumptions, and challenges with attention-based models.
  prefs: []
  type: TYPE_NORMAL
- en: '**TL;DR:** If you’ve been tuning weighting parameters to balance conflicting
    objectives in your neural network, there’s a more principled alternative. Bilevel
    optimization gives each objective its own “space” (layers, parameters, even optimizer),
    yielding cleaner design and often better performance on the primary task all while
    meeting secondary goals to a Pareto-optimal degree. Let’s see how and why this
    works.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/4798562c3319242985b922020f06072e.png)'
  prefs: []
  type: TYPE_IMG
- en: FairBiNN Network Architecture
  prefs: []
  type: TYPE_NORMAL
- en: 'The Two-Objective Dilemma: Why Weighted Regularization Falls Short'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Multi-objective learning — say you want high accuracy *and* low bias is usually
    set up as a single loss:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d06382c16f76c93898b002b2a7ad2d9e.png)'
  prefs: []
  type: TYPE_IMG
- en: 'where L secondary​ is a penalty term (e.g., a fairness or simplicity metric)
    and λ is a tunable weight. This **Lagrangian approach** treats the problem as
    one big optimization, blending objectives with a knob to tune. In theory, by adjusting
    λ you can trace out a Pareto curve of solutions balancing the two goals. In practice,
    however, this approach has **several pitfalls**:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Choosing the Trade-off is Tricky:** The outcome is highly sensitive to the
    weight λ. A slight change in λ can swing the solution from one extreme to the
    other. There is no intuitive way to pick a “correct” value without extensive trial
    and error to find a acceptable trade-off. This hyperparameter search is essentially
    manual exploration of the Pareto frontier.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Conflicting Gradients:** With a combined loss, *the same set of model parameters* is
    responsible for both objectives. The gradients from the primary and secondary
    terms might point in opposite directions. For example, to improve fairness a model
    might need to adjust weights in a way that hurts accuracy, and vice versa. The
    optimizer updates become a tug-of-war on the same weights. This can lead to unstable
    or inefficient training, as the model oscillates trying to satisfy both criteria
    at once.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Compromised Performance:** Because the network’s weights have to satisfy
    both objectives simultaneously, the primary task can be **unduly compromised**.
    You often end up dialing back the model’s capacity to fit the data in order to
    reduce the penalty. Indeed, we note that a regularization-based approach may *“overlook
    the complex interdependencies”* between the two goals. In plain terms, a single
    weighted loss can gloss over how improving one metric truly impacts the other.
    It’s a blunt instrument sometimes **improvements in the secondary objective come
    at an outsized expense of the primary objective**, or vice versa.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Lack of Theoretical Guarantees:** The weighted-sum method will find *a*solution,
    but there’s no guarantee it finds a Pareto-optimal one except in special convex
    cases. If the problem is non-convex (as neural network training usually is), the
    solution you converge to might be dominated by another solution (i.e. another
    model could be strictly better in one objective without being worse in the other).
    In fact, we showed a bilevel formulation can ensure **Pareto-optimal solutions
    under certain assumptions**, with an upper bound on loss that is *no worse (and
    potentially better) than the Lagrangian approach.*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In summary, adding a penalty term is often a **blunt and opaque fix**. Yes,
    it bakes the secondary objective into the training process, but it also entangles
    the objectives in a single black-box model. You lose clarity on how each objective
    is being handled, and you might be paying more in primary performance than necessary
    to satisfy the secondary goal.
  prefs: []
  type: TYPE_NORMAL
- en: '**Example Pitfall:** Imagine a health diagnostic model that must be accurate *and* fair
    across demographics. A standard approach might add a fairness penalty (say, the
    difference in false positive rates between groups) to the loss. If this penalty’s
    weight (λ) is too high, the model might nearly equalize group outcomes but at
    the cost of tanking overall accuracy. Too low, and you get high accuracy with
    unacceptable bias. Even with careful tuning, the single-model approach might converge
    to a point where neither objective is really optimized: perhaps the model sacrifices
    accuracy more than needed without fully closing the fairness gap. The FairBiNN
    paper actually proves that the bilevel method achieves an equal or lower loss
    bound compared to the weighted approach suggesting that the naive combined loss
    can leave performance on the table.'
  prefs: []
  type: TYPE_NORMAL
- en: 'A Tale of Two Optimizations: How Bilevel Learning Works'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Bilevel optimization** reframes the problem as a game between two “players”
    often called the **leader **(upper-level) and **follower** (lower-level). Instead
    of blending the objectives, we assign each objective to a different level with **dedicated
    parameters** (e.g., separate sets of weights, or even separate sub-networks).
    Conceptually, it’s like having two models that interact: one exclusively focuses
    on the primary task, and the other exclusively focuses on the secondary task,
    with a defined order of optimization.'
  prefs: []
  type: TYPE_NORMAL
- en: 'In the case of *two* objectives, the bilevel setup typically works as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Leader (Upper Level):** Optimizes the primary loss (e.g., accuracy) with
    respect to its own parameters, **assuming that** the follower will optimally respond
    for the secondary objective. The leader “leads” the game by setting the conditions
    (often this just means it knows the follower will do its job as well as possible).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Follower (Lower Level):** Optimizes the secondary loss (e.g., fairness or
    another constraint) with respect to *its* own parameters, in response to the leader’s
    choices. The follower treats the leader’s parameters as fixed (for that iteration)
    and tries to best satisfy the secondary objective.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'This arrangement aligns with a **Stackelberg game**: the leader moves first
    and the follower reacts. But in practice, we usually solve it by *alternating
    optimization*: at each training iteration, we update one set of parameters while
    holding the other fixed, and then vice versa. Over many iterations, this alternation
    converges to an equilibrium where neither update can improve its objective much
    without the other compensating. Ideally a Stackelberg equilibrium that is also
    Pareto-optimal for the joint problem.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Crucially, each objective now has its own “slot” in the model.** This can
    yield several practical and theoretical advantages:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Dedicated Model Capacity:** The primary objective’s parameters are free to
    focus on predictive performance, without having to also account for fairness/interpretability/etc.
    Meanwhile, the secondary objective has its own dedicated parameters to address
    that goal. There’s less internal competition for representational capacity. For
    example, one can allocate a small subnetwork or a set of layers specifically to
    encode fairness constraints, while the rest of the network concentrates on accuracy.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Separate Optimizers & Hyperparameters:** Nothing says the two sets of parameters
    must be trained with the same optimizer or learning rate. In fact, FairBiNN uses **different
    learning rates for the accuracy vs fairness parameters** (e.g. fairness layers
    train with a smaller step size). You could even use entirely different optimization
    algorithms if it makes sense (SGD for one, Adam for the other, etc.). This flexibility
    lets you tailor the training dynamics to each objective’s needs. We highlight
    that *“the leader and follower can utilize different network architectures, regularizers,
    optimizers, etc. as best suited for each task”*, which is a powerful freedom.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**No More Gradient Tug-of-War:** When we update the primary weights, we *only* use
    the primary loss gradient. The secondary objective doesn’t directly pull on these
    weights (at least not in the same update). Conversely, when updating the secondary’s
    weights, we only look at the secondary loss. This decoupling means each objective
    can make progress on its own terms, rather than interfering in every gradient
    step. The result is often more stable training. As the FairBiNN paper puts it, *“the
    leader problem remains a pure minimization of the primary loss, without any regularization
    terms that may slow or hinder its progress”*.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Improved Trade-off (Pareto Optimality):** By explicitly modeling the interaction
    between the two objectives in a leader-follower structure, bilevel optimization
    can **find better balanced solutions** than a naive weighted sum. Intuitively,
    the follower continuously fine-tunes the secondary objective for any given state
    of the primary objective. The leader, anticipating this, can choose a setting
    that gives the best primary performance knowing the secondary will be taken care
    of as much as possible. Under certain mathematical conditions (e.g. smoothness
    and optimal responses), one can prove this yields Pareto-optimal solutions. In
    fact, a theoretical result in the FairBiNN work shows that if the bilevel approach
    converges, it may achieve strictly **better primary-loss performance than the
    Lagrangian approach** in some cases. In other words, you might get *higher accuracy
    for the same fairness* (or better fairness for the same accuracy) compared to
    the traditional penalty method.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Clarity and Interpretability of Roles:** Architecturally, having separate
    modules for each objective makes the design more interpretable **to the engineers** (if
    not necessarily interpretable to end-users like model explainability). You can **point
    to part of the network and say “this part handles the secondary objective.”** This
    modularity improves transparency in the model’s design. For example, if you have
    a set of fairness-specific layers, you can monitor their outputs or weights to
    understand how the model is adjusting to satisfy fairness. If the trade-off needs
    adjusting, you might tweak the size or learning rate of that subnetwork rather
    than guessing a new loss weight. This separation of concerns is analogous to good
    software engineering practice each component has a single responsibility. As one
    summary of FairBiNN noted, *“the bilevel framework enhances interpretability by
    clearly separating accuracy and fairness objectives”*. Even beyond fairness, this
    idea applies: a model that balances accuracy and interpretability might have a
    dedicated module to enforce sparsity or monotonicity (making the model more interpretable),
    which is easier to reason about than an opaque regularization term.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: To make this concrete, let’s look at how the **Fair Bilevel Neural Network (FairBiNN)** implements
    these ideas for the fairness (secondary) vs. accuracy (primary) problem. FairBiNN
    is a NeurIPS 2024 project that demonstrated a bilevel training strategy achieves
    better fairness/accuracy trade-offs than standard methods. It’s a great case study
    in bilevel optimization applied to neural nets.
  prefs: []
  type: TYPE_NORMAL
- en: 'Bilevel Architecture in Action: FairBiNN Example'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'FairBiNN’s model is designed with **two sets of parameters**: one set θa​ for
    accuracy-related layers, and another set θf​ for fairness-related layers. These
    are integrated into a single network architecture, but logically you can think
    of it as two sub-networks:'
  prefs: []
  type: TYPE_NORMAL
- en: The **accuracy network** (with weights θa​) produces the main prediction (e.g.,
    probability of the positive class).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The **fairness network** (with weights θf​) influences the model in a way that
    promotes fairness (specifically group fairness like demographic parity).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'How are these combined? FairBiNN inserts the fairness-focused layers at a certain
    point in the network. For example, in an MLP for tabular data, you might have:'
  prefs: []
  type: TYPE_NORMAL
- en: '***Input → [Accuracy layers] → [Fairness layers] → [Accuracy layers] → Output***'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The `--fairness_position` parameter in FairBiNN controls where the fairness
    layers are inserted in the stack of layers. For instance, `--fairness_position
    2`means after two layers of the accuracy subnetwork, the pipeline passes through
    the fairness subnetwork, and then returns to the remaining accuracy layers. This
    forms an *“intervention point”* where the fairness module can modulate the intermediate
    representation to reduce bias, before the final prediction is made.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s see a simplified code sketch (in PyTorch-like pseudocode) inspired by
    the FairBiNN implementation. This defines a model with separate accuracy and fairness
    components:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: In this structure, `acc_before` and `acc_after` together make up the accuracy-focused
    part of the network (θa ​parameters), while `fair_net` contains the fairness-focused
    parameters (θf). The fairness layers take the intermediate representation and
    can push it towards a form that yields fair outcomes. For instance, these layers
    might suppress information correlated with sensitive attributes or otherwise adjust
    the feature distribution to minimize bias.
  prefs: []
  type: TYPE_NORMAL
- en: '**Why insert fairness in the middle?** One reason is that it gives the fairness
    module a direct handle on the model’s learned representation, rather than just
    post-processing outputs. By the time data flows through a couple of layers, the
    network has learned some features; inserting the fairness subnetwork there means
    it can modify those features to remove biases (as much as possible) before the
    final prediction is made. The remaining accuracy layers then take this “de-biased”
    representation and try to predict the label without reintroducing bias.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, the training loop sets up **two optimizers **one for θa and one for θf
    and alternates updates as described. Here’s a schematic training loop illustrating
    the bilevel update scheme:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 'A few things to note in this training snippet:'
  prefs: []
  type: TYPE_NORMAL
- en: We separate `acc_params` and `fair_params` and give each to its own `optimizer`.
    In the example above, we chose Adam for both, but with different learning rates.
    This reflects FairBiNN’s strategy (they used 1e-3 vs 1e-5 for classifier vs fairness
    layers on tabular data). The fairness objective often benefits from a smaller
    learning rate to ensure stable convergence, since it’s optimizing a subtle statistical
    property.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We compute the **accuracy loss** (`acc_loss`) as usual (binary cross-entropy
    in this case). The **fairness loss** here is illustrated as the *demographic parity
    (DP) difference* – the absolute difference in positive prediction rates between
    the privileged and unprivileged groups. In practice, FairBiNN supports multiple
    fairness metrics (like equalized odds as well) by plugging in different formulas
    for `fairness_loss`. The key is that this loss is differentiable with respect
    to the fairness network’s parameters. We use `logits.detach()` to ensure the fairness
    loss gradient doesn’t propagate back into the accuracy weights (only into `fair_net`),
    keeping with the idea that during fairness update, accuracy weights are treated
    as fixed.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The order of updates shown is: **update accuracy weights first, then update
    fairness weights**. This corresponds to treating accuracy as the leader (upper-level)
    and fairness as the follower. Interestingly, one might think fairness (the constraint)
    should lead, but FairBiNN’s formulation sets accuracy as the leader. In practice,
    it means we first take a step to improve classification accuracy (with the current
    fairness parameters held fixed), then we take a step to improve fairness (with
    the new accuracy parameters held fixed). This alternating procedure repeats. Each
    iteration, the fairness player is reacting to the latest state of the accuracy
    player. In theory, if we could solve the follower’s optimization *exactly*for
    each leader update (e.g., find the perfect fairness parameters given current accuracy
    params), we’d be closer to a true bilevel solution. In practice, doing one gradient
    step at a time in alternation is an effective heuristic that gradually brings
    the system to equilibrium. (FairBiNN’s authors note that under certain conditions,
    unrolling the follower optimization and computing an exact hypergradient for the
    leader can provide guarantees, but in implementation they use the simpler alternating
    updates.)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We call `backward(retain_graph=True)` on the accuracy loss because we need to
    later backpropagate the fairness loss through (part of) the same graph. The fairness
    loss depends on the model’s predictions as well, which depend on both θaθa​ and
    θfθf​. By retaining the graph, we avoid recomputing the forward pass for the fairness
    backward pass. (Alternatively, one could recompute logits after the accuracy step
    – the end result is similar. FairBiNN’s code likely uses one forward per batch
    and two backward passes, as shown above.)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'During training, you would see two gradients flowing: one into the accuracy
    layers (from `acc_loss`), and one into the fairness layers (from `fairness_loss`).
    They are kept separate. Over time, this should lead to a model where θa​ has learned
    to predict well *given that* θf​ will continually nudge the representation towards
    fairness, and θf has learned to mitigate bias *given* how θa​ likes to behave.
    Neither is having to directly compromise its objective; instead, they arrive at
    a balanced solution through this interplay.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Clarity in practice:** One immediate benefit of this setup is that it’s much
    clearer to **diagnose and adjust** the behavior of each objective. If after training
    you find the model isn’t fair enough, you can examine the fairness network: perhaps
    it’s underpowered (maybe too few layers or too low learning rate) you could boost
    its capacity or training aggressiveness. Conversely, if accuracy dropped too much,
    you might realize the fairness objective was overweighted (in bilevel terms, maybe
    you gave it too many layers or a too-large learning rate). These are high-level
    dials distinct from the primary network. In a single network + reg term approach,
    all you had was the λ weight to tweak, and it wasn’t obvious *why* a certain λ
    failed (was the model unable to represent a fair solution, or did the optimizer
    get stuck, or was it just the wrong trade-off?). In the bilevel approach, the
    division of labor is explicit. This makes it **more practical to adopt** in real
    engineering pipelines you can assign teams to handle the “fairness module” or
    “safety module” separately from the “performance module,” and they can reason
    about their component in isolation to some extent.'
  prefs: []
  type: TYPE_NORMAL
- en: 'To give a sense of results: FairBiNN, with this architecture, was able to achieve **Pareto-optimal
    fairness-accuracy trade-offs** that dominated those from standard single-loss
    training in their experiments. In fact, under assumptions of smoothness and optimal
    follower response, they prove any solution from their method will not incur higher
    loss than the corresponding Lagrangian solution (and often incurs less on the
    primary loss). Empirically, on datasets like UCI Adult (income prediction) and
    Heritage Health, the bilevel-trained model had **higher accuracy at the same fairness
    level**compared to models trained with a fairness regularization term. It essentially **bridged
    the accuracy-fairness gap** more effectively. And notably, this approach did not
    come with a heavy performance penalty in training time the authors reported *“no
    tangible difference in the average epoch time between the FairBiNN (bilevel) and
    Lagrangian methods”* when running on the same data. In other words, splitting
    into two optimizers and networks doesn’t double your training time; thanks to
    modern librarie training per epoch was about as fast as the single-objective case.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Beyond Fairness: Other Use Cases for Two-Objective Optimization'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'While FairBiNN showcases bilevel optimization in the context of fairness vs.
    accuracy, the **principle is broadly applicable**. Whenever you have two objectives
    that partially conflict, especially if one is a domain-specific constraint or
    an auxiliary goal, a bilevel design can be beneficial. Here are a few examples
    across different domains:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Interpretability vs. Performance:** In many settings, we seek models that
    are highly accurate but also **interpretable** (for example, a medical diagnostic
    tool that doctors can trust and understand). Interpretability often means constraints
    like sparsity (using fewer features), monotonicity (respecting known directional
    relationships), or simplicity of the model’s structure. Instead of baking these
    into one loss (which might be a complex concoction of L1 penalties, monotonicity
    regularizers, etc.), we could split the model into two parts.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Example:* The leader network focuses on accuracy, while a follower network
    could manage a mask or gating mechanism on input features to enforce sparsity.
    One implementation could be a small subnetwork that outputs feature weights (or
    selects features) aiming to maximize an interpretability score (like high sparsity
    or adherence to known rules), while the main network takes the pruned features
    to predict the outcome. During training, the main predictor is optimized for accuracy
    given the current feature selection, and then the feature-selection network is
    optimized to improve interpretability (e.g., increase sparsity or drop insignificant
    features) given the predictor’s behavior. This mirrors how one might do feature
    selection via bilevel optimization (where feature mask indicators are learned
    as continuous parameters in a lower-level problem). The advantage is the predictor
    isn’t directly penalized for complexity; It just has to work with whatever features
    the interpretable part allows. Meanwhile, the interpretability module finds the
    simplest feature subset that the predictor can still do well on. Over time, they
    converge to a balance of accuracy vs simplicity. This approach was hinted at in
    some meta-learning literature (treating feature selection as an inner optimization).
    Practically, it means we get a model that is easier to explain (because the follower
    pruned it) without a huge hit to accuracy, because the follower only prunes as
    much as the leader can tolerate. If we had done a single L1-regularized loss,
    we’d have to tune the weight of L1 and might either kill accuracy or not get enough
    sparsity! With bilevel, the sparsity level adjusts dynamically to maintain accuracy.'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Robotics: Energy or Safety vs. Task Performance:** Consider a robot that
    needs to perform a task *quickly *(performance objective) but also *safely and
    efficiently* (secondary objective, e.g., minimize energy usage or avoid risky
    maneuvers). These objectives often conflict: the fastest trajectory might be aggressive
    on motors and less safe. A bilevel approach could involve a **primary controller
    network** that tries to minimize time or tracking error (leader), and a **secondary
    controller or modifier** that adjusts the robot’s actions to conserve energy or
    stay within safety limits (follower). For instance, the follower could be a network
    that adds a small corrective bias to the action outputs or that adjusts the control
    gains, with the goal of minimizing a measured energy consumption or jerkiness.
    During training (which could be in simulation), you’d alternate: train the main
    controller on the task performance given the current safety/energy corrections,
    then train the safety/energy module to minimize those costs given the controller’s
    behavior. Over time, the controller learns to accomplish the task in a way that
    the safety module can easily tweak to stay safe, and the safety module learns
    the minimal intervention needed to meet constraints. The outcome might be a trajectory
    that is a bit slower than the unconstrained optimum but uses far less energy and
    you achieved that without having to fiddle with a single weighted reward that
    mixes time and energy (a common pain point in reinforcement learning reward design).
    Instead, each part had a clear goal. In fact, this idea is akin to “shielding”
    in reinforcement learning, where a secondary policy ensures safety constraints,
    but bilevel training would *learn* the shield in conjunction with the primary
    policy.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Bioinformatics: Domain Constraints vs. Prediction Accuracy:** In bioinformatics
    or computational biology, you might predict outcomes (protein function, gene expression,
    etc.) but also want the model to respect domain knowledge. For example, you train
    a neural net to predict disease risk from genetic data (primary objective), while
    ensuring the model’s behavior aligns with known biological pathways or constraints
    (secondary objective). A concrete scenario: maybe we want the model’s decisions
    to depend on groups of genes that make sense together (pathways), not arbitrary
    combinations, to aid scientific interpretability and trust. We could implement
    a follower network that penalizes the model if it uses gene groupings that are
    nonsensical, or that encourages it to utilize certain known biomarker genes. Bilevel
    training would let the main predictor maximize predictive accuracy, and then a
    secondary “regulator” network could slightly adjust weights or inputs to enforce
    the constraints (e.g., suppress signals from gene interactions that shouldn’t
    matter biologically). Alternating updates would yield a model that predicts well
    but, say, relies on biologically plausible signals. This is preferable to hard-coding
    those constraints or adding a stiff penalty that might prevent the model from
    learning subtle but valid signals that deviate slightly from known biology. Essentially,
    the model itself finds a compromise between data-driven learning and prior knowledge,
    through the interplay of two sets of parameters.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These examples are a bit speculative, but they highlight a pattern: **whenever
    you have a secondary objective that could be handled by a specialized mechanism,
    consider giving it its own module and training it in a bilevel fashion. **Instead
    of baking everything into one monolithic model, you get an architecture with parts
    corresponding to each concern.
  prefs: []
  type: TYPE_NORMAL
- en: Caveats and Considerations in Practice
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Before you rush to refactor all your loss functions into bilevel optimizations,
    it’s important to understand the limitations and requirements of this approach.
    The FairBiNN paper — while very encouraging — is upfront about several **caveats** that
    apply to bilevel methods:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Continuity and Differentiability Assumptions:** Bilevel optimization, especially
    with gradient-based methods, typically assumes the secondary objective is reasonably
    smooth and differentiable with respect to the model parameters. In FairBiNN’s
    theory, we assume things like **Lipschitz continuity** of the neural network functions
    and losses In plain terms, the gradients shouldn’t be exploding or wildly erratic,
    and the follower’s optimal response should change smoothly as the leader’s parameters
    change. If your secondary objective is not differentiable (e.g., a hard constraint
    or a metric like accuracy which is piecewise-constant), you may need to approximate
    it with a smooth surrogate to use this approach. FairBiNN specifically focused
    on *binary classification with a sigmoid output*, avoiding the non-differentiability
    of the argmax in multi-class classification. In fact, we point out that the commonly
    used *softmax activation is not Lipschitz continuous*, which *“limits the direct
    application of our method to multiclass classification problems”*. This means
    if you have many classes, the current theory might not hold and the training could
    be unstable unless you find a workaround (they suggest exploring alternative activations
    or normalization to enforce Lipschitz continuity for multi-class settings). So,
    one caveat: **bilevel works best when both objectives are nice smooth functions
    of the parameters**. Discontinuous jumps or highly non-convex objectives might
    still work heuristically, but the theoretical guarantees evaporate.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Attention and Complex Architectures:** Modern deep learning models (like
    Transformers with attention mechanisms) pose an extra challenge. We call out that **attention
    layers are not Lipschitz continuous** either, which *“presents a challenge for
    extending our method to state-of-the-art architectures in NLP and other domains
    that heavily rely on attention.” *wereference research attempting to make attention
    Lipschitz (e.g., LipschitzNorm for self-attention ([arxiv.org](https://arxiv.org/html/2410.16432v2#:~:text=extending%20our%20method%20to%20state,performance%20of%20deep%20attention%20models))
    ), but as of now, applying bilevel fairness to a Transformer would be non-trivial.
    The concern is that attention can amplify small changes a lot, breaking the smooth
    interaction needed for stable leader-follower updates. If your application uses
    architectures with components like attention or other non-Lipschitz operations,
    you might need to be cautious. It doesn’t mean bilevel won’t work, but the theory
    doesn’t directly cover it, and you might have to empirically tune more. We might
    see future research addressing how to incorporate such components (perhaps by
    constraining or regularizing them to behave more nicely).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Bottom line:** the current bilevel successes have been in relatively straightforward
    networks (MLPs, simple CNNs, GCNs). Extra fancy architectures could require additional
    care.'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**No Silver Bullet Guarantees:** While the bilevel method can provably achieve
    Pareto-optimal solutions under the right conditions, that doesn’t automatically
    mean your model is “perfectly fair” or “fully interpretable” at the end. There’s
    a difference between *balancing objectives optimally* and *satisfying an objective
    absolutely*. FairBiNN’s theory provides guarantees *relative to the best trade-off* (and
    relative to the Lagrangian method) it **does not guarantee absolute fairness** or
    zero bias. In our case, we still had residual bias, just much less for the accuracy
    we achieved compared to baselines. So, if your secondary objective is a hard constraint
    (like “must never violate safety condition X”), a soft bilevel optimization might
    not be enough! you might need to enforce it in a stricter way or verify the results
    after training. Also, FairBiNN so far handled **one **fairness metric at a time
    (demographic parity in most experiments). In real-world scenarios, you might care
    about multiple constraints (e.g., fairness across multiple attributes, or fairness
    and interpretability and accuracy a tri-objective problem). Extending bilevel
    to handle *multiple* followers or a more complex hierarchy is an open challenge
    (it could become a multi-level or multi-follower game). One idea could be to collapse
    multiple metrics into one secondary objective (maybe as a weighted sum or some
    worst-case metric), but that reintroduces the weighting problem internally. Alternatively,
    one could have multiple follower networks, each for a different metric, and round-robin
    through them but theory and practice for that are not fully established.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Hyperparameter Tuning and Initialization:** While we escape tuning λ in a
    direct sense, the bilevel approach introduces other hyperparameters: the learning
    rates for each optimizer, the relative capacity of the two subnetworks, maybe
    the number of steps to train follower vs leader, etc. In FairBiNN’s case, we had
    to choose the number of fairness layers and where to insert them, as well as the
    learning rates. These were set based on some intuition and some held-out validation
    (e.g., we chose a very low LR for fairness to ensure stability). In general, you’ll
    still need to tune these aspects. However, these tend to be more **interpretable
    hyperparameters **e.g., “how expressive is my fairness module” is easier to reason
    about than “what’s the right weight for this ethereal fairness term.” In some
    sense, the architectural hyperparameters replace the weight tuning. Also, initialization
    of the two parts could matter; one heuristic could be pre-training the main model
    for a bit before introducing the secondary objective (or vice versa), to give
    a good starting point. FairBiNN did not require a separate pre-training; we trained
    both from scratch simultaneously. But that might not always be the case for other
    problems.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Despite these caveats, it’s worth highlighting that the bilevel approach is **feasible
    with today’s tools**. The FairBiNN implementation was done in PyTorch with custom
    training loops something most practitioners are comfortable with and it’s available
    on GitHub for reference ([Github](https://github.com/yazdanimehdi/FairBiNN)).
    The extra effort (writing a loop with two optimizers) is relatively small considering
    the potential gains in performance and clarity. If you have a critical application
    with two competing metrics, the payoff can be significant.
  prefs: []
  type: TYPE_NORMAL
- en: 'Conclusion: Designing Models that Understand Trade-offs'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Optimizing neural networks with multiple objectives will always involve trade-offs
    that’s inherent to the problem. But *how* we handle those trade-offs is under
    our control. The conventional wisdom of “just throw it into the loss function
    with a weight” often leaves us wrestling with that weight and wondering if we
    could have done better. As we’ve discussed, **bilevel optimization offers a more
    structured and principled way to handle two-objective problems**. By giving each
    objective its own dedicated parameters, layers, and optimization process, we allow
    each goal to be pursued to the fullest extent possible without being in perpetual
    conflict with the other.
  prefs: []
  type: TYPE_NORMAL
- en: 'The example of FairBiNN demonstrates that this approach isn’t just academic
    fancy it delivered state-of-the-art results in fairness/accuracy trade-offs, *proving
    mathematically* that it can match or beat the old regularization approach in terms
    of the loss achieved. More importantly for practitioners, it did so with a fairly
    straightforward implementation and reasonable training cost. The model architecture
    became a conversation between two parts: one ensuring fairness, the other ensuring
    accuracy. This kind of **architectural transparency** is refreshing in a field
    where we often just adjust scalar knobs and hope for the best.'
  prefs: []
  type: TYPE_NORMAL
- en: 'For those in ML research and engineering, the take-home message is: **next
    time you face a competing objective; be it model interpretability, fairness, safety,
    latency, or domain constraints consider formulating it as a second player in a
    bilevel setup.** Design a module (however simple or complex) devoted to that concern,
    and train it in tandem with your main model using an alternating optimization.
    You might find that you can achieve a better balance and have a clearer understanding
    of your system. It encourages a more modular design: rather than entangling everything
    into one opaque model, you delineate which part of the network handles what.'
  prefs: []
  type: TYPE_NORMAL
- en: Practically, adopting bilevel optimization requires careful attention to the
    assumptions and some tuning of training procedures. It’s not a magic wand if your
    secondary goal is fundamentally at odds with the primary, there’s a limit to how
    happy an equilibrium you can reach. But even then, this approach will clarify
    the nature of the trade-off. In the best case, it finds win-win solutions that
    the single-objective method missed. In the worst case, you at least have a modular
    framework to iterate on.
  prefs: []
  type: TYPE_NORMAL
- en: 'As machine learning models are increasingly deployed in high-stakes settings, **balancing
    objectives** (accuracy with fairness, performance with safety, etc.) becomes crucial.
    The engineering community is realizing that these problems might be better solved
    with smarter optimization frameworks rather than just heuristics. Bilevel optimization
    is one such framework that deserves a place in the practical toolbox. It aligns
    with a systems-level view of ML model design: sometimes, to solve a complex problem,
    you need to break it into parts and let each part do what it’s best at, under
    a clear protocol of interaction.'
  prefs: []
  type: TYPE_NORMAL
- en: In closing, the next time you find yourself lamenting *“if only I could get
    high accuracy and satisfy X without tanking Y,”*remember that you can try giving
    each desire its own knob. Bilevel training might just offer the **elegant compromise** you
    need *an “optimizer for each objective,” working together in harmony*. Instead
    of fighting a battle of gradients within one weight space, you orchestrate a dialogue
    between two sets of parameters. And as the FairBiNN results indicate, that dialogue
    can lead to outcomes where **everybody wins, or at least no one unnecessarily
    loses**.
  prefs: []
  type: TYPE_NORMAL
- en: Happy optimizing, on *both* your objectives!
  prefs: []
  type: TYPE_NORMAL
