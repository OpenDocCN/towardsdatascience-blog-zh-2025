- en: Code Example of A Re-Act Agent Using MCP Brave Search Server
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In order to understand what MCP looks like when applied, let’s use the beeAI
    framework from IBM, which natively supports MCP and handles the translation logic
    for us.
  prefs: []
  type: TYPE_NORMAL
- en: 'If you plan on running this code you will need to:'
  prefs: []
  type: TYPE_NORMAL
- en: Clone the [beeai framework repo](https://github.com/i-am-bee/beeai-framework)
    to gain access to the helper classes used in this code
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Create a [free Brave developer account](https://github.com/modelcontextprotocol/servers/blob/main/src/brave-search/README.md)
    and get your API key. There are free subscriptions available (credit card required).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Create an OpenAI developer account and create an API Key
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Add your Brave API key and OpenAI key to the .env file at the python folder
    level of the repo.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Ensure you have npm installed and have set your path correctly.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Sample .env file**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: '**Sample mcp_agent.ipynb**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**1\. Import the necessary libraries**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: '**2\. Load the environment variables and set the system path (if needed)**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: '**3\. Configure the logger**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: '**4\. Load helper functions like process_agent_events,observer, and create
    an instance of ConsoleReader**'
  prefs: []
  type: TYPE_NORMAL
- en: 'process_agent_events: Handles agent events and logs messages to the console
    based on the event type (e.g., error, retry, update). It ensures meaningful output
    for each event to help track agent activity.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'observer: Listens for all events from an emitter and routes them to process_agent_events
    for processing and display.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'ConsoleReader: Manages console input/output, allowing user interaction and
    formatted message display with color-coded roles.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: '**5\. Set the Brave API Key and server parameters.**'
  prefs: []
  type: TYPE_NORMAL
- en: Anthropic has a list of MCP servers [here](https://modelcontextprotocol.io/examples).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: '**6\. Create the brave tool that initiates the connection to the MCP server,
    discovers tools, and returns the discovered tools to the Agents so it can decide
    what tool is appropriate to call for a given task. **'
  prefs: []
  type: TYPE_NORMAL
- en: 'In this case 2 tools are discoverable on the Brave MCP Server:'
  prefs: []
  type: TYPE_NORMAL
- en: 'brave_web_search: Execute web searches with pagination and filtering'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'brave_local_search: Search for local businesses and services'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: (Optional) Check the connection to the MCP server and ensure it returns all
    the available tools before providing it to the agent.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: '*OUTPUT:*'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: '**7\. Write the function that creates the agent:  **'
  prefs: []
  type: TYPE_NORMAL
- en: assign an LLM
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: create an instance of the brave_tool() function and assign it to a tools variable
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: create a re-act agent and assign it the chosen llm, tools, memory (so it can
    have constinous conversation)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Add a system prompt to the re-act agent.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Note: You might notice that I added a sentence to the system prompt that reads
    “If you need to use the brave_tool you must use a count of 5.” This is a bandaid
    work-around becasue of a bug I found in the `index.ts` file of the brave server.
    I will contribute to the repo to fix it.'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: '**8\. Create the main function**'
  prefs: []
  type: TYPE_NORMAL
- en: Creates the agent
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Enters a conversation loop with the user and runs the agent with the user prompt
    and some configuration settings. Finishes the conversation if the user types “exit”
    or “quit”.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
