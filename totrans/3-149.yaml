- en: A Clear Intro to MCP (Model Context Protocol) with Code Examples
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/clear-intro-to-mcp/](https://towardsdatascience.com/clear-intro-to-mcp/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1742887159309" class="mdspan-comment">As the race</mdspan>
    to move AI agents from prototype to production heats up, the need for a standardized
    way for agents to call tools across different providers is pressing. This transition
    to a standardized approach to agent tool calling is similar to what we saw with
    REST APIs. Before they existed, developers had to deal with a mess of proprietary
    protocols just to pull data from different services. REST brought order to chaos,
    enabling systems to talk to each other in a consistent way. MCP (Model Context
    Protocol) is aiming to, as it sounds, provide context for AI models in a standard
    way. Without it, we’re headed towards tool-calling mayhem where multiple incompatible
    versions of “standardized” tool calls crop up simply because there’s no shared
    way for agents to organize, share, and invoke tools. MCP gives us a shared language
    and the democratization of tool calling.
  prefs: []
  type: TYPE_NORMAL
- en: One thing I’m personally excited about is how tool-calling standards like MCP
    can actually make AI systems *safer*. With easier access to well-tested tools
    more companies can avoid reinventing the wheel, which reduces security risks and
    minimizes the chance of malicious code. As Ai systems start scaling in 2025, these
    are valid concerns.
  prefs: []
  type: TYPE_NORMAL
- en: As I dove into MCP, I realized a huge gap in documentation. There’s plenty of
    high-level “what does it do” content, but when you actually want to understand
    *how* it works, the resources start to fall short—especially for those who aren’t
    native developers. It’s either high level explainers or deep in the source code.
  prefs: []
  type: TYPE_NORMAL
- en: In this piece, I’m going to break MCP down for a broader audience—making the
    concepts and functionality clear and digestible. If you’re able, follow along
    in the coding section, if not it will be well explained in natural language above
    the code snippets.
  prefs: []
  type: TYPE_NORMAL
- en: 'An Analogy to Understand MCP: The Restaurant'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Let’s imagine the concept of MCP as a restaurant where we have:'
  prefs: []
  type: TYPE_NORMAL
- en: The Host = The restaurant building (the environment where the agent runs)
  prefs: []
  type: TYPE_NORMAL
- en: The Server = The kitchen (where tools live)
  prefs: []
  type: TYPE_NORMAL
- en: The Client = The waiter (who sends tool requests)
  prefs: []
  type: TYPE_NORMAL
- en: The Agent = The customer (who decides what tool to use)
  prefs: []
  type: TYPE_NORMAL
- en: The Tools = The recipes (the code that gets executed)
  prefs: []
  type: TYPE_NORMAL
- en: The Components of MCP
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Host**This is where the agent operates. In our analogy, it’s the restaurant
    building; in MCP, it’s wherever your agents or LLMs actually run. If you’re using
    Ollama locally, *you’re* the host. If you’re using Claude or GPT, then Anthropic
    or OpenAI are the hosts.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Client**'
  prefs: []
  type: TYPE_NORMAL
- en: This is the environment that sends tool call requests from the agent. Think
    of it as the waiter who takes your order and delivers it to the kitchen. In practical
    terms, it’s the application or interface where your agent runs. The client passes
    tool call requests to the **Server** using MCP.
  prefs: []
  type: TYPE_NORMAL
- en: '**Server**'
  prefs: []
  type: TYPE_NORMAL
- en: This is the kitchen where recipes, or tools, are housed. It centralizes tools
    so agents can access them easily. Servers can be local (spun up by users) or remote
    (hosted by companies offering tools). Tools on a server are typically either grouped
    by function or integration. For instance, all Slack-related tools can be on a
    “Slack server,” or all messaging tools can be grouped together on a “messaging
    server”. That decision is based on architectural and developer preferences.
  prefs: []
  type: TYPE_NORMAL
- en: '**Agent**'
  prefs: []
  type: TYPE_NORMAL
- en: The “brains” of the operation. Powered by an LLM, it decides which tools to
    call to complete a task. When it determines a tool is needed, it initiates a request
    to the server. The agent doesn’t need to natively understand MCP because it learns
    how to use it through the metadata associated with each of the tools. This metadata
    associated with each tool tells the agent the protocol for calling the tool and
    the execution method. But it is important to note that the platform or agent needs
    to support MCP so that it handles tool calls automatically. Otherwise it is up
    to the developer to write the complex translation logic of how to parse the metadata
    from the schema, form tool call requests in MCP format, map the requests to the
    correct function, execute the code, and return the result in MCP complaint format
    back to the agent.
  prefs: []
  type: TYPE_NORMAL
- en: '**Tools**'
  prefs: []
  type: TYPE_NORMAL
- en: 'These are the functions, such as calling APIs or custom code, that “does the
    work”. Tools live on servers and can be:'
  prefs: []
  type: TYPE_NORMAL
- en: Custom tools you create and host on a local server.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Premade tools hosted by others on a remote server.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Premade code created by others but hosted by you on a local server.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How the components fit together
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Server Registers Tools**Each tool is defined with a name, description, input/output
    schemas, a function handler (the code that runs) and registered to the server.
    This usually involves calling a method or API to tell the server “hey, here’s
    a new tool and this is how you use it”.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Server Exposes Metadata**When the server starts or an agent connects, it
    exposes the tool metadata (schemas, descriptions) via MCP.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Agent Discovers Tools**The agent queries the server (using MCP) to see what
    tools are available. It understands how to use each tool from the tool metadata.
    This typically happens on startup or when tools are added.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Agent Plans Tool Use**When the agent determines a tool is needed (based on
    user input or task context), it forms a tool call request in a standardized MCP
    JSON format which includes tool name, input parameters that match the tool’s input
    schema, and any other metadata.The client acts as the transport layer and sends
    the MCP formatted request to the server over HTTP.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Translation Layer Executes**'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The translation layer takes the agent’s standardized tool call (via MCP), maps
    the request to the corresponding function on the server, executes the function,
    formats the result back to MCP, and sends it back to the agent. A framework that
    abstracts MCP for you deos all of this without the developer needing to write
    the translation layer logic (which sounds like a headache).
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '![](../Images/467c96eb62116412c7488ee82e81229d.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Sandi Besen
