- en: Build a Data Dashboard Using HTML, CSS, and JavaScript
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/build-a-data-dashboard-using-html-css-javascript/](https://towardsdatascience.com/build-a-data-dashboard-using-html-css-javascript/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1759430674060" class="mdspan-comment">Building a data</mdspan>
    dashboard for your customers, clients, or fellow workers is becoming an essential
    part of the skill set required by software developers, data scientists, ML practitioners,
    and data engineers. Even if you work primarily on back-end processing, the data
    you’re processing usually needs to be “surfaced” to users at some point. If you’re
    lucky, your organisation may have a dedicated front-end team to take care of that,
    but often it will be down to you.
  prefs: []
  type: TYPE_NORMAL
- en: Being a straight-up Python developer with no experience in HTML, JavaScript,
    etc., is no longer an excuse, as many Python libraries, such as Streamlit and
    Gradio, have emerged over the last few years.
  prefs: []
  type: TYPE_NORMAL
- en: 'This article is not about them, though, because ***I am*** one of those straight-up
    Python developers, and I’ve already done the Streamlit and Gradio thing. So it
    was time to roll up my sleeves and see if I could learn new skills and create
    a dashboard with those old front-end development stalwarts: HTML, JavaScript,
    and CSS.'
  prefs: []
  type: TYPE_NORMAL
- en: The data for our dashboard will come from a local SQLite database. I created
    a **sales_data** table in SQLite containing dummy sales data. Here is the data
    in tabular form.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/cf595ca697d7b42872c34829e3044c73.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: Below is some code that you can use to follow along and create your own SQLite
    database and table with the data as shown.
  prefs: []
  type: TYPE_NORMAL
- en: In case you’re wondering why I’m only inserting a handful of records into my
    database, it’s not because I don’t think the code can handle large data volumes.
    It’s just that I wanted to concentrate on the dashboard functionality rather than
    being distracted by the data. Feel free to use the script I provide below to add
    additional records to the input data set if you like.
  prefs: []
  type: TYPE_NORMAL
- en: So, we stay in the Python world for just a bit longer as we set up a SQLite
    DB programmatically.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Dashboard Functionality
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Our dashboard will have the following functionality.
  prefs: []
  type: TYPE_NORMAL
- en: '**Key Metrics.** Total revenue, total orders, average order value, top category'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Different Chart Types.** Revenue Over Time (line chart), Revenue by Category
    (bar chart), Top Products by Revenue (horizontal bar chart)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Filtering.** By date and category'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Data Table.** Display our data records in a paginated and searchable grid
    format.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Setting up our Environment
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Next, we have a series of steps to follow to set up our environment.
  prefs: []
  type: TYPE_NORMAL
- en: '**1/ Install Node.js.**'
  prefs: []
  type: TYPE_NORMAL
- en: Node.js is a runtime environment that enables you to run JavaScript outside
    the browser, allowing you to use JavaScript to build fast and scalable server-side
    applications.
  prefs: []
  type: TYPE_NORMAL
- en: So, ensure Node.js is installed on your system to enable you to run a local
    server and manage packages. You can download it from the [Node.js official website](https://nodejs.org/).
  prefs: []
  type: TYPE_NORMAL
- en: '**2/ Create a main project folder and subfolders**'
  prefs: []
  type: TYPE_NORMAL
- en: Open your command terminal and run the following commands. I’m using Ubuntu
    on my Windows box for this, but you can change it to suit your preferred command-line
    utility and system.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: '**3/ Initialise a Node project**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: This command automatically creates a default **package.json** file in your project
    directory without requiring user input**.**
  prefs: []
  type: TYPE_NORMAL
- en: 'The **-y** flag answers **“yes”** to all prompts, using the **default values**
    for fields like:'
  prefs: []
  type: TYPE_NORMAL
- en: '**name**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**version**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**description**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**main**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**scripts**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**author**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**license**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Here is what my package file looked like.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: '**4/ Install Express and SQLite**'
  prefs: []
  type: TYPE_NORMAL
- en: '**SQLite** is a lightweight, file-based relational database engine that stores
    all your data in a single, portable file, eliminating the need for a separate
    server.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Express** is a minimal, flexible web application framework for Node.js that
    simplifies the building of APIs and web servers through routing and middleware.'
  prefs: []
  type: TYPE_NORMAL
- en: We can install both using the command below.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: 'Now, we can start developing our code. For this project, we’ll need four code
    files: an index.html file, a server.js file, a client.js file, and a script.js
    file.'
  prefs: []
  type: TYPE_NORMAL
- en: Let’s go through each of them step by step.
  prefs: []
  type: TYPE_NORMAL
- en: '**1) client/index.html**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: This HTML file establishes the basic visual elements of our Sales Performance
    Dashboard, including interactive filters for date and category, a section displaying
    key sales metrics, a dropdown menu to select chart types, and a table for raw
    data.
  prefs: []
  type: TYPE_NORMAL
- en: '**Bootstrap** is used for styling. **Flatpickr** is used for date inputs. **Chart.js**
    is used for visualisations, and **DataTables** is used for tabular display. Interactivity
    is handled by an external **script.js** file, which we’ll examine shortly.'
  prefs: []
  type: TYPE_NORMAL
- en: Bootstrap is a popular front-end framework, initially developed by Twitter,
    that helps you build responsive and visually consistent web interfaces more easily
    and quickly.
  prefs: []
  type: TYPE_NORMAL
- en: DataTables is a jQuery-based plugin that enhances standard HTML **<table>**
    elements, transforming them into fully interactive, feature-rich tables.
  prefs: []
  type: TYPE_NORMAL
- en: Flatpickr is a lightweight, customizable JavaScript date and time picker. It
    lets users select dates (and optionally times) from a sleek pop-up calendar instead
    of typing them manually.
  prefs: []
  type: TYPE_NORMAL
- en: Chart.js is a simple yet powerful JavaScript library for creating interactive,
    animated charts in web applications using the <canvas> element.
  prefs: []
  type: TYPE_NORMAL
- en: '**2) client/style.css**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: We use a cascading style sheet (CSS) to style the basic visual components of
    our dashboard, for example, button and text colours, spacing between elements,
    etc.
  prefs: []
  type: TYPE_NORMAL
- en: The style.css file gives the dashboard its appearance and overall look. It’s
    a clean, light theme with ample spacing and layout adjustments for clarity and
    readability. The style.css file also customises the appearance of DataTables’
    pagination buttons, making them more user-friendly and visually consistent with
    Bootstrap’s design.
  prefs: []
  type: TYPE_NORMAL
- en: '**3) server/server.js**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: 'This Node.js script contains the JavaScript code that sets up a basic Express
    server that powers the Sales Performance Dashboard. It does two main things:'
  prefs: []
  type: TYPE_NORMAL
- en: Serves static files (like HTML, CSS, and JS) from the client subfolder so the
    frontend loads in the browser.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Provides a **/data** endpoint that reads from a local SQLite database (sales_data.db)
    and returns the entire sales table as JSON, enabling dynamic data visualisations
    and tables on the frontend.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**NB After publication, a reader noted the following error when running the
    above code**.'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: The issue seems to have been caused by the version of the Express library they
    were using. I suggested changing this line,
  prefs: []
  type: TYPE_NORMAL
- en: app.get(‘*’, (req, res) => {
  prefs: []
  type: TYPE_NORMAL
- en: to
  prefs: []
  type: TYPE_NORMAL
- en: app.get(‘/*’, (req, res) => {
  prefs: []
  type: TYPE_NORMAL
- en: In the end, after some experimentation, they found that changing the line to
    the one shown below worked for them.
  prefs: []
  type: TYPE_NORMAL
- en: app.get(‘/’, (req, res) => {
  prefs: []
  type: TYPE_NORMAL
- en: '**4) client/script.js**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: It’s our most complicated code file, but it has to do a lot. This JavaScript
    file powers the interactivity and data visualisation for the Sales Performance
    Dashboard. In short, it …
  prefs: []
  type: TYPE_NORMAL
- en: '**1/ Fetches sales data**'
  prefs: []
  type: TYPE_NORMAL
- en: When the page loads (`DOMContentLoaded`), it calls a backend API at the /data
    endpoint.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If no data is returned, a “No data available” message is displayed.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**2/ Sets up filters**'
  prefs: []
  type: TYPE_NORMAL
- en: Uses **Flatpickr** date pickers to choose a start and end date based on the
    dataset’s min/max order dates.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Adds a **category dropdown, allowing users to** filter by product category.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Adds a **chart type selector** to switch between different chart visualisations.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**3/ Initialises the dashboard**'
  prefs: []
  type: TYPE_NORMAL
- en: Populates the category filter with available categories.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Runs the first render with the full dataset.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**4/ Applies filters and re-renders**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Each time the user changes a filter (date range, category, or chart type),
    it:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Filters the dataset by date range and category.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Updates **key metrics**: total revenue, number of orders, average order value,
    and top revenue category.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Redraws the selected **Chart.js chart**.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Refreshes the **data table**.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**5/ Draws charts with Chart.js**'
  prefs: []
  type: TYPE_NORMAL
- en: '**Revenue Over Time** → Line chart showing revenue trends by date.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Revenue by Category** → Bar chart aggregating total revenue per category.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Top Products** → Horizontal bar chart showing the top 10 products by revenue.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**6/ Displays tabular data**'
  prefs: []
  type: TYPE_NORMAL
- en: Uses **DataTables (****a jQuery plugin)** to render a table of filtered orders,
    with columns for order ID, date, customer ID, product, category, and total.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**7/ Keeps the UI in sync**'
  prefs: []
  type: TYPE_NORMAL
- en: Destroys and recreates charts/tables when filters change to avoid duplicates.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Keeps metrics, charts, and tables consistent with the active filters.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Running our dashboard
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now that we have all our code sorted, it’s time to run the dashboard, so go
    to the **server** subfolder and type in the following command.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: You’ll get a response to the above command, something like,
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: Open a web browser and visit [**http://localhost:3000**](http://localhost:3000).
    You should see your dashboard populated with data from the SQLite database, as
    shown in the image below.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/37fc8276914597fd8244e83d0fb93645.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: All the filters, chart selection, etc, should work as advertised.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this article, I’ve walked you through creating a fully functional, interactive
    sales performance dashboard using core web technologies—HTML, CSS, JavaScript,
    Node.js, Express, and a local SQLite database.
  prefs: []
  type: TYPE_NORMAL
- en: We discussed the tech stack & setup. i.e.
  prefs: []
  type: TYPE_NORMAL
- en: '**Backend:** Node.js, Express, SQLite'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Frontend:** HTML, Bootstrap (for layout), Chart.js (for charts), Flatpickr
    (date pickers), DataTables (for tabular data)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Folder structure as shown below.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: I showed you how to create and populate a SQLite database in code that we could
    use as the source data for our dashboard. We also discussed the environment setup
    and both the front-end and back-end development processes, and briefly touched
    on our data dashboard functionality.
  prefs: []
  type: TYPE_NORMAL
- en: Finally, I walked you through and explained in detail the four code files we
    needed to create, and then showed you how to run the dashboard in a browser.
  prefs: []
  type: TYPE_NORMAL
