- en: 5 Statistical Concepts You Need to Know Before Your Next Data Science Interview
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 在下一次数据科学面试之前你需要知道的5个统计概念
- en: 原文：[https://towardsdatascience.com/5-statistical-concepts-you-need-to-know-before-your-next-data-science-interview/](https://towardsdatascience.com/5-statistical-concepts-you-need-to-know-before-your-next-data-science-interview/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/5-statistical-concepts-you-need-to-know-before-your-next-data-science-interview/](https://towardsdatascience.com/5-statistical-concepts-you-need-to-know-before-your-next-data-science-interview/)
- en: <mdspan datatext="el1748284412008" class="mdspan-comment">Recently I’ve been</mdspan>
    on my own data science job search journey and have been very lucky to have gotten
    the chance to interview with many companies.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1748284412008" class="mdspan-comment">最近我一直在</mdspan>自己的数据科学求职旅程中，并且非常幸运地得到了面试许多公司的机会。
- en: These interviews have been a mix of technical and behavioral when meeting with
    real people, and I’ve also gotten my fair share of assessment tasks to complete
    on my own.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 这些面试包括与真实人物的技术和行为面试，我也有自己完成的一些评估任务。
- en: Going through this process I’ve done a lot of research about what kinds of questions
    are commonly asked during data science interviews. These are concepts you should
    not only be familiar with, but also know how to explain.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在经历这个过程时，我做了很多关于在数据科学面试中常见问题的研究。这些是你不仅应该熟悉，而且要知道如何解释的概念。
- en: 1\. P value
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1. P值
- en: '![](../Images/2f3a49e3b3edfc68adfef2b9f559ddb9.png)'
  id: totrans-6
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/2f3a49e3b3edfc68adfef2b9f559ddb9.png)'
- en: Image by author
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: When you run a statistical test, typically you are going to have a null hypothesis
    H0 and an alternative hypothesis H1.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 当你运行一个统计测试时，通常你会有一个零假设H0和一个备择假设H1。
- en: Let’s say you are running an experiment to determine the effectiveness of some
    weight-loss medication. Group A took a placebo and Group B took the medication.
    You then calculate a mean number of pounds lost over six months for each group
    and want to see if the number of weight lost for Group B is statistically significantly
    higher than Group A. In this case, the null hypothesis, H0 would be that there
    was no statistically significant differences in the mean number of lbs lost between
    groups, meaning that the medication had no real effect on weight loss. H1 would
    be that there was a significant difference and Group B lost more weight due to
    the medication.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你正在进行一个实验，以确定某种减肥药物的有效性。A组服用了安慰剂，B组服用了药物。然后，你计算每个组在六个月内平均减重的磅数，并想看看B组的减重数量是否在统计上显著高于A组。在这种情况下，零假设H0将是两组平均减重之间没有统计上显著差异，这意味着药物对减重没有真正的影响。H1将是存在显著差异，并且B组由于药物而减重更多。
- en: 'To recap:'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 为了回顾：
- en: 'H0: Mean lbs lost Group A = Mean lbs lost Group B'
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'H0: A组平均减重 = B组平均减重'
- en: 'H1: Mean lbs lost Group A < Mean lbs lost Group B'
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'H1: A组平均减重 < B组平均减重'
- en: You would then conduct a [t-test](https://www.jmp.com/en/statistics-knowledge-portal/t-test#:~:text=A%20t%2Dtest%20may%20be,dependent%20samples%20t%2Dtest%29.)
    to compare means to get a p-value. This can be done in Python or other statistical
    software. However, prior to getting a p-value, you would first choose an alpha
    (α) value (aka significance level) that you will compare the p to.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，你会进行[t-test](https://www.jmp.com/en/statistics-knowledge-portal/t-test#:~:text=A%20t%2Dtest%20may%20be,dependent%20samples%20t%2Dtest%29)来比较均值以获得p值。这可以在Python或其他统计软件中完成。然而，在获得p值之前，你首先会选择一个α（α）值（即显著性水平），然后将其与p值进行比较。
- en: The typical alpha value chosen is 0.05, which means that the probability of
    a Type I error (Saying that there is a difference in means when there isn’t) is
    0.05 or 5%.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 通常选择的典型α值是0.05，这意味着一类错误（在实际上没有差异时说有差异）的概率是0.05或5%。
- en: If your p value is < alpha value, you can reject your null hypothesis. Otherwise,
    if p > alpha, you fail to reject your null hypothesis.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的p值小于α值，你可以拒绝零假设。否则，如果p > α，你未能拒绝零假设。
- en: 2\. Z-score (and other outlier detection methods)
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2. Z分数（以及其他异常值检测方法）
- en: Z-score is a measure of how far a data point lies from the mean and is one of
    the most common outlier detection methods.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: Z分数是衡量数据点与均值距离的指标，也是最常见的异常值检测方法之一。
- en: 'In order to understand the z score you need to understand basic statistical
    concepts such as:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 为了理解z分数，你需要了解基本统计概念，例如：
- en: '**Mean** — the average of a set of values'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**均值**—一组值的平均值'
- en: '**Standard deviation** — a measure of spread between values in a dataset in
    relation to the mean (also the square root of variance). In other words, it shows
    how far apart values in the dataset are from the mean.'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**标准差**—衡量数据集中值与平均值之间差异的一个指标（也是方差的平方根）。换句话说，它显示了数据集中值与平均值之间的差异程度。'
- en: A z-score value of 2 for a given data point indicates that that value is 2 standard
    deviations above the mean. A z-score of -1.5 indicates that the value is 1.5 standard
    deviations below the mean.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 对于一个特定的数据点，z分数值为2表示该值比平均值高2个标准差。z分数为-1.5表示该值比平均值低1.5个标准差。
- en: Typically, a data point with a z-score of >3 or <-3 is considered an outlier.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，z分数大于3或小于-3的数据点被认为是异常值。
- en: Outliers are a common problem within data science so it’s important to know
    how to identify them and deal with them.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 异常值是数据科学中的一个常见问题，因此了解如何识别和处理它们非常重要。
- en: 'To learn more about some other simple outlier detection methods, check out
    my article on z-score, IQR, and modified z score:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 要了解更多关于其他一些简单的异常值检测方法，请查看我关于z分数、四分位数范围和修正z分数的文章：
- en: '[3 Simple Statistical Methods for Outlier Detection](https://towardsdatascience.com/3-simple-statistical-methods-for-outlier-detection-db762e86cd9d/)'
  id: totrans-25
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[3种简单的异常值检测统计方法](https://towardsdatascience.com/3-simple-statistical-methods-for-outlier-detection-db762e86cd9d/)'
- en: 3\. Linear Regression
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3. 线性回归
- en: '![](../Images/d79c39d4b54c89f30d0ff23af3f4bedd.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d79c39d4b54c89f30d0ff23af3f4bedd.png)'
- en: Image by author
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: '[Linear regression](https://www.geeksforgeeks.org/ml-linear-regression/) is
    one of the most fundamental ML and statistical models and understanding it is
    crucial to being successful in any data science role.'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: '[线性回归](https://www.geeksforgeeks.org/ml-linear-regression/)是最基本的机器学习和统计模型之一，理解它是成功从事任何数据科学角色的关键。'
- en: On a high level, linear regression aims to model the relationship between an
    independent variable(s) to a dependent variable and attempts to use an independent
    variable to predict the value of the dependent variable. It does so by fitting
    a “line of best fit” to the dataset — a line that minimizes the sum of squared
    differences between the actual values and the predicted values.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 从高层次来看，线性回归旨在模拟自变量（s）与因变量之间的关系，并试图使用自变量来预测因变量的值。它通过将“最佳拟合线”拟合到数据集来实现这一点——一条最小化实际值与预测值之间平方差的线。
- en: An example of this is when trying to model the relationship between temperature
    and electric energy consumption. When measuring electric consumption of a building
    often times the temperature will impact the usage because as electricity is often
    used for cooling, as the temperature goes up, buildings will use more energy to
    cool down their spaces.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，当尝试建立温度和电能消耗之间的关系时。在测量建筑物的电能消耗时，温度通常会影响到使用，因为电力通常用于冷却，随着温度的升高，建筑物将需要更多的能量来冷却其空间。
- en: So we can use a regression model to model this relationship where the independent
    variable is temperature and the dependent variable is the consumption (since the
    usage is dependent on the temperature and not vice versa).
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们可以使用回归模型来模拟这种关系，其中自变量是温度，因变量是消耗（因为使用依赖于温度，而不是反过来）。
- en: Linear regression will output an equation in the format y=mx+b, where m is the
    slope of the line and b is the y intercept. To make a prediction for y, you would
    plug your x value into the equation.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 线性回归将输出一个格式为y=mx+b的方程，其中m是线的斜率，b是y轴截距。要预测y的值，您需要将x值代入方程中。
- en: 'Regression has 4 different assumptions of the underlying data which can be
    remembered by the acronym LINE:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 回归对基础数据有4个不同的假设，可以用首字母缩略词LINE来记住：
- en: '**L: Linear relationship** between the independent variable x and the dependent
    variable y.'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: '**L: 线性关系**独立变量x和因变量y之间。'
- en: '**I: Independence of the residuals.** Residuals don’t influence each other.
    (A residual is the difference between the value predicted by the line and the
    actual value).'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: '**I: 残差的独立性**。残差之间互不影响。（残差是预测值与实际值之间的差异）。'
- en: '**N: Normal distribution** of the residuals. The residuals follow a normal
    distribution.'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: '**N: 均匀分布**的残差。残差遵循均匀分布。'
- en: '**E: Equal variance** of residuals across different x values.'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: '**E: 残差在不同x值上的方差相等**。'
- en: The most common performance metric when it comes to linear regression is the
    R², which tells you the proportion of variance in the dependent variable that
    can be explained by the independent variable. An R² of 1 indicates a perfect linear
    relationship whereas an R² of 0 means there is no predictive ability for this
    dataset. A good R² tends to be 0.75 or above, but this also varies depending on
    the type of problem you’re solving.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
- en: '**Linear regression is different from correlation.** ***Correlation*** between
    two variables gives you a numeric value between -1 and 1 which tells you the strength
    and direction of the relationship between two variables. ***Regression*** gives
    you an equation which can be used to predict future values based on the line of
    best fit for past values.'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
- en: 4\. Central limit theorem
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The [Central Limit Theorem (CLT)](https://www.investopedia.com/terms/c/central_limit_theorem.asp)
    is a fundamental concept in statistics that states that the distribution of the
    sample mean will approach a normal distribution as the sample size becomes larger,
    regardless of the original distribution of the data.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
- en: A normal distribution, also known as the bell curve, is a statistical distribution
    in which the mean is 0 and the standard deviation is 1.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
- en: 'CLT is based on these assumptions:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
- en: Data are independent
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Population of data has a finite level of variance
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Sampling is random
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A sample size of ≥ 30 is typically seen as the minimum acceptable value for
    the CLT to hold true. However, as you increase the sample size the distribution
    will look more and more like a bell curve.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
- en: CLT allows statisticians to make inferences about population parameters using
    the normal distribution, even when the underlying population is not normally distributed.
    It forms the basis for many statistical methods, including confidence intervals
    and hypothesis testing.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
- en: 5\. Overfitting and underfitting
  id: totrans-50
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![](../Images/626496a431c27deb52f4b2d8a1016822.png)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
- en: Image by author
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
- en: When a model **underfits,** it has not been able to capture patterns in the
    training data properly. Because of this, not only does it perform poorly on the
    training dataset, it performs poorly on unseen data as well.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
- en: 'How to know if a model is undercutting:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
- en: The model has a high error on the train, cross-validation and test sets
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When a model **overfits**, this means that it has learned the training data
    too closely. Essentially it has memorized the training data and is great at predicting
    it, but it cannot generalize to unseen data when it comes time to predict new
    values.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
- en: 'How to know if a model is overfitting:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
- en: The model has a low error on the entire train set, but a high error on the test
    and cross-validation sets
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Additionally:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
- en: '**A model that underfits has high bias.**'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
- en: '**A model that overfits has high variance.**'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
- en: Finding a good balance between the two is called the ***bias-variance tradeoff. ***
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
