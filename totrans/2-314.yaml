  type: TYPE_NORMAL
- en: It’s normal to feel overwhelmed when reviewing these concepts, especially if
    you haven’t seen many of them since your data science courses in school. But what’s
    more important is ensuring that you’re up to date with what’s most relevant to
    your own experience (e.g. the basics of time series modeling if that’s your speciality),
    and simply having a basic understanding of these other concepts.
  prefs: []
  type: TYPE_NORMAL
- en: Also, remember that the best way to explain these concepts in an interview is
    to use an example and walk the interviewers through the relevant definitions as
    you talk through your scenario. This will help you remember everything better
    too.
  prefs: []
  type: TYPE_NORMAL
