- en: Evaluating Synthetic Data — The Million Dollar Question
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 评估合成数据——百万美元的问题
- en: 原文：[https://towardsdatascience.com/evaluating-synthetic-data-the-million-dollar-question-a54701d1b621/](https://towardsdatascience.com/evaluating-synthetic-data-the-million-dollar-question-a54701d1b621/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/evaluating-synthetic-data-the-million-dollar-question-a54701d1b621/](https://towardsdatascience.com/evaluating-synthetic-data-the-million-dollar-question-a54701d1b621/)
- en: <mdspan datatext="el1762546889344" class="mdspan-comment">When we perform</mdspan>
    synthetic data generation, we typically create a model for our real (or ‘observed’)
    data, and then use this model to generate synthetic data. This observed data is
    usually compiled from real world experiences, such as measurements of the physical
    characteristics of irises or details about individuals who have defaulted on credit
    or acquired some medical condition. We can think of the observed data as having
    come from some ‘parent distribution’ — the true underlying distribution from which
    the observed data is a random sample. Of course, we never know this parent distribution
    — it must be estimated, and this is the purpose of our model.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1762546889344" class="mdspan-comment">当我们进行合成数据生成时，我们通常为我们的真实（或“观察”）数据创建一个模型，然后使用这个模型来生成合成数据。这些观察数据通常来自现实世界的经验，例如测量鸢尾花的物理特性或关于违约或患有某些医疗状况的个人细节。我们可以将这些观察数据视为来自某个“父分布”——这是观察数据是随机样本的真实潜在分布。当然，我们永远不知道这个父分布——它必须被估计，这就是我们模型的目的。</mdspan>
- en: 'But if our model can produce synthetic data that can be considered to be a
    random sample from the same parent distribution, then we’ve hit the jackpot: the synthetic
    data will possess the same statistical properties and patterns as the observed
    data (*fidelity*); it will be just as useful when put to tasks such as regression
    or classification (*utility*); and, because it is a random sample, there is no
    risk of it identifying the observed data (*privacy*). But how can we know if we
    have met this elusive goal?'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，如果我们能生成被认为是来自同一父分布的随机样本的合成数据，那么我们就找到了宝藏：合成数据将具有与观察数据相同的统计特性和模式（*保真度*）；它在回归或分类等任务中同样有用（*效用*）；而且，因为它是一个随机样本，不存在识别观察数据的隐私风险。但是，我们如何知道我们已经达到了这个难以捉摸的目标呢？
- en: In the first part of this story, we will conduct some simple experiments to
    gain a better understanding of the problem and motivate a solution. In the second
    part we will evaluate performance of a variety of synthetic data generators on
    a collection of well-known datasets.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个故事的第一部分，我们将进行一些简单的实验，以更好地理解问题并激发解决方案。在第二部分，我们将评估各种合成数据生成器在一系列知名数据集上的性能。
- en: Part 1 — Some Simple Experiments
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第一部分——一些简单的实验
- en: 'Consider the following two datasets and try to answer this question:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑以下两个数据集并尝试回答这个问题：
- en: '*Are the datasets random samples from the same parent distribution, or has
    one been derived from the other by applying small random perturbations?*'
  id: totrans-7
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*这些数据集是否是来自同一父分布的随机样本，或者其中一个是否通过应用小的随机扰动从另一个派生出来的？*'
- en: '![](../Images/0877eca96b8369b22f920bbd6cdad731.png)'
  id: totrans-8
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/0877eca96b8369b22f920bbd6cdad731.png)'
- en: '**Figure 1\.** Two datasets. Are both datasets random samples from the same
    parent distribution, or has one been derived from the other by small random perturbations?
    [Image by Author]'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: '**图1**。两个数据集。这两个数据集是否都是来自同一父分布的随机样本，或者其中一个是否通过小的随机扰动从另一个派生出来的？[图片由作者提供]'
- en: The datasets clearly display similar statistical properties, such as marginal
    distributions and covariances. They would also perform similarly on a classification
    task in which a classifier trained on one dataset is tested on the other.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 这些数据集明显显示出相似的统计特性，例如边缘分布和协方差。它们在分类任务上的表现也会相似，其中分类器在一个数据集上训练，在另一个数据集上测试。
- en: But suppose we were to plot the data points from each dataset on the same graph. If
    the datasets are random samples from the same parent distribution, we would intuitively
    expect the points from one dataset to be interspersed with those from the other
    in such a manner that, on average, points from one set are as close to — or ‘as
    similar to’ — their closest neighbors in that set as they are to their closest
    neighbors in the other set. However, if one dataset is a slight random perturbation of
    the other, then points from one set will be more similar to their closest neighbors
    in the other set than they are to their closest neighbors in the same set. This
    leads to the following test.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 但假设我们将每个数据集的数据点绘制在同一个图上。如果数据集是从同一父分布中随机抽取的样本，我们会直观地期望一个数据集的点会与其他数据集的点交织在一起，使得平均而言，一个数据集的点与其在该数据集中的最近邻点的距离（或‘相似度’）与它们与其他数据集中最近邻点的距离相同。然而，如果一个数据集是另一个数据集的轻微随机扰动，那么一个数据集的点将比它们在该数据集中的最近邻点更相似于另一个数据集中的最近邻点。这导致以下测试。
- en: The Maximum Similarity Test
  id: totrans-12
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 最大相似度测试
- en: '*For each dataset, calculate the similarity between each instance and its closest
    neighbor in the same dataset. Call these the ‘maximum intra-set similarities’.
    If the datasets have the same distributional characteristics, then the distribution
    of intra-set similarities should be similar for each dataset. Now calculate the
    similarity between each instance of one dataset and its closest neighbor in the other dataset
    and call these the ‘maximum cross-set similarities’. If the distribution of maximum
    cross-set similarities is the same as the distribution of maximum intra-set similarities,
    then the datasets can be considered random samples from the same parent distribution. For
    the test to be valid, each dataset should contain the same number of examples.*'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: '*对于每个数据集，计算每个实例与其在同一数据集中的最近邻之间的相似度。将这些称为“最大内部集相似度”。如果数据集具有相同的分布特征，那么每个数据集的内部集相似度的分布应该相似。现在计算一个数据集的每个实例与其另一个数据集中最近邻之间的相似度，将这些称为“最大交叉集相似度”。如果最大交叉集相似度的分布与最大内部集相似度的分布相同，那么可以认为数据集是从同一父分布中随机抽取的样本。为了使测试有效，每个数据集应包含相同数量的示例。*'
- en: '![](../Images/ec6294124f32e26569dcb3f9c8a44457.png)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ec6294124f32e26569dcb3f9c8a44457.png)'
- en: '**Figure 2\.** Two datasets: one red, one black. Black arrows indicate the
    closest (or ‘most similar’) black neighbor (head) to each black point (tail) —
    the similarities between these pairs are the ‘maximum intra-set similarities’
    for black. Red arrows indicate the closest black neighbor (head) to each red point
    (tail) — similarities between these pairs are the ‘maximum cross-set similarities’.
    [Image by Author]'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: '**图2**. 两个数据集：一个红色，一个黑色。黑色箭头指示每个黑色点（尾部）最近的（或“最相似的”）黑色邻居（头部）——这些对之间的相似度是黑色数据集的“最大内部集相似度”。红色箭头指示每个红色点（尾部）最近的黑色邻居（头部）——这些对之间的相似度是“最大交叉集相似度”。[图片由作者提供]'
- en: Since the datasets we deal with in this story all contain a mixture of numerical
    and categorical variables, we need a similarity measure which can accommodate
    this. We use Gower Similarity¹.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 由于在这个故事中我们处理的数据集都包含数值型和分类型变量混合，我们需要一个能够适应这种情况的相似度度量。我们使用Gower相似度¹。
- en: The table and histograms below show the means and distributions of the maximum
    intra- and cross-set similarities for Datasets 1 and 2.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的表格和直方图显示了数据集1和2的最大内部和交叉集相似度的平均值和分布。
- en: '![](../Images/51366a84b927cb59c96ebecfc5ccca77.png)![](../Images/c17dd462a2bd53d3ee752646596296a4.png)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/51366a84b927cb59c96ebecfc5ccca77.png)![图片](../Images/c17dd462a2bd53d3ee752646596296a4.png)'
- en: '**Figure 3\.** Distribution of maximum intra- and cross-set similarities for
    Datasets 1 and 2\. [Image by Author]'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '**图3**. 数据集1和2的最大内部和交叉集相似度分布。[图片由作者提供]'
- en: On average, the instances in one data set are more similar to their closest
    neighbors in the other dataset than they are to their closest neighbors in the
    same dataset. This indicates that the datasets are more likely to be perturbations of
    each other than random samples from the same parent distribution. **And indeed,
    they are perturbations! **Dataset 1 was generated from a Gaussian mixture model;
    Dataset 2 was generated by selecting (without replacement) an instance from Dataset
    1 and applying a small random perturbation.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 平均而言，一个数据集中的实例与其在另一个数据集中最近邻的相似度，比与其在同一数据集中最近邻的相似度要高。这表明数据集更有可能是彼此的扰动，而不是来自同一父分布的随机样本。**确实，它们是扰动！**数据集
    1 是由高斯混合模型生成的；数据集 2 是通过（不替换）从数据集 1 中选择一个实例并应用小的随机扰动生成的。
- en: Ultimately, we will be using the Maximum Similarity Test to compare synthetic
    datasets with observed datasets. The biggest danger with synthetic data points
    being too close to observed points is privacy; i.e., being able to identify points
    in the observed set from points in the synthetic set. In fact, if you examine
    Datasets 1 and 2 carefully, you might actually be able to identify some such pairs.
    And this is for a case in which the average maximum cross-set similarity is only
    0.3% larger than the average maximum intra-set similarity!
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 最终，我们将使用最大相似性测试来比较合成数据集和观察数据集。合成数据点与观察数据点过于接近的最大危险是隐私；即能够从合成数据集中的点识别出观察数据集中的点。实际上，如果你仔细检查数据集
    1 和 2，你实际上可能能够识别出一些这样的配对。而且这是在平均最大跨集相似度仅比平均最大内集相似度高 0.3% 的情况下！
- en: Modeling and Synthesizing
  id: totrans-22
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 建模和合成
- en: To end this first part of the story, let’s create a model for a dataset and
    use the model to generate synthetic data. We can then use the Maximum Similarity
    Test to compare the synthetic and observed sets.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 为了结束这个故事的第一部分，让我们为数据集创建一个模型，并使用该模型生成合成数据。然后我们可以使用最大相似性测试来比较合成数据和观察数据集。
- en: The dataset on the left of Figure 4 below is just Dataset 1 from above. The
    dataset on the right (Dataset 3) is the synthetic dataset. (We have estimated
    the distribution as a Gaussian mixture, but that’s not important).
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 下图 4 左侧的数据集就是上面提到的数据集 1。右侧的数据集（数据集 3）是合成数据集。（我们估计分布为高斯混合，但这并不重要）。
- en: '![](../Images/4bd5cfba4df09e317764c66a54389696.png)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/4bd5cfba4df09e317764c66a54389696.png)'
- en: '**Figure 4\.** Observed dataset (left) and Synthetic dataset (right). [Image
    by Author]'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: '**图 4**. 观察数据集（左侧）和合成数据集（右侧）。[图片由作者提供]'
- en: 'Here are the average similarities and histograms:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是平均相似度和直方图：
- en: '![](../Images/4fac6e8982a16de5992ead11d38722cd.png)![](../Images/cef8d85ce3f750260171abc64608a227.png)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/4fac6e8982a16de5992ead11d38722cd.png)![](../Images/cef8d85ce3f750260171abc64608a227.png)'
- en: '**Figure 5\.** Distribution of maximum intra- and cross-set similarities for
    Datasets 1 and 3\. [Image by Author]'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: '**图 5**. 数据集 1 和 3 的最大内集和跨集相似度的分布。[图片由作者提供]'
- en: The three averages are identical to three significant figures, and the three
    histograms are very similar. Therefore, according to the Maximum Similarity Test,
    both datasets can reasonably be considered random samples from the same parent
    distribution. Our synthetic data generation exercise has been a success, and we
    have achieved the trifecta — fidelity, utility, and privacy.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 三个平均值在三位有效数字上是一致的，三个直方图也非常相似。因此，根据最大相似性测试，两个数据集可以合理地被认为是来自同一父分布的随机样本。我们的合成数据生成练习已经成功，我们实现了三合一——保真度、实用性和隐私性。
- en: '[*Python code used to produce the datasets, plots and histograms from Part
    1 is available from *[*https://github.com/a-skabar/TDS-EvalSynthData*](https://github.com/a-skabar/TDS-EvalSynthData)]'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: '[*用于生成第一部分数据集、图表和直方图的 Python 代码可在以下链接找到*](https://github.com/a-skabar/TDS-EvalSynthData)'
- en: Part 2— Real Datasets, Real Generators
  id: totrans-32
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第二部分——真实数据集，真实生成器
- en: The dataset used in Part 1 is simple and can be easily modeled with just a mixture
    of Gaussians. However, most real-world datasets are far more complex. In this
    part of the story, we will apply several synthetic data generators to some popular
    real-world datasets. Our primary focus is on comparing the distributions of maximum
    similarities within and between the observed and synthetic datasets to understand
    the extent to which they can be considered random samples from the same parent
    distribution.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: The six datasets originate from the UCI repository² and are all popular datasets
    that have been widely used in the machine learning literature for decades. All
    are mixed-type datasets, and were chosen because they vary in their balance of
    categorical and numerical features.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
- en: The six generators are representative of the major approaches used in synthetic
    data generation: copula-based, GAN-based, VAE-based, and approaches using sequential
    imputation. CopulaGAN³, GaussianCopula, CTGAN³ and TVAE³ are all available from
    the *Synthetic Data Vault* libraries⁴, synthpop⁵ is available as an open-source
    R package, and ‘UNCRi’ refers to the synthetic data generation tool developed
    under the *Unified Numeric/Categorical Representation and Inference *(UNCRi) framework⁶.
    All generators were used with their default settings.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: Table 1 shows the average maximum intra- and cross-set similarities for each
    generator applied to each dataset. Entries highlighted in red are those in which
    privacy has been compromised (i.e., the average maximum cross-set similarity exceeds
    the average maximum intra-set similarity on the observed data). Entries highlighted
    in green are those with the highest average maximum cross-set similarity (not
    including those in red). The last column shows the result of performing a *Train
    on Synthetic, Test on Real* (TSTR) test, where a classifier or regressor is trained
    on the synthetic examples and tested on the real (observed) examples. The Boston
    Housing dataset is a regression task, and the mean absolute error (MAE) is reported;
    all other tasks are classification tasks, and the reported value is the area under
    ROC curve (AUC).
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/1491cf04d2f1d9ebe5e3ec5c9653f6c5.png)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
- en: '**Table 1.** Average maximum similarities and TSTR result for six generators
    on six datasets. The values for TSTR are MAE for Boston Housing, and AUC for all
    other datasets. [Image by Author]'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
- en: The figures below display, for each dataset, the distributions of maximum intra-
    and cross-set similarities corresponding to the generator that attained the highest
    average maximum cross-set similarity (excluding those highlighted in red above).
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/19c6fbeb28cc57ab3746b4fd00e982c8.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
- en: '**Figure 6\.** Distribution of maximum similarities for synthpop on **Boston
    Housing** dataset. [Image by Author]'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a3c5b96da636c5b9151d0825eacab953.png)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
- en: '**Figure 7\.** Distribution of maximum similarities for synthpop on **Census
    Income** dataset. [Image by Author]'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/09bed5797d406c72dc3a5bc7f1966047.png)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/09bed5797d406c72dc3a5bc7f1966047.png)'
- en: '**Figure 8\.** Distribution of maximum similarities for UNCRi on **Cleveland
    Heart Disease** dataset. [Image by Author]'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: '**图8**. **Cleveland Heart Disease**数据集上UNCRi的最大相似度分布。[图片由作者提供]'
- en: '![](../Images/108a6ae4727f85a4cac7d0b07f48b43a.png)'
  id: totrans-46
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/108a6ae4727f85a4cac7d0b07f48b43a.png)'
- en: '**Figure 9\.** Distribution of maximum similarities for UNCRi on **Credit Approval**
    dataset. [Image by Author]'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: '**图9**. **Credit Approval**数据集上UNCRi的最大相似度分布。[图片由作者提供]'
- en: '![](../Images/8b33032f249fbbc7f75a3ef3151ae402.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/8b33032f249fbbc7f75a3ef3151ae402.png)'
- en: '**Figure 10\.** Distribution of maximum similarities for UNCRi on **Iris**
    dataset. [Image by Author]'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: '**图10**. **Iris**数据集上UNCRi的最大相似度分布。[图片由作者提供]'
- en: '![](../Images/1cbbf8803100130ba46564ee3b7802e3.png)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/1cbbf8803100130ba46564ee3b7802e3.png)'
- en: '**Figure 11\.** Distribution of average similarities for TVAE on **Wisconsin
    Breast Cancer** dataset. [Image by Author]'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: '**图11**. **Wisconsin Breast Cancer**数据集上TVAE的平均相似度分布。[图片由作者提供]'
- en: From the table, we can see that for those generators that did not breach privacy,
    the average maximum cross-set similarity is very close to the average maximum
    intra-set similarity on observed data. The histograms show us the distributions
    of these maximum similarities, and we can see that in most cases the distributions
    are clearly similar — strikingly so for datasets such as the Census Income dataset.
    The table also shows that the generator that achieved the highest average maximum
    cross-set similarity for each dataset (excluding those highlighted in red) also
    demonstrated best performance on the TSTR test (again excluding those in red).
    Thus, while we can never claim to have discovered the ‘true’ underlying distribution,
    these results demonstrate that the most effective generator for each dataset has
    captured the crucial features of the underlying distribution.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 从表中，我们可以看到，对于那些没有侵犯隐私的生成器，观察数据中平均最大交叉集相似度与平均最大内部集相似度非常接近。直方图显示了这些最大相似度的分布，我们可以看到，在大多数情况下，分布是明显相似的——对于像人口收入数据集这样的数据集来说，这种相似性尤为显著。表还显示，对于每个数据集（不包括用红色突出显示的），实现平均最大交叉集相似度最高的生成器（再次排除红色部分）在TSTR测试中也表现出最佳性能。因此，虽然我们永远无法声称发现了“真实”的潜在分布，但这些结果表明，对于每个数据集来说，最有效的生成器已经捕捉到了潜在分布的关键特征。
- en: Privacy
  id: totrans-53
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 隐私
- en: 'Only two of the seven generators displayed issues with privacy: synthpop and
    TVAE. Each of these breached privacy on three out of the six datasets. In two
    instances, specifically TVAE on Cleveland Heart Disease and TVAE on Credit Approval,
    the breach was particularly severe. The histograms for TVAE on Credit Approval
    are shown below and demonstrate that the synthetic examples are far too similar
    to each other, and also to their closest neighbors in the observed data. The model
    is a particularly poor representation of the underlying parent distribution. The
    reason for this may be that the Credit Approval dataset contains several numerical
    features that are extremely highly skewed.'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 只有七个生成器中的两个在隐私方面存在问题：synthpop和TVAE。每个生成器在六个数据集中有三个数据集违反了隐私。在两个实例中，特别是TVAE在克利夫兰心脏病和TVAE在信用批准中，违规尤其严重。下面显示了TVAE在信用批准上的直方图，并表明合成的例子彼此之间过于相似，并且也与观察数据中的最近邻过于相似。该模型是潜在父分布的特别糟糕的表示。这可能是由于信用批准数据集包含几个极端偏斜的数值特征。
- en: '![](../Images/0829f74d0883d07d161cbb591b2f39c8.png)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/0829f74d0883d07d161cbb591b2f39c8.png)'
- en: '**Figure 12\.** Distribution of average maximum similarities for TVAE on **Credit
    Approval dataset**. [Image by Author]'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: '**图12**. **Credit Approval**数据集上TVAE的平均最大相似度分布。[图片由作者提供]'
- en: Other observations and comments
  id: totrans-57
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 其他观察和评论
- en: The two GAN-based generators — CopulaGAN and CTGAN — were consistently among
    the worst performing generators. This was somewhat surprising given the immense
    popularity of GANs.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 这两个基于GAN的生成器——CopulaGAN和CTGAN——在表现最差的生成器中一直名列前茅。考虑到GAN的巨大流行度，这一点有些令人惊讶。
- en: The performance of GaussianCopula was mediocre on all datasets except Wisconsin
    Breast Cancer, for which it attained the equal-highest average maximum cross-set
    similarity. Its unimpressive performance on the Iris dataset was particularly
    surprising, given that this is a very simple dataset that can easily be modeled
    using a mixture of Gaussians, and which we expected would be well-matched to Copula-based
    methods.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: GaussianCopula在所有数据集上的表现都一般，除了威斯康星乳腺癌数据集，在该数据集上它达到了最高的平均最大交叉集相似度。它在Iris数据集上的表现令人印象深刻，尤其是考虑到这是一个非常简单的数据集，可以很容易地使用高斯混合模型进行建模，并且我们预计它将很好地匹配基于Copula的方法。
- en: The generators which perform most consistently well across all datasets are
    synthpop and UNCRi, which both operate by sequential imputation. This means that
    they only ever need to estimate and sample from a univariate conditional distribution
    (e.g., *P*(*x*₇|*x*₁, *x*₂, …)), and this is typically much easier than modeling
    and sampling from a multivariate distribution (e.g., *P*(*x*₁, *x*₂, *x*₃, …)),
    which is (implicitly) what GANs and VAEs do. Whereas synthpop estimates distributions
    using decision trees (which are the source of the overfitting that synthpop is
    prone to), the UNCRi generator estimates distributions using a nearest neighbor-based
    approach, with hyper-parameters optimized using a cross-validation procedure that
    prevents overfitting.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 在所有数据集上表现最稳定的是synthpop和UNCRi生成器，它们都通过顺序插补进行操作。这意味着它们只需要估计和从一元条件分布（例如，*P*(*x*₇|*x*₁,
    *x*₂, …)）中进行采样，这通常比建模和从多元分布（例如，*P*(*x*₁, *x*₂, *x*₃, …)）中进行采样要容易得多，这正是GANs和VAEs所隐含的。而synthpop使用决策树来估计分布（这是synthpop容易过拟合的来源），而UNCRi生成器使用基于最近邻的方法来估计分布，使用交叉验证过程优化超参数，以防止过拟合。
- en: Conclusion
  id: totrans-61
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: 'Synthetic data generation is a new and evolving field, and while there are
    still no standard evaluation techniques, there is consensus that tests should
    cover fidelity, utility and privacy. But while each of these is important, they
    are not on an equal footing. For example, a synthetic dataset may achieve good
    performance on fidelity and utility but fail on privacy. This does not give it
    a ‘two out of three’: if the synthetic examples are too close to the observed
    examples (thus failing the privacy test), the model has been overfitted, rendering
    the fidelity and utility tests meaningless. There has been a tendency among some
    vendors of synthetic data generation software to propose single-score measures
    of performance that combine results from a multitude of tests. This is essentially
    based on the same ‘two out of three’ logic.'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 合成数据生成是一个新兴且不断发展的领域，尽管目前还没有标准评估技术，但普遍认为测试应该涵盖一致性、效用和隐私。但是，虽然这些都很重要，但它们并不处于同等地位。例如，一个合成数据集可能在一致性和效用上表现良好，但在隐私上失败。这并不意味着它“三选其二”：如果合成示例与观察示例过于接近（从而未能通过隐私测试），则模型已被过拟合，使得一致性和效用测试变得毫无意义。一些合成数据生成软件的供应商倾向于提出基于多种测试结果的单一评分性能度量。这本质上基于相同的“三选其二”逻辑。
- en: If a synthetic dataset can be considered a random sample from the same parent
    distribution as the observed data, then we cannot do any better — we have achieved
    maximum fidelity, utility and privacy. The Maximum Similarity Test provides a
    measure of the extent to which two datasets can be considered random samples from
    the same parent distribution. It is based on the simple and intuitive notion that
    if an observed and a synthetic dataset are random samples from the same parent
    distribution, instances should be distributed such that a synthetic instance is
    as similar on average to its closest observed instance as an observed instance
    is similar on average to its closest observed instance.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 如果一个合成数据集可以被认为是来自与观察数据相同父分布的随机样本，那么我们就无法做得更好——我们已经实现了最大的一致性、效用和隐私。最大相似性测试提供了两个数据集可以被认为是来自相同父分布的随机样本的程度度量。它基于简单直观的概念，即如果观察到的和合成的数据集都是来自相同父分布的随机样本，实例应该分布得使得合成的实例与其最近的观察实例的平均相似度与观察实例与其最近的观察实例的平均相似度相当。
- en: 'We propose the following single-score measure of synthetic dataset quality:'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 我们提出了以下合成数据集质量的单一评分度量方法：
- en: '![](../Images/c5becee979bac020e1145b4dc3faeae5.png)'
  id: totrans-65
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c5becee979bac020e1145b4dc3faeae5.png)'
- en: The closer this ratio is to 1 — without exceeding 1 — the better the quality
    of the synthetic data. It should, of course, be accompanied by a sanity check
    of the histograms.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 这个比率越接近 1 — 但不能超过 1 — 合成数据的质量就越好。当然，它应该伴随着直方图的合理性检查。
