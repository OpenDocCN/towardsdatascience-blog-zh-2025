- en: The Challenges and Realities of Being a Data Scientist
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/the-challenges-and-realities-of-being-a-data-scientist-47755feb3cfb/](https://towardsdatascience.com/the-challenges-and-realities-of-being-a-data-scientist-47755feb3cfb/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![Photo by Mohammad Rahmani on Unsplash](../Images/e37f99bd8f497a8f2ceb9dcd256923d4.png)'
  id: totrans-2
  prefs: []
  type: TYPE_IMG
- en: Photo by [Mohammad Rahmani](https://unsplash.com/@afgprogrammer?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: It may seem that being a data scientist is all sunshine and rainbows. High pay,
    great benefits, flexible hours, and enjoyable work are some things that come to
    mind when thinking about a data science job.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: While these are all true, every job has hidden struggles behind the scenes,
    and data science is no exception. Don’t get me wrong; it’s a fantastic job, and
    I absolutely love the field, but not every day is glorious, nor is the whole field
    perfect.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: That’s why, in this article, I want to explore several realities you must accept
    as a data scientist. Hopefully, this will help anyone reading this post who wants
    to be a data scientist decide if this field is really for them.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: Learning Hamster Wheel
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I have said this many times and will say it again, but you can’t learn everything
    in data science; it’s just too huge!
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
- en: Not to mention that new research is released every year, in fact, every month,
    propelling the field forward even more. Just check the [Machine Learning category
    on arXiv](https://arxiv.org/list/stat.ML/recent); there were 60 papers published
    on January 22nd!
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: This leads most data scientists to be on a hamster wheel of constantly learning
    and staying up to date. This is not a bad thing, but I have had times when it
    can feel exhausting, as you always feel behind.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: I’ve dedicated nearly four years to this field, and without sounding arrogant,
    I probably put in more hours than many other people, yet I still feel I have only
    scratched the surface. There so much left for me to learn, which I personally
    find exciting.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
- en: As I just said, if you like learning and keeping yourself sharp, this is not
    a bad thing. However, along with your other commitments, it can become unsustainable
    in the long term.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: One way to mitigate this is to specialise, which I have started to do with forecasting
    and optimisation. The problem is that I find everything interesting, so I want
    to learn everything!
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: If you enter data science, be prepared for lifelong learning and development.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: '*I have a separate article about how to specialise and the fields available
    to you.*'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: '[**How To Specialize In Data Science / Machine Learning**](https://contributor.insightmediagroup.io/how-to-specialize-in-data-science-machine-learning-9e62418bae09)'
  id: totrans-17
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Undefined Role
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Despite how ubiquitous data science may appear, the job is still unclear.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: It’s the classic situation where something is obvious to you but not apparent
    to others. We may know what data science is, but many other people – in fact,
    the majority of people – don’t.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: This means that data scientists don’t often have precise role requirements for
    their job. People will ask you questions ranging from getting data to setting
    business direction. Some people even think of you as just the general “tech guy.”
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: Again, all of this is not necessarily bad, as you learn a lot; however, it does
    lead to a lot of ambiguity in the title.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: 'In general, the pros and cons are:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: '**The good:**'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
- en: You learn a wide range of skills (data science, engineering, analytics, etc.)
    as people are unsure what tasks to give you.
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Define your own unique role at a company.
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This may lead to more responsibility as you are doing all things data.
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**The bad:**'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
- en: No specialist skillset as you are doing too many things and wearing many hats.
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Transitioning to other jobs might be more challenging as your current skills
    don’t meet their expectations.
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Lack of mentorship and risk of being mismanaged if no other data professional
    is at your company.
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This differs significantly from professions like accounting, law, or banking,
    where people are aware of clear job definitions, systems and specialisms.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
- en: There is no structured system for data science, which again is neither good
    nor bad, and it puts more responsibility on you to progress up the ranks. This
    can be seen as liberating but also quite daunting. So, it’s up to you if this
    sort of career suits you.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: Competitive Job Market
  id: totrans-34
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: It is evident that the job market for data science and tech in general is quite
    difficult at the moment. I have seen this first-hand with the number of messages
    I receive from people struggling to get a job.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: Once your foot is in the door, it is easier, but getting that entry position
    has become more challenging over the years.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
- en: You can no longer just do a certification or a couple of projects and get an
    internship or graduate position. You have to stand out and put in much more effort
    than before. You need to have an edge.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
- en: I wouldn’t worry too much if you *really* want to work in this field. With enough
    work and simply playing the odds, you will get a job. It just takes time, and
    you need to be patient.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
- en: However, if you are 50–50 about becoming a data scientist, then it’s unlikely
    you will stick out the numerous rejections required to get your first role. I
    know that may sound harsh, but I am just being brutally honest.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
- en: Additionally, even though it is easier once you are in the field, I have noticed
    that the competition is now much higher as data science matures and there are
    more seasoned practitioners.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
- en: There are data scientists now with 10 to 15 years of experience vying for the
    top positions. And unfortunately, experience is the trump card in most situations.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
- en: What this means is that the competition for top positions is getting even more
    complex, as it is already for entry positions. I foresee a world where the working
    hours and intensity will increase due to the pool size of qualified people.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
- en: Again, this means you will need to put in more work as you progress to stay
    sharp; you won’t be able to just cruise through.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
- en: Undefined Future
  id: totrans-44
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Data science has come a long way; however, there is no clear direction with
    all the advancements happening constantly. It literally changes every year.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
- en: Compared with fields like law, accounting, and banking, which do not often change
    much, tech space trends fluctuate almost every half year.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
- en: This makes it difficult to know precisely what to learn or where to aim for
    your career long term. The lack of structure and clear plan may bother people
    as there is a lot of uncertainty in your job.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
- en: This is especially true given the rise of GenAI over the last couple of years,
    which has caused people to fret quite a bit. Just look at what happened this last
    week with the release of [DeepSeek](https://www.deepseek.com/).
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
- en: The whole AI ecosystem has turned upside down, and there are great parallels
    with the space race in the 1950s and 1960s. This shows how quickly the field can
    change in a matter of days.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
- en: You can read more about DeepSeek and the stir it has caused [here](https://www.bbc.co.uk/news/articles/c5yv5976z9po).
  id: totrans-50
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Even though I don’t think AI at this stage will take over a data scientist’s
    job, there is space for some of our jobs to be automated.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
- en: 'I like Yann LeCun’s take on the current standing of LLM’s:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
- en: There is a risk that our job will disappear in 10 years, which is far from ideal.
    However, if this does happen, so will many other jobs.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
- en: Overall, data science is not a great option if you want stability and certainty
    in your career over the years.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
- en: Summary & Further Thoughts
  id: totrans-55
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Data science, machine learning, and AI are all interesting fields in today’s
    age. However, that interest does come at the price of uncertainty and a constantly
    changing landscape. What we define as “data science” continually changes as the
    field advances. As I said throughout this article, this is both exciting and scary.
    This field would suit you if you love learning new things and thrive with ambiguity.
    If you don’t like the uncertainty it brings, another job may better suit you.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
