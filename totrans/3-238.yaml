- en: Formulation of Feature Circuits with Sparse Autoencoders in LLM
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/formulation-of-feature-circuits-with-sparse-autoencoders-in-llm/](https://towardsdatascience.com/formulation-of-feature-circuits-with-sparse-autoencoders-in-llm/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Large Language models (LLMs) have witnessed impressive progress and these large
    models can do a variety of tasks, from generating human-like text to answering
    questions. However, understanding how these models work still remains challenging,
    especially due a phenomenon called superposition where features are mixed into
    one neuron, making it very difficult to extract human understandable representation
    from the original model structure. This is where methods like sparse Autoencoder
    appear to disentangle the features for interpretability.
  prefs: []
  type: TYPE_NORMAL
- en: In this blog post, we will use the Sparse Autoencoder to find some feature circuits
    on a particular interesting case of subject-verb agreement ,and understand how
    the model components contribute to the task.
  prefs: []
  type: TYPE_NORMAL
- en: Key concepts
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Feature circuits
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In the context of neural networks, **feature circuits** are how networks learn
    to combine input features to form complex patterns at higher levels. We use the
    metaphor of “circuits” to describe how features are processed along layers in
    a neural network because such processes remind us of circuits in electronics processing
    and combining signals.
  prefs: []
  type: TYPE_NORMAL
- en: These feature circuits form gradually through the connections between neurons
    and layers, where each neuron or layer is responsible for transforming input features,
    and their interactions lead to useful feature combinations that play together
    to make the final predictions.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here is one example of feature circuits: in lots of vision neural networks,
    we can find “a circuit as a family of units detecting curves in different angular
    orientations. Curve detectors are primarily implemented from earlier, less sophisticated
    curve detectors and line detectors. These curve detectors are used in the next
    layer to create 3D geometry and complex shape detectors” [1].'
  prefs: []
  type: TYPE_NORMAL
- en: In the coming chapter, we will work on one feature circuit in LLMs for a subject-verb
    agreement task.
  prefs: []
  type: TYPE_NORMAL
- en: Superposition and Sparse AutoEncoder
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In the context of machine learning, we have sometimes observed superposition,
    referring to the phenomenon that one neuron in a model represents multiple overlapping
    features rather than a single, distinct one. For example, InceptionV1 contains
    one neuron that responds to cat faces, fronts of cars, and cat legs.
  prefs: []
  type: TYPE_NORMAL
- en: This is where the sparse autoencoder (SAE) comes in.
  prefs: []
  type: TYPE_NORMAL
- en: The SAE helps us disentangle the network’s activations into a set of sparse
    features. These sparse features are normally human understandable,m allowing us
    to get a better understanding of the model. By applying an SAE to the hidden layers
    activations of an LLM mode, we can isolate the features that contribute to the
    model’s output.
  prefs: []
  type: TYPE_NORMAL
- en: You can find the details of how the SAE works in my former [blog post](https://medium.com/towards-data-science/sparse-autoencoder-from-superposition-to-interpretable-features-4764bb37927d).
  prefs: []
  type: TYPE_NORMAL
- en: 'Case study: Subject-Verb Agreement'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Subject-Verb Agreement
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Subject-verb agreement is a fundamental grammar rule in English. The subject
    and the verb in a sentence must be consistent in numbers, aka singular or plural.
    For example:'
  prefs: []
  type: TYPE_NORMAL
- en: “The cat **runs**.” (Singular subject, singular verb)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: “The cats **run**.” (Plural subject, plural verb)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Understanding this rule simple for humans is important for tasks like text generation,
    translation, and question answering. But how do we know if an LLM has actually
    learned this rule?
  prefs: []
  type: TYPE_NORMAL
- en: We will now explore in this chapter how the LLM forms a feature circuit for
    such a task.
  prefs: []
  type: TYPE_NORMAL
- en: Building the Feature Circuit
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Let’s now build the process of creating the feature circuit. We would do it
    in 4 steps:'
  prefs: []
  type: TYPE_NORMAL
- en: 'We start by inputting sentences into the model. For this case study, we consider
    sentences like:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: “The cat runs.” (singular subject)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: “The cats run.” (plural subject)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We run the model on these sentences to get hidden activations. These activations
    stand for how the model processes the sentences at each layer.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: We pass the activations to an SAE to “decompress” the features.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'We construct a feature circuit as a computational graph:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The input nodes represent the singular and plural sentences.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: The hidden nodes represent the model layers to process the input.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: The sparse nodes represent obtained features from the SAE.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The output node represents the final decision. In this case: runs or run.'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Toy Model
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We start by building a toy language model which might have no sense at all with
    the following code. This is a network with two simple layers.
  prefs: []
  type: TYPE_NORMAL
- en: 'For the subject-verb agreement, the model is supposed to:'
  prefs: []
  type: TYPE_NORMAL
- en: Input a sentence with either singular or plural verbs.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The hidden layer transforms such information into an abstract representation.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The model selects the correct verb form as output.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'It is unclear what happens inside the hidden layer. So we introduce the following
    sparse AutoEncoder:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: We train the original model `SubjectVerbAgreementNN` and the `SubjectVerbAgreementNN`
    with sentences designed to represent different singular and plural forms of verbs,
    such as “The cat runs”, “the babies run”. However, just like before, for the toy
    model, they may not have actual meanings.
  prefs: []
  type: TYPE_NORMAL
- en: 'Now we visualise the feature circuit. As introduced before, a feature circuit
    is a unit of neurons for processing specific features. In our model, the feature
    consists:'
  prefs: []
  type: TYPE_NORMAL
- en: The **hidden layer** transforming language properties into abstract representation..
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The **SAE** with **independent features** that contribute directly to the verb
    -subject agreement task.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![](../Images/3a0e7772258f7e89e7ec1244e47f9746.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Trained Feature Circuit: Singular vs. Plural (Dog/Dogs)'
  prefs: []
  type: TYPE_NORMAL
- en: 'You can see in the plot that we visualize the feature circuit as a graph:'
  prefs: []
  type: TYPE_NORMAL
- en: Hidden activations and the encoder’s outputs are all nodes of the graph.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We also have the output nodes as the correct verb.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Edges in the graph are weighted by activation strength, showing which pathways
    are most important in the subject-verb agreement decision. For example, you can
    see that the path from H3 to F2 plays an important role.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: GPT2-Small
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: For a real case, we run the similar code on GPT2-small. We show the graph of
    a feature circuit representing the decision to choose the singular verb.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/4ba1e4cab9f395ef14439b6ef2e2917e.png)'
  prefs: []
  type: TYPE_IMG
- en: Feature Circuit for Subject-Verb agreement (run/runs). For code details and
    a larger version of the above, please refer to my [notebook](https://colab.research.google.com/drive/1p50X-tTnUSA6wTxePkiiq_oTjhJftgFb#scrollTo=22HvXjpsKpw4).
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Feature circuits help us to understand how different parts in a complex LLM
    lead to a final output. We show the possibility to use an SAE to form a feature
    circuit for a subject-verb agreement task.
  prefs: []
  type: TYPE_NORMAL
- en: However, we have to admit this method still needs some human-level intervention
    in the sense that we don’t always know if a circuit can really form without a
    proper design.
  prefs: []
  type: TYPE_NORMAL
- en: Reference
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '[1] Zoom In: [An Introduction to Circuits](https://distill.pub/2020/circuits/zoom-in/)'
  prefs: []
  type: TYPE_NORMAL
