- en: 'Implementing the Fourier Transform Numerically in Python: A Step-by-Step Guide'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: Python中数值实现傅里叶变换：一步一步指南
- en: 原文：[https://towardsdatascience.com/implementing-the-fourier-transform-numerically-in-python-a-step-by-step-guide/](https://towardsdatascience.com/implementing-the-fourier-transform-numerically-in-python-a-step-by-step-guide/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/implementing-the-fourier-transform-numerically-in-python-a-step-by-step-guide/](https://towardsdatascience.com/implementing-the-fourier-transform-numerically-in-python-a-step-by-step-guide/)
- en: To get the most out of this paper, you should have a basic understanding of
    **integrals** and the **Fourier transform** and its properties.
  id: totrans-2
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 为了充分利用这篇论文，你应该对**积分**和**傅里叶变换**及其性质有一个基本的了解。
- en: If not, we recommend reading **Section 1**, where these ideas are reviewed.
  id: totrans-3
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果不熟悉，我们建议阅读**第1节**，其中回顾了这些概念。
- en: If you are already familiar with them, you can go directly to **Section 2**.
  id: totrans-4
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果你已经熟悉它们，你可以直接跳到**第2节**。
- en: ''
  id: totrans-5
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: In **Section 2.1**, we implement the **Fourier transform** using a **numerical
    quadrature method**.
  id: totrans-6
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在**第2.1节**中，我们使用**数值求积法**实现**傅里叶变换**。
- en: In **Section 2.2**, we implement it using the **Fast Fourier Transform (FFT)**
    algorithm and **Shannon’s interpolation formula**.
  id: totrans-7
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在**第2.2节**中，我们使用**快速傅里叶变换（FFT）算法**和**香农插值公式**来实现它。
- en: <mdspan datatext="el1761023602369" class="mdspan-comment">The idea for writing</mdspan>
    this paper came to us during our final year at engineering school.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1761023602369" class="mdspan-comment">这篇论文的写作想法是在我们工程学校最后一年的时候产生的。</mdspan>
- en: As part of a course on **stochastic process calibration**, our professor wanted
    to test our understanding of the material. To do so, we were asked to select an
    academic paper, study it in detail, and reproduce its results
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一门关于**随机过程校准**课程的组成部分，我们的教授想要测试我们对材料的理解。为此，我们被要求选择一篇学术论文，详细研究它，并重新生成其结果
- en: We chose the paper by **El Kolei (2013)**, which proposes a **parametric method**
    for estimating the parameters of a **stochastic volatility model**, such as the
    GARCH model. The approach is based on **contrast minimization** and **deconvolution**.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 我们选择了El Kolei (2013)的论文，该论文提出了一种**参数方法**来估计**随机波动模型**（如GARCH模型）的参数。该方法基于**对比最小化**和**反卷积**。
- en: 'To reproduce the results, we needed to implement an **optimization method**
    that involved computing the **Fourier transform** f̂ of the function f[θ]:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 为了重新生成结果，我们需要实现一种**优化方法**，该方法涉及计算函数f[θ]的**傅里叶变换** f̂：
- en: '![](../Images/baa43e1d54782866ff5409bc1b444112.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/baa43e1d54782866ff5409bc1b444112.png)'
- en: To compute the Fourier transform of f[θ], *El Kolei (2013)* used the **left
    Riemann sum** (also known as the rectangle quadrature) method implemented in MATLAB.
    The paper suggested that using the **Fast Fourier Transform (FFT)** algorithm
    could make the computation faster.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 为了计算f[θ]的傅里叶变换，*El Kolei (2013)*使用了**左黎曼和**（也称为矩形求积）方法，该方法在MATLAB中实现。论文建议使用**快速傅里叶变换（FFT）算法**可以使计算更快。
- en: We decided to reproduce the results using **Python** and implemented the Fourier
    transform to test if it truly improved computation speed.. Implementing the left
    rectangle quadrature method was simple, and at first, we thought that the `scipy.fft`
    and `numpy.fft` libraries would allow us to compute the Fourier transform of f[θ]
    directly using the FFT algorithm.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 我们决定使用**Python**重新生成结果，并实现了傅里叶变换来测试它是否真正提高了计算速度。实现左矩形求积法很简单，起初我们认为`scipy.fft`和`numpy.fft`库将允许我们直接使用FFT算法计算f[θ]的傅里叶变换。
- en: However, we quickly discovered that these functions do **not** compute the Fourier
    transform of a continuous function. Instead, they compute the **Discrete Fourier
    Transform (DFT)** of a finite sequence.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我们很快发现这些函数**不**计算连续函数的傅里叶变换。相反，它们计算有限序列的**离散傅里叶变换（DFT）**。
- en: The figure below shows what we observed.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的图显示了我们所观察到的。
- en: '[PRE0]'
  id: totrans-17
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '![](../Images/783c4ba66ae711bce19a8d20ec02e7dd.png)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/783c4ba66ae711bce19a8d20ec02e7dd.png)'
- en: 'This experience inspired us to write this article, where we will explain how
    to compute the Fourier transform of a function in Python using two approaches:
    the left Riemann sum method and the Fast Fourier Transform (FFT) algorithm.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 这次经历激励我们撰写这篇文章，我们将解释如何在Python中使用两种方法计算函数的傅里叶变换：左黎曼和法和快速傅里叶变换（FFT）算法。
- en: In the literature, many papers discuss how to approximate the Fourier transform
    and how to implement it using numerical methods.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 在文献中，许多论文讨论了如何近似傅里叶变换以及如何使用数值方法实现它。
- en: However, we did not find a source as clear and complete as **Balac (2011)**.
    This work presents a **quadrature-based approach** to compute the Fourier transform
    and explains how to use the **Fast Fourier Transform (FFT)** algorithm to perform
    the discrete Fourier transform efficiently.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我们没有找到像**Balac (2011**)那样清晰和完整的资料。这项工作提出了一种**基于求积法**的傅里叶变换计算方法，并解释了如何使用**快速傅里叶变换
    (FFT**)算法高效地执行离散傅里叶变换。
- en: The FFT algorithm can be applied both to compute the Fourier transform of an
    **integrable function** and to calculate the **Fourier coefficients** of a **periodic
    function**.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 快速傅里叶变换算法可以用来计算**可积函数**的傅里叶变换，也可以用来计算**周期函数**的傅里叶系数。
- en: 1\. Definition and Properties of the Fourier Transform
  id: totrans-23
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1. 傅里叶变换的定义和性质
- en: We adopt the framework presented by Balac (2011) to define the Fourier transform
    of a function f and to introduce its properties.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 我们采用Balac (2011)提出的框架来定义函数f的傅里叶变换及其性质。
- en: 'We consider functions that belong to the space of integrable functions, denoted
    **L¹(ℝ, 𝕂)**. This space includes all functions **f: ℝ → 𝕂**, where **𝕂** represents
    either the real numbers (ℝ) or the complex numbers (ℂ).'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: '我们考虑属于可积函数空间的函数，该空间用**L¹(ℝ, 𝕂**)表示。这个空间包括所有**f: ℝ → 𝕂**的函数，其中**𝕂**代表实数（ℝ）或复数（ℂ）。'
- en: These functions are integrable in the sense of Lebesgue, meaning that the integral
    of their absolute value is finite.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 这些函数在勒贝格意义上是可积的，这意味着它们的绝对值积分是有限的。
- en: '![](../Images/58f49a2d0d502a218922e5cabf60a3b9.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/58f49a2d0d502a218922e5cabf60a3b9.png)'
- en: So, for a function **f** to belong to **L¹(ℝ, 𝕂)**, the product **f(t) · e**^(–**2iπνt**)
    must also be integrable for all **ν ∈ ℝ**.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，为了使函数**f**属于**L¹(ℝ, 𝕂**)，函数**f(t) · e**^(–**2iπνt**)也必须在所有**ν ∈ ℝ**上可积。
- en: 'In that case, the **Fourier transform** of **f**, denoted **f̂** (or sometimes
    **𝓕(f)**), is defined for all **ν ∈ ℝ** by:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 在那种情况下，**f**的**傅里叶变换**，记为**f̂**（有时也记为**𝓕(f)**），对所有**ν ∈ ℝ**定义为：
- en: '![](../Images/618aa4d943dbf2c92583cbde97a4e626.png)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/618aa4d943dbf2c92583cbde97a4e626.png)'
- en: We note that the Fourier transform **f̂** of a function **f** is a complex-valued,
    linear function that depends on the frequency **ν**.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 我们注意到，函数**f**的傅里叶变换**f̂**是一个依赖于频率**ν**的复值线性函数。
- en: If **f ∈ L¹(ℝ)**, is real-valued and even, then **f̂** is also real-valued and
    even. Conversely, if **f** is real-valued and odd, then **f̂** is purely imaginary
    and odd as well.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 如果**f ∈ L¹(ℝ**)是实值且偶函数，那么**f̂**也是实值且偶函数。反之，如果**f**是实值且奇函数，那么**f̂**也是纯虚数且奇函数。
- en: For some functions, the Fourier transform can be computed analytically. For
    example, for the function
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 对于某些函数，其傅里叶变换可以通过解析方法计算。例如，对于函数
- en: '**f : t ∈ ℝ ↦ 𝟙 [**[−a⁄2, a⁄2]**](t)**,'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: '**f : t ∈ ℝ ↦ 𝟙 [**[−a⁄2, a⁄2]**](t)**,'
- en: 'The Fourier transform is given by:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 傅里叶变换表示为：
- en: '**f̂(ν) = a sinc(a π ν)**'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: '**f̂(ν) = a sinc(a π ν)**'
- en: '**where  is the sinc(t) = sin(t)/t or** **t ∈ ℝ**^***, and **sinc(0) = 0**.**'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: '**其中  是sinc(t) = sin(t)/t 或** **t ∈ ℝ**^***，且**sinc(0) = 0**。**'
- en: However, for many functions, the Fourier transform cannot be computed analytically.
    In such cases, we use numerical methods to approximate it. We explore these numerical
    approaches in the following sections of this article.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，对于许多函数，其傅里叶变换不能通过解析方法计算。在这种情况下，我们使用数值方法对其进行近似。我们将在本文的后续章节中探讨这些数值方法。
- en: 2\. How to numerically approximate the Fourier Transform?
  id: totrans-39
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2. 如何数值近似傅里叶变换？
- en: 'In his article, **Balac (2011)** shows that computing the Fourier transform
    of a function involves approximating it by the following integral over the interval
    **[−T⁄2, T⁄2]**:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 在他的文章中，**Balac (2011**)表明，计算函数的傅里叶变换涉及通过以下区间**[−T⁄2, T⁄2]**上的积分对其进行近似：
- en: '![](../Images/7a1ff1369b4cc47898ec8fdcc91f94e8.png)'
  id: totrans-41
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/7a1ff1369b4cc47898ec8fdcc91f94e8.png)'
- en: Where T is a sufficiently large number for the integral to converge.. An approximate
    value of the integral **S̃(ν)** can be computed using **quadrature methods**.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 其中T是一个足够大的数，使得积分收敛。可以使用**求积法**计算积分**S̃(ν**)的近似值。
- en: In the next section, we will approximate this integral using the **left rectangle
    quadrature method** (also known as the **left Riemann sum**).
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一节中，我们将使用**左矩形求积法**（也称为**左黎曼和**）来近似这个积分。
- en: 2.1 Quadrature method of left Rectangles
  id: totrans-44
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2.1 左矩形求积法
- en: 'To compute the integral **S̃(ν)** using the **left rectangle quadrature method**,
    we proceed as follows:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 使用**左矩形求积法**计算积分**S̃(ν**)的步骤如下：
- en: '**Discretization of the Interval**'
  id: totrans-46
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**区间的离散化**'
- en: We divide the interval **[−T⁄2, T⁄2]** into **N** uniform subintervals of length
    **h[t] = T⁄N**.
  id: totrans-47
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 我们将区间**[−T⁄2, T⁄2]**划分为**N**个长度为**h[t] = T⁄N**的均匀子区间。
- en: 'The discretization points, corresponding to the **left endpoints** of the rectangles,
    are defined as:'
  id: totrans-48
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 对应于矩形**左端点**的离散点定义为：
- en: '**t[k] = −T⁄2 + **h[t]**, for k = 0, 1, …, N−1.**'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: '**t[k] = −T⁄2 + **h[t]**, 对于 k = 0, 1, …, N−1。'
- en: '**Approximation of the Integral**'
  id: totrans-50
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**积分近似**'
- en: 'Using the **Chasles relation**, we approximate the integral **S̃(ν)** as follows:'
  id: totrans-51
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 使用**Chasles关系**，我们如下近似积分**S̃(ν)**：
- en: '![](../Images/068fc81856e73d7d8329e830781f8855.png)'
  id: totrans-52
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/068fc81856e73d7d8329e830781f8855.png)'
- en: 'Since **tₖ₊₁ − tₖ = hₜ** and **tₖ = −T⁄2 + k·hₜ = T(k⁄N − ½)**, the expression
    becomes:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 由于**tₖ₊₁ − tₖ = hₜ**和**tₖ = −T⁄2 + k·hₜ = T(k⁄N − ½)**，表达式变为：
- en: '![](../Images/c395df9e4878912139ddaad9d1d55259.png)'
  id: totrans-54
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c395df9e4878912139ddaad9d1d55259.png)'
- en: We refer to this approach as the left rectangle quadrature method because it
    utilizes the **left endpoint** ***tₖ*** of each subinterval to approximate the
    value of f(t) within that interval.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将这种方法称为左矩形求积法，因为它利用每个子区间的**左端点*****tₖ***来近似该区间内f(t)的值。
- en: '**Final Formula**'
  id: totrans-56
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**最终公式**'
- en: 'The final expression for approximating the Fourier transform is given by:'
  id: totrans-57
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 近似傅里叶变换的最终表达式如下：
- en: '![](../Images/56188eac20517e7b5c4cec4b0a721423.png)'
  id: totrans-58
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/56188eac20517e7b5c4cec4b0a721423.png)'
- en: 2.1.1 Implementation of the left rectangle quadrature method in Python.
  id: totrans-59
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.1.1 Python中左矩形求积法的实现。
- en: The function `tfquad` below implements the **left rectangle quadrature method** to
    compute the **Fourier transform** of a function `f` at a given frequency `nu`.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的函数`tfquad`实现了**左矩形求积法**来计算函数**f**在给定频率**nu**处的**傅里叶变换**。
- en: '[PRE1]'
  id: totrans-61
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: We can also use SciPy’s `quad` function to define the **Fourier transform** of
    a function `f` at a given frequency `nu`. The function `tf_integral` below implements
    this approach. It uses numerical integration to compute the Fourier transform
    of `f` over the interval [-T/2, T/2].
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还可以使用SciPy的`quad`函数来定义函数`f`在给定频率`nu`处的**傅里叶变换**。下面的`tf_integral`函数实现了这种方法。它使用数值积分来计算`f`在区间[-T/2,
    T/2]上的傅里叶变换。
- en: '[PRE2]'
  id: totrans-63
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: After deriving the formula for the left rectangle quadrature method, we can
    now **implement it in Python** to see how it performs in practice.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 在推导出左矩形求积法的公式后，我们现在可以在Python中**实现它**，以查看其在实际中的表现。
- en: 'To do this, we consider a simple example where the function fff is defined
    as an **indicator function** on the interval **[−1, 1]**:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 为了做到这一点，我们考虑一个简单的例子，其中函数fff定义为区间**[−1, 1]**上的**指示函数**：
- en: '![](../Images/41a28c48205bd8f9aeb9c92cf534cc28.png)'
  id: totrans-66
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/41a28c48205bd8f9aeb9c92cf534cc28.png)'
- en: For this function, the Fourier transform can be computed analytically, which
    allows us to **compare the numerical approximation** with the **exact result**.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这个函数，傅里叶变换可以解析计算，这允许我们**比较数值近似**与**精确结果**。
- en: 'The following Python script implements both the analytical Fourier transform
    and its numerical approximations using:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 以下Python脚本实现了解析傅里叶变换及其数值近似：
- en: the **left rectangle quadrature method**, and
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**左矩形求积法**，以及'
- en: '**SciPy’s integration** function for reference.'
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**SciPy的积分函数供参考**。'
- en: '[PRE3]'
  id: totrans-71
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '![](../Images/8a9410d77eb91a7b083a1d80bb1351de.png)'
  id: totrans-72
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/8a9410d77eb91a7b083a1d80bb1351de.png)'
- en: 2.1.2 Characterization of approximation using the left rectangle quadrature
    method
  id: totrans-73
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.1.2 使用左矩形求积法对近似进行表征
- en: The approximation of the Fourier transform  using the **left rectangle quadrature
    method** exhibits an **oscillatory behavior** by nature.
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用**左矩形求积法**对傅里叶变换的近似表现出固有的**振荡行为**。
- en: As noted by **Balac (2011)**, the Fourier transform **f̂** of a function **f**
    is inherently oscillatory. This behavior comes from the **complex exponential
    term** *e⁻²πiνt* in the integral definition of the transform.
  id: totrans-75
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 如Balac (2011) 所述，函数**f**的傅里叶变换**f̂**本质上具有振荡性。这种行为来自变换积分定义中的**复指数项** *e⁻²πiνt*。
- en: To illustrate this behavior, the figure below shows the function
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 为了说明这种行为，下面的图显示了函数
- en: '**f : t ∈ ℝ ↦ e^(-t^2) ∈ ℝ**'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: '**f : t ∈ ℝ ↦ e^(-t^2) ∈ ℝ**'
- en: together with the **real and imaginary parts** of its Fourier transform
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 与其傅里叶变换的**实部和虚部**一起
- en: '**f̂ : ν ∈ ℝ ↦ f̂(ν) ∈ ℂ**, evaluated at **ν = 5⁄2**.'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: '**f̂ : ν ∈ ℝ ↦ f̂(ν) ∈ ℂ**, 在**ν = 5⁄2**处评估。'
- en: Although **f(t)** is smooth, we can observe **strong oscillations** in **f̂(ν)**,
    which reveal the influence of the exponential term **e^(-2**πiνt**)** in the Fourier
    integral.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然**f(t)**是光滑的，但我们可以在**f̂(ν)**中观察到**强烈的振荡**，这揭示了指数项**e^(-2**πiνt**)**在傅里叶积分中的影响。
- en: '[PRE4]'
  id: totrans-81
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: '![](../Images/4a06bf0e4bb15724b1394fed6edafe41.png)'
  id: totrans-82
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/4a06bf0e4bb15724b1394fed6edafe41.png)'
- en: '**The approximation obtained using the left rectangle quadrature method is
    periodic in nature.**'
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**使用左矩形求积法获得的近似是周期性的**。'
- en: We observe that even if the function **f** is **not periodic**, its Fourier
    transform approximation **f̂** appears to be **periodic**.
  id: totrans-84
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 我们观察到，即使函数**f**不是周期性的，其傅里叶变换近似**f̂**看起来是**周期性的**。
- en: 'In fact, the function **Ŝₙ**, obtained from the quadrature method, is periodic
    with a period given by:'
  id: totrans-85
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 事实上，从求积法获得的函数**Ŝₙ**是周期性的，其周期由以下公式给出：
- en: '![](../Images/c6c038127ef7e761ae2c773a7f1da30e.png)'
  id: totrans-86
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/c6c038127ef7e761ae2c773a7f1da30e.png)'
- en: This periodicity of **Ŝₙ** implies that it is **not possible to compute the
    Fourier transform** for all frequencies **ν ∈ ℝ** using the quadrature method
    when the parameters **T** and **n** are fixed.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: '**Ŝₙ**的这种周期性意味着，当参数**T**和**n**固定时，使用求积法无法计算所有频率**ν ∈ ℝ**的傅里叶变换。'
- en: In fact, it becomes **impossible to compute f̂(ν)** accurately when
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，当
- en: '|ν| ≥ ν[max],'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: '|ν| ≥ ν[max],'
- en: where **v = n/T** represents the **maximum frequency** that can be resolved
    because of the periodic nature of **Ŝₙ**.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 其中**v = n/T**代表由于**Ŝₙ**的周期性而可以解析的最大**频率**。
- en: As a result, in practice, to compute the Fourier transform for larger frequencies,
    one must increase either the **time window (T)** or the **number of points (n)**.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，在实践中，为了计算更高频率的傅里叶变换，必须增加**时间窗口(T)**或**点数(n)**。
- en: 'Furthermore, by evaluating the error in approximating **f̂(ν)** using the **left
    rectangle quadrature method**, we can show that the approximation is reliable
    at frequency **ν** when the following condition holds:'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，通过评估使用**左矩形求积法**近似**f̂(ν)**时的误差，我们可以证明当以下条件成立时，近似在频率**ν**上是可靠的：
- en: '**|ν| ≪ n/T** or equivalently, **(|ν|T)/n ≪ 1.**'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: '**|ν| ≪ n/T**或等价地，**(|ν|T)/n ≪ 1**。'
- en: According to **Epstein (2005)**, when using the **Fast Fourier Transform (FFT)**
    algorithm, it is possible to accurately compute the Fourier transform of a function
    **f** for all frequencies **ν ∈ ℝ**, even when **(|ν|T)⁄n** is close to 1, provided
    that **f** is **piecewise continuous** and has **compact support**.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 根据**Epstein (2005)**，当使用**快速傅里叶变换(FFT)**算法时，可以准确地计算函数**f**的所有频率**ν ∈ ℝ**的傅里叶变换，即使**(|ν|T)⁄n**接近1，只要**f**是**分段连续的**并且具有**紧支集**。
- en: 2.2 Computing the Fourier Transform at Frequency ν Using the FFT Algorithm
  id: totrans-95
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.2 使用FFT算法计算频率ν处的傅里叶变换
- en: In this section, we denote by **Ŝₙ(ν)** the approximation of the Fourier transform
    **f̂(ν)** of the function **f** at a point **ν ∈ [−**ν[max]**/2, **ν[max]**/2]**,
    where **ν[max] = n/T**, that is,
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们用**Ŝₙ(ν)**表示函数**f**在点**ν ∈ [−**ν[max]**/2, **ν[max]**/2]**处的傅里叶变换**f̂(ν)**的近似，其中**ν[max]
    = n/T**，即，
- en: '![](../Images/bb7e95882f3ec2db77fbc61dd3a113d7.png)'
  id: totrans-97
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/bb7e95882f3ec2db77fbc61dd3a113d7.png)'
- en: I now present the **Fourier transform algorithm** used to approximate **f̂(ν)**.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 我现在介绍用于近似**f̂(ν)**的**傅里叶变换算法**。
- en: I will not go into the details of the **Fast Fourier Transform (FFT)** algorithm
    in this article.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 我不会在本篇文章中详细介绍**快速傅里叶变换(FFT)**算法。
- en: For a simplified explanation, I refer to **Balac (2011)**, and for a more technical
    and comprehensive treatment, to the **original work by Cooley and Tukey (1965)**.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 为了简化说明，我参考了**Balac (2011)**，而对于更技术性和全面的处理，我参考了**Cooley和Tukey (1965)**的原始工作。
- en: It is important to understand that the use of the **FFT algorithm** to approximate
    the Fourier transform of a function **f** is based on the result established by
    **Epstein (2005)**. This result states that when **Ŝₙ(ν)** is evaluated at the
    frequencies **v[j] = j/T**, for **j = 0, 1, …, n − 1**, it provides a good approximation
    of the continuous Fourier transform **f̂(ν)**.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 重要的是要理解，使用**FFT算法**来近似函数**f**的傅里叶变换是基于**Epstein (2005)**建立的结果。该结果指出，当**Ŝₙ(ν)**在频率**v[j]
    = j/T**处评估，对于**j = 0, 1, …, n − 1**，它提供了对连续傅里叶变换**f̂(ν)**的良好近似。
- en: Moreover, **Ŝₙ** is known to be **periodic**. This periodicity assigns a symmetric
    role to the indices **j ∈ {0, 1, …, n − 1}** and **k ∈ {−n/2, −n/2 + 1, …, −1}**.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，**Ŝₙ**已知是**周期性的**。这种周期性赋予索引**j ∈ {0, 1, …, n − 1}**和**k ∈ {−n/2, −n/2 + 1,
    …, −1}**对称的角色。
- en: 'In fact, the values of the Fourier transform of **f** over the interval ****[−**ν[max]**/2,
    **ν[max]**/2]**** can be derived from the values of **Ŝₙ** at the points **ν[j]
    = j/T**, for **j = 0, 1, …, n − 1**, as follows:'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，函数 f 在区间 ****[−**ν[max]**/2, **ν[max]**/2]**** 的傅里叶变换值可以从点 **ν[j] = j/T**
    处的 **Ŝₙ** 值推导出来，对于 **j = 0, 1, …, n − 1**，如下所示：
- en: '![](../Images/b675bd681c7768ff75faa1b5f0f1c734.png)'
  id: totrans-104
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/b675bd681c7768ff75faa1b5f0f1c734.png)'
- en: 'where we used the relation:'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 其中我们使用了关系：
- en: '![](../Images/19fec818e6595c476e06a7c42217b18c.png)'
  id: totrans-106
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/19fec818e6595c476e06a7c42217b18c.png)'
- en: This relationship shows that the Fourier transform **Ŝₙ(j/T)** can be computed
    for **j = −n⁄2, …, n⁄2 − 1.**
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 这种关系表明，对于 **j = −n⁄2, …, n⁄2 − 1**，可以计算傅里叶变换 **Ŝₙ(j/T)**。
- en: Moreover, when n is a power of two, the computation becomes significantly faster
    (see Balac, 2011). This process is known as the **Fast Fourier Transform (FFT)**.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，当 n 是 2 的幂时，计算变得显著更快（参见 Balac，2011）。这个过程被称为 **快速傅里叶变换 (FFT)**。
- en: 'To summarize, I have shown that the Fourier transform of the function **f**
    can be approximated over the interval **[−T⁄2, T⁄2]** at the frequencies **v[j]
    = j/T**, for **j = −n/2, …, n/2 − 1**, where **n = 2ᵐ** for some integer **m ≥
    0**, by applying the **Fast Fourier Transform (FFT)** algorithm as follows:'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，我已表明，通过应用 **快速傅里叶变换 (FFT)** 算法，可以在频率 **v[j] = j/T** 处，对于 **j = −n/2, …,
    n/2 − 1**，其中 **n = 2ᵐ** 为某个整数 **m ≥ 0**，在区间 **[−T⁄2, T⁄2]** 上对函数 **f** 的傅里叶变换进行近似。
- en: '**Step 1:** Construct the finite sequence **F** of values'
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**步骤 1**：构建值序列 **F** 的有限序列'
- en: '**f((2k − n)T/(2n))**, for **k = 0, 1, …, n − 1**.'
  id: totrans-111
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '**f((2k − n)T/(2n))**，对于 **k = 0, 1, …, n − 1**。'
- en: '**Step 2:** Compute the **discrete Fourier transform (DFT)** of the sequence
    **F** using the FFT algorithm, given by:'
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**步骤 2**：使用 FFT 算法计算序列 **F** 的 **离散傅里叶变换 (DFT)**，该算法如下所示：'
- en: '![](../Images/29e3b757a6c4cdb6da22077300ad0866.png)'
  id: totrans-113
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/29e3b757a6c4cdb6da22077300ad0866.png)'
- en: '**Step 3:** Reindex and symmetrize the values to span **j = −n/2, …, −1**.'
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**步骤 3**：重新索引并对称化值以覆盖 **j = −n/2, …, −1**。'
- en: '**Step 4:** Multiply each value in the array by **(T/n)(−1)**^(j-1), where
    **j ∈ {1, …, n}**.'
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**步骤 4**：将数组中的每个值乘以 **(T/n)(−1)**^(j-1)，其中 **j ∈ {1, …, n}**。'
- en: This process yields an array representing the values of the Fourier transform
    **f̂(νⱼ)**, with **ν[j] = j/T** for **j = −n⁄2, …, n⁄2 − 1**.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 此过程产生一个表示傅里叶变换值 **f̂(νⱼ)** 的数组，其中 **ν[j] = j/T** 对于 **j = −n⁄2, …, n⁄2 − 1**。
- en: The Python function `tffft` below implements these steps to compute the Fourier
    transform of a given function.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的 Python 函数 `tffft` 实现了这些步骤来计算给定函数的傅里叶变换。
- en: '[PRE5]'
  id: totrans-118
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: The following program illustrates how to compute the Fourier transform of the
    Gaussian function f(t) = e^(-10t^2) over the interval [-10, 10], using the Fast
    Fourier Transform (FFT) algorithm.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 以下程序说明了如何使用快速傅里叶变换 (FFT) 算法计算高斯函数 f(t) = e^(-10t^2) 在区间 [-10, 10] 上的傅里叶变换。
- en: '[PRE6]'
  id: totrans-120
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: '![](../Images/bc6359fe226426eee48d3b5bbc8e1ad6.png)'
  id: totrans-121
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/bc6359fe226426eee48d3b5bbc8e1ad6.png)'
- en: The method I just presented makes it possible to compute and visualize the Fourier
    transform of a function **f** at discrete points **v[j] = j/T**, for **j = −n/2,
    …, n/2 − 1**, where **n** is a power of two.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 我刚才介绍的方法使得能够在离散点 **v[j] = j/T** 处计算和可视化函数 **f** 的傅里叶变换，对于 **j = −n/2, …, n/2
    − 1**，其中 **n** 是 2 的幂。
- en: These points lie within the interval **[−n/(2T), n/(2T)]**.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 这些点位于区间 **[−n/(2T), n/(2T)]** 内。
- en: However, this method does not allow us to evaluate the Fourier transform at
    arbitrary frequencies **ν** that are not of the form **v[j] = j/T**.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，这种方法不允许我们在形式为 **v[j] = j/T** 的非任意频率 **ν** 处评估傅里叶变换。
- en: To compute the Fourier transform of a function **f** at a frequency **ν** that
    does not match one of the sampled frequencies **νⱼ**, interpolation methods can
    be used, such as **linear**, **polynomial**, or **spline interpolation**.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 要计算不匹配采样频率 **νⱼ** 的函数 **f** 在频率 **ν** 处的傅里叶变换，可以使用插值方法，例如 **线性**、**多项式**或 **样条插值**。
- en: In this article, we use the approach proposed by **Balac (2011)**, which relies
    on **Shannon’s interpolation theorem** to compute the Fourier transform of **f**
    at any frequency **ν**.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我们使用了 Balac (2011) 提出的方法，该方法依赖于 **香农插值定理** 来计算函数 f 在任何频率 **ν** 处的傅里叶变换。
- en: Using Shannon’s Interpolation Theorem to Compute the Fourier Transform of a
    Function f at a Point ν
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 使用香农插值定理计算函数 f 在点 ν 的傅里叶变换
- en: '**What does Shannon’s theorem tell us?**'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: '**香农定理告诉我们什么？**'
- en: It states that for a **band-limited function** *g* — that is, a function whose
    Fourier transform **ĝ** is zero outside the interval **[−B⁄2, B⁄2]** — the function
    *g* can be **reconstructed** from its samples **gₖ = g(k⁄B)** for **k ∈ ℤ**.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 它指出，对于**带限函数***g*（即其傅里叶变换**ĝ**在区间**[−B/2, B/2]**外为零的函数）——函数*g*可以从其样本**gₖ = g(k/B)**（对于**k
    ∈ ℤ**）中**重建**。
- en: If we let **ν**[c] be the smallest positive number such that **ĝ(ν)** is zero
    outside the interval **[−2π**ν**[c], 2π**ν**[c]]**, then the **Shannon interpolation
    formula** applies.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们让**ν**[c]是使得**ĝ(ν)**在区间**[−2πν[c], 2πν[c]]**外为零的最小正数，那么**香农插值公式**适用。
- en: 'For every **t ∈ ℝ**, and any positive real number **α ≥ 1/(2**ν**[c])**, we
    have:'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 对于每个**t ∈ ℝ**和任何正实数**α ≥ 1/(2ν[c])**，我们有：
- en: '![](../Images/c7e4043cb07ca1c3945ab992e4c94e11.png)'
  id: totrans-132
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c7e4043cb07ca1c3945ab992e4c94e11.png)'
- en: where **sinc(x) = sin(x)/x** is the **sinc function** (cardinal sine).
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 其中**sinc(x) = sin(x)/x**是**sinc函数**（卡丹辛函数）。
- en: Balac (2011) shows that when a function **f** has a **bounded support** in the
    interval **[−T⁄2, T⁄2]**, Shannon’s interpolation theorem can be used to compute
    its Fourier transform **f̂(ν)** for any **ν ∈ ℝ**.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: Balac (2011) 表明，当函数**f**在区间**[−T/2, T/2]**内具有**有界支撑**时，香农插值定理可以用来计算其傅里叶变换**f̂(ν)**，对于任何**ν
    ∈ ℝ**。
- en: This is done by using the values of the **discrete Fourier transform** **Ŝₙ(νⱼ)**
    for **j = −n/2, …, (n/2 − 1**).
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 这是通过使用**离散傅里叶变换**的值**Ŝₙ(νⱼ)**来完成的，对于**j = −n/2, …, (n/2 − 1**)。
- en: 'By setting **α = 1/T**, Balac derives the following **Shannon interpolation
    formula**, valid for all **ν ∈ ℝ**:'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将**α = 1/T**，Balac 推导出以下**香农插值公式**，适用于所有**ν ∈ ℝ**：
- en: '![](../Images/29ce95c234b3d6b98caaa5d2253c2162.png)'
  id: totrans-137
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/29ce95c234b3d6b98caaa5d2253c2162.png)'
- en: The following program illustrates how to use **Shannon’s interpolation theorem**
    to compute the **Fourier transform** of a function **f** at a given frequency
    **ν**.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 以下程序说明了如何使用**香农插值定理**来计算函数**f**在给定频率**ν**处的**傅里叶变换**。
- en: To compute the Fourier transform at any frequency ν, we can use **Shannon’s
    interpolation theorem**.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 要计算任何频率ν的傅里叶变换，我们可以使用**香农插值定理**。
- en: The idea is to estimate the value of the Fourier transform from its **discrete
    samples** obtained by the FFT.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 思想是从FFT获得的**离散样本**中估计傅里叶变换的值。
- en: The function below, `shannon`, implements this interpolation method in Python.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的函数`shannon`在Python中实现了这种插值方法。
- en: '[PRE7]'
  id: totrans-142
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: The next function, `fourier_at_nu`, combines two steps.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个函数`fourier_at_nu`结合了两个步骤。
- en: It first computes the discrete Fourier transform of a function using the FFT
    (`tffft`), then applies **Shannon interpolation** to estimate the Fourier transform
    at a specific frequency **ν**.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 它首先使用FFT（`tffft`）计算函数的离散傅里叶变换，然后应用**香农插值**来估计特定频率**ν**处的傅里叶变换。
- en: This makes it possible to evaluate the transform at any arbitrary point **ν**,
    not just at the FFT sampling frequencies.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 这使得可以在任何任意点**ν**处评估变换，而不仅仅是FFT采样频率。
- en: We can now test our implementation using a simple example.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在可以使用一个简单的例子来测试我们的实现。
- en: Here, we define a function **f(t) = e^(-a|t|)**, whose Fourier transform is
    known analytically.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 这里，我们定义一个函数**f(t) = e^(-a|t|)**，其傅里叶变换是解析已知的。
- en: This lets us compare the **exact** Fourier transform with the **approximation**
    obtained using our method.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 这使我们能够将**精确**傅里叶变换与使用我们的方法获得的**近似**值进行比较。
- en: '[PRE8]'
  id: totrans-149
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'We evaluate the Fourier transform at two frequencies: **ν = 3/T** and **ν =
    π/T**.'
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在两个频率处评估傅里叶变换：**ν = 3/T**和**ν = π/T**。
- en: For each case, we print both the **exact value** and the **approximation** obtained
    by our `fourier_at_nu` function.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 对于每种情况，我们打印出**精确值**和我们的`fourier_at_nu`函数获得的**近似值**。
- en: This comparison helps verify the accuracy of Shannon interpolation.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 这种比较有助于验证香农插值的准确性。
- en: '[PRE9]'
  id: totrans-153
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: '[PRE10]'
  id: totrans-154
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: It is worth noting that even though the frequency **3⁄T** (whose Fourier transform
    value appears in the FFT output) is close to **π⁄T**, the corresponding values
    of the Fourier transform of **f** at these two frequencies are quite different.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 值得注意的是，尽管频率**3/T**（其傅里叶变换值出现在FFT输出中）接近**π/T**，但这两个频率下**f**的傅里叶变换值相当不同。
- en: This shows that **Shannon’s interpolation formula** can be very useful when
    the desired Fourier transform values are **not directly included** among the results
    produced by the FFT algorithm.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 这表明，当所需的傅里叶变换值**没有直接包含**在FFT算法产生的结果中时，**香农插值公式**可以非常有用。
- en: Conclusion
  id: totrans-157
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this article, we explored two methods to approximate the Fourier transform
    of a function.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们探讨了两种近似函数傅里叶变换的方法。
- en: The first was a **numerical quadrature method** (the left rectangle rule), and
    the second was the **Fast Fourier Transform (FFT)** algorithm.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 第一种是**数值积分法**（左矩形法则），第二种是**快速傅里叶变换（FFT）算法**。
- en: We showed that, unlike the built-in `fft` functions in SciPy or NumPy, the FFT
    can be adapted to compute the Fourier transform of a continuous function through
    proper formulation.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 我们表明，与 SciPy 或 NumPy 中的内置 `fft` 函数不同，FFT 可以通过适当的公式化来适应计算连续函数的傅里叶变换。
- en: Our implementation was based on the work of **Balac (2013)**, who demonstrated
    how to reproduce the FFT computation in Python.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的实现基于**Balac (2013)**的工作，他展示了如何在 Python 中重现 FFT 计算。
- en: We also introduced **Shannon’s interpolation theorem**, which allows us to estimate
    the Fourier transform of any function on ℝ at arbitrary frequencies.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还介绍了**香农插值定理**，它允许我们在任意频率上估计任何函数在实数域上的傅里叶变换。
- en: This interpolation can be replaced by more traditional approaches such as **linear**
    or **spline interpolation** when appropriate.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 当适当的时候，这种插值可以被更传统的方法如**线性**或**样条插值**所替代。
- en: Finally, it is important to note that when the Fourier transform is required
    at a **single frequency**, it is often more efficient to compute it directly using
    a **numerical quadrature method**.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，值得注意的是，当需要计算**单个频率**的傅里叶变换时，通常更有效的方法是直接使用**数值积分法**来计算。
- en: Such methods are well suited to handle the oscillatory nature of the Fourier
    integral and can be more accurate than applying the FFT and then interpolating.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 这些方法非常适合处理傅里叶积分的振荡性质，并且可能比应用快速傅里叶变换（FFT）然后插值更准确。
