- en: 'Time Series Forecasting Made Simple (Part 2): Customizing Baseline Models'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 时间序列预测简单化（第2部分）：定制基线模型
- en: 原文：[https://towardsdatascience.com/time-series-forecasting-made-simple-part-2-customizing-baseline-models/](https://towardsdatascience.com/time-series-forecasting-made-simple-part-2-customizing-baseline-models/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/time-series-forecasting-made-simple-part-2-customizing-baseline-models/](https://towardsdatascience.com/time-series-forecasting-made-simple-part-2-customizing-baseline-models/)
- en: <mdspan datatext="el1746819645016" class="mdspan-comment">Thank</mdspan> you
    for the kind response to Part 1, it’s been encouraging to see so many readers
    interested in time series forecasting.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1746819645016" class="mdspan-comment">感谢</mdspan>您对第1部分的友好回应，看到这么多读者对时间序列预测感兴趣，我们感到鼓舞。
- en: In [**Part 1 of this series**](https://towardsdatascience.com/time-series-forecasting-made-simple-part-1-decomposition-baseline-models/),
    we broke down time series data into trend, seasonality, and noise, discussed when
    to use additive versus multiplicative models, and built a Seasonal Naive baseline
    forecast using Daily Temperature Data. We evaluated its performance using MAPE
    (Mean Absolute Percentage Error), which came out to 28.23%.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在[**本系列的第1部分**](https://towardsdatascience.com/time-series-forecasting-made-simple-part-1-decomposition-baseline-models/)中，我们将时间序列数据分解为趋势、季节性和噪声，讨论了何时使用加法模型与乘法模型，并使用每日温度数据构建了季节性简单基线预测。我们使用MAPE（平均绝对百分比误差）来评估其性能，结果为28.23%。
- en: While the Seasonal Naive model captured the broad seasonal pattern, we also
    saw that it may not be the best fit for this dataset, as it doesn’t account for
    subtle shifts in seasonality or long-term trends. This highlights the need to
    go beyond basic baselines and customize forecasting models to better reflect the
    underlying data for improved accuracy.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然季节性简单模型捕捉到了广泛的季节性模式，但我们还看到它可能不是这个数据集的最佳拟合，因为它没有考虑到季节性的微妙变化或长期趋势。这突出了超越基本基线并定制预测模型以更好地反映潜在数据以提高准确性的必要性。
- en: When we applied the Seasonal Naive baseline model, we didn’t account for the
    trend or use any mathematical formulas, we simply predicted each value based on
    the same day from the previous year.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们应用季节性简单基线模型时，我们没有考虑趋势或使用任何数学公式，我们只是根据前一年的同一天预测每个值。
- en: First, let’s take a look at the table below, which outlines some common baseline
    models and when to use each one.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们看一下下面的表格，它概述了一些常见的基线模型以及何时使用每个模型。
- en: '![](../Images/4403f653d3ffbdfe13460697a4d7d9bf.png)'
  id: totrans-7
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/4403f653d3ffbdfe13460697a4d7d9bf.png)'
- en: '**Table:** Common baseline forecasting models, their descriptions, and when
    to use each based on data patterns.'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: '**表格：常见的基线预测模型、它们的描述以及根据数据模式何时使用每个模型**。'
- en: These are some of the most commonly used baseline models across various industries.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是在各个行业中广泛使用的最常见的基线模型。
- en: But what if the data shows both **trend and seasonality**? In such cases, these
    simple baseline models might not be enough. As we saw in **Part 1**, the **Seasonal
    Naive model** struggled to fully capture the patterns in the data, resulting in
    a MAPE of **28.23%**.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 但如果数据显示了**趋势和季节性**呢？在这种情况下，这些简单的基线模型可能就不够了。正如我们在**第1部分**中看到的，**季节性简单模型**在完全捕捉数据模式方面遇到了困难，导致MAPE（平均绝对百分比误差）为**28.23%**。
- en: So, should we jump straight to **ARIMA** or another complex forecasting model?
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，我们应该直接跳到**ARIMA**或其他复杂预测模型吗？
- en: '**Not necessarily.**'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '**不一定**。'
- en: Before reaching for advanced tools, we can first build our baseline model based
    on the structure of the data. This helps us build a stronger benchmark — and often,
    it’s enough to decide whether a more sophisticated model is even needed.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 在寻求高级工具之前，我们首先可以根据数据结构构建我们的基线模型。这有助于我们建立一个更强的基准——而且通常，这足以决定是否需要更复杂的模型。
- en: Now that we have examined the structure of the data, which clearly includes
    both trend and seasonality, we can build a baseline model that takes both components
    into account.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经检查了数据结构，它明显包括趋势和季节性，我们可以构建一个考虑这两个成分的基线模型。
- en: In Part 1, we used the **seasonal decompose** method in Python to visualize
    the trend and seasonality in our data. Now, we’ll take this a step further by
    actually extracting the trend and seasonal components from that decomposition
    and using them to build a **baseline forecast**.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 在第1部分中，我们使用Python中的**季节分解**方法来可视化数据中的趋势和季节性。现在，我们将更进一步，实际上从这种分解中提取趋势和季节性成分，并使用它们来构建**基线预测**。
- en: '![](../Images/4d511b2ac2c3d074d9dbca49fe1a978a.png)'
  id: totrans-16
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/4d511b2ac2c3d074d9dbca49fe1a978a.png)'
- en: Decomposition of daily temperatures showing trend, seasonal cycles and random
    fluctuations.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 每日温度分解，显示趋势、季节周期和随机波动。
- en: But before we get started, let’s see how the seasonal decompose method figures
    out the trend and seasonality in our data.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 但在我们开始之前，让我们看看季节分解方法是如何确定我们的数据中的趋势和季节性的。
- en: Before using the built-in function, let’s take a small sample from our temperature
    data and manually go through how the seasonal_decompose method separates trend,
    seasonality and residuals.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 在使用内置函数之前，让我们从我们的温度数据中取一个小样本，并手动检查季节分解方法是如何分离趋势、季节性和残差的。
- en: This will help us understand what’s really happening behind the scenes.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 这将帮助我们理解幕后真正发生的事情。
- en: '![](../Images/157ed7613f82f1e261009fb300eac00e.png)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/157ed7613f82f1e261009fb300eac00e.png)'
- en: Sample from Temperatures Data
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 温度数据样本
- en: Here, we consider a 14-day sample from the temperature dataset to better understand
    how decomposition works step by step.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 这里，我们考虑从温度数据集中选取14天的样本，以更好地理解分解是如何一步一步进行的。
- en: 'We already know that this dataset follows an additive structure, which means
    each observed value is made up of three parts:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经知道这个数据集遵循加性结构，这意味着每个观测值由三个部分组成：
- en: Observed Value = Trend + Seasonality + Residual.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 观测值 = 趋势 + 季节性 + 残差。
- en: First, let’s look at how the trend is calculated for this sample.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们看看这个样本的趋势是如何计算的。
- en: We’ll use a 3-day centered moving average, which means each value is averaged
    with its immediate neighbor on both sides. This helps smooth out day-to-day variations
    in the data.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用3天中心移动平均，这意味着每个值与其两侧的邻近值平均。这有助于平滑数据中的日波动。
- en: 'For example, to calculate the trend for February 1, 1981:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，为了计算1981年2月1日的趋势：
- en: Trend = (20.7 + 17.9 + 18.8) / 3
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 趋势 = (20.7 + 17.9 + 18.8) / 3
- en: = 19.13
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: = 19.13
- en: This way, we calculate the trend component for all 14 days in the sample.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 这样，我们计算了样本中14天的趋势成分。
- en: '![](../Images/fd4ecd4352288edaea8e7f5010d64d12.png)'
  id: totrans-32
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/fd4ecd4352288edaea8e7f5010d64d12.png)'
- en: Here’s the table showing the 3-day centered moving average trend values for
    each day in our 14-day sample.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是表格，显示了14天样本中每一天的3天中心移动平均趋势值。
- en: As we can see, the trend values for the first and last dates are ‘NaN’ because
    there aren’t enough neighboring values to calculate a centered average at those
    points.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 如我们所见，第一和最后日期的趋势值是‘NaN’，因为在那些点没有足够的邻近值来计算中心平均。
- en: We’ll revisit those missing values once we finish computing the seasonality
    and residual components.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦我们计算完季节性和残差成分，我们将重新检查那些缺失的值。
- en: Before we dive into seasonality, there’s something we said earlier that we should
    come back to. We mentioned that using a 3-day centered moving average helps in
    smoothing out day to day variations in the data — but what does that really mean?
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们深入研究季节性之前，我们之前提到的一些事情我们应该回过头来。我们提到使用3天中心移动平均有助于平滑数据中的日波动——但这到底是什么意思呢？
- en: Let’s look at a quick example to make it clearer.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们通过一个快速示例来使其更清晰。
- en: We’ve already discussed that the trend reflects the overall direction the data
    is moving in.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经讨论过趋势反映了数据整体移动的方向。
- en: Temperatures are generally higher in summer and lower in winter, that’s the
    broad seasonal pattern we expect.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 温度通常在夏季较高，在冬季较低，这是我们预期的广泛季节性模式。
- en: But even within summer, temperatures don’t stay exactly the same every day.
    Some days might be slightly cooler or warmer than others. These are natural daily
    fluctuations, not signs of sudden climate shifts.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 但即使在夏季，温度也不会每天都完全相同。有些日子可能比其他日子稍微凉爽或温暖。这些都是自然的日波动，不是突然气候变化迹象。
- en: The moving average helps us smooth out these short-term ups and downs so we
    can focus on the bigger picture, the underlying trend across time.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 移动平均帮助我们平滑这些短期波动，这样我们就可以关注更大的图景，即时间上的潜在趋势。
- en: Since we’re working with a small sample here, the trend may not stand out clearly
    just yet.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们在这里使用的是小样本，趋势可能还没有明显突出。
- en: But if you look at the full decomposition plot above, you can see how the trend
    captures the overall direction the data is moving in, gradually rising, falling
    or staying steady over time.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 但如果你看上面的完整分解图，你可以看到趋势如何捕捉数据整体移动的方向，随着时间的推移逐渐上升、下降或保持稳定。
- en: 'Now that we’ve calculated the trend, it’s time to move on to the next component:
    seasonality.'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经计算了趋势，是时候继续到下一个组成部分：季节性。
- en: 'We know that in an additive model:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 我们知道在加性模型中：
- en: Observed Value = Trend + Seasonality + Residual
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 观测值 = 趋势 + 季节性 + 残差
- en: 'To isolate seasonality, we start by subtracting the trend from the observed
    values:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 为了隔离季节性，我们首先从观察值中减去趋势：
- en: Observed Value – Trend = Seasonality + Residual
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 观察值 - 趋势 = 季节性 + 剩余
- en: The result is known as the detrended series — a combination of the seasonal
    pattern and any remaining random noise.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 结果被称为去趋势序列——季节性模式和任何剩余的随机噪声的组合。
- en: Let’s take January 2, 1981 as an example.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 以1981年1月2日为例。
- en: 'Observed temperature: 17.9°C'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 观察到的温度：17.9°C
- en: 'Trend: 19.13°C'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 趋势：19.13°C
- en: 'So, the detrended value is:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，去趋势值是：
- en: Detrended = 17.9 – 19.1 = -1.23
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 去趋势 = 17.9 – 19.1 = -1.23
- en: In the same way, we calculate the detrended values for all the dates in our
    sample.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，我们计算样本中所有日期的去趋势值。
- en: '![](../Images/e7e3b583fdf81fc2bd56285de32dfba8.png)'
  id: totrans-56
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e7e3b583fdf81fc2bd56285de32dfba8.png)'
- en: The table above shows the detrended values for each date in our 14-day sample.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 上表显示了14天样本中每个日期的去趋势值。
- en: Since we’re working with 14 consecutive days, we’ll assume a weekly seasonality
    and assign a Day Index (from 1 to 7) to each date based on its position in that
    7-day cycle.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们正在处理14个连续的日期，我们将假设每周的季节性，并根据其在7天周期中的位置为每个日期分配一个日指数（从1到7）。
- en: '![](../Images/d5b372a698defc5c1f981f4883aee1c3.png)'
  id: totrans-59
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d5b372a698defc5c1f981f4883aee1c3.png)'
- en: Now, to estimate seasonality, we take the average of the detrended values that
    share the same Day Index.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，为了估计季节性，我们取具有相同日指数的去趋势值的平均值。
- en: Let’s calculate the seasonality for January 2, 1981\. The Day Index for this
    date is 2, and the other date in our sample with the same index is January 9,
    1981\. To estimate the seasonal effect for this index, we take the average of
    the detrended values from both days. This seasonal effect will then be assigned
    to every date with Index 2 in our cycle.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们计算1981年1月2日的季节性。这个日期的日指数是2，我们样本中具有相同指数的另一个日期是1981年1月9日。为了估计这个指数的季节性效应，我们取这两个日期去趋势值的平均值。这个季节性效应然后将分配给周期中具有指数2的每个日期。
- en: 'for January 2, 1981: Detrended value = -1.2 and'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 对于1981年1月2日：去趋势值 = -1.2，并且
- en: 'for January 9, 1981: Detrended value = 2.1'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 对于1981年1月9日：去趋势值 = 2.1
- en: Average of both values = (-1.2 + 2.1)/2
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 两个值的平均值 = (-1.2 + 2.1)/2
- en: = 0.45
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: = 0.45
- en: So, 0.45 is the estimated seasonality for all dates with Index 2.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，0.45是所有具有指数2的日期估计的季节性。
- en: We repeat this process for each index to calculate the full set of seasonality
    components.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 我们对每个指数重复此过程，以计算完整的一组季节性成分。
- en: '![](../Images/9636737c213fffea7ec791165b38d4d5.png)'
  id: totrans-68
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/9636737c213fffea7ec791165b38d4d5.png)'
- en: Here are the values of seasonality for all the dates and these seasonal values
    reflect the recurring pattern across the week. For example, days with Index 2
    tend to be around 0.45^oC warmer than the trend on average, while days with Index
    4 tend to be 1.05^oC cooler.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是所有日期的季节性值，这些季节性值反映了整个一周的重复模式。例如，指数为2的日期平均比趋势高约0.45°C，而指数为4的日期平均比趋势低1.05°C。
- en: '**Note**: When we say that days with Index 2 tend to be around +0.45°C warmer
    than the trend on average, we mean that dates like Jan 2 and Jan 9 tend to be
    about 0.45°C above their own trend value, not compared to the overall dataset
    trend, but to the local trend specific to each day.'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意**：当我们说指数为2的日期平均比趋势高约+0.45°C时，我们的意思是像1月2日和1月9日这样的日期通常比它们自己的趋势值高出约0.45°C，而不是与整体数据集的趋势相比，而是与每天特定的局部趋势相比。'
- en: 'Now that we’ve calculated the seasonal components for each day, you might notice
    something interesting: even the dates where the trend (and therefore detrended
    value) was missing, like the first and last dates in our sample — still received
    a seasonality value.'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经计算了每天的季节性成分，你可能会注意到一些有趣的事情：即使趋势（因此去趋势值）缺失的日期，例如我们样本中的第一个和最后一个日期——仍然收到了一个季节性值。
- en: This is because seasonality is assigned based on the Day Index, which follows
    a repeating cycle (like 1 to 7 in our weekly example).
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 这是因为季节性是根据日指数分配的，它遵循一个重复的周期（如我们每周示例中的1到7）。
- en: So, if January 1 has a missing trend but shares the same index as, say, January
    8, it inherits the same seasonal effect that was calculated using valid data from
    that index group.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，如果1月1日缺少趋势但与例如1月8日具有相同的指数，它将继承使用该指数组有效数据计算出的相同季节性效应。
- en: In other words, seasonality doesn’t depend on the availability of trend for
    that specific day, but rather on the pattern observed across all days with the
    same position in the cycle.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，季节性并不取决于特定日期趋势的可用性，而更多地取决于在整个周期中具有相同位置的日期观察到的模式。
- en: 'Now we calculate the residual, based on the additive decomposition structure
    we know that:'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们根据已知的加性分解结构来计算残差：
- en: Observed Value = Trend + Seasonality + Residual
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 观测值 = 趋势 + 季节性 + 残差
- en: '…which means:'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: …这意味着：
- en: Residual = Observed Value – Trend – Seasonality
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 残差 = 观测值 – 趋势 – 季节性
- en: You might be wondering, if the detrended values we used to calculate seasonality
    already had residuals in them, how can we separate them now? The answer comes
    from averaging. When we group the detrended values by their seasonal position,
    like Day Index, the random noise tends to cancel itself out. What we’re left with
    is the repeating seasonal signal. In small datasets this might not be very noticeable,
    but in larger datasets, the effect is much more clear. And now, with both trend
    and seasonality removed, what remains is the residual.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能想知道，如果我们用来计算季节性的去趋势值中已经包含了残差，我们如何现在还能将它们分离出来？答案来自于平均。当我们根据季节位置（如日索引）对去趋势值进行分组时，随机噪声往往会相互抵消。我们剩下的就是重复的季节性信号。在小数据集中，这可能不太明显，但在大数据集中，效果则更为明显。现在，在去除了趋势和季节性之后，剩下的就是残差。
- en: '![](../Images/59c235bd7309acd7f441356fed1a6784.png)'
  id: totrans-80
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/59c235bd7309acd7f441356fed1a6784.png)'
- en: We can observe that residuals are not calculated for the first and last dates,
    since the trend wasn’t available there due to the centered moving average.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以观察到，由于中心移动平均，第一和最后日期没有计算残差，因为那里没有可用趋势。
- en: Let’s take a look at the final decomposition table for our 14-day sample. This
    brings together the observed temperatures, the extracted trend and seasonality
    components, and the resulting residuals.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看一下我们14天样本的最终分解表。这个表汇集了观测温度、提取的趋势和季节性成分以及产生的残差。
- en: '![](../Images/625a3c61294d2c407713ad009e8439d2.png)'
  id: totrans-83
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/625a3c61294d2c407713ad009e8439d2.png)'
- en: Now that we’ve calculated the trend, seasonality, and residuals for our sample,
    let’s come back to the missing values we mentioned earlier. If you look at the
    decomposition plot for the full dataset, titled **“Decomposition of daily temperatures
    showing trend, seasonal cycles, and random fluctuations”**, you’ll notice that
    the trend line doesn’t appear right at the beginning of the series. The same applies
    to residuals. This happens because calculating the trend requires enough data
    before and after each point, so the first few and last few values don’t have a
    defined trend. That’s also why we see missing residuals at the edges. But in large
    datasets, these missing values make up only a small portion and don’t affect the
    overall interpretation. You can still clearly see the trend and patterns over
    time. In our small 14-day sample, these gaps feel more noticeable, but in real-world
    time series data, this is completely normal and expected.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经计算了样本的趋势、季节性和残差，让我们回到之前提到的缺失值。如果你查看整个数据集的分解图，标题为**“每日温度分解显示趋势、季节周期和随机波动”**，你会注意到趋势线并没有出现在序列的开始处。残差也是如此。这是因为计算趋势需要每个点前后足够的数据，所以前几个和最后几个值没有定义的趋势。这也是为什么我们在边缘看到缺失的残差。但在大数据集中，这些缺失值只占很小一部分，不会影响整体解释。你仍然可以清楚地看到趋势和随时间变化的模式。在我们的14天小样本中，这些缺口感觉更明显，但在现实世界的时序数据中，这是完全正常和预期的。
- en: Now that we’ve understood how seasonal_decompose works, let’s take a quick look
    at the code we used to apply it to the temperature data and extract the trend
    and seasonality components.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经了解了seasonal_decompose的工作原理，让我们快速看一下我们用来将其应用于温度数据并提取趋势和季节性成分的代码。
- en: '[PRE0]'
  id: totrans-86
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'Let’s focus on this part of the code:'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们关注这段代码：
- en: '`decomposition = seasonal_decompose(df[''Temp''], model=''additive'', period=365)`'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: '`decomposition = seasonal_decompose(df[''Temp''], model=''additive'', period=365)`'
- en: In this line, we’re telling the function what data to use (`df['Temp']`), which
    model to apply (`additive`), and the seasonal period to consider (`365`), which
    matches the yearly cycle in our daily temperature data.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 在这一行中，我们告诉函数使用什么数据（`df['Temp']`），应用什么模型（`additive`），以及考虑的季节周期（`365`），这与我们每日温度数据中的年周期相匹配。
- en: Here, we set `period=365` based on the structure of the data. This means the
    trend is calculated using a 365-day centered moving average, which takes 182 values
    before and after each point. The seasonality is calculated using a 365-day seasonal
    index, where all January 1st values across years are grouped and averaged, all
    January 2nd values are grouped, and so on.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们根据数据结构设置`period=365`。这意味着趋势是通过一个365天中心移动平均来计算的，每个点前后有182个值。季节性是通过365天的季节指数计算的，其中所有年份的1月1日值被分组并平均，所有1月2日值被分组，依此类推。
- en: When using `seasonal_decompose` in Python, we simply provide the `period`, and
    the function uses that value to determine how both the trend and seasonality should
    be calculated.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 当在Python中使用`seasonal_decompose`时，我们只需提供`period`，函数将使用该值来确定趋势和季节性应该如何计算。
- en: In our earlier 14-day sample, we used a 3-day centered average just to make
    the math more understandable — but the underlying logic remains the same.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们之前的14天样本中，我们使用3天中心平均只是为了使数学更易于理解——但底层逻辑保持不变。
- en: Now that we’ve explored how `seasonal_decompose` works and understood how it
    separates a time series into trend, seasonality, and residuals, we’re ready to
    build a baseline forecasting model.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经探讨了`seasonal_decompose`的工作原理，并理解了它是如何将时间序列分解为趋势、季节性和残差的，我们准备好构建一个基线预测模型。
- en: This model will be constructed by simply adding the extracted trend and seasonality
    components, essentially assuming that the residual (or noise) is zero.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 这个模型将通过简单地添加提取的趋势和季节性成分来构建，本质上假设残差（或噪声）为零。
- en: Once we generate these baseline forecasts, we’ll evaluate how well they perform
    by comparing them to the actual observed values using MAPE (Mean Absolute Percentage
    Error).
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦我们生成了这些基线预测，我们将通过使用MAPE（平均绝对百分比误差）将它们与实际观察值进行比较来评估它们的性能。
- en: Here, we’re ignoring the residuals because we’re building a simple baseline
    model that serves as a benchmark. The goal is to test whether more advanced algorithms
    are truly necessary.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们忽略残差，因为我们正在构建一个简单的基线模型，作为基准。目标是测试是否更高级的算法真正必要。
- en: We’re primarily interested in seeing how much of the variation in the data can
    be explained using just the trend and seasonality components.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 我们主要感兴趣的是看看数据中的多少变化可以用趋势和季节性成分来解释。
- en: Now we’ll build a baseline forecast by extracting the trend and seasonality
    components using Python’s `seasonal_decompose`.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们将使用Python的`seasonal_decompose`提取趋势和季节性成分来构建基线预测。
- en: '**Code:**'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: '**代码：**'
- en: '[PRE1]'
  id: totrans-100
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '![](../Images/621849c2869aa48b985a343e2a84ed03.png)'
  id: totrans-101
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/621849c2869aa48b985a343e2a84ed03.png)'
- en: In the code above, we first split the data by using the first 9 years as the
    training set and the final year as the test set.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 在上面的代码中，我们首先使用前9年作为训练集，最后一年作为测试集来分割数据。
- en: We then applied `seasonal_decompose` to the training data to extract the trend
    and seasonality components.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们将`seasonal_decompose`应用于训练数据以提取趋势和季节性成分。
- en: Since the seasonal pattern repeats every year, we took the last 365 seasonal
    values and applied them to the test period.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 由于季节性模式每年都会重复，我们取了最后365个季节性值并将其应用于测试期。
- en: For the trend, we assumed it remains constant and used the last observed trend
    value from the training set across all dates in the test year.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 对于趋势，我们假设它保持不变，并使用训练集中最后观察到的趋势值来覆盖测试年中的所有日期。
- en: Finally, we added the trend and seasonality components to build the baseline
    forecast, compared it with the actual values from the test set, and evaluated
    the model using Mean Absolute Percentage Error (MAPE).
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们将趋势和季节性成分添加到基线预测中，将其与测试集中的实际值进行比较，并使用平均绝对百分比误差（MAPE）评估模型。
- en: We got a MAPE of 21.21% with our baseline model. In Part 1, the seasonal naive
    approach gave us 28.23%, so we’ve improved by about 7%.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用基线模型得到了21.21%的MAPE（平均绝对百分比误差）。在第一部分，季节性简单方法给出了28.23%，所以我们提高了大约7%。
- en: What we’ve built here is not a custom baseline model — it’s a **standard decomposition-based
    baseline**.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在这里构建的不是一个定制的基线模型——它是一个**基于标准分解的基线**。
- en: Let’s now see how we can come up with our own custom baseline for this temperature
    data.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们来看看我们如何为这些温度数据制定自己的基线。
- en: Now let’s consider the average of temperatures grouped by each day and using
    them forecast the temperatures for final year.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们考虑按每天分组平均温度，并使用它们预测最后一年的温度。
- en: You might be wondering how we even come up with that idea for a custom baseline
    in the first place. Honestly, it starts by simply looking at the data. If we can
    spot a pattern, like a seasonal trend or something that repeats over time, we
    can build a simple rule around it.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能想知道我们最初是如何想出这个自定义基线的主意的。坦白说，这始于简单地查看数据。如果我们能发现一个模式，比如季节性趋势或随时间重复的东西，我们就可以围绕它建立一个简单的规则。
- en: That’s really what a custom baseline is about — using what we understand from
    the data to make a reasonable prediction. And often, even small, intuitive ideas
    can work surprisingly well.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 这正是自定义基线的本质——利用我们从数据中理解的内容来做出合理的预测。而且，通常，即使是小而直观的想法也能出奇地有效。
- en: Now let’s use Python to calculate the average temperature for each day of the
    year.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们用Python计算一年中每一天的平均温度。
- en: '**Code:**'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: '**代码：**'
- en: '[PRE2]'
  id: totrans-115
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: To build this custom baseline, we looked at how the temperature typically behaves
    on each day of the year, averaging across all the training years. Then, we used
    those daily averages to make predictions for the test set. It’s a simple way to
    capture the seasonal pattern that tends to repeat every year.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 为了构建这个自定义基线，我们观察了温度在一年中每一天的典型行为，并在所有训练年份中取平均值。然后，我们使用这些日平均值对测试集进行预测。这是一种简单的方法来捕捉每年都倾向于重复的季节性模式。
- en: This custom baseline gave us a MAPE of 21.17%, which shows how well it captures
    the seasonal trend in the data.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 这个自定义基线给我们带来了21.17%的MAPE，这显示了它如何很好地捕捉数据中的季节性趋势。
- en: Now, let’s see if we can build another custom baseline that captures patterns
    in the data more effectively and serves as a stronger benchmark.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们看看我们是否可以构建另一个自定义基线，它能更有效地捕捉数据中的模式，并作为一个更强的基准。
- en: Now that we’ve used the day-of-year average method for our first custom baseline,
    you might start wondering what happens in leap years. If we simply number the
    days from 1 to 365 and take the average, we could end up misled, especially around
    February 29.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经使用了日历年平均方法来构建我们的第一个自定义基线，你可能会想知道闰年会发生什么。如果我们简单地从1到365编号天数并取平均值，我们可能会被误导，尤其是在2月29日附近。
- en: You might be wondering if a single date really matters. In time series analysis,
    every moment counts. It may not feel that important right now since we’re working
    with a simple dataset, but in real-world situations, small details like this can
    have a big impact. Many industries pay close attention to these patterns, and
    even a one-day difference can affect decisions. That’s why we’re starting with
    a simple dataset, to help us understand these ideas clearly before applying them
    to more complex problems.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能想知道一个单独的日期是否真的重要。在时间序列分析中，每一刻都很重要。现在我们处理的是一个简单的数据集，所以可能感觉不那么重要，但在现实世界的情况下，像这样的小细节可能有很大的影响。许多行业都密切关注这些模式，甚至一天的差异都可能影响决策。这就是为什么我们从一个简单的数据集开始，帮助我们清楚地理解这些想法，然后再将它们应用到更复杂的问题上。
- en: Now let’s build a custom baseline using calendar-day averages by looking at
    how the temperature usually behaves on each (month, day) across years.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们通过观察每年每个月每一天的温度通常是如何变化的，来构建一个基于日历日的自定义基线。
- en: It’s a simple way to capture the seasonal rhythm of the year based on the actual
    calendar.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一种基于实际日历的季节节奏的简单捕捉方法。
- en: '**Code:**'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: '**代码：**'
- en: '[PRE3]'
  id: totrans-124
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Using this method, we achieved a MAPE of 21.09%.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 使用这种方法，我们实现了21.09%的MAPE。
- en: Now let’s see if we can combine two methods to build a more refined custom baseline.
    We have already created a calendar-based month-day average baseline. This time
    we will blend it with the previous day’s actual temperature. The forecasted value
    will be based 70 percent on the calendar day average and 30 percent on the previous
    day’s temperature, creating a more balanced and adaptive prediction.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们来看一下我们是否可以将两种方法结合起来，构建一个更精细的自定义基线。我们已经创建了一个基于日历的月日平均基线。这次我们将它与前一天的实际温度混合。预测值将基于日历日平均的70%和前一天温度的30%，从而创建一个更平衡和适应性强的预测。
- en: '[PRE4]'
  id: totrans-127
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: We can call this a blended custom baseline model. Using this approach, we achieved
    a MAPE of 18.73%.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以称这个为混合自定义基线模型。使用这种方法，我们实现了18.73%的MAPE。
- en: Let’s take a moment to summarize what we’ve applied to this dataset so far using
    a simple table.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们花点时间总结一下到目前为止我们在这个数据集上应用了什么，用一个简单的表格来表示。
- en: '![](../Images/8a1459fffac31af2326285e55bbb9583.png)'
  id: totrans-130
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/8a1459fffac31af2326285e55bbb9583.png)'
- en: In Part 1, we used the seasonal naive method as our baseline. In this blog,
    we explored how the `seasonal_decompose` function in Python works and built a
    baseline model by extracting its trend and seasonality components. We then created
    our first custom baseline using a simple idea based on the day of the year and
    later improved it by using calendar day averages. Finally, we built a blended
    custom baseline by combining the calendar average with the previous day’s temperature,
    which led to even better forecasting results.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 在第一部分，我们使用季节性天真法作为我们的基线。在本篇博客中，我们探讨了Python中的`seasonal_decompose`函数是如何工作的，并通过提取其趋势和季节性成分来构建基线模型。然后，我们基于年份的日数提出一个简单想法，创建了我们的第一个自定义基线，并通过使用日历日平均值对其进行改进。最后，我们通过结合日历平均值和前一天的温度，构建了一个混合自定义基线，这导致了更好的预测结果。
- en: In this blog, we used a simple daily temperature dataset to understand how custom
    baseline models work. Since it’s a univariate dataset, it contains only a time
    column and a target variable. However, real-world time series data is often much
    more complex and typically multivariate, with multiple influencing factors. Before
    we explore how to build custom baselines for such complex datasets, we need to
    understand another important decomposition method called STL decomposition. We
    also need a solid grasp of univariate forecasting models like ARIMA and SARIMA.
    These models are essential because they form the foundation for understanding
    and building more advanced multivariate time series models.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 在本篇博客中，我们使用了一个简单的每日气温数据集来了解自定义基线模型是如何工作的。由于它是一个单变量数据集，它只包含一个时间列和一个目标变量。然而，现实世界的时间序列数据通常要复杂得多，通常是多变量的，具有多个影响因素。在我们探讨如何为这样的复杂数据集构建自定义基线之前，我们需要了解另一种重要的分解方法，即STL分解。我们还需要对单变量预测模型如ARIMA和SARIMA有一个稳固的理解。这些模型是基础，因为它们构成了理解和构建更高级的多变量时间序列模型的基础。
- en: In Part 1, I mentioned that we would explore the foundations of ARIMA in this
    part as well. However, as I’m also learning and wanted to keep things focused
    and digestible, I wasn’t able to fit everything into one blog. To make the learning
    process smoother, we’ll take it one topic at a time.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 在第一部分，我提到我们将在本部分探讨ARIMA的基础。然而，由于我也在学习，并希望保持内容集中和易于理解，我无法将所有内容都放入一篇博客中。为了使学习过程更加顺畅，我们将一次探讨一个主题。
- en: In Part 3, we’ll explore STL decomposition and continue building on what we’ve
    learned so far.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 在第三部分，我们将探讨STL分解，并继续构建我们迄今为止所学的内容。
