- en: 'How to Use Frontier Vision LLMs: Qwen3-VL'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何使用前沿视觉LLMs：Qwen3-VL
- en: 原文：[https://towardsdatascience.com/how-to-use-frontier-vision-llms-qwen-3-vl-2/](https://towardsdatascience.com/how-to-use-frontier-vision-llms-qwen-3-vl-2/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/how-to-use-frontier-vision-llms-qwen-3-vl-2/](https://towardsdatascience.com/how-to-use-frontier-vision-llms-qwen-3-vl-2/)
- en: <mdspan datatext="el1760993146807" class="mdspan-comment">Vision language models</mdspan>
    (VLMs) are powerful models capable of inputting both images and text, and responding
    with text. This allows us to perform visual information extraction on documents
    and images. In this article, I’ll discuss the newly released Qwen 3 VL, and the
    powerful capabilities VLMs possess.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1760993146807" class="mdspan-comment">视觉语言模型</mdspan> (VLMs)
    是强大的模型，能够输入图像和文本，并以文本形式响应。这使得我们能够在文档和图像上执行视觉信息提取。在这篇文章中，我将讨论新发布的Qwen 3 VL，以及VLMs所拥有的强大能力。
- en: Qwen 3 VL was released a few weeks ago, initially with the 235B-A22B model,
    which is quite a large model. They then released the 30B-A3B, and just now released
    the dense 4B and 8B versions. My goal for this article is to highlight the capabilities
    of vision language models and inform you of their capabilities on a high level.
    I’ll use Qwen 3 VL as a specific example in this article, though there are many
    other high-quality VLMs available. I’m not affiliated in any way with Qwen when
    writing this article.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: Qwen 3 VL几周前发布，最初是235B-A22B模型，这是一个相当大的模型。然后他们发布了30B-A3B，现在刚刚发布了密集的4B和8B版本。我的目标是这篇文章要突出视觉语言模型的能力，并在高层次上通知你它们的性能。虽然有许多其他高质量的VLMs可用，但我在这篇文章中写Qwen
    3 VL作为具体例子。我写这篇文章时，与Qwen没有任何关联。
- en: '![](../Images/0fc6f0ded73709c8fbb7e03450d76bc5.png)'
  id: totrans-4
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/0fc6f0ded73709c8fbb7e03450d76bc5.png)'
- en: This infographic covers the main topics of this article. I’ll discuss vision
    language models, and how they are in many scenarios better than using OCR + LLMs
    to understand documents. Furthermore, I’ll discuss using VLMs for OCR, and information
    extraction with Qwen 3 VL, and finally I’ll discuss some downsides of VLMs. Image
    by ChatGPT.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 这张信息图涵盖了这篇文章的主要主题。我将讨论视觉语言模型，以及它们在许多情况下比使用OCR + LLMs理解文档更好的情况。此外，我将讨论使用VLMs进行OCR，以及使用Qwen
    3 VL进行信息提取，最后我将讨论VLMs的一些缺点。图片由ChatGPT提供。
- en: Why do we need vision language models
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么我们需要视觉语言模型
- en: 'Vision language models are necessary because the alternative is to instead
    rely on OCR and feed the OCR-ed text into an LLM. This has several issues:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 视觉语言模型是必要的，因为替代方案是依赖OCR并将OCR文本输入到LLM中。这有几个问题：
- en: OCR isn’t perfect, and the LLM will have to deal with imperfect text extraction
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: OCR并不完美，LLM将不得不处理不完美的文本提取
- en: You lose the information contained in the visual position of the text
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你会失去文本视觉位置中的信息
- en: Traditional OCR engines like Tesseract have long been super important to document
    processing. OCR has allowed us to input images and extract the text from them,
    enabling further processing of the contents of the document. However, traditional
    OCR is far from perfect, and it may struggle with issues like small text, skewed
    images, vertical text, and so on. If you have poor OCR output, you’ll struggle
    with all downstream tasks, whether you’re using regex or an LLM. Feeding images
    directly to VLMs, instead of OCR-ed text to LLMs, is thus far more effective in
    utilizing information.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 传统的OCR引擎，如Tesseract，长期以来对文档处理至关重要。OCR使我们能够输入图像并从中提取文本，从而能够进一步处理文档的内容。然而，传统的OCR远非完美，它可能难以处理小文本、倾斜的图像、垂直文本等问题。如果你有糟糕的OCR输出，你将难以完成所有下游任务，无论你是在使用正则表达式还是LLM。因此，直接将图像输入到VLMs中，而不是将OCR文本输入到LLMs中，在利用信息方面要有效得多。
- en: The visual position of text is sometimes critical to understanding the meaning
    of the text. Imagine the example in the image below, where you have checkboxes
    highlighting which text is relevant, where some checkboxes are ticked off, and
    some are not. You might then have some text corresponding to each checkbox, where
    only the text beside the ticked-off checkbox is relevant. Extracting this information
    using OCR + LLMs is challenging, because you can’t know which text the ticked
    checkbox belongs to. However, solving this task using vision language models is
    trivial.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 文本的视觉位置有时对理解文本的意义至关重要。想象一下下面的例子，其中有一些复选框突出显示哪些文本是相关的，其中一些复选框被勾选，而另一些则没有被勾选。然后你可能有一些与每个复选框对应的文本，其中只有勾选的复选框旁边的文本是相关的。使用OCR
    + LLMs提取这些信息具有挑战性，因为你不知道勾选的复选框属于哪个文本。然而，使用视觉语言模型解决这个任务是非常简单的。
- en: '![](../Images/6bc3285b267d7d12678109c0ad162882.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6bc3285b267d7d12678109c0ad162882.png)'
- en: This example highlights a situation where vision language models are required.
    If you simply OCR the text, you’ll lose the visual position of the ticked off
    checkboxes, and it’s thus challenging to know which of the three documents is
    relevant. Solving this task using a vision language model, however, is simple.
    Image by the author.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 这个例子突出了一个需要视觉语言模型的情况。如果你只是对文本进行OCR，你会失去勾选框的视觉位置，因此很难知道哪三个文档是相关的。然而，使用视觉语言模型解决这个任务却很简单。图片由作者提供。
- en: 'I fed the image above to Qwen 3 VL, and it replied with the response shown
    below:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 我将上面的图片输入到Qwen 3 VL中，它回复了以下所示的内容：
- en: '[PRE0]'
  id: totrans-15
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: As you can see, Qwen 3 VL easily solved the problem correctly.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 如你所见，Qwen 3 VL轻松地正确解决了这个问题。
- en: '* * *'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Another reason we need VLMs is that we also get video understanding. Truly understanding
    video clips would be immensely challenging using OCR, as a lot of the information
    in videos is not displayed with text, but rather shown as an image directly. OCR
    is thus not effective. However, the new generation of VLMs allows you to input
    hundreds of images, for example, representing a video, allowing you to perform
    video understanding tasks.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要VLMs的另一个原因是我们可以获得视频理解。真正理解视频剪辑会非常具有挑战性，因为视频中的许多信息不是以文本形式显示，而是直接以图像形式展示。因此，OCR并不有效。然而，新一代的VLMs允许你输入数百张图片，例如，代表一个视频，让你能够执行视频理解任务。
- en: Vision language model tasks
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 视觉语言模型任务
- en: There are many tasks you can apply vision language models to. I’ll discuss a
    few of the most relevant tasks.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以将视觉语言模型应用于许多任务。我将讨论一些最相关的任务。
- en: OCR
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: OCR
- en: Information extraction
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 信息提取
- en: The data
  id: totrans-23
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数据
- en: I’ll use the image below as an example image for my testing.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 我会使用下面的图片作为测试的示例图片。
- en: '![](../Images/7b21563683d50447accd4ece4e7e7691.png)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7b21563683d50447accd4ece4e7e7691.png)'
- en: I’ll use this image for my testing of Qwen 3 VL. The image is an openly available
    document from the planning authority of Oslo Municipality in Norway (“Plan og
    bygningsetaten”). Im using this image as it is an example of a real document you
    might want to apply a vision language model to. Note that I’ve cropped the image,
    as it originally contained a drawing as well. Unfortunately, my local computer
    is not powerful enough to process that large an image, so I decided to crop it.
    This allows me to run the image through Qwen 3 VL with high resolution. The image
    has a resolution of (768, 136), which is enough in this instance to perform OCR.
    It was cropped from a JPG, fetched from a PDF with 600 DPI.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 我会使用这张图片来测试Qwen 3 VL。这张图片是来自挪威奥斯陆市政府规划部门的公开文档。我使用这张图片，因为它是一个你可能想要应用视觉语言模型的实际文档的例子。请注意，我已经裁剪了图片，因为原始图片中包含了一张图纸。不幸的是，我的本地电脑处理不了这么大的图片，所以我决定裁剪它。这让我能够以高分辨率运行图片通过Qwen
    3 VL。这张图片的分辨率为（768, 136），在这个例子中足够用于OCR。它是从600 DPI的PDF中裁剪的JPG图片中获取的。
- en: I’ll use this image because it’s an example of a real document, very relevant
    to apply Qwen 3 VL on. Furthermore, I’ve cropped the image to its current shape,
    so that I can feed the image with a high resolution into Qwen 3 VL on my local
    computer. Maintaining a high resolution is critical if you want to perform OCR
    on the image. I have extracted the JPG from a PDF using 600 DPI. Normally, 300
    DPI is enough for OCR, but I kept a higher DPI just to be sure, which works in
    this small image.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 我会使用这张图片，因为它是一个真实文档的例子，非常适合应用Qwen 3 VL。此外，我已经裁剪了图片到当前形状，这样我就可以将高分辨率的图片输入到我的本地电脑上的Qwen
    3 VL中。如果你想在图片上执行OCR，保持高分辨率是至关重要的。我是使用600 DPI从PDF中提取的JPG。通常，300 DPI就足够用于OCR，但我保留了更高的DPI以确保，这在小图片中效果很好。
- en: Prepare Qwen 3 VL
  id: totrans-28
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 准备Qwen 3 VL
- en: 'I need the following imports to run Qwen 3 VL:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 我需要以下导入来运行Qwen 3 VL：
- en: '[PRE1]'
  id: totrans-30
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: You need to install Transformers from source (GitHub), as Qwen 3 VL is not yet
    available in the latest Transformers version.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要从源代码（GitHub）安装Transformers，因为Qwen 3 VL在最新的Transformers版本中尚未提供。
- en: 'The following code loads the imports, model, and processor, and creates an
    inference function:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 以下代码加载了导入、模型和处理器，并创建了一个推理函数：
- en: '[PRE2]'
  id: totrans-33
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: OCR
  id: totrans-34
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: OCR
- en: OCR is a task that most VLMs are trained for. You can for example read the technical
    reports of the Qwen VL models, where they mention how OCR data is a part of the
    training set. To train VLMs to perform OCR they give the model a series of images,
    and the text contained in those images. The model then learns to extract the text
    from the images.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: OCR是一项大多数VLMs都训练的任务。例如，你可以阅读Qwen VL模型的报告，其中他们提到OCR数据是训练集的一部分。为了训练VLMs执行OCR，他们给模型一系列图像和这些图像中的文本。然后模型学习从图像中提取文本。
- en: I’ll apply OCR to the image with the prompt below, which is the same prompt
    the Qwen team uses to perform OCR according to the [Qwen 3 VL cookbook](https://github.com/QwenLM/Qwen3-VL/blob/main/cookbooks/ocr.ipynb).
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 我将使用以下提示对图像进行OCR，这个提示与Qwen团队用于执行OCR的[Qwen 3 VL食谱](https://github.com/QwenLM/Qwen3-VL/blob/main/cookbooks/ocr.ipynb)相同。
- en: '[PRE3]'
  id: totrans-37
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Now I’ll run the model. I called the test image we’re running on, for *example-doc-site-plan-cropped.jpg*
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我将运行模型。我们正在运行的测试图像我命名为*example-doc-site-plan-cropped.jpg*
- en: '[PRE4]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'Which outputs:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 输出如下：
- en: '[PRE5]'
  id: totrans-41
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: This output is from my testing, completely correct, and covers all the text
    in the image, and extracts all correct characters.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 这个输出来自我的测试，完全正确，覆盖了图像中的所有文本，并提取了所有正确的字符。
- en: Information extraction
  id: totrans-43
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 信息提取
- en: 'You can also perform information extraction using vision language models. This
    can, for example, be used to extract important metadata from images. You typically
    also want to extract this metadata into a JSON format, so it’s easily parsable
    and can be used for downstream tasks. In this example, I’ll extract:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 你也可以使用视觉语言模型进行信息提取。例如，这可以用来从图像中提取重要元数据。通常，你也会希望将这些元数据提取为JSON格式，这样它就很容易解析，并可用于下游任务。在这个例子中，我将提取：
- en: Date – *23.01.2024* in this example
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 日期 – 在这个例子中是*23.01.2024*
- en: Address – *Camilla Colletts vei 15* in this example
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 地址 – 在这个例子中是*Camilla Colletts vei 15*
- en: Gnr (street number) – which in the test image is a blank field
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 门牌号（Gnr） – 在测试图像中是一个空白字段
- en: Målestokk (scale) – *1:500*
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 比例尺（scale） – *1:500*
- en: 'I’m running the following code:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 我正在运行以下代码：
- en: '[PRE6]'
  id: totrans-50
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'Which outputs:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 输出如下：
- en: '[PRE7]'
  id: totrans-52
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: The JSON object is in a valid format, and Qwen has successfully extracted the
    date, address, and scale fields. However, Qwen has actually returned a gnr. Initially,
    when I saw this result, I assumed this was a hallucination, since the Gnr field
    in the test image is blank. However, Qwen has actually made a natural assumption
    that the Gnr is available in the address, which is correct in this instance.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: JSON对象格式正确，Qwen已成功提取了日期、地址和比例尺字段。然而，Qwen实际上返回了一个gnr。最初，当我看到这个结果时，我以为这是一种幻觉，因为测试图像中的Gnr字段是空的。然而，Qwen实际上做出了一个自然的假设，即Gnr在地址中可用，在这个例子中是正确的。
- en: 'To be sure of its capabilities to answer None if it can’t find anything, I
    asked Qwen to extract the Bnr (building number), which is not available in this
    example. Running the code below:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 为了确保它能在找不到任何内容时回答“None”，我要求Qwen提取Bnr（建筑号），这个例子中没有提供。运行以下代码：
- en: '[PRE8]'
  id: totrans-55
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'I get:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 我得到：
- en: '[PRE9]'
  id: totrans-57
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: So as you can see, Qwen does manage to inform us if information is not present
    in the document.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，正如你所看到的，Qwen确实能够告诉我们文档中是否缺少信息。
- en: Vision language models’ downsides
  id: totrans-59
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 视觉语言模型的缺点
- en: I would also like to note that there are some issues with vision language models
    as well. The image I tested OCR and information extraction with is a relatively
    simple image. To truly test the capabilities of Qwen 3, I would have to expose
    it to more challenging tasks, for example, extracting more text from a longer
    document or making it extract more metadata fields.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 我还想指出，视觉语言模型也存在一些问题。我测试OCR和信息提取的图像相对简单。要真正测试Qwen 3的能力，我必须让它面对更具挑战性的任务，例如，从更长的文档中提取更多文本，或者让它提取更多元数据字段。
- en: 'The main current downsides with VLMs, from what I have seen, are:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 从我所见来看，VLMs的主要当前缺点是：
- en: Sometimes missing text with OCR
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 有时OCR会遗漏文本
- en: Inference is slow
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 推理速度慢
- en: VLMs missing text when performing OCR is something I’ve observed a few times.
    When it happens, the VLM typically just misses a section of the document and completely
    ignores the text. This is naturally very problematic, as it could miss text that
    is critical for downstream tasks like performing keyword searches. The reason
    this happens is a complicated topic that is out of scope for this article, but
    it’s a problem you should be aware of if you’re performing OCR with VLMs.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 当使用VLMs进行OCR时，我发现缺失文本的情况时有发生。当这种情况发生时，VLM通常只是遗漏文档的一部分，并完全忽略文本。这自然是非常成问题的，因为它可能会错过对下游任务（如执行关键词搜索）至关重要的文本。这种情况发生的原因是一个复杂的话题，超出了本文的范围，但如果你使用VLMs进行OCR，你应该知道这是一个问题。
- en: 'Furthermore, VLMs require a lot of processing power. I’m running locally on
    my PC, though I’m also running a very small model. I started experiencing memory
    issues when I simply wanted to process an image with dimensions of 2048×2048,
    which is problematic if I want to perform text extraction from larger documents.
    You can thus imagine how resource-intensive it is to apply VLMs to either:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，VLMs需要大量的处理能力。我在我的PC上本地运行，尽管我也在运行一个非常小的模型。当我只是想要处理一个2048×2048分辨率的图像时，我就开始遇到内存问题，这如果我想从更大的文档中提取文本，就成问题了。因此，你可以想象将VLMs应用于以下哪种情况是多么资源密集：
- en: More images at once (for example, processing a 10-page document)
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一次性处理更多图像（例如，处理10页文档）
- en: Processing documents of higher resolutions
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 处理更高分辨率的文档
- en: Using a larger VLM, with more parameters
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用具有更多参数的更大VLM
- en: Conclusion
  id: totrans-69
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this article, I’ve discussed VLMs, where I started off discussing why we
    need VLMs, highlighting how some tasks require both text and the visual position
    of the text. Furthermore, I highlighted some tasks you can perform with VLMs and
    how Qwen 3 VL was able to perform these tasks. I think the vision modality will
    be more and more important in the coming years. Up until a year ago, almost all
    focus was on pure text models. However, to gain even more powerful models, we
    need to utilize the vision modality, which is where I believe VLMs will be incredibly
    important.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我讨论了VLMs，我一开始讨论了为什么我们需要VLMs，强调了某些任务需要文本和文本的视觉位置。此外，我还突出了一些你可以使用VLMs完成的任务以及Qwen
    3 VL如何完成这些任务。我认为视觉模态在未来几年将变得越来越重要。直到去年，几乎所有关注点都集中在纯文本模型上。然而，为了获得更强大的模型，我们需要利用视觉模态，这正是我认为VLMs将变得极其重要的地方。
