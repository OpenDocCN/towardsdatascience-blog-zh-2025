- en: Building a Multimodal RAG That Responds with Text, Images, and Tables from Sources
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/building-a-multimodal-rag-with-text-images-tables-from-sources-in-response/](https://towardsdatascience.com/building-a-multimodal-rag-with-text-images-tables-from-sources-in-response/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**<mdspan datatext="el1762199690220" class="mdspan-comment">Retrieval-Augmented</mdspan>
    Generation (RAG)** has been one of the earliest and most successful applications
    of Generative AI. Yet, few chatbots return *images, tables, and figures* from
    source documents alongside textual answers.'
  prefs: []
  type: TYPE_NORMAL
- en: In this post, I explore why it’s difficult to build a reliable, truly multimodal
    RAG system, especially for *complex documents* such as research papers and corporate
    reports — which often include dense text, formulae, tables, and graphs.
  prefs: []
  type: TYPE_NORMAL
- en: Also, here I present an approach for an **improved multimodal RAG pipeline**
    that delivers consistent, high-quality multimodal results across these document
    types.
  prefs: []
  type: TYPE_NORMAL
- en: Dataset and Setup
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'To illustrate, I built a small multimodal knowledge base using the following
    documents:'
  prefs: []
  type: TYPE_NORMAL
- en: '[*Fully Fine-tuned CLIP Models are Efficient Few-Shot Learners*](https://arxiv.org/pdf/2407.04003)'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[*VectorPainter: Advanced Stylized Vector Graphics Synthesis Using Stroke-Style
    Priors*](https://arxiv.org/pdf/2405.02962)'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[*Marketing Strategy for Financial Services: Financing Farming & Processing
    the Cassava, Maize and Plantain Value Chains in Côte d’Ivoire*](https://www.ifc.org/content/dam/ifc/doc/2023/marketing-strategy-for-financial-services-en.pdf)'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The language model used is **GPT-4o**, and for embeddings I used **text-embedding-3-small**.
  prefs: []
  type: TYPE_NORMAL
- en: The Standard Multimodal RAG Architecture
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In theory, a multimodal RAG bot should:'
  prefs: []
  type: TYPE_NORMAL
- en: Accept **text and image** queries.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Return **text and image** responses.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Retrieve **context** from both text and image sources.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'A typical pipeline looks like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Ingestion**'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Parsing & chunking:** Split documents into text segments and extract images.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Image summarization:** Use an LLM to generate captions or summaries for each
    image.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Multi-vector embeddings:** Create embeddings for text chunks, image summaries,
    and optionally for the raw image features (e.g., using CLIP).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**2\. Indexing**'
  prefs: []
  type: TYPE_NORMAL
- en: Store embeddings and metadata in a vector database.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**3\. Retrieval**'
  prefs: []
  type: TYPE_NORMAL
- en: 'For a user query, perform similarity search on:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Text embeddings (for textual matches)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Image summary embeddings (for image relevance)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**4\. Generation**'
  prefs: []
  type: TYPE_NORMAL
- en: Use a multimodal LLM to synthesize the final response using both retrieved text
    and images.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The Inherent Assumption
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This approach assumes that **the caption or summary of an image generated from
    its content, always contains enough context** about the text or themes that appear
    in the document, for which this image would be an appropriate response.
  prefs: []
  type: TYPE_NORMAL
- en: In real-world documents, this often isn’t true.
  prefs: []
  type: TYPE_NORMAL
- en: '**Example: Context Loss in Corporate Reports**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Take the “Marketing Strategy for Financial Services (#3 in dataset)” report
    in the dataset. In its Executive Summary, there are two similar-looking tables
    showing *Working Capital* requirements — one for **primary producers (farmers)**
    and one for **processors**. They are the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/dd96276fdfa81e2db7599672ceb25335.png)'
  prefs: []
  type: TYPE_IMG
- en: Working Capital Table for Primary Producers
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d2d0c706893183c977e377afe58f56ad.png)'
  prefs: []
  type: TYPE_IMG
- en: Working Capital Table for Processors
  prefs: []
  type: TYPE_NORMAL
- en: 'GPT-4o generates the following for the first table:'
  prefs: []
  type: TYPE_NORMAL
- en: '*“The table outlines various types of working capital financing options for
    agricultural businesses, including their purposes and availability across different
    situations”*'
  prefs: []
  type: TYPE_NORMAL
- en: 'And the following for the second table:'
  prefs: []
  type: TYPE_NORMAL
- en: '*“The table provides an overview of working capital financing options, detailing
    their purposes and potential applicability in different scenarios for businesses,
    particularly exporters and stock purchasers”*'
  prefs: []
  type: TYPE_NORMAL
- en: Both seem fine individually — but neither captures the **context** that distinguishes
    *producers* from *processors*.
  prefs: []
  type: TYPE_NORMAL
- en: This means they will be **retrieved incorrectly** for queries specifically asking
    about producers or processors only. There are other tables such as CAPEX, Funding
    opportunities where the same issue can be seen.
  prefs: []
  type: TYPE_NORMAL
- en: For the VectorPainter paper, where Fig 3 in the paper shows the VectorPainter
    pipeline, GPT-4o generates the caption as *“Overview of the proposed framework
    for stroke-based style extraction and stylized SVG synthesis with stroke-level
    constraints,”* missing the fact that it represents the core theme of the paper,
    named “VectorPainter” by the authors.
  prefs: []
  type: TYPE_NORMAL
- en: And for the Vision Language similarity distillation loss formula defined in
    Sec 3.3 of the CLIP finetuning paper, the caption generated is *“Equation representing
    the Variational Logit Distribution (VLD) loss, defined as the sum of Kullback–Leibler
    (KL) divergences between predicted and target logit distributions over a batch
    of inputs.”,* where the context of vision and language correlation is absent.
  prefs: []
  type: TYPE_NORMAL
- en: It is also to be noted that in the research papers, the figures and tables have
    a author provided caption, however, during the extraction process, this is extracted
    not as part of the image, but as part of the text. And also the positioning of
    the caption is sometimes above and at other times below the figure. As for the
    Marketing Strategy reports, the embedded tables and other images do not even have
    an attached caption describing the figure.
  prefs: []
  type: TYPE_NORMAL
- en: What the above has illustrated is that the real-world documents do not follow
    any standard format of text, images, tables and captions, thereby making the process
    of associating context to the figures difficult.
  prefs: []
  type: TYPE_NORMAL
- en: The New and Improved Multimodal RAG pipeline
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To solve this, I made two key changes.
  prefs: []
  type: TYPE_NORMAL
- en: '**1\. Context-Aware Image Summaries**'
  prefs: []
  type: TYPE_NORMAL
- en: Instead of asking the LLM to summarize the image, I extract the **text immediately
    before and after the figure** — up to 200 characters in each direction.
  prefs: []
  type: TYPE_NORMAL
- en: 'This way, the image caption includes:'
  prefs: []
  type: TYPE_NORMAL
- en: The *author-provided* caption (if any)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The *surrounding narrative* that gives it meaning
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Even if the document lacks a formal caption, this provides a contextually accurate
    summary.
  prefs: []
  type: TYPE_NORMAL
- en: '**2\. Text Response Guided Image Selection at Generation Time**'
  prefs: []
  type: TYPE_NORMAL
- en: During retrieval, I **don’t** match the user query directly with image captions.
    This is because the user query often is too short to provide adequate context
    for image retrieval (eg; What is … ?)
  prefs: []
  type: TYPE_NORMAL
- en: 'Instead:'
  prefs: []
  type: TYPE_NORMAL
- en: First, generate the **textual response** using the top text chunks retrieved
    for context.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Then, **select the best two images** for the text response matched to the image
    captions
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This ensures the final images are chosen **in relation to the actual response**,
    not the query alone.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here is a diagram for the **Extraction to Embedding** pipeline:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/8b6c7c2b22e8c88899e39aa2a1b05a69.png)'
  prefs: []
  type: TYPE_IMG
- en: Extraction to Embedding Pipeline
  prefs: []
  type: TYPE_NORMAL
- en: 'And the pipeline for **Retrieval and Response Generation** is as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/221e8aee124ad73be66fa09025123f47.png)'
  prefs: []
  type: TYPE_IMG
- en: Retrieval and Response Generation
  prefs: []
  type: TYPE_NORMAL
- en: Implementation Details
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Step 1: Extract Text and Images**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Use [Adobe PDF Extract API](https://developer.adobe.com/document-services/docs/overview/pdf-extract-api/quickstarts/python/)
    to parse PDFs into:'
  prefs: []
  type: TYPE_NORMAL
- en: figures/ and tables/ folders with .png files
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A structuredData.json file containing positions, text, and file paths
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I found this API to be far more reliable than libraries like PyMuPDF, especially
    for extracting formulas and diagrams.
  prefs: []
  type: TYPE_NORMAL
- en: '**Step 2: Create a Text File**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Concatenate all textual elements from the JSON to create the raw text corpus:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: '**Step 3: Build Image Captions**: Walk through each element of `structuredData.json`,
    check if the element filepath ends in `.png` . Load the file from figures and
    tables folder of the document, then use the LLM to perform a quality check on
    the image. This is needed as the extraction process will find some illegible,
    small images, header and footer, company logos etc which need to be excluded from
    any user responses.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Note that we are not asking the LLM to interpret the images; just comment if
    it is clear and relevant enough to be included in the database. The prompt for
    the LLM would be like:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 'Next we create the image summary. For this, in the `structuredData.json`, we
    look at the elements behind and ahead of the `.png` element, and collect up to
    200 characters in each direction for a total of 400 characters. This forms the
    image caption or summary. The code snippet is as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: We perform this for each figure and table for every document in our database,
    and store the image captions as metadata. In my case, I store as a `image_captions.json`
    file.
  prefs: []
  type: TYPE_NORMAL
- en: This simple change makes a **huge difference** — the resulting captions include
    meaningful context. For instance, the captions I get for the two Working Capital
    tables from the Marketing Strategy report are as follows. Note how the contexts
    are now **clearly differentiated** and include farmers and processors.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: '**Step 4: Chunk Text and Generate Embeddings**'
  prefs: []
  type: TYPE_NORMAL
- en: The text file of the document is split into chunks of 1000 characters, using
    *` RecursiveCharacterTextSplitter`* from `*langchain*` and stored. Embeddings
    created for the text chunks and image captions, normalized and stored as `*faiss*`
    indexes
  prefs: []
  type: TYPE_NORMAL
- en: '**Step 5: Context Retrieval and Response Generation**'
  prefs: []
  type: TYPE_NORMAL
- en: The user query is matched and the top 5 text chunks are retrieved as context.
    Then we use these retrieved chunks and user query to get the text response using
    the LLM.
  prefs: []
  type: TYPE_NORMAL
- en: In the next step, we take the generated text response and find the top 2 closest
    image matches (based on caption embeddings) to the response. This is different
    from the traditional way of matching the user query to the image embeddings and
    provides much better results.
  prefs: []
  type: TYPE_NORMAL
- en: There is one final step. Our image captions were based on 400 characters around
    the image in the document, and may not form a logical and concise caption for
    display. Therefore, for the final selected 2 images, we ask the LLM to take the
    image captions along with the images and create a brief caption ready for display
    in the final response.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here is the code for the above logic:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: Test Results
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let’s run the queries mentioned at the beginning of this blog to see if the
    images retrieved are relevant to the user query. For simplicity, I am printing
    only the images and their captions displayed and not the text response.
  prefs: []
  type: TYPE_NORMAL
- en: '**Query 1:** *What are the loan and working capital requirement of the primary
    producer ?*'
  prefs: []
  type: TYPE_NORMAL
- en: 'Figure 1: Overview of working capital financing options for small, medium,
    and large farmers.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Figure 2: Capital expenditure financing options for medium and large farmers.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/831cfe25b5647eef724eb9bc99eab52e.png)'
  prefs: []
  type: TYPE_IMG
- en: Image Result for Query 1
  prefs: []
  type: TYPE_NORMAL
- en: '**Query 2:** *What are the loan and working capital requirement of the processors ?*'
  prefs: []
  type: TYPE_NORMAL
- en: 'Figure 1: Overview of working capital loan products for small-scale and medium-large
    processors.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Figure 2: CAPEX loan products for machinery purchase and business expansion
    at the processing level.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/20d9e582ab67561cd8a360a7f1348541.png)'
  prefs: []
  type: TYPE_IMG
- en: Image Result for Query 2
  prefs: []
  type: TYPE_NORMAL
- en: '**Query 3**: *What is vision language distillation ?*'
  prefs: []
  type: TYPE_NORMAL
- en: 'Figure 1: Vision-language similarity distillation loss formula for transferring
    modal consistency from pre-trained CLIP to fine-tuned models.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Figure 2: Final objective function combining distillation loss, supervised
    contrastive loss, and vision-language similarity distillation loss with balancing
    hyperparameters.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b9650b71c3a2a7322ee7f5b72f8b9306.png)'
  prefs: []
  type: TYPE_IMG
- en: Formula Retrieval for Query 3
  prefs: []
  type: TYPE_NORMAL
- en: '**Query 4**: *What is VectorPainter pipeline ?*'
  prefs: []
  type: TYPE_NORMAL
- en: 'Figure 1: Overview of the stroke style extraction and SVG synthesis process,
    highlighting stroke vectorization, style-preserving loss, and text-prompt-based
    generation.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Figure 2: Comparison of various methods for style transfer across raster and
    vector formats, showcasing the effectiveness of the proposed approach in maintaining
    stylistic consistency.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/9d67e0c2003ef267dd898fa03c207998.png)'
  prefs: []
  type: TYPE_IMG
- en: Image Retrieval for Query 4
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This enhanced pipeline demonstrates how **context-aware image summarization**
    and **text response based image selection** can dramatically improve multimodal
    retrieval accuracy.
  prefs: []
  type: TYPE_NORMAL
- en: The approach produces **rich, multimodal answers** that combine text and visuals
    in a coherent way — essential for research assistants, document intelligence systems,
    and AI-powered knowledge bots.
  prefs: []
  type: TYPE_NORMAL
- en: Try it out… leave your comments and connect with me at [www.linkedin.com/in/partha-sarkar-lets-talk-AI](http://www.linkedin.com/in/partha-sarkar-lets-talk-AI)
  prefs: []
  type: TYPE_NORMAL
