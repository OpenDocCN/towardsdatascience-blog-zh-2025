- en: '**Take-Home Message**'
  id: totrans-134
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**要点**'
- en: This article briefly explains six essential LLM customization strategies including
    prompt engineering, decoding strategy, RAG, Agent, fine-tuning, and RLHF. Hope
    you find it helpful in terms of understanding the pros/cons of each strategy as
    well as how to implement them based on the practical examples.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 本文简要介绍了六种必要的LLM定制策略，包括提示工程、解码策略、RAG、代理、微调和RLHF。希望您能从中找到帮助，了解每种策略的优缺点以及如何根据实际示例实现它们。
