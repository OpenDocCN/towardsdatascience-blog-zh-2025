- en: 6 Common LLM Customization Strategies Briefly Explained
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/6-common-llm-customization-strategies-briefly-explained/](https://towardsdatascience.com/6-common-llm-customization-strategies-briefly-explained/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Why Customize LLMs?**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Large Language Models (LLMs) are deep learning models pre-trained based on self-supervised
    learning, requiring a vast amount of resources on training data, training time
    and holding a large number of parameters. LLM have revolutionized natural language
    processing especially in the last 2 years, demonstrating remarkable capabilities
    in understanding and generating human-like text. However, these general purpose
    models’ out-of-the-box performance may not always meet specific business needs
    or domain requirements. LLMs alone cannot answer questions that rely on proprietary
    company data or closed-book settings, making them relatively generic in their
    applications. Training a LLM model from scratch is largely infeasible to small
    to medium teams due to the demand of massive amounts of training data and resources.
    Therefore, a wide range of LLM customization strategies are developed in recent
    years to tune the models for various scenarios that require specialized knowledge.
  prefs: []
  type: TYPE_NORMAL
- en: 'The customization strategies can be broadly split into two types:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Using a frozen model: These techniques don’t necessitate updating model parameters
    and typically accomplished through in-context learning or prompt engineering.
    They are cost-effective since they alter the model’s behavior without incurring
    extensive training costs, therefore widely explored in both the industry and academic
    with new research papers published on a daily basis.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Updating model parameters: This is a relatively resource-intensive approach
    that requires tuning a pre-trained LLM using custom datasets designed for the
    intended purpose. This includes popular techniques like Fine-Tuning and Reinforcement
    Learning from Human Feedback (RLHF).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These two broad customization paradigms branch out into various specialized
    techniques including LoRA fine-tuning, Chain of Thought, Retrieval Augmented Generation,
    ReAct, and Agent frameworks. Each technique offers distinct advantages and trade-offs
    regarding computational resources, implementation complexity, and performance
    improvements.
  prefs: []
  type: TYPE_NORMAL
- en: This article is also available as a video [here](https://www.youtube.com/watch?v=jFlQoDTb1Fg)
  prefs: []
  type: TYPE_NORMAL
- en: '**How to Choose LLMs?**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The first step of customizing LLMs is to select the appropriate foundation models
    as the baseline. Community based platform e.g. “Huggingface” offers a wide range
    of open-source pre-trained models contributed by top companies or communities,
    such as Llama series from Meta and Gemini from Google. Huggingface additionally
    provides leaderboards, for example “[Open LLM Leaderboard](https://huggingface.co/spaces/open-llm-leaderboard/open_llm_leaderboard#/)”
    to compare LLMs based on industry-standard metrics and tasks (e.g. MMLU). Cloud
    providers (e.g., AWS) and AI companies (e.g., OpenAI and Anthropic) also offer
    access to proprietary models that are typically paid services with restricted
    access. Following factors are essentials to consider when choosing LLMs.
  prefs: []
  type: TYPE_NORMAL
- en: '**Open source or proprietary model:** Open source models allow full customization
    and self-hosting but require technical expertise while proprietary models offer
    immediate access and often better quality responses but with higher costs.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Task and metrics:** Models excel at different tasks including question-answering,
    summarization, code generation etc. Compare benchmark metrics and test on domain-specific
    tasks to determine the appropriate models.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Architecture:** In general, decoder-only models (GPT series) perform better
    at text generation while encoder-decoder models (T5) handle translation well.
    There are more architecture emerging and showing promising results, for instance
    Mixture of Experts (MoE) model “DeepSeek”.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Number of Parameters and Size:** Larger models (70B-175B parameters) offer
    better performance but need more computing power. Smaller models (7B-13B) run
    faster and cheaper but may have reduced capabilities.'
  prefs: []
  type: TYPE_NORMAL
- en: 'After determining a base LLM, let’s explore 6 most common strategies for LLM
    customization, ranked in order of resource consumption from the least to the most
    intensive:'
  prefs: []
  type: TYPE_NORMAL
- en: Prompt Engineering
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Decoding and Sampling Strategy
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Retrieval Augmented Generation
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Agent
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Fine Tuning
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Reinforcement Learning from Human Feedback
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If you’d prefer a video walkthrough of these concepts, please check out my video
    on “[6 Common LLM Customization Strategies Briefly Explained](https://youtu.be/jFlQoDTb1Fg)”.
  prefs: []
  type: TYPE_NORMAL
- en: '**LLM Customization Techniques**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**1\. Prompt Engineering**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '![](../Images/1757e050f07f5e754d42b3eeeeea00f6.png)'
  prefs: []
  type: TYPE_IMG
- en: Prompt is the input text sent to an LLM to elicit an AI-generated response,
    and it can be composed of instructions, context, input data and output indicator.
  prefs: []
  type: TYPE_NORMAL
- en: '**Instructions:** This provides a task description or instruction for how the
    model should perform.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Context:** This is external information to guide the model to respond within
    a certain scope.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Input data:** This is the input for which you want a response.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Output indicator:** This specifies the output type or format.'
  prefs: []
  type: TYPE_NORMAL
- en: Prompt Engineering involves crafting these prompt components strategically to
    shape and control the model’s response. Basic prompt engineering techniques include
    zero shot, one shot, and few shot prompting. User can implement basic prompt engineering
    techniques directly while interacting with the LLM, making it an efficient approach
    to align model’s behavior to on a novel objective. API implementation is also
    an option and more details are introduced in my previous article “[A Simple Pipeline
    for Integrating LLM Prompt with Knowledge Graph](https://medium.com/gitconnected/a-simple-pipeline-for-integrating-llm-prompt-with-knowledge-graph-cc6ef4954d40)”.
  prefs: []
  type: TYPE_NORMAL
- en: Due to the efficiency and effectiveness of prompt engineering, more complex
    approaches are explored and developed to advance the logical structure of prompts.
  prefs: []
  type: TYPE_NORMAL
- en: '**Chain of Thought (CoT)** asks LLMs to break down complex reasoning tasks
    into step-by-step thought processes, improving performance on multi-step problems.
    Each step explicitly exposes its reasoning outcome which serves as the precursor
    context of its subsequent steps until arriving at the answer.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Tree of thoughts** extends from CoT by considering multiple different reasoning
    branches and self-evaluating choices to decide the next best action. It is more
    effective for tasks that involve initial decisions, strategies for the future
    and exploration of multiple solutions.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Automatic reasoning and tool use (ART)** builds upon the CoT process, it
    deconstructs complex tasks and allows the model to select few-shot examples from
    a task library using predefined external tools like search and code generation.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Synergizing reasoning and acting (ReAct)** combines reasoning trajectories
    with an action space, where the model search through the action space and determine
    the next best action based on environmental observations.'
  prefs: []
  type: TYPE_NORMAL
- en: Techniques like CoT and ReAct are often combined with an Agentic workflow to
    strengthen its capability. These techniques will be introduced in more detail
    in the “Agent” section.
  prefs: []
  type: TYPE_NORMAL
- en: '**Further Reading**'
  prefs: []
  type: TYPE_NORMAL
- en: '[Chain-of-Thought Prompting Elicits Reasoning in Large Language Models](https://arxiv.org/abs/2201.11903)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Tree of Thoughts: Deliberate Problem Solving with Large Language Models](https://arxiv.org/abs/2305.10601)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[ART: Automatic multi-step reasoning and tool-use for large language models](https://arxiv.org/abs/2303.09014)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[ReAct: Synergizing Reasoning and Acting in Language Models](https://arxiv.org/abs/2210.03629)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[A Simple Pipeline for Integrating LLM Prompt with Knowledge Graph](https://medium.com/gitconnected/a-simple-pipeline-for-integrating-llm-prompt-with-knowledge-graph-cc6ef4954d40)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**2\. Decoding and Sampling Strategy**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '![](../Images/be36e01488f211cafdc1caa44e86df0a.png)'
  prefs: []
  type: TYPE_IMG
- en: Decoding strategy can be controlled at model inference time through inference
    parameters (e.g. temperature, top p, top k), determining the randomness and diversity
    of model responses. **Greedy search, beam search and sampling** are three common
    decoding strategies for auto-regressive model generation. ****
  prefs: []
  type: TYPE_NORMAL
- en: During the autoregressive generation process, LLM outputs one token at a time
    based on a probability distribution of candidate tokens conditioned by the pervious
    token. By default, **greedy search** is applied to produce the next token with
    the highest probability.
  prefs: []
  type: TYPE_NORMAL
- en: In contrast, **beam search decoding** considers multiple hypotheses of next-best
    tokens and selects the hypothesis with the highest combined probabilities across
    all tokens in the text sequence. The code snippet below uses transformers library
    to specify the the number of beam paths (e.g. num_beams=5 considers 5 distinct
    hypotheses) during the model generation process.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: '**Sampling strategy** is the third approach to control the randomness of model
    responses by adjusting these inference parameters:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Temperature**: Lowering the temperature makes the probability distribution
    sharper by increasing the likelihood of generating high-probability words and
    decreasing the likelihood of generating low-probability words. When temperature
    = 0, it becomes equivalent to greedy search (least creative); when temperature
    = 1, it produces the most creative outputs.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Top K sampling:** This method filters the K most probable next tokens and
    redistributes the probability among those tokens. The model then samples from
    this filtered set of tokens.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Top P sampling:** Instead of sampling from the K most probable tokens, top-p
    sampling selects from the smallest possible set of tokens whose cumulative probability
    exceeds the threshold p.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The example code snippet below samples from the top 50 most likely tokens (top_k=50)
    with a cumulative probability higher than 0.95 (top_p=0.95)
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: '**Further Reading**'
  prefs: []
  type: TYPE_NORMAL
- en: '[Text generation strategies](https://huggingface.co/docs/transformers/en/generation_strategies)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[How to generate text: using different decoding methods for language generation
    with Transformers](https://huggingface.co/blog/how-to-generate)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Influence response generation with inference parameters](https://docs.aws.amazon.com/bedrock/latest/userguide/inference-parameters.html)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**3\. RAG**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '![](../Images/7ed79e7145d4be22c10b1bd9f16e4791.png)'
  prefs: []
  type: TYPE_IMG
- en: Retrieval Augmented Generation (or RAG), initially introduced in the paper “Retrieval-Augmented
    Generation for Knowledge-Intensive NLP Tasks”, has been demonstrated as a promising
    solution that integrates external knowledge and reduces common LLM “hallucination”
    issues when handling domain specific or specialized queries. RAG allows dynamically
    pulling relevant information from knowledge domain and generally does not involve
    extensive training to update LLM parameters, making it a cost-effective strategy
    to adapt a general-purpose LLM for a specialized domain.
  prefs: []
  type: TYPE_NORMAL
- en: A RAG system can be decomposed into retrieval and generation stage. The objective
    of **retrieval process** is to find contents within the knowledge base that are
    closely related to the user query, by chunking external knowledge, creating embeddings,
    indexing and similarity search.
  prefs: []
  type: TYPE_NORMAL
- en: 'Chunking: Documents are divided into smaller segments, with each segment containing
    a distinct unit of information.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Create embeddings: An embedding model compresses each information chunk into
    a vector representation. The user query is also converted into its vector representation
    through the same vectorization process, so that the user query can be compared
    in the same dimensional space.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Indexing: This process stores these text chunks and their vector embeddings
    as key-value pairs, enabling efficient and scalable search functionality. For
    large external knowledge bases that exceed memory capacity, vector databases offer
    efficient long-term storage.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Similarity search: Similarity scores between the query embeddings and text
    chunk embeddings are calculated, which are used for searching information highly
    relevant to the user query.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**The generation process** of the RAG system then combines retrieved information
    with the user query to form the augmented query which is parsed to the LLM to
    generate the context rich response.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Code Snippet**'
  prefs: []
  type: TYPE_NORMAL
- en: The code snippet firstly specifies the LLM and embedding model, then perform
    the steps to chunk the external knowledge base `documents` into a collection of
    `document`. Create `index` from `document`, define the `query_engine` based on
    the `index` and query the `query_engine` with the user prompt.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: The example above shows a simple RAG system. Advanced RAG improve based on this
    by introducing pre-retrieval and post-retrieval strategies to reduce pitfalls
    such as limited synergy between the retrieval and generation process. For example
    rerank technique reorders the retrieved information using a model capable of understanding
    bidirectional context, and integration with knowledge graph for advanced query
    routing. More use cases can be found on the [llamaindex](https://docs.llamaindex.ai/en/stable/understanding/rag/)
    website.
  prefs: []
  type: TYPE_NORMAL
- en: '**Further Reading**'
  prefs: []
  type: TYPE_NORMAL
- en: '[Introduction to RAG](https://docs.llamaindex.ai/en/stable/understanding/rag/)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Question-Answering (RAG)](https://docs.llamaindex.ai/en/stable/use_cases/q_and_a/#question-answering-rag)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Retrieval-Augmented Generation for Knowledge-Intensive NLP Tasks](https://arxiv.org/abs/2005.11401)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Retrieval-Augmented Generation for Large Language Models: A Survey](https://arxiv.org/abs/2312.10997)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**4\. Agent**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '![](../Images/4136f6ed0ecf722b68b682abedbbf13d.png)'
  prefs: []
  type: TYPE_IMG
- en: 'LLM Agent was a trending topic in 2024 and will likely remain a main focus
    in the GenAI field in 2025\. Compared to RAG, Agent excels at creating query routes
    and planning LLM-based workflows, with the following benefits:'
  prefs: []
  type: TYPE_NORMAL
- en: Maintaining memory and state of previous model generated responses.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Leveraging various tools based on specific criteria. This tool-using capability
    sets agents apart from basic RAG systems by giving the LLM independent control
    over tool selection.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Breaking down a complex task into smaller steps and planning for a sequence
    of actions.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Collaborating with other agents to form a orchestrated system.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Several in-context learning techniques (e.g. CoT, ReAct ) can be implemented
    through the Agentic framework and we will discuss ReAct in more details. ReAct,
    stands for “Synergizing Reasoning and Acting in Language Models”, is composed
    of three key elements **– actions**, **thoughts** and **observations.** This framework
    was introduced by Google Research at Princeton University, built upon Chain of
    Thought by integrating the reasoning steps with an action space that enables tool
    uses and function calling. Additionally, ReAct framework emphasizes on determining
    the next best action based on the environmental observations.
  prefs: []
  type: TYPE_NORMAL
- en: This example from the original paper demonstrated ReAct’s inner working process,
    where the LLM generates the first thought and acts by calling the function to
    “Search [Apple Remote]”, then observes the feedback from its first output. The
    second thought is then based on the previous observation, hence leading to a different
    action “Search [Front Row]”. This process iterates until reaching the goal. The
    research shows that ReAct overcomes prevalent issues of hallucination and error
    propagation as more often observed in chain-of-thought reasoning by interacting
    with a simple Wikipedia API. Furthermore, through the implementation of decision
    traces, ReAct framework additionally increases the model’s interpretability, trustworthiness
    and diagnosability.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/724c711ff06dce2326e73b794cc21b1a.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Example from “ReAct: Synergizing Reasoning and Acting in Language Models”
    (Yu et. al., 2022)*'
  prefs: []
  type: TYPE_NORMAL
- en: '**Code Snippet**'
  prefs: []
  type: TYPE_NORMAL
- en: This demonstrates an ReAct-based agent implementation using `llamaindex`. Firstly,
    it defines two functions (`multiply` and `add`). Secondly, these two functions
    are encapsulated as `FunctionTool`, forming the Agent’s action space and executed
    based on its reasoning.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: The advantages of an Agentic Workflow are more substantial when combined with
    self-reflection or self-correction. It is an increasingly growing domain with
    a variety of Agent architecture being explored. For instance, **Reflexion** framework
    facilitate iterative learning by providing a summary of verbal feedback from environmental
    and storing the feedback in model’s memory; **CRITIC** framework empowers frozen
    LLMs to self-verify through interacting with external tools such as code interpreter
    and API calls.
  prefs: []
  type: TYPE_NORMAL
- en: '**Further Reading**'
  prefs: []
  type: TYPE_NORMAL
- en: '[Llamaindex: Agents](https://docs.llamaindex.ai/en/stable/use_cases/agents/)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[AgentWorkflow Basic Introduction](https://docs.llamaindex.ai/en/stable/examples/agent/agent_workflow_basic/)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Nvidia: Introduction to LLM Agents](https://developer.nvidia.com/blog/introduction-to-llm-agents/)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**5\. Fine-Tuning**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '![](../Images/3727ebd6426f9a3857b773753e78ffca.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Fine-tuning is the process of feeding niche and specialized datasets to modify
    the LLM so that it is more aligned with a certain objective. It differs from prompt
    engineering and RAG as it enables updates to the LLM weights and parameters. Full
    fine-tuning refers to updating all weights of the pretrained LLM through backpropogation,
    which requires large memory to store all weights and parameters and may suffer
    from significant reduction in ability on other tasks (i.e. catastrophic forgetting).
    Therefore, **PEFT (or parameter efficient fine tuning)** is more widely used to
    mitigate these caveats while saving the time and cost of model training. There
    are three categories of PEFT methods:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Selective**: Select a subset of initial LLM parameters to fine tune which
    can be more computationally intensive compared to other PEFT methods.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Reparameterization**: Adjust model weights through training the weights of
    low rank representations. For example, Lower Rank Adaptation (LoRA) is among this
    category that accelerates fine-tuning by representing the weight updates with
    two smaller matrices.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Additive**: Add additional trainable layers to model, including techniques
    like adapters and soft prompts'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The fine-tuning process is similar to deep learning training process., requiring
    the following inputs:'
  prefs: []
  type: TYPE_NORMAL
- en: training and evaluation datasets
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: training arguments define the hyperparameters e.g. learning rate, optimizer
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: pretrained LLM model
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: compute metrics and objective functions that algorithm should be optimized for
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Code Snippet**'
  prefs: []
  type: TYPE_NORMAL
- en: Below is an example of implementing fine-tuning using the transformer Trainer.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: Fine-tuning has a wide range of use cases. For instance, instruction fine-tuning
    optimizes LLMs for conversations and following instructions by training them on
    prompt-completion pairs. Another example is domain adaptation, an unsupervised
    fine-tuning method that helps LLMs specialize in specific knowledge domains.
  prefs: []
  type: TYPE_NORMAL
- en: '**Further Reading**'
  prefs: []
  type: TYPE_NORMAL
- en: '[Fine-tune a pretrained model](https://huggingface.co/docs/transformers/training)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PEFT: Parameter-Efficient Fine-Tuning Methods for LLMs](https://huggingface.co/blog/samuellimabraz/peft-methods)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**6\. RLHF**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '![](../Images/44501bb6c007e15cd8b65d27e0d50074.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Reinforcement learning from human feedback, or RLHF, is a reinforcement learning
    technique that fine tunes LLMs based on human preferences. RLHF operates by training
    a **reward model** based on human feedback and uses this model as a reward function
    to optimize a reinforcement learning policy through PPO (Proximal Policy Optimization).
    The process requires two sets of training data: a **preference dataset** for training
    reward model, and a **prompt dataset** used in the reinforcement learning loop.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s break it down into steps:'
  prefs: []
  type: TYPE_NORMAL
- en: Gather **preference dataset** annotated by human labelers who rate different
    completions generated by the model based on human preference. An example format
    of the preference dataset is `{input_text, candidate1, candidate2, human_preference}`,
    indicating which candidate response is preferred.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Train a **reward model** using the preference dataset, the reward model is essentially
    a regression model that outputs a scalar indicating the quality of the model generated
    response. The objective of the reward model is to maximize the score between the
    winning candidate and losing candidate.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Use the reward model in a reinforcement learning loop to fine-tune the LLM.
    The objective is that the policy is updated so that LLM can generate responses
    that maximize the reward produced by the reward model. This process utilizes the
    **prompt dataset** which is a collection of prompts in the format of `{prompt,
    response, rewards}`.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Code Snippet**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Open source library Trlx is widely applied in implementing RLHF and they provided
    a template code that shows the basic RLHF setup:'
  prefs: []
  type: TYPE_NORMAL
- en: Initialize the base model and tokenizer from a pretrained checkpoint
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
