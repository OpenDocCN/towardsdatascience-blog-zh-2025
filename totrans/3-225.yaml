- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: RLHF is widely applied for aligning model responses with human preference. Common
    use cases involve reducing response toxicity and model hallucination. However,
    it does have the downside of requiring a large amount of human annotated data
    as well as computation costs associated with policy optimization. Therefore, alternatives
    like Reinforcement Learning from AI feedback and Direct Preference Optimization
    (DPO) are introduced to mitigate these limitations.
  prefs: []
