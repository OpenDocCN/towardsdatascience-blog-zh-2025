- en: Using Constraint Programming to Solve Math Theorems
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用约束编程解决数学定理
- en: 原文：[https://towardsdatascience.com/using-constraint-programming-to-solve-math-theorems-1781611878d0/](https://towardsdatascience.com/using-constraint-programming-to-solve-math-theorems-1781611878d0/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/using-constraint-programming-to-solve-math-theorems-1781611878d0/](https://towardsdatascience.com/using-constraint-programming-to-solve-math-theorems-1781611878d0/)
- en: TLDR
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: TLDR
- en: Some mathematical theorems can be solved by combinatorial exploration. In this
    article, we focus on the problem of the existence of some quasigroups. We will
    demonstrate the existence or non existence of some quasigroups using [NuCS](https://github.com/yangeorget/nucs).
    NuCs is a fast constraint solver written 100% in Python that I am currently developing
    as a side project. It is released under the [MIT license](https://github.com/yangeorget/nucs/blob/main/LICENSE.md).
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 一些数学定理可以通过组合探索来解决。在本文中，我们关注某些次群的存在性问题。我们将使用[NuCS](https://github.com/yangeorget/nucs)来证明或否定某些次群的存在性。NuCs是一个100%用Python编写的快速约束求解器，我现在正在将其作为一个副项目开发。它是在[MIT许可证](https://github.com/yangeorget/nucs/blob/main/LICENSE.md)下发布的。
- en: Some definitions
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 一些定义
- en: Let’s start by defining some useful vocabulary.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们先定义一些有用的词汇。
- en: Groups
  id: totrans-6
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 群
- en: 'Quoting wikipedia:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 引用维基百科：
- en: 'In mathematics, a **group** is a set with an operation that associates an element
    of the set to every pair of elements of the set (as does every binary operation)
    and satisfies the following constraints: the operation is associative, it has
    an identity element, and every element of the set has an inverse element.'
  id: totrans-8
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在数学中，**群**是一个集合，该集合有一个操作，将集合中的每个元素与集合中每对元素的组合相关联（就像每个二元操作一样），并满足以下约束：操作是结合的，它有一个单位元素，并且集合中的每个元素都有一个逆元素。
- en: The set of integers (positive and negative) together with the addition form
    a group. There are many of kind of groups, for example the manipulations of the
    [Rubik’s Cube](https://en.wikipedia.org/wiki/Rubik%27s_Cube).
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 整数集（正数和负数）与加法一起构成一个群。有许多种类的群，例如[魔方](https://en.wikipedia.org/wiki/Rubik%27s_Cube)的操作。
- en: '![Source: Wikipedia](../Images/68c9d488bffc8edc650261f6cf4cd10d.png)'
  id: totrans-10
  prefs: []
  type: TYPE_IMG
  zh: '![来源：维基百科](../Images/68c9d488bffc8edc650261f6cf4cd10d.png)'
- en: '[Source: Wikipedia](https://en.wikipedia.org/wiki/Group_(mathematics)#/media/File:Rubik''s_cube.svg)'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: '[来源：维基百科](https://en.wikipedia.org/wiki/Group_(mathematics)#/media/File:Rubik''s_cube.svg)'
- en: Latin squares
  id: totrans-12
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 拉丁方阵
- en: A Latin square is an *n* × *n* array filled with *n* different symbols, each
    occurring exactly once in each row and exactly once in each column.
  id: totrans-13
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 拉丁方阵是一个*n* × *n*的数组，填充了*n*个不同的符号，每个符号在每个行和列中恰好出现一次。
- en: 'An example of a 3×3 Latin square is:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 一个3×3拉丁方阵的例子是：
- en: '![Designed by the author](../Images/2f4b00691f558570e75d32d699cec248.png)'
  id: totrans-15
  prefs: []
  type: TYPE_IMG
  zh: '![由作者设计](../Images/2f4b00691f558570e75d32d699cec248.png)'
- en: Designed by the author
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 由作者设计
- en: For example, a Sudoku is a *9×9* Latin square with additional properties.
  id: totrans-17
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 例如，数独是一个具有额外属性的*9×9*拉丁方阵。
- en: Quasigroups
  id: totrans-18
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 次群
- en: An order *m* quasigroup is a Latin square of size *m*. That is, a *m×m* multiplication
    table (we will note ∗ the multiplication symbol) in which each element occurs
    once in every row and column.
  id: totrans-19
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 一个有序*m*次群是一个*m×m*的拉丁方阵。也就是说，一个包含*m*个不同符号的乘法表（我们将乘法符号记为∗），其中每个元素在每个行和列中恰好出现一次。
- en: The multiplication law does not have to be associative. If it is, the quasigroup
    is a group.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 乘法法则不必是结合的。如果是，则次群是一个群。
- en: In the rest of this article, we will focus on the problem of the existence of
    some particular quasigroups. The quasigroups we are interested in are idempotent,
    that is ***a*∗*a=a*** for every element *a*.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文的其余部分，我们将关注某些特定次群的存在性问题。我们感兴趣的次群是幂等的，即对于每个元素*a*，有***a*∗*a=a***。
- en: 'Moreover, they have additional properties:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，它们还具有额外的属性：
- en: QG3.m problems are order m quasigroups for which **(a∗b)∗(b∗a)=a**.
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: QG3.m问题是有序m次群，其中**(a∗b)∗(b∗a)=a**。
- en: QG4.m problems are order m quasigroups for which **(b∗a)∗(a∗b)=a**.
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: QG4.m问题是有序m次群，其中**(b∗a)∗(a∗b)=a**。
- en: QG5.m problems are order m quasigroups for which **((b∗a)∗b)∗b=a**.
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: QG5.m问题是有序m次群，其中**((b∗a)∗b)∗b=a**。
- en: QG6.m problems are order m quasigroups for which **(a∗b)∗b=a∗(a∗b)**.
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: QG6.m问题是有序m次群，其中**(a∗b)∗b=a∗(a∗b)**。
- en: QG7.m problems are order m quasigroups for which **(b∗a)∗b=a∗(b∗a)**.
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: QG7.m问题是有序m次群，其中**(b∗a)∗b=a∗(b∗a)**。
- en: In the following, for a quasigroup of order *m*, we note *0, …, m-1* the values
    of the quasigroup (we want the values to match with the indices in the multiplication
    table).
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 在以下内容中，对于一个有序*m*的次群，我们记*0, …, m-1*为次群的值（我们希望这些值与乘法表中的索引相匹配）。
- en: Modelling the quasigroup problem
  id: totrans-29
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 模型次群问题
- en: Latin square models
  id: totrans-30
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 拉丁方模型
- en: 'We will model the quasigroup problem by leveraging the latin square problem.
    The former comes in 2 flavors:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将通过利用拉丁方问题来模型化拟群问题。前者有两种形式：
- en: the **LatinSquareProblem**,
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**LatinSquareProblem**，'
- en: the **LatinSquareRCProblem**.
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**LatinSquareRCProblem**。'
- en: 'The LatinSquareProblem simply states that the values in all the rows and columns
    of the multiplication table have to be different:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 拉丁方问题简单地声明乘法表中所有行和列的值都必须不同：
- en: '[PRE0]'
  id: totrans-35
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'This model defines, for each row *i* and column *j*, the value *color(i, j)*
    of the cell. We will call it the **color** model. Symmetrically, we can define:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 此模型定义了对于每一行 *i* 和列 *j* 的单元格值 *color(i, j)*。我们将称之为**颜色**模型。对称地，我们可以定义：
- en: 'for each row *i* and color *c*, the column *column(i, c)*: we call this the
    **column** model,'
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于每一行 *i* 和颜色 *c*，列 *column(i, c)*：我们称之为**列**模型，
- en: 'for each color *c* and **column** j, the ro*w row(c,* j): we call this th**e
    r**ow model.'
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于每个颜色 *c* 和 **列** j，行 *row(c,* j)*：我们称之为**行**模型。
- en: 'Note that we have the following properties:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，我们有以下属性：
- en: '*row(c, j) = i <=> color(i, j) = c*'
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*row(c, j) = i <=> color(i, j) = c*'
- en: For a given __ colum*n* j*, row(., j)* an*d color(., j)* are inverse permutations.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 对于给定的 __ colum*n* j*，row(., j)* an*d color(., j)* 是逆排列。
- en: '*row(c, j) = i <=> column(i, c) = j*'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*row(c, j) = i <=> column(i, c) = j*'
- en: For a given __ colo*r* c*, row(c, .)* an*d column(., c)* are inverse permutations.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 对于给定的 __ colo*r* c*，row(c, .)* an*d column(., c)* 是逆排列。
- en: '*color(i, j) = c <=> column(i, c) = j*'
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*color(i, j) = c <=> column(i, c) = j*'
- en: For a given __ ro*w* i*, color(i, .)* an*d column(i, .)* are inverse permutations.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 对于给定的 __ ro*w* i*，color(i, .)* an*d column(i, .)* 是逆排列。
- en: 'This is exactly what is implemented by the LatinSquareRCProblem with the help
    of the ALG_PERMUTATION_AUX propagator (note that a less optimized version of this
    propagator was also used in my [previous article](https://medium.com/towards-data-science/how-to-tackle-an-optimization-problem-with-constraint-programming-9ae77b4d803d)
    about the Travelling Salesman Problem):'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 这正是拉丁方RC问题在ALG_PERMUTATION_AUX传播器的帮助下实现的（注意，在关于旅行商问题的[上一篇文章](https://medium.com/towards-data-science/how-to-tackle-an-optimization-problem-with-constraint-programming-9ae77b4d803d)中，也使用了这种传播器的较不优化版本）：
- en: '[PRE1]'
  id: totrans-47
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Quasigroup model
  id: totrans-48
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 拟群模型
- en: Now we need to implement our additional properties for our quasigroups.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们需要为我们的拟群实现额外的属性。
- en: 'Idempotence is simply implemented by:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 幂等性可以通过以下方式简单实现：
- en: '[PRE2]'
  id: totrans-51
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'Let’s now focus on QG5.m. We need to implement *((b∗a)∗b)∗b=a*:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们专注于QG5.m。我们需要实现 *((b∗a)∗b)∗b=a*：
- en: 'this translates into: *color(color(color(j, i), j), j) = i,*'
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这可以翻译为：*color(color(j, i), j) = i,*
- en: 'or equivalently: *row(i, j) = color(color(j, i), j).*'
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 或者等价地：*row(i, j) = color(color(j, i), j).*。
- en: The last expression states that the *color(j,i)th* element of the *jth* column
    is *row(i, j)*. To enforces this, we can leverage the ALG_ELEMENT_LIV propagator
    (or a more specialized ALG_ELEMENT_LIV_ALLDIFFERENT optimized to take into account
    the fact that the rows and columns contain elements that are alldifferent).
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 最后一个表达式表明，*color(j,i)th* 列的 *jth* 元素是 *row(i, j)*。为了强制执行这一点，我们可以利用 ALG_ELEMENT_LIV
    传播器（或一个更专业的 ALG_ELEMENT_LIV_ALLDIFFERENT 优化，以考虑行和列包含所有不同的元素）。
- en: '[PRE3]'
  id: totrans-56
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Similarly, we can model the problems [QG3.m, QG4.m, QG6.m, QG7.m](https://github.com/yangeorget/nucs/blob/main/nucs/examples/quasigroup/quasigroup_problem.py).
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，我们可以通过模型化问题 [QG3.m, QG4.m, QG6.m, QG7.m](https://github.com/yangeorget/nucs/blob/main/nucs/examples/quasigroup/quasigroup_problem.py)。
- en: Experiments
  id: totrans-58
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实验
- en: Note that this problem is very hard since the size of the search space is mᵐᵐ.
    For *m=10*, this is *1e+100*.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，这个问题非常困难，因为搜索空间的大小是 mᵐᵐ。对于 *m=10*，这是 *1e+100*。
- en: The following experiments are performed on a MacBook Pro M2 running Python 3.13,
    Numpy 2.1.3, Numba 0.61.0rc2 and NuCS 4.6.0\. Note that the recent versions of
    NuCS are relatively faster than older ones since Python, Numpy and Numba have
    been upgraded.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 在MacBook Pro M2上运行的Python 3.13，Numpy 2.1.3，Numba 0.61.0rc2和NuCS 4.6.0上进行了以下实验。请注意，由于Python，Numpy和Numba的升级，NuCS的最新版本相对于旧版本来说相对更快。
- en: 'The following proofs of existence/non existence are obtained in **less than
    a second**:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 以下存在/不存在证明在**不到一秒**内获得：
- en: '![Experiments with small instances](../Images/e1e78247207486a68133f406465a2bd4.png)'
  id: totrans-62
  prefs: []
  type: TYPE_IMG
  zh: '![小实例上的实验](../Images/e1e78247207486a68133f406465a2bd4.png)'
- en: Experiments with small instances
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 在小实例上的实验
- en: Let’s now focus on **QG5.m** only where the first open problem is **QG5.18**.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们只关注**QG5.m**，其中第一个未解决的问题为**QG5.18**。
- en: '![Experiments with QG5 (in the second line, we use a MultiprocessingSolver)](../Images/631dc91355dc8f3cd2beeddb65df368e.png)'
  id: totrans-65
  prefs: []
  type: TYPE_IMG
  zh: '![QG5上的实验（在第二行，我们使用MultiprocessingSolver）](../Images/631dc91355dc8f3cd2beeddb65df368e.png)'
- en: Experiments with QG5 (in the second line, we use a MultiprocessingSolver)
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 对 QG5 的实验（在第二行，我们使用 MultiprocessingSolver）
- en: Going further would require to rent a powerful machine on a cloud provider during
    a few days at least!
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 要进一步研究，至少需要在云服务提供商上租用一台强大的机器几天时间！
- en: Conclusion
  id: totrans-68
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: As we have seen, some mathematical theorems can be solved by combinatorial exploration.
    In this article, we studied the problem of the existence/non existence of quasigroups.
    Among such problems, some open ones seem to be accessible, which is very stimulating.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们所见，一些数学定理可以通过组合探索来解决。在这篇文章中，我们研究了拟群存在性/不存在性的问题。在这些问题中，一些开放性问题似乎是可以访问的，这非常具有激励性。
- en: 'Some ideas to improve on our current approach to quasigroups existence:'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 一些改进我们当前关于拟群存在性方法的想法：
- en: refine the model which is still fairly simple
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 精炼仍然相当简单的模型
- en: explore more sophisticated heuristics
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 探索更复杂的启发式算法
- en: run the code on the cloud (using docker, for example)
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在云端运行代码（例如使用 docker）
- en: '* * *'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Some useful links to go further with NuCS:'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 一些有助于进一步学习 NuCS 的有用链接：
