- en: 'Javascript Fatigue: HTMX Is All You Need to Build ChatGPT — Part 1'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: JavaScript 疲劳：HTMX 是构建 ChatGPT 的全部所需 — 第 1 部分
- en: 原文：[https://towardsdatascience.com/javascript-fatigue-you-dont-need-js-to-build-chatgpt/](https://towardsdatascience.com/javascript-fatigue-you-dont-need-js-to-build-chatgpt/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://towardsdatascience.com/javascript-fatigue-you-dont-need-js-to-build-chatgpt/](https://towardsdatascience.com/javascript-fatigue-you-dont-need-js-to-build-chatgpt/)'
- en: Summary
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: Introduction about HTML and the Web
  id: totrans-3
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 关于 HTML 和 Web 的简介
- en: A simple HTMX demo
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个简单的 HTMX 示例
- en: A basic Chat with HTMX and FastAPI
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 HTMX 和 FastAPI 进行基本的聊天
- en: A more advanced chat with Streaming and Server-Sent Events
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用流和服务器发送事件进行更高级的聊天
- en: An agentic chatbot with Gemini and ADK
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 Gemini 和 ADK 的代理聊天机器人
- en: Conclusion
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 结论
- en: Introduction
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 简介
- en: I remember there was a time, long ago, when building websites was easy. HTML
    and CSS. It felt simple. Nowadays, Javascript frameworks are everywhere. Relentless
    change, increasing complexity. This phenomenon is called “*Javascript Fatigue*”
    and is all about developers exhausted by chasing the latest frameworks, build
    tools, libraries, and trying to keep the pace. But with **HTMX**, developers now
    have a way to build engaging web applications with greater simplicity and less
    burnout — and without all the JS hassle.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 我记得很久以前，构建网站是很容易的。HTML 和 CSS。感觉很简单。如今，JavaScript 框架无处不在。不断的变化，复杂性不断增加。这种现象被称为“*JavaScript
    疲劳*”，它完全是关于开发者因追逐最新的框架、构建工具、库而感到疲惫，并试图跟上节奏。但有了 **HTMX**，开发者现在有了一种以更大的简单性和更少的疲惫来构建引人入胜的
    Web 应用程序的方法——而且无需所有这些 JavaScript 烦恼。
- en: 'And by engaging web applications, I mean something like ChatGPT, in less than
    200 lines of code, pure Python and HTML. Like this one:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 我所说的参与式 Web 应用程序是指像 ChatGPT 这样的东西，在不到 200 行代码中，纯 Python 和 HTML。就像这样：
- en: '![](../Images/f4bed04299913ad165c787a79beb60a9.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/f4bed04299913ad165c787a79beb60a9.png)'
- en: A quick refresher on how the Web worked
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 快速回顾一下 Web 是如何工作的
- en: When Tim Berners-Lee created the first web page in 1990, the system he designed
    was mostly a “read-only” system, that would lead to pages connected between themselves
    with hyperlinks, which we all know as anchor tags in HTML. HTML 1.0 was therefore
    relying on one single tag and offered simple navigation between pages.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 当蒂姆·伯纳斯-李（Tim Berners-Lee）在 1990 年创建了第一个网页时，他设计的系统基本上是一个“只读”系统，通过超链接将页面连接起来，这就是我们所有人都知道的
    HTML 中的锚点标签。因此，HTML 1.0 依赖于一个单一的标签，并提供了页面之间的简单导航。
- en: '[PRE0]'
  id: totrans-15
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'The anchor tag is a hypermedia control that does the following process:'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 锚点标签是一个超媒体控件，执行以下过程：
- en: show the user that this is a link (clickable)
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 向用户显示这是一个链接（可点击）
- en: issue a GET request to the hyperlink URL
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 向超链接 URL 发起 GET 请求
- en: When the server responds with a new page, the browser will replace the current
    page with the new page (navigation)
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 当服务器响应一个新页面时，浏览器将用新页面替换当前页面（导航）
- en: 'Then came Web 2.0 which introduced a new tag, the form tag. This tag allowed
    to update ressources in addition to reading them via the `<a>` tag. Being able
    to update ressources meant that we could really start building web applications.
    All of this with only two controls: `<form>` and `<a>`.'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 然后出现了 Web 2.0，它引入了一个新的标签，即表单标签。这个标签允许除了通过 `<a>` 标签读取资源外，还可以更新资源。能够更新资源意味着我们可以真正开始构建
    Web 应用程序。所有这些只需要两个控件：`<form>` 和 `<a>`。
- en: '[PRE1]'
  id: totrans-21
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'The process when submitting a form is quite similar to the anchor tag, except
    that we can:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 提交表单的过程与锚点标签非常相似，但我们可以：
- en: choose which kind of request we want to perform (GET or POST)
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 选择我们想要执行哪种类型的请求（GET 或 POST）
- en: attach user information like email, password, etc. to be passed with the request
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将用户信息（如电子邮件、密码等）附加到请求中传递
- en: The two tags are the only elements, in pure HTML, that can interact with a server.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 这两个标签是纯 HTML 中唯一可以与服务器交互的元素。
- en: And then came Javascript.
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 接着是 JavaScript。
- en: 'JavaScript was originally created to add simple interactions to web pages:
    form validation, data fetching, and basic animations. But with the introduction
    of XMLHttpRequest (later known as AJAX), JavaScript evolved into something much
    more powerful and complex.'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: JavaScript 最初是为了向网页添加简单的交互而创建的：表单验证、数据获取和基本动画。但随着 XMLHttpRequest（后来被称为 AJAX）的引入，JavaScript
    发展成为一种更加强大和复杂的工具。
- en: With AJAX, developers could now trigger HTTP requests without the two tags.
    AJAX allows fetching data from the server, and though XHR can fetch any type of
    data — including raw HTML fragments, text, or XML — JSON became the de facto data
    exchange format.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 通过 AJAX，开发者现在可以触发 HTTP 请求，而无需两个标签。AJAX 允许从服务器获取数据，尽管 XHR 可以获取任何类型的数据——包括原始 HTML
    片段、文本或 XML——但 JSON 成为了事实上的数据交换格式。
- en: 'This means there needs to be an additional step where JSON gets converted to
    HTML, via a function that renders HTML from JSON. As shown in the example below,
    we proceed by:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着需要额外的步骤，将JSON转换为HTML，通过一个从JSON渲染HTML的函数来完成。如下面的示例所示，我们通过以下步骤进行：
- en: fetching JSON data from the `/api/users` endpoints (the `response => response.json()`
    part)
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从`/api/users`端点（`response => response.json()`部分）获取JSON数据
- en: inserting this data into a HTML templates (the `const html` part)
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将这些数据插入到HTML模板中（`const html`部分）
- en: that will then be added to the DOM (the `document.getElementById()` part)
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 然后将这些添加到DOM中（`document.getElementById()`部分）
- en: '[PRE2]'
  id: totrans-33
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '**This rendering involves a tight coupling between the JSON data format and
    the HTML rendering: if the JSON data format changes, it breaks the HTML rendering
    function**. This point is usually a source of friction between frontend and backend
    developers: frontend dev builds a UI based on an expected JSON format, backend
    dev decides to change the format, frontend dev needs to update UI, backend dev
    changes again, frontend dev changes again, etc.'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: '**这种渲染涉及JSON数据格式和HTML渲染之间的紧密耦合：如果JSON数据格式发生变化，它就会破坏HTML渲染函数**。这一点通常是前端和后端开发者之间摩擦的来源：前端开发者基于预期的JSON格式构建UI，后端开发者决定更改格式，前端开发者需要更新UI，后端开发者再次更改，前端开发者再次更改，等等。'
- en: Eventually, the industry pivoted heavily toward JSON-driven architectures, giving
    rise to **Single-Page Applications (SPAs)**. We stopped building websites that
    navigated from page to page and started building software that lives entirely
    inside the browser. In this model, the server is reduced to a simple data API,
    while JavaScript handles the heavy lifting of state management and UI rendering.
    This is the engine behind React, Angular, and Vue — powerful, but complex.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 最终，行业大量转向由JSON驱动的架构，从而催生了**单页应用程序（SPAs）**。我们不再构建需要从一页跳转到另一页的网站，而是开始构建完全位于浏览器内的软件。在这个模型中，服务器被简化为一个简单的数据API，而JavaScript则负责处理状态管理和UI渲染的重任。这是React、Angular和Vue背后的引擎——强大但复杂。
- en: 'Below are some thoughts from an excellent source which I encourage you to read
    so you can make your mind:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是一些来自优秀来源的思考，我鼓励你阅读，以便你可以做出自己的判断：
- en: '*“The emerging norm for web development is to build a React single-page application,
    with. server rendering. The two key elements of this architecture are something
    like:*'
  id: totrans-37
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*“网络开发的兴起规范是构建一个具有服务器渲染的React单页应用程序，其关键元素类似于：*'
- en: '*– The main UI is built & updated in JavaScript using React or something similar.*'
  id: totrans-38
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*– 主要UI是用React或类似的东西在JavaScript中构建和更新的。*'
- en: '*– The backend is an API that that application makes requests against.*'
  id: totrans-39
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*– 后端是一个应用程序对其发起请求的API。*'
- en: '*This idea has really swept the internet. It started with a few major popular
    websites and has crept into corners like marketing sites and blogs.”*'
  id: totrans-40
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*这个想法真的在互联网上引起了轰动。它始于几个主要流行的网站，然后逐渐渗透到营销网站和博客等角落。“*'
- en: ''
  id: totrans-41
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*(Tom MacWright, https://macwright.com/2020/05/10/spa-fatigue)*'
  id: totrans-42
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*(汤姆·麦克赖特，https://macwright.com/2020/05/10/spa-fatigue)*'
- en: Most current SPA architectures are “client-thick” applications where most of
    the job occurs on the client-side and where the backend is merely an API returning
    JSON. This setup is known for providing snappy and smooth user experiences, but
    do we really need that complexity every time?
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数当前的SPA架构是“客户端厚重”的应用程序，其中大部分工作发生在客户端，而后端只是一个返回JSON的API。这种设置以其提供迅速和流畅的用户体验而闻名，但我们真的每次都需要这种复杂性吗？
- en: '*“(…) there are also a lot of problems for which I can’t see any concrete benefit
    to using React. Those are things like blogs, shopping-cart-websites, mostly-CRUD-and-forms-websites.”*'
  id: totrans-44
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*“（…）还有一些问题，我觉得使用React并没有带来任何具体的益处。这些主要是像博客、购物车网站、主要是CRUD和表单网站。”*'
- en: ''
  id: totrans-45
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*(Tom MacWright, [https://macwright.com/2020/05/10/spa-fatigue](https://macwright.com/2020/05/10/spa-fatigue))*'
  id: totrans-46
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*(汤姆·麦克赖特，[https://macwright.com/2020/05/10/spa-fatigue](https://macwright.com/2020/05/10/spa-fatigue))*'
- en: Javascript Fatigue is real
  id: totrans-47
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: JavaScript疲劳是真实的
- en: 'As the dominance of SPAs grew, so did the number of Javascript frameworks and
    the complexity associated to it. For developers, this profusion of choices, opinionated
    frameworks and libraries eventually led to a collective sense of exhaustion called
    “Javascript Fatigue”. Here are some reasons to this Javascript frameworks burn-out:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 随着SPAs的盛行，JavaScript框架的数量以及与之相关的复杂性也在增加。对于开发者来说，这种选择过剩、有偏见的框架和库最终导致了一种集体疲劳感，被称为“JavaScript疲劳”。以下是JavaScript框架燃尽的一些原因：
- en: '**Increasing complexity**: Libraries and frameworks have become increasingly
    heavy and complex, requiring big teams to manage. Some opinionated frameworks
    also mean that JS developers have to specialize on one tech. No Python developer
    ever called themself “A Tensorflow Python developer”. They’re just Python developers,
    and switching from TF to Pytorch is not a problem.'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**复杂性增加**：库和框架变得越来越庞大和复杂，需要大型团队来管理。一些有偏见的框架还意味着 JS 开发者必须专注于一种技术。没有 Python 开发者会称自己为“Tensorflow
    Python 开发者”。他们只是 Python 开发者，从 TF 切换到 Pytorch 并不是问题。'
- en: '**Tight coupling**: The coupling between data APIs and the UI creates friction
    within teams. Breaking changes occur everyday, and there is no way to solve this
    as long as teams use JSON as their exchange interface.'
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**紧密耦合**：数据 API 和 UI 之间的耦合在团队内部造成摩擦。每天都有破坏性变化发生，只要团队使用 JSON 作为他们的交换接口，就无法解决这个问题。'
- en: '**Framework proliferation**: The number of frameworks keeps increasing, leading
    to a real feeling of “fatigue” among JS developers.'
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**框架激增**：框架的数量持续增加，导致 JS 开发者感到真正的“疲劳”。'
- en: '**Over-engineering**: You don’t need JS-heavy frameworks 90% of the time. And
    in some cases (content-heavy apps), it is even a bad idea (cf Tom MacWright’s
    blog post)'
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**过度设计**：90% 的时间你不需要重量级的 JS 框架。在某些情况下（内容密集型应用），这甚至是一个坏主意（参考 Tom MacWright 的博客文章）'
- en: Except for highly interactive/collaborative UIs, simple HTML with Multi-Page
    Applications is often enough. So how do we go back to good old HTML ?
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 除了高度交互式/协作的 UI 之外，简单的 HTML 和多页面应用通常就足够了。那么我们如何回到古老的 HTML 呢？
- en: HTMX is All You Need
  id: totrans-54
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: HTMX 是你所需要的全部
- en: HTMX is a very lightweight JS library (14k) that offers a HTML-centric approach
    to building dynamic web applications. It extends HTML by allowing any element
    to make AJAX requests and update any part of the DOM. Unlike JS frameworks which
    do all the rendering on the client side, the heavy lifting is done by the server
    by returning HTML fragments to be inserted in the DOM. This also means that if
    you already know templating engines and HTML, the learning curve will be much
    much much easier compared to learning React or Angular.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: HTMX 是一个非常轻量级的 JS 库（14k），它采用以 HTML 为中心的构建动态 Web 应用程序的方法。它通过允许任何元素发起 AJAX 请求并更新
    DOM 的任何部分来扩展 HTML。与在客户端进行所有渲染的 JS 框架不同，繁重的工作由服务器完成，通过返回要插入 DOM 中的 HTML 片段。这也意味着，如果你已经熟悉模板引擎和
    HTML，与学习 React 或 Angular 相比，学习曲线将容易得多。
- en: 'Instead of abandoning hypermedia for JSON APIs, HTMX makes HTML more capable
    with the following:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 与放弃超媒体转而使用 JSON API 相比，HTMX 通过以下方式使 HTML 更加强大：
- en: Any element can make HTTP requests (not just `<a>` and `<form>`)
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 任何元素都可以发起 HTTP 请求（不仅仅是 `<a>` 和 `<form>`）
- en: Any HTTP method (GET, POST, PUT, DELETE, PATCH)
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 任何 HTTP 方法（GET、POST、PUT、DELETE、PATCH）
- en: Any element can be targeted for updates
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 任何元素都可以被用于更新
- en: Any event can trigger requests (click, submit, load, etc.)
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 任何事件都可以触发请求（点击、提交、加载等）
- en: In fact, you can actually write your own little GPT-like UI with HTMX and just
    a few lines of Python!
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，你实际上可以用 HTMX 和几行 Python 编写自己的小 GPT-like UI！
- en: A Simple HTMX demo
  id: totrans-62
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 简单的 HTMX 示例
- en: For this article, we will build a little chat with less than 100 lines of Python
    and HTML. But before that, we will start with a simple demo to show how HTMX works.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这篇文章，我们将用不到 100 行的 Python 和 HTML 来构建一个小聊天应用。但在那之前，我们将从一个简单的演示开始，展示 HTMX 的工作原理。
- en: Let’s assume we have an API that returns a list of users. We want to click a
    button to fetch the data and display a list.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我们有一个返回用户列表的 API。我们想点击一个按钮来获取数据并显示列表。
- en: '![](../Images/dd0f0c945e295b8fec688876112a1ea8.png)'
  id: totrans-65
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/dd0f0c945e295b8fec688876112a1ea8.png)'
- en: In the traditional, JS-way, one would probably do like below. Notice how in
    this case we are using vanilla Javascript, and not even installing Next or Vite
    with their dozens of Mb of dependencies !
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 在传统的 JS 方式下，你可能会这样做。注意，在这种情况下，我们使用的是原生 JavaScript，甚至没有安装 Next 或 Vite 以及它们的数十兆依赖项！
- en: '[PRE3]'
  id: totrans-67
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: And this is how you would do with HTMX.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 而使用 HTMX 则是这样做的。
- en: 'First create your backend:'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 首先创建你的后端：
- en: '[PRE4]'
  id: totrans-70
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'And then the HTML:'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 然后是 HTML：
- en: '[PRE5]'
  id: totrans-72
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: And you get exactly the same result! What happened just here? Look at the `<button>`
    element. We see 3 attributes starting with `hx-`. What are they here for?
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 你会得到完全相同的结果！这里发生了什么？看看 `<button>` 元素。我们看到有 3 个以 `hx-` 开头的属性。它们在这里有什么作用？
- en: '`hx-get`: Clicking on this button will trigger a GET request to the `/users`
    endpoint'
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`hx-get`：点击这个按钮将触发对 `/users` 端点的 GET 请求'
- en: '`hx-target`: It tells the browser to replace the content of the element which
    has the `usersList` id with the HTML data received from the server'
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`hx-target`: 它告诉浏览器用从服务器接收的 HTML 数据替换具有 `usersList` id 的元素的 内容'
- en: '`hx-swap`: It tells the browser to insert the HTML inside the target element'
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`hx-swap`: 它告诉浏览器在目标元素内插入 HTML'
- en: With that, you already know how to use HTMX. The beautiful thing about this
    way of doing is that if you decide changing your HTML, it won’t break anything
    on your page.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 通过这样，你已经知道了如何使用 HTMX。这种方式的好处在于，如果你决定更改你的 HTML，它不会破坏你页面上的任何内容。
- en: There are, of courses, advantages and drawbacks in using HTMX. But as a Python
    developer, it feels very nice to play around with my FastAPI backend and not worry
    a lot about rendering HTML. Just add Jinja templates, a dose of Tailwind CSS,
    and you’re good to go!
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，使用 HTMX 有其优点和缺点。但作为一个 Python 开发者，能够与我的 FastAPI 后端玩耍，而不必过多担心渲染 HTML，感觉非常好。只需添加
    Jinja 模板，一点 Tailwind CSS，你就可以开始了！
- en: Our first chat with HTMX and FastAPI
  id: totrans-79
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 我们第一次使用 HTMX 和 FastAPI 进行聊天
- en: 'So now is the moment when things are getting serious. To build our chatbot,
    we will proceed step by step:'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 所以现在是我们开始认真的时候了。为了构建我们的聊天机器人，我们将一步一步地进行：
- en: Plug a real LLM with a Google Search tool to ***get real answers and illustrate
    the concepts of agentic chatbots***
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将一个真实的 LLM 与 Google 搜索工具连接起来，以获得真实答案并说明***代理聊天机器人的概念***
- en: Start with a a dumb chatbot that will take the users query, and spit it backwards.
    This will illustrate ***how HTMX sends and receives data***
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从一个简单的聊天机器人开始，它将用户的查询取反。这将说明***HTMX 如何发送和接收数据***
- en: Add a streaming capability to our chatbot that will spit out the user’s query
    word by word, to illustrate ***Server-Sent Events (SSE) and async communication***
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为我们的聊天机器人添加一个流式处理能力，将用户的查询词逐个输出，以说明***服务器端事件 (SSE) 和异步通信***
- en: 'Let’s begin with our dumb chatbot. For that we will design a simple UI that
    will take:'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从我们的简单聊天机器人开始。为此，我们将设计一个简单的用户界面，它将：
- en: a list of messages
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一系列消息
- en: a textarea for the user’s input
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用户输入的文本区域
- en: 'And guess what, HTMX will take care of sending/receiving the messages! This
    is what the result will look like:'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 猜猜看，HTMX 将负责发送/接收消息！结果将如下所示：
- en: '![](../Images/fa89801c979f9c20936fd6fcc880f0e7.png)'
  id: totrans-88
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/fa89801c979f9c20936fd6fcc880f0e7.png)'
- en: Overview
  id: totrans-89
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 概述
- en: 'The flow is the following:'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 流程如下：
- en: User inputs a query in a textarea
  id: totrans-91
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 用户在文本区域中输入查询
- en: This textarea is wrapped in a form, which will send a POST request to the server
    with the `query` parameter.
  id: totrans-92
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 这个文本区域被一个表单包裹，该表单将带有 `query` 参数的 POST 请求发送到服务器。
- en: The backend receives the request, does something with the `query` (in real life,
    we can use a LLM to answer the query). In our case, for demo purposes, we will
    just reply by reverting the query letter by letter.
  id: totrans-93
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 后端接收请求，对 `query` 进行处理（在现实生活中，我们可以使用大型语言模型来回答查询）。在我们的例子中，为了演示目的，我们将逐字逐句地回复查询。
- en: The backend wraps the response in an HTMLResponse (not JSON!)
  id: totrans-94
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 后端将响应包裹在 HTMLResponse 中（不是 JSON！）
- en: In our form, HTMX tells the browser where to insert the response, as shown in
    the `hx-target`, and how to swap it with the current DOM
  id: totrans-95
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在我们的表单中，HTMX 告诉浏览器在哪里插入响应，如 `hx-target` 所示，以及如何与当前 DOM 交换
- en: And this is all. So let’s begin!
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 就这些了。那么，让我们开始吧！
- en: Backend
  id: totrans-97
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 后端
- en: We will define a `/send` route that expect a `query` string from the frontend,
    inverts it, and sends it back in a `<li>` tag.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将定义一个 `/send` 路由，它期望从前端接收一个 `query` 字符串，将其反转，并以 `<li>` 标签的形式发送回来。
- en: '[PRE6]'
  id: totrans-99
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Frontend
  id: totrans-100
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 前端
- en: 'On the frontend side, we define a simple HTML page using Tailwind CSS and HTMX:'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 在前端，我们使用 Tailwind CSS 和 HTMX 定义一个简单的 HTML 页面：
- en: '[PRE7]'
  id: totrans-102
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'Let’s have a closer look the `<form>` tag. This tag has several attributes,
    so let’s take a minute to review them:'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们更仔细地看看 `<form>` 标签。这个标签有几个属性，所以让我们花点时间来回顾一下：
- en: '`hx-post="/send"`: It will make a POST request to the `/send` endpoint.'
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`hx-post="/send"`: 它将向 `/send` 端点发送 POST 请求。'
- en: '`hx-trigger="click from:#submitButton"`: This means the request will be triggered
    when the `submitButton`is clicked'
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`hx-trigger="click from:#submitButton"`: 这意味着当点击 `submitButton` 时将触发请求'
- en: '`hx-target="#chat"`: This tells the browser where to put the HTML response.
    In that case, we want the response to be appended to the list.'
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`hx-target="#chat"`: 这告诉浏览器将 HTML 响应放在哪里。在这种情况下，我们希望响应被附加到列表中。'
- en: '`hx-swap="beforeend"`: The hx-target tells where to put the content, the hx-swap
    tells HOW. In that case, we want the content to be added before the end (so after
    the last child)'
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`hx-swap="beforeend"`: hx-target 告诉内容放置的位置，hx-swap 告诉如何放置。在这种情况下，我们希望内容在末尾之前添加（即在最后一个子元素之后）'
- en: The `hx-on::before-request` is a little bit more complex, but can be explained
    easily. It basically happens between the click and the moment the request is sent.
    It will add the user input the bottom of the list, and clear the user input. This
    way, we get a snappy user experience!
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: '`hx-on::before-request`稍微复杂一些，但很容易解释。它基本上发生在点击和发送请求的瞬间。它会在列表底部添加用户输入，并清除用户输入。这样，我们就能获得一个快速的用户体验！'
- en: A Better chat with Streaming and SSE
  id: totrans-109
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用流式传输和SSE的更好聊天
- en: What we built is a very simple yet functional chat, however if we want to plug
    a LLM, we might have some times when the response from the server takes a long
    time. The way our current chat is built is synchronous, meaning nothing will happen
    until the LLM is finished writing. Not a great user experience.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 我们构建的是一个非常简单但实用的聊天工具，然而如果我们想要接入LLM，可能会遇到服务器响应时间过长的情况。我们目前的聊天工具是同步的，这意味着直到LLM完成写作，什么都不会发生。这不是一个很好的用户体验。
- en: What we need now is streaming, and a real LLM to have a conversation with. [And
    this is Part 2](https://towardsdatascience.com/javascript-fatigue-you-dont-need-js-to-build-chatgpt-part-2/).
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在需要的是流式传输，以及一个真正的LLM来进行对话。[这是第二部分](https://towardsdatascience.com/javascript-fatigue-you-dont-need-js-to-build-chatgpt-part-2/).
