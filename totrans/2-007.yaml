- en: 'LLM Monitoring and Observability: Hands-on with Langfuse'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/llm-monitoring-and-observability-hands-on-with-langfuse/](https://towardsdatascience.com/llm-monitoring-and-observability-hands-on-with-langfuse/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '<mdspan datatext="el1756160566327" class="mdspan-comment">Let’s start with
    an example</mdspan>: You have built a complex LLM application that responds to
    user queries about a specific domain. You have spent days setting up the complete
    pipeline, from refining your prompts to adding context retrieval, chains, tools
    and finally presenting the output. However, after deployment, you realize that
    the application’s response seems to be missing the mark e.g., either you are not
    satisfied with its responses or it’s taking an exorbitant amount of time to respond.
    Whether the problem is rooted in your prompts, your retrieval, API calls, or somewhere
    else, **monitoring and observability** can help you sort it out.'
  prefs: []
  type: TYPE_NORMAL
- en: In this tutorial, we will start by learning the basics of LLM monitoring and
    observability. Then, we will explore the open-source ecosystem, culminating our
    discussion on **Langfuse**. Finally, we will implement monitoring and observability
    of a Python based LLM application using Langfuse.
  prefs: []
  type: TYPE_NORMAL
- en: What is Monitoring and Observability?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Monitoring and observability are crucial concepts in maintaining the health
    of *any* IT system. While the terms ‘monitoring’ and ‘observability’ are often
    clipped together, they represent slightly different concepts.
  prefs: []
  type: TYPE_NORMAL
- en: According to [IBM’s definition](https://www.ibm.com/think/topics/observability-vs-monitoring),
    **monitoring** is the process of collecting and analyzing system data to track
    performance over time. It relies on predefined metrics to detect anomalies or
    potential failures. Common examples include tracking system’s CPU and memory usage
    and alerting when certain thresholds are breached.
  prefs: []
  type: TYPE_NORMAL
- en: '**Observability** provides a deeper understanding of the system’s internal
    state based on external outputs. It allows you to diagnose and understand why
    something is happening, not just that something is wrong. For example, observability
    allows you to trace inputs and outputs through various parts of the system to
    spot where a bottleneck is occurring.'
  prefs: []
  type: TYPE_NORMAL
- en: The above definitions are also valid in the realm of LLM applications. It’s
    through monitoring and observability that we can trace the internal states of
    an LLM application, such as how user query is processed through various modules
    (e.g., retrieval, generation) and what are associated latencies and costs.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c52237e278520bb4bc50e4c8367a5f80.png)'
  prefs: []
  type: TYPE_IMG
- en: '*A basic LLM-RAG application architecture – made using* [*excalidraw.com*](https://excalidraw.com)'
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are some key terms used in the monitoring and observability:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Telemetry**: Telemetry is a broad term which encompasses collecting data
    from your application while it’s running and processing it to understand the behavior
    of the application.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Instrumentation**: Instrumentation is the process of adding code to your
    application to collect telemetry data. For LLM applications, this means adding
    hooks at various key points to capture internal states, such as API calls to the
    LLM or the retriever’s outputs.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Trace**: Trace, a direct consequence of instrumentation, highlights the detailed
    execution journey of a request through the entire application. This encompasses
    input/output at each key point and the corresponding time taken at each point.
    Each trace is made up of a sequence of spans.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Observation**: Each trace is made up of one or more observations, which can
    be of type Span, Event or Generation.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Span**: Span is a unit of work or operation, which explains the process being
    carried out on each key point.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Generation**: Generation is a special kind of span which tracks the input
    request sent to the LLM model and its output response.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Logs**: Logs are time stamped records of events and interactions within the
    LLM application.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Metrics**: Metrics are numerical measurements that provide aggregate insights
    into the LLM’s behavior and performance such as hallucinations or answer relevancy.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a82a5ab919f828ce105ffbda5ca2dde1.png)'
  prefs: []
  type: TYPE_IMG
- en: 'A sample trace containing several spans and generations. Image source: [Langfuse
    Tracing](https://langfuse.com/docs/tracing-data-model)'
  prefs: []
  type: TYPE_NORMAL
- en: Why is LLM Monitoring and Observability Necessary?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'As LLM applications are becoming increasingly complex, LLM monitoring and observability
    can play a crucial role in optimizing the application performance. Here are some
    reasons why it is important:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Reliability**: LLM applications are critical to organizations; performance
    degradation can directly impact their businesses. Monitoring ensures that the
    application is performing within the acceptable limits in terms of quality, latency
    and uptime etc.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Debugging:** A complex LLM application can be unpredictable; it can produce
    erroneous responses or encounter errors. Monitoring and Observability can help
    identify problems in the application by sifting through the complete lifecycle
    of each request and pinpointing the root cause.'
  prefs: []
  type: TYPE_NORMAL
- en: '**User Experience:** Monitoring user experience and feedback is vital for LLM
    applications which directly interact with the customer base. This allows organizations
    to enhance user experience by tracking the user conversations and making informed
    decisions. Most importantly, it allows collection of users’ feedback to improve
    the model and downstream processes.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Bias and Fairness:** LLMs are trained on publicly available data and therefore
    sometimes internalize the possible bias in the available data. This might cause
    them to produce offensive or harmful information. Observability can help in mitigating
    such responses through proper corrective measures.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Cost Management:** Monitoring can help you track and optimize costs incurred
    during the regular operations, such as LLM’s API costs per token. You can also
    set up alerts in case of over usage.'
  prefs: []
  type: TYPE_NORMAL
- en: Tools for Monitoring and Observability
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: There are many amazing tools and libraries available for enabling monitoring
    and observability of LLM applications. Plenty of these tools are open source,
    offering free self-hosting solutions on local infrastructure as well as enterprise
    level deployment on their respective cloud servers. Each of these tools offers
    common features such as tracing, token count, latencies, total requests, and time-based
    filtering etc. Apart from this, each solution has its own set of distinct features
    and strengths.
  prefs: []
  type: TYPE_NORMAL
- en: Here, we are going to name only a few open-source tools which offer free self-hosting
    solutions.
  prefs: []
  type: TYPE_NORMAL
- en: '[**Langfuse**](https://langfuse.com/docs)**:** A popular open source LLM monitoring
    tool, which is both model and framework agnostic. It offers a wide range of monitoring
    options using Client SDKs purpose built for Python and JavaScript/TypeScript.'
  prefs: []
  type: TYPE_NORMAL
- en: '[**Arize Phoenix**](https://docs.arize.com/phoenix)**:** Another popular tool
    which offers both self-hosting and Phoenix Cloud deployment. Phoenix offers SDKs
    for Python and JavaScript/TypeScript.'
  prefs: []
  type: TYPE_NORMAL
- en: '[**AgentOps**](https://docs.agentops.ai/v1/introduction)**:** AgentOps is a
    well-known solution which tracks LLM outputs, retrievers, allows benchmarking,
    and ensures compliance. It offers integration with several LLM providers.'
  prefs: []
  type: TYPE_NORMAL
- en: '[**Grafana**](https://grafana.com/blog/2024/10/21/monitor-your-generative-ai-app-with-the-ai-observability-solution-in-grafana-cloud/)**:**
    A classic and widely used monitoring tool which can be combined with OpenTelemetry
    to provide detailed LLM tracing and monitoring.'
  prefs: []
  type: TYPE_NORMAL
- en: '[**Weave**](https://weave-docs.wandb.ai/quickstart)**:** Weights & Biases’
    Weave is another LLM tracking and experimentation tool for LLM based applications,
    which offers both self-managed and dedicated cloud environments. The Client SDKs
    are available in Python and TypeScript.'
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Introducing Langfuse
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary></summary>
  prefs: []
  type: TYPE_NORMAL
- en: '*Note: Langfuse should not be confused with* [*LangSmith*](https://docs.smith.langchain.com/)*,
    which is a proprietary Monitoring and Observability tool, developed and maintained
    by the LangChain community. You can learn more about the differences* [*here*](https://langfuse.com/faq/all/langsmith-alternative)*.*</details>'
  prefs: []
  type: TYPE_NORMAL
- en: Langfuse offers a wide variety of features such as LLM observability, tracing,
    LLM token and cost monitoring, prompt management, datasets and LLM security. Additionally,
    Langfuse offers evaluation of LLM responses using various techniques such as LLM-as-a-Judge
    and user’s feedback. Moreover, Langfuse offers LLM playground to its premium users,
    which allows you to tweak your LLM prompts and parameters on the spot and watch
    how LLM responds to those changes. We will discuss more details later on in our
    tutorial.
  prefs: []
  type: TYPE_NORMAL
- en: 'Langfuse’s solution to LLM monitoring and observability consists of two parts:'
  prefs: []
  type: TYPE_NORMAL
- en: Langfuse SDKs
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Langfuse Server
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The **Langfuse SDKs** are the coding side of Langfuse, available for various
    platforms, which allow you to enable instrumentation in your application’s code.
    They are nothing more than a few lines of code which can be used appropriately
    in your application’s codebase.
  prefs: []
  type: TYPE_NORMAL
- en: The **Langfuse server**, on the other hand, is the UI based dashboard, along
    with other underlying services, which can be used to log, view and persist all
    the traces and metrics. The Langfuse’s dashboard is usually accessible through
    any modern web browser.
  prefs: []
  type: TYPE_NORMAL
- en: 'Before setting up the dashboard, it’s important to note that Langfuse offers
    three different ways of hosting dashboards, which are:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Self-hosting** (local)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Managed hosting** (using Langfuse’s cloud infrastructure)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**On-premises** deployment'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The managed and on-premises deployment are beyond the scope of this tutorial.
    You can visit Langfuse’s official documentation to get all the relevant information.
  prefs: []
  type: TYPE_NORMAL
- en: A ***self-hosting***solution, as the name implies, enables you to simply run
    an instance of Langfuse on your own machine (e.g., PC, laptop, virtual machine
    or web service). However, there is a catch in this simplicity. The Langfuse server
    requires a persistent Postgres database server to continuously maintain its states
    and data. This means that along with a Langfuse server, we also need to set up
    a Postgres server. But don’t worry, we have got things under control. You can
    either use a Postgres server hosted on any cloud service (such as Azure, AWS),
    or you can easily self-host it, just like Langfuse service. Capiche?
  prefs: []
  type: TYPE_NORMAL
- en: How is Langfuse’s self-hosting accomplished? Langfuse offers [several ways](https://langfuse.com/self-hosting)
    to do that, such as using docker/docker-compose or Kubernetes and/or deploying
    on cloud servers. For the time being, let’s stick to leveraging docker commands.
  prefs: []
  type: TYPE_NORMAL
- en: Setting Up a Langfuse Server
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now, it’s time to get hands-on experience with setting up a Langfuse dashboard
    for an LLM application and logging traces and metrics onto it. When we say Langfuse
    server, we mean the Langfuse’s dashboard and other services which allow the traces
    to be logged, viewed and persisted. This requires a fundamental understanding
    of docker and its associated concepts. You can go through this [tutorial](https://towardsdatascience.com/an-intuitive-guide-to-docker-for-data-science-ba3f94e9052c/),
    if you are not already familiar with docker.
  prefs: []
  type: TYPE_NORMAL
- en: Using docker-compose
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The most convenient and the fastest way to set up Langfuse on your own machine
    is to use a docker-compose file. This is just a two-step process, which involves
    cloning Langfuse on your local machine and simply invoking docker-compose.
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 1: Clone the [Langfuse’s repository](https://github.com/langfuse/langfuse)**:**'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'Step 2: Start all services'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: And that’s it! Go to your web browser and open [**http://localhost:3000**](http://localhost:3000)to
    witness Langfuse UI working. Also cherish the fact that docker-compose takes care
    of the Postgres server automatically.
  prefs: []
  type: TYPE_NORMAL
- en: From this point, we can safely move on to the section of setting up Python SDK
    and enabling instrumentation in our code.
  prefs: []
  type: TYPE_NORMAL
- en: Using docker
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The docker setup of the Langfuse server is like a docker-compose implementation,
    with an obvious difference: we will set up both the containers (Langfuse and Postgres)
    separately and will connect them using an internal network. This might be helpful
    in scenarios where docker-compose is not the suitable first choice, maybe because
    you already have your Postgres server running, or you want to run both services
    separately for more control, such as hosting both services separately on Azure
    Web App Services due to resource limitations.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 1: Create a custom network'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: First, we need to set up a custom bridge network, which will allow both the
    containers to communicate with each other privately.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: This command creates a network by the name `langfuse-network`. Feel free to
    change it according to your preferences.
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 2: Set up a Postgres service'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'We will start by running the Postgres container, since Langfuse service depends
    on this, using the following command:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: '**Explanation**:'
  prefs: []
  type: TYPE_NORMAL
- en: 'This command will run a docker image of `postgres:latest` as a container with
    the name `postgres-db`, on a network named `langfuse-network` and expose this
    service to port `5432` on your local machine. For persistence, (i.e. to keep data
    intact for future use) it will create a volume and connect it to a folder named
    `database_data` on your local machine. Furthermore, it will set up and assign
    values to three crucial environment variables of a Postgres server’s superuser:
    `POSTGRES_USER`, `POSTGRES_PASSWORD` and `POSTGRES_DB`.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 3: Set up the Langfuse service'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: '**Explanation**:'
  prefs: []
  type: TYPE_NORMAL
- en: Likewise, this command will run a docker image of `langfuse/langfuse:2` in the
    detached mode (`-d`), as a container with the name `langfuse-server`, on the same
    network called `langfuse-network` and expose this service to port `3000`. It will
    also assign values to mandatory environment variables. The `NEXTAUTH_URL` must
    point to the URL where the `langfuse-server` would be deployed.
  prefs: []
  type: TYPE_NORMAL
- en: '`ENCRYPTION_KEY` must be 256 bits, 64 string characters in hex format. You
    can generate this in Linux via:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: 'The `DATABASE_URL` is an environment variable which defines the complete database
    path and credentials. The general format for Postgres URL is:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: Here, the `host` is the host name (i.e. container name) of our PostgreSQL server
    or the IP address.
  prefs: []
  type: TYPE_NORMAL
- en: Finally, go to your web browser and open [**http://localhost:3000**](http://localhost:3000)to
    verify that the Langfuse server is available.
  prefs: []
  type: TYPE_NORMAL
- en: Configuring Langfuse Dashboard
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Once you have successfully set up the Langfuse server, it’s time to configure
    the Langfuse dashboard before you can start tracing application data.
  prefs: []
  type: TYPE_NORMAL
- en: Go to the [**http://localhost:3000**](http://localhost:3000)on your web browser,
    as explained in the previous section. You must create a new organization, members
    and a project under which you would be tracing and logging all your metrics. Follow
    through the process on the dashboard that takes you through all the steps.
  prefs: []
  type: TYPE_NORMAL
- en: 'For example, here we have set up an organization by the name of `datamonitor`,
    added a member by the name `data-user1` with “Owner” role, and a project named
    *`data-demo`*. This will lead us to the following screen:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/54cf236e2b1fcc47918f680b8da8ae75.png)'
  prefs: []
  type: TYPE_IMG
- en: Setup screen of Langfuse dashboard (Screenshot by author)
  prefs: []
  type: TYPE_NORMAL
- en: This screen displays both public and private API keys, which will be used while
    setting up tracing using SDKs; keep them saved for future use. And with this step,
    we are finally done with configuring the langfuse server. The only other task
    left is to start the instrumentation process on the code side of our application.
  prefs: []
  type: TYPE_NORMAL
- en: Enabling Langfuse Tracing using SDKs
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Langfuse offers a straightforward way to enable tracing of LLM applications
    with minimal lines of code. As mentioned earlier, Langfuse offers tracing solutions
    for various languages, frameworks and LLM models, such as Langchain, LlamaIndex,
    OpenAI and others. You can even enable Langfuse tracing in serverless functions
    such as AWS Lambda.
  prefs: []
  type: TYPE_NORMAL
- en: But before we trace our application, let’s actually create a sample application
    using OpenAI’s framework. We will create a very simple chat completion application
    using OpenAI’s **`gpt-4o-mini`** for demonstration purposes only.
  prefs: []
  type: TYPE_NORMAL
- en: 'First, install the required packages:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: 'Output:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: Let’s now enable langfuse tracing in the given code. You have to make minor
    adjustments to the code, beginning with installing the `langfuse` package.
  prefs: []
  type: TYPE_NORMAL
- en: 'Install all the required packages once again:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: 'The code with `langfuse` enabled looks like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: You see, we have just replaced `import openai` with `from langfuse.openai import
    openai` to enable tracing.
  prefs: []
  type: TYPE_NORMAL
- en: If you now go to your Langfuse dashboard, you will observe traces of the OpenAI
    application.
  prefs: []
  type: TYPE_NORMAL
- en: A Complete End-to-End Example
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now let’s dive into enabling monitoring and observability on a complete LLM
    application. We will implement a RAG pipeline, which fetches relevant context
    from the vector database. We are going to use ChromaDB as a vector database.
  prefs: []
  type: TYPE_NORMAL
- en: We will use the Langchain framework to build our RAG based application (refer
    to *‘basic LLM-RAG application’* figure above). You can learn Langchain by pursuing
    this [tutorial on how to build LLM applications with Langchain](https://towardsdatascience.com/getting-started-with-langchain-a-beginners-guide-to-building-llm-powered-applications-95fc8898732c/).
  prefs: []
  type: TYPE_NORMAL
- en: If you want to learn the basics of RAG, [this tutorial](https://towardsdatascience.com/how-i-built-my-first-rag-pipeline-6e178326e3c8/)
    can be a good starting point. As for the vector database, refer to [this tutorial
    on setting up ChromaDB](https://towardsdatascience.com/all-you-need-to-know-about-vector-databases-and-how-to-use-them-to-augment-your-llm-apps-596f39adfedb/).
  prefs: []
  type: TYPE_NORMAL
- en: '*This section assumes that you have already set up and configured the Langfuse
    server on the localhost, as done in the previous section.*'
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 1: Installation and Setup'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Install all required packages including `langchain`, `chromadb` and `langfuse`.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: 'Next, we import all the required packages and libraries:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: The `load_dotenv` package is used to load all environment variables, which are
    saved in a .env file. Make sure that your OpenAI’s secret key is saved as **`OPENAI_API_KEY`**
    in the `.env` file.
  prefs: []
  type: TYPE_NORMAL
- en: Finally, we integrate Langfuse’s Langchain callback system to enable tracing
    in our application.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: 'Step 2: Set up Knowledge Base'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'To mimic a RAG system, we will:'
  prefs: []
  type: TYPE_NORMAL
- en: Scrape some insightful articles from the Confiz’ blogs section using **`WebBaseLoader`**
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Break them into smaller chunks using **`RecursiveCharacterTextSplitter`**
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Convert them into vector embeddings using OpenAI’s embeddings
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Ingest them into our Chroma vector database. This will serve as the knowledge
    base for our LLM to look for and answer user queries.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: We have assumed a chunk size of 500 tokens with an overlap of 20 tokens in Recursive
    Text Splitter, which considers various factors before chunking on the given size.
    The **`vectordb`** object of **ChromaDB** is converted into a retriever object,
    allowing us to use it conveniently in the Langchain retrieval pipeline.
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 3: Set up RAG pipeline'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The next step is to set up the RAG chain, using the power of LLM along with
    the knowledge base of the vector database to answer user queries. As previously,
    we will use OpenAI’s `gpt-4o-mini` as our base model.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: We have used **`RetrievalQA`** that implements end-to-end pipeline comprising
    document retrieval and LLM’s question answering capability.
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 4: Run RAG pipeline'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: It’s time to run our RAG pipeline. Let’s concoct a few queries related to the
    articles ingested in the ChromaDB and observe LLM’s response in the Langfuse dashboard
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: As you might have noticed, the *`callbacks`* argument in the `qa_chain` is what
    gives Langfuse the ability to capture traces of the complete RAG pipeline. Langfuse
    supports various frameworks and LLM libraries which can be [found here](https://langfuse.com/docs/get-started).
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 5: Observing the traces'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Finally, it’s time to open Langfuse Dashboard running in the web browser and
    reap the fruits of our hard work. If you have followed our tutorial from the beginning,
    we created a project named `data-demo` under the organization named `datamonitor`.
    On the landing page of your Langfuse dashboard, you will find this project. Click
    on ‘*Go to project*’ and you will find a dashboard with various panels such as
    traces and model costs etc.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/7c8cef0cf0b3a8b096c506f46fca35ed.png)'
  prefs: []
  type: TYPE_IMG
- en: Langfuse Dashboard with traces and costs
  prefs: []
  type: TYPE_NORMAL
- en: As visible, you can adjust the time window and add filters according to your
    needs. The cool part is that you don’t need to manually add LLM’s description
    and input/output token costs to enable cost tracking; Langfuse automatically does
    it for you.But this is not just it; in the left bar, select **Tracing** > **Traces**
    to look at all the individual traces. Since we have asked four queries, we will
    observe four different traces each representing the complete pipeline against
    each query.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e6b300db66ff0b2535c6bfab2bf89ba5.png)'
  prefs: []
  type: TYPE_IMG
- en: List of traces on dashboard
  prefs: []
  type: TYPE_NORMAL
- en: Each trace is distinguished by an ID, timestamp and contains corresponding latency
    and total cost. The usage column shows the total input and output token usage
    against each trace.
  prefs: []
  type: TYPE_NORMAL
- en: If you click on any of those traces, the Langfuse will depict the complete picture
    of the underlying processes, such as inputs and outputs for each stage, covering
    everything from retrieval, LLM call and the generation. Insightful, isn’t it?
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/2f4e6f3e533b76102f3a0c10be22f88a.png)'
  prefs: []
  type: TYPE_IMG
- en: Trace details
  prefs: []
  type: TYPE_NORMAL
- en: Evaluation Metrics
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As a bonus feature, let’s also add our custom metrics related to the LLM’s response
    on the same dashboard. On a self-hosted solution, just like we have implemented,
    this can be made possible by fetching all traces from the dashboard, applying
    customized evaluation on those traces and publishing them back to the dashboard.
  prefs: []
  type: TYPE_NORMAL
- en: The evaluation can be applied by simply employing another LLM with suitable
    prompts. Otherwise, we can use evaluation frameworks, such as **DeepEval** or
    **promptfoo** etc., which also use LLMs under the hood. We shall go with [DeepEval](https://docs.confident-ai.com/docs/getting-started),
    which is an open-source framework developed to evaluate the response of LLMs.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s do this process in the following steps:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 1: Installation and Setup'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'First, we install `deepeval` framework:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: 'Next, we make necessary imports:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE19]'
  prefs: []
  type: TYPE_PRE
- en: 'Step 2: Fetching the traces from the dashboard'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The first step is to fetch all the traces, within the given time window, from
    the running Langfuse server into our Python code.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE20]'
  prefs: []
  type: TYPE_PRE
- en: Note that we are using the same secret and public keys as previously, since
    we are fetching the traces from our **`data-demo`** project. Also note that we
    are fetching traces from 5 am yesterday till the current time.
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 3: Applying Evaluation'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Once we have the traces, we can apply various evaluation metrics such as bias,
    toxicity, hallucinations and relevance. For simplicity, let’s stick only to the
    `AnswerRelevancyMetric` metric.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE21]'
  prefs: []
  type: TYPE_PRE
- en: In the above code snippet, we have defined the `calculate_relevance` function
    to calculate relevance of the given trace using DeepEval’s standard metric. Then
    we loop over all the traces and individually calculate each trace’s relevance
    score. The `langfuse_handler` object takes care of logging that score back to
    the dashboard against each trace ID.
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 4: Observing the metrics'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now if you focus on the same dashboard as previous, the ‘Scores’ panel has been
    populated as well.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d39e6b073a257b67778067a3b7456bbb.png)'
  prefs: []
  type: TYPE_IMG
- en: '![](../Images/7e14ee9cc4c3afc8bbdcb0f9c1205117.png) You will notice that relevance
    score has been added to the individual traces as well.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/3f3216225ddf91c83de03a3bfcaed52b.png)'
  prefs: []
  type: TYPE_IMG
- en: You can also view the feedback provided by the DeepEval, for each trace individually.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/7fc1cb37d297405d8ca2985cfc966e8b.png)'
  prefs: []
  type: TYPE_IMG
- en: This example showcases a simple way of logging evaluation metrics on the dashboard.
    Of course, there is more to it in terms of metrics calculation and handling, but
    let’s keep it for the future. Also importantly, you might wonder what the most
    appropriate way is to log evaluation metrics on the dashboard of a running application.
    For the self-hosting solution, a straightforward answer is to run the evaluation
    script as a **Cron Job**, at specific times. For the enterprise version, Langfuse
    offers live evaluation metrics of the LLM response, as they are populated on the
    dashboard.
  prefs: []
  type: TYPE_NORMAL
- en: Advanced Features
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Langfuse offers many advanced features, such as:'
  prefs: []
  type: TYPE_NORMAL
- en: Prompt Management
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This allows management and versioning of prompts using the Langfuse Dashboard
    UI. This enables users to keep an eye on evolving prompts as well as record all
    metrics against each version of the prompt. Additionally, it also supports prompt
    playground to tweak prompts and model parameters and observe their effects on
    the overall LLM response, directly in the Langfuse UI.
  prefs: []
  type: TYPE_NORMAL
- en: Datasets
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Datasets feature allows users to create a benchmark dataset to measure the performance
    of the LLM application against different model parameters and tweaked prompts.
    As new edge-cases are reported, they can be directly fed into the existing datasets.
  prefs: []
  type: TYPE_NORMAL
- en: User Management
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This feature allows organizations to track the costs and metrics associated
    with each user. This also means that organizations can trace the activity of each
    user, encouraging fair use of the LLM application.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this tutorial, we have explored LLM Monitoring and Observability and its
    related concepts. We implemented Monitoring and Observability using Langfuse—an
    open-source framework, offering free and enterprise solutions. Opting for the
    self-hosting solution, we set up Langfuse dashboard using docker file along with
    PostgreSQL server for persistence. We then enabled instrumentation in our sample
    LLM application using Langfuse Python SDKs. Finally, we observed all the traces
    in the dashboard and also performed evaluation on these traces using the DeepEval
    framework.
  prefs: []
  type: TYPE_NORMAL
- en: In a future tutorial, we may also explore advanced features of the Langfuse
    framework or explore other open-source frameworks such as Arize Phoenix. We may
    also work on the deployment of Langfuse dashboard on a cloud service such as Azure,
    AWS or GCP.
  prefs: []
  type: TYPE_NORMAL
