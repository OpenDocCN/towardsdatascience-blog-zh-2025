- en: 'Triangle Forecasting: Why Traditional Impact Estimates Are Inflated (And How
    to Fix Them)'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/triangle-forecasting-why-traditional-impact-estimates-are-inflated-and-how-to-fix-them/](https://towardsdatascience.com/triangle-forecasting-why-traditional-impact-estimates-are-inflated-and-how-to-fix-them/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Accurate impact estimations can make or break your business case.**'
  prefs: []
  type: TYPE_NORMAL
- en: Yet, despite its importance, most teams use oversimplified calculations that
    can lead to inflated projections. These shot-in-the-dark numbers not only destroy
    credibility with stakeholders but can also result in misallocation of resources
    and failed initiatives. But there’s a better way to forecast effects of gradual
    customer acquisition, without requiring messy Excel spreadsheets and formulas
    that error out.
  prefs: []
  type: TYPE_NORMAL
- en: By the end of this article, you will be able to calculate accurate yearly forecasts
    and implement a scalable Python solution for Triangle Forecasting.
  prefs: []
  type: TYPE_NORMAL
- en: The Hidden Cost of Inaccurate Forecasts
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'When asked for annual impact estimations, product teams routinely overestimate
    impact by applying a one-size-fits-all approach to customer cohorts. Teams frequently
    opt for a simplistic approach:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Multiply monthly revenue (or any other relevant metric) by twelve to estimate
    annual impact.*'
  prefs: []
  type: TYPE_NORMAL
- en: 'While the calculation is easy, this formula ignores a fundamental premise that
    applies to most businesses:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Customer acquisition happens gradually throughout the year.**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The contribution from all customers to yearly estimates is not equal since later
    cohorts contribute fewer months of revenue.
  prefs: []
  type: TYPE_NORMAL
- en: '**Triangle Forecasting can cut projection errors by accounting for effects
    of customer acquisition timelines.**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Let us explore this concept with a basic example. Let’s say you’re launching
    a new subscription service:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Monthly subscription fee: $100 per customer'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Monthly customer acquisition target: 100 new customers'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Goal: Calculate total revenue for the year'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: An oversimplified multiplication suggests a revenue of $1,440,000 in the first
    year (= 100 new customers/month * 12 months * $100 spent / month * 12 months).
  prefs: []
  type: TYPE_NORMAL
- en: The actual number is only $780,000!
  prefs: []
  type: TYPE_NORMAL
- en: '**This 46% overestimation is why impact estimations frequently do not pass
    stakeholders’ sniff test.**'
  prefs: []
  type: TYPE_NORMAL
- en: Accurate forecasting is not just about mathematics —
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: It is a tool that helps you build trust and gets your initiatives approved faster
    without the risk of over-promising and under-delivering.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Moreover, data professionals spend hours building manual forecasts in Excel,
    which are volatile, can result in formula errors, and are challenging to iterate
    upon.
  prefs: []
  type: TYPE_NORMAL
- en: Having a standardized, explainable methodology can help simplify this process.
  prefs: []
  type: TYPE_NORMAL
- en: Introducing Triangle Forecasting
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Triangle Forecasting is a systematic, mathematical approach to estimate the
    yearly impact when customers are acquired gradually. It accounts for the fact
    that incoming customers will contribute differently to the annual impact, depending
    on when they onboard on to your product.
  prefs: []
  type: TYPE_NORMAL
- en: 'This method is particularly handy for:'
  prefs: []
  type: TYPE_NORMAL
- en: '**New Product Launches:** When customer acquisition happens over time'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Subscription Revenue Forecasts:** For accurate revenue projections for subscription-based
    products'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Phased Rollouts:** For estimating the cumulative impact of gradual rollouts'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Acquisition Planning:** For setting realistic monthly acquisition targets
    to hit annual goals'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/c13befc0547ee2d45c1eb0a39839a33f.png)'
  prefs: []
  type: TYPE_IMG
- en: Image generated by author
  prefs: []
  type: TYPE_NORMAL
- en: The “triangle” in Triangle Forecasting refers to the way individual cohort contributions
    are visualized. A cohort refers to the month in which the customers were acquired.
    Each bar in the triangle represents a cohort’s contribution to the annual impact.
    Earlier cohorts have longer bars because they contributed for an extended period.
  prefs: []
  type: TYPE_NORMAL
- en: 'To calculate the impact of a new initiative, model or feature in the first
    year :'
  prefs: []
  type: TYPE_NORMAL
- en: 'For each month (m) of the year:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Calculate number of customers acquired (Am)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Calculate average monthly spend/impact per customer (S)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Calculate remaining months in year (Rm = 13-m)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Monthly cohort impact = Am × S × Rm
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 2\. Total yearly impact = Sum of all monthly cohort impacts
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/2f10a50fa9337211b311be140f0bb602.png)'
  prefs: []
  type: TYPE_IMG
- en: Image generated by author
  prefs: []
  type: TYPE_NORMAL
- en: Building Your First Triangle Forecast
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Let’s calculate the actual revenue for our subscription service:'
  prefs: []
  type: TYPE_NORMAL
- en: 'January: 100 customers × $100 × 12 months = $120,000'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'February: 100 customers × $100 × 11 months = $110,000'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'March: 100 customers × $100 × 10 months = $100,000'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: And so on…
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Calculating in Excel, we get:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/450db61459112c4b0268e9b37a203986.png)'
  prefs: []
  type: TYPE_IMG
- en: Image generated by author
  prefs: []
  type: TYPE_NORMAL
- en: The total annual revenue equals **$780,000**— 46% lower than the oversimplified
    estimate!
  prefs: []
  type: TYPE_NORMAL
- en: '**💡 Pro Tip: Save the spreadsheet calculations as a template to reuse for different
    scenarios.**'
  prefs: []
  type: TYPE_NORMAL
- en: Need to build estimates without perfect data? Read my guide on “Building Defendable
    Impact Estimates When Data is Imperfect”.
  prefs: []
  type: TYPE_NORMAL
- en: 'Putting Theory into Practice: An Implementation Guide'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: While we can implement Triangle Forecasting in Excel using the above method,
    these spreadsheets become impossible to maintain or modify quickly. Product owners
    also struggle to update forecasts quickly when assumptions or timelines change.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s how we can perform build the same forecast in Python in minutes:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'Continuing with our previous example of subscription service, the revenue from
    each monthly cohort can be visualized as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/f9515bdf37bbbad997325fcf6e24ed5a.png)'
  prefs: []
  type: TYPE_IMG
- en: Image generated by author
  prefs: []
  type: TYPE_NORMAL
- en: We can also leverage Python to visualize the cohort contributions as a bar chart.
    Note how the impact decreases linearly as we move through the months.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/aecfd3cd5cdac319792da64ab1af9f34.png)'
  prefs: []
  type: TYPE_IMG
- en: Image generated by author
  prefs: []
  type: TYPE_NORMAL
- en: Using this Python code, you can now generate and iterate on annual impact estimations
    quickly and efficiently, without having to manually perform version control on
    crashing spreadsheets.
  prefs: []
  type: TYPE_NORMAL
- en: Beyond Basic Forecasts
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'While the above example is straightforward, assuming monthly acquisitions and
    spending are constant across all months, that need not necessarily be true. Triangle
    forecasting can be easily adapted and scaled to account for :'
  prefs: []
  type: TYPE_NORMAL
- en: '**Multiple spend tiers**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For varying monthly spend based on spend tiers, create a distinct triangle forecast
    for each cohort and then aggregate individual cohort’s impacts to calculate the
    total annual impact.
  prefs: []
  type: TYPE_NORMAL
- en: '**Varying acquisition rates**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Typically, businesses don’t acquire customers at a constant rate throughout
    the year. Acquisition might start at a slow pace and ramp up as marketing kicks
    in, or we might have a burst of early adopters followed by slower growth. To handle
    varying rates, pass a list of monthly targets instead of a single rate:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/b6481bf014f7af50476cc8cd7ee8e684.png)'
  prefs: []
  type: TYPE_IMG
- en: Image generated by author
  prefs: []
  type: TYPE_NORMAL
- en: '**Seasonality adjustments**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: To account for seasonality, multiply each month’s impact by its corresponding
    seasonal factor (e.g., 1.2 for high-season months like December, 0.8 for low-season
    months like February, etc.) before calculating the total impact.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here is how you can modify the Python code to account for seasonal variations:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/13938af556cb954dcbd2dab7fb6e13de.png)'
  prefs: []
  type: TYPE_IMG
- en: Image generated by author
  prefs: []
  type: TYPE_NORMAL
- en: 'These customizations can help you model different growth scenarios including:'
  prefs: []
  type: TYPE_NORMAL
- en: Gradual ramp-ups in early stages of launch
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Step-function growth based on promotional campaigns
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Seasonal variations in customer acquisition
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The Bottom Line
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Having dependable and intuitive forecasts can make or break the case for your
    initiatives.
  prefs: []
  type: TYPE_NORMAL
- en: 'But that’s not all — triangle forecasting also finds applications beyond revenue
    forecasting, including calculating:'
  prefs: []
  type: TYPE_NORMAL
- en: Customer Activations
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Portfolio Loss Rates
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Credit Card Spend
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Ready to dive in?** Download the Python template shared above and build your
    first Triangle forecast in 15 minutes!'
  prefs: []
  type: TYPE_NORMAL
- en: Input your monthly acquisition targets
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Set your expected monthly customer impact
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Visualize your annual trajectory with automated visualizations
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '*Real-world estimations often require dealing with imperfect or incomplete
