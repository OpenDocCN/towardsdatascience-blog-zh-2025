- en: 'The Misconception of Retraining: Why Model Refresh Isn’t Always the Fix'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/the-misconception-of-retraining-why-model-refresh-isnt-always-the-fix/](https://towardsdatascience.com/the-misconception-of-retraining-why-model-refresh-isnt-always-the-fix/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1753892860984" class="mdspan-comment">The</mdspan> phrase
    “just retrain the model” is deceptively simple. It has become a go-to solution
    in machine learning operations whenever the metrics are falling or the results
    are becoming noisy. I have witnessed whole MLOps pipelines being rewired to retrain
    on a weekly, monthly or post-major-data-ingest basis, and never any questioning
    of whether retraining is the appropriate thing to do.
  prefs: []
  type: TYPE_NORMAL
- en: 'However, this is what I have experienced: retraining is not the solution all
    the time. Frequently, it is merely a means of papering over more fundamental blind
    spots, brittle assumptions, poor observability, or misaligned goals that can not
    be resolved simply by supplying more data to the model.'
  prefs: []
  type: TYPE_NORMAL
- en: The Retraining Reflex Comes from Misplaced Confidence
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Retraining is frequently operationalised by teams when they design scalable
    ML systems. You construct the loop: gather new data, prove performance and retrain
    in case of a decrease in metrics. But what is lacking is the pause, or rather,
    the diagnostic layer that queries as to why performance has declined.'
  prefs: []
  type: TYPE_NORMAL
- en: 'I collaborated with a recommendation engine that was retrained every week,
    although the user base was not very dynamic. This was initially what appeared
    to be good hygiene, keeping models fresh. However, we began to see performance
    fluctuations. Having tracked the problem, we just found out that we were injecting
    into the training set stale or biased behavioural signals: over-weighted impressions
    of inactive users, click artefacts of UI experiments, or incomplete feedback of
    dark launches.'
  prefs: []
  type: TYPE_NORMAL
- en: The retraining loop was not correcting the system; it was injecting noise.
  prefs: []
  type: TYPE_NORMAL
- en: When Retraining Makes Things Worse
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Unintended Learning from Temporary Noise
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'In one of the fraud detection pipelines I audited, retraining occurred at a
    predetermined schedule: at midnight on Sundays. However, one weekend, a marketing
    campaign was launched against new users. They behaved differently – they requested
    more loans, completed them quicker and had a bit riskier profiles.'
  prefs: []
  type: TYPE_NORMAL
- en: That behaviour was recorded by the model and retrained. The outcome? The fraud
    detection levels were lowered, and the false positive cases increased in the following
    week. The model had learned to think of the new normal as something suspicious,
    and this was blocking good users.
  prefs: []
  type: TYPE_NORMAL
- en: We had not constructed a method of confirming whether the performance change
    was stable, representative or deliberate. Retraining was a short-term anomaly
    that turned into a long-term problem.
  prefs: []
  type: TYPE_NORMAL
- en: Click Feedback Is Not Ground Truth
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Your target should not be flawed either. In one of the media applications, quality
    was measured by proxy in the form of click-through rate. We created an optimisation
    model of content recommendations and re-trained every week using new click logs.
    However, the product team changed the design, autoplay previews were made more
    pushy, thumbnails were bigger, and people clicked more, even when they did not
    interact.
  prefs: []
  type: TYPE_NORMAL
- en: The retraining loop understood this as increased relevance of the content. Thus,
    the model doubled down on those assets. We had, in fact, made it easy to be clicked
    on by mistake, rather than because of actual interest. Performance indicators
    remained the same, but user satisfaction decreased, which retraining was unable
    to determine.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/2293c1c4f2e67801c43b191b55b72163.png)'
  prefs: []
  type: TYPE_IMG
- en: '**Over-Retraining vs. Root Cause Fixing (Image by author)**'
  prefs: []
  type: TYPE_NORMAL
- en: 'The Meta Metrics Deprecation: When the Ground Beneath the Model Shifts'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In some cases, it is not the model, but the data that has a different meaning,
    and retraining cannot help.
  prefs: []
  type: TYPE_NORMAL
- en: This is what occurred recently in the deprecation of several of the most essential
    Page Insights [metrics by Meta](https://social-media-management-help.brandwatch.com/hc/en-us/articles/17666960115613-Deprecation-of-Facebook-Metrics-in-Measure#:~:text=As%20of%20September%2016%2C%202024,be%20used%20for%20historical%20purposes.)
    in 2024\. Metrics such as Clicks, Engaged Users, and Engagement Rate became deprecated,
    which means that they are no longer updated and supported in the most critical
    analytics tools.
  prefs: []
  type: TYPE_NORMAL
- en: This is a frontend analytics problem at first. However, I have collaborated
    with teams that not only use these metrics to create dashboards but also to create
    features in predictive models. The scores of recommendations, optimisation of
    ad spend and content ranking engines relied on the Clicks by Type and Engagement
    Rate (Reach) as training signals.
  prefs: []
  type: TYPE_NORMAL
- en: When such metrics ceased to be updated, retraining did not give any errors.
    The pipelines were operating, the models were updated. The signals, however, were
    now dead; their distribution was locked up, their values not on the same scale.
    Junk was learned by models, which silently decayed without making a visible show.
  prefs: []
  type: TYPE_NORMAL
- en: What was emphasised here is that retraining has a fixed meaning. In today’s
    machine learning systems, however, your features are frequently dynamic APIs,
    so retraining can hardcode incorrect assumptions when upstream semantics evolve.
  prefs: []
  type: TYPE_NORMAL
- en: So, What Should We Be Updating Instead?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I’ve come to believe that in most cases, when a model fails, the root issue
    lies outside the model.
  prefs: []
  type: TYPE_NORMAL
- en: Fixing Feature Logic, Not Model Weights
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The click alignment scores were going down in one of the search relevance systems,
    which I reviewed. All were pointing at drift: retrain the model. However, a more
    thorough examination revealed that the feature pipeline was behind schedule, as
    it was not detecting newer query intents (e.g., short-form video-related queries
    vs blog posts), and the taxonomy of the categorisation was not up-to-date.'
  prefs: []
  type: TYPE_NORMAL
- en: Re-training on the exact defective representation only fixed the error.
  prefs: []
  type: TYPE_NORMAL
- en: We solved it by reimplementing the feature logic, by introducing a session-aware
    embedding and by replacing stale query tags with inferred topic clusters. There
    was no need to retrain it again; a model that was already in place worked flawlessly
    after the input was fixed.
  prefs: []
  type: TYPE_NORMAL
- en: Segment Awareness
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The other thing that is usually ignored is the evolution of the user cohort.
    User behaviours change along with the products. Retraining does not have to realign
    cohorts; it simply averages them. I have learned that re-clustering of user segments
    and a redefinition of your modelling universe can be more effective than retraining.
  prefs: []
  type: TYPE_NORMAL
- en: Toward a Smarter Update Strategy
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Retraining should be seen as a surgical tool, not a maintenance task. The better
    approach is to monitor for alignment gaps, not just accuracy loss.
  prefs: []
  type: TYPE_NORMAL
- en: Monitor Post-Prediction KPIs
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: One of the best signals I rely on is [post-prediction KPIs](https://milvus.io/ai-quick-reference/what-is-the-role-of-kpis-in-predictive-analytics).
    For example, in an insurance underwriting model, we didn’t look at model AUC alone;
    we tracked claim loss ratio by predicted risk band. When the predicted-low group
    started showing unexpected claim rates, that was a trigger to inspect alignment,
    not retrain mindlessly.
  prefs: []
  type: TYPE_NORMAL
- en: Model Trust Signals
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Another technique is monitoring trust decay. If users stop trusting a model’s
    outputs (e.g., loan officers overriding predictions, content editors bypassing
    suggested assets), that’s a form of signal loss. We tracked manual overrides as
    an alerting signal and used that as the justification to investigate, and sometimes
    retrain.
  prefs: []
  type: TYPE_NORMAL
- en: This retraining reflex isn’t limited to traditional tabular or event-driven
    systems. I’ve seen similar mistakes creep into LLM pipelines, where stale prompts
    or poor feedback alignment are retrained over, instead of reassessing the underlying
    prompt strategies or user interaction signals.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d29c07a163723fc8dc7987aa8fb64c07.png)'
  prefs: []
  type: TYPE_IMG
- en: '**Retraining vs. Alignment Strategy: A System Comparison** **(Image by author)**'
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Retraining is enticing since it makes you feel like you are accomplishing something.
    The numbers go down, you retrain, and they go back up. However, the root cause
    could be hiding there as well: misaligned goals, feature misunderstanding, and
    data quality blind spots.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The more profound message is as follows: The retraining is not a solution;
    it is a check of whether you have learned the issue.'
  prefs: []
  type: TYPE_NORMAL
- en: You do not restart the engine of a car each time the dashboard blinks. You scan
    what is flashing, and why. Similarly, the model updates ought to be considered
    and not automatic. Re-train when your target is different, not when your distribution
    is.
  prefs: []
  type: TYPE_NORMAL
- en: 'And most importantly, keep in mind: a well-maintained system is a system where
    you can tell what is broken, not a system where you simply keep replacing the
    parts.'
  prefs: []
  type: TYPE_NORMAL
