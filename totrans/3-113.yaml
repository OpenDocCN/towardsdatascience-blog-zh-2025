- en: How I Would Learn To Code (If I Could Start Over)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如果我能重新开始，我会如何学习编程
- en: 原文：[https://towardsdatascience.com/how-i-would-learn-to-code-if-i-could-start-over/](https://towardsdatascience.com/how-i-would-learn-to-code-if-i-could-start-over/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/how-i-would-learn-to-code-if-i-could-start-over/](https://towardsdatascience.com/how-i-would-learn-to-code-if-i-could-start-over/)
- en: <mdspan datatext="el1743792074834" class="mdspan-comment">According</mdspan>
    to various sources, the average salary for coding jobs is ~£47.5k in the UK, which
    is ~35% higher than the median salary of about £35k.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1743792074834" class="mdspan-comment">据各种来源，英国编程工作的平均工资约为£47.5k，比大约£35k的中位数工资高出约35%。</mdspan>
- en: So, coding is a very valuable skill that will earn you more money, not to mention
    it’s really fun.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，编程是一项非常有价值的技能，它能让你赚更多的钱，而且真的很有趣。
- en: I have been coding professionally now for 4 years, working as a data scientist
    and machine learning engineer and in this post, I will explain how I would learn
    to code if I had to do it all over again.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我现在作为一名数据科学家和机器学习工程师，已经从事编程工作4年了，在这篇文章中，我将解释如果我要重新开始，我会如何学习编程。
- en: My journey
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我的旅程
- en: I still remember the time I wrote my first bit of code.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 我仍然记得我编写第一段代码的时候。
- en: It was 9am on the first day of my physics undergrad, and we were in the computer
    lab.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 我物理本科的第一天早上9点，我们在计算机实验室。
- en: The professor explained that computation is an integral part of modern physics
    as it allows us to run large-scale simulations of everything from subatomic particle
    collisions to the movement of galaxies.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 教授解释说，计算是现代物理的一个基本组成部分，因为它允许我们运行从亚原子粒子碰撞到星系运动的各类大规模模拟。
- en: '*It sounded amazing.*'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: '*这听起来很棒。*'
- en: And the way we started this process was by going through a textbook to learn
    Fortran.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 我们开始这个过程的方式是通过阅读教科书来学习Fortran。
- en: '*Yes, you heard that right.*'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: '*是的，你没听错。*'
- en: My first programming language was [***Fortran***](https://en.wikipedia.org/wiki/Fortran),
    specifically Fortran 90.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 我的第一种编程语言是[***Fortran***](https://en.wikipedia.org/wiki/Fortran)，具体是Fortran
    90。
- en: I learned DO loops before FOR loops. I am definitely a rarity in this case.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 我在学习FOR循环之前学习了DO循环。在这种情况下，我绝对是少数。
- en: In that first lab session, I remember writing “Hello World” as is the usual
    rite of passage and thinking, “Big woop.”
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 在那个第一次实验室课程中，我记得按照惯例编写了“Hello World”，想着，“这又有什么大不了的。”
- en: This is how you write “Hello World” in Fortran in case you are interested.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你感兴趣，这就是你用Fortran编写“Hello World”的方式。
- en: '[PRE0]'
  id: totrans-16
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: I actually really struggled to code in Fortran and didn’t do that well on tests
    we had, which put me off coding.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 我实际上在Fortran编程上真的很挣扎，在测试中表现不佳，这让我对编程失去了兴趣。
- en: I still have [some old coding projects](https://github.com/egorhowell/Physics-Problems-In-Fortran)
    in Fortran on my GitHub that you can check out.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 我在我的GitHub上还有一些Fortran的老项目[一些旧编程项目](https://github.com/egorhowell/Physics-Problems-In-Fortran)，你可以查看一下。
- en: Looking back, the learning curve to coding is quite steep, but it really does
    compound, and eventually, it will just click.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 回顾过去，编程的学习曲线相当陡峭，但它确实会累积，最终会突然领悟。
- en: I didn’t realise this at the time and actively avoided programming modules in
    my physics degree, which I regret in hindsight as my progress would have been
    much quicker.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 我当时没有意识到这一点，并且积极地避免在物理学位中参加编程模块，事后我对此感到后悔，因为我的进步会更快。
- en: During my third year, I had to do a research placement as part of my master’s.
    The company I chose to work for/with used a graphical programming language called
    [LabVIEW](https://www.ni.com/en/shop/labview.html?srsltid=AfmBOopAxCOBaccZJ5HWmURzbjOW2wi7MaTojaoOXfdMP3Bp917BYXiQ)
    to run and manage their experiments.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的第三年，我必须作为硕士学位的一部分进行一次研究实习。我选择的公司使用一种名为[LabVIEW](https://www.ni.com/en/shop/labview.html?srsltid=AfmBOopAxCOBaccZJ5HWmURzbjOW2wi7MaTojaoOXfdMP3Bp917BYXiQ)的图形编程语言来运行和管理他们的实验。
- en: LabVIEW is based on something called “G” and taught me to think of programming
    differently than script-based.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: LabVIEW基于“G”的概念，教会了我以不同于基于脚本的方式思考编程。
- en: However, I haven’t used it since and probably never will, but it was cool to
    learn then.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我自从就没有使用过它，可能永远不会使用，但当时学习它很有趣。
- en: I did enjoy the research year somewhat, but the pace at which research moves,
    at least in physics, is painfully slow. Nothing like the “heyday” from the early
    20th century I envisioned.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 我多少享受了研究的那一年，但研究进展的速度，至少在物理学中，是痛苦地缓慢。不像我设想的20世纪早期的“黄金时代”。
- en: One day after work a video was recommended to me on my YouTube home page.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 有一天，在我的YouTube主页上推荐给我一个视频。
- en: For those of you unaware, this was a documentary about DeepMind’s AI AlphaGo
    that beat the best GO player in the world. Most people thought that an AI could
    never be good at GO.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 对于那些不知道的人来说，这是一部关于DeepMind的AI AlphaGo战胜世界最佳围棋选手的纪录片。大多数人认为AI永远不可能擅长围棋。
- en: From the video, I started to understand how AI worked and learn about neural
    networks, reinforcement learning, and deep learning.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 从视频中，我开始了解AI是如何工作的，并学习关于神经网络、强化学习和深度学习。
- en: I found it all so interesting, similar to physics research in the early 20th
    century.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 我发现这一切都很有趣，类似于20世纪初的物理学研究。
- en: Ultimately, this is when I started studying for a career in data science and
    machine learning, where I needed to teach myself Python and SQL.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 最终，我开始为数据科学和机器学习职业学习，这需要我自学Python和SQL。
- en: This is where I so-called “fell in love” with coding.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是我所谓的“爱上”编程的时刻。
- en: I saw its real potential in actually solving problems, but the main thing was
    that I had a motivated reason to learn. I was studying to break into a career
    I wanted to be in, which really drove me.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 我看到了它在实际解决问题中的真正潜力，但主要的是，我有一个有动力的理由去学习。我正在学习进入我想要从事的职业，这真正推动了我。
- en: I then became a data scientist for three years and am now a machine learning
    engineer. During this time, I worked extensively with Python and SQL.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我成为了一名数据科学家三年，现在是一名机器学习工程师。在这段时间里，我广泛地使用了Python和SQL。
- en: Until a few months ago, those were the only programming languages I knew. I
    did learn other tools, such as bash/z-shell, AWS, docker, data bricks, snowflake,
    etc. but not any other “proper” programming languages.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 直到几个月前，我只会这些编程语言。我还学习了其他工具，如bash/z-shell、AWS、docker、data bricks、snowflake等，但没有学习其他“真正的”编程语言。
- en: In my spare time, I dabbled a bit with C a couple of years ago, but I have forgotten
    virtually all of it now. I have [some basic scripts](https://github.com/egorhowell/C-Programming)
    on my GitHub if you are interested.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的业余时间，我几年前稍微接触了一下C语言，但现在几乎都忘记了。如果你感兴趣，我GitHub上有一些[基本脚本](https://github.com/egorhowell/C-Programming)。
- en: However, in my new role that I started a couple of months ago, I will be using
    Rust and GO, which I am very much looking forward to learning.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，在我几个月前开始的新角色中，我将使用Rust和GO，我非常期待学习。
- en: '*If you are interested in my entire journey to becoming a data scientist and
    machine learning engineer, you can read about it below:*'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: '*如果你对我的成为数据科学家和机器学习工程师的整个旅程感兴趣，你可以阅读下面的内容：*'
- en: '[How I Became A Machine Learning Engineer (No CS Degree, No Bootcamp)](https://towardsdatascience.com/how-i-became-a-machine-learning-engineer-no-cs-degree-no-bootcamp/)'
  id: totrans-37
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[如何成为机器学习工程师（没有CS学位，没有训练营）](https://towardsdatascience.com/how-i-became-a-machine-learning-engineer-no-cs-degree-no-bootcamp/)'
- en: Choose a language
  id: totrans-38
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 选择一种语言
- en: I always recommend starting with a single language.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 我总是建议从单一语言开始。
- en: According to [TestGorilla](https://www.testgorilla.com/blog/how-many-programming-languages/),
    there are over 8,000 programming languages, so how do you pick one?
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 根据[TestGorilla](https://www.testgorilla.com/blog/how-many-programming-languages/)，有超过8000种编程语言，那么你该如何选择呢？
- en: Well, I would argue that many of these are useless for most jobs and have probably
    been developed as pet projects or for really niche cases.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为其中许多对大多数工作来说都是无用的，可能只是作为宠物项目或针对非常狭窄的案例开发的。
- en: You could choose your first language based on popularity. The [Stack Overflow
    2024 survey](https://survey.stackoverflow.co/2024/technology#most-popular-technologies)
    has great information on this. The most popular languages are JavaScript, Python,
    SQL, and Java.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以根据流行度选择你的第一语言。2024年[Stack Overflow调查](https://survey.stackoverflow.co/2024/technology#most-popular-technologies)提供了这方面的详细信息。最流行的语言是JavaScript、Python、SQL和Java。
- en: However, the way I recommend you choose your first language should be based
    on what you want to do or work as.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我建议你选择第一语言的方式应该基于你想要做什么或工作做什么。
- en: '**Front-end web — **JavaScript, HTML, CSS'
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**前端网页开发**—JavaScript, HTML, CSS'
- en: '**Back-end web — **Java, C#, Python, PHP or GO'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**后端网页开发**—Java, C#, Python, PHP或GO'
- en: '**iOS/macOS apps** — Swift'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**iOS/macOS应用**—Swift'
- en: '**Andriod apps** — Kotlin or Java'
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Android应用**—Kotlin或Java'
- en: '**Games** — C++ or C'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**游戏**—C++或C'
- en: '**Embedded Systems **— C or C++'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**嵌入式系统**—C或C++'
- en: '**Data science/machine learning / AI** — Python and SQL'
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据科学/机器学习/人工智能**—Python和SQL'
- en: As I wanted to work in the AI/ML space, I focused my energy mainly on Python
    and some on SQL. It was probably a 90% / 10% split as SQL is smaller and easier
    to learn.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我想在AI/ML领域工作，我主要专注于Python和一些SQL。这可能是90% / 10%的分配，因为SQL更小，更容易学习。
- en: To this day, I still only know Python and SQL to a “professional” standard,
    but that’s fine, as pretty much the whole machine-learning community requires
    these languages.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 到今天为止，我仍然只把Python和SQL掌握到了“专业”水平，但这没关系，因为几乎整个机器学习社区都需要这些语言。
- en: This shows that you don’t need to know many languages; I have progressed quite
    far in my career, only knowing two to a significant depth. Of course, it would
    vary by sector, but the main point still stands.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 这表明你不需要知道很多语言；我在职业生涯中取得了相当大的进步，只掌握了两种语言，但达到了相当深的水平。当然，这会因行业而异，但主要观点仍然成立。
- en: So, pick a field you want to enter and choose the most in-demand and relevant
    language in that field.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，选择你想要进入的领域，并选择该领域最需求且相关的语言。
- en: Learn the bare minimum
  id: totrans-55
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 学习最基本的知识
- en: The biggest mistake I see beginners make is getting stuck in “tutorial hell.”
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 我看到初学者犯的最大错误就是陷入“教程地狱”。
- en: This is where you take course after course but never branch out on your own.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是你在课程之间不断学习，但从未自己拓展的情况。
- en: I recommend taking a maximum of two courses on a language — literally any intro
    course would do — and then starting to build immediately.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 我建议最多学习两种语言的课程——实际上任何入门课程都行——然后立即开始构建。
- en: And I literally mean, build your own projects and experience the struggle because
    that’s where learning is done.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 我真的是指，自己动手做项目，体验挑战，因为学习正是在这里发生的。
- en: You won’t know how to write functions until you do it yourself, you won’t know
    how to create classes until you do it yourself, and you literally won’t understand
    loops until you implement them yourself.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 除非你亲自编写函数，否则你不知道如何编写函数；除非你亲自创建类，否则你不知道如何创建类；除非你亲自实现它们，否则你根本不会理解循环。
- en: So, learn the bare minimum and immediately start experimenting; I promise it
    will at least 2x your learning curve.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，学习最基本的知识，然后立即开始实验；我保证这至少能让你学习曲线翻倍。
- en: You probably have heard this advice a lot, but in reality it is that simple.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能已经听过很多这样的建议，但现实中它就是这么简单。
- en: I always say that most things in life are simple but hard to do, especially
    in programming.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 我总是说，生活中大多数事情都很简单，但很难做到，尤其是在编程方面。
- en: Avoid trends
  id: totrans-64
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 避免趋势
- en: When I say avoid trends, I don’t mean not to focus on areas that are doing well
    or in demand in the market.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 当我说避免趋势时，我的意思不是不关注市场表现良好或需求旺盛的领域。
- en: What I am saying is that when you pick a certain language or specialism, stick
    with it.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 我要说的就是，当你选择一种语言或专业时，要坚持下去。
- en: Programming languages all share similar concepts and patterns, so when you learn
    one, you indirectly improve your ability to pick up another later.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 所有编程语言都共享相似的概念和模式，所以当你学习一种语言时，你间接地提高了自己以后学习另一种语言的能力。
- en: '*But you still should focus on one language for at least a few months.*'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: '*但你仍然应该至少专注于一种语言几个月。*'
- en: Don’t develop “shiny object syndrome” and chase the latest technologies; it’s
    a game that you will unfortunately lose.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 不要发展“闪亮物体综合症”并追逐最新的技术；这是一场你注定会输的游戏。
- en: There have been so many “distracting” technologies, such as blockchain, Web3,
    AI, the list goes on.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 有很多“分散注意力”的技术，比如区块链、Web3、AI，等等。
- en: 'Instead, focus on the fundamentals:'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，专注于基础：
- en: Data types
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据类型
- en: Design patterns
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 设计模式
- en: Object-oriented programming
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 面向对象编程
- en: Data structures and algorithms
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据结构和算法
- en: Problem-solving skills
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 解决问题的能力
- en: These topics transcend individual programming languages and are much better
    to master than the latest Javascript framework!
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 这些主题超越了单个编程语言，而且比掌握最新的JavaScript框架要好得多！
- en: It’s much better to have a strong understanding of one area than try to learn
    everything. Not only is this more manageable, but it is also better for your long-term
    career.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 深入理解一个领域远比试图学习一切要好。这不仅更容易管理，而且对你的长期职业发展更有利。
- en: As I said earlier, I have progressed quite well in my career by only knowing
    Python and SQL, as I learned the required technologies for the field and didn’t
    get distracted.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 如我之前所说，我通过只掌握Python和SQL在职业生涯中取得了相当大的进步，因为我学习了该领域所需的技术，而没有被分散注意力。
- en: I can’t stress how much leverage you will have in your career if you document
    your learning publicly.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 我无法强调，如果你公开记录你的学习，你将在职业生涯中获得多大的优势。
- en: Document your learning
  id: totrans-81
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 记录你的学习
- en: I don’t know why more people don’t do this. Sharing what I have learned online
    has been the biggest game changer for my career.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 我不明白为什么更多的人不做这件事。在网上分享我所学到的知识，对我的职业生涯来说是最重大的变革。
- en: Literally committing your code on GitHub is enough, but I really recommend posting
    on LinkedIn or X, and ideally, you should create blog posts to help you cement
    your understanding and show off you knowledge to employers.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 实际上在GitHub上提交你的代码就足够了，但我强烈建议你在LinkedIn或X上发布，理想情况下，你应该创建博客文章来帮助你巩固理解并向雇主展示你的知识。
- en: When I interview candidates, if they have some sort of online presence showing
    their learnings, that’s immediately a tick in my box and an extra edge over other
    applicants.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 当我面试候选人时，如果他们有一些在线存在感，展示他们的学习成果，那对我来说就是立即的加分，并且比其他申请者有额外的优势。
- en: It shows enthusiasm and passion, not to mention increasing your surface area
    of serendipity.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 这显示了热情和激情，更不用说增加你的偶然机会的表面积了。
- en: 'I know many people are scared to do this, but you are suffering from the [spotlight
    effect. Wikipedia defines this as](https://en.wikipedia.org/wiki/Spotlight_effect):'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 我知道很多人害怕这样做，但你正在遭受[聚光灯效应]。维基百科将其定义为[这里](https://en.wikipedia.org/wiki/Spotlight_effect)：
- en: The spotlight effect is the psychological phenomenon by which people tend to
    believe they are being noticed more than they really are.
  id: totrans-87
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 聚光灯效应是一种心理现象，人们倾向于相信他们被注意到的程度比实际情况要多。
- en: No one literally cares if you post online or think about you as much as 1% as
    you think.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 没有人真的在乎你在线发布还是像你想象的那么在乎你，只有1%的人在乎。
- en: So, start posting.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，开始发布吧。
- en: What about AI?
  id: totrans-90
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 那么，AI呢？
- en: I could spend hours discussing why AI is not an immediate risk for anyone who
    wants to work in the coding profession.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 我可以花几个小时讨论为什么AI对想要从事编码职业的人来说不是一种即时风险。
- en: You should embrace AI as part of your toolkit, but that’s as far as it will
    go, and it will definitely not replace programmers in 5 years.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 你应该将AI视为你工具箱的一部分，但这仅此而已，它绝对不可能在5年内取代程序员。
- en: Unless an AGI breakthrough suddenly occurs in the next decade, which is highly
    unlikely.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 除非在下一个十年内突然出现AGI的突破，这是极不可能的。
- en: I personally doubt the answer to AGI is the [cross-entropy loss function](https://en.wikipedia.org/wiki/Cross-entropy),
    which is what is used in most LLMs nowadays.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 我个人怀疑AGI的答案不是[交叉熵损失函数](https://en.wikipedia.org/wiki/Cross-entropy)，这是现在大多数LLM所使用的。
- en: It has been shown [time](https://www.forbes.com/sites/ronshevlin/2024/10/14/apple-says-generative-ai-isnt-good-at-math/)
    and [time](https://techcrunch.com/2024/10/11/researchers-question-ais-reasoning-ability-as-models-stumble-on-math-problems-with-trivial-changes/)
    again that these AI models lack strong mathematical reasoning abilities, which
    is one of the most fundamental skills to being a good coder.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 已经多次表明[时间](https://www.forbes.com/sites/ronshevlin/2024/10/14/apple-says-generative-ai-isnt-good-at-math/)和[时间](https://techcrunch.com/2024/10/11/researchers-question-ais-reasoning-ability-as-models-stumble-on-math-problems-with-trivial-changes/)，这些AI模型缺乏强大的数学推理能力，这是成为一名优秀程序员的最基本技能之一。
- en: Even the so-called “software engineer killer” Devin is [not as good](https://daily.dev/blog/is-devin-a-scam-unpacking-the-truth-behind-the-claims)
    as the creators initially marketed it.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 即使被称为“软件工程师杀手”的Devin，[也不如创造者最初宣传的那么好](https://daily.dev/blog/is-devin-a-scam-unpacking-the-truth-behind-the-claims)。
- en: Most companies are simply trying to boost their investment by hyping AI, and
    their results are often over-exaggerated with [controversial benchmark testing](https://arxiv.org/html/2502.06559v1#:~:text=It%20brings%20together%20many%20fine,text%2Dbased%20AI%20models%20according).
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数公司只是在炒作AI来提高他们的投资，他们的结果通常被过度夸大，使用了[有争议的基准测试](https://arxiv.org/html/2502.06559v1#:~:text=It%20brings%20together%20many%20fine,text%2Dbased%20AI%20models%20according)。
- en: When I was building a website, ChatGPT even struggled with simple HTML and CSS,
    which you can argue is its bread and butter!
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 当我构建一个网站时，ChatGPT甚至在与简单的HTML和CSS作斗争，而这可以说是它的本职工作！
- en: Overall, don’t worry about AI if you want to work as a coder; there is much,
    much bigger fish to fry before we cross that bridge!
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 总体来说，如果你想成为一名程序员，不必担心AI；在我们越过这座桥之前，还有许多更大的问题需要解决！
- en: '*NeetCode has done a great video explaining how current AI is incapable of
    replacing programmers.*'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: '*NeetCode制作了一个很好的视频，解释了当前AI无法取代程序员的原因。*'
- en: Another thing!
  id: totrans-101
