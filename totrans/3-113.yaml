  zh: 加入我的免费通讯订阅，*[分享数据](https://newsletter.egorhowell.com)*，在那里我分享每周的数据科学家实践经验中的技巧、见解和建议。此外，作为订阅者，你将获得我的**免费数据科学简历模板**！
