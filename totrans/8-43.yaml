- en: 'Statistical Learnability of Strategic Linear Classifiers: A Proof Walkthrough'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 战略线性分类器的统计可学习性：证明过程
- en: 原文：[https://towardsdatascience.com/statistical-learnability-of-strategic-linear-classifiers-a-proof-walkthrough-e80db99d6c4e/](https://towardsdatascience.com/statistical-learnability-of-strategic-linear-classifiers-a-proof-walkthrough-e80db99d6c4e/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/statistical-learnability-of-strategic-linear-classifiers-a-proof-walkthrough-e80db99d6c4e/](https://towardsdatascience.com/statistical-learnability-of-strategic-linear-classifiers-a-proof-walkthrough-e80db99d6c4e/)
- en: In the [previous article in this series](https://towardsdatascience.com/quantifying-the-complexity-and-learnability-of-strategic-classification-problems-fd04cbfdd4b9),
    we examined the concept of *strategic VC dimension* (SVC) and its connection to
    the *Fundamental Theorem of Strategic Learning*. We will make use of both of those
    in this article, alongside the ideas of *achievable labelings* and *strategic
    shattering coefficients* that we explored in the lead-up to them.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在本系列的[前一篇文章](https://towardsdatascience.com/quantifying-the-complexity-and-learnability-of-strategic-classification-problems-fd04cbfdd4b9)中，我们探讨了*战略VC维度*（SVC）及其与*战略学习的基本定理*的联系。我们将在这篇文章中利用这两个概念，以及我们在它们之前探讨的*可达到的标签*和*战略破碎系数*。
- en: '[**Quantifying the Complexity and Learnability of Strategic Classification
    Problems**](https://towardsdatascience.com/quantifying-the-complexity-and-learnability-of-strategic-classification-problems-fd04cbfdd4b9)'
  id: totrans-3
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[**量化战略分类问题的复杂性和可学习性**](https://towardsdatascience.com/quantifying-the-complexity-and-learnability-of-strategic-classification-problems-fd04cbfdd4b9)'
- en: '**If you haven’t read the [first article in this series](https://towardsdatascience.com/extending-pac-learning-to-a-strategic-classification-setting-6c374935dde2)
    yet, I encourage you to start from there before moving on to the aforementioned
    article on SVC:**'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: '**如果您还没有阅读本系列的[第一篇文章](https://towardsdatascience.com/extending-pac-learning-to-a-strategic-classification-setting-6c374935dde2)，我鼓励您在继续阅读关于SVC的文章之前，先从那里开始。**'
- en: '[**Extending PAC Learning to a Strategic Classification Setting**](https://towardsdatascience.com/extending-pac-learning-to-a-strategic-classification-setting-6c374935dde2)'
  id: totrans-5
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[**将PAC学习扩展到战略分类设置**](https://towardsdatascience.com/extending-pac-learning-to-a-strategic-classification-setting-6c374935dde2)'
- en: With the context from the other articles in this series in place, **a basic
    grasp of set theory and geometry will be all you’ll need to understand the theorem
    and its proof.**
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在本系列其他文章的背景下，**对集合论和几何学的基本理解就足以理解定理及其证明。**
- en: '* * *'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'How an Instance-Wise Cost Function Affects SVC: Stating the Theorem'
  id: totrans-8
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 实例成本函数如何影响SVC：陈述定理
- en: 'As we saw, SVC can be used as a tool to estimate the expressive power of a
    hypothesis class within a strategic classification context. Having carefully defined
    SVC as a generalization of the canonical VC dimension, we understand that the
    two have much in common. When, though, does SVC diverge from its canonical counterpart?
    Can we come up with a scenario in which the strategic aspect of a classification
    problem significantly increases its complexity? **It turns out we can, with relative
    ease: linear classification.**'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们所看到的，SVC可以用作在战略分类背景下估计假设类表达能力的工具。我们仔细地将SVC定义为经典VC维度的推广，我们理解这两个概念有很多共同之处。然而，SVC何时会与其经典对应物产生分歧？我们能否提出一个场景，其中分类问题的战略方面显著增加了其复杂性？**实际上，我们可以轻松地做到这一点：线性分类。**
- en: Linear classification involves determining whether a data point should be positively
    or negatively classified based on a linear function applied to its features. Geometrically,
    we can imagine a linear classifier inducing a linear decision boundary in *d*-dimensional
    real space (ℝ*ᵈ* ). Anything on one side of the boundary is positively classified,
    and anything on the other side is negatively classified. In one-dimensional space,
    the decision boundary is a threshold ([as we saw in the previous article](https://towardsdatascience.com/quantifying-the-complexity-and-learnability-of-strategic-classification-problems-fd04cbfdd4b9#4322)).
    In two-dimensional space, it’s a line dividing the plane. In general, it’s a [hyperplane](https://en.wikipedia.org/wiki/Hyperplane).
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 线性分类涉及根据应用于其特征的线性函数确定数据点应该被正分类还是负分类。从几何学的角度来看，我们可以想象一个线性分类器在*d*维实空间（ℝ*ᵈ*）中诱导一个线性决策边界。边界一侧的任何事物都被正分类，而另一侧的任何事物都被负分类。在一维空间中，决策边界是一个阈值（[如我们在前一篇文章中看到的](https://towardsdatascience.com/quantifying-the-complexity-and-learnability-of-strategic-classification-problems-fd04cbfdd4b9#4322)）。在二维空间中，它是一条分割平面的线。一般来说，它是一个[超平面](https://en.wikipedia.org/wiki/Hyperplane)。
- en: '**In canonical binary classification, the VC dimension of the hypothesis class
    comprising all linear classifiers in ℝ*ᵈ* is *d + 1***, **which is finite.** For
    example, for *d* = 2 (linear classifiers in **ℝ**²), the VC dimension is 3\. The
    [Fundamental Theorem of Statistical Learning](https://www.cs.princeton.edu/courses/archive/spring16/cos511/lec17.pdf)
    dictates that **canonical linear classification is therefore PAC learnable.⁽¹⁾**'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: '**在经典的二元分类中，包含所有线性分类器的假设类在ℝ*ᵈ*中的VC维是*d + 1***，**这是有限的。**例如，对于*d* = 2（ℝ²中的线性分类器），VC维是3。统计学习的基本定理[⁽¹⁾](https://www.cs.princeton.edu/courses/archive/spring16/cos511/lec17.pdf)规定，**因此，经典线性分类是PAC可学习的。**'
- en: '**Intuitively, we might expect the same conclusion to hold for the strategic
    analog of the problem.** After all, linear classifiers are some of the simplest
    classifiers there are, and reasoning about them can be rather natural.**⁽²⁾**'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '**直观上，我们可能会期望对于问题的战略类似物得出相同的结论。**毕竟，线性分类器是最简单的分类器之一，对它们的推理可以相当自然。**⁽²⁾**'
- en: '**However, that simplicity goes out the window as soon as we throw *instance-wise*
    cost functions into the mix. As we will prove:**'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: '**然而，一旦我们将*实例级*成本函数加入其中，这种简单性就会消失。我们将证明：**'
- en: Given a strategic linear classification problem Sᴛʀᴀᴄ⟨*H*, *R*, *c*⟩, **there
    exists an** **instance-wise cost function** *c*(*z*; *x*)= ℓ*ₓ*(*z – x)* **such
    that SVC(*H*, *R*, *c*) = ∞.**
  id: totrans-14
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 给定一个战略线性分类问题Sᴛʀᴀᴄ⟨*H*, *R*, *c*⟩，**存在一个****实例级成本函数** *c*(*z*; *x*)= ℓ*ₓ*(*z
    – x)* **使得SVC(*H*, *R*, *c*) = ∞**。
- en: In other words, using the *[Fundamental Theorem of Strategic Learning](https://towardsdatascience.com/quantifying-the-complexity-and-learnability-of-strategic-classification-problems-fd04cbfdd4b9#8540)*,
    we find that **linear classification in a strategic setting equipped with an *instance-wise*
    cost function is not generally PAC learnable.** Interestingly, it will not be
    PAC learnable even if we strip away as much complexity as we can. In this case,
    we will do so by **focusing on strategic linear classification on the Cartesian
    plane ( *X* ⊆ ℝ²) with the homogeneous preference class (*R* = { 1 }).**
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，使用*[战略学习的基本定理](https://towardsdatascience.com/quantifying-the-complexity-and-learnability-of-strategic-classification-problems-fd04cbfdd4b9#8540)*，我们发现，在配备*实例级*成本函数的战略设置中，线性分类通常不是PAC可学习的。有趣的是，即使我们尽可能地去除复杂性，它也不会是PAC可学习的。在这种情况下，我们将通过**专注于笛卡尔平面（*X*
    ⊆ ℝ²）上的战略线性分类（*R* = { 1 }）**来实现这一点。
- en: '**The more general conclusion will follow from the counterexample we will show
    under those simplifying conditions.** If strategic linear classification is not
    PAC learnable in ℝ², there is no way it could be PAC learnable in any higher dimension.
    Likewise, every other preference class we laid out in our setup is a strict generalization
    of the homogeneous preference class. If we could prove PAC learnability for any
    of those preference classes, we would also be able to do so for the simpler case
    where *R* = { 1 }.'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: '**更一般的结论将源于我们在那些简化条件下将展示的反例。**如果战略线性分类在ℝ²中不是PAC可学习的，那么它就不可能在任何更高维度中是PAC可学习的。同样，我们在设置中提出的每一个其他偏好类都是同质偏好类的严格泛化。如果我们能证明任何这些偏好类的PAC可学习性，我们也将能够证明*R*
    = { 1 }这一更简单情况的可学习性。'
- en: 'From Labelings to Points on the Unit Circle: Proof Setup'
  id: totrans-17
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 从标记到单位圆上的点：证明设置
- en: 'Based on the assumptions above, we begin by turning our attention to the special
    case **Sᴛʀᴀᴄ⟨*Hₗ*, { 1 }, *c*⟩,** with *Hₗ* being the hypothesis class comprising
    all linear classifiers in ℝ². We then initialize *n* two-dimensional feature vectors
    at the origin: ∀ *i* ≤ *n* . *xᵢ* = (0, 0). Since we’re using the homogeneous
    preference class, we have that ∀ *i* ≤ *n* . *rᵢ* = 1\. **The only difference
    between the data points will be in how our cost function behaves on each of them.**
    This is where the crux of the proof lies, as we will soon see.'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 基于上述假设，我们首先将注意力转向特殊情况**Sᴛʀᴀᴄ⟨*Hₗ*, { 1 }, *c*⟩**，其中*Hₗ*是包含所有ℝ²中线性分类器的假设类。然后我们在原点初始化*n*个二维特征向量：∀
    *i* ≤ *n* . *xᵢ* = (0, 0)。由于我们使用的是同质偏好类，因此∀ *i* ≤ *n* . *rᵢ* = 1。**数据点之间的唯一区别将在于我们的成本函数在每个数据点上的行为。**这正是证明的关键所在，我们很快就会看到。
- en: 'Before we discuss the cost function at length, though, **we need to *geometrize*
    the [possible labelings](https://towardsdatascience.com/quantifying-the-complexity-and-learnability-of-strategic-classification-problems-fd04cbfdd4b9#4322)
    of our unlabeled data points.** As we saw [last time](https://towardsdatascience.com/quantifying-the-complexity-and-learnability-of-strategic-classification-problems-fd04cbfdd4b9),
    **a set of *n* unlabeled data points must have exactly 2*ⁿ* possible labelings.**
    Representing a set of labelings (*n*-tuples) geometrically in ℝ² is relatively
    straightforward: we simply select an arbitrary point for each possible labeling.
    In particular, we will **choose 2*ⁿ* such representative points** ***on the unit
    circle*,** **each assigned to a possible labeling.** While the particular coordinates
    of the representative points themselves are unimportant, **we *do* require that
    each such point be unique.** We also require that no two points be origin-symmetric
    with respect to one another.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，在我们详细讨论成本函数之前，**我们需要将我们未标记数据点的[可能标记](https://towardsdatascience.com/quantifying-the-complexity-and-learnability-of-strategic-classification-problems-fd04cbfdd4b9#4322)进行几何化**。正如我们上次看到的[那样](https://towardsdatascience.com/quantifying-the-complexity-and-learnability-of-strategic-classification-problems-fd04cbfdd4b9)，**一组
    *n* 个未标记的数据点必须有 exactly 2*ⁿ* 种可能的标记**。在 ℝ² 中将一组标记（*n*-元组）几何化相对简单：我们只需为每种可能的标记选择一个任意点。特别是，我们将**在单位圆上选择
    2*ⁿ* 个这样的代表性点**，**每个点分配给一个可能的标记**。虽然代表性点的具体坐标本身并不重要，**但我们确实需要每个这样的点都是唯一的**。我们还要求没有两个点在彼此之间是原点对称的。
- en: 'We will **denote this set of representative points by *S*.** Having selected
    our representative points, we use them to define the **origin-symmetric set *S’,***
    i.e., *S’* = { (-*x*, –*y*) : (*x*, *y*) ∈ *S* }. Note that *S* and *S’* are disjoint
    (*S* ∩ *S’* = ∅) as a consequence of how we selected the points in *S*.'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: '我们将**用 *S* 表示这个代表性点的集合**。在选择了代表性点之后，我们用它们来定义**原点对称集合 *S’*，即 *S’* = { (-*x*,
    –*y*) : (*x*, *y*) ∈ *S* }。请注意，由于我们如何选择 S 中的点，*S* 和 *S’* 是不相交的（*S* ∩ *S’* = ∅）。'
- en: For a particular *x*ᵢ, **we define *Sᵢ* as the subset of S that includes only
    the points that represent labelings in which *x*ᵢ is positively classified.**
    Similarly, we derive the origin-symmetric *Sᵢ’* ⊂ *S’* from *Sᵢ*. In the example
    below, the points above the *x*-axis are those representing labelings in which
    *x*ᵢ is positively classified, i.e., *Sᵢ*. Those below the *x*-axis comprise their
    origin-symmetric set *Sᵢ’* (with the numbering matching between symmetric pairs
    of points). Note that the selection of points above the *x*-axis is completely
    arbitrary.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 对于特定的 *x*ᵢ，**我们定义 *Sᵢ* 为 S 的子集，它只包含代表 *x*ᵢ 被正分类的标记的点**。同样，我们从 *Sᵢ* 推导出原点对称的
    *Sᵢ’* ⊂ *S’*。在下面的例子中，位于 *x*-轴上方的点是代表 *x*ᵢ 被正分类的标记，即 *Sᵢ*。位于 *x*-轴下方的点构成了它们的原点对称集合
    *Sᵢ’*（对称点对之间的编号匹配）。请注意，位于 *x*-轴上方的点的选择是完全随机的。
- en: '![Figure 1: An example of labeling geometrization for an arbitrary _x_ᵢ. Recall
    that we started by initializing all unlabeled data points as (0, 0). Points in
    Sᵢ are numbered in black. Their origin-symmetric counterparts in Sᵢ'' are numbered
    in blue. Image by the author, based on image by R. Sundaram, A. Vullikanti, H.
    Xu, F. Yao from PAC-Learning for Strategic Classification (use under CC-BY 4.0
    license).](../Images/61e747e2083affa91d6c73fa02fbe79f.png)'
  id: totrans-22
  prefs: []
  type: TYPE_IMG
  zh: '![图 1：任意 _x_ᵢ 的几何化标记示例。回想一下，我们最初将所有未标记的数据点初始化为 (0, 0)。Sᵢ 中的点用黑色编号。它们在 Sᵢ''
    中的原点对称对应点用蓝色编号。图像由作者根据 R. Sundaram、A. Vullikanti、H. Xu、F. Yao 的图像制作，来自《PAC-Learning
    for Strategic Classification》（在 CC-BY 4.0 许可证下使用）](../Images/61e747e2083affa91d6c73fa02fbe79f.png)'
- en: '**Figure 1:** An example of labeling geometrization for an arbitrary *x*ᵢ.
    Recall that we started by initializing all unlabeled data points as (0, 0). Points
    in *Sᵢ* are numbered in black. Their origin-symmetric counterparts in *Sᵢ’* are
    numbered in blue*.* Image by the author, based on image by R. Sundaram, A. Vullikanti,
    H. Xu, F. Yao from **[PAC-Learning for Strategic Classification](https://arxiv.org/abs/2012.03310)**
    (use under [CC-BY 4.0 license](https://creativecommons.org/licenses/by/4.0/)).'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: '**图 1**：任意 *x*ᵢ 的几何化标记示例。回想一下，我们最初将所有未标记的数据点初始化为 (0, 0)。*Sᵢ* 中的点用黑色编号。它们在 *Sᵢ’*
    中的原点对称对应点用蓝色编号*。图像由作者根据 R. Sundaram、A. Vullikanti、H. Xu、F. Yao 的图像制作，来自 **[PAC-Learning
    for Strategic Classification](https://arxiv.org/abs/2012.03310)**（在 [CC-BY 4.0
    许可证](https://creativecommons.org/licenses/by/4.0/) 下使用）。'
- en: '**We proceed to construct a convex polygon *Gᵢ*, with its vertices being the
    points in *Sᵢ* ∪ *Sᵢ’*.** The *Gᵢ* for each unlabeled data point will be key in
    designing an instance-wise cost function *c* with which we will always be able
    to achieve all possible labelings, thus showing that SVC(*Hₗ*, { 1 }, *c*) = ∞.
    Towards this end, the convexity of *Gᵢ* will prove critical, as will its origin
    symmetry (stemming from our choice of *Sᵢ’* ).'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: '**我们继续构建一个凸多边形 *Gᵢ*，其顶点为 *Sᵢ* ∪ *Sᵢ’* 中的点。** 对于每个未标记的数据点 *Gᵢ*，将是在设计实例成本函数 *c*
    中的关键，该函数将使我们始终能够实现所有可能的标记，从而证明 SVC(*Hₗ*, { 1 }, *c*) = ∞。为此，*Gᵢ* 的凸性将至关重要，正如其原点对称性（源于我们对
    *Sᵢ’* 的选择）一样。'
- en: '![Figure 2: The convex, origin-symmetric polygon Gᵢ derived from Sᵢ and Sᵢ''
    as shown in Figure 1\. Image by the author, based on image by R. Sundaram, A.
    Vullikanti, H. Xu, F. Yao from PAC-Learning for Strategic Classification (use
    under CC-BY 4.0 license).](../Images/f6514352d08bc320cd7667c59f4fa95f.png)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![图 2: 由图 1 中所示的 Sᵢ 和 Sᵢ’ 导出的凸、原点对称多边形 Gᵢ。图片由作者提供，基于 R. Sundaram, A. Vullikanti,
    H. Xu, F. Yao 的图片，见 PAC-Learning for Strategic Classification (在 CC-BY 4.0 许可证下使用)。](../Images/f6514352d08bc320cd7667c59f4fa95f.png)'
- en: '**Figure 2:** The convex, origin-symmetric polygon Gᵢ derived from *Sᵢ and
    Sᵢ’ as shown in Figure 1.* Image by the author, based on image by R. Sundaram,
    A. Vullikanti, H. Xu, F. Yao from **[PAC-Learning for Strategic Classification](https://arxiv.org/abs/2012.03310)**
    (use under [CC-BY 4.0 license](https://creativecommons.org/licenses/by/4.0/)).'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: '**图 2:** 由图 1 中所示的 *Sᵢ* 和 *Sᵢ’* 导出的凸、原点对称多边形 Gᵢ。图片由作者提供，基于 R. Sundaram, A.
    Vullikanti, H. Xu, F. Yao 的图片，见 **[PAC-Learning for Strategic Classification](https://arxiv.org/abs/2012.03310)**
    (在 [CC-BY 4.0 许可证](https://creativecommons.org/licenses/by/4.0/) 下使用)。'
- en: 'Turning Polygons into Preferences: Constructing the Cost Function'
  id: totrans-27
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 将多边形转化为偏好：构建成本函数
- en: 'For each of the *n* origin-initialized, unlabeled data points we started with,
    we now have a convex, origin-symmetric polygon that represents the labelings in
    which it is positively classified. **Each *Gᵢ* can now be used to define the behavior
    of our instance-wise cost function *c* on its corresponding *xᵢ*.** We will use
    *Gᵢ* to define a seminorm**⁽³⁾**:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我们最初开始的每个原点初始化的未标记数据点，我们现在有一个代表正分类标签的凸、原点对称多边形。**现在，每个 *Gᵢ* 都可以用来定义我们的实例成本函数
    *c* 在其相应的 *xᵢ* 上的行为。** 我们将使用 *Gᵢ* 来定义一个半范数**⁽³⁾**：
- en: '**∥ *y* ∥*ɢᵢ* = inf { ε ∈ ℝ⁺ : *y* ∈ ε*Gᵢ* }**'
  id: totrans-29
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**∥ *y* ∥*ɢᵢ* = inf { ε ∈ ℝ⁺ : *y* ∈ ε*Gᵢ* }**'
- en: 'This definition implies that **the distance between *xᵢ* and some point *z*
    is less than 1 if and only if *z* lies within *Gᵢ.*** I.e.:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 这个定义意味着 **如果 *xᵢ* 和某个点 *z* 之间的距离小于 1，当且仅当 *z* 位于 *Gᵢ* 内部。** 即：
- en: ∥ *z* – *xᵢ* ∥*ɢᵢ* < 1 ⇔ *z* ∈ *Gᵢ*
  id: totrans-31
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: ∥ *z* – *xᵢ* ∥*ɢᵢ* < 1 ⇔ *z* ∈ *Gᵢ*
- en: '**For the rest of the proof, it is sufficient that we understand this connection
    between ∥ ⋅ ∥*ɢᵢ* and a point being inside *Gᵢ*.** (See Footnote (3) for a discussion
    of why ∥ ⋅ ∥*ɢᵢ* qualifies as a seminorm and for more details about its geometric
    interpretation.)'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: '**对于证明的其余部分，我们只需要理解 ∥ ⋅ ∥*ɢᵢ* 和一个点是否在 *Gᵢ* 内部的这种联系即可。** (参见脚注 (3) 中关于为什么 ∥
    ⋅ ∥*ɢᵢ* 符合半范数的讨论，以及更多关于其几何解释的细节。)'
- en: '**We thus define the instance-wise cost function *c*:**'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: '**因此，我们定义实例成本函数 *c*：**'
- en: '*c*(*z*; *xᵢ*) = ℓ*ᵢ*(*z* – *xᵢ*)'
  id: totrans-34
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*c*(*z*; *xᵢ*) = ℓ*ᵢ*(*z* – *xᵢ*)'
- en: '**Where:**'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: '**其中：**'
- en: ℓ*ᵢ*(*z* – *xᵢ*) = ∥ *z* – *xᵢ* ∥*ɢᵢ*
  id: totrans-36
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: ℓ*ᵢ*(*z* – *xᵢ*) = ∥ *z* – *xᵢ* ∥*ɢᵢ*
- en: '**That is, for each unlabeled data point *xᵢ*, *c* behaves as ∥ ⋅ ∥*ɢᵢ* would.**
    Note that this behavior is different for each data point. This is because we constructed
    a unique *Gᵢ* for every *xᵢ*, and each ∥ **⋅** ∥*ɢᵢ* is derived from its corresponding
    polygon *Gᵢ*.'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: '**也就是说，对于每个未标记的数据点 *xᵢ*，*c* 的行为就像 ∥ ⋅ ∥*ɢᵢ* 一样。** 注意，这种行为对于每个数据点都是不同的。这是因为我们为每个
    *xᵢ* 构建了一个独特的 *Gᵢ*，并且每个 ∥ **⋅** ∥*ɢᵢ* 都是从其相应的多边形 *Gᵢ* 中导出的。'
- en: Data Point Best Response as a Result of the Cost Function
  id: totrans-38
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数据点最佳响应作为成本函数的结果
- en: With the instance-wise cost function *c* in place, **we may turn our attention
    to how our data points interact with linear classifiers.** Recall that we have
    constrained our consideration to the homogeneous preference class, meaning that
    *r* = 1 for all of our points. I.e., *xᵢ* stands to gain a reward of magnitude
    1 for being positively classified. Given a linear classifier, **each data point
    will thus be willing to incur any cost less than 1 to manipulate its feature vector
    to ensure it falls on the positive side of the decision boundary.** This will
    guarantee it receives positive utility as a result of the manipulation.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 在实例成本函数 *c* 就位后，**我们可以将注意力转向我们的数据点如何与线性分类器交互。**回想一下，我们已将考虑范围限制在齐次偏好类别，这意味着 *r*
    = 1 对于我们所有的点。即，*xᵢ* 通过被正面分类而获得1的奖励。给定一个线性分类器，**每个数据点都愿意承担任何小于1的成本，以操纵其特征向量，确保它落在决策边界的正侧。**这将保证它通过操纵获得正效用。
- en: '*c* is designed so that a data point with feature vector *xᵢ* has to pay ∥
    *z* – *xᵢ* ∥*ɢᵢ* to change its feature vector to *z*. As we saw, as long as *z*
    lies insid*e* *Gᵢ*, this cost will be less than 1.'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: '*c* 被设计成，具有特征向量 *xᵢ* 的数据点必须支付 ∥ *z* – *xᵢ* ∥*ɢᵢ* 以将其特征向量改变为 *z*。正如我们所见，只要 *z*
    位于 *Gᵢ* 内，这个成本就会小于1。'
- en: '**Suppose we have a decision boundary that crosses *Gᵢ*** (intersects it at
    two points) **with *xᵢ* falling on its negative half-plane*.* As illustrated in
    Figure 3 below,** this creates a sub-polygon such that for any *z* within it:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: '**假设我们有一个决策边界穿过 *Gᵢ***（在两个点上相交）**，*xᵢ* 落在其负半平面**。如图3所示，**这创建了一个子多边形，对于该子多边形内的任何
    *z*：'
- en: 'The cost to move to *z* is less than 1: *c*(*z*; *xᵢ*) = ∥ *z* – *xᵢ* ∥*ɢᵢ*
    < 1'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 移动到 *z* 的成本小于1：*c*(*z*; *xᵢ*) = ∥ *z* – *xᵢ* ∥*ɢᵢ* < 1
- en: 'The [realized reward](https://towardsdatascience.com/extending-pac-learning-to-a-strategic-classification-setting-6c374935dde2#2a1e)
    for moving is precisely 1: 𝕀(*h*(*z*)= 1) *⋅ r* = 1'
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 移动的[实现奖励](https://towardsdatascience.com/extending-pac-learning-to-a-strategic-classification-setting-6c374935dde2#2a1e)精确为1：𝕀(*h*(*z*)=
    1) *⋅ r* = 1
- en: Whereby the utility for data point *i*, 𝕀(*h*(*z*)= 1*) ⋅ r* – *c*(*z*; x*ᵢ)*,
    is positive, in turn making any such z a better response than non-manipulation.
    In other words, **the data point will always want to manipulate its feature vector
    into one that lies in this sub-polygon.**
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 其中，数据点 *i* 的效用，𝕀(*h*(*z*)= 1*) ⋅ r* – *c*(*z*; x*ᵢ)*，是正的，从而使得任何这样的 *z* 都比非操纵的响应更好。换句话说，**数据点总是会想要将其特征向量操纵成位于这个子多边形内的一个。**
- en: '![Figure 3: An example of a linear classifier with a decision boundary that
    properly intersects Gᵢ, with xᵢ falling on its negative half-plane. The resulting
    "Goldilocks zone" between the decision boundary and the perimeter of Gᵢ is shaded
    in green. Changing xᵢ to any z lying in this area confers positive utility. This
    is because the reward gained is 1 and the cost incurred is less than 1\. Image
    by the author, based on image by R. Sundaram, A. Vullikanti, H. Xu, F. Yao from
    PAC-Learning for Strategic Classification (use under CC-BY 4.0 license).](../Images/f00179cbca867c5660be920980be4794.png)'
  id: totrans-45
  prefs: []
  type: TYPE_IMG
  zh: '![图3：一个线性分类器的示例，其决策边界正确地与 Gᵢ 相交，xᵢ 落在其负半平面。决策边界和 Gᵢ 周边之间的“黄金区域”用绿色阴影表示。将 xᵢ
    改变为位于此区域的任何 z 都会带来正效用。这是因为获得的奖励是1，而发生的成本小于1。图片由作者根据 R. Sundaram, A. Vullikanti,
    H. Xu, F. Yao 的图片制作，基于 PAC-Learning for Strategic Classification (在 CC-BY 4.0
    许可下使用)。](../Images/f00179cbca867c5660be920980be4794.png)'
- en: '**Figure 3:** An example of a linear classifier with a decision boundary that
    properly intersects *Gᵢ*, with *xᵢ* falling on its negative half-plane. The resulting
    “Goldilocks zone” between the decision boundary and the perimeter of *Gᵢ* is shaded
    in green. Changing *xᵢ* to any *z* lying in this area confers **positive utility.**
    This is because the reward gained is 1 and the cost incurred is less than 1\.
    Image by the author, based on image by R. Sundaram, A. Vullikanti, H. Xu, F. Yao
    from **[PAC-Learning for Strategic Classification](https://arxiv.org/abs/2012.03310)**
    (use under [CC-BY 4.0 license](https://creativecommons.org/licenses/by/4.0/)).'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: '**图3：**一个线性分类器的示例，其决策边界正确地与 *Gᵢ* 相交，*xᵢ* 落在其负半平面。决策边界和 *Gᵢ* 周边之间的“黄金区域”用绿色阴影表示。将
    *xᵢ* 改变为位于此区域的任何 *z* 都会带来**正效用**。这是因为获得的奖励是1，而发生的成本小于1。图片由作者根据 R. Sundaram, A.
    Vullikanti, H. Xu, F. Yao 的图片制作，基于 **[PAC-Learning for Strategic Classification](https://arxiv.org/abs/2012.03310)**（在
    [CC-BY 4.0 许可下使用）**]。'
- en: '**Conversely, given a decision boundary that does *not* cross *Gᵢ*,** no such
    sub-polygon exists. The cost of manipulating *xᵢ* to cross the boundary will always
    be greater than 1, and thus not worth the reward. **The data point best response
    will be the original feature vector, meaning it’s best to stay put.**'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: '**相反，给定一个不穿过 **Gᵢ** 的决策边界，**不存在这样的子多边形。将 **xᵢ** 操作以穿过边界的成本将始终大于 1，因此不值得奖励。**数据点的最佳响应将是原始特征向量，这意味着最好保持原位。**'
- en: '![Figure 4: An example of a polygon Gᵢ and a linear classifier with a decision
    boundary that does not cross it. Note how there are no points that are both on
    the positive side of the decision boundary and inside _Gᵢ. Equivalently, there
    are no vectors into which the data point could manipulate its feature vector for
    positive utility._ Image by the author, based on image by R. Sundaram, A. Vullikanti,
    H. Xu, F. Yao from PAC-Learning for Strategic Classification (use under CC-BY
    4.0 license).](../Images/6c57ecf23cd0b8c8e66ee1bf3d5de860.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
  zh: '![图 4：一个多边形 **Gᵢ** 和一个决策边界不穿过的线性分类器的示例。注意，没有点同时位于决策边界的正侧和 **Gᵢ** 内部。等价地，没有向量是数据点可以操作其特征向量以获得正效用的。图片由作者根据
    R. Sundaram, A. Vullikanti, H. Xu, F. Yao 的图片制作，来自 PAC-Learning for Strategic
    Classification（在 CC-BY 4.0 许可下使用）](../Images/6c57ecf23cd0b8c8e66ee1bf3d5de860.png)'
- en: '**Figure 4:** An example of a polygon *Gᵢ* and a linear classifier with a decision
    boundary that **does not** cross it. Note how **there are no points that are both
    on the positive side of the decision boundary and inside *Gᵢ*.** Equivalently,
    there are no vectors into which the data point could manipulate its feature vector
    for positive utility. Image by the author, based on image by R. Sundaram, A. Vullikanti,
    H. Xu, F. Yao from **[PAC-Learning for Strategic Classification](https://arxiv.org/abs/2012.03310)**
    (use under [CC-BY 4.0 license](https://creativecommons.org/licenses/by/4.0/)).'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: '**图 4**：一个多边形 **Gᵢ** 和一个决策边界**不**穿过的线性分类器的示例。注意，**没有点同时位于决策边界的正侧和 **Gᵢ** 内部**。等价地，没有向量是数据点可以操作其特征向量以获得正效用的。图片由作者根据
    R. Sundaram, A. Vullikanti, H. Xu, F. Yao 的图片制作，来自 **[PAC-Learning for Strategic
    Classification](https://arxiv.org/abs/2012.03310)**（在 [CC-BY 4.0 许可下使用](https://creativecommons.org/licenses/by/4.0/)）。'
- en: Isolating Representative Points Using Linear Classifiers
  id: totrans-50
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用线性分类器隔离代表点
- en: We now understand the strategic implications of whether or not a certain decision
    boundary crosses *Gᵢ*. Calling to mind the role of our points on the unit circle
    as representatives of possible labelings, **we can demonstrate the connection
    between labelings where a data point is positively classified and linear classifiers.**
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在理解了某个决策边界是否穿过 **Gᵢ** 的战略影响。想起我们的点在单位圆上作为可能标记的代表的作用，**我们可以展示数据点被正分类的标记与线性分类器之间的联系。**
- en: Let 𝓛 be an arbitrary labeling of our *n* data points, and let *sₗ* ∈ *S* be
    its unique representative point on the unit circle. Let *xᵢ* be one of our unlabeled
    data points. We will explore the behavior of the data point with respect to a
    particular linear classifier, denoted *hₗ*. **We require that the decision boundary
    induced by *hₗ* do the following:**
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 设 𝓛 为我们 **n** 个数据点的任意标记，并设 **sₗ** ∈ **S** 为其在单位圆上的唯一代表点。设 **xᵢ** 为我们的一个未标记数据点。我们将探讨数据点相对于特定线性分类器（记为
    **hₗ**）的行为。**我们要求 **hₗ** 诱导的决策边界执行以下操作：**
- en: Cross the unit circle.
  id: totrans-53
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 穿过单位圆。
- en: Strictly separate *sₗ* from all other points in *S* ∪ *S’*.
  id: totrans-54
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 严格将 **sₗ** 与 **S** ∪ **S’** 中的所有其他点分开。
- en: Positively classify *sₗ*.
  id: totrans-55
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 正确分类 **sₗ**。
- en: '**The structure of *S* ∪ *S’* guarantees that such an *hₗ* exists.⁽⁴⁾**'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: '**S** ∪ **S’** 的结构保证了存在这样的 **hₗ**。⁽⁴⁾'
- en: With *hₗ* at our disposal, we may explore how our cost function *c* interacts
    with *hₗ* for *xᵢ* depending on whether or not *xᵢ* should be positively classified
    under 𝓛. **In fact, we will prove that a data point is positively classified by
    *hₗ* if and only if it is positively labeled under 𝓛.**
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们拥有 **hₗ** 的情况下，我们可以探索我们的成本函数 **c** 如何与 **hₗ** 对于 **xᵢ** 交互，这取决于 **xᵢ** 是否应该在
    𝓛 下被正分类。**实际上，我们将证明一个数据点被 **hₗ** 正分类当且仅当它在 𝓛 下被正标记。**
- en: Let us first consider the case in which **we want *xᵢ* to be *positively* labeled
    (see Figure 5).** Recall that we defined *Sᵢ* as “the subset of *S* that includes
    only the points that represent labelings in which *xᵢ* is positively classified.”
    We know, then, that ***sₗ* ∈ *Sᵢ*.** In particular, *sₗ* must be one of the vertices
    of *Gᵢ*. The fact that *hₗ* strictly separates *sₗ* from all other points in *S*
    ∪ *S’* means that it is strictly separated from the other vertices of *Gᵢ*. **Hence,
    *hₗ* must cross *Gᵢ,* incentivizing the data point to manipulate its feature vector.**
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们先考虑这样一个案例：**我们希望 *xᵢ* 被正标签化（见图 5）。**回想一下，我们将 *Sᵢ* 定义为“*S* 的子集，只包含代表 *xᵢ*
    被正分类的标签化的点。”因此，我们知道 ***sₗ* 属于 *Sᵢ*.**特别是，sₗ* 必须是 *Gᵢ* 的顶点之一。hₗ* 严格地将 sₗ* 与 *S*
    ∪ *S’* 中的所有其他点分开的事实意味着它严格地与其他 *Gᵢ* 的顶点分开。**因此，hₗ* 必须与 *Gᵢ* 相交，激励数据点操纵其特征向量**。
- en: '![Figure 5: If _x_ᵢ should be positively labeled under 𝓛, ** hₗ crosses Gᵢ.
    This incentivizes the data point to manipulate its feature vector (see Figure
    3**). Image by R. Sundaram, A. Vullikanti, H. Xu, F. Yao from PAC-Learning for
    Strategic Classification (use under CC-BY 4.0 license).](../Images/766db3fe1d0529ae02be88071dd4d7a0.png)'
  id: totrans-59
  prefs: []
  type: TYPE_IMG
  zh: '![图 5：如果 _x_ᵢ 在 𝓛 下应该被正标签化，**hₗ 与 Gᵢ 相交。这激励数据点操纵其特征向量（见图 3**）。图片由 R. Sundaram,
    A. Vullikanti, H. Xu, F. Yao 提供，来自 **PAC-Learning for Strategic Classification**（在
    CC-BY 4.0 许可下使用）](../Images/766db3fe1d0529ae02be88071dd4d7a0.png)'
- en: '**Figure 5:** If *xᵢ* should be positively labeled under 𝓛, ***hₗ* crosses
    *Gᵢ****.***This incentivizes the data point to manipulate its feature vector (see
    Figure 3)***.* Image by R. Sundaram, A. Vullikanti, H. Xu, F. Yao from **PAC-Learning
    for Strategic Classification** (use under [CC-BY 4.0 license)](https://creativecommons.org/licenses/by/4.0/).'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: '**图 5：如果 *xᵢ* 在 𝓛 下应该被正标签化，***hₗ* 与 *Gᵢ* 相交**。这激励数据点操纵其特征向量（见图 3）***。图片由 R.
    Sundaram, A. Vullikanti, H. Xu, F. Yao 提供，来自 **PAC-Learning for Strategic Classification**（在
    CC-BY 4.0 许可下使用）](../Images/766db3fe1d0529ae02be88071dd4d7a0.png)'
- en: We proceed to examine the case in which **we want *xᵢ* to be *negatively* labeled
    under 𝓛 (see Figure 6).** As a result of how we constructed S*ᵢ,* s***ₗ* ∉ *Sᵢ****.*
    Additionally, having required that the origin-symmetric *S’* b*e* disjointfrom
    *S*, we know that s***ₗ* ∉ *Sᵢ’.*** It follows that *s**ₗ*** **is not a vertex
    of G*ᵢ.*** Once again, h*ₗ* strictly separates s*ₗ* from all other points in *S*
    ∪ *S’,* including all the vertices of *Gᵢ*. Because *Gᵢ* is convex, we conclude
    that **any point in *Gᵢ* is on the opposite side of *hₗ* as *sₗ*.** In other words,
    ***hₗ* does not cross *Gᵢ*.** Consequently, **the data point will choose to stay
    put** rather than “overpaying” to manipulate its feature vector to cross *hₗ*.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 我们继续考察这样一个案例：**我们希望 *xᵢ* 在 𝓛 下被 *负标签化*（见图 6）。**由于我们如何构建 S*ᵢ，s***ₗ* 不属于 *Sᵢ****.*
    此外，由于我们要求原点对称的 *S’* 与 *S* 不相交，我们知道 s***ₗ* 不属于 *Sᵢ’***。因此，*s**ₗ*** **不是 G*ᵢ 的一个顶点**。再次，h*ₗ*严格地将
    s*ₗ* 与 *S* ∪ *S’* 中的所有其他点分开，包括 *Gᵢ* 的所有顶点。因为 *Gᵢ* 是凸集，我们得出结论：**G*ᵢ 中的任何一点都在 hₗ*
    的另一侧，与 sₗ* 相对**。换句话说，***hₗ* 不与 *Gᵢ* 相交**。因此，**数据点会选择停留在原地**，而不是“过度支付”来操纵其特征向量以穿越
    hₗ*。
- en: '![Figure 6: If _x_ᵢ should be positively labeled under 𝓛, hₗ does not cross
    G_ᵢ. This incentivizes the data point not to manipulate its feature vector (see
    Figure 4). I_mage by R. Sundaram, A. Vullikanti, H. Xu, F. Yao from PAC-Learning
    for Strategic Classification (use under CC-BY 4.0 license).](../Images/87a4a19c03de1d0774c8cae7a9311fae.png)'
  id: totrans-62
  prefs: []
  type: TYPE_IMG
  zh: '![图 6：如果 _x_ᵢ 在 𝓛 下应该被 *正标签化*，hₗ 不与 G_ᵢ 相交。这激励数据点不操纵其特征向量（见图 4）。图片由 R. Sundaram,
    A. Vullikanti, H. Xu, F. Yao 提供，来自 PAC-Learning for Strategic Classification（在
    CC-BY 4.0 许可下使用）](../Images/87a4a19c03de1d0774c8cae7a9311fae.png)'
- en: '**Figure 6:** If *xᵢ* should be positively labeled under 𝓛, ***hₗ* does not
    cross *Gᵢ*.** This incentivizes the data point **not** to manipulate its feature
    vector (see **Figure 4)**. Image by R. Sundaram, A. Vullikanti, H. Xu, F. Yao
    from **PAC-Learning for Strategic Classification** (use under [CC-BY 4.0 license)](https://creativecommons.org/licenses/by/4.0/).'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: '**图 6：如果 *xᵢ* 在 𝓛 下应该被正标签化，***hₗ* 不与 *Gᵢ* 相交**。这激励数据点 **不** 操纵其特征向量（见图 4）。图片由
    R. Sundaram, A. Vullikanti, H. Xu, F. Yao 提供，来自 **PAC-Learning for Strategic Classification**（在
    CC-BY 4.0 许可下使用）](../Images/87a4a19c03de1d0774c8cae7a9311fae.png)'
- en: '**In summary, our unlabeled data point *xᵢ* will engage in manipulation to
    cross *hₗ* if and only if 𝓛 dictates that the data point should be positively
    classified.** In our strategic classification setting, this means that ***hₗ***
    **positively classifies a data point if and only if that data point should be
    positively labeled according to 𝓛.**'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: '**总之，我们的未标记数据点 *xᵢ* 将会参与操作以跨越 *hₗ*，当且仅当 𝓛 指示该数据点应该被正类分类。** 在我们的战略分类设置中，这意味着
    ***hₗ*** **如果且仅当根据 𝓛 该数据点应该被正标记时，才会对数据点进行正类分类。**'
- en: 'Putting It All Together: Inducing an Arbitrary Labeling'
  id: totrans-65
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 将所有内容整合：诱导任意标记
- en: Using what we have seen so far, we are able to demonstrate that we can achieve
    any labeling of our *n* data points we want. **Overlaying all of our data points
    and their respective polygons** (see Figure 7), we can see that **given a labeling
    𝓛, we are able to achieve it** with the help of a corresponding linear classifier
    *hₗ*.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 使用我们迄今为止所看到的内容，我们能够证明我们可以实现我们想要的任何 *n* 个数据点的标记。**将所有数据点及其相应的多边形叠加**（见图 7），我们可以看到**给定一个标记
    𝓛，我们能够借助相应的线性分类器 *hₗ* 实现它**。
- en: '![Figure 7: Simplified visualization of overlaid data points with their corresponding
    cost function polygons. sₗ represents a labeling 𝓛 i_n which data point i should
    be positively classified and data point j should be negatively classified. The
    unmanipulated feature vectors of the two overlap at (0, 0). However, data point
    i will be positively classified by hₗ because it will move to the positive side
    of the decision boundary induced by hₗ (since the boundary crosses Gᵢ). Data point
    j will stay on the negative side because the boundary does not cross Gⱼ. I_mage
    by the author, based on images by R. Sundaram, A. Vullikanti, H. Xu, F. Yao from
    PAC-Learning for Strategic Classification (use under CC-BY 4.0 license).](../Images/1f3fa8bba70d44f5de6613b114b6762a.png)'
  id: totrans-67
  prefs: []
  type: TYPE_IMG
  zh: '![图 7：叠加数据点及其对应成本函数多边形的简化可视化。sₗ 代表一个标记 𝓛，其中数据点 i 应该被正类分类，数据点 j 应该被负类分类。未操纵的特征向量在
    (0, 0) 处重叠。然而，数据点 i 将会被 hₗ 正类分类，因为它将移动到由 hₗ 诱导的决策边界的正侧（因为边界穿过 Gᵢ）。数据点 j 将保持在负侧，因为边界没有穿过
    Gⱼ**。图片由作者制作，基于 R. Sundaram、A. Vullikanti、H. Xu、F. Yao 的图片，来自 PAC-Learning for
    Strategic Classification（在 CC-BY 4.0 许可下使用）](../Images/1f3fa8bba70d44f5de6613b114b6762a.png)'
- en: '**Figure 7:** Simplified visualization of overlaid data points with their corresponding
    cost function polygons. ***sₗ*** **represents a labeling** 𝓛 **in which data point
    *i* should be positively classified and data point *j* should be negatively classified.**
    The unmanipulated feature vectors of the two overlap at (0, 0). However, **data
    point *i* will be positively classified by *hₗ*** because it will move to the
    positive side of the decision boundary induced by *hₗ* (since the boundary crosses
    *Gᵢ*). **Data point j will stay on the negative side** because the boundary does
    not cross *Gⱼ*. Image by the author, based on images by R. Sundaram, A. Vullikanti,
    H. Xu, F. Yao from **PAC-Learning for Strategic Classification** (use under [CC-BY
    4.0 license)](https://creativecommons.org/licenses/by/4.0/).'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: '**图 7：叠加数据点及其对应成本函数多边形的简化可视化。***sₗ*** **代表一个标记** 𝓛 **，其中数据点 *i* 应该被正类分类，数据点
    *j* 应该被负类分类。** 两个未操纵的特征向量在 (0, 0) 处重叠。然而，**数据点 *i* 将会被 *hₗ* 正类分类，因为它将移动到由 *hₗ*
    诱导的决策边界的正侧（因为边界穿过 *Gᵢ*）。数据点 *j* 将保持在负侧，因为边界没有穿过 *Gⱼ***。图片由作者制作，基于 R. Sundaram、A.
    Vullikanti、H. Xu、F. Yao 的图片，来自 **PAC-Learning for Strategic Classification**（在
    [CC-BY 4.0 许可下使用)](https://creativecommons.org/licenses/by/4.0/)。'
- en: Any data point *xᵢ* that 𝓛 rules should be positively classified will manipulate
    its feature vector and move to the positive side of the decision boundary created
    by *hₗ* (like the case in Figure 5). At the same time, any data point *xⱼ* that
    should be negatively classified will not be sufficiently incentivized to manipulate
    its feature vector, causing it to stay on the negative side of the decision boundary.
    **Across all *n* data points, those that will be positively classified will be
    *exactly* the ones that 𝓛 dictates should be positively classified. In other words,
    we can induce any labeling we wish.**
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 任何 𝓛 规定的应该被正类分类的数据点 *xᵢ* 将会操纵其特征向量并移动到由 *hₗ* 创建的决策边界正侧（如图 5 中的情况）。同时，任何应该被负类分类的数据点
    *xⱼ* 将不会得到足够的激励去操纵其特征向量，导致它停留在决策边界的负侧。**在所有 *n* 个数据点中，将被正类分类的将正好是 𝓛 指示应该被正类分类的那些。换句话说，我们可以诱导我们想要的任何标记。**
- en: We therefore have a sample of *n* unlabeled, potentially-manipulated data points
    that is **strategically shattered by *Hₗ*,** the hypothesis class of all linear
    classifiers in ℝ². Based on [how we defined strategic shattering coefficients](https://towardsdatascience.com/quantifying-the-complexity-and-learnability-of-strategic-classification-problems-fd04cbfdd4b9#974a),
    we find that **σ*ₙ*(*Hₗ,* { 1 }*, c*) = 2*ⁿ*.** **It follows that SVC(*Hₗ,* {
    1 }*, c*) = ∞.**
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们有一个样本，包含*n*个未标记的、可能被操纵的数据点，这些数据点被**Hₗ**，即所有线性分类器的假设类在ℝ²中的**策略性地破碎**。根据[我们定义的策略性破碎系数](https://towardsdatascience.com/quantifying-the-complexity-and-learnability-of-strategic-classification-problems-fd04cbfdd4b9#974a)，我们发现**σ*ₙ*(*Hₗ,*
    { 1 }*, c*) = 2*ⁿ**。**因此，SVC(*Hₗ,* { 1 }*, c*) = ∞**。
- en: '* * *'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Conclusion
  id: totrans-72
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 结论
- en: First, **we posed linear classification** as a problem that is canonically PAC
    learnable, but **not generally strategic PAC learnable.** Second, we simplified
    our strategic classification problem by limiting our consideration to **the homogeneous
    preference class on the Cartesian plane.** Given *n* origin-initialized data points,
    **we mapped each of their 2*ⁿ* possible labelings to a unique representative point**
    on the unit circle. We then **created a polygon for each data point** using the
    representative points corresponding to the labelings under which it should be
    positively classified.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们将**线性分类**问题设定为一个经典的可学习PAC问题，但**不是一般意义上的策略性PAC可学习问题**。其次，我们通过将考虑范围限制在**笛卡尔平面上同质偏好类**来简化我们的策略性分类问题。给定*n*个以原点初始化的数据点，我们将它们*2ⁿ*种可能的标记映射到单位圆上的一个唯一代表点。然后，我们为每个数据点**创建一个多边形**，使用对应于它应该被正分类的标记下的代表点。
- en: Based on those polygons, **we constructed an instance-wise cost function, *c*,**
    for which the cost of feature manipulation is less than 1 only within each polygon.
    Next, we showed that **for any labeling** 𝓛, **we could find a linear classifier
    that isolates its respective representative point.** Such a classifier, paired
    with c*,* ensured that **only the data points that are *supposed* to be positively
    classified according to 𝓛** **are incentivized to manipulate their feature vectors**
    to cross the decision boundary and end up with a positive label. Finally, we explained
    why that means that **the SVC of the problem is infinite.**
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 基于这些多边形，我们构建了一个实例级成本函数*c*，其中特征操作的代价仅在多边形内小于1。接下来，我们证明了**对于任何标记**𝓛，**我们都可以找到一个线性分类器，该分类器可以隔离其相应的代表点**。这样的分类器与c*配对，确保**只有根据𝓛**
    **应该被正分类的数据点**才会被激励去操作它们的特征向量以跨越决策边界并获得正标签。最后，我们解释了这为什么意味着**该问题的SVC是无限的**。
