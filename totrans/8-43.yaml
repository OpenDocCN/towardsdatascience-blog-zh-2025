- en: '* * *'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Footnotes
  id: totrans-79
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 脚注
- en: '**(1)** See a proof of this result, as well as a great interactive explanation
    of linear classification, **[here](https://mlweb.loria.fr/book/en/VCdimhyperplane.html).**
    What we refer to as a “linear classifier” throughout this article is technically
    an *affine* classifier.'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: '**(1)** 请参阅此结果的证明，以及线性分类的精彩交互式解释 **[这里](https://mlweb.loria.fr/book/en/VCdimhyperplane.html)**。本文中我们所说的“线性分类器”在技术上是一个
    **仿射** 分类器。'
- en: '**(2)** Indeed, the paper shows that restricting our consideration to *instance-invariant*
    cost functions yields a problem that ***is*** PAC learnable, just like the in
    the canonical setting. For a refresher on the difference between instance-invariant
    and instance-wise cost functions, see [the first article in this series](https://towardsdatascience.com/extending-pac-learning-to-a-strategic-classification-setting-6c374935dde2#d9f5).'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: '**(2)** 实际上，该论文表明，将我们的考虑限制在 *实例不变* 成本函数上，可以得到一个像在经典设置中一样是 PAC 可学习的 **问题**。关于实例不变和实例成本函数之间差异的复习，请参阅本系列的第一篇文章
    [the first article in this series](https://towardsdatascience.com/extending-pac-learning-to-a-strategic-classification-setting-6c374935dde2#d9f5)。'
- en: '**(3) ∥ ⋅ ∥*ɢᵢ* as we defined it is the [*Minkowski functional*](https://en.wikipedia.org/wiki/Minkowski_functional)
    of *Gᵢ.*** In this context, we view *Gᵢ* as the set of points enclosed in the
    polygon we constructed. The Minkowski functional **generalizes** the notion of
    a seminorm. Recall that in [the first article in this series](https://towardsdatascience.com/extending-pac-learning-to-a-strategic-classification-setting-6c374935dde2#d9f5),
    **we assumed our cost function is induced by seminorms.** We would be remiss not
    to reconcile this assumption with the construction of ∥ ⋅ ∥*ɢᵢ.*'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: '**(3) ∥ ⋅ ∥*ɢᵢ* 如我们定义的那样是 *Gᵢ* 的 [*闵可夫斯基泛函*](https://en.wikipedia.org/wiki/Minkowski_functional)。**
    在这个背景下，我们将 *Gᵢ* 视为我们构造的多边形内的点集。闵可夫斯基泛函 **推广** 了半范数的概念。回想一下，在本系列的第一篇文章中 [the first
    article in this series](https://towardsdatascience.com/extending-pac-learning-to-a-strategic-classification-setting-6c374935dde2#d9f5)，**我们假设我们的成本函数是由半范数诱导的**。我们不应该不将这个假设与
    ∥ ⋅ ∥*ɢᵢ* 的构造相协调。'
- en: 'Fortunately, it can be proven that [the Minkowski functional of a set *A* is
    a seminorm under certain conditions](https://proofwiki.org/wiki/Minkowski_Functional_of_Symmetric_Convex_Absorbing_Set_in_Real_Vector_Space_is_Seminorm)
    [2]:'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 幸运的是，可以证明 [在特定条件下，集合 *A* 的闵可夫斯基泛函是一个半范数](https://proofwiki.org/wiki/Minkowski_Functional_of_Symmetric_Convex_Absorbing_Set_in_Real_Vector_Space_is_Seminorm)
    [2]：
- en: '*A* is a subset of a vector space over **ℝ**.'
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*A* 是 **ℝ** 向量空间的一个子集。'
- en: '*A* is convex.'
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*A* 是凸的。'
- en: '*A* is symmetric.'
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*A* 是对称的。'
- en: '*A* is an absorbing set.'
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*A* 是一个吸收集。'
- en: 'Even more fortunately (or rather, by meticulous design), ***Gᵢ* fulfills all
    of these conditions**:'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 更幸运的是（或者更确切地说，这是由于精心设计），***Gᵢ* 满足所有这些条件**：
- en: '*Gᵢ* is a subset of ℝ², which is a vector space over **ℝ.**'
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*Gᵢ* 是 **ℝ** 向量空间的一个子集，它是一个 **ℝ** 向量空间。'
- en: '*Gᵢ* is a convex set since it is bounded by a convex polygon.'
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*Gᵢ* 是一个凸集，因为它被一个凸多边形所包围。'
- en: '*Gᵢ* is origin-symmetric. **(This is why we needed the *Sᵢ*‘ in the first place!**)'
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*Gᵢ* 是原点对称的。**（这就是我们最初需要 *Sᵢ*‘ 的原因！**）'
- en: '*Gᵢ* is a convex subset of the topological vector space ℝ² equipped with the
    standard topology induced by the Euclidean norm. *Gᵢ* also contains the origin
    in its interior. Therefore, [*Gᵢ* is an absorbing set](https://proofwiki.org/wiki/Convex_Subset_of_Topological_Vector_Space_containing_Zero_Vector_in_Interior_is_Absorbing_Set)
    [3].'
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*Gᵢ* 是具有欧几里得范数诱导的标准拓扑的拓扑向量空间 ℝ² 的凸子集。*Gᵢ* 还包含其内部的原点。因此，[*Gᵢ* 是一个吸收集](https://proofwiki.org/wiki/Convex_Subset_of_Topological_Vector_Space_containing_Zero_Vector_in_Interior_is_Absorbing_Set)
    [3]。'
- en: '**∥ ⋅ ∥*ɢᵢ* is therefore a seminorm for all *i*, enabling us to continue the
    proof without violating our assumptions.**'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: '**∥ ⋅ ∥*ɢᵢ* 因此对于所有 *i* 是一个半范数，这使得我们可以在不违反假设的情况下继续证明。**'
- en: '**(4)** Let *P* be the convex hull of (*S* ∪ *S’*) \ ***sₗ***. **Note that**
    *S* ∪ *S’* is finite. It can be proven that the convex hull of a finite set in
    ℝ² is compact [4]. As a singleton, { *sₗ* } is closed. Clearly, *(S* ∪ *S*‘*)*
    \ *sₗ* and *sₗ* are disjoint. **It follows from the [hyperplane separation theorem](https://en.wikipedia.org/wiki/Hyperplane_separation_theorem)
    that there exists a hyperplane that strictly separates the two**.'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: '**(4)** 设 *P* 为 (*S* ∪ *S’*) \ ***sₗ*** 的凸包。**注意** *S* ∪ *S’* 是有限的。可以证明在 ℝ²
    中有限集的凸包是紧致的 [4]。作为一个单点集，{ *sₗ* } 是闭集。显然，*(S* ∪ *S*‘*)* \ *sₗ* 和 *sₗ* 是不相交的。**根据
    [超平面分离定理](https://en.wikipedia.org/wiki/Hyperplane_separation_theorem)，存在一个严格分离这两个集合的超平面**。'
- en: '**Let us also show that the linear decision boundary induced by the aforementioned
    hyperplane must intersect the unit circle at two points.** Recall that a line
    may intersect a circle at exactly zero, one, or two points.'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: '**让我们也证明上述超平面诱导的线性决策边界必须在两点上与单位圆相交。** 回想一下，一条线可能与圆相交于零点、一点或两点。'
- en: Suppose for the sake of contradiction that the decision boundary and the unit
    circle are disjoint. Then all points in the unit circle must lie on the same side
    of the decision boundary, contradicting the assumption that *hₗ* separates (*S*
    ∪ *S’*) \ *sₗ* from *sₗ*.
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 假设为了矛盾，决策边界和单位圆是分离的。那么单位圆内的所有点必须位于决策边界的同一侧，这与 *hₗ* 将 (*S* ∪ *S’*) \ *sₗ* 与 *sₗ*
    分离的假设相矛盾。
- en: Due to the fact that the separation is strict, *sₗ* may not lie on the decision
    boundary, whereby the latter cannot be tangent to the unit circle.
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 由于分离是严格的，*sₗ* 可能不在决策边界上，因此后者不能与单位圆相切。
- en: The only remaining possibility is that the decision boundary crosses the unit
    circle.
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 剩下的唯一可能性是决策边界穿过单位圆。
- en: As for ensuring *hₗ* positively classifies *sₗ,* it is completely up to us which
    side of the boundary we wish to classify positively.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
