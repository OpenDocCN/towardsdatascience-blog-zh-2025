    set in real vector space is seminorm](https://proofwiki.org/wiki/Minkowski_Functional_of_Symmetric_Convex_Absorbing_Set_in_Real_Vector_Space_is_Seminorm).'
  prefs: []
  type: TYPE_NORMAL
- en: '[3] ProofWiki contributors. [Convex subset of topological vector space containing
    zero vector in interior is absorbing set](https://proofwiki.org/wiki/Convex_Subset_of_Topological_Vector_Space_containing_Zero_Vector_in_Interior_is_Absorbing_Set).'
