- en: Your Personal Analytics Toolbox
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 您的个人分析工具箱
- en: 原文：[https://towardsdatascience.com/your-personal-analytics-toolbox/](https://towardsdatascience.com/your-personal-analytics-toolbox/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/your-personal-analytics-toolbox/](https://towardsdatascience.com/your-personal-analytics-toolbox/)
- en: <mdspan datatext="el1751927291102" class="mdspan-comment">Models are only</mdspan>
    as good as the context provided to them. Even the most advanced model won’t be
    very helpful if it doesn’t have access to the data or tools it needs to get more
    information**.** That’s why tools and resources are crucial for any AI agent.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1751927291102" class="mdspan-comment">模型的好坏取决于提供给它们的上下文。即使是最先进的模型，如果没有访问所需数据或工具来获取更多信息，也不会很有帮助**。**这就是为什么工具和资源对任何AI代理都至关重要。
- en: 'I’ve noticed that I keep repeating the same tasks over and over again: writing
    similar prompts or developing the same tools repeatedly. There’s a fundamental
    principle in software engineering called **DRY**, which stands for “*Don’t Repeat
    Yourself*”.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 我注意到我一直在重复做同样的任务：编写类似的提示或反复开发相同的工具。软件工程中有一个基本原理叫做**DRY**，代表“*不要重复自己*”。
- en: So, I started wondering if there’s a way to avoid duplicating all this work.
    Fortunately, the GenAI industry already has a solution in place. **MCP (Model
    Context Protocol)** is an open-source protocol that enables the connection of
    AI applications to external tools and data sources. Its main goal is to standardise
    such interactions, similar to how REST APIs standardised communication between
    web applications and backend servers.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我开始思考是否有避免重复所有这些工作的方法。幸运的是，GenAI行业已经有一个现成的解决方案。**MCP（模型上下文协议**）是一个开源协议，它使AI应用程序能够连接到外部工具和数据源。其主要目标是标准化此类交互，类似于REST
    API如何标准化Web应用程序和后端服务器之间的通信。
- en: With MCP, you can easily integrate third-party tools like GitHub, Stripe or
    even LinkedIn into your AI agent without having to build tools yourself.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 使用MCP，您可以轻松地将GitHub、Stripe甚至LinkedIn等第三方工具集成到您的AI代理中，而无需自己构建工具。
- en: '*You can find the list of MCP servers in [this curated repository.](https://github.com/modelcontextprotocol/servers)
    However, it’s important to note that you should only use trusted MCP servers to
    avoid potential issues.*'
  id: totrans-6
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*您可以在[这个精选仓库中找到MCP服务器的列表。](https://github.com/modelcontextprotocol/servers)然而，重要的是要注意，您应该只使用受信任的MCP服务器，以避免潜在的问题。*'
- en: Similarly, if you want to expose your tools to customers (i.e. allow them to
    access your product through their LLM agents), you can simply build an MCP server.
    Then customers will be able to integrate with it from their LLM agents, AI assistants,
    desktop apps or IDEs. It’s really convenient.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，如果您想将您的工具暴露给客户（即允许他们通过他们的LLM代理访问您的产品），您可以简单地构建一个MCP服务器。然后客户将能够从他们的LLM代理、AI助手、桌面应用程序或IDE中与之集成。这非常方便。
- en: MCP fundamentally solves the problem of repetitive work. Imagine you have M
    applications and N tools. Without MCP, you would need to build M * N integrations
    to connect them all.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: MCP从根本上解决了重复工作的问题。想象一下，您有M个应用程序和N个工具。没有MCP，您将需要构建M * N个集成来连接它们。
- en: '![](../Images/4d91448e539c586d8a5e5c5b3342ccd2.png)'
  id: totrans-9
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/4d91448e539c586d8a5e5c5b3342ccd2.png)'
- en: Image by author
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: With MCP and standardisation, you can reduce this number to just M + N.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 通过MCP和标准化，您可以将这个数字减少到仅M + N。
- en: '![](../Images/c3f09f2b1091c600c6b94f44e98e0335.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c3f09f2b1091c600c6b94f44e98e0335.png)'
- en: Image by author
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: In this article, I will use MCP to develop a toolkit for analysts. After reading
    this article, you will
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我将使用MCP为分析师开发一个工具包。阅读完这篇文章后，您将
- en: learn how MCP actually works under the hood,
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 了解MCP实际上是如何工作的，
- en: build your first MCP server with useful tools,
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 构建您的第一个带有实用工具的MCP服务器，
- en: leverage the capabilities of your own MCP server and reference servers in your
    local AI IDE (like Cursor or Claude Desktop),
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 充分利用您自己的MCP服务器和本地AI IDE（如Cursor或Claude Desktop）中的参考服务器的能力，
- en: launch a remote MCP server that could be accessible by the community.
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 启动一个可供社区访问的远程MCP服务器。
- en: In the following article, we will take it a step further and learn how to integrate
    MCP servers into your AI agents.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 在接下来的文章中，我们将更进一步，学习如何将MCP服务器集成到您的AI代理中。
- en: That’s a lot to cover, so let’s get started.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 这需要涵盖很多内容，所以让我们开始吧。
- en: MCP architecture
  id: totrans-21
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: MCP架构
- en: I think it’s worth understanding the basic principles before jumping into practice,
    since that will help us use the tools more effectively. So let’s discuss the fundamentals
    of this protocol.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为在实践之前了解基本原理是值得的，因为这将帮助我们更有效地使用工具。所以，让我们讨论一下这个协议的基本原理。
- en: Components
  id: totrans-23
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 组件
- en: 'This protocol uses a client-server architecture:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 此协议使用客户端-服务器架构：
- en: '**Server** is an external program that exposes capabilities through the MCP
    protocol.'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**服务器**是一个通过MCP协议公开功能的外部程序。'
- en: '**Host** is the client-facing application (like Claude Desktop app, AI IDEs
    such as Cursor or Lovable, or custom LLM agents). The host is responsible for
    storing MCP clients and maintaining connections to servers.'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**主机**是面向客户端的应用程序（如Claude桌面应用程序、AI IDE如Cursor或Lovable，或自定义LLM代理）。主机负责存储MCP客户端并维护与服务器之间的连接。'
- en: '**Client** is a component of the user-facing app that maintains a one-to-one
    connection with a single MCP server. They communicate through messages defined
    by the MCP protocol.'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**客户端**是用户界面应用程序的一个组件，它与单个MCP服务器保持一对一的连接。他们通过MCP协议定义的消息进行通信。'
- en: '![](../Images/47a054c0645b6aa51464a35c427a7474.png)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/47a054c0645b6aa51464a35c427a7474.png)'
- en: Image by author
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: 'MCP allows LLM to access different capabilities: tools, resources and prompts.'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: MCP允许LLM访问不同的功能：工具、资源和提示。
- en: '**Tools** are functions that LLM can execute, such as getting the current time
    in a city or converting money from one currency to another.'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**工具**是LLM可以执行的功能，例如获取某个城市的当前时间或将货币从一种货币转换为另一种货币。'
- en: '**Resources** are read-only data or context exposed by the server, such as
    a knowledge base or a change log.'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**资源**是服务器公开的只读数据或上下文，例如知识库或变更日志。'
- en: '**Prompts** are pre-defined templates for AI interactions.'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**提示**是AI交互的预定义模板。'
- en: '![](../Images/0166d44799dcd7accd456ab13d85b749.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0166d44799dcd7accd456ab13d85b749.png)'
- en: Image by author
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: MCP allows you to write servers and tools in [many different languages](https://huggingface.co/learn/mcp-course/unit1/sdk#mcp-sdks).
    In this article, we will be using the Python SDK.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: MCP允许您用[许多不同的语言](https://huggingface.co/learn/mcp-course/unit1/sdk#mcp-sdks)编写服务器和工具。在这篇文章中，我们将使用Python
    SDK。
- en: Lifecycle
  id: totrans-37
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 生命周期
- en: Now that we know the main components defined in MCP, let’s see how the full
    lifecycle of interaction between the MCP client and server works.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经了解了MCP中定义的主要组件，让我们看看MCP客户端和服务器之间交互的完整生命周期是如何工作的。
- en: The first step is **initialisation**. The client connects to the server, they
    exchange protocol versions and capabilities, and, finally, the client confirms
    via notification that initialisation has been completed.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 第一步是**初始化**。客户端连接到服务器，他们交换协议版本和功能，最后，客户端通过通知确认初始化已完成。
- en: '![](../Images/ab7d5ac60ad723e522fee83cfbf679d4.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ab7d5ac60ad723e522fee83cfbf679d4.png)'
- en: Image by author
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: Then, we move to **the message exchange phase**.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们进入**消息交换阶段**。
- en: The client might start the interaction with **discovery**. MCP allows dynamic
    feature discovery, when the client can ask the server for a list of supported
    tools with requests like `tools/list` and will get the list of exposed tools in
    response. This feature allows the client to adapt when working with different
    MCP servers.
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 客户端可能会以**发现**开始交互。MCP允许动态功能发现，当客户端可以通过如`tools/list`之类的请求向服务器请求支持的工具列表，并会收到暴露的工具列表作为响应。此功能允许客户端在与其他MCP服务器协同工作时进行适应。
- en: Also, the client can invoke capabilities (call a tool or access a resource).
    In this case, it can get back from the server not only a response but also progress
    notifications.
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 此外，客户端可以调用功能（调用工具或访问资源）。在这种情况下，它不仅可以从服务器获得响应，还可以获得进度通知。
- en: '![](../Images/5b74af5daf2c1c5c3989e2c849f15613.png)'
  id: totrans-45
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/5b74af5daf2c1c5c3989e2c849f15613.png)'
- en: Image by author
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: Finally, the client initiates **the termination of the connection** bysending
    a request to the server.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，客户端通过向服务器发送请求来启动**连接终止**。
- en: Transport
  id: totrans-48
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 传输
- en: If we dive a little bit deeper into the MCP architecture, it’s also worth discussing
    transport. The transport defines how messages are sent and received between the
    client and server.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们稍微深入探讨MCP架构，讨论传输也是值得的。传输定义了客户端和服务器之间消息的发送和接收方式。
- en: 'At its core, MCP uses [the JSON-RPC protocol](https://en.wikipedia.org/wiki/JSON-RPC).
    There are two transport options:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 在其核心，MCP使用[JSON-RPC协议](https://en.wikipedia.org/wiki/JSON-RPC)。有两种传输选项：
- en: '**stdio** (standard input and output) for cases when client and server are
    running on the same machine,'
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**stdio**（标准输入和输出）用于客户端和服务器在同一台机器上运行的情况，'
- en: '**HTTP + SSE** (Server-Sent Events) or **Streamable HTTP** for cases when they
    need to communicate over a network. The primary difference between these two approaches
    lies in whether the connection is stateful (HTTP + SSE) or can also be stateless
    (Streamable HTTP), which can be crucial for certain applications.'
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**HTTP + SSE**（服务器端事件）或**可流式HTTP**用于需要通过网络进行通信的情况。这两种方法的主要区别在于连接是否是状态性的（HTTP
    + SSE）或也可以是无状态的（可流式HTTP），这对于某些应用程序可能至关重要。'
- en: When running our server locally, we will use standard I/O as transport. The
    client will launch the server as a subprocess, and they will use standard input
    and output to communicate.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们在本地运行服务器时，我们将使用标准I/O作为传输。客户端将作为子进程启动服务器，它们将使用标准输入和输出进行通信。
- en: With that, we’ve covered all the theory and are ready to move on to building
    our first MCP server.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 这样，我们已经涵盖了所有理论，并准备好继续构建我们的第一个MCP服务器。
- en: Creating your toolkit as a local MCP server
  id: totrans-55
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 将你的工具包作为本地MCP服务器创建
- en: 'I would like to build a server with some standard tools I use frequently, and
    also leverage all the MCP capabilities we discussed above:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 我想构建一个服务器，其中包含我经常使用的标准工具，并且利用我们上面讨论的所有MCP功能：
- en: '**prompt template** to query our ClickHouse database that outlines both the
    data schema and nuances of SQL syntax (*it’s tedious to repeat it every time*),'
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**提示模板**用于查询我们的ClickHouse数据库，概述了数据模式和SQL语法的细微差别（*每次重复都相当繁琐*），'
- en: '**tools** to query the database and get some information about recent GitHub
    PRs,'
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**工具**用于查询数据库并获取一些关于最近GitHub PR的信息，'
- en: our changelog as **resources**.
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们将变更日志作为**资源**。
- en: '*You can find the full code in [repository](https://github.com/miptgirl/mcp-analyst-toolkit/blob/main/src/mcp_server/server.py),
    I will show only the main server code in the snapshot below omitting all the business
    logic.*'
  id: totrans-60
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*你可以在[仓库](https://github.com/miptgirl/mcp-analyst-toolkit/blob/main/src/mcp_server/server.py)中找到完整的代码，以下我将只展示主服务器代码的快照，省略所有业务逻辑。* '
- en: We will use the Python SDK for MCP. Creating an MCP server is pretty straightforward.
    Let’s start with a skeleton. We imported the MCP package, initialised the server
    object and ran the server when the program is executed directly (not imported).
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用MCP的Python SDK。创建MCP服务器相当直接。让我们从一个骨架开始。我们导入了MCP包，初始化了服务器对象，并在程序直接执行时（而不是导入）运行了服务器。
- en: '[PRE0]'
  id: totrans-62
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Now, we need to add the capabilities. We will do this by annotating functions.
    We will also write detailed docstrings and include type annotations to ensure
    that the LLM has all the necessary information to use them properly.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们需要添加功能。我们将通过注释函数来完成这项工作。我们还将编写详细的文档字符串，并包含类型注解，以确保LLM拥有所有必要的信息来正确使用它们。
- en: '[PRE1]'
  id: totrans-64
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Next, we will define tools similarly.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将类似地定义工具。
- en: '[PRE2]'
  id: totrans-66
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'Now, it’s time to add resources. I’ve added two methods: one to see what changelog
    periods we have available, and another to extract information for a specific period.
    Also, as you might have noticed, we used URIs to access resources.'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，是时候添加资源了。我添加了两种方法：一种用于查看我们有哪些变更日志周期可供使用，另一种用于提取特定周期的信息。此外，正如你可能已经注意到的，我们使用了URI来访问资源。
- en: '[PRE3]'
  id: totrans-68
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: That’s it for the code. The last step is setting up the environment. I will
    use [the uv package manager](https://github.com/astral-sh/uv), which is recommended
    in the MCP documentation.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 代码部分就到这里。最后一步是设置环境。我将使用[uv包管理器](https://github.com/astral-sh/uv)，这是MCP文档中推荐的。
- en: If you don’t have it installed, you can get it from PyPI.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你还没有安装它，你可以从PyPI获取。
- en: '[PRE4]'
  id: totrans-71
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Then, we can initialise a uv project, create and activate the virtual environment
    and, finally, install all the required packages.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们可以初始化一个uv项目，创建并激活虚拟环境，最后安装所有必需的包。
- en: '[PRE5]'
  id: totrans-73
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Now, we can run the MCP server locally. I will use the developer model since
    it also launches MCP Inspector, which is really useful for debugging.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们可以在本地运行MCP服务器。我将使用开发者模式，因为它还会启动MCP Inspector，这对于调试非常有用。
- en: '[PRE6]'
  id: totrans-75
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Now, we have our server and MCP Inspector running locally. Essentially, MCP
    Inspector is a handy implementation of the MCP client designed for debugging.
    Let’s use the Inspector to test how our server works. The inspector lets us see
    all the capabilities the server exposes and call its tools. I started with feature
    discovery, requesting the server to share the list of tools. The client sent the
    `tools/list` request we discussed earlier, as you can see in the history log at
    the bottom of the screen. Then, I executed a simple SQL query `select 1` and got
    the tool call result back.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们的服务器和 MCP Inspector 已在本地上运行。本质上，MCP Inspector 是为调试而设计的 MCP 客户端的便捷实现。让我们使用
    Inspector 来测试我们的服务器如何工作。Inspector 允许我们看到服务器暴露的所有功能并调用其工具。我首先从功能发现开始，请求服务器共享工具列表。客户端发送了之前讨论过的
    `tools/list` 请求，如屏幕底部的历史记录日志所示。然后，我执行了一个简单的 SQL 查询 `select 1` 并收到了工具调用结果。
- en: '![](../Images/58f571c29f12f32ef5b748d8f23102b3.png)'
  id: totrans-77
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/58f571c29f12f32ef5b748d8f23102b3.png)'
- en: Image by author
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: Great! Our first MCP server is up and running locally. So, it’s time to start
    using it in practice.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 太好了！我们的第一个 MCP 服务器已在本地启动并运行。因此，现在是时候开始在实际中使用它了。
- en: Using MCP servers in AI tools
  id: totrans-80
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在 AI 工具中使用 MCP 服务器
- en: As we discussed, the power of MCP servers lies in standardisation, which allows
    them to work with different AI tools. I will integrate my tools into Claude Desktop.
    Since Anthropic developed MCP, I expect their desktop client to have the best
    support for this protocol. However, you can use other clients like Cursor or Windsurf
    ([other example clients](https://modelcontextprotocol.io/clients)).
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们讨论的那样，MCP 服务器的强大之处在于标准化，这使得它们可以与不同的 AI 工具一起工作。我将把我自己的工具集成到 Claude Desktop
    中。由于 Anthropic 开发了 MCP，我预计他们的桌面客户端将对该协议提供最佳支持。然而，您可以使用其他客户端，如 Cursor 或 Windsurf
    ([其他示例客户端](https://modelcontextprotocol.io/clients))。
- en: 'I would like not only to utilise my tools, but also to leverage the work of
    others. There are a [lot of MCP servers](https://github.com/modelcontextprotocol/servers)
    developed by the community that we can use instead of reinventing the wheel when
    we need common functions. However, keep in mind that MCP servers can access your
    system, so use only trusted implementations. I will use two reference servers
    (implemented to demonstrate the capabilities of the MCP protocol and official
    SDKs):'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 我不仅想利用我的工具，还想利用他人的工作。社区开发了大量的 [MCP 服务器](https://github.com/modelcontextprotocol/servers)，我们可以在需要常用功能时使用它们，而不是重新发明轮子。然而，请记住，MCP
    服务器可以访问您的系统，因此请仅使用受信任的实现。我将使用两个参考服务器（用于演示 MCP 协议的功能和官方 SDK）：
- en: '[Filesystem](https://github.com/modelcontextprotocol/servers/tree/main/src/filesystem) — allows
    working with local files,'
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[文件系统](https://github.com/modelcontextprotocol/servers/tree/main/src/filesystem)
    — 允许处理本地文件，'
- en: '[Fetch](https://github.com/modelcontextprotocol/servers/tree/main/src/fetch) — helps
    LLMs retrieve the content of webpages and convert it from HTML to markdown for
    better readability.'
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Fetch](https://github.com/modelcontextprotocol/servers/tree/main/src/fetch)
    — 帮助 LLMs 获取网页内容并将其从 HTML 转换为 markdown 以提高可读性。'
- en: 'Now, let’s move on to the setup. You can follow the detailed instructions on
    how to set up Claude Desktop [here](https://modelcontextprotocol.io/quickstart/user).
    All these tools have configuration files where you can specify the MCP servers.
    For the Claude Desktop, this file will be located at:'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们继续进行设置。您可以在[这里](https://modelcontextprotocol.io/quickstart/user)找到如何设置
    Claude Desktop 的详细说明。所有这些工具都有配置文件，您可以在其中指定 MCP 服务器。对于 Claude Desktop，此文件将位于：
- en: 'macOS: `~/Library/Application Support/Claude/claude_desktop_config.json`,'
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'macOS: `~/Library/Application Support/Claude/claude_desktop_config.json`，'
- en: 'Windows: `%APPDATA%\Claude\claude_desktop_config.json`.'
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'Windows: `%APPDATA%\Claude\claude_desktop_config.json`。'
- en: 'Let’s update the config to include three servers:'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们更新配置以包括三个服务器：
- en: For `analyst_toolkit` (our MCP server implementation), I’ve specified the `uv`
    command, path to the repository and command to run the server. Also, I’ve added
    a `GITHUB_TOKEN` environment variable to use for GitHub authentication.
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于 `analyst_toolkit`（我们的 MCP 服务器实现），我指定了 `uv` 命令、存储库路径和运行服务器的命令。我还添加了一个 `GITHUB_TOKEN`
    环境变量，用于 GitHub 认证。
- en: For the reference servers, I’ve just copied the configs from the documentation.
    Since they are implemented in different languages (TypeScript and Python), different
    commands (`npx` and `uvx`) are needed.
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于参考服务器，我只是从文档中复制了配置。由于它们是用不同的语言（TypeScript 和 Python）实现的，因此需要不同的命令（`npx` 和 `uvx`）。
- en: '[PRE7]'
  id: totrans-91
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: That’s it. Now, we just need to restart the Claude Desktop client, and we will
    have access to all tools and prompt templates.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 就这样。现在，我们只需要重新启动 Claude Desktop 客户端，我们就可以访问所有工具和提示模板。
- en: '![](../Images/48eaa03b2034467cc304586c6b73e3a7.png)'
  id: totrans-93
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/48eaa03b2034467cc304586c6b73e3a7.png)'
- en: Image by author
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: Let’s try using the prompt template and ask the LLM to visualise high-level
    KPIs.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们尝试使用提示模板，并要求 LLM 可视化高级 KPI。
- en: '**Question**: Could you please show the number of active customers and revenue
    by month since the beginning of 2024? Please, create a visualisation to look at
    dynamics and save the image in Desktop folder.'
  id: totrans-96
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**问题**：请展示自 2024 年初以来按月活跃客户数量和收入。请创建一个可视化，以查看动态，并将图像保存在桌面文件夹中。'
- en: We described the task at a fairly high level without providing much detail about
    the data schema or ClickHouse dialect. Still, since all this information is captured
    in our prompt template, the LLM managed to compose a correct SQL query.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 我们对任务进行了相当高级的描述，没有提供有关数据架构或 ClickHouse 语言的详细信息。尽管如此，由于所有这些信息都包含在我们的提示模板中，LLM
    仍然能够编写正确的 SQL 查询。
- en: '[PRE8]'
  id: totrans-98
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Then, the agent used our `execute_sql_query` tool to get results, composed the
    HTML page with visualisations, and leveraged the `write_file` tool from the Filesystem
    MCP server to save the results as an HTML file.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，代理使用我们的 `execute_sql_query` 工具获取结果，使用可视化组合 HTML 页面，并利用来自文件系统 MCP 服务器的 `write_file`
    工具将结果保存为 HTML 文件。
- en: The final report looks really good.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 最终报告看起来非常好。
- en: '![](../Images/3dceaf4bfbac78e19d40474dbe4c06c0.png)'
  id: totrans-101
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/3dceaf4bfbac78e19d40474dbe4c06c0.png)'
- en: Image by author
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: One limitation of the current prompt template implementation is that you have
    to select it manually. The LLM can’t automatically choose to use the template
    even when it’s appropriate for the task. We’ll try to address this in our AI agent
    implementation in the upcoming article.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 当前提示模板实现的局限性之一是您必须手动选择它。LLM 不能自动选择使用模板，即使它适合任务也是如此。我们将在即将到来的文章中尝试在我们的 AI 代理实现中解决这个问题。
- en: Another use case is trying out GitHub tools by asking about recent updates in
    the llama-cookbook repository from the past month. The agent completed this task
    successfully and provided us with a detailed summary.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个用例是通过询问过去一个月 llama-cookbook 仓库中的最新更新来尝试 GitHub 工具。代理成功完成了这项任务，并为我们提供了详细的摘要。
- en: '![](../Images/666153a69b6ead2738be6a78fcbb772c.png)'
  id: totrans-105
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/666153a69b6ead2738be6a78fcbb772c.png)'
- en: Image by author
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: So, we’ve learned how to work with the local MCP servers. Let’s discuss what
    to do if we want to share our tools more broadly.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们已经学会了如何与本地 MCP 服务器协同工作。让我们讨论如果我们想更广泛地分享我们的工具，我们应该做什么。
- en: Working with a remote MCP server
  id: totrans-108
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 与远程 MCP 服务器协同工作
- en: We will use Gradio and HuggingFace Spaces for hosting a public MCP server. Gradio
    has a built-in integration with MCP, making server creation really simple. This
    is all the code needed to build the UI and launch the MCP server.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用 Gradio 和 HuggingFace Spaces 来托管公共 MCP 服务器。Gradio 与 MCP 集成，使得服务器创建变得非常简单。构建
    UI 和启动 MCP 服务器所需的全部代码如下。
- en: '[PRE9]'
  id: totrans-110
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: I’ve created a single function that calculates the confidence interval for the
    difference of two independent proportions. It might be helpful when analysing
    the A/B test results.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 我创建了一个单一的功能，用于计算两个独立比例差异的置信区间。在分析 A/B 测试结果时可能会有所帮助。
- en: Next, we can push this code to HuggingFace Spaces to get a server running. I’ve
    covered how to do it step-by-step in [one of my previous articles](https://towardsdatascience.com/understanding-retention-with-gradio-c288b48918af/).
    For this example, I created this Space — [https://huggingface.co/spaces/miptgirl/ab_tests](https://huggingface.co/spaces/miptgirl/ab_tests).
    It has a clean UI and exposes MCP tools.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们可以将此代码推送到 HuggingFace Spaces 以运行服务器。我在[我之前的一篇文章](https://towardsdatascience.com/understanding-retention-with-gradio-c288b48918af/)中详细介绍了如何操作。在这个例子中，我创建了此空间—[https://huggingface.co/spaces/miptgirl/ab_tests](https://huggingface.co/spaces/miptgirl/ab_tests)。它有一个简洁的界面，并公开了
    MCP 工具。
- en: '![](../Images/7b7b3fcb08b3bb38ae300529f8bc56f8.png)'
  id: totrans-113
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/7b7b3fcb08b3bb38ae300529f8bc56f8.png)'
- en: Image by author
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: Next, we can add the server to our Claude Desktop configuration like this. We
    are using `mcp-remote` as a transport this time since we’re now connecting to
    a remote server.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们可以像这样将服务器添加到我们的 Claude Desktop 配置中。这次我们使用 `mcp-remote` 作为传输，因为我们现在正在连接到远程服务器。
- en: '[PRE10]'
  id: totrans-116
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Let’s test it with a simple A/B test analysis question. It works well. The LLM
    can now make thoughtful judgments based on statistical significance.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们用一个简单的 A/B 测试分析问题来测试它。它运行良好。LLM 现在可以根据统计显著性做出深思熟虑的判断。
- en: '![](../Images/334481ebb56d0f626590a880d23f1733.png)'
  id: totrans-118
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/334481ebb56d0f626590a880d23f1733.png)'
- en: Image by author
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: '*You can also use Gradio integration to build an MCP Client — [documentation](https://huggingface.co/learn/mcp-course/unit2/gradio-client)*'
  id: totrans-120
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*你还可以使用 Gradio 集成来构建 MCP 客户端—[文档](https://huggingface.co/learn/mcp-course/unit2/gradio-client)*'
- en: And that’s it! We now know how to share our tools with a wider audience.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 就这样！我们现在知道如何与更广泛的受众分享我们的工具。
- en: Summary
  id: totrans-122
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: 'In this article, we’ve explored the MCP protocol and its capabilities. Let’s
    briefly recap the main points:'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们探讨了 MCP 协议及其功能。让我们简要回顾一下主要观点：
- en: MCP (Model Context Protocol) is a protocol developed by Antropic that aims to
    standardise communication between AI agents and tools. This approach reduces the
    number of integrations needed from M * N to M + N. The MCP protocol uses a client-server
    architecture.
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: MCP (模型上下文协议) 是由 Antropic 开发的一种协议，旨在标准化人工智能代理和工具之间的通信。这种方法将所需的集成数量从 M * N 减少到
    M + N。MCP 协议使用客户端-服务器架构。
- en: MCP servers expose capabilities (such as resources, tools and prompt templates).
    You can easily build your own MCP servers using SDKs or use servers developed
    by the community.
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: MCP 服务器公开能力（如资源、工具和提示模板）。你可以轻松使用 SDK 构建自己的 MCP 服务器，或者使用社区开发的服务器。
- en: MCP clients are part of user-facing apps (hosts) responsible for establishing
    a one-to-one connection with a server. There are many available apps compatible
    with MCP, such as Claude Desktop, Cursor or Windsurf.
  id: totrans-126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: MCP 客户端是面向用户的程序（主机）的一部分，负责与服务器建立一对一的连接。有许多与 MCP 兼容的应用程序，例如 Claude Desktop、Cursor
    或 Windsurf。
- en: '*Thank you for reading. I hope this article was insightful. Remember Einstein’s
    advice: “The important thing is not to stop questioning. Curiosity has its own
    reason for existing.” May your curiosity lead you to your next great insight.*'
  id: totrans-127
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*感谢阅读。希望这篇文章能给你带来启发。记住爱因斯坦的建议：“重要的是不要停止提问。好奇心有其存在的理由。”愿你的好奇心引导你发现下一个伟大的洞察。*'
- en: Reference
  id: totrans-128
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 参考文献
- en: 'This article is inspired by the [*“*](https://www.deeplearning.ai/short-courses/ai-agents-in-langgraph/)[*MCP:
    Build Rich-Context AI Apps with Anthropic*](https://www.deeplearning.ai/short-courses/mcp-build-rich-context-ai-apps-with-anthropic/)[*”*](https://www.deeplearning.ai/short-courses/ai-agents-in-langgraph/)
    short course from *DeepLearning.AI* and [*the MCP course by Hugging Face*](https://huggingface.co/learn/mcp-course/unit0/introduction).'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: '本文灵感来源于 *DeepLearning.AI* 的短课程 [*“MCP: Build Rich-Context AI Apps with Anthropic”](https://www.deeplearning.ai/short-courses/mcp-build-rich-context-ai-apps-with-anthropic/)
    和 *Hugging Face* 的 MCP 课程 [(https://huggingface.co/learn/mcp-course/unit0/introduction)](https://www.deeplearning.ai/short-courses/ai-agents-in-langgraph/)。'
