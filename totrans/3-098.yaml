- en: 'The Basis of Cognitive Complexity: Teaching CNNs to See Connections'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/the-basis-of-cognitive-complexity-teaching-cnns-to-see-connections/](https://towardsdatascience.com/the-basis-of-cognitive-complexity-teaching-cnns-to-see-connections/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Liberating education consists in acts of cognition, not transferrals of information.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Paulo freire
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '<mdspan datatext="el1744350129634" class="mdspan-comment">One of the most</mdspan>
    heated discussions around artificial intelligence is: What aspects of human learning
    is it capable of capturing?'
  prefs: []
  type: TYPE_NORMAL
- en: Many authors suggest that artificial intelligence models do not possess the
    same capabilities as humans, especially when it comes to plasticity, flexibility,
    and adaptation.
  prefs: []
  type: TYPE_NORMAL
- en: One of the aspects that models do not capture are several causal relationships
    about the external world.
  prefs: []
  type: TYPE_NORMAL
- en: 'This article discusses these issues:'
  prefs: []
  type: TYPE_NORMAL
- en: The parallelism between convolutional neural networks (CNNs) and the human visual
    cortex
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Limitations of CNNs in understanding causal relations and learning abstract
    concepts
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How to make CNNs learn simple causal relations
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Is it the same? Is it different?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '[Convolutional networks (CNNs)](https://en.wikipedia.org/wiki/Convolutional_neural_network)
    [2] are multi-layered neural networks that take images as input and can be used
    for multiple tasks. One of the most fascinating aspects of CNNs is their inspiration
    from the [human visual cortex](https://en.wikipedia.org/wiki/Visual_cortex) [1]:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Hierarchical processing**. The visual cortex processes images hierarchically,
    where early visual areas capture simple features (such as edges, lines, and colors)
    and deeper areas capture more complex features such as shapes, objects, and scenes.
    CNN, due to its layered structure, captures edges and textures in the early layers,
    while layers further down capture parts or whole objects.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**[Receptive fields](https://en.wikipedia.org/wiki/Receptive_field)**. Neurons
    in the visual cortex respond to stimuli in a specific local region of the visual
    field (commonly called receptive fields). As we go deeper, the receptive fields
    of the neurons widen, allowing more spatial information to be integrated. Thanks
    to pooling steps, the same happens in CNNs.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Feature sharing**. Although biological neurons are not identical, similar
    features are recognized across different parts of the visual field. In CNNs, the
    various [filters](https://www.sciencedirect.com/topics/computer-science/convolutional-filter)
    scan the entire image, allowing patterns to be recognized regardless of location.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**[Spatial invariance](https://aiplanet.com/learn/getting-started-with-deep-learning/convolutional-neural-networks/267/cnn-transfer-learning-data-augmentation)**.
    Humans can recognize objects even when they are moved, scaled, or rotated. CNNs
    also possess this property.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/c6bf7ef0941e72d77ccb6ccbf01584da.png)'
  prefs: []
  type: TYPE_IMG
- en: 'The relationship between components of the visual system and CNN. Image source:
    [here](https://arxiv.org/pdf/2001.07092)'
  prefs: []
  type: TYPE_NORMAL
- en: '**These features have made CNNs perform well in visual tasks to the point of
    superhuman performance:**'
  prefs: []
  type: TYPE_NORMAL
- en: Russakovsky et al. [22] recently reported that human performance yields a 5.1%
    top-5 error on the ImageNet dataset. This number is achieved by a human annotator
    who is well-trained on the validation images to be better aware of the existence
    of relevant classes. […] Our result (4.94%) exceeds the reported human-level performance.
    —source [3]
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Although CNNs perform better than humans in several tasks, there are still cases
    where they fail spectacularly. For example, in a 2024 study [4], AI models failed
    to generalize image classification. State-of-the-art models perform better than
    humans for objects on upright poses but fail when objects are on unusual poses.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/1b14c18c63fd3304ffed388649aa197a.png)'
  prefs: []
  type: TYPE_IMG
- en: 'The right label is on the top of the object, and the AI wrong predicted label
    is below. Image source: [here](https://arxiv.org/pdf/2402.03973v3)'
  prefs: []
  type: TYPE_NORMAL
- en: In conclusion, our results show that (1) humans are still much more robust than
    most networks at recognizing objects in unusual poses, (2) time is of the essence
    for such ability to emerge, and (3) even time-limited humans are dissimilar to
    deep neural networks. —source [4]
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: In the study [4], they note that humans need time to succeed in a task. Some
    tasks require not only visual recognition but also [abstractive cognition](https://shs.hal.science/halshs-03655612/document),
    which requires time.
  prefs: []
  type: TYPE_NORMAL
- en: 'The generalization abilities that make humans capable come from understanding
    the laws that govern relations among objects. Humans recognize objects by extrapolating
    rules and chaining these rules to adapt to new situations. One of the simplest
    rules is the “same-different relation”: the ability to define whether two objects
    are the same or different. This ability develops rapidly during infancy and is
    also importantly associated with language development [5-7]. In addition, some
    animals such as ducks and chimpanzees also have it [8]. In contrast, learning
    same-different relations is very difficult for [neural networks](https://github.com/SalvatoreRa/tutorial/blob/main/artificial%20intelligence/FAQ.md#large-language-models:~:text=is%20knowledge%20distillation%3F-,Neural%20networks,-What%20is%20an)
    [9-10].'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c079bd8a116c236cb9f633aafaec9932.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Example of a same-different task for a CNN. The network should return a label
    of 1 if the two objects are the same or a label of 0 if they are different. Image
    source: [here](https://arxiv.org/pdf/2503.23212)'
  prefs: []
  type: TYPE_NORMAL
- en: Convolutional networks show difficulty in learning this relationship. Likewise,
    they fail to learn other types of causal relationships that are simple for humans.
    Therefore, many researchers have concluded that [CNNs](https://github.com/SalvatoreRa/tutorial/blob/main/artificial%20intelligence/FAQ.md#large-language-models:~:text=What%20is%20a%20Convolutional%20Neural%20Network%20(CNN)%3F)
    lack the inductive bias necessary to be able to learn these relationships.
  prefs: []
  type: TYPE_NORMAL
- en: These negative results do not mean that neural networks are completely incapable
    of learning same-different relations. Much larger and longer trained models can
    learn this relation. For example, [vision-transformer](https://en.wikipedia.org/wiki/Vision_transformer)
    models pre-trained on [ImageNet](https://www.image-net.org/) with [contrastive
    learning](https://encord.com/blog/guide-to-contrastive-learning/) can show this
    ability [12].
  prefs: []
  type: TYPE_NORMAL
- en: Can CNNs learn same-different relationships?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The fact that broad models can learn these kinds of relationships has rekindled
    interest in CNNs. The same-different relationship is considered among the basic
    logical operations that make up the foundations for [higher-order cognition](https://en.wikipedia.org/wiki/Higher-order_thinking)
    and [reasoning](https://en.wikipedia.org/wiki/Reason). Showing that shallow CNNs
    can learn this concept would allow us to experiment with other relationships.
    Moreover, it will allow models to learn increasingly complex [causal relationships](https://en.wikipedia.org/wiki/Causal_reasoning).
    This is an important step in advancing the generalization capabilities of AI.
  prefs: []
  type: TYPE_NORMAL
- en: 'Previous work suggests that CNNs do not have the architectural [inductive biases](https://en.wikipedia.org/wiki/Inductive_bias)
    to be able to learn abstract visual relations. Other authors assume that the problem
    is in the training paradigm. In general, the classical [gradient descent](https://en.wikipedia.org/wiki/Gradient_descent)
    is used to learn a single task or a set of tasks. Given a task t or a set of tasks
    T, a loss function L is used to optimize the weights φ that should minimize the
    function L:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/32367e8de8e68919350b3de3ebed043e.png)'
  prefs: []
  type: TYPE_IMG
- en: Image source from [here](https://arxiv.org/pdf/2503.23212)
  prefs: []
  type: TYPE_NORMAL
- en: 'This can be viewed as simply the sum of the losses across different tasks (if
    we have more than one task). Instead, the [Model-Agnostic Meta-Learning (MAML)](https://interactive-maml.github.io/maml.html)
    algorithm [13] is designed to search for an optimal point in weight space for
    a set of related tasks. MAML seeks to find an initial set of weights θ that minimizes
    the [loss function](https://www.ibm.com/think/topics/loss-function) across tasks,
    facilitating rapid adaptation:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/4401f78f929e27a775221ecf4c420186.png)'
  prefs: []
  type: TYPE_IMG
- en: Image source from [here](https://arxiv.org/pdf/2503.23212)
  prefs: []
  type: TYPE_NORMAL
- en: The difference may seem small, but conceptually, this approach is directed toward
    abstraction and [generalization](https://en.wikipedia.org/wiki/Generalization).
    If there are multiple tasks, traditional training tries to optimize weights for
    different tasks. MAML tries to identify a set of weights that is optimal for different
    tasks but at the same time equidistant in the weight space. This starting point
    θ allows the model to generalize more effectively across different tasks.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/972fc49b8bca85d64b12f2594a15eaa2.png)'
  prefs: []
  type: TYPE_IMG
- en: Meta-learning initial weights for generalization. Image source from [here](https://arxiv.org/pdf/2503.23212)
  prefs: []
  type: TYPE_NORMAL
- en: Since we now have a method biased toward generalization and abstraction, we
    can test whether we can make CNNs learn the same-different relationship.
  prefs: []
  type: TYPE_NORMAL
- en: In this study [11], they compared shallow CNNs trained with classic gradient
    descent and [meta-learning](https://en.wikipedia.org/wiki/Meta-learning_(computer_science))
    on a dataset designed for this report. The dataset consists of 10 different tasks
    that test for the same-different relationship.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/1fd6522ea7998132c05411f24d9c05de.png)'
  prefs: []
  type: TYPE_IMG
- en: The Same-Different dataset. Image source from [here](https://arxiv.org/pdf/2503.23212)
  prefs: []
  type: TYPE_NORMAL
- en: 'The authors [11] compare CNNs of 2, 4, or 6 layers trained in a traditional
    way or with meta-learning, showing several interesting results:'
  prefs: []
  type: TYPE_NORMAL
- en: The performance of traditional CNNs shows similar behavior to random guessing.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Meta-learning significantly improves performance, suggesting that the model
    can learn the same-different relationship. A 2-layer CNN performs little better
    than chance, but by increasing the depth of the network, performance improves
    to near-perfect accuracy.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![](../Images/b01c581f1f0ee52915d1ef4ed265aae8.png)'
  prefs: []
  type: TYPE_IMG
- en: Comparison between traditional training and meta-learning for CNNs. Image source
    from [here](https://arxiv.org/pdf/2503.23212)
  prefs: []
  type: TYPE_NORMAL
- en: One of the most intriguing results of [11] is that the model can be trained
    in a leave-one-out way (use 9 tasks and leave one out) and show out-of-distribution
    generalization capabilities. Thus, the model has learned abstracting behavior
    that is hardly seen in such a small model (6 layers).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/255df55a32a924d707e90af64faa89d2.png)'
  prefs: []
  type: TYPE_IMG
- en: out-of-distribution for same-different classification. Image source from [here](https://arxiv.org/pdf/2503.23212)
  prefs: []
  type: TYPE_NORMAL
- en: Conclusions
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Although convolutional networks were inspired by how the human brain processes
    visual stimuli, they do not capture some of its basic capabilities. This is especially
    true when it comes to causal relations or abstract concepts. Some of these relationships
    can be learned from large models only with extensive training. This has led to
    the assumption that small CNNs cannot learn these relations due to a lack of architecture
    inductive bias. In recent years, efforts have been made to create new architectures
    that could have an advantage in learning relational reasoning. Yet most of these
    architectures fail to learn these kinds of relationships. Intriguingly, this can
    be overcome through the use of meta-learning.
  prefs: []
  type: TYPE_NORMAL
- en: The advantage of meta-learning is to incentivize more abstractive learning.
    Meta-learning pressure toward generalization, trying to optimize for all tasks
    at the same time. To do this, learning more abstract features is favored (low-level
    features, such as the angles of a particular shape, are not useful for generalization
    and are disfavored). Meta-learning allows a shallow CNN to learn abstract behavior
    that would otherwise require many more parameters and training.
  prefs: []
  type: TYPE_NORMAL
- en: The shallow CNNs and same-different relationship are a model for higher cognitive
    functions. Meta-learning and different forms of training could be useful to improve
    the reasoning capabilities of the models.
  prefs: []
  type: TYPE_NORMAL
- en: Another thing!
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
