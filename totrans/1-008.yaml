- en: How to Climb the Hidden Career Ladder of Data Science
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何攀登数据科学的隐藏职业阶梯
- en: 原文：[https://towardsdatascience.com/the-hidden-career-ladder-of-data-science/](https://towardsdatascience.com/the-hidden-career-ladder-of-data-science/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/the-hidden-career-ladder-of-data-science/](https://towardsdatascience.com/the-hidden-career-ladder-of-data-science/)
- en: <mdspan datatext="el1764900567059" class="mdspan-comment">You’ve mastered</mdspan>
    SQL. You can build models in your sleep. You’ve run dozens of A/B tests. So why
    aren’t you getting promoted?
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1764900567059" class="mdspan-comment">你已经掌握了</mdspan> SQL。你可以在睡眠中构建模型。你已经运行了数十次
    A/B 测试。那么，为什么你没有得到晋升？
- en: The truth is, **most data scientists plateau not because they lack technical
    skills, but because they don’t understand what actually changes between levels.**
    Companies hand you a ladder with vague rungs labeled “impact,” “scope,” and “strategic
    thinking” and then expect you to figure out what those words mean in practice.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 事实是，**大多数数据科学家停滞不前并不是因为他们缺乏技术技能，而是因为他们不理解不同级别之间实际发生了什么变化**。公司给你一个带有模糊梯级标签的梯子，“影响”、“范围”和“战略思维”，然后期望你弄清楚这些词在实践中意味着什么。
- en: Many brilliant and skilled data scientists get stuck at L4 for years, grinding
    on harder technical problems, while their peers leap to L5 by shifting *how* they
    think about their work. The career ladder in data science isn’t a straight line
    of accumulating more tools and techniques. It’s a series of fundamental shifts
    in how you define problems, create value, and influence decisions. Each promotion
    requires you to play a different game and it isn’t always clear exactly when the
    rules have changed.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 许多才华横溢且技术娴熟的数据科学家在 L4 级别停滞多年，不断解决更复杂的技术问题，而他们的同行通过改变思考工作的方式跃升至 L5 级别。数据科学的职业阶梯并不是一条积累更多工具和技术的直线。它是一系列如何定义问题、创造价值和影响决策的根本转变。每一次晋升都需要你扮演不同的角色，而且并不总是清楚规则何时发生了变化。
- en: In this post, I’ll break down what changes at L3, L4, L5, and L6; not in terms
    of abstract competencies, but in concrete behaviors and mindset shifts. These
    are the patterns I’ve observed across dozens of promotions (and seemingly high-performing
    but stagnant careers) at major tech companies. Let’s decode the hidden ladder
    together.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我将分解 L3、L4、L5 和 L6 级别发生了什么变化；不是从抽象能力，而是从具体行为和心态转变的角度。这些是我观察到的在主要科技公司中数十次晋升（以及看似表现良好但停滞不前的职业生涯）的模式。让我们一起解码这个隐藏的阶梯。
- en: 'L3 → L4: Becoming Reliable'
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: L3 → L4：变得可靠
- en: 'The jump from L3 to L4 is deceptively simple to describe but surprisingly hard
    to execute: **you must shift from being an executor to being an owner.**'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 从 L3 到 L4 的跳跃在描述上看似简单，但执行起来却出奇地困难：**你必须从执行者转变为所有者**。
- en: At L3, you’re given well-defined tasks. A PM or senior data scientist scopes
    the work, breaks it into steps, and checks in frequently. You write the SQL query.
    You build the dashboard. You run the experiment. Someone else worries about whether
    you’re solving the right problem, whether the metric makes sense, or what happens
    after you ship.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 在 L3 级别，你将获得明确定义的任务。产品经理或高级数据科学家会界定工作范围，将其分解为步骤，并频繁检查进度。你编写 SQL 查询。你构建仪表板。你运行实验。其他人会担心你是否解决了正确的问题，指标是否合理，或者在你发布后会发生什么。
- en: At L4, you own the outcome. The difference shows up in dozens of small behaviors
    that compound into a completely different working style.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 在 L4 级别，你拥有结果。这种差异体现在数十种小行为中，这些行为累积成完全不同的工作风格。
- en: '**Finishing cleanly** becomes non-negotiable. L3s can get away with “I built
    the model, here’s the notebook.” L4s ship: documentation that others can use,
    code that passes review on the first try, results presented in a way that leads
    to clear decisions. When you hand off work, nothing comes back to you with “wait,
    what does this column mean?” or “can you rerun this with the corrected data?”'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: '**干净利落**变得不可协商。L3 级别的人可以“我构建了模型，这是笔记本。”L4 级别的人发布：其他人可以使用的文档，一次通过审查的代码，以引导清晰决策的方式展示的结果。当你移交工作，不会有“等等，这个列代表什么？”或“你能用修正后的数据重新运行这个吗？”这样的反馈。'
- en: '**Building trust** means your manager stops checking your work. They know that
    when you say the analysis is done, it’s actually done: edge cases handled, data
    quality verified, results sanity-checked against intuition. Early-career data
    scientists often underestimate how much of L4 is simply proving you won’t create
    surprises. Reliability isn’t glamorous, but it’s the foundation of everything
    that comes after.'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: '**建立信任**意味着你的经理不再检查你的工作。他们知道当你说你完成了分析时，实际上确实已经完成了：处理了边缘情况，验证了数据质量，结果与直觉进行了合理性检查。初入职场的数据科学家往往低估了L4中证明自己不会出意外需要付出多少努力。可靠性并不光鲜，但它是一切后续工作的基础。'
- en: '**Asking better questions** separates L4s from people stuck at L3\. When a
    PM asks for “conversion rate by segment,” an L3 builds the query and returns the
    numbers. An L4 asks: “Are we trying to identify which segment to target, or validate
    an existing hypothesis? Because that changes whether we should look at conversion
    rate or incremental lift.” You start seeing the *why* behind requests, which means
    you can often solve the actual problem rather than just the stated question.'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '**提出更好的问题**将L4与陷入L3的人区分开来。当项目经理要求“按细分市场查看转化率”时，L3会构建查询并返回数字。L4会问：“我们是在尝试确定要针对哪个细分市场，还是验证一个现有的假设？因为这将决定我们应该查看转化率还是增量提升。”你开始看到请求背后的*原因*，这意味着你通常可以解决实际问题，而不仅仅是表面上的问题。'
- en: '**Seeing the next step** before being told might be the most important L4 behavior.
    You finish analyzing experiment results, and instead of waiting for someone to
    ask, you’ve already drafted three follow-up experiment ideas with rough scopes.
    You spot a data quality issue and file the ticket to fix it before anyone notices
    the bug in their dashboard. You ship the quarterly metric review and proactively
    flag the one metric that’s trending in a concerning direction.'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 在被告知之前就能看到下一步可能是最重要的L4行为。你完成了实验结果的分析，而不是等待别人询问，你已经草拟了三个后续实验的想法，并大致确定了范围。你发现了数据质量问题，并在任何人注意到仪表板中的错误之前提交了修复问题的工单。你发布了季度指标审查，并主动标记了一个趋势令人担忧的指标。
- en: 'Here’s what this looks like in practice: You ship your first project end-to-end
    without PM handholding. Maybe it’s redesigning the user onboarding flow. You don’t
    just run the experiment, you write the one-pager proposing it, define the metrics
    with the PM, implement the logging with the engineers, analyze the results, present
    to leadership, and coordinate the full rollout. Six months earlier, five different
    people would have driven those steps. Now it’s you. That’s the L4 transition.'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 这在实践中看起来是这样的：你完成了第一个端到端的项目，不再需要项目经理的指导。可能是重新设计用户入门流程。你不仅运行了实验，还写了关于它的单页提案，与项目经理定义了指标，与工程师实施日志记录，分析了结果，向领导层汇报，并协调全面推广。六个月前，五个人会分别推动这些步骤。现在是你。这就是L4的过渡。
- en: The L3 → L4 jump is about **proving you can be trusted with bigger problems**.
    Once your manager knows you’ll finish what you start, see around corners, and
    deliver quality work without supervision, they can give you ambiguous projects.
    Which brings us to L5.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: L3 → L4的跃迁是关于**证明你可以被信任处理更大的问题**。一旦你的经理知道你会完成你开始的工作，看到拐角，并在没有监督的情况下交付高质量的工作，他们就可以给你模糊的项目。这把我们带到了L5。
- en: 'L4 → L5: Becoming Strategic'
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: L4 → L5：成为战略家
- en: If L3 → L4 is about reliable execution, **L4 → L5 is about becoming the person
    who defines what problems are worth solving in the first place.**
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 如果L3 → L4是关于可靠的执行，**那么L4 → L5是关于成为定义哪些问题值得首先解决的问题的人**。
- en: This is where most data scientists get stuck. They keep perfecting their execution—running
    cleaner experiments, building more sophisticated models, mastering new tools—while
    missing the fundamental shift their company expects. L5 isn’t about doing the
    work better. It’s about deciding what work should exist.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是大多数数据科学家卡住的地方。他们不断优化自己的执行——运行更干净的实验，构建更复杂的模型，掌握新工具——同时错过了公司期望的根本转变。L5不是关于做得更好。它是关于决定哪些工作应该存在。
- en: '**Scoping ambiguous problems** becomes your core skill. At L4, a PM hands you
    a question: “Why did engagement drop last month?” You investigate and return an
    answer. At L5, leadership says “growth is slowing” and you turn that into five
    concrete hypotheses, a prioritized investigation plan, and a timeline for decision-making.
    You’re comfortable with ambiguity because your job is to *resolve* it for others.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '**界定模糊问题**成为你的核心技能。在L4级别，产品经理给你一个问题：“为什么上个月的参与度下降了？”你进行调查并给出答案。在L5级别，领导层说“增长放缓”，你将其转化为五个具体假设，一个优先级调查计划，以及一个决策时间表。你习惯于模糊性，因为你的工作是**解决**它为他人。'
- en: 'This shows up in how you approach new initiatives. A product team says “we
    need to improve retention.” An L4 asks: “What analysis do you want?” An L5 pushes
    back with structure: “Let’s define what retention success looks like first. Are
    we optimizing day-7, day-30, or long-term engagement? What’s the business case?
    Are we trying to hit an org-level KPI or validate a product bet? That changes
    everything about how we should approach this.” At L5, you’re doing the strategic
    thinking that nobody else has time for.'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 这体现在你如何处理新的倡议。产品团队说：“我们需要提高留存率。”一个L4级别的人会问：“你希望进行哪种分析？”一个L5级别的人会以结构化的方式反驳：“让我们首先定义留存成功的样子。我们是优化第7天、第30天，还是长期参与度？业务案例是什么？我们是试图达到组织层面的关键绩效指标，还是验证产品赌注？这会改变我们如何处理这个问题的所有方面。”在L5级别，你正在做其他人没有时间做的战略思考。
- en: '**Designing metrics** separates L5s from L4s more than any other skill. At
    L4, you measure what you’re told to measure. At L5, you understand that metric
    choice *is* strategy. When your company debates whether to optimize for daily
    active users or time spent per session, you’re the person who can articulate the
    tradeoffs: DAU optimization might juice short-term engagement through notifications
    while degrading long-term user experience; time-per-session could reward addictive
    features over valuable ones. L5s don’t just calculate metrics, instead they consider
    whether they’ll drive the right behavior. It’s understanding that you can optimize
    the wrong metric perfectly and still harm the business.'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: '**设计指标**将L5级与L4级区分开来，比任何其他技能都更为明显。在L4级别，你测量的是被告知要测量的内容。在L5级别，你理解到**指标选择**本身就是策略。当你的公司讨论是否要优化每日活跃用户数或每场会话花费的时间时，你将是那个能够明确阐述权衡的人：DAU优化可能会通过通知提高短期参与度，同时降低长期用户体验；每场会话时间可能会奖励上瘾功能而非有价值的功能。L5级不仅计算指标，而是考虑这些指标是否会推动正确的行为。你需要理解，即使你完美地优化了错误的指标，仍然可能损害业务。'
- en: '**Influencing PMs** becomes a core part of your job. At L4, you’re responsive:
    PMs set priorities and you execute. At L5, you’re proactive: you spot opportunities
    in the data and convince PMs to bet on them. This might be analyzing user behavior
    data, noticing that a small segment has 10x higher lifetime value, building a
    business case for why the product team should focus their next quarter on expanding
    that segment, and driving the conversation in planning meetings until it’s on
    the roadmap.'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '**影响产品经理**成为你工作的核心部分。在L4级别，你是响应式的：产品经理设定优先级，你执行。在L5级别，你是主动的：你从数据中找到机会，并说服产品经理下注。这可能包括分析用户行为数据，注意到一个小的细分市场有10倍更高的终身价值，构建一个业务案例，说明为什么产品团队应该将下一个季度专注于扩大该细分市场，并在规划会议上推动对话，直到它出现在路线图上。'
- en: This influence requires a completely different communication style. You stop
    answering questions and start shaping which questions matter. You write strategy
    memos, not analysis reports. You present recommendations, not findings. The analysis
    is still rigorous, but it’s in service of driving decisions, not documenting what
    you did.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 这种影响力需要一种完全不同的沟通风格。你不再回答问题，而是开始塑造哪些问题才是重要的。你撰写策略备忘录，而不是分析报告。你提出建议，而不是发现。分析仍然是严格的，但它服务于推动决策，而不是记录你所做的事情。
- en: '**Thinking in tradeoffs** might be the deepest L5 mindset shift. L4s seek the
    “right answer.” L5s understand that most product decisions involve competing values
    with no clear winner. And your job is to make those tradeoffs explicit so leaders
    can decide. Should we launch the feature with known bugs to hit a deadline, or
    delay for quality? There’s no purely data-driven answer, but you can quantify
    the tradeoffs: “Launching now reaches 2M users during peak season but historically
    our buggy launches see 40% higher support costs and 15% higher churn. Here’s what
    that looks like in dollar terms.”'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: '**权衡思考**可能是最深层次的L5心态转变。L4s寻求“正确答案”。L5s明白，大多数产品决策都涉及相互竞争的价值，没有明确的胜者。你的工作是使这些权衡明确，以便领导者可以做出决定。我们应该带着已知的错误发布功能以赶上截止日期，还是为了质量而推迟？没有纯粹的数据驱动答案，但你可以对权衡进行量化：“现在发布可以在旺季达到200万用户，但历史上我们的有缺陷的发布支持成本高出40%，流失率高出15%。这就是用美元来表示的样子。”'
- en: 'Here’s what L5 looks like in practice: You lead a new experiment strategy that
    changes the product roadmap. Maybe growth has stalled and the team is running
    disconnected tests. You propose a systematic testing framework: define a coherent
    user journey to optimize, map out the highest-leverage points to test, create
    a shared metric tree so teams aren’t optimizing conflicting goals, and establish
    a six-month roadmap of experiments sequenced by dependency and learning value.
    This isn’t analysis, it’s strategy. You’ve shaped how your entire product org
    thinks about growth for the next two quarters. That’s the L5 transition.'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是L5在实践中看起来像什么：你领导了一个新的实验策略，改变了产品路线图。也许增长已经停滞，团队正在运行脱节的测试。你提出一个系统性的测试框架：定义一个连贯的用户旅程以优化，绘制出最高杠杆点的测试，创建一个共享的指标树，以便团队不会优化冲突的目标，并建立一个按依赖关系和学习价值排序的为期六个月的实验路线图。这不是分析，这是策略。你塑造了你的整个产品组织在未来两个季度内对增长的思考方式。这就是L5的过渡。
- en: The L4 → L5 jump is about **expanding from executing solutions to defining problems**.
    Once you’ve proven you can take ambiguous situations and turn them into clear
    paths forward, you’re ready to scale your impact beyond your own work.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: L4 → L5的跃迁是关于**从执行解决方案到定义问题**的扩展。一旦你证明了自己可以将模糊的情况转变为清晰的路径，你就可以扩大你的影响力，超越你自己的工作。
- en: 'L5 → L6: Becoming a Multiplier'
  id: totrans-27
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: L5 → L6：成为倍增器
- en: 'The L5 → L6 transition is the hardest to make, and the easiest to misunderstand.
    It’s not about being a more strategic individual contributor. **It’s about becoming
    a force multiplier: someone whose impact scales through others.** This can be
    as both an IC or as a manager.'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: L5 → L6的过渡是最难实现的，也是最容易误解的。这不仅仅是一个更战略性的个人贡献者。**这是成为一个倍增器：一个通过他人扩大影响力的人**。这可以是一个IC或是一个管理者。
- en: At L6, your value isn’t measured by the quality of your own analyses. It’s measured
    by how much better you make everyone else’s work. This is a brutal psychological
    shift for high-performing individual contributors who built their careers on personal
    excellence.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 在L6，你的价值不是通过你自己的分析质量来衡量的。它是通过你使其他人的工作变得多好来衡量的。这对于那些在个人卓越的基础上建立职业生涯的高绩效个人贡献者来说，是一个残酷的心理转变。
- en: '**Setting frameworks others use** becomes your primary output. An L5 might
    run the best experiment in company history. An L6 creates the experimentation
    framework that makes every team’s experiments better. This could be a decision
    tree for statistical test selection, a template for experiment one-pagers that
    forces teams to think through success metrics upfront, or a standardized approach
    to measuring incremental lift that becomes the company default.'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: '**为他人设定框架**成为你的主要输出。一个L5可能运行了公司历史上最好的实验。一个L6创建了使每个团队的实验都变得更好的实验框架。这可能是一个用于统计测试选择的决策树，一个强制团队提前思考成功指标的实验一页模板，或者是一个衡量增量提升的标准方法，成为公司的默认做法。'
- en: Often an L6’s output appears to be nothing groundbreaking individually but optimizes
    work across the org. For example, a fairly basic “metrics review checklist” that
    prevents dozens of teams from making metric-selection mistakes that would waste
    quarters of work.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，L6的输出看起来并不特别突破性，但优化了整个组织的工作。例如，一个相当基本的“指标审查清单”，防止数十个团队犯下会导致浪费数个季度工作的指标选择错误。
- en: '**Mentoring** matters more than you’d expect. At L6, you’re accountable for
    developing L4s and L5s across the organization, not just your immediate team.
    This goes beyond code reviews. You’re teaching people *how to think* strategically.
    When an L4 brings you a thorny analysis problem, you don’t solve it for them—you
    ask the questions that help them solve it themselves: “What decision does this
    analysis need to support? Who’s the audience and what do they already believe?
    What would make you confident enough in the result to bet your credibility on
    it?”'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: '**指导**的重要性超出了你的预期。在L6级别，你负责整个组织内L4和L5的发展，而不仅仅是你的直接团队。这不仅仅局限于代码审查。你是在教人们如何**战略性地思考**。当一个L4给你带来一个棘手的分析问题时，你不是为他们解决问题，而是提出帮助他们自己解决问题的疑问：“这个分析需要支持什么决策？受众是谁，他们已经相信了什么？什么会让你对结果有足够的信心，以至于你可以把你的信誉赌在上面？”'
- en: 'The multiplier effect shows up here: one hour of your time teaching an L4 how
    to scope problems properly might save them dozens of hours over the next year,
    and improve every project they touch. Your impact-per-hour through mentoring often
    exceeds your impact from doing the work yourself.'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 乘数效应在这里显现出来：你用一小时的时间教一个L4如何正确界定问题，可能会在接下来的一年里为他们节省数十小时，并改善他们接触到的每一个项目。通过指导，你每小时的产出往往超过你自己完成工作的产出。
- en: '**Driving alignment across teams** becomes critical at L6 because you’re working
    on problems too big for any single team to own. Maybe data quality issues are
    hurting three different product areas, but nobody owns the underlying instrumentation.
    An L5 might document the problem and escalate. An L6 convenes the stakeholders,
    builds consensus on severity, proposes a solution that works across all teams’
    constraints, and drives it to completion despite crossing organizational boundaries.'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: '**推动跨团队的一致性**在L6级别变得至关重要，因为你正在处理任何单一团队都无法拥有的问题。也许数据质量问题正在影响三个不同的产品领域，但没有人负责底层的仪器。一个L5级别的人可能会记录问题并升级。而L6级别的人会召集利益相关者，就严重性达成共识，提出一个适用于所有团队约束的解决方案，并推动其完成，即使这需要跨越组织界限。'
- en: 'This requires a completely different influencing toolkit than L5\. You’re not
    convincing one PM to prioritize your project, you’re aligning multiple teams around
    a shared problem when each team has competing priorities. You get comfortable
    with statements like: “I know this creates extra work for your team this quarter,
    but here’s why it unblocks three other teams and saves us all six months of pain
    later.” You make invisible problems visible, and you make coordination problems
    tractable.'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 这需要与L5级别完全不同的影响力工具。你不是在说服一个产品经理优先考虑你的项目，而是在多个团队之间就共同问题达成一致，而每个团队都有自己的优先事项。你习惯了这样的说法：“我知道这会在本季度给你们的团队增加额外的工作，但这是为什么它能解开三个其他团队的问题，并让我们所有人避免六个月的痛苦。”你使不可见的问题变得可见，并使协调问题变得可管理。
- en: '**Spotting systemic data issues** before they become crises is classic L6 work.
    You notice that experiment results have been inconsistent lately, dig in, and
    discover that a recent instrumentation change broke randomization for 5% of users
    in a subtle way that nobody caught. An L5 would file a bug. An L6 sees the pattern:
    this is the third instrumentation issue this year, which means the problem isn’t
    individual bugs, it’s that we lack a testing and review process for instrumentation
    changes. You propose the process, get buy-in from engineering leadership, and
    implement it. Six months later, instrumentation quality has improved across the
    company, and most people never know you’re the reason why.'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: '**在问题成为危机之前发现系统性的数据问题**是L6级别工作的典型代表。你注意到实验结果最近一直不稳定，深入调查后，发现最近的一次仪器更改以一种微妙的方式破坏了5%用户的随机化，而这种破坏没有人注意到。一个L5级别的人可能会提交一个错误报告。而L6级别的人则会看到模式：今年这是第三次出现仪器问题，这意味着问题不是个别错误，而是我们没有为仪器更改建立测试和审查流程。你提出了这个流程，得到了工程领导层的支持，并实施了它。六个月后，公司的仪器质量得到了提升，大多数人甚至不知道你是背后的原因。'
- en: 'Here’s what L6 looks like in practice: You create an experimentation review
    process that improves quality org-wide. It’s not just better documentation, it’s
    the implementation of a lightweight peer review system where any experiment over
    a certain size gets reviewed by a data scientist from another team before launch.
    You write the rubric, train the reviewers, run the first 20 reviews yourself to
    calibrate standards, and establish a feedback loop to improve the process. Within
    two quarters, experiment quality has measurably improved (fewer invalid tests,
    better metric selection, clearer documentation), and teams across the company
    are making better product decisions because their experiments are more trustworthy.
    You personally reviewed 5% of the experiments, but your framework improved 100%
    of them. That’s the L6 transition.'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 实践中的L6是这样的：你创建了一个改进组织整体质量的实验审查流程。这不仅仅是更好的文档，它还实施了一个轻量级的同行评审系统，其中任何超过一定规模的实验在发布前都会由另一团队的数据科学家进行审查。你编写评分标准，培训评审员，自己运行前20次审查以校准标准，并建立反馈循环以改进流程。在两个季度内，实验质量显著提高（无效测试减少，更好的指标选择，更清晰的文档），公司各团队因为他们的实验更加可靠而做出更好的产品决策。你个人审查了5%的实验，但你的框架改进了100%的实验。这就是L6的过渡。
- en: 'The L5 → L6 jump is about **scaling yourself through systems, people, and processes**.
    Your work becomes more abstract: you’re optimizing how the organization works,
    not solving individual problems. It may feel less satisfying in some ways (nobody
    celebrates a good framework launch), but the leverage is extraordinary.'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: L5 → L6的跃迁是关于**通过系统、人员和流程来扩展自己**。你的工作变得更加抽象：你是在优化组织的工作方式，而不是解决个别问题。在某些方面可能感觉不那么令人满意（没有人会庆祝一个良好的框架发布），但杠杆作用是非凡的。
- en: The Pattern Across Levels
  id: totrans-39
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 层级间的模式
- en: 'Looking across these transitions, a clear pattern emerges: **growth isn’t about
    learning more techniques; it’s about expanding how you see and shape the work.**'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 横跨这些过渡，一个清晰的模式浮现出来：**成长不是关于学习更多技术；它是关于扩展你看待和塑造工作的方式。**
- en: 'L3 → L4: You expand from task completion to problem ownership. The question
    changes from “Did I do what I was asked?” to “Did I solve the problem completely?”'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 'L3 → L4: 你从完成任务扩展到问题所有权。问题从“我是否完成了被要求的事情？”转变为“我是否完全解决了这个问题？”'
- en: 'L4 → L5: You expand from problem solving to problem definition. The question
    changes from “How do I solve this?” to “What problem should we be solving?”'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 'L4 → L5: 你从解决问题扩展到问题定义。问题从“我该如何解决这个问题？”转变为“我们应该解决什么问题？”'
- en: 'L5 → L6: You expand from defining problems to building the systems that help
    others define and solve problems. The question changes from “What should our team
    work on?” to “How do we make the entire organization more effective?”'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 'L5 → L6: 你从界定问题扩展到构建帮助他人界定和解决问题的系统。问题从“我们的团队应该做什么？”转变为“我们如何使整个组织更加有效？”'
- en: Each level requires you to zoom out. Each level requires you to let go of the
    satisfaction of hands-on work and embrace more abstract, more leveraged contributions.
    Each level requires different skills—but more importantly, different ways of thinking
    about what your job actually is.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 每个层级都需要你放大视野。每个层级都需要你放下亲手工作的满足感，拥抱更抽象、更有杠杆作用的贡献。每个层级都需要不同的技能——但更重要的是，不同的思考方式，关于你的工作实际上是什么。
- en: The hardest part? Nobody tells you this explicitly. You have to decode it from
    vague feedback about “impact” and “strategic thinking” and “scope.” Companies
    expect you to figure out that promotion isn’t about getting better at your current
    level’s game, it’s about noticing the new game and starting to play it before
    anyone asks you to.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 最困难的部分？没有人明确地告诉你这一点。你必须从关于“影响”、“战略思维”和“范围”的模糊反馈中解码出来。公司期望你弄清楚晋升不是关于在你当前级别的游戏中变得更好，而是关于注意到新的游戏，并在别人要求你之前开始玩这个游戏。
- en: 'So here’s my challenge to you: **Reflect on which mindset you’re currently
    embodying, and which one you want to grow into.**'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，这是我对你的挑战：**反思你目前所体现的心态，以及你希望成长成哪种心态。**
- en: 'Are you executing reliably but still waiting for others to scope your work?
    You’re ready to start acting like an L5: propose the problem definition instead
    of waiting for it. Are you already scoping problems but only for your own projects?
    You’re ready to start acting like an L6: look for the frameworks and systems that
    would make everyone’s work better.'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 你是否在可靠地执行任务，但仍在等待别人界定你的工作范围？你准备好开始像L5那样行事：提出问题定义而不是等待。你是否已经在界定问题，但只是针对你自己的项目？你准备好开始像L6那样行事：寻找能够使每个人的工作都变得更好的框架和系统。
- en: Don’t wait for a promotion to change how you work. Start playing the next level’s
    game now. Your promotion is the company *recognizing* that you’ve already made
    the shift—not *permitting* you to start.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 不要等待促销来改变你的工作方式。现在就开始玩下一个级别的游戏。晋升是你公司*认可*你已经做出了转变——不是*允许*你开始。
