- en: How to Build Your Own Agentic AI System Using CrewAI
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/how-to-build-your-own-agentic-ai-system-using-crewai/](https://towardsdatascience.com/how-to-build-your-own-agentic-ai-system-using-crewai/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1762569992687" class="mdspan-comment">What is Agentic</mdspan>
    AI?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Agentic AI, originally introduced by Andrew Ng as AI “partners” that autonomously
    *plan, execute, and complete complex tasks*, is a new concept emerged from the
    burst of Generative AI applications. The term has rapidly gained popularity since
    late July 2025, according to its search volume in Google Trends.
  prefs: []
  type: TYPE_NORMAL
- en: '!["Agentic AI" Google search volume over the past 12 months](../Images/e224cda6b7d0b2d036cf38a9f4899663.png)'
  prefs: []
  type: TYPE_IMG
- en: “Agentic AI” Google search volume over the past 12 months
  prefs: []
  type: TYPE_NORMAL
- en: Despite its recent appearance, the research article from BCG “[How Agentic AI
    Is Transforming Enterprise Platforms](https://www.bcg.com/publications/2025/how-agentic-ai-is-transforming-enterprise-platforms)”
    indicates that organizations have been actively adopting Agentic AI workflows
    to transform their core technology platforms and assist in marketing automation,
    customer services, workplace productivity etc, leading to 20% to 30% faster workflow
    cycles.
  prefs: []
  type: TYPE_NORMAL
- en: This article is also available as a video.
  prefs: []
  type: TYPE_NORMAL
- en: From LLMs to Multi-Agent Systems
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: What distinguishes an Agentic AI system from traditional automation systems
    is its autonomy to plan actions and logic, as long as achieving a specific, predefined
    objective. As a result, there is less rigid orchestration or predetermined decision-making
    trajectories governing the Agent’s intermediate steps. ”[Synergizing Reasoning
    and Acting in Language Models](https://arxiv.org/abs/2210.03629)” is considered
    the foundational paper that formalizes the early-stage LLM Agent framework “ReAct”,
    consisting of three key elements — **actions**, **thoughts** and **observations.**
    If you are interested in more details of how ReAct works, please see my blog post
    “[6 Common LLM Customization Strategies Briefly Explained](https://towardsdatascience.com/6-common-llm-customization-strategies-briefly-explained/)“.
  prefs: []
  type: TYPE_NORMAL
- en: '[6 Common LLM Customization Strategies Briefly Explained](https://towardsdatascience.com/6-common-llm-customization-strategies-briefly-explained/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: With the rapid growth of this field, it becomes evident that a single LLM Agent
    cannot catch up with the high demand of AI applications and integrations. Therefore,
    Multi-Agent systems are developed to orchestrate Agent’s functionalities into
    a dynamic workflow. While each agent instance is role-based, task-focused, emphasizing
    on achieving a single objective, a multi-agent system is multi-functional and
    more generalized in its capabilities. The LangChain article “[**Benchmarking Multi-Agent
    Architectures**](https://blog.langchain.com/benchmarking-multi-agent-architectures/)”
    has shown that when the number of knowledge domains required in a task increases,
    the performance of a single-agent system deteriorates while a multi-agent system
    can achieve sustainable performance by reduce the amount of noise feeding into
    each individual agent.
  prefs: []
  type: TYPE_NORMAL
- en: Build a Simple Agentic AI System Using CrewAI
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: CrewAI is an open-source Python framework that allows developers to build production-ready
    and collaborative AI agent teams to tackle complex tasks. Compared to other popular
    Agent frameworks like LangChain and LlamaIndex, it focuses more on role-based
    multi-agent collaborations, while offering less flexibility for complex agentic
    architecture. Although it is a relatively younger framework, it is gaining increasing
    attractions starting from July 2025 due to the ease of implementation.
  prefs: []
  type: TYPE_NORMAL
- en: '*We can use the analogy of hiring a cross-functional project team (or a **Crew)**
    when using CrewAI framework to build the Agentic system, where each AI **Agent**
    in the Crew has a specific role capable of carrying out multiple role-related
    **Tasks**. Agents are equipped with **Tools** that facilitate them completing
    the jobs.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Now that we’ve covered the core concepts of the CrewAI framework—Agent, Task,
    Tool, and Crew—let’s look at sample code to build a minimal viable agentic system.
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Install CrewAI and set up environment variables using bash commands below,
    e.g. export OpenAI API key as an environment variable for accessing OpenAI GPT
    models.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 2\. Create Tools from CrewAI’s [built-in tool list](https://docs.crewai.com/en/concepts/tools),
    e.g. apply `DirectoryReadTool()` to access a directory, and `FileReadTool()` to
    read files stored in the directory.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 3\. Initiate an Agent by specifying its role, goal, and providing it with tools.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: 4\. Create a Task by providing a description and assign an agent to execute
    the task.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: 5\. Build the Crew by combining your Agents and Tasks together. Start the workflow
    execution using `kickoff()`.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: Develop an Agentic Social Media Marketing Crew
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 0\. Project Objectives
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Let’s expand on this simple CrewAI example by creating a Social Media Marketing
    team through the step-by-step procedures below. This team will generate blog posts
    based on the user’s topic of interest and create tailored campaign messages for
    sharing on different social media platforms.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c68461dc85fb658e6993e0f5ef6c6a6c.png)'
  prefs: []
  type: TYPE_IMG
- en: '*An example output if we ask the crew about the topic “Agentic AI”.*'
  prefs: []
  type: TYPE_NORMAL
- en: '**Blog Post**'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/576d2d762aaba2b90da7cc76f221876d.png)'
  prefs: []
  type: TYPE_IMG
- en: '**X(Twitter) Message** `Discover the Future of Agentic AI! Have you ever wondered
    how Agentic AI is set to redefine our interaction with technology by 2025? Understanding
    AI trends for 2025 is not only crucial for technology enthusiasts but essential
    for businesses across various sectors. #AgenticAI #AITrends`'
  prefs: []
  type: TYPE_NORMAL
- en: '**YouTube Message** `Explore Groundbreaking Trends in Agentic AI! 🌟 Uncover
    how Agentic AI is transforming industries in ways you never imagined! By 2025,
    these revolutionary trends will reshape how we engage with technologies, particularly
