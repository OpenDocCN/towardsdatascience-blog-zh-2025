  type: TYPE_IMG
- en: '*Output from “refine” Task*'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/1b28ed088846a81054f8edf3db99db2c.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Output from “distribute” Task*'
  prefs: []
  type: TYPE_NORMAL
