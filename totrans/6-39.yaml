- en: Measuring The Execution Times of C Versus Rust
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 测量C与Rust的执行时间
- en: 原文：[https://towardsdatascience.com/measuring-the-execution-times-of-c-versus-rust-bc45c577052a/](https://towardsdatascience.com/measuring-the-execution-times-of-c-versus-rust-bc45c577052a/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/measuring-the-execution-times-of-c-versus-rust-bc45c577052a/](https://towardsdatascience.com/measuring-the-execution-times-of-c-versus-rust-bc45c577052a/)
- en: Comparing two of the fastest programming languages
  id: totrans-2
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 比较两种最快的编程语言
- en: '![Photo by Aron Visuals on Unsplash](../Images/01c4e4fd745322daba2aa2a8d6381f8c.png)'
  id: totrans-3
  prefs: []
  type: TYPE_IMG
  zh: '![由Aron Visuals在Unsplash上的照片](../Images/01c4e4fd745322daba2aa2a8d6381f8c.png)'
- en: Photo by [Aron Visuals](https://unsplash.com/@aronvisuals?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 由[Aron Visuals](https://unsplash.com/@aronvisuals?utm_source=medium&utm_medium=referral)在[Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)上的照片
- en: Is C is faster than Rust? I had always assumed the answer to that question to
    be yes, but I recently felt the need to test my assumptions. I tried searching
    for information on the subject but I wasn’t able to find information that compared
    the two languages side by side, so I did my own testing. What I found were cases
    where Rust could be seen as faster than C.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: C是否比Rust快？我总是认为这个问题的答案是肯定的，但最近我感到有必要测试我的假设。我试图搜索有关这个主题的信息，但我无法找到将这两种语言并排比较的信息，所以我进行了自己的测试。我发现了一些情况下，Rust可以被视为比C快。
- en: '**C vs Rust**'
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**C vs Rust**'
- en: C and Rust are both similar (low-level) system programming languages designed
    for high performance; where they differ is in their design philosophy and features.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: C和Rust都是为高性能而设计的（低级）系统编程语言；它们的不同之处在于设计哲学和特性。
- en: '**C** is about simplicity and giving the programmer complete control over memory.
    With this freedom can come potential issues such as buffer overflows, null pointer
    dereferencing, and memory leaks if the programmer does not handle these properly
    in their code. It lacks built-in safety features to prevent these, and the user
    has to make them manually.'
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**C**关于简单性，并给予程序员对内存的完全控制。这种自由可能会带来潜在的问题，如缓冲区溢出、空指针解引用和内存泄漏，如果程序员没有在他们的代码中妥善处理这些问题。它缺乏内置的安全功能来防止这些问题，用户必须手动实现。'
- en: '**Rust** is the polar opposite of this and it emphasizes memory safety while
    trying to sacrifice as little performance as possible. It uses a borrow checker
    and ownership system to enforce rules at compile-time to ensure that memory is
    accessed safely.'
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Rust**与这正好相反，它强调内存安全，同时尽可能少地牺牲性能。它使用借用检查器和所有权系统，在编译时强制执行规则，以确保内存被安全访问。'
- en: While Rust’s main feature is automatic memory safety, if the programmer needs
    to turn this off it allows it, which can make it very versatile.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然Rust的主要特性是自动内存安全，但如果程序员需要关闭这一功能，它也允许这样做，这使得它非常灵活。
- en: '**Comparing The speed**'
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**比较速度**'
- en: 'For testing I used:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 在测试中，我使用了：
- en: Debian 10
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Debian 10
- en: Clang 7.0.1
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Clang 7.0.1
- en: GCC 8.3.0
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: GCC 8.3.0
- en: Clang 13.0.1
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Clang 13.0.1
- en: Cargo 1.83.0
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Cargo 1.83.0
- en: Rustc 1.83.0
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Rustc 1.83.0
- en: The first thing I did was make a hello world program in each language.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 我首先在每个语言中创建了一个hello world程序。
- en: '**C**'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: '**C**'
- en: '[PRE0]'
  id: totrans-21
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '**Rust**'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '**Rust**'
- en: '[PRE1]'
  id: totrans-23
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: This is just default experience for both programs. I didn’t add any optimizations
    to either.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 这只是两个程序默认的体验。我没有对任何一个添加任何优化。
- en: '[PRE2]'
  id: totrans-25
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '[PRE3]'
  id: totrans-26
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: When I had both binaries I then used the valgrind massif tool to get the time
    and memory usage of each program.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 当我拥有这两个二进制文件时，我使用了valgrind massif工具来获取每个程序的时间和内存使用情况。
- en: '**C Hello World Execution**'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: '**C Hello World执行**'
- en: '![valgrind - - tool=massif ./helloc for C](../Images/ed2bf1d4ba0cd3942495c1f5db985417.png)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
  zh: '![valgrind - - tool=massif ./helloc for C](../Images/ed2bf1d4ba0cd3942495c1f5db985417.png)'
- en: valgrind – – tool=massif ./helloc for C
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: valgrind – – tool=massif ./helloc for C
- en: How Valgrind works is by taking snapshots throughout the program execution then
    printing out the total amount of memory used in bytes at that time, as well as
    the current time elapsed. Time in this case (i) is measured in CPU instructions.
    We can see that the C code took 4 total snapshots and 131,349 CPU instructions
    to print hello world.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: Valgrind的工作原理是在程序执行过程中进行快照，然后打印出当时使用的总内存量（以字节为单位），以及当前经过的时间。在这种情况下（i）时间是以CPU指令来衡量的。我们可以看到，C代码进行了4次总快照，并使用了131,349条CPU指令来打印hello
    world。
- en: Why do we care about CPU instruction count? CPU speed is generally measured
    in clock speed. These days usually Gigahertz, meaning a 3.0 GHz processor can
    execute 3 billion cock cycles per second. One clock cycle is not equal to one
    instruction though. It is a very architecture dependent problem how many clock
    cycles it takes to execute an instruction. Many processors can now even execute
    multiple instructions on one cycle. On the same platform though, like I am doing
    here, we can use the amount of instructions the CPU takes to execute the program
    in order to gain a understanding of which one took less work for the CPU to complete.
    Time to complete and amount of work to complete have a rough relationship.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 我们为什么关心CPU指令数？CPU速度通常以时钟速度来衡量。如今通常是千兆赫兹，这意味着3.0 GHz的处理器每秒可以执行30亿个时钟周期。然而，一个时钟周期并不等于一条指令。执行一条指令所需的时钟周期数量是一个非常依赖于架构的问题。许多处理器现在甚至可以在一个周期内执行多条指令。但在同一平台上，比如我这里所做的那样，我们可以使用CPU执行程序所需的指令数量来了解哪个程序对CPU完成工作所需的工作量更少。完成时间和完成工作量有一个大致的关系。
- en: '**Rust Hello World Execution**'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: '**Rust Hello World执行**'
- en: '![output of valgrind - - tool=massif ./hello for Rust](../Images/10d529336a3378dd7120bb2d360daf13.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![valgrind – – tool=massif ./hello for Rust的输出](../Images/10d529336a3378dd7120bb2d360daf13.png)'
- en: output of valgrind – – tool=massif ./hello for Rust
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: valgrind – – tool=massif ./hello for Rust的输出
- en: Unlike the C program, the Rust program took 14 total snapshots and 508,165 total
    CPU instructions to print hello world. From this we can tell that the Rust program
    took more work to print hello than the C program.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 与C程序不同，Rust程序打印hello world时总共进行了14次快照和508,165条总CPU指令。从这一点我们可以看出，Rust程序打印hello比C程序花费了更多的工作量。
- en: The Rust Program also used more ram, and while it is not shown here I also noticed
    a large difference in the size of the binaries with the Rust program taking 412k,
    while the C program took 16k.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: Rust程序也使用了更多的RAM，虽然这里没有显示，我还注意到二进制文件的大小存在很大差异，Rust程序占用412k，而C程序只占用16k。
- en: This test does not mean that C is faster than Rust yet though, as there are
    ways to reduce the amount of time it takes Rust to print to screen. I just did
    this first to see, because I was curious before I started optimizing and performing
    operations.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 这个测试并不意味着C比Rust快，因为还有方法可以减少Rust打印到屏幕所需的时间。我只是先这样做，因为我开始优化和执行操作之前很好奇。
- en: 'I managed to reduce it further by adding this to my Cargo.toml:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 我通过添加以下内容到我的Cargo.toml中进一步减少了它：
- en: '[PRE4]'
  id: totrans-40
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: And using std::io::Write instead of println to reduce a little overhead.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 使用std::io::Write代替println以减少一点开销。
- en: '[PRE5]'
  id: totrans-42
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: By doing this I managed to reduce the time by a little, still nowhere near the
    C program, but I am sure it can be reduced further.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 通过这样做，我设法减少了时间，但仍然远远不及C程序，但我确信它可以进一步减少。
- en: '![output 2 of valgrind - - tool=massif ./hello for Rust new optimized hello](../Images/287816e9f7ec9a9c880fdf05d912b539.png)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
  zh: '![valgrind – – tool=massif ./hello for Rust新优化的hello输出2](../Images/287816e9f7ec9a9c880fdf05d912b539.png)'
- en: output 2 of valgrind – – tool=massif ./hello for Rust new optimized hello
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: valgrind – – tool=massif ./hello for Rust输出2
- en: '**QuickSort**'
  id: totrans-46
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**快速排序**'
- en: One of the things that matters a lot in a program is how quickly it can perform
    mathematical functions.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 在一个程序中非常重要的一点是它执行数学函数的速度有多快。
- en: To test this I wrote a simple quick sort program in Rust and C.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 为了测试这一点，我分别用Rust和C编写了一个简单的快速排序程序。
- en: To avoid random number generation contributing to the amount of time I used
    the same array of 1000 numbers in both programs.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 为了避免随机数生成对时间的影响，我在两个程序中都使用了相同的1000个数字数组。
- en: 'Rust Code:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: Rust代码：
- en: '[PRE6]'
  id: totrans-51
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'C Code:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: C代码：
- en: '[PRE7]'
  id: totrans-53
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'I then built both programs with the following arguments:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 我随后用以下参数构建了这两个程序：
- en: '[PRE8]'
  id: totrans-55
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: '[PRE9]'
  id: totrans-56
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: What I expected, based on the first test, was for the C code to perform faster,
    but to my surprise the Rust code said it was performing faster.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 根据第一次测试，我预期C代码会更快，但令我惊讶的是，Rust代码显示它运行得更快。
- en: '![Output of C quicksort](../Images/27bb37ffde04cd0a2dc2880d1686bcd7.png)'
  id: totrans-58
  prefs: []
  type: TYPE_IMG
  zh: '![C quicksort输出](../Images/27bb37ffde04cd0a2dc2880d1686bcd7.png)'
- en: Output of C quicksort
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: C快速排序输出
- en: '![Output of Rust Quicksort](../Images/2cea7e2bba9698600b99b94b8b7ae723.png)'
  id: totrans-60
  prefs: []
  type: TYPE_IMG
  zh: '![Rust Quicksort输出](../Images/2cea7e2bba9698600b99b94b8b7ae723.png)'
- en: Output of Rust Quicksort
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: Rust Quicksort输出
- en: What confused me is then I ran both binaries through valgrind, and it reported
    that the C binary was still using less instructions.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 令我困惑的是，当我运行了这两个二进制文件并通过valgrind进行检查时，它报告说C二进制文件仍然使用了更少的指令。
- en: '![Output of C valgrind showing a time of 434,078 for total execution](../Images/62624dc6e848a6c6d498c25146edaeb0.png)'
  id: totrans-63
  prefs: []
  type: TYPE_IMG
  zh: '![C valgrind输出，显示总执行时间为434,078](../Images/62624dc6e848a6c6d498c25146edaeb0.png)'
- en: Output of C valgrind showing a time of 434,078 for total execution
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: C valgrind 输出的总执行时间为 434,078
- en: '![Output of Rust Valgrind showing a time of 656,647 for total execution](../Images/02ffa40633aea4836b53c79edb8e41c4.png)'
  id: totrans-65
  prefs: []
  type: TYPE_IMG
  zh: '![Rust Valgrind 输出的总执行时间为 656,647](../Images/02ffa40633aea4836b53c79edb8e41c4.png)'
- en: Output of Rust Valgrind showing a time of 656,647 for total execution
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: Rust Valgrind 输出的总执行时间为 656,647
- en: Since valgrind was just measuring the total amount of instructions used for
    execution this made me wonder if it had something to do with how Rust was optimizing
    the binary. It led me to try different compilers and optimization flags with C
    to see if that was the issue.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 由于 valgrind 只测量执行过程中使用的总指令数，这让我怀疑这与 Rust 优化二进制文件的方式有关。这促使我尝试使用不同的编译器和优化标志来编译
    C，看看是否是这个问题。
- en: '[PRE10]'
  id: totrans-68
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: '![Attempts with optimized gcc](../Images/10714c9d99168aca1b50e3dced9483bd.png)'
  id: totrans-69
  prefs: []
  type: TYPE_IMG
  zh: '![使用优化后的 gcc 尝试](../Images/10714c9d99168aca1b50e3dced9483bd.png)'
- en: Attempts with optimized gcc
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 使用优化后的 gcc 尝试
- en: '[PRE11]'
  id: totrans-71
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: '![Attempts with optimized clang](../Images/dfa04e908a53cc668087acbea4150a4c.png)'
  id: totrans-72
  prefs: []
  type: TYPE_IMG
  zh: '![使用优化后的 clang 尝试](../Images/dfa04e908a53cc668087acbea4150a4c.png)'
- en: Attempts with optimized clang
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 使用优化后的 clang 尝试
- en: '[PRE12]'
  id: totrans-74
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: '![Attempts with optimized clang 13](../Images/1ab7a7be0f2dd1d592da887bbf18f16d.png)'
  id: totrans-75
  prefs: []
  type: TYPE_IMG
  zh: '![使用优化后的 clang 13 尝试](../Images/1ab7a7be0f2dd1d592da887bbf18f16d.png)'
- en: Attempts with optimized clang 13
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 使用优化后的 clang 13 尝试
- en: Everything I tried showed the Rust binary beating the C binary.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 我尝试过的每一件事都表明 Rust 二进制文件比 C 二进制文件性能更好。
- en: This made me wonder if the Rust timer was faster than the C timer, so I wrote
    a simple program to just iterate a number as high as it could in a second to test
    this.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 这让我怀疑 Rust 定时器是否比 C 定时器快，所以我写了一个简单的程序来测试在一秒内尽可能迭代一个数字。
- en: '**C code:**'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: '**C 代码：**'
- en: '[PRE13]'
  id: totrans-80
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: '**Rust code:**'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: '**Rust 代码：**'
- en: '[PRE14]'
  id: totrans-82
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: '**Compile flags:**'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: '**编译标志：**'
- en: '[PRE15]'
  id: totrans-84
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: '[PRE16]'
  id: totrans-85
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: What I found was that the Rust program’s number was always larger than the C’s.
    This showed Rust completing the loop faster than the C program.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 我发现 Rust 程序的数字总是比 C 的要大。这表明 Rust 完成循环的速度比 C 程序快。
- en: '![C timer completing loop](../Images/97fef8a831e1af7832ffe25961cb84dd.png)'
  id: totrans-87
  prefs: []
  type: TYPE_IMG
  zh: '![C 定时器完成循环](../Images/97fef8a831e1af7832ffe25961cb84dd.png)'
