- en: How to Learn the Math Needed for Machine Learning
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/how-to-learn-the-math-needed-for-machine-learning/](https://towardsdatascience.com/how-to-learn-the-math-needed-for-machine-learning/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1747243138238" class="mdspan-comment">Maths</mdspan> can
    be a scary topic for people.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: Many of you want to work in machine learning, but the maths skills needed may
    seem overwhelming.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: I am here to tell you that it’s nowhere as intimidating as you may think and
    to give you a roadmap, resources, and advice on how to learn math effectively.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: Let’s get into it!
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: Do you need maths for machine learning?
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'I often get asked:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: Do you need to know maths to work in machine learning?
  id: totrans-8
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The short answer is generally *yes*, but the depth and extent of maths you need
    to know depends on the type of role you are going for.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
- en: 'A research-based role like:'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: '**Research Engineer — **Engineer who runs experiments based on research ideas.'
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Research Scientist — **A full-time researcher on cutting edge models.'
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Applied Research Scientist** — Somewhere between research and industry.'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You will particularly need strong maths skills.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: 'It also depends on what company you work for. If you are a machine learning
    engineer or data scientist or any tech role at:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: '**Deepmind**'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Microsoft AI**'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Meta Research**'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Google Research**'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You will also need strong maths skills because you are working in a research
    lab, akin to a university or college research lab.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: In fact, most machine learning and AI research is done at large corporations
    rather than universities due to the financial costs of running models on massive
    data, which can be millions of pounds.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: For these roles and positions I have mentioned, your maths skills will need
    to be a minimum of a bachelor’s degree in a subject such as math, physics, computer
    science, statistics, or engineering.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: However, ideally, you will have a master’s or PhD in one of those subjects,
    as these degrees teach the research skills needed for these research-based roles
    or companies.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: This may sound heartening to some of you, but this is just the truth from the
    statistics.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
- en: According to a [notebook](https://www.kaggle.com/code/datafan07/what-takes-to-be-a-data-scientist-story-of-robert#2.7.1.2-Education-and-Yearly-Income)
    from the [2021 Kaggle Machine Learning & Data Science Survey](https://www.kaggle.com/competitions/kaggle-survey-2021/overview),
    the research scientist role is highly popular among PhD and doctorates.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/276856552e2f5b9e527356ebca4f89d9.png)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
- en: '[Source](https://www.kaggle.com/code/datafan07/what-takes-to-be-a-data-scientist-story-of-robert#2.2.5.4-Education-vs.-Role).'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
- en: And in general, the higher your education the more money you will earn, which
    will correlate with maths knowledge.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b31aea3ff783e4b04e7cd61c7a3b57f0.png)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
- en: '[Source](https://www.kaggle.com/code/datafan07/what-takes-to-be-a-data-scientist-story-of-robert#2.7.1.2-Education-and-Yearly-Income).'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
- en: However, if you want to work in the industry on production projects, the math
    skills needed are considerably less. Many people I know working as machine learning
    engineers and data scientists don’t have a “target” background.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
- en: This is because industry is not so “research” intensive. It’s often about determining
    the optimal business strategy or decision and then implementing that into a machine-learning
    model.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
- en: Sometimes, a simple decision engine is only required, and machine learning would
    be overkill.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: High school maths knowledge is usually sufficient for these roles. Still, you
    may need to brush up on key areas, particularly for interviews or specific specialisms
    like reinforcement learning or time series, which are quite maths-intensive.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
- en: To be honest, the majority of roles are in industry, so the maths skills needed
    for most people will not be at the PhD or master’s level.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: But I would be lying if I said these qualifications do not give you an advantage.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
- en: What maths do you need to know?
  id: totrans-37
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'There are three core areas you need to know:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
- en: '**Statistics**'
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Calculus**'
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Linear Algebra**'
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Statistics
  id: totrans-42
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I may be slightly biased, but statistics is the most important area you should
    know and put the most effort into understanding.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
- en: Most machine learning originated from statistical learning theory, so learning
    statistics will mean you will inherently learn machine learning or its basics.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
- en: 'These are the areas you should study:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
- en: '**Descriptive Statistics** — This is useful for general analysis and diagnosing
    your models. This is all about summarising and portraying your data in the best
    way.'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Averages: Mean, Median, Mode'
  id: totrans-47
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Spread: Standard Deviation, Variance, Covariance'
  id: totrans-48
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Plots: Bar, Line, Pie, Histograms, Error Bars'
  id: totrans-49
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Probability Distributions** — This is the heart of statistics as it defines
    the shape of the probability of events. There are many, and I mean many, distributions,
    but you certainly don’t need to learn all of them.'
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Normal
  id: totrans-51
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Binomial
  id: totrans-52
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Gamma
  id: totrans-53
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Log-normal
  id: totrans-54
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Poisson
  id: totrans-55
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Geometric
  id: totrans-56
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Probability Theory **— As I said earlier, machine learning is based on statistical
    learning, which comes from understanding how probability works. The most important
    concepts are'
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Maximum likelihood estimation
  id: totrans-58
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Central limit theorem
  id: totrans-59
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Bayesian statistics
  id: totrans-60
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Hypothesis Testing** —Most real-world use cases of data and machine learning
    revolve around testing. You will test your models in production or carry out an
    A/B test for your customers; therefore, understanding how to run hypothesis tests
    is very important.'
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Significance Level
  id: totrans-62
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Z-Test
  id: totrans-63
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: T-Test
  id: totrans-64
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Chi-Square Test
  id: totrans-65
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Sampling
  id: totrans-66
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Modelling & Inference** —Models like linear regression, logistic regression,
    polynomial regression, and any regression algorithm originally came from statistics,
    not machine learning.'
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Linear Regression
  id: totrans-68
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Logistic Regression
  id: totrans-69
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Polynomial Regression
  id: totrans-70
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Model Residuals
  id: totrans-71
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Model Uncertainty
  id: totrans-72
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Generalised Linear Models
  id: totrans-73
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Calculus
  id: totrans-74
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Most machine learning algorithms learn from gradient descent in one way or another.
    And, gradient descent has its roots in calculus.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
- en: 'There are two main areas in calculus you should cover:'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
- en: Differentiation
  id: totrans-77
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: What is a derivative?
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Derivatives of common functions.
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Turning point, maxima, minima and saddle points.
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Partial derivatives and multivariable calculus.
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Chain and product rules.
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Convex vs non-convex differentiable functions.
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Integration
  id: totrans-84
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: What is integration?
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Integration by parts and substitution.
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The integral of common functions.
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Integration of areas and volumes.
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Linear Algebra
  id: totrans-89
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Linear algebra is used everywhere in machine learning, and a lot in deep learning.
    Most models represent data and features as matrices and vectors.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
- en: '**Vectors **'
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What are vectors
  id: totrans-92
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Magnitude, direction
  id: totrans-93
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Dot product
  id: totrans-94
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Vector product
  id: totrans-95
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Vector operations (addition, subtraction, etc)
  id: totrans-96
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Matrices**'
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What is a matrix
  id: totrans-98
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Trace
  id: totrans-99
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Inverse
  id: totrans-100
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Transpose
  id: totrans-101
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Determinants
  id: totrans-102
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Dot product
  id: totrans-103
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Matrix decomposition
  id: totrans-104
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Eigenvalues & Eigenvectors **'
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Finding eigenvectors
  id: totrans-106
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Eigenvalue decomposition
  id: totrans-107
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Spectrum analysis
  id: totrans-108
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Best Resources
  id: totrans-109
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: There are loads of resources, and it really comes down to your learning style.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
- en: 'If you are after textbooks, then you can’t go wrong with the following and
    is pretty much all you need:'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
- en: '[**Practical Statistics For Data Scientist **](https://www.amazon.co.uk/Practical-Statistics-Data-Scientists-Essential/dp/149207294X)— I
    recommend this book all the time and for good reason. This is the only textbook
    you realistically need to learn the statistics for data science and machine learning.'
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**[Mathematics for Machine Learning](https://www.amazon.co.uk/Mathematics-Machine-Learning-Peter-Deisenroth/dp/110845514X/) **— As
    the name implies, this textbook will teach the maths for machine learning. A lot
    of the information in this book may be overkill, but your maths skills will be
    excellent if you study everything.'
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If you want some online courses, I have heard good things about the following
    ones.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
- en: '**[Mathematics for Machine Learning and Data Science Specialisation](https://www.coursera.org/specializations/mathematics-for-machine-learning-and-data-science) — **This
    course is by DeepLearning.AI, the same people who made the Machine Learning Specialisation,
    arguably the best machine learning course.'
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Learning Advice
  id: totrans-116
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The amount of maths content you need to learn may seem overwhelming, but don’t
    worry.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
- en: The main thing is to break it down step by step.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
- en: 'Pick one of the three: statistics, linear algebra or calculus.'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
- en: Look at the things I wrote above you need to know and choose one resource. It
    doesn’t have to be any of the ones I recommended above.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
- en: That’s the initial work done. Don’t overcomplicate by looking for the “best
    resource” because such a thing doesn’t exist.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
- en: Now, start working through the resources, but don’t just blindly read or watch
    the videos.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
- en: Actively take notes and document your understanding. I personally write blog
    posts, which essentially employ the [Feynman technique](https://fs.blog/feynman-technique/),
    as I am, in a way, “teaching” others what I know.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 积极做笔记并记录你的理解。我本人写博客，本质上运用了[Feynman技巧](https://fs.blog/feynman-technique/)，因为在某种程度上，我是在“教”别人我所知道的东西。
- en: Writing blogs may be too much for some people, so just make sure you have good
    notes, either physically or digitally, that are in your own words and that you
    can reference later.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 对于一些人来说，写博客可能太多，所以请确保你有一些好的笔记，无论是物理的还是数字的，都是你自己的话，并且你可以稍后参考。
- en: 'The learning process is generally quite simple, and there have been studies
    done on how to do it effectively. The general gist is:'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 学习过程通常相当简单，并且已经有一些关于如何有效进行学习的研究。大致要点是：
- en: Do a little bit every day
  id: totrans-126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每天做一点
- en: Review old concepts frequently (spaced repetition)
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 经常复习旧概念（间隔重复）
- en: Document your learning
  id: totrans-128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 记录你的学习
- en: It’s all about the process; follow it, and you will learn!
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 重点是过程；遵循它，你就会学到东西！
- en: '* * *'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Another Thing!
  id: totrans-131
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
