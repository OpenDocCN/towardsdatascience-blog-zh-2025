- en: How the Rise of Tabular Foundation Models Is Reshaping Data Science
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 表格基础模型兴起如何重塑数据科学
- en: 原文：[https://towardsdatascience.com/tabular-foundation-models/](https://towardsdatascience.com/tabular-foundation-models/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/tabular-foundation-models/](https://towardsdatascience.com/tabular-foundation-models/)
- en: <mdspan datatext="el1759881682222" class="mdspan-comment">Let’s Not Forget</mdspan>
    Tabular Data!
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1759881682222" class="mdspan-comment">让我们不要忘记</mdspan>表格数据！
- en: Recent advances in AI—ranging from systems capable of holding coherent conversations
    to those generating realistic video sequences—are largely attributable to artificial
    neural networks (ANNs). These achievements have been made possible by algorithmic
    breakthroughs and architectural innovations developed over the past fifteen years,
    and more recently by the emergence of large-scale computing infrastructures capable
    of training such networks on internet-scale datasets.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能的最近进展——从能够进行连贯对话的系统到生成逼真视频序列的系统——主要归功于人工神经网络（ANNs）。这些成就得益于过去十五年中算法突破和架构创新的发展，以及最近出现的能够在大规模数据集上训练此类网络的大规模计算基础设施。
- en: The main strength of this approach to machine learning, commonly referred to
    as *deep learning*, lies in its ability to automatically learn representations
    of complex data types—such as images or text—without relying on handcrafted features
    or domain-specific modeling. In doing so, deep learning has significantly extended
    the reach of traditional statistical methods, which were originally designed to
    analyze **structured data organized in tables**, such as those found in spreadsheets
    or relational databases.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 这种机器学习方法的主要优势，通常被称为**深度学习**，在于其能够自动学习复杂数据类型（如图像或文本）的表示，而不依赖于手工制作的特征或特定领域的建模。在这个过程中，深度学习显著扩展了传统统计方法的应用范围，这些方法最初是为了分析**以表格形式组织的数据**而设计的，例如在电子表格或关系数据库中找到的数据。
- en: '![](../Images/fed5667fb25982184cc959ff14cf53ac.png)'
  id: totrans-5
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/fed5667fb25982184cc959ff14cf53ac.png)'
- en: 'Figure 1 : Until recently, neural networks were poorly suited to tabular data.
    [Image by author]'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 图1：直到最近，神经网络在处理表格数据方面并不适合。[图片由作者提供]
- en: Given, on the one hand, the remarkable effectiveness of deep learning on complex
    data, and on the other, the **immense economic value of tabular data**—which still
    represents the core of the informational assets of many organizations—it is only
    natural to ask whether deep learning techniques can be successfully applied to
    such structured data. After all, if a model can tackle the hardest problems, why
    wouldn’t it excel at the easier ones?
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 一方面，深度学习在处理复杂数据上的显著有效性，另一方面，表格数据——它仍然代表了许多组织的信息资产的核心——的巨大经济价值，自然地引发了一个问题：深度学习技术是否可以成功地应用于此类结构化数据。毕竟，如果一个模型可以解决最困难的问题，为什么它不能在更容易的问题上表现出色呢？
- en: Paradoxically, deep learning has long struggled with tabular data [8]. To understand
    why, it is useful to recall that its success hinges on the ability to uncover
    grammatical, semantic, or visual patterns from massive volumes of data. Put simply,
    the meaning of a word emerges from the consistency of the linguistic contexts
    in which it appears; likewise, a visual feature becomes recognizable through its
    recurrence across many images. In both cases, it is the internal structure and
    coherence of the data that enable deep learning models to generalize and **transfer
    knowledge** across different samples—texts or images—that share underlying regularities.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 悖论的是，深度学习长期以来一直难以处理表格数据 [8]。为了理解原因，回顾其成功依赖于从大量数据中揭示语法、语义或视觉模式是有用的。简单来说，一个词的意义来自于它在语言环境中的连贯性；同样，一个视觉特征通过在其许多图像中的重复而变得可识别。在这两种情况下，数据的内部结构和连贯性使得深度学习模型能够在具有潜在规律性的不同样本——文本或图像——之间进行泛化和**知识迁移**。
- en: The situation is fundamentally different when it comes to tabular data, where
    each row typically corresponds to an observation involving multiple variables.
    Think, for example, of predicting a person’s weight based on their height, age,
    and gender, or estimating a household’s electricity consumption (in kWh) based
    on floor area, insulation quality, and outdoor temperature. A key point is that
    the value of a cell is only meaningful within the specific context of the table
    it belongs to. The same number might represent a person’s weight (in kilograms)
    in one dataset, and the floor area (in square meters) of a studio apartment in
    another. Under such conditions, it is hard to see how a predictive model could
    transfer knowledge from one table to another—the semantics are entirely dependent
    on context.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 当涉及到表格数据时，情况根本不同，其中每一行通常对应一个涉及多个变量的观察结果。例如，考虑根据一个人的身高、年龄和性别预测其体重，或者根据地板面积、隔热质量和室外温度估计家庭的电力消耗（以千瓦时计）。一个关键点是，单元格的值只有在它所属的特定表格的上下文中才有意义。同一个数字可能在一个数据集中代表一个人的体重（以千克计），而在另一个数据集中代表一个一室公寓的地板面积（以平方米计）。在这种情况下，很难想象一个预测模型如何能够从一个表格转移到另一个表格——语义完全依赖于上下文。
- en: Tabular structures are thus **highly heterogeneous**, and in practice there
    exists an infinite variety of them to capture the diversity of real-world phenomena—ranging
    from financial transactions to galaxy structures or income disparities within
    urban areas.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，表格结构是**高度异构的**，在实践中存在无限多样的表格来捕捉现实世界现象的多样性——从金融交易到星系结构或城市地区的收入差异。
- en: 'This diversity comes at a cost: each tabular dataset typically requires its
    own dedicated predictive model, which cannot be reused elsewhere.'
  id: totrans-11
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这种多样性是有代价的：每个表格数据集通常都需要其自己的专用预测模型，这些模型在其他地方无法重用。
- en: To handle such data, data scientists most often rely on a class of models based
    on [decision trees](https://fr.wikipedia.org/wiki/Arbre_de_d%C3%A9cision) [7].
    Their precise mechanics need not concern us here; what matters is that they are
    remarkably fast at inference, often producing predictions in under a millisecond.
    Unfortunately, like all classical machine learning algorithms, they must be retrained
    from scratch for each new table—a process that can take hours. Additional drawbacks
    include unreliable uncertainty estimation, limited interpretability, and poor
    integration with unstructured data—precisely the kind of data where neural networks
    shine.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 为了处理这类数据，数据科学家通常依赖于基于[决策树](https://fr.wikipedia.org/wiki/Arbre_de_d%C3%A9cision)
    [7]的一类模型。它们的精确机制在这里并不重要；重要的是，它们在推理方面非常快，通常在不到一毫秒内就能产生预测。不幸的是，像所有经典的机器学习算法一样，它们必须为每个新的表格从头开始重新训练——这个过程可能需要数小时。其他缺点包括不可靠的不确定性估计、有限的解释性和与无结构数据的较差集成——这正是神经网络发光的地方。
- en: 'The idea of building **universal predictive models**—similar to large language
    models (LLMs)—is clearly appealing: once pretrained, such models could be applied
    directly to any tabular dataset, without additional training or fine-tuning. Framed
    this way, the idea may seem ambitious, if not entirely unrealistic. And yet, this
    is precisely what ***Tabular Foundation Models***(TFMs), developed by several
    research groups over the past year [2–4], have begun to achieve—with surprising
    success.'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 构建类似于大型语言模型（LLMs）的**通用预测模型**的想法显然很有吸引力：一旦预训练，这些模型就可以直接应用于任何表格数据集，而无需额外的训练或微调。这样来看，这个想法可能看起来雄心勃勃，如果不是完全不切实际的话。然而，这正是过去一年中由几个研究小组开发的**表格基础模型**（TFMs）所开始实现的事情——而且取得了令人惊讶的成功。
- en: The sections that follow highlight some of the key innovations behind these
    models and compare them to existing techniques. More importantly, they aim to
    spark curiosity about a development that could soon reshape the landscape of data
    science.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 下文将突出展示这些模型背后的关键创新，并将它们与现有技术进行比较。更重要的是，它们旨在激发对一种可能很快重塑数据科学领域格局的发展的好奇心。
- en: What We’ve Learned from LLMs
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我们从大型语言模型（LLMs）中学到了什么
- en: To put it simply, a large language model (LLM) is a machine learning model trained
    to predict the next word in a sequence of text. One of the most striking features
    of these systems is that, once trained on massive text corpora, they exhibit the
    ability to perform a wide range of linguistic and reasoning tasks—even those they
    were never explicitly trained for. A particularly compelling example of this capability
    is their success at solving problems relying solely on a short list of input–output
    pairs provided in the prompt. For instance, to perform a translation task, it
    often suffices to supply a few translation examples.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，大型语言模型（LLM）是一种机器学习模型，经过训练以预测文本序列中的下一个单词。这些系统最引人注目的特征之一是，一旦在大量文本语料库上训练，它们就能执行广泛的言语和推理任务——甚至包括它们从未明确训练过的任务。这种能力的一个特别令人信服的例子是，它们在仅依靠提示中提供的简短输入-输出对来解决问题时的成功。例如，为了执行翻译任务，通常只需要提供几个翻译示例。
- en: '![](../Images/72afd0627547ac7f2e1db0a6a67c3b0a.png)'
  id: totrans-17
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/72afd0627547ac7f2e1db0a6a67c3b0a.png)'
- en: This behavior is known as ***in-context learning*** (ICL). In this setting,
    learning and prediction occur on the fly, without any additional parameter updates
    or fine-tuning. This phenomenon—initially unexpected and almost miraculous in
    nature—is central to the success of generative AI. Recently, several research
    groups have proposed adapting the ICL mechanism to build ***Tabular Foundation
    Models*** (TFMs), designed to play for tabular data a role analogous to that of
    LLMs for text.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 这种行为被称为**上下文学习**（ICL）。在这种设置中，学习和预测是即时发生的，无需任何额外的参数更新或微调。这种现象——最初出乎意料，本质上几乎是奇迹般的——是生成式AI成功的关键。最近，几个研究小组提出了将ICL机制适应到构建**表格基础模型**（TFM）中，这些模型旨在为表格数据扮演类似于LLM对文本所扮演的角色。
- en: Conceptually, the construction of a TFM remains relatively straightforward.
    The first step involves generating a *very* large collection of **synthetic tabular
    datasets** with diverse structures and varying sizes—both in terms of rows (observations)
    and columns (features or covariates). In the second step, a single model—the foundation
    model proper—is trained to predict one column from all others within each table.
    In this framework, the table itself serves as a predictive context, analogous
    to the prompt examples used by an LLM in ICL mode.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 从概念上讲，构建一个TFM（表格基础模型）的过程相对简单明了。第一步包括生成一个**非常**大的**合成表格数据集**集合，这些数据集具有不同的结构和大小——无论是从行（观测）还是从列（特征或协变量）来看。第二步，训练一个单一模型——即基础模型本身——用于从每个表格中的所有其他列预测某一列。在这个框架中，表格本身充当预测上下文，类似于在ICL（内联学习）模式下LLM（大型语言模型）使用的提示示例。
- en: The use of synthetic data offers several advantages. First, it avoids the legal
    risks associated with copyright infringement or privacy violations that currently
    complicate the training of LLMs. Second, it allows **prior knowledge**—an inductive
    bias—to be explicitly injected into the training corpus. A particularly effective
    strategy involves generating tabular data using **causal models**. Without delving
    into technical details, these models aim to simulate the underlying mechanisms
    that could plausibly give rise to the wide variety of data observed in the real
    world—whether physical, economic, or otherwise. In recent TFMs such as TabPFN-v2
    and TabICL [3,4], tens of millions of synthetic tables have been generated in
    this way, each derived from a distinct causal model. These models are sampled
    randomly, but with a preference for simplicity, following *Occam’s Razor*—the
    principle that among competing explanations, the simplest one consistent with
    the data should be favored.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 使用合成数据提供了几个优点。首先，它避免了与版权侵权或隐私侵犯相关的法律风险，这些风险目前使LLM的训练复杂化。其次，它允许**先验知识**——归纳偏差——被明确地注入到训练语料库中。一种特别有效的策略是使用**因果模型**生成表格数据。不深入技术细节，这些模型旨在模拟可能产生现实世界中观察到的各种数据（无论是物理的、经济的还是其他方面的）的潜在机制。在最近的TFM，如TabPFN-v2和TabICL
    [3,4]中，已经以这种方式生成了数千万个合成表格，每个表格都源自一个独特的因果模型。这些模型随机采样，但遵循**奥卡姆剃刀**原则——在竞争性解释中，与数据一致的最简单解释应被优先考虑。
- en: TFMs are all implemented using neural networks. While their architectural details
    vary from one implementation to another, they all incorporate one or more Transformer-based
    modules. This design choice can be explained, in broad terms, by the fact that
    Transformers rely on a mechanism known as *attention*, which enables the model
    to contextualize each piece of information. Just as attention allows a word to
    be interpreted considering its surrounding text, a suitably designed attention
    mechanism can contextualize the value of a cell within a table. Readers interested
    in exploring this topic—which is both technically rich and conceptually fascinating—are
    encouraged to consult references [2–4].
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: Figures 2 and 3 compare the training and inference workflows of traditional
    models with those of TFMs. Classical models such as XGBoost [7] must be retrained
    from scratch for each new table. They learn to predict a target variable *y* = *f*(**x**) from
    input features **x**, with training typically taking several hours, though inference
    is nearly instantaneous.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: 'TFMs, by contrast, require a more expensive initial *pretraining* phase—on
    the order of a few dozen GPU-days. This cost is generally borne by the model provider
    but remains within reach for many organizations, unlike the prohibitive scale
    often associated with LLMs. Once pretrained, TFMs unify ICL-style learning and
    inference into a single pass: the table *D* on which predictions are to be made
    serves directly as context for the test inputs **x**. The TFM then predicts targets
    via a mapping *y* = *f*(**x**; *D*), where the table *D* plays a role analogous
    to the list of examples provided in an LLM prompt.'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/396d3a1a0af3c3c4fcccc026fda2e341.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
- en: 'Figure 2 : Training a conventional machine learning model and making predictions
    on a table. [Image by author]'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/3ae6d6dbe788995d2eac9edbc480f758.png)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
- en: 'Figure 3 : Training a tabular foundation model and performing universal predictions.
    [Image by author]'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
- en: To summarize the discussion in a single sentence
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
- en: TFMs are designed to learn a predictive model on-the-fly for tabular data, without
    requiring any training.
  id: totrans-29
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Blazing Performance
  id: totrans-30
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Key Figures
  id: totrans-31
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The table below provides indicative figures for several key aspects: the pretraining
    cost of a TFM, ICL-style adaptation time on a new table, inference latency, and
    the maximum supported table sizes for three predictive models. These include **TabPFN-v2**,
    a TFM developed at PriorLabs by Frank Hutter’s team; **TabICL**, a TFM developed
    at INRIA by Gaël Varoquaux’s group[^([1])](applewebdata://F2F4A269-5BE5-461B-89F9-8807253ABD76#_ftn1);
    and **XGBoost**, a classical algorithm widely regarded as one of the strongest
    performers on tabular data.'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/6058d730f4831eeb5f77f13890775386.png)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
- en: 'Figure 4 : A performance comparison between two TFMs and a classical algorithm,
    [image by author]'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
- en: These figures should be interpreted as rough estimates, and they are likely
    to evolve quickly as implementations continue to improve. For a detailed analysis,
    readers are encouraged to consult the original publications [2–4].
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 这些图应被视为粗略估计，并且随着实现持续改进，它们很可能会迅速演变。为了进行详细分析，建议读者查阅原始出版物 [2–4]。
- en: Beyond these quantitative aspects, TFMs offer several additional advantages
    over conventional approaches. The most notable are outlined below.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 除了这些定量方面之外，TFMs 相比传统方法还有几个额外的优势。下面概述了最显著的一些。
- en: TFMs Are Well-Calibrated
  id: totrans-37
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: TFMs 校准良好。
- en: A well-known limitation of classical models is their poor **calibration**—that
    is, the probabilities they assign to their predictions often fail to reflect the
    true empirical frequencies. In contrast, TFMs are well-calibrated *by design*,
    for reasons that are beyond the scope of this overview but that stem from their
    implicitly Bayesian nature [1].
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 经典模型的一个众所周知局限性是它们的校准不佳——也就是说，它们分配给预测的概率往往无法反映真实的经验频率。相比之下，TFMs 由于其隐含的贝叶斯性质 [1]，设计上校准良好，原因超出了本概述的范围。
- en: '![](../Images/34cdcb4e4b941b23f5eaf8425b34fafa.png)'
  id: totrans-39
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/34cdcb4e4b941b23f5eaf8425b34fafa.png)'
- en: 'Figure 5  : Calibration comparison across predictive models. Darker shades
    indicate higher confidence levels. TabPFN clearly produces the most reasonable
    confidence estimates. [Image adapted from [[2]](https://arxiv.org/abs/2207.01848),
    licensed under CC BY 4.0].'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5：预测模型之间的校准比较。较深的阴影表示更高的置信水平。TabPFN 明显产生了最合理的置信估计。[图片改编自 [[2]](https://arxiv.org/abs/2207.01848)，许可协议下
    CC BY 4.0]。
- en: Figure 5 compares the confidence levels predicted by TFMs with those produced
    by classical models such as logistic regression and decision trees. The latter
    tend to assign overly confident predictions in regions where no data is observed
    and often exhibit linear artifacts that bear no relation to the underlying distribution.
    In contrast, the predictions from TabPFN appear to be significantly better calibrated.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5 比较了 TFMs 预测的置信水平与经典模型（如逻辑回归和决策树）产生的置信水平。后者往往在无数据观察到的区域分配过度的置信预测，并且经常表现出与潜在分布无关的线性伪影。相比之下，TabPFN
    的预测似乎校准得更好。
- en: TFMs Are Robust
  id: totrans-42
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: TFMs 鲁棒性强。
- en: The synthetic data used to pretrain TFMs—millions of causal structures—can be
    carefully designed to make the models highly robust to **outliers**, **missing
    values**, or **non-informative features**. By exposing the model to such scenarios
    during training, it learns to recognize and handle them appropriately, as illustrated
    in Figure 6.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 用于预训练 TFMs 的合成数据——数百万个因果结构——可以精心设计，使模型对 **异常值**、**缺失值** 或 **非信息性特征** 非常鲁棒。通过在训练期间让模型接触这些场景，它学会识别并适当处理它们，如图
    6 所示。
- en: '![](../Images/c669081f6f86a8eb3a250df4880d9a18.png)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/c669081f6f86a8eb3a250df4880d9a18.png)'
- en: 'Figure 6 : Robustness of TFMs to missing data, non-informative features, and
    outliers. [Image adapted from [3], licensed under CC BY 4.0]'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6：TFMs 对缺失数据、非信息性特征和异常值的鲁棒性。[图片改编自 [3]，许可协议下 CC BY 4.0]。
- en: TFMs Require Minimal Hyperparameter Tuning
  id: totrans-46
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: TFMs 需要的最小超参数调整。
- en: One final advantage of TFMs is that they require very little hyperparameter
    tuning. In fact, they often outperform heavily optimized classical algorithms *even
    when used with default settings*, as illustrated in Figure 7.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: TFMs 的最后一个优势是它们需要的超参数调整非常少。实际上，它们即使在默认设置下使用时，也往往优于经过大量优化的经典算法 *甚至当使用默认设置时*，如图
    7 所示。
- en: '![](../Images/be50147ccee435e632e2e94697d2c02c.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/be50147ccee435e632e2e94697d2c02c.png)'
- en: Figure 7 : Comparative performance of a TFM versus other algorithms, both in
    default and fine-tuned settings. [image adapted from [3], licensed under CC BY
    4.0]
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 图 7：TFM 与其他算法在默认和微调设置下的比较性能。[图片改编自 [3]，许可协议下 CC BY 4.0]。
- en: To conclude, it is worth noting that ongoing research on TFMs suggests they
    also hold promise for improved **explainability** [3], **fairness in prediction** [5],
    and **causal inference** [6].
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，值得注意的是，关于 TFMs 的持续研究表明，它们在提高 **可解释性** [3]、**预测公平性** [5] 和 **因果推断** [6] 方面也很有希望。
- en: Every R&D Team Has Its Own Secret Sauce!
  id: totrans-51
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 每个研发团队都有自己的秘密配方！
- en: There is growing consensus that TFMs promise not just incremental improvements,
    but a fundamental shift in the tools and methods of data science. As far as one
    can tell, the field may gradually shift away from a model-centric paradigm—focused
    on designing and optimizing predictive models—toward a more *data-centric* approach.
    In this new setting, the role of a data scientist in industry will no longer be
    to build a predictive model from scratch, but rather to assemble a representative
    dataset that conditions a pretrained TFM.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 越来越多的人认为，TFM不仅带来了增量改进，而且在数据科学的工具和方法上带来了一场根本性的转变。据观察，该领域可能会逐渐从以模型为中心的范式——专注于设计和优化预测模型——转向一种更*以数据为中心*的方法。在这种新的环境中，数据科学家在工业界的角色将不再是从头开始构建预测模型，而是组装一个能够对预训练TFM进行条件化的代表性数据集。
- en: '![](../Images/0496472282d5cac1b12fee6b60555bee.png)'
  id: totrans-53
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/0496472282d5cac1b12fee6b60555bee.png)'
- en: 'Figure 8 : A fierce competition is underway between public and private labs
    to develop high-performing TFMs. [Image by author]'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 图8：公共和私营实验室正在展开一场激烈的竞争，以开发高性能的TFM。[图片由作者提供]
- en: It is also conceivable that new methods for exploratory data analysis will emerge,
    enabled by the speed at which TFMs can now build predictive models on novel datasets
    and by their applicability to time series data [9].
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 也可以设想，新的数据探索方法可能会出现，这得益于TFM现在在新型数据集上构建预测模型的速度，以及它们在时间序列数据中的应用[9]。
- en: These prospects have not gone unnoticed by startups and academic labs alike,
    which are now competing to develop increasingly powerful TFMs. The two key ingredients
    in this race—the more or less “secret sauce” behind each approach—are, on the
    one hand, the strategy used to generate synthetic data, and on the other, the
    neural network architecture that implements the TFM.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 这些前景并没有被初创公司和学术实验室忽视，它们现在正竞争开发越来越强大的TFM。这场竞赛的两个关键要素——每种方法背后或多或少是“秘密配方”——一方面是用于生成合成数据的方法，另一方面是实现TFM的神经网络架构。
- en: 'Here are two entry points for discovering and exploring these new tools:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有两个发现和探索这些新工具的入口点：
- en: '**TabPFN (Prior Labs)**'
  id: totrans-58
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**TabPFN (Prior Labs)**'
- en: A local Python library: **tabpfn** provides scikit-learn–compatible classes
    (fit/predict). **Open access** under an Apache 2.0–style license with attribution
    requirement.
  id: totrans-59
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 一个本地的Python库：**tabpfn**提供与scikit-learn兼容的类（fit/predict）。**开放访问**，遵循Apache 2.0风格许可，并要求署名。
- en: '**TabICL (Inria Soda)**'
  id: totrans-60
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**TabICL (Inria Soda)**'
- en: A local Python library: **tabicl** (pretrained on synthetic tabular datasets;
    supports classification and ICL). **Open access** under a BSD-3-Clause license.
  id: totrans-61
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 一个本地的Python库：**tabicl**（在合成的表格数据集上预训练；支持分类和ICL）。**开放访问**，遵循BSD-3-Clause许可。
- en: Happy exploring!
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 开心探索！
