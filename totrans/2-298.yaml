  type: TYPE_NORMAL
  zh: '**维度和指标**'
- en: '**Explore Core Reports of GA4**'
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**探索 GA4 的核心报告**'
- en: '**Explore Data API**'
  id: totrans-11
  prefs:
