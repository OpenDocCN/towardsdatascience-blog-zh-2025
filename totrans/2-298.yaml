- en: A Practical Introduction to Google Analytics
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/a-practical-introduction-to-google-analytics/](https://towardsdatascience.com/a-practical-introduction-to-google-analytics/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1748537283368" class="mdspan-comment">In my recent project</mdspan>,
    I had the opportunity to work with Google Analytics, a powerful platform for tracking
    and understanding user behaviour across an e-commerce website that sells clothing.
  prefs: []
  type: TYPE_NORMAL
- en: 'My task was to build a data pipeline that exports GA4 data to BigQuery, a Google
    Cloud data warehouse. However, I quickly ran into a common issue: many of the
    available guides were outdated or inconsistent, which made the process more time-consuming
    than expected.'
  prefs: []
  type: TYPE_NORMAL
- en: In this article, I’ll walk you through a clear and up-to-date overview of Google
    Analytics, explain its key concepts, highlight the most important reports, and
    show you a working example of how to export GA4 data using the **Google Analytics
    Data API with Python.**
  prefs: []
  type: TYPE_NORMAL
- en: Curious to see what GA4 can do for you? Let’s dive in!
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '**Table of Contents:**'
  prefs: []
  type: TYPE_NORMAL
- en: '**Life Cycle of Google Analytics**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Dimensions and Metrics**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Explore Core Reports of GA4**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Explore Data API**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Life Cycle of Google Analytics
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![](../Images/659326a7ae6b148edb084a1144f869ab.png)'
  prefs: []
  type: TYPE_IMG
- en: Illustration by Author. Three phases of Google Analytics
  prefs: []
  type: TYPE_NORMAL
- en: Google Analytics allows to understand the different stages of the customer journey,
    offering valuable insights at each step.
  prefs: []
  type: TYPE_NORMAL
- en: It begins with the **Acquisition**, where you attract users and spark user interest
    in your business. This stage focuses on channels and strategies that bring the
    customer to your website or app.
  prefs: []
  type: TYPE_NORMAL
- en: Next is **Engagement**, which looks at how users interact with your content
    or products. For example, they might browse pages, watch videos, or add items
    to their shopping cart.
  prefs: []
  type: TYPE_NORMAL
- en: Then comes **Monetization** and **Retention**, which are part of the most critical
    phase. Monetization phase allows to understand where users make purchases, turning
    them into customers, whereas Retention measures how often users return, helping
    to assess long-term satisfaction and loyalty.
  prefs: []
  type: TYPE_NORMAL
- en: By analyzing each stage of the journey, it’s possible to identify what’s working,
    uncover areas for improvement and make smarter and data-driven decisions to boost
    the brand’s performance.
  prefs: []
  type: TYPE_NORMAL
- en: Dimensions and metrics
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Before going further, it’s important to understand a fundamental concept in
    Google Analytics: every report is built using dimensions and metrics. Understanding
    how dimensions and metrics work together is essential for interpreting reports
    and turning data into meaningful information.'
  prefs: []
  type: TYPE_NORMAL
- en: Dimensions
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Dimensions are qualitative attributes that group your data. The core dimensions
    are:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Campaign** is a paid promotion or marketing campaign'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Source** is where the user came from. For instance, it can be from a website
    or a social network like Instagram and Facebook.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Medium** is the general category of the traffic source, such as organic,
    CPC and referral.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Channel** is a rule-based group of traffic sources, mediums, or other rules
    to separate traffic. Examples of channels are Organic Search, Paid Search and
    Social.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Metrics
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'On the other hand, metrics contain quantitative values. The most important
    metrics are:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Active users** are people who engage with the site or app'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**New users** are people who visit the site or app for the first time'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Returning users** are people who have visited previously'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Sessions** are groups of user interactions within a given time frame'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Engaged Sessions** are sessions lasting at least 10 seconds'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Event** is any tracked user action, like clicking, scrolling and visiting
    for the first time'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Key event** is a significant action that contributes to business goals, such
    as a purchase or a sign-up'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Total revenue** is the income from purchases, subscriptions, and advertising'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Start to play with Google Analytics
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![](../Images/967eefc08038b79aa63fd6be040d96e3.png)'
  prefs: []
  type: TYPE_IMG
- en: Screenshot by Author. An Overview of Google Merchandise Store.
  prefs: []
  type: TYPE_NORMAL
- en: Once you are familiar with the key concepts of Google Analytics, it’s time to
    put them into practice on the platform itself. A great starting point is [Google’s
    introduction course to Google Analytics](https://skillshop.docebosaas.com/learn/courses/8108/get-started-using-google-analytics/lessons/24354:8107/welcome-to-the-course-html-page),
    which provides access to a free demo account. This account allows you to explore
    real-world data and experiment with the platform’s features.
  prefs: []
  type: TYPE_NORMAL
- en: In this tutorial, we’ll use Google Analytics to explore and analyse the data
    from the **Google Merchandise Store**, an online store that sells Google-branded
    products. It’s a perfect sandbox for learning how to track user behaviour, monitor
    performance, and gain actionable insights. You can access the Google Analytics
    demo account using this [link](https://analytics.google.com/analytics/web/?utm_source=demoaccount&utm_medium=demoaccount&utm_campaign=demoaccount#/p213025502/).
    You should see a page like the screenshot below.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/12f764f6fa3f70b352d88e0e02f86576.png)'
  prefs: []
  type: TYPE_IMG
- en: Screenshot by Author. Home page of Google Analytics.
  prefs: []
  type: TYPE_NORMAL
- en: 'These are pages that are going to be explored:'
  prefs: []
  type: TYPE_NORMAL
- en: '**General overview**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Acquisition overview**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Engagement overview**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Monetisation overview**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Retention overview**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: General Overview
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '![](../Images/b572d4781ee8371196075d4385c46725.png)'
  prefs: []
  type: TYPE_IMG
- en: GIF by Author. Realtime Overview.
  prefs: []
  type: TYPE_NORMAL
- en: The first page you’ll see is the home page, which provides a high-level summary
    of user behaviour on the Google Merchandise Store. It highlights key performance
    indicators, such as Active users, Key events, Total event count and Purchases.
    These metrics offer a quick overview of how users are engaging with the website
    or app and how well it’s performing.
  prefs: []
  type: TYPE_NORMAL
- en: To view the metrics in real-time, click the Reports button and select Real-time
    overview. This feature gives a live snapshot of current user activity, making
    it easy to monitor what’s happening on the website as it occurs.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/6afb06a99d0593ebc4586d79d7e9cc84.png)'
  prefs: []
  type: TYPE_IMG
- en: Screenshot by Author. Realtime Overview.
  prefs: []
  type: TYPE_NORMAL
- en: 'At the top of the Real-time Overview report, you’ll find key performance indicators,
    including the number of active users in the last 5 and 30 minutes. Below, a series
    of tables provide a detailed breakdown of user activity, showing:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Where users are coming from**. It can be measured by metrics like source,
    medium and channel.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Demographic and geographic data can help to understand **who the users are**.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**What content they are viewing**. Examples of content are page titles and
    screen names.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**What actions they are taking**.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Which key events they complete**.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Acquisition Overview
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '![](../Images/e3db69ee105c9a13cd1acca9770bc728.png)'
  prefs: []
  type: TYPE_IMG
- en: Screenshot by Author. Acquisition Overview.
  prefs: []
  type: TYPE_NORMAL
- en: The acquisition report is a valuable tool for understanding where users and
    traffic are coming from. At the top, you’ll find KPIs like Active users and New
    users, giving a snapshot of user activity. Just below the KPIs, different tables
    provide specific details of how users are arriving at the website.
  prefs: []
  type: TYPE_NORMAL
- en: Within the overview section, there are two detailed reports. The first report
    is the user acquisition report, which focuses on campaign source and medium that
    we see from that user. Next is the traffic acquisition report, which concerns
    session source, session medium and session campaign.
  prefs: []
  type: TYPE_NORMAL
- en: Engagement Overview
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '![](../Images/d8c49c6b0d3659fffe6ff40a59532ea8.png)'
  prefs: []
  type: TYPE_IMG
- en: Screenshot by Author. Engagement Overview.
  prefs: []
  type: TYPE_NORMAL
- en: While the acquisition report answers the question *“Where are Users and traffic
    coming from?”*, the engagement report helps to understand *how users are interacting
    with the site or app*.
  prefs: []
  type: TYPE_NORMAL
- en: Key Performance Indicators in this report include the average engagement time
    per active user, the average engaged session count per active user, the number
    of page views (for website) or screen views (for app), and the count of events.
  prefs: []
  type: TYPE_NORMAL
- en: Below KPIs, two main tables provide high-level details of user activity. The
    table grouping data by event name shows what users are doing on the website or
    app. Common events are viewing a web page, beginning a session or seeing a promotion
    banner or offer. The other table segments the data by page title and screen class
    allowing us to understand which pages people are staying on the longest or the
    most viewed pages.
  prefs: []
  type: TYPE_NORMAL
- en: Monetization Overview
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '![](../Images/5c728d73c9daf5f1fb2afedb7c89779b.png)'
  prefs: []
  type: TYPE_IMG
- en: Screenshot by Author. Monetization Overview.
  prefs: []
  type: TYPE_NORMAL
- en: Now, we have the Monetization overview which presents high-level metrics to
    quantify revenue. These include total revenue, total revenue from purchases and
    the total revenue from advertising.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/76549ad8599083ab2d398565e0ee1a46.png)'
  prefs: []
  type: TYPE_IMG
- en: Screenshot by Author. E-commerce purchases report.
  prefs: []
  type: TYPE_NORMAL
- en: To dive deeper into sales performance, you can explore the e-commerce purchase
    report. This report contains a table broken down by item name, allowing us to
    see which products are the most profitable, viewed, added to the cart or purchased.
  prefs: []
  type: TYPE_NORMAL
- en: From the table, the Super G Quilt Socks stand out as the most performing items
    with the highest revenue.
  prefs: []
  type: TYPE_NORMAL
- en: Retention Overview
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '![](../Images/57bfde445b7e10b46d997a155b3bfff8.png)'
  prefs: []
  type: TYPE_IMG
- en: Screenshot by Author. Retention Overview.
  prefs: []
  type: TYPE_NORMAL
- en: Finally, there is the retention overview report that gives an idea of how well
    the website or app retains users over time. Key performance indicators include
    the total number of new users and the total number of returning users.
  prefs: []
  type: TYPE_NORMAL
- en: One of the most useful features of this report is the **User Retention** visualisation
    that shows how frequently users return after their initial visit. For instance,
    it answers questions like *“How many users who first visited on a specific date
    (date 0) came back in the following days?”.*
  prefs: []
  type: TYPE_NORMAL
- en: This report is essential for evaluating user loyalty and long-term engagement,
    helping to identify trends and improve strategies to keep users coming back.
  prefs: []
  type: TYPE_NORMAL
- en: Explore Data API
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now that we understand how the reports are structured, let’s take a step further
    and see how to export data using the Google Analytics Data API.
  prefs: []
  type: TYPE_NORMAL
- en: Set up Data API
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Before writing any code, we need to complete a few setup in **Google Cloud
    Console**:'
  prefs: []
  type: TYPE_NORMAL
- en: Create a new project or select an already existing one
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Enable the “Google Analytics Reporting API” for your project
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Create a service account, generate the credentials and download the JSON file.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For deeper details, I recommend this [YouTube video](https://medium.com/r?url=https%3A%2F%2Fwww.youtube.com%2Fwatch%3Fv%3DoRUpAqYqROQ),
    which helped me a lot with Google Cloud Console setup.
  prefs: []
  type: TYPE_NORMAL
- en: After we must find the **property ID**, which is needed in the code later. This
    time we need to visit [Google Analytics](https://analytics.google.com/), press
    Admin from the menu and select Property Details. Just copy and paste the property
    ID in your code.
  prefs: []
  type: TYPE_NORMAL
- en: 'The last step consists of installing the necessary Python libraries:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Export report Data using Data API
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Once the setup is complete, we can use the Google Analytics Data API to download
    the report data with Python. Let’s say we want to export a report showing active
    users and new users, broken down by date. In this case:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Metrics: `activeUsers`, `newUsers`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Dimensions: `date`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: To find the correct field names for dimensions and metrics used by Data API,
    refer to the [official GA4 API reference](https://developers.google.com/analytics/devguides/reporting/data/v1/api-schema).
    It includes comprehensive tables for each.
  prefs: []
  type: TYPE_NORMAL
- en: Now, it’s time to show an example of code to export the data. First, we instantiate
    the analytics data client. Then, we define the report request with the dimensions,
    metrics and date range. Finally, we can execute the report request.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 'To convert the API response into a pandas Dataframe, we need some other lines
    of code:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: That’s great! We have successfully retrieved the report data from Google Analytics
    using the Data API.
  prefs: []
  type: TYPE_NORMAL
- en: 'Final thoughts:'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This was an overview of Google Analytics, its core reports and Data API. With
    these tools, you can gain a deeper understanding of where users are coming from,
    how they engage with your content, which products are performing well and how
    effectively your site is retaining visitors over time.
  prefs: []
  type: TYPE_NORMAL
- en: However, it’s worth noticing a few limitations of the Data API. There may be
    discrepancies between the API and the GA4 User Interface due to data processing
    delays. Google Analytics interface can update even previous day’s data after a
    short lag. Moreover, Google Analytics sometimes applies data sampling, especially
    on large datasets, which may lead to mismatches when comparing results with the
    raw API output.
  prefs: []
  type: TYPE_NORMAL
- en: Despite the challenges, getting started with Google Analytics is a valuable
    step toward making data-informed decisions. I hope this tutorial offered a clear
    and practical starting point to begin with confidence. Thanks for reading! Have
    a nice day!
  prefs: []
  type: TYPE_NORMAL
