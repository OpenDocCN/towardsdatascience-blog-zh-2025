- en: Why Your Prompts Don’t Belong in Git
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/why-your-prompts-dont-belong-in-git/](https://towardsdatascience.com/why-your-prompts-dont-belong-in-git/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1756156485455" class="mdspan-comment">This is my very first</mdspan>
    post after a while, and I want to start with something that bit me early on.
  prefs: []
  type: TYPE_NORMAL
- en: When I was building and shipping my first **Generative AI** product, I did what
    most of us do. I hard-coded the prompts. It worked until it didn’t. Every time
    I wanted to tweak the tone, improve the wording, or fix a hallucination, it meant
    pushing code and re-deploying the service.
  prefs: []
  type: TYPE_NORMAL
- en: This made fast iteration nearly impossible and left product folks completely
    out of the loop. Eventually I realised that prompts should be treated like content,
    not code.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: What Breaks When Prompts Live in the Code
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: At first it feels like just another string in your backend. But prompts are
    not static config. They are behaviour and behaviour needs room to evolve.
  prefs: []
  type: TYPE_NORMAL
- en: The moment your prompts are shipped with your code, every small change becomes
    a process. You need to create a branch.
  prefs: []
  type: TYPE_NORMAL
- en: Make a commit. Open a pull request. Wait for CI pipelines to run. Merge. Then
    redeploy. All this friction for what might be a one-word change in how your assistant
    talks to users.
  prefs: []
  type: TYPE_NORMAL
- en: You lose the ability to iterate quickly. You block product folks or non-engineers
    from contributing. And worst of all, your prompts end up inheriting all the friction
    of your backend deployment process.
  prefs: []
  type: TYPE_NORMAL
- en: It also becomes nearly impossible to understand what changed and why. Git might
    show you the diff, but not the outcome.
  prefs: []
  type: TYPE_NORMAL
- en: '***Did that change to reduce hallucinations?***'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '***Did it make completions shorter?***'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '***Are users happier?***'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Without tracking and experimentation, you’re guessing. You wouldn’t hard-code
    customer support replies in your source code or your marketing copy. Prompts deserve
    the same level of flexibility.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: What Prompt Management Actually Looks Like
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Prompt management is not some fancy new practice.
  prefs: []
  type: TYPE_NORMAL
- en: It is just applying the same principles we already use for other dynamic parts
    of the product, like CMS content, feature flags, or translations.
  prefs: []
  type: TYPE_NORMAL
- en: A good prompt management setup gives you a place outside of your codebase where
    prompts can live, evolve, and be tracked over time.
  prefs: []
  type: TYPE_NORMAL
- en: It does not have to be complex. You just need a simple way to store, version,
    and update prompts without touching your application code.
  prefs: []
  type: TYPE_NORMAL
- en: Once you decouple prompts from the code, everything gets easier. You can update
    a prompt without redeploying. You can roll back to a previous version if something
    breaks.
  prefs: []
  type: TYPE_NORMAL
- en: You can let non-engineers make changes safely, and you can start connecting
    prompt versions to outcomes, so you can actually learn what works and what does
    not.
  prefs: []
  type: TYPE_NORMAL
- en: Some tools offer built-in versioning and prompt analytics. Others plug into
    your existing stack. The important thing is *not* what tool you use, but that
    you stop treating prompts as static strings buried in code.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Using Langfuse For Prompt Management
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: One tool I have used and recommend is [***Langfuse***](https://www.langfuse.com/).
    It is open source, developer-friendly, and built to support teams working with
    LLM-powered applications in production.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt management is just one of the things it helps with. LangFuse also gives
    you full visibility into your application’s traces, latency, and cost.
  prefs: []
  type: TYPE_NORMAL
- en: But for me, it’s the approach to managing and iterating on prompts that was
    a turning point.
  prefs: []
  type: TYPE_NORMAL
- en: Langfuse gives you a clean interface where you can create and update prompts
    outside your codebase.
  prefs: []
  type: TYPE_NORMAL
- en: You can version them, track changes over time, and roll back if something goes
    wrong.
  prefs: []
  type: TYPE_NORMAL
- en: You can also A/B test different versions of the same prompt and see how each
    one performs in production and you can do all this without redeploying your app.
  prefs: []
  type: TYPE_NORMAL
- en: '*This is not a sponsored mention. Just a personal recommendation based on what
    has worked well in my own projects.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: It also makes it easier for non-engineers to contribute.
  prefs: []
  type: TYPE_NORMAL
- en: The Langfuse console lets product teams or writers tweak prompts safely, without
    touching the codebase or waiting for a release. It fits well into modern Generative
    AI stacks.
  prefs: []
  type: TYPE_NORMAL
- en: You can use it with ***LangChain***, ***LlamaIndex***, or your own custom setup
    and since it is open source, you can self-host it if you want full control.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: A Quick Look at How it Works
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Just to give you a feel for it, here’s a basic example of how prompt management
    with Lang-fuse works in practice.
  prefs: []
  type: TYPE_NORMAL
- en: We can simply create a new prompt with variables, through the User Interface *(you
    can *[***create or update prompts programmatically***](https://langfuse.com/docs/prompts/get-started#message-placeholders)*,
    too).*
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/1870e2fe414ecaf715da8d410645a0f5.png)'
