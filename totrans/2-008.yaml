  prefs: []
  type: TYPE_NORMAL
- en: We can now pull the latest version of a prompt and use it in a simple generation
    pipeline with Google’s GenAI SDK.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/fa2a167e623bb4114eccacb17fabbeb9.png)'
  prefs: []
  type: TYPE_IMG
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: What I’d Do Differently Today
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: If I were starting again, I would never hard-code prompts into my app. It slows
    you down, hides things from the people who could help, and turns every tiny change
    into a release.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt management sounds like a nice-to-have until your first iteration bottleneck.
  prefs: []
  type: TYPE_NORMAL
- en: Then it becomes obvious. Decouple your prompts early. You’ll move faster, build
    better, and keep your team in the loop.
  prefs: []
  type: TYPE_NORMAL
