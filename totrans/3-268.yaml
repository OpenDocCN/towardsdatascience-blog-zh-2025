  type: TYPE_NORMAL
  zh: '**[评估校准——期望校准误差（ECE）](#Evaluating)**'
- en: '**[Most frequently mentioned Drawbacks of ECE](#Drawbacks)**'
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**[ECE（期望校准误差）最常提到的缺点](#Drawbacks)**'
- en: '**[Other definitions of Calibration](#Multiclass)**'
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**[校准的其他定义](#Multiclass)**'
