- en: 'Understanding Model Calibration: A Gentle Introduction & Visual Exploration'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 理解模型校准：温和的介绍与视觉探索
- en: 原文：[https://towardsdatascience.com/understanding-model-calibration-a-gentle-introduction-visual-exploration/](https://towardsdatascience.com/understanding-model-calibration-a-gentle-introduction-visual-exploration/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/understanding-model-calibration-a-gentle-introduction-visual-exploration/](https://towardsdatascience.com/understanding-model-calibration-a-gentle-introduction-visual-exploration/)
- en: '**How Reliable Are Your Predictions?**'
  id: totrans-2
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**你的预测有多可靠？**'
- en: '**### **About**'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '**### **关于**'
- en: '**To be considered reliable, a model must be calibrated so that its confidence
    in each decision closely reflects its true outcome. In this blog post we’ll take
    a look at the most commonly used definition for calibration and then dive into
    a frequently used evaluation measure for model calibration. We’ll then cover some
    of the drawbacks of this measure and how these surfaced the need for additional
    notions of calibration, which require their own new evaluation measures. This
    post is not intended to be an in-depth dissection of all works on calibration,
    nor does it focus on how to calibrate models. Instead, it is meant to provide
    a gentle introduction to the different notions and their evaluation measures as
    well as to re-highlight some issues with a measure that is still widely used to
    evaluate calibration.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: '**要被认为是可靠的，模型必须校准，使其在每个决策中的置信度与其真实结果紧密相关。在这篇博客文章中，我们将探讨校准最常用的定义，然后深入探讨模型校准常用的评估指标。然后，我们将介绍这个指标的缺点以及这些缺点如何导致了校准额外概念的必要性，这些概念需要它们自己的新评估指标。本文的目的不是深入剖析所有关于校准的工作，也不是专注于如何校准模型。相反，它旨在温和地介绍不同的概念及其评估指标，以及重新强调一些仍然广泛用于评估校准的指标存在的问题。'
- en: '**Table of Contents**'
  id: totrans-5
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**[目录](#table-of-contents)**'
- en: '**[What is Calibration?](#calibration)**'
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**[什么是校准？](#calibration)**'
- en: '**[Evaluating Calibration — Expected Calibration Error (ECE)](#Evaluating)**'
  id: totrans-7
  prefs:
