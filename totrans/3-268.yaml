- en: '***Footnotes***'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: '***脚注***'
- en: '¹*In the paper it is stated more generally: If the argsorts match, it means
    the ranking is aligned, contributing to the overall RankCS score.***********************'
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: ¹*在论文中更普遍地表述为：如果argsorts匹配，则意味着排名是一致的，这有助于整体RankCS得分。***********************
