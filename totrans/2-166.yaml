- en: AI Agents Are Shaping the Future of Work Task by Task, Not Job by Job
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: AI 代理正在通过一项项任务塑造工作的未来，而不是通过一项项工作
- en: 原文：[https://towardsdatascience.com/ai-agents-are-shaping-future-of-work-task-by-task-not-job-by-job/](https://towardsdatascience.com/ai-agents-are-shaping-future-of-work-task-by-task-not-job-by-job/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://towardsdatascience.com/ai-agents-are-shaping-future-of-work-task-by-task-not-job-by-job/](https://towardsdatascience.com/ai-agents-are-shaping-future-of-work-task-by-task-not-job-by-job/)'
- en: <mdspan datatext="el1752000762578" class="mdspan-comment">For the past</mdspan>
    couple of years, experts have been locked in a debate about AI’s impact on jobs.
    Will it create them or destroy them? Will jobs be human-led or AI-led? This binary
    discussion, as research is revealing, is not asking the right questions.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1752000762578" class="mdspan-comment">在过去的</mdspan>几年里，专家们一直在就
    AI 对工作的影响进行辩论。它将创造工作还是摧毁工作？工作将由人领导还是由 AI 领导？这种二元的讨论，正如研究揭示的那样，并没有提出正确的问题。
- en: 'Two large-scale studies, [Stanford’s “WORKBank”](https://arxiv.org/pdf/2506.06576)
    (1,500 workers, 844 tasks) and [Anthropic’s “Claude Economic Index”](https://arxiv.org/pdf/2503.04761)
    (4.1 million chats, 19,000 tasks), show that AI is reshaping work task-by-task,
    not role-by-role. Fewer than 4% of occupations are close to full automation, yet
    employees themselves want 46% of individual tasks automated, chiefly repeatable
    finance, reporting, and data-entry work. Most knowledge workers prefer “equal-partner”
    copilots over lights-out automation, and real-world usage bears this out: 57%
    of observed AI interactions are augmentative dialogues, 43% are hands-off delegation.
    The skills premium is already tilting away from routine analysis toward workflow
    orchestration, prioritization, and interpersonal influence.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 两项大规模研究，[斯坦福的“WORKBank”](https://arxiv.org/pdf/2506.06576)（1,500 名工人，844 个任务）和
    [Anthropic 的“Claude 经济指数”](https://arxiv.org/pdf/2503.04761)（410 万次对话，19,000 个任务），表明
    AI 正在通过一项项任务重塑工作，而不是通过一项项角色。不到 4% 的职业接近完全自动化，但员工本身希望 46% 的个人任务自动化，主要是可重复的金融、报告和数据录入工作。大多数知识工作者更喜欢“平等伙伴”的副驾驶，而不是无人驾驶的自动化，现实世界的使用也证实了这一点：57%
    的观察到的 AI 交互是增强对话，43% 是放手委托。技能溢价已经从常规分析转向工作流程编排、优先级排序和人际影响力。
- en: These nuances are important. AI will first shape tasks, not jobs. It is also
    very likely that very few jobs will fully go away. When we talk about “jobs will
    be transformed,” this is what it exactly means – many tasks in that job will be
    done by AI and more time will be spent on other or new tasks.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 这些细微差别很重要。AI 首先会塑造任务，而不是工作。也很可能很少有工作会完全消失。当我们谈论“工作将发生转变”时，这正是它的确切含义——那个工作中的许多任务将由
    AI 完成，而更多的时间将花在其他或新的任务上。
- en: We need to move on from vague and high-level strategies to detailed approaches
    such as work graphs at task level. In this article, we will dive into the findings
    of these 2 studies and then explore a three-pronged playbook.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要从模糊和高级的策略转向详细的方法，例如在任务层面的工作图。在这篇文章中，我们将深入探讨这两项研究的发现，然后探讨一个三管齐下的策略。
- en: 'What Workers Want vs. What AI Can Do: The Stanford “WORKBank” Study'
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 工人想要什么与 AI 能做什么：斯坦福“WORKBank”研究
- en: 'To understand the future of work, we must first understand the work itself.
    This was the premise of Stanford’s “WORKBank” study, which systematically audited
    work not from the top down (job titles) but from the bottom up (individual tasks).
    Surveying over 1,500 U.S. workers across 104 occupations and 844 distinct tasks,
    researchers built a unique dataset based on a simple but critical question: What
    parts of your job do you want to hand over to an AI and which ones can it actually
    do?'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 要理解工作的未来，我们首先必须理解工作本身。这是斯坦福“WORKBank”研究的前提，该研究系统地审查了工作，不是从上到下（职位名称），而是从下到上（个人任务）。调查了来自
    104 个职业和 844 个不同任务的 1,500 多名美国工人，研究人员基于一个简单但关键的问题构建了一个独特的数据库：你希望将哪些工作部分交给 AI，哪些
    AI 实际上能做？
- en: What makes this study uniquely powerful is its multi-layered approach. It didn’t
    just capture worker desire; it cross-referenced it with opinions of 52 leading
    AI experts who rated the technical feasibility of automating each of those same
    tasks.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 这项研究的独特之处在于其多层次的方法。它不仅捕捉了工人的愿望，而且还将其与 52 位领先的 AI 专家的意见进行了交叉参考，这些专家对自动化每个相同任务的技术可行性进行了评估。
- en: Two Frameworks to Navigate the Future
  id: totrans-9
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 两个框架来应对未来
- en: 'The Stanford team synthesized their findings into two elegant frameworks:'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 斯坦福团队将他们的发现综合成两个优雅的框架：
- en: '**The Human Agency Scale (HAS)**: This five-level scale classifies desired
    human involvement in a task, from H1 (AI performs the task entirely, or “lights-out”
    automation) to H5 (the task is essentially human and AI has no role). It provides
    nuanced language for discussing automation, moving beyond the simple “human vs.
    machine” binary.'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: '**人类代理尺度（HAS）**：这个五级尺度将任务中期望的人类参与度分类，从H1（AI完全执行任务或“无人工干预”自动化）到H5（任务基本上是人类的，AI没有角色）。它提供了讨论自动化的细微语言，超越了简单的“人机二元”。'
- en: '![](../Images/ce6763560e26559c185b980dc26b38b0.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ce6763560e26559c185b980dc26b38b0.png)'
- en: 'Source: Stanford Paper – Future of Work with AI Agents: Auditing Automation
    and Augmentation Potential across the U.S. Workforce'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：斯坦福论文《人工智能代理的未来工作：美国劳动力自动化和增强潜力审计》
- en: '**The Desire–Capability Matrix**: The researchers then plot every role on a
    matrix. While they use averages of task scores for the 2×2, I believe it is much
    better to look at the role level aggregate data in Appendix E.4\. If we take that
    data and analyze at role level much clearer Enterprise AI implications emerge.
    This creates four distinct zones, each with clear strategic implications:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: '**需求-能力矩阵**：研究人员随后将每个角色绘制在矩阵中。虽然他们使用2×2矩阵的任务分数平均值，但我认为最好查看附录E.4中的角色层级汇总数据。如果我们分析这些数据，在角色层级上可以更清晰地看到企业AI的潜在影响。这创造了四个不同的区域，每个区域都有明确的战略意义：'
- en: '![](../Images/86164aee410bb8fa54596f67837433ef.png)'
  id: totrans-15
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/86164aee410bb8fa54596f67837433ef.png)'
- en: 'Source: Author, based on the data in Appendix E4 in Stanford Paper – Future
    of Work with AI Agents: Auditing Automation and Augmentation Potential across
    the U.S. Workforce'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：作者，基于斯坦福论文《人工智能代理的未来工作：美国劳动力自动化和增强潜力审计》附录E4中的数据。
- en: '**The Green Zone (Automate)**: High worker desire, high AI capability. These
    are no-brainer tasks ripe for full automation.'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**绿色自动化区**：工人意愿高，AI能力高。这些任务非常适合完全自动化，无需思考。'
- en: '**The Blue Zone (Innovate)**: High worker desire, low AI capability. Market
    opportunities lie here for AI builders addressing problems workers want solved.'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**蓝色创新区**：工人意愿高，AI能力低。市场机会在于AI构建者解决工人想要解决的问题。'
- en: '**The Yellow Zone (Educate)**: Low worker desire, high AI capability. Workers
    underestimate what AI can do, an opportunity for internal education and enablement.'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**黄色教育区**：工人意愿低，AI能力高。工人低估了AI的能力，这是一个内部教育和赋能的机会。'
- en: '**The Red Zone (Passive)**: Low worker desire, low AI capability. This is an
    area where Enterprises should monitor progress but no immediate action.'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**被动红区**：工人意愿低，AI能力低。这是企业应监控进展但无需立即采取行动的区域。'
- en: 'Key Findings: A Desire for Partnership, Not Replacement'
  id: totrans-21
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 关键发现：寻求伙伴关系而非替代
- en: '**Workers want the drudgery to be automated.** The study’s findings dispel
    myths around one contentious area, that workers inherently do not want AI. A staggering
    46% of all tasks were things workers actively wanted to offload, primarily tedious,
    repetitive work that drains cognitive resources. The top reason cited was ambition:
    69% said their goal was to “free my time for high-value work.”'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '**工人希望自动化繁琐的工作**。这项研究的发现消除了围绕一个有争议领域的神话，即工人天生不想使用AI。令人震惊的是，46%的所有任务都是工人主动想要外包的，主要是那些消耗认知资源的枯燥、重复性工作。最常见的原因是抱负：69%的人表示他们的目标是“为高价值工作腾出时间”。'
- en: '**Full automation is not desirable.** The desire for AI automation is not a
    desire for obsolescence. Fear remains, with 28% of workers expressing concerns
    about job security and the “dehumanizing” of their roles. This is why the ideal
    interaction model is not replacement but partnership. Across the board, 45% of
    occupations reported “equal partnership” (H3 on the agency scale) as their ideal
    state, far preferring a copilot setup to a complete takeover.'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: '**完全自动化不可取**。对AI自动化的需求不是对过时的需求。担忧仍然存在，28%的工人表示对工作安全和角色“去人性化”的担忧。这就是为什么理想的交互模式不是替代而是合作。全面来看，45%的职业报告称“平等合作”（代理尺度上的H3）是他们理想的状态，远比完全接管更偏好共驾模式。'
- en: Workers consistently ask for more agency than experts say is technically required.
    This means that executives will have to lead on this path empathetically. Workers
    want AI but want it less than what is possible.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 工人持续要求比专家所说的技术要求更多的代理权。这意味着高管将需要在同情心领导下引领这一路径。工人想要AI，但想要的AI比可能的要少。
- en: 'Perhaps most telling is the emerging “skills inversion.” The premium is rapidly
    shifting away from routine analytical tasks, the very skills that defined the
    knowledge worker of the last 20 years, and toward a new set of meta-skills: organizing
    and prioritizing work, giving guidance, interpersonal consultation, and making
    decisions under ambiguity. In the agent-led enterprise, your value will be defined
    less by your ability to do analysis and more by your ability to orchestrate the
    agents that do.'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 最具说明性的可能是新兴的“技能反转”。高端职位正迅速从常规分析任务中转移，这些任务正是过去20年知识工作者所定义的技能，转向一套新的元技能：组织工作、优先排序、提供指导、人际咨询以及在不确定性下做出决策。在以代理为主导的企业中，你的价值将更多地由你组织代理的能力，而不是你分析的能力来定义。
- en: '![](../Images/bedcd1a1bfdeb231c33fa05f995d5a9f.png)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/bedcd1a1bfdeb231c33fa05f995d5a9f.png)'
- en: 'Source: Stanford Paper – Future of Work with AI Agents: Auditing Automation
    and Augmentation Potential across the U.S. Workforce'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：斯坦福论文 – 使用AI代理的工作未来：在美国劳动力中审计自动化和增强型潜力
- en: 'What People Are Actually Doing: The Anthropic “Claude Economic Index”'
  id: totrans-28
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 人们实际上在做什么：Anthropic的“Claude经济指数”
- en: If the Stanford study tells us what’s possible and desired, the Anthropic Claude
    Economic Index tells us what’s actually happening now. By analyzing 4.1 million
    real-world interactions with its Claude AI model and mapping them to over 19,000
    official O*NET tasks, Anthropic has created an unprecedented, real-time snapshot
    of AI adoption in the wild.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 如果斯坦福的研究告诉我们可能性和期望，那么Anthropic的Claude经济指数就告诉我们现在实际上发生了什么。通过分析其Claude AI模型与410万真实世界互动，并将其映射到超过19,000项官方O*NET任务，Anthropic创建了一个前所未有的、实时的AI野外观用的快照。
- en: Who Is Adopting and Who Is Not
  id: totrans-30
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 谁在采用，谁没有采用
- en: 'The data shows AI adoption is not evenly distributed; it has clear hot and
    cold zones. The “hot” zones are unsurprising: 37% of all usage comes from computer
    and mathematical occupations (coding, scripting, troubleshooting), followed by
    10% from writing and communications (marketing copy, technical documentation).
    The “cold” zones are roles requiring physical presence: construction, food service,
    and hands-on healthcare show near-zero engagement.'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 数据显示，AI的采用并不均匀；它有明显的热点和冷点。“热点”并不令人意外：37%的使用来自计算机和数学职业（编码、脚本、故障排除），其次是10%来自写作和传播（营销文案、技术文档）。而“冷点”是那些需要物理存在的角色：建筑、餐饮和实际医疗保健几乎没有任何参与。
- en: '![](../Images/33743aac4646bd27ae4e8f235bb04a5a.png)'
  id: totrans-32
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/33743aac4646bd27ae4e8f235bb04a5a.png)'
- en: 'Source: Anthropic Paper – Which Economic Tasks are Performed with AI? Evidence
    from Millions of Claude Conversations'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：Anthropic论文 – 使用AI完成的经济任务有哪些？来自数百万Claude对话的证据
- en: 'More revealing is the analysis by “Job Zone,” a classification of roles based
    on required preparation level. Peak AI usage happens in Job Zone 4\. These are
    roles like software developers, analysts, and marketers that typically require
    a bachelor’s degree. This group uses AI 50% more than expected, accounting for
    over half of all analyzed usage. Conversely, usage is lower at the extremes: Job
    Zone 1 (e.g., baristas) and Job Zone 5 (e.g., physicians, lawyers) both under-index
    significantly. This tells us AI’s current sweet spot is in structured, analytical
    knowledge work.'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 更具揭示性的是“工作区域”的分析，这是一种基于所需准备水平的角色分类。峰值AI使用发生在工作区域4。这些角色如软件开发者、分析师和营销人员通常需要学士学位。这个群体比预期多使用AI
    50%，占所有分析使用的超过一半。相反，在极端工作区域的使用较低：工作区域1（例如，咖啡师）和工作区域5（例如，医生、律师）都显著低于指数。这告诉我们，AI当前的甜蜜点在于结构化、分析性的知识工作。
- en: How Are They Using It? Augmentation Still Rules
  id: totrans-35
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 他们是如何使用的？增强型应用仍然占主导地位
- en: The study confirms Stanford’s findings on worker preference. A majority of interactions,
    57%, are “augmentative,” characterized by iterative dialogue, validation, and
    learning, a true copilot relationship. Only 43% are fully “automated” or delegated,
    where users give a prompt and expect a finished product without back-and-forth.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 该研究证实了斯坦福大学关于工人偏好的发现。大多数互动，57%，是“增强型”的，特征是迭代对话、验证和学习，这是一种真正的副驾驶关系。只有43%是完全“自动化”或委托的，用户给出提示并期望得到一个成品，而不需要来回沟通。
- en: '![](../Images/b3436e6269868954716a1c9cd51ca828.png)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b3436e6269868954716a1c9cd51ca828.png)'
- en: 'Source: Anthropic Paper – Which Economic Tasks are Performed with AI? Evidence
    from Millions of Claude Conversations'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：Anthropic论文 – 使用AI完成的经济任务有哪些？来自数百万Claude对话的证据
- en: 'When we drill down into tasks themselves, the pattern becomes even clearer.
    Dominant use cases are in high-value, complex work: software development and debugging,
    creating technical documentation, and business process analysis. This is not about
    automating simple clerical work; it’s about augmenting core functions of the most
    valuable knowledge workers.'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们深入到任务本身时，模式变得更加清晰。主导用例是在高价值、复杂的工作中：软件开发和调试、创建技术文档和业务流程分析。这不仅仅是自动化简单的文书工作；这是关于增强最有价值知识工作者的核心功能。
- en: Crucially, the study shows that full job automation is a red herring. Only 4%
    of occupations see AI touching over 75% of their constituent tasks, and these
    are typically narrow fields like language instruction and editing. However, 36%
    of occupations have “highly active pockets” of AI, with technology present in
    at least a quarter of their tasks. A marketing manager might not use AI for client
    engagement, but they are heavily using it for market research and strategic planning.
    This task-level penetration is the metric that matters.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 关键的是，这项研究显示，全面工作自动化是一个误导。只有4%的职业看到AI触及其构成任务的超过75%，这些通常是狭窄领域，如语言教学和编辑。然而，36%的职业有“高度活跃的AI区域”，技术至少存在于其任务的四分之一中。例如，市场营销经理可能不会使用AI进行客户互动，但他们会在市场研究和战略规划中大量使用它。这种任务级别的渗透率是重要的指标。
- en: 'The Executive Playbook: Three Imperatives for the AI Agent Empowered Enterprise'
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 执行手册：赋能企业的AI代理的三个必要条件
- en: This data is more than academically interesting. It provides a blueprint for
    an enterprise AI strategy. Here are three specific, actionable imperatives for
    every senior leader.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 这些数据不仅仅在学术上有趣。它为企业AI战略提供了一个蓝图。以下是针对每位高级领导的具体、可操作的三个必要条件。
- en: 1\. Targeted Automation and Copilot Opportunities
  id: totrans-43
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 目标自动化和共飞行员机会
- en: 'The approach here should depend on the roles and the tasks. These fall into
    three zones:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 这里的方法应该取决于角色和任务。这些可以分为三个区域：
- en: '**Automate the Obvious** (Green Zone): The consensus from both studies is clear.
    A high share of tasks in finance, accounting, and repetitive data administration
    are ready for full automation. This is where one should be looking to systematically,
    at scale, automate low-value tasks.'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: '**自动化显而易见之事**（绿色区域）：两项研究的共识是明确的。在金融、会计和重复性数据管理中，大量任务已经准备好进行全面自动化。这就是我们应该系统地、大规模地自动化低价值任务的领域。'
- en: '**Deploy Copilots Strategically** (Green/Yellow Zone): For functions like business
    intelligence, compliance, learning & development, and creative marketing, the
    mandate is augmentation. This doesn’t necessarily mean buying more tools; it means
    building AI capabilities into existing workflows. Think AI-generated starting-point
    reports for analysts, AI-powered compliance checklists, or AI-assisted content
    generation for marketers. The goal is uplift, not replacement.'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: '**战略部署共飞行员**（绿色/黄色区域）：对于商业智能、合规性、学习和开发以及创意营销等职能，任务是增强。这并不意味着购买更多工具；这意味着将AI能力融入现有工作流程中。例如，为分析师生成AI生成的起点报告，AI驱动的合规性清单，或AI辅助的内容生成，以帮助营销人员。目标是提升，而不是替代。'
- en: '**Educate the Skeptics** (Yellow Zone): The Stanford study revealed that many
    of our most skilled workers, such as engineers, analysts, and managers, underestimate
    what AI can do. We must investigate if this perception gap exists in our own organization.
    Is it due to lack of tools? Technical debt? Or cultural fear of being de-skilled?
    The answer will determine whether we need an enablement campaign (better tools
    and training) or a perception-shifting campaign (demonstrating value and building
    trust).'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: '**教育怀疑者**（黄色区域）：斯坦福大学的研究显示，我们许多最熟练的工人，如工程师、分析师和管理人员，低估了AI的能力。我们必须调查我们自己的组织中是否存在这种认知差距。这是否是由于工具不足？技术债务？或者是对技能丧失的文化恐惧？答案将决定我们是否需要启用活动（更好的工具和培训）或感知转变活动（展示价值和建立信任）。'
- en: 2\. Go-To-Market & Product Innovation
  id: totrans-48
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 市场推广和产品创新
- en: Beyond internal efficiencies, this research highlights massive external opportunities
    for growth (Blue Zone).
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 除了内部效率之外，这项研究还突出了巨大的外部增长机会（蓝色区域）。
- en: '**Become an “AI Acceleration Partner”**: The R&D Opportunity zones from the
    Stanford study, and underpenetrated areas from Anthropic study highlight industries
    like Legal, Healthcare, Travel, and E-commerce where either worker desire for
    AI dramatically outpaces current tech or there is a passive market. These can
    be areas to build new products and start-ups.'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: '**成为“AI加速合作伙伴”**：斯坦福研究中的研发机会区域和Anthropic研究中的未充分渗透领域突出了法律、医疗保健、旅游和电子商务等行业，在这些行业中，工人的AI需求要么远远超过当前技术，要么存在被动市场。这些可以成为构建新产品和初创企业的领域。'
- en: '**Explore New Product Frontiers**: The data also flags specific occupational
    needs. For instance, both Information Security and Computer Network professionals
    report a high desire for AI assistance that current tools don’t provide. This
    is a clear signal for product teams to begin research and discovery. Is there
    a new security product to be built? A new network management platform powered
    by agents? The data provides a map to unmet needs.'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: '**探索新产品前沿**：数据还指出了特定的职业需求。例如，信息安全专家和计算机网络专家都报告说，他们非常渴望当前工具无法提供的AI辅助。这是一个明显的信号，表明产品团队应该开始研究和探索。是否需要构建一个新的安全产品？一个由代理驱动的新的网络管理平台？数据为未满足的需求提供了地图。'
- en: 3\. Workforce Transformation & Skill Strategy
  id: totrans-52
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. 劳动力转型与技能战略
- en: This is the most challenging, and most important area. AI’s task-level impact
    requires a complete overhaul of our talent management philosophy.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 这是最具挑战性、最重要的领域。AI在任务层面的影响需要我们彻底改革人才管理理念。
- en: '**Build the “AI Orchestration” Skill Family**: Both studies create a clear
    picture of new premium skills: workflow design, cross-functional orchestration
    and navigating ambiguity. Enterprises should invest in cultivating these abilities.
    This means building a new “AI-Orchestration” competency within learning paths
    and embedding it into career paths and performance reviews. The goal is to train
    people to excel at directing, validating, and integrating AI capabilities into
    complex workflows.'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: '**构建“AI编排”技能家族**：这两项研究都清晰地描绘了新的高端技能：工作流程设计、跨职能编排和应对不确定性。企业应该投资于培养这些能力。这意味着在学习和职业路径中构建一个新的“AI编排”能力，并将其嵌入到职业路径和绩效评估中。目标是训练人们擅长指导、验证和将AI能力集成到复杂的工作流程中。'
- en: '**Adopt Task-Based Workforce Planning**: The high-level headcount budget could
    become an artifact of the past. Enterprises should think beyond FTEs to modeling
    “task mixes per role.” This task-based view should drive hiring and redeployment
    decisions, integrating into budgeting cycles so future workforce choices are driven
    by the work actually to be done by humans.'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '**采用基于任务的劳动力规划**：高级人员编制预算可能成为过去的遗迹。企业应该超越全职员工（FTEs），考虑“每个角色的任务混合”模型。这种基于任务的观点应该驱动招聘和再部署决策，并将其整合到预算周期中，以便未来的劳动力选择由人类实际要完成的工作来驱动。'
- en: '**Evolve from an Org Chart to a “Work Graph”**: The ultimate goal is to move
    from a static, siloed organizational chart to a dynamic, living “Work Graph.”
    This is a company-wide map that details tasks, owners, dependencies, and automation
    states across functions, cutting through silos to optimize for end-to-end value
    streams. This graph becomes the single source of truth for prioritizing automation
    projects, identifying skill gaps, redesigning team structures, and even making
    strategic decisions about which processes to bring back from low-cost locations
    and which vendor relationships can be supplanted by more efficient AI agents.'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: '**从组织结构图进化到“工作图谱”**：最终目标是实现从静态、孤立的组织结构图到动态、活跃的“工作图谱”的转变。这是一张公司范围内的地图，详细说明了各个职能的任务、负责人、依赖关系和自动化状态，打破孤岛，优化端到端的价值流。这个图谱成为优先自动化项目、识别技能差距、重新设计团队结构以及甚至关于哪些流程可以从低成本地区带回以及哪些供应商关系可以被更高效的AI代理所取代的战略决策的唯一真实来源。'
- en: The Partnership Imperative
  id: totrans-57
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 合作伙伴关系是当务之急
- en: The future of work isn’t about choosing between humans and AI. It’s about architecting
    their collaboration. The organizations that thrive will be those that move beyond
    the binary automation debate to focus on intelligent task decomposition, strategic
    capability development, and thoughtful change management.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 工作的未来不是在人类和AI之间做出选择。这是关于构建他们的协作。那些能够繁荣发展的组织将超越二元自动化辩论，专注于智能任务分解、战略能力发展和深思熟虑的变革管理。
- en: 'The research is unequivocal: workers don’t want to be replaced by AI, but they
    do want to be freed from the repetitive, low-value tasks that prevent them from
    doing their best work. Companies that listen to this message and act on it systematically
    will gain not just operational efficiency, but significant competitive advantage
    in attracting and retaining top talent.'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 研究结果明确无误：工人不希望被人工智能取代，但他们确实希望摆脱那些阻碍他们发挥最佳工作状态的重复性、低价值任务。那些倾听这一信息并系统采取行动的公司，不仅能获得运营效率，还能在吸引和留住顶尖人才方面获得显著的竞争优势。
- en: Perhaps most provocatively, successful organizations should explore bringing
    fully automatable processes back from low-cost locations into centralized, cloud-native
    operations supported by AI agents. Simultaneously, they should evaluate external
    BPO and SaaS relationships, piloting AI substitution where agents can match or
    exceed vendor service levels and reinvesting the savings in high-agency talent.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 可能最具挑衅性的是，成功的组织应该探索将可完全自动化的流程从低成本地区带回集中式、云原生运营，这些运营由人工智能代理支持。同时，他们应该评估外部业务流程外包（BPO）和软件即服务（SaaS）关系，试点人工智能替代，在代理能够匹配或超越供应商服务水平的地方，并将节省下来的资金重新投资于高价值人才。
- en: The task revolution is already underway. The question isn’t whether AI will
    reshape work, it’s whether your organization will lead that transformation or
    be disrupted by it. The choice, for now, remains human.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 任务革命已经启动。问题不在于人工智能是否会重塑工作，而在于您的组织是会引领这一变革还是被它颠覆。目前的选择权仍然掌握在人类手中。
- en: '* * *'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
