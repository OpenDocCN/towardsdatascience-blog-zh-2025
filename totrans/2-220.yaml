- en: Reinforcement Learning from Human Feedback, Explained Simply
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 从人类反馈中简单解释强化学习
- en: 原文：[https://towardsdatascience.com/explained-simply-reinforcement-learning-from-human-feedback/](https://towardsdatascience.com/explained-simply-reinforcement-learning-from-human-feedback/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/explained-simply-reinforcement-learning-from-human-feedback/](https://towardsdatascience.com/explained-simply-reinforcement-learning-from-human-feedback/)
- en: <mdspan datatext="el1750721327755" class="mdspan-comment">Introduction</mdspan>
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1750721327755" class="mdspan-comment">介绍</mdspan>
- en: The appearance of ChatGPT in 2022 completely changed how the world started perceiving
    artificial intelligence. The incredible performance of ChatGPT led to the rapid
    development of other powerful LLMs.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 2022年ChatGPT的出现完全改变了世界对人工智能的最初认知。ChatGPT令人难以置信的表现导致了其他强大LLMs的快速发展。
- en: We could roughly say that ChatGPT is an upgraded version of GPT-3\. But in comparison
    to the previous GPT versions, this time OpenAI developers not only used more data
    or just complex model architectures. Instead, they designed an incredible technique
    that allowed a breakthrough.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以粗略地说，ChatGPT是GPT-3的升级版。但与之前的GPT版本相比，这次OpenAI的开发者不仅使用了更多的数据或更复杂的模型架构。相反，他们设计了一种令人难以置信的技术，实现了突破。
- en: '*In this article, we will talk about RLHF — a fundamental algorithm implemented
    at the core of ChatGPT that surpasses the limits of human annotations for LLMs.
    Though the algorithm is based on proximal policy optimization (PPO), we will keep
    the explanation simple, without going into the details of reinforcement learning,
    which is not the focus of this article.*'
  id: totrans-5
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*在这篇文章中，我们将讨论RLHF——这是ChatGPT核心中实施的一个基本算法，它超越了人类标注对LLMs的限制。尽管该算法基于近端策略优化（PPO），但我们将保持解释简单，不会深入强化学习的细节，这不是本文的重点。*'
- en: NLP development before ChatGPT
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: ChatGPT之前的NLP发展
- en: 'To better dive into the context, let us remind ourselves how LLMs were developed
    in the past, before ChatGPT. In most cases, LLM development consisted of two stages:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 为了更好地了解上下文，让我们回顾一下在ChatGPT出现之前，LLMs是如何发展的。在大多数情况下，LLM的发展包括两个阶段：
- en: '**Pre-training**'
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**预训练**'
- en: '**Fine-tuning**'
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**微调**'
- en: '![](../Images/054f4f67a8dd3e9ff11cc7d8d0f15384.png)'
  id: totrans-10
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/054f4f67a8dd3e9ff11cc7d8d0f15384.png)'
- en: Pre-training & fine-tuning framework
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 预训练与微调框架
- en: Pre-training includes language modeling — a task in which a model tries to predict
    a hidden token in the context. The probability distribution produced by the model
    for the hidden token is then compared to the ground truth distribution for loss
    calculation and further backpropagation. In this way, the model learns the semantic
    structure of the language and the meaning behind words.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 预训练包括语言建模——这是一个模型试图预测上下文中隐藏的标记的任务。模型为隐藏标记产生的概率分布与真实分布进行比较，用于损失计算和进一步的反向传播。通过这种方式，模型学习语言的语义结构和词语背后的含义。
- en: '*If you want to learn more about **pre-training & fine-tuning framework**,
    check out my [article about BERT](https://towardsdatascience.com/bert-3d1bf880386a/).*'
  id: totrans-13
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*如果您想了解更多关于**预训练与微调框架**的信息，请查看我的[关于BERT的文章](https://towardsdatascience.com/bert-3d1bf880386a/)。*'
- en: 'After that, the model is fine-tuned on a downstream task, which might include
    different objectives: text summarization, text translation, text generation, question
    answering, etc. In many situations, fine-tuning requires a human-labeled dataset,
    which should preferably contain enough text samples to allow the model to generalize
    its learning well and avoid overfitting.'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 之后，模型在下游任务上进行微调，这可能包括不同的目标：文本摘要、文本翻译、文本生成、问答等。在许多情况下，微调需要一个由人类标记的数据集，该数据集最好包含足够的文本样本，以便模型能够很好地泛化其学习并避免过拟合。
- en: 'This is where the limits of fine-tuning appear. **Data annotation is usually
    a time-consuming task performed by humans.** Let us take a question-answering
    task, for example. To construct training samples, we would need a manually labeled
    dataset of questions and answers. For every question, we would need a precise
    answer provided by a human. For instance:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是微调的局限性所在。**数据标注通常是一项耗时的人类任务**。以问答任务为例。为了构建训练样本，我们需要一个手动标记的问题和答案数据集。对于每个问题，我们需要一个由人类提供的精确答案。例如：
- en: '![](../Images/a74c5340fd7916d08be2675b243c7a3e.png)'
  id: totrans-16
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a74c5340fd7916d08be2675b243c7a3e.png)'
- en: During data annotation, providing full answers to prompts requires a lot of
    human time.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 在数据标注过程中，对提示提供完整答案需要大量的人类时间。
- en: In reality, for training an LLM, we would need millions or even billions of
    such (question, answer) pairs. **This annotation process is very time-consuming
    and does not scale well.**
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 在现实中，为了训练LLM，我们需要数百万甚至数十亿这样的（问题，答案）对。**这个标注过程非常耗时，并且扩展性不好。**
- en: RLHF
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: RLHF
- en: Having understood the main problem, now it is perfect moment to dive into the
    details of RLHF.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 理解了主要问题后，现在正是深入探究RLHF细节的完美时机。
- en: 'If you have already used ChatGPT, you have probably encountered a situation
    in which ChatGPT asks you to choose the answer that better suits your initial
    prompt:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你已经使用过ChatGPT，你可能遇到过ChatGPT要求你选择一个更适合你初始提示的答案的情况：
- en: '![](../Images/073e95e65223ebc8f2ccde123f431fb6.png)'
  id: totrans-22
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/073e95e65223ebc8f2ccde123f431fb6.png)'
- en: '*The ChatGPT interface asks a user to rate two possible answers.*'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: '*ChatGPT界面要求用户对两个可能的答案进行评分。*'
- en: This information is actually used to continuously improve ChatGPT. Let us understand
    how.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 这些信息实际上被用来持续改进ChatGPT。让我们来了解这是如何实现的。
- en: 'First of all, it is important to notice that choosing the best answer among
    two options is a much simpler task for a human than providing an exact answer
    to an open question. The idea we are going to look at is based exactly on that:
    we want the human to just choose an answer from two possible options to create
    the annotated dataset.'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，重要的是要注意，在两个选项中选出最佳答案对于人类来说比提供一个精确的开放性问题答案要简单得多。我们将探讨的想法正是基于这一点：我们希望人类只需从两个可能的选项中选择一个答案来创建标注数据集。
- en: '![](../Images/e184af746e52922e04727359e499dfdd.png)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/e184af746e52922e04727359e499dfdd.png)'
- en: '*Choosing between two options is an easier task than asking someone to write
    the best possible response.*'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: '*在两个选项之间进行选择比要求某人写出最佳可能的响应要容易得多。*'
- en: Response generation
  id: totrans-28
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 响应生成
- en: 'In LLMs, there are several possible ways to generate a response from the distribution
    of predicted token probabilities:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 在LLM中，有几种可能的方式可以从预测的标记概率分布中生成一个响应：
- en: Having an output distribution *p* over tokens, the model always deterministically
    chooses the token with the highest probability.
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 拥有一个标记的输出分布 *p*，模型总是确定性地选择概率最高的标记。
- en: '![](../Images/7f372e9d3fbd9daff3ae1924d6c7101f.png)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/7f372e9d3fbd9daff3ae1924d6c7101f.png)'
- en: '*The model always selects the token with the highest softmax probability.*'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: '*模型总是选择具有最高softmax概率的标记。*'
- en: Having an output distribution *p* over tokens, the model randomly samples a
    token according to its assigned probability.
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 拥有一个标记的输出分布 *p*，模型根据其分配的概率随机采样一个标记。
- en: '![](../Images/b16f721ec2088930f03a515edbc5ef5d.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/b16f721ec2088930f03a515edbc5ef5d.png)'
- en: '*The model randomly chooses a token each time. The highest probability does
    not guarantee that the corresponding token will be chosen. When the generation
    process is run again, the results can be different.*'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: '*模型每次随机选择一个标记。最高的概率并不保证相应的标记会被选择。当再次运行生成过程时，结果可能会有所不同。*'
- en: 'This second sampling method results in more randomized model behavior, which
    allows the generation of diverse text sequences. For now, let us suppose that
    we generate many pairs of such sequences. The resulting dataset of pairs is labeled
    by humans: for every pair, a human is asked which of the two output sequences
    fits the input sequence better. The annotated dataset is used in the next step.'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 这种第二种采样方法会导致模型行为更加随机化，从而允许生成多样化的文本序列。目前，我们假设我们生成了许多这样的序列对。这些对的结果数据集由人类进行标注：对于每一对，都会要求人类判断两个输出序列中哪一个更适合输入序列。标注数据集将在下一步中使用。
- en: '*In the context of RLHF, the annotated dataset created in this way is called
    **“Human Feedback”**.*'
  id: totrans-37
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*在RLHF的背景下，以这种方式创建的标注数据集被称为**“人类反馈”**。*'
- en: Reward Model
  id: totrans-38
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 奖励模型
- en: After the annotated dataset is created, we use it to train a so-called “reward”
    model, whose goal is to learn to numerically estimate how good or bad a given
    answer is for an initial prompt. Ideally, **we want the reward model to generate
    positive values for good responses and negative values for bad responses.**
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 在标注数据集创建后，我们使用它来训练一个所谓的“奖励”模型，其目标是学习如何数值估计给定答案对于初始提示的好坏。理想情况下，**我们希望奖励模型为好的响应生成正值，为不好的响应生成负值**。
- en: '*Speaking of the reward model, its architecture is exactly the same as the
    initial LLM, except for the last layer, where instead of outputting a text sequence,
    the model outputs a float value — an estimate for the answer.*'
  id: totrans-40
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*谈到奖励模型，其架构与最初的LLM完全相同，只是在最后一层，模型不是输出一个文本序列，而是输出一个浮点值——即对答案的估计。*'
- en: '*It is necessary to pass both the initial prompt and the generated response
    as input to the reward model.*'
  id: totrans-41
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*将初始提示和生成的响应作为输入传递给奖励模型是必要的。*'
- en: Loss function
  id: totrans-42
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 损失函数
- en: You might logically ask how the reward model will learn this regression task
    if there are not numerical labels in the annotated dataset. This is a reasonable
    question. To address it, we are going to use an interesting trick: **we will pass
    both a good and a bad answer through the reward model, which will ultimately output
    two different estimates (rewards).**
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能会逻辑上问，如果没有数值标签在注释数据集中，奖励模型将如何学习这个回归任务。这是一个合理的问题。为了解决这个问题，我们将使用一个有趣的技巧：**我们将同时通过一个好的和一个坏的答案通过奖励模型，这将最终输出两个不同的估计（奖励）。**
- en: Then we will smartly construct a loss function that will compare them relatively.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 然后我们将巧妙地构建一个损失函数，以便相对比较它们。
- en: '![](../Images/f7fd1ef31ee1645a99d486690e87991f.png)'
  id: totrans-45
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/f7fd1ef31ee1645a99d486690e87991f.png)'
- en: Loss function used in the RLHF algorithm. R₊ refers to the reward assigned to
    the better response while R₋ is a reward estimated for the worse response.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: RLHF 算法中使用的损失函数。R₊ 指的是分配给更好响应的奖励，而 R₋ 是对更差响应估计的奖励。
- en: 'Let us plug in some argument values for the loss function and analyze its behavior.
    Below is a table with the plugged-in values:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们为损失函数插入一些参数值并分析其行为。下面是一个插入值的表格：
- en: '![](../Images/bd85cc9ca0be837f8d207e3a2cccf7bf.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/bd85cc9ca0be837f8d207e3a2cccf7bf.png)'
- en: A table of loss values depending on the difference between R₊ and R₋.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 一个根据 R₊ 和 R₋ 之间的差异计算损失值的表格。
- en: 'We can immediately observe two interesting insights:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以立即观察到两个有趣的见解：
- en: '*If the difference between R₊ and R₋**is negative*, i.e. a better response
    received a lower reward than a worse one, then the loss value will be proportionally
    large to the reward difference, meaning that the model needs to be significantly
    adjusted.'
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*如果 R₊ 和 R₋ 之间的差异是负的*，即更好的响应比更差的响应获得更低的奖励，那么损失值将与奖励差异成比例地增大，这意味着模型需要显著调整。'
- en: '*If the difference between R₊ and R₋ is positive*, i.e. a better response received
    a higher reward than a worse one, then the loss will be bounded within much lower
    values in the interval (0, 0.69), which indicates that the model does its job
    well at distinguishing good and bad responses.'
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*如果 R₊ 和 R₋ 之间的差异是正的*，即更好的响应比更差的响应获得更高的奖励，那么损失将在区间 (0, 0.69) 内被限制在远低的值，这表明模型在区分好和坏的响应方面做得很好。'
- en: '*A nice thing about using such a loss function is that the model learns appropriate
    rewards for generated texts by itself, and we (humans) do not have to explicitly
    evaluate every response numerically — just provide a binary value: is a given
    response better or worse.*'
  id: totrans-53
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*使用这种损失函数的一个好处是，模型可以自己学习适当的奖励，我们（人类）不需要明确地对每个响应进行数值评估——只需提供一个二元值：给定的响应是更好还是更差。*'
- en: Training an original LLM
  id: totrans-54
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 训练原始 LLM
- en: The trained reward model is then used to train the original LLM. For that, we
    can feed a series of new prompts to the LLM, which will generate output sequences.
    Then the input prompts, along with the output sequences, are fed to the reward
    model to estimate how good those responses are.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 然后使用训练好的奖励模型来训练原始 LLM。为此，我们可以向 LLM 提供一系列新的提示，LLM 将生成输出序列。然后，将输入提示以及输出序列输入到奖励模型中，以估计这些响应有多好。
- en: After generating numerical estimates, that information is used as feedback to
    the original LLM, which then performs weight updates. A very simple but elegant
    approach!
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 在生成数值估计后，这些信息被用作对原始 LLM 的反馈，然后 LLM 执行权重更新。这是一个非常简单但优雅的方法！
- en: '![](../Images/2466ad7d2573bb0bbbc725ecf1a898e0.png)'
  id: totrans-57
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/2466ad7d2573bb0bbbc725ecf1a898e0.png)'
- en: RLHF training diagram
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: RLHF 训练图
- en: '*Most of the time, in the last step to adjust model weights, a reinforcement
    learning algorithm is used (usually done by proximal policy optimization — PPO).*'
  id: totrans-59
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*大多数情况下，在最后一步调整模型权重时，会使用强化学习算法（通常是通过近端策略优化 PPO 完成）。*'
- en: '*Even if it’s not technically correct, if you are not familiar with reinforcement
    learning or PPO, you can roughly think of it as backpropagation, like in normal
    machine learning algorithms.*'
  id: totrans-60
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*即使从技术上讲不正确，如果你不熟悉强化学习或 PPO，你可以大致将其视为与正常机器学习算法中的反向传播类似。*'
- en: Inference
  id: totrans-61
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 推理
- en: During inference, only the original trained model is used. At the same time,
    the model can continuously be improved in the background by collecting user prompts
    and periodically asking them to rate which of two responses is better.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 在推理过程中，仅使用原始训练模型。同时，模型可以通过收集用户提示并在定期询问他们对两种响应中哪一种更好进行评分，在后台不断得到改进。
- en: Conclusion
  id: totrans-63
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this article, we have studied RLHF — a highly efficient and scalable technique
    to train modern LLMs. An elegant combination of an LLM with a reward model allows
    us to significantly simplify the annotation task performed by humans, which required
    huge efforts in the past when done through raw fine-tuning procedures.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我们研究了RLHF——一种高效且可扩展的技术，用于训练现代大型语言模型。将大型语言模型与奖励模型优雅地结合，使我们能够显著简化人类执行的标注任务，这在过去通过原始微调程序进行时需要巨大的努力。
- en: '*RLHF is used at the core of many popular models like ChatGPT, Claude, Gemini,
    or Mistral.*'
