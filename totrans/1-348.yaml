- en: 🎬 Long transcription
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The total length of the transcribed text can quickly reach the maximum number
    of output tokens. With our current JSON response schema, we can reach 8,192 output
    tokens (supported by Gemini 2.0) with transcriptions of ~25min videos. Gemini
    2.5 models support up to 65,536 output tokens (8x more) and let us transcribe
    longer videos.
  prefs: []
  type: TYPE_NORMAL
- en: 'For this 54-minute panel discussion, Gemini 2.5 Pro uses only ~30-35% of the
    input/output token limits:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE57]'
  prefs: []
  type: TYPE_PRE
- en: Video ([source](https://www.youtube.com/watch?v=nQKmVhLIGcs))
