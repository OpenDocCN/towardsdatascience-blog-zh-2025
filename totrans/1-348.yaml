- en: 'This Google DeepMind video is quite complex:'
  id: totrans-470
  prefs: []
  type: TYPE_NORMAL
  zh: 这部谷歌DeepMind视频相当复杂：
- en: It is highly edited and very dynamic
  id: totrans-471
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它经过高度编辑，非常动态
- en: Speakers are often off-screen and other people can be visible instead
  id: totrans-472
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 演讲者通常不在屏幕上，而是其他人可见
- en: The researchers are often in groups and it’s not always obvious who’s speaking
  id: totrans-473
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 研究者通常成群结队，并不总是明显知道谁在发言
- en: 'Some video shots were taken 2 years apart: the same speakers can sound and
    look different!'
  id: totrans-474
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一些视频镜头相隔2年：相同的演讲者听起来和看起来可能不同！
- en: 'Gemini 2.0 Flash generates an excellent transcription. However, the complexity
    of the video can lead to some missed consolidations. Gemini 2.5 Pro shows a deeper
    inference and manages to consolidate the differently-looking-and-sounding speakers:'
  id: totrans-475
  prefs: []
  type: TYPE_NORMAL
  zh: Gemini 2.0 Flash生成了一个出色的转录。然而，视频的复杂性可能导致一些遗漏的整合。Gemini 2.5 Pro显示更深入的推理，并设法整合了看起来和听起来不同的演讲者：
- en: '[PRE55]'
  id: totrans-476
  prefs: []
  type: TYPE_PRE
  zh: '[PRE55]'
- en: Video ([source](https://www.youtube.com/watch?v=gg7WjuFs8F4))
  id: totrans-477
  prefs:
