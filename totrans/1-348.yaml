- en: '* * *'
  id: totrans-316
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 📝 Tabular extraction
  id: totrans-317
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 📝 表格提取
- en: 'So far, we’ve seen the following:'
  id: totrans-318
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们已经看到了以下内容：
- en: We didn’t manage to get the full transcription with identified speakers all
    at once
  id: totrans-319
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们没有一次性获取到带有识别说话者的完整转录
- en: Order matters (because a generated token influences the probabilities for subsequent
    tokens)
  id: totrans-320
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 顺序很重要（因为生成的标记会影响后续标记的概率）
- en: 'To tackle our challenge, we need Gemini to infer from the following multimodal
    information:'
  id: totrans-321
  prefs: []
  type: TYPE_NORMAL
  zh: 为了应对我们的挑战，我们需要Gemini从以下多模态信息中进行推断：
- en: text (our instructions + what may be written in the video)
  id: totrans-322
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 文本（我们的指令+视频中可能写的内容）
- en: audio cues (everything said or audible in the video’s audio)
  id: totrans-323
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 音频提示（视频中所有说出的或可听到的内容）
- en: visual cues (everything visible in the video)
  id: totrans-324
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 视觉提示（视频中所有可见的内容）
- en: time (when things happen)
  id: totrans-325
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 时间（事情发生的时候）
- en: That is quite a mixture of information types!
  id: totrans-326
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一种信息类型的混合！
- en: 'As video transcription is a data extraction use case, if we think about the
    final result as a database, our final goal can be seen as the generation of two
    related tables (transcripts and speakers). If we write it down, our initial three
    sub-problems now look decoupled:'
  id: totrans-327
  prefs: []
  type: TYPE_NORMAL
  zh: 由于视频转录是一个数据提取用例，如果我们把最终结果看作是一个数据库，我们的最终目标可以看作是生成两个相关的表（文字记录和说话者）。如果我们把它写下来，我们最初的三个子问题现在看起来是解耦的：
- en: '![transcripts and speakers tables (L. Picard)](../Images/2dc63ade2559775037c9f66bba81640c.png)'
  id: totrans-328
  prefs: []
  type: TYPE_IMG
  zh: '![转录和说话者表格（L. Picard）](../Images/2dc63ade2559775037c9f66bba81640c.png)'
- en: 💡 In computer science, data decoupling enhances data locality, often yielding
    improved performance across areas such as cache utilization, data access, semantic
    understanding, or system maintenance. Within the LLM Transformer architecture,
    core performance relies heavily on the attention mechanism. However, the attention
    pool is finite and tokens compete for attention. Researchers sometimes refer to
    “attention dilution” for long-context, million-token-scale benchmarks. While we
    cannot directly debug LLMs as users, intuitively, data decoupling may improve
    the model’s focus, leading to a better attention span.
  id: totrans-329
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 💡 在计算机科学中，数据解耦增强了数据局部性，通常在缓存利用、数据访问、语义理解或系统维护等领域的性能得到改善。在LLM Transformer架构中，核心性能高度依赖于注意力机制。然而，注意力池是有限的，标记会竞争注意力。研究人员有时将“注意力稀释”用于长上下文、百万标记规模的基准测试。虽然我们无法像用户一样直接调试LLM，但直观上，数据解耦可能会提高模型的重点，从而带来更好的注意力范围。
- en: 'Since Gemini is extremely good with patterns, it can automatically generate
    identifiers to link our tables. In addition, since we eventually want an automated
    workflow, we can start reasoning in terms of data and fields:'
  id: totrans-330
  prefs: []
  type: TYPE_NORMAL
  zh: 由于Gemini在模式识别方面非常出色，它可以自动生成标识符来链接我们的表。此外，由于我们最终希望有一个自动化的工作流程，我们可以从数据和字段的角度开始推理：
- en: '![transcripts and speakers tables with id (L. Picard)](../Images/3e675bb9d0a522421cf4d6a1ae2931bd.png)'
  id: totrans-331
  prefs: []
  type: TYPE_IMG
  zh: '![带有id的转录和说话者表格（L. Picard）](../Images/3e675bb9d0a522421cf4d6a1ae2931bd.png)'
- en: Let’s call this approach “tabular extraction”, split our instructions into two
    tasks (tables), still in a single request, and arrange them in a meaningful order…
  id: totrans-332
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们称这种方法为“表格提取”，将我们的指令分成两个任务（表格），仍然在一个请求中，并按有意义的方式排列……
- en: '* * *'
  id: totrans-333
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 💬 Transcripts
  id: totrans-334
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 💬 文字记录
- en: 'First of all, let’s focus on getting the audio transcripts:'
  id: totrans-335
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们专注于获取音频文字记录：
- en: Gemini has proven to be natively good at audio transcription
  id: totrans-336
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Gemini已被证明在音频转录方面具有天生的优势
- en: This requires less inference than image analysis
  id: totrans-337
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这比图像分析需要的推理要少
- en: It is central and independent information
  id: totrans-338
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这是中心且独立的信息
- en: 💡 Generating an output that starts with correct answers should help to achieve
    an overall correct output.
  id: totrans-339
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 💡 生成以正确答案开始的输出应该有助于实现整体正确的输出。
- en: 'We’ve also seen what a typical transcription entry can look like:'
  id: totrans-340
  prefs: []
  type: TYPE_NORMAL
  zh: 我们也看到了典型的转录条目可能的样子：
- en: '[PRE23]'
  id: totrans-341
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: 'But, right away, there can be some ambiguities in our multimodal use case:'
  id: totrans-342
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，在我们的多模态用例中，立即就可能出现一些歧义：
- en: What is a speaker?
  id: totrans-343
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 说话者是什么？
- en: Is it someone we see/hear?
  id: totrans-344
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 是我们看到/听到的某人吗？
- en: What if the person visible in the video is not the one speaking?
  id: totrans-345
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果视频中出现的人不是说话者怎么办？
- en: What if the person speaking is never seen in the video?
  id: totrans-346
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果说话的人从未在视频中出现过呢？
- en: How do we unconsciously identify who is speaking in a video?
  id: totrans-347
  prefs: []
  type: TYPE_NORMAL
  zh: 我们如何无意识地识别视频中的说话者是谁？
- en: First, probably by identifying the different voices on the fly?
  id: totrans-348
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 首先，可能是通过即时识别不同的声音？
- en: Then, probably by consolidating additional audio and visual cues?
  id: totrans-349
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 然后，可能是通过综合额外的音频和视觉线索？
- en: Can Gemini understand voice characteristics?
  id: totrans-350
  prefs: []
  type: TYPE_NORMAL
  zh: Gemini能否理解声音特征？
- en: '[PRE24]'
  id: totrans-351
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: '[PRE25]'
  id: totrans-352
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: '[PRE26]'
  id: totrans-353
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: '[PRE27]'
  id: totrans-354
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: What about a French video?
  id: totrans-355
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，一个法语视频呢？
- en: '[PRE28]'
  id: totrans-356
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: '[PRE29]'
  id: totrans-357
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: '[PRE30]'
  id: totrans-358
  prefs: []
  type: TYPE_PRE
  zh: '[PRE30]'
- en: '[PRE31]'
  id: totrans-359
  prefs: []
  type: TYPE_PRE
  zh: '[PRE31]'
- en: '⚠️ We have to be cautious here: responses can consolidate multimodal information
    or even general knowledge. For example, if a person is famous, their name is most
    likely part of the LLM’s knowledge. If they are known to be from the UK, a possible
    inference is that they have a British accent. This is why we made our prompt more
    specific by including “using only the video’s audio”.'
  id: totrans-360
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: ⚠️ 我们在这里必须谨慎：响应可以综合多模态信息甚至一般知识。例如，如果一个人是名人，他们的名字很可能是LLM知识的一部分。如果他们被知道来自英国，一个可能的推断是他们有英国口音。这就是我们通过包括“仅使用视频的音频”使我们的提示更加具体的原因。
- en: 💡 If you conduct more tests, for example on private audio files (i.e., not part
    of common knowledge and with no additional visual cues), you’ll see that Gemini’s
    audio tokenizer performs exceptionally well and extracts semantic speech information!
  id: totrans-361
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 💡 如果你进行更多测试，例如在私人音频文件上（即，不是公共知识的一部分，并且没有额外的视觉线索），你会发现Gemini的音频标记器表现异常出色，并提取语义语音信息！
- en: 'After a few iterations, we can arrive at a transcription prompt focusing on
    the audio and voices:'
  id: totrans-362
  prefs: []
  type: TYPE_NORMAL
  zh: 经过几次迭代，我们可以得到一个专注于音频和声音的转录提示：
- en: '[PRE32]'
  id: totrans-363
  prefs: []
  type: TYPE_PRE
  zh: '[PRE32]'
- en: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>**Output**
    🔽</summary>
  id: totrans-364
  prefs: []
  type: TYPE_NORMAL
  zh: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>**输出**
    🔽</summary>
- en: '[PRE33]'
  id: totrans-365
  prefs: []
  type: TYPE_PRE
  zh: '[PRE33]'
- en: '[PRE34]'
  id: totrans-366
  prefs: []
  type: TYPE_PRE
  zh: '[PRE34]'
- en: '[PRE35]</details>'
  id: totrans-367
  prefs: []
  type: TYPE_NORMAL
  zh: '[PRE35]</details>'
- en: This is looking good! And if you test these instructions on more complex videos,
    you’ll get similarly promising results.
  id: totrans-368
  prefs: []
  type: TYPE_NORMAL
  zh: 这看起来不错！如果你在更复杂的视频上测试这些指令，你会得到类似的有希望的结果。
- en: 'Notice how the prompt reuses cherry-picked terms from the terminology previously
    provided by Gemini, while aiming for precision and concision:'
  id: totrans-369
  prefs: []
  type: TYPE_NORMAL
  zh: 注意提示如何重复使用Gemini之前提供的术语，同时力求精确和简洁：
- en: '`verbatim` is unambiguous (unlike “spoken words”)'
  id: totrans-370
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`verbatim` 是明确的（与“口语”不同）'
- en: '`1, 2, 3, etc.` is an ellipsis (Gemini can infer the pattern)'
  id: totrans-371
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`1, 2, 3, 等.` 是省略号（Gemini可以推断模式）'
- en: '`timecode` is specific (`timestamp` has more meanings)'
  id: totrans-372
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`timecode` 是具体的（`timestamp` 有更多含义）'
- en: '`MM:SS` clarifies the timecode format'
  id: totrans-373
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`MM:SS` 明确了时间码格式'
- en: 💡 Gemini 2.0 was trained to understand the specific `MM:SS` timecode format.
    Gemini 2.5 also supports the `H:MM:SS` format for longer videos. For the latest
    updates, refer to the [video understanding documentation](https://cloud.google.com/vertex-ai/generative-ai/docs/multimodal/video-understanding).
  id: totrans-374
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 💡 Gemini 2.0被训练来理解特定的`MM:SS`时间码格式。Gemini 2.5也支持`H:MM:SS`格式，适用于更长的视频。有关最新更新，请参阅[视频理解文档](https://cloud.google.com/vertex-ai/generative-ai/docs/multimodal/video-understanding)。
- en: We’re halfway there. Let’s complete our database generation with a second task…
  id: totrans-375
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经完成了一半。让我们通过第二个任务来完成我们的数据库生成…
- en: '* * *'
  id: totrans-376
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 🧑 Speakers
  id: totrans-377
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 🧑 说话者
- en: 'The second task is pretty straightforward: we want to extract speaker information
    into a second table. The two tables are logically linked by the voice ID.'
  id: totrans-378
  prefs: []
  type: TYPE_NORMAL
  zh: 第二个任务相当直接：我们希望将说话者信息提取到第二个表格中。这两个表格通过声音ID逻辑上链接。
- en: 'After a few iterations, we can reach a two-task prompt like the following:'
  id: totrans-379
  prefs: []
  type: TYPE_NORMAL
  zh: 经过几次迭代，我们可以达到以下类似的双任务提示：
- en: '[PRE36]'
  id: totrans-380
  prefs: []
  type: TYPE_PRE
  zh: '[PRE36]'
- en: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>**Output**
    🔽</summary>
  id: totrans-381
  prefs: []
  type: TYPE_NORMAL
  zh: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>**输出**
    🔽</summary>
- en: '[PRE37]'
  id: totrans-382
  prefs: []
  type: TYPE_PRE
  zh: '[PRE37]'
- en: '[PRE38]'
  id: totrans-383
  prefs: []
  type: TYPE_PRE
  zh: '[PRE38]'
- en: '[PRE39]</details>'
  id: totrans-384
  prefs: []
  type: TYPE_NORMAL
  zh: '[PRE39]</details>'
- en: 'Test this prompt on more complex videos: it’s still looking good!'
  id: totrans-385
  prefs: []
  type: TYPE_NORMAL
  zh: 在更复杂的视频上测试这个提示：它看起来仍然不错！
- en: '* * *'
  id: totrans-386
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 🚀 Finalization
  id: totrans-387
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 🚀 最终化
- en: 🧩 Structured output
  id: totrans-388
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 🧩 结构化输出
- en: 'We’ve iterated towards a precise and concise prompt. Now, we can focus on Gemini’s
    response:'
  id: totrans-389
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经迭代到一个精确和简洁的提示。现在，我们可以专注于Gemini的响应：
- en: The response is plain text containing fenced code blocks
  id: totrans-390
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 响应是包含围栏代码块的纯文本
- en: Instead, we’d like a structured output, to receive consistently formatted responses
  id: totrans-391
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 相反，我们希望得到结构化的输出，以获得格式一致的响应
- en: Ideally, we’d also like to avoid having to parse the response, which can be
    a maintenance burden
  id: totrans-392
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 理想情况下，我们还想避免解析响应，这可能会成为维护负担
- en: Getting structured outputs is an LLM feature also called “controlled generation”.
    Since we’ve already crafted our prompt in terms of data tables and JSON fields,
    this is now a formality.
  id: totrans-393
  prefs: []
  type: TYPE_NORMAL
  zh: 获取结构化输出是LLM的一个功能，也称为“受控生成”。由于我们已经在数据表和JSON字段方面制作了我们的提示词，现在这只是一个形式。
- en: 'In our request, we can add the following parameters:'
  id: totrans-394
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的请求中，我们可以添加以下参数：
- en: '`response_mime_type="application/json"`'
  id: totrans-395
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`response_mime_type="application/json"`'
- en: '`response_schema="YOUR_JSON_SCHEMA"` ([docs](https://cloud.google.com/vertex-ai/generative-ai/docs/multimodal/control-generated-output#fields))'
  id: totrans-396
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`response_schema="YOUR_JSON_SCHEMA"` ([文档](https://cloud.google.com/vertex-ai/generative-ai/docs/multimodal/control-generated-output#fields))'
- en: 'In Python, this gets even easier:'
  id: totrans-397
  prefs: []
  type: TYPE_NORMAL
  zh: 在Python中，这变得更加简单：
- en: Use the `pydantic` library
  id: totrans-398
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用`pydantic`库
- en: Reflect your output structure with classes derived from `pydantic.BaseModel`
  id: totrans-399
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用从`pydantic.BaseModel`派生的类反映输出结构
- en: 'We can simplify the prompt by removing the output specification parts:'
  id: totrans-400
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以通过删除输出指定部分来简化提示词：
- en: '[PRE40]'
  id: totrans-401
  prefs: []
  type: TYPE_PRE
  zh: '[PRE40]'
- en: '… to move them to matching Python classes instead:'
  id: totrans-402
  prefs: []
  type: TYPE_NORMAL
  zh: …将它们移动到匹配的Python类中：
- en: '[PRE41]'
  id: totrans-403
  prefs: []
  type: TYPE_PRE
  zh: '[PRE41]'
- en: '… and request a structured response:'
  id: totrans-404
  prefs: []
  type: TYPE_NORMAL
  zh: …并请求结构化响应：
- en: '[PRE42]'
  id: totrans-405
  prefs: []
  type: TYPE_PRE
  zh: '[PRE42]'
- en: 'Finally, retrieving the objects from the response is also direct:'
  id: totrans-406
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，从响应中检索对象也是直接的：
- en: '[PRE43]'
  id: totrans-407
  prefs: []
  type: TYPE_PRE
  zh: '[PRE43]'
- en: 'The interesting aspects of this approach are the following:'
  id: totrans-408
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法的有趣之处如下：
- en: The prompt focuses on the logic and the classes focus on the output
  id: totrans-409
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示词侧重于逻辑，而类侧重于输出
- en: It’s easier to update and maintain typed classes
  id: totrans-410
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更容易更新和维护类型化类
- en: The JSON schema is automatically generated by the Gen AI SDK from the class
    provided in `response_schema` and dispatched to Gemini
  id: totrans-411
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: JSON模式由Gen AI SDK自动从`response_schema`中提供的类生成，并派发到Gemini
- en: The response is automatically parsed by the Gen AI SDK and deserialized into
    the corresponding Python objects
  id: totrans-412
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 响应会自动由Gen AI SDK解析并反序列化为相应的Python对象
- en: ⚠️ If you keep output specifications in your prompt, ensure there are no contradictions
    between the prompt and the schema (e.g., same field names and order), as this
    can negatively impact the quality of the responses.
  id: totrans-413
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: ⚠️ 如果你在提示词中保留输出指定部分，确保提示词和模式之间没有矛盾（例如，相同的字段名称和顺序），因为这可能会对响应质量产生负面影响。
- en: 💡 It’s possible to have more structural information directly in the schema (e.g.,
    detailed field definitions). See [Controlled generation](https://cloud.google.com/vertex-ai/generative-ai/docs/multimodal/control-generated-output).
  id: totrans-414
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 💡 有可能在模式中直接包含更多结构化信息（例如，详细的字段定义）。见 [受控生成](https://cloud.google.com/vertex-ai/generative-ai/docs/multimodal/control-generated-output)。
- en: '* * *'
  id: totrans-415
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: ✨ Implementation
  id: totrans-416
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ✨ 实现
- en: 'Let’s finalize our code. In addition, now that we have a stable prompt, we
    can even enrich our solution to extract each speaker’s `company`, `position`,
    and `role_in_video`:'
  id: totrans-417
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们完善我们的代码。此外，现在我们有一个稳定的提示词，我们甚至可以丰富我们的解决方案，以提取每个演讲者的`公司`、`职位`和`在视频中的角色`：
- en: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>**Final
    code** 🔽</summary>
  id: totrans-418
  prefs: []
  type: TYPE_NORMAL
  zh: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>**最终代码**
    🔽</summary>
- en: '[PRE44]</details>'
  id: totrans-419
  prefs: []
  type: TYPE_NORMAL
  zh: '[PRE44]</details>'
- en: 'Test it:'
  id: totrans-420
  prefs: []
  type: TYPE_NORMAL
  zh: 测试它：
- en: '[PRE45]'
  id: totrans-421
  prefs: []
  type: TYPE_PRE
  zh: '[PRE45]'
- en: '[PRE46]'
  id: totrans-422
  prefs: []
  type: TYPE_PRE
  zh: '[PRE46]'
- en: '* * *'
  id: totrans-423
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 📊 Data visualization
  id: totrans-424
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
