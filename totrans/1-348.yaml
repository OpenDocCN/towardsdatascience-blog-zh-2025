  zh: 在 [Google AI Studio](https://aistudio.google.com) 免费进行实验，并获取一个 API 密钥以程序化调用
    Gemini
- en: Explore additional use cases in the [Vertex AI Prompt Gallery](https://console.cloud.google.com/vertex-ai/studio/prompt-gallery)
  id: totrans-696
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在 [Vertex AI 提示画廊](https://console.cloud.google.com/vertex-ai/studio/prompt-gallery)
    中探索更多用例
- en: Stay updated by following the [Vertex AI Release Notes](https://cloud.google.com/vertex-ai/generative-ai/docs/release-notes)
  id: totrans-697
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过关注 [Vertex AI 发布说明](https://cloud.google.com/vertex-ai/generative-ai/docs/release-notes)
    来保持更新
