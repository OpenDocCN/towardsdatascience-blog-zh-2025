- en: Unlocking Multimodal Video Transcription with Gemini
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/unlocking-multimodal-video-transcription-with-gemini/](https://towardsdatascience.com/unlocking-multimodal-video-transcription-with-gemini/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '*A quick heads-up before we start:*'
  prefs: []
  type: TYPE_NORMAL
- en: '*I’m a developer at Google Cloud. I’m happy to share this article and hope
    you’ll learn a few things. Thoughts and opinions are entirely my own.*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*You can find the source code for this article (including future updates)*
    *in [this notebook](https://github.com/GoogleCloudPlatform/generative-ai/blob/main/gemini/use-cases/video-analysis/multimodal_video_transcription.ipynb)
    (Apache License version 2.0).*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*You can experiment for free with Gemini in [Google AI Studio](https://aistudio.google.com)
    and get an API key to call Gemini programmatically.*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*All images, unless otherwise noted, are by me.*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: ✨ Overview
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Traditional machine learning (ML) perception models typically focus on specific
    features and single modalities, deriving insights solely from natural language,
    speech, or vision analysis. Historically, extracting and consolidating information
    from multiple modalities has been challenging due to siloed processing, complex
    architectures, and the risk of data being “lost in translation.” However, multimodal
    and long-context large language models (LLMs) like Gemini can overcome these issues
    by processing all modalities within the same context, opening new possibilities.
  prefs: []
  type: TYPE_NORMAL
- en: 'Moving beyond speech-to-text, this article explores how to achieve comprehensive
    video transcriptions by leveraging all available modalities. It covers the following
    topics:'
  prefs: []
  type: TYPE_NORMAL
- en: A methodology for addressing new or complex problems with a multimodal LLM
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'A prompt technique for decoupling data and preserving attention: tabular extraction'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Strategies for making the most of Gemini’s 1M-token context in a single request
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Practical examples of multimodal video transcriptions
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Tips & optimizations
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 🔥 Challenge
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'To fully transcribe a video, we’re looking to answer the following questions:'
  prefs: []
  type: TYPE_NORMAL
- en: 1️⃣ What was said and when?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 2️⃣ Who are the speakers?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 3️⃣ Who said what?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Can we solve this problem in a straightforward and efficient way?
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 🌟 State of the art
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 1️⃣ What was said and when?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'This is a known problem with an existing solution:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Speech-to-Text** (STT) is a process that takes an audio input and transforms
    speech into text. STT can provide timestamps at the word level. It is also known
    as automatic speech recognition (ASR).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In the last decade, task-specific ML models have most effectively addressed
    this.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 2️⃣ Who are the speakers?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'We can retrieve speaker names in a video from two sources:'
  prefs: []
  type: TYPE_NORMAL
- en: '**What’s written** (e.g., speakers can be introduced with on-screen information
    when they first speak)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**What’s spoken** (e.g., “Hello Bob! Alice! How are you doing?”)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Vision and Natural Language Processing (NLP) models can help with the following
    features:'
  prefs: []
  type: TYPE_NORMAL
- en: Vision: **Optical Character Recognition** (OCR), also called text detection,
    extracts the text visible in images.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Vision: **Person Detection** identifies if and where people are in an image.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: NLP: **Entity Extraction** can identify named entities in text.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 3️⃣ Who said what?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'This is another known problem with a partial solution (complementary to Speech-to-Text):'
  prefs: []
  type: TYPE_NORMAL
- en: '**Speaker Diarization** (also known as speaker turn segmentation) is a process
    that splits an audio stream into segments for the different detected speakers
    (“Speaker A”, “Speaker B”, etc.).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Researchers have made significant progress in this field for decades, particularly
    with ML models in recent years, but this is still an active field of research.
    Existing solutions have shortcomings: they often require human supervision and
    hints (e.g., the minimum and maximum number of speakers, the language spoken),
    and typically support only a limited set of languages.'
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 🏺 Traditional ML pipeline
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Solving all of 1️⃣, 2️⃣, and 3️⃣ isn’t straightforward. This would likely involve
    setting up an elaborate supervised processing pipeline, based on a few state-of-the-art
    ML models, such as the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '![a traditional ml pipeline (L. Picard)](../Images/d3ac36cad4581b9df31d67976bd2c282.png)'
  prefs: []
  type: TYPE_IMG
- en: We might need days or weeks to design and set up such a pipeline. Additionally,
    at the time of writing, our multimodal-video-transcription challenge is not a
    solved problem, so there’s absolutely no certainty of reaching a viable solution.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 💡 A new problem-solving toolbox
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Gemini allows for rapid prompt-based problem solving. With just text instructions,
    we can extract information and transform it into new insights, through a straightforward
    and automated workflow.
  prefs: []
  type: TYPE_NORMAL
- en: 🎬 Multimodal
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Gemini is natively multimodal, which means it can process different types of
    inputs:'
  prefs: []
  type: TYPE_NORMAL
- en: text
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: image
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: audio
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: video
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: document
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 🌐 Multilingual
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Gemini is also [multilingual](https://cloud.google.com/vertex-ai/generative-ai/docs/learn/models#languages-gemini):'
  prefs: []
  type: TYPE_NORMAL
- en: It can process inputs and generate outputs in 100+ languages
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If we can solve the video challenge for one language, that solution should naturally
    extend to all other languages
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 🧰 A natural-language toolbox
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Multimodal and multilingual understanding in a single model lets us shift from
    relying on task-specific ML models to using a single versatile LLM.
  prefs: []
  type: TYPE_NORMAL
- en: 'Our challenge now looks a lot simpler:'
  prefs: []
  type: TYPE_NORMAL
- en: '![natural-language toolbox with gemini (L. Picard)](../Images/df07791d6ee41fb3019ad9da523287e0.png)'
  prefs: []
  type: TYPE_IMG
- en: 'In other words, let’s rephrase our challenge: Can we fully transcribe a video
    with just the following?'
  prefs: []
  type: TYPE_NORMAL
- en: 1 video
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 1 prompt
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 1 request
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Let’s try with Gemini…
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 🏁 Setup
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 🐍 Python packages
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'We’ll use the following packages:'
  prefs: []
  type: TYPE_NORMAL
- en: '`google-genai`: the [Google Gen AI Python SDK](https://pypi.org/project/google-genai) lets
    us call Gemini with a few lines of code'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`pandas` for data visualization'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'We’ll also use these packages (dependencies of `google-genai`):'
  prefs: []
  type: TYPE_NORMAL
- en: '`pydantic` for data management'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`tenacity` for request management'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 🔗 Gemini API
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'We have two main options to send requests to Gemini:'
  prefs: []
  type: TYPE_NORMAL
- en: '[Vertex AI](https://cloud.google.com/vertex-ai/generative-ai/docs): Build enterprise-ready
    projects on Google Cloud'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Google AI Studio](https://aistudio.google.com): Experiment, prototype, and
    deploy small projects'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The Google Gen AI SDK provides a unified interface to these APIs and we can
    use environment variables for the configuration.
  prefs: []
  type: TYPE_NORMAL
- en: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>**Option
    A – Gemini API via Vertex AI** 🔽</summary>
  prefs: []
  type: TYPE_NORMAL
- en: 'Requirement:'
  prefs: []
  type: TYPE_NORMAL
- en: A Google Cloud project
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The [Vertex AI API](https://console.cloud.google.com/flows/enableapi?apiid=aiplatform.googleapis.com) must
    be enabled for this project
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Gen AI SDK environment variables:'
  prefs: []
  type: TYPE_NORMAL
- en: '`GOOGLE_GENAI_USE_VERTEXAI="True"`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`GOOGLE_CLOUD_PROJECT="<PROJECT_ID>"`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`GOOGLE_CLOUD_LOCATION="<LOCATION>"` (see [Google model endpoint locations](https://cloud.google.com/vertex-ai/generative-ai/docs/learn/locations#google_model_endpoint_locations))'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Learn more about [setting up a project and a development environment](https://cloud.google.com/vertex-ai/docs/start/cloud-environment).</details>
    <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>**Option
    B – Gemini API via Google AI Studio** 🔽</summary>
  prefs: []
  type: TYPE_NORMAL
- en: 'Requirement:'
  prefs: []
  type: TYPE_NORMAL
- en: A Gemini API key
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Gen AI SDK environment variables:'
  prefs: []
  type: TYPE_NORMAL
- en: '`GOOGLE_GENAI_USE_VERTEXAI="False"`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`GOOGLE_API_KEY="<API_KEY>"`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Learn more about [getting a Gemini API key from Google AI Studio](https://aistudio.google.com/app/apikey).</details>
  prefs: []
  type: TYPE_NORMAL
- en: '💡 You can store your environment configuration outside of the source code:'
  prefs: []
  type: TYPE_NORMAL
- en: '| Environment | Method |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| IDE | `.env` file (or equivalent) |'
  prefs: []
  type: TYPE_TB
- en: '| Colab | Colab Secrets (🗝️ icon in left panel, see code below) |'
  prefs: []
  type: TYPE_TB
- en: '| Colab Enterprise | Google Cloud project and location are automatically defined
    |'
  prefs: []
  type: TYPE_TB
- en: '| Vertex AI Workbench | Google Cloud project and location are automatically
    defined |'
  prefs: []
  type: TYPE_TB
- en: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>Define
    the following environment detection functions. You can also define your configuration
    manually if needed. 🔽</summary>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]</details>'
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 🤖 Gen AI SDK
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'To send Gemini requests, create a `google.genai` client:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: 'Check your configuration:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 🧠 Gemini model
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Gemini comes in different [versions](https://cloud.google.com/vertex-ai/generative-ai/docs/learn/models#gemini-models).
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s get started with Gemini 2.0 Flash, as it offers both high performance
    and low latency:'
  prefs: []
  type: TYPE_NORMAL
- en: '`GEMINI_2_0_FLASH = "gemini-2.0-flash"`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 💡 We select Gemini 2.0 Flash intentionally. The Gemini 2.5 model family is generally
    available and even more capable, but we want to experiment and understand Gemini’s
    core multimodal behavior. If we complete our challenge with 2.0, this should also
    work with newer models.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: ⚙️ Gemini configuration
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Gemini can be used in different ways, ranging from factual to creative mode.
    The problem we’re trying to solve is a **data extraction** use case. We want results
    as factual and deterministic as possible. For this, we can change the [content
    generation parameters](https://cloud.google.com/vertex-ai/generative-ai/docs/multimodal/content-generation-parameters).
  prefs: []
  type: TYPE_NORMAL
- en: 'We’ll set the `temperature`, `top_p`, and `seed` parameters to minimize randomness:'
  prefs: []
  type: TYPE_NORMAL
- en: '`temperature=0.0`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`top_p=0.0`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`seed=42` (arbitrary fixed value)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 🎞️ Video sources
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Here are the main video sources that Gemini can analyze:'
  prefs: []
  type: TYPE_NORMAL
- en: '| source | URI | Vertex AI | Google AI Studio |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| Google Cloud Storage | `gs://bucket/path/to/video.*` | ✅ |  |'
  prefs: []
  type: TYPE_TB
- en: '| Web URL | `https://path/to/video.*` | ✅ |  |'
  prefs: []
  type: TYPE_TB
- en: '| YouTube | `https://www.youtube.com/watch?v=YOUTUBE_ID` | ✅ | ✅ |'
  prefs: []
  type: TYPE_TB
- en: ⚠️ Important notes
  prefs: []
  type: TYPE_NORMAL
- en: Our video test suite primarily uses public YouTube videos. This is for simplicity.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When analyzing YouTube sources, Gemini receives raw audio/video streams without
    any additional metadata, exactly as if processing the corresponding video files
    from Cloud Storage.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: YouTube does offer caption/subtitle/transcript features (user-provided or auto-generated).
    However, these features focus on word-level speech-to-text and are limited to
    40+ languages. Gemini does not receive any of this data and you’ll see that a
    multimodal transcription with Gemini provides additional benefits.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Furthermore, our challenge also involves identifying speakers and extracting
    speaker data, a unique new capability.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 🛠️ Helpers
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>Define
    our helper functions and data 🔽</summary>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]</details>'
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 🧪 Prototyping
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 🌱 Natural behavior
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Before diving any deeper, it’s interesting to see how Gemini responds to simple
    instructions, to develop some intuition about its natural behavior.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s first see what we get with minimalistic prompts and a short English video.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Video ([source](https://www.youtube.com/watch?v=0pJn3g8dfwk))
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: 'Results:'
  prefs: []
  type: TYPE_NORMAL
- en: Gemini naturally outputs a list of `[time] transcript` lines.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: That’s Speech-to-Text in one line!
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It looks like we can answer “1️⃣ What was said and when?”.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Now, what about “2️⃣ Who are the speakers?”
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: 'Results:'
  prefs: []
  type: TYPE_NORMAL
- en: Gemini can consolidate the names visible on title cards during the video.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: That’s OCR + entity extraction in one line!
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: “2️⃣ Who are the speakers?” looks solved too!
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: ⏩ Not so fast!
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The natural next step is to jump to the final instructions, to solve our problem
    once and for all.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: This is almost correct. The first segment is not attributed to the host (who
    is only introduced a bit later), but everything else looks correct.
  prefs: []
  type: TYPE_NORMAL
- en: 'Nonetheless, these are not real-world conditions:'
  prefs: []
  type: TYPE_NORMAL
- en: The video is very short (less than a minute)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The video is also rather simple (speakers are clearly introduced with on-screen
    title cards)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Let’s try with this 8-minute (and more complex) video:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>**Output**
    🔽</summary>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]</details>'
  prefs: []
  type: TYPE_NORMAL
- en: 'This falls apart: Most segments have no identified speaker!'
  prefs: []
  type: TYPE_NORMAL
- en: As we are trying to solve a new complex problem, LLMs haven’t been trained on
    any known solution. This is likely why direct instructions do not yield the expected
    answer.
  prefs: []
  type: TYPE_NORMAL
- en: 'At this stage:'
  prefs: []
  type: TYPE_NORMAL
- en: We might conclude that we can’t solve the problem with real-world videos.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Persevering by trying more and more elaborate prompts for this unsolved problem
    might result in a waste of time.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Let’s take a step back and think about what happens under the hood…
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: ⚛️ Under the hood
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Modern LLMs are mostly based on the Transformer architecture, a new neural network
    design detailed in a 2017 paper by Google researchers titled [Attention Is All
    You Need](https://arxiv.org/abs/1706.03762). The paper introduced the self-attention
    mechanism, a key innovation that fundamentally changed the way machines process
    language.
  prefs: []
  type: TYPE_NORMAL
- en: 🪙 Tokens
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Tokens are the LLM building blocks. We can consider a token to represent a piece
    of information.
  prefs: []
  type: TYPE_NORMAL
- en: 'Examples of Gemini multimodal tokens (with default parameters):'
  prefs: []
  type: TYPE_NORMAL
- en: '| content | tokens | details |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| `hello` | 1 | 1 token for common words/sequences |'
  prefs: []
  type: TYPE_TB
- en: '| `passionately` | 2 | `passion•ately` |'
  prefs: []
  type: TYPE_TB
- en: '| `passionnément` | 3 | `passion•né•ment` (same adverb in French) |'
  prefs: []
  type: TYPE_TB
- en: '| image | 258 | per image (or per tile depending on image resolution) |'
  prefs: []
  type: TYPE_TB
- en: '| audio without timecodes | 25 / second | handled by the audio tokenizer |'
  prefs: []
  type: TYPE_TB
- en: '| video without audio | 258 / frame | handled by the video tokenizer at 1 frame
    per second |'
  prefs: []
  type: TYPE_TB
- en: '| `MM:SS` timecode | 5 | audio chunk or video frame temporal reference |'
  prefs: []
  type: TYPE_TB
- en: '| `H:MM:SS` timecode | 7 | similarly, for content longer than 1 hour |'
  prefs: []
  type: TYPE_TB
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 🎞️ Sampling frame rate
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: By default, video frames are sampled at 1 frame per second (1 FPS). These frames
    are included in the context with their corresponding timecodes.
  prefs: []
  type: TYPE_NORMAL
- en: 'You can use a custom sampling frame rate with the `Part.video_metadata.fps` parameter:'
  prefs: []
  type: TYPE_NORMAL
- en: '| video type | change | fps range |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| static, slow | decrease the frame rate | `0.0 < fps < 1.0` |'
  prefs: []
  type: TYPE_TB
- en: '| dynamic, fast | increase the frame rate | `1.0 < fps <= 24.0` |'
  prefs: []
  type: TYPE_TB
- en: 💡 For `1.0 < fps`, Gemini was trained to understand `MM:SS.sss` and `H:MM:SS.sss` timecodes.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 🔍 Media resolution
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: By default, each sampled frame is represented with 258 tokens.
  prefs: []
  type: TYPE_NORMAL
- en: 'You can specify a medium or low media resolution with the `GenerateContentConfig.media_resolution` parameter:'
  prefs: []
  type: TYPE_NORMAL
- en: '| media_resolution for video inputs | tokens/ frame | benefit |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| `MEDIA_RESOLUTION_MEDIUM` (default) | 258 | higher precision, allowing for
    more detailed understanding |'
  prefs: []
  type: TYPE_TB
- en: '| `MEDIA_RESOLUTION_LOW` | 66 | faster and cheaper inference, allowing for
    longer videos |'
  prefs: []
  type: TYPE_TB
- en: '💡 The “media resolution” can be seen as the “image token resolution”: the number
    of tokens used to represent an image.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 🧮 Probabilities all the way down
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The ability of LLMs to communicate in flawless natural language is very impressive,
    but it’s easy to get carried away and make incorrect assumptions.
  prefs: []
  type: TYPE_NORMAL
- en: 'Keep in mind how LLMs work:'
  prefs: []
  type: TYPE_NORMAL
- en: An LLM is trained on a massive tokenized dataset, which represents its knowledge
    (its long-term memory)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: During the training, its neural network learns token patterns
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When you send a request to an LLM, your inputs are transformed into tokens (tokenization)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: To answer your request, the LLM predicts, token by token, the next likely tokens
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Overall, LLMs are exceptional statistical token prediction machines that seem
    to mimic how some parts of our brain work
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'This has a few consequences:'
  prefs: []
  type: TYPE_NORMAL
- en: LLM outputs are just statistically likely follow-ups to your inputs
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'LLMs show some forms of reasoning: they can match complex patterns but have
    no actual deep understanding'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'LLMs have no consciousness: they are designed to generate tokens and will do
    so based on your instructions'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Order matters: Tokens that are generated first will influence tokens that are
    generated next'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For the next step, some methodical prompt crafting might help…
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 🏗️ Prompt crafting
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 🪜 Methodology
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Prompt crafting, also called prompt engineering, is a relatively new field.
    It involves designing and refining text instructions to guide LLMs towards generating
    desired outputs. Like writing, it is both an art and a science, a skill that everyone
    can develop with practice.
  prefs: []
  type: TYPE_NORMAL
- en: 'We can find countless reference materials about prompt crafting. Some prompts
    can be very long, complex, and even scary. Crafting prompts with a high-performing
    LLM like Gemini is much simpler. Here are three key adjectives to keep in mind:'
  prefs: []
  type: TYPE_NORMAL
- en: iterative
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: precise
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: concise
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Iterative**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Prompt crafting is typically an iterative process. Here are some recommendations:'
  prefs: []
  type: TYPE_NORMAL
- en: Craft your prompt step by step
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Keep track of your successive iterations
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: At every iteration, make sure to measure what’s working versus what’s not
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If you reach a regression, backtrack to a successful iteration
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Precise**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Precision is key:'
  prefs: []
  type: TYPE_NORMAL
- en: Use words as specific as possible
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Words with multiple meanings can introduce variability, so use precise expressions
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Precision will influence probabilities in your favor
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Concise**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Concision has additional advantages:'
  prefs: []
  type: TYPE_NORMAL
- en: A short prompt is easier for us developers to understand (and maintain!)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The longer your prompt is, the more likely you are to introduce inconsistencies
    or even contradictions, which results in variable interpretations of your instructions
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Test and trust the LLM’s knowledge: this knowledge acts as an implicit context
    and can make your prompt shorter and clearer'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Overall, though this may seem contradictory, if you take the time to be iterative,
    precise, and concise, you are likely to save a lot of time.
  prefs: []
  type: TYPE_NORMAL
- en: 💡 If you want to explore this topic, check out [Prompting strategies](https://cloud.google.com/vertex-ai/generative-ai/docs/learn/prompts/prompt-design-strategies) (Google
    Cloud reference) and [Prompt engineering](https://www.kaggle.com/whitepaper-prompt-engineering) (68-page
    PDF by Lee Boonstra).
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 📚 Terminology
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We’re not experts in video transcription (yet!) but we want Gemini to behave
    as one. Consequently, we’d like to write prompts as specific as possible for this
    use case. While LLMs process instructions based on their training knowledge, they
    can also share this knowledge with us.
  prefs: []
  type: TYPE_NORMAL
- en: 'We can learn a lot by directly asking Gemini:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>**Output**
    🔽</summary>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: '00:00:00 --> 00:00:03 Interviewer: So, Chef, welcome to the show!'
  prefs: []
  type: TYPE_NORMAL
- en: '00:00:03 --> 00:00:06 Chef: Thank you for having me. It''s, uh, great to be
    here.'
  prefs: []
  type: TYPE_NORMAL
- en: '00:00:06 --> 00:00:12 Interviewer: So, tell us a little bit about your new
    restaurant, "The Golden Spoon."'
  prefs: []
  type: TYPE_NORMAL
- en: '00:00:12 --> 00:00:20 Chef: Well, um, it''s, it''s been a dream of mine for,
    like, years, you know?  To, like, open a place that really focuses on, um, seasonal
    ingredients.'
  prefs: []
  type: TYPE_NORMAL
- en: '00:00:20 --> 00:00:25 Interviewer: And what kind of cuisine can people expect?'
  prefs: []
  type: TYPE_NORMAL
- en: '00:00:25 --> 00:00:32 Chef: We''re doing, uh, modern American, but with, like,
    a real emphasis on, uh, local farms and, you know, sustainable practices.'
  prefs: []
  type: TYPE_NORMAL
