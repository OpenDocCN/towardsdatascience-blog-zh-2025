  zh: '| 38:58 | Allegiant Stadium | 忠诚体育场 |'
- en: '| 1:29:07 | Snyk | Sneak |'
  id: totrans-567
  prefs: []
  type: TYPE_TB
  zh: '| 1:29:07 | Snyk | 悄悄 |'
- en: 'We’ll stop our exploration here and leave it as an exercise, but here are possible
    ways to fix these errors, in order of simplicity/cost:'
  id: totrans-568
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在这里停止探索，将其留作练习，但以下是可能的错误修复方法，按简单/成本排序：
- en: Update the prompt to use visual cues for proper nouns, such as *“Ensure all
    proper nouns (people, companies, products, etc.) are spelled correctly and consistently.
    Prioritize on-screen text for reference.”*
  id: totrans-569
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更新提示以使用视觉提示来表示专有名词，例如*“确保所有专有名词（人名、公司、产品等）拼写正确且一致。优先考虑屏幕文本作为参考。”*
- en: Enrich the prompt with an additional preliminary table to extract the proper
    nouns and use them explicitly in the context
  id: totrans-570
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在提示中添加一个额外的初步表格以提取专有名词，并在上下文中明确使用它们
- en: Add available video context metadata in the prompt
  id: totrans-571
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在提示中添加可用的视频上下文元数据
- en: Split the prompt into two successive requests
  id: totrans-572
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将提示分成两个连续的请求
- en: '* * *'
  id: totrans-573
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 📈 Tips & optimizations
  id: totrans-574
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 📈 小贴士与优化
- en: 🔧 Model selection
  id: totrans-575
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 🔧 模型选择
- en: Each model can differ in terms of performance, speed, and cost.
  id: totrans-576
  prefs: []
  type: TYPE_NORMAL
  zh: 每个模型在性能、速度和成本方面可能有所不同。
- en: 'Here’s a practical summary based on the model specifications, our video test
    suite, and the current prompt:'
  id: totrans-577
  prefs: []
  type: TYPE_NORMAL
  zh: 基于模型规格、我们的视频测试套件和当前提示，以下是一个实用的总结：
- en: '| Model | Performance | Speed | Cost | Max. input tokens | Max. output tokens
    | Video type |'
  id: totrans-578
  prefs: []
  type: TYPE_TB
  zh: '| 模型 | 性能 | 速度 | 成本 | 最大输入标记数 | 最大输出标记数 | 视频类型 |'
- en: '| --- | --- | --- | --- | --- | --- | --- |'
  id: totrans-579
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- | --- | --- | --- | --- |'
- en: '| Gemini 2.0 Flash | ⭐⭐ | ⭐⭐⭐ | ⭐⭐⭐ | 1,048,576 = 1M | 8,192 = 8k | Standard
    video, up to 25min |'
  id: totrans-580
  prefs: []
  type: TYPE_TB
  zh: '| Gemini 2.0 Flash | ⭐⭐ | ⭐⭐⭐ | ⭐⭐⭐ | 1,048,576 = 1M | 8,192 = 8k | 标准视频，最长25分钟
    |'
- en: '| Gemini 2.5 Flash | ⭐⭐ | ⭐⭐ | ⭐⭐ | 1,048,576 = 1M | 65,536 = 64k | Standard
    video, 25min+ |'
  id: totrans-581
  prefs: []
  type: TYPE_TB
  zh: '| Gemini 2.5 Flash | ⭐⭐ | ⭐⭐ | ⭐⭐ | 1,048,576 = 1M | 65,536 = 64k | 标准视频，25分钟以上
    |'
- en: '| Gemini 2.5 Pro | ⭐⭐⭐ | ⭐ | ⭐ | 1,048,576 = 1M | 65,536 = 64k | Complex video
    or 1h+ video |'
  id: totrans-582
  prefs: []
  type: TYPE_TB
  zh: '| Gemini 2.5 Pro | ⭐⭐⭐ | ⭐ | ⭐ | 1,048,576 = 1M | 65,536 = 64k | 复杂视频或1小时以上视频
    |'
- en: '* * *'
  id: totrans-583
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 🔧 Video segment
  id: totrans-584
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 🔧 视频片段
- en: You don’t always need to analyze videos from start to finish. You can indicate
    a video segment with start and/or end offsets in the [VideoMetadata](https://cloud.google.com/vertex-ai/generative-ai/docs/reference/rpc/google.cloud.aiplatform.v1#videometadata) structure.
  id: totrans-585
  prefs: []
  type: TYPE_NORMAL
  zh: 你不一定需要分析视频的从头到尾。你可以在[VideoMetadata](https://cloud.google.com/vertex-ai/generative-ai/docs/reference/rpc/google.cloud.aiplatform.v1#videometadata)结构中指定起始和/或结束偏移量来指示视频片段。
- en: 'In this example, Gemini will only analyze the 30:00-50:00 segment of the video:'
  id: totrans-586
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，Gemini将只分析视频的30:00-50:00片段：
- en: '[PRE63]'
  id: totrans-587
  prefs: []
  type: TYPE_PRE
  zh: '[PRE63]'
- en: '* * *'
  id: totrans-588
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 🔧 Media resolution
  id: totrans-589
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 🔧 媒体分辨率
- en: In our test suite, the videos are fairly standard. We got excellent results
    by using a “low” media resolution (“medium” being the default), specified with
    the `GenerateContentConfig.media_resolution` parameter.
  id: totrans-590
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的测试套件中，视频相当标准。我们通过使用“低”媒体分辨率（“中等”是默认值）并使用`GenerateContentConfig.media_resolution`参数来指定，获得了优异的结果。
- en: 💡 This provides faster and cheaper inferences, while also enabling the analysis
    of videos that are three times as long.
  id: totrans-591
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 💡 这提供了更快、更便宜的推理，同时还能分析三倍长度的视频。
- en: 'We used a simple heuristic based on video duration, but you might want to make
    it dynamic on a per-video basis:'
  id: totrans-592
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用了一个基于视频持续时间的简单启发式方法，但你可能希望根据每个视频动态调整它：
- en: '[PRE64]'
  id: totrans-593
  prefs: []
  type: TYPE_PRE
  zh: '[PRE64]'
- en: '⚠️ If you select a “low” media resolution and experience an apparent loss of
    understanding, you might be losing important details in the sampled video frames.
    This is easy to fix: switch back to the default media resolution.'
  id: totrans-594
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: ⚠️ 如果你选择“低”媒体分辨率并发现理解明显下降，你可能在采样的视频帧中丢失了重要细节。这很容易解决：切换回默认媒体分辨率。
- en: '* * *'
  id: totrans-595
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 🔧 Sampling frame rate
  id: totrans-596
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 🔧 样本帧率
- en: 'The default sampling frame rate of 1 FPS worked fine in our tests. You might
    want to customize it for each video:'
  id: totrans-597
  prefs: []
  type: TYPE_NORMAL
  zh: 默认的采样帧率为1 FPS在我们的测试中效果良好。你可能希望为每个视频自定义它：
- en: '[PRE65]'
  id: totrans-598
  prefs: []
  type: TYPE_PRE
  zh: '[PRE65]'
- en: '💡 You can mix the parameters. In this extreme example, assuming the input video
    has a 24fps frame rate, all frames will be sampled for a 10s segment:'
  id: totrans-599
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 💡 你可以混合使用参数。在这个极端例子中，假设输入视频的帧率为24fps，所有帧都将被采样以获取10秒的片段：
- en: '[PRE66]'
  id: totrans-600
  prefs: []
  type: TYPE_PRE
  zh: '[PRE66]'
- en: ⚠️ If you use a higher sampling rate, this multiplies the number of frames (and
    tokens) accordingly, increasing latency and cost. As `10s × 24fps = 240 frames
    = 4×60s × 1fps`, this 10-second analysis at 24 FPS is equivalent to a 4-minute
    default analysis at 1 FPS.
  id: totrans-601
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: ⚠️ 如果你使用更高的采样率，这将相应地增加帧数（和标记数），从而增加延迟和成本。例如，`10s × 24fps = 240 frames = 4×60s
    × 1fps`，在24 FPS下的这10秒分析相当于在1 FPS下的4分钟默认分析。
- en: '* * *'
  id: totrans-602
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 🎯 Precision vs recall
  id: totrans-603
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 🎯 精确度 vs 召回率
- en: 'The prompt can influence the precision and recall of our data extractions,
    especially when using explicit versus implicit wording. If you want more qualitative
    results, favor precision using explicit wording; if you want more quantitative
    results, favor recall using implicit wording:'
  id: totrans-604
  prefs: []
  type: TYPE_NORMAL
  zh: 提示可以影响我们数据提取的精确度和召回率，尤其是在使用明确与隐晦措辞时。如果你想得到更多定性结果，倾向于使用明确措辞的精确度；如果你想得到更多定量结果，倾向于使用隐晦措辞的召回率：
- en: '| wording | favors | generates fewer | LLM behavior |'
  id: totrans-605
  prefs: []
  type: TYPE_TB
  zh: '| wording | favors | generates fewer | LLM behavior |'
- en: '| --- | --- | --- | --- |'
  id: totrans-606
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- | --- |'
- en: '| explicit | precision | false positives | relies more (or only) on the provided
    context |'
  id: totrans-607
  prefs: []
  type: TYPE_TB
  zh: '| explicit | precision | false positives | relies more (or only) on the provided
    context |'
- en: '| implicit | recall | false negatives | relies on the overall context, infers
    more, and can use its training knowledge |'
  id: totrans-608
  prefs: []
  type: TYPE_TB
  zh: '| implicit | recall | false negatives | relies on the overall context, infers
    more, and can use its training knowledge |'
- en: 'Here are examples that can lead to subtly different results:'
  id: totrans-609
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些可能导致细微不同的结果的示例：
- en: '| wording | verbs | qualifiers |'
  id: totrans-610
  prefs: []
  type: TYPE_TB
  zh: '| wording | verbs | qualifiers |'
- en: '| --- | --- | --- |'
  id: totrans-611
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| explicit | “extract”, “quote” | “stated”, “direct”, “exact”, “verbatim” |'
  id: totrans-612
  prefs: []
  type: TYPE_TB
  zh: '| explicit | “extract”， “quote” | “stated”， “direct”， “exact”， “verbatim” |'
- en: '| implicit | “identify”, “deduce” | “found”, “indirect”, “possible”, “potential”
    |'
  id: totrans-613
  prefs: []
  type: TYPE_TB
  zh: '| implicit | “identify”， “deduce” | “found”， “indirect”， “possible”， “potential”
    |'
- en: 💡 Different models can also behave differently for the same prompt. In particular,
    more performant models might seem more “confident” and make more implicit inferences
    or consolidations.
  id: totrans-614
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 💡 不同的模型对于相同的提示也可能表现出不同的行为。特别是，性能更好的模型可能看起来更“自信”，并做出更多隐含的推断或巩固。
- en: 💡 As an example, in this [AlphaFold video](https://youtu.be/gg7WjuFs8F4?t=297),
    at the 04:57 timecode, “Spring 2020” is first displayed as context. Then, a short
    declaration from “The Prime Minister” is heard in the background (“You must stay
    at home”) without any other hints. When asked to “identify” (rather than “extract”)
    the speaker, Gemini is likely to infer more and attribute the voice to “Boris
    Johnson”. There’s absolutely no explicit mention of Boris Johnson; his identity
    is correctly inferred from the context (“UK”, “Spring 2020”, and “The Prime Minister”).
  id: totrans-615
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 💡 例如，在这[AlphaFold视频](https://youtu.be/gg7WjuFs8F4?t=297)中，在04:57的时间码处，“Spring
    2020”首先作为上下文显示。然后，在背景中听到“首相”的简短声明（“你必须待在家里”），没有任何其他提示。当被要求“识别”（而不是“提取”）说话者时，Gemini可能会做出更多推断，并将声音归因于“鲍里斯·约翰逊”。完全没有提到鲍里斯·约翰逊；他的身份是从上下文中正确推断出来的（“UK”，“Spring
    2020”和“首相”）。
- en: '* * *'
  id: totrans-616
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 🏷️ Metadata
  id: totrans-617
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 🏷️ 元数据
- en: In our current tests, Gemini only uses audio and frame tokens, tokenized from
    sources on Google Cloud Storage or YouTube. If you have additional video metadata,
    this can be a goldmine; try to add it to your prompt and enrich the video context
    for better results upfront.
  id: totrans-618
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们当前的测试中，Gemini仅使用来自谷歌云存储或YouTube的源音频和帧标记。如果您有额外的视频元数据，这可能是一笔财富；尝试将其添加到您的提示中，以在最初就丰富视频上下文，从而获得更好的结果。
- en: 'Potentially helpful metadata:'
  id: totrans-619
  prefs: []
  type: TYPE_NORMAL
  zh: 可能有帮助的元数据：
- en: 'Video description: This can provide a better understanding of where and when
    the video was shot.'
  id: totrans-620
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 视频描述：这可以提供对视频拍摄地点和时间的更好理解。
- en: 'Speaker info: This can help auto-correct names that are only heard and not
    obvious to spell.'
  id: totrans-621
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 说话者信息：这有助于自动纠正只听到但拼写不明显的姓名。
- en: 'Entity info: Overall, this can help get better transcriptions for custom or
    private data.'
  id: totrans-622
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 实体信息：总体而言，这有助于为定制或私人数据获得更好的转录。
- en: 💡 For YouTube videos, no additional metadata or transcript is fetched. Gemini
    only receives the raw audio and video streams. You can check this yourself by
    comparing your results with YouTube’s automatic captioning (no punctuation, audio
    only) or user-provided transcripts (cleaned up), when available.
  id: totrans-623
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 💡 对于YouTube视频，不会获取额外的元数据或转录本。Gemini只接收原始音频和视频流。您可以通过比较您的结果与YouTube的自动字幕（无标点，仅音频）或用户提供的转录本（已清理），当可用时，来检查这一点。
- en: 💡 If you know your video concerns a team or a company, adding internal data
    in the context can help correct or complete the requested speaker names (provided
    there are no homonyms in the same context), companies, and job titles.
  id: totrans-624
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 💡 如果您知道您的视频涉及一个团队或公司，在上下文中添加内部数据可以帮助纠正或完成请求的说话者姓名（如果同一上下文中没有同音异义词）、公司名称和职位名称。
- en: '💡 In this [French reportage](https://youtu.be/U_yYkb-ureI?t=376), in the 06:16-06:31
    segment, there are two dogs: Arnold and Rio. “Arnold” is clearly audible, repeated
    three times, and correctly transcribed. “Rio” is called only once, audible for
    a fraction of a second in a noisy environment, and the audio transcription can
    vary. Providing the names of the whole team (owners & dogs, even if they are not
    all in the video) can help in transcribing this short name consistently.'
  id: totrans-625
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 💡 在这个[French reportage](https://youtu.be/U_yYkb-ureI?t=376)中，在06:16-06:31的片段中，有两只狗：Arnold和Rio。“Arnold”清晰可闻，重复了三次，并正确转录。而“Rio”只被提到一次，在嘈杂的环境中只可听到一秒钟，音频转录可能有所不同。提供整个团队（所有者与狗，即使它们不全在视频中）的名称可以帮助在转录这个简短名称时保持一致性。
- en: 💡 It should also be possible to ground the results with Google Search, Google
    Maps, or your own RAG system. See [Grounding overview](https://cloud.google.com/vertex-ai/generative-ai/docs/grounding/overview).
  id: totrans-626
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 💡 也应该能够使用 Google 搜索、Google 地图或您自己的 RAG 系统来定位结果。请参阅[定位概述](https://cloud.google.com/vertex-ai/generative-ai/docs/grounding/overview)。
- en: '* * *'
  id: totrans-627
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 🔬 Debugging & evidence
  id: totrans-628
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 🔬 调试与证据
- en: Iterating through successive prompts and debugging LLM outputs can be challenging,
    especially when trying to understand the reasons for the results.
  id: totrans-629
  prefs: []
  type: TYPE_NORMAL
  zh: 通过连续的提示和调试 LLM 输出可能具有挑战性，尤其是在试图理解结果原因时。
- en: It’s possible to ask Gemini to provide evidence in the response. In our video
    transcription solution, we could request a timecoded “evidence” for each speaker’s
    identified name, company, or role. This enables linking results to their sources,
    discovering and understanding unexpected insights, checking potential false positives…
  id: totrans-630
  prefs: []
  type: TYPE_NORMAL
  zh: 可以要求 Gemini 在响应中提供证据。在我们的视频字幕解决方案中，我们可以请求为每个识别出的演讲者的姓名、公司或角色提供带时间戳的“证据”。这使结果能够与其来源相链接，发现和理解意外的见解，检查潜在的误报……
- en: '💡 In the tested videos, when trying to understand where the insights came from,
    requesting evidence yielded very insightful explanations, for example:'
  id: totrans-631
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 💡 在测试的视频中，当试图理解见解的来源时，请求证据提供了非常深入的解释，例如：
- en: ''
  id: totrans-632
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Person names could be extracted from various sources (video conference captions,
    badges, unseen participants introducing themselves when asking questions during
    a conference panel…)
  id: totrans-633
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人名可以从各种来源中提取（视频会议字幕、徽章、在会议小组讨论中提问时自我介绍的未见过参与者……）
- en: Company names could be found from text on uniforms, backpacks, vehicles…
  id: totrans-634
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 公司名称可以从制服、背包、车辆上的文本中找到。
- en: 💡 In a document data extraction solution, we could request to provide an “excerpt”
    as evidence, including page number, chapter number, or any other relevant location
    information.
  id: totrans-635
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 💡 在文档数据提取解决方案中，我们可以请求提供“摘要”作为证据，包括页码、章节号或任何其他相关位置信息。
- en: '* * *'
  id: totrans-636
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 🐘 Verbose JSON
  id: totrans-637
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 🐘 繁琐的 JSON
- en: 'The JSON format is currently the most common way to generate structured outputs
    with LLMs. However, JSON is a rather verbose data format, as field names are repeated
    for each object. For example, an output can look like the following, with many
    repeated underlying tokens:'
  id: totrans-638
  prefs: []
  type: TYPE_NORMAL
  zh: JSON 格式是目前使用 LLM 生成结构化输出的最常见方式。然而，JSON 是一种相当繁琐的数据格式，因为每个对象的字段名都会重复。例如，输出可能看起来如下，包含许多重复的底层令牌：
- en: '[PRE67]'
  id: totrans-639
  prefs: []
  type: TYPE_PRE
  zh: '[PRE67]'
- en: 'To optimize output size, an interesting possibility is to ask Gemini to generate
    an XML block containing a CSV for each of your tabular extractions. The field
    names are specified once in the header, and by using tab separators, for example,
    we can achieve more compact outputs like the following:'
  id: totrans-640
  prefs: []
  type: TYPE_NORMAL
  zh: 为了优化输出大小，一个有趣的可能性是要求 Gemini 为您的每个表格提取生成一个包含 CSV 的 XML 块。字段名在标题中指定一次，通过使用制表符分隔符等，我们可以实现更紧凑的输出，如下所示：
- en: '[PRE68]'
  id: totrans-641
  prefs: []
  type: TYPE_PRE
  zh: '[PRE68]'
- en: 💡 Gemini excels at patterns and formats. Depending on your needs, feel free
    to experiment with JSON, XML, CSV, YAML, and any custom structured formats. It’s
    likely that the industry will evolve to allow even more elaborate structured outputs.
  id: totrans-642
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 💡 Gemini 在模式和格式方面表现出色。根据您的需求，您可以自由地尝试使用 JSON、XML、CSV、YAML 以及任何自定义结构化格式。行业可能会发展到允许更复杂的结构化输出。
- en: '* * *'
  id: totrans-643
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 🐿️ Context caching
  id: totrans-644
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 🐿️ 上下文缓存
- en: Context caching optimizes the cost and the latency of repeated requests using
    the same base inputs.
  id: totrans-645
  prefs: []
  type: TYPE_NORMAL
  zh: 上下文缓存通过使用相同的基输入优化重复请求的成本和延迟。
- en: 'There are two ways requests can benefit from context caching:'
  id: totrans-646
  prefs: []
  type: TYPE_NORMAL
  zh: 请求可以通过两种方式从上下文缓存中受益：
- en: '**Implicit caching**: By default, upon the first request, input tokens are
    cached, to accelerate responses for subsequent requests with the same base inputs.
    This is fully automated and no code change is required.'
  id: totrans-647
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**隐式缓存**：默认情况下，在第一次请求时，输入令牌会被缓存，以加速后续具有相同基础输入的请求的响应。这是完全自动化的，无需代码更改。'
- en: '**Explicit caching**: You place specific inputs into the cache and reuse this
    cached content as a base for your requests. This provides full control but requires
    managing the cache manually.'
  id: totrans-648
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**显式缓存**：您将特定的输入放入缓存，并重复使用此缓存内容作为请求的基础。这提供了完全的控制权，但需要手动管理缓存。'
- en: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>Example
    of implicit caching 🔽</summary>
  id: totrans-649
  prefs: []
  type: TYPE_NORMAL
  zh: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>隐式缓存示例
    🔽</summary>
- en: '[PRE69]</details>'
  id: totrans-650
  prefs: []
  type: TYPE_NORMAL
  zh: '[PRE69]</details>'
- en: 💡 Implicit caching can be disabled at the project level (see [data governance](https://cloud.google.com/vertex-ai/generative-ai/docs/data-governance#customer_data_retention_and_achieving_zero_data_retention)).
  id: totrans-651
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 💡 隐式缓存可以在项目级别禁用（见[data governance](https://cloud.google.com/vertex-ai/generative-ai/docs/data-governance#customer_data_retention_and_achieving_zero_data_retention)）。
- en: Implicit caching is prefix-based, meaning it only works if you put static data
    first and variable data last.
  id: totrans-652
  prefs: []
  type: TYPE_NORMAL
  zh: 隐式缓存是基于前缀的，这意味着只有当你首先放置静态数据，然后放置变量数据时，它才会工作。
- en: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>Example
    of requests preventing implicit caching 🔽</summary>
  id: totrans-653
  prefs: []
  type: TYPE_NORMAL
  zh: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>防止隐式缓存的请求示例
    🔽</summary>
- en: '[PRE70]</details>'
  id: totrans-654
  prefs: []
  type: TYPE_NORMAL
  zh: '[PRE70]</details>'
- en: 💡 This explains why the data-plus-instructions input order is preferred, for
    performance (not LLM-related) reasons.
  id: totrans-655
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 💡 这解释了为什么数据加指令的输入顺序更受青睐，这是出于性能（非 LLM 相关）原因。
- en: 'Cost-wise, the input tokens retrieved with a cache hit benefit from a 90% discount
    in the following cases:'
  id: totrans-656
  prefs: []
  type: TYPE_NORMAL
  zh: 在以下情况下，使用缓存命中的输入令牌在成本上受益于 90% 的折扣：
- en: '**Implicit caching**: With all Gemini models, cache hits are automatically
    discounted (without any control on the cache or cache-hit guarantee).'
  id: totrans-657
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**隐式缓存**：在所有 Gemini 模型中，缓存命中会自动折扣（没有任何对缓存或缓存命中保证的控制）。'
- en: '**Explicit caching**: With all Gemini models and supported models in Model
    Garden, you control your cached inputs and their lifespans to ensure cache hits.'
  id: totrans-658
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**显式缓存**：在所有 Gemini 模型和 Model Garden 中的支持模型中，你可以控制你的缓存输入及其生命周期，以确保缓存命中。'
- en: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>Example
    of explicit caching 🔽</summary>
  id: totrans-659
  prefs: []
  type: TYPE_NORMAL
  zh: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>显式缓存示例
    🔽</summary>
- en: '[PRE71]</details>'
  id: totrans-660
  prefs: []
  type: TYPE_NORMAL
  zh: '[PRE71]</details>'
- en: 💡 Explicit caching needs a specific model version (like `…-001` in this example)
    to ensure the cache remains valid and is not affected by a model update.
  id: totrans-661
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 💡 显式缓存需要一个特定的模型版本（例如，本例中的`…-001`）以确保缓存保持有效，并且不受模型更新的影响。
- en: ℹ️ Learn more about [Context caching](https://cloud.google.com/vertex-ai/generative-ai/docs/context-cache/context-cache-overview).
  id: totrans-662
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: ℹ️ 了解更多关于[上下文缓存](https://cloud.google.com/vertex-ai/generative-ai/docs/context-cache/context-cache-overview)的信息。
- en: '* * *'
  id: totrans-663
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: ⏳ Batch prediction
  id: totrans-664
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ⏳ 批量预测
- en: If you need to process a large volume of videos and don’t need synchronous responses,
    you can use a single batch request and reduce your cost.
  id: totrans-665
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你需要处理大量视频，并且不需要同步响应，你可以使用单个批量请求并降低你的成本。
- en: 💡 Batch requests for Gemini models get a 50% discount compared to standard requests.
  id: totrans-666
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 💡 与标准请求相比，Gemini 模型的批量请求获得 50% 的折扣。
- en: ℹ️ Learn more about [Batch prediction](https://cloud.google.com/vertex-ai/generative-ai/docs/multimodal/batch-prediction-gemini#generative-ai-batch-text-python_genai_sdk).
  id: totrans-667
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: ℹ️ 了解更多关于[批量预测](https://cloud.google.com/vertex-ai/generative-ai/docs/multimodal/batch-prediction-gemini#generative-ai-batch-text-python_genai_sdk)的信息。
- en: '* * *'
  id: totrans-668
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: ♾️ To production… and beyond
  id: totrans-669
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ♾️ 生产…以及更远
- en: 'A few additional notes:'
  id: totrans-670
  prefs: []
  type: TYPE_NORMAL
  zh: 一些额外的注意事项：
- en: The current prompt is not perfect and can be improved. It has been preserved
    in its current state to illustrate its development starting with Gemini 2.0 Flash
    and a simple video test suite.
  id: totrans-671
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当前提示并不完美，可以改进。它已被保留在其当前状态，以展示其从 Gemini 2.0 Flash 和一个简单的视频测试套件开始的发展。
- en: The Gemini 2.5 models are more capable and intrinsically provide a better video
    understanding. However, the current prompt has not been optimized for them. Writing
    optimal prompts for different models is another challenge.
  id: totrans-672
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Gemini 2.5 模型功能更强大，本质上提供了更好的视频理解。然而，当前的提示尚未针对它们进行优化。为不同模型编写最佳提示是另一个挑战。
- en: If you test transcribing your own videos, especially different types of videos,
    you may run into new or specific issues. They can probably be addressed by enriching
    the prompt.
  id: totrans-673
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你测试转录自己的视频，尤其是不同类型的视频，你可能会遇到新的或特定的问题。这些问题可能通过丰富提示来解决。
- en: Future models will likely support more output features. This should allow for
    richer structured outputs and simpler prompts.
  id: totrans-674
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 未来模型可能会支持更多的输出特征。这应该允许更丰富的结构化输出和更简单的提示。
- en: As models keep learning, it’s also possible that multimodal video transcription
    will become a one-liner prompt.
  id: totrans-675
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 随着模型不断学习，多模态视频转录也可能变成一条简短的提示。
- en: Gemini’s image and audio tokenizers are truly impressive and enable many other
    use cases. To fully grasp the extent of the possibilities, you can run unit tests
    on images or audio files.
  id: totrans-676
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Gemini 的图像和音频标记器真正令人印象深刻，并使许多其他用例成为可能。要完全理解可能性的范围，你可以在图像或音频文件上运行单元测试。
- en: We constrained our challenge to using a single request, which optimizes the
    solution both for speed and cost.
  id: totrans-677
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们将挑战限制在单个请求中，这既优化了速度也优化了成本。
- en: For applications demanding the absolute highest transcription accuracy, we could
    isolate the audio-only transcription in a first request before performing speaker
    identification on the video frames in a second request. It might produce many
    more voice identifiers than actual speakers, but it should minimize false positives.
    In the second step, we’d reinject the transcription to focus on extracting and
    consolidating speaker data from the video frames. This two-step approach would
    also be a viable strategy to process very long videos, even those several hours
    in duration.
  id: totrans-678
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于需要绝对最高转录准确性的应用，我们可以在第二个请求中对视频帧进行说话人识别之前，先在第一个请求中隔离音频转录。这可能会产生比实际说话人更多的声音标识符，但它应该会最小化误报。在第二步中，我们会重新注入转录以专注于从视频帧中提取和整合说话人数据。这种两步法也可以是处理非常长的视频的可行策略，甚至包括那些持续数小时的视频。
- en: '* * *'
  id: totrans-679
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 🏁 Conclusion
  id: totrans-680
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 🏁 结论
- en: 'Multimodal video transcription, which requires the complex synthesis of audio
    and visual data, is a true challenge for ML practitioners, without mainstream
    solutions. A traditional approach, involving an elaborate pipeline of specialized
    models, would be engineering-intensive without any guarantee of success. In contrast,
    Gemini proved to be a versatile toolbox for reaching a powerful and straightforward
    solution based on a single prompt:'
  id: totrans-681
  prefs: []
  type: TYPE_NORMAL
  zh: 多模态视频转录，需要音频和视觉数据的复杂合成，对于 ML 实践者来说是一个真正的挑战，因为没有主流的解决方案。一种传统的方法，涉及一个复杂的专用模型管道，将需要大量的工程工作，而且没有任何成功的保证。相比之下，Gemini
    证明是一个多功能的工具箱，基于单个提示就能达到强大而简单的解决方案：
- en: '![multimodal video transcription solution (L. Picard)](../Images/f42af03b456de9a2c098ba47a0b0f0dc.png)'
  id: totrans-682
  prefs: []
  type: TYPE_IMG
  zh: '![多模态视频转录解决方案（L. Picard）](../Images/f42af03b456de9a2c098ba47a0b0f0dc.png)'
- en: 'We managed to address this complex problem with the following techniques:'
  id: totrans-683
  prefs: []
  type: TYPE_NORMAL
  zh: 我们成功使用以下技术解决了这个复杂问题：
- en: Prototyping with open prompts to develop intuition about Gemini’s natural strengths
  id: totrans-684
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用开放提示进行原型设计，以发展对 Gemini 自然优势的直觉
- en: Taking into account how LLMs work under the hood
  id: totrans-685
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 考虑 LLM 在底层的工作方式
- en: Crafting increasingly specific prompts using a tabular extraction strategy
  id: totrans-686
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用表格提取策略制作越来越具体的提示
- en: Generating structured outputs to move towards production-ready code
  id: totrans-687
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 生成结构化输出，以迈向生产就绪的代码
- en: Adding data visualization for easier interpretation of responses and smoother
    iterations
  id: totrans-688
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 添加数据可视化以更容易地解释响应和更平滑的迭代
- en: Adapting default parameters to optimize the results
  id: totrans-689
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 调整默认参数以优化结果
- en: Conducting more tests, iterating, and even enriching the extracted data
  id: totrans-690
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 进行更多测试、迭代，甚至丰富提取的数据
- en: These principles should apply to many other data extraction domains and allow
    you to solve your own complex problems. Have fun and happy solving!
  id: totrans-691
  prefs: []
  type: TYPE_NORMAL
  zh: 这些原则应该适用于许多其他数据提取领域，并允许你解决自己的复杂问题。祝你好运，享受解决问题的乐趣！
- en: '* * *'
  id: totrans-692
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
