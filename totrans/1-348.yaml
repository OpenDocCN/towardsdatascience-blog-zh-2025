  type: TYPE_NORMAL
- en: '![](../Images/be7005ebd0be14fb61dc0e424b93c53a.png)'
  prefs: []
  type: TYPE_IMG
- en: 💡 Our prompt was crafted and tested with English videos, but it works without
    modification with this French video. It should also work for videos in these [100+
    different languages](https://cloud.google.com/vertex-ai/generative-ai/docs/learn/models#languages-gemini).
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 💡 In a multilingual solution, we might ask to translate our transcriptions into
    any of those 100+ languages and even perform text cleanup. This can be done in
    a second request, as the multimodal transcription is complex enough by itself.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 💡 Gemini’s audio tokenizer detects more than speech. If you try to list non-speech
    sounds on audio tracks only (to ensure the response doesn’t benefit from any visual
    cues), you’ll see it can detect sounds such as “dog bark”, “music”, “sound effect”,
    “footsteps”, “laughter”, “applause”…
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 💡 In our data visualization tables, colored rows are inference positives (speakers
    identified by the model), while gray rows correspond to negatives (unidentified
    speakers). This makes it easier to understand the results. As the prompt we crafted
    favors accuracy over recall, colored rows are generally correct, and gray rows
    correspond either to unnamed/unidentifiable speakers (true negatives) or to speakers
    that should have been identified (false negatives).
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
