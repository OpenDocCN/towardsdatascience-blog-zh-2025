- en: 🎬 French video
  id: totrans-455
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 🎬 法语视频
- en: 'This French reportage combines on-the-ground footage of a specialized team
    using trained dogs to detect leaks in underground drinking water pipes. The recording
    takes place entirely outdoors in a rural setting. The interviewed workers are
    introduced with on-screen text overlays. The audio, captured live on location,
    includes ambient noise. There are also some off-screen or unidentified speakers.
    This video is rather complex. The multimodal transcription provides excellent
    results with no false positives:'
  id: totrans-456
  prefs: []
  type: TYPE_NORMAL
  zh: 这篇法语报道结合了专业团队使用训练有素的狗来检测地下饮用水管道泄漏的现场镜头。录制完全在户外乡村环境中进行。采访的工人通过屏幕文字叠加介绍。音频是在现场实时捕获的，包括环境噪音。还有一些场外或未知的说话者。这个视频相当复杂。多模态转录提供了出色的结果，没有错误警报：
- en: '[PRE53]'
  id: totrans-457
  prefs: []
  type: TYPE_PRE
  zh: '[PRE53]'
- en: Video ([source](https://www.youtube.com/watch?v=U_yYkb-ureI))
