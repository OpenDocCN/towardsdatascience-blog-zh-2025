- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 🚀 Finalization
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 🧩 Structured output
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'We’ve iterated towards a precise and concise prompt. Now, we can focus on Gemini’s
    response:'
  prefs: []
  type: TYPE_NORMAL
- en: The response is plain text containing fenced code blocks
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Instead, we’d like a structured output, to receive consistently formatted responses
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Ideally, we’d also like to avoid having to parse the response, which can be
    a maintenance burden
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Getting structured outputs is an LLM feature also called “controlled generation”.
    Since we’ve already crafted our prompt in terms of data tables and JSON fields,
    this is now a formality.
  prefs: []
  type: TYPE_NORMAL
- en: 'In our request, we can add the following parameters:'
  prefs: []
  type: TYPE_NORMAL
- en: '`response_mime_type="application/json"`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`response_schema="YOUR_JSON_SCHEMA"` ([docs](https://cloud.google.com/vertex-ai/generative-ai/docs/multimodal/control-generated-output#fields))'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'In Python, this gets even easier:'
  prefs: []
  type: TYPE_NORMAL
- en: Use the `pydantic` library
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Reflect your output structure with classes derived from `pydantic.BaseModel`
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'We can simplify the prompt by removing the output specification parts:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE40]'
  prefs: []
  type: TYPE_PRE
- en: '… to move them to matching Python classes instead:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE41]'
  prefs: []
  type: TYPE_PRE
- en: '… and request a structured response:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE42]'
  prefs: []
  type: TYPE_PRE
- en: 'Finally, retrieving the objects from the response is also direct:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE43]'
  prefs: []
  type: TYPE_PRE
- en: 'The interesting aspects of this approach are the following:'
  prefs: []
  type: TYPE_NORMAL
- en: The prompt focuses on the logic and the classes focus on the output
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It’s easier to update and maintain typed classes
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The JSON schema is automatically generated by the Gen AI SDK from the class
    provided in `response_schema` and dispatched to Gemini
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The response is automatically parsed by the Gen AI SDK and deserialized into
    the corresponding Python objects
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: ⚠️ If you keep output specifications in your prompt, ensure there are no contradictions
    between the prompt and the schema (e.g., same field names and order), as this
    can negatively impact the quality of the responses.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 💡 It’s possible to have more structural information directly in the schema (e.g.,
    detailed field definitions). See [Controlled generation](https://cloud.google.com/vertex-ai/generative-ai/docs/multimodal/control-generated-output).
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: ✨ Implementation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
