- en: '* * *'
  id: totrans-552
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 👎 Weaknesses
  id: totrans-553
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 👎 弱点
- en: 'The current prompt isn’t perfect, though. It focuses first on the audio for
    transcription and then on all cues for speaker data extraction. Though Gemini
    natively ensures a very high consolidation from the context, the prompt can lead
    to these side effects:'
  id: totrans-554
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管当前的提示并不完美。它首先关注音频转录，然后是所有用于演讲者数据提取的线索。尽管Gemini原生地确保了非常高的上下文一致性，但提示可能导致以下副作用：
- en: Sensitivity to speakers’ pronunciation or accent
  id: totrans-555
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对演讲者发音或口音的敏感性
- en: Misspellings for proper nouns
  id: totrans-556
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 专有名词的拼写错误
- en: Inconsistencies between the transcription and a perfectly identified speaker’s
    name
  id: totrans-557
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 转录与完美识别的演讲者姓名之间的不一致性
- en: 'Here are examples from the same test:'
  id: totrans-558
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是同一测试的一些示例：
- en: '| timecode | ✅ user-provided | ❌ our transcription |'
  id: totrans-559
  prefs: []
  type: TYPE_TB
  zh: '| 时间码 | ✅ 用户提供的 | ❌ 我们的转录 |'
- en: '| --- | --- | --- |'
  id: totrans-560
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
