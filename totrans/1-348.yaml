- en: ⚖️ Strengths & weaknesses
  id: totrans-523
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: ⚖️ 优点与缺点
- en: 👍 Strengths
  id: totrans-524
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 👍 优点
- en: 'Overall, Gemini is capable of generating excellent transcriptions that surpass
    human-generated ones in these aspects:'
  id: totrans-525
  prefs: []
  type: TYPE_NORMAL
  zh: 总体而言，Gemini能够生成出色的转录，在这些方面超越了人工转录：
- en: Consistency of the transcription
  id: totrans-526
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 转录的一致性
- en: Impressive semantic understanding
  id: totrans-527
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 令人印象深刻的语义理解
- en: Highly accurate grammar and punctuation
  id: totrans-528
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 高度准确的语法和标点符号
- en: No typos or transcription system mistakes
  id: totrans-529
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 没有错别字或转录系统错误
- en: Exhaustivity (every audible word is transcribed)
  id: totrans-530
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 完整性（每个可听到的词都被转录）
- en: 💡 As you know, a single incorrect/missing word (or even letter) can completely
    change the meaning. These strengths help ensure high-quality transcriptions and
    reduce the risk of misunderstandings.
  id: totrans-531
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 💡 正如你所知，一个错误的/缺失的词（甚至字母）可以完全改变意义。这些优点有助于确保高质量的转录并降低误解的风险。
- en: 'If we compare YouTube’s user-provided transcriptions (sometimes by professional
    caption vendors) to our auto-generated ones, we can observe some significant differences.
    Here are some examples from the last test:'
  id: totrans-532
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们将YouTube用户提供的字幕（有时由专业字幕供应商提供）与我们自动生成的字幕进行比较，我们可以观察到一些显著的不同。以下是上次测试的一些示例：
