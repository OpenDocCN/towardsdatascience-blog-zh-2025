- en: 🤖 Gen AI SDK
  id: totrans-115
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 🤖 Gen AI SDK
- en: 'To send Gemini requests, create a `google.genai` client:'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 要发送 Gemini 请求，创建一个 `google.genai` 客户端：
- en: '[PRE2]'
  id: totrans-117
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'Check your configuration:'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 检查您的配置：
- en: '[PRE3]'
  id: totrans-119
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '[PRE4]'
  id: totrans-120
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: '* * *'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 🧠 Gemini model
  id: totrans-122
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 🧠 Gemini 模型
- en: Gemini comes in different [versions](https://cloud.google.com/vertex-ai/generative-ai/docs/learn/models#gemini-models).
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: Gemini 有不同的[版本](https://cloud.google.com/vertex-ai/generative-ai/docs/learn/models#gemini-models)。
- en: 'Let’s get started with Gemini 2.0 Flash, as it offers both high performance
    and low latency:'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们开始使用 Gemini 2.0 Flash，因为它提供了高性能和低延迟：
- en: '`GEMINI_2_0_FLASH = "gemini-2.0-flash"`'
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`GEMINI_2_0_FLASH = "gemini-2.0-flash"`'
- en: 💡 We select Gemini 2.0 Flash intentionally. The Gemini 2.5 model family is generally
    available and even more capable, but we want to experiment and understand Gemini’s
    core multimodal behavior. If we complete our challenge with 2.0, this should also
    work with newer models.
  id: totrans-126
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 💡 我们特意选择了 Gemini 2.0 Flash。虽然 Gemini 2.5 模型系列通常可用且功能更强大，但我们想进行实验并了解 Gemini 的核心多模态行为。如果我们用
    2.0 完成挑战，这也应该适用于较新的模型。
- en: '* * *'
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: ⚙️ Gemini configuration
  id: totrans-128
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ⚙️ Gemini 配置
- en: Gemini can be used in different ways, ranging from factual to creative mode.
    The problem we’re trying to solve is a **data extraction** use case. We want results
    as factual and deterministic as possible. For this, we can change the [content
    generation parameters](https://cloud.google.com/vertex-ai/generative-ai/docs/multimodal/content-generation-parameters).
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: Gemini可以用不同的方式使用，从事实到创意模式。我们试图解决的问题是一个**数据提取**用例。我们希望结果尽可能事实和确定。为此，我们可以更改[内容生成参数](https://cloud.google.com/vertex-ai/generative-ai/docs/multimodal/content-generation-parameters)。
- en: 'We’ll set the `temperature`, `top_p`, and `seed` parameters to minimize randomness:'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将设置`temperature`、`top_p`和`seed`参数以最小化随机性：
- en: '`temperature=0.0`'
  id: totrans-131
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`temperature=0.0`'
- en: '`top_p=0.0`'
  id: totrans-132
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`top_p=0.0`'
- en: '`seed=42` (arbitrary fixed value)'
  id: totrans-133
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`seed=42`（任意固定值）'
- en: '* * *'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 🎞️ Video sources
  id: totrans-135
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 🎞️ 视频来源
- en: 'Here are the main video sources that Gemini can analyze:'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是Gemini可以分析的主要视频来源：
- en: '| source | URI | Vertex AI | Google AI Studio |'
  id: totrans-137
  prefs: []
  type: TYPE_TB
  zh: '| source | URI | Vertex AI | Google AI Studio |'
- en: '| --- | --- | --- | --- |'
  id: totrans-138
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- | --- |'
- en: '| Google Cloud Storage | `gs://bucket/path/to/video.*` | ✅ |  |'
  id: totrans-139
  prefs: []
  type: TYPE_TB
  zh: '| Google Cloud Storage | `gs://bucket/path/to/video.*` | ✅ |  |'
- en: '| Web URL | `https://path/to/video.*` | ✅ |  |'
  id: totrans-140
  prefs: []
  type: TYPE_TB
  zh: '| 网页URL | `https://path/to/video.*` | ✅ |  |'
- en: '| YouTube | `https://www.youtube.com/watch?v=YOUTUBE_ID` | ✅ | ✅ |'
  id: totrans-141
  prefs: []
  type: TYPE_TB
  zh: '| YouTube | `https://www.youtube.com/watch?v=YOUTUBE_ID` | ✅ | ✅ |'
- en: ⚠️ Important notes
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: ⚠️ 重要注意事项
- en: Our video test suite primarily uses public YouTube videos. This is for simplicity.
  id: totrans-143
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们的视频测试套件主要使用公共YouTube视频。这样做是为了简化。
- en: When analyzing YouTube sources, Gemini receives raw audio/video streams without
    any additional metadata, exactly as if processing the corresponding video files
    from Cloud Storage.
  id: totrans-144
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在分析YouTube来源时，Gemini接收到的原始音频/视频流没有任何附加元数据，就像处理来自云存储的相应视频文件一样。
- en: YouTube does offer caption/subtitle/transcript features (user-provided or auto-generated).
    However, these features focus on word-level speech-to-text and are limited to
    40+ languages. Gemini does not receive any of this data and you’ll see that a
    multimodal transcription with Gemini provides additional benefits.
  id: totrans-145
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: YouTube确实提供了字幕/子标题/文本功能（用户提供的或自动生成的）。然而，这些功能专注于单词级别的语音转文字，并且限制在40多种语言。Gemini不会接收任何此类数据，您会看到使用Gemini的多模态转录提供了额外的优势。
- en: Furthermore, our challenge also involves identifying speakers and extracting
    speaker data, a unique new capability.
  id: totrans-146
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 此外，我们的挑战还涉及识别说话者和提取说话者数据，这是一种独特的新功能。
- en: '* * *'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 🛠️ Helpers
  id: totrans-148
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 🛠️ 辅助工具
- en: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>Define
    our helper functions and data 🔽</summary>
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>定义我们的辅助函数和数据
    🔽</summary>
- en: '[PRE5]</details>'
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: '[PRE5]</details>'
- en: '* * *'
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 🧪 Prototyping
  id: totrans-152
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 🧪 原型设计
- en: 🌱 Natural behavior
  id: totrans-153
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 🌱 自然行为
- en: Before diving any deeper, it’s interesting to see how Gemini responds to simple
    instructions, to develop some intuition about its natural behavior.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 在深入研究之前，看看Gemini对简单指令的反应，以发展对其自然行为的直觉是有趣的。
- en: Let’s first see what we get with minimalistic prompts and a short English video.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们先看看使用简约提示和简短英语视频能得到什么。
- en: '[PRE6]'
  id: totrans-156
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: '* * *'
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Video ([source](https://www.youtube.com/watch?v=0pJn3g8dfwk))
  id: totrans-158
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 视频 ([来源](https://www.youtube.com/watch?v=0pJn3g8dfwk))
- en: '[PRE7]'
  id: totrans-159
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'Results:'
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 结果：
- en: Gemini naturally outputs a list of `[time] transcript` lines.
  id: totrans-161
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Gemini自然地输出一系列`[时间]文本行`。
- en: That’s Speech-to-Text in one line!
  id: totrans-162
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这就是一行代码的语音转文字！
- en: It looks like we can answer “1️⃣ What was said and when?”.
  id: totrans-163
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 看起来我们可以回答“1️⃣ 说了什么以及何时说的？”。
- en: Now, what about “2️⃣ Who are the speakers?”
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，“2️⃣ 谁是说话者？”怎么样？
- en: '[PRE8]'
  id: totrans-165
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: '[PRE9]'
  id: totrans-166
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: 'Results:'
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 结果：
- en: Gemini can consolidate the names visible on title cards during the video.
  id: totrans-168
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Gemini可以整合视频中的标题卡上可见的名称。
- en: That’s OCR + entity extraction in one line!
  id: totrans-169
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这就是一行代码的OCR + 实体提取！
- en: “2️⃣ Who are the speakers?” looks solved too!
  id: totrans-170
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “2️⃣ 谁是说话者？”看起来也解决了！
- en: '* * *'
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: ⏩ Not so fast!
  id: totrans-172
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ⏩ 别急！
- en: The natural next step is to jump to the final instructions, to solve our problem
    once and for all.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 自然的下一步是跳到最后一步指令，一次性解决我们的问题。
- en: '[PRE10]'
  id: totrans-174
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: '[PRE11]'
  id: totrans-175
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: This is almost correct. The first segment is not attributed to the host (who
    is only introduced a bit later), but everything else looks correct.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 这几乎是正确的。第一个片段没有归因于主持人（主持人稍后才会被介绍），但其他所有内容看起来都是正确的。
- en: 'Nonetheless, these are not real-world conditions:'
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管如此，这些并不是真实世界的条件：
- en: The video is very short (less than a minute)
  id: totrans-178
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 视频非常短（不到一分钟）
- en: The video is also rather simple (speakers are clearly introduced with on-screen
    title cards)
  id: totrans-179
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 视频也很简单（说话者通过屏幕标题卡清楚地介绍）
- en: 'Let’s try with this 8-minute (and more complex) video:'
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们尝试这个8分钟（并且更复杂）的视频：
- en: '[PRE12]'
  id: totrans-181
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>**Output**
    🔽</summary>
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>**输出**
    🔽</summary>
- en: '[PRE13]</details>'
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: '[PRE13]</details>'
- en: 'This falls apart: Most segments have no identified speaker!'
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 这失败了：大多数片段都没有识别出说话者！
- en: As we are trying to solve a new complex problem, LLMs haven’t been trained on
    any known solution. This is likely why direct instructions do not yield the expected
    answer.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们正在尝试解决一个全新的复杂问题，LLMs 未经任何已知解决方案的训练。这可能是为什么直接指令没有产生预期的答案。
- en: 'At this stage:'
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个阶段：
- en: We might conclude that we can’t solve the problem with real-world videos.
  id: totrans-187
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们可能得出结论，我们无法用真实世界的视频解决这个问题。
- en: Persevering by trying more and more elaborate prompts for this unsolved problem
    might result in a waste of time.
  id: totrans-188
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过尝试更多和更复杂的提示来坚持解决这个未解决的问题可能会浪费时间。
- en: Let’s take a step back and think about what happens under the hood…
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们退一步，思考一下内部发生了什么…
- en: '* * *'
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: ⚛️ Under the hood
  id: totrans-191
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: ⚛️ 内部机制
- en: Modern LLMs are mostly based on the Transformer architecture, a new neural network
    design detailed in a 2017 paper by Google researchers titled [Attention Is All
    You Need](https://arxiv.org/abs/1706.03762). The paper introduced the self-attention
    mechanism, a key innovation that fundamentally changed the way machines process
    language.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 现代LLMs大多基于Transformer架构，这是2017年谷歌研究人员发表的一篇题为《Attention Is All You Need》的论文中详细描述的一种新的神经网络设计。该论文介绍了自注意力机制，这是一个关键创新，从根本上改变了机器处理语言的方式。
- en: 🪙 Tokens
  id: totrans-193
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 🪙 标记
- en: Tokens are the LLM building blocks. We can consider a token to represent a piece
    of information.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 标记是LLM的构建块。我们可以将标记视为代表信息的一部分。
- en: 'Examples of Gemini multimodal tokens (with default parameters):'
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: Gemini 多模态标记的示例（使用默认参数）：
- en: '| content | tokens | details |'
  id: totrans-196
  prefs: []
  type: TYPE_TB
  zh: '| 内容 | 标记 | 详细信息 |'
- en: '| --- | --- | --- |'
  id: totrans-197
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| `hello` | 1 | 1 token for common words/sequences |'
  id: totrans-198
  prefs: []
  type: TYPE_TB
  zh: '| `hello` | 1 | 常见单词/序列的1个标记 |'
- en: '| `passionately` | 2 | `passion•ately` |'
  id: totrans-199
  prefs: []
  type: TYPE_TB
  zh: '| `passionately` | 2 | `passion•ately` |'
- en: '| `passionnément` | 3 | `passion•né•ment` (same adverb in French) |'
  id: totrans-200
  prefs: []
  type: TYPE_TB
  zh: '| `passionnément` | 3 | `passion•né•ment` (法语中的相同副词) |'
- en: '| image | 258 | per image (or per tile depending on image resolution) |'
  id: totrans-201
  prefs: []
  type: TYPE_TB
  zh: '| 图片 | 258 | 每张图片（或根据图像分辨率每块） |'
- en: '| audio without timecodes | 25 / second | handled by the audio tokenizer |'
  id: totrans-202
  prefs: []
  type: TYPE_TB
  zh: '| 无时间码的音频 | 每秒25 | 由音频标记器处理 |'
- en: '| video without audio | 258 / frame | handled by the video tokenizer at 1 frame
    per second |'
  id: totrans-203
  prefs: []
  type: TYPE_TB
  zh: '| 无音频的视频 | 每帧258 | 由视频标记器在每秒1帧的速率下处理 |'
- en: '| `MM:SS` timecode | 5 | audio chunk or video frame temporal reference |'
  id: totrans-204
  prefs: []
  type: TYPE_TB
  zh: '| `MM:SS` 时间码 | 5 | 音频块或视频帧的时间参考 |'
- en: '| `H:MM:SS` timecode | 7 | similarly, for content longer than 1 hour |'
  id: totrans-205
  prefs: []
  type: TYPE_TB
  zh: '| `H:MM:SS` 时间码 | 7 | 类似地，对于超过1小时的内容 |'
- en: '* * *'
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 🎞️ Sampling frame rate
  id: totrans-207
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 🎞️ 采样帧率
- en: By default, video frames are sampled at 1 frame per second (1 FPS). These frames
    are included in the context with their corresponding timecodes.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 默认情况下，视频帧以每秒1帧（1 FPS）的速率采样。这些帧与其对应的时间码一起包含在上下文中。
- en: 'You can use a custom sampling frame rate with the `Part.video_metadata.fps` parameter:'
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以使用自定义采样帧率通过 `Part.video_metadata.fps` 参数：
- en: '| video type | change | fps range |'
  id: totrans-210
  prefs: []
  type: TYPE_TB
  zh: '| 视频类型 | 改变 | 帧率范围 |'
- en: '| --- | --- | --- |'
  id: totrans-211
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| static, slow | decrease the frame rate | `0.0 < fps < 1.0` |'
  id: totrans-212
  prefs: []
  type: TYPE_TB
  zh: '| 静态，缓慢 | 降低帧率 | `0.0 < fps < 1.0` |'
- en: '| dynamic, fast | increase the frame rate | `1.0 < fps <= 24.0` |'
  id: totrans-213
  prefs: []
  type: TYPE_TB
  zh: '| 动态，快速 | 提高帧率 | `1.0 < fps <= 24.0` |'
- en: 💡 For `1.0 < fps`, Gemini was trained to understand `MM:SS.sss` and `H:MM:SS.sss` timecodes.
  id: totrans-214
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 💡 对于 `1.0 < fps`，Gemini 被训练以理解 `MM:SS.sss` 和 `H:MM:SS.sss` 时间码。
- en: '* * *'
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 🔍 Media resolution
  id: totrans-216
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 🔍 媒体分辨率
- en: By default, each sampled frame is represented with 258 tokens.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 默认情况下，每个采样的帧用258个标记表示。
- en: 'You can specify a medium or low media resolution with the `GenerateContentConfig.media_resolution` parameter:'
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以使用 `GenerateContentConfig.media_resolution` 参数指定中等或低媒体分辨率：
- en: '| media_resolution for video inputs | tokens/ frame | benefit |'
  id: totrans-219
  prefs: []
  type: TYPE_TB
  zh: '| 视频输入的媒体分辨率 | 每帧标记数 | 利益 |'
- en: '| --- | --- | --- |'
  id: totrans-220
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| `MEDIA_RESOLUTION_MEDIUM` (default) | 258 | higher precision, allowing for
    more detailed understanding |'
  id: totrans-221
  prefs: []
  type: TYPE_TB
  zh: '| `MEDIA_RESOLUTION_MEDIUM` (默认) | 258 | 更高的精度，允许更详细的理解 |'
- en: '| `MEDIA_RESOLUTION_LOW` | 66 | faster and cheaper inference, allowing for
    longer videos |'
  id: totrans-222
  prefs: []
  type: TYPE_TB
  zh: '| `MEDIA_RESOLUTION_LOW` | 66 | 更快更便宜的推理，允许更长的视频 |'
- en: '💡 The “media resolution” can be seen as the “image token resolution”: the number
    of tokens used to represent an image.'
  id: totrans-223
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 💡 “媒体分辨率”可以看作是“图像标记分辨率”：用于表示图像的标记数量。
- en: '* * *'
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 🧮 Probabilities all the way down
  id: totrans-225
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 🧮 一直到底的概率
- en: The ability of LLMs to communicate in flawless natural language is very impressive,
    but it’s easy to get carried away and make incorrect assumptions.
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: LLM在完美自然语言交流方面的能力非常令人印象深刻，但很容易陷入错误假设。
- en: 'Keep in mind how LLMs work:'
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 记住LLM是如何工作的：
- en: An LLM is trained on a massive tokenized dataset, which represents its knowledge
    (its long-term memory)
  id: totrans-228
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: LLM是在一个庞大的标记化数据集上训练的，这代表了它的知识（它的长期记忆）
- en: During the training, its neural network learns token patterns
  id: totrans-229
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在训练过程中，其神经网络学习标记模式
- en: When you send a request to an LLM, your inputs are transformed into tokens (tokenization)
  id: totrans-230
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当你向LLM发送请求时，你的输入被转换为标记（标记化）
- en: To answer your request, the LLM predicts, token by token, the next likely tokens
  id: totrans-231
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为了回答你的请求，LLM逐个预测下一个可能的标记
- en: Overall, LLMs are exceptional statistical token prediction machines that seem
    to mimic how some parts of our brain work
  id: totrans-232
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 总体而言，LLMs是卓越的统计标记预测机器，似乎模仿了我们大脑的一些工作方式
- en: 'This has a few consequences:'
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 这有几个后果：
- en: LLM outputs are just statistically likely follow-ups to your inputs
  id: totrans-234
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: LLM的输出只是对你输入的统计上可能的后续
- en: 'LLMs show some forms of reasoning: they can match complex patterns but have
    no actual deep understanding'
  id: totrans-235
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: LLM显示出一些推理形式：它们可以匹配复杂的模式，但没有真正的深入理解
- en: 'LLMs have no consciousness: they are designed to generate tokens and will do
    so based on your instructions'
  id: totrans-236
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: LLM没有意识：它们被设计用来生成标记，并将根据你的指示这样做
- en: 'Order matters: Tokens that are generated first will influence tokens that are
    generated next'
  id: totrans-237
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 顺序很重要：首先生成的标记将影响随后生成的标记
- en: For the next step, some methodical prompt crafting might help…
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 对于下一步，一些有组织的提示制作可能会有所帮助…
- en: '* * *'
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 🏗️ Prompt crafting
  id: totrans-240
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 🏗️ 提示制作
- en: 🪜 Methodology
  id: totrans-241
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 🪜 方法论
- en: Prompt crafting, also called prompt engineering, is a relatively new field.
    It involves designing and refining text instructions to guide LLMs towards generating
    desired outputs. Like writing, it is both an art and a science, a skill that everyone
    can develop with practice.
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 提示制作，也称为提示工程，是一个相对较新的领域。它涉及设计和改进文本指令，以引导LLM生成所需的输出。像写作一样，它既是艺术也是科学，是一种可以通过练习开发的技能。
- en: 'We can find countless reference materials about prompt crafting. Some prompts
    can be very long, complex, and even scary. Crafting prompts with a high-performing
    LLM like Gemini is much simpler. Here are three key adjectives to keep in mind:'
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以找到无数关于提示制作的参考资料。一些提示可能非常长、复杂，甚至令人恐惧。使用像Gemini这样的高性能LLM制作提示要简单得多。以下有三个关键形容词需要记住：
- en: iterative
  id: totrans-244
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 迭代
- en: precise
  id: totrans-245
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 精确
- en: concise
  id: totrans-246
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 简洁
- en: '**Iterative**'
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: '**迭代**'
- en: 'Prompt crafting is typically an iterative process. Here are some recommendations:'
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 提示制作通常是一个迭代的过程。以下是一些建议：
- en: Craft your prompt step by step
  id: totrans-249
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 逐步制作你的提示
- en: Keep track of your successive iterations
  id: totrans-250
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 跟踪你的连续迭代
- en: At every iteration, make sure to measure what’s working versus what’s not
  id: totrans-251
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在每个迭代中，确保衡量哪些有效，哪些无效
- en: If you reach a regression, backtrack to a successful iteration
  id: totrans-252
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你达到回归，回溯到一个成功的迭代
- en: '**Precise**'
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: '**精确**'
- en: 'Precision is key:'
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 精确度是关键：
- en: Use words as specific as possible
  id: totrans-255
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用尽可能具体的词语
- en: Words with multiple meanings can introduce variability, so use precise expressions
  id: totrans-256
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 具有多个含义的单词可以引入变化，因此请使用精确的表达
- en: Precision will influence probabilities in your favor
  id: totrans-257
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 精确度将影响有利于你的概率
- en: '**Concise**'
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: '**简洁**'
- en: 'Concision has additional advantages:'
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 简洁性有额外的优势：
- en: A short prompt is easier for us developers to understand (and maintain!)
  id: totrans-260
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 短提示更容易让我们开发者理解（和维护！）
- en: The longer your prompt is, the more likely you are to introduce inconsistencies
    or even contradictions, which results in variable interpretations of your instructions
  id: totrans-261
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你的提示越长，你引入不一致性或甚至矛盾的可能性就越大，这会导致对你指令的多种解释
- en: 'Test and trust the LLM’s knowledge: this knowledge acts as an implicit context
    and can make your prompt shorter and clearer'
  id: totrans-262
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 测试并信任LLM的知识：这种知识作为隐含的上下文，可以使你的提示更简短、更清晰
- en: Overall, though this may seem contradictory, if you take the time to be iterative,
    precise, and concise, you are likely to save a lot of time.
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
  zh: 总体而言，尽管这似乎有些矛盾，但如果你花时间进行迭代、精确和简洁，你很可能会节省很多时间。
- en: 💡 If you want to explore this topic, check out [Prompting strategies](https://cloud.google.com/vertex-ai/generative-ai/docs/learn/prompts/prompt-design-strategies) (Google
    Cloud reference) and [Prompt engineering](https://www.kaggle.com/whitepaper-prompt-engineering) (68-page
    PDF by Lee Boonstra).
  id: totrans-264
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 💡 如果你想探索这个主题，请查看[提示策略](https://cloud.google.com/vertex-ai/generative-ai/docs/learn/prompts/prompt-design-strategies)（谷歌云参考）和[提示工程](https://www.kaggle.com/whitepaper-prompt-engineering)（Lee
    Boonstra 编写的 68 页 PDF）。
- en: '* * *'
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 📚 Terminology
  id: totrans-266
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 📚 术语
- en: We’re not experts in video transcription (yet!) but we want Gemini to behave
    as one. Consequently, we’d like to write prompts as specific as possible for this
    use case. While LLMs process instructions based on their training knowledge, they
    can also share this knowledge with us.
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还不是视频转录（目前！）的专家，但我们希望 Gemini 能够表现得像一位专家。因此，我们希望为这个用例编写尽可能具体的提示。虽然 LLMs 根据其训练知识处理指令，但它们也可以与我们分享这些知识。
- en: 'We can learn a lot by directly asking Gemini:'
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以通过直接询问 Gemini 来学到很多东西：
- en: '[PRE14]'
  id: totrans-269
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>**Output**
    🔽</summary>
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
  zh: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>**输出**
    🔽</summary>
- en: '[PRE15]'
  id: totrans-271
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: '[PRE16]'
  id: totrans-272
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: '00:00:00 --> 00:00:03 Interviewer: So, Chef, welcome to the show!'
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
  zh: 00:00:00 --> 00:00:03 采访者：厨师，欢迎来到节目！
- en: '00:00:03 --> 00:00:06 Chef: Thank you for having me. It''s, uh, great to be
    here.'
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
  zh: 00:00:03 --> 00:00:06 厨师：感谢您的邀请。很高兴来到这里。
- en: '00:00:06 --> 00:00:12 Interviewer: So, tell us a little bit about your new
    restaurant, "The Golden Spoon."'
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
  zh: 00:00:06 --> 00:00:12 采访者：那么，请告诉我们一些关于您的新餐厅“金勺子”的情况。
- en: '00:00:12 --> 00:00:20 Chef: Well, um, it''s, it''s been a dream of mine for,
    like, years, you know?  To, like, open a place that really focuses on, um, seasonal
    ingredients.'
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
  zh: 00:00:12 --> 00:00:20 厨师：嗯，这，这是我多年的梦想，你知道？开一家真正专注于季节性食材的地方。
- en: '00:00:20 --> 00:00:25 Interviewer: And what kind of cuisine can people expect?'
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
  zh: 00:00:20 --> 00:00:25 采访者：那么，人们可以期待什么样的菜系？
- en: '00:00:25 --> 00:00:32 Chef: We''re doing, uh, modern American, but with, like,
    a real emphasis on, uh, local farms and, you know, sustainable practices.'
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
  zh: 00:00:25 --> 00:00:32 厨师：我们在做现代美式菜，但真正强调的是本地农场和可持续的做法。
- en: '[PRE17]'
  id: totrans-279
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: '00:00:00 --> 00:00:03 Interviewer: So, Chef, welcome to the show!'
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
  zh: 00:00:00 --> 00:00:03 采访者：厨师，欢迎来到节目！
- en: '00:00:03 --> 00:00:06 Chef: Thank you for having me. It''s great to be here.'
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
  zh: 00:00:03 --> 00:00:06 厨师：感谢您的邀请。很高兴来到这里。
- en: '00:00:06 --> 00:00:12 Interviewer: So, tell us a little bit about your new
    restaurant, "The Golden Spoon."'
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
  zh: 00:00:06 --> 00:00:12 采访者：那么，请告诉我们一些关于您的新餐厅“金勺子”的情况。
- en: '00:00:12 --> 00:00:20 Chef: Well, it''s been a dream of mine for years to open
    a place that really focuses on seasonal ingredients.'
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
  zh: 00:00:12 --> 00:00:20 厨师：嗯，这，这是我多年的梦想，你知道？开一家真正专注于季节性食材的地方。
- en: '00:00:20 --> 00:00:25 Interviewer: And what kind of cuisine can people expect?'
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
  zh: 00:00:20 --> 00:00:25 采访者：那么，人们可以期待什么样的菜系？
- en: '00:00:25 --> 00:00:32 Chef: We''re doing modern American, but with a real emphasis
    on local farms and sustainable practices.'
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
  zh: 00:00:25 --> 00:00:32 厨师：我们在做现代美式菜，但真正强调的是本地农场和可持续的做法。
- en: '[PRE18]'
  id: totrans-286
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: '00:00:00 --> 00:00:03 Interviewer: So, Chef, welcome to the show!'
  id: totrans-287
  prefs: []
  type: TYPE_NORMAL
  zh: 00:00:00 --> 00:00:03 采访者：厨师，欢迎来到节目！
- en: '00:00:03 --> 00:00:06 Chef: Thank you for having me. It''s great to be here.'
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
  zh: 00:00:03 --> 00:00:06 厨师：感谢您的邀请。很高兴来到这里。
- en: '00:00:06 --> 00:00:12 Interviewer: So, tell us a little bit about your new
    restaurant, "The Golden Spoon."'
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
  zh: 00:00:06 --> 00:00:12 采访者：那么，请告诉我们一些关于您的新餐厅“金勺子”的情况。
- en: '00:00:12 --> 00:00:20 Chef: Well, it''s been a dream of mine for, like, years,
    you know? To open a place that really focuses on seasonal ingredients.'
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
  zh: 00:00:12 --> 00:00:20 厨师：嗯，这，这是我多年的梦想，你知道？开一家真正专注于季节性食材的地方。
- en: '00:00:20 --> 00:00:25 Interviewer: And what kind of cuisine can people expect?'
  id: totrans-291
  prefs: []
  type: TYPE_NORMAL
  zh: 00:00:20 --> 00:00:25 采访者：那么，人们可以期待什么样的菜系？
- en: '00:00:25 --> 00:00:32 Chef: We''re doing modern American, but with, like, a
    real emphasis on local farms and, you know, sustainable practices.'
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
  zh: 00:00:25 --> 00:00:32 厨师：我们在做现代美式菜，但真正强调的是本地农场和可持续的做法。
- en: '[PRE19]'
