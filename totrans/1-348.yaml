  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'This Google DeepMind video is quite complex:'
  prefs: []
  type: TYPE_NORMAL
- en: It is highly edited and very dynamic
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Speakers are often off-screen and other people can be visible instead
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The researchers are often in groups and it’s not always obvious who’s speaking
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Some video shots were taken 2 years apart: the same speakers can sound and
    look different!'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Gemini 2.0 Flash generates an excellent transcription. However, the complexity
    of the video can lead to some missed consolidations. Gemini 2.5 Pro shows a deeper
    inference and manages to consolidate the differently-looking-and-sounding speakers:'
