- en: Unlocking Multimodal Video Transcription with Gemini
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用 Gemini 解锁多模态视频转录
- en: 原文：[https://towardsdatascience.com/unlocking-multimodal-video-transcription-with-gemini/](https://towardsdatascience.com/unlocking-multimodal-video-transcription-with-gemini/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/unlocking-multimodal-video-transcription-with-gemini/](https://towardsdatascience.com/unlocking-multimodal-video-transcription-with-gemini/)
- en: '* * *'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '*A quick heads-up before we start:*'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '*在开始之前，请快速了解一下：*'
- en: '*I’m a developer at Google Cloud. I’m happy to share this article and hope
    you’ll learn a few things. Thoughts and opinions are entirely my own.*'
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*我是谷歌云的一名开发者。我很高兴分享这篇文章，希望你能学到一些东西。观点和意见完全是我的个人观点。*'
- en: '*You can find the source code for this article (including future updates)*
    *in [this notebook](https://github.com/GoogleCloudPlatform/generative-ai/blob/main/gemini/use-cases/video-analysis/multimodal_video_transcription.ipynb)
    (Apache License version 2.0).*'
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*您可以在[这个笔记本](https://github.com/GoogleCloudPlatform/generative-ai/blob/main/gemini/use-cases/video-analysis/multimodal_video_transcription.ipynb)（Apache
    License版本2.0）中找到这篇文章的源代码（包括未来的更新）。*'
- en: '*You can experiment for free with Gemini in [Google AI Studio](https://aistudio.google.com)
    and get an API key to call Gemini programmatically.*'
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*您可以在[Google AI Studio](https://aistudio.google.com)上免费实验 Gemini，并获得一个 API
    密钥以编程方式调用 Gemini。*'
- en: '*All images, unless otherwise noted, are by me.*'
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*所有图像，除非另有说明，均为本人所绘。*'
- en: '* * *'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: ✨ Overview
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: ✨ 概述
- en: Traditional machine learning (ML) perception models typically focus on specific
    features and single modalities, deriving insights solely from natural language,
    speech, or vision analysis. Historically, extracting and consolidating information
    from multiple modalities has been challenging due to siloed processing, complex
    architectures, and the risk of data being “lost in translation.” However, multimodal
    and long-context large language models (LLMs) like Gemini can overcome these issues
    by processing all modalities within the same context, opening new possibilities.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 传统的机器学习（ML）感知模型通常专注于特定的特征和单一模态，仅从自然语言、语音或视觉分析中得出见解。历史上，由于处理分离、复杂架构和数据“在翻译中丢失”的风险，从多个模态中提取和整合信息一直具有挑战性。然而，像
    Gemini 这样的多模态和长上下文大型语言模型（LLM）可以通过在相同上下文中处理所有模态来克服这些问题，开辟新的可能性。
- en: 'Moving beyond speech-to-text, this article explores how to achieve comprehensive
    video transcriptions by leveraging all available modalities. It covers the following
    topics:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 超越语音转文本，本文探讨了如何利用所有可用的模态实现全面的视频转录。它涵盖了以下主题：
- en: A methodology for addressing new or complex problems with a multimodal LLM
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一种使用多模态大型语言模型解决新或复杂问题的方法
- en: 'A prompt technique for decoupling data and preserving attention: tabular extraction'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一种用于解耦数据和保留注意力的提示技术：表格提取
- en: Strategies for making the most of Gemini’s 1M-token context in a single request
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 利用 Gemini 单个请求中的 1M-token 上下文的策略
- en: Practical examples of multimodal video transcriptions
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 多模态视频转录的实际示例
- en: Tips & optimizations
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 小贴士与优化
- en: '* * *'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 🔥 Challenge
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 🔥 挑战
- en: 'To fully transcribe a video, we’re looking to answer the following questions:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 要完全转录视频，我们需要回答以下问题：
- en: 1️⃣ What was said and when?
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 1️⃣ 说了什么，什么时候说的？
- en: 2️⃣ Who are the speakers?
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 2️⃣ 谁是说话者？
- en: 3️⃣ Who said what?
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 3️⃣ 谁说了什么？
- en: Can we solve this problem in a straightforward and efficient way?
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 我们能否以直接且高效的方式解决这个问题？
- en: '* * *'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 🌟 State of the art
  id: totrans-25
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 🌟 最先进的技术
- en: 1️⃣ What was said and when?
  id: totrans-26
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1️⃣ 说了什么，什么时候说的？
- en: 'This is a known problem with an existing solution:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个已知的问题，已有解决方案：
- en: '**Speech-to-Text** (STT) is a process that takes an audio input and transforms
    speech into text. STT can provide timestamps at the word level. It is also known
    as automatic speech recognition (ASR).'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**语音转文本**（STT）是一个将音频输入转换为文本的过程。STT 可以在单词级别提供时间戳。它也被称为自动语音识别（ASR）。'
- en: In the last decade, task-specific ML models have most effectively addressed
    this.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去十年中，针对特定任务的机器学习模型最有效地解决了这个问题。
- en: '* * *'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 2️⃣ Who are the speakers?
  id: totrans-31
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2️⃣ 谁是说话者？
- en: 'We can retrieve speaker names in a video from two sources:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以从两个来源检索视频中的说话者姓名：
- en: '**What’s written** (e.g., speakers can be introduced with on-screen information
    when they first speak)'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**所写内容**（例如，当说话者第一次说话时，可以使用屏幕信息介绍说话者）'
- en: '**What’s spoken** (e.g., “Hello Bob! Alice! How are you doing?”)'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**所说的内容**（例如，“你好，鲍勃！爱丽丝！你怎么样？”）'
- en: 'Vision and Natural Language Processing (NLP) models can help with the following
    features:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 视觉和自然语言处理（NLP）模型可以帮助以下功能：
- en: Vision: **Optical Character Recognition** (OCR), also called text detection,
    extracts the text visible in images.
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 视觉：**光学字符识别** (OCR)，也称为文本检测，提取图像中可见的文本。
- en: Vision: **Person Detection** identifies if and where people are in an image.
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 视觉：**人物检测** 识别图像中是否存在人物以及人物的位置。
- en: NLP: **Entity Extraction** can identify named entities in text.
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: NLP：**实体提取** 可以在文本中识别命名实体。
- en: '* * *'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 3️⃣ Who said what?
  id: totrans-40
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3️⃣ 谁说了什么？
- en: 'This is another known problem with a partial solution (complementary to Speech-to-Text):'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 这又是一个部分解决方案（与语音转文本互补）的已知问题：
- en: '**Speaker Diarization** (also known as speaker turn segmentation) is a process
    that splits an audio stream into segments for the different detected speakers
    (“Speaker A”, “Speaker B”, etc.).'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**说话者分割**（也称为说话者转换分割）是一个将音频流分割成不同检测到的说话者段（“说话者 A”、“说话者 B”等）的过程。'
- en: 'Researchers have made significant progress in this field for decades, particularly
    with ML models in recent years, but this is still an active field of research.
    Existing solutions have shortcomings: they often require human supervision and
    hints (e.g., the minimum and maximum number of speakers, the language spoken),
    and typically support only a limited set of languages.'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 研究人员在几十年里在这个领域取得了重大进展，尤其是在近年来，随着机器学习模型的发展，但这仍然是一个活跃的研究领域。现有的解决方案存在不足：它们通常需要人类监督和提示（例如，说话者的最小和最大数量，使用的语言），并且通常只支持有限的语言集合。
- en: '* * *'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 🏺 Traditional ML pipeline
  id: totrans-45
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 🏺 传统机器学习流程
- en: 'Solving all of 1️⃣, 2️⃣, and 3️⃣ isn’t straightforward. This would likely involve
    setting up an elaborate supervised processing pipeline, based on a few state-of-the-art
    ML models, such as the following:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 解决 1️⃣、2️⃣ 和 3️⃣ 并非易事。这可能会涉及到建立一个复杂的监督处理流程，基于几个最先进的机器学习模型，如下所示：
- en: '![a traditional ml pipeline (L. Picard)](../Images/d3ac36cad4581b9df31d67976bd2c282.png)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
  zh: '![传统的机器学习流程 (L. Picard)](../Images/d3ac36cad4581b9df31d67976bd2c282.png)'
- en: We might need days or weeks to design and set up such a pipeline. Additionally,
    at the time of writing, our multimodal-video-transcription challenge is not a
    solved problem, so there’s absolutely no certainty of reaching a viable solution.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可能需要几天或几周的时间来设计和设置这样的流程。此外，在撰写本文时，我们的多模态视频转录挑战尚未解决，因此绝对没有达到可行解决方案的确定性。
- en: '* * *'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 💡 A new problem-solving toolbox
  id: totrans-50
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 💡 一个新的问题解决工具箱
- en: Gemini allows for rapid prompt-based problem solving. With just text instructions,
    we can extract information and transform it into new insights, through a straightforward
    and automated workflow.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: Gemini 允许基于提示的快速问题解决。仅通过文本指令，我们就可以提取信息并将其转化为新的见解，通过简单自动的工作流程。
- en: 🎬 Multimodal
  id: totrans-52
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 🎬 多模态
- en: 'Gemini is natively multimodal, which means it can process different types of
    inputs:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: Gemini 本地支持多模态，这意味着它可以处理不同类型的输入：
- en: text
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 文本
- en: image
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 图片
- en: audio
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 音频
- en: video
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 视频
- en: document
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 文档
- en: '* * *'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 🌐 Multilingual
  id: totrans-60
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 🌐 多语言
- en: 'Gemini is also [multilingual](https://cloud.google.com/vertex-ai/generative-ai/docs/learn/models#languages-gemini):'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: Gemini 也支持 [多语言](https://cloud.google.com/vertex-ai/generative-ai/docs/learn/models#languages-gemini)：
- en: It can process inputs and generate outputs in 100+ languages
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它可以在 100 多种语言中处理输入并生成输出
- en: If we can solve the video challenge for one language, that solution should naturally
    extend to all other languages
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果我们能解决一种语言的视频挑战，那么该解决方案应该自然地扩展到所有其他语言
- en: '* * *'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 🧰 A natural-language toolbox
  id: totrans-65
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 🧰 自然语言工具箱
- en: Multimodal and multilingual understanding in a single model lets us shift from
    relying on task-specific ML models to using a single versatile LLM.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 在单个模型中实现多模态和多语言理解，使我们能够从依赖特定任务的机器学习模型转向使用一个通用的 LLM。
- en: 'Our challenge now looks a lot simpler:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在的挑战看起来要简单得多：
- en: '![natural-language toolbox with gemini (L. Picard)](../Images/df07791d6ee41fb3019ad9da523287e0.png)'
  id: totrans-68
  prefs: []
  type: TYPE_IMG
  zh: '![带有 Gemini 的自然语言工具箱 (L. Picard)](../Images/df07791d6ee41fb3019ad9da523287e0.png)'
- en: 'In other words, let’s rephrase our challenge: Can we fully transcribe a video
    with just the following?'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，让我们重新表述我们的挑战：我们能否仅使用以下内容就能完全转录视频？
- en: 1 video
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 1 个视频
- en: 1 prompt
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 1 个提示
- en: 1 request
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 1 个请求
- en: Let’s try with Gemini…
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们尝试使用 Gemini…
- en: '* * *'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 🏁 Setup
  id: totrans-75
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 🏁 设置
- en: 🐍 Python packages
  id: totrans-76
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 🐍 Python 包
- en: 'We’ll use the following packages:'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用以下包：
- en: '`google-genai`: the [Google Gen AI Python SDK](https://pypi.org/project/google-genai) lets
    us call Gemini with a few lines of code'
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`google-genai`：Google Gen AI Python SDK [Google Gen AI Python SDK](https://pypi.org/project/google-genai)
    允许我们通过几行代码调用 Gemini'
- en: '`pandas` for data visualization'
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`pandas` 用于数据可视化'
- en: 'We’ll also use these packages (dependencies of `google-genai`):'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还将使用以下包（`google-genai` 的依赖项）：
- en: '`pydantic` for data management'
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`pydantic` 用于数据管理'
- en: '`tenacity` for request management'
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`tenacity` 用于请求管理'
- en: '[PRE0]'
  id: totrans-83
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '* * *'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 🔗 Gemini API
  id: totrans-85
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 🔗 Gemini API
- en: 'We have two main options to send requests to Gemini:'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 我们有两种主要方式向 Gemini 发送请求：
- en: '[Vertex AI](https://cloud.google.com/vertex-ai/generative-ai/docs): Build enterprise-ready
    projects on Google Cloud'
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Vertex AI](https://cloud.google.com/vertex-ai/generative-ai/docs): 在 Google
    Cloud 上构建企业级项目'
- en: '[Google AI Studio](https://aistudio.google.com): Experiment, prototype, and
    deploy small projects'
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Google AI Studio](https://aistudio.google.com): 进行实验、原型设计和部署小型项目'
- en: The Google Gen AI SDK provides a unified interface to these APIs and we can
    use environment variables for the configuration.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: Google Gen AI SDK 为这些 API 提供了一个统一的接口，我们可以使用环境变量进行配置。
- en: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>**Option
    A – Gemini API via Vertex AI** 🔽</summary>
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>**选项
    A – 通过 Vertex AI 使用 Gemini API 🔽</summary>
- en: 'Requirement:'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 要求：
- en: A Google Cloud project
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个 Google Cloud 项目
- en: The [Vertex AI API](https://console.cloud.google.com/flows/enableapi?apiid=aiplatform.googleapis.com) must
    be enabled for this project
  id: totrans-93
  prefs:
  - PREF_UL
