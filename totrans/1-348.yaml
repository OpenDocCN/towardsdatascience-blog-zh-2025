- en: 💡 Over the past few years, I have regularly used this video to test specialized
    ML models and these tests consistently resulted in various types of errors. Gemini’s
    transcription, including punctuation, is perfect.
  id: totrans-453
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 💡 在过去的几年里，我经常使用这个视频来测试专门的机器学习模型，而这些测试始终导致各种类型的错误。Gemini的转录，包括标点符号，是完美的。
- en: '* * *'
  id: totrans-454
  prefs: []
  type: TYPE_NORMAL
