  type: TYPE_NORMAL
  zh: 运行 [这个笔记本](https://github.com/GoogleCloudPlatform/generative-ai/blob/main/gemini/use-cases/video-analysis/multimodal_video_transcription.ipynb)
    以重现本文的结果并转录你自己的视频
