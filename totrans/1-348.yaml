- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 📝 Tabular extraction
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'So far, we’ve seen the following:'
  prefs: []
  type: TYPE_NORMAL
- en: We didn’t manage to get the full transcription with identified speakers all
    at once
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Order matters (because a generated token influences the probabilities for subsequent
    tokens)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'To tackle our challenge, we need Gemini to infer from the following multimodal
    information:'
  prefs: []
  type: TYPE_NORMAL
- en: text (our instructions + what may be written in the video)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: audio cues (everything said or audible in the video’s audio)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: visual cues (everything visible in the video)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: time (when things happen)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: That is quite a mixture of information types!
  prefs: []
  type: TYPE_NORMAL
- en: 'As video transcription is a data extraction use case, if we think about the
    final result as a database, our final goal can be seen as the generation of two
    related tables (transcripts and speakers). If we write it down, our initial three
    sub-problems now look decoupled:'
  prefs: []
  type: TYPE_NORMAL
- en: '![transcripts and speakers tables (L. Picard)](../Images/2dc63ade2559775037c9f66bba81640c.png)'
  prefs: []
  type: TYPE_IMG
- en: 💡 In computer science, data decoupling enhances data locality, often yielding
    improved performance across areas such as cache utilization, data access, semantic
    understanding, or system maintenance. Within the LLM Transformer architecture,
    core performance relies heavily on the attention mechanism. However, the attention
    pool is finite and tokens compete for attention. Researchers sometimes refer to
    “attention dilution” for long-context, million-token-scale benchmarks. While we
    cannot directly debug LLMs as users, intuitively, data decoupling may improve
    the model’s focus, leading to a better attention span.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Since Gemini is extremely good with patterns, it can automatically generate
    identifiers to link our tables. In addition, since we eventually want an automated
    workflow, we can start reasoning in terms of data and fields:'
  prefs: []
  type: TYPE_NORMAL
- en: '![transcripts and speakers tables with id (L. Picard)](../Images/3e675bb9d0a522421cf4d6a1ae2931bd.png)'
  prefs: []
  type: TYPE_IMG
- en: Let’s call this approach “tabular extraction”, split our instructions into two
    tasks (tables), still in a single request, and arrange them in a meaningful order…
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 💬 Transcripts
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'First of all, let’s focus on getting the audio transcripts:'
  prefs: []
  type: TYPE_NORMAL
- en: Gemini has proven to be natively good at audio transcription
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This requires less inference than image analysis
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It is central and independent information
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 💡 Generating an output that starts with correct answers should help to achieve
    an overall correct output.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'We’ve also seen what a typical transcription entry can look like:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE23]'
  prefs: []
  type: TYPE_PRE
- en: 'But, right away, there can be some ambiguities in our multimodal use case:'
  prefs: []
  type: TYPE_NORMAL
- en: What is a speaker?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Is it someone we see/hear?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What if the person visible in the video is not the one speaking?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What if the person speaking is never seen in the video?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How do we unconsciously identify who is speaking in a video?
  prefs: []
  type: TYPE_NORMAL
- en: First, probably by identifying the different voices on the fly?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Then, probably by consolidating additional audio and visual cues?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Can Gemini understand voice characteristics?
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE24]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE25]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE26]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE27]'
  prefs: []
  type: TYPE_PRE
- en: What about a French video?
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE28]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE29]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE30]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE31]'
  prefs: []
  type: TYPE_PRE
- en: '⚠️ We have to be cautious here: responses can consolidate multimodal information
    or even general knowledge. For example, if a person is famous, their name is most
    likely part of the LLM’s knowledge. If they are known to be from the UK, a possible
    inference is that they have a British accent. This is why we made our prompt more
    specific by including “using only the video’s audio”.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 💡 If you conduct more tests, for example on private audio files (i.e., not part
    of common knowledge and with no additional visual cues), you’ll see that Gemini’s
    audio tokenizer performs exceptionally well and extracts semantic speech information!
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'After a few iterations, we can arrive at a transcription prompt focusing on
    the audio and voices:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE32]'
  prefs: []
  type: TYPE_PRE
- en: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>**Output**
    🔽</summary>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE33]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE34]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE35]</details>'
  prefs: []
  type: TYPE_NORMAL
- en: This is looking good! And if you test these instructions on more complex videos,
    you’ll get similarly promising results.
  prefs: []
  type: TYPE_NORMAL
- en: 'Notice how the prompt reuses cherry-picked terms from the terminology previously
    provided by Gemini, while aiming for precision and concision:'
  prefs: []
  type: TYPE_NORMAL
- en: '`verbatim` is unambiguous (unlike “spoken words”)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`1, 2, 3, etc.` is an ellipsis (Gemini can infer the pattern)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`timecode` is specific (`timestamp` has more meanings)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`MM:SS` clarifies the timecode format'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 💡 Gemini 2.0 was trained to understand the specific `MM:SS` timecode format.
    Gemini 2.5 also supports the `H:MM:SS` format for longer videos. For the latest
    updates, refer to the [video understanding documentation](https://cloud.google.com/vertex-ai/generative-ai/docs/multimodal/video-understanding).
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: We’re halfway there. Let’s complete our database generation with a second task…
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 🧑 Speakers
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The second task is pretty straightforward: we want to extract speaker information
    into a second table. The two tables are logically linked by the voice ID.'
  prefs: []
  type: TYPE_NORMAL
- en: 'After a few iterations, we can reach a two-task prompt like the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE36]'
  prefs: []
  type: TYPE_PRE
- en: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>**Output**
    🔽</summary>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE37]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE38]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE39]</details>'
