- en: We started prototyping in natural language, crafted a prompt, and generated
    a structured output. Since reading raw data can be cumbersome, we can now present
    video transcriptions in a more visually appealing way.
  id: totrans-425
  prefs: []
  type: TYPE_NORMAL
  zh: 我们从自然语言原型开始，制作了一个提示词，并生成了结构化输出。由于读取原始数据可能很繁琐，我们现在可以以更视觉吸引力的方式呈现视频字幕。
- en: 'Here’s a possible orchestrator function:'
  id: totrans-426
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个可能的编排函数：
- en: '[PRE47]'
  id: totrans-427
