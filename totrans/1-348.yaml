- en: 💡 In this long video, the five panelists are correctly transcribed, diarized,
    and identified. In the second half of the video, unseen attendees ask questions
    to the panel. They are correctly identified as audience members and, though their
    names and companies are never written on the screen, Gemini correctly extracts
    and even consolidates the information from the audio cues.
