- en: Why Should We Bother with Quantum Computing in ML?
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 我们为什么要在机器学习中关注量子计算？
- en: 原文：[https://towardsdatascience.com/why-should-we-bother-with-quantum-computing-in-ml/](https://towardsdatascience.com/why-should-we-bother-with-quantum-computing-in-ml/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/why-should-we-bother-with-quantum-computing-in-ml/](https://towardsdatascience.com/why-should-we-bother-with-quantum-computing-in-ml/)
- en: When black cats prowl and pumpkins gleam, may luck be yours on Halloween. (Unknown)
  id: totrans-2
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 当黑猫徘徊，南瓜闪耀时，万圣节之夜愿你幸运。（未知）
- en: <mdspan datatext="el1761104784033" class="mdspan-comment">In recent years</mdspan>,
    conferences, workshops, articles, and books on quantum computing have multiplied,
    opening new ways to process information and to reconsider the **limits of classical
    systems**. The interplay between classical and quantum research has also driven
    hybrid algorithms that combine familiar techniques with quantum resources. This
    article introduces the essentials of quantum computing and tries to elaborate
    on further applications to data science.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1761104784033" class="mdspan-comment">近年来</mdspan>，关于量子计算的会议、研讨会、文章和书籍数量激增，开辟了新的信息处理方式，并重新思考了**经典系统的限制**。经典与量子研究之间的相互作用也推动了结合熟悉技术与量子资源的混合算法。本文介绍了量子计算的基本知识，并试图进一步阐述其在数据科学中的应用。
- en: '[With the 2025 Nobel Prize in Physics](https://www.nobelprize.org/prizes/physics/2025/summary/)
    [1] recognizing advances in quantum tunneling, it is clear that quantum technology
    will be even more present in the coming years. This key idea, developed since
    the 1980s, is that **quantum tunneling** enables devices that turn superposition,
    entanglement, and interference (refer to Figure 1 for definitions) into tools
    we can engineer, that means we can run real algorithms on real chips, not only
    in simulations, and explore new ways to learn from high-dimensional data more
    efficiently.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: '[随着2025年诺贝尔物理学奖](https://www.nobelprize.org/prizes/physics/2025/summary/) [1]认可量子隧穿方面的进展，很明显，量子技术将在未来几年中更加普遍。这个自1980年代以来发展起来的关键思想是，**量子隧穿**使得将叠加、纠缠和干涉（参见图1的定义）转化为我们可以工程化的工具成为可能，这意味着我们可以在真实的芯片上运行真实的算法，而不仅仅是模拟，并探索更有效地从高维数据中学习的新方法。'
- en: 'Before we dive into the basics, it’s worth asking why we need quantum in our
    **workflows**. The question is:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在深入探讨基础知识之前，值得问一问为什么我们需要在**工作流程**中引入量子计算。问题是：
- en: what are the limits in today’s methods that force us to reframe our approach
    and consider alternatives beyond the tools we already use?
  id: totrans-6
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 当前的方法中存在哪些限制，迫使我们必须重新思考我们的方法，并考虑使用我们已使用的工具之外的替代方案？
- en: 'Limitations of Moore’s law:'
  id: totrans-7
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 摩尔定律的局限性：
- en: 'Moore’s law, proposed in 1965, predicted that the number of transistors on
    a chip, and thus computing power, would roughly double every two years. This expectation
    drove decades of progress through steady transistor miniaturization: chips fit
    about twice as many transistors every two years, making computing cheaper and
    faster [2].'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 1965年提出的摩尔定律预测，芯片上的晶体管数量以及计算能力大约每两年翻一番。这一预期推动了数十年的进步，通过稳定的晶体管小型化：芯片每两年大约可以容纳两倍的晶体管，使计算更便宜、更快[2]。
- en: 'However, as engineers push transistor sizes to the atomic scale, they encounter
    daunting physical limitations: fitting more, smaller devices into the same area
    rapidly **increases** both **heat generation and power density, making cooling
    and stability much harder to manage**. At tiny scales, electrons leak or escape
    from their intended paths, causing power loss and making the chip behave unpredictably,
    which can lead to errors or reduced performance. Moreover, wires, memory, and
    input/output systems do not scale as efficiently as transistors, resulting in
    serious bottlenecks for overall system performance [2].'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，随着工程师将晶体管尺寸推进到原子尺度，他们遇到了令人畏惧的物理限制：在相同区域内迅速**增加**更多、更小的设备，这不仅**增加了**热量产生和功率密度，使得冷却和稳定性变得更加难以管理。在微小尺度上，电子会泄漏或逃逸出其预定路径，导致功率损失，并使芯片表现出不可预测的行为，这可能导致错误或性能下降。此外，电线、内存和输入/输出系统不像晶体管那样高效地扩展，这导致整体系统性能出现严重瓶颈[2]。
- en: All these barriers make it clear that the **exponential growth predicted by
    Moore’s law cannot continue indefinitely**; only relying on shrinkage alone is
    no longer viable. Instead, progress now depends on better algorithms, specialized
    hardware, and, where suitable, optimal algorithms that (when applicable) leverage
    quantum approaches for selected, high-impact subproblems.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些障碍都清楚地表明，摩尔定律预测的**指数级增长不能无限期地持续**；仅仅依靠缩小尺寸的方法已经不再可行。相反，现在的进步依赖于更好的算法、专用硬件，以及在适用的情况下，利用量子方法解决选定的高影响子问题的最优算法（当适用时）。
- en: As data volumes continue to grow and computational demands escalate, deep learning
    and other modern AI methods are reaching practical limits in time, energy, and
    memory efficiency. **Quantum computing offers a different route**, one that processes
    information through superposition, entanglement, and interference, allowing certain
    computations to scale more efficiently. The goal of **quantum machine learning
    (QML)** is to use **qubits** instead of bits to represent and transform data,
    potentially handling high-dimensional or uncertain problems more effectively than
    classical systems. Although today’s hardware is still developing, the conceptual
    foundations of QML already point toward a future where both quantum and classical
    resources work together to overcome computational bottlenecks.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 随着数据量的持续增长和计算需求的增加，深度学习和其他现代人工智能方法在时间、能量和内存效率方面达到了实际极限。**量子计算提供了一条不同的途径**，它通过叠加、纠缠和干涉处理信息，允许某些计算更有效地扩展。**量子机器学习（QML）**的目标是使用**量子比特**而不是比特来表示和转换数据，可能比经典系统更有效地处理高维或不确定的问题。尽管今天的硬件仍在发展，但QML的概念基础已经指向一个未来，在那里量子资源和经典资源共同工作以克服计算瓶颈。
- en: Security Paradigm
  id: totrans-12
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 安全范式
- en: Traditional **encryption methods rely on complex mathematical problems that
    classical computers find hard to solve**. However, quantum computers threaten
    to break many of these systems rapidly by exploiting quantum algorithms like Shor’s
    algorithm (one of the examples of quantum computational advantage) [3]. Many quantum-based
    security innovations are increasingly moving from theory into practical use in
    industries requiring the highest data protection standards.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 传统**加密方法依赖于经典计算机难以解决的复杂数学问题**。然而，量子计算机通过利用像Shor算法（量子计算优势的例子之一）这样的量子算法，威胁要迅速破解许多这些系统。许多基于量子安全的创新越来越多地从理论转向在需要最高数据保护标准行业中的实际应用。
- en: 'A concrete example of this risk is known as **“harvest now, decrypt later”**:
    where attackers capture and store encrypted data today, even if they cannot decrypt
    it yet. Once large-scale quantum computers become available, they could use quantum
    algorithms to **retroactively decrypt** this information, exposing sensitive data
    such as health records, financial transactions, or classified communications [4].'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 这种风险的具体例子被称为**“先收集，后解密”**：攻击者今天捕获并存储加密数据，即使他们现在还无法解密。一旦大规模量子计算机变得可用，他们可以使用量子算法**事后解密**这些信息，暴露敏感数据，如健康记录、金融交易或机密通信[4]。
- en: '**To approach this challenge** Google Chrome Browser Includes'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: '**为了应对这一挑战**，Google Chrome浏览器包括'
- en: Quantum-Resistance. Since version 116, Chrome has implemented a **hybrid key
    agreement algorithm (X25519Kyber768)** that combines traditional elliptic-curve
    cryptography with **Kyber**, one of the algorithms standardized by **NIST** for
    quantum-resistant encryption. This approach protects data against both **classical
    and future quantum attacks.**
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 量子抗性。自版本116以来，Chrome实现了**混合密钥协商算法（X25519Kyber768）**，它将传统的椭圆曲线密码学与**Kyber**算法相结合，Kyber是**NIST**为量子抗性加密标准化的算法之一。这种方法可以保护数据免受**经典和未来量子攻击**。
- en: Mathematical complexity
  id: totrans-17
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数学复杂性
- en: Using Quantum principles can help to explore vast solution spaces more efficiently
    than traditional methods. This makes quantum approaches particularly promising
    for optimization, machine learning, and simulation problems with high computational
    complexity (**[Big-O](https://www.geeksforgeeks.org/dsa/analysis-algorithms-big-o-analysis/)**
    or how effort scales with problem size). For example, **factoring large integers
    is computationally hard mainly due to mathematical complexity, not memory or brute
    force limits**. This means that for very large numbers, like those used in cryptographic
    systems, **factorization of large numbers is practically impossible on classical
    computers**.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 使用量子原理可以帮助比传统方法更有效地探索广阔的解决方案空间。这使得量子方法在优化、机器学习和具有高计算复杂性的模拟问题（如[Big-O](https://www.geeksforgeeks.org/dsa/analysis-algorithms-big-o-analysis/)或工作量如何随问题规模而变化）方面特别有前景。例如，**大整数的分解在计算上很困难，主要是因为数学复杂性，而不是内存或穷举限制**。这意味着对于非常大的数字，例如在加密系统中使用的数字，**在经典计算机上对大数进行分解实际上是不可能的**。
- en: '* * *'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Understanding the basics
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 理解基础
- en: To understand more about these topics, it is necessary to grasp the basic rules
    of quantum mechanics and how they differ from the classical view that we use today.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 要了解这些主题的更多内容，有必要掌握量子力学的基本规则以及它们与我们今天使用的经典观点有何不同。
- en: In classical computing, data is represented as bits, which can have a value
    of 0 or 1\. These bits are combined and manipulated using logical operations or
    logic gates (AND, OR, NOT, XOR, XNOR) to perform calculations and solve problems.
    However, the amount of information a classical computer can store and process
    is limited by the number of bits it has, which can represent only a finite number
    of possible combinations of 0s and 1s. Therefore, certain calculations like factoring
    large numbers are very difficult for conventional computers to perform.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 在经典计算中，数据以比特的形式表示，可以具有0或1的值。这些比特通过逻辑运算或逻辑门（与、或、非、异或、同或）的组合和操作来进行计算和解决问题。然而，经典计算机可以存储和处理的信息量受其拥有的比特数限制，这些比特只能表示0和1的有限组合。因此，像分解大数这样的计算对于传统计算机来说非常困难。
- en: On the other hand, in quantum computing, data is represented as quantum bits,
    or qubits, which can have a value of 0 and 1 simultaneously due to the principles
    of superposition, interference, and entanglement. These principles allow quantum
    systems to process information in parallel and solve some problems much faster.
    This is known as the ‘quantum **cat** state’ or Schrödinger’s **cat** state.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，在量子计算中，数据以量子比特或qubit的形式表示，由于叠加、干涉和纠缠的原理，可以同时具有0和1的值。这些原理允许量子系统并行处理信息，并快速解决某些问题。这被称为“量子**猫**状态”或薛定谔的**猫**状态。
- en: '![](../Images/f3ce67bf9c4d292eee96d1119acce45a.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f3ce67bf9c4d292eee96d1119acce45a.png)'
- en: '**Figure 1:** Illustration of the difference between classical and quantum
    states using Schrödinger’s cat analogy. In the classical state (left), the cat
    is either alive or dead, corresponding to a bit being 0 or 1\. In the quantum
    state (right), the cat exists in a *superposition* of both states simultaneously.
    Quantum interference and *entanglement* further define how these states interact
    and remain correlated. Image by the author.'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: '**图1**：使用薛定谔的猫类比说明经典和量子状态之间的差异。在经典状态（左），猫要么活着要么死了，对应于比特为0或1。在量子状态（右），猫同时存在于两种状态的叠加中。量子干涉和**纠缠**进一步定义了这些状态如何相互作用并保持相关性。图片由作者提供。'
- en: This idea can be explained with Schrödinger’s cat experiment (figure 1), in
    which a **hypothetically radioactive atom is used in a closed mechanism that,
    if triggered, could end the life of a cat trapped inside 🙀🙀🙀**. The idea is that
    the atom is in a superposition of states that either activates or does not activate
    the mechanism, and at the same time is entangled with the state of the cat, so
    until the atom’s state materializes, the cat’s state remains in a superposition
    of being both alive 😺 and dead ☠️ simultaneously. The cat’s state in Schrödinger’s
    experiment is not a real state of matter but rather a **theoretical concept used
    to explain the strange behavior of quantum systems**.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 这个想法可以用薛定谔的猫实验（图1）来解释，在这个实验中，一个**假设的放射性原子被用于一个封闭的机制中，如果被触发，可能会结束被关在里面的猫的生命 🙀🙀🙀**。这个想法是原子处于一种叠加态，要么激活要么不激活机制，同时与猫的状态纠缠在一起，所以直到原子的状态实现，猫的状态才会保持在同时活着
    😺 和死去 ☠️ 的叠加态。薛定谔实验中的猫的状态不是真实的物质状态，而是一个**用于解释量子系统奇怪行为的理论概念**。
- en: 'A similar idea can be illustrated with a quantum coin (a better example that
    protects the cats 🐱). A normal coin always has one face up, either heads or tails,
    but a quantum coin can exist in a superposition of both possibilities at once
    until it is observed. When someone checks, the superposition collapses into a
    definite outcome. The coin can also become entangled with the device or system
    that measures it, meaning that knowing one immediately determines the other (regardless
    of initial classical conditions). Interference further modifies the probabilities:
    sometimes the waves add together, making one outcome more likely, while in other
    cases they cancel out, making it less likely. Even the actions of starting, flipping,
    and landing can involve quantum phases and create superpositions or entanglement.'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 类似的概念可以用量子硬币（一个更好的例子，可以保护猫咪 🐱）来解释。一枚普通的硬币总是有一面朝上，要么是正面要么是反面，但量子硬币可以同时存在于两种可能性的叠加态，直到被观察。当有人检查时，叠加态会坍缩成确定的结果。硬币还可以与测量它的设备或系统纠缠在一起，这意味着知道一个立即确定另一个（无论初始的经典条件如何）。干涉进一步修改了概率：有时波会相加，使某个结果更有可能，而在其他情况下它们会相互抵消，使结果不太可能。甚至启动、翻转和落地的动作都可能涉及量子相位，并创建叠加态或纠缠。
- en: Building on these ideas, an n-qubit register lives in a space with *2^n* possible
    states, meaning it can represent complex patterns of quantum amplitudes. However,
    this does not mean that *n* qubits store *2^n* classical bits or that all answers
    can be read at once. When the system is measured, the state collapses, and only
    limited classical information is obtained, roughly *n* bits per run. The power
    of quantum computation lies in designing algorithms that prepare and manipulate
    superpositions and phases so that interference makes the correct outcomes more
    likely and the incorrect ones less likely. Superposition and entanglement are
    the essential resources, but **true quantum advantage depends on how these effects
    are used within a specific algorithm or problem**.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 建立在这些想法的基础上，一个n量子位的寄存器存在于有*2^n*可能状态的时空中，这意味着它可以表示量子振幅的复杂模式。然而，这并不意味着*n*量子位存储*2^n*经典比特，或者所有答案都可以一次性读取。当系统被测量时，状态会坍缩，并且每次运行只能获得有限经典信息，大约*n*比特。量子计算的强大之处在于设计算法，准备和操作叠加态和相位，使得干涉使正确的结果更有可能，错误的结果更不可能。叠加态和纠缠是基本资源，但**真正的量子优势取决于如何在特定的算法或问题中使用这些效果**。
- en: '* * *'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Different approaches
  id: totrans-30
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 不同的方法
- en: There are several kinds of approaches to quantum computing, which differ in
    the qubits they use, how they control them, the conditions they need, and the
    problems they’re good at. **Figure 2** summarizes the main options, and as the
    field matures, more advanced techniques continue to emerge.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 量子计算有几种不同的方法，它们在使用的量子位、控制方式、所需条件以及擅长解决的问题上有所不同。**图2**总结了主要选项，并且随着该领域的成熟，更多高级技术持续涌现。
- en: '![](../Images/4052b32896998bb937f22c0ceafe4e93.png)'
  id: totrans-32
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/4052b32896998bb937f22c0ceafe4e93.png)'
- en: Figure 2\. Overview of different approaches to quantum computing. Each approach
    varies in purpose, scalability, and degree of quantum advantage. Image by the author.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: '**图2**. 量子计算不同方法的概述。每种方法在目的、可扩展性和量子优势程度上都有所不同。图片由作者提供。'
- en: In gate-model quantum computers and quantum annealers, simulation on classical
    computers becomes impractical as quantum systems grow large (such as those with
    many qubits or complex problems like factorization of large numbers) due to the
    exponential resource demands. Real quantum hardware is needed to observe true
    quantum speedup at scale. However, classical computers still play a crucial role
    today by allowing researchers and practitioners to **simulate small quantum circuits
    and experiment with quantum-inspired algorithms that mimic quantum behavior without
    requiring quantum hardware**.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 在门模型量子计算机和量子退火器中，随着量子系统变得庞大（例如，具有许多qubits或复杂问题，如大数的分解），在经典计算机上进行模拟变得不切实际，因为资源需求呈指数增长。需要真正的量子硬件来观察真正的量子加速。然而，经典计算机在今天仍然发挥着至关重要的作用，它允许研究人员和实践者**模拟小型量子电路并实验量子启发的算法，这些算法模仿量子行为而不需要量子硬件**。
- en: When you do need real quantum devices, access is mostly via cloud platforms
    (IBM Quantum, Rigetti, Azure Quantum, D-Wave). Libraries like **Qiskit** or **PennyLane**
    let you prototype on **classical simulators** and, with credentials, **submit
    jobs to hardware**. Simulation is essential for development but doesn’t perfectly
    capture physical limits (noise, connectivity, queueing, device size).
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 当你需要真正的量子设备时，通常通过云平台（IBM Quantum、Rigetti、Azure Quantum、D-Wave）来访问。像**Qiskit**或**PennyLane**这样的库让你可以在**经典模拟器**上原型设计，并且有了凭证，**可以将工作提交到硬件上**。模拟对于开发至关重要，但它并不能完美地捕捉物理限制（噪声、连接性、排队、设备大小）。
- en: 'Gate models:'
  id: totrans-36
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 门模型：
- en: On **gate-model** hardware, the first step is usually setting up a circuit that
    encodes the quantum state you need to solve the problem. So, the info we know
    is encoded into quantum states using quantum bits or qubits, which are controlled
    by quantum gates. **These gates are like the logic operations in classical computing**,
    but they work on qubits and take advantage of quantum properties like superposition,
    entanglement, and interference. There are lots of ways to encode a quantum state
    into a circuit, and depending on how you do it, **error rates can be very different**.
    That’s why error correction techniques are used to fix mistakes and make calculations
    more accurate. After all the operations and calculations are done, the results
    need to be **decoded back** so we can understand them in the normal classical
    world.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 在**门模型**硬件上，第一步通常是设置一个电路，该电路编码了你需要解决该问题的量子状态。因此，我们所知道的信息被编码到量子状态中，使用量子位或qubits，这些位由量子门控制。**这些门类似于经典计算中的逻辑运算**，但它们作用于qubits，并利用量子特性，如叠加、纠缠和干涉。有许多方法可以将量子状态编码到电路中，而且根据你的做法，**错误率可能会有很大差异**。这就是为什么使用纠错技术来纠正错误并使计算更准确。在所有操作和计算完成后，结果需要被**解码回**，这样我们才能在正常经典世界中理解它们。
- en: In the case of QML or quantum ML, kernels and variational algorithms are used
    to encode and build models. These techniques have approaches somewhat different
    from those used in classical machine learning.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 在量子机器学习（QML）或量子机器学习（quantum ML）的情况下，使用核和变分算法来编码和构建模型。这些技术与在经典机器学习中使用的那些有所不同。
- en: '**Variational algorithms (VQAs):** define a parameterized circuit and use classical
    optimization to tune parameters against a loss (e.g., for classification). Examples
    include **Quantum Neural Networks (QNNs)**, **Variational Quantum Eigensolver
    (VQE)**, and **Quantum Approximate Optimization Algorithm (QAOA)**.'
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**变分算法（VQAs）**：定义一个参数化电路，并使用经典优化来调整参数以对抗损失（例如，用于分类）。例子包括**量子神经网络（QNNs）**、**变分量子本征值求解器（VQE）**和**量子近似优化算法（QAOA）**。'
- en: '**Quantum-kernel methods:** build **quantum feature maps** and measure similarities
    to feed classical classifiers or clusterers. Examples include **Quantum SVM (QSVM)**,
    **Quantum Kernel Estimation (QKE)**, and **Quantum k-means**.'
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**量子核方法**：构建**量子特征映射**并测量相似性以供经典分类器或聚类器使用。例子包括**量子支持向量机（QSVM）**、**量子核估计（QKE）**和**量子k-means**。'
- en: QML algorithms, such as kernel-based methods and variational algorithms, have
    shown **promising results in areas like optimization and image recognition and
    have the potential to revolutionize various industries**, from healthcare to finance
    and cybersecurity. However, many challenges remain, such as the need for robust
    error correction techniques, the high cost of quantum hardware, and the shortage
    of quantum experts.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: QML算法，如基于核的方法和变分算法，在优化和图像识别等领域已经显示出**有希望的结果，并有可能革命性地改变各个行业**，从医疗保健到金融和网络安全。然而，许多挑战仍然存在，例如需要鲁棒的纠错技术，量子硬件的高成本，以及量子专家的短缺。
- en: Quantum annealing
  id: totrans-42
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 量子退火
- en: Many real-world problems are combinatorial, with possibilities growing factorially
    (e.g., 10!, 20!, etc.), making exhaustive search impractical. These problems often
    map naturally to graphs and can be formulated as Quadratic Unconstrained Binary
    Optimization (QUBO) or Ising models. Quantum annealers load these problem formulations
    and search for low-energy (optimal or near-optimal) states, providing an alternative
    heuristic for optimization tasks with graph structures. When compared fairly with
    strong classical baselines under the same time constraints, quantum annealing
    can show competitive performance.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 许多现实世界的问题都是组合性的，可能性呈阶乘增长（例如，10!，20!等），使得穷举搜索不切实际。这些问题通常自然映射到图上，可以表述为二次无约束二进制优化（QUBO）或伊辛模型。量子退火器加载这些问题表述并搜索低能量（最优或近似最优）状态，为具有图结构的优化任务提供了一种替代启发式方法。当在相同的时间约束下与强大的经典基线公平比较时，量子退火可以显示出具有竞争力的性能。
- en: In QML, quantum annealing can be applied to optimize parameters in machine learning
    models, discover patterns, or perform clustering by finding minimum energy configurations
    representing solutions. Although quantum annealers are hardware-specific and specialized,
    their practical application to machine learning and optimization makes them an
    important complementary approach to gate-model QML.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 在QML中，量子退火可以应用于优化机器学习模型中的参数，发现模式，或通过寻找代表解决方案的最小能量配置来执行聚类。尽管量子退火器是硬件特定的和专业的，但它们在机器学习和优化中的实际应用使它们成为门模型QML的重要补充方法。
- en: Quantum annealers often serve as heuristic solvers and are compared against
    classical strong baselines under similar time constraints. Access is generally
    via cloud services (like D-Wave), and their noise and hardware limitations distinguish
    them from gate-model quantum computers.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 量子退火器通常作为启发式求解器，在类似的时间约束下与经典强基线进行比较。通常通过云服务（如D-Wave）访问，它们的噪声和硬件限制使它们与门模型量子计算机区分开来。
- en: Quantum-inspired
  id: totrans-46
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 量子启发的
- en: These are **classical** algorithms that mimic ideas from quantum computing (e.g.,
    annealing-style search, tensor methods). They run on CPUs/GPUs (**no quantum hardware
    required** ) and make strong baselines. You can use standard Python stacks or
    specialized packages to try them at scale.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是**经典**算法，它们模仿了量子计算中的想法（例如，退火式搜索，张量方法）。它们在CPU/GPU上运行（**无需量子硬件**）并建立了强大的基线。您可以使用标准的Python堆栈或专门的包在规模上尝试它们。
- en: Quantum-inspired algorithms provide a practical bridge by leveraging quantum
    principles within classical computing, offering potential speedups for certain
    problem classes without needing expensive quantum hardware. However, they do not
    provide the full advantages of true quantum computation, and their performance
    gains depend heavily on the problem and implementation details.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 量子启发的算法通过在经典计算中利用量子原理提供了一个实用的桥梁，为某些问题类提供了潜在的速度提升，而无需昂贵的量子硬件。然而，它们并不提供真正量子计算的全部优势，并且它们的性能提升在很大程度上取决于问题和实现细节。
- en: 'Example:'
  id: totrans-49
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 示例：
- en: Today’s quantum advantage is still embryonic and highly problem-dependent. The
    biggest gains are expected on high-complexity problems with structure that quantum
    algorithms can exploit. The toy example presented is this section is purely illustrative
    and highlights differences between approaches, but real advantage is more likely
    to appear on problems that are currently hard or intractable for classical computers.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 今天的量子优势仍然处于萌芽阶段，并且高度依赖于问题。最大的收益预计将出现在量子算法可以利用结构的高复杂性问题上。本节中提供的玩具示例纯粹是说明性的，突出了方法之间的差异，但真正的优势更有可能在目前对经典计算机来说困难或难以处理的问题上出现。
- en: In this [example](https://github.com/erikapat/quantum-experiments/blob/master/quatum.py),
    we use a tabular and simulated dataset in which most points are normal and a small
    fraction are anomalies (Figure 3). In this demo, *normality* corresponds to the
    dense cluster around the origin, while anomalies form a few small clusters far
    away.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个 [示例](https://github.com/erikapat/quantum-experiments/blob/master/quatum.py)
    中，我们使用了一个表格和模拟数据集，其中大多数点是正常的，一小部分是异常的（图3）。在这个演示中，**正常性**对应于原点周围的密集簇，而异常点形成了一些远离的小簇。
- en: '![](../Images/85b2e69da74726e2594b50a1827e3ea6.png)'
  id: totrans-52
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/85b2e69da74726e2594b50a1827e3ea6.png)'
- en: '**Figure 3.** *Ground truth distribution of normal and anomalous points (test
    set)*. Image by the author.'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: '**图3**。*正常点和异常点（测试集）的真实分布*。图片由作者提供。'
- en: '![](../Images/1250ef57b83ae27c93a04dba3017db80.png)'
  id: totrans-54
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/1250ef57b83ae27c93a04dba3017db80.png)'
- en: '**Figure 4.** *Overview of the three modeling approaches used for anomaly detection.*'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '**图4**。*用于异常检测的三个建模方法的概述*。'
- en: 'Starting from the same tabular dataset, the workflow branches into three paths:
    (1) **Classical ML (baseline)**, (2) **Gate-based Quantum ML** and (3) **Quantum
    Annealing (QUBO)**. Image by the author.'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 从同一个表格数据集开始，工作流程分为三条路径：（1）**经典ML（基线）**，（2）**基于门的量子ML** 和（3）**量子退火（QUBO）**。图片由作者提供。
- en: 'The diagram of figure 4 illustrates a unified workflow for anomaly detection
    using three distinct approaches on the same tabular dataset: (1) classical machine
    learning (One-Class SVM)[7], (2) gate-based quantum machine learning (quantum
    kernel methods)[8], and (3) quantum annealing-inspired optimization. First, the
    dataset is cleaned, scaled, and split into training, validation, and test sets.
    For the classical path, polynomial feature engineering is applied before training
    a One-Class SVM and evaluating predictions. The gate-based quantum ML option encodes
    features using a quantum map and estimates quantum kernels for training and inference,
    followed by decoding and evaluation. The annealing route formulates the task as
    a QUBO, solves it with simulated annealing, decodes results, and evaluates performance.
    Each approach produces its own anomaly prediction outputs and evaluation metrics,
    providing complementary perspectives on the data and demonstrating how both classical
    and quantum-inspired tools can be integrated into a single analysis pipeline running
    on a classical computer.'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 图4的示意图说明了使用三种不同的方法在同一表格数据集上进行异常检测的统一工作流程：（1）**经典机器学习（单类SVM）**[7]，（2）基于门的量子机器学习（量子核方法）[8]，和（3）量子退火启发的优化。首先，数据集被清理、缩放，并分为训练集、验证集和测试集。对于经典路径，在训练单类SVM和评估预测之前，应用多项式特征工程。基于门的量子ML选项使用量子映射编码特征，并估计训练和推理的量子核，然后进行解码和评估。退火路径将任务表述为QUBO，使用模拟退火求解，解码结果并评估性能。每种方法都产生自己的异常预测输出和评估指标，提供了对数据的补充视角，并展示了如何将经典和量子启发的工具集成到在经典计算机上运行的单一分析管道中。
- en: '![](../Images/e93e96bbdb3378a6a8ece6d036540157.png)'
  id: totrans-58
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e93e96bbdb3378a6a8ece6d036540157.png)'
- en: '**Figure 5\.  Comparison of Three Anomaly Detection Approaches.**'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: '**图5**。*三种异常检测方法的比较*。'
- en: Visualization of results on test dataset using (A) a **Classical One-Class SVM**,
    (B) a **Quantum Kernel OCSVM (Gate-model QML simulation with PennyLane)**, and
    (C) a **QUBO-based Simulated Annealing approach (Quantum-Inspired)**. Each plot
    shows normal points (blue) and predicted anomalies (orange). Image by the author.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 (A) **经典单类SVM**，(B) **量子核OCSVM（使用PennyLane的量子门模型QML模拟）**，和 (C) **基于QUBO的模拟退火方法（量子启发式）**
    在测试数据集上对结果进行可视化。每个图表显示了正常点（蓝色）和预测的异常点（橙色）。图片由作者提供。
- en: 'On this tiny, imbalanced test set (22 normal, 4 anomalous points), the three
    approaches behaved differently. The **quantum-kernel OCSVM** achieved the best
    balance: higher overall accuracy (~0.77) by catching most anomalies (recall 0.75)
    while keeping false alarms lower than the others. The **classical OCSVM (RBF)**
    and the **annealer-style QUBO** both reached recall 1.0 (they found all 4 anomalies)
    but over-flagged normals, so their accuracies fell (≈0.58 and 0.65).'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个微小、不平衡的测试集（22个正常点，4个异常点）上，三种方法表现不同。**量子核OCSVM** 实现了最佳平衡：通过捕获大多数异常（召回率 0.75）而将误报率保持在低于其他方法的水平，从而提高了整体准确率（约
    0.77）。**经典OCSVM（径向基函数）** 和 **退火风格的QUBO** 都达到了召回率 1.0（它们找到了所有 4 个异常），但过度标记了正常点，因此它们的准确率下降（≈0.58
    和 0.65）。
- en: 'The objective here is demonstration, not performance: this example shows how
    to use the approaches, and the results are not the focus. It also illustrates
    that the feature map or representation can matter more than the classifier.'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 此处的目标是演示，而不是性能：这个例子展示了如何使用这些方法，结果并不是重点。它还说明了特征映射或表示可能比分类器更重要。
- en: 'Any claim of quantum advantage ultimately depends on scaling: problem size
    and structure, circuit depth and width, entanglement in the feature map, and the
    ability to run on real quantum hardware to exploit interference rather than merely
    simulate it. We are not claiming quantum advantage here; this is a simple problem
    that classical computers can solve, even when using quantum-inspired ideas.'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 任何量子优势的声明最终都取决于可扩展性：问题大小和结构、电路深度和宽度、特征映射中的纠缠，以及能够在真实量子硬件上运行以利用干涉而不是仅仅模拟的能力。我们在这里不声称量子优势；这是一个经典计算机可以解决的简单问题，即使使用量子启发的想法。
- en: '* * *'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: When to Go Quantum
  id: totrans-65
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 何时进行量子化
- en: 'It makes sense to **start on simulators** and only move to **real quantum hardware**
    if there are clear signals of benefit. Simulators are fast, cheap, and reproducible:
    you can prototype quantum-style methods (e.g., quantum kernels, QUBOs) alongside
    strong classical baselines under the **same time/cost budget**. This lets you
    tune feature maps, hyperparameters, and problem encodings, and see whether any
    approach shows better accuracy, time-to-good-solution, robustness, or scaling
    trends.'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 有意义的是**从模拟器开始**，只有在有明确的收益信号时才转向**真实量子硬件**。模拟器速度快、成本低、可重复：你可以在相同的**时间/成本预算**下，与强大的经典基线一起原型化量子风格的方法（例如，量子内核、QUBOs）。这让你可以调整特征映射、超参数和问题编码，并查看任何方法是否显示出更好的准确性、找到好解的时间、鲁棒性或扩展趋势。
- en: 'You then **use hardware when it’s justified:** for example, when the simulator
    suggests promising scaling, when the problem structure matches the device (e.g.,
    good QUBO embeddings or shallow gate circuits), or when stakeholders need hardware
    evidence. On hardware you measure **quality–time–cost** with noise and connectivity
    constraints, apply error-mitigation, and compare fairly against tuned classical
    methods. In short: **simulate first, then go quantum** to validate real-world
    performance; adopt quantum only if the hardware results and curves truly warrant
    it.'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 当有正当理由时，你才**使用硬件**：例如，当模拟器建议有希望的扩展性时，当问题结构与设备匹配时（例如，良好的QUBO嵌入或浅层门电路），或者当利益相关者需要硬件证据时。在硬件上，你测量**质量-时间-成本**，考虑噪声和连接性限制，应用错误缓解，并与调整后的经典方法进行公平比较。简而言之：**先模拟，然后进行量子化**以验证实际性能；只有当硬件结果和曲线真正证明需要时才采用量子。
- en: As noted earlier, today’s quantum advantage is still embryonic and highly problem-dependent.
    The real challenge and opportunity is to turn promising simulations into hardware-verified
    gains on problems that remain difficult for classical computing, showing clear
    improvements in quality, time, and cost as problem size grows.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，今天的量子优势仍然处于萌芽阶段，并且高度依赖于问题。真正的挑战和机遇是将有希望的模拟转化为在经典计算仍然困难的问题上的硬件验证收益，随着问题规模的增加，在质量、时间和成本方面显示出明显的改进。
- en: Quantum machine learning has the potential to go beyond classical methods in
    model compression and scalability, especially for data-rich fields like cybersecurity.
    The challenge is handling enormous datasets, with millions of normal interactions
    and very few attacks. Quantum models can compress complex patterns into compact
    quantum representations using superposition and entanglement, which allows for
    more efficient anomaly detection even in imbalanced data. Hybrid quantum-classical
    and federated quantum learning methods aim to improve scalability and privacy,
    making real-time intrusion detection more feasible. Despite current hardware limitations,
    research indicates quantum compression could enable future models to manage larger,
    complex cybersecurity data streams more effectively, paving the way for powerful
    practical defenses.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 量子机器学习有可能在模型压缩和可扩展性方面超越经典方法，尤其是在数据丰富的领域，如网络安全。挑战在于处理庞大的数据集，包含数百万的正常交互和非常少的攻击。量子模型可以使用叠加和纠缠将复杂模式压缩成紧凑的量子表示，即使在数据不平衡的情况下也能实现更有效的异常检测。混合量子-经典和联邦量子学习方法旨在提高可扩展性和隐私性，使实时入侵检测更加可行。尽管当前硬件存在限制，但研究表明量子压缩可以使未来的模型更有效地管理更大的、复杂的网络安全数据流，为强大的实际防御铺平道路。
