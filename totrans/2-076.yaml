- en: Does the Code Work or Not?
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/does-the-code-work-or-not/](https://towardsdatascience.com/does-the-code-work-or-not/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/85c09c2d38434b597b30f9ef7f319708.png)'
  prefs: []
  type: TYPE_IMG
- en: Photo by [Alex Padurariu](https://unsplash.com/@alexpadurariu?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  prefs: []
  type: TYPE_NORMAL
- en: '<mdspan datatext="el1754323156500" class="mdspan-comment">Recently</mdspan>,
    I wrote a [mid-year reflection on AI developments](https://towardsdatascience.com/midyear-2025-ai-reflection/),
    during which I mentioned the reported impact of AI on the unemployment rate for
    recent graduates, referencing [a New York Times (NYT) article](https://www.nytimes.com/2025/05/30/technology/ai-jobs-college-graduates.html).
    And, since I’ve read the article, regardless of the point well taken, there was
    one sentence in it that stuck with me:'
  prefs: []
  type: TYPE_NORMAL
- en: '*“Does the code work or not?” *'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: To avoid taking the sentence out of context, let me share the background on
    how the author arrived at it.
  prefs: []
  type: TYPE_NORMAL
- en: 'The timely NYT story begins by discussing AI displacing the need for entry-level
    professionals, where the author notes that automating white-collar work has been
    a long-held ambition for many executives. However, the technology itself wasn’t
    sufficiently mature to manage the more complex and technical aspects of many jobs.
    At least, not until recent AI advancements, which prompted him to write:'
  prefs: []
  type: TYPE_NORMAL
- en: '*That is starting to change, especially in fields such as **software engineering**,
    where there are **clear markers** of **success** and **failure**. (Such as: **Does
    the code work or not?**)*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'In the reporter’s defence, there are probably writing guidelines and principles
    that we don’t understand, resulting in a restriction and “limited space” to explain
    the “*code* *work*/*not* *work*” part better. That said, no hard feelings on my
    callout here. Nonetheless, for all the non-tech people out there, I feel a need
    to elaborate on a common misconception: not everything we (tech people) produce
    is measurable in ‘1s’ or ‘0s’. 🙂'
  prefs: []
  type: TYPE_NORMAL
- en: Before I deepen my explanation, let me share a story that’s been on my mind
    a lot lately.
  prefs: []
  type: TYPE_NORMAL
- en: More than 14 years ago, I was doing an internship on a High-Voltage Laboratory
    construction project at a transformer company. Being a part of the so-called *Steerco,*
    i.e., steering committee, my tasks were to push the project forward by resolving
    legal and budget-related hiccups. As is often the case on construction projects,
    budgetary and legal problems are not so unusual when you have different professions
    coming together — architects, civil engineers, electrical and mechanical engineers — to
    build a specialised manufacturing plant with a [Faraday cage](https://en.wikipedia.org/wiki/Faraday_cage).
  prefs: []
  type: TYPE_NORMAL
- en: So, five months into the project, and a mere seven months out of Uni, the project
    sponsors (CEOs), who were engineers by profession, noticed that the actual cost
    for the facade was above the estimated budget. The cost of materials listed in
    the preliminary budget, which significantly impacted the overall project cost,
    was diverging by (*if I recall correctly*) 40%.
  prefs: []
  type: TYPE_NORMAL
- en: Because of this, the CEOs instructed my colleague and me to inform the architect,
    who had over 20 years of experience, that the costs were unacceptable and that
    a change in materials was expected to fit the project budget.
  prefs: []
  type: TYPE_NORMAL
- en: 'You can imagine what happened next: *I was shot down in a second. *'
  prefs: []
  type: TYPE_NORMAL
- en: 'I will never forget her saying:'
  prefs: []
  type: TYPE_NORMAL
- en: '*We are not at a bazaar here; there is a reason why specific materials were
    picked for the facade. Just because everyone today has built their own storage
    unit at home, it doesn’t mean they are an architect who knows how to design a
    specialised building according to the relevant standards.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Then she added “…*isolation*, something, *building physics*, something, *sub-surface*,
    something, *preliminary vs. main design*, something, something…”
  prefs: []
  type: TYPE_NORMAL
- en: 'Of course, I returned this message, with “*something, something*”, to the CEOs,
    and what happened further was that I was shot down twice in a day with the counterstatement:'
  prefs: []
  type: TYPE_NORMAL
- en: '*True, we are not at a bazaar, but we don’t need to pay the price for someone
    else’s mistake. The responsible party should take accountability and find a solution
    that fits our budget.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[So much about “don’t kill the messenger.”]'
  prefs: []
  type: TYPE_NORMAL
- en: You see where I am going with this story. In the generative AI era, everyone
    has managed to experience what it means to be a “coder”. However, not everyone
    is a software engineer, nor willing to pay the salary of one if life is just as
    good with a “sub-optimal DIY storage unit that only you and your family members
    will use.”
  prefs: []
  type: TYPE_NORMAL
- en: 'Returning to the NYT article, you can now understand why the sentence, “*Does
    the code work or not?*” stuck with me. In my head, this sentence sounded as if
    the coding task could be mostly simplified to: “*If it (among other straightforward,
    binary outcomes) compiles, you can ship it.*”'
  prefs: []
  type: TYPE_NORMAL
- en: 'Again, while this was only an example (and not a false one), at least a dozen
    more questions should be asked to get a fuller picture and arrive at a true “working
    state” for any code change or implementation, such as:'
  prefs: []
  type: TYPE_NORMAL
- en: …Is the current (data) architecture supporting this change?
  prefs: []
  type: TYPE_NORMAL
- en: …Is the change approved by the legal and security team?
  prefs: []
  type: TYPE_NORMAL
- en: …Is the code implemented according to development practices?
  prefs: []
  type: TYPE_NORMAL
- en: …Is the change performant?
  prefs: []
  type: TYPE_NORMAL
- en: …Is it end-to-end tested?
  prefs: []
  type: TYPE_NORMAL
- en: …Is the CI/CD process in place?
  prefs: []
  type: TYPE_NORMAL
- en: …Is the change affecting other features?
  prefs: []
  type: TYPE_NORMAL
- en: …Is the affected business team informed of the changes?
  prefs: []
  type: TYPE_NORMAL
- en: …Is the change causing higher costs?
  prefs: []
  type: TYPE_NORMAL
- en: …Is the change bringing value?
  prefs: []
  type: TYPE_NORMAL
- en: 'If we provide answers to all the above questions, there are still more queries
    to consider before we can conclude “the code works.” For example:'
  prefs: []
  type: TYPE_NORMAL
- en: Did the project budget get approved for this development?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Who will act as a [SPOC](https://en.wikipedia.org/wiki/Point_of_contact) for
    this development?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What’s the optimal balance between feature completeness and time to market?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How does this impact on-call responsibilities?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How challenging will it be to retire this development?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: To what extent does this solution scale (with growing data or users)?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What’s the rollback strategy if issues arise?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What documentation and knowledge transfer are needed?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*…and many more…*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This is why you’ll often see tech folks passionately posting or re-sharing statements
    like “*Coding was never the problem.*” It really never was, and the real problems
    never have binary answers.
  prefs: []
  type: TYPE_NORMAL
- en: In other words, the challenges I’ve seen and faced involved inheriting 10–20
    years of accumulated technical debt, which resulted in dedicating months, sometimes
    years, of human resources to maintaining fragile legacy systems, all while attempting
    to modernise business processes that relied on outdated technology deeply rooted
    in organisational decision-making.
  prefs: []
  type: TYPE_NORMAL
- en: Pivoting back to architects, I have one more story to share at the end, and
    it concerns a recent conversation I had with my Uni roommate, who is — you guessed
    it — an architect.
  prefs: []
  type: TYPE_NORMAL
- en: 'The two of us were talking about her experience with generative AI, where she
    explained how she uploaded parcel plans and prompted an LLM to deliver an initial
    housing project with the “famous” budget. Her observation was that while the AI
    output looked “beautiful,” it was completely flawed on the technical side, and
    it only served to generate a couple of design ideas. Then she mentioned something
    interesting:'
  prefs: []
  type: TYPE_NORMAL
- en: '*You see, this was useful for me, but if my investor took the same AI tool
    and ran the same plan through it with the same prompt, he would never be able
    to deliver a standing building.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I smiled at her statement because it’s exactly what I think *for now* about
    AI delivering complete software. You can and will get the code that “works,” but
    without an experienced and/or knowledgeable data/AI/software engineer’s oversight
    and expert fixes, you’re heavily **risking accumulating future technical debt**.
  prefs: []
  type: TYPE_NORMAL
- en: The principles of scalability, security, and maintainability, or the “building
    physics” of software, are not (*yet*) manageable by leveraging (*only*) AI, and
    this is where the role of technical experts lies.
  prefs: []
  type: TYPE_NORMAL
- en: There’s no question that generative AI is a powerful way to get code to a “working”
    state, and we should all be using it. But that isn’t where the real value lies
    in the development process. The real value is in the process of making sure that
    “working” code is doing what is supposed to do, and has existing processes around
    it for avoiding problems in the dedicated (*data*) platforms.
  prefs: []
  type: TYPE_NORMAL
- en: With this in mind, I can only conclude that a “yes, *but*” will usually provide
    an answer to “work/not work” alike questions (*in any domain*).👇🏼
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f54c2ea71967cf767af157d44d67af7c.png)'
  prefs: []
  type: TYPE_IMG
- en: Screenshot of the Google search AI Overview when prompted “Does the code work
    or not?”
  prefs: []
  type: TYPE_NORMAL
