  - PREF_UL
  type: TYPE_NORMAL
- en: '[MobileNetV3](https://arxiv.org/abs/1905.02244)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Segmentation Models PyTorch](https://github.com/qubvel-org/segmentation_models.pytorch)
    used for training'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Blender](https://www.blender.org/) and its [Python API](https://docs.blender.org/api/current/index.html)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The [Ego Hands Dataset](http://vision.soic.indiana.edu/projects/egohands/)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
