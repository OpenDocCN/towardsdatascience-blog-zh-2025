- en: 'Scaling Segmentation with Blender: How to Automate Dataset Creation'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/scaling-segmentation-with-blender-how-to-automate-dataset-creation-73aa38967599/](https://towardsdatascience.com/scaling-segmentation-with-blender-how-to-automate-dataset-creation-73aa38967599/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![Photo by Lina Trochez on Unsplash](../Images/14369f318a959c27866662a50758f356.png)'
  prefs: []
  type: TYPE_IMG
- en: Photo by [Lina Trochez](https://unsplash.com/@lmtrochezz?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  prefs: []
  type: TYPE_NORMAL
- en: If you have ever trained a segmentation model for a new project, you probably
    know it’s not about the model. It’s about the data.
  prefs: []
  type: TYPE_NORMAL
- en: 'Collecting images is often straightforward; you can usually find plenty on
    platforms like [Unsplash](https://unsplash.com/), or even use Generative AI tools
    such as Stable Diffusion to generate more:'
  prefs: []
  type: TYPE_NORMAL
- en: '[**How to Train an Instance Segmentation Model with No Training Data**](https://towardsdatascience.com/how-to-train-an-instance-segmentation-model-with-no-training-data-190dc020bf73)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The main challenge usually lies in labeling. Annotating images for segmentation
    is highly time-consuming. Even with advanced tools like [SAM2 by Meta](https://ai.meta.com/sam2/),
    creating a fully annotated, robust, and diverse dataset still requires considerable
    time.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this article, we’ll explore another, often less explored option: using 3D
    tools, such as [Blender](https://www.blender.org/). Indeed, 3D engines are increasingly
    powerful and realistic. Moreover, they offer a compelling advantage: the ability
    to generate labels automatically while creating the dataset, eliminating the need
    for manual annotation.'
  prefs: []
  type: TYPE_NORMAL
- en: 'In this article, we’ll outline a complete solution for creating a hand segmentation
    model, broken down into the following key parts:'
  prefs: []
  type: TYPE_NORMAL
- en: Generating hands with Blender and how to get diversity in hand posture, location
    and skin tones
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Generating a dataset using the generated Blender images and selected background
    images, using [OpenCV](https://opencv.org/)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Training and evaluating the model with PyTorch
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Of course, all the code used in this post is fully available and reusable, in
    this [GitHub](https://github.com/vincent-vdb/medium_posts) repository.
  prefs: []
  type: TYPE_NORMAL
- en: Generating the Hands
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'To generate images of hands, let’s use Blender. I am not an expert with this
    type of tool, but it offers some highly useful features for our purpose:'
  prefs: []
  type: TYPE_NORMAL
- en: It’s free – no commercial license, anyone can download and use it immediately
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: There is a great community and many models can be found online, some are free,
    some are not
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Finally, it includes a Python API, enabling the automation of image generation
    with various features
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'As we will see, those features are quite useful, and will allow us to make
    synthetic data fairly easily. To ensure sufficient diversity, we will explore
    how to automatically randomize the following parameters in our generated hands:'
  prefs: []
  type: TYPE_NORMAL
- en: 'The finger positions: we want to have images of hands in many different positions'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The camera position: we want to have images of hands from various perspectives'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The skin tone: we want diversity in the skin tone, to make the model robust
    enough'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*N.B.: The method proposed here is not free of any potential bias based on
    skin tone and does not claim to be bias-free. Any product based on this method
    must be carefully evaluated against any ethical bias.*'
  prefs: []
  type: TYPE_NORMAL
- en: Before diving into these steps, we need a 3D model of a hand. T[here](https://cgcookie.com/projects/realistic-rigged-hand-free-download)
    are many models on websites such as [Turbosquid](https://www.turbosquid.com/),
    but I have used a freely available hand model that one can find here. If you open
    this file with Blender, you will get something like the following screenshot.
  prefs: []
  type: TYPE_NORMAL
- en: '![Screenshot of the hand model opened in Blender. Image by author.](../Images/b8e12c0e9f25168555c7a799954f9b41.png)'
  prefs: []
  type: TYPE_IMG
- en: Screenshot of the hand model opened in Blender. Image by author.
  prefs: []
  type: TYPE_NORMAL
- en: As shown, the model includes not only the hand’s shape and texture but also
    a bone structure, enabling hand movement simulation. Let’s work from that to get
    a diverse set of hands by playing with positions of fingers, skin tones and camera
    position.
  prefs: []
  type: TYPE_NORMAL
- en: Modifying Fingers Positions
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The first step is ensuring a diverse yet realistic set of finger positions.
    Without delving into too many details (as this relates more to Blender itself),
    we need to create controllers for movement and impose constraints on permissible
    movements. Basically, we don’t want fingers to fold backward or to bend in unrealistic
    directions. Fore more details on these steps, refer to [this YouTube tutorial](https://www.youtube.com/watch?v=wBfSA1mDATY),
    which helped me implement them with minimal effort.
  prefs: []
  type: TYPE_NORMAL
- en: 'Once the Blender file is well set with the right constraints, we can use a
    Python script to automate any finger position:'
  prefs: []
  type: TYPE_NORMAL
- en: 'As we can see, all we do is randomly updating the locations of controllers,
    allowing to move around the fingers under constraints. With the right set of constraints,
    we get finger positions that look like the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Sample of generated images with randomized finger positions. Image by author.](../Images/4085ce22e66c4a926a85fcf2d38cbcaf.png)'
  prefs: []
  type: TYPE_IMG
- en: Sample of generated images with randomized finger positions. Image by author.
  prefs: []
  type: TYPE_NORMAL
- en: This produces realistic and diverse finger positions, ultimately enabling the
    generation of a varied set of hand images. Now, let’s play with the skin tone.
  prefs: []
  type: TYPE_NORMAL
- en: Modifying the Skin Tone
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: When creating a new image dataset featuring people, one of the most challenging
    aspects can be achieving a wide enough representation of skin tones. Ensuring
    models work efficiently across all skin tones without bias is a critical priority.
    Although I do not claim to fix any bias, the method I propose here allows to have
    a workaround solution by automatically changing the skin tone.
  prefs: []
  type: TYPE_NORMAL
- en: '*N.B.: This method does not claim to make models free of any ethical bias.
    Any model for production must be carefully tested with fairness evaluation. One
    can have a look at [what has been done by Google for their face detection models](https://storage.googleapis.com/mediapipe-assets/MediaPipe%20BlazeFace%20Model%20Card%20(Short%20Range).pdf)
    as an example.*'
  prefs: []
  type: TYPE_NORMAL
- en: 'What I do here is a pure image processing computation on the image. The idea
    is simple: given a target color and the average color of the rendered hand, I
    will simply compute the difference between those two colors. I will then apply
    this difference to the rendered hand to get the new skin tone:'
  prefs: []
  type: TYPE_NORMAL
- en: 'As a result, it gives the following images of hands:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Sample of generated images with randomized skin color. Image by author.](../Images/cc3d2d284d9403cc592277d8a004aefe.png)'
  prefs: []
  type: TYPE_IMG
- en: Sample of generated images with randomized skin color. Image by author.
  prefs: []
  type: TYPE_NORMAL
- en: 'While the results are not perfect, they produce reasonably realistic images
    with diverse skin tones, using straightforward image processing. Only one step
    remains to have a diverse enough set of images: the rendering point of view.'
  prefs: []
  type: TYPE_NORMAL
- en: Modifying the Camera Position
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Finally, let’s adjust the camera positions to capture hands from multiple perspectives.
    To achieve this, the camera is located on a random point on a sphere centered
    around the hand. This can be easily achieved just by playing with the two angles
    of [spherical coordinates](https://en.wikipedia.org/wiki/Spherical_coordinate_system).
    In the following code I generate a random position on a sphere:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Then, using this and adding a few constraints on the spherical location, I
    can update the camera position around the hand with Blender:'
  prefs: []
  type: TYPE_NORMAL
- en: 'As a result, we now get the following sample of images:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Sample of generated images with randomized finger position, skin tone and
    camera position. Image by author.](../Images/f328f24464ad812d67ee371e5148a3b2.png)'
  prefs: []
  type: TYPE_IMG
- en: Sample of generated images with randomized finger position, skin tone and camera
    position. Image by author.
  prefs: []
  type: TYPE_NORMAL
- en: We now have hands with diverse finger positions, skin tones and from various
    point of views. Before training a segmentation model, the next step is to actually
    generate images of hands in various background and contexts.
  prefs: []
  type: TYPE_NORMAL
- en: Generating the Training Data
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To generate diverse and realistic enough images, we are going to blend our generated
    hands with a set of selected background images.
  prefs: []
  type: TYPE_NORMAL
- en: 'I took images on Unsplash, free of rights as background images. I ensured that
    these images contained no hands. I will then randomly add the Blender-generated
    hands on these background images:'
  prefs: []
  type: TYPE_NORMAL
- en: 'This function, although long, does simple actions:'
  prefs: []
  type: TYPE_NORMAL
- en: Load a random hand image and mask
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Load a random background image
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Resize the background image
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Pick a random position in the background image to put the hand
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Compute the new mask
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Compute the blended image of the background and hand
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'As a result, it’s rather easy to generated hundreds or even thousands of images
    with their labels for a segmentation task. Below is a sample of the generated
    images:'
  prefs: []
  type: TYPE_NORMAL
- en: '![A sample of generated images with background and blender-generated hand.
    Image by author.](../Images/79826084bb48d38475b04a9ff590e45c.png)'
  prefs: []
  type: TYPE_IMG
- en: A sample of generated images with background and blender-generated hand. Image
    by author.
  prefs: []
  type: TYPE_NORMAL
- en: 'With these generated images and masks, we can now move on to the next step:
    training a segmentation model.'
  prefs: []
  type: TYPE_NORMAL
- en: Training and Evaluating the Segmentation Model
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now that we have generated the data properly, let’s train a segmentation model
    on it. Let’s first talk about the training pipeline, and then let’s evaluate the
    benefits of using this generated data.
  prefs: []
  type: TYPE_NORMAL
- en: Training the Model
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We are going to use PyTorch to train the model, as well as the library [Segmentation
    Models Pytorch](https://github.com/qubvel-org/segmentation_models.pytorch), that
    allows to easily train many segmentation models.
  prefs: []
  type: TYPE_NORMAL
- en: 'The following code snippet allows the model training:'
  prefs: []
  type: TYPE_NORMAL
- en: 'This code does the typical steps of a model training:'
  prefs: []
  type: TYPE_NORMAL
- en: Instantiate train and valid datasets, as well as the data loaders
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Instantiate the model itself
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Define the loss and optimizer
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Train the model and save it
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The model itself takes a few input arguments:'
  prefs: []
  type: TYPE_NORMAL
- en: The encoder, to pick from [this list](https://github.com/qubvel-org/segmentation_models.pytorch?tab=readme-ov-file#encoders)
    of implemented models, such as a [MobileNetV3](https://arxiv.org/abs/1905.02244)
    that I’m using here
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The initialization weights on the [ImageNet dataset](https://www.image-net.org/)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The number of input channels, here 3 from RGB since we use color images
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The number of output channels, here 1 since there is only one class
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The output activation function: a sigmoid here, again since there is only one
    class'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The full implementation is available on GitHub if you want to know more.
  prefs: []
  type: TYPE_NORMAL
- en: Evaluating the Model
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'In order to evaluate the model, and the improvements from the blended images,
    let’s make the following comparison:'
  prefs: []
  type: TYPE_NORMAL
- en: Train and evaluate a model on the [Ego Hands dataset](http://vision.soic.indiana.edu/projects/egohands/)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Train and evaluate the same model on the Ego Hands dataset, with our blended-generated
    data added to the train set
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'In both cases, I’ll evaluate the model on the same subset of the Ego Hands
    dataset. As an evaluation metric, I’ll use the [Intersection over Union (IoU](https://en.wikipedia.org/wiki/Jaccard_index))
    (also referred as Jaccard Index). Below are the results:'
  prefs: []
  type: TYPE_NORMAL
- en: 'On the Ego Hands dataset alone, after 20 epochs: **IoU = 0.72**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'On the Ego Hands dataset + Blender-generated images, after 20 epochs: **IoU
    = 0.76**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: As we can see, we could get a significant improvement, from 0.72 to 0.76 in
    the IoU, thanks to the dataset made of Blender-generated images.
  prefs: []
  type: TYPE_NORMAL
- en: Testing the Model
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: For anyone willing to try out this model on their own computer, I also added
    a script to the GitHub, so that it runs in real-time on the webcam feed.
  prefs: []
  type: TYPE_NORMAL
- en: Since I trained a relatively small model (MobileNetV3 Large 100), most modern
    laptops should be able to run this code effectively.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Let’s wrap this article up with a few key takeaways:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Blender is a great tool that allows you to generate realistic images under
    diverse conditions: light, camera position, deformation, etc…'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Leveraging Blender to generate synthetic data may initially require some time,
    but it can be fully automated using the Python API
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Using the generated data improved the performance of the model for a semantic
    segmentation task: it improved the IoU from 0.72 up to 0.76'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'For an even more diverse dataset, it’s possible to do that with more Blender
    hand models: more hand shapes, more textures could help the segmentation model
    generalize even more'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Finally, if you manage to have a working model and would like to find the best
    strategy to deploy it, you can have a look at this guide:'
  prefs: []
  type: TYPE_NORMAL
- en: '[**How to Choose the Best ML Deployment Strategy: Cloud vs. Edge**](https://towardsdatascience.com/how-to-choose-the-best-ml-deployment-strategy-cloud-vs-edge-7b62d9db9b20)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: As a side note, while this article focuses on semantic segmentation, this approach
    is adaptable to other computer vision tasks, including instance segmentation,
    classification, and landmark prediction. I would love to hear other potential
    usages of Blender that I may have missed.
  prefs: []
  type: TYPE_NORMAL
- en: References
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Here are some references, even though they are already mentioned within the
    article:'
  prefs: []
  type: TYPE_NORMAL
- en: '[OpenCV](https://opencv.org/)'
