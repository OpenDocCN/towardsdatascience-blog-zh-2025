- en: Predicting the NBA Champion with Machine Learning
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用机器学习预测NBA冠军
- en: 原文：[https://towardsdatascience.com/predicting-nba-champion-machine-learning/](https://towardsdatascience.com/predicting-nba-champion-machine-learning/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/predicting-nba-champion-machine-learning/](https://towardsdatascience.com/predicting-nba-champion-machine-learning/)
- en: 'Every NBA season, 30 teams compete for something only one will achieve: **the
    legacy of a championship**. From power rankings to trade deadline chaos and injuries,
    fans and analysts alike speculate endlessly about who will raise the Larry O’Brien
    Trophy.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 每个NBA赛季，30支球队争夺只有一支球队能实现的成就：**冠军的传承**。从实力排名到交易截止日期的混乱和伤病，球迷和分析师们无休止地猜测谁将举起拉里·奥布莱恩奖杯。
- en: But what if we could go beyond the hot takes and predictions, and **use data
    and machine learning to, at the end of the regular season, forecast the NBA Champion**?
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 但如果我们能够超越热门观点和预测，**在常规赛结束时，利用数据和机器学习来预测NBA冠军**呢？
- en: In this article, I’ll walk through this process — from gathering and preparing
    the data, to training and evaluating the model, and finally using it to make predictions
    for the upcoming 2024–25 Playoffs. Along the way, I’ll highlight some of the most
    surprising insights that emerged from the analysis.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我将详细介绍这个过程——从收集和准备数据，到训练和评估模型，最后使用它来预测即将到来的2024-25赛季的季后赛。在这个过程中，我将突出分析中出现的最令人惊讶的见解。
- en: All the code and data used are available on [**GitHub**](https://github.com/GabrielPastorello/NBAChampionPrediction).
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 所有代码和数据都可在[**GitHub**](https://github.com/GabrielPastorello/NBAChampionPrediction)上找到。
- en: '* * *'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Understanding the problem
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 理解问题
- en: 'Before diving into model training, the most important step in any machine learning
    project is understanding the problem:'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 在开始模型训练之前，任何机器学习项目中最重要的步骤是理解问题：
- en: '**What question are we trying to answer, and what data (and model) can help
    us get there?**'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: '**我们试图回答什么问题，以及哪些数据（和模型）可以帮助我们找到答案？**'
- en: 'In this case, the question is simple: **Who is going to be the NBA Champion?**'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，问题很简单：**谁将成为NBA冠军？**
- en: 'A natural first idea is to frame this as a **classification problem**: each
    team in each season is labeled as either *Champion* or *Not Champion*.'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 一个自然的初步想法是将这个问题框架为一个**分类问题**：每个赛季的每支球队都被标记为“冠军”或“非冠军”。
- en: But there’s a catch. There’s only **one champion per year** (obviously).
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 但有一个问题。每年只有**一个冠军**（显然）。
- en: So if we pull data from the last 40 seasons, we’d have 40 positive examples…
    and hundreds of negative ones. That lack of positive samples makes it extremely
    hard for a model to learn meaningful patterns, specially considering that winning
    an NBA title is such a rare event that we simply don’t have enough historical
    data — we’re not working with 20,000 seasons. That scarcity makes it extremely
    difficult for any classification model to truly understand what separates champions
    from the rest.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，如果我们从过去40个赛季中提取数据，我们将有40个正面例子……以及数百个负面例子。这种正面样本的缺乏使得模型学习有意义的模式变得极其困难，特别是考虑到赢得NBA冠军是如此罕见的事件，我们根本就没有足够的历史数据——我们不是在处理20,000个赛季。这种稀缺性使得任何分类模型真正理解区分冠军和其他球队的因素变得极其困难。
- en: We need a smarter way to frame the problem.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要一种更智能的方式来构建问题。
- en: To help the model understand what makes a champion, it’s useful to also teach
    it what makes an *almost* champion — and how that differs from a team that was
    knocked out in the first round. In other words, we want the model to learn **degrees
    of success** in the playoffs, rather than a simple yes/no outcome.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 为了帮助模型理解什么造就了冠军，同时教它什么造就了几乎成为冠军的东西——以及这和第一轮就被淘汰的球队有何不同。换句话说，我们希望模型学习季后赛中的**成功程度**，而不仅仅是简单的胜负结果。
- en: This led me to the concept of **Champion Share** — the proportion of playoff
    wins a team achieved out of the total needed to win the title.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 这引导我提出了**冠军份额**的概念——一支球队在季后赛中赢得的胜利占总冠军所需胜利的比例。
- en: From 2003 onward, it takes **16 wins** to become a NBA Champion. However, between
    1984 and 2002, the first round was a best-of-five series, so during that period
    the total required was **15 wins**.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 从2003年开始，需要**16场胜利**才能成为NBA冠军。然而，在1984年至2002年之间，第一轮是五局三胜制，因此在那段时间里，总共需要的胜利数是**15场**。
- en: A team that loses in the first round might have 0 or 1 win (Champion Share =
    1/16), while a team that makes the Finals but loses might have 14 wins (Champion
    Share = 14/16). The Champion has a full share of 1.0.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 在第一轮就输掉的球队可能有0或1场胜利（冠军份额=1/16），而进入决赛但输掉的球队可能有14场胜利（冠军份额=14/16）。冠军拥有完整的份额1.0。
- en: The [@warriors](https://twitter.com/warriors?ref_src=twsrc%5Etfw) take home
    the NBA title 🏆
  id: totrans-19
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[@勇士队](https://twitter.com/warriors?ref_src=twsrc%5Etfw)赢得了NBA冠军 🏆'
- en: ''
  id: totrans-20
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: A final look at the bracket for the 2021-22 [#NBAPlayoffs](https://twitter.com/hashtag/NBAPlayoffs?src=hash&ref_src=twsrc%5Etfw)
    presented by Google Pixel. [pic.twitter.com/IHU72Kr8AN](https://t.co/IHU72Kr8AN)
  id: totrans-21
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 最后看看由Google Pixel呈现的2021-22赛季[#NBAPlayoffs](https://twitter.com/hashtag/NBAPlayoffs?src=hash&ref_src=twsrc%5Etfw)的赛程。[图片推文](https://t.co/IHU72Kr8AN)
- en: ''
  id: totrans-22
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — NBA (@NBA) [June 17, 2022](https://twitter.com/NBA/status/1537668694784065538?ref_src=twsrc%5Etfw)
  id: totrans-23
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: — NBA (@NBA) [2022年6月17日](https://twitter.com/NBA/status/1537668694784065538?ref_src=twsrc%5Etfw)
- en: Example of playoff bracket from the 2021 Playoffs
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 2021年季后赛的季后赛赛程示例
- en: This reframes the task as a **regression problem**, where the model predicts
    a continuous value between 0 and 1 — representing how close each team came to
    winning it all.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 这将任务重新定义为**回归问题**，其中模型预测一个介于0和1之间的连续值——代表每个球队接近赢得一切的程度。
- en: In this setup, the team with the **highest predicted value** is our model’s
    pick for the NBA Champion.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种设置中，预测值最高的球队是我们模型选择的NBA冠军。
- en: This is a similar approach to the **MVP prediction** from my previous article.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 这与我之前文章中的**MVP预测**类似的方法。
- en: '[Predicting the NBA MVP with Machine Learning](https://towardsdatascience.com/predicting-the-nba-mvp-with-machine-learning-c3e5b755f42e/)'
  id: totrans-28
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[使用机器学习预测NBA最有价值球员](https://towardsdatascience.com/predicting-the-nba-mvp-with-machine-learning-c3e5b755f42e/)'
- en: Data
  id: totrans-29
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据
- en: Basketball — and the NBA in particular — is one of the most exciting sports
    to work with in data science, thanks to the volume of freely available statistics.
    For this project, I gathered data from [**Basketball Reference**](https://www.basketball-reference.com/)
    using my python package [**BRScraper**](https://github.com/GabrielPastorello/BRScraper),
    that allows easy access to the players’ and teams data. All data collection was
    done in accordance with the website’s guidelines and rate limits.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 篮球——尤其是NBA——是数据科学中最激动人心的运动之一，这得益于大量免费可用的统计数据。对于这个项目，我使用我的Python包[**BRScraper**](https://github.com/GabrielPastorello/BRScraper)从[**Basketball
    Reference**](https://www.basketball-reference.com/)收集数据，该包允许轻松访问球员和球队数据。所有数据收集均符合网站指南和速率限制。
- en: The data used includes **team-level statistics**, **final regular season standings**
    (e.g., win percentage, seeding), as well as **player-level statistics** for each
    team (limited to players who appeared in at least 30 games) and **historical playoff
    performance** indicators.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 使用的数据包括**团队层面的统计数据**、**常规赛最终排名**（例如，胜率、种子排名），以及每个球队的**球员层面统计数据**（限于至少出场30场的球员）和**历史季后赛表现指标**。
- en: However, it’s important to be cautious when working with **raw, absolute values**.
    For example, the **average points per game (PPG)** in the 2023–24 season was **114.2**,
    while in 2000–01 it was **94.8** — an increase of nearly **20%**.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，在处理**原始、绝对值**时，必须谨慎。例如，2023-24赛季的**每场比赛平均得分（PPG）**为**114.2**，而2000-01赛季为**94.8**——增长了近**20%**。
- en: This is due to a series of factors, but the fact is that the game has changed
    significantly over the years, and so have the metrics derived from it.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 这是因为一系列因素，但事实是，游戏在近年来发生了显著变化，由此产生的指标也是如此。
- en: '![](../Images/caac6ed4a592e704dd4cf467e602d791.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/caac6ed4a592e704dd4cf467e602d791.png)'
- en: Evolution of some per-game NBA statistics (Image by Author)
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 一些NBA每场统计数据的变化（图片由作者提供）
- en: 'To account for this shift, the approach here avoids using absolute statistics
    directly, opting instead for **normalized, relative metrics**. For example:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 为了应对这种变化，这里的方法避免直接使用绝对统计数据，而是选择使用**标准化、相对指标**。例如：
- en: Instead of a team’s PPG, you can use their **ranking in that season**.
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 而不是使用球队的PPG，你可以使用他们在那个赛季的**排名**。
- en: Instead of counting how many players average 20+ PPG, you can consider how many
    are in the **top 10 in scoring**, and so on.
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 而不是计算平均得分20+的球员数量，你可以考虑得分榜前10的球员数量，等等。
- en: This enables the model to capture **relative dominance** within each era, making
    comparisons across decades more meaningful and thus permitting the inclusion of
    older seasons to enrich the dataset.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 这使得模型能够捕捉到每个时代的**相对主导地位**，使得跨世纪的比较更有意义，从而允许包含更早的季节以丰富数据集。
- en: Data from the **1984 to 2024** seasons were used to train and test the model,
    totaling **40 seasons**, with a total of 70 variables.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 用于训练和测试模型的数据来自1984至2024赛季，总计**40个赛季**，共有70个变量。
- en: 'Before diving into the model itself, some interesting patterns emerge from
    an exploratory analysis when comparing championship teams to all playoff teams
    as a whole:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 在深入探讨模型本身之前，当我们将冠军球队与所有季后赛球队整体进行比较时，从探索性分析中出现了一些有趣的模式：
- en: '![](../Images/157769060a6ff0607ad8e84b25243604.png)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/157769060a6ff0607ad8e84b25243604.png)'
- en: 'Comparison of teams: Champions vs Rest of Playoff teams (Image by Author)'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 球队对比：冠军球队与季后赛其他球队（图片由作者提供）
- en: Champions tend to come from the top seeds and with higher winning percentages,
    unsurprisingly. The team with the worst regular season record to win it all in
    this period was the **1994–95 Houston Rockets**, led by Hakeem Olajuwon, finishing
    47–35 (.573) and entering the playoffs as only the **10th best overall team**
    (6th in the West).
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 冠军球队往往来自种子排名靠前且胜率较高的球队，这并不令人意外。在这个时期赢得全部比赛的战绩最差的球队是**1994-95休斯顿火箭队**，由哈基姆·奥拉朱旺领导，常规赛战绩为47胜35负（.573），并以**第10支整体最佳球队**（西部第6）的身份进入季后赛。
- en: Another notable trend is that champions tend to have a slightly higher average
    age, suggesting that experience plays a crucial role once the playoffs begin.
    The youngest championship team in the database with an average of 26.6 years is
    the **1990–91 Chicago Bulls**, and the oldest is the **1997–98 Chicago Bulls**,
    with 31.2 years — the first and last titles from the Michael Jordan dinasty.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个值得注意的趋势是，冠军球队的平均年龄略高，这表明一旦季后赛开始，经验就扮演着至关重要的角色。数据库中最年轻的冠军球队平均年龄为26.6岁，是**1990-91芝加哥公牛队**，而最老的是**1997-98芝加哥公牛队**，平均年龄为31.2岁——这是迈克尔·乔丹王朝的第一个和最后一个冠军。
- en: Similarly, teams with coaches who have been with the franchise longer also tend
    to find more success in the postseason.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，那些教练在球队任职时间较长的球队在季后赛中也往往能取得更多成功。
- en: Modeling
  id: totrans-47
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 建模
- en: The model used was **[LightGBM](https://lightgbm.readthedocs.io/en/stable/)**,
    a tree-based algorithm widely recognized as one of the most effective methods
    for tabular data, alongside others like XGBoost. A grid search was done to identify
    the best hyperparameters for this specific problem.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 使用的模型是**[LightGBM](https://lightgbm.readthedocs.io/en/stable/)**，这是一种基于树的算法，被广泛认为是表格数据中最有效的几种方法之一，与XGBoost等其他算法并列。为此特定问题进行了一次网格搜索，以确定最佳超参数。
- en: The model performance was evaluated using the root mean squared error (**RMSE**)
    and the coefficient of determination (**R²**).
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 模型性能是通过均方根误差（**RMSE**）和确定系数（**R²**）来评估的。
- en: You can find the formula and explanation of each metric in my [**previous MVP
    article**](https://towardsdatascience.com/predicting-the-nba-mvp-with-machine-learning-c3e5b755f42e/).
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在我的[**之前的MVP文章**](https://towardsdatascience.com/predicting-the-nba-mvp-with-machine-learning-c3e5b755f42e/)中找到每个指标的公式和解释。
- en: The seasons used for training and testing were randomly selected, with the constraint
    of **reserving the last three seasons for the test set** in order to better assess
    the model’s performance on more recent data. Importantly, all teams were included
    in the dataset — not just those that qualified for the playoffs — allowing the
    model to learn patterns without relying on prior knowledge of postseason qualification.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 用于训练和测试的季节是随机选择的，但有一个约束条件，即**保留最后三个赛季作为测试集**，以便更好地评估模型在更近数据上的性能。重要的是，数据集中包括了所有球队——而不仅仅是那些有资格进入季后赛的球队——这样模型就可以在没有依赖季后赛资格的先验知识的情况下学习模式。
- en: Results
  id: totrans-52
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结果
- en: Here we can see a comparison between the “distributions” of both the predictions
    and the real values. While it’s technically a histogram — since we’re dealing
    with a regression problem — it still works as a visual distribution because the
    target values range from 0 to 1\. Additionally, we also display the distribution
    of the residual error for each prediction.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们可以看到预测值和实际值“分布”之间的比较。虽然从技术上讲这是一个直方图——因为我们处理的是一个回归问题——但它仍然作为一个视觉分布来工作，因为目标值范围在0到1之间。此外，我们还显示了每个预测的残差误差分布。
- en: '![](../Images/74dcac85e263c7995529b0bf7401a2d8.png)'
  id: totrans-54
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/74dcac85e263c7995529b0bf7401a2d8.png)'
- en: (Image by Author)
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: （图片由作者提供）
- en: As we can see, the predictions and the real values follow a similar pattern,
    both concentrated near zero — as most teams do not achieve high playoff success.
    This is further supported by the distribution of the residual errors, which is
    centered around zero and resembles a normal distribution. This suggests that the
    model is able to capture and reproduce the underlying patterns present in the
    data.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 如我们所见，预测值和实际值遵循相似的规律，都集中在零附近——因为大多数球队都没有取得高水平的季后赛成功。这一点还得到了残差误差分布的支持，其中心在零附近，类似于正态分布。这表明模型能够捕捉并再现数据中存在的潜在模式。
- en: In terms of performance metrics, the best model achieved an RMSE of 0.184 and
    an R² score of 0.537 on the test dataset.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 在性能指标方面，最佳模型在测试数据集上实现了0.184的RMSE和0.537的R²得分。
- en: An effective approach for visualizing the key variables influencing the model’s
    predictions is through [**SHAP Values**](https://shap.readthedocs.io/en/latest/index.html),
    atechnique that provides a reasonable explanation of how each feature impacts
    the model’s predictions.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 一种有效的方法是通过[**SHAP值**](https://shap.readthedocs.io/en/latest/index.html)来可视化影响模型预测的关键变量，这是一种提供每个特征如何影响模型预测的合理解释的技术。
- en: Again, a deeper explanation about SHAP and how to interpret its chart can be
    found in [**Predicting the NBA MVP with Machine Learning**](https://towardsdatascience.com/predicting-the-nba-mvp-with-machine-learning-c3e5b755f42e/).
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 再次，关于SHAP及其图表的解释可以更深入地了解，请参阅[**使用机器学习预测NBA最有价值球员**](https://towardsdatascience.com/predicting-the-nba-mvp-with-machine-learning-c3e5b755f42e/)。
- en: '![](../Images/787f4726dd34a96ec8cc5704794da348.png)'
  id: totrans-60
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/787f4726dd34a96ec8cc5704794da348.png)'
- en: SHAP chart (Image by Author)
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: SHAP图表（作者：本人）
- en: 'From the SHAP chart, several important insights emerge:'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 从SHAP图表中，我们可以得出几个重要的见解：
- en: '**Seed** and **W/L%** rank among the top three most impactful features, highlighting
    the importance of team performance in the regular season.'
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**种子**和**胜负率**是前三名最具影响力的特征，突出了常规赛球队表现的重要性。'
- en: Team-level stats such as **Net Rating (NRtg)**, **Opponent Points Per Game (PA/G)**,
    **Margin of Victory (MOV)** and **Adjusted Offensive Rating (ORtg/A)** also play
    a significant role in shaping playoff success.
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 团队层面的统计数据，如**净胜分 (NRtg**)、**对手每场比赛得分 (PA/G**)、**胜利差 (MOV**)和**调整进攻效率 (ORtg/A**)，在塑造季后赛成功方面也起着重要作用。
- en: 'On the player side, advanced metrics stand out: the **number of players in
    the top 30 for Box Plus/Minus (BPM)** and **top 3 for Win Shares per 48 Minutes
    (WS/48)** are among the most influential.'
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在球员层面，高级指标尤为突出：**Box Plus/Minus (BPM**) 排名前30的球员数量和**每48分钟胜分 (WS/48**) 排名前三的球员是其中最具影响力的。
- en: Interestingly, the model also captures broader trends — teams with a higher
    average age tend to perform better in the playoffs, and a strong showing in the
    previous postseason often correlates with future success. Both patterns point
    again to **experience** as a valuable asset in the pursuit of a championship.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 有趣的是，该模型还捕捉到了更广泛的趋势——平均年龄较高的球队往往在季后赛中表现更好，而前一个赛季的出色表现通常与未来的成功相关。这两种模式再次表明，**经验**在追求冠军的过程中是一种宝贵的资产。
- en: Let’s now take a closer look at how the model performed in **predicting the
    last three NBA champions:**
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们现在更深入地看看该模型在**预测过去三个NBA冠军**方面的表现：
- en: '![](../Images/1316afbb410d73a5fe5681eadc4efff8.png)'
  id: totrans-68
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/1316afbb410d73a5fe5681eadc4efff8.png)'
- en: Predictions for the last three years (Image by Author)
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 过去三年的预测（作者：本人）
- en: The model correctly predicted **two of the last three** NBA champions. The only
    miss was in 2023, when it favored the **Milwaukee Bucks**. That season, Milwaukee
    had the best regular-season record at 58–24 (.707), but an **injury** to Giannis
    Antetokounmpo hurt their playoff run. The Bucks were eliminated 4–1 in the first
    round by the Miami Heat, who went on to reach the Finals — a surprising and disappointing
    postseason exit for Milwaukee, who had claimed the championship just two years
    earlier.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 该模型正确预测了**过去三个NBA冠军中的两个**。唯一的失误是在2023年，当时它倾向于**密尔沃基雄鹿队**。那个赛季，密尔沃基常规赛战绩最佳，为58胜24负（.707），但Giannis
    Antetokounmpo的**伤病**影响了他们的季后赛征程。雄鹿队在首轮以4-1被迈阿密热火队淘汰，后者晋级决赛——这对两年前刚刚夺冠的密尔沃基来说是一个令人惊讶和失望的季后赛结局。
- en: 2025 Playoffs Predictions
  id: totrans-71
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2025年季后赛预测
- en: For this upcoming 2025 playoffs, the model is predicting the **Boston Celtics**
    to go back-to-back, with **OKC** and **Cleveland** close behind.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 对于即将到来的2025年季后赛，该模型预测**波士顿凯尔特人队**将卫冕，而**OKC**和**克利夫兰**紧随其后。
- en: Given their strong regular season (61–21, 2nd seed in the East) and the fact
    that they’re the reigning champions, I tend to agree. They combine **current performance**
    with **recent playoff success**.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 他们的常规赛表现强劲（61胜21负，东部第二种子）并且他们是卫冕冠军，我倾向于同意这一点。他们结合了**当前表现**和**最近的季后赛成功**。
- en: Still, as we all know, anything can happen in sports — and we’ll only get the
    real answer by the end of June.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，正如我们所知，在体育中任何事情都可能发生——我们只有在六月底才能得到真正的答案。
- en: '![](../Images/d4434872ab5ce1048812e621e23c4970.png)'
  id: totrans-75
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d4434872ab5ce1048812e621e23c4970.png)'
- en: (Photo by [Richard Burlton](https://unsplash.com/@richardworks) on [Unsplash](https://unsplash.com))
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: （照片由 [Richard Burlton](https://unsplash.com/@richardworks) 在 [Unsplash](https://unsplash.com)
    提供）
- en: Conclusions
  id: totrans-77
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: This project demonstrates how machine learning can be applied to complex, dynamic
    environments like sports. Using a dataset spanning four decades of basketball
    history, the model was able to uncover meaningful patterns into what drives playoff
    success. Beyond prediction, tools like SHAP allowed us to interpret the model’s
    decisions and better understand the factors that contribute to postseason success.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 这个项目展示了机器学习如何应用于复杂、动态的环境，如体育。使用涵盖四十年篮球历史的数据库，该模型能够揭示推动季后赛成功的关键模式。除了预测之外，像SHAP这样的工具使我们能够解释模型的决策，并更好地理解有助于季后赛成功的因素。
- en: 'One of the biggest challenges in this problem is accounting for **injuries**.
    They can completely reshape the playoff landscape — particularly when they affect
    star players during the playoffs or late in the regular season. Ideally, we could
    incorporate injury histories and availability data to better account for this.
    Unfortunately, consistent and structured open data on this matter— especially
    at the granularity needed for modeling — is hard to come by. As a result, this
    remains one of the model’s blind spots: it treats all teams at full strength,
    which is often not the case.'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个问题中最大的挑战之一是考虑到**伤病**。它们可以完全改变季后赛的格局——尤其是在季后赛或常规赛后期影响明星球员时。理想情况下，我们可以结合伤病历史和可用性数据来更好地考虑这一点。不幸的是，关于这个问题的持续和结构化开放数据——特别是对于建模所需的粒度——很难找到。因此，这仍然是模型的一个盲点：它假设所有球队都处于满员状态，这通常并非事实。
- en: While no model can perfectly predict the chaos and unpredictability of sports,
    this analysis shows that data-driven approaches can get close. As the 2025 playoffs
    unfold, it will be exciting to see how the predictions hold up — and what surprises
    the game still has in store.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然没有模型能够完美预测体育中的混乱和不可预测性，但这项分析表明，数据驱动的方法可以接近这一点。随着2025年季后赛的展开，将非常有趣地看到预测如何保持稳定——以及比赛还隐藏着哪些惊喜。
