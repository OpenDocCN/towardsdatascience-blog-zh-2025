- en: 1\. Introduction
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1. 引言
- en: Model predictive control (MPC) is a popular feedback control methodology where
    a finite-horizon optimal control problem (OCP) is iteratively solved with an updated
    measured state on each iteration.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 模型预测控制（MPC）是一种流行的反馈控制方法，其中在每个迭代中，通过更新的测量状态迭代地解决一个有限时域最优控制问题（OCP）。
- en: '![](../Images/601d678055f1af4c266569da3cdacc2c.png)'
  id: totrans-10
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/601d678055f1af4c266569da3cdacc2c.png)'
- en: The MPC loop. Image by author.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: MPC 循环。图片由作者提供。
- en: In the OCP one uses a *model* of the plant to find the optimal open loop control
    over the finite horizon considered. Because the model cannot capture the true
    plant’s behaviour 100%, and because in the real world the system is subjected
    to noise and disturbances, one only applies the first portion of the optimal open
    loop control, and regularly *measures* the state to re-solve the OCP. This closes
    the loop and creates a *feedback*.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 在 OCP 中，使用植物的模型来找到在考虑的有限时域上的最优开环控制。因为模型不能完全捕捉真实植物的动态，而且在现实世界中系统会受到噪声和干扰，所以只应用最优开环控制的第一部分，并定期测量状态以重新解决
    OCP。这闭合了回路并创建了一个反馈。
- en: The maths behind it is relatively simple and intuitive (especially when compared
    to things like robust control) and it is easy to code up an MPC controller. Other
    pros are that it can effectively handle hard and soft constraints on the state
    and control (hard constraints are strict, whereas soft constraints are enforced
    via penalisation in the cost function) and it can generally be used on nonlinear
    systems with nonconvex constraints (depending on how nasty these are of course!).
    The only con is that you need to solve a optimization problems “online” in real
    time, which can be a problem if you’re controlling a fast system or have limited
    computing resources.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 它背后的数学相对简单直观（尤其是与鲁棒控制等事物相比），编写 MPC 控制器也很容易。其他优点是它可以有效地处理状态和控制上的硬约束和软约束（硬约束是严格的，而软约束通过在成本函数中惩罚来执行）并且它通常可以用于具有非凸约束的非线性系统（当然，这取决于这些约束有多糟糕！）。唯一的缺点是您需要“在线”实时解决优化问题，如果您正在控制一个快速系统或计算资源有限，这可能会成为一个问题。
- en: 1.2 Running Example
  id: totrans-14
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1.2 运行示例
- en: 'Throughout the article I will consider the double integrator with a zero-order
    hold control (i.e. a piecewise constant control) as the running example in the
    code. The continuous time system reads:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 在整篇文章中，我将考虑使用零阶保持控制（即分段常数控制）的双积分器作为代码中的运行示例。连续时间系统如下：
- en: \[
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \begin{align*}
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: \begin{align*}
- en: \dot x _1(t) & = x_2(t),\\
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: \dot x _1(t) & = x_2(t),\\
- en: \dot x _2(t) & = u(t),
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: \dot x _2(t) & = u(t),
- en: \end{align*}
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: \end{align*}
- en: \]
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: with \(t \in \mathbb{R} \) denoting time. Here \( x_1(t) \in \mathbb{R} \) is
    the *position* whereas \( x_2(t) \in \mathbb{R} \) is the *velocity.* You can
    think of this system as a 1kg block sliding on a frictionless table, with \(u(t)\)
    the applied force.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: with \(t \in \mathbb{R} \) 表示时间。在这里 \( x_1(t) \in \mathbb{R} \) 是位置，而 \( x_2(t)
    \in \mathbb{R} \) 是速度。您可以想象这个系统是一个 1kg 的块在无摩擦的桌子上滑动，其中 \(u(t)\) 是施加的力。
- en: '![](../Images/2e797d325e890b5129db2610ceccaae1.png)'
  id: totrans-23
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/2e797d325e890b5129db2610ceccaae1.png)'
- en: 'Running example: the double integrator. Image by author.'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 运行示例：双积分器。图片由作者提供。
- en: 'If we constrain the control to be piecewise constant over intervals of length
    0.1 seconds, we get the discrete-time system:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们将控制约束为在长度为 0.1 秒的区间内分段常数，我们得到离散时间系统：
- en: \[
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \begin{align*}
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: \begin{align*}
- en: x_{k+1} &= A x_k + Bu_k,
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: x_{k+1} &= A x_k + Bu_k,
- en: \end{align*}
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: \end{align*}
- en: \]
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: with \(k \in \mathbb{Z}\), where,
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: with \(k \in \mathbb{Z}\)，其中，
- en: \[
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \begin{align*}
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: \begin{align*}
- en: A :=
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: A :=
- en: \left(
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: \left(
- en: \begin{array}{cc}
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: \begin{array}{cc}
- en: 1 & 0.1\\
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 1 & 0.1\\
- en: 0 & 1
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 0 & 1
- en: \end{array}
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: \end{array}
- en: \right), \,\,
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: \right), \,\,
- en: B :=
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: B :=
- en: \left(
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: \left(
- en: \begin{array}{c}
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: \begin{array}{c}
- en: 0.05\\
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 0.05\\
- en: '1'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: '1'
- en: \end{array}
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: \end{array}
- en: \right)
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: \right)
- en: \end{align*}
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: \end{align*}
- en: \]
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: and \(x_k \in \mathbb{R}^2 \), \(u_k \in \mathbb{R} \). (Note that I use \(x_k\)
    and \(u_k\) to refer to the discrete-time system’s state and control to make the
    notation neater in the rest of the article.)
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 并且 \(x_k \in \mathbb{R}^2 \), \(u_k \in \mathbb{R} \)。 (注意，我在本文的其余部分使用 \(x_k\)
    和 \(u_k\) 来指代离散时间系统的状态和控制，以使符号更简洁。)
- en: 'You can use the scipy packages’s cont2discrete function to get this discrete
    time system, as follows:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 并且 \(\Omega \) 表示所有可接受的对，
- en: '[PRE0]'
  id: totrans-52
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '**If you are finding this article interesting**, please consider checking out
    the blog [topicincontrol.com](http://topicsincontrol.com). It presents deep dives
    into control theory, optimization, and related topics, often with freely available
    code.'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: \(\mathbf{x}:= (x_0,x_1,…,x_{K})\in\mathbb{R}^{2(K+1)} \) 表示 *状态序列*。
- en: 2\. Optimal Control Problem
  id: totrans-54
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: J(\mathbf{u},\mathbf{x}) :=\left( \sum_{k=0}^{K-1 }x_k^\top Q x_k + u_k^\top
    R u_k \right) + x_K^\top Q_K x_K
- en: 'We’ll consider the following discrete-time optimal control problem (OCP):'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 2\. 最优控制问题
- en: \[
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \begin{equation}
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: \begin{equation}
- en: '{\mathrm{OCP}(\bar x):}\begin{cases}'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: '{\mathrm{OCP}(\bar x):}\begin{cases}'
- en: \min\limits_{\mathbf{u},\mathbf{x}} \quad & \sum_{k=0}^{K-1} \left(x_k^{\top}Qx_k
    + u_k^\top R u_k \right)+ x_{K}^\top Q_K x_{K}\\
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: \min\limits_{\mathbf{u},\mathbf{x}} \quad & \sum_{k=0}^{K-1} \left(x_k^{\top}Qx_k
    + u_k^\top R u_k \right)+ x_{K}^\top Q_K x_{K}\\
- en: \mathrm{subject\ to:}\quad & x_{k+1} = Ax_k + Bu_k, &k \in[0:K-1], & \dots(1)\\
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: \mathrm{约束条件：}\quad & x_{k+1} = Ax_k + Bu_k, &k \in[0:K-1], & \dots(1)\\
- en: \quad & x_0 = \bar x , & & \dots(2) \\
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: \quad & x_0 = \bar x , & & \dots(2) \\
- en: \quad & x_k\in [-1,1]\times(-\infty,\infty),& k \in[1:K], & \dots(3)\\
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: \quad & x_k\in [-1,1]\times(-\infty,\infty),& k \in[1:K], & \dots(3)\\
- en: \quad & u_k\in [-1,1],& k \in[0:K-1], & \dots(4)
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: \end{cases}
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: \end{cases}
- en: \end{equation}
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: \end{equation}
- en: \]
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我们还将让，
- en: where,
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 其中，
- en: \(K\in\mathbb{R}_{\geq 0}\) denotes the *finite horizon* over which we solve
    the OCP,
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**如果您觉得这篇文章很有趣**，请考虑查看博客 [topicincontrol.com](http://topicsincontrol.com)。它深入探讨了控制理论、优化和相关主题，通常还提供免费代码。'
- en: \(k\in\mathbb{Z}\) denotes the discrete time step,
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: \(k\in\mathbb{Z}\) 表示离散时间步长，
- en: \([p:q]\), with \(p,q\in\mathbb{Z}\), denotes the set of integers \(\{p,p+1,…,q\}\),
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: \([p:q]\)，其中 \(p,q\in\mathbb{Z}\)，表示整数集合 \(\{p,p+1,…,q\}\)，
- en: \(\bar x \in \mathbb{R}^2 \) denotes the *initial condition* of the dynamical
    system,
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: \(\bar x \in \mathbb{R}^2 \) 表示动力系统的 *初始条件*，
- en: \(x_k\in\mathbb{R}^2 \) denotes the *state* at step \(k\),
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: \(x_k\in\mathbb{R}^2 \) 表示第 \(k\) 步的 *状态*，
- en: \(u\in\mathbb{R}\) denotes the *control* at step \(k\),
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: \(u\in\mathbb{R}\) 表示第 \(k\) 步的 *控制*，
- en: \(Q\in\mathbb{R}^{2\times 2}\), \(R\in\mathbb{R}\) and \(Q_K \in \mathbb{R}^{2\times
    2}\) are square positive definite matrices that specify the cost function (\(R\)
    is scalar here because \(u\) is scalar).
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: \(Q\in\mathbb{R}^{2\times 2}\), \(R\in\mathbb{R}\) 和 \(Q_K \in \mathbb{R}^{2\times
    2}\) 是指定成本函数的正定方阵（此处 \(R\) 是标量，因为 \(u\) 是标量）。
- en: Moreover, we will let,
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: \(\mathbf{u}:= (u_0,u_1,…,u_{K−1})\in\mathbb{R}^K \) 表示 *控制序列*，
- en: \(\mathbf{u}:= (u_0,u_1,…,u_{K−1})\in\mathbb{R}^K \) denote the *control sequence,*
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: \quad & u_k\in [-1,1],& k \in[0:K-1], & \dots(4)
- en: \(\mathbf{x}:= (x_0,x_1,…,x_{K})\in\mathbb{R}^{2(K+1)} \) denote the *state
    sequence.*
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您可以使用 scipy 包的 cont2discrete 函数来获取此离散时间系统，如下所示：
- en: To be rigorous, we’ll say that the pair \((\mathbf{u}^{*}, \mathbf{x}^{*})\in\mathbb{R}^K
    \times \mathbb{R}^{2(K+1)}\) is a *solution* to \( \mathrm{OCP}(\bar{x})\) provided
    that it minimises the cost function over all admissible pairs, that is,
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 为了严谨起见，我们将说，如果这对 \((\mathbf{u}^{*}, \mathbf{x}^{*})\in\mathbb{R}^K \times \mathbb{R}^{2(K+1)}\)
    在所有可接受的对中使成本函数最小化，那么它就是 \( \mathrm{OCP}(\bar{x})\) 的 *解*，
- en: \[
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \begin{equation*}
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 \(J:\mathbb{R}^K \times \mathbb{R}^{2(K+1)}\rightarrow \mathbb{R}_{\geq 0}
    \) 是，
- en: J(\mathbf{u}^{*}, \mathbf{x}^{*}) \leq J(\mathbf{u}, \mathbf{x}),\quad \forall
    (\mathbf{u},\mathbf{x})\in \Omega
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: J(\mathbf{u}^{*}, \mathbf{x}^{*}) \leq J(\mathbf{u}, \mathbf{x}),\quad \forall
    (\mathbf{u},\mathbf{x})\in \Omega
- en: \end{equation*}
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: \end{equation*}
- en: \]
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: where \(J:\mathbb{R}^K \times \mathbb{R}^{2(K+1)}\rightarrow \mathbb{R}_{\geq
    0} \) is,
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: \(K\in\mathbb{R}_{\geq 0}\) 表示我们解决 OCP 的 *有限时间范围*，
- en: \[
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \begin{equation*}
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: \begin{equation*}
- en: J(\mathbf{u},\mathbf{x}) :=\left( \sum_{k=0}^{K-1 }x_k^\top Q x_k + u_k^\top
    R u_k \right) + x_K^\top Q_K x_K
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: \end{equation*}
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: \end{equation*}
- en: \]
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: and \(\Omega \) denotes all admissible pairs,
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将考虑以下离散时间最优控制问题 (OCP)：
- en: \[
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: '\Omega :=\{(\mathbf{u},\mathbf{x})\in \mathbb{R}^{K}\times \mathbb{R}^{2(K+1)}
    : (1)-(4)\,\, \mathrm{hold}\}.'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: '\Omega :=\{(\mathbf{u},\mathbf{x})\in \mathbb{R}^{K}\times \mathbb{R}^{2(K+1)}
    : (1)-(4)\,\, \mathrm{hold}\}.'
- en: \]
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: Thus, the optimal control problem is to find a control and state sequence, \((
    \mathbf{u}^{*},\mathbf{x}^{*})\), that minimises the cost function, subject to
    the dynamics, \(f\), as well as constraints on the state and control, \(x_k\in[-1,1]\times(-\infty,\infty)\),
    \(u_k \in [-1,1] \), for all \(k\). The cost function is vital to the controller’s
    performance. Not only in the sense of ensuring the controller behaves well (for
    example, to prevent erratic signals) but also in specifying the *equilibrium point*
    the closed loop state will settle at. More on this in Section 4.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，最优控制问题是要找到一个控制和状态序列，\(( \mathbf{u}^{*},\mathbf{x}^{*})\)，在满足动力学，\(f\)，以及状态和控制约束，\(x_k\in[-1,1]\times(-\infty,\infty)\)，\(u_k
    \in [-1,1] \)，对于所有 \(k\) 的条件下，最小化成本函数。成本函数对控制器的性能至关重要。这不仅在于确保控制器表现良好（例如，防止信号异常），还在于指定闭环状态将稳定的*平衡点*。更多内容请见第4节。
- en: 'Note how \(\mathrm{OCP}(\bar x) \) is parametrised with respect to the initial
    state, \(\bar x \). This comes from the fundamental idea behind MPC: that the
    optimal control problem is iteratively solved with an updated measured state.'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 注意\(\mathrm{OCP}(\bar x) \)是如何根据初始状态\(\bar x \)来参数化的。这源于MPC背后的基本思想：最优控制问题是通过迭代使用更新的测量状态来解决的。
- en: 2.1 Coding an OCP solver
  id: totrans-96
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.1 编写OCP求解器
- en: CasADi’s *opti* stack makes it really easy to set up and solve the OCP.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: CasADi的*opti*堆栈使得设置和求解OCP变得非常容易。
- en: 'First, some preliminaries:'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，一些预备知识：
- en: '[PRE1]'
  id: totrans-99
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'Now we define the problem’s decision variables:'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们定义问题的决策变量：
- en: '[PRE2]'
  id: totrans-101
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'Next, we impose the dynamic constraints and set up the cost function:'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们施加动态约束并设置成本函数：
- en: '[PRE3]'
  id: totrans-103
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '[PRE4]'
  id: totrans-104
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: The code mtimes([x_tot[:,k].T, Q, x_tot[:,k]]) implements matrix multiplication,
    \(x_k^{\top} Q x_k \).
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 代码mtimes([x_tot[:,k].T, Q, x_tot[:,k]])实现了矩阵乘法，\(x_k^{\top} Q x_k \)。
- en: We now add the control and state constraints,
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在添加控制和状态约束，
- en: '[PRE5]'
  id: totrans-107
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'and solve:'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 并求解：
- en: '[PRE6]'
  id: totrans-109
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: We can plot the solution with the repo’s plot_solution() function.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以使用repo的plot_solution()函数绘制解决方案。
- en: '[PRE7]'
  id: totrans-111
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: '![](../Images/8092f6d77d8f4bbb04886cbb5cffead7.png)'
  id: totrans-112
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/8092f6d77d8f4bbb04886cbb5cffead7.png)'
- en: OCP solution (open loop). Image by author.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: OCP解（开环）。图片由作者提供。
- en: '**3\. Model Predictive Control**'
  id: totrans-114
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**3\. 预测控制**'
- en: The solution to \( \mathrm{OCP}(\bar x) \), \( (\mathbf{x}^{*},\mathbf{u}^{*})
    \), for a given \(\bar x\), provides us with an *open loop* control, \( \mathbf{u}^{*}
    \). We now *close the loop* by iteratively solving \( \mathrm{OCP}(\bar x) \)
    and updating the initial state (this is the MPC algorithm).
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 对于给定的\(\bar x\)，\( \mathrm{OCP}(\bar x) \)的解，\( (\mathbf{x}^{*},\mathbf{u}^{*})
    \)，提供了一个*开环*控制，\( \mathbf{u}^{*} \)。我们现在通过迭代求解\( \mathrm{OCP}(\bar x) \)并更新初始状态（这是MPC算法）来*关闭环路*。
- en: \[
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \begin{aligned}
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: \begin{aligned}
- en: '&\textbf{Input:} \quad \mathbf{x}^{\mathrm{init}}\in\mathbb{R}^2 \\'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: '&\textbf{输入：} \quad \mathbf{x}^{\mathrm{init}}\in\mathbb{R}^2 \\'
- en: '&\quad \bar x \gets \mathbf{x}^{\mathrm{init}} \\'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: '&\quad \bar x \gets \mathbf{x}^{\mathrm{init}} \\'
- en: '&\textbf{for } k \in [0:\infty) \textbf{:} \\'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: '&\textbf{for } k \in [0:\infty) \textbf{:} \\'
- en: '&\quad (\mathbf{x}^{*}, \mathbf{u}^{*}) \gets \arg\min \mathrm{OCP}(\bar x)\\'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: '&\quad (\mathbf{x}^{*}, \mathbf{u}^{*}) \gets \arg\min \mathrm{OCP}(\bar x)\\'
- en: '&\quad \mathrm{apply}\ u_0^{*} \mathrm{\ to\ the\ system} \\'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: '&\quad \mathrm{apply}\ u_0^{*} \mathrm{\ to\ the\ system} \\'
- en: '&\quad \bar x \gets \mathrm{measured \ state\ at\ } k+1 \\'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: '&\quad \bar x \gets \mathrm{measured \ state\ at\ } k+1 \\'
- en: '&\textbf{end for}'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: '&\textbf{end for}'
- en: \end{aligned}
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: \end{aligned}
- en: \]
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: 3.1 Coding the MPC algorithm
  id: totrans-127
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.1 编写MPC算法
- en: 'The rest is quite straightforward. First, I’ll put all our previous code in
    a function:'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 剩下的部分相当直接。首先，我会把所有之前的代码放入一个函数中：
- en: '[PRE8]'
  id: totrans-129
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'Note that I’ve parametrised the function with the initial state, \(\bar x\),
    as well as the prediction horizon, \(K\). The MPC loop is then implemented with:'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，我已经用初始状态\(\bar x\)和预测范围\(K\)来参数化函数。然后使用以下方式实现MPC环路：
- en: '[PRE9]'
  id: totrans-131
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Again, we can plot the closed loop solution.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 再次，我们可以绘制闭环解决方案。
- en: '[PRE10]'
  id: totrans-133
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: '![](../Images/086b5624abb7f033c51839f402e34fca.png)'
  id: totrans-134
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/086b5624abb7f033c51839f402e34fca.png)'
- en: MPC closed loop. Image by author.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: MPC闭环。图片由作者提供。
- en: Note that I’ve “measured” the plant’s state by using the function get_x_next_linear().
    In other words, I’ve assumed that our model is 100% correct.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，我通过使用函数get_x_next_linear()来“测量”了系统的状态。换句话说，我假设我们的模型是100%正确的。
- en: Here’s a plot of the closed loop from a bunch of initial states.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是一系列初始状态下的闭环图。
- en: '![](../Images/9c9d1b7cfc186f4f256afd14c042b052.png)'
  id: totrans-138
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/9c9d1b7cfc186f4f256afd14c042b052.png)'
- en: MPC closed loop from various initial states. Image by author.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: MPC从各种初始状态下的闭环。图片由作者提供。
- en: 4\. Further topics
  id: totrans-140
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4\. 其他主题
- en: 4.1 Stability and Recursive Feasibility
  id: totrans-141
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.1 稳定性和递归可行性
- en: Two of the most important aspects of an MPC controller are *recursive feasibility*
    of the iteratively invoked OCP and *stability* of the closed loop. In other words,
    if I have solved the OCP at time \(k\), will there exist a solution to the OCP
    at time \(k+1\)? If there exists a solution to the OCP at every time step, will
    the closed-loop state asymptotically settle at an equilibrium point (i.e. will
    it be stable)?
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: MPC控制器最重要的两个方面是迭代调用的OCP的 *递归可行性* 和闭环的 *稳定性*。换句话说，如果我在时间 \(k\) 解决了OCP，那么在时间 \(k+1\)
    是否存在OCP的解？如果每个时间步都存在OCP的解，闭环状态是否会渐近地稳定在平衡点（即它将是稳定的）？
- en: 'Ensuring that an MPC controller exhibits these two properties involves carefully
    designing the cost function and constraints, and choosing a long enough prediction
    horizon. Going back to our example, recall that the matrices in the cost function
    were simply chosen to be:'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 确保MPC控制器表现出这两个特性，需要仔细设计成本函数和约束条件，并选择一个足够长的预测范围。回到我们的例子，回想一下成本函数中的矩阵只是简单地选择为：
- en: \[
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: Q = \left( \begin{array}{cc}
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: Q = \left( \begin{array}{cc}
- en: 1 & 0\\
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 1 & 0\\
- en: 0 & 1
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 0 & 1
- en: \end{array}
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: \end{array}
- en: \right),\, Q_K = \left( \begin{array}{cc}
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: \right),\, Q_K = \left( \begin{array}{cc}
- en: 1 & 0\\
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 1 & 0\\
- en: 0 & 1
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 0 & 1
- en: \end{array}
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: \end{array}
- en: \right),\, R = 1.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: \right),\, R = 1.
- en: \]
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: In other words, the OCP penalises the distance of the state to the origin and
    thus drives it there. As you can probably guess, if the prediction horizon, \(K\),
    is very short and the initial state is located very close to the constraints at
    \(x_1=\pm 1\), the OCP will find solutions with insufficient “foresight” and the
    problem will be infeasible at some future iteration of the MPC loop. (You can
    also experiment with this by making \(K\) small in the code.)
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，最优控制问题（OCP）惩罚状态到原点的距离，因此将其驱动到那里。正如你可能猜到的，如果预测范围 \(K\) 非常短，并且初始状态位于 \(x_1=\pm
    1\) 的约束非常接近，OCP 将找到具有不足“预见性”的解，并且在 MPC 循环的某些未来迭代中问题将不可行。（你还可以通过在代码中将 \(K\) 设置得较小来实验这一点。）
- en: 4.2 Some Other Topics
  id: totrans-156
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.2 一些其他主题
- en: MPC is an active field of research and there are many interesting topics to
    explore.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: MPC是一个活跃的研究领域，有许多有趣的主题可以探索。
- en: What if the full state cannot be measured? This relates to *observability* and
    *output MPC*. What if I do not care about asymptotic stability? This (often) has
    to do with *economic MPC.* How do I make the controller *robust* to noise and
    disturbances? There are a few ways to deal with this, with *tube MPC* probably
    being the best-known.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 如果无法测量完整的状态呢？这与 *可观测性* 和 *输出 MPC* 有关。如果我不关心渐近稳定性呢？这（通常）与 *经济 MPC* 有关。我如何使控制器对噪声和干扰
    *鲁棒*？有几种方法可以处理这个问题，其中 *管形 MPC* 可能是最为人所知的。
- en: Future articles might focus on some of these topics.
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 未来的文章可能会关注这些主题之一。
- en: 5\. Further reading
  id: totrans-160
