- en: 4\. Further topics
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 4.1 Stability and Recursive Feasibility
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Two of the most important aspects of an MPC controller are *recursive feasibility*
    of the iteratively invoked OCP and *stability* of the closed loop. In other words,
    if I have solved the OCP at time \(k\), will there exist a solution to the OCP
    at time \(k+1\)? If there exists a solution to the OCP at every time step, will
    the closed-loop state asymptotically settle at an equilibrium point (i.e. will
    it be stable)?
  prefs: []
  type: TYPE_NORMAL
- en: 'Ensuring that an MPC controller exhibits these two properties involves carefully
    designing the cost function and constraints, and choosing a long enough prediction
    horizon. Going back to our example, recall that the matrices in the cost function
    were simply chosen to be:'
  prefs: []
  type: TYPE_NORMAL
- en: \[
  prefs: []
  type: TYPE_NORMAL
- en: Q = \left( \begin{array}{cc}
  prefs: []
  type: TYPE_NORMAL
- en: 1 & 0\\
  prefs: []
  type: TYPE_NORMAL
- en: 0 & 1
  prefs: []
  type: TYPE_NORMAL
- en: \end{array}
  prefs: []
  type: TYPE_NORMAL
- en: \right),\, Q_K = \left( \begin{array}{cc}
  prefs: []
  type: TYPE_NORMAL
- en: 1 & 0\\
  prefs: []
  type: TYPE_NORMAL
- en: 0 & 1
  prefs: []
  type: TYPE_NORMAL
- en: \end{array}
  prefs: []
  type: TYPE_NORMAL
- en: \right),\, R = 1.
  prefs: []
  type: TYPE_NORMAL
- en: \]
  prefs: []
  type: TYPE_NORMAL
- en: In other words, the OCP penalises the distance of the state to the origin and
    thus drives it there. As you can probably guess, if the prediction horizon, \(K\),
    is very short and the initial state is located very close to the constraints at
    \(x_1=\pm 1\), the OCP will find solutions with insufficient “foresight” and the
    problem will be infeasible at some future iteration of the MPC loop. (You can
    also experiment with this by making \(K\) small in the code.)
  prefs: []
  type: TYPE_NORMAL
- en: 4.2 Some Other Topics
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: MPC is an active field of research and there are many interesting topics to
    explore.
  prefs: []
  type: TYPE_NORMAL
- en: What if the full state cannot be measured? This relates to *observability* and
    *output MPC*. What if I do not care about asymptotic stability? This (often) has
    to do with *economic MPC.* How do I make the controller *robust* to noise and
    disturbances? There are a few ways to deal with this, with *tube MPC* probably
    being the best-known.
  prefs: []
  type: TYPE_NORMAL
- en: Future articles might focus on some of these topics.
  prefs: []
  type: TYPE_NORMAL
- en: 5\. Further reading
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Here are some standard and very good textbooks on MPC.
  prefs: []
  type: TYPE_NORMAL
- en: '[1] Grüne, L., & Pannek, J. (2016). *Nonlinear model predictive control.*'
  prefs: []
  type: TYPE_NORMAL
- en: '[2] Rawlings, J. B., Mayne, D. Q., & Diehl, M. (2020). *Model predictive control:
    theory, computation, and design.*'
  prefs: []
  type: TYPE_NORMAL
- en: '[3] Kouvaritakis, B., & Cannon, M. (2016). *Model predictive control: Classic,
    robust and stochastic.*'
  prefs: []
  type: TYPE_NORMAL
