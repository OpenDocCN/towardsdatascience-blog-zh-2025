- en: How to Build Machine Learning Projects That Help You Get Hired
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/the-machine-learning-projects-employers-want-to-see/](https://towardsdatascience.com/the-machine-learning-projects-employers-want-to-see/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1761851246116" class="mdspan-comment">If you’re trying</mdspan>
    to break into machine learning, then doing cookie-cutter projects and following
    basic tutorials is like trying to win a Formula 1 race in a go-kart.
  prefs: []
  type: TYPE_NORMAL
- en: '*You’ll move, but you won’t compete, and certainly won’t win.*'
  prefs: []
  type: TYPE_NORMAL
- en: 'I’ve reviewed hundreds of ML portfolios and interviewed dozens of candidates
    for real data science and ML roles, and I can tell you this: the people who get
    hired build projects that go beyond tutorials.'
  prefs: []
  type: TYPE_NORMAL
- en: So, in this article, I’ll break down the exact types of projects and frameworks
    that actually land interviews and job offers.
  prefs: []
  type: TYPE_NORMAL
- en: '**They’re not easy.**'
  prefs: []
  type: TYPE_NORMAL
- en: But that’s precisely why they work.
  prefs: []
  type: TYPE_NORMAL
- en: Reimplement a research paper
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Think about it.
  prefs: []
  type: TYPE_NORMAL
- en: A machine learning research paper is the culmination of several months of work
    by some of the leading practitioners in the field, summarised in a few pages of
    text.
  prefs: []
  type: TYPE_NORMAL
- en: '*The amount of knowledge in these papers is tremendous.*'
  prefs: []
  type: TYPE_NORMAL
- en: So, if you break down, dissect, and re-implement these papers on your own, imagine
    how much you would learn.
  prefs: []
  type: TYPE_NORMAL
- en: It’s kind of like trying to rebuild a Formula 1 car from blueprints — you might
    not have the same tools as the original engineers, but by understanding every
    nut and bolt, you learn how the whole machine works. And when you finally get
    your own version running, you’ll understand racing at a level most people never
    reach.
  prefs: []
  type: TYPE_NORMAL
- en: 'Re-implementing a paper will teach you so many skills:'
  prefs: []
  type: TYPE_NORMAL
- en: Being able to understand complex maths associated with cutting-edge models.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Being able to implement sophisticated models using code from scratch or simple
    libraries.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Being able to think creatively and apply your own knowledge to new ideas.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: And the significant part is that the majority, and I mean nearly 99%, of candidates
    are not doing this, so you will instantly stand out.
  prefs: []
  type: TYPE_NORMAL
- en: However, it’s not easy, and I can tell you that from first-hand experience.
    But easy is not going to get you hired nowadays.
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, how you go about implementing the paper could be a whole post in itself,
    but let me run you through the key steps:'
  prefs: []
  type: TYPE_NORMAL
- en: Read the paper. Then, reread it, and again, and again, until you fully understand
    what the paper was trying to solve, the algorithm used, the data, and why the
    results were significant and whether they are shocking or expected. Depending
    on your experience, this may take awhile.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: If you don’t understand certain concepts, go and learn them. This is not a waste
    of time, as you are actively closing the knowledge gaps you have.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Sketch/code the high-level architecture, like the inputs and outputs, the rough
    design of the overall system and the structure of the ML model.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Start implementing the simplest part and get it working.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Build a rough working prototype.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Optimise and try to replicate the results.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Some papers I recommend implementing:'
  prefs: []
  type: TYPE_NORMAL
- en: '[**Attention Is All You Need**](https://arxiv.org/abs/1706.03762)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**An Image is Worth 16×16 Words: Transformers for Image Recognition at Scale**](https://arxiv.org/abs/2010.11929)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**Language Models are Few-Shot Learners**](https://arxiv.org/abs/2005.14165)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**LoRA: Low-Rank Adaptation of Large Language Models**](https://arxiv.org/abs/2106.09685)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These are mainly within the deep learning space, but you can find papers relevant
    to the field you want to study.
  prefs: []
  type: TYPE_NORMAL
- en: 'Some useful websites to find papers:'
  prefs: []
  type: TYPE_NORMAL
- en: '[**Trending Papers — Huggingface**](https://huggingface.co/papers/trending)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**ML Papers of the Week**](https://github.com/dair-ai/ML-Papers-of-the-Week).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**ArXiv**](https://arxiv.org/list/stat.ML/recent)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Solve your own problem
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '*“What projects should I build”?*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: This is the second most common question I get asked, the first being how I got
    so handsome!
  prefs: []
  type: TYPE_NORMAL
- en: The thing is, most people don’t understand that the question is the wrong one
    to ask (the project one, not the handsome question).
  prefs: []
  type: TYPE_NORMAL
- en: If I gave you an exact project to do, there would be no story behind it in the
    interview.
  prefs: []
  type: TYPE_NORMAL
- en: What are you going to say?
  prefs: []
  type: TYPE_NORMAL
- en: '*“Oh some guy from the internet said I should build it”*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Not exactly a great scenario to be in.
  prefs: []
  type: TYPE_NORMAL
- en: A project that will stand out is deeply personal to you, and you are motivated
    to solve it. That is much better and interesting, and it will show during an interview.
  prefs: []
  type: TYPE_NORMAL
- en: Example project
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '*Let me give you an example of a great project.*'
  prefs: []
  type: TYPE_NORMAL
- en: I mentioned this story in a previous post, but I am going to repeat it to really
    emphasise the type of projects you should build.
  prefs: []
  type: TYPE_NORMAL
- en: At my previous company, we were hiring for a junior data scientist to work on
    [**operations research**](https://en.wikipedia.org/wiki/Operations_research) problems.
  prefs: []
  type: TYPE_NORMAL
- en: The candidate we ended up hiring had a standout project that was directly relevant
    to the job and was a problem they were interested in solving.
  prefs: []
  type: TYPE_NORMAL
- en: They had an interest in fantasy football (NFL) and designed their own optimisation
    algorithm to better allocate their player selections each week.
  prefs: []
  type: TYPE_NORMAL
- en: They even went further, reading journal papers on others’ solutions and implementing
    some of the ideas. See the link with research papers!
  prefs: []
  type: TYPE_NORMAL
- en: My framework
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Here’s a simple framework for you to follow to come up with a similar project
    as the one I just mentioned.
  prefs: []
  type: TYPE_NORMAL
- en: List at least five things you’re interested in outside of work.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: For each topic, write down five questions you would be interested in answering
    or solving. So, in total, you will have 25 potential questions.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Now, think about how machine learning could help answer those questions. Don’t
    worry if the question seems completely impossible; be creative. However, obviously,
    don’t try to create robot dogs or something!
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Finally, pick one question that excites you the most. Ideally, choose something
    that feels just slightly out of your reach; that way, you will really learn and
    push yourself out of your comfort zone.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: This exercise will take you 10 minutes, so you have no excuse not to do it,
    and will give you a project idea that will help you land a job.
  prefs: []
  type: TYPE_NORMAL
- en: Building complexity and scale
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: However, the idea on its own won’t necessarily be sufficient. For that, the
    project needs some complexity and scale.
  prefs: []
  type: TYPE_NORMAL
- en: This can be shown and expressed in different ways.
  prefs: []
  type: TYPE_NORMAL
- en: You can deploy the project end-to-end using production code, cloud systems like
    AWS and containerising the algorithm using **[Docker](https://medium.com/data-science/from-chaos-to-consistency-docker-for-data-scientists-240372adff18?sk=68898c01460f59a75617244d19f101d1)**
    and **[Kubernetes](https://kubernetes.io/)**.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can use a really complex, state-of-the-art algorithm or framework. Reading
    research papers is excellent for this!
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can make it so users can interact with the project, like an online application.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can make it solve a variety of problems, like a suite of models.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: There are many options, and it’s easy to get overwhelmed.
  prefs: []
  type: TYPE_NORMAL
- en: Start and learn as you go. That’s all you need to do.
  prefs: []
  type: TYPE_NORMAL
- en: Other ideas
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: If, for some reason, you don’t fancy doing the above two, even though they will
    actually get you hired, here is a list of further project ideas.
  prefs: []
  type: TYPE_NORMAL
- en: Ask AI for a project; give it a suitable prompt, of course.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Enter a Kaggle competition, but you need to place well for it to stand out.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Use an AI/foundational model to solve a personal problem.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Code machine learning algorithms from scratch using basic Numpy, or even better,
    native Python only.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Now, if you want me to further handhold you, this is a list of more granular
    projects to try:'
  prefs: []
  type: TYPE_NORMAL
- en: Reinforcement learning for Pac-Man or any other game.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Building a language model from scratch.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Computer vision model for classifying images of literally anything.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Sentiment analysis on a social media platform about a particular topic.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Recommendation system for an App you like.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Fine-tuning an LLM for a particular use case.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Again, I am giving high-level ideas because these need to be personal to you
    for them to really stand out.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: After you’ve built these projects, you’re ready to start applying for jobs!
  prefs: []
  type: TYPE_NORMAL
- en: '*But to actually land interviews, you’ll need a rock-solid resume.*'
  prefs: []
  type: TYPE_NORMAL
- en: So what makes the difference between a resume that gets ignored and one that
    gets noticed?
  prefs: []
  type: TYPE_NORMAL
- en: Find out in my previous post below.
  prefs: []
  type: TYPE_NORMAL
- en: '[How I Tailored the Resume That Landed Me $100K+ Data Science and ML Offers](https://towardsdatascience.com/this-resume-landed-me-100k-data-science-ml-offers/)'
