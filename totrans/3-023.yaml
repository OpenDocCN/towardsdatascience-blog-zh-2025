  zh: '[PRE8]'
- en: 'And the final part of the pyspark notebook Process and generate output table
    does four main things:'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: pyspark 笔记本中的最后部分“处理和生成输出表”执行四个主要任务：
- en: First it applies the UDF extract_features_udf on the raw HTML, producing a single
    **features** column that holds a small dict of counts/flags for each page, see
    code block 10.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，它将 UDF extract_features_udf 应用到原始 HTML 上，生成一个包含每个页面的小型计数/标志字典的单一 **features**
    列，参见代码块 10。
- en: '**Code block 10**. Applies UDF to each row'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: '**代码块 10**. 将 UDF 应用到每一行'
- en: '[PRE9]'
  id: totrans-85
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Secondly, it turns each key in the features dict into its own column in the
    DataFrame (so you get separate word_count, num_links, etc.), see code block 11.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 其次，它将 features 字典中的每个键转换为 DataFrame 中的单独列（因此你得到单独的 word_count、num_links 等），参见代码块
    11。
- en: '**Code block 11**. Explode that dictionary into real columns'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: '**代码块11**. 将该字典展开为实际列'
- en: '[PRE10]'
  id: totrans-88
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Thirdly, based on business rules defined by me, it builds a 0-10 score by assigning
    points for each feature (e.g. word-count thresholds, presence of contact/about
    pages, product listings), see code block 12.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 第三，根据我定义的业务规则，它通过为每个特征分配分数（例如，单词计数阈值、是否存在联系/关于页面、产品列表）来构建一个0-10分的评分，请参阅代码块12。
- en: '**Code block 12**. Compute a single quality score'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: '**代码块12**. 计算单个质量评分'
- en: '[PRE11]'
  id: totrans-91
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: And finally it writes the final table back into Snowflake (replacing any existing
    table) so you can query or join these quality scores later.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，它将最终表写回到Snowflake（替换任何现有表），这样你就可以稍后查询或连接这些质量评分。
- en: '**Code block 13**. Write the output table to Snowflake'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: '**代码块13**. 将输出表写入Snowflake'
