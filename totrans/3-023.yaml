- en: '**Be a good citizen of the web.**'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: '**成为网络的好公民**。'
- en: This scraper only counts words, links, images, scripts and simple “contact/about/price”
    flags, it does **not** extract or store any private or sensitive data.
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这个爬虫只计算单词、链接、图片、脚本和简单的“联系/关于/价格”标志，它**不**提取或存储任何私人或敏感数据。
- en: '**Throttle responsibly:** use modest concurrency (e.g. CONCURRENT_REQUESTS
    ≤ 10), insert small pauses between batches, and avoid hammering the same domain.'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**负责任地限制**：使用适度的并发性（例如CONCURRENT_REQUESTS ≤ 10），在批次之间插入小的暂停，并避免对同一域名进行连续打击。'
- en: '**Retention policy:** once you’ve computed your features or scores, purge raw
    HTML within a reasonable window (e.g. after 7-14 days).'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**保留策略**：一旦你计算了你的特征或评分，在合理的时间窗口内（例如7-14天后）清除原始HTML。'
- en: For very large runs, or if you plan to share extracted HTML, consider reaching
    out to site owners for permission or notifying them of your usage.
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于非常大的运行，或者如果你计划共享提取的HTML，请考虑联系网站所有者获取许可或通知他们你的使用情况。
