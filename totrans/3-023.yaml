- en: 'Website Feature Engineering at Scale: PySpark, Python & Snowflake'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 按规模进行网站特征工程：PySpark、Python & Snowflake
- en: 原文：[https://towardsdatascience.com/creative-website-feature-engineering-using-pyspark-python-snowflake/](https://towardsdatascience.com/creative-website-feature-engineering-using-pyspark-python-snowflake/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/creative-website-feature-engineering-using-pyspark-python-snowflake/](https://towardsdatascience.com/creative-website-feature-engineering-using-pyspark-python-snowflake/)
- en: <mdspan datatext="el1746163832240" class="mdspan-comment">Introduction</mdspan>
    and Problem
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1746163832240" class="mdspan-comment">引言</mdspan>和问题
- en: 'Imagine you’re staring at a database containing thousands of merchants across
    multiple countries, each with its own website. Your goal? Identify the top candidates
    to partner with in a new business proposal. Manually browsing each site is impossible
    at scale, so you need an automated way to gauge “how good” each merchant’s online
    presence is. Enter the **website quality score**: a numeric feature (0-10) that
    captures key aspects of a site’s professionalism, content depth, navigability,
    and visible product listings with prices. By integrating this score into your
    machine learning pipeline, you gain a powerful signal that helps your model distinguish
    the highest-quality merchants and dramatically improve selection accuracy.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下，你面对的是一个包含数千家遍布多个国家的商家的数据库，每家商家都有自己的网站。你的目标是什么？在新的商业提案中识别出最佳的合作伙伴。在规模上手动浏览每个网站是不可能的，因此你需要一种自动化的方式来评估每个商家的在线存在“有多好”。这就是**网站质量评分**：一个数值特征（0-10），它捕捉了网站的专业性、内容深度、可导航性和可见的产品列表及价格等关键方面。通过将此评分集成到你的机器学习管道中，你将获得一个强大的信号，帮助你的模型区分最高质量的商家，并显著提高选择准确性。
