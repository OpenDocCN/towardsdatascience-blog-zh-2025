- en: Assign a Quality Score Script in Pyspark
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Because each page’s HTML can be massive, and you’ll have hundreds or thousands
    of pages, you can’t efficiently process or store all that raw text in flat files.
    Instead, we hand off to Spark via Snowpark (Snowflake’s PySpark engine) for scalable
    feature extraction. See notebooks/ps_website_quality_score.ipynb for a ready-to-run
    example: just select the Python kernel in Snowflake and import the built-in Snowpark
    libraries to spin up your Spark session (see Code Block 6).'
  prefs: []
  type: TYPE_NORMAL
- en: '**Code block 6**. Folder structure once you ran it for ARG, BRA and JAM'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: Each market speaks its own language and follows different conventions, so we
    bundle all those rules into a simple country-specific config. For each country
    we define the contact/about keywords and price‐pattern regexes that signal a “good”
    merchant site, then point the script at the corresponding Snowflake input and
    output tables. This makes the feature extractor fully data-driven, reusing the
    same code for every region with just a change of config.
  prefs: []
  type: TYPE_NORMAL
- en: '**Code block 7**. Config file'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: Before we can register and use our Python scraper logic inside Snowflake, we
    first create a **stage**, a persistent storage area, by running the DDL in Code
    Block 8\. This creates a named location @STAGE_WEBSITES under your DATABASE.SCHEMA,
    where we’ll upload the UDF package (including dependencies like BeautifulSoup
    and lxml). Once the stage exists, we deploy the extract_features_udf there, making
    it available to any Snowflake session for HTML parsing and feature extraction.
    Finally, we set the country_code variable to kick off the pipeline for a specific
    country, before looping through other country codes as needed.
  prefs: []
  type: TYPE_NORMAL
- en: '**Code block 8**. Create a stage folder to keep the UDFs created'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: 'Now at this part of the code, refer to Code block 9, we’ll define the UDF function
    ‘extract_features_udf’ that will extract information from the HTML content, here’s
    what this part of the code does:'
  prefs: []
  type: TYPE_NORMAL
- en: Defines the Snowpark UDF called ‘extract_features_udf’ that lives in the Snowflake
