    have been created by the author. None of the numbers are drawn from real business
    data but were manually generated for illustrative purposes. Likewise, all SQL
    scripts are handcrafted examples; they are **not** extracted from any live environment
    but are designed to closely resemble what a company using **Snowflake** might
    encounter.
