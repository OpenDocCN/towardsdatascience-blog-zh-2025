  zh: 这就是为什么与更基本的方法相比，此脚本在抓取网站内容方面非常强大，请参见表1：
- en: '**Table 1**. Advantages of this Fetch HTML script comparing with a basic implementation'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: '**表 1**. 与基本实现相比，此抓取HTML脚本的优点'
- en: '| **Technique** | **Basic Approach** | **This script** p1_fetch_html_from_websites.py
    |'
  id: totrans-43
  prefs: []
  type: TYPE_TB
  zh: '| **技术** | **基本方法** | **此脚本** p1_fetch_html_from_websites.py |'
- en: '| **HTTP fetching** | Blocking requests.get() calls one‐by‐one | Async I/O
    with asyncio + aiohttp to issue many requests in parallel and overlap network
    waits |'
  id: totrans-44
  prefs: []
  type: TYPE_TB
  zh: '| **HTTP抓取** | 逐个调用阻塞requests.get() | 使用asyncio + aiohttp进行异步I/O，以并行发出多个请求并重叠网络等待时间
    |'
- en: '| **User-Agent** | Single default UA header for all requests | Rotate through
    a list of real browser UA strings to evade basic bot‐detection and throttling
    |'
  id: totrans-45
  prefs: []
  type: TYPE_TB
  zh: '| **用户代理** | 所有请求使用单个默认UA头 | 通过一系列真实的浏览器UA字符串进行轮换，以规避基本的机器人检测和限制 |'
- en: '| **Batching** | Load & process the entire URL list in one go | Split into
    chunks via BATCH_SIZE so you can checkpoint, limit memory use, and recover mid-run
    |'
  id: totrans-46
  prefs: []
  type: TYPE_TB
  zh: '| **批处理** | 一次性加载和处理整个URL列表 | 通过BATCH_SIZE分割成块，以便您可以检查点、限制内存使用并在运行过程中恢复 |'
- en: '| **Retries & Timeouts** | Rely on library defaults or crash on slow/unresponsive
    servers | Explicit MAX_RETRIES and TIMEOUT settings to retry transient failures
    and bound per-request wait times |'
  id: totrans-47
  prefs: []
  type: TYPE_TB
  zh: '| **重试与超时** | 依赖库默认设置或在服务器慢/无响应时崩溃 | 显式设置MAX_RETRIES和TIMEOUT以重试短暂失败并限制每个请求的等待时间
    |'
- en: '| **Concurrency limit** | Sequential or unbounded parallel calls (risking overload)
    | CONCURRENT_REQUESTS + aiohttp.TCPConnector + asyncio.Semaphore to throttle max
    in-flight connections |'
  id: totrans-48
  prefs: []
  type: TYPE_TB
  zh: '| **并发限制** | 顺序或无限制的并行调用（存在超载风险） | 使用CONCURRENT_REQUESTS + aiohttp.TCPConnector
    + asyncio.Semaphore来限制最大并发连接数 |'
- en: '| **Event loop** | Single loop reused, can hit “bound to different loop” errors
    when restarting use | Create a fresh asyncio event loop per batch to avoid loop/semaphore
    binding errors and ensure isolation |'
  id: totrans-49
  prefs: []
  type: TYPE_TB
  zh: '| **事件循环** | 重复使用单个循环，重启时可能会遇到“绑定到不同循环”的错误 | 每个批次创建一个新的asyncio事件循环，以避免循环/信号量绑定错误并确保隔离
    |'
- en: It’s generally better to store raw HTML in a proper database (Snowflake, BigQuery,
    Redshift, Postgres, etc.) rather than in CSV files. A single page’s HTML can easily
    exceed spreadsheet limits (e.g. Google Sheets caps at 50,000 characters per cell),
    and managing hundreds of pages would bloat and slow down CSVs. While we include
    a CSV option here for quick demos or minimal setups, large‐scale scraping and
    feature engineering are far more reliable and performant when run in a scalable
    data warehouse like Snowflake.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 通常情况下，将原始HTML存储在合适的数据库（如Snowflake、BigQuery、Redshift、Postgres等）中，而不是CSV文件中会更好。单页的HTML内容很容易超过电子表格的限制（例如，Google
    Sheets每个单元格最多只能容纳50,000个字符），而管理数百页内容会使CSV文件膨胀并减慢速度。虽然我们在这里提供了CSV选项以供快速演示或最小化设置，但大规模抓取和特征工程在可扩展的数据仓库（如Snowflake）中运行时，其可靠性和性能要远高于在CSV文件中。
