- en: Exploring the Proportional Odds Model for Ordinal Logistic Regression
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/proportional-odds-model-for-ordinal-logistic-regression/](https://towardsdatascience.com/proportional-odds-model-for-ordinal-logistic-regression/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: You can find the full code for this example at the bottom of this post.
  id: totrans-2
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1749598376012" class="mdspan-comment">The proportional</mdspan>
    odds model for ordinal logistic regression was first introduced by McCullagh ([1980](https://jumbong.github.io/personal-website/00_tds/proportional_ordinal_regression.html#ref-mccullagh1980regression)).
    This model extends binary logistic regression to situations where the dependent
    variable is ordinal [it consists of ordered categorical values]. The proportional
    odds model is built on several assumptions, including independence of observations,
    linearity of the log-odds, absence of multicolinearity among predictors, and the
    proportional odds assumption. This last assumption states that the regression
    coefficients are constant across all thresholds of the ordinal dependent variable.
    Ensuring the proportional odds assumption holds is crucial for the validity and
    interpretability of the model.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: A variety of methods have been proposed in the literature to assess model fit
    and, in particular, to test the proportional odds assumption. In this paper, we
    focus on two approaches developed by Brant in his article Brant ([1990](https://jumbong.github.io/personal-website/00_tds/proportional_ordinal_regression.html#ref-brant1990assessing)),
    “Assessing Proportionality in the Proportional Odds Model for Ordinal Logistic
    Regression.” We also demonstrate how to implement these techniques in Python,
    applying them to real-world data. Whether you come from a background in data science,
    machine learning, or statistics, this article aims to help your understand how
    to evaluate model fit in ordinal logistic regression.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: 'This paper is organized into four main sections:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: The first section introduces the proportional odds model and its assumptions.
  id: totrans-6
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The second section discusses how to assess the proportional odds assumption
    using the likelihood ratio test.
  id: totrans-7
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The third section covers the assessment of the proportional odds assumption
    using the separate fits approach.
  id: totrans-8
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The final section provides examples, illustrating the implementation of these
    assessment methods in Python with data.
  id: totrans-9
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 1\. Introduction to the Proportional Odds Model
  id: totrans-10
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Before presenting the model, we introduce the data structure. We assume we
    have N independent observations. Each observation is represented by a vector of
    p explanatory variables X[i] = (X[i1], X[i2], …, X[ip]), along with a dependent
    or response variable Y that takes ordinal values from 1 to K. The proportional
    odds model specifically models the cumulative distribution probabilities of the
    response variable Y, defined as γ[j] = P(Y ≤ j | X[i]) for j = 1, 2, …, K – 1,
    as functions of the explanatory variables X[i]. The model is formulated as follows:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: '**logit(γⱼ) = log(γⱼ / (1 − γⱼ)) = θⱼ − βᵀ𝐗. (1)**'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
- en: Where θⱼ are the intercepts for each category j and respect the condition θ₁
    < θ₂ < ⋯ < θₖ₋₁, and β is the vector of regression coefficients which are the
    same for all categories.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: We observe a monotonic trend in the coefficients θⱼ across the categories of
    the response variable Y.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: 'This model is also known as the grouped continuous model, as it can be derived
    by assuming the existence of a continuous latent variable Y∗. This latent variable
    follows a linear regression model with conditional mean η = βᵀ𝐗, and it relates
    to the observed ordinal variable Y through thresholds θⱼ defined as follows:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: '**y∗ = βᵀ𝐗+ϵ,  **       **(2)**'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: where ϵ is an error term (random noise), generally assumed to follow a standard
    logistic distribution in the proportional odds model.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
- en: 'The latent variable Y^* is unobserved and partitioned into intervals defined
    by thresholds θ₁, θ₂, …, θₖ₋₁, generating the observed ordinal variable Y as follows:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/13d118d03d78bf3e9aa832ee64ccd0ce.png)'
  id: totrans-19
  prefs: []
  type: TYPE_IMG
- en: In the next section, we introduce the various approaches proposed by Brant ([1990](http://localhost:5126/00_tds/proportional_ordinal_regression.html#ref-brant1990assessing)) for
    assessing the proportional odds assumption. These methods evaluate whether the
    regression coefficients remain constant across the categories defined by the ordinal
    response variable.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: '2\. Assessing the Proportional Odds Assumption: The Likelihood Ratio Test'
  id: totrans-21
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'To assess the proportional odds assumption in an ordinal logistic regression
    model, Brant ([1990](http://localhost:5126/00_tds/proportional_ordinal_regression.html#ref-brant1990assessing))
    proposes the use of the likelihood ratio test. This approach begins by fitting
    a less restrictive model in which the regression coefficients are allowed to vary
    across categories. This model is expressed as:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: '**logit(γ[j]) = θ[j] − β[j]^T𝐗**. for j = 1, …, K-1 (4)'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: 'where β[j] is the vector [vector of dimension p] of regression coefficients
    for each category j. Here the coefficients β[j] are allowed to vary across categories,
    which means that the proportional odds assumption is not satisfied. We then use
    the conventionnel likelihood ratio test to assess the hypothesis :'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
- en: '**H[0] : β[j] = β for all j = 1, 2, …, K−1.** (5)'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
- en: To perform this test, we conduct a likelihood ratio test comparing the unconstrained
    (non-proportional or satured) model with the constrained (proportional odds or
    reduced) model.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
- en: 'Before proceeding further, we briefly recall how to use the likelihood ratio
    test in hypothesis testing. Suppose we want to evaluate the null hypothesis H[0]
    : θ ∈ Θ[0] against the alternative H[1] : θ ∈ Θ[1],'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
- en: 'The likelihood ratio statistic is defined as:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/9124a8fe1cc9cd42fde0983910b059b0.png)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
- en: where 𝓛(θ) is the likelihood function, θ̂ is the maximum likelihood estimate
    (MLE) under the full model, and θ̂₀ is the MLE under the constrained model. The
    test statistic λ follows a chi-square distribution with degrees of freedom equal
    to the difference in the number of parameters between the full and constrained
    models.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 𝓛(θ) 是似然函数，θ̂ 是完整模型下的最大似然估计（MLE），θ̂₀ 是约束模型下的 MLE。检验统计量 λ 遵循具有等于完整模型和约束模型之间参数数量差异的自由度的卡方分布。
- en: Here, θ̂ is the maximum likelihood estimate (MLE) under the full (unconstrained)
    model, and θ̂₀ is the MLE under the constrained model where the proportional odds
    assumption holds. The
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 这里，θ̂ 是完整（无约束）模型下的最大似然估计（MLE），θ̂₀ 是在比例优势假设成立的约束模型下的 MLE。该
- en: test statistic λ follows a chi-square distribution under the null hypothesis.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 在零假设下，检验统计量 λ 遵循卡方分布。
- en: In a general setting, suppose the full parameter space is denoted by
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 在一般设置中，假设完整参数空间表示为
- en: Θ = (θ₁, θ₂, …, θ[q], …, θ[p]),
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: Θ = (θ₁, θ₂, …, θ[q], …, θ[p])，
- en: and the restricted parameter space under the null hypothesis is
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 在零假设下的限制参数空间是
- en: Θ₀ = (θ₁, θ₂, …, θ[q]).
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: Θ₀ = (θ₁, θ₂, …, θ[q])。
- en: '**(Note: These parameters are generic and should not be confused with the K−1 thresholds
    or intercepts in the proportional odds model.)**, the likelihood ratio test statistic λ follows
    a chi-square distribution with p−q degrees of freedom. Where p represents the
    total number of parameters in the full (unconstrained or “saturated”) model, while K−1 corresponds
    to the number of parameters in the reduced (restricted) model.'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: '**(注意：这些参数是通用的，不应与比例优势模型中的 K−1 个阈值或截距混淆。)**'
- en: 'Now, let us apply this approach to the ordinal logistic regression model with
    the proportional odds assumption. Assume that our response variable has K ordered
    categories and that we have p predictor variables. To use the likelihood ratio
    test to evaluate the proportional odds assumption, we need to compare two models:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们将这种方法应用于具有比例优势假设的有序逻辑回归模型。假设我们的响应变量有 K 个有序类别，并且我们有 p 个预测变量。为了使用似然比检验来评估比例优势假设，我们需要比较两个模型：
- en: '1. Unconstrained Model (non-proportional odds):'
  id: totrans-39
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
  zh: 1. 无约束模型（非比例优势）：
- en: 'This model allows each outcome threshold to have its own set of regression
    coefficients, meaning that we do not assume the regression coefficients are equal
    across all thresholds. The model is defined as:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 此模型允许每个结果阈值都有自己的回归系数集，这意味着我们不假设回归系数在所有阈值中相等。该模型定义为：
- en: '**logit(γ[j]) = θ[j] − β[j]^T𝐗**. for j = 1, …, K-1 (7)'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: '**logit(γ[j]) = θ[j] − β[j]^T𝐗**. 对于 j = 1, …, K-1 (7)'
- en: There are K−1 threshold (intercept) parameters: θ[1], θ[2], … , θ[K-1]
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 有 K−1 个阈值（截距）参数：θ[1], θ[2], … , θ[K-1]
- en: Each threshold has its own vector of slope coefficients β[j] of dimension p
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每个阈值都有自己的斜率系数向量 β[j] 的维度 p
- en: 'Thus, the total number of parameters in the unconstrained model is:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，无约束模型中的参数总数为：
- en: '**(K−1) thresholds + (K−1)×p slopes = (K−1)(p+1).**'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: '**(K−1) 阈值 + (K−1)×p 斜率 = (K−1)(p+1).**'
- en: '2. Proportional Odds Model:'
  id: totrans-46
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
  zh: 2. 比例优势模型：
- en: 'This model assumes a single set of regression coefficients for all thresholds:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 该模型假设所有阈值只有一个回归系数集：
- en: '**logit(γ[j]) = θ[j] − β^T𝐗**. for j = 1, …, K-1 (8)'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: '**logit(γ[j]) = θ[j] − β^T𝐗**. 对于 j = 1, …, K-1 (8)'
- en: There are K−1 threshold parameters
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 有 K−1 个阈值参数
- en: There is one common slope vector β (of dimension p x 1) for all j
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于所有 j，有一个共同的斜率向量 β（维度 p x 1）
- en: 'Thus, the total number of parameters in the proportional odds model is:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，比例优势模型中的参数总数为：
- en: '**(K−1) thresholds+p slopes=(K−1)+p**'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: '**(K−1) 阈值 + p 斜率 = (K−1) + p**'
- en: 'Thus, the likelihood ratio test statistic follows a chi-square distribution
    with degrees of freedom:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，似然比检验统计量遵循具有自由度的卡方分布：
- en: '**df = [(K−1)×(p+1)]−[(K−1)+p] = (K−2)×p**'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: '**df = [(K−1)×(p+1)]−[(K−1)+p] = (K−2)×p**'
- en: This test provides a formal way to assess whether the proportional odds assumption
    holds for the given data. At a significance level of 1%, 5%, or any other conventional
    threshold, the proportional odds assumption is rejected if the test statistic λ exceeds
    the critical value from the chi-square distribution with **(K−2)×p **degrees of
    freedom.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 此测试提供了一种正式的方法来评估给定的数据是否满足比例优势假设。在 1%、5% 或任何其他传统阈值下，如果测试统计量 λ 超过具有 **(K−2)×p**
    个自由度的卡方分布的临界值，则拒绝比例优势假设。
- en: In other words, we reject the null hypothesis
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，我们拒绝零假设
- en: 'H[0] : β[1] = β[2] = ⋯ =β[K-1] = β,'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 'H[0] : β[1] = β[2] = ⋯ =β[K-1] = β,'
- en: which states that the regression coefficients are equal across all cumulative
    logits. This test has the advantage of being straightforward to implement and
    provides an overall assessment of the proportional odds assumption.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 这表明回归系数在所有累积logit中是相等的。这种测试的优点是易于实现，并提供了对比例概率假设的整体评估。
- en: In the next section, we introduce the proportional odds test based on separate
    fits.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一节中，我们将介绍基于单独拟合的比例概率测试。
- en: '3\. Assessing the Proportional Odds Assumption: The Separate Fits Approach.'
  id: totrans-60
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. 评估比例概率假设：单独拟合方法。
- en: To understand this section, it’s important first to understand the concept and
    properties of the Mahalanobis distance. This distance is used to quantify how
    different two vectors are in a multivariate space that shares the same distribution.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 要理解这一节，首先理解马氏距离的概念和性质是重要的。这种距离用于量化在具有相同分布的多变量空间中两个向量有多不同。
- en: 'Let x = (x₁, x₂, …, xₚ)ᵀ and y = (y₁, y₂, …, yₚ)ᵀ. The Mahalanobis distance
    between them is defined as:'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 令x = (x₁, x₂, …, xₚ)ᵀ和y = (y₁, y₂, …, yₚ)ᵀ。它们之间的马氏距离定义为：
- en: '![](../Images/c7b830abaa494e62953207af7bc8d97f.png)'
  id: totrans-63
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/c7b830abaa494e62953207af7bc8d97f.png)'
- en: where Σ is the covariance matrix of the distribution. The Mahalanobis distance
    squared is closely related to the chi-squared (χ²) distribution. Specifically,
    if X ∼ N(μ, Σ) is a p-dimensional normally distributed random vector with mean
    μ and covariance matrix Σ, then the Mahalanobis distance Dₘ(X, μ)² follows a χ²
    distribution with p degrees of freedom.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 其中Σ是分布的协方差矩阵。马氏距离的平方与卡方(χ²)分布密切相关。具体来说，如果X ∼ N(μ, Σ)是一个具有均值μ和协方差矩阵Σ的p维正态分布的随机向量，那么马氏距离Dₘ(X,
    μ)²遵循具有p个自由度的χ²分布。
- en: Understanding this relationship is crucial for evaluating proportionality using
    separate model fits — a topic we will return to shortly.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 理解这种关系对于使用单独模型拟合评估比例性至关重要——我们将在稍后回到这个话题。
- en: In fact, the author notes that the natural approach to evaluating the proportional
    odds assumption is to fit a set of K−1 binary logistic regression models (where K is
    the number of categories of the response variable), and then use the statistical
    properties of the estimated parameters to construct a test statistic for the proportional
    odds hypothesis.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 实际上，作者指出，评估比例概率假设的自然方法是拟合一组K−1个二进制逻辑回归模型（其中K是响应变量类别的数量），然后使用估计参数的统计性质来构建比例概率假设的检验统计量。
- en: 'The procedure is as follows:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 程序如下：
- en: 'First, we construct separate binary logistic regression models for each threshold j
    = 1, 2, …, K−1 of the ordinal response variable Y. For each threshold j, we define
    a binary variable Z[j], which takes the value 1 if the observation exceeds threshold j,
    and 0 otherwise. Specifically, we have:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们为有序响应变量Y的每个阈值j = 1, 2, …, K−1构建单独的二进制逻辑回归模型。对于每个阈值j，我们定义一个二进制变量Z[j]，如果观测值超过阈值j，则其值为1，否则为0。具体来说，我们有：
- en: '![](../Images/7c74a725620fa2df6a7c76cf33752706.png)'
  id: totrans-69
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/7c74a725620fa2df6a7c76cf33752706.png)'
- en: 'With the probability, π[j] = P(Z[j] = 1 | X) = 1−γ[j] satisfying the logistic
    regression model:'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 概率地，π[j] = P(Z[j] = 1 | X) = 1−γ[j]满足逻辑回归模型：
- en: '**logit(π[j] ) = θ[j] − β^T𝐗**. for j = 1, …, K-1 (10)'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: '**logit(π[j] ) = θ[j] − β^T𝐗**. 对于 j = 1, …, K-1 (10)'
- en: 'Then, assessing the proportional odds assumption in this context involves testing
    the hypothesis that the regression coefficients β[j] are equal across all K−1 models.
    This is equivalent to testing the hypothesis:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，在这个背景下评估比例概率假设涉及检验回归系数β[j]在所有K−1个模型中是否相等的假设。这等价于检验以下假设：
- en: 'H[0] : β[1] = β[2] = ⋯ = β[K-1] (11)'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 'H[0] : β[1] = β[2] = ⋯ = β[K-1] (11)'
- en: 'Let β̂ⱼ denote the maximum likelihood estimators of the regression coefficients
    for each binary model, and let β̂ = (β̂₁ᵀ, β̂₂ᵀ, …, β̂ₖ₋₁ᵀ)ᵀ represent the global
    vector of estimators. This vector is asymptotically normally distributed, such
    that 𝔼(β̂ⱼ) ≈ β, with variance-covariance matrix 𝕍(β̂ⱼ). The general term of this
    matrix, cov(β̂ⱼ, β̂ₖ), needs to be determined and is given by:'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 用β̂ⱼ表示每个二进制模型的回归系数的最大似然估计量，用β̂ = (β̂₁ᵀ, β̂₂ᵀ, …, β̂ₖ₋₁ᵀ)ᵀ表示估计量的全局向量。这个向量是渐近正态分布的，因此𝔼(β̂ⱼ)
    ≈ β，协方差矩阵为𝕍(β̂ⱼ)。该矩阵的通项cov(β̂ⱼ, β̂ₖ)需要确定，并给出如下：
- en: '![](../Images/9d39fb83ee41924a9424923a7ceae035.png)'
  id: totrans-75
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/9d39fb83ee41924a9424923a7ceae035.png)'
- en: 'where Cov(β̂ⱼ, β̂ₖ) is the covariance between the estimated coefficients of
    the j-th and k-th binary models. The asymptotic covariances, Cov(β̂ⱼ, β̂ₖ), are
    obtained by deleting the first row and column of:'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 Cov(β̂ⱼ, β̂ₖ) 是第 j 个和第 k 个二元模型估计系数之间的协方差。渐近协方差 Cov(β̂ⱼ, β̂ₖ) 是通过删除以下矩阵的第一行和第一列获得的：
- en: '**(X[+]^T W[jj] X₊)^(-1)X[+]^TW[jl]X[+] (Xᵗ W[ll]X₊)**^(-1)'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: '**(X[+]^T W[jj] X₊)^(-1)X[+]^TW[jl]X[+] (Xᵗ W[ll]X₊)**^(-1)'
- en: 'where W[jl]: n × n is diagonal with typical entry π[l] − π[j] π[l] for j ≤
    l, and **X[+]**: n x p matrix denotes the matrix of explanatory variables augmented
    on the left with a column of ones [1’s].'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: '其中 W[jl]: n × n 是对角线矩阵，典型项为 π[l] − π[j] π[l]，对于 j ≤ l，**X[+]**: n x p 矩阵表示左加一列（1
    的列）的解释变量矩阵。'
- en: 'To evaluate the proportional odds assumption, Brant constructs a matrix 𝐃 that
    captures the differences between the coefficients β̂ⱼ. Recall that each vector
    β̂ⱼ has dimension p. The matrix 𝐃 is defined as follows:'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 为了评估比例优势假设，Brant 构建了一个矩阵 𝐃，它捕捉了系数 β̂ⱼ 之间的差异。回想一下，每个向量 β̂ⱼ 的维度为 p。矩阵 𝐃 定义如下：
- en: '![](../Images/ee4d5ae69c72a0849b4c8fd9389044e7.png)'
  id: totrans-80
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ee4d5ae69c72a0849b4c8fd9389044e7.png)'
- en: where 𝐈 is the identity matrix of size p × p. The first row of the matrix 𝐃
    corresponds to the difference between the first and second coefficients, the second
    row corresponds to the difference between the second and third coefficients, and
    so on, until the last row which corresponds to the difference between the (K −
    2)-th and (K − 1)-th coefficients. We can notice that the product 𝐃β̂ will yield
    a vector of differences between the coefficients β̂ⱼ.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 𝐼 是大小为 p × p 的单位矩阵。矩阵 𝐃 的第一行对应于第一和第二个系数之间的差值，第二行对应于第二和第三个系数之间的差值，以此类推，直到最后一行，对应于
    (K − 2)-th 和 (K − 1)-th 系数之间的差值。我们可以注意到，𝐃β̂ 的乘积将产生一个系数 β̂ⱼ 之间的差值向量。
- en: 'Once the matrix 𝐃 is constructed, Brant defines the Wald statistic X² to test
    the proportional odds assumption. This statistic can be interpreted as the Mahalanobis
    distance between the vector 𝐃β̂ and the zero vector. The Wald statistic is defined
    as follows:'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦构建了矩阵 𝐃，Brant 定义 Wald 统计量 X² 来检验比例优势假设。这个统计量可以解释为向量 𝐃β̂ 和零向量之间的 Mahalanobis
    距离。Wald 统计量定义为以下：
- en: '![](../Images/d6f0d01c3d76dee43697eb1da5e37d56.png)'
  id: totrans-83
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d6f0d01c3d76dee43697eb1da5e37d56.png)'
- en: which will be asymptotically χ² distributed with (K − 2)p degrees of freedom
    under the null hypothesis. The challenging part here is to determine the variance-covariance
    matrix 𝕍̂(β̂). In his article, Brant provides an explicit estimator for this variance-covariance
    matrix, which is based on the maximum likelihood estimators β̂ⱼ from each binary
    model.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 这将在零假设下渐近地服从具有 (K − 2)p 个自由度的 χ² 分布。这里的挑战在于确定方差-协方差矩阵 𝕍̂(β̂)。在他的文章中，Brant 提供了该方差-协方差矩阵的一个显式估计量，该估计量基于每个二元模型的最大似然估计量
    β̂ⱼ。
- en: In the following sections, we implement these approaches in Python, using the `statsmodels` package
    for the regressions and statistical tests.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 在接下来的章节中，我们将使用 Python 实现这些方法，使用 `statsmodels` 包进行回归和统计测试。
- en: 'Example: Application of the Two Proportional Odds Tests'
  id: totrans-86
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例：比例优势测试的应用
- en: The data for this example comes from the “Wine Quality” dataset, which contains
    information about red wine samples and their quality ratings. The dataset includes
    1,599 observations and 12 variables. The target variable, “quality,” is ordinal
    and originally ranges from 3 to 8\. To ensure enough observations in each group,
    we combine categories 3 and 4 into a single category (labeled 4), and categories
    7 and 8 into a single category (labeled 7), so the response variable has four
    levels. We then handle outliers in the explanatory variables using the Interquartile
    Range (IQR) method. Finally, we select three predictors—volatile acidity, free
    sulfur dioxide, and total sulfur dioxide—to use in our ordinal logistic regression
    model, and we standardize these variables to have a mean of 0 and a standard deviation
    of 1.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 本例中的数据来自“葡萄酒质量”数据集，该数据集包含有关红葡萄酒样本及其质量评分的信息。该数据集包括 1,599 个观测值和 12 个变量。目标变量“质量”是序数，最初的范围从
    3 到 8。为了确保每个组都有足够的观测值，我们将类别 3 和 4 合并为一个单独的类别（标记为 4），并将类别 7 和 8 合并为一个单独的类别（标记为
    7），因此响应变量有四个水平。然后，我们使用四分位数范围（IQR）方法处理解释变量的异常值。最后，我们选择三个预测变量——挥发性酸度、游离二氧化硫和总二氧化硫——用于我们的序数逻辑回归模型，并将这些变量标准化，使其均值为
    0，标准差为 1。
- en: Tables 1 and 2 below present the results of the three binary logistic regression
    models and the proportional odds model, respectively. Several discrepancies can
    be seen in these tables, particularly in the “volatile acidity” coefficients.
    For instance, the difference in the “volatile acidity” coefficient between the
    first and second binary models is -0.280, while the difference between the second
    and third models is 0.361\. These differences suggest that the proportional odds
    assumption may not hold [I also suggest to compute standard errors of difference
    for more confidence].
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的表1和表2分别展示了三个二元逻辑回归模型和成比例优势模型的结果。在这些表中，可以看到一些差异，尤其是在“挥发性酸度”系数上。例如，第一个和第二个二元模型之间“挥发性酸度”系数的差异为-0.280，而第二个和第三个模型之间的差异为0.361。这些差异表明，成比例优势假设可能不成立[我也建议计算差异的标准误差以获得更大的置信度]。
- en: '![](../Images/93512291d557e3d3433e93eed3064b48.png)'
  id: totrans-89
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/93512291d557e3d3433e93eed3064b48.png)'
- en: 'Table 1 : Fitted coefficients, separate binary logistic/fits.'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 表1：拟合系数，单独的二元逻辑回归/拟合。
- en: '![](../Images/25f59ccf543b91eab79955037521be40.png)'
  id: totrans-91
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/25f59ccf543b91eab79955037521be40.png)'
- en: 'Table 2: Fitted coefficients from the proportional odds model'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 表2：成比例优势模型的拟合系数
- en: To assess the overall significance of the proportional odds assumption, we perform
    the likelihood ratio test, which yields a test statistic of LR = 53.207 and a
    p-value of 1.066 × 10^(-9) when compared to the chi-square distribution with 6
    degrees of freedom. This result indicates that the proportional odds assumption
    is violated at the 5% significance level, suggesting that the model may not be
    appropriate for the data. We also use the separate fits approach to further investigate
    this assumption. The Wald test statistic is computed as X² = 41.880, with a p-value
    of 1.232 × 10^(-7), also based on the chi-square distribution with 6 degrees of
    freedom. This further confirms that the proportional odds assumption is violated
    at the 5% significance level.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 为了评估成比例优势假设的整体显著性，我们进行了似然比检验，与具有6个自由度的卡方分布相比，检验统计量为LR = 53.207，p值为1.066 × 10^(-9)。这一结果表明，在5%的显著性水平下，成比例优势假设被违反，表明该模型可能不适合数据。我们还使用单独拟合方法进一步调查这一假设。Wald检验统计量为X²
    = 41.880，p值为1.232 × 10^(-7)，同样基于具有6个自由度的卡方分布。这进一步证实了在5%的显著性水平下，成比例优势假设被违反。
- en: Conclusion
  id: totrans-94
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 结论
- en: 'This paper had two main goals: first, to illustrate how to test the **proportional
    odds assumption** in the context of **ordinal logistic regression**, and second,
    to encourage readers to explore Brant ([1990](https://jumbong.github.io/personal-website/00_tds/proportional_ordinal_regression.html#ref-brant1990assessing))’s
    article for a deeper understanding of the topic.'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 本文有两个主要目标：首先，说明如何在**有序逻辑回归**的背景下测试**成比例优势假设**；其次，鼓励读者探索Brant（[1990](https://jumbong.github.io/personal-website/00_tds/proportional_ordinal_regression.html#ref-brant1990assessing)）的文章，以更深入地了解这一主题。
- en: Brant’s work extends beyond assessing the proportional odds assumption—it also
    provides methods for evaluating the overall adequacy of the ordinal logistic regression
    model. For instance, he discusses how to test whether the latent variable Y∗ truly
    follows a logistic distribution or whether an alternative link function might
    be more appropriate.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: Brant的工作不仅限于评估成比例优势假设——他还提供了评估有序逻辑回归模型整体充分性的方法。例如，他讨论了如何测试潜在变量Y∗是否真正遵循逻辑分布，或者是否可能更合适的替代链接函数。
- en: In this article, we focused on a global assessment of the proportional odds
    assumption, without investigating which specific coefficients may be responsible
    for any violations. Brant also addresses this finer-grained analysis, which is
    why we **strongly encourage** you to read his article in full.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我们专注于对成比例优势假设的全球评估，而没有调查哪些具体的系数可能导致了任何违反。Brant也讨论了这种更细致的分析，这就是为什么我们**强烈建议**您全文阅读他的文章。
