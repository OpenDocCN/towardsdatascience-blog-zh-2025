- en: Let’s delve into the step-by-step development of this application. I will not
    discuss the entire code, but only its major part. The whole code in the GitHub
    repository is adequately commented.
  prefs: []
  type: TYPE_NORMAL
- en: '**Video Input and Processing**'
  prefs: []
  type: TYPE_NORMAL
- en: Video input and processing logic are implemented in `transcriber.py`. When the
    application loads, it verifies whether FFMPEG is present (`verify_ffmpeg`) in
    the application’s root directory. FFMPEG is required for downloading a video (if
    the input is a URL) and extracting audio from the video which is then used to
    create a transcript.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: The video input is in the form of a URL (for instance, YouTube URL) or a local
    file path. The `process_video` function determines the input type and routes it
    accordingly. If the input is a URL, the helper functions `get_video_info` and
    `get_video_id` extract video metadata (title, description, duration) without downloading
    it using `yt_dlp` package.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: After the video input is given, the code in `app.py` checks whether a transcript
    for the input video already exists (in the case of URL input). This is done by
    calling the following two helper functions from `transcriber.py`.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: If `transcript_exists` returns the path of an existing transcript, the next
    step is to create the vector store for the RAG. If no existing transcript is found,
    the next step is to download audio from the URL and convert it to a standard audio
    format. The function `process_video_download` downloads audio from the URL using
    the FFMPEG library and converts it to `.mp3` format. If the input is a local video
    file, `app.py` proceeds to convert it to `.mp3` file.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: '**Audio Transcription Using OpenAI’s `gpt-4o-transcribe` Model**'
  prefs: []
  type: TYPE_NORMAL
- en: After extracting audio and converting it to a standard audio format, the next
    step is to transcribe the audio to text format. For this purpose, I used OpenAI’s
    newly launched `gpt-4o-transcribe` speech-to-text model accessible through [speech-to-text API](https://platform.openai.com/docs/guides/speech-to-text).
     This model has outperformed OpenAI’s *Whisper* models in terms of both transcription
    accuracy and robust language coverage.
  prefs: []
  type: TYPE_NORMAL
- en: The function `process_video_transcribe` in `transcriber.py` receives the converted
    audio file and interfaces with `gpt-4o-transcribe` model with OpenAI’s speech-to-text
    API. The `gpt-4o-transcribe` model currently has an audio file limit of 25MB and
    1500 duration. To overcome this limitation, I split the longer files into multiple
    chunks and transcribe these chunks separately. The `process_video_transcribe`
    function checks whether the input file exceeds the size and/or duration limit.
    If either threshold is exceeded, it calls `split_and_transcribe` function, which
    first calculates the number of chunks needed based on both size and duration and
    takes the maximum of these two as the final number of chunks for transcription.
    It then finds the start and end times for each chunk and extracts these chunks
    from the audio file. Subsequently, it transcribes each chunk using `gpt-4o-transcribe`
    model with OpenAI’s speech-to-text API and then combines transcripts of all chunks
    to generate the final transcript.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: The following screenshot of the Streamlit app shows the video processing and
    transcribing workflow for one of my webinars, *“*[*Integrating LLMs into Business*](https://www.youtube.com/watch?v=BJC-mqdRXgw)*,”*
    available on my YouTube channel.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/5fbec7e5cfb1031929ddcec299fd7b49.png)'
  prefs: []
  type: TYPE_IMG
- en: Snapshot of the Streamlit app showing the process of extracting audio and transcribing
    (image by author)
  prefs: []
  type: TYPE_NORMAL
- en: '**Retrieval Augmented Generation (RAG) for Interactive Conversations**'
  prefs: []
  type: TYPE_NORMAL
- en: After generating the video transcript, the application develops a RAG to facilitate
    both text and speech-based interactions. The conversational intelligence is implemented
    through `VideoRAG` class in `rag_system.py` which initializes chunk size and overlap,
    OpenAI embeddings, `ChatOpenAI` instance to generate responses with `gpt-4o` model,
    and `ConversationBufferMemory` to maintain chat history for contextual continuity.
  prefs: []
  type: TYPE_NORMAL
- en: The `create_vector_store` method splits the documents into chunks and creates
    a vector store using the FAISS vector database. The `handle_question_submission`
    method processes text questions and appends each new question and its answer to
    the conversation history. The handle_speech_input function implements the complete
    voice-to-text-to-voice pipeline. It first records the question audio, transcribes
    the question, processes the query through the RAG system, and synthesizes speech
    for the response.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
