- en: How to Code Your Own Website with AI
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/how-to-code-your-own-website-with-ai/](https://towardsdatascience.com/how-to-code-your-own-website-with-ai/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '<mdspan datatext="el1764704432098" class="mdspan-comment">WordPress is a common</mdspan>
    hosting platform for your own website, where you can showcase your portfolio and
    other useful resources about yourself. Before making my switch, I had been using
    WordPress for about 1 year, and I started thinking about a few things that were
    difficult when using WordPress:'
  prefs: []
  type: TYPE_NORMAL
- en: Creating the website – It was hard to achieve the design I wanted
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Slow – Creating and updating in WordPress is slow because it’s a drag-and-drop
    editor
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Lack of flexibility – you have to use premade components. Alternatively, you
    can use custom HTML code, but you then still have to copy the code over, which
    is slow
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I then thought about how easy it is to program up my own website using an agentic
    coding tool like Claude Code or Cursor.
  prefs: []
  type: TYPE_NORMAL
- en: Why am I spending a lot of time drag and dropping components, and still not
    getting exactly the design I want, when I can simply prompt Claude Code to do
    exactly that in just 1 minute?
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: That’s when I decided to make the switch from hosted WordPress to managing my
    own website, deployed in Vercel (for free). The main point of this article is
    to show you how to do this and why you don’t really need any programming experience
    to do it.
  prefs: []
  type: TYPE_NORMAL
- en: '![Infographic: Make your own website ](../Images/3292f2e32092f8e78e01917b760a512a.png)'
  prefs: []
  type: TYPE_IMG
- en: This infographic highlights the main contents of this article. I highly recommend
    moving from a drag-and-drop editor for your website to a self-coded website made
    using coding agents. This makes it way easier and faster to both create and update
    your website. Image by Gemini.
  prefs: []
  type: TYPE_NORMAL
- en: You can find [my website, which I designed, in this article here.](https://eivindkjosbakken.com/)
  prefs: []
  type: TYPE_NORMAL
- en: Why code your own website
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The main reason you should start coding your own website, instead of using
    a drag-and-drop editor like WordPress or Webflow, is:'
  prefs: []
  type: TYPE_NORMAL
- en: It is super easy to do – You literally don’t have to touch any code
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It’s way faster to create and update your website
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The designs are much better, since the coding agents are good at making high-quality
    designs
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![Speaking Page](../Images/982da85fec0f50129ea1b1370d90af30.png)'
  prefs: []
  type: TYPE_IMG
- en: This image shows the Speaking page on my website. You can see the navbar at
    the top, and the specific contents of the page below. Image by the author.
  prefs: []
  type: TYPE_NORMAL
- en: Because it’s faster, you can also iterate on your website designs more quickly,
    which is super useful when you try to make the best website possible.
  prefs: []
  type: TYPE_NORMAL
- en: Quick iteration speed is the key to quick progress
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Of course, there are some arguments the other way around, for example, that
    WordPress has a lot of integrations that can be useful. However, for me, the pros
    far outweigh the cons.
  prefs: []
  type: TYPE_NORMAL
- en: 'Being able to update my website by simply inputting one prompt, such as:'
  prefs: []
  type: TYPE_NORMAL
- en: Make all the buttons on the website fade in on hover
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: This literally updates my entire website in around 1 minute (including Claude
    Code updating the code and deploying to Vercel). Doing this same action in WordPress
    would probably take me at least 30 minutes.
  prefs: []
  type: TYPE_NORMAL
- en: Now imagine you have to do this change several times a week. Whenever adding
    new content to your website, or when you realize you want to change something.
    Changing it directly in code with coding agents is simply far more efficient.
  prefs: []
  type: TYPE_NORMAL
- en: Claude to code your own website
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Creating the website
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Hopefully, you’re convinced why you should start coding your own website (or
    let Claude code it for you), instead of using a drag-and-drop editor. Now, let’s
    move into how you can do it.
  prefs: []
  type: TYPE_NORMAL
- en: The main secret here is that you don’t really have to do that much yourself,
    considering how good the coding agents are at creating websites. I created the
    website from my previous WordPress-hosted website.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 'I started off by prompting Claude Code with the following, where *eivindkjosbakken.com*
    was my WordPress site:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Claude’s code then created a near-exact replica of my previous website, which
    I could now run locally. I checked the designs and made sure everything was okay,
    which it was for the most part, except for a few things, which I’ll cover in the
    next section.
  prefs: []
  type: TYPE_NORMAL
- en: Hosting the website
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: I then moved to hosting the website. I use Vercel since it offers free deployments
    of your website, and it’s simple to use and can be fully managed from the terminal.
    Having it managed from the terminal is super nice, so Claude can take care of
    the deployments and other issues with Vercel.
  prefs: []
  type: TYPE_NORMAL
- en: However, when first deploying, I had to create a project on *vercel.com* and
    connect my codebase to that project. You can ask any LLM on how to do this, and
    they will give you an accurate step-by-step guide to connecting your code to Vercel.
    Vercel also offers you 100 free deploys per day, which should be more than enough.
  prefs: []
  type: TYPE_NORMAL
- en: After connecting to Vercel, everything was good to go, and I could access my
    website through the web.
  prefs: []
  type: TYPE_NORMAL
- en: Updating the website
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'After copying my WordPress website, I also discovered some updates I wanted
    to make to my website. I, for example, wanted:'
  prefs: []
  type: TYPE_NORMAL
- en: My articles are to be highlighted on hover, as you see in the image below
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I wanted a cleaner navbar, with some added pages
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[I wanted to host my eBook on the website](https://www.eivindkjosbakken.com/ebook)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![Article highlighting](../Images/96a0ae147564cf69a9ad7d45861f6eb8.png)'
  prefs: []
  type: TYPE_IMG
- en: This image highlights one of the design improvements I made to my website. Whenever
    you hover over an article on this page, you can see that the article card is highlighted.
    Image by the author.
  prefs: []
  type: TYPE_NORMAL
- en: These changes were quick to make, and I simply had to prompt Claude with a description
    of my change (i.e., *make the articles card highlighted on the over*), and it
    made the change in less than one minute. Making this change with a drag-and-drop
    editor would likely take a lot longer.
  prefs: []
  type: TYPE_NORMAL
- en: Now, only your imagination can stop you from updating your website, and you
    can, in reality, make any change and quickly iterate on designs by simply prompting
    your coding agent.
  prefs: []
  type: TYPE_NORMAL
- en: Challenges I had to resolve
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Claude mostly one-shot the recreation of my old WordPress website into code,
    just from the URL of my website. However, there were some issues I had to resolve,
    as you can see listed below:'
  prefs: []
  type: TYPE_NORMAL
- en: My WordPress had the option to send emails to me
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I had to copy over some images from the old website, for example, for my articles
    (manual processes)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Some issues with the social links – both finding the correct ones, and making
    sure they’re high quality
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: WordPress has a mailing list, and I had to manage that somehow myself now
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Moving over the domain from WordPress to NameCheap
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For the emails, I used [EmailJS](https://www.emailjs.com/) to have the option
    of sending emails from my website. This service is free and simple to set up after
    asking for a step-by-step guide from your coding agent.
  prefs: []
  type: TYPE_NORMAL
- en: For the image copying, I simply downloaded the images locally, put them into
    the code repository, and told Claude’s code where it could find the images. Claude
    then copied the images into a specific image folder, so they could be hosted on
    the website.
  prefs: []
  type: TYPE_NORMAL
- en: With the social links, I simply had to prompt Claude a few times, with a screenshot
    of what the social links looked like (at one point, they looked very grainy, for
    example), and Claude would solve the issue with three to four prompts and feedback.
  prefs: []
  type: TYPE_NORMAL
- en: For the mailing list, I decided to move to [MailerLite](https://mailerlite.com/),
    which offers embedded forms you can use on your website to have people subscribe
    with their email. You can simply give the embedded form to your coding agent,
    which will embed it into your website.
  prefs: []
  type: TYPE_NORMAL
- en: Moving domains was the most time-consuming task. I had purchased my previous
    domain in WordPress, which made the process a bit trickier. However, I made Gemini
    3 provide me a step-by-step tutorial, which worked well, and I transferred domains
    to NameCheap, where I have full control over the domain myself.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this article, I have discussed how you can move your website from a drag-and-drop
    editor like WordPress or Webflow to your own managed website. This process is
    relatively simple using Coding agents and Vercel, which then provides you with
    a lot more control over your own website. Additionally, it allows you to iterate
    more quickly on your website and makes it simple to update your website.
  prefs: []
  type: TYPE_NORMAL
- en: I believe we are moving away from drag-and-drop editors altogether, when we
    see how well today’s coding agents work, and with the fact that you don’t really
    need coding experience anymore, to perform simple programming like updating the
    design of a website.
  prefs: []
  type: TYPE_NORMAL
