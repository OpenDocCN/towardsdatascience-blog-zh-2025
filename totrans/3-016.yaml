- en: 'Make Your Data Move: Creating Animations in Python for Science and Machine
    Learning'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/make-your-data-move-creating-animations-in-python-for-science-and-machine-learning/](https://towardsdatascience.com/make-your-data-move-creating-animations-in-python-for-science-and-machine-learning/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1746561221147" class="mdspan-comment">As a data</mdspan>
    scientist and professor, I often need to explain the inner workings of learning
    algorithms and mathematical concepts, whether in technical presentations, classroom
    lectures, or written articles. In many cases, static plots can show the final
    outcome, but they often fall short when it comes to illustrating the underlying
    process.
  prefs: []
  type: TYPE_NORMAL
- en: In this context, animations can make a significant difference. By presenting
    a sequence of frames, each showing a plot that represents a step in the process,
    you can better capture your audience’s attention and more effectively explain
    complex concepts and workflows.
  prefs: []
  type: TYPE_NORMAL
- en: This tutorial will show you how to use Python and Matplotlib to bring scientific
    ideas to life through animation. Whether you’re a data scientist visualizing a
    machine learning algorithm, a physics teacher demonstrating harmonic motion, or
    a technical writer aiming to convey math intuitively, this guide is for you.
  prefs: []
  type: TYPE_NORMAL
- en: 'We’ll explore the following topics:'
  prefs: []
  type: TYPE_NORMAL
- en: Basic animation setup with Matplotlib
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Math example
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Physics Example
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Animating machine learning algorithms
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Exporting animations for web and presentations
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 1\. Basic animation setup with Matplotlib
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let’s introduce the `FuncAnimation` class from Matplotlib’s Animation package
    by animating the sine function. The following steps can be replicated virtually
    in every case.
  prefs: []
  type: TYPE_NORMAL
- en: '**Import required libraries**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: '`FuncAnimation` from `matplotlib.animation` is the class that allows you to
    create animations by repeatedly calling an update function.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Defining the plotted data (sine function)**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: '`y = np.sin(x)` computes the sine of each x-value. This is the initial sine
    wave that will be plotted.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Creating the initial plot**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: '`line, = ax.plot(x, y)` plots the initial sine wave and stores the line object
    in `line`.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Note**: The comma after `line` is important: it unpacks the single-element
    tuple returned by `plot`.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Defining the Update Function**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: '`np.sin(x + frame / 10)` shifts the sine wave horizontally, creating the effect
    of a moving wave.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Creating and displaying the animation**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: 'That ties everything together to create the animation:'
  prefs: []
  type: TYPE_NORMAL
- en: '`fig`: the figure to animate.'
  prefs: []
  type: TYPE_NORMAL
- en: '`update`: the function to call for each frame.'
  prefs: []
  type: TYPE_NORMAL
- en: '`frames=100`: the number of frames in the animation.'
  prefs: []
  type: TYPE_NORMAL
- en: '`interval=50`: delay between frames in milliseconds (50 ms = 20 frames per
    second).'
  prefs: []
  type: TYPE_NORMAL
- en: '`blit=True`: optimizes performance by only redrawing parts of the plot that
    change.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Result**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/f361475bd6b6b663bf4644301089af80.png)'
  prefs: []
  type: TYPE_IMG
- en: Sine function example (image by the author).
  prefs: []
  type: TYPE_NORMAL
- en: '2\. Animating Physics: Oblique Launch'
  prefs:
