  type: TYPE_NORMAL
- en: '**Defining motion parameters and the time vector**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: '**Computing the trajectory**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE6]'
