- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: '**Initialization Function**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In this example, we’ll use an initialization function to set everything to an
    empty state. It returns the plot elements to be updated during the animation.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: '**Update function and animation**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: The update function is called at each frame. The frame parameter indexes into
    the time array, so `x[frame]` and `y[frame]` give current coordinates.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: '`frames=len(t)`: total number of animation steps.'
  prefs: []
  type: TYPE_NORMAL
- en: '`interval=30`: time (in milliseconds) between frames (~33 fps).'
  prefs: []
  type: TYPE_NORMAL
- en: '`blit=True`: improves performance by only redrawing parts of the frame that
    changed.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Result**'
