- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this article, we saw how the animation class from matplotlib can be handy
    for demonstrating the inner workings of algorithms, mathematical, and physical
    processes. The examples explored in this article can be expanded to create impactful
    visuals for blog posts, lectures, and reports.
  prefs: []
  type: TYPE_NORMAL
- en: In order to make the present article even more profitable, I suggest using the
    examples shown to create your own animations and simulate processes related to
    your field.
  prefs: []
  type: TYPE_NORMAL
- en: Check out my GitHub repository, which has complete code examples and animations
    available [here](https://github.com/Marcussena/Data_Animation).
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
