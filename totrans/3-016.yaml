- en: 'Make Your Data Move: Creating Animations in Python for Science and Machine
    Learning'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/make-your-data-move-creating-animations-in-python-for-science-and-machine-learning/](https://towardsdatascience.com/make-your-data-move-creating-animations-in-python-for-science-and-machine-learning/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1746561221147" class="mdspan-comment">As a data</mdspan>
    scientist and professor, I often need to explain the inner workings of learning
    algorithms and mathematical concepts, whether in technical presentations, classroom
    lectures, or written articles. In many cases, static plots can show the final
    outcome, but they often fall short when it comes to illustrating the underlying
    process.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: In this context, animations can make a significant difference. By presenting
    a sequence of frames, each showing a plot that represents a step in the process,
    you can better capture your audience’s attention and more effectively explain
    complex concepts and workflows.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: This tutorial will show you how to use Python and Matplotlib to bring scientific
    ideas to life through animation. Whether you’re a data scientist visualizing a
    machine learning algorithm, a physics teacher demonstrating harmonic motion, or
    a technical writer aiming to convey math intuitively, this guide is for you.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: 'We’ll explore the following topics:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: Basic animation setup with Matplotlib
  id: totrans-6
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Math example
  id: totrans-7
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Physics Example
  id: totrans-8
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Animating machine learning algorithms
  id: totrans-9
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Exporting animations for web and presentations
  id: totrans-10
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 1\. Basic animation setup with Matplotlib
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let’s introduce the `FuncAnimation` class from Matplotlib’s Animation package
    by animating the sine function. The following steps can be replicated virtually
    in every case.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
- en: '**Import required libraries**'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE0]'
  id: totrans-14
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '`FuncAnimation` from `matplotlib.animation` is the class that allows you to
    create animations by repeatedly calling an update function.'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: '**Defining the plotted data (sine function)**'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE1]'
  id: totrans-17
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '`y = np.sin(x)` computes the sine of each x-value. This is the initial sine
    wave that will be plotted.'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: '**Creating the initial plot**'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE2]'
  id: totrans-20
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '`line, = ax.plot(x, y)` plots the initial sine wave and stores the line object
    in `line`.'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: '**Note**: The comma after `line` is important: it unpacks the single-element
    tuple returned by `plot`.'
  id: totrans-22
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Defining the Update Function**'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE3]'
  id: totrans-24
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '`np.sin(x + frame / 10)` shifts the sine wave horizontally, creating the effect
    of a moving wave.'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
- en: '**Creating and displaying the animation**'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE4]'
  id: totrans-27
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'That ties everything together to create the animation:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
- en: '`fig`: the figure to animate.'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
- en: '`update`: the function to call for each frame.'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
- en: '`frames=100`: the number of frames in the animation.'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
- en: '`interval=50`: delay between frames in milliseconds (50 ms = 20 frames per
    second).'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
- en: '`blit=True`: optimizes performance by only redrawing parts of the plot that
    change.'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: '**Result**'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/f361475bd6b6b663bf4644301089af80.png)'
  id: totrans-35
  prefs: []
  type: TYPE_IMG
- en: Sine function example (image by the author).
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
- en: '2\. Animating Physics: Oblique Launch'
  id: totrans-37
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'We’ll show how to animate a classic example in physics classes: the Oblique
    Launch. We’ll follow similar steps to the basic example shown before.'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将展示如何动画化物理课中的经典示例：斜抛。我们将遵循之前展示的基本示例的类似步骤。
- en: '**Defining motion parameters and the time vector**'
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**定义运动参数和时间向量**'
- en: '[PRE5]'
  id: totrans-40
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: '**Computing the trajectory**'
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**计算轨迹**'
- en: '[PRE6]'
  id: totrans-42
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: '**Setting up the plot**'
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**设置绘图**'
- en: '[PRE7]'
  id: totrans-44
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: '**Initialization Function**'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**初始化函数**'
- en: In this example, we’ll use an initialization function to set everything to an
    empty state. It returns the plot elements to be updated during the animation.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 在此示例中，我们将使用初始化函数将一切设置为零状态。它返回动画期间要更新的绘图元素。
- en: '[PRE8]'
  id: totrans-47
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: '**Update function and animation**'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**更新函数和动画**'
- en: '[PRE9]'
  id: totrans-49
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: The update function is called at each frame. The frame parameter indexes into
    the time array, so `x[frame]` and `y[frame]` give current coordinates.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 更新函数在每一帧被调用。帧参数索引到时间数组中，因此`x[frame]`和`y[frame]`给出当前坐标。
- en: '[PRE10]'
  id: totrans-51
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: '`frames=len(t)`: total number of animation steps.'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: '`frames=len(t)`：动画步骤的总数。'
- en: '`interval=30`: time (in milliseconds) between frames (~33 fps).'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: '`interval=30`：帧之间的时间（以毫秒为单位）（约33 fps）。'
- en: '`blit=True`: improves performance by only redrawing parts of the frame that
    changed.'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: '`blit=True`：通过仅重绘帧中更改的部分来提高性能。'
- en: '**Result**'
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**结果**'
- en: '![](../Images/29452c745b43f74516db317714855d04.png)'
  id: totrans-56
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/29452c745b43f74516db317714855d04.png)'
- en: Oblique Launch (Image by the author).
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 斜抛（图像由作者提供）。
- en: '3\. Animating Math: Fourier Series'
  id: totrans-58
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3. 动画数学：傅里叶级数
- en: In the following example, we’ll show how to build a square wave from sine functions
    using the Fourier Transform.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 在以下示例中，我们将展示如何使用傅里叶变换从正弦函数构建方波。
- en: '**Creating x values and a plot figure**'
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**创建x值和绘图图形**'
- en: '[PRE11]'
  id: totrans-61
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: '`x`: An array of 1000 evenly spaced points from −π to π, which is the typical
    domain for periodic Fourier series.'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: '`x`：一个从-π到π的1000个等间距点的数组，这是周期性傅里叶级数的典型域。'
- en: '`y`: Initializes a y-array of zeros, same shape as `x`.'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: '`y`：初始化一个与`x`形状相同的零数组。'
- en: '**Defining the Fourier Series function**'
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**定义傅里叶级数函数**'
- en: 'The formula used for the Fourier Series is given by:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 用于傅里叶级数的公式如下：
- en: '![](../Images/112fa4e70b6f18bd993f1b225bbd93ed.png)'
  id: totrans-66
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/112fa4e70b6f18bd993f1b225bbd93ed.png)'
- en: Formula for the approximation of a square wave using the first n terms of a
    Fourier Series (image by the author using [codecogs](https://editor.codecogs.com/)).
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 使用傅里叶级数的前n项近似正弦波的公式（作者使用[codecogs](https://editor.codecogs.com/)提供）。
- en: '[PRE12]'
  id: totrans-68
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: '**Setting the Update Function**'
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**设置更新函数**'
- en: '[PRE13]'
  id: totrans-70
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: 'This function updates the plot at each frame of the animation:'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 此函数在动画的每一帧更新绘图：
- en: It computes a new approximation with `frame + 1` terms.
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它使用`frame + 1`项计算新的近似值。
- en: Updates the y-values of the line.
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更新线的y值。
- en: Updates the label to show how many terms are used (e.g., “3 terms”, “5 terms”,
    etc.).
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更新标签以显示使用了多少项（例如，“3项”，“5项”等）。
- en: Returns the updated plot elements to be redrawn.
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 返回要重绘的更新后的绘图元素。
- en: '**Creating the visualization**'
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**创建可视化**'
- en: '[PRE14]'
  id: totrans-77
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: '![](../Images/9c97ed0fddc5cd93f1d519f5299d81b7.png)'
  id: totrans-78
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/9c97ed0fddc5cd93f1d519f5299d81b7.png)'
- en: '4\. Machine Learning in Action: Gradient Descent'
  id: totrans-79
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4. 机器学习实战：梯度下降
- en: Now, we’ll show how the classical machine learning algorithm finds a minimum
    on a three-dimensional parabolic function.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们将展示经典机器学习算法如何在三维抛物函数上找到最小值。
- en: '[PRE15]'
  id: totrans-81
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: '**Result**'
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**结果**'
- en: '![](../Images/5ec95a1f725dd1377d3f8c26215c80ce.png)'
  id: totrans-83
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/5ec95a1f725dd1377d3f8c26215c80ce.png)'
- en: Gradient Descent in practice (image by the author).
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 梯度下降的实际应用（图像由作者提供）。
- en: 5\. Exporting animations for web and presentations
  id: totrans-85
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 5. 导出动画用于网页和演示
- en: Finally, to export the animated plots to a file, you can use the `animation.save()`
    function.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，要将动画图导出为文件，您可以使用`animation.save()`函数。
- en: '**Example**'
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**示例**'
- en: '[PRE16]'
  id: totrans-88
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: In the example above, the function takes the `FuncAnimation` object, renders
    it frame by frame using the Pillow library, and exports the result as a `.gif`
    file called `launch.gif` at 30 frames per second.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 在上面的示例中，该函数接受`FuncAnimation`对象，使用Pillow库逐帧渲染，并以每秒30帧的速度将结果导出为名为`launch.gif`的`.gif`文件。
- en: Conclusion
  id: totrans-90
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this article, we saw how the animation class from matplotlib can be handy
    for demonstrating the inner workings of algorithms, mathematical, and physical
    processes. The examples explored in this article can be expanded to create impactful
    visuals for blog posts, lectures, and reports.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我们看到了如何使用matplotlib的动画类来演示算法、数学和物理过程的内部工作原理。本文中探讨的示例可以扩展，以创建博客文章、讲座和报告的引人注目的视觉效果。
- en: In order to make the present article even more profitable, I suggest using the
    examples shown to create your own animations and simulate processes related to
    your field.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使本文更加有益，我建议使用展示的示例来创建您自己的动画，并模拟您领域相关的过程。
- en: Check out my GitHub repository, which has complete code examples and animations
    available [here](https://github.com/Marcussena/Data_Animation).
  id: totrans-93
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 查看我的 GitHub 仓库，其中包含完整的代码示例和动画，[在此处](https://github.com/Marcussena/Data_Animation)可获取。
