- en: '3\. Animating Math: Fourier Series'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In the following example, we’ll show how to build a square wave from sine functions
    using the Fourier Transform.
  prefs: []
  type: TYPE_NORMAL
- en: '**Creating x values and a plot figure**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: '`x`: An array of 1000 evenly spaced points from −π to π, which is the typical
    domain for periodic Fourier series.'
  prefs: []
  type: TYPE_NORMAL
- en: '`y`: Initializes a y-array of zeros, same shape as `x`.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Defining the Fourier Series function**'
