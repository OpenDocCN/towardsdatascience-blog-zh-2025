- en: 'Myths vs. Data: Does an Apple a Day Keep the Doctor Away?'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/myths-vs-data-does-an-apple-a-day-keep-the-doctor-away/](https://towardsdatascience.com/myths-vs-data-does-an-apple-a-day-keep-the-doctor-away/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Introduction
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '*“Money can’t buy happiness.”* *“You can’t judge a book by its cover.”* *“An
    apple a day keeps the doctor away.”*'
  prefs: []
  type: TYPE_NORMAL
- en: You’ve probably heard these sayings several times, but do they actually hold
    up when we look at the data? In this article series, I want to take popular myths/sayings
    and put them to the test using real-world data.
  prefs: []
  type: TYPE_NORMAL
- en: We might confirm some unexpected truths, or debunk some popular beliefs. Hopefully,
    in either case we will gain new insights into the world around us.
  prefs: []
  type: TYPE_NORMAL
- en: The hypothesis
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: '“An apple a day keeps the doctor away”: is there any real evidence to support
    this?'
  prefs: []
  type: TYPE_NORMAL
- en: If the myth is true, we should expect a **negative correlation between apple
    consumption per capita and doctor visits per capita** . So, the more apples a
    country consumes, the fewer doctor visits people should need.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s look into the data and see what the numbers really say.
  prefs: []
  type: TYPE_NORMAL
- en: Testing the relationship between apple consumption and doctor visits
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Let’s start with a simple correlation check between apple consumption per capita
    and doctor visits per capita.
  prefs: []
  type: TYPE_NORMAL
- en: Data sources
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'The data comes from:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Apple consumption per capita**: [Our World in Data](https://ourworldindata.org/grapher/fruit-consumption-by-fruit-type)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Doctor visits per capita**: [OECD](https://data-explorer.oecd.org/vis?lc=en&pg=0&tm=Doctors%27%20consultations&snb=51&vw=ov&df%5Bds%5D=dsDisseminateFinalDMZ&df%5Bid%5D=DSD_HEALTH_PROC%40DF_CONSULT&df%5Bag%5D=OECD.ELS.HD)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Since data availability varies by year, 2017 was selected as it provided the
    most complete in terms of number of countries. However, the results are consistent
    across other years.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c8035d619c2204ffa94ee8f8d6f7b75e.png)'
  prefs: []
  type: TYPE_IMG
- en: The United States had the highest apple consumption per capita, exceeding 55
    kg per year, while Lithuania had the lowest, consuming just under 1 kg per year.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/4a795659c0fa838176e3b48bcc37308b.png)'
  prefs: []
  type: TYPE_IMG
- en: South Korea had the highest number of doctor visits per capita, at more than
    18 visits per year, while Colombia had the lowest, with just above 2 visits per year.
  prefs: []
  type: TYPE_NORMAL
- en: Visualizing the relationship
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: To visualize whether higher apple consumption is associated with fewer doctor
    visits, we start by looking at a **scatter plot with a regression line**.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/0b541e161637d84f8f5412fb04f8c331.png)'
  prefs: []
  type: TYPE_IMG
- en: The regression plot shows a **very slim negative correlation**, meaning that
    in countries where people eat more apples, there is a barely noticeable tendency
    to have lower doctor visits.
  prefs: []
  type: TYPE_NORMAL
- en: Unfortunately, the trend is so weak that it cannot be considered **meaningful**.
  prefs: []
  type: TYPE_NORMAL
- en: OLS regression
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: To test this relationship statistically, we run a **linear regression (OLS)**,
    where doctor visits per capita is the dependent variable and apple consumption
    per capita is the independent variable.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/2874123f9f1ca21479c436a470b756dc.png)'
  prefs: []
  type: TYPE_IMG
- en: 'The results confirm what the scatterplot suggested:'
  prefs: []
  type: TYPE_NORMAL
- en: The **coefficient for apple consumption** is **-0.0107**, meaning that even
    if there is an effect, it is **very small**.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The **p-value is 0.860 (86%)**, far more than the standard significance threshold
    of **5%**.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The **R² value is almost zero**, meaning apple consumption explains **virtually
    none** of the variation in doctor visits.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This doesn’t strictly mean that there is no relationship, but rather that we
    **cannot prove** one with the available data. It’s possible that any real effect
    is too small to detect, that other factors we didn’t include play a larger role,
    or that the data simply doesn’t reflect the relationship well.
  prefs: []
  type: TYPE_NORMAL
- en: Controlling for confounders
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Are we done? Not quite. So far, we’ve only checked for a direct relationship
    between apple consumption and doctor visits.
  prefs: []
  type: TYPE_NORMAL
- en: As already mentioned, many other factors could be influencing both variables,
    potentially hiding a true relationship or creating an artificial one.
  prefs: []
  type: TYPE_NORMAL
- en: 'If we consider this causal graph:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/1cd36677c0aa3fe4a5d2ea830b002fc7.png)'
  prefs: []
  type: TYPE_IMG
- en: We are assuming that apple consumption directly affects doctor visits. However,
    other hidden factors might be at play. If we don’t account for them, we risk **failing
    to detect a real relationship** if one exists.
  prefs: []
  type: TYPE_NORMAL
- en: A well-known example where confounder variables are on display comes from a
    study by Messerli (2012), which found an interesting correlation between chocolate
    consumption per capita and the number of Nobel laureates.
  prefs: []
  type: TYPE_NORMAL
- en: So, would starting to eat a lot of chocolate help us win a Nobel Prize? Probably
    not. The likely explanation was that GDP per capita was a confounder. That means
    that richer countries tend to have both higher chocolate consumption and more
    Nobel Prize winners. The observed relationship wasn’t causal but rather due to
    a hidden (confounding) factor.
  prefs: []
  type: TYPE_NORMAL
- en: The same thing could be happening in our case. There might be confounding variables
    that influence both apple consumption and doctor visits, making it difficult to
    see a real relationship if one exists.
  prefs: []
  type: TYPE_NORMAL
- en: Two key confounders to consider are **GDP per capita** and **median age.** Wealthier
    countries have better healthcare systems and different dietary patterns, and older
    populations tend to visit doctors more often and may have different eating habits.
  prefs: []
  type: TYPE_NORMAL
- en: 'To control for this, we change our model by introducing these confounders:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/bab3d041ab51f07f236e1c09898d3264.png)'
  prefs: []
  type: TYPE_IMG
- en: Data sources
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'The data comes from:'
  prefs: []
  type: TYPE_NORMAL
- en: '**GDP**: [Our World in Data](https://ourworldindata.org/grapher/gdp-per-capita-worldbank)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Median age**: [Our World in Data](https://ourworldindata.org/grapher/median-age)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/b3439086ffa064254ae1f70c64a513f9.png)'
  prefs: []
  type: TYPE_IMG
- en: Luxembourg had the highest GDP per capita, exceeding 115K USD, while Colombia
    had the lowest, at 14.3K USD.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/98e4181172c9570f086204a6a926f7bc.png)'
  prefs: []
  type: TYPE_IMG
- en: Japan had the highest median age, at over 46 years, while Mexico had the lowest,
    at under 27 years.
  prefs: []
  type: TYPE_NORMAL
- en: OLS regression (with confounders)
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: After controlling for GDP per capita and median age, we run a multiple regression
    to test whether apple consumption has any meaningful effect on doctor visits.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f903e17ea88742b665594b9bb963c313.png)'
  prefs: []
  type: TYPE_IMG
- en: 'The results confirm what we observed earlier:'
  prefs: []
  type: TYPE_NORMAL
- en: The **coefficient for apple consumption** remains **very small(-0.0100)**, meaning
    any potential effect is negligible.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The **p-value (85.5%)** is still extremely high, far from statistical significance.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We **still cannot reject the null hypothesis**, meaning we have no strong evidence
    to support the idea that eating more apples leads to fewer doctor visits.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Same as before, this does not necessarily mean that **no relationship exists**,
    but rather that **we cannot prove one** using the available data. It could still
    be possible that the real effect is too small to detect or that there are yet
    other factors we didn’t include.
  prefs: []
  type: TYPE_NORMAL
- en: One interesting observation, however, is that GDP per capita also shows **no
    significant relationship** with doctor visits, as its p-value is 0.668 (66.8%),
    indicating that we couldn’t find in the data that wealth explains variations in
    healthcare usage.
  prefs: []
  type: TYPE_NORMAL
- en: On the other hand, **median age appears to be strongly associated with doctor
    visits**, with a p-value of 0.001 (0.1%) and a positive coefficient (0.4952).
    This suggests that **older populations tend to visit doctors more frequently**,
    which is actually not really surprising if we think about it!
  prefs: []
  type: TYPE_NORMAL
- en: So while we find no support for the apple myth, the data does reveal an interesting
    relationship between aging and healthcare usage.
  prefs: []
  type: TYPE_NORMAL
- en: Median age → Doctor visits
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The results from the OLS regression showed a strong relationship between median
    age and doctor visits, and the visualization below confirms this trend.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c8960020f10ac71214154aa04850c8e1.png)'
  prefs: []
  type: TYPE_IMG
- en: There is a clear upward trend, indicating that **countries with older populations
    tend to have more doctor visits per capita**.
  prefs: []
  type: TYPE_NORMAL
- en: Since we are only looking at median age and doctor visits here, one could argue
    that GDP per capita might be a confounder, influencing both. However, the previous
    OLS regression demonstrated that even when GDP was included in the model, this
    relationship remained strong and statistically significant.
  prefs: []
  type: TYPE_NORMAL
- en: This suggests that **median age is a key factor in explaining differences in
    doctor visits across countries**, independent of GDP.
  prefs: []
  type: TYPE_NORMAL
- en: '**GDP** → **Apple consumption**'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: While not directly related to doctor visits, an interesting secondary finding
    emerges when looking at the relationship between **GDP per capita and apple consumption**.
  prefs: []
  type: TYPE_NORMAL
- en: One possible explanation is that wealthier countries have better access to fresh
    products. Another possibility is that climate and geography play a role, so it
    could be that many high-GDP countries are located in regions with strong apple
    production, making apples more available and affordable.
  prefs: []
  type: TYPE_NORMAL
- en: Of course, other factors could be influencing this relationship, but we won’t
    dig deeper here.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/05b72edb61060e7cc6441c2b6639feeb.png)'
  prefs: []
  type: TYPE_IMG
- en: The scatterplot shows a **positive correlation:** as **GDP per capita increases,
    apple consumption also tends to rise**. However, compared to median age and doctor
    visits, this trend is **weaker**, with more variation in the data.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/eada58d999e97dbcfe86b48ee953f505.png)'
  prefs: []
  type: TYPE_IMG
- en: 'The OLS confirms the relationship: with a 0.2257 coefficient for GDP per capita,
    we can estimate an increase of around 0.23 kg in apple consumption per capita
    for each increase of $1,000 in GDP per capita.'
  prefs: []
  type: TYPE_NORMAL
- en: The 3.8% p-value allows us to reject the null hypothesis. So the relationship
    is statistically significant. However, the R² value (0.145) is relatively low,
    so while GDP explains some variation in apple consumption, many other factors
    likely contribute.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The saying goes:'
  prefs: []
  type: TYPE_NORMAL
- en: '*“An apple a day keeps the doctor away,”*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'But after putting this myth to the test with real-world data, the results seem
    not in line with this saying. Across multiple years, the results were consistent:
    **no meaningful relationship between apple consumption and doctor visits emerged,
    even after controlling for confounders**. It seems that apples alone aren’t enough
    to keep the doctor away.'
  prefs: []
  type: TYPE_NORMAL
- en: However, this doesn’t completely disprove the idea that eating more apples could
    reduce doctor visits. Observational data, no matter how well we control for confounders,
    can never fully prove or disprove causality.
  prefs: []
  type: TYPE_NORMAL
- en: To get a more statistically accurate answer, and to rule out all possible confounders
    at a level of granularity that could be actionable for an individual, we would
    need to conduct an **A/B test**.
  prefs: []
  type: TYPE_NORMAL
- en: In such an experiment, participants would be randomly assigned to two groups,
    for example one eating a fixed amount of apples daily and the other avoiding apples.
    By comparing doctor visits over time among these two groups, we could determine
    if any difference between them arise, providing stronger evidence of a causal
    effect.
  prefs: []
  type: TYPE_NORMAL
- en: For obvious reasons, I chose not to go that route. Hiring a bunch of participants
    would be expensive, and ethically forcing people to avoid apples for science is
    definitely questionable.
  prefs: []
  type: TYPE_NORMAL
- en: 'However, we did find some interesting patterns. The strongest predictor of
    doctor visits wasn’t apple consumption, but median age: **the older a country’s
    population, the more often people see a doctor**.'
  prefs: []
  type: TYPE_NORMAL
- en: Meanwhile, **GDP showed a mild connection to apple consumption**, possibly because
    wealthier countries have better access to fresh produce, or because apple-growing
    regions tend to be more developed.
  prefs: []
  type: TYPE_NORMAL
- en: 'So, while we can’t confirm the original myth, we can offer a less poetic, but
    **data-backed** version:'
  prefs: []
  type: TYPE_NORMAL
- en: “A young age keeps the doctor away.”
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: If you enjoyed this analysis and want to connect, you can find me on [LinkedIn](https://www.linkedin.com/in/matteo-casolari/).
  prefs: []
  type: TYPE_NORMAL
- en: The full analysis is available in this [notebook on GitHub](https://github.com/matteocasolari/myths-vs-data/blob/main/01_an_apple_a_day/notebooks/01_an_apple_a_day.ipynb).
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
