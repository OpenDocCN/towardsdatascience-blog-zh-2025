  zh: 源代码：[https://github.com/yangeorget/nucs](https://github.com/yangeorget/nucs)
- en: 'the documentation: [https://nucs.readthedocs.io/en/latest/index.html](https://nucs.readthedocs.io/en/latest/index.html)'
