- en: Making Sense of KPI Changes
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/making-sense-of-kpi-changes/](https://towardsdatascience.com/making-sense-of-kpi-changes/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '<mdspan datatext="el1746494659669" class="mdspan-comment">As analysts</mdspan>,
    we are usually monitoring metrics. Quite often, metrics change. And when they
    do, it’s our job to figure out what’s going on: why did the conversion rate suddenly
    drop, or what is driving consistent revenue growth?'
  prefs: []
  type: TYPE_NORMAL
- en: I started my journey in data analytics as a KPI analyst. For almost three years,
    I’d been doing root cause analysis and KPI deep dives nearly full-time. Even after
    moving to product analytics, I’m still regularly investigating the KPI shifts.
    You could say I’ve become quite the experienced analytics detective.
  prefs: []
  type: TYPE_NORMAL
- en: The cornerstone of root cause analysis is usually slicing and dicing the data.
    Most often, figuring out what segments are driving the change will give you a
    clue to the root causes. So, in this article, I would like to share a framework
    for estimating how different segments contribute to changes in your key metric.
    We will put together a set of functions to slice and dice our data and identify
    the main drivers behind the metric’s changes.
  prefs: []
  type: TYPE_NORMAL
- en: 'However, in real life, before jumping into data crunching, it’s important to
    understand the context:'
  prefs: []
  type: TYPE_NORMAL
- en: Is the data complete, and can we compare recent periods to previous ones?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Are there any long-term trends and known seasonal effects we’ve seen in the
    past?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Have we launched anything recently, or are we aware of any external events affecting
    our metrics, such as a competitor’s marketing campaign or currency fluctuations?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*I’ve discussed such nuances in more detail in my previous article, [“Root
    Cause Analysis 101”](https://towardsdatascience.com/anomaly-root-cause-analysis-101-98f63dd12016/).*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: KPI change framework
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'We encounter different metrics, and analysing their changes requires different
    approaches. Let’s start by defining the two types of metrics we will be working
    with:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Simple metrics** represent a single measure, for example, total revenue or
    the number of active users. Despite their simplicity, they are often used in product
    analytics. One of the common examples is the North Star metrics. Good North Star
    metric estimates the total value received by customers. For example, AirBnB might
    use nights booked, and WhatsApp might track messages sent. Both are simple metrics.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*You can learn more about North Star Metrics from [the Amplitude Playbook.](https://amplitude.com/books/north-star)*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: However, we can’t avoid using **compound or ratio metrics**, like conversion
    rate or average revenue per user (ARPU). Such metrics help us track our product
    performance more precisely and isolate the impact of specific changes. For example,
    imagine your team is working on improving the registration page. They can potentially
    track the number of registered customers as their primary KPI, but it might be
    highly affected by external factors (i.e., a marketing campaign driving more traffic).
    A better metric for this case would be a conversion rate from landing on a registration
    page to completing it.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'We will use a fictional example to learn how to approach root cause analysis
    for different types of metrics. Imagine we are working on an e-commerce product,
    and our team is focused on two main KPIs:'
  prefs: []
  type: TYPE_NORMAL
- en: '**total revenue** (*a simple metric*),'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**conversion to purchase** — the ratio of users who made a purchase to the
    total number of users (*a ratio metric*).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We will use synthetic datasets to look at possible scenarios of metrics’ changes.
    Now it’s time to move on and see what’s going on with the revenue.
  prefs: []
  type: TYPE_NORMAL
- en: 'Analysis: simple metrics'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Let’s start simple and dig into the revenue changes. As usual, the first step
    is to load a dataset. Our data has two dimensions: country and maturity (whether
    a customer is new or existing). Additionally, we have three different scenarios
    to test our framework under various conditions.'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/fda6a56c3e334abaa91815e7cf077061.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: The main goal of our analysis is to determine how each segment contributes to
    the change in our top-line metric. Let’s break it down. We will write a bunch
    of formulas. But don’t worry, it won’t require any knowledge beyond basic arithmetic.
  prefs: []
  type: TYPE_NORMAL
- en: First of all, it’s helpful to see how the metric changed in each segment, both
    in absolute and relative numbers.
  prefs: []
  type: TYPE_NORMAL
- en: \[\textbf{difference}^{\textsf{i}} = \textbf{metric}_{\textsf{before}}^\textsf{i}
    – \textbf{metric}_{\textsf{after}}^\textsf{i}\\
  prefs: []
  type: TYPE_NORMAL
- en: \textbf{difference_rate}^{\textsf{i}} = \frac{\textbf{difference}^{\textsf{i}}}{\textbf{metric}_{\textsf{before}}^\textsf{i}}\]
  prefs: []
  type: TYPE_NORMAL
- en: The next step is to look at it holistically and see how each segment contributed
    to the overall change in the metric. We will calculate the impact as the share
    of the total difference.
  prefs: []
  type: TYPE_NORMAL
- en: \[\textbf{impact}^{\textsf{i}} = \frac{\textbf{difference}^{\textsf{i}}}{\sum_{\textsf{i}}{\textbf{difference}^{\textsf{i}}}}\]
  prefs: []
  type: TYPE_NORMAL
- en: That already gives us some valuable insights. However, to understand whether
    any segment is behaving unusually and requires special attention, it’s useful
    to compare the segment’s contribution to the metric change with its initial share
    of the metric.
  prefs: []
  type: TYPE_NORMAL
- en: Here’s the reasoning. If the segment makes up 90% of our metric, then it’s expected
    for it to contribute 85–95% of the change. But if a segment that accounts for
    only 10% ends up contributing 90% of the change, that’s definitely an anomaly.
  prefs: []
  type: TYPE_NORMAL
- en: To calculate it, we will simply normalise each segment’s contribution to the
    metric by the initial segment size.
  prefs: []
  type: TYPE_NORMAL
- en: \[\textbf{segment_share}_{\textsf{before}}^\textsf{i} = \frac{\textbf{metric}_{\textsf{before}}^\textsf{i}}{\sum_{\textsf{i}}{\textbf{metric}_{\textsf{before}}^\textsf{i}}}\\
  prefs: []
  type: TYPE_NORMAL
- en: \textbf{impact_normalised}^\textsf{i} = \frac{\textbf{impact}^{\textsf{i}}}{\textbf{segment_share}_{\textsf{before}}^\textsf{i}}\]
  prefs: []
  type: TYPE_NORMAL
- en: That’s it for the formulas. Now, let’s write the code and see this approach
    in practice. It will be easier to understand how it works through practical examples.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 'I believe that visualisations are a crucial part of any data storytelling as
    visualisations help viewers grasp insights more quickly and intuitively. That’s
    why I’ve included a couple of charts in our function:'
  prefs: []
  type: TYPE_NORMAL
- en: '**A parallel coordinates chart** to show how the metric changed in each slice — this
    visualisation will help us see the most significant drivers in absolute terms.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**A scatter plot** to compare each segment’s impact on the KPI with the segment’s
    initial size. This chart helps spot anomalies — segments whose impact on the KPI
    is disproportionately large or small.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*You can find the complete code for the visualisations on [GitHub](https://github.com/miptgirl/miptgirl_medium/blob/main/growth_narrative_llm_agent/growth_narrative_utils.py).*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Now that we have all the tools in place to analyse revenue data, let’s see how
    our framework performs in different scenarios.
  prefs: []
  type: TYPE_NORMAL
- en: 'Scenario 1: Revenue dropped equally across all segments'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Let’s start with the first scenario. The analysis is very straightforward — we
    just need to call the function defined above.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: In the output, we will get a table with detailed stats.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c385adf175a804a4b53b430d334ba72d.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: However, in my opinion, visualisations are more informative. It’s obvious that
    revenue dropped by 30–40% in all countries, and there are no anomalies.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/83ff0e649c2d09510397d623045f2f70.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 'Scenario 2: One or more segments drove the change'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Let’s check out another scenario by calling the same function.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/beb983e0288bddc4c9b2a36282c76a91.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: We can see the biggest drop in both absolute and relative numbers in France.
    It’s definitely an anomaly since it accounts for 99.9% of the total metric change.
    We can easily spot this in our visualisations.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/3f31a90b77d90b5860941fc726a1f445.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: Also, it’s worth going back to the first example. We looked at the metric split
    by country and found no specific segments driving changes. But digging a little
    bit deeper might help us understand what’s going on. Let’s try adding another
    layer and look at country and maturity.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: Now, we can see that the change is mostly driven by new users across the countries.
    These charts clearly highlight issues with the new customer experience and give
    you a clear direction for further investigation.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/7f77611f05ecab03b37f292646233c34.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 'Scenario 3: Volume shifting between segments'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Finally, let’s explore the last scenario for revenue.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/544b37a62b5dc6455eca0dae12e14d9b.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: We can clearly see that France is the biggest anomaly — revenue in France has
    dropped, and this change is correlated with the top-line revenue drop. However,
    there is another outstanding segment — Spain. In Spain, revenue has increased
    significantly.
  prefs: []
  type: TYPE_NORMAL
- en: This pattern raises a suspicion that some of the revenue from France might have
    shifted to Spain. However, we still see a decline in the top-line metric, so it’s
    worth further investigation. Practically, this situation could be caused by data
    issues, logging errors or service unavailability in some regions (so customers
    have to use VPNs and appear with a different country in our logs).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/0b00714be37c60f10e567a600037d4dd.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: We’ve looked at a bunch of different examples, and our framework helped us find
    the main drivers of change. I hope it’s now clear how to conduct root cause analysis
    with simple metrics, and we are ready to move on to ratio metrics.
  prefs: []
  type: TYPE_NORMAL
- en: 'Analysis: ratio metrics'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Product metrics are often ratios like average revenue per customer or conversion.
    Let’s see how we can break down changes in this type of metrics. In our case,
    we will look at conversion.
  prefs: []
  type: TYPE_NORMAL
- en: 'There are two types of effects to consider when analysing ratio metrics:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Change within a segment**, for example, if customer conversion in France
    drops, the overall conversion will also drop.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Change in the mix**, for example, if the share of new customers increases,
    and new users typically convert at a lower rate, this shift in the mix can also
    lead to a drop in the overall conversion rate.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: To understand what’s going on, we need to be able to distinguish these effects.
    Once again, we will write a bunch of formulas to break down and quantify each
    type of impact.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s start by defining some useful variables.
  prefs: []
  type: TYPE_NORMAL
- en: \[
  prefs: []
  type: TYPE_NORMAL
- en: \textbf{c}_{\textsf{before}}^{\textsf{i}}, \textbf{c}_{\textsf{after}}^{\textsf{i}}
    – \textsf{converted users}\\
  prefs: []
  type: TYPE_NORMAL
- en: \textbf{C}_{\textsf{before}}^{\textsf{total}} = \sum_{\textsf{i}}{\textbf{c}_{\textsf{before}}^{\textsf{i}}}\\
  prefs: []
  type: TYPE_NORMAL
- en: \textbf{C}_{\textsf{after}}^{\textsf{total}} = \sum_{\textsf{i}}{\textbf{c}_{\textsf{after}}^{\textsf{i}}}\\
  prefs: []
  type: TYPE_NORMAL
- en: \textbf{t}_{\textsf{before}}^{\textsf{i}}, \textbf{t}_{\textsf{after}}^{\textsf{i}}
    – \textsf{total users}\\
  prefs: []
  type: TYPE_NORMAL
- en: \textbf{T}_{\textsf{before}}^{\textsf{total}} = \sum_{\textsf{i}}{\textbf{t}_{\textsf{before}}^{\textsf{i}}}\\
  prefs: []
  type: TYPE_NORMAL
- en: \textbf{T}_{\textsf{after}}^{\textsf{total}} = \sum_{\textsf{i}}{\textbf{t}_{\textsf{after}}^{\textsf{i}}}
  prefs: []
  type: TYPE_NORMAL
- en: \]
  prefs: []
  type: TYPE_NORMAL
- en: Next, let’s talk about the impact of **the change in mix**. To isolate this
    effect, we will estimate how the overall conversion rate would changeif conversion
    rates within all segments remained constant, and the absolute numbers for both
    converted and total users in all other segments stayed fixed. The only variables
    we will change are the total and converted number of users in segment *i*. We
    will adjust it to reflect its new share in the overall population.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s start by calculating how the total number of users in our segment needs
    to change to match the target segment share.
  prefs: []
  type: TYPE_NORMAL
- en: \[
  prefs: []
  type: TYPE_NORMAL
- en: \frac{\textbf{t}_{\textsf{after}}^{\textsf{i}}}{\textbf{T}_{\textsf{after}}^{\textsf{total}}}
    = \frac{\textbf{t}_{\textsf{before}}^{\textsf{i}} + \delta\textbf{t}^{\textsf{i}}}{\textbf{T}_{\textsf{before}}^{\textsf{total}}+
    \delta\textbf{t}^{\textsf{i}}} \\
  prefs: []
  type: TYPE_NORMAL
- en: \delta\textbf{t}^{\textsf{i}} = \frac{\textbf{T}_{\textsf{before}}^{\textsf{total}}
    * \textbf{t}_{\textsf{after}}^{\textsf{i}} – \textbf{T}_{\textsf{after}}^{\textsf{total}}
    * \textbf{t}_{\textsf{before}}^{\textsf{i}}}{\textbf{T}_{\textsf{after}}^{\textsf{total}}
    – \textbf{t}_{\textsf{after}}^{\textsf{i}}}
  prefs: []
  type: TYPE_NORMAL
- en: \]
  prefs: []
  type: TYPE_NORMAL
- en: Now, we can estimate the change in mix impact using the following formula.
  prefs: []
  type: TYPE_NORMAL
- en: \[
  prefs: []
  type: TYPE_NORMAL
- en: \textbf{change in mix impact} = \frac{\textbf{C}_{\textsf{before}}^{\textsf{total}}
    + \delta\textbf{t}^{\textsf{i}} * \frac{\textbf{c}_{\textsf{before}}^{\textsf{i}}}{\textbf{t}_{\textsf{before}}^{\textsf{i}}}}{\textbf{T}_{\textsf{before}}^{\textsf{total}}
    + \delta\textbf{t}^{\textsf{i}}} – \frac{\textbf{C}_{\textsf{before}}^{\textsf{total}}}{\textbf{T}_{\textsf{before}}^{\textsf{total}}}
  prefs: []
  type: TYPE_NORMAL
- en: \]
  prefs: []
  type: TYPE_NORMAL
- en: The next step is to estimate **the impact of the conversion rate change within
    segment *i***. To isolate this effect, we will keep the total number of customers
    and converted customers in all other segments fixed. We will only change the number
    of converted users in segment *i* to match the target conversion rate at a new
    point.
  prefs: []
  type: TYPE_NORMAL
- en: \[
  prefs: []
  type: TYPE_NORMAL
- en: \textbf{change within segment impact} = \frac{\textbf{C}_{\textsf{before}}^{\textsf{total}}
    + \textbf{t}_{\textsf{before}}^{\textsf{i}} * \frac{\textbf{c}_{\textsf{after}}^{\textsf{i}}}{\textbf{t}_{\textsf{after}}^{\textsf{i}}}
    – \textbf{c}_{\textsf{before}}^{\textsf{i}}}{\textbf{T}_{\textsf{before}}^{\textsf{total}}}
    – \frac{\textbf{C}_{\textsf{before}}^{\textsf{total}}}{\textbf{T}_{\textsf{before}}^{\textsf{total}}}
    \\ = \frac{\textbf{t}_{\textsf{before}}^{\textsf{i}} * \textbf{c}_{\textsf{after}}^{\textsf{i}}
    – \textbf{t}_{\textsf{after}}^{\textsf{i}} * \textbf{c}_{\textsf{before}}^{\textsf{i}}}{\textbf{T}_{\textsf{before}}^{\textsf{total}}
    * \textbf{t}_{\textsf{after}}^{\textsf{i}}}
  prefs: []
  type: TYPE_NORMAL
- en: \]
  prefs: []
  type: TYPE_NORMAL
- en: We can’t simply sum the different types of effects because their relationship
    is not linear. That’s why we also need to estimate the combined impact for the
    segment. This will combine the two formulas above, assuming that we will match
    both the new conversion rate within segment *i* and the new segment share.
  prefs: []
  type: TYPE_NORMAL
- en: \[
  prefs: []
  type: TYPE_NORMAL
- en: \textbf{total segment change} = \frac{\textbf{C}_{\textsf{before}}^{\textsf{total}}
    – \textbf{c}_{\textsf{before}}^{\textsf{i}} + (\textbf{t}_{\textsf{before}}^{\textsf{i}}
    + \delta\textbf{t}^{\textsf{i}}) * \frac{\textbf{c}_{\textsf{after}}^{\textsf{i}}}{\textbf{t}_{\textsf{after}}^{\textsf{i}}}}{\textbf{T}_{\textsf{before}}^{\textsf{total}}
    + \delta\textbf{t}^{\textsf{i}}} – \frac{\textbf{C}_{\textsf{before}}^{\textsf{total}}}{\textbf{T}_{\textsf{before}}^{\textsf{total}}}
  prefs: []
  type: TYPE_NORMAL
- en: \]
  prefs: []
  type: TYPE_NORMAL
- en: It’s worth noting that these effect estimations are not 100% accurate (i.e.
    we can’t sum them up directly). However, they are precise enough to make decisions
    and identify the main drivers of the change.
  prefs: []
  type: TYPE_NORMAL
- en: 'The next step is to put everything into code. We will again leverage visualisations:
    correlation and parallel coordinates charts that we’ve already used for simple
    metrics, along with a couple of waterfall charts to break down impact by segments.'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: With that, we’re done with the theory and ready to apply this framework in practice.
    We’ll load another dataset that includes a couple of scenarios.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/062b9939e45ddb81ee456a64da2a1723.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 'Scenario 1: Uniform conversion uplift'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: We will again just call the function above and analyse the results.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: 'The first scenario is pretty straightforward: conversion has increased in all
    countries by 4–7% points, resulting in the top-line conversion increase as well.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/700db787959133df80ebfeae0483eb86.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 'We can see that there are no anomalies in segments: the impact is correlated
    with the segment share, and conversion has increased uniformly across all countries.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e436bd968dca497c8ce5731fdbb5a736.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f959f56a2cd171942b69895788ce4aee.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: We can look at the waterfall charts to see the change split by countries and
    types of effects. Even though effect estimations are not additive, we can still
    use them to compare the impacts of different slices.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/956a4200fa246c838a8311bc05c94f54.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: The suggested framework has been quite helpful. We were able to quickly figure
    out what’s going on with the metrics.
  prefs: []
  type: TYPE_NORMAL
- en: 'Scenario 2: Simpson’s paradox'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Let’s take a look at a slightly trickier case.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/065bd3971f04202c2571a3c8e9e181dc.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 'The story is more complicated here:'
  prefs: []
  type: TYPE_NORMAL
- en: The share of UK users has increased while conversion in this segment has dropped
    significantly, from 74.9% to 34.8%.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In all other countries, conversion has increased by 8–11% points.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/7dfb0d1efee828a3ebc394a0fa4e3a20.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: Unsurprisingly, the conversion change in the UK is the biggest driver of the
    top-line metric decline.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/1a89c03962dab26f7cbc6684daa4effa.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 'Here we can see an example of non-linearity: 10% of effects are not explained
    by the current split. Let’s dig one level deeper and add a maturity dimension.
    This reveals the true story:'
  prefs: []
  type: TYPE_NORMAL
- en: Conversion has actually increased uniformly by around 10% points in all segments,
    yet the top-line metric has still dropped.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The main reason is the increase in the share of new users in the UK, as these
    customers have a significantly lower conversion rate than average.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/83e6682a169702889e44c69c45f98325.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: Here is the split of effects by segments.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b27ee5d8867458145958bc4f3542df5e.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: This counterintuitive effect is called [Simpson’s paradox](https://en.wikipedia.org/wiki/Simpson%27s_paradox).
    A classic example of Simpson’s paradox comes from a 1973 study on graduate school
    admissions at Berkeley. At first, it seemed like men had a higher chance of getting
    in than women. However, when they looked at the departments people were applying
    to, it turned out women were applying to more competitive departments with lower
    admission rates, while men tended to apply to less competitive ones. When they
    added department as a confounder, the data actually showed a small but significant
    bias in favour of women.
  prefs: []
  type: TYPE_NORMAL
- en: As always, visualisation can give you a bit of intuition on how this paradox
    works.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/cb9516f0f9ba762b8ecb2a274341859f.png)'
  prefs: []
  type: TYPE_IMG
- en: '[source](https://en.wikipedia.org/wiki/Simpson%27s_paradox#/media/File:Simpsons_paradox_-_animation.gif)
    | licence [CC BY-SA 4.0](https://creativecommons.org/licenses/by-sa/4.0)'
  prefs: []
  type: TYPE_NORMAL
- en: That’s it. We’ve learned how to break down the changes in ratio metrics.
  prefs: []
  type: TYPE_NORMAL
- en: '*You can find the complete code and data on [GitHub](https://github.com/miptgirl/miptgirl_medium/tree/main/growth_narrative_llm_agent).*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'It’s been a long journey, so let’s quickly recap what we’ve covered in this
    article:'
  prefs: []
  type: TYPE_NORMAL
- en: 'We’ve identified two major types of metrics: simple metrics (like revenue or
    number of users) and ratio metrics (like conversion rate or ARPU).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For each metric type, we’ve learned how to break down the changes and identify
    the main drivers. We’ve put together a set of functions that can help you find
    the answers with just a couple of function calls.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: With this practical framework, you’re now fully equipped to conduct root cause
    analysis for any metric. However, there is still room for improvement in our solution.
    In my next article, I will explore how to build an LLM agent that will do the
    whole analysis and summary for us. Stay tuned!
  prefs: []
  type: TYPE_NORMAL
- en: '*Thank you a lot for reading this article. I hope this article was insightful
    for you.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
