- en: 'When LLMs Try to Reason: Experiments in Text and Vision-Based Abstraction'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/when-llms-try-to-reason-experiments-in-text-and-vision-based-abstraction/](https://towardsdatascience.com/when-llms-try-to-reason-experiments-in-text-and-vision-based-abstraction/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*<mdspan datatext="el1753119493516" class="mdspan-comment">Can large language</mdspan>
    models learn to reason abstractly from just a few examples? In this piece, I explore
    this question by testing both text-based (o3-mini) and image-capable (gpt-4.1)
    models on abstract grid transformation tasks. These experiments reveal the extent
    to which current models rely on pattern matching, procedural heuristics, and symbolic
    shortcuts rather than robust generalization. Even with multimodal inputs, reasoning
    often breaks down in the face of subtle abstraction. The results offer a window
    into the current capabilities and limitations of in-context meta-learning with
    LLMs.*'
  prefs: []
  type: TYPE_NORMAL
- en: Introduction
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Meta-learning, the ability of a system to learn how to learn, has traditionally
    been explored through gradient-based optimization, memory-augmented networks,
    or explicit task embeddings. But with the rise of large language models (LLMs),
    particularly the o3 family with advanced reasoning capabilities, a new question
    emerges: can we use LLMs themselves as meta-learners in task-based domains like
    [ARC](https://arcprize.org/)? The Abstraction and Reasoning Corpus (ARC), introduced
    by François Chollet, is a benchmark explicitly designed to test broad generalization.
    It provides input-output transformation puzzles with minimal supervision, few
    examples per task, and often no shared surface-level structure across tasks. In
    other words: a playground for meta-learning. To get an understanding of typical
    abstraction and reasoning tasks, the reader can visit the ARC play [page](https://arcprize.org/play).'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d79c98b0f5e7917357e4a67b1dbaa65c.png)'
  prefs: []
  type: TYPE_IMG
- en: Example [game](https://arcprize.org/play?task=00d62c1b) from the ARC [website](https://arcprize.org/play).
    From the demonstration grids, it is clear that the task for the test grid is to
    turn black areas into yellow wherever they are completely enclosed by green boundaries.
  prefs: []
  type: TYPE_NORMAL
- en: Data and Setup
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To explore whether LLMs like `o3-mini` can perform meta-learning on abstract
    reasoning tasks, I used data from the [ARC Prize 2025 Kaggle competition](https://www.kaggle.com/competitions/arc-prize-2025/overview).
    The dataset repository can be found [here](https://github.com/arcprize/ARC-AGI-2)
    (Apache 2.0 license). The dataset consists of input-output grid transformations
    that challenge models to infer abstract rules from just a few examples.
  prefs: []
  type: TYPE_NORMAL
- en: 'Each task provides:'
  prefs: []
  type: TYPE_NORMAL
- en: A few **training examples** (`input` and `output` 2D grids)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A single **test input** grid for which the model must predict the corresponding
    output
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'A second dataset provides the solution grids for each of the test input grids.
    Here’s a simplified example of the data format:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'Each grid is a 2D array of integers from 0–9, representing colored pixels.
    Grids have varying sizes and a grid transformation may also carry a size change
    from the input to the output grid. To visualize the arrays, I used a custom colormap
    with `matplotlib`:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 'For model interaction, I used OpenAI’s `o3-mini` model via LangChain. Later
    on, we will also use `gpt-4.1`:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: 'To handle LLM responses, especially when the model returns a predicted output
    grid as Python code inside triple backticks, I wrote a utility:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]python\s*(.*?)[PRE4]'
  prefs: []
  type: TYPE_NORMAL
- en: 'This setup allowed me to structure a full reasoning loop: prompt the model
    with few-shot examples, extract and apply a generated algorithm, assess its performance
    on new test inputs and finally use the assessment to improve the algorithm.'
  prefs: []
  type: TYPE_NORMAL
- en: Testing Reasoning with o3-mini
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To evaluate whether LLMs can “meta-learn” on abstract reasoning tasks, I tested
    the `<a href="https://platform.openai.com/docs/models" rel="noreferrer noopener"
    target="_blank">o3-mini</a>` model using a closed-loop reasoning setup inspired
    by how humans might approach few-shot tasks. For each ARC challenge, I provided
    the model with a handful of demonstration input-output grid pairs and asked it
    to derive a single reusable algorithm.
  prefs: []
  type: TYPE_NORMAL
- en: 'I defined a sequence of prompts using LangChain’s `ChatPromptTemplate` to simulate
    reasoning, application, assessment, and refinement. The process mimics an inner
    training loop with limited supervision:'
  prefs: []
  type: TYPE_NORMAL
- en: '**PROMPT_REASON**: The model is given training examples and asked to infer
    a general algorithm in pseudocode.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**PROMPT_SOLVE**: The generated algorithm is applied to new inputs (both training
    and test).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**PROMPT_ASSESS**: When the algorithm fails, the model receives feedback comparing
    its predicted vs. expected outputs.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**PROMPT_SUMMARIZE_FEEDBACK**: The model summarizes cumulative feedback from
    failed attempts to iteratively refine its approach.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE5]python\n[[2, 3], [5, 6]]\n[PRE6]'
  prefs: []
  type: TYPE_NORMAL
- en: 'These prompts are linked into a simple LangChain pipeline:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: 'For each ARC challenge:'
  prefs: []
  type: TYPE_NORMAL
- en: The model receives the demonstration pairs and prior feedback;
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The model generates a new algorithm in pseudocode (`reasoning_template`);
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The algorithm is tested on all the demonstrations;
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'If it fails, the model: receives detailed feedback on mismatched predictions;
    summarizes mistakes across attempts; refines the next version of the algorithm;'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Once the model gets all demonstrations correct, I test it on the unseen test
    input.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This process repeats for up to a max number of attempts per challenge. A successful
    algorithm generalizes across the provided examples and applies correctly to the
    withheld test case. This setup tests whether the model can extract abstract patterns,
    improve its reasoning over time, and generalize from very few examples.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: 'Results: When Reasoning Works'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In some cases, `o3-mini` was able to correctly infer a generalizable algorithm
    from just a few input-output demonstrations. One such example involved generating
    a patterned tiling based on a small 2×2 input grid.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e56a8c42b1504533fc58e2bc711d2f5b.png)'
  prefs: []
  type: TYPE_IMG
- en: 'After just one attempt, the model converged on the following pseudocode:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: Here is the expected solution (true output) and the solution from the model
    pseudocode (test output).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d8f4c9c3231e01f9440f6aca72181aa2.png)'
  prefs: []
  type: TYPE_IMG
- en: True output grid (Image by author).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c497dd3d6cb0de21bd7284e79a9ce33a.png)'
  prefs: []
  type: TYPE_IMG
- en: Test output grid from the pseudocode (Image by author).
  prefs: []
  type: TYPE_NORMAL
- en: 'This algorithm demonstrates several notable reasoning capabilities:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Pattern abstraction: the model inferred a repeating tiling pattern from limited
    data;'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Modulo logic: it introduced modulo-based indexing (`r mod 2` and `(r // 2)
    mod 2`) to alternate row behavior, mimicking visual mirroring;'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Grid construction: the solution scales up the 2×2 input into a larger 6×6 grid
    through repeated copying and reversal;'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The fact that the model discovered this structure without hardcoded rules suggests
    it was engaging in a form of algorithm synthesis, guided by few-shot abstraction.
  prefs: []
  type: TYPE_NORMAL
- en: Here is another successful example.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/1caf501f6456c246a75ea0b9355c3692.png)'
  prefs: []
  type: TYPE_IMG
- en: Example grids and test input grid (image by author).
  prefs: []
  type: TYPE_NORMAL
- en: 'Again, after just one attempt, the model converged on the following pseudocode:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: Here is the expected solution and the solution from the model pseudocode.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/38f1fa1f57d82fa188be93b625fa701f.png)'
  prefs: []
  type: TYPE_IMG
- en: True output grid (image by author).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/90d1656d1257fd1fdc5e9233e5dd25d6.png)'
  prefs: []
  type: TYPE_IMG
- en: Test output grid from the pseudocode (image by author).
  prefs: []
  type: TYPE_NORMAL
- en: This algorithm effectively tiles the full input grid into the output grid at
    every position where the input cell is non-zero. The tiling is aligned such that
    each copy of the original grid is placed at an offset determined by `(r * N, c
    * N)` —  the scaled-up coordinates of the non-zero input cell.
  prefs: []
  type: TYPE_NORMAL
- en: 'What’s impressive here is that the model:'
  prefs: []
  type: TYPE_NORMAL
- en: Learns conditional placement. It only pastes the input where the input value
    is non-zero;
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Uses coordinate arithmetic to scale placement locations, showing spatial understanding;
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Treats the input as both control logic and content, combining layout detection
    with repetition.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: When Text-Based Reasoning Isn’t Enough
  prefs: []
  type: TYPE_NORMAL
- en: In the task below, the model was given a small number of demonstration input-output
    grid pairs and asked to infer the transformation rule.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/beace9079b0849755fe1ebf091ec49cd.png)'
  prefs: []
  type: TYPE_IMG
- en: Example grids and test input grid (image by author).
  prefs: []
  type: TYPE_NORMAL
- en: 'The text-based model (`o3-mini`) produced a detailed pseudocode solution, structured,
    plausible, and internally consistent:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: 'At first glance, this looks like a sophisticated strategy: compute a ring index
    for each non-zero region, then diffuse values inward using deterministic rules.
    It even includes update logic:'
  prefs: []
  type: TYPE_NORMAL
- en: If the “base” cell is 2 → assign 8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If base is even → add 2
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If base is odd → add 1
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: But this entire algorithm, however coherent, is misguided. It completely fails
    to match the true underlying transformation shown in the demonstrations.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/37dd9b4f146e6bdc963be5d8ba20bb81.png)'
  prefs: []
  type: TYPE_IMG
- en: Expected test output grid (image by author).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/6ef7a55ec6bd8ab414c340b469e4149b.png)'
  prefs: []
  type: TYPE_IMG
- en: Test output grid from the pseudocode (image by author).
  prefs: []
  type: TYPE_NORMAL
- en: 'Instead of reasoning about blue-bordered regions and their nested structure,
    the model generated a generic flood-fill algorithm based on distance from edge
    and adjacency to zeros. Even the feedback keeps refining the procedural approach
    identified earlier:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: So what went wrong?
  prefs: []
  type: TYPE_NORMAL
- en: Topological, not visual. The model focused on connectivity and edge proximity,
    ignoring the visually defined regions.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Procedural, not inferential. The logic was rigid and hand-crafted, not derived
    from patterns in the examples.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Demonstration-agnostic. There’s no sign the model meaningfully incorporated
    the few-shot examples. It likely defaulted to a familiar pattern — spatial growth
    using layers.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This isn’t surprising. Text-only LLMs have no visual grounding. They tokenize
    the grid as symbolic input — rows of digits, not enclosed figures or nested patterns.
    As a result, their inductive biases lean toward symbolic or graph-like algorithms,
    not perceptual abstractions.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this case, the model fell into a common trap: generating something plausible-sounding
    but wrong. It produced a spatial propagation scheme that might work for a diffusion
    task but not the one at hand. This highlights a key weakness in text-based few-shot
    prompting for abstract visual reasoning: the model’s “reasoning” is disconnected
    from perceptual understanding. It invents algorithms based on internal priors,
    not external cues.'
  prefs: []
  type: TYPE_NORMAL
- en: 'When Reasoning Fails: Also Image Models Aren’t Magic'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To improve generalization, I transitioned from purely text-based reasoning to
    image-based prompting, leveraging GPT-4.1’s multimodal capabilities through LangChain.
    This setup encoded input-output grid examples as base64 images, which were presented
    alongside a natural language prompt describing the task.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: 'The resulting pseudocode marked a clear step forward in expressiveness. The
    model was able to:'
  prefs: []
  type: TYPE_NORMAL
- en: Detect blue-bordered squares using visual features rather than purely symbolic
    structure;
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Apply rules based on square size and nesting depth to infer interior fill colors;
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Sort identified squares by size before filling, effectively avoiding overwrite
    conflicts.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Here’s the generated pseudocode:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: The model clearly exhibits structured reasoning. It develops an internal representation
    of nested geometric forms and attempts to apply rule-based transformations derived
    from examples.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/7d8f913cb7d7e4dc333c3c5156a68058.png)'
  prefs: []
  type: TYPE_IMG
- en: Test output grid from image-based reasoning model pseudocode (image by author).
  prefs: []
  type: TYPE_NORMAL
- en: 'However, despite these advances, the model still fails to generalize reliably.
    In novel configurations, it mis-assigns fill colors, falling back on brittle heuristics
    like size-based priority or rigid nesting assumptions. For instance, it might
    assume the largest square is always filled with yellow, even when that logic no
    longer holds in a new context. This failure reveals a deeper limitation: even
    with image input, the model does not “see” in the human sense. It doesn’t build
    a holistic perceptual representation of spatial relationships. Instead, it converts
    the image into symbolic patterns and applies deterministic procedures like flood-fill,
    sorting, or positional indexing.'
  prefs: []
  type: TYPE_NORMAL
- en: In practice, this means the model reasons from internal abstractions, not perceptual
    grounding. It infers that “smaller squares get black,” or “fill based on size
    rank,” without fully understanding why those assignments occurred in the demonstrations.
    As a result, any deviation from the expected layout can cause it to misfire.
  prefs: []
  type: TYPE_NORMAL
- en: This suggests that while multimodal prompting extends the expressive range of
    the model, it doesn’t yet provide the kind of flexible, generalizable visual reasoning
    that humans display. These tasks may ultimately require stronger forms of program
    induction, meta-learning, or hybrid systems that integrate perceptual grouping
    with learned rules.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusions
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this study, I explored whether large language models — both text-based and
    multimodal — can perform *meta-learning* from examples on abstract reasoning tasks.
    Specifically, I focused on a class of problems from the ARC dataset, where solutions
    require identifying visual patterns, learning transformations, and generalizing
    them to novel test inputs.
  prefs: []
  type: TYPE_NORMAL
- en: 'Through direct prompting experiments, I found that:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Text-based models** (e.g., `o3-mini`) often hallucinate plausible algorithms
    that are topologically or procedurally sound but entirely **disconnected from
    the task’s visual logic**. These models rely on symbolic reasoning over tokenized
    grids, and default to familiar heuristics like flood-fill, ring propagation, or
    rule-based updates, regardless of the examples provided.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Multimodal models** (e.g., GPT-4 with vision) showed a **clear improvement
    in pattern detection** and relational reasoning. They successfully identified
    blue-bordered regions and adapted behaviors based on relative size or nesting.
    However, their generalization remained fragile: they still applied brittle rules,
    such as fixed size-based assignments, and failed in novel layouts that deviated
    from the demonstrations.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These findings suggest that, **even with visual input, current LLMs do not “see”
    as humans do**. They process images symbolically, not perceptually. Their reasoning
    is driven by internally constructed rules, not a flexible, visual understanding
    of shapes, hierarchy, or affordance.
  prefs: []
  type: TYPE_NORMAL
- en: 'The limitations I observed reinforce a central tension: few-shot prompting
    alone, even with images, is not sufficient for robust abstraction. True generalization
    likely requires:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Program induction: inferring reusable, structured transformations from examples;'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Perceptual grounding: developing architectures that parse and manipulate visual
    scenes compositionally;'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Meta-learning architectures: building models that adapt their reasoning strategies
    dynamically rather than applying pre-learned heuristics;'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Today’s LLMs are astonishing in their breadth, but they’re still guessing based
    on priors, not *learning to learn* in the human sense. They lack a strong inductive
    bias for abstraction and transformation. ARC-style tasks expose this gap clearly:
    success requires more than pattern recognition, it requires *reasoning* from examples
    in a structured, compositional way. These results are not discouraging, rather
    clarifying. We now know where the ceiling is. And the next generation of models,
    those with hybrid architectures, persistent memory, and explicit meta-learning
    capabilities might finally break through it.'
  prefs: []
  type: TYPE_NORMAL
