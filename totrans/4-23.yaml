- en: Time Series Forecasting with MFLES
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/time-series-forecasting-with-mfles-c452ede7834c/](https://towardsdatascience.com/time-series-forecasting-with-mfles-c452ede7834c/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![Photo by David Todd McCarty on Unsplash](../Images/52e6f2d6b48eb27895ae7252a24ec6d6.png)'
  prefs: []
  type: TYPE_IMG
- en: Photo by [David Todd McCarty](https://unsplash.com/@davidtoddmccarty?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on [Unsplash](https://unsplash.com/photos/brown-cupcake-on-white-textile-udHpkduEOYU?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
  prefs: []
  type: TYPE_NORMAL
- en: Introduction
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '[StatsForecast](https://nixtlaverse.nixtla.io/statsforecast/index.html) is
    a major statistical forecasting package in the python ecosystem. I tend to think
    of it as one of the ‘big 3’ with the other two being Sktime and DARTS. The creators
    and maintainers of StatsForecast, Nixtla, have created an impressive ecosystem
    of time series forecasting frameworks. This work spans the gamut of the time series
    field and offers everything from machine learning, deep learning, and even hierarchical
    forecasting packages.'
  prefs: []
  type: TYPE_NORMAL
- en: Today, we will be focused on their StatsForecast package which lies mainly in
    the ‘traditional’ realm of time series forecasting. Specifically, we will take
    a look at their newer release which contains a new type of hybrid method that
    blurs the lines of what makes a forecasting method ‘traditional’. This method
    has emerged as the top performer in Statsforecast across many benchmarks and,
    more recently, was the most used stat method in the top results for the [VN1 Forecasting
    competition](https://www.datasource.ai/en/home/data-science-competitions-for-startups/phase-2-vn1-forecasting-accuracy-challenge/leaderboard).
  prefs: []
  type: TYPE_NORMAL
- en: 'First, a quick asterisk: I am extremely biased, as I should be, since I created
    this method!'
  prefs: []
  type: TYPE_NORMAL
- en: The MFLES Method
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![Image by Author](../Images/1fcf667c3910cea94d35e5e29c6ce073.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: MFLES is a method to forecast time series based on Gradient Boosted Time Series
    Decomposition which treats traditional decomposition as the base estimator in
    the boosting process. Unlike normal gradient boosting, learning rates are applied
    at the component level (trend/seasonality/exogenous) rather than the total estimator.
  prefs: []
  type: TYPE_NORMAL
- en: 'The method derives its name from some of the underlying estimators that can
    enter into the boosting procedure, specifically: a simple Median, Fourier functions
    for seasonality, a simple/piecewise Linear trend, and Exponential Smoothing.'
  prefs: []
  type: TYPE_NORMAL
- en: MFLES seems to do pretty good at a wide range of forecasting activity such as
    multiple seasonality or highly variable history.
  prefs: []
  type: TYPE_NORMAL
- en: Gradient Boosted Time Series Decomposition Theory
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let’s do a quick overview of the ‘theory’ under the hood.
  prefs: []
  type: TYPE_NORMAL
- en: The idea is pretty simple, take a process like decomposition and view it as
    a type of ‘psuedo’ gradient boosting since we are passing residuals around similar
    to standard gradient boosting. Then apply gradient boosting approaches such as
    iterating with a global mechanism to control the process and introduce learning
    rates for each of the components in the process such as trend or seasonality or
    exogenous. By doing this we graduate from this ‘psuedo’ approach to full blown
    gradient boosting.
  prefs: []
  type: TYPE_NORMAL
- en: Utilizing gradient boosting in this manner unlocks a plethora of features in
    the time series context.
  prefs: []
  type: TYPE_NORMAL
- en: For example, we can estimate a single seasonality period each boosting round.
    Effectively generalizing the process to fit infinite seasonalities. We can search
    for a single changepoint each round and, through boosting, fit for as many changepoints
    as your heart desires! Finally, we are able to merge many estimators for the various
    components that have traditionally been seen as ‘exotic’ to time series decomposition
    due to eating too much signal and not leaving much for the other components to
    learn from.
  prefs: []
  type: TYPE_NORMAL
- en: Of course, these all can lead to overfitting and other issues which we counteract
    by utilizing the component learning rates!
  prefs: []
  type: TYPE_NORMAL
- en: The process may sound complicated but it is really quite simple. Hopefully this
    illustration drives home the main idea.
  prefs: []
  type: TYPE_NORMAL
- en: '![Image by author](../Images/5e0572868572c275db69891e5cb7298f.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: If you are still interested in learning more, you can check out some of my other
    articles on ThymeBoost which implements this idea.
  prefs: []
  type: TYPE_NORMAL
- en: '[Time Series Forecasting with ThymeBoost](https://medium.com/towards-data-science/thymeboost-a0529353bf34)'
  prefs: []
  type: TYPE_NORMAL
- en: '[The M4 Forecasting Compeition with ThymeBoost](https://medium.com/towards-data-science/the-m4-time-series-forecasting-competition-with-thymeboost-b31196fc319)'
  prefs: []
  type: TYPE_NORMAL
- en: Ultimately, MFLES is a specific implementation of ThymeBoost that tends to work
    well!
  prefs: []
  type: TYPE_NORMAL
- en: A Quick Example
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now that we have reviewed some of the underlying theory and specific details
    of MFLES, let’s take a look at forecasting with it using StatsForecast!
  prefs: []
  type: TYPE_NORMAL
- en: The following example can also be found in the [documentation](https://nixtlaverse.nixtla.io/statsforecast/docs/models/mfles.html)
    (I also wrote the documentation for the method)
  prefs: []
  type: TYPE_NORMAL
- en: For the example, we will use the infamous airline passengers dataset which has
    a nice trend and multiplicative seasonality.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: '![Image by Author](../Images/5a000914deb172ef9f79652bfd944ed4.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: 'There are a few parameters we pass to MFLES here, some might say too many for
    a method that is a type of ‘Auto’ forecasting model. Either way, let’s review
    a few of these key parameters:'
  prefs: []
  type: TYPE_NORMAL
- en: '**season_length**: a list of seasonal periods, in order of perceived importance
    preferably.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**test_size**: AutoMFLES is optimized via time series cross validation. The
    test size dictates how many periods to use in each test fold. This is probably
    the most important parameter when it comes to optimizing and you should weigh
    the season length, forecast horizon, and general data length when setting this.
    But a good rule of thumb is either the most important season length or half that
    to allow MFLES to pick up on seasonality.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**n_windows**: how many test sets are used in optimizing parameters. In this
    example, 2 means that we, in total, use 24 months (12 * 2) split between the 2
    windows.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**metric**: this one is easy, it is simply the metric we want to optimize for
    with our parameters. Here we use the default which is smape that is defaulted
    to reproduce experiment results on M4\. You can also pass ‘rmse’, ‘mape’, or ‘mae’
    to optimize for another metric.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: M4 Benchmark
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Of course, we do not care too much about fitting to a single series. We want
    to know how MFLES performs on larger benchmarks. This is essentially the ‘why
    should I care’ about MFLES. Luckily for us there were some benchmarks done on
    the M4 datasets.
  prefs: []
  type: TYPE_NORMAL
- en: If you are not aware of what the M4 competition was, and subsequently what the
    M4 datasets are, it was a forecasting competition which took place in 2018\. In
    terms of the dataset, the M4 dataset consisted of **100,000 time series** from
    various domains.
  prefs: []
  type: TYPE_NORMAL
- en: Dataset Characteristics
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**Data Frequency**: Time series were grouped into six different frequencies:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Yearly**: 23,000 series'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Quarterly**: 24,000 series'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Monthly**: 48,000 series'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Weekly**: 359 series'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Daily**: 4227 series'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Hourly**: 414 series'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Domains Represented
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The dataset included time series from diverse fields:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Demographic**: Population counts, birth rates, etc.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Finance**: Stock prices, currency rates, etc.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Industry**: Production quantities, energy consumption, etc.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Macro**: GDP, inflation, etc.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Micro**: Sales data from companies, stores, or products.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Other**: Various datasets that didn’t fit the above categories.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For the benchmark with MFLES, the results of which can be found [here](https://github.com/Nixtla/statsforecast/tree/main/experiments/mfles),
    Nixtla compared the method against many standard Statistical methods such as ARIMA,
    ETS, and Theta models.
  prefs: []
  type: TYPE_NORMAL
- en: 'The sMAPE results can be seen below:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Image by Author](../Images/b9436b815a77ba118e6b42649fcbca09.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: In terms of winners—MFLES is the best method in 2 of the 6 datasets, losing
    out only to Theta who is best in 3\. But let’s take a look at the ranks and take
    into account the number of series.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are the ranks of the methods per dataset:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Image by author](../Images/cb0149a70466258f9f0296b5e2a94bad.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: Based on the benchmark, MFLES actually placed 2nd, just behind the Theta method.
  prefs: []
  type: TYPE_NORMAL
- en: 'What’s even more impressive is the flexibility of MFLES. The method can handle:'
  prefs: []
  type: TYPE_NORMAL
- en: Multiple Seasonality
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Exogenous Features
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Trend Changepoints
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Things taht Theta doesn’t typically naturally handle. Of course, you could pull
    Theta into a Gradient Boosted Decomposition framework to generalize it but that
    is for another article!
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this article we took a look at MFLES, which was unleashed by Nixtla back
    in May 2024 and has had a pretty decent run – all things considered. There are
    some neat additional features that are in the pipeline for MFLES. The most interesting
    being a any-estimator exogenous component which will let you fit your exogenous
    features using any method such as boosted trees, SVMs, or even neural nets. Methods
    that typically would eat too much signal in a time series context.
  prefs: []
  type: TYPE_NORMAL
- en: Anyways, I hope you enjoyed this over view! As always, if you want to see more
    content from me then make sure to sign up to receive notifications when I publish.
    I’ll be better this year I promise!
  prefs: []
  type: TYPE_NORMAL
