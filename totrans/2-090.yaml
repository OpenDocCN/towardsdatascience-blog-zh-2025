- en: Skills vs. AI Skills
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/skills-vs-ai-skills/](https://towardsdatascience.com/skills-vs-ai-skills/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: In this post, I will provide a high-level analysis of the [AI skills for the
    Business Competency Framework](https://zenodo.org/records/11092677/preview/AISkillsForBusinessCompetencyFramework_V2.pdf?include_deleted=0) created
    by [The Alan Turing Institute](https://www.turing.ac.uk/skills/collaborate/ai-skills-business-framework),
    illustrate how the framework’s foundation is based on timeless skills, and suggest
    areas for AI skilling among non-technical individuals.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: My impression is that we entered the global pandemic of hearsay by spreading
    headlines and 1000-character-long-AI-generated summaries (or as much as LinkedIn
    permits) on topics that concern us all.
  prefs: []
  type: TYPE_NORMAL
- en: Opinions pile on top of opinions about the future of the workspace and topics
    such as education, security, or even human extinction in the AI era. Supported,
    unfortunately, often, by the most recent non-peer-reviewed research, which was
    superficially read and understood. In some cases, understanding is not even the
    goal one wants to optimise its function for. The goal is to earn hundreds or thousands
    of likes and get dozens of new followers.
  prefs: []
  type: TYPE_NORMAL
- en: '[Panem et circenses](https://en.wikipedia.org/wiki/Bread_and_circuses) are
    available with every new feed refresh, fresh (mis-) information served, so we
    don’t need to engage our grey matter in finding the “truth.” Whatever this means
    today, when basic research efforts are getting outsourced to AI, and [the good
    enough truth](https://ai.gopubby.com/the-good-enough-truth-c7cb2e633799) is slowly
    creeping toward becoming a new standard.'
  prefs: []
  type: TYPE_NORMAL
- en: Nonetheless, the market demands that we get a proper set of…
  prefs: []
  type: TYPE_NORMAL
- en: AI Skills
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: For most of us working closely with AI developments, when we step out of our
    IT circle, we realise people don’t talk or care as much about generative AI as
    we (*would like them to*) do.
  prefs: []
  type: TYPE_NORMAL
- en: 'But, one thing they do care about is the correctness of the outputs produced
    by AI: is it good or not? Or to reframe it in my sister’s, aka math teacher, words:
    “*What should I use it for? It gives me wrong results from the prompted math equations.*”'
  prefs: []
  type: TYPE_NORMAL
- en: And yet, a few days ago, it was reported that [Gemini with Deep Think achieved
    a gold-medal standard at the International Mathematical Olympiad](https://deepmind.google/discover/blog/advanced-version-of-gemini-with-deep-think-officially-achieves-gold-medal-standard-at-the-international-mathematical-olympiad/?utm_source=substack&utm_medium=email).
  prefs: []
  type: TYPE_NORMAL
- en: So, where’s the gap here, or more precisely…
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/95c3edc8ca6049f6f5241c2901d35130.png)'
  prefs: []
  type: TYPE_IMG
- en: Let’s begin with the concepts that everyone is trying to re-package now, and
    that is — a [skillset framework](https://www.deloitte.com/us/en/services/consulting/blogs/human-capital/skills-based-organization-skills-framework.html)
    mixed with some version of the [responsibility assignment matrix](https://en.wikipedia.org/wiki/Responsibility_assignment_matrix).
  prefs: []
  type: TYPE_NORMAL
- en: Although these frameworks are questionable classifiers, as they tend to “box”
    people and their abilities without a proper assessment, they provide a useful
    starting point for orientation.
  prefs: []
  type: TYPE_NORMAL
- en: That said, I’ll use an example of an [AI skills for Business Competency (Meta-)
    Framework](https://zenodo.org/records/11092677/preview/AISkillsForBusinessCompetencyFramework_V2.pdf?include_deleted=0)
    developed by [The Alan Turing Institute](https://www.turing.ac.uk/skills/collaborate/ai-skills-business-framework),
    which outlines ***four*** skill **levels** targeting ***four*** main **learner
    personas** across ***five*** **dimensions** representing a set of competencies,
    behaviours, and responsibilities👇🏼.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/55ec063f6b340bb5385dcbc15c0a15a7.png)![](../Images/68939e079893e46ba6afd1782c363c70.png)![](../Images/78bfac2d8c75adbfe246758042e10a5c.png)![](../Images/9c8b2ffce3e7e7506558c39909f45736.png)'
  prefs: []
  type: TYPE_IMG
- en: '**Image #1** created by the Author. **Source:** [Business Competency Framework](https://zenodo.org/records/11092677/preview/AISkillsForBusinessCompetencyFramework_V2.pdf?),
    “Indicative mapping between Personas and the Dimensions and Learning Objectives.”'
  prefs: []
  type: TYPE_NORMAL
- en: 'Diverging slightly from the post topic, I need to note my top-of-mind, evident
    shortcomings in the framework’s mapping of skill levels to personas, such as:'
  prefs: []
  type: TYPE_NORMAL
- en: It is disconnected from the market’s need for [M-shaped professionals](https://techunting.net/t-shaped-skills-rethinking-talent-development/#:~:text=across%20intersecting%20tasks.-,What%20are%20M-Shaped%20Skills?,-An%20M-shaped)
    from the “**AI Worker**” persona, where the designation of a “*Working*” level
    for dimensions like “*Privacy & Stewardship*” or “*Evaluation & Reflection*” falls
    short of real-world requirements. This is especially true in regulated industries,
    where **every employee handling sensitive data** is expected to have strong knowledge
    of GDPR and compliance frameworks — a mandate that will probably extend to understanding
    AI risks and biases.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Or, how framing the “**AI Leader**” as an “*Expert*” in the “*Problem Definition
    & Communication*” dimension is misleading, as it suggests they should possess
    deep technical expertise. However, this is often not the case; many leaders depend
    on their AI-savvy teams to bridge the gap with *hands-on technical insight* when
    making decisions.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'And, there’s more to it, but let’s focus on the AI competencies. To do so,
    I will share one more table to complement the necessary understanding of the learner
    personas:'
  prefs: []
  type: TYPE_NORMAL
- en: '![AI skills from Business Competency Framework.](../Images/300a6829109e096e2a350c5380bb46e2.png)'
  prefs: []
  type: TYPE_IMG
- en: '**Image #2:** “Learner personas and their core skills” created by the Author.
    **Source**: [Business Competency Framework](https://zenodo.org/records/11092677/preview/AISkillsForBusinessCompetencyFramework_V2.pdf?include_deleted=0).'
  prefs: []
  type: TYPE_NORMAL
- en: Now, we’ll assume how we all managed to find our spot under the Sun, and map
    ourselves to one of the above-presented personas. The next question that comes
    up is…
  prefs: []
  type: TYPE_NORMAL
- en: Which skills are timeless, and where are the gaps in the current skills vs.
    AI skills?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The proof to the first question is (somehow) straightforward:ifwe analyse Image
    #2 without a focus on the term “*AI*”, it becomes clear how the listed AI competencies
    are the application of existing, *timeless* ones, such as:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Critical thinking,*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Risk management,*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Ethical judgement,*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Strategic planning,*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Communication and collaboration,*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Continuous learning,*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Digital literacy,…*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'However**,** the novelty comes from applying them to AI. The context of AI
    introduces different challenges, which require these skills to be adapted and
    deepened. For example:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Risk management* is not a new concept, but addressing the risks associated
    with biased language models or autonomous decision-making presents a new set of
    challenges to mitigate.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Ethical* *judgement* is not new either, but applying it to identify model
    (mis-)use, or job displacement due to automation, presents entirely new dilemmas.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Therefore, the gaps lie in the foundational, domain-specific nuances that
    allow a collective to effectively leverage AI as a tool rather than be “used”
    by it.**'
  prefs: []
  type: TYPE_NORMAL
- en: With this in mind, there are already [learning paths being offered to acquire
    the AI-nuanced skills](https://www.microsoft.com/en-us/corporate-responsibility/ai-skills-resources),
    and these can help you kick off your learning journey.
  prefs: []
  type: TYPE_NORMAL
- en: 'My recommendations for both non-tech and tech people who don’t primarily develop
    AI solutions would be:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Master high-level understanding of different language models** (e.g., [LLMs
    vs. SLMs](https://www.microsoft.com/en-us/microsoft-cloud/blog/2024/11/11/explore-ai-models-key-differences-between-small-language-models-and-large-language-models/)
    vs. other specialised models, [“thinking” vs. “non-thinking models”](https://techcommunity.microsoft.com/blog/azure-ai-services-blog/general-purpose-vs-reasoning-models-in-azure-openai/4403091),
    etc.), **how to** [**prompt**](https://learn.microsoft.com/en-us/azure/ai-foundry/openai/concepts/prompt-engineering?tabs=chat)
    **them and when to use them** (what are the [pros and cons of using AI](https://www.microsoft.com/en-us/microsoft-365-life-hacks/everyday-ai/pros-and-cons-of-ai))**.**
    Get an understanding of what [**AI agents**](https://news.microsoft.com/source/features/ai/ai-agents-what-they-are-and-how-theyll-change-the-way-we-work/)
    are and [**where we stand on the AGI path**](https://www.youtube.com/watch?v=ogMaVI7-A40),
    so you get a feeling of what kind of tools you are dealing with.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Understand “failure modes” and learn how to evaluate outputs. **Learn the
    ways models can lie and manipulate, such as [bias](https://www.ibm.com/think/topics/ai-bias), [hallucinations](https://www.ibm.com/think/topics/ai-hallucinations),
    or [data poisoning](https://inf.ethz.ch/news-and-events/spotlights/infk-news-channel/2025/02/can-poisoned-ai-models-be-cured.html).
    In addition, you’ll need to develop an **evaluation checklist** (from prompt (input)
    to result (output)) for specific (types of) problems (you’re trying to solve by
    using AI) and ensure that **outcomes are critically reviewed** and **tested** before
    they reach the masses.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Create, don’t just consume AI products.** While soft skills are a valuable
    asset, developing practical hard skills is equally important. I believe everyone
    should start mastering the AI features accessible in the tools we use daily, e.g.,
    [AI tools in Excel](https://www.microsoft.com/en-us/microsoft-365-life-hacks/everyday-ai/time-saving-tips/master-excel-with-ai).
    From there, I would recommend you start learning **no-code and low-code solutions**
    (e.g., [Copilot Studio](https://www.microsoft.com/en-us/microsoft-copilot/agents)
    or [AI Foundry](https://learn.microsoft.com/en-us/azure/ai-foundry/agents/overview))
    to **develop custom AI agents** with a simple “clicky-clicky” method. Mastering
    these workflows will boost your performance and AI domain knowledge, **making
    you more competitive** in the future job market.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: To conclude, a key point I hope you take away is that we **all** need to make
    an effort to enhance our existing skills with AI capabilities. The effectiveness
    of AI depends on how thoughtfully we engage with it and demands the same **critical
    thinking**, **risk assessment**, and **ethical judgment** skills we have always
    needed, simply applied to new challenges.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Thank you for reading!
  prefs:
