- en: Log Link vs Log Transformation in R — The Difference that Misleads Your Entire
    Data Analysis
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/log-link-vs-log-transformation-in-r-the-difference-that-misleads-your-entire-data-analysis/](https://towardsdatascience.com/log-link-vs-log-transformation-in-r-the-difference-that-misleads-your-entire-data-analysis/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1746831473941" class="mdspan-comment">Although normal</mdspan>
    distributions are the most commonly used, a lot of real-world data unfortunately
    is not normal. When faced with extremely skewed data, it’s tempting for us to
    utilize log transformations to normalize the distribution and stabilize the variance.
    I recently worked on a project analyzing the energy consumption of training AI
    models, using data from Epoch AI [1]. There is no official data on energy usage
    of each model, so I calculated it by multiplying each model’s power draw with
    its training time. The new variable, Energy (in kWh), was highly right-skewed,
    along with some extreme and overdispersed outliers (Fig. 1).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/624108444caa4dac7ada855b7ac9d020.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1\. Histogram of Energy Consumption (kWh)
  prefs: []
  type: TYPE_NORMAL
- en: To address this skewness and heteroskedasticity, my first instinct was to apply
    a log transformation to the Energy variable. The distribution of log(Energy) looked
    much more normal (Fig. 2), and a Shapiro-Wilk test confirmed the borderline normality
    (p ≈ 0.5).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f3ad61ffae5ed5edddefbd1364890f77.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2\. Histogram of log of Energy Consumption (kWh)
  prefs: []
  type: TYPE_NORMAL
- en: '**Modeling Dilemma: Log Transformation vs Log Link**'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'The visualization looked good, but when I moved on to modeling, I faced a dilemma:
    Should I model the **log-transformed response variable** (*`log(Y) ~ X`*)*,* or
    should I model the **original response variable** using a **log link function**
    *(`Y ~ X, link = “log"`)*? I also considered two distributions — Gaussian (normal)
    and Gamma distributions — and combined each distribution with both log approaches.
    This gave me four different models as below, all fitted using R’s Generalized
    Linear Models (GLM):'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: '**Model Comparison: AIC and Diagnostic Plots**'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: I compared the four models using Akaike Information Criterion (AIC), which is
    an estimator of prediction error. Typically, the lower the AIC, the better the
    model fits.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 'Among the four models, models using log-transformed outcomes have much lower
    AIC values than the ones using log links. Since the difference in AIC between
    log-transformed and log-link models was substantial (311 and 352 vs 1780 and 2005),
    I also examined the diagnostics plots to further validate that log-transformed
    models fit better:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/9d449d906a012426c2d57e67bf844e1b.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4\. Diagnostic plots for the log-linked Gaussian model. The Residuals
    vs Fitted plot suggests linearity despite a few outliers. However, the Q-Q plot
    shows noticeable deviations from the theoretical line, suggesting non-normality.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c127d3507472afff12d335fd4508853a.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5\. Diagnostics plots for the log-transformed Gaussian model. The Q-Q
    plot shows a much better fit, supporting normality. However, the Residuals vs
    Fitted plot has a dip to -2, which may suggest non-linearity.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/89c5b1b9093edaa4ba7f8d5f25085fab.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6\. Diagnostic plots for the log-linked Gamma model. The Q-Q plot looks
    okay, yet the Residuals vs Fitted plot shows clear signs of non-linearity
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/76925bce8e38859ae0bebee56554795a.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7\. Diagnostic plots for the log-transformed Gamma model. The Residuals
    vs Fitted plot looks good, with a small dip of -0.25 at the beginning. However,
    the Q-Q plot shows some deviation at both tails.
  prefs: []
  type: TYPE_NORMAL
- en: Based on the AIC values and diagnostic plots, I decided to move forward with
    the log-transformed Gamma model, as it had the second-lowest AIC value and its
    Residuals vs Fitted plot looks better than that of the log-transformed Gaussian
    model.
  prefs: []
  type: TYPE_NORMAL
- en: 'I proceeded to explore which explanatory variables were useful and which interactions
    may have been significant. The final model I selected was:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: Interpreting Coefficients
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: However, when I started interpreting the model’s coefficients, something felt
    off. Since only the response variable was log-transformed, the effects of the
    predictors are multiplicative, and we need to exponentiate the coefficients to
    convert them back to the original scale. A one-unit increase in 𝓍 multiplies the
    outcome 𝓎 by exp(β), or each additional unit in 𝓍 leads to a (exp(β) — 1) × 100
    % change in 𝓎 [2].
  prefs: []
  type: TYPE_NORMAL
- en: Looking at the results table of the model below, we have *Training_time_hour,
    Hardware_quantity,* and their interaction term *Training_time_hour:Hardware_quantity*
    are continuous variables, so their coefficients represent slopes. Meanwhile, since
    I specified +0 in the model formula, all levels of the categorical *Training_hardware*
    act as intercepts, meaning that each hardware type acted as the intercept β₀ when
    its corresponding dummy variable was active.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: 'When converting the slopes to percent change in response variable, the effect
    of each continuous variable was almost zero, even slightly negative:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/3d9008df33e3c382e1ed3f3db1174ba4.png)'
  prefs: []
  type: TYPE_IMG
- en: 'All the intercepts were also converted back to just around 1 kWh on the original
    scale. The results didn’t make any sense as at least one of the slopes should
    grow along with the enormous energy consumption. I wondered if using the log-linked
    model with the same predictors may yield different results, so I fit the model
    again:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: This time, *Training_time* and *Hardware_quantity* would increase the total
    energy consumption by 0.18% per additional hour and 0.07% per additional chip,
    respectively. Meanwhile, their interaction would decrease the energy use by 2
    × 10⁵%. These results made more sense as *Training_time* can reach up to 7000
    hours and *Hardware_quantity* up to 16000 units.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/15cd35d6e735e60bde2bced5b62a8746.png)'
  prefs: []
  type: TYPE_IMG
- en: To visualize the differences better, I created two plots comparing the predictions
    (shown as dashed lines) from both models. The left panel used the log-transformed
    Gamma GLM model, where the dashed lines were nearly flat and close to zero, nowhere
    near the fitted solid lines of raw data. On the other hand, the right panel used
    log-linked Gamma GLM model, where the dashed lines aligned much more closely with
    the actual fitted lines.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/50a5c91ce21b2b274461abe409470120.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Figure 8\. Relationship between hardware quantity and log of energy consumption
    across training time groups. In both panels, raw data is shown as points, solid
    lines represent fitted values from linear models, and dashed lines represent predicted
    values from generalized linear models. The left panel uses a log-transformed Gamma
    GLM, while the right panel uses a log-linked Gamma GLM with the same predictors.*'
  prefs: []
  type: TYPE_NORMAL
- en: Why Log Transformation Fails
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'To understand the reason why the log-transformed model can’t capture the underlying
    effects as the log-linked one, let’s walk through what happens when we apply a
    log transformation to the response variable:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s say Y is equal to some function of X plus the error term:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ccb67ec9147c2f856164320456fa877d.png)'
  prefs: []
  type: TYPE_IMG
- en: 'When we apply a log transforming to Y, we are actually compressing both f(X)
    and the error:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/181cfc8db6c93a41b21b4650f94f7fd5.png)'
  prefs: []
  type: TYPE_IMG
- en: That means we are modeling a whole new response variable, log(Y). When we plug
    in our own function g(X)— in my case *g(X) = Training_time_hour*Hardware_quantity
    + Training_hardware *— it is trying to capture the combined effects of both the
    “shrunk” f(X) and error term.
  prefs: []
  type: TYPE_NORMAL
- en: In contrast, when we use a log link, we are still modeling the original Y, not
    the transformed version. Instead, the model exponentiates our own function g(X)
    to predict Y.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/17dca4209cfe72c2df581de0a0fc41e8.png)'
  prefs: []
  type: TYPE_IMG
- en: 'The model then minimizes the difference between the actual Y and the predicted
    Y. That way, the error terms remains intact on the original scale:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/62edbfbd2f9dd379cffb2108f3d324ad.png)'
  prefs: []
  type: TYPE_IMG
- en: Conclusion
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Log-transforming a variable is not the same as using a log link, and it may
    not always yield reliable results. Under the hood, a log transformation alters
    the variable itself and distorts both the variation and noise. Understanding this
    subtle mathematical difference behind your models is just as important as trying
    to find the best-fitting model.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '[1] Epoch AI. *Data on Notable AI Models*. Retrieved from [https://epoch.ai/data/notable-ai-models](https://epoch.ai/data/notable-ai-models)'
  prefs: []
  type: TYPE_NORMAL
- en: '[2] University of Virginia Library. *Interpreting Log Transformations in a
    Linear Model.* Retrieved from [https://library.virginia.edu/data/articles/interpreting-log-transformations-in-a-linear-model](https://library.virginia.edu/data/articles/interpreting-log-transformations-in-a-linear-model)'
  prefs: []
  type: TYPE_NORMAL
