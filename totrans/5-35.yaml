  prefs: []
  type: TYPE_NORMAL
  zh: 作者图片
- en: 'The Large Language Model (LLM) course is a collection of topics and educational
    resources for people to get into LLMs. It features two main roadmaps:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 大型语言模型（LLM）课程是为想要进入LLM领域的人收集的主题和教育资源。它有两个主要路线图：
- en: 🧑‍🔬 T**he LLM Scientist** focuses on building the best possible LLMs using the
    latest techniques.
  id: totrans-5
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 🧑‍🔬 **LLM科学家**专注于使用最新技术构建最佳可能的LLM。
- en: 👷 **The LLM Engineer** focuses on creating LLM-based applications and deploying
    them.
  id: totrans-6
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 👷 **LLM工程师**专注于创建基于LLM的应用程序并将它们部署。
- en: For an interactive version of this course, I created an LLM assistant that will
    answer questions and test your knowledge in a personalized way on **[HuggingChat](https://hf.co/chat/assistant/66029d2e5f4a884f7aabc9d1)**
    (recommended) or **[ChatGPT](https://chat.openai.com/g/g-yviLuLqvI-llm-course)**.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 为了提供本课程的交互式版本，我创建了一个LLM助手，它将在**[HuggingChat](https://hf.co/chat/assistant/66029d2e5f4a884f7aabc9d1)**（推荐）或**[ChatGPT](https://chat.openai.com/g/g-yviLuLqvI-llm-course)**上以个性化的方式回答问题并测试你的知识。
- en: 🧑‍🔬 The LLM Scientist
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 🧑‍🔬 **LLM科学家**
- en: This section of the course focuses on learning how to build the best possible
    LLMs using the latest techniques.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 本课程本节重点学习如何使用最新技术构建最佳可能的LLM。
- en: '![Image by author](../Images/09fc651d7af107f848ac6edc7da25f2c.png)'
  id: totrans-10
  prefs: []
  type: TYPE_IMG
  zh: '![作者图片](../Images/09fc651d7af107f848ac6edc7da25f2c.png)'
- en: Image by author
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 作者图片
- en: 1\. The LLM architecture
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1. LLM架构
- en: 'An in-depth knowledge of the Transformer architecture is not required, but
    it’s important to understand the main steps of modern LLMs: converting text into
    numbers through tokenization, processing these tokens through layers including
    attention mechanisms, and finally generating new text through various sampling
    strategies.'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 对Transformer架构的深入了解不是必需的，但了解现代LLM的主要步骤很重要：通过分词将文本转换为数字，通过包括注意力机制在内的层处理这些标记，并通过各种采样策略生成新的文本。
- en: '**Architectural Overview**: Understand the evolution from encoder-decoder Transformers
    to decoder-only architectures like GPT, which form the basis of modern LLMs. Focus
    on how these models process and generate text at a high level.'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**架构概述**：了解从编码器-解码器Transformer到仅解码器架构（如GPT）的演变，这些架构是现代LLM的基础。关注这些模型在高级别上如何处理和生成文本。'
- en: '**Tokenization**: Learn the principles of tokenization – how text is converted
    into numerical representations that LLMs can process. Explore different tokenization
    strategies and their impact on model performance and output quality.'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**分词**：学习分词的原则——文本如何转换为LLM可以处理的数值表示。探索不同的分词策略及其对模型性能和输出质量的影响。'
- en: '**Attention mechanisms**: Master the core concepts of attention mechanisms,
    particularly self-attention and its variants. Understand how these mechanisms
    enable LLMs to process long-range dependencies and maintain context throughout
    sequences.'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**注意力机制**：掌握注意力机制的核心概念，特别是自注意力及其变体。了解这些机制如何使LLM能够处理长距离依赖关系并在序列中保持上下文。'
- en: '**Sampling techniques**: Explore various text generation approaches and their
    tradeoffs. Compare deterministic methods like greedy search and beam search with
    probabilistic approaches like temperature sampling and nucleus sampling.'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**采样技术**：探索各种文本生成方法及其权衡。比较确定性方法，如贪婪搜索和束搜索，与概率方法，如温度采样和核采样。'
- en: '📚 **References**:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: '📚 **参考文献**:'
- en: '[Visual intro to Transformers](https://www.youtube.com/watch?v=wjZofJX0v4M)
    by 3Blue1Brown: Visual introduction to Transformers for complete beginners.'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Transformer视觉介绍](https://www.youtube.com/watch?v=wjZofJX0v4M) by 3Blue1Brown：为初学者提供的Transformer视觉介绍。'
- en: '[LLM Visualization](https://bbycroft.net/llm) by Brendan Bycroft: Interactive
    3D visualization of LLM internals.'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 布伦丹·拜克罗夫特的[LLM可视化](https://bbycroft.net/llm)：LLM内部的交互式3D可视化。
- en: '[nanoGPT](https://www.youtube.com/watch?v=kCc8FmEb1nY) by Andrej Karpathy:
    A 2h-long YouTube video to reimplement GPT from scratch (for programmers). He
    also made a video about [tokenization](https://www.youtube.com/watch?v=zduSFxRajkE).'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 安德烈·卡帕西的[nanoGPT](https://www.youtube.com/watch?v=kCc8FmEb1nY)：一个时长2小时的YouTube视频，从头开始重新实现GPT（适用于程序员）。他还制作了一个关于[分词](https://www.youtube.com/watch?v=zduSFxRajkE)的视频。
- en: '[Attention? Attention!](https://lilianweng.github.io/posts/2018-06-24-attention/)
    by Lilian Weng: Historical overview to introduce the need for attention mechanisms.'
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Attention? Attention!](https://lilianweng.github.io/posts/2018-06-24-attention/)
    by Lilian Weng：介绍注意力机制必要性的历史概述。'
- en: '[Decoding Strategies in LLMs](https://mlabonne.github.io/blog/posts/2023-06-07-Decoding_strategies.html)
    by Maxime Labonne: Provide code and a visual introduction to the different decoding
    strategies to generate text.'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[LLMs中的解码策略](https://mlabonne.github.io/blog/posts/2023-06-07-Decoding_strategies.html)
    by Maxime Labonne：提供代码和不同解码策略生成文本的视觉介绍。'
- en: '* * *'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 2\. Pre-training models
  id: totrans-25
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2. 预训练模型
- en: Pre-training is a computationally intensive and expensive process. While it’s
    not the focus of this course, it’s important to have a solid understanding of
    how models are pre-trained, especially in terms of data and parameters. Pre-training
    can also be performed by hobbyists at a small scale with <1B models.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 预训练是一个计算密集且昂贵的流程。虽然这不是本课程的焦点，但了解模型如何进行预训练，特别是在数据和参数方面，是非常重要的。预训练也可以由爱好者在小规模（<1B模型）上进行。
- en: '**Data preparation**: Pre-training requires massive datasets (e.g., [Llama
    3.1](https://arxiv.org/abs/2307.09288) was trained on 15 trillion tokens) that
    need careful curation, cleaning, deduplication, and tokenization. Modern pre-training
    pipelines implement sophisticated filtering to remove low-quality or problematic
    content.'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据准备**：预训练需要大量数据集（例如，[Llama 3.1](https://arxiv.org/abs/2307.09288)在1500亿个标记上进行了训练），需要仔细的策划、清理、去重和分词。现代预训练管道实施复杂的过滤以移除低质量或问题内容。'
- en: '**Distributed training**: Combine different parallelization strategies: data
    parallel (batch distribution), pipeline parallel (layer distribution), and tensor
    parallel (operation splitting). These strategies require optimized network communication
    and memory management across GPU clusters.'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**分布式训练**：结合不同的并行化策略：数据并行（批量分布）、流水线并行（层分布）和张量并行（操作拆分）。这些策略需要在GPU集群之间优化网络通信和内存管理。'
- en: '**Training optimization**: Use adaptive learning rates with warm-up, gradient
    clipping and normalization to prevent explosions, mixed-precision training for
    memory efficiency, and modern optimizers (AdamW, Lion) with tuned hyperparameters.'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**训练优化**：使用带有预热、梯度裁剪和归一化的自适应学习率以防止爆炸，混合精度训练以提高内存效率，以及具有调整超参数的现代优化器（AdamW, Lion）。'
- en: '**Monitoring**: Track key metrics (loss, gradients, GPU stats) using dashboards,
    implement targeted logging for distributed training issues, and set up performance
    profiling to identify bottlenecks in computation and communication across devices.'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**监控**：使用仪表板跟踪关键指标（损失、梯度、GPU统计），针对分布式训练问题实施有针对性的日志记录，并设置性能分析以识别跨设备计算和通信中的瓶颈。'
- en: '📚 **References**:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 📚 **参考文献**：
- en: '[FineWeb](https://huggingface.co/spaces/HuggingFaceFW/blogpost-fineweb-v1)
    by Penedo et al.: Article to recreate a large-scale dataset for LLM pretraining
    (15T), including FineWeb-Edu, a high-quality subset.'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[FineWeb](https://huggingface.co/spaces/HuggingFaceFW/blogpost-fineweb-v1)
    by Penedo et al.：关于为LLM预训练重建海量数据集（15T）的文章，包括高质量的子集FineWeb-Edu。'
- en: '[RedPajama v2](https://www.together.ai/blog/redpajama-data-v2) by Weber et
    al.: Another article and paper about a large-scale pre-training dataset with a
    lot of interesting quality filters.'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[RedPajama v2](https://www.together.ai/blog/redpajama-data-v2) by Weber et
    al.: 另一篇关于包含许多有趣质量过滤器的海量预训练数据集的文章和论文。'
- en: '[nanotron](https://github.com/huggingface/nanotron) by Hugging Face: Minimalistic
    LLM training codebase used to make [SmolLM2](https://github.com/huggingface/smollm).'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[nanotron](https://github.com/huggingface/nanotron) by Hugging Face：用于制作[SmolLM2](https://github.com/huggingface/smollm)的最小化LLM训练代码库。'
- en: '[Parallel training](https://www.andrew.cmu.edu/course/11-667/lectures/W10L2%20Scaling%20Up%20Parallel%20Training.pdf)
    by Chenyan Xiong: Overview of optimization and parallelism techniques.'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[并行训练](https://www.andrew.cmu.edu/course/11-667/lectures/W10L2%20Scaling%20Up%20Parallel%20Training.pdf)
    by Chenyan Xiong：优化和并行技术概述。'
- en: '[Distributed training](https://arxiv.org/abs/2407.20018) by Duan et al.: A
    survey about efficient training of LLM on distributed architectures.'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[分布式训练](https://arxiv.org/abs/2407.20018) by Duan et al.：关于在分布式架构上高效训练LLM的调查。'
- en: '[OLMo 2](https://allenai.org/olmo) by AI2: Open-source language model with
    model, data, training, and evaluation code.'
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[OLMo 2](https://allenai.org/olmo) by AI2：开源语言模型，包含模型、数据、训练和评估代码。'
- en: '[LLM360](https://www.llm360.ai/) by LLM360: A framework for open-source LLMs
    with training and data preparation code, data, metrics, and models.'
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[LLM360](https://www.llm360.ai/) 由 LLM360 提供：一个开源 LLM 的框架，包括训练和数据准备代码、数据、指标和模型。'
- en: '* * *'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 3\. Post-training datasets
  id: totrans-40
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3. 后训练数据集
- en: Post-training datasets have a precise structure with instructions and answers
    (supervised fine-tuning) or instructions and chosen/rejected answers (preference
    alignment). Conversational structures are a lot rarer than the raw text used for
    pre-training, which is why we often need to process seed data and refine it to
    improve the accuracy, diversity, and complexity of the samples. More information
    and examples are available in my repo [💾 LLM Datasets](https://github.com/mlabonne/llm-datasets).
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 后训练数据集具有精确的结构，包含指令和答案（监督微调）或指令和选择的/拒绝的答案（偏好对齐）。对话结构比用于预训练的原始文本要少得多，这就是为什么我们经常需要处理种子数据并对其进行细化，以提高样本的准确性、多样性和复杂性。更多信息示例可在我的仓库
    [💾 LLM 数据集](https://github.com/mlabonne/llm-datasets) 中找到。
- en: '**Storage & chat templates**: Because of the conversational structure, post-training
    datasets are stored in a specific format like ShareGPT or OpenAI/HF. Then, these
    formats are mapped to a chat template like ChatML or Alpaca to produce the final
    samples the model is trained on.'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**存储与聊天模板**：由于对话结构，后训练数据集存储在特定格式中，如 ShareGPT 或 OpenAI/HF。然后，这些格式映射到聊天模板，如 ChatML
    或 Alpaca，以生成模型训练的最终样本。'
- en: '**Synthetic data generation**: Create instruction-response pairs based on seed
    data using frontier models like GPT-4o. This approach allows for flexible and
    scalable dataset creation with high-quality answers. Key considerations include
    designing diverse seed tasks and effective system prompts.'
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**合成数据生成**：使用 GPT-4o 等前沿模型根据种子数据创建指令-响应对。这种方法允许灵活且可扩展地创建具有高质量答案的数据集。关键考虑因素包括设计多样化的种子任务和有效的系统提示。'
- en: '**Data enhancement**: Enhance existing samples using techniques like verified
    outputs (using unit tests or solvers), multiple answers with rejection sampling,
    [Auto-Evol](https://arxiv.org/abs/2406.00770), Chain-of-Thought, Branch-Solve-Merge,
    personas, etc.'
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据增强**：使用验证输出（使用单元测试或求解器）、拒绝采样、[Auto-Evol](https://arxiv.org/abs/2406.00770)、思维链、分支-解决-合并、角色扮演等技巧增强现有样本。'
- en: '**Quality filtering**: Traditional techniques involve rule-based filtering,
    removing duplicates or near-duplicates (with MinHash or embeddings), and n-gram
    decontamination. Reward models and judge LLMs complement this step with fine-grained
    and customizable quality control.'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**质量过滤**：传统技术涉及基于规则的过滤，移除重复或近似重复项（使用 MinHash 或嵌入），以及 n-gram 清洗。奖励模型和评估 LLM
    补充这一步骤，提供细粒度和可定制的质量控制。'
- en: '📚 **References**:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 📚 **参考文献**：
- en: '[Synthetic Data Generator](https://huggingface.co/spaces/argilla/synthetic-data-generator)
    by Argilla: Beginner-friendly way of building datasets using natural language
    in a Hugging Face space.'
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[合成数据生成器](https://huggingface.co/spaces/argilla/synthetic-data-generator) 由
    Argilla 提供：在 Hugging Face 空间中使用自然语言构建数据集的入门友好方式。'
- en: '[LLM Datasets](https://github.com/mlabonne/llm-datasets) by Maxime Labonne:
    Curated list of datasets and tools for post-training.'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[LLM 数据集](https://github.com/mlabonne/llm-datasets) 由 Maxime Labonne 提供：后训练数据集和工具的整理列表。'
- en: '[NeMo-Curator](https://github.com/NVIDIA/NeMo-Curator) by Nvidia: Dataset preparation
    and curation framework for pre and post-training data.'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[NeMo-Curator](https://github.com/NVIDIA/NeMo-Curator) 由 Nvidia 提供：用于预训练和后训练数据的数据集准备和整理框架。'
- en: '[Distilabel](https://distilabel.argilla.io/dev/sections/pipeline_samples/)
    by Argilla: Framework to generate synthetic data. It also includes interesting
    reproductions of papers like UltraFeedback.'
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Distilabel](https://distilabel.argilla.io/dev/sections/pipeline_samples/)
    由 Argilla 提供：生成合成数据的框架。它还包括对 UltraFeedback 等论文的有趣重现。'
- en: '[Semhash](https://github.com/MinishLab/semhash) by MinishLab: Minimalistic
    library for near-deduplication and decontamination with a distilled embedding
    model.'
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Semhash](https://github.com/MinishLab/semhash) 由 MinishLab 提供：用于近似去重和去污染的精简库，具有蒸馏嵌入模型。'
- en: '[Chat Template](https://huggingface.co/docs/transformers/main/en/chat_templating)
    by Hugging Face: Hugging Face’s documentation about chat templates.'
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[聊天模板](https://huggingface.co/docs/transformers/main/en/chat_templating) 由
    Hugging Face 提供：Hugging Face 关于聊天模板的文档。'
- en: '* * *'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 4\. Supervised Fine-Tuning
  id: totrans-54
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4. 监督微调
- en: 'SFT turns base models into helpful assistants, capable of answering questions
    and following instructions. During this process, they learn how to structure answers
    and reactivate a subset of knowledge learned during pre-training. Instilling new
    knowledge is possible but superficial: it cannot be used to learn a completely
    new language. Always prioritize data quality over parameter optimization.'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: SFT将基础模型转变为有用的助手，能够回答问题和遵循指令。在这个过程中，它们学习如何构建答案并重新激活在预训练期间学习到的知识子集。灌输新知识是可能的，但只是表面的：它不能用来学习一种全新的语言。始终优先考虑数据质量而不是参数优化。
- en: '**Training techniques**: Full fine-tuning updates all model parameters but
    requires significant compute. Parameter-efficient fine-tuning techniques like
    LoRA and QLoRA reduce memory requirements by training a small number of adapter
    parameters while keeping base weights frozen. QLoRA combines 4-bit quantization
    with LoRA to reduce VRAM usage.'
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**训练技术**：全量微调更新所有模型参数，但需要大量的计算资源。像LoRA和QLoRA这样的参数高效微调技术通过训练少量适配器参数同时保持基础权重冻结来减少内存需求。QLoRA将4位量化与LoRA结合以减少VRAM使用。'
- en: '**Training parameters**: Key parameters include learning rate with schedulers,
    batch size, gradient accumulation, number of epochs, optimizer (like 8-bit AdamW),
    weight decay for regularization, and warmup steps for training stability. LoRA
    also adds three parameters: rank (typically 16–128), alpha (1–2x rank), and target
    modules.'
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**训练参数**：关键参数包括带有调度器的学习率、批大小、梯度累积、训练轮数、优化器（如8位AdamW）、正则化的权重衰减和训练稳定性的预热步骤。LoRA还增加了三个参数：rank（通常为16-128）、alpha（1-2倍rank）和目标模块。'
- en: '**Distributed training**: Scale training across multiple GPUs using DeepSpeed
    or FSDP. DeepSpeed provides three ZeRO optimization stages with increasing levels
    of memory efficiency through state partitioning. Both methods support gradient
    checkpointing for memory efficiency.'
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**分布式训练**：使用DeepSpeed或FSDP在多个GPU上扩展训练规模。DeepSpeed通过状态分区提供三个ZeRO优化阶段，随着内存效率的提高而增加。两种方法都支持梯度检查点以提高内存效率。'
- en: '**Monitoring**: Track training metrics including loss curves, learning rate
    schedules, and gradient norms. Monitor for common issues like loss spikes, gradient
    explosions, or performance degradation.'
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**监控**：跟踪训练指标，包括损失曲线、学习率调度和梯度范数。监控常见问题，如损失激增、梯度爆炸或性能下降。'
- en: '📚 **References**:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 📚 **参考文献**：
- en: '[Fine-tune Llama 3.1 Ultra-Efficiently with Unsloth](https://huggingface.co/blog/mlabonne/sft-llama3)
    by Maxime Labonne: Hands-on tutorial on how to fine-tune a Llama 3.1 model using
    Unsloth.'
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[使用Unsloth高效微调Llama 3.1](https://huggingface.co/blog/mlabonne/sft-llama3) by
    Maxime Labonne：关于如何使用Unsloth微调Llama 3.1模型的实战教程。'
- en: '[Axolotl – Documentation](https://axolotl-ai-cloud.github.io/axolotl/) by Wing
    Lian: Lots of interesting information related to distributed training and dataset
    formats.'
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Axolotl – 文档](https://axolotl-ai-cloud.github.io/axolotl/) by Wing Lian：与分布式训练和数据集格式相关的许多有趣信息。'
- en: '[Mastering LLMs](https://parlance-labs.com/education/) by Hamel Husain: Collection
    of educational resources about fine-tuning (but also RAG, evaluation, applications,
    and prompt engineering).'
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[掌握大型语言模型](https://parlance-labs.com/education/) by Hamel Husain：关于微调（但还包括RAG、评估、应用和提示工程）的教育资源集合。'
- en: '[LoRA insights](https://lightning.ai/pages/community/lora-insights/) by Sebastian
    Raschka: Practical insights about LoRA and how to select the best parameters.'
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[LoRA洞察](https://lightning.ai/pages/community/lora-insights/) by Sebastian
    Raschka：关于LoRA的实际见解以及如何选择最佳参数。'
- en: '* * *'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 5\. Preference Alignment
  id: totrans-66
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 5. 偏好对齐
- en: 'Preference alignment is a second stage in the post-training pipeline, focused
    on aligning generated answers with human preferences. This stage was designed
    to tune the tone of LLMs and reduce toxicity and hallucinations. However, it has
    become increasingly important to also boost their performance and improve usefulness.
    Unlike SFT, there are many preference alignment algorithms. Here, we’ll focus
    on the two most important ones: DPO and PPO.'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 偏好对齐是训练后管道的第二阶段，专注于使生成的答案与人类偏好对齐。这个阶段旨在调整LLM的语气并减少毒性和幻觉。然而，提高其性能和有用性也变得越来越重要。与SFT不同，有许多偏好对齐算法。在这里，我们将重点关注两个最重要的算法：DPO和PPO。
- en: '**Rejection sampling**: For each prompt, use the trained model to generate
    multiple responses, and score them to infer chosen/rejected answers. This creates
    on-policy data, where both responses come from the model being trained, improving
    alignment stability.'
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**拒绝采样**：对于每个提示，使用训练好的模型生成多个响应，并对它们进行评分以推断选择的/拒绝的答案。这创建了一种在线策略数据，其中两个响应都来自正在训练的模型，从而提高了对齐稳定性。'
- en: '**[Direct Preference Optimization](https://arxiv.org/abs/2305.18290)** Directly
    optimizes the policy to maximize the likelihood of chosen responses over rejected
    ones. It doesn’t require reward modeling, which makes it more computationally
    efficient than PPO but slightly worse in terms of quality.'
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**[直接偏好优化](https://arxiv.org/abs/2305.18290)**：直接优化策略以最大化选择响应相对于拒绝响应的可能性。它不需要奖励建模，这使得它在计算效率上比
    PPO 更高，但在质量上略差。'
- en: '**[Proximal Policy Optimization](https://arxiv.org/abs/1707.06347)**: Iteratively
    updates policy to maximize reward while staying close to initial behavior. It
    uses a reward model to score responses and requires careful tuning of hyperparameters
    including learning rate, batch size, and PPO clip range.'
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**[近端策略优化](https://arxiv.org/abs/1707.06347)**：迭代更新策略以最大化奖励，同时保持接近初始行为。它使用奖励模型对响应进行评分，并需要仔细调整包括学习率、批量大小和
    PPO 剪切范围在内的超参数。'
- en: '**Monitoring**: In addition to SFT metrics, you want to maximize the margin
    between chosen and preferred answers. The accuracy should also gradually increase
    until it plateaus.'
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**监控**：除了 SFT 指标外，您还希望最大化选择答案和偏好答案之间的差距。准确性也应逐渐增加，直到达到平台期。'
- en: '📚 **References**:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 📚 **参考文献**：
- en: '[Illustrating RLHF](https://huggingface.co/blog/rlhf) by Hugging Face: Introduction
    to RLHF with reward model training and fine-tuning with reinforcement learning.'
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Hugging Face 介绍 RLHF](https://huggingface.co/blog/rlhf)：通过奖励模型训练和强化学习微调介绍
    RLHF。'
- en: '[LLM Training: RLHF and Its Alternatives](https://magazine.sebastianraschka.com/p/llm-training-rlhf-and-its-alternatives)
    by Sebastian Rashcka: Overview of the RLHF process and alternatives like RLAIF.'
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Sebastian Rashcka 介绍 LLM 训练：RLHF 及其替代方案](https://magazine.sebastianraschka.com/p/llm-training-rlhf-and-its-alternatives)：概述
    RLHF 流程及其替代方案如 RLAIF。'
- en: '[Preference Tuning LLMs](https://huggingface.co/blog/pref-tuning) by Hugging
    Face: Comparison of the DPO, IPO, and KTO algorithms to perform preference alignment.'
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Hugging Face 介绍偏好调整 LLMs](https://huggingface.co/blog/pref-tuning)：比较 DPO、IPO
    和 KTO 算法以执行偏好对齐。'
- en: '[Fine-tune Mistral-7b with DPO](https://mlabonne.github.io/blog/posts/Fine_tune_Mistral_7b_with_DPO.html)
    by Maxime Labonne: Tutorial to fine-tune a Mistral-7b model with DPO and reproduce
    [NeuralHermes-2.5](https://huggingface.co/mlabonne/NeuralHermes-2.5-Mistral-7B).'
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Maxime Labonne 使用 DPO 微调 Mistral-7b](https://mlabonne.github.io/blog/posts/Fine_tune_Mistral_7b_with_DPO.html)：教程，使用
    DPO 微调 Mistral-7b 模型并重现 [NeuralHermes-2.5](https://huggingface.co/mlabonne/NeuralHermes-2.5-Mistral-7B)。'
- en: '[DPO Wandb logs](https://wandb.ai/alexander-vishnevskiy/dpo/reports/TRL-Original-DPO--Vmlldzo1NjI4MTc4)
    by Alexander Vishnevskiy: It shows you the main metrics to track and the trends
    you should expect.'
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Alexander Vishnevskiy 的 DPO Wandb 日志](https://wandb.ai/alexander-vishnevskiy/dpo/reports/TRL-Original-DPO--Vmlldzo1NjI4MTc4)：它展示了您需要跟踪的主要指标和您应该预期的趋势。'
- en: '* * *'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 6\. Evaluation
  id: totrans-79
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 6\. 评估
- en: 'Reliably evaluating LLMs is a complex but essential task guiding data generation
    and training. It provides invaluable feedback about areas of improvement, which
    can be leveraged to modify the data mixture, quality, and training parameters.
    However, it’s always good to remember Goodhart’s law: "When a measure becomes
    a target, it ceases to be a good measure."'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 可靠地评估 LLMs 是一个复杂但至关重要的任务，它指导数据生成和训练。它提供了关于改进领域的宝贵反馈，可以利用这些反馈来修改数据混合、质量和训练参数。然而，始终记住
    Goodhart 定律：“当一项衡量标准成为目标时，它就不再是一个好的衡量标准。”
- en: '**Automated benchmarks**: Evaluate models on specific tasks using curated datasets
    and metrics, like MMLU. It works well for concrete tasks but struggles with abstract
    and creative capabilities. It is also prone to data contamination.'
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自动化基准测试**：使用精选数据集和指标（如 MMLU）在特定任务上评估模型。它对于具体任务效果良好，但在抽象和创造性能力方面存在困难。它也容易受到数据污染的影响。'
- en: '**Human evaluation**: It involves humans prompting models and grading responses.
    Methods range from vibe checks to systematic annotations with specific guidelines
    and large-scale community voting (arena). It is more suited for subjective tasks
    and less reliable for factual accuracy.'
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**人工评估**：涉及人类提示模型并对响应进行评分。方法从感觉检查到具有具体指南的系统注释和大规模社区投票（竞技场）。它更适合主观任务，对于事实准确性来说不太可靠。'
- en: '**Model-based evaluation**: Use judge and reward models to evaluate model outputs.
    It highly correlates with human preferences but suffers from bias toward their
    own outputs and inconsistent scoring.'
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**基于模型的评估**：使用评判和奖励模型来评估模型输出。它与人类偏好高度相关，但存在对其自身输出的偏差和评分不一致的问题。'
- en: '**Feedback signal**: Analyze error patterns to identify specific weaknesses,
    such as limitations in following complex instructions, lack of specific knowledge,
    or susceptibility to adversarial prompts. This can be improved with better data
    generation and training parameters.'
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**反馈信号**：分析错误模式以识别特定的弱点，例如在遵循复杂指令方面的局限性、缺乏特定知识或易受对抗性提示的影响。这可以通过更好的数据生成和训练参数来改进。'
- en: '📚 **References**:'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: '📚 **参考文献**:'
- en: '[Evaluation guidebook](https://github.com/huggingface/evaluation-guidebook)
    by Clémentine Fourrier: Practical insights and theoretical knowledge about LLM
    evaluation.'
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[评估指南](https://github.com/huggingface/evaluation-guidebook) by Clémentine Fourrier：关于LLMs评估的实用见解和理论知识。'
- en: '[Open LLM Leaderboard](https://huggingface.co/spaces/open-llm-leaderboard/open_llm_leaderboard)
    by Hugging Face: Main leaderboard to compare LLMs in an open and reproducible
    way (automated benchmarks).'
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[开放LLM排行榜](https://huggingface.co/spaces/open-llm-leaderboard/open_llm_leaderboard)
    by Hugging Face：主要排行榜，以开放和可重复的方式比较LLMs（自动化基准）。'
- en: '[Language Model Evaluation Harness](https://github.com/EleutherAI/lm-evaluation-harness)
    by EleutherAI: A popular framework for evaluating LLMs using automated benchmarks.'
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[语言模型评估工具](https://github.com/EleutherAI/lm-evaluation-harness) by EleutherAI：使用自动化基准评估LLMs的流行框架。'
- en: '[Lighteval](https://github.com/huggingface/lighteval) by Hugging Face: Alternative
    evaluation framework that also includes model-based evaluations.'
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Lighteval](https://github.com/huggingface/lighteval) by Hugging Face：包括基于模型评估的替代评估框架。'
- en: '[Chatbot Arena](https://lmarena.ai/) by LMSYS: Elo rating of general-purpose
    LLMs, based on comparisons made by humans (human evaluation).'
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[聊天机器人竞技场](https://lmarena.ai/) by LMSYS：基于人类比较（人工评估）的通用LLMs的Elo评级。'
- en: '* * *'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 7\. Quantization
  id: totrans-92
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 7. 量化
- en: Quantization is the process of converting the parameters and activations of
    a model using a lower precision. For example, weights stored using 16 bits can
    be converted into a 4-bit representation. This technique has become increasingly
    important to reduce the computational and memory costs associated with LLMs.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 量化是将模型参数和激活转换为低精度过程。例如，使用16位存储的权重可以转换为4位表示。这种技术对于降低与LLMs相关的计算和内存成本变得越来越重要。
- en: '**Base techniques**: Learn the different levels of precision (FP32, FP16, INT8,
    etc.) and how to perform naïve quantization with absmax and zero-point techniques.'
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**基础技术**：学习不同精度的级别（FP32、FP16、INT8等）以及如何使用absmax和零点技术进行简单的量化。'
- en: '**GGUF & [llama.cpp](https://github.com/ggerganov/llama.cpp)**: Originally
    designed to run on CPUs, llama.cpp and the GGUF format have become the most popular
    tools to run LLMs on consumer-grade hardware. It supports storing special tokens,
    vocabulary, and metadata in a single file.'
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**GGUF & [llama.cpp](https://github.com/ggerganov/llama.cpp)**：最初设计用于在CPU上运行，llama.cpp和GGUF格式已成为在消费级硬件上运行LLMs的最受欢迎的工具。它支持将特殊标记、词汇表和元数据存储在单个文件中。'
- en: '**[GPTQ](https://arxiv.org/abs/2210.17323) & [AWQ](https://arxiv.org/abs/2306.00978)**:
    Techniques like GPTQ/[EXL2](https://github.com/turboderp/exllamav2) and AWQ introduce
    layer-by-layer calibration that retains performance at extremely low bitwidths.
    They reduce catastrophic outliers using dynamic scaling, selectively skipping
    or re-centering the heaviest parameters.'
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**[GPTQ](https://arxiv.org/abs/2210.17323) & [AWQ](https://arxiv.org/abs/2306.00978)**：GPTQ/[EXL2](https://github.com/turboderp/exllamav2)和AWQ等技术通过逐层校准在极低位宽下保持性能。它们使用动态缩放来减少灾难性异常，选择性地跳过或重新校准最重的参数。'
- en: '**SmoothQuant & ZeroQuant**: New quantization-friendly transformations (SmoothQuant)
    and compiler-based optimizations (ZeroQuant) help mitigate outliers before quantization.
    They also reduce hardware overhead by fusing certain ops and optimizing dataflow.'
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**SmoothQuant & ZeroQuant**：新的量化友好型转换（SmoothQuant）和基于编译器的优化（ZeroQuant）有助于在量化之前减轻异常。它们还通过融合某些操作和优化数据流来减少硬件开销。'
- en: '📚 **References**:'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: '📚 **参考文献**:'
- en: '[Introduction to quantization](https://mlabonne.github.io/blog/posts/Introduction_to_Weight_Quantization.html)
    by Maxime Labonne: Overview of quantization, absmax and zero-point quantization,
    and LLM.int8() with code.'
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[量化简介](https://mlabonne.github.io/blog/posts/Introduction_to_Weight_Quantization.html)
    by Maxime Labonne：量化概述，包括absmax和零点量化，以及带有代码的LLM.int8()。'
- en: '[Quantize Llama models with llama.cpp](https://mlabonne.github.io/blog/posts/Quantize_Llama_2_models_using_ggml.html)
    by Maxime Labonne: Tutorial on how to quantize a Llama 2 model using llama.cpp
    and the GGUF format.'
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[使用 llama.cpp 量化 Llama 模型](https://mlabonne.github.io/blog/posts/Quantize_Llama_2_models_using_ggml.html)
    by Maxime Labonne：关于如何使用 llama.cpp 和 GGUF 格式量化 Llama 2 模型的教程。'
- en: '[4-bit LLM Quantization with GPTQ](https://mlabonne.github.io/blog/posts/4_bit_Quantization_with_GPTQ.html)
    by Maxime Labonne: Tutorial on how to quantize an LLM using the GPTQ algorithm
    with AutoGPTQ.'
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[使用 GPTQ 进行 4-bit LLM 量化](https://mlabonne.github.io/blog/posts/4_bit_Quantization_with_GPTQ.html)
    by Maxime Labonne：关于如何使用 GPTQ 算法和 AutoGPTQ 量化 LLM 的教程。'
- en: '[Understanding Activation-Aware Weight Quantization](https://medium.com/friendliai/understanding-activation-aware-weight-quantization-awq-boosting-inference-serving-efficiency-in-10bb0faf63a8)
    by FriendliAI: Overview of the AWQ technique and its benefits.'
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[理解激活感知权重量化](https://medium.com/friendliai/understanding-activation-aware-weight-quantization-awq-boosting-inference-serving-efficiency-in-10bb0faf63a8)
    by FriendliAI：关于 AWQ 技术及其益处的概述。'
- en: '[SmoothQuant on Llama 2 7B](https://github.com/mit-han-lab/smoothquant/blob/main/examples/smoothquant_llama_demo.ipynb)
    by MIT HAN Lab: Tutorial on how to use SmoothQuant with a Llama 2 model in 8-bit
    precision.'
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[在 Llama 2 7B 上使用 SmoothQuant](https://github.com/mit-han-lab/smoothquant/blob/main/examples/smoothquant_llama_demo.ipynb)
    by MIT HAN Lab：关于如何在 8 位精度下使用 SmoothQuant 与 Llama 2 模型一起使用的教程。'
- en: '[DeepSpeed Model Compression](https://www.deepspeed.ai/tutorials/model-compression/)
    by DeepSpeed: Tutorial on how to use ZeroQuant and extreme compression (XTC) with
    DeepSpeed Compression.'
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[DeepSpeed 模型压缩](https://www.deepspeed.ai/tutorials/model-compression/) by
    DeepSpeed：关于如何使用 ZeroQuant 和极端压缩（XTC）与 DeepSpeed 压缩一起使用的教程。'
- en: '* * *'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 8\. New Trends
  id: totrans-106
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 8. 新趋势
- en: Here are notable topics that didn’t fit into other categories. Some are established
    (model merging, multimodal) techniques, but others are more experimental (interpretability,
    test-time compute scaling) and the focus of numerous research papers.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些不适合其他类别的显著主题。其中一些是已建立的（模型合并、多模态）技术，但其他一些则是更实验性的（可解释性、测试时计算扩展）并且是众多研究论文的焦点。
- en: '**Model merging**: Merging trained models has become a popular way of creating
    performant models without any fine-tuning. The popular [mergekit](https://github.com/cg123/mergekit)
    library implements the most popular merging methods, like SLERP, [DARE](https://arxiv.org/abs/2311.03099),
    and [TIES](https://arxiv.org/abs/2311.03099).'
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**模型合并**：合并训练好的模型已成为创建高性能模型而不进行微调的一种流行方式。流行的 [mergekit](https://github.com/cg123/mergekit)
    库实现了最流行的合并方法，如 SLERP、[DARE](https://arxiv.org/abs/2311.03099) 和 [TIES](https://arxiv.org/abs/2311.03099)。'
- en: '**Multimodal models**: These models (like [CLIP](https://openai.com/research/clip),
    [Stable Diffusion](https://stability.ai/stable-image), or [LLaVA](https://llava-vl.github.io/))
    process multiple types of inputs (text, images, audio, etc.) with a unified embedding
    space, which unlocks powerful applications like text-to-image.'
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**多模态模型**：这些模型（如 [CLIP](https://openai.com/research/clip)、[Stable Diffusion](https://stability.ai/stable-image)
    或 [LLaVA](https://llava-vl.github.io/)) 使用统一的嵌入空间处理多种类型的输入（文本、图像、音频等），这解锁了如文本到图像等强大的应用。'
- en: '**Interpretability**: Mechanistic interpretability techniques like Sparse Autoencoders
    (SAEs) made remarkable progress to provide insights about the inner workings of
    LLMs. This has also been applied with techniques such as abliteration, which allow
    you to modify the behavior of models without training.'
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可解释性**：机制可解释性技术，如稀疏自动编码器（SAEs），在提供关于 LLM 内部工作原理的见解方面取得了显著进展。这也已应用于如消融等技术，这些技术允许你在不进行训练的情况下修改模型的行为。'
- en: '**Test-time compute**: Scaling the compute budget during test time requires
    numerous calls and involves specialized models like a Process Reward Model (PRM).
    Iterative steps with precise scoring significantly improve performance for complex
    reasoning tasks.'
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**测试时计算**：在测试时扩展计算预算需要多次调用，并涉及像进程奖励模型（PRM）这样的专用模型。通过精确评分的迭代步骤可以显著提高复杂推理任务的表现。'
- en: '📚 **References**:'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 📚 **参考文献**：
- en: '[Merge LLMs with mergekit](https://mlabonne.github.io/blog/posts/2024-01-08_Merge_LLMs_with_mergekit.html)
    by Maxime Labonne: Tutorial about model merging using mergekit.'
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[使用 mergekit 合并 LLMs](https://mlabonne.github.io/blog/posts/2024-01-08_Merge_LLMs_with_mergekit.html)
    by Maxime Labonne：关于使用 mergekit 进行模型合并的教程。'
- en: '[Smol Vision](https://github.com/merveenoyan/smol-vision) by Merve Noyan: Collection
    of notebooks and scripts dedicated to small multimodal models.'
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Smol Vision](https://github.com/merveenoyan/smol-vision) by Merve Noyan：针对小型多模态模型的笔记本和脚本的集合。'
- en: '[Large Multimodal Models](https://huyenchip.com/2023/10/10/multimodal.html)
    by Chip Huyen: Overview of multimodal systems and the recent history of this field.'
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[大型多模态模型](https://huyenchip.com/2023/10/10/multimodal.html) by Chip Huyen：多模态系统和该领域最近历史的概述。'
- en: '[Unsensor any LLM with abliteration](https://huggingface.co/blog/mlabonne/abliteration)
    by Maxime Labonne: Direct application of interpretability techniques to modify
    the style of a model.'
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[使用 abliteration 解锁任何 LLM](https://huggingface.co/blog/mlabonne/abliteration)
    by Maxime Labonne：将可解释性技术直接应用于修改模型的风格。'
- en: '[Intuitive Explanation of SAEs](https://adamkarvonen.github.io/machine_learning/2024/06/11/sae-intuitions.html)
    by Adam Karvonen: Article about how SAEs work and why they make sense for interpretability.'
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[SAEs 的直观解释](https://adamkarvonen.github.io/machine_learning/2024/06/11/sae-intuitions.html)
    by Adam Karvonen：关于 SAEs 如何工作以及为什么它们对可解释性有意义的文章。'
- en: '[Scaling test-time compute](https://huggingface.co/spaces/HuggingFaceH4/blogpost-scaling-test-time-compute)
    by Beeching et al.: Tutorial and experiments to outperform Llama 3.1 70B on MATH-500
    with a 3B model.'
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[缩放测试时计算](https://huggingface.co/spaces/HuggingFaceH4/blogpost-scaling-test-time-compute)
    by Beeching 等人：教程和实验，使用 3B 模型在 MATH-500 上超越 Llama 3.1 70B。'
- en: 👷 The LLM Engineer
  id: totrans-119
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 👷 LLM 工程师
- en: This section of the course focuses on learning how to build LLM-powered applications
    that can be used in production, with a focus on augmenting models and deploying
    them.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 本课程本节重点介绍如何构建可用于生产的 LLM 驱动的应用程序，重点关注增强模型和部署。
- en: '![Image by author](../Images/95a3a114b8566559fb649129e690abc5.png)'
  id: totrans-121
  prefs: []
  type: TYPE_IMG
  zh: '![作者图片](../Images/95a3a114b8566559fb649129e690abc5.png)'
- en: Image by author
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 作者图片
- en: 1\. Running LLMs
  id: totrans-123
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1. 运行 LLM
- en: Running LLMs can be difficult due to high hardware requirements. Depending on
    your use case, you might want to simply consume a model through an API (like GPT-4)
    or run it locally. In any case, additional prompting and guidance techniques can
    improve and constrain the output for your applications.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 运行大型语言模型（LLM）可能由于硬件要求高而变得困难。根据您的用例，您可能只想通过 API（如 GPT-4）消费模型，或者本地运行它。在任何情况下，额外的提示和指导技术都可以改善并约束您应用程序的输出。
- en: '**LLM APIs**: APIs are a convenient way to deploy LLMs. This space is divided
    between private LLMs ([OpenAI](https://platform.openai.com/), [Google](https://cloud.google.com/vertex-ai/docs/generative-ai/learn/overview),
    [Anthropic](https://docs.anthropic.com/claude/reference/getting-started-with-the-api),
    [Cohere](https://docs.cohere.com/docs), etc.) and open-source LLMs ([OpenRouter](https://openrouter.ai/),
    [Hugging Face](https://huggingface.co/inference-api), [Together AI](https://www.together.ai/),
    etc.).'
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**LLM API**：API 是部署 LLM 的便捷方式。这个领域被私有 LLM（[OpenAI](https://platform.openai.com/)、[Google](https://cloud.google.com/vertex-ai/docs/generative-ai/learn/overview)、[Anthropic](https://docs.anthropic.com/claude/reference/getting-started-with-the-api)、[Cohere](https://docs.cohere.com/docs)
    等）和开源 LLM（[OpenRouter](https://openrouter.ai/)、[Hugging Face](https://huggingface.co/inference-api)、[Together
    AI](https://www.together.ai/) 等）所分割。'
- en: '**Open-source LLMs**: The [Hugging Face Hub](https://huggingface.co/models)
    is a great place to find LLMs. You can directly run some of them in [Hugging Face
    Spaces](https://huggingface.co/spaces), or download and run them locally in apps
    like [LM Studio](https://lmstudio.ai/) or through the CLI with [llama.cpp](https://github.com/ggerganov/llama.cpp)
    or [Ollama](https://ollama.ai/).'
  id: totrans-126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**开源 LLM**：[Hugging Face Hub](https://huggingface.co/models) 是寻找 LLM 的好地方。您可以直接在
    [Hugging Face Spaces](https://huggingface.co/spaces) 中运行其中的一些，或者下载并在 [LM Studio](https://lmstudio.ai/)
    或通过 CLI 使用 [llama.cpp](https://github.com/ggerganov/llama.cpp) 或 [Ollama](https://ollama.ai/)
    本地运行它们。'
- en: '**Prompt engineering**: Common techniques include zero-shot prompting, few-shot
    prompting, chain of thought, and ReAct. They work better with bigger models, but
    can be adapted to smaller ones.'
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**提示工程**：常见技术包括零样本提示、少量样本提示、思维链和 ReAct。它们与更大的模型配合得更好，但也可以适应较小的模型。'
- en: '**Structuring outputs**: Many tasks require a structured output, like a strict
    template or a JSON format. Libraries like [LMQL](https://lmql.ai/), [Outlines](https://github.com/outlines-dev/outlines),
    [Guidance](https://github.com/guidance-ai/guidance), etc. can be used to guide
    the generation and respect a given structure.'
  id: totrans-128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**结构化输出**：许多任务需要结构化输出，如严格的模板或 JSON 格式。可以使用 [LMQL](https://lmql.ai/)、[Outlines](https://github.com/outlines-dev/outlines)、[Guidance](https://github.com/guidance-ai/guidance)
    等库来引导生成并尊重给定的结构。'
- en: '📚 **References**:'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 📚 **参考文献**：
- en: '[Run an LLM locally with LM Studio](https://www.kdnuggets.com/run-an-llm-locally-with-lm-studio)
    by Nisha Arya: Short guide on how to use LM Studio.'
  id: totrans-130
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[使用 LM Studio 本地运行 LLM](https://www.kdnuggets.com/run-an-llm-locally-with-lm-studio)
    by Nisha Arya：如何使用 LM Studio 的简短指南。'
- en: '[Prompt engineering guide](https://www.promptingguide.ai/) by DAIR.AI: Exhaustive
    list of prompt techniques with examples'
  id: totrans-131
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[DAIR.AI的提示工程指南](https://www.promptingguide.ai/)：包含示例的提示技术详尽列表'
- en: '[Outlines – Quickstart](https://dottxt-ai.github.io/outlines/latest/quickstart/):
    List of guided generation techniques enabled by Outlines.'
  id: totrans-132
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[大纲 – 快速入门](https://dottxt-ai.github.io/outlines/latest/quickstart/)：Outlines启用的引导生成技术列表。'
- en: '[LMQL – Overview](https://lmql.ai/docs/language/overview.html): Introduction
    to the LMQL language.'
  id: totrans-133
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[LMQL – 概述](https://lmql.ai/docs/language/overview.html)：LMQL语言的介绍。'
- en: '* * *'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 2\. Building a Vector Storage
  id: totrans-135
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2. 构建向量存储
- en: Creating a vector storage is the first step to building a Retrieval Augmented
    Generation (RAG) pipeline. Documents are loaded, split, and relevant chunks are
    used to produce vector representations (embeddings) that are stored for future
    use during inference.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 创建向量存储是构建检索增强生成（RAG）管道的第一步。文档被加载、拆分，并使用相关的片段来生成用于未来推理的向量表示（嵌入）。
- en: '**Ingesting documents**: Document loaders are convenient wrappers that can
    handle many formats: PDF, JSON, HTML, Markdown, etc. They can also directly retrieve
    data from some databases and APIs (GitHub, Reddit, Google Drive, etc.).'
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**文档摄取**：文档加载器是方便的包装器，可以处理多种格式：PDF、JSON、HTML、Markdown等。它们还可以直接从某些数据库和API（GitHub、Reddit、Google
    Drive等）检索数据。'
- en: '**Splitting documents**: Text splitters break down documents into smaller,
    semantically meaningful chunks. Instead of splitting text after *n* characters,
    it’s often better to split by header or recursively, with some additional metadata.'
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**文档拆分**：文本拆分器将文档分解成更小、语义上有意义的片段。与在*n*个字符后拆分文本相比，通常更好的做法是根据标题或递归拆分，并附带一些额外的元数据。'
- en: '**Embedding models**: Embedding models convert text into vector representations.
    It allows for a deeper and more nuanced understanding of language, which is essential
    to perform semantic search.'
  id: totrans-139
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**嵌入模型**：嵌入模型将文本转换为向量表示。它允许对语言有更深、更细腻的理解，这对于执行语义搜索至关重要。'
- en: '**Vector databases**: Vector databases (like [Chroma](https://www.trychroma.com/),
    [Pinecone](https://www.pinecone.io/), [Milvus](https://milvus.io/), [FAISS](https://faiss.ai/),
    [Annoy](https://github.com/spotify/annoy), etc.) are designed to store embedding
    vectors. They enable efficient retrieval of data that is ‘most similar’ to a query
    based on vector similarity.'
  id: totrans-140
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**向量数据库**：向量数据库（如[Chroma](https://www.trychroma.com/)、[Pinecone](https://www.pinecone.io/)、[Milvus](https://milvus.io/)、[FAISS](https://faiss.ai/)、[Annoy](https://github.com/spotify/annoy)等）旨在存储嵌入向量。它们使基于向量相似性的查询能够高效地检索与查询“最相似”的数据。'
- en: '📚 **References**:'
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 📚 **参考文献**：
- en: '[LangChain – Text splitters](https://python.langchain.com/docs/modules/data_connection/document_transformers/):
    List of different text splitters implemented in LangChain.'
  id: totrans-142
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[LangChain – 文本拆分器](https://python.langchain.com/docs/modules/data_connection/document_transformers/)：LangChain中实现的不同的文本拆分器列表。'
- en: '[Sentence Transformers library](https://www.sbert.net/): Popular library for
    embedding models.'
  id: totrans-143
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[句子转换器库](https://www.sbert.net/)：嵌入模型的流行库。'
- en: '[MTEB Leaderboard](https://huggingface.co/spaces/mteb/leaderboard): Leaderboard
    for embedding models.'
  id: totrans-144
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[MTEB排行榜](https://huggingface.co/spaces/mteb/leaderboard)：嵌入模型的排行榜。'
- en: '[The Top 5 Vector Databases](https://www.datacamp.com/blog/the-top-5-vector-databases)
    by Moez Ali: A comparison of the best and most popular vector databases.'
  id: totrans-145
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[前5个向量数据库](https://www.datacamp.com/blog/the-top-5-vector-databases) by Moez
    Ali：对最佳和最受欢迎的向量数据库的比较。'
- en: '* * *'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 3\. Retrieval Augmented Generation
  id: totrans-147
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3. 检索增强生成
- en: With RAG, LLMs retrieve contextual documents from a database to improve the
    accuracy of their answers. RAG is a popular way of augmenting the model’s knowledge
    without any fine-tuning.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 使用RAG，LLMs从数据库中检索上下文文档以提高其答案的准确性。RAG是一种流行的增强模型知识的方式，无需任何微调。
- en: '**Orchestrators**: Orchestrators (like [LangChain](https://python.langchain.com/docs/get_started/introduction),
    [LlamaIndex](https://docs.llamaindex.ai/en/stable/), [FastRAG](https://github.com/IntelLabs/fastRAG),
    etc.) are popular frameworks to connect your LLMs with tools, databases, memories,
    etc., and augment their abilities.'
  id: totrans-149
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**编排器**：编排器（如[LangChain](https://python.langchain.com/docs/get_started/introduction)、[LlamaIndex](https://docs.llamaindex.ai/en/stable/)、[FastRAG](https://github.com/IntelLabs/fastRAG)等）是流行的框架，用于连接你的LLMs与工具、数据库、记忆等，并增强其能力。'
- en: '**Retrievers**: User instructions are not optimized for retrieval. Different
    techniques (e.g., multi-query retriever, [HyDE](https://arxiv.org/abs/2212.10496),
    etc.) can be applied to rephrase/expand them and improve performance.'
  id: totrans-150
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**检索器**：用户指令没有针对检索进行优化。可以应用不同的技术（例如，多查询检索器、[HyDE](https://arxiv.org/abs/2212.10496)等）来重新表述/扩展它们并提高性能。'
- en: '**Memory**: To remember previous instructions and answers, LLMs and chatbots
    like ChatGPT add this history to their context window. This buffer can be improved
    with summarization (e.g., using a smaller LLM), a vector store + RAG, etc.'
  id: totrans-151
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**内存**：为了记住之前的指令和答案，LLMs和像ChatGPT这样的聊天机器人会将这一历史添加到它们的上下文窗口中。这个缓冲区可以通过摘要（例如，使用更小的LLM）、向量存储+
    RAG等方式进行改进。'
- en: '**Evaluation**: We need to evaluate both the document retrieval (context precision
    and recall) and generation stages (faithfulness and answer relevancy). It can
    be simplified with tools [Ragas](https://github.com/explodinggradients/ragas/tree/main)
    and [DeepEval](https://github.com/confident-ai/deepeval).'
  id: totrans-152
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**评估**：我们需要评估文档检索（上下文精确度和召回率）和生成阶段（忠实度和答案相关性）。可以使用工具[Ragas](https://github.com/explodinggradients/ragas/tree/main)和[DeepEval](https://github.com/confident-ai/deepeval)来简化。'
- en: '📚 **References**:'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: '📚 **参考文献**:'
- en: '[Llamaindex – High-level concepts](https://docs.llamaindex.ai/en/stable/getting_started/concepts.html):
    Main concepts to know when building RAG pipelines.'
  id: totrans-154
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Llamaindex – 高级概念](https://docs.llamaindex.ai/en/stable/getting_started/concepts.html):
    构建RAG管道时需要了解的主要概念。'
- en: '[Pinecone – Retrieval Augmentation](https://www.pinecone.io/learn/series/langchain/langchain-retrieval-augmentation/):
    Overview of the retrieval augmentation process.'
  id: totrans-155
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Pinecone – 检索增强](https://www.pinecone.io/learn/series/langchain/langchain-retrieval-augmentation/):
    检索增强过程的概述。'
- en: '[LangChain – Q&A with RAG](https://python.langchain.com/docs/use_cases/question_answering/quickstart):
    Step-by-step tutorial to build a typical RAG pipeline.'
  id: totrans-156
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[LangChain – 与RAG的问答](https://python.langchain.com/docs/use_cases/question_answering/quickstart):
    构建典型RAG管道的逐步教程。'
- en: '[LangChain – Memory types](https://python.langchain.com/docs/modules/memory/types/):
    List of different types of memories with relevant usage.'
  id: totrans-157
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[LangChain – 内存类型](https://python.langchain.com/docs/modules/memory/types/):
    列出不同类型的内存及其相关用法。'
- en: '[RAG pipeline – Metrics](https://docs.ragas.io/en/stable/concepts/metrics/index.html):
    Overview of the main metrics used to evaluate RAG pipelines.'
  id: totrans-158
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[RAG管道 – 指标](https://docs.ragas.io/en/stable/concepts/metrics/index.html):
    评估RAG管道所使用的主要指标的概述。'
- en: '* * *'
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 4\. Advanced RAG
  id: totrans-160
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4. 高级RAG
- en: Real-life applications can require complex pipelines, including SQL or graph
    databases, as well as automatically selecting relevant tools and APIs. These advanced
    techniques can improve a baseline solution and provide additional features.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 现实生活中的应用可能需要复杂的管道，包括SQL或图数据库，以及自动选择相关工具和API。这些高级技术可以提高基线解决方案并提供额外功能。
- en: '**Query construction**: Structured data stored in traditional databases requires
    a specific query language like SQL, Cypher, metadata, etc. We can directly translate
    the user instruction into a query to access the data with query construction.'
  id: totrans-162
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**查询构建**：存储在传统数据库中的结构化数据需要特定的查询语言，如SQL、Cypher、元数据等。我们可以通过查询构建直接将用户指令翻译成查询以访问数据。'
- en: '**Agents and tools**: Agents augment LLMs by automatically selecting the most
    relevant tools to provide an answer. These tools can be as simple as using Google
    or Wikipedia, or more complex like a Python interpreter or Jira.'
  id: totrans-163
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**代理和工具**：代理通过自动选择最相关的工具来增强LLMs，以提供答案。这些工具可以像使用Google或Wikipedia一样简单，也可以更复杂，如Python解释器或Jira。'
- en: '**Post-processing**: Final step that processes the inputs that are fed to the
    LLM. It enhances the relevance and diversity of documents retrieved with re-ranking,
    [RAG-fusion](https://github.com/Raudaschl/rag-fusion), and classification.'
  id: totrans-164
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**后处理**：处理输入到LLM中的最终步骤。它通过重新排序、[RAG-fusion](https://github.com/Raudaschl/rag-fusion)和分类来增强检索到的文档的相关性和多样性。'
- en: '**Program LLMs**: Frameworks like [DSPy](https://github.com/stanfordnlp/dspy)
    allow you to optimize prompts and weights based on automated evaluations in a
    programmatic way.'
  id: totrans-165
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**编程LLMs**：像[DSPy](https://github.com/stanfordnlp/dspy)这样的框架允许您以编程方式根据自动评估优化提示和权重。'
- en: '📚 **References**:'
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: '📚 **参考文献**:'
- en: '[LangChain – Query Construction](https://blog.langchain.dev/query-construction/):
    Blog post about different types of query construction.'
  id: totrans-167
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[LangChain – 查询构建](https://blog.langchain.dev/query-construction/): 关于不同类型查询构建的博客文章。'
- en: '[LangChain – SQL](https://python.langchain.com/docs/use_cases/qa_structured/sql):
    Tutorial on how to interact with SQL databases with LLMs, involving Text-to-SQL
    and an optional SQL agent.'
  id: totrans-168
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[LangChain – SQL](https://python.langchain.com/docs/use_cases/qa_structured/sql)：教程，介绍如何使用
    LLM 与 SQL 数据库交互，包括文本到 SQL 和可选的 SQL 代理。'
- en: '[Pinecone – LLM agents](https://www.pinecone.io/learn/series/langchain/langchain-agents/):
    Introduction to agents and tools with different types.'
  id: totrans-169
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Pinecone – LLM 代理](https://www.pinecone.io/learn/series/langchain/langchain-agents/)：介绍不同类型的代理和工具。'
- en: '[LLM Powered Autonomous Agents](https://lilianweng.github.io/posts/2023-06-23-agent/)
    by Lilian Weng: A more theoretical article about LLM agents.'
  id: totrans-170
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Lilian Weng 的[LLM 驱动的自主代理](https://lilianweng.github.io/posts/2023-06-23-agent/)：关于
    LLM 代理的更理论性的文章。
- en: '[LangChain – OpenAI’s RAG](https://blog.langchain.dev/applying-openai-rag/):
    Overview of the RAG strategies employed by OpenAI, including post-processing.'
  id: totrans-171
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[LangChain – OpenAI 的 RAG](https://blog.langchain.dev/applying-openai-rag/)：概述
    OpenAI 使用的 RAG 策略，包括后处理。'
- en: '[DSPy in 8 Steps](https://dspy-docs.vercel.app/docs/building-blocks/solving_your_task):
    General-purpose guide to DSPy introducing modules, signatures, and optimizers.'
  id: totrans-172
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[DSPy 在 8 步中](https://dspy-docs.vercel.app/docs/building-blocks/solving_your_task)：DSPy
    通用指南，介绍模块、签名和优化器。'
- en: '* * *'
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 5\. Inference optimization
  id: totrans-174
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 5. 推理优化
- en: Text generation is a costly process that requires expensive hardware. In addition
    to quantization, various techniques have been proposed to maximize throughput
    and reduce inference costs.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 文本生成是一个昂贵的流程，需要昂贵的硬件。除了量化之外，还提出了各种技术来最大化吞吐量和降低推理成本。
- en: '**Flash Attention**: Optimization of the attention mechanism to transform its
    complexity from quadratic to linear, speeding up both training and inference.'
  id: totrans-176
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Flash Attention**：优化注意力机制，将其复杂度从二次方转换为线性，加快训练和推理速度。'
- en: '**Key-value cache**: Understand the key-value cache and the improvements introduced
    in [Multi-Query Attention](https://arxiv.org/abs/1911.02150) (MQA) and [Grouped-Query
    Attention](https://arxiv.org/abs/2305.13245) (GQA).'
  id: totrans-177
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**键值缓存**：了解键值缓存以及 [Multi-Query Attention](https://arxiv.org/abs/1911.02150)（MQA）和
    [Grouped-Query Attention](https://arxiv.org/abs/2305.13245)（GQA）中引入的改进。'
- en: '**Speculative decoding**: Use a small model to produce drafts that are then
    reviewed by a larger model to speed up text generation.'
  id: totrans-178
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**推测性解码**：使用一个小模型生成草稿，然后由更大的模型进行审查，以加快文本生成速度。'
- en: '📚 **References**:'
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 📚 **参考文献**：
- en: '[GPU Inference](https://huggingface.co/docs/transformers/main/en/perf_infer_gpu_one)
    by Hugging Face: Explain how to optimize inference on GPUs.'
  id: totrans-180
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Hugging Face 的[GPU 推理](https://huggingface.co/docs/transformers/main/en/perf_infer_gpu_one)：解释如何优化
    GPU 上的推理。
- en: '[LLM Inference](https://www.databricks.com/blog/llm-inference-performance-engineering-best-practices)
    by Databricks: Best practices for how to optimize LLM inference in production.'
  id: totrans-181
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Databricks 的[LLM 推理](https://www.databricks.com/blog/llm-inference-performance-engineering-best-practices)：在生产中优化
    LLM 推理的最佳实践。
- en: '[Optimizing LLMs for Speed and Memory](https://huggingface.co/docs/transformers/main/en/llm_tutorial_optimization)
    by Hugging Face: Explain three main techniques to optimize speed and memory, namely
    quantization, Flash Attention, and architectural innovations.'
  id: totrans-182
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Hugging Face 的[优化 LLMs 以提高速度和内存](https://huggingface.co/docs/transformers/main/en/llm_tutorial_optimization)：解释了三种优化速度和内存的主要技术，即量化、Flash
    Attention 和架构创新。
- en: '[Assisted Generation](https://huggingface.co/blog/assisted-generation) by Hugging
    Face: HF’s version of speculative decoding, it’s an interesting blog post about
    how it works with code to implement it.'
  id: totrans-183
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Hugging Face 的[辅助生成](https://huggingface.co/blog/assisted-generation)：关于如何使用代码实现其与代码结合的有趣博客文章，这是
    Hugging Face 的推测性解码版本。
- en: '* * *'
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 6\. Deploying LLMs
  id: totrans-185
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 6. 部署 LLMs
- en: Deploying LLMs at scale is an engineering feat that can require multiple clusters
    of GPUs. In other scenarios, demos and local apps can be achieved with a much
    lower complexity.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 大规模部署 LLM 是一项工程壮举，可能需要多个 GPU 集群。在其他情况下，演示和本地应用程序可以以更低的复杂性实现。
- en: '**Local deployment**: Privacy is an important advantage that open-source LLMs
    have over private ones. Local LLM servers ([LM Studio](https://lmstudio.ai/),
    [Ollama](https://ollama.ai/), [oobabooga](https://github.com/oobabooga/text-generation-webui),
    [kobold.cpp](https://github.com/LostRuins/koboldcpp), etc.) capitalize on this
    advantage to power local apps.'
  id: totrans-187
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**本地部署**：隐私是开源 LLM 比私有 LLM 的重要优势。本地 LLM 服务器（[LM Studio](https://lmstudio.ai/)、[Ollama](https://ollama.ai/)、[oobabooga](https://github.com/oobabooga/text-generation-webui)、[kobold.cpp](https://github.com/LostRuins/koboldcpp)
    等）利用这一优势为本地应用程序提供动力。'
- en: '**Demo deployment**: Frameworks like [Gradio](https://www.gradio.app/) and
    [Streamlit](https://docs.streamlit.io/) are helpful for prototyping applications
    and sharing demos. You can also easily host them online, for example using [Hugging
    Face Spaces](https://huggingface.co/spaces).'
  id: totrans-188
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**演示部署**：[Gradio](https://www.gradio.app/)和[Streamlit](https://docs.streamlit.io/)等框架有助于原型设计和演示分享。您还可以轻松地将它们托管在网络上，例如使用[Hugging
    Face Spaces](https://huggingface.co/spaces)。'
- en: '**Server deployment**: Deploying LLMs at scale requires cloud (see also [SkyPilot](https://skypilot.readthedocs.io/en/latest/))
    or on-prem infrastructure and often leverages optimized text generation frameworks
    like [TGI](https://github.com/huggingface/text-generation-inference), [vLLM](https://github.com/vllm-project/vllm/tree/main),
    etc.'
  id: totrans-189
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**服务器部署**：大规模部署LLM需要云（参见[SkyPilot](https://skypilot.readthedocs.io/en/latest/)）或本地基础设施，通常利用优化的文本生成框架，如[TGI](https://github.com/huggingface/text-generation-inference)、[vLLM](https://github.com/vllm-project/vllm/tree/main)等。'
- en: '**Edge deployment**: In constrained environments, high-performance frameworks
    like [MLC LLM](https://github.com/mlc-ai/mlc-llm) and [mnn-llm](https://github.com/wangzhaode/mnn-llm/blob/master/README_en.md)
    can deploy LLM in web browsers, Android, and iOS.'
  id: totrans-190
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**边缘部署**：在受限环境中，高性能框架如[MLC LLM](https://github.com/mlc-ai/mlc-llm)和[mnn-llm](https://github.com/wangzhaode/mnn-llm/blob/master/README_en.md)可以将LLM部署在网页浏览器、Android和iOS上。'
- en: '📚 **References**:'
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 📚 **参考文献**：
- en: '[Streamlit – Build a basic LLM app](https://docs.streamlit.io/knowledge-base/tutorials/build-conversational-apps):
    Tutorial to make a basic ChatGPT-like app using Streamlit.'
  id: totrans-192
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Streamlit – 构建基本的LLM应用](https://docs.streamlit.io/knowledge-base/tutorials/build-conversational-apps)：使用Streamlit制作类似ChatGPT的基本聊天应用教程。'
- en: '[HF LLM Inference Container](https://huggingface.co/blog/sagemaker-huggingface-llm):
    Deploy LLMs on Amazon SageMaker using Hugging Face’s inference container.'
  id: totrans-193
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[HF LLM推理容器](https://huggingface.co/blog/sagemaker-huggingface-llm)：使用Hugging
    Face的推理容器在Amazon SageMaker上部署LLM。'
- en: '[Philschmid blog](https://www.philschmid.de/) by Philipp Schmid: Collection
    of high-quality articles about LLM deployment using Amazon SageMaker.'
  id: totrans-194
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Philschmid博客](https://www.philschmid.de/) by Philipp Schmid：关于使用Amazon SageMaker进行LLM部署的高质量文章集合。'
- en: '[Optimizing latency](https://hamel.dev/notes/llm/inference/03_inference.html)
    by Hamel Husain: Comparison of TGI, vLLM, CTranslate2, and mlc in terms of throughput
    and latency.'
  id: totrans-195
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[优化延迟](https://hamel.dev/notes/llm/inference/03_inference.html) by Hamel Husain：在吞吐量和延迟方面比较TGI、vLLM、CTranslate2和mlc。'
- en: '* * *'
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 7\. Securing LLMs
  id: totrans-197
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 7. 保护LLM
- en: In addition to traditional security problems associated with software, LLMs
    have unique weaknesses due to the way they are trained and prompted.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 除了与软件相关的传统安全问题外，LLM由于训练和提示的方式而具有独特的弱点。
- en: '**Prompt hacking**: Different techniques related to prompt engineering, including
    prompt injection (additional instruction to hijack the model’s answer), data/prompt
    leaking (retrieve its original data/prompt), and jailbreaking (craft prompts to
    bypass safety features).'
  id: totrans-199
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**提示破解**：与提示工程相关的不同技术，包括提示注入（向模型答案中添加额外指令以劫持模型答案）、数据/提示泄露（检索其原始数据/提示）和越狱（构建提示以绕过安全功能）。'
- en: '**Backdoors**: Attack vectors can target the training data itself, by poisoning
    the training data (e.g., with false information) or creating backdoors (secret
    triggers to change the model’s behavior during inference).'
  id: totrans-200
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**后门**：攻击向量可以针对训练数据本身，通过毒化训练数据（例如，使用虚假信息）或创建后门（在推理期间改变模型行为的秘密触发器）。'
- en: '**Defensive measures**: The best way to protect your LLM applications is to
    test them against these vulnerabilities (e.g., using red teaming and checks like
    [garak](https://github.com/leondz/garak/)) and observe them in production (with
    a framework like [langfuse](https://github.com/langfuse/langfuse)).'
  id: totrans-201
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**防御措施**：保护您的LLM应用的最佳方式是测试它们对这些漏洞的抵抗力（例如，使用红队和像[garak](https://github.com/leondz/garak/)这样的检查）并在生产环境中观察它们（使用像[langfuse](https://github.com/langfuse/langfuse)这样的框架）。'
- en: '📚 **References**:'
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 📚 **参考文献**：
- en: '[OWASP LLM Top 10](https://owasp.org/www-project-top-10-for-large-language-model-applications/)
    by HEGO Wiki: List of the 10 most critical vulnerabilities seen in LLM applications.'
  id: totrans-203
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[OWASP LLM Top 10](https://owasp.org/www-project-top-10-for-large-language-model-applications/)
    by HEGO Wiki：在LLM应用中看到的10个最关键漏洞的列表。'
- en: '[Prompt Injection Primer](https://github.com/jthack/PIPE) by Joseph Thacker:
    Short guide dedicated to prompt injection for engineers.'
  id: totrans-204
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[提示注入入门](https://github.com/jthack/PIPE) by Joseph Thacker：针对工程师的提示注入简短指南。'
- en: '[LLM Security](https://llmsecurity.net/) by [@llm_sec](https://twitter.com/llm_sec):
    Extensive list of resources related to LLM security.'
  id: totrans-205
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[LLM安全](https://llmsecurity.net/) by [@llm_sec](https://twitter.com/llm_sec)：与LLM安全相关的资源详尽列表。'
- en: '[Red teaming LLMs](https://learn.microsoft.com/en-us/azure/ai-services/openai/concepts/red-teaming)
    by Microsoft: Guide on how to perform red teaming with LLMs.'
  id: totrans-206
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[微软的 LLM 红队行动](https://learn.microsoft.com/en-us/azure/ai-services/openai/concepts/red-teaming)：关于如何使用
    LLM 进行红队行动的指南。'
- en: Conclusion
  id: totrans-207
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: My main recommendation is to do something that you enjoy. Install libraries
    in a Google Colab notebook, play with them, deploy a model on Hugging Face Spaces,
    hack an application, quantize an LLM, or fine-tune it for RAG. Find your own niche
    and keep exploring it, read papers, and implement your own ideas. It’s a large
    field with extensive research and funding. Become an expert at one thing in this
    entire course, and you’ll make yourself invaluable! 🙂
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 我的主要建议是做你热爱的事情。在 Google Colab 笔记本中安装库，玩转它们，在 Hugging Face Spaces 上部署模型，破解一个应用程序，量化一个大型语言模型（LLM），或者为
    RAG 进行微调。找到你自己的细分领域并持续探索它，阅读论文，并实现你自己的想法。这是一个研究领域广泛、研究资金充裕的领域。在这个整个课程中成为某一领域的专家，你将使自己变得无价！
    🙂
