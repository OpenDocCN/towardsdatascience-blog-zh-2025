  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/the-large-language-model-course-b6663cd57ceb/](https://towardsdatascience.com/the-large-language-model-course-b6663cd57ceb/)
