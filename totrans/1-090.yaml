- en: How to Automate Workflows with AI
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/how-to-automate-workflows-with-ai/](https://towardsdatascience.com/how-to-automate-workflows-with-ai/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1763148534668" class="mdspan-comment">AI is a large part</mdspan>
    of most developers’ work. We use tools such as Cursor, Windsurf, OpenAI Codex,
    Claude Code, and so on, to become much more productive at work. However, from
    discussions with people working in non-technical lines of work, I often see a
    lot of processes that can be optimized using AI.
  prefs: []
  type: TYPE_NORMAL
- en: In this article, I’ll show how other non-tech industries can benefit from using
    AI. I’ll highlight this by automating the process of finding prospects with AI,
    a typical sales job that requires a lot of manual work. The goal of the article
    is to highlight how even non-technical people can make use of the latest coding
    agents to create powerful automation tools.
  prefs: []
  type: TYPE_NORMAL
- en: 'Throughout the article, I’ll be highlighting my main tips with:'
  prefs: []
  type: TYPE_NORMAL
- en: This is a main tip
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![AI Infographic](../Images/818f43d45cf0d3c9c2a4fa5af35ba71c.png)'
  prefs: []
  type: TYPE_IMG
- en: This infographic highlights the main contents of this article. I’ll first discuss
    why prospect finding is needed, and then proceed to discuss how to optimize the
    process, and highlight specific tips using quotes throughout the article. Image
    by ChatGPT.
  prefs: []
  type: TYPE_NORMAL
- en: Why do we need automatic prospect finding
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Business development representatives work with:'
  prefs: []
  type: TYPE_NORMAL
- en: Finding interesting prospects
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Retrieving their contact information, such as their LinkedIn profile or email
    address
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Reaching out to prospects, attempting to set up a meeting
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: From there, an account executive usually takes over, though I’ll be focusing
    on how to optimize the first three steps.
  prefs: []
  type: TYPE_NORMAL
- en: This three-step process is usually quite extensive, as finding prospects online
    requires scouring through a lot of LinkedIn profiles or other websites to find
    interesting companies. After finding a company, you typically start looking for
    specific people in the organization to reach out to. This will usually be key
    decision makers, who can be a middle manager in a larger company, or a CFO in
    a smaller company. After finding the correct person, you need to get their contact
    information, usually found on LinkedIn or on the company’s website. Finally, you
    should reach out to this person with a personalized message.
  prefs: []
  type: TYPE_NORMAL
- en: Finding interesting prospects
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I’ll start developing this tool using Claude Code. You can essentially use any
    coding tool there, such as Codex, Cursor, Windsurf, Replit, and so on. The main
    point is the commands you use to make the application.
  prefs: []
  type: TYPE_NORMAL
- en: Always use planning mode before creating a new application
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'I always start off using *plan mode*, which tells the model to read your prompt,
    create a step-by-step plan, and ask any clarifying questions. This is very useful,
    as it helps you narrow down the scope of your application and ensures you provide
    your thoughts on any ambiguity. For example, I got prompted on:'
  prefs: []
  type: TYPE_NORMAL
- en: Which location are you targeting (in my case, I’m looking at prospects in Norway)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Which programming language do you want your application in (I chose Python,
    but TypeScript or other languages are of course also possible)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What are some websites you want to look at (in Norway, *proff.no* has a lot
    of information on companies and employees, so you can find similar tools, or even
    ask your coding agent to find these websites itself using a web search)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What output format do I prefer (I chose an Excel sheet)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These are all great questions to clarify, which is why using *plan mode* is
    so useful.
  prefs: []
  type: TYPE_NORMAL
- en: Also, make sure to prompt your model to use publicly available API’s, and only
    look for information from relevant companies. Fetching personal information could
    be against the regulations, depending on where you live.
  prefs: []
  type: TYPE_NORMAL
- en: Always provide your coding agent as much tools as possible. It could be MCP
    servers, OpenAI credentials, or access to any programs through an API.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Additionally, I also made an OpenAI key, which I told Claude Code it could load
    from my .env file with OPENAI_API_KEY. This is useful because a lot of operations
    will probably require using an LLM to find or process information. Thus, providing
    Claude Code access to a powerful API service is very important. If you have other
    relevant API’s, you should also provide Claude Code with the documentation for
    these API’s and tell it to use them.
  prefs: []
  type: TYPE_NORMAL
- en: 'I, for example, informed Claude that it has access to web search, and can perform
    it with the function below:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: After I answered all the clarifying questions, I told Claude to start building,
    and it built an application to find a list of prospects, returned in CSV format.
    This covers both step 1 and 2, of first finding interesting prospects, and getting
    a hold of their contact information.
  prefs: []
  type: TYPE_NORMAL
- en: After finding all of these prospects, you should also do a manual review, ensuring
    correctness. Furthermore, I recommend prompting GPT-5 or an equivalent model to
    go through your results and verify any inconsistencies.
  prefs: []
  type: TYPE_NORMAL
- en: Have an LLM go through your results to verify correctness
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Lastly, it’s also important to abide by regulations when finding prospects.
    You should only be finding relevant companies online, and then finding individuals
    manually to abide by GDPR regulations. Thus, to find additional information, such
    as the name, email, and role of individual prospects, I manually find the information
    from the companies provided with my application.
  prefs: []
  type: TYPE_NORMAL
- en: Reaching out
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: After finding contact information, you now need to reach out. You can read a
    lot of stats and information on how to perform cold emails, but I’ll not get into
    that here, since my focus is on the technology and how we can use it to optimize
    our processes.
  prefs: []
  type: TYPE_NORMAL
- en: Up to this point, I assume you’ve fetched a list of relevant prospects, including
    their contact information, and you’re ready to start reaching out. We now want
    to create customized messages to each individual, which is luckily a task that
    LLMs are really good at.
  prefs: []
  type: TYPE_NORMAL
- en: LLMs are able to craft personalized messages
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'For example, at this stage, I have the following information per prospect:'
  prefs: []
  type: TYPE_NORMAL
- en: Individual name
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Individual email
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Individual role
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Company name
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Company size
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Company revenue
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Also, in general, adding more information to your prompts is usually better.
    If you prefer a specific style or tone in your emails, you should add that information.
    A good idea is also to show examples of you’re previous emails, highlighting how
    you write emails yourself, and thus using few-shot prompting to improve output
    quality.
  prefs: []
  type: TYPE_NORMAL
- en: Add as much information to your prompts as possible
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'I’ll now use this information to draft up a customized message. This can be
    done relatively simply using GPT-5 for example:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: When you have the outline of the message, you can then manually tweak and optimize
    it for the person you’re reaching out to, given the information you’ve found.
  prefs: []
  type: TYPE_NORMAL
- en: You can now reach out using these emails. To avoid breaching any terms of service
    and spamming people, I recommend reaching out manually and not using an automated
    service. I do not condone spam emails or similar. AI is only used to help you
    and make processes more effective, not to remove all humans from the loop necessarily.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this article, I’ve highlighted how you can use the latest coding tools, such
    as Claude Code, to automate some processes. In this article specifically, I covered
    how to optimize the process of reaching out to prospects by using AI to automatically
    find relevant companies and automatically create emails while staying compliant.
    We’ve seen immense progress with AI in the last few years, but I still believe
    AI is lagging behind on the implementation side. Thus, if you can be fast at integrating
    AI into your daily life, you can have a massive advantage over your peers.
  prefs: []
  type: TYPE_NORMAL
