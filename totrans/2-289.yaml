  id: totrans-167
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/2ce73b956d87c5e4bbb1310bcd9d470c.png)'
- en: Example in company agent looking through PDFs, websites docs in Slack | Image
    by author
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 公司代理查看PDF、网站文档的示例，Slack中的图片 | 作者提供
- en: If you to follow my writing, you can find me here, on my [website](https://www.ilsilfverskiold.com/),
    or on [LinkedIn](https://www.linkedin.com/in/ida-silfverskiold/).
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要跟随我的写作，你可以在我的[网站](https://www.ilsilfverskiold.com/)，或者在我的[领英](https://www.linkedin.com/in/ida-silfverskiold/)上找到我。
- en: I’ll try to dive deeper into agentic memory, evals, and prompting over the summer.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 我会尝试在夏天深入探讨代理记忆、评估和提示。
- en: ❤
