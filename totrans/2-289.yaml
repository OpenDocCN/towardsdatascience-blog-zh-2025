- en: 'Agentic RAG Applications: Company Knowledge Slack Agents'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/agentic-rag-applications-company-knowledge-slack-agents/](https://towardsdatascience.com/agentic-rag-applications-company-knowledge-slack-agents/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I <mdspan datatext="el1748635599830" class="mdspan-comment">would have figured</mdspan>
    that most companies would have built or implemented their own RAG agents by now.
  prefs: []
  type: TYPE_NORMAL
- en: An AI knowledge agent can dig through internal documentation — websites, PDFs,
    random docs — and answer employees in Slack (or Teams/Discord) within a few seconds.
    So, these bots should significantly reduce time sifting through information for
    employees.
  prefs: []
  type: TYPE_NORMAL
- en: I’ve seen a few of these in bigger tech companies, like AskHR from IBM, but
    they aren’t all that mainstream yet.
  prefs: []
  type: TYPE_NORMAL
- en: If you’re keen to understand how they are built and how much resources it takes
    to build a simple one, this is an article for you.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/bc1a42698e9730d7b845597a25fbf3f8.png)'
  prefs: []
  type: TYPE_IMG
- en: Parts this article will go through | Image by author
  prefs: []
  type: TYPE_NORMAL
- en: I’ll go through the tools, techniques, and architecture involved, while also
    looking at the economics of building something like this. I’ll also include a
    section on what you’ll end up focusing the most on.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/90fc6fe944f64b9321b6fd2745714246.png)'
  prefs: []
  type: TYPE_IMG
- en: Things you’ll spend time on | Image by author
  prefs: []
  type: TYPE_NORMAL
- en: There is also a demo at the end for what this will look like in Slack.
  prefs: []
  type: TYPE_NORMAL
- en: If you’re already familiar with RAG, feel free to skip the next section — it’s
    just a bit of repetitive stuff around agents and RAG.
  prefs: []
  type: TYPE_NORMAL
- en: What is RAG and Agentic RAG?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Most of you who read this will know what Retrieval-Augmented Generation (RAG)
    is but if you’re new to it, it is a way to fetch information that gets fed into
    the large language model (LLM) before it answers the user’s question.
  prefs: []
  type: TYPE_NORMAL
- en: This allows us to provide relevant information from various documents to the
    bot in real time so it can answer the user correctly.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/5dfc5b69b860d3b1af6b4f28a7111820.png)'
  prefs: []
  type: TYPE_IMG
- en: Simple RAG | Image by author
  prefs: []
  type: TYPE_NORMAL
- en: This retrieval system is doing more than simple keyword search, as it finds
    similar matches rather than just exact ones. For example, if someone asks about
    fonts, a similarity search might return documents on typography.
  prefs: []
  type: TYPE_NORMAL
- en: Many would say that RAG is a fairly simple concept to understand, but how you
    store information, how you fetch it, and what kind of embedding models you use
    still matter a lot.
  prefs: []
  type: TYPE_NORMAL
- en: If you’re keen to learn more about embeddings and retrieval, I’ve written about
    this [here](https://medium.com/data-science/working-with-embeddings-closed-versus-open-source-39491f0b95c2).
  prefs: []
  type: TYPE_NORMAL
- en: Today, people have gone further and primarily work with agent systems.
  prefs: []
  type: TYPE_NORMAL
- en: In agent systems, the LLM can decide where and how it should fetch information,
    rather than just having content dumped into its context before generating a response.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/187db17c7eff858af7562cf426b70431.png)'
  prefs: []
  type: TYPE_IMG
- en: Agent system with RAG tools — the yellow dot i the agent and the gray dots are
    the tools | Image by author
  prefs: []
  type: TYPE_NORMAL
- en: It’s important to remember that just because more advanced tools exist doesn’t
    mean you should always use them. You want to keep the system intuitive and also
    keep API calls to a minimum.
  prefs: []
  type: TYPE_NORMAL
- en: With agent systems the API calls will increase, as it needs to at least call
    one tool and then make another call to generate a response.
  prefs: []
  type: TYPE_NORMAL
- en: That said, I really like the user experience of the bot “going somewhere” —
    to a tool — to look something up. Seeing that flow in Slack helps the user understand
    what’s happening.
  prefs: []
  type: TYPE_NORMAL
- en: But going with an agent or using a full framework isn’t necessarily the better
    choice. I’ll elaborate on this as we continue.
  prefs: []
  type: TYPE_NORMAL
- en: Technical Stack
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: There is a ton of options for agent frameworks, vector databases, and deployment
    options, so I’ll go through some.
  prefs: []
  type: TYPE_NORMAL
- en: For the **deployment option**, since we’re working with Slack webhooks, we’re
    dealing with event-driven architecture where the code only runs when there’s a
    question in Slack.
  prefs: []
  type: TYPE_NORMAL
- en: To keep costs to a minimum, we can use **serverless functions**. The choice
    is either going with AWS Lambda or picking a new vendor.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e94aed5ed77552abeb38664eee0acad0.png)'
  prefs: []
  type: TYPE_IMG
- en: Lambda vs Modal comparison, find the full table [here](https://github.com/ilsilfverskiold/Awesome-LLM-Resources-List?tab=readme-ov-file#-serverless-compute-pricing--limits--lambda-vs-modal-on-cpu)
    | Image by author
  prefs: []
  type: TYPE_NORMAL
- en: Platforms like Modal are technically built to serve LLM models, but they work
    well for long-running ETL processes, and for LLM apps in general.
  prefs: []
  type: TYPE_NORMAL
- en: Modal hasn’t been battle-tested as much, and you’ll notice that in terms of
    latency, but it’s very smooth and offers super cheap CPU pricing.
  prefs: []
  type: TYPE_NORMAL
- en: I should note though that when setting this up with Modal on the free tier,
    I’ve had a few 500 errors, but that might be expected.
  prefs: []
  type: TYPE_NORMAL
- en: As for **how to pick the agent framework**, this is completely optional. I did
    a comparison piece a few weeks ago on open-source agentic frameworks that you
    can find [here](https://medium.com/data-science-collective/agentic-ai-comparing-new-open-source-frameworks-21ec676732df),
    and the one I left out was **LlamaIndex**.
  prefs: []
  type: TYPE_NORMAL
- en: So I decided to give it a try here.
  prefs: []
  type: TYPE_NORMAL
- en: The last thing you need to pick is a **vector database,** or a database that
    supports vector search. This is where we store the embeddings and other metadata,
    so we can perform similarity search when a user’s query comes in.
  prefs: []
  type: TYPE_NORMAL
- en: There are a lot of options out there, but I think the ones with the highest
    potential are Weaviate, Milvus, pgvector, Redis, and Qdrant.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/36f0686e04116281972226ee3662abbd.png)'
  prefs: []
  type: TYPE_IMG
- en: Vector DBs comparison, find the full table [here](https://github.com/ilsilfverskiold/Awesome-LLM-Resources-List?tab=readme-ov-file#-vector-dbs--foss-performance-pricing-devx)
    | Image by author
  prefs: []
  type: TYPE_NORMAL
- en: Both Qdrant and Milvus have pretty generous free tiers for their cloud options.
    Qdrant, I know, allows us to store both dense and sparse vectors. Llamaindex,
    along with most agent frameworks, support many different vector databases so any
    can work.
  prefs: []
  type: TYPE_NORMAL
- en: I’ll try Milvus more in the future to compare performance and latency, but for
    now, Qdrant works well.
  prefs: []
  type: TYPE_NORMAL
- en: Redis is a solid pick too, or really any vector extension of your existing database.
  prefs: []
  type: TYPE_NORMAL
- en: Cost & time to build
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In terms of time and cost, you have to account for engineering hours, cloud,
    embedding, and large language model(LLM) costs.
  prefs: []
  type: TYPE_NORMAL
- en: It doesn’t take that much time to boot up a framework to run something minimal.
    What takes time is connecting the content properly, prompting the system, parsing
    the outputs, and making sure it runs fast enough.
  prefs: []
  type: TYPE_NORMAL
- en: But if we turn to overhead costs, **cloud costs** to run the agent system is
    **minimal** for just one bot for one company using serverless functions as you
    saw in the table in the last section.
  prefs: []
  type: TYPE_NORMAL
- en: However, for the **vector databases**, it will get more expensive the more data
    you store.
  prefs: []
  type: TYPE_NORMAL
- en: Both Zilliz and Qdrant Cloud has a good amount of free tier for your first 1
    to 5GBs of data, so unless you go beyond a few thousand chunks you may not pay
    for anything.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/876badb912fa2e4d08a8759ae1b58430.png)'
  prefs: []
  type: TYPE_IMG
- en: Vector DBs comparison for costs, find the full table [here](https://github.com/ilsilfverskiold/Awesome-LLM-Resources-List?tab=readme-ov-file#-vector-db-cloud-pricing-2000-char-chunks-768-dim)
    | Image by author
  prefs: []
  type: TYPE_NORMAL
- en: You will start paying though once you go beyond the thousands mark, with Weaviate
    being the most expensive of the vendors above.
  prefs: []
  type: TYPE_NORMAL
- en: As for the **embeddings,** these are **generally very cheap.**
  prefs: []
  type: TYPE_NORMAL
- en: You can see a table below on using OpenAI’s `text-embedding-3-small` with chunks
    of different sizes once you embed 1 to 10 million texts.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/215ad5ad84fd9a82e9ceb944359d7869.png)'
  prefs: []
  type: TYPE_IMG
- en: Embedding costs per chunk examples — find the full table [here](https://github.com/ilsilfverskiold/Awesome-LLM-Resources-List?tab=readme-ov-file#-embedding-cost--openai-small-model-per-chunk-size)
    | Image by author
  prefs: []
  type: TYPE_NORMAL
- en: When people start optimizing for embeddings and storage, they’ve usually moved
    beyond embedding millions of texts.
  prefs: []
  type: TYPE_NORMAL
- en: The one thing that **matters the most** though is what **large language model
    (LLM) you use**. You need to think about API prices, since an agent system will
    typically call an LLM two to four times per run.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/8150046c64c8076c759d70f206db7f85.png)'
  prefs: []
  type: TYPE_IMG
- en: Example prices for LLMs in agent systems, full table [here](https://github.com/ilsilfverskiold/Awesome-LLM-Resources-List?tab=readme-ov-file#-embedding-cost--openai-small-model-per-chunk-size)
    | Image by author
  prefs: []
  type: TYPE_NORMAL
- en: For this system, I’m using GPT-4o-mini or Gemini Flash 2.0, which are the cheapest
    options.
  prefs: []
  type: TYPE_NORMAL
- en: So let’s say a company is using the bot a few hundred times per day and each
    run costs us 2–4 API calls, we might end up at around less of a dollar per day
    and around $10–50 dollars per month.
  prefs: []
  type: TYPE_NORMAL
- en: You can see that switching to a more expensive model would increase the monthly
    bill by 10x to 100x. Using ChatGPT is mostly subsidized for free users, but when
    you build your own applications you’ll be financing it.
  prefs: []
  type: TYPE_NORMAL
- en: There will be smarter and cheaper models in the future, so whatever you build
    now will likely improve over time. But start small, because costs add up and for
    simple systems like this you don’t need them to be exceptional.
  prefs: []
  type: TYPE_NORMAL
- en: The next section will get into how to build this system.
  prefs: []
  type: TYPE_NORMAL
- en: The architecture (processing documents)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The system has two parts. The first is how we split up documents — what we call
    chunking — and embed them. This first part is very important, as it will dictate
    how the agent answers later.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/721574ddcc3a45bb3c56cf4d36585a6b.png)'
  prefs: []
  type: TYPE_IMG
- en: Splitting up documents to different chunks attached with metadata | Image by
    author
  prefs: []
  type: TYPE_NORMAL
- en: So, to make sure you’re preparing all the sources properly, you need to think
    carefully about how to chunk them.
  prefs: []
  type: TYPE_NORMAL
- en: If you look at the document above, you can see that we can miss context if we
    split the document based on headings but also on the number of characters where
    the paragraphs attached to the first heading is split up for being too long.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a19db84e1c58b8d3f8671be0b61db533.png)'
  prefs: []
  type: TYPE_IMG
- en: Losing context in chunks | Image by author
  prefs: []
  type: TYPE_NORMAL
- en: You need to be smart about ensuring each chunk has enough context (but not too
    much). You also need to make sure the chunk is attached to metadata so it’s easy
    to trace back to where it was found.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f37f883bada422d311feaff36d3d6647.png)'
  prefs: []
  type: TYPE_IMG
- en: Setting metadata to the sources to trace back to where the chunks were found
    | Image by author
  prefs: []
  type: TYPE_NORMAL
- en: This is where you’ll spend the most time, and honestly, I think there should
    be better tools out there to do this intelligently.
  prefs: []
  type: TYPE_NORMAL
- en: I ended up using Docling for PDFs, building it out to attach elements based
    on headings and paragraph sizes. For web pages, I built a crawler that looked
    over page elements to decide whether to chunk based on anchor tags, headings,
    or general content.
  prefs: []
  type: TYPE_NORMAL
- en: Remember, if the bot is supposed to cite sources, each chunk needs to be attached
    to URLs, anchor tags, page numbers, block IDs, permalinks so the system can locate
    the information correctly being used.
  prefs: []
  type: TYPE_NORMAL
- en: Since most of the content you’re working with is scattered and often low quality,
    I also decided to summarize texts using an LLM. These summaries were given different
    labels with higher authority, which meant they were prioritized during retrieval.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c66e6c67ad5a693f5caff42f3ff7aecb.png)'
  prefs: []
  type: TYPE_IMG
- en: Summarizing docs with higher authority | Image by author
  prefs: []
  type: TYPE_NORMAL
- en: There is also the option to push in the summaries in their own tools, and keep
    deep dive information separate. Letting the agent decide which one to use but
    it will look strange to users as it’s not intuitive behavior.
  prefs: []
  type: TYPE_NORMAL
- en: Still, I have to stress that if the quality of the source information is poor,
    it’s hard to make the system work well.
  prefs: []
  type: TYPE_NORMAL
- en: For example, if a user asks how an API request should be made and there are
    four different web pages giving different answers, the bot won’t know which one
    is most relevant.
  prefs: []
  type: TYPE_NORMAL
- en: To demo this, I had to do some manual review. I also had AI do deeper research
    around the company to help fill in gaps, and then I embedded that too.
  prefs: []
  type: TYPE_NORMAL
- en: In the future, I think I’ll build something better for document ingestion —
    probably with the help of a language model.
  prefs: []
  type: TYPE_NORMAL
- en: The architecture (the agent)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: For the second part, where we connect to this data, we need to build a system
    where an agent can connect to different tools that contain different amounts of
    data from our vector database.
  prefs: []
  type: TYPE_NORMAL
- en: We keep to one agent only to make it easy enough to control. This one agent
    can decide what information it needs based on the user’s question.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a4638a73cf6b2f2b77c9d550a33af0d2.png)'
  prefs: []
  type: TYPE_IMG
- en: The agent system | Image by author
  prefs: []
  type: TYPE_NORMAL
- en: It’s good not to complicate things and build it out to use too many agents,
    or you’ll run into issues, especially with these smaller models.
  prefs: []
  type: TYPE_NORMAL
- en: Although this may go against my own recommendations, I did set up a first LLM
    function that decides if we need to run the agent at all.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ad73546a00801b321c16f4c205d14c91.png)'
  prefs: []
  type: TYPE_IMG
- en: First initial LLM call to decide on the larger agent | Image by author
  prefs: []
  type: TYPE_NORMAL
- en: This was primarily for the user experience, as it takes a few extra seconds
    to boot up the agent (even when starting it as a background task when the container
    starts).
  prefs: []
  type: TYPE_NORMAL
- en: As for how to build the agent itself, this is easy, as LlamaIndex does most
    of the work for us. For this, you can use the `FunctionAgent`, passing in different
    tools when setting it up.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: The tools have access to different data from the vector database, and they are
    wrappers around the `CitationQueryEngine`. This engine helps to cite the source
    nodes in the text. We can access the source nodes at the end of the agent run,
    which you can attach to the message and in the footer.
  prefs: []
  type: TYPE_NORMAL
- en: To make sure the user experience is good, you can tap into the event stream
    to send updates back to Slack.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Make sure to format the messages and Slack blocks well, and refine the system
    prompt for the agent so it formats the messages correctly based on the information
    that the tools will return.
  prefs: []
  type: TYPE_NORMAL
- en: The architecture should be easy enough to understand, but there are still some
    retrieval techniques we should dig into.
  prefs: []
  type: TYPE_NORMAL
- en: Techniques you can try
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A lot of people will emphasize certain techniques when building RAG systems,
    and they’re partially right. You should use hybrid search along with some kind
    of re-ranking.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/00cf1e097edea9e92c6ddb5d98e41257.png)'
  prefs: []
  type: TYPE_IMG
- en: How the query tools work under the hood — a bit simplified | Image by author
  prefs: []
  type: TYPE_NORMAL
- en: The first I will mention is hybrid search when we perform retrieval.
  prefs: []
  type: TYPE_NORMAL
- en: I mentioned that we use semantic similarity to fetch chunks of data in the various
    tools, but you also need to account for cases where exact keyword search is required.
  prefs: []
  type: TYPE_NORMAL
- en: Just imagine a user asking for a specific certificate name, like CAT-00568\.
    In that case, the system needs to find exact matches just as much as fuzzy ones.
  prefs: []
  type: TYPE_NORMAL
- en: With hybrid search, supported by both Qdrant and LlamaIndex, we use both dense
    and sparse vectors.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: Sparse is perfect for exact keywords but blind to synonyms, whereas dense is
    great for “fuzzy” matches (“benefits policy” matches “employee perks”) but they
    can miss literal strings like *CAT-00568*.
  prefs: []
  type: TYPE_NORMAL
- en: Once the results are fetched, it’s useful to apply deduplication and re-ranking
    to filter out irrelevant chunks before sending them to the LLM for citation and
    synthesis.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: This part wouldn’t be necessary if your data were exceptionally clean, which
    is why it shouldn’t be your main focus. It adds overhead and another API call.
  prefs: []
  type: TYPE_NORMAL
- en: It’s also not necessary to use a large model for re-ranking, but you’ll need
    to do some research on your own to figure out your options.
  prefs: []
  type: TYPE_NORMAL
- en: These techniques are easy to understand and quick to set up, so they aren’t
    where you’ll spend most of your time.
  prefs: []
  type: TYPE_NORMAL
- en: What you’ll actually spend time on
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Most of the things you’ll spend time on aren’t so sexy. It’s prompting, reducing
    latency, and chunking documents correctly.
  prefs: []
  type: TYPE_NORMAL
- en: Before you start, you should **look into different prompt templates** from various
    frameworks to see how they prompt the models. You’ll spend quite a bit of time
    making sure the system prompt is well-crafted for the LLM you choose.
  prefs: []
  type: TYPE_NORMAL
- en: The second thing you’ll spend most of your time on is **making it fas**t. I’ve
    looked into internal tools from tech companies building **AI knowledge agents**
    and found they usually **respond in about 8 to 13 seconds.**
  prefs: []
  type: TYPE_NORMAL
- en: So, you need something in that range.
  prefs: []
  type: TYPE_NORMAL
- en: Using a serverless provider can be a problem here because of cold starts. LLM
    providers also introduce their own latency, which is hard to control.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/9180d74a6828c7a4fee380c3c0615c38.png)'
  prefs: []
  type: TYPE_IMG
- en: One or two lagging API calls drags down the entire system | Image by author
  prefs: []
  type: TYPE_NORMAL
- en: That said, you can look into **spinning up resources before they’re used**,
    switching to **lower-latency models**, skipping frameworks to reduce overhead,
    and generally **decreasing the number of API calls per run.**
  prefs: []
  type: TYPE_NORMAL
- en: The last thing, which takes a huge amount of work and which I’ve mentioned before,
    is **chunking documents**.
  prefs: []
  type: TYPE_NORMAL
- en: If you had exceptionally clean data with clear headers and separations, this
    part would be easy. But more often, you’ll be dealing with poorly structured HTML,
    PDFs, raw text files, Notion boards, and Confluence notes — often scattered and
    formatted inconsistently.
  prefs: []
  type: TYPE_NORMAL
- en: The challenge is figuring out how to programmatically ingest these documents
    so the system gets the full information needed to answer a question.
  prefs: []
  type: TYPE_NORMAL
- en: Just working with PDFs, for example, you’ll need to extract tables and images
    properly, separate sections by page numbers or layout elements, and trace each
    source back to the correct page.
  prefs: []
  type: TYPE_NORMAL
- en: You want enough context, but not chunks that are too large, or it will be harder
    to retrieve the right info later.
  prefs: []
  type: TYPE_NORMAL
- en: This kind of stuff isn’t well generalized. You can’t just push it in and expect
    the system to understand it — you have to think it through before you build it.
  prefs: []
  type: TYPE_NORMAL
- en: How to build it out further
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: At this point, it works well for what it’s supposed to do, but there are a few
    pieces I should cover (or people will think I’m simplifying too much). You’ll
    want to implement caching, a way to update the data, and long-term memory.
  prefs: []
  type: TYPE_NORMAL
- en: '**Caching** isn’t essential, but you can at least **cache the query’s embedding**
    in larger systems to speed up retrieval, and **store recent source results** for
    follow-up questions. I don’t think LlamaIndex helps much here, but you should
    be able to intercept the `QueryTool` on your own.'
  prefs: []
  type: TYPE_NORMAL
- en: You’ll also want a way to continuously update information in the vector databases.
    This is the biggest headache — it’s hard to know when something has changed, so
    you need some kind of change-detection method along with an ID for each chunk.
  prefs: []
  type: TYPE_NORMAL
- en: You could just use periodic re-embedding strategies where you update a chunk
    with different meta tags altogether (this is my preferred approach because I’m
    lazy).
  prefs: []
  type: TYPE_NORMAL
- en: The last thing I want to mention is long-term memory for the agent, so it can
    understand conversations you’ve had in the past. For that, I’ve implemented some
    state by fetching history from the Slack API. This lets the agent see around 3–6
    previous messages when responding.
  prefs: []
  type: TYPE_NORMAL
- en: We don’t want to push in too much history, since the context window grows —
    which not only increases cost but also tends to confuse the agent.
  prefs: []
  type: TYPE_NORMAL
- en: That said, there are better ways to handle long-term memory using external tools.
    I’m keen to write more on that in the future.
  prefs: []
  type: TYPE_NORMAL
- en: Learnings and so on
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: After doing this now for a bit I have a few notes to share about working with
    frameworks and keeping it simple (that I personally don’t always follow).
  prefs: []
  type: TYPE_NORMAL
- en: You learn a lot from using a framework, especially how to prompt well and how
    to structure the code. But at some point, working around the framework adds overhead.
  prefs: []
  type: TYPE_NORMAL
- en: For instance, in this system, I’m bypassing the framework a bit by adding an
    initial API call that decides whether to move on to the agent and responds to
    the user quickly.
  prefs: []
  type: TYPE_NORMAL
- en: If I had built this without a framework, I think I could have handled that kind
    of logic better where the first model decides what tool to call right away.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/486dd40aec6cd84daa98291f2850b170.png)'
  prefs: []
  type: TYPE_IMG
- en: LLM API calls in the system | Image by author
  prefs: []
  type: TYPE_NORMAL
- en: I haven’t tried this but I’m assuming this would be cleaner.
  prefs: []
  type: TYPE_NORMAL
- en: Also, LlamaIndex optimizes the user query, which it should, before retrieval.
  prefs: []
  type: TYPE_NORMAL
- en: But sometimes it reduces the query too much, and I need to go in and fix it.
    The citation synthesizer doesn’t have access to the conversation history, so with
    that overly simplified query, it doesn’t always answer well.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c65fd4a360b3635839b7d39326b3e251.png)'
  prefs: []
  type: TYPE_IMG
- en: The abstractions can sometimes cause the system to lose context | Image by author
  prefs: []
  type: TYPE_NORMAL
- en: With a framework, it’s also hard to trace where latency is coming from in the
    workflow since you can’t always see everything, even with observation tools.
  prefs: []
  type: TYPE_NORMAL
- en: Most developers recommend using frameworks for quick prototyping or bootstrapping,
    then rewriting the core logic with direct calls in production.
  prefs: []
  type: TYPE_NORMAL
- en: It’s not because the frameworks aren’t useful, but because at some point it’s
    better to write something you fully understand that only does what you need.
  prefs: []
  type: TYPE_NORMAL
- en: The general recommendation is to keep things as simple as possible and minimize
    LLM calls (which I am not even fully doing myself here).
  prefs: []
  type: TYPE_NORMAL
- en: But if all you need is RAG and not an agent, stick with that.
  prefs: []
  type: TYPE_NORMAL
- en: You can create a simple LLM call that sets the right parameters in the vector
    DB. From the user’s point of view, it’ll still look like the system is “looking
    into the database” and returning relevant info.
  prefs: []
  type: TYPE_NORMAL
- en: If you’re going down the same path, I hope this was useful.
  prefs: []
  type: TYPE_NORMAL
- en: There is bit more to it though. You’ll want to implement some kind of evaluation,
    guardrails, and monitoring (I’ve used Phoenix here).
  prefs: []
  type: TYPE_NORMAL
- en: 'Once finished though, the result will look like this:'
  prefs: []
  type: TYPE_NORMAL
