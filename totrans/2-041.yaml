- en: Motivation
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 动机
- en: My motivation for writing this article is that I work daily on different LLM
    applications. I’ve read more and more about using LLM as a judge, and I started
    reading up on the topic. I believe utilizing LLMs for automated evaluations of
    machine-learning systems is a super powerful aspect of LLMs that’s often underestimated.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 我写这篇文章的动机是我在日常工作中处理不同的LLM应用。我阅读了越来越多的关于使用LLM作为评判者的内容，我开始深入研究这个主题。我相信利用LLM对机器学习系统进行自动评估是LLM的一个非常强大但常被低估的方面。
- en: Using LLM as a judge can save you enormous amounts of time, considering it can
    automate either part of, or the whole, evaluation process. Evaluations are critical
    for machine-learning systems to ensure they perform as intended. However, evaluations
    are also time-consuming, and you thus want to automate them as much as possible.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 使用大型语言模型（LLM）作为评判者可以为您节省大量时间，因为它可以自动化评估过程的一部分或全部。评估对于机器学习系统至关重要，以确保它们按预期运行。然而，评估也是耗时的工作，因此您希望尽可能多地自动化它们。
- en: One powerful example use case for LLM as a judge is in a question-answering
    system. You can gather a series of input-output examples for two different versions
    of a prompt. Then you can ask the LLM judge to respond with whether the outputs
    are equal (or the latter prompt version output is better), and thus ensure changes
    in your application do not have a negative impact on performance. This can, for
    example, be used pre-deployment of new prompts.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: LLM作为评判者的一个强大用例是在问答系统中。您可以收集两个不同版本提示的输入输出示例。然后您可以要求LLM评判者回应输出是否相等（或后者提示版本的输出更好），从而确保您应用程序中的更改不会对性能产生负面影响。例如，这可以在新提示部署前使用。
- en: Definition
  id: totrans-21
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 定义
- en: I define LLM as a judge, as any case where you prompt an LLM to evaluate the
    output of a system. The system is primarily machine-learning-based, though this
    is not a requirement. You simply provide the LLM with a set of instructions on
    how to evaluate the system, providing information such as what’s important for
    the evaluation and what evaluation metric should be used. The output can then
    be processed to continue deployment or stop the deployment because the quality
    is deemed lower. This eliminates the time-consuming and inconsistent step of manually
    reviewing LLM outputs before making changes to your application.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 我将LLM作为评判者定义，任何你提示LLM评估系统输出的情况。该系统主要是基于机器学习的，尽管这不是一个必要条件。你只需向LLM提供一套如何评估系统的说明，包括评估时哪些信息是重要的以及应使用哪些评估指标。然后，可以根据输出质量的高低来决定继续部署或停止部署。这消除了在更改应用程序之前手动审查LLM输出的耗时且不一致的步骤。
- en: LLM as a judge evaluation methods
  id: totrans-23
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: LLM作为评判者的评估方法
- en: 'LLM as a judge can be used for a variety of applications, such as:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: LLM作为评判者可用于各种应用，例如：
- en: Question answering systems
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 问答系统
- en: Classification systems
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分类系统
- en: Information extraction systems
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 信息提取系统
- en: …
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: …
- en: Different applications will require different evaluation methods, so I will
    describe three different methods below
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 不同的应用将需要不同的评估方法，所以我将下面描述三种不同的方法
- en: Compare two outputs
  id: totrans-30
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 比较两个输出
- en: Comparing two outputs is a great use of LLM as a judge. With this evaluation
    metric, you compare the output of two different models.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 比较两个输出是使用LLM作为评判者的一个很好的用途。使用这个评估指标，你比较两个不同模型的输出。
- en: 'The difference between the models can, for example, be:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 模型的差异，例如，可以是：
- en: Different input prompts
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不同的输入提示
- en: Different LLMs (i.e., OpenAI GPT4o vs Claude Sonnet 4.0)
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不同的LLM（例如，OpenAI GPT4o与Claude Sonnet 4.0）
- en: Different embedding models for RAG
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: RAG的不同嵌入模型
- en: 'You then provide the LLM judge with four items:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 你随后向LLM评判者提供四项内容：
- en: The input prompt(s)
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输入提示（s）
- en: Output from model 1
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模型1的输出
- en: Output from model 2
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模型2的输出
- en: Instructions on how to perform the evaluation
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何执行评估的说明
- en: 'You can then ask the LLM judge to provide one of the three following outputs:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以要求LLM评判者提供以下三个输出之一：
- en: Equal (the essence of the outputs is the same)
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 相等（输出的本质是相同的）
- en: Output 1 (the first model is better)
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输出1（第一个模型更好）
- en: Output 2 (the second model is better).
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输出2（第二个模型更好）。
- en: You can, for example, use this in the scenario I described earlier, if you want
    to update the input prompt. You can then ensure that the updated prompt is equal
    to or better than the previous prompt. If the LLM judge informs you that all test
    samples are either equal or the new prompt is better, you can likely automatically
    deploy the updates.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果你想在前面描述的场景中更新输入提示，你可以确保更新的提示与之前的提示相等或更好。如果LLM评判者告诉你所有测试样本要么相等，要么新的提示更好，你很可能可以自动部署更新。
- en: Score outputs
  id: totrans-46
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 评分输出
- en: 'Another evaluation metric you can use for LLM as a judge is to provide the
    output a score, for example, between 1 and 10\. In this scenario, you need to
    provide the LLM judge with the following:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 你还可以使用另一个评估指标来作为LLM的评判标准，即为输出提供分数，例如，在1到10之间。在这种情况下，你需要向LLM评判者提供以下内容：
- en: Instructions for performing the evaluation
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 执行评估的说明
- en: The input prompt
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输入提示
- en: The output
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输出
- en: In this evaluation method, it’s critical to provide clear instructions to the
    LLM judge, considering that providing a score is a subjective task. I strongly
    recommend providing examples of outputs that resemble a score of 1, a score of
    5, and a score of 10\. This provides the model with different anchors it can utilize
    to provide a more accurate score. You can also try using fewer possible scores,
    for example, only scores of 1, 2, and 3\. Fewer options will increase the model
    accuracy, at the cost of making smaller differences harder to differentiate, because
    of less granularity.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种方法中，向LLM评判者提供清晰的说明至关重要，因为提供分数是一个主观任务。我强烈建议提供类似于1分、5分和10分的输出示例。这为模型提供了不同的锚点，可以用来提供更准确的分数。你也可以尝试使用更少的可能分数，例如，只有1分、2分和3分。更少的选项会增加模型准确性，但代价是使更小的差异更难区分，因为粒度更少。
- en: The scoring evaluation metric is useful for running larger experiments, comparing
    different prompt versions, models, and so on. You can then utilize the average
    score over a larger test set to accurately judge which approach works best.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 评分评估指标对于运行更大规模的实验、比较不同的提示版本、模型等很有用。然后，你可以利用更大测试集上的平均分数来准确判断哪种方法效果最好。
- en: Pass/fail
  id: totrans-53
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 通过/失败
- en: Pass or fail is another common evaluation metric for LLM as a judge. In this
    scenario, you ask the LLM judge to either approve or disapprove the output, given
    a description of what constitutes a pass and what constitutes a fail. Similar
    to the scoring evaluation, this description is critical to the performance of
    the LLM judge. Again, I recommend using examples, essentially utilizing few-shot
    learning to make the LLM judge more accurate. You can read more about few-shot
    learning in [my article on context engineering.](https://towardsdatascience.com/how-to-significantly-enhance-llms-by-leveraging-context-engineering-2/#:~:text=There%20are%20a%20lot%20of,to%20perform%20a%20task%20effectively.)
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 通过或失败是LLM作为裁判员常用的另一个评估指标。在这种情况下，你要求LLM裁判员根据构成通过和构成失败的标准来批准或拒绝输出。与评分评估类似，这个描述对于LLM裁判员的表现至关重要。再次，我建议使用示例，本质上利用少样本学习来提高LLM裁判员的准确性。你可以在[我的关于上下文工程的文章中了解更多关于少样本学习的信息。](https://towardsdatascience.com/how-to-significantly-enhance-llms-by-leveraging-context-engineering-2/#:~:text=There%20are%20a%20lot%20of,to%20perform%20a%20task%20effectively.)
- en: The pass fail evaluation metric is useful for RAG systems to judge if a model
    correctly answered a question. You can, for example, provide the fetched chunks
    and the output of the model to determine whether the RAG system answers correctly.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 通过/失败评估指标对于RAG系统判断模型是否正确回答问题很有用。例如，你可以提供检索到的片段和模型的输出，以确定RAG系统是否正确回答。
- en: Important notes
  id: totrans-56
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 重要注意事项
- en: Compare with a human evaluator
  id: totrans-57
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 与人类评估者比较
- en: I also have a few important notes regarding LLM as a judge, from working on
    it myself. The number one learning is that while LLM as a judge system can save
    you large amounts of time, it can also be unreliable. When implementing the LLM
    judge, you thus need to test the system manually, ensuring the LLM as a judge
    system responds similarly to a human evaluator. This should preferably be performed
    as a blind test. For example, you can set up a series of pass/fail examples, and
    see how often the LLM judge system agrees with the human evaluator.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 我也有一些关于将LLM作为裁判员的重要注意事项，这些是从我自己的工作中得出的。最重要的学习经验是，虽然LLM作为裁判系统可以为你节省大量时间，但它也可能不可靠。因此，在实施LLM裁判系统时，你需要手动测试系统，确保LLM作为裁判系统对人类评估者的反应与人类评估者相似。这最好以盲测的方式进行。例如，你可以设置一系列通过/失败示例，并查看LLM裁判系统与人类评估者达成一致的情况有多频繁。
- en: Cost
  id: totrans-59
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 成本
- en: Another important note to keep in mind is the cost. The cost of LLM requests
    is trending downwards, but when developing an LLM as a judge system, you are also
    performing a lot of requests. I would thus keep this in mind and perform estimations
    on the cost of the system. For example, if each LLM as a judge runs costs 10 USD,
    and you, on average, perform five such runs a day, you incur a cost of 50 USD
    per day. You may need to evaluate whether this is an acceptable price for more
    effective development, or if you should reduce the cost of the LLM as a judge
    system. You can for example reduce the cost by using cheaper models (GPT-4o-mini
    instead of GPT-4o), or reduce the number of test examples.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个需要记住的重要注意事项是成本。LLM请求的成本正在下降，但当你开发LLM作为裁判系统时，你也在执行大量请求。因此，我建议你记住这一点，并对系统的成本进行估算。例如，如果每个LLM作为裁判员的运行成本为10美元，而你平均每天执行五次这样的运行，那么你每天的成本为50美元。你可能需要评估这是否是更有效开发的可接受价格，或者你是否应该降低LLM作为裁判系统的成本。例如，你可以通过使用更便宜的模型（GPT-4o-mini而不是GPT-4o）或减少测试示例的数量来降低成本。
- en: Conclusion
  id: totrans-61
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this article, I have discussed how LLM as a judge works and how you can utilize
    it to make development more effective. LLM as a judge is an often overlooked aspect
    of LLMs, which can be incredibly powerful, for example, pre-deployments to ensure
    your question answering system still works on historic queries.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我讨论了LLM作为裁判员的工作原理以及如何利用它使开发更有效。LLM作为裁判员是LLM经常被忽视的方面，它可以非常强大，例如，在部署前确保你的问答系统仍然可以在历史查询上工作。
- en: I discussed different evaluation methods, with how and when you should utilize
    them. LLM as a judge is a flexible system, and you need to adapt it to whichever
    scenario you are implementing. Lastly, I also discussed some important notes,
    for example, comparing the LLM judge with a human evaluator.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 我讨论了不同的评估方法，包括何时以及如何使用它们。将LLM作为评委是一个灵活的系统，你需要根据你实施的场景来调整它。最后，我还讨论了一些重要注意事项，例如将LLM评委与人类评委进行比较。
