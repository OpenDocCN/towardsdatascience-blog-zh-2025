- en: This infographic highlights the contents of my article. Image by ChatGPT.
  prefs: []
  type: TYPE_NORMAL
- en: You can also read [my article on Benchmarking LLMs](https://towardsdatascience.com/how-to-benchmark-llms-arc-agi-3/)
    [with ARC AGI 3](https://towardsdatascience.com/how-to-benchmark-llms-arc-agi-3/) and
    check out [my website, which contains all my information and articles.](https://eivindkjosbakken.com/)
  prefs: []
