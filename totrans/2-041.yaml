- en: How to Use LLMs for Powerful Automatic Evaluations
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/how-to-use-llms-for-powerful-automatic-evaluations/](https://towardsdatascience.com/how-to-use-llms-for-powerful-automatic-evaluations/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1755113810780" class="mdspan-comment">In this article, I</mdspan>
    discuss how you can perform automatic evaluations using LLM as a judge. LLMs are
    widely used today for a variety of applications. However, an often underestimated
    aspect of LLMs is their use case for evaluation. With LLM as a judge, you utilize
    LLMs to judge the quality of an output, whether it be giving it a score between
    1 and 10, comparing two outputs, or providing pass/fail feedback. The goal of
    the article is to provide insights into how you can utilize LLM as a judge for
    your own application, to make development more effective.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/25b7d86ee565118c1329c67f6d59286a.png)'
  prefs: []
