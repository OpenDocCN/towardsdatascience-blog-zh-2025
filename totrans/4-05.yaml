- en: 'Sparse AutoEncoder: from Superposition to interpretable features'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 稀疏自动编码器：从叠加到可解释特征
- en: 原文：[https://towardsdatascience.com/sparse-autoencoder-from-superposition-to-interpretable-features-4764bb37927d/](https://towardsdatascience.com/sparse-autoencoder-from-superposition-to-interpretable-features-4764bb37927d/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/sparse-autoencoder-from-superposition-to-interpretable-features-4764bb37927d/](https://towardsdatascience.com/sparse-autoencoder-from-superposition-to-interpretable-features-4764bb37927d/)
- en: '**Complex neural networks**, such as Large Language Models (LLMs), suffer quite
    often from **interpretability** challenges. One of the most important reasons
    for such difficulty is **superposition** – a phenomenon of the neural network
    having fewer dimensions than the number of features it has to represent. For example,
    a toy LLM with 2 neurons has to present 6 different language features. As a result,
    we observe often that a single neuron needs to activate for multiple features.
    For a more detailed explanation and definition of superposition, please refer
    to my previous [blog post](https://medium.com/towards-data-science/superposition-what-makes-it-difficult-to-explain-neural-network-565087243be4):
    "Superposition: What Makes it Difficult to Explain Neural Network".'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '**复杂神经网络**，例如大型语言模型（LLMs），常常面临**可解释性**的挑战。这种困难的一个重要原因是**叠加**——神经网络维度少于它需要表示的特征数量。例如，一个具有2个神经元的玩具LLM需要呈现6种不同的语言特征。因此，我们经常观察到单个神经元需要激活多个特征。对于叠加的更详细解释和定义，请参阅我的之前的[博客文章](https://medium.com/towards-data-science/superposition-what-makes-it-difficult-to-explain-neural-network-565087243be4)：
    "叠加：是什么让神经网络难以解释"。'
- en: 'In this blog post, we take one step further: let’s try to disentangle some
    fsuperposed features. I will introduce a methodology called **Sparse Autoencoder**
    to decompose complex neural network, especially LLM into interpretable features,
    with a toy example of language features.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇博客文章中，我们更进一步：让我们尝试解开一些叠加的特征。我将介绍一种称为**稀疏自动编码器**的方法，通过玩具示例来分解复杂神经网络，特别是LLM，以揭示可解释的特征。
- en: Sparse AutoEncoder
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 稀疏自动编码器
- en: A **Sparse Autoencoder**, by definition, is an Autoencoder with sparsity introduced
    on purpose in the activations of its hidden layers. With a rather simple structure
    and light training process, it aims to decompose a complex neural network and
    uncover the features in a more interpretable way and more understandable to humans.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 根据定义，**稀疏自动编码器**是一种在隐藏层激活中故意引入稀疏性的自动编码器。它具有相对简单的结构和轻量级的训练过程，旨在分解复杂神经网络，并以更可解释、更易于人类理解的方式揭示特征。
- en: Let us imagine that you have a trained neural network. The autoencoder is not
    part of the training process of the model itself but is instead a post-hoc analysis
    tool. The original model has its own activations, and these activations are collected
    afterwards and then used as input data for the sparse autoencoder.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们想象你有一个训练好的神经网络。自动编码器不是模型本身的训练过程的一部分，而是一个事后分析工具。原始模型有自己的激活，这些激活随后被收集并用作稀疏自动编码器的输入数据。
- en: For example, we suppose that your original model is a neural network with one
    hidden layer of 5 neurons. Besides, you have a training dataset of 5000 samples.
    You have to collect all the values of the 5-dimensional activation of the hidden
    layer for all your 5000 training samples, and they are now the input for your
    sparse autoencoder.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，我们假设你的原始模型是一个具有一个5个神经元的隐藏层的神经网络。此外，你有一个包含5000个样本的训练数据集。你必须收集所有5000个训练样本中隐藏层5维激活的所有值，现在它们是你的稀疏自动编码器的输入。
- en: '![Image by author: Autoencoder to analyse an LLM](../Images/7cebcc8f1bff2ff3f681a1cec3196fbf.png)'
  id: totrans-8
  prefs: []
  type: TYPE_IMG
  zh: '![图片由作者提供：用于分析LLM的自动编码器](../Images/7cebcc8f1bff2ff3f681a1cec3196fbf.png)'
- en: 'Image by author: Autoencoder to analyse an LLM'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供：用于分析LLM的自动编码器
- en: The autoencoder then learns a new, sparse representation from these activations.
    The encoder maps the original MLP activations into a new vector space with higher
    representation dimensions. Looking back at my previous 5-neuron simple example,
    we might consider to map it into a vector space with 20 features. Hopefully, we
    will obtain a sparse autoencoder effectively decomposing the original MLP activations
    into a representation, easier to interpret and analyze.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，自动编码器从这些激活中学习一个新的、稀疏的表示。编码器将原始MLP激活映射到一个具有更高表示维度的新的向量空间。回顾我之前的5个神经元的简单例子，我们可能会考虑将其映射到一个具有20个特征的向量空间。希望我们能够获得一个有效地将原始MLP激活分解为表示的稀疏自动编码器，这种表示更容易解释和分析。
- en: Sparsity is an important in the autoencoder because it is necessary for the
    autoencoder to "disentangle" features, with more "freedom" than in a dense, overlapping
    space.. Without existence of sparsity, the autoencoder will probably the autoencoder
    might just learn a trivial compression without any meaningful features’ formation.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 稀疏性在自动编码器中非常重要，因为它对于自动编码器“解耦”特征是必要的，比在密集、重叠的空间中拥有更多的“自由度”。如果没有稀疏性的存在，自动编码器可能会仅仅学习到一个平凡的压缩，而没有形成任何有意义的特征。
- en: Toy Model
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 玩具模型
- en: Language model
  id: totrans-13
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 语言模型
- en: Let us now build our toy model. I beg the readers to note that this model is
    not realistic and even a bit silly in practice but it is sufficient to showcase
    how we build sparse autoencoder and capture some features.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们构建我们的玩具模型。我要求读者注意，这个模型在实践上并不现实，甚至有点愚蠢，但它足以展示我们如何构建稀疏自动编码器并捕捉一些特征。
- en: 'Suppose now we have built a language model which has one particular hidden
    layer whose activation has three dimensions. Let us suppose also that we have
    the following tokens: "cat," "happy cat," "dog," "energetic dog," "not cat," "not
    dog," "robot," and "AI assistant" in the training dataset and they have the following
    activation values.'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我们现在已经构建了一个具有一个特定隐藏层且其激活有三个维度的语言模型。让我们假设在训练数据集中有以下标记："cat"、"happy cat"、"dog"、"energetic
    dog"、"not cat"、"not dog"、"robot" 和 "AI assistant"，并且它们具有以下激活值。
- en: '[PRE0]'
  id: totrans-16
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Construction of autoencoder
  id: totrans-17
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 自动编码器的构建
- en: 'We now build the autoencoder with the following code:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在使用以下代码构建自动编码器：
- en: '[PRE1]'
  id: totrans-19
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: According to the code above, we see that the encoder has a only one fully connected
    linear layer, mapping the input to a hidden representation with `hidden_dim` and
    it then passes to a ReLU activation. The decoder uses just one linear layer to
    reconstruct the input. Note that the absence of ReLU activation in the decoder
    is intentional for our specific reconstruction case, because the reconstruction
    might contain real-valued and potentially negative valued data. A ReLU would on
    the contrary force the output to stay non-negative, which is not desirable for
    our reconstruction.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 根据上面的代码，我们可以看到编码器只有一个全连接的线性层，将输入映射到具有 `hidden_dim` 的隐藏表示，然后传递到ReLU激活。解码器仅使用一个线性层来重建输入。请注意，解码器中缺少ReLU激活是我们特定重建情况下的故意行为，因为重建可能包含实值和潜在的负值数据。ReLU会相反地强制输出保持非负，这不符合我们的重建需求。
- en: 'We train model using the code below. Here, the loss function has two parts:
    the reconstruction loss, measuring the accuracy of the autoencoder’s reconstruction
    of the input data, and a sparsity loss (with weight), which encourages sparsity
    formulation in the encoder.'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用以下代码训练模型。在这里，损失函数有两个部分：重建损失，衡量自动编码器重建输入数据的准确性，以及一个稀疏性损失（带有权重），它鼓励在编码器中形成稀疏性。
- en: '[PRE2]'
  id: totrans-22
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Interpretable features
  id: totrans-23
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 可解释的特征
- en: Now we can have a look of the result. We have plotted the encoder’s output value
    of each activation of the original models. Recall that the input tokens are "cat,"
    "happy cat," "dog," "energetic dog," "not cat," "not dog," "robot," and "AI assistant".
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们可以看看结果。我们绘制了原始模型每个激活的编码器的输出值。回想一下，输入标记是 "cat"、"happy cat"、"dog"、"energetic
    dog"、"not cat"、"not dog"、"robot" 和 "AI assistant"。
- en: '![Image by author: features learned by encoder](../Images/3daaee46149c92b18ae5018e58f7da45.png)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![图片由作者提供：编码器学习到的特征](../Images/3daaee46149c92b18ae5018e58f7da45.png)'
- en: 'Image by author: features learned by encoder'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供：编码器学习到的特征
- en: Even though the original model was designed with a very simple architecture
    without any deep consideration, the autoencoder has still captured meaningful
    features of this trivial model. According to the plot above, we can observe at
    least four features that appear to be learned by the encoder.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管原始模型的设计非常简单，没有任何深入考虑，但自动编码器仍然捕捉到了这个平凡模型的有意义特征。根据上面的图表，我们可以观察到至少四个似乎是由编码器学习到的特征。
- en: 'Give first Feature 1 a consideration. This feautre has big activation values
    on the 4 following tokens: "cat", "happy cat", "dog", and "energetic dog". The
    result suggests that Feature 1 can be something related to "animals" or "pets".
    Feature 2 is also an interesting example, activating on two tokens "robot" and
    "AI assistant". We guess, therefore, this feature has something to do with "artificial
    and robotics", indicating the model’s understanding on technological contexts.
    Feature 3 has activation on 4 tokens: "not cat", "not dog", "robot" and "AI assistant"
    and this is possibly a feature "not an animal".'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 首先考虑特征1。这个特征在以下4个标记上有较大的激活值：“cat”（猫）、“happy cat”（快乐猫）、“dog”（狗）和“energetic dog”（精力充沛的狗）。结果表明，特征1可能与“动物”或“宠物”有关。特征2也是一个有趣的例子，它在两个标记“robot”（机器人）和“Ai
    assistant”（AI助手）上激活。因此，我们猜测这个特征与“人工和机器人”有关，表明模型对技术背景的理解。特征3在4个标记上激活：“not cat”（不是猫）、“not
    dog”（不是狗）、“robot”（机器人）和“Ai assistant”（AI助手），这可能是“非动物”的特征。
- en: 'Unfortunately, original model is not a real model trained on real-world text,
    but rather artificially designed with the assumption that similar tokens have
    some similarity in the activation vector space. However, the results still provide
    interesting insights: the sparse autoencoder succeeded in showing some meaningful,
    human-friendly features or real-world concepts.'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 不幸的是，原始模型并非在真实世界文本上训练的真实模型，而是通过假设相似标记在激活向量空间中具有某种相似性而人工设计的。然而，这些结果仍然提供了有趣的见解：稀疏自编码器成功地展示了一些有意义、对人类友好的特征或现实世界概念。
- en: Conclusion
  id: totrans-30
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: The simple result in this blog post suggests:, a sparse autoencoder can effectively
    help to get high-level, interpretable features from complex neural networks such
    as LLM.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 本博客文章中的简单结果表明：稀疏自编码器可以有效地帮助从复杂的神经网络（如LLM）中获取高级、可解释的特征。
- en: For readers interested in a real-world implementation of sparse autoencoders,
    I recommend this [article](https://transformer-circuits.pub/2023/monosemantic-features/index.html),
    where an autoencoder was trained to interpret a real large language model with
    512 neurons. This study provides a real application of sparse autoencoders in
    the context of LLM’s interpretability.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 对于对稀疏自编码器的真实世界实现感兴趣的读者，我推荐这篇[文章](https://transformer-circuits.pub/2023/monosemantic-features/index.html)，其中自编码器被训练来解释一个具有512个神经元的真实大型语言模型。这项研究提供了稀疏自编码器在LLM可解释性背景下的实际应用。
- en: Finally, I provide here this google colab [notebook](https://colab.research.google.com/drive/11uqjg3a6IdhXok4iNnbbojC_cVASmIHH#scrollTo=boRLI5vmUBwx&line=44&uniqifier=1)
    for my detailed implementation mentioned in this article.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我在此提供这个google colab [笔记本](https://colab.research.google.com/drive/11uqjg3a6IdhXok4iNnbbojC_cVASmIHH#scrollTo=boRLI5vmUBwx&line=44&uniqifier=1)，其中详细介绍了本文中提到的我的实现方法。
