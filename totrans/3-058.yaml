- en: Adding Training Noise To Improve Detections In Transformers
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 向 Transformer 中添加训练噪声以改进检测
- en: 原文：[https://towardsdatascience.com/adding-training-noise-to-improve-detections-in-transformers/](https://towardsdatascience.com/adding-training-noise-to-improve-detections-in-transformers/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/adding-training-noise-to-improve-detections-in-transformers/](https://towardsdatascience.com/adding-training-noise-to-improve-detections-in-transformers/)
- en: <mdspan datatext="el1745628298724" class="mdspan-comment">Modern vision transformers</mdspan>
    add noise to improve the performance of 2D and 3D object detection. In this article
    we will learn how this mechanism works and discuss its contribution.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1745628298724" class="mdspan-comment">现代视觉 Transformer</mdspan>
    通过添加噪声来提高二维和三维物体检测的性能。在这篇文章中，我们将学习这种机制是如何工作的，并讨论其贡献。
- en: Early Vision Transformers
  id: totrans-3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 早期视觉 Transformer
- en: 'DETR — DEtection TRansformer (Carion, Massa et al. 2020), one of the first
    transformer architectures for object detection, used learned decoder queries to
    extract detection information from the image tokens. These queries were randomly
    initialized, and the architecture did not impose any constraints that forced these
    queries to learn things that resembled anchors. While achieving comparable results
    with Faster-RCNN, its drawback was in its slow convergence — 500 epochs were required
    to train it (DN-DETR, Li et al., 2024). More recent DETR-based architectures,
    used deformable aggregation that enabled queries to focus only on certain regions
    in the image (Zhu et al., Deformable DETR: Deformable Transformers For End-To-End
    Object Detection, 2020), while others (Liu et al., DAB-DETR: Dynamic Anchor Boxes
    Are Better Queries For DETR, 2022) used spatial anchors (generated using k-means,
    in a way similar to the way anchor-based CNNs do it), that were encoded into the
    initial queries. Skip connections forced the decoder block of the transformer
    learn boxes as regression values from the anchors. Deformable attention layers
    used the pre-encoding anchors to sample spatial features from the image and use
    them to construct tokens for attention. During training the model learns the optimal
    anchors to use. This approach teaches the model to explicitly use features like
    box size in its queries.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 'DETR — DEtection TRansformer (Carion, Massa et al. 2020)，是第一个用于物体检测的 Transformer
    架构之一，它使用学习到的解码器查询从图像标记中提取检测信息。这些查询是随机初始化的，该架构没有强加任何约束，迫使这些查询学习类似于锚点的东西。虽然与 Faster-RCNN
    实现了可比的结果，但其缺点在于其收敛速度慢——需要 500 个 epoch 来训练它（DN-DETR，Li et al.，2024）。更近期的基于 DETR
    的架构，使用了可变形聚合，使查询能够仅关注图像中的某些区域（Zhu et al.，Deformable DETR: Deformable Transformers
    For End-To-End Object Detection，2020），而其他（Liu et al.，DAB-DETR: Dynamic Anchor
    Boxes Are Better Queries For DETR，2022）使用了空间锚点（使用 k-means 生成，类似于基于锚点的 CNN 的方式），这些锚点被编码到初始查询中。跳过连接迫使
    Transformer 的解码器块学习从锚点回归的值。可变形注意力层使用预编码的锚点从图像中采样空间特征，并使用这些特征来构建用于注意力的标记。在训练过程中，模型学习使用最佳锚点。这种方法教会模型在其查询中明确使用诸如框大小等特征。'
- en: '![](../Images/c04f329bb7c832ad7c6efb0cc2b42d29.png)'
  id: totrans-5
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/c04f329bb7c832ad7c6efb0cc2b42d29.png)'
- en: 'Figure 1\. DETR, basic diagram. The yellow and purple queries optimally lead
    to detections with very low confidence or detections with class “No object”. Source:
    The author.'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1\. DETR，基本图。黄色和紫色的查询最优地引导到置信度非常低或类别为“无物体”的检测。来源：作者。
- en: Prediction To Ground Truth Matching
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 预测与真实值的匹配
- en: In order to calculate the loss, the trainer first needs to match the model’s
    predictions with ground truth (GT) boxes. While anchor-based CNNs have relatively
    easy solutions to that problem (e.g. every anchor can only be matched with GT
    boxes in its voxel during training, and, in inference, non-maximum suppression
    to remove overlapping detections), the standard for transformers, set by DETR,
    is to use a bipartite matching algorithm called the Hungarian algorithm. In each
    iteration, the algorithm finds the best prediction to GT matching (a matching
    that optimizes some cost function, like the mean squared distance between box
    corners, summed over all the boxes). The loss is then calculated between pairs
    of prediction-GT box and can be back-propagated. Excess predictions (prediction
    with no matching GT) incur a separate loss that encourages them to decrease their
    confidence score.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 为了计算损失，训练器首先需要将模型的预测与地面真实（GT）框匹配。虽然基于锚点的CNN有相对容易的解决方案（例如，每个锚点在训练期间只能与其voxel中的GT框匹配，在推理时使用非极大值抑制来去除重叠的检测），但由DETR设定的transformer标准是使用一种称为匈牙利算法的二分匹配算法。在每次迭代中，算法找到最佳预测与GT的匹配（一种优化某些成本函数的匹配，如所有框角之间的平均平方距离之和）。然后，计算预测-GT框对之间的损失，并可以进行反向传播。多余的预测（没有匹配GT的预测）将产生一个单独的损失，鼓励它们降低其置信度分数。
- en: The Problem
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 问题
- en: 'The time complexity of the Hungarian algorithm is o(n³). Interestingly, this
    isn’t necessarily the bottle neck in training quality: it was shown (The Stable
    Marriage Problem: An Interdisciplinary Review From The Physicist’s Perspective,
    Fenoaltea et al., 2021) that the algorithm is unstable, in the sense that a small
    change in its objective function may lead to a dramatic change in its matching
    result — leading to inconsistent query training objectives. The practical implications
    in transformer training are that object-queries can jump between objects and take
    a long time to learn the best features for convergence.'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 匈加里算法的时间复杂度为o(n³)。有趣的是，这并不一定是训练质量的瓶颈：正如（《稳定婚姻问题：从物理学家视角的跨学科综述》，Fenoaltea等人，2021年）所展示的，该算法是不稳定的，即其目标函数的微小变化可能导致其匹配结果发生剧烈变化——导致查询训练目标不一致。在transformer训练中的实际影响是，目标查询可以在对象之间跳跃，并且需要很长时间才能学习到最佳特征以收敛。
- en: DN-DETR
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: DN-DETR
- en: An elegant solution to the unstable matching problem was proposed by Li et al.
    and later adopted by many other works, including DINO, Mask DINO, Group DETR etc.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 李等人提出了一种解决不稳定匹配问题的优雅方案，后来该方案被许多其他工作采用，包括DINO、Mask DINO、Group DETR等。
- en: The main idea in DN-DETR is to boost training by creating **fictitious, easy-to-regress-from
    anchors**, that skip the matching process. This is done during training by adding
    a small amount of noise to GT boxes and feeding these noised-up boxes as anchors
    to the decoder queries. The DN queries are masked from the organic queries and
    vice versa, to avoid cross attention that would interfere with the training. The
    detections generated by these queries are already matched with their source-GT
    boxes and do not require the bipartite matching. The authors of DN-DETR have shown
    that during validation stages at epoch ends (where denoising is turned off), this
    improves the stability of the model compared to DETR and DAB-DETR, in the sense
    that more queries are consistent in their matching with a GT object in successive
    epochs. (See Figure 2).
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: DN-DETR中的主要思想是通过创建**虚构的、易于回归的锚点**来提升训练，这些锚点跳过了匹配过程。这是在训练过程中通过向GT框添加少量噪声并将这些噪声增强的框作为锚点输入到解码器查询中实现的。DN查询被屏蔽在有机查询之外，反之亦然，以避免干扰训练的交叉注意力。这些查询生成的检测已经与它们的源GT框匹配，不需要进行二分匹配。DN-DETR的作者表明，在验证阶段（在epoch结束时，去噪被关闭），与DETR和DAB-DETR相比，这提高了模型稳定性，即在连续的epoch中，更多的查询与其GT对象的匹配是一致的。（见图2）。
- en: The authors show that using DN both accelerates convergence, and achieves better
    detection results. (See Figure 3). Their ablation study exhibits an increase of
    1.9% in AP on COCO detection dataset, compared the previous SOTA (DAB-DETR, AP
    42.2%), when using ResNet-50 as backbone.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 作者表明，使用DN既可以加速收敛，又能实现更好的检测结果。（见图3）。他们的消融研究显示，在COCO检测数据集上，与之前的SOTA（DAB-DETR，AP
    42.2%）相比，使用ResNet-50作为主干网络时，AP提高了1.9%。
- en: '![](../Images/712dce4bef3be9c4def330b6dcf474df.png)'
  id: totrans-15
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/712dce4bef3be9c4def330b6dcf474df.png)'
- en: 'Figure 2\. Illustration of instability during training as measured during validation.
    Based on data provided in DN-DETR (Li et al., 2022). Image source: The author.'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 图2. 训练过程中不稳定性的示意图，如验证期间测量的。基于DN-DETR提供的数据（Li等，2022）。图像来源：作者。
- en: '![](../Images/2ad95144a6d76fd5c192564b55800934.png)'
  id: totrans-17
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/2ad95144a6d76fd5c192564b55800934.png)'
- en: 'Figure 3\. DN-DETR’s performance quickly surpasses DETR’s maximum performance
    in 1/10 of the training epochs. Based on data in DN-DETR (Li et al., 2022). Image
    source: The author.'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 图3. DN-DETR的性能在1/10的训练周期内迅速超过DETR的最大性能。基于DN-DETR中的数据（Li等，2022）。图像来源：作者。
- en: DINO And Contrastive Denoising
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: DINO与对比去噪
- en: 'DINO took this idea further, and added contrastive learning to the denoising
    mechanism: in addition to the positive example, DINO creates another noised-up
    version for each GT, which is mathematically constructed to be more distant from
    the GT, compared to the positive example (see Figure 4). That version is used
    as a negative example for the training: the model learns to accept the detection
    nearer to the ground truth, and reject the one that is farther away (by learning
    to predict the class “no object”).'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: DINO将这个想法进一步发展，并将对比学习添加到去噪机制中：除了正例之外，DINO还为每个GT创建另一个噪声增强的版本，该版本在数学上被构建得比正例更远离GT（见图4）。该版本被用作训练中的负例：模型学习接受接近真实检测的检测，并拒绝远离的检测（通过学习预测“无物体”类别）。
- en: In addition, DINO enables multiple contrastive denoising (CDN) groups — multiple
    noised-up anchors per GT object — getting more out of each training iteration.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，DINO使多个对比去噪（CDN）组——每个GT对象多个噪声增强的锚点——从每次训练迭代中获得更多。
- en: DINO’s authors report AP of 49% (on COCO val2017) when using CDN.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: DINO的作者报告说，在使用CDN时，AP为49%（在COCO val2017上）。
- en: Recent temporal models, that need to keep track on objects from frame to frame,
    like Sparse4Dv3, using the CDN, and add temporal denoising groups, where some
    of the successful DN anchors are stored (along with the learned, non-DN anchors),
    for usage in later frames, enhancing the model’s performance in object tracking.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 最近的时间模型，需要从帧到帧跟踪对象，如Sparse4Dv3，使用CDN，并添加时间去噪组，其中存储了一些成功的DN锚点（以及学习到的、非DN的锚点），用于后续帧的使用，从而提高模型在目标跟踪中的性能。
- en: '![](../Images/70a478a79d4bbbeb994662077eb0145a.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/70a478a79d4bbbeb994662077eb0145a.png)'
- en: 'Figure 4\. Denoising Illustrated. A snapshot of the training process. Green
    boxes are the current anchors (either learned from previous images or fixed).
    The blue box is a ground truth (GT) box of a bird object. The yellow box is a
    positive example generated by adding noise to the GT box (which changes both position
    and dimensions). The red box is a negative example, guaranteed to be farther away
    (in the x, y, w, h space) from the GT than the positive example. Source: The author.'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 图4. 去噪示意图。训练过程的一个快照。绿色框是当前锚点（要么是从先前图像中学习到的，要么是固定的）。蓝色框是鸟对象的真实（GT）框。黄色框是通过向GT框添加噪声生成的正例（改变了位置和尺寸）。红色框是负例，保证其（在x，y，w，h空间）比正例远。来源：作者。
- en: Discussion
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 讨论
- en: 'Denoising (DN) seems to improve the convergence speed and final performance
    of vision transformer detectors. But, examining the evolution of the various methods
    mentioned above, raises the following questions:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 去噪（DN）似乎提高了视觉transformer检测器的收敛速度和最终性能。但是，检查上述各种方法的演变，提出了以下问题：
- en: DN improves models that use learnable anchors. But are learnable anchor really
    so important? Would DN also improve models that use non-learnable anchors?
  id: totrans-28
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: DN提高了使用可学习锚点的模型。但可学习锚点真的那么重要吗？DN也会提高使用非可学习锚点的模型吗？
- en: The main contribution of DN to the training is by adding stability to the gradient
    descent process by bypassing the bipartite matching. But it seems that the bipartite
    matching is there, mainly because the standard in transformer works is to avoid
    spatial constraints on queries. So, if we manually constrained queries to specific
    image locations, and gave up the use of bipartite matching (or used a simplified
    version of bipartite matching, that runs on each image patch separately) — would
    DN still improve results?
  id: totrans-29
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: DN对训练的主要贡献是通过绕过二分图匹配来增加梯度下降过程的不变性。但似乎二分图匹配仍然存在，主要是因为在transformer的工作标准中是避免对查询的空间约束。因此，如果我们手动将查询约束到特定的图像位置，并放弃使用二分图匹配（或者使用二分图匹配的简化版本，该版本在每个图像块上单独运行）——DN是否仍然能提高结果？
- en: I couldn’t find works that provided clear answers to these questions. My hypothesis
    is that a model that uses non-learnable anchors (provided that the anchors are
    not too sparse) and spatially constrained queries, 1 — would not require a bipartite
    matching algorithm, and 2 — would not benefit from DN in training, as the anchors
    are already known and there is no profit in learning to regress from other evanescent
    anchors.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 我找不到提供明确答案的作品。我的假设是，一个使用非可学习锚点（假设锚点不是太稀疏）和空间约束查询的模型，1 — 不需要二分图匹配算法，2 — 在训练中不会从DN中受益，因为锚点已经已知，从其他虚锚点回归学习没有利润。
- en: If the anchors are fixed but sparse, then, I can see how using evanescent anchors
    that are easier to regress from, can provide a warm-start to the training process.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 如果锚点固定但稀疏，那么，我可以理解使用更容易回归的虚锚点可以为训练过程提供一个良好的起点。
- en: Anchor-DETR (Wand et al., 2021) compare the spatial distribution of learnable
    and non-learnable anchors, and the performance of the respective models, and in
    my opinion, the learnability does not add that much value to the model’s performance.
    Notably — they use the Hungarian algorithm in both methods, so it’s unclear whether
    they could give up the bipartite matching and retain the performance.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: Anchor-DETR（Wand等人，2021）比较了可学习和非可学习锚点的空间分布以及相应模型的性能，在我看来，可学习性并没有给模型性能带来太多价值。值得注意的是——他们在两种方法中都使用了匈牙利算法，因此不清楚他们是否可以放弃二分图匹配并保持性能。
- en: One consideration to make is that there may be production reasons to avoid NMS
    in inference, which promotes using the Hungarian algorithm in training.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 需要考虑的一个因素是，可能存在生产原因避免在推理中使用NMS，这促进了在训练中使用匈牙利算法。
- en: Where can denoising really be significant? In my opinion — in ***tracking***.
    In tracking the model is fed a video stream, and is required not only to detect
    multiple objects across successive frames, but also to preserve the unique identity
    of each detected object. Temporal transformer models, i.e. models that utilize
    the sequential nature of the video stream, don’t process individual frames independently.
    Instead, they maintain a bank that stores previous detections. At training, the
    tracking model is encouraged to regress from an object’s previous detection (or
    more precisely — the anchor that is attached to the object’s previous detection),
    rather than regressing from simply the nearest anchor. And since the previous
    detection is not constrained to some fixed anchor grid, it is plausible that the
    flexibility that DN induces, is beneficial. I would very much like to read future
    works that attend to these issues.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 噪声去除在何处真正具有显著意义？在我看来——在**跟踪**中。在跟踪过程中，模型被输入一个视频流，不仅需要检测连续帧中的多个对象，而且还需要保持每个检测到的对象的唯一身份。时间转换器模型，即利用视频流顺序性质的模型，不会独立处理单个帧。相反，它们维护一个存储先前检测的银行。在训练过程中，跟踪模型被鼓励从对象的先前检测（或更精确地说——附加到对象先前检测的锚点）回归，而不是简单地从最近的锚点回归。由于先前检测不受某些固定锚点网格的限制，因此DN引起的灵活性可能是有益的。我非常希望阅读关注这些问题的未来作品。
- en: That’s it for denoising and its contribution to vision transformers! If you
    liked my article, you’re welcome to visit some of my other articles on deep learning,
    machine learning and computer vision!
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 关于噪声去除及其对视觉转换器的贡献就到这里！如果你喜欢我的文章，欢迎访问我关于深度学习、机器学习和计算机视觉的其他文章！
