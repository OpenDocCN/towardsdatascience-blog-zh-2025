- en: 'Survival Analysis When No One Dies: A Value-Based Approach'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/survival-analysis-when-no-one-dies-a-value-based-approach/](https://towardsdatascience.com/survival-analysis-when-no-one-dies-a-value-based-approach/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '<mdspan datatext="el1747181775942" class="mdspan-comment">Survival analysis</mdspan>
    is a statistical approach used to answer the question: “How long will something
    last?” That “something” could range from a patient’s lifespan to the durability
    of a machine component or the duration of a user’s subscription.'
  prefs: []
  type: TYPE_NORMAL
- en: One of the most widely used tools in this area is the **Kaplan-Meier estimator**.
  prefs: []
  type: TYPE_NORMAL
- en: Born in the world of biology, Kaplan-Meier made its debut tracking life and
    death. But like any true celebrity algorithm, it didn’t stay in its lane. These
    days, it’s showing up in business dashboards, marketing teams, and churn analyses
    everywhere.
  prefs: []
  type: TYPE_NORMAL
- en: 'But here’s the catch: **business isn’t biology**. It’s messy, unpredictable,
    and full of plot twists. This is why there are a couple of issues that make our
    lives more difficult when we try to use survival analysis in the business world.'
  prefs: []
  type: TYPE_NORMAL
- en: First of all, we are typically not just interested in whether a customer has
    “survived” (whatever survival could mean in this context), but rather in **how
    much of that individual’s economic value has survived.**
  prefs: []
  type: TYPE_NORMAL
- en: Secondly, contrary to biology, **it’s very possible for customers to “die” and
    “resuscitate” multiple times** (think of when you unsubscribe/resubscribe to an
    online service).
  prefs: []
  type: TYPE_NORMAL
- en: 'In this article, we will see how to extend the classical Kaplan-Meier approach
    so that it better suits our needs: **modeling a continuous (economic) value instead
    of a binary one (life/death) and allowing “resurrections”**.'
  prefs: []
  type: TYPE_NORMAL
- en: A refresher on the Kaplan-Meier estimator
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let’s pause and rewind for a second. Before we start customizing Kaplan-Meier
    to fit our business needs, we need a quick refresher on how the classic version
    works.
  prefs: []
  type: TYPE_NORMAL
- en: 'Suppose you had 3 subjects (let’s say lab mice) and you gave them a medicine
    you need to test. The medicine was given at different moments in time: subject
    *a* received it in January, subject *b* in April, and subject *c* in May.'
  prefs: []
  type: TYPE_NORMAL
- en: Then, you measure how long they survive. Subject *a* died after 6 months, subject
    *c* after 4 months, and subject *b* is still alive at the time of the analysis
    (November).
  prefs: []
  type: TYPE_NORMAL
- en: 'Graphically, we can represent the 3 subjects as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/8129da6a506202c5d6632fc4609d5529.png)'
  prefs: []
  type: TYPE_IMG
- en: '[Image by Author]'
  prefs: []
  type: TYPE_NORMAL
- en: Now, **even if we wanted to measure a simple metric, like average survival,
    we would face a problem**. In fact, we don’t know how long subject *b* will survive,
    as it is still alive today.
  prefs: []
  type: TYPE_NORMAL
- en: This is a classical problem in statistics, and it’s called “**right censoring**“.
  prefs: []
  type: TYPE_NORMAL
- en: 'Right censoring is stats-speak for “we don’t know what happened after a certain
    point” and it’s a big deal in survival analysis. So big that it **led to the development
    of one of the most iconic estimators in statistical history: the Kaplan-Meier
    estimator**, named after the duo who introduced it back in the 1950s.'
  prefs: []
  type: TYPE_NORMAL
- en: So, how does Kaplan-Meier handle our problem?
  prefs: []
  type: TYPE_NORMAL
- en: First, we align the clocks. Even if our mice were treated at different times,
    **what matters is *time since treatment***. So we reset the *x*-axis to zero for
    everyone — day zero is the day they got the drug.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d73b4e3614a9aa0087d59f103453da79.png)'
  prefs: []
  type: TYPE_IMG
- en: '[Image by Author]'
  prefs: []
  type: TYPE_NORMAL
- en: 'Now that we’re all on the same timeline, we want to build something useful:
    an **aggregate survival curve**. This curve tells us the probability that a *typical*
    mouse in our group will survive at least *x* months post-treatment.'
  prefs: []
  type: TYPE_NORMAL
- en: Let’s follow the logic together.
  prefs: []
  type: TYPE_NORMAL
- en: Up to time 3? Everyone’s still alive. So survival = 100%. Easy.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: At time 4, mouse *c* dies. This means that out of the 3 mice, only 2 of them
    survived after time 4\. That gives us a survival rate of 67% at time 4.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Then at time 6, mouse *a* checks out. Of the 2 mice that had made it to time
    6, only 1 survived, so the survival rate from time 5 to 6 is 50%. Multiply that
    by the previous 67%, and we get 33% survival up to time 6.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: After time 7 we don’t have other subjects that are observed alive, so the curve
    has to stop here.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Let’s plot these results:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b9c84cba501ec4e6387a4555ff0933d3.png)'
  prefs: []
  type: TYPE_IMG
- en: '[Image by Author]'
  prefs: []
  type: TYPE_NORMAL
- en: 'Since code is often easier to understand than words, let’s translate this to
    Python. We have the following variables:'
  prefs: []
  type: TYPE_NORMAL
- en: '`kaplan_meier`, an array containing the Kaplan-Meier estimates for each point
    in time, e.g. the probability of survival up to time *t*.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`obs_t`, an array that tells us whether an individual is observed (e.g., not
    right-censored) at time *t*.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`surv_t`, boolean array that tells us whether each individual is alive at time
    *t*.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`surv_t_minus_1`, boolean array that tells us whether each individual is alive
    at time *t*-1.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: All we have to do is to take all the individuals observed at *t*, compute their
    survival rate from *t*-1 to *t* (`survival_rate_t`), and multiply it by the survival
    rate up to time *t*-1 (`km[t-1]`) to obtain the survival rate up to time *t* (`km[t]`)*.*
    In other words,
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: where, of course, the starting point is `kaplan_meier[0] = 1`.
  prefs: []
  type: TYPE_NORMAL
- en: 'If you don’t want to code this from scratch, the Kaplan-Meier algorithm is
    available in the Python library `lifelines`, and it can be used as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: If you use this code, you will obtain the same result we have obtained manually
    with the previous snippet.
  prefs: []
  type: TYPE_NORMAL
- en: So far, we’ve been hanging out in the land of mice, medicine, and mortality.
    Not exactly your average quarterly KPI review, right? So, how is this useful in
    business?
  prefs: []
  type: TYPE_NORMAL
- en: Moving to a business setting
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: So far, we’ve treated “death” as if it’s obvious. In Kaplan-Meier land, someone
    either lives or dies, and we can easily log the time of death. But now let’s stir
    in some real-world business messiness.
  prefs: []
  type: TYPE_NORMAL
- en: '***What even* is *“death” in a business context?***'
  prefs: []
  type: TYPE_NORMAL
- en: 'It turns out it’s not easy to answer this question, at least for a couple of
    reasons:'
  prefs: []
  type: TYPE_NORMAL
- en: '**“Death” is not easy to define**. Let’s say you’re working at an e-commerce
    company. You want to know when a user has “died”. Should you count them as dead
    when they delete their account? That’s easy to track… but too rare to be useful.
    What if they just start shopping less? But *how* much less is dead? A week of
    silence? A month? Two? You see the problem. The definition of “death” is arbitrary,
    and depending on where you draw the line, your analysis might tell wildly different
    stories.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**“Death” is not permanent**. Kaplan-Meier has been conceived for biological
    applications in which once an individual is dead there is no return. But in business
    applications, resurrection is not only possible but pretty frequent. Imagine a
    streaming service for which people pay a monthly subscription. It’s easy to define
    “death” in this case: it’s when users cancel their subscriptions. However, it’s
    pretty frequent that, some time after cancelling, they re-subscribe.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: So how does all this play out in data?
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s walk through a toy example. Say we have a user on our e-commerce platform.
    Over the past 10 months, here’s how much they’ve spent:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/eab8eb4ed8a989cf4a181a2c139f58bd.png)'
  prefs: []
  type: TYPE_IMG
- en: '[Image by Author]'
  prefs: []
  type: TYPE_NORMAL
- en: To squeeze this into the Kaplan-Meier framework, we need to **translate that
    spending behavior into a life-or-death decision**.
  prefs: []
  type: TYPE_NORMAL
- en: 'So we make a rule: if a user stops spending for 2 consecutive months, we declare
    them “inactive”.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Graphically, this rule looks like the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/9af4a631ab7f0926ffe37e70341f9e82.png)'
  prefs: []
  type: TYPE_IMG
- en: '[Image by Author]'
  prefs: []
  type: TYPE_NORMAL
- en: Since the user spent $0 for two months in a row (month 4 and 5) we will consider
    this user inactive starting from month 4 on. And we will do that despite the user
    started spending again in month 7\. This is because, in Kaplan-Meier, resurrections
    are assumed to be impossible.
  prefs: []
  type: TYPE_NORMAL
- en: 'Now let’s add two more users to our example. Since we have decided a rule to
    turn their value curve into a survival curve, we can also compute the Kaplan-Meier
    survival curve:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/bcc60966a8f83137035236f7c9822ae2.png)'
  prefs: []
  type: TYPE_IMG
- en: '[Image by Author]'
  prefs: []
  type: TYPE_NORMAL
- en: By now, you’ve probably noticed **how much nuance (and data) we’ve thrown away
    just to make this work**. User *a* came back from the dead — but we ignored that.
    User *c*‘s spending dropped significantly — but Kaplan-Meier doesn’t care, because
    all it sees is 1s and 0s. We forced a continuous value (spending) into a binary
    box (alive/dead), and along the way, we lost a whole lot of information.
  prefs: []
  type: TYPE_NORMAL
- en: 'So the question is: can we extend Kaplan-Meier in a way that:'
  prefs: []
  type: TYPE_NORMAL
- en: '**keeps the original, continuous data intact**,'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**avoids arbitrary binary cutoffs**,'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**allows for resurrections**?'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Yes, we can. In the next section, I’ll show you how.
  prefs: []
  type: TYPE_NORMAL
- en: Introducing “Value Kaplan-Meier”
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let’s start with the simple Kaplan-Meier formula we have seen before.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: The first change we need to make is to replace `surv_t` and `surv_t_minus_1`,
    which are boolean arrays that tell us whether a subject is alive (1) or dead (0)
    with arrays that tell us the (economic) value of each subject at a given time.
    For this purpose, we can use two arrays named `val_t` and `val_t_minus_1`.
  prefs: []
  type: TYPE_NORMAL
- en: But this is not enough, because since we are dealing with continuous value,
    **every user is on a different scale and so, assuming that we want to weigh them
    equally, we need to rescale them based on some individual value**. But what value
    should we use? The most reasonable choice is to use their initial value at time
    0, before they were influenced by whatever treatment we are applying to them.
  prefs: []
  type: TYPE_NORMAL
- en: So we also need to use another vector, named `val_t_0` that represents the value
    of the individual at time 0.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: What we’ve built is a **direct generalization of Kaplan-Meier**. In fact, if
    you set `val_t = surv_t`, `val_t_minus_1 = surv_t_minus_1`, and `val_t_0` as an
    array of 1s, this formula collapses neatly back to our original survival estimator.
    So yes—it’s legit.
  prefs: []
  type: TYPE_NORMAL
- en: And here is the curve that we would obtain when applied to these 3 users.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/135b466055f4d6e62e7db4e71278ef73.png)'
  prefs: []
  type: TYPE_IMG
- en: '[Image by Author]'
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s call this new version the **Value Kaplan-Meier estimator**. In fact,
    it answers the question:'
  prefs: []
  type: TYPE_NORMAL
- en: '***How much percent of value is still surviving, on average, after* x *time?***'
  prefs: []
  type: TYPE_NORMAL
- en: We’ve got the theory. But does it work in the wild?
  prefs: []
  type: TYPE_NORMAL
- en: '**Using Value Kaplan-Meier in practice**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: If you take the Value Kaplan-Meier estimator for a spin on real-world data and
    compare it to the good old Kaplan-Meier curve, you’ll likely notice something
    comforting — **they often have the same shape**. That’s a good sign. It means
    we haven’t broken anything fundamental while upgrading from binary to continuous.
  prefs: []
  type: TYPE_NORMAL
- en: 'But here’s where things get interesting: **Value Kaplan-Meier usually sits
    a bit *above* its traditional cousin**. Why? Because in this new world, users
    are allowed to “resurrect”. Kaplan-Meier, being the more rigid of the two, would’ve
    written them off the moment they went quiet.'
  prefs: []
  type: TYPE_NORMAL
- en: So how do we put this to use?
  prefs: []
  type: TYPE_NORMAL
- en: Imagine you’re running an experiment. At time zero, you start a new treatment
    on a group of users. Whatever it is, you can track how much value “survives” in
    both the treatment and control groups over time.
  prefs: []
  type: TYPE_NORMAL
- en: 'And this is what your output will probably look like:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/1aefb0259b6c653af1059ed3cb15fffd.png)'
  prefs: []
  type: TYPE_IMG
- en: '[Image by Author]'
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Kaplan-Meier is a widely used and intuitive method for estimating survival functions,
    especially when the outcome is a binary event like death or failure. However,
    many real-world business scenarios involve more complexity — resurrections are
    possible, and outcomes are better represented by continuous values rather than
    a binary state.
  prefs: []
  type: TYPE_NORMAL
- en: In such cases, Value Kaplan-Meier offers a natural extension. **By incorporating
    the economic value of individuals over time, it enables a more nuanced understanding
    of value retention and decay**. This method preserves the simplicity and interpretability
    of the original Kaplan-Meier estimator while adapting it to better reflect the
    dynamics of customer behavior.
  prefs: []
  type: TYPE_NORMAL
- en: Value Kaplan-Meier tends to provide a higher estimate of retained value compared
    to Kaplan-Meier, due to its ability to account for recoveries. This makes it particularly
    useful in evaluating experiments or tracking customer value over time.
  prefs: []
  type: TYPE_NORMAL
