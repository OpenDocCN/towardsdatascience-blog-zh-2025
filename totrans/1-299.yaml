  - PREF_UL
  type: TYPE_NORMAL
- en: '[Group queries according to taxonomy](#Group-queries-according-to-taxonomy)'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '[LLM as a judge on a golden dataset](#LLM-as-a-judge-on-a-golden-dataset)'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Step 2: Iteratively improving your LLM](#Step-2:-Iteratively-improving-your-LLM)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Step 3: Evaluate and iterate](#Step-3:-Evaluate-and-iterate)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
