- en: How to Analyze and Optimize Your LLMs in 3 Steps
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/how-to-analyze-and-optimize-your-llms-in-3-steps/](https://towardsdatascience.com/how-to-analyze-and-optimize-your-llms-in-3-steps/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1757564167346" class="mdspan-comment">You have your LLM</mdspan>
    in production, actively responding to user queries. However, you now want to improve
    your model to handle a larger fraction of customer requests successfully. How
    do you approach this?
  prefs: []
  type: TYPE_NORMAL
- en: In this article, I discuss the scenario where you already have a running LLM
    and want to analyze and optimize its performance. I will discuss the approaches
    I use to uncover where the LLM works and where it needs improvement. Furthermore,
    I’ll also discuss the tools I use to improve my LLM’s performance, with tools
    such as Anthropic’s prompt optimizer.
  prefs: []
  type: TYPE_NORMAL
- en: 'In short, I follow a three-step process to quickly improve my LLM’s performance:'
  prefs: []
  type: TYPE_NORMAL
- en: Analyze LLM outputs
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Iteratively improve areas with the most value to effort
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Evaluate and iterate
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Table of Contents
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '[Motivation](#Motivation)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Step 1: Analyzing LLM outputs](#Step-1:-Analyzing-LLM-outputs)'
  prefs:
