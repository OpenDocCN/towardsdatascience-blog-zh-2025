- en: Motivation
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 动机
- en: My motivation for this article is that I often find myself in the scenario described
    in the intro. I already have my LLM up and running; however, it’s not performing
    as expected or reaching customer expectations. Through countless experiences of
    analyzing my LLMs, I have created this simple three-step process I always use
    to improve LLMs.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 我写这篇文章的动机是我经常发现自己处于引言中描述的场景。我的 LLM 已经启动并运行；然而，它并没有按预期或达到客户期望的表现。通过无数分析我的 LLM
    的经验，我创建了一个简单的三步流程，我总是用它来提高 LLM。
- en: 'Step 1: Analyzing LLM outputs'
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第 1 步：分析 LLM 输出
- en: The first step to improving your LLMs should always be to analyze their output.
    To have high observability in your platform, I strongly recommend using an LLM
    manager tool for tracing, such as [Langfuse](https://langfuse.com/) or [PromptLayer](https://www.promptlayer.com/).
    These tools make it simple to gather all your LLM invocations in one place, ready
    for analysis.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 提高你的 LLM 的第一步始终应该是分析它们的输出。为了在你的平台上实现高可观察性，我强烈建议使用 LLM 管理工具进行跟踪，例如 [Langfuse](https://langfuse.com/)
    或 [PromptLayer](https://www.promptlayer.com/)。这些工具使你能够轻松地将所有 LLM 调用汇总到一个地方，以便进行分析。
- en: I’ll now discuss some different approaches I apply to analyze my LLM outputs.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 我现在将讨论我应用的一些不同的方法来分析我的 LLM 输出。
- en: Manual inspection of raw output
  id: totrans-22
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 手动检查原始输出
- en: 'The simplest approach to analyze your LLM output is to manually inspect many
    of your LLM invocations. You should gather your last 50 LLM invocations, read
    through the entire context you fed into the model, and the output the model provided.
    I find this approach surprisingly effective in uncovering problems. I have, for
    example, discovered:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 分析你的 LLM 输出的最简单方法是通过手动检查你许多 LLM 调用。你应该收集你最后的 50 个 LLM 调用，阅读你输入到模型中的整个上下文，以及模型提供的输出。我发现这种方法在揭示问题方面非常有效。例如，我发现：
- en: Duplicate context (part of my context was duplicated due to a programming error)
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 重复上下文（由于编程错误，我的上下文中有一部分被重复了）
- en: Missing context (I wasn’t feeding all the information I expected into my LLM)
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 缺失上下文（我没有将我期望的所有信息输入到我的 LLM 中）
- en: etc.
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 等。
- en: Manual inspection of data should never be underestimated. Thoroughly looking
    through the data manually gives you an understanding of the dataset you are working
    on, which is hard to obtain in any other manner. Furthermore, I also find that
    I should manually inspect more data points than I initially want to spend time
    evaluating.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 数据的手动检查不应被低估。彻底手动检查数据可以让你了解你正在工作的数据集，这是任何其他方式都难以获得的。此外，我还发现我应该手动检查比最初打算花时间评估更多的数据点。
- en: For example, let’s say it takes 5 minutes to manually inspect one input-output
    example. My intuition often tells me to maybe spend 20-30 minutes on this, and
    thus inspect 4-6 data points. However, I find that you should usually spend a
    lot longer on this part of the process. I recommend at least 5x-ing this time,
    so instead of spending 30 minutes manually inspecting, you spend 2.5 hours. Initially,
    you’ll think this is a lot of time to spend on manual inspection, but you’ll usually
    find it saves you plenty of time in the long run. Additionally, compared to an
    entire 3-week project, 2.5 hours is an insignificant amount of time.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，假设手动检查一个输入-输出示例需要5分钟。我的直觉常常告诉我可能需要花20-30分钟，因此检查4-6个数据点。然而，我发现你通常需要在这个过程上花费更长的时间。我建议至少将时间增加到5倍，所以与其花30分钟手动检查，不如花2.5小时。最初，你会认为花这么多时间在手动检查上是不必要的，但通常你会发现这会在长期上节省你大量的时间。此外，与整个3周的项目相比，2.5小时的时间是微不足道的。
- en: Group queries according to taxonomy
  id: totrans-29
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 根据分类法分组查询
- en: Sometimes, you’ll not get all your answers from simple manual analysis of your
    data. In those instances, I would move over to more quantitative analysis of my
    data. This is as opposed to the first approach, which I consider qualitative since
    I’m manually inspecting each data point.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 有时候，你不会从简单的数据手动分析中获得所有答案。在这些情况下，我会转向对我数据的更定量分析。这与第一种方法相反，我认为它是定性的，因为我正在手动检查每个数据点。
- en: 'Grouping user queries according to a taxonomy is an efficient approach to better
    understand what users expect from your LLM. I’ll provide an example to make this
    easier to understand:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 根据分类法分组用户查询是一种有效的方法，可以帮助你更好地理解用户对你LLM的期望。我将提供一个例子来使这一点更容易理解：
- en: 'Imagine you’re Amazon, and you have a customer service LLM handling incoming
    customer questions. In this instance, a taxonomy will look something like:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下你是亚马逊，你有一个处理客户服务LLM来处理客户问题的系统。在这种情况下，分类法可能看起来像这样：
- en: Refund requests
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 退款请求
- en: Talk to a human requests
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与人类交流的请求
- en: Questions about individual products
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 关于单个产品的疑问
- en: …
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: …
- en: I would then look at the last 1000 user queries and manually annotate them into
    this taxonomy. This will tell you which questions are most prevalent, and which
    ones you should focus most on answering correctly. You’ll often find that the
    distribution of items in each category will follow a [Pareto distribution](https://dlab.berkeley.edu/news/explaining-80-20-rule-pareto-distribution),
    with most items belonging to a few specific categories.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 我会查看最后1000个用户查询，并将它们手动标注到这个分类法中。这将告诉你哪些问题最普遍，哪些问题你应该最专注于正确回答。你通常会发现，每个类别中的项目分布会遵循[Pareto分布](https://dlab.berkeley.edu/news/explaining-80-20-rule-pareto-distribution)，大多数项目都属于几个特定的类别。
- en: Additionally, you annotate whether a customer request was successfully answered
    or not. With this information, you can now discover what kinds of questions you’re
    struggling with and which ones your LLM is good at. Maybe the LLM easily transfers
    customer queries to humans when requested; however, it struggles when queried
    about details about a product. In this instance, you should focus your effort
    on improving the group of questions you’re struggling with the most.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，你还需要标注客户请求是否得到了成功解答。有了这些信息，你现在可以找出你在哪些问题上遇到困难，以及你的LLM擅长哪些问题。也许当请求将客户查询转交给人类时，LLM可以轻松处理；然而，当被询问有关产品细节时，它却遇到了困难。在这种情况下，你应该专注于提高你在最困难的问题组上的能力。
- en: LLM as a judge on a golden dataset
  id: totrans-39
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在黄金数据集上作为评判者的LLM
- en: Another quantitative approach I use to analyze my LLM outputs is to create a
    golden dataset of input-output examples and utilize LLM as a judge. This will
    help when you make changes to your LLM.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 我用来分析我的LLM输出的另一种定量方法是创建一个黄金数据集的输入-输出示例，并利用LLM作为评判者。这将在你修改你的LLM时有所帮助。
- en: Continuing on the customer support example from previously, you can create a
    list of 50 (real) user queries and the desired response from each of them. Whenever
    you make changes to your LLM (change model version, add more context, …), you
    can automatically test the new LLM on the golden dataset, and have an LLM as a
    judge determine if the response from the new model is at least as good as the
    response from the old model. This will save you vast amounts of time manually
    inspecting LLM outputs whenever you update your LLM.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
- en: If you want to learn more about LLM as a judge, you can read [my TDS article
    on the topic here.](https://towardsdatascience.com/how-to-use-llms-for-powerful-automatic-evaluations/#:~:text=You%20simply%20provide%20the%20LLM,the%20quality%20is%20deemed%20lower.)
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 2: Iteratively improving your LLM'
  id: totrans-43
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: You’re done with step one, and you now want to use those insights to improve
    your LLM. In this section, I discuss how I approach this step to efficiently improve
    the performance of my LLM.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
- en: If I discover significant issues, for example, when manually inspecting data,
    I always fix those first. This can, for example, be discovering unnecessary noise
    being added to the LLM’s context, or typos in my prompts. When I’m done with that,
    I continue using some tools.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
- en: 'One tool I use is prompt optimizers, such as [Anthropic’s prompt improver](https://docs.anthropic.com/en/docs/build-with-claude/prompt-engineering/prompt-improver).
    With these tools, you typically input your prompt and some input-output examples.
    You can, for example, input the prompt you use for your customer service agents,
    along with examples of customer interactions where the LLM failed. The prompt
    optimizer will analyze your prompt and examples and return an improved version
    of your prompt. You’ll likely see improvements such as:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
- en: Improved structure in your prompt, for example, using Markdown
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Handling of edge cases. For example, handling cases where the user queries the
    customer support agent about completely unrelated topics, such as asking “What
    is the weather in New York today?”. The prompt optimizer might add something like
    “If the question is not related to Amazon, tell the user that you’re only designed
    to answer questions about Amazon”.
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'If I have more quantitative data, such as from [grouping user queries](#Group-queries-according-to-taxonomy)
    or a [golden dataset](#LLM-as-a-judge-on-a-golden-dataset), I also analyze these
    data, and create a value effort graph. The value effort graph highlights the different
    available improvements you can make, such as:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
- en: Improved edge case handling in the system prompt
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Use a better embedding model for improved RAG
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You then plot these data points in a 2D grid, such as below. You should naturally
    prioritize items in the upper left quadrant because they provide a lot of value
    and require little effort. Normally, however, items are contained on a diagonal,
    where improved value correlates strongly with higher required effort.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/9e799d7ca1378c09566d47dd2cbeeffd.png)'
  id: totrans-53
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/9e799d7ca1378c09566d47dd2cbeeffd.png)'
- en: This figure shows a value effort graph. The value effort graph displays different
    improvements you can make to your product. The improvements are displayed in the
    graph according to how valuable they are and the effort required to build them.
    Image by ChatGPT.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 此图展示了一个价值努力图。价值努力图显示了您可以对产品进行的不同改进。改进根据其价值和构建所需的努力程度在图中显示。图由ChatGPT提供。
- en: I put all my improvement suggestions into a value-effort graph, and then gradually
    pick items that are as high as possible in value, and as low as possible in effort.
    This is a super effective approach to quickly solve the most pressing issues with
    your LLM, positively impacting the largest number of customers you can for a given
    amount of effort.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 我将所有改进建议放入价值努力图中，然后逐渐挑选出价值尽可能高、努力程度尽可能低的项。这是一种超级有效的方法，可以快速解决您LLM最紧迫的问题，在给定努力程度的情况下，对尽可能多的客户产生积极影响。
- en: 'Step 3: Evaluate and iterate'
  id: totrans-56
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第3步：评估和迭代
- en: The last step in my three-step process is to evaluate my LLM and iterate. There
    are a plethora of techniques you can use to evaluate your LLM, a lot of which
    I cover in [my article on the topic](https://towardsdatascience.com/how-to-perform-comprehensive-large-scale-llm-validation/).
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 我的三步法中的最后一步是评估我的LLM并进行迭代。您可以使用大量技术来评估您的LLM，其中很多我在[我的关于该主题的文章](https://towardsdatascience.com/how-to-perform-comprehensive-large-scale-llm-validation/)中进行了介绍。
- en: Preferably, you create some quantitative metrics for your LLMs’ performance,
    and ensure those metrics have improved from the changes you applied in step 2\.
    After applying these changes and verifying they improved your LLM, you should
    consider whether the model is good enough or if you should continue improving
    the model. I most often operate on the 80% principle, which states that 80% performance
    is good enough in almost all cases. This is not a literal 80% as in accuracy.
    It rather highlights the point that you don’t need to create a perfect model,
    but rather only create a model that is *good enough*.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 最好为您的LLM性能创建一些量化指标，并确保这些指标从您在步骤2中应用的变化中有所改善。在应用这些更改并验证它们改善了您的LLM之后，您应该考虑模型是否足够好，或者是否应该继续改进模型。我通常遵循80%原则，该原则表明在几乎所有情况下，80%的性能就足够好了。这并不是字面上的80%，而是在于强调您不需要创建一个完美的模型，而只需要创建一个*足够好*的模型。
- en: Conclusion
  id: totrans-59
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this article, I have discussed the scenario where you already have an LLM
    in production, and you want to analyze and improve your LLM. I approach this scenario
    by first analyzing the model inputs and outputs, preferably by full manual inspection.
    After ensuring I really understand the dataset and how the model behaves, I also
    move into more quantitative metrics, such as grouping queries into a taxonomy
    and using LLM as a judge. Following this, I implement improvements based on my
    findings in the previous step, and lastly, I evaluate whether my improvements
    worked as intended.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我讨论了您已经有一个正在生产的LLM，并且想要分析和改进LLM的情况。我通过首先分析模型输入和输出，最好是进行全面手动检查来处理这种情况。在确保我真正理解数据集和模型行为后，我也转向了更量化的指标，例如将查询分组到分类法中，并使用LLM作为评判者。在此之后，我根据上一步的发现实施改进，最后评估我的改进是否按预期工作。
- en: '**👉 My free eBook and Webinar:**'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: '**👉 我的免费电子书和网络研讨会：**'
- en: 📚 [Get my free Vision Language Models ebook](https://eivindkjosbakken.com/ebook)
  id: totrans-62
  prefs: []
