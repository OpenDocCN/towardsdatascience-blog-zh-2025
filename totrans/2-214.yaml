- en: How to Train a Chatbot Using RAG and Custom Data
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/how-to-train-a-chatbot-using-rag-and-custom-data/](https://towardsdatascience.com/how-to-train-a-chatbot-using-rag-and-custom-data/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1750746374788" class="mdspan-comment">What is RAG</mdspan>?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: RAG, which stands for Retrieval-Augmented Generation, describes a process by
    which an LLM (Large Language Model) can be optimized by training it to pull from
    a more specific, smaller knowledge base rather than its huge original base. Typically,
    LLMs like ChatGPT are trained on the entire internet (billions of data points).
    This means they are prone to small errors and hallucinations.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here is an example of a situation where RAG could be used and be helpful:'
  prefs: []
  type: TYPE_NORMAL
- en: '*I want to build a US state tour guide chat bot, which contains general information
    about US states, such as their capitals, populations, and main tourist attractions.
    To do this, I can download Wikipedia pages of these US states and train my LLM
    using text from these specific pages.*'
  prefs: []
  type: TYPE_NORMAL
- en: Creating your RAG LLM
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'One of the most popular tools for building RAG systems is **LlamaIndex**, which:'
  prefs: []
  type: TYPE_NORMAL
- en: Simplifies the integration between LLMs and external data sources
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Allows developers to structure, index, and query their data in a way that is
    optimized for LLM consumption
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Works with many types of data, such as PDFs and text files
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Helps construct a RAG pipeline that retrieves and injects relevant chunks of
    data into a prompt before passing it to the LLM for generation
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Download your data
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Start by getting the data you want to train your model with. To download PDFs
    from Wikipedia ([CC by 4.0](https://en.wikipedia.org/wiki/Wikipedia:Text_of_the_Creative_Commons_Attribution-ShareAlike_4.0_International_License))
    in the right format, make sure you click Print and then “Save as PDF.”
  prefs: []
  type: TYPE_NORMAL
- en: '***Don’t just export the Wikipedia as a PDF — Llama won’t like the format it’s
    in and will reject your files.***'
  prefs: []
  type: TYPE_NORMAL
- en: 'For the purposes of this article and to keep things simple, I’ll only download
    the pages of the following 5 popular states:'
  prefs: []
  type: TYPE_NORMAL
- en: Florida
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: California
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Washington D.C.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: New York
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Texas
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Make sure to save these all in a folder where your project can easily access
    them. I saved them in one called “data”.
  prefs: []
  type: TYPE_NORMAL
- en: Get necessary API keys
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Before you create your custom states database, there are 2 API keys you’ll need
    to generate.
  prefs: []
  type: TYPE_NORMAL
- en: One from OpenAI, to access a base LLM
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: One from Llama to access the index database you upload custom data to
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Once you have these API keys, store them in a .env file in your project.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Create an Index and Upload your data
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Create a [LlamaCloud](https://cloud.llamaindex.ai/login) account. Once you’re
    in, find the Index section and click “Create” to create a new index.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/7a28c26a0eb8806d897c815063e43bd6.png)'
  prefs: []
  type: TYPE_IMG
- en: Screenshot by author
  prefs: []
  type: TYPE_NORMAL
- en: An index stores and manages document indexes remotely so they can be queried
    via an API without needing to rebuild or store them locally.
  prefs: []
  type: TYPE_NORMAL
- en: '**Here’s how it works:**'
  prefs: []
  type: TYPE_NORMAL
- en: When you create your index, there will be a place where you can upload files
    to feed into the model’s database. **Upload your PDFs here.**
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: LlamaIndex **parses and chunks** the documents.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: It creates an **index** (e.g., vector index, keyword index).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: This index is **stored in LlamaCloud**.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: You can then **query it** using an LLM through the API.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The next thing you need to do is to configure an **embedding model.** An embedding
    model is the LLM that will underlie your project and be responsible for retrieving
    the relevant information and outputting text.
  prefs: []
  type: TYPE_NORMAL
- en: When you’re creating a new index you want to select **“Create a new OpenAI embedding”:**
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/86731885b3ce030ab1c5fde3baeaf678.png)'
  prefs: []
  type: TYPE_IMG
- en: Screenshot by author
  prefs: []
  type: TYPE_NORMAL
- en: When you create your new embedding you’ll have to provide your OpenAI API key
    and name your model.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e68bacb26c7a600b983de11961dba495.png)'
  prefs: []
  type: TYPE_IMG
- en: Screenshot by author
  prefs: []
  type: TYPE_NORMAL
- en: Once you have created your model, leave the other index settings as their defaults
    and hit “Create Index” at the bottom.
  prefs: []
  type: TYPE_NORMAL
- en: It may take a few minutes to parse and store all the documents, so make sure
    that all the documents have been processed before you try to run a query. The
    status should show on the right side of the screen when you create your index
    in a box that says “Index Files Summary”.
  prefs: []
  type: TYPE_NORMAL
- en: Accessing your model via code
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Once you’ve created your index, you’ll also get an Organization ID. For cleaner
    code, add your Organization ID and Index Name to your .env file. Then, retrieve
    all the necessary variables to initialize your index in your code:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Query your index and ask a question
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'To do this, you’ll need to define a query (prompt) and then generate a response
    by calling the index as such:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: Having a longer conversation with your bot
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: By querying a response from the LLM the way we just did above, you are able
    to easily access information from the documents you loaded. However, if you ask
    a follow up question, like “Which one has the least?” without context, the model
    won’t remember what your original question was. This is because we haven’t programmed
    it to keep track of the chat history.
  prefs: []
  type: TYPE_NORMAL
- en: 'In order to do this, you need to:'
  prefs: []
  type: TYPE_NORMAL
- en: Create memory using ChatMemoryBuffer
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Create a chat engine and add the created memory using ContextChatEngine
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'To create a chat engine:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: 'Next, feed your query into your chat engine:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: 'This gives the response: “As of 2024, the estimated population of New York
    is 19,867,248.”'
  prefs: []
  type: TYPE_NORMAL
- en: 'I can then ask a follow up question:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: 'This gives the following response: “As of 2024, the population of California
    is 39,431,263.” As you can see, the model remembered that what we were asking
    about previously was population and responded accordingly.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e334635fb1aad7bb6e6f9cfce2dbf928.png)'
  prefs: []
  type: TYPE_IMG
- en: Streamlit UI chatbot app for US state RAG. Screenshot by author
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Retrieval Augmented Generation is an efficient way to train an LLM on specific
    data. LlamaCloud offers a simple and straightforward way to build your own RAG
    framework and query the model that lies underneath.
  prefs: []
  type: TYPE_NORMAL
- en: The code I used for this tutorial was written in a notebook, but it can also
    be wrapped in a Streamlit app to create a more natural back and forth conversation
    with a chatbot. I’ve included the Streamlit code [here on my Github.](https://github.com/hadenpell/rag-tutorial)
  prefs: []
  type: TYPE_NORMAL
- en: Thanks for reading
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
