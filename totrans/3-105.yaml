- en: 'Time Series Forecasting Made Simple (Part 1): Decomposition and Baseline Models'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/time-series-forecasting-made-simple-part-1-decomposition-baseline-models/](https://towardsdatascience.com/time-series-forecasting-made-simple-part-1-decomposition-baseline-models/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I <mdspan datatext="el1744228303164" class="mdspan-comment">used</mdspan> to
    avoid time series analysis. Every time I took an online course, I’d see a module
    titled *“Time Series Analysis”* with subtopics like Fourier Transforms, autocorrelation
    functions and other intimidating terms. I don’t know why, but I always found a
    reason to avoid it.
  prefs: []
  type: TYPE_NORMAL
- en: 'But here’s what I’ve learned: **any complex topic becomes manageable when we
    start from the basics and focus on understanding the intuition** behind it. That’s
    exactly what this blog series is about : making time series feel less like a maze
    and more like a conversation with your data over time.'
  prefs: []
  type: TYPE_NORMAL
- en: We understand complex topics much more easily when they’re explained through
    real-world examples. That’s exactly how I’ll approach this series.
  prefs: []
  type: TYPE_NORMAL
- en: In each post, we’ll work with a simple dataset and explore what’s needed from
    a time series perspective. We’ll build intuition around each concept, understand
    why it matters, and implement it step by step on the data.
  prefs: []
  type: TYPE_NORMAL
- en: '**Time Series Analysis is the process of understanding, modeling and forecasting
    data that is observed over time.** It involves identifying patterns such as trends,
    seasonality and noise using past observations to make informed predictions about
    future values.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s start by considering a dataset named [**Daily Minimum Temperatures in
    Melbourne**](https://www.kaggle.com/datasets/paulbrabban/daily-minimum-temperatures-in-melbourne)
    (<mdspan datatext="el1744227543658" class="mdspan-comment">open license</mdspan>).
    This dataset contains **daily records of the lowest temperature (in Celsius)**
    observed in Melbourne, Australia, over a **10-year period from 1981 to 1990**.
    Each entry includes just two columns:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Date:** The calendar day (from 1981-01-01 to 1990-12-31)'
  prefs: []
  type: TYPE_NORMAL
- en: '**Temp:** The minimum temperature recorded on that day'
  prefs: []
  type: TYPE_NORMAL
- en: You’ve probably heard of models like ARIMA, SARIMA or Exponential Smoothing.
    But before we go there, it’s a good idea to try out some simple **baseline models**
    first, to see how well a basic approach performs on our data.
  prefs: []
  type: TYPE_NORMAL
- en: While there are many types of baseline models used in time series forecasting,
    here we’ll focus on the three most essential ones, which are simple, effective,
    and widely applicable across industries.
  prefs: []
  type: TYPE_NORMAL
- en: '**Naive Forecast:** Assumes the next value will be the same as the last observed
    one.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Seasonal Naive Forecast:** Assumes the value will repeat from the same point
    last season (e.g., last week or last month).'
  prefs: []
  type: TYPE_NORMAL
- en: '**Moving Average:** Takes the average of the last *n* points.'
  prefs: []
  type: TYPE_NORMAL
- en: You might be wondering, why use baseline models at all? Why not just go straight
    to the well-known forecasting methods like ARIMA or SARIMA?
  prefs: []
  type: TYPE_NORMAL
- en: Let’s consider a shop owner who wants to forecast next month’s sales. By applying
    a **moving average baseline model**, they can estimate next month’s sales as the
    **average of previous months**. This simple approach might already deliver around
    **80% accuracy** — good enough for planning and inventory decisions.
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, if we switch to a more advanced model like **ARIMA or SARIMA**, we might
    increase accuracy to around **85%**. But the key question is: is that extra 5%
    worth the additional time, effort and resources? In this case, the **baseline
    model does the job**.'
  prefs: []
  type: TYPE_NORMAL
- en: In fact, in most everyday business scenarios, **baseline models are sufficient**.
    We typically turn to classical models like ARIMA or SARIMA in **high-impact industries**
    such as **finance or energy**, where even a small improvement in accuracy can
    have a significant financial or operational impact. Even then, a **baseline model
    is usually applied first** — not only to provide quick insights but also to act
    as a **benchmark** that more complex models must outperform.
  prefs: []
  type: TYPE_NORMAL
- en: 'Okay, now that we’re ready to implement some baseline models, there’s one key
    thing we need to understand first:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Every time series is made up of three main components — trend, seasonality
    and residuals.**'
  prefs: []
  type: TYPE_NORMAL
- en: Time series decomposition separates data into trend, seasonality and residuals
    (noise), helping us uncover the true patterns beneath the surface. This understanding
    guides the choice of forecasting models and improves accuracy. It’s also a vital
    first step before building both simple and advanced forecasting solutions.
  prefs: []
  type: TYPE_NORMAL
- en: '**Trend**'
  prefs: []
  type: TYPE_NORMAL
- en: This is the overall direction your data is moving in over time — going up, down
    or staying flat.
  prefs: []
  type: TYPE_NORMAL
- en: 'Example: Steady decrease in monthly cigarette sales.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Seasonality** These are the patterns that repeat at regular intervals — daily,
    weekly, monthly or yearly.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Example: Cool drinks sales in summer.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Residuals (Noise)** This is the random “leftover” part of the data, the unpredictable
    ups and downs that can’t be explained by trend or seasonality.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Example: A one-time car purchase showing up in your monthly expense pattern.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Now that we understand the key components of a time series, let’s put that
    into practice using a real dataset: **Daily Minimum Temperatures in Melbourne,
    Australia**.'
  prefs: []
  type: TYPE_NORMAL
- en: We’ll use Python to **decompose the time series** into its trend, seasonality,
    and residual components so we can better understand its structure and choose an
    appropriate baseline model.
  prefs: []
  type: TYPE_NORMAL
- en: '**<mdspan datatext="el1744227674275" class="mdspan-comment">Code</mdspan>:**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: '**Output:**'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d9d354000cf396bb4875ec800c9927a2.png)'
  prefs: []
  type: TYPE_IMG
- en: Decomposition of daily temperatures showing trend, seasonal cycles and random
    fluctuations.
  prefs: []
  type: TYPE_NORMAL
- en: The decomposition plot clearly shows a **strong seasonal pattern** that repeats
    each year, along with a **mild trend** that shifts over time. The residual component
    captures the random noise that isn’t explained by trend or seasonality.
  prefs: []
  type: TYPE_NORMAL
- en: In the code earlier, you might have noticed that I used an **additive model**
    for decomposing the time series. But what exactly does that mean — and why is
    it the right choice for this dataset?
  prefs: []
  type: TYPE_NORMAL
- en: Let’s break it down.
  prefs: []
  type: TYPE_NORMAL
- en: 'In an **additive model**, we assume Trend, Seasonality and Residuals (Noise)
    combine **linearly**, like this:'
  prefs: []
  type: TYPE_NORMAL
- en: Y = T ​+ S ​+ R​
  prefs: []
  type: TYPE_NORMAL
- en: 'Where:'
  prefs: []
  type: TYPE_NORMAL
- en: Y is the actual value at time t
  prefs: []
  type: TYPE_NORMAL
- en: T​ is the trend
  prefs: []
  type: TYPE_NORMAL
- en: S is the seasonal component
  prefs: []
  type: TYPE_NORMAL
- en: R is the residual (random noise)
  prefs: []
  type: TYPE_NORMAL
- en: This means we’re treating the observed value as the **sum of the parts,** each
    component contributes **independently** to the final output.
  prefs: []
  type: TYPE_NORMAL
- en: 'I chose the **additive model** because when I looked at the pattern in daily
    minimum temperatures, I noticed something important:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/5da6ec7449ea7663c6f722530a3c7c79.png)'
  prefs: []
  type: TYPE_IMG
- en: The line plot above shows the daily minimum temperatures from 1981 to 1990\.
    We can clearly see a strong **seasonal cycle** that repeats each year, colder
    temperatures in winter, warmer in summer.
  prefs: []
  type: TYPE_NORMAL
- en: Importantly, the **amplitude of these seasonal swings stays relatively consistent**
    over the years. For example, the temperature difference between summer and winter
    doesn’t appear to grow or shrink over time. This stability in seasonal variation
    is a key sign that the **additive model** is appropriate for decomposition, since
    the seasonal component appears to be **independent of any trend**.
  prefs: []
  type: TYPE_NORMAL
- en: We use an **additive model** when the **trend is relatively stable** and **does
    not amplify or distort the seasonal pattern**, and when the **seasonality stays
    within a consistent range** over time, even if there are minor fluctuations.
  prefs: []
  type: TYPE_NORMAL
- en: Now that we understand how the **additive model** works, let’s explore the **multiplicative
    model** — which is often used when the **seasonal effect scales with the trend**
    which will also help us understand the additive model more clearly.
  prefs: []
  type: TYPE_NORMAL
- en: Consider a household’s **electricity consumption**. Suppose the household uses
    **20% more** electricity in summer compared to winter. That means the seasonal
    effect isn’t a fixed number — it’s a **proportion** of their baseline usage.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s see how this looks with real numbers:'
  prefs: []
  type: TYPE_NORMAL
- en: In 2021, the household used 300 kWh in winter and 360 kWh in summer (20% more
    than winter).
  prefs: []
  type: TYPE_NORMAL
- en: In 2022, their winter consumption increased to 330 kWh, and summer usage rose
    to 396 kWh (still 20% more than winter).
  prefs: []
  type: TYPE_NORMAL
- en: In both years, the seasonal difference **grows with the trend**   from +60 kWh
    in 2021 to +66 kWh in 2022   even though the **percentage increase stays the same**.
    This is exactly the kind of behavior that a **multiplicative model captures**
    well.
  prefs: []
  type: TYPE_NORMAL
- en: 'In mathematical terms:'
  prefs: []
  type: TYPE_NORMAL
- en: Y = T ×S ×R
  prefs: []
  type: TYPE_NORMAL
- en: 'Where:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Y​: Observed value'
  prefs: []
  type: TYPE_NORMAL
- en: 'T: Trend component'
  prefs: []
  type: TYPE_NORMAL
- en: 'S: Seasonal component'
  prefs: []
  type: TYPE_NORMAL
- en: 'R​: Residual (noise)'
  prefs: []
  type: TYPE_NORMAL
- en: By looking at the decomposition plot, we can figure out whether an additive
    or multiplicative model fits our data better.
  prefs: []
  type: TYPE_NORMAL
- en: There are also other powerful decomposition tools available, which I’ll be covering
    in one of my upcoming blog posts.Now that we have a clear understanding of additive
    and multiplicative models, let’s shift our focus to applying a baseline model
    that fits this dataset.
  prefs: []
  type: TYPE_NORMAL
- en: Based on the decomposition plot, we can see a strong seasonal pattern in the
    data, which suggests that a **Seasonal Naive model** might be a good fit for this
    time series.
  prefs: []
  type: TYPE_NORMAL
- en: This model assumes that the value at a given time will be the **same as it was
    in the same period of the previous season** — making it a simple yet effective
    choice when seasonality is dominant and consistent. For example, if temperatures
    typically follow the same yearly cycle, then the forecast for July 1st, 1990,
    would simply be the temperature recorded on July 1st, 1989.
  prefs: []
  type: TYPE_NORMAL
- en: '**Code:**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 'Output:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/1812747e685dac00703362990ce701e4.png)'
  prefs: []
  type: TYPE_IMG
- en: Seasonal Naive Forecast vs. Actual Temperatures (1989–1990)
  prefs: []
  type: TYPE_NORMAL
- en: To keep the visualization clear and focused, we’ve plotted the **last two years**
    of the dataset (1989–1990) instead of all 10 years.
  prefs: []
  type: TYPE_NORMAL
- en: This plot compares the **actual daily minimum temperatures** in Melbourne with
    the values predicted by the **Seasonal Naive model**, which simply assumes that
    each day’s temperature will be the same as it was on the **same day one year ago**.
  prefs: []
  type: TYPE_NORMAL
- en: As seen in the plot, the Seasonal Naive forecast captures the **broad shape
    of the seasonal cycles** quite well — it mirrors the rise and fall of temperatures
    throughout the year. However, it doesn’t capture day-to-day variations, nor does
    it respond to slight shifts in seasonal timing. This is expected, as the model
    is designed to repeat the previous year’s pattern **exactly**, without adjusting
    for trend or noise.
  prefs: []
  type: TYPE_NORMAL
- en: To evaluate how well this model performs, we calculate the **Mean Absolute Percentage
    Error (MAPE)** over the final 365 days of the dataset (i.e., 1990). We only use
    this period because the Seasonal Naive forecast needs **a full year of historical
    data** before it can begin making predictions.
  prefs: []
  type: TYPE_NORMAL
- en: '**Mean Absolute Percentage Error (MAPE)** is a commonly used metric to evaluate
    the accuracy of forecasting models. It measures the **average absolute difference
    between the actual and predicted values**, expressed as a **percentage of the
    actual values**.'
  prefs: []
  type: TYPE_NORMAL
- en: 'In time series forecasting, we typically evaluate model performance on the
    **most recent or target time period** — not on the middle years. This reflects
    how forecasts are used in the real world: we build models on historical data to
    predict what’s coming next.'
  prefs: []
  type: TYPE_NORMAL
- en: That’s why we calculate MAPE only on the **final 365 days** of the dataset — this
    simulates forecasting for a future and gives us a realistic measure of how well
    the model would perform in practice.
  prefs: []
  type: TYPE_NORMAL
- en: A **MAPE of 28.23%**, which gives us a baseline level of forecasting error.
    Any model we build next — whether it’s customized or more advanced, should aim
    to outperform this benchmark.
  prefs: []
  type: TYPE_NORMAL
- en: A **MAPE of 28.23%** means that, on average, the model’s predictions were **28.23%
    off** from the actual daily temperature values over the last year.
  prefs: []
  type: TYPE_NORMAL
- en: In other words, if the true temperature on a given day was 10°C, the Seasonal
    Naïve forecast might have been around 7.2°C or 12.8°C, reflecting a 28% deviation.
  prefs: []
  type: TYPE_NORMAL
- en: I’ll dive deeper into evaluation metrics in a future post.
  prefs: []
  type: TYPE_NORMAL
- en: In this post, we laid the foundation for time series forecasting by understanding
    how real-world data can be broken down into **trend**, **seasonality**, and **residuals**
    through decomposition. We explored the difference between **additive and multiplicative
    models**, implemented the **Seasonal Naive baseline forecast** and evaluated its
    performance using **MAPE**.
  prefs: []
  type: TYPE_NORMAL
- en: While the Seasonal Naive model is simple and intuitive, it comes with limitations
    especially for this dataset. It assumes that the temperature on any given day
    is identical to the same day last year. But as the plot and MAPE of **28.23%**
    showed, this assumption doesn’t hold perfectly. The data displays slight shifts
    in seasonal patterns and long-term variations that the model fails to capture.
  prefs: []
  type: TYPE_NORMAL
- en: In the next part of this series, we’ll go further. We’ll explore how to **customize
    a baseline model**, compare it to the Seasonal Naive approach and evaluate which
    one performs better using error metrics like **MAPE**, **MAE** and **RMSE**.
  prefs: []
  type: TYPE_NORMAL
- en: 'We’ll also begin building the foundation needed to understand more advanced
    models like **ARIMA** including key concepts such as:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Stationarity**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Autocorrelation and Partial Autocorrelation **'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Differencing**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Lag-based modeling (AR and MA terms)**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Part 2 will dive into these topics in more detail, starting with custom baselines
    and ending with the foundations of ARIMA.
  prefs: []
  type: TYPE_NORMAL
- en: Thanks for reading.  I hope you found this post helpful and insightful.
  prefs: []
  type: TYPE_NORMAL
