- en: 'The Machine Learning “Advent Calendar” Day 8: Isolation Forest in Excel'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 机器学习“圣诞日历”第8天：Excel中的隔离森林
- en: 原文：[https://towardsdatascience.com/the-machine-learning-advent-calendar-day-8-isolation-forest-in-excel/](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-8-isolation-forest-in-excel/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/the-machine-learning-advent-calendar-day-8-isolation-forest-in-excel/](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-8-isolation-forest-in-excel/)
- en: <mdspan datatext="el1765218258404" class="mdspan-comment">After spending the
    weekend</mdspan> with Decision Trees, both for [Regression](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-6-decision-tree-regressor/)
    and [Classification](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-7-decision-tree-classifier/),
    we will continue to use the principle of Decision Trees today.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1765218258404" class="mdspan-comment">在周末与决策树一起度过</mdspan>，无论是用于[回归](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-6-decision-tree-regressor/)还是[分类](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-7-decision-tree-classifier/)，我们今天将继续使用决策树的原则。
- en: And this time, we are in unsupervised learning, so there are no labels.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 而这次，我们处于无监督学习状态，因此没有标签。
- en: The algorithm is called Isolation Forest, and the idea is to build many decision
    trees to form a forest. The principle is to detect anomalies by isolating them.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 该算法被称为隔离森林，其理念是构建许多决策树形成一个森林。其原理是通过隔离来检测异常。
- en: 'To keep everything easy to understand, let’s take a very simple example dataset
    that I created myself:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 为了让一切更容易理解，让我们用一个我亲自创建的非常简单的示例数据集来说明：
- en: 1, 2, 3, 9
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 1, 2, 3, 9
- en: '(And because the chief editor of TDS reminded me about legal details about
    mentioning the source of the data, let me state this properly: *this dataset is
    fully copyrighted by myself*. It is a four-point dataset that I handcrafted, and
    I am happy to grant everyone the right to use it for educational purposes.)'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: （并且因为TDS的主编提醒我关于提及数据来源的法律细节，让我正确地声明这一点：*这个数据集完全由我自己版权所有*。这是一个四点数据集，是我手工制作的，我很高兴授予每个人用于教育目的的使用权。）
- en: 'The goal here is simple: find the anomaly, the intruder.'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 这里的目标很简单：找到异常，入侵者。
- en: I know you already see which one it is.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 我知道你已经知道它是哪一个了。
- en: As always, the idea is to turn this into an algorithm that can detect it automatically.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 和往常一样，想法是将这变成一个可以自动检测它的算法。
- en: Anomaly Detection in the Classic ML Framework
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 经典机器学习框架中的异常检测
- en: Before going further, let us take one step back and see where anomaly detection
    sits in the bigger picture.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 在继续之前，让我们退一步，看看异常检测在更大图景中的位置。
- en: '![](../Images/cf2eb521b8797b5366713bee7426d9fa.png)'
  id: totrans-13
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/cf2eb521b8797b5366713bee7426d9fa.png)'
- en: Classic ML framework – image by author
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 经典机器学习框架 – 作者图片
- en: 'On the left, we have **supervised learning**, with labeled data and two main
    types:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 在左侧，我们有**监督学习**，有标签数据，主要有两种类型：
- en: '**Regression** when the target is numerical'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**回归**当目标为数值时'
- en: '**Classification** when the target is categorical'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**分类**当目标为分类时'
- en: This is where we used Decision Trees so far.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我们迄今为止使用决策树的地方。
- en: On the right, we have **unsupervised learning**, with no labels.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 在右侧，我们有**无监督学习**，没有标签。
- en: We do not predict anything. We simply **manipulate the observations** (clustering
    and anomaly detection) or **manipulate the features** (dimensionality reduction,
    and other methods).
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不预测任何东西。我们只是**操纵观测值**（聚类和异常检测）或**操纵特征**（降维和其他方法）。
- en: Dimensionality reduction manipulates the features. Even though it sits in the
    “unsupervised” category, its goal is quite different from the others. Since it
    reshapes the features themselves, it almost feels like feature engineering.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 降维操纵特征。尽管它位于“无监督”类别中，但其目标与其他方法大不相同。因为它重塑了特征本身，所以几乎感觉像是特征工程。
- en: 'For observation-level methods, we have two possibilities:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 对于观测级方法，我们有两种可能性：
- en: '**Clustering**: group observations'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**聚类**：分组观测值'
- en: '**Anomaly detection**: **assign a score** to each observation'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**异常检测**：为每个观测值**分配一个分数**'
- en: In practice, some models can do the two at the same time. For example, the k-means
    is capable of detecting anomalies.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 在实践中，一些模型可以同时完成这两项任务。例如，k-means可以检测异常。
- en: Isolation Forest is only for Anomaly Detection, and not clustering.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 隔离森林仅用于异常检测，而不是聚类。
- en: 'So, today, we are exactly here:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，今天，我们正好在这里：
- en: '**Unsupervised learning → Clustering / Anomaly detection → Anomaly detection**'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: '**无监督学习 → 聚类/异常检测 → 异常检测**'
- en: 'The Painful Part: Building Trees in Excel'
  id: totrans-29
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 痛苦的部分：在Excel中构建树
- en: 'Now we begin the implementation in Excel, and I have to be honest: this part
    is really painful…'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们开始在Excel中实施，我必须坦白：这部分真的很痛苦…
- en: It is painful because we need to build many small rules, and the formulas are
    not easy to drag. This is one of the limitations of Excel when the model is based
    on **decisions**. Excel is great when the formulas look the same for every row.
    But here, each node in the tree follows a different rule, so the formulas do not
    generalize easily.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 这很痛苦，因为我们需要构建许多小的规则，公式不易拖拽。这是Excel在模型基于**决策**时的一个局限性。当公式对每一行都相同的时候，Excel很棒。但在这里，树中的每个节点遵循不同的规则，因此公式不易推广。
- en: For Decision Trees, we saw that with a single split, the formula worked. But
    I stopped there on purpose. Why? Because adding more splits in Excel becomes complicated.
    The structure of a decision tree is not naturally “drag-friendly”.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 对于决策树，我们看到了使用单次分割公式就有效。但我故意停在那里。为什么？因为Excel中添加更多分割变得复杂。决策树的结构并不自然地“拖拽友好”。
- en: However, for Isolation Forest, we have no choice.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，对于孤立森林，我们别无选择。
- en: We need to build a **full tree**, all the way down, to see how each point is
    isolated.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要构建一个**完整树**，一直到底，以查看每个点是如何被孤立的。
- en: If you, dear readers, have ideas to simplify this, please contact me.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你，亲爱的读者，有简化这个方法的想法，请与我联系。
- en: Isolation Forest in 3 Steps
  id: totrans-36
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 三步孤立森林
- en: Even though the formulas are not easy, I tried my best to structure the approach.
    Here is the entire method in just three steps.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管公式不易，但我尽力构建了这个方法。这里就是整个方法，只需三步。
- en: '![](../Images/cf60f87019d2946a386c13e51b919d71.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/cf60f87019d2946a386c13e51b919d71.png)'
- en: Isolation Forest in Excel – image by author
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: Excel中的孤立森林 – 作者图片
- en: 1\. Isolation Tree Construction
  id: totrans-40
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 构建孤立树
- en: We start by creating one isolation tree.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 我们首先创建一个孤立树。
- en: At each node, we pick a random split value between the minimum and maximum of
    the current group.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 在每个节点，我们在当前组的最大值和最小值之间选择一个随机的分割值。
- en: This split divides the observations into “left” (L) and “right” (R).
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 这个分割将观测值分为“左”（L）和“右”（R）。
- en: When an observation becomes isolated, I mark it as **F** for “Final”, meaning
    it has reached a leaf.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 当一个观测值被孤立时，我将其标记为**F**，表示“最终”，意味着它已经到达了叶子节点。
- en: By repeating this process, we obtain a full binary tree where anomalies tend
    to be isolated in fewer steps. For each observation, we can then count its **depth**,
    which is simply the number of splits needed to isolate it.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 通过重复这个过程，我们获得了一个完整的二叉树，其中异常值往往在更少的步骤中被孤立。对于每个观测值，我们可以计算它的**深度**，这仅仅是孤立它所需的分割次数。
- en: '![](../Images/cea7a6d16514bbf1d24b78fcca26f39a.png)'
  id: totrans-46
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/cea7a6d16514bbf1d24b78fcca26f39a.png)'
- en: Isolation Forest in Excel – image by author
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: Excel中的孤立森林 – 作者图片
- en: 2\. Average Depth Calculation
  id: totrans-48
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 平均深度计算
- en: One tree is not enough. So we repeat the same random process several times to
    build multiple trees.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 一棵树是不够的。因此，我们重复相同的随机过程多次来构建多棵树。
- en: For each data point, we count how many splits were needed to isolate it in each
    tree.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 对于每个数据点，我们计算在每棵树中需要多少次分割才能将其孤立。
- en: Then we compute the average depth (or average path length) across all trees.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 然后我们计算所有树的平均深度（或平均路径长度）。
- en: This gives a stable and meaningful measure of how easy it is to isolate each
    point.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 这给出了一个稳定且有意义的度量，衡量孤立每个点有多容易。
- en: 'At this point, the average depth already gives us a solid indicator:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 到这一点，平均深度已经给我们一个可靠的指标：
- en: '**the lower the depth, the more likely the point is an anomaly.**'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: '**深度越低，点越可能是异常。**'
- en: A short depth means the point is isolated very quickly, which is a signature
    of an anomaly.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 短深度意味着该点很快就被孤立，这是异常的一个特征。
- en: A long depth means the point behaves like the rest of the data, because they
    stay grouped together, and are not easy to separate.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 长深度意味着该点表现得像其他数据一样，因为它们保持在一起，不容易分离。
- en: In our example, the score makes perfect sense.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的例子中，得分完全合理。
- en: First, 9 is the anomaly, with the average depth of 1\. For all 5 trees, one
    split is enough to isolate it. (Although, this is not always the case, you can
    test it yourself.)
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 首先，9是异常值，平均深度为1。对于所有5棵树，一次分割就足以将其孤立。（尽管，这并不总是如此，你可以自己测试。）
- en: For the other three observations, the depth is similar, and noticeably larger.
    And the highest score is attributed to 2, which sits in the middle of the group,
    and this is exactly what we expect.
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于其他三个观测值，深度相似，并且明显更大。最高分归因于2，它位于组中间，这正是我们所期望的。
- en: 'If one day you have to explain this algorithm to someone else, feel free to
    use this dataset: easy to remember and intuitive to illustrate. And please, do
    not forget to mention my copyright on it!'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/6ab1aea76d1a3c37bbbe89192fb90f09.png)'
  id: totrans-61
  prefs: []
  type: TYPE_IMG
- en: Isolation Forest in Excel – image by author
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Anomaly Score Calculation
  id: totrans-63
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The final step is to normalize the average depth, to give a standard anomaly
    score, between 0 and 1.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
- en: Saying that an observation has an average depth of *n* does not mean much by
    itself.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
- en: This value depends on the total number of data points, so we cannot interpret
    it directly as “normal” or “anomalous”.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
- en: The idea is to compare the average path length of each point to a **typical
    value** expected under pure randomness. This tells us how surprising (or not)
    the depth really is.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
- en: 'We will see the transformation later, but the goal is simple:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
- en: '**turn the raw depth into a relative score that makes sense without any context.**'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
- en: Short depths will naturally become scores close to 1 (anomalies),
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
- en: and long depths will become scores close to 0 (normal observations).
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
- en: 'And finally, some implementations adjust the score so that it has a different
    meaning: **positive values indicate normal points**, and **negative values indicate
    anomalies**. This is simply a transformation of the original anomaly score.'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
- en: 'The underlying logic does not change at all: short paths still correspond to
    anomalies, and long paths correspond to normal observations.'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b7b4875bb40608036cdb3a24fb09f629.png)'
  id: totrans-74
  prefs: []
  type: TYPE_IMG
- en: Isolation Forest in Excel – image by author
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
- en: Isolation Tree Building
  id: totrans-76
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: So this is the painful part.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
- en: Quick Overview
  id: totrans-78
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: I created a table to capture the different steps of the tree-building process.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
- en: It is not regular, and it is not perfectly structured, but I tried my best to
    make it readable.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
- en: And I am not sure that all the formulas generalized well.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/1745d7337b7d63cd594d08f1a55a6abb.png)'
  id: totrans-82
  prefs: []
  type: TYPE_IMG
- en: Isolation Forest in Excel – image by author
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
- en: '**Get the minimum and maximum values** of the current group.'
  id: totrans-84
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Generate a random split value** between this min and max.'
  id: totrans-85
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Split the observations** into left (L) and right (R).'
  id: totrans-86
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Count how many observations** fall into L and R.'
  id: totrans-87
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: If a group contains only **one observation**, mark it as **F** (Final) and stop
    for that branch.
  id: totrans-88
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Repeat the process** for every non-final group until all observations are
    isolated.'
  id: totrans-89
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: This is the entire logic of building one isolation tree.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
- en: Developed Explanation
  id: totrans-91
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We begin with all the observations together.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
- en: The first step is to look at the **minimum and maximum** of this group. These
    two values define the interval where we can make a random cut.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
- en: Next, we **generate a random split value** somewhere between the min and max.
    Unlike decision trees, there is no optimization, no criterion, no impurity measure.
    The split is purely random.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
- en: We can use RAND in Excel, as you can see the in following screenshot.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d00f5b8651abd3e7bee463b74e7aded3.png)'
  id: totrans-96
  prefs: []
  type: TYPE_IMG
- en: Isolation Forest in Excel – image by author
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
- en: 'Once we have the random split, we **divide the data** into two groups:'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
- en: '**Left (L):** observations less than or equal to the split'
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Right (R):** observations greater than the split'
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This is simply done by comparing the split with the observations with IF formula.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d2357d780a670650b1eeafcf0f11c584.png)'
  id: totrans-102
  prefs: []
  type: TYPE_IMG
- en: Isolation Forest in Excel – image by author
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
- en: After the split, we **count** how many observations went to each side.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
- en: If one of these groups contains **only one observation**, this point is now
    isolated.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
- en: We mark it as **F** for “Final”, meaning it sits in a leaf and no further splitting
    is needed for that branch.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
- en: The VLOOKUP is to get the observations that have 1 on its side, from the table
    of the counts.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/99b56ba33299593a1ed5f7f97447d1d3.png)'
  id: totrans-108
  prefs: []
  type: TYPE_IMG
- en: Isolation Forest in Excel – image by author
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
- en: For all other groups that still contain multiple observations, we repeat exactly
    the same process.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
- en: We stop only when **every observation is isolated**, meaning each one appears
    in its own final leaf. The full structure that emerges is a **binary tree**, and
    the number of splits needed to isolate each observation is its **depth**.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
- en: Here, we know that 3 splits are enough.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
- en: At the end, you get the final table of one fully grown isolation tree.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
- en: Anomaly Score Calculation
  id: totrans-114
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The part about averaging the depth is just repeating the same process, and you
    can copy paste.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
- en: Now, I will give more details about the anomaly score calculation.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
- en: Normalization factor
  id: totrans-117
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: To compute the anomaly score, Isolation Forest first needs a *normalizing factor*
    called **c(n)**.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
- en: This value represents the *expected depth* of a random point in a random binary
    search tree with **n** observations.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
- en: Why do we need it?
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
- en: Because we want to compare the *actual* depth of a point to the *typical* depth
    expected under randomness.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
- en: A point that is isolated **much faster** than expected is likely an anomaly.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
- en: The formula for **c(n)** uses harmonic numbers.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
- en: 'A harmonic number H(k) is approximately:'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f7e4755c5e952570d8c27e2df1858d1f.png)'
  id: totrans-125
  prefs: []
  type: TYPE_IMG
- en: where γ = 0.5772156649 is the Euler–Mascheroni constant.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
- en: 'Using this approximation, the normalizing factor becomes:'
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/fa356421e8885f1ee125e8e227cf2d6f.png)'
  id: totrans-128
  prefs: []
  type: TYPE_IMG
- en: Then we can calculate this number in Excel.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/fa38fb2588b08ddc689a48e59d281946.png)'
  id: totrans-130
  prefs: []
  type: TYPE_IMG
- en: Isolation Forest in Excel – image by author
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
- en: 'Once we have **c(n)**, the anomaly score is:'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/419e9ab7eb7d55b29f9b285d98260e92.png)'
  id: totrans-133
  prefs: []
  type: TYPE_IMG
- en: where **h(x)** is the average depth needed to isolate the point across all trees.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
- en: If the score is close to **0**, the point is normal
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
- en: If the score is close to **1**, the point is an anomaly
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
- en: So we can transform the depths into scores.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/1d64640a47fa2cf7589e89e60592a7bf.png)'
  id: totrans-138
  prefs: []
  type: TYPE_IMG
- en: Isolation Forest in Excel – image by author
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
- en: Finally, for the adjusted score, we can use an offset, that is the average value
    of the anomaly scores, and we translate.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/3ec74adf95eac776d840869343574288.png)'
  id: totrans-141
  prefs: []
  type: TYPE_IMG
- en: Isolation Forest in Excel – image by author
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
- en: Additional Elements in Real Algorithm
  id: totrans-143
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实际算法中的附加元素
- en: In practice, Isolation Forest includes a few extra steps that make it more robust.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 实际上，隔离森林包括一些额外的步骤，使其更加稳健。
- en: '**1\. Choose a subsample of the data**'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: '**1. 选择数据的一个子样本**'
- en: Instead of using the full dataset for every tree, the algorithm picks a small
    random subset.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 该算法不是为每一棵树使用完整的数据集，而是选择一个小型的随机子集。
- en: This reduces computation and adds diversity between trees.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 这样可以减少计算量，并在树之间增加多样性。
- en: It also helps prevent the model from being overwhelmed by very large datasets.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 它还有助于防止模型被非常大的数据集所淹没。
- en: So it seems that a name like “Random Isolation Forest” is more suitable, right?
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，像“随机隔离森林”这样的名字似乎更合适，对吧？
- en: '**2\. Pick a random feature first**'
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: '**2. 首先选择一个随机特征**'
- en: When building each split, Isolation Forest does not always use the same feature.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 在构建每个分割时，隔离森林并不总是使用相同的特征。
- en: It first selects a feature at random, then chooses a random split value within
    that feature.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 它首先随机选择一个特征，然后在那个特征中选择一个随机的分割值。
- en: This makes the trees even more diverse and helps the model work well on datasets
    with many variables.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 这使得树更加多样化，并有助于模型在具有许多变量的数据集上良好工作。
- en: These simple additions make Isolation Forest surprisingly powerful for real-world
    applications.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 这些简单的添加使得隔离森林在现实世界的应用中出奇地强大。
- en: This is again what a “Random Isolation Forest” would do, this name is definitely
    better!
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 这正是“随机隔离森林”会做的事情，这个名字绝对更好！
- en: Advantages of Isolation Forest
  id: totrans-156
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 隔离森林的优势
- en: 'Compared with many distance-based models, Isolation Forest has several important
    advantages:'
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 与许多基于距离的模型相比，隔离森林有几个重要的优势：
- en: '**Works with categorical features**'
  id: totrans-158
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**适用于分类特征**'
- en: Distance-based methods struggle with categories, but Isolation Forest can handle
    them more naturally.
  id: totrans-159
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 基于距离的方法在处理类别时遇到困难，但隔离森林可以更自然地处理它们。
- en: '**Handles many features easily**'
  id: totrans-160
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**轻松处理许多特征**'
- en: High-dimensional data is not a problem.
  id: totrans-161
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 高维数据不是问题。
- en: The algorithm does not rely on distance metrics that break in high dimensions.
  id: totrans-162
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 该算法不依赖于在高维空间中失效的距离度量。
- en: '**No assumptions about distributions**'
  id: totrans-163
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**没有关于分布的假设**'
- en: There is no need for normality, no density estimation, no distances to compute.
  id: totrans-164
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 不需要正态性，不需要密度估计，也不需要计算距离。
- en: '**Scales well to high dimensions**'
  id: totrans-165
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**很好地扩展到高维**'
- en: Its performance does not collapse when the number of features grows.
  id: totrans-166
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 当特征数量增加时，其性能不会崩溃。
- en: '**Very fast**'
  id: totrans-167
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**非常快**'
- en: 'Splitting is trivial: pick a feature, pick a random value, cut.'
  id: totrans-168
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 分割是微不足道的：选择一个特征，选择一个随机值，然后切割。
- en: No optimization step, no gradient, no impurity calculation.
  id: totrans-169
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 没有优化步骤，没有梯度，没有纯度计算。
- en: 'Isolation Forest also has a very refreshing way of thinking:'
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 隔离森林还有一种非常新颖的思维方式：
- en: Instead of asking **“What should normal points look like?”**,
  id: totrans-171
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 而不是问**“正常点应该是什么样子？”**，
- en: Isolation Forest asks, **“How fast can I isolate this point?”**
  id: totrans-172
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 隔离森林询问，**“我能多快隔离这个点？”**
- en: This simple change of perspective solves many difficulties of classical anomaly
    detection.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 这种视角的小小改变解决了经典异常检测的许多困难。
- en: Conclusion
  id: totrans-174
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: Isolation Forest is an algorithm that looks complicated from the outside, but
    once you break it down, the logic is actually very simple.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 隔离森林是一个从外表看起来很复杂的算法，但一旦分解，其逻辑实际上非常简单。
- en: The Excel implementation is painful, yes. But the idea is not.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: Excel实现确实痛苦，是的。但理念本身并不如此。
- en: 'And once you understand the idea, everything else becomes much easier: how
    the trees work, why the depth matters, how the score is computed, and why the
    algorithm works so well in practice.'
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你理解了这个理念，其他所有事情都变得容易得多：树是如何工作的，为什么深度很重要，分数是如何计算的，以及为什么该算法在实践中表现得如此出色。
- en: 'Isolation Forest does not try to model “normal” behavior. Instead, it asks
    a completely different question: **how fast can I isolate this observation?**'
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 隔离森林不试图模拟“正常”行为。相反，它提出了一个完全不同的问题：**我能多快隔离这个观察结果？**
- en: This small change of perspective solves many problems that distance-based or
    density-based models struggle with.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 这种视角的小小改变解决了基于距离或密度模型难以应对的许多问题。
