- en: How to Classify Lung Cancer Subtype from DNA Copy Numbers Using PyTorch
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何使用PyTorch从DNA拷贝数中分类肺癌亚型
- en: 原文：[https://towardsdatascience.com/classification-of-lung-cancer-type-from-genomic-copy-number-profiles-using-a-convolutional-neural-network/](https://towardsdatascience.com/classification-of-lung-cancer-type-from-genomic-copy-number-profiles-using-a-convolutional-neural-network/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/classification-of-lung-cancer-type-from-genomic-copy-number-profiles-using-a-convolutional-neural-network/](https://towardsdatascience.com/classification-of-lung-cancer-type-from-genomic-copy-number-profiles-using-a-convolutional-neural-network/)
- en: <mdspan datatext="el1760640565251" class="mdspan-comment">In this article</mdspan>
    I’ll demonstrate how one can build a convolution neural network capable of distinguishing
    between cancer types using a simple PyTorch classifier. The data and code used
    for training are publicly available and the training can be done on a personal
    computer, potentially even on a CPU.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1760640565251" class="mdspan-comment">在这篇文章中</mdspan>，我将演示如何使用简单的PyTorch分类器构建一个能够区分癌症类型的卷积神经网络。用于训练的数据和代码是公开可用的，训练可以在个人电脑上进行，甚至可能在CPU上进行。
- en: Cancer is a an unfortunate side-effect of our cells accumulating information
    errors over the courses of our lives, leading to an uncontrolled growth. As researches
    we investigate the patterns of these errors in order to understand the disease
    better. Seen from a data scientist perspective, the human genome is an around
    three-billion-letter-long string with letters A, C, G, T (i.e. 2 bits of information
    per letter). A copying error or an external event can potentially remove/insert/change
    a letter, causing a mutation and potentially disruption to the genomic function.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 癌症是我们细胞在一生中积累信息错误的不幸副作用，导致不受控制的生长。作为研究人员，我们研究这些错误的模式，以便更好地了解疾病。从数据科学家的角度来看，人类基因组是一个大约三十亿字母长的字符串，由字母A、C、G、T组成（即每个字母2位信息）。复制错误或外部事件可能会删除/插入/改变一个字母，导致突变并可能破坏基因组功能。
- en: However, individual errors almost never lead to cancer development. The human
    body has multiple mechanisms to prevent cancer from developing, including dedicated
    proteins—the so called tumor suppressors. A list of necessary conditions—the so-called
    [“hallmarks of cancer”](https://aacrjournals.org/cancerdiscovery/article/12/1/31/675608/Hallmarks-of-Cancer-New-DimensionsHallmarks-of)
    must be met for a cell to be able to create a sustained growth.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，个别错误几乎从未导致癌症的发展。人体有多种机制来防止癌症的发生，包括专门的蛋白质——所谓的肿瘤抑制蛋白。细胞要能够持续生长，必须满足一系列必要条件——所谓的[“癌症标志”](https://aacrjournals.org/cancerdiscovery/article/12/1/31/675608/Hallmarks-of-Cancer-New-DimensionsHallmarks-of)。
- en: '![](../Images/e939c7253baa6840914a58934e90af67.png)'
  id: totrans-5
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/e939c7253baa6840914a58934e90af67.png)'
- en: '*Hallmarks of Cancer — a set on the left presents an agreed on set of characteristics
    a cancer needs to accumulate to enable sustained proliferative growth. Credit:*
    [*Hanahan D. Hallmarks of Cancer: New Dimensions. Cancer Discov. 2022 Jan;12(1):31–46*](https://aacrjournals.org/cancerdiscovery/article/12/1/31/675608/Hallmarks-of-Cancer-New-DimensionsHallmarks-of)*.*'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: '*癌症标志——左侧的集合展示了一组癌症需要积累的特征，以实现持续的增殖生长。图片来源：[Hanahan D. 癌症标志：新维度。癌症发现。2022年1月；12(1):31–46](https://aacrjournals.org/cancerdiscovery/article/12/1/31/675608/Hallmarks-of-Cancer-New-DimensionsHallmarks-of)*.*'
- en: Therefore, changes to individual letters of the DNA are usually insufficient
    to causes self-sustained proliferative growth. The vast majority of mutation-mediated
    cancers (as opposed to other sources of cancer, for example [the HPV virus](https://en.wikipedia.org/wiki/HPV-positive_oropharyngeal_cancer))
    also exhibit copy number (CN) changes. These are large-scale events, often adding
    or removing millions of DNA bases at a time.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，DNA单个字母的改变通常不足以引起自我维持的增殖生长。绝大多数由突变介导的癌症（与其他癌症来源相比，例如[人乳头瘤病毒](https://en.wikipedia.org/wiki/HPV-positive_oropharyngeal_cancer)）也表现出拷贝数（CN）变化。这些是大规模事件，通常一次添加或删除数百万个DNA碱基。
- en: '![](../Images/1d0cac305c0d9b655b8d9112ebe6168c.png)'
  id: totrans-8
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/1d0cac305c0d9b655b8d9112ebe6168c.png)'
- en: '*A breast cancer cell with newly formed chromosomes stained by colors matching
    their original chromosome. Credit: [Mira Grigorova and Paul Edwards, Department
    of Pathology, University of Cambridge](https://www.cellosaurus.org/pawefish/BreastCellLineDescriptions/HCC38.html)*.'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: '*一个新形成的染色体被染成与原始染色体颜色相匹配的乳腺癌细胞。图片来源：[Mira Grigorova 和 Paul Edwards，剑桥大学病理系](https://www.cellosaurus.org/pawefish/BreastCellLineDescriptions/HCC38.html)*。'
- en: These vast changes to the structure of the genome lead to loss of genes that
    would prevent the cancer from forming, while accumulating genes promoting cell
    growth. By sequencing the DNA of these cells, we can identify these changes, which
    quite often happens in regions specific to the cancer type. Copy number values
    for each allele can be derived from sequencing data using [copy number callers](https://pubmed.ncbi.nlm.nih.gov/20837533/).
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 这些对基因组结构的巨大变化导致防止癌症形成的基因丢失，同时积累促进细胞生长的基因。通过对这些细胞的DNA进行测序，我们可以识别这些变化，这些变化通常发生在特定于癌症类型的区域。每个等位基因的拷贝数值可以通过使用[拷贝数调用器](https://pubmed.ncbi.nlm.nih.gov/20837533/)从测序数据中推导出来。
- en: Processing the Copy Number Profiles
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 处理拷贝数配置文件
- en: One of the advantages of working with Copy Number (CN) profiles is that they
    are not biometric and therefore can be published without a need for access restrictions.
    This allows us to accumulate data over time from multiple studies to build datasets
    of sufficient size. However, the data coming from different studies is not always
    directly comparable, as it may be generated using different technologies, have
    different resolutions, or be pre-processed in different ways.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 与拷贝数（CN）配置文件一起工作的一个优点是它们不是生物计量数据，因此可以无需访问限制而发布。这使我们能够随着时间的推移从多个研究中积累数据，以构建足够大的数据集。然而，来自不同研究的数据并不总是可以直接比较的，因为它们可能使用不同的技术生成，具有不同的分辨率，或者以不同的方式进行预处理。
- en: To obtain the data and jointly process and visualize them, we will be using
    the tool [CNSistent](https://academic.oup.com/gigascience/article/doi/10.1093/gigascience/giaf104/8253488?rss=1),
    developed as part of work of the [Institute for Computational Cancer Biology](https://iccb-cologne.org)
    of the [University Clinic, Cologne, Germany](https://www.uk-koeln.de/en/uniklinik-koeln/international-office/about-university-hospital-cologne/).
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 为了获取数据并共同处理和可视化它们，我们将使用作为[科隆大学诊所的计算癌症生物学研究所](https://iccb-cologne.org)工作一部分开发的工具[CNSistent](https://academic.oup.com/gigascience/article/doi/10.1093/gigascience/giaf104/8253488?rss=1)。
- en: 'First we clone the repository and the data and set to the version used in this
    text:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们克隆存储库和数据，并将其设置为本文中使用的版本：
- en: '[PRE0]'
  id: totrans-15
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Since the data we will be using are inside of the repository (~1GB of data),
    it takes a few minutes to download. For cloning both Git and Git LFS must be present
    on the system.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们将使用的数据位于存储库内部（约1GB的数据），下载需要几分钟。克隆Git和Git LFS必须存在于系统中。
- en: Inside the repository is a requirements.txt file that lists all the dependencies
    that can be installed using pip `install -r requirements.txt`.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 在存储库内部有一个requirements.txt文件，列出了可以使用pip `install -r requirements.txt`安装的所有依赖项。
- en: (Creating a virtual environment first is recommended). Once the requirements
    are installed, CNSistent can be installed by running `pip install -e .` in the
    same folder. The `-e` flag installs the package from its source directory, which
    is necessary for access to the data through the API.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: （首先创建虚拟环境是推荐的）。一旦安装了要求，可以在同一文件夹中运行`pip install -e .`来安装CNSistent。`-e`标志从其源目录安装包，这对于通过API访问数据是必要的。
- en: 'The repository contains raw data from three datasets: [TCGA](https://www.cancer.gov/about-nci/organization/ccg/research/structural-genomics/tcga),
    [PCAWG](https://www.nature.com/collections/afdejfafdb), and [TRACERx](http://tracerx.co.uk/).
    These need to first be pre-processed. This can be done by running the script `bash
    ./scripts/data_process.sh`.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 存储库包含来自三个数据集的原始数据：[TCGA](https://www.cancer.gov/about-nci/organization/ccg/research/structural-genomics/tcga)、[PCAWG](https://www.nature.com/collections/afdejfafdb)和[TRACERx](http://tracerx.co.uk/)。这些数据需要首先进行预处理。这可以通过运行脚本`bash
    ./scripts/data_process.sh`来完成。
- en: 'Now, we have processed datasets and can load it using the CNSistent data utility
    library:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们已经处理了数据集，可以使用CNSistent数据实用库来加载它：
- en: '[PRE1]'
  id: totrans-21
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'Producing the following result:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 产生以下结果：
- en: '[PRE2]'
  id: totrans-23
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'This table shows the copy number data with the following columns:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 此表显示了以下列的拷贝数数据：
- en: '`sample_id`: the identifier of the sample,'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`sample_id`：样本的标识符，'
- en: '`chrom`: the chromosome,'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`chrom`：染色体，'
- en: '`start`: the start position of the segment (0-indexed inclusive),'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`start`：段的起始位置（0索引，包括），'
- en: '`end`: the end position of the segment (0-indexed exclusive),'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`end`：段的结束位置（0索引，不包括），'
- en: '`major_cn`: the number of copies of the major allele (the bigger of the two),'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`major_cn`：大等位基因（两者中较大的）的拷贝数，'
- en: '`minor_cn`: the number of copies of the minor allele (the smaller of the two).'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`minor_cn`：小等位基因（两者中较小的）的拷贝数。'
- en: On the first line we can therefore see a segment stating that sample SP101724
    has 2 copies of the major allele and 2 copies of the minor allele (4 in total)
    in the region of chromosome 1 from 0 to 27.26 megabase.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，在第一行我们可以看到一个表示样本SP101724在1号染色体0到27.26兆碱基区域有2个主等位基因拷贝和2个次等位基因拷贝（总共4个）的段。
- en: 'The second dataframe we loaded, samples_df, contains the metadata for the samples.
    For our purposes only the type is important. We can investigate the available
    types by running:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 我们加载的第二个数据框，samples_df，包含样本的元数据。对我们来说，类型是重要的。我们可以通过运行以下命令来调查可用的类型：
- en: '[PRE3]'
  id: totrans-33
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '![](../Images/08582ca19066b1435cd0b9dbb275cb75.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/08582ca19066b1435cd0b9dbb275cb75.png)'
- en: '*The distribution of the samples in the dataset based on the cancer type.*'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: '*根据癌症类型在数据集中的样本分布。*'
- en: In the example shown above, we can observe a potential problem with the data — the
    lengths of the individual segments are not uniform. The first segment is 27.26
    megabase long, while the second one is only 0.77 megabase long. This is a problem
    for the neural network, which expects the input to be of a fixed size.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 在上面显示的示例中，我们可以观察到数据的一个潜在问题——单个段的长度不均匀。第一个段长27.26兆碱基，而第二个段只有0.77兆碱基长。这对神经网络来说是个问题，因为它期望输入是固定大小的。
- en: We could technically take all existing breakpoints and create segments between
    all breakpoints in the dataset, so-called *minimum consistent segmentation*. This
    would however result in a huge number of segments — a quick check using `len(cns_df[“end”].unique())`
    shows that there are **823652** unique breakpoints.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 技术上，我们可以取所有现有的断点，并在数据集中的所有断点之间创建段，所谓*最小一致分割*。然而，这将导致大量段——使用`len(cns_df[“end”].unique())`快速检查显示有**823652**个独特的断点。
- en: 'Alternatively, we can use CNSistent to create a new segmentation using a binning
    algorithm. This will create segments of a fixed size, which can be used as input
    to the neural network. In our work we have determined 1–3 megabase segments to
    provide the best trade-off between accuracy and overfitting. We first create the
    segmentation and then apply it to obtain new CNS files using the following Bash
    script:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，我们可以使用CNSistent来创建一个新的分割，使用分箱算法。这将创建固定大小的段，可以用作神经网络的输入。在我们的工作中，我们确定了1-3兆碱基的段，以在准确性和过拟合之间提供最佳权衡。我们首先创建分割，然后使用以下Bash脚本来应用它以获取新的CNS文件：
- en: '[PRE4]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: The loop processes each dataset separately, while maintaining the same segmentation.
    The `--threads` flag is used to speed up the process by running the aggregation
    in parallel, adjusting the value according to the number of cores available.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 循环分别处理每个数据集，同时保持相同的分割。使用`--threads`标志通过并行运行聚合操作来加快处理速度，根据可用的核心数调整值。
- en: The  `--remove gaps  --filter 300000` arguments will remove regions of low mappability
    (aka *gaps*) and filter out segments shorter than 300 Kb. The `--split 3000000`
    argument will create segments of 3 Mb.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: '`--remove gaps  --filter 300000`参数将移除低可映射性区域（即*间隙*）并过滤出小于300 Kb的段。`--split
    3000000`参数将创建3 Mb的段。'
- en: Non-small-cell Lung Carcinoma
  id: totrans-42
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 非小细胞肺癌
- en: In this text we will focus on classification of non-small-cell lung carcinoma,
    which accounts for about 85% of all lung cancers, in particular the distinction
    between adenocarcinoma and squamous-cell carcinoma. It is important to differentiate
    between the two as their treatment regimes will be different and new methods give
    hope for non-invasive detection from blood samples or nasal swabs.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我们将重点关注非小细胞肺癌的分类，它占所有肺癌的大约85%，特别是腺癌和鳞状细胞癌之间的区分。区分这两种癌症很重要，因为它们的治疗方案将不同，新的方法为从血液样本或鼻拭子进行非侵入性检测带来了希望。
- en: 'We will use the segments produced above and load these using a provided utility
    function using a utility function. Since we are classifying between two types
    of cancer, we can filter the samples to only include the relevant types, `LUAD`
    (adenocarcinoma) and `LUSC` (squamous cell carcinoma) and plot the first sample:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用上面产生的段，并使用提供的实用函数加载这些段。由于我们正在对两种类型的癌症进行分类，我们可以过滤样本，只包括相关的类型，`LUAD`（腺癌）和`LUSC`（鳞状细胞癌），并绘制第一个样本：
- en: '[PRE5]'
  id: totrans-45
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: '*Major and minor copy number segments in 3MB bins for the first three samples.
    In this case all three samples come from multi-region sequencing of the same patient,
    demonstrating how heterogeneous* *cancer cells may be even within a single tumor.*'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: '*在3MB分箱中，前三个样本的主次拷贝数段。在这种情况下，所有三个样本都来自同一患者的多区域测序，展示了癌症细胞即使在单个肿瘤内也可能具有异质性。*'
- en: Convolution Neural Network Model
  id: totrans-47
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 卷积神经网络模型
- en: Running the code requires Python 3 with [PyTorch 2+](https://pytorch.org/) to
    be installed and a Bash-compatible shell. NVIDIA GPU is recommended for faster
    training, but not necessary.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 运行代码需要Python 3，并安装了[PyTorch 2+](https://pytorch.org/)，以及一个兼容Bash的shell。推荐使用NVIDIA
    GPU以实现更快的训练，但并非必需。
- en: 'First we define a convolutional neural network with three layers:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们定义一个具有三个层的卷积神经网络：
- en: '[PRE6]'
  id: totrans-50
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: This is a boilerplate deep CNN with 2 input channels — one for each allele — and
    3 convolutional layers using 1D kernel of size 3 and ReLU activation function.
    The convolutional layers are followed by max pooling layers with kernel size of
    2\. Convolution is traditionally used for [edge detection](https://en.wikipedia.org/wiki/Kernel_%28image_processing%29),
    which is useful for us as we are interested in changes in the copy number, i.e.
    the edges of the segments.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个具有2个输入通道（每个等位基因一个）和3个卷积层的标准深度CNN，使用大小为3的一维核和ReLU激活函数。卷积层后面跟着大小为2的最大池化层。卷积传统上用于[边缘检测](https://en.wikipedia.org/wiki/Kernel_%28image_processing%29)，这对我们很有用，因为我们对拷贝数的变化感兴趣，即片段的边缘。
- en: The output of the convolutional layers is then flattened and passed through
    two fully connected layers with dropout. The `LazyLinear`layer connects the output
    of 64 stacked channels into one layer of 128 nodes, without needing to calculate
    how many nodes there are at the end of the convolution. This is where most of
    our parameters are, therefore we also apply dropout to prevent overfitting.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 卷积层的输出随后被展平，并通过两个带有dropout的全连接层。`LazyLinear`层将64个堆叠通道的输出连接到一个包含128个节点的单层，而不需要计算卷积结束时的节点数量。因此，大部分参数都在这里，所以我们还应用dropout来防止过拟合。
- en: Training the Model
  id: totrans-53
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 训练模型
- en: 'First we have to convert from dataframes to Torch tensors. We use a utility
    function bins_to_features, which creates a 3D feature array of the format (samples,
    alleles, segments). In the process we also split the data into training and testing
    sets in the 4:1 ratio:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们必须将数据帧转换为Torch张量。我们使用一个实用函数bins_to_features，它创建一个格式为（样本，等位基因，片段）的3D特征数组。在这个过程中，我们还按照4:1的比例将数据分为训练集和测试集：
- en: '[PRE7]'
  id: totrans-55
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'We can now train the model using the following training loop with 20 epochs.
    The Adam optimizer and CrossEntropy loss are typically used for classification
    tasks, we therefore use them here as well:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在可以使用以下训练循环和20个epoch来训练模型。Adam优化器和交叉熵损失通常用于分类任务，因此我们也在这里使用它们：
- en: '[PRE8]'
  id: totrans-57
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'This concludes the training. Afterwards, we can evaluate the model and print
    the confusion matrix:'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 这就完成了训练。之后，我们可以评估模型并打印混淆矩阵：
- en: '[PRE9]'
  id: totrans-59
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: '![](../Images/56764529bdb1939444733f8ff3bc1b58.png)'
  id: totrans-60
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/56764529bdb1939444733f8ff3bc1b58.png)'
- en: '*Confusion matrix showing the performance of the model on the test set. The
    model is able to distinguish between adenocarcinoma and squamous cell carcinoma
    with high accuracy (96%). Note that your results may slightly vary based on the
    type of GPU/CPU, version of CUDA, or NVIDIA drivers.*'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: '*混淆矩阵显示了模型在测试集上的性能。模型能够以高精度（96%）区分腺癌和鳞状细胞癌。请注意，根据GPU/CPU的类型、CUDA版本或NVIDIA驱动程序，您的结果可能会有所不同。*'
- en: The training process takes about 7 seconds total on an NVIDIA RTX 4090 GPU.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 在NVIDIA RTX 4090 GPU上，整个训练过程大约需要7秒钟。
- en: Conclusion
  id: totrans-63
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: We have developed an efficient and accurate classifier of lung cancer subtype
    from copy number data. [As we have shown](https://academic.oup.com/gigascience/article/doi/10.1093/gigascience/giaf104/8253488),
    such models transfer well to new studies and sources of sequence data.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经开发了一个高效且准确的肺癌亚型分类器，该分类器从拷贝数数据中提取。[正如我们所展示的](https://academic.oup.com/gigascience/article/doi/10.1093/gigascience/giaf104/8253488)，此类模型很好地转移到新的研究和序列数据来源。
- en: Mass scale AI is often being justified, among others, as a “[solution to cancer](https://blog.samaltman.com/abundant-intelligence)“.
    However as in this article, small models with classical approaches usually serve
    their purpose well. [Some even argue](https://www.nature.com/articles/s41698-024-00553-6)
    that the actual obstacle of machine learning in biology in medicine is not in
    solving problems, but in actually making impact for patients.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 大规模AI经常被合理化，其中之一是作为“[癌症解决方案](https://blog.samaltman.com/abundant-intelligence)”。然而，正如本文所述，使用经典方法的小型模型通常能很好地发挥作用。[有些人甚至认为](https://www.nature.com/articles/s41698-024-00553-6)，机器学习在生物医学中的实际障碍不在于解决问题，而在于真正对病人产生影响。
- en: Still, machine learning has been able to mostly solve at least [one major puzzle
    of computational biology](https://deepmind.google/discover/blog/demis-hassabis-john-jumper-awarded-nobel-prize-in-chemistry/),
    [reinvigorating the focus on machine learning for cancer](https://www.clinicaltrialsarena.com/news/isomorphic-labs-prepares-trials-ai-designed-drugs/).
    With some luck, we might be able to look at the next decade as the time we finally
    “solved” cancer.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管如此，机器学习已经能够解决至少[计算生物学的一个主要谜题](https://deepmind.google/discover/blog/demis-hassabis-john-jumper-awarded-nobel-prize-in-chemistry/)，[重新激发了对癌症机器学习的关注](https://www.clinicaltrialsarena.com/news/isomorphic-labs-prepares-trials-ai-designed-drugs/)。如果有一些运气，我们可能会将下一个十年视为我们最终“解决”癌症的时代。
- en: 'Bonus: Cell2Sentence'
  id: totrans-67
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 奖励：Cell2Sentence
- en: The foundational models of today often contain information, such as which genes
    have high copy numbers in which cancers, as a part of their training set. This
    though led to the creation of LLM-based approaches, like [Cell2Sentence](https://www.biorxiv.org/content/10.1101/2023.09.11.557287v3),
    where a dataset is converted to a natural language and submitted to an LLM.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 当前的基础模型通常包含信息，例如哪些基因在哪些癌症中具有高拷贝数，作为其训练集的一部分。这虽然导致了基于LLM的方法的创建，如[Cell2Sentence](https://www.biorxiv.org/content/10.1101/2023.09.11.557287v3)，其中数据集被转换为自然语言并提交给LLM。
- en: 'We can utilize this approach here. First we convert a random LUSC sample to
    a ranked list of genes, based on their copy number value:'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以在这里利用这种方法。首先，我们将一个随机的LUSC样本转换为基于其拷贝数值的基因排名列表：
- en: '[PRE10]'
  id: totrans-70
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: 'Then we convert the list of genes to a natural language query:'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 然后将基因列表转换为自然语言查询：
- en: '[PRE11]'
  id: totrans-72
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: 'Submitted to ChatGPT 5, the model correctly identifies the LUSC cancer:'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 提交给ChatGPT 5，该模型正确地识别了LUSC癌症：
- en: '[PRE12]'
  id: totrans-74
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: However, generating this output for one sample takes longer than classifying
    the whole dataset with our model and it would cost around ~200$ on API fees to
    classify our whole dataset.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，为单个样本生成此输出所需的时间比用我们的模型对整个数据集进行分类要长，并且对整个数据集进行分类的API费用大约为200美元。
