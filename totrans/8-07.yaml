- en: 'How To: Forecast Time Series Using Lags'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/how-to-forecast-time-series-using-lags-5876e3f7f473/](https://towardsdatascience.com/how-to-forecast-time-series-using-lags-5876e3f7f473/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'How To: Forecast Time Series Using Lags'
  prefs: []
  type: TYPE_NORMAL
- en: . Here’s how you can use them to your advantage
  prefs: []
  type: TYPE_NORMAL
- en: '![Image by author](../Images/39375b8941035f0b969fb35280e8a9e7.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: The nature of a time series model is such that past values often affect future
    values. When there’s any kind of ***seasonality*** in your data (in other words,
    your data follows an hourly, daily, weekly, monthly or yearly cycle) this relationship
    is even stronger.
  prefs: []
  type: TYPE_NORMAL
- en: Capturing this relationship can be done with features like hour, day of week,
    month, etc, but you can also add lags, which can quickly take your model to the
    next level.
  prefs: []
  type: TYPE_NORMAL
- en: What is a lag?
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'A **lag value** is simply this: A value that at one time point or another,
    preceded your current value.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s say you have a time series dataset that has the following values: [5,10,15,20,25].'
  prefs: []
  type: TYPE_NORMAL
- en: 25, being your most recent value, is the value at time t.
  prefs: []
  type: TYPE_NORMAL
- en: 20 is the value at t-1\. 15 is the value at t-2, and so on, until the beginning
    of the dataset.
  prefs: []
  type: TYPE_NORMAL
- en: This makes intuitive sense, since the word "lag" insinuates that something is
    "lagging behind" something else.
  prefs: []
  type: TYPE_NORMAL
- en: When we train a model using lag features, we can train it to recognize patterns
    with regard to how preceding values affect current and future values.
  prefs: []
  type: TYPE_NORMAL
- en: Why lags? (+ How to implement)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To showcase how lags can benefit your model, I’ll be walking you through an
    example using an [hourly energy consumption dataset](https://www.kaggle.com/datasets/robikscube/hourly-energy-consumption?resource=download&select=pjm_hourly_est.csv)
    ([CC0 1.0 license](https://creativecommons.org/publicdomain/zero/1.0/)).
  prefs: []
  type: TYPE_NORMAL
- en: 'Here is a sample of about 4 weeks of this dataset, so you get a feel for what
    it looks like:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Screenshot by author](../Images/9ce840050e92ca02b023f2e451ec0123.png)'
  prefs: []
  type: TYPE_IMG
- en: Screenshot by author
  prefs: []
  type: TYPE_NORMAL
- en: As you can see, there is some weekly seasonality as the weekends (showcased
    by red circles) tend to have lower usage across this 4 week slice. There’s also
    a clear daily seasonality as the peaks of the days tend to be between 17:00 and
    19:00 (5PM to 7PM).
  prefs: []
  type: TYPE_NORMAL
- en: When you zoom out, you can also see that usage patterns differ between months
    of the year (particularly summer vs winter months).
  prefs: []
  type: TYPE_NORMAL
- en: '![Screenshot by author](../Images/3328b639b455ae74b8553fcb006ea803.png)'
  prefs: []
  type: TYPE_IMG
- en: Screenshot by author
  prefs: []
  type: TYPE_NORMAL
- en: 'If I were to train a regular time series model, I’d focus on the following
    features:'
  prefs: []
  type: TYPE_NORMAL
- en: Hour of day
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Day of week
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Month of year
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I’m going to show you an example using the [NIXTLA mlforecast library](https://nixtlaverse.nixtla.io/mlforecast/index.html),
    since it not only makes time series forecasting very simple, but it’s also able
    to easily add lag features to your time series models.
  prefs: []
  type: TYPE_NORMAL
- en: 'First, I trained a regular model using only the features I listed. To start,
    I loaded the dataset in and prepared it for the NIXTLA library:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'I then prepared my data for modeling by splitting into train and test sets:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 'Next, I trained a Random Forest model using NIXTLA:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: 'Lastly, I predicted on the test set (used the forecast object to forecast the
    next 48 hours and compared it to the test set values) as well as ran a cross-validation
    with 3 windows, each predicting 24 hour chunks:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: So with this time series model – using hour, day of week, and month – had an
    average cross-validation RMSE of 1264.1 and a test set RMSE of 689.9.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s compare this to a lag-based model.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: 'Let’s compare the metrics side by side:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Model without lags + time series features (hour, day of week, month) test
    RMSE:** 689.9'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Model without lags + time series features CV RMSE:** 1264.1'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Model with lags test RMSE:** 421.86'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Model with lags CV RMSE:** 1038.7'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Note: The CV RMSE is a lot higher than the test RMSE in both cases. This is
    because the CV is evaluating different data than the test set.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The CV is evaluating on the following 3 days: July 29–31, predicting 24 hours
    at a time and taking the average. The holdout test set is evaluating August 1–2,
    predicting 48 hours at a time.'
  prefs: []
  type: TYPE_NORMAL
- en: To investigate this a bit further, I plotted the cross-validation predictions
    against the actuals, and got the RMSE for each split window (there were 3 – one
    per day).
  prefs: []
  type: TYPE_NORMAL
- en: It appears the model, in both cases, had a significant under-prediction for
    July 30th (RMSE of 1445) and a slight overprediction for July 31st (RMSE 888).
    This brought up the CV average.
  prefs: []
  type: TYPE_NORMAL
- en: '![Lag prediction model cross validation predicted vs actuals. Image by author](../Images/c0bbd776e800b9e59079d92ebb21287d.png)'
  prefs: []
  type: TYPE_IMG
- en: Lag prediction model cross validation predicted vs actuals. Image by author
  prefs: []
  type: TYPE_NORMAL
- en: So it’s possible that for some reason (potentially due to other variables we
    didn’t consider here, such as weather) the CV holdout sets didn’t do as well in
    both cases.
  prefs: []
  type: TYPE_NORMAL
- en: '*It’s always important to investigate what’s going on when your metrics look
    a bit off.*'
  prefs: []
  type: TYPE_NORMAL
- en: '*In a real ML project case, I would do a much deeper dive into why these days
    in particular were harder to predict, but I won’t for the purpose of this article —
    just noting that it’s always a good idea to do so.*'
  prefs: []
  type: TYPE_NORMAL
- en: 'If I take the averages:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Model without lags:** 997'
  prefs: []
  type: TYPE_NORMAL
- en: '**Model with lags:** 730.28'
  prefs: []
  type: TYPE_NORMAL
- en: Regardless of averages though, the model with lags outperforms the model without
    lags in both CV and holdout test set.
  prefs: []
  type: TYPE_NORMAL
- en: A word of caution
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Lags can provide your model with useful information and improve its performance.
    They’re also fairly easy to implement, especially with a well built time series
    library such as NIXTLA (Note: I am not sponsored by NIXTLA).'
  prefs: []
  type: TYPE_NORMAL
- en: But over-relying on lags can become a problem, especially if your goal is to
    forecast longer time horizons.
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Basically, the deal with lags is that at some point the model no longer has
    actual values to use as features, so it has to rely on predictions. This introduces
    some error to the model. And as you make more and more predictions, the error
    compounds.
  prefs: []
  type: TYPE_NORMAL
- en: 'For example, let’s say you are only using 1 lag column and your dataset is
    as follows: [1,2,3,4,5]. You trained your model on this dataset and now it’s time
    to make the forecast for the next 5 rows.'
  prefs: []
  type: TYPE_NORMAL
- en: 'On the first pass, we are on the next timestep past 5, let’s call it time t.
    The lag feature at t-1 is 5\. The model predicts the next value will be 6\. To
    predict the next value, at t+1, we will need to use our prediction: 6\. This introduces
    uncertainty since 6 was a prediction, not a real lag value.'
  prefs: []
  type: TYPE_NORMAL
- en: If the model predicts 8 at t+1, the next prediction, at t+2 must take in 8 (a
    prediction with an extra bit of uncertainty since it was produced by using 6 as
    a feature) as the next lag feature.
  prefs: []
  type: TYPE_NORMAL
- en: And so on, with each prediction increasing in uncertainty.
  prefs: []
  type: TYPE_NORMAL
- en: So you can see how this could lead to worse performance over longer horizons.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Lags can be great for forecasting shorter time horizons, like 1 — 48 rows. After
    that you need to watch your error carefully. [Use prediction intervals](https://nixtlaverse.nixtla.io/mlforecast/docs/how-to-guides/prediction_intervals.html)
    to measure uncertainty.
  prefs: []
  type: TYPE_NORMAL
- en: It’s also important to prioritize other numerical and categorical features besides
    just lags. Marking whether it is a holiday, a weekend vs weekday, or the season
    can also improve your model, as well as including external variables like temperature.
  prefs: []
  type: TYPE_NORMAL
- en: However, everything depends on your specific dataset, so always experiment with
    multiple features and combinations.
  prefs: []
  type: TYPE_NORMAL
- en: Find the full source code and dataset [here](https://github.com/hadenpell/Medium-Tutorials/tree/main/Time%20Series%20With%20Lags).
  prefs: []
  type: TYPE_NORMAL
- en: Thanks for reading
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
