- en: Zero-Shot Prompting
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![Zero-Shot Prompting Representation (Image by Author)](../Images/e5db86f201bd9c82e62dd114c50733e0.png)'
  prefs: []
  type: TYPE_IMG
- en: Zero-Shot Prompting Representation (Image by Author)
  prefs: []
  type: TYPE_NORMAL
- en: '**Zero-Shot Prompting** represents a scenario where the user only provides
    a description of the task through the system and user prompt, along with the image(s)
    to be processed. In this setup, the VLM relies only on the task description to
    generate an output. If we were to categorize prompting methods on a spectrum based
    on the amount of information provided to the VLM, zero-shot prompting presents
    the least amount of information to the model.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The advantage for users is that, for most tasks, a well-crafted zero-shot prompt
    can produce decent outputs simply by describing the task in text. Consider the
    implications of this: just a few years ago, tasks like image classification or
    image captioning required training a CNN or deep learning model on a large dataset
    before they could be used. Now, you can perform these tasks by utilizing text
    to describe them. You can create an off-the-shelf image classifier by specifying
    and describing what you want to analyze. Before VLMs, achieving this would have
    required gathering a large, task-specific dataset, training a model, and then
    using it for inference.'
  prefs: []
  type: TYPE_NORMAL
- en: '**So how do we prompt them?** OpenAI supports sending images as Base64 encoded
    urls to the VLM [2]. The general request structure looks like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: The structure is largely the same as how you would prompt a normal LLM with
    OpenAI. However the key difference is in adding an image to the request, which
    needs to be encoded as a Base64 string. This is where it is actually a bit interesting
    – though I’m using only one image as an input here, there is **nothing stopping
    me from also attaching multiple images** to the request.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s implement helper functions to do zero-shot prompting. To make the experiments
    faster, I parallelize the requests sent to the OpenAI API. I implement helpers
    for constructing the prompts and calling the model for getting the outputs. This
    includes a function to encode an image as a base64 string, and functions for constructing
    the prompt and calling the VLM through OpenAI’s API.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: I now tie all of this together and define a function that takes as input the
    image path, along with the necessary parameters (system prompt, user prompt and
    other hyperparameters), invokes the VLM and returns the caption generated for
    the image.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: We now run the outputs for the two images and get the corresponding caption
    from the zero-shot prompting setup.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: '![Outputs from the Zero-Shot Setup. Images in this picture are taken by Josh
    Frenette on [Unsplash](https://unsplash.com/photos/a-building-with-a-lot-of-plants-growing-on-the-side-of-it-E70gGcHNHj0?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    and by Alexander Zaytsev on Unsplash (Overall Image by Author).](../Images/2defb0a6b9c2a3e979a6f22f6a919890.png)'
  prefs: []
  type: TYPE_IMG
- en: Outputs from the Zero-Shot Setup. Images in this picture are taken by [Josh
    Frenette](https://unsplash.com/@joshfrenette?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on [[Unsplash](https://unsplash.com/photos/a-building-with-a-lot-of-plants-growing-on-the-side-of-it-E70gGcHNHj0?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)](https://unsplash.com/photos/brown-short-coated-dog-in-white-and-blue-jacket-on-snow-covered-ground-during-daytime-okjb-hk0LH4?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    and by [Alexander Zaytsev](https://unsplash.com/@anwaltzzz?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on Unsplash (Overall Image by Author).
  prefs: []
  type: TYPE_NORMAL
- en: We observe that the model gives detailed captions for the provided images, covering
    all the aspects in detail.
  prefs: []
  type: TYPE_NORMAL
- en: Few-Shot Prompting
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Few-Shot Prompting involves providing examples or demostrations of the task
    as context to the VLM to provide more reference and context to the model about
    the task to be performed.
  prefs: []
  type: TYPE_NORMAL
- en: '![Representation of Few-Shot Prompting (Image by Author)](../Images/84fbbfa9ae5503564a489a539db4b7ee.png)'
  prefs: []
  type: TYPE_IMG
- en: Representation of Few-Shot Prompting (Image by Author)
  prefs: []
  type: TYPE_NORMAL
- en: 'The advantages of few-shot prompting is that it helps provide additional grounding
    for the task, compared to zero-shot prompting. Let’s look at how this practically
    occurs in our task. First, consider our existing implementation:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: I utilize 3 images as few-shot examples to the VLM, and then run our system.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: '![Few-Shot Prompting outputs. Images in this picture are taken by Josh Frenette
    on [Unsplash](https://unsplash.com/photos/a-building-with-a-lot-of-plants-growing-on-the-side-of-it-E70gGcHNHj0?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    and by Alexander Zaytsev on Unsplash (Overall Image by Author).](../Images/ae3240e46c1152bc963d122cfe94a0d2.png)'
  prefs: []
  type: TYPE_IMG
- en: Few-Shot Prompting outputs. Images in this picture are taken by [Josh Frenette](https://unsplash.com/@joshfrenette?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on [[Unsplash](https://unsplash.com/photos/a-building-with-a-lot-of-plants-growing-on-the-side-of-it-E70gGcHNHj0?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)](https://unsplash.com/photos/brown-short-coated-dog-in-white-and-blue-jacket-on-snow-covered-ground-during-daytime-okjb-hk0LH4?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    and by [Alexander Zaytsev](https://unsplash.com/@anwaltzzz?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on Unsplash (Overall Image by Author).
  prefs: []
  type: TYPE_NORMAL
- en: 'Notice the captions generated with the VLM using the few-shot examples. These
    captions are much shorter and concise compared to the captions generated in the
    zero-shot prompting setting. Let’s look at how the captions for these examples
    look like:'
  prefs: []
  type: TYPE_NORMAL
- en: '![The few-shot images used and their corresponding captions. Images in this
    picture are by Mathias Reding on [[Unsplash](https://unsplash.com/photos/a-man-standing-next-to-a-tent-in-the-desert-ckfXPMb2_BI?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)](https://unsplash.com/photos/a-white-car-driving-on-a-desert-road-nOhLRqb5AV0?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash),
    sander traa on Unsplash, NEOM on Unsplash. (Image by author)](../Images/4ec42f385da64c35aa2128cdacf81a69.png)'
  prefs: []
  type: TYPE_IMG
- en: The few-shot images used and their corresponding captions. Images in this picture
    are by [Mathias Reding](https://unsplash.com/@matreding?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on [[[Unsplash](https://unsplash.com/photos/a-man-standing-next-to-a-tent-in-the-desert-ckfXPMb2_BI?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)](https://unsplash.com/photos/a-white-car-driving-on-a-desert-road-nOhLRqb5AV0?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)](https://unsplash.com/photos/a-blurry-photo-of-a-city-street-with-buildings-5-LTB9YPwkY?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash),
    [sander traa](https://unsplash.com/@sandertraa?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on Unsplash, [NEOM](https://unsplash.com/@neom?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on Unsplash. (Image by author)
  prefs: []
  type: TYPE_NORMAL
- en: '**This difference is primarily due to the influence of the few-shot examples.**
    The captions in the few-shot examples clearly influence the output by the VLM
    for the new images we use, leading to more concise and shorter captions. This
    illustrates how powerful the selection of few-shot examples can be in shaping
    the behavior of the VLM. Users can direct the model’s output to more closely match
    their preferred style, tone, or amount of detail by carefully choosing few-shot
    samples.'
  prefs: []
  type: TYPE_NORMAL
- en: Chain of Thought Prompting
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Chain of Thought (CoT) prompting [9], initially developed for LLMs, enables
    them to tackle address complex problems by breaking them into simpler, intermediate
    steps and encouraging the model to "think" before answering. This technique can
    be applied to VLMs without any adjustments. The primary difference is that the
    VLM can use both image and text as inputs when reasoning under CoT to answer the
    question.
  prefs: []
  type: TYPE_NORMAL
- en: 'To implement this, I utilize the 3 examples I picked for few-shot prompting
    and construct a CoT trace for them by first utilizing **OpenAI’s O1 model** (which
    is a multimodal VLM for reasoning tasks). I then use these CoT reasoning traces
    as my few-shot examples for prompting the VLM. For example, a CoT trace looks
    like this for one of the images:'
  prefs: []
  type: TYPE_NORMAL
- en: '![CoT trace for an image. Image in this picture is from Mathias Reding on Unsplash
    (Image by Author)](../Images/c3a0bf2b12f774d47695621761288a7f.png)'
  prefs: []
  type: TYPE_IMG
- en: CoT trace for an image. Image in this picture is from [Mathias Reding](https://unsplash.com/@matreding?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on [Unsplash](https://unsplash.com/photos/a-blurry-photo-of-a-city-street-with-buildings-5-LTB9YPwkY?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    (Image by Author)
  prefs: []
  type: TYPE_NORMAL
- en: The few-shot CoT traces I created for the images contain detailed reasoning
    for each aspect of the image that is important for creating the final caption.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: 'We run the CoT prompt setup for the VLM and obtain the results for these images:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: '![Outputs obtained from Chain-of-Thought prompting. Images in this picture
    are taken by Josh Frenette on [Unsplash](https://unsplash.com/photos/a-building-with-a-lot-of-plants-growing-on-the-side-of-it-E70gGcHNHj0?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    and by Alexander Zaytsev on Unsplash (Image by Author)](../Images/5e5620ad9664b427316b39fc76a54ab4.png)'
  prefs: []
  type: TYPE_IMG
- en: Outputs obtained from Chain-of-Thought prompting. Images in this picture are
    taken by [Josh Frenette](https://unsplash.com/@joshfrenette?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on [[Unsplash](https://unsplash.com/photos/a-building-with-a-lot-of-plants-growing-on-the-side-of-it-E70gGcHNHj0?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)](https://unsplash.com/photos/brown-short-coated-dog-in-white-and-blue-jacket-on-snow-covered-ground-during-daytime-okjb-hk0LH4?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    and by [Alexander Zaytsev](https://unsplash.com/@anwaltzzz?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on Unsplash (Image by Author)
  prefs: []
  type: TYPE_NORMAL
- en: The outputs from the few-shot CoT setup shows that the VLM is now capable of
    breaking down the image into intermediate steps before arriving at the final caption.
    This approach highlights the power of CoT prompting in influencing the behaviour
    of the VLM for a given task.
  prefs: []
  type: TYPE_NORMAL
- en: Object Detection Guided Prompting
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: An interesting implication of having models capable of processing images directly
    and recognizing various aspects is that it opens up numerous opportunities to
    guide VLMs in performing tasks more efficiently and implementing "feature engineering".
    If you think about it, you’ll quickly realize that you could provide images with
    embedded metadata that is relevant to the VLM’s task.
  prefs: []
  type: TYPE_NORMAL
- en: An example of this is to use object detection as an additional component in
    prompting VLMs. Such techniques are also explored in detail in this blog from
    AWS [10]. In this blog, I leverage an object detection model as an additional
    component in the prompting pipeline for the VLM.
  prefs: []
  type: TYPE_NORMAL
- en: '![An overview of the Object Detection Guided Prompting with VLMs. Image in
    this picture is taken by Josh Frenette on Unsplash (Image by Author)](../Images/5a59518e95226d2c8e35c48dcd0b6645.png)'
  prefs: []
  type: TYPE_IMG
- en: An overview of the Object Detection Guided Prompting with VLMs. Image in this
    picture is taken by [Josh Frenette](https://unsplash.com/@joshfrenette?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on [Unsplash](https://unsplash.com/photos/brown-short-coated-dog-in-white-and-blue-jacket-on-snow-covered-ground-during-daytime-okjb-hk0LH4?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    (Image by Author)
  prefs: []
  type: TYPE_NORMAL
- en: Generally, an object detection model is trained with a fixed vocabulary, meaning
    it can only recognize a predefined set of object categories. However, in our pipeline,
    since we can’t predict in advance which objects will appear in the image, we need
    an object detection model that is versatile and capable of recognizing a wide
    range of object classes. To achieve this, I use the OWL-ViT model [11], an open-vocabulary
    object detection model. This model requires text prompts that specifies the objects
    to be detected.
  prefs: []
  type: TYPE_NORMAL
- en: Another challenge that needs to be addressed is obtaining a high-level idea
    of the objects present in the image before utilizing the OWL-ViT model, as it
    requires a text prompt describing the objects. This is where VLMs come to the
    rescue! First, we pass the image to the VLM with a prompt to identify the high-level
    objects in the image. These detected objects are then used as text prompts, along
    with the image, for the OWL-ViT model to generate detections. Next, we plot the
    detections as bounding boxes on the same image and pass this updated image to
    the VLM, prompting it to generate a caption. The code for inference is partially
    adapted from [12].
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: 'I detect the objects present in each image using the VLM:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: The detected objects are now passed as text prompts to the OWL-ViT model to
    obtain the predictions for the images. I implement a helper function that predicts
    the bounding boxes for the images, and then plots the bounding box on the original
    image.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: 'The images with the detected objects plotted are now passed to the VLM for
    captioning:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: '![Outputs obtained from Object Detection Guided Prompting. Images in this picture
    are taken by Josh Frenette on [Unsplash](https://unsplash.com/photos/a-building-with-a-lot-of-plants-growing-on-the-side-of-it-E70gGcHNHj0?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
