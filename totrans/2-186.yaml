    by Alle Sravani'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Your very own SQL assistant built with Streamlit, SQLite, & CrewAI.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '[A Multi-Agent SQL Assistant You Can Trust with Human-in-Loop Checkpoint &
