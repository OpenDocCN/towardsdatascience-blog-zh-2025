    Ng'
- en: A complete guide to feature selection, threshold optimization, and neural network
    architecture for ML competitions.
  id: totrans-43
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 一个关于特征选择、阈值优化和神经网络架构的完整指南，适用于机器学习竞赛。
- en: '[I Won $10,000 in a Machine Learning Competition — Here’s My Complete Strategy](https://towardsdatascience.com/i-won-10000-in-a-machine-learning-competition-heres-my-complete-strategy/)'
  id: totrans-44
