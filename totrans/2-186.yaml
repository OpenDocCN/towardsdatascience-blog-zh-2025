  type: TYPE_NORMAL
  zh: '[模型上下文协议（MCP）教程：6步构建您的第一个MCP服务器](https://towardsdatascience.com/model-context-protocol-mcp-tutorial-build-your-first-mcp-server-in-6-steps/)'
