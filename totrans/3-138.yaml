- en: 'Japanese-Chinese Translation with GenAI: What Works and What Doesn’t'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用通用人工智能进行日中翻译：什么有效，什么无效
- en: 原文：[https://towardsdatascience.com/japanese-chinese-translation-with-genai-what-works-and-what-doesnt/](https://towardsdatascience.com/japanese-chinese-translation-with-genai-what-works-and-what-doesnt/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/japanese-chinese-translation-with-genai-what-works-and-what-doesnt/](https://towardsdatascience.com/japanese-chinese-translation-with-genai-what-works-and-what-doesnt/)
- en: <mdspan datatext="el1743103028441" class="mdspan-comment">Authors</mdspan>
  id: totrans-2
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1743103028441" class="mdspan-comment">作者</mdspan>
- en: '[**Alex (Qian) Wan**](https://www.linkedin.com/in/alex-q-wan/): Alex (Qian)
    is a designer specializing in AI for B2B products. She is currently working at
    Microsoft, focusing on machine learning and Copilot for data analysis. Previously,
    she was the Gen AI design lead at VMware.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '[**万倩**](https://www.linkedin.com/in/alex-q-wan/): 万倩是一位专注于B2B产品人工智能的设计师。她目前在大微软工作，专注于机器学习和Copilot进行数据分析。之前，她是VMware的通用人工智能设计主管。'
- en: '[**Eli Ruoyong Hong**](https://www.linkedin.com/in/eli-ruoyong-hong/) : Eli
    is a design lead at Robert Bosch specializing in AI and immersive technology,
    developing systems that bridge technical innovation with human social dynamics
    to create more culturally aware and socially responsive technologies.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: '[**洪睿永**](https://www.linkedin.com/in/eli-ruoyong-hong/) : 洪睿永是罗伯特·博世的设计主管，专注于人工智能和沉浸式技术，开发将技术创新与人类社会动态相结合的系统，以创造更具文化意识和社交响应性的技术。'
- en: Background
  id: totrans-5
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 背景
- en: 'Imagine you’re scrolling through social media and come across a post about
    a house makeover written in another language. Here’s a direct, word-for-word translation:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 想象你正在浏览社交媒体，并看到一篇关于房屋翻新的帖子，用另一种语言写成。以下是一个直接、逐字逐句的翻译：
- en: Finally, cleaned up this house completely and adjusted the design plan. Next,
    just waiting for the construction team to come in. Looking forward to the final
    result! Hope everything goes smoothly!
  id: totrans-7
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 最后，这所房子完全打扫干净了，设计计划也进行了调整。接下来，只等着施工队进来。期待最终结果！希望一切顺利！
- en: ''
  id: totrans-8
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![A cartoon-style image shown as a social media post. In the foreground, a
    person with long dark blue hair and round glasses gestures with both hands toward
    the background, as if introducing or presenting it. They wear a blue sweater and
    have a neutral expression. The background features a large structure under construction
    with wooden beams and tall windows showing a bright blue sky with white clouds.
    Wooden planks are scattered on the floor. Social media icons for like, comment,
    and share are visible below the image.](../Images/50e646803abda56023d2679a2829e0de.png)'
  id: totrans-9
  prefs:
  - PREF_BQ
  type: TYPE_IMG
  zh: '![一张以社交媒体帖子形式展示的卡通风格图像。前景中，一个长着深蓝色头发和圆框眼镜的人双手指向背景，仿佛在介绍或展示它。他们穿着蓝色毛衣，表情中性。背景是一个正在建造的大型结构，有木梁和高窗户，展示着晴朗的蓝天和白云。地板上散落着木板。图像下方可见点赞、评论和分享的社交媒体图标。](../Images/50e646803abda56023d2679a2829e0de.png)'
- en: ''
  id: totrans-10
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*Illustration by Qian (Alex) Wan.*'
  id: totrans-11
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*插图由万（Alex）倩绘制。*'
- en: 'If you were the English translator, how would you translate this? Gen AI responded
    with:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你是英语翻译，你会如何翻译这句话？通用人工智能回答道：
- en: I finally finished cleaning up this house and have adjusted the design plan.
    Now, I’m just waiting for the construction team to come in. I’m really looking
    forward to the final result and hope everything goes smoothly!
  id: totrans-13
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我终于打扫干净了这所房子，并调整了设计计划。现在，我正等着施工队进来。我非常期待最终结果，希望一切顺利！
- en: 'The translation seems to be clear and grammarly perfect. However, what if I
    told you this is a social post from a person who is notoriously known for exaggerating
    their wealth? They don’t own the house—they just left out the subject to make
    it seem like they do. Gen AI added “I” mistakenly without admitting the vagueness.
    A better translation would be:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 翻译看起来清晰且语法无误。然而，如果告诉你这实际上是一个以夸大其财富而臭名昭著的人的社交帖子呢？他们并不拥有那座房子——他们只是省略了这一点，让它看起来像他们拥有。通用人工智能错误地添加了“我”而没有承认其模糊性。更好的翻译应该是：
- en: The house has finally been cleaned up, and the design plan has been adjusted.
    Now, just waiting for the construction team to come in. Looking forward to seeing
    the final result—hope everything goes smoothly!
  id: totrans-15
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 房子终于打扫干净了，设计计划也已经调整。现在，只等着施工队进来。期待看到最终结果——希望一切顺利！
- en: The languages where the “unstated” context plays an important role in literature
    and daily life are called “high-context language“.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 在文学和日常生活中，“未言明”的语境起着重要作用的语言被称为“高语境语言”。
- en: Translating high-context languages such as Chinese and Japanese is uniquely
    challenging for many reasons. For instance, by omitting pronouns, and using metaphors
    that are highly associated with history or culture, translators are more dependent
    on context and are expected to have a deep knowledge of culture, history, and
    even differences among regions to ensure accuracy in translation.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 翻译高语境语言（如中文和日语）具有独特的挑战性，原因有很多。例如，通过省略代词，使用与历史或文化高度相关的隐喻，翻译者更加依赖于语境，并期望他们对文化、历史甚至地区差异有深入的了解，以确保翻译的准确性。
- en: This has been a long-time issue in traditional translation tools such as Google
    Translate and DeepL, but fortunately, we are in the era of Gen AI, the translation
    has significantly improved because of context-aware ability, and Gen AI is able
    to generate much more human-like content. Motivated by technological advancement,
    we decided to develop a Gen-AI powered translation browser extension for daily
    reading purpose.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 这一直是传统翻译工具（如Google Translate和DeepL）的一个长期问题，但幸运的是，我们现在处于Gen AI时代，由于语境感知能力，翻译质量得到了显著提升，Gen
    AI能够生成更多类似人类的内容。受到技术进步的启发，我们决定开发一个用于日常阅读的Gen-AI驱动的翻译浏览器扩展。
- en: Our extension uses Gen AI API. One of the challenges we encountered was choosing
    the AI model. Given the diverse options on the market, this has been a multi-month
    battle. We realized that there might be many people like us – not techy, with
    a lower budget, but interested in using Gen AI to bridge the language gap, so
    we tested 10 models with the hope of bringing insights to the audience.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的扩展使用Gen AI API。我们遇到的挑战之一是选择AI模型。鉴于市场上多样化的选择，这已经是一场持续数月的战斗。我们意识到，可能有许多人和我们一样——不是技术专家，预算较低，但对使用Gen
    AI弥合语言差距感兴趣，所以我们测试了10个模型，希望为观众带来洞见。
- en: This article documents our journey of testing different models for Chinese Japanese
    translation, evaluating the results based on specific criteria, and providing
    practical tips and tricks to resolve issues to increase translation quality.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 这篇文章记录了我们测试不同模型进行中文和日语翻译的历程，根据特定标准评估结果，并提供了一些实用的技巧和窍门来解决问题，以提高翻译质量。
- en: Who might be interested in this article?
  id: totrans-21
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 谁可能会对这篇文章感兴趣？
- en: 'Anyone who is working or interested in using multi-language generative AI for
    topics like us: maybe you are a team member working for an AI-model tech company
    and looking for potential improvements. This article will help you understand
    the key factors that uniquely and significantly impact the accuracy of Chinese
    and Japanese translations.'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 任何正在使用或对使用多语言生成AI（如我们这样的主题）感兴趣的人：也许你是为AI模型科技公司工作的团队成员，正在寻找潜在的改进。这篇文章将帮助你了解独特且显著影响中文和日语翻译准确性的关键因素。
- en: It may also inspire you if you’re developing a Gen AI agent dedicated to language
    translation. If you happen to be someone who is looking for a high-quality Gen
    AI model for your daily reading translation, this article will guide you to select
    AI models based on your needs. You’ll also find tips and tricks to write better
    prompts that can significantly improve translation output quality.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你正在开发一个专注于语言翻译的Gen AI代理，这也可能激发你的灵感。如果你恰好是在寻找一个适合日常阅读翻译的高质量Gen AI模型的人，这篇文章将指导你根据需求选择AI模型。你还将找到一些技巧和窍门来编写更好的提示，这可以显著提高翻译输出的质量。
- en: Heads up
  id: totrans-24
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 提醒
- en: This article is primarily based on our own experience. We focused on certain
    Gen AI as of Feb 2, 2025 (when Gemini 2.0 and DeepSeek were released), so you
    might find some of our observations are different from current performance as
    AI models keep evolving.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 这篇文章主要基于我们的自身经验。我们专注于截至2025年2月2日（当Gemini 2.0和DeepSeek发布时）的某些Gen AI，因此你可能会发现我们的观察结果与当前AI模型的性能有所不同，因为AI模型持续进化。
- en: We are non-experts, and we tried our best to show accurate info based on research
    and real testing. The work we did is purely for fun, self-learning and sharing,
    but we’re hoping to bring discussions to Gen AI’s cultural perspectives.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 我们是非专家，我们尽力根据研究和实际测试来展示准确的信息。我们所做的工作纯粹是为了娱乐、自学和分享，但我们希望将关于Gen AI的文化视角的讨论引向深入。
- en: Many examples in this article are generated with the help of Gen AI to avoid
    copyright concerns.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 文章中的许多例子都是在Gen AI的帮助下生成的，以避免版权问题。
- en: Our initial Gen AI model selection
  id: totrans-28
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 我们最初选择的Gen AI模型
- en: Our initial consideration was straightforward. Since our translation needs are
    related to Chinese, Japanese and English, the translation of the three languages
    was the priority. However, there were very few companies that detailed this ability
    specifically on their doc. The only thing we found is Gemini which specifies the
    performance of Multilingual.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 我们最初的考虑很简单。由于我们的翻译需求与中文、日语和英语相关，因此三种语言的翻译是首要任务。然而，很少有公司在他们的文档中具体说明了这种能力。我们发现唯一的是
    Gemini，它具体说明了多语言性能。
- en: '| **Capability** | Multilingual |'
  id: totrans-30
  prefs:
  - PREF_BQ
  type: TYPE_TB
  zh: '| **Capability** | Multilingual |'
- en: '| **Benchmark** | Global MMLU (Lite) |'
  id: totrans-31
  prefs:
  - PREF_BQ
  type: TYPE_TB
  zh: '| **Benchmark** | Global MMLU (Lite) |'
- en: '| **Description** | MMLU translated by human translators into 15 languages.
    The lite version includes 200 Culturally Sensitive and 200 Culturally Agnostic
    samples per language.  |'
  id: totrans-32
  prefs:
  - PREF_BQ
  type: TYPE_TB
  zh: '| **Description** | MMLU 由人类翻译成 15 种语言。轻量版包括每种语言 200 个文化敏感样本和 200 个文化无关样本。 
    |'
- en: '| **Gemini 1.5 Flash** | 73.7% |'
  id: totrans-33
  prefs:
  - PREF_BQ
  type: TYPE_TB
  zh: '| **Gemini 1.5 Flash** | 73.7% |'
- en: '| **Gemini 1.5 Pro** | 80.8% |'
  id: totrans-34
  prefs:
  - PREF_BQ
  type: TYPE_TB
  zh: '| **Gemini 1.5 Pro** | 80.8% |'
- en: ''
  id: totrans-35
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Kavukcuoglu, Koray. 2025\. “Gemini Model Updates.” Google DeepMind Blog, February.
    [https://blog.google/technology/google-deepmind/gemini-model-updates-february-2025/](https://blog.google/technology/google-deepmind/gemini-model-updates-february-2025/).
  id: totrans-36
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: Kavukcuoglu, Koray. 2025\. “Gemini Model Updates.” Google DeepMind Blog, February.
    [https://blog.google/technology/google-deepmind/gemini-model-updates-february-2025/](https://blog.google/technology/google-deepmind/gemini-model-updates-february-2025/).
- en: Second, but equally important, is the price. We were cautious about the budget
    and tried not to go bankrupt because of the usage-based pricing model. So Gemini
    1.5 Flash became our primary choice at that time. Other reasons we decided to
    proceed with this model are that it’s the most beginner-friendly option because
    of the well-documented instructions and it has a user-friendly testing environment–Gemini
    AI studio, which causes even less friction when deploying and scaling our project.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 其次，但同样重要的是价格。我们对预算持谨慎态度，并试图避免因基于使用量的定价模型而破产。因此，当时 Gemini 1.5 Flash 成为了我们的首选。我们决定继续使用此模型的其他原因包括，它是最适合初学者的选项，因为其有详细的说明文档，并且拥有用户友好的测试环境——Gemini
    AI studio，这在使用和扩展我们的项目时减少了摩擦。
- en: Backup models
  id: totrans-38
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: Backup models
- en: 'Now Gemini 1.5 Flash has set a strong foundation, during our first dry run,
    we found it has some limitations. To ensure a smooth translation and reading experience,
    we have evaluated a few other models as backups:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，Gemini 1.5 Flash 已经为我们打下了坚实的基础，在我们的第一次试运行中，我们发现它存在一些局限性。为了确保流畅的翻译和阅读体验，我们已经评估了几种其他模型作为备份：
- en: '**Grok-beta (xAI)**: In late 2024, Grok didn’t have as much fame as OpenA’s
    models, but what attracted us was zero content filters (This is one of the issues
    we observed from AI models during translation, which will be discussed later).
    Grok offered $20 free credits per month before 2025, which makes it an attractive,
    budget-friendly option for frugal users like us.'
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Grok-beta (xAI)**：到 2024 年底，Grok 的名气不如 OpenAI 的模型，但吸引我们的是零内容过滤器（这是我们观察到的
    AI 模型在翻译过程中遇到的问题之一，将在稍后讨论）。在 2025 年之前，Grok 每月提供 20 美元的免费信用额度，这使得它对我们这样的节俭用户来说是一个有吸引力的、预算友好的选择。'
- en: '**Deepseek-V3:** We integrated Deeseek right after its stride into market because
    it has richer Chinese training data than other alternatives (They collaborated
    with staff from Peking University for data labeling). Another reason is its jaw-dropping
    low price: With the discount, it was nearly 1/100 of Grok-beta. However, the high
    response time was a big issue.'
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Deepseek-V3**：我们在中国市场推出 Deepseek 后立即将其集成，因为它比其他替代方案拥有更丰富的中文训练数据（他们与北京大学的工作人员合作进行数据标注）。另一个原因是其令人难以置信的低价格：折扣后，其价格几乎仅为
    Grok-beta 的 1/100。然而，高响应时间是一个大问题。'
- en: '**OpenAI GPT-4o:** It has good documentation and strong performance, but we
    didn’t really consider this as an option because there is no free tier for low-budget
    constraints. We used it as a reference but did not actively use it. We will integrate
    it later just for testing purposes.'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**OpenAI GPT-4o**：它拥有良好的文档和强大的性能，但由于预算限制，我们没有将其视为一个选项，因为没有免费层。我们将其用作参考，但没有积极使用它。我们将在稍后仅为了测试目的将其集成。'
- en: 'We also explored a hybrid solution –  providers that offer multiple models:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还探索了一种混合解决方案——提供多种模型的供应商：
- en: '**Groq w/ Deepseek:** it is first an integrated model platform to deploy Deepseek.
    This version is distilled from Meta’s LLM, although it’s 72B makes it less powerful
    but with acceptable latency. They offered a free tier but with noticeable TPM
    constraints'
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Groq w/ Deepseek**：它首先是一个用于部署 Deepseek 的集成模型平台。这个版本是从 Meta 的 LLM 中提炼出来的，尽管它的
    72B 使其功能略弱，但延迟可接受。他们提供免费层，但存在明显的 TPM 约束。'
- en: '**Siliconflow:**  A platform with many Chinese model choices, and they offered
    free credits.'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Siliconflow：** 一个提供许多中文模型选择的平台，并且他们提供了免费积分。'
- en: Translation quality issues
  id: totrans-46
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 翻译质量问题
- en: When using those models for daily translation (mostly between languages Simplified
    Chinese, Japanese, and English). We found that there are many noticeable issues.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 当使用这些模型进行日常翻译（主要是简体中文、日语和英语之间的翻译）。我们发现存在许多明显的问题。
- en: 1\. Inconsistent translation of proper nouns/terminology
  id: totrans-48
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1. 专有名词/术语翻译不一致
- en: When a word or phrase has no official translation (or has different official
    translations), AI models like to produce inconsistent replies in the same document.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 当一个词或短语没有官方翻译（或有不同的官方翻译）时，AI模型喜欢在同一文档中产生不一致的回复。
- en: For example, the Japanese name “Asuka” has multiple potential translations in
    Chinese. Human translators usually choose one based on character setting (in some
    cases, there is a Japanese kanji reference for it, and the translator could simply
    use the Chinese version). For example, a female character could be translated
    into “明日香”, and a male character might be translated as “飞鸟” (more meaning-based)
    or “阿斯卡” (more phonetical-based). However, AI output sometimes switches between
    different versions of the same text.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，日本名字“Asuka”在中文中有多种可能的翻译。人工翻译者通常会根据角色设定选择一种（在某些情况下，有日本汉字的参考，翻译者可以直接使用中文版本）。例如，一个女性角色可以翻译成“明日香”，而一个男性角色可能翻译为“飞鸟”（更基于意义）或“阿斯卡”（更基于音译）。然而，AI的输出有时会在同一文本的不同版本之间切换。
- en: 'There are also many different official translations for the same noun in the
    Chinese-speaking regions. One example is the spell “Expecto Patronum” in Harry
    Potter. This has two accepted translations:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 在中文 speaking 地区，同一名词也有许多不同的官方翻译。一个例子是《哈利·波特》中的咒语“Expecto Patronum”。它有两个被接受的翻译：
- en: '![Simplified Chinese translation of the Harry Potter spell "Expecto Patronum"
    as “呼神护卫,” with the English interpretation “Let the Guardian Spirit Arise.” Noted
    as the version from People''s Literature Publishing House in mainland China.](../Images/2c7449fd66abe3d4b0386f95f2c93c88.png)'
  id: totrans-52
  prefs:
  - PREF_BQ
  type: TYPE_IMG
  zh: '![中国大陆人民文学出版社对《哈利·波特》咒语“Expecto Patronum”的简体中文翻译为“呼神护卫,” 英文解释为“Let the Guardian
    Spirit Arise.”，标记为来自中国大陆人民文学出版社的版本。](../Images/2c7449fd66abe3d4b0386f95f2c93c88.png)'
- en: ''
  id: totrans-53
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-54
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '* * *'
- en: ''
  id: totrans-55
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![Traditional Chinese translation of the Harry Potter spell "Expecto Patronum"
    as “疾疾，護法現身,” with the English interpretation “Hasten! Protector, Show Yourself.”
    Noted as the version from Crown Culture Corporation in Taiwan.](../Images/68e8a4ee0ac5d78fd9a2d3491f60c38b.png)'
  id: totrans-56
  prefs:
  - PREF_BQ
  type: TYPE_IMG
  zh: '![台湾皇冠文化公司对《哈利·波特》咒语“Expecto Patronum”的繁体中文翻译为“疾疾，護法現身,” 英文解释为“Hasten! Protector,
    Show Yourself.”，标记为来自台湾皇冠文化公司的版本。](../Images/68e8a4ee0ac5d78fd9a2d3491f60c38b.png)'
- en: Although I specify prompts to the AI ​​to translate to simplified Chinese, it
    sometimes goes back and forth between simplified and the traditional Chinese version.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管我指定AI将文本翻译成简体中文，但它有时会在简体和繁体中文之间来回切换。
- en: 2\. Overuse of pronouns
  id: totrans-58
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2. 代词使用过度
- en: One thing that Gen AI often struggles with when translating from lower context
    language to higher context language is adding additional pronouns.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 当从低语境语言翻译到高语境语言时，Gen AI经常遇到的一个问题是添加额外的代词。
- en: 'In Chinese or Japanese literature, there are a few ways when referring to a
    person. Like many other languages,  third-person pronouns like She/Her are commonly
    used. To avoid ambiguity or repetition, the 2 approaches below are also very common:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 在中文或日语文学中，在指代人时有一些方法。就像许多其他语言一样，第三人称代词如She/Her被广泛使用。为了避免歧义或重复，以下两种方法也非常常见：
- en: Use character names.
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用人物名称。
- en: Descriptive phrases (“the girl”, “the teacher”).
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 描述性短语（“the girl”，“the teacher”）。
- en: This writing preference is the reason that the pronoun use is much less frequent
    in Japanese and Chinese. In Chinese literature. The pronoun during translation
    to Chinese is only about 20-30%, and in Japanese, this number could go lower.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 这种写作偏好是日语和中文中代词使用频率较低的原因。在中国文学中，翻译成中文时，代词的使用仅占20-30%，而在日语中，这个数字可能更低。
- en: 'What I also want to emphasize is this: There is nothing right or wrong with
    how frequently, when, and where to add the additional pronoun (In fact, it’s a
    common practice for translators), but it has risks because it can make the translated
    sentence unnatural and not align with reader’s reading habit, or worse, misinterpret
    the intended meaning and cause mistranslation.'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 我还想强调的是：在何时、何地以及如何添加额外代词的频率上，并没有对错之分（实际上，这是翻译者的常见做法），但它存在风险，因为它可能会使翻译句子显得不自然，不符合读者的阅读习惯，或者更糟糕的是，误解了原本的意思并导致翻译错误。
- en: 'Below is a Japanese-to-English translation:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是一个从日语到英语的翻译：
- en: '**Original Japanese sentence (pronoun omitted)**'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: '**原始日语句子（省略了代词）**'
- en: Jack sees the CEO entering the building. With confidence, excitement, and strong
    hope in heart, go to conference room.
  id: totrans-67
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 杰克看到首席执行官进入大楼。带着自信、兴奋和内心强烈的希望，走向会议室。
- en: '**AI-generated translation (w/ incorrect pronoun)**'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: '**AI生成的翻译（带有错误的代词）**'
- en: Jack sees the CEO entering the building. With confidence, excitement, and strong
    hope in his heart, he goes to the conference room.
  id: totrans-69
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 杰克看到首席执行官进入大楼。带着自信、兴奋和内心强烈的希望，他走向会议室。
- en: In this case, the author intentionally avoids mentioning the pronoun, leaving
    room for interpretation. However, because the AI is trying to follow the grammar
    rules, it conflicts with the author’s design.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，作者故意避免提及代词，留下解释的空间。然而，由于AI试图遵循语法规则，这与其设计相冲突。
- en: '**Better translation that preserves the original intent**'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: '**更好的翻译，保留了原始意图**'
- en: Jack sees the CEO entering the building. With confidence, excitement, and strong
    hope in heart, heads to the conference room.
  id: totrans-72
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 杰克看到首席执行官进入大楼。带着自信、兴奋和内心强烈的希望，径直走向会议室。
- en: 3\. Incorrect pronoun usage in AI translation
  id: totrans-73
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3. AI翻译中代词使用错误
- en: The additional pronoun would potentially lead to a higher rate of incorrect
    pronouns caused by biased data; often, it’s gender-based errors. In the example
    above, the CEO is actually a woman, so this translation is incorrect. AI often
    defaults to male pronouns unless explicitly prompted
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 额外的代词可能会因为数据偏差而导致错误代词的使用率更高；通常，这些错误是基于性别的。在上面的例子中，首席执行官实际上是一位女性，所以这种翻译是不正确的。AI通常默认使用男性代词，除非明确提示。
- en: Jack sees the CEO entering the building. With confidence, excitement, and strong
    hope in his heart, ~~he~~ ***she*** goes to the conference room.
  id: totrans-75
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 杰克看到首席执行官进入大楼。带着自信、兴奋和内心强烈的希望，~~他~~ ***她*** 走向会议室。
- en: Another common issue is AI overuses “I” in translations. For some reason, this
    issue persists across almost all models like GPT-4o, Gemini 1.5, Gemini 2.0, and
    Grok. GenAI models default to first-person pronouns when the subject is unclear.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个常见问题是AI在翻译中过度使用“我”。由于某种原因，这个问题几乎存在于所有模型中，如GPT-4o、Gemini 1.5、Gemini 2.0和Grok。当主题不明确时，GenAI模型默认使用第一人称代词。
- en: 4\. Mix Kanji, Simplified Chinese, Traditional Chinese
  id: totrans-77
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4. 混合使用汉字、简体中文和繁体中文
- en: Another issue we encountered was AI models mixing Simplified Chinese, Traditional
    Chinese, and Kanji in the output. Because of historical and linguistic reasons,
    many modern Kanji characters are visually similar to Chinese but have regional
    or semantic differences.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 我们遇到的另一个问题是AI模型在输出中混合了简体中文、繁体中文和汉字。由于历史和语言原因，许多现代汉字在视觉上与中文相似，但具有地区或语义上的差异。
- en: 'While some mix-use is incorrect but might be acceptable, for example:'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然某些混合使用可能不正确但可能被接受，例如：
- en: '![The character meaning "correct" or "to face" is shown in three scripts: Simplified
    Chinese (对), Traditional Chinese (對), and Japanese Kanji (対). The image highlights
    visual differences and similarities across the writing systems used in Chinese
    and Japanese.](../Images/465bfcbb971b21a3200d16c82058fbb3.png)'
  id: totrans-80
  prefs:
  - PREF_BQ
  type: TYPE_IMG
  zh: '![表示“正确”或“面对”的字符以三种书写系统展示：简体中文（对），繁体中文（對），和日语汉字（対）。图像突出了中文和日语书写系统中的视觉差异和相似性。](../Images/465bfcbb971b21a3200d16c82058fbb3.png)'
- en: Those three characters also look visually similar, and they share certain meanings,
    so it could be acceptable in some casual scenarios, but not for formal or professional
    communication.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 这三个字符在视觉上也相似，并且它们共享某些含义，所以在某些非正式场合可能是可以接受的，但不适用于正式或专业沟通。
- en: 'However, other cases can lead to serious translation issues. Below is an example:'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，其他情况可能会导致严重的翻译问题。下面是一个例子：
- en: '![The characters "手纸" or "手紙" are shown in three forms: Simplified Chinese,
    Traditional Chinese, and Japanese Kanji. In Simplified and Traditional Chinese,
    "手纸/手紙" means “toilet paper,” while in Japanese Kanji, "手紙" means “letter.” The
    image highlights how identical or similar-looking characters can have different
    meanings across languages.](../Images/c4f5ddea2aaefd643f78e13f143dea83.png)'
  id: totrans-83
  prefs:
  - PREF_BQ
  type: TYPE_IMG
  zh: '![“手纸”或“手紙”这三个字以三种形式呈现：简体中文、繁体中文和日语假名。在简体和繁体中文中，“手纸/手紙”意为“卫生纸”，而在日语假名中，“手紙”意为“信”。该图像突出了看似相同或相似的字符在不同语言中可以有不同的含义。](../Images/c4f5ddea2aaefd643f78e13f143dea83.png)'
- en: If AI directly uses this word when converting Japanese to Chinese (in a modern
    scenario), the sentence “Jane received a letter from her distant family” could
    end up with “Jane received a toilet paper from her distant family,” which is both
    incorrect and unintentionally funny.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 如果AI在将日语直接转换为中文（在现代场景中）时使用这个词，句子“Jane收到了她远亲的信”可能会变成“Jane收到了她远亲的卫生纸”，这既不正确，又带有无意中的幽默感。
- en: Please note that the browser-rendered text can also have issues because of the
    lack of characters in the system font library.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 请注意，由于系统字体库中缺少字符，浏览器渲染的文本也可能存在问题。
- en: 5\. Punctuation
  id: totrans-86
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 5. 标点符号
- en: 'Gen AI sometimes doesn’t do a great job of distinguishing punctuation differences
    between Chinese, Kanji and English. Below is one of the examples to show how different
    languages use distinct ways to write conversation (in modern common writing style):'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 通用人工智能有时在区分中文、假名和英语的标点符号方面做得不够好。以下是一个示例，展示了不同语言如何使用不同的方式书写对话（在现代常见写作风格中）：
- en: '![Text example showing English punctuation. The sentence reads: I said, “Hello.”
    A comma appears before the opening quotation mark, and the period is inside the
    closing quotation mark. Highlighted are the comma, quotation marks, and period
    placement.](../Images/9b26b5d08135483531aedc19adeb3f71.png)![Text example showing
    Chinese punctuation. The sentence reads: 我说：“你好。” (meaning "I said: ''Hello.''").
    A full-width colon appears after the verb, followed by Chinese-style quotation
    marks. The period is placed before the closing quotation mark. Key punctuation
    is highlighted.](../Images/0422cf830edd9537ca4191d3bc26f393.png)![Text example
    showing Japanese punctuation. The sentence reads: 私は言った。「こんにちは。」 (meaning "I said:
    ''Hello.''"). Japanese-style corner brackets enclose the quote, and the sentence
    ends with a Japanese period inside the closing bracket. Punctuation marks are
    highlighted.](../Images/0b95c13ba05cf2058fb86dfaf7ea8cd4.png)'
  id: totrans-88
  prefs:
  - PREF_BQ
  type: TYPE_IMG
  zh: '![展示英语标点的文本示例。句子为：“我说，‘Hello。’在引号开头的逗号之前，句号在引号内部。”突出显示了逗号、引号和句号的位置。](../Images/9b26b5d08135483531aedc19adeb3f71.png)![展示中文标点的文本示例。句子为：“我说：‘你好。’（意为‘我说：''Hello.''''）。动词之后出现全角冒号，后跟中文风格的引号。句号放在引号关闭之前。”突出显示了关键标点符号。](../Images/0422cf830edd9537ca4191d3bc26f393.png)![展示日语标点的文本示例。句子为：“私は言った。「こんにちは。」”（意为“我说：''Hello.''”）。日式角括号包围引号，句子以括号内的日语句号结束。突出显示了标点符号。](../Images/0b95c13ba05cf2058fb86dfaf7ea8cd4.png)'
- en: This might seem minor but could impact professionalism.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 这可能看似微不足道，但可能会影响专业性。
- en: 6\. False content filtering triggers
  id: totrans-90
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 6. 假内容过滤触发
- en: 'We also found that Gen AI content filter might be more sensitive to Japanese
    and Chinese (This happened when using Gemini 1.5 Flash). Even when the content
    was completely harmless. For example:'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还发现，通用人工智能内容过滤器可能对日语和中文（在使用Gemini 1.5 Flash时）更为敏感。即使内容完全无害。例如：
- en: 人並みにはできますよ！
  id: totrans-92
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 人並みにはできますよ！
- en: ''
  id: totrans-93
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I can do it at an average level!
  id: totrans-94
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我可以做到平均水平！
- en: Roughly speaking, there were about 2 out of 26 samples that triggered false
    content filters. This issue showed up randomly.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 大概来说，大约有26个样本中的2个触发了假内容过滤器。这个问题是随机出现的。
- en: Evaluating Gen AI models
  id: totrans-96
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 评估通用人工智能模型
- en: Completely out of curiosity and to better understand the Chinese/Japanese translation
    ability of different Gen AI models, we conducted structured testing on 10 models
    from 7 providers.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 完全出于好奇心，为了更好地了解不同通用人工智能模型的中文/日语翻译能力，我们对7个提供商的10个模型进行了结构化测试。
- en: Testing setup
  id: totrans-98
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 测试设置
- en: 'Task: Each AI model was used to translate an article written in Japanese into
    simplified Chinese through our translation extension. The Gen AI models were connected
    through API.'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 任务：使用每个AI模型将用日语写的文章通过我们的翻译扩展翻译成简体中文。通用人工智能模型通过API连接。
- en: 'Sample: We selected a 30-paragraph third-person article. Each paragraph is
    a sample of which the character varies from 4 to 120.'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 样本：我们选择了一篇30段落的第三人称文章。每个段落的字符数从4到120不等。
- en: 'Processed result: each model was tested three times, and we used the median
    result for analysis.'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 处理结果：每个模型测试了三次，我们使用了中位数结果进行分析。
- en: Evaluation metrics
  id: totrans-102
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 评估指标
- en: We fully respect that the quality of translation is subjective, so we picked
    three metrics that are quantifiable and represent the challenges of high-context
    language translation.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 我们充分尊重翻译质量的主观性，因此我们选择了三个可量化且代表高语境语言翻译挑战的指标。
- en: Pronoun error rate
  id: totrans-104
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 代词错误率
- en: 'This metric represents the frequency of erroneous pronouns that appeared in
    the translated sample, which includes the following cases:'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 此指标表示翻译样本中错误代词出现的频率，包括以下情况：
- en: Gender pronoun incorrectness  (e.g., using “he” instead of “she”).
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 性别代词错误（例如，用“他”代替“她”）。
- en: Mistakenly switch from third-person pronoun to another perspective
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 错误地从第三人称代词切换到其他视角
- en: A paragraph was marked as affected (+1) if any incorrect pronoun was detected.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 如果检测到任何不正确的代词，则将段落标记为受影响（+1）。
- en: Non-Chinese return rate
  id: totrans-109
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 非中文返回率
- en: 'Some models randomly output Kanji, Hiragana, or Katakana in their responses.
    We were to count the samples that contained any of those, but every paragraph
    contained at least one non-Chinese character, so we adjusted our evaluation to
    make it more meaningful:'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 一些模型在响应中随机输出假名、平假名或片假名。我们原本要计算包含这些字符的样本，但每个段落至少包含一个非中文字符，因此我们调整了评估，使其更有意义：
- en: 'If the returned translation contains Hiragana, Katakana, or Kanji that affect
    readability, it will be counted as a translation error. For example: If the AI
    output 対 instead of 对, it won’t be flagged, since both are visually similar and
    do not affect meaning.'
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果返回的翻译包含平假名、片假名或假名，且影响可读性，则会被计为翻译错误。例如：如果AI输出“對”而不是“对”，则不会标记，因为两者视觉上相似且不影响意义。
- en: Our translation extension has a built-in non-Chinese characters function. If
    detected, the system retranslates the text up to three times. If the non-Chinese
    remains, it will display an error message.
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们的翻译扩展内置了非中文字符功能。如果检测到，系统将重新翻译文本最多三次。如果非中文仍然存在，将显示错误信息。
- en: Pronoun Addition Rate
  id: totrans-113
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 代词添加率
- en: If the translated sample contains any pronoun that doesn’t exist in the original
    paragraph, it will be flagged.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 如果翻译样本中包含原文段落中不存在的任何代词，则会被标记。
- en: Scoring formula
  id: totrans-115
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 评分公式
- en: All three metrics were calculated using the following formula. 𝑁 represents
    the number of affected paragraphs (samples). Please note, if a paragraph (sample)
    contains multiple same-type errors, it will be counted 1 time.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 所有三个指标都使用以下公式进行计算。N代表受影响的段落（样本）数量。请注意，如果段落（样本）包含多种相同类型的错误，则只计一次。
- en: Rate=N/30*100%
  id: totrans-117
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 率=N/30*100%
- en: '**Quality score:** to have a better sense of overall quality. We also calculated
    the quality score by weighting the three metrics based on their impact on translation:
    Pronoun Error Rate > Non-CN Return Rate > Pronoun Addition Rate.'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: '**质量得分**：为了更好地理解整体质量。我们还根据其对翻译的影响对三个指标进行了加权计算：代词错误率 > 非中文返回率 > 代词添加率。'
- en: 'Model comparison 1: base'
  id: totrans-119
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 模型比较1：基础
- en: In the first run, we only provided a foundational prompt by specifying persona
    and translation tasks without adding any specific translation guidelines. The
    goal was to evaluate AI translation baseline performance.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 在第一次运行中，我们仅通过指定角色和翻译任务来提供基础提示，而没有添加任何特定的翻译指南。目标是评估AI翻译的基线性能。
- en: '![Table showing AI translation results for different models in the first run
    using a basic prompt. Columns include Rank, Quality Score (1–10), Pronoun Error
    Rate, non-CN Return Rate, and Pronoun Addition Rate. Claude-3.5 Sonnet ranked
    highest with a quality score of 7.94 and the lowest pronoun error rate (25%).
    The lowest-ranked model, deepseek-r1-distill-llama-70b, had a quality score of
    6.11 and the highest pronoun addition rate (76.92%).](../Images/3a268c4923e4634c325ba283c5374350.png)'
  id: totrans-121
  prefs: []
  type: TYPE_IMG
  zh: '![展示第一次使用基本提示符运行不同模型的AI翻译结果的表格。列包括排名、质量得分（1–10）、代词错误率、非中文返回率和代词添加率。Claude-3.5
    Sonnet以7.94的质量得分和最低的代词错误率（25%）排名第一。排名最低的模型deepseek-r1-distill-llama-70b，质量得分为6.11，代词添加率最高（76.92%）。](../Images/3a268c4923e4634c325ba283c5374350.png)'
- en: Observation
  id: totrans-122
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 观察
- en: Generally speaking, the overall translation quality is not sufficient enough
    to bring the audience an “optimal reading experience”.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 一般而言，整体翻译质量不足以给观众带来“最佳阅读体验”。
- en: '**For error return rate,** even the highest-rated model, Claude 3.5 Sonnet,
    still got a 30% error rate. This means obvious translation deficiencies could
    be easily observed roughly 1 in every 4 sentences. Interestingly, we found that
    the incorrectly added pronouns were always first-person “I”. It might be because
    the distance between the word “I” is closer to the verb vectors than other pronouns
    in vector space.'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: '**对于错误返回率**，即使是评分最高的模型，Claude 3.5 Sonnet，仍然有30%的错误率。这意味着明显的翻译缺陷大约每4句话就能观察到一次。有趣的是，我们发现错误添加的代词总是第一人称“我”。这可能是因为在向量空间中，“我”这个词与动词向量的距离比其他代词更近。'
- en: '**Pronoun Addition Rates** exceeded 50% in most models. This frequency is much
    more aligned with English writing habits than with Chinese (20–30%) or Japanese
    (even lower). This might stem from the AI model training data.  According to OpenAI’s
    dataset statistics, GPT-3’s training data consists of 92.65% English, 0.11% Japanese,
    0.1% Simplified Chinese, and 0.02% Traditional Chinese. The differences show training
    data focuses on English and revealed the potential reason for translating struggles,
    including the issue of mixing simplified Chinese and traditional Chinese in output,
    which was also observed in testing.'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: '**代词添加率**在大多数模型中超过了50%。这个频率与英语写作习惯比中文（20-30%）或日语（更低）更吻合。这可能源于AI模型的训练数据。根据OpenAI的数据集统计，GPT-3的训练数据由92.65%的英语、0.11%的日语、0.1%的简体中文和0.02%的繁体中文组成。这些差异表明训练数据集中在英语上，并揭示了翻译困难潜在的原因，包括输出中简体中文和繁体中文混合的问题，这在测试中也得到了观察。'
- en: '| **Language** | **Number of words** | **% of total words** |'
  id: totrans-126
  prefs:
  - PREF_BQ
  type: TYPE_TB
  zh: '| **语言** | **单词数量** | **总单词百分比** |'
- en: '| English | 181014683608 | 92.64708% |'
  id: totrans-127
  prefs:
  - PREF_BQ
  type: TYPE_TB
  zh: '| 英语 | 181014683608 | 92.64708% |'
- en: '| Japanese | 217047918 | 0.11109% |'
  id: totrans-128
  prefs:
  - PREF_BQ
  type: TYPE_TB
  zh: '| 日语 | 217047918 | 0.11109% |'
- en: '| Simplified Chinese | 193517396 | 0.09905% |'
  id: totrans-129
  prefs:
  - PREF_BQ
  type: TYPE_TB
  zh: '| 简体中文 | 193517396 | 0.09905% |'
- en: '| Traditional Chinese | 38583893 | 0.01975% |'
  id: totrans-130
  prefs:
  - PREF_BQ
  type: TYPE_TB
  zh: '| 繁体中文 | 38583893 | 0.01975% |'
- en: ''
  id: totrans-131
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: (OpenAI, “Languages by Word Count in GPT-3 Dataset,” last modified 2020, [https://github.com/openai/gpt-3/blob/master/dataset_statistics/languages_by_word_count.csv](https://github.com/openai/gpt-3/blob/master/dataset_statistics/languages_by_word_count.csv)).
  id: totrans-132
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: (OpenAI, “GPT-3数据集中按单词计数的语言，”最后修改于2020年，[https://github.com/openai/gpt-3/blob/master/dataset_statistics/languages_by_word_count.csv](https://github.com/openai/gpt-3/blob/master/dataset_statistics/languages_by_word_count.csv))。
- en: Bandit solution
  id: totrans-133
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: Bandit solution
- en: We did a few not-so-fancy solutions in order to have a consistent good translation.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 我们进行了一些不太花哨的解决方案，以确保翻译的一致性和良好性。
- en: Re-translation with different models
  id: totrans-135
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用不同模型的重翻译
- en: If conditions allow (budget and technical feasibility), you could use the backup
    models to re-translate cases that the primary model cannot translate. This applies
    to untranslated Japanese text (non-Chinese returns). We primarily used Grok-beta
    till mid-Jan 2025.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 如果条件允许（预算和技术可行性），可以使用备用模型重新翻译主模型无法翻译的案例。这适用于未翻译的日语文本（非中文返回）。我们主要使用Grok-beta直到2025年1月中旬。
- en: 'Translation guidance: pronoun'
  id: totrans-137
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 翻译指导：代词
- en: 'To prevent the AI ​​from inserting subjects unnecessarily, we specifically
    instruct AI to ignore grammar rules. Here are the hints we use:'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 为了防止AI不必要地插入主题，我们特别指示AI忽略语法规则。以下是我们的提示：
- en: '**Pronoun Handling Requirements:**'
  id: totrans-139
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**代词处理要求：**'
- en: ''
  id: totrans-140
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* **Pronoun Consistency** Follow the original text strictly.'
  id: totrans-141
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '* **代词一致性** 严格遵循原文。'
- en: ''
  id: totrans-142
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* **Pronoun handling** Do not add subjects unless explicitly mentioned in the
    original text, even if it results in grammatical errors.'
  id: totrans-143
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '* **代词处理** 除非原文中明确提及，否则不要添加主题，即使这会导致语法错误。'
- en: In the meantime, providing examples is pretty useful for AI to understand your
    requirements.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 同时，提供示例对于AI理解你的要求非常有用。
- en: '**Pronoun Handling**'
  id: totrans-145
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**代词处理**'
- en: ''
  id: totrans-146
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* **Original Japanese sentence (subject omitted): ジャックは最高経営責任者が建物に入るのを見た。自信と興奮、そして強い希望を胸に、会議室へ向かった'
  id: totrans-147
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '* **原始日语句子（省略了主题）：ジャックは最高経営責任者が建物に入るのを見た。自信と興奮、そして強い希望を胸に、会議室へ向かった'
- en: ''
  id: totrans-148
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* **Incorrect AI-generated translation (unnecessary subject added): Jack sees
    the CEO entering the building. With confidence, excitement, and strong hope in
    his heart, he goes to the conference room'
  id: totrans-149
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '* **错误的AI生成翻译（添加了不必要的主题）：杰克看到CEO进入大楼。带着自信、兴奋和强烈希望的心情，他走向会议室'
- en: ''
  id: totrans-150
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* **Good example (grammatically correct without pronoun): Jack sees the CEO
    entering the building. With confidence, excitement, and strong hope in heart,
    heads to the conference room.'
  id: totrans-151
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '* **好的例子（语法正确，没有代词）：杰克看到CEO进入大楼。带着自信、兴奋和强烈希望的心情，走向会议室。'
- en: ''
  id: totrans-152
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* **Acceptable example (omitted subject but grammatically incorrect): “Jack
    sees the CEO entering the building. With confidence, excitement, and strong hope
    in heart, go to conference room.”'
  id: totrans-153
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '* **可接受的例子（省略主语但语法错误）：“杰克看到CEO进入大楼。带着自信、兴奋和强烈的心愿，前往会议室。”'
- en: 'Translation guidance: glossary'
  id: totrans-154
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 翻译指导：词汇表
- en: I also wrote a glossary list like below. This significantly reduces the appearance
    of erroneous pronouns and standardizes the terminology translation.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 我还编写了一个如下所示的词汇表清单。这显著减少了错误代词的出现并标准化了术语翻译。
- en: '| Japanese | English | Chinese | Notes |'
  id: totrans-156
  prefs:
  - PREF_BQ
  type: TYPE_TB
  zh: '| 日本语 | 英语 | 中文 | 备注 |'
- en: ''
  id: totrans-157
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '| シカゴ | Chicago | 芝加哥 | Official location name |'
  id: totrans-158
  prefs:
  - PREF_BQ
  type: TYPE_TB
  zh: '| シカゴ | Chicago | 芝加哥 | 官方地点名称 |'
- en: ''
  id: totrans-159
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '| 俺 | I | 我 | First-person pronoun, informal, bold, and rough in tone, mostly
    used by males | | アスカ | Asuka | 飞鸟 | A young male character name  | *…*'
  id: totrans-160
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '| 俺 | I | 我 | 第一人称代词，非正式，粗鲁的语气，主要用于男性 | | アスカ | Asuka | 飞鸟 | 一个年轻男性角色名称  |
    *…*'
- en: Adjusting Model Parameters
  id: totrans-161
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 调整模型参数
- en: Generally speaking, lowering the parameters helps avoid randomness. As someone
    who likes writing prompts, AI following the prompt more strictly is much more
    of a priority than being creative in output. So, we lowered top-p, top-k and temperature.
    Deepseek AI officially recommends a temperature of 1.3 for translation, but for
    better prompt adherence, we adjusted it to 1.0 or lower. TopK was reduced by 20\.
    This works pretty well. Gemini 1.5 flash was used to randomly output a full paragraph
    content that didn’t exist in the original article. This issue never shows again
    after adjusting the parameters.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 一般而言，降低参数有助于避免随机性。作为一个喜欢编写提示的人，AI更严格地遵循提示比在输出中具有创造性更重要。因此，我们降低了top-p、top-k和温度。Deepseek
    AI官方推荐翻译的温度为1.3，但为了更好地遵循提示，我们将它调整为1.0或更低。TopK减少了20%。这效果相当不错。Gemini 1.5 flash用于随机输出一个原文中不存在的完整段落内容。调整参数后，这个问题再也没有出现。
- en: This method reduces variability but is not scalable, because each model responds
    differently depending on their size, advancement, etc.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法减少了变异性，但不可扩展，因为每个模型根据其大小、进展等因素会有不同的反应。
- en: 'Model comparison 2: With translation guidance'
  id: totrans-164
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 模型比较2：有翻译指导
- en: For the second round of the test, we apply the translation guidance as a comparison.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 在测试的第二轮中，我们将翻译指导作为比较。
- en: Observation
  id: totrans-166
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 观察
- en: After applying translation guidance, the overall translation quality of all
    models improved significantly. Below is a detailed comparison of the performance
    of different AI models under these improved conditions.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 在应用翻译指导后，所有模型的总体翻译质量显著提高。以下是不同AI模型在这些改进条件下的性能详细比较。
- en: '![Table displaying updated AI translation results for different models with
    performance improvement. Columns include Rank, Quality Score (1–10) with score
    changes in green, Pronoun Error Rate, non-CN Return Rate, and Pronoun Addition
    Rate. Claude-3.5 Sonnet ranks first with a quality score of 9.68 (+1.74) and 0%
    pronoun errors. Most models show significant quality gains compared to the previous
    run, with lower pronoun error and addition rates.](../Images/84746b642fb1132687651f2b6a694d8f.png)'
  id: totrans-168
  prefs: []
  type: TYPE_IMG
  zh: '![显示不同模型更新后的AI翻译结果和性能改进的表格。列包括排名、质量得分（1–10）以及绿色中的得分变化、代词错误率、非CN返回率和代词添加率。Claude-3.5
    Sonnet排名第一，质量得分为9.68（+1.74）且代词错误率为0%。与上一次运行相比，大多数模型的质量都有显著提升，代词错误率和添加率都降低了。](../Images/84746b642fb1132687651f2b6a694d8f.png)'
- en: You can easily tell that with translation guidance the translation quality has
    been significantly improved.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以轻松地看出，在翻译指导下，翻译质量得到了显著提高。
- en: 'For the primary metric **Pronoun Error Rate**: Claude-3.5 Sonnet, OpenAI GPT-4o,
    DeepSeek V3, as the front runner, showed strong accuracy. Gemini 2.0 Flash and
    Moonshot-V1 (Kimi) had minor issues but were sufficient for most non-professional
    Japanese-to-Chinese translation needs.'
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 对于主要指标**代词错误率**：Claude-3.5 Sonnet、OpenAI GPT-4o、DeepSeek V3作为领跑者，表现出强大的准确性。Gemini
    2.0 Flash和Moonshot-V1（Kimi）存在一些小问题，但对于大多数非专业日语-中文翻译需求来说是足够的。
- en: Based on the result of the Pronoun Addition Rate. Claude-3.5 Sonnet strictly
    followed translation guidance and executed accurately with only an 8% Pronoun
    Addition Rate. Gemini 2.0 Flash had a 20% pronoun addition rate. It’s an acceptable
    result as it’s aligned with Chinese writing habits.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 根据代词添加率的检测结果。Claude-3.5 Sonnet严格遵循翻译指导并准确执行，仅代词添加率为8%。Gemini 2.0 Flash的代词添加率为20%。这是一个可接受的结果，因为它符合中文写作习惯。
- en: Choosing the right AI models for English-Chinese-Japanese translation
  id: totrans-172
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 选择合适的AI模型进行英语-中文-日语翻译
- en: The best model selection depends on personal needs, considering factors such
    as budget, request per minute (RPM) limits, and ecosystem compatibility. Choosing
    an AI model for English-Chinese-Japanese translation.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 最佳模型选择取决于个人需求，考虑因素包括预算、每分钟请求量（RPM）限制以及生态系统兼容性。选择用于英语-中文-日语翻译的AI模型。
- en: '![Comparison table of AI models showing quality scores, pricing, free tier
    availability, input/output pricing per million tokens, and rate/tokens per minute.
    Claude-3.5 Sonnet has the highest quality score (9.68) with premium pricing and
    no free tier. Gemini-2.0-flash and gemini-1.5-flash offer the lowest input/output
    costs and generous free tier limits. DeepSeek models have the lowest paid tier
    costs. The table includes RPM (requests per minute) and TPM (tokens per minute)
    for both free and paid tiers, with some models showing unlimited or undefined
    constraints.](../Images/25659ed282fb699017493ce57db90e50.png)'
  id: totrans-174
  prefs: []
  type: TYPE_IMG
  zh: '![展示AI模型质量评分、定价、免费层可用性、每百万个标记的输入/输出定价以及每分钟速率/标记数的比较表格。Claude-3.5 Sonnet具有最高的质量评分（9.68），定价为高级，没有免费层。Gemini-2.0-flash和gemini-1.5-flash提供最低的输入/输出成本和慷慨的免费层限制。表格包括免费和付费层的RPM（每分钟请求量）和TPM（每分钟标记数），一些模型显示为无限或未定义的限制。](../Images/25659ed282fb699017493ce57db90e50.png)'
- en: '**For those** **without budget constraints**, Claude-3.5 Sonnet and OpenAI
    GPT-4o are the strongest choices because of their overall strong performance.'
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: '**对于那些** **没有预算限制** **的人来说**，Claude-3.5 Sonnet和OpenAI GPT-4o是最佳选择，因为它们整体性能强大。'
- en: '**For entry-level developers in North America**, Gemini 2.0 Flash is an excellent
    choice because of its affordable price, and good response time. Another reason
    we chose it as the primary provider is because Google’s cloud service ecosystem
    (OCR, cloud storage, etc.) makes it easier to scale development projects.'
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: '**对于北美入门级开发者**来说，Gemini 2.0 Flash因其价格合理、响应时间良好而是一个优秀选择。我们选择它作为主要提供商的另一个原因是谷歌的云服务生态系统（OCR、云存储等）使得扩展开发项目更加容易。'
- en: '**For Gen AI power users** looking to balance price and quality, DeepSeek offers
    low prices, unlimited RPMs, and open-source flexibility. This is a strong choice
    for cost-sensitive users who don’t want to compromise translation quality. However,
    when using the official API platform in North America, we experienced long response
    time, which can be a limitation if you have a need for real-time or long-context
    translations. Fortunately, there are many services integrated DeepSeek on other
    servers (such as Microsoft Azure, Groq, and Siliconflow, or even you could deploy
    into your own local servers), or using it within China can avoid these issues.
    Additionally, model size can significantly affect translation performance – if
    you could, use the full-power 671B version for best results.'
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: '**对于寻求平衡价格和质量**的通用人工智能高级用户来说，DeepSeek提供低价、无限RPM和开源灵活性。这对于不想在翻译质量上妥协的成本敏感型用户来说是一个强有力的选择。然而，当在北美使用官方API平台时，我们遇到了较长的响应时间，这可能是在需要实时或长上下文翻译时的一个限制。幸运的是，许多服务在其他服务器（如Microsoft
    Azure、Groq和Siliconflow，或者甚至可以部署到您自己的本地服务器）上集成了DeepSeek，或者在中国使用它可以避免这些问题。此外，模型大小可以显著影响翻译性能——如果您能使用671B的全功能版本，将获得最佳效果。'
- en: Limitations and considerations
  id: totrans-178
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 局限性和考虑因素
- en: We understand that those tests are not perfect. Even if we tried to ensure a
    diverse and right data volume, there is much room for improvement. For example,
    our sample size is not large enough for statistical significance. AI model performance
    fluctuates at any moment, issues like terminology translation inconsistency weren’t
    captured but might be important indicators for some audiences, and the translation
    quality wasn’t able to be reflected quantitatively. We provided the test just
    for learning and hopefully, serve as reference points for you.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 我们明白这些测试并不完美。即使我们试图确保数据多样化和正确的数据量，仍有很大的改进空间。例如，我们的样本量不足以达到统计显著性。AI模型性能在任何时刻都可能波动，术语翻译不一致等问题没有被捕捉到，但对于某些受众来说可能很重要，翻译质量也无法定量反映。我们提供这些测试只是为了学习和希望它们能作为您的参考点。
- en: Future of Gen AI translation
  id: totrans-180
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 通用人工智能翻译的未来
- en: We are really grateful for the advances in generative AI, which have helped
    bridge the gap of language and make knowledge more accessible for people speaking
    different languages and from different cultures.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 我们非常感谢生成式人工智能的进步，它有助于弥合语言鸿沟，使来自不同语言和文化背景的人们更容易获取知识。
- en: However, we can still see many challenges remain to be overcome—especially for
    non-English languages.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我们仍然可以看到许多挑战需要克服——尤其是对于非英语语言。
- en: There is an opinion that translation doesn’t need advanced AI models, but“good
    enough” is not enough. I can see that this view might be correct from a cost perspective
    and makes sense from an English-centric perspective. However, if the standard
    “good” is based on official performance reports from AI providers, it might accurately
    reflect the performance of non-English translation. As you can clearly see, high-context
    languages ​​such as Japanese and Chinese translation still struggle with accuracy
    and fluency. There is still a road ahead to improve AI translation quality, better
    contextual understanding and cultural awareness are necessary.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 有一种观点认为翻译不需要高级的AI模型，但“足够好”还不够。从成本角度来看，这种观点可能是正确的，并且从以英语为中心的角度来看也很有道理。然而，如果“足够好”的标准是基于AI提供商的官方性能报告，那么它可能准确地反映了非英语翻译的性能。正如你可以清楚地看到，像日语和中文这样的高语境语言翻译在准确性和流畅性上仍然存在挑战。提高AI翻译质量、更好的上下文理解和文化意识还有很长的路要走。
- en: '**Cost**'
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: '**成本**'
- en: Deepseek has brought more competition to the AI ​​translation market. Pricing
    is still a key factor for people and sometimes has more weight than performance.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: Deepseek为AI翻译市场带来了更多的竞争。定价仍然是人们关注的重点，有时甚至比性能更重要。
- en: If you have mid to high-volume daily translation needs (academic reading, news,
    video caption, etc.), using a premium model can cost anywhere from $20 to $80
    per month. For businesses dealing with localization and internationalization,
    these costs would increase quickly.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你每天有中等或高量的翻译需求（学术阅读、新闻、视频字幕等），使用高级模型每月的费用可能在20到80美元之间。对于处理本地化和国际化的企业，这些成本会迅速增加。
- en: '**No way around it: prompting for better translation**'
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: '**没有其他途径：提示以获得更好的翻译**'
- en: Another major challenge is AI models still require users to write long, complex
    prompts to achieve basic readability. For example, when translating professional
    topics in certain niche domains, I have no choice but to write prompts of over
    5000 characters in English (almost writing an entire document) just to guide the
    AI ​​to an acceptable quality. Not to mention the longer prompts = higher token
    usage.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个主要挑战是AI模型仍然需要用户编写长而复杂的提示才能达到基本的可读性。例如，在翻译某些特定领域的专业主题时，我别无选择，只能编写超过5000个字符的英文提示（几乎相当于写了一整篇文档），只是为了引导AI达到可接受的品质。更不用说更长的提示意味着更高的token使用量。
- en: If AI is truly going to break language barriers, there is still a lot of room
    for improvement to make translation models more accurate, more context-aware,
    and less dependent on long prompts. There’s still a lot of work to do to make
    AI translation easy, cost-effective, and truly accessible to everyone, but AI
    has already achieved more than anyone could have imagined, and I celebrate and
    am grateful for these technological advancements.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 如果AI真的要打破语言障碍，那么在使翻译模型更准确、更具有上下文意识、减少对长提示的依赖方面还有很大的改进空间。为了让AI翻译变得简单、经济高效，并且真正对每个人开放，还有大量的工作要做，但AI已经取得了比任何人都能想象的更多成就，我为此庆祝并感激这些技术进步。
