- en: 'Google’s AlphaEvolve: Getting Started with Evolutionary Coding Agents'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/googles-alphaevolve-getting-started-with-evolutionary-coding-agents/](https://towardsdatascience.com/googles-alphaevolve-getting-started-with-evolutionary-coding-agents/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1747946688359" class="mdspan-comment">Introduction</mdspan>
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '[AlphaEvolve](https://github.com/codelion/openevolve) [1] is a promising new
    coding agent by Google’s DeepMind. Let’s look at what it is and why it is generating
    hype. Much of the Google paper is on the claim that AlphaEvolve is facilitating
    *novel research* through its ability to improve code until it solves a problem
    in a really good way. Remarkably, the authors report that AlphaEvolve has already
    achieved such research breakthroughs.'
  prefs: []
  type: TYPE_NORMAL
- en: In this article, we will go through some basic background knowledge, then dive
    into the Google DeepMind paper and finally look at how to get [OpenEvolve](https://github.com/codelion/openevolve)
    [2] running, an open-source demo implementation of the gist of the AlphaEvolve
    paper. In the end, you will be ready to make your own experiments! We will also
    briefly discuss the possible implications.
  prefs: []
  type: TYPE_NORMAL
- en: What you will not get, however, is an absolute statement on “how good it is”
    . Applying this tool is still labor intensive and costly, especially for difficult
    problems.
  prefs: []
  type: TYPE_NORMAL
- en: 'Indeed, it is difficult to determine the extent of this breakthrough, which
    builds upon previous research. The most significant citation is [another](https://arxiv.org/abs/1504.04909)
    Google DeepMind paper from 2023 [4]. Google is definitely suggesting a lot here
    in regards to the possible research applications. And they seem to be trying to
    scale up the research applications: AlphaEvolve has already produced numerous
    novel research results in their lab, they claim.'
  prefs: []
  type: TYPE_NORMAL
- en: Now other researchers have to reproduce the results and put them into context,
    and additional proof of its value needs to be created. This is not straightforward,
    and again, will take time.
  prefs: []
  type: TYPE_NORMAL
- en: The first open-source attempts at applying the AlphaEvolve algorithms were available
    within days. One of these attempts is OpenEvolve, which implemented the solution
    in a clean and understandable way. This helps others to evaluate similar approaches
    and determine their benefits.
  prefs: []
  type: TYPE_NORMAL
- en: But let’s start from the beginning. What is all of this about?
  prefs: []
  type: TYPE_NORMAL
- en: 'Background knowledge: Coding agents & evolutionary algorithms'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'If you are reading this, then you have probably heard of coding agents. They
    typically apply large language model’s (LLMs) to automatically generate computer
    programs at breathtaking speeds. Rather than producing text, the chatbot generates
    Python code or something else. By confirming the output of the generated program
    after each attempt, a coding agent can automatically produce and improve actionable
    computer programs. Some consider this a powerful evolution of LLM capabilities.
    The story goes like this: Initially, LLMs were just confabulating and dreaming
    up text and output in other modalities, such as images. Then came agents that
    could work off to-do lists, run continuously and even manage their own memory.
    With structured JSON output and tool calls, this was further extended to give
    agent access to additional services. Finally, coding agents were developed that
    can create and execute algorithms in a reproducible fashion. In a sense, this
    enables the LLM to cheat by extending its capabilities to include those that computers
    have had for a long time.'
  prefs: []
  type: TYPE_NORMAL
- en: There is much more to creating a reliable LLM system, more on this in future
    articles. For AlphaEvolve, however, reliability is not a primary concern. Its
    tasks have limited scope, and the outcome must be clearly measurable (more on
    this below).
  prefs: []
  type: TYPE_NORMAL
- en: Anyway, coding agents. There are many. To implement your own, you could start
    with frameworks such as [smolagents](https://github.com/huggingface/smolagents),
    [swarms](https://github.com/kyegomez/swarms) or [Letta](https://github.com/letta-ai).
    If you just want to start coding with the support of a coding agent, popular tools
    are GitHub [CoPilot](https://github.com/features/copilot), integrated in VS Code,
    as well as [Aider](https://aider.chat/) and [Cursor](https://www.cursor.com/).
    These tools internally orchestrate LLM chatbot interactions by providing the right
    context from your code base to the LLM in real time. Since these tools generate
    semi-autonomous functions based on the stateless LLM interface, they are called
    “agentic.”
  prefs: []
  type: TYPE_NORMAL
- en: How extremely stupid not to have thought of that!
  prefs:
  - PREF_BQ
  - PREF_BQ
  type: TYPE_NORMAL
- en: Google is now claiming a sort of breakthrough based on coding agents. Is it
    something big and new? Well, not really. They applied something very old.
  prefs: []
  type: TYPE_NORMAL
- en: 'Rewind to 1809: Charles Darwin was born. His book *On the Origin of Species,*
    which outlined evidence that natural selection leads to *biological* evolution,
    led biologist Thomas Henry Huxley to the above exclamation.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d61444ede335fea97402adb8dd0bf242.png)'
  prefs: []
  type: TYPE_IMG
- en: Photo by [Logan Gutierrez](https://unsplash.com/@photosoflogan?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com/?utm_source=medium&utm_medium=referral)
  prefs: []
  type: TYPE_NORMAL
- en: Of course, there are other forms of evolution besides biological evolution.
    In a figure of speech, you can essentially claim it whenever survival of the fittest
    leads to a particular outcome. Love, the stars — you name it. In computer science,
    evolutionary algorithms (with genetic algorithms as the most common subclass)
    follow a simple approach. First, randomly generate *n* configurations. Then, check
    if any of the configurations meets your needs (evaluate their fitness). If so,
    stop. If not, pick one or multiple parent configurations — ideally, very fit ones
    — , create a new configuration by mixing the parents (this is optional and is
    referred to as crossover ; a single parent works too), optionally add random mutations,
    remove a few of the previous configurations — preferably, weak ones — and start
    over.
  prefs: []
  type: TYPE_NORMAL
- en: 'There are three things to note here:'
  prefs: []
  type: TYPE_NORMAL
- en: The necessity of a fitness function means that there is measurable success.
    AlphaEvolve doesn’t do science on its own, finding just anything for you. It works
    on a perfectly defined goal, for which you already may have a solution, just not
    the best.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Why not make the goal “get mega rich”? A short warning: Evolutionary algorithms
    are slow. They require a large population size and many generations to reach their
    local optimum by chance. And they don’t always identify the global optimum solution.
    This is why you and I ended up where we are, right?'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If the goal is too broad and the initial population is too primitive, be prepared
    to let it run a few million years with unclear outcome.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 'Why introduce mutations? In evolutionary algorithms, they help overcome the
    flaw of getting stuck in a local optimum too easily. Without randomness, the algorithm
    may quickly find a poor solution and get stuck on a path where additional evolution
    can not lead to further improvements, simply because the population of possible
    parent configurations may be insufficient to allow for the creation of a better
    individual. This inspires a central design objective in AlphaEvolve: Mix strong
    and weak LLMs and mix elite parent configurations with more mundane ones. This
    variety enables faster iterations (idea exploration), while still leaving room
    for innovation.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Background knowledge: Example on how to implement a basic evolutionary algorithm'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'For finger practice or to get a basic feel of what evolutionary algorithms
    generally can look like, this is an example:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'The goal is to maximize the fitness function *-x²+5* by getting *x* as close
    to *0* as possible. The random “population” with which the system is initialized
    gets modified in each generation. The weaker half is eliminated, and the other
    half produces “offspring” by having a Gaussian value (a random mutation) added
    upon itself. *Note: In the given example, the elimination of half the population
    and the introduction of “children” could have been skipped. The result would have
    been the same if every individual were mutated. However, in other implementations,
    such as genetic algorithms where two parents are mixed to produce offspring, the
    elimination step is necessary.*'
  prefs: []
  type: TYPE_NORMAL
- en: Since the program is stochastic, each time you execute it, the output will differ,
    but will be similar to
  prefs: []
  type: TYPE_NORMAL
- en: 'gen #0 best x=0.014297341502906846 fitness=4.999795586025949'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'gen #1 best x=-0.1304768836196552 fitness=4.982975782840903'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'gen #2 best x=-0.06166058197494284 fitness=4.996197972630512'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'gen #3 best x=0.051225496901524836 fitness=4.997375948467192'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'gen #4 best x=-0.020009912942005076 fitness=4.999599603384054'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'gen #5 best x=-0.002485426169108483 fitness=4.999993822656758'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[..]'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: best x=0.013335836440791615, fitness=4.999822155466425
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Pretty close to zero, I guess. Simple, eh? You may also have noticed two attributes
    of the evolutionary process:'
  prefs: []
  type: TYPE_NORMAL
- en: The results are random, yet the fittest candidates converge.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Evolution doesn’t necessarily identify the optimum, not even an obvious one.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: With LLMs in the picture, things get more exciting. The LLM can intelligently
    guide the direction the evolution takes. Like you and me, it would figure out
    that *x* must be zero.
  prefs: []
  type: TYPE_NORMAL
- en: 'How it works: Meet AlphaEvolve'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: AlphaEvolve is a coding agent that uses smart prompt generation, evolutionary
    algorithms to refine provided context as well as two strong base LLMs. The primary
    model generates many ideas quickly, whereas the stronger secondary LLM increases
    the quality level. The algorithm works irrespective of which LLM models are used,
    but more powerful models produce better result.
  prefs: []
  type: TYPE_NORMAL
- en: In AlphaEvolve, evolution for the LLM means its context adapts with each inference.
    Essentially, the LLM is provided with information on successful and unsuccessful
    past code attempts, and this list of programs is refined through an evolutionary
    algorithm with each iteration. The context also provides feedback on the programs’
    fitness results, indicating their strength and weaknesses. Human instructions
    for a specific problem can also be added (the LLM researcher and the human researchers
    form a team, in a way, helping each other). Finally, the context includes meta
    prompts, self-managed instructions from the LLM. These meta-prompts evolve in
    the same way that the fittest code results evolve.
  prefs: []
  type: TYPE_NORMAL
- en: The evolutionary algorithm that was implemented may be relevant. It combines
    a strategy called [MAP-Elites](https://arxiv.org/abs/1504.04909) [5] with island-based
    population models, such as traditional genetic algorithms. Island-based population
    models allow for subpopulations to evolve separately. MAP-Elites, on the other
    hand, is a smart search strategy that selects the fittest candidates who perform
    well in multiple dimensions. By combining the approaches, exploration and exploitation
    are mixed. At a certain rate, the elite is selected and adds diversity to the
    gene pool.
  prefs: []
  type: TYPE_NORMAL
- en: Fitness is determined as a multidimensional vector of values, *each* of which
    shall be maximized. No weighting seems to be used, i.e., all values are equally
    important. The authors dismiss concerns that this could be an issue when a single
    metric is more important, suggesting that good code often improves the results
    for multiple metrics.
  prefs: []
  type: TYPE_NORMAL
- en: 'Fitness is evaluated in two stages (the “evaluation cascade”): First, a quick
    test is performed to filter out obviously poor candidate solutions. Only in the
    second stage, which may take more execution time, is the full evaluation performed.
    The goal of this is to maximize throughput by considering many ideas quickly and
    not wasting more resources than necessary on bad ideas.'
  prefs: []
  type: TYPE_NORMAL
- en: 'This whole approach is easily parallelized, which also helps throughput. The
    authors are thinking big: They mention that even problem evaluations that take
    hundreds of computing hours for a single test are possible in this setup. Bad
    candidates are discarded early, and the many long-running tests take place simultaneously
    in a datacenter.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The LLM’s output is a list of code sequences that the LLM wants replaced. This
    means the LLM does not have to reproduce the entire program but can instead trigger
    modifications to specific lines. This presumably allows AlphaEvolve to handle
    larger code bases more efficiently. To accomplish this, the LLM is instructed
    in its system prompt to use the following diff output format:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Key findings from the paper
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Much of the paper discusses relevant research advancements that AlphaEvolve
    already produced. The research problems were expressed in code with a clear evaluator
    function. This is usually possible for problems in mathematics, computer science
    and related fields.
  prefs: []
  type: TYPE_NORMAL
- en: 'Specifically, the authors describe the following research results produced
    by AlphaEvolve:'
  prefs: []
  type: TYPE_NORMAL
- en: They report that AlphaEvolve found (slightly) faster algorithms for matrix multiplication.
    They mention that this required non-trivial changes with 15 separate, noteworthy
    advancements.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: They used it for finding search algorithms in different mathematical problems.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: They were able to improve data center scheduling with the help of AlphaEvolve.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: They had AlphaEvolve optimize a Verilog hardware circuit design.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Attempts to optimize compiler-generated code produced some results with 15–32%
    speed improvement. The authors suggest that this could be systematically used
    to optimize code performance.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Note that the magnitude of these result is [under discussion](https://news.ycombinator.com/item?id=43985489).
  prefs: []
  type: TYPE_NORMAL
- en: 'In addition to the immediate research results produced by AlphaEvolve, the
    authors’ ablations are also insightful. In an ablation study, researchers attempt
    to determine which parts of a system contribute most to the results by systematically
    removing parts of it (see page 18, fig. 8). We learn that:'
  prefs: []
  type: TYPE_NORMAL
- en: Self-guided meta prompting of the LLM didn’t contribute much.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The primary versus secondary model mixture improves results slightly.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Human-written context in the prompt contributes quite a bit to the results.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Finally, the evolutionary algorithm, that produces the evolving context passed
    to the LLM makes all the difference. **The results demonstrate that AlphaEvolve’s
    evolutionary aspect is crucial for successfully solving problems.** This suggests
    that evolutionary prompt refinements can vastly increase LLM capability.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'OpenEvolve: Setup'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: It is time to start doing your own experiments with OpenEvolve. Setting it up
    is simple. First, decide whether you want to use Docker. Docker may add an extra
    security layer, because coding agents may pose security risks (see further below).
  prefs: []
  type: TYPE_NORMAL
- en: 'To install natively, just clone the Git repository, create a virtual environment,
    and install the requirements:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: 'You can then run the agent in the directory, using the coded “problem” from
    the example:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: 'To use the more secure Docker method, enter the following command sequence:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: 'OpenEvolve: Implementing a problem'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To create a new problem, copy the example program into a new folder.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: The agent will optimize the initial program and produce the best program as
    its output. Depending on how many iterations you invest, the result may improve
    more and more, but there is no definite logic to determine the ideal stopping
    point. Typically, you have a “compute budget” that you exhaust, or you wait until
    the results seem to plateau.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/bab5b5f10120f8dea9d5bb40fccc6a1c.png)'
  prefs: []
  type: TYPE_IMG
- en: The agent takes an initial program and the evaluation program as input and,
    with a given configuration, produces new evolutions of the initial program. For
    each evolution, the evaluator executes the current program evolution and returns
    metrics to the agent, which aims to maximize them. Once the configured number
    of iterations is reached, the best program found is written to a file. (Image
    by author)
  prefs: []
  type: TYPE_NORMAL
- en: Let’s start with a very basic example.
  prefs: []
  type: TYPE_NORMAL
- en: 'In your *initial_program.py*, define your function, then mark the sections
    you want the agent to be able to modify with `# EVOLVE-BLOCK-START` and `# EVOLVE-BLOCK-END`
    comments. The code does not necessarily need to do anything; it can simply return
    a valid, constant value. However, if the code already represents a basic solution
    that you wish to optimize, you will see results much sooner during the evolution
    process. *initial_program.py* will be executed by *evaluator.py,* so you can define
    any function names and logic. The two just must fit together. Let’s assume this
    is your initial program:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: 'Next, implement the evaluation functions. Remember the cascade evaluation from
    earlier? There are two evaluation functions: *evaluate_stage1(program_path)* does
    basic trials to see whether the program runs properly and basically seems okay:
    Execute, measure time, check for exceptions and valid return types, etc.'
  prefs: []
  type: TYPE_NORMAL
- en: In the second stage, the *evaluate(program_path)* function is supposed to perform
    a full assessment of the provided program. For example, if the program is stochastic
    and therefore does not always produce the same output, in stage 2 you may execute
    it multiple times (taking more time for the evaluation), as done in the example
    code in the *examples/function_minimization/* folder. Each evaluation function
    must return metrics of your choice, only make sure that “bigger is better”, because
    this is what the evolutionary algorithm will optimize for. This allows you to
    have the program optimized for different goals, such as execution time, accuracy,
    memory usage, etc. — whatever you can measure and return.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: 'This evaluator program requires the installation of smolagents, which is used
    for sandboxed code execution:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: With this evaluator, *my_function(x)* has to return *x* for each tested value.
    If it does, it receives a score of *1*. Will the agent optimize the initial program
    to do just that?
  prefs: []
  type: TYPE_NORMAL
- en: 'Before trying it out, set your configuration options in *config.yaml.* The
    full list of available options is documented in [*configs/default_config.yml*](https://github.com/codelion/openevolve/blob/main/configs/default_config.yaml)*.*
    Here are a few important options for configuring the LLM:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: 'You can configure LLMs from another OpenAI-compatible endpoint, such as a local
    Ollama installation, using settings like:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: '*Note: If the API key is not set in config.yml, you have to provide it as an
    environment variable.* In this case, you could call your program with'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: It will then whiz away.. And, magically, it will work!
  prefs: []
  type: TYPE_NORMAL
- en: Did you notice the system prompt I used?
  prefs: []
  type: TYPE_NORMAL
- en: You are an expert programmer specializing in tricky code problems. Your task
    is to find a function that returns an integer that matches an unknown, but trivial
    requirement.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The first time I ran the agent, it tried “return 42”, which is a reasonable
    attempt. The next attempt was “return x”, which, of course, was the answer.
  prefs: []
  type: TYPE_NORMAL
- en: 'The harder problem in the *examples/function_minimization/* folder of the OpenEvolve
    repository makes things more interesting:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/3abc86f99cb25edb59e7234fe1f03654.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Top left: Initial program; Center: OpenEvolve iterating over different attempts
    with the OpenAI models; Top right: Initial metrics; Bottom right: Current version
    metrics (50x speed, video by author)'
  prefs: []
  type: TYPE_NORMAL
- en: Here, I ran two experiments with 100 iterations each. The first try, with *cogito:14b*
    as the primary *and* secondary model took over an hour on my system. *Note that
    it is not recommended to not have a stronger secondary model, but this increased
    speed in my local setup due to no model switching.*
  prefs: []
  type: TYPE_NORMAL
- en: '[..]'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
