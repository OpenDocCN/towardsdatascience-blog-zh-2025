- en: 'Surprisingly, the final metrics seem similar despite GPT-4o being far more
    capable than the 14 billion parameter *cogito* LLM. *Note: Bigger numbers are
    better! The algorithm aims to maximize all metrics.* However, while watching OpenAI
    run through iterations, it seemed to try more innovative combinations. Perhaps
    the problem was too simple for it to gain an advantage in the end, though.'
  prefs: []
  type: TYPE_NORMAL
- en: A note on security
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Please note that OpenEvolve itself does not implement any sort of security
    controls, despite coding agents posing considerable security risks. The team from
    HuggingFace has documented the [security considerations with coding agents](https://huggingface.co/docs/smolagents/tutorials/secure_code_execution).
    To reduce the security risk to a reasonable degree, the evaluator function above
    used a sandboxed execution environment that only allows the import of whitelisted
    libraries and the execution of whitelisted functions. If the LLM produced a program
    that attempted forbidden imports, an exception such as the following would be
    triggered:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Error loading program: Code execution failed at line ‘import os’ due to: InterpreterError'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Without this extra effort, the executed code would have full access to your
    system and could delete files, etc.
  prefs: []
  type: TYPE_NORMAL
- en: Discussion and outlook
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: What does it all mean, and how will it be used?
  prefs: []
  type: TYPE_NORMAL
- en: Running well-prepared experiments takes considerable computing power, and only
    few people can specify them. The results come in slowly, so comparing them to
    alternative solutions is not trivial. However, in theory, you can describe any
    problem, either directly or indirectly, in code.
  prefs: []
  type: TYPE_NORMAL
- en: 'What about non-code use cases or situations where we lack proper metrics? Perhaps
    fitness functions which return a metric based on another LLM evaluation, for example,
    of text quality. An ensemble of LLM reviewers could evaluate and score. As it
    turns out, the authors of AlphaEvolve are also hinting at this option. They write:'
  prefs: []
  type: TYPE_NORMAL
- en: While AlphaEvolve does allow for LLM-provided evaluation of ideas, this is not
    a setting we have optimized for. However, concurrent work shows this is possible
    [3]
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Another outlook discussed in the paper is using AlphaEvolve to improve the base
    LLMs themselves. That does not imply superspeed evolution, though. The paper mentions
    that “feedback loops for improving the next version of AlphaEvolve are on the
    order of months”.
  prefs: []
  type: TYPE_NORMAL
- en: Regarding coding agents, I wonder which benchmarks would be helpful and how
    AlphaEvolve would perform in them. [SWE-Bench](https://medium.com/@te2be/coding-agents-open-source-approaches-on-swe-bench-074cc28c5bb0)
    is one such benchmark. Could we test it that way?
  prefs: []
  type: TYPE_NORMAL
- en: Finally, what about the outlook for OpenEvolve? Hopefully it will continue.
    Its author has stated that reproducing some of the AlphaEvolve results is a goal.
  prefs: []
  type: TYPE_NORMAL
- en: 'More importantly: How much potential do evolutionary coding agents have and
    how can we maximize the impact of these tools and achieve a broader accessibility?
    And can we scale the number of problems we feed to them somehow?'
  prefs: []
  type: TYPE_NORMAL
- en: Thanks for reading!
