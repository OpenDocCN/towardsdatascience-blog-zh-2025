- en: 'In contrast, using OpenAI’s *gpt-4o* as the primary model and *gpt-4.1* as
    an even stronger secondary model, I had a result in 25 minutes:'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 相比之下，使用OpenAI的*gpt-4o*作为主要模型和*gpt-4.1*作为更强的次要模型，我在25分钟内得到了结果：
