- en: 'One of my favorite professors throughout my studies told me this:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的学习生涯中，我最喜欢的教授之一曾经告诉我：
- en: '"Just because your algorithm is inefficient, it doesn’t mean that the problem
    is **hard**"'
  id: totrans-6
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “仅仅因为你的算法效率低下，并不意味着问题**困难**”
- en: This means that if you want to solve a whatever problem (easy or hard), there
    will always be an approach that is naive enough to be extremely inefficient. For
    example, let’s say you have to go to work in a new workplace. Instead of using
    Google Maps, you start from your house’s alley and try all the possible combinations
    of the streets (north, south, west, and east). By the time you will arrive to
    work your company might be filing bankruptcy or having you fired.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着，无论你想解决什么问题（简单或困难），总会有一种足够天真的方法，以至于效率极低。例如，假设你必须去一个新的工作地点。与其使用 Google Maps，你不如从你家的巷子开始，尝试所有可能的街道组合（北、南、西和东）。等你到达工作地点时，你的公司可能正在申请破产或解雇你。
- en: 'Let’s try to be a little more formal. Let’s say that in whatever business or
    engineering environment, you have to find the **minimum** or **maximum** **of
    a function**. For example, your company has to maximize revenue from the sales
    of a given department. We call this function **f.** The "strings" you pull, meaning
    the **decisions** that you can take to maximize the revenue is a vector **x.**
    You can’t obviously increase the sales by hiring 10⁶ people a week or making people
    work 18 hours a day, so you obviously have some constraints. So we say that you
    can make these decisions in a decision space **X**. So the task is this:'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们尽量更正式一点。假设在任何一个商业或工程环境中，你必须找到函数的**最小值**或**最大值**。例如，你的公司必须最大化某个部门的销售收入。我们称这个函数为**f**。你拉动的“字符串”，即你为了最大化收入可以做出的**决策**是一个向量**x**。显然，你不能通过每周雇佣
    10⁶ 人或让人们每天工作 18 小时来增加销售，所以你显然有一些约束。所以我们说，你可以在决策空间 **X** 中做出这些决策。所以任务是：
- en: '![](../Images/ecd7d9fa2f6530a7d36a7896276f84af.png)'
  id: totrans-9
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ecd7d9fa2f6530a7d36a7896276f84af.png)'
- en: Let’s assume the f function is **linear**.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 假设 f 函数是**线性的**。
- en: 'If you had to do this ***naively*** you literally stand no chance, because
    the space is **continuous,** meaning you would have to explore a closed infinite
    space: if x¹ is between 0 and 1, you have infinite numbers between the boundaries
    and the same applies for all the other variables, combinatorially. So if you have
    10 variables it is like infinite¹⁰ to explore. Nonetheless, this problem can be
    solved with a method called **[simplex](https://en.wikipedia.org/wiki/Simplex_algorithm).**
    This algorithm only focuses on the vertices of the **X** space and solves the
    problem in 2^n (for the worst case) where n is the number of variables of your
    problem. Most of the time, the runtime is actually n³, so way quicker than 2^n.'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你必须**天真地**做这件事，你实际上没有任何机会，因为空间是**连续的**，这意味着你将不得不探索一个封闭的无限空间：如果 x¹ 在 0 和 1
    之间，你将在边界之间有无限多个数字，对于所有其他变量也是如此，组合上也是如此。所以如果你有 10 个变量，就像是无限¹⁰ 个要探索的。尽管如此，这个问题可以通过一种称为**[单纯形法](https://en.wikipedia.org/wiki/Simplex_algorithm)**的方法来解决。这个算法只关注
    **X** 空间的顶点，并在 2^n（对于最坏情况）内解决问题，其中 n 是你问题的变量数。大多数情况下，运行时间实际上是 n³，所以比 2^n 快得多。
- en: So going back to our question. Is the problem of optimizing your sales in a
    linear function "hard"? Not really, but if you are naive enough to try and enumerate
    all the possible cases then the problem doesn’t only become hard, it becomes **impossible**.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 回到我们的问题。优化线性函数销售的问题“困难”吗？其实并不困难，但如果你足够天真地试图枚举所有可能的情况，那么问题不仅变得困难，而且变得**不可能**。
- en: Now let’s say we are **truck drivers**. We need to run through multiple cities
    around the USA. For example, let’s say we need to tour multiple cities on the
    East Coast starting from **Cincinnati,** we have to visit **Cleveland, Chicago,
    Minneapolis, New York, Nashville,** and **Detroit:**
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 现在假设我们是**卡车司机**。我们需要在美国的多个城市之间行驶。例如，假设我们需要从**辛辛那提**出发，游览东海岸的多个城市，我们必须访问**克利夫兰、芝加哥、明尼阿波利斯、纽约、纳什维尔**和**底特律**：
- en: '![Screenshot made by author using Google Maps.](../Images/5424de4d3a24819dc501b56b4a037433.png)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
  zh: '![作者使用Google Maps制作的截图。](../Images/5424de4d3a24819dc501b56b4a037433.png)'
- en: Screenshot made by author using Google Maps.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 作者使用Google Maps制作的截图。
- en: Now, what is the **route** that minimizes the distance? What is the way to follow
    so that I can visit all the cities while being the shortest on the road? This
    problem is known as the **Traveling Salesman Problem (TSP)**.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 现在的问题是什么**路线**可以最小化距离？我应该如何规划路线，以便在访问所有城市的同时，路程最短？这个问题被称为**旅行商问题 (TSP)**。
- en: Now, there is a huge literature on this, and this problem is known to be NP-hard,
    meaning that there is no known method to solve this problem in n^k computational
    time, where n is the number of cities and k is a constant. In short, this problem
    is hard because it is indeed intrinsically hard, not because we are "***bad at
    it***".
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 现在关于这个问题有大量的文献，这个问题已知是NP难的，这意味着没有已知的方法可以在n^k的计算时间内解决这个问题，其中n是城市的数量，k是一个常数。简而言之，这个问题之所以困难，是因为它确实本质上是困难的，并不是因为我们“***做得不好***”。
- en: In this optimization case, what we usually do is find a compromise. We know
    that it would take a crazy long amount of time to find the ***guaranteed*** best
    solution. So we solve this problem in a way that we cannot actually guarantee
    to get the best of the best of the solutions, but **we can get pretty close to
    the best solution in a much shorter amount of time**. These methods are known
    as heuristic algorithms. The heuristic algorithm I want to use in this blog post
    is the **Lin–Kernighan–Helsgaun** (LKH) algorithm.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个优化案例中，我们通常的做法是找到一个折衷方案。我们知道找到**保证的**最佳解决方案需要花费非常长的时间。因此，我们以这种方式解决这个问题，我们实际上不能保证得到最佳解决方案，但**我们可以在更短的时间内接近最佳解决方案**。这些方法被称为启发式算法。我在这篇博客文章中想要使用的启发式算法是**Lin-Kernighan-Helsgaun
    (LKH) 算法**。
- en: 1\. LKH’s Theory
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1. LKH的理论
- en: '![Optimized route for a large number of cities using LKH. Image from LKH Documentation.](../Images/64e66ff162bc5c40b61edcb7b3596b93.png)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
  zh: '![使用LKH算法优化大量城市的路线。图片来自LKH文档。](../Images/64e66ff162bc5c40b61edcb7b3596b93.png)'
- en: Optimized route for a large number of cities using LKH. Image from [LKH Documentation](http://webhotel4.ruc.dk/~keld/research/LKH/).
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 使用LKH算法优化大量城市的路线。图片来自[LKH文档](http://webhotel4.ruc.dk/~keld/research/LKH/)。
- en: So why LKH?
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 那么为什么是LKH？
- en: This method is one of the most elegant and efficient methods to solve the Travelling
    Salesman Problem. The coolest thing about the LKH algorithm is the fact that it
    scales very very well. LKH has been tested up to almost 2M cities and it is still
    able to find solutions in a feasible amount of time. Another desirable aspect
    of this approach is that, even if ***technically*** LKH does not guarantee optimality
    in practice LKH is usually very likely to converge to optimality within a few
    runs.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法是解决旅行商问题最优雅和高效的方法之一。LKH算法最酷的地方在于它扩展性非常好。LKH已经测试到接近200万座城市，并且仍然能够在合理的时间内找到解决方案。这种方法的一个令人向往的方面是，即使**技术上**LKH在实践上不能保证最优性，但LKH通常在几次运行后很可能会收敛到最优解。
- en: 'The idea of this method is very simple: you start with a random **tour**, that
    will have a random **initial distance**, and iteratively improve it by changing
    some of the connections and see if this decreases the initial distance. More specifically,
    for every iteration, you perform the so-called **k-opt moves** that replace k
    connections of the original tour, with k new ones. Once you have done that, you
    compute a quantity called "**gain**" which is the **difference between the total
    distance of the removed edges and the total distance of the added edges**. If
    the gain is **positive**, it means the move has reduced the total tour length,
    and the new tour is accepted. Otherwise, the algorithm discards the change and
    continues exploring other possible moves. If you run out of options, your algorithm
    stops. *'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法的理念非常简单：你从一个随机的**旅行路线**开始，它将有一个随机的**初始距离**，然后通过改变一些连接并查看是否减少了初始距离来迭代地改进它。更具体地说，对于每一次迭代，你执行所谓的**k-opt移动**，用k个新的连接替换原始路线中的k个连接。一旦完成，你计算一个称为“**增益**”的量，它是**移除的边的总距离与添加的边的总距离之间的差异**。如果增益是**正的**，这意味着移动减少了总路线长度，新的路线被接受。否则，算法丢弃更改并继续探索其他可能的移动。如果你用尽了选项，你的算法就会停止。*
- en: For more information about this method, you can read the original paper [here](http://webhotel4.ruc.dk/~keld/research/LKH/LKH-2.0/DOC/LKH_REPORT.pdf)
  id: totrans-25
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 关于此方法的更多信息，您可以在[这里](http://webhotel4.ruc.dk/~keld/research/LKH/LKH-2.0/DOC/LKH_REPORT.pdf)阅读原始论文。
- en: This method is fairly simple, but its application is extremely satisfying. Let’s
    take a look.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法相当简单，但其应用非常令人满意。让我们来看看。
- en: 2\. LKH’s Code
  id: totrans-27
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2. LKH的代码
- en: Let’s start by setting up our Python environment and defining the libraries.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们先设置我们的Python环境并定义所需的库。
- en: I would like to solve this problem in the **real world**, meaning that I want
    to take boundaries that come from real areas, not just random points in a 2D space
    or whatever. For this reason, we will need a library called **[Folium](https://python-visualization.github.io/folium/latest/)**
    to display our points on a 2D map. The LKH algorithm is implemented in the library
    called **[elkai](https://github.com/fikisipi/elkai)**. The other libraries are
    just normal ones like **numpy** and **scipy**.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 我想在**现实世界**中解决这个问题，这意味着我想使用来自真实区域的边界，而不仅仅是2D空间中的随机点或其他什么。为此，我们需要一个名为**[Folium](https://python-visualization.github.io/folium/latest/)**的库来在2D地图上显示我们的点。LKH算法在名为**[elkai](https://github.com/fikisipi/elkai)**的库中实现。其他库只是正常的库，如**numpy**和**scipy**。
- en: We are going to add random pins in the world, and we are going to find the shortest
    distance route to travel around all these pins.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将在世界上添加随机标记，并找到绕过所有这些标记的最短距离路线。
- en: For this task, I created a script **TravelSalesman.py** with a class named **TaxiDriver():**
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这个任务，我创建了一个名为**TravelSalesman.py**的脚本，其中包含一个名为**TaxiDriver()**的类：
- en: '* * *'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '* * *'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Let’s walk it step by step.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们一步一步地来。
- en: 'This class takes two inputs, that have default arguments. The first input is
    the **json** file that gives you the **boundary** **box** of the random points.
    For example, I chose to focus on the east coast of the United States. The boundaries
    are these:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 这个类接受两个输入，它们有默认参数。第一个输入是提供随机点**边界框**的**json**文件。例如，我选择专注于美国东海岸。边界如下：
- en: '[PRE0]'
  id: totrans-36
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Write a file like that and put it wherever you want, then pass the path into
    _**route_box_file**_.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个这样的文件，并将其放在您想要的位置，然后将路径传递给**_route_box_file**。
- en: The other input involves where we are going to store the output. The output
    of this code will be the **optimized route** and it will be saved as a map. We
    can also store **random routes** as maps for reference.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个输入涉及我们将存储输出。此代码的输出将是**优化路线**，并将其保存为地图。我们还可以将**随机路线**作为地图保存以供参考。
- en: The maps will be saved in interactive ***.html*** files. The only thing you
    need to provide is the folder where you want them saved. By default, the folder
    will be _**map_folder.**_
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 地图将被保存为交互式的***.html***文件。您需要提供的只是您希望保存它们的文件夹。默认情况下，文件夹将是**_map_folder._**
- en: The whole code can be found in [this GitHub folder](https://github.com/PieroPaialungaAI/TaxiRouteTSP/tree/main).
  id: totrans-40
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 整个代码可以在[这个GitHub文件夹](https://github.com/PieroPaialungaAI/TaxiRouteTSP/tree/main)中找到。
- en: 3\. LKH’s applications
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3. LKH的应用
- en: 'So the whole article can be summarized, coding-wise, in one line:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，从代码的角度来看，整篇文章可以总结为一句：
- en: '[PRE1]'
  id: totrans-43
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'That we can use doing:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以使用以下方式来使用：
- en: '[PRE2]'
  id: totrans-45
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Ok, let’s have fun with it. The first thing we do is to adopt the **.generate_random_points(n)**
    function to populate the maps with n points. For example, let’s say 100 points.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧，让我们来玩玩这个。我们首先使用 **.generate_random_points(n)** 函数来用 n 个点填充地图。例如，让我们假设有 100
    个点。
- en: '[PRE3]'
  id: totrans-47
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '… and let’s display them (all steps together):'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: …让我们一起显示它们（所有步骤一起）：
- en: '[PRE4]'
  id: totrans-49
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: '![Output made by author using code above](../Images/f657324f624213e69fff10c0db7f6703.png)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![作者使用代码生成的输出](../Images/f657324f624213e69fff10c0db7f6703.png)'
- en: Output made by author using code above
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 作者使用代码生成的输出
- en: Now, given the way we set our system, you would find this map in a .html file
    named _**"random_points_map.html"**_ in whatever folder you chose.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，根据我们设置的系统，你会在你选择的任何文件夹中找到一个名为 _**"random_points_map.html"**_ 的 .html 文件中找到这张地图。
- en: 'So the point is: we have to visit all these **n=100** cities. If we examine
    all the possible paths to visit them we get:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 所以关键在于：我们必须访问所有这些 **n=100** 个城市。如果我们检查访问它们的所有可能路径，我们得到：
- en: 100! = 9.332622e+157 paths
  id: totrans-54
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 100! = 9.332622e+157 条路径
- en: Even if computing a single path takes a **nanosecond**, you will not be able
    to visit all the paths. And that is "just" for 100 cities. In short, yes, the
    problem is bad, but our approach is terrible as well.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 即使计算单条路径只需要 **纳秒**，你也无法访问所有路径。而且这仅仅是针对 100 个城市的情况。简而言之，是的，这个问题很糟糕，但我们的方法也同样糟糕。
- en: 'So we could say: "Ok, let’s try a random route", using the **plot_with_connections()
    function.** This function randomly connects the points of our route.'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 所以我们可以说：“好吧，让我们尝试一条随机路线”，使用 **plot_with_connections()** 函数。这个函数随机连接我们路线上的点。
- en: '[PRE5]'
  id: totrans-57
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: '![Image made by author using code above](../Images/5a173a851f4d815d77b9546f1636dc18.png)'
  id: totrans-58
  prefs: []
  type: TYPE_IMG
  zh: '![作者使用上述代码制作的图像](../Images/5a173a851f4d815d77b9546f1636dc18.png)'
- en: Image made by author using code above
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 作者使用上述代码制作的图像
- en: This is one route, but it is obviously so **far from ideal.** We go back and
    forth so many times, waste a lot of gas, and travel a lot of unnecessary distance.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一条路线，但它显然离理想状态很远。我们来回走了很多次，浪费了大量汽油，也走了很多不必要的距离。
- en: So we can’t visit all the routes, but it’s also very risky to just trust a random
    path.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 所以我们无法访问所有路线，但仅仅依赖随机路径也是非常危险的。
- en: In these desperate times, our LKH hero comes into play. If we use the proposed
    LKH above, we can get a route-optimized solution almost immediately. Is it going
    to be optimal **optimal (**meaning the best of all the possible routes)? Maybe,
    maybe not (we will never know because we can never possibly visit them all), but
    it will be very close.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 在这些绝望的时刻，我们的 LKH 英雄登场了。如果我们使用上述提出的 LKH，我们几乎可以立即得到一个路线优化的解决方案。它会是所有可能路线中最优的吗？也许吧，也许不是（因为我们永远无法知道，因为我们永远不可能访问它们），但它会非常接近。
- en: All this LKH-talk can be done in one line, using the function **find_shortest_path()**,
    which applies elkai’s LKH to find the shortest path
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些 LKH 讨论都可以用一行代码完成，使用 **find_shortest_path()** 函数，该函数应用 elkai 的 LKH 来找到最短路径
- en: '[PRE6]'
  id: totrans-64
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
