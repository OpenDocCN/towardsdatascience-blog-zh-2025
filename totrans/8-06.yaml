- en: 'And as it is supposed to be, we go back to the original point (otherwise it
    wouldn’t be a "tour"). If we use the **.display_optimized_route(tour)** function,
    we are able to display the optimized route:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 正如预期的那样，我们回到了起点（否则它就不会是一个“旅行”）。如果我们使用 **.display_optimized_route(tour)** 函数，我们就能显示优化的路线：
- en: '[PRE7]'
  id: totrans-68
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: '![Image made by author using code above](../Images/84a0d9abf36009e719f912486e7c71fb.png)'
  id: totrans-69
  prefs: []
  type: TYPE_IMG
  zh: '![作者使用上述代码制作的图像](../Images/84a0d9abf36009e719f912486e7c71fb.png)'
- en: Image made by author using code above
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 作者使用代码生成的图像
- en: Ok, **now** we are talking. Our algorithm is defining an optimized route that
    doesn’t make us waste months of our lives retraveling the same roads. This plot
    itself is the beauty of LKH and why I think this algorithm is so elegant and brilliant.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧，**现在**我们来说说重点。我们的算法正在定义一条优化路线，这样我们就不必浪费数月的时间重复走相同的道路。这个图本身就是 LKH 的美，也是为什么我认为这个算法如此优雅和卓越。
- en: Just to reiterate, do we know that this is the best out of the 10¹⁵⁷ routes?
    Absolutely not. Is it a pretty good solution? Absolutely yes, and we can see that,
    by eye, we are indeed being pretty smart into finding the best routes out of so
    many cities.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 只是为了重申，我们知道这是10¹⁵⁷条路线中最好的吗？绝对不是。这是一个相当好的解决方案吗？绝对是的，我们可以通过肉眼看到，我们确实在从这么多城市中找到最佳路线方面非常聪明。
- en: 4\. LKH’s limitations
  id: totrans-73
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4. LKH的限制
- en: LKH is known to be a pretty good Traveling Salesman Problem (TSP) solution.
    Now, optimization experts can disagree with it and they might have a point. For
    example, **[Dynamic Programming](https://www.geeksforgeeks.org/travelling-salesman-problem-using-dynamic-programming/)
    (DP)** guarantees an optimal solution but it’s way more expensive. Methods like
    **[Genetic Algorithms](https://medium.com/aimonks/traveling-salesman-problem-tsp-using-genetic-algorithm-fea640713758)
    (GA)** are intriguing, because they iterate from a route and find a better and
    better solution with a "survival of the fittest" approach. People are also improving
    LKH using **[reinforcement learning](https://ekimetrics.github.io/blog/2021/11/03/tsp/),**
    awarding a higher score for a shorter distance of a proposed route. There are
    people dedicating their lives to the TSP and they are doing an amazing job at
    it.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: LKH被认为是相当好的旅行商问题（TSP）解决方案。现在，优化专家可能会不同意这一点，他们可能是有道理的。例如，**[动态规划](https://www.geeksforgeeks.org/travelling-salesman-problem-using-dynamic-programming/)**（DP）保证了最优解，但它代价高昂。像**[遗传算法](https://medium.com/aimonks/traveling-salesman-problem-tsp-using-genetic-algorithm-fea640713758)**（GA）这样的方法很有趣，因为它们从一个路线开始迭代，并使用“适者生存”的方法找到更好和更好的解决方案。人们也在使用**[强化学习](https://ekimetrics.github.io/blog/2021/11/03/tsp/)**来改进LKH，为建议路线的较短距离赋予更高的分数。有些人致力于TSP，并且他们在这一领域做得非常出色。
- en: On another note, the main issue of LKH’s is probably not (or not only) it’s
    complexity but rather its intrinsic **static** nature.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，LKH的主要问题可能不是（或者不仅仅是）它的复杂性，而是其固有的**静态**本质。
- en: 'In real life we don’t travel in an absolute perfect world where the time to
    go from A to B depends only on the distance between A and B: we travel on **roads**.
    This means that traffic, time of the day, gas stations (and their prices), condition
    of the roads, delivery urgency are all factors that should be included (and they
    are not). One can think: "Ok then, let’s not optimize on , but on where convenience
    is a sum of all the other factors". The problem with that is this approach considers
    **fixed** factors. Methods like **[Dijkstra’s Algorithm](https://en.wikipedia.org/wiki/Dijkstra%27s_algorithm)
    are more suitable,** while other approaches use Machine Learning methods to predict
    the time to arrive from A to B (if we do that, then we can apply LKH on the predicted
    times).'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 在现实生活中，我们并不生活在一个绝对完美的世界中，从一个地方到另一个地方的时间只取决于A和B之间的距离：我们在**道路上**旅行。这意味着交通、一天中的时间、加油站（及其价格）、道路状况、交付紧急程度都是应该考虑的因素（而且它们确实被考虑了）。有人可能会想：“好吧，那么我们就不在某个地方优化，而是在方便的地方优化，因为方便是所有其他因素的加和”。问题在于，这种方法考虑了**固定**的因素。像**[迪杰斯特拉算法](https://en.wikipedia.org/wiki/Dijkstra%27s_algorithm)**这样的方法更适合，而其他方法则使用机器学习方法来预测从A到B的时间（如果我们这样做，那么我们可以将LKH应用于预测的时间）。
- en: 5\. Conclusions
  id: totrans-77
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 5. 结论
- en: Thank you for "***travelling***" with me throughout this blog post 🙃
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢你在这篇博客文章中与我一起“旅行”🙃
- en: 'In this blogpost, we explored the optimization problem known as "Travelling
    Salesman Problem". In particular, we did it following these steps:'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇博客文章中，我们探讨了被称为“旅行商问题”的优化问题。具体来说，我们是按照以下步骤进行的：
- en: We discussed "***hard***" optimization problems. An optimization problem is
    "hard" not necessarily because our algorithm takes a lot of times to solve it.
    Most of the times, the brute force approach is not feasible but that doesn’t mean
    that the task itself is "hard".
  id: totrans-80
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们讨论了“***困难***”的优化问题。一个优化问题之所以“困难”，并不一定是因为我们的算法需要花费很多时间来解决它。大多数时候，穷举法不可行，但这并不意味着任务本身是“困难”的。
- en: We described the **Traveling Salesman Problem** (TSP), that is the problem of
    optimizing a "tour" of multiple points, minimizing the distance.
  id: totrans-81
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们描述了**旅行商问题**（TSP），即优化多个点的“巡回”问题，最小化距离。
- en: We talked about the LKH algorithm. First we described the theory of it, then
    we implemented a **class** LKH algorithm, using Python and the elkai’s library.
  id: totrans-82
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们讨论了LKH算法。首先我们描述了它的理论，然后我们使用Python和elkai库实现了一个**类**LKH算法。
- en: We applied the LKH algorithm in a **real world travelling experiment**, by finding
    the shortest route that allows you to visit all the selected cities on the east
    coast.
  id: totrans-83
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们在**现实世界的旅行实验**中应用了LKH算法，通过找到一条最短路线，让你能够访问东海岸上所有选定的城市。
- en: We discussed LKH’s static nature and its **limitations**.
  id: totrans-84
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们讨论了LKH的静态特性及其**局限性**。
