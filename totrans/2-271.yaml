- en: Why AI Projects Fail
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 为什么AI项目会失败
- en: 原文：[https://towardsdatascience.com/why-ai-projects-fail/](https://towardsdatascience.com/why-ai-projects-fail/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/why-ai-projects-fail/](https://towardsdatascience.com/why-ai-projects-fail/)
- en: <mdspan datatext="el1749214024347" class="mdspan-comment">AI projects</mdspan>
    are notoriously difficult to design and implement. Despite the hype and the flood
    of new frameworks, especially in the generative AI space, turning these projects
    into real, tangible value remains a serious challenge in enterpriss.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1749214024347" class="mdspan-comment">AI项目</mdspan>在设计上和实施上都是出了名的困难。尽管有炒作和新框架的涌入，尤其是在生成式AI领域，将这些项目转化为真实、有形的价值仍然是企业中一个严重的挑战。
- en: 'Everyone’s excited about AI: boards want it, execs pitch it, and devs love
    the technology. But here’s the very hard truth: AI projects don’t just fail *like* traditional
    IT projects, they fail *worse*. Why? Because they inherit all the messiness of
    regular software projects *plus* a layer of probabilistic uncertainty that most
    orgs aren’t ready to handle.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 每个人都对AI都充满热情：董事会想要它，高管们都在推销它，开发者们也热爱这项技术。但这里有一个非常残酷的事实：AI项目不仅会失败，而且失败得更惨。为什么？因为它们继承了常规软件项目的所有混乱，再加上一层大多数组织尚未准备好应对的概率不确定性。
- en: When you run an AI process, there’s a certain level of randomness involved,
    which means it may not produce the same results each time. This adds an extra
    layer of complexity that some organizations aren’t ready for.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 当你运行一个AI流程时，其中涉及一定程度的随机性，这意味着它可能不会每次都产生相同的结果。这为一些组织尚未准备好的复杂度增加了额外的一层。
- en: 'If you’ve worked in any IT project, you will remember the most common issues:
    unclear requirements, scope creep, silos or misaligned incentives.'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你曾在任何IT项目中工作过，你将记得最常见的问题：不明确的需求、范围蔓延、孤岛或激励不匹配。
- en: 'For AI projects, you can add to the list: “We’re not even sure this thing *works
    the same way every time*” and you’ve got a perfect storm for failure.'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 对于AI项目，你可以添加到列表中：“我们甚至不确定这个事物*每次都能以相同的方式工作*”，你就有了失败的完美风暴。
- en: In this blog post, I’ll share some of the most common failures we’ve encountered
    over the past five years at DareData, and how you can avoid these frequent pitfalls
    in AI projects.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇博客文章中，我将分享过去五年在DareData遇到的一些最常见的失败案例，以及你如何在AI项目中避免这些常见的陷阱。
- en: '* * *'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 1. No Clear Success Metric (Or Too Many)
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1. 没有明确的成功指标（或太多）
- en: If you ask, “*What does success look like for this project?*” and get ten different
    answers, or worse, a shrug, that’s a problem.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你问，“*这个项目的成功是什么样的？*”然后得到十个不同的答案，或者更糟糕的是，一个耸肩，那就是一个问题。
- en: A machine learning project without a sharp success metric is just expensive
    endeavor. And no, “*make a process smarter*” is not a metric.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 没有明确成功指标的机器学习项目只是昂贵的尝试。不，"*使流程更智能*"不是一个指标。
- en: One of the most common mistakes I see in AI projects is trying to optimize for
    accuracy (or other technical metric) while trying to optimize for cost (lower
    cost possible, for example in infrastructure). At some point in the project, you
    may need to increase costs, whether by acquiring more data, using more powerful
    machines, or for other reasons — and this must be done to improve model performance.
    This is clearly not an example of cost optimization.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 我在AI项目中看到的最常见的错误之一是在尝试优化准确性（或其他技术指标）的同时，试图优化成本（例如，在基础设施中降低成本）。在项目的某个阶段，你可能需要增加成本，无论是通过获取更多数据、使用更强大的机器还是其他原因——这必须做到以提高模型性能。这显然不是成本优化的例子。
- en: In fact, you usually need **one** (maybe two) key metrics that map tightly to
    business impact. And if you have more than one success metric, make sure you have
    a priority between them.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，你通常需要**一个**（也许两个）与业务影响紧密相关的关键指标。如果你有多个成功指标，确保它们之间有优先级。
- en: 'How to avoid it:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 如何避免：
- en: '**Set a clear hierarchy of success metrics **before the project starts, agreed
    by all stakeholders involved'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**在项目开始之前，设定一个清晰的成功指标层级，并得到所有相关利益相关者的同意**'
- en: If stakeholders can’t agree on the aforementioned hierarchy, **don’t start the
    project.**
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果利益相关者无法就上述层级达成一致，**不要开始项目**。
- en: '* * *'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 2. Too Many Cooks
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2. 太多厨师
- en: Too many success metrics are normally tied with the “*too many cooks*” problem.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，太多的成功指标都与“*太多厨师*”问题相关联。
- en: AI projects attract stakeholders, and that’s cool! It just shows that people
    are interested in working with these technologies.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: AI项目吸引了利益相关者，这很酷！这仅仅表明人们对与这些技术合作感兴趣。
- en: But, marketing wants one thing, product wants another, engineering wants something
    else entirely, and leadership just wants a demo to show investors or show-off
    to competitors.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，市场营销想要的是一件事，产品想要的是另一件事，工程想要的是完全不同的事情，而领导层只想展示给投资者看或向竞争对手炫耀。
- en: Ideally, you should identify and map the key stakeholders early in the project.
    Most successful projects have one or two champion stakeholders, individuals who
    are deeply invested in the outcome and can drive the initiative forward.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 理想情况下，你应该在项目早期就识别和绘制关键利益相关者。大多数成功的项目都有一个或两个倡导型利益相关者，他们是深深投入结果并能够推动项目向前发展的人。
- en: 'Having more than that can lead to:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 如果有更多的情况，可能会导致：
- en: conflicting priorities or
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 冲突的优先级或
- en: diluted accountability
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 责任稀释
- en: and none of those scenarios are positive.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 而这些场景都不是积极的。
- en: Without a strong single owner or decision-maker, the project turns into a Frankenstein’s
    monster, stitched together on last minute requests or features that aren’t relevant
    for the big goal.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 没有一个强大的单一所有者或决策者，项目就会变成一个弗兰肯斯坦怪物，在最后一刻的请求或与主要目标无关的功能上拼凑在一起。
- en: 'How to avoid it:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 如何避免：
- en: Map the **relevant decision stakeholders** and users.
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 绘制**相关决策利益相关者**和用户。
- en: '**Nominate a project champion** that has the ability to have a last call on
    project decisions.'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**提名一个有能力的项目负责人**，他/她能够在项目决策上做出最终决定。'
- en: '**Map the internal politics of the organization **and their potential impact
    on decision-making authority in the project.'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**绘制组织的内部政治格局**及其对项目决策权可能产生的影响。'
- en: '* * *'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 3. Stuck in Notebook La-La Land
  id: totrans-33
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3. 停留在笔记本的幻想中
- en: A Python notebook is not a product. It’s a research / education tool.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 一个Python笔记本不是一个产品。它是一个研究/教育工具。
- en: A Jupyter proof-of-concept running on someone’s computer is not a production
    level architecture. You can build a beautiful model in isolation, but if no one
    knows how to deploy it, then you’ve built shelfware.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 在某人的电脑上运行的Jupyter原型不是一个生产级别的架构。你可以独立构建一个美丽的模型，但如果没有人知道如何部署它，那么你构建的就是货架上的产品。
- en: 'Real value comes when models are part of a larger system: tested, deployed,
    monitored, updated.'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 当模型成为更大系统的一部分时，才能真正产生价值：经过测试、部署、监控、更新。
- en: Models that are built under MLops frameworks and that are integrated with the
    current companies systems are mandatory for achieving successful results. This
    is specially important in enterprises, that have tons of legacy systems with different
    capabilities and features.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 在MLops框架下构建并与现有公司系统集成的模型对于取得成功结果是强制性的。这在企业中尤为重要，因为它们有成吨的遗留系统，具有不同的功能和特性。
- en: 'How to avoid it:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 如何避免：
- en: Make sure you have engineering capabilities for proper deployment in the organization.
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确保你有在组织中正确部署的工程能力。
- en: Involve the IT department from the start (but don’t let them be a blocker).
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从一开始就涉及IT部门（但不要让他们成为阻碍者）。
- en: '* * *'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 4. Expectations Are a Mess (AI Projects Always “Fail”)
  id: totrans-42
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4. 期望混乱（AI项目总是“失败”）
- en: Most AI models will be “wrong” part of the time. That’s why these models are
    probabilistic. But if stakeholders are expecting magic (for example, 100% accuracy,
    real-time performance, instant ROI) every decent model will feel like a letdown.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数AI模型在某种程度上都会“错误”。这就是为什么这些模型是概率性的。但如果利益相关者期望魔法（例如，100%的准确性，实时性能，即时回报率），每个合理的模型都会让人感到失望。
- en: Although the current “conversational” aspect of most AI models seemed to have
    improved users confidence in AI (if wrong information is passed via text, people
    seem ok with it 😊), the overexpectation of models performance is a significant
    cause of failure of AI projects.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管大多数AI模型的当前“对话”方面似乎提高了用户对AI的信心（如果通过文本传递错误信息，人们似乎可以接受 😊），但模型性能的过度期望是AI项目失败的重要原因。
- en: Companies developing these systems share responsibility. It’s critical to communicate
    clearly that all AI models have inherent limitations and a margin of error. It’s
    specially important to communicate **what AI can do**, **what it can’t**, and **what
    success actually means**. Without that, the perception will always be failure,
    even if technically it’s a win.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 开发这些系统的公司共享责任。明确沟通所有AI模型固有的局限性和误差范围至关重要。特别是，重要的是要沟通**AI能做什么**，**它不能做什么**，以及**成功实际上意味着什么**。没有这些，感知总是失败，即使技术上可能是胜利。
- en: 'How to avoid it:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 如何避免：
- en: Don’t oversell AI’s capabilities
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不要过度夸大AI的能力
- en: Set realistic expectations early.
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 早期设定现实的期望。
- en: '**Define success collaboratively.** Agree with stakeholders on what “good enough”
    looks like for the specific context.'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**共同定义成功**。 与利益相关者就特定情境中的“足够好”达成一致。'
- en: '**Use benchmarks carefully.** Highlight comparative improvements (e.g., “20%
    better than current process”) rather than absolute metrics.'
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**谨慎使用基准**。 强调比较改进（例如，“比当前流程提高20%”）而不是绝对指标。'
- en: '**Educate non-technical teams.** Help decision-makers understand the nature
    of AI—its strengths, limitations, and where it adds value.'
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**教育非技术团队**。 帮助决策者理解人工智能的本质——它的优势、局限性和它增加价值的地方。'
- en: '* * *'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 5. AI Hammer, Meet Every Nail
  id: totrans-53
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 5. 人工智能锤子，面对每一颗钉子
- en: Just because you can slap AI on something doesn’t mean you should. Some teams
    try to force machine learning into every product feature, even when a rule-based
    system or a simple heuristic would be faster, cheaper, better. And it would probably
    inspire more confidence from users.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 只因为你可以在某件事上应用人工智能，并不意味着你应该这样做。有些团队试图将机器学习强加到每个产品特性上，即使基于规则的系统或简单的启发式方法会更快、更便宜、更好。而且这可能会让用户更有信心。
- en: If you overcomplicate things by layering AI where it’s not needed, you’ll likely
    contribute to a bloated, fragile system that’s harder to maintain, harder to explain,
    and ultimately underdelivers. Worse, you might erode trust in your product when
    users don’t understand or trust the AI-driven decisions.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你通过在不需要的地方堆叠人工智能而使事情过于复杂，你可能会贡献一个臃肿、脆弱的系统，这个系统更难维护、更难解释，最终无法达到预期。更糟糕的是，当用户不理解或不信任由人工智能驱动的决策时，你可能会损害产品的信任度。
- en: 'How to avoid it:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 如何避免：
- en: '**Start with the simplest solution.** If a rule-based system works, use it.
    AI should be an hypothesis, not the default.'
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**从最简单的解决方案开始**。 如果基于规则的系统有效，就使用它。人工智能应该是一个假设，而不是默认选项。'
- en: '**Prioritize explainability.** Simpler systems are often more transparent,
    and that can be a feature.'
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**优先考虑可解释性**。 简单的系统通常更透明，这可以成为一个特点。'
- en: '**Validate the value of AI.** Ask: Does adding AI significantly improve the
    outcome for users?'
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**验证人工智能的价值**。 问问：添加人工智能是否显著提高了用户的成果？'
- en: '**Design for maintainability.** Every new model adds complexity. Make sure
    you have the resources needed to maintain the solution.'
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**设计可维护性**。 每个新模型都会增加复杂性。确保你有维护解决方案所需的资源。'
- en: '* * *'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Final Thought
  id: totrans-62
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最后的想法
- en: AI projects are not just another flavor of IT, they’re a different beast entirely.
    They blend software engineering with statistics, human behavior, and organizational
    dynamics. That’s why they tend to fail more spectacularly than traditional tech
    projects.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能项目不仅仅是另一种IT口味，它们是完全不同的生物。它们将软件工程与统计学、人类行为和组织动态相结合。这就是为什么它们往往比传统技术项目失败得更惨烈。
- en: If there’s one takeaway, it’s this: **success in AI is rarely about the algorithms.** It’s
    about clarity, alignment, and execution. You need to know what you’re aiming for,
    who’s responsible, what success looks like, and how to move from a cool demo to
    something that actually runs in the wild and delivers value.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 如果有一个要点，那就是：**人工智能的成功很少是关于算法的**。 它关乎清晰度、一致性和执行力。你需要知道你的目标是什么，谁负责，成功是什么样子，以及如何从令人兴奋的演示过渡到真正在野外运行并产生价值的东西。
- en: So before you start building, take a breath. Ask the tough questions. Do we
    really need AI here? What does success look like? Who’s making the final call?
    How will we measure impact?
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，在你开始构建之前，先深呼吸一下。提出困难的问题。我们真的需要在这里使用人工智能吗？成功是什么样子？谁将做出最终决定？我们将如何衡量影响？
- en: Getting these answers early won’t guarantee success, but it will make failure
    a lot less likely.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 早期获得这些答案并不能保证成功，但它将使失败的可能性大大降低。
- en: Let me know if you know any other common reasons why AI projects fail! If you
    want to discuss these topics feel free to email @ [[email protected]](/cdn-cgi/l/email-protection)
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你知道其他导致人工智能项目失败的原因，请告诉我！如果你想讨论这些话题，请随时通过电子邮件联系 @ [[email protected]](/cdn-cgi/l/email-protection)
