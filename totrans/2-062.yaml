- en: What “Secure MCP” Should Actually Mean
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'MCP does have a few things going for it: built-in tool isolation, user consent
    prompts, and a local-first approach that keeps data on your machine unless you
    say otherwise. This is the part where the spec does its job.'
  prefs: []
  type: TYPE_NORMAL
- en: But—*and it’s a big but*—none of that will save you if you’re out here YOLO-deploying
    your servers with root access, public ports, and no logging. That’s like putting
    a deadbolt on your front door and then leaving the keys in it. So let’s talk about
    what actual secure MCP usage looks like, [according to Anthropic](https://modelcontextprotocol.io/specification/draft/basic/security_best_practices),
    the community, and people who’ve already learned these lessons the hard way.
  prefs: []
  type: TYPE_NORMAL
- en: How OAuth Works in MCP (Without Doing Anything Sketchy)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: OAuth diagrams can feel like someone took a flowchart, spilled spaghetti on
    it, and decided that was good enough. Boxes everywhere. Arrows in all directions.
    Mysterious “consent cookies” floating around like they’re self-explanatory.
  prefs: []
  type: TYPE_NORMAL
- en: But at the heart of it, the idea is simple—especially if you’re using MCP and
    you care about not being creepy.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c46a809aaf752b3d753acd37784141de.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author, inspired by Anthropic
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s say your MCP-powered app wants to access a third-party service on the
    user’s behalf—maybe Dropbox, maybe Notion, maybe some obscure SaaS tool the finance
    team swears by. The catch: you want to do it *with* the user’s consent, not by
    sneaking behind their digital back.'
  prefs: []
  type: TYPE_NORMAL
- en: 'So here’s the flow—minus the spaghetti:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 0: The User Already Logged In'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'You’re not starting from scratch. The user has already authenticated with your
    system, so you’ve got the basics: identity confirmed, session running, good to
    go.'
  prefs: []
  type: TYPE_NORMAL
- en: No need to ask them to prove they’re not a robot again.
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 1: Actually Ask for Consent (Like a Decent System)'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Now comes the important part—third-party access.
  prefs: []
  type: TYPE_NORMAL
- en: Instead of doing something shady like token scraping or pretending to be the
    user, you redirect them to the *actual* third-party authorization server. Think
    Google, Microsoft, or Dropbox—the real deal.
  prefs: []
  type: TYPE_NORMAL
- en: 'The third-party server pops up a consent screen:'
  prefs: []
  type: TYPE_NORMAL
- en: “Hey, this app (via MCP) wants to access your data. Cool with you?”
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The user reads it, thinks, “Sure, I trust this,” and clicks **Approve**.
  prefs: []
  type: TYPE_NORMAL
- en: Magic doesn’t happen yet—but a very important cookie does.
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 2: The Consent Cookie and the Golden Ticket'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Once the user approves, the third-party server sets a **consent cookie** for
    the `mcp-proxy` client. Think of it as a little flag that says, “Yes, this user
    gave explicit, non-coerced permission.”
  prefs: []
  type: TYPE_NORMAL
- en: Along with that, the server issues a **3P (third-party) authorization code**
    and sends it back to the MCP Proxy Server. This code is like a golden ticket—limited-use,
    time-bound, but powerful enough to grant access.
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 3: Code Exchange — The Secret Handshake'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'Now the MCP Proxy Server does what all good proxies do:'
  prefs: []
  type: TYPE_NORMAL
- en: It takes the third-party authorization code and exchanges it for an actual access
    token — the thing that lets your app act on the user’s behalf.
  prefs: []
  type: TYPE_NORMAL
- en: 'But there’s a twist: the proxy also **wraps** that token into a format that
    the MCP Client can understand—a proper **MCP authorization code**. Basically:
    it translates it from “Dropbox-speak” to “MCP-speak.”'
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 4: Pass It Back (With Boundaries)'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The Proxy sends the wrapped code back to the MCP Client.
  prefs: []
  type: TYPE_NORMAL
- en: Now, and *only* now, the MCP Client can use it to call tools or access data
    on behalf of the user. But—and this part is important—it can only do what the
    user consented to. No freelancing, no tool-hoarding, no “oops we accessed your
    calendar too” moments.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Why This Whole Thing Matters
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: This flow might look a bit complicated—but it’s designed that way for a reason.
  prefs: []
  type: TYPE_NORMAL
- en: It puts the **user** in control of what gets accessed.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It guarantees consent is real, **not assumed**.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: And it avoids the horror movie scenario where the MCP Proxy becomes a silent
    middleman with superpowers.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Anthropic (and most people serious about agent security) [recommend this pattern](https://modelcontextprotocol.io/specification/draft/basic/security_best_practices)
    for a reason. If you’re building agent systems that interact with third-party
    APIs, **this is the right way to do it**—with transparency, with structure, and
    most importantly, with the user’s explicit say-so.
  prefs: []
  type: TYPE_NORMAL
- en: How Malicious OAuth Proxying Works (a.k.a. How to Impersonate a User Without
    Asking)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Sometimes, the most dangerous attacks don’t come from brute force. They come
    from **confusion**—not in the hacker, but in the system itself.
  prefs: []
  type: TYPE_NORMAL
- en: Enter the **[Confused Deputy Problem](https://en.wikipedia.org/wiki/Confused_deputy_problem)**—a
    real thing with a real name, and yes, it sounds like something from a spaghetti
    western. But instead of a bumbling sheriff, we’ve got an OAuth proxy doing exactly
    what it was told… by the wrong person.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/2ded2cabd7b4f1e3cb14f0541b8be337.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author, inspired by Anthropic
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s how this kind of attack goes down:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 1: A Misleading Setup'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Our attacker—we’ll call them EvilCorp (what can I say, I’m a fan of Mr. Robot)—starts
    by registering a **legitimate-looking OAuth client** with the third-party service.
    Think “TotallyRealApp, Inc.” with a redirect URI pointing to `attacker.com`.
  prefs: []
  type: TYPE_NORMAL
- en: The auth server approves it because, well, that’s how OAuth works—anyone can
    register a client.
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 2: The Trap is Set'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Next, EvilCorp sends the user a **malicious link**. This link looks normal on
    the surface—it references the legitimate `mcp-proxy` client ID—but it’s crafted
    to redirect to the attacker’s domain after authorization.
  prefs: []
  type: TYPE_NORMAL
- en: Here’s where things start to smell fishy.
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 3: The Cookie That Lied'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The user clicks the link. No red flags pop up, because they’ve previously given
    consent to `mcp-proxy`, and their browser still holds the **consent cookie** from
    that session.
  prefs: []
  type: TYPE_NORMAL
- en: 'So when the third-party server sees the request, it shrugs and says:'
  prefs: []
  type: TYPE_NORMAL
- en: “Ah, this again? Cool, they’ve already approved it. No need to bug them.”
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**No consent screen. No confirmation. No idea they’re being targeted.**'
  prefs: []
  type: TYPE_NORMAL
- en: 'This is the *confused deputy* moment:'
  prefs: []
  type: TYPE_NORMAL
- en: The third-party auth server is acting as the deputy. It thinks it’s helping
    the legitimate client (`mcp-proxy`) do its job.
  prefs: []
  type: TYPE_NORMAL
- en: But it’s actually helping the attacker—because it doesn’t realize it’s being
    misled about *who initiated the request* and *where the result is going*.
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 4: The Token Goes to the Wrong Place'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The third-party service sends the **authorization code** to the MCP Proxy Server
    (still thinking this is a normal flow).
  prefs: []
  type: TYPE_NORMAL
- en: The Proxy exchanges it for an access token, then wraps it into an **MCP authorization
    code**—standard procedure.
  prefs: []
  type: TYPE_NORMAL
- en: Then, the Proxy sends that MCP code to…
  prefs: []
  type: TYPE_NORMAL
- en: 😬 `attacker.com`, because that’s the redirect URI EvilCorp snuck into the flow.
  prefs: []
  type: TYPE_NORMAL
- en: 'Congratulations: the attacker now has **a fully authorized token** tied to
    the user’s identity.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 5: The Attacker Becomes the User'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: With this MCP code, EvilCorp can impersonate the user. They didn’t need the
    user’s password. They didn’t need their approval. They just needed the system
    to confuse *who was asking for what.*
  prefs: []
  type: TYPE_NORMAL
- en: The proxy became the deputy—dutifully carrying out orders—without realizing
    it was working for the wrong sheriff.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Why This Is a Security Nightmare
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'This is what security folks (like Anthropic) call a **Confused Deputy Problem**:'
  prefs: []
  type: TYPE_NORMAL
- en: The system that *has* the authority (the MCP Proxy) gets tricked into using
    it *on behalf of someone who shouldn’t have it* (the attacker).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The real user? Completely out of the loop.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Consent? Skipped.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Damage? Potentially massive — from unauthorized data access to rogue tool execution.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How to Avoid Becoming the Deputy That Gets Played
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This isn’t a “we’ll fix it later” kind of bug. It’s a **fundamental architectural
    risk** if you don’t lock things down properly.
  prefs: []
  type: TYPE_NORMAL
- en: 'To avoid turning your proxy into an unwitting accomplice, Anthropic recommends
    a few security best practices:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/90f3d06850c1bc2b83d4ae32e5bbb94e.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: Authenticate Like You Mean It
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Strong auth isn’t optional. It’s not a nice-to-have. It’s your entire defense
    line between “useful AI assistant” and “this thing just deleted my company database.”
    MCP now supports OAuth 2.1, so there’s no excuse.
  prefs: []
  type: TYPE_NORMAL
- en: Always treat MCP servers like protected resources. *[“MCP servers MUST validate
    the `aud` claim or `resource` parameter to confirm the token is intended for the
    resource being accessed.”](https://modelcontextprotocol.io/specification/draft/basic/authorization#token-audience-validation)*
    Don’t let random clients connect and ask them to execute tools unless they can
    prove they’re allowed. Bonus points for using per-client API keys, dynamic registration,
    and actually verifying the token audience.
  prefs: []
  type: TYPE_NORMAL
- en: Do **not**—and I can’t stress this enough—reuse static client credentials across
    different services. That’s how you accidentally invent a confused deputy attack
    and make your entire architecture one bad token reuse away from going full Mr.
    Robot.
  prefs: []
  type: TYPE_NORMAL
- en: Thou Shalt Not Pass (User Tokens)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: One of the worst anti-patterns? [Token passthrough](https://modelcontextprotocol.io/specification/draft/basic/security_best_practices#token-passthrough).
    Imagine a client hands an MCP server a raw cloud token, and the server just forwards
    it like “sure, bro, I trust you.” Now the logs are broken, the audit trail is
    gone, and you’ve bypassed all downstream rate limits.
  prefs: []
  type: TYPE_NORMAL
- en: The spec makes it clear—token passthrough is a no-go. Your server should either
    fetch its own tokens or thoroughly validate anything a client sends over. Every
    token needs to be tied to your server and used strictly for what it was meant
    for.
  prefs: []
  type: TYPE_NORMAL
- en: Validate Everything (And Then Validate It Again)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: MCP servers often wrap local system tools. That’s great — until someone passes
    `image.jpg; rm -rf /`. Suddenly, your “image converter” is also a “file deleter.”
  prefs: []
  type: TYPE_NORMAL
- en: Validate all input. Do not interpolate strings directly into shell commands.
    Use `subprocess.run([...], shell=False)` or similar safe calls. Normalize paths.
    Whitelist formats. Assume the AI is trying to trick you—even if it isn’t. That’s
    just healthy paranoia.
  prefs: []
  type: TYPE_NORMAL
- en: This also applies to prompt injection. Sanitize incoming content. Wrap it. Audit
    it. MCP doesn’t magically make your LLM immune to prompt attacks. If anything,
    it makes them more dangerous by giving those prompts real-world power.
  prefs: []
  type: TYPE_NORMAL
- en: Run It Like It’s Malware (Because It Might Be)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: MCP servers should run with the fewest permissions humanly possible. Don’t give
    them root. Don’t give them access to your entire file system. Don’t let them talk
    to the internet unless they absolutely need to.
  prefs: []
  type: TYPE_NORMAL
- en: Containerize them. Use AppArmor. Use a sandbox. Restrict APIs. Block egress.
    Just assume that one day, something will go wrong—and when it does, you want the
    blast radius to be a spark, not a crater.
  prefs: []
  type: TYPE_NORMAL
- en: A compromised MCP server with write access to your database isn’t just bad—it’s
    *“regulatory breach with an apology blog post and 2FA codes getting reset”-bad*.
  prefs: []
  type: TYPE_NORMAL
- en: Sessions Are Not Security
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Sessions are for keeping track of context, not authenticating clients. Never
    treat session IDs as proof of identity. Never expose them in URLs. Always tie
    them to user identity and store them server-side.
  prefs: []
  type: TYPE_NORMAL
- en: 'MCP’s statefulness makes this a little tricky, especially across nodes. So
    yes, you’ll need to get creative: shard sessions by user, validate identity on
    each request, and don’t let a valid session on node A mean anything on node B
    without re-authentication.'
  prefs: []
  type: TYPE_NORMAL
- en: Otherwise, welcome to session hijacking hell.
  prefs: []
  type: TYPE_NORMAL
- en: Verify Tools Like They’re Explosives
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Just because someone published an “email-sender” MCP server doesn’t mean it
    only sends emails. It could log them. Or rewrite them. Or forward them to your
    boss with a helpful “I QUIT” note.
  prefs: []
  type: TYPE_NORMAL
- en: Read the code. Use trusted registries. Don’t auto-update from GitHub without
    checking diffs. For critical use cases, fork the tool and control the lifecycle
    yourself. Until the MCP ecosystem has signing, metadata, and reputation baked
    in, the burden is on you.
  prefs: []
  type: TYPE_NORMAL
- en: 'Basically: if you wouldn’t install a random binary from Reddit, don’t plug
    in a random tool from GitHub.'
  prefs: []
  type: TYPE_NORMAL
- en: Log Like a Forensic Investigator
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: MCP isn’t like calling an API. Agents chain tool calls. They reason. They retry.
    You’ll want to know *exactly* what happened when things go sideways.
  prefs: []
  type: TYPE_NORMAL
- en: Log all tool calls, inputs, outputs, timestamps, and user approvals. Monitor
    outbound traffic. Watch for spikes. If your AI suddenly wants to call `send_email`
    100 times at 3AM, maybe don’t sleep on that alert.
  prefs: []
  type: TYPE_NORMAL
- en: No logs = no visibility = no clue what the agent just did = good luck in the
    postmortem.
  prefs: []
  type: TYPE_NORMAL
- en: Humans Must Approve the Scary Stuff
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'This one’s obvious but often overlooked: AI should not delete files, send emails,
    or spend money without someone saying “yes, I want this.”'
  prefs: []
  type: TYPE_NORMAL
- en: That doesn’t mean you need a 20-step approval flow. Just have a button. A prompt.
    Something. Even Claude Desktop requires you to approve tools one-by-one (unless
    you override that, which you shouldn’t).
  prefs: []
  type: TYPE_NORMAL
- en: Avoid consent fatigue. Batch low-risk approvals. Flag anything new or sensitive.
    Don’t let the AI train you to click “Allow” reflexively like a caffeine-deprived
    cookie pop-up zombie.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: These best practices aren’t just nice ideas—they’re seatbelts. You don’t skip
    the seatbelt because the car’s fast. You wear it *because* the car’s fast. And
    MCP is very fast.
  prefs: []
  type: TYPE_NORMAL
- en: Now let’s look at some case studies of what happens when those seatbelts are
    missing…
  prefs: []
  type: TYPE_NORMAL
- en: 'Case Studies: Learning from Real MCP Security Breaches'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To illustrate why these best practices matter, let’s examine a few real-world
    incidents and vulnerabilities that have emerged in the early days of MCP’s ecosystem.
    Each case highlights how failing to follow security guidelines can lead to serious
    consequences – and conversely, how applying the above best practices can prevent
    or contain the damage.
  prefs: []
  type: TYPE_NORMAL
- en: 'Case 1: Remote Code Execution via Exposed MCP Inspector ([CVE-2025-49596](https://thehackernews.com/2025/07/critical-vulnerability-in-anthropics.html))'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Sometimes, security lessons arrive in the form of massive forehead slaps. One
    of the earliest—and most avoidable—MCP-related vulnerabilities was discovered
    July 2025, courtesy of the Oligo Security team. The target? Anthropic’s own **[MCP
    Inspector](https://modelcontextprotocol.io/legacy/tools/inspector)**: a developer
    tool meant to make testing local MCP servers easier.'
  prefs: []
  type: TYPE_NORMAL
- en: Instead, it made remote code execution easier.
  prefs: []
  type: TYPE_NORMAL
- en: 'The vulnerability—**CVE-2025-49596**—turned a local utility into an accidental
    attack surface. And all it took was a bad network config, no authentication, and
    a browser quirk with a catchy name: **[“0.0.0.0 Day.”](https://thehackernews.com/2024/08/0000-day-18-year-old-browser.html)**'
  prefs: []
  type: TYPE_NORMAL
- en: 'What Went Wrong (Spoiler: Basically Everything)'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'MCP Inspector runs two components: a local UI client (your browser) and a local
    proxy server (handling MCP calls). But here’s the problem:'
  prefs: []
  type: TYPE_NORMAL
- en: The proxy server was listening on **`0.0.0.0`**—which means *every* network
    interface, not just localhost.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It had **no authentication**.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It also lacked **any kind of origin or [cross-site request forgery (CSRF)](https://owasp.org/www-community/attacks/csrf)
    protection.**
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Combine that with “0.0.0.0 Day”—a bug where some browsers treated `0.0.0.0`
    as localhost—and you’ve got a cocktail for remote code execution.
  prefs: []
  type: TYPE_NORMAL
- en: Oligo [demonstrated](https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjCAweB0rh6f9P9_QzSXPwdFa-N-PvsEBKsCSlJx_kB8W9VPrDiIRm0d92_MQdITqJJNatRJNTKQWvncuBiNOmwQcfdBDdZnYGSSuk69ttO13C3iC7OMnO0pdW3sEt3q3OQzpmlXwBZM3i9plQ7GvHYRowQmUcxOcY7xWfjqg3BaXFhyyNigrilsKQzZDCn/s728-rw-e365/poc.gif)
    that a malicious website could silently send commands to MCP Inspector using a
    **cross-site request forgery (CSRF)** attack. All the user had to do was… open
    a page. That’s it. No clicks. No warnings. Just vibes and root access.
  prefs: []
  type: TYPE_NORMAL
- en: Once exploited, the attacker could run shell commands, exfiltrate data, or burrow
    deeper into the system. All from the tool you installed to *debug your AI agent*.
  prefs: []
  type: TYPE_NORMAL
- en: The Fix (a.k.a. What Should’ve Been There in the First Place)
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'The patch—**MCP Inspector v0.14.1**—was a direct implementation of the same
    best practices you’ve read about 14 times in this post:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Authentication token** required for every request'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Origin and Host header validation** to block CSRF'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Session token verification** before executing any action'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Localhost-only binding** — no more listening on the whole internet by default'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: With these guardrails in place, those “just visit this site to get pwned” exploits
    stopped working. Because the server finally checked who was talking to it—and
    stopped trusting every request like an overenthusiastic intern.
  prefs: []
  type: TYPE_NORMAL
- en: What We Learned (The Hard Way)
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'This breach was a greatest-hits album of rookie mistakes:'
  prefs: []
  type: TYPE_NORMAL
- en: Trusting that “local” means “safe”
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Exposing tools on open interfaces
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Forgetting that browsers don’t care what you intended—only what’s possible
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If the MCP Inspector had followed even a basic web app threat model, none of
    this would’ve happened. But because it was “just a local tool,” those precautions
    were skipped.
  prefs: []
  type: TYPE_NORMAL
- en: 'As Oligo Security put it:'
  prefs: []
  type: TYPE_NORMAL
- en: '*“Developers unknowingly opened a backdoor to their machine by trusting a debug
    tool with no security.”*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'The takeaway? **Every MCP interface—no matter how local, internal, or “just
    for testing”—needs real security controls**. That means:'
  prefs: []
  type: TYPE_NORMAL
- en: Require authentication
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Validate request origins
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Default to localhost
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Don’t leave debug ports listening on the public internet
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Because in 2025, even your dev tools can be attack vectors—and your browser
    may not have your back.
  prefs: []
  type: TYPE_NORMAL
- en: 'Case 2: Prompt Injection via SQLite MCP Server Exploit'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Let’s rewind to late June 2025, when Trend Micro turned on the spotlight: one
    of Anthropic’s reference SQLite MCP server implementations—not production-grade—harbored
    a classic SQL injection flaw that morphed into a prompt injection nightmare. The
    blog headline says it all: [*“Why a Classic MCP Server Vulnerability Can Undermine
    Your Entire AI Agent”*.](https://www.trendmicro.com/en_ca/research/25/f/why-a-classic-mcp-server-vulnerability-can-undermine-your-entire-ai-agent.html)'
  prefs: []
  type: TYPE_NORMAL
- en: What Exactly Happened?
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The repo had already been **archived by May 29, 2025**, but had been **forked
    over 5,000 times** before then.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The vulnerable engine built SQL queries by **concatenating unsanitized user
    input** with Python’s `sqlite3` driver—no parameterization, no checks, just trust.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Enter **prompt injection**: the AI later reads database output and treats it
    as instructions. Cue malicious data disguised as a support ticket. The AI agent
    executes it—sending emails or deleting records—because it trusted “internal” data
    more than logic.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Sean Park from Trend Micro summed it up:'
  prefs: []
  type: TYPE_NORMAL
- en: '*“AI agents tend to treat internal data as safe… so if an attacker embeds a
    prompt at that point, the agent may execute it unaware.”*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'In short: SQL injection isn’t just a data layer flaw anymore—it’s a command
    prompt waiting to spring.'
  prefs: []
  type: TYPE_NORMAL
- en: Why It Was Especially Dangerous
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The vulnerable server was openly available and meant as a reference, yet many
    reused it in real environments.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'It carried a **supply chain risk**: code widely copied and never patched.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Anthropic explicitly said **[no fix will be issued](https://github.com/modelcontextprotocol/servers/issues/1348)**—it
    was archived and marked “out of scope”.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: That patch never happened, meaning vulnerabilities persist in the wider MCP
    world.
  prefs: []
  type: TYPE_NORMAL
- en: What Should’ve Been Done (And Still Can Be)
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'This attack chain—**SQL injection → stored prompt injection → compromised agent
    workflows**—demands layered defenses:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Fix the server code**: Use parameterized queries (never string-concat SQL)
    to sanitize inputs. It’s 2025, but OWASP basics still apply.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Treat all stored content as untrusted**: When your agent pulls content from
    a local DB, validate it like it came from a stranger. Check the data types, escape
    special characters, and use safe wrappers or delimiters before including it in
    prompts or tool calls. Just because you wrote it doesn’t mean it’s safe now.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Require human approval** for dangerous operations. Even after the AI processes
    internal data, any destructive command (e.g. deleting records or elevating privileges)
    should be gated behind a prompt or admin confirmation.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Trend Micro’s summary: *if yesterday’s web-app mistakes slip into AI systems,
    an attacker gains a shortcut from SQL bug to full agent compromise.*'
  prefs: []
  type: TYPE_NORMAL
- en: 'Case 3: When Enterprise Integration Met the Real World'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: It’s one thing to prototype with MCP in a local dev loop. It’s another thing
    entirely when a billion-dollar company hooks it up to real user data. In 2025,
    several early enterprise adopters of MCP learned this the hard way—on live infrastructure,
    with real customers watching.
  prefs: []
  type: TYPE_NORMAL
- en: 'Asana: The “Oops, That Wasn’t Your Data” Moment'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'In June 2025, Asana quietly rolled out a new MCP integration: the goal was
    to connect AI agents to their product suite to power automation and smart assistant
    features. But shortly after launch, things took a wrong turn.'
  prefs: []
  type: TYPE_NORMAL
- en: 'A bug in the system allowed one customer to **access another customer’s data**—a
    textbook **[multi-tenant access control failure](https://www.upguard.com/blog/asana-discloses-data-exposure-bug-in-mcp-server)**.
    When Asana discovered the issue, they acted fast: integration shut down, fix deployed,
    affected customers notified. Full credit for transparency.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Still, the root cause was a classic: shared infrastructure without properly
    isolated auth tokens or data partitions. In an MCP world, where agents and tools
    can span tenants, these controls aren’t optional—they’re survival gear.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Lesson: If your MCP server serves multiple orgs, **segregate everything**.'
  prefs: []
  type: TYPE_NORMAL
- en: 'That means:'
  prefs: []
  type: TYPE_NORMAL
- en: Auth tokens scoped per tenant
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Namespacing on tool invocations
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Context boundaries the AI can’t cross
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: And no shared memory unless you *really* know what you’re doing
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Atlassian: Living Off AI, Literally'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Over at Atlassian, the team integrated MCP into Jira Service Management, aiming
    to bring AI into ticket handling and workflow orchestration. It worked—maybe a
    little *too* well.
  prefs: []
  type: TYPE_NORMAL
- en: Security researchers at Cato Networks’ Threat Labs took a closer look and discovered
    what they called a [**“Living Off AI” attack**](https://www.catonetworks.com/blog/cato-ctrl-poc-attack-targeting-atlassians-mcp/#:~:text=,connected%20AI%20action).
    The idea? Use prompt injection not just to hijack the AI’s response, but to abuse
    its access to backend tools—think scripting unauthorized actions by smuggling
    them into ticket comments or user fields.
  prefs: []
  type: TYPE_NORMAL
- en: Because the AI had elevated privileges and direct access to Jira APIs, a single
    poisoned prompt could trigger real, privileged behavior—without tripping the usual
    alarms. In a real incident, this could escalate quickly from “weird ticket reply”
    to “suddenly deactivated accounts and modified permissions.”
  prefs: []
  type: TYPE_NORMAL
- en: 'To Atlassian’s credit, the design had audit logs and bounded actions, so this
    was caught before it caused damage. But the report underscored something everyone
    needs to hear:'
  prefs: []
  type: TYPE_NORMAL
- en: AI privilege != user privilege
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Just because the AI *can* call a tool doesn’t mean it *should* do so unsupervised.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: What These Incidents Really Tell Us
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Enterprise adoption of MCP isn’t just about scaling—it’s about **operationalizing
    security and trust**. These real-world cases revealed that:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Multi-tenant MCP servers must enforce strict data and token isolation**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Prompt injection isn’t theoretical** when agents are hooked into real workflows'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Privileged agents need bounded permissions and human-in-the-loop approvals**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The good news? Both companies shared their experiences early—before things got
    worse. Their disclosures are a reminder that **early transparency can be just
    as valuable as early adoption**.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: These cases above are just the tip of the iceberg. Trend Micro’s survey uncovered
    **[492 MCP servers publicly exposed](https://www.trendmicro.com/vinfo/us/security/news/cybercrime-and-digital-threats/mcp-security-network-exposed-servers-are-backdoors-to-your-private-data)**—none
    with client authentication or encryption—offering unfettered access to internal
    APIs, proprietary data, and backend systems, many hosted in public cloud environments
    like AWS and GCP.
  prefs: []
  type: TYPE_NORMAL
- en: 'Their research warns: these are not theoretical vulnerabilities. Exposed servers
    often act as direct backdoors into confidential systems, sometimes enabling attackers
    to **list, modify, or delete cloud infrastructure** using hardcoded credentials
    or wide-open tokens.'
  prefs: []
  type: TYPE_NORMAL
- en: General Critiques—It’s Not Just MCP
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'A lot of what’s going wrong with MCP security isn’t new—it’s the same old web
    risk in a flashier package. Think of MCP servers like third-party desktop plugins
    or browser extensions: easy to install, easy to trust… until they’re not.'
  prefs: []
  type: TYPE_NORMAL
- en: The danger? *“MCP is standardized, so it must be safe”* thinking—when in reality,
    defaults were wide open. Thought leaders in AI security emphasize that [**traditional
    security principles still apply**:](https://protectai.com/blog/mcp-security-101#:~:text=While%20AI%20is%20a%20new,in%20these%20discussions%20and%20articles)
  prefs: []
  type: TYPE_NORMAL
- en: Don’t install what you don’t explicitly trust
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Always apply the **[principle of least privilege](https://en.wikipedia.org/wiki/Principle_of_least_privilege)**
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Use **[defense-in-depth](https://www.trendmicro.com/vinfo/us/security/news/cybercrime-and-digital-threats/mcp-security-network-exposed-servers-are-backdoors-to-your-private-data?utm_source=chatgpt.com)**,
    even if the stack feels new and shiny
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Moreover, the design of MCP made trade-offs—favoring usability over strict security.
    That made life easy for developers *until* attackers started treating MCP servers
    like entry points. Now, developers are tightening default security settings, making
    token pass‑through forbidden by default, and hardening recommendations in the
    specification itself .
  prefs: []
  type: TYPE_NORMAL
- en: 'Future Outlook: Evolving Security in MCP and Agentic Protocols'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Right now, MCP and its cousins (similar agentic protocols such as Agent2Agent,
    ANP, Agora, etc.) are like teenagers with superpowers—capable of amazing things,
    but still figuring out boundaries, safety rules, and how not to blow up the house.
    But things are maturing fast. The next generation of agent protocols will be less
    “duct tape and hope” and more “zero trust by design.”
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are some ways we can expect things to evolve:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/9f681ebf7f4b7b8825bf459e3d00c952.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: Stronger Identity and Trust Models
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Currently, if you show up with a working token, the MCP server shrugs and says,
    “Good enough.” That’s fine for now—but long term, we’re heading toward a **zero-trust
    model**, where identity is verified not just once at login, but on **[every single
    tool call](https://protectai.com/blog/mcp-security-101#:~:text=2,MCP%20server%20and%20scan%20accordingly)**.
  prefs: []
  type: TYPE_NORMAL
- en: We may see concepts like ***agent identity tokens*** that cryptographically
    identify not just the human user but the specific agent or chain-of-tools involved,
    allowing finer access control. Other agent protocols (e.g. inter-agent communication
    standards like A2A or ANP) are being designed with [**structured handshakes for
    every interaction**](https://www.anup.io/p/the-agentic-protocols-that-will-define).
    This means when Agent A wants to talk to Agent B, they perform a capability negotiation
    and auth exchange each time, ensuring neither blindly trusts the other without
    verification. Such patterns could inform a future MCP 2.0 where every tool execution
    request carries a proof of the caller’s authenticity and perhaps intent. Also,
    as industry consortia get involved, we might see standard schemas for agent identity
    (similar to how [OIDC](https://www.microsoft.com/en-us/security/business/security-101/what-is-openid-connect-oidc)
    standardizes user identity claims).
  prefs: []
  type: TYPE_NORMAL
- en: Granular Permissions and Automatic Sandboxing
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Future versions of MCP are likely to include first-class support for ***permission
    scopes*.** Imagine an MCP schema declaring: “This server provides a `delete_file`
    action—it requires admin privileges.” An AI client could then enforce that only
    certain roles or approved agents can call that action. Granular permissioning
    was noted on the [MCP roadmap as an area of exploration](https://modelcontextprotocol.io/development/roadmap)
    (e.g., “granular permissioning for human-in-the-loop workflows”). Moreover, we
    can expect **automated sandboxing** to become standard. Think of it like browser
    extension permissions—but for tools like `send_email` or `modify_infrastructure`.
    Some proposals suggest that MCP servers could declare a **“safety profile”** –
    e.g., whether they perform file writes, network calls, etc. – and AI runtimes
    could then automatically run more dangerous servers in isolated sandboxes or VMs.
    This way, even if an MCP server is compromised, the harm is contained. The concept
    is analogous to web browser extensions that run in isolated contexts with only
    specific allowed API calls.'
  prefs: []
  type: TYPE_NORMAL
- en: Integrated Audit and Traceability
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: If we want to trust agents with real work, we need to know what they did, when,
    and why. In the future, agent protocols like MCP may include **built-in tracing,
    telemetry, and audit hooks**—so when your AI assistant deletes 4,000 rows from
    the CRM, there’s a paper trail.
  prefs: []
  type: TYPE_NORMAL
- en: For example, an MCP request could carry a **session fingerprint** or **trace
    token** that all components must log, making it simpler to correlate events. Efforts
    could align with initiatives like [OpenTelemetry](https://opentelemetry.io/)—envision
    standardized telemetry for AI agent action. Security frameworks might also coalesce
    around a common event format for AI agent activity (much like [Open Cybersecurity
    Schema Framework (OCSF)](https://ocsf.io/) created a common format for security
    logs). The result? You can finally debug your agents without needing a prompt
    archaeologist.
  prefs: []
  type: TYPE_NORMAL
- en: Policy and Governance Layers
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Just like we have firewalls and access control lists for networks, we’re going
    to need **AI governance policies** for agents. Think:'
  prefs: []
  type: TYPE_NORMAL
- en: “Agent may not access financial APIs between 10pm–6am.”
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: “Never output more than 100 rows from a database unless redacted.”
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: “No, you can’t delete the production environment on a Friday.”
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These rules won’t live *inside* the agent—they’ll sit above it, enforced by
    **governance services or agent policy gateways** (some of which already exist,
    like [Zenity](https://zenity.io/blog/current-events/model-context-protocol)‘s
    policy-layer observability tooling).
  prefs: []
  type: TYPE_NORMAL
- en: 'In tandem, expect **education and culture** to evolve: organizations will craft
    **AI acceptable usage policies**. Just like we have HR policies for employee behavior,
    orgs will start publishing AI behavior guidelines—and protocols like MCP will
    need enforcement points to match.'
  prefs: []
  type: TYPE_NORMAL
- en: Cross-Protocol Security Consistency
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As MCP evolves, it won’t live alone. Agent protocols like **A2A** (for multi-agent
    collaboration), **[Agora](https://agoraprotocol.org/)** (for open marketplaces),
    or even **[robot communication protocols](https://thinkrobotics.com/blogs/learn/robot-communication-protocols-a-comprehensive-guide?srsltid=AfmBOop3oxaGivEv2Qhxu3pTuHfDH36qSB2mJeBf_2daW9W_NDaS8dKQ)**
    are emerging—and they all need to play well together.
  prefs: []
  type: TYPE_NORMAL
- en: 'That means:'
  prefs: []
  type: TYPE_NORMAL
- en: Shared security context across protocols
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: User identity and permission propagation between agent layers
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Avoiding “loophole attacks” where an agent switches protocols to bypass policy
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We’ll probably see **security brokers** that mediate between protocols—ensuring
    core security principles (auth, audit, allowlists, etc.) apply no matter where
    the agent operates. And yes, standards bodies like **IETF or IEEE** might eventually
    step in with the “Agent Security Best Practices RFC 9001.”
  prefs: []
  type: TYPE_NORMAL
- en: Until then, we’re stitching it together ourselves.
  prefs: []
  type: TYPE_NORMAL
- en: Continuous Community Involvement
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Finally, the future of MCP security will be heavily influenced by community
    involvement. The current trajectory—with open [RFCs](https://en.wikipedia.org/wiki/Request_for_Comments),
    public debates, and rapid responses to discovered issues—is encouraging. We can
    expect more **SEP (Standard Enhancement Proposal) submissions** focusing on security
    (for instance, an SEP for a standardized permission schema, or an SEP for encrypted
    invocation contexts, etc.).
  prefs: []
  type: TYPE_NORMAL
- en: 'Security researchers, industry leaders, and devs are already shaping the protocol’s
    direction through:'
  prefs: []
  type: TYPE_NORMAL
- en: Publicly disclosed flaws and postmortems that **actually help others**
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Open-source audits and patches
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Contributions from teams like **[Trail of Bits](https://blog.trailofbits.com/categories/mcp/)**,
    and **[Protect AI](https://protectai.com/blog/mcp-security-101)**
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Blog posts and community debates (see: [Omar Santos, Cisco](https://community.cisco.com/t5/security-blogs/ai-model-context-protocol-mcp-and-security/ba-p/5274394))'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Eventually, we may even get **certified secure MCP server implementations**—complete
    with an audit badge and a comforting checklist.
  prefs: []
  type: TYPE_NORMAL
- en: Until then, security in MCP isn’t a solved problem—it’s a live one. But at least
    we’re not pretending anymore.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 'MCP and its fellow agentic protocols are ushering in a new era of AI capabilities—one
    where AI agents don’t just think and speak, but *act* on our digital behalf. With
    that comes a blending of application security, API security, and AI safety concerns
    unlike anything before. The best practices we’ve outlined here boil down to a
    simple ethos: treat your AI agents as you would a new junior employee with root
    access – give them only the access they need, watch what they’re doing, and double-check
    when they try something risky. The community’s experiences so far show that when
    we do that, we can reap the benefits of MCP’s flexibility *without* opening the
    door to chaos. By building in security from the ground up—and continuously iterating
    on it as threats evolve—we can enable the future of agentic AI with confidence
    and control.'
  prefs: []
  type: TYPE_NORMAL
