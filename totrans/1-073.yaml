- en: How Relevance Models Foreshadowed Transformers for NLP
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/how-relevance-models-foreshadowed-transformers-for-nlp/](https://towardsdatascience.com/how-relevance-models-foreshadowed-transformers-for-nlp/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1763493428244" class="mdspan-comment">Isaac Newton’s famous
    remark</mdspan> — that he saw further only by standing on the shoulders of giants
    — captures a timeless truth about science. Every breakthrough rests on countless
    layers of prior progress, until one day … it all just works. Nowhere is this more
    evident than in the recent and ongoing revolution in natural language processing
    (NLP), driven by the Transformers architecture that underpins most generative
    AI systems today.
  prefs: []
  type: TYPE_NORMAL
- en: '*“If I have seen further, it is by standing on the shoulders of Giants.”*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*— Isaac Newton, letter to Robert Hooke, February 5, 1675 (Old Style calendar;
    1676 New Style)*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![](../Images/0fcaeb1b992da3de2090a3ba4b3005b3.png)'
  prefs: []
  type: TYPE_IMG
- en: '**Figure 1: **Statue of Sir Isaac Newton, Chapel of Trinity College, Cambridge
    (by Louis-François Roubiliac, 1755). 📖 **Source:** Image by author via GPT5.'
  prefs: []
  type: TYPE_NORMAL
- en: In this article, I take on the role of an academic Sherlock Holmes, tracing
    the evolution of* language modelling*.
  prefs: []
  type: TYPE_NORMAL
- en: '*A language model is an AI system trained to predict and generate sequences
    of words based on patterns learned from large text datasets. It assigns probabilities
    to word sequences, enabling applications from speech recognition and machine translation
    to today’s generative AI systems.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Like all scientific revolutions, language modelling did not emerge overnight
    but builds on a rich heritage. In this article, I focus on a small slice of the
    vast literature in the field. Specifically, our journey will begin with a pivotal
    earlier technology — the [Relevance-Based Language Models](https://sigir.org/wp-content/uploads/2017/06/p260.pdf) of
    Lavrenko and Croft — which marked a step change in the performance of Information
    Retrieval systems in the early 2000s and continues to leave its mark in[ TREC
    competitions](https://trec.nist.gov/). From there, the trail leads to 2017, when
    Google published the seminal [Attention Is All You Need](https://arxiv.org/abs/1706.03762) paper,
    unveiling the Transformers architecture that revolutionised sequence-to-sequence
    translation tasks.
  prefs: []
  type: TYPE_NORMAL
- en: The key link between the two approaches is, at its core, quite simple: *the
    powerful idea of attention*. Just as Lavrenko and Croft’s Relevance Modelling
    estimates which terms are most likely to co-occur with a query, the Transformer’s
    attention mechanism computes the similarity between a query and all tokens in
    a sequence, weighting each token’s contribution to the query’s contextual meaning.
  prefs: []
  type: TYPE_NORMAL
- en: '*In both cases the attention mechanism acts as a soft probabilistic weighting
    mechanism, giving both techniques their raw representational power.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Both models are generative frameworks over text, differing mainly in their
    scope: RM1 models short queries from documents, transformers model full sequences.'
  prefs: []
  type: TYPE_NORMAL
- en: In the following sections, we will explore the background of Relevance Models
    and the Transformer architecture, highlighting their shared foundations and clarifying
    the parallels between them.
  prefs: []
  type: TYPE_NORMAL
- en: Relevance Modelling — Introducing Lavrenko’s RM1 Mixture Model
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let’s dive into the conceptual parallel between Lavrenko & Croft’s Relevance
    Modelling framework in Information Retrieval and the Transformer’s attention mechanism.
    Both emerged in different domains and eras, but they share the same intellectual
    DNA. We will walk through the background on Relevance Models, before outlining
    the key link to the subsequent Transformer architecture.
  prefs: []
  type: TYPE_NORMAL
- en: 'When Victor Lavrenko and W. Bruce Croft introduced the Relevance Model in the
    early 2000s, they offered an elegant probabilistic formulation for bridging the
    gap between queries and documents. At their core, these models start from a simple
    idea: assume there exists a hidden *“relevance distribution*” over vocabulary
    terms that characterises documents a user would consider relevant to their query.
    The task then becomes estimating this distribution from the observed data, namely
    the user query and the document collection.'
  prefs: []
  type: TYPE_NORMAL
- en: The first Relevance Modelling variant — RM1 (there were two other models in
    the same family, not highlighted in detail here) — does this directly by *inferring
    the distribution of words likely to occur in relevant documents given a query*,
    essentially modelling relevance as a latent language model that sits***“behind” *both
    queries and documents.**
  prefs: []
  type: TYPE_NORMAL
- en: '**![](../Images/6b2fd3e75bbd686000b0517a5d8229d9.png)'
  prefs: []
  type: TYPE_NORMAL
- en: '*The RM1 relevance model estimates the probability of a word *w* under the
    hidden relevance distribution given a query *q*. It does so by marginalizing over
    documents *d*, weighting each term likelihood *P(w|d)* by the posterior probability
    of the document given the query, *P(d|q)*.*'
  prefs: []
  type: TYPE_NORMAL
- en: 'with the posterior probability of a document d given a query q given by:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/6d843633631504c0c9f8bbe4de79137e.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Posterior probability of a document *d* given a query *q*. This is obtained
    by applying Bayes’ rule, where *P(q|d)* is the query likelihood under the document
    language model and *P(d)* is the prior over documents.*'
  prefs: []
  type: TYPE_NORMAL
- en: This is the classic *unigram language model with Dirichlet smoothing *proposed
    in the original paper by Lavrenko and Croft. To estimate this relevance model,
    RM1 uses the top-retrieved documents as *pseudo-relevant feedback (PRF) —* it
    assumes the highest-scoring documents are likely to be relevant. This means that
    no costly relevance judgements are required, a key advantage of Lavrenko’s formulation.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/0539000256541156b7fc75f13f4b2bd9.png)'
  prefs: []
  type: TYPE_IMG
- en: '***Figure 2: ****Geometric intuition of RM1. *The top-ranked documents are
    represented as multinomial distributions inside a 3-term probability simplex.
    The smooth contour surface shows their estimated density under the relevance model.
    The starred point corresponds to the latent multinomial **p(w|R)** that RM1 seeks
    to recover. 📖 **Source: **Image by author.'
  prefs: []
  type: TYPE_NORMAL
- en: To build up an intuition into how the RM1 model works, we’ll code it up step-by-step
    in Python, using a simple toy document corpus consisting of three “documents”,
    defined below, with a query “cat”.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'Next — for the purposes of this toy example IR situation— we lightly pre-process
    the document collection, by splitting the documents into tokens, determining the
    count of each token within each document, and defining the vocabulary:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: If we run the above code we will get the following output, with four simple
    data structures holding the information we need to compute the RM1 distribution
    of relevance for any query.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: 'If we look at the RM1 equation defined earlier, we can break it up into key *probabilistic
    components*. P(w|d) defines the probability distribution of the words w in a document
    d. P(w|d) is usually computed using Dirichlet prior smoothing [(Zhai & Lafferty,
    2001)](https://www.iro.umontreal.ca/~nie/IFT6255/lafferty-zhai.pdf). This prior
    avoids zero probabilities for unseen words and balances document-specific evidence
    with background collection statistics. This is defined as:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/72042bd51a424a7971bc9a6ef6059cad.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Dirichlet prior smoothing for document language models. The estimate *P(w|d)* interpolates
    between the document-specific relative frequency of a word and its background
    probability in the collection, with the parameter *μ *controlling the strength
    of smoothing.*'
  prefs: []
  type: TYPE_NORMAL
- en: The above equation gives us a *bag of words unigram model* for each of the documents
    in our corpus. As an aside, you can imagine how these days — with powerful language
    models available of Hugging-face — we could swap out this formulation for e.g.
    a [BERT-based](https://en.wikipedia.org/wiki/BERT_(language_model)) variant, using
    embeddings to estimate the distribution *P(w|d)*.
  prefs: []
  type: TYPE_NORMAL
- en: 'In *a BERT-based approach *to *P(w|d)*, we can derive a document embedding
    g(d) via mean pooling and a word embedding *e(w)*, then combine them in the following
    equation:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/466bea670c93225dcb515f584595ccb3.png)'
  prefs: []
  type: TYPE_IMG
- en: Equation for estimating P(w|d) in a BERT-based relevance model, using mean-pooled
    document embeddings g(d) and word embeddings e(w).
  prefs: []
  type: TYPE_NORMAL
- en: Here V denotes the pruned vocab (e.g., union of document terms) and 𝜏 is a temperature
    parameter. This could be the first step on creating a *Neural Relevance Model
    (NRM)*, an untouched and potentially novel direction in the field of IR.
  prefs: []
  type: TYPE_NORMAL
- en: 'Back to the original formulation: this prior formulation can be coded up in
    Python, as our first estimate of *P(w|d)*:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: 'Next up, we compute the query likelihood under the document model — *P(q|d)*:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: 'RM1 requires *P(d|q),* so we flip the probability — *P(q|d)* — *using Bayes
    rule*:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: 'We assume here that the document prior is uniform, and so it cancels. We also
    then normalize across all documents so the posteriors sum to 1:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/77234f206725602d77c4c262e0381a88.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Normalization of posterior probabilities across documents. Each *P(d|q)* is
    obtained by dividing the unnormalized score *P(q”d)P(d)* by the sum over all documents,
    ensuring that the posteriors form a valid probability distribution that sums to
    1.*'
  prefs: []
  type: TYPE_NORMAL
- en: 'Similar to *P(w|d)*, it is worth thinking how we could *neuralise* the *P(d|q)* terms
    in RM1\. A first approach would be to use an off-the-shelf cross- or dual-encoder
    model (such as the MS MARCO–fine-tuned BERT cross-encoder) to embed the query
    and document, produce a similarity score, and normalize it with a softmax:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/5e66703a68a7de0acee984c3627cca53.png)'
  prefs: []
  type: TYPE_IMG
- en: Query–document distribution P(d|q), obtained by scoring each document with a
    neural model (cross-encoder or dual-encoder) and normalizing over documents in
    a pseudo-relevant set (PRF).
  prefs: []
  type: TYPE_NORMAL
- en: With *P(d|q)* and *P(w|d)* converted to neural network-based representations,
    we can plug both together to get a simple initial version of a neural RM1 model
    that will give us back *P(w|q)*.
  prefs: []
  type: TYPE_NORMAL
- en: 'For the purposes of this article — however — we will switch back into the classic
    RM1 formulation. Let’s run the (non-neural, standard RM1) code so far to see the
    output of the various components we’ve just discussed. Recall that our toy document
    corpus is:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: 'Assuming Dirichlet smoothing (with μ=2000), the values will be *very close *to
    the collection probability of “cat” since the documents are very short. For illustration:'
  prefs: []
  type: TYPE_NORMAL
- en: '**d1**: “cat” appears once in 6 words → *P(q|d1) *is approximately 0.16'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**d2**: “cat” appears once in 6 words → *P(q|d2)* is approximately 0.16'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**d3**: “cat” never appears → *P(q|d3)* is approximately 0 (with smoothing,
    a small >0 value)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'We now normalize this distribution to arrive at the posterior distribution:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: '*What is the key difference between P(d|q) and P(q|d)?*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*P(q|d) *tells us how well the document* “explains” *the query. If we imagine
    that each document is itself a mini language model: if it were generating text,
    how likely is it to produce the words we see in the query? This probability is
    high if the query words look natural under the documents word distribution. For
    example, for query “cat”, a document that literally mentions “cat” will give a
    high likelihood; one about “dogs and cats” a bit less; one about “Charles Dickens”
    close to zero.'
  prefs: []
  type: TYPE_NORMAL
- en: '*In contrast, the probability P(d|q) codifies how much we should trust the
    document given the query. This flips the perspective using Bayes rule: now we
    ask, given the query, what’s the probability the user’s relevant document is d?*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: So instead of evaluating how well the document explains the query, we treat
    documents as* competing hypothese*s for relevance and normalise them into a distribution
    over all documents. This gives us a ranking score turned into probability mass
    — the higher it is, the more likely this document is relevant compared to the
    rest of the collection.
  prefs: []
  type: TYPE_NORMAL
- en: 'We now have all components to finish our implementation of Lavrenko’s RM1 model:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: We can now see that RM1 defines a probability distribution over the vocabulary
    that tells us which words are most likely to occur in documents relevant to the
    query. This distribution can then be used for query expansion, by adding high-probability
    words, or for re-ranking documents by measuring the KL divergence between each
    document’s language model and the query’s relevance model.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: 'In our toy example, the term *“cat”* naturally rises to the top, as it matches
    the query directly. High-frequency background words like *“the”* also appear strongly,
    though in practice these would be filtered out as stop words. More interestingly,
    content words from documents containing *“cat”* (such as *sat, mat, dog, barked*)
    are elevated as well. This is the power of RM1: it introduces related terms not
    present in the query itself, without requiring explicit relevance judgments or
    supervision. Words unique to *d3* (e.g., *friends, dogs, cats*) receive small
    but nonzero probabilities thanks to smoothing.'
  prefs: []
  type: TYPE_NORMAL
- en: '*RM1 defines a query-specific relevance model, a language model induced from
    the query, which is estimated by averaging over documents likely relevant to that
    query.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Having now seen how RM1 builds a query-specific language model by reweighing
    document terms according to their posterior relevance, it’s hard not to notice
    the parallel with what came much later in deep learning: *the attention mechanism
    in Transformers.*
  prefs: []
  type: TYPE_NORMAL
- en: 'In RM1, we estimate a new distribution P(w|R, q) over words by combining document
    language models, weighted by how likely each document is relevant given the query.
    The Transformer architecture does something rather similar: given a token (the
    “query”), it computes a similarity to all other tokens (the “keys”), then uses
    those scores to weight their “values.” This produces a new, context-sensitive
    representation of the query token.'
  prefs: []
  type: TYPE_NORMAL
- en: Lavrenko’s RM1 Model as a “proto-Transformer”
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The attention mechanism, introduced as part of the Transformer architecture,
    was designed to overcome a key weakness of earlier sequence models like LSTMs
    and RNNs: *their short memory horizons*. While recurrent models struggled to capture
    long-range dependencies, attention made it possible to directly connect any token
    in a sequence with any other, regardless of the distance in the sequence.
  prefs: []
  type: TYPE_NORMAL
- en: What’s interesting is that the mathematics of attention looks very similar to
    what RM1 was doing many years earlier. In RM1, as we’ve seen, we build a query-specific
    distribution by weighting documents; in Transformers, we build a token-specific
    representation by weighting other tokens in the sequence. The principle is the
    same — assign *probability mass* to the most relevant context — but applied at
    the token level rather than the document level.
  prefs: []
  type: TYPE_NORMAL
- en: '*If you strip Transformers down to their essence, the attention mechanism is
    really just RM1 applied at the token level.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: This might be seen as a bold claim, so it’s incumbent upon us to provide some
    proof!
  prefs: []
  type: TYPE_NORMAL
- en: Let’s first dig a little deeper into the attention mechanism, and I defer to
    the fantastic wealth of high-quality [existing introductory material for a fuller
    and deeper div](https://nlp.seas.harvard.edu/2018/04/03/attention.html)e.
  prefs: []
  type: TYPE_NORMAL
- en: In the Transformer’s attention layer — *known as scaled dot-product attention* —
    given a query vector q, we compute its similarity to all other tokens’ keys k.
    These similarities are normalized into weights through a softmax. Finally, those
    weights are used to blend the corresponding values v, producing a new, context-aware
    representation of the query token.
  prefs: []
  type: TYPE_NORMAL
- en: 'Scaled dot-product attention is:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/1a2a03be4a9a55f95acc2f39e3e45eda.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Scaled dot-product attention: query vectors *Q* are matched to key vectors *K* to
    produce attention weights via a softmax, which are then used to form a weighted
    combination of value vectors *V*. This mechanism lets the model focus on the most
    relevant context elements for each query.*'
  prefs: []
  type: TYPE_NORMAL
- en: Here, Q = query vector(s), K = key vectors (documents, in our analogy, V = value
    vectors (words/features to be mixed). The softmax is a normalised distribution
    over the keys.
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, recall RM1 (Lavrenko & Croft 2001):'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a023d1afeaebcba97a6df9b9da86201b.png)'
  prefs: []
  type: TYPE_IMG
- en: '**RM1: **a mixture of document specific distributions weighted by query relevance'
  prefs: []
  type: TYPE_NORMAL
- en: 'The attention weights in scaled dot-product attention parallel the document–query
    distribution P(d|q) in RM1\. Reformulating attention in per-query form makes this
    connection explicit:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/7f57ed4e2386ea23d44e4900d6304610.png)![](../Images/e5e5e211711a69dae42c8483c4187914.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Per-query formulation of scaled dot-product attention: each query attends
    to documents (keys), producing attention weights *α(i|q)* that are used to form
    a weighted combination of values *v*. This directly parallels RM1, where a query
    induces a distribution over documents that is then used to mix their word distributions.*'
  prefs: []
  type: TYPE_NORMAL
- en: The value vector — v — in attention can be thought of as corresponding to P(w|d)
    in the RM1 model, but instead of an explicit word distribution, v is a dense semantic
    vector — a *low-rank surrogate *for the full distribution. It’s effectively the
    content we mix together once we arrive at the relevance scores for each document.
  prefs: []
  type: TYPE_NORMAL
- en: '*Zooming out to the wider Transformer architecture, Multi-head attention can
    be seen as running multiple RM1-style relevance models in parallel with different
    projections.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: We can additionally draw further parallels with the wider Transfomer architecture.
  prefs: []
  type: TYPE_NORMAL
- en: '**Robust Probability Estimation: **For example, we have previously discussed
    that RM1 needs smoothing (e.g., Dirichlet) to smooth zero counts and avoid overfitting
    to rare terms. Similarly, Transformers use residual connections and layer normalisation
    to stabilise and avoid collapsing attention distributions. Both models enforce
    robustness in probability estimation when the data signal is sparse or noisy.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Pseudo Relevance Feedback:** RM1 performs a single round of probabilistic
    expansion through pseudo-relevance feedback (PRF), restricting attention to the
    top-K retrieved documents. The PRF set functions like an attention context window:
    the query distributes probability mass over a limited set of documents, and words
    are reweighed accordingly. Similarly, transformer attention is limited to the
    local input sequence. Unlike RM1, however, transformers stack many layers of attention,
    each one reweighting and refining token distributions. Deep attention stacking
    can thus be seen as *iterative pseudo-relevance feedback* — repeatedly pooling
    across related context to build richer representations.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The analogy between RM1 and the Transformer is summarised in the below table,
    where we tie together each component and draw links between each:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a50d44234d2cfb4ce9723d3bb3c9f7ad.png)'
  prefs: []
  type: TYPE_IMG
- en: '***Table 1: ****Conceptual mapping between the Relevance Model (RM1) and Transformer
    attention. RM1 distributes probability mass over a pseudo-relevant feedback (PRF)
    set of documents, while attention distributes weights over a context window of
    tokens. Both yield mixtures: words from documents in RM1, and value vectors from
    tokens in transformers. *📖 Source: Table by author.'
  prefs: []
  type: TYPE_NORMAL
- en: '*RM1 expressed a powerful but general idea: relevance can be understood as
    weighting mixtures of content based on similarity to a query.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Nearly two decades later, the same principle re-emerged in the Transformer’s
    attention mechanism — now at the level of tokens rather than documents. What began
    as a statistical model for query expansion in Information Retrieval evolved into
    the mathematical core of modern Large Language Models (LLMs). It is a reminder
    that beautiful ideas in science rarely disappear; they travel forward through
    time, reshaped and reinterpreted in new contexts.
  prefs: []
  type: TYPE_NORMAL
- en: '*Through the written word, scientists carry ideas across generations — quietly
    binding together waves of innovation — until, suddenly, a breakthrough emerges.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Sometimes the simplest ideas are the most powerful. Who would have imagined
    that “attention” could become the key to unlocking language? And yet, it is.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusions and Final Thoughts
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this article, we have traced one branch of the vast tree that is language
    modelling, uncovering a compelling connection between the development of relevance
    models in early information retrieval and the emergence of Transformers in modern
    NLP. RM1 — ther first variant in the family of relevance models, was, in many
    ways, a proto-Transformer for IR — foreshadowing the mechanism that would later
    reshape how machines understand language.
  prefs: []
  type: TYPE_NORMAL
- en: We even coded up a neural variant of the Relevance Model, using modern encoder-only
    models, thereby formally unifying past (relevance model) and present (transformer
    architecture) in the same formal probabilistic model!
  prefs: []
  type: TYPE_NORMAL
- en: 'At the beginning, we invoked Newton’s image of standing on the shoulders of
    giants. Let us close with another of his reflections:'
  prefs: []
  type: TYPE_NORMAL
- en: '*“I do not know what I may appear to the world, but to myself I seem to have
    been only like a boy playing on the seashore, and diverting myself in now and
    then finding a smoother pebble or a prettier shell than ordinary, whilst the great
    ocean of truth lay all undiscovered before me.” Newton, Isaac. Quoted in David
    Brewster, Memoirs of the Life, Writings, and Discoveries of Sir Isaac Newton,
    Vol. 2 (1855), p. 407.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I hope that you agree that the path from RM1 to Transformers is just such a
    discovery — a highly polished pebble on the shore of a much greater ocean of AI
    discoveries yet to come.
  prefs: []
  type: TYPE_NORMAL
- en: '*Disclaimer: The views and opinions expressed in this article are my own and
    do not represent those of my employer or any affiliated organizations. The content
    is based on personal experience and reflection, and should not be taken as professional
    or academic advice.*'
  prefs: []
  type: TYPE_NORMAL
- en: '📚Further Learning:'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '[**Relevance Modelling for IR**](https://www.youtube.com/playlist?list=PLBv09BD7ez_7uXfmnL0k-PuyNQYFiwScp)**: **If
    you’re interested in pursuing a further exploration of the relevance modelling
    framework and its historical importance in IR, a good start is the original video
    series by Victor Lavrenko. The lectures are very clear and informative, and are
    based on a popular Text Technologies course from Edinburgh University.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**The Annotated Transformer**](http://nlp.seas.harvard.edu/2018/04/03/attention.html):
    A clear, step-by-step walkthrough of the seminal paper *“Attention Is All You
    Need.”*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**Andrej Karpathy — Build Your Own GPT**](https://www.youtube.com/watch?v=kCc8FmEb1nY):
    A hands-on coding tutorial that walks through building a GPT model from scratch.
    Great for a deeper understanding of how attention works.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**“**[**The Illustrated Transformer” by Jay Alammar**](https://jalammar.github.io/illustrated-transformer/)**:** beautiful,
    visual explanation of the Transformer architecture that pairs well with the Annotated
    Transformer.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**Sebastian Ruder — NLP’s ImageNet Moment and beyond**](https://www.ruder.io/nlp-imagenet/)**: **great
    historical context on why Transformers (and pretraining) changed the landscape
    of NLP.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**Survey on Pretrained Language Models:**](https://arxiv.org/abs/2108.05542)A
    thorough academic survey of pretrained Transformers and their applications.**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
