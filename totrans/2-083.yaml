- en: LLMs and Mental Health
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 大型语言模型与心理健康
- en: 原文：[https://towardsdatascience.com/llms-and-mental-health/](https://towardsdatascience.com/llms-and-mental-health/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/llms-and-mental-health/](https://towardsdatascience.com/llms-and-mental-health/)
- en: <mdspan datatext="el1753973910763" class="mdspan-comment">Readers</mdspan> who
    are paying close attention to the media coverage of AI, particularly LLMs, will
    probably have heard about a few cases and trends around how people’s mental health
    can be affected by use or overuse of such technologies. In fact, the field of
    mental and behavioral health is rapidly exploring the ways that LLMs might be
    both useful and dangerous, in the mental health of the general population and
    in the diagnostic and treatment space.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1753973910763" class="mdspan-comment">关注媒体对人工智能，尤其是大型语言模型报道的读者，可能会听说过一些关于人们心理健康如何受到此类技术使用或过度使用影响的情况和趋势。事实上，心理健康和行为健康领域正在迅速探索大型语言模型可能对普通人群的心理健康以及诊断和治疗领域既有利又有害的方式。*
- en: This is a complex space, and there’s a ton of research on the topic, so today
    I’m bringing a bit of an overview of some major issues, and I’ll point you to
    other articles that can provide deeper dives into these themes. (I have tried
    as much as possible to link to articles that are free and available to the public.)
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个复杂的空间，关于这个主题的研究有很多，所以今天我将简要概述一些主要问题，并将指向其他文章，这些文章可以更深入地探讨这些主题。（我已经尽可能链接到免费且对公众可用的文章。）
- en: '*There is a lot to know about other areas of AI outside LLMs in this space,
    and for those looking to get a broader scope, I recommend *[*the NIH review of
    literature*](https://pmc.ncbi.nlm.nih.gov/articles/PMC12017374/)* by Cruz-Gonzales
    et al.*'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: '*关于大型语言模型之外的其他人工智能领域，还有很多知识需要了解，对于那些希望获得更广泛视野的人来说，我推荐阅读Cruz-Gonzales等人撰写的[*NIH文献综述*](https://pmc.ncbi.nlm.nih.gov/articles/PMC12017374/)。*'
- en: Understanding the LLM
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 理解大型语言模型
- en: Before we begin, I’d like to recap a bit about how LLM chatbots work and what
    they are doing, in order to contextualize the discussion.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们开始之前，我想简要回顾一下大型语言模型聊天机器人的工作原理以及它们正在做什么，以便为讨论提供背景。
- en: A single Large Language Model chatbot receives a text prompt from the user and
    produces a response based on probability of word relevance and context. It learns
    the relationships between words and phrases (as well as grammar, punctuation,
    etc) in language through the training process, during which it is exposed to enormous
    volumes of human-produced language, including written texts and transcripts of
    spoken language. It calculates, based on the text of the prompt it can ingest
    (which can be quite lengthy, in modern LLMs) what the statistical likelihood is
    that a word or phrase is the best output, as learned through training. It will
    usually choose the most statistically likely next text, but sometimes will choose
    a less probable word or phrase in order to reduce the robotic nature of the language.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 一个单一的大型语言模型聊天机器人会从用户那里接收文本提示，并根据单词的相关性和上下文概率产生响应。它通过训练过程学习语言中单词和短语之间的关系（以及语法、标点符号等），在这个过程中，它接触到了大量人类产生的语言，包括书面文本和口语的转录。它根据可以摄入的提示文本（在现代大型语言模型中可能相当长）计算单词或短语是最佳输出的统计可能性，这是通过训练学到的。它通常会选择最有可能的下一个文本，但有时也会选择不太可能的单词或短语，以减少语言的机器人性质。
- en: In addition, modern LLM chatbots, like some forms of ChatGPT, have access to
    other models and components. This means that when a prompt is received, an orchestration
    component might determine which model/s are needed to produce an answer, and these
    can work in concert. For example, ChatGPT can sometimes do realtime searches of
    the internet for information if the prompt seems to justify it. Some models also
    do multi-modal work, so a prompt could result in the orchestrator invoking an
    image-generating model as well as a text-generating model, returning a generated
    image and some text to accompany it. This can also work with audio or video generation
    models. In essence, the prompt is triggering logic to determine which of the available
    components are relevant to the question, then invoking those and combining their
    responses to create one single answer.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，现代LLM聊天机器人，如ChatGPT的一些形式，可以访问其他模型和组件。这意味着当接收到提示时，一个编排组件可能会确定需要哪些模型/组件来生成答案，并且它们可以协同工作。例如，如果提示似乎合理，ChatGPT有时会实时搜索互联网上的信息。一些模型也进行多模态工作，因此提示可能会导致编排器调用图像生成模型以及文本生成模型，返回一个生成的图像和一些伴随的文本。这也可以与音频或视频生成模型一起工作。本质上，提示是触发逻辑，以确定哪些可用的组件与问题相关，然后调用这些组件并将它们的响应组合成一个单一的答案。
- en: However, the key to remember is that under the surface, all the language generating
    models are using the probabilistic method to choose the words of responses, based
    on the patterns and lessons learned from training text they were exposed to. They
    do not have checks for accuracy or truth of statements they make, and they have
    limited guardrails to prevent dangerous statements or interactions, which is very
    important to recognize.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，关键要记住的是，在表面之下，所有语言生成模型都是使用概率方法来选择响应中的词语，这些词语是基于它们在训练文本中接触到的模式和经验学到的。它们没有对它们所做出的陈述的准确性或真实性进行检查，并且它们有有限的护栏来防止危险陈述或交互，这一点非常重要。
- en: To add to this, in order for an LLM to be most helpful in the mental health
    space, it needs to be fine tuned, and cannot just be a general purpose LLM like
    ChatGPT or Claude. So the above technology is our starting point, but much more
    effort needs to go into ensuring the LLM has exposure to specific literature,
    and data related to mental health before it can be used in diagnostic or therapeutic
    work. ([Lawrence](https://mental.jmir.org/2024/1/e59479/)) Some papers I mention
    below study general purpose LLMs while others involve specifically tuned ones,
    although in commercial LLMs the characteristics of that tuning are opaque and
    rarely available for researchers. I think it’s realistic to look at both types
    of model, because general purpose versions are how the general public accesses
    LLMs most of the time. More highly specific trained LLMs for psychiatric applications
    are slowly being developed, but creating a high quality and safe tool of this
    sort takes a lot of time, data, and work.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，为了让大型语言模型（LLM）在心理健康领域发挥最大作用，它需要进行微调，而不仅仅是像ChatGPT或Claude这样的通用型LLM。因此，上述技术只是我们的起点，但需要投入更多努力确保LLM在用于诊断或治疗工作之前，能够接触到与心理健康相关的特定文献和数据。([劳伦斯](https://mental.jmir.org/2024/1/e59479/))
    我下面提到的某些论文研究的是通用型LLM，而另一些则涉及专门调整的LLM，尽管在商业LLM中，这种调整的特性是透明的，并且很少对研究人员开放。我认为同时考虑这两种类型的模型是现实的，因为通用版本是公众获取LLM的主要方式。用于精神病学应用的更具体训练的LLM正在缓慢开发中，但创建这种高质量且安全工具需要大量的时间、数据和努力。
- en: In order for an LLM to be most helpful in the mental health space, it needs
    to be fine tuned, and cannot just be a general purpose LLM like ChatGPT or Claude.
  id: totrans-11
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 为了让LLM在心理健康领域发挥最大作用，它需要进行微调，而不仅仅是像ChatGPT或Claude这样的通用型LLM。
- en: With that framework, let’s talk a little about some of the ways that LLMs may
    get involved in the mental health space.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个框架下，让我们简单谈谈LLM可能参与心理健康领域的一些方式。
- en: Symptoms and Onset
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 症状和发病
- en: Psychiatric problems are not rare or unusual. Worldwide, half of us will have
    some experience of mental health problems during our lives, and at any given moment,
    one out of eight people is actually dealing with such symptoms. ([Lawrence](https://mental.jmir.org/2024/1/e59479/))
    However, most data about the occurrence and prevalence of mental illness predates
    the development of LLMs as a widespread technology.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 精神病问题并不罕见或不寻常。全球范围内，我们中有一半的人在我们的一生中会经历一些心理健康问题，在任何给定时刻，每八个人中就有一人在实际处理这些症状。([Lawrence](https://mental.jmir.org/2024/1/e59479/))
    然而，关于精神疾病的发生和流行的大部分数据都早于LLM作为广泛技术的开发。
- en: Recently there have been some media reports about the ways that some people’s
    mental health may be affected by use of the technology. In some extreme anecdotes,
    people seem to be developing [delusional](https://futurism.com/commitment-jail-chatgpt-psychosis) or [psychotic](https://futurism.com/chatgpt-mental-health-crises) [crises](https://www.psychologytoday.com/us/blog/dancing-with-the-devil/202506/how-emotional-manipulation-causes-chatgpt-psychosis) based
    on what they talk to the LLM chatbots about. These include things like dangerous
    conspiracy theories, believing themselves or the chatbot to be God, and paranoia
    about the people around them. There is also evidence of depression and anxiety
    being worsened by certain AI usage, particularly when social engagement and human
    interaction is reduced, with LLM use as a substitute. ([Obradovich](https://www.nature.com/articles/s44277-024-00010-z))
    This can even escalate to violence, including at least [one case where a teenager
    has died by suicide](https://apnews.com/article/chatbot-ai-lawsuit-suicide-teen-artificial-intelligence-9d48adc572100822fdbc3c90d1456bd0) with
    toxic encouragement from a chatbot.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 最近有一些媒体报道了某些人的心理健康可能受到技术使用的影响的方式。在一些极端的例子中，人们似乎在基于他们与LLM聊天机器人交谈的内容而发展出[妄想](https://futurism.com/commitment-jail-chatgpt-psychosis)或[精神错乱](https://futurism.com/chatgpt-mental-health-crises)的[危机](https://www.psychologytoday.com/us/blog/dancing-with-the-devil/202506/how-emotional-manipulation-causes-chatgpt-psychosis)。这些包括诸如危险阴谋论、相信自己或聊天机器人是上帝，以及对他们周围人的偏执。也有证据表明，某些AI的使用加剧了抑郁和焦虑，尤其是在社交互动和人际交往减少，而LLM的使用作为替代品时。([Obradovich](https://www.nature.com/articles/s44277-024-00010-z))
    这甚至可能升级到暴力，包括至少[一例青少年因聊天机器人的有毒鼓励而自杀](https://apnews.com/article/chatbot-ai-lawsuit-suicide-teen-artificial-intelligence-9d48adc572100822fdbc3c90d1456bd0)的情况。
- en: One of the more dangerous parts of this is the dynamic interaction between the
    symptomatic person and the chatbot — this can make it difficult for loved ones
    or professionals to help the individual, because they have what they perceive
    to be continuous outside reinforcement of their disordered beliefs and symptoms.
    LLM use can discourage a person from choosing to get help or seek treatment from
    reliable sources.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 这其中更危险的部分之一是症状性个体与聊天机器人之间的动态互动——这可能会让亲人或专业人士难以帮助该个体，因为他们有他们认为的持续的外部强化他们混乱的信念和症状。LLM的使用可能会阻止一个人选择寻求帮助或从可靠来源寻求治疗。
- en: It’s important that we not overstate the risk of this kind of phenomenon, however.
    It happens, clearly, and this should be taken seriously, but it’s not happening
    to the vast majority of users. Much scholarship on mental illness suggests that
    there’s a combination of biochemical and/or genetic predisposition to certain
    disorders or symptoms that can be exacerbated by environmental stimuli. If, as
    it seems, LLM usage in may be one of those environmental stimuli, this deserves
    research and attention. Even if most people will not experience anything like
    the severe mental health issues we are seeing anecdotally, some will, so that
    danger needs to be acknowledged.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我们不应该过分夸大这种现象的风险。它确实发生了，这应该被认真对待，但它并没有影响到绝大多数用户。许多关于精神疾病的研究表明，存在一种生化或遗传倾向的组合，这些倾向可能因环境刺激而加剧。如果LLM的使用似乎可能是这些环境刺激之一，那么这值得研究和关注。即使大多数人不会经历我们通过轶事看到的那种严重的心理健康问题，有些人会的，因此这种危险需要被承认。
- en: Mental Health Care
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 心理健康护理
- en: When it comes to the actual diagnosis and treatment of mental illness, there
    is a lot of research available surveying the landscape. It’s important to acknowledge
    that, like with other areas of healthcare, this is a high risk space to apply
    LLMs or AI, and we need to take great care to minimize the potential for harm
    before anything is deployed.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 当涉及到精神病的实际诊断和治疗时，有大量研究可供参考。重要的是要承认，与其他医疗保健领域一样，这是一个高风险的空间来应用LLM或AI，我们在部署任何东西之前都需要非常小心，以最大限度地减少潜在的危害。
- en: There is some urgency to the discussion, though, because lack of access to mental
    health care is a profound epidemic, particularly in the United States. This is
    mainly due to shortages of trained providers and high cost of quality care, often
    not covered sufficiently by what insurance is available. So we have to determine
    if AI based technologies can help us mitigate this problem of access, while at
    the same time minimizing risk or hazards to patient care.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然讨论有些紧迫，因为缺乏心理健康护理是一个深刻的流行病，尤其是在美国。这主要是因为训练有素的提供者短缺和高质量护理的高成本，通常保险无法充分覆盖。因此，我们必须确定基于AI的技术是否可以帮助我们减轻这种可访问性问题，同时最大限度地减少对患者护理的风险或危害。
- en: Behind the Scenes
  id: totrans-21
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 背后情况
- en: To begin with, an LLM could provide support to psychiatric practitioners without
    ever interacting directly with a patient. Many doctors of all kinds already use
    LLMs in this way, analyzing records, getting ‘second opinion’ kind of input, and
    so on. Mental health is a bit more challenging because diagnosis is more nuanced
    and subjective, and rarely has a single test or diagnostic that can confirm or
    disprove a hypothesis. If an LLM is very carefully tuned, it may be possible for
    it to provide useful assistance to a provider in diagnosing an illness or crafting
    a treatment plan, but LLMs are well known to make mistakes and generate incorrect
    information, even when well trained, so this can’t be adopted as a blanket substitute
    for professional training, experience, and skill. ([Obradovich](https://www.nature.com/articles/s44277-024-00010-z))
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，一个LLM可以在不直接与患者互动的情况下为精神科从业者提供支持。许多各种类型的医生已经以这种方式使用LLM，分析记录、获取“第二意见”类型的输入等等。心理健康是一个更具挑战性的领域，因为诊断更加微妙和主观，很少有单一的测试或诊断可以证实或反驳一个假设。如果LLM非常仔细地调整，它可能为提供者在诊断疾病或制定治疗方案时提供有用的帮助，但LLM众所周知会犯错误并生成错误信息，即使训练得很好也是如此，因此这不能作为专业培训、经验和技能的全面替代。([Obradovich](https://www.nature.com/articles/s44277-024-00010-z))
- en: There are also real concerns about data privacy and patient confidentiality
    in the use of LLMs, because the majority of widely used ones are owned and operated
    by private, for-profit enterprises, and many have very opaque policies around
    how user data is handled and transmitted. Preventing data provided to LLMs from
    falling into the wrong hands or being used for unapproved or unethical purposes
    is a serious challenge for anyone in the healthcare field who may want to use
    the technology, and is not a solved problem at this point. This applies to all
    the application possibilities I discuss below, as well as the simple doctor-LLM
    interactions.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 在使用大型语言模型（LLM）时，人们也确实对数据隐私和患者机密性表示担忧，因为大多数广泛使用的LLM都由私人营利性企业拥有和运营，并且许多企业在如何处理和传输用户数据方面有着非常不透明的政策。防止提供给LLM的数据落入错误之手或被用于未经批准或不道德的目的，对于任何可能希望使用这项技术的医疗保健领域的从业者来说都是一个严重的挑战，而且目前这个问题还没有得到解决。这适用于我下面讨论的所有应用可能性，以及简单的医生与LLM的互动。
- en: There are also real concerns about data privacy and patient confidentiality
    in the use of LLMs, because the majority of widely used ones are owned and operated
    by private, for-profit enterprises, and many have very opaque policies around
    how user data is handled and transmitted.
  id: totrans-24
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在使用LLM时，人们也确实对数据隐私和患者机密性表示担忧，因为大多数广泛使用的LLM都由私人营利性企业拥有和运营，并且许多企业在如何处理和传输用户数据方面有着非常不透明的政策。
- en: Patient Interactions
  id: totrans-25
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 患者互动
- en: However, if we do want to pursue direct patient-LLM interaction, we should proceed
    with caution. Effective mental health care depends tremendously on trust and relationship
    building, and not all patients are going to be willing or able to trust the technology,
    for often good reasons. Substantial societal backlash against the use of LLMs
    in many spaces is already evident, and we can expect that some people would not
    want to engage with an LLM as a substitute for or augmentation of therapy with
    a person.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，如果我们确实想追求直接的患者-LLM交互，我们应该谨慎行事。有效的心理健康护理在很大程度上依赖于信任和关系建立，并不是所有患者都愿意或能够信任这项技术，这往往有很好的理由。对LLM在许多领域的使用已经出现的社会反弹是显而易见的，我们可以预期有些人不会愿意与LLM互动，将其作为替代或补充人类治疗的手段。
- en: Even if a patient does agree to use an LLM, they need to have appropriate information
    about what the LLM does and how it works, in order to process and understand the
    information they get from it. We’re still discovering how different individuals
    feel about talking with LLMs — not just whether they are willing to use them,
    but whether they can develop trust (and whether such trust is a good idea), how
    honest they will be, and whether they will be appropriately skeptical of a chatbot’s
    output. Patients being excessively credulous of a technology like this can be
    extremely dangerous, especially given the variability of LLM outputs and quality.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 即使患者同意使用LLM，他们也需要了解LLM的功能和工作原理，以便处理和理解从LLM那里获得的信息。我们仍在探索不同个体对与LLM交谈的感受——不仅是否愿意使用它们，而且是否能够建立信任（以及这种信任是否是个好主意），他们将会多么诚实，以及他们是否会适当地对聊天机器人的输出持怀疑态度。对这种技术过度轻信的患者可能非常危险，尤其是在考虑到LLM输出的可变性和质量。
- en: However, for those who find LLMs a suitable option, there are a few ways that
    they could be incorporated into the clinical experience.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，对于那些认为LLM是一个合适选项的人来说，有几种方法可以将它们融入临床经验中。
- en: Diagnosis
  id: totrans-29
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 诊断
- en: Can an LLM make diagnoses at the same or better quality than human therapists?
    Some research does seem to demonstrate that LLMs can match the performance of
    human clinicians in very specific, controlled diagnostic tasks, although evidence
    is limited and studies are not large. When interactions are more open-ended and
    more ambiguity is introduced, LLMs appear to struggle.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 一个大型语言模型（LLM）能否在诊断质量上与人类治疗师相媲美，甚至更优？一些研究似乎表明，LLM在非常具体、受控的诊断任务中可以匹配人类临床医生的表现，尽管证据有限，且研究规模不大。当交互更加开放和引入更多模糊性时，LLM似乎会感到困难。
- en: Part of the reason for this is simply LLM capability. When a practitioner is
    making a diagnosis, there is a tremendous amount of nuance that must be incorporated.
    While language gives us great insight into someone’s thought processes and condition,
    there is more information that needs to be accumulated for accurate and effective
    diagnosis, such as tone of voice, body language, and self care. A multimodal model
    could incorporate this data, but unfortunately, much research only limits their
    analysis to the verbal or written diagnostic instruments, and overlooks this detail.
    I would regard this as a real opportunity for future ML development, if the data
    to do it can be acquired. Many of the standardized diagnostic surveys used in
    regular mental health practice in fact contain multiple components of the clinician’s
    subjective assessment of the patient’s affect, tone, and physical presentation,
    so excluding these characteristics will limit diagnostic effectiveness.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 这部分原因仅仅是LLM的能力。当从业者进行诊断时，必须考虑大量的细微差别。虽然语言能让我们深入了解某人的思维过程和状况，但为了进行准确和有效的诊断，还需要积累更多信息，例如语气、肢体语言和自我护理。一个多模态模型可以整合这些数据，但遗憾的是，许多研究仅将分析限制在口头或书面诊断工具上，而忽略了这一细节。如果能够获取到进行此类分析所需的数据，我认为这将是一个真正的未来机器学习发展的机会。实际上，在常规心理健康实践中使用的许多标准化诊断调查实际上包含了临床医生对病人情感、语气和身体表现的多个主观评估成分，因此排除这些特征将限制诊断的有效性。
- en: While language gives us great insight into someone’s thought processes and condition,
    there is more information that needs to be accumulated for accurate and effective
    diagnosis, such as tone of voice, body language, and self care.
  id: totrans-32
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 虽然语言能让我们深入了解某人的思维过程和状况，但为了进行准确和有效的诊断，还需要积累更多信息，例如语气、肢体语言和自我护理。
- en: Bias is also an important detail to consider. LLMs are trained on a broad pool
    of content, from all kinds of creators and sources. This content will contain,
    explicitly or implicitly, the patterns of bias and discrimination that are present
    in our broader society. As a result, LLMs also return results with bias at times.
    Clinicians are responsible for minimizing bias in their interactions with patients,
    in order to help them as much as possible and abide by ethical standards of their
    professions. If you use a diagnostic tool that outputs information with unsupported
    prejudices, that needs to be curated and eliminated.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 偏见也是一个需要考虑的重要细节。大型语言模型（LLM）是在广泛的内容池上训练的，包括各种创作者和来源。这些内容将明确或隐含地包含我们更广泛社会中存在的偏见和歧视模式。因此，LLM有时也会返回带有偏见的成果。临床医生有责任在与患者的互动中尽量减少偏见，以便尽可能多地帮助他们，并遵守其职业的伦理标准。如果你使用的是输出带有不受支持偏见的诊断工具，那么就需要对其进行整理和消除。
- en: There’s every reason to think that increased capability and further research
    may make LLMs and multimodal models more helpful in the diagnostic task, though.
    In particular, a practitioner may find it helpful to incorporate an LLM when identifying
    the differential diagnosis, trying to consider all possibilities in a particular
    situation. But this can’t be the entire process, and clinical expertise has to
    be the primary reliance.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 有充分的理由相信，能力的提升和进一步的研究可能会使LLM和多模态模型在诊断任务中更有帮助。特别是，实践者可能会发现，在确定鉴别诊断时，将LLM纳入其中是有帮助的，试图考虑特定情况下的所有可能性。但这不能是整个过程，临床专业知识必须是主要的依赖。
- en: Treatment
  id: totrans-35
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 治疗
- en: As I’ve already mentioned, there is an important distinction between an LLM
    that is one tool as part of a therapeutic plan managed by a qualified professional,
    and an LLM used as a substitute for professional expertise. This is true in treatment
    as well as diagnosis. Based on the quality and capabilities of LLMs, and the research
    I’ve read as part of writing this article, I could not recommend anyone engage
    with an LLM for therapy without the close monitoring of a professional therapist
    — the technology is just not ready for such use for several reasons. The [American
    Psychiatric Association](https://www.apa.org/practice/artificial-intelligence-mental-health-care) concurs,
    and their recommendations for acceptable use of AI in practice specifically do
    not include any kind of independent application of LLMs.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我之前提到的，一个作为由合格专业人士管理的治疗计划一部分的工具型LLM，与用作专业知识的替代品的LLM之间存在一个重要的区别。这在治疗和诊断方面都是如此。基于LLM的质量和能力，以及我在撰写本文过程中阅读的研究，我无法推荐任何人在没有专业治疗师密切监控的情况下与LLM进行心理治疗——技术从几个原因来看，尚未准备好用于这种用途。美国精神病学协会（[American
    Psychiatric Association](https://www.apa.org/practice/artificial-intelligence-mental-health-care)）也同意这一点，他们关于在实践中使用AI的推荐特别不包括任何类型的独立应用LLM。
- en: One particular article by [Moore et al](https://dl.acm.org/doi/pdf/10.1145/3715275.3732039) really
    stands out, because they tested both general purpose LLMs and LLM tools marketed
    as therapy or counseling/wellness offerings, and found some alarming results.
    LLMs as substitutes for therapists perform poorly in numerous scenarios, which
    could create real risks for patients. In particular, severe mental health problems
    and crises seem to be the cases where an LLM is least successful, potentially
    because these are less common situations and thus the training data will have
    less exposure to these circumstances. The same paper’s original study found that
    many of the most general purpose modern LLMs provide at times horrifyingly inappropriate
    responses to prompts that indicate clear mental health problems or emergencies,
    and in fact commercially available LLMs designed and marketed for mental health
    were even worse. It’s not clear whether these commercial chatbots were actually
    produced with any care or conscientiousness towards the mental health application,
    but given the lack of regulation around such tools, have been made available to
    use anyway. Regardless, LLMs cannot be held responsible for their statements,
    and cannot be held to an ethical standard in the way human providers can. This
    should give us all pause about any kind of AI technology being left to its own
    devices when dealing with people in serious need of help and support.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: '[Moore等人](https://dl.acm.org/doi/pdf/10.1145/3715275.3732039)的一篇特定文章特别引人注目，因为他们测试了既通用又作为治疗或咨询/健康产品推广的LLM工具，并发现了一些令人担忧的结果。作为治疗师替代品的LLM在许多场景中表现不佳，这可能会对病人造成真正的风险。特别是，严重的心理健康问题和危机似乎是最不成功的情况，这可能是由于这些情况较少见，因此训练数据对这些情况接触较少。同一篇论文的原研究发现在许多最通用的现代LLM中，有时对表明明显心理健康问题或紧急情况的提示做出令人震惊的不恰当回应，而实际上为心理健康设计和推广的商业LLM则更糟糕。不清楚这些商业聊天机器人是否真正在心理健康应用方面进行了任何关注或责任心，但由于缺乏对这些工具的监管，它们仍然被提供使用。无论如何，LLM不能对其声明负责，也不能像人类提供者那样被要求遵守道德标准。这应该让我们所有人都对任何类型的AI技术在没有适当监管的情况下处理需要帮助和支持的人时感到担忧。'
- en: LLMs cannot be held responsible for their statements, and cannot be held to
    an ethical standard in the way human providers can.
  id: totrans-38
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: LLM不能对其声明负责，也不能像人类提供者那样被要求遵守道德标准。
- en: There are likely to be particular cases where an LLM can help people — say,
    reminders about self care behaviors or medications, or encouragement of positive
    choices — but therapy is actually a very complicated practice, and can take many
    forms. Different diagnoses and symptoms call for different treatment approaches,
    and currently evidence is poor for LLMs being able to provide assistance particularly
    in severe and crisis cases. LLMs have a known tendency to be sycophantic or attempt
    to agree with or please the user above all other considerations. When a patient
    uses an LLM chatbot for mental health care, the chatbot needs to be able to disagree
    with and challenge unhealthy thought patterns or ideas, including delusional thinking.
    This can be contradictory with the way LLMs are trained using human feedback.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 可能存在一些特定情况，LLM可以帮助人们——比如，关于自我护理行为或药物提醒，或者鼓励做出积极选择——但治疗实际上是一项非常复杂的实践，可以采取多种形式。不同的诊断和症状需要不同的治疗方法，目前证据表明，LLM在严重和危机情况下提供帮助的能力很差。LLM有一个已知的倾向，即谄媚或试图在所有考虑因素中同意或取悦用户。当患者使用LLM聊天机器人进行心理健康护理时，聊天机器人需要能够不同意并挑战不健康的思想模式或观点，包括妄想。这可能与人反馈训练LLM的方式相矛盾。
- en: Clinicians
  id: totrans-40
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 临床医生
- en: Given this information, what should mental health care providers do? Well, most
    professional organizations have advice about how to use or not use AI, and they
    tend to recommend a conservative approach, limiting the use of LLMs in the patient-facing
    setting, but encouraging exploration for administrative or data-coordinating tasks.
    To my mind, this is a reasonable approach at this stage of the technology’s development,
    and perhaps more importantly, at this stage of our understanding and literacy
    around AI.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 根据这些信息，心理健康服务提供者应该怎么做？嗯，大多数专业组织都有关于如何使用或不使用AI的建议，他们倾向于推荐一种保守的方法，限制在面向患者的环境中使用LLM，但鼓励探索用于行政或数据协调任务。在我看来，这是技术发展这一阶段的合理方法，也许更重要的是，这是我们对AI的理解和素养这一阶段的合理方法。
- en: If an LLM technology is part of the treatment plan, this requires the clinician
    to be equipped to use it effectively and carefully, to prevent damaging information
    from being passed to the patient. Psychiatric professionals who do want to use
    it will need to build skills in LLM usage and understand the technology to get
    optimal outcomes and abide by their ethical responsibilities. The clinician must
    be prepared to monitor the LLM’s responses to the patient, as guard rails to ensure
    appropriate practices.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 如果LLM技术是治疗方案的一部分，这就要求临床医生能够有效地、谨慎地使用它，以防止有害信息传递给患者。那些希望使用它的精神科专业人士将需要培养LLM使用技能，并理解这项技术以获得最佳结果并遵守他们的伦理责任。临床医生必须准备好监控LLM对患者的回应，作为确保适当实践的护栏。
- en: If an LLM technology is part of the treatment plan, this requires the clinician
    to be equipped to use it effectively and carefully, to prevent damaging information
    from being passed to the patient.
  id: totrans-43
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果LLM技术是治疗方案的一部分，这就要求临床医生能够有效地、谨慎地使用它，以防止有害信息传递给患者。
- en: Another thing to be aware of is the staleness problem. LLMs have access to quality
    information in their training corpuses, but as scholarship progresses, some of
    the information they have may become obsolete or become contraindicated. Practitioners
    will have to know that this can occur, and monitor to prevent false information
    or outdated ideas being shared with the patient.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个需要注意的问题是陈旧问题。LLM在其训练语料库中可以访问高质量的信息，但随着学术的发展，其中一些信息可能变得过时或变得不适宜。从业者将必须知道这种情况可能发生，并监控以防止错误信息或过时观念与患者分享。
- en: As I noted earlier, there are also serious data privacy, HIPAA, and patient
    confidentiality considerations when using an LLM in any kind of clinical setting.
    If you don’t feel equipped to evaluate whether data you give to an LLM is being
    securely protected, or don’t know how it might be used, this is a red flag.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 如我之前所述，在使用LLM的任何临床环境中，也存在严重的数据隐私、HIPAA和患者保密问题。如果你觉得自己无法评估提供给LLM的数据是否得到安全保护，或者不知道它可能如何被使用，这是一个红旗。
- en: Regulation
  id: totrans-46
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 监管
- en: Finally, I want to talk a bit about regulation of LLMs for mental health uses.
    AI tools designed for the medical sphere can be HIPAA certified, giving you some
    confidence that they are safe where data security is concerned, if used correctly.
    However, in the United States, [regulation of LLMs marketed as “therapy” is minimal
    if it exists at all](https://www.apaservices.org/practice/business/technology/artificial-intelligence-chatbots-therapists),
    and this can be very dangerous. Apps are available offering “therapy” from LLMs
    with zero human oversight, and as [Moore’s](https://dl.acm.org/doi/pdf/10.1145/3715275.3732039) research
    noted, many of them are worse than even general use LLMs at actually meeting the
    standard of care. It’s important to be extra cautious about the research we trust
    in this space because many for-profit providers of such chatbots are putting out
    information supporting their products that may or may not be unbiased.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我想简要谈谈针对心理健康用途的LLM监管。为医疗领域设计的AI工具可以获得HIPAA认证，这让你有信心，如果正确使用，它们在数据安全方面是安全的。然而，在美国，[如果存在的话，将LLM作为“疗法”进行营销的监管很少](https://www.apaservices.org/practice/business/technology/artificial-intelligence-chatbots-therapists)，这可能非常危险。有应用程序提供由LLM提供的“疗法”，没有任何人为监督，正如[Moore的研究](https://dl.acm.org/doi/pdf/10.1145/3715275.3732039)指出，其中许多甚至不如通用LLM在满足护理标准方面做得好。在这个领域，对所信任的研究要格外谨慎，因为许多盈利性的聊天机器人提供商可能会发布支持其产品的信息，这些信息可能或可能不是无偏见的。
- en: '[States may be starting to develop regulation](https://scholarship.law.tamu.edu/lawreview/vol12/iss2/10/),
    but this is likely to be piecemeal, similar to data privacy regulation in this
    country. Because there is minimal accountability for these tools, and as I discussed
    at the beginning of this article, some people may be at risk of developing unhealthy
    interactions with LLMs at the best of times, I think it’s important that we implement
    real regulation around LLMs being marketed as mental health solutions. This should
    include quality of care benchmarks, as well as existing data privacy and HIPAA
    protections.'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: '[各国可能开始制定监管措施](https://scholarship.law.tamu.edu/lawreview/vol12/iss2/10/)，但这很可能是零散的，类似于该国数据隐私监管。因为这些工具的问责制很少，正如我在本文开头讨论的，在最理想的情况下，有些人可能存在与LLM发展不健康互动的风险，我认为我们实施针对作为心理健康解决方案营销的LLM的真正监管非常重要。这应该包括护理质量标准，以及现有的数据隐私和HIPAA保护。'
- en: Conclusion
  id: totrans-49
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: 'This article has already gotten long, but I want to make clear that this is
    just scraping the surface of topics and issues where AI/LLMs and mental health
    may cross paths. Some other areas that readers may want to pursue more include:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 这篇文章已经很长了，但我想明确指出，这仅仅是触及了AI/LLMs和心理健康可能交叉的一些主题和问题。读者可能还想进一步探索的其他领域包括：
- en: '**Provider training and education**. Can AI be useful in helping therapists
    learn their profession and improve their skills, or is the explosion of LLMs in
    education going to reduce their qualification? ([Lawrence](https://mental.jmir.org/2024/1/e59479/))'
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**提供者培训和教育工作**。AI能否在帮助治疗师学习他们的职业和提升技能方面发挥作用，或者LLMs在教育领域的爆炸性增长是否会降低他们的资格？（[Lawrence](https://mental.jmir.org/2024/1/e59479/)）'
- en: '**Loneliness and socialization**. Some people are finding that LLMs can fill
    gaps when they have a lack of human connection, but this can be a dangerous path
    actually reducing people’s social interactions, which is a risk factor for depression
    and other illnesses. ([Obradovich](https://www.nature.com/articles/s44277-024-00010-z))'
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**孤独和社会化**。有些人发现，当缺乏人际联系时，LLMs可以填补空白，但这可能是一条危险的路径，实际上会减少人们的社交互动，这是抑郁症和其他疾病的危险因素。（[Obradovich](https://www.nature.com/articles/s44277-024-00010-z)）'
- en: '**Reducing stigma for patients**. While I’ve noted that LLMs do contain the
    seeds of stigma through training data, is this more or less than actual clinicians?
    Do some people feel less hesitant and less judged when interacting with a chatbot?
    ([Lawrence](https://mental.jmir.org/2024/1/e59479/))'
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**减少对患者的污名化**。虽然我指出LLMs的训练数据中确实包含了污名的种子，但这与实际临床医生相比是更多还是更少？在与聊天机器人互动时，有些人是否感到不那么犹豫和被评判？（[Lawrence](https://mental.jmir.org/2024/1/e59479/)）'
- en: '**Mental health misinformation**. LLMs are used to generate all manner of “AI
    slop” online, and a significant portion of this falls under the category of harmful
    misinformation. One study looked specifically at whether AI generated mental health
    misinformation was a serious hazard. ([Nguyen](https://ojs.aaai.org/index.php/ICWSM/article/view/35875/38029))'
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**心理健康错误信息**。大型语言模型（LLMs）被用于在线生成各种“AI垃圾”，其中很大一部分属于有害错误信息的范畴。一项研究专门研究了AI生成的心理健康错误信息是否是一个严重的危害。（[Nguyen](https://ojs.aaai.org/index.php/ICWSM/article/view/35875/38029)）'
- en: '**Economic impact**. This is somewhat tangential, but economic downturns and
    financial strains are the kind of stressors that can turn a predisposition to
    mental health problems into a full blown symptomatic episode. Are we going to
    see population level mental health deterioration from economic stress created
    by AI-related job losses? ([Obradovich](https://www.nature.com/articles/s44277-024-00010-z))'
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**经济影响**。这有点离题，但经济衰退和财务压力是那种可以将对心理健康问题的倾向转变为完全症状性发作的压力因素。我们将看到由AI相关失业造成的经济压力导致人口层面的心理健康恶化吗？（[Obradovich](https://www.nature.com/articles/s44277-024-00010-z)）'
- en: There are certainly more- I encourage those readers who are interested to take
    a closer look at the articles I’ve linked above and below.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 当然还有更多——我鼓励那些感兴趣的读者仔细阅读我上面和下面链接的文章。
- en: For machine learning professionals, there are [significant opportunities](https://pmc.ncbi.nlm.nih.gov/articles/PMC12017374/) for
    us to help improve the state of AI where it’s applied to mental health, as the
    technology right now has severe limitations. However, I want to emphasize that
    this can’t be technology built in a vacuum. Technology in mental health care (and
    medicine in general) has to be better, safer, and more tested than many other
    areas where we use AI today, because the risks and the costs of failure are so
    very high. The ethical and efficacy concerns I’ve described here all need to be
    part of the development process for any AI, including LLMs, that we might create
    for these use cases.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 对于机器学习专业人士来说，我们有[重大的机会](https://pmc.ncbi.nlm.nih.gov/articles/PMC12017374/)来帮助改善AI在心理健康领域的应用状态，因为目前这项技术存在严重的局限性。然而，我想强调的是，这不能是孤立的技术。心理健康护理（以及医学领域）中的技术必须比我们今天使用AI的许多其他领域更好、更安全、更经过测试，因为失败的风险和成本非常高。我这里描述的伦理和有效性问题都需要成为我们为这些用例可能创建的任何AI（包括LLMs）的开发过程的一部分。
