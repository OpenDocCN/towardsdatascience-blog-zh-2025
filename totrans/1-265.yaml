- en: 'Building LLM Apps That Can See, Think, and Integrate: Using o3 with Multimodal
    Input and Structured Output'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/building-llm-apps-that-can-see-think-and-integrate-using-o3-with-multimodal-input-and-structured-output/](https://towardsdatascience.com/building-llm-apps-that-can-see-think-and-integrate-using-o3-with-multimodal-input-and-structured-output/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1758304545056" class="mdspan-comment">When building LLM
    applications</mdspan>, the standard “text in, text out” paradigm will only take
    you so far.
  prefs: []
  type: TYPE_NORMAL
- en: Real applications that deliver actual value should be able to examine visuals,
    reason through complex problems, and produce results that systems can actually
    use.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this post, we’ll design this stack by bringing together three powerful capabilities:
    **multimodal input, reasoning,** and **structured output**.'
  prefs: []
  type: TYPE_NORMAL
- en: 'To illustrate this, we’ll walk through a hands-on example: building a **time-series
    anomaly detection system** for e-commerce order data using **OpenAI’s o3 model**.
    Specifically, we’ll show how to pair o3’s reasoning capability with image input
    and emit validated JSON, so that the downstream system can easily consume it.'
  prefs: []
  type: TYPE_NORMAL
- en: 'By the end, our app will:'
  prefs: []
  type: TYPE_NORMAL
- en: '**See**: analyze charts of e-commerce order volume time series'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Think**: identify unusual patterns'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Integrate**: output a structured anomaly report'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You’ll leave with functional code you can reuse for various use cases that go
    beyond just anomaly detection.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s dive in.
  prefs: []
  type: TYPE_NORMAL
- en: '*Interested in learning the broader landscape of how LLMs are being applied
    for anomaly detection? Check out my previous post: **[Boosting Your Anomaly Detection
    With LLMs](https://towardsdatascience.com/boosting-your-anomaly-detection-with-llms/)***,
    *where I summarized 7 emerging application patterns* *that you shouldn’t miss*.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '**1\. Case Study**'
  prefs: []
  type: TYPE_NORMAL
- en: In this post, we aim to build an anomaly detection solution for identifying
    abnormal patterns in e-commerce order time series data.
  prefs: []
  type: TYPE_NORMAL
- en: For this case study, we generated three sets of *synthetic* daily order data.
    The datasets represent three different profiles of the daily order over roughly
    one month of time. To make seasonality obvious, we have shaded the weekends. The
    x-axis shows the day of the week.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/4f638c6bb20dc0189df291c02f17ed70.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1\. Dataset 1, with the shaded regions being the weekends. (Image by
    author)
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/dd15a31607af420734ab620c0ec0a838.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2\. Dataset 2, with the shaded regions being the weekends. (Image by
    author)
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/be6ccf934ffdf1809b12bc2b8460173b.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3\. Dataset 3, with the shaded regions being the weekends. (Image by
    author)
  prefs: []
  type: TYPE_NORMAL
- en: Each figure contains one specific type of anomaly (*can you find them?*). We’ll
    later use those figures to test our anomaly detection solution and see if it can
    accurately recover those anomalies.
  prefs: []
  type: TYPE_NORMAL
- en: '**2\. Our Solution**'
  prefs: []
  type: TYPE_NORMAL
- en: '**2.1 Overview**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Unlike the traditional machine learning approaches that require tedious feature
    engineering and model training, our current approach is much simpler. It works
    with the following steps:'
  prefs: []
  type: TYPE_NORMAL
- en: We prepare the figure for visualizing the e-commerce order time series data.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: We prompt the reasoning model o3, ask it to take a closer look at the time series
    image we fed to it, and determine if an unusual pattern exists.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The o3 model will then output its findings in a pre-defined JSON format.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: And that’s it. Simple.
  prefs: []
  type: TYPE_NORMAL
- en: Of course, to deliver this solution, we need to enable o3 model to take image
    input and emit structured output. We will see how to do that shortly.
  prefs: []
  type: TYPE_NORMAL
- en: '**2.2 Setting up the reasoning model**'
  prefs: []
  type: TYPE_NORMAL
- en: As mentioned before, we’ll use o3 model, which is the flagship reasoning model
    from OpenAI that can tackle complex multi-step problems with state-of-the-art
    performance. Specifically, we’ll use the Azure OpenAI endpoint to call the model.
  prefs: []
  type: TYPE_NORMAL
- en: 'Make sure you have put the endpoint, API key, and deployment name in an `.env`
    file, we can then proceed to setting up the LLM client:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'We use the following instruction as the system message for the o3 model (tuned
    by GPT-5):'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: In the above instruction, we clearly defined the role of the LLM, the task that
    the LLM should complete, and the rules the LLM should follow.
  prefs: []
  type: TYPE_NORMAL
- en: To limit the complexity of our case study, we intentionally specified only four
    anomaly types that LLM needs to identify. We also provided clear definitions of
    those anomaly types to remove ambiguity.
  prefs: []
  type: TYPE_NORMAL
- en: Finally, we injected a bit of domain knowledge about e-commerce patterns, i.e.,
    lower weekend orders are expected compared to weekdays. Incorporating domain know-how
    is generally considered good practice for guiding the model’s analytical process.
  prefs: []
  type: TYPE_NORMAL
- en: Now that we have our model set up, let’s discuss how to prepare the image for
    o3 model to consume.
  prefs: []
  type: TYPE_NORMAL
- en: '**2.3 Image preparation**'
  prefs: []
  type: TYPE_NORMAL
- en: To enable o3’s multimodal capabilities, we need to provide figures in a specific
    format, i.e., either publicly accessible web URLs or as base64-encoded data URLs.
    Since our figures are generated locally, we’ll use the second approach.
  prefs: []
  type: TYPE_NORMAL
- en: '***What is Base64 Encoding anyway?** Base64 is a way to represent binary data
    (like our image files) using only text characters that are safe to transmit over
    the internet. It converts binary image data into a string of letters, numbers,
    and a few symbols.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '***And what about data URL?** A data URL is a type of URL that embeds the file
    content directly in the URL string, rather than pointing to a file location.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'We can use the following function to handle this conversion automatically:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: Essentially, our function first saves the matplotlib figure to a memory buffer.
    It then encodes the binary PNG data as base64 text and wraps it in the desired
    data URL format.
  prefs: []
  type: TYPE_NORMAL
- en: 'Assuming we have access to the synthetic daily order data, we can use the following
    function to generate the plot and convert it into a proper data URL format in
    one go:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: Figures 1-3 are generated by the above plotting routine.
  prefs: []
  type: TYPE_NORMAL
- en: '**2.4 Structured output**'
  prefs: []
  type: TYPE_NORMAL
- en: In this section, let’s discuss how to ensure the o3 model outputs a consistent
    JSON format instead of free-form text. This is what’s known as “structured output,”
    and it’s one of the key enablers for integrating LLMs into existing automatic
    workflows.
  prefs: []
  type: TYPE_NORMAL
- en: 'To achieve that, we start by defining the schema that governs the expected
    output structure. We’ll be using a Pydantic model:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: Our Pydantic schema tries to capture both the quantitative and qualitative aspects
    of the detected anomalies. For each field, we specify its data type (e.g., `int`
    for numerical values, `Literal` for a fixed set of choices, etc.).
  prefs: []
  type: TYPE_NORMAL
- en: Also, we use `Field` function to provide detailed descriptions of each key.
    Those descriptions are especially important as they effectively serve as inline
    instructions for o3, so that it understands the semantic meaning of each component.
  prefs: []
  type: TYPE_NORMAL
- en: Now, we have covered the multimodal input and structured output, time to put
    them together in one LLM call.
  prefs: []
  type: TYPE_NORMAL
- en: '**2.5 o3 model invocation**'
  prefs: []
  type: TYPE_NORMAL
- en: 'To interact with o3 using multimodal input and structured output, we use `LLM_client.beta.chat.completions.parse()`
    API. Some of the key arguments include:'
  prefs: []
  type: TYPE_NORMAL
- en: '`model`: the deployment name;'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`messages`: the message object sent to o3 model;'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`max_completion_token`: the maximum number of tokens the model can generate
    in its final response. Note that for reasoning models like o3, they will generate
    reasoning_tokens internally to “think through” the problem. The current `max_completion_token`
    only limits the visible output tokens that users receive;'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`response_format`: the Pydantic model that defines the expected JSON schema
    structure;'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`reasoning_effort`: a control knob that dictates how much computational effort
    o3 should use for reasoning. The available options include low, medium, and high.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'We can define a helper function to interact with the o3 model:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: Note that the `messages` object accepts both text and image content. Since we’ll
    solely use figures to prompt the model, the text prompt is optional.
  prefs: []
  type: TYPE_NORMAL
- en: 'We set the `"detail": "high"` to enable high-resolution image processing. For
    our current case study, this is most likely necessary as we need o3 to better
    read fine details like axis tick labels, data point values, and subtle visual
    patterns. However, bear in mind that high-detail processing would incur more tokens
    and higher API costs.'
  prefs: []
  type: TYPE_NORMAL
- en: Finally, by using `.parsed.model_dump()`, we turn the JSON output into a usual
    Python dictionary.
  prefs: []
  type: TYPE_NORMAL
- en: That’s it for the implementation. Let’s see some results next.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '**3\. Results**'
  prefs: []
  type: TYPE_NORMAL
- en: In this section, we’ll input the previously generated figures into the o3 model
    and ask it to identify potential anomalies.
  prefs: []
  type: TYPE_NORMAL
- en: '**3.1 Spike anomaly**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: 'In the call above, the `spike_anomaly_url` is the data URL for Figure 1\. The
    output of the result is shown below:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: 'We see that o3 model faithfully returned the output exactly in the format we
    designed. Now, we can grab this result and generate a visualization programmatically:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: 'The generated visualization looks like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/3daf6a2b78439a43bc1399273d64d47d.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4\. The anomaly detection results for Figure 1\. (Image by author)
  prefs: []
  type: TYPE_NORMAL
- en: We can see that the o3 model correctly identified the spike anomaly presented
    in this first set of synthetic data.
  prefs: []
  type: TYPE_NORMAL
- en: Not bad, especially considering the fact that we didn’t do any conventional
    model training, just by prompting an LLM.
  prefs: []
  type: TYPE_NORMAL
- en: '**3.2 Level shift anomaly**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: 'The output of the result is shown below:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: 'Again, we see that the model accurately identified that a “level_shift” anomaly
    is present in the plot:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b19e0fed1c3da11180170e89b6167619.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5\. The anomaly detection results for Figure 2\. (Image by author)
  prefs: []
  type: TYPE_NORMAL
- en: '**3.3 Seasonality anomaly**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: 'The output of the result is shown below:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: 'This is a challenging case. Nevertheless, our o3 model managed to tackle it
    properly, with accurate localization and a clear reasoning trace. Pretty impressive:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/9f3bc45322b4ad6349e6994a6427e179.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6\. The anomaly detection results for Figure 3\. (Image by author)
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '**4\. Summary**'
  prefs: []
  type: TYPE_NORMAL
- en: Congratulations! We’ve successfully built an anomaly detection solution for
    time-series data that worked entirely through visualization and prompting.
  prefs: []
  type: TYPE_NORMAL
- en: By feeding daily order plots into the o3 reasoning model and constraining its
    output to a JSON schema, the LLM managed to identify three different anomaly types
    with accurate localization. All of this was achieved without training any ML model.
    Impressive!
  prefs: []
  type: TYPE_NORMAL
- en: 'If we take a step back, we can see that the solution we built illustrates the
    broader pattern of combining three capabilities:'
  prefs: []
  type: TYPE_NORMAL
- en: '**See**: multimodal input to let the model consume figures directly.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Think**: step-by-step reasoning capability to tackle complex problems.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Integrate**: structured output that downstream systems can easily consume
    (e.g., generating visualizations).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The combination of multimodal input + reasoning + structured output really creates
    a versatile foundation for useful LLM applications.
  prefs: []
  type: TYPE_NORMAL
- en: You now have the building blocks ready. What do you want to build next?
  prefs: []
  type: TYPE_NORMAL
