- en: 'Real World Use Cases: Strategies that Will Bridge the Gap Between Development
    and Productionizing'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/real-world-use-cases-strategies-that-will-bridge-the-gap-between-development-and-productionizing-87765f00c4c4/](https://towardsdatascience.com/real-world-use-cases-strategies-that-will-bridge-the-gap-between-development-and-productionizing-87765f00c4c4/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![Image generated by Dall-e. All images and visualisations in this article
    are created by the author.](../Images/b5481f6a21380f247c62826a36c63b37.png)'
  prefs: []
  type: TYPE_IMG
- en: Image generated by Dall-e. All images and visualisations in this article are
    created by the author.
  prefs: []
  type: TYPE_NORMAL
- en: In my experience with machine learning and data science, transitioning from
    development to production is a critical and challenging phase. This process typically
    unfolds in iterative steps, gradually refining the product until it meets acceptable
    standards. Along the way, I’ve observed recurring pitfalls that often slow down
    the journey to production.
  prefs: []
  type: TYPE_NORMAL
- en: This article explores some of these challenges, focusing on the pre-release
    process. A separate article will go into depth on the post-production lifecycle
    of a project in greater detail.
  prefs: []
  type: TYPE_NORMAL
- en: I believe the iterative cycle is integral to the development process, and my
    goal is to optimize it, not eliminate it. To make the concepts more tangible,
    I’ll use the [Kaggle Fraud Detection dataset](https://www.kaggle.com/datasets/mlg-ulb/creditcardfraud/data)
    (DbCL license) as a case study. For modeling, I’ll leverage *TabNet* and *Optuna*
    for hyperparameter optimization. For a deeper explanation of these tools, please
    refer to my previous [article](https://medium.com/towards-data-science/real-world-use-cases-forecasting-service-utilization-using-tabnet-and-optuna-26308db615c3).
  prefs: []
  type: TYPE_NORMAL
- en: Optimizing Loss Functions and Metrics for Impact
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: When starting a new project, it’s essential to clearly define the ultimate objective.
    For example, in fraud detection, the qualitative goal – catching fraudulent transactions
    – should be translated into quantitative terms that guide the model-building process.
  prefs: []
  type: TYPE_NORMAL
- en: There is a tendency to default to using the F1 metric to measure results and
    an unweighted cross entropy loss function, *BCE loss*, for categorical problems.
    And for good reasons – these are very good, robust choices for measuring and training
    the model. This approach remains effective even for imbalanced datasets, as demonstrated
    later in this section.
  prefs: []
  type: TYPE_NORMAL
- en: To illustrate, we’ll establish a baseline model trained with a BCE loss (uniform
    weights) and evaluated using the F1 score. Here’s the resulting confusion matrix.
  prefs: []
  type: TYPE_NORMAL
- en: '![Confusion matrix displaying the results of a model trained with a BCE loss
    with weights 0.5 and evaluated with a F1 score.](../Images/ca35ab6fc73071b623f3dac9bb6ec732.png)'
  prefs: []
  type: TYPE_IMG
- en: Confusion matrix displaying the results of a model trained with a BCE loss with
    weights 0.5 and evaluated with a F1 score.
  prefs: []
  type: TYPE_NORMAL
- en: The model shows reasonable performance, but it struggles to detect fraudulent
    transactions, missing 13 cases while flagging only one false positive. From a
    business standpoint, letting a fraudulent transaction occur may be worse than
    incorrectly flagging a legitimate one. Adjusting the loss function and evaluation
    metric to align with business priorities can lead to a more suitable model.
  prefs: []
  type: TYPE_NORMAL
- en: To guide the model choice towards prioritizing certain classes, we adjusted
    the F-beta metric. Looking into our metric for choosing a model, F-beta, we can
    make the following derivation.
  prefs: []
  type: TYPE_NORMAL
- en: '![Derivation of F-beta metric to get the desired equation. Image by author.](../Images/05e0001339076a595e62618ba2e5046e.png)'
  prefs: []
  type: TYPE_IMG
- en: Derivation of F-beta metric to get the desired equation. Image by author.
  prefs: []
  type: TYPE_NORMAL
- en: Here, one false positive is weighted as beta square false negatives. Determining
    the optimal balance between false positives and false negatives is a nuanced process,
    often tied to qualitative business goals. In an upcoming article, we will go more
    in depth in how we derive a beta from more qualitative business goals. For demonstration,
    we’ll use a weighting equivalent to the square root of 200​, implying that 200
    unnecessary flags are acceptable for each additional fraudulent transaction prevented.
    Also worth noting, is that as FN and FP goes to zero, the metric goes to one,
    regardless of the choice of beta.
  prefs: []
  type: TYPE_NORMAL
- en: For our loss function, we have analogously chosen a weight of 0.995 for fraudulent
    data points and 0.005 for non fraudulent data points.
  prefs: []
  type: TYPE_NORMAL
- en: '![Confusion matrix displaying the results of a model trained with a BCE loss
    with weights 0.995 and evaluated with a F14 score.](../Images/951473f49d667e8e5dd97a6a320f4ef8.png)'
  prefs: []
  type: TYPE_IMG
- en: Confusion matrix displaying the results of a model trained with a BCE loss with
    weights 0.995 and evaluated with a F14 score.
  prefs: []
  type: TYPE_NORMAL
- en: The results from the updated model on the test set are displayed above. Apart
    from the base case, our second model prefers 16 cases of false positives over
    two cases of false negatives. This tradeoff is in line with the nudge we hoped
    to get.
  prefs: []
  type: TYPE_NORMAL
- en: Prioritize Representative Metrics Over Inflated Ones.
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In data science, competing for resources is common, and presenting inflated
    results can be tempting. While this might secure short-term approval, it often
    leads to stakeholder frustration and unrealistic expectations.
  prefs: []
  type: TYPE_NORMAL
- en: Instead, presenting metrics that accurately represent the current state of the
    model fosters better long-term relationships and realistic project planning. Here’s
    a concrete approach.
  prefs: []
  type: TYPE_NORMAL
- en: '***Split the data accordingly.***'
  prefs: []
  type: TYPE_NORMAL
- en: Split the dataset to mirror real-world scenarios as closely as possible. If
    your data has a temporal aspect, use it to create meaningful splits. I have covered
    this in a prior [article](https://medium.com/towards-data-science/real-world-use-cases-forecasting-service-utilization-using-tabnet-and-optuna-26308db615c3),
    for those wanting to see more examples.
  prefs: []
  type: TYPE_NORMAL
- en: 'In the Kaggle dataset, we will assume the data is ordered by time, in the Time
    column. We will do a train-test-val split, on 80%, 10%, 10%. These sets can be
    thought of as: *You are training with the training dataset, you are optimising
    parameters with the test dataset, and you are presenting the metrics from the
    validation dataset*.'
  prefs: []
  type: TYPE_NORMAL
- en: Note, that in the previous section we looked at the results from the test data,
    i.e. the one we are using for parameter optimisation. The validation data set
    which held out, we now will look into.
  prefs: []
  type: TYPE_NORMAL
- en: '![Confusion matrix for the validation dataset, with beta 1 and unweighted loss.
    Image by author.](../Images/c8f55caaff23eff8321c9df28f17d2b9.png)'
  prefs: []
  type: TYPE_IMG
- en: Confusion matrix for the validation dataset, with beta 1 and unweighted loss.
    Image by author.
  prefs: []
  type: TYPE_NORMAL
- en: '![Confusion matrix for the validation dataset, with beta 14 and weighted loss.
    Image by author.](../Images/9a140952e134d9d7244b92c93f1a68aa.png)'
  prefs: []
  type: TYPE_IMG
- en: Confusion matrix for the validation dataset, with beta 14 and weighted loss.
    Image by author.
  prefs: []
  type: TYPE_NORMAL
- en: We observe a drop in recall from 75% to 68% and from 79% to 72%, for our baseline
    and weighted models respectively. This is expected, as the test set is optimized
    during model picking. The validation set, however, gives a more honest assessment.
  prefs: []
  type: TYPE_NORMAL
- en: '**Be Mindful of Model Uncertainty.**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As in manual decision making, some data points are more difficult than others
    to assess. And the same phenomena might occur from a modelling perspective. Addressing
    this uncertainty can facilitate smoother model deployment. For this business purpose
    – do we have to classify all data points? Do we have to give a pont estimate or
    is a range sufficient? Initially focus on limited, high-confidence predictions.
  prefs: []
  type: TYPE_NORMAL
- en: These are two possible scenarios, and their solutions respectively.
  prefs: []
  type: TYPE_NORMAL
- en: '***Classification.***'
  prefs: []
  type: TYPE_NORMAL
- en: If the task is classification, consider implementing a threshold on your output.
    This way, only the labels the model feels certain about will be outputted. Else,
    the model will pass the task, not label the data. I have covered this in depth
    in this [article](https://medium.com/towards-data-science/mastering-model-uncertainty-thresholding-techniques-in-deep-learning-1f1ab3912fd1).
  prefs: []
  type: TYPE_NORMAL
- en: '***Regression.***'
  prefs: []
  type: TYPE_NORMAL
- en: The regression equivalent of the thresholding for the classification case, is
    to introduce a confidence interval rather than presenting a point estimate. The
    width of the confidence is determined by the business use case, but of course
    the trade off is between prediction accuracy and prediction certainty. This topic
    is discussed further in a previous [article](https://medium.com/towards-data-science/real-world-use-cases-forecasting-service-utilization-using-tabnet-and-optuna-26308db615c3).
  prefs: []
  type: TYPE_NORMAL
- en: '**Model Explainability**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Incorporating model explainability is to prefer whenever possible. While the
    concept of explainability is model-agnostic, its implementation can vary depending
    on the model type.
  prefs: []
  type: TYPE_NORMAL
- en: The importance of model explainability is twofold. First is building trust.
    Machine learning still faces skepticism in some circles. Transparency helps reduce
    this skepticism by making the model’s behavior understandable and its decisions
    justifiable.
  prefs: []
  type: TYPE_NORMAL
- en: The second is to detect overfitting. If the model’s decision-making process
    doesn’t align with domain knowledge, it could indicate overfitting to noisy training
    data. Such a model risks poor generalization when exposed to new data in production.
    Conversely, explainability can provide surprising insights that enhance subject
    matter expertise.
  prefs: []
  type: TYPE_NORMAL
- en: For our use case, we’ll assess feature importance to gain a clearer understanding
    of the model’s behavior. Feature importance scores indicate how much individual
    features contribute, on average, to the model’s predictions.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c6f90572ef8b9e6a1d46bb7828e86f2a.png)'
  prefs: []
  type: TYPE_IMG
- en: This is a normalized score across the features of the dataset, indicating how
    much they are used on average to determine the class label.
  prefs: []
  type: TYPE_NORMAL
- en: Consider the dataset as if it were not anonymized. I have been in projects where
    analyzing feature importance has provided insights into marketing effectiveness
    and revealed key predictors for technical systems, such as during predictive maintenance
    projects. However, the most common reaction from subject matter experts (SMEs)
    is often a reassuring, "Yes, these values make sense to us."
  prefs: []
  type: TYPE_NORMAL
- en: An in-depth article exploring various model explanation techniques and their
    implementations is forthcoming.
  prefs: []
  type: TYPE_NORMAL
- en: Preparing for Data and Label Drift in Production Systems
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A common but risky assumption is that the data and label distributions will
    remain stationary over time. Based on my experience, this assumption rarely holds,
    except in certain highly controlled technical applications. Data drift – changes
    in the distribution of features or labels over time – is a natural phenomenon.
    Instead of resisting it, we should embrace it and incorporate it into our system
    design.
  prefs: []
  type: TYPE_NORMAL
- en: A few things we might consider is to try to build a model that is better to
    adapt to the change or we can set up a system for monitoring drift and calculate
    it’s consequences. And make a plan when and why to retrain the model. An in depth
    article within drift detection and modelling strategies will be coming up shortly,
    also covering explanation of data and label drift and including retraining and
    monitoring strategies.
  prefs: []
  type: TYPE_NORMAL
- en: For our example, we’ll use the Python library *Deepchecks* to analyze feature
    drift in the Kaggle dataset. Specifically, we’ll examine the feature with the
    highest *Kolmogorov-Smirnov* (KS) score, which indicates the greatest drift. We
    view the drift between the train and test set.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/252b67ba2d39b56ff3b4695499e9510b.png)![](../Images/bbf30c5702bdac373e946776caf0f881.png)![](../Images/54430a96a55353c76ac829f89bbc094e.png)![](../Images/c957ac4560ef622d5913ff1023780bd7.png)![](../Images/de00c2055d8c93b0513114c80ecd002b.png)'
  prefs: []
  type: TYPE_IMG
- en: While it’s difficult to predict exactly how data will change in the future,
    we can be confident that it will. Planning for this inevitability is critical
    for maintaining robust and reliable machine learning systems.
  prefs: []
  type: TYPE_NORMAL
- en: '**Summary**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Bridging the gap between machine learning development and production is no small
    feat – it’s an iterative journey full of pitfalls and learning opportunities.
    This article dives into the critical pre-production phase, focusing on optimizing
    metrics, handling model uncertainty, and ensuring transparency through explainability.
    By aligning technical choices with business priorities, we explore strategies
    like adjusting loss functions, applying confidence thresholds, and monitoring
    data drift. After all, a model is only as good as its ability to adapt – similar
    to human adaptability.
  prefs: []
  type: TYPE_NORMAL
- en: '**Thank you for taking the time to explore this topic.**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: I hope this article provided valuable insights and inspiration. If you have
    any comments or questions, please reach out. You can also connect with me on [LinkedIn](https://www.linkedin.com/in/hampus-gustavsson-23721a116/).
  prefs: []
  type: TYPE_NORMAL
