- en: An Unbiased Review of Snowflake’s Document AI
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 《雪花公司文档人工智能的无偏见评论》
- en: 原文：[https://towardsdatascience.com/an-unbiased-review-of-snowflakes-document-ai/](https://towardsdatascience.com/an-unbiased-review-of-snowflakes-document-ai/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/an-unbiased-review-of-snowflakes-document-ai/](https://towardsdatascience.com/an-unbiased-review-of-snowflakes-document-ai/)
- en: As data <mdspan datatext="el1744747249097" class="mdspan-comment">professionals</mdspan>,
    we’re comfortable with tabular data…
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 作为数据专业人士，我们对表格数据感到很自在…
- en: '![](../Images/f6ae3efd084c81e4b99b95e3bfe9b396.png)'
  id: totrans-3
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f6ae3efd084c81e4b99b95e3bfe9b396.png)'
- en: Tabular data. Image by Author.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 表格数据。图片由作者提供。
- en: We can also handle words, json, xml feeds, and pictures of cats. But what about
    a cardboard box full of things like this?
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还可以处理文字、json、xml流和猫的图片。但关于装满这类东西的纸箱怎么办？
- en: '![](../Images/bee3f747096475c20c44ee6e3eb97f29.png)'
  id: totrans-6
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/bee3f747096475c20c44ee6e3eb97f29.png)'
- en: (Image by Annie Spratt, [Unsplash](https://unsplash.com/photos/a-receipt-sitting-on-top-of-a-wooden-table-recgFWxDO1Y))
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: （图片由Annie Spratt提供，[Unsplash](https://unsplash.com/photos/a-receipt-sitting-on-top-of-a-wooden-table-recgFWxDO1Y)）
- en: The info on this receipt wants so badly to be in a tabular database somewhere.
    Wouldn’t it be great if we could scan all these, run them through an LLM, and
    save the results in a table?
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 这张收据上的信息非常渴望被存储在某个表格数据库中。如果我们能够扫描所有这些，通过LLM进行处理，并将结果保存在表格中，那岂不是很好？
- en: Lucky for us, we live in the era of Document AI. Document AI combines OCR with
    LLMs and allows us to build a bridge between the paper world and the digital database
    world.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 幸运的是，我们生活在文档人工智能的时代。文档人工智能结合了OCR和LLMs，使我们能够搭建起纸质世界和数字数据库世界之间的桥梁。
- en: All the major cloud vendors have some version of this…
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 所有主要云服务提供商都有某种版本的这种技术…
- en: '[Google (Document AI)](https://cloud.google.com/document-ai?hl=en),'
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[谷歌（文档人工智能）](https://cloud.google.com/document-ai?hl=en),'
- en: '[Microsoft (Document AI)](https://www.microsoft.com/en-us/research/project/document-ai/)'
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[微软（文档人工智能）](https://www.microsoft.com/en-us/research/project/document-ai/)'
- en: '[AWS (Intelligent Document Processing](https://aws.amazon.com/ai/generative-ai/use-cases/document-processing/))'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[AWS（智能文档处理）](https://aws.amazon.com/ai/generative-ai/use-cases/document-processing/)'
- en: '[Snowflake (Document AI)](https://docs.snowflake.com/en/user-guide/snowflake-cortex/document-ai/overview)'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[雪花（文档人工智能）](https://docs.snowflake.com/en/user-guide/snowflake-cortex/document-ai/overview)'
- en: Here I’ll share my thoughts on Snowflake’s Document AI. Aside from using Snowflake
    at work, I have no affiliation with Snowflake. They didn’t commission me to write
    this piece and I’m not part of any ambassador program. All of that is to say I
    can write an *unbiased* review of [Snowflake’s Document AI](https://docs.snowflake.com/en/user-guide/snowflake-cortex/document-ai/overview).
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我将分享我对雪花公司文档人工智能的看法。除了在工作中使用雪花公司产品外，我与雪花公司没有任何关联。他们没有委托我写这篇文章，我也没有参与任何大使计划。所有这些只是为了说明，我可以写一篇*无偏见*的[雪花公司文档人工智能](https://docs.snowflake.com/en/user-guide/snowflake-cortex/document-ai/overview)评论。
- en: '* * *'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: What is Document AI?
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是文档人工智能？
- en: Document AI allows users to quickly extract information from digital documents.
    When we say “documents” we mean pictures with words. Don’t confuse this with [niche
    NoSQL things](https://aws.amazon.com/documentdb/).
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 文档人工智能允许用户快速从数字文档中提取信息。当我们说“文档”时，我们指的是带文字的图片。不要将此与[特定领域的NoSQL事物](https://aws.amazon.com/documentdb/)混淆。
- en: The product combines OCR and LLM models so that a user can create a set of prompts
    and execute those prompts against a large collection of documents all at once.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 该产品结合了OCR和LLM模型，使用户能够创建一组提示，并一次性对大量文档执行这些提示。
- en: '![](../Images/81162c7495f4010c90185fe4c68c465d.png)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/81162c7495f4010c90185fe4c68c465d.png)'
- en: Snowflake’s Document AI on a (scrubbed) resume. Image by author.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 雪花公司的文档人工智能在（清洗过的）简历中的应用。图片由作者提供。
- en: LLMs and OCR both have room for error. Snowflake solved this by (1) banging
    their heads against OCR until it’s sharp — I see you, Snowflake developer — and
    (2) letting me fine-tune my LLM.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: LLMs和OCR都有出错的空间。雪花公司通过（1）不断敲打OCR直到它变得锋利——我看到你，雪花开发者——以及（2）让我微调我的LLM来解决这个问题。
- en: Fine-tuning the Snowflake LLM feels a lot more like [glamping](https://www.merriam-webster.com/dictionary/glamping)
    than some rugged outdoor adventure. I review 20+ documents, hit the “train model”
    button, then rinse and repeat until performance is satisfactory. Am I even a data
    scientist anymore?
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 微调雪花LLM的感觉更像[露营](https://www.merriam-webster.com/dictionary/glamping)而不是一些粗犷的户外冒险。我审查了20多份文档，点击“训练模型”按钮，然后冲洗并重复，直到性能令人满意。我甚至还是数据科学家吗？
- en: Once the model is trained, I can run my prompts on 1000 documents at a time.
    I like to save the results to a table but you could do whatever you want with
    the results real time.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦模型训练完成，我就可以一次运行1000份文档的提示。我喜欢将结果保存到表格中，但你可以实时处理结果。
- en: '* * *'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Why does it matter?
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 这为什么重要？
- en: This product is cool for several reasons.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 这个产品有几个原因很酷。
- en: You can build a bridge between the paper and digital world. I never thought
    the big box of paper invoices under my desk would make it into my cloud data warehouse,
    but now it can.  Scan the paper invoice, upload it to snowflake, run my Document
    AI model, and wham! I have my desired information parsed into a tidy table.
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可以在纸质世界和数字世界之间架起一座桥梁。我从未想过我桌子下的那一大堆纸质发票会进入我的云数据仓库，但现在它可以了。扫描纸质发票，上传到Snowflake，运行我的文档AI模型，然后！我想要的所需信息就被解析成整洁的表格。
- en: It’s frighteningly convenient to invoke a machine-learning model via SQL. Why
    didn’t we think of this sooner? In a old times this was a few hundred of lines
    of code to load the raw data (SQL >> python/spark/etc.), clean it, engineer features,
    train/test split, train a model, make predictions, and then often write the predictions
    back into SQL.
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过SQL调用机器学习模型非常方便，为什么我们之前没有想到这一点呢？在以前，这需要几百行代码来加载原始数据（SQL >> python/spark等），清理数据，构建特征，进行训练/测试分割，训练模型，做出预测，然后通常将预测写回SQL。
- en: To build this in-house would be a major undertaking. Yes, OCR has been around
    a long time but can still be finicky. Fine-tuning an LLM obviously hasn’t been
    around too long, but is getting easier by the week. To piece these together in
    a way that achieves high accuracy for a variety of documents could take a long
    time to hack on your own. Months of months of polish.
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在内部构建这将是一项重大任务。是的，OCR技术已经存在很长时间了，但仍然可能有些挑剔。显然，微调LLM的时间并不长，但每周都在变得更容易。要自己将这些组件组合起来以实现各种文档的高精度，可能需要花费很长时间。需要数月的时间进行打磨。
- en: Of course some elements are still built in house. Once I extract information
    from the document I have to figure out what to do with that information. That’s
    relatively quick work, though.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，一些元素仍然是在内部构建的。一旦我从文档中提取信息，我就必须想出如何处理这些信息。虽然这是一项相对快速的工作。
- en: '* * *'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Our Use Case — Bring on Flu Season:'
  id: totrans-33
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我们的用例——迎接流感季节：
- en: I work at a company called [IntelyCare](https://www.intelycare.com/). We operate
    in the healthcare staffing space, which means we help hospitals, nursing homes,
    and rehab centers find quality clinicians for individual shifts, extended contracts,
    or full-time/part-time engagements.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 我在一家名为[IntelyCare](https://www.intelycare.com/)的公司工作。我们在医疗人员配置领域运营，这意味着我们帮助医院、养老院和康复中心为个别班次、长期合同或全职/兼职工作找到优质的临床医生。
- en: Many of our facilities require clinicians to have an up-to-date flu shot. Last
    year, our clinicians submitted over 10,000 flu shots in addition to hundreds of
    thousands of other documents. We manually reviewed all of these manually to ensure
    validity. Part of the joy of working in the healthcare staffing world!
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 我们许多设施要求临床医生必须接种最新的流感疫苗。去年，我们的临床医生提交了超过10,000份流感疫苗，以及数十万份其他文件。我们手动审查了所有这些文件以确保其有效性。这是在医疗人员配置世界中工作的乐趣之一！
- en: '**Spoiler Alert: Using Document AI, we were able to reduce the number of flu-shot
    documents needing manual review by ~50% and all in just a couple of weeks.**'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: '**剧透警告：使用文档AI，我们能够在短短几周内将需要手动审查的流感疫苗文件数量减少了约50%。**'
- en: 'To pull this off, we did the following:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 要实现这一点，我们做了以下几件事：
- en: Uploaded a pile of flu-shot documents to snowflake.
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将一堆流感疫苗文件上传到Snowflake。
- en: Massaged the prompts, trained the model, massaged the prompts some more, retrained
    the model some more…
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 调整提示，训练模型，再次调整提示，再次重新训练模型……
- en: Built out the logic to compare the model output against the clinician’s profile
    (e.g. do the names match?). Definitely some trial and error here with formatting
    names, dates, etc.
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 构建了逻辑来比较模型输出与临床医生档案（例如，名字是否匹配）的对比。在格式化名字、日期等方面肯定会有一些试错。
- en: Built out the “decision logic” to either approve the document or send it back
    to the humans.
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 构建了“决策逻辑”，用于批准文档或将文档退回给人类。
- en: Tested the full pipeline on bigger pile of manually reviewed documents. Took
    a close look at any false positives.
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在更大的手动审查文档堆上测试了整个流程。仔细检查了任何假阳性。
- en: Repeated until our confusion matrix was satisfactory.
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 重复操作，直到我们的混淆矩阵令人满意。
- en: For this project, false positives pose a business risk. We don’t want to approve
    a document that’s expired or missing key information. We kept iterating until
    the false-positive rate hit zero. We’ll have some false positives eventually,
    but fewer than what we have now with a human review process.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这个项目，假阳性会带来业务风险。我们不希望批准过期或缺少关键信息的文档。我们不断迭代，直到假阳性率降为零。最终我们可能会有一些假阳性，但会比现在的人工审查过程少。
- en: False negatives, however, are harmless. If our pipeline doesn’t like a flu shot,
    it simply routes the document to the human team for review. If they go on to approve
    the document, it’s business as usual.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，假阴性是无害的。如果我们的管道不喜欢流感疫苗，它就会简单地将文档路由到人工团队进行审查。如果他们继续批准文档，那么一切照旧。
- en: The model does well with the clean/easy documents, which account for ~50% of
    all flu shots. If it’s messy or confusing, it goes back to the humans as before.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 模型在处理干净/简单的文档方面做得很好，这些文档占所有流感疫苗的 ~50%。如果它很混乱或令人困惑，它就会像以前一样回到人工那里。
- en: '* * *'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Things we learned along the way
  id: totrans-48
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我们在过程中学到的东西
- en: '*The model does best at reading the document, not making decisions or doing
    math based on the document.*'
  id: totrans-49
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*模型在阅读文档方面做得最好，而不是基于文档做出决定或进行数学运算。*'
- en: Initially, our prompts attempted to determine validity of the document.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 最初，我们的提示试图确定文档的有效性。
- en: 'Bad: *Is the document already expired?*'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 坏：*文档是否已经过期？*
- en: We found it *far* more effective to limit our prompts to questions that could
    be answered by looking at the document. The LLM doesn’t *determine* anything.
    It just grabs the relevant data points off the page.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 我们发现将提示限制为可以通过查看文档回答的问题要有效得多。LLM 并不 *确定* 任何事情。它只是从页面上抓取相关的数据点。
- en: 'Good: *What is the expiration date? *'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 好：*过期日期是什么？*
- en: Save the results and do the math downstream.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 保存结果并做下游的数学运算。
- en: '**You still need to be thoughtful about training data**'
  id: totrans-55
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**您仍然需要仔细考虑训练数据**'
- en: We had a few duplicate flu shots from one clinician in our training data. Call
    this clinician Ben. One of our prompts was, “what is the patient’s name?” Because
    “Ben” was in the training data multiple times, any remotely unclear document would
    return with “Ben” as the patient name.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的训练数据中，一位临床医生有几份重复的流感疫苗。称这位临床医生为 Ben。我们中的一个提示是，“病人的名字是什么？”因为“Ben”在训练数据中多次出现，任何稍微不清楚的文档都会返回“Ben”作为病人名字。
- en: So overfitting is still a thing. Over/under sampling is still a thing. We tried
    again with a more thoughtful collection of training documents and things did much
    better.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，过度拟合仍然是一个问题。过采样/欠采样仍然是一个问题。我们用更仔细收集的训练文档再次尝试，效果要好得多。
- en: Document AI is pretty magical, but not *that* magical. Fundamentals still matter.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 文档 AI 非常神奇，但并非 *那么* 神奇。基础知识仍然很重要。
- en: '**The model could be fooled by writing on a napkin.**'
  id: totrans-59
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**模型可能会被写在餐巾纸上的内容欺骗。**'
- en: To my knowledge, Snowflake does not have a way to render the document image
    as an [embedding](https://abdulkaderhelwan.medium.com/introduction-to-image-embeddings-55b8247d13f2).
    You can create an embedding from the extracted text, but that won’t tell you if
    the text was written by hand or not. As long as the *text* is valid, the model
    and downstream logic will give it a green light.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 根据我的了解，Snowflake 没有将文档图像渲染为 [嵌入](https://abdulkaderhelwan.medium.com/introduction-to-image-embeddings-55b8247d13f2)
    的方法。您可以从提取的文本中创建嵌入，但这不会告诉您文本是否是手写的。只要 *文本* 是有效的，模型和下游逻辑都会给它绿灯。
- en: You could fix this pretty easily by comparing image embeddings of submitted
    documents to the embeddings of accepted documents. Any document with an embedding
    way out in left field is sent back for human review. This is straightforward work,
    but you’ll have to do it outside Snowflake for now.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以通过比较提交文档的图像嵌入与已接受文档的嵌入来轻松解决这个问题。任何嵌入偏离太远的文档都会被退回进行人工审查。这是一项简单的工作，但现在您必须在外部
    Snowflake 中完成。
- en: '**Not as expensive as I was expecting **'
  id: totrans-62
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**没有我想象的那么贵**'
- en: Snowflake has a reputation of being spendy. And for HIPAA compliance concerns
    we run a higher-tier Snowflake account for this project. I tend to worry about
    running up a Snowflake tab.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: Snowflake 以开销大而闻名。出于 HIPAA 合规性考虑，我们为这个项目运行了一个更高级别的 Snowflake 账户。我倾向于担心 Snowflake
    的账单。
- en: In the end we had to try extra hard to spend more than $100/week while training
    the model. We ran thousands of documents through the model every few days to measure
    its accuracy while iterating on the model, but never managed to break the budget.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们不得不加倍努力，每周花费超过100美元来训练模型。我们每隔几天就运行数千份文档通过模型来衡量其准确性，并在迭代模型的同时，但从未能突破预算。
- en: Better still, we’re saving money on the manual review process. The costs for
    AI reviewing 1000 documents (approves ~500 documents) is ~20% of the cost we spend
    on humans reviewing the remaining 500\. All in, a 40% reduction in costs for reviewing
    flu-shots.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 更好的是，我们在人工审查过程中节省了资金。使用AI审查1000份文档（批准约500份）的成本大约是我们用于人工审查剩余500份文档成本的20%。总的来说，流感疫苗接种审查的成本降低了40%。
- en: '* * *'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Summing up
  id: totrans-67
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 总结
- en: I’ve been impressed with how quickly we could complete a project of this scope
    using Document AI. We’ve gone from months to days. I give it 4 stars out of 5,
    and am open to giving it a 5th star if Snowflake ever gives us access to image
    embeddings.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 我对使用Document AI完成如此规模的项目速度之快印象深刻。我们从几个月缩短到了几天。我给它打4星（满分5星），如果Snowflake能给我们提供访问图像嵌入的功能，我愿意给它第五星。
- en: Since flu shots, we’ve deployed similar models for other documents with similar
    or better results. And with all this prep work, instead of dreading the upcoming
    flu season, we’re ready to bring it on.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 自从流感疫苗接种以来，我们已经为其他类似或更好的文档部署了类似的模型，并且有了所有这些准备工作，我们不再害怕即将到来的流感季节，而是准备好迎接挑战。
