  type: TYPE_NORMAL
  zh: 本文的完整代码：[**GitHub**](https://github.com/mdipietro09/GenerativeAI/blob/main/Agents_ZeroToHero/notebook.ipynb)
- en: I hope you enjoyed it! Feel free to contact me for questions and feedback or
    just to share your interesting projects.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 希望您喜欢！欢迎联系我提问、反馈或分享您有趣的项目。
