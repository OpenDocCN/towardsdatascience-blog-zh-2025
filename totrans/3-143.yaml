- en: 'AI Agents from Scratch: Iterations & Chains'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/ai-agents-from-zero-to-hero-part-2/](https://towardsdatascience.com/ai-agents-from-zero-to-hero-part-2/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**<mdspan datatext="el1743017574199" class="mdspan-comment">Intro</mdspan>**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In [Part 1](https://towardsdatascience.com/ai-agents-from-zero-to-hero-part-1/)
    of this tutorial series, we introduced **AI Agents**, autonomous programs that
    perform tasks, make decisions, and communicate with others.
  prefs: []
  type: TYPE_NORMAL
- en: Agents perform actions through Tools. It might happen that a Tool doesn’t work
    on the first try, or that multiple Tools must be activated in sequence. Agents
    should be able to organize tasks into a logical progression and change their strategies
    in a dynamic environment.
  prefs: []
  type: TYPE_NORMAL
- en: 'To put it simply, the Agent’s structure must be solid, and the behavior must
    be reliable. The most common way to do that is through:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Iterations –** repeating a certain action multiple times, often with slight
    changes or improvements in each cycle. Every time might involve the Agent revisiting
    certain steps to refine its output or reach an optimal solution.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Chains** **–** a series of actions that are linked together in a sequence.
    Each step in the chain is dependent on the previous one, and the output of one
    action becomes the input for the next.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In this tutorial, I’m going to show how to use **iterations and chains for Agents**.
    I will present some useful Python code that can be easily applied in other similar
    cases (just copy, paste, run) and walk through every line of code with comments
    so that you can replicate this example (link to full code at the end of the article).
  prefs: []
  type: TYPE_NORMAL
- en: '**Setup**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Please refer to [Part 1](https://towardsdatascience.com/ai-agents-from-zero-to-hero-part-1/)
    for the setup of [***Ollama***](https://ollama.com/) and the main LLM.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: We will use the [*YahooFinance* public APIs](https://yfinance-python.org/) with
    the Python library (`pip install yfinance==0.2.55`) to download financial data.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/f78d6ac26569e06de1298387249dddd2.png)'
  prefs: []
  type: TYPE_IMG
- en: Let’s embed that into a Tool.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/ea1f9b6db9a06611d982aad95c41c8b6.png)'
  prefs: []
  type: TYPE_IMG
- en: Moreover, taking the code from the previous article as a reference, I shall
    write a general function to process the model response, such as when the Agent
    wants to use a Tool or when it just returns text.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: Let’s start a quick conversation with our Agent. For now, I’m going to use a
    simple generic prompt.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: As you can see, I started by asking an “easy” question. The LLM already knows
    that the symbol of Microsoft stock is MSFT, therefore the Agent was able to activate
    the Tool with the right inputs. But what if I ask something that might not be
    included in the LLM knowledge base?
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/6794ec7547ecfad80dcf54c9dc341e7a.png)'
  prefs: []
  type: TYPE_IMG
- en: Seems that the LLM doesn’t know that Facebook changed its name to META, so it
    used the Tool with the wrong inputs. I will enable the Agent to try an action
    several times through iterations.
  prefs: []
  type: TYPE_NORMAL
- en: '**Iterations**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Iterations refer to the repetition of a process until a certain condition is
    met. We can let the Agent try a specific number of times, but we need to let it
    know that the previous parameters didn’t work, by adding the details in the message
    history.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/400dd2794aca736a4a2f9b023abd2aad.png)'
  prefs: []
  type: TYPE_IMG
- en: The Agent tried 3 times with different inputs but it couldn’t find a solution
    because there is a gap in the LLM knowledge base. In this case, the model needed
    human input to understand how to use the Tool.
  prefs: []
  type: TYPE_NORMAL
- en: Next, we’re going to enable the Agent to fill the knowledge gap by itself.
  prefs: []
  type: TYPE_NORMAL
- en: '**Chains**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A chain refers to a linear sequence of actions where the output of one step
    is used as the input for the next step. In this example, I will add another Tool
    that the Agent can use in case the first one fails.
  prefs: []
  type: TYPE_NORMAL
- en: We can use the web-searching Tool from the previous article.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/df35b941be6ad9a440d3a15e4ff1ce1b.png)'
  prefs: []
  type: TYPE_IMG
- en: 'So far, I’ve always used very generic prompts as the tasks were relatively
    simple. Now, I want to make sure that the Agent understands how to use the Tools
    in the right order, so I’m going to write a **proper prompt**. This is how a prompt
    should be done:'
  prefs: []
  type: TYPE_NORMAL
- en: The goal of the Agent
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: What it must return (i.e. format, content)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Any relevant warnings that might affect the output
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Context dump
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: We can simply add the chain to the iteration loop that we already have. This
    time the Agent has two Tools, and when the first fails, the model can decide whether
    to retry or to use the second one. Then, if the second Tool is used, **the Agent
    must process the output and learn** what’s the right input for the first Tool
    that initially failed.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/ff88c20cd12928894453355d965218e5.png)'
  prefs: []
  type: TYPE_IMG
- en: As expected, the Agent tried to use the first Tool with the wrong inputs, but
    instead of trying the same action again as before, it decided to use the second
    Tool. By consuming information, it should understand the solution without the
    need for human input.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e18010afb8d0dfa2d8c611f44ec7c468.png)'
  prefs: []
  type: TYPE_IMG
- en: In summary, the AI tried to do an action but failed due to a gap in its knowledge
    base. So it activated Tools to fill that gap and deliver the output requested
    by the user… that is indeed the true essence of AI Agents.
  prefs: []
  type: TYPE_NORMAL
- en: '**Conclusion**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This article has covered more structured ways to make Agents more reliable,
    using iterations and chains. With these building blocks in place, you are already
    equipped to start developing your own Agents for different use cases.
  prefs: []
  type: TYPE_NORMAL
- en: '**Stay tuned for Part 3**, where we will dive deeper into more advanced examples.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Full code for this article: [**GitHub**](https://github.com/mdipietro09/GenerativeAI/blob/main/Agents_ZeroToHero/notebook.ipynb)'
  prefs: []
  type: TYPE_NORMAL
- en: I hope you enjoyed it! Feel free to contact me for questions and feedback or
    just to share your interesting projects.
  prefs: []
