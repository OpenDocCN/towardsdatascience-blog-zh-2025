- en: How to Correctly Apply Limits on the Result in DAX (and SQL)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/how-to-correctly-apply-limits-on-the-result-in-dax-and-sql/](https://towardsdatascience.com/how-to-correctly-apply-limits-on-the-result-in-dax-and-sql/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Introduction
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '<mdspan datatext="el1755541242905" class="mdspan-comment">A few days ago</mdspan>,
    one of my clients asked me the following question:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: '*My company applies a limit on the overtime balance each employee can accumulate.
    This Limit is at 20 hours in total.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: If an employee surpasses this limit, overtime exceeding 20 hours will be reduced.*
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: '*How can I calculate this in Power BI?*'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/875b25d7f180e9d8a689467c25dfdf77.png)'
  id: totrans-7
  prefs: []
  type: TYPE_IMG
- en: Photo by [Glenn Villas](https://unsplash.com/@glennvillas?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on [Unsplash](https://unsplash.com/photos/a-red-off-limit-sign-hanging-from-a-rope-Z5jO59eYuqM?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: This sounds like an easy job.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
- en: Add a measure that checks if the total amount of overtime exceeds 20, and if
    so, return 20\. Isn’t that correct?
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: Let’s try a DAX measure
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'First, we must create a measure that adds up all overtime done since the beginning
    of time to calculate the total balance:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  id: totrans-13
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'Second, we create a measure to set the upper limit to 20:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  id: totrans-15
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'Let’s see the result:'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/50b2a882f698f40b8601e04a4ea60de0.png)'
  id: totrans-17
  prefs: []
  type: TYPE_IMG
- en: Figure 1 – result of the first approach to solve the challenge (Figure by the
    Author)
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: It looks correct.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: Upon closer examination of the results, we find that they don’t add up correctly.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: 'Look at Mandy Jones (Name is invented):'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/073247cd973750364c70b28336ae6699.png)'
  id: totrans-22
  prefs: []
  type: TYPE_IMG
- en: Figure 2 – Results for Mandy Jones, where we see that the results don’t add
    up correctly (Figure by the Author)
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: Starting from April, she worked fewer hours to reduce her overtime balance.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
- en: But the measure [Overtime Overall] still shows more than 20 hours in April,
    even though the amount was corrected in March.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
- en: This isn’t correct.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
- en: The measure [Overtime Overall] must consider the corrections.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
- en: Moreover, the total is wrong. Since the total is always above 20, it will also
    display 20.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
- en: Target of the calculation
  id: totrans-29
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Before we proceed, we must define the requirements to determine what needs to
    be done.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
- en: First, the results must be shown only at the monthly level.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
- en: Second, as mentioned above, the results must reflect the corrections made in
    the preceding month(s).
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
- en: Third, we must be able to see the corrections made for each month.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: Try a DAX approach
  id: totrans-34
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'OK, what happens when we precalculate a table for each Employee in the measure
    and correct the values according to it:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  id: totrans-36
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: The filter added with [CALCULATETABLE()](https://dax.guide/calculatetable/)
    is necessary to reduce the size of the table generated with [SUMMARIZECOLUMNS()](https://dax.guide/summarizecolumns/).
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/70d6a3928ab9463839e12390080a36b6.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
- en: Figure 3 – Second results for Mandy Jones with the second measure (Figure by
    the Author)
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
- en: As you can see, the results are identical, as the measure still doesn’t consider
    the corrections in the previous months.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，结果是一致的，因为度量仍然没有考虑前几个月的校正。
- en: Interestingly, the total is blank.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 有趣的是，总数是空的。
- en: The reason is that SELECTEDVALUE() doesn’t return anything, and thus, there
    is nothing to calculate.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 原因是 SELECTEDVALUE() 不返回任何内容，因此没有可以计算的东西。
- en: 'I can solve this by using [VALUES()](https://dax.guide/values/):'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 我可以通过使用 [VALUES()](https://dax.guide/values/) 来解决这个问题：
- en: '[PRE3]'
  id: totrans-44
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'Here is the result with the correct total:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是带有正确总量的结果：
- en: '![](../Images/9df76dd024d39a925814cae46c3ee10f.png)'
  id: totrans-46
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/9df76dd024d39a925814cae46c3ee10f.png)'
- en: Figure 4 – Result with the correct total line by using VALUES() (Figure by the
    Author)
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4 – 使用 VALUES() 添加正确的总行结果（图由作者提供）
- en: But this approach doesn’t scale well, as the measure must generate the table
    for all employees during the calculation.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，这种方法扩展性不好，因为度量必须为计算期间的所有员工生成表。
- en: It’s OK with 63 employees, as my data has, but it’s a different story with hundreds
    or thousands of employees.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 对于 63 名员工来说，我的数据是这样的，但是如果有成百上千名员工，情况就不同了。
- en: 'However, the core issue remains: How can we calculate the correct result for
    each month and each employee while maintaining the correct total?'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，核心问题仍然存在：如何在保持正确总量的同时，为每个月和每个员工计算正确的结果？
- en: Finding the solution
  id: totrans-51
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 寻找解决方案
- en: The approach to calculate the correct results should be to check the overtime
    for each month, taking into account any previous corrections.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 计算正确结果的方法应该是检查每个月的加班时间，同时考虑任何之前的校正。
- en: For this, the value of the previous month must be checked to see if it was corrected.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，必须检查上个月的价值，看看是否进行了校正。
- en: The overtime balance can then be updated with the amount of overtime for the
    current month.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 然后可以使用当前月份的加班时间来更新加班余额。
- en: This would involve a recursive calculation, where the calculation for each row
    uses the result of the same column from the previous month.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 这将涉及递归计算，其中每行的计算都使用上个月相同列的结果。
- en: 'Unfortunately, DAX doesn’t allow us to do it, as it will consider it a circular
    dependency:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 不幸的是，DAX 不允许我们这样做，因为它会将其视为循环依赖：
- en: '![](../Images/6a83214e122cbb812843d3ae96dce4ef.png)'
  id: totrans-57
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/6a83214e122cbb812843d3ae96dce4ef.png)'
- en: Figure 5 – Error message when trying a recursive calculation as a calculated
    column (Figure by the Author)
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5 – 尝试将递归计算作为计算列时出现的错误信息（图由作者提供）
- en: When going back one step, the approach could be to develop it in Power Query.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 回退一步，方法可能是通过 Power Query 来开发。
- en: I’m unsure if this would work, as it would require a procedural approach to
    process one row at a time.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 我不确定这会不会有效，因为这需要一种过程式方法来逐行处理。
- en: I know that in SQL, this could be done relatively easily.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 我知道在 SQL 中，这可以相对容易地完成。
- en: As the data source is an Azure SQL database, I decided to process it within
    that database.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 由于数据源是 Azure SQL 数据库，我决定在该数据库内进行处理。
- en: Calculate the corrections in SQL
  id: totrans-63
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在 SQL 中计算校正
- en: 'Taking into account the requirement that this data needs to be calculated on
    a monthly level, I created a new table to store the data with the corrections:'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到这个数据需要按月计算的要求，我创建了一个新表来存储带有校正的数据：
- en: '![](../Images/f5f64e2e74f71c6c26fef56ef320ba5d.png)'
  id: totrans-65
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/f5f64e2e74f71c6c26fef56ef320ba5d.png)'
- en: Figure 6 – The new table to store the corrections (Figure by the Author)
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 图 6 – 存储校正的新表（图由作者提供）
- en: 'Here is the entire SQL code to calculate the correction for each employee and
    each month:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是计算每个员工和每个月校正的完整 SQL 代码：
- en: '[PRE4]'
  id: totrans-68
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Line 39, where I calculate the running total, is interesting, as I use a not-so-well-known
    technique using the [OVER()](https://learn.microsoft.com/en-us/sql/t-sql/queries/select-over-clause-transact-sql)
    clause.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 第 39 行，我计算累计总量的地方很有趣，因为我使用了一个不太为人所知的技巧，即使用 [OVER()](https://learn.microsoft.com/en-us/sql/t-sql/queries/select-over-clause-transact-sql)
    子句。
- en: Regardless of whether you use T-SQL or not, you can use this process to calculate
    the needed results with any other programming language.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你是否使用 T-SQL，你都可以使用这个流程用任何其他编程语言来计算所需的结果。
- en: I’m very confident that I would have been able to write a self-recursive method
    to calculate the needed results without the use of a cursor.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 我非常有信心，我能够编写一个不使用游标的自递归方法来计算所需的结果。
- en: However, I believe this approach is more straightforward to adapt to other languages.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我相信这种方法更易于适应其他语言。
- en: 'When looking at Mandy Jones (EmpID 1253), the results are the following for
    2025:'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 当查看 Mandy Jones（EmpID 1253）时，2025 年的结果如下：
- en: '![](../Images/82dc45b99a9bdbd31fb7f887c8833fe8.png)'
  id: totrans-74
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/82dc45b99a9bdbd31fb7f887c8833fe8.png)'
- en: Figure 7 – Result of the overtime calculation for Mandy Jones for 2025 from
    the calculated table in the Database (Figure by the Author)
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 图7 – 2025年Mandy Jones加班计算的结果，来自数据库中计算出的表格（图由作者绘制）
- en: When checking them, you will notice that the corrections are applied correctly
    and the Overtime balance is correct.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 在查看它们时，你会注意到更正是正确应用的，加班余额也是正确的。
- en: Integrating the table in Power BI
  id: totrans-77
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在 Power BI 中集成表格
- en: The last step is to integrate the new table into Power BI.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 最后一步是将新表格集成到 Power BI 中。
- en: 'I can simply import the table into the data model and add Relationships to
    the other tables:'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 我可以简单地将表格导入数据模型，并将关系添加到其他表格中：
- en: '![](../Images/119a980110f3bd6538d7b73742ad145a.png)'
  id: totrans-80
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/119a980110f3bd6538d7b73742ad145a.png)'
- en: Figure 8 – The data model with the new table (Figure by the Author)
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 图8 – 带有新表格的数据模型（图由作者绘制）
- en: Now, I can create the measures to calculate the results.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我可以创建度量来计算结果。
- en: 'I need the following measures:'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 我需要以下度量：
- en: Base measures to calculate the sum of both columns
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用于计算两列总和的基础度量
- en: A measure to calculate the last value for the Overtime corrected, as a stock
    measure
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个用于计算加班更正最后值的度量，作为一个库存度量
- en: The first two are simple measures to sum up the columns.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 前两个是简单的度量，用于汇总列。
- en: 'The third is the following:'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 第三点是以下内容：
- en: '[PRE5]'
  id: totrans-88
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: The measure [Overtime Corrected (Base)] shouldn’t be used in the report. Therefore,
    I set it as hidden.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 度量 [加班更正（基础）] 不应在报告中使用。因此，我将它设置为隐藏。
- en: 'These are the results:'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是结果：
- en: '![](../Images/f64cbf36043670c57736e1d94c70034a.png)'
  id: totrans-91
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f64cbf36043670c57736e1d94c70034a.png)'
- en: Figure 9 – Results of the calculation with the table from the database showing
    the corrected overtime and the corrections applied (Figure by the Author)
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 图9 – 使用数据库中的表格进行计算的结果，显示更正的加班和应用的更正（图由作者绘制）
- en: Upon reviewing the results, you will see that they are correct, and the totals
    are also accurate.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 在审查结果时，你会看到它们是正确的，总账也是准确的。
- en: This is the result I need to fulfill the requirements.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我需要满足要求的结果。
- en: Conclusion
  id: totrans-95
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: The challenge presented here is an example of calculating limits and ensuring
    that the running total is accurate. In addition, the corrections applied are also
    visible.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 这里提出的挑战是计算极限并确保运行总账准确性的一个例子。此外，应用的更正也是可见的。
- en: Additionally, it demonstrates that preparing the data can significantly simplify
    the measures in the data model.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，它还表明准备数据可以显著简化数据模型中的度量。
- en: For me, this is an essential aspect, as it improved efficiency and performance.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 对我来说，这是一个重要的方面，因为它提高了效率和性能。
- en: You can apply this approach to many other scenarios.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以将这种方法应用于许多其他场景。
- en: For example, you have a warehouse where you must ensure that the number of articles
    does not exceed a specific limit.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，你有一个仓库，你必须确保文章的数量不超过特定的限制。
- en: You can apply this approach to calculate the number of articles and determine
    if you need to reduce the number to ensure the warehouse is running correctly.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以将这种方法应用于计算文章数量并确定你是否需要减少数量以确保仓库正常运行。
- en: Later, while writing this piece, I realized that the SQL approach could have
    also been applied to the daily data. It wasn’t necessary to create a separate
    table.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 在撰写这篇文章的过程中，我意识到SQL方法也可以应用于每日数据。没有必要创建一个单独的表格。
- en: I’m forced to create the table with the monthly data only if the calculation
    of the corrections must be applied to the monthly results.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 如果必须将更正的计算应用于月度结果，我被迫仅使用月度数据创建表格。
- en: Additionally, creating a separate table can be challenging, as you must consider
    all references to the dimensions involved.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，创建一个单独的表格可能具有挑战性，因为你必须考虑所有涉及的尺寸引用。
- en: But this is something that the business side must define. While I provided you
    with a possible solution, your role now is to decide how to translate it to your
    scenario.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 但这是业务方面必须定义的事情。虽然我为你提供了一个可能的解决方案，但你现在的作用是决定如何将其翻译到你的场景中。
- en: I hope that you found this interesting.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 希望你觉得这个有趣。
- en: Make sure to check out the other articles here on Towards Data Science.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 确保查看这里在 Towards Data Science 上的其他文章。
- en: References
  id: totrans-108
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 参考文献
- en: The data is self-generated with fantasy names.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 数据是自行生成的，带有幻想的名字。
- en: I generated this complete list by multiplying a list of First and last names
    with each other.
  id: totrans-110
  prefs: []
