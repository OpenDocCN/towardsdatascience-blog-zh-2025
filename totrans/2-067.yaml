- en: Things I Wish I Had Known Before Starting ML
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 我在开始机器学习之前希望知道的事情
- en: 原文：[https://towardsdatascience.com/things-i-wish-i-had-known-before-starting-ml-2/](https://towardsdatascience.com/things-i-wish-i-had-known-before-starting-ml-2/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/things-i-wish-i-had-known-before-starting-ml-2/](https://towardsdatascience.com/things-i-wish-i-had-known-before-starting-ml-2/)
- en: <mdspan datatext="el1754437631734" class="mdspan-comment">In my last post</mdspan>,
    I shared a few lessons that would have made my ML journey smoother. Writing that
    previous article started as a reflection while lying on a beach somewhere along
    the Mediterranean Sea, away from the noise of daily work. It turns out, space,
    silence, and sea have a way of bringing up a list of things that I wish I had
    known before starting ML.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1754437631734" class="mdspan-comment">在我的上一篇文章</mdspan>，我分享了一些会使我的机器学习之旅更加顺利的教训。写那篇之前的文章开始于地中海某处海滩上的反思，远离日常工作的喧嚣。结果证明，空间、寂静和大海有办法列出我希望在开始机器学习之前就知道的事情。
- en: This article is part two of that list. In my [previous article](https://towardsdatascience.com/things-i-wish-i-had-known-before-starting-ml/),
    I discussed that (1) doing ML primarily means preparing, (2) papers are like sales
    pitches, (3) bug fixing is the way forward, and (4) most works (including mine)
    won’t make *that* breakthrough.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 本文是那个列表的第二部分。在我的[上一篇文章](https://towardsdatascience.com/things-i-wish-i-had-known-before-starting-ml/)中，我讨论了以下几点：（1）做机器学习主要是准备，（2）论文就像销售演讲，（3）修复错误是前进的道路，（4）大多数工作（包括我的）都不会有那样的突破。
- en: The present article has slightly broader principles—less about specific pain
    points in ML, more about mindsets.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 本文有稍微更广泛的原则——关于机器学习中的具体痛点较少，更多关于心态。
- en: 5\. You Need (Flexible) Boundaries
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 5. 你需要（灵活的）边界
- en: Machine learning moves fast. New papers are published every day. Some are quietly
    uploaded (to, e.g., arXiv), while others come with press releases and fancy demos.
    It’s natural to want to stay on top of it all—to keep up with the latest trends
    and breakthroughs.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习发展迅速。每天都有新的论文发表。有些是悄悄上传（例如，到arXiv），而有些则伴随着新闻发布和花哨的演示。想要跟上所有这些是很自然的——想要跟上最新的趋势和突破。
- en: 'But there’s a problem: if you try to keep up with *everything*, you’ll end
    up keeping up with *nothing*. The field is simply too big, too fragmented, too
    fast.'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 但有一个问题：如果你试图跟上**一切**，你最终会一无所获。这个领域太大、太碎片化、变化太快。
- en: Think of the recent Nobel laureates, Geoffrey Hinton, Demis Hassabis, and John
    Jumper. All were awarded (shares of) Nobels for bringing the field of AI forward.
    The laureates did not earn these highly-sought-after prizes by being on top of
    every trend. In fact, as many other famed researchers, many of them went deep
    into their own corner of the world.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 想想最近的诺贝尔奖获得者，杰弗里·辛顿、戴米斯·哈萨比斯和约翰·朱珀。他们都因为推动人工智能领域的发展而获得了（部分）诺贝尔奖。获奖者并不是通过紧跟每一个趋势来获得这些高度追求的奖项。事实上，像许多其他著名的研究人员一样，他们中的许多人深入到了自己的世界角落。
- en: Richard Feynman, another Nobel winner, famously avoided fads. He deliberately
    stepped back from mainstream physics to explore areas that interested him deeply,
    to make “real good physics.”
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 另一位诺贝尔奖获得者理查德·费曼，著名地避免了潮流。他故意从主流物理学中退出来，去探索他深感兴趣的区域，以做出“真正的优秀物理学”。
- en: 'It’s understandable to want to stay on the cutting edge. But, the definition
    of cutting edge is per sé a constantly moving area: like the waves that form on
    a pond once you throw in a stone. If you’re always surfing the outmost wave, you’ll
    lose connection to the innermost area.'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 想要保持在最前沿是可以理解的。但是，前沿的定义本身就是一个不断变化的地带：就像你扔进池塘里的石头形成的波浪一样。如果你总是冲在最前面的波浪上，你将失去与最内部区域的联系。
- en: Instead, what you need are boundaries. Not as fences, but as **guardrails**.
    They keep you in the right direction. They let you go deep while still allowing
    space for surprising departures. Within your chosen focus area, you’ll still encounter
    new problems, new papers, new angles—but they all will be connected to your core
    field.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，你需要的是边界。不是作为栅栏，而是作为**护栏**。它们帮助你保持正确的方向。它们让你深入探索，同时仍然留有空间进行令人惊喜的偏离。在你选择的关注领域内，你仍然会遇到新的问题、新的论文、新的角度——但它们都将与你的核心领域相关。
- en: 'Guardrails allow you to apply a filter to all the things that you see: yes,
    no, yes, yes, no.'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 护栏让你可以对看到的所有事物应用过滤器：是，否，是，是，否。
- en: Take my own field—**continual learning**—as an example. It’s already overwhelming.
    Just looking at [recent papers listed on GitHub](https://github.com/xialeiliu/Awesome-Incremental-Learning)
    shows how much gets published at each major conference. And that’s only within
    CL! Now imagine trying to stay on-top of CL *and* GenAI. And LLMS. And …
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 以我自己的领域——**持续学习**——为例。这已经足够令人印象深刻了。只需看看[GitHub上列出的近期论文](https://github.com/xialeiliu/Awesome-Incremental-Learning)就能看出，在每次主要会议上都发表了多少研究成果。而这只是CL（持续学习）领域！现在想象一下，试图同时跟上CL和GenAI，以及LLMS等等。
- en: Impossible.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 不可能。
- en: '6\. Research Code Is Just That: Research Code'
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 6. 研究代码就是研究代码
- en: Writing ML algorithms is an essential part of machine learning work. But not
    all code is created equal. There’s production code—the kind used in apps, services,
    and end-user systems—and then there’s *research code.*
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 编写机器学习算法是机器学习工作中不可或缺的一部分。但并非所有代码都是平等的。有生产代码——用于应用、服务和最终用户系统的代码——然后有*研究代码*。
- en: Research code has a different goal. It doesn’t need to be cleanly abstracted,
    deeply modularized, or prepared for long-term maintenance. It needs to work, help
    you test your hypotheses, and let you iterate *fast*.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 研究代码有不同的目标。它不需要干净地抽象化，深度模块化，或为长期维护做好准备。它需要能够工作，帮助你测试你的假设，并让你快速迭代。
- en: When I started, I often spent time worrying about whether my code was “elegant”
    enough. I then spent precious coding hours refactoring, restructuring, and turning
    research projects into object-oriented software paradigms. But, a lot of times
    that was unnecessary.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 当我开始的时候，我经常花时间担心我的代码是否“足够优雅”。然后，我花费宝贵的编码时间重构、重构，并将研究项目转化为面向对象的软件范式。但很多时候，这其实是多余的。
- en: Of course, code should be readable, documented (for your future self, if anybody),
    and decently structured. But it does not have to be perfect. It doesn’t need to
    be “production-grade.” Most of the time, you’re the only user (which is perfectly
    fine, see [my previous post](https://towardsdatascience.com/things-i-wish-i-had-known-before-starting-ml/)).
    And in many cases, the code won’t live past the end of the project..
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，代码应该是可读的，有文档（为了你未来的自己，如果有人需要的话），并且有合理的结构。但它不需要完美。它不需要是“生产级”的。大多数时候，你可能是唯一的用户（这完全没问题，参见[我之前的帖子](https://towardsdatascience.com/things-i-wish-i-had-known-before-starting-ml/))。在许多情况下，代码可能不会在项目结束时继续存在。
- en: 'So, if your code does what it should do: fine. Keep as-is and turn to the next
    project.'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，如果你的代码能完成它应该做的事情：那就行了。保持原样，转向下一个项目。
- en: 7\. Read Broadly, Read Deeply
  id: totrans-21
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 7. 广泛阅读，深入阅读
- en: In November 2002, [an unassuming math paper was uploaded to arXiv](https://arxiv.org/abs/math/0211159).
    Its title: *The entropy formula for the Ricci flow and its geometric applications*.
    The author was a reclusive Russian mathematician, Grigory Perelman.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 2002年11月，一篇不起眼的数学论文被上传到了arXiv（[arXiv链接](https://arxiv.org/abs/math/0211159)）。论文标题为：《Ricci流熵公式及其几何应用》。作者是一位隐居的俄罗斯数学家，格里戈里·佩雷尔曼。
- en: That paper—and the two follow-ups he posted in the next year—later* turned out
    to contain the long-awaited proof of the **Poincaré conjecture**, one of the most
    famous, then-unsolved, problems in mathematics. In the years after, Perelman declined
    both the Fields Medal and the $1 million Millennium Prize for his work, further
    adding to his image as a one-of-a-kind mathematician.**
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 那篇论文——以及他在下一年发布的两篇后续论文——后来*证实了长久以来备受期待的庞加莱猜想的证明，这是当时数学界最著名、尚未解决的难题之一。在随后的几年里，佩雷尔曼拒绝了他的工作所获得的菲尔兹奖和1000万美元的千年大奖，进一步加深了他作为独一无二数学家的形象**。
- en: What struck me about this story, apart from the appeal that the story of scientific
    breakthroughs naturally have, is that it all began with a simple arXiv submission.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 除了科学突破故事本身所具有的吸引力之外，让我印象深刻的是，这一切都始于一个简单的arXiv投稿。
- en: 'In the last two decades, the way scholarly work is shared has changed dramatically.
    arXiv, as the best-known preprint platform, has made research more accessible
    and faster to spread. According to [arXiv’s own stats](https://info.arxiv.org/help/stats/2021_by_area/index.html),
    computer science (CS) has exploded in submission volume over the years:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去的二十年里，学术成果的分享方式发生了巨大的变化。作为最知名的预印本平台，arXiv使得研究更加易于获取和快速传播。根据[arXiv自己的统计数据](https://info.arxiv.org/help/stats/2021_by_area/index.html)，计算机科学（CS）在近年来的提交量激增：
- en: '![](../Images/3f1cd5fcb75e2e3404fca47aac439a32.png)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/3f1cd5fcb75e2e3404fca47aac439a32.png)'
- en: The yearly number of submissions to the category CS – orange line – strongly
    grows over time. Image by the author; freely re-doable at [https://tableau.cornell.edu/t/PublicContent/views/arXivSubmissions/LineGraphByArchive](https://tableau.cornell.edu/t/PublicContent/views/arXivSubmissions/LineGraphByArchive)
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 每年提交给CS类别的数量——橙色线——随着时间的推移强烈增长。图片由作者提供；可在[https://tableau.cornell.edu/t/PublicContent/views/arXivSubmissions/LineGraphByArchive](https://tableau.cornell.edu/t/PublicContent/views/arXivSubmissions/LineGraphByArchive)免费重做
- en: There’s more to read than ever before. And if you try to read *everything*,
    you’ll end up understanding *very little*. In my experience, you’re better off
    choosing a focus area, reading deeply within it, and supplementing that with occasional
    reads from adjacent fields.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 有更多的东西需要阅读，比以往任何时候都多。如果你试图阅读**所有**内容，你最终会理解**非常少**。根据我的经验，你最好选择一个关注领域，深入阅读其中，并用偶尔从相邻领域的阅读来补充。
- en: For example, my main area is continual learning. There’s far too much being
    published for me to read everything—even just within CL. But I can read *around* it.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，我的主要领域是持续学习。出版的内容太多，我无法阅读所有内容——即使在CL内部也是如此。但我可以阅读**关于**它的内容。
- en: 'Continual learning is about adapting a model to new domains over time, without
    forgetting previous ones. That naturally connects to other fields:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 持续学习是关于随着时间的推移将模型适应新领域，而不忘记之前的领域。这自然地与其他领域相关联：
- en: '**Domain adaptation** (DA), which focuses on adapting to new domains—though
    often without caring about old domains'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**领域自适应**（DA），它专注于适应新领域——尽管通常不关心旧领域'
- en: '**Test-time adaptation** (TTA), which adapts models *on the fly*, using only
    test data'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**测试时自适应**（TTA），它通过仅使用测试数据**即时**调整模型'
- en: '**Optimization methods**, especially those that help balance stability and
    plasticity—exactly the trade-off we care about in CL'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**优化方法**，尤其是那些帮助平衡稳定性和可塑性的方法——这正是我们在CL中关注的权衡'
- en: Reading in those areas gives new ideas. But having a deep foundation in CL gives
    me the context to understand what’s useful and how it might transfer.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 在这些领域阅读可以带来新的想法。但拥有CL的深厚基础给了我理解什么有用以及如何可能迁移的背景。
- en: So yes, read broadly. But don’t do it at the cost of depth. The good ideas often
    come not from reading more, but from seeing connections more clearly. And that
    requires going deep — smoothly connecting to my [6.5 years lookback article](https://towardsdatascience.com/lessons-learned-after-6-5-years-of-machine-learning/).
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，是的，广泛阅读。但不要以牺牲深度为代价。好的想法往往不是来自阅读更多，而是来自更清晰地看到联系。而这需要深入——顺畅地连接到我的[6.5年回顾文章](https://towardsdatascience.com/lessons-learned-after-6-5-years-of-machine-learning/)。
- en: '* * *'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
