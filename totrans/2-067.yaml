- en: Footnotes
  id: totrans-40
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 脚注
- en: '* later: simply because the problem was so complex, and the proof so complicated,
    that it took several brilliant minds to proof the proof. [Wikipedia has a good
    coverage of the story](https://en.wikipedia.org/wiki/Poincaré_conjecture#Hamilton''s_program_and_solution),
    [as interesting as mathematics can get](https://en.wikipedia.org/wiki/Grigori_Perelman#Geometrization_and_Poincaré_conjectures).'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: '**后来**：仅仅因为问题如此复杂，证明如此复杂，以至于需要几个杰出的大脑来证明这个证明。[维基百科对故事的描述很全面](https://en.wikipedia.org/wiki/Poincaré_conjecture#Hamilton''s_program_and_solution)，[就像数学可以变得如此有趣](https://en.wikipedia.org/wiki/Grigori_Perelman#Geometrization_and_Poincaré_conjectures)。'
- en: '** another one was Paul Erdős'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: '**另一个例子是保罗·埃尔德什**'
