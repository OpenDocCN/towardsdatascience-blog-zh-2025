- en: 'MCP Client Development with Streamlit: Build Your AI-Powered Web App'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/mcp-client-development-with-streamlit-build-your-ai-powered-web-app/](https://towardsdatascience.com/mcp-client-development-with-streamlit-build-your-ai-powered-web-app/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'In our previous article “[Model Context Protocol (MCP) Tutorial: Build Your
    First MCP Server in 6 Steps](https://towardsdatascience.com/model-context-protocol-mcp-tutorial-build-your-first-mcp-server-in-6-steps/)”,
    we introduced the MCP architecture and explored MCP servers in detail. We will
    continue our MCP exploration in this tutorial, by building an interactive MCP
    client interface using Streamlit. The main difference between an MCP server and
    an MCP client is that MCP server provides functionalities by connecting to a diverse
    range of tools and resources, whereas MCP client leverages these functionalities
    through an interface. Streamlit, a lightweight Python library for data-driven
    interactive web applications development, accelerates the development cycle and
    abstracts away frontend frameworks, making it an optimal choice for rapid prototyping
    and the streamlined deployment of AI-powered tools. Therefore, we are going to
    use Streamlit to construct our MCP client user interface through a minimal setup,
    while focusing on connecting to remote MCP servers for exploring diverse AI functionalities.'
  prefs: []
  type: TYPE_NORMAL
- en: Project Overview
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Create an interactive web app prototype where users can enter their topics of
    interest and choose between two MCP servers—DeepWiki and HuggingFace—that provide
    relevant resources. DeepWiki specializes in summarizing codebases and GitHub repositories,
    while the HuggingFace MCP server provides recommendations of open-source datasets
    and models related to the user’s interested topics. The image below displays the
    web app’s output for the topic “sentiment analysis”.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/0b0dcf68eded30601d719ecbb15019dd.png)'
  prefs: []
  type: TYPE_IMG
- en: '**Give the app a try yourself using this link > “🤖** **[Streamlit MCP Client](https://mcp-client-app.streamlit.app/?embed_options=show_toolbar)“.**'
  prefs: []
  type: TYPE_NORMAL
- en: 'To develop the Streamlit MCP client, we will break it down into the following
    steps:'
  prefs: []
  type: TYPE_NORMAL
- en: Set Up Development Environment
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Initialize Streamlit App Layout
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Get User Inputs
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Connect to Remote MCP Servers
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Generate Model Responses
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Run the Streamlit App
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If you are interested in building your own MCP Server and connecting your MCP
    client, check out our video.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Set Up Development Environment
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Firstly, let’s set up our project directory using a simple structure.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Then install necessary libraries – we need `streamlit` for building the web
    interface and `openai` for interacting with OpenAI’s API that supports MCP.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 'Alternatively, you can create a `requirements.txt` file to specify the library
    versions for reproducible installations by running:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: Secondly, secure your API Keys using environment variables. When working with
    LLM providers like OpenAI, you will need to set up an API key. To keep this key
    confidential, the best practice is to use environment variables to load the API
    key and avoid hard coding it directly into your script, especially if you plan
    to share your code or deploy your application. To do this, add your API keys in
    the `.env` file using the following format. We will also need Hugging Face API
    token to access its remote MCP server.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: Now, in the script `app.py`, you can load these variables into your application’s
    environment using `load_dotenv()` from the `dotenv` library. This function reads
    the key-value pairs from your `.env` file and makes them accessible via `os.getenv()`.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: Connect MCP Server and Client
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Before diving into MCP client development, let’s understand the basics of establishing
    an MCP server-client connection. With the growing popularity of MCP, an increasing
    number of LLM providers now support MCP client implementation. For example, OpenAI
    offers a straightforward initialization method using the code below.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"
    open=""><summary>Further Reading:</summary>
  prefs: []
  type: TYPE_NORMAL
- en: '*The article “[For Client Developers](https://modelcontextprotocol.io/quickstart/client)”
    provides the example to set up an Anthropic MCP client, which is slightly complicated
    but also more robust as it enables better session and resource management.*</details>'
  prefs: []
  type: TYPE_NORMAL
- en: To connect the client to an MCP server, you’ll need to implement a connection
    method that takes either a server script path (for local MCP servers) or URL (for
    remote MCP servers) as the input. Local MCP servers are programs that run on your
    local machine, while remote MCP servers are deployed online and accessible through
    a URL. For example below, we are connecting to a remote MCP server “DeepWiki”
    through `“https://mcp.deepwiki.com/mcp”`.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"
    open=""><summary>Further Readings:</summary>
  prefs: []
  type: TYPE_NORMAL
- en: '*You can also explore other MCP server options in this comprehensive “[Remote
    MCP Servers Catalogue](https://mcpservers.org/remote-mcp-servers)” for your specific
    needs. The article “[For Client Developers](https://modelcontextprotocol.io/quickstart/client)”
    also provides example to connect local MCP servers.*</details>'
  prefs: []
  type: TYPE_NORMAL
- en: Build the Streamlit MCP Client
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![](../Images/36b1bd545601deaa5d8300bf9dec7bf9.png)'
  prefs: []
  type: TYPE_IMG
- en: Now that we understand the fundamentals of establishing connections between
    MCP clients and servers, we’ll encapsulate this functionality within a web interface
    for enhanced user experience. This web app is designed with modularity in mind,
    composed of several elements implemented using Streamlit methods, such as `st.radio()`,
    `st.button()`, `st.info()`, `st.title()` and `st.text_area()`.
  prefs: []
  type: TYPE_NORMAL
- en: If you prefer a video walkthrough, please check out our YouTube video 🎬
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Initialize Your Streamlit Page
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We will start with `initialize_page()` function that sets the page icon and
    title, and uses `layout="centered"` to ensure the overall web app layout to be
    aligned in the center. This function returns a column object underneath the page
    title where we will place widgets shown in the following steps.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: 2\. Get User Inputs
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The `get_user_input()` function allows users to provide their input, by creating
    a text area widget using `st.text_area()`. The `height` parameter ensures the
    input box is adequately sized, and the `placeholder` text prompts the user with
    specific instructions.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: 3\. Connect to MCP Servers
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The `create_mcp_server_dropdown()` function facilitates the flexibility to choose
    from a range of MCP servers. It defines a dictionary of available MCP servers,
    mapping a label (like “deepwiki” or “huggingface”) to its corresponding server
    URL. Streamlit’s `st.radio()` widget displays these options as radio buttons for
    users to choose from. This function then returns both the selected server’s label
    and its URL, feeding into the subsequent step to generate responses.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: 4\. Generate Responses
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Earlier we see how to use `client.responses.create()` as a standard way to
    generate responses. The `generate_response()` function below extends this by passing
    several custom parameters:'
  prefs: []
  type: TYPE_NORMAL
- en: '`model`: choose the LLM model that fits your budget and purpose.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`tools`: determined by the user selected MCP server URL. In this case, since
    Hugging Face server requires user authentication, we also specify the API key
    in the tool configuration and display an error message when the key is not found.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`input`: this combines user’s query and tool-specific instructions'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: to provide clear context for the prompt.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: The user’s input is then sent to the LLM, which leverages the selected MCP server
    as an external tool to fulfill the request. And display the responses using the
    Streamlit info widget `st.info()`. Otherwise, it will return an error message
    using `st.error()` when no responses are produced.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: 5\. Define the Main Function
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The final step is to create a `main()` function that chains all operations together.
    This function sequentially calls `initialize_page()`, `get_user_input()`, and
    `create_mcp_server_dropdown()` to set up the UI and collect user inputs. It then
    creates a condition to trigger `generate_response()` when the user clicks `st.button("Generate
    Response")`. Upon clicking, the function checks if user input exists, displays
    a spinner with `st.spinner()` to show progress, and returns the response. If no
    input is provided, the app displays a warning message instead of calling `generate_response()`,
    preventing unnecessary token usage and extra costs.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: Run Streamlit Application
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Finally, a standard Python script entry point ensures that our `main` function
    is executed when the script is run.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: 'Open your terminal or command prompt, navigate to the directory where you saved
    the file, and run:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: 'If you are developing your app locally, a local Streamlit server will spin
    up and your app will open in a new tab in your default web browser. Alternatively,
    if you are developing in a cloud environment, such as AWS JupyterLab, replace
    the default URL with this format: `https://<APP_ID>.studio`.`<REGION>.sagemaker.aws/jupyterlab/default/proxy/8501/`.
    You may find the post “[Build Streamlit apps in Amazon SageMaker AI Studio](https://aws.amazon.com/blogs/machine-learning/build-streamlit-apps-in-amazon-sagemaker-studio/)”
    helpful.'
  prefs: []
  type: TYPE_NORMAL
- en: Lastly, you can find the code in our GitHub repository “[mcp-streamlit-client](https://github.com/destingong/mcp-client-streamlit/blob/master/app.py)”
    and explore your Streamlit MCP client by trying out different topics.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/3a2d1d57ed766ee7c5fbca0791c78ad7.png)'
  prefs: []
  type: TYPE_IMG
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Take-Home Message
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In our previous article, we introduced the MCP architecture and focused on
    the MCP server. Building on this foundation, we now explore implementing an MCP
    client with Streamlit to enhance the tool calling capabilities of remote MCP servers.
    This guide provides essential steps—from setting up your development environment
    and securing API keys, handling user input, connecting to remote MCP servers,
    and displaying AI-generated responses. To prepare this application for production,
    consider these next steps:'
  prefs: []
  type: TYPE_NORMAL
- en: Asynchronous processing of multiple client requests
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Caching mechanisms for faster response times
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Session state management
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: User authentication and access management
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
