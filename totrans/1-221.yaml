- en: 'Prediction vs. Search Models: What Data Scientists Are Missing'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 预测模型与搜索模型：数据科学家们忽略了什么
- en: 原文：[https://towardsdatascience.com/the-economics-of-two-sided-platforms/](https://towardsdatascience.com/the-economics-of-two-sided-platforms/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/the-economics-of-two-sided-platforms/](https://towardsdatascience.com/the-economics-of-two-sided-platforms/)
- en: <mdspan datatext="el1759364074677" class="mdspan-comment">Introduction</mdspan>
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1759364074677" class="mdspan-comment">引言</mdspan>
- en: As data scientists, we’ve become extremely focused on building algorithms, causal/predictive
    models, and recommendation systems (and now genAI). We optimize for accuracy,
    fine-tune hyperparameters, and look for the next big fancy model to deploy in
    prod. But in our focus on delivering a state of the art implementation, we’ve
    overlooked a class of models that can reshape how we think about the business
    problem itself.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 作为数据科学家，我们变得极其专注于构建算法、因果/预测模型和推荐系统（现在还有生成式AI）。我们优化准确性，微调超参数，寻找下一个大型的、花哨的模型部署到生产环境中。但在我们专注于提供最先进实现的过程中，我们忽略了一类可以重塑我们对商业问题本身思考的模型。
- en: Consider the rise of platform companies like Amazon, Spotify, Netflix, Uber,
    and Upstart. While their industries appear vastly different, they fundamentally
    operate as intermediaries in **search-and-matching markets** between demand and
    supply agents. These companies’ value proposition lies in reducing search costs
    for customers by providing a platform and a matching algorithm to connect agents
    together under uncertainty and heterogeneous preferences.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到亚马逊、Spotify、Netflix、Uber和Upstart等平台公司的兴起。虽然他们的行业看起来截然不同，但它们本质上是在需求和供应代理之间的**搜索-匹配市场**中的中介。这些公司的价值主张在于通过提供一个平台和匹配算法来连接代理，以降低顾客的搜索成本，并在不确定性和异质偏好下实现匹配。这些公司在其行业中扮演着中介的角色。
- en: The Core Challenge
  id: totrans-5
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 核心挑战
- en: 'In these markets, the fundamental questions aren’t just standard isolated machine
    learning problems such as “how do we predict demand?” or “how do ads impact churn
    rate?” Instead, the critical challenges are:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在这些市场中，基本问题不仅仅是标准化的孤立机器学习问题，例如“我们如何预测需求？”或“广告如何影响客户流失率？”相反，关键挑战是：
- en: How many suppliers should we onboard given expected demand patterns?
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在预期的需求模式下，我们应该上线多少供应商？
- en: How do we design matching mechanisms that generates the optimal allocation?
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们如何设计匹配机制以产生最优分配？
- en: What pricing strategies maximize platform revenue while balancing platform growth
    and customer satisfaction?
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 什么定价策略可以在平衡平台增长和客户满意度的同时最大化平台收入？
- en: How do we handle the downstream impact when changes in one model primitive has
    a ripple effect?
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当一个模型原初的变化产生连锁反应时，我们如何处理下游的影响？
- en: Traditional data science approaches treat these as independent optimization
    problems and dedicate separate workstreams to them. However, economists have been
    working on these problems since the 1980s and developed a unified theoretical
    framework to capture the interdependent nature of these platform dynamics called
    **search theoretic models**. Furthermore, this was something I’ve studied deeply
    in graduate school but have not seen applied in industry work, so I’d like to
    bring attention to this set of models.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 传统的数据科学方法将这些视为独立的优化问题，并为它们分配了单独的工作流程。然而，经济学家自20世纪80年代以来一直在研究这些问题，并开发了一个统一的理论框架来捕捉这些平台动态的相互依存性，称为**搜索理论模型**。此外，这是我研究生阶段深入研究但未在行业工作中看到应用的东西，因此我想引起对这个模型集的关注。
- en: Why This Matters for Data Scientists
  id: totrans-12
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 为什么这对数据科学家来说很重要
- en: Data science as a field is great at measurement and algorithms, but falls behind
    in problem formulation (which we have left to PMs and execs). Understanding these
    theoretical foundations informs how we think about what metrics to measure and
    what algorithms to build. Instead of building isolated prediction models, we can
    design systems that work jointly together to account for equilibrium effects,
    strategic behavior, and feedback loops. This theoretical lens helps us identify
    the correct experiment to run, understand when our models break down (cohort drift)
    due to changes in agent preferences, and design interventions that has a first-order
    impact on the equilibrium outcomes.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 数据科学作为一个领域，在测量和算法方面做得很好，但在问题表述方面落后（我们将其留给了产品经理和执行者）。理解这些理论基础有助于我们思考要测量哪些指标以及要构建哪些算法。我们不是构建孤立的预测模型，而是可以设计共同工作的系统，以考虑均衡效应、战略行为和反馈循环。这种理论视角帮助我们确定正确的实验，了解我们的模型因代理偏好变化而崩溃（群体漂移）时的情况，并设计出对均衡结果有第一级影响干预措施。
- en: In this article, I’ll introduce the theory behind search models and demonstrate
    their practical application using a lending platform (Upstart/LendingClub/Prosper)
    that matches borrowers and banks as a concrete example. We’ll explore how this
    framework can inform partner acquisition strategies, pricing and fee mechanisms,
    and what levers should be used to drive growth. Interested readers can continue
    to the next section for a short background summarising how these models came to
    be, or skip straight to the practical example to understand how to design these
    models.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我将介绍搜索模型背后的理论，并使用一个贷款平台（Upstart/LendingClub/Prosper）作为具体例子，展示其实际应用。我们将探讨这个框架如何指导合作伙伴获取策略、定价和费用机制，以及应该使用哪些杠杆来推动增长。感兴趣的读者可以继续下一节，了解这些模型是如何形成的简要背景，或者直接跳到实际例子，了解如何设计这些模型。
- en: '* * *'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: The Economic Literature
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 经济文献
- en: This modeling framework comes from economics in the 1980s, when Dale Mortensen,
    Christopher Pissarides, and Peter Diamond were trying to understand why unemployment
    exists even when there are job openings. This series of question led them to win
    the Nobel Prize in 2010 for their work. Their Diamond-Mortensen-Pissarides (DMP)
    model changed how we think about markets. The core insight is that finding a job
    (or hiring someone) takes time (and costs money), leading to frictions in an otherwise
    competitive market. Diamond showed in 1982 that when searching is costly, wages
    aren’t detemrined by aggregate supply and demand. Instead, they’re negotiated
    between a specific worker and firm after in a bilateral bargaining process. This
    negotiation uses Nash bargaining, where the wage depends on each party’s bargaining
    power and outside options. If either side has better outside options, they get
    a larger share of the value created by the match.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 这个建模框架源于20世纪80年代的经济学，当时戴尔·莫滕森、克里斯托弗·皮萨里德斯和彼得·戴蒙德试图理解为什么即使在有职位空缺的情况下，失业仍然存在。这一系列问题引导他们赢得了2010年的诺贝尔奖，以表彰他们的工作。他们的戴蒙德-莫滕森-皮萨里德斯（DMP）模型改变了我们对市场的看法。核心洞察力是找到工作（或雇佣某人）需要时间（并且需要花钱），这导致了在竞争市场中产生的摩擦。戴蒙德在1982年表明，当搜索成本高昂时，工资不是由总供给和需求决定的。相反，它们是在双边谈判过程中由特定工人和企业之间协商确定的。这种谈判使用纳什谈判，其中工资取决于每一方的谈判能力和外部选择。如果任何一方有更好的外部选择，他们将获得匹配创造的价值中更大的份额。
- en: Mortensen expanded on this by showing that search costs create a pool of unemployed
    workers even in a healthy economy. Workers develop a “reservation wage”—the minimum
    they’ll accept based on what they expect to find if they keep searching. Firms
    similarly balance the cost of keeping a position open against the expected value
    a worker would bring. Pissarides then tied these individual negotiations to economy-wide
    patterns, showing how unemployment and job creation relate to business cycles.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 莫滕森进一步扩展了这一观点，表明即使在健康的经济中，搜索成本也会创造一个失业工人的池子。工人会发展出一个“保留工资”——基于他们如果继续寻找能找到什么而设定的最低接受工资。企业同样会在保持职位开放的成本和预期员工带来的价值之间进行权衡。皮萨里德斯随后将这些个人谈判与整个经济的模式联系起来，展示了失业和就业创造如何与商业周期相关。
- en: In 2005, Duffie, Gârleanu, and Pedersen applied this same thinking to financial
    markets. In over-the-counter markets, buyers and sellers have to find each other,
    just like workers and firms. This search process creates bid-ask spreads and explains
    why the same asset can trade at different prices at the same time. A seller who
    needs cash immediately (high liquidity demand) might accept a lower price, while
    someone with enough time can wait for a better offer. Lagos and Rocheteau later
    relaxed restrictions on binary asset holdings and introduced a variable asset
    portfolio for each agent and showed how monetary policy affects these decentralized
    markets.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 在2005年，杜菲、加里安努和佩德森将这种相同的思考方式应用于金融市场。在柜台市场中，买家和卖家必须找到彼此，就像工人和企业一样。这个搜索过程产生了买卖价差，并解释了为什么同一资产可以在同一时间以不同的价格进行交易。需要现金的卖家（高流动性需求）可能会接受较低的价格，而有人有足够的时间可以等待更好的出价。拉戈斯和罗切特后来放宽了对二元资产持有的限制，并为每个代理人引入了可变资产组合，展示了货币政策如何影响这些去中心化的市场。
- en: The third piece of the puzzle comes from platform economics. Platforms create
    a marketplace that require both sellers and buyers. Ride-sharing platforms needs
    both drivers and riders. Lending platforms need both borrowers and banks. The
    literature on two-sided markets shows how platforms can maximize their revenue
    by setting prices and jointly controlling the size of demand and supply agents.
    These platforms has to set a price to ensure that participants remain in the market
    (Incentive Compatbility constraint), and that accepting the transaction is beneficial
    for these agents (Individual Rationality constraint). Platforms could also handle
    instances of multiple markets (Amazon books/electronics), where demand/supply
    from one segment might have spillover effects into the other segment.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 问题的第三部分来自平台经济学。平台创造了一个需要买卖双方的市场。共享出行平台需要司机和乘客。贷款平台需要借款人和银行。关于双边市场文献表明，平台可以通过设定价格和共同控制需求和供应代理的大小来最大化其收入。这些平台必须设定一个价格，以确保参与者留在市场中（激励兼容性约束），并且接受交易对参与者是有利的（个体理性约束）。平台还可以处理多个市场的情况（亚马逊书籍/电子产品），其中某一细分的需求/供应可能会对另一细分产生溢出效应。
- en: These three related streams of research can be combined to give us the tools
    to understand modern digital platform firms. Below I will show a practical example
    on how these concepts tie together in a theoretical model to understand the optimal
    behavior of a lending platform.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 这三个相关的研究领域可以结合起来，为我们提供理解现代数字平台公司的工具。以下我将通过一个实际例子展示这些概念如何在理论模型中结合在一起，以理解贷款平台的最佳行为。
- en: '* * *'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'A Practical Example: Lending Platforms'
  id: totrans-23
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实际例子：贷款平台
- en: 'Let’s apply this framework to lending platforms like Upstart, LendingClub,
    and Prosper. These companies use AI to underwrite loans, connecting banks that
    have available capital with consumers who need loans. They act as marketplaces
    where partner banks offer various loan types (personal, auto, mortgage) and consumers
    apply for credit. The platforms make money through origination fees, service fees,
    and late fees while reducing search costs for both sides since banks don’t need
    to find and evaluate borrowers themselves, and consumers don’t need to shop around
    multiple banks. From a platform perspective, these firms face key economic challenges:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们将这个框架应用于像Upstart、LendingClub和Prosper这样的贷款平台。这些公司使用人工智能进行贷款审批，将拥有可用资本的银行与需要贷款的消费者相连接。它们作为市场，合作伙伴银行提供各种贷款类型（个人、汽车、抵押贷款），消费者申请信用。平台通过发起费用、服务费用和滞纳金来赚钱，同时降低双方的搜索成本，因为银行不需要自己寻找和评估借款人，消费者也不需要四处寻找多家银行。从平台的角度来看，这些公司面临关键的经济挑战：
- en: '**Demand forecasting**: How much loan demand will we see next quarter?'
  id: totrans-25
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**需求预测**：下个季度我们将看到多少贷款需求？'
- en: '**Supply management**: How many partner banks do we need to handle that demand?'
  id: totrans-26
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**供应管理**：我们需要多少合作伙伴银行来处理这种需求？'
- en: '**Competition design**: How do we keep banks competing for borrowers without
    driving them away?'
  id: totrans-27
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**竞争设计**：我们如何保持银行之间为借款人竞争，同时又不会将他们赶走？'
- en: '**Matching mechanism**: Should we use auctions, posted prices, or algorithmic
    matching to match borrowers and lenders?'
  id: totrans-28
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**匹配机制**：我们应该使用拍卖、挂牌价格还是算法匹配来匹配借款人和贷款人？'
- en: '**Risk assessment**: How do we model both bank risk appetite and borrower default
    probability?'
  id: totrans-29
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**风险评估**：我们如何模拟银行的风险偏好和借款人违约概率？'
- en: '**Market segmentation**: Are there any spillover effects between lending in
    different market segments?'
  id: totrans-30
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**市场细分**：不同市场细分之间的贷款是否存在溢出效应？'
- en: None of these questions is easy to answer and each has many moving parts. You
    might forecast loan demand using time series models, but that aggregate number
    needs to be broken down by loan type, amount, and duration since banks have different
    preferences amongst these dimensions. Smaller banks with limited capital may only
    want to originate short-term loans to high-credit borrowers, while large banks
    might provide longer-term loans from riskier borrowers if they have excess capital.
    The matching algorithm needs to account for these preferences while ensuring both
    sides get enough value (trade surplus) to accept the offer.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 这些问题没有一个容易回答，每个问题都有许多变动因素。你可能可以使用时间序列模型来预测贷款需求，但这个总数字需要按贷款类型、金额和期限进行细分，因为银行在这些维度上有不同的偏好。资本有限的较小银行可能只想向高信用借款人发放短期贷款，而大型银行如果拥有过剩的资本，可能会向风险较高的借款人提供更长期的贷款。匹配算法需要考虑到这些偏好，同时确保双方都能获得足够的价值（贸易顺差）以接受报价。
- en: In this framework, each loan represents a three-way negotiation between the
    borrower, bank, and platform. The borrower has the power to reject any offer,
    the bank has the ability to place a reservation interest rate, while the platform
    has the power to decide the allocation of the total trade surplus. The platform
    controls key parameters like interest rates and fees, since changing these affects
    participation on both sides. Rates that are too high cause borrowers to leave
    and lower adoption rate and increase churn. Rates that are too low reduce partner
    satisfaction and decrease the number of partners. Every decision shifts the equilibrium,
    and understanding these dynamics is crucial for platform growth.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个框架下，每笔贷款代表了借款人、银行和平台之间的三方谈判。借款人有权拒绝任何报价，银行有能力设定保留利率，而平台有权决定总贸易剩余的分配。平台控制着关键参数，如利率和费用，因为改变这些会影响两边的参与。过高的利率会导致借款人离开，降低采用率和增加流失。过低的利率会降低合作伙伴的满意度并减少合作伙伴的数量。每个决策都会改变均衡，理解这些动态对于平台增长至关重要。
- en: The Model Environment
  id: totrans-33
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 模型环境
- en: Let’s build the simplest model to understand these dynamics. We’ll start with
    assumptions that make the math tractable, which will make up our *environment*.
    This environment will only have one loan type lasting only one period, identical
    borrowers, and identical banks.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们构建一个最简单的模型来理解这些动态。我们将从使数学易于处理的假设开始，这些假设将构成我们的*环境*。这个环境将只包含一种贷款类型，持续一个周期，借款人和银行都是相同的。
- en: Our environment exists in discrete time $t \in \mathcal{T}$, with no inter-period
    discounting. There exists a loan of size $S$ with an interest rate of $r$, where
    $r$ is an endogenous variable (whose outcome is decided within the system and
    not a model primitive).
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的环境存在于离散时间 $t \in \mathcal{T}$ 中，没有跨期折现。存在一笔金额为 $S$ 的贷款，利率为 $r$，其中 $r$ 是一个内生变量（其结果是在系统中决定的，而不是模型的基本变量）。
- en: Borrowers arrive at the platform following an unconditional Poisson rate $\Lambda$.
    Borrowers come into the platform demanding a loan of size $S$, which they value
    at $V(S)$. Their have a linear utility function $U_L = V(S) – (1+r)S$, the valuation
    they receive from the loan net of the payment that they have to make in the next
    period. The stock of unmatched borrowers at each time period is denoted $L_t$.
    Each borrower has a repayment probability $p$. When they have an offer for a loan,
    they can choose to either accept or reject that offer. If they reject the offer,
    they leave the market and exit the platform. The borrower always think that they
    will repay the loan.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 借款人按照无条件的泊松率 $\Lambda$ 到达平台。借款人进入平台要求一笔金额为 $S$ 的贷款，他们评估其价值为 $V(S)$。他们有一个线性效用函数
    $U_L = V(S) – (1+r)S$，这是他们从贷款中获得的估值，扣除他们必须在下一个时期支付的款项。每个时间周期未匹配的借款人存量表示为 $L_t$。每个借款人都有一个还款概率
    $p$。当他们收到贷款的报价时，他们可以选择接受或拒绝该报价。如果他们拒绝报价，他们将离开市场并退出平台。借款人总是认为他们会偿还贷款。
- en: On the banking side, there exists a set of banks $i \in \mathcal{J}$, with a
    maximum capital capacity $K$ and a cost of origination $c$. Each loan of size
    $S$ has a maturity date of $T=1$ (a loan that is successfully originated reduces
    that bank’s available capital by $S$ for $1$ period). Their goal is to maximize
    profit by setting a minimum acceptable interest rate on the platform, and will
    leave the platform if they cannot generate profit.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 在银行方面，存在一组银行 $i \in \mathcal{J}$，具有最大资本容量 $K$ 和原始成本 $c$。每笔金额为 $S$ 的贷款有一个到期日
    $T=1$（成功发起的贷款将使该银行的可用资本减少 $S$，持续一个周期）。他们的目标是通过对平台设定最低可接受利率来最大化利润，如果不能产生利润，他们将离开平台。
- en: 'In this environment, there exists a platform that has a matching technology
    $M(B,L)$ to match banks and borrowers. This platform can observe all parameters
    of each agent and determine the interest rate $r$ charged to the borrower and
    origination fee $f$ charged to the bank that maximizes the revenue of the platform.
    The platform also has the ability to onboard any number of banks they desire by
    setting $B$. When a match occurs, the platform selects one bank at random from
    the stock of willing banks and provides an offer: $ \{ S, r, f \} $ that must
    be incentive-compatible for both the bank and the borrower.'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个环境中，存在一个平台，它拥有匹配技术 $M(B,L)$ 来匹配银行和借款人。这个平台可以观察每个代理的所有参数，并确定对借款人收取的利率 $r$
    和对银行收取的原始费用 $f$，以最大化平台的收入。平台还可以通过设置 $B$ 来上线他们想要的任何数量的银行。当发生匹配时，平台从愿意参与匹配的银行中随机选择一家，并提供一个报价：$
    \{ S, r, f \}$，这个报价必须对银行和借款人都有激励兼容性。
- en: 'For this application we’ll use a standard matching technology called the Cobb-Douglas
    (which is also used in the literature as a production function) that gives the
    aggregate matching rate for this market. This matching function takes an input
    the number of banks and borrowers and maps them into the number of matches per
    period:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这个应用，我们将使用标准的匹配技术，称为 Cobb-Douglas（在文献中也被用作生产函数），它给出了这个市场的总匹配率。这个匹配函数接受银行和借款人的数量作为输入，并将它们映射到每期的匹配数量：
- en: $$ M(B,L) = \alpha B^\beta L^{1-\beta}$$
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: $$ M(B,L) = \alpha B^\beta L^{1-\beta}$$
- en: 'In each time period, the expected matching rate per bank is defined as the
    aggregate number of matches over the stock of banks: $\phi \equiv \frac{M(B,L)}{B}
    = \alpha B^{\beta-1} L^{1-\beta}$. If banks and borrowers are matched at random,
    the number of matches per bank per unit time is identical and denoted as $\phi$.'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 在每个时间段内，每家银行的预期匹配率定义为银行总库存的匹配总数：$\phi \equiv \frac{M(B,L)}{B} = \alpha B^{\beta-1}
    L^{1-\beta}$. 如果银行和借款人是随机匹配的，每家银行每单位时间的匹配数是相同的，表示为 $\phi$。
- en: This concludes our work in setting up the *environment* that this model lives
    in. The environment should contain enough information to find the equilibrium
    (outcomes) of all parameters of interests of the model.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 这就完成了我们为模型设置 *环境* 的工作。这个环境应该包含足够的信息来找到模型所有参数的均衡（结果）。
- en: Finding the Equilibrium
  id: totrans-43
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 寻找均衡
- en: This section’s goals is to find solutions to all model outcomes we are interested
    in. To solve for the equilibrium, we must solve for all of the endogenous (free)
    variables that have not been pre-defined by the environment. For this example,
    this means that we need to solve for the interest rate $r$, the origination fee
    $f$, and the number of banks $B$. There is no set order in how we should solve
    these statistics, but it is also important to understand the participation decision
    of the agents, then solve the matching rate, then finally the bargaining problem.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 本节的目标是找到所有我们感兴趣的模型结果解决方案。为了求解均衡，我们必须求解所有环境未预先定义的内生（自由）变量。对于这个例子，这意味着我们需要求解利率
    $r$、原始费用 $f$ 和银行数量 $B$。我们求解这些统计数据的顺序没有固定顺序，但了解代理人的参与决策也很重要，然后求解匹配率，最后解决谈判问题。
- en: 'Under this full information framework, the optimal decision is to accept for
    all borrowers and banks. For each loan origination, the expected profit of the
    bank is given by:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个完全信息框架下，最优决策是接受所有借款人和银行。对于每次贷款发起，银行的预期利润由以下公式给出：
- en: $$\pi = p(1+r)S – (1+c)S – f$$
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: $$\pi = p(1+r)S – (1+c)S – f$$
- en: The first term is represents the probability of repayment multiplied by the
    profit if the borrower repays the loan. The second term is the cost of origination
    (since a bank must borrow the funds from its own balance sheet/depositors and
    pay them a cost $c$). The third term is what the bank gives the platform for originating
    the loan. In reality, the expected profit calculation considers long maturity
    loans ($T>1$), cost of collection conditional on default, and other factors.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个项代表还款概率乘以借款人还款时的利润。第二个项是原始成本（因为银行必须从自己的资产负债表/存款人那里借款并支付成本 $c$）。第三个项是银行为发起贷款而给予平台的费用。在现实中，预期的利润计算考虑了长期贷款（$T>1$）、违约条件下的收款成本和其他因素。
- en: 'After we solve the expected per-loan profit, we must figure out how many loans
    get originated per point in time. To have a steady state amount of unmatched borrowers,
    the arrival rate of borrowers must equal the number of matches in the long run
    (since all borrowers accept the loan condition on a match). This means that the
    flow rate of borrowers into the system $\Lambda$ must equal to the flow rate of
    borrowers leaving the system $M(B,L)$:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们解决了每笔贷款的预期利润之后，我们必须弄清楚在每一点时间上有多少贷款被发起。为了保持未匹配借款人的稳定数量，借款人的到达率必须等于长期内的匹配数量（因为所有借款人都接受匹配的贷款条件）。这意味着借款人进入系统的流量率
    $\Lambda$ 必须等于借款人离开系统的流量率 $M(B,L)$：
- en: $$ \Lambda = M(B,L) = \alpha B^\beta L^{1-\beta}$$
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: $$ \Lambda = M(B,L) = \alpha B^\beta L^{1-\beta}$$
- en: By solving for $L$, we get that $L = \Big[ \frac{\Lambda}{\alpha B^\beta} \Big]^\frac{1}{1-\beta}$.
    If necessary, we can also find the expected arrival rate of a loan for a borrower
    by dividing the matching fucntion by the mass of borrowers. Since we define the
    match rate $M = \Lambda$ by construction, the rate of arrival of loans for a bank
    is given by $\phi = \frac{\Lambda}{B}$.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 通过求解 $L$，我们得到 $L = \Big[ \frac{\Lambda}{\alpha B^\beta} \Big]^\frac{1}{1-\beta}$。如果需要，我们还可以通过将匹配函数除以借款人的质量来找到借款人预期到达的贷款流量。由于我们通过构造定义了匹配率
    $M = \Lambda$，因此银行的贷款到达率由 $\phi = \frac{\Lambda}{B}$ 给出。
- en: Since each loan that a bank funds takes up some part of its reserve capacity
    $K$, we can also solve for the maximum number of loans $l$ the bank can fund at
    once. The budget constraint for the bank is given by $S \cdot \phi \leq K$. Since
    we have already solved for the flow rate of loans, a bank’s number of loans per
    period is therefore given by $l^* = \min\{ \frac{\Lambda}{B}, \frac{K}{S}\}$.
    If the binding constraint $\frac{K}{S}$ holds, this means that the platform should
    increase the number of banks that it partners with since lending supply is constrained.
    Given that there is no free entry condition on the lender side, the platform can
    directly control the number of banks $B$ so that we can stay in the unconstrained
    equilibria, such that $l^* = \frac{\Lambda}{B}$.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 由于每家银行资助的贷款都会占用其储备能力 $K$ 的一部分，我们还可以求解银行一次可以资助的最大贷款数量 $l$。银行的预算约束由 $S \cdot \phi
    \leq K$ 给出。由于我们已经解决了贷款的流量率，因此银行每期的贷款数量由 $l^* = \min\{ \frac{\Lambda}{B}, \frac{K}{S}\}$
    给出。如果约束条件 $\frac{K}{S}$ 成立，这意味着平台应该增加其合作伙伴的银行数量，因为贷款供应受到限制。鉴于在贷款方没有自由进入的条件，平台可以直接控制银行数量
    $B$，以便我们保持在无约束的均衡状态，使得 $l^* = \frac{\Lambda}{B}$。
- en: 'Now that we know number of loans, we can determine the bank’s profit per unit
    time:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们知道了贷款数量，我们可以确定银行每单位时间的利润：
- en: $$ \Pi_B = \frac{\pi \Lambda}{B} = \frac{\Lambda(p(1+r)S – (1+c)S – f)}{B}$$.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: $$ \Pi_B = \frac{\pi \Lambda}{B} = \frac{\Lambda(p(1+r)S – (1+c)S – f)}{B}$$.
- en: As we can see, increasing the number of banks partnered with the platform decreases
    the expected profit per bank by decreasing the number of loans that each bank
    can originate. Since the platform can set both the fees $f$ and the number of
    banks $B$, it is up to the platform to decide whether they want a small number
    of banks and high per-bank profit (at the risk of inducing capacity constraints)
    or whether they want to maximize the borrower’s surplus by increasing the number
    of banks or decreasing the fee rate $r$. This also allows us to set a binding
    constraint on the maximum fees that the platform can charge, since banks would
    not be willing to take on a loan if the profit is negative. This means that the
    upper bound on the fees is given by $ \bar{f} = p(1+r)S – (1+c)S$.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 如我们所见，增加与平台合作的银行数量会通过减少每家银行可以发起的贷款数量来降低每家银行的预期利润。由于平台可以设定费用 $f$ 和银行数量 $B$，因此平台需要决定是希望拥有少量银行和高每家银行利润（冒着引起产能限制的风险）还是通过增加银行数量或降低费用率
    $r$ 来最大化借款人的剩余价值。这也使我们能够设定平台可以收取的最高费用的约束条件，因为如果利润为负，银行将不愿意承担贷款。这意味着费用的上限由 $ \bar{f}
    = p(1+r)S – (1+c)S$ 给出。
- en: 'If the platform increases the allocation of trade surplus towards the bank
    by increasing $r$, they can charge a higher fee and generate more revenue. However,
    this might also decrease the growth rate of borrowers moving onto the platform
    in reality. In this example, we set the arrival rate of the borrower as exogenous
    so it would not be affected by the fee and rate, but we can envision an environment
    where $\Lambda = f(f, r, B)$, which would change this problem to one with a conditional
    entry rate. Since we allow banks to post a reservation rate $\underline{r}$ that
    sets their minimum required rate for any loan origination, we can model the lower
    bound of interest rate $\underline{r}$ as:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 如果平台通过增加 $r$ 来增加对银行的贸易剩余分配，他们可以收取更高的费用并产生更多收入。然而，这可能会降低借款人实际转移到平台上的增长率。在这个例子中，我们将借款人的到达率设定为外生变量，因此它不会受到费用和利率的影响，但我们可以设想一个环境，其中
    $\Lambda = f(f, r, B)$，这将使这个问题变成一个具有条件进入率的问题。由于我们允许银行发布一个保留利率 $\underline{r}$，以设定他们任何贷款原始的最小要求利率，我们可以将利率的下限
    $\underline{r}$ 模型为：
- en: $$ \underline{r} = \frac{f + (1+c)S}{p S} – 1$$
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: $$ \underline{r} = \frac{f + (1+c)S}{p S} – 1$$
- en: If the platform decreases the fees charged, the banks can set a lower reserve
    rate, which increases borrower surplus. This is also possible if the probability
    of repayment increases, or if the cost of origination (risk-free rate) decreases.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 如果平台降低收取的费用，银行可以设定更低的储备率，这会增加借款人的剩余价值。如果还款概率增加，或者原始成本（无风险利率）降低，这也是可能的。
- en: The Negotiation
  id: totrans-58
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 谈判
- en: Now that we have fully described the aggregate matching and profit statistics,
    we need to pin down the behavior of each party during the negotiation along with
    the profit-maximizing parameters for the platform.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经完全描述了总体匹配和利润统计，我们需要确定在谈判过程中各方的行为，以及平台利润最大化的参数。
- en: 'When the borrower and bank gets matched, the platform makes a take-it-or-leave-it
    offer and the borrower can choose to accept or reject. If the borrower rejects,
    they exit the market (no outside option). Therefore, the platform has to choose
    a set of parameters $\{ r,f\}$ to satisfy the participation constraint of both
    the borrower and the banks subject to $\{ \underline{r},\bar{f}\}$. From the lienar
    utility specification, the borrower only accepts the loan if they have a positive
    utility from it (since they can just reject and get $U_L = 0$). This allows us
    to define a maximum rate on the interest rate parameter:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 当借款人和银行匹配成功时，平台会做出一个非此即彼的出价，借款人可以选择接受或拒绝。如果借款人拒绝，他们将退出市场（没有外部选择）。因此，平台必须选择一组参数
    $\{ r,f\}$ 来满足借款人和银行在 $\{ \underline{r},\bar{f}\}$ 条件下的参与约束。从线性效用函数的规格来看，借款人只有在从贷款中获得正效用的情况下才会接受贷款（因为他们可以拒绝并得到
    $U_L = 0$）。这使我们能够定义一个利率参数的最大值：
- en: $$\bar{r} = \frac{V(S)}{S} -1 $$
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: $$\bar{r} = \frac{V(S)}{S} -1 $$
- en: 'Now that we know the bounds for the free parameters $r$ and $f$, we can construct
    the maximization problem of the platform. The platform chooses a rate and fee
    parameter that satisfies the incentives of each participation agent but maximizes
    their own net proceeds. Under this assumption, the platform maximizes:'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们知道了自由参数 $r$ 和 $f$ 的界限，我们可以构建平台的最大化问题。平台选择一个利率和费用参数，以满足每个参与代理的激励，同时最大化他们自己的净收益。在这个假设下，平台最大化：
- en: $$ \Pi_p = \max_{r, f, B} f M(B,L) \\ s.t. \;\;\; \Pi_B \geq 0 \\ \;\;\;\;\;\;\;\;
    U_L \geq 0 $$
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: $$ \Pi_p = \max_{r, f, B} f M(B,L) \\ s.t. \;\;\; \Pi_B \geq 0 \\ \;\;\;\;\;\;\;\;
    U_L \geq 0 $$
- en: The bank chooses a set of interest rate $r$, fees $f$, and number of partner
    banks $B$ to maximize their fee rate and number of matches. This problem has an
    analytical solution and can be solved in closed form to find the optimal parameters,
    or it can be solved numerically by grid-search or constrained optimization to
    find the set of parameters that maximizes $\Pi_p$. I leave the problem of solving
    the closed-form solution for the readers.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 银行选择一组利率 $r$、费用 $f$ 和合作伙伴银行的数量 $B$，以最大化他们的费用率和匹配数量。这个问题有一个解析解，可以闭式求解以找到最优参数，或者可以通过网格搜索或约束优化数值求解，以找到最大化
    $\Pi_p$ 的参数集。我将求解闭式解的问题留给读者。
- en: To close out this section, we define our equilibrium objects as the steady-state
    solution to our <mdspan datatext="el1759363718449" class="mdspan-comment">set
    of parameters $ \{ r^{*} , f^<mdspan datatext="el1759363718449" class="mdspan-comment">{*}</mdspan>,
    B^<mdspan datatext="el1759363718449" class="mdspan-comment">{*}</mdspan> \}</mdspan>$.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 为了结束本节，我们定义我们的均衡对象为参数集 $\{ r^{*} , f^<span class="mdspan-comment">{*}</span>,
    B^<span class="mdspan-comment">{*}</span> \}$ 的稳态解。
- en: What This Means for Business
  id: totrans-66
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 这对商业意味着什么
- en: 'This model reveals several key insights for platform strategy:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 该模型揭示了平台战略的几个关键见解：
- en: '1\. **The choice of B**: Increasing the number of partner lenders increases
    the surplus for the borrower. One way is through a faster matching speed, which
    decreases the steady-state number of unmatched borrowers. Since we modeled the
    borrower as leaving the market after the loan is rejected, this doesn’t put any
    downward pressure on the loan rate. However, if we assumed that borrowers can
    re-enter the market after they reject a loan, then now they have a higher outside
    option. This gives banks less bargaining power and lowers the maximum rate that
    borrowers are willing to be charged $\bar{r}$. However, increasing the number
    of partner banks also decreases each banks’ profit per time (since per-bank profit
    falls with the number of banks). This lowers the maximum amount the platform can
    charge for each transaction $\bar{f}$, decreasing platform profit.'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 1. **选择B**：增加合作伙伴贷款机构的数量会增加借款人的剩余价值。一种方式是通过更快的匹配速度，这会减少稳态下未匹配借款人的数量。由于我们将借款人建模为在贷款被拒绝后离开市场，这不会对贷款利率产生任何下行压力。然而，如果我们假设借款人在拒绝贷款后可以重新进入市场，那么现在他们有更高的外部选择。这给了银行更少的议价能力，并降低了借款人愿意支付的最高利率
    $\bar{r}$。然而，增加合作伙伴银行的数目也会降低每家银行的每时利润（因为每家银行的利润会随着银行数量的增加而下降）。这降低了平台对每笔交易可以收取的最高金额
    $\bar{f}$，从而降低了平台利润。
- en: '1\. **The choice of r**: Choosing the correct $r$ involves determining whether
    the platform wants the banks or the borrowers to profit. In this simple model,
    the platform would choose $r = \bar{r}$ since it only needs to satisfy the borrower’s
    participation constraint and do not have to worry about entry conditions. Any
    increase to $r$ would allow the platform to extract more surplus from the trade
    through increasing fees. In a more complex model where the entry rate of borrower
    is positively correlated with their surplus, the optimal decision would be to
    shift some of the surplus allocation to the borrowers to increase the per-period
    matching speed, which could increase total revenue for the platform. Finally,
    in a model with limited information (where the platform does not know the true
    payoff of the borrower), the optimal interest rate relies on an expectation of
    the valuation $\mathbb{E}[V(S)]$ over the estimated distribution of borrowers.
    If there are differences across borrowers represented by $\theta$, the expectation
    would change to be a conditional expectation over the expected borrower profile
    $\mathbb{E}[V(S) | \theta ]$. If the borrower profile is unknown (common in cold
    start cases), we can replace $\theta$ with an ML-estimated version $\hat{\theta}$.'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 1. **选择r**：选择正确的 $r$ 涉及到确定平台是想让银行还是借款人获利。在这个简单的模型中，平台会选择 $r = \bar{r}$，因为它只需要满足借款人的参与约束，不必担心进入条件。$r$
    的任何增加都会使平台能够通过增加费用从交易中提取更多剩余价值。在一个更复杂的模型中，借款人的进入率与他们的剩余价值正相关，最佳决策将是将部分剩余价值分配给借款人，以增加每期的匹配速度，这可能会增加平台的总收入。最后，在一个信息有限（平台不知道借款人的真实收益）的模型中，最佳利率依赖于对借款人估计分布的估值
    $\mathbb{E}[V(S)]$ 的期望。如果存在由 $\theta$ 表示的借款人之间的差异，期望将变为对期望借款人轮廓 $\mathbb{E}[V(S)
    | \theta ]$ 的条件期望。如果借款人轮廓未知（在冷启动案例中很常见），我们可以用机器学习估计的版本 $\hat{\theta}$ 替换 $\theta$。
- en: '1\. **The choice of f**: In this model, $f$ decides the allocation of trade
    surplus between the bank and the platform. A higher fee increases the revenue
    for the platform and proportionally decrease the revenue for the banks. In reality,
    banks can choose to participate between different competing platforms, and their
    participation depends on the revenue they expect to receive. This implies that
    it is likely optimal for the platform to allocate some of the trade surplus towards
    banks to increase the chances of signing new partners in later periods.'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 1\. **f的选择**：在这个模型中，$f$决定了银行和平台之间贸易剩余的分配。更高的费用会增加平台的收入，并按比例减少银行的收入。在现实中，银行可以选择参与不同的竞争平台，并且他们的参与取决于他们期望获得的收入。这意味着，对于平台来说，将部分贸易剩余分配给银行以增加在后期签订新合作伙伴的机会可能是最佳选择。
- en: '* * *'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Final Remarks and Extensions
  id: totrans-72
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最后的评论和扩展
- en: What We Haven’tConsideredYet
  id: totrans-73
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 我们尚未考虑的事项
- en: This basic model scratches the surface of platform dynamics. Real platforms
    deal with complexities we’ve intentionally ignored to keep the math tractable.
    For instance, we assumed borrowers exit after rejection (to make the outside option
    0), but in reality they can either stay in the market, or visit a competitor platform.
    We also assumed that both banks and borrowers are identical, but banks can be
    diverse in their risk appetite, capital funding, and maturity preferences. Borrower
    scan also differ in their set of observed and latent features, impacting their
    probability of repayment, loan valuation, and loan size. This heterogeneity changes
    the matching problem from random assignment to sorted matching, where the platform
    needs to decide which types should match with whom, which ties back to the value
    proposition of the platform itself.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 这个基本模型只是触及了平台动态学的表面。现实中的平台处理的是我们为了保持数学上的可处理性而有意忽略的复杂性。例如，我们假设借款人在被拒绝后退出（以使外部选择为0），但现实中他们可以选择留在市场上，或者访问竞争对手的平台。我们还假设银行和借款人是相同的，但实际上银行在风险偏好、资本资金和到期偏好方面可能存在多样性。借款人也可以在观察到的和潜在的特征集合上有所不同，这会影响他们的还款概率、贷款估值和贷款规模。这种异质性将匹配问题从随机分配转变为排序匹配，平台需要决定哪些类型应该与谁匹配，这又回到了平台自身的价值主张。
- en: We’ve also ignored information asymmetry. Banks don’t perfectly observe default
    risk, borrowers don’t know their true creditworthiness, and platforms have limited
    insight into outside options of both parties. This creates opportunities for signaling
    (borrowers trying to appear creditworthy), screening (banks designing different
    reservation interest rates for separate loan types), and mechanism design choices
    for the platform. Should a lending platform show borrowers all available rates
    or just the best match? Should they reveal a borrower’s credit score to banks
    or just their proprietary risk assessment? Can revealing too much information
    have a negative impact on match quality?
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还忽略了信息不对称。银行不能完美地观察到违约风险，借款人不知道他们的真实信用状况，平台对双方的对外选择了解有限。这为信号（借款人试图表现出有信用）、筛选（银行为不同的贷款类型设计不同的保留利率）和平台机制设计选择创造了机会。贷款平台应该向借款人展示所有可用的利率还是只展示最佳匹配的利率？他们应该向银行透露借款人的信用评分还是只透露他们专有的风险评估？透露过多信息是否会对匹配质量产生负面影响？
- en: Extensions That Would Deepen Understanding
  id: totrans-76
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 深化理解的扩展
- en: 'To make this framework operational, several natural extensions come to mind:'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使这个框架可行，几个自然的扩展浮现在脑海中：
- en: '**Dynamic Entry and Exit**: Model how market conditions affect participation.
    When interest rates rise, some borrowers drop out while others become desperate.
    Banks adjust their risk appetite and capital ratio based on regulatory changes
    and balance sheet constraints. Machine learning plays a large role here since
    the platform needs to forecast these flows and adjust fees/rates accordingly.'
  id: totrans-78
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**动态进入和退出**：模型如何影响市场条件下的参与。当利率上升时，一些借款人退出，而另一些人变得绝望。银行根据监管变化和资产负债表限制调整其风险偏好和资本比率。机器学习在这里起着重要作用，因为平台需要预测这些流量并相应地调整费用/利率。'
- en: '**Competition Between Platforms**: What happens when borrowers can simultaneously
    search on Upstart, LendingClub, and Prosper? Multi-platform dynamics changes bargaining
    power and forces platforms to think deeply about how their decisions can impact
    the arrival flow rate and growth prospects. This could explain why some platforms
    focus on speed (instant approval) while others emphasize better rates. Understanding
    what niche each platform captures and which niche has unmet demand is critical
    to capturing a larger piece of the pie.'
  id: totrans-79
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**平台间的竞争**：当借款人可以同时在Upstart、LendingClub和Prosper上搜索时会发生什么？多平台动态改变了议价能力，迫使平台深入思考他们的决策如何影响到达流量率和增长前景。这可能解释了为什么一些平台专注于速度（即时批准）而另一些平台强调更好的利率。了解每个平台所占据的细分市场和哪些细分市场存在未满足的需求对于捕获更大份额的市场至关重要。'
- en: '**Reputation and Learning**: Both sides build reputations over time, but only
    if they remain on the platform to build history. Banks that consistently offer
    competitive rates could attract more borrowers and receive a higher matching ratio.
    Borrowers who repay builds a profile on the platform, improving the accuracy of
    their profile. As time goes on and more data is captured, the platform’s sorted
    matching efficiency is improved due to higher availability of signals. Modeling
    these dynamics would help understand customer lifetime value and decide whether
    the platforms should focus mainly on acquisition or retention.'
  id: totrans-80
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**声誉和学习**：双方都会随着时间的推移建立声誉，但前提是他们必须留在平台上以建立历史记录。始终提供具有竞争力的利率的银行可以吸引更多借款人并获得更高的匹配比率。按时还款的借款人会在平台上建立个人资料，提高其个人资料的准确性。随着时间的推移和数据的积累，由于信号可用性的提高，平台的排序匹配效率会得到改善。对这些动态进行建模将有助于理解客户终身价值，并决定平台是否应该主要关注获取或保留。'
- en: '**Mechanism Design**: Instead of take-it-or-leave-it offers and randomizing
    borrowers to the matched banks, platforms could run auctions where banks bid on
    borrowers. Alternatively, the platform could require posted prices where banks
    commit to rate schedules. Each mechanism has different implications for efficiency,
    revenue, and market thickness. The correct choice depends on both regulatory constraints
    and the distribution of borrowers and banks.'
  id: totrans-81
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**机制设计**：平台可以而不是提供非此即彼的报价并将借款人随机分配给匹配的银行，而是运行拍卖，让银行竞标借款人。或者，平台可以要求银行承诺利率表。每种机制都对效率、收入和市场厚度有不同的影响。正确的选择取决于监管约束以及借款人和银行的分布。'
- en: From building models to modeling problems
  id: totrans-82
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 从构建模型到建模问题
- en: This framework provides a strategic advantage because it forces you to think
    about both first and second-order effects. Most data scientists optimize metrics
    in isolation, such as reducing default rates, increasing conversion, and lower
    churn. But in these types of markets, every model optimization affects all equilibrium
    objects. Lower default rates might mean a lower reservation rate for the bank,
    allowing the platform to capture more of the trade surplus through fees. If there
    is borrower heterogentiy, higher matching probabilities might attract worse borrowers,
    leading to a reduction in average match quality.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 这个框架提供了一种战略优势，因为它迫使你思考第一和第二级效应。大多数数据科学家在孤立的情况下优化指标，例如降低违约率、提高转化率和降低流失率。但在这些类型的市场中，每个模型优化都会影响所有均衡对象。降低违约率可能意味着银行保留率更低，从而使平台能够通过费用捕获更多的贸易顺差。如果存在借款人异质性，更高的匹配概率可能会吸引更差的借款人，从而导致平均匹配质量下降。
- en: The framework also helps identify which metrics actually matter. A lending platform
    could possibly accept negative margins on certain loans (loss leaders) if it keeps
    a high-value bank participating or have positive spillovers to different segments.
    Platforms might restrict borrower entry (or lower matches) even <mdspan datatext="el1759363972441"
    class="mdspan-comment">when demand of the</mdspan> partner banks are already at
    high capital utilization. This type of thinking should help industry data scientist
    move away from measurement for measurements’ sake and take a step back to look
    at the bigger picture for whichever company they work for.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 该框架还有助于确定哪些指标实际上很重要。如果平台能够保持高价值的银行参与或对不同的细分市场产生积极的外溢效应，那么贷款平台可能在某些贷款上接受负的边际利润（损失领导者）。即使合作伙伴银行的资本利用率已经很高，平台也可能限制借款人进入（或降低匹配率）。这种思维方式应该有助于行业数据科学家摆脱仅仅为了测量而测量的做法，并退后一步，从他们工作的公司的更大图景来看。
- en: The platforms that win aren’t necessarily those that can predict repayment probability
    with 98% accuracy over ones with 93% accuracy, but the ones that understand the
    market dynamics their algorithms operate within. This framework aims to move your
    mindset away from building better models to modeling the right problems. If you
    have the opportunity to apply this concept in your own work, I’d love to hear
    about it. Please do not hesitate to reach out with questions, insights, or stories
    through [my email](/cdn-cgi/l/email-protection#2a5e584b444e4f584f415e58436a4d45454d464f04494547)
    or [LinkedIn](https://www.linkedin.com/in/derek-tran-ab75ab64/). If you have any
    feedback on this article, please also feel free to reach out. Thank you for reading!
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 获胜的平台不一定是指那些能够以98%的准确率预测还款概率，而那些理解其算法运作的市场动态的平台。这个框架旨在将你的思维方式从构建更好的模型转移到建模正确的问题上。如果你有机会在自己的工作中应用这个概念，我很乐意听听你的想法。请随时通过[我的邮箱](/cdn-cgi/l/email-protection#2a5e584b444e4f584f415e58436a4d45454d464f04494547)或[领英](https://www.linkedin.com/in/derek-tran-ab75ab64/)联系我，提出问题、见解或故事。如果你对这篇文章有任何反馈，也请随时联系。感谢阅读！
