- en: '[3] [ModernBERT: A Modern BERT Model for Long-Context Processing](https://huggingface.co/blog/modernbert)'
  prefs: []
  type: TYPE_NORMAL
- en: '[4] [GPT-4 report](https://arxiv.org/abs/2303.08774)'
  prefs: []
  type: TYPE_NORMAL
- en: '[5] [Llama-3 report](https://arxiv.org/abs/2307.09288)'
  prefs: []
  type: TYPE_NORMAL
- en: '[6] [Mistral 7B](https://arxiv.org/abs/2310.06825)'
  prefs: []
  type: TYPE_NORMAL
- en: '[7] [Kaddour et al., 2023, Challenges and Applications of Large Language Models](https://arxiv.org/pdf/2307.10169)'
  prefs: []
  type: TYPE_NORMAL
- en: '[8] [Huang et al., 2025, A Survey on Hallucination in Large Language Models:
    Principles, Taxonomy, Challenges, and Open Questions](https://dl.acm.org/doi/10.1145/3703155)'
  prefs: []
  type: TYPE_NORMAL
- en: '[9] [Gao et al., 2024, Retrieval-Augmented Generation for Large Language Models:
    A Survey](https://arxiv.org/abs/2312.10997)'
  prefs: []
  type: TYPE_NORMAL
- en: '[10] [Ji et al., 2023, Survey of Hallucination in Natural Language Generation](https://doi.org/10.1145/3571730)'
  prefs: []
  type: TYPE_NORMAL
- en: '[11] [Sun et al., 2025, ReDeEP: Detecting Hallucination in Retrieval-Augmented
    Generation via Mechanistic Interpretability](https://arxiv.org/abs/2410.11414)'
  prefs: []
  type: TYPE_NORMAL
- en: '[12] [Manakul et al., 2023, SelfCheckGPT: Zero-Resource Black-Box Hallucination
    Detection for Generative Large Language Models](https://aclanthology.org/2023.emnlp-main.557/)'
  prefs: []
  type: TYPE_NORMAL
- en: '[13] [Cohen et al., 2023, LM vs LM: Detecting Factual Errors via Cross Examination](https://aclanthology.org/2023.emnlp-main.778/)'
  prefs: []
