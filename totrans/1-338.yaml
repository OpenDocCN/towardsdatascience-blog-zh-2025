- en: How to Scale Your AI Search to Handle 10M Queries with 5 Powerful Techniques
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何使用5种强大技术将你的AI搜索扩展以处理1000万次查询
- en: 原文：[https://towardsdatascience.com/how-to-scale-your-ai-search-to-handle-10m-queries-with-5-powerful-techniques/](https://towardsdatascience.com/how-to-scale-your-ai-search-to-handle-10m-queries-with-5-powerful-techniques/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/how-to-scale-your-ai-search-to-handle-10m-queries-with-5-powerful-techniques/](https://towardsdatascience.com/how-to-scale-your-ai-search-to-handle-10m-queries-with-5-powerful-techniques/)
- en: <mdspan datatext="el1756842196445" class="mdspan-comment">Searching with AI</mdspan>
    has become prevalent since the introduction of LLMs in 2022\. Retrieval augmented
    generation (RAG) systems quickly adapted to utilizing these efficient LLMs for
    better question answering. AI search is extremely powerful because it provides
    the user with rapid access to large amounts of information. You, for example,
    see AI search systems with
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1756842196445" class="mdspan-comment">使用AI进行搜索</mdspan>自从2022年LLM的引入以来已经变得普遍。检索增强生成（RAG）系统迅速适应利用这些高效的LLM来改善问答。AI搜索非常强大，因为它为用户提供快速访问大量信息的能力。例如，你看到AI搜索系统有
- en: ChatGPT
  id: totrans-3
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ChatGPT
- en: Legal AI, such as [Harvey](https://www.harvey.ai/)
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 法律AI，例如[Harvey](https://www.harvey.ai/)
- en: Whenever you perform a Google Search and Gemini responds
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每当你进行Google搜索，Gemini都会响应
- en: Essentially, wherever you have an AI search, RAG is usually the backbone. However,
    searching with AI is much more than simply using RAG.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 实际上，无论你在哪里有AI搜索，RAG通常都是其核心。然而，使用AI进行搜索远不止简单地使用RAG。
- en: In this article, I’ll discuss how to perform search with AI, and how you can
    scale your system, both in terms of quality and scalability.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我将讨论如何使用AI进行搜索，以及如何从质量和可扩展性两个方面扩展你的系统。
- en: '![](../Images/fa90b89d8ee4a4df8a7eb6119feee240.png)'
  id: totrans-8
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/fa90b89d8ee4a4df8a7eb6119feee240.png)'
- en: This infographic highlights the contents of this article. I’ll discuss systems
    using AI search, RAG, scalability, and evaluation throughout the article. Image
    by ChatGPT.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 这张信息图表突出了本文的内容。我将在整篇文章中讨论使用AI搜索、RAG、可扩展性和评估的系统。图片由ChatGPT提供。
