    or you can read about [ensuring reliability in LLM applications.](https://eivindkjosbakken.com/2025/08/16/how-to-ensure-reliability-in-llm-applications/)
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 你还可以了解如何通过[上下文检索将你的RAG提高50%](https://eivindkjosbakken.com/2025/08/30/use-contextual-retrieval-tachieve-50-improvement-to-your-rag-system/)，或者你可以阅读有关[确保LLM应用中可靠性的内容](https://eivindkjosbakken.com/2025/08/16/how-to-ensure-reliability-in-llm-applications/)。
- en: Motivation
  id: totrans-24
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 动机
- en: My motivation for writing this article is that searching with AI has quickly
    become a standard part of our day-to-day. You see AI searches everywhere, for
    example, when you Google something, and Gemini provides you with an answer. Utilizing
    AI this way is extremely time-efficient, since I, as the person querying, do not
    have to enter any links, and I simply have a summarized answer right in front
    of me.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 我写这篇文章的动机是，使用AI进行搜索已经迅速成为我们日常生活中的一个标准部分。你随处可见AI搜索，例如，当你用Google搜索某事时，Gemini为你提供答案。以这种方式利用AI非常节省时间，因为我，作为提问者，不需要输入任何链接，我只需在我面前直接得到一个总结性的答案。
- en: Thus, if you’re building an application, it’s important to know how to build
    such a system, to understand its inner workings.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，如果你正在构建一个应用程序，了解如何构建这样的系统，理解其内部运作方式是很重要的。
- en: Building your AI search system
  id: totrans-27
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 构建你的AI搜索系统
- en: There are several vital aspects to consider when building your search system.
    In this section, I’ll cover the most important aspects.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 在构建搜索系统时，有几个关键方面需要考虑。在本节中，我将介绍最重要的方面。
- en: RAG
  id: totrans-29
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: RAG
- en: '![](../Images/f7ce761b48ab638694fb2a80ee220573.png)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/f7ce761b48ab638694fb2a80ee220573.png)'
- en: This figure showcases Nvidia’s blueprint for RAG, using their internal tools
    and models. There is a lot of information in the figure, but the main point is
    that the RAG fetches the most important documents using vector similarity and
    feeds them to an LLM for a response to the user’s question. Image from [https://github.com/NVIDIA-AI-Blueprints/rag](https://github.com/NVIDIA-AI-Blueprints/rag)
    (Apache 2.0 License)
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 这张图展示了NVIDIA的RAG蓝图，使用他们的内部工具和模型。图中信息量很大，但主要点是RAG使用向量相似性检索最重要的文档，并将其提供给LLM以响应用户的问题。图片来自[https://github.com/NVIDIA-AI-Blueprints/rag](https://github.com/NVIDIA-AI-Blueprints/rag)（Apache
    2.0许可证）
- en: First, you need to build the basics. The core component of any AI search is
    usually a RAG system. The reason for this is that RAG is an extremely efficient
    way of accessing data, and it’s relatively simple to set up. Essentially, you
    can make a pretty good AI search with very little effort, which is why I always
    recommend starting off with implementing RAG.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，您需要建立基础。任何AI搜索的核心组件通常是RAG系统。这是因为RAG是一种非常高效的数据访问方式，并且相对简单易设。实际上，您可以用很少的努力制作一个相当不错的AI搜索，这也是为什么我总是建议从实现RAG开始。
- en: 'You can utilize end-to-end RAG providers such as [Elysia](https://weaviate.io/blog/elysia-agentic-rag);
    however, if you want more flexibility, creating your own RAG pipeline is often
    a good option. Essentially, RAG consists of the following core steps:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以利用端到端RAG提供商，如[Elysia](https://weaviate.io/blog/elysia-agentic-rag)；然而，如果您想要更多的灵活性，创建自己的RAG管道通常是一个好选择。本质上，RAG包括以下核心步骤：
- en: Embed all of your data, so we can perform embedding similarity calculations
    on it. We split the data into chunks of set sizes (for example, 500 tokens).
  id: totrans-34
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将所有数据嵌入，这样我们就可以对其执行嵌入相似性计算。我们将数据分成固定大小的块（例如，500个标记）。
- en: When a user enters a query, we embed the query (with the same embedding engine
    as used in step 1) and find the most similar chunks using vector similarity.
  id: totrans-35
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 当用户输入查询时，我们使用与步骤1中相同的嵌入引擎嵌入查询，并使用向量相似性找到最相似的片段。
- en: Lastly, we feed these chunks, along with the user question, into an LLM such
    as GPT-4o, which provides us with an answer.
  id: totrans-36
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 最后，我们将这些片段以及用户问题一起输入到LLM（如GPT-4o）中，它为我们提供答案。
- en: And that’s it. If you implement this, you’ve already made an AI search that
    will perform relatively well in most scenarios. However, if you really want to
    make a good search, you need to incorporate more advanced RAG techniques, which
    [I will cover later in this article](#Techniques-to-improve-your-AI-search).
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 就这样。如果您实现了这一点，您已经创建了一个在大多数场景中表现相对良好的AI搜索。然而，如果您真的想做好搜索，您需要结合更多高级的RAG技术，这些技术[我将在本文的后续部分介绍](#Techniques-to-improve-your-AI-search)。
- en: Scalability
  id: totrans-38
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 可扩展性
- en: 'Scalability is an important aspect of building your search system. I’ve divided
    the scalability aspect into two main areas:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 可扩展性是构建您的搜索系统的一个重要方面。我将可扩展性方面分为两个主要区域：
- en: Response time (how long the user has to wait for an answer) should be as low
    as possible.
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 响应时间（用户等待答案的时间）应尽可能低。
- en: Uptime (the percentage of time your platform is up and running) should be as
    high as possible.
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 服务器正常运行时间（您的平台正常运行的时间百分比）应尽可能高。
- en: '**Response time**'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: '**响应时间**'
- en: 'You have to ensure you reply quickly to user queries. With a standard RAG system,
    this is usually not an issue, considering:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 您必须确保您能够快速回复用户的查询。使用标准的RAG系统，这通常不是问题，考虑到：
- en: Your dataset is embedded beforehand (takes no time during a user query).
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您的数据集在之前已经嵌入（在用户查询期间不占用时间）。
- en: Embedding the user query is nearly instant.
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将用户查询嵌入几乎瞬间完成。
- en: Performing vector similarity search is also near instant (because computation
    can be [parallelized](https://www.sciencedirect.com/topics/computer-science/vector-parallelism))
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 执行向量相似性搜索也几乎是瞬间的（因为计算可以[并行化](https://www.sciencedirect.com/topics/computer-science/vector-parallelism)）
- en: 'Thus, the LLM response time is usually the deciding factor in how fast your
    RAG performs. To minimize this time, you should consider the following:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，LLM的响应时间通常是决定RAG性能快慢的决定性因素。为了最小化这个时间，您应该考虑以下因素：
- en: Use an LLM with a fast response time.
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用响应时间快的LLM。
- en: '[GPT-4o](https://openai.com/index/hello-gpt-4o/)/[GPT-4.1](https://openai.com/index/gpt-4-1/)
    was a bit slower, but OpenAI has massively improved speed with [GPT-5](https://openai.com/index/introducing-gpt-5/).'
  id: totrans-49
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[GPT-4o](https://openai.com/index/hello-gpt-4o/)/[GPT-4.1](https://openai.com/index/gpt-4-1/)的速度略慢，但OpenAI通过[GPT-5](https://openai.com/index/introducing-gpt-5/)大幅提高了速度。'
- en: The [Gemini flash 2.0](https://cloud.google.com/vertex-ai/generative-ai/docs/models/gemini/2-0-flash)
    models have always been very fast (the response time here is ludicrously fast).
  id: totrans-50
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Gemini flash 2.0](https://cloud.google.com/vertex-ai/generative-ai/docs/models/gemini/2-0-flash)
    模型一直都非常快（这里的响应时间快得令人难以置信）。'
- en: Mistral also provides a fast LLM service.
  id: totrans-51
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: Mistral 还提供快速 LLM 服务。
- en: Implement [streaming](https://www.vellum.ai/llm-parameters/llm-streaming?utm_source=google&utm_medium=organic),
    so you don’t have to wait for all the output tokens to be generated before showing
    a response.
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 实现 [流式传输](https://www.vellum.ai/llm-parameters/llm-streaming?utm_source=google&utm_medium=organic)，这样您就不必等待所有输出标记生成后再显示响应。
- en: The last point on streaming is very important. As a user, I hate to wait for
    an application without receiving any feedback on what’s happening. For example,
    imagine waiting for the Cursor agent to perform a large number of changes, without
    seeing anything on screen before it’s done.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 流式传输的最后一个要点非常重要。作为一个用户，我讨厌在没有收到任何关于正在发生什么的反馈的情况下等待应用程序。例如，想象一下在 Cursor 代理完成大量更改之前，屏幕上什么都没有的情况。
- en: That’s why streaming, or at least providing the user with some feedback while
    waiting, is incredibly important. I summarized this in a quote below.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 正因如此，流式传输，或者至少在等待时向用户提供一些反馈，是极其重要的。我在下面的引语中总结了这一点。
- en: It’s usually not about the response time as a number, but rather the user’s
    perceived response time. If you fill the users’s wait time with feedback, the
    user will perceive it the response time to be faster.
  id: totrans-55
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 通常不是关于响应时间作为一个数字，而是关于用户的感知响应时间。如果您用反馈填满用户的等待时间，用户就会感觉到响应时间更快。
- en: It’s also important to consider that when you expand and improve your AI search,
    you will typically add more components. These components will inevitably take
    more time. However, you should always look for parallelized operations. The biggest
    threat to your response time is **sequential** **operations**, and they should
    be reduced to an absolute minimum.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 还需要考虑的是，当您扩展和改进您的 AI 搜索时，您通常会添加更多组件。这些组件不可避免地会花费更多时间。然而，您始终应该寻找并行化操作。对您的响应时间最大的威胁是**顺序**操作，并且它们应该减少到绝对最小。
- en: '**Uptime**'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: '**可用性**'
- en: 'Uptime is also important when hosting an AI search. You essentially have to
    have a service up and running at all times, which can be difficult when dealing
    with unpredictable LLMs. I wrote an article about ensuring reliability in LLM
    applications below. If you want to learn more about how to make your application
    robust:'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 在托管 AI 搜索时，可用性也很重要。您基本上必须始终有一个服务在运行，这在处理不可预测的 LLM 时可能很困难。我写了一篇关于确保 LLM 应用程序可靠性的文章。如果您想了解更多关于如何使您的应用程序健壮的信息：
- en: https://eivindkjosbakken.com/2025/08/16/how-to-ensure-reliability-in-llm-applications
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: '[如何确保 LLM 应用程序的可靠性](https://eivindkjosbakken.com/2025/08/16/how-to-ensure-reliability-in-llm-applications)'
- en: 'These are the most important aspects to consider to ensure a high uptime for
    your search service:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 确保您的搜索服务具有高可用性的最重要方面是：
- en: Have error handling for everything that deals with LLMs. When you’re making
    millions of LLM calls, things will go wrong. It could be
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对所有涉及 LLM 的内容进行错误处理。当您进行数百万次 LLM 调用时，事情可能会出错。可能是
- en: OpenAI content filtering
  id: totrans-62
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: OpenAI 内容过滤
- en: Token limits (which are notoriously difficult to increase at some providers)
  id: totrans-63
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 令牌限制（这在某些提供商中很难增加）
- en: LLM service is slow, or their server is down
  id: totrans-64
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: LLM 服务速度慢，或者他们的服务器宕机
- en: …
  id: totrans-65
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: …
- en: Have backups. Wherever you have an LLM call, you should have one or two backup
    providers ready to step in when something goes wrong.
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 有备份。无论您在哪里有 LLM 调用，都应该有一个或两个备用提供商准备在出现问题时代替。
- en: Proper tests before deployments
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 部署前的适当测试
- en: Evaluation
  id: totrans-68
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 评估
- en: 'When you are building an AI search system, evaluations should be one of your
    top priorities. There’s no point in continuing to build features if you can’t
    test your search and figure out where you’re thriving and where you’re struggling.
    I’ve written two articles on this topic: [How to Develop Powerful Internal LLM
    Benchmarks](https://towardsdatascience.com/how-to-develop-powerf-interal-llm-benchmarks/)
    and [How to Use LLMs for Powerful Automatic Evaluations.](https://towardsdatascience.com/how-to-use-llms-for-powerful-automatic-evaluations/#:~:text=You%20simply%20provide%20the%20LLM,the%20quality%20is%20deemed%20lower.)'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 当您构建AI搜索系统时，评估应该是您的首要任务之一。如果您无法测试搜索并找出您做得好的地方和做得不好的地方，那么继续构建功能就没有意义了。我已经就这个主题写了两篇文章：[如何开发强大的内部LLM基准](https://towardsdatascience.com/how-to-develop-powerf-interal-llm-benchmarks/)和[如何使用LLM进行强大的自动评估](https://towardsdatascience.com/how-to-use-llms-for-powerful-automatic-evaluations/#:~:text=You%20simply%20provide%20the%20LLM,the%20quality%20is%20deemed%20lower)。
- en: 'In summary, I recommend doing the following to evaluate your AI search and
    maintain high quality:'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，我建议您采取以下措施来评估您的AI搜索并保持高质量：
- en: Incorporate with a prompt engineering platform to version your prompts, test
    before new prompts are released, and run large-scale experiments.
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与提示工程平台结合，对提示进行版本控制，在新提示发布前进行测试，并运行大规模实验。
- en: Do regular analysis of last month’s user queries. Annotate which ones succeeded,
    which ones failed, along with a reason why this is the case.
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定期分析上个月的用户查询。标注哪些成功了，哪些失败了，以及为什么会出现这种情况。
- en: 'I would then group the queries that went wrong by their reason. For example:'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 我会根据错误的原因将出错的查询分组。例如：
- en: User intent was unclear
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用户意图不明确
- en: Issues with the LLM provider
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: LLM提供商的问题
- en: The fetched context did not contain the necessary information to answer the
    query.
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 检索到的上下文没有包含回答查询所需的信息。
- en: …
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: …
- en: And then begin working on the most pressing issues that are causing the most
    unsuccessful user queries.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 然后开始解决导致用户查询失败的最紧迫问题。
- en: Techniques to improve your AI search
  id: totrans-79
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 提高您AI搜索的技术
- en: There are a plethora of techniques you can utilize to improve your AI search.
    In this section, I cover a few of them.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以利用许多技术来提高您的AI搜索。在本节中，我将介绍其中的一些。
- en: Contextual Retrieval
  id: totrans-81
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 上下文检索
- en: This technique was first introduced [by Anthopric in 2024](https://www.anthropic.com/news/contextual-retrieval).
    [I also wrote an extensive article on contextual retrieval](https://eivindkjosbakken.com/2025/08/30/use-contextual-retrieval-tachieve-50-improvement-to-your-rag-system/)
    if you want to learn more details.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 这种技术最初是由Anthropic在2024年[引入的](https://www.anthropic.com/news/contextual-retrieval)。如果您想了解更多细节，我[也写了一篇关于上下文检索的详细文章](https://eivindkjosbakken.com/2025/08/30/use-contextual-retrieval-tachieve-50-improvement-to-your-rag-system/)。
- en: The figure below highlights the pipeline for contextual retrieval. What you
    do is you still maintain the vector database you had in your RAG system, but now
    you also incorporate a BM25 index (a keyword search) to search for relevant documents.
    This works well because sometimes users query using particular keywords, and BM25
    is better suited for such keyword search, compared to vector similarity search.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的图突出了上下文检索的流程。您所做的是，您仍然维护您在RAG系统中拥有的向量数据库，但现在您还结合了一个BM25索引（关键字搜索）来搜索相关文档。这效果很好，因为有时用户使用特定的关键字进行查询，而BM25比向量相似性搜索更适合这种关键字搜索。
- en: '![](../Images/14792bc35e09e9e791d21a1703e6add0.png)'
  id: totrans-84
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/14792bc35e09e9e791d21a1703e6add0.png)'
- en: This figure highlights a contextual retrieval system. You still include the
    vector database from traditional RAG, but you additionally add BM25 to fetch relevant
    documents. You then combine the fetched documents from vector similarity and BM25,
    and finally feed the question and fetched documents to an LLM for a response.
    Image by the author.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 此图突出了上下文检索系统。您仍然包括传统RAG中的向量数据库，但您还额外添加了BM25来检索相关文档。然后您将来自向量相似性和BM25检索到的文档结合起来，最后将问题和检索到的文档输入到LLM中进行响应。图片由作者提供。
- en: BM25 outside RAG
  id: totrans-86
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: RAG之外的BM25
- en: Another option is quite similar to contextual retrieval; however, in this instance,
    you’re performing BM25 outside of the RAG (in contextual retrieval, you perform
    BM25 to fetch the most important documents for RAG). This can also be a powerful
    technique, considering users sometimes utilize your AI search as a basic keyword
    search.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个选项与上下文检索非常相似；然而，在这种情况下，您在RAG之外执行BM25（在上下文检索中，您执行BM25来检索RAG最重要的文档）。考虑到用户有时将您的AI搜索作为基本的关键字搜索，这也可以是一种强大的技术。
- en: However, when implementing this, I recommend developing a router agent that
    detects if we should utilize RAG or BM25 directly to answer the user query. If
    you want to learn more about creating AI router agents, or in general building
    effective agents, [Anthopric has written an extensive article](https://www.anthropic.com/engineering/building-effective-agents)
    on the topic.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，在实施此方案时，我建议开发一个路由代理，以检测我们是否应该直接使用RAG或BM25来回答用户查询。如果你想了解更多关于创建AI路由代理或一般构建有效代理的信息，[Anthropic已经撰写了一篇关于该主题的广泛文章](https://www.anthropic.com/engineering/building-effective-agents)。
- en: Agents
  id: totrans-89
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 代理
- en: Agents are the latest hype within the LLM space. However, they are not simply
    hype; they can also be used to effectively improve your AI search. You can, for
    example, create subagents that can find relevant material, similar to fetching
    relevant documents with RAG, but instead of having an agent look through entire
    documents itself. This is partly how deep research tools from OpenAI, Gemini,
    and Anthropic work, and is an extremely effective (though expensive) way of performing
    AI search. You can read more about [how Anthropic built its deep research using
    agents here](https://www.anthropic.com/engineering/multi-agent-research-system).
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 代理是LLM空间中的最新热点。然而，它们不仅仅是炒作；它们还可以用来有效地提高你的AI搜索。例如，你可以创建子代理来查找相关材料，类似于使用RAG检索相关文档，但不需要代理自己浏览整个文档。这是OpenAI、Gemini和Anthropic的深度研究工具部分工作原理，并且是执行AI搜索的一种极其有效（尽管昂贵）的方法。你可以在[这里](https://www.anthropic.com/engineering/multi-agent-research-system)了解更多关于Anthropic如何使用代理构建其深度研究的信息。
- en: Conclusion
  id: totrans-91
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this article, I have covered how you can build and improve your AI search
    capabilities. I first elaborated on why knowing how to build such applications
    is important and why you should focus on it. Furthermore, I highlighted how you
    can develop an effective AI search with basic RAG, and then improve on it using
    techniques such as contextual retrieval.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我介绍了如何构建和提升你的AI搜索能力。我首先阐述了了解如何构建此类应用的重要性，以及为什么你应该关注它。此外，我还强调了如何使用基本的RAG开发有效的AI搜索，然后通过如上下文检索等技术进行改进。
