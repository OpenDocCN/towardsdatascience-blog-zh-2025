- en: How to Create a Customized GenAI Video in 3 Simple Steps
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/how-to-create-a-customized-genai-video-in-3-simple-steps-e60dfdbb82f6/](https://towardsdatascience.com/how-to-create-a-customized-genai-video-in-3-simple-steps-e60dfdbb82f6/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![The three steps of consistent video creation using GenAI.](../Images/27143e0df7b450d9cbe0bd99fa3b46fc.png)'
  prefs: []
  type: TYPE_IMG
- en: The three steps of consistent video creation using GenAI.
  prefs: []
  type: TYPE_NORMAL
- en: Progress in generative AI (GenAI) is astonishingly fast. It’s becoming more
    mature in various text-driven tasks, going from typical natural language processing
    (NLP) to independent AI agents, capable of performing high-level tasks by themselves.
    However, it’s still in its infancy for image, audio, and video creation. While
    these domains are still new, hard to control, and occasionally gimmicky, they
    are getting better month by month. To illustrate, the video below shows how video
    generation evolved over the past year, using the infamous "spaghetti eating *benchmark*"
    as an example*.*
  prefs: []
  type: TYPE_NORMAL
- en: '<iframe src="[https://cdn.embedly.com/widgets/media.html?src=https%3A%2F%2Fwww.youtube.com%2Fembed%2FfGUn7GwXBvQ%3Ffeature%3Doembed&display_name=YouTube&url=https%3A%2F%2Fwww.youtube.com%2Fwatch%3Fv%3DfGUn7GwXBvQ&image=https%3A%2F%2Fi.ytimg.com%2Fvi%2FfGUn7GwXBvQ%2Fhqdefault.jpg&type=text%2Fhtml&schema=youtube](https://cdn.embedly.com/widgets/media.html?src=https%3A%2F%2Fwww.youtube.com%2Fembed%2FfGUn7GwXBvQ%3Ffeature%3Doembed&display_name=YouTube&url=https%3A%2F%2Fwww.youtube.com%2Fwatch%3Fv%3DfGUn7GwXBvQ&image=https%3A%2F%2Fi.ytimg.com%2Fvi%2FfGUn7GwXBvQ%2Fhqdefault.jpg&type=text%2Fhtml&schema=youtube)"
    title="Evolution over various video generative models: DreamBooth, Sora, Veo 2\.
    Evaluated on the infamous spaghetti eating "benchmark"." height="480" width="854">'
  prefs: []
  type: TYPE_NORMAL
- en: 'In this article, I focus on video generation and show you how you can generate
    your own videos featuring yourself or actual real-world objects – as shown by
    the "GenAI Christmas" video below. This article will answer the following questions:'
  prefs: []
  type: TYPE_NORMAL
- en: How good is video generation nowadays?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Is it possible to generate videos centered around a specific object?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How can I create one myself?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What level of quality can I expect?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Let’s dive right in!
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Types of GenAI video creation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Video generation through AI comes in various forms, each with unique capabilities
    and challenges. Most often, you can classify a GenAI video into one of three categories:'
  prefs: []
  type: TYPE_NORMAL
- en: Videos featuring known concepts and celebrities
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Image-based videos starting from fine-tuned image-generation models
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Image-based videos starting from edited content
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Let’s break down each in more detail!
  prefs: []
  type: TYPE_NORMAL
- en: '**Videos featuring known concepts and celebrities**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This type of video generation solely relies on text prompts to produce content
    using concepts that the Large Vision Models (LVM) already know. These are often
    generic concepts (*"A low-angle shot captures a flock of pink flamingos gracefully
    wading in a lush*, tranquil lagoon.*"* ~ Veo 2 demo shown below) mixed together
    to create a truly authentic video that aligns well with the inputted prompt.
  prefs: []
  type: TYPE_NORMAL
- en: '![Video made by Google''s Veo 2 - prompt: A low-angle shot captures a flock
    of pink flamingos gracefully wading in a lush, tranquil lagoon. [...]](../Images/a2f28ac24f28861eafde04bda6f0ddac.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Video made by Google’s Veo 2 – prompt: A low-angle shot captures a flock of
    pink flamingos gracefully wading in a lush, tranquil lagoon. […]'
  prefs: []
  type: TYPE_NORMAL
- en: However, a single picture is worth a thousand words, and prompts are never this
    long (nor would the video generation listen even if this was the case). This makes
    it nearly impossible for this approach to create consistent follow-up shots that
    fit together in a longer-lasting video. Look for example at Coca-Cola’s 2024 fully
    AI-generated advertisement – and the lack of consistency in the featured trucks
    (they change every frame!).
  prefs: []
  type: TYPE_NORMAL
- en: '**Learning: It’s nearly impossible to create consistent follow-up shots with
    text-to-video models.**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <iframe src="[https://cdn.embedly.com/widgets/media.html?src=https%3A%2F%2Fwww.youtube.com%2Fembed%2FE3-J0MwvBSI%3Ffeature%3Doembed%26start%3D0&display_name=YouTube&url=https%3A%2F%2Fwww.youtube.com%2Fwatch%3Fv%3DE3-J0MwvBSI&image=https%3A%2F%2Fi.ytimg.com%2Fvi%2FE3-J0MwvBSI%2Fhqdefault.jpg&type=text%2Fhtml&schema=youtube](https://cdn.embedly.com/widgets/media.html?src=https%3A%2F%2Fwww.youtube.com%2Fembed%2FE3-J0MwvBSI%3Ffeature%3Doembed%26start%3D0&display_name=YouTube&url=https%3A%2F%2Fwww.youtube.com%2Fwatch%3Fv%3DE3-J0MwvBSI&image=https%3A%2F%2Fi.ytimg.com%2Fvi%2FE3-J0MwvBSI%2Fhqdefault.jpg&type=text%2Fhtml&schema=youtube)"
    title="Coca-Cola’s fully AI-generated advertisement, generated by the "Wild Card"
    studio – shows inconsistencies in the generated trucks." height="480" width="854">
  prefs: []
  type: TYPE_NORMAL
- en: One – and probably the most known – exception to the just mentioned limitation
    are celebrities. Due to their elaborate media presence, LVMs usually have enough
    training data to generate images or videos of these celebrities following the
    text prompt’s command. Add some *explicit* content to it and you have a chance
    to go viral – as shown by the music video below from The Dor Brothers. Though,
    notice how they still struggled to maintain consistency, as shown by the clothes
    that change in every single shot.
  prefs: []
  type: TYPE_NORMAL
- en: <iframe src="[https://cdn.embedly.com/widgets/media.html?src=https%3A%2F%2Fwww.youtube.com%2Fembed%2FTbXZoMocpM8%3Ffeature%3Doembed&display_name=YouTube&url=https%3A%2F%2Fwww.youtube.com%2Fwatch%3Fv%3DTbXZoMocpM8&image=https%3A%2F%2Fi.ytimg.com%2Fvi%2FTbXZoMocpM8%2Fhqdefault.jpg&type=text%2Fhtml&schema=youtube](https://cdn.embedly.com/widgets/media.html?src=https%3A%2F%2Fwww.youtube.com%2Fembed%2FTbXZoMocpM8%3Ffeature%3Doembed&display_name=YouTube&url=https%3A%2F%2Fwww.youtube.com%2Fwatch%3Fv%3DTbXZoMocpM8&image=https%3A%2F%2Fi.ytimg.com%2Fvi%2FTbXZoMocpM8%2Fhqdefault.jpg&type=text%2Fhtml&schema=youtube)"
    title="Music video featuring celebrities in AI-generated scenes – "The Drill"
    from The Dor Brothers." height="480" width="854">
  prefs: []
  type: TYPE_NORMAL
- en: The democratization of GenAI tools has made it easier than ever for people to
    create their own content. This is great since it acts as a creative enabler, but
    it also increases the chances of misuse. Which, in turn, raises important ethical
    and legal questions, especially around consent and misrepresentation. Without
    proper rules in place, there’s a high risk of harmful or misleading content flooding
    digital platforms, making it even harder to trust what we see online. Luckily,
    many tools, like Runway, have systems in place to flag questionable or inappropriate
    content, helping to keep things in check.
  prefs: []
  type: TYPE_NORMAL
- en: '**Learning: Celebrities can be generated consistently due to the abundance
    of (visual) data on them, which, rightfully, raises ethical and legal concerns.
    Luckily, most generation engines help to monitor misuse by flagging such requests.**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![Runway blocking video generation because it detected a celebrity.](../Images/e0502399a28cf05b910cb0853cc96355.png)'
  prefs: []
  type: TYPE_IMG
- en: Runway blocking video generation because it detected a celebrity.
  prefs: []
  type: TYPE_NORMAL
- en: '**Image-based videos starting from fine-tuned image-generation models**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Another popular approach to generating videos is to start from a generated image,
    which serves as the first frame of the video. This frame can be completely generated
    – as shown in the first example below – or based on a real image that’s slightly
    manipulated to provide better control. You can, for example, modify the image
    either manually or by using an image-to-image model. One way of doing so is through
    inpainting, as shown in the second example below.
  prefs: []
  type: TYPE_NORMAL
- en: '**Learnings:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Using images as specific frames in the generated video provide for greater control,
    helping you anchor the video to specific views.
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: Frames can be created from scratch using image generation models. — You can
    utilize image-to-image models to change existing images that fit the storyline
    better.**
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: '![A cat reading a book based on a generated image, self-made usinng Flux for
    the image generation and Ruway to turn the image into a video.](../Images/48fa8386677b623add77f513a11df939.png)'
  prefs: []
  type: TYPE_IMG
- en: A cat reading a book based on a generated image, self-made usinng Flux for the
    image generation and Ruway to turn the image into a video.
  prefs: []
  type: TYPE_NORMAL
- en: '![A cat reading a book based on a real image, self-made using Flux for the
    inpainting and Runway to turn the image into a video.](../Images/bde5446ed4ed6f783185a80e32747547.png)'
  prefs: []
  type: TYPE_IMG
- en: A cat reading a book based on a real image, self-made using Flux for the inpainting
    and Runway to turn the image into a video.
  prefs: []
  type: TYPE_NORMAL
- en: 'Other, more sophisticated approaches include completely changing the style
    of your photos using style transfer models or making models learn a specific concept
    or person to then generate variations, as is done in DreamBooth. This, however,
    is very tough to pull off since fine-tuning isn’t trivial and requires a lot of
    trial and error to get right. Also, the final results will always be "as good
    as it can get", with an output quality that’s nearly impossible to predict at
    the start of the tuning process. Nevertheless, when done right, the results look
    amazing, as shown in this "realistic Simpsons" video:'
  prefs: []
  type: TYPE_NORMAL
- en: <iframe src="[https://cdn.embedly.com/widgets/media.html?src=https%3A%2F%2Fwww.youtube.com%2Fembed%2FmBJatkcofgU%3Ffeature%3Doembed&display_name=YouTube&url=https%3A%2F%2Fwww.youtube.com%2Fwatch%3Fv%3DmBJatkcofgU&image=https%3A%2F%2Fi.ytimg.com%2Fvi%2FmBJatkcofgU%2Fhqdefault.jpg&type=text%2Fhtml&schema=youtube](https://cdn.embedly.com/widgets/media.html?src=https%3A%2F%2Fwww.youtube.com%2Fembed%2FmBJatkcofgU%3Ffeature%3Doembed&display_name=YouTube&url=https%3A%2F%2Fwww.youtube.com%2Fwatch%3Fv%3DmBJatkcofgU&image=https%3A%2F%2Fi.ytimg.com%2Fvi%2FmBJatkcofgU%2Fhqdefault.jpg&type=text%2Fhtml&schema=youtube)"
    title="AI-generated video "The Simpsons – 1950’s Super Panavision 70" created
    by *demonflyingfox*." height="480" width="854">
  prefs: []
  type: TYPE_NORMAL
- en: Image-based videos starting from edited content
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A last option – which is what I mostly used to generate the video shown in this
    article’s introduction – is to manually edit images before feeding them into an
    image-to-video generative model. These manually edited images then serve as the
    starting frames of the generated video, or even as intermediate and final frames.
    This approach offers significant control, as you’re only bound by your own editing
    skills and the interpretative freedom of the video generation model between the
    anchoring frames. The following figure shows how I used Sora to create a segue
    between two consecutive anchor frames.
  prefs: []
  type: TYPE_NORMAL
- en: '**Learning: Most video generation tools (Runway, Sora, …) allow you to specify
    starting, intermediate, and/or ending frames, providing great control in the video
    generation process.**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![Transition from a starting to an ending frame, self-made using Flux 1.1 Schnell
    to generate the two backgrounds, and Sora for the video generation. Note that
    Sora generated the top-view of the robot in the second frame of the video - a
    "happy accident" since it fitted well.](../Images/0b200f1d72928d407659a5b0012addad.png)'
  prefs: []
  type: TYPE_IMG
- en: Transition from a starting to an ending frame, self-made using Flux 1.1 Schnell
    to generate the two backgrounds, and Sora for the video generation. Note that
    Sora generated the top-view of the robot in the second frame of the video – a
    "happy accident" since it fitted well.
  prefs: []
  type: TYPE_NORMAL
- en: The great thing is that the quality of the edits doesn’t even need to be high,
    as long as the video generation model understands what you’re trying to do. The
    example below shows the initial edit – a simple copy-paste of a robot onto a generated
    background scene – and how this is transformed into the same robot walking through
    the forest.
  prefs: []
  type: TYPE_NORMAL
- en: '**Learning: Low-quality edits can still lead to high-quality video generation.**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![AI-generated video based on a (badly) edited image where a robot is simply
    pasted onto a scene, self-made video generated using Runway.](../Images/82a9ea6642d361e99c9f84cd5f96614f.png)'
  prefs: []
  type: TYPE_IMG
- en: AI-generated video based on a (badly) edited image where a robot is simply pasted
    onto a scene, self-made video generated using Runway.
  prefs: []
  type: TYPE_NORMAL
- en: Since the generated video is anchored by the self-edited images, it becomes
    significantly easier to control the flow of the video and thus ensure that successive
    shots fit better together. In the next section, I dive into the details of how
    exactly this can be done.
  prefs: []
  type: TYPE_NORMAL
- en: '**Learning: Manually editing specific frames to anchor the generated video
    allows you to create consistent follow-up shots.**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Make your own video!
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: OK, long intro aside, how can you now start to *actually* make a video?
  prefs: []
  type: TYPE_NORMAL
- en: 'The next three sections explain step by step how I made most of the shots from
    the video you saw at the beginning of this article. In a nutshell, they almost
    always follow the same approach:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 1: generate a scene through image generation'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Step 2: make edits to your scenes – even bad ones allowed!'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Step 3: turn your images into a generated video'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Let’s get our hands dirty!
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 1: generate a scene through image generation'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: First, let’s generate the setting of a specific scene. In the music video I
    created, increasingly smarter agents are mentioned, so I decided a classroom setting
    would work well. To generate this scene, I used Flux 1.1 Schnell. Personally,
    I find the results from Black Forest Labs’ Flux models more satisfactory than
    those from OpenAI’s DALL-E3, Midjourney’s models, or Stability AI’s Stable Diffusion
    models.
  prefs: []
  type: TYPE_NORMAL
- en: '**Learning: At the time of writing, Black Forest Labs’ Flux models provide
    the best text-to-image and inpainting results.**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![Image of an empty classroom, self-made using Flux 1.1 Schnell.](../Images/218bc98e00211ff6ebe846fa87b18584.png)'
  prefs: []
  type: TYPE_IMG
- en: Image of an empty classroom, self-made using Flux 1.1 Schnell.
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 2: make edits to your scenes – even bad ones allowed!'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Next, I wanted to include a toy robot -the subject of the video – in the scene.
    To do so, I took a photo of the robot. For easier background removal, I used a
    green screen, though this is not a necessity. Nowadays AI models like Daniel Gatis’
    [rembg](https://github.com/danielgatis/rembg) or Meta’s [Segment Anything Model
    (SAM)](https://ai.meta.com/sam2/) are great at doing this. If you don’t want to
    worry about the local setup of these models, you can always use online solutions
    like [remove.bg](https://www.remove.bg/upload), too.
  prefs: []
  type: TYPE_NORMAL
- en: '![Image capture of a real-world toy robot.](../Images/6f745aa0ad92401074962c3637c219b0.png)'
  prefs: []
  type: TYPE_IMG
- en: Image capture of a real-world toy robot.
  prefs: []
  type: TYPE_NORMAL
- en: Once you remove the subject’s background – and optionally add some other components,
    like dumbbells – you can paste these into the original scene. The better the edit,
    the higher the quality of the generated video. Getting the light setup right was
    a challenge I didn’t seem to succeed at. Nonetheless, it’s surprising how good
    the video generation can be, even when starting from very badly edited images.
    For editing, I recommend looking into [Canva](https://canva.com/), it’s an easy-to-use
    online tool with a very small learning curve.
  prefs: []
  type: TYPE_NORMAL
- en: '**Learning: Canva is great for editing images.**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![Edit of the photographed toy robot holding dumbbells.](../Images/3ed5522262c6d7f759644afc685ac111.png)'
  prefs: []
  type: TYPE_IMG
- en: Edit of the photographed toy robot holding dumbbells.
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 3: turn your images into a generated video'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Once you have your anchor frames, you can turn these into a video using a video
    generation model of choice and a well-crafted prompt. For this, I experimented
    with [Runway’s video generation models](https://runwayml.com/) and [OpenAI’s Sora](https://sora.com/)
    (no access to [Google’s Veo 2](https://deepmind.google/technologies/veo/veo-2/)
    yet, unfortunately). In my experiments, Runway usually gave better results. Interestingly,
    though, is that Runway Gen-3 Alpha *Turbo* had the highest success rate, not its
    larger brother Gen-3 Alpha. Good, since it’s cheaper and generation credits are
    quite expensive and sparse for video generative models. Based on the videos I
    see passing around online, it seems that Google’s Veo 2 is yet another big jump
    in generation capability. Hope it’ll be generally available soon!
  prefs: []
  type: TYPE_NORMAL
- en: '**Learnings:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Runway’s Gen-3 Alpha Turbo had the highest success rate over Runway’s other
    models – Gen-2 and Gen-3 Alpha – and OpenAI’s Sora.
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: Generation credits are expensive and sparse on all platforms. You don’t get
    much for your money, especially considering the high dependency on ‘luck’ during
    generation.**
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: '![AI-generated video based on an edited starting frame, self-made using Runway.](../Images/9302bcbe3d5d10a275ed8e9830535662.png)'
  prefs: []
  type: TYPE_IMG
- en: AI-generated video based on an edited starting frame, self-made using Runway.
  prefs: []
  type: TYPE_NORMAL
- en: Generating videos is unfortunately still more often a miss than a hit. While
    it is rather trivial to pan the camera around in the scene, asking for specific
    movement of the video’s subject remains *very* tough. Instructions like "raise
    right hand" are nearly impossible – so don’t even think of trying to direct *how*
    the subject’s right hand should be raised. To illustrate, below is a failed generation
    of the same transition between a starting and an ending frame discussed in the
    previous section. For this generation, the instruction was to zoom in on a snowy
    road with a robot walking on it. For more hilariously uncanny video generations,
    see the next section; "*Be aware! Expect failure …*".
  prefs: []
  type: TYPE_NORMAL
- en: '**Learning: Generating videos is more a miss than a hit. Directed movements,
    in particular, remain challenging to almost impossible.**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![Failed generation of a starting-to-ending-frame video transition, self-made
    using Runway.](../Images/69a322c9288f09a565f2732125aa4e05.png)'
  prefs: []
  type: TYPE_IMG
- en: Failed generation of a starting-to-ending-frame video transition, self-made
    using Runway.
  prefs: []
  type: TYPE_NORMAL
- en: Repeat …
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Once you get satisfactory results, you can repeat this process to get consecutive
    shots that fit together. This can be done in various ways, like by creating a
    new starting frame (see first example below), or by continuing the video generation
    with the frame of the last generation but with a different prompt to change the
    subject’s behaviors (see second example below).
  prefs: []
  type: TYPE_NORMAL
- en: '![Example of a fitting next shot based on a newly created starting frame.](../Images/278006ece3ec4a9717c1ae5afd614ac7.png)'
  prefs: []
  type: TYPE_IMG
- en: Example of a fitting next shot based on a newly created starting frame.
  prefs: []
  type: TYPE_NORMAL
- en: '![Example of a fitting next shot based on the previous generation''s final
    frame. This method relies heavily on the video-generation prompt to bring changes
    to the scene.](../Images/f75e6ad026a9ab015a2c64968e241192.png)'
  prefs: []
  type: TYPE_IMG
- en: Example of a fitting next shot based on the previous generation’s final frame.
    This method relies heavily on the video-generation prompt to bring changes to
    the scene.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Be aware! Expect failure …
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As said earlier, generating videos is tough, so keep your expectations low.
    Do you want to generate a specific shot or movement? No chance. Do you want to
    make a good-looking shot of *anything*, but you don’t care about what exactly?
    Yeah, that could work! Is the generated result good, but do you want to change
    something minor in it? No chance again …
  prefs: []
  type: TYPE_NORMAL
- en: To give you a bit of a feel for this process, here’s a compilation of a few
    of the *best* failures I generated during the process of creating my video.
  prefs: []
  type: TYPE_NORMAL
- en: '![Failed video generations, all starting from edited start frames. Top-left:
    "Reindeer wearing the European flag appearing [...]". Top-right: "Robots playing
    in the orchestra [...]". Bottom-left: "Robot helping tutor a kid [...]". Bottom-right:
    "Robot that''s going to sit down on the couch behind it [...]". Videos generating
    using either Sora or Runway.](../Images/5bc5396aa428d0734ef0a0e1e4aec6f2.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Failed video generations, all starting from edited start frames. Top-left:
    "Reindeer wearing the European flag appearing […]". Top-right: "Robots playing
    in the orchestra […]". Bottom-left: "Robot helping tutor a kid […]". Bottom-right:
    "Robot that’s going to sit down on the couch behind it […]". Videos generating
    using either Sora or Runway.'
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: From regular video to music video – turn your story into a song
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The cherry on the cake is a fully AI-generated song to complement the story
    depicted in the video. Of course, this was actually the *foundation* of the cake,
    since the music was generated before the video, but that’s not the point. The
    point is … how great did music generation become?!
  prefs: []
  type: TYPE_NORMAL
- en: The song used in the music video in the introduction of this article was created
    using [Suno](https://suno.com/), the AI application that has had the biggest "wow!"
    factor for me so far. The ease and speed of generating music that’s actually quite
    good is amazing. To illustrate, the music video was generated within five minutes
    of work – this included the time the models took to process!
  prefs: []
  type: TYPE_NORMAL
- en: '**Learning: Suno is awesome!**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'My ideal music-generation workflow is as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: Brainstorm about a story with ChatGPT (simple 4o is fine, o1 did not add much
    extra) and extract good parts.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Converge the good parts and ideas to complete lyrics by providing ChatGPT with
    feedback and manual edits.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Use Suno (v4) to generate songs and play around with different styles. Rewrite
    specific words differently if they sound off (instead of "GenAI" wtire "Gen-AI"
    to prevent a spoken "genaj").
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Remaster the song in Suno (v4). This improves the quality and range of the song,
    which is almost always an improvement over the original.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: All learnings in a nutshell
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'To summarize, here are all the lessons I learned while making my own music
    video and writing this article:'
  prefs: []
  type: TYPE_NORMAL
- en: It’s nearly impossible to create consistent follow-up shots with text-to-video
    models.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Celebrities can be generated consistently due to the abundance of (visual) data
    on them, which, rightfully, raises ethical and legal concerns. Luckily, most generation
    engines help to monitor misuse by flagging such requests.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Using images as specific frames in the generated video provide for greater control,
    helping you anchor the video to specific views.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Frames can be created from scratch using image generation models.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can utilize image-to-image models to change existing images that fit the
    storyline better.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Most video generation tools (Runway, Sora, …) allow you to specify starting,
    intermediate, and/or ending frames, providing great control in the video generation
    process.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Low-quality edits can still lead to high-quality video generation.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Manually editing specific frames to anchor the generated video allows you to
    create consistent follow-up shots.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: At the time of writing, Black Forest Labs’ Flux models provide the best text-to-image
    and inpainting results.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Canva is great for editing images.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Runway’s Gen-3 Alpha Turbo had the highest success rate over Runway’s other
    models – Gen-2 and Gen-3 Alpha – and OpenAI’s Sora.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Generation credits are expensive and sparse on all platforms. You don’t get
    much for your money, especially considering the high dependency on ‘luck’ during
    generation.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Generating videos is more a miss than a hit. Directed movements, in particular,
    remain challenging to almost impossible.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Suno is awesome!
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
