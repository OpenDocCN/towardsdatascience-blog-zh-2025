- en: 'From Classical Models to AI: Forecasting Humidity for Energy and Water Efficiency
    in Data Centers'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/from-classical-models-to-ai-forecasting-humidity-for-energy-and-water-efficiency-in-data-centers-2/](https://towardsdatascience.com/from-classical-models-to-ai-forecasting-humidity-for-energy-and-water-efficiency-in-data-centers-2/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*An ounce of prevention is worth a pound of cure.*'
  prefs:
  - PREF_BQ
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*Benjamin Franklin*'
  prefs:
  - PREF_BQ
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 1\. <mdspan datatext="el1761935136721" class="mdspan-comment">The Importance</mdspan>
    of Humidity Forecasting for Reliable Data Centers
  prefs:
  - PREF_BQ
  - PREF_H2
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: As the power requirements of AI skyrocket, the infrastructure that makes it
    all possible is pushing against limited resources. By 2028, new research shows
    that AI could consume electricity that is equal to 22% of all US households [1].
     Racks of high-performance AI chips consume at least 10 times as much power as
    conventional servers in data centers. Accordingly, an enormous amount of heat
    is produced, and cooling systems take up most of the building space [2]. In addition
    to its carbon footprint, AI also has a substantial water footprint, much of it
    in regions of already high-water stress. For example, GPT-3 requires 5.4 million
    liters of water to train in Microsoft’s US data centers [3]. Seasonal forecasting
    is critical to the daily operation of equipment inside data centers. Weather conditions,
    such as temperature and humidity, affect how intensely cooling systems inside
    data centers must work [4].
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'In this article, the forecast of humidity is computed in several ways. A better
    forecast of temperature and humidity can enable more efficient load planning,
    optimization of cooling schedules, and less demand placed on power and local water
    sources. Now, since we’re primarily discussing humidity in this article, let us
    see what the effects of its extreme values are:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**High humidity:** Condensation becomes a big issue — it can corrode hardware
    and trigger electrical failures. It also makes chillers work harder, costing more
    energy and water.'
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Low humidity:** The danger flips: static and ESD (electrostatic discharge)
    can build up and fry sensitive chips.'
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Accurate forecasting of humidity can help:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Fine-tune cooling schedules
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: Determine demand peaks
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: Schedule maintenance
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: Redistribute workloads before environmental conditions cause costly downtime
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: By implementing the above protective measures, we reduce the strain on electricity
    and local water supplies, ensuring the resilience of AI centers and the overall
    efficiency of the distributed computing infrastructure.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: It is not only data centers that can be affected by humidity; edge devices,
    such as sensors, can be affected as well. These are more vulnerable to weather
    conditions because they are typically outdoors and in remote areas. Edge applications
    often need low-latency predictions. This favors lighter algorithms, such as *XGBoost.*
    For this reason, in the forecasting section below, *XGBoost* and other light algorithms
    are discussed.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Let us conclude this section by discussing the futuristic cover image of a data
    center located on the Moon. Lunar data centers would be impervious to many of
    Earth’s constraints, such as extreme weather and earthquakes. In addition, the
    Moon offers a perfectly neutral place for data ownership. As a matter of fact,
    on 26^(th) February 2025, *SpaceX* launched a *Falcon 9* rocket that carried *Intuitive
    Machines Athena* lunar lander [5]. Among other things, *Athena* contained a small
    data center, called *Freedom*, developed by *Lonestar Holdings*. *Athena* could
    not manage a full upright landing, however, *Freedom* performed successful data
    operations prior to landing. In addition, despite the fact that the *Athena* lander
    landed inside a crater, the *Freedom* data center survived and demonstrated the
    possibility of a lunar data center [6].
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '2\. A Real-World Case Study: Forecasting Humidity With a Precision Interval'
  prefs:
  - PREF_BQ
  - PREF_H2
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Given the importance of weather forecasting for data centers, I turned to a
    real-world dataset from *Kaggle* containing daily climate measurements from Delhi.
    India has a robust data center industry. According to *DataCenters.com* [7], Delhi
    currently has 30 data centers, and a Delhi developer will invest $2 billion to
    further expand the India data center growth [8].
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The data contain temperature, humidity, wind speed, and atmospheric pressure
    measurements. A training set is provided on which we trained our models, and a
    test set, on which we tested the models. The link to the *Kaggle* data and information
    about its license can be found in the footnote of this article.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Although temperature, wind, and pressure all influence cooling demand, I focused
    on humidity because it plays an important role in evaporative cooling and water
    consumption. Humidity also changes more rapidly than temperature, and therefore,
    it is a very meaningful target for predictive modeling.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'I began with classical approaches such as *AutoARIMA*, then moved to more flexible
    models like *Facebook’s Prophet* and *XGBoost,* and concluded with deep learning
    models. Here is a complete list of forecasting methods in this article:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*AutoARIMA*'
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Prophet*'
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: '*NeuralProphet*'
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Random Forest*'
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: '*XGBoost*'
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Mixture of Experts*'
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: '*N-BEATS*'
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Along the way, **I compared accuracy, interpretability, and deployment feasibility**
    — not as an academic exercise, but to answer a practical question: which forecasting
    tools can deliver the kind of reliable, actionable climate predictions that help
    data centers optimize cooling, lower energy costs, and conserve water?'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: In addition, every forecast plot will include a **prediction interval**, not
    just a single forecast line. A lone line can be misleading, as it implies, we
    “know” the exact humidity level on a future day. Since the weather is never certain,
    operators need more than a single forecast. A prediction interval gives a range
    of likely humidity values, reflecting both model limits and natural variability.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Confidence intervals tell us about the mean forecast. Prediction intervals
    are broader — they cover where real humidity readings might fall. For operators,
    that difference is key: underestimate the range and you risk overheating; overestimate
    it and you spend more than you need.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: A good way to judge prediction intervals is by ***coverage*.** With a 95% confidence
    interval, we expect about 95 out of 100 points to fall within it. If only 86 do,
    the model is too sure of itself. **Conformal prediction** adjusts the range so
    the *coverage* lines up with what was promised.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Conformal prediction takes the model’s past errors (residuals = actual − predicted),
    finds a typical error size (quantile of those residuals), and adds it around each
    new forecast to create an interval that covers the true value with the desired
    probability.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Here is the main algorithm for the computation of the prediction interval:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Create a calibration set.
  prefs:
  - PREF_BQ
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Compute the residuals:'
  prefs:
  - PREF_BQ
  - PREF_OL
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![](../Images/8f83ffeb1af08d5b9a99279c6b9971cd.png)'
  prefs:
  - PREF_BQ
  type: TYPE_IMG
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: where the first term on the right side of the equation is the actual observed
    value, and the second term is the model prediction for the same point.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '3\. Find the quantile of residuals:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![](../Images/03ae4d33c86780d0b1bde3e29c278136.png)'
  prefs:
  - PREF_BQ
  type: TYPE_IMG
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: where alpha is the significance level, e.g. 0.05.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '4\. Form the conformal interval for a new forecast:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'The interval at time t is equal to:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![](../Images/01e4fc535bac3ed00fe9121968bb6191.png)'
  prefs:
  - PREF_BQ
  type: TYPE_IMG
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 3\. Data and Forecasting Methods (with Code)
  prefs:
  - PREF_BQ
  - PREF_H2
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'The code for all forecasting methods discussed in this article is on *Github*.
    The directory link is at the end of the article. Before we discuss our forecasting
    methods, let us take a look at our data. Figure 1 shows the training data, and
    Figure 2 shows the test data. As seen in Figure 1, the training data behave in
    a stable, stationary manner. Yet Figure 2 tells a different story: the test period
    breaks that stability with a clear downward drift. This stark contrast raises
    the stakes.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: We expect that structure-based methods, such as ARIMA, and traditional ML methods,
    such as Random Forest, will have a hard time capturing the downward shift because
    they are not temporally aware. On the other hand, deep learning forecasting methods
    can understand that the test series mirrors similar seasonal segments within the
    training data, and therefore are more equipped to capture the downward shift.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![](../Images/86deb9163341160b523d1527452c493e.png)'
  prefs:
  - PREF_BQ
  type: TYPE_IMG
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Figure 1\. Humidity Training Data**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![](../Images/7fedd45c8e3d183c11912f952a68576e.png)'
  prefs:
  - PREF_BQ
  type: TYPE_IMG
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Figure 2\. Test Humidity Data**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 3\. A. *AutoARIMA* Forecasting
  prefs:
  - PREF_BQ
  - PREF_H3
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*ARIMA* (AutoRegressive Integrated Moving Average) models combine three elements:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*AR* terms that capture the memory of past values'
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: '*MA* terms that account for past forecasting errors'
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: Differencing (the “I”) to remove trends and make the series stationary.
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 3\. A. 1\. AutoARIMA Test Data Forecast
  prefs:
  - PREF_BQ
  - PREF_H4
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Traditionally, the analyst must test for stationarity and decide how much differencing
    to apply before fitting the model. This is a difficult process that can also be
    prone to error. *AutoARIMA* removes that burden by running statistical tests under
    the hood. It automatically decides the degree of differencing and searches across
    *AR* and *MA* combinations to select the best fit based on information criteria.
    In short, you can hand it raw, non-stationary data, and it will handle the detective
    work for you—making it both powerful and simple.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Figure 3 shows the *AutoARIMA* forecast (orange dashed line) and the prediction
    interval (yellow shaded area).  *ARIMA* can follow short-term fluctuations but
    is unable to capture the longer downward trend; therefore, the forecast becomes
    a steady line. This is a typical limitation: *ARIMA* can capture local autocorrelation,
    but it cannot capture evolving dynamics. The widening prediction intervals make
    sense—they reflect growing uncertainty over time.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![](../Images/fb7a5be6e7016f3ab2dbc69dfbaf045f.png)'
  prefs:
  - PREF_BQ
  type: TYPE_IMG
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Figure 3\. *AutoARIMA* forecast of the test data, with prediction interval.**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 3\. A. 2\. Accuracy of *AutoARIMA* and Coverage of Prediction Interval
  prefs:
  - PREF_BQ
  - PREF_H4
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '| MSE | RMSE | MAE |'
  prefs:
  - PREF_BQ
  type: TYPE_TB
- en: '| 398.19 | 19.95 | 15.37 |'
  prefs:
  - PREF_BQ
  type: TYPE_TB
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Table 1\. Errors of *AutoARIMA***'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'In Table 1, we report three different errors: *MSE*, *RMSE,* and *MAE* to provide
    a complete picture of model accuracy. *RMSE* and *MAE* are the easiest to read,
    since they use the same units as the target. *RMSE* puts more weight on big misses,
    while *MAE* tells you the average size of an error. We also report *MSE*, which
    is less intuitive but commonly used for comparison.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Regarding the prediction interval, we did not apply conformal prediction, since
    *ARIMA* already returns model-based 95% prediction intervals. These intervals
    are derived from *ARIMA’*s statistical assumptions rather than from the model-agnostic
    conformal prediction framework. However, not using conformal prediction yielded
    an imperfect *coverage* of the prediction interval (85.96%).
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 3\. A. 3\. Interpretability of *AutoARIMA*
  prefs:
  - PREF_BQ
  - PREF_H4
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: One of the appealing aspects of *AutoARIMA* is how easy it is to “see” what
    the model is doing. Figure 4 depicts the partial autocorrelation function (*PACF*),
    which computes the partial correlation of a stationary time series with lagged
    values of itself. This Figure shows that today’s humidity still “remembers” yesterday
    and the days before, with correlations fading over time. This lingering memory
    is exactly what *ARIMA* uses to build its forecasts.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![](../Images/0fe0a30ebcd54a971518ee6102505ff8.png)'
  prefs:
  - PREF_BQ
  type: TYPE_IMG
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Figure 4\. *PACF* plot**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Additionally, we ran the *KPSS* test, which confirmed that the train data is
    indeed stationary.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 3\. A. 4\. Mode of Deployment
  prefs:
  - PREF_BQ
  - PREF_H4
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*AutoARIMA*is easy to deploy: once given a time series, it automatically selects
    orders and fits without manual tuning. Its light computational footprint makes
    it practical for batch forecasting and even for deployment on edge devices with
    limited resources. However, its simplicity means it is best suited for stable
    environments rather than settings with abrupt structural changes.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 3\. B. *Prophet* Forecasting
  prefs:
  - PREF_BQ
  - PREF_H3
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'In this section,we will discuss *Prophet,* an open forecasting library originally
    developed by *Facebook* (now *Meta*). *Prophet* treats a time series as the sum
    of three key pieces: a trend, seasonality, and holidays or special events:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Trend: The trend is modeled flexibly with either a straight line that can bend
    at change-points or a saturating growth curve, which rises quickly and then flattens
    out. This is like the cooling demand in a data center that grows with workloads
    but eventually levels off once the system reaches capacity.'
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: Seasonality is captured with smooth *Fourier* terms, so recurring patterns such
    as weekly or yearly cycles are learned automatically.
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: Holidays or events can be added as regressors to explain one-off spikes.
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Therefore, we see that *Prophet* has a very convenient additive structure. This
    makes *Prophet* easy to understand and robust to messy real-world data.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Code Snippet 1 below shows how to train and fit the *Prophet *model and use
    it to forecast the test data. Note that the *Prophet* forecast returns *yhat_lower*
    and *yhat_upper*, which are the limits of the prediction interval, and sets the
    prediction interval to 95% (line 1 of code). So, like *AutoARIMA* above, the prediction
    interval is not derived from conformal prediction.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs:
  - PREF_BQ
  type: TYPE_PRE
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Code Snippet 1\. Training and Forecasting with *Prophet***'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 3\. B. 1\. *Prophet* Test Data Forecast
  prefs:
  - PREF_BQ
  - PREF_H4
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Figure 5 shows *Prophet’*s forecasting of the test data (the orange line) and
    the prediction interval (blue shaded area). In contrast to *AutoArima*, we can
    see that *Prophet’*s forecast captures well the downward trend of the data.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![](../Images/ebeafe21951a6a31e98f6d4cfd4a876e.png)'
  prefs:
  - PREF_BQ
  type: TYPE_IMG
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Figure 5\. *Prophet* test data forecasting with prediction interval.**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 3\. B. 2\. *Prophet* Accuracy and Prediction Interval Coverage
  prefs:
  - PREF_BQ
  - PREF_H4
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '| MSE | RMSE | MAE |'
  prefs:
  - PREF_BQ
  type: TYPE_TB
- en: '| 105.26 | 10.25 | 8.28 |'
  prefs:
  - PREF_BQ
  type: TYPE_TB
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Table 2\. Prophet errors.**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The forecasting improvement of *Prophet* in comparison to *AutoARIMA* can be
    also seen in Table 2 above, which depicts the errors.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'As we said above, the prediction interval was not derived using conformal prediction.
    However, in contrast to *AutoARIMA*, the prediction interval *coverage* is much
    better: 93.86%.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 3\. B. 3\. *Prophet* Interpretability
  prefs:
  - PREF_BQ
  - PREF_H4
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'As we said above**,** *Prophet *is transparently additive: it decomposes the
    forecast into trend, smooth seasonalities, and optional holiday/regressor effects,
    so component plots show exactly how each piece contributes to *`yhat`* and how
    much each driver moves the forecast.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![](../Images/7c0ce0d6fe4218dbe400ba9101f98d23.png)'
  prefs:
  - PREF_BQ
  type: TYPE_IMG
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Figure 6\. *Prophet* forecast components.**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Figure 6 above shows the *Prophet* forecast components: a gentle downward trend
    over time (top), a weekly cycle where weekends are more humid and mid-week is
    drier (middle), and a yearly cycle with humid winters, a dip in spring, and rising
    values again in summer and fall (bottom).'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 3\. B. 4\. *Prophet* Mode of Deployment
  prefs:
  - PREF_BQ
  - PREF_H4
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*Prophet* is simple to deploy, runs efficiently on standard CPUs, and can be
    used at scale or on edge devices, making it well-suited for business applications
    that need quick, interpretable forecasts.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 3\. C. Forecasting With *NeuralProphet*
  prefs:
  - PREF_BQ
  - PREF_H3
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*NeuralProphet*is a neural-network-based extension of *Prophet*. It keeps the
    same core structure (trend + seasonality + events) but adds:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: A feed-forward neural network to capture more complex, nonlinear patterns.
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: Support for lagged regressors and autoregression (can use past values directly,
    like AR models).
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: The ability to learn multiple seasonalities and higher-order interactions more
    flexibly.
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*Prophet*has the great characteristics of being statistical and additive, which
    enable transparency and quick forecasts. *NeuralProphet* builds on that framework
    but brings in deep learning. *NeuralProphet *can pick up nonlinear and autoregressive
    effects, but that extra flexibility makes it harder to interpret.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: As Code Snippet 2 below shows, we used seasonality in our model to exploit the
    seasonal mode of humidity.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs:
  - PREF_BQ
  type: TYPE_PRE
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Code Snippet 2\. Training and forecasting with *NeuralProphet***'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 3\. C. 1\. *NeuralProphet* Test Data Forecast
  prefs:
  - PREF_BQ
  - PREF_H4
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Figure 7 shows *NeuralProphet’s *forecasting (the dashed green line) and the
    prediction interval (light green shaded area). Similar to *Prophet,* *NeuralProphet’s*
    forecast captures well the downward trend of the data.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![](../Images/9decc889a881409b2ba962fb3d2c03c7.png)'
  prefs:
  - PREF_BQ
  type: TYPE_IMG
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Figure 7\. *NeuralProphet* forecasting of test data with a prediction interval.**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 3\. C. 2\. *NeuralProphet* Accuracy and Prediction Interval Coverage
  prefs:
  - PREF_BQ
  - PREF_H4
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '| MSE | RMSE | MAE |'
  prefs:
  - PREF_BQ
  type: TYPE_TB
- en: '| 145.31 | 12.05 | 9.64 |'
  prefs:
  - PREF_BQ
  type: TYPE_TB
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Table 3\. *NeuralProphet* errors.**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: It is interesting to note that, despite neural augmentation and the addition
    of seasonality, *NeuralProphet’s* errors are slightly higher than *Prophet’s*.*NeuralProphet*
    adds more moving parts, but that doesn’t always translate into better forecasts.
    On limited or messy data, its extra flexibility can actually work against it,
    while *Prophet’s* simpler setup often keeps the predictions steadier and a bit
    more accurate.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Regarding the precision interval, it is drawn using the limit variables, *yhat1
    2.5* and *yhat1 97.5,* returned by *NeuralProphet*. The *coverage* of the 95%
    prediction interval is 83.33%. This is low, but it is expected because it is not
    computed using conformal prediction.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 3\. C. 3\. *NeuralProphet* Interpretability
  prefs:
  - PREF_BQ
  - PREF_H4
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'The three panels in Figure 8 below show, respectively:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Panel 1\. ***Trend*:** Shows the learned baseline level and where the slope
    changes (changepoints) in the piecewise-linear trend.
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: Panel 2. ***Trend rate change*:** Bars/spikes indicating how much the trend’s
    slope jumps at each changepoint (positive = faster growth, negative = slowdown/downturn).
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: Panel 3. ***Seasonality:*** The one-period shape/strength of the seasonal component.
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![](../Images/39c7116b2e73d1c5c568334d5bfdce14.png)'
  prefs:
  - PREF_BQ
  type: TYPE_IMG
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Figure 8\. These three panels show the learned trend baseline, trend rate
    changes, and 6-month seasonality estimated by the model. These highlight how NeuralProphet
    detects shifts in slope and overall change dynamics.**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 3\. C. 4\. *NeuralProphet* Mode of Deployment
  prefs:
  - PREF_BQ
  - PREF_H4
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*NeuralProphet* runs well on CPUs and can be used in scheduled jobs or small
    APIs. While heavier than *Prophet,* it’s still practical for most containerized
    or batch deployments, and can also run on edge devices like a *Raspberry Pi* with
    some setup.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 3\. D. *Random Forest* Forecasting
  prefs:
  - PREF_BQ
  - PREF_H3
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*Random Forest* is a machine learning technique that can also be used for forecasting.
    This is achieved by turning past values and external factors into features. This
    is how it works: First, it builds multiple decision trees on randomly selected
    parts of the data. Then, it averages their results. This helps avoid overfitting
    and capture nonlinear patterns.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 3\. D. 1\. *Random Forest* Forecast
  prefs:
  - PREF_BQ
  - PREF_H4
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Figure 9 below shows the *Random Forest* forecast (orange line) and the prediction
    interval (the blue shaded area). We can see that *Random Forest* does not perform
    as well. This happens because *Random Forest* doesn’t really “understand” time.
    Instead of following the natural sequence of the data, it just looks at lagged
    values as if they were ordinary features. This makes the model good at capturing
    some nonlinear patterns but weak at recognizing longer trends or shifts over time.
    The result is forecasts that look overly smooth and less accurate, which explains
    the higher *MSE.*
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![](../Images/58b18932687aca867a1415234e8e48c3.png)'
  prefs:
  - PREF_BQ
  type: TYPE_IMG
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Figure 9\. *Random Forest* forecast of test data with precision interval.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 3\. D. 2\. *Random Forest* Accuracy and Precision Interval
  prefs:
  - PREF_BQ
  - PREF_H4
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '| MSE | RMSE | MAE |'
  prefs:
  - PREF_BQ
  type: TYPE_TB
- en: '| 448.77 | 21.18 | 17.6 |'
  prefs:
  - PREF_BQ
  type: TYPE_TB
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Table 4\. Random Forest Errors**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The poor performance of *Random Forest* is also evident in the high error values
    shown in Table 4 above.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Regarding the prediction interval, **this is the first forecasting technique**
    where we used conformal prediction to compute the prediction interval.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The coverage of the prediction interval was estimated to be an impressive 100%.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 3\. D. 3\. *Random Forest* Interpretability
  prefs:
  - PREF_BQ
  - PREF_H4
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![](../Images/5251c7672ab228f7b2699ae70a40c624.png)'
  prefs:
  - PREF_BQ
  type: TYPE_IMG
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Figure 10\. *Random Forest* Lag Importance**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*Random Forest* provides some interpretability by ranking the importance of
    the features used in its predictions. In time-series forecasting, this often means
    examining which lags of the target variable contribute most to the model’s predictions.
    The feature importance plot in Figure 10 above shows that the very recent lag
    (one day back) dominates, carrying nearly 80% of the predictive weight, while
    all longer lags contribute almost nothing. This indicates that the *Random Forest*
    relies heavily on the immediate past value to make forecasts, smoothing over longer-term
    dependencies. While such interpretability helps us understand what the model is
    “looking at,” it also highlights why *Random Forest* may underperform in capturing
    broader temporal dynamics compared to methods better suited to sequential structure.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 3\. D.4\. Random Forest Mode of Deployment
  prefs:
  - PREF_BQ
  - PREF_H4
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*Random Forest* models are relatively lightweight to deploy, since they consist
    of a set of decision trees and require no special hardware or complex runtime.
    They can be exported and run efficiently on standard servers, embedded systems,
    or even edge devices with limited “compute”, making them practical for real-time
    applications where resources are constrained. However, their memory footprint
    can grow when many trees are used, so compact versions or tree pruning can be
    applied in edge environments.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**3\. E. *XGBoost* Forecasting**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*XGBoost*is a boosting algorithm that builds trees one after another, with
    each new tree correcting the mistakes of previous trees. In forecasting, we provide
    it with features such as lagged values, rolling averages, and external variables,
    allowing it to learn time patterns and relationships between variables. It works
    well because it incorporates strong regularization, which enables it to handle
    large and complex datasets more effectively than simpler methods. But, like *Random
    Forests*, it doesn’t naturally handle time order, so its success depends heavily
    on how well the time-based features are designed.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 3\. E. 1\. XGBoost Test Data Forecast
  prefs:
  - PREF_BQ
  - PREF_H4
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Figure 11 shows the *XGBoost* forecast (orange line) and the prediction interval
    (blue shaded area). We can see that the forecast closely follows the humidity
    signal and is therefore very successful at predicting humidity. This can also
    be confirmed in Table 5 below, which depicts relatively small errors, particularly
    in comparison to *Random Forest.*
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![](../Images/32a7c1913cca95b2cd90a0a8e6cbf7c8.png)'
  prefs:
  - PREF_BQ
  type: TYPE_IMG
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Figure 11\. *XGBoost* forecasting of test data.**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*XGBoost* builds trees sequentially, and this is the source of its strength.
    As we previously said, each new tree corrects the mistakes of the previous ones.
    This boosting process is combined with strong regularization. This method can
    pick up quick changes, deal with tricky patterns, and still stay reliable. That
    usually makes its forecasts closer to reality than *those of Random Forest*.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 3\. E. 2\. *XGBoost* Forecasting Accuracy and Prediction Interval Coverage
  prefs:
  - PREF_BQ
  - PREF_H4
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '| MSE | RMSE | MAE |'
  prefs:
  - PREF_BQ
  type: TYPE_TB
- en: '| 57.46 | 7.58 | 5.69 |'
  prefs:
  - PREF_BQ
  type: TYPE_TB
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Table 5\. *XGBoost* forecasting errors.**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Here, we also used conformal prediction for the computation of the prediction
    interval. For this reason, the precision interval *coverage* is high: 94.74%'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 3\. E. 3\. *XGBoost* Forecasting Interpretability
  prefs:
  - PREF_BQ
  - PREF_H4
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*XGBoost,* despite its complexity, remains fairly interpretable compared to
    deep learning models. It provides feature importance scores that show which lagged
    values or external variables drive the forecasts. We can look at feature importance
    plots, much like with *Random Forest*. For a deeper view, *SHAP* values show how
    each factor influenced a single prediction. This gives both an overall picture
    and case-by-case insight.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Figure 12 below shows the weight of a feature, e.g. how often it is used in
    splits.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![](../Images/f5bf72e501552d57f47747bd44d20f88.png)'
  prefs:
  - PREF_BQ
  type: TYPE_IMG
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Figure 12\. *XGBoost* lag importance.**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The series below shows the gain for each lag, i.e., the average improvement
    when a lag is used.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '{‘humidity_lag_1’: 3431.917724609375, ‘humidity_lag_2’: 100.19515228271484,
    ‘humidity_lag_3’: 130.51077270507812, ‘humidity_lag_4’: 118.07515716552734, ‘humidity_lag_5’:
    155.8759307861328, ‘humidity_lag_6’: 152.50379943847656, ‘humidity_lag_7’: 139.58169555664062}'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![](../Images/1770816245a2dba579b98ca1339b46db.png)'
  prefs:
  - PREF_BQ
  type: TYPE_IMG
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Figure 13\. *SHAP* values for *XGBoost* lags.**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The *SHAP* summary plot in Figure 13 shows that *humidity_lag_1* is by far the
    most influential feature, with high recent humidity values pushing forecasts upward
    and low recent humidity values pulling them downward. Later lags (2–7) play only
    a minor role, indicating the model relies mainly on the most recent observation
    to make predictions.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 3\. E. 4\. *XGBoost* Mode of Deployment
  prefs:
  - PREF_BQ
  - PREF_H4
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*XGBoost* is also straightforward to deploy across platforms, from cloud services
    to embedded systems. Its main advantage over *Random Forest* is efficiency: models
    are typically smaller and faster at inference. This makes the model practical
    for real-time use. Its support across many languages and platforms makes it easy
    to implement in various settings.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 3\. F. *Mixture of Experts* (*MoE*) Forecasting
  prefs:
  - PREF_BQ
  - PREF_H3
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The *MoE* approach combines several specialized models (“experts”), each tuned
    to capture different aspects of the data, with a *gating network* that determines
    the weight each expert should have in the final forecast.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'In Code Snippet 3, we see the keywords *AutoGluon* and *Chronos*. Let us explain
    what they are: We implemented the *Mixture of Experts* using *Hugging Face* models
    integrated through *AutoGluon*, with *Chronos* serving as one of the experts.
    *Chronos* is a family of time-series forecasting models built using transformers.
    *AutoGluon* is a helpful *AutoML* framework that can handle tabular, text, image,
    and time series data. *Mixture of Experts* is just one of its many strategies
    to boost performance using model ensembling.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs:
  - PREF_BQ
  type: TYPE_PRE
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Code Snippet 3: Fitting the *Autogluon* model *TimeSeriesPredictor***'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'In Code Snippet 3 above, the predictor is called *predictor_roll* because *MoE *forecasting
    generates predictions in a rolling fashion: each forecasted value is fed back
    into the model to predict the next step. This approach reflects the sequential
    nature of time series data.  It also allows the gating network to dynamically
    adjust which experts it relies on at each point in the horizon. Rolling forecasts
    also expose how errors accumulate over time. This way, we achieve a more realistic
    view of multi-step performance.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 3\. F. 1\. *MOE* Test Data Forecast
  prefs:
  - PREF_BQ
  - PREF_H4
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![](../Images/82c0c3815f97bade7369790a1d52459f.png)'
  prefs:
  - PREF_BQ
  type: TYPE_IMG
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Figure 14\. *MOE* test data forecasting and prediction interval.**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: As shown in Figure 14 above, *MoE* performs extremely well and closely follows
    the actual test data. As Table 6 below shows, ***MoE achieves the best accuracy
    and the smallest errors overall.***
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 3\. F. 2\. *MOE* Forecasting Accuracy and Prediction Interval Coverage
  prefs:
  - PREF_BQ
  - PREF_H4
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '| MSE | RMSE | MAE |'
  prefs:
  - PREF_BQ
  type: TYPE_TB
- en: '| 45.52 | 6.75 | 5.18 |'
  prefs:
  - PREF_BQ
  type: TYPE_TB
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Table 6\. Mixture of Experts Forecasting Errors.**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The *coverage* of the 95% prediction interval is extremely good (97.37%) because
    we used conformal prediction.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 3\. F. 3\. *MOE* Forecasting Interpretability
  prefs:
  - PREF_BQ
  - PREF_H4
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'There are several ways to gain insight into how *MoE* works:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Gating network weights: By inspecting the gating network’s outputs, you can
    see which expert(s) were given the most weight for each prediction. This reveals
    *when* and *why* certain experts are trusted more.'
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Expert specialization: Each expert can be analyzed separately—e.g., one may
    capture short-term fluctuations while another handles longer seasonal trends.
    Looking at their forecasts side by side helps explain the ensemble’s behavior.'
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Feature attribution (SHAP/feature importance): If the experts are themselves
    interpretable models (like trees), their feature importances can be computed.
    Even for neural experts, we can use *SHAP* or integrated gradients to understand
    how features influence decisions.'
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: So while *MoE* is not as “out-of-the-box interpretable” as *Random* *Forest *or
    *XGBoost,* you *can* open the black box by analyzing which expert was chosen when,
    and why.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 3\. F. 4\. *MoE* Mode of Deployment
  prefs:
  - PREF_BQ
  - PREF_H4
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Deploying *Mixture of Experts* is more demanding than tree ensembles. The reason
    is that it involves both the expert models and the *gating network*. In data centers,
    on servers, or in the cloud, implementation is straightforward because modern
    frameworks like *PyTorch* and *TensorFlow* can easily handle orchestration. For
    edge devices, however, deployment is much more difficult. The specific challenges
    are the complexity and size of *MoE*. Therefore, pruning, quantization, or limiting
    the number of active experts is often necessary to keep inference lightweight.
    *AutoML* frameworks such as *AutoGluon* simplify deployment by wrapping the entire
    *MoE* pipeline. The *Hugging Face* site also hosts large-scale *MoE* models that
    can help us scale up to production-grade AI systems.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 3\. G. *N-BEATS* Forecasting
  prefs:
  - PREF_BQ
  - PREF_H3
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*N-BEATS* [9] is a deep learning model for time series forecasting built from
    stacks of fully connected layers grouped into blocks. Each block outputs a forecast
    and a backcast, with the backcast removed from the input so the next block can
    focus on what remains. By chaining blocks, the model gradually refines its predictions
    and captures complex patterns. In our implementation, we used a sliding-window
    setup: the model examines a fixed window of past observations (and external drivers,
    such as mean temperature) and learns to predict several future points simultaneously.
    The window then shifts forward step by step across the data, giving the model
    many overlapping training examples and helping it generalize to unseen horizons.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'In this article, *N-BEATS* was implemented using *N-BEATSx*, which is an extension
    of the original *N-BEATS* architecture that includes exogenous drivers. *N-BEATS*
    and *N-BEATSx* are part of the *NeuralForecast* library [10], which offers several
    neural forecasting models. As can be seen in Code Snippet 4, *N-BEATS* was set
    up using a factory function (*make_model*), which lets us define the forecast
    *horizon* variable and add mean temperature (*meantemp*) as an extra input. The
    idea behind including *meantemp* is straightforward: the model doesn’t just learn
    from past values of the target series, but also from this key outside factor.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs:
  - PREF_BQ
  type: TYPE_PRE
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Code Snippet 4: *N-BEATS* model creation and fitting.**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 3\. G. 1\. *N-BEATS* Test Data Forecast
  prefs:
  - PREF_BQ
  - PREF_H4
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Figure 15 shows the *N-BEATS* forecasting model (orange line) and the prediction
    interval (blue area). We can see that the forecast is able to follow the downward
    trend of the data, but stays above the data line for a significant portion of
    the data.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![](../Images/e3cd5f32bde3690463ef857d4daeb11b.png)'
  prefs:
  - PREF_BQ
  type: TYPE_IMG
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Figure 15\. *N-BEATS* forecast of the test data and prediction interval.**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 3\. G. 2\. N-BEATS Accuracy and Prediction Interval Coverage
  prefs:
  - PREF_BQ
  - PREF_H4
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '| MSE | RMSE | MAE |'
  prefs:
  - PREF_BQ
  type: TYPE_TB
- en: '| 166.76 | 12.91 | 10.32 |'
  prefs:
  - PREF_BQ
  type: TYPE_TB
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Table 7\. *N-BEATS* forecasting errors.**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'For *N-Beats*, we used conformal prediction, and, as a result, the prediction
    interval *coverage* is excellent: 98.25%'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 3\. G. 3\. *N-BEATS* Interpretability
  prefs:
  - PREF_BQ
  - PREF_H4
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: In our experiments, we used the generic form of *N-BEATS*, which treats the
    model as a black-box forecaster. However, *N-BEATS* also offers another architecture
    with “interpretable blocks” that explicitly model trend and seasonality components.
    This means the network not only produces accurate forecasts but can also decompose
    the time series into human-readable parts, making it easier to understand what
    drives the predictions.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 3\. G. 4\. *N-BEATS* Mode of Deployment
  prefs:
  - PREF_BQ
  - PREF_H4
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Because *N-BEATS* is built entirely from feed-forward layers, it is relatively
    lightweight compared to other deep learning models. This makes it straightforward
    to deploy not only on servers but also on edge devices, where it can deliver multi-step
    forecasts in real time without heavy hardware requirements.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_BQ
  - PREF_H2
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: In this article, we compared several forecasting approaches—from classical baselines
    such as *AutoARIMA *and *Prophet *to machine-learning methods such as *XGBoost*
    and deep learning architectures such as *N-BEATS* and *Mixture of Experts.* Simpler
    models offered transparency and easy deployment but struggled to capture the complexity
    of the humidity series. In contrast, modern deep learning and ensemble-based approaches
    significantly improved accuracy, with the *Mixture of Experts* achieving the lowest
    error (MSE = 45). T
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Below we see a summary of the mean square errors:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*AutoARIMA* MSE = 398.19'
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Prophet* MSE = 105.26'
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: '*NeuralProphet* MSE = 145.31'
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Random Forest* MSE = 448.77'
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: '*XGBoost* MSE = 57.46'
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Mixture of Experts* MSE = 45.52'
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: '*N-BEATS* MSE = 166.76'
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Besides accuracy, we also computed a prediction interval for each forecasting
    method and demonstrated the use of conformal prediction to compute an accurate
    prediction interval. The conformal prediction code for each forecasting method
    can be found in my *Jupyter* notebooks on *Github*. Prediction intervals are important
    because they give a realistic sense of forecast uncertainty.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: For each forecasting method, we also examined its interpretability and mode
    of deployment. With models like *AutoARIMA* and *Prophet*, interpretation comes
    straight from their structure. *AutoARIMA *shows how past values and errors influence
    the present, while *Prophet* splits the series into components like trend and
    seasonality that can be plotted and examined. Deep learning models such as *N-BEATS*
    or *Mixture of Experts* act more like black boxes. However, in their case, we
    can use tools such as *SHAP* or error analysis to get insights.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Deployment is also important: lighter models, such as *XGBoost,* can run efficiently
    on edge devices. Larger deep learning models can utilize frameworks such as AutoGluon to
    streamline their training. A great benefit is that these models can be deployed
    locally to avoid API limits.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: In conclusion, our results show that reliable humidity forecasts are both possible
    and useful for day-to-day data center operations. By adopting these methods, data
    center operators can expect energy demand peaks and optimize cooling schedules.
    This way, they can reduce both energy consumption and water use. Given that AI
    power demands constantly rise, the ability to forecast environmental drivers,
    such as humidity, is crucial because it can make digital infrastructure more resilient
    and sustainable.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Thank you for reading!
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
