- en: Logging datasets with mlflow.log_input() API
  id: totrans-59
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用mlflow.log_input() API记录数据集
- en: '![Photo by Claudio Schwarz on Unsplash](../Images/9f3f642961799ceee6e65d0bdd8d5da0.png)'
  id: totrans-60
  prefs: []
  type: TYPE_IMG
  zh: '![由Claudio Schwarz在Unsplash上的照片](../Images/9f3f642961799ceee6e65d0bdd8d5da0.png)'
- en: Photo by [Claudio Schwarz](https://unsplash.com/@purzlbaum?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 由[Claudio Schwarz](https://unsplash.com/@purzlbaum?utm_source=medium&utm_medium=referral)在[Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)上的照片
- en: One of the most straightforward ways to log datasets in MLflow is through the
    `mlflow.log_input()` API. This allows you to log datasets in any format that is
    compatible with `mlflow.data.dataset.Dataset`, which can be extremely helpful
    when managing large-scale experiments.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 在MLflow中记录数据集最直接的方法之一是通过`mlflow.log_input()` API。这允许你以与`mlflow.data.dataset.Dataset`兼容的任何格式记录数据集，这在管理大规模实验时可能非常有帮助。
- en: Step-by-Step Guide
  id: totrans-63
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 步骤指南
- en: First, let’s fetch the California Housing dataset and convert it into a `pandas.DataFrame`
    for easier manipulation. Here, we create a dataframe that combines both the feature
    data (`california_data`) and the target data (`california_target`).
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们获取加利福尼亚住房数据集并将其转换为`pandas.DataFrame`，以便更容易地操作。在这里，我们创建了一个结合了特征数据（`california_data`）和目标数据（`california_target`）的数据框。
- en: '[PRE4]'
  id: totrans-65
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: To log the dataset with meaningful metadata, we define a few parameters like
    the data source URL, dataset name, and target column. These will provide helpful
    context when retrieving the dataset later.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 为了记录具有有意义元数据的数据集，我们定义了一些参数，如数据源URL、数据集名称和目标列。这些将在以后检索数据集时提供有用的上下文。
- en: If we look deeper in the `fetch_california_housing` [source code](https://github.com/scikit-learn/scikit-learn/blob/311bf6bad/sklearn/datasets/_california_housing.py#L46),
    we can see the data was originated from [https://www.dcc.fc.up.pt/~ltorgo/Regression/cal_housing.tgz](https://www.dcc.fc.up.pt/~ltorgo/Regression/cal_housing.tgz).
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们深入查看`fetch_california_housing` [源代码](https://github.com/scikit-learn/scikit-learn/blob/311bf6bad/sklearn/datasets/_california_housing.py#L46)，我们可以看到数据来源于[https://www.dcc.fc.up.pt/~ltorgo/Regression/cal_housing.tgz](https://www.dcc.fc.up.pt/~ltorgo/Regression/cal_housing.tgz)。
- en: '[PRE5]'
  id: totrans-68
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Once the data and metadata are defined, we can convert the `pandas.DataFrame`
    into an `mlflow.data.Dataset` object.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦定义了数据和元数据，我们就可以将`pandas.DataFrame`转换为`mlflow.data.Dataset`对象。
- en: '[PRE6]'
  id: totrans-70
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'Example Output:'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 示例输出：
- en: '[PRE7]'
  id: totrans-72
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'Note that You can even convert the dataset to a dictionary to access additional
    properties like `source_type`:'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：你甚至可以将数据集转换为字典以访问额外的属性，如`source_type`：
- en: '[PRE8]'
  id: totrans-74
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: '[PRE9]'
  id: totrans-75
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Now that we have our dataset ready, it’s time to log it in an MLflow run. This
    allows us to capture the dataset’s metadata, making it part of the experiment
    for future reference.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经准备好了数据集，是时候将其记录到MLflow运行中。这允许我们捕获数据集的元数据，使其成为实验的一部分，以便将来参考。
- en: '[PRE10]'
  id: totrans-77
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: '[PRE11]'
  id: totrans-78
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: Let’s explore the dataset in the MLflow UI (). You’ll find your dataset listed
    under the default experiment. In the **Datasets Used** section, you can view the
    context of the dataset, which in this case is marked as being used for training.
    Additionally, all the relevant fields and properties of the dataset will be displayed.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们探索MLflow UI中的数据集。你将在默认实验下找到你的数据集。在**使用的数据集**部分，你可以查看数据集的上下文，在本例中标记为用于训练。此外，数据集的所有相关字段和属性也将显示出来。
- en: '![Training dataset in the MLflow UI; Source: Me](../Images/49c8e216032ca33aba85e3a7d00dc33d.png)'
  id: totrans-80
  prefs: []
  type: TYPE_IMG
  zh: '![MLflow UI中的训练数据集；来源：我](../Images/49c8e216032ca33aba85e3a7d00dc33d.png)'
- en: 'Training dataset in the MLflow UI; Source: Me'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: MLflow UI中的训练数据集；来源：我
- en: Congrats! You have logged your first dataset!
  id: totrans-82
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 恭喜！你已经记录了你的第一个数据集！
- en: '* * *'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Logging datasets when evaluating mlflow**.**evaluate() API
  id: totrans-84
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在评估mlflow**.**evaluate() API时记录数据集
- en: '![Photo by Dino Reichmuth on Unsplash](../Images/1bf72d737b54ddeed1f49b90f43310d8.png)'
  id: totrans-85
  prefs: []
  type: TYPE_IMG
  zh: '![由Dino Reichmuth在Unsplash上的照片](../Images/1bf72d737b54ddeed1f49b90f43310d8.png)'
- en: Photo by [Dino Reichmuth](https://unsplash.com/@dinoreichmuth?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 由[Dino Reichmuth](https://unsplash.com/@dinoreichmuth?utm_source=medium&utm_medium=referral)在[Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)上的照片
- en: Let’s continue our journey by exploring how to evaluate datasets using the `mlflow.evaluate()`
    API. This functionality, which integrates datasets with MLflow’s evaluation framework,
    was introduced in **MLflow 2.8.0**. Users of earlier versions of MLflow will not
    have access to this feature.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们继续我们的旅程，探索如何使用 `mlflow.evaluate()` API 评估数据集。这个功能，它将数据集与 MLflow 的评估框架集成，是在
    **MLflow 2.8.0** 中引入的。MLflow 早期版本的用户将无法访问此功能。
- en: Step-by-Step Guide
  id: totrans-88
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 步骤指南
- en: 'First, let’s perform a train-test split on the California housing data:'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们对加利福尼亚住房数据进行训练-测试拆分：
- en: '[PRE12]'
  id: totrans-90
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: For this part, we will be using similar metadata to create the training dataset
    but note that the training and evaluation datasets have different names.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这部分，我们将使用类似的元数据来创建训练数据集，但请注意，训练和评估数据集有不同的名称。
- en: '[PRE13]'
  id: totrans-92
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: For modeling, let’s fit a Random Forest Regression model.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 对于建模，让我们拟合一个随机森林回归模型。
- en: '[PRE14]'
  id: totrans-94
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: Once the model is trained, we need to prepare an evaluation dataset. The `mlflow.data.from_pandas()`
    function will be used to create this dataset, which will be passed to the `mlflow.evaluate()`
    function for model evaluation. Note that the `predictions` parameter is specified
    here to indicate the column containing the model’s predicted output.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 模型训练完成后，我们需要准备一个评估数据集。将使用 `mlflow.data.from_pandas()` 函数创建此数据集，并将其传递给 `mlflow.evaluate()`
    函数以进行模型评估。请注意，这里指定了 `predictions` 参数以指示包含模型预测输出的列。
- en: '[PRE15]'
  id: totrans-96
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: With the training and evaluation datasets prepared, it’s time to log the model
    and evaluate its performance using MLflow.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 准备好训练和评估数据集后，是时候使用 MLflow 记录模型并评估其性能了。
- en: '[PRE16]'
  id: totrans-98
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: 'The **Default Evaluator** is used here, and it logs several important metrics
    automatically:'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 这里使用的是 **默认评估器**，它会自动记录几个重要指标：
- en: example_count, mean_absolute_error, mean_squared_error, root_mean_squared_error,
    sum_on_target, mean_on_target, r2_score, max_error, mean_absolute_percentage_error
  id: totrans-100
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: example_count, mean_absolute_error, mean_squared_error, root_mean_squared_error,
    sum_on_target, mean_on_target, r2_score, max_error, mean_absolute_percentage_error
- en: These metrics can be found in the Metrics section of the experiment run in the
    MLflow UI. **I recommend experimenting with different model types using `mlflow.evaluate`
    to explore the full capabilities of the Default Evaluator.** It provides a range
    of valuable metrics as well as useful visualizations.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 这些指标可以在 MLflow UI 中实验运行的指标部分找到。**我建议使用 `mlflow.evaluate` 尝试不同的模型类型，以探索默认评估器的全部功能。**它提供了一系列有价值的指标以及有用的可视化。
- en: '![Regression metrics with mlflow.evaluate; Source: Me](../Images/50bf10c6b93e9929b0bec1cb433dee24.png)'
  id: totrans-102
  prefs: []
  type: TYPE_IMG
  zh: '![使用 mlflow.evaluate 的回归指标；来源：本人](../Images/50bf10c6b93e9929b0bec1cb433dee24.png)'
- en: 'Regression metrics with mlflow.evaluate; Source: Me'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 mlflow.evaluate 的回归指标；来源：本人
- en: Note that if you’re working with an MLflow `PandasDataset`, you must specify
    the column containing the model’s predicted output using the `predictions` parameter
    in the `mlflow.data.from_pandas()` function. When calling `mlflow.evaluate()`,
    set `predictions = None` because the predictions column is already included in
    the dataset. This ensures proper integration and evaluation.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，如果您正在使用 MLflow `PandasDataset`，则必须在 `mlflow.data.from_pandas()` 函数中使用 `predictions`
    参数指定包含模型预测输出的列。在调用 `mlflow.evaluate()` 时，设置 `predictions = None`，因为预测列已经包含在数据集中。这确保了适当的集成和评估。
- en: 'Example Output:'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 示例输出：
- en: '[PRE17]'
  id: totrans-106
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: Let’s head over to the MLflow UI to view the results. You will see that our
    evaluation dataset has been successfully logged within the same run as the training.
    As a result, the run now contains both the training and evaluation datasets.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们转到 MLflow UI 查看结果。您将看到我们的评估数据集已成功记录在训练的同一运行中。因此，该运行现在包含训练和评估数据集。
- en: '![Evaulation dataset in the MLflow UI; Source: Me](../Images/445aed0bd53edb7ea3bdef3150224e7d.png)'
  id: totrans-108
  prefs: []
  type: TYPE_IMG
  zh: '![MLflow UI 中的评估数据集；来源：本人](../Images/445aed0bd53edb7ea3bdef3150224e7d.png)'
- en: 'Evaulation dataset in the MLflow UI; Source: Me'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: MLflow UI 中的评估数据集；来源：本人
- en: '* * *'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Epilogue
  id: totrans-111
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结语
- en: Logging datasets is critical not just for reproducibility but also for accountability.
    For instance, if you are working in a regulated industry such as healthcare or
    finance, it is essential to demonstrate that the data used to train a model meets
    certain standards and has not been altered without proper tracking. In collaborative
    projects, being able to share your dataset logs also facilitates more efficient
    collaboration and sharing of results. By logging datasets with tools like MLflow,
    you ensure that your experiments are transparent, reproducible, and robust, helping
    build trust in your machine learning outcomes.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 记录数据集对于可重复性和问责制至关重要。例如，如果你在医疗保健或金融等受监管的行业工作，证明用于训练模型的数据符合某些标准且未经适当跟踪未进行更改是至关重要的。在协作项目中，能够共享你的数据集日志也有助于更高效的协作和结果共享。通过使用
    MLflow 等工具记录数据集，你确保你的实验是透明的、可重复的且稳健的，有助于建立对你机器学习成果的信任。
- en: In summary, datasets are the heart of machine learning, and logging them is
    fundamental to tracking, reproducibility, and transparency within any MLOps workflow.
    MLflow’s `mlflow.data` module provides the tools necessary to ensure that every
    step of the data journey is captured, logged, and retrievable for future use,
    ensuring consistency and improving the overall reliability of machine learning
    experiments.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，数据集是机器学习的心脏，记录它们对于任何 MLOps 工作流程中的跟踪、可重复性和透明度至关重要。MLflow 的 `mlflow.data`
    模块提供了确保数据旅程的每一步都被捕获、记录并可检索以供未来使用的工具，确保一致性并提高机器学习实验的整体可靠性。
- en: Here is [the Github repo](https://github.com/yunglinchang/mlflow-examples) for
    all the codes in the article!
  id: totrans-114
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这是文章中所有代码的 [Github 仓库](https://github.com/yunglinchang/mlflow-examples)！
- en: '![Photo by Jordan Cormack on Unsplash](../Images/10a28cb3cce14cc192b2141ce804a16f.png)'
  id: totrans-115
  prefs: []
  type: TYPE_IMG
  zh: '![由 Jordan Cormack 在 Unsplash 上拍摄的照片](../Images/10a28cb3cce14cc192b2141ce804a16f.png)'
- en: Photo by [Jordan Cormack](https://unsplash.com/@jordancormack?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 由 [Jordan Cormack](https://unsplash.com/@jordancormack?utm_source=medium&utm_medium=referral)
    在 [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral) 拍摄的照片
- en: Recap and Takeaways
  id: totrans-117
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 概括和要点
- en: '**Logging datasets with `mlflow.log_input()` API**: This is used for logging
    your training data, ensuring that all relevant metadata is captured for traceability
    and reproducibility within your experiments.'
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**使用 `mlflow.log_input()` API 记录数据集**：这用于记录你的训练数据，确保在实验中捕获所有相关元数据，以便进行可追溯性和可重复性。'
- en: '**Logging datasets when evaluating with `mlflow.evaluate()` API**: This is
    used for evaluating your models and automatically logs key performance metrics,
    helping you track the effectiveness of your model during evaluation.'
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**使用 `mlflow.evaluate()` API 评估时记录数据集**：这用于评估你的模型，并自动记录关键性能指标，帮助你跟踪模型在评估期间的有效性。'
