- en: Dataset and DatasetSource
  id: totrans-29
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Dataset和DatasetSource
- en: '`mlflow.data.dataset.Dataset`'
  id: totrans-30
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '`mlflow.data.dataset.Dataset`'
- en: Before diving into dataset logging, evaluation, and retrieval, it’s important
    to understand the concept of datasets in MLflow. MLflow provides the `mlflow.data.dataset.Dataset`
    object, which represents datasets used in with MLflow Tracking.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 在深入数据集记录、评估和检索之前，了解MLflow中数据集的概念非常重要。MLflow提供了`mlflow.data.dataset.Dataset`对象，它表示在MLflow
    Tracking中使用的数据集。
- en: '[PRE2]'
  id: totrans-32
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'This object comes with key properties:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 此对象包含以下关键属性：
- en: A required parameter, **source** (the data source of your dataset as `mlflow.data.dataset_source.DatasetSource`
    object)
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个必需的参数，**source**（数据集的数据源，作为`mlflow.data.dataset_source.DatasetSource`对象）
- en: '**digest** (fingerprint for your dataset) and **name** (name for your dataset),
    which can be set via parameters.'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**digest**（数据集的指纹）和**name**（数据集的名称），这些可以通过参数设置。'
- en: '**schema** and **profile** to describe the dataset’s structure and statistical
    properties.'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**schema**和**profile**用于描述数据集的结构和统计属性。'
- en: Information about the dataset’s **source**, such as its storage location.
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 关于数据集的**来源**信息，例如其存储位置。
- en: You can easily convert the dataset into a dictionary using `to_dict()` or a
    JSON string using `to_json()`.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以使用`to_dict()`轻松将数据集转换为字典，或使用`to_json()`转换为JSON字符串。
- en: Support for Popular Dataset Formats
  id: totrans-39
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 支持流行的数据集格式
- en: 'MLflow makes it easy to work with various types of datasets through specialized
    classes that extend the core `mlflow.data.dataset.Dataset`. At the time of writing
    this article, here are some of the notable dataset classes supported by MLflow:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: MLflow通过扩展核心`mlflow.data.dataset.Dataset`类的专用类，使得处理各种类型的数据集变得简单。在撰写本文时，以下是MLflow支持的一些显著的dataset类：
- en: '**pandas**: `mlflow.data.pandas_dataset.PandasDataset`'
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**pandas**: `mlflow.data.pandas_dataset.PandasDataset`'
- en: '**NumPy**: `mlflow.data.numpy_dataset.NumpyDataset`'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**NumPy**: `mlflow.data.numpy_dataset.NumpyDataset`'
- en: '**Spark**: `mlflow.data.spark_dataset.SparkDataset`'
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Spark**: `mlflow.data.spark_dataset.SparkDataset`'
- en: '**Hugging Face**: `mlflow.data.huggingface_dataset.HuggingFaceDataset`'
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Hugging Face**: `mlflow.data.huggingface_dataset.HuggingFaceDataset`'
- en: '**TensorFlow**: `mlflow.data.tensorflow_dataset.TensorFlowDataset`'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**TensorFlow**: `mlflow.data.tensorflow_dataset.TensorFlowDataset`'
- en: '**Evaluation Datasets**: `mlflow.data.evaluation_dataset.EvaluationDataset`'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**评估数据集**: `mlflow.data.evaluation_dataset.EvaluationDataset`'
- en: All these classes come with a convenient `mlflow.data.from_*` API for loading
    datasets directly into MLflow. This makes it easy to construct and manage datasets,
    regardless of their underlying format.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些类都提供了方便的`mlflow.data.from_*` API，可以直接将数据集加载到MLflow中。这使得无论数据集的底层格式如何，都可以轻松构建和管理数据集。
- en: mlflow.data.dataset_source.DatasetSource
  id: totrans-48
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: mlflow.data.dataset_source.DatasetSource
- en: The `mlflow.data.dataset.DatasetSource` class is used to represent the origin
    of the dataset in MLflow. When creating a `mlflow.data.dataset.Dataset` object,
    the `source` parameter can be specified either as a string (e.g., a file path
    or URL) or as an instance of the `mlflow.data.dataset.DatasetSource` class.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: '`mlflow.data.dataset.DatasetSource`类用于在MLflow中表示数据集的来源。在创建`mlflow.data.dataset.Dataset`对象时，`source`参数可以是字符串（例如，文件路径或URL）或`mlflow.data.dataset.DatasetSource`类的实例。'
- en: '[PRE3]'
  id: totrans-50
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: If a string is provided as the `source`, MLflow internally calls the `resolve_dataset_source`
    function. This function iterates through a predefined list of data sources and
    `DatasetSource` classes to determine the most appropriate source type. However,
    MLflow’s ability to accurately resolve the dataset’s source is limited, especially
    when the `candidate_sources` argument (a list of potential sources) is set to
    `None`, which is the default.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 如果提供了字符串作为`source`，MLflow会内部调用`resolve_dataset_source`函数。此函数遍历预定义的数据源和`DatasetSource`类列表，以确定最合适的来源类型。然而，MLflow准确解析数据集来源的能力有限，尤其是在将`candidate_sources`参数（潜在来源列表）设置为`None`时，这是默认值。
- en: In cases where the `DatasetSource` class cannot resolve the raw source, an MLflow
    exception is raised. **For best practices, I recommend explicitly create and use
    an instance of the `mlflow.data.dataset.DatasetSource` class when defining the
    dataset’s origin.**
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 在`DatasetSource`类无法解析原始来源的情况下，MLflow会抛出一个异常。**为了最佳实践，我建议在定义数据集的来源时，明确创建并使用`mlflow.data.dataset.DatasetSource`类的实例。**
- en: class **HTTPDatasetSource**(DatasetSource)
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: class **HTTPDatasetSource**(DatasetSource)
- en: class **DeltaDatasetSource**(DatasetSource)
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: class **DeltaDatasetSource**(DatasetSource)
- en: class **FileSystemDatasetSource**(DatasetSource)
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: class **FileSystemDatasetSource**(DatasetSource)
- en: class **HuggingFaceDatasetSource**(DatasetSource)
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: class **HuggingFaceDatasetSource**(DatasetSource)
- en: class **SparkDatasetSource**(DatasetSource)
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: class **SparkDatasetSource**(DatasetSource)
