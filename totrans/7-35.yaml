- en: Preface
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 前言
- en: '**Data is one of the most critical components of the machine learning process.**
    In fact, the quality of the data used in training a model often determines the
    success or failure of the entire project. While algorithms and models are important,
    they are powerless without data that is accurate, clean, and representative of
    the problem you’re trying to solve. Whether you are dealing with structured data,
    unstructured data, or large-scale datasets, the preparation and understanding
    of data lay the foundation for any machine learning system. A well-curated dataset
    can provide the necessary signals for a model to learn effectively, while poor
    or biased data can lead to incorrect predictions, overfitting, or even harmful
    societal impacts when models are deployed in real-world applications.'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: '**数据是机器学习过程中最关键的组成部分之一**。实际上，用于训练模型的数据质量往往决定了整个项目的成功或失败。虽然算法和模型很重要，但没有准确、干净且能代表你要解决的问题的数据，它们就无能为力。无论你处理的是结构化数据、非结构化数据还是大规模数据集，数据的准备和理解都是任何机器学习系统的基础。一个精心整理的数据集可以为模型提供必要的信号，使其能够有效地学习，而质量差或存在偏见的数据可能导致预测错误、过拟合，甚至在模型应用于现实世界应用时产生有害的社会影响。'
- en: With the increasing complexity of machine learning workflows, ensuring the reproducibility
    and traceability of experiments has become a key concern. This is where **MLOps**
    (Machine Learning Operations) comes into play. MLOps is the practice of bringing
    together data science and operations to automate and streamline machine learning
    workflows. **One critical aspect of MLOps is the tracking of datasets throughout
    the entire lifecycle of a machine learning project.** Tracking is not just about
    capturing the parameters and metrics of models; it’s equally important to log
    the datasets used during each phase of the process. This ensures that, down the
    line, when models are re-evaluated or retrained, the same datasets can be referenced,
    tested, or reused. It allows for better comparison of results, understanding of
    changes, and most importantly, ensuring that the results are reproducible by others.
    **As a best practice for modern ML systems, I recommend that all ML practitioners
    worldwide log their data during training.**
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 随着机器学习工作流程的日益复杂，确保实验的可重复性和可追溯性已成为一个关键问题。这正是**MLOps（机器学习运维）**发挥作用的地方。MLOps是将数据科学和运维结合起来的实践，以自动化和简化机器学习工作流程。**MLOps的一个关键方面是跟踪机器学习项目的整个生命周期中的数据集**。跟踪不仅仅是捕捉模型的参数和指标；在过程的每个阶段记录使用的数据集同样重要。这确保了在将来，当模型被重新评估或重新训练时，可以引用、测试或重用相同的数据集。它允许更好地比较结果、理解变化，最重要的是，确保结果可以被他人重复。
- en: Data Yesterday vs. Data Today?
  id: totrans-8
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**作为现代机器学习系统的最佳实践，我建议全球所有机器学习从业者记录训练过程中的数据**。'
- en: In this context, **MLflow** plays a pivotal role by offering a suite of tools
    that help streamline these MLOps practices. **One of the key components of MLflow
    is its `mlflow.data` module, which provides the ability to log datasets as part
    of machine learning experiments.** The `mlflow.data` module ensures that datasets
    are properly documented, their metadata is tracked, and they can be retrieved
    and reused in future runs. This helps prevent common problems like "data drift"
    where models start to perform worse because of subtle changes in the underlying
    data. MLflow’s ability to track datasets alongside models and parameters ensures
    that any new experiment can reliably compare results against previous runs using
    the exact same data, providing transparency and clarity.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个背景下，**MLflow** 通过提供一系列工具来帮助简化这些 MLOps 实践，发挥着关键作用。**MLflow 的一个关键组件是其 `mlflow.data`
    模块，它提供了将数据集作为机器学习实验的一部分进行记录的能力。** `mlflow.data` 模块确保数据集得到适当的文档记录，其元数据得到跟踪，并且可以在未来的运行中检索和重用。这有助于防止常见问题，如“数据漂移”，即模型由于底层数据的微妙变化而开始表现不佳。MLflow
    能够跟踪数据集、模型和参数，确保任何新的实验都可以可靠地使用确切相同的数据与之前的运行进行比较，从而提供透明度和清晰度。
- en: '![Photo by Brian McGowan on Unsplash](../Images/6401afd0679cedd84bf9d4f7689f2fd2.png)'
  id: totrans-10
  prefs: []
  type: TYPE_IMG
  zh: '![由 Brian McGowan 在 Unsplash 上拍摄的照片](../Images/6401afd0679cedd84bf9d4f7689f2fd2.png)'
