- en: The Best AI Books & Courses for Getting a Job
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/best-ai-books-courses-to-get-a-job/](https://towardsdatascience.com/best-ai-books-courses-to-get-a-job/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1748301232360" class="mdspan-comment">After working</mdspan>
    in AI and machine learning for four years, I want to share all the resources that
    helped me on my journey.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: 'As there are quite a few, I am going to break them down into the following
    categories:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: Programming and software engineering
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Maths and statistics
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Machine learning
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Deep learning and LLMs
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: AI engineering
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Programming and software engineering
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: If you want to work in AI, you must learn to program and have good software
    engineering skills.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: As the field is relatively new, the de facto languages for AI are still up in
    the air. However, Python is your best bet to learn because of its ease of use
    and AI infrastructure.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: AI jobs have mainly been spun up from machine learning, where the lingua franca
    is Python, and this is not changing anytime soon.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
- en: However, the most popular AI role, AI engineer, is closer to software engineering
    than machine learning engineering, so you may need to learn other backend languages
    like [**Java**](https://www.java.com/en/), [**GO**](https://go.dev/) or [**Rust**](https://www.rust-lang.org/).
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: I recommend starting with Python as it’s much easier and lets you understand
    the key software engineering fundamentals, but you may have to pivot languages
    in the future.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: Although there are many courses and books, the best teacher is consistent practice.
    While resources will help you start your journey, creating and building is how
    you will really learn Python and, in fact, any language.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: 'My main recommendations for Python and software engineering fundamentals are:'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: '[**Learn Python — Full Course for Beginners**](https://www.youtube.com/watch?v=rfscVS0vtbw&t=2907s)** — **The
    first course I took on Python at the start of my journey. It’s only 4 hours long,
    so you can do it in half a day.'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**Python for Everybody Specialization **](https://www.coursera.org/specializations/python)**— **This
    isprobably the most recommended course out there, and for good reason. If you
    are after an end-to-end course to learn Python, then this is it. Any reputable
    “Intro to Python” course will suffice, though.'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**Hacker Rank**](https://www.hackerrank.com/) **&** [**Leetcode**](https://leetcode.com/)** — **I
    used this when prepping for Python coding interviews.'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**NeetCode**](https://neetcode.io/) — I used this resource to learn about
    data structures, algorithms, and system design. It’s an excellent platform for
    learning all the basic and advanced topics with hands-on exercises and delivers
    great interview preparation.'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**Harvard CS50 Introduction to Computer Science**](https://pll.harvard.edu/course/cs50-introduction-computer-science)** — **If
    you have been anywhere in the online tech space, you would have heard of this
    course. It’s probably the best intro to computer science and software engineering
    course! Highly recommend it to a complete beginner and, in fact, anyone.'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[**哈佛CS50计算机科学导论**](https://pll.harvard.edu/course/cs50-introduction-computer-science)** ——**如果你在在线技术领域有任何了解，你肯定听说过这门课程。这可能是最好的计算机科学和软件工程入门课程！强烈推荐给完全的初学者，实际上，任何人都可以。'
- en: Maths and statistics
  id: totrans-22
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数学与统计学
- en: Even though you may argue that you don’t need to know the maths, as most AI
    jobs are mainly about implementing foundational models, if you want to be a top
    AI practitioner, you should know at least how these models work under the hood.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管你可能认为不需要了解数学，因为大多数人工智能工作主要是关于实现基础模型，但如果你想成为一名顶级的人工智能实践者，你应该至少了解这些模型在底层是如何工作的。
- en: The following resources are all you need to learn the required maths; I don’t
    think you need to look elsewhere.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 以下资源就是你需要学习所需数学的全部内容；我认为你不需要在其他地方寻找。
- en: '[**Practical Statistics for Data Science**](https://amzn.to/4l1lFFU) **(affiliate
    link)—** This would be it if you could get only one book to learn statistics.
    The main draw is that it provides statistics knowledge specifically for AI/ML
    practitioners, with hands-on examples in Python.'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[**《数据科学实用统计学**](https://amzn.to/4l1lFFU)**（联盟链接）**—— 如果你能只读一本书来学习统计学，这本书就是它了。它的主要吸引力在于它提供了专门针对人工智能/机器学习实践者的统计学知识，并包含Python的实际操作示例。'
- en: '[**Mathematics for Machine Learning**](https://amzn.to/4hxRCmb) **(affiliate
    link)—** This is a comprehensive book on the maths behind machine learning and
    AI, covering topics like calculus and linear algebra. It is pretty advanced, so
    I don’t recommend going through the whole thing end-to-end. Instead, use it to
    learn key concepts and as a reference text.'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[**《机器学习数学**](https://amzn.to/4hxRCmb)**（联盟链接）**—— 这是一本关于机器学习和人工智能背后数学的全面书籍，涵盖了微积分和线性代数等主题。它相当高级，因此我不建议从头到尾通读。相反，用它来学习关键概念，并作为参考文本。'
- en: '[**Mathematics for Machine Learning and Data Science Specialization**](https://www.deeplearning.ai/courses/mathematics-for-machine-learning-and-data-science-specialization/) — This
    is a newly released course by DeepLearning.AI, the makers of the famous Machine
    Learning and Deep Learning specialisations. It’s ideal for beginners and covers
    all the fundamental maths topics, such as calculus, linear algebra, statistics,
    and probability, relevant to AI and machine learning specifically.'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[**机器学习与数据科学数学专项**](https://www.deeplearning.ai/courses/mathematics-for-machine-learning-and-data-science-specialization/)** ——**这是DeepLearning.AI推出的新课程，DeepLearning.AI是著名的机器学习和深度学习专项的制作者。它非常适合初学者，涵盖了所有与人工智能和机器学习相关的数学基础主题，如微积分、线性代数、统计学和概率论。'
- en: Machine learning
  id: totrans-28
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 机器学习
- en: The majority of current AI actually refers to [**GenAI**](https://en.wikipedia.org/wiki/Generative_artificial_intelligence),
    a subsection of machine learning. As its name suggests, GenAI are algorithms that
    generate text, images, audio, and even code.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 当前的多数人工智能实际上指的是[**生成式人工智能（GenAI）**](https://en.wikipedia.org/wiki/Generative_artificial_intelligence)，它是机器学习的一个子集。正如其名所示，GenAI是生成文本、图像、音频甚至代码的算法。
- en: '![](../Images/c1b9a71e3eae5e00f2b6345d329a8bb1.png)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c1b9a71e3eae5e00f2b6345d329a8bb1.png)'
- en: Image by author.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供。
- en: However, AI has been around as a concept for a long time, dating back to the
    1950s, when the [**neural network originated**.](https://medium.com/gitconnected/intro-perceptron-architecture-neural-networks-101-2a487062810c?sk=a738fb46cf55825c3dd47f91b26ad5e7)
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，人工智能作为一个概念已经存在很长时间了，可以追溯到20世纪50年代，当时[**神经网络诞生**](https://medium.com/gitconnected/intro-perceptron-architecture-neural-networks-101-2a487062810c?sk=a738fb46cf55825c3dd47f91b26ad5e7)。
- en: It even predates that, with Alan Turing coining the “[**Turing Test**](https://en.wikipedia.org/wiki/Turing_test)”
    after his work on computers and thinking machines during the Second World War.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 它甚至更早，在第二次世界大战期间，艾伦·图灵在研究计算机和思维机器后提出了“[**图灵测试**](https://en.wikipedia.org/wiki/Turing_test)”。
- en: Anyway, my point is that AI is so much broader than most people think today,
    and you need a solid grounding in machine learning and traditional AI to be a
    great current day AI professional.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 无论如何，我的观点是，人工智能的范畴远比今天大多数人想象的要广泛得多，成为一名优秀的当代人工智能专业人士，你需要对机器学习和传统人工智能有扎实的理论基础。
- en: The following list will cover all your baseline machine learning knowledge;
    if you want to learn more advanced topics like [**time series forecasting**](https://www.youtube.com/playlist?list=PLKmQjl_R9bYd32uHImJxQSFZU5LPuXfQe),
    [**reinforcement learning**](https://www.youtube.com/playlist?list=PLqYmG7hTraZDM-OYHWgPebj2MfCFzFObQ),
    [**optimisation**](https://medium.com/@egorhowell/list/optimisation-algorithms-069bf9c6c8d5)
    or [**computer vision**](https://medium.com/@egorhowell/list/convolutional-neural-networks-c1c0c840a6f7),
    let me know, and I can recommend you some.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 以下列表将涵盖你所有的机器学习基础知识；如果你想学习更高级的主题，比如[**时间序列预测**](https://www.youtube.com/playlist?list=PLKmQjl_R9bYd32uHImJxQSFZU5LPuXfQe)、[**强化学习**](https://www.youtube.com/playlist?list=PLqYmG7hTraZDM-OYHWgPebj2MfCFzFObQ)、[**优化**](https://medium.com/@egorhowell/list/optimisation-algorithms-069bf9c6c8d5)或[**计算机视觉**](https://medium.com/@egorhowell/list/convolutional-neural-networks-c1c0c840a6f7)，请告诉我，我可以为你推荐一些。
- en: '[**Hands-On ML with Scikit-Learn, Keras, and TensorFlow**](https://amzn.to/4iJxGyh)
    **(affiliate link) —**If I could only give you one book to help you learn machine
    learning and AI, it would be this. It is fantastic, covers almost everything you
    need to know, and even touches upon LLMs, reinforcement learning and computer
    vision right at the end.'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[**《动手学机器学习：Scikit-Learn、Keras和TensorFlow》**](https://amzn.to/4iJxGyh) **(联盟链接) **— 如果只能给你一本书来帮助你学习机器学习和人工智能，那这本书就是了。它非常棒，涵盖了几乎所有你需要知道的内容，甚至在最后还涉及了LLMs、强化学习和计算机视觉。'
- en: '[**Machine Learning Specialization**](https://www.coursera.org/specializations/machine-learning-introduction) **— **The
    first course I took on machine learning back in 2020 and is probably the best
    course on machine learning in history. When I took it, it was in Octave, but it
    has since been revamped, is now in Python, and has more cutting-edge topics like
    recommender systems and reinforcement learning.'
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[**机器学习专业**](https://www.coursera.org/specializations/machine-learning-introduction) **—**这是我2020年学习的第一个机器学习课程，可能是历史上最好的机器学习课程。当时我使用的是Octave，但现在已经更新，现在是Python，并且包含了更多前沿的主题，如推荐系统和强化学习。'
- en: '[**The Hundred-Page ML Book**](https://amzn.to/4hGSHIA) **(affiliate link) **— All
    machine learning is summarised in 100 pages! Really nice reference text for looking
    up things quickly and getting a refresher. Covers the basics really well.'
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[**《百页机器学习书》**](https://amzn.to/4hGSHIA) **(联盟链接) **— 所有机器学习内容都总结在100页内！这是一本非常棒的快速查阅和复习资料。对基础知识讲解得非常到位。'
- en: '[**The Elements of Statistical Learning**](https://amzn.to/4iRRizR) **(affiliate
    link)** — Excellent for mastering machine learning fundamentals, basically statistical
    learning. This book will truly teach the essence of machine learning.'
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[**《统计学习基础》**](https://amzn.to/4iRRizR) **(联盟链接)** — 非常适合掌握机器学习基础知识，基本上是统计学习。这本书将真正教会你机器学习的精髓。'
- en: Deep Learning and LLMs
  id: totrans-40
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 深度学习与LLMs
- en: As I showed in the diagram above, [**deep learning**](https://en.wikipedia.org/wiki/Deep_learning)
    is a smaller category within the overall AI umbrella and a subsection of machine
    learning.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我在上面的图中所示，[**深度学习**](https://en.wikipedia.org/wiki/Deep_learning)是整体人工智能范畴下的一个较小类别，也是机器学习的一个子类别。
- en: Deep learning is where all these generative AI algorithms came from, so you
    will truly study how [**LLMs**](https://en.wikipedia.org/wiki/Large_language_model),
    [**diffusion**](https://en.wikipedia.org/wiki/Diffusion_model), [**transformers**](https://en.wikipedia.org/wiki/Transformer_%28deep_learning_architecture%29)
    and all the other foundational models work under the hood.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习是所有这些生成式人工智能算法的来源，所以你将真正学习到[**LLMs**](https://en.wikipedia.org/wiki/Large_language_model)、[**扩散模型**](https://en.wikipedia.org/wiki/Diffusion_model)、[**Transformer**](https://en.wikipedia.org/wiki/Transformer_%28deep_learning_architecture%29)以及其他所有基础模型在底层是如何工作的。
- en: '[**PyTorch Tutorials**](https://www.youtube.com/playlist?list=PLhhyoLH6IjfxeoooqP9rhU3HJIAVAJ3Vz) — You
    would need to learn a deep learning framework, and there are two libraries leading
    the industry: [**PyTorch**](https://pytorch.org/) and [**TensorFlow**](https://www.tensorflow.org/).
    I would focus on learning PyTorch as it is becoming increasingly popular compared
    to TensorFlow. PyTorch was used in about [~77% of research papers in 2021](https://www.assemblyai.com/blog/pytorch-vs-tensorflow-in-2023),
    and [~92% of models are PyTorch exclusive on HuggingFace](https://www.assemblyai.com/blog/pytorch-vs-tensorflow-in-2023).'
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[**PyTorch教程**](https://www.youtube.com/playlist?list=PLhhyoLH6IjfxeoooqP9rhU3HJIAVAJ3Vz)
    — 你需要学习一个深度学习框架，目前行业领先的两个库是[**PyTorch**](https://pytorch.org/)和[**TensorFlow**](https://www.tensorflow.org/)。我建议专注于学习PyTorch，因为它相对于TensorFlow越来越受欢迎。PyTorch在2021年的研究论文中大约被使用了[~77%](https://www.assemblyai.com/blog/pytorch-vs-tensorflow-in-2023)，在HuggingFace上大约[~92%](https://www.assemblyai.com/blog/pytorch-vs-tensorflow-in-2023)的模型是PyTorch专属的。'
- en: '[**Deep Learning Specialization**](https://www.deeplearning.ai/courses/deep-learning-specialization/)** — **Follow-up
    to the machine learning specialisation course. It’s a great course for learning
    [**Convolutional Neueral Networks**](https://en.wikipedia.org/wiki/Convolutional_neural_network)
    and [**Recurrent Neural Networks**](https://en.wikipedia.org/wiki/Recurrent_neural_network)
    and an intro to LLMs. Probably the best deep learning course out there!'
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[**深度学习专业课程**](https://www.deeplearning.ai/courses/deep-learning-specialization/)**
    —** 机器学习专业课程的后续课程。这是一门学习[**卷积神经网络**](https://en.wikipedia.org/wiki/Convolutional_neural_network)和[**循环神经网络**](https://en.wikipedia.org/wiki/Recurrent_neural_network)以及LLMs入门的绝佳课程。可能是最好的深度学习课程！'
- en: '[**Introduction to LLMs**](https://www.youtube.com/watch?v=zjkBMFhNj_g&t=3065s)
    **by Andrej Karpathy (former senior director of AI at Tesla) —**An hour intro
    video to LLMs and how they are used. I recommend this to anyone, even if they
    don’t plan on studying AI. It is very high level and not technical at all.'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[**LLMs简介**](https://www.youtube.com/watch?v=zjkBMFhNj_g&t=3065s) **由安德烈·卡帕西（前特斯拉AI高级总监）主讲**
    — 一小时介绍视频，介绍LLMs及其应用。我推荐给每个人，即使他们不打算学习AI。这个视频非常高屋建瓴，完全不涉及技术。'
- en: '[**Neural Networks: Zero to Hero**](https://www.youtube.com/playlist?list=PLAqhIrjkxbuWI23v9cThsA9GvCAUhRvKZ)
    **(also by Andrej Karpathy) —**Starts relatively slow, building a neural network
    from scratch. However, in the last video, he gets you building your own Generative
    Pre-trained Transformers (GPT)! A must tutorial for anyone serious about working
    as an AI practioner.'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[**神经网络：从零到精通**](https://www.youtube.com/playlist?list=PLAqhIrjkxbuWI23v9cThsA9GvCAUhRvKZ)
    **（也是由安德烈·卡帕西主讲）** — 从零开始构建神经网络。然而，在最后一集视频中，他教你构建自己的生成预训练Transformer（GPT）！对于任何认真想要成为AI从业者的人来说，这是一个必看的教程。'
- en: '[**Hands-On Large Language Models: Language Understanding and Generation**](https://amzn.to/3SfakVB)
    **(affiliate link) —**There aren’t many textbooks on LLMs, as they have only gone
    mainstream in recent years. However, I have heard great things about this one.
    It was co-written by Jay Alammar, who wrote probably the [best blog post explaining
    transformers ever](https://jalammar.github.io/illustrated-transformer/) and is
    endorsed by Andrew Ng.'
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[**动手学习大型语言模型：语言理解和生成**](https://amzn.to/3SfakVB) **(推广链接) —** 关于LLMs的教科书并不多，因为它们只是近年来才变得主流。然而，我听说这本书非常好。它是由Jay
    Alammar合著的，他可能写了有史以来最好的解释transformers的博客文章（https://jalammar.github.io/illustrated-transformer/），并且得到了Andrew
    Ng的推荐。'
- en: AI Engineering
  id: totrans-48
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: AI工程
- en: At this point, you will thoroughly understand the AI landscape, particularly
    LLMs and GenAI models, both hands-on and theoretically.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 到这个时候，你将彻底了解AI领域，特别是LLMs和GenAI模型，既有实践经验也有理论知识。
- en: The real value comes from creating products from your AI models and knowledge.
    Therefore, you need to learn how to productionise and deploy these algorithms
    so they can benefit customers and businesses.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 真正的价值来自于从你的AI模型和知识中创建产品。因此，你需要学习如何将这些算法投入生产和部署，以便它们能够惠及客户和企业。
- en: Most AI jobs are so-called AI engineers, and it’s closer to traditional software
    engineering than machine learning engineer jobs.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数AI工作被称为AI工程师，这比机器学习工程师的工作更接近传统软件工程。
- en: It’s mostly about using foundational GenAI models like [**LLama**](https://www.llama.com/),
    [**GPT-4**](https://openai.com/index/gpt-4/), and [**Claude**](https://claude.ai/)
    and building products around them. You rarely do actual model development, mainly
    because training these models is expensive, and the current foundational models
    are so good!
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 主要关于使用基础GenAI模型，如[**LLama**](https://www.llama.com/)、[**GPT-4**](https://openai.com/index/gpt-4/)和[**Claude**](https://claude.ai/)，并围绕它们构建产品。你很少进行实际模型开发，主要是因为训练这些模型成本高昂，而当前的基础模型已经非常出色！
- en: '[**Practical MLOps**](https://amzn.to/413ztXe) **(affiliate link)** — This
    is probably the only book you need to understand how to deploy your machine-learning
    and AI models. I use it more as a reference text, but it teaches almost everything
    you need to know, like containerisation, shell scripting, cloud systems and model
    monitoring.'
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[**实用MLOps**](https://amzn.to/413ztXe) **(联盟链接)** — 这可能是你理解如何部署你的机器学习和AI模型所需的唯一一本书。我更多地将其用作参考文本，但它几乎教授了你需要知道的一切，比如容器化、shell脚本、云系统和模型监控。'
- en: '[**AI Engineering**](https://amzn.to/43umFKL) **(affiliate link) — **This book
    is very popular at the moment. It’s written by [**Chip Huyen**](https://huyenchip.com/),
    who is arguably the leading expert behind ML/AI systems in production. She even
    taught [a course on it at Stanford](https://stanford-cs329s.github.io/)! Therefore,
    you are in good hands by using this book.'
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[**AI工程**](https://amzn.to/43umFKL) **(联盟链接) —** 这本书目前非常受欢迎。它是由[**奇普·黄**](https://huyenchip.com/)撰写的，她可以说是生产中ML/AI系统的领先专家。她甚至在斯坦福大学开设了[相关课程](https://stanford-cs329s.github.io/)！因此，使用这本书你将处于良好的状态。'
- en: '* * *'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: There are tons of resources; the main point is to not overcomplicate and start.
    They all teach the same things roughly, so you won’t go wrong no matter what course
    or book you use.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 资源非常多；主要的一点是不要过于复杂化并开始。它们大致上教授相同的内容，所以无论你使用什么课程或书籍都不会出错。
