- en: 'Robotics with Python: Q-Learning vs Actor-Critic vs Evolutionary Algorithms'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用Python进行机器人学：Q-Learning vs Actor-Critic vs 进化算法
- en: 原文：[https://towardsdatascience.com/reinforcement-learning-for-robotics-complete-tutorial/](https://towardsdatascience.com/reinforcement-learning-for-robotics-complete-tutorial/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/reinforcement-learning-for-robotics-complete-tutorial/](https://towardsdatascience.com/reinforcement-learning-for-robotics-complete-tutorial/)
- en: <mdspan datatext="el1762998038078" class="mdspan-comment">Intro</mdspan>
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1762998038078" class="mdspan-comment">简介</mdspan>
- en: 'There are four types of Machine Learning:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 有四种类型的机器学习：
- en: '**Supervised **— when all the observations in the dataset are labeled with
    a target variable, and you can perform [regression](https://en.wikipedia.org/wiki/Regression_analysis)/[classification](https://en.wikipedia.org/wiki/Statistical_classification)
    to learn how to predict them.'
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**监督学习**—当数据集中的所有观测值都带有目标变量时，你可以执行[回归](https://en.wikipedia.org/wiki/Regression_analysis)/[分类](https://en.wikipedia.org/wiki/Statistical_classification)来学习如何预测它们。'
- en: '**Unsupervised** — when there is no target variable, so you can perform [clustering](https://en.wikipedia.org/wiki/Cluster_analysis)
    to segment and group the data.'
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**无监督学习**—当没有目标变量时，因此你可以执行[聚类](https://en.wikipedia.org/wiki/Cluster_analysis)来分割和分组数据。'
- en: '**Semi-Supervised** — when the target variable is not complete, so the model
    has to learn how to predict unlabeled data as well. In this case, a mix of supervised
    and unsupervised models is used.'
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**半监督学习**—当目标变量不完整时，因此模型必须学习如何预测未标记的数据。在这种情况下，使用监督和无监督模型的组合。'
- en: '**Reinforcement** — when there is a reward instead of a target variable and
    you don’t know what the best solution is, so it’s more of a process of trial and
    error to reach a specific goal.'
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**强化学习**—当存在奖励而不是目标变量，并且你不知道最佳解决方案是什么时，因此它更多的是一个通过试错达到特定目标的过程。'
- en: More precisely, [**Reinforcement Learning**](https://en.wikipedia.org/wiki/Reinforcement_learning)
    studies how an AI takes action in an interactive environment in order to maximize
    the reward. During supervised training, you already know the correct answer (the
    target variable), and you are fitting a model to replicate it. On the contrary,
    in a RL problem you don’t know apriori what is the correct answer, the only way
    to find out is by taking action and getting the feedback (the reward), so the
    model learns by exploring and making mistakes.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 更确切地说，[**强化学习**](https://en.wikipedia.org/wiki/Reinforcement_learning)研究AI如何在交互式环境中采取行动以最大化奖励。在监督训练期间，你已经知道正确答案（目标变量），并且你正在调整模型以复制它。相反，在强化学习问题中，你事先不知道正确答案是什么，唯一的方法是通过采取行动并获得反馈（奖励）来找出答案，因此模型通过探索和犯错误来学习。
- en: 'RL is being widely used for **training robots**. A good example is the autonomous
    vacuum: when it passes on a dusty part of the floor, it receives a reward (+1),
    but gets punished (-1) when it bumps into the wall. So the robot learns what is
    the right action to do and what to avoid.'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 强化学习正在被广泛用于**训练机器人**。一个很好的例子是自主吸尘器：当它经过地板的灰尘部分时，它会收到奖励（+1），但碰到墙壁时会受到惩罚（-1）。因此，机器人学习正确的动作是什么以及要避免什么。
- en: In this article, I’m going to show how to **build custom 3D environments for
    training a robot using different Reinforcement Learning** **algorithms**. I will
    present some useful Python code that can be easily applied in other similar cases
    (just copy, paste, run) and walk through every line of code with comments so that
    you can replicate this example.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我将展示如何使用不同的强化学习**算法**为训练机器人构建自定义3D环境。我将提供一些可以轻松应用于其他类似情况的实用Python代码（只需复制、粘贴、运行），并逐行带注释地解释代码，以便你可以复制这个示例。
- en: Setup
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 设置
- en: 'While a supervised usecase requires a target variable and a training set, aRL
    problem needs:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然监督用例需要一个目标变量和训练集，但强化学习问题需要：
- en: '**Environment **— the surroundings of the agent, it assigns rewards for actions,
    and provides the new state as the result of the decision made. Basically, it’s
    the space the AI can interact with (in the autonomous vacuum example would be
    the room to clean).'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**环境**—智能体的周围环境，它为动作分配奖励，并提供作为决策结果的新状态。基本上，它是AI可以与之交互的空间（在自主吸尘器的例子中将是清洁的房间）。'
- en: '**Action **— the set of actions the AI can do in the environment. The action
    space can be “**discrete**” (when there are a set number of moves, like the game
    of chess) or “**continuous**” (infinite possible states, like driving a car and
    trading).'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**动作**—AI在环境中可以执行的动作集合。动作空间可以是“**离散的**”（当有固定数量的移动时，如棋类游戏）或“**连续的**”（无限可能的状态，如驾驶汽车和交易）。'
- en: '**Reward** —the consequence of the action (+1/-1).'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**奖励** — 行动的后果（+1/-1）。'
- en: '**Agent **— the AI learning what is the best course of action in the environment
    to maximize the reward.'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**智能体**— 学习在环境中采取最佳行动以最大化奖励的AI。'
- en: 'Regarding the environment, the most used 3D physics simulators are: [***PyBullet***](https://pybullet.org/wordpress/)(beginners) , [***Webots***](https://cyberbotics.com/)(intermediate), [***MuJoCo***](https://mujoco.org/)(advanced),
    and [***Gazebo***](https://gazebosim.org/home) (professionals). You can use any
    of them as standalone software or through ***[*Gym*](https://gymnasium.farama.org/index.html#)***,
    a library made by OpenAI for developingReinforcement Learning algorithms, built
    on top of different physics engines.'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 关于环境，最常用的3D物理模拟器有：[***PyBullet***](https://pybullet.org/wordpress/)(初学者) ，[***Webots***](https://cyberbotics.com/)(中级)，[***MuJoCo***](https://mujoco.org/)(高级），和[***Gazebo***](https://gazebosim.org/home)（专业人士）。你可以使用它们中的任何一个作为独立软件，或者通过***[*Gym*](https://gymnasium.farama.org/index.html#)***，这是一个由OpenAI制作的库，用于开发基于不同物理引擎的强化学习算法。
- en: I will use *Gym* (`pip install gymnasium`) to load one of the [default environments
    made with *MuJoCo*](https://gymnasium.farama.org/environments/mujoco/)(Multi-Joint
    dynamics with Contact, `pip install mujoco`).
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 我将使用 *Gym* (`pip install gymnasium`) 来加载一个用 *MuJoCo* 制作的[默认环境](https://gymnasium.farama.org/environments/mujoco/)(多关节动力学与接触，`pip
    install mujoco`)。
- en: '[PRE0]'
  id: totrans-19
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '![](../Images/97c43cf024f062332c323ed15f5d529e.png)![](../Images/833eb37fccd28f91ccdb66511407d4eb.png)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/97c43cf024f062332c323ed15f5d529e.png)![](../Images/833eb37fccd28f91ccdb66511407d4eb.png)'
- en: The **[robot Ant](https://gymnasium.farama.org/environments/mujoco/ant/)** is
    a 3D quadruped agent consisting of a torso and four legs attached to it. Each
    leg has two body parts, so in total it has **8 joints** (flexible body parts)
    and **9 links** (solid body parts). The goal of this environment is to apply force
    (push/pull) and torque (twist/turn) to move the robot in a certain direction.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: '**机器人Ant**([https://gymnasium.farama.org/environments/mujoco/ant/](https://gymnasium.farama.org/environments/mujoco/ant/))是一个由躯干和四个连接到它的腿组成的3D四足智能体。每条腿有两个身体部分，所以总共有**8个关节**（灵活的身体部分）和**9个连接**（坚固的身体部分）。这个环境的目标是施加力（推/拉）和扭矩（扭转/旋转）以使机器人向某个方向移动。'
- en: Let’s try the environment by running one single episode with the robot doing **random
    actions** (an episode is a complete run of the agent interacting with the environment,
    from start to termination).
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们通过让机器人执行一次随机的动作（一个场景是一个智能体与环境交互的完整运行，从开始到终止）来尝试这个环境。
- en: '[PRE1]'
  id: totrans-23
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '![](../Images/b4342b51962645366bf1f819b0fb13f2.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/b4342b51962645366bf1f819b0fb13f2.png)'
- en: Custom Environment
  id: totrans-25
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 自定义环境
- en: 'Usually, environments have the [same properties](https://gymnasium.farama.org/introduction/create_custom_env/):'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，环境具有[相同的属性](https://gymnasium.farama.org/introduction/create_custom_env/)：
- en: '**Reset **— to restart to an initial state or to a random point within the
    data.'
  id: totrans-27
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**重置** — 重新启动到初始状态或数据中的随机点。'
- en: '**Render **— to visualize what’s happening.'
  id: totrans-28
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**渲染** — 可视化正在发生的事情。'
- en: '**Step **— to execute the action chosen by the agent and change state.'
  id: totrans-29
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**步骤** — 执行智能体选择的动作并改变状态。'
- en: '**Calculate Reward** — to give the appropriate reward/penalties after an action.'
  id: totrans-30
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**计算奖励** — 在执行动作后给予适当的奖励/惩罚。'
- en: '**Get Info **— to collect information about the game after an action.'
  id: totrans-31
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**获取信息** — 在执行动作后收集有关游戏的信息。'
- en: '**Terminated or Truncated**  — to decide whether the episode is finished after
    an action (fail or success).'
  id: totrans-32
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**终止或截断**  — 在执行一个动作后决定场景是否结束（失败或成功）。'
- en: Having default environments loaded in *Gym* is convenient, but it’s not always
    what you need. Sometimes you have to build a custom environment that meets your
    project requirements. This is the most delicate step for a Reinforcement Learning
    usecase. The quality of the model strongly depends on how well the environment
    is designed.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 在 *Gym* 中加载默认环境很方便，但并不总是你所需要的。有时你必须构建一个符合你项目要求的自定义环境。这是强化学习用例中最微妙的步骤。模型的质量很大程度上取决于环境设计的好坏。
- en: 'There are several ways to make your own environment:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 有几种方法可以创建自己的环境：
- en: '**Create from scratch**: you design everything (i.e. the physics, the body,
    the surroundings). You have total control but it’s the most complicated way since
    you start with an empty world.'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**从头开始创建**：你设计一切（即物理、身体、环境）。你拥有完全的控制权，但这是最复杂的方式，因为你从一个空的世界开始。'
- en: '**Modify the existing XML file**: every simulated agent is designed by an [XML
    file](https://en.wikipedia.org/wiki/XML). You can edit the physical properties
    (i.e. make the robot taller or heavier) but the logic stays the same.'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**修改现有的XML文件**：每个模拟智能体都是由一个[XML文件](https://en.wikipedia.org/wiki/XML)设计的。你可以编辑物理属性（例如，使机器人更高或更重），但逻辑保持不变。'
- en: '**Modify the existing Python class**: keep the agent and the physics as they
    are, but change the rules of the game (i.e. new rewards and termination rules).
    One could even turn a continuous env into a discrete action space.'
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**修改现有的Python类**：保持智能体和物理属性不变，但改变游戏的规则（即新的奖励和终止规则）。甚至可以将连续环境转换为离散动作空间。'
- en: I’m going to **customize the default Ant environment to make the robot jump**.
    I shall change both the physical properties in the XML file and the reward function
    of the Python class. Basically, I just need to give the robot stronger legs and
    a reward for jumping.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 我将**自定义默认的蚂蚁环境，使机器人能够跳跃**。我需要更改XML文件中的物理属性和Python类的奖励函数。基本上，我只需要给机器人更强的腿部力量并给予跳跃的奖励。
- en: First of all, let’s **locate the XML file, make a copy, and edit it**.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们**定位XML文件，复制并编辑它**。
- en: '[PRE2]'
  id: totrans-40
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Since my objective is to have a more “jumpy” Ant, I can reduce the density of
    the body to make it lighter…
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我的目标是使蚂蚁更加“活泼”，我可以降低身体的密度使其更轻...
- en: '![](../Images/79adf21c597bfee1e9c2eed3a95bcc55.png)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/79adf21c597bfee1e9c2eed3a95bcc55.png)'
- en: …and add force to the legs so it can jump higher (the gravity in the simulator
    stays the same).
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: …并给腿部施加力量，使其能够跳得更高（模拟器中的重力保持不变）。
- en: '![](../Images/42d2327c3671b3229086332179447084.png)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/42d2327c3671b3229086332179447084.png)'
- en: You can find the [full edited XML file on my GitHub](https://github.com/mdipietro09/RoboticsPy/blob/main/assets/custom_ant.xml).
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在我的GitHub上找到[完整的编辑过的XML文件](https://github.com/mdipietro09/RoboticsPy/blob/main/assets/custom_ant.xml)。
- en: Then, I want to **modify the reward function** of the *Gym* environment. To
    create a custom env, you have to build a new class that overwrites the original
    one where it’s needed (in my case, how the reward is calculated). After the new
    env is [registered](https://gymnasium.farama.org/api/registry/), it can be used
    like any other *Gym* env.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我想**修改Gym环境的奖励函数**。要创建自定义环境，你必须构建一个新的类，该类覆盖了原始类中需要的地方（在我的情况下，即如何计算奖励）。在新的环境被[注册](https://gymnasium.farama.org/api/registry/)后，它可以像任何其他Gym环境一样使用。
- en: '[PRE3]'
  id: totrans-47
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '![](../Images/70ac26394591fa7361db77c52d4aa281.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/70ac26394591fa7361db77c52d4aa281.png)'
- en: 'If the 3D world and its rules are well designed, you just need a good RL model,
    and the robot will do anything to maximize the reward. There are two families
    of models that dominate the RL scene: Q-Learning models (best for discrete action
    spaces) and Actor-Critic models (best for continuous action spaces). Besides those,
    there are some newer and more experimental approaches emerging, like Evolutionary
    algorithms and Imitation learning.'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 如果3D世界及其规则设计得很好，你只需要一个好的RL模型，机器人就会为了最大化奖励而做任何事情。在RL领域占主导地位的有两种模型家族：Q学习模型（最适合离散动作空间）和Actor-Critic模型（最适合连续动作空间）。除此之外，还有一些新兴的、更实验性的方法，如进化算法和模仿学习。
- en: Q Learning
  id: totrans-50
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Q学习
- en: '[**Q-Learning**](https://en.wikipedia.org/wiki/Q-learning) is the most basic
    form of Reinforcement Learning and uses Q-values (the “Q” stands for “quality”)
    to represent how useful an action is in gaining some future reward. To put it
    in simple terms, if at the end of the game the agent gets a certain reward after
    a set of actions, the initial Q-value is the discounted future reward.'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: '[**Q学习**](https://en.wikipedia.org/wiki/Q-learning)是强化学习中最基本的形式，它使用Q值（“Q”代表“质量”）来表示某个动作在获得某些未来奖励时的有用性。简单来说，如果在游戏结束时，智能体在一系列动作后获得一定的奖励，那么初始Q值就是折现的未来奖励。'
- en: '![](../Images/12909e47b0bd5cd9003a746eec9e5155.png)'
  id: totrans-52
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/12909e47b0bd5cd9003a746eec9e5155.png)'
- en: As the agent explores and receives feedback, it updates the Q-values stored
    in the Q-matrix ([Bellman equation](https://en.wikipedia.org/wiki/Bellman_equation)).
    The goal of the agent is to learn the optimal Q-values for each state/action,
    so that it can make the best decisions and maximize the expected future reward
    for a specific action in a specific state.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 随着智能体探索并接收反馈，它会更新存储在Q矩阵（[贝尔曼方程](https://en.wikipedia.org/wiki/Bellman_equation)）中的Q值。智能体的目标是学习每个状态/动作的最优Q值，以便它能够做出最佳决策并最大化特定状态下特定动作的预期未来奖励。
- en: During the learning process, the agent uses an **exploration-exploitation**
    trade-off. Initially, it explores the environment by taking random actions, allowing
    it to gather experience (information about the rewards associated with different
    actions and states). As it learns and the level of exploration decays, it starts
    exploiting its knowledge by selecting the actions with the highest Q-values for
    each state.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 在学习过程中，智能体使用**探索-利用**权衡。最初，它通过采取随机动作来探索环境，从而积累经验（关于不同动作和状态相关奖励的信息）。随着学习的进行和探索水平的降低，它开始通过选择每个状态的最高Q值动作来利用其知识。
- en: 'Please note that the Q-matrix can be multidimensional and much more complicated.
    For instance, let’s think of a trading algorithm:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 请注意，Q矩阵可以是多维的，并且要复杂得多。例如，让我们考虑一个交易算法：
- en: '![](../Images/ea8febb1c0b2daebd5ffc492e4a08ff7.png)'
  id: totrans-56
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ea8febb1c0b2daebd5ffc492e4a08ff7.png)'
- en: In 2013, there was a breakthrough in the field of Reinforcement Learning when
    Google introduced **[Deep Q-Network (DQN)](https://arxiv.org/abs/1312.5602)**,
    designed to learn to play Atari games from raw pixels, combining the two concepts
    of Deep Learning and Q-Learning. To put it in simple terms, Deep Learning is used
    to approximate the Q-values instead of explicitly storing them in a table. This
    is done through a Neural Network trained to predict the Q-values for each possible
    action, using the current state of the environment as input.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 2013年，当谷歌推出了**[深度Q网络（DQN）](https://arxiv.org/abs/1312.5602)**，这是一个突破性的强化学习领域的进展，它旨在从原始像素中学习玩Atari游戏，结合了深度学习和Q学习的两个概念。简单来说，深度学习用于近似Q值，而不是在表中显式存储它们。这是通过一个训练有素的神经网络来完成的，该网络预测每个可能动作的Q值，并将环境的当前状态作为输入。
- en: '![](../Images/4fd297b8aac83a633fc7ff6ab2c3d554.png)'
  id: totrans-58
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/4fd297b8aac83a633fc7ff6ab2c3d554.png)'
- en: Q-Learning family was mainly designed for discrete environments, so it doesn’t
    really work on the robot Ant. An alternative solution would be to **discretize
    the environment** (even if it’s not the most efficient way to approach a continuous
    problem). We just have to create a wrapper for the Python class that expects a
    discrete action (i.e. “move forward”), and consequently applies force to the joints
    based on that command.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: Q-Learning家族主要设计用于离散环境，因此在机器人Ant上并不真正适用。一个替代方案是对**环境进行离散化**（即使这不是解决连续问题的最有效方法）。我们只需为期望离散动作（例如，“向前移动”）的Python类创建一个包装器，然后根据该命令对关节施加力。
- en: '[PRE4]'
  id: totrans-60
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: '![](../Images/10ee48d21d0eee9e1fd92d55a9e0bebc.png)'
  id: totrans-61
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/10ee48d21d0eee9e1fd92d55a9e0bebc.png)'
- en: Now this environment, with just 5 possible actions, will definitely work with
    DQN. In Python, the easiest way to use Deep RL algorithms is through **[StableBaseline](https://stable-baselines3.readthedocs.io/en/master/)**
    (`pip install stable-baselines3`), a collection of the most famous models, already
    pre-implemented and ready to go, all written in **[PyTorch](https://pytorch.org/get-started/locally/)**
    (`pip install torch`). Additionally, I find it very useful to look at the **training**
    progress on *[TensorBoard](https://docs.pytorch.org/tutorials/recipes/recipes/tensorboard_with_pytorch.html)*
    (`pip install tensorboard`). I created a folder named “logs”, and I can just run `tensorboard
    --logdir=logs/` on the terminal to serve the dashboard locally (`http://localhost:6006/`).
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 现在这个环境，只有5种可能动作，肯定可以使用DQN。在Python中，使用深度强化学习算法的最简单方法是通过**[StableBaseline](https://stable-baselines3.readthedocs.io/en/master/)**
    (`pip install stable-baselines3`），这是一个包含最著名模型的集合，已经预先实现并准备好使用，所有这些都是在**[PyTorch](https://pytorch.org/get-started/locally/)**
    (`pip install torch`)中编写的。此外，我发现查看**训练**进度在*[TensorBoard](https://docs.pytorch.org/tutorials/recipes/recipes/tensorboard_with_pytorch.html)*
    (`pip install tensorboard`)上非常有用。我创建了一个名为“logs”的文件夹，我可以在终端上运行`tensorboard --logdir=logs/`来在本地提供仪表板（`http://localhost:6006/`）。
- en: '[PRE5]'
  id: totrans-63
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: After the training is complete, we can load the new model and **test **it in
    the rendered environment. Now, the agent won’t be updating the preferred actions
    anymore. Instead, it will use the trained model to predict the next best action
    given the current state.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 训练完成后，我们可以加载新的模型并在渲染环境中**测试**它。现在，智能体将不再更新首选动作。相反，它将使用训练好的模型来预测给定当前状态的下一个最佳动作。
- en: '[PRE6]'
  id: totrans-65
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: '![](../Images/684e54572f6a000e1a8f6db813c7689a.png)'
  id: totrans-66
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/684e54572f6a000e1a8f6db813c7689a.png)'
- en: As you can see, the robot learned that the best policy is to jump, but the movements
    aren’t fluid because we didn’t use a model designed for continuous actions.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，机器人学会了最佳策略是跳跃，但由于我们没有使用为连续动作设计的模型，动作并不流畅。
- en: Actor Critic
  id: totrans-68
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 行为者-评论家
- en: 'In practice, the [**Actor-Critic**](https://en.wikipedia.org/wiki/Actor-critic_algorithm)
    algorithms are the most used as they are well suited for continuous environments.
    The basic idea is to have two systems working together: a policy function (“Actor”)
    for selecting actions, and a value function (“Critic”) to estimate the expected
    reward. The model learns how to adjust the decision making by comparing the actual
    rewards it receives with the predictions.'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 在实践中，[**演员-评论家**](https://en.wikipedia.org/wiki/Actor-critic_algorithm)算法是最常用的，因为它们非常适合连续环境。基本思想是让两个系统协同工作：一个策略函数（“演员”）用于选择动作，一个价值函数（“评论家”）用于估计期望奖励。模型通过比较它收到的实际奖励与预测来学习如何调整决策。
- en: 'The first stable Deep Learning algorithm was introduced by OpenAI in 2016:
    **[Advantage Actor-Critic (A2C)](https://arxiv.org/abs/1602.01783)**. It aims
    to minimize the loss between the actual reward received after the Actor takes
    action and the reward estimated by the Critic. The Neural Network is made of an
    input layer shared by both the Actor and the Critic, but they return two separate
    outputs: actions’ Q-values (just like DQN), and predicted reward (which is the
    addition of A2C).'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 第一款稳定的深度学习算法是由OpenAI在2016年引入的：**[优势演员-评论家（A2C）](https://arxiv.org/abs/1602.01783)**。它的目标是最小化演员采取行动后实际收到的奖励与评论家估计的奖励之间的损失。神经网络由演员和评论家共享的输入层组成，但它们返回两个不同的输出：动作的Q值（就像DQN一样），以及预测的奖励（这是A2C的加和）。
- en: '![](../Images/a3fc06f5f65f526d50a70046339fae9a.png)'
  id: totrans-71
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/a3fc06f5f65f526d50a70046339fae9a.png)'
- en: Over the years, the AC algorithms have been improving with more stable and efficient
    variants, like **[Proximal Policy Optimization (PPO)](https://en.wikipedia.org/wiki/Proximal_policy_optimization)**, and
    [**Soft Actor Critic (SAC)**](https://spinningup.openai.com/en/latest/algorithms/sac.html).
    The latter uses, not one, but two Critic networks to get a “second opinion”. Remember
    that we can use these models directly in the continuous environment.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 几年来，AC算法随着更多稳定和高效的变体（如**[近端策略优化（PPO）](https://en.wikipedia.org/wiki/Proximal_policy_optimization)**）和[**软演员评论家（SAC）**](https://spinningup.openai.com/en/latest/algorithms/sac.html)得到了改进。后者使用两个评论家网络来获得“第二意见”。记住，我们可以在连续环境中直接使用这些模型。
- en: '[PRE7]'
  id: totrans-73
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: The training of the SAC requires more time, but the results are much better.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: SAC的训练需要更多时间，但结果要好得多。
- en: '[PRE8]'
  id: totrans-75
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: '![](../Images/d2ed0fde1d23278080d13be2ce78bc7f.png)'
  id: totrans-76
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/d2ed0fde1d23278080d13be2ce78bc7f.png)'
- en: Given the popularity of Q-Learning and Actor-Critic, there have been more recent
    hybrid adaptations combining the two approaches. In this way, they also extend
    DQN to continuous action spaces. For example, **[Deep Deterministic Policy Gradient
    (DDPG)](https://arxiv.org/abs/1509.02971)** and **[Twin Delayed DDPG (TD3)](https://arxiv.org/pdf/1802.09477)**.
    But, beware that the more complex the model, the harder the training.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 由于Q学习和演员-评论家的流行，最近出现了更多结合两种方法的混合适应。这样，它们也将DQN扩展到连续动作空间。例如，**[深度确定性策略梯度（DDPG）](https://arxiv.org/abs/1509.02971)**和**[双延迟DDPG（TD3）](https://arxiv.org/pdf/1802.09477)**。但是，请注意，模型越复杂，训练越困难。
- en: Experimental Models
  id: totrans-78
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实验模型
- en: 'Besides the main families (Q and AC), you can find other models that are less
    used in practice, but no less interesting. In particular, they can be powerful
    alternatives for tasks where rewards are sparse and hard to design. For example:'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 除了主要家族（Q和AC）之外，你还可以找到一些在实践中使用较少但同样有趣的模型。特别是，它们可以作为奖励稀疏且难以设计的任务的强大替代品。例如：
- en: '**[Evolutionary Algorithms](https://en.wikipedia.org/wiki/Evolutionary_algorithm)**
    evolve the policies through mutation and selection instead of a gradient. Inspired
    by Darwin’s evolution, they are robust but computationally heavy.'
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**[进化算法](https://en.wikipedia.org/wiki/Evolutionary_algorithm)** 通过变异和选择而不是梯度来进化策略。受达尔文进化论的启发，它们很稳健，但计算量很大。'
- en: '**[Imitation Learning](https://en.wikipedia.org/wiki/Imitation_learning)**
    skips exploration and trains agents to mimic expert demonstrations. It’s based
    on the concept of “behavioral cloning”, blending supervised learning with RL ideas.'
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**[模仿学习](https://en.wikipedia.org/wiki/Imitation_learning)** 跳过探索，并训练智能体模仿专家演示。它基于“行为克隆”的概念，将监督学习与强化学习思想相结合。'
- en: For experimental purposes, let’s try the first one with *[EvoTorch](https://evotorch.ai/)*,
    an open-source toolkit for neuroevolution. I’m choosing this because it works
    well with *PyTorch* and *Gym* (`pip install evotorch`).
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 为了实验目的，让我们尝试第一个使用*[EvoTorch](https://evotorch.ai/)*，这是一个用于神经演化的开源工具包。我选择它是因为它与*PyTorch*和*Gym*配合得很好（`pip
    install evotorch`）。
- en: The best Evolutionary Algorithm for RL is **[Policy Gradients with Parameter
    Exploration (PGPE)](https://docs.evotorch.ai/latest/reference/evotorch/algorithms/functional/funcpgpe/#evotorch.algorithms.functional.funcpgpe.pgpe)**.
    Essentially, it doesn’t train one Neural Network directly, instead it builds a
    probability distribution (Gaussian) over all possible weights (μ=average set of
    weights, σ=exploration around the center). In every generation, PGPE samples from
    the weights population, starting with a random policy. Then, the model adjusts
    the mean and variance based on the reward (evolution of the population). PGPE
    is considered **Parallelized RL** because, unlike classic methods like Q and AC,
    which update one policy using batches of samples, PGPE samples many policy variations
    in parallel.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 最佳的强化学习进化算法是**[带有参数探索的政策梯度（PGPE）](https://docs.evotorch.ai/latest/reference/evotorch/algorithms/functional/funcpgpe/#evotorch.algorithms.functional.funcpgpe.pgpe)**。本质上，它不是直接训练一个神经网络，而是构建一个覆盖所有可能权重的概率分布（Gaussian）（μ=平均权重集合，σ=围绕中心的探索）。在每一代中，PGPE从权重种群中采样，从一个随机的策略开始。然后，模型根据奖励（种群进化）调整均值和方差。PGPE被认为是**并行化强化学习**，因为与经典方法如Q和AC不同，这些方法使用样本批次更新一个策略，而PGPE并行采样许多策略变体。
- en: Before running the training, we have to define the “problem”, which is the task
    to optimize (basically our environment).
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 在运行训练之前，我们必须定义“问题”，即要优化的任务（基本上是我们的环境）。
- en: '[PRE9]'
  id: totrans-85
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: '![](../Images/76046925bb18aaab5971de4e4e22234d.png)'
  id: totrans-86
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/76046925bb18aaab5971de4e4e22234d.png)'
- en: In order to test the model, we need another “problem” that renders the simulation.
    Then, we just extract the best-performing set of weights from the **distribution
    center** (that’s because during the training the Gaussian shifted toward better
    regions of policy space).
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 为了测试模型，我们需要另一个“问题”，即渲染模拟的问题。然后，我们只需从**分布中心**（那是因为在训练过程中，高斯分布向策略空间的更好区域移动）提取表现最佳的权重集合。
- en: '[PRE10]'
  id: totrans-88
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: '![](../Images/f175e177ca9312540788dd0d6649fcb0.png)'
  id: totrans-89
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/f175e177ca9312540788dd0d6649fcb0.png)'
- en: Conclusion
  id: totrans-90
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: This article has been a tutorial on **how to use Reinforcement Learning for
    Robotics**. I showed how to build 3D simulations with *Gym* and *MuJoCo*, how
    to customize an environment, and what RL algorithms are more suited for different
    usecases. New tutorials with more advanced robots will come.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 本文已经是一个关于**如何使用强化学习进行机器人技术**的教程。我展示了如何使用*Gym*和*MuJoCo*构建3D模拟，如何定制环境，以及哪些RL算法更适合不同的用例。将会有更多关于更高级机器人的新教程。
- en: Full code for this article: **[GitHub](https://github.com/mdipietro09/RoboticsPy)**
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 本文章的完整代码：**[GitHub](https://github.com/mdipietro09/RoboticsPy)**
- en: I hope you enjoyed it! Feel free to contact me for questions and feedback or
    just to share your interesting projects.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望您喜欢它！如有任何疑问和反馈，或只是想分享您有趣的项目，请随时联系我。
- en: 👉 [**Let’s Connect**](https://maurodp.carrd.co/) 👈
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 👉 [**让我们建立联系**](https://maurodp.carrd.co/) 👈
