- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Have you been hearing a lot of buzz around [Anthropic’s MCP](https://towardsdatascience.com/tag/mcp/) and
    other agent-focused protocols, but weren’t sure what they were — and whether they
    might be relevant for your projects?
  prefs: []
  type: TYPE_NORMAL
- en: 'You’re in the right place: in this week’s Variable, we present three accessible
    articles that will help you gain a deeper, hands-on understanding of this emerging
    cluster of tools.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Before we jump right in, a quick update for all our contributors: we’re thrilled
    to share that with [our just-announced Stripe integration](https://towardsdatascience.com/tds-authors-can-now-receive-payments-via-stripe/),
    payouts from the Author Payment Program are going to be a *lot* more streamlined
    going forward.'
  prefs: []
  type: TYPE_NORMAL
- en: How I Finally Understood MCP — and Got It Working in Real Life
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: For anyone taking their first steps with the model context protocol, Hailey
    Quach’s beginner-friendly guide is the perfect place to start. It covers all the
    basic concepts you need to know before zooming in on what you can actually accomplish
    with this versatile open standard for agent-centric workflows.
  prefs: []
  type: TYPE_NORMAL
- en: '[How I Finally Understood MCP — and Got It Working in Real Life](https://towardsdatascience.com/how-i-finally-understood-mcp-and-got-it-working-irl-2/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: How Not to Write an MCP Server
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Looking for helpful pointers? [Roni Dover](https://towardsdatascience.com/author/roni-dover/) shares
    several, based on the challenges he faced in his first MCP project.
  prefs: []
  type: TYPE_NORMAL
- en: '[How Not to Write an MCP Server](https://towardsdatascience.com/how-not-to-write-an-mcp-server/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'ACP: The Internet Protocol for AI Agents'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: MCP isn’t the only game in town — Sandi Besen introduces us to the new “HTTP
    of agent communication.”
  prefs: []
  type: TYPE_NORMAL
- en: '[ACP: The Internet Protocol for AI Agents](https://towardsdatascience.com/acp-the-internet-protocol-for-ai-agents/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Other Recommended Reads
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'If you feel like exploring a wider set of topics this week, we invite you to
    read these excellent articles on AI ethics and regulation, prompt engineering,
    and more:'
  prefs: []
  type: TYPE_NORMAL
- en: It’s increasingly crucial to understand the environmental impact of AI model
    training. [Ngoc Doan](https://towardsdatascience.com/author/ngoc-doan/)‘s analysis
    offers an [in-depth look at the limitations and potential upside](https://towardsdatascience.com/rethinking-environmental-costs-of-training-ai-why-we-should-look-beyond-hardware/) of
    hardware improvements.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Rethinking the Environmental Costs of Training AI — Why We Should Look Beyond
    Hardware](https://towardsdatascience.com/rethinking-environmental-costs-of-training-ai-why-we-should-look-beyond-hardware/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: What is missing from current AI regulations? [Dariusz Jemielniak](https://towardsdatascience.com/author/jemielniak/) argues
    that [it’s time for a fourth law of robotics](https://towardsdatascience.com/we-need-a-fourth-law-of-robotics-in-the-age-of-ai/),
    limiting AI systems’ ability to pretend to be human.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[We Need a Fourth Law of Robotics in the Age of AI](https://towardsdatascience.com/we-need-a-fourth-law-of-robotics-in-the-age-of-ai/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Children are very aware of AI’s growing footprint in our (and their) daily lives,
    but [how should adults talk to them](https://towardsdatascience.com/talking-to-kids-about-ai/) about
    it? [Stephanie Kirmer](https://towardsdatascience.com/author/s-kirmer/) shares
    concrete insights to help parents and educators.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Talking to Kids About AI](https://towardsdatascience.com/talking-to-kids-about-ai/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[Learn the ins and outs of regression discontinuity design](https://towardsdatascience.com/regression-discontinuity-design-how-it-works-and-when-to-use-it/) (RDD)
    — a patient deep dive by [Alejandro Alvarez Perez](https://towardsdatascience.com/author/alejandroalvarezprez/) explores
    how it works, how to run it, and how to get it right.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Regression Discontinuity Design: How It Works and When to Use It](https://towardsdatascience.com/regression-discontinuity-design-how-it-works-and-when-to-use-it/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: After introducing her GPT-powered fashion assistant in an earlier article, [Arielle
    Caron](https://towardsdatascience.com/author/ariellercaron/) shares the lessons
    she’s learned about [the challenges of effective prompting](https://towardsdatascience.com/what-my-gpt-stylist-taught-me-about-prompting-better-inside-the-strange-behavior-of-llms/).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[What My GPT Stylist Taught Me About Prompting Better](https://towardsdatascience.com/what-my-gpt-stylist-taught-me-about-prompting-better-inside-the-strange-behavior-of-llms/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
