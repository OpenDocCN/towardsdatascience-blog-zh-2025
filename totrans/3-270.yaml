- en: Introduction — Purpose and Reasons
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 简介 — 目的和原因
- en: 'Speed is important when dealing with large amounts of data. If you are handling
    data in a cloud data warehouse or similar, then the speed of execution for your
    data ingestion and processing affects the following:'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 处理大量数据时，速度很重要。如果你在云数据仓库或类似环境中处理数据，那么你的数据摄取和处理的执行速度会影响以下方面：
- en: '**Cloud costs:** This is probably the biggest factor. More compute time equals
    more costs in most billing models. In other billing based on a certain amount
    of preallocated resources, you could have chosen a lower service level if the
    speed of your ingestion and processing was higher.'
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**云成本：** 这可能是最大的因素。在大多数计费模型中，计算时间越多，成本就越高。在基于预分配资源一定量的其他计费中，如果你的数据摄取和处理速度更快，你可以选择更低的服务级别。'
- en: '**Data timeliness:** If you have a real-time stream that takes 5 minutes to
    process data, then your users will have a lag of at least 5 minutes when viewing
    the data through e.g. a Power BI rapport. This difference can be a lot in certain
    situations. Even for batch jobs, the data timeliness is important. If you are
    running a batch job every hour, it is a lot better if it takes 2 minutes rather
    than 20 minutes.'
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据时效性：** 如果您有一个需要 5 分钟处理数据的实时流，那么当用户通过例如 Power BI 报告查看数据时，至少会有 5 分钟的延迟。在某些情况下，这种差异可能很大。即使是批处理作业，数据时效性也很重要。如果您每小时运行一个批处理作业，如果它只需要
    2 分钟而不是 20 分钟，那就好多了。'
- en: '**Feedback loop:** If your batch job takes only a minute to run, then you get
    a very quick feedback loop. This probably makes your job more enjoyable. In addition,
    it enables you to find logical mistakes more quickly.'
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**反馈循环：** 如果您的批处理作业只需一分钟就能运行，那么您将获得非常快速的反馈循环。这可能会使您的工作更加愉快。此外，它还使您能够更快地发现逻辑错误。'
- en: As you’ve probably understood from the title, I am going to provide a speed
    comparison between the two Python libraries Polars and Pandas. If you know anything
    about Pandas and Polars from before, then you know that Polars is the (relatively)
    new kid on the block proclaiming to be much faster than Pandas. You probably also
    know that Polars is implemented in Rust, which is a trend for many other modern
    Python tools like [uv](https://github.com/astral-sh/uv) and [Ruff](https://github.com/astral-sh/ruff).
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 如您从标题中可能已经理解的那样，我将提供两个 Python 库 Polars 和 Pandas 之间的速度比较。如果您之前对 Pandas 和 Polars
    有所了解，那么您知道 Polars 是（相对）新加入的成员，并宣称比 Pandas 快得多。您可能也知道 Polars 是用 Rust 实现的，这是许多其他现代
    Python 工具的趋势，如 [uv](https://github.com/astral-sh/uv) 和 [Ruff](https://github.com/astral-sh/ruff)。
- en: 'There are two distinct reasons that I want to do a speed comparison test between
    Polars and Pandas:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 我想要在 Polars 和 Pandas 之间进行速度比较测试有两个明显的理由：
- en: Reason 1 — Investigating Claims
  id: totrans-15
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 原因 1 — 调查主张
- en: Polars boasts on its website with the following claim: *Compared to pandas,
    it (Polars) can achieve more than 30x performance gains.*
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: Polars 在其网站上宣称：*与 pandas 相比，它（Polars）可以实现超过 30 倍的性能提升*。
- en: As you can see, you can follow a [link to the benchmarks](https://github.com/pola-rs/polars-benchmark/tree/main) that
    they have. It’s commendable that they have speed tests open source. But if you
    are writing the comparison tests for both your own tool and a competitor’s tool,
    then there might be a slight conflict of interest. I’m not here saying that they
    are purposefully overselling the speed of Polars, but rather that they might have
    unconsciously selected for favorable comparisons.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 正如你所见，你可以通过他们提供的[链接到基准测试](https://github.com/pola-rs/polars-benchmark/tree/main)来查看。他们公开速度测试的做法值得赞扬。但如果你正在为自己的工具和竞争对手的工具编写比较测试，那么可能会有轻微的利益冲突。我并不是说他们故意夸大Polars的速度，而是他们可能无意识地选择了有利于比较的结果。
- en: '**Hence the first reason to do a speed comparison test is simply to see whether
    this supports the claims presented by Polars or not.**'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: '**因此，进行速度比较测试的第一个原因很简单，就是看看这能否支持Polars提出的声明。**'
- en: Reason 2 — Greater granularity
  id: totrans-19
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 原因 2 — 更细粒度
- en: Another reason for doing a speed comparison test between Polars and Pandas is
    to make it slightly more transparent where the performance gains might be.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 在Polars和Pandas之间进行速度比较测试的另一个原因是让它稍微更透明地展示性能提升可能出现在哪里。
- en: This might be already clear if you’re an expert on both libraries. However,
    speed tests between Polars and Pandas are mostly of interest to those considering
    switching up their tool. In that case, you might not yet have played around much
    with Polars because you are unsure if it is worth it.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你在这两个库方面都是专家，这可能已经很明显了。然而，Polars和Pandas之间的速度测试主要对那些考虑更换工具的人感兴趣。在这种情况下，你可能还没有太多地尝试Polars，因为你不确定它是否值得。
- en: '**Hence the second reason to do a speed comparison is simply to see where the
    speed gains are located.**'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '**因此，进行速度比较测试的第二个原因很简单，就是看看速度提升出现在哪里。**'
- en: I want to test both libraries on different tasks both within data ingestion
    and data processing. I also want to consider datasets that are both small and
    large. I will stick to common tasks within data engineering, rather than esoteric
    tasks that one seldom uses.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 我想要在不同的任务上测试这两个库，这些任务既包括数据摄取也包括数据处理。我还想考虑既小又大的数据集。我将坚持在数据工程中的常见任务，而不是那些很少使用的晦涩任务。
- en: What I will not do
  id: totrans-24
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 我不会做的事情
- en: '**I will not give a tutorial on either Pandas or Polars**. If you want to learn
    Pandas or Polars, then a good place to start is their documentation.'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**我不会提供Pandas或Polars的教程**。如果你想学习Pandas或Polars，那么从它们的文档开始是一个好地方。'
- en: '**I will not cover other common data processing libraries.** This might be
    disappointing to a fan of PySpark, but having a distributed compute model makes
    comparisons a bit more difficult. You might find that PySpark is quicker than
    Polars on tasks that are very easy to parallelize, but slower on other tasks where
    keeping all the data in memory reduces travel times.'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**我不会涵盖其他常见的数据处理库**。这可能会让PySpark的粉丝感到失望，但拥有分布式计算模型使得比较变得有些困难。你可能会发现，在非常容易并行化的任务上，PySpark比Polars更快，但在需要将所有数据保持在内存中以提高传输速度的其他任务上则较慢。'
- en: '**I will not provide full reproducibility.** Since this is, in humble words,
    only a blog post, then I will only explain the datasets, tasks, and system settings
    that I have used. I will not host a complete running environment with the datasets
    and bundle everything neatly. This is not a precise scientific experiment, but
    rather a guide that only cares about rough estimations.'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**我不会提供完整的可重复性**。因为这是一个谦逊的博客文章，所以我只会解释我使用的数据集、任务和系统设置。我不会提供一个包含数据集的完整运行环境，并将一切整理得井井有条。这不是一个精确的科学实验，而是一个只关心粗略估计的指南。'
- en: Finally, before we start, I want to say that I like both Polars and Pandas as
    tools. I’m not financially or otherwise compensated by any of them obviously,
    and don’t have any incentive other than being curious about their performance
    ☺️
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，在我们开始之前，我想说我喜欢Polars和Pandas这两个工具。显然，我没有从他们那里获得任何财务或其他补偿，也没有其他动机，只是对他们的性能感到好奇
    ☺️
- en: Datasets, Tasks, and Settings
  id: totrans-29
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据集、任务和设置
- en: Let’s first describe the datasets that I will be considering, the tasks that
    the libraries will perform, and the system settings that I will be running them
    on.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们先描述一下我将要考虑的数据集，库将要执行的任务，以及我将运行它们的系统设置。
- en: Datasets
  id: totrans-31
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数据集
- en: 'A most companies, you will need to work with both small and (relatively) large
    datasets. In my opinion, a good data processing tool can tackle both ends of the
    spectrum. Small datasets challenge the start-up time of tasks, while larger datasets
    challenge scalability. I will consider two datasets, both can be found on Kaggle:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 在大多数公司，你都需要处理小数据和（相对）大数据集。在我看来，一个好的数据处理工具可以应对光谱的两端。小数据集挑战任务的启动时间，而大数据集则挑战可扩展性。我将考虑两个数据集，它们都可以在Kaggle上找到：
- en: '**A small dataset on the format CSV: **It is no secret that CSV files are everywhere!
    Often they are quite small, coming from Excel files or database dumps. What better
    example of this than the [classical iris dataset](https://www.kaggle.com/datasets/uciml/iris) (licensed
    with [CC0 1.0 Universal License](https://creativecommons.org/publicdomain/zero/1.0/))
    with 5 columns and 150 rows. The iris version I linked to on Kaggle has 6 columns,
    but the classical one does not have a running index column. So remove this column
    if you want precisely the same dataset as I have. The iris dataset is certainly
    small data by any stretch of the imagination.'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**关于CSV格式的较小数据集：** CSV文件无处不在，这并不是秘密！它们通常相当小，来自Excel文件或数据库转储。还有什么比[经典的鸢尾花数据集](https://www.kaggle.com/datasets/uciml/iris)（许可协议为[CC0
    1.0 Universal License](https://creativecommons.org/publicdomain/zero/1.0/))更好的例子，它有5列和150行。我在Kaggle上链接的鸢尾花版本有6列，但经典的版本没有运行索引列。所以如果你想得到与我完全相同的数据库，请删除这个列。从任何角度想象，鸢尾花数据集都是小数据。'
- en: '**A large dataset on the format Parquet:** The parquet format is super useful
    for large data as it has built-in compression column-wise (along with many other
    benefits). I will use the [Transaction dataset](https://www.kaggle.com/datasets/ismetsemedov/transactions) (licensed
    with [Apache License 2.0](https://www.apache.org/licenses/LICENSE-2.0)) representing
    financial transactions. The dataset has 24 columns and 7 483 766 rows. It is close
    to 3 GB in its CSV format found on Kaggle. I used Pandas & Pyarrow to convert
    this to a parquet file. The final result is only 905 MB due to the compression
    of the parquet file format. This is at the low end of what people call big data,
    but it will suffice for us.'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**关于Parquet格式的庞大数据集：** Parquet格式对于大数据来说非常实用，因为它具有内置的按列压缩（以及许多其他优点）。我将使用代表金融交易的[Transaction数据集](https://www.kaggle.com/datasets/ismetsemedov/transactions)（许可协议为[Apache
    License 2.0](https://www.apache.org/licenses/LICENSE-2.0)）作为示例。该数据集有24列和7483766行。在Kaggle上找到的CSV格式接近3GB。我使用了Pandas和Pyarrow将其转换为Parquet文件。由于Parquet文件格式的压缩，最终结果仅为905MB。这处于人们所说的“大数据”的低端，但对我们来说已经足够了。'
- en: Tasks
  id: totrans-35
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 任务
- en: 'I will do a speed comparison on five different tasks. The first two are I/O
    tasks, while the last three are common tasks in data processing. Specifically,
    the tasks are:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 我将在五个不同的任务上进行速度比较。前两个是I/O任务，而后三个是数据处理中的常见任务。具体来说，任务包括：
- en: '**Reading data:** I will read both files using the respective methods `read_csv()` and `read_parquet()` from
    the two libraries. I will not use any optional arguments as I want to compare
    their default behavior.'
  id: totrans-37
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**读取数据：** 我将使用两个库的相应方法`read_csv()`和`read_parquet()`读取两个文件。我不会使用任何可选参数，因为我想要比较它们的默认行为。'
- en: '**Writing data:** I will write both files back to identical copies as new files
    using the respective methods `to_csv()` and `to_parquet()` for Pandas and `write_csv()` and `write_parquet()` for
    Polars. I will not use any optional arguments as I want to compare their default
    behavior.'
  id: totrans-38
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**写入数据：** 我将使用Pandas的`to_csv()`和`to_parquet()`方法以及Polars的`write_csv()`和`write_parquet()`方法将两个文件都写回相同的副本作为新文件。我不会使用任何可选参数，因为我想要比较它们的默认行为。'
- en: '**Computing Numeric Expressions:** For the iris dataset I will compute the
    expression `SepalLengthCm ** 2 + SepalWidthCm` as a new column in a copy of the
    DataFrame. For the transactions dataset, I will simply compute the expression `(amount
    + 10) ** 2` as a new column in a copy of the DataFrame. I will use the standard
    way to [transform columns in Pandas](https://pandas.pydata.org/docs/getting_started/intro_tutorials/05_add_columns.html),
    while in Polars I will use the standard functions `all()`, `col()`, and `alias()` to
    make an equivalent transformation.'
  id: totrans-39
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**计算数值表达式：** 对于鸢尾花数据集，我将计算表达式`SepalLengthCm ** 2 + SepalWidthCm`作为DataFrame副本中的新列。对于交易数据集，我将简单地计算表达式`(amount
    + 10) ** 2`作为DataFrame副本中的新列。我将使用标准的[在Pandas中转换列](https://pandas.pydata.org/docs/getting_started/intro_tutorials/05_add_columns.html)的方式，而在Polars中，我将使用标准的函数`all()`、`col()`和`alias()`来实现等效的转换。'
- en: '**Filters: **For the iris dataset, I will select the rows corresponding to
    the criteria `SepalLengthCm >= 5.0` and `SepalWidthCm <= 4.0`. For the transactions
    dataset, I will select the rows corresponding to the categorical criteria `merchant_category
    == ''Restaurant''`. I will use the standard filtering method based on Boolean
    expressions in each library. In pandas, this is syntax such as `df_new = df[df[''col'']
    < 5]`, while in Polars this is given similarly by the `filter()` function along
    with the `col()` function. I will use the and-operator `&` for both libraries
    to combine the two numeric conditions for the iris dataset.'
  id: totrans-40
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**过滤器：**对于鸢尾花数据集，我将选择符合条件 `SepalLengthCm >= 5.0` 和 `SepalWidthCm <= 4.0` 的行。对于交易数据集，我将选择符合分类条件
    `merchant_category == ''Restaurant''` 的行。我将使用每个库中基于布尔表达式的标准过滤方法。在 pandas 中，这可以通过
    `df_new = df[df[''col''] < 5]` 这样的语法实现，而在 Polars 中，这可以通过 `filter()` 函数和 `col()`
    函数类似地实现。我将使用 `&` 操作符来组合鸢尾花数据集的两个数值条件。'
- en: '**Group By:** For the iris dataset, I will group by the `Species` column and
    calculate the mean values for each species of the four columns `SepalLengthCm`, `SepalWidthCm`, `PetalLengthCm`,
    and `PetalWidthCm`. For the transactions dataset, I will group by the column `merchant_category` and
    count the number of instances in each of the classes within `merchant_category`.
    Naturally, I will use the `groupby()` function in Pandas and the `group_by()` function
    in Polars in obvious ways.'
  id: totrans-41
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**分组：**对于鸢尾花数据集，我将按 `Species` 列进行分组，并计算每个物种的四个列 `SepalLengthCm`、`SepalWidthCm`、`PetalLengthCm`
    和 `PetalWidthCm` 的平均值。对于交易数据集，我将按 `merchant_category` 列进行分组，并计算 `merchant_category`
    中每个类别的实例数量。当然，我将使用 Pandas 中的 `groupby()` 函数和 Polars 中的 `group_by()` 函数以明显的方式完成。'
- en: '**Settings**'
  id: totrans-42
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**设置**'
- en: '**System Settings:** I’m running all the tasks locally with 16GB RAM and an
    Intel Core i5–10400F CPU with 6 Cores (12 logical cores through hyperthreading).
    So it’s not state-of-the-art by any means, but good enough for simple benchmarking.'
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**系统设置：**我使用 16GB RAM 和一个拥有 6 个核心（通过超线程提供 12 个逻辑核心）的 Intel Core i5–10400F CPU
    在本地运行所有任务。所以这绝对不是最先进的，但对于简单的基准测试来说已经足够好了。'
- en: '**Python:** I’m running Python 3.12\. This is not the most current stable version
    (which is Python 3.13), but I think this is a good thing. Commonly the latest
    supported Python version in cloud data warehouses is one or two versions behind.'
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Python：**我正在运行 Python 3.12。这不是最新的稳定版本（最新的稳定版本是 Python 3.13），但我认为这是一个好事。通常，云数据仓库中支持的最新
    Python 版本会落后一两个版本。'
- en: '**Polars & Pandas:** I’m using Polars version 1.21 and Pandas 2.2.3\. These
    are roughly the newest stable releases to both packages.'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Polars & Pandas：**我正在使用 Polars 版本 1.21 和 Pandas 2.2.3。这两个版本都是两个包的最新稳定发布版。'
- en: '**Timeit: **I’m using the standard timeit module in Python and finding the
    median of 10 runs.'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**时间测试：**我正在使用 Python 的标准 timeit 模块，并对 10 次运行的结果进行中位数计算。'
- en: Especially interesting will be how Polars can take advantage of the 12 logical
    cores through multithreading. There are ways to make Pandas take advantage of
    multiple processors, but I want to compare Polars and Pandas out of the box without
    any external modification. After all, this is probably how they are running in
    most companies around the world.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 尤其有趣的是，Polars 将如何通过多线程利用 12 个逻辑核心。有方法可以让 Pandas 利用多个处理器，但我想在不进行任何外部修改的情况下比较
    Polars 和 Pandas。毕竟，这可能是它们在世界上大多数公司运行的方式。
- en: Results
  id: totrans-48
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结果
- en: 'Here I will write down the results for each of the five tasks and make some
    minor comments. In the next section I will try to summarize the main points into
    a conclusion and point out a disadvantage that Polars has in this comparison:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我将记录每个五个任务的结果，并做一些简要的评论。在下一节中，我将尝试将主要观点总结成结论，并指出 Polars 在这次比较中的一个缺点：
- en: Task 1 — Reading data
  id: totrans-50
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 任务 1 — 读取数据
- en: 'The **median run time over 10 runs for the reading task** was as follows:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: '**读取任务的中位数运行时间（10 次运行）：**'
- en: '[PRE0]'
  id: totrans-52
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: For reading the Iris dataset, Polars was roughly 2.5x faster than Pandas. For
    the transactions dataset, the difference is even starker where Polars was 11x
    faster than Pandas. We can see that Polars is much faster than Pandas for reading
    both small and large files. The performance difference grows with the size of
    the file.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 对于读取 Iris 数据集，Polars 比 Pandas 快大约 2.5 倍。对于交易数据集，差异更加明显，Polars 比 Pandas 快 11
    倍。我们可以看到，Polars 在读取小型和大型文件方面都比 Pandas 快得多。性能差异随着文件大小的增加而增长。
- en: Task 2— **Writing data**
  id: totrans-54
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 任务 2— **写入数据**
- en: 'The **median run time in seconds over 10 runs for the writing task** was as
    follows:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '**写入任务的中位数运行时间（10 次运行）：**'
- en: '[PRE1]'
  id: totrans-56
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: For writing the iris dataset, Polars was around 75% faster than Pandas. For
    the transactions dataset, Polars was roughly 2x as fast as Pandas. Again we see
    that Polars is faster than Pandas, but the difference here is smaller than for
    reading files. Still, a difference of close to 2x in performance is a massive
    difference.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 对于写入iris数据集，Polars比Pandas快约75%。对于事务数据集，Polars比Pandas快约2倍。再次看到Polars比Pandas快，但这里的差异小于读取文件时的差异。尽管如此，性能上的近2倍差异仍然是一个巨大的差异。
- en: Task 3 —**Computing Numeric Expressions**
  id: totrans-58
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 任务3 — **计算数值表达式**
- en: 'The **median run time over 10 runs for the computing numeric expressions task** was
    as follows:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: '**计算数值表达式任务10次运行的中位运行时间如下**：'
- en: '[PRE2]'
  id: totrans-60
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: For computing the numeric expressions, Polars beats Pandas with a rate of roughly
    2.5x for the iris dataset, and roughly 3.5x for the transactions dataset. This
    is a pretty massive difference. It should be noted that computing numeric expressions
    is fast in both libraries even for the large dataset transactions.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 对于计算数值表达式，Polars在iris数据集上的速度比Pandas快约2.5倍，在事务数据集上快约3.5倍。这是一个相当大的差异。需要注意的是，即使在大型数据集事务中，两个库计算数值表达式的速度都很快。
- en: Task 4 — **Filters**
  id: totrans-62
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 任务4 — **过滤器**
- en: 'The **median run time over 10 runs for the filters task** was as follows:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: '**过滤任务10次运行的中位运行时间如下**：'
- en: '[PRE3]'
  id: totrans-64
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: For filters, Polars is 2.6x faster on the iris dataset and 10x as fast on the
    transactions dataset. This is probably the most surprising improvement for me
    since I suspected that the speed improvements for filtering tasks would not be
    this massive.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 对于过滤器，Polars在iris数据集上快2.6倍，在事务数据集上快10倍。这可能是对我来说最令人惊讶的改进，因为我怀疑过滤任务的性能提升不会这么巨大。
- en: Task 5 — Group By
  id: totrans-66
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 任务5 — 分组
- en: 'The **median run time over 10 runs for the group by task** was as follows:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: '**分组任务10次运行的中位运行时间如下**：'
- en: '[PRE4]'
  id: totrans-68
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: For the group-by task, there is a 3x speed improvement for Polars in the case
    of the iris dataset. For the transactions dataset, there is a 2.6x improvement
    of Polars over Pandas.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 对于分组任务，在iris数据集的情况下，Polars的速度提高了3倍。对于事务数据集，Polars比Pandas快了2.6倍。
- en: Conclusions
  id: totrans-70
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: Before highlighting each point below, I want to point out that Polars is somewhat
    in an unfair position throughout my comparisons. It is often that multiple data
    transformations are performed after one another in practice. For this, Polars
    has [the lazy API](https://docs.pola.rs/user-guide/concepts/lazy-api/) that optimizes
    this before calculating. Since I have considered single ingestions and transformations,
    this advantage of Polars is hidden. How much this would improve in practical situations
    is not clear, but it would probably make the difference in performance even bigger.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 在强调以下每个点之前，我想指出，在整个比较过程中，Polars处于某种不公平的位置。在实践中，通常会在一次之后执行多个数据转换。为此，Polars有[懒加载API](https://docs.pola.rs/user-guide/concepts/lazy-api/)，在计算之前优化这一点。由于我已经考虑了单次摄取和转换，Polars的这个优势被隐藏了。这在实际情况下会有多大的改进还不清楚，但它可能会使性能差异更大。
- en: Data Ingestion
  id: totrans-72
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数据摄取
- en: '**Polars is significantly faster than Pandas for both reading and writing data.** The
    difference is largest in reading data, where we had a massive 11x difference in
    performance for the transactions dataset. On all measurements, Polars performs
    significantly better than Pandas.'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: '**Polars在读取和写入数据方面都显著快于Pandas**。在读取数据时，差异最大，对于事务数据集，性能差异达到了11倍。在所有测量中，Polars的表现都显著优于Pandas。'
- en: Data Processing
  id: totrans-74
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数据处理
- en: '**Polars is significantly faster than Pandas for common data processing tasks.** The
    difference was starkest for filters, but you can at least expect a 2–3x difference
    in performance across the board.'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: '**Polars在常见数据处理任务上比Pandas快得多**。这种差异在过滤器任务中最为明显，但至少可以预期在整体性能上会有2-3倍的区别。'
- en: Final Verdict
  id: totrans-76
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 最终结论
- en: '**Polars consistently performs faster than Pandas on all tasks with both small
    and large data.** The improvements are very significant, ranging from a 2x improvement
    to a whopping 11x improvement. When it comes to reading large parquet files or
    performing filter statements, Polars is leaps and bound in front of Pandas.'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: '**Polars在所有任务中，无论是小数据还是大数据，都始终比Pandas快**。改进非常显著，从2倍到惊人的11倍不等。当涉及到读取大型parquet文件或执行过滤语句时，Polars在Pandas之前飞跃。'
- en: However…**Nowhere here is Polars remotely close to performing 30x better than
    Pandas, as Polars’ benchmarking suggests.** I would argue that the tasks that
    I have presented are standard tasks performed on realistic hardware infrastructure.
    So I think that my conclusions give us some room to question whether the claims
    put forward by Polars give a realistic picture of the improvements that you can
    expect.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 然而…**正如 Polars 的基准测试所暗示的，Polars 的性能远未达到比 Pandas 快 30 倍的水平**。我认为我所展示的任务是在现实硬件基础设施上执行的标准任务。因此，我认为我的结论为我们提供了质疑
    Polars 提出的关于你可以期望的改进的声明的空间。
- en: Nevertheless, I am in no doubt that Polars is significantly faster than Pandas.
    Working with Polars is not more complicated than working with Pandas. **So for
    your next data engineering project where the data fits in memory, I would strongly
    suggest that you opt for Polars rather than Pandas.**
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管如此，我坚信 Polars 的性能比 Pandas 快得多。使用 Polars 并不比使用 Pandas 复杂。**因此，对于你的下一个数据工程项目，其中数据适合内存，我强烈建议你选择
    Polars 而不是 Pandas**。
- en: Wrapping Up
  id: totrans-80
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 总结
- en: '![](../Images/cf2306efd90aba9f040fd7c802d2dba1.png)'
  id: totrans-81
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/cf2306efd90aba9f040fd7c802d2dba1.png)'
- en: Photo by [Spencer Bergen](https://unsplash.com/@spencerbergen?utm_source=medium&utm_medium=referral) on [Unsplash](https://unsplash.com/?utm_source=medium&utm_medium=referral)
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由 [Spencer Bergen](https://unsplash.com/@spencerbergen?utm_source=medium&utm_medium=referral)
    在 [Unsplash](https://unsplash.com/?utm_source=medium&utm_medium=referral) 提供
- en: I hope this blog post gave you a different perspective on the speed difference
    between Polars and Pandas. Please comment if you have a different experience with
    the performance difference between Polars and Pandas than what I have presented.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望这篇博客文章能给你关于 Polars 和 Pandas 速度差异的不同视角。如果你在 Polars 和 Pandas 的性能差异方面有与我不同的体验，请留言评论。
- en: If you are interested in AI, data science, or data engineering, please follow
    me or connect on [LinkedIn](https://www.linkedin.com/in/eirik-berge/).
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你对 AI、数据科学或数据工程感兴趣，请关注我或在 [LinkedIn](https://www.linkedin.com/in/eirik-berge/)
    上与我联系。
