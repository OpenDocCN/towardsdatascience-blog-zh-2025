- en: 'Unraveling Spatially Variable Genes: A Statistical Perspective on Spatial Transcriptomics'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 揭示空间可变基因：空间转录组学的统计视角
- en: 原文：[https://towardsdatascience.com/unraveling-spatially-variable-genes-a-statistical-perspective-on-spatial-transcriptomics/](https://towardsdatascience.com/unraveling-spatially-variable-genes-a-statistical-perspective-on-spatial-transcriptomics/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[原文链接](https://towardsdatascience.com/unraveling-spatially-variable-genes-a-statistical-perspective-on-spatial-transcriptomics/)'
- en: \[\]
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: \[\]
- en: '*The article was written by Guanao Yan, Ph.D. student of Statistics and Data
    Science at UCLA. Guanao is the first author of the Nature Communications review
    article [1].*'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '*本文由加州大学洛杉矶分校统计学和数据科学专业的博士研究生Guanao Yan撰写。Guanao是《自然通讯》综述文章[1]的第一作者。*'
- en: Spatially resolved transcriptomics (SRT) is revolutionizing genomics by enabling
    the high-throughput measurement of gene expression while preserving spatial context.
    Unlike single-cell RNA sequencing (scRNA-seq), which captures transcriptomes without
    spatial location information, SRT allows researchers to map gene expression to
    precise locations within a tissue, providing insights into tissue organization,
    cellular interactions, and spatially coordinated gene activity. The increasing
    volume and complexity of SRT data necessitate the development of robust statistical
    and computational methods, making this field highly relevant to data scientists,
    statisticians, and machine learning (ML) professionals. Techniques such as spatial
    statistics, graph-based models, and deep learning have been applied to extract
    meaningful biological insights from these data.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 空间解析转录组学（SRT）通过允许在保留空间背景的情况下进行基因表达的高通量测量，正在改变基因组学。与捕获转录组而不包含空间位置信息的单细胞RNA测序（scRNA-seq）不同，SRT允许研究人员将基因表达映射到组织内的精确位置，从而深入了解组织结构、细胞相互作用和空间协调的基因活动。SRT数据的数量和复杂性不断增加，需要开发稳健的统计和计算方法，这使得该领域对数据科学家、统计学家和机器学习（ML）专业人士来说高度相关。空间统计、基于图模型和深度学习等技术已被应用于从这些数据中提取有意义的生物学见解。
- en: A key step in SRT analysis is the detection of spatially variable genes (SVGs)—genes
    whose expression varies non-randomly across spatial locations. Identifying SVGs
    is crucial for characterizing tissue architecture, functional gene modules, and
    cellular heterogeneity. However, despite the rapid development of computational
    methods for SVG detection, these methods vary widely in their definitions and
    statistical frameworks, leading to inconsistent results and challenges in interpretation.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: SRT分析的一个关键步骤是检测空间可变基因（SVGs）——这些基因的表达在空间位置上不是随机变化的。识别SVGs对于表征组织结构、功能基因模块和细胞异质性至关重要。然而，尽管SVG检测的计算方法发展迅速，但这些方法在定义和统计框架上差异很大，导致结果不一致和解释上的挑战。
- en: In our recent review published in *Nature Communications* [1], we systematically
    examined 34 peer-reviewed SVG detection methods and introduced a classification
    framework that clarifies the biological significance of different SVG types. This
    article provides an overview of our findings, focusing on the three major categories
    of SVGs and the statistical principles underlying their detection.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们最近发表在《自然通讯》杂志上的综述文章[1]中，我们系统地评估了34种同行评审的SVG检测方法，并介绍了一个分类框架，该框架阐明了不同SVG类型的生物学意义。本文概述了我们的发现，重点关注SVG的三个主要类别及其检测背后的统计原理。
- en: '![](../Images/89b76bfa449f355db7f8382ab91e70f1.png)'
  id: totrans-7
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/89b76bfa449f355db7f8382ab91e70f1.png)'
- en: 'SVG detection methods aim to uncover genes whose spatial expression reflects
    biological patterns rather than technical noise. Based on our review of 34 peer-reviewed
    methods, we categorize SVGs into three groups: Overall SVGs, Cell-Type-Specific
    SVGs, and Spatial-Domain-Marker SVGs (Figure 2).'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: SVG检测方法的目的是揭示那些空间表达反映生物模式而不是技术噪声的基因。根据我们对34种同行评审方法的回顾，我们将SVG分为三类：总体SVG、细胞类型特异性SVG和空间域标记SVG（图2）。
- en: '![](../Images/ab24b7db72c9d2a4bb281cc014be10e5.png)'
  id: totrans-9
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ab24b7db72c9d2a4bb281cc014be10e5.png)'
- en: 'Image created by the authors, adapted from [1]. Publication timeline of 34
    SVG detection methods. Colors represent three SVG categories: overall SVGs (green),
    cell-type-specific SVGs (red), and spatial-domain-marker SVGs (purple).'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 由作者创建的图像，改编自[1]。34种SVG检测方法的出版时间线。颜色代表三个SVG类别：总体SVG（绿色）、细胞类型特异性SVG（红色）和空间域标记SVG（紫色）。
- en: Methods for detecting the three SVG categories serve different purposes (Fig.
    3). First, the detection of overall SVGs screens informative genes for downstream
    analyses, including the identification of spatial domains and functional gene
    modules. Second, detecting cell-type-specific SVGs aims to reveal spatial variation
    within a cell type and help identify distinct cell subpopulations or states within
    cell types. Third, spatial-domain-marker SVG detection is used to find marker
    genes to annotate and interpret spatial domains already detected. These markers
    help understand the molecular mechanisms underlying spatial domains and assist
    in annotating tissue layers in other datasets.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 检测三种SVG类别的方 法服务于不同的目的（图3）。首先，整体SVGs的检测筛选出下游分析的有用基因，包括识别空间域和功能基因模块。其次，检测细胞类型特定的SVGs旨在揭示细胞类型内的空间变异，并帮助识别细胞类型内的不同细胞亚群或状态。第三，空间域标记SVG检测用于寻找标记基因来注释和解释已检测到的空间域。这些标记有助于理解空间域背后的分子机制，并有助于在其他数据集中注释组织层。
- en: '![](../Images/519ce1f37c0be8aaf80a83bfac21e216.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/519ce1f37c0be8aaf80a83bfac21e216.png)'
- en: 'Image created by the authors, adapted from [1]. Conceptual visualization of
    three SVG categories: overall SVGs, cell-type-specific SVGs, and spatial-domain-marker
    SVGs. The left column shows a tissue slice with two cell types and three spatial
    domains. The right column shows exemplar genes with colors representing the expression
    levels shown for an overall SVG, a cell-type-specific SVG, and a spatial-domain-marker
    SVG, respectively.'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 由作者创建的图像，改编自[1]。三种SVG类别的概念可视化：整体SVGs、细胞类型特定的SVGs和空间域标记SVGs。左侧列显示包含两种细胞类型和三个空间域的组织切片。右侧列显示示例基因，颜色代表整体SVG、细胞类型特定的SVG和空间域标记SVG的表达水平。
- en: The relationship among the three SVG categories depends on the detection methods,
    particularly the null and alternative hypotheses they employ. If an overall SVG
    detection method uses the null hypothesis that a non-SVG’s expression is independent
    of spatial location and the alternative hypothesis that any deviation from this
    independence indicates an SVG, then its SVGs should theoretically include both
    cell-type-specific SVGs and spatial-domain-marker SVGs. For example, DESpace [2]
    is a method that detects both overall SVGs and spatial-domain-marker SVGs, and
    its detected overall SVGs must be marker genes for some spatial domains. This
    inclusion relationship holds true except in extreme scenarios, such as when a
    gene exhibits opposite cell-type-specific spatial patterns that effectively cancel
    each other out. However, if an overall SVG detection method’s alternative hypothesis
    is defined for a specific spatial expression pattern, then its SVGs may not include
    some cell-type-specific SVGs or spatial-domain-marker SVGs.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 三种SVG类别之间的关系取决于检测方法，尤其是它们采用的零假设和备择假设。如果一个整体SVG检测方法使用零假设，即非SVG的表达与空间位置无关，以及备择假设，即任何偏离这种独立性的偏差表明存在SVG，那么其SVGs理论上应包括细胞类型特定的SVGs和空间域标记SVGs。例如，DESpace
    [2] 是一种检测整体SVGs和空间域标记SVGs的方法，其检测到的整体SVGs必须是某些空间域的标记基因。这种包含关系在极端情况下除外，例如当基因表现出相反的细胞类型特定空间模式，从而相互抵消。然而，如果一个整体SVG检测方法的备择假设是为特定的空间表达模式定义的，那么其SVGs可能不包括某些细胞类型特定的SVGs或空间域标记SVGs。
- en: 'To understand how SVGs are detected, we categorized the statistical approaches
    into three major types of hypothesis tests:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 要了解SVG是如何被检测到的，我们将统计方法分为三种主要的假设检验类型：
- en: Dependence Test – Examines the dependence between a gene’s expression level
    and the spatial location.
  id: totrans-16
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 依赖性测试——检验基因表达水平与空间位置之间的依赖性。
- en: Regression Fixed-Effect Test – Examines whether some or all of the fixed-effect
    covariates, for instance, spatial location, contribute to the mean of the response
    variable, i.e., a gene’s expression.
  id: totrans-17
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 回归固定效应测试——检验某些或所有固定效应协变量，例如空间位置，是否对响应变量的均值有贡献，即基因的表达。
- en: Regression Random-Effect Test (Variance Component Test) – Examines whether the
    random-effect covariates, for instance, spatial location, contribute to the variance
    of the response variable, i.e., a gene’s expression.
  id: totrans-18
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 回归随机效应测试（方差成分测试）——检验随机效应协变量，例如空间位置，是否对响应变量的方差有贡献，即基因的表达。
- en: 'To further explain how these tests are used for SVG detection, we denote 𝑌
    as gene’s expression level and 𝑆 as the spatial locations. Dependence test is
    the most general hypothesis test for SVG detection. For a given gene, it decides
    whether the gene’s expression level 𝑌 is independent of the spatial location 𝑆,
    i.e., the null hypothesis is:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 为了进一步解释这些测试如何用于SVG检测，我们用 𝑌 表示基因的表达水平，用 𝑆 表示空间位置。依赖性测试是SVG检测中最一般的假设检验。对于一个给定的基因，它决定基因的表达水平
    𝑌 是否独立于空间位置 𝑆，即零假设是：
- en: '![](../Images/a1232323d05d49e2d34691dd0b92dac5.png)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/a1232323d05d49e2d34691dd0b92dac5.png)'
- en: 'There are two types of regression tests: fixed-effect tests, where the effect
    of the spatial location is assumed to be fixed, and random-effect tests, which
    assume the effect of the spatial location as random. To explain these two types
    of tests, we use a linear mixed model for a given gene as an example:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 存在两种回归测试类型：固定效应测试，其中假设空间位置的影响是固定的，以及随机效应测试，假设空间位置的影响是随机的。为了解释这两种测试类型，我们以一个给定基因的线性混合模型为例：
- en: '![](../Images/89338490f1980ddaf9f59754d0fe7976.png)'
  id: totrans-22
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/89338490f1980ddaf9f59754d0fe7976.png)'
- en: 'where the response variable \( Y_i \) is the gene’s expression level at spot
    \( i \), \( x_i \) \( \epsilon \) \( R^p \) indicates the fixed-effect covariates
    of spot \( i \), \( z_i \) \( \epsilon \) \( R^q \) denotes the random-effect
    covariates of spot \( i \), and \( \epsilon_i \) is the random measurement error
    at spot \( i \) with zero mean. In the model parameters, \( \beta_0 \) is the
    (fixed) intercept, \( \beta \) \( \epsilon \) \( R^p \) indicates the fixed effects,
    and \( \gamma \) \( \epsilon \) \( R^q \) denotes the random effects with zero
    means and the covariance matrix:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 其中响应变量 \( Y_i \) 是位置 \( i \) 的基因表达水平，\( x_i \) \( \epsilon \) \( R^p \) 表示位置
    \( i \) 的固定效应协变量，\( z_i \) \( \epsilon \) \( R^q \) 表示位置 \( i \) 的随机效应协变量，\( \epsilon_i
    \) 是位置 \( i \) 的随机测量误差，均值为零。在模型参数中，\( \beta_0 \) 是（固定）截距，\( \beta \) \( \epsilon
    \) \( R^p \) 表示固定效应，\( \gamma \) \( \epsilon \) \( R^q \) 表示随机效应，均值为零，协方差矩阵为：
- en: '![](../Images/4834957efa7dd3396164fe74e01a22cb.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/4834957efa7dd3396164fe74e01a22cb.png)'
- en: In this linear mixed model, independence is assumed between random effect and
    random errors and among random errors.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个线性混合模型中，假设随机效应和随机误差之间以及随机误差之间是独立的。
- en: 'Fixed-effect tests examine whether some or all of the fixed-effect covariates
    \( x_i \) (dependent on spatial locations *S*) contribute to the mean of the response
    variable. If all fixed-effect covariates make no contribution, then:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 固定效应测试检查某些或所有固定效应协变量 \( x_i \)（依赖于空间位置 *S*）是否对响应变量的均值有贡献。如果所有固定效应协变量都没有贡献，那么：
- en: '![](../Images/e5af168249cb449b9bde20ee2530601e.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/e5af168249cb449b9bde20ee2530601e.png)'
- en: The null hypothesis
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 零假设
- en: '![](../Images/cf7594aa2061694f7de17a420f19e6fc.png)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/cf7594aa2061694f7de17a420f19e6fc.png)'
- en: implies
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: implies
- en: '![](../Images/df5fc114bddee72d39ad11be6c111b45.png)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/df5fc114bddee72d39ad11be6c111b45.png)'
- en: 'Random-effect tests examine whether the random-effect covariates \( z_i \)
    (dependent on spatial locations *S*) contribute to the variance of the response
    variable Var⁡Yi, focusing on the decomposition:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 随机效应测试检查随机效应协变量 \( z_i \)（依赖于空间位置 *S*）是否对响应变量的方差 Var⁡Yi 有贡献，重点关注分解：
- en: '![](../Images/bef85f676a9c153fe0b31c588df4d7d7.png)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/bef85f676a9c153fe0b31c588df4d7d7.png)'
- en: 'and testing if the contribution of the random-effect covariates is zero. The
    null hypothesis:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 并测试随机效应协变量的贡献是否为零。零假设：
- en: '![](../Images/64415a337b8423ae6266b920a06eff0e.png)'
  id: totrans-35
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/64415a337b8423ae6266b920a06eff0e.png)'
- en: implies
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: implies
- en: '![](../Images/96bee4d3633d580e10c65a27e4fc104b.png)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/96bee4d3633d580e10c65a27e4fc104b.png)'
- en: Among the 23 methods that use frequentist hypothesis tests, dependence tests
    and random-effect regression tests have been primarily applied to detect overall
    SVGs, whereas fixed-effect regression tests have been used across all three SVG
    categories. Understanding these distinctions is key to selecting the right method
    for specific research questions.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 在使用频率主义假设检验的23种方法中，依赖性测试和随机效应回归测试主要用于检测整体SVG，而固定效应回归测试则用于所有三个SVG类别。理解这些区别对于选择适合特定研究问题的正确方法是关键。
- en: Improving SVG detection methods requires balancing detection power, specificity,
    and scalability while addressing key challenges in spatial transcriptomics analysis.
    Future developments should focus on adapting methods to different SRT technologies
    and tissue types, as well as extending support for multi-sample SRT data to enhance
    biological insights. Additionally, strengthening statistical rigor and validation
    frameworks will be crucial for ensuring the reliability of SVG detection. Benchmarking
    studies also need refinement, with clearer evaluation metrics and standardized
    datasets to provide robust method comparisons.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 改进 SVG 检测方法需要在解决空间转录组学分析中的关键挑战的同时，平衡检测能力、特异性和可扩展性。未来的发展应侧重于将方法适应不同的 SRT 技术和组织类型，以及扩展对多样本
    SRT 数据的支持，以增强生物学见解。此外，加强统计严谨性和验证框架对于确保 SVG 检测的可靠性至关重要。基准测试研究也需要改进，需要更清晰的评估指标和标准化的数据集，以提供稳健的方法比较。
- en: '**References**'
  id: totrans-40
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**参考文献**'
- en: '[1] Yan, G., Hua, S.H. & Li, J.J. (2025). Categorization of 34 computational
    methods to detect spatially variable genes from spatially resolved transcriptomics
    data. *Nature Communication*, 16, 1141\. [https://doi.org/10.1038/s41467-025-56080-w](https://doi.org/10.1038/s41467-025-56080-w)'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: '[1] Yan, G., Hua, S.H. & Li, J.J. (2025). 从空间分辨转录组数据中检测空间可变基因的 34 种计算方法的分类。*自然通讯*，16，1141。[https://doi.org/10.1038/s41467-025-56080-w](https://doi.org/10.1038/s41467-025-56080-w)'
- en: '[2] Cai, P., Robinson, M. D., & Tiberi, S. (2024). DESpace: spatially variable
    gene detection via differential expression testing of spatial clusters. Bioinformatics,
    40(2). https://doi.org/10.1093/bioinformatics/btae027'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: '[2] Cai, P., Robinson, M. D., & Tiberi, S. (2024). DESpace：通过空间簇的差异表达测试进行空间可变基因检测。Bioinformatics，40(2)。https://doi.org/10.1093/bioinformatics/btae027'
