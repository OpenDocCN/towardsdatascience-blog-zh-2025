- en: 'The Theory of Universal Computation: Bayesian Optimality, Solomonoff Induction
    & AIXI'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/the-theory-of-universal-computation-bayesian-optimality-solomonoff-induction-aixi/](https://towardsdatascience.com/the-theory-of-universal-computation-bayesian-optimality-solomonoff-induction-aixi/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1758325801091" class="mdspan-comment">Introduction</mdspan>
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In a seminal but underappreciated book titled *Universal Artificial Intelligence:
    Sequential Decisions Based on Algorithmic Probability*, Marcus Hutter attempted
    a mathematical formulation of [universal artificial intelligence](https://en.wikipedia.org/wiki/AIXI),
    shortened to AIXI. This article aims to make AIXI accessible to data scientists,
    technical enthusiasts and general audiences both conceptually and formally.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: We begin with a brief overview of the axioms of probability theory. Subsequently
    we delve into conditional probability, whose calculation is governed by Bayes’s
    theorem. While Bayes’s theorem provides the framework for updating beliefs, it
    leaves open the question of how to assign priors. To address this, we turn to
    algorithmic information theory, which connects Kolmogorov complexity, defined
    as the length of the shortest program that outputs a string, with the assignment
    of Bayesian priors. The bridge between these two ideas is the Solomonoff prior,
    also known as the universal prior. The universal prior provides us with the necessary
    scaffolding to explore the AIXI formalism, which integrates sequential decision
    theory, the Solomonoff prior and Occam’s Razor. In the final section, we briefly
    discuss the limitations of AIXI and alternative approaches to formalizing an universal
    agent, while acknowledging that the term “universal agent” carries significant
    philosophical ambiguity. In particular, we discuss Active Inference as a philosophical
    alternative to AIXI, wherein the former models an embodied predictive agent, whereas
    the latter, models a disembodied utility maximization algorithm.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: '*Note: All images in the blog are created by the author.*'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: Probability Axioms
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The Kolmogorov axioms define probabilistic space as a triple (Ω , 𝒜, 𝓟), where
    Ω defines the total sample space, 𝒜 the collection of subsets of events of interest,
    and 𝓟 the function that assigns a probability to each event normalized to the
    unit interval.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: If 𝑨 ϵ 𝒜, then 𝓟(𝑨) ≥ 0
  id: totrans-8
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: If 𝑨, **B** ϵ 𝒜 and **A** ∩ **B = ∅**, then P (A**⋃**B) = P(A) + P(B)
  id: totrans-9
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: P(Ω) = 1
  id: totrans-10
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The first axiom, **non-negativity**, ensures that probabilities are meaningful
    as real-valued measures of belief or frequency. The second, **additivity**, formalizes
    the principle that the probability of disjoint outcomes is the sum of their individual
    probabilities. And the third, **normalization**, ensures that the total probability
    assigned to the entire sample space equals one.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: 'However, while the probability axioms specify the structural rules of probability,
    they do not prescribe how probabilities should be *updated* in light of new evidence.
    In this sense, the Kolmogorov framework is analytic and a priori: it defines what
    a probability measure must satisfy, but not how such a measure is revised through
    evidence.To move from static probability assignments to dynamic inference, we
    need a way to relate new data to existing hypotheses, namely conditional probability.
    This epistemic gap is addressed in frequentist statistics by interpreting conditional
    probabilities through long-run frequencies of repeated events, typically under
    the assumption that such events are *independently and identically distributed
    (i.i.d.)*, whereas Bayes’s theorem provides a normative rule for updating beliefs
    about hypotheses in light of new evidence, useful especially when observations
    are made incrementally or sample spaces are not well-defined.'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，虽然概率公理指定了概率的结构规则，但它们并没有规定如何根据新的证据更新概率。从这个意义上说，柯尔莫哥洛夫框架是分析性和先验的：它定义了概率测度必须满足的条件，但没有规定如何通过证据来修订这样的测度。要从静态概率分配转移到动态推理，我们需要一种将新数据与现有假设相关联的方法，即条件概率。在频率统计学中，通过解释条件概率通过重复事件的长期频率来解决这个问题，通常假设这些事件是*独立同分布(i.i.d.)*的，而贝叶斯定理提供了一个根据新证据更新关于假设信念的规范性规则，这在观察是逐步进行或样本空间没有明确定义时特别有用。
- en: Bayesian Inference
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 贝叶斯推理
- en: 'First formalized by a Scottish monk, Bayes’ theorem is an algebraic derivation
    of conditional probability. Once we understand how conditional probability is
    calculated, Bayes’ Theorem can be derived through a few algebraic operations.
    Let’s recall how we compute conditional probability:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 贝叶斯定理最初由一位苏格兰僧侣正式提出，是条件概率的代数推导。一旦我们了解了条件概率是如何计算的，就可以通过几个代数运算推导出贝叶斯定理。让我们回顾一下我们是如何计算条件概率的：
- en: '![](../Images/6f2d3345062bef8772af9d0e8d5a42e0.png)'
  id: totrans-15
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/6f2d3345062bef8772af9d0e8d5a42e0.png)'
- en: Conditional probability formula
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 条件概率公式
- en: This states that the probability of the hypothesis H given the evidence D is
    computed as the joint probability of the hypothesis and the evidence divided by
    the probability of the evidence.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 这表明，给定证据 D 的假设 H 的概率是通过假设和证据的联合概率除以证据的概率来计算的。
- en: 'Why would we compute conditional probability this way? Let’s walk through it
    by way of an example. The probability that it rained — the *hypothesis *— given
    that the ground is wet — the *data* — assumes that these two events are dependent.
    If they were independent, then the probability of their joint occurrence would
    be computed by their product P(H) **·** P(D). This is because the probability
    of P(H|D) = P(H) and the probability of P(D|H)=P(D) assume that the event of the
    ground being wet is independent of it raining. Notice what we’ve just asserted:
    P(H∩D) = P(H) **·** P(D). This means that the intersection of independent events
    is computed by the product of their individual probabilities.'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 我们为什么会以这种方式计算条件概率？让我们通过一个例子来解释。在地面湿润的情况下，下雨的概率——即*假设*——假设这两个事件是相关的。如果它们是独立的，那么它们共同发生的概率将通过它们的乘积
    P(H) **·** P(D) 来计算。这是因为 P(H|D) = P(H) 和 P(D|H)=P(D) 的概率假设地面湿润的事件与下雨是独立的。注意我们刚刚提出的：P(H∩D)
    = P(H) **·** P(D)。这意味着独立事件的交集是通过它们各自概率的乘积来计算的。
- en: '*But how is the intersection P(H∩D) of dependent events computed?* Set-theoretically,
    the joint probability is defined as the intersection of the two sets:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '*但是，如何计算相关事件的交集 P(H∩D) 呢？* 从集合论的角度来看，联合概率被定义为两个集合的交集：'
- en: '![](../Images/54494f52c6fde756f8a9e90e750591ad.png)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/54494f52c6fde756f8a9e90e750591ad.png)'
- en: 'In order to understand the proportion of the distribution of the sample spaces,
    we can visualize the conditional probability we seek to calculate as follows:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 为了理解样本空间分布的比例，我们可以将我们想要计算的条件概率可视化如下：
- en: '![](../Images/0cc09a77cf22a4fe9837ea749dea8843.png)'
  id: totrans-22
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/0cc09a77cf22a4fe9837ea749dea8843.png)'
- en: 'But in practice we almost never have prior knowledge of the joint probability
    distribution. This is where we can use a simple algebraic step to help us approximate
    the joint probability. We multiply both sides of the equation by the denominator
    to solve for the joint probability P(H∩D):'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 但在实践中，我们几乎从未事先了解联合概率分布。这就是我们可以使用一个简单的代数步骤来帮助我们近似联合概率的地方。我们将等式的两边乘以分母以求解联合概率
    P(H∩D)：
- en: '![](../Images/7562765203f0cecb3f14316a0f45b086.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
- en: 'Now conversely, if we wanted to compute the probability that the ground is
    wet given that it rained, our conditional probability formula would be the following:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/116ce8004ba0c7f405b021fb364b3779.png)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
- en: 'The same transformation give us:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/2ba3ee749c63d76fd040a753ec95ce4d.png)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
- en: 'Notice that the joint probability of the two events in question is the term
    both conditional probabilities share. Since P(H∩D) is a symmetrical relation and
    consequently an algebraic constant between the equations, we get the following
    crucial equality:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/67cf7d8f2b069b75e7705aefd2324570.png)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
- en: 'Therefore, we if want to test the hypothesis that “it rained” given that the
    “ground is wet”, we can rearrange this equality to obtain Bayes’ formula:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/21936ff726a5271222d904e304bbaa2c.png)'
  id: totrans-32
  prefs: []
  type: TYPE_IMG
- en: In Bayesian terminology, we refer to P(H|D) as the ***posterior*** (namely,
    the probability we wish to ascertain), P(H) as the ***prior***, P(D|H) as the
    ***likelihood***, and P(D) as the ***marginal***.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: This conventional nomenclature is important when dealing with Bayesian statistics.
    The likelihood supplies the conditional probabilities for the data points under
    the hypothesis (providing the values used to update our beliefs), whereas the
    marginal normalizes the posterior to the sample space of the condition or data.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
- en: Since we need approximations of values for all the terms in Bayes’ formula,
    a major hurdle in Bayesian statistics is how to best assign these values. In particular,
    specifying the prior can be challenging since we don’t always have the requisite
    knowledge in advance. Some strategies in approximating the prior include using
    a ***uniformly distributed prior***, where we assign the same probability to all
    possible outcomes, known as the Laplacian *principle of indifference*, and other
    strategies include using an ***informative prior***, namely a prior that aims
    to approximate the actual probability distribution of the event. In our example,
    this could be the Poisson distribution of daily rain.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: 'As we shift from viewing hypotheses as fixed values to treating them as random
    variables, the goal becomes to infer the full posterior distribution rather than
    a single estimate. Accordingly, we can now move from the treating hypotheses as
    point estimates toward statistical inference over random variables with corresponding
    probability distributions. To do this, we model the prior P(H) and the likelihood
    P(D|H) as probability distributions and compute the marginal probability of the
    data P(D), which is obtained either as a sum (the probability mass function for
    discrete variables), or an integral (the probability density for continuous variables).
    These components allow us to apply Bayes’ theorem to obtain the posterior distribution:
    P(H|D).'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c9f3c5e90d6360cd3e3aeeeef16e0a23.png)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
- en: The law of total probability (the marginal) expressed as a sum over the hypothesis
    space for discrete variables.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
- en: 'The *probability mass function* (PMF) is computed as the sum of all values
    of the distribution, equaling to one, whereas the *probability density function*
    (PDF) is the integral of the area under the curve of the distribution approaching
    one as the limit. For continuous variables we integrate because we’re dealing
    with infinite values in the distribution. Below is the formula for the marginal
    for continuous variables, namely the law of total probability expressed as the
    probability density function:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: '*概率质量函数*（PMF）是分布所有值的总和，等于1，而*概率密度函数*（PDF）是分布曲线下面积的积分，当极限接近1时。对于连续变量，我们进行积分，因为我们处理的是分布中的无限值。以下是连续变量的边缘公式，即总概率定律，表示为概率密度函数：'
- en: '![](../Images/6eac2cb442777dfe515dac5e2a31bf7c.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/6eac2cb442777dfe515dac5e2a31bf7c.png)'
- en: The law of total probability (the marginal) expressed as an integral over the
    hypothesis space for continuous variables.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 将总概率定律（边缘）表示为连续变量的假设空间的积分。
- en: Bayesian statistics forms an alternative framework to the more established frequentist
    approach in statistics. Even though its historical roots are as deep as the frequentist
    formulation, computational intractability limited its adoption for much of the
    twentieth century. With advances in computational power, Bayesian methods have
    undergone rapid development and increased application. Today, Bayesian statistics
    plays a central role in machine learning (ML), particularly probabilistic modeling,
    uncertainty estimation and decision-making under uncertainty.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 贝叶斯统计形成了统计学中更成熟的频率方法的一个替代框架。尽管其历史根源与频率公式的根源一样深，但计算上的不可行性限制了它在20世纪的大部分时间内的采用。随着计算能力的提高，贝叶斯方法经历了快速发展并得到了更广泛的应用。今天，贝叶斯统计在机器学习（ML）中扮演着核心角色，尤其是在概率建模、不确定性估计和不确定性下的决策。
- en: Kolmogorov Complexity
  id: totrans-43
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 柯尔莫哥洛夫复杂度
- en: We saw that our Kolmogorov axioms supplied an analytic framework for computing
    probabilities which included defining the union of disjoint sets as sums and their
    intersection as products. But it didn’t tell us how to compute joint sets. For
    this we invoked Bayes’ theorem, which utilizes set intersection to derive a universal
    formula of conditional probability.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 我们看到，我们的柯尔莫哥洛夫公理为计算概率提供了一个分析框架，其中包括将不相交集合的并集定义为和，它们的交集定义为积。但它没有告诉我们如何计算联合集合。为此，我们引用了贝叶斯定理，该定理利用集合交集推导出条件概率的通用公式。
- en: 'However, in our explication of Bayesian probability we identified the assignment
    of priors as a problem for the framework: *what information should we encode in
    the prior?* *Should we make it indifferent, as per the principle of indifference,
    or make it informative?*'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，在我们对贝叶斯概率的解释中，我们确定了先验的分配是框架的一个问题：*我们应该在先验中编码什么信息？* *我们应该根据无差异原则使其无差异，还是使其具有信息性？*
- en: 'This is where the notion of Kolmogorov Complexity comes in. While Kolmogorov
    complexity does not entail probability, through the ***Coding Theorem*** (which
    we will explicate below), it encodes an a posteriori meta-theoretic assumption
    as a mathematical selection bias. This meta-theoretic generalization states that
    *simplicity encodes higher probability*. If we are faced with the datum or outcome
    that the ground is wet, what hypothesis from the available store of all possible
    hypotheses should we select? Intuitively we want the hypothesis that assigns the
    highest probability to the observed outcome. But without additional information,
    how are we to know which hypothesis maximizes the probability of the outcome?
    Kolmogorov answered this within the bounds of algorithmic information theory:
    *the simplest hypothesis is the hypothesis that encodes the least information
    or the sequence with* ***shortest length***.'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是柯尔莫哥洛夫复杂性的概念所在。虽然柯尔莫哥洛夫复杂性与概率无关，但通过***编码定理***（我们将在下面解释），它将后验元理论假设编码为数学选择偏差。这种元理论概括表明*简单性编码了更高的概率*。如果我们面临的是地面湿润的数据或结果，我们应该从所有可能假设的存储库中选择哪个假设？直观上，我们想要的是赋予观察结果最高概率的假设。但没有额外的信息，我们如何知道哪个假设最大化了结果的可能性？柯尔莫哥洛夫在算法信息理论的范围内回答了这个问题：*最简单的假设是编码最少信息或最短序列的假设*。
- en: In order to understand the motivation behind this, let’s first state the problem
    within **algorithmic information theory**, then circle back to its application
    within less abstract, real-world scenarios.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 为了理解这一动机背后的原因，我们首先在**算法信息理论**中陈述这个问题，然后回到其在更抽象、现实世界场景中的应用。
- en: 'In algorithmic information theory, we encode symbolic sequences or strings
    according to some symbolic base such as base-2, binary strings. We define a Universal
    Turing Machine, U as a (partial — *since p cannot be defined for all outputs*)
    function from a program *p* to an output *x *, i.e.***U(p) = x***. Think of this
    as loosely cognate to: f(x) = y. The program *p* represents the hypothesis or
    theory, whereas the output *x* represents the data or the evidence. This mapping
    is important to understand the intuitive thrust of the theory.'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 在算法信息理论中，我们根据某种符号基（如二进制）对符号序列或字符串进行编码。我们定义一个通用图灵机 U，它是一个从程序 *p* 到输出 *x* 的（部分
    — *因为 p 不能定义所有输出*）函数，即***U(p) = x***。将其视为与：f(x) = y 类似。程序 *p* 代表假设或理论，而输出 *x*
    代表数据或证据。这种映射对于理解理论的直观动力很重要。
- en: 'The Kolmogorov Complexity of an information *object* defines as the shortest
    length of an algorithmic sequence that outputs that *object,* where K(x) defines
    the length of the program in bits:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 信息对象的可兰姆复杂性定义为输出该对象的最短算法序列长度，其中 K(x) 定义了程序的位数：
- en: '![](../Images/a15cfa310e1280109af4c748652eb983.png)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a15cfa310e1280109af4c748652eb983.png)'
- en: This expression tells us that out of all the programs ***p*** that produce ***x***
    as output, we select the shortest one, namely the minimal **{|p|}**. Kolmogorov
    complexity is defined over finite binary strings x ϵ {0,1}
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 这个表达式告诉我们，在所有产生 ***x*** 作为输出的程序 ***p*** 中，我们选择最短的一个，即最小的 **{|p|}**。可兰姆复杂性是在有限二进制字符串
    x ϵ {0,1} 上定义的
- en: 'What we now need to do is connect Kolmogorov complexity to probability theory
    so that it can inform our Bayesian priors. To do this, we notice a connection,
    at least superficial at first, between between Kolmogorov complexity and Shannon
    information entropy. Both seem to quantify some measure of information content:
    *K(x) defines length in bits whereas information entropy H defines the average
    amount of information required to encode the distribution of a random variable,
    where information is defined as uncertainty and quantified as the expected value
    of -log P(x) over all possible outcomes in bits*. The greater the uncertainty,
    the larger the amount of information required to encode the event. Both K(x) and
    H(X) are measured in bits, so what’s the difference?'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在需要做的是将可兰姆复杂性连接到概率理论，以便它可以告知我们的贝叶斯先验。为此，我们注意到可兰姆复杂性和香农信息熵之间至少在表面上存在联系。两者似乎都量化了某种信息内容：*K(x)
    定义了位数长度，而信息熵 H 定义了编码随机变量分布所需的平均信息量，其中信息定义为不确定性，并通过所有可能结果的 -log P(x) 的期望值来量化，以位为单位*。不确定性越大，编码事件所需的信息量就越大。K(x)
    和 H(X) 都以位为单位测量，那么它们之间的区别是什么？
- en: K(x) describes the length of the shortest program in bits that outputs the string
    x, whereas H(X) computes the number of bits needed on average to encode the program
    drawn from the probability distribution of possible values of x, over the sample
    space of X. It seems like some deep connection must hold between these two measures.
    What then is the relationship between Kolmogorov complexity and Shannon entropy?
    We need a bridge from raw length values to their probabilities.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: K(x) 描述了输出字符串 x 的最短程序的位数长度，而 H(X) 计算从 x 的可能值概率分布中抽取的程序所需的平均位数，在 X 的样本空间上。似乎这两个度量之间必须存在某种深刻的联系。那么，可兰姆复杂性和香农熵之间的关系是什么？我们需要从原始长度值到它们的概率之间的桥梁。
- en: 'If we isolate a single outcome from the Shannon distribution, we can define
    it as the self-information of *x,* the output of our program:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们从香农分布中隔离出一个单个结果，我们可以将其定义为 *x* 的自我信息，即我们程序的输出：
- en: '![](../Images/5947be3a992a6fea253bfba8a0f85d92.png)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/5947be3a992a6fea253bfba8a0f85d92.png)'
- en: Self-information of a single probability outcome
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 单个概率结果的自我信息
- en: 'This says that the self-information (think of this as the entropy measure for
    a single outcome) is proportional to the log-inverse probability of x occurring.
    I(x) is an instance of the full distribution that defines Shannon entropy for
    a particular event:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着自我信息（可以将其视为单个结果的熵度量）与 x 发生的对数逆概率成正比。I(x) 是全分布的一个实例，它定义了特定事件的香农熵：
- en: '![](../Images/6830d356616463d669f60c66cdbd42c6.png)'
  id: totrans-58
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6830d356616463d669f60c66cdbd42c6.png)'
- en: Shannon entropy defines the expected self-information for the entire distribution
    as average entropy.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 香农熵定义了整个分布的预期自信息为平均熵。
- en: Now, the **Coding Theorem** states that Kolmogorov Complexity is approximately
    equal to the Shannon information contained in a string.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，**编码定理**指出， Kolmogorov复杂度大约等于字符串中包含的香农信息。
- en: '![](../Images/ce7e959acf0223894abd10cef942f087.png)'
  id: totrans-61
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ce7e959acf0223894abd10cef942f087.png)'
- en: 'This states that the shortest program that outputs x is approximately as long
    as the log-inverse of the total probability that outputs x. In other words, our
    Shannon distribution contains the shortest program as the one assigned with the
    highest probability! We have now connected raw program length with probability
    theory: ***the more compressible a program output is, the more likely it is to
    occur. ***'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 这表明输出x的最短程序大约与输出x的总概率的对数倒数一样长。换句话说，我们的香农分布包含最短程序，作为分配最高概率的程序！我们现在已经将原始程序长度与概率理论联系起来：***程序输出越可压缩，其发生的可能性就越大。***
- en: 'This is how we connect algorithmic compressibility, namely program length defined
    for an instance, to probability and information theory, enabling us to treat compressibility
    as a *Bayesian likelihood*. On a sidenote, the reason we don’t have a precise
    equality in the equation above is that the postulated relationship is not exact
    up to an additive constant c, which depends on the choice of Universal Turing
    Machine (UTM), making K(x) machine-dependent prior to an upper bound c across
    UTMs:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是我们将算法压缩性，即针对实例定义的程序长度，与概率和信息理论联系起来，使我们能够将压缩性视为*贝叶斯似然*的方法。顺便提一下，方程上我们没有精确的等式，是因为所假设的关系不是精确的，直到一个加性常数c，这取决于通用图灵机（UTM）的选择，使得K(x)在所有UTM的上限c之前是机器相关的先验：
- en: '![](../Images/1bad8d69d9a73034ebad13e810804383.png)'
  id: totrans-64
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/1bad8d69d9a73034ebad13e810804383.png)'
- en: Now you’re probably wondering, what kind of distribution enables us to assign
    probabilities to all possible program lengths? That distribution is the *Solomonoff
    Universal Prior*.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你可能想知道，哪种分布能让我们为所有可能的程序长度分配概率？这种分布就是*索洛蒙诺夫通用先验*。
- en: Solomonoff Induction
  id: totrans-66
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 索洛蒙诺夫归纳
- en: 'As we discussed, the choice of prior affects the posterior especially when
    sample sizes are sufficiently small. This begs the question: *what if we had a
    prior function that could be applied to all possible events in the sample space?*
    This is what Solomonoff’s prior encodes. Precisely, the Solomonoff prior encodes
    the probability of observing an output sequence *x* as the total probability that
    a random program outputs x on a universal Turing machine.'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们讨论的，先验的选择会影响后验，尤其是在样本大小足够小的时候。这引发了一个问题：*如果我们有一个可以应用于样本空间中所有可能事件的先验函数会怎样？*这正是索洛蒙诺夫先验所编码的内容。确切地说，索洛蒙诺夫先验编码了观察到一个输出序列*x*的概率，即随机程序在通用图灵机上输出x的总概率。
- en: Now, let’s take a look at Solomonoff’s universal prior formula, which should
    click into place our earlier assertion that algorithmic probability is intimately
    connected with simplicity. Solomonoff defined the universal prior P(x) as the
    sum of the probabilities of all finite binary prefix-free programs p, where the
    probability that p is defined by its simplicity, 2^-|p|.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们看一下索洛蒙诺夫的通用先验公式，它应该会印证我们之前的断言，即算法概率与简单性密切相关。索洛蒙诺夫将通用先验P(x)定义为所有有限二进制前缀无关程序p的概率之和，其中p的概率由其简单性定义，即2^-|p|。
- en: '![](../Images/c78337d314877629fe3402d9fc20ed55.png)'
  id: totrans-69
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c78337d314877629fe3402d9fc20ed55.png)'
- en: The Universal Solomonoff Prior
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 通用索洛蒙诺夫先验
- en: Because we define the probability of a program as shrinking by half for every
    additional bit it contains, the more information bits in the program, the smaller
    its weight in the distribution. Therefore, the total probability over all prefix-free
    binary programs will be dominated by shortest programs.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 因为我们将程序的每个额外比特包含的概率定义为减半，所以程序中的信息比特越多，其在分布中的权重就越小。因此，所有前缀无关二进制程序的总概率将由最短程序主导。
- en: 'We stated that the Solomonoff prior is defined for *prefix-free* *finite* *binary*
    sequences of strings. Let’s ensure we understand each of these qualifiers. We
    use binary sequences because a Universal Turing machine can be defined in terms
    of binary inputs and outputs, where we can represent any information object with
    binary encoding. We define the prior over finite sequences in order to meet the
    conditions of computability: infinite sequences are Turing incomputable.'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
- en: 'A set of strings is prefix free if no string in the set is a prefix of another:'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ecf215b416b1b6830bf108f420b101de.png)'
  id: totrans-74
  prefs: []
  type: TYPE_IMG
- en: This yields sets of disjoint finite binary string sequences. In other words,
    we need disjoint sets to compute their union. Per the Kolmogorov axiom of additivity,
    the probability of the union of the members of the set can be expressed as the
    sum of their probabilities.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
- en: 'Disjointness ensures that the probability associated with each hypothesis or
    prior string obeys Kraft’s inequality, which states that the sum of all probabilities
    does not exceed the unit interval:'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/24251eda743188c8a39394c256ebce77.png)'
  id: totrans-77
  prefs: []
  type: TYPE_IMG
- en: Kraft’s Inequality
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
- en: This tells us that for some some prefix-free string C, the probability of that
    sequence is expressed as 2 raised to the negative exponent, where the exponent
    describes the ***length***. Because all the sequences are disjoint, their sum
    cannot exceed 1 (though it can be less than one, making it a semi-measure). This
    enables us to treat code weights as probabilities and consequently to compute
    the probability mass function of the entire distribution by summing over string
    weights.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
- en: 'Accordingly, Solomonoff’s prior is defined as the sum of the weights or probabilities
    of finite binary programs p:'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c78337d314877629fe3402d9fc20ed55.png)'
  id: totrans-81
  prefs: []
  type: TYPE_IMG
- en: The Universal Solomonoff Prior
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
- en: 'Therefore, in order to compute the probability of getting some output x from
    a possible program, we condition that probability to the sum of probabilities
    of all possible programs:'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f55af271811ca746526e3c060ba4e152.png)'
  id: totrans-84
  prefs: []
  type: TYPE_IMG
- en: The Solomonoff marginal
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
- en: 'Because p is deterministic, the likelihoods and the posterior are defined as
    delta functions: either a program outputs x or it doesn’t.'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/4f1bb4e77572a7c86b1d2ed929e5df02.png)'
  id: totrans-87
  prefs: []
  type: TYPE_IMG
- en: 'Further, because the prior is defined over prefix-free binary strings, we can
    express the conditionalization in terms of bitwise strings:'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/9f8819931b33637e0ebcd0879e6185f3.png)'
  id: totrans-89
  prefs: []
  type: TYPE_IMG
- en: 'Instead of a joint distribution over events, we have a weighted sum over bitstrings
    that syntactically generate x as a stand-in for all possible events. This reveals
    some of the limitations of the formalism: ***does formal compressibility suffice
    as an explanatory bias for certain programs or theories over others?*** We will
    delve into these limitations later such as the lack of structural bias and representational
    alignment.'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
- en: 'Together with the Coding Theorem, the Solomonoff prior tenders a deep connection
    between induction and compressibility: ***generalization is revealed to be formally
    equivalent to information compression such that the more compressible a dataset
    is, the more probable the program that produces it.*** In the real world, however,
    we know that the most “compressible” theories are not always the ones with the
    greatest explanatory or predictive power, though the preponderance of best theoretical
    approximations tend toward simplicity.'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
- en: 'The formula below expresses our notions of algorithmic complexity, the universal
    prior, and information entropy as approximately equivalent to each other (under
    specific ranges of x):'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/6e5daad8e197ef19dd6aee8ed53797e5.png)'
  id: totrans-93
  prefs: []
  type: TYPE_IMG
- en: AIXI
  id: totrans-94
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As it stands, our theory of universal induction which combines the Solomonoff
    prior and Bayesian posteriors is not defined for a constrained agent. What if
    we combine **Solomonoff induction** with **sequential decision theory**?
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
- en: 'This is where Marcus Hutter’s **AIXI** **theory** comes in: it integrates Solomonoff
    induction, decision theory, and reinforcement learning so that our universal prior
    can do work for an agent.'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
- en: Transitioning from Solomonoff induction into the territory of decision theory
    and reinforcement learning requires expanding our ontology to **actions**, **observations**,
    and **rewards**. AIXI models a universal agent whose interaction with any computable
    environment enables it to choose the action that maximizes expected rewards. In
    more formal terms, AIXI selects an action at each time step and in return receives
    an observation and reward from the environment. How does AIXI select the optimal
    action? As we will see, because AIXI encodes an ideal Bayesian agent, it constitutes
    a model-based agent. However, unlike a typical Bellman-based deterministic agent
    (which solves the Bellman equations to determinate optimality, see my earlier
    article on [reinforcement learning](https://towardsdatascience.com/an-introduction-to-reinforcement-learning-995737d3f1d/)
    for that), AIXI maintains uncertainty over all possible environments. It does
    so by computing the sum of products of the likelihoods, namely the probabilities
    of environmental feedback given the space of actions, and the Solomonoff weights
    assigned to every computable environment (or program), called the *universal mixture*.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
- en: 'Put succinctly, the universal mixture constitutes a term within AIXI that defines
    the probabilistic prediction of the next observation and reward pair given the
    current action. It is computed as the sum of products of the weighted distribution
    of every possible environment. The universal mixture exhausts the environment
    space by summing over the product of each environment weight and its probability
    distribution where each environment model ***μ*** assigns probabilities to observation-reward
    sequences given hitherto actions. The universal mixture is given by the formula
    below:'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/8408e76121b77a4123a21d95fab36377.png)'
  id: totrans-99
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/8408e76121b77a4123a21d95fab36377.png)'
- en: The universal mixture assigns probabilities to future observation and reward
    pairs given action history.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 通用混合模型根据动作历史为未来的观察和奖励对分配概率。
- en: The universal mixture accumulates a predictive distribution of the environment
    through each action that it takes. Think of **ξ** as assigning probabilities to
    every possible future trajectory of observations and rewards given a sequence
    of actions.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 通用混合模型通过它采取的每个动作累积环境的预测分布。将 **ξ** 视为在给定的动作序列下，为每个可能的观察和奖励的未来轨迹分配概率。
- en: 'The universal mixture provides us with the probability of observation and reward
    pairs under the action history, but it doesn’t tell us which of these trajectories
    is the most values or reward maximizing. For this we sum the reward per environment
    or trajectory:'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 通用混合模型为我们提供了在动作历史下观察和奖励对的概率，但它没有告诉我们这些轨迹中哪一个是最有价值的或奖励最大的。为此，我们按环境或轨迹汇总奖励：
- en: '![](../Images/87e721eb88c68c92b12607a75efada31.png)'
  id: totrans-103
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/87e721eb88c68c92b12607a75efada31.png)'
- en: Sum of accumulated rewards where k is the time index and m is the farthest timestep.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 累积奖励的总和，其中 k 是时间索引，m 是最远的时间步。
- en: 'In order to find out which trajectory to choose, we multiply the sum of rewards
    per trajectory by the probability assigned to that trajectory by the universal
    mixture:'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 为了找出要选择哪个轨迹，我们将每个轨迹的奖励总和乘以通用混合模型分配给该轨迹的概率：
- en: '![](../Images/b993b904672a7ebb3e5dbe9cc403816d.png)'
  id: totrans-106
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b993b904672a7ebb3e5dbe9cc403816d.png)'
- en: Calculation of expected reward under environment prediction
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 在环境预测下的预期奖励计算
- en: As such, we compute expectation by weighting each trajectory by its cumulative
    rewards.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们通过按累积奖励加权每个轨迹来计算期望。
- en: 'After we compute expectations, the final step involves selecting the action
    that maximizes expected return given the weighting of rewards and environment
    probabilities. For this we employ the **arg max** function as follows:'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们计算期望之后，最后一步涉及根据奖励和环境概率的加权选择最大化预期回报的动作。为此，我们采用 **arg max** 函数如下：
- en: '![](../Images/28512ab1af254969f808dcd4e22f9747.png)'
  id: totrans-110
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/28512ab1af254969f808dcd4e22f9747.png)'
- en: '**Arg max** selects the action that maximizes cumulative returns across all
    possible trajectories:'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: '**Arg max** 选择最大化所有可能轨迹累积回报的动作：'
- en: '![](../Images/0e77717523ab2bf766a18462816f9eb8.png)'
  id: totrans-112
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0e77717523ab2bf766a18462816f9eb8.png)'
- en: AIXI aims to formalize a universal agent whose equipment with the Solomonoff
    prior biases it toward environments with minimal Kolmogorov complexity. Other
    than assuming all possible computable environments and associating compressibility
    with higher probability, the AIXI agent acquires structural bias from interaction
    with the environment. This ensures that AIXI should be able to navigate any environment
    (provided that it’s structured/computable to begin with).
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: AIXI 旨在形式化一个通用代理，其配备的 Solomonoff 先验偏置使其倾向于具有最小 Kolmogorov 复杂度的环境。除了假设所有可能的可计算环境并将压缩性与更高的概率相关联之外，AIXI
    代理通过与环境的交互获得结构偏置。这确保了 AIXI 应该能够导航任何环境（前提是它一开始就是结构化的/可计算的）。
- en: While AIXI formalizes a universal agent, it does not sufficiently bias this
    agent so that it can efficiently navigate actual environments. That is to say,
    the procedures for optimal action or decision that AIXI formalizes do not encode
    efficient structural biases such as domain-specific heuristics or architectural
    constraints that would accelerate learning. However, this feature is a consequence
    of AIXI’s scope of setting universal bounds on decision optimality across all
    possible environments. In principle, AIXI acquires efficient structural biases
    indirectly through Bayesian updating. With sufficient environmental sampling,
    AIXI asymptotically converges to the true environment across infinite interactions,
    assuming the environment is computable and has non-zero prior. However, in practice
    convergence can be inefficient due to overspreading over posterior weights leaving
    the agent’s actions suboptimal for an indefinite amount of time.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然 AIXI 形式化了一个通用代理，但它并没有足够地偏置这个代理，使其能够有效地导航实际环境。也就是说，AIXI 形式化的最优行动或决策的程序没有编码有效的结构偏差，例如特定领域的启发式方法或架构约束，这些偏差可以加速学习。然而，这一特性是
    AIXI 在所有可能环境中设置决策最优通用界限范围的结果。原则上，AIXI 通过贝叶斯更新间接地获得有效的结构偏差。在足够的环境采样下，AIXI 在无限次的交互中，假设环境是可计算的并且具有非零先验，渐近收敛到真实环境。然而，在实践中，由于后验权重过度扩散，收敛可能效率低下，导致代理的行动在不确定的时间内次优。
- en: Noncomputability & Structural Bias
  id: totrans-115
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 不可计算性与结构偏差
- en: In its universal form AIXI is not algorithmically implementable because Kolmogorov
    complexity and the Solomonoff prior are both not computable. The class of all
    programs that halt and produce valid (computable) environments is uncountable
    or not recursively enumerable. Computing the universal prior requires an infinite
    simulation of environments whereas computing future expectations requires infinite
    foresight, all of which are mathematically intractable.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 在其通用形式中，AIXI 由于 Kolmogorov 复杂性和 Solomonoff 先验都是不可计算的，因此无法通过算法实现。所有能够停止并产生有效（可计算）环境的程序集合是不可数的或不是递归可枚举的。计算通用先验需要无限的环境模拟，而计算未来期望则需要无限的前瞻性，所有这些都是数学上难以处理的。
- en: 'For this reason, computable approximations of AIXI exist such as **AIXItl.
    AIXItl** introduces time and program-length bounds (which is what the tl stands
    for) restricting the environment space M*tl* to ≤ *t* time steps and *l* bits
    long**.** However, **AIXItl** is still inefficient since the combinatorial possibilities
    of environments is exponential: O(2^l). Model-free alternatives such as ***DQN***
    and gradient-based alternatives such as ***Dreamer*** and ***World Models*** represent
    alternatives in the search for a universal agent. These later alternatives use
    heuristics and sampling-based methods for exploration such as **Monte Carlo Tree
    Search** for optimal decision making. Fundamentally, the contest lies between
    model-based and model-free methods, the latter which derive their biases entirely
    from interaction with the environment.'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，存在 AIXI 的可计算近似，例如 **AIXItl**。**AIXItl** 引入了时间和程序长度界限（这就是 tl 的含义），将环境空间 M*tl*
    限制在 ≤ *t* 步时间和 *l* 比特长**。**然而，**AIXItl** 仍然效率低下，因为环境的组合可能性是指数级的：O(2^l)。无模型替代方案，如
    ***DQN***，以及基于梯度的替代方案，如 ***Dreamer*** 和 ***World Models***，代表了在寻找通用代理方面的替代方案。这些后来的替代方案使用启发式方法和基于采样的方法进行探索，例如
    **蒙特卡洛树搜索** 用于最优决策。从根本上说，这场竞赛在于基于模型和无模型方法之间，后者完全从与环境交互中获取偏差。
- en: Representational Alignment
  id: totrans-118
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 表示对齐
- en: As we already stated, AIXI treats the universe as a computable sequence represented
    through finite binary strings. The assumption that the environment is Turing computable
    is not entailed in the Church-Turing Thesis and thereby represents an additional
    assumption of AIXI. The truth of this assumption, in principle, that is, not with
    respect to a realizable machine, is an open question even though there’s good
    reason to think it false.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们之前所述，AIXI 将宇宙视为一个可计算的序列，通过有限的二进制字符串来表示。环境是图灵可计算这一假设并不包含在丘奇-图灵论题中，因此代表了 AIXI
    的一个额外假设。从原则上讲，即不是针对一个可实现的机器，这个假设的真实性是一个悬而未决的问题，尽管有很好的理由认为它是错误的。
- en: As we saw AIXI treats observations as bitstrings, whereas real world data require
    structured representations such as *causal structure*, *temporal relationships*,
    and *spatial dimensions*, to name a few. In order to encode richer structures
    within AIXI we would need priors that encode structured representations such as
    graphs, tensors, differential equations etc. Encoding structural biases would
    make AIXI more efficient, but at the expense of its universality. The cost of
    encoding real-world representational structures within a Bayesian model is therefore
    specializing the model at the expense of environment-generalizability. Given that
    in practice an agent that realizes AIXI is not possible, we should therefore look
    to agents that encode real-world representations such as AIXI*tl*, model-free
    agents or deep-learning-based agents.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们所见，AIXI将观察视为位串，而现实世界的数据需要结构化的表示，例如*因果关系结构*、*时间关系*和*空间维度*等。为了在AIXI中编码更丰富的结构，我们需要先验知识来编码结构化的表示，如图、张量、微分方程等。编码结构偏差会使AIXI更有效率，但会牺牲其通用性。因此，在贝叶斯模型中编码现实世界的表示结构是以牺牲环境泛化能力为代价来专门化模型。鉴于在实践中实现AIXI的代理是不可能的，因此我们应该寻找编码现实世界表示的代理，如AIXI*tl*、无模型代理或基于深度学习的代理。
- en: Active Inference
  id: totrans-121
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 主动推理
- en: We saw that AIXI incorporates a maximally informative prior, but this prior
    is entirely unstructured and embodies no prior knowledge about the world except
    the meta-selection bias for short or compressible programs as being the most likely.
    We also saw that this makes both AIXI and the Solomonoff prior computationally
    intractable, which precludes its implementation in its complete form.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 我们看到AIXI包含一个最大信息先验，但这个先验是完全无结构的，并且除了对短或可压缩程序作为最可能的选择的元选择偏差之外，不包含关于世界的任何先验知识。我们还看到，这使得AIXI和Solomonoff先验在计算上不可行，这阻止了其完整形式的实现。
- en: Another strand of agent modeling, more recently branded *active inference*,
    whose centerpiece is the [*free-energy minimization principle*](https://en.wikipedia.org/wiki/Free_energy_principle),
    aims to integrate the modeling lineages of utility maximization, reinforcement
    learning, Bayesian inference, predictive coding, statistical mechanics, and far
    from thermodynamic equilibrium dynamics into the unified model of a hierarchical
    generative Bayesian agent. Optimality in the active inference generative Bayesian
    model consists of minimizing free energy, where free energy is defined as the
    expected surprise about the joint occurrence of sensations and their inferred
    causes.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 另一条代理建模的线索，最近被命名为*主动推理*，其核心是[*自由能最小化原理*](https://en.wikipedia.org/wiki/Free_energy_principle)，旨在将效用最大化、强化学习、贝叶斯推理、预测编码、统计力学以及远离热力学平衡动力学等建模谱系整合到层次生成贝叶斯代理的统一模型中。主动推理生成贝叶斯模型中的最优性在于最小化自由能，其中自由能被定义为对感觉和其推断原因共同发生的预期惊讶。
- en: Put in colloquial terms, the generative model predicts future perceptions given
    actions through a forward model that estimates the causes of those sensations
    through the prior, and it conversely estimates or predicts the actions required
    to bring about preferred states through an inverse model. The agent dynamically
    navigates the environment through loops of forward and inverse models or, more
    simply, loops perception and action. Free energy results from mismatch between
    predictions and environmental feedback, minimized through hierarchical Bayesian
    updating of the model’s priors.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 用通俗的话来说，生成模型通过前向模型预测未来感知，该模型通过先验估计那些感觉的原因，并通过逆模型相反地估计或预测实现所需状态所需采取的行动。代理通过前向和逆模型的循环或更简单地说，通过感知和行动的循环动态地导航环境。自由能来自预测和环境反馈之间的不匹配，通过模型先验的分层贝叶斯更新来最小化。
- en: 'The formula below formally expresses the computation of variational free energy
    as the divergence between the recognition density (the approximate posterior)
    and the conditional density (the true posterior), where ỹ stands for observed
    input, 𝜗 for latent causes, p( ỹ, 𝜗) defines the generative model as the joint
    probability density of perceptions and latent causes, whereas q(𝜗) defines the
    approximate posterior:'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的公式形式上表达了变分自由能的计算，即识别密度（近似后验）与条件密度（真实后验）之间的散度，其中 ỹ 表示观察到的输入，𝜗 表示潜在原因，p( ỹ,
    𝜗) 定义生成模型为感知和潜在原因的联合概率密度，而 q(𝜗) 定义近似后验：
- en: '![](../Images/5e1f11625b07bb6395b0034e33c03e06.png)'
  id: totrans-126
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/5e1f11625b07bb6395b0034e33c03e06.png)'
- en: The first expression in the formula defines the Kullback-Leibler divergence
    between the approximate posterior q(𝜗) and the true posterior p(𝜗| ỹ) minus the
    log model evidence log p(ỹ). In general, the Kullback-Leibler divergence quantifies
    the geometric divergence between a model distribution Q and the actual distribution
    P. Free energy results from the information-theoretic divergence between the approximate
    and true posterior offset by the log model evidence. We compute variational free
    energy by integrating the log ratio between the approximate and true joint distributions
    over latent causes. The second term expresses this same quantity as the sum of
    the entropy of the approximate posterior q(𝜗) and the cross-entropy between the
    posterior and the generative model p( ỹ, 𝜗). Minimizing free energy amounts to
    reducing the divergence between the recognition model and the conditional density.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
- en: Both AIXI and Active Inference supply optimal Bayesian agents in different ways.
    But whereas AIXI is formally non-computable in its unbounded form, Active Inference
    enables tractable approximations via variational Bayesian models. Optimization
    in AIXI consists of maximizing rewards, whereas in Active Inference in minimizing
    free energy. In the former, model accuracy results implicitly from maximizing
    rewards, whereas in the latter maximizing rewards results implicitly from minimizing
    expected surprise or free energy. In this regard, Active Inference constitutes
    a structured generative model that hierarchically estimates latent causes, guiding
    action selection through inference rather than AIXI’s enumeration, which selects
    the reward maximizing action from all possible environments. Yet, Active Inference
    remains an incomplete framework since it glosses over many details about concrete
    agents, such as goal-setting, model learning (where it is extremely vague), and
    a viable description of agent boundary (the Markov blanket formulation is insufficient
    and unable to distinguish biological agents from physical systems that do not
    amount to actual agents).
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
