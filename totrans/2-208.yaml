- en: 'Data Science: From School to Work, Part V'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/data-science-from-school-to-work-part-v/](https://towardsdatascience.com/data-science-from-school-to-work-part-v/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*Make it work, then make it beautiful, then if you really, really have to,
    make it fast. 90 percent of the time, if you make it beautiful, it will already
    be fast. So really, just make it beautiful!* ([Source](https://henrikwarne.com/2021/04/16/more-good-programming-quotes-part-5/))'
  id: totrans-2
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-3
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — *Joe Armstrong* (co-designers of the Erlang programming language.)
  id: totrans-4
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '<mdspan datatext="el1750880886773" class="mdspan-comment">It is the last</mdspan>
    article about Python for the series “Data Science: From School to Work.” Since
    the beginning, you have learned how to [manage your Python project with UV](https://towardsdatascience.com/data-scientist-from-school-to-work-part-i/),
    [how to write a clean code using PEP and SOLID principles](https://towardsdatascience.com/data-science-from-school-to-work-part-ii/),
    [how to handle errors and use loguru to log your code](https://towardsdatascience.com/data-science-from-school-to-work-part-iii/)
    and [how to write tests](https://towardsdatascience.com/data-science-from-school-to-work-part-iv/).'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: Now you are in a position to create working, production-ready code. But code
    is never perfect and can always be improved. A final (optional, but highly recommended)
    step in creating code is optimization.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: To optimize your code, you need to be able to track what’s going on in it. To
    do so, we use tools called **Profilers**. They generate profiles of your code.
    It means a set of statistics that describes how often and for how long various
    parts of the program executed. They make it possible to identify bottlenecks and
    parts of the code that consume too many resources. In other words, they show where
    your code should be optimized.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: Today, there is such a proliferation of profilers in Python that the default
    profiler in Pycharm is called [yappi](https://pypi.org/project/yappi/) for “Yet
    Another Python Profiler”.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: 'This article is therefore not an exhaustive list of all existing profilers.
    In this article, I present a tool for each aspect of the code we want to profile:
    memory, time and CPU/GPU consumption. Other packages will be mentioned with some
    references but will not be detailed.'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: I – Memory profilers
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Memory profiling is the technique of monitoring and evaluating a program’s memory
    utilization while running. This method helps developers in finding memory leaks,
    optimizing memory utilization, and comprehending their programs’ memory consumption
    patterns. Memory profiling is crucial to prevent applications from using more
    memory than necessary and causing sluggish performance or crashes.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
- en: 1/ memory-profiler
  id: totrans-13
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '`memory_profiler` is an easy-to-use Python module designed to profile memory
    usage of a script. It depends on `psutil` module. To install the package, simply
    type:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  id: totrans-15
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Profiling executable
  id: totrans-16
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: One of the advantages of this package is that it is not limited to pythonic
    use. It installs the `mprof` command that allows monitoring the activity of any
    executable.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 这个包的一个优点是它不仅限于 Pythonic 使用。它安装了 `mprof` 命令，允许监控任何可执行文件的活动。
- en: 'For instance, you can monitor the memory consumption of applications like `ollama`
    by running this command:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，你可以通过运行此命令来监控 `ollama` 等应用程序的内存消耗：
- en: '[PRE1]'
  id: totrans-19
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'To see the result, you have to install `matplotlib` first. Then, you can plot
    the recorded memory profile of your executable by running:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 要查看结果，你必须首先安装 `matplotlib`。然后，你可以通过运行以下命令来绘制你的可执行文件记录的内存配置文件：
- en: '[PRE2]'
  id: totrans-21
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'The graph then looks like this:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 图形看起来如下所示：
- en: '![](../Images/8ced83ef5035fcf2b0b2ba8b85bf3e45.png)'
  id: totrans-23
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/8ced83ef5035fcf2b0b2ba8b85bf3e45.png)'
- en: Output of the command mprof plot after the monitoring of the executable ollama
    run gemma3:4b (from the author).
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 监控可执行文件 ollama 运行 gemma3:4b 后的命令 mprof plot 的输出（作者提供）。
- en: Profiling Python code
  id: totrans-25
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 分析 Python 代码
- en: Let’s get back to what brings us here, the monitoring of a Python code.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们回到我们为什么会在这里的原因，即对 Python 代码的监控。
- en: '`memory_profiler` works with a line-by-line mode using a simple decorator `@profile`.
    First, you decorate the interest function and then you run the script. The output
    will be written directly to the terminal. Consider the following `monitoring.py`
    script:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: '`memory_profiler` 使用简单的装饰器 `@profile` 以按行模式工作。首先，你装饰感兴趣的函数，然后运行脚本。输出将直接写入终端。考虑以下
    `monitoring.py` 脚本：'
- en: '[PRE3]'
  id: totrans-28
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: It is important to notice that it is not necessary to import the package `from
    memory_profiler import profile` at the begin of the script. In this case you have
    to specify some specific arguments to the Python interpreter.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 重要的是要注意，在脚本开头不需要导入包 `from memory_profiler import profile`。在这种情况下，你必须向 Python
    解释器指定一些特定的参数。
- en: '[PRE4]'
  id: totrans-30
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'And you have the following output with a line-by-line details:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 你将得到以下按行详细输出的结果：
- en: '![](../Images/925be47ee299701ba93b526d72c844bd.png)'
  id: totrans-32
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/925be47ee299701ba93b526d72c844bd.png)'
- en: Output of the command -m memory_profiler monitoring.py (from author)
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 命令 -m memory_profiler monitoring.py 的输出（作者提供）
- en: The output is a table with five columns.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 输出是一个包含五列的表格。
- en: 'Line #: The line number of the profiled code'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 行号：被分析代码的行号
- en: 'Mem usage: The memory usage of the Python interpreter after executing that
    line.'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 内存使用：执行该行后 Python 解释器的内存使用情况。
- en: 'Increment: The change in memory usage compared to the previous line.'
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 增量：与上一行相比的内存使用变化。
- en: 'Occurrences: The number of times that line was executed.'
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 出现次数：该行被执行的次数。
- en: 'Line Contents: The actual source code.'
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 行内容：实际的源代码。
- en: This output is very detailed and allows very fine monitoring of a specific function.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 此输出非常详细，允许对特定函数进行非常精细的监控。
- en: '**Important**: Unfortunately, this package is no longer actively maintained.
    The creator is looking for a substitute.'
  id: totrans-41
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**重要**：不幸的是，这个包不再积极维护。创建者正在寻找替代品。'
- en: 2/ tracemalloc
  id: totrans-42
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2/ tracemalloc
- en: '`tracemalloc` is a built-in module in Python that tracks memory allocations
    and deallocations. Tracemalloc provides an easy-to-use interface for capturing
    and analyzing memory usage snapshots, making it an invaluable tool for any Python
    developer.'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: '`tracemalloc` 是 Python 中的一个内置模块，用于跟踪内存分配和释放。Tracemalloc 提供了一个易于使用的接口来捕获和分析内存使用快照，使其成为任何
    Python 开发者的宝贵工具。'
- en: 'It offers the following details:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 它提供了以下详细信息：
- en: Shows where each object was allocated by providing a traceback.
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过提供跟踪回溯来显示每个对象是如何被分配的。
- en: Gives memory allocation statistics by file and line number, including the overall
    size, count, and average size of memory blocks.
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过文件和行号提供内存分配统计信息，包括总体大小、计数和内存块的平均大小。
- en: Allows you to compare two snapshots to identify potential memory leaks.
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 允许你比较两个快照以识别潜在的内存泄漏。
- en: The package `tracemalloc` may be usefull to identify memory leak in your code.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 包 `tracemalloc` 可能有助于识别代码中的内存泄漏。
- en: 'Personally, I find it less intuitive to set up than the other packages presented
    in this article. Here are some links to go further:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 个人而言，我发现它比本文中介绍的其它包设置起来不太直观。以下是一些进一步了解的链接：
- en: 'An article by [Arsène Tripard](https://www.linkedin.com/in/ars%C3%A8ne-tripard-50a535146/)
    detailling to identify memory leak: [link](https://data-ai.theodo.com/en/technical-blog/how-data-ml-engineers-can-uncover-memory-leaks-before-they-hit-production)'
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 由 [Arsène Tripard](https://www.linkedin.com/in/ars%C3%A8ne-tripard-50a535146/)
    撰写的文章，详细介绍了如何识别内存泄漏：[链接](https://data-ai.theodo.com/en/technical-blog/how-data-ml-engineers-can-uncover-memory-leaks-before-they-hit-production)
- en: 'A detail article, from the blog [CoderzColumn](https://coderzcolumn.com/),
    describing how to use this package: [link](https://coderzcolumn.com/tutorials/python/tracemalloc-how-to-trace-memory-usage-in-python-code)'
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一篇来自博客 [CoderzColumn](https://coderzcolumn.com/) 的详细文章，描述了如何使用此包：[链接](https://coderzcolumn.com/tutorials/python/tracemalloc-how-to-trace-memory-usage-in-python-code)
- en: '* * *'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: II – Time profilers
  id: totrans-53
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: II – 时间分析器
- en: Time profiling is the process of measuring the time spent in different parts
    of a program. By identifying performance bottlenecks, you can focus their optimization
    efforts on the parts of the code that will have the most significant impact.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 时间分析是测量程序不同部分所花费时间的进程。通过识别性能瓶颈，你可以将优化努力集中在代码中将对性能产生最大影响的部分。
- en: 1/ line-profiler
  id: totrans-55
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1/ line-profiler
- en: The `line-profiler` package is quite similar to `memory-profiler`, but it serves
    a different purpose. It’s designed to profile specific functions by measuring
    the execution time of each line within those functions. To use LineProfiler effectively,
    you need to explicitly specify which functions you want it to profile by simply
    adding the `@profile` decorator above them.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: '`line-profiler` 包与 `memory-profiler` 非常相似，但它的用途不同。它被设计用来通过测量这些函数中每行的执行时间来分析特定的函数。为了有效地使用
    LineProfiler，你需要明确指定你想要它分析的函数，只需在这些函数上方添加 `@profile` 装饰器即可。'
- en: 'To install it just type:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 要安装它，只需输入：
- en: '[PRE5]'
  id: totrans-58
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Considering the following script named `monitoring.py`
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑以下名为 `monitoring.py` 的脚本
- en: '[PRE6]'
  id: totrans-60
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: To measure the execution time of the function `main()` and `create_list()`,
    we add the decorator `@profile`.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 要测量 `main()` 和 `create_list()` 函数的执行时间，我们添加了 `@profile` 装饰器。
- en: The easiest way to get a time profiling of this script to use the `kernprof`
    script.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 获取此脚本的执行时间分析的最简单方法是使用 `kernprof` 脚本。
- en: '[PRE7]'
  id: totrans-63
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: It will create a binary file named `your_script.py.lprof`. The argument `-v`
    allows to show directyl the output in the terminal.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 它将创建一个名为 `your_script.py.lprof` 的二进制文件。参数 `-v` 允许直接在终端显示输出。
- en: 'Otherwise, you can view the results later like so:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 否则，你可以稍后像这样查看结果：
- en: '[PRE8]'
  id: totrans-66
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'It provides the following informations:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 它提供了以下信息：
- en: '![](../Images/ce0fe08ae246c479950e6e745a94e47a.png)'
  id: totrans-68
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ce0fe08ae246c479950e6e745a94e47a.png)'
- en: Output of the command kernprof -lv monitoring.py (from author)
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 命令 kernprof -lv monitoring.py 的输出（作者提供）
- en: There are two tables, one by profiled function. Each table containes the following
    informations
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 有两个表格，一个按分析函数分类。每个表格包含以下信息
- en: 'Line #: The line number in the file.'
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 行号：文件中的行号。
- en: 'Hits: The number of times that line was executed.'
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 击中次数：该行被执行的次数。
- en: 'Time: The total amount of time spent executing the line in the **timer’s units**.
    In the header information before the tables, you will see a line “Timer unit:”
    giving the conversion factor to seconds. It may be different on different systems.'
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 时间：执行该行所花费的总时间，以**计时器单位**计。在表格前面的头部信息中，你会看到一行“计时器单位：”，给出转换为秒的转换因子。在不同的系统上可能不同。
- en: 'Per Hit: The average amount of time spent executing the line once in the timer’s
    units'
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每次击中：执行该行一次的平均时间，以计时器单位计。
- en: '% Time: The percentage of time spent on that line relative to the total amount
    of recorded time spent in the function.'
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '% 时间：该行相对于记录的函数中花费的总时间的百分比。'
- en: 'Line Contents: The actual source code.'
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 行内容：实际的源代码。
- en: 1/ cProfile
  id: totrans-77
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1/ cProfile
- en: 'Python comes with two built-in profilers:'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: Python 内置了两个内置分析器：
- en: '[`cProfile`](https://docs.python.org/3/library/profile.html#module-cProfile):
    A C extension with reasonable overhead that makes it suitable for profiling long-running
    programs. It is recommended for most users.'
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[`cProfile`](https://docs.python.org/3/library/profile.html#module-cProfile)：一个具有合理开销的
    C 扩展，使其适合分析长时间运行的程序。它对大多数用户推荐。'
- en: '[`profile`](https://docs.python.org/3/library/profile.html#module-profile):
    A pure Python module whose interface is imitated by [`cProfile`](https://docs.python.org/3/library/profile.html#module-cProfile),
    but which adds significant overhead to profiled programs. It can be a valuable
    tool when you need to extend or customize the profiling functionality.'
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[`profile`](https://docs.python.org/3/library/profile.html#module-profile)：一个纯
    Python 模块，其接口被 `cProfile` 模块模仿，但会给分析程序增加显著的开销。当你需要扩展或自定义分析功能时，它可能是一个有价值的工具。'
- en: The base syntax is `cProfile.run(statement, filename=None, sort=-1)`. The `filename`
    argument can be passed to save the output. And the `sort` argument can be used
    to specify how the output has to be printed. By default, it is set to -1( no value).
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 基本语法是`cProfile.run(statement, filename=None, sort=-1)`。`filename`参数可以传递以保存输出。`sort`参数可以用来指定输出如何打印。默认情况下，它设置为-1（无值）。
- en: 'For instance, if you modify the monitoring script like this:'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果您修改监控脚本如下：
- en: '[PRE9]'
  id: totrans-83
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: 'we have the following output:'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 我们有以下输出：
- en: '![](../Images/0a6ad699245a3ee54f249457c8f7541f.png)'
  id: totrans-85
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0a6ad699245a3ee54f249457c8f7541f.png)'
- en: 'First, we have the script outputs: `print_statement(0)` and `print_statement(1)`.'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们有脚本输出：`print_statement(0)`和`print_statement(1)`。
- en: 'Then, we have the profiler output: The first line shows the number of function
    calls and the time it took to run. The second line is a reminder of the sorted
    parameter. And, the profiler provides a table with six columns:'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们有分析器输出：第一行显示函数调用次数和运行时间。第二行是排序参数的提醒。并且，分析器提供了一个包含六列的表格：
- en: 'ncalls: Shows the number of calls made'
  id: totrans-88
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: ncalls：显示调用次数
- en: 'tottime: Total time taken by the given function. Note that the time made in
    calls to sub-functions are excluded.'
  id: totrans-89
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: tottime：给定函数所花费的总时间。请注意，调用子函数所花费的时间不包括在内。
- en: 'percall: Total time / No of calls. (remainder is left out)'
  id: totrans-90
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: percall：总时间 / 调用次数。（余数被省略）
- en: 'cumtime: Unlike tottime, this includes time spent in this and all subfunctions
    that the higher-level function calls. It is most useful and is accurate for recursive
    functions.'
  id: totrans-91
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: cumtime：与tottime不同，这包括在这个函数及其所有被高级函数调用的子函数中花费的时间。对于递归函数来说，它最有用且准确。
- en: 'percall: The percall following cumtime is calculated as the quotient of cumtime
    divided by primitive calls. The primitive calls include all the calls that were
    not included through recursion.'
  id: totrans-92
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: percall：cumtime之后的percall是cumtime除以原始调用次数的商。原始调用次数包括所有未通过递归包含的调用。
- en: 'filename: The name of the method.'
  id: totrans-93
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: filename：方法的名称。
- en: The first and the last rows of the table come from cProfile. The other rows
    are about the script.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 表格的第一行和最后一行来自cProfile。其他行是关于脚本的。
- en: You can customize the output by using the `Profile()` class. First, you have
    to initialize an instance of Profile class and using the method `enable()` and
    `disable()` to, respectively, start and to end the collecting of profiling data.
    Then, the `pstats` module can be used to manipulate the results collected by the
    profiler object.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以使用`Profile()`类自定义输出。首先，您必须初始化Profile类的实例，并使用`enable()`和`disable()`方法分别开始和结束收集分析数据。然后，可以使用`pstats`模块来操作分析器对象收集的结果。
- en: 'To sort output by cumulative time, instead of the standard name the previous
    code can be rewritten like this:'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 要按累积时间排序输出，而不是按标准名称，可以将之前的代码重写如下：
