  type: TYPE_NORMAL
  zh: 在每个框中，你都有函数的名称、花费的时间和调用次数。就像 snakeviz 一样，如果你的代码有多个依赖项，图表可能会非常复杂。但颜色表示瓶颈。在复杂的代码中，研究它以查看依赖关系和关系是非常有趣的。
