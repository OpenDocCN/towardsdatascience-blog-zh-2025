- en: 'Data Science: From School to Work, Part V'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/data-science-from-school-to-work-part-v/](https://towardsdatascience.com/data-science-from-school-to-work-part-v/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*Make it work, then make it beautiful, then if you really, really have to,
    make it fast. 90 percent of the time, if you make it beautiful, it will already
    be fast. So really, just make it beautiful!* ([Source](https://henrikwarne.com/2021/04/16/more-good-programming-quotes-part-5/))'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — *Joe Armstrong* (co-designers of the Erlang programming language.)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '<mdspan datatext="el1750880886773" class="mdspan-comment">It is the last</mdspan>
    article about Python for the series “Data Science: From School to Work.” Since
    the beginning, you have learned how to [manage your Python project with UV](https://towardsdatascience.com/data-scientist-from-school-to-work-part-i/),
    [how to write a clean code using PEP and SOLID principles](https://towardsdatascience.com/data-science-from-school-to-work-part-ii/),
    [how to handle errors and use loguru to log your code](https://towardsdatascience.com/data-science-from-school-to-work-part-iii/)
    and [how to write tests](https://towardsdatascience.com/data-science-from-school-to-work-part-iv/).'
  prefs: []
  type: TYPE_NORMAL
- en: Now you are in a position to create working, production-ready code. But code
    is never perfect and can always be improved. A final (optional, but highly recommended)
    step in creating code is optimization.
  prefs: []
  type: TYPE_NORMAL
- en: To optimize your code, you need to be able to track what’s going on in it. To
    do so, we use tools called **Profilers**. They generate profiles of your code.
    It means a set of statistics that describes how often and for how long various
    parts of the program executed. They make it possible to identify bottlenecks and
    parts of the code that consume too many resources. In other words, they show where
    your code should be optimized.
  prefs: []
  type: TYPE_NORMAL
- en: Today, there is such a proliferation of profilers in Python that the default
    profiler in Pycharm is called [yappi](https://pypi.org/project/yappi/) for “Yet
    Another Python Profiler”.
  prefs: []
  type: TYPE_NORMAL
- en: 'This article is therefore not an exhaustive list of all existing profilers.
    In this article, I present a tool for each aspect of the code we want to profile:
    memory, time and CPU/GPU consumption. Other packages will be mentioned with some
    references but will not be detailed.'
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: I – Memory profilers
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Memory profiling is the technique of monitoring and evaluating a program’s memory
    utilization while running. This method helps developers in finding memory leaks,
    optimizing memory utilization, and comprehending their programs’ memory consumption
    patterns. Memory profiling is crucial to prevent applications from using more
    memory than necessary and causing sluggish performance or crashes.
  prefs: []
  type: TYPE_NORMAL
- en: 1/ memory-profiler
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '`memory_profiler` is an easy-to-use Python module designed to profile memory
    usage of a script. It depends on `psutil` module. To install the package, simply
    type:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Profiling executable
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: One of the advantages of this package is that it is not limited to pythonic
    use. It installs the `mprof` command that allows monitoring the activity of any
    executable.
  prefs: []
  type: TYPE_NORMAL
- en: 'For instance, you can monitor the memory consumption of applications like `ollama`
    by running this command:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 'To see the result, you have to install `matplotlib` first. Then, you can plot
    the recorded memory profile of your executable by running:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: 'The graph then looks like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/8ced83ef5035fcf2b0b2ba8b85bf3e45.png)'
  prefs: []
  type: TYPE_IMG
- en: Output of the command mprof plot after the monitoring of the executable ollama
    run gemma3:4b (from the author).
  prefs: []
  type: TYPE_NORMAL
- en: Profiling Python code
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Let’s get back to what brings us here, the monitoring of a Python code.
  prefs: []
  type: TYPE_NORMAL
- en: '`memory_profiler` works with a line-by-line mode using a simple decorator `@profile`.
    First, you decorate the interest function and then you run the script. The output
    will be written directly to the terminal. Consider the following `monitoring.py`
    script:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: It is important to notice that it is not necessary to import the package `from
    memory_profiler import profile` at the begin of the script. In this case you have
    to specify some specific arguments to the Python interpreter.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: 'And you have the following output with a line-by-line details:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/925be47ee299701ba93b526d72c844bd.png)'
  prefs: []
  type: TYPE_IMG
- en: Output of the command -m memory_profiler monitoring.py (from author)
  prefs: []
  type: TYPE_NORMAL
- en: The output is a table with five columns.
  prefs: []
  type: TYPE_NORMAL
- en: 'Line #: The line number of the profiled code'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Mem usage: The memory usage of the Python interpreter after executing that
    line.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Increment: The change in memory usage compared to the previous line.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Occurrences: The number of times that line was executed.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Line Contents: The actual source code.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This output is very detailed and allows very fine monitoring of a specific function.
  prefs: []
  type: TYPE_NORMAL
- en: '**Important**: Unfortunately, this package is no longer actively maintained.
    The creator is looking for a substitute.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 2/ tracemalloc
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '`tracemalloc` is a built-in module in Python that tracks memory allocations
    and deallocations. Tracemalloc provides an easy-to-use interface for capturing
    and analyzing memory usage snapshots, making it an invaluable tool for any Python
    developer.'
  prefs: []
  type: TYPE_NORMAL
- en: 'It offers the following details:'
  prefs: []
  type: TYPE_NORMAL
- en: Shows where each object was allocated by providing a traceback.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Gives memory allocation statistics by file and line number, including the overall
    size, count, and average size of memory blocks.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Allows you to compare two snapshots to identify potential memory leaks.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The package `tracemalloc` may be usefull to identify memory leak in your code.
  prefs: []
  type: TYPE_NORMAL
- en: 'Personally, I find it less intuitive to set up than the other packages presented
    in this article. Here are some links to go further:'
  prefs: []
  type: TYPE_NORMAL
- en: 'An article by [Arsène Tripard](https://www.linkedin.com/in/ars%C3%A8ne-tripard-50a535146/)
    detailling to identify memory leak: [link](https://data-ai.theodo.com/en/technical-blog/how-data-ml-engineers-can-uncover-memory-leaks-before-they-hit-production)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'A detail article, from the blog [CoderzColumn](https://coderzcolumn.com/),
    describing how to use this package: [link](https://coderzcolumn.com/tutorials/python/tracemalloc-how-to-trace-memory-usage-in-python-code)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: II – Time profilers
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Time profiling is the process of measuring the time spent in different parts
    of a program. By identifying performance bottlenecks, you can focus their optimization
    efforts on the parts of the code that will have the most significant impact.
  prefs: []
  type: TYPE_NORMAL
- en: 1/ line-profiler
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The `line-profiler` package is quite similar to `memory-profiler`, but it serves
    a different purpose. It’s designed to profile specific functions by measuring
    the execution time of each line within those functions. To use LineProfiler effectively,
    you need to explicitly specify which functions you want it to profile by simply
    adding the `@profile` decorator above them.
  prefs: []
  type: TYPE_NORMAL
- en: 'To install it just type:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: Considering the following script named `monitoring.py`
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: To measure the execution time of the function `main()` and `create_list()`,
    we add the decorator `@profile`.
  prefs: []
  type: TYPE_NORMAL
- en: The easiest way to get a time profiling of this script to use the `kernprof`
    script.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: It will create a binary file named `your_script.py.lprof`. The argument `-v`
    allows to show directyl the output in the terminal.
  prefs: []
  type: TYPE_NORMAL
- en: 'Otherwise, you can view the results later like so:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: 'It provides the following informations:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ce0fe08ae246c479950e6e745a94e47a.png)'
  prefs: []
  type: TYPE_IMG
- en: Output of the command kernprof -lv monitoring.py (from author)
  prefs: []
  type: TYPE_NORMAL
- en: There are two tables, one by profiled function. Each table containes the following
    informations
  prefs: []
  type: TYPE_NORMAL
- en: 'Line #: The line number in the file.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Hits: The number of times that line was executed.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Time: The total amount of time spent executing the line in the **timer’s units**.
    In the header information before the tables, you will see a line “Timer unit:”
    giving the conversion factor to seconds. It may be different on different systems.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Per Hit: The average amount of time spent executing the line once in the timer’s
    units'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '% Time: The percentage of time spent on that line relative to the total amount
    of recorded time spent in the function.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Line Contents: The actual source code.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 1/ cProfile
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Python comes with two built-in profilers:'
  prefs: []
  type: TYPE_NORMAL
- en: '[`cProfile`](https://docs.python.org/3/library/profile.html#module-cProfile):
    A C extension with reasonable overhead that makes it suitable for profiling long-running
    programs. It is recommended for most users.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[`profile`](https://docs.python.org/3/library/profile.html#module-profile):
    A pure Python module whose interface is imitated by [`cProfile`](https://docs.python.org/3/library/profile.html#module-cProfile),
    but which adds significant overhead to profiled programs. It can be a valuable
    tool when you need to extend or customize the profiling functionality.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The base syntax is `cProfile.run(statement, filename=None, sort=-1)`. The `filename`
    argument can be passed to save the output. And the `sort` argument can be used
    to specify how the output has to be printed. By default, it is set to -1( no value).
  prefs: []
  type: TYPE_NORMAL
- en: 'For instance, if you modify the monitoring script like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: 'we have the following output:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/0a6ad699245a3ee54f249457c8f7541f.png)'
  prefs: []
  type: TYPE_IMG
- en: 'First, we have the script outputs: `print_statement(0)` and `print_statement(1)`.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Then, we have the profiler output: The first line shows the number of function
    calls and the time it took to run. The second line is a reminder of the sorted
    parameter. And, the profiler provides a table with six columns:'
  prefs: []
  type: TYPE_NORMAL
- en: 'ncalls: Shows the number of calls made'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'tottime: Total time taken by the given function. Note that the time made in
    calls to sub-functions are excluded.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'percall: Total time / No of calls. (remainder is left out)'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'cumtime: Unlike tottime, this includes time spent in this and all subfunctions
    that the higher-level function calls. It is most useful and is accurate for recursive
    functions.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'percall: The percall following cumtime is calculated as the quotient of cumtime
    divided by primitive calls. The primitive calls include all the calls that were
    not included through recursion.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'filename: The name of the method.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The first and the last rows of the table come from cProfile. The other rows
    are about the script.
  prefs: []
  type: TYPE_NORMAL
- en: You can customize the output by using the `Profile()` class. First, you have
    to initialize an instance of Profile class and using the method `enable()` and
    `disable()` to, respectively, start and to end the collecting of profiling data.
    Then, the `pstats` module can be used to manipulate the results collected by the
    profiler object.
  prefs: []
  type: TYPE_NORMAL
- en: 'To sort output by cumulative time, instead of the standard name the previous
    code can be rewritten like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: 'And the output becomes:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/0cdb03e4b90a5afc8ed88b790df6d04e.png)'
  prefs: []
  type: TYPE_IMG
- en: As you can see, now the table is sorted by `cumtime`. And the two rows of cProfile
    of the previous table are not in this table.
  prefs: []
  type: TYPE_NORMAL
- en: Visualize profiling with Snakeviz.
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The output is very easy to analyse. But, it can become unreadable if the profiled
    code becomes too big.
  prefs: []
  type: TYPE_NORMAL
- en: 'Another way to analyse the ouput is to visualize data instead of read it. To
    do so, we use the `Snakeviz` package. To install it, simply type:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: 'Then, replace `stats.print_stats()` by `stats.dump_stats("profile.prof")` to
    save profiling data. Now, you can have a visualization of your profiling by typing:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: 'It launches a file browser interface from which you can choose among two data
    visualizations: Icicle and Sunburst.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/57a71704c8c1281dfc3cb3f57077630a.png)'
  prefs: []
  type: TYPE_IMG
- en: The Icicle visualization of the profiling of the regression script (from the
    author).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/87fe7bc6ab453d510c15af2b085b390b.png)'
  prefs: []
  type: TYPE_IMG
- en: The Sunburst visualization of the profiling of the regression script (from the
    author).
  prefs: []
  type: TYPE_NORMAL
- en: It is easier to read than the `print_stats()` output because you can interact
    with each element by moving your mouse over it. For instance, you can have more
    details about the function `create_list()`
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/30f9589d8ac26c32c4a2cd7d18cf6114.png)'
  prefs: []
  type: TYPE_IMG
- en: Details about the time consumption of the function `evaluate_model()` (from
    the author).
  prefs: []
  type: TYPE_NORMAL
- en: Create a call graph with gprof2dot
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: A call graph is a visual representation of the relationships between functions
    or methods in a program, showing which functions call others and how long each
    function or method takes. It can be seen as a map of your code.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: Then exectute your by typing
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: 'It will create a `monitoring.pstats` that can be turn into a call graph using
    the following command:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: Then the call graph is saved into a png file named `monitoring.png`
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/eb26712a29ac3bd0c21cb0684925b44f.png)'
  prefs: []
  type: TYPE_IMG
- en: The call graph of the script monitoring.py (from the author).
  prefs: []
  type: TYPE_NORMAL
- en: 2/ Other interesting packages
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: a/ PyCallGraph
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: '[PyCallGraph](https://github.com/Lewiscowles1986/py-call-graph) is a Python
    module that creates call graph visualizations. To use it, you have to :'
  prefs: []
  type: TYPE_NORMAL
- en: Install the [Graphviz](https://graphviz.org/) application.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Install the package [python-call-graph](https://github.com/Lewiscowles1986/py-call-graph)
    using `pip` or `uv`.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'To create a call graph of your code, supply run it a PyCallGraph context like
    this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: Then, you get a png of the call graph of your code is named by default `pycallgraph.png`.
  prefs: []
  type: TYPE_NORMAL
- en: 'I’ve made the call graph of the previous example:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a56dcea64848b9c986a6ebb35fe03bf7.png)'
  prefs: []
  type: TYPE_IMG
- en: The call graph from PyCallGraph of the monitoring.py script.
  prefs: []
  type: TYPE_NORMAL
- en: In each box, you have the name of the function, the time spent in and the number
    of calls. Like with snakeviz, the graph may be very complex if your code has many
    dependencies. But the color indicates the bottlenecks. In complex code, it’s very
    interesting to study it to see the dependencies and relationships.
  prefs: []
  type: TYPE_NORMAL
- en: b/ PyInstrument
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: '[PyInstrument](https://pypi.org/project/pyinstrument/3.0.0b3/) is also a Python
    profiler very easy to use. You can add the profiler in your script by surredning
    the code like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: The output gives
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/77aecb741aecdbe49f748336a2da7d6e.png)'
  prefs: []
  type: TYPE_IMG
- en: It is less detailled than cProfile but it is also more readable. Your functions
    are highlighted and sorted by time.
  prefs: []
  type: TYPE_NORMAL
- en: 'Butthe true interest of PyInstrument comes with its html output. To get this
    html output simply type in the terminal:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: 'It launches a file browser interface from which you can choose among two data
    visualizations: Call stack and Timeline.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/cdfca73669b9065195e64e78b8881de8.png)'
  prefs: []
  type: TYPE_IMG
- en: Call stack representation of the monotoring.py script (from the author).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/04de69fede03f9649c05b2b75c748f42.png)'
  prefs: []
  type: TYPE_IMG
- en: Timeline representation of the monotoring.py script (from the author).
  prefs: []
  type: TYPE_NORMAL
- en: Here, the profile is more detailed and you have many options to filter.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: CPU/GPU profiler
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: CPU and GPU profiling is the process of analyzing the utilization and performance
    of a program on the central processing unit (CPU) and graphics processing unit
    (GPU). By measuring how much resources are spent on different parts of the code
    on these processing units, developers can identify performance bottlenecks, understand
    where their code is being executed, and optimize their application to achieve
    better performance and efficiency.
  prefs: []
  type: TYPE_NORMAL
- en: As far as I know, there is only one package that can profile GPU power consumption.
  prefs: []
  type: TYPE_NORMAL
- en: 1/ Scalene
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '[Scalene](https://github.com/plasma-umass/scalene) is a high-performance CPU,
    GPU and memory profiler designed specifically for Python. It’s an open-source
    package that provides detailed insights. It is designed to be fast, accurate,
    and easy to use, making it an excellent tool for developers looking to optimize
    their code.'
  prefs: []
  type: TYPE_NORMAL
- en: '**CPU/GPU Profiling**: Scalene provides detailed information on CPU/GPU usage,
    including the time spent in different parts of your code. It can help you identify
    performance bottlenecks and optimize your code for better execution times.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Memory Profiling**: Scalene tracks memory allocation and deallocation, helping
    you understand how your code uses memory. This is particularly useful for identifying
    memory leaks or optimizing memory-intensive applications.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Line-by-Line Profiling**: Scalene provides line-by-line profiling, which
    gives you a detailed breakdown of the time spent in each line of your code. This
    feature is invaluable for pinpointing performance issues.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Visualization**: Scalene includes a graphical interface for visualizing profiling
    results, making it easier to understand and navigate the data.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: To highlight all the advantages of Scalene, I’ve developed functions with the
    sole aim of consuming memory `memory_waster()`, CPU `cpu_waster()` and GPU `gpu_convolution()`.
    All of them are in a script `scalene_tuto.py`.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE19]'
  prefs: []
  type: TYPE_PRE
- en: For the GPU function, you have to install `cupy` according to your cuda version
    (`nvcc --version` to get it)
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE20]'
  prefs: []
  type: TYPE_PRE
- en: Further details on installing cupy can be found in the [documentation](https://docs.cupy.dev/en/stable/install.html).
  prefs: []
  type: TYPE_NORMAL
- en: To run Scalene, use the command
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE21]'
  prefs: []
  type: TYPE_PRE
- en: It profiles both CPU, GPU, and memory by default. If you only want one or some
    of the options, use the flags `--cpu`, `--gpu`, and `--memory`.
  prefs: []
  type: TYPE_NORMAL
- en: 'Scalene provides a line-level **and** a function level profiling. And it has
    two interfaces: the Command Line Interface (CLI) and the web interface.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Important:** It is better to use Scalene with Ubuntu using WSL. Otherwise,
    the profiler does not retrieve memory consumption information.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: a) Command Line Interface
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: By default, Scalene’s output is the web interface. To obtain the CLI instead,
    add the flag `--cli`.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE22]'
  prefs: []
  type: TYPE_PRE
- en: 'You have the following results:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e9ccdcea2be84058ce035e1021f52980.png)![](../Images/913318a435505e25e3c7caad74ee4b27.png)'
  prefs: []
  type: TYPE_IMG
- en: Scalene output in the terminal (from the author).
  prefs: []
  type: TYPE_NORMAL
- en: '*By default, the code is displayed in dark mode. So if, like me, you work in
    light mode, the result isn’t very pretty.*'
  prefs: []
  type: TYPE_NORMAL
- en: The visualization is categorized into three distinct colors, each representing
    a different profiling metric.
  prefs: []
  type: TYPE_NORMAL
- en: The blue section represents CPU profiling, which provides a breakdown of the
    time spent executing Python code, native code (such as C or C++), and system-related
    tasks (like I/O operations).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The green section is dedicated to memory profiling, showing the percentage of
    memory allocated by Python code, as well as the overall memory usage over time
    and its peak values.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The yellow section focuses on GPU profiling, displaying the GPU’s running time
    and the volume of data copied between the GPU and CPU, measured in mb/s. It’s
    worth noting that GPU profiling is currently limited to NVIDIA GPUs.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: b) The web interface.
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The web interface is divided in three parts.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/eff7407e490acb5a50d03f39f94996ac.png)'
  prefs: []
  type: TYPE_IMG
- en: The big picture of the profiling
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/1ab6f0d5b57b517d7cfb8397707bebac.png)'
  prefs: []
  type: TYPE_IMG
- en: The detail by line
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/0d75e66aff6937bd5f80cbe9f65f2120.png)'
  prefs: []
  type: TYPE_IMG
- en: Scalene interface in the browser (from the author).
  prefs: []
  type: TYPE_NORMAL
- en: 'The color code is the same as in the command lien interface. But some icons
    are added:'
  prefs: []
  type: TYPE_NORMAL
- en: '💥: Optimizable code region (performance indication in the Function Profile
    section).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '⚡: Optimizable lines of code.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: c) AI Suggestions
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: One of the great advantages of Scalene is the ability to use AI to improve the
    slowness and/or overconsumption you have identified. It currently supports OpenAI
    API, Amazon BedRock, Azure OpenAI and ollama in local
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/09444c99a7058b3d40f0101841f0c9ce.png)'
  prefs: []
  type: TYPE_IMG
- en: Scalene AI optimization options menu (from the author).
  prefs: []
  type: TYPE_NORMAL
- en: After selecting your tools, you just have to click on 💥 or ⚡if you want to optimize
    a part of the code or just a line.
  prefs: []
  type: TYPE_NORMAL
- en: 'I test it with `codellama:7b-python` from ollama to optimize the `gpu_convolution()`
    function. Unfortunately, as mentioned in the interface:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Note that optimizations are AI-generated and may not be correct.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: None of the suggested optimizations worked. But the codebase was not conducive
    to optimization as it was artificially complicated. Just remove unnecessary lines
    to save time and memory. Also, I used a small model, which could be the reason.
  prefs: []
  type: TYPE_NORMAL
- en: Even though my tests were inconclusive, I think this option can be interesting
    and will surely continue to improve.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Nowadays, we are less concerned about the resource consumption of our developments,
    and very quickly these optimization deficits can accumulate, making the code slow,
    too slow for production, and sometimes even requiring the purchase of more powerful
    hardware.
  prefs: []
  type: TYPE_NORMAL
- en: Code profiling tools are indispensable when it comes to identifying areas in
    need of optimization.
  prefs: []
  type: TYPE_NORMAL
- en: 'The combination of the memory profiler and line profiler provides a very good
    initial analysis: easy to set up, with easy-to-understand reports.'
  prefs: []
  type: TYPE_NORMAL
- en: Tools such as cProfile and Scalene are complete and have graphical representations,
    but require more time to analyze. Finally, the AI optimization option offered
    by Scalene is a real asset, even if in my case the model used was not sufficient
    to provide anything relevant.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
