- en: Demystifying Cosine Similarity
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/demystifying-cosine-similarity/](https://towardsdatascience.com/demystifying-cosine-similarity/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*<mdspan datatext="el1754656867774" class="mdspan-comment">Cosine similarity</mdspan>*
    is a commonly used metric for operationalizing tasks such as semantic search and
    document comparison in the field of natural language processing (NLP). Introductory
    NLP courses often provide only a high-level justification for using cosine similarity
    in such tasks (as opposed to, say, Euclidean distance) without explaining the
    underlying mathematics, leaving many data scientists with a rather vague understanding
    of the subject matter. To address this gap, the following article lays out the
    mathematical intuition behind the cosine similarity metric and shows how this
    can help us interpret results in practice with hands-on examples in Python.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Note:** All figures and formulas in the following sections have been created
    by the author of this article.'
  prefs: []
  type: TYPE_NORMAL
- en: Mathematical Intuition
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The cosine similarity metric is based on the cosine function that readers may
    recall from high school math. The cosine function exhibits a repeating wavelike
    pattern, a full cycle of which is depicted in Figure 1 below for the range 0 <=
    *x* <= 2**pi*. The Python code used to produce the figure is also included for
    reference.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/dfe22fd119c2f68a85f9c1c75a240470.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 1: Cosine Function'
  prefs: []
  type: TYPE_NORMAL
- en: The function parameter *x* denotes an angle in radians (e.g., the angle between
    two vectors in an embedding space), where *pi*/2, *pi*, 3**pi*/2, and 2**pi*,
    are 90, 180, 270, and 360 degrees, respectively.
  prefs: []
  type: TYPE_NORMAL
- en: To understand why the cosine function can serve as a useful basis for designing
    a vector similarity metric, notice that the basic cosine function, without any
    functional transformations as shown in Figure 1, has maxima at x = 2**a***pi*,
    minima at x = (2**b* + 1)**pi*, and roots at x = (*c* + 1/2)**pi* for some integers
    *a*, *b*, and *c*. In other words, if *x* denotes the angle between two vectors,
    *cos(x)* returns the largest value when the vectors point in the same direction,
    the smallest value when the vectors point in opposite directions, and zero when
    the vectors are orthogonal to each other.
  prefs: []
  type: TYPE_NORMAL
- en: 'This behavior of the cosine function neatly captures the interplay between
    two key concepts in NLP: *semantic overlap* (conveying how much meaning is shared
    between two texts) and *semantic polarity* (capturing the oppositeness of meaning
    in texts). For example, the texts “I liked this movie” and “I enjoyed this film”
    would have high semantic overlap (they express essentially the same meaning despite
    using different words) and low semantic polarity (they do not express opposite
    meanings). Now, if the embedding vectors for two words happen to encode both semantic
    overlap and polarity, then we would expect synonyms to have cosine similarity
    approaching 1, antonyms to have cosine similarity approaching -1, and unrelated
    words to have cosine similarity approaching 0.'
  prefs: []
  type: TYPE_NORMAL
- en: 'In practice, we will typically not know the angle *x* directly. Instead, we
    must derive the cosine value from the vectors themselves. Given two vectors *U*
    and *V*, each with *n* elements, the cosine of the angle between these vectors
    — equivalent to the cosine similarity metric — is computed as the dot product
    of the vectors divided by the product of the vector magnitudes:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ed612a52afd770c0c6d12e0d7f0555fa.png)'
  prefs: []
  type: TYPE_IMG
- en: 'The above formula for the cosine of the angle between two vectors can be derived
    from the so-called Cosine Rule, as demonstrated in the segment between minutes
    12 and 18 of this video:'
  prefs: []
  type: TYPE_NORMAL
- en: 'A neat proof of the Cosine Rule itself is presented in this video:'
  prefs: []
  type: TYPE_NORMAL
- en: 'The following Python implementation of cosine similarity explicitly operationalizes
    the formulas presented above, without relying on any black-box, third-party packages:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Interested readers can refer to [this](https://towardsdatascience.com/declarative-and-imperative-prompt-engineering-for-generative-ai/)
    article for a more efficient Python implementation of the *cosine distance* metric
    (defined as 1 minus cosine similarity) using the NumPy and SciPy packages.
  prefs: []
  type: TYPE_NORMAL
- en: 'Finally, it is worth comparing the mathematical intuition of cosine similarity
    (or distance) with that of *Euclidean distance*, which measures the linear distance
    between two vectors and can also serve as a vector similarity metric. In particular,
    the lower the Euclidean distance between two vectors, the higher their semantic
    similarity is likely to be. The Euclidean distance between two vectors *U* and
    *V* (each of length *n*) can be computed using the following formula:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ab1385ec69d2de341c1b20e5af2d6146.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Below is the corresponding Python implementation:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: Notice that, since the elementwise differences in the Euclidean distance formula
    are squared, the resulting metric will always be a non-negative number — zero
    if the vectors are identical, positive otherwise. In the NLP context, this implies
    that Euclidean distance will not reflect semantic polarity in quite the same way
    as cosine distance does. Moreover, as long as two vectors point in the same direction,
    the cosine of the angle between them will remain the same regardless of the vector
    magnitudes. By contrast, the Euclidean distance metric is affected by differences
    in vector magnitude, which may lead to misleading interpretations in practice
    (e.g., two texts of different lengths may yield a high Euclidean distance despite
    being semantically similar). As such, cosine similarity is the preferred metric
    in many NLP scenarios, where determining vector — or semantic — directionality
    is the primary concern.
  prefs: []
  type: TYPE_NORMAL
- en: Theory versus Practice
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In a practical NLP scenario, the interpretation of cosine similarity hinges
    on the extent to which the vector embedding encodes polarity as well as semantic
    overlap. In the following hands-on example, we will investigate the similarity
    between two given words using a pretrained embedding model that does not encode
    polarity ([all-MiniLM-L6-v2](https://huggingface.co/sentence-transformers/all-MiniLM-L6-v2))
    and one that does ([distilbert-base-uncased-finetuned-sst-2-english](https://huggingface.co/distilbert/distilbert-base-uncased-finetuned-sst-2-english)).
    We will also use more efficient implementations of cosine similarity and Euclidean
    distance by leveraging functions provided by the SciPy package.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: '**Output:**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: The words “movie” and “film”, which are typically used as synonyms, have cosine
    similarity close to 1, suggesting high semantic overlap as expected. The words
    “good” and “bad” are antonyms, and we see this reflected in the negative cosine
    similarity result when using the second embedding model known to encode semantic
    polarity. Finally, the words “spoon” and “car” are semantically unrelated, and
    the corresponding orthogonality of their vector embeddings is indicated by their
    cosine similarity results being closer to zero than for “movie” and “film”.
  prefs: []
  type: TYPE_NORMAL
- en: The Wrap
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The cosine similarity between two vectors is based on the cosine of the angle
    they form, and — unlike metrics such as Euclidean distance — is not sensitive
    to differences in vector magnitudes. In theory, cosine similarity should be close
    to 1 if the vectors point in the same direction (indicating high similarity),
    close to -1 if the vectors point in opposite directions (indicating high dissimilarity),
    and close to 0 if the vectors are orthogonal (indicating unrelatedness). However,
    the exact interpretation of cosine similarity in a given NLP scenario depends
    on the nature of the embedding model used to vectorize the textual data (e.g.,
    whether the embedding model encodes polarity in addition to semantic overlap).
  prefs: []
  type: TYPE_NORMAL
