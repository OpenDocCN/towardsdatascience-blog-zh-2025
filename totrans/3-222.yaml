- en: 3\. Working with files
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3. 与文件一起工作
- en: We’ve already seen how we can read and write Parquet files. But let’s check
    some other popular file types so that we have several options available.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经看到了如何读取和写入 Parquet 文件。但让我们检查一些其他流行的文件类型，以便我们有几个选项可用。
- en: 3.1\. Apache ORC
  id: totrans-43
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.1. Apache ORC
- en: Being very informal, Apache ORC can be understood as the equivalent of Arrow
    in the realm of file types (even though its origins have nothing to do with Arrow).
    Being more correct, it’s an open source and columnar storage format.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 非常非正式，Apache ORC 可以理解为在文件类型领域中的 Arrow 对应物（尽管它的起源与 Arrow 没有关系）。更准确地说，它是一个开源的列式存储格式。
- en: 'Reading and writing it is as follows:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 读取和写入的方式如下：
- en: '[PRE13]'
  id: totrans-46
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: As a side note, we could decide to compress the file while writing by using
    the “compression” parameter.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 作为旁注，我们可以在写入时通过使用“compression”参数来压缩文件。
