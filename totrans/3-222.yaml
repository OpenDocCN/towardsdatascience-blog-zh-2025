  type: TYPE_NORMAL
  zh: Pyarrow 允许读取 JSON，但不允许写入。这很简单，让我们看看一个例子，假设我们的 JSON 数据在“data.json”中：
- en: '[PRE15]'
  id: totrans-53
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: Feather is a portable file format for storing Arrow tables or data frames (from
    languages like Python or R) that utilizes the [Arrow IPC format](https://arrow.apache.org/docs/python/ipc.html#ipc)
    internally. So, contrary to Apache ORC, this one was indeed created early in the
    Arrow project.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: Feather 是一种可移植的文件格式，用于存储 Arrow 表或数据帧（来自 Python 或 R 等语言），它内部使用 [Arrow IPC 格式](https://arrow.apache.org/docs/python/ipc.html#ipc)。因此，与
    Apache ORC 不同，这个确实是在 Arrow 项目早期创建的。
- en: '[PRE16]'
  id: totrans-55
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: 4\. Advanced Features
  id: totrans-56
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4. 高级功能
- en: We just touched upon the most basic features and what the majority would need
    while working with Arrow. However, its amazingness doesn’t end here, it’s right
    where it starts.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 我们刚刚提到了与 Arrow 一起工作的最基本的功能以及大多数人需要的功能。然而，它的神奇之处并没有结束，它正是从这里开始的。
- en: 'As this will be quite domain-specific and not useful for anyone (nor considered
    introductory) I’ll just mention some of these features without using any code:'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 由于这将非常具有领域特定性，对任何人（也不被认为是入门级）都没有用处，我将只提及其中的一些功能，而不使用任何代码：
- en: We can handle memory management through the **Buffer** type (built on top of
    C++ Buffer object). Creating a buffer with our data does not allocate any memory;
    it is a zero-copy view on the memory exported from the data bytes object. Keeping
    up with this memory management, an instance of **MemoryPool** tracks all the allocations
    and deallocations (like *malloc* and *free* in C). This allows us to track the
    amount of memory being allocated.
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们可以通过 **Buffer** 类型（建立在 C++ Buffer 对象之上）来处理内存管理。使用我们的数据创建一个缓冲区不会分配任何内存；它是对从数据字节对象导出的内存的零拷贝视图。继续这种内存管理，**MemoryPool**
    的一个实例跟踪所有的分配和释放（类似于 C 中的 *malloc* 和 *free*）。这使我们能够跟踪分配的内存量。
- en: Similarly, there are different ways to work with input/output streams in batches.
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 类似地，有不同方式以批处理方式处理输入/输出流。
- en: PyArrow comes with an abstract filesystem interface, as well as concrete implementations
    for various storage types. So, for example,  we can write and read parquet files
    from an S3 bucket using the S3FileSystem. Google Cloud and Hadoop Distributed
    File System (HDFS) are also accepted.
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: PyArrow 附带一个抽象文件系统接口，以及针对各种存储类型的具体实现。因此，例如，我们可以使用 S3FileSystem 从 S3 存储桶中写入和读取
    parquet 文件。Google Cloud 和 Hadoop 分布式文件系统（HDFS）也被接受。
- en: 5\. Conclusion and Key Takeaways
  id: totrans-62
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 5. 结论和要点
- en: Apache Arrow is a powerful tool for efficient data handling in Python. Its columnar
    storage format, zero-copy reads, and interoperability with popular data processing
    libraries make it ideal for data science workflows. By integrating Arrow into
    your pipeline, you can significantly boost performance and optimize memory usage.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: Apache Arrow 是 Python 中高效数据处理的有力工具。它的列式存储格式、零拷贝读取以及与流行数据处理库的互操作性使其非常适合数据科学工作流程。通过将
    Arrow 集成到您的管道中，您可以显著提高性能并优化内存使用。
