- en: 'JAX: Is This Google’s NumPy killer?'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/jax-is-this-googles-numpy-killer/](https://towardsdatascience.com/jax-is-this-googles-numpy-killer/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1748461576448" class="mdspan-comment">NumPy is the undisputed</mdspan>
    champion of numerical computing in Python. Its powerful N-dimensional arrays and
    rich ecosystem of functions make it indispensable for scientists, engineers, and
    data analysts. However, as computational demands grow, especially in machine learning
    and large-scale scientific simulations, NumPy’s CPU-bound nature and lack of built-in
    automatic differentiation present limitations.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: This is where JAX hopes to fill those gaps. JAX is a library from Google Research
    designed to overcome these hurdles, effectively bringing NumPy functionality into
    the world of modern hardware accelerators and gradient-based optimisation.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: Please note that the JAX library is a research project, not an official Google
    product. As their GitHub repo indicates, expect **“sharp edges”** and potential
    bugs.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: What is NumPy?
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: If you’re involved in scientific Python, you are likely familiar with NumPy.
    It provides the core ndarray object for efficient storage and manipulation of
    dense numerical arrays and a vast library of mathematical functions optimised
    (often via C, C++, or Fortran code) to operate on these arrays much faster than
    pure Python loops.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: It’s the bedrock upon which much of the scientific Python ecosystem (SciPy,
    Pandas, Scikit-learn, Matplotlib) is built. However, its primary design targets
    CPU execution rather than GPUs and doesn’t inherently support automatic gradient
    calculation.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: That last point is vital because gradients measure how a function’s output changes
    with its inputs, indicating the steepest increase or decrease direction. This
    information is crucial for optimisation algorithms, particularly in machine learning,
    where gradients guide the adjustment of model parameters to minimise error during
    training. Calculating gradients efficiently enables large language models to learn
    complex patterns from data.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: What is JAX?
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**JAX** is a high-performance numerical computing library for Python developed
    by Google. It combines NumPy-like APIs, automatic differentiation (autodiff),
    and accelerated hardware execution on Graphical or Tensor Processing Units (GPU/TPU).'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: Its main features include,
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: '`jax.numpy.` A drop-in replacement for NumPy (same API, but works with GPU/TPU)'
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`jax.grad.` An automatic differentiation of functions (like TensorFlow or PyTorch)'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`jax.jit.`A just-in-time compilation via Accelerated Linear Algebra (XLA) libraries
    for blazing-fast execution'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`jax.vmap`, `jax.pmap.`Automatic vectorisation and parallelisation'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`GPU/TPU support.` Runs seamlessly on accelerators without changing your code'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Why Use JAX?
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: You should consider JAX when you need to …
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: Run NumPy-like computations significantly faster by leveraging GPUS or TPUS.
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Automatically calculate gradients of your numerical Python functions for optimisation
    (machine learning, physics simulations, etc.).
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Achieve further speedups by JIT-compiling critical Python code sections into
    optimised XLA executables.
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Easily vectorise functions to handle batches of data or parallelise computations
    across multiple accelerator devices.
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Before deciding to use JAX over NumPy, you need to know that there are also
    some key differences between the two libraries. While `jax.numpy` mimics the NumPy
    API, note the following differences:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Execution Backend & Compilation.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
- en: NumPy executes eagerly on the CPU, typically using pre-compiled C, C++ or Fortran
    extensions and optimised linear algebra libraries like OpenBLAS.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
- en: JAX uses the XLA compiler to translate JAX code into optimised machine code
    for CPU, GPU, or TPU. Execution can be Just-In-Time compiled using `jax.jit` and
    is often dispatched asynchronously.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Execution Model.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
- en: NumPy operations generally execute synchronously — the Python interpreter waits
    for the operation to complete before moving on.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
- en: JAX operations are dispatched asynchronously to the accelerator. Python code
    may continue running while the computation is happening. You often need result.block_until_ready()
    for accurate timing or to ensure a result is available before using it elsewhere
    (e.g., printing). jax.jit adds a compilation step on the first call.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Mutability.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
- en: NumPy arrays (ndarray) are mutable. You can change elements in place (e.g.,
    a[0] = 100).
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
- en: JAX arrays are ***immutable,*** and in-placeupdates are not allowed. This functional
    approach is crucial for JAX’s transformations to work reliably without side effects.
    Updates require creating new arrays using indexed update syntax.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
- en: 4\. Random Number Generation.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: NumPy uses a global random number generator state (np.random.seed(), np.random.rand()).
    This can be problematic for reproducibility in parallel or transformed code.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
- en: JAX requires explicit handling of random keys. You must manually manage and
    split keys to ensure reproducible randomness.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: 5\. API Coverage.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
- en: NumPy has a comprehensive API that covers many areas of numerical computing.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
- en: JAX covers a large and growing subset of the most common NumPy API, but is not
    a 100% drop-in replacement. Some less common functions, certain data types (like
    object arrays), or specific behaviours might differ or be missing.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
- en: Pre-requisites
  id: totrans-39
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Ok, let’s get started and see some coding examples. I’m using WSL2 Ubuntu for
    Windows for development.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
- en: I’m lucky to have an Nvidia GPU on my system, so I’ll target that in my code.
    You can still enjoy accelerated code over NumPy on your CPU if you don’t have
    a GPU. If that’s you or you have a different GPU make, check out the official
    documentation (link at the end of this article) for instructions on installing
    JAX for your system.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
- en: The first step is to create our environment. I use conda for this, but feel
    free to use whatever method you’re most comfortable with.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  id: totrans-43
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Now, activate it and install any necessary libraries. Note that since I’m installing
    for an NVIDIA GPU, the appropriate NVIDIA drivers and a CUDA environment, e.g.,
    CUDA 11 or CUDA 12, must also be installed. I won’t go into detail here, but a
    comprehensive explanation is available on the [NVIDIA website](https://docs.nvidia.com/cuda/archive/12.8.1/cuda-quick-start-guide/index.html).
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
- en: Next, activate your new environment and install the required external libraries.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  id: totrans-46
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Installing JAX was a lengthy process on my system, but it will eventually end,
    and you can then start a Jupyter notebook. You should see a notebook open in your
    browser. If that doesn’t happen automatically, you’ll likely see a screenful of
    information after the `jupyter notebook` command. Near the bottom, you will find
    a URL to copy and paste into your browser to launch the Jupyter Notebook.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
- en: Your URL will be different to mine, but it should look something like this:-
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  id: totrans-49
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Code example 1 — A Familiar API & JIT Compilation
  id: totrans-50
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Our first example shows how we can enhance performance over NumPy through just-in-time
    compilation. This example illustrates the SELU (Scaled Exponential Linear Unit) function
    applied to a 10,000 x 10,000 array. SELU is a popular activation function for
    self-normalising neural networks, defined as,
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/2363f72939833a5fb45dc17eb35fdfc4.png)'
  id: totrans-52
  prefs: []
  type: TYPE_IMG
- en: This is implemented using `np.where` (NumPy) or `jnp.where` (JAX), which chooses
    different formulas for positive and negative values of `x`.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
- en: The code showcases three implementations
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
- en: '`selu_numpy(x)` — regular NumPy version'
  id: totrans-55
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '`selu_jax(x)` — JAX version (same code, but using JAX arrays)'
  id: totrans-56
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '`selu_jax_jit(x)` — same as above, but wrapped in `@jax.jit` to compile and
    speed up the function'
  id: totrans-57
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'The code generates a large dataset: a **10,000 x 10,000** array of random numbers.
    Then it times how long each implementation takes to run:'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
- en: '`selu_numpy`: plain NumPy — runs directly on the CPU'
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`selu_jax`: JAX without JIT — slower because it interprets the function'
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`selu_jax_jit`: JAX with JIT — compiles the function the first time, then runs
    super fast on subsequent runs'
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Note:'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
- en: '`block_until_ready()` is used in JAX to wait for the operation to finish, since
    JAX runs asynchronously'
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: During the first JIT run, there is extra time due to compilation.
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: On the second JIT run, the compiled function is reused, making it s*ignificantly*
    *faster.*
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE3]'
  id: totrans-66
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: And the output.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  id: totrans-68
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: If my maths is good, I make that second JIT run over 100x faster than the NumPy
    run! Even the no-jit run was 3 times faster than NumPy.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
- en: 'Example 2: Automatic Differentiation (jax.grad)'
  id: totrans-70
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Shows how easily JAX computes gradients.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  id: totrans-72
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: '[PRE6]'
  id: totrans-73
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: The original function we’re analysing is x³. Its first derivative is 3x². So,
    for each input, i.e., 1,2,3,4, we calculate the value of the first derivative.
    So we end up with,
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
- en: 3 x 1² = 3
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
- en: 3 x 2² = 12
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
- en: 3 x 3² = 27
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
- en: 3 x 4² = 48
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
- en: 'Example 3: Matrix multiplication using jax.vmap'
  id: totrans-79
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This highlights the performance difference in vectorised operations as we multiply
    a 10,000-element matrix by a batch of 128 x 10,000-element vectors.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  id: totrans-81
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: Here is the output.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  id: totrans-83
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: As you can see, once again, the first JIT compilation cycle took a long time
    compared to the others, but the speedup after that is impressive.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
- en: 'Example 4: Image Convolution (Gaussian Blur)'
  id: totrans-85
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: For a more practical example, let’s examine convolution. Convolution is a fundamental
    operation in image processing, used for tasks such as blurring, sharpening, and
    edge detection. It involves sliding a small matrix (kernel) over the image and
    computing a weighted sum of the pixels under the kernel at each position. We’ll
    implement a basic version of Gaussian blurring using array slicing and element-wise
    operations to see how jax.jit can optimize this sequence.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
- en: Here is my input image.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e6f6be53e6e5b7bb533c75eee904b165.png)'
  id: totrans-88
  prefs: []
  type: TYPE_IMG
- en: Original image by Yury Taranik (licensed from Shutterstock)
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
- en: 'In simple terms, the code does the following:'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
- en: Convert the colour input image to greyscale, then load it into a NumPy array
    and normalise it.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
- en: Defines a 2D Gaussian kernel of configurable size and standard deviation.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
- en: 'Implements a manual 2D convolution function in three ways:'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
- en: Pure NumPy on the CPU
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: JAX array operations (before JIT compilation)
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: JAX with `@jax.jit` for optimised compilation (with one warm-up run and one
    timed run)
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Benchmarks each variant, printing timings and checking that the blurred outputs
    match within float tolerances.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
- en: Displays the original (grayscale) and blurred images side by side using Matplotlib,
    allowing you to confirm the blur visually.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  id: totrans-99
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Let’s see the outputs. Note that the input image, which was in colour, is converted
    to black and white. This is normal behaviour for this process.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  id: totrans-101
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Again, we see a 100x speedup on the second JIT run. Amazing.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
- en: And here are the output images.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/948cf475dd3e9b77ddff9b6403aea723.png)'
  id: totrans-104
  prefs: []
  type: TYPE_IMG
- en: Images by the author. Original input image by Yury Taranik (licensed from Shutterstock)
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  id: totrans-106
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: JAX represents a significant evolution for high-performance numerical computing
    in Python. By providing a NumPy-like interface combined with powerful function
    transformations (grad, jit, vmap and others) and efficient execution on accelerators
    via accelerated linear algebra (XLA), it unlocks capabilities essential for modern
    machine learning and large-scale scientific computation.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
- en: Its dramatic performance gains and built-in automatic differentiation could
    make it an indispensable tool for researchers and engineers pushing the boundaries
    of computational science. If your NumPy code encounters performance bottlenecks
    or requires gradients, JAX may offer a compelling path forward.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
- en: As I said at the beginning, this **is** an experimental project from Google.
    Will they crack on and make it an official Google product? Who knows? But if they
    do, NumPy might start having to look over its shoulder at this new kid on the
    block. However, there is already a significant amount of NumPy code in existence,
    so it may take JAX many years to supplant it, even if it does gain widespread
    adoption. And you can be sure that, in the meantime, the NumPy development team
    will not be sitting on their hands.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 如我开头所说，这是一个来自谷歌的实验性项目。他们是否会继续努力将其变成官方的谷歌产品？谁知道呢？但如果他们真的这样做，NumPy可能就需要开始关注这个新出现的竞争者了。然而，已经存在大量的NumPy代码，因此即使JAX得到广泛采用，它可能也需要很多年才能取代NumPy。而且你可以确信，在此期间，NumPy的开发团队不会袖手旁观。
- en: Here is a link to the official JAX documentation.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个链接到官方的JAX文档。
- en: '[https://docs.jax.dev/en/latest](https://docs.jax.dev/en/latest)'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://docs.jax.dev/en/latest](https://docs.jax.dev/en/latest)'
