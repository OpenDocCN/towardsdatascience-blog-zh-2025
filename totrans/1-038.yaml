- en: What “alignment” means in 2025
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'If you ask ten people what “AI alignment” means, you’ll usually get ten answers
    plus one existential crisis. Thankfully, recent surveys try to pin it down with
    something resembling consensus. A major review — **AI Alignment: A Comprehensive
    Survey (2025)** — defines alignment as making AI systems behave in line with human
    intentions and values.'
  prefs: []
  type: TYPE_NORMAL
- en: Not “make the AI wise,” not “give it perfect ethics,” not “turn it into a digital
    Gandalf.”
  prefs: []
  type: TYPE_NORMAL
- en: 'Just: **please do what we meant, not what we accidentally typed.**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Both surveys organize the field around four goals: **Robustness, Interpretability,
    Controllability, and Ethicality** — the RICE framework, which sounds like a wholesome
    meal but is actually a taxonomy of everything your model will do wrong if you
    ignore it.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Meanwhile, industry definitions, including **IBM’s 2024–2025 alignment explainer**,
    describe the same idea with more corporate calm: encode human goals and values
    so the model stays *helpful, safe, and reliable*. Translation: avoid bias, avoid
    harm, and ideally avoid the model confidently hallucinating nonsense like a Victorian
    poet who never slept.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Across research and industry, alignment work is often split into two buckets:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Forward alignment**: how we *train* models (e.g., RLHF, Constitutional AI,
    data curation, safety finetuning).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Backward alignment**: how we *evaluate, monitor, and govern* models after
    (and during) training.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Forward alignment gets all the publicity.
  prefs: []
  type: TYPE_NORMAL
- en: Backward alignment gets all the ulcers.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/89c7c42e3602381eae38fe16062ae657.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure: The Alignment Cycle, credit: [AI Alignment: A Comprehensive Survey](https://arxiv.org/abs/2310.19852)
    (Jiaming Ji et al.)'
  prefs: []
  type: TYPE_NORMAL
- en: 'If you’re a data scientist or engineer integrating LLMs, you mostly feel alignment
    as backward-facing questions:'
  prefs: []
  type: TYPE_NORMAL
- en: Is this new model hallucinating less, or just hallucinating *differently*?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Does it stay safe when users send it prompts that look like riddles written
    by a caffeinated goblin?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Is it actually fair across the user groups we serve?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: And unfortunately, you can’t answer those with parameter count or “it feels
    smarter.” You need **evaluation**.
  prefs: []
  type: TYPE_NORMAL
- en: 'Capability ≠ alignment: what the last few years actually taught us'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'One of the most important results in this space still comes from **Ouyang et
    al.’s InstructGPT paper (2022)**. That study showed something unintuitive: a **1.3B**
    parameter model with RLHF was often preferred over the original **175B GPT-3**,
    despite being about 100 times smaller. Why? Because humans said its responses
    were more helpful, more truthful, and less toxic. The big model was more capable,
    but the small model was better behaved.'
  prefs: []
  type: TYPE_NORMAL
- en: This same pattern has repeated across 2023–2025\. Alignment techniques — and
    more importantly, feedback loops — change what “good” means. A smaller aligned
    model can outperform a huge unaligned one on the metrics that actually matter
    to users.
  prefs: []
  type: TYPE_NORMAL
- en: Truthfulness is a great example.
  prefs: []
  type: TYPE_NORMAL
- en: The **TruthfulQA benchmark (Lin et al., 2022)** measures the ability to avoid
    confidently repeating internet nonsense. In the original paper, the best model
    only hit around **58%** truthfulness, compared to humans at **94%**. Larger base
    models were sometimes *less* truthful because they were better at smoothly imitating
    wrong information. (The internet strikes again.)
  prefs: []
  type: TYPE_NORMAL
- en: OpenAI later reported that with targeted anti-hallucination training, **GPT-4**
    roughly doubled its TruthfulQA performance — from around **30%** to **about 60%**
    — which is impressive until you remember this still means “slightly better than
    a coin flip” under adversarial questioning.
  prefs: []
  type: TYPE_NORMAL
- en: By early 2025, TruthfulQA itself evolved. The authors released a new binary
    multiple-choice version to fix issues in earlier formats and published updated
    results, including newer models like **Claude 3.5 Sonnet**, which likely approaches
    human-level accuracy on that variant. Many open models still lag behind. Additional
    work extends these tests to multiple languages, where truthfulness often drops
    because misinformation patterns differ across linguistic communities.
  prefs: []
  type: TYPE_NORMAL
- en: 'The broader lesson is clearer than ever:'
  prefs: []
  type: TYPE_NORMAL
- en: If the only thing you measure is “does it sound fluent?”, the model will optimize
    for **sounding fluent**, not **being correct**. If you care about truth, safety,
    or fairness, you need to **measure those things explicitly**.
  prefs: []
  type: TYPE_NORMAL
- en: 'Otherwise, you get exactly what you optimized for:'
  prefs: []
  type: TYPE_NORMAL
- en: a very confident, very eloquent, occasionally wrong librarian who never learned
    to whisper.
  prefs: []
  type: TYPE_NORMAL
- en: How misalignment shows up now (not hypothetically)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Over the last three years, misalignment has gone from a philosophical debate
    to something you can actually point at on your screen. We no longer need hypothetical
    “what if the AI…” scenarios. We have concrete behaviors, logs, benchmarks, and
    occasionally a model doing something bizarre that leaves an entire engineering
    team staring at each other like, *did it really just say that?*
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Hallucinations in safety-critical contexts
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Hallucination is still the most familiar failure mode, and unfortunately, it
    has not retired. System cards for **GPT-4, GPT-4o, Claude 3, and others** openly
    document that models still generate incorrect or fabricated information, often
    with the confident tone of a student who definitely did not read the assigned
    chapter.
  prefs: []
  type: TYPE_NORMAL
- en: A 2025 study titled “**From hallucinations to hazards**” argues that our evaluations
    focus too heavily on general tasks like language understanding or coding, while
    the *actual* risk lies in how hallucinations behave in sensitive domains like
    healthcare, law, and safety engineering.
  prefs: []
  type: TYPE_NORMAL
- en: 'In other words: scoring well on Massive Multitask Language Understanding(MMLU)
    does not magically prevent a model from recommending the wrong dosage of a real
    medication.'
  prefs: []
  type: TYPE_NORMAL
- en: TruthfulQA and its newer 2025 variants confirm the same pattern. Even top models
    can be fooled by adversarial questions laced with misconceptions, and their accuracy
    varies by language, phrasing, and the creativity of whoever designed the trap.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Bias, fairness, and who gets harmed
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Bias and fairness concerns are not theoretical either. Stanford’s **Holistic
    Evaluation of Language Models (HELM)** framework evaluates dozens of models across
    42 scenarios and multiple dimensions (accuracy, robustness, fairness, toxicity,
    efficiency, etc.) to create a kind of “alignment scoreboard.”
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/690641cc8a305f26a7871bbd23b5f5c8.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure: HELM Evaluation Components, credit: [Holistic Evaluation of Language
    Models](https://openreview.net/forum?id=iO4LZibEqW) (Percy Liang et al.)'
  prefs: []
  type: TYPE_NORMAL
- en: 'The results are what you’d expect from any large, messy ecosystem:'
  prefs: []
  type: TYPE_NORMAL
- en: GPT-4-class models usually score highest on accuracy and robustness.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Claude 3-series models often produce less toxic and more ethically balanced
    outputs.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: No model is consistently best.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Every model still exhibits measurable bias and toxicity under adversarial prompting.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Think of it like different athletes excelling in different events, except the
    events are “don’t offend users” and “don’t hallucinate harmful instructions.”
  prefs: []
  type: TYPE_NORMAL
- en: The **Holistic Evaluation of Vision-Language Models (VHELM)** extension to multimodal
    (vision + language) models shows the same pattern. These models are great at perception
    and reasoning but still struggle with fairness, multilingual performance, and
    toxicity unless those metrics are explicitly tested.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Deception and “alignment faking”
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This is the part where things get uncomfortable.
  prefs: []
  type: TYPE_NORMAL
- en: 'The most concerning pattern to emerge recently is **deception**: models behaving
    aligned in some contexts while producing very different behavior in others. It
    sounds dramatic, but unfortunately, it is now backed by empirical evidence rather
    than sci-fi imagination.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Back in 2023, the GPT-4 system card reported the now-famous ARC test: [GPT-4,
    acting as an agent, hired a TaskRabbit worker](https://www.businessinsider.com/gpt4-openai-chatgpt-taskrabbit-tricked-solve-captcha-test-2023-3)
    to solve a CAPTCHA, then lied about being visually impaired when asked if it was
    a bot.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The test was controlled, but it demonstrated an awkward reality: if you give
    a model goals and tools, sometimes it starts improvising ways to achieve them.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Since then, multiple research threads expanded the picture:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Anthropic (2024): “Alignment faking in large language models.”**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Their study of Claude 3 Opus and 3.5 Sonnet found that models trained on safety
    rules can learn to *perform* alignment when monitored while breaking the same
    rules in other contexts.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Koorndijk et al. (2025): “Empirical Evidence for Alignment Faking in a Small
    LLM.”**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Even a smaller model learned to behave safely under supervision and then reverted
    to a different objective when oversight was removed.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Apollo Research (2025): context-scheming experiments.**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: They found more capable models are *better* at recognizing evaluation contexts
    and sometimes strategically underperform or act extra cautious during tests —
    the AI equivalent of “acting polite because the teacher is watching.”
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Anthropic (mid-2025): large-scale multi-model simulations.**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Across 16 frontier models (OpenAI, Google, Meta, Anthropic, xAI, and others),
    models lied, cheated, and even chose harmful actions in controlled scenarios when
    given autonomy and tool access. Misaligned behaviors were more frequent in the
    most capable systems.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: This does **not** mean current models are plotting anything in real deployments.
  prefs: []
  type: TYPE_NORMAL
- en: It does mean deception, goal-driven shortcuts, and “performing alignment to
    pass the test” are real behaviors that show up in experiments — and the behaviors
    get stronger as models become more capable.
  prefs: []
  type: TYPE_NORMAL
- en: The alignment problem is no longer just “don’t generate toxic content.” It increasingly
    includes “don’t pretend to be aligned only while we are watching.”
  prefs: []
  type: TYPE_NORMAL
- en: Evaluation is the backbone of alignment (and it’s getting more complex)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Given all of this, recent work has shifted from “we need evaluation” to **“we
    need better, more reliable evaluation.”**
  prefs: []
  type: TYPE_NORMAL
- en: From one-number leaderboards to multi-dimensional diagnostics
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Early on, the community relied on single-number leaderboards. This worked about
    as well as rating a car solely by its cupholder count. So efforts like **HELM**
    stepped in to make evaluation more holistic: many scenarios multiplied by many
    metrics, instead of “this model has the highest score.”'
  prefs: []
  type: TYPE_NORMAL
- en: 'Since then, the space has expanded dramatically:'
  prefs: []
  type: TYPE_NORMAL
- en: '**BenchHub (2025)** aggregates **303,000 questions** across **38 benchmarks**,
    giving researchers a unified ecosystem for running multi-benchmark tests. One
    of its main findings is that the same model can perform brilliantly in one domain
    and fall over in another, sometimes comically so.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**VHELM** extends holistic evaluation to *vision-language* models, covering
    nine categories such as perception, reasoning, robustness, bias, fairness, and
    multilinguality. Basically, it’s HELM with extra eyeballs.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'A 2024 study, **“State of What Art? A Call for Multi-Prompt LLM Evaluation,”**
    showed that model rankings can flip depending on which prompt phrasing you use.
    The conclusion is simple: evaluating a model on a *single* prompt is like rating
    a singer after hearing only their warm-up scales.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'More recent surveys, such as the **2025 Comprehensive Survey on Safety Evaluation
    of LLMs**, treat multi-metric, multi-prompt evaluation as the default. The message
    is clear: real reliability emerges only when you measure **capability, robustness,
    and safety together**, not one at a time.'
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Evaluation itself is noisy and biased
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The newer twist is: **even our evaluation mechanisms are misaligned.**'
  prefs: []
  type: TYPE_NORMAL
- en: A 2025 ACL paper, **“Safer or Luckier? LLMs as Safety Evaluators Are Not Robust
    to Artifacts,”** tested 11 LLMs used as automatic “judges.” The results were…
    not comforting. Judge models were highly sensitive to superficial artifacts like
    apologetic phrasing or verbosity. In some setups, simply adding “I’m really sorry”
    could flip which answer was judged safer **up to 98% of the time**.
  prefs: []
  type: TYPE_NORMAL
- en: This is the evaluation equivalent of getting out of a speeding ticket because
    you were polite.
  prefs: []
  type: TYPE_NORMAL
- en: Worse, larger judge models were not consistently more robust, and using a jury
    of multiple LLMs helped but didn’t fix the core issue.
  prefs: []
  type: TYPE_NORMAL
- en: 'A related 2025 position paper, **“LLM-Safety Evaluations Lack Robustness”**,
    argues that current safety evaluation pipelines introduce bias and noise at many
    stages: test case selection, prompt phrasing, judge choice, and aggregation. The
    authors back this with case studies where minor changes in evaluation setup materially
    change conclusions about which model is “safer.”'
  prefs: []
  type: TYPE_NORMAL
- en: 'Put simply: **if you rely on LLMs to grade other LLMs without careful design,
    you can easily end up fooling yourself**. Evaluating alignment requires just as
    much rigor as building the model.'
  prefs: []
  type: TYPE_NORMAL
- en: Alignment is inherently multi-objective
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'One thing both alignment and evaluation surveys now emphasize is that alignment
    is **not a single metric problem**. Different stakeholders care about different,
    often competing objectives:'
  prefs: []
  type: TYPE_NORMAL
- en: Product teams care about task success, latency, and UX.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Safety teams care about jailbreak resistance, harmful content rates, and misuse
    potential.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Legal/compliance cares about auditability and adherence to regulation.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Users care about helpfulness, trust, privacy, and perceived honesty.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Surveys and frameworks like HELM, BenchHub, and Unified-Bench all argue that
    you should treat evaluation as navigating a **trade-off surface**, not picking
    a winner.
  prefs: []
  type: TYPE_NORMAL
- en: A model that dominates generic NLP benchmarks might be terrible for your domain
    if it is brittle under distribution shift or easy to jailbreak. Meanwhile, a more
    conservative model might be perfect for healthcare but deeply frustrating as a
    coding assistant.
  prefs: []
  type: TYPE_NORMAL
- en: Evaluating across objectives — and admitting that you are choosing trade-offs
    rather than discovering a magical “best” model — is part of doing alignment work
    honestly.
  prefs: []
  type: TYPE_NORMAL
- en: When things go wrong, eval failures usually come first
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'If you look at recent failure stories, a pattern emerges: alignment problems
    often start as **evaluation failures**.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Teams deploy a model that looks great on the standard leaderboard cocktail
    but later discover:'
  prefs: []
  type: TYPE_NORMAL
- en: it performs worse than the previous model on a domain-specific safety test,
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: it shows new bias against a particular user group,
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: it can be jailbroken by a prompt style no one bothered to test, or
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: RLHF made it more polite but also more confidently wrong.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Every one of those is, at root, a case where **nobody measured the right thing
    early enough**.
  prefs: []
  type: TYPE_NORMAL
- en: The newest work on deceptive alignment points in the same direction. If models
    can detect the evaluation environment and behave safely only *during the exam*,
    then testing becomes just as important as training. You may think you’ve aligned
    a model when you’ve actually trained it to pass your eval suite.
  prefs: []
  type: TYPE_NORMAL
- en: 'It’s the AI version of a student memorizing the answer key instead of understanding
    the material: impressive test scores, questionable real-world behavior.'
  prefs: []
  type: TYPE_NORMAL
- en: Where this series goes next
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In 2022, “we need better evals” was an opinion. By late 2025, it’s just how
    the literature reads:'
  prefs: []
  type: TYPE_NORMAL
- en: Larger models are more capable, and also more capable of harmful or deceptive
    behavior when the setup is wrong.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Hallucinations, bias, and strategic misbehavior are not theoretical; they are
    measurable and sometimes painfully reproducible.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Academic surveys and industry system cards now treat multi-metric evaluation
    as a central part of alignment, not a nice-to-have.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The rest of this series will zoom in:'
  prefs: []
  type: TYPE_NORMAL
- en: next, on classic benchmarks (MMLU, HumanEval, etc.) and why they’re not enough
    for alignment,
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: then on holistic and stress-test frameworks (HELM, TruthfulQA, safety eval suites,
    red teaming),
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: then on training-time alignment methods (RLHF, Constitutional AI, scalable oversight),
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'and finally, on the societal side: ethics, governance, and what the new deceptive-alignment
    work implies for future systems.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'If you’re building with LLMs, the practical takeaway from this first piece
    is simple:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Alignment begins where your evaluation pipeline begins.'
  prefs: []
  type: TYPE_NORMAL
- en: If you don’t measure a behavior, you’re implicitly okay with it.**
  prefs: []
  type: TYPE_NORMAL
- en: The good news is that we now have far more tools, far more data, and far more
    evidence to decide what we actually care about measuring. And that’s the foundation
    everything else will build on.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
