- en: Conclusions
  id: totrans-74
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this tutorial, we demonstrated how to import the Pascal VOC dataset into
    Label Studio by converting XML annotations into Label Studio’s JSON format, running
    a full stack with Docker Compose, and connecting MinIO as S3-compatible storage.
    This setup enables you to work with large-scale, pre-annotated datasets in a reproducible
    and cost-effective way, all on your local machine. Testing your project settings
    and file formats locally first will ensure a smoother transition when moving to
    cloud environments.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 在本教程中，我们展示了如何通过将XML注释转换为Label Studio的JSON格式，运行Docker Compose的全栈，以及连接MinIO作为S3兼容存储，将Pascal
    VOC数据集导入Label Studio。这种设置使您能够在本地机器上以可重复和成本效益的方式处理大规模、预标注的数据集。首先在本地测试您的项目设置和文件格式将确保在迁移到云环境时更加顺畅。
- en: I hope this tutorial helps you kickstart your data annotation project with pre-annotated
    data that you can easily expand or validate. Once your dataset is ready for training,
    you can export all the tasks in popular formats such as COCO or YOLO.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望这个教程能帮助您使用易于扩展或验证的预标注数据启动您的数据标注项目。一旦您的数据集准备好进行训练，您可以将所有任务导出为COCO或YOLO等流行格式。
