- en: '4 Levels of GitHub Actions: A Guide to Data Workflow Automation'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/4-levels-of-github-actions-a-guide-to-data-workflow-automation/](https://towardsdatascience.com/4-levels-of-github-actions-a-guide-to-data-workflow-automation/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1743553829492" class="mdspan-comment">Automation</mdspan>
    has become an indispensable element for ensuring operational efficiency and reliability
    in modern software development. GitHub Actions, an integrated Continuous Integration
    and Continuous Deployment (CI/CD) tool within GitHub, has established its position
    in the software development industry by providing a comprehensive platform for
    automating development and deployment workflows. However, its functionalities
    extend beyond this … We will delve into the use of GitHub Actions within the realm
    of data domain, demonstrating how it can streamline processes for developers and
    data professionals by automating data retrieval from external sources and data
    transformation operations.
  prefs: []
  type: TYPE_NORMAL
- en: GitHub Action Benefits
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![](../Images/f8060b41c9a8886f8646f7767e781536.png)'
  prefs: []
  type: TYPE_IMG
- en: 'GitHub Actions are already well-known for its functionalities in the software
    development domain, while in recent years, also discovered as offering compelling
    benefits in streamlining data workflows:'
  prefs: []
  type: TYPE_NORMAL
- en: Automate the data science environments setup, such as installing dependencies
    and required packages (e.g. pandas, PyTorch).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Streamline the data integration and data transformation steps by connecting
    to databases to fetch or update records, and using scripting languages like Python
    to preprocess or transform the raw data.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Create an iterable data science lifecycle by automating the training of machine
    learning models whenever new data is available, and deploying models to production
    environments automatically after successful training.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: GitHub Actions is free for unlimited usage on GitHub-hosted runners for public
    repositories. It also provides 2,000 free minutes of compute time per month for
    individual accounts using private repositories. It is easy to set up for building
    a proof-of-concept simply requiring a GitHub account, without worrying about opting
    in for a cloud provider.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Numerous GitHub Actions templates, and community resources are available online.
    Additionally, community and crowdsourced forums provide answers to common questions
    and troubleshooting support.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: GitHub Action Building Blocks
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![](../Images/56d1219424624caa5f2f1dc2b3b58203.png)'
  prefs: []
  type: TYPE_IMG
- en: GitHub Action is a feature of GitHub that allows users to automate workflows
    directly within their repositories. These workflows are defined using YAML files
    and can be triggered by various events such as code pushes, pull requests, issue
    creation, or scheduled intervals. With its extensive library of pre-built actions
    and the ability to write custom scripts, GitHub Actions is a versatile tool for
    automating tasks.
  prefs: []
  type: TYPE_NORMAL
- en: '**Event:** If you have come across using an automation on your devices, such
    as turning on dark mode when after 8pm, then you are familiar with the concept
    of using a trigger point or condition to initiate a workflow of actions. In GitHub
    Actions, this is referred to as an Event, which can be time-based e.g. scheduled
    on the 1st day of the month or automatically run every hour. Alternatively, Events
    can be triggered by certain behaviors, like every time changes are pushed from
    a local repository to a remote repository.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Workflow:** A workflow is composed by a series of jobs and GitHub allows
    flexibility of customizing each individual step in a job to your needs. It is
    generally defined by a YAML file stored in the `.github/workflow` directory in
    a GitHub repository.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Runners:** a hosted environment that allows running the workflow. Instead
    of running a script on your laptop, now you can borrow GitHub hosted runners to
    do the job for you or alternatively specify a self-hosted machine.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Runs:** each iteration of running the workflow create a run, and we can see
    the logs of each run in the “Actions” tab. GitHub provides an interface for users
    to easily visualize and monitor Action run logs.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 4 Levels of Github Actions
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We will demonstrate the implementation GitHub actions through 4 levels of difficulty,
    starting with the “minimal viable product” and progressively introducing additional
    components and customization in each level.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/eae77c54a79a134f5a11e27785044344.png)'
  prefs: []
  type: TYPE_IMG
- en: 1\. “Simple Workflow” with Python Script Execution
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Start by creating a GitHub repository where you want to store your workflow
    and the Python script. In your repository, create a `.github/workflows` directory
    (please note that this directory must be placed within the `workflows` folder
    for the action to be executed successfully). Inside this directory, create a YAML
    file (e.g., `simple-workflow.yaml`) that defines your workflow.
  prefs: []
  type: TYPE_NORMAL
- en: The <mdspan datatext="el1743553125055" class="mdspan-comment">following examples</mdspan>
    shows a workflow file that executes the python script `hello_world.py` based on
    a manual trigger.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'It consists of three sections: First, `name: simple-workflow` defines the workflow
    name. Second, `on: workflow_dispatch` specifies the condition for running the
    workflow, which is manually triggering each action. Last, the workflow jobs `jobs:
    run-hello-world` break down into the following steps:'
  prefs: []
  type: TYPE_NORMAL
- en: '`runs-on: ubuntu-latest`: Specify the runner (i.e., a virtual machine) to run
    the workflow — `ubuntu-latest` is a standard GitHub hosted runner containing an
    environment of tools, packages, and settings available for GitHub Actions to use.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`uses: actions/checkout@v4`: Apply a pre-built GitHub Action `checkout@v4`
    to pull the repository content into the runner’s environment. This ensures that
    the workflow has access to all necessary files and scripts stored in the repository.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`run: python code/hello_world.py`: Execute the Python script located in the
    `code` sub-directory by running shell commands directly in your YAML workflow
    file.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 2\. “Push Workflow” with Environment Setup
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The first workflow demonstrated the minimal viable version of the GitHub Action,
    but it did not take full advantage of the GitHub Actions. At the second level,
    we will add a bit more customization and functionalities – automatically set up
    the environment with Python version 3.11, install required packages and execute
    the script whenever changes are pushed to main branch.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: '`on: push`: Instead of being activated by manual workflow dispatch, this allows
    the action to run whenever there is a push from the local repository to the remote
    repository. This condition is commonly used in a software development setting
    for integration and deployment processes, which is also adopted in the MLOps workflow,
    ensuring that code changes are consistently tested and validated before being
    merged into a different branch. Additionally, it facilitates continuous deployment
    by automatically deploying updates to production or staging environments as soon
    as changes are pushed. Here we add an optional condition `branches: -main` to
    only trigger this action when it is pushed to the main branch.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`uses: actions/setup-python@v5`: We added the “Set up Python” step using GitHub’s
    built-in action `setup-python@v5`. Using the `setup-python` action is the recommended
    way of using Python with GitHub Actions because it ensures consistent behavior
    across different runners and versions of Python.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`pip install -r requirements.txt`: Streamlined the installation of required
    packages for the environment, which are saved in the `requirements.txt` file,
    thus speed up the further building of data pipeline and data science solution.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If you are interested in the basics of setting up a development environment
    for your data science projects, my previous blog post “**[7 Tips to Future-Proof
    Machine Learning Projects](https://towardsdatascience.com/7-tips-to-future-proof-machine-learning-projects-582397875edc/)**”
    provides a bit more explanation.
  prefs: []
  type: TYPE_NORMAL
- en: 3\. “Scheduled Workflow” with Argument Parsing
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: At the third level, we add more dynamics and complexity to make it more suitable
    for real-world applications. We introduce scheduled jobs as they bring even more
    benefits to a data science project, enabling periodic fetching of more recent
    data and reducing the need to manually run the script whenever data refresh is
    required. Additionally, we utilize dynamic argument parsing to execute the script
    based on different date range parameters according to the schedule.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: '`on: schedule: - cron: "0 12 1 * *"`: Specify a time based trigger using the
    cron expression “0 12 1 * *” – run at 12:00 pm on the 1st day of every month.
    You can use [crontab.guru](https://crontab.guru/) to help create and validate
    cron expressions, which follow the format: “minute/hour/ day of month/month/day
    of week”.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`python code/fetch_data.py --start $PREV_MONTH_START --end $PREV_MONTH_END`:
    “Run data pipeline” step runs a series of shell commands. It defines two variables
    `PREV_MONTH_START` and `PREV_MONTH_END` to get the first day and the last day
    of the previous month. These two variables are passed to the python script “fetch_data.py”
    to dynamically fetch data for the previous month relative to whenever the action
    is run. To allow the Python script to accept custom variables via command-line
    arguments, we use `argparse` library to build the script. This deserves a separate
    topic, but here is quick preview of how the python script would look like using
    the `argparse` library to handle command-line arguments ‘–start’ and ‘–end’ parameters.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: When the command `python code/fetch_data.py --start $PREV_MONTH_START --end
    $PREV_MONTH_END` executes, it creates a date range between `$PREV_MONTH_START`
    and `$PREV_MONTH_END`. For each day in the date range, it generates a URL, fetches
    the daily news through the API, parses the JSON response, and collects all the
    content into a JSON list. We then output this JSON list to the file “data.jsonl”.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: As shown above, the last step “Commit changes” commits the changes, configures
    the git user email and name, stages the changes, commits them, and pushes to the
    remote GitHub repository. This is a necessary step when running GitHub Actions
    that result in changes to the working directory (e.g., output file “data.jsonl”
    is created). Otherwise, the output is only saved in the `/temp` folder within
    the runner environment, and appears as if no changes have been made after the
    action is completed.
  prefs: []
  type: TYPE_NORMAL
- en: 4\. “Secure Workflow” with Secrets and Environment Variables Management
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The final level focuses on improving the security and performance of the GitHub
    workflow by addressing non-functional requirements.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: To improve workflow efficiency and reduce errors, we add a check before committing
    changes, ensuring that commits and pushes only occur when there are actual changes
    since the last commit. This is achieved through the command `git diff --staged
    --quiet || echo "changes=true" >> $GITHUB_ENV`.
  prefs: []
  type: TYPE_NORMAL
- en: '`git diff --staged` checks the difference between the staging area and the
    last commit.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`--quiet` suppresses the output — it returns 0 when there are no changes between
    the staged environment and working directory; whereas it returns exit code 1 (general
    error) when there are changes between the staged environment and working directory'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This command is then connected to `echo "changes=true" >> $GITHUB_ENV` through
    the OR operator `||` which tells the shell to run the rest of the line if the
    first command failed. Therefore, if changes exist, “changes=true” is passed to
    the environment variable `$GITHUB_ENV` and accessed at the next step to trigger
    git commit and push conditioned on `env.changes == 'true'`.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Lastly, we introduce the environment secret, which enhances security and avoids
    exposing sensitive information (e.g., API token, personal access token) in the
    codebase. Additionally, environment secrets offer the benefit of separating the
    development environment. This means you can have different secrets for different
    stages of your development and deployment pipeline. For example, the testing environment
    (e.g., in the dev branch) can only access the test token, whereas the production
    environment (e.g. in the main branch) will be able to access the token linked
    to the production instance.
  prefs: []
  type: TYPE_NORMAL
- en: 'To set up environment secrets in GitHub:'
  prefs: []
  type: TYPE_NORMAL
- en: Go to your repository settings
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Navigate to Secrets and Variables > Actions
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Click “New repository secret”
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Add your secret name and value
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: After setting up the GitHub environment secrets, we will need to add the secret
    to the workflow environment, for example below we added `${{ secrets.NEWS_API_TOKEN
    }}` to the step “Run data pipeline”.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: We then update the Python script `fetch_data.py` to access the environment secret
    using `os.environ.get()`.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Take-Home Message
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'This guide explores the implementation of GitHub Actions for building dynamic
    data pipelines, progressing through four different levels of workflow implementations:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Level 1: Basic workflow setup with manual triggers and simple Python script
    execution.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Level 2: Push workflow with development environment setup.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Level 3: Scheduled workflow with dynamic date handling and data fetching with
    command-line arguments'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Level 4: Secure pipeline workflow with secrets and environment variables management'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Each level builds upon the previous one, demonstrating how GitHub Actions can
    be effectively utilized in the data domain to streamline data solutions and speed
    up the development lifecycle.
  prefs: []
  type: TYPE_NORMAL
