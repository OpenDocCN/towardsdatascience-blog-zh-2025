- en: 'Reducing Time to Value for Data Science Projects: Part 2'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/reducing-time-to-value-for-data-science-projects-part-2/](https://towardsdatascience.com/reducing-time-to-value-for-data-science-projects-part-2/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1748979776132" class="mdspan-comment">Introduction</mdspan>
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In [part 1](https://towardsdatascience.com/reducing-time-to-value-for-data-science-projects-part-1/)
    of this series we spoke about creating re-usable code assets that can be deployed
    across multiple projects. Leveraging a centralised repository of common data science
    steps ensures that experiments can be carried out quicker and with greater confidence
    in the results. A streamlined experimentation phase is critical in ensuring that
    you deliver value to the business as quickly as possible.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: In this article I want to focus on how you can increase the velocity at which
    you can experiment. You may have 10s–100s of ideas for different setups that you
    want to try, and carrying them out efficiently will greatly increase your productivity.
    Carrying out a full retraining when model performance decays and exploring the
    inclusion of new features when they become available are just some situations
    where being able to quickly iterate over experiments becomes a great boon.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: We Need To Talk About Notebooks (Again)
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: While Jupyter Notebooks are a great way to teach yourself about libraries and
    concepts, they can easily be misused and become a crutch that actively stands
    in the way of fast model development. Consider the case of a data scientist moving
    onto a new project. The first steps are typically to open up a new notebook and
    begin some exploratory data analysis. Understanding what kind of data you have
    available to you, doing some simple summary statistics, understanding your outcome
    and finally some simple visualisations to understand the relationship between
    the features and outcome. These steps are a useful endeavour as better understanding
    your data is critical before you begin the experimentation process.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: The issue with this isn’t in the EDA itself, but what comes after. What normally
    happens is the data scientist moves on and instantly opens a new notebook to begin
    writing their experiment framework, normally starting with data transformations.
    This is typically done via re-using code snippets from their EDA notebook by copying
    from one to the other. Once they have their first notebook ready, it is then executed
    and the results are either saved locally or written to an external location. This
    data is then picked up by another notebook and processed further, such as by feature
    selection and then written back out. This process repeats itself until your experiment
    pipeline is formed of 5-6 notebooks which need to be triggered sequentially by
    a data scientist in order for a single experiment to be run.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/575714d4dd20a89b2d4d1ecee2db688c.png)'
  id: totrans-8
  prefs: []
  type: TYPE_IMG
- en: Chaining notebooks together is an inefficient process. Image by author
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
- en: With such a manual approach to experimentation, iterating over ideas and trying
    out different scenarios becomes a labour intensive task. You end up with parallelization
    at the human-level, where whole teams of data scientists devote themselves to
    running experiments by having local copies of the notebooks and diligently editing
    their code to try different setups. The results are then added to a report, where
    once experimentation has finished the best performing setup is found amongst all
    others.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: All of this is not sustainable. Team members going off sick or taking holidays,
    running experiments overnight hoping the notebook doesn’t crash and forgetting
    what experimental setups you have done and are still to do. These should not be
    worries that you have when running an experiment. Thankfully there is a better
    way that involves being able to iterate over ideas in a structured and methodical
    manner at scale. All of this will greatly simplify the experimentation phase of
    your project and greatly decrease its time to value.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: Embrace Scripting To Create Your Experimental Pipeline
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The first step in accelerating your ability to experiment is to move beyond
    notebooks and start scripting. This should be the simplest part in the process,
    you simply put your code into a .py file as opposed to the cellblocks of a .ipynb.
    From there you can invoke your script from the command line, for example:'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: '`python src/main.py`'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  id: totrans-15
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Note that adhering to the principle of controlling your workflow by passing
    arguments into functions can greatly simplify the layout of your experimental
    pipeline. Having a script like this has already improved your ability to run experiments.
    You now only need a single script invocation as opposed to the stop-start nature
    of running multiple notebooks in sequence.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: 'You may want to add some input arguments to this script, such as being able
    to point to a particular data location, or specifying where to store output artefacts.
    You could easily extend your script to take some command line arguments:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
- en: '`python src/main_with_arguments.py --input_data <loc> --output_loc <loc>`'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  id: totrans-19
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: At this point you have the start of a good pipeline; you can set the input and
    output location and invoke your script with a single command. However, trying
    out new ideas is still a relatively manual endeavour, you need to go into your
    codebase and make changes. As previously mentioned, switching between different
    experiment setups should ideally be as simple as modifying the input argument
    to a wrapper function that controls what needs to be carried out. We can bring
    all of these different arguments into a single location to ensure that modifying
    your experimental setup becomes trivial. The simplest way of implementing this
    is with a configuration file.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: Configure Your Experiments With a Separate File
  id: totrans-21
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Storing all of your relevant function arguments in a separate file comes with
    several benefits. Splitting the configuration from the main codebase makes it
    easier to try out different experimental setups. You simply edit the relevant
    fields with whatever your new idea is and you are ready to go. You can even swap
    out entire configuration files with ease. You also have complete oversight over
    what exactly your experimental setup was. If you maintain a separate file per
    experiment then you can go back to previous experiments and see exactly what was
    carried out.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: 'So what does a configuration file look like and how does it interface with
    the experiment pipeline script you have created? A simple implementation of a
    config file is to use yaml notation and set it up in the following manner:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: Top level boolean flags to turn on and off the different parts of your pipeline
  id: totrans-24
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: For each step in your pipeline, define what calculations you want to carry out
  id: totrans-25
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE2]'
  id: totrans-26
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'This is a flexible and lightweight way of controlling how your experiments
    are run. You can then modify your script to load in this configuration and use
    it to control the workflow of your pipeline:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
- en: '`python src/main_with_config –config_loc <loc>`'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  id: totrans-29
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'We have now completely decoupled the setup of our experiment from the code
    that executes it. What experimental setup we want to try is now completely determined
    by the configuration file, making it trivial to try out new ideas. We can even
    control what steps we want to carry out, allowing scenarios like:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
- en: Running data preparation and feature selection only to generate an initial processed
    dataset that can form the basis of a more detailed experimentation on trying out
    different models and related hyperparameters
  id: totrans-31
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Leverage automation and parallelism
  id: totrans-32
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'We now have the ability to configure different experimental setups via a configuration
    file and launch full end-to-end experiment with a single command line invocation.
    All that is left to do is scale the capability to iterate over different experiment
    setups as quickly as possible. The key to this is:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: Automation to programatically modify the configuration file
  id: totrans-34
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Parallel execution of experiments
  id: totrans-35
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Step 1) is relatively trivial. We can write a shell script or even a secondary
    python script whose job is to iterative over different experimental setups that
    the user supplies and then launch a pipeline with each new setup.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  id: totrans-37
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Step 2) is a more interesting proposition and is very much situation dependent.
    All of the experiments that you run are self contained and have no dependency
    on each other. This means that we can theoretically launch all of them at the
    same time. Practically it relies on you having access to external compute, either
    in-house or though a cloud service provider. If this is the case then each experiment
    can be launched as a separate job on your compute, assuming that you have access
    to using these resources. This does involve other considerations however, such
    as deploying docker images to ensure a consistent environment across experiments
    and figuring out how to embed your code within the external compute. However once
    this is solved you are now in a position to launch as many experiments as you
    wish, you are only limited by the resources of your compute provider.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
- en: Embed Loggers and Experiment Trackers for Easy Oversight
  id: totrans-39
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Having the ability to launch 100’s of parallel experiments on external compute
    is a clear victory on the path to reducing the time to value of data science projects.
    However abstracting out this process comes with the cost of it not being as easy
    to interrogate, especially if something goes wrong. The interactive nature of
    notebooks made it possible to execute a cellblock and instantly look at the result.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
- en: Tracking the progress of your pipeline can be realised by using a logger in
    your experiment. You can capture key results such as the features chosen by the
    selection process, or use it to signpost what what is currently executing in the
    pipeline. If something were to go wrong you can reference the log entries you
    have created to figure out where the issue occurred, and then possibly embed more
    logs to better understand and resolve the issue.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  id: totrans-42
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: The final aspect of launching large scale parallel experiments is finding efficient
    ways of analysing them to quickly find the best performing setup. Reading through
    event logs or having to open up performance files for each experiment individually
    will quickly undo all the hard work you have done in ensuring a streamlined experimental
    process.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
- en: The easiest thing to do is to embed an experiment tracker into your pipeline
    script. There are a variety of 1^(st) and 3^(rd) party tooling available to you
    that lets you set up a project space and then log the important performance metrics
    of every experimental setup you consider. They normally come a configurable front
    end that allow users to create simple plots for comparison. This will make finding
    the best performing experiment a much simpler endeavour.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  id: totrans-45
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this article we have explored how to create pipelines that facilitates the
    ability to effortlessly carry out the experimentation process. This has involved
    moving out of notebooks and converting your experiment process into a single script.
    This script is then backed by a configuration file that controls the setup of
    your experiment, making it trivial to carry out different setups. External compute
    is then leveraged in order to parallelize the execution of the experiments. Finally,
    we spoke about using loggers and experiment trackers in order to maintain oversight
    of your experiments and more easily track their outcomes. All of this will allow
    data scientists to greatly accelerate their ability to run experiments, enabling
    them to reduce the time to value of their projects and deliver results to the
    business quicker.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我们探讨了如何创建管道，以方便轻松地执行实验过程。这包括从笔记本中移出，并将你的实验过程转换为一个单独的脚本。然后，这个脚本由一个配置文件支持，该文件控制实验的设置，使得执行不同的设置变得非常简单。接着，利用外部计算资源来并行化实验的执行。最后，我们讨论了使用日志记录器和实验跟踪器来保持对实验的监督，并更轻松地跟踪其结果。所有这些都将使数据科学家能够极大地加快他们运行实验的能力，使他们能够缩短项目的价值实现时间，并更快地向业务交付结果。
