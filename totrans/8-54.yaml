- en: An Overview of Feature Selection
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/an-overview-of-feature-selection-1c50965551dd/](https://towardsdatascience.com/an-overview-of-feature-selection-1c50965551dd/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: An overview of feature selection, and presentation of a rarely used but highly
    effective method (History-based Feature Selection), based on a regression model
    trained to estimate the predictive power of a given set of features
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: When working with prediction problems for tabular data, we often include feature
    selection as part of the process. This can be done for at least a few reasons,
    each important, but each quite different. First, it may done to increase the accuracy
    of the model; second, to reduce the computational costs of training and executing
    the model; and third, it may be done to make the model more robust and able to
    perform well on future data.
  prefs: []
  type: TYPE_NORMAL
- en: 'This article is part of a series looking at feature selection. In this and
    the next article, I’ll take a deep look at the first two of these goals: maximizing
    accuracy and minimizing computation. The following article will look specifically
    at robustness.'
  prefs: []
  type: TYPE_NORMAL
- en: As well, this article introduces a feature selection method called *History-based
    Feature Selection (HBFS)*. HBFS is based on experimenting with different subsets
    of features, learning the patterns as to which perform well (and which features
    perform well when included together), and from this, estimating and discovering
    other subsets of features that may work better still.
  prefs: []
  type: TYPE_NORMAL
- en: HBFS is described more thoroughly in the next article; this article provides
    some context, in terms of how HBFS compares to other feature selection methods.
    As well, the next article describes some experiments performed to evaluate HBFS,
    comparing it to other feature selection methods, which are described in this article.
  prefs: []
  type: TYPE_NORMAL
- en: As well as providing some background for the HBFS feature selection method,
    this article is useful for readers simply interested in feature selection generally,
    as it provides an overview of feature selection that I believe will be interesting
    to readers.
  prefs: []
  type: TYPE_NORMAL
- en: Feature selection for model accuracy
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Looking first at the accuracy of the model, it is often the case that we find
    a higher accuracy (either cross validating, or testing on a separate validation
    set) by using fewer features than the full set of features available. This can
    be a bit unintuitive as, in principle, many models, including tree-based models
    (which are not always, but tend to be the best performing for prediction on tabular
    data), should ideally be able to ignore the irrelevant features and use only the
    truly-predictive features, but in practice, the irrelevant (or only marginally
    predictive) features can very often confuse the models.
  prefs: []
  type: TYPE_NORMAL
- en: With tree-based models, for example, as we go lower in the trees, the split
    points are determined based on fewer and fewer records, and selecting an irrelevant
    feature becomes increasingly possible. Removing these from the model, while usually
    not resulting in very large gains, often provides some significant increase in
    accuracy (using *accuracy* here in a general sense, relating to whatever metric
    is used to evaluate the model, and not necessarily the accuracy metric per se).
  prefs: []
  type: TYPE_NORMAL
- en: Feature selection to reduce computational costs
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The second motivation for feature selection covered here is minimizing the computational
    costs of the model, which is also often quite important. Having a reduced number
    of features can decrease the time and processing necessary for tuning, training,
    evaluation, inference, and monitoring.
  prefs: []
  type: TYPE_NORMAL
- en: Feature selection is actually part of the tuning process, but here we are considering
    the other tuning steps, including model selection, selecting the pre-processing
    performed, and hyper-parameter tuning – these are often very time consuming, but
    less so with sufficient feature selection performed upfront.
  prefs: []
  type: TYPE_NORMAL
- en: When tuning a model (for example, tuning the hyper-parameters), it’s often necessary
    to train and evaluate a large number of models, which can be very time-consuming.
    But, this can be substantially faster if the number of features is reduced sufficiently.
  prefs: []
  type: TYPE_NORMAL
- en: These steps can be quite a bit slower if done using a large number of features.
    In fact, the costs of using additional features can be significant enough that
    they outweigh the performance gains from using more features (where there are
    such gains – as indicated, using more features will not necessarily increase accuracy,
    and can actually lower accuracy), and it may make sense to accept a small drop
    in performance in order to use fewer features.
  prefs: []
  type: TYPE_NORMAL
- en: Additionally, it may be desirable to reduce inference time. In real-time environments,
    for example, it may be necessary to make a large number of predictions very quickly,
    and using simpler models (including using fewer features) can facilitate this
    in some cases.
  prefs: []
  type: TYPE_NORMAL
- en: There’s a similar cost with evaluating, and again with monitoring each model
    (for example, when performing tests for data drift, this is simpler where there
    are fewer features to monitor).
  prefs: []
  type: TYPE_NORMAL
- en: The business benefits of any increase in accuracy would need to be balanced
    with the costs of a more complex model. It’s often the case that any gain in accuracy,
    even very small, may make it well worth adding additional features. But the opposite
    is often true as well, and small gains in performance do not always justify the
    use of larger and slower models. In fact, very often, there is no real business
    benefit to small gains in accuracy.
  prefs: []
  type: TYPE_NORMAL
- en: Additional motivations
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: There can be other motivations as well for feature selection. In some environments,
    using more features than are necessary requires additional effort in terms of
    collecting, storing, and ensuring the quality of these features.
  prefs: []
  type: TYPE_NORMAL
- en: Another motivation, at least when working in a hosted environments, is that
    it may be that using fewer features can result in lower overall costs. This may
    be due to costs even beyond the additional computational costs when using more
    features. For example, when using Google BigQuery, the costs of queries are tied
    to the number of columns accessed, and so there may be cost savings where fewer
    features are used.
  prefs: []
  type: TYPE_NORMAL
- en: Techniques for Feature Selection
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'There are many ways to perform feature selection, and a number of ways to categorize
    these. What I’ll present here isn’t a standard form of classification for feature
    selection methods, but I think is a quite straight-forward and useful way to look
    at this. We can think of techniques as falling into two groups:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Methods that evaluate the predictive power of each feature individually**.
    These include what are often referred to as *filter* methods, as well as some
    more involved methods. In general, methods in this category evaluate each feature,
    one at at time, in some way – for example, with respect to their correlation with
    the target column, or their mutual information with the target, and so on. These
    methods do not consider feature interactions, and may miss features that are predictive,
    but only when used in combination with other features, and may include features
    that are predictive, but highly redundant – where there are one or more features
    that add little additional predictive power given the presence of other features.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Methods that attempt to identify an ideal set of features**. This includes
    what are often called *wrapper* methods (I’ll describe these further below). This
    also includes genetic methods, and other such optimization methods (swarm intelligence,
    etc.). These methods do not attempt to rank the predictive power of each individual
    feature, only to find a set of features that, together, work better than any other
    set. These methods typically evaluate a number of candidate feature sets and then
    select the best of these. Where these methods differ from each other is largely
    how they determine which feature sets to evaluate.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We’ll look at each of these categories a little closer next.
  prefs: []
  type: TYPE_NORMAL
- en: Estimating the predictive power of each feature individually
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: There are a number of methods for feature selection provided by [scikit-learn](https://scikit-learn.org/stable/api/sklearn.feature_selection.html#module-sklearn.feature_selection)
    (as well as several other libraries, for example, [mlxtend](https://rasbt.github.io/mlxtend/)).
  prefs: []
  type: TYPE_NORMAL
- en: The majority of the feature selection tools in scikit-learn are designed to
    identify the most predictive features, considering them one at a time, by evaluating
    their associations with the target column. These include, for example, [chi2](https://scikit-learn.org/stable/modules/generated/sklearn.feature_selection.chi2.html#sklearn.feature_selection.chi2),
    [mutual information](https://scikit-learn.org/stable/modules/generated/sklearn.feature_selection.mutual_info_classif.html#sklearn.feature_selection.mutual_info_classif),
    and the [ANOVA f-value](https://scikit-learn.org/stable/modules/generated/sklearn.feature_selection.f_classif.html#sklearn.feature_selection.f_classif).
  prefs: []
  type: TYPE_NORMAL
- en: The [FeatureEngine](https://feature-engine.trainindata.com/en/latest/index.html)
    library also provides an implementation of an algorithm called [MRMR](https://feature-engine.trainindata.com/en/latest/user_guide/selection/MRMR.html),
    which similarly seeks to rank features, in this case based both on their association
    with the target, and their association with the other features (it ranks features
    highest that have high association with the target, and low association with the
    other features).
  prefs: []
  type: TYPE_NORMAL
- en: We’ll take a look next at some other methods that attempt to evaluate each feature
    individually. This is far from a complete list, but covers many of the most popular
    methods.
  prefs: []
  type: TYPE_NORMAL
- en: '**Recursive Feature Elimination**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '[Recursive Feature Elimination](https://scikit-learn.org/stable/modules/generated/sklearn.feature_selection.RFE.html#sklearn.feature_selection.RFE),
    provided by scikit-learn, works by training a model first on the full set of features.
    This must be a model that is able to provide feature importances (for example
    Random Forest, which provides a feature*importance* attribute, or Linear Regression,
    which can use the coefficients to estimate the importance of each feature, assuming
    the features have been scaled).'
  prefs: []
  type: TYPE_NORMAL
- en: It then repeatedly removes the least important features, and re-evaluates the
    features, until a target number of features is reached. Assuming this proceeds
    until only one feature remains, we have a ranked order of the predictive value
    of each feature (the later the feature was removed, the more predictive it is
    assumed to be).
  prefs: []
  type: TYPE_NORMAL
- en: '**1D models**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 1D models are models that use one dimension, which is to say, one feature. For
    example, we may create a decision tree trained to predict the target using only
    a single feature. It’s possible to train such a decision tree for each feature
    in the data set, one at a time, and evaluate each’s ability to predict the target.
    For any features that are predictive on their own, the associated decision tree
    will have better-than-random skill.
  prefs: []
  type: TYPE_NORMAL
- en: Using this method, it’s also possible to rank the features, based on the accuracies
    of the 1D models trained using each feature.
  prefs: []
  type: TYPE_NORMAL
- en: This is somewhat similar to simply checking the correlation between the feature
    and target, but is also able to detect more complex, non-monotonic relationships
    between the features and target.
  prefs: []
  type: TYPE_NORMAL
- en: '**Model-based feature selection**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Scikit-learn provides support for [model-based feature selection](https://scikit-learn.org/stable/modules/generated/sklearn.feature_selection.SelectFromModel.html#sklearn.feature_selection.SelectFromModel).
    For this, a model is trained using all features, as with Recursive Feature Elimination,
    but instead of removing features one at a time, we simply use the feature importances
    provided by the model (or can do something similar, using another feature importance
    tool, such as [SHAP](https://shap.readthedocs.io/en/latest/)). For example, we
    can train a LogisticRegression or RandomForest model. Doing this, we can access
    the feature importances assigned to each feature and select only the most relevant.
  prefs: []
  type: TYPE_NORMAL
- en: This is not necessarily an effective means to identify the best subset of features
    if our goal is to create the most accurate model we can, as it identifies the
    features the model is using in any case, and not the features it *should* be using.
    So, using this method will not tend to lead to more accurate models. However,
    this method is very fast, and where the goal is not to increase accuracy, but
    to reduce computation, this can be very useful.
  prefs: []
  type: TYPE_NORMAL
- en: '**Permutation tests**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Permutation tests are similar. There are variations on how this may be done,
    but to look at one approach: we train a model on the full set of features, then
    evaluate it using a validation set, or by cross-validation. This provides a baseline
    for how well the model performs. We can then take each feature in the validation
    set, one at a time, and scramble (permute) it, re-evaluate the model, and determine
    how much the score drops. It’s also possible to re-train with each feature permuted,
    one a time. The greater the drop in accuracy, the more important the feature.'
  prefs: []
  type: TYPE_NORMAL
- en: '**The Boruta method**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: With the Boruta method, we take each feature, and create what’s called a *shadow
    feature*, which is a permuted version of the original feature. So, if we originally
    have, say, 10 features in a table, we create shadow versions of each of these,
    so have 20 features in total. We then train a model using the 20 features and
    evaluate the importance of each feature. Again, we can use built-in feature importance
    measures as are provided by many scikit-learn models and other models (eg CatBoost),
    or can use a library such as [SHAP](https://shap.readthedocs.io/en/latest/) (which
    may be slower, but will provide more accurate feature importances).
  prefs: []
  type: TYPE_NORMAL
- en: We take the maximum importance given to any of the shadow features (which are
    assumed to have zero predictive power) as the threshold separating predictive
    from non-predictive features. All other features are checked to see if their feature
    importance was higher than this threshold or not. This process is repeated many
    times and each feature is scored based on the number of times it received a feature
    importance higher than this threshold.
  prefs: []
  type: TYPE_NORMAL
- en: That’s a quick overview of some of the methods that may be used to evaluate
    features individually. These methods can be sub-optimal, particularly when the
    goal is to create the most accurate model, as they do not consider feature interactions,
    but they are very fast, and to tend to rank the features well.
  prefs: []
  type: TYPE_NORMAL
- en: Generally, using these, we will get a ranked ordering of each feature. We may
    have determined ahead of time how many features we wish to use. For example, if
    we know we wish to use 10 features, we can simply take the top 10 ranked features.
  prefs: []
  type: TYPE_NORMAL
- en: 'Or, we can test with a validation set, using the top 1 feature, then the top
    2, then top 3, and so on, up to using all features. For example, if we have a
    rank ordering (from strongest to weakest) of the features: {E, B, H, D, G, A,
    F, C}, then we can test: {E}, then {E, B}, then {E, B, H} and so on up to the
    full set {E, B, H, D, G, A, F, C}, with the idea that if we used just one feature,
    it would be the strongest one; if we used just two features, it would be the strongest
    two, and so on. Given the scores for each of these feature sets, we can take either
    the number of features with the highest metric score, or the number of features
    that best balances score and number of features.'
  prefs: []
  type: TYPE_NORMAL
- en: Finding the optimum subset of features
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The main limitation of the above methods is that they don’t fully consider feature
    interactions. In particular, they can miss features that would be useful, even
    if not strong on their own (they may be useful, for example, in some specific
    subsets of the data, or where their relationship with another feature is predictive
    of the target), and they can include features that are redundant. If two or more
    features provide much of the same signal, most likely some of these can be removed
    with little drop in the skill of the model.
  prefs: []
  type: TYPE_NORMAL
- en: We look now at methods that attempt to find the subset of features that works
    optimally. These methods don’t attempt to evaluate or rank each feature individually,
    only to find the set of features that work the best as a set.
  prefs: []
  type: TYPE_NORMAL
- en: In order to identify the optimal set of features, it’s necessary to test and
    evaluate many such sets, which is more expensive – there are more combinations
    than when simply considering each feature on its own, and each combination is
    more expensive to evaluate (due to having more features, the models tend to be
    slower to train). It does, though, generally result in stronger models than when
    simply using all features, or when relying on methods that evaluate the features
    individually.
  prefs: []
  type: TYPE_NORMAL
- en: I should note, though, it’s not necessarily the case that we use strictly one
    or the other method; it’s quite possible to combine these. For example, as most
    of the methods to identify an optimal set of features are quite slow, it’s possible
    to first run one of the above methods (that evaluate the features individually
    and then rank their predictive power) to create a short list of features, and
    then execute a method to find the optimal subset of these shortlisted features.
    This can erroneously exclude some features (the method used first to filter the
    features may remove some features that would be useful given the presence of some
    other features), but can also be a good balance between faster but less accurate,
    and slower but more accurate, methods.
  prefs: []
  type: TYPE_NORMAL
- en: Methods that attempt to find the best set of features include what are called
    *wrapper methods,* random search*,* and various optimization methods, as well
    as some other approaches. The method introduced in this article, HBFS, is also
    an example of a method that seeks to find the optimal set of features. These are
    described next.
  prefs: []
  type: TYPE_NORMAL
- en: Wrapper methods
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Wrapper methods also can be considered a technique to rank the features (they
    can provide a rank ordering of estimated predictive power), but for this discussion,
    I’ll categorize them as methods to find the best set of features it’s able to
    identify. Wrapper methods do actually test full combinations of features, but
    in a restricted (though often still very slow) manner.
  prefs: []
  type: TYPE_NORMAL
- en: With wrapper methods, we generally start either with an empty set of features,
    and add features one at a time (this is referred to as an *additive* process),
    or start with the complete set of features, and remove features one at a time
    (this is referred to as a *subtractive* process).
  prefs: []
  type: TYPE_NORMAL
- en: With an additive process, we first find the single feature that allows us to
    create the strongest model (using a relevant metric). This requires testing each
    feature one at a time. We then find the feature that, when added to the set, allows
    us to create the strongest model that uses the first feature and a second feature.
    This requires testing with each feature other than the feature already present.
    We then select the third feature in the same way, and so on, up to the last feature,
    or until reaching some stopping condition (such as a maximum number of features).
  prefs: []
  type: TYPE_NORMAL
- en: If there are features {A, B, C, D, E, F, G, H, I, J} , there are 10 features.
    We first test all 10 of these one at a time (requiring 10 tests). We may find
    D works best, so we have the feature set {D}. We then test {D, A}, {D, B}, {D,
    C}, {D, E},…{D, J}, which is 9 tests, and take the strongest of these. We may
    find {D, E} works best, so have {D, E} as the feature set. We then test {D, E,
    A}, {D, E, B}, …{D, E, J}, which is 8 tests, and again take the strongest of these,
    and continue in this way. If the goal is to find the best set of, say, 5, features,
    we may end with, for example,{D, E, B, A, I}.
  prefs: []
  type: TYPE_NORMAL
- en: We can see how this may miss the best combination of 5 features, but will tend
    to work fairly well. In this example, this likely would be at least among the
    strongest subsets of size 5 that could be identified, though testing, as described
    in the next article, shows wrapper methods do tend to work less effectively than
    would be hoped.
  prefs: []
  type: TYPE_NORMAL
- en: And we can also see that it can be prohibitively slow if there are many features.
    With hundreds of features, this would be impossible. But, with a moderate number
    of features, this can work reasonably well.
  prefs: []
  type: TYPE_NORMAL
- en: Subtractive methods work similarly, but with removing a feature at each step.
  prefs: []
  type: TYPE_NORMAL
- en: Random Search
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Random search is rarely used for feature selection, though is used in many other
    contexts, such as hyperparameter tuning. In the next article, we show that random
    search actually works better for feature selection than might be expected, but
    it does suffer from not being strategic like wrapper methods, and from not learning
    over time like optimization techniques or HBFS.
  prefs: []
  type: TYPE_NORMAL
- en: This can result in random searches unnecessarily testing candidates that are
    certain to be weak (for example, candidates feature sets that are very similar
    to other feature sets already tested, where the previously-tested sets performed
    poorly). It can also result in failing to test combinations of features that would
    reasonably appear to be the most promising given the other experiments performed
    so far.
  prefs: []
  type: TYPE_NORMAL
- en: Random search, though, is very simple, can be adequate in many situations, and
    often out-performs methods that evaluate the features individually.
  prefs: []
  type: TYPE_NORMAL
- en: Optimization techniques
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: There are a number of optimization techniques that may be used to identify an
    optimal feature set, including Hill Climbing, genetic methods Bayesian Optimization,
    and swarm intelligence, among others.
  prefs: []
  type: TYPE_NORMAL
- en: Hill climbing, as applied to feature selection, can work similar to the process
    described in [Solving the Classic Betting on the World Series Problem Using Hill
    Climbing](https://medium.com/towards-data-science/solving-the-classic-betting-on-the-world-series-problem-using-hill-climbing-5e9766e1565d).
  prefs: []
  type: TYPE_NORMAL
- en: Here, we would start with a random set of features, then find a small modification
    (adding or removing a small number of features) that improves the set (testing
    several such small modifications and taking the best of these), and then find
    a small change that improves over *that* set of features, and so on, until some
    stopping condition is met (we can limit the time, the number of candidates considered,
    the time since the last improvement, or set some other such limit).
  prefs: []
  type: TYPE_NORMAL
- en: In this way, starting with a random (and likely poorly-performing) set of features,
    we can gradually, and repeatedly improve on this, discovering stronger and stronger
    sets of features until a very strong set is eventually discovered.
  prefs: []
  type: TYPE_NORMAL
- en: For example, we may randomly start with {B, F, G, H, J}, then find the small
    variation {B, C, F, G, H, J} (which adds feature C) works better, then that {B,
    C, F, H, J} (which removes feature G) works a bit better still, and so on.
  prefs: []
  type: TYPE_NORMAL
- en: In some cases, we may get stuck in local optima and another technique, called
    *simulated annealing*, may be useful to continue progressing. This allows us to
    occasionally select lower-performing options, which can help prevent getting stuck
    in a state where there is no small change that improves it.
  prefs: []
  type: TYPE_NORMAL
- en: Genetic algorithms work similarly, though at each step, many candidates are
    considered as opposed to just one, and *combining* is done as well as *mutating*
    (the small modifications done to a candidate set of features at each step in a
    hill climbing solution are similar to the modifications made to candidates in
    genetic algorithms, where they are known as *mutations*).
  prefs: []
  type: TYPE_NORMAL
- en: With *combining*, two or more candidates are selected and one or more new candidates
    is created based on some combination of these. For example, if we have two feature
    sets, it’s possible to take half the features used by one of these, along with
    half used by the other, remove any duplicated features, and treat this as a new
    candidate.
  prefs: []
  type: TYPE_NORMAL
- en: (In practice, the candidates in feature selection problems when using genetic
    methods would normally be formatted as a string of 0’s and 1’s – one value for
    each feature – in an ordered list of features, indicating if that feature is included
    in the set or not, so the process to combine two candidates would likely be slightly
    different than this example, but the same idea.)
  prefs: []
  type: TYPE_NORMAL
- en: An example of using a genetic algorithm for a different purpose, constructing
    decision trees, is shown in [Create Stronger Decision Trees with bootstrapping
    and genetic algorithms](https://medium.com/towards-data-science/create-stronger-decision-trees-with-bootstrapping-and-genetic-algorithms-1ae633a993c9).
  prefs: []
  type: TYPE_NORMAL
- en: Bayesian Optimization
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: With Bayesian Optimization, the idea to solving a problem such as finding an
    optimal set of features, is to first try a number of random candidates, evaluate
    these, then create a model that can estimate the skill of other sets of features
    based on what we learn from the candidates that have been evaluated so far.
  prefs: []
  type: TYPE_NORMAL
- en: For this, we use a type of regressor called a *Gaussian Process*, as it has
    the ability to not only provide an estimate for any other candidate (in this case,
    to estimate the metric score for a model that would be trained using this set
    of features), but to quantify the uncertainty.
  prefs: []
  type: TYPE_NORMAL
- en: 'For example, if we’ve already evaluated a given set of features, say, {F1,
    F2, F10, F23, F51} (and got a score of 0.853), then we can be relatively certain
    about the score predicted for a very similar feature set, say: {F1, F2, F10, F23,
    F51, F53}, with an estimated score of 0.858 – though we cannot be perfectly certain,
    as the one additional feature, F53, may provide a lot of additional signal. But
    our estimate would be more certain than with a completely different set of features,
    for example {F34, F36, F41, F62} (assuming nothing similar to this has been evaluated
    yet, this would have high uncertainty).'
  prefs: []
  type: TYPE_NORMAL
- en: As another example, the set {F1, F2, F10, F23} has one fewer feature, F51\.
    If F51 appears to be not predictive (given the scores given to other feature sets
    with and without F53), or appears to be highly redundant with, say, F1, then we
    can estimate the score for {F1, F2, F10, F23} with some confidence – it should
    be about the same as for {F1, F2, F10, F23, F51}. There is still significant uncertainty,
    but, again, much less that with a completely different set of features.
  prefs: []
  type: TYPE_NORMAL
- en: So, for any given set of features, the Gaussian Process can generate not only
    an estimate of the score it would receive, but the uncertainty, which is provided
    in the form of a credible interval. For example, if we are concerned with the
    macro f1 score, the Gaussian Process can learn to estimate the macro f1 score
    of any given set of features. For one set it may estimate, for example, 0.61,
    and it may also specify a credible interval of 0.45 to 0.77, meaning there’s a
    90% (if we use 90% for the width of the credible interval) probability the f1
    score would be between 0.45 and 0.77.
  prefs: []
  type: TYPE_NORMAL
- en: Bayesian Optimization works to balance exploration and exploitation. At the
    beginning of the process, we tend to focus more on exploring – in this case, figuring
    out which features are predictive, which features are best to include together
    and so on. Then, over time, we tend to focus more on exploiting – taking advantage
    of what we’ve learned to try to identify the most promising sets of features that
    haven’t been evaluated yet, which we then test.
  prefs: []
  type: TYPE_NORMAL
- en: Bayesian Optimization works by alternating between using what’s called an *acquisition
    method* to identify the next candidate(s) to evaluate, evaluating these, learning
    from this, calling the acquisition method again, and so on. Early on, the acquisition
    method will tend to select candidates that look promising, but have high uncertainty
    (as these are the ones we can learn the most from), and later on, the candidates
    that appear most promising and have relatively low uncertainty (as these are the
    ones most likely to outperform the candidates already evaluated, though tend to
    be small variations on the top-scored feature sets so far found).
  prefs: []
  type: TYPE_NORMAL
- en: In this article, we introduce a method called History-based Feature Selection
    (HBFS), which is probably most similar to Bayesian Optimization, though somewhat
    simpler. We look at this next, and in the next article look at some experiments
    comparing its performance to some of the other methods covered so far.
  prefs: []
  type: TYPE_NORMAL
- en: History-based Feature Selection
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We’ve now gone over, admittedly very quickly, many of the other main options
    for feature selection commonly used today. I’ll now introduce History-based Feature
    Selection (HBFS). This is another feature selection method, which I’ve found quite
    useful, and which I’m not aware of another implementation of, or even discussion
    of, though the idea is fairly intuitive and straightforward.
  prefs: []
  type: TYPE_NORMAL
- en: Given there was no other implementation I’m aware of, I’ve created a python
    implementation, now available on github, [HistoryBasedFeatureSelection](https://github.com/Brett-Kennedy/HistoryBasedFeatureSelection).
  prefs: []
  type: TYPE_NORMAL
- en: This provides Python code, documentation, an example notebook, and a file used
    to test HBFS fairly thoroughly.
  prefs: []
  type: TYPE_NORMAL
- en: Even where you don’t actually use HBFS for your machine learning models, I hope
    you’ll find the approach interesting. The ideas should still be useful, and are
    a hopefully, at minimum, a good way to help think about feature selection.
  prefs: []
  type: TYPE_NORMAL
- en: I will, though, show that HBFS tends to work quite favourably compared to other
    options for feature selection, so it likely is worth looking at for projects,
    though the ideas are simple enough they can be coded directly – using the code
    available on the github page may be convenient, but is not necessary.
  prefs: []
  type: TYPE_NORMAL
- en: I refer to this method as *History-based Feature Selection (HBFS)*, as it learns
    from a history of trying feature subsets, learning from their performance on a
    validation set, testing additional candidate sets of features, learning from these
    and so on. As the history of experiments progresses, the model is able to learn
    increasingly well which subsets of features are most likely to perform well.
  prefs: []
  type: TYPE_NORMAL
- en: 'The following is the main algorithm, presented as pseudo-code:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: We can see, this is a bit simpler than with Bayesian Optimization, as the first
    iteration is completely focused on exploration (the candidates are generated randomly)
    and all subsequent iterations focus entirely on exploitation – there is not a
    gradual trend towards more exploitation.
  prefs: []
  type: TYPE_NORMAL
- en: This as some benefit, as the process normally requires only a small number of
    iterations, usually between about 4 and 12 or so (so there is less value in exploring
    candidate feature sets that appear to be likely weak). It also avoids tuning the
    process of balancing exploration and exploitation.
  prefs: []
  type: TYPE_NORMAL
- en: So the acquisition function is quite straightforward – we simply select the
    candidates that haven’t been tested yet but appear to be most promising. While
    this can (due to some reduction in exploration) miss some candidates with strong
    potential, in practice it appears to identify the strongest candidates reliably
    and quite quickly.
  prefs: []
  type: TYPE_NORMAL
- en: HBFS executes reasonably quickly. It’s of course slower then methods that evaluate
    each feature individually, but in terms of performance compares quite well to
    wrapper methods, genetic methods, and other methods that seek to find the strongest
    feature sets.
  prefs: []
  type: TYPE_NORMAL
- en: HBFS is designed to let users understand the feature-selection process it performs
    as it executes. For example, one of the visualizations provided plots the scores
    (both the estimated scores, and the actual-evaluated scores) for all feature sets
    that are evaluated, which helps us understand how well it’s able to estimate the
    the score that would be given for an arbitrary candidate feature set).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/39f111548eab49cb6128ba993d5a119f.png)'
  prefs: []
  type: TYPE_IMG
- en: 'HBFS also includes some functionality not common with feature selection methods,
    such as allowing users to either: 1) simply maximize accuracy, or 2) to balance
    the goals of maximizing accuracy with minimizing computational costs. These are
    described in the next article.'
  prefs: []
  type: TYPE_NORMAL
- en: Conclusions
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This provided a quick overview of some of the most common methods for feature
    selection. Each works a bit differently and each has its pros and cons. Depending
    on the situation, and if the goal is to maximize accuracy, or to balance accuracy
    with computational costs, different methods can be preferable.
  prefs: []
  type: TYPE_NORMAL
- en: This also provided a very quick introduction to the History-based Feature Selection
    method.
  prefs: []
  type: TYPE_NORMAL
- en: HBFS is a new algorithm that I’ve found to work very well, and usually, though
    not always, preferably to the methods described here (no method will strictly
    out-perform all others).
  prefs: []
  type: TYPE_NORMAL
- en: In the next article we look closer at HBFS, as well as describe some experiments
    comparing its performance to some of the other methods described here.
  prefs: []
  type: TYPE_NORMAL
- en: In the following article, I’ll look at how feature selection can be used to
    create more robust models, given changes in the data or target that may occur
    in production.
  prefs: []
  type: TYPE_NORMAL
- en: All images are by the author.
  prefs: []
  type: TYPE_NORMAL
