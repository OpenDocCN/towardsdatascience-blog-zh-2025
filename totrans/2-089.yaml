- en: 'Automated Testing: A Software Engineering Concept Data Scientists Must Know
    To Succeed'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 自动化测试：数据科学家必须知道的软件工程概念，以成功实现目标
- en: 原文：[https://towardsdatascience.com/automated-testing-a-software-engineering-concept-data-scientists-must-know-to-succeed/](https://towardsdatascience.com/automated-testing-a-software-engineering-concept-data-scientists-must-know-to-succeed/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/automated-testing-a-software-engineering-concept-data-scientists-must-know-to-succeed/](https://towardsdatascience.com/automated-testing-a-software-engineering-concept-data-scientists-must-know-to-succeed/)
- en: Why you should read this article
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么你应该阅读这篇文章
- en: <mdspan datatext="el1753819409643" class="mdspan-comment">Most</mdspan> data
    scientists whip up a Jupyter Notebook, play around in some cells, and then maintain
    entire data processing and model training pipelines in the same notebook.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1753819409643" class="mdspan-comment">大多数</mdspan>数据科学家会快速创建一个Jupyter
    Notebook，在几个单元格中玩耍，然后在同一个笔记本中维护整个数据处理和模型训练流程。
- en: 'The code is tested once when the notebook was first written, and then it is
    neglected for some undetermined amount of time – days, weeks, months, years, until:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 代码在笔记本首次编写时测试了一次，然后被忽视了一段时间——可能是几天、几周、几个月、几年，直到：
- en: The outputs of the notebook need to be rerun to re-generate outputs that were
    lost.
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 需要重新运行笔记本的输出以重新生成丢失的输出。
- en: The notebook needs to be rerun with different parameters to retrain a model.
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 需要使用不同的参数重新运行笔记本以重新训练模型。
- en: Something needed to be changed upstream, and the notebook needs to be rerun
    to refresh downstream datasets.
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 需要更改上游的某些内容，并且需要重新运行笔记本以刷新下游数据集。
- en: '***Many of you will have felt shivers down your spine reading this…***'
  id: totrans-8
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '***许多人在阅读这篇文章时都会感到脊背发凉……***'
- en: '**Why?**'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: '**为什么？**'
- en: Because you instinctively know that this notebook is never going to run.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 因为你知道这个笔记本永远不会运行。
- en: You know it in your bones the code in that notebook will need to be debugged
    for hours at best, re-written from scratch at worst.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 你心里很清楚，那个笔记本里的代码最多需要调试数小时，最坏的情况是从头开始重写。
- en: In both cases, it will take you a long time to get what you need.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 在这两种情况下，你都需要花费很长时间才能得到你需要的东西。
- en: '***Why does this happen?***'
  id: totrans-13
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '***为什么会这样发生？***'
- en: ''
  id: totrans-14
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '***Is there any way of avoiding this?***'
  id: totrans-15
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '***有没有避免这种情况的方法？***'
- en: ''
  id: totrans-16
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '***Is there a better way of writing and maintaining code?***'
  id: totrans-17
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '***有没有更好的编写和维护代码的方法？***'
- en: This is the question we will be answering in this article.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 这正是本文将要回答的问题。
- en: 'The Solution: Automated Testing'
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 解决方案：自动化测试
- en: What is it?
  id: totrans-20
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 它是什么？
- en: As the name suggests, automated testing is the process of running a predefined
    set of tests on your code to ensure that it is working as expected.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 如其名所示，自动化测试是在你的代码上运行预定义的测试集的过程，以确保它按预期工作。
- en: These tests verify that your code behaves as expected — especially after changes
    or additions — and alert you when something breaks. It removes the need for a
    human to manually test your code, and there is no need to run it on actual data.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 这些测试验证了你的代码的行为是否符合预期——特别是在更改或添加之后——并在有问题时提醒你。它消除了手动测试代码的需要，并且不需要在实际数据上运行。
- en: Convenient, isn’t it?
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 方便，不是吗？
- en: Types of Automated Testing
  id: totrans-24
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 自动化测试的类型
- en: There are so many different types of testing, and covering all of them is beyond
    the scope of this article.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 测试的类型有很多，涵盖所有这些内容超出了本文的范围。
- en: 'Let’s just focus on the two main types most relevant to a data scientist:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们只关注对数据科学家最相关的两种主要类型：
- en: Unit Tests
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 单元测试
- en: Integration Tests
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 集成测试
- en: '**Unit Tests**'
  id: totrans-29
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**单元测试**'
- en: '![](../Images/5da206eec3e5c670e2aef55b548035c6.png)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/5da206eec3e5c670e2aef55b548035c6.png)'
- en: Image by author. Illustration of the concept of a unit test.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 作者提供的图片。单元测试概念图解。
- en: Tests the smallest parts of code in isolation (*e.g., a function*).
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 测试代码的最小部分（例如，一个函数）在隔离状态下。
- en: The function should do one thing only to make it easy to test. Give it a known
    input, and check that the output is as expected.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 函数应该只做一件事情，以便于测试。给它一个已知的输入，并检查输出是否符合预期。
- en: '**Integration Tests**'
  id: totrans-34
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**集成测试**'
- en: '![](../Images/fb5ef828cdd37bee098a383950a33ff8.png)'
  id: totrans-35
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/fb5ef828cdd37bee098a383950a33ff8.png)'
- en: Image by author. Illustration of the concept of an integration test.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 作者提供的图片。集成测试概念图解。
- en: Tests how multiple components work together.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 测试多个组件如何协同工作。
- en: For us data scientists, it means checking whether data loading, merging, and
    preprocessing steps produce the expected final dataset, given a known input dataset.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我们这些数据科学家来说，这意味着检查数据加载、合并和预处理步骤是否在已知输入数据集的情况下产生预期的最终数据集。
- en: A practical example
  id: totrans-39
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 一个实际例子
- en: Enough with the theory, let’s see how it works in practice.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 理论已经足够了，让我们看看它在实际中是如何工作的。
- en: We will go through a simple example where a data scientist has written some
    code in a Jupyter notebook (or script), one that many data scientists will have
    seen in their jobs.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将通过一个简单的例子来讲解，一个数据科学家在 Jupyter 笔记本（或脚本）中编写了一些代码，这在许多数据科学家的工作中都曾见过。
- en: We will pick up on why the code is bad. Then, we’ll try and make it better.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将探讨代码为什么不好。然后，我们将尝试让它变得更好。
- en: 'By better, we mean:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 我们所说的“更好”，是指：
- en: Easy to test
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 易于测试
- en: Easy to read
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 易于阅读
- en: which ultimately means *easy to maintain,* because in the long run, good code
    is code that works, keeps working, and is easy to maintain.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 这最终意味着*易于维护*，因为从长远来看，好的代码是能够工作、持续工作且易于维护的。
- en: We will then design some unit tests for our improved code, highlighting why
    the changes are beneficial for testing. To prevent this article from becoming
    too long, I will defer examples of integration testing to a future article.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将为改进后的代码设计一些单元测试，突出这些更改对测试的好处。为了防止这篇文章变得过长，我将把集成测试的例子留到未来的文章中。
- en: Then, we will go through some rules of thumb for what code to test.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们将讨论一些关于要测试的代码的经验法则。
- en: Finally, we will cover how to run tests and how to structure projects.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们将介绍如何运行测试以及如何构建项目结构。
- en: '![](../Images/92a2dc020ac0c76c0d5c96dd8d89bc02.png)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/92a2dc020ac0c76c0d5c96dd8d89bc02.png)'
- en: Photo by [Wolfgang Weiser](https://unsplash.com/@hamburgmeinefreundin?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on [Unsplash](https://unsplash.com/photos/a-train-traveling-through-a-forest-filled-with-lots-of-trees-el8EOJhVjEU?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由 [Wolfgang Weiser](https://unsplash.com/@hamburgmeinefreundin?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    在 [Unsplash](https://unsplash.com/photos/a-train-traveling-through-a-forest-filled-with-lots-of-trees-el8EOJhVjEU?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    提供
- en: Example Pipeline
  id: totrans-52
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 示例管道
- en: 'We will use the following pipeline as an example:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将以以下管道为例：
- en: '[PRE0]'
  id: totrans-54
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: In real life, we would see hundreds of lines of code crammed into a single notebook.
    But the script is exemplary of all the things that need fixing in typical data
    science notebooks.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 在现实生活中，我们会看到数百行代码被压缩到一个单独的笔记本中。但这个脚本是典型的数据科学笔记本中需要修复的所有问题的典范。
- en: 'This code is doing the following:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 这段代码正在执行以下操作：
- en: Loads user, transaction, and product data.
  id: totrans-57
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 加载用户、交易和产品数据。
- en: Merges them into a unified dataset.
  id: totrans-58
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将它们合并到一个统一的数据库中。
- en: Filters recent transactions.
  id: totrans-59
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 过滤最近的交易。
- en: Adds calculated fields (`total_price`, `segment`).
  id: totrans-60
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 添加计算字段（`total_price`，`segment`）。
- en: Drops irrelevant columns.
  id: totrans-61
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 删除无关的列。
- en: Aggregates total spending per user and segment.
  id: totrans-62
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 聚合每个用户和细分市场的总支出。
- en: Saves the result as a Parquet file.
  id: totrans-63
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将结果保存为 Parquet 文件。
- en: '**Why is this pipeline bad?**'
  id: totrans-64
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**为什么这个管道不好？**'
- en: Oh, there are so many reasons coding in this manner is bad, depending on what
    lens you look at it from. It’s not the content that is the problem, but how it
    is structured.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 哦，从不同的角度来看，这种方式的编码有很多不好的理由。问题不在于内容，而在于它的结构。
- en: While there are many angles we can discuss the disadvantages of writing code
    this way, for this article we will focus on testability.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管我们可以从许多角度讨论这种编写代码方式的缺点，但在这篇文章中，我们将专注于可测试性。
- en: 1\. Tightly coupled logic (in other words, no modularity)
  id: totrans-67
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 紧密耦合的逻辑（换句话说，没有模块化）
- en: All operations are crammed into a single script and run at once. It’s unclear
    what each part does unless you read every line. Even for a script this simple,
    this is difficult to do. In real-life scripts, it can only get worse when code
    can reach hundreds of lines.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 所有操作都被压缩到一个单独的脚本中，并一次性运行。除非你阅读每一行，否则不清楚每个部分的作用。即使是这样一个简单的脚本，这也是很难做到的。在现实生活中的脚本中，当代码达到数百行时，这只会变得更糟。
- en: This makes it impossible to test.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 这使得测试变得不可能。
- en: The only way to do so would be to run the entire thing all at once from start
    to finish, probably on actual data that you’re going to use.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 唯一的方法是一次性从头到尾运行整个流程，可能是在你将要使用的数据上。
- en: If your dataset is small, then perhaps you can get away with this. But in most
    cases, data scientists are working with a truck-load of data, so it’s infeasible
    to run any form of a test or sanity check quickly.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的数据集很小，那么你可能可以侥幸逃脱这种做法。但在大多数情况下，数据科学家都在处理大量的数据，因此快速运行任何形式的测试或合理性检查都是不可行的。
- en: We need to be able to break the code up into manageable chunks that do one thing
    only, and do it well. Then, we can control what goes in, and confirm that what
    we expect comes out of it.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要能够将代码分解成只做一件事且做得好的可管理块。然后，我们可以控制输入，并确认我们期望的结果。
- en: 2\. No Parameterization
  id: totrans-73
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 没有参数化
- en: Hardcoded file paths and values like `2023-01-01` make the code brittle and
    inflexible. Again, hard to test with anything but the live/production data.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 预设的文件路径和值，如`2023-01-01`，会使代码变得脆弱且缺乏灵活性。再次强调，除非使用实时/生产数据，否则很难对代码进行测试。
- en: There’s no flexibility in how we can run the code, everything is fixed.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们运行代码的方式上没有灵活性，一切都是固定的。
- en: What’s worse, as soon as you change something, you have no assurance that nothing’s
    broken further down the script.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 更糟糕的是，一旦你做了改动，你无法保证脚本的其他部分没有出现错误。
- en: For example, how many times have you made a change that you thought was benign,
    only to run the code and find a completely unexpected part of the code to break?
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，你有多少次在认为改动无害的情况下修改代码，结果却发现代码中完全意想不到的部分出现了问题？
- en: How to improve?
  id: totrans-78
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何改进？
- en: Now, let’s see step-by-step how we can improve this code.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们一步一步地看看我们如何可以改进这段代码。
- en: '*Please note, we will assume that we are using the `pytest` module for our
    tests going forwards.*'
  id: totrans-80
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*请注意，我们将假设我们正在使用`pytest`模块进行后续的测试。*'
- en: 1\. A clear, configurable entry point
  id: totrans-81
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 清晰、可配置的入口点
- en: '[PRE1]'
  id: totrans-82
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: We start off by creating a single function that we can run from anywhere, with
    clear arguments that can be changed.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 我们首先创建一个可以从任何地方运行的单一函数，具有可以更改的清晰参数。
- en: What does this achieve?
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 这实现了什么？
- en: This allows us to run the pipeline in specific test conditions.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 这样做允许我们在特定的测试条件下运行管道。
- en: '[PRE2]'
  id: totrans-86
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Immediately, you can start passing in different inputs, different parameters,
    depending on the edge case that you want to test for.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 立即，你可以开始传递不同的输入，不同的参数，根据你想要测试的边缘情况。
- en: It gives you flexibility to run the code in different settings by making it
    easier to control the inputs and outputs of your code.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 通过使控制代码的输入和输出变得更容易，它为你提供了在不同设置中运行代码的灵活性。
- en: Writing your pipeline in this way paves the way for integration testing your
    pipeline. More on this in a later article.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 以这种方式编写你的管道为集成测试你的管道铺平了道路。更多内容将在后续文章中介绍。
- en: 2\. **Group code into meaningful chunks that do one thing, and do it well**
  id: totrans-90
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. **将代码分组为有意义的块，每个块只做一件事，并且做好**
- en: Now, this is where a bit of art comes in – different people will organise code
    differently depending on which parts they find important.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，这里就有一点艺术性了——不同的人会根据他们认为重要的部分以不同的方式组织代码。
- en: There is no right or wrong answer, but the common sense is to make sure a function
    does one thing and does it well. Do this, and it becomes easy to test.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 没有正确或错误答案，但常识是确保一个函数只做一件事，并且做好。这样做，测试就变得容易了。
- en: 'One way we could group our code is like below:'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以将代码分组的一种方式如下：
- en: '[PRE3]'
  id: totrans-94
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: What does the grouping achieve?
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 分组实现了什么？
- en: '**Better documentation**'
  id: totrans-96
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**更好的文档**'
- en: Well, first of all, you end up with some natural retail space in your code to
    add docstrings. Why is this important? Well have you tried reading your own code
    a month after writing it?
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，你会在代码中留下一些自然的空间来添加文档字符串。为什么这很重要？你尝试过在写完代码一个月后阅读自己的代码吗？
- en: People forget details very quickly, and even code **you’ve** written can become
    undecipherable within just a few days.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 人们很快就会忘记细节，即使是**你**自己写的代码，几天后也可能变得难以理解。
- en: It’s essential to document what the code is doing, what it expects to take as
    input, and what it returns, at the very least.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 至少记录代码正在做什么，它期望接收什么输入，以及它返回什么，这是非常重要的。
- en: Including docstrings in your code provides context and sets expectations for
    how a function should behave, making it easier to understand and debug failing
    tests in the future.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 在你的代码中包含文档字符串提供了上下文，并设定了函数应该如何行为的期望，这使得未来更容易理解和调试失败的测试。
- en: Better Readability
  id: totrans-101
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 更好的可读性
- en: By ‘encapsulating’ the complexity of your code into smaller functions, you can
    make it easier to read and understand the overall flow of a pipeline without having
    to read every single line of code.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将代码的复杂性“封装”到更小的函数中，你可以使代码更容易阅读和理解管道的整体流程，而无需阅读每一行代码。
- en: '[PRE4]'
  id: totrans-103
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: You’ve provided the reader with a hierarchy of information, and it gives the
    reader a step-by-step breakdown of what’s happing in the `run_pipeline` function
    through meaningful function names.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 你已经为读者提供了一个信息层次，这通过有意义的函数名，为读者提供了`run_pipeline`函数中发生情况的逐步分解。
- en: The reader then has the choice of looking at the function definition and the
    complexity within, depending on their needs.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 阅读者然后可以根据他们的需求选择查看函数定义和其中的复杂性。
- en: The act of combining code into ‘meaningful’ chunks like this is demonstrating
    a concept called ‘*Encapsulation*’ and ‘*Abstraction*’.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 将代码组合成“有意义的”块的行为展示了被称为“*封装***”和“*抽象***”的概念。
- en: For more details on encapsulation, you can read my article on this [here](https://medium.com/data-science/encapsulation-a-software-engineering-concept-data-scientists-must-know-to-succeed-b3b1a0a42a41)
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 更多关于封装的细节，您可以阅读我关于这个主题的文章[这里](https://medium.com/data-science/encapsulation-a-software-engineering-concept-data-scientists-must-know-to-succeed-b3b1a0a42a41)
- en: Smaller packets of code to test
  id: totrans-108
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 较小的代码包用于测试
- en: Next, we have a very specific, well-defined set of functions that do one thing.
    This makes it easier to test and debug, since we only have one thing to worry
    about.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们有一组非常具体、定义良好的函数，它们只做一件事。这使得测试和调试更容易，因为我们只需要关注一件事。
- en: See below on how we construct a test.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是如何构建测试的说明。
- en: Constructing a Unit Test
  id: totrans-111
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 构建单元测试
- en: 1\. Follow the AAA Pattern
  id: totrans-112
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1\. 遵循 AAA 模式
- en: '[PRE5]'
  id: totrans-113
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Firstly, we define a test function, appropriately named `test_<function_name>`.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们定义一个测试函数，适当命名为 `test_<function_name>`。
- en: 'Then, we divide it into three sections:'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们将它分为三个部分：
- en: '`GIVEN`: the inputs to the function, and the expected output. Set up everything
    required to run the function we want to test.'
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`GIVEN`: 函数的输入和预期输出。设置运行我们想要测试的函数所需的一切。'
- en: '`RUN`: run the function given the inputs.'
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`RUN`: 根据给定的输入运行函数。'
- en: '`TEST`: compare the output of the function to the expected output.'
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`TEST`: 将函数的输出与预期输出进行比较。'
- en: This is a generic pattern that unit tests should follow. The standard name for
    this design pattern is the *‘**AAA pattern’***, which stands for `Arrange`, `Act`,
    `Assert`.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个单元测试应该遵循的通用模式。这种设计模式的标准化名称是*“**AAA模式***”，代表`Arrange`（安排）、`Act`（行动）、`Assert`（断言）。
- en: I don’t find this naming intuitive, which is why I use `GIVEN`, `RUN`, `TEST`.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 我觉得这个命名不是很直观，这就是为什么我使用 `GIVEN`、`RUN`、`TEST`。
- en: '2\. Arrange: set up the test'
  id: totrans-121
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '2\. Arrange: 设置测试'
- en: '[PRE6]'
  id: totrans-122
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Secondly, we define the inputs to the function, and the expected output. This
    is where we bake in our expectations about how the inputs will look like, and
    what the output *should* look like.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 其次，我们定义函数的输入和预期输出。这就是我们嵌入对输入外观的预期，以及输出*应该*看起来像什么的地方。
- en: As you can see, we don’t need to define every single feature that we expect
    to be run, only the ones that matter for the test.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，我们不需要定义我们期望运行的每个功能，只需要对测试有意义的那些。
- en: For example, `transaction_df` defines the `user_id`, `product_id` columns properly,
    whilst also adding three columns of different types (`str`, `int`, `float`) to
    simulate the fact that there will be other columns.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，`transaction_df` 正确地定义了 `user_id`、`product_id` 列，同时添加了三种不同类型的列（`str`、`int`、`float`）来模拟将会有其他列的事实。
- en: The same goes for `product_df` and `user_df`, though these tables are expected
    to be a dimension table, so just defining `name` and `product_name` columns will
    suffice.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 对于 `product_df` 和 `user_df` 也是如此，尽管这些表预期是维度表，所以只需定义 `name` 和 `product_name`
    列就足够了。
- en: '3\. Act: Run the function to test'
  id: totrans-127
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '3\. Act: 运行要测试的函数'
- en: '[PRE7]'
  id: totrans-128
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: Thirdly, we run the function with the inputs we defined, and collect the output.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 第三，我们使用我们定义的输入运行函数，并收集输出。
- en: '4\. Assert: Test the outcome is as expected'
  id: totrans-130
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '4\. Assert: 测试结果是否符合预期'
- en: '[PRE8]'
  id: totrans-131
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: and finally, we check whether the output matches the expected output.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们检查输出是否与预期输出匹配。
- en: Note, we use the `pandas` testing module since we’re comparing pandas dataframes.
    For non-pandas datafames, you can use the `assert` statement instead.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，我们使用 `pandas` 测试模块，因为我们比较的是 pandas 数据框。对于非 pandas 数据框，您可以使用 `assert` 语句。
- en: 'The full testing code will look like this:'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 完整的测试代码看起来像这样：
- en: '[PRE9]'
  id: totrans-135
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: To organise your tests better and make them cleaner, you can start using a combination
    of classes, fixtures, and parametrisation.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 为了更好地组织测试并使其更干净，您可以使用类、固定值和参数化的组合。
- en: It’s beyond the scope of this article to delve into each of these concepts in
    detail, so for those who are interested I provide the `pytest` [*How-To guide*](https://docs.pytest.org/en/stable/how-to/index.html)
    as reference to these concepts.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 本文的范围不涉及对这些概念的详细探讨，因此，对感兴趣的人来说，我提供了`pytest` [*如何指南*](https://docs.pytest.org/en/stable/how-to/index.html)作为对这些概念的参考。
- en: '![](../Images/60c72b574bf62bb1c6a3a60d7cd62c0a.png)'
  id: totrans-138
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/60c72b574bf62bb1c6a3a60d7cd62c0a.png)'
- en: Photo by [Agence Olloweb](https://unsplash.com/@olloweb?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on [Unsplash](https://unsplash.com/photos/magnifying-glass-near-gray-laptop-computer-d9ILr-dbEdg?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由[Agence Olloweb](https://unsplash.com/@olloweb?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)在[Unsplash](https://unsplash.com/photos/magnifying-glass-near-gray-laptop-computer-d9ILr-dbEdg?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)提供
- en: '**What to Test?**'
  id: totrans-140
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**要测试什么？**'
- en: 'Now that we’ve created a unit test for one function, we turn our attention
    to the remaining functions that we have. Acute readers will now be thinking:'
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经为一个函数创建了一个单元测试，我们将注意力转向我们还有的其他函数。敏锐的读者现在可能会想：
- en: '***“Wow, do I have to write a test for everything? That’s a lot of work!”***'
  id: totrans-142
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '***“哇，我必须为每一件事都写测试吗？这太麻烦了！”***'
- en: Yes, it’s true. It’s extra code that you need to write and maintain.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，这是真的。这是你需要编写和维护的额外代码。
- en: But the good news is, it’s not necessary to test absolutely *everything*, but
    you need to know what’s important in the context of what your work is doing.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 但好消息是，没有必要测试**一切**，但你需要知道在你的工作中什么才是重要的。
- en: Below, I’ll give you a few rules of thumb and considerations that I make when
    deciding what to test, and why.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 下面，我将给你一些关于我在决定测试什么以及为什么的直观规则和考虑因素。
- en: 1\. Is the code critical for the outcome of the project?
  id: totrans-146
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 代码对于项目的结果是否至关重要？
- en: There are critical junctures in a data science project that are just pivotal
    to the success of a data science project, many of which usually comes at the **data-preparation**
    and **model evaluation/explanation** stages.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 数据科学项目中存在一些关键的转折点，这些转折点对于数据科学项目的成功至关重要，其中许多通常出现在**数据准备**和**模型评估/解释**阶段。
- en: The example test we saw above on the `create_user_product_transaction_dataset`
    function is a good example.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在上面看到的关于`create_user_product_transaction_dataset`函数的示例测试是一个很好的例子。
- en: This dataset will form the basis of all downstream modelling activity.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 这个数据集将成为所有下游建模活动的基础。
- en: If the `user -> product` join is incorrect in whatever way, then it will impact
    everything we do downstream.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 如果`用户 -> 产品`连接在任何方面都是错误的，那么它将影响我们下游所做的所有事情。
- en: Thus, it’s worth taking the time to ensure this code works correctly.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，花时间确保这段代码正确运行是值得的。
- en: At a bare minimum, the test we’ve established makes sure the function is behaving
    in exactly the same way as it used to after every code change.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 至少，我们建立的测试确保在每次代码更改后，函数的行为与之前完全相同。
- en: '**Example**'
  id: totrans-153
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**示例**'
- en: '*Suppose the join needs to be rewritten to improve memory efficiency.*'
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: '*假设需要重写连接以提高内存效率。*'
- en: '*After making the change, the unit test ensures the output remains the same.*'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: '*更改后，单元测试确保输出保持不变。*'
- en: '*If something was inadvertently altered such that the output started to look
    different (missing rows, columns, different datatypes), the test would immediately
    flag the issue.*'
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: '*如果无意中改变了某些内容，导致输出开始看起来不同（缺少行、列、不同的数据类型），测试将立即标记出问题。*'
- en: 2\. Is the code mainly using third-party libraries?
  id: totrans-157
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 代码主要使用第三方库吗？
- en: 'Take the load data function for example:'
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 以加载数据的函数为例：
- en: '[PRE10]'
  id: totrans-159
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: This function is encapsulating the process of reading data from different files.
    Under the hood, all it does is call three `pandas` load functions.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 这个函数封装了从不同文件读取数据的过程。在底层，它所做的只是调用三个`pandas`加载数据的函数。
- en: The main value of this code is the *encapsulation*.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 这段代码的主要价值在于**封装**。
- en: Meanwhile, it doesn’t have any business logic, and in my opinion, the function
    scope is so specific that you wouldn’t expect any logic to be added in the future.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 同时，它没有任何业务逻辑，在我看来，函数的作用域非常具体，你不会期望未来添加任何逻辑。
- en: If it does, then the function name should be changed as it does more than just
    loading data.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 如果是的话，那么函数名应该改变，因为它做的不仅仅是加载数据。
- en: Therefore, this function does *not* require a unit test.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，这个函数**不需要**单元测试。
- en: A unit test for this function would just be testing that `pandas` works properly,
    and we should be able to trust that `pandas` has tested their own code.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 这个函数的单元测试只是测试`pandas`是否正常工作，我们应该能够相信`pandas`已经测试过它们自己的代码。
- en: 3\. Is the code likely to change over time?
  id: totrans-166
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. 代码是否可能会随时间而改变？
- en: This point has already been implied in 1 & 2\. For maintainability, perhaps
    this is the most important consideration.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 这个点已经在1和2中暗示了。为了可维护性，这可能是最重要的考虑因素。
- en: 'You should be thinking:'
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 你应该这样思考：
- en: How complex is the code? Are there many ways to achieve the same output?
  id: totrans-169
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 代码有多复杂？是否有多种方式实现相同的结果？
- en: What could cause someone to alter this code? Is the data source susceptible
    to changes in the future?
  id: totrans-170
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 什么可能导致有人修改这段代码？数据源未来是否容易发生变化？
- en: Is the code clear? Are there behaviours that could be easily overlooked during
    a refactor?
  id: totrans-171
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 代码是否清晰？在重构过程中是否有容易被忽视的行为？
- en: Take `create_user_product_transaction_dataset` for example.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 以`create_user_product_transaction_dataset`为例。
- en: The input data may have changes to their schema in the future.
  id: totrans-173
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输入数据未来可能会有模式上的变化。
- en: Perhaps the dataset becomes larger, and we need to break up the merge into multiple
    steps for performance reasons.
  id: totrans-174
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可能数据集变得更大，我们需要为了性能原因将合并拆分成多个步骤。
- en: Perhaps a dirty hack needs to go in temporarily to handle nulls due to an issue
    with the data source.
  id: totrans-175
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可能需要临时添加一些脏技巧来处理由于数据源问题导致的空值。
- en: In each case, a change to the underlying code may be necessary, and each time
    we need to ensure the output doesn’t change.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 在每种情况下，底层代码的更改可能是必要的，并且每次我们都需要确保输出没有变化。
- en: In contrast, `load_data` does nothing but loads data from a file.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 相比之下，`load_data`只是从文件中加载数据。
- en: I don’t see this changing much in the future, other than perhaps a change in
    file format. So I’d defer writing a test for this until a significant change to
    the upstream data source occurs (something like this would most likely require
    changing a lot of the pipeline).
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 我不认为未来会有太大的变化，除了可能文件格式的变化。因此，我会推迟为这个功能编写测试，直到上游数据源发生重大变化（这种变化可能需要更改大量管道）。
- en: Where to Put Tests and How to Run Them
  id: totrans-179
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 放置测试和运行测试的方法
- en: So far, we’ve covered how to write testable code and how to create the tests
    themselves.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们已经介绍了如何编写可测试的代码以及如何创建测试本身。
- en: Now, let’s look at how to structure your project to include tests — and how
    to run them effectively.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们看看如何构建项目以包含测试，以及如何有效地运行它们。
- en: Project Structure
  id: totrans-182
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 项目结构
- en: 'Generally, a data science project can follow the below structure:'
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，一个数据科学项目可以遵循以下结构：
- en: '[PRE11]'
  id: totrans-184
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: The `src` folder should contain all the code for the project that are critical
    for the delivery of your project.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: '`src`文件夹应该包含项目中所有对项目交付至关重要的代码。'
- en: '**General rule of thumb**'
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: '**一般性规则**'
- en: If it’s code you anticipate running multiple times (with different inputs or
    parameters), it should go in the `src` folder.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 如果是预期会多次运行的代码（具有不同的输入或参数），它应该放在`src`文件夹中。
- en: 'Examples include:'
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 例如：
- en: data processing
  id: totrans-189
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据处理
- en: feature engineering
  id: totrans-190
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 特征工程
- en: model training
  id: totrans-191
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模型训练
- en: model evaluation
  id: totrans-192
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模型评估
- en: Meanwhile, anything that is one-off pieces of analysis can be in Jupyter notebooks,
    stored in the `notebooks` folder.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 同时，任何一次性分析的部分都可以放在Jupyter笔记本中，存储在`notebooks`文件夹中。
- en: This primarily includes
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 这主要涉及
- en: EDA
  id: totrans-195
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: EDA
- en: ad-hoc model experimentation
  id: totrans-196
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 临时模型实验
- en: analysis of local model explanations
  id: totrans-197
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 本地模型解释分析
- en: Why?
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么？
- en: '***Because Jupyter notebooks are notoriously flaky, difficult to manage, and
    hard to test. We don’t want to be rerunning critical code via notebooks.***'
  id: totrans-199
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '***因为Jupyter笔记本以其不可靠、难以管理和难以测试而闻名。我们不希望通过笔记本重新运行关键代码。***'
- en: The Test Folder Structure
  id: totrans-200
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 测试文件夹结构
- en: 'Let’s say your `src` folder looks like this:'
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你的`src`文件夹看起来像这样：
- en: '[PRE12]'
  id: totrans-202
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: Each file contains functions and pipelines, similar to the example we saw above.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 每个文件都包含函数和管道，类似于我们上面看到的示例。
- en: 'The test folder should then look like this:'
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 测试文件夹应该看起来像这样：
- en: '[PRE13]'
  id: totrans-205
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: where the test directory mirrors the structure of the `src` directory and each
    file starts with the `test_` prefix.
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 其中测试目录与`src`目录的结构相匹配，每个文件都以`test_`前缀开始。
- en: 'The reason for this is simple:'
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 原因很简单：
- en: It’s easy to find the tests for a given file, since the test folder structure
    mirrors the `src` folder.
  id: totrans-208
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 由于测试文件夹结构反映了`src`文件夹，因此很容易找到给定文件的测试。
- en: It keeps test code nicely separated from source code.
  id: totrans-209
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它将测试代码与源代码很好地分离。
- en: Running Tests
  id: totrans-210
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 运行测试
- en: 'Once you have your tests set up like above, you can run them in a variety of
    ways:'
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你像上面那样设置了测试，你就可以以各种方式运行它们：
- en: 1\. Through the terminal
  id: totrans-212
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 通过终端
- en: '[PRE14]'
  id: totrans-213
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: 2\. Through a code editor
  id: totrans-214
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 通过代码编辑器
- en: I use this for all my projects.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 我在我的所有项目中都使用这个。
- en: Visual studio code is my editor of choice; it auto-discovers the tests for me,
    and it’s super easy to debug.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: Visual studio code是我的首选编辑器；它自动发现测试，并且调试起来非常容易。
- en: 'After having a read of the docs, I don’t think there’s any point in me re-iterating
    their contents since they are quite self-explanatory, so here’s the link:'
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 在阅读了文档之后，我认为没有必要重复其内容，因为它们相当自解释，所以这里有一个链接：
- en: '[VSCode testing docs](https://code.visualstudio.com/docs/debugtest/testing)'
  id: totrans-218
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[VSCode 测试文档](https://code.visualstudio.com/docs/debugtest/testing)'
- en: Similarly, most code editors will also have similar capabilities, so there’s
    no excuse for not writing tests.
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，大多数代码编辑器也将具有类似的功能，所以没有理由不编写测试。
- en: It really is simple, read the docs and get started.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 这真的很简单，阅读文档并开始吧。
- en: 3\. Through a CI pipeline (e.g. GitHub Actions, Gitlab, etc.)
  id: totrans-221
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. 通过CI流水线（例如GitHub Actions、Gitlab等）
- en: It’s easy to set up tests to run automatically on pull requests via GitHub.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 通过GitHub设置测试自动运行在拉取请求中很容易。
- en: The idea is whenever you make a PR, it will automatically find and run the tests
    for you.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 想法是，每次你提交一个PR时，它都会自动为你找到并运行测试。
- en: This means that even if forget to run the tests locally via 1 or 2, they will
    always be run for you whenever you want to merge your changes.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着即使你忘记在本地通过1或2运行测试，每次你想要合并更改时，测试总会为你运行。
- en: Again, no point in me re-iterating the docs; here’s the link
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 再次强调，没有必要让我重复文档内容；这里有一个链接
- en: '**[Github Building and Testing Docs](https://docs.github.com/en/actions/how-tos/writing-workflows/building-and-testing/building-and-testing-python)**'
  id: totrans-226
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**[Github 构建和测试文档](https://docs.github.com/en/actions/how-tos/writing-workflows/building-and-testing/building-and-testing-python)**'
- en: The End-Goal We Want To Achieve
  id: totrans-227
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我们想要实现的最终目标
- en: Following on from the above instructions, I think it’s better use of both of
    our time to highlight some important points about what we want to achieve through
    automated tests, rather than regurgitating instructions you can find in the above
    links.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 根据上述说明，我认为更好地利用我们双方的时间，突出一些关于我们希望通过自动化测试实现的重要观点，而不是重复上述链接中可以找到的指令，会更好。
- en: '***First and foremost**,* automated tests are being written to establish trust
    in your code, and to minimise human error.'
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: '***首先和最重要的是***，正在编写自动化测试以建立对代码的信任，并最小化人为错误。'
- en: 'This is for the benefit of:'
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
  zh: 这是为了以下好处：
- en: Yourself
  id: totrans-231
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自己
- en: Your team
  id: totrans-232
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你的团队
- en: and the business as a whole.
  id: totrans-233
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 以及整个业务。
- en: Therefore, to truly get the most out of the tests you’ve written, you must get
    round to setting up a ***CI pipeline.***
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，为了真正充分利用你编写的测试，你必须着手设置一个***CI流水线***。
- en: It makes a world of difference being able to forget to run the tests locally,
    and still have the assurance that the tests will be run when you create a PR or
    push some changes.
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 能够忘记在本地运行测试，同时仍然有保证在创建PR或推送更改时测试会被运行，这意义重大。
- en: You don’t want to be the person responsible for a bug that creates a production
    incident because you forgot to run the tests, or to be the one to have missed
    a bug during a PR review.
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 你不希望成为因为忘记运行测试而造成生产事故的责任人，或者成为在PR审查中错过bug的人。
- en: So please, if you write some tests, invest some time into setting up a CI pipeline.
    Read the `github` docs, I implore you. It is trivial to set up, and it will do
    you wonders.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，如果你编写了一些测试，请花些时间设置CI流水线。我恳求你阅读`github`文档。设置起来非常简单，它将对你大有裨益。
- en: Final Remarks
  id: totrans-238
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最后的话
- en: After reading this article, I hope it’s impressed upon you
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 在阅读这篇文章后，我希望它给你留下了深刻的印象
- en: The importance of writing tests, specifically within the context of data science
  id: totrans-240
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 编写测试的重要性，特别是在数据科学背景下
- en: How easy it is to write and run them
  id: totrans-241
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 编写和运行它们的容易程度
- en: But there is one last reason why you should know how to write automated test.
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 但还有一个原因，你需要知道如何编写自动化测试。
- en: That reason is that
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 那个原因是
- en: '***Data Science is changing***.'
  id: totrans-244
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '***数据科学正在改变***。'
- en: Data science used to be largely proof-of-concept, building models in Jupyter
    notebooks, and sending models to engineers for deployment. Meanwhile, data scientists
    built up a notoriety for creating terrible code.
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 数据科学曾经主要是概念验证，在Jupyter笔记本中构建模型，并将模型发送给工程师进行部署。同时，数据科学家因编写糟糕的代码而声名狼藉。
- en: But now, the industry has matured.
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 但现在，行业已经成熟。
- en: It’s becoming easier to quickly build and deploy models as ML-Ops and ML-engineering
    mature.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: 随着ML-Ops和ML工程的成熟，快速构建和部署模型变得越来越容易。
- en: Thus,
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，
- en: model building
  id: totrans-249
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模型构建
- en: deployment
  id: totrans-250
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 部署
- en: retraining
  id: totrans-251
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 重新训练
- en: maintenance
  id: totrans-252
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 维护
- en: is becoming the task of machine learning engineers.
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
  zh: 正在成为机器学习工程师的任务。
- en: At the same time, the data wrangling that we used to do are becoming so complex
    that this is now becoming specialised to dedicated data engineering teams.
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
  zh: 同时，我们过去所做的大量数据处理工作变得越来越复杂，现在正逐渐发展成为专门的数据工程团队的工作。
- en: As a result, data science sits in a very narrow space between these two disciplines,
    and quite soon the lines between data scientist and data analyst will blur.
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，数据科学位于这两个学科之间一个非常狭窄的空间，并且很快数据科学家和数据分析师之间的界限将会变得模糊。
- en: The trajectory is that data scientists will no longer be building cutting-edge
    models, but will become more business and product focused, generating insights
    and MI reports instead.
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
  zh: 趋势是数据科学家将不再构建前沿模型，而是更多地关注业务和产品，生成洞察力和MI报告。
- en: '***If you want to stay closer to the model building, it doesn’t suffice to
    just code anymore.***'
  id: totrans-257
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '***如果你想要更接近模型构建，仅仅编写代码是不够的。***'
- en: You need to learn how to code properly, and how to maintain them well. Machine
    learning is no longer a novelty, it is no longer just PoCs, it is becoming software
    engineering.
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要学习如何正确编码，以及如何维护它们。机器学习不再是新奇事物，它不再是仅仅的PoCs，它正在成为软件工程。
- en: If You Want To Learn More
  id: totrans-259
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 如果你想了解更多
- en: 'If you want to learn more about software engineering skills applied to Data
    Science, here are some related articles:'
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要了解更多关于将软件工程技能应用于数据科学的内容，以下是一些相关的文章：
- en: '[Inheritance: A Software Engineering Concept Data Scientists Must Know To Succeed](https://medium.com/data-science-collective/inheritance-a-software-engineering-concept-data-scientists-must-know-to-succeed-dd73a28fc105)'
  id: totrans-261
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[继承：数据科学家必须了解以成功应用软件工程概念](https://medium.com/data-science-collective/inheritance-a-software-engineering-concept-data-scientists-must-know-to-succeed-dd73a28fc105)'
- en: '[Encapsulation: A Software Engineering Concept Data Scientists Must Know To
    Succeed](https://medium.com/data-science/encapsulation-a-software-engineering-concept-data-scientists-must-know-to-succeed-b3b1a0a42a41)'
  id: totrans-262
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[封装：数据科学家必须了解以成功应用软件工程概念](https://medium.com/data-science/encapsulation-a-software-engineering-concept-data-scientists-must-know-to-succeed-b3b1a0a42a41)'
- en: '[DSLP – The Data Science Project Management Framework that Transformed My Team](https://medium.com/data-science/dslp-the-data-science-project-management-framework-that-transformed-my-team-1b6727d009aa)'
  id: totrans-263
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[DSLP – 改变了我的团队的数据科学项目管理框架](https://medium.com/data-science/dslp-the-data-science-project-management-framework-that-transformed-my-team-1b6727d009aa)'
- en: You can also become a Team Member on Patreon [here](http://patreon.com/BenjaminLeeDataScience)!
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
  zh: 你也可以在这里成为Patreon的团队成员[这里](http://patreon.com/BenjaminLeeDataScience)!
- en: We have dedicated discussion threads for all articles; Ask me questions about
    automated testing, discuss the topic in more detail, and share experiences with
    other data scientists. The learning doesn’t need to stop here.
  id: totrans-265
  prefs: []
  type: TYPE_NORMAL
  zh: 我们为所有文章都设有专门的讨论线程；向我提问有关自动化测试的问题，更详细地讨论这个话题，并与其他数据科学家分享经验。学习不应该在这里停止。
- en: You can find the dedicated discussion thread for this article [here](https://www.patreon.com/posts/automated-data-135199621?utm_medium=clipboard_copy&utm_source=copyLink&utm_campaign=postshare_creator&utm_content=join_link).
  id: totrans-266
