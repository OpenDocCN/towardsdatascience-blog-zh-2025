- en: 'Automated Testing: A Software Engineering Concept Data Scientists Must Know
    To Succeed'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/automated-testing-a-software-engineering-concept-data-scientists-must-know-to-succeed/](https://towardsdatascience.com/automated-testing-a-software-engineering-concept-data-scientists-must-know-to-succeed/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Why you should read this article
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <mdspan datatext="el1753819409643" class="mdspan-comment">Most</mdspan> data
    scientists whip up a Jupyter Notebook, play around in some cells, and then maintain
    entire data processing and model training pipelines in the same notebook.
  prefs: []
  type: TYPE_NORMAL
- en: 'The code is tested once when the notebook was first written, and then it is
    neglected for some undetermined amount of time – days, weeks, months, years, until:'
  prefs: []
  type: TYPE_NORMAL
- en: The outputs of the notebook need to be rerun to re-generate outputs that were
    lost.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The notebook needs to be rerun with different parameters to retrain a model.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Something needed to be changed upstream, and the notebook needs to be rerun
    to refresh downstream datasets.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '***Many of you will have felt shivers down your spine reading this…***'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**Why?**'
  prefs: []
  type: TYPE_NORMAL
- en: Because you instinctively know that this notebook is never going to run.
  prefs: []
  type: TYPE_NORMAL
- en: You know it in your bones the code in that notebook will need to be debugged
    for hours at best, re-written from scratch at worst.
  prefs: []
  type: TYPE_NORMAL
- en: In both cases, it will take you a long time to get what you need.
  prefs: []
  type: TYPE_NORMAL
- en: '***Why does this happen?***'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '***Is there any way of avoiding this?***'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '***Is there a better way of writing and maintaining code?***'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: This is the question we will be answering in this article.
  prefs: []
  type: TYPE_NORMAL
- en: 'The Solution: Automated Testing'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: What is it?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As the name suggests, automated testing is the process of running a predefined
    set of tests on your code to ensure that it is working as expected.
  prefs: []
  type: TYPE_NORMAL
- en: These tests verify that your code behaves as expected — especially after changes
    or additions — and alert you when something breaks. It removes the need for a
    human to manually test your code, and there is no need to run it on actual data.
  prefs: []
  type: TYPE_NORMAL
- en: Convenient, isn’t it?
  prefs: []
  type: TYPE_NORMAL
- en: Types of Automated Testing
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: There are so many different types of testing, and covering all of them is beyond
    the scope of this article.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s just focus on the two main types most relevant to a data scientist:'
  prefs: []
  type: TYPE_NORMAL
- en: Unit Tests
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Integration Tests
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Unit Tests**'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: '![](../Images/5da206eec3e5c670e2aef55b548035c6.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author. Illustration of the concept of a unit test.
  prefs: []
  type: TYPE_NORMAL
- en: Tests the smallest parts of code in isolation (*e.g., a function*).
  prefs: []
  type: TYPE_NORMAL
- en: The function should do one thing only to make it easy to test. Give it a known
    input, and check that the output is as expected.
  prefs: []
  type: TYPE_NORMAL
- en: '**Integration Tests**'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: '![](../Images/fb5ef828cdd37bee098a383950a33ff8.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author. Illustration of the concept of an integration test.
  prefs: []
  type: TYPE_NORMAL
- en: Tests how multiple components work together.
  prefs: []
  type: TYPE_NORMAL
- en: For us data scientists, it means checking whether data loading, merging, and
    preprocessing steps produce the expected final dataset, given a known input dataset.
  prefs: []
  type: TYPE_NORMAL
- en: A practical example
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Enough with the theory, let’s see how it works in practice.
  prefs: []
  type: TYPE_NORMAL
- en: We will go through a simple example where a data scientist has written some
    code in a Jupyter notebook (or script), one that many data scientists will have
    seen in their jobs.
  prefs: []
  type: TYPE_NORMAL
- en: We will pick up on why the code is bad. Then, we’ll try and make it better.
  prefs: []
  type: TYPE_NORMAL
- en: 'By better, we mean:'
  prefs: []
  type: TYPE_NORMAL
- en: Easy to test
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Easy to read
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: which ultimately means *easy to maintain,* because in the long run, good code
    is code that works, keeps working, and is easy to maintain.
  prefs: []
  type: TYPE_NORMAL
- en: We will then design some unit tests for our improved code, highlighting why
    the changes are beneficial for testing. To prevent this article from becoming
    too long, I will defer examples of integration testing to a future article.
  prefs: []
  type: TYPE_NORMAL
- en: Then, we will go through some rules of thumb for what code to test.
  prefs: []
  type: TYPE_NORMAL
- en: Finally, we will cover how to run tests and how to structure projects.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/92a2dc020ac0c76c0d5c96dd8d89bc02.png)'
  prefs: []
  type: TYPE_IMG
- en: Photo by [Wolfgang Weiser](https://unsplash.com/@hamburgmeinefreundin?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on [Unsplash](https://unsplash.com/photos/a-train-traveling-through-a-forest-filled-with-lots-of-trees-el8EOJhVjEU?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
  prefs: []
  type: TYPE_NORMAL
- en: Example Pipeline
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'We will use the following pipeline as an example:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: In real life, we would see hundreds of lines of code crammed into a single notebook.
    But the script is exemplary of all the things that need fixing in typical data
    science notebooks.
  prefs: []
  type: TYPE_NORMAL
- en: 'This code is doing the following:'
  prefs: []
  type: TYPE_NORMAL
- en: Loads user, transaction, and product data.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Merges them into a unified dataset.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Filters recent transactions.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Adds calculated fields (`total_price`, `segment`).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Drops irrelevant columns.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Aggregates total spending per user and segment.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Saves the result as a Parquet file.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Why is this pipeline bad?**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Oh, there are so many reasons coding in this manner is bad, depending on what
    lens you look at it from. It’s not the content that is the problem, but how it
    is structured.
  prefs: []
  type: TYPE_NORMAL
- en: While there are many angles we can discuss the disadvantages of writing code
    this way, for this article we will focus on testability.
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Tightly coupled logic (in other words, no modularity)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: All operations are crammed into a single script and run at once. It’s unclear
    what each part does unless you read every line. Even for a script this simple,
    this is difficult to do. In real-life scripts, it can only get worse when code
    can reach hundreds of lines.
  prefs: []
  type: TYPE_NORMAL
- en: This makes it impossible to test.
  prefs: []
  type: TYPE_NORMAL
- en: The only way to do so would be to run the entire thing all at once from start
    to finish, probably on actual data that you’re going to use.
  prefs: []
  type: TYPE_NORMAL
- en: If your dataset is small, then perhaps you can get away with this. But in most
    cases, data scientists are working with a truck-load of data, so it’s infeasible
    to run any form of a test or sanity check quickly.
  prefs: []
  type: TYPE_NORMAL
- en: We need to be able to break the code up into manageable chunks that do one thing
    only, and do it well. Then, we can control what goes in, and confirm that what
    we expect comes out of it.
  prefs: []
  type: TYPE_NORMAL
- en: 2\. No Parameterization
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Hardcoded file paths and values like `2023-01-01` make the code brittle and
    inflexible. Again, hard to test with anything but the live/production data.
  prefs: []
  type: TYPE_NORMAL
- en: There’s no flexibility in how we can run the code, everything is fixed.
  prefs: []
  type: TYPE_NORMAL
- en: What’s worse, as soon as you change something, you have no assurance that nothing’s
    broken further down the script.
  prefs: []
  type: TYPE_NORMAL
- en: For example, how many times have you made a change that you thought was benign,
    only to run the code and find a completely unexpected part of the code to break?
  prefs: []
  type: TYPE_NORMAL
- en: How to improve?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now, let’s see step-by-step how we can improve this code.
  prefs: []
  type: TYPE_NORMAL
- en: '*Please note, we will assume that we are using the `pytest` module for our
    tests going forwards.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 1\. A clear, configurable entry point
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: We start off by creating a single function that we can run from anywhere, with
    clear arguments that can be changed.
  prefs: []
  type: TYPE_NORMAL
- en: What does this achieve?
  prefs: []
  type: TYPE_NORMAL
- en: This allows us to run the pipeline in specific test conditions.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: Immediately, you can start passing in different inputs, different parameters,
    depending on the edge case that you want to test for.
  prefs: []
  type: TYPE_NORMAL
- en: It gives you flexibility to run the code in different settings by making it
    easier to control the inputs and outputs of your code.
  prefs: []
  type: TYPE_NORMAL
- en: Writing your pipeline in this way paves the way for integration testing your
    pipeline. More on this in a later article.
  prefs: []
  type: TYPE_NORMAL
- en: 2\. **Group code into meaningful chunks that do one thing, and do it well**
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now, this is where a bit of art comes in – different people will organise code
    differently depending on which parts they find important.
  prefs: []
  type: TYPE_NORMAL
- en: There is no right or wrong answer, but the common sense is to make sure a function
    does one thing and does it well. Do this, and it becomes easy to test.
  prefs: []
  type: TYPE_NORMAL
- en: 'One way we could group our code is like below:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: What does the grouping achieve?
  prefs: []
  type: TYPE_NORMAL
- en: '**Better documentation**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Well, first of all, you end up with some natural retail space in your code to
    add docstrings. Why is this important? Well have you tried reading your own code
    a month after writing it?
  prefs: []
  type: TYPE_NORMAL
- en: People forget details very quickly, and even code **you’ve** written can become
    undecipherable within just a few days.
  prefs: []
  type: TYPE_NORMAL
- en: It’s essential to document what the code is doing, what it expects to take as
    input, and what it returns, at the very least.
  prefs: []
  type: TYPE_NORMAL
- en: Including docstrings in your code provides context and sets expectations for
    how a function should behave, making it easier to understand and debug failing
    tests in the future.
  prefs: []
  type: TYPE_NORMAL
- en: Better Readability
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: By ‘encapsulating’ the complexity of your code into smaller functions, you can
    make it easier to read and understand the overall flow of a pipeline without having
    to read every single line of code.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: You’ve provided the reader with a hierarchy of information, and it gives the
    reader a step-by-step breakdown of what’s happing in the `run_pipeline` function
    through meaningful function names.
  prefs: []
  type: TYPE_NORMAL
- en: The reader then has the choice of looking at the function definition and the
    complexity within, depending on their needs.
  prefs: []
  type: TYPE_NORMAL
- en: The act of combining code into ‘meaningful’ chunks like this is demonstrating
    a concept called ‘*Encapsulation*’ and ‘*Abstraction*’.
  prefs: []
  type: TYPE_NORMAL
- en: For more details on encapsulation, you can read my article on this [here](https://medium.com/data-science/encapsulation-a-software-engineering-concept-data-scientists-must-know-to-succeed-b3b1a0a42a41)
  prefs: []
  type: TYPE_NORMAL
- en: Smaller packets of code to test
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Next, we have a very specific, well-defined set of functions that do one thing.
    This makes it easier to test and debug, since we only have one thing to worry
    about.
  prefs: []
  type: TYPE_NORMAL
- en: See below on how we construct a test.
  prefs: []
  type: TYPE_NORMAL
- en: Constructing a Unit Test
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 1\. Follow the AAA Pattern
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: Firstly, we define a test function, appropriately named `test_<function_name>`.
  prefs: []
  type: TYPE_NORMAL
- en: 'Then, we divide it into three sections:'
  prefs: []
  type: TYPE_NORMAL
- en: '`GIVEN`: the inputs to the function, and the expected output. Set up everything
    required to run the function we want to test.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`RUN`: run the function given the inputs.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`TEST`: compare the output of the function to the expected output.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This is a generic pattern that unit tests should follow. The standard name for
    this design pattern is the *‘**AAA pattern’***, which stands for `Arrange`, `Act`,
    `Assert`.
  prefs: []
  type: TYPE_NORMAL
- en: I don’t find this naming intuitive, which is why I use `GIVEN`, `RUN`, `TEST`.
  prefs: []
  type: TYPE_NORMAL
- en: '2\. Arrange: set up the test'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: Secondly, we define the inputs to the function, and the expected output. This
    is where we bake in our expectations about how the inputs will look like, and
    what the output *should* look like.
  prefs: []
  type: TYPE_NORMAL
- en: As you can see, we don’t need to define every single feature that we expect
    to be run, only the ones that matter for the test.
  prefs: []
  type: TYPE_NORMAL
- en: For example, `transaction_df` defines the `user_id`, `product_id` columns properly,
    whilst also adding three columns of different types (`str`, `int`, `float`) to
    simulate the fact that there will be other columns.
  prefs: []
  type: TYPE_NORMAL
- en: The same goes for `product_df` and `user_df`, though these tables are expected
    to be a dimension table, so just defining `name` and `product_name` columns will
    suffice.
  prefs: []
  type: TYPE_NORMAL
- en: '3\. Act: Run the function to test'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: Thirdly, we run the function with the inputs we defined, and collect the output.
  prefs: []
  type: TYPE_NORMAL
- en: '4\. Assert: Test the outcome is as expected'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: and finally, we check whether the output matches the expected output.
  prefs: []
  type: TYPE_NORMAL
- en: Note, we use the `pandas` testing module since we’re comparing pandas dataframes.
    For non-pandas datafames, you can use the `assert` statement instead.
  prefs: []
  type: TYPE_NORMAL
- en: 'The full testing code will look like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: To organise your tests better and make them cleaner, you can start using a combination
    of classes, fixtures, and parametrisation.
  prefs: []
  type: TYPE_NORMAL
- en: It’s beyond the scope of this article to delve into each of these concepts in
    detail, so for those who are interested I provide the `pytest` [*How-To guide*](https://docs.pytest.org/en/stable/how-to/index.html)
    as reference to these concepts.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/60c72b574bf62bb1c6a3a60d7cd62c0a.png)'
  prefs: []
  type: TYPE_IMG
- en: Photo by [Agence Olloweb](https://unsplash.com/@olloweb?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on [Unsplash](https://unsplash.com/photos/magnifying-glass-near-gray-laptop-computer-d9ILr-dbEdg?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
  prefs: []
  type: TYPE_NORMAL
- en: '**What to Test?**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Now that we’ve created a unit test for one function, we turn our attention
    to the remaining functions that we have. Acute readers will now be thinking:'
  prefs: []
  type: TYPE_NORMAL
- en: '***“Wow, do I have to write a test for everything? That’s a lot of work!”***'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Yes, it’s true. It’s extra code that you need to write and maintain.
  prefs: []
  type: TYPE_NORMAL
- en: But the good news is, it’s not necessary to test absolutely *everything*, but
    you need to know what’s important in the context of what your work is doing.
  prefs: []
  type: TYPE_NORMAL
- en: Below, I’ll give you a few rules of thumb and considerations that I make when
    deciding what to test, and why.
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Is the code critical for the outcome of the project?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: There are critical junctures in a data science project that are just pivotal
    to the success of a data science project, many of which usually comes at the **data-preparation**
    and **model evaluation/explanation** stages.
  prefs: []
  type: TYPE_NORMAL
- en: The example test we saw above on the `create_user_product_transaction_dataset`
    function is a good example.
  prefs: []
  type: TYPE_NORMAL
- en: This dataset will form the basis of all downstream modelling activity.
  prefs: []
  type: TYPE_NORMAL
- en: If the `user -> product` join is incorrect in whatever way, then it will impact
    everything we do downstream.
  prefs: []
  type: TYPE_NORMAL
- en: Thus, it’s worth taking the time to ensure this code works correctly.
  prefs: []
  type: TYPE_NORMAL
- en: At a bare minimum, the test we’ve established makes sure the function is behaving
    in exactly the same way as it used to after every code change.
  prefs: []
  type: TYPE_NORMAL
- en: '**Example**'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: '*Suppose the join needs to be rewritten to improve memory efficiency.*'
  prefs: []
  type: TYPE_NORMAL
- en: '*After making the change, the unit test ensures the output remains the same.*'
  prefs: []
  type: TYPE_NORMAL
- en: '*If something was inadvertently altered such that the output started to look
    different (missing rows, columns, different datatypes), the test would immediately
    flag the issue.*'
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Is the code mainly using third-party libraries?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Take the load data function for example:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: This function is encapsulating the process of reading data from different files.
    Under the hood, all it does is call three `pandas` load functions.
  prefs: []
  type: TYPE_NORMAL
- en: The main value of this code is the *encapsulation*.
  prefs: []
  type: TYPE_NORMAL
- en: Meanwhile, it doesn’t have any business logic, and in my opinion, the function
    scope is so specific that you wouldn’t expect any logic to be added in the future.
  prefs: []
  type: TYPE_NORMAL
- en: If it does, then the function name should be changed as it does more than just
    loading data.
  prefs: []
  type: TYPE_NORMAL
- en: Therefore, this function does *not* require a unit test.
  prefs: []
  type: TYPE_NORMAL
- en: A unit test for this function would just be testing that `pandas` works properly,
    and we should be able to trust that `pandas` has tested their own code.
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Is the code likely to change over time?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This point has already been implied in 1 & 2\. For maintainability, perhaps
    this is the most important consideration.
  prefs: []
  type: TYPE_NORMAL
- en: 'You should be thinking:'
  prefs: []
  type: TYPE_NORMAL
- en: How complex is the code? Are there many ways to achieve the same output?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What could cause someone to alter this code? Is the data source susceptible
    to changes in the future?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Is the code clear? Are there behaviours that could be easily overlooked during
    a refactor?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Take `create_user_product_transaction_dataset` for example.
  prefs: []
  type: TYPE_NORMAL
- en: The input data may have changes to their schema in the future.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Perhaps the dataset becomes larger, and we need to break up the merge into multiple
    steps for performance reasons.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Perhaps a dirty hack needs to go in temporarily to handle nulls due to an issue
    with the data source.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In each case, a change to the underlying code may be necessary, and each time
    we need to ensure the output doesn’t change.
  prefs: []
  type: TYPE_NORMAL
- en: In contrast, `load_data` does nothing but loads data from a file.
  prefs: []
  type: TYPE_NORMAL
- en: I don’t see this changing much in the future, other than perhaps a change in
    file format. So I’d defer writing a test for this until a significant change to
    the upstream data source occurs (something like this would most likely require
    changing a lot of the pipeline).
  prefs: []
  type: TYPE_NORMAL
- en: Where to Put Tests and How to Run Them
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: So far, we’ve covered how to write testable code and how to create the tests
    themselves.
  prefs: []
  type: TYPE_NORMAL
- en: Now, let’s look at how to structure your project to include tests — and how
    to run them effectively.
  prefs: []
  type: TYPE_NORMAL
- en: Project Structure
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Generally, a data science project can follow the below structure:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: The `src` folder should contain all the code for the project that are critical
    for the delivery of your project.
  prefs: []
  type: TYPE_NORMAL
- en: '**General rule of thumb**'
  prefs: []
  type: TYPE_NORMAL
- en: If it’s code you anticipate running multiple times (with different inputs or
    parameters), it should go in the `src` folder.
  prefs: []
  type: TYPE_NORMAL
- en: 'Examples include:'
  prefs: []
  type: TYPE_NORMAL
- en: data processing
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: feature engineering
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: model training
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: model evaluation
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Meanwhile, anything that is one-off pieces of analysis can be in Jupyter notebooks,
    stored in the `notebooks` folder.
  prefs: []
  type: TYPE_NORMAL
- en: This primarily includes
  prefs: []
  type: TYPE_NORMAL
- en: EDA
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: ad-hoc model experimentation
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: analysis of local model explanations
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Why?
  prefs: []
  type: TYPE_NORMAL
- en: '***Because Jupyter notebooks are notoriously flaky, difficult to manage, and
    hard to test. We don’t want to be rerunning critical code via notebooks.***'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The Test Folder Structure
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Let’s say your `src` folder looks like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: Each file contains functions and pipelines, similar to the example we saw above.
  prefs: []
  type: TYPE_NORMAL
- en: 'The test folder should then look like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: where the test directory mirrors the structure of the `src` directory and each
    file starts with the `test_` prefix.
  prefs: []
  type: TYPE_NORMAL
- en: 'The reason for this is simple:'
  prefs: []
  type: TYPE_NORMAL
- en: It’s easy to find the tests for a given file, since the test folder structure
    mirrors the `src` folder.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It keeps test code nicely separated from source code.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Running Tests
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Once you have your tests set up like above, you can run them in a variety of
    ways:'
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Through the terminal
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: 2\. Through a code editor
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: I use this for all my projects.
  prefs: []
  type: TYPE_NORMAL
- en: Visual studio code is my editor of choice; it auto-discovers the tests for me,
    and it’s super easy to debug.
  prefs: []
  type: TYPE_NORMAL
- en: 'After having a read of the docs, I don’t think there’s any point in me re-iterating
    their contents since they are quite self-explanatory, so here’s the link:'
  prefs: []
  type: TYPE_NORMAL
- en: '[VSCode testing docs](https://code.visualstudio.com/docs/debugtest/testing)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Similarly, most code editors will also have similar capabilities, so there’s
    no excuse for not writing tests.
  prefs: []
  type: TYPE_NORMAL
- en: It really is simple, read the docs and get started.
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Through a CI pipeline (e.g. GitHub Actions, Gitlab, etc.)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: It’s easy to set up tests to run automatically on pull requests via GitHub.
  prefs: []
  type: TYPE_NORMAL
- en: The idea is whenever you make a PR, it will automatically find and run the tests
    for you.
  prefs: []
  type: TYPE_NORMAL
- en: This means that even if forget to run the tests locally via 1 or 2, they will
    always be run for you whenever you want to merge your changes.
  prefs: []
  type: TYPE_NORMAL
- en: Again, no point in me re-iterating the docs; here’s the link
  prefs: []
  type: TYPE_NORMAL
- en: '**[Github Building and Testing Docs](https://docs.github.com/en/actions/how-tos/writing-workflows/building-and-testing/building-and-testing-python)**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The End-Goal We Want To Achieve
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Following on from the above instructions, I think it’s better use of both of
    our time to highlight some important points about what we want to achieve through
    automated tests, rather than regurgitating instructions you can find in the above
    links.
  prefs: []
  type: TYPE_NORMAL
- en: '***First and foremost**,* automated tests are being written to establish trust
    in your code, and to minimise human error.'
  prefs: []
  type: TYPE_NORMAL
- en: 'This is for the benefit of:'
  prefs: []
  type: TYPE_NORMAL
- en: Yourself
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Your team
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: and the business as a whole.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Therefore, to truly get the most out of the tests you’ve written, you must get
    round to setting up a ***CI pipeline.***
  prefs: []
  type: TYPE_NORMAL
- en: It makes a world of difference being able to forget to run the tests locally,
    and still have the assurance that the tests will be run when you create a PR or
    push some changes.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t want to be the person responsible for a bug that creates a production
    incident because you forgot to run the tests, or to be the one to have missed
    a bug during a PR review.
  prefs: []
  type: TYPE_NORMAL
- en: So please, if you write some tests, invest some time into setting up a CI pipeline.
    Read the `github` docs, I implore you. It is trivial to set up, and it will do
    you wonders.
  prefs: []
  type: TYPE_NORMAL
- en: Final Remarks
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: After reading this article, I hope it’s impressed upon you
  prefs: []
  type: TYPE_NORMAL
- en: The importance of writing tests, specifically within the context of data science
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: How easy it is to write and run them
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: But there is one last reason why you should know how to write automated test.
  prefs: []
  type: TYPE_NORMAL
- en: That reason is that
  prefs: []
  type: TYPE_NORMAL
- en: '***Data Science is changing***.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Data science used to be largely proof-of-concept, building models in Jupyter
    notebooks, and sending models to engineers for deployment. Meanwhile, data scientists
    built up a notoriety for creating terrible code.
  prefs: []
  type: TYPE_NORMAL
- en: But now, the industry has matured.
  prefs: []
  type: TYPE_NORMAL
- en: It’s becoming easier to quickly build and deploy models as ML-Ops and ML-engineering
    mature.
  prefs: []
  type: TYPE_NORMAL
- en: Thus,
  prefs: []
  type: TYPE_NORMAL
- en: model building
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: deployment
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: retraining
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: maintenance
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: is becoming the task of machine learning engineers.
  prefs: []
  type: TYPE_NORMAL
- en: At the same time, the data wrangling that we used to do are becoming so complex
    that this is now becoming specialised to dedicated data engineering teams.
  prefs: []
  type: TYPE_NORMAL
- en: As a result, data science sits in a very narrow space between these two disciplines,
    and quite soon the lines between data scientist and data analyst will blur.
  prefs: []
  type: TYPE_NORMAL
- en: The trajectory is that data scientists will no longer be building cutting-edge
    models, but will become more business and product focused, generating insights
    and MI reports instead.
  prefs: []
  type: TYPE_NORMAL
- en: '***If you want to stay closer to the model building, it doesn’t suffice to
    just code anymore.***'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: You need to learn how to code properly, and how to maintain them well. Machine
    learning is no longer a novelty, it is no longer just PoCs, it is becoming software
    engineering.
  prefs: []
  type: TYPE_NORMAL
- en: If You Want To Learn More
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
