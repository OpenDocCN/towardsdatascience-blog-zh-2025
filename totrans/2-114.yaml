- en: 'From Rules to Relationships: How Machines Are Learning to Understand Each Other'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/from-rules-to-relationships-how-machines-are-learning-to-understand-each-other/](https://towardsdatascience.com/from-rules-to-relationships-how-machines-are-learning-to-understand-each-other/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1753229384765" class="mdspan-comment">Context</mdspan>
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Communication systems have evolved from simple bit transmission to intelligent
    information sharing. Traditional systems focus on moving raw data from point A
    to point B as reliably as possible. Now, with the explosion of machine-to-machine
    communication in IoT devices, autonomous systems, and smart infrastructure, we’re
    hitting a fundamental bottleneck.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: Modern networks are drowning in unnecessary data. But machines don’t need every
    bit of information that traditional systems transmit.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s take a look at the following security monitoring interaction:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: '**Security Camera:** *Spots someone walking around in a restricted area during
    off-hours and captures a high-resolution video frame of size 5 MB*'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: '**Traditional System:** *Sends the entire 5MB frame with every single bit*'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: '**Central Monitoring:** *Analyzes frame and determines: “Unauthorized person
    detected in Zone A”*'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: In this interaction, the monitoring system primarily cares about the security
    alert rather than the person’s clothing details, facial features, or background.
    But traditional communication gives equal importance to every pixel, transmitting
    millions of irrelevant bits along with the few that matter for decision-making.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
- en: 'Semantic communication emerged as a paradigm shift that transmits meaning rather
    than bits. Instead of sending the entire 5MB video frame, a semantic communication
    system would extract and transmit only: “zone_A, unauthorized_person, threat_level_high”
    while requiring just a tiny fraction of data, while preserving all decision-relevant
    information.'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: The receiving system gets exactly what it needs to make the right decision by
    deploying security personnel to Zone A for an unauthorized intrusion.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: Early systems relied on Semantic Knowledge Bases (SKBs) to reduce bandwidth
    usage without losing the actual meaning of the message.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
- en: But SKB-based systems have limitations. They work well in controlled environments
    but fail when encountering unknown scenarios. This limitation sparked the development
    of knowledge graph-based semantic communication that promises to solve unknown
    situations through relational reasoning.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: Why does SKBs-based semantic communication fail?
  id: totrans-14
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: SKB systems have a critical weakness. To understand it, we first need to see
    how they process information.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: In our security monitoring example, both the camera and monitoring station maintain
    a shared knowledge base K = {k[m] ∈ R^d}[{m∈M}] where each k[m] represents semantic
    attributes for category m. When a security camera captures a video frame x, the
    semantic encoder S_α(·) extracts features s ∈ R^d.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: 'Instead of transmitting “s” directly, the system finds the closest match using
    cosine similarity:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/85ac99d91dcf4c6bdcc8e3cba1f591a8.png)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
- en: 'Image Source: SKB Paper[1]'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: where D(s, k<bdo dir="ltr" lang="">[m]</bdo>) represents the cosine similarity
    between s and k[m].
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: In our example, the camera sees someone in a restricted area and extracts features
    like “human shape, no uniform, nighttime movement.” It compares these against
    its knowledge base and finds the best match is “unauthorized_person” at index
    v in the knowledge base. Instead of sending all the feature details, it just transmits
    “v.”
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: This simple approach significantly reduces bandwidth usage while preserving
    all the information the monitoring system needs to make decisions.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: Where does this break down?
  id: totrans-23
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The system works great until something unexpected shows up. What happens when
    the camera spots something that’s not in its knowledge base?
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s look at the following example:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
- en: '**Security Camera:** *Spots a maintenance worker in work clothes carrying tools
    during off-hours.*'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
- en: '**SKB System:** *Only knows “unauthorized_person,” “authorized_person,” “vehicle,”
    “animal”*'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
- en: '**System Decision:** *Confidently classifies worker as “unauthorized_person”
    with high threat level*'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
- en: '**Result:** *False alarm — security team gets dispatched to stop legitimate
    maintenance work*'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
- en: The math behind this might seem simple, but it’s actually quite problematic.
    The system always picks the “best” match, even when all the options are terrible.
    It’s like being forced to choose an answer on a multiple-choice test when none
    of the choices make sense. You still have to pick something, and the system has
    no way to say it doesn’t know.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
- en: These problems get worse in real deployments. For example, if your training
    data didn’t include shadows, the system starts calling them “intruders.” Train
    without winter clothing examples, and it thinks heavy coats are “suspicious gear.”
    The system never admits uncertainty. It always sounds confident, even when it’s
    completely wrong.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
- en: How do Knowledge Graphs Fix this?
  id: totrans-32
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Knowledge graph based semantic communication solves SKB limitations by encoding
    relationships between nodes rather than just isolated categories. Instead of asking
    “which category does this match?” it asks “how does this relate to what I already
    know?”
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s walk through our maintenance worker example to see the difference:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
- en: '**Step 1: Detection and Feature Extraction** The camera detects the same features
    as before, such as “human shape, work clothes, carrying tools, off-hours timing”'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: '**Step 2: Relationship Mapping** Instead of forcing these features into a single
    category, the knowledge graph maps them to multiple connected nodes.'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
- en: '*Human shape → triggers “human” node'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
- en: Work clothes + tools → *triggers* “work_tools” and “maintenance_equipment” nodes
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
- en: Off-hours timing → *triggers* “unusual_access_time” node*
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
- en: '**Step 3: Relationship Traversal**'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
- en: 'To track connections between nodes, the system uses following formula:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/fb2a15e9eb18d90975817d217ffc1a42.png)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
- en: 'Image source: Knowledge Graph Paper [2]'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
- en: where “z[v]” denotes the updated representation of node v, and the sum aggregates
    information from all neighboring nodes u. Each node picks up its meaning from
    the neighbors it’s connected to.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
- en: '*work_tools → indicates → maintenance_activity'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
- en: maintenance_activity → performed_by → maintenance_worker
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
- en: maintenance_worker → is_a → authorized_personnel (conditional)
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
- en: off_hours_access + authorized_personnel → requires → verification*
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
- en: '**Step 4: Contextual Reasoning**'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
- en: 'The knowledge graph combines these relationship paths: “This appears to be
    a maintenance activity by potentially authorized personnel, but the timing requires
    verification before determining threat level.”'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
- en: 'Final classification is made using the following formula:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/281d8179064bb07126632233b6c7c939.png)'
  id: totrans-52
  prefs: []
  type: TYPE_IMG
- en: 'Image source: Knowledge Graph Paper [2]'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
- en: where ŷ is the predicted category, φ(y) is the knowledge graph embedding for
    category y, and ŝ is the received semantic information. This leads to “verify
    before alarm” instead of SKB’s forced “unauthorized person” classification.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
- en: The Key Difference
  id: totrans-55
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The difference from the maintenance worker example is that the SKB system sees
    “human in restricted area during off-hours” and is forced to pick from its existing
    categories. In our example, the system chose “unauthorized_person” because it’s
    the closest match.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
- en: A knowledge graph-based system takes a completely different approach. It sees
    the same person but starts connecting the dots. A person carrying work tools suggests
    a maintenance activity, which typically serves a legitimate purpose. But happening
    during off-hours means it needs verification first. The system generates a smart
    response — “verify before alarm.” Even though the system was not trained for this
    scenario, it was able to reason using relation graphs.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
- en: Evaluation
  id: totrans-58
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Knowledge graph systems showed significant improvements over SKB-based systems,
    showing 70–80% better accuracy in both familiar and unfamiliar environments. The
    system worked well even when the signal quality wasn’t great, which proved it
    could actually function in real-world situations where communication is noisy.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
- en: That said, knowledge graph systems have their own limitations. Graph building
    requires domain expertise and significant computing power. Our testing was limited
    to a specific dataset with predetermined categories, so we’re not sure how it
    would it perform in a large-scale real-world deployment. These systems need more
    testing before they can completely replace the SKB-based systems.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  id: totrans-61
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: SKB systems were great when everything was predictable, but failed in an unfamiliar
    environment. Knowledge graphs solve this problem by truly understanding how nodes
    connect to each other. This allows the system to reason through unfamiliar environment
    by these connections, rather than needing explicit training for every possible
    situation. They are harder and more expensive to build, but they are suitable
    for real-world scenarios.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 当一切都可以预测时，SKB系统非常出色，但在一个不熟悉的环境中却失败了。知识图谱通过真正理解节点之间如何相互连接来解决这个问题。这使得系统可以通过这些连接在陌生的环境中进行推理，而不是需要对每种可能的情况进行显式训练。它们构建起来更困难且成本更高，但它们适合现实世界的场景。
