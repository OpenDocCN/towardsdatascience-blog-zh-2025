- en: Expected Value Analysis in AI Product Management
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 人工智能产品管理中的期望值分析
- en: 原文：[https://towardsdatascience.com/expected-value-analysis-in-ai-product-management/](https://towardsdatascience.com/expected-value-analysis-in-ai-product-management/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://towardsdatascience.com/expected-value-analysis-in-ai-product-management/](https://towardsdatascience.com/expected-value-analysis-in-ai-product-management/)'
- en: <mdspan datatext="el1762377732188" class="mdspan-comment">Decision making</mdspan>
    under uncertainty is a central concern for product teams. Decisions large and
    small often have to be made under time pressure, despite incomplete — and potentially
    inaccurate — information about the problem and solution space. This may be due
    to a lack of relevant user research, limited knowledge about the intricacies of
    the business context (typically seen in companies that do too little to foster
    customer centricity and cross-team collaboration), and/or a flawed understanding
    of what a certain technology can and cannot do (particularly when building front-runner
    products with novel, untested technologies).
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在不确定性下进行决策是产品团队的一个核心关注点。大小决策往往需要在时间压力下做出，尽管对问题和解决方案空间的信息可能不完整——甚至可能不准确。这可能是由于缺乏相关的用户研究、对业务背景的复杂性了解有限（通常见于那些做得很少的以客户为中心和跨团队合作的公司），以及/或对某种技术可以和不可以做什么的理解有缺陷（尤其是在使用新颖、未经测试的技术构建领先产品时）。
- en: The situation is especially challenging for AI product teams for at least three
    reasons. First, many AI algorithms are inherently probabilistic in nature and
    thus yield uncertain outcomes (e.g., model predictions may be right or wrong with
    a certain probability). Second, a sufficient quantity of high-quality, relevant
    data may not always be available to properly train AI systems. Third, the recent
    explosion in hype around AI — and more specifically, generative AI — has led to
    unrealistic expectations among customers, Wall Street analysts and (inevitably)
    decision makers in upper management; the feeling among many of these stakeholders
    seems to be that virtually anything can now be solved easily with AI. Needless
    to say, it can be difficult for product teams to manage such expectations.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 对于人工智能产品团队来说，情况特别具有挑战性，至少有三个原因。首先，许多人工智能算法本质上具有概率性，因此会产生不确定的结果（例如，模型预测可能正确或错误，有一定的概率）。其次，高质量、相关的大量数据可能并不总是可用，以正确训练人工智能系统。第三，最近围绕人工智能——特别是生成式人工智能——的炒作爆炸性增长，导致客户、华尔街分析师（不可避免地）以及高层管理决策者对期望值产生了不切实际的想法；许多这些利益相关者的感觉似乎是，现在几乎任何问题都可以用人工智能轻松解决。不用说，产品团队管理这样的期望值可能很困难。
- en: So, what hope is there for AI product teams? While there is no silver bullet,
    this article introduces readers to the notion of *expected value* and how it can
    be used to guide decision making in AI product management. After a brief overview
    of key theoretical concepts, we will look at three real-life case studies that
    underscore how expected value analysis can help AI product teams make strategic
    decisions under uncertainty across the product lifecycle. Given the foundational
    nature of the subject matter, the target audience of this article includes data
    scientists, AI product managers, engineers, UX researchers and designers, managers,
    and all others aspiring to develop great AI products.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，人工智能产品团队有什么希望呢？虽然没有灵丹妙药，但本文向读者介绍了“期望值”的概念以及如何将其用于指导人工智能产品管理中的决策。在简要概述关键理论概念之后，我们将探讨三个现实生活中的案例研究，强调期望值分析如何帮助人工智能产品团队在产品生命周期的不确定性下做出战略决策。鉴于主题的基础性质，本文的目标受众包括数据科学家、人工智能产品经理、工程师、用户体验研究员和设计师、经理以及所有希望开发优秀人工智能产品的相关人员。
- en: '***Note:*** *All figures and formulas in the following sections have been created
    by the author of this article.*'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意：** 下文中所有图表和公式均由本文作者创建。'
- en: Expected Value
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 期望值
- en: Before looking at a formal definition of expected value, let us consider two
    simple games to build our intuition.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 在正式定义期望值之前，让我们考虑两个简单的游戏来建立我们的直觉。
- en: A Game of Dice
  id: totrans-8
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 掷骰子的游戏
- en: In the first game, imagine you are competing with your friends in a dice-rolling
    contest. Each of you gets to roll a fair, six-sided die *N* times. The score for
    each roll is given by the number of pips (dots) showing on the top face of the
    die after the roll; 1, 2, 3, 4, 5, and 6 are thus the only achievable scores for
    any given roll. The player with the highest total score at the end of *N* rolls
    wins the game. Assuming that *N* is a large number (say, 500), what should we
    expect to see at the conclusion of the game? Will there be an outright winner
    or a tie?
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 在第一局游戏中，想象你正在和朋友们参加一个掷骰子的比赛。每个人都可以公平地掷一个六面的骰子*N*次。每次掷骰子的得分由掷骰子后骰子顶面的点数决定；1、2、3、4、5和6是任何给定掷骰子可能得到的唯一得分。在*N*次掷骰子结束后得分最高的玩家赢得比赛。假设*N*是一个很大的数字（比如说，500），我们期望在比赛结束时看到什么？会出现一个明显的赢家，还是会有平局？
- en: It turns out that, as *N* gets large, the total scores of each of the players
    are likely to converge to 3.5**N*. For example, after 500 rolls, the total scores
    of you and your friends are likely to be around 3.5*500 = 1750\. To see why, notice
    that, for a fair, six-sided die, the probability of any side being on top after
    a roll is 1/6\. On average, the score of an individual roll will therefore be
    (1 + 2 + 3 + 4 + 5 + 6)/6 = 3.5, i.e., the average of all achievable scores per
    roll — this also happens to be the *expected value* of a die roll. Assuming that
    the outcomes of all rolls are independent of each other, we would expect the average
    score of the *N* rolls to be 3.5\. So, after 500 rolls, we should not be surprised
    if each player has a total score of roughly 1750\. In fact, there is a so-called
    *strong law of large numbers* in mathematics, which states that if you repeat
    an experiment (like rolling a die) a sufficiently large number of times, the average
    result of all those experiments should converge almost surely to the expected
    value.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 结果表明，随着*N*的增大，每位玩家的总得分很可能收敛到3.5*N*。例如，在500次掷骰子后，你和你朋友的得分很可能在3.5*500 = 1750左右。为了理解这一点，请注意，对于一个公平的六面骰子，任何一面在掷骰子后成为顶面的概率是1/6。因此，平均每次掷骰子的得分将是(1
    + 2 + 3 + 4 + 5 + 6)/6 = 3.5，即每次掷骰子可能得到的得分的平均值——这也恰好是掷骰子的期望值。假设所有掷骰子的结果都是相互独立的，我们预计*N*次掷骰子的平均得分将是3.5。因此，在500次掷骰子后，如果每个玩家的总得分大约是1750，我们不应该感到惊讶。事实上，数学中有一个所谓的**大数定律**，它表明如果你足够多次地重复一个实验（比如掷骰子），所有这些实验的平均结果几乎肯定将收敛到期望值。
- en: A Game of Roulette
  id: totrans-11
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 轮盘赌游戏
- en: Next, let us consider roulette, a popular game at casinos. Imagine you are playing
    a simplified version of roulette against a friend as follows. The roulette wheel
    has 38 pockets, and the game ends after *N* rounds. For each round, you must pick
    a whole number between 1 and 38, after which your friend will spin the roulette
    wheel and throw a small ball onto the spinning wheel. Once the wheel stops spinning,
    if the ball ends up in the pocket with the number that you picked, your friend
    will pay you $35; if the ball ends up in any of the other pockets, however, you
    must pay your friend $1\. How much money do you expect you and your friend to
    make after *N* rounds?
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，让我们考虑轮盘赌，这是一种在赌场中流行的游戏。想象一下，你正在和一个朋友玩一个简化的轮盘赌游戏，如下所示。轮盘有38个槽位，游戏在经过*N*轮后结束。对于每一轮，你必须选择一个介于1到38之间的整数，然后你的朋友将旋转轮盘，并将一个小球扔到旋转的轮盘上。一旦轮盘停止旋转，如果小球最终落在你选择的数字对应的槽位中，你的朋友将支付你$35；然而，如果小球落在其他任何槽位中，你必须支付你的朋友$1。在*N*轮之后，你和你朋友期望能赚多少钱？
- en: You might think that, since $35 is a lot more than $1, your friend will end
    up paying you quite a bit of money by the time the game is done — but not so fast.
    Let us apply the same basic approach we used in the dice game to analyze this
    seemingly lucrative game of roulette. For any given round, the probability of
    the ball ending up in the pocket with the number that you picked is 1/38\. The
    probability of the ball ending up in some other pocket is 37/38\. From your perspective,
    the average outcome per round is therefore $35*1/38 – $1*37/38 = -$0.0526\. So,
    it seems that you will actually end up owing your friend a little over a nickel
    after each round. After *N* rounds, you will be out of pocket by around $0.0526**N*.
    If you play 500 rounds, as in the dice game above, you will end up paying your
    friend roughly $26\. This is an example of a game that is rigged to favor the
    “house” (i.e., the casino, or in this case, your friend).
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能会想，既然 35 美元远远超过 1 美元，你的朋友在游戏结束时最终会付给你相当多的钱——但等等。让我们将我们在掷骰子游戏中使用的基本方法应用到这个看似有利可图的轮盘赌游戏中。对于任何一轮，球最终落在你选择的数字口袋的概率是
    1/38。球落在其他口袋的概率是 37/38。从你的角度来看，每轮的平均结果是 $35*1/38 – $1*37/38 = -$0.0526。所以，看起来你实际上在每一轮后实际上会欠你的朋友一点五分钱。经过
    *N* 轮，你将损失大约 $0.0526**N**。如果你像上面的掷骰子游戏那样玩 500 轮，你将大约支付给你的朋友 26 美元。这是一个“房子”（即赌场，或者在这种情况下，你的朋友）有利可图的游戏的例子。
- en: Formal Definition
  id: totrans-14
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 正式定义
- en: 'Let *X* be a random variable that can yield any one of *k* outcome values,
    *x*[1], **x**[2], …, **x**[k], each with probabilities **p**[1], ***p***[2], …,
    ***p***[k] of occurring, respectively. The *expected value,* *E(X),* of *X* is
    the sum of the outcome values weighted by their respective probabilities of occurrence:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 设 *X* 为一个可以产生 *k* 个结果值之一的随机变量，分别为 *x*[1]、**x**[2]、…、**x**[k]，每个结果发生的概率分别为 **p**[1]、***p***[2]、…、***p***[k]。*X*
    的 *期望值*，*E(X)*，是结果值乘以其发生的概率之和：
- en: '![](../Images/f073e2acb42619d5edb7a97d24fe21cd.png)'
  id: totrans-16
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/f073e2acb42619d5edb7a97d24fe21cd.png)'
- en: The total expected value of *N* independent occurrences of *X* will be *N*E(X)*.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: '*N* 次独立发生的 *X* 的总期望值将是 *N*E(X)*。'
- en: 'The video below walks through some more hands-on examples of expected value
    calculations:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的视频将介绍一些关于期望值计算的更多实际示例：
- en: In the following case studies, we will see how expected value analysis can aid
    decision making under uncertainty. Fictitious company names are used throughout
    to preserve the anonymity of the businesses involved.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 在以下案例研究中，我们将看到期望值分析如何帮助在不确定性下做出决策。为了保护涉及企业的匿名性，整个案例研究中使用了虚构的公司名称。
- en: 'Case Study 1: Fraud Detection in E-Commerce'
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 案例研究 1：电子商务中的欺诈检测
- en: '*Cars Online* is an online platform for reselling used cars across Europe.
    Legitimate car dealerships and private owners of used cars can list their vehicles
    for sale on *Cars Online*. A typical listing will include the asking price of
    the seller, facts about the car (e.g., its basic properties, special features,
    and details of any damages/wear-and-tear), and photos of the car’s interior and
    exterior. Buyers can browse through the many listings on the platform, and having
    found one they like, can click on a button on the listing page to contact the
    seller to arrange a viewing, and ultimately make the purchase. *Cars Online* charges
    sellers a small monthly fee to show listings on the platform. To drive such subscription-based
    revenue, the process for sellers to sign up for the platform and create listings
    is kept as simple as possible.'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: '*Cars Online* 是一个在线平台，用于在欧洲范围内转售二手车。合法的汽车经销商和二手车的私人车主可以在 *Cars Online* 上列出他们的车辆进行销售。一个典型的列表将包括卖家的要价、关于汽车的事实（例如，其基本属性、特殊功能和任何损坏/磨损的细节），以及汽车内部和外观的照片。买家可以在平台上浏览众多列表，找到喜欢的列表后，可以点击列表页面上的按钮联系卖家安排看车，并最终完成购买。*Cars
    Online* 向卖家收取小额月费以在平台上展示列表。为了推动这种基于订阅的收入，卖家注册平台和创建列表的过程被尽可能地简化。'
- en: The trouble is that some of the listings on the platform may in fact be fake.
    An unintended consequence of reducing the barriers for creating listings is that
    malicious users can set up fake seller accounts and create fake listings (often
    impersonating legitimate car dealerships) to lure and potentially defraud unsuspecting
    buyers. Fake listings can have a negative business impact on *Cars Online* in
    two ways. First, fearing reputational damage, affected sellers may take their
    listings to other competing platforms, publicly criticize *Cars Online* for its
    apparently lax security standards (which might trigger other sellers to also leave
    the platform), and even sue for damages. Second, affected buyers (and those that
    hear about the instances of fraud in the press, on social media, and from friends
    and family) may also abandon the platform, and write negative reviews online —
    all of which can further persuade sellers (the platform’s key revenue source)
    to leave.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 问题在于，平台上的某些列表实际上可能是虚假的。降低创建列表门槛的一个意想不到的后果是，恶意用户可以设置虚假卖家账户并创建虚假列表（通常冒充合法汽车经销商）来诱骗并可能欺骗毫无戒心的买家。虚假列表可以从两个方面对*在线汽车*产生负面影响。首先，担心声誉受损，受影响的卖家可能会将他们的列表转移到其他竞争平台，公开批评*在线汽车*的明显宽松的安全标准（这可能会触发其他卖家也离开平台），甚至提起损害赔偿诉讼。其次，受影响的买家（以及那些在媒体、社交媒体、朋友和家人那里听说欺诈事件的人）也可能放弃该平台，并在网上写下负面评论——所有这些都可能进一步说服卖家（平台的收入来源）离开。
- en: Against this backdrop, the chief product officer (CPO) at *Cars Online* has
    tasked a product manager and a cross-functional team of customer success representatives,
    data scientists, and engineers to assess the possibility of using AI to combat
    the scourge of fraudulent listings. The CPO is not interested in mere opinions
    — she wants a data-driven estimate of the net value of implementing an AI system
    that can help quickly detect and delete fraudulent listings from the platform
    before they can cause any damage.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 在这样的背景下，*在线汽车*的首席产品官（CPO）指派了一位产品经理和一个跨职能团队，包括客户成功代表、数据科学家和工程师，来评估使用人工智能对抗虚假列表这一问题的可能性。CPO对单纯的看法不感兴趣——她希望得到一个基于数据的、实施人工智能系统所能带来的净价值的估计，该系统能够帮助平台快速检测并删除虚假列表，防止它们造成任何损害。
- en: 'Expected value analysis can be used to estimate the net value of the AI system
    by considering the probabilities of correct and incorrect predictions and their
    respective benefits and costs. In particular, we can distinguish between four
    cases: (1) correctly detected fake listings (*true positives*), (2) legitimate
    listings incorrectly deemed fake (*false positives*), (3) correctly detected legitimate
    listings (*true negatives*), and (4) fake listings incorrectly deemed legitimate
    (*false negatives*). The net monetary impact, *C(i)*, of each case *i* can be
    estimated with the help of historical data and stakeholder interviews. Both true
    positives and false positives will result in some effort for *Cars Online* to
    remove the identified listings, but the false positives will result in additional
    costs (e.g., revenues lost due to removing legitimate listings and the cost of
    efforts to reinstate these). Meanwhile, whereas true negatives should incur no
    costs, false negatives can be expensive — these represent the very fraud that
    the CPO aims to combat.'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 通过考虑正确和错误预测的概率以及相应的收益和成本，可以使用预期价值分析来估计人工智能系统的净价值。特别是，我们可以区分四种情况：（1）正确检测到的虚假列表（*真阳性*），（2）被错误地认为是虚假的合法列表（*假阳性*），（3）正确检测到的合法列表（*真阴性*），和（4）被错误地认为是合法的虚假列表（*假阴性*）。每个情况
    *i* 的净货币影响，*C(i)*，可以通过历史数据和利益相关者访谈来估计。真阳性和假阳性都将导致*在线汽车*为移除已识别的列表付出努力，但假阳性将导致额外的成本（例如，由于移除合法列表而失去的收入以及恢复这些列表的努力成本）。与此同时，真阴性不应产生任何成本，而假阴性可能非常昂贵——这些代表了CPO旨在对抗的欺诈行为。
- en: Given an AI model with a certain predictive accuracy, if *P(i)* denotes the
    probability of each case *i* occurring in practice, then the sum *S = C(1)*P(1)
    + C(2)*P(2) + C(3)*P(3) + C(4)*P(4)* reflects the expected value of each prediction
    (see Figure 1 below). The total expected value for *N* predictions would then
    be *N*S*.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 给定一个具有一定预测准确性的AI模型，如果 *P(i)* 表示每个情况 *i* 在实践中发生的概率，那么总和 *S = C(1)*P(1) + C(2)*P(2)
    + C(3)*P(3) + C(4)*P(4)* 反映了每个预测的预期价值（见下图1）。对于 *N* 个预测的总预期价值将是 *N*S*。
- en: '![](../Images/74fa2de8cf4a05ea562c96c132fa2297.png)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/74fa2de8cf4a05ea562c96c132fa2297.png)'
- en: 'Figure 1: Expected Value of Fraud Prediction in Cars Online Case Study'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 图1：在线汽车欺诈预测案例研究中的预期价值
- en: Based on the predictive performance profile of a given AI model and estimates
    of expected value for each of the four cases (from true positives to false negatives),
    the CPO can get a better sense of the expected value of building an AI system
    for fraud detection and make a go/no-go decision for the project accordingly.
    Of course, additional fixed and variable costs usually associated with building,
    operating, and maintaining AI systems should also be factored into the overall
    decision making.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 根据给定AI模型的预测性能配置文件和对四个案例（从真阳性到假阴性）的预期价值的估计，CPO可以更好地了解构建AI系统进行欺诈检测的预期价值，并据此对项目做出是/否的决定。当然，与构建、运营和维护AI系统通常相关的额外固定和可变成本也应纳入整体决策考虑。
- en: '[This](https://medium.com/data-science/machine-learning-for-lead-management-4f15e52e732a)
    article considers a similar case study, in which a recruiting agency decides to
    implement an AI system for identifying and prioritizing good leads (candidates
    likely to be hired by clients) over bad ones. Readers are encouraged to go through
    that case study and reflect on the similarities and differences with the one discussed
    here.'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: '[这篇文章](https://medium.com/data-science/machine-learning-for-lead-management-4f15e52e732a)考虑了一个类似的案例研究，其中一家招聘机构决定实施一个AI系统来识别和优先处理好的潜在客户（客户可能雇佣的候选人）而不是差的潜在客户。鼓励读者阅读该案例研究，并思考其与这里讨论的案例的相似之处和不同之处。'
- en: 'Case Study 2: Auto-Completing Purchase Orders'
  id: totrans-30
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 案例研究2：自动完成采购订单
- en: The procurement department of *ACME Auto*, an American car manufacturer, creates
    a significant number of purchase orders every month. Building a single car requires
    several thousand individual parts that need to be procured on time and at the
    right quality standard from approved suppliers. A team of purchasing clerks is
    responsible for manually creating the purchase orders; this involves filling out
    an online form consisting of several data fields that define the precise specifications
    and quantities of each item to be purchased per order. Needless to say, this is
    a time-consuming and error-prone activity, and as part of a company-wide cost-cutting
    initiative, the Chief Procurement Officer of *ACME Auto* has tasked a cross-functional
    product team within her department to substantially automate the creation of purchase
    orders using AI.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 美国汽车制造商*ACME Auto*的采购部门每月都会创建大量的采购订单。制造一辆汽车需要数千个单独的部件，这些部件需要按时以正确的质量标准从合格的供应商那里采购。一支采购文员团队负责手动创建采购订单；这涉及到填写一个包含多个数据字段的在线表格，这些数据字段定义了每个订单要购买的每个项目的精确规格和数量。不用说，这是一项耗时且易出错的activity，作为公司范围内成本削减计划的一部分，*ACME
    Auto*的首席采购官要求她部门内的跨职能产品团队使用AI大幅自动化采购订单的创建。
- en: Having conducted user research in close collaboration with the purchasing clerks,
    the product team has decided to build an AI feature for auto-filling fields in
    purchase orders. The AI can auto-fill fields based on a combination of any initial
    inputs provided by the purchasing clerk and other relevant information sourced
    from master data tables, inputs from production lines, and so on. The purchasing
    clerk can then review the auto-filled order and has the option of either accepting
    the AI-generated proposals (i.e., predictions) for each field or overriding incorrect
    proposals with manual entries. In cases where the AI is unsure of the correct
    value to fill (as exemplified by a low *model confidence score* for the given
    prediction), the field is left blank, and the clerk must manually fill it with
    a suitable value. An AI feature for flexibly auto-filling forms in this manner
    can be built using an approach called *denoising*, as described in [this](https://medium.com/data-science/dawn-of-the-denoisers-multi-output-ml-models-for-tabular-data-imputation-317711d7a193)
    article.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 在与采购文员紧密合作进行用户研究的基础上，产品团队决定构建一个AI功能来自动填写采购订单中的字段。AI可以根据采购文员提供的任何初始输入以及从主数据表、生产线输入等来源的相关信息组合来自动填写字段。然后，采购文员可以审查自动填写的订单，并可以选择接受AI生成的每个字段的建议（即预测）或用手动输入覆盖错误的建议。在AI不确定要填写的正确值的情况下（例如，给定预测的低*模型置信度分数*），该字段将被留空，文员必须手动填写一个合适的值。可以使用称为*去噪*的方法构建这种灵活自动填写表单的AI功能，如[这篇文章](https://medium.com/data-science/dawn-of-the-denoisers-multi-output-ml-models-for-tabular-data-imputation-317711d7a193)所述。
- en: 'To ensure high quality, the product team would like to set a threshold for
    model confidence scores, such that only predictions with confidence scores above
    this predefined threshold are shown to the user (i.e., used to auto-fill the purchase
    order form). The question is: what threshold value should be chosen?'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 为了确保高质量，产品团队希望为模型置信度分数设置一个阈值，这样只有置信度分数高于此预定义阈值的预测才会展示给用户（即用于自动填写采购订单表单）。问题是：应该选择什么阈值值？
- en: Let *c*[1] and **c**[2] be the payoffs of showing correct and incorrect predictions
    to the user (due to being above the confidence threshold), respectively. Let **c**[3]
    and **c**[4] be the payoffs of *not* showing correct and incorrect predictions
    to the user (due to being below the confidence threshold), respectively. Presumably,
    there should be a positive payoff (i.e., a benefit) to showing correct predictions
    (**c**[1]) and not showing incorrect ones (**c**[4]). By contrast, *c*[2] and
    *c*[3] should be negative payoffs (i.e., costs). Picking a threshold that is too
    low increases the chance of showing wrong predictions that the clerk must manually
    correct (*c*[2]). But picking a threshold that is too high increases the chance
    of correct predictions not being shown, leaving blank fields on the purchase order
    form that the clerk would need to spend some effort to manually fill in (*c*[3]).
    The product team thus has a trade-off on its hands — can expected value analysis
    help resolve it?
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 让 *c*[1] 和 **c**[2] 分别表示向用户展示正确和错误预测的收益（由于置信度阈值以上）。让 **c**[3] 和 **c**[4] 分别表示不向用户展示正确和错误预测的收益（由于置信度阈值以下）。假设，展示正确预测（**c**[1]）和不展示错误预测（**c**[4]）应该有正收益（即好处）。相比之下，*c*[2]
    和 *c*[3] 应该是负收益（即成本）。选择过低的阈值会增加展示错误预测的概率，这些预测需要店员手动更正（*c*[2]）。但选择过高的阈值会增加正确预测不被展示的概率，留下空白字段在采购订单表单上，店员需要花费一些努力手动填写（*c*[3]）。因此，产品团队面临一个权衡——预期值分析能否帮助解决它？
- en: As it happens, the team is able to estimate reasonable values for the payoff
    factors *c*[1], *c*[2], *c*[3], and *c*[4] by leveraging findings from user research
    and business domain know-how. Furthermore, the data scientists on the product
    team are able to estimate the probabilities of incurring these costs by training
    an example AI model on a dataset of historical purchase orders at *ACME Auto*
    and analyzing the results. Suppose *k* is the confidence score attached to a prediction.
    Then given a predefined model confidence threshold *t*, let *q*(*k* > *t*) denote
    the proportion of predictions that have confidence scores greater than *t*; these
    are the predictions that would be used to auto-fill the purchase order form. The
    proportion of predictions with confidence score below the threshold value is *q*(*k*
    ≤ *t*) = 1 – **q**(**k** > **t**). Furthermore, let *p*(*k* > *t*) and *p*(*k*
    ≤ *t*) denote the average accuracies of predictions that have confidence scores
    greater than *t* and at most *t*, respectively. The expected value (or expected
    payoff) *S* per prediction can be derived by summing up the expected values attributable
    to each of the four payoff drivers (denoted *s*[1], *s*[2], *s*[3], and *s*[4]),
    as shown in Figure 2 below. The task for the product team is then to test various
    threshold values *t* and identify one that maximizes the expected payoff *S*.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，团队能够通过利用用户研究和业务领域专业知识来估计收益因素 *c*[1]、*c*[2]、*c*[3] 和 *c*[4] 的合理值。此外，产品团队的数据科学家能够通过在
    *ACME Auto* 历史采购订单数据集上训练一个示例AI模型并分析结果来估计产生这些成本的概率。假设 *k* 是附加到预测上的置信度分数。给定预定义的模型置信度阈值
    *t*，让 *q*(*k* > *t*) 表示置信度分数大于 *t* 的预测比例；这些是用于自动填写采购订单表单的预测。置信度分数低于阈值值的预测比例是 *q*(*k*
    ≤ *t*) = 1 – **q**(**k** > **t**)。此外，让 *p*(*k* > *t*) 和 *p*(*k* ≤ *t*) 表示置信度分数大于
    *t* 和最多 *t* 的预测的平均准确率。每项预测的预期值（或预期收益） *S* 可以通过将每个收益驱动因素（表示为 *s*[1]、*s*[2]、*s*[3]
    和 *s*[4]）的预期值相加得到，如图2所示。然后产品团队的任务是测试各种阈值值 *t* 并确定一个最大化预期收益 *S* 的阈值。
- en: '![](../Images/0ffafa7b3572d204755c459854599e13.png)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0ffafa7b3572d204755c459854599e13.png)'
- en: 'Figure 2: Expected Payoff per Prediction in ACME Auto Case Study'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 图2：ACME汽车案例研究中每项预测的预期收益
- en: 'Case Study 3: Standardizing AI Design Guidance'
  id: totrans-38
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 案例研究3：标准化AI设计指南
- en: The CEO of *Ex Corp*, a global enterprise software vendor, has recently declared
    her intention to make the company “AI-first” and infuse all of its products and
    services with high-value AI features. To support this company-wide transformation
    effort, the Chief Product Officer has tasked the central design team at *Ex Corp*
    with creating a consistent set of design guidelines to help teams build AI products
    that enhance user experience. A key challenge is managing the trade-off between
    creating guidance that is too weak/high-level (giving individual product teams
    greater freedom of interpretation while risking inconsistent application of the
    guidance across product teams) and guidance that is too strict (enforcing standardization
    across product teams without due regard for product-specific exceptions or customization
    needs).
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: '*Ex Corp*的CEO，一家全球企业软件供应商，最近宣布了她将公司转变为“以AI为先”的意图，并将所有产品和服务注入高价值的AI功能。为了支持这一全公司范围的转型努力，首席产品官要求*Ex
    Corp*的中央设计团队制定一套一致的设计指南，以帮助团队构建增强用户体验的人工智能产品。一个关键挑战是在创建过于薄弱/过于高级的指导（给予个别产品团队更大的解释自由度，同时冒着在产品团队间不一致应用指导的风险）和过于严格的指导（在未充分考虑特定产品的例外或定制需求的情况下，强制在产品团队间实施标准化）之间进行权衡。'
- en: One well-intentioned piece of guidance that the central design team initially
    came up with involves displaying labels next to predictions on the UI (e.g., “best
    option,” “good alternative,” or similar), to give users some indication of the
    expected quality/relevance of the predictions. It is thought that showing such
    qualitative labels would help users make informed decisions during their interactions
    with AI products, without overwhelming them with hard-to-interpret statistics
    such as model confidence scores. In particular, the central design team believes
    that by stipulating a consistent, global set of model confidence thresholds, a
    standardized mapping can be created for translating between model confidence scores
    and qualitative labels for products across *Ex Corp*. For example, predictions
    with confidence scores greater than 0.8 can be labeled as “best,” predictions
    with confidence scores between 0.6 and 0.8 can be labeled as “good,” and so on.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 中央设计团队最初提出的一个有良好意图的指导建议是在用户界面（例如，“最佳选项”、“良好替代品”或类似内容）旁边显示预测标签，以使用户对预测的预期质量/相关性有所了解。人们认为，显示这样的定性标签将帮助用户在与人工智能产品的互动中做出明智的决定，而不会因难以解释的统计数据（如模型置信度分数）而感到不知所措。特别是，中央设计团队相信，通过规定一套一致的全局模型置信度阈值，可以为*Ex
    Corp*旗下的产品在模型置信度分数和定性标签之间创建一个标准化映射。例如，置信度分数大于0.8的预测可以标记为“最佳”，置信度分数在0.6到0.8之间的预测可以标记为“良好”，依此类推。
- en: As we have seen in the previous case study, it is possible to use expected value
    analysis to derive a model confidence threshold for a specific use case, so it
    is tempting to try to generalize this threshold across all use cases in the product
    portfolio. However, this is trickier than it first seems, and the probability
    theory underlying expected value analysis can help us understand why. Consider
    two simple games, a coin flip and a die roll. The coin flip entails two possible
    outcomes, landing heads or tails, each with a 1/2 probability of occurring (assuming
    a fair coin). Meanwhile, as we discussed previously, rolling a fair, six-sided
    die entails six possible outcomes for the top-facing side (1, 2, 3, 4, 5, or 6
    pips), each with a 1/6 probability of occurring. A key insight here is that, as
    the number of possible outcomes of a random variable (also called the *cardinality*
    of the outcome set) increases, it generally becomes harder and harder to correctly
    guess the outcome of an arbitrary event. If you guess that the next coin flip
    will result in heads, you will be right half the time on average. But if you guess
    that you will roll any particular number (say, 3) on the next die roll, you will
    only be correct one out of six times on average.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们在之前的案例研究中看到的，使用期望值分析推导出特定用例的模型置信度阈值是可能的，因此尝试将这个阈值推广到产品组合中的所有用例似乎很有吸引力。然而，这比最初看起来要复杂得多，期望值分析背后的概率理论可以帮助我们理解原因。考虑两个简单的游戏，抛硬币和掷骰子。抛硬币有两个可能的结果，正面或反面，每种结果发生的概率都是1/2（假设硬币是公平的）。同时，正如我们之前讨论的，掷一个公平的六面骰子，顶面有六个可能的结果（1、2、3、4、5或6点），每种结果发生的概率都是1/6。一个关键的见解是，随着随机变量的可能结果数量（也称为结果集的*基数*）的增加，正确猜测任意事件结果通常变得越来越困难。如果你猜测下一次抛硬币的结果是正面，平均来说你会猜对一半的时间。但如果你猜测下一次掷骰子会掷出任何特定的数字（比如3），平均来说你只会猜对六分之一的时间。
- en: Now, what if we were to set a global confidence threshold of, say, 0.4 for both
    the coin and dice games? If an AI model for the dice game predicts a 3 on the
    next roll with a confidence score of 0.45, then we might happily label this prediction
    as “good” or even “great”; after all, the confidence score is above the predefined
    global threshold and significantly higher than 1/6 (the success probability of
    a random guess). However, if an AI model for the coin game predicts heads on the
    next coin flip with the same confidence score of 0.45, we may suspect that this
    is a false positive and not show the prediction to the user at all; although the
    confidence score is above the predefined threshold, it is still below 0.5 (the
    success probability of a random guess).
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，如果我们为硬币和骰子游戏都设定一个全球置信度阈值，比如说0.4，会怎么样呢？如果一个用于骰子游戏的AI模型预测下一次投掷结果是3，置信度得分为0.45，那么我们可能会高兴地将其预测标记为“良好”甚至“优秀”；毕竟，置信度得分高于预定义的全局阈值，并且显著高于1/6（随机猜测的成功概率）。然而，如果一个用于硬币游戏的AI模型预测下一次抛硬币结果是正面，置信度得分同样是0.45，我们可能会怀疑这是一个假阳性，根本不会向用户展示这个预测；尽管置信度得分高于预定义的阈值，但它仍然低于0.5（随机猜测的成功概率）。
- en: The above analysis suggests that a single, one-size-fits-all stipulation to
    display qualitative labels next to predictions should be struck from the standardized
    design guidance for AI use cases. Instead, perhaps individual product teams should
    be empowered to make use-case-specific decisions about how to display qualitative
    labels (if at all).
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 上述分析表明，从标准化设计指南中删除一个单一、适用于所有情况的显示定性标签的规定，对于AI用例来说可能是合适的。相反，也许应该赋予各个产品团队权力，让他们根据特定用例做出如何显示定性标签（如果有的话）的决定。
- en: The Wrap
  id: totrans-44
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 总结
- en: Decision making under uncertainty is a key concern for AI product teams, and
    will likely gain in importance in a future dominated by AI. In this context, expected
    value analysis can help guide AI product management. The expected value of an
    uncertain outcome represents the theoretical, long-term, average value of that
    outcome. Using real-life case studies, this article shows how expected value analysis
    can help teams make educated, strategic decisions under uncertainty across the
    product lifecycle.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 在不确定性下的决策是AI产品团队的关键关注点，在由AI主导的未来可能会变得更加重要。在这种情况下，期望值分析可以帮助指导AI产品管理。不确定结果的期望值代表了该结果的理论、长期、平均价值。通过实际案例研究，本文展示了期望值分析如何帮助团队在产品生命周期的不确定性下做出明智、战略性的决策。
- en: As with any such mathematical modeling approach, however, it is worth emphasizing
    two important points. First, an expected value calculation is only as good as
    its structural completeness and the accuracy of its inputs. If all relevant value
    drivers are not included, the calculation will be structurally incomplete, and
    the resulting findings will be inaccurate. Using conceptual frameworks such as
    the matrices and tree diagrams shown in Figures 1 and 2 above can help teams verify
    the completeness of their calculations. Readers can refer to [this](https://www.amazon.com/Conceptual-Frameworks-Structuring-Decisions-Presentations-ebook/dp/B07GC1JDV8)
    book to learn how to leverage conceptual frameworks. If the data and/or assumptions
    used to derive the outcome values and their probabilities are faulty, then the
    resulting expected value will be inaccurate, and potentially damaging if used
    to inform strategic decision making (e.g., wrongly sunsetting a promising product).
    Second, it is usually a good idea to pair a quantitative approach like expected
    value analysis with qualitative approaches (e.g., customer interviews, observing
    how users interact with the products) to get a well-rounded picture. Qualitative
    insights can help us do sanity checks of inputs to the expected value calculation,
    better interpret the quantitative results, and ultimately derive holistic recommendations
    for decision making.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，与任何此类数学建模方法一样，强调两个重要观点是值得的。首先，期望值的计算仅与其结构完整性和输入的准确性相当。如果未包括所有相关的价值驱动因素，计算将结构上不完整，得出的结果将不准确。使用如图1和2所示的矩阵和树图等概念框架可以帮助团队验证其计算的完整性。读者可以参考[这本书](https://www.amazon.com/Conceptual-Frameworks-Structuring-Decisions-Presentations-ebook/dp/B07GC1JDV8)来了解如何利用概念框架。如果用于推导结果值及其概率的数据和/或假设有误，那么得出的期望值将不准确，如果用于告知战略决策（例如，错误地淘汰一个有希望的产品），则可能造成损害。其次，通常将定量方法（如期望值分析）与定性方法（例如，客户访谈，观察用户如何与产品互动）相结合是一个好主意，以获得全面的视角。定性洞察可以帮助我们对期望值计算中的输入进行合理性检查，更好地解释定量结果，并最终为决策制定得出全面的建议。
