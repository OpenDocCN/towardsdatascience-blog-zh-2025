- en: How to Implement Guardrails for Your AI Agents with CrewAI
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/how-to-implement-guardrails-for-your-ai-agents-with-crewai-80b8cb55fa43/](https://towardsdatascience.com/how-to-implement-guardrails-for-your-ai-agents-with-crewai-80b8cb55fa43/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![Photo by Muhammad Firdaus Abdullah on Unsplash](../Images/cbb51a7bc2ad7564a3fb4a47eb4e4c60.png)'
  prefs: []
  type: TYPE_IMG
- en: Photo by [Muhammad Firdaus Abdullah](https://unsplash.com/@firi?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  prefs: []
  type: TYPE_NORMAL
- en: Given the non-deterministic nature of LLMs, it’s easy to end up with outputs
    that don’t fully comply with what our application is intended for. A well-known
    example is Tay, the Microsoft chatbot that famously started posting offensive
    tweets.
  prefs: []
  type: TYPE_NORMAL
- en: 'Whenever I’m working on an LLM application and want to decide if I need to
    implement additional safety strategies, I like to focus on the following points:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Content Safety**: Mitigate risks of generating harmful, biased, or inappropriate
    content.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**User Trust**: Establish confidence through transparent and responsible functionality.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Regulatory Compliance**: Align with legal frameworks and data protection
    standards.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Interaction Quality**: Optimize user experience by ensuring clarity, relevance,
    and accuracy.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Brand Protection**: Safeguard the organization’s reputation by minimizing
    risks.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Misuse Prevention**: Anticipate and block potential malicious or unintended
    use cases.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If you’re planning to work with LLM Agents soon, **this article is for you**.
  prefs: []
  type: TYPE_NORMAL
- en: What are guardrails?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this context, implementing guardrails for an Agent means ensuring that the
    first output from the Agent is not the final answer.
  prefs: []
  type: TYPE_NORMAL
- en: Technically speaking, you want to evaluate the Agent’s output based on specific
    constraints and, if necessary, force the Agent to regenerate its answer until
    it meets your requirements.
  prefs: []
  type: TYPE_NORMAL
- en: For example, imagine an application that summarizes all the emails you’ve received
    over the past month. You’ve specified that personal information, such as the sender’s
    name, must be anonymized. However, LLMs can sometimes "forget" this condition
    due to their unpredictable nature. In such cases, you can rely on an additional
    step to verify whether your strict condition has been met, since it’s a critical
    requirement.
  prefs: []
  type: TYPE_NORMAL
- en: Intro to CrewAI
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '[CrewAI](https://docs.crewai.com/introduction) is my go-to framework whenever
    I work with Agents. It’s simple, backed by a strong community, open source, and
    completely focused on Agents. It also comes with plenty of extra functionalities,
    making it a very appealing choice.'
  prefs: []
  type: TYPE_NORMAL
- en: Before diving into how to implement guardrails with CrewAI, let me briefly introduce
    the main components we’ll be working with.
  prefs: []
  type: TYPE_NORMAL
- en: Agents, Tasks, and Crews
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In CrewAI, there’s a clear separation between the **[Tasks](https://docs.crewai.com/concepts/tasks)**
    and the **[Agent](https://docs.crewai.com/concepts/agents)** itself. This separation
    allows you to decouple what would otherwise be part of a single, large prompt.
    By keeping these two concepts distinct, you can clearly define the role of the
    Agent and what the Agent is supposed to do.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: In this example, we have a fitness Agent responsible for creating a muscle gain
    plan based on the fitness goal and historical weight data. As you can see, the
    `fitness_tracker_agent` doesn’t inherently know **what** to do until we create
    a Task and specify which agent will handle it.
  prefs: []
  type: TYPE_NORMAL
- en: Finally, we bring all the Tasks and Agents together into a **[Crew](https://docs.crewai.com/concepts/crews)**,
    which forms the heart of our application.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: The final step is to execute our Crew using the input parameters that will be
    passed to the Tasks – in this case, the fitness goal and the historical weight
    data.
  prefs: []
  type: TYPE_NORMAL
- en: Flows
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: What we’ve just covered is enough to build a simple Crew, but it’s not sufficient
    to create a fully functional agentic application with guardrails. The next concept
    we need to master is **[CrewAI Flows](https://docs.crewai.com/concepts/flows)**.
  prefs: []
  type: TYPE_NORMAL
- en: The idea behind Flows is to easily create dynamic AI workflows with chained
    Tasks, seamless state management, event-driven responsiveness, and flexible control
    flow for conditions, loops, and branching.
  prefs: []
  type: TYPE_NORMAL
- en: 'The following decorators help manipulate the flow of execution:'
  prefs: []
  type: TYPE_NORMAL
- en: '**`@start()`**: Marks the entry point of the Flow and initiates Tasks when
    the Flow begins.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**`@listen()`**: Executes a method when a specific Task or event is completed.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**`@router()`**: Directs the Flow to different paths based on conditions or
    outcomes.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: Additionally, Flows allow access to a shared object that stores and manages
    data (`ExampleState`), enabling seamless communication between Tasks and preserving
    context throughout the workflow.
  prefs: []
  type: TYPE_NORMAL
- en: Guardrails with CrewAI Flow
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: With the two simple concepts we’ve just covered, we’re ready to enhance our
    AI Agent. In this example, I’ll demonstrate how to create a multi-agent AI application
    capable of generating text and verifying whether the text contains violent content
    before providing the output.
  prefs: []
  type: TYPE_NORMAL
- en: The check for violence in the text occurs within the application itself. Thanks
    to Flow’s state management, we can control how often the text is regenerated,
    preventing infinite loops. This approach introduces a level of determinism to
    something that is inherently non-deterministic.
  prefs: []
  type: TYPE_NORMAL
- en: Imports
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The primary library used is **CrewAI**, but we’ll also import **[Pydantic](https://docs.pydantic.dev/latest/)**
    to create a `BaseModel`class, as CrewAI’s documentation requires.
  prefs: []
  type: TYPE_NORMAL
- en: 'For this example, we’ll assume two Agents and their corresponding Tasks have
    already been created as described earlier: one for generating text and another
    for checking it for violent content.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: In addition to the `Flow` class, we’ll need to use the three decorators to build
    our application.
  prefs: []
  type: TYPE_NORMAL
- en: State
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The **[state](https://docs.crewai.com/concepts/flows#flow-state-management)**
    is what we use to persist data throughout the Flow execution. The first piece
    of information we need to persist is the generated text. This is where we store
    the text across all iterations, updating it as necessary.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: To control the Flow, we’ll also use a flag to indicate whether the text contains
    violence, as well as a counter to track how many generation attempts remain. These
    attributes will be accessed and updated during the Flow’s execution.
  prefs: []
  type: TYPE_NORMAL
- en: Flow Class
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The class we’re implementing consists of methods designed to control the flow
    of the application. Let’s build it step by step, starting with the `__init__`
    function.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: So far, it’s business as usual. We’re simply initializing the sole attribute
    of our class. What’s new here is the `ViolenceCheckState` Pydantic model, which
    we pass to the superclass `Flow`. This model will represent our state.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: The first method must use the `@start` decorator to define the starting point
    of our Flow. It’s followed by a second method, which listens to the first one
    and is executed after it.
  prefs: []
  type: TYPE_NORMAL
- en: 'These two methods perform the following Tasks:'
  prefs: []
  type: TYPE_NORMAL
- en: '**`generate_text`**: This method creates a Crew that generates text based on
    a given topic. The generated result is saved into the state via `self.state.generated_text`.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**`validate_text_for_violence`**: This method uses a different Crew to check
    if the text contains violent content. If violence is detected, we set `self.state.contains_violence`
    to `True`.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Adding Complexity with Routing
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Here’s where it gets interesting. Now we use the `@router` decorator to direct
    the Flow based on whether the application needs to regenerate the text. This decision
    is based on the value of `self.state.contains_violence`.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: 'The `route_text_validation` method is executed immediately after `validate_text_for_violence`,
    as specified by the decorator. It checks the `contains_violence` attribute in
    the state and:'
  prefs: []
  type: TYPE_NORMAL
- en: Returns `"safe"` if no violence is detected.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Triggers a regeneration of the text if violence is detected and attempts remain.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Handling Signals
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The last part of our class includes three methods that listen for specific
    signals sent from `route_text_validation`: `"safe"`, `"regenerate"`, and `"not_feasible"`.'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: 'Here’s how each scenario is handled:'
  prefs: []
  type: TYPE_NORMAL
- en: '**`"safe"`**: If no violence is detected, the generated text is saved to a
    file.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**`"regenerate"`**: If text regeneration is triggered, the `generation_attempts_left`
    counter is decremented, and the `generate_text` method is called again, restarting
    the process.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**`"not_feasible"`**: This occurs when the maximum number of regeneration attempts
    (in this case, 2) is reached, and the application cannot produce a text free of
    violence.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Conclusions
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This approach has been a lifesaver for me. The implementation focuses on organizing
    the loop and handling iterations rather than reinventing the logic behind the
    application’s flow. In this example, I focused on checking whether the text contained
    violence and determining the appropriate actions if it did. I didn’t have to waste
    time managing the flow logic itself, thanks to this clean, built-in feature provided
    by the framework.
  prefs: []
  type: TYPE_NORMAL
- en: More Use Cases
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Among the many use cases for this approach, I’d like to highlight query injection.
    This is more common than you might think, especially with the growing prominence
    of roles like "prompt engineering." With CrewAI, you can create a Flow that evaluates
    initial queries to determine if an attacker is attempting to exploit a chatbot,
    for example.
  prefs: []
  type: TYPE_NORMAL
- en: Challenges
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'This is the framework way: it gives you a lot, but when something goes wrong,
    it can take everything back with interest. I’ve started simple applications only
    to find myself opening pull requests on GitHub to fix bugs after hours of work.'
  prefs: []
  type: TYPE_NORMAL
- en: That said, it’s not as bad as it sounds. CrewAI is still my first choice for
    multi-agent applications. However, as with any new library, relying on it means
    accepting the risks and being prepared to address them.
  prefs: []
  type: TYPE_NORMAL
- en: 'If you want to know more about this library, [check out my last talk](https://youtu.be/Z6iYie_Ry8k?si=t-KvlwFawgEq526R):'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/21a75f5dab1c01b47dfb4ee7d548e642.png)'
  prefs: []
  type: TYPE_IMG
