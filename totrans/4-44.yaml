- en: What is this series about?
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 这一系列是关于什么的？
- en: Welcome to part 3 of my series on marketing mix modelling (MMM), a hands-on
    guide to help you master MMM. Throughout this series, we’ll cover key topics such
    as model training, validation, calibration and budget optimisation, all using
    the powerful **pymc-marketing** python package. Whether you’re new to MMM or looking
    to sharpen your skills, this series will equip you with practical tools and insights
    to improve your marketing strategies.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 欢迎来到关于营销组合建模（MMM）系列的第3部分，这是一本实用指南，帮助你掌握MMM。在这个系列中，我们将涵盖关键主题，如模型训练、验证、校准和预算优化，所有这些都将使用强大的**pymc-marketing**
    Python包来完成。无论你是营销组合建模的新手还是想提高你的技能，这个系列都将为你提供实用的工具和见解，以改善你的营销策略。
- en: 'If you missed part 2 check it out here:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你错过了第二部分，请在此查看：
