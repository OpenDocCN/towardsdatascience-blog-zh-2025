- en: 3.1 Simulating data
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'We are going to re-use the data-generating process from the first article.
    If you want a reminder on the data-generating process, take a look at the first
    article where we did a detailed walkthrough:'
  prefs: []
  type: TYPE_NORMAL
- en: '[**Mastering Marketing Mix Modelling In Python**](https://towardsdatascience.com/mastering-marketing-mix-modelling-in-python-7bbfe31360f9)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: '![User generated image](../Images/212662a8a10a06d6a0ad239694b4a641.png)'
  prefs: []
  type: TYPE_IMG
- en: User generated image
  prefs: []
  type: TYPE_NORMAL
- en: 3.2 Training the model
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'We are now going to re-train the model from the first article. We will prepare
    the training data in the same way as last time by:'
  prefs: []
  type: TYPE_NORMAL
- en: Splitting data into features and target.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Creating indices for train and out-of-time slices.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: However, as the focus of this article is not on model calibration, we are going
    to include demand as a control variable rather than demand_proxy. This means the
    model will be very well calibrated – Although this isn’t very realistic, it will
    give us some good results to illustrate how we can optimise budgets.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: 3.3 Validating the model
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Before we get into the optimisation, lets check our model fits well. First
    we check the true contributions:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: '![User generated image](../Images/ef538c4d5c271eb37380ac8e4cf57fba.png)'
  prefs: []
  type: TYPE_IMG
- en: User generated image
  prefs: []
  type: TYPE_NORMAL
- en: 'As expected, our model aligns very closely to the true contributions:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: '![User generated image](../Images/5baea009d875e4d495db69bb7ca01725.png)'
  prefs: []
  type: TYPE_IMG
- en: User generated image
  prefs: []
  type: TYPE_NORMAL
- en: 3.4 Response curves
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Before we get into the budget optimisation, let’s take a look at the response
    curves. There are two ways to look at response curves in the **pymc-marketing**
    package:'
  prefs: []
  type: TYPE_NORMAL
- en: Direct response curves
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Cost share response curves
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Let’s start with the direct response curves. In the direct response curves we
    simply create a scatter plot of weekly spend against weekly contribution for each
    channel.
  prefs: []
  type: TYPE_NORMAL
- en: 'Below we plot the direct response curves:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: '![User generated image](../Images/1d1c3e830e1bf989bf1675485ba57e4d.png)'
  prefs: []
  type: TYPE_IMG
- en: User generated image
  prefs: []
  type: TYPE_NORMAL
- en: The cost share response curves are an alternative way of comparing the effectiveness
    of channels. When δ = 1.0, the channel spend remains at the same level as the
    training data. When δ = 1.2, the channel spend is increased by 20%.
  prefs: []
  type: TYPE_NORMAL
- en: 'Below we plot the cost share response curves:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: '![user generated image](../Images/199671331c51af369f7face3773f1f71.png)'
  prefs: []
  type: TYPE_IMG
- en: user generated image
  prefs: []
  type: TYPE_NORMAL
- en: 'We can also change the x-axis to show absolute spend values:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: '![user generated image](../Images/7223d4d0cac1418e8be6702609be0bbf.png)'
  prefs: []
  type: TYPE_IMG
- en: user generated image
  prefs: []
  type: TYPE_NORMAL
- en: The response curves are great tools to help think about planning future marketing
    budgets at a channel level. Next lets put them to action and run some budget optimisation
    scenarios!
  prefs: []
  type: TYPE_NORMAL
- en: 3.5 Budget optimisation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'To begin with let’s set a couple of parameters:'
  prefs: []
  type: TYPE_NORMAL
- en: '**perc_change:** This is used to set the constraint around min and max spend
    on each channel. This constraint helps us keep the scenario realistic and means
    we don’t extrapolate response curves too far outside of what the model has seen
    in training.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**budget_len:** This is the length of the budget scenario in weeks.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We will start by using the desired length of the budget scenario to select the
    most recent period of data.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: '![User generated image](../Images/41e6ef6a359e3a61eceadb4d9b627651.png)'
  prefs: []
  type: TYPE_IMG
- en: User generated image
  prefs: []
  type: TYPE_NORMAL
- en: 'We then use this recent period to set overall budget constraints and channel
    constraints at a weekly level:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: '![User generated image](../Images/49b9fcfd366b5356a27ae711c54a3e52.png)'
  prefs: []
  type: TYPE_IMG
- en: User generated image
  prefs: []
  type: TYPE_NORMAL
- en: Now it’s time to run our scenario! We feed in the relevant data and parameters
    and get back the optimal spend. We compare it to taking the total budget and splitting
    it by the current budget split proportions (which we have called actual spend).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: '![User generated image](../Images/9b527515b2ee3fda9a03193ff9ae1db2.png)'
  prefs: []
  type: TYPE_IMG
- en: User generated image
  prefs: []
  type: TYPE_NORMAL
- en: We can see the suggestion is to move budget from digital channels to TV. But
    what is the impact on sales?
  prefs: []
  type: TYPE_NORMAL
- en: To calculate the contribution of the optimal spend we need to feed in the new
    spend value per channel plus any other variables in the model. We only have demand,
    so we feed in the mean value from the recent period for this. We will also calculate
    the contribution of the average spend in the same way.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: '![User generated image](../Images/d2d693db2c4576d8c19ff235e2f1c899.png)'
  prefs: []
  type: TYPE_IMG
- en: User generated image
  prefs: []
  type: TYPE_NORMAL
- en: The optimal spend gives us a 6% increase in sales! That’s impressive especially
    given we have fixed the overall budget!
  prefs: []
  type: TYPE_NORMAL
- en: Closing thoughts
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Today we have seen how powerful budget optimisation can be. It can help organisations
    with monthly/quarterly/yearly budget planning and forecasting. As always the key
    to making good recommendations comes back to having a robust, well calibrated
    model.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: I hope you enjoyed the third instalment! That’s it for this series on mastering
    MMM. However, stay tuned if you want to learn about the complex topic of measuring
    long-term brand building effects!
  prefs: []
