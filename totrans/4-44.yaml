- en: What is this series about?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Welcome to part 3 of my series on marketing mix modelling (MMM), a hands-on
    guide to help you master MMM. Throughout this series, we’ll cover key topics such
    as model training, validation, calibration and budget optimisation, all using
    the powerful **pymc-marketing** python package. Whether you’re new to MMM or looking
    to sharpen your skills, this series will equip you with practical tools and insights
    to improve your marketing strategies.
  prefs: []
  type: TYPE_NORMAL
- en: 'If you missed part 2 check it out here:'
  prefs: []
  type: TYPE_NORMAL
- en: '[**Calibrating Marketing Mix Models In Python**](https://towardsdatascience.com/calibrating-marketing-mix-models-in-python-49dce1a5b33d)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Introduction
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In the third instalment of the series we are going to cover how we can start
    to get business value from our marketing mix models by covering the following
    areas:'
  prefs: []
  type: TYPE_NORMAL
- en: Why do organisations want to optimise their marketing budgets?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How can we use the outputs of our marketing mix model to optimise budgets?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A python walkthrough demonstrating how to optimise budgets using **pymc-marketing**.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The full notebook can be found here:'
  prefs: []
  type: TYPE_NORMAL
- en: '[**pymc_marketing/notebooks/3\. optimising budgets with marketing mix models
    (MMM) in python.ipynb at…**](https://github.com/raz1470/pymc_marketing/blob/main/notebooks/3.%20optimising%20budgets%20with%20marketing%20mix%20models%20(MMM)%20in%20python.ipynb)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 1.0 Why do organisations want to optimise their marketing budgets?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![User generated image](../Images/39f01545d5e71b50a75f2ab8cadcd7da.png)'
  prefs: []
  type: TYPE_IMG
- en: User generated image
  prefs: []
  type: TYPE_NORMAL
- en: 'This famous quote (from John Wanamaker I think?!) illustrates both the challenge
    and opportunity in marketing. While modern analytics have come a long way, the
    challenge remains relevant: understanding which parts of your marketing budget
    deliver value.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Marketing channels can vary significantly in terms of their performance and
    ROI due to several factors:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Audience Reach and Engagement –** Some channels are more effective at reaching
    specific prospects aligned to your target audience.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Cost of Acquisition –** The cost of reaching prospects differs between channels.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Channel Saturation –** Overuse of a marketing channel can lead to diminishing
    returns.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'This variability creates the opportunity to ask critical questions that can
    transform your marketing strategy:'
  prefs: []
  type: TYPE_NORMAL
- en: '![User generated image](../Images/1299df268b4bcabff2b2a986026a026e.png)'
  prefs: []
  type: TYPE_IMG
- en: User generated image
  prefs: []
  type: TYPE_NORMAL
- en: Effective budget optimisation is a critical component of modern marketing strategies.
    By leveraging the outputs of MMM, businesses can make informed decisions about
    where to allocate their resources for maximum impact. MMM provides insights into
    how various channels contribute to overall sales, allowing us to identify opportunities
    for improvement and optimisation. In the following sections, we will explore how
    we can translate MMM outputs into actionable budget allocation strategies.
  prefs: []
  type: TYPE_NORMAL
- en: 2.1 Response curves
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A response curve can translate the outputs of MMM into a comprehensive form,
    showing how sales responds to spend for each marketing channel.
  prefs: []
  type: TYPE_NORMAL
- en: '![User generated image](../Images/e7d97302bc3a49fc984f87840cf29a3b.png)'
  prefs: []
  type: TYPE_IMG
- en: User generated image
  prefs: []
  type: TYPE_NORMAL
- en: Response curves alone are very powerful, allowing us to run what-if scenarios.
    Using the response curve above as an example, we could estimate how the sales
    contribution from social changes as we spend more. We can also visually see where
    diminishing returns starts to take effect. But what if we want to try and answer
    more complex what-if scenarios like optimising channel level budgets given a fixed
    overall budget? This is where linear programming comes in – Let’s explore this
    in the next section!
  prefs: []
  type: TYPE_NORMAL
- en: 2.2 Linear programming
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Linear programming is an optimisation method which can be used to find the optimal
    solution of a linear function given some constraints. It’s a very versatile tool
    from the operations research area but doesn’t often get the recognition it deserves.
    It is used to solve scheduling, transportation and resource allocation problems.
    We are going to explore how we can use it to optimise marketing budgets.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s try and understand linear programming with a simple budget optimisation
    problem:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Decision variables (x):** These are the unknown quantities which we want
    to estimate optimal values for e.g. The marketing spend on each channel.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Objective function (Z):** The linear equation we are trying to minimise or
    maximise e.g. Maximising the sum of the sales contribution from each channel.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Constraints:** Some restrictions on the decision variables, usually represented
    by linear inequalities e.g. Total marketing budget is equal to £50m, Channel level
    budgets between £5m and £15m.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![User generated image](../Images/79e3bb60a345213ec18449259f93d6ab.png)'
  prefs: []
  type: TYPE_IMG
- en: User generated image
  prefs: []
  type: TYPE_NORMAL
- en: The intersection of all constraints forms a feasible region, which is the set
    of all possible solutions that satisfy the given constraints. The goal of linear
    programming is to find the point within the feasible region that optimises the
    objective function.
  prefs: []
  type: TYPE_NORMAL
- en: Given the saturation transformation we apply to each marketing channel, optimising
    channel level budgets is actually a non-linear programming problem. Sequential
    Least Squares Programming (SLSQP) is an algorithm used for solving non-linear
    programming problems. It allows for both equality and inequality constraints making
    it a sensible choice for our use case.
  prefs: []
  type: TYPE_NORMAL
- en: '**Equality constraints** e.g. Total marketing budget is equal to £50m'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Inequality constraints** e.g. Channel level budgets between £5m and £15m'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'SciPy have a great implementation of SLSQP:'
  prefs: []
  type: TYPE_NORMAL
- en: '[**Optimization (scipy.optimize) – SciPy v1.14.1 Manual**](https://docs.scipy.org/doc/scipy/tutorial/optimize.html)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'The example below illustrates how we could use it:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Writing budget optimisation code from scratch is a complex but very rewarding
    exercise. Fortunately, the **pymc-marketing** team has done the heavy lifting,
    providing a robust framework for running budget optimisation scenarios. In the
    next section, we’ll explore how their package can streamline the budget allocation
    process and make it more accessible to analysts.
  prefs: []
  type: TYPE_NORMAL
- en: 3.0 Python walkthrough
