- en: 'Automating Deep Learning: A Gentle Introduction to AutoKeras and Keras Tuner'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 自动化深度学习：AutoKeras和Keras Tuner的温和介绍
- en: 原文：[https://towardsdatascience.com/automating-deep-learning-a-gentle-introduction-to-autokeras-and-keras-tuner/](https://towardsdatascience.com/automating-deep-learning-a-gentle-introduction-to-autokeras-and-keras-tuner/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/automating-deep-learning-a-gentle-introduction-to-autokeras-and-keras-tuner/](https://towardsdatascience.com/automating-deep-learning-a-gentle-introduction-to-autokeras-and-keras-tuner/)
- en: Deep learning has revolutionized machine learning. But designing the right neural
    network — layers, neurons, activation functions, optimizers — can feel like an
    endless experiment. Wouldn’t it be nice if someone did the heavy lifting for you?
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习已经彻底改变了机器学习。但设计正确的神经网络——层、神经元、激活函数、优化器——可能感觉像是一场无休止的实验。如果有人为你做这些繁重的工作，那岂不是很好？
- en: That’s exactly what AutoML for deep learning aims to solve.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 这正是深度学习自动化机器学习（AutoML）旨在解决的问题。
- en: 'In this article, I’ll introduce you to two powerful yet approachable tools
    for automating deep learning: AutoKeras and Keras Tuner. We will deep dive into
    these libraries and do some hands-on model building.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我将向你介绍两个用于自动化深度学习的强大且易于使用的工具：AutoKeras和Keras Tuner。我们将深入探讨这些库，并进行一些动手模型构建。
- en: Why automate deep learning?
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么自动化深度学习？
- en: 'Deep learning model design and hyperparameter tuning are resource-intensive.
    It’s easy to:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 深度学习模型设计和超参数调整是资源密集型的。很容易：
- en: Overfit by using too many parameters.
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用过多的参数导致过拟合。
- en: Waste time testing architectures manually.
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 浪费时间手动测试架构。
- en: Miss better-performing configurations.
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 错过更好的配置。
- en: AutoML tools remove much of the guesswork by automating architecture search
    and tuning.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 自动化机器学习工具通过自动化架构搜索和调整来减少许多猜测工作。
- en: How do these libraries work?
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 这些库是如何工作的？
- en: AutoKeras
  id: totrans-12
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: AutoKeras
- en: AutoKeras leverages Neural Architecture Search (NAS) techniques behind the scenes.
    It uses a trial-and-error approach powered by Keras Tuner under the hood to test
    different configurations. Once a good candidate is found, it trains it to convergence
    and evaluates.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: AutoKeras在幕后利用了神经架构搜索（NAS）技术。它使用Keras Tuner背后的试错方法来测试不同的配置。一旦找到一个好的候选模型，它就会对其进行训练直到收敛并评估。
- en: Keras Tuner
  id: totrans-14
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Keras Tuner
- en: Keras Tuner is focused on hyperparameter optimization. You define the search
    space (e.g., number of layers, number of units, learning rates), and it uses optimization
    algorithms (random search, Bayesian optimization, Hyperband) to find the best
    configuration.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: Keras Tuner专注于超参数优化。你定义搜索空间（例如，层数、单元数、学习率），然后它使用优化算法（随机搜索、贝叶斯优化、Hyperband）来找到最佳配置。
- en: Installing required libraries
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 安装所需库
- en: Installing these libraries is quite easy; we just need to use pip. We can run
    the command below in the Jupyter notebook to install both libraries.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 安装这些库相当简单；我们只需要使用pip。我们可以在Jupyter笔记本中运行以下命令来安装这两个库。
- en: '[PRE0]'
  id: totrans-18
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'AutoKeras: End-to-end automated deep learning'
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: AutoKeras：端到端自动深度学习
- en: 'AutoKeras is a high-level library built on top of TensorFlow and Keras. It
    automates:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: AutoKeras是一个建立在TensorFlow和Keras之上的高级库。它自动化：
- en: Neural architecture search (NAS)
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 神经架构搜索（NAS）
- en: Hyperparameter tuning
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 超参数调整
- en: Model training
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模型训练
- en: With just a few lines of code, you can train deep learning models for images,
    text, tabular, and time-series data.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 只需几行代码，你就可以训练用于图像、文本、表格和时间序列数据的深度学习模型。
- en: Creating the model
  id: totrans-25
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建模型
- en: For this article, we will work on image classification. We will load the MNIST
    dataset using Tensorflow Datasets. This dataset is freely available on Tensorflow,
    you can check it out [here](https://www.tensorflow.org/datasets/catalog/overview#all_datasets),
    and then we will use the ImageClassifier of Autokeras.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这篇文章，我们将专注于图像分类。我们将使用Tensorflow Datasets加载MNIST数据集。这个数据集在Tensorflow上是免费可用的，你可以在这里查看[它](https://www.tensorflow.org/datasets/catalog/overview#all_datasets)，然后我们将使用AutoKeras的ImageClassifier。
- en: '[PRE1]'
  id: totrans-27
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '![Auto Keras Model Output](../Images/95fb821dc0618747a965bc001920e59a.png)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
  zh: '![Auto Keras 模型输出](../Images/95fb821dc0618747a965bc001920e59a.png)'
- en: We can see in the output screenshot that it took 42 minutes for trial 2, and
    it will continue till 3 trials and then show us the best model with parameters.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以在输出屏幕截图中看到，试验2花费了42分钟，它将继续进行到3次试验，然后显示具有参数的最佳模型。
- en: 'Keras Tuner: Flexible hyperparameter optimization'
  id: totrans-30
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Keras Tuner：灵活的超参数优化
- en: Keras Tuner, developed by the TensorFlow team, is a hyperparameter optimization
    library. Unlike AutoKeras, it doesn’t design architectures from scratch — instead,
    it tunes the hyperparameters of the architecture you define.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 由TensorFlow团队开发的Keras Tuner是一个超参数优化库。与AutoKeras不同，它不是从头开始设计架构——相反，它调整你定义的架构的超参数。
- en: Creating the model
  id: totrans-32
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建模型
- en: Unlike Auto Keras, here we will have to create the entire model. We will use
    the same Mnist Image Dataset and create a CNN image classifier model.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 与Auto Keras不同，在这里我们不得不创建整个模型。我们将使用相同的Mnist图像数据集并创建一个CNN图像分类器模型。
- en: '[PRE2]'
  id: totrans-34
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '![Keras Tuner Output](../Images/4efa1371d37f84b11e9c2e57f1bcb914.png)'
  id: totrans-35
  prefs: []
  type: TYPE_IMG
  zh: '![Keras Tuner输出](../Images/4efa1371d37f84b11e9c2e57f1bcb914.png)'
- en: So, in the output, we can clearly see that trial 21 completed in 22 seconds
    with a validation accuracy of ~97.29% and the model also keeps the best accuracy
    which is ~97.93%.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，在输出中，我们可以清楚地看到试验21在22秒内完成，验证准确率约为97.29%，并且模型也保持了最佳准确率，约为97.93%。
- en: To find out the best model, we can run the commands given below.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 要找出最佳模型，我们可以运行以下命令。
- en: '[PRE3]'
  id: totrans-38
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '![Best Model](../Images/1e3c5dd4edf49bcf6083a033deffc94c.png)'
  id: totrans-39
  prefs: []
  type: TYPE_IMG
  zh: '![最佳模型](../Images/1e3c5dd4edf49bcf6083a033deffc94c.png)'
- en: We can also find out the Top 10 trials that Keras Tuner performed using the
    command below.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 我们也可以使用以下命令找出Keras Tuner执行的Top 10试验。
- en: '[PRE4]'
  id: totrans-41
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: '![Best Trials](../Images/446105a51bb2c26b990d7d4c4655d6cc.png)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![最佳试验](../Images/446105a51bb2c26b990d7d4c4655d6cc.png)'
- en: Real life use-case
  id: totrans-43
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 真实世界的应用案例
- en: An excellent example of how we can use both these libraries is A telecom company
    that wants to predict customer churn using structured customer data. Their data
    science team uses AutoKeras to quickly train a model on tabular features without
    writing complex architecture code. Later, they use Keras Tuner to fine-tune a
    custom neural network that includes domain knowledge features. This hybrid approach
    saves weeks of experimentation and improves model performance.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 我们如何使用这两个库的一个优秀例子是一家电信公司，它希望通过结构化客户数据预测客户流失。他们的数据科学团队使用AutoKeras快速在表格特征上训练模型，而无需编写复杂的架构代码。后来，他们使用Keras
    Tuner微调一个包含领域知识特征的定制神经网络。这种混合方法节省了数周的时间，并提高了模型性能。
- en: Conclusion
  id: totrans-45
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: Both AutoKeras and Keras Tuner make deep learning more accessible and efficient.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: AutoKeras和Keras Tuner都使深度学习更加易于访问和高效。
- en: Use AutoKeras when you want a quick, end-to-end model without worrying about
    architecture. Use Keras Tuner when you already have a good idea of your architecture
    but want to squeeze out the best performance through hyperparameter tuning.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 当你想快速构建端到端模型而不必担心架构时，请使用AutoKeras。当你已经对架构有很好的了解，但想通过超参数调整来榨取最佳性能时，请使用Keras Tuner。
- en: Automating parts of deep learning frees you up to focus on understanding your
    data and interpreting results, which is where the real value lies.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 自动化深度学习的部分工作可以让你有更多时间专注于理解你的数据并解读结果，这正是真正的价值所在。
