- en: 'Data Science: From School to Work, Part III'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/data-science-from-school-to-work-part-iii/](https://towardsdatascience.com/data-science-from-school-to-work-part-iii/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Introduction**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Writing code is about solving problems, but not every problem is predictable.
    In the real world, your software will encounter unexpected situations: missing
    files, invalid user inputs, network timeouts, or even hardware failures. This
    is why handling errors isn’t just a nice-to-have; it’s a critical part of building
    robust and reliable applications for production.'
  prefs: []
  type: TYPE_NORMAL
- en: Imagine an e-commerce website. A customer places an order, but during the checkout
    process, a database connection issue occurs. Without proper error handling, this
    issue could cause the application to crash, leaving the customer frustrated and
    the transaction incomplete. Worse, it might create inconsistent data, leading
    to even bigger problems down the line. Thus, error handling is a fundamental skill
    for any Python developer who wants to write code for production.
  prefs: []
  type: TYPE_NORMAL
- en: However, good error handling also goes hand in hand with a good logging system.
    It’s rare to have access to the console when the code is running in production.
    So there’s no chance of your print being seen by anyone. To ensure that you can
    monitor your application and investigate any incidents, you need to set up a logging
    system. This is where the [loguru](https://loguru.readthedocs.io/en/stable/api/logger.html)
    package comes into play, which I will introduce in this article.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '**I – How to handle Python errors?**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this part I present the best practices of error handling in Python, from
    try-except blocks and the use of `raise` to the `finally`statement. These concepts
    will help you write cleaner, more maintainable code that is suitable for a production
    environment.
  prefs: []
  type: TYPE_NORMAL
- en: '**The** ***try-expect*** **blocks**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The try-except block is the main tool for handling errors in Python. It allows
    you to catch potential errors during code execution and prevent the program from
    crashing.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: In this trivial function, the try-except block allows the error caused by a
    division by 0 to be intercepted. The code in the try block is executed, and if
    an error occurs, the except block checks whether it is a `ZeroDivisionError` and
    print a message. But only this type of error is caught. For example, if *b* is
    a string, an error occurs. To avoid this, you can add a `TypeError`. So, it is
    important to test all possible errors.
  prefs: []
  type: TYPE_NORMAL
- en: 'The function becomes:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: '**Raise an exception**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: You can use the raise statement to manually raise an exception. This is useful
    if you want to report a user-defined error or impose a specific restriction on
    your code.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: 'In this example, a `ValueError` exception is triggered if the divisor is zero.
    In this way, you can explicitly control the error conditions. In the print function,
    the message will be “*Error: Only Chuck Norris can divide by 0!*“.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Some of the most common exceptions**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**ValueError**: The type of a value is correct but its value is invalid.'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: '**KeyError**: Trying to access a key that doesn’t exist in a dictionary.'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: '**IndexError**: Trying to access a non-existent index in a list.'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: '**TypeError**: Performing an operation on incompatible types.'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: '**FileNotFoundError**: Trying to open a non-existing file.'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: '**Custom Error**: You can trigger predefined exceptions or also define your
    own exception classes:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: '**Clean with the** ***finally*** **statement**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The `finally` block is executed in every case, regardless of whether the error
    has occurred or not. It is often used to perform cleanup actions, such as closing
    a connection to a database or releasing resources.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: '**Best practices for error handling**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**Catch specific exceptions**: Avoid using a generic except block without specifying
    an exception, as it may mask unexpected errors. Prefer specifying the exception:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: '**Provide explicit messages**: Add clear and descriptive messages when raising
    or handling exceptions.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Avoid silent failures**: If you catch an exception, ensure it is logged or
    re-raised so it doesn’t go unnoticed.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: '**Use** `else` **and** `finally` **blocks**: The `else` block runs only if
    no exception is raised in the `try` block.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '**II – How to handle Python logs?**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Good error-handling is one thing, but if no one knows that an error has occurred,
    the whole point is lost. As explained in the introduction, the monitor is rarely
    consulted or even seen when a program is running in production. No one will see
    print. Therefore, good error handling must be accompanied by a good logging system.
  prefs: []
  type: TYPE_NORMAL
- en: '**What are logs?**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Logs are records of messages generated by a program to track the events that
    occur during its execution. These messages may contain information about errors,
    warnings, successful actions, process milestones or other relevant events. Logs
    are essential for debugging, tracking performance and monitoring the health of
    an application. They allow developers to understand what is going on in a program
    without having to interrupt its execution, making it easier to solve problems
    and continuously improve the software.
  prefs: []
  type: TYPE_NORMAL
- en: '**The loguru package**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Python already has a native logging package: logging. But we prefer the loguru
    package, which is much simpler to use and easier to configure. In fact, complete
    output formatting is already preconfigured.'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/7fd678d548c577d55c42b2afaf684772.png)'
  prefs: []
  type: TYPE_IMG
- en: Image from author.
  prefs: []
  type: TYPE_NORMAL
- en: 'All the important elements are included directly in the message:'
  prefs: []
  type: TYPE_NORMAL
- en: Time stamp
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Log level, indicating the seriousness of the message.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: File location, module and line number. In this example, the file location is
    __main__ because it was executed directly from the command line. The module is
    <module> due to the fact that the log is not located in a class or function.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The message.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**The different logging levels**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'There are several log levels to take into account the importance of the message
    displayed (which is more complicated in a print). Each level has a name and an
    associated number:'
  prefs: []
  type: TYPE_NORMAL
- en: '**TRACE** (5): used to record detailed information on the program’s execution
    path for diagnostic purposes.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**DEBUG** (10): used by developers to record messages for debugging purposes.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**INFO** (20): used to record information messages describing normal program
    operation.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**SUCCESS** (25): similar to INFO, but used to indicate the success of an operation.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**WARNING** (30): used to indicate an unusual event that may require further
    investigation.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**ERROR** (40): used to record error conditions that have affected a specific
    operation.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**CRITICAL** (50): used to record error conditions that prevent a main function
    from working.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The package naturally handles different formatting depending on the level used
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/7ac76b828d285bb9cc8dc0b5b59bbd2c.png)'
  prefs: []
  type: TYPE_IMG
- en: Image from author.
  prefs: []
  type: TYPE_NORMAL
- en: The trace message was not displayed because the default minimum level used by
    loguru is debug. It therefore ignores all messages at lower levels.
  prefs: []
  type: TYPE_NORMAL
- en: It is possible to define new log levels with the level method and is used with
    the log method
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: 'name : the name of the log level.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'no : the corresponding severity value (must be an integer).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'color : color markup.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'icon : the level icon.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**The logger configuration**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'It is possible to recreate a logger with a new configuration by deleting the
    old one with the `remove` command and generating a new logger with a new configuration
    with the `add` function. This function takes the following arguments:'
  prefs: []
  type: TYPE_NORMAL
- en: '**sink [mandatory]**: specifies a target for each data set created by the logger.
    By default, this value is set to `sys.stderr` (which corresponds to the standard
    error output).  We can also store all output in a “.log” file (except if you have
    a log collector).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**level**: Sets the minimum logging level for the recorder.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**format**: is useful to define a custom format for your logs. To maintain
    the coloring of the logs in the terminal, this must be specified (see example
    below).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**filter**: is used to determine whether a log should be recorded or not.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**colorize**: takes a boolean value and determines whether the terminal coloring
    should be activated or not.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**serialize**: causes the log to be displayed in JSON format if it is set to
    `True`.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**backtrace**: determines whether the exception trace should go beyond the
    point at which the error was recorded in order to facilitate troubleshooting.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**diagnose**: Determines whether variable values should be displayed in the
    exception trace. This option must be set to `False` in production environments
    so that no sensitive information is leaked.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**enqueue**: If this option is activated, the log data records are placed in
    a queue to avoid conflicts if several processes connect to the same target.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**catch**: If an unexpected error occurs when connecting to the server specified
    sink, you can detect it by setting this option to `True`. The error will be displayed
    in the standard error.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: '**Note**:'
  prefs: []
  type: TYPE_NORMAL
- en: Colors disappear in a file. This is because there are special characters (called
    **ansi** codes) that display colors in the terminal, but this formatting does
    not exist in the files.
  prefs: []
  type: TYPE_NORMAL
- en: '**Add context to logs**'
  prefs: []
  type: TYPE_NORMAL
- en: For complex applications, it can be useful to add further information to the
    logs to enable sorting and facilitate troubleshooting.
  prefs: []
  type: TYPE_NORMAL
- en: For example, if a user changes a database, it can be useful to have the user
    ID in addition to the change information.
  prefs: []
  type: TYPE_NORMAL
- en: Before you start recording context data, you need to make sure that the `{extra}`
    directive is included in your custom format. This variable is a Python dictionary
    that contains context data for each log entry (if applicable).
  prefs: []
  type: TYPE_NORMAL
- en: Here is an example of a customization where an extra `user_id` is added. In
    this format, the colors.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: It is now possible to use the bind method to create a child logger inheriting
    all the data from the parent logger.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/62ab9ca8d41d91da58199483d32e9546.png)'
  prefs: []
  type: TYPE_IMG
- en: Image from author.
  prefs: []
  type: TYPE_NORMAL
- en: Another way to do this is to use the contextualize method in a with block.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE19]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/1e6e90b01cda0674b8ade887b215df32.png)'
  prefs: []
  type: TYPE_IMG
- en: Image from author.
  prefs: []
  type: TYPE_NORMAL
- en: Instead of the with block, you can use a **decorator**. The preceding code then
    becomes
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE20]'
  prefs: []
  type: TYPE_PRE
- en: '**The catch method**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Errors can be automatically logged when they occur using the catch method.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE21]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/d6994c9cd498fa5594fd86408c54d8ae.png)'
  prefs: []
  type: TYPE_IMG
- en: Image from author.
  prefs: []
  type: TYPE_NORMAL
- en: But it’s simpler to use this method as a decorator. This results in the following
    code
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE22]'
  prefs: []
  type: TYPE_PRE
- en: '**The log file**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A production application is designed to run continuously and uninterrupted.
    In some cases, it is important to predict the behavior of the file, otherwise
    you will have to consult pages of logs in the event of an error.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are the different conditions under which a file can be modified:'
  prefs: []
  type: TYPE_NORMAL
- en: '**rotation**: specifies a condition under which the current log file is closed
    and a new file is created. This condition can be an int, a datetime or a str.
    Str is recommended as it is easier to read.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**retention**: specifies how long each log file should be kept before it is
    deleted from the file system.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**compression**: The log file is converted to the specified compression format
    if this option is activated.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**delay**: If this option is set to True, the creation of a new log file is
    delayed until the first log message has been pushed.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**mode**, **buffering**, **encoding** : Parameters that are passed to the Python
    function open and determine how Python opens log files.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Note**:'
  prefs: []
  type: TYPE_NORMAL
- en: Usually, in the case of a production application, a log collector will be set
    up to retrieve the app’s outputs directly. **It is therefore not necessary to
    create a log file.**
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '**Conclusion**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Error handling in Python is an important step in writing professional and reliable
    code. By combining try-except blocks, the raise statement, and the finally block,
    you can handle errors predictably while maintaining readable and maintainable
    code.
  prefs: []
  type: TYPE_NORMAL
- en: Moreover, a good logging system improves the ability to monitor and debug your
    application. Loguru provides a simple and flexible package for logging messages
    and can therefore be easily integrated into your codebase.
  prefs: []
  type: TYPE_NORMAL
- en: In summary, combining effective error handling with a comprehensive logging
    system can significantly improve the reliability, maintainability, and debugging
    capability of your Python applications.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
