- en: '* * *'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Large language models power more and more tools we encounter in our daily lives,
    but [their growing footprint](https://towardsdatascience.com/category/large-language-models/?utm_source=newsletter&utm_medium=email&utm_campaign=tds+variable) has
    often come with clear downsides—from dead-end chats with AI support agents to
    questionable (if not downright dangerous) advice.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 大型语言模型正在推动我们日常生活中遇到的越来越多工具，但它们的日益增长的影响往往伴随着明显的缺点——从与AI支持代理的僵化对话到可疑（如果不是直接危险）的建议。
- en: In this week’s Variable, we zoom in on three use cases where the gap between
    LLMs’ potential and the results they produce appears to have significantly shrunk.
    From fashion to document ingestion, we look at the inner workings of models in
    action, and learn about the work it takes to harness their power effectively.
    Let’s dive in!
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 在本周的Variable中，我们聚焦于三个用例，在这些用例中，LLM的潜力与它们产生的结果之间的差距似乎已经显著缩小。从时尚到文档摄入，我们探讨了模型在实际操作中的内部机制，并了解了有效利用它们力量的工作。让我们深入探讨吧！
- en: Overcome Failing Document Ingestion & RAG Strategies with Agentic Knowledge
    Distillation
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 通过代理知识蒸馏克服失败的文档摄入和RAG策略
- en: '[Tula Masterman](https://towardsdatascience.com/author/tula-masterman/) and
    her team tackle a common problem for practitioners across industries: low rates
    of success in ingesting documents using machine learning techniques. Learn about
    their innovative solution, which combines an agentic approach with a multi-tiered
    pyramid of information.'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: '[Tula Masterman](https://towardsdatascience.com/author/tula-masterman/)及其团队解决了一个跨行业从业者普遍面临的问题：使用机器学习技术处理文档的成功率低。了解他们的创新解决方案，该方案结合了代理方法与多层次的信息金字塔。'
- en: '[Overcome Failing Document Ingestion & RAG Strategies with Agentic Knowledge
    Distillation](https://towardsdatascience.com/overcome-failing-document-ingestion-rag-strategies-with-agentic-knowledge-distillation/)'
  id: totrans-10
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[通过代理知识蒸馏克服失败的文档摄入和RAG策略](https://towardsdatascience.com/overcome-failing-document-ingestion-rag-strategies-with-agentic-knowledge-distillation/)'
- en: Using GPT-4 for Personal Styling
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用 GPT-4 进行个人造型
- en: Don’t miss this highly engaging project walkthrough, by [Arielle Caron](https://towardsdatascience.com/author/ariellercaron/),
    on the process of using an LLM to turn a messy closet into a “curated wonderland.”
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 不要错过由[Arielle Caron](https://towardsdatascience.com/author/ariellercaron/)进行的项目演练，她讲述了使用LLM将杂乱的壁橱变成“精心挑选的奇迹之地”的过程。
- en: '[Using GPT-4 for Personal Styling](https://towardsdatascience.com/using-gpt-4-for-personal-styling/)'
  id: totrans-13
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[使用 GPT-4 进行个人造型](https://towardsdatascience.com/using-gpt-4-for-personal-styling/)'
- en: 'Deep Research by OpenAI: A Practical Test of AI-Powered Literature Review'
  id: totrans-14
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: OpenAI的深度研究：AI驱动文献综述的实用测试
- en: Could an AI tool convincingly eclipse human research skills? [Sarah Lea](https://towardsdatascience.com/author/schuerch_sarah/) presents
    a balanced perspective on Deep Research.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能工具能否令人信服地超越人类研究技能？[Sarah Lea](https://towardsdatascience.com/author/schuerch_sarah/)对深度研究提出了平衡的观点。
- en: '[Deep Research by OpenAI: A Practical Test of AI-Powered Literature Review](https://towardsdatascience.com/deep-research-by-openai-a-practical-test-of-ai-powered-literature-review/)'
  id: totrans-16
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[OpenAI的深度研究：AI驱动文献综述的实用测试](https://towardsdatascience.com/deep-research-by-openai-a-practical-test-of-ai-powered-literature-review/)'
- en: Other Recommended Reads
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 其他推荐阅读
- en: 'Randomness and determinism, image captioning, data science one-on-ones: the
    standout articles we chose for you this week cover a wide range of timely topics
    with depth and nuance.'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 随机性与决定论、图像标题、数据科学一对一：本周我们为您精选的突出文章涵盖了广泛且深入的话题。
- en: To help data professionals create informative and trustworthy charts, [Murtaza
    Ali](https://towardsdatascience.com/author/murtaza5152-ali/) outlines [the risky
    practices you should avoid](https://towardsdatascience.com/the-dangers-of-deceptive-data-confusing-charts-and-misleading-headlines/).
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为了帮助数据专业人士创建信息丰富且值得信赖的图表，[Murtaza Ali](https://towardsdatascience.com/author/murtaza5152-ali/)
    概述了应避免的风险做法。
- en: '[The Dangers of Deceptive Data–Confusing Charts and Misleading Headlines](https://towardsdatascience.com/the-dangers-of-deceptive-data-confusing-charts-and-misleading-headlines/)'
  id: totrans-20
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[The Dangers of Deceptive Data–Confusing Charts and Misleading Headlines](https://towardsdatascience.com/the-dangers-of-deceptive-data-confusing-charts-and-misleading-headlines/)'
- en: How can you [make the most of your 1:1s](https://towardsdatascience.com/mastering-11s-as-a-data-scientist-from-status-updates-to-career-growth/) as
    a data scientist? [Yu dong](https://towardsdatascience.com/author/ydong029/) unpacks
    the steps you can take to maximize their value for your career.
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 作为数据科学家，你如何才能最大化你的 1:1 会议的价值？[Yu dong](https://towardsdatascience.com/author/ydong029/)
    解析了你可以采取的步骤，以最大化其对你的职业价值。
- en: '[Mastering 1:1s as a Data Scientist: From Status Updates to Career Growth](https://towardsdatascience.com/mastering-11s-as-a-data-scientist-from-status-updates-to-career-growth/)'
  id: totrans-22
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[Mastering 1:1s as a Data Scientist: From Status Updates to Career Growth](https://towardsdatascience.com/mastering-11s-as-a-data-scientist-from-status-updates-to-career-growth/)'
- en: 'Learn about [the sources of randomness in a model’s outputs](https://towardsdatascience.com/avoidable-and-unavoidable-randomness-in-gpt-4o/):
    a new deep dive by [Vincent Vatter](https://towardsdatascience.com/author/vatter/) explores
    this essential topic through the example of GPT-4o.'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 了解模型输出的随机性来源：[Vincent Vatter](https://towardsdatascience.com/author/vatter/)
    通过 GPT-4o 的例子对这一基本主题进行了新的深入探讨。
- en: '[Avoidable and Unavoidable Randomness in GPT-4o](https://towardsdatascience.com/avoidable-and-unavoidable-randomness-in-gpt-4o/)'
  id: totrans-24
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[Avoidable and Unavoidable Randomness in GPT-4o](https://towardsdatascience.com/avoidable-and-unavoidable-randomness-in-gpt-4o/)'
- en: For a comprehensive, [hands-on introduction to implementing image captioning](https://towardsdatascience.com/image-captioning-transformer-mode-on/) in
    PyTorch, follow along [Muhammad Ardi](https://towardsdatascience.com/author/muhammad_ardi/)‘s
    excellent guide.
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于在 PyTorch 中实现图像描述的全面、动手实践介绍，请跟随 [Muhammad Ardi](https://towardsdatascience.com/author/muhammad_ardi/)
    的优秀指南。
- en: '[Image Captioning, Transformer Mode On](https://towardsdatascience.com/image-captioning-transformer-mode-on/)'
  id: totrans-26
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[Image Captioning, Transformer Mode On](https://towardsdatascience.com/image-captioning-transformer-mode-on/)'
- en: Career transitions are never easy; [Marina Wyss](https://towardsdatascience.com/author/gratitudedriven/) provides
    pragmatic advice and resources for [making the switch from data analyst to data
    scientist](https://towardsdatascience.com/how-to-switch-from-data-analyst-to-data-scientist/).
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 职业转换从来都不容易；[Marina Wyss](https://towardsdatascience.com/author/gratitudedriven/)
    提供了从数据分析师转向数据科学家的实用建议和资源。
- en: '[How to Switch from Data Analyst to Data Scientist](https://towardsdatascience.com/how-to-switch-from-data-analyst-to-data-scientist/)'
  id: totrans-28
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[How to Switch from Data Analyst to Data Scientist](https://towardsdatascience.com/how-to-switch-from-data-analyst-to-data-scientist/)'
- en: Meet Our New Authors
  id: totrans-29
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 认识我们的新作者
- en: 'Explore top-notch work from some of our recently added contributors:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
