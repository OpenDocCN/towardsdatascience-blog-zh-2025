- en: '[Junior Jumbong](https://towardsdatascience.com/author/jumbongjunior1999/)‘s
    debut TDS article leveraged his data analytics and research experience for exploring
    sources of spurious regression in time series analyses.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Linear Regression in Time Series: Sources of Spurious Regression](https://towardsdatascience.com/linear-regression-in-time-series-sources-of-spurious-regression/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[Eric Chung](https://towardsdatascience.com/author/eric-chung/) took us on
    an enlightening journey through his recent object-detection project, which integrated
    cutting-edge technology to create an enhanced dog-breed classifier.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[From Fuzzy to Precise: How a Morphological Feature Extractor Enhances AI’s
    Recognition Capabilities](https://towardsdatascience.com/from-fuzzy-to-precise-how-a-morphological-feature-extractor-enhances-ais-recognition-capabilities-2/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[Argo Saakyan](https://towardsdatascience.com/author/argo-sa/), a seasoned
    computer vision engineer, also published on object detection in his recent article,
    where he examined several well-known pipelines and their customization potential.'
