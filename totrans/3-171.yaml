- en: '[Junior Jumbong](https://towardsdatascience.com/author/jumbongjunior1999/)‘s
    debut TDS article leveraged his data analytics and research experience for exploring
    sources of spurious regression in time series analyses.'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Junior Jumbong](https://towardsdatascience.com/author/jumbongjunior1999/)
    的首篇 TDS 文章利用他的数据分析和研究经验来探索时间序列分析中虚假回归的来源。'
- en: '[Linear Regression in Time Series: Sources of Spurious Regression](https://towardsdatascience.com/linear-regression-in-time-series-sources-of-spurious-regression/)'
  id: totrans-32
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[Linear Regression in Time Series: Sources of Spurious Regression](https://towardsdatascience.com/linear-regression-in-time-series-sources-of-spurious-regression/)'
- en: '[Eric Chung](https://towardsdatascience.com/author/eric-chung/) took us on
    an enlightening journey through his recent object-detection project, which integrated
    cutting-edge technology to create an enhanced dog-breed classifier.'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Eric Chung](https://towardsdatascience.com/author/eric-chung/) 带我们了解了他最近的对象检测项目，该项目整合了尖端技术以创建一个增强的狗品种分类器。'
- en: '[From Fuzzy to Precise: How a Morphological Feature Extractor Enhances AI’s
    Recognition Capabilities](https://towardsdatascience.com/from-fuzzy-to-precise-how-a-morphological-feature-extractor-enhances-ais-recognition-capabilities-2/)'
  id: totrans-34
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[从模糊到精确：形态特征提取器如何增强AI的识别能力](https://towardsdatascience.com/from-fuzzy-to-precise-how-a-morphological-feature-extractor-enhances-ais-recognition-capabilities-2/)'
- en: '[Argo Saakyan](https://towardsdatascience.com/author/argo-sa/), a seasoned
    computer vision engineer, also published on object detection in his recent article,
    where he examined several well-known pipelines and their customization potential.'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Argo Saakyan](https://towardsdatascience.com/author/argo-sa/)，一位经验丰富的计算机视觉工程师，也在他最近的文章中发表了关于目标检测的内容，其中他考察了几种知名流水线和它们的定制潜力。'
- en: '[Custom Training Pipeline for Object Detection Models](https://towardsdatascience.com/custom-training-pipeline-for-object-detection-models/)'
  id: totrans-36
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[针对目标检测模型的定制训练流水线](https://towardsdatascience.com/custom-training-pipeline-for-object-detection-models/)'
- en: Contribute to TDS
  id: totrans-37
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 贡献给TDS
- en: We love publishing articles from new authors, so if you’ve recently written
    an interesting project walkthrough, tutorial, or theoretical reflection on any
    of our core topics, why not [share it with us?](https://towardsdatascience.com/questions-96667b06af5/)
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 我们喜欢发布新作者的文章，所以如果你最近写了一个有趣的项目教程、教程或对我们核心主题的理论反思，为什么不 [与我们分享？](https://towardsdatascience.com/questions-96667b06af5/)
