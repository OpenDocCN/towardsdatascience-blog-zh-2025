  prefs: []
  type: TYPE_NORMAL
- en: available_tools = {"sql_check":tool_sql_check, "sql_exec":tool_sql_exec}
  prefs: []
  type: TYPE_NORMAL
- en: context = ''
  prefs: []
  type: TYPE_NORMAL
- en: 'while available_tools:'
  prefs: []
  type: TYPE_NORMAL
- en: agent_res = ollama.chat(model=llm, messages=messages_senior,
  prefs: []
  type: TYPE_NORMAL
- en: tools=[v for v in available_tools.values()])
  prefs: []
  type: TYPE_NORMAL
- en: dic_res = use_tool(agent_res, dic_tools)
  prefs: []
  type: TYPE_NORMAL
- en: res, tool_used, inputs_used = dic_res["res"], dic_res["tool_used"], dic_res["inputs_used"]
  prefs: []
  type: TYPE_NORMAL
- en: 'if tool_used:'
  prefs: []
  type: TYPE_NORMAL
- en: available_tools.pop(tool_used)
  prefs: []
  type: TYPE_NORMAL
- en: 'context = context + f"\nTool used: {tool_used}. Output: {res}" #->add tool
    usage context'
  prefs: []
  type: TYPE_NORMAL
- en: messages_senior.append( {"role":"user", "content":context} )
  prefs: []
  type: TYPE_NORMAL
- en: '### response'
  prefs: []
  type: TYPE_NORMAL
- en: print("🧓 >", f"\x1b[1;34m{res}\x1b[0m")
  prefs: []
  type: TYPE_NORMAL
- en: messages_senior.append( {"role":"assistant", "content":res} )
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE25]'
  prefs: []
  type: TYPE_PRE
- en: '### update Lead Agent'
  prefs: []
  type: TYPE_NORMAL
- en: 'context = "Senior agent returned this output: "+res'
  prefs: []
  type: TYPE_NORMAL
- en: print("👩‍💼 >", f"\x1b[1;30m{context}\x1b[0m")
  prefs: []
  type: TYPE_NORMAL
- en: messages_lead.append( {"role":"user", "content":context} )
  prefs: []
  type: TYPE_NORMAL
- en: '```'
  prefs: []
