  type: TYPE_NORMAL
- en: 'if agent_invoked == "senior":'
  prefs: []
  type: TYPE_NORMAL
- en: 'print("🧓 >", f"\x1b[1;34mReceived instructions: {instructions}\x1b[0m")'
