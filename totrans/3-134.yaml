- en: 'AI Agents from Scratch: Multi-Agent System'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 从零开始构建AI代理：多代理系统
- en: 原文：[https://towardsdatascience.com/ai-agents-from-zero-to-hero-part-3/](https://towardsdatascience.com/ai-agents-from-zero-to-hero-part-3/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/ai-agents-from-zero-to-hero-part-3/](https://towardsdatascience.com/ai-agents-from-zero-to-hero-part-3/)
- en: '**<mdspan datatext="el1743121445633" class="mdspan-comment">Intro</mdspan>**'
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**<mdspan datatext="el1743121445633" class="mdspan-comment">Intro</mdspan>**'
- en: In [Part 1](https://towardsdatascience.com/ai-agents-from-zero-to-hero-part-1/)
    of this tutorial series, we introduced **AI Agents**, autonomous programs that
    perform tasks, make decisions, and communicate with others.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在本教程系列的[第一部分](https://towardsdatascience.com/ai-agents-from-zero-to-hero-part-1/)中，我们介绍了**AI代理**，这些是执行任务、做出决策并与他人通信的自主程序。
- en: In [Part 2](https://towardsdatascience.com/ai-agents-from-zero-to-hero-part-2/)
    of this tutorial series, we understood how to make the Agent try and retry until
    the task is completed through **Iterations and Chains**.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在本教程系列的[第二部分](https://towardsdatascience.com/ai-agents-from-zero-to-hero-part-2/)中，我们了解了如何通过**迭代和链**使代理尝试并重试直到任务完成。
- en: 'A single Agent can usually operate effectively using a tool, but it can be
    less effective when using many tools simultaneously. One way to tackle complicated
    tasks is through a “divide-and-conquer” approach: create a specialized Agent for
    each task and have them work together as a **Multi-Agent System (MAS)**.'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 单个代理通常可以使用工具有效地操作，但在同时使用多个工具时可能效果较差。解决复杂任务的一种方法是通过“分而治之”的方法：为每个任务创建一个专门的代理，并让他们作为一个**多代理系统（MAS**）一起工作。
- en: 'In a MAS, multiple agents collaborate to achieve common goals, often tackling
    challenges that are too difficult for a single Agent to handle alone. There are
    two main ways they can interact:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在MAS中，多个代理协作以实现共同目标，通常解决单个代理单独难以应对的挑战。它们可以以两种主要方式交互：
- en: '**Sequential flow –** The Agents do their work in a specific order, one after
    the other. For example, Agent 1 finishes its task, and then Agent 2 uses the result
    to do its task. This is useful when tasks depend on each other and must be done
    step-by-step.'
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**顺序流程** **–** 代理按特定顺序执行工作，一个接一个。例如，代理1完成其任务，然后代理2使用结果来完成其任务。当任务相互依赖且必须按步骤完成时，这很有用。'
- en: '**Hierarchical flow** **–** Usually, one higher-level Agent manages the whole
    process and gives instructions to lower level Agents which focus on specific tasks.
    This is useful when the final output requires some back-and-forth.'
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**分层流程** **–** 通常，一个高级代理管理整个流程并向专注于特定任务的低级代理下达指令。当最终输出需要来回沟通时，这很有用。'
- en: In this tutorial, I’m going to show how to **build from scratch different types
    of Multi-Agent Systems**, from simple to more advanced. I will present some useful
    Python code that can be easily applied in other similar cases (just copy, paste,
    run) and walk through every line of code with comments so that you can replicate
    this example (link to full code at the end of the article).
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个教程中，我将展示如何从头开始构建不同类型的**多代理系统**，从简单到更高级。我将提供一些易于在其他类似情况下应用的Python代码（只需复制、粘贴、运行），并逐行带注释地解释代码，以便您可以复制此示例（文章末尾有完整代码的链接）。
- en: '**Setup**'
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**设置**'
- en: Please refer to [Part 1](https://towardsdatascience.com/ai-agents-from-zero-to-hero-part-1/)
    for the setup of [***Ollama***](https://ollama.com/) and the main LLM.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 请参阅[第一部分](https://towardsdatascience.com/ai-agents-from-zero-to-hero-part-1/)以了解[***Ollama***](https://ollama.com/)和主要LLM的设置。
- en: '[PRE0]'
  id: totrans-12
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: In this example, I will ask the model to process images, therefore I’m also
    going to need a **Vision LLM**. It is a specialized version of a Large Language
    Model that, integrating NLP with CV, is designed to understand visual inputs,
    such as images and videos, in addition to text.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，我将要求模型处理图像，因此我还需要一个**视觉LLM**。这是一个专门的大型语言模型版本，它将NLP与CV集成，旨在理解视觉输入，如图像和视频，以及文本。
- en: Microsoft’s [*LLaVa*](https://github.com/haotian-liu/LLaVA) is an efficient
    choice as it can also run without a GPU.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 微软的[*LLaVa*](https://github.com/haotian-liu/LLaVA)是一个高效的选择，因为它也可以在没有GPU的情况下运行。
- en: '![](../Images/3216444cd8f885e5ac090a90058c2447.png)'
  id: totrans-15
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/3216444cd8f885e5ac090a90058c2447.png)'
- en: After the download is completed, you can move on to Python and start writing
    code. Let’s load an image so that we can try out the Vision LLM.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 下载完成后，您可以继续使用Python并开始编写代码。让我们加载一张图片，以便我们可以尝试视觉LLM。
- en: '[PRE1]'
  id: totrans-17
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'In order to test the Vision LLM, you can just pass the image as an input:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 为了测试视觉LLM，你只需将图像作为输入传递：
- en: '[PRE2]'
  id: totrans-19
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '![](../Images/ab595a74b27144c50617e0db18852bcb.png)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/ab595a74b27144c50617e0db18852bcb.png)'
- en: '****Sequential**** **Multi-Agent System**'
  id: totrans-21
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '****顺序多代理系统****'
- en: I shall build two Agents that will work in a **sequential flow**, one after
    the other, where the second takes the output of the first as an input, just like
    a Chain.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 我将构建两个代理，它们将以 **顺序流程**工作，一个接一个，第二个代理将第一个代理的输出作为输入，就像一个链一样。
- en: '![](../Images/f744d3503623fd924a035ae9d75c84e3.png)'
  id: totrans-23
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/f744d3503623fd924a035ae9d75c84e3.png)'
- en: '**The first Agent** must process an image provided by the user and return a
    verbal description of what it sees.'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第一个代理**必须处理用户提供的图像，并返回其看到的口头描述。'
- en: '**The second Agent** will search the internet and try to understand where and
    when the picture was taken, based on the description provided by the first Agent.'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第二个代理**将根据第一个代理提供的描述在互联网上搜索，并尝试了解图片是在哪里和什么时候拍摄的。'
- en: Both Agents shall use one **Tool** each. The first Agent will have the Vision
    LLM as a Tool. Please remember that with *Ollama*, in order to use a Tool, the
    function must be described in a dictionary.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 两个代理各应使用一个 **工具**。第一个代理将使用视觉LLM作为工具。请记住，在使用 *Ollama* 时，为了使用工具，必须在字典中描述其功能。
- en: '[PRE3]'
  id: totrans-27
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'The second Agent should have a web-searching Tool. In the previous articles
    of this tutorial series, I showed how to leverage the *DuckDuckGo* package for
    searching the web. So, this time, we can use a new Tool: [*Wikipedia*](https://pypi.org/project/wikipedia/)
    (`pip install wikipedia==1.4.0`). You can directly use the original library or
    import the *LangChain* wrapper.'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 第二个代理应该有一个网络搜索工具。在本教程系列的先前文章中，我展示了如何利用 *DuckDuckGo* 包进行网络搜索。所以这次，我们可以使用一个新的工具：[*维基百科*](https://pypi.org/project/wikipedia/)
    (`pip install wikipedia==1.4.0`)。你可以直接使用原始库或导入 *LangChain* 包装器。
- en: '[PRE4]'
  id: totrans-29
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: '![](../Images/24f28e2a0b47f4454d6f6635ce487230.png)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/24f28e2a0b47f4454d6f6635ce487230.png)'
- en: First, you need to write a prompt to describe the task of each Agent (the more
    detailed, the better), and that will be the first message in the chat history
    with the LLM.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，你需要编写一个提示来描述每个代理的任务（越详细越好），这将是与LLM的聊天历史中的第一条消息。
- en: '[PRE5]'
  id: totrans-32
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'One important decision to make when building a MAS is whether the Agents should
    share the chat history or not. The **management of chat history** depends on the
    design and objectives of the system:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 在构建MAS时，一个重要的决定是代理是否应该共享聊天历史。**聊天历史的管理**取决于系统的设计和目标：
- en: '**Shared chat history –** Agents have access to a common conversation log,
    allowing them to see what other Agents have said or done in previous interactions.
    This can enhance the collaboration and the understanding of the overall context.'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**共享聊天历史** – 代理可以访问一个公共的对话日志，允许他们看到其他代理在之前的交互中说过或做过什么。这可以增强协作和对整体上下文的理解。'
- en: '**Separate chat history –** Agents only have access to their own interactions,
    focusing only on their own communication. This design is typically used when independent
    decision-making is important.'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**单独的聊天历史** – 代理只能访问他们自己的交互，专注于他们自己的沟通。这种设计通常用于独立决策很重要的情况。'
- en: I recommend keeping the chats separate unless it is necessary to do otherwise.
    LLMs might have a limited context window, so it’s better to make the history as
    lite as possible.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 我建议除非有必要，否则保持聊天内容分开。由于LLMs可能有一个有限的范围窗口，因此最好尽可能使历史记录保持轻量。
- en: '[PRE6]'
  id: totrans-37
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: For convenience, I shall use the function defined in the previous articles to
    process the model’s response.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 为了方便起见，我将使用之前文章中定义的函数来处理模型的响应。
- en: '[PRE7]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: As we already did in previous tutorials, the interaction with the Agents can
    be started with a *while loop*. The user is requested to provide an image that
    the first Agent will process.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我们在之前的教程中所做的那样，可以通过一个 *while循环* 来启动与代理的交互。用户被要求提供一个图像，第一个代理将对其进行处理。
- en: '[PRE8]'
  id: totrans-41
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: '![](../Images/ee48499b086515ae53bcc985eeaa503e.png)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/ee48499b086515ae53bcc985eeaa503e.png)'
- en: The first Agent used the Vision LLM Tool and recognized text within the image.
    Now, the description will be passed to the second Agent, which shall extract some
    keywords to search *Wikipedia*.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个代理使用了视觉LLM工具并在图像中识别了文本。现在，描述将被传递给第二个代理，该代理将提取一些关键词以搜索 *维基百科*。
- en: '[PRE9]'
  id: totrans-44
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: '![](../Images/8fd55642c0a2c05d181f4455be7f2cbc.png)'
  id: totrans-45
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/8fd55642c0a2c05d181f4455be7f2cbc.png)'
- en: The second Agent used the Tool and extracted information from the web, based
    on the description provided by the first Agent. Now, it can process everything
    and give a final answer.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 第二个代理使用了工具，并根据第一个代理提供的描述从网络上提取信息。现在，它可以处理所有信息并给出最终答案。
- en: '[PRE10]'
  id: totrans-47
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: '![](../Images/2ce4ad6fad2302acca5141e07ea1a36e.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/2ce4ad6fad2302acca5141e07ea1a36e.png)'
- en: This is literally perfect! Let’s move on to the next example.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 这简直是完美的！让我们继续下一个例子。
- en: '****Hierarchical** Multi-Agent System**'
  id: totrans-50
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '****分层多代理系统**'
- en: Imagine having a squad of Agents that operates with a **hierarchical flow,**
    just like a human team, with distinct roles to ensure smooth collaboration and
    efficient problem-solving. At the top, a manager oversees the overall strategy,
    talking to the customer (the user), making high-level decisions, and guiding the
    team toward the goal. Meanwhile, other team members handle operative tasks. Just
    like humans, Agents can work together and delegate tasks appropriately.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下拥有一支由代理组成的队伍，它们以**分层流程**运作，就像人类团队一样，具有不同的角色以确保顺畅的协作和高效的问题解决。在顶部，经理监督整体战略，与客户（用户）交谈，做出高级决策，并引导团队朝着目标前进。同时，其他团队成员处理操作任务。就像人类一样，代理可以一起工作并适当分配任务。
- en: '![](../Images/902fcf98fac54a13fa8601b31a4436ff.png)'
  id: totrans-52
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/902fcf98fac54a13fa8601b31a4436ff.png)'
- en: 'I shall build a tech team of 3 Agents with the objective of querying a SQL
    database per user’s request. They must work in a hierarchical flow:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 我将建立一个由3个代理组成的科技团队，目标是根据用户的请求查询SQL数据库。他们必须在分层流程中工作：
- en: '**The Lead Agent** talks to the user and understands the request. Then, it
    decides which team member is the most appropriate for the task.'
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**高级代理**与用户交谈并理解请求。然后，它决定哪个团队成员最适合这项任务。'
- en: '**The Junior Agent** has the job of exploring the db and building SQL queries.'
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**初级代理**负责探索数据库并构建SQL查询。'
- en: '**The Senior Agent** shall review the SQL code, correct it if necessary, and
    execute it.'
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**高级代理**应审查SQL代码，如有必要，进行修正并执行。'
- en: LLMs know how to code by being exposed to a large corpus of both code and natural
    language text, where they learn patterns, syntax, and semantics of programming
    languages. The model learns the relationships between different parts of the code
    by predicting the next token in a sequence. In short, LLMs can generate SQL code
    but can’t execute it, Agents can.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: LLMs通过接触大量代码和自然语言文本的语料库来学习如何编码，它们学习编程语言的模式、语法和语义。模型通过预测序列中的下一个标记来学习代码不同部分之间的关系。简而言之，LLMs可以生成SQL代码，但不能执行它，代理可以。
- en: First of all, I am going to create a database and connect to it, then I shall
    prepare a series of **Tools to** **execute SQL code**.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我将创建一个数据库并连接到它，然后我将准备一系列**用于执行SQL代码的工具**。
- en: '[PRE11]'
  id: totrans-59
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: '![](../Images/97869535248efaa9e927db63e949eb6a.png)'
  id: totrans-60
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/97869535248efaa9e927db63e949eb6a.png)'
- en: Let’s start with the **Junior Agent**. LLMs don’t need Tools to generate SQL
    code, but the Agent doesn’t know the table names and structure. Therefore, we
    need to provide Tools to investigate the database.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从**初级代理**开始。LLMs不需要工具来生成SQL代码，但代理不知道表名和结构。因此，我们需要提供工具来调查数据库。
- en: '[PRE12]'
  id: totrans-62
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: That will show the available tables in the db, and this will print the columns
    in a table.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 这将显示数据库中的可用表，这将打印出表中的列。
- en: '[PRE13]'
  id: totrans-64
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: Since this Agent must use more than one Tool which might fail, I’ll write a
    solid prompt, following the structure of the previous article.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 由于此代理必须使用多个可能失败的工具，我将编写一个坚实的提示，遵循前一篇文章的结构。
- en: '[PRE14]'
  id: totrans-66
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: Moving to the **Senior Agent**. Code checking doesn’t require any particular
    trick, you can just use the LLM.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 转到**高级代理**。代码检查不需要任何特殊技巧，只需使用LLM即可。
- en: '[PRE15]'','''').replace(''\n'','' '').strip()'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: '[PRE15]'','''').replace(''\n'','' '').strip()'
- en: tool_sql_check = {'type':'function', 'function':{
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: tool_sql_check = {'type':'function', 'function':{
- en: '''name'': ''sql_check'','
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: '''name'': ''sql_check'','
- en: '''description'': ''Before executing a query, always review the SQL query and
    correct the code if necessary'','
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: '''description'': ''在执行查询之前，始终审查SQL查询，并在必要时修正代码'','
- en: '''parameters'': {''type'': ''object'','
  id: totrans-72
  prefs: []
