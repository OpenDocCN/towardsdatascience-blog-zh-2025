  prefs: []
  type: TYPE_NORMAL
- en: tool_invoke_agent = {'type':'function', 'function':{
  prefs: []
  type: TYPE_NORMAL
- en: '''name'': ''invoke_agent'','
  prefs: []
  type: TYPE_NORMAL
- en: '''description'': ''Invoke another Agent to work for you.'','
  prefs: []
  type: TYPE_NORMAL
- en: '''parameters'': {''type'': ''object'','
  prefs: []
  type: TYPE_NORMAL
- en: '''required'': [''agent'', ''instructions''],'
  prefs: []
  type: TYPE_NORMAL
- en: '''properties'': {'
  prefs: []
  type: TYPE_NORMAL
