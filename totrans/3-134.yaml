- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: prompt_senior = '''[GOAL] You are a senior data engineer who reviews and execute
    the SQL queries written by others.
  prefs: []
  type: TYPE_NORMAL
- en: '[RETURN] You must return data from the database.'
  prefs: []
  type: TYPE_NORMAL
- en: '[WARNINGS] Use your tools only once.'
  prefs: []
  type: TYPE_NORMAL
- en: '[CONTEXT] ALWAYS check the SQL code before executing on the database.First
    ALWAYS use the tool ''sql_check'' to review the query. The output of this tool
    is the correct SQL query.You MUST use ONLY the correct SQL query when you use
    the tool ''sql_exec''.'''''''
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: 'def invoke_agent(agent:str, instructions:str) -> str:'
  prefs: []
  type: TYPE_NORMAL
- en: return agent+" - "+instructions if agent in ['junior','senior'] else f"Agent
