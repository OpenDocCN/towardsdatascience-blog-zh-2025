  prefs: []
  type: TYPE_NORMAL
- en: ''''''''
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE20]'
  prefs: []
  type: TYPE_PRE
- en: dic_tools = {'get_tables':get_tables,
  prefs: []
  type: TYPE_NORMAL
- en: '''get_schema'':get_schema,'
  prefs: []
  type: TYPE_NORMAL
- en: '''sql_exec'':sql_exec,'
  prefs: []
  type: TYPE_NORMAL
- en: '''sql_check'':sql_check,'
  prefs: []
  type: TYPE_NORMAL
- en: '''Invoke_agent'':invoke_agent}'
  prefs: []
  type: TYPE_NORMAL
- en: messages_junior = [{"role":"system", "content":prompt_junior}]
  prefs: []
  type: TYPE_NORMAL
- en: messages_senior = [{"role":"system", "content":prompt_senior}]
