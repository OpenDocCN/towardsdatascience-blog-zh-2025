  prefs: []
  type: TYPE_NORMAL
- en: '}'
  prefs: []
  type: TYPE_NORMAL
- en: '}}}'
  prefs: []
  type: TYPE_NORMAL
- en: test
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: invoke_agent(agent="intern", instructions="build a query")
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE19]'
  prefs: []
  type: TYPE_PRE
- en: prompt_lead = '''
  prefs: []
  type: TYPE_NORMAL
- en: '[GOAL] You are a tech lead.'
  prefs: []
  type: TYPE_NORMAL
- en: You have a team with one junior data engineer called 'junior', and one senior
