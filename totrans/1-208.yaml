- en: 'Know Your Real Birthday: Astronomical Computation and Geospatial-Temporal Analytics
    in Python'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 了解你的真实生日：使用 Python 进行天文计算和地理时空分析
- en: 原文：[https://towardsdatascience.com/know-your-real-birthday-astronomical-computation-and-geospatial-temporal-analytics-in-python/](https://towardsdatascience.com/know-your-real-birthday-astronomical-computation-and-geospatial-temporal-analytics-in-python/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[了解你的真实生日：使用 Python 进行天文计算和地理时空分析](https://towardsdatascience.com/know-your-real-birthday-astronomical-computation-and-geospatial-temporal-analytics-in-python/)'
- en: '<mdspan datatext="el1759439496841" class="mdspan-comment">You</mdspan> are
    planning next year’s birthday celebrations for three friends: Gabriel, Jacques,
    and Camille. All three of them were born in 1996, in Paris, France, so they will
    be 30 years old next year in 2026\. Gabriel and Jacques will happen to be in Paris
    on their respective birthdays, while Camille will be in Tokyo, Japan, during hers.
    Gabriel and Camille tend to celebrate their birthdays in any given year on the
    “official” days mentioned on their birth certificates — January 18 and May 5,
    respectively. Jacques, who was born on February 29, prefers to celebrate his birthday
    (or *civil anniversary*) on March 1 in non-leap years.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1759439496841" class="mdspan-comment">你</mdspan>正在计划为三位朋友：加布里埃尔、雅克和卡米耶来年的生日庆祝活动。他们三人都在1996年出生于法国巴黎，所以他们在2026年将满30岁。加布里埃尔和雅克将在各自的生日当天恰好身处巴黎，而卡米耶将在她的生日当天身处日本东京。加布里埃尔和卡米耶倾向于在任何给定年份的“官方”日期（即他们出生证明上提到的日期）庆祝他们的生日——分别是1月18日和5月5日。出生于2月29日的雅克更喜欢在非闰年的3月1日庆祝他的生日（或称*公历纪念日*）。
- en: 'We use *leap years* to keep our calendar in sync with the Earth’s orbit around
    the Sun. A *solar year* — the time it takes the Earth to complete one full orbit
    around the Sun — is approximately 365.25 days. By convention, the Gregorian calendar
    assigns 365 days to each year, except for leap years, which get 366 days to compensate
    for the fractional drift over time. This makes you wonder: will any of your friends
    be celebrating their birthday on the “real” anniversary of their day of birth,
    i.e., the day that the Sun will be in the same position in the sky (relative to
    the Earth) as it was when they were born? Could it be that your friends will end
    up celebrating turning 30 — a special milestone — a day too soon or a day too
    late?'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用*闰年*来使我们的日历与地球围绕太阳的轨道保持同步。*太阳年*——地球完成一次完整轨道所需的时间——大约是365.25天。按照惯例，格里高利历将365天分配给每年的年份，除了闰年，闰年有366天来补偿时间上的分数漂移。这让你想知道：你的朋友中是否有人在他们的“真实”纪念日（即太阳在天空中的位置相对于地球与出生时相同的那一天）庆祝生日？会不会你的朋友最终会在提前一天或晚一天庆祝他们30岁——一个特别的里程碑？
- en: The following article uses this birthday problem to introduce readers to some
    interesting and broadly applicable open-source data science Python packages for
    astronomical computation and geospatial-temporal analytics, including `skyfield`,
    `timezonefinder`, `geopy`, and `pytz`. To gain hands-on experience, we will use
    these packages to solve our fun problem of accurately predicting the “real birthday”
    (or date of *solar return*) in a given future year. We will then discuss how such
    packages can be leveraged in other real-life applications.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 以下文章使用这个生日问题向读者介绍一些有趣且广泛适用的开源数据科学 Python 包，用于天文计算和地理时空分析，包括 `skyfield`、`timezonefinder`、`geopy`
    和 `pytz`。为了获得实践经验，我们将使用这些包来解决我们有趣的问题，即准确预测给定未来年份的“真实生日”（或*太阳回归日*）。然后我们将讨论如何利用这些包在其他实际应用中。
- en: Real Birthday Predictor
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 真实生日预测器
- en: Project Setup
  id: totrans-6
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 项目设置
- en: All implementation steps below have been tested on macOS Sequoia 15.6.1 and
    should be roughly similar on Linux and Windows.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 以下所有实现步骤已在 macOS Sequoia 15.6.1 上测试，应该与 Linux 和 Windows 大致相似。
- en: 'Let us start by setting up the project directory. We will be using `uv` to
    manage the project (see installation instructions [here](https://docs.astral.sh/uv/getting-started/installation/)).
    Verify the installed version in the Terminal:'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们首先设置项目目录。我们将使用 `uv` 来管理项目（请参阅安装说明[这里](https://docs.astral.sh/uv/getting-started/installation/)）。在终端中验证已安装的版本：
- en: '[PRE0]'
  id: totrans-9
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'Initialize a project directory called `real-birthday-predictor` at a suitable
    location on your local machine:'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 在你的本地机器上合适的位置创建一个名为 `real-birthday-predictor` 的项目目录：
- en: '[PRE1]'
  id: totrans-11
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'In the project directory, create a `requirements.txt` file with the following
    dependencies:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 在项目目录中，创建一个包含以下依赖项的 `requirements.txt` 文件：
- en: '[PRE2]'
  id: totrans-13
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'Here is a brief overview of each of these packages:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是这些包的简要概述：
- en: '`skyfield` provides functions for astronomical computation. It can be used
    to compute precise positions of celestial bodies (e.g., Sun, Moon, planets, and
    satellites) to help determine rise/set times, eclipses, and orbital paths. It
    relies on so-called *ephemerides* (tables of positional data for various celestial
    bodies extrapolated over many years), which are maintained by organizations such
    as the NASA Jet Propulsion Laboratory (JPL). For this article, we will use the
    lightweight DE421 ephemeris file, which covers dates from July 29, 1899, through
    October 9, 2053.'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`skyfield` 提供了天文计算的函数。它可以用来计算天体的精确位置（例如，太阳、月亮、行星和卫星），以帮助确定升起/落下时间、日食和轨道路径。它依赖于所谓的**星历**（各种天体的位置数据表，在多年内外推），这些数据由像美国宇航局喷气推进实验室（JPL）这样的组织维护。对于本文，我们将使用轻量级的
    DE421 星历文件，该文件涵盖了从 1899 年 7 月 29 日到 2053 年 10 月 9 日的日期。'
- en: '`timezonefinder` has functions for mapping geographical coordinates (latitudes
    and longitudes) to timezones (e.g., “Europe/Paris”). It can do this offline.'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`timezonefinder` 提供了将地理坐标（纬度和经度）映射到时区（例如，“Europe/Paris”）的函数。它可以离线完成此操作。'
- en: '`geopy` offers functions for geospatial analytics, such as mapping between
    addresses and geographical coordinates. We will use it together with the `Nominatim`
    geocoder for OpenStreetMap data to map the names of cities and countries to coordinates.'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`geopy` 提供了地理空间分析的函数，例如在地址和地理坐标之间进行映射。我们将使用它与 `Nominatim` 地理编码器一起，用于 OpenStreetMap
    数据，将城市和国家名称映射到坐标。'
- en: '`pytz` provides functions for temporal analytics and time zone conversion.
    We will use it to convert between UTC and local times using regional daylight-saving
    rules.'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`pytz` 提供了时间分析和时区转换的函数。我们将使用它来根据区域夏令时规则在 UTC 和本地时间之间进行转换。'
- en: We will also use a few other built-in modules, such as `datetime` for parsing
    and manipulating date/time values, `calendar` for checking leap years, and `time`
    for sleeping between geocoding retries.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还将使用一些其他内置模块，例如 `datetime` 用于解析和操作日期/时间值，`calendar` 用于检查闰年，以及 `time` 用于在地理编码重试之间休眠。
- en: 'Next, create a virtual Python 3.12 environment inside the project directory,
    activate the environment, and install the dependencies:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，在项目目录内创建一个虚拟 Python 3.12 环境，激活该环境，并安装依赖项：
- en: '[PRE3]'
  id: totrans-21
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'Check that the dependencies have been installed:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 检查依赖项是否已安装：
- en: '[PRE4]'
  id: totrans-23
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Implementation
  id: totrans-24
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 实现
- en: 'In this section, we will go piece by piece through the code for predicting
    the “real” birthday date and time in a given future year and location of celebration.
    First, we import the necessary modules:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将逐部分分析预测给定未来年份和庆祝地点的“真实”生日日期和时间的代码。首先，我们导入必要的模块：
- en: '[PRE5]'
  id: totrans-26
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'Then we define the method, using meaningful variable names and docstring text:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 然后我们定义方法，使用有意义的变量名和文档字符串文本：
- en: '[PRE6]'
  id: totrans-28
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Note that `current_country` and `current_city` jointly refer to the location
    at which the birthday is to be celebrated in the target year.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，`current_country` 和 `current_city` 一起指代目标年份庆祝生日的位置。
- en: 'We validate the inputs before working with them:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 在处理输入之前，我们验证它们：
- en: '[PRE7]'
  id: totrans-31
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'Next, we use `geopy` with the `Nominatim` geocoder to ascertain the birth and
    current locations. To avoid getting timeout errors, we set a reasonably long timeout
    value of ten seconds; this is how long our `safe_geocode` function waits for the
    geocoding service to respond before raising a `geopy.exc.GeocoderTimedOut` exception.
    To be extra safe, the function attempts the lookup procedure three times with
    one-second delays before giving up:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们使用 `geopy` 和 `Nominatim` 地理编码器来确定出生地和当前地点。为了避免超时错误，我们设置了一个合理的长超时值，即十秒；这是我们的
    `safe_geocode` 函数在抛出 `geopy.exc.GeocoderTimedOut` 异常之前等待地理编码服务响应的时间；为了额外的安全，该函数在放弃之前尝试查找过程三次，每次间隔一秒：
- en: '[PRE8]'
  id: totrans-33
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'Using the geographical coordinates of the birth and current locations, we identify
    the respective time zones and the UTC date and time at birth. We also assume that
    individuals like Jacques, who were born on February 29, will prefer to celebrate
    their birthday on March 1 in non-leap years:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 使用出生地和当前地点的地理坐标，我们确定相应的时区和出生时的 UTC 日期和时间。我们还假设像 Jacques 这样在 2 月 29 日出生的人，在非闰年更愿意在
    3 月 1 日庆祝他们的生日：
- en: '[PRE9]'
  id: totrans-35
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: 'Using the DE421 ephemeris data, we calculate where the Sun was (i.e., its *ecliptic
    longitude*) at the exact time and place the individual was born:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 DE421 星历数据，我们计算出生时个体所在的确切时间和地点的太阳位置（即其**黄经**）：
- en: '[PRE10]'
  id: totrans-37
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Note that, the first time the line `eph = load("de421.bsp")` is executed, the
    `de421.bsp` file will be downloaded and placed in the project directory; in all
    future executions, the downloaded file will be used directly. It is also possible
    to modify the code to load another ephemeris file (e.g., `de440s.bsp`, which covers
    years through January 22, 2150).
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，当第一次执行`eph = load("de421.bsp")`行时，`de421.bsp`文件将被下载并放置在项目目录中；在所有未来的执行中，将直接使用下载的文件。也可以修改代码以加载另一个星历文件（例如，`de440s.bsp`，它涵盖了到2150年1月22日的年份）。
- en: 'Now comes an interesting part of the function: we will make an initial guess
    of the “real” birthday date and time in the target year, define safe upper and
    lower bounds for the true date and time value (e.g., two days either side of the
    initial guess), and perform a binary search with early-stopping to efficiently
    home in on the true value:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 现在来到函数的一个有趣部分：我们将对目标年份中的“真实”生日日期和时间进行初步猜测，为真实日期和时间值定义安全的上限和下限（例如，在初始猜测的两侧各两天），并执行带有早期停止的二分查找，以高效地找到真实值：
- en: '[PRE11]'
  id: totrans-40
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: See [this](https://medium.com/data-science/algorithmic-thinking-for-data-scientists-4601ac68496f)
    article for more examples of using binary search and to understand why this algorithm
    is an important one for data scientists to master.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 请参阅[这篇文章](https://medium.com/data-science/algorithmic-thinking-for-data-scientists-4601ac68496f)，了解更多使用二分查找的示例，以及为什么这个算法是数据科学家需要掌握的重要算法。
- en: 'Finally, the date and time of the “real” birthday identified by the binary
    search is converted to the current location’s time zone, formatted as needed,
    and returned:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，通过二分查找确定的“真实”生日日期和时间被转换为当前位置的时区，按需格式化，并返回：
- en: '[PRE12]'
  id: totrans-43
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: Testing
  id: totrans-44
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 测试
- en: Now we are in a position to predict the “real” birthdays of Gabriel, Jacques,
    and Camille in 2026.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们可以预测加布里埃尔、雅克和卡米勒在2026年的“真实”生日。
- en: 'To make the function output easier to digest, here is a helper function we
    will use to pretty-print the results of each query:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使函数输出更容易理解，这里是一个我们将使用的辅助函数，用于美化打印每个查询的结果：
- en: '[PRE13]'
  id: totrans-47
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: 'Here are the test cases:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是测试用例：
- en: '[PRE14]'
  id: totrans-49
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: 'And here are the results:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是结果：
- en: '[PRE15]'
  id: totrans-51
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: 'As we see, the “real” birthday (or moment of solar return) is different from
    the official birthday for all three of your friends: Gabriel and Jacques could
    theoretically start celebrating a day before their official birthdays in Paris,
    while Camille ought to wait one more day before celebrating her 30th in Tokyo.'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 如我们所见，“真实”的生日（或太阳回归的时刻）与三位朋友：加布里埃尔和雅克的理论上可以在巴黎官方生日前一天开始庆祝，而卡米勒应该在东京等待一天后再庆祝她的30岁生日。
- en: 'As a simpler alternative to following the steps above, the author of this article
    has created a Python library called `solarius` to achieve the same result (see
    details [here](https://pypi.org/project/solarius/)). Install the library with
    `pip install solarius` or `uv add solarius` and use it as shown below:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 作为上述步骤的更简单替代方案，本文作者创建了一个名为`solarius`的Python库来实现相同的结果（详情请见[这里](https://pypi.org/project/solarius/)）。使用`pip
    install solarius`或`uv add solarius`安装库，并按以下方式使用：
- en: '[PRE16]'
  id: totrans-54
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: 'Of course, there is more to birthdays than predicting solar returns — these
    special days are steeped in centuries of tradition. Here is a short video on the
    fascinating origins of birthdays:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，生日不仅仅是预测太阳回归——这些特殊的日子沉浸在几个世纪的传统文化中。这里有一个关于生日起源的有趣短视频：
- en: Beyond Birthdays
  id: totrans-56
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 生日之外
- en: The intention of the above section was to give readers a fun and intuitive use
    case for applying the various packages for astronomical computation and geospatial-temporal
    analytics. However, the usefulness of such packages goes far beyond predicting
    birthdays.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 上文的目的在于为读者提供一个有趣且直观的应用案例，展示如何使用各种天文计算和地理时空分析包。然而，这些包的实用性远不止于预测生日。
- en: For example, all of these packages can be used for other cases of astronomical
    event prediction (e.g., determining when a sunrise, sunset, or eclipse will happen
    on a future date in a given location). Predicting the movement of satellites and
    other celestial bodies could also play an important part in planning space missions.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，所有这些包都可以用于其他天文事件预测的情况（例如，确定在给定地点的某个未来日期何时日出、日落或发生日食）。预测卫星和其他天体的运动也可能在规划太空任务中发挥重要作用。
- en: The packages could also be used to optimize the deployment of solar panels in
    a particular location, such as a residential neighborhood or a commercial site.
    The objective would be to predict how much sunlight is likely to fall on that
    location at different times of the year and use this knowledge to adjust the placement,
    tilt, and usage schedules of the solar panels for maximum energy capture.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 这些包也可以用于优化特定地点（如住宅区或商业场所）太阳能电池板的部署。目标将是预测在不同时间一年中该地点可能有多少阳光照射，并利用这些知识来调整太阳能电池板的放置、倾斜和用电时间表，以实现最大能量捕获。
- en: Finally, the packages can be leveraged for historical event reconstruction (e.g.,
    in the context of archaeological or historical research, or even legal forensics).
    The objective here would be to recreate the sky conditions for a specific past
    date and location to help researchers better understand the lighting and visibility
    conditions at that time.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，这些包可以用于历史事件的重建（例如，在考古学或历史研究或甚至法律法医学的背景下）。这里的目的是重现特定过去日期和地点的天空条件，以帮助研究人员更好地理解当时的照明和能见度条件。
- en: Ultimately, by combining these open-source packages and built-in modules in
    various ways, it is possible to solve interesting problems that cut across a number
    of domains.
