- en: 'Smarter Model Tuning: An AI Agent with LangGraph + Streamlit That Boosts ML
    Performance'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/smarter-model-tuning-an-ai-agent-with-langgraph-streamlit-that-boosts-ml-performance/](https://towardsdatascience.com/smarter-model-tuning-an-ai-agent-with-langgraph-streamlit-that-boosts-ml-performance/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1755717950212" class="mdspan-comment">Lately, I have been
    enjoying</mdspan> each day a little more while working with LangGraph.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s face it: since LangChain is one of the first frameworks to handle the
    integration with LLMs, it took off earlier and became kind of a *go-to* option
    when it comes to building production-ready agents, whether you like it or not.'
  prefs: []
  type: TYPE_NORMAL
- en: LangChain’s younger brother is **LangGraph**. This framework uses a graph notation
    with nodes and edges to build the applications, making them highly customizable
    and very robust. That is what I am enjoying so much.
  prefs: []
  type: TYPE_NORMAL
- en: At first, some notations felt strange to me (maybe it’s just me!). But I kept
    digging and learning more. And I strongly believe we learn better while we’re
    implementing stuff, because that’s when the real problems pop up. So, after a
    few lines of code and some hours of code debugging, that graph architecture started
    to make much more sense to me, and I started to enjoy creating things with LangGraph.
  prefs: []
  type: TYPE_NORMAL
- en: Anyway, if you don’t have any introduction to the framework, I recommend you
    look at this post [[1]](https://medium.com/code-applied/building-your-first-ai-agent-with-langgraph-599a7bcf01cd?sk=a22e309c1e6e3602ae37ef28835ee843).
  prefs: []
  type: TYPE_NORMAL
- en: Now, let’s learn more about the project of this article.
  prefs: []
  type: TYPE_NORMAL
- en: The Project
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In this project, we are going to build a multi-step agent:'
  prefs: []
  type: TYPE_NORMAL
- en: 'It takes in a machine learning model type: *classification* or *regression*.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: And we will also input the metrics of our model, such as accuracy, RMSE, confusion
    matrix, ROC, etc. The more we provide to the agent, the better the response.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The agent, equipped with Google Gemini 2.0 Flash:'
  prefs: []
  type: TYPE_NORMAL
- en: Reads the input
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Evaluate the model’s metric inputted by the user
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Return an actionable list of suggestions to tune the model and improve its performance.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'This is the project folder structure:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: The Agent is live and [deployed in this web app](https://ml-tuning-assistant.streamlit.app/).
  prefs: []
  type: TYPE_NORMAL
- en: Dataset
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The dataset to be used is a very simple toy dataset named *Tips,* from the Seaborn
    package, and open-sourced under the license BSD 3\. I decided to use a simple
    dataset like this because it has both categorical and numerical features, being
    suited for both types of model creation. In addition, the start of the article
    is the agent, so that is where we want to spend more attention.
  prefs: []
  type: TYPE_NORMAL
- en: To load the data, use the following code.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Next, we will build the nodes.
  prefs: []
  type: TYPE_NORMAL
- en: Nodes
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The nodes of a LangGraph object are Python functions. They can be tools that
    the agent will use or an instance of an LLM. We build each node as a separate
    function.
  prefs: []
  type: TYPE_NORMAL
- en: But first, we have to load the modules.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: Our first node is the one to get the model type. It simply gets the input from
    the user on whether the model to be enhanced is a regression or a classification.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: The other two nodes from this graph are almost the same, but they differ in
    the system prompt. One is optimized for regression models evaluation, while the
    other is specialized in classification. I will paste only one of them here. The
    complete code is available on GitHub, though. [See all the nodes’ code here.](https://github.com/gurezende/ML-Tuning-Assistant/blob/main/langgraph_agent/nodes.py)
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: Great. Now it is time to stick these nodes together by building the edges to
    connect them. In other words, building the flow of the information from the user
    input to the final output.
  prefs: []
  type: TYPE_NORMAL
- en: Graph
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The file [`graph.py`](https://github.com/gurezende/ML-Tuning-Assistant/blob/main/langgraph_agent/graph.py)
    will be used to generate the LangGraph object. First, we need to import the modules.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: The next step is to create the state of the graph. **StateGraph** manages the
    agent’s state throughout the workflow. It **keeps track of the information** the
    agent has gathered and processed. It is nothing but a class with the names of
    the variables and their type written in dictionary style.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: 'To build the graph, we will use a function that:'
  prefs: []
  type: TYPE_NORMAL
- en: Adds each node with a tuple `("name", node_function_name)`
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Defines the starting point at the *get_model_type* node. `.set_entry_point("get_model_type")`
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Then, there is a conditional edge, that decides to go to the appropriate node
    depending on the response from the `get_model_type` node.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Finally, connect the LLM nodes to the `END` state.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Compile the graph to make it ready for use.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: If you want to see the graph, you can use this little snippet.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/32da801cc01a17b4e9ad34f09058d935.png)'
  prefs: []
  type: TYPE_IMG
- en: Image of the graph created. Image by the author.
  prefs: []
  type: TYPE_NORMAL
- en: It is a simple agent, but it works very well. We will get to that soon. But
    we need to build the front-end piece first.
  prefs: []
  type: TYPE_NORMAL
- en: Building the User Interface
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The user interface is a Streamlit app. I have chosen this option due to easy
    prototyping and deployment features.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s load the libraries needed once again.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: Configuring the page layout (title, icon, sidebar etc).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: Creating the sidebar that holds the field to add a Google Gemini API Key and
    the *restart session* button.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: Now, we add the page’s title and instructions to use the agent. This is all
    simple code using mostly the function `st.write()`.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: 'And, lastly, the code to:'
  prefs: []
  type: TYPE_NORMAL
- en: Run the `build_graph()` function and create the agent.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Create the initial state of the agent, with an empty `messages`.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Invoke the agent.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Print the results on screen.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: All created. It is time to put this AI Agent to work!
  prefs: []
  type: TYPE_NORMAL
- en: So, we will build some models and ask the agent for tuning suggestions.
  prefs: []
  type: TYPE_NORMAL
- en: Running the Agent
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Well, as this is an agent that helps us with model tuning suggestions, we must
    have a model to tune.
  prefs: []
  type: TYPE_NORMAL
- en: Regression Model
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We will try the regression model first. We can quickly build a simple model.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: 'Now, we have to gather metrics data to present to our AI Agent in order to
    get tuning suggestions. The more data, the better. As I am working with a regression
    model, I chose to present the following information:'
  prefs: []
  type: TYPE_NORMAL
- en: Feature names
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Statistical description of the dataset
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: R²
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Root Mean Squared Error (RMSE)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Regression intercept and coefficients
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: VIF
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: Now I will run the agent.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/22e6ceba0d8f6aaf904944d83f3b01db.png)'
  prefs: []
  type: TYPE_IMG
- en: AI Agent in action. GIF by the author.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here is the agent’s response:'
  prefs: []
  type: TYPE_NORMAL
- en: '🤖 Agent Response:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Here are actionable suggestions to improve your regression model:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Explore non-linear relationships:** Consider adding polynomial features for
    total_bill and size, or interaction terms between features (e.g., total_bill *
    size), as the current linear model might be too simplistic for the underlying
    data patterns.'
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Evaluate alternative regression models:** Given the R-squared of 0.44, test
    other models like Random Forest Regressor, Gradient Boosting Regressor, or Support
    Vector Regressor, which can capture more complex, non-linear relationships.'
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Address data distribution and outliers:** Investigate and handle outliers
    in total_bill and the target variable tip. Consider applying transformations (e.g.,
    log transform) to skewed features to better meet linearity assumptions and improve
    model performance.'
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Analyze feature statistical significance:** Obtain p-values for each coefficient
    to identify features that may not be statistically significant. Removing or re-evaluating
    such features can simplify the model and potentially improve generalization.'
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: 'There are a couple of suggestions here. We can now choose what we will accept
    or not. Here is what I tried (code in GitHub):'
  prefs: []
  type: TYPE_NORMAL
- en: I trained a Random Forest Regressor, but the result was not good with the out
    of the box model, dropping the R² to 0.25 and the RMSE to 0.97\. So I discarded
    that option.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: So, if I am keeping the Linear Regression, another suggestion is to use log
    transformations and treat outliers. I tried that, and the result is better. The
    model goes to an R² of 0.55 and RMSE of 0.23\. A significant improvement.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Classification Model
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: I followed the same drill here, but now working on a classification model, using
    the same dataset and trying to predict if the restaurant’s customer is a smoker
    or not.
  prefs: []
  type: TYPE_NORMAL
- en: Trained a classification model
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Got the initial metrics: `Score = 0.69`; `RMSE = 0.55`**'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Ran the AI Agent for suggestions
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Applied some tuning suggestions: `class_weight=''balanced''` and `BayesSearchCV`.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Got the tuned metrics: `Score = 0.71`; `RMSE = 0.52`**'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![](../Images/9b1edc70c73547c925b7b4446360f3e0.png)'
  prefs: []
  type: TYPE_IMG
- en: AI Agent’s suggestions. Image by the author.
  prefs: []
  type: TYPE_NORMAL
- en: Notice how the Precision vs. Recall is more balanced as well.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d0321e76163230c9cf21a8e99c2b7a22.png)'
  prefs: []
  type: TYPE_IMG
- en: Score Before vs. After tuning. Image by the author.
  prefs: []
  type: TYPE_NORMAL
- en: Our job is complete. The agent is working as designed.
  prefs: []
  type: TYPE_NORMAL
- en: Before You Go
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We have reached the end of this project. Overall, I am satisfied with the result.
    This project is quite simple and quick to build, and yet it delivers a lot of
    value!
  prefs: []
  type: TYPE_NORMAL
- en: Tuning models is not a *one-size-fits-all* action. There are many options to
    try. Thus, having the help of an AI Agent to give us a few ideas to try is very
    valuable and makes our job easier without replacing us.
  prefs: []
  type: TYPE_NORMAL
- en: Try the app for yourself and let me know if it helped you get an improved performance
    metric!
  prefs: []
  type: TYPE_NORMAL
- en: '[https://ml-tuning-assistant.streamlit.app](https://ml-tuning-assistant.streamlit.app)'
  prefs: []
  type: TYPE_NORMAL
