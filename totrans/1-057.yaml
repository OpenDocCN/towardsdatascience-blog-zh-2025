- en: How to Create Professional Articles with LaTeX in Cursor
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/how-to-create-professional-articles-with-latex-in-cursor/](https://towardsdatascience.com/how-to-create-professional-articles-with-latex-in-cursor/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1764050205104" class="mdspan-comment">LaTeX is a commonly</mdspan>
    used system for writing technical articles. I, for example, wrote my Master’s
    thesis through Overleaf with a LaTeX file. However, LaTeX is complicated to learn,
    and when dealing with it through Overleaf, you’ll encounter a lot of compiler
    errors and struggle to organize the file exactly how you want.
  prefs: []
  type: TYPE_NORMAL
- en: 'Luckily, there is a much faster and more effective way of writing LaTeX code
    now: Write it in Cursor, or any other IDE powered by AI.'
  prefs: []
  type: TYPE_NORMAL
- en: You can still write the text like you always used to, but instead of spending
    time aligning figures, fixing citation issues, and solving compiler errors, you
    can now ask an LLM to fix these issues for you. Additionally, it is faster than
    using an online editor like Overleaf, since you can compile the PDF locally on
    your computer, which is usually faster, of course, depending on the power of your
    computer.
  prefs: []
  type: TYPE_NORMAL
- en: '![Cursor AI Agents](../Images/e49cc42e0edd96dcebc70c9a4c2d902b.png)'
  prefs: []
  type: TYPE_IMG
- en: This infographic highlights the main contents of this article. I’ll show you
    how to save countless hours by writing LaTeX code in Cursor instead of Overleaf.
    This saves you both a lot of time and frustration from solving bugs that AI agents
    can solve instantly. Image by Gemini.
  prefs: []
  type: TYPE_NORMAL
- en: The goal of this article is simply to show you the possibilities of an IDE by
    highlighting that you can even create LaTeX files with it. Discovering this as
    an option was an eye-opening experience for me.
  prefs: []
  type: TYPE_NORMAL
- en: Note that I’m not suggesting outsourcing your writing to Cursor. You should
    naturally write your own words. I’m simply saying you can outsource all of the
    non-writing tasks to Cursor, so you can spend all your time writing instead. Also,
    I’m not sponsored by Cursor in the writing of this article.
  prefs: []
  type: TYPE_NORMAL
- en: '[You can access the eBook created through this article here](https://eivindkjosbakken.com/ebook).'
  prefs: []
  type: TYPE_NORMAL
- en: Why write LaTeX code in Cursor
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'LaTeX is the go-to system for writing technical articles, so whenever you write
    a paper, a thesis, or similar, people usually resort to LaTeX. People use LaTeX
    because:'
  prefs: []
  type: TYPE_NORMAL
- en: You get a professional look at your article
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It’s very customizable. You essentially program the text, figures, and formatting
    into a .tex file
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You have a solid, scalable system for citations and references
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'However, it’s quite common to write LaTeX in an online editor like Overleaf.
    I used Overleaf for my Master’s thesis in 2024, and it worked decently, though
    I did spend a lot of time on mundane tasks such as fixing compiler issues, and
    the formatting of my thesis, fixing issues like:'
  prefs: []
  type: TYPE_NORMAL
- en: How wide should an image be
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Compiler issues
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Proper citations
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![Cursor IDE](../Images/c6f2a09092a3b89c48fc8e4c139492e3.png)'
  prefs: []
  type: TYPE_IMG
- en: This image shows how I work to create an eBook with LaTeX through Cursor. I
    have the code in the left pane, where I write my content. I sometimes turn off
    tab suggestions since they can be disruptive when writing. To the right of my
    code, I have my parsed PDF from the LaTeX code. This automatically updates whenever
    I save the code file. All the way to the right ,I have the Cursor agent, which
    I can prompt with CMD + L on Mac, to help me with formatting, add a new image,
    and so on. Image by the author.
  prefs: []
  type: TYPE_NORMAL
- en: This is made especially frustrating because Overleaf spends quite some time
    compiling, especially when you have a 100-page document with a lot of images.
    I have now discovered there is a much better way of writing these articles, which
    is through your IDE.
  prefs: []
  type: TYPE_NORMAL
- en: Below you can see an example of LaTeX code, including bullet point lists and
    a figure with a caption and label used to reference the figure
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: I would also argue that you should write non-technical content through LaTeX.
    It’s a super organized way to create PDFs with proper formatting, figures, and
    references.
  prefs: []
  type: TYPE_NORMAL
- en: Furthermore, you can create presentations through Overleaf, which is essentially
    an article, but of course, using clearly separated slides.
  prefs: []
  type: TYPE_NORMAL
- en: Set up LaTeX in Cursor
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Setting up LaTeX in Cursor is relatively simple: You ask the agent to set up
    the environment for you. I used the following prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Cursor then created an *ebook.tex* file, and the commands I needed to parse
    it. After that, you can simply start writing your content. If you need a specific
    structure or want to follow a template, you can also prompt Cursor about this
    and have it design an outline for your article, where you can start working.
  prefs: []
  type: TYPE_NORMAL
- en: Writing your article and compiling
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: After setting up LaTeX in Cursor, I started writing my eBook. I asked Cursor
    to make an outline for me for a data science template, where it filled in the
    basics, leaving [TEXT PLACEHOLDER] around the file.
  prefs: []
  type: TYPE_NORMAL
- en: Cursor, for example, set up a title and subheader placeholder, the current date,
    a preface placeholder, and a chapter placeholder. I could then easily start filling
    out the content of my article.
  prefs: []
  type: TYPE_NORMAL
- en: Image formatting
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '![Latext ebook image](../Images/4fdd607d1138bd14cfa2be20a6e6f2ba.png)'
  prefs: []
  type: TYPE_IMG
- en: In this image, you can see an example of a figure I use in my eBook, as well
    as text referring to the figure, and the figure description. To add this image,
    I simply provided Cursor the path to my local image, and it copied that image
    into the relevant workspace and added the reference to the image in my ebook.tex
    file. Image by the author,
  prefs: []
  type: TYPE_NORMAL
- en: At some points, I want to add pictures and figures to my article. I then provide
    Cursor the local path to the image on my computer, and the location to put the
    image in, and provide a field to fill in the image description text. If I want
    any special formatting for the image (width, opacity, two images beside each other,
    …) I also prompt Cursor to do that.
  prefs: []
  type: TYPE_NORMAL
- en: Code formatting
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '![Code block](../Images/ffa4b7dbdd9c05321cc83a97f36ca225.png)'
  prefs: []
  type: TYPE_IMG
- en: This image shows an example of a code block in my eBook. You can see the formatting
    in the code block with the color palette, and the numbered lines on the left side,
    which is exactly how I want to display code in my eBook. Adding this formatting
    with Cursor was super simple and was way faster than adding such formatting through
    Overleaf. Image by the author,
  prefs: []
  type: TYPE_NORMAL
- en: Adding code is also quite simple with Cursor. I have a certain code formatting
    style specified in my *agents.md* file, and I then simply provide Cursor the code
    to highlight, and it adds it to the file with the correct formatting. At some
    point, I also noticed that a line of code was going outside the PDF, and I told
    Cursor to wrap the line, and added that to *agents.md* (*if a code line is too
    long, always wrap it)*. I’ll cover more about *agents.md* in the next section.
  prefs: []
  type: TYPE_NORMAL
- en: Box highlighting
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Sometimes, I also want to preface points in my eBook. In these cases, I make
    use of box highlighting. I simply mark the relevant text in my code, press CMD
    + L to add it as context to the Cursor, and prompt the Cursor to add this as a
    key point box. Cursor then provides the box you see below, which helps make my
    point clearer.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/3f80fd70d4df1d7abdf01a599c561541.png)'
  prefs: []
  type: TYPE_IMG
- en: This image highlights a key point in my article. I had the text and then asked
    Cursor to make this a key point in my article, with a box around it. I then got
    the result you see in the image. If I did this through Overleaf, it would take
    a lot longer, considering I would have to ask ChatGPT how to do it, copy and paste
    the code, and then adapt the code to my own LaTeX code. Image by the author.
  prefs: []
  type: TYPE_NORMAL
- en: Maintaining *agents.md*
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'When you start writing and prompting the Cursor to fix formatting, you’ll notice
    that the AI agent sometimes doesn’t do as you desire. In these cases, it’s very
    important to maintain an *agents.md* where you condense your preferences into
    a single file. For example:'
  prefs: []
  type: TYPE_NORMAL
- en: If you want citations in a specific format
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If you want a certain color scheme
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How wide should your figures be
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Whenever Cursor deviates from the desired behavior, for example, by using the
    incorrect color scheme, you should do two things:'
  prefs: []
  type: TYPE_NORMAL
- en: Tell Cursor the correct behavior (*use a minimalistic black and white color
    scheme instead)*
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Tell Cursor to add that behavior to agents.md (or .cursorrules). This will ensure
    the error does not happen again
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Doing these two steps should essentially be muscle memory whenever an AI agent
    doesn’t do exactly what you want it to do. It is especially important when writing
    longer LaTeX files, where you’re dependent on consistent schemes and formatting,
    and you don’t want to always specify the type of color scheme you want whenever
    making an update.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this article, I’ve taken you through how you can use Cursor to write your
    technical articles in LaTeX. For me, this is a revolutionary workflow, saving
    me countless hours every time I’m writing an article in LaTeX. I believe you should
    never be spending time manually solving compiler errors in Overleaf or copying
    and pasting code from ChatGPT to solve formatting errors. Writing LaTeX in Cursor
    essentially solves all your problems, except for the writing itself, which you
    naturally have to perform yourself.
  prefs: []
  type: TYPE_NORMAL
