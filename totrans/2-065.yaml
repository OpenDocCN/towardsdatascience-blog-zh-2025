- en: 'InfiniBand vs RoCEv2: Choosing the Right Network for Large-Scale AI'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: InfiniBand与RoCEv2：为大规模AI选择合适的网络
- en: 原文：[https://towardsdatascience.com/infiniband-vs-rocev2-choosing-the-right-network-for-large-scale-ai/](https://towardsdatascience.com/infiniband-vs-rocev2-choosing-the-right-network-for-large-scale-ai/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/infiniband-vs-rocev2-choosing-the-right-network-for-large-scale-ai/](https://towardsdatascience.com/infiniband-vs-rocev2-choosing-the-right-network-for-large-scale-ai/)
- en: <mdspan datatext="el1754506380989" class="mdspan-comment">Context</mdspan>
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1754506380989" class="mdspan-comment">上下文</mdspan>
- en: GPUs serve as the fundamental computational engines for AI. However, In large-scale
    training environments, overall performance is not limited by processing speed,
    but by the speed of the network communication between them.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: GPU是AI的基本计算引擎。然而，在大型训练环境中，整体性能并非由处理速度限制，而是由它们之间网络通信的速度限制。
- en: Large language models are trained on thousands of GPUs, which creates a huge
    amount of cross-GPU traffic. In these systems, even the smallest delays compound.
    A microsecond lag when GPUs share data can cause a chain reaction that adds hours
    to the training job. Therefore, these systems require a specialized network that’s
    designed to transfer large amounts of data with minimal delay.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 大型语言模型在数千个GPU上训练，这产生了巨大的跨GPU流量。在这些系统中，即使是微小的延迟也会累积。当GPU共享数据时，微秒级的延迟可能导致连锁反应，使训练任务增加数小时。因此，这些系统需要一个专门的网络，该网络设计用于以最小延迟传输大量数据。
- en: The traditional approach of routing GPU data through the CPU created a severe
    bottleneck at scale. To fix this bottleneck, technologies like RDMA and GPUDirect
    were invented to essentially build a bypass around the CPU. This creates a direct
    path for GPUs to talk to one another.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 传统的将GPU数据通过CPU路由的方法在扩展规模时造成了严重的瓶颈。为了解决这个问题，发明了像RDMA和GPUDirect这样的技术，在本质上绕过CPU构建了一个旁路。这为GPU之间直接通信创建了一条直接路径。
- en: This direct communication method needs a network that can handle the speed.
    The two main choices available today to provide this are InfiniBand and RoCEv2.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 这种直接通信方法需要一个能够处理这种速度的网络。目前提供这种服务的两种主要选择是InfiniBand和RoCEv2。
- en: So, how do you choose between InfiniBand and RoCEv2? It’s a big deal, forcing
    you to balance raw speed against budget and how much hands-on tuning you’re willing
    to do.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，您如何在InfiniBand和RoCEv2之间进行选择？这是一个大问题，迫使您在原始速度、预算以及您愿意进行多少手动调整之间进行权衡。
- en: Let’s take a closer look at each technology to see its strengths and weaknesses.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们更深入地了解每种技术，看看其优势和劣势。
- en: Basic Concepts
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 基本概念
- en: Before we compare InfiniBand and RoCEv2, let’s first understand how traditional
    communication works and introduce some basic concepts like RDMA and GPU Direct.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们比较InfiniBand和RoCEv2之前，让我们首先了解传统通信是如何工作的，并介绍一些基本概念，如RDMA和GPU Direct。
- en: '**Traditional Communication** In traditional systems, most of the data movement
    between machines is handled by the CPU. When a GPU finishes its computation and
    needs to send data to a remote node, it follows the following steps –'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: '**传统通信** 在传统系统中，机器之间的大部分数据移动都是由CPU处理的。当一个GPU完成其计算并需要将数据发送到远程节点时，它遵循以下步骤 –'
- en: '![](../Images/c4037b17cb32ed9d08f766d93b3d610f.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/c4037b17cb32ed9d08f766d93b3d610f.png)'
- en: 'CPU Centric communication (source: author)'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 以CPU为中心的通信（来源：作者）
- en: The GPU writes the data to the system (host) memory
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: GPU将数据写入系统（主机）内存
- en: The CPU copies that data into a buffer used by the network card
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: CPU将那些数据复制到网络卡使用的缓冲区
- en: The NIC (Network Interface Card) sends the data over the network
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 网络接口卡（NIC）将数据通过网络发送
- en: On the receiving node, the NIC delivers the data to the CPU
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在接收节点上，网络接口卡（NIC）将数据交付给CPU
- en: The CPU writes it into system memory
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: CPU将其写入系统内存
- en: The GPU reads it from system memory
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: GPU从系统内存中读取它
- en: This approach works well for small systems, but it doesn’t scale for AI workloads.
    As more data gets copied around, the delays start to add up, and the network struggles
    to keep up.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法对于小型系统来说效果很好，但对于AI工作负载来说则无法扩展。随着更多数据被复制，延迟开始累积，网络难以跟上。
- en: '**RDMA**'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: '**RDMA**'
- en: Remote Direct Memory Access (RDMA) enables a local machine to access the memory
    of a remote machine directly without involving the CPU in the data transfer process.
    In this architecture, the network interface card handles all memory operations
    independently, allowing it to read from or write to remote memory locations without
    creating intermediate copies of the data. This direct memory access capability
    eliminates the traditional bottlenecks associated with CPU-mediated data transfers
    and reduces overall system latency.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 远程直接内存访问（RDMA）允许本地机器直接访问远程机器的内存，而不涉及数据传输过程中的 CPU。在这种架构中，网络接口卡独立处理所有内存操作，允许它从远程内存位置读取或写入数据，而不创建数据的中继副本。这种直接内存访问能力消除了与
    CPU 介导的数据传输相关的传统瓶颈，并减少了整体系统延迟。
- en: RDMA proves particularly valuable in AI training environments where thousands
    of GPUs must share gradient information efficiently. By bypassing operating system
    overhead and network delays, RDMA enables the high-throughput, low-latency communication
    essential for distributed machine learning operations.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 在 AI 训练环境中，RDMA 特别有价值，因为数千个 GPU 必须有效地共享梯度信息。通过绕过操作系统开销和网络延迟，RDMA 实现了分布式机器学习操作所必需的高吞吐量和低延迟通信。
- en: '**GPUDirect RDMA** GPUDirect is NVIDIA’s way of letting GPUs talk directly
    to other hardware through PCIe connections. Normally, when a GPU needs to transfer
    data to another device, it has to take the long way around. The data goes from
    GPU memory to system memory first, then the receiving device grabs it from there.
    GPUDirect skips the CPU entirely. Data moves directly from one GPU to another.'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: '**GPUDirect RDMA** GPUDirect 是 NVIDIA 允许 GPU 通过 PCIe 连接直接与其他硬件通信的方式。通常，当 GPU
    需要将数据传输到其他设备时，它必须走一条长路。数据首先从 GPU 内存传输到系统内存，然后接收设备从那里获取它。GPUDirect 完全跳过了 CPU。数据直接从一个
    GPU 传输到另一个 GPU。'
- en: GPUDirect RDMA extends this to network transfers by allowing the NIC to access
    GPU memory directly using PCIe.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: GPUDirect RDMA 通过允许网络接口卡（NIC）直接使用 PCIe 访问 GPU 内存来扩展这一功能。
- en: '![](../Images/97805074136fb4c0b182a2aecfd66053.png)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/97805074136fb4c0b182a2aecfd66053.png)'
- en: 'GPUDirect RDMA Communication (source: author)'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: GPUDirect RDMA 通信（来源：作者）
- en: Now that we understand concepts like RDMA and GPUDirect, let’s look into the
    infrastructure technologies InfiniBand and RoCEv2 that support GPUDirect RDMA.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经理解了 RDMA 和 GPUDirect 等概念，让我们来看看支持 GPUDirect RDMA 的基础设施技术 InfiniBand 和
    RoCEv2。
- en: InfiniBand
  id: totrans-29
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: InfiniBand
- en: InfiniBand is a high-performance networking technology designed specifically
    for data centers and supercomputing environments. While Ethernet was built to
    handle general traffic, InfiniBand is designed to meet high speed and low latency
    for AI workloads.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: InfiniBand 是一种专为数据中心和超级计算环境设计的高性能网络技术。虽然以太网是为了处理通用流量而构建的，但 InfiniBand 是为了满足
    AI 工作负载的高速和低延迟而设计的。
- en: It’s like a high-speed bullet train where both the train and the tracks are
    designed to maintain the speed. InfiniBand follows the same concept, everything
    including the cables, network cards, and switches are designed to move data fast
    and avoid any delays.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 它就像一列高速子弹列车，列车和轨道都是设计来保持速度的。InfiniBand 遵循同样的概念，包括电缆、网络卡和交换机在内的所有东西都是设计来快速传输数据并避免任何延迟。
- en: '**How does it work?**'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: '**它是如何工作的？**'
- en: InfiniBand works completely differently from regular Ethernet. It doesn’t use
    the regular TCP/IP protocol. Instead, it relies on its own lightweight transport
    layers designed for speed and low latency.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: InfiniBand 与常规以太网完全不同。它不使用常规的 TCP/IP 协议。相反，它依赖于自己轻量级的传输层，这些传输层是为速度和低延迟而设计的。
- en: At the core of InfiniBand is RDMA, which allows one server to directly access
    the memory of another without involving the CPU. InfiniBand supports RDMA in hardware,
    so the network card, called a Host Channel Adapter or HCA, handles data transfers
    directly without interrupting the operating system or creating extra copies of
    data.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: InfiniBand 的核心是 RDMA，它允许一台服务器直接访问另一台服务器的内存，而不涉及 CPU。InfiniBand 在硬件上支持 RDMA，因此网络卡（称为主机通道适配器或
    HCA）直接处理数据传输，而不会中断操作系统或创建额外的数据副本。
- en: InfiniBand also uses a lossless communication model. It avoids dropping packets
    even under heavy traffic by using credit-based flow control. The sender transmits
    data only when the receiver has enough buffer space available.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: InfiniBand 也使用无损通信模型。通过使用基于信用的流量控制，即使在重负载下也能避免数据包丢失。发送者只有在接收方有足够的缓冲空间时才会传输数据。
- en: In large GPU clusters, InfiniBand switches move data between nodes with extremely
    low latency, often under one microsecond. And because the entire system is built
    for this purpose, everything from the hardware to the software works together
    to deliver consistent, high-throughput communication.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 在大型GPU集群中，InfiniBand交换机在节点之间以极低的延迟移动数据，通常低于一微秒。由于整个系统都是为了这个目的而构建的，从硬件到软件的所有部分都协同工作，以提供一致、高吞吐量的通信。
- en: Let’s understand a simple GPU-to-GPU communication using the following diagram -
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们通过以下图表来理解一个简单的GPU到GPU通信 -
- en: '![](../Images/05c7e896f5332d99876ff3ed257b6ee0.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/05c7e896f5332d99876ff3ed257b6ee0.png)'
- en: 'GPU-to-GPU communication using InfiniBand (source: author)'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 使用InfiniBand的GPU到GPU通信（来源：作者）
- en: GPU 1 hands off data to its HCA, skipping the CPU
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: GPU 1将其数据传递给其HCA，跳过CPU
- en: The HCA initiates an RDMA write to the remote GPU
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: HCA向远程GPU发起RDMA写入
- en: Data is transferred over the InfiniBand switch
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据通过InfiniBand交换机传输
- en: The receiving HCA writes the data directly to GPU 2’s memory
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 接收端HCA直接将数据写入GPU 2的内存
- en: '**Strength**'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: '**优势**'
- en: '**Fast and predictable ** – InfiniBand delivers ultra-low latency and high
    bandwidth, keeping large GPU clusters running efficiently without hiccups.'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**快速且可预测** – InfiniBand提供超低延迟和高带宽，使大型GPU集群高效运行，不会出现故障。'
- en: '**Built for RDMA ** – It handles RDMA in hardware and uses credit-based flow
    control to avoid packet drops, even under heavy load.'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**专为RDMA设计** – 它在硬件中处理RDMA，并使用基于信用的流量控制来避免数据包丢失，即使在重负载下也是如此。'
- en: '**Scalable** – Since all parts of the system are designed to work together,
    performance is not impacted if additional nodes are added to the cluster.'
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可扩展** – 由于系统的所有部分都设计为协同工作，因此如果向集群添加更多节点，性能不会受到影响。'
- en: '**Weaknesses**'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: '**弱点**'
- en: '**Expensive** – Hardware is expensive and mostly tied to NVIDIA, which limits
    flexibility.'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**昂贵** – 硬件成本高昂，并且主要与NVIDIA相关联，这限制了灵活性。'
- en: '**Harder to manage –** Setup and tuning require specialized skills. It’s not
    as straightforward as Ethernet.'
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**更难管理** – 设置和调整需要专业技能。 它不像以太网那样直接。'
- en: '**Limited interoperability –** It doesn’t play well with standard IP networks,
    making it less flexible for general-purpose environments.'
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**互操作性有限** – 它与标准IP网络不兼容，这使得它在通用环境中不太灵活。'
- en: RoceV2
  id: totrans-52
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: RoceV2
- en: RoCEv2 (RDMA over Converged Ethernet version 2) brings the benefits of RDMA
    to standard Ethernet networks. RoCEv2 takes a different approach than InfiniBand.
    Instead of needing custom network hardware, it just uses your regular IP network
    with UDP for transport.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: RoCEv2（汇聚式以太网上的RDMA版本2）将RDMA的好处带到了标准以太网网络。RoCEv2采取了与InfiniBand不同的方法。它不需要定制网络硬件，只需使用您的常规IP网络，并使用UDP进行传输。
- en: Think of it like upgrading a regular highway with an express lane just for critical
    data. You don’t have to rebuild the entire road system. You just need to reserve
    the fast lane and tune the traffic signals. RoCEv2 uses the same concept, it delivers
    high-speed and low-latency communication using the existing Ethernet system.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下，就像升级一条普通高速公路，只为关键数据设置一条专用快车道。您不需要重建整个道路系统。您只需要保留快速车道并调整交通信号。RoCEv2采用相同的概念，它通过现有的以太网系统提供高速和低延迟的通信。
- en: '**How does it work?**'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '**它是如何工作的？**'
- en: RoCEv2 brings RDMA to standard Ethernet by running over UDP and IP. It works
    across regular Layer 3 networks without needing a dedicated fabric. It uses commodity
    switches and routers, making it more accessible and cost-effective.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: RoCEv2通过UDP和IP运行，将RDMA带入标准以太网。它可以在常规的第3层网络上工作，无需专用结构。它使用商品交换机和路由器，使其更易于访问且成本效益更高。
- en: Like InfiniBand, RoCEv2 enables direct memory access between machines. The key
    difference is that while InfiniBand handles flow control and congestion in a closed,
    tightly controlled environment, RoCEv2 relies on enhancements to Ethernet, such
    as –
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 与InfiniBand一样，RoCEv2允许机器之间直接访问内存。关键区别在于，虽然InfiniBand在封闭、严格控制的环境中处理流量控制和拥塞，但RoCEv2依赖于对以太网的增强，例如
    –
- en: '**Priority Flow Control(PFC)** – Prevents packet loss by pausing traffic at
    the Ethernet layer based on priority.'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: '**优先级流量控制（PFC）** – 通过在以太网层根据优先级暂停流量来防止数据包丢失。'
- en: '**Explicit Congestion Notification(ECN)** – Mark packets instead of dropping
    them when congestion is detected.'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: '**显式拥塞通知（ECN）** – 在检测到拥塞时标记数据包而不是丢弃它们。'
- en: '**Data Center Quantized Congestion Notification(DCQCN)** – A congestion control
    protocol that reacts to ECN signals to manage traffic more smoothly.'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: '**数据中心量化拥塞通知（DCQCN）** – 一种响应ECN信号以更平滑地管理流量的拥塞控制协议。'
- en: To make RoCEv2 work well, the underlying Ethernet network needs to be lossless
    or close to it. Otherwise, RDMA performance drops. This requires careful configuration
    of switches, queues, and flow control mechanisms throughout the data center.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 要使RoCEv2运行良好，底层以太网网络需要是无损或接近无损。否则，RDMA性能会下降。这需要在数据中心内对交换机、队列和流量控制机制进行仔细配置。
- en: Let’s understand a simple GPU-to-GPU communication using the following diagram
    with RoCEv2 –
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们通过以下带有RoCEv2的简单GPU到GPU通信图来理解 –
- en: '![](../Images/71d5ea813496487b66af460562e09c9e.png)'
  id: totrans-63
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/71d5ea813496487b66af460562e09c9e.png)'
- en: 'GPU-to-GPU Communication using RoceV2 (source: author)'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 使用RoCEv2的GPU到GPU通信（来源：作者）
- en: GPU 1 hands off data to its NIC, skipping the CPU.
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: GPU 1 将数据传递给其NIC，跳过了CPU。
- en: The NIC wraps the RDMA write in UDP/IP and sends it over Ethernet.
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 网络接口卡（NIC）将RDMA写入操作封装在UDP/IP中，并通过以太网发送。
- en: Data flows through standard Ethernet switches configured with PFC and ECN.
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据通过配置了PFC和ECN的标准以太网交换机流动。
- en: The receiving NIC writes the data directly to GPU 2’s memory.
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 接收端的NIC将数据直接写入GPU 2的内存。
- en: '**Strength**'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: '**优势**'
- en: '**Cost-effective**  – RoCEv2 runs on standard Ethernet hardware, so you don’t
    need a specialized network fabric or vendor-locked components.'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: '**经济高效** – RoCEv2在标准以太网硬件上运行，因此您不需要专用的网络布线或供应商锁定组件。'
- en: '**Easier to deploy**  –  Since it uses familiar IP-based networking, it’s easier
    for teams already managing Ethernet data centers to adopt.'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: '**易于部署** – 由于它使用熟悉的基于IP的网络，因此对于已经管理以太网数据中心的人来说更容易采用。'
- en: '**Flexible integration**  –  RoCEv2 works well in mixed environments and integrates
    easily with existing Layer 3 networks.'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: '**灵活集成** – RoCEv2在混合环境中表现良好，并且可以轻松集成到现有的第3层网络中。'
- en: '**Weaknesses**'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: '**劣势**'
- en: '**Requires tuning**  – To avoid packet loss, RoCEv2 depends on careful configuration
    of PFC, ECN, and congestion control. Poor tuning can hurt performance.'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: '**需要调整** – 为了避免数据包丢失，RoCEv2依赖于对PFC、ECN和拥塞控制的仔细配置。配置不当会影响性能。'
- en: '**Less deterministic**  – Unlike InfiniBand’s tightly controlled environment,
    Ethernet-based networks can introduce variability in latency and jitter.'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: '**确定性较低** – 与InfiniBand的严格控制环境不同，基于以太网的网络可能会在延迟和抖动中引入可变性。'
- en: '**Complex at scale**  –  As clusters grow, maintaining a lossless Ethernet
    fabric with consistent behavior becomes increasingly difficult.'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: '**规模复杂** – 随着集群的增长，维护具有一致行为的无损以太网布线变得越来越困难。'
- en: Conclusion
  id: totrans-77
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 结论
- en: In a large-scale GPU cluster, compute power is worthless if the network can’t
    handle the load. Network performance becomes just as vital as the GPUs because
    it holds the whole system together. Technologies like RDMA and GPUDirect RDMA
    help cut out the usual slowdowns by getting rid of unnecessary interruptions and
    CPU copying, letting GPUs talk directly to each other.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 在大规模GPU集群中，如果网络无法处理负载，计算能力就毫无价值。网络性能变得与GPU一样重要，因为它将整个系统连接在一起。像RDMA和GPUDirect
    RDMA这样的技术通过消除不必要的中断和CPU复制，让GPU能够直接相互通信，从而减少了通常的延迟。
- en: Both InfiniBand and RoCEv2 speed up GPU-to-GPU communication, but they take
    different approaches. InfiniBand builds its own dedicated network setup. It provides
    excellent speed and low latency, but at a very high cost. RoCEv2 provides more
    flexibility by using the existing Ethernet setup. It’s easier on the budget, but
    it needs proper tuning of PFC and ECN to make it work.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: InfiniBand和RoCEv2都加快了GPU到GPU的通信，但它们采取了不同的方法。InfiniBand构建了自己的专用网络设置。它提供了出色的速度和低延迟，但成本非常高。RoCEv2通过使用现有的以太网设置提供了更多的灵活性。它在预算上更容易接受，但需要正确调整PFC和ECN才能使其工作。
- en: At the end of the day, it’s a classic trade-off. Go with InfiniBand if your
    top priority is getting the absolute best performance possible, and budget is
    less of a concern. But if you want a more flexible solution that works with your
    existing network gear and costs less upfront, RoCEv2 is the way to go.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，这是一个典型的权衡。如果您最关心的是获得尽可能最佳的性能，并且预算不是问题，那么选择InfiniBand。但如果您想要一个更灵活的解决方案，该方案与您现有的网络设备兼容，并且前期成本较低，那么RoCEv2是最佳选择。
