- en: How GenAI Tools Have Changed My Work as a Data Scientist
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/how-genai-tools-have-changed-my-work-as-a-data-scientist-0476d3724d42/](https://towardsdatascience.com/how-genai-tools-have-changed-my-work-as-a-data-scientist-0476d3724d42/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![(Image by the author)](../Images/38418ba163c123ed05436c3de8dc80bc.png)'
  prefs: []
  type: TYPE_IMG
- en: (Image by the author)
  prefs: []
  type: TYPE_NORMAL
- en: It has been slightly more than two years since ChatGPT came out and started
    the hype around GenAI. Since then many things have happened. GenAI tools came
    and went. The ones that stayed became better and better, extending to more use
    cases.
  prefs: []
  type: TYPE_NORMAL
- en: Over the last year, I began to integrate some GenAI tools more and more into
    my daily work. I tried different GenAI tools and different use cases.
  prefs: []
  type: TYPE_NORMAL
- en: In this article, I will share how GenAI tools help me in my daily work. I will
    share what GenAI tools I use, and how they have changed my work as a Data Scientist.
    I will talk about how they have increased my productivity and also some words
    of warning.
  prefs: []
  type: TYPE_NORMAL
- en: Generally, I use GenAI tools for many things as they allow me to
  prefs: []
  type: TYPE_NORMAL
- en: increase my productivity in some areas
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: focus on the important and hard stuff that adds value
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: increase the quality of my work
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: learn faster and easier
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I am more productive as I can iterate faster and try more things as I do not
    need to write all the code myself. As GenAI tools take over some of the easy but
    time-consuming parts of my work, I have more time to spend on strategic thinking,
    complex problem-solving, and being creative. Moreover, they help me to increase
    the quality of my work in many areas, not only when it comes to writing code.
    Finally, GenAI tools help me learn new things faster as I can create a learning
    path that suits me best.
  prefs: []
  type: TYPE_NORMAL
- en: But how does this look in detail?
  prefs: []
  type: TYPE_NORMAL
- en: Let’s jump right into it.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '**My (current) use cases for GenAI tools**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'I have four use cases for which I use GenAI tools daily:'
  prefs: []
  type: TYPE_NORMAL
- en: learning
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: coding
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: documentation
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: writing
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Learning**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: When it comes to learning, GenAI tools help me in different ways
  prefs: []
  type: TYPE_NORMAL
- en: brainstorm ideas, refine ideas, and get new input
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: get an overview of a new topic
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: explain concepts and research papers
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: learn new programming languages
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The main benefit of using GenAI tools for learning is that I can ask many questions.
    This allows me to approach a topic that is new to me from different angles. I
    do not need to search hundreds of websites to find an explanation that suits me.
    The GenAI tools can generate many examples on the spot.
  prefs: []
  type: TYPE_NORMAL
- en: This has greatly sped up my learning and improved my learning experience. For
    all these tasks, the GenAI tools helped me get a good overview. However, it is
    often not enough when it comes to details or complex concepts described in research
    papers. Hence, I use the GenAI tools as a first go-to source but then dive into
    the details the old-school way. Read the research paper or go through a few websites.
    But since I already have some good basis thanks to the GenAI tools, understanding
    research papers has become a lot easier and faster as well.
  prefs: []
  type: TYPE_NORMAL
- en: For my learning tasks, I mostly use ChatGPT, Claude, and Perplexity AI, depending
    on the exact task.
  prefs: []
  type: TYPE_NORMAL
- en: Perplexity AI has partly replaced my Google search. It is much faster than clicking
    through many links on Google, trying to find a good answer. Moreover, it gives
    a better-organized answer. However, the biggest benefit for me compared to other
    tools is that it adds sources to the statements. This makes it easy to verify
    the answer and tell how trustworthy the information is. Moreover, I already have
    a starting point to dig deeper if needed.
  prefs: []
  type: TYPE_NORMAL
- en: The quality of the results strongly depends on the prompt. The better your prompt,
    the more helpful the result. I usually try to be as detailed as possible and give
    some context and keywords the answer should focus on. Often it also helps when
    specifying a role, for example, "act as an expert in …" or let the AI tool give
    you alternatives. However, I am not a great prompt writer and there is room for
    improvement.
  prefs: []
  type: TYPE_NORMAL
- en: '**Coding**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: GenAI tools have greatly improved my coding experience and skills. In general,
    GenAI tools have changed what I spend most time on when coding. The tools help
    me be quicker in solving small and easy tasks as well as building prototypes.
    Thus, I have more time to focus on complex problems or try more approaches.
  prefs: []
  type: TYPE_NORMAL
- en: I use the tools mainly for
  prefs: []
  type: TYPE_NORMAL
- en: code generation
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: code improvements/refactoring
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: error investigation
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: understanding third-party libraries and their documentation
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Using AI tools has become a natural part of my coding. This is mostly because
    of GitHub Copilot’s auto-complete / suggestion function. I can easily accept or
    decline suggestions and do not have to think about "asking" for help.
  prefs: []
  type: TYPE_NORMAL
- en: When it comes to code generation I use GenAI tools in two ways.
  prefs: []
  type: TYPE_NORMAL
- en: If I know how to implement an idea and already have the steps in mind, I go
    step by step and use GitHub Copilot’s auto-complete function. This is usually
    a good enough start. However, as the output does not always work or does what
    I want I pay special attention to the desired behavior.
  prefs: []
  type: TYPE_NORMAL
- en: If I know what the result should look like but have no idea how to get there,
    I use ChatGPT or Claude to show me different approaches. This has greatly improved
    my work. Before, I had to tediously search the internet to get ideas for my specific
    problem. This search usually took a lot of time before finding the right thing
    (if I found it at all). Now I write a few prompts until I have what I want. I
    use ChatGPT or Claude as they give different suggestions and it is hard to know
    which one works better for a specific problem.
  prefs: []
  type: TYPE_NORMAL
- en: For example, I often use ChatGPT or Claude to generate plots for data analysis
    as it is much faster. Without the tools, it took me a lot of time to get a matplotlib
    plot to look like I wanted. Especially when I wanted to deviate from the easy
    and standard plots.
  prefs: []
  type: TYPE_NORMAL
- en: In some use cases, I also use GenAI tools to help me generate unit tests. I
    am not using the tools to create entire unit tests but to give me a starting point
    and a basis to build on. Building this basis is usually tedious and takes a lot
    of time. For this, I use GitHub Copilot as the tool is aware of the code base
    and can give me better suggestions. However, as the unit tests ensure the robustness
    of the code, I rely as little as possible on the GenAI tools.
  prefs: []
  type: TYPE_NORMAL
- en: Once I have a first version of the code I often use GitHub Copilot to refactor
    the code, improving code readability and conciseness. This is because almost always
    the first version is a mess. It’s inefficient, looks messy, and is too convoluted.
    It reflects my thinking when developing and testing ideas. It is far away from
    being production-ready. Here, GitHub Copilot’s suggestions are often a good first
    step. They also help me to learn different ways to solve a problem.
  prefs: []
  type: TYPE_NORMAL
- en: When investigating errors, AI tools have helped me a lot. Sometimes the error
    message is unclear, particularly when learning a new programming language. Using
    GenAI tools helps me avoid googling for hours and reading through lots of Stackoverflow
    posts. I mostly use GitHub Copilot as it knows the context without me needing
    to copy the code. This works well for easy errors and bugs. Although it usually
    does not work well for more complex errors the answers indicate what to look for.
    I rarely use ChatGPT or Claude to explain error messages as they miss context.
  prefs: []
  type: TYPE_NORMAL
- en: My last use case when it comes to coding, is probably the most interesting.
    I use GenAI tools to find and explain the functionalities of third-party libraries.
    The documentation of these libraries is sometimes not very user-friendly. It is
    hard to find what I am looking for and/or understand. Using ChatGPT to search
    documentation and act as a translator helped me many times. With this, the hassle
    of finding and using the functionality of third-party libraries decreased.
  prefs: []
  type: TYPE_NORMAL
- en: '**Documentation**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Documenting my code has always been a tedious and unwanted work for me. Writing
    docstrings and ReadMes always took a lot of time, which I wanted to spend elsewhere.
  prefs: []
  type: TYPE_NORMAL
- en: Letting GenAI tools support me in writing documentation has been one of my first
    use cases. My go-to tool is GitHub Copilot as it is nicely integrated with my
    IDE. Hence, I do not need to copy/paste code blocks between my IDE and a GenAI
    tool.
  prefs: []
  type: TYPE_NORMAL
- en: GitHub Copilot takes over most of the work now for writing docstrings and ReadMes.
    I only refine the suggestions and do smaller re-writes.
  prefs: []
  type: TYPE_NORMAL
- en: '**Writing**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Using AI tools has greatly improved and sped up my writing process. As I am
    not a native English speaker I mostly use Grammarly to check my grammar and spelling.
    With this, I can focus on writing and editing. I do not need to spend hours fixing
    grammar and spelling mistakes. Moreover, I use Grammarly and Hemmingway AI to
    suggest where to improve my writing. Here, I mostly focus on sentences that are
    hard to read and understand.
  prefs: []
  type: TYPE_NORMAL
- en: However, I only use these tools to make suggestions. I do not use any GenAI
    tools to write entire paragraphs or re-write my articles. This has two reasons.
    First, by rewriting entire paragraphs, the text would lose my personality and
    change my writing style. The articles would become boring and less interesting
    to read. Second, I see writing as a big part of my learning process. Writing helps
    me to uncover knowledge gaps, bring order into my ideas, and connect the dots.
    Letting GenAI tools do the writing would take away the benefit of writing for
    my learning process.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '**Words of Warnings**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Although GenAI tools can help us with many things, we should also be cautious
    when using them. They are a double-edged sword as they have some caveats.
  prefs: []
  type: TYPE_NORMAL
- en: Most importantly, we should not rely too much on GenAI tools. We should not
    blindly trust the answers but always critically reflect on the answers. This is
    due to the hallucination of these tools. The GenAI tool gives you a seemingly
    correct answer which sounds reasonable, but the answer is wrong.
  prefs: []
  type: TYPE_NORMAL
- en: When it comes to learning, GenAI tools can prevent us from learning as much
    as they can help us learn. A big part of learning (at least for me) is to think
    critically about a topic, understand the fundamentals, and make connections to
    other subjects I am already familiar with. This takes time and can be hard work.
    With GenAI tools, I can ask anything and get a well-prepared answer. This is easy
    in the short term. However, as I do not do the hard work I need to learn a new
    subject, I quickly forget what I "learned". Hence, we should be cautious that
    the GenAI tools enhance how we learn and we continue learning new skills and extend
    our knowledge.
  prefs: []
  type: TYPE_NORMAL
- en: When it comes to coding, GenAI tools can slow us down as much as they can speed
    us up. Often the code contains bugs or does not exactly do what it is supposed
    to do. I would say it is fine when there is an obvious mistake but it is a problem
    when these errors become very subtle. It can be hard and time-consuming to validate
    that the code is correct and does not introduce obvious bugs. Hence, in the end,
    you could have been faster without using a GenAI tool. Thus, I only let the GenAI
    tools generate small code pieces. This makes it easy to ensure that the code does
    exactly what I want. However, these simpler tasks took up most of my time before
    I used GenAI tools.
  prefs: []
  type: TYPE_NORMAL
- en: Lastly, we should think about what we share with such tools. I try not to share
    any private data because I do not know what will happen with it once I send my
    request. This is particularly important when it comes to company data. I usually
    create simplified use cases and code examples that represent my problem before
    asking ChatGPT or Claude. Moreover, I do not use any Analytics functionality on
    complete data sets.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '**Conclusion**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Looking at my use cases for GenAI tools and how they have changed my work as
    a Data Scientist you might wonder if I could work without them. Yes, I could.
  prefs: []
  type: TYPE_NORMAL
- en: But do I want to? No, as they have improved my work in certain areas.
  prefs: []
  type: TYPE_NORMAL
- en: There are caveats but they are outweighed by the overall benefit. Moreover,
    GenAI tools are getting better and better. The development over the last two years
    has been amazing and jaw-dropping. New tools are coming up and existing ones improve
    quickly. We can use GenAI tools for more and more use cases.
  prefs: []
  type: TYPE_NORMAL
- en: There are probably many more use cases and AI tools to help us in our daily
    work as Data Scientists. Hence, let me know in the comments what tools you use
    and what use cases you have. Otherwise, see you in my next article.
  prefs: []
  type: TYPE_NORMAL
