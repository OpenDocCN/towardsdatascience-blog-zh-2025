- en: Motivation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: My motivation for this article is that I am consistently developing new applications
    using LLMs. LLMs are generalized tools that can be applied to most text-dependent
    tasks such as classification, summarization, information extraction, and much
    more. Furthermore, the rise of vision language models also enable us to handle
    images similar to how we handle text.
  prefs: []
  type: TYPE_NORMAL
- en: I often encounter the problem that my LLM applications are inconsistent. Sometimes
    the LLM doesn’t respond in the desired format, or I am unable to properly parse
    the LLM response. This is a huge problem when you are working in a production
    setting and are fully dependent on consistency in your application. I will thus
    discuss the techniques I use to ensure reliability for my applications in a production
    setting.
  prefs: []
  type: TYPE_NORMAL
- en: Ensuring output consistency
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Markup tags
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'To ensure output consistency, I use a technique where my LLM answers in markup
    tags. I use a system prompt like:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'And the model will almost always respond with:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 'You can now easily parse out the response using the following code:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: The reason using markup tags works so well is that this is how the model is
    trained to behave. When OpenAI, Qwen, Google, and others train these models, they
    use markup tags. The models are thus super effective at utilizing these tags and
    will, in almost all cases, adhere to the expected response format.
  prefs: []
  type: TYPE_NORMAL
- en: For example, with reasoning models, which have been on the rise lately, the
    models first do their thinking enclosed in <think> … </think> tags, and then provide
    their answer to the user.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 'Furthermore, I also try to use as many markup tags as possible elsewhere in
    my prompts. For example, if I am providing a few shot examples to my model, I
    will do something like:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: 'I do two things that help the model perform here:'
  prefs: []
  type: TYPE_NORMAL
- en: I provide examples in <example></example> tags.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In my examples, I ensure to adhere to my own expected response format, using
    the <answer></answer tags>
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Using markup tags, you can thus ensure a high level of output consistency from
    your LLM
  prefs: []
  type: TYPE_NORMAL
- en: Output validation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '[Pydantic](https://docs.pydantic.dev/latest/) is a tool you can use to ensure
    and validate the output of your LLMs. You can define types and validate that the
    output of the model adheres to the type we expect. For example, you can follow
    the example below, based on [this article](https://pydantic.dev/articles/llm-intro):'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: As you can see, we prompt GPT to respond with a JSON object, and we then run
    Pydantic to ensure the response is as we expect.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 'I would also like to note that sometimes it’s easier to simply create your
    own output validation function. In the last example, the only requirements for
    the response object are essentially that the response object contains the keys name, email,
    and phone, and that all of those are of the string type. You can validate this
    in Python with a function:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: With this, you do not have to install any packages, and in a lot of cases, it
    is easier to set up.
  prefs: []
  type: TYPE_NORMAL
- en: Tweaking the system prompt
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'You can also make several other tweaks to your system prompt to ensure a more
    reliable output. I always recommend making your prompt as structured as possible,
    using:'
  prefs: []
  type: TYPE_NORMAL
- en: Markup tags as mentioned earlier
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Lists, such as the one I am writing in here
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In general, you should also always ensure clear instructions. You can use the
    following to ensure the quality of your prompt
  prefs: []
  type: TYPE_NORMAL
- en: If you gave the prompt to another human, that had never seen the task before,
    and with no prior knowledge of the task. Would the human be able to perform the
    task effectively?
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: If you cannot have a human do the task, you usually cannot expect an AI to do
    it (at least for now).
  prefs: []
  type: TYPE_NORMAL
- en: Handling errors
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Errors are inevitable when dealing with LLMs. If you perform enough API calls,
    it is almost certain that sometimes the response will not be in your desired format,
    or another issue.
  prefs: []
  type: TYPE_NORMAL
- en: 'In these scenarios, it’s important that you have a robust application equipped
    to handle such errors. I use the following techniques to handle errors:'
  prefs: []
  type: TYPE_NORMAL
- en: Retry mechanism
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Increase the temperature
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Have backup LLMs
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Now, let me elaborate on each point.
  prefs: []
  type: TYPE_NORMAL
- en: Exponential backoff retry mechanism
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: It’s important to have a retry mechanism in place, considering a lot of issues
    can occur when making an API call. You might encounter issues such as rate limiting,
    incorrect output format, or a slow response. In these scenarios, you must ensure
    to wrap the LLM call in a try-catch and retry. Usually, it’s also smart to use
    an exponential backoff, especially for rate-limiting errors. The reason for this
    is to ensure you wait long enough to avoid further rate-limiting issues.
  prefs: []
  type: TYPE_NORMAL
- en: Temperature increase
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: I also sometimes recommend increasing the temperature a bit. If you set the
    temperature to 0, you tell the model to act deterministically. However, sometimes
    this can have a negative effect.
  prefs: []
  type: TYPE_NORMAL
- en: For example, if you have an input example where the model failed to respond
    in the proper output format. If you retry this using a temperature of 0, you are
    likely to just experience the same issue. I thus recommend you set the temperature
    to a bit higher, for example 0.1, to ensure some stochasticness in the model,
    while also ensuring its outputs are relatively deterministic.
  prefs: []
  type: TYPE_NORMAL
- en: 'This is the same logic that a lot of agents use: a higher temperature.'
  prefs: []
  type: TYPE_NORMAL
- en: They need to avoid being stuch in a loop. Having a higher temperature can help
    them avoid repetitive errors.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Backup LLMs
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Another powerful method to deal with errors is to have backup LLMs. I recommend
    using a chain of LLM providers for all your API calls. For example, you first
    try [OpenAI](https://openai.com/news/), if that fails, you use [Gemini](https://gemini.google.com/app),
    and if that fails, you can use [Claude](https://www.anthropic.com/api).
  prefs: []
  type: TYPE_NORMAL
- en: 'This ensures reliability in the event of provider-specific issues. These could
    be issues such as:'
  prefs: []
  type: TYPE_NORMAL
- en: The server is down (for example, if OpenAI’s API is not available for a period
    of time)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Filtering (sometimes, an LLM provider will refuse to answer your request if
    it believes your request is in violation of jailbreak policies or content moderation)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In general, it is simply good practice not to be fully dependent on one provider.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this article, I have discussed how you can ensure reliability in your LLM
    application. LLM applications are inherently stochastic because you cannot directly
    control the output of an LLM. It is thus important to ensure you have proper policies
    in place, both to minimize the errors that occur and to handle the errors when
    they occur.
  prefs: []
  type: TYPE_NORMAL
- en: 'I have discussed the following approaches to minimize errors and handle errors:'
  prefs: []
  type: TYPE_NORMAL
- en: Markup tags
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Output validation
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Tweaking the system prompt
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Retry mechanism
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Increase the temperature
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Have backup LLMs
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If you combine these techniques into your application, you can achieve both
    a powerful and robust LLM application.
  prefs: []
  type: TYPE_NORMAL
