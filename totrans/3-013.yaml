- en: 'Retrieval Augmented Classification: Improving Text Classification with External
    Knowledge'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/retrieval-augmented-classification-improving-text-classification-with-external-knowledge/](https://towardsdatascience.com/retrieval-augmented-classification-improving-text-classification-with-external-knowledge/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1746589026776" class="mdspan-comment">Text</mdspan> classification
    stands as one of the most basic yet most important applications of natural language
    processing. It has a vital role in many real-world applications that go from filtering
    unwanted emails like spam, detecting product categories or classifying user intent
    in a chat-bot application. The default way of building text classifiers is to
    gather large amounts of labeled data, meaning input texts and their corresponding
    labels, and then training a custom Machine Learning model. Things changed a bit
    as LLMs became more powerful, where you can often get decent performance by using
    general purpose large language models as zero-shot or few-shot classifiers, significantly
    reducing the time-to-deployment of text classification services. However, the
    accuracy can lag behind custom built models and is highly dependent on crafting
    custom prompts to better define the classification task to the LLM. In this blog,
    we aim at minimizing the gap between custom ML models for classification and general
    purpose LLMs while also minimizing the effort needed in adapting the LLM prompt
    to your task.
  prefs: []
  type: TYPE_NORMAL
- en: LLMs vs Custom ML models for text classification
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Pros:**'
  prefs: []
  type: TYPE_NORMAL
- en: Let’s first explore the pro and cons of each of the two approaches to do text
    classification.
  prefs: []
  type: TYPE_NORMAL
- en: '**Large language models as general purpose classifiers:**'
  prefs: []
  type: TYPE_NORMAL
- en: High generalization ability given the vast pre-training corpus and reasoning
    abilities of the LLM.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: A single general purpose LLM can handle multiple classifications tasks without
    the need to deploy a model for each.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: As LLMs continue to improve, you can potentially enhance accuracy with minimal
    effort simply by adopting newer, more powerful models as they become available.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The availability of most LLMs as managed services significantly reduces the
    deployment knowledge and effort required to get started.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: LLMs often outperform custom ML models in low-data scenarios where labeled data
    is limited or costly to obtain.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: LLMs generalize to multiple languages.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: LLMs can be cheaper when having low or unpredictable volumes of predictions
    if you pay per token.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Class definitions can be changed dynamically without retraining by simply modifying
    the prompts.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Cons:**'
  prefs: []
  type: TYPE_NORMAL
- en: LLMs are prone to hallucinations.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: LLMs can be slow, or at least slower than small custom ML models.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: They require prompt engineering effort.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: High-throughput applications using LLMs-as-a-service may quickly encounter quota
    limitations.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: This approach becomes less effective with a very large number of potential classes
    due to context size constraints. Defining all the classes would consume a significant
    portion of the available and effective input context.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: LLMs usually have worse accuracy than custom models in the high data regime.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Custom Machine learning models:**'
  prefs: []
  type: TYPE_NORMAL
- en: '**Pros:**'
  prefs: []
  type: TYPE_NORMAL
- en: Efficient and fast.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: More flexible in architecture choice, training and serving method.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Ability to add interpretability and uncertainty estimation aspects to the model.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Higher accuracy in the high data regime.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: You keep control of your model and serving infrastructure.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Cons:**'
  prefs: []
  type: TYPE_NORMAL
- en: Requires frequent re-trainings to adapt to new data or distribution changes.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: May need significant amounts of labeled data.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Limited generalization.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Sensitive to out-of-domain vocabulary or formulations.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Requires MLOps knowledge for deployment.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Bridging the gap between custom text classifier and LLMs:'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let’s work on a way to keep the pros of using LLMs for classification while
    alleviating some of the cons. We will take inspiration from RAG and use a prompting
    technique called few-shot prompting.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s define both:'
  prefs: []
  type: TYPE_NORMAL
- en: '**RAG**'
  prefs: []
  type: TYPE_NORMAL
- en: Retrieval Augmented Generation is a popular method that augments the LLM context
    with external knowledge before asking a question. This reduces the likelihood
    of hallucination and improves the quality of the responses.
  prefs: []
  type: TYPE_NORMAL
- en: '**Few-shot prompting**'
  prefs: []
  type: TYPE_NORMAL
- en: In each classification task, we show the LLM examples of inputs and expected
    outputs as part of the prompt to help it understand the task.
  prefs: []
  type: TYPE_NORMAL
- en: Now, the main idea of this project is mixing both. We dynamically fetch examples
    that are the most similar to the text query to be classified and inject them as
    few-shot example prompts. We also limit the scope of possible classes dynamically
    using those of the K-nearest neighbors. This frees up a significant amount of
    tokens in the input context when working with a classification problem with a
    large number of possible classes.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here is how that would work:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/3902827ae3fe7d4860d3349ff63541f2.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Let’s go through the practical steps of getting this approach to run:'
  prefs: []
  type: TYPE_NORMAL
- en: Building a knowledge base of labeled input text / category pairs. This will
    be our source of external knowledge for the LLM. We will be using ChromaDB.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: This class handles creating a collection and embedding each document’s before
    inserting it into the vector index. We use BAAI/bge-small-en-v1.5 but any embedding
    model would work, even those available as-a-service from Gemini, OpenAI, or Nebius.
  prefs: []
  type: TYPE_NORMAL
- en: Finding the K nearest neighbors for an input text
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: This method returns the documents in the vector database that are most similar
    to our input.
  prefs: []
  type: TYPE_NORMAL
- en: Building the Retrieval Augmented Classifier
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: The first part of the code defines the structure of the output we expect from
    the LLM. The Pydantic class has two fields, the reasoning, used for chain-of-though
    prompting ([https://www.promptingguide.ai/techniques/cot](https://www.promptingguide.ai/techniques/cot))
    and the predicted category.
  prefs: []
  type: TYPE_NORMAL
- en: The predict method first finds the K nearest neighbors and uses them as few-shot
    prompts by creating a synthetic message history as if the LLM gave the correct
    categories for each of the KNN, then we inject the query text as the last human
    message.
  prefs: []
  type: TYPE_NORMAL
- en: We filter the value to check if it is valid and if so, return it.
  prefs: []
  type: TYPE_NORMAL
- en: 'Example prediction:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: Both inputs return the prediction “PrimeMinister” even though the second example
    is in french while the training dataset is fully in English. This illustrates
    the generalization abilities of this approach even across similar languages.
  prefs: []
  type: TYPE_NORMAL
- en: 'Evaluation:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We use the **DBPedia Classes** dataset’s l3 categories ([https://www.kaggle.com/datasets/danofer/dbpedia-classes](https://www.kaggle.com/datasets/danofer/dbpedia-classes)
    ,License [CC BY-SA 3.0](https://en.wikipedia.org/wiki/Wikipedia:Text_of_Creative_Commons_Attribution-ShareAlike_3.0_Unported_License).)
    for our evaluation. This dataset has more than 200 categories and 240000 training
    samples.
  prefs: []
  type: TYPE_NORMAL
- en: 'We benchmark the Retrieval Augmented Classification approach against a simple
    KNN classifier with majority vote and obtain the following results the DBpedia
    dataset’s **l3 categories**:'
  prefs: []
  type: TYPE_NORMAL
- en: '|  | Accuracy | Average Latency | Throughput (multi-threaded) |'
  prefs: []
  type: TYPE_TB
- en: '| KNN classifier | 87% | **24ms** | **108** predictions / s |'
  prefs: []
  type: TYPE_TB
- en: '| LLM only classifier | 88% | ~600ms | 47 predictions / s |'
  prefs: []
  type: TYPE_TB
- en: '| RAC | **96%** | ~1s | 27 predictions / s |'
  prefs: []
  type: TYPE_TB
- en: By reference, the best accuracy I found on Kaggle notebooks for this dataset’s
    l3 level was around *94%* using custom ML models.
  prefs: []
  type: TYPE_NORMAL
- en: We note that combining a KNN search with the reasoning abilities of an LLM allows
    us to gain +9% accuracy points but comes at a cost of a lower throughput and higher
    latency.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this project we built a text classifier that leverages “retrieval” to boost
    the ability of an LLM to find the correct category of the input content. This
    approach offers several advantages over traditional ML text classifiers. These
    include the ability to dynamically change the training dataset without retraining,
    a higher generalization ability due to the reasoning and general knowledge of
    LLMs, easy deployment when using managed LLM services compared to custom ML models,
    and the capability to handle multiple classification tasks with a single base
    LLM model. This comes at a cost of higher latency and lower throughput and a risk
    of LLM vendor lock-in.
  prefs: []
  type: TYPE_NORMAL
- en: This method should not be your first go-to when working on a classification
    task but would still be useful as part of your toolbox when your application can
    benefit from the flexibility of not having to re-train a classifier every time
    the data changes or when working with a small amount of labeled data. It can also
    allow you to get a target of having a classification service up and running very
    quickly when a deadline is looming 😃.
  prefs: []
  type: TYPE_NORMAL
- en: 'Sources:'
  prefs: []
  type: TYPE_NORMAL
- en: '[[1] G. Yu, L. Liu, H. Jiang, S. Shi and X. Ao, Retrieval-Augmented Few-shot
    Text Classification (2023), Findings of the Association for Computational Linguistics:
    EMNLP 2023](https://aclanthology.org/2023.findings-emnlp.447.pdf)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[[2] A. Long, W. Yin, T. Ajanthan, V. Nguyen, P. Purkait, R. Garg, C. Shen
    and A. van den Hengel, Retrieval augmented classification for long-tail visual
    recognition (2022)](https://www.amazon.science/publications/retrieval-augmented-classification-for-long-tail-visual-recognition)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Code: [https://github.com/CVxTz/retrieval_augmented_classification](https://github.com/CVxTz/retrieval_augmented_classification)'
  prefs: []
