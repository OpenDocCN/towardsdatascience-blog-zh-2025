- en: 'SENet Paper Walkthrough: The Channel-Wise Attention'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: SENet 论文解读：通道注意力
- en: 原文：[https://towardsdatascience.com/the-channel-wise-attention/](https://towardsdatascience.com/the-channel-wise-attention/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/the-channel-wise-attention/](https://towardsdatascience.com/the-channel-wise-attention/)
- en: <mdspan datatext="el1754434926679" class="mdspan-comment">Introduction</mdspan>
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1754434926679" class="mdspan-comment">引言</mdspan>
- en: When we talk about attention in computer vision, one thing that probably comes
    to your mind first is the one used in the Vision Transformer (ViT) architecture.
    In fact, that’s not the only attention mechanism we have for image data. There
    is actually another one called Squeeze and Excitation Network (SENet). If the
    attention in ViT operates spatially, i.e., assigning weights to different patches
    of an image, the attention mechanism proposed in SENet operates in channel-wise
    manner, i.e., assigning weights to different channels. — In this article, we are
    going to discuss how the Squeeze and Excitation architecture works, how to implement
    it from scratch, and how to integrate the network into the ResNeXt model.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们谈论计算机视觉中的注意力时，首先可能想到的是在 Vision Transformer (ViT) 架构中使用的注意力。事实上，我们用于图像数据的注意力机制不止这一种。实际上还有一种叫做
    Squeeze and Excitation Network (SENet) 的机制。如果 ViT 中的注意力在空间上操作，即分配权重给图像的不同区域，那么
    SENet 中提出的注意力机制在通道上操作，即分配权重给不同的通道。— 在这篇文章中，我们将讨论 Squeeze and Excitation 架构的工作原理，如何从头开始实现它，以及如何将网络集成到
    ResNeXt 模型中。
- en: '* * *'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: The Squeeze and Excitation Module
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Squeeze 和 Excitation 模块
- en: SENet, which was first proposed in a paper titled “*Squeeze-and-Excitation Networks*”
    by Hu *et al.* [1], is not a standalone network like VGG, Inception, or ResNet.
    Instead, it is actually a building block to be placed on an existing network.
    In CNN-based models, we assume that pixels spatially close to each other have
    high correlations, which is the reason that we employ small-sized kernels to capture
    these correlations. This kind of assumption is basically the *inductive bias*
    of CNN. On the other hand, SENet introduces a new inductive bias, where the authors
    assume that every image channel contributes differently to predicting a specific
    class. By applying SE modules to a CNN, the model not only relies on spatial patterns
    but also captures the importance of each channel. To better illustrate this, we
    can think of an image of fire, where the red channel would theoretically give
    a higher contribution to the final prediction than the blue and green channels.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: SENet，首次在名为“*Squeeze-and-Excitation Networks*”的论文中提出，由 Hu 等人 [1] 完成，它不是一个像 VGG、Inception
    或 ResNet 这样的独立网络。相反，它实际上是一个可以放置在现有网络上的构建块。在基于 CNN 的模型中，我们假设空间上彼此靠近的像素具有高度相关性，这就是我们使用小尺寸核来捕获这些相关性的原因。这种假设基本上是
    CNN 的 *归纳偏差*。另一方面，SENet 引入了一种新的归纳偏差，其中作者假设每个图像通道对预测特定类别有不同的贡献。通过将 SE 模块应用于 CNN，模型不仅依赖于空间模式，还捕获了每个通道的重要性。为了更好地说明这一点，我们可以想象一幅火焰的图像，其中红色通道理论上对最终预测的贡献将高于蓝色和绿色通道。
- en: 'The structure of the SE module itself is shown in Figure 1\. As the name of
    the network suggests, there are two main steps done in this module: *squeeze*
    and *excitation*. The *squeeze* part corresponds to the operation denoted as *F_sq*,
    while the *excitation* part includes both *F_ex* and *F_scale*. On the other hand,
    the *F_tr* operation, is actually not the part of the SE module. Rather, it represents
    a transformation function that originally belongs to the model where the SE module
    is applied. For example, if we were to place this SE module on ResNet, the *F_tr*
    operation refers to the stack of convolution layers within the bottleneck block.'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: SE 模块的结构如图 1 所示。正如网络名称所暗示的，在这个模块中执行了两个主要步骤：*squeeze* 和 *excitation*。*squeeze*
    部分对应于标记为 *F_sq* 的操作，而 *excitation* 部分包括 *F_ex* 和 *F_scale*。另一方面，*F_tr* 操作实际上不是
    SE 模块的一部分。相反，它代表了一个原本属于应用 SE 模块模型的转换函数。例如，如果我们把此 SE 模块放在 ResNet 上，*F_tr* 操作指的是瓶颈块内的卷积层堆叠。
- en: '![](../Images/6f3707c370be15b9612d05c980e2a15f.png)'
  id: totrans-8
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/6f3707c370be15b9612d05c980e2a15f.png)'
- en: Figure 1\. The structure of the Squeeze and Excitation module [1].
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1. Squeeze 和 Excitation 模块的结构 [1]。
- en: Talking more specifically about the *F_sq* operation, it essentially works by
    utilizing global average pooling mechanism, where it is used to capture the information
    from the entire spatial dimension of each channel. By doing so, every channel
    of the input tensor is going to be represented by a single number, which is basically
    just the average value of the corresponding channel. The authors refer to this
    operation as *global information embedding*. Mathematically speaking, this can
    formally be written in the equation shown in Figure 2, where we basically sum
    all values across the height *H* and width *W* before eventually dividing it with
    the number of pixels within that channel (*H×W*).
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 更具体地来说，关于 *F_sq* 操作，它本质上是通过利用全局平均池化机制来工作的，其中它被用来从每个通道的整个空间维度中捕获信息。通过这样做，输入张量的每个通道都将由一个单一的数字来表示，这基本上就是对应通道的平均值。作者将这个操作称为
    *全局信息嵌入*。从数学的角度讲，这可以正式地用图2中所示的方程来表示，其中我们基本上将高度 *H* 和宽度 *W* 上的所有值相加，然后再除以该通道内的像素数（*H×W*）。
- en: '![](../Images/8bba73d8e9294418e34b497dc3066c45.png)'
  id: totrans-11
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/8bba73d8e9294418e34b497dc3066c45.png)'
- en: Figure 2\. The mathematical expression of the global average pooling mechanism
    in SE module [1].
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 图2. SE模块中全局平均池化机制的数学表达式 [1]。
- en: Meanwhile, both excitation and scaling operations are referred to as *adaptive
    recalibration* since what they essentially do is to dynamically adjust the weightings
    of each channel in the input tensor according to its importance. In fact, the
    diagram in Figure 1 does not completely depict the entire SENet architecture.
    You can see in the figure that *F_ex* appears to be a single operation, yet it
    actually consists of two linear layers each followed by an activation function.
    See the Figure 3 below for the details.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 同时，兴奋和缩放操作都被称为 *自适应重校准*，因为它们本质上是根据其重要性动态调整输入张量中每个通道的权重。实际上，图1中的图表并没有完全描绘整个SENet架构。你可以看到在图中，*F_ex*
    似乎是一个单一的操作，但实际上它由两个线性层和每个线性层后的一个激活函数组成。请参见下面的图3以获取详细信息。
- en: '![](../Images/97fd36e02969b2300d21ba47484c8679.png)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/97fd36e02969b2300d21ba47484c8679.png)'
- en: Figure 3\. The mathematical formulation of the ***F_ex*** operation [1].
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 图3. ***F_ex*** 操作的数学公式 [1]。
- en: The two linear layers are denoted as *W_1* and *W_2*, whereas *δ* and *σ* represent
    ReLU and sigmoid activation functions, respectively. So, based on this mathematical
    definition, what we basically need to do later in the implementation is to pass
    tensor *z* (the average-pooled tensor) through the first linear layer, followed
    by the ReLU activation function, the second linear layer, and lastly the sigmoid
    activation function. Remember that the sigmoid function normalizes input values
    to be within the range of 0 to 1\. In this case, we will perceive the resulting
    output as the weight of each channel, where a value close to 1 indicates that
    the corresponding channel contains important information, hence we allow the model
    to pay more attention to that channel. Otherwise, if the resulting number is close
    to 0, it indicates that the corresponding channel does not contribute that much
    to the output.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 两个线性层分别表示为 *W_1* 和 *W_2*，而 *δ* 和 *σ* 分别代表ReLU和sigmoid激活函数。因此，根据这个数学定义，在实现过程中我们基本上需要将张量
    *z*（平均池化后的张量）通过第一个线性层，然后是ReLU激活函数，第二个线性层，最后是sigmoid激活函数。记住，sigmoid函数将输入值归一化到0到1的范围内。在这种情况下，我们将结果输出视为每个通道的权重，其中接近1的值表示相应的通道包含重要信息，因此我们允许模型更多地关注该通道。否则，如果结果数字接近0，则表示相应的通道对输出的贡献不大。
- en: In order to utilize these channel weights, we can perform the *F_scale* operation,
    which is basically just a multiplication of the original tensor *u* and the weight
    tensor *s*, as shown in Figure 4 below. By doing this, we essentially retain the
    values within the important channels while at the same time suppressing the values
    of the unimportant ones.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 为了利用这些通道权重，我们可以执行 *F_scale* 操作，这基本上就是原始张量 *u* 和权重张量 *s* 的乘积，如图4所示。通过这样做，我们本质上保留了重要通道中的值，同时抑制了不重要通道的值。
- en: '![](../Images/fe20e2d621bb99fd8990aab72b9a4fa5.png)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/fe20e2d621bb99fd8990aab72b9a4fa5.png)'
- en: Figure 4\. The scaling process is just a multiplication of the original and
    the weight tensors [1].
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 图4. 缩放过程仅仅是原始张量和权重张量的乘积 [1]。
- en: By the way sorry for getting a bit too mathy here, lol. But I believe this will
    help you understand the code later in the implementation section.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 顺便说一句，很抱歉这里有点过于数学化，哈哈。但我相信这会帮助你在实现部分的代码理解上有所帮助。
- en: Where to Put the SE Module
  id: totrans-21
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: SE模块放置的位置
- en: Applying the SE module on a plain CNN model like VGG is easy, as we can simply
    place it right after each convolution layer. However, it might not be straightforward
    in the case of Inception or ResNet thanks to the presence of parallel branches
    in these two networks. To address this confusion, authors provide a guide to implement
    the SE module specifically on the two models as shown in Figure 5 below.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 在像VGG这样的平面CNN模型上应用SE模块很容易，因为我们只需在每个卷积层之后简单地放置它。然而，由于Inception或ResNet中存在并行分支，这可能并不直接。为了解决这种混淆，作者提供了在如图5所示的两种模型上具体实现SE模块的指南。
- en: '![](../Images/b9c3bfb0d861ec84df2d92d7589d7f41.png)'
  id: totrans-23
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b9c3bfb0d861ec84df2d92d7589d7f41.png)'
- en: Figure 5\. Where SE module is placed in Inception and ResNet [1].
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 图5. SE模块在Inception和ResNet中的放置位置[1]。
- en: For the Inception model, instead of placing SE module right after each convolution
    layer, we pass the input tensor through the entire Inception block (including
    all the branches inside) and then attach the SE module afterwards. The same approach
    also works for ResNet, but keep in mind that the summation between the tensor
    in skip connection and the main flow happens after the main tensor has been processed
    by the SE module.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 对于Inception模型，我们不是在每个卷积层之后立即放置SE模块，而是将输入张量通过整个Inception块（包括所有内部分支）传递，然后附加SE模块。同样的方法也适用于ResNet，但请注意，在SE模块处理主张量之后，跳过连接中的张量与主流之间的求和操作发生。
- en: As I mentioned earlier, the excitation stage essentially consists of two linear
    layers. If we take a closer look at the above structure, we can see that the output
    shape of the first linear layer is 1×1×C/*r*. The variable *r* is called *reduction
    ratio* which reduces the dimensionality of the weight tensor before eventually
    projecting it back to 1×1×C through the second linear layer. The dimensionality
    reduction done by the first layer acts as a *bottleneck* operation, which is useful
    to limit model complexity and to improve generalization. Authors conducted experiments
    on different *r* values, and they found that *r* = 16 produces the best balance
    between accuracy and complexity.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 如我之前所述，激励阶段本质上由两个线性层组成。如果我们仔细观察上述结构，我们可以看到第一个线性层的输出形状是1×1×C/*r*。变量*r*被称为*缩减比*，它在最终通过第二个线性层将权重张量投影回1×1×C之前，减少了权重张量的维度。第一层所做的维度缩减充当*瓶颈*操作，这对于限制模型复杂性和提高泛化能力是有用的。作者对不同的*r*值进行了实验，并发现*r*
    = 16在准确性和复杂性之间达到了最佳平衡。
- en: '![](../Images/77a6a6596efa7e9fdb69cb85f7d695ca.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/77a6a6596efa7e9fdb69cb85f7d695ca.png)'
- en: Figure 6\. Several ways possible to be used to attach SE module in ResNet [1].
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 图6. 在ResNet中附加SE模块的几种可能方式[1]。
- en: In addition to implementing the SE module in ResNet, it is seen in Figure 6
    that there are actually several ways we can follow to do so. According to the
    experimental results in Figure 7, it looks like the standard SE, SE-PRE, and SE-Identity
    blocks obtained similar results, while at the same time all of them outperformed
    SE-POST by a significant margin. This suggests that the placement of the SE module
    affects model performance in terms of accuracy. Based on these findings, the authors
    argue that we are going to obtain good results as long as we apply the SE module
    before the element-wise summation operation. Later in the coding section, I am
    going to demonstrate how to implement the standard SE block.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 除了在ResNet中实现SE模块外，如图6所示，实际上我们还可以遵循几种方法来实现。根据图7中的实验结果，标准SE、SE-PRE和SE-Identity块获得了相似的结果，同时它们都显著优于SE-POST。这表明SE模块的位置会影响模型性能，尤其是在准确性方面。基于这些发现，作者认为只要我们在元素级求和操作之前应用SE模块，我们就能获得良好的结果。在编码部分稍后，我将演示如何实现标准SE块。
- en: '![](../Images/a64873b8293e9fd408a81069a0343623.png)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a64873b8293e9fd408a81069a0343623.png)'
- en: Figure 7\. Experimental results on different SE module integration strategies
    [1].
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 图7. 不同SE模块集成策略的实验结果[1]。
- en: More Experimental Results
  id: totrans-32
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 更多实验结果
- en: There are actually a lot more experimental results discussed in the paper. One
    of them is a table displaying accuracy score improvements when SE module is applied
    to existing CNN-based models. The table I am referring to is displayed in Figure
    8 below.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 论文中实际上讨论了更多实验结果。其中之一是当SE模块应用于现有的基于CNN的模型时，显示准确度得分提高的表格。我提到的表格显示在下面的图8中。
- en: '![](../Images/8d99583bb113d860dc379dfc524d0554.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/8d99583bb113d860dc379dfc524d0554.png)'
- en: Figure 8\. Experimental results on applying SE module on different models [1][2].
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.在不同模型上应用SE模块的实验结果[1][2]。
- en: The columns highlighted in blue represent the error rates of each model and
    the ones in pink indicate the computational complexity measured in GFLOPs. The
    *re-implementation* column refers to the plain model that the authors implemented
    themselves, whereas the *SENet* column represents the same model equipped with
    SE module. The table clearly shows that both top-1 and top-5 errors decrease when
    the SE module is applied. It is important to know that although adding the SE
    module causes the GFLOPs to get higher, yet this increase is considerably marginal
    compared to the reduction in error rate.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 蓝色高亮的列代表每个模型的错误率，粉色列表示以GFLOPs为单位的计算复杂度。*重新实现*列指的是作者自己实现的简单模型，而*SENet*列表示配备了SE模块的相同模型。表格清楚地显示，当应用SE模块时，top-1和top-5错误率都会降低。重要的是要知道，尽管添加SE模块会导致GFLOPs增加，但与错误率的降低相比，这种增加是相当微小的。
- en: Next, we can actually reveal interesting insights by printing out the values
    contained in the SE modules during the inference phase. Let’s take a look at the
    charts in Figure 9 below to better illustrate this. The *x* axis of these charts
    denotes the channel numbers, the *y* axis represents how much weight does each
    channel have according to its importance, and the color of the lines indicates
    the class being predicted.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们实际上可以通过打印出推理阶段SE模块中包含的值来揭示一些有趣的见解。让我们看一下下面的图9中的图表，以更好地说明这一点。这些图表的*x*轴表示通道号，*y*轴表示每个通道根据其重要性所拥有的权重，而线条的颜色表示被预测的类别。
- en: '![](../Images/abd2c5f964c605eeced22cf8a53688fe.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/abd2c5f964c605eeced22cf8a53688fe.png)'
- en: Figure 9\. What the activation of SE modules looks like in different network
    depth [1].
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 图9. SE模块在不同网络深度下的激活情况[1]。
- en: In shallower layers, the features captured by SE module are *class-agnostic*,
    which basically means that it captures generic information required to predict
    all classes. The charts referred to as (a) and (b), which are the SE modules from
    ResNet stage 2 and 3, show that there is not much difference in channel activity
    from one class to another, indicating that these two modules do not capture information
    regarding a specific class. The case is actually different from the SE modules
    in deeper layers, i.e., the ones in stage 4 (c) and stage 5 (d). We can see that
    these two modules adjust channel weights differently depending on the class being
    predicted. This is essentially the reason that the SE modules in deeper layers
    are said to be *class-specific*. However, the authors acknowledge that there might
    be unusual behavior happening in some of the SE modules which happens in the 2nd
    block of stage 5 (e). Here the SE module does not show meaningful channel recalibration
    behavior, indicating that it does not contribute as much as the ones we discussed
    earlier.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 在较浅的层中，SE模块捕获的特征是*类别无关的*，这基本上意味着它捕获了预测所有类别所需的通用信息。被称为(a)和(b)的图表，即ResNet阶段2和3的SE模块，显示不同类别之间的通道活动没有太大差异，这表明这两个模块没有捕获特定类别的信息。实际上，这与深层层的SE模块不同，即阶段4(c)和阶段5(d)的SE模块。我们可以看到，这两个模块根据被预测的类别调整通道权重的方式不同。这就是深层层的SE模块被称为*类别特定*的基本原因。然而，作者承认，在阶段5的第二个块(e)中的一些SE模块中可能发生异常行为。在这里，SE模块没有显示出有意义的通道重新校准行为，这表明它不像我们之前讨论的那样有贡献。
- en: The Detailed Architecture
  id: totrans-41
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 详细架构
- en: In this article we are going to implement the *SE-ResNeXt-50 (32×4d)* model,
    which in Figure 10 it corresponds to the one in the rightmost column. The ResNeXt
    model itself is similar to ResNet, except that the group parameter of the second
    convolution layer within each block is set to 32\. If you’re familiar with ResNeXt,
    this is essentially the simplest yet effective way to implement the so-called
    *cardinality*. I recommend you read my previous article about ResNeXt if you are
    not yet familiar with it, which the link is provided at reference number [3] at
    the end of this article.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我们将实现*SE-ResNeXt-50（32×4d）*模型，如图10中右侧列所示。ResNeXt模型本身与ResNet相似，只是每个块中第二卷积层的组参数被设置为32。如果你熟悉ResNeXt，这实际上是实现所谓的*基数*最简单且有效的方法。如果你还不熟悉ResNeXt，我建议你阅读我之前关于ResNeXt的文章，文章末尾的参考文献[3]提供了链接。
- en: Taking a closer look at the architecture, what differentiates *SE-ResNet-50*
    from *ResNet-50* is solely the presence of SE modules. The same also applies to
    *SE-ResNeXt-50 (32×4d)* compared to *ResNeXt-50 (32×4d)* (not displayed in the
    table). Notice in the figure below that the models with SE modules have an *fc*
    layer attached after the last convolution layer within each block, which the corresponding
    two numbers indicate the first and second fully-connected layers inside the SE
    module.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 仔细观察架构，*SE-ResNet-50*与*ResNet-50*的区别仅在于SE模块的存在。同样的情况也适用于*SE-ResNeXt-50（32×4d）*与*ResNeXt-50（32×4d）*（在表中未显示）。注意下面图中，带有SE模块的模型在每个块的最后卷积层之后附加了一个*fc*层，相应的两个数字表示SE模块内部的第一和第二全连接层。
- en: '![](../Images/be2ce08efb4941d6185632f05da70418.png)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/be2ce08efb4941d6185632f05da70418.png)'
- en: Figure 10\. The complete architecture of ResNet-50, SE-ResNet-50 and SE-ResNeXt-50
    (32×4d) [1].
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 图10. ResNet-50、SE-ResNet-50和SE-ResNeXt-50（32×4d）的完整架构[1]。
- en: '* * *'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: From Scratch Implementation
  id: totrans-47
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 从零开始实现
- en: Remember that here we are about to integrate the SE module on ResNeXt, so we
    need to implement both of them from scratch. Technically speaking, it is actually
    possible to take the ResNeXt architecture directly from PyTorch, then manually
    attach the SE module on it. However, here I decided to use the ResNeXt implementation
    from my previous article instead since I feel like it is a lot easier to understand
    than the one from PyTorch. Note that here I will focus on constructing the SE
    module and how to attach it to the ResNeXt model rather than explaining the ResNeXt
    itself since I’ve already covered it in that article [3].
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，这里我们即将在ResNeXt中集成SE模块，因此我们需要从头开始实现它们。从技术上讲，实际上可以直接从PyTorch中获取ResNeXt架构，然后手动将其SE模块附加到上面。然而，这里我决定使用我之前文章中的ResNeXt实现，因为它比我从PyTorch中获取的实现更容易理解。请注意，这里我将专注于构建SE模块以及如何将其附加到ResNeXt模型上，而不是解释ResNeXt本身，因为我已经在文章[3]中介绍过了。
- en: Now let’s start the code by importing the required modules.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们开始编写代码，导入所需的模块。
- en: '[PRE0]'
  id: totrans-50
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Squeeze and Excitation Module
  id: totrans-51
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 挤压和激励模块
- en: The following SE module implementation follows the diagram shown in Figure 5
    (right). It is worth noting that the `SEModule` class below does not include the
    skip-connection (curved arrow), as the entire SE module is applied after the initial
    branching but before the merging (summation).
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 以下SE模块实现遵循图5（右）所示的图示。值得注意的是，下面的`SEModule`类不包括跳过连接（曲线箭头），因为整个SE模块是在初始分支之后但在合并（求和）之前应用的。
- en: 'The `__init__()` method of this class accepts two parameters: `num_channels`
    and `r`, as shown at line `#(1)` in Codeblock 2a. We definitely want this SE module
    to be usable throughout the entire network. So, we need to set the `num_channels`
    parameter to be adjustable because the number of output channels varies across
    ResNeXt blocks at different stages, as shown back in Figure 10\. Meanwhile, even
    though we typically use the same reduction ratio *r* in the SE modules within
    the entire network, but it is technically possible for us to use different `r`
    for different stage, which might probably be an interesting thing to experiment
    with. So, this is essentially the reason that I also set the `r` parameter to
    be adjustable.'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 这个类的`__init__()`方法接受两个参数：`num_channels`和`r`，如代码块2a中的行`#(1)`所示。我们肯定希望这个SE模块在整个网络中都是可用的。因此，我们需要将`num_channels`参数设置为可调整的，因为不同阶段的ResNeXt块中输出通道的数量是不同的，如图10所示。同时，尽管我们在整个网络中的SE模块通常使用相同的缩减比*r*，但从技术上讲，我们可以为不同的阶段使用不同的`r`，这可能会是一个有趣的实验对象。所以，这也是我也将`r`参数设置为可调整的原因。
- en: '[PRE1]'
  id: totrans-54
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: There are 5 layers we need to initialize inside the `__init__()` method. I write
    them down according to the sequence given in Figure 5, i.e., global average pooling
    layer (`#(2)`), linear layer (`#(3)`), ReLU activation function (`#(4)`), another
    linear layer (`#(5)`), and sigmoid activation function (`#(6)`). Here you can
    see that the first linear layer is responsible to perform dimensionality reduction
    by shrinking the number of channels from `num_channels` to `num_channels//r`,
    which will then be expanded back to `num_channels` by the second linear layer.
    Note that we set the bias term of both linear layers to `False`, which essentially
    means that we will only utilize the weight tensors. The absence of bias terms
    in the two layers forces the SE module to learn the correlation between one channel
    to the others rather than just adding fixed adjustments.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 在`__init__()`方法内部，我们需要初始化5层。我按照图5中给出的顺序写下它们，即全局平均池化层（`#(2)`）、线性层（`#(3)`）、ReLU激活函数（`#(4)`）、另一个线性层（`#(5)`）和sigmoid激活函数（`#(6)`）。在这里，你可以看到第一个线性层负责通过将通道数从`num_channels`缩减到`num_channels//r`来执行降维，然后第二个线性层将其扩展回`num_channels`。请注意，我们将两个线性层的偏置项设置为`False`，这实际上意味着我们只将利用权重张量。两层中偏置项的缺失迫使SE模块学习一个通道与其他通道之间的相关性，而不仅仅是添加固定的调整。
- en: Still with the `SEModule` class, let’s now move on to the `forward()` method
    to define the flow of the network. You can see at line `#(1)` in Codeblock 2b
    that we start from a single input `x`, which in the case of ResNeXt it is essentially
    a tensor produced by the third convolution layer within the same ResNeXt block.
    As shown in Figure 5, what we need to do next is to branch out the network. Here
    we directly process the branch using the `global_pooling` layer, which I name
    the resulting tensor `squeezed` (`#(2)`). The original input tensor `x` itself
    will be left as is since we are not going to perform any operation on it until
    the scaling phase. Next, we need to drop the spatial dimension of the `squeezed`
    tensor using `torch.flatten()` (`#(3)`). This is basically done because we want
    to process it further with the linear layers at line `#(4)` and `#(5)`, which
    can only work with a single-dimensional tensor. The spatial dimension is then
    introduced again at line `#(6)`, allowing us to perform multiplication between
    `x` (the original tensor) and `excited` (the channel weights) at line `#(7)`.
    This entire process produces a recalibrated version of `x` which we refer to as
    `scaled`. Here I print out the tensor dimension after each step so that you can
    better understand the flow of this SE module.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 仍然使用`SEModule`类，现在让我们继续到`forward()`方法来定义网络的流程。你可以在代码块2b中的行`#(1)`看到，我们从单个输入`x`开始，在ResNeXt的情况下，它本质上是由同一ResNeXt块内的第三个卷积层产生的张量。如图5所示，接下来我们需要分支出网络。在这里，我们直接使用`global_pooling`层处理分支，我将得到的张量命名为`squeezed`（`#(2)`）。原始输入张量`x`本身将保持不变，因为我们不会在缩放阶段对其进行任何操作。接下来，我们需要使用`torch.flatten()`（`#(3)`）去除`squeezed`张量的空间维度。这基本上是因为我们想要进一步使用行`#(4)`和`#(5)`中的线性层进行处理，这些层只能处理一维张量。空间维度然后在行`#(6)`再次引入，允许我们在行`#(7)`处执行`x`（原始张量）和`excited`（通道权重）之间的乘法。这个过程产生了一个重新校准的`x`版本，我们称之为`scaled`。在这里，我在每个步骤后打印出张量维度，以便你更好地理解这个SE模块的流程。
- en: '[PRE2]'
  id: totrans-57
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Now we are going to see if we have implemented the network correctly by passing
    a dummy tensor through it. In Codeblock 3 below, I initialize an SE module and
    configure it to accept an image tensor of 512 channels and has a reduction ratio
    of 16 (`#(1)`). If you take a look at the SE-ResNeXt architecture in Figure 10,
    this SE module basically corresponds to the one in the third stage (which the
    output size is 28×28). Thus, at line `#(2)` we need to adjust the shape of the
    dummy tensor accordingly. We then feed this tensor into the network using the
    code at line `#(3)`.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们将通过传递一个虚拟张量通过它来检查我们是否正确实现了网络。在下面的代码块3中，我初始化了一个SE模块，并配置它接受一个512通道的图像张量，并且具有16的缩减比例（`#(1)`）。如果你看一下图10中的SE-ResNeXt架构，这个SE模块基本上对应于第三阶段中的那个（其输出大小为28×28）。因此，在行`#(2)`我们需要相应地调整虚拟张量的形状。然后我们使用行`#(3)`中的代码将这个张量输入到网络中。
- en: '[PRE3]'
  id: totrans-59
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: And below is what the print functions give us.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是打印函数给出的结果。
- en: '[PRE4]'
  id: totrans-61
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: You can see that the original tensor shape matches exactly with our dummy tensor,
    i.e., 1×512×28×28 (`#(1)`). By the way we can ignore the number 1 in the 0th axis
    since it essentially denotes the batch size, which in this case I assume that
    we only got a single image in a batch. After being pooled, the spatial dimension
    collapses to 1×1 since now each channel is represented by a single number (`#(2)`).
    The purpose of the flatten operation I explained earlier is to drop the two empty
    axes (`#(3)`) since the subsequent linear layers can only work with single-dimensional
    tensor. Here you can see that the first linear layer reduces the tensor dimension
    to 32 thanks to the reduction ratio which we previously set to 16 (`#(4)`). The
    length of this tensor is then expanded back to 512 by the second linear layer
    (`#(5)`). Next, we unsqueeze the tensor so that we get our 1×1 spatial dimension
    back (`#(6)`), allowing us to multiply it with the input tensor (`#(7)`). Based
    on this detailed flow, you can see that an SE module basically preserves the original
    tensor dimension, proving that this module can be attached to any CNN-based model
    without disrupting the original flow of the network.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以看到原始张量的形状与我们的虚拟张量完全匹配，即1×512×28×28（`#(1)`）。顺便说一下，我们可以忽略0轴上的数字1，因为它本质上表示批处理大小，在这种情况下，我假设我们只在一个批处理中得到了一张图像。经过池化后，空间维度折叠到1×1，因为现在每个通道都由一个单独的数字表示（`#(2)`）。我之前解释的扁平化操作的目的就是删除两个空轴（`#(3)`），因为后续的线性层只能处理单维张量。在这里，你可以看到第一个线性层通过我们之前设置的缩减比例16将张量维度减少到32（`#(4)`）。然后，第二个线性层将这个张量的长度扩展回512（`#(5)`）。接下来，我们解压缩张量，以便我们恢复1×1的空间维度（`#(6)`），这样我们就可以将其与输入张量相乘（`#(7)`）。基于这个详细的流程，你可以看到SE模块基本上保留了原始张量的维度，这证明了该模块可以附加到任何基于CNN的模型上，而不会破坏网络的原始流程。
- en: ResNeXt
  id: totrans-63
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: ResNeXt
- en: As we have understood how to implement SE module from scratch, now that I am
    going to show you how we can attach it on a ResNeXt model. Before doing so, we
    need to initialize the parameters required to implement the ResNeXt architecture.
    In the Codeblock 4 below the first four variables are determined according to
    the *ResNeXt-50 (32×4d)* variant, whereas the last one (`R`) represents the reduction
    ratio for the SE modules.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 既然我们已经理解了如何从头开始实现SE模块，现在我将向你展示我们如何将其附加到ResNeXt模型上。在这样做之前，我们需要初始化实现ResNeXt架构所需的参数。在下面的代码块4中，前四个变量是根据*ResNeXt-50
    (32×4d)*变体确定的，而最后一个变量（`R`）代表SE模块的缩减比例。
- en: '[PRE5]'
  id: totrans-65
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: The `Block` class defined in Codeblock 5a and 5b is the ResNeXt block from my
    previous article. There are actually lots of things we do inside the `__init__()`
    method, but the general idea is that we initialize three convolution layers referred
    to as `conv0` (`#(1)`), `conv1` (`#(2)`), and `conv2` (`#(3)`) before initializing
    the SE module at line `#(4)`. We will later configure these layers according to
    the SE-ResNeXt architecture shown back in Figure 10.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 在代码块5a和5b中定义的`Block`类是我之前文章中的ResNeXt块。实际上，我们在`__init__()`方法中做了很多事情，但总体思路是在初始化SE模块之前，初始化三个称为`conv0`（`#(1)`）、`conv1`（`#(2)`）和`conv2`（`#(3)`）的卷积层。稍后，我们将根据图10中显示的SE-ResNeXt架构配置这些层。
- en: '[PRE6]'
  id: totrans-67
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: The `forward()` method itself is generally also the same as the original ResNeXt
    model, except that here we need to put the SE module right before the element-wise
    summation as shown at line `#(1)` in the Codeblock 5b below. Remember that this
    implementation follows the standard SE block architecture in Figure 6 (b).
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: '`forward()` 方法本身通常也与原始的 ResNeXt 模型相同，只是在这里我们需要将 SE 模块放在元素级求和之前，如下面的代码块 5b 中的行
    `#(1)` 所示。请记住，这种实现遵循图 6 (b) 中的标准 SE 模块架构。'
- en: '[PRE7]'
  id: totrans-69
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: With the above implementation, every time we instantiate a `Block` object we
    will have a ResNeXt block which is already equipped with an SE module. Now we
    are going to test the above class to see if we have implemented it correctly.
    Here I am going to simulate a ResNeXt block within the third stage. The `add_channel`
    and `downsample` parameters are set to `False` since we want to preserve both
    the number of channels and the spatial dimension of the input tensor.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 在上述实现中，每次我们实例化一个 `Block` 对象时，我们都会有一个已经配备了 SE 模块的 ResNeXt 模块。现在我们将测试上述类，看看我们是否正确实现了它。在这里，我将在第三阶段模拟一个
    ResNeXt 模块。`add_channel` 和 `downsample` 参数设置为 `False`，因为我们想保留输入张量的通道数和空间维度。
- en: '[PRE8]'
  id: totrans-71
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Below is what the output looks like. Here you can see that our first convolution
    layer successfully reduced the number of channels from 512 to 256 (`#(1)`), which
    is then expanded back to its original dimension by the third convolution layer
    (`#(2)`). Afterwards, the tensor goes through the SE block which the resulting
    output size is the same as its input, just like what we saw earlier in Codeblock
    3 (`#(3)`). As the processing with SE module is done, we can finally perform the
    element-wise summation between the tensor from the main branch and the one from
    the skip-connection (`#(4)`).
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是输出看起来像什么。您可以看到，我们的第一个卷积层成功地将通道数从 512 减少到 256 (`#(1)`)，然后由第三个卷积层将其扩展回原始维度
    (`#(2)`)。之后，张量通过 SE 模块，输出大小与输入相同，就像我们在代码块 3 中看到的那样 (`#(3)`)。SE 模块的处理完成后，我们最终可以在主分支的张量和跳过连接的张量之间执行元素级求和
    (`#(4)`)。
- en: '[PRE9]'
  id: totrans-73
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: And below is how I implement the entire architecture. What we essentially need
    to do is just to stack multiple SE-ResNeXt blocks according to the architecture
    in Figure 10\. In fact, the `SEResNeXt` class in Codeblock 7 is exactly the same
    as the `ResNeXt` class in my previous article [3] (I literally copy-pasted it)
    since what makes SE-ResNeXt different from the original ResNeXt is only the presence
    of SE module within the `Block` class we discussed earlier.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是如何实现整个架构。我们本质上需要做的就是根据图 10 中的架构堆叠多个 SE-ResNeXt 模块。实际上，代码块 7 中的 `SEResNeXt`
    类与我之前文章 [3] 中的 `ResNeXt` 类完全相同（我实际上复制粘贴了它），因为使 SE-ResNeXt 与原始 ResNeXt 区别开来的只是我们之前讨论的
    `Block` 类中存在 SE 模块。
- en: '[PRE10]'
  id: totrans-75
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: As the entire *SE-ResNeXt-50 (32×4d)* architecture is completed, now that we
    are going to test it by passing through a tensor of size 1×3×224×224 through the
    network, simulating a single RGB image of size 224×224\. You can see in the output
    of the Codeblock 8 below that it seems like model works properly since the tensor
    successfully passed through all layers within the `seresnext` model without returning
    any error. Thus, I believe this model is now ready to be trained. By the way don’t
    forget to change the number of neurons in the output channel according to the
    number of classes in your dataset if you want to actually train this model.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 当整个 *SE-ResNeXt-50 (32×4d)* 架构完成后，现在我们将通过传递一个大小为 1×3×224×224 的张量通过网络来测试它，模拟一个
    224×224 大小的单个 RGB 图像。您可以在下面的代码块 8 的输出中看到，模型似乎工作正常，因为张量成功通过了 `seresnext` 模型中的所有层而没有返回任何错误。因此，我相信这个模型现在可以开始训练了。顺便说一句，如果您真的想训练这个模型，别忘了根据您数据集中的类别数量更改输出通道中的神经元数量。
- en: '[PRE11]'
  id: totrans-77
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: '[PRE12]'
  id: totrans-78
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: Additionally, we can also print out the number of parameters this model has
    using the following code. Here you can see that the codeblock returns 27,543,848\.
    This number of parameters is slightly higher than the original ResNeXt model counterpart,
    which only has 25,028,904 parameters as mentioned in my previous article as well
    as the official PyTorch documentation [4]. Such an increase in the model size
    definitely makes sense since the ResNeXt blocks throughout the entire network
    now have more layers thanks to the presence of SE modules.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我们还可以使用以下代码打印出这个模型所拥有的参数数量。在这里，你可以看到代码块返回了27,543,848。这个参数数量略高于原始的ResNeXt模型对应版本，正如我在之前的文章以及官方PyTorch文档[4]中提到的，原始ResNeXt模型只有25,028,904个参数。这种模型大小的增加确实是有道理的，因为整个网络中的ResNeXt块现在由于SE模块的存在而拥有更多的层。
- en: '[PRE13]'
  id: totrans-80
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: '[PRE14]'
  id: totrans-81
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: '* * *'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Ending
  id: totrans-83
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结束
- en: And that’s pretty much everything about the Squeeze and Excitation module. I
    do encourage you to explore from here by training this model on your own dataset
    so that you will see whether the findings presented in the paper also apply to
    your case. Not only that, I think it would also be interesting if you try to implement
    SE module on other neural network architectures like VGG or Inception by yourself.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是关于Squeeze and Excitation模块的全部内容。我确实鼓励你从这里开始，通过在自己的数据集上训练这个模型来探索，这样你将看到论文中提出的发现是否也适用于你的情况。不仅如此，我认为如果你尝试自己实现SE模块在其他神经网络架构如VGG或Inception上，也会很有趣。
- en: I hope you learn something new today. Thanks for reading!
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望你在今天学到了一些新东西。感谢阅读！
