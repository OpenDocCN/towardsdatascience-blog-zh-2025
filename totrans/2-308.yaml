- en: 'Reinforcement Learning Made Simple: Build a Q-Learning Agent in Python'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 强化学习简单化：用Python构建Q学习智能体
- en: 原文：[https://towardsdatascience.com/reinforcement-learning-made-simple-build-a-q-learning-agent-in-python/](https://towardsdatascience.com/reinforcement-learning-made-simple-build-a-q-learning-agent-in-python/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/reinforcement-learning-made-simple-build-a-q-learning-agent-in-python/](https://towardsdatascience.com/reinforcement-learning-made-simple-build-a-q-learning-agent-in-python/)
- en: In <mdspan datatext="el1748372274608" class="mdspan-comment">March 2016</mdspan>,
    Go world champion Lee Sedol faced an opponent who was not made of flesh and blood
    – but of lines of code.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在<mdspan datatext="el1748372274608" class="mdspan-comment">2016年3月</mdspan>，围棋世界冠军李世石面对的对手不是血肉之躯——而是代码行。
- en: It soon became clear that the human had lost.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 很快就变得很明显，人类已经输了。
- en: In the end, Lee Sedol lost 4:1.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，李世石以4:1输掉了比赛。
- en: Last week I watched the documentary AlphaGo again — and found it fascinating
    once more.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 上周我再次观看了纪录片《AlphaGo》——并且再次觉得它非常引人入胜。
- en: The scary thing about it? AlphaGo didn’t get its style of play from databases,
    rules or strategy books.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 令人恐惧的是？AlphaGo并非从数据库、规则或策略书中获得其比赛风格。
- en: Instead, it had played against itself millions of times — and learned how to
    win in the process.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，它已经与自己进行了数百万次的对战——并在过程中学会了如何获胜。
- en: 'Move 37 in game 2 was the moment when the whole world understood: This AI doesn’t
    play like a human — it plays better.'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 第二场比赛的第37步是全世界都明白的时刻：这种人工智能不像人类那样玩游戏——它玩得更好。
- en: AlphaGo combined supervised learning, reinforcement learning, and search. One
    fascinating part is, its strategy emerged from learning by playing against itself
    — using reinforcement learning to improve over time.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: AlphaGo结合了监督学习、强化学习和搜索。其中令人着迷的部分是，其策略是通过与自己对战来学习的——使用强化学习来不断改进。
- en: We now use reinforcement learning not only in games, but also in robotics, such
    as gripper arms or household robots, in energy optimization, e.g. to reduce the
    energy consumption of data centers or for traffic control, e.g. through traffic
    light optimization.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在不仅将强化学习应用于游戏，还应用于机器人技术，例如抓取臂或家用机器人，在能源优化中，例如减少数据中心的能源消耗，或者在交通控制中，例如通过交通信号灯优化。
- en: And also in modern agents, we now use large language models together with reinforcement
    learning (e.g. Reinforcement Learning from Human Feedback) to make the responses
    of ChatGPT, Claude, or Gemini more human-like, for example.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 在现代智能体中，我们现在使用大型语言模型与强化学习（例如，从人类反馈中进行强化学习）相结合，使ChatGPT、Claude或Gemini等人工智能的回答更加人性化，例如。
- en: 'In this article, I’ll show you exactly how this works, and how we can better
    understand the mechanism using a simple game: Tic Tac Toe.'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我将向您展示它究竟是如何工作的，以及我们如何通过一个简单的游戏：井字棋，更好地理解其机制。
- en: What is reinforcement learning?
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是强化学习？
- en: 'When we observe a baby learning to walk, we see: It stands up, falls over,
    tries again — and at some point takes its first steps.'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们观察婴儿学习走路时，我们看到：它站起来，跌倒，再次尝试——并在某个时刻迈出了第一步。
- en: No teacher shows the baby how to do it. Instead, the baby tries out different
    actions by trial and error to walk — <mdspan datatext="el1748371147762" class="mdspan-comment">and
    learns</mdspan>.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 没有老师教婴儿如何做。相反，婴儿通过尝试不同的动作，通过试错来学习走路——<mdspan datatext="el1748371147762" class="mdspan-comment">并学习</mdspan>。
- en: When it can stand or walk a few steps, this is a reward for the baby. After
    all, its goal is to be able to walk. If it falls down, there is no reward.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 当它能站立或走几步时，这对婴儿来说是一种奖励。毕竟，它的目标是能够走路。如果它跌倒了，就没有奖励。
- en: This learning process of trial, error and reward is the basic idea behind reinforcement
    learning (RL).
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 这种试错和奖励的学习过程是强化学习（RL）背后的基本理念。
- en: Reinforcement learning is a learning approach in which an agent learns through
    interaction with its environment, which actions lead to rewards.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 强化学习是一种学习方式，其中智能体通过与环境的交互来学习，哪些行为会导致奖励。
- en: 'Its goal: To obtain as many rewards as possible in the long term.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 它的目标：在长期内获得尽可能多的奖励。
- en: In contrast to supervised learning, there are no “right answers” or labels.
    The agent has to find out for itself which decisions are good.
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与监督学习相比，没有“正确答案”或标签。智能体必须自己找出哪些决策是好的。
- en: In contrast to unsupervised learning, the aim is not to find hidden patterns
    in the data, but to carry out those actions that maximize the reward.
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与无监督学习相比，目标不是在数据中找到隐藏的模式，而是执行那些最大化奖励的行为。
- en: How an RL agent thinks, decides — and learns
  id: totrans-22
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 强化学习智能体的思考、决策和学习方式
- en: 'For an RL agent to learn, it needs four things: An idea of where it currently
    is (state), what it can do (actions), what it wants to achieve (reward) and how
    well it has done with a strategy in the past (value).'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 为了让RL智能体学习，它需要四样东西：它目前所在的位置（状态）的概念、它可以执行的操作（行动）、它想要实现的目标（奖励）以及它过去使用策略做得有多好（价值）。
- en: An agent acts, gets feedback, and gets better.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 一个智能体采取行动，获得反馈，并变得更好。
- en: 'For this to work, four things are needed:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使这起作用，需要四样东西：
- en: '**1) Policy / Strategy**'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: '**1) 策略/策略**'
- en: This is the rule or strategy according to which an agent decides which action
    to perform in a certain state. In simple cases, this is a lookup table. In more
    complex applications (e.g. with neural networks), it is a function.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 这是智能体在特定状态下决定执行哪个行动的规则或策略。在简单情况下，这是一个查找表。在更复杂的应用中（例如，使用神经网络），它是一个函数。
- en: '**2) Reward signal**'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: '**2) 奖励信号**'
- en: The reward is the feedback from the environment. For example, this can be +1
    for a win, 0 for a draw and -1 for a loss. The agent’s goal is to collect as many
    rewards as possible over as many steps as possible.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 奖励是环境反馈。例如，胜利可以是+1，平局是0，失败是-1。智能体的目标是尽可能多地收集尽可能多的奖励。
- en: '**3) Value Function**'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: '**3) 价值函数**'
- en: This function estimates the expected future reward of a state. The reward shows
    the agent whether the action was “good” or “bad”. The value function estimates
    how good a state is — not just immediately, but considering future rewards the
    agent can expect from that state onward. The value function therefore estimates
    the long-term benefit of a state.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 这个函数估计状态的预期未来奖励。奖励显示行动是“好”还是“坏”。价值函数估计状态有多好 — 不仅立即，而且考虑到智能体可以从该状态开始期望的未来奖励。因此，价值函数估计状态的长期利益。
- en: '**4) Model of the environment**'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: '**4) 环境模型**'
- en: 'A model tells the agent: “If I do action A in state S, I will probably end
    up in state S′ and get reward R. ”'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 模型告诉智能体：“如果我以状态S执行行动A，我可能最终会进入状态S′并获得奖励R。”
- en: In model-free methods like Q-learning, however, this is not necessary.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，在无模型方法如Q-learning中，这并不是必要的。
- en: 'Exploitation vs. Exploration: Move 37 – And what we can learn from it'
  id: totrans-35
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 利用与探索：第37步 — 我们可以从中学习到什么
- en: 'You may remember move 37 from game 2 between AlphaGo and Lee Sedol:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能记得AlphaGo和李世石在第二局比赛中的第37步：
- en: An unusual move that looked like a mistake to us humans – but was later hailed
    as genius.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 一个对我们人类来说看起来像错误的异常移动 — 但后来被誉为天才。
- en: '![](../Images/e50407f490f387bfef583b1314b4328a.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/e50407f490f387bfef583b1314b4328a.png)'
- en: Picture from AlphaGo – The Movie | [Full award-winning documentary](https://www.youtube.com/watch?v=WXuK6gekU1Y&t=8s)
    on YouTube
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 图片来自《AlphaGo》电影 | [完整的获奖纪录片](https://www.youtube.com/watch?v=WXuK6gekU1Y&t=8s)
    在YouTube上
- en: Why did the algorithm do that?
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么算法会这样做？
- en: The computer program was trying out something new. This is called exploration.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 计算机程序正在尝试一些新事物。这被称为探索。
- en: 'Reinforcement learning needs both: An agent must find a balance between exploitation
    and exploration.'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 强化学习需要两者：智能体必须在利用和探索之间找到平衡。
- en: Exploitation means that the agent uses the actions it already knows.
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 利用意味着智能体使用它已经知道的行动。
- en: Exploration, on the other hand, are actions that the agent tries out for the
    first time. It tries them out because they could be better than the actions it
    already knows.
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 另一方面，探索是智能体第一次尝试的行动。它尝试这些行动，因为它们可能比它已经知道的行动更好。
- en: The agent tries to find the optimal strategy through trial and error.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 智能体试图通过试错来找到最佳策略。
- en: Tic-Tac-Toe with reinforcement learning
  id: totrans-46
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用强化学习的井字棋
- en: Let’s take a look at reinforcement learning with a super well-known game.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看一个超级知名的游戏中的强化学习。
- en: 'You’ve probably played it as a child too: Tic Tac Toe.'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能也作为孩子玩过这个游戏：井字棋。
- en: '![](../Images/a9775fc157f798b2d77bfb73bd82d5e9.png)'
  id: totrans-49
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/a9775fc157f798b2d77bfb73bd82d5e9.png)'
- en: Own visualization — Illustrations from [unDraw.com](https://undraw.com/).
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 自行可视化 — 来自 [unDraw.com](https://undraw.com/) 的插图。
- en: 'The game is perfect as an introductory example, as it doesn’t require a neural
    network, the rules are clear and we can implement the game with just a little
    Python:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 游戏作为一个入门示例非常完美，因为它不需要神经网络，规则清晰，我们只需用一点Python就能实现这个游戏：
- en: Our agent starts with zero knowledge of the game. It starts like a human seeing
    the game for the first time.
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们的智能体对游戏一无所知地开始。它就像人类第一次看到游戏一样开始。
- en: 'The agent gradually evaluates each game situation: A score of 0.5 means “I
    don’t know yet whether I’m going to win here.” A 1.0 means “This situation will
    almost certainly lead to victory.'
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 代理逐渐评估每个游戏情况：得分为 0.5 意味着“我还不知道我是否会在这里获胜。”得分为 1.0 意味着“这种情况几乎肯定会导致胜利。”
- en: By playing many parties, the agent observes what works – and adapts his strategy.
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过参加许多比赛，代理观察哪些方法是有效的——并调整其策略。
- en: The goal? For each turn, the agent should choose the action that leads to the
    highest long-term reward.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 目标？对于每一回合，代理应该选择导致最高长期奖励的动作。
- en: In this section, we will build such an RL system step by step and create the
    file TicTacToeRL.py.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将逐步构建这样一个强化学习（RL）系统，并创建名为 TicTacToeRL.py 的文件。
- en: '*→ You can find all the code in this [GitHub repository](https://github.com/Data-Science-Espresso/Reinforcement-Learning-TicTacToe).*'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: '*→ 你可以在本 [GitHub 仓库](https://github.com/Data-Science-Espresso/Reinforcement-Learning-TicTacToe)
    中找到所有代码。*'
- en: 1\. Building the environment of the game
  id: totrans-58
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 构建游戏环境
- en: In reinforcement learning, an agent learns through interactions with an environment.
    It determines what a state is (e.g. the current board), which actions are permitted
    (e.g. where you can place a bet) and what feedback there is on an action (e.g.
    a reward of +1 if you win).
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 在强化学习中，代理通过与环境的交互来学习。它确定状态是什么（例如，当前棋盘），允许哪些动作（例如，你可以下注的地方）以及动作的反馈是什么（例如，如果你赢了，奖励为
    +1）。
- en: 'In theory, we refer to this setup as the Markov Decision Process: A model consists
    of states, actions and rewards.'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 理论上，我们将此设置称为马尔可夫决策过程：一个模型由状态、动作和奖励组成。
- en: 'First, we create a class TicTacToe. This manages the game board, which we create
    as a 3×3 NumPy array, and manages the game logic:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们创建一个 TicTacToe 类。这个类管理游戏板，我们将其创建为一个 3×3 的 NumPy 数组，并管理游戏逻辑：
- en: The reset(self) function starts a new game.
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`reset(self)` 函数开始新游戏。'
- en: The function available_actions() returns all free fields.
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`available_actions()` 函数返回所有空闲的方格。'
- en: The function step(self, action, player) executes a game move. Here we return
    the new state, a reward (1 = win, 0.5 = draw, -10 = invalid move) and the game
    status. We penalize invalid moves in this example with -10 heavily so that the
    agent learns to avoid them quickly – [a common technique in small RL environments](http://incompleteideas.net/book/the-book.html).
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`step(self, action, player)` 函数执行一个游戏动作。在这里，我们返回新的状态、奖励（1 = 胜利，0.5 = 平局，-10
    = 无效动作）和游戏状态。在这个例子中，我们用 -10 重重惩罚无效动作，以便代理能够快速学会避免它们——[这是小型强化学习环境中的常见技术](http://incompleteideas.net/book/the-book.html)。'
- en: The function check_winner() checks whether a player has three X’s or O’s in
    a row and has therefore won.
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`check_winner()` 函数检查玩家是否有三行 X 或 O，因此获胜。'
- en: With render_gui() we display the current board with matplotlib as X and O graphics.
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 `render_gui()` 我们使用 matplotlib 将当前棋盘显示为 X 和 O 图形。
- en: '[PRE0]'
  id: totrans-67
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 2\. Program the Q-Learning Agent
  id: totrans-68
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 编程 Q-Learning 代理
- en: 'Next, we define the learning part: Our agent'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们定义学习部分：我们的代理
- en: It decides which action to perform in a certain state to get as much reward
    as possible.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 它决定在特定状态下执行哪个动作以获得尽可能多的奖励。
- en: The agent uses the classic RL method Q-learning. A Q-value is stored for each
    combination of state and action — the estimated long-term benefit of this action.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 代理使用经典的强化学习算法 Q-learning。为每个状态和动作的组合存储一个 Q 值——该动作的估计长期效益。
- en: 'The most important methods are:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 最重要的方法包括：
- en: Using the `choose_action(self, state, actions)` function, the agent decides
    in each game situation whether to choose an action that it already knows well
    (exploitation) or whether to try out a new action that has not yet been sufficiently
    tested (exploration).
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 `choose_action(self, state, actions)` 函数，代理在每种游戏情况下决定是选择一个已知很好的动作（利用）还是尝试一个尚未充分测试的新动作（探索）。
- en: 'This decision is based on the so-called ε-greedy approach:'
  id: totrans-74
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这个决策基于所谓的 ε-greedy 方法：
- en: With a probability of ε = 0.1 the agent chooses a random action (exploration),
    with 90 % probability (1 – ε) it chooses the currently best known action based
    on its Q-table (exploitation).
  id: totrans-75
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 以 ε = 0.1 的概率，代理选择一个随机动作（探索），以 90% 的概率（1 – ε）选择基于其 Q 表的当前最佳已知动作（利用）。
- en: With the function `update(state, action, reward, next_state, next_actions)`
    we adjust the Q-value depending on how good the action was and what happens afterwards.
    This is the central learning step for the agent.
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 `update(state, action, reward, next_state, next_actions)` 函数，我们根据动作的好坏以及之后发生的情况调整
    Q 值。这是代理的核心学习步骤。
- en: '[PRE1]'
  id: totrans-77
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '* * *'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '*On my *[*Substack*](https://sarahleaschrch.substack.com/)*, I regularly write
    summaries about the published articles in the fields of Tech, Python, Data Science,
    Machine Learning and AI. If you’re interested, take a look or subscribe.*'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的[*Substack*](https://sarahleaschrch.substack.com/)上，我定期撰写关于科技、Python、数据科学、机器学习和AI领域的已发布文章的摘要。如果你感兴趣，可以查看或订阅。
- en: '* * *'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: 3\. Train the agent
  id: totrans-81
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. 训练智能体
- en: The actual learning process begins in this step. During training, the agent
    learns through trial and error. The agent plays many games, memorizes which actions
    have worked well — and adapts its strategy.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 实际的学习过程从这一步开始。在训练过程中，智能体通过试错进行学习。智能体玩了很多游戏，记住哪些动作效果良好——并调整其策略。
- en: During training, the agent learns how its actions are rewarded, how its behavior
    affects later states and how better strategies develop in the long term.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 在训练过程中，智能体学习其动作如何被奖励，其行为如何影响后续状态，以及长期内更好的策略如何发展。
- en: With the function `train(agent, episodes=10000)` we define that the agent plays
    10,000 games against a simple random opponent. In each episode, the agent (player
    1) makes a move, followed by the opponent (player 2). After each move, the agent
    learns through `update()`.
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用函数`train(agent, episodes=10000)`，我们定义智能体与一个简单的随机对手进行10,000场比赛。在每个回合中，智能体（玩家1）移动，然后是对手（玩家2）。每次移动后，智能体通过`update()`进行学习。
- en: Every 1000 games we save how many wins, draws and defeats there have been.
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每1000场比赛我们保存有多少胜利、平局和失败。
- en: Finally, we plot the learning curve with matplotlib. It shows how the agent
    improves over time.
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 最后，我们使用matplotlib绘制学习曲线。它显示了智能体随时间如何改进。
- en: '[PRE2]'
  id: totrans-87
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 4\. Visualization of the board
  id: totrans-88
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4. 棋盘可视化
- en: With the main program “if name == ”main“:” we define the starting point of the
    program. It ensures that the training of the agent runs automatically when we
    execute the script. And we use the `render_gui()` method to display the TicTacToe
    board as a graphic.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 使用主程序“if name == ”main“:”，我们定义程序的起点。它确保当我们执行脚本时，智能体的训练会自动运行。我们使用`render_gui()`方法将TicTacToe棋盘显示为图形。
- en: '[PRE3]'
  id: totrans-90
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Execution in the terminal
  id: totrans-91
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 终端执行
- en: We save the code in the file [TicTacToeRL.py](http://TicTacToeRL.py).
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将代码保存在文件[TicTacToeRL.py](http://TicTacToeRL.py)中。
- en: In the terminal, we now navigate to the corresponding directory where our [TicTacToeRL.py](http://TicTacToeRL.py)
    is stored and execute the file with the command “python TicTacToeRL.py”.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 在终端中，我们现在导航到存储我们的[TicTacToeRL.py](http://TicTacToeRL.py)文件的相应目录，并使用命令“python
    TicTacToeRL.py”执行文件。
- en: 'In the terminal, we can see how many games our agent has won after every 1000th
    episode:'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 在终端中，我们可以看到在每个1000个回合后我们的智能体赢得了多少场比赛：
- en: '![](../Images/54ee918e21c021b90ca16e6124760a17.png)'
  id: totrans-95
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/54ee918e21c021b90ca16e6124760a17.png)'
- en: Screenshot taken by the author
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 作者截图
- en: 'And in the visualization we see the learning curve:'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 在可视化中，我们看到学习曲线：
- en: '![](../Images/3db38640f6c1eb96ac77ecd12fa060d6.png)'
  id: totrans-98
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/3db38640f6c1eb96ac77ecd12fa060d6.png)'
- en: Screenshot taken by the author
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 作者截图
- en: Final Thoughts
  id: totrans-100
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最后的想法
- en: 'With TicTacToe, we use a simple game and some Python — but we can easily see
    how reinforcement learning works:'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 在TicTacToe中，我们使用一个简单的游戏和一些Python——但我们很容易看到强化学习是如何工作的：
- en: The agent starts without any prior knowledge.
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 智能体开始时没有任何先验知识。
- en: It develops a strategy through feedback and experience.
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它通过反馈和经验发展策略。
- en: Its decisions gradually improve as a result – not because it knows the rules,
    but because it learns.
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它的决策逐渐改进，这是由于学习的结果——不是因为它知道规则，而是因为它在学习。
- en: In our example, the opponent was a random agent. Next, we could see how our
    Q-learning agent performs against another learning agent or against ourselves.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的例子中，对手是一个随机智能体。接下来，我们可以看到我们的Q学习智能体如何对抗另一个学习智能体或我们自己。
- en: Reinforcement learning shows us that machine intelligence is not only created
    through knowledge or information – but through experience, feedback and adaptation.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 强化学习表明，机器智能不仅通过知识或信息创造——而是通过经验、反馈和适应。
- en: Where Can You Continue Learning?
  id: totrans-107
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 你在哪里可以继续学习？
