- en: Algorithm Protection in the Context of Federated Learning
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/algorithm-protection-in-the-context-of-federated-learning/](https://towardsdatascience.com/algorithm-protection-in-the-context-of-federated-learning/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: While working at a biotech company, we aim to advance ML & AI algorithms to
    enable, for example, brain lesion segmentation to be executed at the hospital/clinic
    location where patient data resides, so it is processed in a secure manner. This,
    in essence, is guaranteed by federated learning mechanisms, which we have adopted
    in numerous real-world hospital settings. However, when an algorithm is already
    considered as a company asset, we also need means that protect not only sensitive
    data, but also secure algorithms in a heterogeneous federated environment.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/afba05cc5e9f5de0625a4a6e1f0455db.png)'
  id: totrans-3
  prefs: []
  type: TYPE_IMG
- en: Fig.1 High-level workflow and attack surface. Image by author
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: Most algorithms are assumed to be encapsulated within docker-compatible containers,
    allowing them to use different libraries and runtimes independently. It is assumed
    that there is a 3rd party IT administrator who will aim to secure patients’ data
    and lock the deployment environment, making it inaccessible for algorithm providers.
    This perspective describes different mechanisms intended to package and protect
    containerized workloads against theft of intellectual property by a local system
    administrator.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: 'To ensure a comprehensive approach, we will address protection measures across
    three critical layers:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: '**Algorithm code protection:** Measures to secure algorithm code, preventing
    unauthorized access or reverse engineering.'
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Runtime environment:** Evaluates risks of administrators accessing confidential
    data within a containerized system.'
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Deployment environment:** Infrastructure safeguards against unauthorized
    system administrator access.'
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/3dcb99cc5edf163e8a474daa201c2260.png)'
  id: totrans-10
  prefs: []
  type: TYPE_IMG
- en: Fig.2 Different layers of protection. Image by author
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: Methodology
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'After analysis of risks, we have identified two protection measures categories:'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: Intellectual property theft and unauthorized distribution: preventing administrator
    users from accessing, copying, executing the algorithm.
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Reverse engineering risk reduction: blocking administrator users from analyzing
    code to uncover and claim ownership.'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: While understanding the subjectivity of this assessment, we have considered
    both qualitative and quantitative characteristics of all mechanisms.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: Qualitative assessment
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Categories mentioned were considered when selecting suitable solution and are
    considered in summary:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: 'Hardware dependency: potential lock-in and scalability challenges in federated
    systems.'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Software dependency: reflects maturity and long-term stability'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Hardware and Software dependency: measures setup complexity, deployment and
    maintenance effort'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Cloud dependency: risks of lock-in with a single cloud hypervisor'
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Hospital environment: evaluates technology maturity and requirements heterogeneous
    hardware setups.'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Cost: covers for dedicated hardware, implementation and maintenance'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Quantitative assessment
  id: totrans-25
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Subjective risk reduction quantitative assessment description:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e605727941e27e22dd54f38089572a3f.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
- en: Considering the above methodology and assessment criteria, we came up with a
    list of mechanisms that have the potential to guarantee the objective.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
- en: Confidential containers
  id: totrans-29
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Confidential Containers (CoCo) is an emerging CNCF technology that aims to deliver
    confidential runtime environments that will run CPU and GPU workloads while protecting
    the algorithm code and data from the hosting company.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
- en: CoCo supports multiple TEE, including Intel TDX/SGX and AMD SEV hardware technologies,
    including extensions of NVidia GPU operators, that use hardware-backed protection
    of code and data during its execution, preventing scenarios in which a determined
    and skillful local administrator uses a local debugger to dump the contents of
    the container memory and has access to both the algorithm and data being processed.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
- en: Trust is built using cryptographic attestation of runtime environment and code
    that is executed. It makes sure the code is not tempered with nor read by remote
    admin.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
- en: This appears to be a perfect fit for our problem, as the remote data site admin
    would not be able to access the algorithm code. Unfortunately, the current state
    of the CoCo software stack, despite continuous efforts, still suffers from security
    gaps that enable the malicious administrators to issue attestation for themselves
    and effectively bypass all the other protection mechanisms, rendering all of them
    effectively useless. Each time the technology gets closer to practical production
    readiness, a new fundamental security issue is discovered that needs to be addressed.
    It is worth noting that this community is fairly transparent in communicating
    gaps.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: The often and rightfully recognized additional complexity introduced by TEEs
    and CoCo (specialized hardware, configuration burden, runtime overhead due to
    encryption) would be justifiable if the technology delivered on its promise of
    code protection. While TEE seems to be well adopted, CoCo is close but not there
    yet and based on our experiences the horizon keeps on moving, as new fundamental
    vulnerabilities are discovered and need to be addressed.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
- en: In other words, if we had production-ready CoCo, it would have been a solution
    to our problem.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: Host-based container image encryption at rest (protection at rest and in transit)
  id: totrans-36
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This strategy is based on end-to-end protection of container images containing
    the algorithm.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
- en: It protects the source code of the algorithm at rest and in transit but does
    not protect it at runtime, as the container needs to be decrypted prior to the
    execution.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
- en: The malicious administrator at the site has direct or indirect access to the
    decryption key, so he can read container contents just after it is decrypted for
    the execution time.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
- en: Another attack scenario is to attach a debugger to the running container image.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
- en: So host-based container image encryption at rest makes it harder to steal the
    algorithm from a storage device and in transit due to encryption, but moderately
    skilled administrators can decrypt and expose the algorithm.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
- en: In our opinion, the increased practical effort of decrypting the algorithm (time,
    effort, skillset, infrastructure) from the container by the administrator who
    has access to the decryption key is too low to be considered as a valid algorithm
    protection mechanism.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
- en: Prebaked custom virtual machine
  id: totrans-43
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this scenario the algorithm owner is delivering an encrypted virtual machine.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
- en: The key can be added at boot time from the keyboard by someone else than admin
    (required at each reboot), from external storage (USB Key, very vulnerable, as
    anyone with physical access can attach the key storage), or using a remote SSH
    session (using [Dropbear](https://github.com/mkj/dropbear) for instance) without
    allowing local admin to unlock the bootloader and disk.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
- en: Effective and established technologies such as LUKS can be used to fully encrypt
    local VM filesystems including bootloader.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
- en: However, even if the remote key is provided using a boot-level tiny SSH session
    by someone other than a malicious admin, the runtime is exposed to a hypervisor-level
    debugger attack, as after boot, the VM memory is decrypted and can be scanned
    for code and data.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
- en: Still, this solution, especially with remotely provided keys by the algorithm
    owner, provides significantly increased algorithm code protection compared to
    encrypted containers because an attack requires more skills and determination
    than just decrypting the container image using a decryption key.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
- en: To prevent memory dump analysis, we considered deploying a prebaked host machine
    with ssh possessed keys at boot time, this removes any hypervisor level access
    to memory. As a side note, there are methods to freeze physical memory modules
    to delay loss of data.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
- en: Distroless container images
  id: totrans-50
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Distroless container images are reducing the number of layers and components
    to a minimum required to run the algorithm.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
- en: The attack surface is greatly reduced, as there are fewer components prone to
    vulnerabilities and known attacks. They are also lighter in terms of storage,
    network transmission, and latency.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
- en: However, despite these improvements, the algorithm code is not protected at
    all.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
- en: Distroless containers are recommended as more secure containers but not the
    containers that protect the algorithm, as the algorithm is there, container image
    can be easily mounted and algorithm can be stolen without a significant effort.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
- en: Being distroless does not address our goal of protecting the algorithm code.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
- en: Compiled algorithm
  id: totrans-56
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Most machine learning algorithms are written in Python. This interpreted language
    makes it really easy not only to execute the algorithm code on other machines
    and in other environments but also to access source code and be able to modify
    the algorithm.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
- en: The potential scenario even enables the party that steals the algorithm code
    to modify it, let’s say 30% or more of the source code, and claim it’s no longer
    the original algorithm, and could even make a legal action much harder to provide
    evidence of intellectual property infringement.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
- en: Compiled languages, such as C, C++, Rust, when combined with strong compiler
    optimization (-O3 in the case of C, linker-time optimizations), make the source
    code not only unavailable as such, but also much harder to reverse engineer source
    code.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
- en: Compiler optimizations introduce significant control flow changes, mathematical
    operations substitutions, function inlining, code restructuring, and difficult
    stack tracing.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
- en: This makes it much harder to reverse engineer the code, making it a practically
    infeasible option in some scenarios, thus it can be considered as a way to increase
    the cost of reverse engineering attack by orders of magnitude compared to plain
    Python code.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
- en: There’s an increased complexity and skill gap, as most of the algorithms are
    written in Python and would have to be converted to C, C++ or Rust.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
- en: This option does increase the cost of further development of the algorithm and
    even modifying it to make a claim of its ownership but it does not prevent the
    algorithm from being executed outside of the agreed contractual scope.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
- en: Code obfuscation
  id: totrans-64
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The established technique of making the code much less readable, harder to understand
    and develop further can be used to make algorithm evolutions much harder.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
- en: Unfortunately, it does not prevent the algorithm from being executed outside
    of contractual scope.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
- en: Also, the de-obfuscation technologies are getting much better, thanks to advanced
    language models, lowering the practical effectiveness of code obfuscation.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
- en: Code obfuscation does increase the practical cost of algorithm reverse engineering,
    so it’s worth considering as an option combined with other options (for instance,
    with compiled code and custom VMs).
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
- en: Homomorphic Encryption as code protection mechanism
  id: totrans-69
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Homomorphic Encryption (HE) is a promised technology aimed at protecting the
    data, very interesting from secure aggregation strategies of partial results in
    federated learning and analytics scenarios.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
- en: The aggregation party (with limited trust) can only process encrypted data and
    perform encrypted aggregations, then it can decrypt aggregated results without
    being able to decrypt any individual data.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
- en: Practical applications of HE are limited due to its complexity, performance
    hits, limited number of supported operations, there’s observable progress (including
    GPU acceleration for HE) but still it’s a niche and emerging data protection technique.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
- en: From an algorithm protection goal perspective, HE is not designed, nor can be
    made to protect the algorithm. So it’s not an algorithm protection mechanism at
    all.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
- en: Conclusions
  id: totrans-74
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![](../Images/142b1f0adc2b39a592b16c991560d0ad.png "Chart")'
  id: totrans-75
  prefs: []
  type: TYPE_IMG
- en: Fig.3 Risk reduction scores, Image by author
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
- en: In essence, we described and assessed strategies and technologies to protect
    algorithm IP and sensitive data in the context of deploying medical algorithms
    and running them in potentially untrusted environments, such as hospitals.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
- en: What’s visible, the most promising technologies are those that provide a degree
    of hardware isolation. However those make an algorithm provider completely dependent
    on the runtime it will be deployed. While compilation and obfuscation do not mitigate
    completely the risk of intellectual property theft, especially even basic LLM
    seem to be helpful, those methods, especially when combined, make algorithms very
    difficult, thus expensive, to use and modify the code. Which would already provide
    a degree of security.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
- en: Prebaked host/virtual machines are the most common and adopted methods, extended
    with features like full disk encryption with keys acquired during boot via SSH,
    which could make it fairly difficult for local admin to access any data. However,
    especially pre-baked machines could cause certain compliance concerns at the hospital,
    and this needs to be assessed prior to establishing a federated network.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
- en: Key Hardware and Software vendors(Intel, AMD, NVIDIA, Microsoft, RedHat) recognized
    significant demand and continue to evolve, which gives a promise that training
    IP-protected algorithms in a federated manner, without disclosing patients’ data,
    will soon be within reach. However, hardware-supported methods are very sensitive
    to hospital internal infrastructure, which by nature is quite heterogeneous. Therefore,
    containerisation provides some promise of portability. Considering this, Confidential
    Containers technology seems to be a very tempting promise provided by collaborators,
    while it’s still not fullyproduction-readyy.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
- en: Certainly combining above mechanisms, code, runtime and infrastructure environment
    supplemented with proper legal framework decrease residual risks, however no solution
    provides absolute protection particularly against determined adversaries with
    privileged access – the combined effect of these measures creates substantial
    barriers to intellectual property theft.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
- en: We deeply appreciate and value feedback from the community helping to further
    steer future efforts to develop sustainable, secure and effective methods for
    accelerating AI development and deployment. Together, we can tackle these challenges
    and achieve groundbreaking progress, ensuring robust security and compliance in
    various contexts.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
