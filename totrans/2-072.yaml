- en: 'From Data Scientist IC to Manager: One Year In'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 从数据科学家IC到经理：一年回顾
- en: 原文：[https://towardsdatascience.com/from-data-scientist-ic-to-manager-one-year-in/](https://towardsdatascience.com/from-data-scientist-ic-to-manager-one-year-in/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/from-data-scientist-ic-to-manager-one-year-in/](https://towardsdatascience.com/from-data-scientist-ic-to-manager-one-year-in/)
- en: <mdspan datatext="el1754334063615" class="mdspan-comment">Last</mdspan> year,
    I wrote about [my first 3-month manager experience](https://towardsdatascience.com/from-data-scientist-to-data-manager-my-first-3-months-leading-a-team-40c1c7c05e5c/).
    I shared some of the immediate changes I noticed, including more meetings, mentoring
    and coaching opportunities, a broader scope, and increased visibility into the
    behind-the-scenes work.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1754334063615" class="mdspan-comment">去年，我写了一篇关于[我作为经理的前三个月体验](https://towardsdatascience.com/from-data-scientist-to-data-manager-my-first-3-months-leading-a-team-40c1c7c05e5c/)的文章。我分享了一些我注意到的即时变化，包括更多的会议、指导和辅导机会、更广泛的范围，以及对幕后工作的更多了解。
- en: Time flies, and I have now been a manager for a full year. It is a busy year
    as I adapt to the new challenges — as a result, I’ve gone from writing three articles
    on TDS each month to just one. Meanwhile, it has been a very eye-opening and rewarding
    year. My team grew from three to five, and now supports a wide range of functions,
    from GTM and Operations to Product.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 时间飞逝，我现在已经是一名经理整整一年了。这一年非常忙碌，因为我需要适应新的挑战——因此，我从每个月写三篇关于TDS的文章减少到只写一篇。与此同时，这一年也让我受益匪浅，收获颇丰。我的团队从三人增长到五人，现在支持着从GTM和运营到产品的广泛职能。
- en: 'In this article, I will reflect on my first year and share what I believe are
    the three pillars of being an effective frontline data team manager: **prioritization**,
    **empowerment**, and **recognition**.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我将反思我的第一年，并分享我认为成为有效的前线数据团队经理的三个支柱：**优先级**、**赋权**和**认可**。
- en: '* * *'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: I. Prioritization
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: I. 优先级
- en: People management is about **alignment** — making sure stakeholders, my team,
    and I are all on the same page about what matters most and what comes next.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 人员管理是关于**一致性**——确保利益相关者、我的团队和我都对最重要的事情以及接下来要做什么达成共识。
- en: 'However, data teams these days are often overwhelmed with requests. Taking
    my team as an example, we have weekly stakeholder meetings to discuss new and
    ongoing projects; We have a #data-help Slack channel to intake ad-hoc requests;
    We also get pings like “urgent request, need help now” from time to time. As a
    result, we always have a longer to-do list than what we can realistically handle
    without burning out. Therefore, it is critical for me, as the manager, to set
    the priority appropriately and make sure every party is aligned.'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，现在的数据团队常常被各种请求压得喘不过气来。以我的团队为例，我们每周都有利益相关者会议来讨论新的和正在进行的项目；我们有一个#data-help的Slack频道来接收临时请求；我们时不时还会收到“紧急请求，需要立即帮助”这样的ping。因此，对我来说，作为经理，适当地设定优先级并确保所有各方保持一致至关重要。
- en: What does this mean for me?
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 这对我意味着什么？
- en: 1\. Understand business priority
  id: totrans-10
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 理解业务优先级
- en: Instead of trying to understand the specifics of every single request, I’ve
    learned it’s better to start with the big picture. At the end of the day, all
    departments are evaluated based on their contribution to the business growth,
    and the data team is no exception. Therefore, project prioritization should be
    based on the company’s focus and business impacts. I learn this from my manager
    and senior leadership, and I check in regularly with key stakeholders to understand
    what’s on top of their minds. All these contexts help me to prioritize work for
    my team.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 与其试图理解每个请求的具体细节，我学会了从大局出发。毕竟，所有部门都是根据其对业务增长的贡献来评估的，数据团队也不例外。因此，项目优先级应该基于公司的重点和业务影响。我从我的经理和高级领导那里学到了这一点，并且我会定期与关键利益相关者沟通，了解他们心中的首要任务。所有这些背景信息都有助于我为我的团队优先处理工作。
- en: 'Then I prioritize the tasks based on the business **impact** and **urgency**.
    Generally speaking, the team should prioritize high-impact and high-urgency work,
    triage or delegate high-urgency but low-impact tasks, schedule and plan for high-impact
    but low-urgency projects, and delay or decline low-urgency and low-impact asks.
    Let’s see some examples below:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我会根据业务**影响**和**紧急性**来优先处理任务。一般来说，团队应该优先处理高影响和高紧急性的工作，对高紧急性但影响低的任务进行分类或委派，为高影响但紧急性低的项目安排和规划，对低紧急性和低影响的需求进行推迟或拒绝。以下是一些例子：
- en: The Sales team wants a dashboard to automate their manual quota attainment calculation.
    Does this project have value? Of course. It gives sales rep timely visibility
    into their performance, and saves someone on Revenue Operations a few hours per
    week. Is this urgent? Not really, stakeholders can still survive without the dashboard 🙂
  id: totrans-13
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 销售团队想要一个仪表板来自动化他们的手动配额达成计算。这个项目有价值吗？当然。它让销售代表能够及时了解他们的表现，并为收入运营节省了每周几个小时的时间。这紧急吗？其实并不紧急，利益相关者没有仪表板也能生存😜
- en: The same team also wants to analyze the performance of a new AI-powered automated
    email channel. Is it impactful? Sure. An automated outreach channel could save
    sales reps time and potentially lead to more conversions. How urgent is it? Pretty
    urgent, as this is a new initiative and we need data to understand its efficiency
    and iterate.
  id: totrans-14
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 同样的团队还想要分析一个由人工智能驱动的自动化电子邮件渠道的表现。这有影响吗？当然。一个自动化的外联渠道可以节省销售代表的时间，并可能带来更多的转化。这有多紧急？相当紧急，因为这个是一个新的举措，我们需要数据来了解其效率并进行迭代。
- en: In this case, we will naturally prioritize the second project.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，我们将自然地优先考虑第二个项目。
- en: Another factor to consider is the **effort**. This helps to understand how many
    tasks we can realistically take on in each sprint.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个需要考虑的因素是**努力程度**。这有助于我们了解在每个冲刺中我们实际上可以承担多少任务。
- en: '2\. Delegate and check in:'
  id: totrans-17
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 委派并检查：
- en: One great progress I’ve seen in the past year is that once I set up the process
    and philosophy of prioritization, my team quickly adapted to it and gradually
    owned this process themselves. This is largely thanks to our clear embedded structure — each
    member supports a specific business domain and works very closely with the business
    leads, allowing them to understand each team’s priority well. Therefore, nowadays,
    my role is mostly to pass along my high-level understanding of the company strategies
    and help my team connect the dots across domains. I encourage the team to set
    priorities directly with their stakeholders. I often sit quietly in the cross-functional
    prioritization meeting, let my team drive the conversation, and step in only when
    they need it.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 过去一年中，我看到的一个重大进步是，一旦我建立了优先级的过程和哲学，我的团队很快就适应了它，并逐渐自己拥有了这个过程。这很大程度上得益于我们清晰的嵌入式结构——每个成员支持一个特定的业务领域，并与业务负责人非常紧密地合作，使他们能够很好地理解每个团队的优先级。因此，如今，我的角色主要是传达我对公司战略的高层次理解，并帮助我的团队在不同领域之间建立联系。我鼓励团队直接与他们的利益相关者设定优先级。我经常安静地坐在跨职能优先级会议中，让我的团队引导对话，并在他们需要时才介入。
- en: 3\. Be the bad guy
  id: totrans-19
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. 成为“坏人”
- en: Sometimes this also involves protecting my team’s focus. Since my team works
    so closely with the business leads and has built strong relationships, they tend
    to accept more requests than they could realistically handle, which could lead
    to burnout in the long term. While I always remind them that **saying no is an
    important skill** (I learned this the hard way during my IC time), I also step
    in to be “the bad guy” to negotiate priorities and timelines with stakeholders.
    Of course, the negotiation again ties back to how each project links to the business
    impact and the trade-offs we have to make with limited resources.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 有时候这也涉及到保护我团队的关注点。由于我的团队与业务负责人紧密合作，并建立了强大的关系，他们往往会接受比他们实际上能够处理的更多的请求，这可能导致长期疲劳。虽然我总是提醒他们**说“不”是一项重要的技能**（我在我的IC时期艰难地学到了这一点），但我也会介入，成为“坏人”，与利益相关者协商优先级和时间表。当然，协商再次回到了每个项目如何与业务影响相关联，以及我们在有限资源下必须做出的权衡。
- en: 'What could I do better for prioritization? One of my biggest learning is that
    prioritization doesn’t have to be limited to the existing requests. A great manager
    doesn’t just triage requests, but also **finds scope for the team**: identifying
    high-impact, strategic opportunities and selling those ideas to stakeholders.
    It’s something I aim to do more of moving forward.'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 我能为优先级设定做些什么更好？我最大的学习之一是，优先级设定不必局限于现有的请求。一位伟大的管理者不仅会处理请求，还会**为团队找到范围**：识别高影响、战略性的机会，并将这些想法推销给利益相关者。这是我未来想要做得更多的。
- en: '* * *'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: II. Empowerment
  id: totrans-23
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: II. 授权
- en: A mentor once told me that a key skill in management is to “give advice confidently
    on things that you don’t fully understand”. It might sound risky and counterintuitive
    at first. But to be clear, this does not mean one should pretend that they know
    everything. Instead, it means being comfortable making decisions and giving guidance
    based on incomplete information. It’s about two key manager skills to empower
    the team — **get the context quickly and unblock the team**.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 一位导师曾告诉我，管理中的一个关键技能是“对不完全理解的事情有信心地提供建议”。一开始这可能听起来很冒险，也不合直觉。但明确地说，这并不意味着一个人应该假装他们知道一切。相反，这意味着在基于不完整信息做出决策和提供指导时感到舒适。这是关于两个关键的管理技能来赋予团队权力——**快速了解背景和解除团队障碍**。
- en: 1\. Get the context quickly
  id: totrans-25
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 快速了解背景
- en: Let’s be honest, a manager won’t be the subject matter expert on everything
    their team works on. But we still need to know enough to reason through trade-offs,
    risks, and priorities. In that sense, a good data team manager should be a **generalist**
    who knows a bit of everything. For example, one person on my team supports the
    Marketing team, but I haven’t worked directly with the Marketing team as an IC
    in the past. As a result, I had to pick up essential marketing data knowledge
    quickly through reading key metrics dashboards and attending marketing business
    review meetings. Though this does not mean I know all the details of our Multi-touch
    Attribution model, it helps me to understand the landscape well enough to ask
    good questions and offer support.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们坦诚，经理不可能成为他们团队所做的一切主题的专家。但我们仍然需要了解足够的信息来权衡利弊、风险和优先级。从这个意义上说，一个好的数据团队经理应该是一个**通才**，对一切都有所了解。例如，我团队中有一人支持市场营销团队，但我在过去并没有以IC的身份直接与市场营销团队合作。因此，我不得不通过阅读关键指标仪表板和参加市场营销业务审查会议来快速掌握必要的市场营销数据知识。尽管这并不意味着我了解我们多触点归因模型的所有细节，但它帮助我足够了解这个领域，以便提出好的问题并提供支持。
- en: 2\. Unblock the team
  id: totrans-27
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 解除团队障碍
- en: When someone on the team is blocked, as a manager, my first step is to understand
    what the blocker is. If the ask is not clear enough, I can clarify it with stakeholders;
    If it is a technical challenge, I will brainstorm with the team, or even do research
    myself to find the best approach; If it is due to a dependency on another team,
    I can escalate the ask to get it resolved faster, etc.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 当团队中的某个人遇到障碍时，作为经理，我的第一步是了解障碍是什么。如果请求不够明确，我可以与利益相关者澄清；如果是一个技术挑战，我会与团队头脑风暴，甚至自己进行研究以找到最佳方法；如果是由于依赖另一个团队，我可以升级请求以更快地解决它等。
- en: Empowerment also means equipping the team with the skills they need to succeed.
    This, of course, covers both technical skills and soft skills.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 权力下放也意味着为团队配备他们成功所需的技能。当然，这包括技术技能和软技能。
- en: '**Technical skills**: When I first became a manager, our employee engagement
    survey highlighted a gap in learning and development (L&D). Since then, I have
    introduced a monthly poll to determine which technical topic the team is most
    interested in, and then I host an L&D session to dive deeper into the topic. So
    far, we have covered topics including experimentation, causal inference, time
    series analysis, AI use cases in DS, etc.'
  id: totrans-30
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**技术技能**：当我第一次成为经理时，我们的员工参与度调查突显了学习和开发（L&D）方面的差距。从那时起，我引入了每月投票来确定团队最感兴趣的哪个技术主题，然后我举办一个L&D会议来深入探讨该主题。到目前为止，我们已经涵盖了包括实验、因果推断、时间序列分析、数据科学中的AI用例等主题。'
- en: '**Soft skills**: One way to grow the team on the non-technical front is to
    give them autonomy and trust. As I mentioned above, I encourage the team to lead
    cross-functional meetings to enhance business communication. I also give them
    opportunities to present their work during team meetings so they can practice
    in a safe and supportive environment.'
  id: totrans-31
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**软技能**：在非技术层面扩大团队的一种方式是给予他们自主权和信任。正如我上面提到的，我鼓励团队主持跨职能会议以增强商务沟通。我还给他们提供在团队会议中展示工作的机会，这样他们可以在一个安全和支持的环境中练习。'
- en: Is there anything I could do better for empowerment? One area I am still learning
    is **how to balance between autonomy and support**. Sometimes I may be too hands-off — I
    don’t check in very often to avoid micromanaging. However, in some cases, my team
    might instead appreciate early guidance or feedback.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 我能为权力下放做些什么更好的事情吗？我仍在学习的一个领域是**如何在自主权和支持之间取得平衡**。有时我可能过于放手——我不常检查，以避免微观管理。然而，在某些情况下，我的团队可能更欣赏早期的指导或反馈。
- en: '* * *'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: III. Recognition
  id: totrans-34
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: III. 认可
- en: 'Earlier this year, I went through my first annual review cycle as a manager,
    and I was able to promote one direct report on my team. Promotion is one of the
    most powerful forms of recognition. However, it is not always feasible given company
    budgets, team size, tenure, etc. There are a couple of additional ways I think
    a manager can utilize:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 今年早些时候，我作为管理者经历了我的第一次年度评估周期，并能够提升我团队中的一个直接下属。晋升是最有力的认可形式之一。然而，考虑到公司预算、团队规模、任期等因素，这并不总是可行的。我认为管理者可以利用以下几种额外方式：
- en: 1\. Shout-outs and kudos
  id: totrans-36
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 表扬和认可
- en: I try my best to highlight the impact of the team, regardless of size. It could
    be an insightful analysis, a great presentation, a detailed documentation, or
    even a creative idea. Celebrating these wins publicly in team meetings, Slack
    channels, or via emails is always a great way to show appreciation and keep the
    team morale. I also encourage my team to give kudos to each other to foster a
    collaborative environment.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 我尽力突出团队的影响，无论规模大小。这可能是一篇有见地的分析、一次精彩的演示、一份详细的文档，甚至是一个创意想法。在团队会议、Slack频道或通过电子邮件公开庆祝这些胜利，总是表达感激和保持团队士气的好方法。我也鼓励我的团队互相给予认可，以营造一个协作的环境。
- en: 2\. Give credit upward
  id: totrans-38
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 向上给予认可
- en: It is also important to share the team’s achievements with leadership, attributing
    project success clearly. This increases the team’s visibility and paves the way
    to future promotion.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 与此同时，也很重要将团队的成就与领导层分享，明确归功于项目成功。这增加了团队的可见性，并为未来的晋升铺平了道路。
- en: 3\. Support career goals
  id: totrans-40
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. 支持职业目标
- en: Career growth is another form of recognition. I think managers should fully
    understand the career goals of each direct report and help them to address the
    gap. Therefore, I have monthly career growth check-ins with everyone to discuss
    this topic. For example, one of my reports is interested in transitioning into
    a Data Engineer role. Since we sit in the same org as the DE team, there are lots
    of opportunities to collaborate. Therefore, I encourage her to work closely with
    DE and take on small DE tasks within her domain step by step, and keep a running
    list of all the DE-related work she has done to build a case for the transition.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 职业成长是另一种认可形式。我认为管理者应该完全了解每个直接下属的职业目标，并帮助他们填补差距。因此，我每月都会与每个人进行职业成长检查，讨论这个话题。例如，我的一个下属对转变成数据工程师角色感兴趣。由于我们与数据工程师团队在同一组织内，有很多合作的机会。因此，我鼓励她与数据工程师团队紧密合作，逐步承担她领域内的数据工程师任务，并保持一个所有与数据工程师相关工作的清单，以构建一个过渡的案例。
- en: Anything I want to improve for recognition? From the IC perspective, performance
    review could be a myth. Now that I have experienced a performance review cycle
    as a manager and got some insights, I want to help my team better understand how
    it works and how to better position themselves for success.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 我想要改进哪些方面以获得认可？从个体贡献者的角度来看，绩效评估可能是一个神话。现在，我已经作为管理者经历了绩效评估周期，并获得了一些见解，我想帮助我的团队更好地理解它是如何运作的，以及如何更好地为自己定位以取得成功。
- en: '* * *'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: With only one year into management, I still have plenty to learn. But I’m grateful
    for the lessons so far, the team I get to work with, and the opportunity to keep
    growing — both as a data professional and as a manager.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 管理工作才一年，我还有很多东西要学。但我对到目前为止的教训、我能与之共事的团队以及继续成长的机会感到感激——无论是作为数据专业人士还是作为管理者。
- en: Do you have any tips for new managers or have lessons learned from your own
    experience? I would love to hear your thoughts!
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 你有没有给新经理的建议，或者从自己的经验中学到了什么？我很乐意听听你的想法！
