- en: Getting AI Discovery Right
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 正确实现人工智能发现
- en: 原文：[https://towardsdatascience.com/getting-ai-discovery-right/](https://towardsdatascience.com/getting-ai-discovery-right/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/getting-ai-discovery-right/](https://towardsdatascience.com/getting-ai-discovery-right/)
- en: <mdspan datatext="el1753387551319" class="mdspan-comment">When you are</mdspan>
    building with AI, complexity adds up — there’s more uncertainty, more unknowns,
    and more moving parts across teams, tools, and expectations. That’s why having
    a solid discovery process is even more important than when you are building traditional,
    deterministic software.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1753387551319" class="mdspan-comment">当你使用人工智能构建时，复杂性会累积——有更多的不确定性、更多的未知和更多的变动部分跨越团队、工具和期望。这就是为什么拥有一个坚实的发现过程比构建传统的确定性软件时更加重要。
- en: 'According to [recent studies](https://www.rand.org/pubs/research_reports/RRA2680-1.html),
    the #1 reason why AI projects fail is that companies use AI for the wrong problems.
    These problems can be:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 根据[最近的研究](https://www.rand.org/pubs/research_reports/RRA2680-1.html)，人工智能项目失败的第1个原因是公司使用人工智能解决错误的问题。这些问题可以是：
- en: too small, so no one cares
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 太小，没有人关心
- en: too simple and not worth the effort of using AI and dealing with more complexity
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 太简单，不值得使用人工智能和处理更多复杂性
- en: or just fundamentally not a good fit for AI in the first place
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 或者一开始就完全不适合人工智能
- en: 'In this article, I’ll share how we approach discovery for AI-driven products,
    breaking it down into three key steps:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我将分享我们如何处理人工智能驱动产品的发现，将其分解为三个关键步骤：
- en: '![](../Images/f7e36e4dd5281c51ab38f1eaafdeca05.png)'
  id: totrans-8
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/f7e36e4dd5281c51ab38f1eaafdeca05.png)'
- en: 'Figure 1: The discovery process'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 图1：发现过程
- en: I will use the example of a recent project in the automotive industry to illustrate
    the approach. Some of the points described will be new and specific to AI; others
    are known from traditional development, but gain even more meaning in the context
    of AI.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 我将以汽车行业最近的一个项目为例来说明这种方法。其中一些描述的点将是新的，并且与人工智能相关；其他点是传统开发中已知的，但在人工智能的背景下更有意义。
- en: '📚 *Note: This content is based on my new book *[***The Art of AI Product Development***](https://www.amazon.com/Art-AI-Product-Development-Delivering/dp/1633437051)*.
    Check it out for a deep dive into discovery and much more!*'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 📚 *注意：本文内容基于我的新书*[***人工智能产品开发的艺术***](https://www.amazon.com/Art-AI-Product-Development-Delivering/dp/1633437051)。查看它，深入了解发现以及更多内容！*
- en: 'Ideation: Finding the right AI opportunities'
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 构思：寻找合适的AI机会
- en: 'Let’s start with ideation — the first step in any discovery process, in which
    you try to collect a large number of ideas for your development. We will look
    at two familiar ways this plays out: a textbook version, where you follow the
    best practices of product management, and a common real-life scenario, where things
    tend to get a little biased and messy. Rest assured — both paths can lead to success.'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从构思开始——任何发现过程中的第一步，你试图收集大量想法以供开发。我们将探讨两种熟悉的方式：一种教科书版本，其中你遵循产品管理的最佳实践，以及一种常见的现实生活场景，其中事情往往会有点偏颇和混乱。请放心——两条路径都可以通往成功。
- en: '*💡* *According to Jeremy Utley’s and Perry Klebahn’s book *[*Ideaflow*](https://www.amazon.de/Ideaflow-Only-Business-Metric-Matters/dp/0593420586)*,
    the single best predictor of the ****innovation capacity of a business**** is
    ideaflow — the number of novel ideas a person or group can generate around a given
    situation in a given amount of time.*'
  id: totrans-14
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*💡* 根据Jeremy Utley和Perry Klebahn的书籍[*Ideaflow*](https://www.amazon.de/Ideaflow-Only-Business-Metric-Matters/dp/0593420586)，衡量企业**创新能力**的最佳指标是思想流——在给定时间内，个人或团体围绕特定情况产生的创新想法数量。'
- en: 'The textbook scenario: Problem-first thinking'
  id: totrans-15
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 课本场景：以问题为先的思考
- en: 'In the ideal world, you have a lot of time to explore and structure the opportunity
    space — that is, all the customer needs, desires, and pain points you’ve identified.
    These might come from different sources, such as:'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 在理想的世界里，你有大量时间来探索和构建机会空间——也就是说，你已识别的所有客户需求、愿望和痛点。这些可能来自不同的来源，例如：
- en: Customer interviews and feedback
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 客户访谈和反馈
- en: Sales and support conversations
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 销售和支持对话
- en: Competitive research
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 竞争性研究
- en: And sometimes just the team’s gut feeling and industry experience
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 有时只是团队的直觉和行业经验
- en: 'As an example, here is an excerpt from the opportunity space for our automotive
    client, whose goal was to use AI to monitor the global automotive market and create
    recommendations for strategic innovation:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，以下是我们的汽车客户的机会空间摘录，其目标是利用人工智能监控全球汽车市场并制定战略创新的建议：
- en: '![](../Images/b7252a0bb154ce5bf27d9b14ce2a8738.png)'
  id: totrans-22
  prefs: []
  type: TYPE_IMG
- en: 'Figure 2: Excerpt from an opportunity space'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: Note that in this example, we are looking at a brownfield scenario. The opportunity
    space includes not only new feature ideas, but also critiques of existing features,
    such as “lack of transparency into sources.“
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
- en: 'Once you’ve mapped out the needs, you look at the solution space — all the
    different ways you could technically solve those problems. For example, these
    can include:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
- en: Rule-based analytics
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: UX improvements
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Artificial Intelligence
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Adding more domain expertise
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: …
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Importantly, AI is part of the solution space, but it is in no way privileged
    — it is one option among many others.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
- en: 'Finally, you match opportunities to solutions, as illustrated in the following
    figure:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/747bcdfa3fb7c018db30dd67a126a26f.png)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
- en: 'Figure 3: Mapping your opportunity space to your solution space'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s look at some of those links:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: If several users say, *“I need alerts when a competitor launches new models,”* you
    might consider using AI. However, a simple rule-based system that scrapes competitor
    offerings from their websites could solve that too.
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If the problem is, *“I need to create reports and presentations faster,”* AI
    starts to shine. Summarizing large amounts of data or text to reframe it and generate
    new content is exactly where modern AI excels.
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: But if the issue is, *“I don’t trust this data because I can’t see the sources,”* AI
    probably isn’t the right fit at all. That’s a UX and transparency challenge, not
    a machine learning problem.
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In this scenario, it’s important to stay impartial when matching each need to
    the right solution. Even if you’re secretly excited to start building with the
    latest AI tools (who isn’t?), you have to be patient and wait for the right opportunity
    to surface.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
- en: 'The real-life scenario: “Let’s use AI!”'
  id: totrans-40
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now, in reality, things often start on a different note. For example, you’re
    in a team meeting, and someone says, “Let’s use AI!” Or your CEO makes a magic
    speech that suddenly puts AI on your agenda without providing any guidance or
    direction on what to do with it. Without further ado, you risk ending up in the
    “AI for the sake of AI” trap.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
- en: However, it doesn’t have to be a disaster. We are talking about an extremely
    versatile technology, and you can work backwards from the AI-first imperative
    and find great opportunities by ideating around the core benefits and shortcomings
    of AI.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
- en: '**The AI Opportunity Tree: Focusing on the core benefits of AI**'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
- en: 'When I work with teams who’ve already decided they “want to do AI,” I help
    them frame the conversation around what AI is good at. In the B2B context, there
    are four main benefits you can build around:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
- en: '**Automation & productivity: **Use AI to make existing processes faster and
    cheaper. For example, Intercom uses AI chatbots to handle common customer service
    questions automatically, reducing response times and freeing up human agents for
    more complex cases.'
  id: totrans-45
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Improvement & augmentation: **Help people improve the outcomes of their work.
    For example, Notion AI assists with drafting, summarizing, and refining content,
    while leaving the final decision and editing to the human user.'
  id: totrans-46
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**改进与增强：**帮助人们提高他们工作的成果。例如，Notion AI协助起草、总结和改进内容，而将最终决策和编辑留给人类用户。'
- en: '**Innovation & transformation: **Unlock entirely new products, capabilities,
    or business models. For example, Tesla uses AI to shift from selling hardware
    to delivering continuous software-driven value with features like driver assistance,
    battery optimization, and in-car experiences via over-the-air updates.'
  id: totrans-47
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**创新与转型：**解锁全新的产品、功能或商业模式。例如，特斯拉使用AI从销售硬件转向通过驾驶员辅助、电池优化和在空中更新车内体验等功能提供持续软件驱动的价值。'
- en: '**Personalization: **Tailor outputs to specific users or contexts. For example,
    Spotify uses AI to create personalized playlists like Discover Weekly, adapting
    recommendations to each listener’s unique taste.'
  id: totrans-48
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**个性化：**针对特定用户或情境定制输出。例如，Spotify使用AI创建个性化的播放列表，如每周发现，根据每个听众的独特品味调整推荐。'
- en: 'When ideating, you should try to build a rich space of ideas by collecting
    multiple opportunities for each benefit. This will result in a structured [AI
    Opportunity Tree](https://www.ai-strategy-partners.com/knowledge-hub/mental-models/ai-opportunity-tree).
    Here is a small part of the opportunity tree we built in the automotive scenario:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 在构思时，您应该尝试通过收集每个益处的多个机会来构建一个丰富的想法空间。这将导致一个结构化的[AI机会树](https://www.ai-strategy-partners.com/knowledge-hub/mental-models/ai-opportunity-tree)。以下是我们在汽车场景中构建的机会树的一部分：
- en: '![](../Images/4b8fa4f68030f34439f0d7e63a6f4b42.png)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/4b8fa4f68030f34439f0d7e63a6f4b42.png)'
- en: 'Figure 4: Example of an AI Opportunity Tree for a market intelligence system'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 图4：市场情报系统AI机会树的示例
- en: '**Use the shortcomings of AI as exclusion criteria**'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: '**使用AI的不足作为排除标准**'
- en: 'It’s also important to recognize when AI is not the best answer. Here are some
    of the user-facing shortcomings of AI, which you can use to filter out inappropriate
    use cases:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 识别AI不是最佳答案的情况也很重要。以下是一些AI的用户界面不足，您可以用它们来过滤不适当的使用案例：
- en: AI is often a **black box** — users don’t always understand how it works.
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: AI通常是一个**黑盒**——用户并不总是理解它是如何工作的。
- en: '*Example: In financial risk assessments, if a loan applicant gets rejected
    by an opaque AI model, the bank needs to explain why. Without clear reasoning,
    the system fails both legally and ethically.*'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '*示例：在金融风险评估中，如果贷款申请人被一个不透明的AI模型拒绝，银行需要解释原因。如果没有清晰的推理，系统在法律和道德上都会失败。*'
- en: AI introduces **uncertainty** — the same or similar inputs can produce different
    outputs.
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: AI引入了**不确定性**——相同的或相似的输入可以产生不同的输出。
- en: '*Example: In legal document drafting, small prompt changes can lead to widely
    different contract terms. This unpredictability makes it risky for high-stakes,
    regulated industries.*'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: '*示例：在法律文件起草中，微小的提示变化可能导致截然不同的合同条款。这种不可预测性使得高风险、受监管的行业风险增加。*'
- en: AI will make mistakes — sometimes in ways you can’t fully predict.
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: AI会犯错误——有时是以您无法完全预测的方式。
- en: '*Example: In healthcare diagnostics, a wrong AI prediction isn’t just a bug
    — it could lead to harmful decisions with life-or-death consequences.*'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: '*示例：在医疗诊断中，错误的AI预测不仅仅是错误——它可能导致具有生死攸关后果的有害决策。*'
- en: If your use case requires full accuracy, explainability, or predictability,
    move on — AI is likely not the right solution.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您的用例需要完全的准确性、可解释性或可预测性，请继续前进——AI可能不是正确的解决方案。
- en: With your AI opportunities and use cases laid out, let’s now see how you can
    add more flesh to your ideas and specify them for further prioritization and development.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 在明确了您的AI机会和使用案例后，现在让我们看看您如何为您的想法添加更多细节，并为其进一步优先排序和开发进行具体化。
- en: 'Specification & validation: Iterate yourself to the optimal system design'
  id: totrans-62
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 规范与验证：迭代至最佳系统设计
- en: Once you’ve mapped out your use cases and potential features, the next step
    is specification and validation. Here, you define how you are going to build an
    AI system to address a specific use case. Before we dive into the frameworks,
    let’s pause and talk about process, and specifically about the power of iteration
    in the context of AI.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 在绘制了您的用例和潜在功能后，下一步是规范和验证。在这里，您定义您将如何构建一个AI系统来解决特定的用例。在我们深入框架之前，让我们暂停一下，谈谈流程，特别是迭代在AI背景下的力量。
- en: Adopting the practice of iteration
  id: totrans-64
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 采用迭代实践
- en: 'The cover of my book [*The Art of AI Product Development*](https://hubs.la/Q03pVdvK0) features
    a dervish. Just as these dancers rotate in an endless and focused motion, you
    need to build the habit of iteration to get successful with AI. At the beginning
    of your journey, uncertainty is high:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 我的书[*《人工智能产品开发的艺术》*](https://hubs.la/Q03pVdvK0)的封面是一个旋转的舞者。正如这些舞者在无尽而专注的运动中旋转，您需要培养迭代的习惯以在人工智能领域取得成功。在您的旅程开始时，不确定性很高：
- en: You are exploring a new land. Compared to “traditional” software development,
    where we have a lot of historical wisdom to build upon, the solutions and best
    practices aren’t figured out yet.
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您正在探索一片新土地。与“传统”软件开发相比，我们在构建上有很多历史智慧可以借鉴，但解决方案和最佳实践尚未确定。
- en: AI systems will make mistakes, which are a major risk for trust and adoption.
    From the start, you should allocate a lot of time to understanding, anticipating,
    and preventing these mistakes.
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人工智能系统会犯错误，这是信任和采用的主要风险。从一开始，您就应该分配大量时间来理解、预测和预防这些错误。
- en: Your users will have different levels of AI literacy. Some will know how to
    handle errors and uncertainty; others will blindly trust AI outputs, which can
    lead to problems down the line.
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您的用户对人工智能的素养水平各不相同。有些人知道如何处理错误和不确定性；而其他人可能会盲目地信任人工智能的输出，这可能导致后续出现问题。
- en: 'Through iteration, you reduce this uncertainty and build confidence both within
    your team and for your users. The key is to specify and validate in small steps:
    run quick experiments, build prototypes, and create feedback loops to understand
    what’s working and what’s not.'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 通过迭代，您减少了这种不确定性，并在团队和用户中建立了信心。关键是分步骤进行指定和验证：进行快速实验，构建原型，并创建反馈循环，以了解哪些有效，哪些无效。
- en: Most importantly, get real feedback early. Today, it’s tempting to cocoon yourself
    in the world of AI-driven research and simulation. However, that’s a dangerous
    comfort zone. If you don’t talk to real users and put your prototypes in their
    hands, you risk a hard clash when your product finally launches. AI is AI, humans
    are humans. To build something successful, you need to understand and connect
    both worlds.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 最重要的是，尽早获取真实反馈。如今，人们很容易沉浸于由人工智能驱动的研发和模拟的世界中。然而，这是一个危险的舒适区。如果您不与真实用户交流，也不将您的原型交给他们，那么当您的产品最终发布时，您可能会面临激烈的冲突。人工智能是人工智能，人类是人类。要构建成功的东西，您需要理解和连接这两个世界。
- en: Specifying your system with the AI System Blueprint
  id: totrans-71
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用人工智能系统蓝图指定您的系统
- en: 'To make an AI idea more concrete, we use the [**AI System Blueprint**](https://www.ai-strategy-partners.com/knowledge-hub/mental-models/ai-system-model).
    This model represents both the opportunity and the solution, and its beauty lies
    in its simplicity and universality. Over the last two years, I was able to use
    it in literally every AI project I encountered to clarify what was being built.
    It helps align everyone around the same vision: product managers, designers, engineers,
    data scientists, and even executives.'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使人工智能想法更加具体，我们使用[**人工智能系统蓝图**](https://www.ai-strategy-partners.com/knowledge-hub/mental-models/ai-system-model)。这个模型代表了机会和解决方案，其美丽之处在于其简洁性和普遍性。在过去的两年里，我能够在遇到的每一个人工智能项目中使用它来明确正在构建的内容。它有助于让所有人围绕同一个愿景达成一致：产品经理、设计师、工程师、数据科学家，甚至高管。
- en: '![](../Images/80bf409c02772e23516c535aac1d2289.png)'
  id: totrans-73
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/80bf409c02772e23516c535aac1d2289.png)'
- en: 'Figure 5: The AI System Blueprint is a simple but powerful model for specifying
    any AI application'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 图5：人工智能系统蓝图是一个简单但强大的模型，用于指定任何人工智能应用
- en: 'Here’s how to fill it out:'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是如何填写它：
- en: Pick a use case from your AI Opportunity Tree.
  id: totrans-76
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从您的AI机会树中选择一个用例。
- en: 'Map out the value AI can realistically provide to this use case:'
  id: totrans-77
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 绘制人工智能可以为这个用例提供的实际价值的图：
- en: How much of it can you automate? Often, only partial automation is possible
    (and sufficient).
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你能自动化多少？通常，只有部分自动化是可能的（并且足够）。
- en: What will the cost of the mistakes made by the AI be? Start with a rough estimate
    of the frequency and potential cost of mistakes, and correct as you get more information
    from prototyping and user testing.
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人工智能犯下的错误将带来多少成本？从对错误频率和潜在成本的粗略估计开始，随着从原型设计和用户测试中获得更多信息，进行修正。
- en: Do your users actually want automation? In some contexts — especially creative
    tasks — users might resist automation. They might prefer to do the task by themselves,
    or welcome lightweight AI assistance instead of a black-box system taking over
    their workflow.
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您的用户真的想要自动化吗？在某些情况下——尤其是创造性任务——用户可能会抵制自动化。他们可能更愿意自己完成任务，或者欢迎轻量级的人工智能辅助，而不是一个黑盒系统接管他们的工作流程。
- en: '3\. Specify the AI solution:'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 3. 指定人工智能解决方案：
- en: '**Data** will be the raw material powering your AI system.'
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据**将是驱动你的AI系统的原材料。'
- en: '**Intelligence**, which includes AI models and your larger architecture, will
    use AI algorithms to distill value from your data.'
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**智能**，包括AI模型和更大的架构，将使用AI算法从你的数据中提炼价值。'
- en: The **user experience** is the channel that transports this value to the user.
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**用户体验**是将价值传递给用户的渠道。'
- en: 'Thus, the initial blueprint for our use case of creating presentations and
    reports can look as follows:'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们用于创建演示文稿和报告的用例的初始蓝图可以看起来如下：
- en: '![](../Images/bfc46c9eb506527d6f85534947fb01ec.png)'
  id: totrans-86
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/bfc46c9eb506527d6f85534947fb01ec.png)'
- en: 'Figure 6: Example blueprint for an AI system that assists with the creation
    of slide decks and reports'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 图6：辅助创建幻灯片和报告的AI系统的示例蓝图
- en: Avoid narrowing down your solution space too early
  id: totrans-88
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 避免过早地缩小你的解决方案空间
- en: 'The following figure shows a [high-level solution space for AI](https://www.ai-strategy-partners.com/knowledge-hub/mental-models/ai-solution-space-map):'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 下图显示了AI的[高级解决方案空间](https://www.ai-strategy-partners.com/knowledge-hub/mental-models/ai-solution-space-map)：
- en: '![](../Images/c74816895aca6d81e7831c351d9b46ad.png)'
  id: totrans-90
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c74816895aca6d81e7831c351d9b46ad.png)'
- en: 'Figure 7: An overview over the AI Solution Space'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 图7：AI解决方案空间概述
- en: 'A detailed description of this space is out of the scope of this post (you
    can find it in chapters 3-10 of my book). Here, I would like to guard you against
    a common mistake — defining your solution space too narrowly. This limits creativity,
    leads to poor engineering decisions, and can lock you into suboptimal paths. Watch
    out for these three anti-patterns:'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 这个空间的详细描述超出了本文的范围（你可以在我的书的第3-10章中找到）。在这里，我想提醒你避免一个常见的错误——定义你的解决方案空间过于狭窄。这限制了创造力，导致糟糕的工程决策，并可能导致你陷入次优路径。注意以下三个反模式：
- en: '**“Let’s build an agent.” **Right now, every other company wants to build their
    own AI agent. But when you ask, *“What exactly is an agent in your context?”*,
    most teams don’t have a clear answer. That’s usually a sign of hype over strategy.'
  id: totrans-93
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**“让我们构建一个智能体。”** 目前，几乎每家公司都想要构建自己的AI智能体。但当你问，“*在你的语境中，智能体究竟是什么？*”，大多数团队都没有明确的答案。这通常是一个策略不足、炒作过度的迹象。'
- en: '**“Let’s pick a model and figure it out later.” **Some teams start by selecting
    a model or vendor, and scramble to find a use case afterward. This almost always
    leads to misalignment, iteration dead-ends, and wasted resources.'
  id: totrans-94
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**“让我们选择一个模型，以后再解决。”** 一些团队首先选择一个模型或供应商，然后匆忙寻找用例。这几乎总是导致不一致、迭代死胡同和资源浪费。'
- en: '**“Let’s just go with what our platform offers.” **Many companies default to
    whatever their cloud provider suggests, skipping critical architectural decisions.
    Cloud providers are biased toward their own ecosystems. If you blindly follow
    their playbook, you’ll limit your options and miss the chance to develop AI craft
    and build something truly differentiated.'
  id: totrans-95
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**“我们就用我们平台提供的。”** 许多公司默认使用他们的云服务提供商的建议，跳过了关键架构决策。云服务提供商倾向于自己的生态系统。如果你盲目遵循他们的剧本，你会限制你的选择，错过发展AI技能和构建真正差异化产品的机会。'
- en: 'Thus, before you decide on tooling, models, or platforms, take a step back
    and ask:'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，在你决定工具、模型或平台之前，退一步问问自己：
- en: What are the high-level decisions we need to make about data, models, AI architecture,
    and UX?
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们需要就数据、模型、AI架构和UX做出哪些高级决策？
- en: How do they interconnect?
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它们是如何相互连接的？
- en: What trade-offs are we willing to make?
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们愿意做出哪些权衡？
- en: Also, make sure your entire team understands the whole solution space. In AI,
    cross-functional dependencies abound. For example, UX designers need to be familiar
    with the training data of an AI model because it largely determines the outputs
    users see. On the other hand, data and AI engineers need to understand the UX
    so they can put the AI system together in a way that allows it to serve the different
    insights and interactions. Therefore, everyone should be on-board with a shared
    mental model of the potential solutions and the final specification of your AI
    system.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，确保你的整个团队都理解整个解决方案空间。在AI领域，跨职能依赖性很普遍。例如，UX设计师需要熟悉AI模型的训练数据，因为这很大程度上决定了用户看到的输出。另一方面，数据和AI工程师需要了解UX，以便他们能够以允许AI系统提供不同见解和交互的方式组合AI系统。因此，每个人都应该对潜在解决方案和AI系统的最终规范有一个共享的心理模型。
- en: '***Stay up-to-date with the AI solution space with our ***[***AI Radar***](https://www.ai-strategy-partners.com/ai-radar)*:
    The more concrete your specification gets, the more difficult it is to keep up
    with moving parts and new developments. Our ****AI Radar**** monitors the latest
    AI publications, models, and use cases, and structures them in a way that makes
    them actionable for product teams. If you’re interested, please sign up for the
    waitlist *[*here*](https://www.ai-strategy-partners.com/ai-radar)*.*'
  id: totrans-101
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**通过我们的AI雷达保持对AI解决方案空间的最新了解**[**AI雷达**](https://www.ai-strategy-partners.com/ai-radar)：随着你的规范越来越具体，跟上不断变化的部分和新发展的难度就越大。我们的**AI雷达**监控最新的AI出版物、模型和用例，并以一种使产品团队能够采取行动的方式对它们进行结构化。如果你感兴趣，请在此处注册等待名单[*这里*](https://www.ai-strategy-partners.com/ai-radar)*。'
- en: 'Prioritization: Deciding what to build first'
  id: totrans-102
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 优先级：决定先构建什么
- en: The last step in our discovery process is prioritization — deciding what to
    build first. Now, if you’ve done a solid job in specification and validation,
    this will often already point you to use cases with a high potential, making your
    prioritization smoother. Let’s start with the simple prioritization matrix and
    then learn how you can refine your prioritization criteria and process.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 我们发现过程的最后一步是优先级排序——决定先构建什么。现在，如果你在规范和验证方面已经做了扎实的工作，这通常会引导你指向具有高潜力的用例，使你的优先级排序更加顺畅。让我们从简单的优先级矩阵开始，然后学习如何完善你的优先级标准和流程。
- en: The prioritization matrix
  id: totrans-104
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 优先级矩阵
- en: 'Most of us are familiar with the classic prioritization matrix: you define
    criteria like user value, technical feasibility, maybe even risk, and you score
    your ideas accordingly. Then, you add up the points, and the highest-scoring opportunity
    wins. The following figure shows an example for some of the items in our AI Opportunity
    Tree:'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 我们大多数人熟悉经典的优先级矩阵：你定义标准，如用户价值、技术可行性，甚至风险，并相应地为你的想法评分。然后，你加总分数，得分最高的机会获胜。以下图显示了我们的AI机会树中的一些项目的示例：
- en: '![](../Images/efc64b51cc5b21296ee941d1a87d21cb.png)'
  id: totrans-106
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/efc64b51cc5b21296ee941d1a87d21cb.png)'
- en: 'Figure 8: An example prioritization matrix for AI features'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 图8：AI功能的示例优先级矩阵
- en: This kind of framework is popular because it creates clarity and makes stakeholders
    feel good. There’s something reassuring about seeing messy, hairy ideas turned
    into numbers. However, prioritization matrices are highly simplified projections
    of reality. They hide the complexity and nuance behind prioritization, so you
    should avoid overrelying on this representation.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 这种框架之所以受欢迎，是因为它创造了清晰度，并让利益相关者感到满意。看到杂乱无章的想法变成数字，有一种令人安心的感觉。然而，优先级矩阵是现实的高度简化的预测。它们隐藏了优先级背后的复杂性和细微差别，因此你应该避免过度依赖这种表示。
- en: Adding nuance to your AI prioritization
  id: totrans-109
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 为你的AI优先级添加细节
- en: Especially when you are just about to introduce AI, you’re not just ranking
    features, but making long-term bets on your product direction, tech stack, and
    positioning and differentiation. Instead of reducing prioritization to a spreadsheet
    exercise, sit with the complexity, the deeper conversations and potential misalignments.
    Take the time to work through the subtle details, weigh the trade-offs, and make
    decisions that align not just with what’s easy to build now, but also with the
    longer-term vision for AI in your business.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 尤其当你即将引入AI时，你不仅仅是排名功能，而是在对你的产品方向、技术堆栈和定位及差异化进行长期投资。与其将优先级简化为电子表格练习，不如面对复杂性，进行深入的对话和潜在的错位。花时间处理细微的细节，权衡利弊，并做出决策，不仅与现在容易构建的内容一致，而且与你的业务中AI的长期愿景一致。
- en: '**1\. Pick the low-hanging fruits first**'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: '**1. 首先选择容易实现的目标**'
- en: 'The AI Opportunity Tree from section 1 provides a first hint for your prioritization.
    Normally, you are better off starting on the left of the tree and moving to the
    right as you gain more experience and traction with AI. Here’s why:'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 第1节中的AI机会树为你提供了优先级的第一提示。通常，你最好从树的左侧开始，随着你在AI方面获得更多经验和动力，再向右移动。原因如下：
- en: On the left side, you have simple automation tasks. These are usually low risk,
    easy to measure, and a great way to start.
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在左侧，你有简单的自动化任务。这些通常风险低，易于衡量，是很好的起点。
- en: As you venture to the right side, you see more advanced, strategic use cases
    like trend prediction, recommendations, or even new product ideas. These can add
    more impact, but also more risk and complexity.
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当你向右移动时，你会看到更高级、战略性的用例，如趋势预测、推荐甚至新产品想法。这些可以带来更大的影响，但也伴随着更多的风险和复杂性。
- en: Starting on the left helps you build trust and momentum. It delivers quick wins,
    gives your company the time to get comfortable with AI, and builds the foundation
    for more ambitious projects down the line.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 从左侧开始可以帮助你建立信任和动力。它带来了快速的成功，给你的公司时间来适应AI，并为未来的更雄心勃勃的项目打下基础。
- en: '**2\. Work on strategic alignment**'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: '**2. 工作在战略一致性上**'
- en: Before you decide what to build, think about the role of AI in your business.
    While your company might not have an explicit AI strategy (yet), you can infer
    important information from its corporate strategy. For example, is AI a potential
    differentiator, or are you just playing catch-up with the market? If you want
    to gain a competitive edge with AI, you will want to move fast along your opportunity
    tree to implement more advanced and differentiated use cases. Your engineering
    decisions will lean towards more custom and crafty alternatives like open-source
    models, custom pipelines, or even on-premise infrastructure. By contrast, if your
    goal is to follow competitors, you might focus on automation and productivity
    for longer, and choose safer, off-the-shelf solutions from large cloud vendors
    and model providers.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 在你决定要构建什么之前，考虑AI在你业务中的作用。虽然你的公司可能还没有明确的AI战略（目前还没有），但你可以从其企业战略中推断出重要信息。例如，AI是一个潜在的差异化因素，还是你只是在市场上追赶？如果你想通过AI获得竞争优势，你将希望快速沿着机会树实施更先进和差异化的使用案例。你的工程决策将倾向于更定制和巧妙的替代方案，如开源模型、定制流水线，甚至本地基础设施。相比之下，如果你的目标是追随竞争对手，你可能会更长时间地关注自动化和生产力的提升，并选择大型云供应商和模型提供商提供的更安全、现成的解决方案。
- en: '**3\. Define custom criteria for prioritization**'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: '**3. 定义优先级的定制标准**'
- en: 'AI projects often require custom prioritization dimensions beyond the usual
    trio of user value, business impact, and feasibility. Consider factors like:'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: AI项目通常需要超出通常的用户价值、业务影响和可行性三重奏之外的定制优先级维度。考虑以下因素：
- en: '**Scalability & generalization power: **Will your AI solution generalize across
    different user groups, markets, or domains? For example, if you need to inject
    heavy domain expertise for every new customer, that limits your scaling curve.'
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可扩展性与泛化能力：**你的AI解决方案能否在不同用户群体、市场或领域中进行泛化？例如，如果你需要为每个新客户注入大量的领域专业知识，这将限制你的扩展曲线。'
- en: '**Privacy & security: **Some AI use cases are tightly bound to data governance
    and privacy concerns. If you’re in finance, healthcare, or regulated industries,
    this becomes critical.'
  id: totrans-121
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**隐私与安全：**一些AI使用案例与数据治理和隐私问题紧密相关。如果你在金融、医疗保健或受监管的行业，这一点变得至关重要。'
- en: '**Competitive differentiation: **Are you building something truly new, or are
    you following industry trends? If AI is part of your differentiation strategy,
    prioritize novel use cases or unique capabilities, not just features everyone
    else is shipping.'
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**竞争差异化：**你是在构建真正的新事物，还是在追随行业趋势？如果你的差异化策略中包含AI，那么请优先考虑新颖的使用案例或独特的功能，而不仅仅是其他人都在推出的特性。'
- en: '**4\. Plan for spill-over effects**'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: '**4. 规划溢出效应**'
- en: Another important consideration is [spillover effects](https://www.ai-strategy-partners.com/knowledge-hub/mental-models/ai-spillover-model) and
    the long-term value of building reusable AI assets. When you design and develop
    datasets, models, pipelines, or knowledge representations with reuse in mind,
    you’re not just solving one isolated problem, but creating a foundational AI capability.
    It will enable you to accelerate future initiatives, reduce redundancy, and unlock
    compounding recurring returns in your business. This is especially critical if
    AI is a strategic differentiator in your business.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个重要的考虑因素是[溢出效应](https://www.ai-strategy-partners.com/knowledge-hub/mental-models/ai-spillover-model)以及构建可重用AI资产的长远价值。当你设计并开发数据集、模型、流水线或知识表示时，考虑到可重用性，你不仅是在解决一个孤立的问题，而是在创建一个基础AI能力。这将使你能够加速未来的项目，减少冗余，并在你的业务中解锁复利回报。如果AI是你的业务中的战略差异化因素，这一点尤为重要。
- en: Summary
  id: totrans-125
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: 'I hope this article helped you better understand the value of a structured
    discovery process in the messy, complex world of AI product development. Let’s
    summarize the frameworks and best practices we discussed:'
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望这篇文章能帮助你更好地理解在混乱、复杂的AI产品开发世界中，结构化发现过程的价值。让我们总结一下我们讨论的框架和最佳实践：
- en: '**Use the AI Opportunity Tree** to collect, map, and prioritize a broad set
    of potential AI use cases.'
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**使用AI机会树**来收集、映射和优先考虑广泛潜在AI使用案例。'
- en: '**Rely on iteration and continuous feedback** to reduce uncertainty and refine
    your AI product over time.'
  id: totrans-128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**依靠迭代和持续反馈**来减少不确定性，并在一段时间内完善您的AI产品。'
- en: '**Leverage the AI System Blueprint** to align your team around a shared vision
    and avoid cross-functional disconnects.'
  id: totrans-129
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**利用AI系统蓝图**来统一团队对共同愿景的认识，避免跨职能脱节。'
- en: '**Explore the full AI solution space** — don’t fall into the trap of limiting
    yourself to specific tools, models, or vendors too early.'
  id: totrans-130
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**探索完整的AI解决方案空间**——不要过早地陷入只限于特定工具、模型或供应商的陷阱。'
- en: '**Treat prioritization as strategic alignment**, not just feature scoring.
    It’s a way to gradually surface, shape, and refine your larger AI strategy.'
  id: totrans-131
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**将优先级视为战略对齐**，而不仅仅是功能评分。这是一种逐步显现、塑造和细化您更大AI策略的方法。'
