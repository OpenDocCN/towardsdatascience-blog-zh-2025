- en: 'Why MissForest Fails in Prediction Tasks: A Key Limitation You Need to Keep
    in Mind'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/why-missforest-fails-in-prediction-tasks-a-key-limitation-you-need-to-know/](https://towardsdatascience.com/why-missforest-fails-in-prediction-tasks-a-key-limitation-you-need-to-know/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The <mdspan datatext="el1758825777078" class="mdspan-comment">objective</mdspan>
    of this article is to explain that, in predictive settings, imputations must always
    be estimated on the **training set** and **the resulting parameters or models
    saved**. These should then be applied unchanged to the test, out-of-time, or application
    data, in order to avoid data leakage and ensure an unbiased assessment of generalization
    performance.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I want to thank everyone who took the time to read and engage with my article.
    Your support and feedback are greatly appreciated.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: In practice, most real-world datasets contain missing values, making missing
    data one of the most common challenges in statistical modeling. If it is not handled
    properly, it can lead to biased coefficient estimates, reduced statistical power,
    and ultimately incorrect conclusions (Van Buuren, 2018). In predictive modeling,
    ignoring missing data by performing complete case analysis or by excluding predictor
    variables with missing values can limit the applicability of the model and result
    in biased or suboptimal performance.
  prefs: []
  type: TYPE_NORMAL
- en: The Three Missing-Data Mechanisms
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To address this issue, statisticians classify missing data into three mechanisms
    that describe how and why values go missing. **MCAR** (Missing Completely at Random)
    refers to cases where the missingness occurs entirely at random and is independent
    of both observed and unobserved variables. **MAR** (Missing at Random) means that
    the probability of missingness depends on the observed variables but not on the
    missing value itself. **MNAR** (Missing Not at Random) describes the most complex
    case, in which the probability of missingness depends on the unobserved value
    itself.
  prefs: []
  type: TYPE_NORMAL
- en: Classical Approaches and Their Limits to deal with missing data
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Under the MAR assumption, it is possible to use the information contained in
    the observed variables to predict the missing values. Classical approaches based
    on this idea include regression-based imputation, k-nearest neighbors (kNN) imputation,
    and multiple imputation by chained equations (MICE). These methods are considered
    multivariate because they explicitly condition the imputation on the observed
    variables.These approaches explicitly condition the imputation on the observed
    data, but have a significant limitation: they do not handle mixed databases (continuous
    + categorical) well and have difficulty capturing nonlinear relationships and
    complex interactions.'
  prefs: []
  type: TYPE_NORMAL
- en: The Rise of MissForest implemented in R
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: It is to overcome these limitations that MissForest (Stekhoven & Bühlmann, 2012)
    has established itself as a benchmark method. Based on random forests, MissForest
    can capture nonlinear relationships and complex interactions between variables,
    often outperforming traditional imputation techniques. However, when working on
    a project that required a generalizable modeling process — with a proper train/test
    split and out-of-time validation — we encountered a significant limitation. The
    R implementation of the `missForest` package does not store the imputation model
    parameters once fitted.
  prefs: []
  type: TYPE_NORMAL
- en: A Critical Limitation of MissForest in Prediction Settings
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'This creates a practical challenge: it is impossible to train the imputation
    model on the training set and then apply the exact same parameters to the test
    set. This limitation introduces a risk of information leakage during model evaluation
    or a degradation in the quality and consistency of imputations.'
  prefs: []
  type: TYPE_NORMAL
- en: Existing solutions and Their Risks
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'While looking for an alternative solution that would allow consistent imputation
    in a predictive modeling setting, we asked ourselves a simple but critical question:'
  prefs: []
  type: TYPE_NORMAL
- en: How can we impute the test data in a way that remains fully consistent with
    the imputations learned on the training data?
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Exploring this question led us to a discussion on [CrossValidated](https://stats.stackexchange.com/questions/483222/how-to-use-missforest-in-r-for-test-data-imputation),
    where another user was facing the exact same issue and asked:'
  prefs: []
  type: TYPE_NORMAL
- en: '*“How to use missForest in R for test data imputation?”*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Two main solutions were suggested to overcome this limitation. The first consists
    of merging the training and test data before running the imputation. This approach
    often improves the quality of the imputations because the algorithm has more data
    to learn from, but it introduces **data leakage**, since the test set influences
    the imputation model. The second approach imputes the test set separately from
    the training set, which prevents information leakage but forces the algorithm
    to build an entirely new imputation model using only the test data, which is often
    much smaller. This can lead to **less stable imputations** and a potential drop
    in predictive performance.
  prefs: []
  type: TYPE_NORMAL
- en: 'Even the well-known tutorial by [Liam Morgan](https://rpubs.com/lmorgan95/MissForest)
    arrives at a similar workaround. His proposed solution involves imputing the training
    set, fitting a predictive model, then combining the training and test data for
    a final imputation step:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'Although this approach often may improves imputation quality, it suffers from
    the same weakness as Method 1: the test data indirectly participate in the learning
    process, which may inflate model performance metrics and creates an overly optimistic
    estimate of generalization.'
  prefs: []
  type: TYPE_NORMAL
- en: 'These examples highlight a fundamental dilemma:'
  prefs: []
  type: TYPE_NORMAL
- en: How do we impute missing values without biasing model evaluation?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How do we ensure that the imputations applied to the test set are consistent
    with those learned on the training set?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Research Question and Motivation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: These questions motivated our exploration of a more robust solution that preserves
    generalization, avoids data leakage, and produces stable imputations suitable
    for predictive modeling pipelines.
  prefs: []
  type: TYPE_NORMAL
- en: 'This paper is organized into four main sections:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Section 1** introduces the process of identifying and characterizing missing
    values, including how to detect, quantify, and describe them.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Section 2** discusses the MCAR (Missing Completely at Random) mechanism and
    presents methods for handling missing data under this assumption.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Section 3** focuses on the MAR (Missing at Random) mechanism, outlining appropriate
    imputation strategies and addressing the critical question: *Why does the MissForest
    implementation in R fail in prediction settings?*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Section 4** examines the MNAR (Missing Not at Random) mechanism and explores
    strategies for dealing with missing data when the mechanism depends on the unobserved
    values themselves.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 1\. Identification and Characterization of Missing Values
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'This step is critical and should be carried out in close collaboration with
    all stakeholders: model developers, domain experts, and future users of the model.
    The goal is to identify all missing values and mark them.'
  prefs: []
  type: TYPE_NORMAL
- en: In Python, and particularly when using libraries such as **Pandas**, **NumPy**,
    and **Scikit-Learn**, missing values are represented as `NaN`. Values marked as
    `NaN` are ignored by many operations such as `sum()` and `count()`. You can mark
    missing values using the `replace()` function on the relevant subset of columns
    in a Pandas DataFrame.
  prefs: []
  type: TYPE_NORMAL
- en: Once the missing values have been marked, the next step is to evaluate their
    distribution for each variable. The `isnull()` function can be used to identify
    all `NaN` values as `True`, and combined with `sum()` to count the number of missing
    values per column.
  prefs: []
  type: TYPE_NORMAL
- en: Understanding the distribution of missing values is crucial. With this information,
    stakeholders can assess whether the patterns of missingness are reasonable. It
    also allows you to define acceptable thresholds of missingness depending on the
    nature of each variable. For instance, you might decide that up to 10% missing
    values is acceptable for continuous variables, while the threshold for categorical
    variables should remain at 0%.
  prefs: []
  type: TYPE_NORMAL
- en: 'After selecting the relevant variables for modeling, including those containing
    missing values when they are important for prediction, it is essential to split
    the dataset into three samples:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Training set** to estimate parameters and train the models,'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Test set** to evaluate model performance on unseen data,'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Out-of-Time (OOT) set** to validate the temporal robustness of the model.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This split should be performed to preserve the statistical [representativeness](https://towardsdatascience.com/assessment-of-representativeness-between-two-populations-to-ensure-valid-performance-2/)
    of each subsample — for example, by using stratified sampling if the target variable
    is imbalanced.
  prefs: []
  type: TYPE_NORMAL
- en: 'The analysis of missing values should then be conducted exclusively on the
    training set:'
  prefs: []
  type: TYPE_NORMAL
- en: Identify their mechanism (MCAR, MAR, MNAR) using statistical tests,
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Select the appropriate imputation method,
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Train the imputation models on the training set.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The imputation parameters and models obtained in this step must then be applied
    *as is* to the test set and to the Out-of-Time set. This step is essential to
    avoid information leakage and to ensure a correct evaluation of the model’s generalization
    performance.
  prefs: []
  type: TYPE_NORMAL
- en: In the next section, we will examine the MCAR mechanism in detail and present
    the imputation methods that are best suited for this type of missing data.
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Understanding MCAR and Choosing the Right Imputation Methods
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In simple terms, MCAR (Missing Completely at Random) describes a situation
    where the fact that a value is missing is entirely unrelated to either the value
    itself or any other variables in the dataset. In mathematical terms, this means
    that the probability of a data point being missing does not depend on the variable’s
    value nor on the values of any other variables: the missingness is completely
    random.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Before formally defining the MCAR mechanism, let us introduce the notations
    that will be used in this section and throughout the article:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Consider an independent and identically distributed sample of n observations:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**y[i] = (y[i1], . . ., y[ip])^T, i = 1, 2, . . ., n**'
  prefs: []
  type: TYPE_NORMAL
- en: where p is the number of variables with missing values and n is the sample size.
  prefs: []
  type: TYPE_NORMAL
- en: '**Y** ∈ **R**^(nxp) represents the variables that may contain missing values.
    This is the set on which we wish to perform imputation.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We denote the observed entries and missing entries of **Y** as **Y[o]** and
    **Y[m]**,
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**X** ∈ **R**^(nxq) represents the fully observed variables, meaning they contain
    no missing values.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'To indicate which components of **y[i]** are observed or missing, we define
    the indicator vector:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**r[i] = (r[i1], . . ., r[ip])^T, i = 1, 2, . . ., n**'
  prefs: []
  type: TYPE_NORMAL
- en: with **r[ik]** = 1 if **y[ik]** is observed, and 0 otherwise.
  prefs: []
  type: TYPE_NORMAL
- en: 'Stacking these vectors yields the complete matrix of presence/absence indicators:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**R = (r[1], . . ., r[n])**^T'
  prefs: []
  type: TYPE_NORMAL
- en: 'Then the **MCAR assumption** is defined as :'
  prefs: []
  type: TYPE_NORMAL
- en: '**Pr(R|Y[m] ,Y[o], X) = Pr(R).** (1)'
  prefs: []
  type: TYPE_NORMAL
- en: which implies that the missing indicators are completely independent of both
    the missing data, Ym, and the observed data, **Y[o]**. Note that here R is also
    independent of covariates **X**. Before presenting methods for handling missing
    values under the MCAR assumption, we will first introduce a few simple techniques
    to assess whether the MCAR assumption is likely to hold.
  prefs: []
  type: TYPE_NORMAL
- en: 2.1 Assessing the MCAR Assumption
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'In this section, we will simulate a dataset with 10,000 observations and four
    variables under the MCAR assumption:'
  prefs: []
  type: TYPE_NORMAL
- en: '**One continuous variable** containing 20% missing values and **one categorical
    variable** with two levels (0 and 1) containing 10% missing values.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**One continuous variable** and **one categorical variable** that are fully
    observed, with no missing values.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Finally, a **binary target variable** named `target`, taking values 0 and 1.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 'Before performing any analysis, it is essential to split the dataset into two
    parts: a training set and a test set.'
  prefs: []
  type: TYPE_NORMAL
- en: 2.1.1 Preparing Train and Test Data for Analysis the MCAR
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: It is essential to split the dataset into training and test sets while ensuring
    representativeness. This guarantees that both the model and the imputation methods
    are learned exclusively on the training set and then evaluated on the test set.
    Doing so prevents data leakage and provides an unbiased estimate of the model’s
    ability to generalize to unseen data.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: 2.1.1 Analysis MCAR Assumption for continuous variables with missing values
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The first step is to create a binary indicator R (where 1 indicates an observed
    value and 0 indicates a missing value) and compare the distributions of Yo​, Ym​,
    and X across the two groups (observed vs. missing).
  prefs: []
  type: TYPE_NORMAL
- en: Let us illustrate this process using the variable `cont_mcar` as an example.
    We will compare the distribution of `cont_full` between observations where `cont_mcar`
    is missing and where it is observed, using both a boxplot and a Kolmogorov–Smirnov
    test. We will then perform a similar analysis for the categorical variable `cat_full`,
    comparing proportions across the two groups with a bar plot and a chi-squared
    test.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/60eb82bb2b328de79980b44a07418875.png)'
  prefs: []
  type: TYPE_IMG
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/8d13ffefdd1aa28877e02b151cc26a59.png)'
  prefs: []
  type: TYPE_IMG
- en: The two figures above show that, under the MCAR assumption, the distribution
    of 𝑌​, 𝑌ₘ​, and 𝑋 remains unchanged regardless of the value of R (1 = observed,
    0 = missing). These results are further supported by the Kolmogorov–Smirnov and
    Chi-squared tests, which confirm the absence of significant differences between
    the observed and missing groups.
  prefs: []
  type: TYPE_NORMAL
- en: For categorical variables, the same analyses can be performed as described above.
    While these univariate checks can be time-consuming, they are useful when the
    number of variables is small, as they provide a quick and intuitive first look
    at the missing data mechanism. For larger datasets, however, multivariate methods
    should be considered.
  prefs: []
  type: TYPE_NORMAL
- en: 2.1.3 Multivariate Analysis of the MCAR Assumption
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'To the best of my knowledge, only one multivariate statistical test is widely
    used to assess the MCAR assumption at the dataset level: **Little’s chi2 for test
    MCAR assumption called mcartest.** This test, developed in R language, compares
    the distributions of observed variables across different missing-data patterns
    and computes a global test statistic that follows a Chi-squared distribution.'
  prefs: []
  type: TYPE_NORMAL
- en: '**However, its main limitation is that it is not well suited for categorical
    variables**, as it relies on the strong assumption that the variables are normally
    distributed. We now turn to the methods for imputing missing values under the
    MCAR assumption.'
  prefs: []
  type: TYPE_NORMAL
- en: 2.2 Methods to deal with missing data under MCAR.
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Under the MCAR assumption, the missingness indicators R are independent of Y[o],
    Y[m], and X. Since the data are missing completely at random, dropping incomplete
    observations does not introduce bias. However, this approach becomes inefficient
    when the proportion of missing values is high.
  prefs: []
  type: TYPE_NORMAL
- en: In such cases, simple imputation methods, replacing missing values with the
    mean, median, or most frequent category, are often preferred. They are easy to
    implement, require little computational effort, and can be managed over time without
    adding complexity for modelers. While these methods do not create bias, they tend
    to underestimate variance and may distort relationships between variables.
  prefs: []
  type: TYPE_NORMAL
- en: By contrast, advanced methods such as regression-based imputation, kNN, or multiple
    imputation can improve statistical efficiency and help preserve information when
    the proportion of missing data is substantial. Their main drawback lies in their
    algorithmic complexity, higher computational cost, and the greater effort required
    to maintain them in production settings.
  prefs: []
  type: TYPE_NORMAL
- en: 'To impute missing values under the MCAR assumption for prediction purposes,
    proceed as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Learn imputation values** from the training set only, using the mean for
    continuous variables and the most frequent category for categorical variables.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Apply these values** to replace missing data in both the training and the
    test sets.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Evaluate the model** on the test set, ensuring that no information from the
    test set was used during the imputation process.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: This section on understanding MCAR and selecting the appropriate imputation
    method provides a clear foundation for approaching similar strategies under the
    MAR assumption.
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Understanding MAR and Choosing the Right Imputation Methods
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The MAR assumption is defined as :'
  prefs: []
  type: TYPE_NORMAL
- en: '**Pr(R|Y[m] ,Y[o], X) = Pr(R|Y[o], X)** (2)'
  prefs: []
  type: TYPE_NORMAL
- en: In other words, the distribution of the missing indicators depends only on the
    observed data. Even in the case where R depends only on the covariates X,
  prefs: []
  type: TYPE_NORMAL
- en: '**Pr(R|Y[m] ,Y[o], X) = Pr(R|X)** (3)'
  prefs: []
  type: TYPE_NORMAL
- en: This still falls under the MAR assumption.
  prefs: []
  type: TYPE_NORMAL
- en: 3.1 Analysis MAR Assumption for variables with missing values
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**Under the MAR assumption, the missingness indicators 𝑅 depend only on the
    observed variables Y[o] and X, but not on the missing data 𝑌.**'
  prefs: []
  type: TYPE_NORMAL
- en: To indirectly assess the plausibility of this assumption, common statistical
    tests (Student’s *t*-test, Kolmogorov–Smirnov, Chi-squared, etc.) can be applied
    by comparing the distributions of observed variables between groups with and without
    missing values.
  prefs: []
  type: TYPE_NORMAL
- en: For multivariate analysis, one may also use the **mcartest** implemented in
    R, which extends Little’s test of MCAR to evaluate assumption (3), namely **Pr(R|Y[m]
    ,Y[o], X) = Pr(R|X)**, under the assumption of multivariate normality of the variables.
  prefs: []
  type: TYPE_NORMAL
- en: If this test is not rejected, the missing-data mechanism can reasonably be considered
    MAR (assumption 3) given the auxiliary variables X .
  prefs: []
  type: TYPE_NORMAL
- en: We can now turn to the question of how to impute this type of missing data.
  prefs: []
  type: TYPE_NORMAL
- en: 3.2 Methods to deal with missing data under MAR.
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Under the MAR assumption, the probability of missingness R depends only on the
    observed variables Y[o]​ and covariates X. In this setting, variables Y^k with
    missing values can be explained using the other available variables Y[o] and X,
    which motivates the use of advanced imputation methods based on supervised learning.
  prefs: []
  type: TYPE_NORMAL
- en: These approaches involve building a predictive model in which the incomplete
    variable Y^k serves as the target, and the other observed variables Y[o] and X
    act as predictors. The model is trained on complete cases ([Y^k][o] of Y) and
    then applied to estimate the missing values [Y^k​][m] of Y^k.
  prefs: []
  type: TYPE_NORMAL
- en: 'The most commonly used imputation methods in the literature include:'
  prefs: []
  type: TYPE_NORMAL
- en: '**k-nearest neighbors (KNNimpute, Troyanskaya et al., 2001)**, primarily applied
    to continuous data;'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**the saturated multinomial model (Schafer, 1997)**, designed for categorical
    data;'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**multivariate imputation by chained equations (MICE, Van Buuren & Oudshoorn,
    1999)**, suitable for mixed datasets but dependent on tuning parameters and the
    specification of a parametric model.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: All of these approaches rely on assumptions about the underlying data distribution
    or on the ability of the chosen model to adequately capture relationships between
    variables.
  prefs: []
  type: TYPE_NORMAL
- en: More recently, **MissForest (Stekhoven & Bühlmann, 2012)** has emerged as a
    nonparametric alternative based on random forests, well-suited to mixed data types
    and robust to both interactions and nonlinear relationships.
  prefs: []
  type: TYPE_NORMAL
- en: 'The **MissForest algorithm** relies on random forests (RF) to impute missing
    values. The authors propose the following procedure:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a88f225c44dc38704264e3fb22d91293.png)'
  prefs: []
  type: TYPE_IMG
- en: '**MissForest algorithm**'
  prefs: []
  type: TYPE_NORMAL
- en: '**Source: [2] Stekhoven et al.(2012)**'
  prefs: []
  type: TYPE_NORMAL
- en: As defined, the MissForest algorithm cannot be used directly for prediction
    purposes. For each variable, between steps 6 and 7, **the random forest model
    M[s]​** used to predict y[mis](s)​ from x[mis](s)​is not saved. Consequently,
    it is neither likely nor desirable for practitioners to rely on MissForest as
    a predictive model in production.
  prefs: []
  type: TYPE_NORMAL
- en: The absence of stored models **M[s]**​ or **imputation parameters** (here on
    the training set) makes it difficult to evaluate generalization performance on
    new data. Although some have attempted to work around this issue by following
    [Liam Morgan](https://rpubs.com/lmorgan95/MissForest)‘s approach, the challenge
    remains unresolved.
  prefs: []
  type: TYPE_NORMAL
- en: Furthermore, this limitation increases algorithmic complexity and computational
    cost, since the entire algorithm must be rerun from scratch for each new dataset
    (for instance, when working with separate training and test sets).
  prefs: []
  type: TYPE_NORMAL
- en: What should be done? Should the MissForest algorithm still be used?
  prefs: []
  type: TYPE_NORMAL
- en: If the goal is to develop a model for classification or analysis solely on the
    available dataset, with no intention of applying it to new data, then MissForest
    is strongly recommended, as it offers high accuracy and robustness.
  prefs: []
  type: TYPE_NORMAL
- en: However, if the aim is to build a predictive model that will be applied to new
    datasets, MissForest should be avoided for the reasons discussed above. In such
    cases, it is preferable to use an algorithm that explicitly stores the imputation
    models or the parameters estimated from the training set.
  prefs: []
  type: TYPE_NORMAL
- en: 'Fortunately, an adapted version now exists: **MissForestPredict**, available
    since 2024 in both R and Python, specifically designed for predictive tasks. For
    further details, we refer the reader to [**Albu, Elena, et al. (2024)**.](https://arxiv.org/pdf/2407.03379)'
  prefs: []
  type: TYPE_NORMAL
- en: The use of the MissForestPredict algorithm for prediction consists of applying
    the standard MissForest procedure to the training data. Unlike the original MissForest,
    however, this version returns and stores the individual models M[s] associated
    with each variable, which makes it possible to reuse them for imputing missing
    values in new datasets.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/0a4534301f8f327e6b0b2d0b37e408eb.png)'
  prefs: []
  type: TYPE_IMG
- en: '**MissForestPredict Based Imputation with Model Saving**'
  prefs: []
  type: TYPE_NORMAL
- en: '**Source: [4] Albu et al. (2024).**'
  prefs: []
  type: TYPE_NORMAL
- en: The algorithm below illustrates how to apply **MissForestPredict** to new observations,
    whether they come from the **test set**, an **out-of-time sample**, or an **application
    dataset**.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f5d197e7f78dc13279eacdf1b36e4495.png)'
  prefs: []
  type: TYPE_IMG
- en: '**Illustration of MissForestPredict Applied to a New Observation**'
  prefs: []
  type: TYPE_NORMAL
- en: '***Source: [4] Albu et al. (2024).***'
  prefs: []
  type: TYPE_NORMAL
- en: We now have all the elements needed to address the issues raised in the introduction.
    Let us turn to the final mechanism, **MNAR**, before moving on to the conclusion.
  prefs: []
  type: TYPE_NORMAL
- en: 4\. Understanding MNAR
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Missing Not At Random (MNAR) occurs when the missing data mechanism depends
    directly on the unobserved values themselves. In other words, if a variable Y
    contains missing values, then the indicator variable R (with R=1 if Y is observed
    and R=0 otherwise) depends only on the missing component Y[m].
  prefs: []
  type: TYPE_NORMAL
- en: There is no universal statistical method to handle this type of mechanism, since
    the information needed to model the dependency is precisely what is missing. In
    such cases, the recommended approach is to rely on domain expertise to understand
    the reasons behind the nonresponse and to define context-specific strategies for
    analyzing and addressing the missing values.
  prefs: []
  type: TYPE_NORMAL
- en: '**It is important to emphasize, however, that MAR and MNAR cannot generally
    be distinguished empirically based on the observed data alone.**'
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The objective of this article was to show how to impute missing values for predictive
    purposes without biasing the evaluation of model performance. To this end, we
    presented the main mechanisms that generate missing data (MCAR, MAR, MNAR), the
    statistical tests used to assess their plausibility, and the imputation methods
    best suited to each.
  prefs: []
  type: TYPE_NORMAL
- en: Our analysis highlights that, under MCAR, simple imputation methods are generally
    preferable, as they provide substantial time savings without introducing bias.
    In practice, however, missing data mechanisms are most often MAR. In this setting,
    advanced imputation approaches such as MissForest, based on machine learning models,
    are particularly appropriate.
  prefs: []
  type: TYPE_NORMAL
- en: Nevertheless, when the goal is to build predictive models, it is essential to
    use methods that store the imputation parameters or models learned from the training
    data and then replicate them consistently on the test, out-of-time, or application
    datasets. This is precisely the contribution of **MissForestPredict** (introduced
    in 2024 and available in both R and Python), which addresses the limitation of
    the original MissForest (2012), a method not originally designed for predictive
    tasks.
  prefs: []
  type: TYPE_NORMAL
- en: Using MissForest for prediction without adaptation may therefore lead to biased
    results, unless corrective measures are implemented. It would be highly valuable
    for practitioners who have deployed MissForest in production to share the strategies
    they developed to overcome this limitation.
  prefs: []
  type: TYPE_NORMAL
