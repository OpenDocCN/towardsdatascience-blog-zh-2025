  prefs: []
  type: TYPE_TB
- en: '| ResNet50 | ImageNet | NAG | **0.1** | 0.9 |'
  prefs: []
  type: TYPE_TB
- en: '| Batch size | Loss function | Image size | Epochs | Patience |'
  prefs: []
  type: TYPE_TB
