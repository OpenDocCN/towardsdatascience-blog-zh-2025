- en: Practical Guidance
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'As the previous section demonstrates, it is possible to rapidly prototype simple
    chatbot applications with both Streamlit and Chainlit. In the basic demos that
    we implemented, there were a few architectural similarities: the calls to Ollama
    and conversation logging was abstracted away using the `LLMClient` class, the
    context size was limited using a constant variable called `MAX_HISTORY`, and the
    history was serialized into a plaintext chat format. As the advanced demos show,
    however, the scope of each framework is somewhat different, which entails certain
    pros and cons depending on the use case along with related practical recommendations.'
  prefs: []
  type: TYPE_NORMAL
- en: Whereas Streamlit is a general-purpose framework for data-centric, interactive
    web apps, Chainlit is focused on building and deploying conversational AI apps.
    Thus, Chainlit may make more sense to use if the chatbot is central to the prototype;
    as the above code examples illustrate, Chainlit takes care of several boilerplate
    operational details (e.g., built-in chat features for native typing indicators,
    message streaming, and markdown/code rendering). But if the chatbot is embedded
    in a larger AI product, Streamlit may be able to better cope with the larger application
    scope (e.g., combining the chat interface with data visualizations, dashboards,
    global widgets, and custom layouts).
  prefs: []
  type: TYPE_NORMAL
- en: Furthermore, the conversational elements in AI applications may need to be handled
    in an asynchronous manner to ensure a good user experience (UX), since messages
    can arrive at any time and need to be processed quickly while other tasks may
    be in progress (e.g., calling another API or streaming model output). Chainlit
    makes it easy to prototype asynchronous chat logic using Python’s `async` and
    `await` keywords, ensuring that the app can handle concurrent operations without
    blocking the UI. The framework takes care of low-level details around managing
    WebSocket connections and custom polling, so that whenever an event is triggered
    (e.g., message sent, token streamed, state changed), the event handling logic
    of Chainlit automatically triggers UI updates as required. By contrast, Streamlit
    uses synchronous communication, which causes the app script to rerun with each
    user interaction; for complex apps that need to juggle multiple concurrent processes,
    Chainlit may allow for a smoother UX than Streamlit.
  prefs: []
  type: TYPE_NORMAL
- en: Finally, beyond the limitations that come with focusing primarily on chat-based
    applications, Chainlit was released a few years after Streamlit, so it is currently
    less technically mature and has a smaller developer community; e.g., fewer third‑party
    extensions, community‑contributed examples, and troubleshooting resources are
    available at the moment. Although Chainlit is evolving rapidly and gaps are actively
    being addressed, developers may encounter occasional breaking changes between
    versions, less comprehensive documentation for advanced use cases, and limited
    integration guidance for certain deployment environments. Product teams that still
    wish to prototype chatbot-centric AI applications using Chainlit due to potential
    long-term architectural benefits should thus be prepared to make some additional
    short-term investments in custom development, experimentation, and direct engagement
    with the framework maintainers and relevant community forums to resolve issues
    and request additional functionality.
  prefs: []
  type: TYPE_NORMAL
