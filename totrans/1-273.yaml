- en: Advanced Chainlit Demo
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Next, we will extend the basic Chainlit demo with per-message interactive actions
    and multimodal input handling (text and images in our case). The chat-native primitives
    of the Chainlit framework make it easier to implement these types of features
    than in Streamlit. Again, interested readers are encouraged to experience the
    difference by attempting to replicate the functionality using Streamlit.
  prefs: []
  type: TYPE_NORMAL
