  type: TYPE_NORMAL
  zh: 现在，我们将扩展基本的 Streamlit 示例，在左侧添加一个带有滑块小部件的持久侧边栏，用于切换 LLM 的温度参数，一个按钮用于下载聊天历史，以及每个聊天机器人响应下方的反馈按钮（“有帮助”，“没有帮助”）。在
    Streamlit 中，自定义应用布局和添加全局小部件相对容易，但在 Chainlit 中可能比较繁琐——感兴趣的读者可以尝试一下，以亲身体验困难。
