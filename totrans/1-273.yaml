- en: Rapid Prototyping of Chatbots with Streamlit and Chainlit
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/rapid-prototyping-of-chatbots-with-streamlit-and-chainlit/](https://towardsdatascience.com/rapid-prototyping-of-chatbots-with-streamlit-and-chainlit/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*<mdspan datatext="el1758113565427" class="mdspan-comment">Rapid prototyping</mdspan>*
    <mdspan datatext="el1758162360901" class="mdspan-comment">refers to an iterative</mdspan>
    process of building — and collecting regular user feedback on — simple versions
    of a product to quickly validate important assumptions and hypotheses, and assess
    key risks. This approach is closely aligned with the practice of agile software
    development, and the “build-measure-learn” process in the Lean Startup methodology,
    and can significantly reduce development costs and shorten the time-to-market.
    Rapid prototyping is especially useful for shipping successful AI products, given
    the early-stage nature of related technologies, use cases, and user expectations.'
  prefs: []
  type: TYPE_NORMAL
- en: To this end, Streamlit was launched in 2019 as a Python framework that simplifies
    the process of prototyping AI apps that require user interfaces (UIs). Data scientists
    and engineers can focus on the backend parts (e.g., training an ML model and exposing
    a prediction endpoint via an API), and with only a few lines of Python code, Streamlit
    can spin up a user-friendly, customizable UI. Chainlit, also a Python framework,
    was launched more recently in 2023 to specifically address pain points in prototyping
    conversational AI applications (i.e., chatbots). While Streamlit and Chainlit
    are similar in some ways, there are also important differences. In this article,
    we will examine the pros and cons of both frameworks by building end-to-end demo
    chatbot applications, and provide practical recommendations.
  prefs: []
  type: TYPE_NORMAL
- en: '**Note:** All figures in the following sections have been created by the author
    of this article.'
  prefs: []
  type: TYPE_NORMAL
- en: End-to-End Chatbot Demos
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Local Setup
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: For simplicity, we will build the demo applications so that they can easily
    be tested in a local environment using open-source large language models (LLMs)
    accessed via Ollama, a tool for downloading, managing, and interacting with open-source
    LLMs in a user-friendly way on one’s local machine.
  prefs: []
  type: TYPE_NORMAL
- en: Of course, the demos can later be modified for use in production, e.g., by leveraging
    the latest LLMs offered by the likes of OpenAI or Google, and by deploying the
    chatbot on a commonly used hyperscaler such as AWS, Azure, or GCP. All implementation
    steps below have been tested on macOS Sequoia 15.6.1, and should be roughly similar
    on Linux and Windows.
  prefs: []
  type: TYPE_NORMAL
