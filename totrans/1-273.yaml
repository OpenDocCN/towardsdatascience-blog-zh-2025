- en: Advanced Streamlit Demo
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We will now extend the basic Streamlit demo with a persistent sidebar on the
    left side with a slider widget to toggle the temperature parameter of the LLM,
    a button to download chat history, and feedback buttons below each chatbot response
    (“Helpful”, “Not Helpful”). Customizing the app layout and adding global widgets
    can be done relatively easily in Streamlit but may be cumbersome to replicate
    in Chainlit — interested readers can give it a go to experience the difficulties
    first-hand.
  prefs: []
  type: TYPE_NORMAL
