  prefs: []
  type: TYPE_NORMAL
- en: 'This is a very simple example. You might consider implementing some other methods
    to streamline the interaction with Mongo. For example, some methods you could
    implement are:'
  prefs: []
  type: TYPE_NORMAL
- en: 'save(): to allow an instance of the model to be inserted into the database'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'get_or_create(): method which attempts to find a document in a database, if
    not existing it is created.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'bulk_insert(): to insert multiple documents in the database'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'find(): search in the database using advanced filters'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'bulk_find(): find multiple documents'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'get_collection_name(): determines the name of the MongoDB collection'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Final Thoughts
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this article, I described how to implement the ORM and ODM paradigms to streamline
    the work with relational and document-based databases. These approaches abstract
    the complexity of managing the database and writing SQL queries by writing clean
    and maintainable code.
  prefs: []
  type: TYPE_NORMAL
