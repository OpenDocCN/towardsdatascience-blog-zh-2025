- en: Introduction
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: When working on data science projects, one fundamental pipeline to set up is
    the one regarding data collection. Real-world Machine Learning mainly differs
    from Kaggle-like problems because data is not static. We need to scrape websites,
    gather data from APIs, and so on. This way of collecting data might look chaotic,
    and it is! That’s why we need to structure our code following best practices to
    bring some sort of order to all this mess.
  prefs: []
  type: TYPE_NORMAL
- en: The ORM software pattern
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Once you identified the sources from which you want to gather your data, you
    need to collect them in a structured way to store those in your database. For
    example, you might decide that in order to train your LLM what you need are data
    sources which contain 3 fields: *author, content,* and *link.*'
  prefs: []
  type: TYPE_NORMAL
- en: What you could do is to download the data, and then write SQL queries to store
    and retrieve data from your database. More commonly you might want to implement
    all the queries to perform **CRUD** operations. CRUD stands for create, read,
    update, and delete. These are the four basic functions of persistent storage.
  prefs: []
  type: TYPE_NORMAL
- en: Now, what you can do is encapsulate the complexity of writing SQL queries into
    an OMR (**object-relational mapping**) class that handles all the database operations.
    The OMR will be capable of interacting with SQL databases such as MySQL or PostgreSQL.
  prefs: []
  type: TYPE_NORMAL
- en: Let’ code
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: To start with, we need to import the necessary libraries and define a base class
    for all the OMR models.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: We are ready now to define a model. A model represents a table in our database.
    Here I am interested in building a *document* class to store my data. We need
    a user ID which will be our primary key for this model. If you are familiar with
    SQL, you should be familiar with this. In the model class, we also need to specify
    the table name to which the Python class will be associated. Let’s also rewrite
    the magic method **repr** to be sure our objects will be represented and printed
    in a good way.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Let’s define a SQLite database
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: It is also important to initialize a session with which we will actually be
    able to perform operations over our database.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: We can add data to our database using Python!
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: Same for querying the DB. We can also filter based on some attributes like the
    author’s name.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: Check this [link](https://docs.sqlalchemy.org/en/20/orm/) to learn more about
    SQLAlchemy ORM.
  prefs: []
  type: TYPE_NORMAL
- en: The ODM software pattern
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The ODM pattern which stands for **object document mapping** is extremely similar
    to the ORM pattern, but instead of working with relational databases, we work
    with NoSQL databases such as [MongoDB](https://www.mongodb.com/).
  prefs: []
  type: TYPE_NORMAL
- en: ODM maps object-oriented code to JSON-like documents and stores them in the
    database.
  prefs: []
  type: TYPE_NORMAL
- en: 'This means that the class we are going to build will shape how the JSON data
    is represented in the DB. For this reason, we will adopt Pydantic, which provides:'
  prefs: []
  type: TYPE_NORMAL
- en: '**validation**: automatically checks if the input data matches the expected
    types and constraints'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**serialization**.: converts Python objects to and from formats like JSON or
    dictionaries.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Let’ code
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We start with the imports as usual.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: The class we are going to build will inherit from Pydantic **BaseModel** to
    use Pydantics features.
  prefs: []
  type: TYPE_NORMAL
- en: The type UUID is used to specify that the id variable should be a universally
    unique identifier. The Field class is provided by Pydantic to add constraints
    to variables (for validation) or to add some metadata. _default*factory=uuid4*
    means that when a document is created without an ID the method uuid4() is automatically
    called to create an ID. uuid4() generates a random number.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: Now I want to define a method to generate an instance of the class starting
    from a dictionary object.
  prefs: []
  type: TYPE_NORMAL
- en: This will be a class method. In this way, we have a reference to the class (cls)
    and can leverage this to use the [Pydantic](https://docs.pydantic.dev/latest/)
    feature to automatically convert a JSON-like object into a class instance.
  prefs: []
  type: TYPE_NORMAL
- en: The type returned is therefore a Document. We need to use the apexes ‘Document’
    to return the type of the class we are implementing in the class itself.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: In a similar way we implement the to_mongo() method.
