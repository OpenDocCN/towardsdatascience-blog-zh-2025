  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/data-engineering-orm-and-odm-with-python-cff97532e464/](https://towardsdatascience.com/data-engineering-orm-and-odm-with-python-cff97532e464/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![Photo by David Clode on Unsplash](../Images/02ff00df15a765a3fa503f12a3762f38.png)'
  prefs: []
