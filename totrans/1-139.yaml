- en: Let Hypothesis Break Your Python Code Before Your Users Do
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/let-hypothesis-break-your-python-code-before-your-users-do/](https://towardsdatascience.com/let-hypothesis-break-your-python-code-before-your-users-do/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1761849745873" class="mdspan-comment">As a developer</mdspan>,
    you should take testing your code seriously. You might write unit tests with pytest,
    mock dependencies, and strive for high code coverage. If you’re like me, though,
    you might have a nagging question lingering at the back of your mind after you
    finish coding a test suite.
  prefs: []
  type: TYPE_NORMAL
- en: '**“Have I thought of all the edge cases?”**'
  prefs: []
  type: TYPE_NORMAL
- en: You might test your inputs with positive numbers, negative numbers, zero, and
    empty strings. But what about weird Unicode characters? Or floating-point numbers
    that are NaN or infinity? What about a list of lists of empty strings or complex
    nested JSON? The space of possible inputs is huge, and it’s hard to think of the
    myriad different ways your code could break, especially if you’re under some time
    pressure.
  prefs: []
  type: TYPE_NORMAL
- en: Property-based testing flips that burden from *you* to the tooling. Instead
    of hand-picking examples, you state a **property** — a truth that must hold for
    *all* inputs. The Hypothesis library then *generates* inputs; several hundred
    if required, hunts for counterexamples, and — if it finds one — *shrinks* it to
    the simplest failing case.
  prefs: []
  type: TYPE_NORMAL
- en: In this article, I’ll introduce you to the powerful concept of property-based
    testing and its implementation in Hypothesis. We’ll go beyond simple functions
    and show you how to test complex data structures and stateful classes, as well
    as how to fine-tune Hypothesis for robust and efficient testing.
  prefs: []
  type: TYPE_NORMAL
- en: So, what exactly is property-based testing?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Property-based testing is a methodology where, instead of writing tests for
    specific, hardcoded examples, you define the general “properties” or “invariants”
    of your code. A property is a high-level statement about the behaviour of your
    code that should hold for ***all*** valid inputs. You then use a testing framework,
    like Hypothesis, which intelligently generates a wide range of inputs and tries
    to find a “counter-example” — a specific input for which your stated property
    is false.
  prefs: []
  type: TYPE_NORMAL
- en: 'Some key aspects of property-based testing with Hypothesis include:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Generative Testing.** Hypothesis generates test cases for you, from the simple
    to the unusual, exploring edge cases you would likely miss.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Property-Driven.** It shifts your mindset from “what is the output for this
    specific input?” to “what are the universal truths about my function’s behaviour?”'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Shrinking.** This is Hypothesis’s killer feature. When it finds a failing
    test case (which might be large and complex), it doesn’t just report it. It automatically
    “shrinks” the input down to the smallest and simplest possible example that still
    causes the failure, often making debugging dramatically easier.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Stateful Testing.** Hypothesis can test not just pure functions, but also
    the interactions and state changes of complex objects over a sequence of method
    calls.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Extensible Strategies.** Hypothesis provides a robust library of “strategies”
    for generating data, and allows you to compose them or build entirely new ones
    to match your application’s data models.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Why Hypothesis Matters / Common Use Cases
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The primary benefit of property-based testing is its ability to find subtle
    bugs and increase your confidence in the correctness of your code far beyond what’s
    possible with example-based testing alone. It forces you to think more deeply
    about your code’s contracts and assumptions.
  prefs: []
  type: TYPE_NORMAL
- en: 'Hypothesis is particularly effective for testing:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Serialisation/Deserialisation.** A classic property is that for any object
    x, decode(encode(x)) should be equal to x. This is perfect for testing functions
    that work with JSON or custom binary formats.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Complex Business Logic.** Any function with complex conditional logic is
    a great candidate. Hypothesis will explore paths through your code that you may
    not have considered.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Stateful Systems.** Testing classes and objects to ensure that no sequence
    of valid operations can put the object into a corrupted or invalid state.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Testing against a reference implementation.** You can state the property
    that your new, optimised function should always produce the same result as a more
    straightforward, known, exemplary reference implementation.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Functions that accept complex data models.** Testing functions that take
    Pydantic models, dataclasses, or other custom objects as input.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Setting up a development environment
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: All you need is Python and pip. We’ll install pytest as our test runner, hypothesis
    itself, and pydantic for one of our advanced examples.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Hypothesis is best run by using an established test runner tool like pytest,
    so that’s what we’ll do here.
  prefs: []
  type: TYPE_NORMAL
- en: Code example 1 — A simple test
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In this simplest of examples, we have a function that calculates the area of
    a rectangle. It should take two integer parameters, both greater than zero, and
    return their product.
  prefs: []
  type: TYPE_NORMAL
- en: 'Hypothesis tests are defined using two things: the **@given** decorator and
    a **strategy**, which is passed to the decorator. Think of a strategy as the data
    types that Hypothesis will generate to test your function. Here’s a simple example.
    First, we define the function we want to test.'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Next is the testing function.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: Adding the **@given** decorator to the function turns it into a Hypothesis test.
    Passing the strategy (st.integers) to the decorator says that Hypothesis should
    generate random integers for the argument **n** when testing, but we further constrain
    that by ensuring neither integer can be less than one.
  prefs: []
  type: TYPE_NORMAL
- en: We can run this test by calling it in this manner.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: By default, Hypothesis will perform 100 tests on your function with different
    inputs. You can increase or decrease this by using the **settings** decorator.
    For example,
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: Code Example 2 — Testing the Classic “Round-Trip” Property
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Let’s look at a classic property:- serialisation and deserialization should
    be reversible. In short, decode(encode(X)) should return X.
  prefs: []
  type: TYPE_NORMAL
- en: We’ll write a function that takes a dictionary and encodes it into a URL query
    string.
  prefs: []
  type: TYPE_NORMAL
- en: Create a file in your hyp-project folder named my_encoders.py.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: 'These are two elementary functions. What could go wrong with them? Now let’s
    test them in test_encoders.py:'
  prefs: []
  type: TYPE_NORMAL
- en: test_encoders.py
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: Now we can run our test.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: Ok, that was unexpected. Let’s try to decipher what went wrong with this test.
    The TL;DR is that this test shows the encode/decode functions do not work correctly
    for nested dictionaries.
  prefs: []
  type: TYPE_NORMAL
- en: '**The Falsifying Example.** The most important clue is at the very bottom.
    Hypothesis is telling us the *exact input* that breaks the code.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: The input is a dictionary where the key is an empty string and the value is
    an empty dictionary. This is a classic edge case that a human might overlook.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**The Assertion Error:** The test failed because of a failed assert statement:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: 'This is the core of the issue. The original data that went into the test was
    {‘’: {}}. The decoded result that came out of your functions was {‘’: ‘{}’}. This
    shows that for the key ‘’, the values are different:'
  prefs: []
  type: TYPE_NORMAL
- en: In decoded, the value is the **string** ‘{}’.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In data, the value is the **dictionary** {}.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A string is not equal to a dictionary, so the assertion **assert decoded ==
    data** is **False**, and the test fails.
  prefs: []
  type: TYPE_NORMAL
- en: Tracing the Bug Step-by-Step
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Our encode_dict_to_querystring function uses urllib.parse.urlencode. When urlencode
    sees a value that is a dictionary (like {}), it doesn’t know how to handle it,
    so it just converts it to its string representation (‘{}’).
  prefs: []
  type: TYPE_NORMAL
- en: The information about the value’s original *type* (that it was a dict) is **lost
    forever**.
  prefs: []
  type: TYPE_NORMAL
- en: When the decode_querystring_to_dict function reads the data back, it correctly
    decodes the value as the string ‘{}’. It has no way of knowing it was initially
    a dictionary.
  prefs: []
  type: TYPE_NORMAL
- en: 'The Solution: Encode Nested Values as JSON Strings'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The solution is simple,
  prefs: []
  type: TYPE_NORMAL
- en: '**Encode.** Before URL-encoding, check each value in your dictionary. If a
    value is a dict or a list, convert it into a JSON string first.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Decode.** After URL-decoding, check each value. If a value looks like a JSON
    string (e.g., starts with { or [), parse it back into a Python object.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Make our testing more comprehensive**. Our **given** decorator is more complex.
    In simple terms, it tells Hypothesis to generate dictionaries that can contain
    other dictionaries as values, allowing for nested data structures of any depth.
    For example,'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'A simple, flat dictionary: {‘name’: ‘Alice’, ‘city’: ‘London’}'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'A one-level nested dictionary: {‘user’: {‘id’: ‘123’, ‘name’: ‘Tom’}}'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'A two-level nested dictionary: {‘config’: {‘database’: {‘host’: ‘localhost’}}}'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: And so on…
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Here is the fixed code.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: Now, if we rerun our test, we get this,
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: What we worked through there is a classic example showcasing how useful testing
    with Hypothesis can be. What we thought were two simple and error-free functions
    turned out not to be the case.
  prefs: []
  type: TYPE_NORMAL
- en: Code Example 3— Building a Custom Strategy for a Pydantic Model
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Many real-world functions don’t just take simple dictionaries; they take structured
    objects like Pydantic models. Hypothesis can build strategies for these custom
    types, too.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s define a model in my_models.py.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: Now, in test_shipping.py, we’ll build a strategy to generate Product instances
    and test our buggy function.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: And the test output?
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: 'When you run this with pytest, Hypothesis will quickly find a falsifying example:
    a product with a negative weight_kg can result in a negative shipping cost. This
    is an edge case we might not have considered, but Hypothesis found it automatically.'
  prefs: []
  type: TYPE_NORMAL
- en: Code Example 4— Testing Stateful Classes
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Hypothesis can do more than test pure functions. It can test classes with internal
    state by generating sequences of method calls to try to break them. Let’s test
    a simple custom LimitedCache class.
  prefs: []
  type: TYPE_NORMAL
- en: my_cache.py
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: This cache has several potential bugs related to its eviction policy. Let’s
    test it using a Hypothesis Rule-Based State Machine, which is designed for testing
    objects with internal state by generating random sequences of method calls to
    identify bugs that only appear after specific interactions.
  prefs: []
  type: TYPE_NORMAL
- en: Create the file test_cache.py.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: Hypothesis will generate long sequences of puts and gets. It will quickly identify
    a sequence of puts that causes the cache’s size to exceed its capacity or for
    its eviction to behave differently from our model, thereby revealing bugs in our
    implementation.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: The above output highlights a bug in the code. In simple terms, this output
    shows that the cache isnot a proper **“Least Recently Used” (LRU)** cache**.**
    It has the following significant flaw,
  prefs: []
  type: TYPE_NORMAL
- en: '*When you update an item that is already in the cache, the cache fails to remember
    that it’s now the “newest” item. It still treats it as the oldest, so it gets
    kicked out (evicted) from the cache prematurely.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Code Example 5 — Testing Against a Simpler, Reference Implementation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: For our final example, we’ll look at a typical situation. Often, coders write
    functions that are supposed to replace older, slower, but otherwise perfectly
    correct, functions. Your new function must have the same outputs as the old function
    for the same inputs. Hypothesis can make your testing in this regard much easier.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s say we have a simple function, sum_list_simple, and a new, **“optimised”**
    sum_list_fast that has a bug.
  prefs: []
  type: TYPE_NORMAL
- en: '**my_sums.py**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: '**test_sums.py**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE19]'
  prefs: []
  type: TYPE_PRE
- en: Hypothesis will quickly find that for any list with more than one element, the
    new function fails. Let’s check it out.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE20]'
  prefs: []
  type: TYPE_PRE
- en: So, the test failed because the **“fast”** sum function gave the wrong answer
    (0) for the input list [1, 0], while the correct answer, provided by the **“simple”**
    sum function, was 1\. Now that you know the issue, you can take steps to fix it.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In this article, we took a deep dive into the world of property-based testing
    with Hypothesis, moving beyond simple examples to show how it can be applied to
    real-world testing challenges. We saw that by defining the invariants of our code,
    we can uncover subtle bugs that traditional testing would likely miss. We learned
    how to:'
  prefs: []
  type: TYPE_NORMAL
- en: Test the “round-trip” property and see how more complex data strategies can
    reveal limitations in our code.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Build custom strategies to generate instances of complex Pydantic models for
    testing business logic.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Use a RuleBasedStateMachine to test the behaviour of stateful classes by generating
    sequences of method calls.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Validate a complex, optimised function by testing it against a more straightforward,
    known-good reference implementation.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Adding property-based tests to your toolkit won’t replace all your existing
    tests. Still, it will profoundly augment them, forcing you to think more clearly
    about your code’s contracts and giving you a much higher degree of confidence
    in its correctness. I encourage you to pick a function or class in your codebase,
    think about its fundamental properties, and let Hypothesis try its best to prove
    you wrong. You’ll be a better developer for it.
  prefs: []
  type: TYPE_NORMAL
- en: I’ve only scratched the surface of what Hypothesis can do for your testing.
    For more information, refer to their official documentation, available via the
    link below.
  prefs: []
  type: TYPE_NORMAL
- en: '[https://hypothesis.readthedocs.io/en/latest](https://hypothesis.readthedocs.io/en/latest)'
  prefs: []
  type: TYPE_NORMAL
