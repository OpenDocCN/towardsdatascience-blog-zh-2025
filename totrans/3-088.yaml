- en: Google’s New AI System Outperforms Physicians in Complex Diagnoses
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 谷歌新的人工智能系统在复杂诊断中超越医生
- en: 原文：[https://towardsdatascience.com/googles-new-ai-system-outperforms-physicians-in-complex-diagnoses/](https://towardsdatascience.com/googles-new-ai-system-outperforms-physicians-in-complex-diagnoses/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[原文链接](https://towardsdatascience.com/googles-new-ai-system-outperforms-physicians-in-complex-diagnoses/)'
- en: <mdspan datatext="el1744868302944" class="mdspan-comment">Imagine</mdspan> going
    to the doctor with a baffling set of symptoms. Getting the right diagnosis quickly
    is crucial, but sometimes even experienced physicians face challenges piecing
    together the puzzle. Sometimes it might not be something serious at all; others
    a deep investigation might be required. No wonder AI systems are making progress
    here, as we have already seen them assisting increasingly more and more on tasks
    that require thinking over documented patterns. But Google just seems to have
    taken a very strong leap in the direction of making “AI doctors” actually happen.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1744868302944" class="mdspan-comment">想象一下</mdspan>带着令人困惑的症状去看医生。快速得到正确的诊断至关重要，但有时即使是经验丰富的医生在拼凑谜团时也会面临挑战。有时可能根本不是什么严重的事情；而有时可能需要进行深入的调查。难怪人工智能系统在这里取得了进展，因为我们已经看到它们在越来越多地协助需要思考文档模式的任务。但谷歌似乎在实现“人工智能医生”这一目标上迈出了非常坚实的一步。
- en: 'AI’s “intromission” into medicine isn’t entirely new; algorithms (including
    many AI-based ones) have been aiding clinicians and researchers in tasks such
    as image analysis for years. We more recently saw anecdotal and also some documented
    evidence that AI systems, particularly Large Language Models (LLMs), can assist
    doctors in their diagnoses, with some claims of nearly similar accuracy. But in
    this case it is all different, because the new work from Google Research introduced
    an LLM specifically trained on datasets relating observations with diagnoses.
    While this is only a starting point and many challenges and considerations lie
    ahead as I will discuss, the fact is clear: a powerful new AI-powered player is
    entering the arena of medical diagnosis, and we better get prepared for it. In
    this article I will mainly focus on how this new system works, calling out along
    the way various considerations that arise, some discussed in Google’s paper in
    Nature and others debated in the relevant communities — i.e. medical doctors,
    insurance companies, policy makers, etc.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能进入医学领域并非完全新鲜；算法（包括许多基于人工智能的算法）多年来一直在帮助临床医生和研究人员进行图像分析等任务。我们最近看到了一些轶事证据，以及一些记录在案的证据，表明人工智能系统，特别是大型语言模型（LLMs），可以帮助医生进行诊断，有些声称其准确性几乎相似。但在这个案例中，情况完全不同，因为谷歌研究的新工作引入了一个专门针对与诊断相关的数据集进行训练的LLM。虽然这只是一个起点，而且许多挑战和考虑因素在我将要讨论的方面还有很多，但事实是明确的：一个强大的新人工智能玩家正在进入医疗诊断领域，我们最好为此做好准备。在这篇文章中，我将主要关注这个新系统是如何工作的，沿途指出各种出现的考虑因素，其中一些在《自然》杂志的谷歌论文中讨论过，而另一些则在相关社区中辩论过——即医生、保险公司、政策制定者等。
- en: Meet Google’s New Superb AI System for Medical Diagnosis
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 介绍谷歌新的人工智能医疗诊断系统
- en: 'The advent of sophisticated LLMs, which as you surely know are AI systems trained
    on vast datasets to “understand” and generate human-like text, is representing
    a substantial upshift of gears in how we process, analyze, condense, and generate
    information (at the end of this article I posted some other articles related to
    all that — go check them out!). The latest models in particular bring a new capability:
    engaging in nuanced, text-based reasoning and conversation, making them potential
    partners in complex cognitive tasks like diagnosis. In fact, the new work from
    Google that I discuss here is “just” one more point in a rapidly growing field
    exploring how these advanced AI tools can understand and contribute to clinical
    workflows.'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 复杂的大型语言模型的出现，正如你肯定知道的，这些是经过大量数据集训练以“理解”和生成类似人类文本的人工智能系统，这代表着我们在处理、分析和生成信息（在本文末尾我发布了一些与此相关的其他文章——去看看它们！）方面的重大转变。特别是最新的模型带来了一种新的能力：参与细微的基于文本的推理和对话，使它们成为复杂认知任务（如诊断）的潜在合作伙伴。实际上，我在这里讨论的谷歌的新工作只是快速发展的一个领域中的一个点，该领域正在探索这些先进的AI工具如何理解和贡献于临床工作流程。
- en: The study we are looking into here was published in peer-reviewed form in the
    prestigious journal *Nature*, sending ripples through the medical community. In
    their article “Towards accurate differential diagnosis with large language models”
    Google Research presents a specialized type of LLM called AMIE after *Articulate
    Medical Intelligence Explorer*, trained specifically with clinical data with the
    goal of assisting medical diagnosis or even running fully autonomically. The authors
    of the study tested AMIE’s ability to generate a list of possible diagnoses — what
    doctors call a “differential diagnosis” — for hundreds of complex, real-world
    medical cases published as challenging case reports.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 我们正在研究的这项研究以同行评审的形式发表在享有盛誉的期刊《自然》上，在医学界引起了波澜。在他们的文章《利用大型语言模型实现准确的鉴别诊断》中，谷歌研究团队介绍了一种称为AMIE（Articulate
    Medical Intelligence Explorer）的专用LLM，它专门使用临床数据进行训练，旨在辅助医疗诊断甚至完全自主运行。该研究的作者测试了AMIE为数百个复杂、真实世界的医疗案例生成可能诊断列表的能力——医生称之为“鉴别诊断”。这些案例以挑战性案例报告的形式发表。
- en: 'Here’s the paper with full technical details:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是包含完整技术细节的论文：
- en: '[https://www.nature.com/articles/s41586-025-08869-4](https://www.nature.com/articles/s41586-025-08869-4)'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://www.nature.com/articles/s41586-025-08869-4](https://www.nature.com/articles/s41586-025-08869-4)'
- en: The Surprising Results
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 意想不到的结果
- en: The findings were striking. When AMIE worked alone, just analyzing the text
    of the case reports, its diagnostic accuracy was significantly higher than that
    of experienced physicians working without assistance! AMIE included the correct
    diagnosis in its top-10 list almost 60% of the time, compared to about 34% for
    the unassisted doctors.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 研究结果引人注目。当AMIE独立工作时，仅分析案例报告的文本，其诊断准确率显著高于无辅助的资深医生！AMIE几乎60%的时间将其正确诊断列入前十位，而未经辅助的医生这一比例约为34%。
- en: Very intriguingly, and in favor of the AI system, AMIE alone slightly outperformed
    doctors who were assisted by AMIE itself! While doctors using AMIE improved their
    accuracy significantly compared to using standard tools like Google searches (reaching
    over 51% accuracy), the AI on its own still edged them out slightly on this specific
    metric for these challenging cases.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 非常有趣的是，并且有利于AI系统，AMIE单独略优于由AMIE本身辅助的医生！虽然使用AMIE的医生与使用标准工具（如Google搜索）相比，其准确性显著提高（达到超过51%的准确性），但AI在这个特定指标上仍然略胜一筹，因为这些病例具有挑战性。
- en: 'Another “point of awe” I find is that in this study comparing AMIE to human
    experts, the AI system only analyzed the text-based descriptions from the case
    reports used to test it. However, the human clinicians had access to the full
    reports, that is the same text descriptions available to AMIE plus images (like
    X-rays or pathology slides) and tables (like lab results). The fact that AMIE
    outperformed unassisted clinicians even without this multimodal information is
    on one side remarkable, and on another side underscores an obvious area for future
    development: integrating and reasoning over multiple data types (text, imaging,
    possibly also raw genomics and sensor data) is a key frontier for medical AI to
    truly mirror comprehensive clinical assessment.'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个让我感到敬畏的“亮点”是，在这项将AMIE与人类专家进行比较的研究中，AI系统仅分析了用于测试它的案例报告中的基于文本的描述。然而，人类临床医生可以访问完整的报告，即AMIE可以获得的相同文本描述，以及图像（如X光片或病理切片）和表格（如实验室结果）。AMIE在没有这种多模态信息的情况下仍然优于无辅助的临床医生，这一事实一方面令人瞩目，另一方面也突显了未来发展的一个明显领域：整合和推理多种数据类型（文本、成像、可能还包括原始基因组学和传感器数据）是医疗AI真正反映全面临床评估的关键前沿。
- en: AMIE as a Super-Specialized LLM
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: AMIE作为一个超级专业的大型语言模型（LLM）
- en: So, how does an AI like AMIE achieve such impressive results, performing better
    than human experts some of whom might have years diagnosing diseases?
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，像AMIE这样的AI是如何取得如此令人印象深刻的成果，甚至优于一些可能拥有多年诊断疾病经验的专家的呢？
- en: 'At its core, AMIE builds upon the foundational technology of LLMs, similar
    to models like GPT-4 or Google’s own Gemini. However, AMIE isn’t just a general-purpose
    chatbot with medical knowledge layered on top. It was specifically optimized for
    clinical diagnostic reasoning. As described in more detail in the Nature paper,
    this involved:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 在其核心，AMIE建立在LLM的基础技术之上，类似于GPT-4或谷歌自己的Gemini等模型。然而，AMIE不仅仅是一个具有医学知识的通用聊天机器人。它专门针对临床诊断推理进行了优化。正如Nature论文中更详细地描述的那样，这包括：
- en: '**Specialized training data:** Fine-tuning the base LLM on a massive corpus
    of medical literature that includes diagnoses.'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**专业训练数据**：在包含诊断的大量医学文献语料库上微调基础LLM。'
- en: '**Instruction tuning:** Training the model to follow specific instructions
    related to generating differential diagnoses, explaining its reasoning, and interacting
    helpfully within a clinical context.'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**指令调整**：训练模型遵循与生成鉴别诊断、解释其推理以及在临床环境中有益互动相关的特定指令。'
- en: '**Reinforcement Learning from Human Feedback:** Potentially using feedback
    from clinicians to further refine the model’s responses for accuracy, safety,
    and helpfulness.'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**从人类反馈中进行强化学习**：可能使用临床医生的反馈来进一步细化模型的响应，以提高准确性、安全性和实用性。'
- en: '**Reasoning Enhancement:** Techniques designed to improve the model’s ability
    to logically connect symptoms, history, and potential conditions; similar to those
    used during the reasoning steps in very powerful models such as Google’s own Gemini
    2.5 Pro!'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**推理增强**：旨在提高模型将症状、病史和潜在条件进行逻辑连接的能力的技术；类似于在像Google自己的Gemini 2.5 Pro这样的非常强大的模型推理步骤中使用的技术！'
- en: Note that the paper itself indicates that AMIE outperformed GPT-4 on automated
    evaluations for this task, highlighting the benefits of domain-specific optimization.
    Notably too, but negatively, the paper does not compare AMIE’s performance against
    other general LLMs, not even Google’s own “smart” models like Gemini 2.5 Pro.
    That’s quite disappointing, and I can’t understand how the reviewers of this paper
    overlooked this!
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，该论文本身表明，AMIE在针对此任务的自动评估中优于GPT-4，突出了领域特定优化的好处。值得注意的是，但也是负面的，该论文没有将AMIE的性能与其他通用LLM进行比较，甚至没有与Google自己的“智能”模型如Gemini
    2.5 Pro进行比较。这相当令人失望，我无法理解这篇论文的审稿人如何忽略了这一点！
- en: Importantly, AMIE’s implementation is designed to support interactive usage,
    so that clinicians could ask it questions to probe its reasoning — a key difference
    from regular diagnostic systems.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 重要的是，AMIE的实施旨在支持交互式使用，以便临床医生可以提出问题来探究其推理——这与常规诊断系统的一个关键区别。
- en: Measuring Performance
  id: totrans-22
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 测量性能
- en: Measuring performance and accuracy in the produced diagnoses isn’t trivial,
    and is interesting for you reader with a data science mindset. In their work,
    the researchers didn’t just assess AMIE in isolation; rather they employed a randomized
    controlled setup whereby AMIE was compared against unassisted clinicians, clinicians
    assisted by standard search tools (like Google, PubMed, etc.), and clinicians
    assisted by AMIE itself (who could also use search tools, though they did so less
    often).
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 在产生的诊断中测量性能和准确性并不简单，对于具有数据科学思维的你读者来说很有趣。在他们的工作中，研究人员并没有孤立地评估AMIE；相反，他们采用了一种随机对照设置，其中AMIE与未受协助的临床医生、受标准搜索工具（如Google、PubMed等）协助的临床医生以及由AMIE本身协助的临床医生（他们也可以使用搜索工具，尽管他们使用得较少）进行了比较。
- en: 'The analysis of the data produced in the study involved multiple metrics beyond
    simple accuracy, most notably the top-n accuracy (which asks: was the correct
    diagnosis in the top 1, 3, 5, or 10?), quality scores (how close was the list
    to the final diagnosis?), appropriateness, and comprehensiveness — the latter
    two rated by independent specialist physicians blinded to the source of the diagnostic
    lists.'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 研究中产生数据的分析涉及了多个指标，而不仅仅是简单的准确性，最显著的是top-n准确性（询问：正确的诊断是否在前1、3、5或10位？），质量分数（列表与最终诊断的接近程度如何？），适宜性和全面性——后两者由对诊断列表来源不知情的独立专家医生进行评分。
- en: This wide evaluation provides a more robust picture than a single accuracy number;
    and the comparison against both unassisted performance and standard tools helps
    quantify the actual added value of the AI.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 这种广泛的评估比单一的准确性数字提供了更稳健的图像；并且与未受协助的性能和标准工具的比较有助于量化AI的实际增值。
- en: Why Does AI Do so Well at Diagnosis?
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么AI在诊断方面做得如此出色？
- en: Like other specialized medical AIs, AMIE was trained on vast amounts of medical
    literature, case studies, and clinical data. These systems can process complex
    information, identify patterns, and recall obscure conditions far faster and more
    comprehensively than a human brain juggling countless other tasks. AMIE, in particualr,
    was specifically optimized for the kind of reasoning doctors use when diagnosing,
    akin to other reasoning models but in this cases specialized for gianosis.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 与其他专业医疗AI一样，AMIE是在大量的医学文献、案例研究和临床数据上训练的。这些系统可以处理复杂信息，识别模式，并且比人类大脑在处理无数其他任务时更快、更全面地回忆起罕见的条件。特别是，AMIE被特别优化以适应医生在诊断时使用的推理方式，类似于其他推理模型，但在这种情况下专门针对诊断。
- en: For the particularly tough “diagnostic puzzles” used in the study (sourced from
    the prestigious *New England Journal of Medicine*), AMIE’s ability to sift through
    possibilities without human biases might give it an edge. As an observer noted
    in the vast discussion that this paper triggered over social media, it is impressive
    that AI excelled not just on simple cases, but also on some quite challenging
    ones.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 对于研究中特别棘手的“诊断谜题”（来源于享有盛誉的《新英格兰医学杂志》），AMIE在没有人类偏见的情况下筛选可能性的能力可能给它带来优势。正如一位观察者在社交媒体上引发的大量讨论中指出的，AI不仅在简单病例上表现出色，而且在一些相当具有挑战性的病例上也表现出色。
- en: AI Alone vs. AI + Doctor
  id: totrans-29
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: AI单独与AI + 医生
- en: The finding that AMIE alone slightly outperformed the AMIE-assisted human experts
    is puzzling. Logically, adding a skilled doctor’s judgment to a powerful AI should
    yield the best results (as previous studies with have shown, in fact). And indeed,
    doctors with AMIE did significantly better than doctors without it, producing
    more comprehensive and accurate diagnostic lists. But AMIE alone worked slightly
    better than doctors assisted by it.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 发现AMIE单独略优于AMIE辅助的人类专家令人困惑。从逻辑上讲，将熟练医生的专业判断与强大的AI相结合应该会产生最佳结果（正如之前的研究所显示）。确实，使用AMIE的医生比没有使用它的医生表现更好，产生了更全面和准确的诊断列表。但AMIE单独工作略优于辅助它的医生。
- en: Why the slight edge for AI alone in this study? As highlighted by some medical
    experts over social media, this small difference probably doesn’t mean that doctors
    make the AI worse or the other way around. Instead, it probably suggests that,
    not being familiar with the system, the doctors haven’t yet figured out the best
    way to collaborate with AI systems that possess more raw analytical power than
    humans for specific tasks and goals. This, just like we might not be interacting
    perfecly with a regular LLM when we need its help.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么在这个研究中AI单独有轻微的优势？正如一些医学专家在社交媒体上强调的，这个小小的差异可能并不意味着医生使AI变得更糟，或者反过来。相反，它可能表明，由于不熟悉该系统，医生还没有找到与具有比人类更强的原始分析能力、针对特定任务和目标的AI系统最佳合作的方式。这就像当我们需要LLM的帮助时，我们可能并没有与常规LLM完美互动一样。
- en: Again paralleling very well how we interact with regular LLMs, it might well
    be that doctors initially stick too closely to their own ideas (an “anchoring
    bias”) or that they do not know how to best “interrogate” the AI to get the most
    useful insights. It’s all a new kind of teamwork we need to learn — human with
    machine.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 再次很好地平行于我们与常规LLMs的互动方式，医生可能最初过于坚持自己的观点（“锚定偏见”）或者不知道如何最好地“质询”AI以获得最有用的见解。这全是一种我们需要学习的新团队合作方式——人与机器的结合。
- en: '**Hold On — Is AI Replacing Doctors Tomorrow?**'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: '**等等——AI明天会取代医生吗？**'
- en: 'Absolutely not, of course. And it is crucial to understand the limitations:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 当然绝对不是。理解局限性至关重要：
- en: '**Diagnostic “puzzles” vs. real patients:** The study presenting AMIE used
    written case reports, that is condensed, pre-packaged information, very different
    from the raw inputs that doctors have during their interactions with patients.
    Real medicine involves talking to patients, understanding their history, performing
    physical exams, interpreting non-verbal cues, building trust, and managing ongoing
    care — things AI cannot do, at least yet. Medicine even involves human connection,
    empathy, and navigating uncertainty, not just processing data. Think for example
    of placebo effects, ghost pain, physical tests, etc.'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**诊断“谜题”与真实患者对比：** 在展示AMIE的研究中使用了书面病例报告，这是一种浓缩、预包装的信息，与医生在与患者互动过程中所接触到的原始输入大相径庭。真正的医学涉及与患者交谈，了解他们的病史，进行体格检查，解读非言语线索，建立信任，以及管理持续的治疗——这些都是AI目前至少无法做到的事情。医学甚至涉及人类联系、同理心和应对不确定性的能力，而不仅仅是数据处理。例如，考虑一下安慰剂效应、幽灵疼痛、体格检查等。'
- en: '**AI isn’t perfect:** LLMs can still make mistakes or “hallucinate” information,
    a major problem. So even if AMIE were to be deployed (which it won’t!), it would
    need very close oversight from skilled professionals.'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**AI并不完美：** LLM仍然可能犯错误或“产生幻觉”信息，这是一个主要问题。所以即使AMIE被部署（这不会发生），它也需要熟练的专业人士的非常密切的监督。'
- en: '**This is just one specific task:** Generating a diagnostic list is just one
    part of a doctor’s job, and the rest of the visit to a doctor of course has many
    other components and stages, none of them handled by such a specialized system
    and potentially very difficult to achieve, for the reasons discussed.'
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**这只是一个具体任务：**生成诊断清单只是医生工作的一部分，而医生访问的其余部分当然还有许多其他组成部分和阶段，这些都不是由这样的专门系统处理的，并且可能非常难以实现，正如所讨论的原因。'
- en: 'Back-to-Back: Towards conversational diagnostic artificial intelligence'
  id: totrans-38
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 连续发表：向对话式诊断人工智能迈进
- en: Even more surprisingly, in the same issue of *Nature and* following the article
    on AMIE, Google Research published another paper showing that in diagnostic conversations
    (that is not just the analysis of symptoms but actual dialogue between the patient
    and the doctor or AMIE) the model ALSO outperforms physicians! Thus, somehow,
    while the former paper found an objectively better diagnosis by AMIE, the second
    paper shows a better communication of the results with the patient (in terms of
    quality and empathy) by the AI system!
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 更令人惊讶的是，在同一期的《自然》杂志中，紧随AMIE文章之后，谷歌研究部门发表的另一篇论文显示，在诊断对话中（即不仅仅是症状分析，而是患者与医生或AMIE之间的实际对话）该模型也优于医生！因此，尽管前一篇论文发现AMIE的诊断客观上更好，但第二篇论文则表明，AI系统在向患者传达结果（在质量和同理心方面）方面做得更好！
- en: 'And the results aren’t by a small margin: In 159 simulated cases, specialist
    physicians rated the AI superior to primary care physicians on 30 out of 32 metrics,
    while test patients preferred the AMIE on 25 of 26 measures.'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 结果并非微不足道：在159个模拟案例中，专科医生在32个指标中有30个认为AI优于初级保健医生，而测试患者中有25个指标更倾向于AMIE。
- en: 'This second paper is here:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 这篇第二篇论文就在这里：
- en: '[https://www.nature.com/articles/s41586-025-08866-7](https://www.nature.com/articles/s41586-025-08866-7)'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://www.nature.com/articles/s41586-025-08866-7](https://www.nature.com/articles/s41586-025-08866-7)'
- en: '**Seriously: Medical Associations Need to Pay Attention NOW**'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: '**真的：医学协会现在必须引起注意**'
- en: Despite the many limitations, this study and others like it are a loud call.
    Specialized AI is rapidly evolving and demonstrating capabilities that can augment,
    and in some narrow tasks, even surpass human experts.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管存在许多局限性，这项研究和类似的研究发出了强烈的呼声。专门的AI正在迅速发展，并展现出可以增强，在某些狭窄任务中甚至超越人类专家的能力。
- en: Medical associations, licensing boards, educational institutions, policy makers,
    insurances, and why not everybody in this world that might potentially be the
    subject of an AI-based health investigation, need to get acquainted with this,
    and the topic mist be place high on the agenda of governments.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 医学协会、执照委员会、教育机构、政策制定者、保险公司，以及为什么不是世界上所有可能成为基于AI健康调查对象的每个人，都需要了解这一点，并且这个话题必须被放在政府议程的高位。
- en: AI tools like AMIE and future ones could help doctors diagnose complex conditions
    faster and more accurately, potentially improving patient outcomes, especially
    in areas lacking specialist expertise. It might also help to quickly diagnose
    and dismiss healthy or low-risk patients, reducing the burden for doctors who
    must evaluate more serious cases. Of course all this could improve the chances
    of solving health issues for patients with more complex problems, at the same
    time as it lowers costs and waiting times.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: AI工具如AMIE和未来的工具可以帮助医生更快、更准确地诊断复杂情况，可能改善患者结果，特别是在缺乏专业知识的领域。它还可能帮助快速诊断并排除健康或低风险患者，减轻必须评估更严重病例的医生的负担。当然，所有这些都可以提高解决患者复杂健康问题的机会，同时降低成本和等待时间。
- en: Like in many other fields, the role of the physician will evolve, sooner or
    later thanks to AI. Perhaps AI could handle more initial diagnostic heavy lifting,
    freeing up doctors for patient interaction, complex decision-making, and treatment
    planning — potentially also easing burnout from excessive paperwork and rushed
    appointments, as some hope. As someone noted on social media discussions of this
    paper, not every doctor finds it pleasnt to meet 4 or more patients an hour and
    doing all the associated paperwork.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 就像在许多其他领域一样，医生的角色将随着AI的出现而演变，迟早会如此。也许AI可以承担更多的初步诊断工作，从而让医生有更多时间与患者互动、进行复杂决策和治疗规划——这也许可以缓解因过度文书工作和匆忙预约而导致的职业倦怠，正如一些人所希望的那样。正如有人在社交媒体上讨论这篇论文时所指出的，并不是每位医生都乐于每小时接待4名或更多患者，并完成所有相关的文书工作。
- en: In order to move forward with the inminent application of systems like AMIE,
    we need guidelines. How should these tools be integrated safely and ethically?
    How do we ensure patient safety and avoid over-reliance? Who is responsible when
    an AI-assisted diagnosis is wrong? Nobody has clear, consensual answers to these
    questions yet.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 为了推进类似AMIE这样的系统即将到来的应用，我们需要指导方针。这些工具应该如何安全、合乎道德地整合？我们如何确保患者安全并避免过度依赖？当人工智能辅助诊断出错时，谁应该负责？对这些问题的答案还没有明确的共识。
- en: Of course, then, doctors need to be trained on how to use these tools effectively,
    understanding their strengths and weaknesses, and learning what will essentially
    be a new form of human-AI collaboration. This development will have to happen
    with medical professionals on board, not by imposing it to them.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，医生需要接受如何有效使用这些工具的培训，了解它们的优缺点，并学习将本质上是一种新的形式的人机协作。这一发展必须得到医疗专业人士的支持，而不是强加给他们。
- en: 'Last, as it always comes back to the table: how do we ensure these powerful
    tools don’t worsen existing health disparities but instead help bridge gaps in
    access to expertise?'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，正如它总是回到桌面上：我们如何确保这些强大的工具不会加剧现有的健康差距，反而帮助弥合获取专业知识方面的差距？
- en: Conclusion
  id: totrans-51
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 结论
- en: The goal isn’t to replace doctors but to empower them. Clearly, AI systems like
    AMIE offer incredible potential as highly knowledgeable assistants, in everyday
    medicine and especially in complex settings such as in areas of disaster, during
    pandemics, or in remote and isolated places such as overseas ships and space ships
    or extraterrestrial colonies. But realizing that potential safely and effectively
    requires the medical community to engage proactively, critically, and urgently
    with this rapidly advancing technology. The future of diagnosis is likely AI-collaborative,
    so we need to start figuring out the rules of engagement today.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 目标不是取代医生，而是赋予他们力量。显然，像AMIE这样的AI系统作为高度知识渊博的助手，在日常生活中以及特别是在灾难、流行病期间或海外船只、太空船或外星殖民地等偏远和孤立的地方等复杂环境中具有巨大的潜力。但安全有效地实现这一潜力需要医疗界积极、批判性地、紧急地与这项快速发展的技术互动。诊断的未来很可能是AI协作的，因此我们需要从现在开始制定互动规则。
