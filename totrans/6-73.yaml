- en: From Default Python Line Chart to Journal-Quality Infographics
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 从默认Python线形图到期刊质量信息图表
- en: 原文：[https://towardsdatascience.com/from-default-python-line-chart-to-journal-quality-infographics-80e3949eacc3/](https://towardsdatascience.com/from-default-python-line-chart-to-journal-quality-infographics-80e3949eacc3/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[原文链接](https://towardsdatascience.com/from-default-python-line-chart-to-journal-quality-infographics-80e3949eacc3/)'
- en: '![Cover, image by the Author](../Images/659ab42f7fb3b0a7bbf3fc869c1df273.png)'
  id: totrans-2
  prefs: []
  type: TYPE_IMG
  zh: '![封面，图片由作者提供](../Images/659ab42f7fb3b0a7bbf3fc869c1df273.png)'
- en: Cover, image by the Author
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 封面，图片由作者提供
- en: Everyone who has used Matplotlib knows how ugly the default charts look like.
    In this series of posts, I’ll share some tricks to make your visualizations stand
    out and reflect your individual style.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 每个使用过Matplotlib的人都知道默认图表看起来有多丑。在这个系列的文章中，我将分享一些技巧，让你的可视化更加突出，并反映你的个人风格。
- en: We’ll start with a simple line chart, which is widely used. The main highlight
    will be adding a gradient fill below the plot – a task that’s not entirely straightforward.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将从简单的线形图开始，这是广泛使用的。主要的亮点是在图表下方添加渐变填充——这是一个并不完全直接的任务。
- en: So, let’s dive in and walk through all the key steps of this transformation!
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，让我们深入探讨并了解这个转换的所有关键步骤！
- en: Let’s make all the necessary imports first.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们先进行所有必要的导入。
- en: '[PRE0]'
  id: totrans-8
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Now we need to generate sample data for our visualization. We will create something
    similar to what stock prices look like.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们需要为我们的可视化生成样本数据。我们将创建类似股票价格的样子。
- en: '[PRE1]'
  id: totrans-10
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Let’s check how it looks with the default Matplotlib settings.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们来看看默认的Matplotlib设置效果如何。
- en: '[PRE2]'
  id: totrans-12
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '![Default plot, image by Author](../Images/d24677a57b3bb8a1b01a995e00e7fa47.png)'
  id: totrans-13
  prefs: []
  type: TYPE_IMG
  zh: '![默认图表，图片由作者提供](../Images/d24677a57b3bb8a1b01a995e00e7fa47.png)'
- en: Default plot, image by Author
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 默认图表，图片由作者提供
- en: Not really fascination, right? But we will gradually make it looking better.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 并非真的令人着迷，对吧？但我们将逐步让它看起来更好。
- en: set the title
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 设置标题
- en: set general chart parameters – size and font
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 设置通用图表参数——大小和字体
- en: placing the Y ticks to the right
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将Y轴刻度放置在右侧
- en: changing the main line color, style and width
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更改主线的颜色、样式和宽度
- en: '[PRE3]'
  id: totrans-20
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '![General params applied, image by Author](../Images/06c9961eb030896b5eb46e095e684a1f.png)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![通用参数应用，图片由作者提供](../Images/06c9961eb030896b5eb46e095e684a1f.png)'
- en: General params applied, image by Author
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 应用通用参数，图片由作者提供
- en: Alright, now it looks a bit cleaner.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 好的，现在看起来干净多了。
- en: Now we’d like to add minimalistic grid to the background, remove borders for
    a cleaner look and remove ticks from the Y axis.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们想在背景中添加简约的网格，去除边框以获得更干净的外观，并从Y轴移除刻度。
- en: '[PRE4]'
  id: totrans-25
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: '![Grid added, image by Author](../Images/f9bb1d654cee09c0f139bc5fc200e995.png)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
  zh: '![网格添加，图片由作者提供](../Images/f9bb1d654cee09c0f139bc5fc200e995.png)'
- en: Grid added, image by Author
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 添加网格，图片由作者提供
- en: Now we’re adding a tine esthetic detail – year near the first tick on the axis
    X. Also we make the font color of tick labels more pale.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们添加一个微小的美学细节——年份靠近X轴的第一个刻度。同时，我们还将刻度标签的字体颜色变得更浅。
- en: '[PRE5]'
  id: totrans-29
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: '![Year near first date, image by Author](../Images/3fce77f87ce8108452e958e16e57a369.png)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
  zh: '![年份靠近第一个日期，图片由作者提供](../Images/3fce77f87ce8108452e958e16e57a369.png)'
- en: Year near first date, image by Author
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 年份靠近第一个日期，图片由作者提供
- en: And we’re getting closer to the trickiest moment – how to create a gradient
    under the curve. Actually there is no such option in Matplotlib, but we can simulate
    it creating a gradient image and then clipping it with the chart.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 我们正接近最棘手的一刻——如何在曲线下方创建渐变。实际上，Matplotlib中没有这样的选项，但我们可以通过创建渐变图像并将其与图表裁剪来模拟它。
- en: '[PRE6]'
  id: totrans-33
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: '![Gradient added, image by Author](../Images/52bfadb70c6cd31cd52db8c884fee9d0.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![梯度添加，图片由作者提供](../Images/52bfadb70c6cd31cd52db8c884fee9d0.png)'
- en: Gradient added, image by Author
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 添加梯度，图片由作者提供
- en: Now it looks clean and nice. We just need to add several details using any editor
    (I prefer Google Slides) – title, round border corners and some numeric indicators.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 现在看起来整洁又美观。我们只需要使用任何编辑器（我更喜欢Google Slides）添加几个细节——标题、圆角边框和一些数字指示器。
- en: '![Final visualization, image by Author](../Images/58d734fc258e5a8aed86eb22c240f4e8.png)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
  zh: '![最终可视化，图片由作者提供](../Images/58d734fc258e5a8aed86eb22c240f4e8.png)'
- en: Final visualization, image by Author
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 最终可视化，图片由作者提供
