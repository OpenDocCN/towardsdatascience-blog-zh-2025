- en: How to Spin Up a Project Structure with Cookiecutter
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/how-to-spin-up-a-project-structure-with-cookiecutter/](https://towardsdatascience.com/how-to-spin-up-a-project-structure-with-cookiecutter/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1760021472327" class="mdspan-comment">If</mdspan> you’re
    anything like me, “procrastination” might as well be your middle name. There’s
    always that nagging hesitation before starting a new project. Just thinking about
    setting up the project structure, creating documentation, or writing a decent
    README is enough to trigger yawns. It feels like staring at a blank page for a
    dreaded school essay. But remember how much easier it gets once some helpful LLM
    (like ChatGPT) provides a starting template? The same magic can apply to your
    coding projects. That’s where Cookiecutter steps in.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: What Is Cookiecutter?
  id: totrans-3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '[Cookiecutter](https://www.cookiecutter.io/) is an open-source tool that helps
    you create project templates. It is language-agnostic and works with virtually
    any programming language (or even outside coding, should you need a standardized
    folder and file structure). With Cookiecutter, you can set up all the boilerplate
    files (like READMEs, Dockerfiles, project directories, or anything else), then
    quickly generate new projects based on that structure.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: 'The Cookiecutter workflow consists of three main steps:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: You define your project template.
  id: totrans-6
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The user enters values for the variables you specify.
  id: totrans-7
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Cookiecutter generates a new project, automatically filling in files, folders,
    and variable values based on the user’s input.
  id: totrans-8
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'The following image illustrates this process:'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/7f2a4dd6b5e6db8c6e32f23e8a14c19d.png)'
  id: totrans-10
  prefs: []
  type: TYPE_IMG
- en: Workflow of a cookiecutter template usage for “baking” new projects according
    to the predefined template. image by author
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Basic Computer Setup
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: You need minimal programming skills to install and use Cookiecutter. If you
    can open a command line window, you’re good to go.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: • On Windows, type “cmd” in the search bar and open the “Command Prompt.”
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: '• If you haven’t already, install pipx with:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: '`pip install pipx`'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: 'Test your installation by running:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
- en: '`pipx --version`'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: 'If you get a “command not found” error, add pipx to your PATH. First, find
    where pipx was installed: python -m site –user-base.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: This might return something like /home/username/.local. Look for the folder
    containing pipx.exe (on Windows) or pipx (on macOS or Linux). If you have no admin
    rights, the directory might be C:\Users\username\AppData\Roaming\Python\Pythonxxx\Scripts.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: I had to add pipx to my path and if you don’t have admin rights, you will need
    to do it each time you start a new terminal window. It is therefore recommended
    to add the location permanently to your Environment Variables settings. However,
    if this setting is behind admin privileges, you still can add
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: '`set PATH=C:\Users\username\AppData\Roaming\Python\Pythonxxx\Scripts;%PATH%`'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: Or
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: '`set PATH=/home/username/.local/bin;%PATH%`'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
- en: Hopefully, you get a meaningful response for `pipx --version` now.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Installing and Setting Up Cookiecutter
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Cookiecutter is distributed as a Python package, so you can install it with
    pipx:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
- en: '`pipx install cookiecutter`'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
- en: 'Or simply run it on the fly with:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
- en: '`pipx run cookiecutter ...`'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
- en: Let’s walk through creating a project template. In this example, we’ll set up
    a template for Streamlit apps (cookiecutter_streamlit_ml).
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Creating the Template Structure
  id: totrans-32
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Inside your cookiecutter_streamlit_ml folder, you need these two key components:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: • cookiecutter.json – a JSON file that defines the variables you want users
    to fill in (project name, author, Python version, etc.).
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
- en: • {{ cookiecutter.directory_name }} – A placeholder folder name defined using
    curly braces. This directory will contain your project’s structure and files.
    When the user creates a new project from your template, Cookiecutter will replace
    this placeholder with the name they provided. *Watch out to keep the curly braces! *
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ec384c336eaa4b76987dba129b6b2477.png)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
- en: Example content of a Cookiecutter template folder. image by author
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
- en: 'Your cookiecutter.json might look something like this:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f0db79926a25975e804557aea223a28e.png)'
  id: totrans-39
  prefs: []
  type: TYPE_IMG
- en: Example cookiecutter.json file. image by author
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
- en: First, you define variables in cookiecutter.json that are used throughout the
    generated project. At a minimum, you’ll want a variable for the project name.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
- en: For example, I often reference my GitHub repository in documentation. Rather
    than entering it repeatedly, I set a variable once and let Cookiecutter populate
    every instance automatically. Similarly, I don’t want to write out my name in
    each readme or documentation file, so I set it at the start.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
- en: To avoid issues with Docker and make sure the correct Python version is specified,
    I prompt for the Python version at project creation, ensuring it is used in the
    generated Dockerfile.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
- en: You can define default values for each field in cookiecutter.json. Cookiecutter
    will automatically replace every instance of {{ cookiecutter.variable }} in your
    template files with the user’s input. You can also use transformations like lower()
    or replace(‘ ‘, ‘_’) to avoid issues with spaces in directory names.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
- en: In my template, I prefer providing detailed instructions to users rather than
    setting default values. This helps guide those who might skip reading the README
    and jump straight into project creation.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
- en: 4\. Building Out Your Template
  id: totrans-46
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now begins the fun part, namely defining your template. You are doing it once
    and for all, so it is worthwhile to spend some time on it, which will drastically
    reduce your project setup time in the long run.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
- en: First, create the folder structure for your project. This includes creating
    all folders that you expect to use in your project. Don’t worry, whatever is missing
    or turns out to be superfluous can be edited in the actual project. For now, you
    are merely creating the blueprint; the whistles and bells will be project-specific.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f2c86e799e59f7241f690bf2b54e21bc.png)'
  id: totrans-49
  prefs: []
  type: TYPE_IMG
- en: Example of predefined folder structure for future projects. This folder structure
    and all files will be instantiated once the user executes the cookiecutter command.
    image by author
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
- en: Once you have your folders ready, you can populate them with files. These can
    be either empty or even have some content that you might otherwise constantly
    copy-paste from other documents. In these files, refer to your cookiecutter variables
    wherever something needs to be set dynamically (e.g., the project name or the
    GitHub repo). Cookiecutter will automatically replace those placeholders with
    user inputs, which will be asked for during project setup. This spares you a lot
    of tedious copy-paste work, particularly in your documentation files.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/fa81159db8d316420dc6bae81c10f62a.png)'
  id: totrans-52
  prefs: []
  type: TYPE_IMG
- en: Part of the content of the Readme file, which will be instantiated when you
    “unbox” your cookiecutter template in the project. In the spinoff project, the
    fields {{ cookiecutter.<variable> }} will be populated with the values provided
    during “unboxing”. image by author
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
- en: Lastly, deposit the whole cookiecutter_py_streamlit folder in your GitHub account,
    zip it, or leave it as it is. Either way, you can now …
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
- en: 5\. Use your template
  id: totrans-55
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Once your template is ready, creating a new project becomes a snap:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Open your terminal and navigate to where you’d like to create the project.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
- en: '2\. Run one of the following commands:'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
- en: '• From GitHub:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
- en: '`pipx run cookiecutter gh:ElenJ/cookiecutter_streamlit_ml  (replace with your
    repo)`'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
- en: '• From a local folder:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
- en: '`pipx run cookiecutter /path/to/template_folder`'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
- en: '• From a zip:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
- en: '`pipx run cookiecutter /path/to/template.zip`'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Cookiecutter will ask you the questions defined in cookiecutter.json. Provide
    answers—or just press enter if you’ve set default values.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/3d2e51e8cecfd4064cd423df44ca259a.png)'
  id: totrans-66
  prefs: []
  type: TYPE_IMG
- en: You are asked to provide answers to the questions you defined in the cookiecutter
    template. The answers you provide will be used as the respective variables in
    the fields defined by {{ cookiecutter.variable }}. image by author
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
- en: 4\. Voilà 🎉 your new project folder is generated, complete with folders, files,
    and references customized to your inputs.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c67fdc0db4b33763fa34a2e324ff4294.png)'
  id: totrans-69
  prefs: []
  type: TYPE_IMG
- en: Instantiated Readme with variables the user provided during setup. image by
    author
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
- en: You can synchronize your new project with GitHub by either pushing it directly
    from your IDE’s built-in Git functionality or by creating a new repo on GitHub
    (ensuring it’s empty and doesn’t include a Readme) and then moving your generated
    project folder there.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
- en: And that’s it! You’ve turned what used to be a day-long chore into a swift process
    and have instantly generated lots of files waiting to be filled in with your ideas.
    Looking at the new project, you definitely should have a feeling of a productive
    day. If you’re still looking for guidance on best practices, check out the official
    [Cookiecutter templates here](https://www.cookiecutter.io/templates).
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 就这样！你已经将原本需要一整天的繁琐工作变成了一个快速的过程，并且瞬间生成了许多等待你填充想法的文件。看着这个新项目，你肯定会有一种充实的一天的感觉。如果你还在寻找最佳实践的指导，请查看官方的[Cookiecutter模板](https://www.cookiecutter.io/templates)。
- en: 'And as always: **Happy coding!**'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 就像往常一样：**编码愉快**！
