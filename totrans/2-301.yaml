  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/the-simplest-possible-ai-web-app/](https://towardsdatascience.com/the-simplest-possible-ai-web-app/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*📙 <mdspan datatext="el1748538331624" class="mdspan-comment">This is the last</mdspan>
    in a multi-part series on creating web applications with generative AI integration.
    Part 1 focused on discussing the AI stack and why the application layer is the
    best place in the stack to be. Check it *[*out here*](https://losangelesaiapps.com/layers-of-the-ai-stack-explained-simply/)*.
    Part 2 focused on why Ruby is the best web language for building AI MVPs. Check
    it *[*out here*](https://losangelesaiapps.com/building-ai-applications-in-ruby/)*.
    I highly recommend you read through both parts before reading this article to
    get caught up on terminology used here.*'
  prefs: []
  type: TYPE_NORMAL
