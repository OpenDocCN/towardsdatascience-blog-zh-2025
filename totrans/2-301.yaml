- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Introduction
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In this article, we will be conducting a fun thought experiment. We seek to
    answer the question:'
  prefs: []
  type: TYPE_NORMAL
- en: How simple can we make a web application with AI integration?
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: My readers will know that I value [simplicity very highly](https://towardsdatascience.com/sqlite-in-production-dreams-becoming-reality-94557bec095b/).
    Simple web apps are easier to understand, faster to build, and more maintainable.
    Of course, as the app scales, complexity arises out of necessity. But you always
    want to start simple.
  prefs: []
  type: TYPE_NORMAL
- en: We will take a typical case study for a web application with AI integration
    (RAG), and look at four different implementations. We are going to begin with
    the most complex setup that is composed of the most popular tools, and attempt
    to simplify it step-by-step, until we end up with the most simple setup possible.
  prefs: []
  type: TYPE_NORMAL
- en: Why are we doing this?
  prefs: []
  type: TYPE_NORMAL
- en: I want to inspire developers to think more simply. Oftentimes, the “mainstream”
    route to building web apps or integrating AI is far too complex for the use case.
    Developers take inspiration from companies like Google or Apple, without acknowledging
    that tools that work for them are oftentimes inappropriate for clients working
    at a much smaller scale.
  prefs: []
  type: TYPE_NORMAL
- en: Grab a coffee or tea, and let’s dive in.
  prefs: []
  type: TYPE_NORMAL
- en: 'Level 1: As Complex As It Gets'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Suppose a client has asked you to build a RAG application for them. This application
    will have one page where users can upload their documents and another page where
    they can chat with their documents using RAG. Going with the most popular web
    stack currently in use, you decide to go with the [**MERN**](https://en.wikipedia.org/wiki/MEAN_(solution_stack))** stack** (MongoDB,
    Express.js, React, and Node.js) to build your application.
  prefs: []
  type: TYPE_NORMAL
- en: 'To build the RAG pipelines that will be handling document parsing, chunking,
    embedding, retrieval, and more, you again decide to go with the most popular stack: [**LangChain**](https://www.langchain.com/)** deployed
    via **[**FastAPI**](https://fastapi.tiangolo.com/)**. **The web app will make
    API calls to the endpoints defined in FastAPI. There will need to be at least
    two endpoints: one for calling the indexing pipeline and another for calling the
    query pipeline. In practice, you will also need upsert and delete endpoints, to
    ensure that the data in your database stays in sync with the embeddings in your
    vector store.'
  prefs: []
  type: TYPE_NORMAL
- en: Note that you will be using JavaScript for the web application, and Python for
    the AI integration. This duo-lingual app means you will likely be using a **microservices
    architecture** (see [part 2](https://losangelesaiapps.com/building-ai-applications-in-ruby/) of
    this series for more on this). This is not a strict requirement, but is often
    encouraged in a setup like this.
  prefs: []
  type: TYPE_NORMAL
- en: 'There is one more choice to be made: what vector database will you be using?
    The vector database is the place where you store the document chunks created by
    the indexing pipeline. Let’s again go with the most popular choice out there: [**Pinecone**](https://www.pinecone.io/).
    This is a managed cloud vector database that many AI developers are currently
    using.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The whole system might look something like the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/dae3ef6407fa294255733740693f0b24.png)'
  prefs: []
  type: TYPE_IMG
- en: A traditional RAG application. Image by author.
  prefs: []
  type: TYPE_NORMAL
- en: 'Yikes! There are a lot of moving pieces here. Let’s break things down:'
  prefs: []
  type: TYPE_NORMAL
- en: At the bottom rectangle, we have the web application and MongoDB backend. In
    the middle we have the RAG pipelines built with LangChain and FastAPI. At the
    top, we have the Pinecone vector database. Each rectangle here represents a different
    service with their own separate deployments. While the Pinecone cloud vector database
    will be managed, the rest is on you.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I have wrapped example HTTP requests and corresponding responses with a dotted
    border. Remember, this is a microservices architecture, so this means HTTP requests
    will be needed anytime inter-service communication occurs. For simplicity, I have
    only illustrated what the query pipeline calls would look like and I have omitted
    any calls to OpenAI, Anthropic, etc. For clarity, I numbered the requests/responses
    in the order in which they would occur in a query scenario.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: To illustrate one pain point, ensuring the documents in your MongoDB database
    are synced with their corresponding embeddings in the Pinecone index is doable
    but can be tricky. It takes multiple HTTP requests to go from your MongoDB database
    to the cloud vector database. This is a point of complexity and overhead for the
    developer.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'A simple analogy: this is like trying to keep your physical bookshelf synced
    up with a digital book catalog. Any time you get a new book or donate a book from
    your shelf (turns out you only like the *Game of Thrones* show, not the book),
    you have to go and manually update the catalog to reflect the change. In this
    world of books a small discrepancy won’t really impact you, but in the world of
    web applications this can be a big problem.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Level 2: Drop the Cloud'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Can we make this architecture any simpler? Perhaps you read an article recently
    that discussed how Postgres has an extension called [pgvector](https://github.com/pgvector/pgvector).
    This means you can forgo Pinecone and just use Postgres as your vector database.
    Ideally you can migrate your data over from MongoDB so that you stay with only
    one database. Great! You refactor your application to now look like the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/fb3eee15991f493b5a748ddcb26124fd.png)'
  prefs: []
  type: TYPE_IMG
- en: A simplified RAG application. Image by author.
  prefs: []
  type: TYPE_NORMAL
- en: 'Now we only have two services to worry about: the web application + database
    and the RAG pipelines. Once again, any calls to model providers has been omitted.'
  prefs: []
  type: TYPE_NORMAL
- en: 'What have we gained with this simplification? Now, your **embeddings and the
    associated documents or chunks can live in the same table in the same database**.
    As an example, you can add an embeddings column to a table in PostgreSQL by doing:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Maintaining coherence between the documents and embeddings should be much simpler
    now. Postgres’ `ON INSERT/UPDATE` triggers let you compute embeddings in-place,
    eliminating the two-phase *“write doc/then embed”* dance entirely.
  prefs: []
  type: TYPE_NORMAL
- en: Returning to the bookshelf analogy, this is like ditching the digital catalog
    and instead just attaching a label directly to every book. Now, when you move
    around a book or toss one, there is no need to update a separate system, since
    the labels go wherever the books go.
  prefs: []
  type: TYPE_NORMAL
- en: 'Level 3: Microservices Begone!'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: You’ve done a good job simplifying things. However, you think you can do even
    better. Perhaps you can create a **monolithic app,** instead of using the microservices
    architecture. A monolith just means that your application and your RAG pipelines
    are developed and deployed together. An issue arises, however. You coded up the
    web app in JavaScript using the MERN stack. But the RAG pipelines were built using
    Python and LangChain deployed via FastAPI. Perhaps you can try to squeeze these
    into a single container, using something like [Supervisor](https://supervisord.org/) to
    oversee the Python and JavaScript processes, but it is not a natural fit for polyglot
    stacks.
  prefs: []
  type: TYPE_NORMAL
- en: So what you decide to do is to ditch React/Node and instead use Django, a Python
    web framework to develop your app. Now, your RAG pipeline code can just live in
    a utility module in your Django app. This means no more HTTP requests are being
    made, which removes complexity and latency. Any time you want to run your query
    or indexing pipelines all you have to do is make a function call. Spinning up
    dev environments and deployments is now a breeze. Of course, if you read part
    2, our preference is not to use an all Python stack, but instead go with an [all
    Ruby stack](https://losangelesaiapps.com/building-ai-applications-in-ruby/).
  prefs: []
  type: TYPE_NORMAL
- en: 'You’ve simplified even further, and now have the following architecture:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/affbf68bc75310f189fd79d894ec8a97.png)'
  prefs: []
  type: TYPE_IMG
- en: An even simpler RAG architecture. Image by author.
  prefs: []
  type: TYPE_NORMAL
- en: 'An important note: in earlier diagrams, I combined the web application and
    database into a single service, for simplicity. At this point I think it’s important
    to show that they are, in fact, separate services themselves! This does **not** mean
    you are still using a microservices architecture. As long as the two services
    are developed and deployed altogether, this is still a monolith.'
  prefs: []
  type: TYPE_NORMAL
- en: Wow! Now you only have a single deployment to spin up and maintain. You can
    have your database set up as an accessory to your web application. This unfortunately
    means you will still likely want to use [Docker Compose](https://docs.docker.com/compose/) to
    develop and deploy your database and web application services together. But with
    the pipelines now just operating as functions instead of a separate service, you
    can now ditch FastAPI! You will no longer need to maintain these endpoints; just
    use function calls.
  prefs: []
  type: TYPE_NORMAL
- en: 'A bit of technical detail: in this chart, the legend indicates that the dotted
    line is *not* HTTP, but instead a [Postgres frontend/backend protocol](https://www.postgresql.org/docs/current/protocol.html).
    These are two different protocols at the **application layer** of the [internet
    protocol model](https://en.wikipedia.org/wiki/Internet_protocol_suite). This is
    a different application layer than the one I discussed in [part 1](https://losangelesaiapps.com/layers-of-the-ai-stack-explained-simply/).
    Using an HTTP connection to transfer data between the application and the database
    is theoretically possible, but not optimal. Instead the creators of Postgres created
    their own protocol that is lean and tightly coupled to the needs of the database.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Level 4: SQLite Enters the Chat'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '*“Surely we are done simplifying?”*, you may be asking yourself.'
  prefs: []
  type: TYPE_NORMAL
- en: Wrong!
  prefs: []
  type: TYPE_NORMAL
- en: There is one more simplification we can make. Instead of using Postgres, we
    can use SQLite! You see, currently your app and your database are two separate
    services deployed together. But what if they weren’t two different services, but
    instead your database was just a file that lives in your application? This is
    what SQLite can give you. With the recently released [`sqlite-vec`](https://losangelesaiapps.com/retrieval-augmented-generation-in-sqlite/) library,
    it can even handle RAG, just like how `pgvector` works for Postgres. The caveat
    here is that `sqlite-vec` is pre-v1, but this is still great for an early stage
    MVP.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/bf54f289623f11922b5e5c24f8256bf3.png)'
  prefs: []
  type: TYPE_IMG
- en: The simplest possible architecture. Image by author.
  prefs: []
  type: TYPE_NORMAL
- en: Truly amazing. You can now ditch Docker Compose! This is truly a single service
    web application. The LangChain modules and your database now all are just functions
    and files living in your repository.
  prefs: []
  type: TYPE_NORMAL
- en: Concerned about the use of SQLite in a production web application? I [wrote
    recently](https://towardsdatascience.com/sqlite-in-production-dreams-becoming-reality-94557bec095b/) about
    how SQLite, once considered just a plaything in the world of web apps, can become
    production-ready through some tweaks in its configuration. In fact Ruby on Rails
    8 recently made these adaptations default and is now pushing SQLite as a [default
    database for new applications](https://blog.appsignal.com/2024/10/07/whats-new-in-ruby-on-rails-8.html#sqlite-is-ready-for-production).
    Of course as the app scales, you will likely need to migrate to Postgres or some
    other database, but remember the mantra I mentioned in the beginning: *only introduce
    complexity when absolutely necessary*. Don’t assume your app is going to blow
    up with millions of concurrent writes when you are just trying to get your first
    few users.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this article, we started with the traditional stacks for building a web application
    with AI integration. We saw the amount of complexity involved, and decided to
    simplify piece by piece until we ended up with the Platonic ideal of simple apps.
  prefs: []
  type: TYPE_NORMAL
- en: But don’t let the simplicity fool you; the app is still a beast. In fact, because
    of the simplicity, it can run much faster than the traditional app. If you are
    noticing that the app is starting to slow down, I would try sizing up the server
    before considering migrating to a new database or breaking up the monolith.
  prefs: []
  type: TYPE_NORMAL
- en: With such a lean application, you can truly move fast. Local development is
    a dream, and adding new capabilities can be done at lightning speed. You can still
    get backups of your SQLite database using something like [Litestream](https://litestream.io/).
    Once your app is showing real signs of strain, then move up the levels of complexity.
    But I advise against starting a new application at level 1.
  prefs: []
  type: TYPE_NORMAL
- en: I hope you have enjoyed this series on building web applications with AI integration.
    And I hope I have inspired you to think simple, not complicated!
  prefs: []
  type: TYPE_NORMAL
- en: 🔥* If you’d like a custom web application with generative AI integration, visit *[*losangelesaiapps.com*](https://losangelesaiapps.com/)
  prefs: []
  type: TYPE_NORMAL
