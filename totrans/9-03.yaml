- en: Top 12 Skills Data Scientists Need to Succeed in 2025
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/top-12-skills-data-scientists-need-to-succeed-in-2025-c80f54cf227a/](https://towardsdatascience.com/top-12-skills-data-scientists-need-to-succeed-in-2025-c80f54cf227a/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![Source: Image made by author, with help from Claude.](../Images/84ee1217703fe5315e9043ada935300c.png)'
  id: totrans-2
  prefs: []
  type: TYPE_IMG
- en: 'Source: Image made by author, with help from Claude.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: The AI landscape is moving faster than a rocket ship in 2025, and hanging on
    is getting harder and harder!
  id: totrans-4
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-5
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Will you keep your current position, get hired, get promoted or get sacked?
    That depends on YOU and how fast you can adapt to change.
  id: totrans-6
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-7
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: This isn’t to say that if you don’t adapt – you will perish.
  id: totrans-8
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Many things are changing, but other things are not. Understanding which changes
    require your attention is the **key to success**.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
- en: Yes, the new AI revolution is proliferating in huge sections of the economy,
    with a ton of new tools to boost productivity and automate many tasks. And if
    you were overwhelmed last year, better **buckle in for another wild ride**.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: So, how should you handle this always-accelerating train of AI hype and tools?
  id: totrans-11
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-12
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: By focusing on what matters.
  id: totrans-13
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Although AI tools are super shiny and powerful, many of the skills that will
    really help you succeed in your career **haven’t changed too much** for the past
    few decades and even for several millennia!
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: 'I’ll guide you through the top 12 essential skills you need to thrive as a
    data scientist, ML engineer, or applied scientist in 2025\. From timeless capabilities
    to emerging technologies, I’ll give you practical examples and resources to help
    you get started and develop each skill. In other words:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: This post will be your one-stop shop for leveling up in 2025.
  id: totrans-16
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
- en: Before We Start
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: What does a data scientist do in 2025?
  id: totrans-19
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-20
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Well, it depends.
  id: totrans-21
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: First of all, I’m going to loosely use the term data scientist for roles that
    handle data, machine learning, deep learning, and generative AI models. However,
    other names for such roles include machine learning engineer, applied scientist,
    algorithm developer, and many more.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: 'So, what should you expect in these roles? Well, I’ve reviewed the stated responsibilities
    of over 500 job descriptions, and here are my findings:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: 'Top 5 Responsibilities Of Data Scientists:'
  id: totrans-24
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**Data & Modelling:** Process and engineer large-scale datasets. Utilize statistics
    and data analysis. Build, train, and evaluate ML models (including LLMs, computer
    vision, tabular data, time series, audio, and recommendation systems). Develop
    GenAI applications and workflows.'
  id: totrans-25
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Research & Development:** Build internal tools. Conduct literature reviews.
    Stay current with the latest developments. Own projects from POC to deployment.'
  id: totrans-26
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Infrastructure Design & Development:** Design cloud-based model serving infrastructure.
    Build data, training, and inference pipelines.'
  id: totrans-27
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Performance & Monitoring:** Define and track success metrics. Build dashboards
    and monitoring tools. Ensure model reliability at scale.'
  id: totrans-28
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**绩效与监控**：定义和跟踪成功指标。构建仪表板和监控工具。确保模型在大规模上的可靠性。'
- en: '**Collaboration & Communication:** Present to stakeholders and clients. Share
    knowledge with team members. Work across different teams.'
  id: totrans-29
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**协作与沟通**：向利益相关者和客户展示。与团队成员分享知识。跨团队工作。'
- en: So, how much of the AI hype train made it into these job descriptions? Not as
    much as you would think. Take advantage of this and choose specific areas where
    you want to grow tall, but never forget your roots.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，有多少人工智能炒作进入了这些职位描述？没有你想象的那么多。利用这一点，选择你想要成长的特定领域，但永远不要忘记你的根基。
- en: '* * *'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: So What Skills Are Important In 2025?
  id: totrans-32
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 那么，2025 年哪些技能很重要？
- en: '![Source: Image created by author with Dall E 3.](../Images/e928936e2badb949e6234dae77050f7f.png)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
  zh: '![来源：作者使用 Dall E 3 创建的图像。](../Images/e928936e2badb949e6234dae77050f7f.png)'
- en: 'Source: Image created by author with Dall E 3.'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：作者使用 Dall E 3 创建的图像。
- en: 1\. Communication Skills
  id: totrans-35
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1. 沟通技巧
- en: Nobody knows what you are doing and what you are thinking.
  id: totrans-36
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 没有人知道你在做什么，你在想什么。
- en: Is there anything that you want? Do you have any issues? Are you stuck? Do you
    have any questions? Don’t keep it in. Let it out.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 你有什么想要的东西吗？你有任何问题吗？你卡住了吗？你有什么问题吗？不要保留，说出来。
- en: Why should you get what you want if you didn’t ask for it?
  id: totrans-38
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果你没有要求，你为什么要得到你想要的东西？
- en: Communicating your problems, issues, thoughts, results, and conclusions is vital
    to success in data science and to being productive in general.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 在数据科学中取得成功以及在一般意义上保持高效，沟通你的问题、问题、思想、结果和结论至关重要。
- en: I know it’s sometimes embarrassing to ask silly, "dumb," and naive questions.
    However, from my experience, those who frequently ask "dumb" questions get ahead
    faster. This is because they learn faster, generate value faster, and gain valuable
    connections and trust.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 我知道有时问一些愚蠢的、“笨拙的”和天真的问题可能会感到尴尬。然而，根据我的经验，那些经常问“愚蠢”问题的人会更快地取得进步。这是因为他们学得更快，创造价值更快，并获得宝贵的联系和信任。
- en: I personally love asking "dumb" and "trivial" questions, like "**what is an
    error?**". It almost always makes people stop in their tracks and question their
    most basic assumptions, usually leading to much better understanding of the project
    and problem, while improving communication between team members.
  id: totrans-41
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我个人非常喜欢问“愚蠢”和“琐碎”的问题，比如“**什么是错误？**”。这几乎总是让人停下来，质疑他们最基本的前提，通常会导致对项目和问题的更好理解，同时改善团队成员之间的沟通。
- en: Take control of your career, interrupt your friend, and ask your questions.
    They will respect you more for it. The more you practice communicating your needs,
    thoughts, and ideas, the better you will become at it – not just in your career
    but in life in general.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 掌控你的职业生涯，打断你的朋友，提出你的问题。他们会因此更加尊重你。你越练习表达你的需求、思想和观点，你在这方面就会变得越好——不仅是在你的职业生涯中，而且在生活中总体上。
- en: What should you practice?
  id: totrans-43
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 你应该练习什么？
- en: '**Explaining technical stuff:** Try to translate what you are doing or what
    you just learned to your non-technical friend or family member. Use the [ELI5
    technique]([https://blog.groovehq.com/the-eli5-technique#:~:text=The%20ELI5%20(explain%20it%20like,treat%20your%20customers%20like%20children](https://blog.groovehq.com/the-eli5-technique#:~:text=The%20ELI5%20(explain%20it%20like,treat%20your%20customers%20like%20children).)
    (Explain Like I’m 5) and lead with the business impact before diving into details.'
  id: totrans-44
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**解释技术内容**：尝试将你所做或刚刚学到的内容解释给你的非技术朋友或家人。使用[ELI5 技术](https://blog.groovehq.com/the-eli5-technique#:~:text=The%20ELI5%20(explain%20it%20like,treat%20your%20customers%20like%20children)（就像我5岁一样解释）并在深入细节之前先说明业务影响。'
- en: '**Storytelling:** Create a narrative for the story you want to tell. Create
    compelling visualizations or presentations to support your story. You can gradually
    build up complex concepts using the [Progressive Disclosure Principle](https://patthomson.net/2022/05/30/%EF%BF%BCusing-the-progressive-disclosure-principle-in-academic-writing/)
    or the [Pyramid Principle](https://lindsayangelo.com/thinkingcont/strategic-storytelling-pyramid-principle),
    which does it in reverse.'
  id: totrans-45
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**讲故事**：为你要讲述的故事创建一个叙述。创建引人入胜的可视化或演示来支持你的故事。你可以使用[渐进式披露原则](https://patthomson.net/2022/05/30/%EF%BF%BCusing-the-progressive-disclosure-principle-in-academic-writing/)或[金字塔原理](https://lindsayangelo.com/thinkingcont/strategic-storytelling-pyramid-principle)，后者是反过来的。'
- en: '**Communicating with stakeholders:** Stakeholders don’t have spare time. They
    want information fast and to the point. Practice the [Bottom Line Up Front](https://en.wikipedia.org/wiki/BLUF_(communication))
    (BLUF) and [Red/Amber/Green](https://medium.com/@TomHenricksen/what-is-the-project-status-red-amber-green-what-does-that-mean-b883f1164bc8)
    (RAG) techniques to deliver your message.'
  id: totrans-46
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**与利益相关者沟通：** 利益相关者没有空闲时间。他们想要快速、简洁的信息。练习[Bottom Line Up Front](https://en.wikipedia.org/wiki/BLUF_(communication))（BLUF）和[红/黄/绿](https://medium.com/@TomHenricksen/what-is-the-project-status-red-amber-green-what-does-that-mean-b883f1164bc8)（RAG）技术来传达你的信息。'
- en: '**Communicating in writing:** Use [BLUF](https://en.wikipedia.org/wiki/BLUF_(communication))
    and [RAG](https://medium.com/@TomHenricksen/what-is-the-project-status-red-amber-green-what-does-that-mean-b883f1164bc8),
    then summarize what’s been done, what’s next, and what’s blocking progress. When
    documenting your work, focus on the problem, methodology, reproducibility, and
    accessibility.'
  id: totrans-47
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**书面沟通：** 使用[BLUF](https://en.wikipedia.org/wiki/BLUF_(communication))和[RAG](https://medium.com/@TomHenricksen/what-is-the-project-status-red-amber-green-what-does-that-mean-b883f1164bc8)，然后总结已经完成的工作、下一步计划以及阻碍进展的因素。在记录你的工作时，关注问题、方法、可重复性和可访问性。'
- en: '**Avoiding pitfalls:** Think before your talk and don’t jabber on without any
    structure; avoid overwhelming with technical details or jargon; lastly, don’t
    procrastinate and wait too long to communicate; it’s always better to communicate
    something than to do nothing at all.'
  id: totrans-48
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**避免陷阱：** 在说话之前先思考，不要无结构地闲聊；避免用技术细节或行话压倒人；最后，不要拖延，不要等太久才沟通；有比什么都不做更好的沟通方式。'
- en: Where Can You Practice?
  id: totrans-49
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 你在哪里可以练习？
- en: There are many opportunities to look for!
  id: totrans-50
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 有很多机会可以去寻找！
- en: Try to explain your work to colleagues, friends, or family members. Send frequent
    status updates through email or your messaging app. Volunteer to present at team
    meetings or conferences. Join or start a journal club to practice discussing technical
    papers.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试向同事、朋友或家人解释你的工作。通过电子邮件或你的消息应用发送频繁的状态更新。自愿在团队会议或会议上进行演示。加入或创建一个期刊俱乐部来练习讨论技术论文。
- en: You could also seek feedback on your offline communications and presentations.
    Create a blog or contribute to technical documentation to improve your offline
    communication.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 你也可以寻求对你离线沟通和演示的反馈。创建一个博客或为技术文档做出贡献，以改善你的离线沟通。
- en: The opportunities are endless, you just need to look for them!
  id: totrans-53
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 机会无限，你只需要去寻找它们！
- en: '* * *'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 2\. Programming Skills (Python)
  id: totrans-55
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2. 编程技能（Python）
- en: That’s right, Python is number 2.
  id: totrans-56
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 对的，Python排名第二。
- en: After communication, I don’t need to tell you that core programming skills are
    super important for data scientists.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 在沟通之后，我不需要告诉你核心编程技能对于数据科学家来说非常重要。
- en: As a data scientist, you need a scripting language like `Python` to do what
    you need to do! From data scraping, extraction, manipulation, and analysis to
    developing custom models and their training, evaluation, inference pipelines,
    deploying services, and building interactive applications.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 作为数据科学家，你需要一种脚本语言，如`Python`，来完成你需要完成的工作！从数据抓取、提取、操作和分析，到开发自定义模型及其训练、评估、推理管道、部署服务和构建交互式应用程序。
- en: You need more than just the machine-learning-related libraries. (That’s number
    6 on this list).
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要的不仅仅是机器学习相关的库。（这是列表中的第6项）。
- en: Be familiar with the full breadth of what you can do in Python.
  id: totrans-60
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 熟悉你在Python中能做的全部范围。
- en: Try to familiarize yourself with as many built-in modules as you can in the
    [Python Standard Library](https://docs.python.org/3/library/index.html). It provides
    a ton of super useful tools that will expand the horizons of what you thought
    Python could do.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 尽量熟悉[Python标准库](https://docs.python.org/3/library/index.html)中的尽可能多的内置模块。它提供了一堆超级有用的工具，这将扩展你之前认为Python能做的事情的范围。
- en: For example, `[dataclasses](https://docs.python.org/3/library/dataclasses.html)`
    are very useful tools for managing data passed through objects. This example shows
    the object detection outputs of one model (object detector) being passed to the
    second model (pose estimator).
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，`[dataclasses](https://docs.python.org/3/library/dataclasses.html)`是管理通过对象传递的数据非常有用的工具。这个例子展示了某个模型（目标检测器）的输出被传递给第二个模型（姿态估计器）。
- en: 'Running this should produce the following output:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 运行此命令应产生以下输出：
- en: '[PRE0]'
  id: totrans-64
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '* * *'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 3\. Deep Understanding Of Data
  id: totrans-66
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3. 深入理解数据
- en: Do you know what’s in your data?
  id: totrans-67
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 你知道你的数据中有什么吗？
- en: 3.1 Data Validation
  id: totrans-68
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.1 数据验证
- en: What data issues do you have? which edge cases, corruptions, noise?
  id: totrans-69
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 你有哪些数据问题？哪些边缘情况、损坏、噪声？
- en: If you don’t know the answers to these questions, you might build a data pipeline
    or preprocessing component that produces bugs that are hard to understand and
    catch, or worse yet – silent errors! (Where everything runs fine, but you get
    behaviors that you don’t want).
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不知道这些问题的答案，你可能会构建一个数据管道或预处理组件，它会产生难以理解和捕捉的错误，或者更糟的是——沉默错误！（在这种情况下，一切运行正常，但你得到了你不想看到的行为）。
- en: How can you avoid these issues?
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 你如何避免这些问题？
- en: By explicitly testing ALL the assumptions you have about your data.
  id: totrans-72
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 通过明确测试你对你数据的所有假设。
- en: For example, is your data free of duplicates and missing values? Are all the
    values numeric, strings, or tensors? Are all the labels positive integers? Are
    all the files present? Are the paths structured as you believe they are?
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，你的数据是否没有重复和缺失值？所有的值是否都是数值、字符串或张量？所有的标签是否都是正整数？所有的文件是否都存在？路径是否按照你相信的方式组织？
- en: '**Think of it like tests for your data.**'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: '**把它想象成对你数据的测试。**'
- en: 'Too many times have I skipped this crucial step and ended up paying the price
    of silent bugs that are super hard to catch by without explicit testing. That’s
    why I never forget Bob Colwell’s famous saying: "If you didn’t test it, it doesn’t
    work".'
  id: totrans-75
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 太多次我跳过了这个关键步骤，结果付出了沉默错误的代价，这些错误非常难以通过没有明确测试来捕捉。这就是为什么我永远不会忘记鲍勃·科尔韦尔的名言：“如果你没有测试它，它就不起作用”。
- en: '* * *'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 3.2 Understanding Your Data
  id: totrans-77
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.2 理解你的数据
- en: '![Source: image from Deep Learning vs Data Science: Who Will Win?](../Images/a037897b365541c92e4ee44f9f031638.png)'
  id: totrans-78
  prefs: []
  type: TYPE_IMG
  zh: '![来源：来自《深度学习与数据科学：谁将获胜？》的图片](../Images/a037897b365541c92e4ee44f9f031638.png)'
- en: 'Source: image from [Deep Learning vs Data Science: Who Will Win?](https://towardsdatascience.com/deep-learning-vs-data-science-who-will-win-103bfbad0a65)'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: '来源：来自《深度学习与数据科学：谁将获胜？》的图片([Deep Learning vs Data Science: Who Will Win?](https://towardsdatascience.com/deep-learning-vs-data-science-who-will-win-103bfbad0a65))'
- en: Exploratory data analysis (EDA) is your friend!
  id: totrans-80
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 探索性数据分析（EDA）是你的朋友！
- en: Understanding the distributions involved, the difficulty of the learning task
    when training on the data, how to partition your data to provide insights, analyze
    performance, improve training, and encourage behaviors.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 理解涉及到的分布，在数据上训练时的学习任务难度，如何划分你的数据以提供洞察力，分析性能，改进训练，并鼓励行为。
- en: This will allow you to find the things you didn’t know that you didn’t know!
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 这将帮助你找到你不知道你不知道的事情！
- en: Hypothesis testing is good for finding things you know you don’t know, e.g.,
    you **know which questions** to ask but you **don’t know the answer** to.
  id: totrans-83
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 假设检验有助于发现你知道你不知道的事情，例如，你知道要问哪些问题，但你不知道答案。
- en: ''
  id: totrans-84
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: But what about questions you didn’t think about asking?
  id: totrans-85
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 但你有没有想过你没有想过要问的问题？
- en: This is where visualization comes in. This is your chance to open your mind
    and let it race through possibilities. It is your chance to find patterns and
    learn to ask new questions you’ve never thought about asking.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是可视化发挥作用的地方。这是你打开思维并让它驰骋于各种可能性中的机会。这是你发现模式和学会提出你从未想过要问的新问题的机会。
- en: Get very comfortable with tools such as `[matplotlib](https://matplotlib.org/)`,
    `[seaborn](https://seaborn.pydata.org/)`, `[plotly](https://plotly.com/)`, and
    related libraries. Any LLM can likely implement some starter code for visualizing
    your data, but you should still know how to go in and tailor it to exactly what
    you need.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 与 `[matplotlib](https://matplotlib.org/)`、`[seaborn](https://seaborn.pydata.org/)`、`[plotly](https://plotly.com/)`
    和相关库等工具非常熟悉。任何LLM都可能实现一些用于可视化数据的入门代码，但你仍然应该知道如何进入并调整它以满足你的确切需求。
- en: Remember, creating clear, informative visualizations that communicate insights
    effectively is a **skill, not an art**, and practice makes perfect.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，创建清晰、信息丰富的可视化，有效地传达洞察力是一种**技能，而不是艺术**，熟能生巧。
- en: '* * *'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 3.3 Understanding The Effects
  id: totrans-90
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.3 理解影响
- en: Last but not least, think about what behavior you expect your model to exhibit
    if it will be trained on the data.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 最后但同样重要的是，考虑如果你的模型将在数据上训练，你期望它表现出什么样的行为。
- en: Will your model really be able to learn what you want it to learn?
  id: totrans-92
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 你的模型真的能够学习到你想要它学习的东西吗？
- en: Can you use feature engineering to improve the learning signal? This is one
    of those places where you should try to **leverage your mathematical intuition**,
    knowledge of statistical methods, and probability theory.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 你能否使用特征工程来提高学习信号？这是那些你应该尝试利用你的数学直觉、统计方法知识和概率理论的地方。
- en: This is also relevant to evaluation data. Try to think about what it means to
    get certain metrics on a certain partition of the data. **Does it really support
    or disprove a hypothesis or business objective?** If not, what kind of data will
    be better aligned with the goal?
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
- en: 4\. Software Engineering Best Practices
  id: totrans-96
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Didn’t I cover this already?
  id: totrans-97
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-98
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: No. We talked about "how" to do things with code, now let’s talk about "what"
    you should be doing.
  id: totrans-99
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Each programming language has its own upsides, downsides, perks, and quirks.
    That said, there are many best practices in software engineering that you should
    master, as these concepts will give you a competitive edge over your peers and
    make you a true professional in your craft.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
- en: 'From my experience (as someone who learned these concepts way too late in my
    career), these skills will likely provide much more value than any single framework
    or tool:'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
- en: 'Version control ([Git](https://git-scm.com/book/ms/v2/Getting-Started-About-Version-Control)
    and [Github](https://github.com/)): careful commits, branches, pull requests,
    and documentation.'
  id: totrans-102
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Writing [clean code](https://refactoring.guru/refactoring/what-is-refactoring)
    and avoiding [smelly code](https://refactoring.guru/refactoring/smells).
  id: totrans-103
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Different types of [testing](https://www.geeksforgeeks.org/software-engineering-seven-principles-of-software-testing/).
  id: totrans-104
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Object-Oriented Programming (OOP) concepts: [Basic](https://www.geeksforgeeks.org/introduction-of-object-oriented-programming/)
    and [SOLID](https://www.geeksforgeeks.org/solid-principle-in-programming-understand-with-real-life-examples/)
    principles, as well as [common design patterns](https://refactoring.guru/design-patterns/catalog).'
  id: totrans-105
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[Containerization](https://www.docker.com/resources/what-container/).'
  id: totrans-106
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Take this example of smelly code:'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
- en: What wrong with it?
  id: totrans-108
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-109
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Many things actually.
  id: totrans-110
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The names of the method and variables are not meaningful(l,x,y), have no type
    hints, don’t have input validation, repeated logic (`>=` comparisons) and may
    produce undesirable behaviors, empty lists, and invalid grades.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
- en: 'Can we do better? Of course, we can! Check out this code instead:'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
- en: '**This clean code is much, much better!**'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
- en: For example, the variable and function have meaningful names and type hints
    that clearly define inputs and output types (making it easier to read and test),
    constants are clearly defined, there is no repeated logic, and input validation
    ensures reliable behavior.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
- en: For further reading, I highly recommend checking out [refactoring.guru](https://refactoring.guru/),
    which has a ton of really good and precise information about these topics.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
- en: 5\. Interacting With Databases
  id: totrans-117
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As a data scientist, don’t you work with data?
  id: totrans-118
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-119
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: And where does your data live?
  id: totrans-120
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Picture this: You’ve just joined a fast-growing startup as a data scientist.
    On your first day, you discover your data is scattered across half a dozen different
    systems. Customer information lives in [PostgreSQL](https://www.postgresql.org/),
    user behavior data streams into [MongoDB](https://www.mongodb.com/), session data
    sits in Redis, and your marketing team just dumped a treasure trove of campaign
    data into Snowflake.'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下：你刚刚加入一家快速发展的初创公司担任数据科学家。在你的第一天，你发现你的数据散布在六个不同的系统中。客户信息存储在[PostgreSQL](https://www.postgresql.org/)，用户行为数据流入[MongoDB](https://www.mongodb.com/)，会话数据位于Redis中，而你的营销团队刚刚将大量营销数据倒入Snowflake。
- en: Welcome to the modern data ecosystem.
  id: totrans-122
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 欢迎来到现代数据生态系统。
- en: Don’t get overwhelmed, though; it’s not as bad as you think. There are all kinds
    of databases out there, but the most basic families are [relational and NoSQL
    databases](https://aws.amazon.com/compare/the-difference-between-relational-and-non-relational-databases/).
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管如此，不要感到不知所措；实际情况并没有你想象的那么糟糕。有各种各样的数据库，但最基本的家庭是[关系型数据库和NoSQL数据库](https://aws.amazon.com/compare/the-difference-between-relational-and-non-relational-databases/)。
- en: '**Relational Databases** (such as [PostgreSQL](https://www.postgresql.org/)
    and [MySQL](https://www.mysql.com/)): These keep data in structured tables, which
    are good when your data can fit naturally into tables with rows and columns, has
    **well-defined relationships** between different types of data, has a relatively
    **stable data schema**, and requires you to run complex queries.'
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**关系型数据库**（例如[PostgreSQL](https://www.postgresql.org/)和[MySQL](https://www.mysql.com/))：这些数据库将数据存储在结构化的表中，当你的数据可以自然地适应行和列的表格，不同类型的数据之间有**明确的关系**，具有相对**稳定的数据库模式**，并且需要运行复杂的查询时，这是很好的。'
- en: '**NoSQL Databases**: This family actually has several different ways to store
    data. It is actually a family of "all the other storage approaches," including:
    **a. Document-based:** such as [MongoDB](https://www.mongodb.com/). Good for semi-structured
    data. **b. Key-value based:** such as [Redis](https://redis.io/). Good for simple
    and fast lookups. **c. Wide-column based:** such as [Cassandra](https://cassandra.apache.org/_/index.html).
    Good for handling massive amounts of structured data across several servers. **d.
    Graph-based:** such as [Neo4j](https://neo4j.com/). Good for situations where
    the relationships between entries are important. **e. Vector-based:** such as
    [Pinecone](https://www.pinecone.io/?utm_term=pinecone%20vector%20database&utm_campaign=brand-eu&utm_source=adwords&utm_medium=ppc&hsa_acc=3111363649&hsa_cam=21023356007&hsa_grp=156209469342&hsa_ad=690982079000&hsa_src=g&hsa_tgt=kwd-1538083228315&hsa_kw=pinecone%20vector%20database&hsa_mt=e&hsa_net=adwords&hsa_ver=3&gad_source=1&gclid=CjwKCAiA65m7BhAwEiwAAgu4JNoc9BbwsghLoxDmrpna0-GrVQEyJ6CZIFhK5LvEtUGpzdBqJ-ZhUBoCJz8QAvD_BwE).
    Good for similarity queries and storing high dimensional data, like feature embeddings.'
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**NoSQL数据库**：这个家族实际上有几种不同的数据存储方式。它实际上是一个“所有其他存储方法”的家族，包括：**a. 基于文档的**：例如[MongoDB](https://www.mongodb.com/)。适用于半结构化数据。**b.
    基于键值对的**：例如[Redis](https://redis.io/)。适用于简单快速的查找。**c. 基于宽列的**：例如[Cassandra](https://cassandra.apache.org/_/index.html)。适用于在多个服务器上处理大量结构化数据。**d.
    基于图的**：例如[Neo4j](https://neo4j.com/)。适用于条目之间关系重要的场景。**e. 基于向量的**：例如[Pinecone](https://www.pinecone.io/?utm_term=pinecone%20vector%20database&utm_campaign=brand-eu&utm_source=adwords&utm_medium=ppc&hsa_acc=3111363649&hsa_cam=21023356007&hsa_grp=156209469342&hsa_ad=690982079000&hsa_src=g&hsa_tgt=kwd-1538083228315&hsa_kw=pinecone%20vector%20database&hsa_mt=e&hsa_net=adwords&hsa_ver=3&gclid=CjwKCAiA65m7BhAwEiwAAgu4JNoc9BbwsghLoxDmrpna0-GrVQEyJ6CZIFhK5LvEtUGpzdBqJ-ZhUBoCJz8QAvD_BwE)。适用于相似性查询和存储高维数据，如特征嵌入。'
- en: So, Which Query Languages Should You Learn?
  id: totrans-126
  prefs:
  - PREF_IND
  - PREF_H3
  type: TYPE_NORMAL
  zh: 那么，你应该学习哪些查询语言呢？
- en: It’s okay to be a bit lazy on this one.
  id: totrans-127
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在这个问题上稍微懒惰一点是可以的。
- en: I’d recommend starting with [MySQL](https://www.w3schools.com/sql/) and [MongoDB](https://www.mongodb.com/),
    as I think these are good places to start. If you want, you can take a look at
    [Redis](https://redis.io/), [DynamoDB](https://aws.amazon.com/dynamodb/), [Pinecone](https://www.pinecone.io/?utm_term=pinecone%20vector%20database&utm_campaign=brand-eu&utm_source=adwords&utm_medium=ppc&hsa_acc=3111363649&hsa_cam=21023356007&hsa_grp=156209469342&hsa_ad=690982079000&hsa_src=g&hsa_tgt=kwd-1538083228315&hsa_kw=pinecone%20vector%20database&hsa_mt=e&hsa_net=adwords&hsa_ver=3&gad_source=1&gclid=CjwKCAiA65m7BhAwEiwAAgu4JNoc9BbwsghLoxDmrpna0-GrVQEyJ6CZIFhK5LvEtUGpzdBqJ-ZhUBoCJz8QAvD_BwE),
    [Neo4j](https://neo4j.com/), and others. **However, don’t get caught up in this.**
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
- en: It would also be good to get some basic understanding of what [data pipelines](https://www.ibm.com/think/topics/data-pipeline),
    [data lakes](https://aws.amazon.com/what-is/data-lake/), and [data warehouses](https://cloud.google.com/learn/what-is-a-data-warehouse)
    are.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
- en: 'As a data scientist, you won’t likely need to be a grandmaster of these frameworks.
    Just start with the very basics, build as you go, and always keep your eye on
    the real goal: turning data into insights.'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
- en: 6\. Cloud Computing
  id: totrans-132
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![Example of virual private cloud (VPC). Source: image made by author with
    Claude.](../Images/5f59254741407acbcd49662835751439.png)'
  id: totrans-133
  prefs: []
  type: TYPE_IMG
- en: 'Example of virual private cloud (VPC). Source: image made by author with Claude.'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
- en: How can you train your model if you can’t get your data and don’t even have
    a computer?
  id: totrans-135
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: As a data scientist, you will likely be working with cloud platforms (such as
    [AWS](https://aws.amazon.com/free/?gclid=CjwKCAiAg8S7BhATEiwAO2-R6n3MgOZ3Q4DPqJb4QumfwyGHO2EALEjDxP0E6p82wzCeElR_Rw3O-BoCIbEQAvD_BwE&trk=2d3e6bee-b4a1-42e0-8600-6f2bb4fcb10c&sc_channel=ps&ef_id=CjwKCAiAg8S7BhATEiwAO2-R6n3MgOZ3Q4DPqJb4QumfwyGHO2EALEjDxP0E6p82wzCeElR_Rw3O-BoCIbEQAvD_BwE:G:s&s_kwcid=AL!4422!3!645125273261!e!!g!!aws!19574556887!145779846712),
    [GCP](https://cloud.google.com/gcp?utm_source=google&utm_medium=cpc&utm_campaign=emea-il-all-en-bkws-all-all-trial-e-gcp-1011340&utm_content=text-ad-none-any-DEV_c-CRE_500236788696-ADGP_Hybrid+%7C+BKWS+-+EXA+%7C+Txt+-+GCP+-+General+-+v1-KWID_43700060384861723-kwd-87853815-userloc_1008006&utm_term=KW_gcp-NET_g-PLAC_&&gad_source=1&gclid=CjwKCAiAg8S7BhATEiwAO2-R6kPnaUBPuFCZNATK5G6x5AzBU2SClc8UCqs9nA2JH_ljoP_Cv9CNXhoCoEsQAvD_BwE&gclsrc=aw.ds),
    [Azure](https://azure.microsoft.com/en-us/)) for data storage and processing,
    as well as model training, evaluation, and deployment.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
- en: Even though you will likely always have a [DevOps](https://www.atlassian.com/devops#:~:text=A%20DevOps%20team%20includes%20developers,the%20organizations%20they%20work%20for.)
    team supporting you, some basic understanding and hands-on experience with cloud
    services will give you a **clear edge over your peers**!
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
- en: It will be like learning how to swim, but in a pool of abstract concepts.
  id: totrans-138
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: This knowledge will help you communicate your needs better, give you more independence
    with your computing resources, help you get more and stronger GPUs, and accelerate
    your development, training, and inference!
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
- en: For example, in one of my previous projects, I managed to **2X the number of
    strong GPUs** my team had by optimizing the resources my team was using within
    its budget.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
- en: How To Get Started?
  id: totrans-141
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As with all technical skills, I think the best way to learn them is to **start
    right away with hands-on tutorials**. Let’s play around a bit with Amazon’s Simple
    Storage Service ([S3](https://aws.amazon.com/pm/serv-s3/?gclid=CjwKCAiAmrS7BhBJEiwAei59i5MPy3cjsHiA-OhstEQnKwAyeEArrEqWpuKs2_OGQWpivukmEbD-nRoC1aYQAvD_BwE&trk=bf68dcca-a5e6-45e2-9193-a408d1a29481&sc_channel=ps&ef_id=CjwKCAiAmrS7BhBJEiwAei59i5MPy3cjsHiA-OhstEQnKwAyeEArrEqWpuKs2_OGQWpivukmEbD-nRoC1aYQAvD_BwE:G:s&s_kwcid=AL!4422!3!717563062548!e!!g!!s3!21818514919!169838296718))
    to save and download some data.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
- en: '6.1 Let’s Start With Account Setup And Installations:'
  id: totrans-143
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: If you don’t have an account, create one at [aws.amazon.com](https://aws.amazon.com/),
    then create an [IAM user](https://docs.aws.amazon.com/IAM/latest/UserGuide/id_users.html)
    with a policy that gives you access to [S3](https://aws.amazon.com/pm/serv-s3/?gclid=CjwKCAiAmrS7BhBJEiwAei59i5MPy3cjsHiA-OhstEQnKwAyeEArrEqWpuKs2_OGQWpivukmEbD-nRoC1aYQAvD_BwE&trk=bf68dcca-a5e6-45e2-9193-a408d1a29481&sc_channel=ps&ef_id=CjwKCAiAmrS7BhBJEiwAei59i5MPy3cjsHiA-OhstEQnKwAyeEArrEqWpuKs2_OGQWpivukmEbD-nRoC1aYQAvD_BwE:G:s&s_kwcid=AL!4422!3!717563062548!e!!g!!s3!21818514919!169838296718).
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
- en: Didn’t understand any of that? no worries.
  id: totrans-145
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Hopefully, your DevOps team will be able to help you with setting this up, and
    if not, I’d recommend checking out [this great tutorial on IAM](https://www.youtube.com/watch?v=_ZCTvmaPgao),
    [this one on S3](https://www.datacamp.com/tutorial/aws-s3-efs-tutorial), and [this
    hands-on tutorial, too](https://docs.aws.amazon.com/cli/latest/userguide/getting-started-quickstart.html).
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
- en: Ready?
  id: totrans-147
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-148
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Let’s go!
  id: totrans-149
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'First, let’s install the rest of the pip packages:'
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  id: totrans-151
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Now, configure your environment.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  id: totrans-153
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: After you set this up, your environment will be linked to your [IAM user](https://docs.aws.amazon.com/IAM/latest/UserGuide/id_users.html)
    with an access policy to do things with [S3](https://aws.amazon.com/pm/serv-s3/?gclid=CjwKCAiAmrS7BhBJEiwAei59i5MPy3cjsHiA-OhstEQnKwAyeEArrEqWpuKs2_OGQWpivukmEbD-nRoC1aYQAvD_BwE&trk=bf68dcca-a5e6-45e2-9193-a408d1a29481&sc_channel=ps&ef_id=CjwKCAiAmrS7BhBJEiwAei59i5MPy3cjsHiA-OhstEQnKwAyeEArrEqWpuKs2_OGQWpivukmEbD-nRoC1aYQAvD_BwE:G:s&s_kwcid=AL!4422!3!717563062548!e!!g!!s3!21818514919!169838296718),
    either through the AWS command line interface ([AWSCLI](https://aws.amazon.com/cli/))
    or through their Python library ([boto3](https://aws.amazon.com/sdk-for-python/)).
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
- en: Got that? Good.
  id: totrans-155
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 6.2 Setting Up Our Helper Class
  id: totrans-156
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Let’s now make a little class to manage uploading, downloading, and verifying
    data to and from [S3](https://aws.amazon.com/pm/serv-s3/?gclid=CjwKCAiAmrS7BhBJEiwAei59i5MPy3cjsHiA-OhstEQnKwAyeEArrEqWpuKs2_OGQWpivukmEbD-nRoC1aYQAvD_BwE&trk=bf68dcca-a5e6-45e2-9193-a408d1a29481&sc_channel=ps&ef_id=CjwKCAiAmrS7BhBJEiwAei59i5MPy3cjsHiA-OhstEQnKwAyeEArrEqWpuKs2_OGQWpivukmEbD-nRoC1aYQAvD_BwE:G:s&s_kwcid=AL!4422!3!717563062548!e!!g!!s3!21818514919!169838296718).
    Here specifically, we’ll handle images and a `labels.pt` tensor from a local directory.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
- en: 6.3 Interacting With S3
  id: totrans-158
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Then, we can run these operations using the following script, in which we will
    upload the first 10 images and labels of the [FashionMNIST](https://github.com/zalandoresearch/fashion-mnist)
    test dataset (MIT license).
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
- en: Running this should produce the following output, in which we confirm that the
    files we downloaded (after we uploaded them) are the same files we started with.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  id: totrans-161
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'Lastly, we can also use the command line interface to confirm the data is still
    present in our S3 bucket. In this case, let’s use the [AWSCLI](https://aws.amazon.com/cli/):'
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
- en: '`aws s3 ls --recursive {BUCKET_NAME}`'
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  id: totrans-164
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Important!
  id: totrans-165
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Always clean up the cloud resources you use to avoid excessive costs! Note that
    in this demo, the buckets will have different names (with timestamps) each time
    you run the script, so **make sure to delete these buckets in S3 when you are
    done!**
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  id: totrans-167
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: '* * *'
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
- en: 7\. Mastering Machine Learning Frameworks
  id: totrans-169
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: You know this, so I won’t dive deep with this one.
  id: totrans-170
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: As a data scientist, you need to know how and be willing to get your hands dirty
    with ML frameworks, so it is important to get good at using them! These include
    frameworks such as [PyTorch](https://pytorch.org/), [TensorFlow](https://www.tensorflow.org/),
    and [Scikit-Learn](https://scikit-learn.org/stable/).
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
- en: For example, here is a use case where you want to train a custom head for specific
    tokens of a pre-trained vision transformer to localize objects in a patch of an
    image. It also uses different learning rates to leverage pertained weights without
    "erasing" them.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
- en: You probably won’t find this kind of functionality in high-level trainers, such
    as when using the `[Hugging Face](https://huggingface.co/docs/transformers/en/main_classes/trainer)`
    or `[Fastai](https://fastai1.fast.ai/training.html)` trainers.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
- en: 8\. MLOps
  id: totrans-175
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Ever forget where you put your best model?
  id: totrans-176
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: MLOps is a catch-all phrase that includes all the tech needed to push an ML
    project through its entire lifecycle, from initial experiment tracking to production
    deployment. This includes containerization, monitoring, and maintaining model
    performance over time.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
- en: Do you need to use all this stuff even if you are working alone? on something
    that’s experimental? On a one-week project?
  id: totrans-178
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-179
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Yes, yes and yes.
  id: totrans-180
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: From my experience, moving from "*we’re just trying stuff out*" to "*we need
    to work in an organized way*" **happens way too slowly** and sometimes never!
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
- en: 'My rule of thumb is:'
  id: totrans-182
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**For ANY project, always use an experiment and configuration manager** to
    track your configurations, metrics, and model checkpoints.'
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
- en: This is why **you should master the basic features of experiment managers**,
    such as `[wandb](https://wandb.ai/site/)`, `[mlflow](https://mlflow.org/)`, `[clearml](https://clear.ml/?utm_feeditemid&utm_device=c&utm_term=clearml&utm_source=adwords&utm_medium=ppc&utm_campaign=Search%20%7C%20Brand&hsa_cam=16563267736&hsa_grp=134088880946&hsa_mt=e&hsa_src=g&hsa_ad=636186357048&hsa_acc=4043203093&hsa_net=adwords&hsa_kw=clearml&hsa_tgt=kwd-784171082579&hsa_ver=3&gad_source=1&gclid=Cj0KCQiAvP-6BhDyARIsAJ3uv7ar2la2E9xUmv68XJBn9E67dMsdCCNSr0kcrtPip1t7f2aAWFOIlNkaAnucEALw_wcB)`,
    `[neptune](https://docs.neptune.ai/usage/)`, and things like that. Don’t worry;
    they all have the same basic features, so just focus on one.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
- en: More elaborate MLOps components can wait until the project is more mature, but
    **learning them will give you an edge**. These include data, training, evaluation,
    CI/CD and inference pipelines, model and data versioning, ML monitoring, and more.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
- en: Here is an example of using `[wandb](https://wandb.ai/site/)`, to train a model
    and track its metrics and configuration, then save it to a model registry using
    their [artifacts](https://docs.wandb.ai/guides/artifacts/) API.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
- en: When opening up the `[wandb](https://wandb.ai/site/)` web app, you should see
    the experiments that ran and their metrics, configuration, and associated saved
    [artifacts](https://docs.wandb.ai/guides/artifacts/).
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
- en: '![Screenshot of artifacts being created in wandb. Source: screenshot by author.](../Images/4113735d508cf892e796859b8fdb8bc9.png)'
  id: totrans-188
  prefs: []
  type: TYPE_IMG
- en: 'Screenshot of artifacts being created in wandb. Source: screenshot by author.'
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
- en: '![Screenshot of metrics being tracked in wandb. Source: screenshot by author.](../Images/89dcb33a3a98c6e97d9fefaff13120ee.png)'
  id: totrans-190
  prefs: []
  type: TYPE_IMG
- en: 'Screenshot of metrics being tracked in wandb. Source: screenshot by author.'
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
- en: 9\. Understanding Metrics
  id: totrans-193
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: One of the hardest things in data science is deciding what it means to succeed
    at your task or goal. You can probably think of a ton of metrics, such as `[accuracy](https://scikit-learn.org/1.5/modules/generated/sklearn.metrics.accuracy_score.html)`,
    `[F1](https://scikit-learn.org/1.5/modules/generated/sklearn.metrics.f1_score.html)`,
    `[precision](https://scikit-learn.org/1.5/modules/generated/sklearn.metrics.precision_score.html)`,
    `[recall](https://scikit-learn.org/1.5/modules/generated/sklearn.metrics.recall_score.html)`,
    `[AUROC](https://scikit-learn.org/1.5/modules/generated/sklearn.metrics.roc_auc_score.html)`,
    `[mAP](https://towardsdatascience.com/map-mean-average-precision-might-confuse-you-5956f1bfa9e2)`,
    `[MSE](https://scikit-learn.org/1.5/modules/generated/sklearn.metrics.mean_squared_error.html)`,
    etc.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
- en: However, are these what you really care about? If your model is really good
    at one of them, does it mean your project is a success?
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
- en: Typically not.
  id: totrans-196
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: To develop systems that provide value to your clients and stakeholders, you
    need to understand their needs, define what success means, and find a way to quantify
    it.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 为了开发能够为你的客户和利益相关者提供价值的系统，你需要了解他们的需求，定义成功意味着什么，并找到一种方法来量化它。
- en: Many metrics can be *useful* for improving the model, but choosing the **right
    metric** that indicates success will ensure you really provide value.
  id: totrans-198
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 许多指标对于改进模型来说可能非常有用，但选择**正确的指标**来指示成功将确保你真正提供了价值。
- en: ''
  id: totrans-199
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: How To Get Good At This?
  id: totrans-200
  prefs:
  - PREF_BQ
  - PREF_H3
  type: TYPE_NORMAL
  zh: 如何在这个方面变得擅长？
- en: Try refreshing your knowledge of different loss functions and performance metrics.
    You can review the supported metrics in machine learning frameworks, such as `[sklearn.metrics](https://scikit-learn.org/1.5/modules/model_evaluation.html)`,
    `[torchmetrics](https://lightning.ai/docs/torchmetrics/stable/)`, `[torch loss
    functions](https://neptune.ai/blog/pytorch-loss-functions)`, and more.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试刷新你对不同损失函数和性能指标的知识。你可以查看机器学习框架中支持的指标，例如 `[sklearn.metrics](https://scikit-learn.org/1.5/modules/model_evaluation.html)`、`[torchmetrics](https://lightning.ai/docs/torchmetrics/stable/)`、`[torch
    loss functions](https://neptune.ai/blog/pytorch-loss-functions)` 以及更多。
- en: Many of these metrics have deep foundations in statistical measures and probability
    theory. However, I believe that trying to understand these metrics directly can
    be more beneficial than studying these fields.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 许多这些指标在统计量和概率理论中有着深厚的根基。然而，我相信尝试直接理解这些指标可能比研究这些领域更有益。
- en: '**Wanna gain more intuition?** be proactive and try to interact with these
    metrics by running them with different inputs and plot what you get. Make sure
    you are able to explain to someone else why the plots look this way.'
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: '**想要获得更多直观感受吗**？要积极主动，尝试用不同的输入运行这些指标，并绘制你得到的结果。确保你能够向别人解释为什么这些图表看起来是这样的。'
- en: This is how you develop an intuitive feeling for these topics.
  id: totrans-204
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这就是如何培养对这些主题的直观感受。
- en: '* * *'
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 10\. Problem-Solving & Critical Thinking
  id: totrans-206
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 10. 问题解决与批判性思维
- en: '![Source: image made by author with Dall E 3.](../Images/656bd1f7960ceaf2c8a8694b5cc92f7f.png)'
  id: totrans-207
  prefs: []
  type: TYPE_IMG
  zh: '![来源：作者用 Dall E 3 制作的图片](../Images/656bd1f7960ceaf2c8a8694b5cc92f7f.png)'
- en: 'Source: image made by author with Dall E 3.'
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：作者用 Dall E 3 制作的图片
- en: Have you ever been in this pose? Isn’t it the best? Being immersed in thought,
    considering different approaches, solutions and outcomes.
  id: totrans-209
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 你是否曾经处于这种姿势？难道不是最好的吗？沉浸在思考中，考虑不同的方法、解决方案和结果。
- en: 'Solving problems should be your bread and butter. However, unless you are Einstien,
    you will need a systematic way to tackle new problems. Here’s the one I use:'
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 解决问题应该是你的拿手好戏。然而，除非你是爱因斯坦，否则你需要一种系统的方法来处理新问题。以下是我使用的方法：
- en: '**Clearly define your problem:** your current situation, desired outcome, constraints,
    and success metrics.'
  id: totrans-211
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**明确界定你的问题**：你的当前情况、期望的结果、约束条件和成功指标。'
- en: '**Before diving in, take a step back**: is an algorithmic solution really necessary?
    Is there sufficient quality data? Does solving this problem provide value to your
    stakeholders, customers, or team?'
  id: totrans-212
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**在深入之前，退一步思考**：算法解决方案真的必要吗？是否有足够质量的数据？解决这个问题是否能为你的利益相关者、客户或团队提供价值？'
- en: '**Make Data-Driven Decisions:** *Be naive, start small, and iterate*. Try a
    super simple hypothesis and test it. Document the hypotheses you test, run small
    experiments, record outcomes, adjust hypotheses, add complexity, and repeat.'
  id: totrans-213
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**做出数据驱动的决策**：*保持天真，从小处着手，并迭代*。尝试一个超级简单的假设并对其进行测试。记录你测试的假设，进行小规模实验，记录结果，调整假设，增加复杂性，并重复。'
- en: That said, definitely consider different problem-solving frameworks that might
    work better for you, such as [PDCA](https://en.wikipedia.org/wiki/PDCA), [IDEAL](https://www.linkedin.com/pulse/ideal-problem-solving-framework-khaled-hussain-g7whc/),
    [5 Whys](https://en.wikipedia.org/wiki/Five_whys), and [First Principles Thinking](https://www.forbes.com/councils/forbescommunicationscouncil/2023/09/13/first-principles-thinking-the-blueprint-for-solving-business-problems/#:~:text=First%20principles%20thinking%20is%20a,discard%20inherited%20assumptions%20and%20conventions.).
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 话虽如此，确实可以考虑不同的问题解决框架，这些框架可能更适合你，例如 [PDCA](https://en.wikipedia.org/wiki/PDCA)、[IDEAL](https://www.linkedin.com/pulse/ideal-problem-solving-framework-khaled-hussain-g7whc/)、[5
    Whys](https://en.wikipedia.org/wiki/Five_whys) 和 [First Principles Thinking](https://www.forbes.com/councils/forbescommunicationscouncil/2023/09/13/first-principles-thinking-the-blueprint-for-solving-business-problems/#:~:text=First%20principles%20thinking%20is%20a,discard%20inherited%20assumptions%20and%20conventions.).
- en: When looking for simple solutions and ways to test your hypothesis, statistical
    measures are your friend. These include measures such as [Student’s T-test](https://en.wikipedia.org/wiki/Student%27s_t-test),
    [Pearson correlation](https://en.wikipedia.org/wiki/Pearson_correlation_coefficient),
    and [Wilcoxon signed-rank test](https://en.wikipedia.org/wiki/Wilcoxon_signed-rank_test).
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 当寻找简单的解决方案和测试你的假设时，统计量是你的朋友。这包括如[Student的t检验](https://en.wikipedia.org/wiki/Student%27s_t-test)、[皮尔逊相关系数](https://en.wikipedia.org/wiki/Pearson_correlation_coefficient)和[Wilcoxon符号秩检验](https://en.wikipedia.org/wiki/Wilcoxon_signed-rank_test)这样的度量。
- en: '* * *'
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 11\. AI-Based Tools And Workflows
  id: totrans-217
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 11. 基于AI的工具和工作流程
- en: Wait, didn’t you say it’s not all about the AI hype train?
  id: totrans-218
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 等等，你不是说这不仅仅是关于AI炒作吗？
- en: ''
  id: totrans-219
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Okay you got me.
  id: totrans-220
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 好吧，我承认了。
- en: I did say that, but I also think they can provide real value in **automating
    certain tasks you already *sort of* understand.** This is because you should never
    trust the outputs of these AI models without verifying them yourself.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 我确实说过，但我还认为它们可以在**自动化你已“某种程度上”理解的某些任务**中提供真正的价值。这是因为你永远不应该在没有自己验证的情况下信任这些AI模型的输出。
- en: This will ensure you provide real value and **** don’t look like an idiot who
    just copied the output of an AI model.
  id: totrans-222
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这将确保你提供真正的价值，并且**不要看起来像一个只是复制了AI模型输出的傻瓜**。
- en: 11.1 AI-Based Tools
  id: totrans-223
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 11.1 基于AI的工具
- en: There are many different AI tools out there, so I would like to focus more on
    **how you should be using these tools rather than which tools to use**.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 现在有许多不同的AI工具，所以我更想关注**你应该如何使用这些工具，而不是使用哪些工具**。
- en: '**Code-related AI Tools:** generate, edit, review, and test your code – whether
    through the API, UI (e.g., open AI canvas), or in your IDE. If you are not using
    these, *wake up!* These tools are a must in 2025 and will significantly boost
    your productivity and the quality of your code.'
  id: totrans-225
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**与代码相关的AI工具**：生成、编辑、审查和测试你的代码——无论是通过API、UI（例如，OpenAI画布）还是在你的IDE中。如果你没有使用这些工具，*醒醒!*
    这些工具在2025年将是必须的，并将显著提高你的生产力和代码质量。'
- en: '**Media generators (image, audio, 3D, and video):** As a data scientist, you
    must communicate your ideas and results quite a bit. (Remember the number one
    skill?). These tools can help you do so in presentations.'
  id: totrans-226
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**媒体生成器（图像、音频、3D和视频）**：作为一名数据科学家，你必须相当多地传达你的想法和结果。（记住第一项技能？）。这些工具可以帮助你在演示中做到这一点。'
- en: '**AI coworkers:** brainstorm ideas, feedback, and advice regarding work and
    life decisions. Always take it with a grain of salt.'
  id: totrans-227
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**AI同事**：就工作和生活决策中的想法、反馈和建议进行头脑风暴。始终带着怀疑的态度。'
- en: '**Knowledge gateways:** whether it is a reading assistant, a summarizer, a
    search engine, or just an LLM response. These tools can make knowledge more accessible,
    but be on the watch for hallucinations!'
  id: totrans-228
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**知识门户**：无论是阅读助手、摘要工具、搜索引擎，还是仅仅是一个LLM的响应。这些工具可以使知识更加易于获取，但要注意幻觉现象！'
- en: '**Communication assistants:** whether for translating to or from your native
    tongue, drafting an email, a letter, or a slide, these tools can likely save time
    and help improve your communication skills.'
  id: totrans-229
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**沟通助手**：无论是翻译到或从你的母语，起草电子邮件、信件或幻灯片，这些工具可能会节省时间并帮助提高你的沟通技巧。'
- en: '**"In-app" AI tools:** AI tools such as Copilot are used for spreadsheets,
    slideshows, text editors, etc. These AI-centric user interfaces can save you time
    compared to the old graphical user interfaces.'
  id: totrans-230
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**“应用内”AI工具**：如Copilot这样的AI工具用于电子表格、演示文稿、文本编辑器等。与旧的图形用户界面相比，这些以AI为中心的用户界面可以节省您的时间。'
- en: 11.2 AI-Based Workflows
  id: totrans-231
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 11.2 基于AI的工作流程
- en: Even though not every data scientist today is working to develop API-based AI
    applications, I think that it is vital to at least be familiar with the range
    of possible applications and workflows you can build with AI APIs.
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管不是每个数据科学家今天都在开发基于API的AI应用程序，但我认为至少熟悉你可以使用AI API构建的可能的应用程序和工作流程范围是至关重要的。
- en: 'I know what you might be saying:'
  id: totrans-233
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我知道你可能会说什么：
- en: ''
  id: totrans-234
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Sounds complicated and either way, I don’t need this.
  id: totrans-235
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 听起来很复杂，无论如何，我并不需要这些。
- en: But I disagree. These applications can now work with any type of data and have
    the potential to automate huge chunks of your day-to-day work and let you focus
    on the things that really matter – doing good data science.
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 但我不同意。这些应用程序现在可以处理任何类型的数据，并且有可能自动化你日常工作中的一大块工作，让你专注于真正重要的事情——做好数据科学。
- en: Best of all, it’s actually pretty simple to start building workflows! It is
    definitely simpler than many other machine learning systems.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 最好的是，实际上开始构建工作流程非常简单！这肯定比许多其他机器学习系统简单。
- en: '* * *'
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Let’s take a look at a super simple example of building a workflow with an LLM-based
    agent that decides which (if any) tools to use.
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
- en: If you are new to these things, think of "**tools**" as rule-based actions that
    the agent can decide to take based on its inputs. These can include running a
    method or a script, executing a terminal command, calling another API, using some
    resource, or even creating and/or running a different agent.
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
- en: 11.2.1 Installation And Environment Setup
  id: totrans-241
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '[PRE6]'
  id: totrans-242
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'Get your [Anthropic API key](https://docs.anthropic.com/en/api/getting-started)
    here and set it as an environment variable:'
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  id: totrans-244
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 11.2.2 Imports And Helper Functions
  id: totrans-245
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Let’s define the tools we want the model to use and some helper functions for
    calling the model and routing based on its decisions.
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
- en: Next, we can construct and run a workflow that uses the model to call the relevant
    tools based on its input. In this case, we will use a fixed input, though you
    can also parse it from your terminal or load it from a file.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
- en: 11.2.3 Running The Graph
  id: totrans-248
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'This should produce the following output:'
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  id: totrans-250
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: '* * *'
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
- en: 12\. Adaptability & Continuous Learning
  id: totrans-252
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![Souce: image created by author with with Dall E 3.](../Images/2774eae0befdde600c0a0d335e4af5f9.png)'
  id: totrans-253
  prefs: []
  type: TYPE_IMG
- en: 'Souce: image created by author with with Dall E 3.'
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
- en: This is probably the most important one.
  id: totrans-255
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-256
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The key to staying relevant in 2025 isn’t just learning everything new, but
    learning the right things at the right pace.
  id: totrans-257
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Remember, you already have most of these skills in some form or another. Embrace
    new AI tools strategically – it’s about sharpening your spear, not chasing every
    shiny object. Here are a few tips:'
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
- en: '**Create a Learning Framework:** Set aside 2–3 dedicated hours per week for
    learning, ideally at the same time each week to build a habit. Maintain a "skills
    inventory" document tracking your current expertise levels and identifying gaps;
    these can be new skills or existing ones.'
  id: totrans-259
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**80/20 Rule for AI tools:** spend 80% of the time mastering skills you already
    have and 20% experimenting with new tech. Always try to apply what you learn to
    real problems and projects you are working on.'
  id: totrans-260
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Use the "[learn-apply-teach](https://tndl.medium.com/learn-apply-teach-repeat-guidelines-for-technical-learning-ad164a5f8abb)"
    method:** Learn something new, apply it to a real project within 1 week, then
    explain it to a colleague. Document your learning in a personal wiki that no one
    needs to see.'
  id: totrans-261
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Measure progress and stay relevant:** Set quarterly learning goals with specific,
    measurable outcomes. Track your "wins" where you successfully applied your new
    skills. Most importantly, review and update your goals.'
  id: totrans-262
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  id: totrans-264
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Being a data scientist ain’t easy.
  id: totrans-265
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: You need a ton of soft and hard skills, which can take years to develop. But
    don’t worry, no one is perfect, no one is good at ALL of these skills, and no
    one will ever be.
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
- en: 'In this post, we’ve reviewed the top 12 skills that will be most important
    to succeed in the 2025 job market:'
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
- en: Communication skills
  id: totrans-268
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Programming skills (Python).
  id: totrans-269
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Undersanding and handling of data.
  id: totrans-270
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Software engineering best practices.
  id: totrans-271
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Interacting with databases.
  id: totrans-272
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Cloud computing.
  id: totrans-273
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Machine learning frameworks.
  id: totrans-274
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: MLOps.
  id: totrans-275
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Understanding metrics.
  id: totrans-276
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Problem-solving skills.
  id: totrans-277
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: AI tools.
  id: totrans-278
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Continuous learning.
  id: totrans-279
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**So what should you do with all this information?**'
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
- en: Take action and start boosting your skills!
  id: totrans-281
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: That said, take things one step at a time. Don’t try to take it all in; you’ll
    get overwhelmed, procrastinate, and inevitably stay in place.
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
- en: If you want to improve, start small.
  id: totrans-283
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-284
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Pick one skill from this list today, and dedicate the next month to mastering
    it. Pick a different one each month and you’ll cover them all!
  id: totrans-285
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Treat this post as a **roadmap to learning** **what matters** in the job market
    of 2025\. I hope it will help you all land your first position soon or make you
    uniquely valuable and excel in your current position.
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
- en: Good luck learning. You rock!
  id: totrans-287
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
