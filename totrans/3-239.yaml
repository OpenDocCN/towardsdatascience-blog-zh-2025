- en: 'Zero Human Code: What I Learned from Forcing AI to Build (and Fix) Its Own
    Code for 27 Straight Days'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/zero-human-code-what-i-learned-from-forcing-ai-to-build-and-fix-its-own-code-for-27-straight-days/](https://towardsdatascience.com/zero-human-code-what-i-learned-from-forcing-ai-to-build-and-fix-its-own-code-for-27-straight-days/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**27 days, 1,700+ commits, 99,9% AI generated code**'
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The narrative around AI development tools has become increasingly detached from
    reality. YouTube is filled with claims of building complex applications in hours
    using AI assistants. The truth?
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: 'I spent 27 days building [ObjectiveScope](https://objectivescope.com/) under
    a strict constraint: the AI tools would handle ALL coding, debugging, and implementation,
    while I acted purely as the orchestrator. This wasn’t just about building a product
    — it was a rigorous experiment in the true capabilities of agentic AI development.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/4d00d4da7fe5f5e77d0d45ecfa5065d8.png)'
  id: totrans-5
  prefs: []
  type: TYPE_IMG
- en: A dimwitted AI intern and a frustrated product manager walked into a bar… (Image
    by author)
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: '**The experiment design**'
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Two parallel objectives drove this project:'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: Transform a weekend prototype into a full-service product
  id: totrans-9
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Test the real limits of AI-driven development by maintaining a strict “no direct
    code changes” policy
  id: totrans-10
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'This self-imposed constraint was crucial: unlike typical AI-assisted development
    where developers freely modify code, I would only provide instructions and direction.
    The AI tools had to handle everything else — from writing initial features to
    debugging their own generated issues. This meant that even simple fixes that would
    take seconds to implement manually often required careful prompting and patience
    to guide the AI to the solution.'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: '**The rules**'
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: No direct code modifications (except for critical model name corrections — about
    0.1% of commits)
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: All bugs must be fixed by the AI tools themselves
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: All feature implementations must be done entirely through AI
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: My role was limited to providing instructions, context, and guidance
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This approach would either validate or challenge the growing hype around agentic
    AI development tools.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
- en: '**The development reality**'
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let’s cut through the marketing hype. Building with pure AI assistance is possible
    but comes with significant constraints that aren’t discussed enough in tech circles
    and marketing lingo.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: The self-imposed restriction of not directly modifying code turned what might
    be minor issues in traditional development into complex exercises in AI instruction
    and guidance.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: '**Core challenges**'
  id: totrans-21
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**Deteriorating context management**'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: As application complexity grew, AI tools increasingly lost track of the broader
    system context
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Features would be recreated unnecessarily or broken by seemingly unrelated changes
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The AI struggled to maintain consistent architectural patterns across the codebase
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Each new feature required increasingly detailed prompting to prevent system
    degradation
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Having to guide the AI to understand and maintain its own code added significant
    complexity
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Technical limitations**'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
- en: Regular battles with outdated knowledge (e.g., consistent attempts to use deprecated
    third party library versions)
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Persistent issues with model names (AI constantly changing “gpt-4o” or “o3-mini”
    to “gpt-4” as it identified this as the “bug” in the code during debugging sessions).
    The 0.1% of my direct interventions were solely to correct model references to
    avoid wasting time and money
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Integration challenges with modern framework features became exercises in patient
    instruction rather than quick fixes
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Code and debugging quality varied between prompts. Sometimes I just reverted
    and gave it the same prompt again with much better results.
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Self-debugging constraints**'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: What would be a 5-minute fix for a human often turned into hours of carefully
    guiding the AI
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The AI frequently introduced new issues (and even new features) while trying
    to fix existing ones
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Success required extremely precise prompting and constant vigilance
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Each bug fix needed to be validated across the entire system to ensure no new
    issues were introduced
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: More often than not the AI lied about what it actually implemented!
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/06c6aca760abd5914215d9ce53a47028.png)'
  id: totrans-39
  prefs: []
  type: TYPE_IMG
- en: Always verify the generated code! (Image by author)
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
- en: '**Tool-specific insights**'
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '[**Lovable**](https://lovable.dev/)'
  id: totrans-42
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Excelled at initial feature generation but struggled with maintenance
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Performance degraded significantly as project complexity increased
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Had to be abandoned in the final three days due to increasing response times
    and bugs in the tool itself
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Strong with UI generation but weak at maintaining system consistency
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**Cursor**](https://www.cursor.com/) **Composer**'
  id: totrans-47
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: More reliable for incremental changes and bug fixes
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Better at maintaining context within individual files
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Struggled with cross-component dependencies
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Required more specific prompting but produced more consistent results
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Much better at debugging and having control
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Difficulty with abstract concepts**'
  id: totrans-53
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: My experience with these agentic coding tools is that while they may excel at
    concrete tasks and well-defined instructions, they often struggle with abstract
    concepts, such as design principles, user experience, and code maintainability.
    This limitation hinders their ability to generate code that is not only functional
    but also elegant, efficient, and aligned with best practices. This can result
    in code that is difficult to read, maintain, or scale, potentially creating more
    work in the long run.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
- en: '**Unexpected learnings**'
  id: totrans-55
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The experiment yielded several unexpected but valuable insights about AI-driven
    development:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
- en: '**The evolution of prompting strategies**'
  id: totrans-57
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: One of the most valuable outcomes was developing a collection of effective debugging
    prompts. Through trial and error, I discovered patterns in how to guide AI tools
    through complex debugging scenarios. These prompts now serve as a reusable toolkit
    for other AI development projects, demonstrating how even strict constraints can
    lead to transferable knowledge.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
- en: '**Architectural lock-in**'
  id: totrans-59
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Perhaps the most significant finding was how early architectural decisions
    become nearly immutable in pure AI development. Unlike traditional development,
    where refactoring is a standard practice, changing the application’s architecture
    late in the development process proved almost impossible. Two critical issues
    emerged:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
- en: '**Growing file complexity**'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
- en: Files that grew larger over time became increasingly risky to modify, as a prompt
    to refactor the file often introduced hours of iterations to make the things work
    again.
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The AI tools struggled to maintain context across larger amount of files
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Attempts at refactoring often resulted in broken functionality and even new
    features I didn’t ask for
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The cost of fixing AI-introduced bugs during refactoring often outweigh potential
    benefits
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Architectural rigidity**'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
- en: Initial architectural decisions had outsized impact on the entire development
    process, specially when combining different AI tools to work on the same codebase
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The AI’s inability to comprehend full system implications made large-scale changes
    dangerous
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What would be routine refactoring in traditional development became high-risk
    and time consuming operations
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This differs fundamentally from typical AI-assisted development, where developers
    can freely refactor and restructure code. The constraint of pure AI development
    revealed how current tools, while powerful for initial development, struggle with
    the evolutionary nature of software architecture.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
- en: '**Key learnings for AI-only development**'
  id: totrans-71
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Early decisions matter more**'
  id: totrans-72
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Initial architectural choices become nearly permanent in pure AI development
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Changes that would be routine refactoring in traditional development become
    high-risk operations
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Success requires more upfront architectural planning than typical development
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Context is everything**'
  id: totrans-76
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: AI tools excel at isolated tasks but struggle with system-wide implications
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Success requires maintaining a clear architectural vision that the current AI
    tools don’t seem to provide
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Documentation and context management become critical as complexity grows
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Time investment reality**'
  id: totrans-80
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Claims of building complex apps in hours are misleading. The process requires
    significant time investment in:'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
- en: Precise prompt engineering
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Reviewing and guiding AI-generated changes
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Managing system-wide consistency
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Debugging AI-introduced issues
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Tool selection matters**'
  id: totrans-86
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Different tools excel at different stages of development
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Success requires understanding each tool’s strengths and limitations
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Be prepared to switch or even combine tools as project needs evolve
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Scale changes everything**'
  id: totrans-90
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: AI tools excel at initial development but struggle with growing complexity
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: System-wide changes become exponentially more difficult over time
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Traditional refactoring patterns don’t translate well to AI-only development
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**The human element**'
  id: totrans-94
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The role shifts from writing code to orchestrating AI systems
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Strategic thinking and architectural oversight become more critical
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Success depends on maintaining the bigger picture that AI tools often miss
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Stress management and deep breathing is encouraged as frustration builds up
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**The Art of AI Instruction**'
  id: totrans-99
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Perhaps the most practical insight from this experiment can be summed up in
    one tip: **Approach prompt engineering like you’re talking to a really dimwitted
    intern**. This isn’t just amusing — it’s a fundamental truth about working with
    current AI systems:'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
- en: '**Be Painfully Specific**: The more you leave ambiguous, the more room there
    is for the AI to make incorrect assumptions and “screw up”'
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Assume No Context**: Just like an intern on their first day, the AI needs
    everything spelled out explicitly'
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Never Rely on Assumptions**: If you don’t specify it, the AI will make its
    own (often wrong) decisions'
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Check Everything**: Trust but verify — every single output needs review'
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This mindset shift was crucial for success. While AI tools can generate impressive
    code, they lack the common sense and contextual understanding that even a junior
    developers possess. Understanding this limitation transforms frustration into
    an effective strategy.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b2fcebb77e97b4af54cfd134df00931d.png)'
  id: totrans-106
  prefs: []
  type: TYPE_IMG
- en: When frustration takes over. An example of how NOT to prompt 😅(Image by author)
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
- en: '**The Result: A Full-Featured Goal Achievement Platform**'
  id: totrans-108
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'While the development process revealed crucial insights about AI tooling, the
    end result speaks for itself: ObjectiveScope emerged as a sophisticated platform
    that transforms how solopreneurs and small teams manage their strategic planning
    and execution.'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
- en: ObjectiveScope transforms how founders and teams manage strategy and execution.
    At its core, AI-powered analysis eliminates the struggle of turning complex strategy
    documents into actionable plans — what typically takes hours becomes a 5-minute
    automated process. The platform doesn’t just track OKRs; it actively helps you
    create and manage them, ensuring your objectives and key results actually align
    with your strategic vision while automatically keeping everything up to date.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/7b2492310b24c059eab6f9498b6c5bcc.png)'
  id: totrans-111
  prefs: []
  type: TYPE_IMG
- en: Screenshot of the strategy analysis section in ObjectiveScope (Image by author)
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
- en: For the daily chaos every founder faces, the intelligent priority management
    system turns overwhelming task lists into clear, strategically-aligned action
    plans. No more Sunday night planning sessions or constant doubt about working
    on the right things. The platform validates that your daily work truly moves the
    needle on your strategic goals.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
- en: Team collaboration features solve the common challenge of keeping everyone aligned
    without endless meetings. Real-time updates and role-based workspaces mean everyone
    knows their priorities and how they connect to the bigger picture.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 团队协作功能解决了保持每个人一致性的常见挑战，无需无休止的会议。实时更新和基于角色的工作空间意味着每个人都知道自己的优先事项以及它们如何与整体画面相连接。
- en: '**Real-World Impact**'
  id: totrans-115
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**现实世界的影响**'
- en: ObjectiveScope addresses critical challenges I’ve repeatedly encountered while
    advising startups, managing my own ventures or just talking to other founders.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: ObjectiveScope解决了我在向初创公司提供建议、管理自己的企业或与其他创始人交谈时反复遇到的重大挑战。
- en: I’m spending 80% less time on planning, eliminating the constant context switching
    that kills productivity, and maintaining strategic clarity even during the busiest
    operational periods. It’s about transforming strategic management from a burdensome
    overhead into an effortless daily rhythm that keeps you and your team focused
    on what matters most.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 我在规划上花费的时间减少了80%，消除了杀死生产力的不断上下文切换，即使在最繁忙的运营期间也能保持战略清晰。这关乎将战略管理从负担沉重的开销转变为轻松的日常节奏，让你和你的团队能够专注于最重要的事情。
- en: 'I’ll be expanding ObjectiveScope to address other key challenges faced by founders
    and teams. Some ideas in the pipeline are:'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 我将扩展ObjectiveScope以解决创始人团队面临的其他关键挑战。管道中的一些想法包括：
- en: An agentic chat assistant will provide real-time strategic guidance, eliminating
    the uncertainty of decision-making in isolation.
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个具有代理功能的聊天助手将提供实时战略指导，消除孤立决策的不确定性。
- en: Smart personalization will learn from your patterns and preferences, ensuring
    recommendations actually fit your working style and business context.
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 智能个性化将学习你的模式和偏好，确保推荐实际上符合你的工作风格和商业环境。
- en: Deep integrations with Notion, Slack, and calendar tools will end the constant
    context-switching between apps that fragments strategic focus.
  id: totrans-121
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与Notion、Slack和日历工具的深度集成将结束在应用程序之间不断切换上下文，从而碎片化战略焦点。
- en: Predictive analytics will analyze your performance patterns to flag potential
    issues before they impact goals and suggest resource adjustments when needed.
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 预测分析将分析你的绩效模式，在它们影响目标之前标记潜在问题，并在需要时建议资源调整。
- en: And finally, flexible planning approaches — both on-demand and scheduled — will
    ensure you can maintain strategic clarity whether you’re following a stable plan
    or responding to rapid market changes.
  id: totrans-123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 最后，灵活的规划方法——无论是按需还是预定——将确保你无论是在遵循稳定计划还是应对快速市场变化时，都能保持战略清晰。
- en: Each enhancement aims to transform a common pain point into an automated, intelligent
    solution.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 每项增强都旨在将一个常见的痛点转化为自动化、智能的解决方案。
- en: '**Looking Forward: Evolution Beyond the Experiment**'
  id: totrans-125
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**展望未来：实验之外的进化**'
- en: The initial AI-driven development phase was just the beginning. Moving forward,
    I’ll be taking a more hands-on approach to building new capabilities, informed
    by the insights gained from this experiment. I certainly can’t take the risk of
    letting AI completely loose in the code when we are in production.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 初始的AI驱动开发阶段只是开始。向前看，我将采取更亲力亲为的方法来构建新的能力，这些能力将受到从这次实验中获得见解的启发。我当然不能冒险让AI在产品阶段完全自由地编写代码。
- en: 'This evolution reflects a key learning from the first phase of the experiment:
    while AI can build complex applications on its own, the path to product excellence
    requires combining AI capabilities with human insight and direct development expertise.
    At least for now.'
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 这种进化反映了实验第一阶段的关键学习：虽然AI可以独立构建复杂的应用程序，但通往产品卓越的道路需要结合AI能力、人类洞察力和直接开发专业知识。至少目前是这样的。
- en: '**The Emergence of “Long Thinking” in Coding**'
  id: totrans-128
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**编码中“长期思考”的出现**'
- en: The shift toward “long thinking” through reasoning models in AI development
    marks a critical evolution in how we might build software in the future. This
    emerging approach emphasizes deliberate reasoning and planning — essentially trading
    rapid responses for better-engineered solutions. For complex software development,
    this isn’t just an incremental improvement; it’s a fundamental requirement for
    producing production-grade code.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 通过AI开发中的推理模型转向“长期思考”标志着我们在未来构建软件方式的重大进化。这种新兴方法强调深思熟虑的推理和规划——本质上是以快速响应换取更好的工程解决方案。对于复杂软件开发来说，这不仅仅是一个渐进的改进；这是生产级代码的基本要求。
- en: 'This capability shift is redefining the developer’s role as well, but not in
    the way many predicted. Rather than replacing developers, AI is elevating their
    position from code implementers to system architects and strategic problem solvers.
    The real value emerges when developers focus on the tasks AI can’t handle well
    yet: battle tested system design, architectural decisions, and creative problem-solving.
    It’s not about automation replacing human work — it’s about automation enhancing
    human capability.'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 这种能力转变也在重新定义开发者的角色，但并非如许多人所预测的那样。AI并非取代开发者，而是将他们的位置从代码实现者提升到系统架构师和战略问题解决者。真正的价值在于开发者专注于AI尚不能很好地处理的任务：经过实战考验的系统设计、架构决策和创造性问题解决。这不仅仅是自动化取代人工工作——这是自动化增强人类能力。
- en: '**Next Steps: Can AI run the entire business operation?**'
  id: totrans-131
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**下一步：AI能否运行整个业务运营？**'
- en: I’m validating whether ObjectiveScope — a tool built by AI — can be operated
    entirely by AI. The next phase moves beyond AI development to test the boundaries
    of AI operations.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 我正在验证ObjectiveScope——一个由AI构建的工具——是否可以完全由AI操作。下一阶段将超越AI开发，测试AI操作的边界。
- en: Using ObjectiveScope’s own strategic planning capabilities, combined with various
    AI agents and tools, I’ll attempt to run all business operations — marketing,
    strategy, customer support, and prioritization — without human intervention.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 利用ObjectiveScope自身的战略规划能力，结合各种AI代理和工具，我将尝试在没有人工干预的情况下运行所有业务运营——包括市场营销、战略规划、客户支持和优先级排序。
- en: It’s a meta-experiment where AI uses AI-built tools to run an AI-developed service…
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个元实验，其中AI使用由AI构建的工具来运行AI开发的服务…
- en: Stay tuned for more!
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 请继续关注更多消息！
