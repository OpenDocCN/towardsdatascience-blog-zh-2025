  zh: 1 — UV文档：[https://docs.astral.sh/uv/](https://docs.astral.sh/uv/)
- en: '2 — UV GitHub repository: [https://github.com/astral-sh/uv](https://github.com/astral-sh/uv)'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 2 — UV GitHub仓库：[https://github.com/astral-sh/uv](https://github.com/astral-sh/uv)
- en: '3 — A great datacamp article: [https://www.datacamp.com/tutorial/python-uv](https://www.datacamp.com/tutorial/python-uv)'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 3 — 一篇优秀的datacamp文章：[https://www.datacamp.com/tutorial/python-uv](https://www.datacamp.com/tutorial/python-uv)
