- en: 'Data Scientist: From School to Work, Part I'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/data-scientist-from-school-to-work-part-i/](https://towardsdatascience.com/data-scientist-from-school-to-work-part-i/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Nowadays, data science projects do not end with the proof of concept; every
    project has the goal of being used in production. It is important, therefore,
    to deliver high-quality code. I have been working as a data scientist for more
    than ten years and I have noticed that juniors usually have a weak level in development,
    which is understandable, because to be a data scientist you need to master math,
    statistics, algorithmics, development, and have knowledge in operational development.
    In this series of articles, I would like to share some tips and good practices
    for managing a professional data science project in Python. From Python to Docker,
    with a detour to Git, I will present the tools I use every day.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 'The other day, a colleague told me how he had to reinstall Linux because of
    an incorrect manipulation with Python. He had restored an old project that he
    wanted to customize. As a result of installing and uninstalling packages and changing
    versions, his Linux-based Python environment was no longer functional: an incident
    that could easily have been avoided by setting up a virtual environment. But it
    shows how important it is to manage these environments. Fortunately, there is
    now an excellent tool for this: [**uv**](https://github.com/astral-sh/uv).'
  prefs: []
  type: TYPE_NORMAL
- en: 'The origin of these two letters is not clear. According to Zanie Blue (one
    of the creators):'
  prefs: []
  type: TYPE_NORMAL
- en: “We considered a *ton* of names — it’s really hard to pick a name without collisions
    this day so every name was a balance of tradeoffs. uv was given to us on PyPI,
    is Astral-themed (i.e. ultraviolet or universal), and is *short* and easy to type.”
  prefs: []
  type: TYPE_NORMAL
- en: Now, let’s go into a little more detail about this wonderful tool.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '**Introduction**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: UV is a modern, minimalist Python projects and packages manager. Developed entirely
    in Rust, it has been designed to simplify dependency management, virtual environment
    creation and project organization. UV has been designed to limit common Python
    project problems such as dependency conflicts and environment management. It aims
    to offer a smoother, more intuitive experience than traditional tools such as
    the pip + virtualenv combo or the Conda manager. It is claimed to be 10 to 100
    times faster than traditional handlers.
  prefs: []
  type: TYPE_NORMAL
- en: Whether for small personal projects or developing Python applications for production,
    UV is a robust and efficient solution for package management.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '**Starting with UV**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**Installation**'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'To install UV, if you are using Windows, I recommend to use this command in
    a shell:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'And, if you are on Mac or Linux use the command:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b3afb3f56ebc00cf3b0d0546f7afe98f.png)'
  prefs: []
  type: TYPE_IMG
- en: 'To verify correct installation, simply type into a terminal the following command:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: '**Creation of a new Python project**'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'Using UV you can create a new project by specifying the version of Python.
    To start a new project, simply type into a terminal:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: '*`python x:xx`* must be replaced by the desired version (e.g. *`python 3.12`*).
    If you do not have the specified Python version, UV will take care of this and
    download the correct version to start the project.'
  prefs: []
  type: TYPE_NORMAL
- en: 'This command creates and automatically initializes a Git repository namedproject_name*.*
    It contains several files:'
  prefs: []
  type: TYPE_NORMAL
- en: A`.gitignore<em> </em>`file. It lists the elements of the repository to be ignored
    in the git versioning (it is basic and should be rewrite for a project ready to
    deploy).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A`.python-version<em> </em>`file. It indicates the python version used in the
    project.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The `README.md` file. It has a purpose to describe the project and explains
    how to use it.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A `hello.py`file.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The `pyproject.toml`file. This file contains all the information about tools
    used to build the project.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The `uv.lock` file. It is used to create the virtual environment when you use
    uv to run the script (it can be compared to the *requierements.txt*)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Package installation**'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'To install new packages in this next environment you have to use:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: When the *add* command is used for the first time, UV creates a new virtual
    environment in the current working directory and installs the specified dependencies.
    A .venv/ directory appears. On subsequent runs, UV will use the existing virtual
    environment and install or update only the new packages requested. In addition,
    UV has a powerful dependency resolver. When executing the *add* command, UV analyzes
    the entire dependency graph to find a compatible set of package versions that
    meet all requirements (package version and Python version). Finally, UV updates
    the pyproject.toml and uv.lock files after each *add* command.
  prefs: []
  type: TYPE_NORMAL
- en: 'To uninstall a package, type the command:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: It is very important to clean the unused package from your environment. You
    have to keep the dependency file as minimal as possible. If a package is not used
    or is no longer used, it must be deleted.
  prefs: []
  type: TYPE_NORMAL
- en: '**Run a Python script**'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'Now, your repository is initiated, your packages are installed and your code
    is ready to be tested. You can *activate* the created virtual environment as usual,
    but it is more efficient to use the UV command *`run`*:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: Using the run command guarantees that the script will be executed in the virtual
    environment of the project.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '**Manage the Python versions**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: It is usually recommended to use different Python versions. As mentioned before
    the introduction, you may be working on an old project that requires an old Python
    version. And often it will be too difficult to update the version.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: At any time, it is possible to change the Python version of your project. To
    do that, you have to modify the line *requires-python* in the `pyproject.toml`file.
  prefs: []
  type: TYPE_NORMAL
- en: 'For instance: requires-python = “>=3.9”'
  prefs: []
  type: TYPE_NORMAL
- en: 'Then you have to synchronize your environment using the command:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: The command first checks existing Python installations. If the requested version
    is not found, UV downloads and installs it. UV also creates a new virtual environment
    in the project directory, replacing the old one.
  prefs: []
  type: TYPE_NORMAL
- en: 'But the new environment does not have the required package. Thus, after a sync
    command, you have to type:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '**Switch from virtualenv to uv**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: If you have a Python project initiated with pip and virtualenv and wish to use
    UV, nothing could be simpler. If there is no *requirements* file, you need to
    activate your virtual environment and then retrieve the package + installed version.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: 'Then, you have to init the project with UV and install the dependencies:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/6a55f0dffadf7665d311a8717959c1c7.png)'
  prefs: []
  type: TYPE_IMG
- en: Correspondence table between pip + virtualenv and UV, image by author.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '**Use the tools**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'UV offers the possibility of using **tools** via the *uv tool* command. Tools
    are Python packages that provide command interfaces for such as *ruff*, *pytests*,
    *mypy*, etc. To install a tool, type the command line:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: 'But, a tool can be used without having been installed:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: 'For convenience, an alias was created: *uvx*, which is equivalent to *uv tool
    run.* So, to run a tool, just type:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '**Conclusion**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: UV is a powerful and efficient Python package manager designed to provide fast
    dependency resolution and installation. It significantly outperforms traditional
    tools like *pip* or *conda,* making it an excellent choice to manage your Python
    projects.
  prefs: []
  type: TYPE_NORMAL
- en: Whether you’re working on small scripts or large projects, I recommend you get
    into the habit of using UV. And believe me, trying it out means adopting it.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
