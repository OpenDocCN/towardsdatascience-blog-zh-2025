- en: 'The Concepts Data Professionals Should Know in 2025: Part 2'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 2025年数据专业人士应了解的概念：第二部分
- en: 原文：[https://towardsdatascience.com/the-concepts-data-professionals-should-know-in-2025-part-2-c0e308946463/](https://towardsdatascience.com/the-concepts-data-professionals-should-know-in-2025-part-2-c0e308946463/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://towardsdatascience.com/the-concepts-data-professionals-should-know-in-2025-part-2-c0e308946463/](https://towardsdatascience.com/the-concepts-data-professionals-should-know-in-2025-part-2-c0e308946463/)'
- en: Innovation in the field of data is progressing rapidly.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 数据领域的创新正在快速发展。
- en: 'Let’s take a quick look at the timeline of GenAI: ChatGPT, launched in November
    2022, became the world’s best-known application of generative AI in early 2023\.
    By spring 2025, leading companies like Salesforce (Marketing Cloud Growth) and
    Adobe (Firefly) integrated it into mainstream applications – making it accessible
    to companies of various sizes. Tools like MidJourney advanced image generation,
    while at the same time, discussions about agentic AI took center stage. Today,
    tools like ChatGPT have already become common for many private users.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们快速浏览一下生成式AI的时间线：ChatGPT于2022年11月发布，到2023年初已成为世界上最知名的生成式AI应用。到2025年春季，Salesforce（营销云增长）和Adobe（Firefly）等领先公司已将其集成到主流应用中，使其对各种规模的公司都变得可访问。MidJourney等工具推动了图像生成，同时，关于代理式AI的讨论成为焦点。如今，ChatGPT等工具已经对许多私人用户变得司空见惯。
- en: '**That’s why I have compiled 12 terms that you will certainly encounter as
    a data engineer, data scientist and data analyst in 2025 and are important to
    understand. Why are they relevant? What are the challenges? And how can you apply
    them to a small project?**'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: '**这就是为什么我整理了12个术语，你将在2025年作为一个数据工程师、数据科学家和数据分析师遇到，并且理解它们非常重要。为什么它们相关？挑战是什么？你如何将它们应用到一个小项目中？**'
- en: '**Table of Content** [Term 1–6 in part 1: Data Warehouse, Data Lake, Data Lakehouse,
    Cloud Platforms, Optimizing data storage, Big Data technologies, ETL, ELT and
    Zero-ETL, Even-Driven-Architecture](https://medium.com/towards-data-science/the-concepts-data-professionals-should-know-in-2025-part-1-47e7e797801d)
    [7 – Data Lineage & XAI](#4725) [8 – Gen AI](#88e5) [9 – Agentic AI](#f8ac) [10
    – Inference Time Compute](#2a6c) [11 – Near Infinite Memory](#feac) [12 – Human-In-The-Loop-Augmentation](#da56)
    [Final Thoughts](#b6c9)'
  id: totrans-5
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**目录** [第一部分第1-6项：数据仓库、数据湖、数据湖屋、云平台、优化数据存储、大数据技术、ETL、ELT和Zero-ETL、事件驱动架构](https://medium.com/towards-data-science/the-concepts-data-professionals-should-know-in-2025-part-1-47e7e797801d)
    [7 – 数据血缘与XAI](#4725) [8 – 生成式AI](#88e5) [9 – 代理式AI](#f8ac) [10 – 推理时间计算](#2a6c)
    [11 – 近无限内存](#feac) [12 – 人类在回路增强](#da56) [最终思考](#b6c9)'
- en: In the [first part](https://medium.com/towards-data-science/the-concepts-data-professionals-should-know-in-2025-part-1-47e7e797801d),
    we looked at terms for the basics of understanding modern data systems (storage,
    management & processing of data). In part 2, we now move beyond infrastructure
    and dive into some terms related to artificial intelligence that use this data
    to drive innovation.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在[第一部分](https://medium.com/towards-data-science/the-concepts-data-professionals-should-know-in-2025-part-1-47e7e797801d)中，我们探讨了理解现代数据系统（数据存储、管理和处理）的基本术语。在第二部分中，我们现在超越基础设施，深入探讨一些与人工智能相关的术语，这些术语使用这些数据来推动创新。
- en: '7 – Explainability of predictions and traceability of data: XAI & Data Lineage'
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 7 – 预测的可解释性和数据可追溯性：XAI与数据血缘
- en: 'As data and AI tools become increasingly important in our everyday lives, we
    also need to know how to track them and create transparency for decision-making
    processes and predictions:'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 随着数据和AI工具在我们日常生活中的重要性日益增加，我们也需要了解如何跟踪它们，并为决策过程和预测创造透明度：
- en: 'Let’s imagine a scenario in a hospital: A deep learning model is used to predict
    the chances of success of an operation. A patient is categorised as ‘unsuitable’
    for the operation. The problem for the medical team? There is no explanation as
    to how the model arrived at this decision. The internal processes and calculations
    that led to the prediction remain hidden. It is also not clear which attributes
    – such as age, state of health or other parameters – were decisive for this assessment.
    Should the medical team nevertheless believe the prediction and not proceed with
    the operation? Or should they proceed as they see best fit?'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们想象一个医院场景：一个深度学习模型被用来预测手术成功的可能性。一位患者被归类为“不适合”进行手术。医疗团队的问题是什么？模型如何得出这个决定的解释并不明确。导致预测的内部流程和计算仍然隐藏。也不清楚哪些属性——如年龄、健康状况或其他参数——对这一评估是决定性的。医疗团队是否仍然应该相信预测并放弃手术？或者他们应该按照他们认为最合适的方式继续进行？
- en: 'This lack of transparency can lead to uncertainty or even mistrust in AI-supported
    decisions. Why does this happen? Many deep learning models provide us with results
    and excellent predictions – much better than simple models can do. However, the
    models are ‘black boxes’ – we don’t know exactly how the models arrived at the
    results and what features they used to do so. While this lack of transparency
    hardly plays a role in everyday applications, such as distinguishing between cat
    and dog photos, the situation is different in critical areas: For example, in
    healthcare, financial decisions, criminology or recruitment processes, we need
    to be able to understand how and why a model arrives at certain results.'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 这种缺乏透明度可能导致对AI辅助决策的不确定性甚至不信任。为什么会这样？许多深度学习模型为我们提供了结果和出色的预测——比简单模型做得更好。然而，这些模型是“黑箱”——我们不知道模型是如何得出结果以及它们使用了哪些特征。虽然这种缺乏透明度在日常应用中几乎不起作用，例如区分猫和狗的照片，但在关键领域的情况就不同了：例如，在医疗保健、财务决策、犯罪学或招聘流程中，我们需要能够理解模型是如何以及为什么得出某些结果的。
- en: 'This is where **Explainable AI (XAI)** comes into play: techniques and methods
    that attempt to make the decision-making process of AI models understandable and
    comprehensible. Examples of this are [SHAP](https://shap.readthedocs.io/en/latest/example_notebooks/overviews/An%20introduction%20to%20explainable%20AI%20with%20Shapley%20values.html)
    (SHapley Additive ExPlanations) or [LIME](https://github.com/marcotcr/lime) (Local
    Interpretable Model-agnostic Explanations). These tools can at least show us which
    features contributed most to a decision.'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是**可解释人工智能（XAI）**发挥作用的地方：试图使AI模型的决策过程变得可理解和可解释的技术和方法。例如，有[SHAP](https://shap.readthedocs.io/en/latest/example_notebooks/overviews/An%20introduction%20to%20explainable%20AI%20with%20Shapley%20values.html)（SHapley
    Additive ExPlanations）或[LIME](https://github.com/marcotcr/lime)（Local Interpretable
    Model-agnostic Explanations）。这些工具至少可以显示哪些特征对决策贡献最大。
- en: '**Data Lineage**, on the other hand, helps us understand where data comes from,
    how it has been processed and how it is ultimately used. In a BI tool, for example,
    a report with incorrect figures could be used to check whether the problem occurred
    with the data source, the transformation or when loading the data.'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '**数据血缘**，另一方面，帮助我们了解数据从何而来，它是如何被处理的，以及最终是如何被使用的。例如，在BI工具中，一份包含错误数据的报告可以用来检查问题是否出在数据源、转换过程中，还是在加载数据时。'
- en: Why are the terms important?
  id: totrans-13
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 为什么这些术语很重要？
- en: 'XAI: The more AI models we use in everyday life and as decision-making aids,
    the more we need to know how these models have achieved their results. Especially
    in areas such as finance and healthcare, but also in processes such as HR and
    social services.'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: XAI：我们在日常生活中以及作为决策辅助工具使用的AI模型越多，我们就越需要了解这些模型是如何得出结果的。特别是在金融和医疗保健等领域，以及在HR和社会服务流程中。
- en: 'Data Lineage: In the EU there is GDPR, in California CCPA. These require companies
    to document the origin and use of data in a comprehensible manner. What does that
    mean in concrete terms? If companies have to comply with data protection laws,
    they must always know where the data comes from and how it was processed.'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 数据血缘：在欧盟有GDPR，在加利福尼亚有CCPA。这些要求公司以易于理解的方式记录数据的来源和使用情况。具体来说意味着什么？如果公司必须遵守数据保护法，他们必须始终知道数据来自哪里以及是如何被处理的。
- en: What are the challenges?
  id: totrans-16
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 挑战是什么？
- en: 'Complexity of the data landscape (data lineage): In distributed systems and
    multi-cloud environments, it is difficult to fully track the data flow.'
  id: totrans-17
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 数据景观的复杂性（数据血缘）：在分布式系统和多云环境中，完全跟踪数据流是困难的。
- en: 'Performance vs. transparency (XAI): Deep learning models often deliver more
    precise results, but their decision paths are difficult to trace. Simpler models,
    on the other hand, are usually easier to interpret but less accurate.'
  id: totrans-18
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 性能与透明度（XAI）：深度学习模型通常能提供更精确的结果，但它们的决策路径难以追踪。另一方面，简单的模型通常更容易解释，但准确性较低。
- en: 'Small project idea to better understand the terms:'
  id: totrans-19
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 小型项目想法以更好地理解这些术语：
- en: 'Use SHAP (SHapley Additive ExPlanations) to explain the decision logic of a
    machine learning model: Create a simple ML model with scikit-learn to predict
    house prices, for example. Then install the SHAP library in Python and visualize
    how the different features influence the price prediction.'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 使用SHAP（SHapley Additive ExPlanations）来解释机器学习模型的决策逻辑：例如，创建一个简单的ML模型使用scikit-learn来预测房价。然后，在Python中安装SHAP库，并可视化不同特征如何影响价格预测。
- en: 8 – Generative AI (Gen AI)
  id: totrans-21
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 8 – 生成式AI（Gen AI）
- en: Since Chat-GPT took off in January 2023, the term Gen AI has also been on everyone’s
    lips. Generative AI refers to AI models that can generate new content from an
    input. Outputs can be texts, images, music or videos. For example, there are now
    even fashion stores that have created their advertising images using generative
    AI (e.g. Calvin Klein, Zalando).
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 自Chat-GPT在2023年1月起飞以来，Gen AI这个术语也成了大家热议的话题。生成式AI指的是可以从输入生成新内容的AI模型。输出可以是文本、图像、音乐或视频。例如，现在甚至有时尚商店使用生成式AI创建他们的广告图像（例如Calvin
    Klein，Zalando）。
- en: '"We started OpenAI almost nine years ago because we believed that AGI was possible,
    and that it could be the most impactful technology in human history. We wanted
    to figure out how to build it and make it broadly beneficial; […]"'
  id: totrans-23
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '"我们几乎九年前开始OpenAI，因为我们相信AGI是可能的，并且它可能是人类历史上最具影响力的技术。我们想弄清楚如何构建它，并使其广泛受益；[...]"'
- en: '*[Reference: Sam Altman, CEO of OpenAI](https://blog.samaltman.com/reflections)*'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: '*[参考：OpenAI首席执行官山姆·奥特曼](https://blog.samaltman.com/reflections)*'
- en: Why is the term important?
  id: totrans-25
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 为什么这个术语很重要？
- en: Clearly, GenAI can greatly increase efficiency. The time required for tasks
    such as content creation, design or texts is reduced for companies. GenAI is also
    changing many areas of our working world. Tasks are being performed differently,
    jobs are changing and data is becoming even more important.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 显然，GenAI可以大大提高效率。对于公司来说，内容创作、设计或文本等任务所需的时间减少了。GenAI也在改变我们工作世界的许多领域。任务执行方式不同，工作也在变化，数据变得更加重要。
- en: In Salesforce’s latest marketing automation tool, for example, users can enter
    a prompt in natural language, which generates an email layout – even if this does
    not always work reliably in reality.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，在Salesforce最新的营销自动化工具中，用户可以用自然语言输入提示，这会生成一个电子邮件布局——即使这在现实中并不总是可靠。
- en: What are the challenges?
  id: totrans-28
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 面临哪些挑战？
- en: 'Copyrights and ethics: The models are trained with huge amounts of data that
    originate from us humans and try to generate the most realistic results possible
    based on this (e.g. also with texts by authors or images by well-known painters).
    One problem is that GenAI can imitate existing works. Who owns the result? A simple
    way to minimize this problem at least somewhat is to clearly label AI-generated
    content as such.'
  id: totrans-29
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 版权和伦理：这些模型是用大量源自我们人类的数据进行训练的，并试图基于这些数据生成尽可能真实的结果（例如，也包括作者的文字或著名画家的图像）。一个问题就是GenAI可以模仿现有作品。结果归谁所有？至少在一定程度上减少这种问题的简单方法是明确标注AI生成的内容。
- en: 'Costs and energy: Large models require a very large amount of computing resources.'
  id: totrans-30
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 成本和能源：大型模型需要大量的计算资源。
- en: 'Bias and misinformation: The models are trained with specific data. If the
    data already contains a bias (e.g. less data from one gender, less data from one
    country), these models can reproduce biases. For example, if an HR tool has been
    trained with more male than female data, it could favor male applicants in a job
    application. And of course, sometimes the models simply provide incorrect information.'
  id: totrans-31
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 偏见和错误信息：这些模型是用特定数据进行训练的。如果数据已经包含偏见（例如，某一性别或某一国家数据较少），这些模型可以再现偏见。例如，如果一个HR工具是用比女性数据更多的男性数据进行训练的，它可能会在求职申请中偏爱男性申请人。当然，有时模型只是提供错误信息。
- en: 'Small project idea to better understand the terms:'
  id: totrans-32
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 小型项目想法以更好地理解这些术语：
- en: Create a simple chatbot that accesses the GPT-4 API and can answer a question.
    I have attached a step-by-step guide at the bottom of the page.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个简单的聊天机器人，它可以访问GPT-4 API并回答问题。我在页面底部附上了逐步指南。
- en: 9 – Agentic AI / AI Agents
  id: totrans-34
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 9 – 代理AI / AI代理
- en: '**Agentic AI** is currently a hotly debated topic and is based on generative
    AI. AI agents describe intelligent systems that can think, plan and act "autonomously":'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: '**代理AI**目前是一个热门讨论的话题，它基于生成式AI。AI代理描述的是能够自主思考、计划和行动的智能系统：'
- en: '"This is what AI was meant to be. […] And I am really excited about this. I
    think this is going to change companies forever. I think it’s going to change
    software forever. And I think it’ll change Salesforce forever."'
  id: totrans-36
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '"这就是AI应该做的事情。[...] 我对此非常兴奋。我认为这将永远改变公司。我认为这将永远改变软件。我认为它将永远改变Salesforce。"'
- en: '_[Reference: Marc Benioff, Salesforce CEO about Agents & Agentforce](https://www.fastcompany.com/91208578/why-marc-benioff-is-all-in-on-ai-agentforce?utm_source=chatgpt.com)_'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: _[参考：Salesforce首席执行官马克·贝尼奥夫关于代理和代理力量](https://www.fastcompany.com/91208578/why-marc-benioff-is-all-in-on-ai-agentforce?utm_source=chatgpt.com)_
- en: AI Agents are, so to speak, a continuation of traditional chatbots and bots.
    These systems promise to solve complex problems by creating multi-level plans,
    learning from data and making decisions based on this and executing them autonomously.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: AI代理，可以说是传统聊天机器人和机器人的延续。这些系统承诺通过创建多级计划、从数据中学习并基于此做出决策来执行它们，从而解决复杂问题。
- en: Multi-step plans mean that the AI thinks several steps ahead to achieve a goal.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 多步骤计划意味着AI需要提前几步思考以达到目标。
- en: 'Let’s imagine a quick example: An AI agent has the task of delivering a parcel.
    Instead of simply following the sequence of orders, the AI could first analyze
    the traffic situation, calculate the fastest route and then deliver the various
    parcels in this calculated sequence.'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们想象一个简单的例子：一个AI代理的任务是递送包裹。AI不是简单地遵循订单的顺序，而是首先分析交通状况，计算最快的路线，然后按照这个计算出的顺序递送各种包裹。
- en: Why is the term important?
  id: totrans-41
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 为什么这个术语很重要？
- en: The ability to execute multi-step plans sets AI Agents apart from previous bots
    and chatbots and brings a new era of autonomous systems.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 执行多步骤计划的能力使AI代理与之前的机器人和聊天机器人区分开来，并带来了自主系统的新时代。
- en: If AI Agents can actually be used in businesses, companies can automate repetitive
    tasks through agents, reducing costs and increasing efficiency. The economic benefits
    and competitive advantage would be there. As the Salesforce CEO says in the interview,
    it can change our corporate world tremendously.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 如果AI代理实际上可以在商业中应用，公司可以通过代理自动化重复性任务，降低成本并提高效率。这将带来经济效益和竞争优势。正如Salesforce首席执行官在采访中所说，它可以极大地改变我们的企业世界。
- en: What are the challenges?
  id: totrans-44
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 挑战是什么？
- en: 'Logical consistency and (current) technological limitations: Current models
    struggle with consistent logical thinking – especially when it comes to handling
    complex scenarios with multiple variables. And that’s exactly what they’re there
    for – or that’s how they’re advertised. This means that in 2025 there will definitely
    be an increased need for better models.'
  id: totrans-45
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 逻辑一致性和（当前）技术限制：当前模型在处理涉及多个变量的复杂场景时，难以进行一致的逻辑思考。这正是它们存在的目的——或者这就是它们被宣传的方式。这意味着到2025年，对更好模型的需求数量肯定会增加。
- en: 'Ethics and acceptance: Autonomous systems can make decisions and solve their
    own tasks independently. How can we ensure that autonomous systems do not make
    decisions that violate ethical standards? As a society, we also need to define
    how quickly we want to integrate such changes into our everyday (working) lives
    without taking employees by surprise. Not everyone has the same technical know-how.'
  id: totrans-46
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 道德和接受度：自主系统可以独立做出决策和解决问题。我们如何确保自主系统不会做出违反道德标准的决策？作为一个社会，我们还需要定义我们希望多快地将此类变化整合到我们的日常（工作）生活中，而不会让员工感到意外。并不是每个人都有相同的技术知识。
- en: 'Small project idea to better understand the term:'
  id: totrans-47
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 一个小项目想法，以更好地理解这个术语：
- en: 'Create a simple AI agent with Python: define the agent first. For example,
    the agent should retrieve data from an API. Use Python to coordinate the API query,
    filtering of results and automatic emailing to the user. Implement then a simple
    decision logic: For example, if no result matches the filter criteria, the search
    radius is extended.'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Python创建一个简单的AI代理：首先定义代理。例如，代理应从API中检索数据。使用Python协调API查询、结果过滤和自动向用户发送电子邮件。然后实现简单的决策逻辑：例如，如果没有结果符合过滤标准，则搜索范围会扩大。
- en: 10 – Inference Time Compute
  id: totrans-49
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 10 - 推理时间计算
- en: 'Next, we focus on the efficiency and performance of using AI models: An AI
    model receives input data, makes a prediction or decision based on it and gives
    an output. This process requires computing time, which is referred to as **inference
    time compute**. Modern models such as AI agents go one step further by flexibly
    adapting their computing time to the complexity of the task.'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们关注使用AI模型的效率和性能：AI模型接收输入数据，根据它做出预测或决策，并给出输出。这个过程需要计算时间，这被称为**推理时间计算**。现代模型，如AI代理，通过灵活调整它们的计算时间以适应任务的复杂性而更进一步。
- en: 'Basically, it’s the same as with us humans: When we have to solve more complex
    problems, we invest more time. AI models use dynamic reasoning (adapting computing
    time according to task requirements) and chain reasoning (using multiple decision
    steps to solve complex problems).'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 基本上，这与我们人类是一样的：当我们需要解决更复杂的问题时，我们会投入更多的时间。AI模型使用动态推理（根据任务需求调整计算时间）和链式推理（使用多个决策步骤来解决复杂问题）。
- en: Why is the term important?
  id: totrans-52
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 为什么这个术语很重要？
- en: AI and models are becoming increasingly important in our everyday lives. The
    demand for dynamic AI systems (AI that adapts flexibly to requests and understands
    our requests) will increase. Inference time affects the performance of systems
    such as chatbots, autonomous vehicles and real-time translators. AI models that
    adapt their inference time to the complexity of the task and therefore "think"
    for different lengths of time will improve efficiency and accuracy.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能和模型在我们的日常生活中变得越来越重要。对动态人工智能系统（能够灵活适应请求并理解我们请求的人工智能）的需求将会增加。推理时间会影响聊天机器人、自动驾驶汽车和实时翻译等系统的性能。能够根据任务复杂性调整推理时间并因此“思考”不同长度时间的人工智能模型将提高效率和准确性。
- en: What are the challenges?
  id: totrans-54
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 挑战是什么？
- en: 'Performance vs. quality: Do you want a fast but less accurate or a slow but
    very accurate solution? Shorter inference times improve efficiency, but can compromise
    accuracy for complex tasks.'
  id: totrans-55
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 性能与质量：你想要一个快速但不太准确还是慢但非常准确的解决方案？较短的推理时间可以提高效率，但可能会牺牲复杂任务中的准确性。
- en: 'Energy consumption: The longer the inference time, the more computing power
    is required. This in turn increases energy consumption.'
  id: totrans-56
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 能耗：推理时间越长，所需的计算能力就越多。这反过来又增加了能耗。
- en: 11 – Near Infinite Memory
  id: totrans-57
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 11 – 近无限内存
- en: '**Near Infinite Memory** is a concept that describes how technologies can store
    and process enormous amounts of data almost indefinitely.'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: '**近无限内存**是一个概念，描述了技术如何几乎无限期地存储和处理大量数据。'
- en: For us users, it seems like infinite storage – but it is actually more of a
    combination of scalable cloud services, data-optimized storage solutions and intelligent
    data management systems.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我们用户来说，它似乎是一个无限的存储空间——但实际上它更多的是可扩展的云服务、数据优化的存储解决方案和智能数据管理系统的一种组合。
- en: Why is this term important?
  id: totrans-60
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 为什么这个术语很重要？
- en: The data we generate is growing exponentially due to the increasing use of IoT,
    AI and big data. As already described in terms 1–3, this creates ever greater
    demands on data architectures such as data lakehouses. AI models also require
    enormous amounts of data for training and validation. It is therefore important
    that storage solutions become more efficient.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 由于物联网、人工智能和大数据的日益普及，我们生成数据呈指数级增长。正如在术语1-3中所述，这为数据湖屋等数据架构创造了越来越大的需求。人工智能模型也需要大量的数据进行训练和验证。因此，存储解决方案变得更加高效是很重要的。
- en: What are the challenges?
  id: totrans-62
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 挑战是什么？
- en: 'Energy consumption: Large storage solutions in cloud data centers consume immense
    amounts of energy.'
  id: totrans-63
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 能耗：云数据中心的大容量存储解决方案消耗了大量的能源。
- en: 'Security concerns and dependence on centralized services: Many near-infinite
    memory solutions are provided by cloud providers. This can create a dependency
    that brings financial and data protection risks.'
  id: totrans-64
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 安全担忧和对集中式服务的依赖：许多近无限内存解决方案由云服务提供商提供。这可能会产生一种依赖，带来财务和数据处理风险。
- en: 'Small project idea to better understand the terms:'
  id: totrans-65
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 为了更好地理解这些术语，有一个小项目想法：
- en: Develop a practical understanding of how different data types affect storage
    requirements and learn how to use storage space efficiently. Take a look at the
    project under the term "Optimizing Data Storage".
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 发展对不同数据类型如何影响存储需求的理解，并学习如何高效地使用存储空间。请查看“优化数据存储”这一术语下的项目。
- en: 12 – Human-In-The-Loop Augmentation
  id: totrans-67
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 12 – 人机交互增强
- en: AI is becoming increasingly important, as the previous terms have shown. However,
    with the increasing importance of AI, we should ensure that the human part is
    not lost in the process.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，随着人工智能重要性的增加，我们应该确保在这个过程中人类的部分不会丢失。
- en: '"We need to let people who are harmed by technology imagine the future that
    they want."'
  id: totrans-69
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '"我们需要让那些受到技术伤害的人想象他们想要的未来。"'
- en: '_[Reference: Timnit Gebru, former Head of Department of Ethics in AI at Google](https://time.com/6132399/timnit-gebru-ai-google/?utm_source=chatgpt.com)_'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: _[参考：谷歌人工智能伦理部门前负责人Timnit Gebru](https://time.com/6132399/timnit-gebru-ai-google/?utm_source=chatgpt.com)_
- en: '**Human-in-the-loop augmentation** is the interface between computer science
    and psychology, so to speak. It describes the collaboration between us humans
    and artificial intelligence. The aim is to combine the strengths of both sides:'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: '**人机交互增强**可以说是计算机科学与心理学的接口。它描述了我们人类与人工智能之间的协作。目标是结合双方的优点：'
- en: A great strength of AI is that such models can efficiently process data in large
    quantities and discover patterns in it that are difficult for us to recognize.
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人工智能的一个巨大优势是，这样的模型可以有效地处理大量数据，并从中发现我们难以识别的模式。
- en: We humans, on the other hand, bring judgment, ethics, creativity and contextual
    understanding to the table without being pre-trained and have the ability to cope
    with unforeseen situations.
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 相反，我们人类带来了判断力、伦理、创造力和情境理解，而不需要预先训练，并且能够应对不可预见的情况。
- en: The goal must be for AI to serve us humans – and not the other way around.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 目标必须是人工智能为我们人类服务——而不是相反。
- en: Why is the term important?
  id: totrans-75
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 这个术语为什么重要？
- en: AI can improve decision-making processes and minimize errors. In particular,
    AI can recognize patterns in data that are not visible to us, for example in the
    field of medicine or biology.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能可以提高决策过程并最小化错误。特别是，人工智能可以识别我们无法看到的数据中的模式，例如在医学或生物学领域。
- en: 'The MIT Center for Collective Intelligence published a study in Nature Human
    Behavior in which they analyzed how well human-AI combinations perform compared
    to purely human or purely AI-controlled systems:'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 麻省理工学院集体智能中心在《自然人类行为》杂志上发表了一项研究，分析了人机组合与纯粹的人类或纯粹的人工智能控制系统的表现相比如何：
- en: In decision-making tasks, human-AI combinations often performed worse than AI
    systems alone (e.g. medical diagnoses / classification of deepfakes).
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在决策任务中，人机组合通常比单独的人工智能系统表现更差（例如，医学诊断/深度伪造的分类）。
- en: In creative tasks, the interaction already works better. Here, human-AI teams
    outperformed both humans and AI alone.
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在创造性任务中，人机交互已经表现得更好。在这里，人机团队的表现优于单独的人类和人工智能。
- en: However, the study shows that human-in-the-loop augmentation does not yet work
    perfectly.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，研究表明，闭环中的人类增强功能尚未完美工作。
- en: '*[Reference: Humans and AI: Do they work better together or alone?](https://mitsloan.mit.edu/press/humans-and-ai-do-they-work-better-together-or-alone)*'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: '*[参考：人类与人工智能：他们一起工作更好还是单独工作？](https://mitsloan.mit.edu/press/humans-and-ai-do-they-work-better-together-or-alone)*'
- en: What are the challenges?
  id: totrans-82
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 挑战是什么？
- en: 'Lack of synergy and mistrust: It seems that there is a lack of intuitive interfaces
    that make it easier for us humans to interact effectively enough with AI tools.
    Another challenge is that AI systems are sometimes viewed critically or even rejected.'
  id: totrans-83
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 缺乏协同作用和不信任：似乎缺乏直观的界面，这使得我们人类更有效地与人工智能工具互动变得更容易。另一个挑战是，人工智能系统有时会受到批评，甚至被拒绝。
- en: '(Current) technological limitations of AI: Current AI systems struggle to understand
    logical consistency and context. This can lead to erroneous or inaccurate results.
    For example, an AI diagnostic system could misjudge a rare case because it does
    not have enough data for such cases.'
  id: totrans-84
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: (当前)人工智能的技术局限性：当前的人工智能系统在理解逻辑一致性和上下文方面存在困难。这可能导致错误或不准确的结果。例如，一个AI诊断系统可能会错误地判断一个罕见病例，因为它没有足够的数据来处理这类情况。
- en: Final Thoughts
  id: totrans-85
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最后的想法
- en: 'The terms in this article only show a selection of the innovations that we
    are currently seeing – the list could definitely be extended. For example, in
    the area of AI models, the size of the models will also play an important role:
    In addition to very large models (with up to 50 trillion parameters), individual
    very small models will probably also be developed that will only contain a few
    billion parameters. The advantage of these small models will be that they do not
    require huge data centers and GPUs, but can run on our laptops or even on our
    smartphones and perform very specific tasks.'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 文章中的术语仅展示了我们目前看到的一些创新——这个列表肯定可以扩展。例如，在人工智能模型领域，模型的大小也将发挥重要作用：除了非常大的模型（参数量高达50万亿）之外，可能还会开发出单个非常小的模型，这些模型可能只包含几十亿个参数。这些小型模型的优势在于它们不需要巨大的数据中心和GPU，可以在我们的笔记本电脑上甚至在我们的智能手机上运行，并执行非常具体的工作。
- en: Which terms do you think are super important? Let us know in the comments.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 你认为哪些术语非常重要？请在评论中告诉我们。
- en: Where can you continue learning?
  id: totrans-88
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 你在哪里可以继续学习？
