- en: 'Roadmap to Becoming a Data Scientist, Part 4: Advanced Machine Learning'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 数据科学家职业路线图，第四部分：高级机器学习
- en: 原文：[https://towardsdatascience.com/roadmap-to-becoming-a-data-scientist-part-4-advanced-machine-learning/](https://towardsdatascience.com/roadmap-to-becoming-a-data-scientist-part-4-advanced-machine-learning/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/roadmap-to-becoming-a-data-scientist-part-4-advanced-machine-learning/](https://towardsdatascience.com/roadmap-to-becoming-a-data-scientist-part-4-advanced-machine-learning/)
- en: Introduction
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 引言
- en: Data science is undoubtedly one of the most fascinating fields today. Following
    significant breakthroughs in machine learning about a decade ago, data science
    has surged in popularity within the tech community. Each year, we witness increasingly
    powerful tools that once seemed unimaginable. Innovations such as the *Transformer
    architecture*, *ChatGPT*, the *Retrieval-Augmented Generation (RAG*) framework,
    and state-of-the-art *computer vision models* — including *GANs* — have had a
    profound impact on our world.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 数据科学无疑是当今最迷人的领域之一。在大约十年前机器学习取得重大突破之后，数据科学在技术社区中的受欢迎程度急剧上升。每年，我们都见证了曾经看似不可思议的强大工具。诸如*Transformer架构*、*ChatGPT*、*检索增强生成（RAG*）框架以及最先进的*计算机视觉模型*——包括*GANs*——等创新对我们世界产生了深远的影响。
- en: However, with the abundance of tools and the ongoing hype surrounding AI, it
    can be overwhelming — especially for beginners — to determine which skills to
    prioritize when aiming for a career in data science. Moreover, this field is highly
    demanding, requiring substantial dedication and perseverance.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，随着工具的丰富和围绕人工智能的持续炒作，确定在追求数据科学职业时应该优先考虑哪些技能可能会让人感到不知所措——尤其是对于初学者来说。此外，这个领域要求极高，需要大量的投入和毅力。
- en: 'The first three parts of this series outlined the necessary skills to become
    a data scientist in three key areas: [math](https://towardsdatascience.com/roadmap-to-becoming-a-data-scientist-part-1-maths-2dc9beb69b27/),
    [software engineering](https://towardsdatascience.com/roadmap-to-becoming-a-data-scientist-part-2-software-engineering-e2fee3fe4d71/),
    and [machine learning](https://towardsdatascience.com/roadmap-to-becoming-a-data-scientist-part-3-machine-learning-628248c96cb5/). While
    knowledge of classical machine learning and neural network algorithms is an excellent
    starting point for aspiring data specialists, there are still many important topics
    in machine learning that must be mastered to work on more advanced projects.'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 本系列的最初三部分概述了成为数据科学家所需的三项关键技能领域：[数学](https://towardsdatascience.com/roadmap-to-becoming-a-data-scientist-part-1-maths-2dc9beb69b27/)、[软件工程](https://towardsdatascience.com/roadmap-to-becoming-a-data-scientist-part-2-software-engineering-e2fee3fe4d71/)和[机器学习](https://towardsdatascience.com/roadmap-to-becoming-a-data-scientist-part-3-machine-learning-628248c96cb5/)。虽然对经典机器学习和神经网络算法的了解是数据专业人员的良好起点，但为了在更高级的项目中工作，仍有许多重要的机器学习主题必须掌握。
- en: '*This article will focus solely on the math skills necessary to start a career
    in Data Science. Whether pursuing this path is a worthwhile choice based on your
    background and other factors will be discussed in a separate article.*'
  id: totrans-6
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*本文将专注于开始数据科学职业生涯所需的数学技能。是否根据你的背景和其他因素选择这条道路是值得的，将在另一篇文章中讨论。*'
- en: The importance of learning evolution of methods in machine learning
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 学习机器学习方法演变的重要性
- en: '*The section below provides information about the evolution of methods in natural
    language processing (NLP).*'
  id: totrans-8
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*以下部分提供了关于自然语言处理（NLP）方法演变的信息。*'
- en: In contrast to previous articles in this series, I have decided to change the
    format in which I present the necessary skills for aspiring data scientists. Instead
    of directly listing specific competencies to develop and the motivation behind
    mastering them, I will briefly outline the most important approaches, presenting
    them in chronological order as they have been developed and used over the past
    decades in machine learning.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 与本系列之前的文章相比，我决定改变呈现数据科学家所需技能的格式。不是直接列出具体需要发展的能力及其掌握背后的动机，而是简要概述最重要的方法，按它们在过去几十年中在机器学习中发展和应用的时间顺序进行介绍。
- en: The reason is that I believe it is crucial to study these algorithms from the
    very beginning. In machine learning, many new methods are built upon older approaches,
    which is especially true for NLP and computer vision.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 原因在于我认为从一开始学习这些算法至关重要。在机器学习中，许多新方法都是建立在旧方法之上的，这在自然语言处理（NLP）和计算机视觉中尤其如此。
- en: For example, jumping directly into the implementation details of modern large
    language models (LLMs) without any preliminary knowledge may make it very difficult
    for beginners to grasp the motivation and underlying ideas of specific mechanisms.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，在没有任何初步知识的情况下直接跳入现代大型语言模型（LLMs）的实现细节，可能会使初学者很难理解特定机制的动力和基本思想。
- en: '*Given this, in the next two sections, I will highlight in ****bold**** the
    key concepts that should be studied.*'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '*鉴于这一点，在接下来的两个部分中，我将用**粗体**突出显示应该研究的关键概念。*'
- en: 04\. NLP
  id: totrans-13
  prefs:
  - PREF_H2
  - PREF_H1
  type: TYPE_NORMAL
  zh: 04\. NLP
- en: '**Natural language processing (NLP)** is a broad field that focuses on processing
    textual information. Machine learning algorithms cannot work directly with raw
    text, which is why text is usually preprocessed and converted into numerical vectors
    that are then fed into neural networks.'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: '**自然语言处理（NLP）**是一个广泛的领域，专注于处理文本信息。机器学习算法不能直接处理原始文本，这就是为什么文本通常需要预处理并转换为数值向量，然后输入到神经网络中。'
- en: Before being converted into vectors, words undergo **preprocessing**, which
    includes simple techniques such as **parsing**, **stemming, lemmatization, normalization**,
    or removing **stop words**. After preprocessing, the resulting text is encoded
    into **tokens**. Tokens represent the smallest textual elements in a collection
    of documents. Generally, a token can be a part of a word, a sequence of symbols,
    or an individual symbol. Ultimately, tokens are converted into numerical vectors.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 在转换为向量之前，词语会经历**预处理**，这包括诸如**解析**、**词干提取**、**词形还原**、**规范化**或移除**停用词**等简单技术。预处理后，生成的文本被编码成**标记**。标记代表文档集合中最小的文本元素。通常，一个标记可以是单词的一部分、符号序列或单个符号。最终，标记被转换为数值向量。
- en: '![](../Images/e9d0a65f36e164519f79907cd8563890.png)'
  id: totrans-16
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e9d0a65f36e164519f79907cd8563890.png)'
- en: NLP roadmap
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: NLP路线图
- en: The **bag of words** method is the most basic way to encode tokens, focusing
    on counting the frequency of tokens in each document. However, in practice, this
    is usually not sufficient, as it is also necessary to account for token importance
    — a concept introduced in the **TF-IDF** and **BM25** methods. While TF-IDF improves
    upon the naive counting approach of bag of words, researchers have developed a
    completely new approach called embeddings.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: '**词袋模型**是编码标记的最基本方式，它关注于统计每个文档中标记的频率。然而，在实践中，这通常是不够的，因为还需要考虑标记的重要性——这是在**TF-IDF**和**BM25**方法中引入的概念。虽然TF-IDF在词袋模型的简单计数方法上进行了改进，但研究人员已经开发了一种全新的方法，称为嵌入。'
- en: '**Embeddings** are numerical vectors whose components preserve the semantic
    meanings of words. Because of this, embeddings play a crucial role in NLP, enabling
    input data to be trained or used for model inference. Additionally, embeddings
    can be used to compare text similarity, allowing for the retrieval of the most
    relevant documents from a collection.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '**嵌入**是保留词语语义意义的数值向量。正因为如此，嵌入在NLP中起着至关重要的作用，使得输入数据可以被训练或用于模型推理。此外，嵌入可以用来比较文本相似度，从而从集合中检索最相关的文档。'
- en: '*Embeddings can also be used to encode other unstructured data, including images,
    audio, and videos.*'
  id: totrans-20
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*嵌入也可以用来编码其他非结构化数据，包括图像、音频和视频。*'
- en: As a field, NLP has been evolving rapidly over the last 10–20 years to efficiently
    solve various text-related problems. Complex tasks like text translation and text
    generation were initially addressed using **recurrent neural networks (RNNs)**,
    which introduced the concept of memory, allowing neural networks to capture and
    retain key contextual information in long documents.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一门学科，自然语言处理（NLP）在过去10-20年中迅速发展，以有效地解决各种与文本相关的问题。最初，像文本翻译和文本生成这样的复杂任务是通过使用**循环神经网络（RNNs）**来解决的，这引入了记忆的概念，使得神经网络能够捕捉和保留长文档中的关键上下文信息。
- en: Although RNN performance gradually improved, it remained suboptimal for certain
    tasks. Moreover, RNNs are relatively slow, and their sequential prediction process
    does not allow for parallelization during training and inference, making them
    less efficient.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然RNN的性能逐渐提高，但对于某些任务来说仍然不够理想。此外，RNN相对较慢，它们的顺序预测过程在训练和推理过程中不允许并行化，这使得它们效率较低。
- en: Additionally, the original Transformer architecture can be decomposed into two
    separate modules: **BERT** and **GPT**. Both of these form the foundation of the
    most state-of-the-art models used today to solve various NLP problems. Understanding
    their principles is valuable knowledge that will help learners advance further
    when studying or working with other **large language models (LLMs)**.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，原始的Transformer架构可以分解为两个独立的模块：**BERT**和**GPT**。这两个都是今天用于解决各种NLP问题的最先进模型的基础。理解它们的原则是宝贵的知识，有助于学习者在研究或使用其他**大型语言模型（LLMs）**时进一步进步。
- en: '![](../Images/2ad7eaf7e36d51d31452acc3ab9692d6.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/2ad7eaf7e36d51d31452acc3ab9692d6.png)'
- en: Transformer architecture
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: Transformer架构
- en: When it comes to LLMs, I strongly recommend studying the evolution of at least
    the first three GPT models, as they have had a significant impact on the AI world
    we know today. In particular, I would like to highlight the concepts of **few-shot** and **zero-shot
    learning**, introduced in GPT-2, which enable LLMs to solve text generation tasks
    without explicitly receiving any training examples for them.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 当谈到大型语言模型（LLMs）时，我强烈建议研究至少前三个GPT模型的发展历程，因为它们对我们今天所知的AI世界产生了重大影响。特别是，我想强调GPT-2中引入的**少样本**和**零样本学习**的概念，这些概念使LLMs能够在没有明确接收任何针对它们的训练示例的情况下解决文本生成任务。
- en: Another important technique developed in recent years is **retrieval-augmented
    generation (RAG)**. *The main limitation of LLMs is that they are only aware of
    the context used during their training.* As a result, they lack knowledge of any
    information beyond their training data.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 近年来开发的重要技术之一是**检索增强生成（RAG）**。*LLMs的主要局限性是它们只知道在训练期间使用的上下文。*因此，它们缺乏对其训练数据之外任何信息的了解。
- en: '![](../Images/7ebae56cc5fd69fe84c00a81876c0242.png)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7ebae56cc5fd69fe84c00a81876c0242.png)'
- en: Example of a RAG pipeline
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: RAG管道的示例
- en: The retriever converts the input prompt into an embedding, which is then used
    to query a vector database. The database returns the most relevant context based
    on the similarity to the embedding. This retrieved context is then combined with
    the original prompt and passed to a generative model. The model processes both
    the initial prompt and the additional context to generate a more informed and
    contextually accurate response.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 检索器将输入提示转换为嵌入，然后用于查询向量数据库。数据库根据与嵌入的相似度返回最相关的上下文。然后，检索到的上下文与原始提示结合，并传递给生成模型。该模型处理初始提示和附加上下文，以生成更全面且上下文准确的响应。
- en: '*A good example of this limitation is the first version of the ChatGPT model,
    which was trained on data up to the year 2022 and had no knowledge of events that
    occurred from 2023 onward.*'
  id: totrans-31
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*这一局限性的一个好例子是ChatGPT的第一个版本，它在2022年的数据上进行了训练，并且对2023年及以后发生的事件一无所知。*'
- en: To address this limitation, OpenAI researchers developed a RAG pipeline, which
    includes a constantly updated database containing new information from external
    sources. When ChatGPT is given a task that requires external knowledge, it queries
    the database to retrieve the most relevant context and integrates it into the
    final prompt sent to the machine learning model.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 为了解决这一限制，OpenAI的研究人员开发了一个RAG管道，该管道包括一个包含来自外部来源新信息的不断更新的数据库。当ChatGPT被分配一个需要外部知识的任务时，它会查询数据库以检索最相关的上下文，并将其整合到发送给机器学习模型的最终提示中。
- en: '![](../Images/9f6c69e44a3af744966da7aca3c30a63.png)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/9f6c69e44a3af744966da7aca3c30a63.png)'
- en: The goal of distillation is to create a smaller model that can imitate a larger
    one. In practice, this means that if a large model makes a prediction, the smaller
    model is expected to produce a similar result.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 精馏的目标是创建一个更小的模型，可以模仿一个更大的模型。在实践中，这意味着如果一个大型模型做出预测，较小的模型预期会产生类似的结果。
- en: In the modern era, LLM development has led to models with millions or even billions
    of parameters. As a consequence, the overall size of these models may exceed the
    hardware limitations of standard computers or small portable devices, which come
    with many constraints.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 在现代时代，LLM的发展导致了具有数百万甚至数十亿参数的模型。因此，这些模型的总体大小可能超过标准计算机或小型便携式设备的硬件限制，这些设备带有许多约束。
- en: '![](../Images/23c443cc36284034f96fb65cf6bbf1b2.png)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/23c443cc36284034f96fb65cf6bbf1b2.png)'
- en: Quantization is the process of reducing the memory required to store numerical
    values representing a model’s weights.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 量化是减少存储表示模型权重的数值所需内存的过程。
- en: This is where optimization techniques become particularly useful, allowing LLMs
    to be compressed without significantly compromising their performance. The most
    commonly used techniques today include **distillation**,** quantization**, and **pruning**.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是优化技术变得特别有用的地方，它允许LLMs在显著降低性能的情况下进行压缩。今天最常用的技术包括**蒸馏**、**量化**和**修剪**。
- en: '![](../Images/cbd12d4e2451082e63235dba43e686cb.png)'
  id: totrans-39
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/cbd12d4e2451082e63235dba43e686cb.png)'
- en: Pruning refers to discarding the least important weights of a model.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 修剪指的是丢弃模型中最不重要的权重。
- en: Fine-tuning
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 微调
- en: Regardless of the area in which you wish to specialize, knowledge of **fine-tuning** is
    a must-have skill! Fine-tuning is a powerful concept that allows you to efficiently
    adapt a pre-trained model to a new task.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你希望在哪个领域专长，了解**微调**都是一项必备技能！微调是一个强大的概念，它允许你有效地将预训练模型适应新任务。
- en: Fine-tuning is especially useful when working with very large models. For example,
    imagine you want to use BERT to perform semantic analysis on a specific dataset.
    While BERT is trained on general data, it might not fully understand the context
    of your dataset. At the same time, training BERT from scratch for your specific
    task would require a massive amount of resources.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 当与非常大的模型一起工作时，微调特别有用。例如，想象你想使用BERT对特定数据集进行语义分析。虽然BERT是在通用数据上训练的，但它可能不完全理解你的数据集的上下文。同时，从头开始训练BERT以完成你的特定任务将需要大量的资源。
- en: 'Here is where fine-tuning comes in: it involves taking a pre-trained BERT (or
    another model) and freezing some of its layers (usually those at the beginning).
    As a result, BERT is retrained, but this time only on the new dataset provided.
    Since BERT updates only a subset of its weights and the new dataset is likely
    much smaller than the original one BERT was trained on, fine-tuning becomes a
    very efficient technique for adapting BERT’s rich knowledge to a specific domain.'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是微调发挥作用的地方：它涉及使用预训练的BERT（或另一个模型）并冻结其一些层（通常是开始的部分）。结果，BERT被重新训练，但这次只在新提供的数据集上。由于BERT只更新其权重的一部分，而新的数据集可能远小于BERT训练时的原始数据集，因此微调成为将BERT的丰富知识适应特定领域的一种非常有效的技术。
- en: '*Fine-tuning is widely used not only in NLP but also across many other domains.*'
  id: totrans-45
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*微调不仅在自然语言处理（NLP）中广泛使用，而且在许多其他领域也得到应用。*'
- en: 05\. Computer vision
  id: totrans-46
  prefs:
  - PREF_H2
  - PREF_H1
  type: TYPE_NORMAL
  zh: 05. 计算机视觉
- en: As the name suggests, **computer vision (CV)** involves analyzing images and
    videos using machine learning. The most common tasks include image classification,
    object detection, image segmentation, and generation.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 如其名所示，**计算机视觉（CV）**涉及使用机器学习分析图像和视频。最常见的任务包括图像分类、目标检测、图像分割和生成。
- en: Most CV algorithms are based on neural networks, so it is essential to understand
    how they work in detail. In particular, CV uses a special type of network called **convolutional
    neural networks (CNNs)**. These are similar to fully connected networks, except
    that they typically begin with a set of specialized mathematical operations called **convolutions**.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数简历算法都是基于神经网络的，因此详细了解它们的工作原理至关重要。特别是，计算机视觉使用一种称为**卷积神经网络（CNNs）**的特殊网络。这些网络与全连接网络类似，但它们通常从一组称为**卷积**的专用数学运算开始。
- en: '![](../Images/7512fc87e0e1b5749a1f55eeaf40166a.png)'
  id: totrans-49
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7512fc87e0e1b5749a1f55eeaf40166a.png)'
- en: Computer vision roadmap
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 计算机视觉路线图
- en: '*In simple terms, convolutions act as filters, enabling the model to extract
    the most important features from an image, which are then passed to fully connected
    layers for further analysis.*'
  id: totrans-51
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*简单来说，卷积充当过滤器，使模型能够从图像中提取最重要的特征，然后将其传递到全连接层进行进一步分析。*'
- en: The next step is to study the most popular CNN architectures for classification
    tasks, such as **AlexNet, VGG, Inception, ImageNet**, and **ResNet**.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 下一步是研究用于分类任务的最流行的CNN架构，例如**AlexNet、VGG、Inception、ImageNet**和**ResNet**。
- en: Speaking of the object detection task, the **YOLO** algorithm is a clear winner.
    It is not necessary to study all of the dozens of versions of YOLO. In reality,
    going through the original paper of the first YOLO should be sufficient to understand
    how a relatively difficult problem like object detection is elegantly transformed
    into both classification and regression problems. This approach in YOLO also provides
    a nice intuition on how more complex CV tasks can be reformulated in simpler terms.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 谈到目标检测任务，**YOLO**算法是一个明显的赢家。实际上，没有必要研究YOLO的所有几十个版本。实际上，阅读第一版YOLO的原始论文就足以理解如何将相对困难的目标检测问题优雅地转化为分类和回归问题。YOLO中的这种方法也提供了一个很好的直觉，说明如何将更复杂的计算机视觉任务以更简单的术语重新表述。
- en: While there are many architectures for performing image segmentation, I would
    strongly recommend learning about **UNet**, which introduces an encoder-decoder
    architecture.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然有许多用于执行图像分割的架构，但我强烈建议学习**UNet**，它引入了编码器-解码器架构。
- en: Finally, image generation is probably one of the most challenging tasks in CV.
    Personally, I consider it an optional topic for learners, as it involves many
    advanced concepts. Nevertheless, gaining a high-level intuition of how **generative
    adversial networks (GAN)** function to generate images is a good way to broaden
    one’s horizons.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，图像生成可能是计算机视觉（CV）中最具挑战性的任务之一。我个人认为，它对于学习者来说是一个可选的话题，因为它涉及许多高级概念。尽管如此，了解**生成对抗网络（GAN）**如何生成图像的高级直觉是一个拓宽视野的好方法。
- en: '*In some problems, the training data might not be enough to build a performant
    model. In such cases, the data augmentation technique is commonly used. It involves
    the artificial generation of training data from already existing data (images).
    By feeding the model more diverse data, it becomes capable of learning and recognizing
    more patterns.*'
  id: totrans-56
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*在某些问题中，训练数据可能不足以构建一个性能良好的模型。在这种情况下，数据增强技术通常被使用。这涉及到从已存在的数据（图像）中人工生成训练数据。通过向模型提供更多样化的数据，它能够学习并识别更多模式。*'
- en: 06\. Other areas
  id: totrans-57
  prefs:
  - PREF_H2
  - PREF_H1
  type: TYPE_NORMAL
  zh: 06. 其他领域
- en: It would be very hard to present in detail the roadmaps for all existing machine
    learning domains in a single article. That is why, in this section, I would like
    to briefly list and explain some of the other most popular areas in data science
    worth exploring.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 在一篇文章中详细呈现所有现有机器学习领域的路线图将会非常困难。这就是为什么在本节中，我想简要列举并解释一些其他值得探索的数据科学中最受欢迎的领域。
- en: First of all, **recommender systems (RecSys)** have gained a lot of popularity
    in recent years. They are increasingly implemented in online shops, social networks,
    and streaming services. The key idea of most algorithms is to take a large initial
    matrix of all users and items and decompose it into a product of several matrices
    in a way that associates every user and every item with a high-dimensional embedding.
    This approach is very flexible, as it then allows different types of comparison
    operations on embeddings to find the most relevant items for a given user. Moreover,
    it is much more rapid to perform analysis on small matrices rather than the original,
    which usually tends to have huge dimensions.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，**推荐系统（RecSys）**在近年来获得了很大的流行度。它们越来越多地应用于在线商店、社交网络和流媒体服务。大多数算法的关键思想是将所有用户和项目的初始大矩阵分解为几个矩阵的乘积，以便将每个用户和每个项目与一个高维嵌入关联起来。这种方法非常灵活，因为它允许对嵌入进行不同类型的比较操作，以找到给定用户最相关的项目。此外，对小型矩阵进行分析比分析原始矩阵（通常具有巨大维度）要快得多。
- en: '![](../Images/7a1d95828af8b5e7bc2f656e2f425f3a.png)'
  id: totrans-60
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7a1d95828af8b5e7bc2f656e2f425f3a.png)'
- en: Matrix decomposition in recommender systems is one of the most commonly used
    methods
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 在推荐系统中，矩阵分解是最常用的方法之一。
- en: '**Ranking** often goes hand in hand with RecSys. When a RecSys has identified
    a set of the most relevant items for the user, ranking algorithms are used to
    sort them to determine the order in which they will be shown or proposed to the
    user. A good example of their usage is search engines, which filter query results
    from top to bottom on a web page.'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: '**排名**通常与推荐系统（RecSys）紧密相关。当推荐系统识别出一组对用户最相关的项目时，排名算法被用来对它们进行排序，以确定它们将被展示或推荐给用户的顺序。一个很好的例子是搜索引擎，它们在网页上从上到下过滤查询结果。'
- en: Closely related to ranking, there is also a **matching** problem that aims to
    optimally map objects from two sets, A and B, in a way that, on average, every
    object pair* (a, b)* is mapped “well” according to a matching criterion. A use
    case example might include distributing a group of students to different university
    disciplines, where the number of spots in each class is limited.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 与排序密切相关的是，还有一个**匹配**问题，其目标是将来自两个集合A和B的对象以最优方式映射，使得平均而言，每个对象对*（a，b）*根据匹配标准映射“良好”。一个用例示例可能包括将一群学生分配到不同的大学学科，其中每个班级的座位数有限。
- en: '**Clustering** is an unsupervised machine learning task whose objective is
    to split a dataset into several regions (clusters), with each dataset object belonging
    to one of these clusters. The splitting criteria can vary depending on the task.
    Clustering is useful because it allows for grouping similar objects together.
    Moreover, further analysis can be applied to treat objects in each cluster separately.'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: '**聚类**是一个无监督的机器学习任务，其目标是把数据集分割成几个区域（簇），每个数据集对象属于这些簇中的一个。分割标准可能因任务而异。聚类是有用的，因为它允许将相似的对象分组在一起。此外，还可以对每个簇中的对象进行进一步的分析，以分别处理这些对象。'
- en: '![](../Images/e05ba74d768a5393766303111583b53d.png)'
  id: totrans-65
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e05ba74d768a5393766303111583b53d.png)'
- en: The goal of clustering is to group dataset objects (on the left) into several
    categories (on the right) based on their similarity.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 聚类的目标是根据数据集对象（在左侧）的相似性，将它们分组到几个类别（在右侧）中。
- en: '**Dimensionality reduction** is another unsupervised problem, where the goal
    is to compress an input dataset. When the dimensionality of the dataset is large,
    it takes more time and resources for machine learning algorithms to analyze it.
    By identifying and removing noisy dataset features or those that do not provide
    much valuable information, the data analysis process becomes considerably easier.'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: '**降维**是另一个无监督问题，其目标是压缩输入数据集。当数据集的维度很大时，机器学习算法分析它需要更多的时间和资源。通过识别和删除噪声数据集特征或那些不提供太多有价值信息的特征，数据分析过程变得相当容易。'
- en: '**Similarity search** is an area that focuses on designing algorithms and data
    structures (indexes) to optimize searches in a large database of embeddings (vector
    database). More precisely, given an input embedding and a vector database, the
    goal is to *approximately* find the most similar embedding in the database relative
    to the input embedding.'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: '**相似性搜索**是一个专注于设计算法和数据结构（索引）以优化在大型嵌入（向量数据库）数据库中搜索的领域。更精确地说，给定一个输入嵌入和一个向量数据库，目标是**近似**找到数据库中相对于输入嵌入最相似的嵌入。'
- en: '![](../Images/ce8cbed0b58d2b7fd4e8ab21580b005a.png)'
  id: totrans-69
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ce8cbed0b58d2b7fd4e8ab21580b005a.png)'
- en: The goal of similarity search is to approximately find the most similar embedding
    in a vector database relative to a query embedding.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 相似性搜索的目标是在向量数据库中相对于查询嵌入，近似找到最相似的嵌入。
- en: The word “approximately” means that the search is not guaranteed to be 100%
    precise. Nevertheless, this is the main idea behind similarity search algorithms
    — sacrificing a bit of accuracy in exchange for significant gains in prediction
    speed or data compression.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: “近似”一词意味着搜索不保证100%精确。尽管如此，这仍然是相似性搜索算法背后的主要思想——牺牲一点准确性以换取预测速度或数据压缩的显著提升。
- en: '**Time series analysis** involves studying the behavior of a target variable
    over time. This problem can be solved using classical tabular algorithms. However,
    the presence of time introduces new factors that cannot be captured by standard
    algorithms. For instance:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: '**时间序列分析**涉及研究目标变量随时间的变化行为。这个问题可以使用经典表格算法来解决。然而，时间的存在引入了新因素，这些因素无法被标准算法捕捉。例如：'
- en: the target variable can have an overall **trend**, where in the long term its
    values increase or decrease *(e.g., the average yearly temperature rising due
    to global warming)*.
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 目标变量可以有一个整体的**趋势**，在长期内其值会增加或减少（例如，由于全球变暖，平均年气温上升）。
- en: the target variable can have a **seasonality** which makes its values change
    based on the currently given period *(e.g. temperature is lower in winter and
    higher in summer)*.
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 目标变量可以有一个**季节性**，这使得其值根据当前给定的周期变化（例如，冬季温度较低，夏季温度较高）。
- en: Most of the time series models take both of these factors into account. In general,
    time series models are mainly used a lot in financial, stock or demographic analysis.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数时间序列模型都会考虑这两个因素。一般来说，时间序列模型在金融、股票或人口统计分析中应用得非常广泛。
- en: '![](../Images/a91ab365807fd7618cb88e0b886ec901.png)'
  id: totrans-76
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a91ab365807fd7618cb88e0b886ec901.png)'
- en: Time series data if often decomposed in several components which include trend
    and seasonality.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 时间序列数据通常分解为几个组成部分，包括趋势和季节性。
- en: Another advanced area I would recommend exploring is **reinforcement learning**,
    which fundamentally changes the algorithm design compared to classical machine
    learning. In simple terms, its goal is to train an agent in an environment to
    make optimal decisions based on a reward system (also known as the *“trial and
    error approach”*). By taking an action, the agent receives a reward, which helps
    it understand whether the chosen action had a positive or negative effect. After
    that, the agent slightly adjusts its strategy, and the entire cycle repeats.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 我还推荐探索的另一个高级领域是**强化学习**，与经典机器学习相比，它从根本上改变了算法设计。简单来说，其目标是训练一个智能体在环境中根据奖励系统（也称为“试错法”）做出最佳决策。通过采取行动，智能体获得奖励，这有助于它理解所采取的行动是否有积极或消极的影响。之后，智能体稍微调整其策略，整个循环重复。
- en: '![](../Images/84b58af947a876dfb76d02e115a3b2b1.png)'
  id: totrans-79
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/84b58af947a876dfb76d02e115a3b2b1.png)'
- en: Reinforcement learning framework. Image adopted by the author. Source: [Reinforcement
    Learning. An Introduction. Second Edition | Richard S. Sutton and Andrew G. Barto](https://web.stanford.edu/class/psych209/Readings/SuttonBartoIPRLBook2ndEd.pdf)
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 强化学习框架。图片由作者采用。来源：[《强化学习：导论 第二版》 | 理查德·S·萨顿和安德鲁·G·巴托](https://web.stanford.edu/class/psych209/Readings/SuttonBartoIPRLBook2ndEd.pdf)
- en: Reinforcement learning is particularly popular in complex environments where
    classical algorithms are not capable of solving a problem. Given the complexity
    of reinforcement learning algorithms and the computational resources they require,
    this area is not yet fully mature, but it has high potential to gain even more
    popularity in the future.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 强化学习在经典算法无法解决问题的复杂环境中特别受欢迎。鉴于强化学习算法的复杂性和所需的计算资源，这个领域尚未完全成熟，但它有很高的潜力在未来获得更多的普及。
- en: '![](../Images/d2a53a8c50b4d07a21e643ebc0d88f32.png)'
  id: totrans-82
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d2a53a8c50b4d07a21e643ebc0d88f32.png)'
- en: Main applications of reinforcement learning
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 强化学习的主要应用
- en: 'Currently the most popular applications are:'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 目前最流行的应用包括：
- en: '**Games**. Existing approaches can design optimal game strategies and outperform
    humans. The most well-known examples are chess and Go.'
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**游戏**。现有方法可以设计出优于人类的最佳游戏策略。最著名的例子是国际象棋和围棋。'
- en: '**Robotics**. Advanced algorithms can be incorporated into robots to help them
    move, carry objects or complete routine tasks at home.'
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**机器人技术**。高级算法可以集成到机器人中，帮助它们移动、携带物体或在家庭中完成常规任务。'
- en: '**Autopilot**. Reinforcement learning methods can be developed to automatically
    drive cars, control helicopters or drones.'
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自动驾驶**。可以开发强化学习方法来自动驾驶汽车、控制直升机或无人机。'
- en: Conclusion
  id: totrans-88
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: This article was a logical continuation of the previous part and expanded the
    skill set needed to become a data scientist. While most of the mentioned topics
    require time to master, they can add significant value to your portfolio. This
    is especially true for the NLP and CV domains, which are in high demand today.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 这篇文章是前一部分的合理延续，并扩展了成为数据科学家所需技能集。虽然大多数提到的主题需要时间来掌握，但它们可以为您的简历增添显著价值。这对于目前需求量大的NLP和CV领域尤其如此。
- en: After reaching a high level of expertise in data science, it is still crucial
    to stay motivated and consistently push yourself to learn new topics and explore
    emerging algorithms.
  id: totrans-90
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在达到数据科学的高水平专业知识后，保持动力并持续推动自己学习新主题和探索新兴算法仍然至关重要。
- en: Data science is a constantly evolving field, and in the coming years, we might
    witness the development of new state-of-the-art approaches that we could not have
    imagined in the past.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 数据科学是一个不断发展的领域，在未来几年，我们可能会见证新的一流方法的发展，这些方法是我们过去无法想象的。
- en: Resources
  id: totrans-92
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 资源
- en: '[Reinforcement Learning. An Introduction. Second Edition | Richard S. Sutton
    and Andrew G. Barto](https://web.stanford.edu/class/psych209/Readings/SuttonBartoIPRLBook2ndEd.pdf)'
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[《强化学习：导论 第二版》 | 理查德·S·萨顿和安德鲁·G·巴托](https://web.stanford.edu/class/psych209/Readings/SuttonBartoIPRLBook2ndEd.pdf)'
- en: '*All images are by the author unless noted otherwise.*'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: '*所有图片除非另有说明，均为作者提供。*'
