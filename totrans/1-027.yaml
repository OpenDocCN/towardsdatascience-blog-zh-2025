- en: 'The Machine Learning “Advent Calendar” Day 3: GNB, LDA and QDA in Excel'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 机器学习“圣诞日历”第三天：Excel中的GNB、LDA和QDA
- en: 原文：[https://towardsdatascience.com/the-machine-learning-advent-calendar-day-3-gnb-lda-and-qda-in-excel/](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-3-gnb-lda-and-qda-in-excel/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/the-machine-learning-advent-calendar-day-3-gnb-lda-and-qda-in-excel/](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-3-gnb-lda-and-qda-in-excel/)
- en: <mdspan datatext="el1764737416433" class="mdspan-comment">After two days</mdspan>
    working with k-NN ([k-NN regressor](https://towardsdatascience.com/day-1-k-nn-regressor-in-excel-how-distance-drives-prediction/)
    and [k-NN classifier](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-2-k-nn-classifier-in-excel/)),
    we know that the k-NN approach is very naive. It keeps the entire training dataset
    in memory, relies on raw distances, and does not learn any structure from the
    data.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1764737416433" class="mdspan-comment">在两天与k-NN（[k-NN回归器](https://towardsdatascience.com/day-1-k-nn-regressor-in-excel-how-distance-drives-prediction/)和[k-NN分类器](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-2-k-nn-classifier-in-excel/))）工作之后，我们知道k-NN方法非常简单。它保留整个训练数据集在内存中，依赖于原始距离，并且没有从数据中学习任何结构。
- en: 'We already began to improve the k-NN classifier, and in today’s article, we
    will implement these different models:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经开始改进k-NN分类器，在今天的文章中，我们将实现这些不同的模型：
- en: 'GNB: Gaussian Naive Bayes'
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: GNB：高斯朴素贝叶斯
- en: 'LDA: Linear Discriminant Analysis'
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: LDA：线性判别分析
- en: 'QDA: Quadratic Discriminant Analysis'
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: QDA：二次判别分析
- en: For all these models, the distribution is considered as Gaussian. So at the
    end, we will also see an approach to get a more customized distribution.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 对于所有这些模型，分布都被认为是高斯分布。所以最后，我们也会看到一个获取更定制化分布的方法。
- en: 'If you read my previous article, here are some questions for you:'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你阅读了我的上一篇文章，这里有一些问题给你：
- en: What is the relationship between LDA and QDA?
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: LDA和QDA之间的关系是什么？
- en: What is the relation between GBN and QDA?
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: GBN和QDA之间的关系是什么？
- en: What happens if the data is not Gaussian at all?
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果数据根本不是高斯分布怎么办？
- en: What is the method to get a customized distribution?
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 获取定制化分布的方法是什么？
- en: What is linear in LDA? What is quadratic in QDA?
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: LDA中的线性是什么？QDA中的二次是什么？
- en: '![](../Images/3d61c7a3dea5df4a828aaad073aa3734.png)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/3d61c7a3dea5df4a828aaad073aa3734.png)'
- en: GNB, LDA and QDA in Excel – image by author
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: Excel中的GNB、LDA和QDA – 图像由作者提供
- en: 'Nearest Centroids: What This Model Really Is'
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最近质心：这个模型真正是什么
- en: Let’s do a quick recap about what we [already started yesterday](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-2-k-nn-classifier-in-excel/).
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们快速回顾一下昨天[已经开始的内容](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-2-k-nn-classifier-in-excel/)。
- en: 'We introduced a simple idea: when we calculate the average of each continuous
    feature inside a class, that class collapses into one single representative point.'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 我们介绍了一个简单的想法：当我们计算一个类中每个连续特征的均值时，这个类就塌缩成一个单一的代表性点。
- en: This gives us the Nearest Centroids model.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 这就给出了最近质心模型。
- en: Each class is summarized by its centroid, the average of all its feature values.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 每个类都由其质心，即所有特征值的平均值来概括。
- en: Now, let us think about this from a Machine Learning point of view.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们从机器学习的角度来思考这个问题。
- en: 'We usually separate the process into two parts: the *training* step and the
    *hyperparameter tuning* step.'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 我们通常将这个过程分为两个部分：*训练*步骤和*超参数调整*步骤。
- en: 'For Nearest Centroids, we can draw a small “model card” to understand what
    this model really is:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 对于最近质心，我们可以画一个小“模型卡片”来理解这个模型真正是什么：
- en: '*How is the model trained?* By computing one average vector per class. Nothing
    more.'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*模型是如何训练的？* 通过为每个类别计算一个平均向量。仅此而已。'
- en: '*Does it handle missing values?* Yes. A centroid can be computed using all
    available (non-empty) values.'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*它处理缺失值吗？* 是的。可以使用所有可用的（非空）值来计算质心。'
- en: '*Does scale matter?* Yes, absolutely, because distance to a centroid depends
    on the units of each feature.'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*尺度重要吗？* 当然，因为质心到距离取决于每个特征的单位。'
- en: What are the hyperparameters? None.
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 超参数是什么？没有。
- en: We said that the k-NN classifier may not be a real machine learning model because
    it is not an actual model.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 我们说k-NN分类器可能不是一个真正的机器学习模型，因为它不是一个实际模型。
- en: For Nearest Centroids, we can say that it is not really a machine learning model
    because it cannot be tuned. So what about overfitting and underfitting?
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 对于最近质心，我们可以说它实际上不是一个机器学习模型，因为它不能被调整。那么过拟合和欠拟合怎么办？
- en: Well, the model is so simple that it cannot memorize noise in the same way k-NN
    does.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧，这个模型非常简单，它不能像k-NN那样记住噪声。
- en: So, Nearest Centroids will only tend to **underfit** when classes are complex
    or not well separated, because one single centroid cannot capture their full structure.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，最近邻质心只有在类别复杂或没有很好地分离时才会**欠拟合**，因为单个质心无法捕捉它们的完整结构。
- en: 'Understanding Class Shape with One Feature: Adding Variance'
  id: totrans-32
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用一个特征理解类形状：添加方差
- en: Now, in this section, we will use only one continuous feature, and 2 classes.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，在本节中，我们将只使用一个连续特征，并且有两个类别。
- en: 'Up to now, we used only one statistic per class: the average value.'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们每个类别只使用了一个统计量：平均值。
- en: 'Let us now add a second piece of information: the **variance** (or equivalently,
    the standard deviation).'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们添加第二块信息：**方差**（或等价地，标准差）。
- en: This tells us how “spread out” each class is around its average.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 这告诉我们每个类别围绕其平均值“分布”有多广。
- en: 'A natural question appears immediately: Which variance should we use?'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 一个自然的问题立即出现：我们应该使用哪个方差？
- en: The most intuitive answer is to compute **one variance per class**, because
    each class might have a different spread.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 最直观的答案是计算**每个类别的方差**，因为每个类别的分布可能不同。
- en: 'But there is another possibility: we could compute **one common variance for
    both classes**, usually as a weighted average of the class variances.'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 但还有一种可能性：我们可以计算**两个类别的共同方差**，通常作为类别方差的加权平均值。
- en: This feels a bit unnatural at first, but we will see later that this idea leads
    directly to LDA.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 起初这感觉有点不自然，但稍后我们将看到这个想法直接导致了 LDA。
- en: So the table below gives us everything we need for this model, in fact, for
    both versions (LDA and QDA) of the model.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，下表为我们提供了构建此模型所需的一切，实际上，对于模型的两个版本（LDA 和 QDA）都是如此。
- en: the number of observations in each class (to weight the classes)
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每个类别的观测数（用于加权类别）
- en: the mean of each class
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每个类别的均值
- en: the standard deviation of each class
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每个类别的标准差
- en: and the common standard deviation across both classes
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 以及两个类别之间的共同标准差
- en: With these values, the entire model is completely defined.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 使用这些值，整个模型就完全定义了。
- en: '![](../Images/1d473cf81c1193d78a13e50d307b20b4.png)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/1d473cf81c1193d78a13e50d307b20b4.png)'
- en: GNB, LDA and QDA in Excel – image by author
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: Excel 中的 GNB、LDA 和 QDA – 图像由作者提供
- en: 'Now, once we have a standard deviation, we can build a more refined distance:
    the distance to the centroid **divided by the standard deviation**.'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们有了标准差，我们可以构建一个更精细的距离：质心到距离除以标准差。
- en: Why do we do this?
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 我们为什么要这样做？
- en: Because this gives a distance that is *scaled* by how variable the class is.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 因为这给出了一个距离，它是根据类别的可变性进行**缩放**的。
- en: If a class has a large standard deviation, being far from its centroid is not
    surprising.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 如果一个类别的标准差很大，那么它离其质心很远并不令人惊讶。
- en: If a class has a very small standard deviation, even a small deviation becomes
    significant.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 如果一个类别的标准差非常小，即使是微小的偏差也会变得显著。
- en: This simple normalization turns our Euclidean distance into something a little
    bit more meaningful, that represents the shape of each class.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 这种简单的归一化将我们的欧几里得距离转换成更有意义的东西，它代表了每个类别的形状。
- en: This distance was introduced by Mahalanobis, so we call it the Mahalanobis distance.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 这个距离是由马氏提出的，所以我们称之为马氏距离。
- en: Now we can do all these calculations directly in the Excel file.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们可以在 Excel 文件中直接进行所有这些计算。
- en: '![](../Images/59666513fba67189620058f11a457869.png)'
  id: totrans-57
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/59666513fba67189620058f11a457869.png)'
- en: GNB, LDA and QDA in Excel – image by author
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: Excel 中的 GNB、LDA 和 QDA – 图像由作者提供
- en: The formulas are straightforward, and with conditional formatting, we can clearly
    see how the distance to each center changes and how the scaling affects the results.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 公式很简单，并且通过条件格式化，我们可以清楚地看到每个中心到距离的变化以及缩放如何影响结果。
- en: '![](../Images/12c056d08fbc403abd478a1b7c90bb97.png)'
  id: totrans-60
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/12c056d08fbc403abd478a1b7c90bb97.png)'
- en: GNB, LDA and QDA in Excel – image by author
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: Excel 中的 GNB、LDA 和 QDA – 图像由作者提供
- en: Now, let’s do some plots, always in Excel.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们做一些图表，始终在 Excel 中进行。
- en: 'This diagram below shows the full progression: how we start from the Mahalanobis
    distance, move to the likelihood under each class distribution, and finally obtain
    the probability prediction.'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的图表显示了完整的进展：我们从马氏距离开始，移动到每个类别分布下的似然，最后获得概率预测。
- en: '![](../Images/18926635b3b5d57a1045b3b0821880fa.png)'
  id: totrans-64
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/18926635b3b5d57a1045b3b0821880fa.png)'
- en: GNB, LDA and QDA in Excel – image by author
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: Excel 中的 GNB、LDA 和 QDA – 图像由作者提供
- en: LDA vs. QDA, what do we see?
  id: totrans-66
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: LDA 与 QDA，我们看到了什么？
- en: With just one feature, the difference becomes very easy to visualize.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 只有一个特征时，差异变得非常容易可视化。
- en: For **LDA**, the separation on the x-axis is always cut into two parts. This
    is why the method is called *Linear* Discriminant Analysis.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 对于 **LDA**，x 轴上的分离总是被切成两部分。这就是为什么这个方法被称为 *线性* 判别分析。
- en: For **QDA**, even with only one feature, the model produces **two** cut points
    on the x-axis. In higher dimensions, this becomes a curved boundary, described
    by a **quadratic function**. Hence, the name *Quadratic* Discriminant Analysis.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 对于 **QDA**，即使只有一个特征，模型也会在 x 轴上产生 **两个** 切点。在更高维的情况下，这变成了一条曲线边界，由一个 **二次函数**
    描述。因此，这个名字叫 *二次* 判别分析。
- en: '![](../Images/f847e0dbd20f426d00bd2294d78c05cc.png)'
  id: totrans-70
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/f847e0dbd20f426d00bd2294d78c05cc.png)'
- en: GNB, LDA and QDA in Excel – image by author
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: GNB, LDA 和 QDA 在 Excel 中的图像 - 作者提供
- en: And you can directly modify the parameters to see how they impact the decision
    boundary.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以直接修改参数，看看它们如何影响决策边界。
- en: The changes in the means or variances will change the frontier, and Excel makes
    these effects very easy to visualize.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 均值或方差的改变将改变前沿，Excel 使得这些效果非常容易可视化。
- en: By the way, does the shape of the LDA probability curve remind you of a model
    that you surely know? Yes, it looks exactly the same.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 顺便问一下，LDA 概率曲线的形状让你想起了你肯定知道的某个模型吗？是的，它看起来完全一样。
- en: You can already guess which one, right?
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 你已经能猜到是哪一个，对吧？
- en: 'But now the real question is: are they *really* the same model? And if not,
    how do they differ?'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 但现在真正的问题是：它们 *真的* 是同一个模型吗？如果不是，它们有什么不同？
- en: '![](../Images/dcf928e33952794f2571feffb316991e.png)'
  id: totrans-77
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/dcf928e33952794f2571feffb316991e.png)'
- en: GNB, LDA and QDA in Excel – image by author
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: GNB, LDA 和 QDA 在 Excel 中的图像 - 作者提供
- en: We can also study the case with three classes. You can try this yourself as
    an exercise in Excel.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 我们也可以研究三个类别的案例。你可以自己尝试在 Excel 中作为练习。
- en: Here are the results. For each class, we repeat exactly the same procedure.
    And for the final probability prediction, we simply sum all the likelihoods and
    take the proportion of each one.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是结果。对于每个类别，我们重复完全相同的程序。而对于最终的概率预测，我们简单地求和所有似然值，并取每个似然值的比例。
- en: '![](../Images/7e3a1f37511ef3c8a067ac72c6f1b69d.png)'
  id: totrans-81
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/7e3a1f37511ef3c8a067ac72c6f1b69d.png)'
- en: GNB, LDA and QDA in Excel – image by author
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: GNB, LDA 和 QDA 在 Excel 中的图像 - 作者提供
- en: Again, this approach is also used in another well-known model.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 再次，这种方法也被用于另一个著名的模型。
- en: Do you know which one? It is much more familiar to most people, and this shows
    how closely connected these models really are.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 你知道哪一个吗？这对大多数人来说更加熟悉，这也显示了这些模型之间实际上是如何紧密相连的。
- en: When you understand one of them, you automatically understand the others much
    better.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 当你理解其中一个时，你自然会更好地理解其他几个。
- en: 'Class Shape in 2D: Variance Only or Covariance as Well?'
  id: totrans-86
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2D 中的类别形状：只有方差还是协方差？
- en: With one feature, we do not talk about dependency, as there is none. So in this
    case, QDA behaves exactly like Gaussian Naive Bayes. Because we usually allow
    each class to have its own variance, which is perfectly natural.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 对于一个特征，我们不说依赖性，因为没有。所以在这种情况下，QDA 的行为与高斯朴素贝叶斯完全一样。因为我们通常允许每个类别有自己的方差，这是完全自然的。
- en: The difference will appear when we move to two or more features. At that point,
    we will distinguish cases of how the model treats the **covariance** between the
    features.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们转向两个或更多特征时，差异就会出现。那时，我们将区分模型如何处理特征之间的 **协方差** 的情况。
- en: 'Gaussian Naive Bayes makes one very strong simplifying assumption:'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 高斯朴素贝叶斯做出一个非常强的简化假设：
- en: the features are independent. This is the reason for the word *Naive* in its
    name.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 特征是独立的。这就是其名字中 *朴素* 一词的原因。
- en: LDA and QDA, however, do not make this assumption. They allow interactions between
    features, and this is what generates linear or quadratic boundaries in higher
    dimensions.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，LDA 和 QDA 并不做出这个假设。它们允许特征之间的交互，这就是在更高维中产生线性或二次边界的原因。
- en: Let’s do the exercice in Excel!
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们在 Excel 中做这个练习！
- en: 'Gaussian Naive Bayes: no covariance'
  id: totrans-93
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 高斯朴素贝叶斯：没有协方差
- en: 'Let us begin with the simplest case: Gaussian Naive Bayes.'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从最简单的情况开始：高斯朴素贝叶斯。
- en: So, we do not need to compute any covariance at all, because the model assumes
    that the features are independent.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们根本不需要计算任何协方差，因为模型假设特征是独立的。
- en: To illustrate this, we can look at a small example with three classes.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 为了说明这一点，我们可以看看一个有三个类别的简单例子。
- en: '![](../Images/0d50d51a4610af0a01141d908ed25cdb.png)'
  id: totrans-97
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/0d50d51a4610af0a01141d908ed25cdb.png)'
- en: GNB, LDA and QDA in Excel – image by author
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: GNB, LDA 和 QDA 在 Excel 中的图像 - 作者提供
- en: '**QDA: each class has its own covariance**'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: '**QDA：每个类别都有自己的协方差**'
- en: For QDA, we now have to calculate the covariance matrix for each class.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 对于 QDA，我们现在必须为每个类别计算协方差矩阵。
- en: And once we have it, we also need to compute its inverse, because it is used
    directly in the formula for the distance and the likelihood.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦我们有了它，我们还需要计算其逆，因为它直接用于距离和似然率的公式中。
- en: So there are a few more parameters to compute compared to Gaussian Naive Bayes.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，与高斯朴素贝叶斯相比，需要计算更多的参数。
- en: '![](../Images/134bc6ee7f91f82a7c6dc6246719f699.png)'
  id: totrans-103
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/134bc6ee7f91f82a7c6dc6246719f699.png)'
- en: GNB, LDA and QDA in Excel – image by author
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: Excel中的GNB、LDA和QDA - 作者图片
- en: 'LDA: all classes share the same covariance'
  id: totrans-105
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: LDA：所有类共享相同的协方差
- en: For LDA, all classes share the same covariance matrix, which reduces the number
    of parameters and forces the decision boundary to be linear.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 对于LDA，所有类共享相同的协方差矩阵，这减少了参数的数量并迫使决策边界是线性的。
- en: Even though the model is simpler, it remains very effective in many situations,
    especially when the amount of data is limited.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 即使模型更简单，它在许多情况下仍然非常有效，尤其是在数据量有限的情况下。
- en: '![](../Images/6e9cfbe4ccd364165ddc3eb8c09004d0.png)'
  id: totrans-108
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6e9cfbe4ccd364165ddc3eb8c09004d0.png)'
- en: GNB, LDA and QDA in Excel – image by author
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: Excel中的GNB、LDA和QDA - 作者图片
- en: 'Customized Class Distributions: Beyond the Gaussian Assumption'
  id: totrans-110
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 定制类分布：超越高斯假设
- en: Up to now, we only talked about Gaussian distributions. And it is for its simplificity.
    And we also can use other distributions. So even in Excel, it is very easy to
    change.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们只讨论了高斯分布。这是因为它简单。我们也可以使用其他分布。所以即使在Excel中，也很容易更改。
- en: In reality, data usually do not follow a perfect Gaussian curve.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 在现实中，数据通常不会遵循完美的高斯曲线。
- en: For exploring a dataset, we use the empiric density plots almost every time.
    They give an immediate visual feeling of how the data is distributed.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 在探索数据集时，我们几乎每次都使用经验密度图。它们立即给出了数据的分布的直观感觉。
- en: And the **kernel density estimator (KDE)** as a non-parametric method, is often
    used.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 并且作为非参数方法的**核密度估计器（KDE**）经常被使用。
- en: BUT, in practice, KDE is rarely used as a full classification model. It is not
    very convenient, and its predictions are often sensitive to the choice of bandwidth.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，在实践中，KDE很少被用作完整的分类模型。它不太方便，并且其预测通常对带宽的选择很敏感。
- en: And what is interesting is that this idea of kernels will come back again when
    we discuss other models.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 而有趣的是，当我们讨论其他模型时，这种核的概念将会再次出现。
- en: So even though we show it here mainly for exploration, it is an essential building
    block in machine learning.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，尽管我们在这里主要展示它是为了探索，但它仍然是机器学习中的一个基本构建块。
- en: '![](../Images/b751e5b1e12065d2278fb5f7323152b2.png)'
  id: totrans-118
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b751e5b1e12065d2278fb5f7323152b2.png)'
- en: KDE (Kernel Density Estimator) in Excel – image by author
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: Excel中的KDE（核密度估计器）- 作者图片
- en: Conclusion
  id: totrans-120
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: Today, we followed a natural path that begins with simple averages and gradually
    leads to full probabilistic models.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 今天，我们遵循了一条自然的路径，从简单的平均值开始，逐渐过渡到完整的概率模型。
- en: Nearest Centroids compresses each class into one point.
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 最近邻质心将每个类压缩成一个点。
- en: Gaussian Naive Bayes adds the notion of variance, and assumes the independance
    of the features.
  id: totrans-123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 高斯朴素贝叶斯引入了方差的观念，并假设特征是独立的。
- en: QDA gives each class its own variance or covariance
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: QDA为每个类赋予其自身的方差或协方差
- en: LDA simplifies the shape by sharing the covariance.
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: LDA通过共享协方差来简化形状。
- en: We even saw that we can step outside the Gaussian world and explore customized
    distributions.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 我们甚至看到我们可以走出高斯世界并探索定制分布。
- en: 'All these models are connected by the same idea: **a new observation belongs
    to the class it most resembles.**'
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些模型都通过同一个想法相连：**一个新观察属于最相似的类别。**
- en: The difference is how we define resemblance, by distance, by variance, by covariance,
    or by a full probability distribution.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 差别在于我们如何定义相似性，通过距离、方差、协方差，或者通过完整的概率分布。
- en: 'For all these models, we can do the two steps easily in Excel:'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 对于所有这些模型，我们都可以在Excel中轻松完成两个步骤：
- en: the first step is to estimate the paramters, which can be considered as the
    model training
  id: totrans-130
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第一步是估计参数，这可以被认为是模型训练
- en: the inference step that is to calculate the distance and the probability for
    each class
  id: totrans-131
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 计算每个类别的距离和概率的推理步骤
- en: '![](../Images/93fb942dfee734bf3c6dc839810295e6.png)'
  id: totrans-132
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/93fb942dfee734bf3c6dc839810295e6.png)'
- en: GNB, LDA and QDA – image by author
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: GNB、LDA和QDA - 作者图片
- en: One more thing
  id: totrans-134
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 一件额外的事情
- en: Before closing this article, let us draw a small cartography of distance-based
    supervised models.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 在结束这篇文章之前，让我们绘制一个基于距离的监督模型的简单地图。
- en: 'We have two main families:'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 我们有两个主要家族：
- en: '**local distance models**'
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**局部距离模型**'
- en: '**global distance models**'
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**全局距离模型**'
- en: 'For **local distance**, we already know the two classical ones:'
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 对于**局部距离**，我们已经知道两种经典的方法：
- en: k-NN regressor
  id: totrans-140
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: k-NN 回归器
- en: k-NN classifier
  id: totrans-141
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: k-NN 分类器
- en: Both predict by looking at neighbors and using the local geometry of the data.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 两者都通过观察邻居并使用数据的局部几何形状进行预测。
- en: For **global distance**, all the models we studied today belong to the classification
    world.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 对于**全局距离**，我们今天所研究的所有模型都属于分类领域。
- en: Why?
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么？
- en: Because global distance requires **centers defined by classes**.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 因为全局距离需要**由类定义的中心**。
- en: We measure how close a new observation is to each class prototype?
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 我们是如何衡量一个新观测值与每个类原型之间的接近程度？
- en: But what about **regression**?
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 但关于**回归**呢？
- en: It seems that this notion of global distance does not exist for regression,
    or does it really?
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 看起来，这种全局距离的概念对于回归来说并不存在，或者它真的不存在吗？
- en: The answer is yes, it does exist…
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 答案是肯定的，它确实存在……
- en: '![](../Images/0549cd03ae3475d2e7edf3df7acb00ad.png)'
  id: totrans-150
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/0549cd03ae3475d2e7edf3df7acb00ad.png)'
- en: Mindmap – Distance-based machine learning supervised models – image by author
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 思维导图 – 基于距离的机器学习监督模型 – 图片由作者提供
