- en: Scaling Recommender Transformers to a Billion Parameters
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 将推荐器Transformer扩展到十亿参数
- en: 原文：[https://towardsdatascience.com/scaling-recommender-transformers-to-a-billion-parameters/](https://towardsdatascience.com/scaling-recommender-transformers-to-a-billion-parameters/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/scaling-recommender-transformers-to-a-billion-parameters/](https://towardsdatascience.com/scaling-recommender-transformers-to-a-billion-parameters/)
- en: <mdspan datatext="el1761073953789" class="mdspan-comment">Hi TDS</mdspan>! My
    name is Kirill Khrylchenko, and I lead the RecSys R&D team at Yandex. One of our
    goals is to develop transformer technologies within the context of recommender
    systems, an objective we’ve been pursuing for five years now. Not too long ago,
    we reached a new milestone in the development of recommendation technologies,
    which I would like to share with you in this article.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1761073953789" class="mdspan-comment">Hi TDS</mdspan>！我的名字是Kirill
    Khrylchenko，我是Yandex的RecSys研发团队的负责人。我们的一个目标是在推荐系统的背景下开发transformer技术，这是我们过去五年一直在追求的目标。不久前，我们在推荐技术发展上取得了新的里程碑，我想在本文中与您分享。
- en: 'The relevance of recommender systems in the world is easy to justify: the amount
    of content is growing incredibly fast, making it impossible to view in its entirety,
    and we need recommender systems to address the information overload. Music, movies,
    books, products, videos, posts, friends, but it’s important to remember that these
    services benefit not only users but also content creators who need to find their
    target audience.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 推荐系统在世界的相关性很容易证明：内容量增长得非常快，无法全部查看，我们需要推荐系统来解决信息过载。音乐、电影、书籍、产品、视频、帖子、朋友，但重要的是要记住，这些服务不仅对用户有益，也对需要找到目标受众的内容创作者有益。
- en: We’ve deployed a new generation of transformer recommenders in several services
    and are actively integrating them with other services. We’ve significantly improved
    the quality of the recommendations across the board.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经在几个服务中部署了新一代的transformer推荐器，并正在积极地将它们与其他服务集成。我们已经显著提高了所有推荐的质量。
- en: If you’re an ML engineer working with recommendations, this article will provide
    you with some ideas on how to implement a similar approach for your recommender
    system. And if you are a user, you have an opportunity to learn more about how
    that very recommender system works.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你是一名与推荐系统合作的机器学习工程师，这篇文章将为你提供一些关于如何实现类似方法的思路。如果你是用户，你有机会了解更多关于该推荐系统是如何工作的。
- en: How Recommender Systems Work
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 推荐系统是如何工作的
- en: 'The recommendation problem itself has a simple mathematical definition: for
    each user![u∈U](../Images/40314512d08173b32632fc9cf8047540.png)'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 推荐问题本身有一个简单的数学定义：对于每个用户![u∈U](../Images/40314512d08173b32632fc9cf8047540.png)
- en: we want to select items, objects, documents, or products ![](../Images/c33171b9a56cc3c322dd6c4be3ff0970.png)
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 我们希望选择物品、对象、文档或产品![u∈U](../Images/c33171b9a56cc3c322dd6c4be3ff0970.png)
- en: that they are likely to like.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 他们可能喜欢的。
- en: '![](../Images/bc1525640fb5fa85fce1e3fd2df6838d.png)'
  id: totrans-10
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/bc1525640fb5fa85fce1e3fd2df6838d.png)'
- en: 'But there’s a catch:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 但有一个问题：
- en: Item catalogs are vast (up to billions of items).
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 物品目录非常庞大（多达数十亿个物品）。
- en: There is a significant number of users, and their interests are constantly shifting.
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 有大量的用户，他们的兴趣不断变化。
- en: Interactions between users and items are very sparse.
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用户与物品之间的交互非常稀疏。
- en: It is unclear how to define actual user preferences.
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不清楚如何定义实际的用户偏好。
- en: To tackle the recommendation problem effectively, we need to leverage non-trivial
    models that use machine learning.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 为了有效地解决推荐问题，我们需要利用非平凡的机器学习模型。
- en: Neural networks are a potent machine learning tool, especially when there’s
    a large amount of unstructured data, such as text or images. While traditional
    classical machine learning involves expert domain knowledge and considerable manual
    work (feature engineering), neural networks can extract complex relationships
    and patterns from raw data almost automatically.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 神经网络是一种强大的机器学习工具，尤其是在存在大量非结构化数据的情况下，如文本或图像。而传统的经典机器学习涉及专家领域知识以及相当多的手动工作（特征工程），神经网络几乎可以自动地从原始数据中提取复杂的关系和模式。
- en: In the RecSys domain, we have a large amount of mostly unstructured data (literally
    trillions of anonymized user-item interactions), as well as entities that are
    content-based (items consist of titles, descriptions, images, videos, and audio;
    users can be represented as sequences of events). Additionally, it is crucial
    that the recommender system performs well for new items and cold users, and encoding
    users and items through content helps achieve this.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 在RecSys领域，我们拥有大量主要是非结构化的数据（实际上是有数万亿匿名用户-物品交互），以及基于内容的事实（物品由标题、描述、图像、视频和音频组成；用户可以表示为事件序列）。此外，对于新物品和冷用户，推荐系统表现良好至关重要，通过内容编码用户和物品有助于实现这一点。
- en: 'The time we have to generate recommendations for the user is very strictly
    limited. Every millisecond counts! Additionally, we don’t have infinite resources
    (in terms of hardware), and the catalogs we need recommendations from are quite
    large. This is why recommendations are usually formed in multiple stages:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 我们为用户生成推荐的时间非常严格地受限。每一毫秒都至关重要！此外，我们并没有无限的资源（就硬件而言），而且我们需要从其中获取推荐的目录相当庞大。这就是为什么推荐通常在多个阶段形成：
- en: First, we select a relatively small set of candidates from the entire catalog
    using lightweight models (**retrieval** stage).
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 首先，我们使用轻量级模型（**检索阶段**）从整个目录中选择一个相对较小的候选集。
- en: Then, we run these candidates through more complex models that utilize additional
    information and more intensive computations for each candidate (**ranking** stage).
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 然后，我们将这些候选者通过更复杂的模型，这些模型利用额外的信息和针对每个候选者的更密集的计算（**排名阶段**）。
- en: Architecturally, models vary significantly between stages, making it challenging
    to discuss any aspect without referring to specific stages of the recommender
    system.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 在架构上，模型在各个阶段之间差异很大，这使得在不提及推荐系统的具体阶段的情况下讨论任何方面都变得具有挑战性。
- en: '![](../Images/aad0e13baf69f22baf59258274945c59.png)'
  id: totrans-23
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/aad0e13baf69f22baf59258274945c59.png)'
- en: Multi-stage recommender systems, Image by Author
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 多阶段推荐系统，图片由作者提供
- en: The two-tower neural network architecture is very popular for the retrieval
    stage. Users and items (for information retrieval, this would be queries and documents,
    independently encoded into vector representations) are used, and the dot product
    is employed to calculate the similarity between them.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 双塔神经网络架构在检索阶段非常受欢迎。用户和物品（在信息检索中，这将是对查询和文档的独立编码为向量表示）被使用，并使用点积来计算它们之间的相似性。
- en: You could also say that such models “embed” users and items into a shared “semantic
    space”, where the semantic aspect represents the fact that the closer the user-item
    pair is in terms of vector space, the more similar they are.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 你也可以说，这样的模型“嵌入”用户和物品到一个共享的“语义空间”中，其中语义方面表示的是，在向量空间中，用户-物品对越接近，它们就越相似。
- en: 'Two-tower models are high-speed. Let’s assume the user requests recommendations.
    The two-tower model then needs to calculate:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 双塔模型是高速的。假设用户请求推荐。双塔模型随后需要计算：
- en: The “user tower” once per request.
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每次请求一次“用户塔”。
- en: Vectors of all candidate items for which you want to calculate user-item affinity.
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你想要计算用户-物品亲和力的所有候选物品的向量。
- en: Dot products.
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 点积。
- en: You don’t even need to recalculate the vectors of candidate items for each user
    query, because they are the same for all users and rarely change; for instance,
    we don’t assume that a movie or a music track often changes its title. In practice,
    we regularly recalculate item vectors for the entire catalog offline (for example,
    daily) and upload them to either the service where we need to calculate the dot
    product or to another service that we access online to retrieve the necessary
    item vectors.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 你甚至不需要为每个用户查询重新计算候选物品的向量，因为它们对所有用户都是相同的，并且很少改变；例如，我们并不假设一部电影或一首音乐经常更改其标题。在实践中，我们定期（例如，每天）离线重新计算整个目录的物品向量，并将它们上传到我们需要计算点积的服务，或者上传到我们在线访问以检索必要物品向量的另一个服务。
- en: 'But that’s me describing a use case where you have some reasonable, small number
    of candidates you want to calculate user-item affinities for. This is true for
    the ranking stage. However, at the candidate generation stage, the problem becomes
    more complicated: we need to calculate proximities for all items in the catalog,
    select the top-N (where N is typically expressed in hundreds to thousands) with
    the highest affinity values, and then forward them to the subsequent stages.'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 但那是我描述的一个用例，其中你有一些合理的、数量较少的候选人，你想要计算用户-项目亲和力。这在排名阶段是正确的。然而，在候选人生成阶段，问题变得更加复杂：我们需要计算目录中所有项目的邻近度，选择具有最高亲和力值的顶N（N通常以数百到数千表示），然后将它们转发到后续阶段。
- en: 'This is where two-tower models are **invaluable**: we can quickly generate
    an approximate top-N by scalar product, even for massive catalogs, using approximate
    search methods. We build a specific “index” (typically a graph structure, such
    as in the HNSW method) for the set of already calculated item vectors that we
    can store in the service and use to feed user vectors, extracting an approximate
    top for these vectors.'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是双塔模型**非常有价值**的地方：我们可以快速通过标量积生成近似的前N个结果，即使对于庞大的目录，也可以使用近似搜索方法。我们为已经计算过的项目向量集构建一个特定的“索引”（通常是图结构，如HNSW方法中），这些索引可以存储在服务中，并用于向用户向量提供输入，从而提取这些向量的近似前N个。
- en: Building this index is difficult and time-consuming (with a separate challenge
    of quickly updating and rebuilding an index). With that being said, it can still
    be done offline, and then the binary and the index can be uploaded to the service,
    where we’ll search for candidates in the runtime environment.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 构建这个索引是困难且耗时的（还有一个快速更新和重建索引的挑战）。尽管如此，它仍然可以在离线时完成，然后二进制文件和索引可以上传到服务中，我们将在运行时环境中搜索候选人。
- en: '![](../Images/f032c886871202d7eb817b0f1fccfead.png)'
  id: totrans-35
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f032c886871202d7eb817b0f1fccfead.png)'
- en: Two-tower neural network, Image by Author
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 双塔神经网络，图片由作者提供
- en: How Do We Encode a User Into a Vector?
  id: totrans-37
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我们如何将用户编码成一个向量？
- en: 'Classical algorithms solved this problem quite easily: in matrix factorization
    methods (like ALS), the user vector was “trainable”, represented by the model
    parameters, and determined within the optimization procedure. In user-item collaborative
    filtering methods, a user was assigned a vector of catalog dimensionality in which
    the i-th coordinate corresponded to a particular item and represented how often
    the user interacted with that item (e.g., how frequently they bought it or how
    they rated it).'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 经典算法很容易解决这个问题：在矩阵分解方法（如ALS）中，用户向量是“可训练的”，由模型参数表示，并在优化过程中确定。在用户-项目协同过滤方法中，用户被分配一个与目录维度相等的向量，其中第i个坐标对应一个特定的项目，表示用户与该项目的交互频率（例如，他们购买它的频率或他们如何评分）。
- en: The modern approach would be to encode users with transformers, suggesting that
    a user can be encoded into a vector using transformers. We take the user’s anonymized
    history—that is, a sequence of events—and encode these events into vectors, then
    utilize a transformer. In the most basic case, events are represented by purchases
    or likes; however, in other cases, it could be the entire history of interactions
    within a company’s ecosystem.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 现代方法是将用户用变压器编码，这意味着用户可以使用变压器被编码成一个向量。我们取用户的匿名历史记录——即事件序列——并将这些事件编码成向量，然后利用变压器。在最基本的情况下，事件由购买或喜欢表示；然而，在其他情况下，它可能是公司生态系统内交互的整个历史。
- en: 'Initially, when transformers were first used in recommendations, researchers
    drew analogies from similarities with NLP: a user is like a sentence, and the
    words in it represent purchases, likes, and other interactions.'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 初始时，当变压器首次用于推荐时，研究人员从NLP的相似性中得出类比：用户就像一个句子，其中的单词代表购买、喜欢和其他交互。
- en: '![](../Images/757c27e896f3d1b248fec3ab67ec6270.png)'
  id: totrans-41
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/757c27e896f3d1b248fec3ab67ec6270.png)'
- en: Two-tower neural network design with a transformer Image by Author
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 带有变压器的双塔神经网络设计，图片由作者提供
- en: Another type of neural network recommender model is models with early fusion.
    These models don’t separate user and item information into two towers but rather
    process all information together. That is, we fuse all information about the user,
    the item, and their interaction at an early stage. In contrast, two-tower models
    are said to feature late fusion through the scalar product. Early-fusion models
    are more expressive than two-tower models. They can capture more complex signals
    and learn more non-trivial dependencies.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种类型的神经网络推荐模型是早期融合模型。这些模型不会将用户和项目信息分开成两个塔，而是将所有信息一起处理。也就是说，我们在早期阶段融合了关于用户、项目和它们交互的所有信息。相比之下，两塔模型通过标量积实现晚期融合。早期融合模型比两塔模型更具表现力。它们可以捕捉更复杂的信号，并学习更多非平凡依赖。
- en: However, it’s difficult to apply them outside the ranking stage because of their
    computational burden and the need to recalculate the entire model for each user
    query and each candidate. Unlike two-tower models, they don’t support the factorization
    of computations.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，由于它们的计算负担以及需要为每个用户查询和每个候选者重新计算整个模型，因此很难将它们应用于排名阶段之外。与两塔模型不同，它们不支持计算分解。
- en: We utilize various architecture types, including two-tower models with transformers
    and models with early fusion. We use two-tower architectures more often because
    they are highly efficient, suitable for all stages simultaneously, and still yield
    good quality gains with considerably fewer resources.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 我们利用各种架构类型，包括具有转换器的两塔模型和具有早期融合的模型。我们更常使用两塔架构，因为它们效率很高，适用于所有阶段，并且仍然在相对较少的资源下产生良好的质量提升。
- en: 'We used to train two-tower models in two stages:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 我们过去在两个阶段训练两塔模型：
- en: '**Pre-training with contrastive learning**. We train the model to align users
    with their positive user-item interactions using contrastive learning,'
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**使用对比学习的预训练**。我们通过对比学习训练模型，使用户与他们的积极用户-项目交互对齐，'
- en: '**Task-specific fine-tuning**. As with NLP, fine-tuning is a task-specific
    approach. If the model will be used for ranking, we train it to accurately rank
    the recommendations shown to the user. We showed two items—the user liked one,
    disliked the other—we want to rank items in the same order. With retrieval, the
    task resembles pre-training but employs additional techniques that enhance the
    candidates’ recall.'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**任务特定微调**。与NLP一样，微调是一种任务特定的方法。如果模型将用于排名，我们训练它准确地对用户显示的推荐进行排名。我们展示了两个项目——用户喜欢其中一个，不喜欢另一个——我们希望以相同的顺序对项目进行排名。在检索中，任务类似于预训练，但采用了增强候选者召回的额外技术。'
- en: In the next section, we’ll explore how this process has changed with our newer
    models.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一节中，我们将探讨这一过程是如何随着我们更新的模型而改变的。
- en: Scaling Recommender Systems
  id: totrans-50
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 推荐系统缩放
- en: Is there a limit to the size of recommender models, after which we no longer
    see size-related improvements in the quality of recommendations?
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 推荐模型的大小有限吗？超过这个限制后，我们不再看到与大小相关的推荐质量改进？
- en: For a long time, our recommender models (and not just ours, but models across
    industry and academia) were very small, which suggested that the answer to this
    question was “yes”.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 很长时间以来，我们的推荐模型（以及不仅仅是我们的模型，还包括行业和学术界跨领域的模型）都非常小，这表明这个问题的答案是“是”。
- en: However, in deep learning, there is the scaling hypothesis, which states that
    as models become larger and the volume of data increases, the model quality should
    improve significantly.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，在深度学习中，存在规模假设，该假设指出，随着模型变得更大和数据量增加，模型质量应该显著提高。
- en: Much of the progress in deep learning over the past decade can be attributed
    to this hypothesis. Even the earliest successes in deep learning were based on
    scaling, with the emergence of an extensive dataset for image classification,
    ImageNet, and the good performance of neural networks (AlexNet) on that dataset.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 过去十年深度学习的大部分进步都可以归因于这个假设。即使是深度学习的最早成功也是基于缩放，随着图像分类的大型数据集ImageNet的出现，以及神经网络（AlexNet）在该数据集上的良好表现。
- en: 'The scaling hypothesis is even more evident in language models and natural
    language processing (NLP): you can predict the dependence of quality improvement
    on the amount of computations and express the corresponding scaling laws.'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 规模假设在语言模型和自然语言处理（NLP）中更为明显：你可以预测质量改进对计算量的依赖，并表达相应的缩放定律。
- en: '![](../Images/651d1f4c29c6805934fe0a548163d7b3.png)'
  id: totrans-56
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/651d1f4c29c6805934fe0a548163d7b3.png)'
- en: Dashboard parameter overview. Image by Author
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 仪表板参数概述。图片由作者提供
- en: What do I mean when I say recommender models can be made bigger?
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 当我说推荐模型可以做得更大时，我指的是什么？
- en: There are as many as four different axes to scale.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 有多达四个不同的轴可以进行缩放。
- en: '**Embeddings**. We have a variety of information about users and items, so
    we have access to a wide range of features, and a large portion of these features
    are categorical. An example of a categorical feature is Item ID, artist ID, genre,
    or language.'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: '**嵌入**。我们关于用户和物品的信息有很多，因此我们可以访问广泛的特征，其中很大一部分是分类特征。一个分类特征的例子是项目ID、艺术家ID、流派或语言。'
- en: Categorical features have a very high cardinality (number of unique values)—reaching
    billions—so if you make large trainable embeddings (vector representations) for
    them, you get huge embedding matrices.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 分类特征具有非常高的基数（唯一值的数量）——达到数十亿——因此如果你为它们制作大的可训练嵌入（向量表示），你会得到巨大的嵌入矩阵。
- en: That said, embeddings are the bottleneck between the input data and the model,
    so you need to make them large for good quality. For example, Meta* has embedding
    matrices with dimensions ranging from [675 billion](https://arxiv.org/abs/2403.02545)
    to [13 trillion](https://arxiv.org/abs/2104.05158) parameters, while Google reported
    at least 1 billion parameters in [YoutubeDNN](https://dl.acm.org/doi/10.1145/2959100.2959190)
    back in 2016\. Even Pinterest, which had long promoted inductive graph embeddings
    from PinSage [[1](https://arxiv.org/abs/1806.01973), [2](https://arxiv.org/abs/2205.10666)],
    has recently started using [large embedding matrices](https://dl.acm.org/doi/10.1145/3640457.3688053).
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 话虽如此，嵌入是输入数据和模型之间的瓶颈，因此你需要使它们足够大以获得高质量。例如，Meta* 拥有从[6750亿](https://arxiv.org/abs/2403.02545)到[1300万亿](https://arxiv.org/abs/2104.05158)参数的嵌入矩阵，而谷歌在2016年报告了至少10亿参数的[YoutubeDNN](https://dl.acm.org/doi/10.1145/2959100.2959190)。即使是长期推广归纳图嵌入的Pinterest
    [[1](https://arxiv.org/abs/1806.01973)，[2](https://arxiv.org/abs/2205.10666)]，最近也开始使用[大型嵌入矩阵](https://dl.acm.org/doi/10.1145/3640457.3688053)。
- en: '**Context length**. For decades, recommender system engineers have been busy
    generating features. In modern ranking systems, the number of features can reach
    hundreds or even thousands, and Yandex also offers such services.'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: '**上下文长度**。几十年来，推荐系统工程师一直在忙于生成特征。在现代排名系统中，特征的数目可以达到数百甚至数千，Yandex也提供此类服务。'
- en: Another example of “context” in a model is the user’s history in a transformer.
    Here, the size of the context is determined by the length of the history. In both
    industry and academia, the number tends to be very small, with only a few hundred
    events at best.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 模型中“上下文”的另一个例子是变换器中的用户历史。在这里，上下文的大小由历史长度决定。在工业界和学术界，这个数字往往非常小，最多只有几百个事件。
- en: '**Training dataset size.** I already mentioned that we have a lot of data.
    Recommender systems produce hundreds of datasets that are similar in size to the
    GPT-3 training dataset.'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: '**训练数据集大小**。我已经提到，我们有很多数据。推荐系统产生了数百个与GPT-3训练数据集大小相似的数据库。'
- en: 'The industry has multiple use cases of massive datasets with billions of training
    examples on display: [2 billion](https://arxiv.org/abs/1706.06978), [2.1 billion](https://arxiv.org/abs/2404.06078),
    [3 billion](https://arxiv.org/abs/2306.00248), [60 billion](https://arxiv.org/abs/2104.05158),
    [100 billion](https://arxiv.org/abs/2008.13535), [146 billion](https://arxiv.org/abs/2403.02545),
    [500 billion](https://arxiv.org/abs/1606.07792).'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 工业界展示了大量数据集的多个用例，包含数十亿的训练示例：[20亿](https://arxiv.org/abs/1706.06978)、[21亿](https://arxiv.org/abs/2404.06078)、[30亿](https://arxiv.org/abs/2306.00248)、[600亿](https://arxiv.org/abs/2104.05158)、[1000亿](https://arxiv.org/abs/2008.13535)、[1460亿](https://arxiv.org/abs/2403.02545)、[5000亿](https://arxiv.org/abs/1606.07792)。
- en: '**Encoder size**. The standard for early-fusion models will be in millions
    or tens of millions of parameters. According to the Google papers, “simplified”
    versions of their Wide&Deep models had 1 to 68 million parameters for the experiments
    [[1](https://dl.acm.org/doi/10.1145/3298689.3346997), [2](https://dl.acm.org/doi/10.1145/3298689.3346997)].
    And if we use a two-layer DCN-v2 (a popular neural network layer for early-fusion
    models) over a thousand continuous features, we’ll get no more than 10 million
    parameters.'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: '**编码器大小**。早期融合模型的标准将是数百万或数千万个参数。根据谷歌的论文，“简化”版本的Wide&Deep模型在实验中具有1000万到6800万个参数
    [[1](https://dl.acm.org/doi/10.1145/3298689.3346997)，[2](https://dl.acm.org/doi/10.1145/3298689.3346997)]。如果我们使用两层DCN-v2（早期融合模型中流行的神经网络层）处理超过1000个连续特征，我们将得到的参数不会超过1000万个。'
- en: 'Two-tower models most often use tiny transformers to encode the user: for example,
    two transformer blocks with hidden layer dimensionality not exceeding a couple
    of hundred. This configuration will have at most a few million parameters.'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 双塔模型通常使用微小的Transformer来编码用户：例如，两个隐藏层维度不超过几百的Transformer块。这种配置最多只有几百万个参数。
- en: And while the sizes of the embedding matrices and training datasets are already
    quite large, scaling the length of user history and the capacity of the encoder
    part of the model remains an open question. Is there any significant scaling by
    these parameters or not?
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管嵌入矩阵和训练数据集的大小已经相当大，但用户历史长度和模型编码器部分的容量如何进行扩展仍然是一个未解之谜。这些参数是否会有显著的扩展？
- en: This was the question on our minds in February, 2024\. Then an article from
    researchers at Meta, titled Actions Speak Louder than Words, cheered us all up
    a bit.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我们2024年2月心中的问题。然后，来自Meta的研究人员发表的一篇文章《行动胜于言语》，让我们都振奋起来。
- en: The аuthors presented a new encoder architecture called [HSTU](https://arxiv.org/abs/2402.17152)
    and formulated both the ranking problem and the candidate generation problem as
    a generative model. The model had a very long history length (8000 events!) along
    with an extensive training dataset (100 billion examples), and the user history
    encoder was much larger than the previous few million parameters. However, even
    here, the largest encoder configuration mentioned, has only 176 million parameters,
    and it’s unclear whether they implemented it (judging by the subsequent articles,
    they didn’t).
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 作者提出了一种新的编码器架构，称为[HSTU](https://arxiv.org/abs/2402.17152)，并将排名问题和候选生成问题都表述为生成模型。该模型具有非常长的历史长度（8000个事件！）以及庞大的训练数据集（1000亿个示例），用户历史编码器比之前的几百万个参数大得多。然而，即使在这里，提到的最大编码器配置也只有1.76亿个参数，而且不清楚他们是否实现了它（根据随后的文章判断，他们没有）。
- en: 'Are 176 million parameters in an encoder a lot or a little? If we look at language
    models, the answer is clear: an LLM with 176 million parameters in the encoder
    will be highly inferior in capability and problem-solving quality to modern SOTA
    models with billions or even trillions of parameters.'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 在编码器中，1.76亿个参数是多还是少？如果我们看看语言模型，答案很明确：具有1.76亿个参数的LLM在能力和解决问题的质量上都将大大劣于具有数十亿甚至数万亿参数的现代SOTA模型。
- en: Why, then, do we have such small models in recommender systems?
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，为什么推荐系统中我们有如此小的模型？
- en: Why can’t we achieve a similar leap in quality if we replace natural language
    texts with anonymized user histories in which actions act as words? Have recommender
    models already reached the ceiling of their baseline quality, and all we have
    left is to make small incremental improvements, tweaking features and target values.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们用匿名用户历史（其中动作充当文字）替换自然语言文本，我们能否实现类似的质量飞跃？推荐模型是否已经达到了其基线质量的极限，我们只剩下进行小的增量改进，调整特征和目标值？
- en: These were the existential questions we asked ourselves when designing our own
    new ARGUS approach.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是我们设计自己新的ARGUS方法时问自己的存在性问题。
- en: ''
  id: totrans-76
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: RecSys × LLM × RL
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: RecSys × LLM × RL
- en: 'After plowing through the extensive literature on scaling, we found that three
    main conditions determine the success of neural network scaling:'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 在深入研究扩展的广泛文献后，我们发现有三个主要条件决定了神经网络扩展的成功：
- en: Lots of data.
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 大量的数据。
- en: Quite expressive architecture with a large model capacity.
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 极其表达性架构，具有大模型容量。
- en: The most general, fundamental learning task possible.
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可能的最通用、最基本的学习任务。
- en: For example, LLMs are very expressive and powerful transformers that learn from
    literally all the data on the internet. Additionally, the task of predicting the
    next word is a fundamental task that, in reality, decomposes into various tasks
    related to different fields, including grammar, erudition, mathematics, physics,
    and programming. All three conditions are met!
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，LLM是非常表达性和强大的Transformer，从互联网上的所有数据中学习。此外，预测下一个单词的任务是一个基本任务，实际上分解为与不同领域相关的各种任务，包括语法、博学、数学、物理和编程。所有三个条件都满足！
- en: 'If we look at recommender systems:'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们看看推荐系统：
- en: 'We also have a lot of data: trillions of interactions between users and items.'
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们也有大量的数据：用户和物品之间的数万亿次交互。
- en: We can just as easily use transformers.
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们同样可以使用Transformer。
- en: We just need to find the right learning task to scale the recommender model.
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们只需要找到合适的推荐模型扩展学习任务。
- en: That’s what we did.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 那就是我们所做的事情。
- en: '![](../Images/7b4822a1ebbcc1688df5df026e375682.png)'
  id: totrans-88
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7b4822a1ebbcc1688df5df026e375682.png)'
- en: LLM process flow. Image by Author
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: LLM 处理流程。图片由作者提供
- en: There’s an interesting aspect of pre-training large language models. If you
    just ask a pre-trained LLM about something, it will give an average answer. The
    most likely answer it has encountered in the training data. That answer won’t
    necessarily be good or right.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 预训练大型语言模型有一个有趣的方面。如果你只是询问一个预训练的LLM关于某事，它将给出一个平均答案。它在训练数据中最可能遇到的答案。这个答案不一定好或正确。
- en: But if you add a prompt before the question, like “Imagine you are an expert
    in X”, it will start providing much more relevant and correct answers.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 但如果在问题之前添加一个提示，比如“想象你是一个X领域的专家”，它将开始提供更多相关和正确的答案。
- en: That’s because LLMs don’t just learn to imitate answers from the internet; they
    also acquire a more fundamental understanding of the world in an attempt to condense
    all the information from the training set. It learns patterns and abstractions.
    And it’s precisely because the LLM knows a wide range of answers and yet possesses
    a fundamental understanding of the world that we can obtain good answers from
    it.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 这是因为LLM不仅学会了模仿来自互联网的答案；它们还试图在尝试从训练集中压缩所有信息的过程中获得对世界的更基本的理解。它学习模式和抽象。正是因为LLM知道广泛的答案，并且对世界有根本的理解，我们才能从它那里获得好的答案。
- en: '![](../Images/107c5b7c38fcf0494cfeb5ebe862cc72.png)'
  id: totrans-93
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/107c5b7c38fcf0494cfeb5ebe862cc72.png)'
- en: 'Venn Diagram : What Makes for a Good Answer? Image by Author'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 维恩图：什么因素造就了一个好的答案？图片由作者提供
- en: 'We tried to apply this logic to recommender systems. First, you need to express
    the recommendations as a reinforcement learning task:'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 我们试图将这种逻辑应用于推荐系统。首先，你需要将推荐表达为强化学习任务：
- en: A recommender system is an agent.
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 推荐系统是一个代理。
- en: Actions are recommendations. In the most basic case, the recommender system
    recommends one item at a time (for example, recommends one music track in the
    music streaming app each time).
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 行为是推荐。在最基本的情况下，推荐系统每次推荐一个项目（例如，在音乐流媒体应用中每次推荐一首音乐曲目）。
- en: The environment means users, their behaviors, patterns, preferences, and interests.
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 环境意味着用户、他们的行为、模式、偏好和兴趣。
- en: The policy is a probability distribution over items.
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 策略是对项目的一个概率分布。
- en: The reward is a user’s positive feedback in response to a recommendation.
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 奖励是用户对推荐的积极反馈。
- en: '![](../Images/9b82fd734253c9e6bd2305e71852ad05.png)'
  id: totrans-101
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/9b82fd734253c9e6bd2305e71852ad05.png)'
- en: Recommendations as a Reinforcement Learning Task, Image by Author
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 将推荐视为强化学习任务，图片由作者提供
- en: 'There’s a direct analogy to the LLM example. “Answers from the internet” are
    the actions of past recommender systems (logging policies), and fundamental knowledge
    about the world is understanding users, their patterns, and preferences. We want
    our new model to be able to:'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 这与LLM示例有直接的类比。“来自互联网的答案”是过去推荐系统的行为（记录策略），而关于世界的根本知识是理解用户、他们的模式和偏好。我们希望我们的新模型能够：
- en: Imitate the actions of past recommender systems.
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模仿过去推荐系统的行为。
- en: Have a good understanding of the users.
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对用户有一个良好的理解。
- en: Adjust their actions to achieve a better outcome.
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 调整他们的行为以实现更好的结果。
- en: 'Before we move on to our new approach, let’s examine the most popular setup
    for training recommendation transformers: next—item prediction. The SASRec model
    is very representative here. The system accumulates a user’s history of positive
    interactions with the service (for example, purchases), and the model learns to
    predict which purchase is likely to come next in the sequence. That is, instead
    of next-token prediction, as in NLP, we opt for next-item prediction.'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们转向新的方法之前，让我们检查训练推荐转换器最流行的设置：下一项预测。SASRec模型在这里非常有代表性。系统累积用户与服务（例如，购买）的积极互动历史，模型学习预测下一个序列中可能出现的购买。也就是说，我们选择下一项预测，而不是像NLP中的下一标记预测。
- en: '![](../Images/013ef820b67879d7230b19047653d9fe.png)'
  id: totrans-108
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/013ef820b67879d7230b19047653d9fe.png)'
- en: Self-Attentive Sequential Recommendation. [Source](https://arxiv.org/abs/1808.09781)
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 自注意力序列推荐。[来源](https://arxiv.org/abs/1808.09781)
- en: 'This approach (SASRec and common next item prediction) is not consistent with
    the philosophy I described earlier, which focused on adjusting the logging policy
    based on fundamental knowledge of the world. It would seem that to predict what
    the user will buy next, the model should operate under this philosophy:'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法（SASRec和常见下一项预测）与之前描述的哲学不一致，该哲学侧重于根据对世界的根本知识调整日志策略。似乎为了预测用户接下来会购买什么，模型应该遵循以下哲学：
- en: It should understand what could be shown to the user by the recommender system
    that was in production at the time for which the prediction should be made. That
    is, it should have a good model of logging policy behavior (i.e., a model that
    can be used to imitate).
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它应该理解在预测应该进行的当时，推荐系统可以向用户展示什么。也就是说，它应该有一个很好的日志策略行为模型（即可以用来模仿的模型）。
- en: It needs to understand what the user might have liked from the things shown
    by the past recommender system, meaning that it needs to understand their preferences,
    which are the very fundamental beliefs about the world.
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它需要理解用户可能喜欢过去推荐系统展示的事物，这意味着它需要理解他们的偏好，这是关于世界的非常基本信念。
- en: 'But models like SASRec don’t explicitly model any of these things. They lack
    complete information about past logging policies (we only see recommendations
    with positive outcomes), and we also don’t learn how to replicate these logging
    policies. There’s no way to know what the past recommender system could have offered.
    At the same time, we don’t fully understand the model of the world or the user:
    we ignore all negative feedback and only consider positive feedback.'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 但像SASRec这样的模型并没有明确地模拟这些事物中的任何一项。它们缺乏关于过去日志策略的完整信息（我们只看到具有正面结果的推荐），我们也没有学习如何复制这些日志策略。无法知道过去推荐系统可能提供的内容。同时，我们并不完全了解世界或用户的模型：我们忽略了所有负面反馈，只考虑正面反馈。
- en: ''
  id: totrans-114
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'ARGUS: AutoRegressive Generative User Sequential Modeling'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: ARGUS：自回归生成用户序列建模
- en: AutoRegressive Generative User Sequential modeling (ARGUS) is our new approach
    to training recommendation transformers.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 自回归生成用户序列建模（ARGUS）是我们训练推荐转换器的新方法。
- en: First, we examine the entire anonymized user history, including positive interactions
    but also all other interactions. We capture the essence of the interaction context,
    the time it occurred, the device used, the product page the user was on, their
    My Vibe personalization settings, and other relevant details.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们检查整个匿名用户历史，包括正面交互以及所有其他交互。我们捕捉交互上下文的精髓，交互发生的时间，使用的设备，用户所在的商品页面，他们的My Vibe个性化设置以及其他相关细节。
- en: '![](../Images/273dbd6da6a11bdbf1654c83b3bc78bc.png)'
  id: totrans-118
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/273dbd6da6a11bdbf1654c83b3bc78bc.png)'
- en: 'ARGUS: AutoRegressive Generative User Sequential Modeling'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: ARGUS：自回归生成用户序列建模
- en: User history is a specific sequence of triples (context, item, feedback), where
    context refers to the interaction context, item represents the object the user
    interacts with, and feedback denotes the user’s reaction to the interaction (such
    as whether the user liked the item, bought it, etc.).
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 用户历史是一个特定的三元组序列（上下文，项目，反馈），其中上下文指的是交互上下文，项目代表用户与之交互的对象，而反馈表示用户对交互的反应（例如用户是否喜欢该项目，是否购买等）。
- en: Next, we identify two new learning tasks, both of which extend beyond the conventional
    next-item prediction widely used in industry and academia.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们确定了两个新的学习任务，这两个任务都超越了在工业和学术界广泛使用的传统下一项预测。
- en: ''
  id: totrans-122
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Next item prediction
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个项目预测
- en: 'Our first task is also called next item prediction. Looking at the history
    and the current interaction context, we predict which item will be interacted
    with: P(item | history, context).'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的第一项任务也称为下一个项目预测。查看历史和当前交互上下文，我们预测将被交互的项目：P(项目 | 历史，上下文)。
- en: '![](../Images/0efc4538f0f9bbe603300a507377ae58.png)'
  id: totrans-125
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0efc4538f0f9bbe603300a507377ae58.png)'
- en: Next Item Prediction Flow, Image by Author
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个项目预测流程，图片由作者提供
- en: If the history contains only recommendation traffic (events generated directly
    by the recommender system), then the model learns to imitate the logging policy
    (recommendations from the past recommender system).
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果历史中只包含推荐流量（由推荐系统直接生成的事件），则模型学会模仿日志策略（来自过去推荐系统的推荐）。
- en: If there is also organic traffic (any traffic other than referral traffic, such
    as traffic from search engines, or if the user visits the library and listens
    to their favorite track), we also gain more fundamental knowledge about the user,
    unrelated to the logging policy.
  id: totrans-128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果也存在有机流量（除推荐流量之外的所有流量，例如来自搜索引擎的流量，或者如果用户访问图书馆并收听他们最喜欢的曲目），我们也能获得更多关于用户的基本知识，这些知识与日志策略无关。
- en: '**Important**: though this task has the same name as in SASRec (next item prediction),
    it’s not the same task at all. We predict not only positive but also negative
    interactions, and also take into account the current context. The context helps
    us understand whether the action is organic or not, and if it’s a recommendation,
    what surface it’s on (place, page, or carousel). Also, it generally reduces the
    noise level during model training.'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: '**重要**：尽管这个任务与SASRec中的下一项预测任务同名，但它完全不是同一个任务。我们预测的不仅是正面交互，还包括负面交互，并且还考虑了当前上下文。上下文帮助我们理解动作是否为有机的，如果是推荐，它在哪个表面上（地点、页面或轮播）。此外，它通常在模型训练期间降低噪声水平。'
- en: 'Context is essential for music recommendations: the user’s mood and their current
    situation have a significant impact on the type of music they want to listen to.'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 上下文对于音乐推荐至关重要：用户的心情和当前情况对他们想要听的音乐类型有重大影响。
- en: The task of predicting an element from a set is typically expressed as a classification
    problem, where the elements of the original set serve as classes. Then, we need
    to use a cross-entropy loss function for training, where the softmax function
    is applied to the logits (unnormalized outputs of the neural network). Softmax
    calculation requires computing the sum of exponents from logits across all classes.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 从集合中预测一个元素的任务通常被表达为一个分类问题，其中原始集合的元素作为类别。然后，我们需要使用交叉熵损失函数进行训练，其中softmax函数应用于logits（神经网络的未归一化输出）。Softmax计算需要计算所有类别的logits指数之和。
- en: 'While the size of dictionaries in LLMs can reach hundreds of thousands of items
    in the worst case, and softmax calculation is not a significant problem, it becomes
    a concern in recommender systems. Here, catalogs consist of millions or even billions
    of items, and calculating the full softmax is an impossible task. This is a topic
    for a separate big article, but eventually, we have to use a tricky loss function
    called “sampled softmax” with a l[ogQ correction](https://arxiv.org/abs/2507.09331):'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然在LLMs中字典的大小在最坏情况下可以达到数十万个项目，softmax计算不是一个大问题，但在推荐系统中，它成为一个问题。在这里，目录由数百万甚至数十亿个项目组成，计算完整的softmax是一个不可能的任务。这是一个单独大文章的主题，但最终我们不得不使用一个名为“采样softmax”的巧妙损失函数，并带有l[ogQ校正](https://arxiv.org/abs/2507.09331)：
- en: '![](../Images/1a4e082973ae98868a270f5b19935f9b.png)![](../Images/c823d7e8b2910ae9f0e5c313fdd83193.png)'
  id: totrans-133
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/1a4e082973ae98868a270f5b19935f9b.png)![图片](../Images/c823d7e8b2910ae9f0e5c313fdd83193.png)'
- en: N means a mix of in-batch and uniform negatives
  id: totrans-134
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: N表示批内和均匀负样本的混合
- en: '`logQ(n)`means logQ correction'
  id: totrans-135
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`logQ(n)`表示logQ校正'
- en: Temperature `T`means a trained parameter `Eᵀ`clipped to [0.01, 100].
  id: totrans-136
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 温度`T`表示一个训练参数`Eᵀ`被裁剪到[0.01, 100]。
- en: Feedback prediction
  id: totrans-137
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 反馈预测
- en: 'Feedback prediction is the second learning task. Considering history, the current
    context, and the item, we predict user feedback: P(feedback | history, context,
    item).'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 反馈预测是第二个学习任务。考虑到历史记录、当前上下文和项目，我们预测用户反馈：P(反馈 | 历史，上下文，项目)。
- en: '![](../Images/d198ed506bac4d729a924a2b19ff9a9d.png)'
  id: totrans-139
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d198ed506bac4d729a924a2b19ff9a9d.png)'
- en: Feedback prediction learning task. Image by Author
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 反馈预测学习任务。图由作者提供
- en: The first task, next item prediction, teaches us how to imitate logging policies
    (and understanding users if there is organic traffic). The feedback prediction
    task, on the other hand, is focused exclusively, on getting fundamental knowledge
    about users, their preferences, and interests.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 第一项任务，下一项预测，教给我们如何模仿日志策略（如果有有机流量，则理解用户）。另一方面，反馈预测任务则专注于获取关于用户、他们的偏好和兴趣的基本知识。
- en: It is very similar to how the ranking variant of the model from “[Actions Speak
    Louder than Words](https://arxiv.org/abs/2402.17152)” learns on a sequence of
    pairs (item, action). Still, here the context token is treated separately, and
    there are more than just recommender contexts present.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 这与“[行动胜于言语](https://arxiv.org/abs/2402.17152)”模型中的排名变体在一系列对（项目，动作）上学习非常相似。然而，在这里，上下文标记被单独处理，并且除了推荐上下文之外还有更多。
- en: 'Feedback can have multiple components: whether a track was liked, disliked,
    added to a playlist, and what portion of the track was listened to. We predict
    all types of feedback by decomposing them into individual loss functions. You
    can use any loss function as a specific loss function, including cross-entropy
    or regression. For example, binary cross-entropy is sufficient to predict whether
    a like was present or not.'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 反馈可以包含多个组成部分：是否喜欢某首曲目、不喜欢、添加到播放列表，以及听了曲目的哪部分。我们通过将它们分解成单个损失函数来预测所有类型的反馈。您可以使用任何损失函数作为特定损失函数，包括交叉熵或回归。例如，二元交叉熵足以预测是否喜欢。
- en: Although some feedback is more common (there are usually far fewer likes than
    long listens), the model does a good job of learning to predict all signals. The
    larger the model, the easier it is to learn all tasks at once, without conflicts.
    Moreover, frequent feedback (listens), on the contrary, helps the model learn
    how to simulate rare, sparse feedback (likes).
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管某些反馈更常见（通常喜欢的次数远少于长时间收听），但模型在预测所有信号方面做得很好。模型越大，一次性学习所有任务而不发生冲突就越容易。此外，频繁的反馈（收听），相反，有助于模型学习如何模拟罕见、稀疏的反馈（喜欢）。
- en: '![](../Images/7f0bff5c81bf243ef1b2f8260bec7b65.png)'
  id: totrans-145
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7f0bff5c81bf243ef1b2f8260bec7b65.png)'
- en: Diagram illustrating how the transformer model performs next-item and feedback
    prediction. Image by Author
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 展示变压器模型如何执行下一项和反馈预测的图表。图片由作者提供
- en: 'If we combine all this into a single learning task, we get the following:'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们将所有这些组合成一个单一的学习任务，我们得到以下结果：
- en: Create histories for the user from triples (context, item, feedback).
  id: totrans-148
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从三元组（上下文、物品、反馈）为用户创建历史。
- en: Use the transformer.
  id: totrans-149
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用变压器。
- en: Predict the next item based on the hidden state of the context.
  id: totrans-150
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据上下文的隐藏状态预测下一个物品。
- en: Predict the user’s feedback after interacting with the item based on the item’s
    hidden state.
  id: totrans-151
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据物品的隐藏状态预测用户与物品交互后的反馈。
- en: '![](../Images/c2b109164f3b40f58f372ace8d470966.png)'
  id: totrans-152
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c2b109164f3b40f58f372ace8d470966.png)'
- en: 'The image illustrates the difference between the ARGUS and SASRec approaches:
    with ARGUS, we train the model to imitate the behavior of past recommender systems
    and predict the user’s response; in contrast, with SASRec, we train the model
    to predict the next positive interaction.'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 该图像展示了 ARGUS 和 SASRec 方法之间的差异：使用 ARGUS，我们训练模型模仿过去推荐系统的行为并预测用户的响应；相比之下，使用 SASRec，我们训练模型预测下一次积极的交互。
- en: Let me also comment on how this differs from HSTU. In Actions Speak Louder than
    Words, the authors train two separate models for candidate generation and ranking.
    The candidate generation model contains the entire history, but, like SASRec,
    it models only positive interactions and doesn’t consider the loss function in
    cases where there’s a negative interaction. The ranking model, as mentioned earlier,
    learns for a task similar to our feedback prediction.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 让我也评论一下这与 HSTU 的不同之处。在《行动胜于言语》中，作者为候选生成和排名训练了两个不同的模型。候选生成模型包含整个历史，但像 SASRec
    一样，它只对正交互建模，不考虑负交互情况下的损失函数。排名模型，如前所述，学习与我们的反馈预测类似的任务。
- en: Our solution offers a more comprehensive next item prediction task and a more
    comprehensive feedback prediction task, and the model learns in both functions
    simultaneously.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 我们提供的解决方案提供了一个更全面的下一个物品预测任务和一个更全面的反馈预测任务，模型在这两个函数中同时学习。
- en: ''
  id: totrans-156
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Simplified ARGUS
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 简化的 ARGUS
- en: Our approach has one big problem—we’re inflating the user’s history. Because
    each interaction with an item is represented by three tokens at once (context,
    item, feedback), we would have to feed almost 25,000 tokens into the transformer
    to analyze 8192 recent user listens.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的方法有一个大问题——我们正在夸大用户的历史。因为每个与物品的交互都由三个标记同时表示（上下文、物品、反馈），我们不得不向变压器输入近 25,000
    个标记来分析 8192 个最近用户的收听。
- en: '![](../Images/f64ee4a7875cd5f67ca5d5d2ea98af41.png)'
  id: totrans-159
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f64ee4a7875cd5f67ca5d5d2ea98af41.png)'
- en: Simplified ARGUS. Image by Author
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 简化的 ARGUS。图片由作者提供
- en: One could argue that this is still not significant and that the context length
    is much longer in LLMs; however, this is not entirely accurate. LLMs, on average,
    have much smaller numbers, typically hundreds of tokens, especially during pre-training.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 有些人可能会认为这仍然不显著，因为 LLM 中的上下文长度要长得多；然而，这并不完全准确。LLM 的平均数量要小得多，通常只有几百个标记，尤其是在预训练期间。
- en: In contrast, in our music streaming platform, for example, users often have
    thousands or even tens of thousands of events. We already have much longer context
    lengths, and inflating those lengths by a factor of three has an even greater
    impact on learning speed. To tackle this, we created a simplified version of the
    model, in which each triple (context, item, feedback) is condensed into a single
    vector. In terms of input format, it resembles our previous generations of transformer
    models; however, we maintain the same two learning tasks—next item prediction
    and feedback prediction.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 相比之下，例如在我们的音乐流媒体平台上，用户通常有成千上万甚至数十万个事件。我们已经有更长的上下文长度，将这些长度增加三倍对学习速度的影响更大。为了解决这个问题，我们创建了一个简化版本的模型，其中每个三重组（上下文，项目，反馈）被压缩成一个单一的向量。在输入格式方面，它类似于我们之前的几代
    Transformer 模型；然而，我们保持了相同的两个学习任务——下一个项目预测和反馈预测。
- en: To predict the next item, we take the hidden state from the transformer corresponding
    to the triple (c, i, f) at a past point in time, concatenate the current context
    vector to it, compress it to a lower dimension using an MLP, and then use the
    sampled softmax to learn to predict the next item.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 为了预测下一个项目，我们从对应于过去某个时间点的三重组（c, i, f）的 Transformer 中获取隐藏状态，将当前上下文向量连接到它上面，使用
    MLP 压缩到更低的维度，然后使用采样 softmax 学习预测下一个项目。
- en: To predict the feedback, we concatenate the vector of the current item and then
    use an MLP to predict all the required target variables. In terms of recommender
    transformer architectures, our model becomes less target-aware and less context-aware;
    however, it still performs well, enabling a three-fold acceleration.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 为了预测反馈，我们将当前项目的向量连接起来，然后使用 MLP 预测所有所需的目标变量。在推荐器 Transformer 架构方面，我们的模型在目标感知和上下文感知方面变得不那么明显；然而，它仍然表现良好，实现了三倍的加速。
- en: ''
  id: totrans-165
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: ARGUS Implementation
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: ARGUS 实现
- en: A model trained in this two-headed mode for both tasks simultaneously (next
    item prediction and feedback prediction) can be implemented as is. The NIP head
    is responsible for candidate selection, and the FP head for final ranking.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种双头模式下同时训练模型（下一个项目预测和反馈预测）可以按原样实现。NIP 头负责候选选择，而 FP 头负责最终排名。
- en: 'But we didn’t want to do that, at least not for our first implementation:'
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 但我们不想这样做，至少不是在我们的第一次实现中：
- en: Our goal was to implement a very large model, so we initially focused on offline
    deployment. With offline deployment, user and item vectors are recalculated daily
    within a separate regular process, and you only need to calculate the dot product
    in the runtime environment.
  id: totrans-169
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们的目标是实施一个非常大的模型，所以我们最初专注于离线部署。在离线部署中，用户和项目向量每天在单独的常规过程中重新计算，你只需要在运行时环境中计算点积。
- en: 'The pre-trained version of ARGUS implies access to the user’s history without
    any delay: we see all events in their history up to the current point in time
    when the prediction is made. That is, it needs to be applied at runtime.'
  id: totrans-170
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ARGUS 的预训练版本意味着可以无延迟地访问用户的历史记录：我们能看到用户历史记录中所有事件，直到预测发生的当前时间点。也就是说，它需要在运行时应用。
- en: The NIP head predicts all user interactions, and the model is usually trained
    to predict only future positive interactions to generate candidates. But predicting
    positive interactions is a heuristic, a surrogate learning task. It might even
    be better to use a head that predicts all interactions because it learns to be
    consistent with the ranking. If an item has been recommended, it means the ranking
    liked it. But in this situation, we weren’t ready to experiment with that and
    instead wanted to follow the well-trodden path.
  id: totrans-171
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: NIP 头预测所有用户交互，模型通常训练预测只有未来的正面交互来生成候选。但预测正面交互是一种启发式方法，一个代理学习任务。甚至可能使用一个预测所有交互的头更好，因为它会学习与排名保持一致。如果一个项目被推荐，这意味着排名喜欢它。但在这个情况下，我们还没有准备好尝试这种方法，而是想遵循既定的路径。
- en: 'The FP head learns for pointwise losses: whether a track will be liked or not,
    what portion of the track will be heard, and so on. But we still often train models
    for pairwise ranking: we learn to rank items that were recommended “next to each
    other” and received different feedback. Some argue that pointwise losses are sufficient
    for training ranking models, but in this case, we don’t replace the entire ranking
    stack. Instead, we aim to add a new, powerful, neural-network-based feature to
    the final ranking model. If the final ranking model is trained for a particular
    task (such as pairwise ranking), then the neural network that generates the feature
    is most efficiently trained for that task; otherwise, the final model will rely
    less on our feature. Accordingly, we’d like to pre-train ARGUS for the same task
    as the original ranking model, allowing us to utilize it in ranking.'
  id: totrans-172
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: FP 头部学习用于点损失：曲目是否会被喜欢，曲目中哪部分会被听到，等等。但我们还经常训练用于成对排名的模型：我们学习排名那些被推荐“相邻”并得到不同反馈的物品。有些人认为点损失对于训练排名模型是足够的，但在这个案例中，我们没有替换整个排名栈。相反，我们旨在向最终排名模型添加一个新的、强大的、基于神经网络的特性。如果最终排名模型针对特定任务（如成对排名）进行训练，那么生成该特性的神经网络将最有效地针对该任务进行训练；否则，最终模型将较少依赖于我们的特性。因此，我们希望预先训练
    ARGUS 以与原始排名模型相同的任务，这样我们就可以在排名中使用它。
- en: 'There are other deployment use cases beyond the conventional candidate generation
    and ranking stages, and we’re actively researching these as well. However, for
    our first deployment, we went with an offline two-tower ranking:'
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 除了传统的候选生成和排名阶段之外，还有其他部署用例，我们也在积极研究这些用例。然而，在我们的首次部署中，我们选择了离线双塔排名：
- en: We decided to fine-tune ARGUS so that it could be used as an offline two-tower
    model. We use it to recalculate user and item vectors daily, while user preferences
    are determined through the dot product of the user with the items.
  id: totrans-174
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们决定微调 ARGUS，使其能够作为一个离线双塔模型使用。我们每天使用它来重新计算用户和物品向量，而用户偏好是通过用户与物品的点积来确定的。
- en: We pre-trained ARGUS for a pairwise ranking task similar to the one on which
    the final ranking model is trained. This means that we have somehow selected pairs
    of tracks that the user heard and rated differently in terms of positive feedback,
    and we want to learn how to rank them correctly.
  id: totrans-175
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们对 ARGUS 进行了预训练，用于与最终排名模型训练相似的成对排名任务。这意味着我们以某种方式选择了用户听过的并就正面反馈给出了不同评价的成对曲目，我们希望学习如何正确地排名它们。
- en: 'We build these models quite often: they are easy to train and implement in
    terms of resources and development costs. However, our previous models were significantly
    smaller and learned differently. Not with the ARGUS procedure, but first with
    the usual contrastive learning between users and positives, and then fine-tuned
    for the task.'
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 我们相当频繁地构建这些模型：它们在资源和发展成本方面都很容易训练和实现。然而，我们之前的模型要小得多，学习方式也不同。不是使用 ARGUS 流程，而是首先使用用户和正样本之间的常规对比学习，然后针对任务进行微调。
- en: 'Our previous contrastive pre-training procedure implied compiling multiple
    training examples for a user: if the user had n purchases, then there would be
    n samples in the dataset. That said, we didn’t use autoregressive learning. That
    is, we ran the transformer n times during training. This approach enabled us to
    be very flexible in creating pairs (user, item) for training, use any history
    format, encode context together with the user, and account for lags. When predicting
    likes, we can use a one-day lag in the user’s history. However, things were running
    pretty slowly.'
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 我们之前的对比预训练程序意味着为用户编译多个训练示例：如果用户有 n 次购买，则数据集中将有 n 个样本。话虽如此，我们没有使用自回归学习。也就是说，我们在训练期间运行了
    Transformer n 次。这种方法使我们能够在创建训练对（用户，物品）时非常灵活，使用任何历史格式，将上下文与用户一起编码，并考虑滞后。在预测喜好时，我们可以使用用户历史中的一天的滞后。然而，事情进展得相当缓慢。
- en: ARGUS pre-training employs autoregressive learning, where we learn from all
    events in the user’s activity simultaneously in a single transformer run. This
    is a powerful acceleration that allowed us to train much larger models using the
    same resources.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: ARGUS 预训练采用自回归学习，其中我们在单个 Transformer 运行中同时从用户活动的所有事件中学习。这是一种强大的加速，使我们能够使用相同的资源训练更大的模型。
- en: During fine-tuning, we also ran the transformer many times for a single user.
    It is called impression-level learning that Meta used to have before HSTU. If
    a user is shown an item at a specific moment, we generate a sample of the form
    (user, item). The dataset can contain a large number of such impressions for a
    single user, and we will rerun the transformer for each one of them. For pairwise
    ranking, we considered triples of the form (user, item1, item2). The ones we used
    before.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 在微调期间，我们也为单个用户多次运行了transformer。这被称为Meta在HSTU之前使用的印象级学习。如果一个用户在特定时刻看到一个物品，我们生成一个形式为（用户，物品）的样本。数据集可以包含单个用户的大量此类印象，我们将为它们中的每一个重新运行transformer。对于成对排名，我们考虑形式为（用户，item1，item2）的三元组。我们之前使用的。
- en: Examining the acceleration during the pre-training stage, we decided to employ
    a similar approach with fine-tuning. We develop a fine-tuning procedure for the
    two-tower model to teach it ranking, where the transformer only needs to be run
    once.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 在预训练阶段检查加速情况后，我们决定采用类似的方法进行微调。我们为两塔模型开发了一个微调过程，以教授其排名，其中transformer只需要运行一次。
- en: '![](../Images/0237f259cf2c0ddbe8c9fab006f1f295.png)'
  id: totrans-181
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0237f259cf2c0ddbe8c9fab006f1f295.png)'
- en: Diagram of how transformers use historical impressions and user states to form
    predictions. Image by Author
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 变换器如何使用历史印象和用户状态形成预测的示意图。图由作者提供
- en: 'Let’s say we have the user’s entire history for a year, and all the recommendations
    shown to the user within the same period. By implementing a transformer with a
    causal mask over the entire history, we get vector representations of the user
    for all the moments in that year at once, and so we can:'
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我们有一个用户一年的完整历史，以及在同一时期向用户展示的所有推荐。通过在整个历史上实施因果掩码的transformer，我们一次性得到该年所有时刻的用户向量表示，因此我们可以：
- en: Separately calculate the vectors of the shown items.
  id: totrans-184
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分别计算展示物品的向量。
- en: Review the timestamps and map recommendation impressions to user vectors corresponding
    to the required lag in user history delivery.
  id: totrans-185
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 检查时间戳，并将推荐印象映射到对应用户历史交付延迟的用户向量。
- en: Calculate all the required scalar products and all terms of the loss function.
  id: totrans-186
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 计算所有所需的标量积和损失函数的所有项。
- en: And all of this at once for the entire year—in a single transformer run.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 并且一次性处理整个一年的所有这些——在一个单独的transformer运行中。
- en: 'Previously, we would rerun the transformer for each pair of impressions; now,
    we process all the impressions at once in a single run. This is a massive acceleration:
    by a factor of tens, hundreds, or even thousands. To employ a two-tower model
    like this, we can simply use the vector representation of the user at the last
    moment in time (corresponding to the last event in the history) as the current
    vector representation. For the items, we can use the encoder that was used during
    training for the impressions. In training, we simulate a one-day user history
    lag and then run the model as an offline model, recalculating user vectors daily.'
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 以前，我们会为每一对印象重新运行transformer；现在，我们一次性在一个运行中处理所有印象。这是一个巨大的加速：以十倍、百倍甚至千倍的速度。要使用这种两塔模型，我们只需在最后一刻（对应于历史中的最后事件）使用用户的向量表示作为当前的向量表示。对于物品，我们可以使用在印象训练期间使用的编码器。在训练中，我们模拟一天的用户历史延迟，然后以离线模型运行模型，每天重新计算用户向量。
- en: When I say that we process the user’s entire year of history in a single transformer
    run, I’m being somewhat misleading. In reality, we have a certain limit on the
    maximum history length that we enforce, and a user in a dataset can have multiple
    samples or chunks. For pre-training, these chunks don’t overlap.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 当我说我们在单个transformer运行中处理用户整个一年的历史时，我可能有些误导。实际上，我们对最大历史长度有一个限制，并强制执行，数据集中的用户可以有多个样本或块。对于预训练，这些块不重叠。
- en: However, during fine-tuning, there are limits not only on the maximum history
    length but also on its minimum length, as well as on the maximum number of recommendation
    impressions in a single training example used to train the model for ranking.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，在微调期间，不仅对最大历史长度有限制，而且对其最小长度也有限制，以及用于训练排名模型的单个训练示例中推荐印象的最大数量。
- en: ''
  id: totrans-191
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Results
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 结果
- en: We chose our music streaming as the first service to experiment with. Recommendations
    are crucial here, and the service has a large number of active users. We’ve built
    a giant training dataset with over 300 billion listens from millions of users.
    This is tens or even hundreds of times larger than the training datasets we’d
    used before.
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: 我们选择将音乐流媒体服务作为第一个实验的服务。在这里，推荐至关重要，该服务拥有大量的活跃用户。我们构建了一个包含数亿用户超过3000亿次收听的大型训练数据集。这比我们之前使用的训练数据集大数十倍甚至数百倍。
- en: What’s a triple (context, item, feedback) in a music streaming service?
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 在音乐流媒体服务中，一个（上下文，项目，反馈）三元组是什么？
- en: '**Context**: whether the current interaction is a recommendation or organic.
    If it’s a recommendation—what surface it’s on, and if it’s My Vibe—what the settings
    are.'
  id: totrans-195
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**上下文**：当前交互是否为推荐或自然。如果是推荐——它位于哪个表面，如果是My Vibe——设置是什么。'
- en: '**Item**: a music track. The most important feature for item encoding is the
    item ID. We use unified embeddings to encode features with high cardinality. In
    this case, we take three 512K hashes per item. We use a fixed unified embedding
    matrix with 130 million parameters in our experiments.'
  id: totrans-196
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**项目**：一首音乐曲目。对于项目编码来说，最重要的特征是项目ID。我们使用统一的嵌入来编码具有高基数的特征。在这种情况下，我们对每个项目使用三个512K的哈希值。在我们的实验中，我们使用了一个具有1.3亿参数的固定统一嵌入矩阵。'
- en: '**User feedback**: whether a track was liked, and what portion of the track
    was heard.'
  id: totrans-197
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**用户反馈**：是否喜欢一首曲目，以及听到了曲目的哪一部分。'
- en: For offline quality assessment, we use data from the week following the training
    period through the global temporal split.
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 对于离线质量评估，我们使用训练期后一周的数据，通过全局时间分割。
- en: 'To assess the quality of the pre-trained model, we examine the loss function
    values in the pre-training tasks: next item prediction and feedback prediction.
    That is, we measure how well the model learned to solve the tasks we created for
    it. The smaller the value, the better.'
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 为了评估预训练模型的质量，我们检查了预训练任务中的损失函数值：下一项预测和反馈预测。也就是说，我们衡量模型学习解决我们为其创建的任务的效果。值越小，表示效果越好。
- en: '**Important**: We consider the user’s history over a long period, but the loss
    function is only calculated for events that occur within the test period.'
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: '**重要**：我们考虑用户长期的历史，但损失函数仅对测试期内发生的事件进行计算。'
- en: 'During fine-tuning, we learn to correctly rank item pairs based on user feedback,
    making PairAccuracy— a metric that measures the share of pairs correctly ordered
    by the model —a suitable offline metric for us. In practice, we reweigh pairs
    slightly more based on feedback: for example, pairs in which the person liked
    and skipped a track have a higher weight than those in which the person listened
    to and skipped a track.'
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 在微调期间，我们学会了根据用户反馈正确地排列项目对，使PairAccuracy——一个衡量模型正确排序的配对比例的指标——成为我们合适的离线指标。在实践中，我们根据反馈稍微重新加权配对：例如，当一个人喜欢并跳过一首曲目时，其权重高于那些听了一首曲目并跳过的配对。
- en: Our deployment scenario involves adding a powerful new feature to the final
    ranker. For this reason, we measure the relative increase in PairAccuracy for
    the final ranker with the new feature added, compared to the final ranker without
    it. The final ranker in our music streaming platform is gradient boosting.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的部署场景涉及向最终的排序器添加一个强大的新功能。因此，我们测量了添加新功能后最终排序器的相对PairAccuracy增加，与没有该功能的最终排序器相比。我们音乐流媒体平台中的最终排序器是梯度提升。
- en: A/B Test Results and Measurements
  id: totrans-203
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: A/B测试结果和测量
- en: Our initial goal was to scale recommendation transformers. To test the scaling,
    we selected four different-sized transformer configurations, ranging from 3.2
    million to 1.007 billion parameters.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的初始目标是扩展推荐转换器。为了测试扩展性，我们选择了四种不同规模的转换器配置，参数量从320万到10.07亿不等。
- en: '![](../Images/52c05ebefcc32cd71e508a588ad68756.png)'
  id: totrans-205
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/52c05ebefcc32cd71e508a588ad68756.png)'
- en: HSTU Performance test. Image by Author
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: HSTU性能测试。图片由作者提供
- en: We also decided to test the performance of the HSTU architecture. In “[Actions
    Speak Louder than Words](https://arxiv.org/abs/2402.17152)“, the authors proposed
    a new encoder architecture, which is quite different from the transformer architecture.
    Based on the authors’ experiments, this architecture outperforms transformers
    in recommendation tasks.
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还决定测试HSTU架构的性能。在“[Actions Speak Louder than Words](https://arxiv.org/abs/2402.17152)”中，作者提出了一种新的编码器架构，它与转换器架构相当不同。根据作者的实验，这种架构在推荐任务中优于转换器。
- en: '![](../Images/6e2b50d89a0266da9a020c4a4484ba7b.png)'
  id: totrans-208
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6e2b50d89a0266da9a020c4a4484ba7b.png)'
- en: Performance test dashboard. Image by Author
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 性能测试仪表板。图片由作者提供
- en: There’s scaling! Each new jump in architecture size results in a quality gain,
    both in pre-training and fine-tuning.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 有缩放！架构大小的新增每次跳跃都导致质量提升，无论是在预训练还是微调阶段。
- en: HSTU proved to be no better than transformers. We used the largest configuration
    mentioned by the authors in “[Actions Speak Louder than Words](https://arxiv.org/abs/2402.17152).”
    It has one and a half times more parameters than our medium transformer, while
    having roughly the same quality.
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: HSTU证明并不比变压器好。我们使用了作者在“[行动胜于言语](https://arxiv.org/abs/2402.17152)”中提到的最大配置。它的参数比我们的中等变压器多一倍半，而质量大致相同。
- en: '![](../Images/552904e015d89d1e8c018ce3e78112ef.png)'
  id: totrans-212
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/552904e015d89d1e8c018ce3e78112ef.png)'
- en: Graph describing the relationship between model size, entropy prediction, and
    ranking uplift. Image by Author.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 描述模型大小、熵预测和排名提升之间关系的图表。图片由作者提供。
- en: 'Let’s visualize the metrics from the table as a graph. In that case, we can
    observe the scaling law for our four points: the dependence of quality on the
    logarithm of the number of parameters appears linear.'
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们将表格中的指标可视化成图表。在这种情况下，我们可以观察到我们四个点的缩放定律：质量对参数数量的对数依赖性呈现线性关系。
- en: We performed a small ablation study to find out whether we could simplify our
    model or remove any parts from the training.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 我们进行了一项小的消融研究，以找出我们是否可以简化我们的模型或从训练中移除任何部分。
- en: '![](../Images/cb5abc20aed8998c18e44a5961d3aeaa.png)'
  id: totrans-216
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/cb5abc20aed8998c18e44a5961d3aeaa.png)'
- en: Results with pre-training vs without, Image by Author
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 与预训练相比无预训练的结果，图片由作者提供
- en: If you remove pre-training, the model’s quality drops.
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你移除预训练，模型的质量会下降。
- en: '![](../Images/4f20549d9273b803de6e2c615d83729f.png)'
  id: totrans-219
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/4f20549d9273b803de6e2c615d83729f.png)'
- en: Fine-tuning and pairwise accuracy results, Image by Author
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: 微调和成对准确率结果。图片由作者提供
- en: If you reduce the duration of fine-tuning, the drop becomes even more pronounced.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你减少微调的持续时间，下降趋势会更加明显。
- en: '![](../Images/4733d4634469904ad628eb9a7fc9691a.png)'
  id: totrans-222
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/4733d4634469904ad628eb9a7fc9691a.png)'
- en: Noticeable scaling in history length, Image by Author
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 历史长度上的显著缩放，图片由作者提供
- en: 'At the beginning of this article, I mentioned that the authors of “Actions
    Speak Louder than Words” trained a model with a history length of 8,000 items.
    We decided to give it a try: it turns out that handling such a deep user’s musical
    history results in a noticeable improvement in recommendations. Previously, our
    models utilized a maximum of 1,500–2,000 events. This was the first time we had
    the opportunity to cross this threshold.'
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文的开头，我提到“行动胜于言语”的作者训练了一个历史长度为8,000个项目的模型。我们决定尝试一下：处理如此深度的用户音乐历史结果导致推荐质量显著提高。以前，我们的模型最多使用1,500-2,000个事件。这是我们第一次有机会跨越这个阈值。
- en: ''
  id: totrans-225
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Implementation Results
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
  zh: 实施结果
- en: We’ve been working to develop transformers for music recommendations for about
    three years now and we’ve come a long way. Here’s everything we have learned and
    how we have progressed developing transformer-based models for music recommendations
    over this time.
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经致力于开发音乐推荐用的变压器大约三年了，我们已经取得了长足的进步。以下是我们在这一过程中所学到的所有知识和我们如何发展基于变压器的音乐推荐模型。
- en: '![](../Images/5ed65a8f0fa06c401ec10e8938cd692d.png)'
  id: totrans-228
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/5ed65a8f0fa06c401ec10e8938cd692d.png)'
- en: Project Roadmap, Image by Author
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 项目路线图。图片由作者提供
- en: Our first three transformers were all offline. User and item vectors were recalculated
    daily. Then, user vectors were loaded into a key-value store, and item vectors
    were stored in the service’s RAM, while only the dot product was calculated at
    runtime. We utilized some of these models not only for ranking, but also for candidate
    generation (we are familiar with building multi-head models that perform both
    tasks). In cases like this, the HNSW index, from which candidates can be retrieved,
    also resides in the service’s RAM.
  id: totrans-230
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们的前三个变压器都是离线的。用户和项目向量每天都会重新计算。然后，用户向量被加载到键值存储中，项目向量存储在服务的RAM中，而在运行时只计算点积。我们利用其中一些模型不仅用于排名，还用于候选生成（我们熟悉构建执行这两个任务的多头模型）。在这种情况下，可以从中检索候选者的HNSW索引也位于服务的RAM中。
- en: The first model only had a signal about likes, the second model had a signal
    about listens (including skips), and in the third model, we combined both signal
    types (explicit and implicit).
  id: totrans-231
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第一个模型只有关于点赞的信号，第二个模型有关于收听（包括跳过）的信号，而在第三个模型中，我们结合了这两种信号类型（显性和隐性）。
- en: The v4 version of the model is an adaptation of v3, which is implemented in
    runtime with a slight lag in user history, its encoder is 6x smaller than that
    of the v3 model.
  id: totrans-232
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模型的 v4 版本是对 v3 版本的改编，v3 版本在运行时用户历史记录上略有滞后，其编码器大小是 v3 模型的 6 倍小。
- en: The new ARGUS model has eight times the user history length and ten times the
    encoder size. It also uses a new learning process I described earlier.
  id: totrans-233
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 新的 ARGUS 模型具有八倍的用户历史长度和十倍的编码器大小。它还使用了我之前描述的新学习过程。
- en: '![](../Images/a77cf0ffb8d4961d37308a10fa77842f.png)'
  id: totrans-234
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a77cf0ffb8d4961d37308a10fa77842f.png)'
- en: Implementation version dashboard, Image by Author
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 实现版本仪表板，图片由作者提供
- en: TLT is the total listening time. The “like” likelihood represents the chances
    of a user liking a recommendation when it’s shown to them. Each implementation
    resulted in a metrics boost for our user-tailored recommendations. And the first
    ARGUS gave about the same increase in metrics as all the previous implementations
    combined!
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: TLT 是总收听时间。"喜欢"的可能性表示当推荐被展示给用户时，用户喜欢该推荐的机会。每一次实现都为我们的用户定制推荐带来了指标的提升。而且，第一个 ARGUS
    带来的指标提升几乎与所有之前的实现相加的总和一样多！
- en: '![](../Images/350c3b958d73fad0a539f79fa35b4668.png)'
  id: totrans-237
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/350c3b958d73fad0a539f79fa35b4668.png)'
- en: ARGUS Test Results Dashboard, Image by Author
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: ARGUS 测试结果仪表板，图片由作者提供
- en: 'My Vibe also has a special setting, which we use a separate ranking stack for:
    Unfamiliar. We had a separate ARGUS implementation for this setting, achieving
    a 12% increase in total listening time and a 10% growth in likelihood. The Unfamiliar
    setting is used by people who are interested in discovering new recommendations.
    The fact that we experienced a significant increase in this category confirms
    that ARGUS is more effective at handling non-trivial scenarios.'
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 我的 Vibe 也有一个特殊的设置，我们为它使用了一个单独的排名堆栈：不熟悉。我们为这个设置实现了一个单独的 ARGUS，实现了总收听时间 12% 的增长和可能性
    10% 的增长。不熟悉设置是那些对发现新推荐感兴趣的人使用的。我们在这个类别中经历了显著的增长，这证实了 ARGUS 在处理非平凡场景方面更加有效。
- en: We implemented ARGUS in music scenarios on smart devices and successfully increased
    the total time users spend with an active speaker by 0.75%. Here, the final ranker
    is not a gradient boosting model, but a full-scale ranking neural network. Because
    of this, we were able to not only feed a single scalar feature from ARGUS but
    also pass full user and item vectors as input to the final ranker. Compared to
    a single scalar feature, this increased the quality gain by another one and a
    half to two times.
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在智能设备上的音乐场景中实现了 ARGUS，并成功地将用户与活跃扬声器互动的总时间增加了 0.75%。在这里，最终的排序器不是一个梯度提升模型，而是一个全规模的排序神经网络。正因为如此，我们不仅能够从
    ARGUS 提供单个标量特征，还能将完整的用户和项目向量作为输入传递给最终的排序器。与单个标量特征相比，这又提高了质量增益一倍半到两倍。
- en: ARGUS has already been implemented not only as a ranking feature, but also to
    generate candidates. The team has adapted the offline ARGUS into a runtime version.
    These implementations yielded significant gains in key metrics. Neural networks
    are the future of recommender systems but there’s still a long journey ahead.
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: ARGUS 不仅被实现为排序特征，还被用于生成候选者。团队已经将离线的 ARGUS 转换为运行时版本。这些实现显著提高了关键指标。神经网络是推荐系统的未来，但前方还有很长的路要走。
- en: Thank you for reading.
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢您的阅读。
