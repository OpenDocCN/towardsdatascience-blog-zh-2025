- en: 'Use Case 3: Differential Privacy in Federated Learning'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In federated learning, ML models are trained across decentralized devices while
    preserving user privacy. Differential privacy adds noise to gradient updates in
    order to obscure individual contributions across devices. Often, this noise is
    sampled from a discrete distribution and must be modulo-reduced to fit within
    bounded ranges.
  prefs: []
  type: TYPE_NORMAL
- en: 'Suppose a client sends an update *x*, and the server applies a transformation
    of the form *n* ⋅ (*y* + *k*) ≡ *x* (mod *d*), where:'
  prefs: []
  type: TYPE_NORMAL
- en: '*x* is the noisy gradient update sent to the server,'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*y* is the original (or true) gradient update,'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*k* is the noise term (drawn at random from a range of integers),'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*n* is the encoding factor,'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*d* is the modulus (e.g., size of the finite field or quantization range in
    which all operations take place)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Due to the privacy-preserving nature of this setup, the server can only recover
    *y* + *k*, the noisy update, but not the true update *y* itself.
  prefs: []
  type: TYPE_NORMAL
