- en: What Is Data Literacy in 2025? It’s Not What You Think
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 2025年的数据素养是什么？它不是你所想的
- en: 原文：[https://towardsdatascience.com/what-is-data-literacy-in-2025-its-not-what-you-think/](https://towardsdatascience.com/what-is-data-literacy-in-2025-its-not-what-you-think/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/what-is-data-literacy-in-2025-its-not-what-you-think/](https://towardsdatascience.com/what-is-data-literacy-in-2025-its-not-what-you-think/)
- en: <mdspan datatext="el1753891982305" class="mdspan-comment">Have</mdspan> you
    heard that the human attention span is shorter than that of a goldfish?
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1753891982305" class="mdspan-comment">你</mdspan>听说过人类的注意力持续时间比金鱼还短吗？
- en: '**According to Microsoft’s 2015 study, the average human attention span decreased
    from 12 seconds in 2000 to 8 seconds in 2013\. The same report stated (using a
    very straightforward visual) that this fact officially allowed us to supersede
    goldfish, which achieved a whopping result of 9 seconds [1].**'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '**根据微软2015年的研究，人类的平均注意力持续时间从2000年的12秒下降到2013年的8秒。同一份报告还指出（使用一个非常直观的视觉图表），这一事实正式使我们超越了金鱼，金鱼达到了惊人的9秒[1]。**'
- en: Perhaps luckily for us, this claim lacked solid peer-reviewed research and has
    since been criticized. The “goldfish” comparison was used more for shock value
    than for scientific accuracy. The idea that goldfish have a 9-second attention
    span also originates from hype, not rigorous scientific research. As a matter
    of fact, goldfish can remember tasks for months and learn spatial routes [2],
    [3].
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 也许幸运的是，这个说法缺乏坚实的同行评审研究，并且后来受到了批评。“金鱼”的比较更多地是为了引起轰动，而不是科学准确性。金鱼有9秒注意力持续时间的想法也起源于炒作，而不是严格的科学研究。事实上，金鱼可以记住任务数月，并学习空间路线[2]，[3]。
- en: Nevertheless, the authors of that research were not that far away from more
    realistic values. Multiple surveys and reviews indicate that the time we stay
    focused on a single screen has decreased from approximately 2.5 minutes in 2004
    to just about 47 seconds now. The reasons include stress, anxiety, sleep issues,
    and constant notifications, as well as multitasking or constantly checking your
    mobile phone for new messages [4].
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管如此，该研究的作者并没有离更现实的值太远。多项调查和评论表明，我们专注于单个屏幕的时间已经从2004年的大约2.5分钟减少到现在的约47秒。原因包括压力、焦虑、睡眠问题和持续的提醒，以及多任务处理或不断检查手机以获取新消息[4]。
- en: '![](../Images/35aa7c1a332f4554cc799b810c7c517f.png)'
  id: totrans-6
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/35aa7c1a332f4554cc799b810c7c517f.png)'
- en: Image 1\. Photo by [Kabita Darlami](https://unsplash.com/@itskabita?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on [Unsplash](https://unsplash.com/photos/orange-fish-in-fish-tank-H2t6xbDsbvQ?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 图1. 由[Kabita Darlami](https://unsplash.com/@itskabita?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)在[Unsplash](https://unsplash.com/photos/orange-fish-in-fish-tank-H2t6xbDsbvQ?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)拍摄的照片
- en: People are not only able to concentrate for just a few minutes, but they also
    tend to forget what they have heard, sometimes even instantly. We often forget
    birthdays and names; we leave a meeting without recalling what was said; we share
    something and then forget; and so on [5].
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 人们不仅只能集中注意力几分钟，而且他们还倾向于忘记他们所听到的，有时甚至瞬间忘记。我们经常忘记生日和名字；我们离开会议时没有回忆起所说的话；我们分享了一些东西然后忘记了；等等[5]。
- en: Lastly, we easily get discouraged. Give me an obstacle, even a tiny one, and
    I will lose interest and focus. Take the example of Internet pages and e-commerce.
    A page loading 1 second longer results in a 20% drop in conversions [6]. And,
    from my own experience, obstacles like the necessity to pick a delivery method
    that is not optimal can bring it to a complete standstill.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们很容易感到沮丧。给我一个障碍，哪怕是很小的，我也会失去兴趣和专注。以互联网页面和电子商务为例。页面加载时间延长1秒会导致转化率下降20%[6]。而且，根据我的经验，像选择非最佳配送方式这样的障碍可能会使其完全停滞。
- en: '![](../Images/12890578429fa89fc5784a53a91d474a.png)'
  id: totrans-10
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/12890578429fa89fc5784a53a91d474a.png)'
- en: Image 2\. Chart by the author based on [6]
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 图2. 作者基于[6]绘制的图表
- en: What’s in this post?
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 本篇文章内容：
- en: '**Here comes my point: Today, it’s really challenging to capture people’s attention
    and understanding. The longer we need to do that, the more complicated the information
    we want to convey, the bigger the risk that we will fail.**'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: '**我的观点是：今天，真正吸引人们的注意力和理解力是非常具有挑战性的。我们需要做的时间越长，想要传达的信息越复杂，我们失败的风险就越大。**'
- en: In a few of my past articles, I wrote about the concept of data literacy [7]
    and speaking to people who are not data-literate [8].
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 在我过去的一些文章中，我写到了数据素养的概念[7]以及与那些不具备数据素养的人交流[8]。
- en: '**Here, I want to highlight a different kind of paradox: speaking to data-literate
    people who, due to the issues I’ve outlined earlier, often behave as if they were
    data-illiterate.** What does that mean in practice? How do we communicate with
    such audiences in a way that helps them truly understand, stay engaged, interact
    meaningfully with the content, and ultimately make informed decisions?'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: '**在这里，我想强调一种不同类型的悖论：与那些由于我之前概述的问题而常常表现得像数据素养不足的人交流。** 这在实践中意味着什么？我们如何与这样的受众沟通，以便帮助他们真正理解、保持参与、有意义地互动，并最终做出明智的决策？'
- en: I can immediately say this isn’t easy. I often find myself presenting to people
    I know are highly competent, well-versed in data, smart, and experienced. I invest
    time in crafting what I believe is a clear, structured narrative, supported by
    solid data. And yet, I fail to get through.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 我可以立即说这并不容易。我经常发现自己向那些我知道非常胜任、对数据了如指掌、聪明且有经验的人展示。我投入时间精心制作我认为清晰、结构化的叙述，并辅以坚实的数据支持。然而，我未能成功传达。
- en: '**Why does this happen? What am I doing wrong—or not doing yet—that could make
    a difference? What am I planning to change? Let me try to unpack that here.**'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: '**为什么会发生这种情况？我在哪里做错了——或者还没有做到——可以产生影响？我计划改变什么？让我在这里尝试解开这个谜团。**'
- en: What do we use to understand data literacy (and should we still use it)?
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我们用什么来理解数据素养（我们是否应该继续使用它）？
- en: A few years back, data literacy was understood in a relatively narrow, technical
    way. The “old” data literacy concept focused mainly on the ability to read, interpret,
    and manipulate data. It emphasized numeracy, comprehension, and proficiency with
    basic tools, such as using spreadsheets, charts, or statistical methods. A “data-literate”
    person, in that context, might have been a business analyst who could pull reports
    and summarize trends, a student who could interpret a graph in a textbook, a manager
    tracking sales in Excel, or a policymaker reading census data. Storytelling, interaction,
    or audience engagement were rarely part of the conversation. It was mostly about
    technical understanding—not communication, persuasion, or insight.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 几年前，数据素养被理解为相对狭窄、技术性的概念。传统的数据素养概念主要关注阅读、解释和操作数据的能力。它强调数学能力、理解力和对基本工具的熟练使用，例如使用电子表格、图表或统计方法。在那个背景下，“数据素养”的人可能是一位能够生成报告和总结趋势的商业分析师，一位能够解释教科书中的图表的学生，一位在Excel中跟踪销售的管理者，或者一位阅读人口普查数据的政策制定者。讲故事、互动或受众参与很少是讨论的一部分。这主要关于技术理解——而不是沟通、说服或洞察力。
- en: Over time, however, the concept of data literacy has been reshaped. This happened
    in large part due to the popularization of data-driven storytelling by authors
    such as Cole Nussbaumer Knaflic, Brent Dykes, Nancy Duarte, and, to some extent,
    myself. Today, data literacy is no longer just about reading charts or crunching
    numbers; it also includes the ability to frame insights effectively, engage diverse
    audiences, and influence decisions through clear, context-aware narratives.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 随着时间的推移，数据素养的概念已经被重塑。这在很大程度上是由于诸如Cole Nussbaumer Knaflic、Brent Dykes、Nancy Duarte以及在一定程度上我自己这样的作者推广数据驱动叙事的结果。如今，数据素养不再仅仅是阅读图表或处理数字；它还包括有效地构建洞察力、吸引不同受众以及通过清晰、情境感知的叙述来影响决策的能力。
- en: In this modern view, context is not just important—it’s foundational. It decides
    if a given story is a success or not. Today, more data doesn’t mean more clarity.
    That old idea is gone. Now, the focus is on purposeful simplification. It’s about
    meeting audience expectations and using smart narrative design. The goal isn’t
    just to show numbers. It’s to guide decision-makers—so they understand and act
    on what truly matters.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种现代观点中，情境不仅重要，而且是基础性的。它决定了给定故事是否成功。如今，更多的数据并不意味着更多的清晰。那个旧观念已经消失了。现在，重点是目的性的简化。这是关于满足受众期望和利用智能叙事设计。目标不仅仅是展示数字。而是引导决策者——使他们理解和采取真正重要的事情。
- en: Ultimately, a crucial aspect of modern data literacy is striking a balance between
    objectivity and persuasion. Being data-driven doesn’t mean overwhelming people
    with raw facts; it means telling stories that are both truthful and actionable—stories
    that connect data to decisions in a way people can understand and trust.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 最终，现代数据素养的一个关键方面是在客观性和说服力之间取得平衡。以数据驱动并不意味着用原始事实淹没人们；它意味着讲述既真实又可操作的故事——将数据与决策联系起来，使人们能够理解和信任。
- en: '**Modern data literacy isn’t about knowing formulas — it’s about understanding
    what questions to ask.**'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: '**现代数据素养不是关于知道公式——而是关于理解要问什么问题。**'
- en: '**It’s less about math and more about judgment, context, and skepticism. Especially
    now, when AI can make wrong conclusions look polished and convincing, true data
    literacy means thinking beyond the dashboard.**'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: '**这更多关乎判断、背景和怀疑精神，而不是数学。尤其是在现在，当AI可以使错误的结论看起来光鲜亮丽、令人信服时，真正的数据素养意味着要超越仪表盘去思考。**'
- en: Reality of “data literacy”
  id: totrans-25
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: “数据素养”的现实
- en: 'Scenario: a conversation that falls apart'
  id: totrans-26
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 情景：一个破裂的对话
- en: 'I walk into the room of my company’s CEO with confidence. I’ve spent hours
    preparing a clean, data-driven story for her. I took care of context, visualizations,
    and a clear takeaway. I believe I’ve structured it well: the “why,” the numbers,
    the recommendation.'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 我自信地走进公司CEO的办公室。我花了好几个小时为她准备了一个干净、数据驱动的故事。我注意到了背景、可视化以及清晰的结论。我相信我结构得很好：原因、数据、建议。
- en: I start presenting.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 我开始展示。
- en: 'Within a minute, she glances at her phone. Midway through a key insight, she
    interrupts:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 一分钟内，她瞥了一眼手机。在关键洞察的中途，她打断了我：
- en: “Wait—why is this number different from what I saw last week?”
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: “等等——为什么这个数字和上周我看到的不同？”
- en: I shift gears to explain, but in doing so, I derail the flow of my narrative.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 我转换话题来解释，但这样做却打乱了叙述的流畅性。
- en: She asks another question, seemingly unrelated to the topic. I answer, but now
    I’m jumping between slides, losing track of the logic I had so carefully built.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 她问了一个似乎与主题无关的问题。我回答了，但现在我在幻灯片之间跳来跳去，失去了我精心构建的逻辑。
- en: The focus is gone.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 注意力已经转移。
- en: She’s confused.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 她感到困惑。
- en: I’m frustrated.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 我感到沮丧。
- en: She doesn’t care.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 她并不关心。
- en: We both leave the meeting unclear on what was decided—if anything.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 我们俩离开会议时，对决定的内容（如果有的话）并不清楚。
- en: The trap of modern data literacy
  id: totrans-38
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 现代数据素养的陷阱
- en: '**Is it a fake scenario? By all means not. I experienced a very similar situation
    myself, no longer than a few weeks ago.**'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: '**这是一个假情景吗？当然不是。我自己就经历过一个非常类似的情况，不超过几周前。**'
- en: '**And guess what?** I genuinely believed I was perfectly prepared. I had solid,
    verified data, a coherent story, and a clear objective. Everything was structured,
    logical, and relevant. In my mind, it was bulletproof. But when I presented it,
    something went off the rails. Despite my preparation, the meeting fell short of
    expectations. Why?'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: '**而且你知道吗？** 我真的相信我已经准备得非常完美。我有坚实、经过验证的数据，一个连贯的故事，以及一个明确的目标。一切都有条理、逻辑性强且相关。在我心中，这是无懈可击的。但当我展示时，事情出了轨。尽管我做了准备，但会议并未达到预期。为什么？'
- en: '**When data literacy isn’t enough**'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: '**当数据素养不足以支撑时**'
- en: In today’s high-velocity, distraction-heavy workplace, even highly data-literate
    professionals increasingly behave as if they’re data-illiterate. This isn’t due
    to incompetence, but rather the environment in which we all operate. People are
    bombarded with dashboards, KPIs, alerts, and emails across multiple platforms.
    It’s constant noise. The result is cognitive overload—our brains can’t process
    or retain everything, including relevant information.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 在今天这个高速度、充满干扰的工作场所，即使是高度数据素养的专业人士也越来越表现得像数据素养不足。这不是因为无能，而是因为我们所有人所处的环境。人们被仪表盘、KPI、警报和跨多个平台的电子邮件所轰炸。这是持续的噪音。结果是认知过载——我们的大脑无法处理或保留所有信息，包括相关信息。
- en: Furthermore, relentless context switching—from one meeting to the next, from
    strategy to operations, and from product to finance—shatters any ability to focus
    or follow a logical data narrative from start to finish.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，不断的背景切换——从一个会议到下一个，从战略到运营，从产品到财务——破坏了从开始到结束集中注意力和遵循逻辑数据叙述的能力。
- en: 'Even when data is presented clearly and logically, things can still go wrong.
    Why? Because of one of the most underestimated factors in data communication:
    **context**. Misalignment around context is one of the primary reasons good stories
    fail to land [9].'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 即使数据被清晰、逻辑地呈现，事情仍然可能出错。为什么？因为数据沟通中最被低估的因素之一：**背景**。背景的不一致是好的故事未能打动人心的主要原因之一[9]。
- en: 'As presenters, we assume a shared understanding—that our audience knows the
    definitions, remembers past decisions, or views the business landscape in the
    same way we do. However, in reality, our audience may approach the problem from
    a completely different angle: short-term KPIs versus long-term goals, operational
    pain points versus strategic shifts, or simply a different baseline for comparison.
    **So, when they raise questions or challenge assumptions, it’s not because the
    data is wrong—it’s because we’re not speaking their language within their context.**'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 作为演示者，我们假设有一个共同的理解——我们的观众知道定义，记得过去的决策，或者以我们同样的方式看待商业格局。然而，在现实中，我们的观众可能从完全不同的角度来处理问题：短期KPI与长期目标，运营痛点与战略转变，或者简单地不同的比较基准。**因此，当他们对问题提出质疑或挑战假设时，并不是因为数据错误——而是因为我们没有在他们所处的语境中用他们的语言进行交流。**
- en: This misalignment often breaks the flow of the story and undermines trust. Worse
    yet, in high-stakes settings, data can be interpreted not as insight but as confrontation.
    It triggers defensiveness, not dialogue.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 这种不匹配往往破坏了故事的流畅性，并损害了信任。更糟糕的是，在高风险环境中，数据可能被解读为对抗而非洞见。它引发的是防御性，而非对话。
- en: '![](../Images/3a66ae0307e2a7537688bf129f8b4ffb.png)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/3a66ae0307e2a7537688bf129f8b4ffb.png)'
- en: Image 4\. Image generated by the author in ChatGPT.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 图像4。由作者在ChatGPT中生成的图像。
- en: The problem is magnified by the tools we now rely on. With the rise of AI-powered
    platforms like ChatGPT, insights are more accessible than ever. These tools can
    auto-generate summaries, flag anomalies, and even suggest decisions. But they
    also make it easy to mistake automation for understanding.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 问题被我们现在依赖的工具放大了。随着ChatGPT等AI平台的出现，洞见比以往任何时候都更容易获得。这些工具可以自动生成摘要、标记异常，甚至提出决策建议。但它们也使得将自动化误认为是理解变得容易。
- en: 'A clean dashboard or a natural-language summary gives people the illusion of
    clarity. But insight ≠ truth. It is always filtered, modeled, and framed—often
    by machines, sometimes by people. **When we fail to question the assumptions behind
    these insights or skip the necessary context, we fall into what I call fake data
    literacy: we feel informed, but we don’t engage critically with the data.**'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 一个整洁的仪表板或自然语言摘要给人带来清晰的错觉。但洞见≠真相。它总是被过滤、建模和框架化——通常由机器，有时由人完成。**当我们未能质疑这些洞见背后的假设或跳过必要的背景，我们就陷入了所谓的虚假数据素养：我们感觉自己是受信息的，但我们并没有批判性地与数据互动。**
- en: At the same time, business decision-making is becoming increasingly rapid. Speed
    is rewarded; depth is sidelined. Self-service tools promise empowerment but often
    mask complexity, encouraging surface-level interaction. Snap judgments replace
    thoughtful reflection. People are exposed to more data than ever before—but with
    less time, less context, and more risk of misinterpretation.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 同时，商业决策正在变得越来越迅速。速度受到奖励；深度被边缘化。自助工具承诺赋予权力，但往往掩盖了复杂性，鼓励表面层次的互动。快速判断取代了深思熟虑的反思。人们接触到的数据比以往任何时候都多——但时间更少，背景更少，误解的风险更大。
- en: The New Data Literacy
  id: totrans-52
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 新的数据素养
- en: '**In today’s landscape, traditional data skills—such as reading charts, calculating
    metrics, and building dashboards—are no longer enough.** Modern data literacy
    means being able to frame insights, navigate ambiguity, and translate numbers
    into decisions. It’s about understanding the narrative, the emotional and political
    context, and the timing. **It’s about knowing how to challenge AI-generated insights,
    rather than just accepting them.**'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: '**在当今的格局中，传统的数据处理技能——如阅读图表、计算指标和构建仪表板——已经不再足够。** 现代的数据素养意味着能够构建洞见、应对模糊性，并将数字转化为决策。这关乎理解叙事、情感和政治背景，以及时机。**这关乎知道如何挑战AI生成的洞见，而不仅仅是接受它们。**'
- en: '**The new data literacy means:**'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: '**新的数据素养意味着：**'
- en: 'Learning context: understanding who the audience is and what matters to them,'
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 学习背景：理解观众是谁以及什么对他们来说很重要，
- en: Developing the ability to challenge insights, especially those generated by
    algorithms,
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 发展挑战洞见的能力，尤其是那些由算法生成的洞见。
- en: 'Practicing narrative thinking: to guide people, not just inform them,'
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 练习叙事思维：引导人们，而不仅仅是告知他们，
- en: 'Thinking beyond the dashboard: focusing on judgment, relevance, and timing.'
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 超越仪表板思考：关注判断、相关性和时机。
- en: How to build stories with data for (il) literates of today?
  id: totrans-59
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何为今天的数据（非）文盲构建基于数据的故事？
- en: 'All of this might sound solid in theory—and it is. But you might rightly ask:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些都可能在理论上听起来很稳固——而且确实是。但你可以正确地问道：
- en: If you say you were so well prepared in the scenario above, what makes you think
    these strategies will work?
  id: totrans-61
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果你声称在上述情景中准备得很好，是什么让你认为这些策略会奏效？
- en: 'And here’s the honest answer: there’s no guarantee. That’s the beauty—and the
    frustration—of working with people and data in today’s environment. Everything
    I’ve written about—the speed, the unpredictability, the fractured attention—creates
    conditions where things can go off track at any moment. The truth is, the risk
    of misunderstanding or derailment is always high. And the more people in the room
    receiving your story, the greater the odds that something will misfire. Those
    risks don’t just add up—they multiply with every new person in the audience.'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 现在诚实地回答：没有保证。这就是在当今环境中与人合作和数据工作的美丽与挫折。我写下的每一件事——速度、不可预测性、破碎的注意力——都创造了在任何时候都可能脱轨的条件。事实是，误解或脱轨的风险始终很高。房间里接收你故事的人越多，事情出错的可能性就越大。这些风险不仅仅是累加，随着观众中每一个新人的加入，它们还会成倍增加。
- en: Risky or not, I’ve developed a list of practical steps to help maximize chances
    of success. I’ve divided them into two parts. The first focuses on what can be
    done before the meeting — preparation tactics that serve as your best line of
    defense. After all, prevention is always better than a cure. But when things don’t
    go as planned, the second part offers in-the-moment strategies — a kind of emergency
    kit to be used during the meeting or immediately afterward to get things back
    on track.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 无论风险大小，我已经制定了一系列实用步骤来帮助最大化成功的可能性。我将它们分为两部分。第一部分关注会议前的准备工作——作为你最佳防御线的策略。毕竟，预防总是胜于治疗。但当事情没有按计划进行时，第二部分提供即时的策略——一种在会议期间或之后立即使用以恢复正轨的应急包。
- en: 'Modern data literacy: prescriptive measures'
  id: totrans-64
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 现代数据素养：指导性措施
- en: '**Take care of the anchors:** Always make sure the audience knows what they’re
    looking at. Set clear anchors early: what is the scenario, which KPI is under
    review, and what percentage of revenue or annual target is at risk? Without this
    context, people can’t judge the importance of what you’re saying. Anchors provide
    context for numbers and help your audience stay oriented throughout the story.'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: '**关注锚点：**始终确保观众知道他们在看什么。尽早设定清晰的锚点：情景是什么，正在审查哪个关键绩效指标，以及有多少收入或年度目标处于风险之中？没有这个背景，人们无法判断你所说内容的重要性。锚点为数字提供背景，并帮助观众在整个故事中保持方向。'
- en: '**Ensure consistency across your story:** It’s not enough for your data to
    be technically correct—it also needs to align consistently with what’s been shown
    before and with the narrative you’re building. If you reference a number in one
    part of your story and show a different one on the screen—saying, “Oh, that wasn’t
    updated yet, but imagine it’s right”—you immediately lose your audience’s trust
    and attention. These small inconsistencies can be significant distractions, especially
    for individuals already struggling to stay focused. Make sure all numbers, visuals,
    and commentaries are synchronized and up to date, so your story feels coherent,
    credible, and deliberate.'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: '**确保故事的一致性：**你的数据在技术上正确是不够的，它还需要与之前展示的内容以及你正在构建的叙事保持一致。如果你在故事的一部分中引用了一个数字，然后在屏幕上展示了一个不同的数字——说，“哦，那个还没有更新，但想象它是正确的”——你立刻就会失去观众的信任和注意力。这些小的不一致性可能会造成重大的干扰，尤其是对于那些已经努力保持专注的人来说。确保所有数字、视觉和评论都是同步的并且是最新的，这样你的故事才会感觉连贯、可信和深思熟虑。'
- en: '**State goals, key messages, and conclusions:** In a world full of noise, ambiguity
    is your enemy. Make it unmistakably clear why you’re speaking, what the audience
    should take away, and what action is expected. Don’t bury your goal in slides
    or hope they “get it” by the end. Say it up front: “We’re here to decide whether
    to invest in X.” Reiterate key messages as you go, and land clearly on your conclusion.
    For attention-fatigued audiences, clarity isn’t a bonus—it’s a lifeline. When
    your purpose is sharp, your story has direction, and your audience knows how to
    engage.'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: '**陈述目标、关键信息和结论：**在一个充满噪音的世界里，模糊性是你的敌人。明确无误地说明你为什么在说话，观众应该带走什么，以及期望采取什么行动。不要将目标埋在幻灯片中，或者希望他们“最终明白”。一开始就说出：“我们在这里是为了决定是否投资X。”随着你的进行，重复关键信息，并清楚地得出结论。对于注意力疲劳的观众来说，清晰不是加分项，而是生命线。当你的目的明确时，你的故事就有方向，观众也知道如何参与。'
- en: '**Be clear about the point:** Say exactly why you’re there and what you want
    to achieve. For example: “We’re here to decide on X.” State your main message
    early and clearly, and come back to it throughout. Don’t assume people will pick
    it up from context—make it obvious. End with a clear, actionable conclusion. If
    people don’t understand the goal, they won’t follow the story, and they definitely
    won’t act on it.'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: '**明确你的观点：** 清楚地说明你为什么在那里以及你想要实现什么。例如：“我们在这里是为了决定X。”尽早明确地陈述你的主要信息，并在整个过程中重复它。不要假设人们会从上下文中理解——让它明显。以一个明确、可操作的结果结束。如果人们不理解目标，他们就不会跟随故事，更不会采取行动。'
- en: '**Cut off the suspense:** Don’t build up to your point—lead with it. Attention
    is limited, and audiences today don’t have the patience for slow reveals. State
    the key message or insight immediately, then provide the supporting data. If you
    wait too long, you risk losing people before you get there. Make your story easy
    to enter, fast to follow, and quick to grasp.'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: '**切断悬念：** 不要逐步引入你的观点——直接提出。注意力是有限的，今天的观众没有耐心慢慢揭露。立即陈述关键信息或洞察，然后提供支持数据。如果你等得太久，你可能会在到达之前就失去听众。让你的故事容易进入，快速跟随，并且迅速掌握。'
- en: '**Ensure a proper flow:** Build a clear and coherent narrative. Cut the backstory
    down to only what the audience truly needs to understand the point. Lead with
    the core message, and structure your content so it flows logically from insight
    to action. Eliminate distractions and side tracks—they dilute your message.'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: '**确保适当的流程：** 构建一个清晰、连贯的叙事。将背景故事缩减到只有观众真正需要理解观点的部分。以核心信息为起点，并构建你的内容，使其从洞察到行动的逻辑流程。消除干扰和旁枝末节——它们会稀释你的信息。'
- en: '**Validate, crosscheck, practice:** Before you present, stress-test your story.
    Validate your data, double-check key numbers, and make sure everything aligns—from
    your summary to your charts. Crosscheck for consistency: is your language clear,
    are your visuals accurate, and do they all support the same message? Then, practice.
    A dry run helps uncover weak spots, confusing transitions, or moments where your
    audience might get lost. The more you rehearse, the more confident and focused
    you’ll be when it counts.'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: '**验证、交叉检查、练习：** 在你展示之前，对你的故事进行压力测试。验证你的数据，双重检查关键数字，并确保从总结到图表的一切都一致。进行交叉检查以确保一致性：你的语言是否清晰，你的视觉是否准确，并且它们是否都支持相同的信息？然后，进行练习。排练有助于发现弱点、混乱的过渡或观众可能会迷失的时刻。你练习得越多，你在关键时刻就越自信、越专注。'
- en: And lastly, **be a storytelling Yoda:** Clarity, structure, and calm guidance—these
    are your tools. Speak wisely, frame your thoughts carefully, and help others see
    what they need to see. Don’t overwhelm with data dumps or convoluted logic. Instead,
    guide your audience through the story with intention and empathy. Focus not on
    showing how much you know, but on helping them understand what matters.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，**成为一个讲故事的老尤达**：清晰、结构化和冷静的引导——这些是你的工具。明智地说话，仔细构建你的思想，并帮助他人看到他们需要看到的东西。不要用数据堆叠或复杂的逻辑压倒他们。相反，用意图和同理心引导你的观众通过故事。不要专注于展示你有多了解，而要专注于帮助他们理解什么才是重要的。
- en: '![](../Images/26ed091d30d51ecb5b7302fac08342da.png)'
  id: totrans-73
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/26ed091d30d51ecb5b7302fac08342da.png)'
- en: Image 5\. Photo by [Nick Möllenbeck](https://unsplash.com/@nick_moellenbeck?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on [Unsplash](https://unsplash.com/photos/a-statue-of-yoda-in-front-of-a-building-dJEPPwXAk7w?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 图5. 由[Nick Möllenbeck](https://unsplash.com/@nick_moellenbeck?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)在[Unsplash](https://unsplash.com/photos/a-statue-of-yoda-in-front-of-a-building-dJEPPwXAk7w?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)拍摄
- en: 'Modern data literacy: if things don’t go to plan…'
  id: totrans-75
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 现代数据素养：如果事情没有按计划进行……
- en: Okay. Now that you have done your homework, you step into the meeting room,
    and guess what? You get out in  20 minutes with the same result as before.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 好的。现在你已经完成了你的作业，你走进会议室，猜猜看？20分钟后，你带着和之前同样的结果出来了。
- en: Here is what you can do during the meeting, and after it, so that you either
    further reduce the risk, or minimize losses if the bad scenario eventually materializes.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 在会议期间以及之后，你可以做些什么来进一步降低风险，或者如果不良情景最终发生，最小化损失。
- en: During the Meeting
  id: totrans-78
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 会议期间
- en: '**Remember that you still are a Storytelling Yoda.** Above all, don’t panic.
    Remain focused on your goal, keep your composure, and don’t let the pressure shake
    your confidence. **Calm must you stay, my apprentice…**'
  id: totrans-79
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**记住你仍然是一个讲故事的老尤达**。最重要的是，不要慌张。专注于你的目标，保持冷静，不要让压力动摇你的信心。**你必须保持冷静，我的学徒……**'
- en: '**Re-anchor frequently:** Start with your anchors—but don’t stop there. Throughout
    the meeting, remind the audience of the scenario, the KPI at stake, and the business
    impact (e.g., “This puts 12% of our Q3 revenue at risk”). Repeating anchors help
    maintain orientation and reinforce relevance.'
  id: totrans-80
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**频繁重新锚定**：从你的锚点开始——但不要止步于此。在整个会议过程中，提醒听众情景、受影响的KPI和业务影响（例如，“这使我们的第三季度12%的收入面临风险”）。重复锚点有助于保持方向并加强相关性。'
- en: '**Restate the goal when necessary: If the conversation starts to stray, refocus
    it on the original** goal. A simple phrase, such as “Just to refocus us—we’re
    here to decide on X,” can reset attention and clarify next steps.'
  id: totrans-81
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**在必要时重申目标**：如果对话开始偏离，将其重新聚焦到原始**目标**。简单的短语，如“让我们重新聚焦——我们在这里是为了决定X”，可以重置注意力并阐明下一步。'
- en: '**Watch for signals of confusion:** look for cues such as silence, unrelated
    questions, or jumping ahead. These are signs people are lost or disengaged. Pause,
    rewind to the key point, and clarify. Don’t power through confusion—address it
    openly and calmly.'
  id: totrans-82
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**注意混乱的信号**：寻找诸如沉默、无关的问题或跳过关键点等线索。这些都是人们迷失或失去兴趣的迹象。暂停，回放到关键点，并澄清。不要在混乱中强行推进——公开、冷静地处理它。'
- en: '**Use signposting language**. This helps focus minds, especially when attention
    is slipping:'
  id: totrans-83
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**使用指示性语言**。这有助于集中注意力，尤其是在注意力开始分散时：'
- en: “Here’s the key point…”
  id: totrans-84
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: “这里是关键点……”
- en: “This is where we make the call…”
  id: totrans-85
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: “这就是我们做出决定的地方……”
- en: “Now, let’s connect that to the KPI.
  id: totrans-86
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: “现在，让我们将这一点与KPI联系起来。
- en: '**Summarize Often.** Every 5–7 minutes, give a short recap. This supports retention
    and decision-making:'
  id: totrans-87
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**经常总结**。每5-7分钟，进行简短的回顾。这有助于记忆和决策：'
- en: What’s been covered
  id: totrans-88
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 已经讨论的内容
- en: Why it matters
  id: totrans-89
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为什么这很重要
- en: What decision or feedback is needed
  id: totrans-90
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 需要什么决策或反馈
- en: '**Ensure note-taking.** Ensure that someone is taking notes, capturing key
    conclusions and takeaways, and presenting them for final alignment. Eventually,
    you can use an AI script generator (e.g., available in the Zoom app if the meeting
    is held online), but these are not always accurate yet, so I would not rely solely
    on them.'
  id: totrans-91
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**确保做笔记**。确保有人正在做笔记，捕捉关键结论和要点，并最终进行对齐。最终，你可以使用AI脚本生成器（例如，如果会议在线举行，Zoom应用中可用），但这些工具目前并不总是准确，所以我不建议完全依赖它们。'
- en: '**Steer the wave:** Hyper-attentive people with distractions all around them
    tend to drift off-topic easily—and the more senior or important they are, the
    more likely it is to happen. What personally annoys me (if I may share) is that
    when I get sidetracked, they stop me and apologize to the audience on my behalf.
    However, when they derail the discussion, it’s somehow completely acceptable.
    Small frustration—thanks for letting me vent… And apologies for straying from
    the main point… 😊'
  id: totrans-92
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**引导波浪**：周围有各种干扰的超级专注的人容易偏离主题——他们越资深或越重要，这种情况就越可能发生。如果我可以分享的话，让我个人烦恼的是，当我分心时，他们会打断我并向听众为我道歉。然而，当讨论脱轨时，这
    somehow 完全是可以接受的。小小的挫折——感谢让我发泄……还有，为偏离主题道歉……😊'
- en: Anyway, what can you do in such a situation?
  id: totrans-93
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 无论如何，在这种情况下你能做什么？
- en: Stay calm and steer the conversation back without calling anyone out. Use gentle
    framing like, “That’s a great point, and I think we can link it back to…” or “Let
    me quickly tie that to the main KPI we’re discussing…” Your job is to ride the
    wave, not resist it—guide the energy back to the core message, reinforce your
    anchors, and protect the narrative flow without making it personal.
  id: totrans-94
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 保持冷静，引导对话回到正题，不要指责任何人。使用温和的框架，比如，“那是一个很好的观点，我认为我们可以将其与……联系起来”或“让我快速将其与我们在讨论的主要关键绩效指标联系起来……”你的任务是驾驭波浪，而不是抵制它——将精力引导回核心信息，加强你的锚点，并保护叙事流程，同时不要让它变得个人化。
- en: '![](../Images/e0c3388f75487ff317124e2f378c5dc1.png)'
  id: totrans-95
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/e0c3388f75487ff317124e2f378c5dc1.png)'
- en: Image 6\. Photo by [Mark Harpur](https://unsplash.com/@luckybeanz?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on [Unsplash](https://unsplash.com/photos/a-person-surfing-on-the-waves-t7pM60b9cDM?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 图像6. 由[Mark Harpur](https://unsplash.com/@luckybeanz?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)在[Unsplash](https://unsplash.com/photos/a-person-surfing-on-the-waves-t7pM60b9cDM?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)拍摄的照片
- en: After the Meeting
  id: totrans-97
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 会议之后
- en: '**Send a follow-up summary.** Include:'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: '**发送后续总结**。包括：'
- en: The goal of the meeting,
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 会议的目标，
- en: Key data points and anchors
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 关键数据点和锚点
- en: Main conclusion or open questions,
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 主要结论或开放性问题，
- en: Next steps or decisions made.
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 下一步或做出的决策。
- en: Even if the meeting went sideways, a crisp follow-up can reframe the story and
    recover clarity.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 即使会议出了问题，清晰的后续跟进也可以重新构建故事并恢复清晰。
- en: '**Clarify misunderstandings promptly:** If something was misinterpreted or
    challenged, follow up directly. Say, “Let me clarify the data we discussed—I’ve
    cross-checked it, and here’s the exact scenario.” Closing the loop quickly restores
    trust.'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: '**及时澄清误解：** 如果有什么被误解或受到质疑，直接跟进。比如说：“让我澄清我们讨论的数据——我已经交叉检查过，这是确切的情况。”快速关闭循环可以恢复信任。'
- en: '**Document what didn’t land.** Use this insight to revise your materials or
    story for the next time. Take note of:'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: '**记录下没有达到预期的地方。** 使用这些洞察来修改你下一次的材料或故事。注意以下几点：'
- en: Where people got confused
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人们感到困惑的地方
- en: What distracted them
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 他们被什么分心
- en: What questions disrupted the flow
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 哪些问题打乱了流程
- en: '**Book a short debrief (if needed):** If the decision didn’t happen or felt
    unresolved, propose a brief follow-up session with a focused agenda: “I’d like
    15 minutes to close the loop on our discussion. I’ve tightened the key points
    for quicker alignment.”'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: '**如有需要，预订简短的总结会议：** 如果决策没有发生或感觉没有解决，提出一个有针对性的简短后续会议：“我想用15分钟来结束我们的讨论。我已经整理了关键点，以便更快地达成一致。”'
- en: '**Reflect and adjust**. Ask yourself:'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: '**反思并调整**。问问自己：'
- en: Did I lead with the conclusion?
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我是否以结论为开头？
- en: Were my anchors clear and repeated?
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我的锚点是否清晰且重复？
- en: Did the audience have what they needed to act?
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 观众是否拥有了他们需要采取行动的东西？
- en: '**Each meeting is a test—and a chance to sharpen your delivery for next time.**'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: '**每一次会议都是一次测试——也是一次为下次改进演讲的机会。**'
- en: Technology is to help
  id: totrans-115
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 技术是用来帮助的
- en: … but we need to keep it a bit old school.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: …但我们还需要保持一点老式风格。
- en: 'As I was writing all this, one thing struck me: today, we rely heavily on technology—especially
    LLMs and AI agents. And that’s largely a good thing. These tools boost our productivity,
    help us scale, and simplify our lives in countless ways. But no matter how advanced
    they become, they can’t replace the depth of human interaction—real contact, genuine
    emotion, or the tension that emerges in the moment. Great preparation, perfect
    visuals, and even a flawless story won’t land if we forget the “human” part of
    communication. We need to blend timeless skills—such as diligence, accuracy, empathy,
    and emotional awareness—with modern tools that help us analyze and present data
    effectively.'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 在我写这些的时候，有一件事让我印象深刻：今天，我们高度依赖技术——尤其是LLMs和AI代理。这很大程度上是好事。这些工具提高了我们的生产力，帮助我们扩展规模，并以无数种方式简化我们的生活。但无论它们变得多么先进，它们都无法取代人类互动的深度——真正的接触，真诚的情感，或者当下产生的紧张感。即使准备得再好，视觉效果再完美，甚至故事再无懈可击，如果我们忘记了沟通中的“人性”部分，它们也不会奏效。我们需要将永恒的技能——如勤奋、准确性、同理心和情感意识——与现代工具相结合，这些工具帮助我们有效地分析和展示数据。
- en: That doesn’t mean abandoning these modern tools. But it does mean not relying
    on them entirely. Think of it like going to a big concert. Have you been to one
    recently? A major band, a packed venue, the energy buzzing through the crowd?
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 这并不意味着放弃这些现代工具。但这确实意味着不要完全依赖它们。想象一下去一场大型音乐会。你最近去过吗？一个主要的乐队，一个满座的场馆，人群中的能量在沸腾？
- en: Then you’ve probably noticed how many people experience it… through their phone
    screens.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 然后你可能已经注意到很多人是通过他们的手机屏幕来体验它的……
- en: '![](../Images/8b7c08ce078b10f3c2f83d173e5af69d.png)'
  id: totrans-120
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/8b7c08ce078b10f3c2f83d173e5af69d.png)'
- en: Image 7\. Image generated by the author using ChatGPT.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 图7。由作者使用ChatGPT生成的图像。
- en: Personally, I don’t understand it. I prefer to experience the concert in the
    moment—to soak in the music, share the energy with others, maybe even jump around
    (okay, perhaps not me), take in the sights, the sounds, the smells—everything.
    Watching it later on a phone screen doesn’t come close. Maybe 1% of the real experience,
    and even that comes at the cost of missing the moment because I was too busy recording
    it.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 个人来说，我不理解。我更喜欢在当下体验音乐会——沉浸在音乐中，与他人分享能量，也许还会跳起来（好吧，或许不包括我），欣赏风景，声音，气味——一切。在手机屏幕上观看它远远不够。可能只有1%的真实体验，而且即使那样，也是以错过当下的代价为代价，因为我太忙于记录它了。
- en: '**Now, let’s compare that to how concerts felt not so long ago…**'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: '**现在，让我们将这和不久前的音乐会感受进行比较……**'
- en: 'Source: YouTube'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：YouTube
- en: '**See? **Energetic music that gets the huge crowd dancing and jumping.****
    **Musicians use modern instruments and look futuristic. Like those state-of-the-art
    apps and tools we use. And now ask yourself—which version truly carries you away?
    The choice is yours.**'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: '**看吧？** 充满活力的音乐让大量人群跳舞和跳跃。**音乐家使用现代乐器，看起来很未来派。就像我们使用的那些最先进的应用程序和工具一样。现在问问自己——哪个版本真正让你沉浸其中？选择权在你手中。**'
- en: Conclusions
  id: totrans-126
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: Data literacy today is no longer just about interpreting graphs or building
    dashboards; it is also about understanding the underlying concepts and principles.
    It’s about navigating an environment overloaded with data, distractions, and decision
    pressure—where even smart, experienced professionals can behave as if they’re
    data-illiterate. The new data literacy is deeply human, focusing on context, clarity,
    empathy, and judgment. It means knowing what matters to whom, guiding attention,
    and turning information into action. While there’s no guaranteed formula to make
    every data story land, we can raise our odds by simplifying our messages, reinforcing
    meaning, and anticipating distractions. And when things go sideways—as they often
    will—we can adapt, recover, and learn. **Ultimately, the ability to connect people
    with insight defines real data literacy today.**
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 今天的数据素养不再仅仅是解读图表或构建仪表盘；它还涉及到理解背后的概念和原则。这是关于在数据、干扰和决策压力过载的环境中导航——即使聪明、经验丰富的专业人士也可能表现得像数据文盲。新的数据素养深深植根于人性，关注情境、清晰度、同理心和判断力。这意味着了解什么对谁重要，引导注意力，并将信息转化为行动。虽然没有保证的公式能让每个数据故事都成功，但我们可以通过简化信息、强化意义和预见干扰来提高成功的几率。当事情变得不顺利——这通常是会发生的情况——我们可以适应、恢复并学习。**最终，将洞察力与人连接的能力定义了今天真正的数据素养。**
