- en: Rethinking Data Science Interviews in the Age of AI
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 在人工智能时代重新思考数据科学面试
- en: 原文：[https://towardsdatascience.com/rethinking-data-science-interviews-in-the-age-of-ai/](https://towardsdatascience.com/rethinking-data-science-interviews-in-the-age-of-ai/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/rethinking-data-science-interviews-in-the-age-of-ai/](https://towardsdatascience.com/rethinking-data-science-interviews-in-the-age-of-ai/)
- en: 'AI is [rewriting the day-to-day of data scientists](https://towardsdatascience.com/how-ai-is-rewriting-the-day-to-day-of-data-scientists/).
    <mdspan datatext="el1751648340944" class="mdspan-comment">To stay competitive</mdspan>,
    data scientists must learn how to improve productivity and unlock new possibilities
    with AI. Meanwhile, this transformation also poses a challenge to hiring managers:
    how to find the best talent that will thrive in the AI era? One critical step
    in building a strong AI-empowered data team is to revamp the hiring process to
    better evaluate candidates’ ability to work alongside AI.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能正在[重新定义数据科学家日常的工作](https://towardsdatascience.com/how-ai-is-rewriting-the-day-to-day-of-data-scientists/).
    <mdspan datatext="el1751648340944" class="mdspan-comment">为了保持竞争力</mdspan>，数据科学家必须学习如何利用人工智能提高生产力和解锁新的可能性。同时，这种转型也给招聘经理带来了挑战：如何找到能在人工智能时代茁壮成长的最佳人才？构建一个强大的由人工智能赋能的数据团队的关键一步是改革招聘流程，以更好地评估候选人与人工智能协同工作的能力。
- en: In this article, I will share my perspective on how data scientist interviews
    should (would) evolve in the age of AI. While my focus here is on Data Scientist
    Analytics (DSA) roles, the ideas here also apply to other data positions, such
    as Machine Learning Engineers (MLE).
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我将分享我对在人工智能时代数据科学家面试应该如何（将会）演变的看法。虽然我的重点在这里是数据科学家分析（DSA）角色，但这里的思想也适用于其他数据职位，例如机器学习工程师（MLE）。
- en: '* * *'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: I. The Traditional Data Scientist Interview Loop
  id: totrans-5
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: I. 传统数据科学家面试循环
- en: 'Before talking about how things will change, let’s go through the current structure
    of data scientist interviews. Aside from the initial recruiter call and hiring
    manager screening, a typical data scientist interview process includes:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在讨论事情将如何改变之前，让我们先了解一下数据科学家面试的当前结构。除了最初的招聘人员电话和招聘经理筛选外，典型的数据科学家面试流程包括：
- en: '**Coding interviews**: SQL or Python coding questions to test syntax and basic
    logic.'
  id: totrans-7
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**编码面试**：SQL或Python编码问题，用于测试语法和基本逻辑。'
- en: '**Statistics interviews**: Statistics and probability questions, as well as
    the most common statistical applications in data science workflows, such as A/B
    testing and causal inference.'
  id: totrans-8
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**统计学面试**：统计学和概率问题，以及数据科学工作流程中最常见的统计应用，如A/B测试和因果推断。'
- en: '**Machine learning interviews**: Deep dive into machine learning algorithms,
    experiences, and cases.'
  id: totrans-9
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**机器学习面试**：深入探讨机器学习算法、经验和案例。'
- en: '**Business case interviews**: Discuss a hypothetical problem to test analytical
    thinking and business understanding — metrics, funnels, growth, retention strategies,
    and analytical approaches.'
  id: totrans-10
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**商业案例面试**：讨论一个假设性问题，以测试分析思维和商业理解——指标、漏斗、增长、保留策略和分析方法。'
- en: '**Behavioral interviews**: Standard “walk me through a project / a time when
    you XXX” to understand how candidates handle specific situations and if they are
    a cultural fit.'
  id: totrans-11
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**行为面试**：标准的“请描述一个项目/一个你XXX的时刻”来了解候选人如何处理特定情况以及他们是否适合企业文化。'
- en: '**Cross-functional interviews**: Data Scientist is a technical role, but it
    is also highly cross-functional, aiming to drive real business impact using data.
    Therefore, many data scientist interview loops today include a cross-functional
    interview round to chat with a business partner to assess the domain knowledge,
    communication skills, and stakeholder collaboration.'
  id: totrans-12
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**跨职能面试**：数据科学家是一个技术角色，但它也是一个高度跨职能的角色，旨在通过数据驱动真正的商业影响。因此，今天许多数据科学家面试循环包括一个跨职能面试环节，与业务伙伴交谈，以评估领域知识、沟通技能和利益相关者协作能力。'
- en: From the list above, you can see that data scientist interviews usually have
    a good mix of technical and non-technical evaluations. But with AI entering the
    game, some of these interviews will change significantly, while some will become
    even more important. Let’s break it down.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 从上面的列表中，你可以看到数据科学家面试通常有很好的技术性和非技术性评估的结合。但随着人工智能的加入，其中一些面试将发生显著变化，而另一些则变得更加重要。让我们逐一分析。
- en: '* * *'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: II. How Interviews Will Shift in the Age of AI
  id: totrans-15
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: II. 在人工智能时代面试将如何转变
- en: 'In my opinion, how the interview loops are going to change depends on two things:
    1\. Can AI handle the task quickly? 2\. Does it tell how the candidate uses AI
    thoughtfully?'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 在我看来，面试流程将如何改变取决于两个因素：1. AI能否快速处理任务？2. 它是否能够展示候选人如何深思熟虑地使用AI？
- en: '**Coding Interviews: Most Likely to Change First**'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: '**编码面试：最有可能首先改变**'
- en: What can AI do quickly? Simple coding tasks. Therefore, the **coding interview**
    is probably the first one to be impacted.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: AI能快速做什么？简单的编码任务。因此，**编码面试**可能是首先受到影响的一个。
- en: Today’s coding interviews ask candidates to write SQL and Python code correctly.
    The SQL questions usually require simple joins, CTEs, aggregations, and window
    functions. And the Python questions could be straightforward data manipulation
    with pandas and numpy, or easy LeetCode-style questions. But let’s be honest,
    these interview questions can be solved by AI easily today. In [my article](https://towardsdatascience.com/chatgpt-vs-claude-vs-gemini-for-data-analysis-part-1-821086810318/)
    one year ago, I evaluated how ChatGPT, Claude, and Gemini perform in simple SQL
    tasks, and was impressed already by all three — Claude 3.5 Sonnet even got full
    points in my test.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 当前的编码面试要求候选人正确编写SQL和Python代码。SQL问题通常需要简单的连接、CTEs、聚合和窗口函数。Python问题可能是使用pandas和numpy的直接数据操作，或者简单的LeetCode风格问题。但让我们说实话，这些面试问题现在很容易被AI解决。在我的文章[《ChatGPT
    vs Claude vs Gemini for Data Analysis - Part 1》](https://towardsdatascience.com/chatgpt-vs-claude-vs-gemini-for-data-analysis-part-1-821086810318/)中，我一年前评估了ChatGPT、Claude和Gemini在简单SQL任务上的表现，并对三者都印象深刻——Claude
    3.5 Sonnet在我的测试中甚至得到了满分。
- en: Let’s take one step back. For data scientists, the real coding challenge today
    comes from 1\. Understanding the data and locating the correct tables and fields;
    2\. Translating your data questions into the correct query/code. In other words,
    today’s coding interviews mostly test basic syntax, which might be fair for entry-level
    candidates, but have been failing to evaluate actual problem-solving for a long
    time, even without the evolution of AI. The fact that AI can answer them quickly
    only makes this round even more outdated.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们退一步。对于数据科学家来说，今天的真正编码挑战来自1. 理解数据和定位正确的表和字段；2. 将你的数据问题转化为正确的查询/代码。换句话说，今天的编码面试主要测试基本语法，这可能对入门级候选人来说是公平的，但长期以来一直未能评估实际解决问题的能力，即使没有AI的演变。AI能够快速回答这些问题的事实，使得这一轮面试更加过时。
- en: So, how can we make the coding interviews more meaningful? **I think, firstly,
    we should allow candidates to use AI tools like GitHub Copilot or Cursor during
    the coding interview to mimic the new work environment with AI.** I have seen
    this happening gradually in the industry. For example, [Canva introduced AI-assisted
    coding interviews](https://www.canva.dev/blog/engineering/yes-you-can-use-ai-in-our-interviews/)
    recently, and [Greenhouse also says](https://www.greenhouse.com/guidelines-for-using-ai-in-our-interviewing-process),
    “*We welcome transparent use of generative AI in the interview process for certain
    roles with the expectation that candidates can thoroughly explain the prompts
    they create and/or discuss in-depth the technical decisions they make.*” I think
    allowing candidates to use AI is better than trying every means to prevent them
    from cheating with AI, as they will use (and are expected to use) AI at work anyway
    :).
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，我们如何让编码面试更有意义呢？**我认为，首先，我们应该允许候选人在编码面试中使用像GitHub Copilot或Cursor这样的AI工具，以模拟带有AI的新工作环境。**我注意到这一现象在业界逐渐发生。例如，[Canva最近推出了AI辅助编码面试](https://www.canva.dev/blog/engineering/yes-you-can-use-ai-in-our-interviews/)，[Greenhouse也表示](https://www.greenhouse.com/guidelines-for-using-ai-in-our-interviewing-process)，“*我们欢迎在面试过程中透明地使用生成式AI，特别是对于某些角色，我们期望候选人能够彻底解释他们创建的提示，或者深入讨论他们做出的技术决策。*”我认为允许候选人使用AI比试图阻止他们使用AI作弊的任何手段都要好，因为他们在工作时无论如何都会使用（并被期望使用）AI
    :)。
- en: 'Meanwhile, instead of asking simple SQL/Python questions, I have a couple of
    ideas:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 同时，而不是询问简单的SQL/Python问题，我有一些想法：
- en: Ideally, we could set up an environment with multiple documented tables and
    ask the candidates to do a live problem-solving session with the help of AI. Instead
    of asking questions like “write a query to calculate MAU since 2024”, ask more
    open-ended questions like “how would you investigate customer churn since 2024?”.
    The evaluation will not only be based on code accuracy, but also on how the candidates
    frame their analysis and interpret the results. And when the candidate interacts
    with the AI tool, how do they prompt, iterate, and evaluate the output. Though
    this does make interviewers’ lives harder — they will have to be very familiar
    with the datasets and be able to follow the candidates’ logic, ask follow-up questions,
    and assess the responses.
  id: totrans-23
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 理想情况下，我们可以设置一个包含多个文档化表格的环境，并要求候选人在AI的帮助下进行现场问题解决会议。与其询问“编写一个查询来计算自2024年以来的MAU”，不如提出更开放的问题，例如“你将如何调查自2024年以来的客户流失情况？”。评估不仅基于代码的准确性，还包括候选人如何构建他们的分析和解释结果。而且当候选人与AI工具互动时，他们如何提示、迭代和评估输出。尽管这确实让面试官的生活变得更难——他们必须非常熟悉数据集，能够跟随候选人的逻辑，提出后续问题，并评估回应。
- en: Alternatively, we can ask candidates to evaluate the AI outputs — this is probably
    easier to set up and less stressful and time-consuming than the above format.
    While AI can help with coding, it’s still humans’ responsibility to evaluate the
    output. Not every AI-generated code is correct, even if it runs without errors.
    The interviewer can describe what they are trying to do and show AI-generated
    code, then ask the candidates to identify if the logic is correct, if it ignores
    any edge cases, if there is any better alternatives, or if the code can be optimized
    further — this requires the candidate to fully understand how to translates between
    the business logic and the code. It is also easier to design a standard rubric
    with this problem setup.
  id: totrans-24
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 或者，我们可以要求候选人评估AI的输出——这或许比上述格式更容易设置，且压力和时间消耗更少。虽然AI可以帮助进行编码，但评估输出的责任仍然在人类。并非所有由AI生成的代码都是正确的，即使它运行时没有错误。面试官可以描述他们试图做什么，并展示AI生成的代码，然后要求候选人判断逻辑是否正确，是否忽略了任何边缘情况，是否有更好的替代方案，或者代码是否可以进一步优化——这要求候选人完全理解如何将业务逻辑与代码之间进行转换。使用这种问题设置也更容易设计一个标准的评分标准。
- en: '**Statistics and Machine Learning Interviews: Less Theory, More Context**'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: '**统计学与机器学习面试：减少理论，增加上下文**'
- en: Next, let’s talk about **statistics** and **machine learning interviews**. AI
    is a great teacher — it explains basic stats and machine learning concepts clearly
    and can help brainstorm different methodologies — try asking ChatGPT, “explain
    p-value to me like I am five”. However, knowing the theories doesn’t always mean
    applying the appropriate methods based on business scenarios. You can find a good
    example in my [Google Data Science Agent evaluation article](https://towardsdatascience.com/googles-data-science-agent-can-it-really-do-your-job/)
    — it does a great job setting up a modeling framework with functional starter
    code, but it requires a clear problem statement and a clean dataset. Human expertise
    is also necessary for feature engineering, choosing the best domain-specific data
    science practices, and tuning the models. Keeping that in mind, I think statistics
    and machine learning interviews should **ask fewer theoretical questions or coding
    models from scratch, but integrate more with business case interviews to test
    if the candidates can apply theories to a business context.** So instead of asking
    isolated questions like “What’s the difference between Ridge and Lasso Regression?”
    or “How to calculate the sample size for an A/B test?”, present a real-world problem
    and observe how the candidates approach the questions analytically, if the proposed
    methods make sense, and if they communicate their ideas logically. It’s not like
    we no longer need the candidates to have solid stats and ML knowledge, but we
    will test the knowledge more seamlessly in the case discussion. For example, when
    going through a hypothetical fraud detection case, we can ask why the candidate
    proposes XGBoost over Random Forest, and if it is better to impute missing values
    in household income as the median or zero.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，让我们谈谈**统计学**和**机器学习面试**。人工智能是一位伟大的老师——它清晰地解释了基本的统计学和机器学习概念，并能帮助构思不同的方法——试着问ChatGPT，“像对我五岁孩子一样解释p值”。然而，知道理论并不总是意味着根据商业场景应用适当的方法。你可以在我的[谷歌数据科学代理评估文章](https://towardsdatascience.com/googles-data-science-agent-can-it-really-do-your-job/)中找到一个很好的例子——它用功能启动代码设置了一个建模框架，但需要明确的问题陈述和干净的数据集。人类专业知识对于特征工程、选择最佳领域特定的数据科学实践以及调整模型也是必要的。考虑到这一点，我认为统计学和机器学习面试应该**减少理论问题或从头开始编写代码模型，但更多地与商业案例面试结合，以测试候选人是否能够将理论应用于商业环境**。因此，与其问一些孤立的问题，比如“岭回归和Lasso回归有什么区别？”或者“如何计算A/B测试的样本量？”，不如提出一个现实世界的问题，观察候选人如何分析问题，所提出的方法是否合理，以及他们是否能够逻辑地表达自己的想法。我们并不是不再需要候选人具备扎实的统计学和机器学习知识，但在案例讨论中我们将更加无缝地测试这些知识。例如，在处理一个假设的欺诈检测案例时，我们可以问候选人为什么提出使用XGBoost而不是随机森林，以及是否应该用中位数还是零来填补家庭收入的缺失值。
- en: The good news is we’ve already seen many of these technical + business case
    interviews in the industry. My prediction is that AI will make it even more predominant.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 好消息是，我们已经在业界看到了许多这些技术+商业案例面试。我的预测是，人工智能将使它变得更加普遍。
- en: '**Behavioral & Cross-functional Interviews: Mostly Unchanged, But With New
    Twists**'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: '**行为面试和跨职能面试：基本不变，但有新的变化**'
- en: For the remaining two interview types, **behavioral interviews** and **cross-functional
    interviews**, they will likely stay here. They evaluate the candidates’ soft skills,
    such as cross-functional collaboration, communication, conflict resolution, and
    ownership, as well as their domain knowledge. These are the things AI cannot replace.
    However, there could be some shifts in what questions people ask. Interviewers
    can add questions about the candidates’ past experience with AI tools to get more
    signal on how they use AI to boost productivity and solve problems. For example,
    a product manager might ask, “How can we use AI to improve customer onboarding?”
    These conversations can surface the candidates’ ability to identify AI use cases
    that drive real business value.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 对于剩下的两种面试类型，**行为面试**和**跨职能面试**，它们可能会保持不变。它们评估候选人的软技能，如跨职能协作、沟通、冲突解决和所有权，以及他们的领域知识。这些都是人工智能无法替代的东西。然而，人们提出的问题可能会有一些变化。面试官可以添加关于候选人过去使用AI工具的经验的问题，以获取更多关于他们如何使用AI提高生产力和解决问题的信号。例如，产品经理可能会问，“我们如何使用AI来改善客户入职？”这些对话可以揭示候选人识别能够驱动真实商业价值的AI用例的能力。
- en: '**Take-home Assignments: Still Controversial, But Useful**'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: '**带回家的作业：仍有争议，但很有用**'
- en: Besides these common interview formats, there is also a controversial one that
    comes up in data science interview loops from time to time — **Take-home assignments**.
    It is usually in the format of providing a dataset and asking the candidates to
    do an analysis or build a model. Sometimes there are guiding questions, sometimes
    not. Deliverables range from a Jupyter notebook to a polished slide deck.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 除了这些常见的面试格式之外，还有一种有争议的格式，它不时出现在数据科学面试循环中——**带回家做的作业**。它通常是以提供数据集并要求候选人进行分析或构建模型的形式。有时会有指导性问题，有时则没有。交付成果从Jupyter笔记本到精炼的演示文稿不等。
- en: I know there are candidates who really hate it. It takes a lot of effort — though
    recruiters always say average candidates take about 4 hours, the actual time you
    spend is usually significantly longer, as you want to be comprehensive and showcase
    your best work. And what makes it worse is, the candidates may just end up being
    rejected without the opportunity to even talk to the team — how frustrating! Unsurprisingly,
    I heard from my team’s recruiter a while back that take-home assignment leads
    to a high drop-off rate in the hiring process (so we removed it).
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 我知道确实有一些候选人非常讨厌这个过程。这需要付出很多努力——尽管招聘人员总是说平均候选人需要大约4个小时，但实际花费的时间通常要长得多，因为你希望做到全面并展示你最好的工作。更糟糕的是，候选人可能最终连与团队交谈的机会都没有就被拒绝了——多么令人沮丧！不出所料，我之前从我们团队的招聘人员那里听说，带回家做的作业导致招聘过程中的流失率很高（所以我们取消了这一环节）。
- en: But take-home assignments do have value. It tests end-to-end skills from problem
    framing, coding, writing, to presentation. And the nature of working with your
    local environment with your preferred tools now means you can seek AI’s help to
    complete the assignment faster and better! Therefore, take-home assignments can
    easily evolve and become more common in this new era, with higher expectations
    for depth, interpretation, and originality. The challenge, though, is for hiring
    managers to come up with an assignment that AI cannot easily solve or will only
    generate the minimum acceptable solution. For example, a simple data manipulation
    task will not be appropriate, but an open-ended question that requires making
    assumptions based on domain knowledge, tradeoff discussion, and prioritization
    will work better. And a follow-up live interview is always helpful to validate
    the understanding.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 但带回家做的作业确实有价值。它测试了从问题定义、编码、写作到演示的全过程技能。现在，使用你喜欢的工具在你的本地环境中工作，意味着你可以寻求人工智能的帮助，更快、更好地完成作业！因此，在这个新时代，带回家做的作业可以很容易地发展和变得更加普遍，对深度、解释和原创性的期望也会更高。然而，挑战在于招聘经理要设计出人工智能难以轻易解决或只能生成最低可接受解决方案的作业。例如，简单的数据处理任务是不合适的，但需要基于领域知识做出假设、进行权衡讨论和优先级排序的开放式问题会更好。而且，后续的现场面试总是有助于验证理解。
- en: 'Now let’s summarise the traditional interview formats vs. the new formats under
    the AI era:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们总结一下在AI时代下，传统面试格式与新型格式的对比：
- en: '| **Interview Format** | **Traditional Format** | **AI-Resilient/AI-Empowered
    Format** |'
  id: totrans-35
  prefs: []
  type: TYPE_TB
  zh: '| **面试格式** | **传统格式** | **AI弹性/AI赋能格式** |'
- en: '| SQL/Python Coding | Syntax-focused questions on data manipulation or easy
    LeetCode-style algorithm questions. | Allow AI use. Shift towards AI-assisted
    live problem-solving, or ask the candidates to evaluate the AI outputs.  |'
  id: totrans-36
  prefs: []
  type: TYPE_TB
  zh: '| SQL/Python 编码 | 数据操作或简单的LeetCode风格算法问题的语法重点问题。 | 允许使用AI。转向AI辅助的现场问题解决，或要求候选人评估AI输出。
    |'
- en: '| Statistics and Machine Learning | Theoretical questions or building models
    from scratch. | Evaluate statistical thinking in a business context. Use business
    scenarios to assess method choice, assumptions, and tradeoffs. |'
  id: totrans-37
  prefs: []
  type: TYPE_TB
  zh: '| 统计学和机器学习 | 理论问题或从头开始构建模型。 | 在商业环境中评估统计思维。使用商业场景来评估方法选择、假设和权衡。 |'
- en: '| Business Case Interviews | Discuss growth, funnel metrics, and retention
    strategy in hypothetical setups. | Greater integration with stats/ML. Evaluate
    the candidate’s ability to frame problems and apply the right tools. |'
  id: totrans-38
  prefs: []
  type: TYPE_TB
  zh: '| 商业案例面试 | 在假设的设置中讨论增长、漏斗指标和保留策略。 | 与统计/ML有更大的整合。评估候选人构建问题和应用正确工具的能力。 |'
- en: '| Behavioral and Cross-functional Interviews | Assess communication, stakeholder
    collaboration, domain knowledge, and cultural fit. | Same structure, but potentially
    new questions on AI experiences and use cases. |'
  id: totrans-39
  prefs: []
  type: TYPE_TB
  zh: '| 行为和跨职能面试 | 评估沟通、利益相关者协作、领域知识和文化适应性。 | 同样的结构，但可能包含关于AI经验和用例的新问题。 |'
- en: '| Take-home Assignments | Analyze data or build a model. It can be time-consuming.
    | AI-assisted submissions are allowed or expected. Open-ended assignment that
    will focus on depth, originality, and judgment. |'
  id: totrans-40
  prefs: []
  type: TYPE_TB
  zh: '| 带回家的作业 | 分析数据或构建模型。这可能需要花费大量时间。 | 允许或预期使用AI辅助提交。开放式作业将侧重于深度、原创性和判断。|'
- en: '* * *'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: III. What This Means for Candidates
  id: totrans-42
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: III. 这对求职者意味着什么
- en: Above is my take on how data scientist interview loops will transform under
    the age of AI. However, these shifts may still take a while to happen, especially
    at large companies with a standardized and well-established recruiting process.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是我在AI时代数据科学家面试流程将如何转变的看法。然而，这些转变可能还需要一段时间才能发生，尤其是在那些拥有标准化和成熟招聘流程的大型公司中。
- en: So, what should the candidates do to prepare themselves better ahead of time?
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，求职者应该提前做些什么来更好地准备自己呢？
- en: '**Know when and how to use AI thoughtfully**. As companies start to allow the
    use of AI and even evaluate how you use AI during interviews, understanding how
    to use it thoughtfully becomes critical. Don’t just prompt and paste. You should
    understand what AI does well and where it falls short, and how to evaluate the
    outputs. Not to mention that AI is also a super helpful tool in interview preparation.
    It can help you understand the position better, set up a preparation plan, and
    do mock interviews — I can write a whole article on this (maybe next time).'
  id: totrans-45
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**了解何时以及如何审慎地使用AI**。随着公司开始允许使用AI，甚至在面试中评估您如何使用AI，理解如何审慎地使用它变得至关重要。不要只是提示和粘贴。您应该了解AI擅长什么，以及它的不足之处，以及如何评估输出。更不用说AI在面试准备中也是一个超级有用的工具。它可以帮助您更好地理解职位，制定准备计划，并进行模拟面试——我可以就这一点写一整篇文章（也许下次吧）。'
- en: '**Understand the business deeply**. Now that technical skills are getting easier
    with AI assistance, business understanding and domain knowledge become the key
    for a candidate to stand out. Therefore, everyone should collaborate more with
    stakeholders at work to develop their business knowledge. And when you prepare
    for interviews, spend time doing company research to understand its product —
    what would be the key metrics, how to grow the product further with data, and
    what should be the retention strategy.'
  id: totrans-46
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**深入理解业务**。随着AI辅助使得技术技能变得更容易，业务理解和领域知识成为求职者脱颖而出的关键。因此，每个人都应该与工作中的利益相关者更多合作，以发展他们的业务知识。在准备面试时，花时间进行公司研究，了解其产品——关键指标是什么，如何利用数据进一步增长产品，以及应该采取什么样的留存策略。'
- en: Thanks for reading! If you’re a hiring manager, I’d love to hear how your team
    is adapting. And if you’re a candidate, I hope this helps you prepare smarter
    for the future of interviews.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢阅读！如果您是招聘经理，我很乐意听听您的团队是如何适应这一变化的。如果您是求职者，希望这篇文章能帮助您为未来的面试做更明智的准备。
