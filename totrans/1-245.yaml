- en: 'TDS Newsletter: To Better Understand AI, Look Under the Hood'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/tds-newsletter-to-better-understand-ai-look-under-the-hood/](https://towardsdatascience.com/tds-newsletter-to-better-understand-ai-look-under-the-hood/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Never miss a new edition of *The Variable*, our weekly newsletter featuring
    a top-notch selection of editors’ picks, deep dives, community news, and more.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[Subscribe today](https://newsletter.towardsdatascience.com/subscription-to-the-newsletter)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[AI-powered tools](https://towardsdatascience.com/tag/generative-ai/) tend
    to generate extreme reactions: on one side we have the “It’s magic!” and “best
    thing ever!” crowd. On the other, we find the “we’re doomed!” camp. These aren’t
    static or monolithic groups, of course. You might even find yourself on both ends
    of the spectrum — in the span of a single day.'
  prefs: []
  type: TYPE_NORMAL
- en: We think the best way to resist hyperbole is to look at how LLMs (and the products
    they’ve made possible) work, and how they don’t; what they can achieve, and where
    they continue to struggle.
  prefs: []
  type: TYPE_NORMAL
- en: For nuanced approaches to the inner workings of AI tools, we invite you to explore
    this week’s highlights. You’ll see more than a few myths busted, and even more
    insights gained.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 'Generative AI Myths, Busted: An Engineer’s Quick Guide'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Faced with frequent questions (and increasing dread) about the role and impact
    of AI, [Amy Ma](https://towardsdatascience.com/author/amyma101/) wanted to make
    it clear to her engineering colleagues what the fuss is all about. The result
    is a clear, accessible, and levelheaded primer on a technology that even seasoned
    industry vets sometimes struggle to understand.
  prefs: []
  type: TYPE_NORMAL
- en: '[Generative AI Myths, Busted: An Engineer’s Quick Guide](https://towardsdatascience.com/gen-ai-myths-busted-a-engineerss-quick-guide/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Deploying AI Safely and Responsibly
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: What does it take to build trustworthy AI applications? Stephanie Kirmer and
    several of her recent IEEE co-panelists take an incisive and pragmatic look at
    some of the most enduring myths surrounding AI ethics and its day-to-day challenges,
    from observability to governance.
  prefs: []
  type: TYPE_NORMAL
- en: '[Deploying AI Safely and Responsibly](https://towardsdatascience.com/deploying-ai-safely-and-responsibly/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'RAG Explained: Understanding Embeddings, Similarity, and Retrieval'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Retrieval-augmented generation has been with us for quite a while now, but some
    of its components remain under-examined. Maria Mouschoutzi’s latest explainer
    addresses some common knowledge gaps.
  prefs: []
  type: TYPE_NORMAL
- en: '[RAG Explained: Understanding Embeddings, Similarity, and Retrieval](https://towardsdatascience.com/rag-explained-understanding-embeddings-similarity-and-retrieval/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
