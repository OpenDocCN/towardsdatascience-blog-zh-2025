- en: Training process or hyper-parameter tuning of Transformers.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How Tensors Act Within Transformers
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'A Transformer consists of two main components:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Encoder:** Processes input data, capturing contextual relationships to create
    meaningful representations.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Decoder:** Utilizes these representations to generate coherent output, predicting
    each element sequentially.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Tensors are the fundamental data structures that go through these components,
    experiencing multiple transformations that ensure dimensional coherence and proper
    information flow.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/11f1512db5db4bb0b5119dc35c8d9395.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Image From Research Paper: Transformer standard archictecture'
  prefs: []
  type: TYPE_NORMAL
- en: Input Embedding Layer
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Before entering the Transformer, raw input tokens (words, subwords, or characters)
    are converted into dense vector representations through the **embedding layer**.
    This layer functions as a lookup table that maps each token vector, capturing
    semantic relationships with other words.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/8abc1af375b791f6defe6ca274c6ee61.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Image by author: Tensors passing through Embedding layer'
  prefs: []
  type: TYPE_NORMAL
- en: 'For a batch of five sentences, each with a sequence length of 12 tokens, and
    an embedding dimension of 768, the tensor shape is:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Tensor shape:** `[batch_size, seq_len, embedding_dim] → [5, 12, 768]`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: After embedding, **positional encoding** is added, ensuring that order information
    is preserved without altering the tensor shape.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/6046cf16afcb2518578d91f61ae32a54.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Modified Image from Research Paper: Situation of the workflow'
  prefs: []
  type: TYPE_NORMAL
- en: Multi-Head Attention Mechanism
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'One of the most critical components of the Transformer is the **Multi-Head
    Attention (MHA) mechanism**. It operates on three matrices derived from input
    embeddings:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Query (Q)**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Key (K)**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Value (V)**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'These matrices are generated using learnable weight matrices:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Wq, Wk, Wv** of shape `[embedding_dim, d_model]` (e.g., `[768, 512]`).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The resulting Q, K, V matrices have dimensions
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`[batch_size, seq_len, d_model]`.'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '![](../Images/6bc18d7b77b81e0b27ceaff69c2dad5c.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Image by author: Table showing the shapes/dimensions of Embedding, Q, K, V tensors'
  prefs: []
  type: TYPE_NORMAL
- en: Splitting Q, K, V into Multiple Heads
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'For effective parallelization and improved learning, MHA splits Q, K, and V
    into multiple heads. Suppose we have 8 attention heads:'
  prefs: []
  type: TYPE_NORMAL
- en: Each head operates on a subspace of `d_model / head_count`.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/1aa97565937b3dfcad42c274faaac3d7.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Image by author: Multihead Attention'
  prefs: []
  type: TYPE_NORMAL
- en: The reshaped tensor dimensions are `[batch_size, seq_len, head_count, d_model
    / head_count]`.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Example: `[5, 12, 8, 64]` → rearranged to `[5, 8, 12, 64]` to ensure that each
    head receives a separate sequence slice.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/bf6fa5b3012fcaba85c63d2d1537597e.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Image by author: Reshaping the tensors'
  prefs: []
  type: TYPE_NORMAL
- en: So each head will get the its share of Qi, Ki, Vi
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/6ce91211197f7fae964dde46f698b66d.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Image by author: Each Qi,Ki,Vi sent to different head'
  prefs: []
  type: TYPE_NORMAL
- en: Attention Calculation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Each head computes attention using the formula:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a052bde9de523c35e04c6987a634b095.png)'
  prefs: []
  type: TYPE_IMG
- en: Once attention is computed for all heads, the outputs are concatenated and passed
    through a linear transformation, restoring the initial tensor shape.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/3b67cb4209353c53ca1a222bf545e1b4.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Image by author: Concatenating the output of all heads'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/7bdc49fb4d30a47cfa9c24fdb5ad4e11.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Modified Image From Research Paper: Situation of the workflow'
  prefs: []
  type: TYPE_NORMAL
- en: Residual Connection and Normalization
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'After the multi-head attention mechanism, a **residual connection** is added,
    followed by **layer normalization**:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Residual connection: `Output = Embedding Tensor + Multi-Head Attention Output`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Normalization: `(Output − μ) / σ` to stabilize training'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Tensor shape remains `[batch_size, seq_len, embedding_dim]`
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/3a1b975b2b1fb97833e050995ab66c3e.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Image by author: Residual Connection'
  prefs: []
  type: TYPE_NORMAL
- en: Feed-Forward Network (FFN)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In the decoder, **Masked Multi-Head Attention** ensures that each token attends
    only to previous tokens, preventing leakage of future information.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/de6cb8051aee52c853ece5be0ca0c7e3.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Modified Image From Research Paper: Masked Multi Head Attention'
  prefs: []
  type: TYPE_NORMAL
- en: This is achieved using a lower triangular mask of shape `[seq_len, seq_len]`
    with `-inf` values in the upper triangle. Applying this mask ensures that the
    Softmax function nullifies future positions.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ab3e122d4aaf4beb1a4d4282ee551419.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Image by author: Mask matrix'
  prefs: []
  type: TYPE_NORMAL
- en: Cross-Attention in Decoding
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Since the decoder does not fully understand the input sentence, it utilizes
    **cross-attention** to refine predictions. Here:'
  prefs: []
  type: TYPE_NORMAL
- en: The decoder generates queries **(Qd)** from its input (`[batch_size, target_seq_len,
    embedding_dim]`).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The encoder output serves as keys **(Ke)** and values **(Ve)**.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The decoder computes attention between **Qd** and **Ke**, extracting relevant
    context from the encoder’s output.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/02cc310984185d0969f980bc747ad939.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Modified Image From Research Paper: Cross Head Attention'
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Transformers use **tensors** to help them learn and make smart decisions. As
    the data moves through the network, these tensors go through different steps—like
    being turned into numbers the model can understand (embedding), focusing on important
    parts (attention), staying balanced (normalization), and being passed through
    layers that learn patterns (feed-forward). These changes keep the data in the
    right shape the whole time. By understanding how tensors move and change, we can
    get a better idea of how AI models work and how they can understand and create
    human-like language.
  prefs: []
  type: TYPE_NORMAL
