- en: 'Behind the Magic: How Tensors Drive Transformers'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 魔法的背后：张量如何驱动Transformer
- en: 原文：[https://towardsdatascience.com/behind-the-magic-how-tensors-drive-transformers/](https://towardsdatascience.com/behind-the-magic-how-tensors-drive-transformers/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/behind-the-magic-how-tensors-drive-transformers/](https://towardsdatascience.com/behind-the-magic-how-tensors-drive-transformers/)
- en: <mdspan datatext="el1745540862691" class="mdspan-comment">Introduction</mdspan>
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1745540862691" class="mdspan-comment">介绍</mdspan>
- en: Transformers have changed the way artificial intelligence works, especially
    in understanding language and learning from data. At the core of these models
    are **tensors** (a generalized type of mathematical matrices that help process
    information) . As data moves through the different parts of a Transformer, these
    tensors are subject to different transformations that help the model make sense
    of things like sentences or images. Learning how tensors work inside Transformers
    can help you understand how today’s smartest AI systems actually work and think.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: Transformer改变了人工智能的工作方式，尤其是在理解和从数据中学习方面。这些模型的核心是**张量**（一种广义的数学矩阵，有助于处理信息）。当数据通过Transformer的不同部分时，这些张量会经历不同的变换，帮助模型理解句子或图像等事物。了解张量在Transformer内部的工作原理可以帮助你理解当今最智能的AI系统是如何实际工作和思考的。
- en: What This Article Covers and What It Doesn’t
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 本篇文章涵盖的内容和未涵盖的内容
- en: ✅ **This Article IS About:**
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: ✅ **本文涉及：**
- en: The flow of tensors from input to output within a Transformer model.
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在Transformer模型中，张量从输入到输出的流动。
- en: Ensuring dimensional coherence throughout the computational process.
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确保在整个计算过程中保持维度一致性。
- en: The step-by-step transformations that tensors undergo in various Transformer
    layers.
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 张量在各个Transformer层中经历的逐步变换。
- en: ❌ **This Article IS NOT About:**
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: ❌ **本文不涉及：**
- en: A general introduction to Transformers or deep learning.
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对Transformer或深度学习的通用介绍。
- en: Detailed architecture of Transformer models.
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Transformer模型详细架构
- en: Training process or hyper-parameter tuning of Transformers.
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Transformer的训练过程或超参数调整。
- en: How Tensors Act Within Transformers
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 张量在Transformer中的作用
- en: 'A Transformer consists of two main components:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: Transformer由两个主要组件组成：
- en: '**Encoder:** Processes input data, capturing contextual relationships to create
    meaningful representations.'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**编码器**：处理输入数据，捕捉上下文关系以创建有意义的表示。'
- en: '**Decoder:** Utilizes these representations to generate coherent output, predicting
    each element sequentially.'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**解码器**：利用这些表示生成连贯的输出，逐个预测每个元素。'
- en: Tensors are the fundamental data structures that go through these components,
    experiencing multiple transformations that ensure dimensional coherence and proper
    information flow.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 张量是经过这些组件的基本数据结构，经历多次变换以确保维度一致性和适当的信息流动。
- en: '![](../Images/11f1512db5db4bb0b5119dc35c8d9395.png)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/11f1512db5db4bb0b5119dc35c8d9395.png)'
- en: 'Image From Research Paper: Transformer standard archictecture'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 研究论文中的图片：Transformer标准架构
- en: Input Embedding Layer
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 输入嵌入层
- en: Before entering the Transformer, raw input tokens (words, subwords, or characters)
    are converted into dense vector representations through the **embedding layer**.
    This layer functions as a lookup table that maps each token vector, capturing
    semantic relationships with other words.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 在进入Transformer之前，原始输入标记（单词、子词或字符）通过**嵌入层**转换为密集向量表示。这一层作为一个查找表，将每个标记向量映射到其他单词的语义关系。
- en: '![](../Images/8abc1af375b791f6defe6ca274c6ee61.png)'
  id: totrans-22
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/8abc1af375b791f6defe6ca274c6ee61.png)'
- en: 'Image by author: Tensors passing through Embedding layer'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 作者图片：张量通过嵌入层
- en: 'For a batch of five sentences, each with a sequence length of 12 tokens, and
    an embedding dimension of 768, the tensor shape is:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 对于一个包含五个句子、每个句子长度为12个标记、嵌入维度为768的批次，张量形状为：
- en: '**Tensor shape:** `[batch_size, seq_len, embedding_dim] → [5, 12, 768]`'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**张量形状**：`[batch_size, seq_len, embedding_dim] → [5, 12, 768]`'
- en: After embedding, **positional encoding** is added, ensuring that order information
    is preserved without altering the tensor shape.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 在嵌入之后，**位置编码**被添加，确保顺序信息得到保留，同时不改变张量形状。
- en: '![](../Images/6046cf16afcb2518578d91f61ae32a54.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6046cf16afcb2518578d91f61ae32a54.png)'
- en: 'Modified Image from Research Paper: Situation of the workflow'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 研究论文修改后的图片：工作流程情况
- en: Multi-Head Attention Mechanism
  id: totrans-29
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 多头注意力机制
- en: 'One of the most critical components of the Transformer is the **Multi-Head
    Attention (MHA) mechanism**. It operates on three matrices derived from input
    embeddings:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: Transformer最关键的部分之一是**多头注意力（MHA）机制**。它作用于从输入嵌入中派生出的三个矩阵：
- en: '**Query (Q)**'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**查询 (Q)**'
- en: '**Key (K)**'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**关键 (K)**'
- en: '**Value (V)**'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**值 (V)**'
- en: 'These matrices are generated using learnable weight matrices:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 这些矩阵是通过使用可学习的权重矩阵生成的：
- en: '**Wq, Wk, Wv** of shape `[embedding_dim, d_model]` (e.g., `[768, 512]`).'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Wq, Wk, Wv** 的形状为 `[embedding_dim, d_model]`（例如，`[768, 512]`）。'
- en: The resulting Q, K, V matrices have dimensions
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 结果的 Q, K, V 矩阵的维度
- en: '`[batch_size, seq_len, d_model]`.'
  id: totrans-37
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '`[batch_size, seq_len, d_model]`。'
- en: '![](../Images/6bc18d7b77b81e0b27ceaff69c2dad5c.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6bc18d7b77b81e0b27ceaff69c2dad5c.png)'
- en: 'Image by author: Table showing the shapes/dimensions of Embedding, Q, K, V tensors'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 作者的图像：显示嵌入、Q、K、V 张量形状/维度的表格
- en: Splitting Q, K, V into Multiple Heads
  id: totrans-40
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 将 Q, K, V 分割成多个头部
- en: 'For effective parallelization and improved learning, MHA splits Q, K, and V
    into multiple heads. Suppose we have 8 attention heads:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 为了有效的并行化和改进学习，MHA 将 Q, K, V 分割成多个头部。假设我们有 8 个注意力头：
- en: Each head operates on a subspace of `d_model / head_count`.
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每个头在 `d_model / head_count` 的子空间上操作。
- en: '![](../Images/1aa97565937b3dfcad42c274faaac3d7.png)'
  id: totrans-43
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/1aa97565937b3dfcad42c274faaac3d7.png)'
- en: 'Image by author: Multihead Attention'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 作者的图像：多头注意力
- en: The reshaped tensor dimensions are `[batch_size, seq_len, head_count, d_model
    / head_count]`.
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 重塑的张量维度是 `[batch_size, seq_len, head_count, d_model / head_count]`。
- en: 'Example: `[5, 12, 8, 64]` → rearranged to `[5, 8, 12, 64]` to ensure that each
    head receives a separate sequence slice.'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 示例：`[5, 12, 8, 64]` 调整为 `[5, 8, 12, 64]`，以确保每个头都能接收到一个单独的序列片段。
- en: '![](../Images/bf6fa5b3012fcaba85c63d2d1537597e.png)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/bf6fa5b3012fcaba85c63d2d1537597e.png)'
- en: 'Image by author: Reshaping the tensors'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 作者的图像：张量重塑
- en: So each head will get the its share of Qi, Ki, Vi
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 因此，每个头都会得到其份额的 Qi, Ki, Vi。
- en: '![](../Images/6ce91211197f7fae964dde46f698b66d.png)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6ce91211197f7fae964dde46f698b66d.png)'
- en: 'Image by author: Each Qi,Ki,Vi sent to different head'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 作者的图像：每个 Qi, Ki, Vi 发送到不同的头
- en: Attention Calculation
  id: totrans-52
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 注意力计算
- en: 'Each head computes attention using the formula:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 每个头使用以下公式计算注意力：
- en: '![](../Images/a052bde9de523c35e04c6987a634b095.png)'
  id: totrans-54
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a052bde9de523c35e04c6987a634b095.png)'
- en: Once attention is computed for all heads, the outputs are concatenated and passed
    through a linear transformation, restoring the initial tensor shape.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦计算了所有头的注意力，输出被连接起来并通过线性变换传递，恢复初始张量形状。
- en: '![](../Images/3b67cb4209353c53ca1a222bf545e1b4.png)'
  id: totrans-56
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/3b67cb4209353c53ca1a222bf545e1b4.png)'
- en: 'Image by author: Concatenating the output of all heads'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 作者的图像：连接所有头的输出
- en: '![](../Images/7bdc49fb4d30a47cfa9c24fdb5ad4e11.png)'
  id: totrans-58
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7bdc49fb4d30a47cfa9c24fdb5ad4e11.png)'
- en: 'Modified Image From Research Paper: Situation of the workflow'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 来自研究论文的修改图像：工作流程的情况
- en: Residual Connection and Normalization
  id: totrans-60
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 残差连接和归一化
- en: 'After the multi-head attention mechanism, a **residual connection** is added,
    followed by **layer normalization**:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 在多头注意力机制之后，添加了 **残差连接**，然后是 **层归一化**：
- en: 'Residual connection: `Output = Embedding Tensor + Multi-Head Attention Output`'
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 残差连接：`Output = Embedding Tensor + Multi-Head Attention Output`
- en: 'Normalization: `(Output − μ) / σ` to stabilize training'
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 归一化：`(Output − μ) / σ` 以稳定训练
- en: Tensor shape remains `[batch_size, seq_len, embedding_dim]`
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 张量形状保持 `[batch_size, seq_len, embedding_dim]`
- en: '![](../Images/3a1b975b2b1fb97833e050995ab66c3e.png)'
  id: totrans-65
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/3a1b975b2b1fb97833e050995ab66c3e.png)'
- en: 'Image by author: Residual Connection'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 作者的图像：残差连接
- en: Feed-Forward Network (FFN)
  id: totrans-67
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 前馈网络 (FFN)
- en: In the decoder, **Masked Multi-Head Attention** ensures that each token attends
    only to previous tokens, preventing leakage of future information.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 在解码器中，**掩码多头注意力** 确保每个标记只关注前面的标记，防止未来信息的泄漏。
- en: '![](../Images/de6cb8051aee52c853ece5be0ca0c7e3.png)'
  id: totrans-69
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/de6cb8051aee52c853ece5be0ca0c7e3.png)'
- en: 'Modified Image From Research Paper: Masked Multi Head Attention'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 来自研究论文的修改图像：掩码多头注意力
- en: This is achieved using a lower triangular mask of shape `[seq_len, seq_len]`
    with `-inf` values in the upper triangle. Applying this mask ensures that the
    Softmax function nullifies future positions.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 这是通过使用形状为 `[seq_len, seq_len]` 的下三角掩码，其中上三角的值为 `-inf` 来实现的。应用此掩码确保 Softmax 函数使未来位置归零。
- en: '![](../Images/ab3e122d4aaf4beb1a4d4282ee551419.png)'
  id: totrans-72
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ab3e122d4aaf4beb1a4d4282ee551419.png)'
- en: 'Image by author: Mask matrix'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 作者的图像：掩码矩阵
- en: Cross-Attention in Decoding
  id: totrans-74
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 解码中的交叉注意力
- en: 'Since the decoder does not fully understand the input sentence, it utilizes
    **cross-attention** to refine predictions. Here:'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 由于解码器不完全理解输入句子，它利用 **交叉注意力** 来细化预测。在这里：
- en: The decoder generates queries **(Qd)** from its input (`[batch_size, target_seq_len,
    embedding_dim]`).
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 解码器从其输入（`[batch_size, target_seq_len, embedding_dim]`）生成查询 **(Qd)**。
- en: The encoder output serves as keys **(Ke)** and values **(Ve)**.
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 编码器的输出作为键 **(Ke)** 和值 **(Ve)**。
- en: The decoder computes attention between **Qd** and **Ke**, extracting relevant
    context from the encoder’s output.
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 解码器计算**Qd**和**Ke**之间的注意力，从编码器的输出中提取相关上下文。
- en: '![](../Images/02cc310984185d0969f980bc747ad939.png)'
  id: totrans-79
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/02cc310984185d0969f980bc747ad939.png)'
- en: 'Modified Image From Research Paper: Cross Head Attention'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 研究论文中的修改图像：交叉头注意力
- en: Conclusion
  id: totrans-81
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: Transformers use **tensors** to help them learn and make smart decisions. As
    the data moves through the network, these tensors go through different steps—like
    being turned into numbers the model can understand (embedding), focusing on important
    parts (attention), staying balanced (normalization), and being passed through
    layers that learn patterns (feed-forward). These changes keep the data in the
    right shape the whole time. By understanding how tensors move and change, we can
    get a better idea of how AI models work and how they can understand and create
    human-like language.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 变换器使用**张量**来帮助它们学习和做出明智的决定。随着数据在网络中流动，这些张量会经历不同的步骤——比如被转换成模型可以理解的数字（嵌入），关注重要部分（注意力），保持平衡（归一化），以及通过学习模式的层（前馈）。这些变化确保数据在整个过程中保持正确的形状。通过理解张量的移动和变化，我们可以更好地了解AI模型的工作原理以及它们如何理解和创造类似人类的语言。
