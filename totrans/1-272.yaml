- en: 'Comparative Study of Performance: n8n JavaScript Node vs. Python in FastAPI'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To answer this question, I prepared a straightforward experiment.
  prefs: []
  type: TYPE_NORMAL
- en: 'The same dataset and transformations were processed using two different approaches
    inside n8n:'
  prefs: []
  type: TYPE_NORMAL
- en: '**All in JavaScript nodes** with functions directly within n8n.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Outsourcing to FastAPI microservices** by replacing the JavaScript logic
    with HTTP requests to Python endpoints.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![](../Images/1be416d0caed6e43084b31dd5cbbf7ff.png)'
  prefs: []
  type: TYPE_IMG
- en: Simple Workflow using FastAPI microservice – (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: These two endpoints are connected to functions that will load the data directly
    from the VPS instance where I hosted the microservice.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: I want to focus this test only on the data processing performance.
  prefs: []
  type: TYPE_NORMAL
- en: The `SpeedAnalysis` includes all the data processing steps listed in the previous
    section
  prefs: []
  type: TYPE_NORMAL
- en: Grouping sales by `ITEM`
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Sorting `ITEM` by descending order and calculate cumulative sales
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Calculating standard deviations and means of sales distribution by `ITEM`
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: Now that we have these endpoints ready, we can begin testing.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/9ef2e2df6d97863cbf0cc0d638d6f886.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Results of the experimentation (Top: Processing using native code nodes / Bottom:
    FastAPI Microservice) – (Image by Samir Saci)'
  prefs: []
  type: TYPE_NORMAL
- en: 'The results are shown above:'
  prefs: []
  type: TYPE_NORMAL
- en: '**JavaScript-only workflow**: The whole process was completed in **a bit more
    than 11.7 seconds**.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Most of the time was spent updating sheets and performing iterative calculations
    within n8n nodes.*'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**FastAPI-backed workflow**: The equivalent “outsourced” process was completed
    in **~11.0 seconds**.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Heavy computations were offloaded to Python microservices, which handled them
    faster than native JavaScript nodes.*'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: In other words, **outsourcing complex computations to Python actually improves**
    the performance.
  prefs: []
  type: TYPE_NORMAL
- en: The reason is that FastAPI endpoints execute optimised Python functions directly,
    while JavaScript nodes inside n8n must iterate (with loops).
  prefs: []
  type: TYPE_NORMAL
- en: For large datasets, I would imagine a delta that is probably not negligible.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: This demonstrates that you can do simple data processing within n8n using small
    JavaScript snippets.
  prefs: []
  type: TYPE_NORMAL
- en: However, our Supply Chain Analytics products can require more advanced processing
    involving optimisation and advanced statistical libraries.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/53f55b2ffc3524b91ec1ec1a2ceab5bf.png)'
  prefs: []
  type: TYPE_IMG
- en: '[AI Workflow for Production Planning Optimisation](https://towardsdatascience.com/ai-agents-for-supply-chain-optimisation-production-planning/)
    (Image by Samir Saci)'
  prefs: []
  type: TYPE_NORMAL
- en: For that, customers can accept dealing with a “black box” approach, as seen
    in the [Production Planning workflow](https://towardsdatascience.com/ai-agents-for-supply-chain-optimisation-production-planning/)
    presented [in this Towards Data Science article](https://towardsdatascience.com/ai-agents-for-supply-chain-optimisation-production-planning/).
  prefs: []
  type: TYPE_NORMAL
- en: But for *light processing tasks,* we can integrate them into the workflow to
    provide visibility to non-code users.
  prefs: []
  type: TYPE_NORMAL
- en: For another project, I use n8n to connect Supply Chain IT systems for the transfer
    of Purchase Orders using Electronic Data Interchange (EDI).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c0a2bdca624661072689b98ffca499f4.png)'
  prefs: []
  type: TYPE_IMG
- en: '[Example of Electronic Data Interchange (EDI) Parsing Workflow](https://n8n.io/workflows/3221-electronic-data-interchange-edi-message-parsing-with-gmail-and-google-sheet/)
    – (Image by Samir Saci)'
  prefs: []
  type: TYPE_NORMAL
- en: This workflow, deployed for a small logistics company, entirely parses EDI messages
    using JavaScript nodes.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ea05403590a347940aaafb6e548e997c.png)'
  prefs: []
  type: TYPE_IMG
- en: Example of Electronic Data Interchange Message – (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: As you can discover in this tutorial, we have performed 100% of the Electronic
    Data Interchange message parsing using JavaScript nodes.
  prefs: []
  type: TYPE_NORMAL
- en: This helped us to improve the robustness of the solution and reduce our workload
    by handing over the maintenance to the customer.
  prefs: []
  type: TYPE_NORMAL
- en: What is the best approach?
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: For me, n8n should be used as an **orchestration and integration tool** connected
    to our **core analytics products.**
  prefs: []
  type: TYPE_NORMAL
- en: These analytics products require specific input formats that may not align with
    our customers’ data.
  prefs: []
  type: TYPE_NORMAL
- en: Therefore, I would advise using JavaScript code nodes to perform this preprocessing.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ad738347d6fafe008498d2fd4f0e10ff.png)'
  prefs: []
  type: TYPE_IMG
- en: Workflow for [Distribution Planning Optimisation Algorithm](https://www.youtube.com/watch?v=DPWPTWXylas)
    – (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: For example, the workflow above connects a Google Sheet (containing input data)
    to a FastAPI microservice that runs an** algorithm for Distribution Planning Optimisation****.**
  prefs: []
  type: TYPE_NORMAL
- en: The idea is to plug our optimisation algorithm into a Google Sheet used by Distribution
    Planners to organise store deliveries.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/4818c3e14449e21e114513c54ab164aa.png)'
  prefs: []
  type: TYPE_IMG
- en: Worksheet used by Planning Teams – (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: The JavaScript code node is used to transform the data collected from the Google
    Sheet into the input format required by our algorithm.
  prefs: []
  type: TYPE_NORMAL
- en: By doing the job inside the workflow, it remains under the control of the customer
    who runs the workflow in their own instance.
  prefs: []
  type: TYPE_NORMAL
- en: And we can keep the optimisation part in a microservice hosted on our instance.
  prefs: []
  type: TYPE_NORMAL
- en: To better understand the setup, feel free to have a look at this short presentation
  prefs: []
  type: TYPE_NORMAL
- en: I hope this tutorial and the examples above have given you enough insight to
    understand what can be done with n8n in terms of data analytics.
  prefs: []
  type: TYPE_NORMAL
- en: Feel free to share your comments about the approach and your thoughts on what
    could be improved to enhance the workflow’s performance with me.
  prefs: []
  type: TYPE_NORMAL
