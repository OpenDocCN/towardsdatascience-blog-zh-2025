- en: 'From Python to JavaScript: A Playbook for Data Analytics in n8n with Code Node
    Examples'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 从 Python 到 JavaScript：n8n 中数据分析的剧本，包含代码节点示例
- en: 原文：[https://towardsdatascience.com/from-python-to-javascript-a-playbook-for-data-analytics-in-n8n-with-code-node-examples/](https://towardsdatascience.com/from-python-to-javascript-a-playbook-for-data-analytics-in-n8n-with-code-node-examples/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/from-python-to-javascript-a-playbook-for-data-analytics-in-n8n-with-code-node-examples/](https://towardsdatascience.com/from-python-to-javascript-a-playbook-for-data-analytics-in-n8n-with-code-node-examples/)
- en: <mdspan datatext="el1758174294461" class="mdspan-comment">When I created</mdspan>
    my first n8n workflow, as a data scientist, it felt like I was cheating.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1758174294461" class="mdspan-comment">当我创建我的第一个 n8n 工作流程时，作为一个数据科学家，我感觉我像是在作弊。</mdspan>
- en: I could connect to APIs without reading 30-page docs, trigger workflows from
    Gmail or Sheets, and deploy something useful in minutes.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 我可以不阅读 30 页的文档就连接到 API，从 Gmail 或 Sheets 触发工作流程，并在几分钟内部署一些有用的东西。
- en: However, the significant drawback is that n8n is not natively optimised to run
    a Python environment in the cloud instances used by our customers.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，一个显著的缺点是 n8n 并未原生优化以在客户使用的云实例中运行 Python 环境。
- en: Like many data scientists, my daily toolbox for data analytics is built on **NumPy**
    and **Pandas**.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 和许多数据科学家一样，我的数据分析日常工具箱建立在 **NumPy** 和 **Pandas** 之上。
- en: To stay in my comfort zone, I often *outsource*d calculations to external APIs
    instead of using n8n JavaScript code nodes.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 为了保持在我的舒适区，我经常将计算外包给外部 API，而不是使用 n8n JavaScript 代码节点。
- en: '[![](../Images/b24b4375a364d7240e99a4fe9be4eece.png)](https://towardsdatascience.com/ai-agents-for-supply-chain-optimisation-production-planning/)'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: '![图片](../Images/b24b4375a364d7240e99a4fe9be4eece.png)[(https://towardsdatascience.com/ai-agents-for-supply-chain-optimisation-production-planning/)]'
- en: Production Planning n8n workflow with API function calling – (Image by Samir
    Saci)
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 API 函数调用的生产计划 n8n 工作流程 – (图片由 Samir Saci 提供)
- en: For instance, this is what is done with **a Production Planning Optimisation
    tool**, which is orchestrated through a workflow that includes an Agent node that
    calls a FastAPI microservice.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，这是使用**生产计划优化工具**所做的工作，该工具通过包括调用 FastAPI 微服务的 Agent 节点的工作流程进行编排。
- en: This approach worked, but I had clients who requested to **have complete visibility
    of the data analytics tasks on their n8n user interface.**
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法有效，但我有一些客户要求**在他们的 n8n 用户界面上完全可见数据分析任务**。
- en: I realised that I need to learn just enough JavaScript to perform data processing
    with the native code nodes of n8n.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 我意识到我只需要学习足够的 JavaScript，就能使用 n8n 的原生代码节点进行数据处理。
- en: '![](../Images/93fc9d160419f0ee1e0b2e355f679765.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/93fc9d160419f0ee1e0b2e355f679765.png)'
- en: Example of JavaScript node grouping sales by ITEM – (Image by Samir Saci)
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: JavaScript 节点按项目分组销售的示例 – (图片由 Samir Saci 提供)
- en: In this article, we will experiment with small JavaScript snippets inside n8n
    Code nodes to perform everyday data analytics tasks.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们将尝试在 n8n 代码节点内的小型 JavaScript 片段，以执行日常的数据分析任务。
- en: For this exercise, I will use a dataset of sales transactions and walk it through
    to an **ABC and Pareto analysis**, which are widely used in Supply Chain Management.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 为了这次练习，我将使用销售交易数据集，并对其进行 ABC 和 Pareto 分析，这些分析在供应链管理中广泛使用。
- en: '![](../Images/ced6268499c2d3f5faf4f4352e425d12.png)'
  id: totrans-16
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ced6268499c2d3f5faf4f4352e425d12.png)'
- en: ABC XYZ & Pareto Charts widely used in Supply Chain Management – (Image by Samir
    Saci)
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: ABC XYZ & Pareto 图在供应链管理中广泛使用 – (图片由 Samir Saci 提供)
- en: I will provide side-by-side examples of Pandas vs. JavaScript in n8n Code nodes,
    allowing us to translate our familiar Python data analysis steps directly into
    automated n8n workflows.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 我将在 n8n 代码节点中提供 Pandas 与 JavaScript 的并排示例，使我们能够直接将熟悉的 Python 数据分析步骤转换为自动化的 n8n
    工作流程。
- en: '![](../Images/91ee713756b8babf119832190198c02e.png)'
  id: totrans-19
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/91ee713756b8babf119832190198c02e.png)'
- en: Example of JavaScript vs. Pandas – (Image by Samir Saci)
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: JavaScript 与 Pandas 的示例 – (图片由 Samir Saci 提供)
- en: The idea is to implement these solutions for small datasets or quick prototyping
    within the capabilities of a cloud enterprise n8n instance (i.e. without community
    nodes).
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 策略是利用云企业 n8n 实例的能力（即不使用社区节点）来实现这些解决方案，用于小型数据集或快速原型设计。
- en: '![](../Images/3ffbefbb5c4d14f2478918b076bc256d.png)'
  id: totrans-22
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/3ffbefbb5c4d14f2478918b076bc256d.png)'
- en: The experimental workflow we will build together – (Image by Samir Saci)
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将一起构建的实验工作流程 – (图片由 Samir Saci 提供)
- en: I will end the experiment with a quick comparative study of the performance
    versus a FastAPI call.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 我将以一个快速的性能与 FastAPI 调用的比较研究来结束实验。
- en: '**You can follow me and replicate the entire workflow** using a Google Sheet
    and a workflow template shared in the article.'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: '**您可以关注我并使用文章中分享的 Google Sheet 和工作流程模板来复制整个工作流程**。'
- en: Let’s start!
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们开始吧！
- en: Building a Data Analytics Workflow using JavaScript in n8n
  id: totrans-27
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在 n8n 中使用 JavaScript 构建数据分析工作流程
- en: Before starting to build nodes, I will introduce the context of this analysis.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 在开始构建节点之前，我将介绍这个分析的环境。
- en: ABC & Pareto Charts for Supply Chain Management
  id: totrans-29
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 供应链管理的 ABC & 帕累托图
- en: For this tutorial, I propose that you build a simple workflow that takes **sales
    transactions from Google Sheets** and transforms them into a comprehensive ABC
    and Pareto charts.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这个教程，我建议您构建一个简单的流程，该流程从**Google Sheets 中的销售交易**中提取数据，并将其转换为全面的 ABC 和帕累托图表。
- en: This will replicate the **ABC and Pareto Analysis** module of the [LogiGreen
    Apps](https://www.logi-green.com/logigreen-applications-for-supply-chain-optimization)
    developed by my startup, LogiGreen.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 这将复制我初创公司 LogiGreen 开发的 [LogiGreen Apps](https://www.logi-green.com/logigreen-applications-for-supply-chain-optimization)
    中的 **ABC 和帕累托分析**模块。
- en: '![](../Images/a3808addd9773fdb583547310642b996.png)'
  id: totrans-32
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a3808addd9773fdb583547310642b996.png)'
- en: ABC Analysis Module of the [LogiGreen Apps](https://www.logi-green.com/logigreen-applications-for-supply-chain-optimization)
    – (Image by Samir Saci)
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: '[LogiGreen Apps](https://www.logi-green.com/logigreen-applications-for-supply-chain-optimization)
    的 ABC 分析模块 – （图像由 Samir Saci 提供）'
- en: The goal is to generate a set of visuals for the inventory teams of a supermarket
    chain to help them understand the distribution of sales across their stores.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 目标是为超市连锁店的库存团队生成一系列视觉效果，帮助他们了解其门店的销售分布。
- en: We will focus on generating two visuals.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将专注于生成两个视觉效果。
- en: 'The first chart shows an **ABC-XYZ analysis** of sales items:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 第一张图表显示了销售项目的 **ABC-XYZ 分析**：
- en: '![](../Images/d46c8c4e98274d4d82c0773ffffe4f9b.png)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d46c8c4e98274d4d82c0773ffffe4f9b.png)'
- en: ABC XYZ Chart – (Image by Samir Saci)
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: ABC XYZ 图 – （图像由 Samir Saci 提供）
- en: '**X-axis (Percentage of Turnover %)**: the contribution of each item to total
    revenue.'
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**X 轴（周转率百分比）**：每个项目对总收入的贡献。'
- en: '**Y-axis (Coefficient of Variation)**: demand variability of each item.'
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Y 轴（变异系数）**：每个项目的需求变化。'
- en: Vertical red lines split items into **A, B, and** C classes based on turnover
    share.
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 垂直的红色线条根据周转率将项目分为**A、B 和 C**三个类别。
- en: The horizontal blue line marks **stable vs variable demand** (CV=1)
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 水平的蓝色线条标记**稳定需求与变动需求**（CV=1）。
- en: Together, it highlights which items are **high-value & stable (A, low CV)**
    versus those that are **low-value or highly variable**, guiding prioritisation
    in inventory management.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 一起，它突出了哪些项目是**高价值且稳定的（A，CV 低）**，与那些**低价值或高度可变**的项目相比，指导库存管理中的优先级排序。
- en: 'The second visual is a **Pareto analysis of sales turnover**:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 第二个视觉效果是**销售周转的帕累托分析**：
- en: '![](../Images/4594cc01ddab96b20e1ee7ed26f6ece6.png)'
  id: totrans-45
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/4594cc01ddab96b20e1ee7ed26f6ece6.png)'
- en: Pareto Chart generated by the [Logigreen App](https://logigreenconsulting.odoo.com/logigreen-applications-for-supply-chain-optimization)
    – Image by Samir Saci
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 由 [Logigreen App](https://logigreenconsulting.odoo.com/logigreen-applications-for-supply-chain-optimization)
    生成的帕累托图 – 图像由 Samir Saci 提供
- en: '**X-axis:** percentage of SKUs (ranked by sales).'
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**X 轴：**SKU 百分比（按销售额排名）。'
- en: '**Y-axis:** cumulative percentage of annual turnover.'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Y 轴：**年度总周转率的累积百分比。'
- en: The curve illustrates how a small fraction of items contributes to the majority
    of revenue.
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 曲线说明了少数项目如何对大部分收入做出贡献。
- en: In short, this highlights (or not) the classic Pareto rule, which affirms that
    80% of sales can come from 20% of the SKUs.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，这突出了（或不突出）经典的帕累托法则，该法则确认 80% 的销售额可以来自 20% 的 SKU。
- en: How did I generate these two visuals? I simply used Python.
  id: totrans-51
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我是如何生成这两个视觉效果的？我只是简单地使用了 Python。
- en: On my YouTube channel, I shared a [complete tutorial](https://youtu.be/Qglr9Yqa44I)
    on how to do it using Pandas and Matplotlib.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的 YouTube 频道上，我分享了一个[完整教程](https://youtu.be/Qglr9Yqa44I)，介绍了如何使用 Pandas 和
    Matplotlib 来实现它。
- en: The objective of this tutorial is to prepare sales transactions and generate
    these visuals in a Google Sheet using **only n8n’s** **native JavaScript nodes**.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 本教程的目标是使用**仅 n8n 的原生 JavaScript 节点**来准备销售交易并生成这些视觉效果。
- en: Building a Data Analytics Workflow in n8n
  id: totrans-54
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在 n8n 中构建数据分析工作流程
- en: I propose to build a workflow that is manually triggered to facilitate debugging
    during development.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 我建议构建一个手动触发的流程，以方便在开发期间进行调试。
- en: '![](../Images/e692c4c6129fa1af6bff92a730e1d0a5.png)'
  id: totrans-56
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e692c4c6129fa1af6bff92a730e1d0a5.png)'
- en: Final Workflow manually triggered to collect data from Google Sheets to generate
    visuals – (Image by Samir Saci)
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 手动触发的最终工作流程，从 Google Sheets 收集数据以生成视觉效果 – （图像由 Samir Saci 提供）
- en: To follow this tutorial, you need to
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 要遵循此教程，您需要
- en: 'Duplicate the spreadsheet available at this link: [Google Sheet](https://docs.google.com/spreadsheets/d/1nsS_pj3o8yMEIQ59QBU80sx20HtkkTgCKJB32sOge1o/edit?usp=sharing)'
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 复制此链接中可用的电子表格：[Google表格](https://docs.google.com/spreadsheets/d/1nsS_pj3o8yMEIQ59QBU80sx20HtkkTgCKJB32sOge1o/edit?usp=sharing)
- en: Download the template on my [n8n creator profile](https://n8n.io/creators/samirsaci/)
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在我的[n8n创作者个人资料](https://n8n.io/creators/samirsaci/)上下载模板
- en: 'You can now connect your duplicated sheet using the second node, which will
    extract the dataset from the worksheet: `Input Data`.'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 您现在可以使用第二个节点连接您的副本，该节点将提取工作表中的数据集：`输入数据`。
- en: '![](../Images/6c6500fe40cd4814b4cf5195810c3874.png)'
  id: totrans-62
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6c6500fe40cd4814b4cf5195810c3874.png)'
- en: Connect the second node to your copy of the Google Sheet to collect input data
    – (Image by Samir Saci)
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 将第二个节点连接到您的Google表格副本以收集输入数据 - （图片由Samir Saci提供）
- en: 'This dataset includes retail sales transactions at the daily granularity:'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 此数据集包括按日粒度的零售销售交易：
- en: '`ITEM`: an item that can be sold in multiple stores'
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`ITEM`: 可在多个商店销售的项目'
- en: '`SKU`: represents an `SKU` sold in a specific store'
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`SKU`: 代表在特定商店销售的`SKU`'
- en: '`FAMILY`: a group of items'
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`FAMILY`: 一组项目'
- en: '`CATEGORY`: a product category can include multiple families'
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`CATEGORY`: 产品类别可以包含多个家族'
- en: '`STORE`: a code representing a sales location'
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`STORE`: 代表销售位置的代码'
- en: '`DAY` of the transaction'
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 交易的`DAY`
- en: '`QTY`: sales quantity in units'
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`QTY`: 销售数量（单位）'
- en: '`TO`: sales quantity in euros'
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`TO`: 以欧元计的销售数量'
- en: The output is the table’s content in JSON format, ready to be ingested by other
    nodes.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 输出是表格内容的JSON格式，可供其他节点摄取。
- en: '*Python Code*'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: '*Python代码*'
- en: '[PRE0]'
  id: totrans-75
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: We can now begin processing the dataset to build our two visualisations.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在可以开始处理数据集以构建我们的两个可视化。
- en: 'Step 1: Filter out transactions **without sales**'
  id: totrans-77
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**步骤1：过滤掉没有销售的交易**'
- en: Let us begin with the simple action of filtering out transactions with sales
    `QTY` equal to zero.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从过滤掉销售`QTY`等于零的交易这个简单的动作开始。
- en: '![](../Images/c1d6a5993229c38ff0533015af554fa3.png)'
  id: totrans-79
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c1d6a5993229c38ff0533015af554fa3.png)'
- en: Filter out transactions without sales using the filter node – (Image by Samir
    Saci)
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 使用过滤节点过滤掉没有销售的交易 - （图片由Samir Saci提供）
- en: We do not need JavaScript; a simple **Filter** node can do the job.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不需要JavaScript；一个简单的**过滤**节点就可以完成这项工作。
- en: '*Python Code*'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: '*Python代码*'
- en: '[PRE1]'
  id: totrans-83
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '**Step 2: Prepare data for Pareto Analysis**'
  id: totrans-84
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**步骤2：准备帕累托分析数据**'
- en: We first need to aggregate the sales per `ITEM` and rank products by turnover.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 我们首先需要按`ITEM`聚合销售并按营业额对产品进行排名。
- en: '*Python Code*'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: '*Python代码*'
- en: '[PRE2]'
  id: totrans-87
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'In our workflow, this step will be done in the JavaScript node `TO, QTY GroupBY
    ITEM`:'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的工作流程中，此步骤将在JavaScript节点`TO, QTY GroupBY ITEM`中完成：
- en: '[PRE3]'
  id: totrans-89
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'This node returns a ranked table of sales per `ITEM` in quantity (QTY) and
    turnover (TO):'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 此节点返回按`ITEM`计量的销售排名表，包括数量（QTY）和营业额（TO）：
- en: We initiate agg as a dictionary keyed by ITEM
  id: totrans-91
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们以ITEM为键初始化agg字典
- en: We loop over n8n rows in items
  id: totrans-92
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们在项目列表中循环遍历n8n行
- en: Converting TO and QTY to numbers
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将TO和QTY转换为数字
- en: Add the QTY and TO value into the running totals of each ITEM
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将QTY和TO值添加到每个ITEM的运行总和中
- en: We finally transform the dictionary into an array **sorted by TO desc** and
    return items
  id: totrans-95
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们最终将字典转换为按TO降序排序的数组并返回项目
- en: '![](../Images/cfdd96041185acb7b3ee64203c9dc8bb.png)'
  id: totrans-96
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/cfdd96041185acb7b3ee64203c9dc8bb.png)'
- en: Output data of the aggregation of sales by `ITEM` – (Image by Samir Saci)
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 输出按`ITEM`聚合的销售数据 - （图片由Samir Saci提供）
- en: We now have the data ready to perform a **Pareto Analysis** on sales quantity
    (QTY) or turnover (TO).
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在有了数据，可以执行销售数量（QTY）或营业额（TO）的**帕累托分析**。
- en: For that, we need to calculate cumulative sales and rank SKUs from the highest
    to the lowest contributor.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们需要计算累计销售额并按SKU从高到低排序。
- en: '*Python Code*'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: '*Python代码*'
- en: '[PRE4]'
  id: totrans-101
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'This step will be done in the code node `Pareto Analysis`:'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 此步骤将在代码节点`Pareto Analysis`中完成：
- en: '[PRE5]'
  id: totrans-103
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: We collect the dataset `items` from the previous node
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 我们从上一个节点收集数据集`items`
- en: For each row, we clean up the fields `TO` and `QTY` (in case we have missing
    values)
  id: totrans-105
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对于每一行，我们清理`TO`和`QTY`字段（以防我们缺少值）
- en: We **sort** all SKUs by turnover in descending order.
  id: totrans-106
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们**按营业额降序**对所有SKU进行排序。
- en: We store in variables the number of items and the total turnover
  id: totrans-107
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们将项目数量和总营业额存储在变量中
- en: '[PRE6]'
  id: totrans-108
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Then we loop over all items in sorted order.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 然后我们按顺序循环遍历所有项目。
- en: Use the variable `cumTO` to compute the cumulative contribution
  id: totrans-110
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用变量`cumTO`计算累计贡献
- en: 'Add several **Pareto metrics** to each row:'
  id: totrans-111
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为每一行添加几个**帕累托指标**：
- en: '`cum_turnover`: cumulative turnover up to this item'
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`cum_turnover`: 到此项目为止的累计营业额'
- en: '`cum_share`: cumulative share of turnover'
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`cum_share`: 营业额累计份额'
- en: '`sku_rank`: ranking position of the item'
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`sku_rank`：项目的排名位置'
- en: '`cum_skus`: cumulative number of SKUs as a fraction of total SKUs'
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`cum_skus`：SKU总数中累积SKU的数量作为分数'
- en: '`cum_skus_pct`: same as `cum_skus`, but in %.'
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`cum_skus_pct`：与`cum_skus`相同，但以百分比表示。'
- en: We are then done with the data preparation of the **pareto chart**.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们就完成了**帕累托图**的数据准备工作。
- en: '![](../Images/e13c05dd698aabe6394c8bb5f8a7e383.png)'
  id: totrans-118
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e13c05dd698aabe6394c8bb5f8a7e383.png)'
- en: Final results – (Image by Samir Saci)
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 最终结果 – (图片由Samir Saci提供)
- en: This dataset will be stored in the worksheet `Pareto` by the node `Update Pareto
    Sheet`.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 此数据集将由节点 `Update Pareto Sheet` 存储在 `Pareto` 工作表中。
- en: 'And with a bit of magic, we can generate this graph in the first worksheet:'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 通过一点魔法，我们可以在第一个工作表中生成此图：
- en: '![](../Images/5ae5ed9ec0b382284bea24647f9fba61.png)'
  id: totrans-122
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/5ae5ed9ec0b382284bea24647f9fba61.png)'
- en: Pareto Chart generated using data processed by the n8n workflow – (Image by
    Samir Saci)
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 使用n8n工作流程处理的数据生成的帕累托图 – (图片由Samir Saci提供)
- en: We can now continue with the ABC XYZ chart.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在可以继续ABC XYZ图。
- en: 'Step 3: Calculate the demand variability and sales contribution'
  id: totrans-125
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 步骤 3：计算需求变异性和销售贡献
- en: We could reuse the output of the pareto chart for the sales contribution, but
    we will consider each chart as independent.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以考虑帕累托图的销售贡献，但我们将每个图表视为独立的。
- en: I will split the code for the node **Demand Variability’ and ‘Sales x Sales
    %**into multiple segments for clarity.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 我将把节点“需求变异性和‘销售 x 销售百分比’”的代码分成多个部分以提高清晰度。
- en: '*Block 1: define functions for mean and standard deviation*'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: '*块 1：定义均值和标准差函数*'
- en: '[PRE7]'
  id: totrans-129
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: These two functions will be used for the coefficient of variation (Cov)
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 这两个函数将用于变异系数（Cov）
- en: '`mean(a)`: computes the average of an array.'
  id: totrans-131
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`mean(a)`：计算数组的平均值。'
- en: '`stdev_samp(a)`: computes the **sample standard deviation**'
  id: totrans-132
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`stdev_samp(a)`：计算**样本标准差**'
- en: They take as inputs the daily sales distributions of each `ITEM` that we build
    in this second block.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 它们以我们在这个第二块中构建的每个 `ITEM` 的每日销售分布为输入。
- en: '*Block 2: Create the daily sales distribution of each ITEM*'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: '*块 2：创建每个 `ITEM` 的每日销售分布*'
- en: '[PRE8]'
  id: totrans-135
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: '*Python Code*'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: '*Python代码*'
- en: '[PRE9]'
  id: totrans-137
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Now we can compute the metrics applied to the daily sales distributions.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们可以计算应用于每日销售分布的指标。
- en: '[PRE10]'
  id: totrans-139
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: For each `ITEM`, we calculate
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 对于每个 `ITEM`，我们计算
- en: '`qty_total`: total sales'
  id: totrans-141
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`qty_total`：总销售额'
- en: '`mean_qty`: average daily sales.'
  id: totrans-142
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`mean_qty`：平均每日销售额。'
- en: '`std_qty`: standard deviation of daily sales.'
  id: totrans-143
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`std_qty`：每日销售额的标准差。'
- en: '`cv_qty`: coefficient of variation (**variability measure for XYZ classification**)'
  id: totrans-144
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`cv_qty`：变异系数（XYZ分类的变异度量）'
- en: '`share_qty_pct`: % contribution to total sales (**used for ABC classification**)'
  id: totrans-145
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`share_qty_pct`：对总销售额的贡献百分比（用于ABC分类）'
- en: 'Here is the Python version in case you were lost:'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是Python版本，以防你迷路：
- en: '[PRE11]'
  id: totrans-147
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: We are nearly done.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 我们几乎完成了。
- en: 'We just need to sort by descending contribution to prepare for the ABC class
    mapping:'
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 我们只需要按贡献度降序排序，为ABC类别映射做准备：
- en: '[PRE12]'
  id: totrans-150
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: We now have for each `ITEM`, the key metrics needed to create the scatter plot.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 对于每个 `ITEM`，我们现在都有了创建散点图所需的关键指标。
- en: '![](../Images/b3992659c3728776c8a63ff7e0a892bc.png)'
  id: totrans-152
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b3992659c3728776c8a63ff7e0a892bc.png)'
- en: Output of the node `Demand Variability x Sales %` – (Image by Samir Saci)
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 节点 `Demand Variability x Sales %` 的输出 – (图片由Samir Saci提供)
- en: Only the ABC classes are missing at this step.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 目前缺少的只有ABC类别。
- en: '**Step 4: Add ABC classes**'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: '**步骤 4：添加ABC类别**'
- en: We take the output of the previous node as input.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将前一个节点的输出作为输入。
- en: '[PRE13]'
  id: totrans-157
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: Just in case, we sort `ITEMS` by descending by **sales share (%)** → most important
    SKUs first.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 万一的话，我们按**销售额百分比**降序排序 `ITEMS` → 最重要的SKU排在前面。
- en: (*This step can be omitted as it is normally already completed at the end of
    the previous code node.*)
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: (*此步骤可以省略，因为它通常已经在之前的代码节点结束时完成。*)
- en: 'Then we can apply the class based on hardcoded conditions:'
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 然后我们可以根据硬编码的条件应用类别：
- en: '**A**: SKUs that together represent the first **5% of sales**'
  id: totrans-161
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**A**：代表前**5%**销售额的SKU'
- en: '**B**: SKUs that together represent the next **15% of sales**'
  id: totrans-162
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**B**：代表接下来**15%**销售额的SKU'
- en: '**C**: Everything after 20%.'
  id: totrans-163
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**C**：20%之后的所有内容。'
- en: '[PRE14]'
  id: totrans-164
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: This can be done that way using Python Code.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 这可以通过Python代码这样做。
- en: '[PRE15]'
  id: totrans-166
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: 'The results can now be used to generate this chart, which can be found in the
    first sheet of the Google Sheet:'
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 现在可以使用这些结果生成此图，该图可在Google Sheets的第一个工作表中找到：
- en: '![](../Images/d6d01bb553210b7b13a3049f5c7a0814.png)'
  id: totrans-168
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d6d01bb553210b7b13a3049f5c7a0814.png)'
- en: ABC XYZ Chart generated with the data processed by the workflow using JavaScript
    – (Image by Samir Saci)
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 使用工作流程处理的数据生成的ABC XYZ图 – (图片由Samir Saci提供)
- en: I struggled (probably due to my limited knowledge of Google Sheets) to find
    a “manual” solution to create this scatter plot with the correct colour mapping.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 我（可能由于我对 Google Sheets 的有限了解）努力寻找一个“手动”解决方案来创建这个具有正确颜色映射的散点图。
- en: Therefore, I used a Google Apps Script available in the Google Sheet to create
    it.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我使用了在 Google Sheet 中可用的 Google Apps Script 来创建它。
- en: '![](../Images/06fb4f6cfbe5dc03311a5ef55098ddf7.png)'
  id: totrans-172
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/06fb4f6cfbe5dc03311a5ef55098ddf7.png)'
- en: Script included in the [Google Sheet](https://docs.google.com/spreadsheets/d/1nsS_pj3o8yMEIQ59QBU80sx20HtkkTgCKJB32sOge1o/edit?usp=sharing)
    to generate the visual – (Image by Samir Saci)
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 包含在 [Google Sheet](https://docs.google.com/spreadsheets/d/1nsS_pj3o8yMEIQ59QBU80sx20HtkkTgCKJB32sOge1o/edit?usp=sharing)
    中的脚本以生成可视化效果 – （图片由 Samir Saci 提供）
- en: As a bonus, I added more nodes to the n8n template that perform the same type
    of GroupBy to calculate sales by store or a pair of ITEM-store.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 作为额外的好处，我在 n8n 模板中添加了更多执行相同类型 GroupBy 操作以按店铺或商品-店铺对计算销售的节点。
