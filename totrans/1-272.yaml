  - PREF_UL
  type: TYPE_NORMAL
- en: '**B**: SKUs that together represent the next **15% of sales**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**C**: Everything after 20%.'
  prefs:
  - PREF_UL
