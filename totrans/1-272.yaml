- en: 'From Python to JavaScript: A Playbook for Data Analytics in n8n with Code Node
    Examples'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/from-python-to-javascript-a-playbook-for-data-analytics-in-n8n-with-code-node-examples/](https://towardsdatascience.com/from-python-to-javascript-a-playbook-for-data-analytics-in-n8n-with-code-node-examples/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1758174294461" class="mdspan-comment">When I created</mdspan>
    my first n8n workflow, as a data scientist, it felt like I was cheating.
  prefs: []
  type: TYPE_NORMAL
- en: I could connect to APIs without reading 30-page docs, trigger workflows from
    Gmail or Sheets, and deploy something useful in minutes.
  prefs: []
  type: TYPE_NORMAL
- en: However, the significant drawback is that n8n is not natively optimised to run
    a Python environment in the cloud instances used by our customers.
  prefs: []
  type: TYPE_NORMAL
- en: Like many data scientists, my daily toolbox for data analytics is built on **NumPy**
    and **Pandas**.
  prefs: []
  type: TYPE_NORMAL
- en: To stay in my comfort zone, I often *outsource*d calculations to external APIs
    instead of using n8n JavaScript code nodes.
  prefs: []
  type: TYPE_NORMAL
- en: '[![](../Images/b24b4375a364d7240e99a4fe9be4eece.png)](https://towardsdatascience.com/ai-agents-for-supply-chain-optimisation-production-planning/)'
  prefs: []
  type: TYPE_NORMAL
- en: Production Planning n8n workflow with API function calling – (Image by Samir
    Saci)
  prefs: []
  type: TYPE_NORMAL
- en: For instance, this is what is done with **a Production Planning Optimisation
    tool**, which is orchestrated through a workflow that includes an Agent node that
    calls a FastAPI microservice.
  prefs: []
  type: TYPE_NORMAL
- en: This approach worked, but I had clients who requested to **have complete visibility
    of the data analytics tasks on their n8n user interface.**
  prefs: []
  type: TYPE_NORMAL
- en: I realised that I need to learn just enough JavaScript to perform data processing
    with the native code nodes of n8n.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/93fc9d160419f0ee1e0b2e355f679765.png)'
  prefs: []
  type: TYPE_IMG
- en: Example of JavaScript node grouping sales by ITEM – (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: In this article, we will experiment with small JavaScript snippets inside n8n
    Code nodes to perform everyday data analytics tasks.
  prefs: []
  type: TYPE_NORMAL
- en: For this exercise, I will use a dataset of sales transactions and walk it through
    to an **ABC and Pareto analysis**, which are widely used in Supply Chain Management.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ced6268499c2d3f5faf4f4352e425d12.png)'
  prefs: []
  type: TYPE_IMG
- en: ABC XYZ & Pareto Charts widely used in Supply Chain Management – (Image by Samir
    Saci)
  prefs: []
  type: TYPE_NORMAL
- en: I will provide side-by-side examples of Pandas vs. JavaScript in n8n Code nodes,
    allowing us to translate our familiar Python data analysis steps directly into
    automated n8n workflows.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/91ee713756b8babf119832190198c02e.png)'
  prefs: []
  type: TYPE_IMG
- en: Example of JavaScript vs. Pandas – (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: The idea is to implement these solutions for small datasets or quick prototyping
    within the capabilities of a cloud enterprise n8n instance (i.e. without community
    nodes).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/3ffbefbb5c4d14f2478918b076bc256d.png)'
  prefs: []
  type: TYPE_IMG
- en: The experimental workflow we will build together – (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: I will end the experiment with a quick comparative study of the performance
    versus a FastAPI call.
  prefs: []
  type: TYPE_NORMAL
- en: '**You can follow me and replicate the entire workflow** using a Google Sheet
    and a workflow template shared in the article.'
  prefs: []
  type: TYPE_NORMAL
- en: Let’s start!
  prefs: []
  type: TYPE_NORMAL
- en: Building a Data Analytics Workflow using JavaScript in n8n
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Before starting to build nodes, I will introduce the context of this analysis.
  prefs: []
  type: TYPE_NORMAL
- en: ABC & Pareto Charts for Supply Chain Management
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: For this tutorial, I propose that you build a simple workflow that takes **sales
    transactions from Google Sheets** and transforms them into a comprehensive ABC
    and Pareto charts.
  prefs: []
  type: TYPE_NORMAL
- en: This will replicate the **ABC and Pareto Analysis** module of the [LogiGreen
    Apps](https://www.logi-green.com/logigreen-applications-for-supply-chain-optimization)
    developed by my startup, LogiGreen.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a3808addd9773fdb583547310642b996.png)'
  prefs: []
  type: TYPE_IMG
- en: ABC Analysis Module of the [LogiGreen Apps](https://www.logi-green.com/logigreen-applications-for-supply-chain-optimization)
    – (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: The goal is to generate a set of visuals for the inventory teams of a supermarket
    chain to help them understand the distribution of sales across their stores.
  prefs: []
  type: TYPE_NORMAL
- en: We will focus on generating two visuals.
  prefs: []
  type: TYPE_NORMAL
- en: 'The first chart shows an **ABC-XYZ analysis** of sales items:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d46c8c4e98274d4d82c0773ffffe4f9b.png)'
  prefs: []
  type: TYPE_IMG
- en: ABC XYZ Chart – (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: '**X-axis (Percentage of Turnover %)**: the contribution of each item to total
    revenue.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Y-axis (Coefficient of Variation)**: demand variability of each item.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Vertical red lines split items into **A, B, and** C classes based on turnover
    share.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The horizontal blue line marks **stable vs variable demand** (CV=1)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Together, it highlights which items are **high-value & stable (A, low CV)**
    versus those that are **low-value or highly variable**, guiding prioritisation
    in inventory management.
  prefs: []
  type: TYPE_NORMAL
- en: 'The second visual is a **Pareto analysis of sales turnover**:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/4594cc01ddab96b20e1ee7ed26f6ece6.png)'
  prefs: []
  type: TYPE_IMG
- en: Pareto Chart generated by the [Logigreen App](https://logigreenconsulting.odoo.com/logigreen-applications-for-supply-chain-optimization)
    – Image by Samir Saci
  prefs: []
  type: TYPE_NORMAL
- en: '**X-axis:** percentage of SKUs (ranked by sales).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Y-axis:** cumulative percentage of annual turnover.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The curve illustrates how a small fraction of items contributes to the majority
    of revenue.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In short, this highlights (or not) the classic Pareto rule, which affirms that
    80% of sales can come from 20% of the SKUs.
  prefs: []
  type: TYPE_NORMAL
- en: How did I generate these two visuals? I simply used Python.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: On my YouTube channel, I shared a [complete tutorial](https://youtu.be/Qglr9Yqa44I)
    on how to do it using Pandas and Matplotlib.
  prefs: []
  type: TYPE_NORMAL
- en: The objective of this tutorial is to prepare sales transactions and generate
    these visuals in a Google Sheet using **only n8n’s** **native JavaScript nodes**.
  prefs: []
  type: TYPE_NORMAL
- en: Building a Data Analytics Workflow in n8n
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: I propose to build a workflow that is manually triggered to facilitate debugging
    during development.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e692c4c6129fa1af6bff92a730e1d0a5.png)'
  prefs: []
  type: TYPE_IMG
- en: Final Workflow manually triggered to collect data from Google Sheets to generate
    visuals – (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: To follow this tutorial, you need to
  prefs: []
  type: TYPE_NORMAL
- en: 'Duplicate the spreadsheet available at this link: [Google Sheet](https://docs.google.com/spreadsheets/d/1nsS_pj3o8yMEIQ59QBU80sx20HtkkTgCKJB32sOge1o/edit?usp=sharing)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Download the template on my [n8n creator profile](https://n8n.io/creators/samirsaci/)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'You can now connect your duplicated sheet using the second node, which will
    extract the dataset from the worksheet: `Input Data`.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/6c6500fe40cd4814b4cf5195810c3874.png)'
  prefs: []
  type: TYPE_IMG
- en: Connect the second node to your copy of the Google Sheet to collect input data
    – (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: 'This dataset includes retail sales transactions at the daily granularity:'
  prefs: []
  type: TYPE_NORMAL
- en: '`ITEM`: an item that can be sold in multiple stores'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`SKU`: represents an `SKU` sold in a specific store'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`FAMILY`: a group of items'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`CATEGORY`: a product category can include multiple families'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`STORE`: a code representing a sales location'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`DAY` of the transaction'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`QTY`: sales quantity in units'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`TO`: sales quantity in euros'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The output is the table’s content in JSON format, ready to be ingested by other
    nodes.
  prefs: []
  type: TYPE_NORMAL
- en: '*Python Code*'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: We can now begin processing the dataset to build our two visualisations.
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 1: Filter out transactions **without sales**'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Let us begin with the simple action of filtering out transactions with sales
    `QTY` equal to zero.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c1d6a5993229c38ff0533015af554fa3.png)'
  prefs: []
  type: TYPE_IMG
- en: Filter out transactions without sales using the filter node – (Image by Samir
    Saci)
  prefs: []
  type: TYPE_NORMAL
- en: We do not need JavaScript; a simple **Filter** node can do the job.
  prefs: []
  type: TYPE_NORMAL
- en: '*Python Code*'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: '**Step 2: Prepare data for Pareto Analysis**'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: We first need to aggregate the sales per `ITEM` and rank products by turnover.
  prefs: []
  type: TYPE_NORMAL
- en: '*Python Code*'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: 'In our workflow, this step will be done in the JavaScript node `TO, QTY GroupBY
    ITEM`:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: 'This node returns a ranked table of sales per `ITEM` in quantity (QTY) and
    turnover (TO):'
  prefs: []
  type: TYPE_NORMAL
- en: We initiate agg as a dictionary keyed by ITEM
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: We loop over n8n rows in items
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Converting TO and QTY to numbers
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Add the QTY and TO value into the running totals of each ITEM
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We finally transform the dictionary into an array **sorted by TO desc** and
    return items
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![](../Images/cfdd96041185acb7b3ee64203c9dc8bb.png)'
  prefs: []
  type: TYPE_IMG
- en: Output data of the aggregation of sales by `ITEM` – (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: We now have the data ready to perform a **Pareto Analysis** on sales quantity
    (QTY) or turnover (TO).
  prefs: []
  type: TYPE_NORMAL
- en: For that, we need to calculate cumulative sales and rank SKUs from the highest
    to the lowest contributor.
  prefs: []
  type: TYPE_NORMAL
- en: '*Python Code*'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: 'This step will be done in the code node `Pareto Analysis`:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: We collect the dataset `items` from the previous node
  prefs: []
  type: TYPE_NORMAL
- en: For each row, we clean up the fields `TO` and `QTY` (in case we have missing
    values)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: We **sort** all SKUs by turnover in descending order.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: We store in variables the number of items and the total turnover
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: Then we loop over all items in sorted order.
  prefs: []
  type: TYPE_NORMAL
- en: Use the variable `cumTO` to compute the cumulative contribution
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Add several **Pareto metrics** to each row:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '`cum_turnover`: cumulative turnover up to this item'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`cum_share`: cumulative share of turnover'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`sku_rank`: ranking position of the item'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`cum_skus`: cumulative number of SKUs as a fraction of total SKUs'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`cum_skus_pct`: same as `cum_skus`, but in %.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We are then done with the data preparation of the **pareto chart**.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e13c05dd698aabe6394c8bb5f8a7e383.png)'
  prefs: []
  type: TYPE_IMG
- en: Final results – (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: This dataset will be stored in the worksheet `Pareto` by the node `Update Pareto
    Sheet`.
  prefs: []
  type: TYPE_NORMAL
- en: 'And with a bit of magic, we can generate this graph in the first worksheet:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/5ae5ed9ec0b382284bea24647f9fba61.png)'
  prefs: []
  type: TYPE_IMG
- en: Pareto Chart generated using data processed by the n8n workflow – (Image by
    Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: We can now continue with the ABC XYZ chart.
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 3: Calculate the demand variability and sales contribution'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: We could reuse the output of the pareto chart for the sales contribution, but
    we will consider each chart as independent.
  prefs: []
  type: TYPE_NORMAL
- en: I will split the code for the node **Demand Variability’ and ‘Sales x Sales
