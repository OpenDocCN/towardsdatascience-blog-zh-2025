  id: totrans-175
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/3ffbefbb5c4d14f2478918b076bc256d.png)'
- en: The experimental workflow we built together – (Image by Samir Saci)
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 我们共同构建的实验工作流程 – （图片由 Samir Saci 提供）
- en: 'They can be used to create visuals like this one:'
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 他们可以用来创建这样的可视化：
- en: '![](../Images/7162b57a68a9fe94d54a4e930348af47.png)'
  id: totrans-178
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/7162b57a68a9fe94d54a4e930348af47.png)'
- en: Total Daily Sales Quantity per Store – (Image by Samir Saci)
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 每家店铺的每日总销售数量 – （图片由 Samir Saci 提供）
- en: To conclude this tutorial, we can confidently declare that the job is done.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 为了结束这个教程，我们可以自信地宣布工作已经完成。
- en: For a live demo of the workflow, you can have a look at this short tutorial
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 为了进行工作流程的实时演示，您可以查看这个简短的教程
- en: Our customers, who run this workflow on their n8n cloud instance, can now gain
    visibility into each step of the data processing.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的客户，在他们的 n8n 云实例上运行此工作流程，现在可以了解数据处理中的每个步骤。
- en: But at which cost? Are we loosing in performance?
  id: totrans-183
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 但代价是什么？我们在性能上是否有所损失？
- en: This is what we will discover in the next section.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我们将在下一节中发现的。
- en: 'Comparative Study of Performance: n8n JavaScript Node vs. Python in FastAPI'
  id: totrans-185
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 性能比较研究：n8n JavaScript 节点与 FastAPI 中的 Python
- en: To answer this question, I prepared a straightforward experiment.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 为了回答这个问题，我准备了一个简单的实验。
- en: 'The same dataset and transformations were processed using two different approaches
    inside n8n:'
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: 在 n8n 内部使用两种不同的方法处理相同的 dataset 和转换：
- en: '**All in JavaScript nodes** with functions directly within n8n.'
  id: totrans-188
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**全部在 JavaScript 节点中**，函数直接在 n8n 内部。'
- en: '**Outsourcing to FastAPI microservices** by replacing the JavaScript logic
    with HTTP requests to Python endpoints.'
  id: totrans-189
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**通过将 JavaScript 逻辑替换为对 Python 端点的 HTTP 请求来外包到 FastAPI 微服务中**。'
- en: '![](../Images/1be416d0caed6e43084b31dd5cbbf7ff.png)'
  id: totrans-190
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/1be416d0caed6e43084b31dd5cbbf7ff.png)'
- en: Simple Workflow using FastAPI microservice – (Image by Samir Saci)
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 FastAPI 微服务的简单工作流程 – （图片由 Samir Saci 提供）
- en: These two endpoints are connected to functions that will load the data directly
    from the VPS instance where I hosted the microservice.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 这两个端点连接到函数，可以直接从我在其中托管微服务的 VPS 实例加载数据。
- en: '[PRE16]'
  id: totrans-193
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: I want to focus this test only on the data processing performance.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 我只想关注数据处理的性能。
- en: The `SpeedAnalysis` includes all the data processing steps listed in the previous
    section
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: '`SpeedAnalysis` 包括上一节中列出的所有数据处理步骤'
- en: Grouping sales by `ITEM`
  id: totrans-196
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 按 `ITEM` 对销售进行分组
- en: Sorting `ITEM` by descending order and calculate cumulative sales
  id: totrans-197
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 按 `ITEM` 降序排序并计算累计销售额
- en: Calculating standard deviations and means of sales distribution by `ITEM`
  id: totrans-198
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过 `ITEM` 计算销售分布的标准差和平均值
- en: '[PRE17]'
  id: totrans-199
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: Now that we have these endpoints ready, we can begin testing.
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们有了这些端点，我们可以开始测试。
- en: '![](../Images/9ef2e2df6d97863cbf0cc0d638d6f886.png)'
  id: totrans-201
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/9ef2e2df6d97863cbf0cc0d638d6f886.png)'
- en: 'Results of the experimentation (Top: Processing using native code nodes / Bottom:
    FastAPI Microservice) – (Image by Samir Saci)'
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 实验结果（顶部：使用原生代码节点进行处理 / 底部：FastAPI 微服务） – （图片由 Samir Saci 提供）
- en: 'The results are shown above:'
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 结果显示在上文：
- en: '**JavaScript-only workflow**: The whole process was completed in **a bit more
    than 11.7 seconds**.'
  id: totrans-204
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**仅 JavaScript 的工作流程**：整个过程在 **11.7 秒多一点** 内完成。'
- en: '*Most of the time was spent updating sheets and performing iterative calculations
    within n8n nodes.*'
  id: totrans-205
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '*大部分时间都花在了更新表格和在 n8n 节点内进行迭代计算上。*'
- en: '**FastAPI-backed workflow**: The equivalent “outsourced” process was completed
    in **~11.0 seconds**.'
  id: totrans-206
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**基于 FastAPI 的工作流程**：等效的“外包”过程在 **~11.0 秒** 内完成。'
- en: '*Heavy computations were offloaded to Python microservices, which handled them
    faster than native JavaScript nodes.*'
  id: totrans-207
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '*将大量计算卸载到 Python 微服务中，它们处理得比原生 JavaScript 节点更快。*'
- en: In other words, **outsourcing complex computations to Python actually improves**
    the performance.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，**将复杂的计算外包给Python实际上可以提高**性能。
- en: The reason is that FastAPI endpoints execute optimised Python functions directly,
    while JavaScript nodes inside n8n must iterate (with loops).
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 原因是FastAPI端点直接执行优化的Python函数，而n8n内部的JavaScript节点必须迭代（使用循环）。
- en: For large datasets, I would imagine a delta that is probably not negligible.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 对于大型数据集，我想象的delta可能不是微不足道的。
- en: Conclusion
  id: totrans-211
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 结论
- en: This demonstrates that you can do simple data processing within n8n using small
    JavaScript snippets.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 这证明了你可以在n8n中使用小的JavaScript片段进行简单的数据处理。
- en: However, our Supply Chain Analytics products can require more advanced processing
    involving optimisation and advanced statistical libraries.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我们的供应链分析产品可能需要更高级的处理，涉及优化和高级统计库。
- en: '![](../Images/53f55b2ffc3524b91ec1ec1a2ceab5bf.png)'
  id: totrans-214
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/53f55b2ffc3524b91ec1ec1a2ceab5bf.png)'
- en: '[AI Workflow for Production Planning Optimisation](https://towardsdatascience.com/ai-agents-for-supply-chain-optimisation-production-planning/)
    (Image by Samir Saci)'
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: '[生产计划优化AI工作流程](https://towardsdatascience.com/ai-agents-for-supply-chain-optimisation-production-planning/)
    (图片由Samir Saci提供)'
- en: For that, customers can accept dealing with a “black box” approach, as seen
    in the [Production Planning workflow](https://towardsdatascience.com/ai-agents-for-supply-chain-optimisation-production-planning/)
    presented [in this Towards Data Science article](https://towardsdatascience.com/ai-agents-for-supply-chain-optimisation-production-planning/).
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，客户可以接受处理一个“黑盒”方法，正如在[生产计划工作流程](https://towardsdatascience.com/ai-agents-for-supply-chain-optimisation-production-planning/)中看到的，该工作流程在[这篇Towards
    Data Science文章](https://towardsdatascience.com/ai-agents-for-supply-chain-optimisation-production-planning/)中介绍。
- en: But for *light processing tasks,* we can integrate them into the workflow to
    provide visibility to non-code users.
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 但对于**轻量级处理任务**，我们可以将它们集成到工作流程中，为非代码用户提供可见性。
- en: For another project, I use n8n to connect Supply Chain IT systems for the transfer
    of Purchase Orders using Electronic Data Interchange (EDI).
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
  zh: 对于另一个项目，我使用n8n连接供应链IT系统，使用电子数据交换（EDI）进行采购订单的传输。
- en: '![](../Images/c0a2bdca624661072689b98ffca499f4.png)'
  id: totrans-219
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c0a2bdca624661072689b98ffca499f4.png)'
- en: '[Example of Electronic Data Interchange (EDI) Parsing Workflow](https://n8n.io/workflows/3221-electronic-data-interchange-edi-message-parsing-with-gmail-and-google-sheet/)
    – (Image by Samir Saci)'
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
  zh: '[电子数据交换（EDI）解析工作流程示例](https://n8n.io/workflows/3221-electronic-data-interchange-edi-message-parsing-with-gmail-and-google-sheet/)
    – (图片由Samir Saci提供)'
- en: This workflow, deployed for a small logistics company, entirely parses EDI messages
    using JavaScript nodes.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 这个工作流程，部署给一家小型物流公司，完全使用JavaScript节点解析EDI消息。
- en: '![](../Images/ea05403590a347940aaafb6e548e997c.png)'
  id: totrans-222
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ea05403590a347940aaafb6e548e997c.png)'
- en: Example of Electronic Data Interchange Message – (Image by Samir Saci)
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 电子数据交换消息示例 – (图片由Samir Saci提供)
- en: As you can discover in this tutorial, we have performed 100% of the Electronic
    Data Interchange message parsing using JavaScript nodes.
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
  zh: 正如你可以在本教程中发现的那样，我们使用了100%的JavaScript节点来执行电子数据交换消息的解析。
- en: This helped us to improve the robustness of the solution and reduce our workload
    by handing over the maintenance to the customer.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 这帮助我们提高了解决方案的鲁棒性，并通过将维护工作转交给客户来减少我们的工作量。
- en: What is the best approach?
  id: totrans-226
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 最好的方法是什么？
- en: For me, n8n should be used as an **orchestration and integration tool** connected
    to our **core analytics products.**
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 对我来说，n8n应该作为一个**编排和集成工具**使用，连接到我们的**核心分析产品**。
- en: These analytics products require specific input formats that may not align with
    our customers’ data.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: 这些分析产品需要特定的输入格式，可能不符合我们客户的数据。
- en: Therefore, I would advise using JavaScript code nodes to perform this preprocessing.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我建议使用JavaScript代码节点来执行此预处理。
- en: '![](../Images/ad738347d6fafe008498d2fd4f0e10ff.png)'
  id: totrans-230
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ad738347d6fafe008498d2fd4f0e10ff.png)'
- en: Workflow for [Distribution Planning Optimisation Algorithm](https://www.youtube.com/watch?v=DPWPTWXylas)
    – (Image by Samir Saci)
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: '[分销计划优化算法工作流程](https://www.youtube.com/watch?v=DPWPTWXylas)的工作流程 – (图片由Samir
    Saci提供)'
- en: For example, the workflow above connects a Google Sheet (containing input data)
    to a FastAPI microservice that runs an** algorithm for Distribution Planning Optimisation****.**
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，上述工作流程将一个包含输入数据的Google Sheets连接到一个运行**分销计划优化算法**的FastAPI微服务**。
- en: The idea is to plug our optimisation algorithm into a Google Sheet used by Distribution
    Planners to organise store deliveries.
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
  zh: 这个想法是将我们的优化算法集成到分销计划员使用的Google Sheets中，以组织商店的配送。
- en: '![](../Images/4818c3e14449e21e114513c54ab164aa.png)'
  id: totrans-234
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/4818c3e14449e21e114513c54ab164aa.png)'
- en: Worksheet used by Planning Teams – (Image by Samir Saci)
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 计划团队使用的电子表格 – (图片由Samir Saci提供)
- en: The JavaScript code node is used to transform the data collected from the Google
    Sheet into the input format required by our algorithm.
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
  zh: 使用JavaScript代码节点将收集自Google Sheets的数据转换为我们的算法所需的输入格式。
- en: By doing the job inside the workflow, it remains under the control of the customer
    who runs the workflow in their own instance.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: 通过在工作流内部完成工作，它始终处于运行自己实例的工作流客户的控制之下。
- en: And we can keep the optimisation part in a microservice hosted on our instance.
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以将优化部分放在我们实例上托管的一个微服务中。
- en: To better understand the setup, feel free to have a look at this short presentation
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: 为了更好地理解设置，请随意查看这个简短的演示
- en: I hope this tutorial and the examples above have given you enough insight to
    understand what can be done with n8n in terms of data analytics.
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望这个教程和上面的示例已经给了你足够的洞察力，让你了解使用n8n在数据分析方面可以做什么。
- en: Feel free to share your comments about the approach and your thoughts on what
    could be improved to enhance the workflow’s performance with me.
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: 请随意与我分享你对这种方法以及你认为如何改进以提高工作流性能的看法。
- en: About Me
  id: totrans-242
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关于我
- en: Let’s connect on [Linkedin](https://www.linkedin.com/in/samir-saci/) and [Twitter](https://twitter.com/Samir_Saci_).
    I am a Supply Chain Engineer who uses data analytics to improve logistics operations
    and reduce costs.
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们在[领英](https://www.linkedin.com/in/samir-saci/)和[Twitter](https://twitter.com/Samir_Saci_)上建立联系。我是一名供应链工程师，使用数据分析来改善物流运营并降低成本。
- en: For consulting or advice on analytics and sustainable supply chain transformation,
    feel free to contact me via [Logigreen Consulting](https://www.logi-green.com/).
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 如需咨询或关于分析和可持续供应链转型的建议，请通过[Logigreen Consulting](https://www.logi-green.com/)联系我。
- en: Find your complete guide for Supply Chain Analytics: [Analytics Cheat Sheet](https://bit.ly/supply-chain-cheat).
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 查找你的供应链分析完整指南：[Analytics Cheat Sheet](https://bit.ly/supply-chain-cheat)。
- en: If you are interested in Data Analytics and Supply Chain, look at my website.
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你对数据分析和对供应链感兴趣，请查看我的网站。
