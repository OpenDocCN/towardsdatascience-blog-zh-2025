- en: Understanding Random Forest using Python (scikit-learn)
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/understanding-random-forest-using-python-scikit-learn/](https://towardsdatascience.com/understanding-random-forest-using-python-scikit-learn/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '<mdspan datatext="el1747270837364" class="mdspan-comment">Decision</mdspan>
    trees are a popular supervised learning algorithm with benefits that include being
    able to be used for both regression and classification as well as being easy to
    interpret. However, decision trees aren’t the most performant algorithm and are
    prone to overfitting due to small variations in the training data. This can result
    in a completely different tree. This is why people often turn to ensemble models
    like Bagged Trees and Random Forests. These consist of multiple decision trees
    trained on bootstrapped data and aggregated to achieve better predictive performance
    than any single tree could offer. This tutorial includes the following:'
  prefs: []
  type: TYPE_NORMAL
- en: What is Bagging
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What Makes Random Forests Different
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Training and Tuning a Random Forest using Scikit-Learn
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Calculating and Interpreting Feature Importance
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Visualizing Individual Decision Trees in a Random Forest
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: As always, the code used in this tutorial is available on my [GitHub](https://github.com/mGalarnyk/Python_Tutorials/blob/master/Sklearn/CART/Random_Forest/RandomForestUsingPython.ipynb).
    A [video version](https://youtu.be/R9tJeEgHyeo) of this tutorial is also available
    on my YouTube channel for those who prefer to follow along visually. With that,
    let’s get started!
  prefs: []
  type: TYPE_NORMAL
- en: What is Bagging (Bootstrap Aggregating)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![](../Images/b921b2de4c522ba18c44cf98f2fc8df3.png)'
  prefs: []
  type: TYPE_IMG
- en: '**B**ootstrap + **agg**rega**ting** = Bagging. Image by Michael Galarnyk.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Random forests can be categorized as bagging algorithms (**b**ootstrap **agg**regat**ing)**.
    Bagging consists of two steps:'
  prefs: []
  type: TYPE_NORMAL
- en: '1.) Bootstrap sampling: Create multiple training sets by randomly drawing samples
    with replacement from the original dataset. These new training sets, called bootstrapped
    datasets, typically contain the same number of rows as the original dataset, but
    individual rows may appear multiple times or not at all. On average, each bootstrapped
    dataset contains about 63.2% of the unique rows from the original data. The remaining
    ~36.8% of rows are left out and can be used for out-of-bag (OOB) evaluation. For
    more on this concept, see my [sampling with and without replacement blog post](https://towardsdatascience.com/understanding-sampling-with-and-without-replacement-python-7aff8f47ebe4/).'
  prefs: []
  type: TYPE_NORMAL
- en: '2.) Aggregating predictions: Each bootstrapped dataset is used to train a different
    decision tree model. The final prediction is made by combining the outputs of
    all individual trees. For classification, this is typically done through majority
    voting. For regression, predictions are averaged.'
  prefs: []
  type: TYPE_NORMAL
- en: Training each tree on a different bootstrapped sample introduces variation across
    trees. While this doesn’t fully eliminate correlation—especially when certain
    features dominate—it helps reduce overfitting when combined with aggregation.
    Averaging the predictions of many such trees reduces the overall **variance**
    of the ensemble, improving generalization.
  prefs: []
  type: TYPE_NORMAL
- en: What Makes Random Forests Different
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![](../Images/50f3dd538a30b2aad56d4ff47c239481.png)'
  prefs: []
  type: TYPE_IMG
- en: In contrast to some other bagged trees algorithms, for each decision tree in
    random forests, only a subset of features is randomly selected at each decision
    node and the best split feature from the subset is used. Image by Michael Galarnyk.
  prefs: []
  type: TYPE_NORMAL
- en: 'Suppose there’s a single strong feature in your dataset. In [bagged trees](https://youtu.be/urb2wRxnGz4?si=voTNstvcYQMLdlNJ),
    each tree may repeatedly split on that feature, leading to correlated trees and
    less benefit from aggregation. Random Forests reduce this issue by introducing
    further randomness. Specifically, they change how splits are selected during training:'
  prefs: []
  type: TYPE_NORMAL
- en: 1). Create N bootstrapped datasets. Note that while bootstrapping is commonly
    used in Random Forests, it is not strictly necessary because step 2 (random feature
    selection) introduces sufficient diversity among the trees.
  prefs: []
  type: TYPE_NORMAL
- en: 2). For each tree, at each node, a random subset of features is selected as
    candidates, and the best split is chosen from that subset. In scikit-learn, this
    is controlled by the `max_features` parameter, which defaults to `'sqrt'` for
    classifiers and `1` for regressors (equivalent to bagged trees).
  prefs: []
  type: TYPE_NORMAL
- en: '3). Aggregating predictions: vote for classification and average for regression.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Note: Random Forests use [sampling with replacement for bootstrapped datasets
    and sampling without replacement](https://towardsdatascience.com/understanding-sampling-with-and-without-replacement-python-7aff8f47ebe4/)
    for selecting a subset of features.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/3f824b2be5628874546dca1bca90a1ca.png)'
  prefs: []
  type: TYPE_IMG
- en: Sampling with replacement procedure. Image by Michael Galarnyk
  prefs: []
  type: TYPE_NORMAL
- en: Out-of-Bag (OOB) Score
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Because ~36.8% of training data is excluded from any given tree, you can use
    this holdout portion to evaluate that tree’s predictions. Scikit-learn allows
    this via the oob_score=True parameter, providing an efficient way to estimate
    generalization error. You’ll see this parameter used in the training example later
    in the tutorial.
  prefs: []
  type: TYPE_NORMAL
- en: Training and Tuning a Random Forest in Scikit-Learn
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Random Forests remain a strong baseline for tabular data thanks to their simplicity,
    interpretability, and ability to [parallelize](https://www.anyscale.com/blog/how-to-speed-up-scikit-learn-model-training)
    since each tree is trained independently. This section demonstrates how to load
    data, [perform a train test split](https://youtu.be/rCevxk3jeKs?si=SCzxap0-l3vBSrvM),
    train a baseline model, tune hyperparameters using grid search, and evaluate the
    final model on the test set.
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 1: Train a Baseline Model'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Before tuning, it’s good practice to train a baseline model using reasonable
    defaults. This gives you an initial sense of performance and lets you validate
    generalization using the out-of-bag (OOB) score, which is built into bagging-based
    models like Random Forests. This example uses the House Sales in King County dataset
    (CCO 1.0 Universal License), which contains property sales from the Seattle area
    between May 2014 and May 2015\. This approach allows us to reserve the test set
    for final evaluation after tuning.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/04e53b76e7de7dd80489801af2bd4a45.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Step 2: Tune Hyperparameters with Grid Search'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'While the baseline model gives a strong starting point, performance can often
    be improved by tuning key hyperparameters. Grid search cross-validation, as implemented
    by `GridSearchCV`, systematically explores combinations of hyperparameters and
    uses cross-validation to evaluate each one, selecting the configuration with the
    highest validation performance.The most commonly tuned hyperparameters include:'
  prefs: []
  type: TYPE_NORMAL
- en: '`n_estimators`: The number of decision trees in the forest. More trees can
    improve accuracy but increase training time.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`max_features`: The number of features to consider when looking for the best
    split. Lower values reduce correlation between trees.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`max_depth`: The maximum depth of each tree. Shallower trees are faster but
    may underfit.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`min_samples_split`: The minimum number of samples required to split an internal
    node. Higher values can reduce overfitting.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`min_samples_leaf`: The minimum number of samples required to be at a leaf
    node. Helps control tree size.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`bootstrap`: Whether bootstrap samples are used when building trees. If False,
    the whole dataset is used.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/61a300ebd0e455f49e275cac8ba342b7.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Step 3: Evaluate Final Model on Test Set'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now that we’ve selected the best-performing model based on cross-validation,
    we can evaluate it on the held-out test set to estimate its generalization performance.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/32d30b997fdfda34c39e8ddb3ee4c0b1.png)'
  prefs: []
  type: TYPE_IMG
- en: Calculating Random Forest Feature Importance
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'One of the key advantages of Random Forests is their interpretability — something
    that large language models (LLMs) often lack. While LLMs are powerful, they typically
    function as black boxes and can [exhibit biases that are difficult to identify](https://youtu.be/2v18R02mq8I?si=oeJadtZT3ytFmTE8).
    In contrast, scikit-learn supports two main methods for measuring feature importance
    in Random Forests: Mean Decrease in Impurity and Permutation Importance.'
  prefs: []
  type: TYPE_NORMAL
- en: '1). Mean Decrease in Impurity (MDI): Also known as Gini importance, this method
    calculates the total reduction in impurity brought by each feature across all
    trees. This is fast and built into the model via `reg.feature_importances_`. However,
    impurity-based feature importances can be misleading, especially for features
    with high cardinality (many unique values), as these features are more likely
    to be chosen simply because they provide more potential split points.'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/a3e4969b9c912d51afd9a37b64a8e08b.png)'
  prefs: []
  type: TYPE_IMG
- en: '2). Permutation Importance: This method assesses the decrease in model performance
    when a single feature’s values are randomly shuffled. Unlike MDI, it accounts
    for feature interactions and correlation. It is more reliable but also more computationally
    expensive.'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/f3435b340dcc4f32924b085569398738.png)'
  prefs: []
  type: TYPE_IMG
- en: It is important to note that our geographic features lat and long are also useful
    for visualization as the plot below shows. It’s likely that companies like Zillow
    leverage location information extensively in their valuation models.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/903d013e0c543a0c130d040b59f492e4.png)'
  prefs: []
  type: TYPE_IMG
- en: Housing Price percentile for King County. Image by Michael Galarnyk.
  prefs: []
  type: TYPE_NORMAL
- en: Visualizing Individual Decision Trees in a Random Forest
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A Random Forest consists of multiple decision trees—one for each estimator specified
    via the `n_estimators` parameter. After training the model, you can access these
    individual trees through the .estimators_ attribute. Visualizing a few of these
    trees can help illustrate how differently each one splits the data due to bootstrapped
    training samples and random feature selection at each split. While the earlier
    example used a RandomForestRegressor, here we demonstrate this visualization using
    a RandomForestClassifier trained on the Breast Cancer Wisconsin dataset (CC BY
    4.0 license) to highlight Random Forests’ versatility for both regression and
    classification tasks. [This short video](https://www.youtube.com/embed/X8UeOrsUKQ4)
    demonstrates what 100 trained estimators from this dataset look like.
  prefs: []
  type: TYPE_NORMAL
- en: Fit a Random Forest Model using Scikit-Learn
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: Plotting Individual Estimators (decision trees) from a Random Forest using Matplotlib
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: You can now view all the individual trees from the fitted model.
  prefs: []
  type: TYPE_NORMAL
- en: '`rf.estimators_`'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/6d533b03f00ae225b18f54490d2bed5b.png)'
  prefs: []
  type: TYPE_IMG
- en: You can now visualize individual trees. The code below visualizes the first
    decision tree.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/cad0b85ff2cc014248f056c56b2f93ac.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Although plotting many trees can be difficult to interpret, you may wish to
    explore the variety across estimators. The following example shows how to visualize
    the first five decision trees in the forest:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/653d9e5f49e6b42b67d4b3a7d4f5fac1.png)'
  prefs: []
  type: TYPE_IMG
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Random forests consist of multiple decision trees trained on bootstrapped data
    in order to achieve better predictive performance than could be obtained from
    any of the individual decision trees. If you have questions or thoughts on the
    tutorial, feel free to reach out through [YouTube](https://youtu.be/R9tJeEgHyeo?si=_TD53gsapwTk3VLk)
    or [X](https://twitter.com/GalarnykMichael).
  prefs: []
  type: TYPE_NORMAL
