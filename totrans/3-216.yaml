- en: 'How LLMs Work: Reinforcement Learning, RLHF, DeepSeek R1, OpenAI o1, AlphaGo'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/how-llms-work-reinforcement-learning-rlhf-deepseek-r1-openai-o1-alphago/](https://towardsdatascience.com/how-llms-work-reinforcement-learning-rlhf-deepseek-r1-openai-o1-alphago/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Welcome to part 2 of my LLM deep dive. If you’ve not read Part 1, I highly encourage
    you to [check it out first](https://towardsdatascience.com/how-llms-work-pre-training-to-post-training-neural-networks-hallucinations-and-inference/).
  prefs: []
  type: TYPE_NORMAL
- en: 'Previously, we covered the first two major stages of training an LLM:'
  prefs: []
  type: TYPE_NORMAL
- en: Pre-training — Learning from massive datasets to form a base model.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Supervised fine-tuning (SFT) — Refining the model with curated examples to make
    it useful.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Now, we’re diving into the next major stage: **Reinforcement Learning (RL)**.
    While pre-training and SFT are well-established, RL is still evolving but has
    become a critical part of the training pipeline.'
  prefs: []
  type: TYPE_NORMAL
- en: I’ve taken reference from [Andrej Karpathy’s widely popular 3.5-hour YouTube](https://www.youtube.com/watch?app=desktop&v=7xTGNNLPyMI).
    Andrej is a founding member of OpenAI, his insights are gold — you get the idea.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s go 🚀
  prefs: []
  type: TYPE_NORMAL
- en: What’s the purpose of reinforcement learning (RL)?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Humans and LLMs process information differently. What’s intuitive for us — like
    basic arithmetic — may not be for an LLM, which only sees text as sequences of
    tokens. Conversely, an LLM can generate expert-level responses on complex topics
    simply because it has seen enough examples during training.
  prefs: []
  type: TYPE_NORMAL
- en: This difference in cognition makes it challenging for human annotators to provide
    the “perfect” set of labels that consistently guide an LLM toward the right answer.
  prefs: []
  type: TYPE_NORMAL
- en: '*RL bridges this gap by allowing the model to* ***learn from its own experience****.*'
  prefs: []
  type: TYPE_NORMAL
- en: Instead of relying solely on explicit labels, the model explores different token
    sequences and receives feedback — reward signals — on which outputs are most useful.
    Over time, it learns to align better with human intent.
  prefs: []
  type: TYPE_NORMAL
- en: Intuition behind RL
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: LLMs are stochastic — meaning their responses aren’t fixed. Even with the same
    prompt, the output varies because it’s sampled from a probability distribution.
  prefs: []
  type: TYPE_NORMAL
- en: We can harness this randomness by generating thousands or even millions of possible
    responses **in parallel**. Think of it as the model exploring different paths — some
    good, some bad. **Our goal is to encourage it to take the better paths more often.**
  prefs: []
  type: TYPE_NORMAL
- en: To do this, we train the model on the sequences of tokens that lead to better
    outcomes. Unlike supervised fine-tuning, where human experts provide labeled data,
    **reinforcement learning allows the model to** ***learn from itself.***
  prefs: []
  type: TYPE_NORMAL
- en: The model discovers which responses work best, and after each training step,
    we update its parameters. Over time, this makes the model more likely to produce
    high-quality answers when given similar prompts in the future.
  prefs: []
  type: TYPE_NORMAL
- en: But how do we determine which responses are best? And how much RL should we
    do? The details are tricky, and getting them right is not trivial.
  prefs: []
  type: TYPE_NORMAL
- en: RL is not “new” — It can surpass human expertise (AlphaGo, 2016)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A great example of RL’s power is DeepMind’s AlphaGo, the first AI to defeat
    a professional Go player and later surpass human-level play.
  prefs: []
  type: TYPE_NORMAL
- en: In the [2016 Nature paper](https://discovery.ucl.ac.uk/id/eprint/10045895/1/agz_unformatted_nature.pdf)
    (graph below), when a model was trained purely by SFT (giving the model tons of
    good examples to imitate from), the model was able to reach human-level performance,
    **but never surpass it**.
  prefs: []
  type: TYPE_NORMAL
- en: The dotted line represents Lee Sedol’s performance — the best Go player in the
    world.
  prefs: []
  type: TYPE_NORMAL
- en: '***This is because SFT is about replication, not innovation — it doesn’t allow
    the model to discover new strategies beyond human knowledge.***'
  prefs: []
  type: TYPE_NORMAL
- en: However, RL enabled AlphaGo to play against itself, refine its strategies, and
    ultimately **exceed human expertise** (blue line).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d14589f50a3ce24a68eaccc9b72cff59.png)'
  prefs: []
  type: TYPE_IMG
- en: Image taken from [AlphaGo 2016 paper](https://discovery.ucl.ac.uk/id/eprint/10045895/1/agz_unformatted_nature.pdf)
  prefs: []
  type: TYPE_NORMAL
- en: RL represents an exciting frontier in AI — where models can explore strategies
    beyond human imagination when we train it on a diverse and challenging pool of
    problems to refine it’s thinking strategies.
  prefs: []
  type: TYPE_NORMAL
- en: RL foundations recap
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Let’s quickly recap the key components of a typical RL setup:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/12de13cc5413fbaf2f8566d45be6c624.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: '***Agent***—The learner or decision maker. It observes the current situation
    (*state*), chooses an action, and then updates its behaviour based on the outcome
    (*reward*).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '***Environment***  — The external system in which the agent operates.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '***State*** —  A snapshot of the environment at a given step *t*.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: At each timestamp, the agent performs an ***action*** in the environment that
    will change the environment’s state to a new one. The agent will also receive
    feedback indicating how good or bad the action was.
  prefs: []
  type: TYPE_NORMAL
- en: This feedback is called a ***reward***, and is represented in a numerical form.
    A positive reward encourages that behaviour, and a negative reward discourages
    it.
  prefs: []
  type: TYPE_NORMAL
- en: By using feedback from different states and actions, the agent gradually learns
    the optimal strategy to **maximise the total reward** over time.
  prefs: []
  type: TYPE_NORMAL
- en: Policy
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The policy is the agent’s strategy. If the agent follows a good policy, it will
    consistently make good decisions, leading to higher rewards over many steps.
  prefs: []
  type: TYPE_NORMAL
- en: '**In mathematical terms, it is a function that determines the probability of
    different outputs for a given state — *****(πθ(a|s))*****.**'
  prefs: []
  type: TYPE_NORMAL
- en: Value function
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: An estimate of how good it is to be in a certain state, considering the long
    term expected reward. For an LLM, the reward might come from human feedback or
    a reward model.
  prefs: []
  type: TYPE_NORMAL
- en: Actor-Critic architecture
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'It is a popular RL setup that combines two components:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Actor** — Learns and updates the **policy** (πθ), deciding which action to
    take in each state.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Critic** — Evaluates the **value function** (V(s)) to give feedback to the
    actor on whether its chosen actions are leading to good outcomes.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'How it works:'
  prefs: []
  type: TYPE_NORMAL
- en: The **actor** picks an action based on its current policy.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The **critic** evaluates the outcome (reward + next state) and updates its value
    estimate.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The critic’s feedback helps the actor refine its policy so that future actions
    lead to higher rewards.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Putting it all together for LLMs
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The state can be the current text (prompt or conversation), and the action can
    be the next token to generate. A reward model (eg. human feedback), tells the
    model how good or bad it’s generated text is.
  prefs: []
  type: TYPE_NORMAL
- en: The policy is the model’s strategy for picking the next token, while the value
    function estimates how beneficial the current text context is, in terms of eventually
    producing high quality responses.
  prefs: []
  type: TYPE_NORMAL
- en: DeepSeek-R1 (published 22 Jan 2025)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'To highlight RL’s importance, let’s explore DeepSeek-R1, a reasoning model
    achieving top-tier performance while remaining open-source. [The paper introduced
    two models: **DeepSeek-R1-Zero and DeepSeek-R1.**](https://arxiv.org/abs/2501.12948)'
  prefs: []
  type: TYPE_NORMAL
- en: DeepSeek-R1-Zero was trained solely via large-scale RL, skipping supervised
    fine-tuning (SFT).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: DeepSeek-R1 builds on it, addressing encountered challenges.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Deepseek R1 is one of the most amazing and impressive breakthroughs I’ve ever
    seen — and as open source, a profound gift to the world. 🤖🫡
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — Marc Andreessen 🇺🇸 (@pmarca) [January 24, 2025](https://twitter.com/pmarca/status/1882719769851474108?ref_src=twsrc%5Etfw)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Let’s dive into some of these key points.
  prefs: []
  type: TYPE_NORMAL
- en: '1\. RL algo: Group Relative Policy Optimisation (GRPO)'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: One key game changing RL algorithm is Group Relative Policy Optimisation (GRPO),
    a variant of the widely popular Proximal Policy Optimisation (PPO). [GRPO was
    introduced in the DeepSeekMath paper in Feb 2024.](https://arxiv.org/abs/2402.03300)
  prefs: []
  type: TYPE_NORMAL
- en: '***Why GRPO over PPO?***'
  prefs: []
  type: TYPE_NORMAL
- en: 'PPO struggles with reasoning tasks due to:'
  prefs: []
  type: TYPE_NORMAL
- en: Dependency on a critic model.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: PPO needs a separate critic model, effectively doubling memory and compute.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Training the critic can be complex for nuanced or subjective tasks.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: High computational cost as RL pipelines demand substantial resources to evaluate
    and optimise responses.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Absolute reward evaluations
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: When you rely on an absolute reward — meaning there’s a single standard or metric
    to judge whether an answer is “good” or “bad” — it can be hard to capture the
    nuances of open-ended, diverse tasks across different reasoning domains.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '***How GRPO addressed these challenges:***'
  prefs: []
  type: TYPE_NORMAL
- en: GRPO eliminates the critic model by using **relative evaluation** — responses
    are compared within a group rather than judged by a fixed standard.
  prefs: []
  type: TYPE_NORMAL
- en: Imagine students solving a problem. Instead of a teacher grading them individually,
    they compare answers, learning from each other. Over time, performance converges
    toward higher quality.
  prefs: []
  type: TYPE_NORMAL
- en: '**How does GRPO fit into the whole training process?**'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'GRPO modifies how loss is calculated while keeping other training steps unchanged:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Gather data (queries + responses)**– For LLMs, queries are like questions'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: – The old policy (older snapshot of the model) generates several candidate answers
    for each query
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Assign rewards **— each response in the group is scored (the “reward”).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Compute the GRPO loss**Traditionally, you’ll compute a loss — which shows
    the deviation between the model prediction and the true label.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**In GRPO, however, you measure:**a) How likely is the new policy to produce
    past responses?'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: b) Are those responses relatively better or worse?
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: c) Apply clipping to prevent extreme updates.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: This yields a scalar loss.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Back propagation + gradient descent**– Back propagation calculates how each
    parameter contributed to loss'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: – Gradient descent updates those parameters to reduce the loss
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: – Over many iterations, this gradually shifts the new policy to prefer higher
    reward responses
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Update the old policy occasionally to match the new policy**.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: This refreshes the baseline for the next round of comparisons.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: 2\. Chain of thought (CoT)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Traditional LLM training follows pre-training → SFT → RL. However, DeepSeek-R1-Zero
    **skipped SFT**, allowing the model to directly explore CoT reasoning.
  prefs: []
  type: TYPE_NORMAL
- en: 'Like humans thinking through a tough question, CoT enables models to break
    problems into intermediate steps, boosting complex reasoning capabilities. OpenAI’s
    o1 model also leverages this, as noted in its September 2024 report: **o1’s performance
    improves with more RL (train-time compute) and more reasoning time (test-time
    compute).**'
  prefs: []
  type: TYPE_NORMAL
- en: DeepSeek-R1-Zero exhibited reflective tendencies, autonomously refining its
    reasoning.
  prefs: []
  type: TYPE_NORMAL
- en: '***A key graph (below) in the paper showed increased thinking during training,
    leading to longer (more tokens), more detailed and better responses.***'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/cc4d6323bd0e0c65391b1576c58ca116.png)'
  prefs: []
  type: TYPE_IMG
- en: Image taken from [DeepSeek-R1 paper](https://arxiv.org/abs/2501.12948)
  prefs: []
  type: TYPE_NORMAL
- en: Without explicit programming, it began revisiting past reasoning steps, improving
    accuracy. This highlights chain-of-thought reasoning as an emergent property of
    RL training.
  prefs: []
  type: TYPE_NORMAL
- en: The model also had an “aha moment” (below) — a fascinating example of how RL
    can lead to unexpected and sophisticated outcomes.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/2dab00ca8d8855befff1fb24db13b11c.png)'
  prefs: []
  type: TYPE_IMG
- en: Image taken from [DeepSeek-R1 paper](https://arxiv.org/abs/2501.12948)
  prefs: []
  type: TYPE_NORMAL
- en: 'Note: Unlike DeepSeek-R1, OpenAI does not show full exact reasoning chains
    of thought in o1 as they are concerned about a distillation risk — where someone
    comes in and tries to imitate those reasoning traces and recover a lot of the
    reasoning performance by just imitating. Instead, o1 just summaries of these chains
    of thoughts.'
  prefs: []
  type: TYPE_NORMAL
- en: Reinforcement learning with Human Feedback (RLHF)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: For tasks with verifiable outputs (e.g., math problems, factual Q&A), AI responses
    can be easily evaluated. But what about areas like summarisation or creative writing,
    where there’s no single “correct” answer?
  prefs: []
  type: TYPE_NORMAL
- en: This is where human feedback comes in — but naïve RL approaches are unscalable.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/0e55f94e77b05871ee5d484e9b2efa50.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: Let’s look at the naive approach with some arbitrary numbers.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/7fc7268275b94cd58a2fd41bca2b8cdc.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: That’s one billion human evaluations needed! This is too costly, slow and unscalable.
    Hence, a smarter solution is to train an AI “reward model” to learn human preferences,
    dramatically reducing human effort.
  prefs: []
  type: TYPE_NORMAL
- en: '***Ranking responses is also easier and more intuitive than absolute scoring.***'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/2c124b0a299ea6ea7a4c315cdfeeae9c.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: Upsides of RLHF
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Can be applied to any domain, including creative writing, poetry, summarisation,
    and other open-ended tasks.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Ranking outputs is much easier for human labellers than generating creative
    outputs themselves.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Downsides of RLHF
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The reward model is an approximation — it may not perfectly reflect human preferences.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: RL is good at gaming the reward model — if run for too long, the model might
    exploit loopholes, generating nonsensical outputs that still get high scores.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '***Do note that RLHF is not the same as traditional RL.***'
  prefs: []
  type: TYPE_NORMAL
- en: For empirical, verifiable domains (e.g. math, coding), RL can run indefinitely
    and discover novel strategies. RLHF, on the other hand, is more like a fine-tuning
    step to align models with human preferences.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: And that’s a wrap! I hope you enjoyed Part 2 🙂 If you haven’t already read Part
    1 — [do check it out here](https://towardsdatascience.com/how-llms-work-pre-training-to-post-training-neural-networks-hallucinations-and-inference/).
  prefs: []
  type: TYPE_NORMAL
- en: Got questions or ideas for what I should cover next? Drop them in the comments — I’d
    love to hear your thoughts. See you in the next article!
  prefs: []
  type: TYPE_NORMAL
