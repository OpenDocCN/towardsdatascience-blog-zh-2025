- en: Speed Up PyTorch With Custom Kernels. But It Gets Progressively Darker
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/speed-up-pytorch-with-custom-kernels-but-it-gets-progressively-darker-e5a057796269/](https://towardsdatascience.com/speed-up-pytorch-with-custom-kernels-but-it-gets-progressively-darker-e5a057796269/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Speed Up PyTorch with Custom Kernels
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Read for free at [alexdremov.me](https://alexdremov.me/speed-up-pytorch-with-custom-kernels-but-it-gets-progressively-darker?utm_source=medium)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: PyTorch offers remarkable flexibility, allowing you to code complex GPU-accelerated
    operations in a matter of seconds. However, this convenience comes at a cost.
    PyTorch executes your code sequentially, resulting in suboptimal performance.
    This translates into slower model training, which impacts the iteration cycle
    of your experiments, the robustness of your team, the financial implications,
    and so on.
  prefs: []
  type: TYPE_NORMAL
- en: In this post, I’ll explore three strategies for accelerating your PyTorch operations.
    Each method uses **softmax** as our "Hello World" demonstration, but you can swap
    it with any function you like, and the discussed methods would still apply.
  prefs: []
  type: TYPE_NORMAL
- en: We’ll begin with **torch.compile**, move on to writing a custom Triton kernel,
    and finally dive into designing a CUDA kernel.
  prefs: []
  type: TYPE_NORMAL
- en: So, this post may get complicated, but bear with me.
  prefs: []
  type: TYPE_NORMAL
- en: '`torch.compile` – A Quick Way to Boost Performance'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 💥 *"Wait, you just turn on a single function call and it speeds up your code?
    That’s it? Sounds too good to be true."*
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Yes.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The `torch.compile` is a relatively new API in PyTorch that uses runtime graph
    capture and kernel fusion under the hood . With one decorator, you can often see
    speed improvements without significant changes to your code.
  prefs: []
  type: TYPE_NORMAL
- en: Speaking simply, for example, we can speed up calculations by merging operations
    into one GPU function, which removes overheads of separate GPU calls. Or even
    better, optimize a chain of operations by replacing them with one equivalent!
  prefs: []
  type: TYPE_NORMAL
- en: Such optimizations are not possible in the regular PyTorch execution mode (eager)
    as it executes operations just as they are called in the code.
  prefs: []
  type: TYPE_NORMAL
- en: Softmax Implementation with `torch.compile`
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Below is a simple example showing how to implement and compile a softmax function
    using `torch.compile`. Replace it in your model’s forward pass, and your code
    (hopefully) runs faster.
  prefs: []
  type: TYPE_NORMAL
- en: ❗ Note that you’ll have bigger speedups if you compile the whole model and not
    just one operation
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Pros**:'
  prefs: []
  type: TYPE_NORMAL
- en: One line to enable the compiler.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: No black magic rituals needed (except for the dynamic shapes maybe).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Cons**:'
  prefs: []
  type: TYPE_NORMAL
- en: The first pass can be slower while it compiles; afterwards, it picks up speed.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Doesn’t always produce dramatic speed-ups for *all* models and can occasionally
    break if your code is too creative.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Still has problems with handling dynamic shapes.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 😡 Dynamic shapes compilation mode is needed when input shapes change and we
    don’t want to recompile the code for each specific size.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The ways to debug this is a whole new article.
  prefs: []
  type: TYPE_NORMAL
- en: Triton Code – Write GPU Kernels With Python Breeze
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Why Use Triton?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**Triton** is a language that compiles to efficient GPU kernels while letting
    you write Pythonic code. It’s used under the hood of PyTorch’s dynamo/inductor
    stack, but you can also write your own custom ops! For many matrix/tensor operations
    – like softmax – you can get huge speed-ups. Because **why** wait for official
    PyTorch kernels when you can write your own?'
  prefs: []
  type: TYPE_NORMAL
- en: Softmax in Triton
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Here’s a minimal snippet that shows how we might do a naive softmax forward
    in Triton. I’ll keep it short and sweet for demonstration. In a real project,
    you’d likely do more advanced tiling and block management.
  prefs: []
  type: TYPE_NORMAL
- en: 💥 This may look complicated, but you just need to get familiar with Triton,
    and it will start making sense.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Check out [their guides](https://triton-lang.org/main/index.html?ref=alexdremov.me)
  prefs: []
  type: TYPE_NORMAL
- en: Indeed, it looks complicated. But the core of the algorithm is summarized in
    a few lines.
  prefs: []
  type: TYPE_NORMAL
- en: Everything else is just data management and side-hustle.
  prefs: []
  type: TYPE_NORMAL
- en: If we’ll conduct benchmarking for different data length, we’ll see that we match
    `torch.nn.functional.softmax` performance **(which is highly optimized kernel!)**
    and dramatically outperform naive torch implementation.
  prefs: []
  type: TYPE_NORMAL
- en: '![Benchmarking | Image by the author](../Images/d21e8537aa4213b643533e5b6277382c.png)'
  prefs: []
  type: TYPE_IMG
- en: Benchmarking | Image by the author
  prefs: []
  type: TYPE_NORMAL
- en: You may find the full code for the kernel and benchmark in the following github
    file.
  prefs: []
  type: TYPE_NORMAL
- en: '[**kernels/src/softmax/kernel.py at main · alexdremov/kernels**](https://github.com/alexdremov/kernels/blob/main/src/softmax/kernel.py?ref=medium.com)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Pros**:'
  prefs: []
  type: TYPE_NORMAL
- en: Potentially huge speed-ups by fusing ops and optimizing memory access patterns.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: More control than `torch.compile`.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Easy to write efficient code (we matched torch implementation!)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Easy to write inefficient code (if you don’t know what you’re doing).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Cons**:'
  prefs: []
  type: TYPE_NORMAL
- en: You’re now the *kernel developer*, which means debugging if something goes sideways.
    Which is tough. Really.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If you go further with custom backward passes, you might need a second coffee…
    or more. That’s because torch cannot use autograd for triton. So you will need
    to define backward yourself.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Pure CUDA (a.k.a. Going Hardcore)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Sometimes even Triton won’t cut it, or you just enjoy living on the edge. In
    that case, you can write a custom CUDA kernel in C++, compile it, and tie it into
    PyTorch via a custom extension. Projects like [[this fused CUDA softmax reference]](https://github.com/fattorib/CudaSoftmax?ref=alexdremov.me)
    show how people build specialized kernels for maximum speed.
  prefs: []
  type: TYPE_NORMAL
- en: Softmax in Custom CUDA
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: You’ll typically have a `setup.py` that compiles a `.cu` or `.cpp` file and
    exposes a Python function as an extension.
  prefs: []
  type: TYPE_NORMAL
- en: '[**GitHub – fattorib/CudaSoftmax: Softmax CUDA kernel 🙂**](https://github.com/fattorib/CudaSoftmax?ref=alexdremov.me)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I will not provide the code for this method in this post, so this fact speaks
    for itself. This approach is quite complicated, requires good justification, and
    usually the last thing you should try doing.
  prefs: []
  type: TYPE_NORMAL
- en: It’s very easy to write inefficient, buggy, unsafe code.
  prefs: []
  type: TYPE_NORMAL
- en: '**Pros**:'
  prefs: []
  type: TYPE_NORMAL
- en: Maximum control. "If you want something done right, do it yourself."
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Potential for the fastest possible kernel if well-optimized.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Cons**:'
  prefs: []
  type: TYPE_NORMAL
- en: Requires deep CUDA understanding.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Memory management, block sizes, shared memory – those are hard!
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Maintenance overhead can be **extremely** high.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'When it comes to speeding up PyTorch operations, you can choose from progressively
    more intricate methods:'
  prefs: []
  type: TYPE_NORMAL
- en: '**`torch.compile`**: Minimal code changes needed.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Triton Kernel**: More control over kernel behaviour, still quite easy coding.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Pure CUDA**: Maximum optimisation potential, but **a lot higher** complexity.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: If you’re looking for the simplest improvement, start with `torch.compile`.
    If that’s insufficient, explore Triton. For advanced users, writing a custom CUDA
    kernel can yield further gains, though it demands deep GPU programming skills.
  prefs: []
  type: TYPE_NORMAL
- en: Subscribe to not miss posts about other optimisations and useful deep learning
    techniques!
  prefs: []
  type: TYPE_NORMAL
