  type: TYPE_NORMAL
- en: 'To demonstrate how the impact of the runtime optimizations we discussed depend
    on the details of the AI/ML model, we reran our experiment on a Vision Transformer
    (ViT) model from the popular [timm](https://pypi.org/project/timm/) library:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: 'One modification in this experiment was to apply [OpenVINO compilation directly
    to the PyTorch model](https://docs.openvino.ai/2025/openvino-workflow/model-preparation/convert-model-pytorch.html) rather
    than an intermediate ONNX model. This was due to the fact that OpenVINO compilation
    failed on the ViT ONNX model. The revised [NNCF quantization](https://docs.openvino.ai/2025/openvino-workflow/model-optimization-guide/quantizing-models-post-training/basic-quantization-flow.html#) and
