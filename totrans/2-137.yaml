- en: The Expanded Code
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The following Python code was written in JupyterLab and is described by cell.
  prefs: []
  type: TYPE_NORMAL
- en: Importing Libraries / Assigning Constants
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: After importing the necessary libraries, we define a series of configuration
    constants that allow us to easily adjust the filter criteria, map boundaries,
    plot dimensions, and more. For this analysis, we focus on tornadoes within the
    contiguous United States, filtering out states and territories outside this area
    and selecting only significant events (those rated EF3 to EF5 on the [Enhanced
    Fujita Scale](https://www.weather.gov/oun/efscale)) from the complete dataset
    spanning 1950 to 2023\. The results are aggregated to 50×50-mile grid cells.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Defining Helper Functions
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The next cell defines two helper functions for loading and filtering the dataset
    and for loading and filtering the state boundaries. Note that we call on previous
    configuration constants during the process.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: Note that the tilde (`~`) in front of the mask and `states_temp_gdf` expressions
    inverts the results, so we select rows where the state abbreviation is *not* in
    the excluded list.
  prefs: []
  type: TYPE_NORMAL
- en: Running Helper Functions and Generating the Heatmap
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The following cell calls the helper functions to load and filter the dataset
    and then clip the data to the map boundaries, generate the heatmap (with the NumPy
    `histogram2d()` method), and define a continuous colormap for the heatmap. Note
    that we again call on previous configuration constants during the process.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: 'Because this process can take a few seconds, the `print()` function keeps us
    up-to-date on the program’s progress:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: Plotting the Results
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The final cell generates and saves the plot. Matplotlib’s `imshow()` method
    is responsible for plotting the heatmap. For more on `imshow()`, see this [article](https://towardsdatascience.com/heatmaps-for-time-series/).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: 'This produces the following map:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b9678076375c287c580d32c0534e86c2.png)'
  prefs: []
  type: TYPE_IMG
- en: Tornado density map of EF 3-5 tornado starting locations (by the author)
  prefs: []
  type: TYPE_NORMAL
- en: This is a beautiful map and more informative than a smooth KDE alternative.
  prefs: []
  type: TYPE_NORMAL
- en: Adding Tornado Ending Locations
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Our tornado density heatmaps are based on the *starting* locations of tornadoes.
    But tornadoes move after touching down. The average tornado track is about 3 miles
    long, but when you look at stronger storms, the numbers increase. EF‑3 tornadoes
    average 18 miles, and EF‑4 tornadoes average 27 miles. Long-track tornadoes are
    rare, however, comprising [less than 2%](https://www.tornadopath.com/united-states)
    of all tornadoes.
  prefs: []
  type: TYPE_NORMAL
- en: Because the average tornado track length is less than the 50-mile dimension
    of our grid cells, we can expect them to cover only one or two cells in general.
    Thus, including the tornado ending location should help us improve our density
    measurement.
  prefs: []
  type: TYPE_NORMAL
- en: To do this, we’ll need to combine the starting and ending lat-lon locations
    and *filter out* endpoints that share the *same cell* as their corresponding starting
    points. Otherwise, we’ll “double-dip” when counting. The code for this is a bit
    long, so I’ve stored it in this [Gist](https://gist.github.com/rlvaugh/68c858f577fbd592224228ec1afa3464).
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s a comparison of the “start only” map with the combined starting and
    ending locations:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/5139863bffca4e62725adbd108af2dd0.png)'
  prefs: []
  type: TYPE_IMG
- en: Comparison of heatmap of starting locations (top) with heatmap of starting and
    ending locations (bottom) (by the author)
  prefs: []
  type: TYPE_NORMAL
- en: The prevailing winds drive most tornadoes toward the east and northeast. You
    can see the impact in states like Missouri, Mississippi, Alabama, and Tennessee.
    These areas have brighter cells in the bottom map due to tornadoes starting in
    one cell and ending in the adjacent easterly cell. Note also that the maximum
    number of tornadoes in a given cell has increased from 29 (in the upper map) to
    33 (in the bottom map).
  prefs: []
  type: TYPE_NORMAL
- en: Recap
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We used Python, pandas, GeoPandas, and Matplotlib to project and overlay heatmaps
    onto geographical maps. Geospatial heatmaps are a highly effective way to visualize
    regional trends, patterns, hotspots, and outliers in statistical data.
  prefs: []
  type: TYPE_NORMAL
- en: 'If you enjoy these types of projects, be sure to check out my book, [*Real
    World Python: A Hacker’s Guide to Solving Problems with Code*](https://a.co/d/cejWu6d),
