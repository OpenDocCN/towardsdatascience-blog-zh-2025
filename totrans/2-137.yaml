- en: How to Overlay a Heatmap on a Real Map with Python
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/how-to-overlay-a-heatmap-on-a-real-map-with-python/](https://towardsdatascience.com/how-to-overlay-a-heatmap-on-a-real-map-with-python/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1752691461711" class="mdspan-comment">When data journalists</mdspan>
    need a simple, engaging, and scalable method for presenting geospatial data, they
    often turn to a *heatmap*. This 2D visualization divides a map into equal-sized
    grid cells and uses color to represent the magnitude of aggregated data values
    within the cells.
  prefs: []
  type: TYPE_NORMAL
- en: Overlaying heatmaps on geographical maps permits quick visualization of spatial
    phenomena. Patterns such as clusters, hotspots, outliers, or gradients become
    immediately obvious. This format can be useful to decision-makers and the public,
    who might not be well-versed in raw statistical outputs.
  prefs: []
  type: TYPE_NORMAL
- en: Heatmaps may be composed of square cells (called *grid-based* or *matrix* heatmaps)
    or smoothly contoured “continuous” values (called *spatial* or *kernel density*
    heatmaps). The following maps show the density of tornado *starting* locations
    using both approaches.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/7211e2945f7397e6e1b562e579cbcec1.png)'
  prefs: []
  type: TYPE_IMG
- en: Example of a grid-based heatmap (top) and kernel-density heatmap (bottom) (by
    the author)
  prefs: []
  type: TYPE_NORMAL
- en: If you squint your eyes while looking at the top map, you should see trends
    similar to those in the bottom map.
  prefs: []
  type: TYPE_NORMAL
- en: I prefer grid-based heatmaps because the sharp, distinct boundaries make it
    easier to compare the values of adjacent cells, and outliers don’t get “smoothed
    away.” I also have a soft spot for their pixelated appearance as my first video
    games were Pong and Wolfenstein 3D.
  prefs: []
  type: TYPE_NORMAL
- en: In addition, kernel density heatmaps can be computationally expensive and sensitive
    to the input parameters. Their appearance is highly dependent on the chosen kernel
    function and its bandwidth or radius. A poor parameterization choice can either
    over-smooth or under-smooth the data, obscuring patterns.
  prefs: []
  type: TYPE_NORMAL
- en: In this *Quick Success Data Science* project, we’ll use Python to make static,
    grid-based heatmaps for tornado activity in the continental United States.
  prefs: []
  type: TYPE_NORMAL
- en: The Dataset
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: For this tutorial, we’ll use tornado data from the *National Oceanic and Atmospheric
    Administration’s* wonderful [public-domain](https://www.weather.gov/disclaimer)
    database. Extending back to 1950, it covers tornado starting and ending locations,
    magnitudes, injuries, fatalities, financial costs, and more.
  prefs: []
  type: TYPE_NORMAL
- en: The data is accessible through NOAA’s [Storm Prediction Center](https://www.spc.noaa.gov/wcm/). The
    CSV-format dataset, highlighted yellow in the following figure, covers the period
    1950 to 2023\. Don’t bother downloading it. For convenience, I’ve provided a link
    in the code to access it programmatically.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d48ad85d4e7a620abefe496a384bd336.png)'
  prefs: []
  type: TYPE_IMG
- en: From the NOAA Severe Weather Database download page (by the author)
  prefs: []
  type: TYPE_NORMAL
- en: This CSV file contains 29 columns for almost 69,000 tornadoes. You can find
    a key to the column names [here](https://www.spc.noaa.gov/wcm/data/SPC_severe_database_description.pdf).
    We’ll work primarily with the tornado starting locations (slat, slon), the year
    (yr), and the storm magnitudes (mag).
  prefs: []
  type: TYPE_NORMAL
- en: Installing Libraries
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: You’ll want to install [NumPy](https://numpy.org/install/), [Matplotlib](https://matplotlib.org/stable/users/getting_started/),
    [pandas](https://pandas.pydata.org/pandas-docs/stable/getting_started/install.html),
    and [GeoPandas](https://geopandas.org/en/stable/getting_started/install.html).
    The previous links provide installation instructions. We’ll also use the Shapely
    library, which is part of the GeoPandas installation.
  prefs: []
  type: TYPE_NORMAL
- en: 'For reference, this project used the following versions:'
  prefs: []
  type: TYPE_NORMAL
- en: '**python 3.10.18**'
  prefs: []
  type: TYPE_NORMAL
- en: '**numpy 2.2.5**'
  prefs: []
  type: TYPE_NORMAL
- en: '**matplotlib 3.10.0**'
  prefs: []
  type: TYPE_NORMAL
- en: '**pandas 2.2.3**'
  prefs: []
  type: TYPE_NORMAL
- en: '**geopandas 1.0.1**'
  prefs: []
  type: TYPE_NORMAL
- en: '**shapely 2.0.6**'
  prefs: []
  type: TYPE_NORMAL
- en: The Simplified Code
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: It doesn’t take a lot of code to overlay a heatmap on a geographical map. The
    following code illustrates the basic process, although much of it serves ancillary
    purposes, such as limiting the US data to the Lower 48 states and improving the
    look of the colorbar.
  prefs: []
  type: TYPE_NORMAL
- en: In the next section, we’ll refactor and expand this code to perform additional
    filtering, employ more configuration constants for easy updates, and use helper
    functions for clarity.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'Here’s the result:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a0bf216d14d0b256532a15bf81048a39.png)'
  prefs: []
  type: TYPE_IMG
- en: Tornado density heatmap of all recorded tornado starting locations (by the author)
  prefs: []
