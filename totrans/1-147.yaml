- en: Bringing Vision-Language Intelligence to RAG with ColPali
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/bringing-vision-language-intelligence-to-rag-with-colpali/](https://towardsdatascience.com/bringing-vision-language-intelligence-to-rag-with-colpali/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1761760162226" class="mdspan-comment">If you’ve</mdspan>
    ever tried building a RAG (Retrieval-Augmented Generation) application, you’re
    likely familiar with the challenges posed by tables and images. This article explores
    how to tackle these formats using Vision Language Models, specifically with the
    ColPali model.
  prefs: []
  type: TYPE_NORMAL
- en: But first, what exactly is RAG — and why do tables and images make it so difficult?
  prefs: []
  type: TYPE_NORMAL
- en: RAG and parsing
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Imagine you’re faced with a question like:'
  prefs: []
  type: TYPE_NORMAL
- en: What’s the our company’s policy for handling refund?
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: A foundational LLM (Large Language Model) probably won’t be able to answer this,
    as such information is company-specific and typically not included in the model’s
    training data.
  prefs: []
  type: TYPE_NORMAL
- en: That’s why a common approach is to connect the LLM to a knowledge base — such
    as a SharePoint folder containing various internal documents. This allows the
    model to retrieve and incorporate relevant context, enabling it to answer questions
    that require specialized knowledge. This technique is known as Retrieval-Augmented
    Generation (RAG), and it often involves working with documents like PDFs.
  prefs: []
  type: TYPE_NORMAL
- en: 'However, extracting the right information from a large and diverse knowledge
    base requires extensive document preprocessing. Common steps include:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Parsing**: Parsing documents into texts and images, often assisted with Optical
    Character Recognition (OCR) tools like Tesseract. Tables are most often converted
    into texts'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Structure Preservation**: Maintain the structure of the document, including
    headings, paragraphs, by converting the extracted text into a format that retains
    context, such as Markdown'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Chunking**: Splitting or merging text passages, so that the contexts can
    be fed into the context window without causing the passages come across as disjointed'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Enriching**: Provide extra metadata e.g. extract keyword or provide summary
    to the chunks to ease discovery. Optionally, to also caption images with descriptive
    texts via multimodal LLM to make images searchable'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Embedding**: Embed the texts (and potentially the images too with multimodal
    embedding), and store them into a vector DB'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: As you can imagine, the process is highly complicated, involves a lot of experimentation,
    and is very brittle. Worse yet, even if we tried to do it as best as we could,
    this parsing might not actually work after all.
  prefs: []
  type: TYPE_NORMAL
- en: Why parsing often falls short
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Tables and image often exist in PDFs. The below image shows how they are typically
    parsed for LLM’s consumption:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a86377e82b19c8a43983d95c71395a1b.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Source: Image by the author.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Texts** are chunked'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Tables** are turned into texts, whatever contained within are copied without
    preserving table boundaries'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Images** are fed into multimodal LLM for text summary generation, or alternatively,
    the original image is fed into multimodal embedding model without needing to generate
    a text summary'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: However, there are two inherent issues with such traditional approach.
  prefs: []
  type: TYPE_NORMAL
- en: '**#1\. Complex tables cannot be simply be interpreted as texts**'
  prefs: []
  type: TYPE_NORMAL
- en: Taking this table as an example, we as human would interpret that a temperature
    change of **>2˚C to 2.5˚C’**s implication on **Health** is **A rise of 2.3˚C by
    2080 puts up to 270 million at risk from malaria**
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/95b0d1d70611cdf9443b43d9ccc3c0cc.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Source: [The Impacts and Costs of Climate Change](https://climate.ec.europa.eu/system/files/2016-11/final_report2_en.pdf)'
  prefs: []
  type: TYPE_NORMAL
- en: 'However, if we turn this table into a text, it would look like this: `Temperature
    change Within EC target <(2˚C) >2˚C to 2.5˚C >3C Health Globally it is estimated
    that A rise of 2.3oC by 2080 puts A rise of 3.3oC by 2080 an average temperature
    rise up to 270 million at risk from would put up to 330...`'
  prefs: []
  type: TYPE_NORMAL
- en: The result is a jumbled block of text with no discernible meaning. Even for
    a human reader, it’s impossible to extract any meaningful insight from it. When
    this kind of text is fed into a Large Language Model (LLM), it also fails to produce
    an accurate interpretation.
  prefs: []
  type: TYPE_NORMAL
- en: '**#2\. Disassociation between texts and images**'
  prefs: []
  type: TYPE_NORMAL
- en: The description of the image is often included in texts and they are inseparable
    from one another. Taking the below as an example, we know the chart represents
    the “Modelled Costs of Climate Change with Different Pure Rate of Time Preference
    and declining discount rate schemes (no equity weighting)”
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/1a19c1dcfc8f11e7ce202897333572da.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Source: [The Impacts and Costs of Climate Change](https://climate.ec.europa.eu/system/files/2016-11/final_report2_en.pdf)'
  prefs: []
  type: TYPE_NORMAL
- en: However, as this is parsed, the image description (parsed text) will be disassociated
    with the image (parsed chart). So we can expect, during RAG, the image would not
    be retrieved as input when we raise a question like “what’s the cost of climate
    change?”
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b6a4a2ef6cc28b36daa2bbf1eebcfaca.png)'
  prefs: []
  type: TYPE_IMG
- en: So, even if we attempt to engineer solutions that preserve as much information
    as possible during parsing, they often fall short when faced with real-world scenarios.
  prefs: []
  type: TYPE_NORMAL
- en: Given how critical parsing is in RAG applications, does this mean RAG agents
    are destined to fail when working with complex documents? Absolutely not. With
    ColPali, we have a more refined and effective approach to handling them.
  prefs: []
  type: TYPE_NORMAL
- en: What’s ColPali?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The core premise of ColPali is simple: Human read PDF as pages, not “chunks”,
    so it makes sense to treat PDF as such: Instead of going through the messy process
    of parsing, we just turn the PDF pages into images, and use that as context for
    LLM to provide an answer.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/3b7e2597722215d3f0d0b74fe206d50d.png)'
  prefs: []
  type: TYPE_IMG
- en: Now, the idea of embedding images using multimodal models isn’t new — it’s a
    common technique. So what makes ColPali stand out? The key lies in its inspiration
    from ColBERT, a model that embeds inputs into multi-vectors, enabling more precise
    and efficient search.
  prefs: []
  type: TYPE_NORMAL
- en: Before diving into ColPali’s capabilities, let me briefly digress to explain
    what ColBERT is all about.
  prefs: []
  type: TYPE_NORMAL
- en: 'ColBERT: Granular, context-aware embedding for texts'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: ColBERT is a text embedding and reranking technique that leverage on multi-vectors
    to enhance search accuracy for texts.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s consider this case: we have this question: `is Paul vegan?`, we need
    to identify which text chuck contains the relevant information.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/9efe08888870d79cfc441d84f96472f0.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Highlighted in yellow are texts which contain information about Paul*'
  prefs: []
  type: TYPE_NORMAL
- en: Ideally, we should identify `Text Chunk A` as the most relevant one. But if
    we use a single-vector embedding model (text-ada-002), it will return `Text Chunk
    B` instead.
  prefs: []
  type: TYPE_NORMAL
- en: The reason lies in how single-vector bi-encoders — like text-ada-002 — operate.
    They attempt to compress an entire sentence into a single vector, without encoding
    individual words in a context-aware manner. In contrast, ColBERT **embeds each
    word with contextual awareness**, resulting in a richer, **multi-vector** representation
    that captures more nuanced information.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/5fe66016a2c11b8d14817e50cf3f53c3.png)'
  prefs: []
  type: TYPE_IMG
- en: Numbers in the vectors are illustrative and do not represents the actual values
  prefs: []
  type: TYPE_NORMAL
- en: 'ColPali: ColBERT’s brother for handling document-like images'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: ColPali follows a similar philosophy but applies it to document-like images.
    Just as ColBERT breaks down text and embeds each word individually, ColPali divides
    an image into patches and generates embeddings for each patch. This approach preserves
    more of the **image’s contextual detail, enabling more accurate and meaningful
    interpretation**.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ad2494bfe561cf8fad8ad75c044f5cfa.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Apart from higher retrieval accuracy, benefits of ColPali includes:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Explainability**: ColPali enables word-level comparison between the query
    and individual image patches of a document. This allows us to clearly understand
    and justify why a particular document is deemed more relevant.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Reduced Development Effort & Greater Robustness**: By eliminating the need
    for complex preprocessing pipelines — such as chunking, OCR, and layout parsing — ColPali
    significantly reduces development time and minimizes potential points of failure.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Performance Gains**: Embedding and retrieval processes are faster, resulting
    in improved overall system responsiveness.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Now you know what ColPali is, let’s dive into the code and see if ColPali can
    resolve the challenges we mentioned earlier!
  prefs: []
  type: TYPE_NORMAL
- en: Illustration
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'My code can be found in my [Github](https://github.com/yip-kl?tab=repositories).
    A few words about it:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Instance**: Running the code requires a machine with A100 GPU'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Embedding model**: ColPali has a number of variants, I am using `vidore/colqwen2-v0.1`
    for demonstration. You can refer to the leaderboard [here](https://huggingface.co/spaces/vidore/vidore-leaderboard)
    and switch to other models'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Agent:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '– LLM**: I am using OpenRouter to consume LLM, and the agent is powered by
    `GPT-4o`. You can substitute it with any multimodal LLM that can take image as
    input'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '– **Orchestration**: `LangGraph` is used to develop the agent'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Library used for converting PDF into images**: `pdf2image` which is a wrapper
    for `poppler`. So please make sure you also have `poppler` installed'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Sample data**: “The Impacts and Costs of Climate Change” written by Paul
    Watkiss et al, which is publicly available [here](https://climate.ec.europa.eu/system/files/2016-11/final_report2_en.pdf)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Results
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The code is pretty straightforward, so I will jump into conclusion instead:
    How well can ColPali deal with the problems we have seen in the “Why parsing often
    falls short?” section?'
  prefs: []
  type: TYPE_NORMAL
- en: '**#1\. Complex tables cannot be simply be interpreted as texts**'
  prefs: []
  type: TYPE_NORMAL
- en: '**Question**: What’s the health impact if temperature rises above pre-industrial
    level by 3 degrees?'
  prefs: []
  type: TYPE_NORMAL
- en: '**Answer**: If the temperature rises above pre-industrial levels by 3 degrees
    Celsius, the health impact would be significant. `Specifically, it is estimated
    that by the 2080s, up to 330 million people would be at risk from malaria`. This
    is a substantial increase compared to the 1920s, where the number at risk was
    between 50 to 100 million.'
  prefs: []
  type: TYPE_NORMAL
- en: This is correctly referred from this table in the PDF!
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b050ce4536ebcfb0867fd62c2bc4a6a3.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Source: Page 3 of [The Impacts and Costs of Climate Change](https://climate.ec.europa.eu/system/files/2016-11/final_report2_en.pdf)'
  prefs: []
  type: TYPE_NORMAL
- en: '**#2\. Disassociation between texts and images**'
  prefs: []
  type: TYPE_NORMAL
- en: '**Question**: What’s the modelled cost of climate change, according to the
    Greenbook declining model?'
  prefs: []
  type: TYPE_NORMAL
- en: '**Answer**: According to the Greenbook declining model, the modelled cost of
    climate change is 7.2 Euro/tCO2'
  prefs: []
  type: TYPE_NORMAL
- en: The correct answer should be 7.4 Euro/tCO2, but we can see it is close to correct!
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/9725fd40fb87c6f67538d0c5fe7178b2.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Source: Page 46 of [The Impacts and Costs of Climate Change](https://climate.ec.europa.eu/system/files/2016-11/final_report2_en.pdf)'
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Traditional RAG pipelines struggle with non-textual content. ColPali treats
    each PDF page as an image, allowing it to process visual layouts, tables, charts,
    and embedded graphics — formats that standard text parsers often distort or ignore.
  prefs: []
  type: TYPE_NORMAL
- en: ColPali brings vision-language intelligence to RAG, making it far more capable
    of handling the messy, multimodal reality of enterprise documents.
  prefs: []
  type: TYPE_NORMAL
- en: '*<mdspan datatext="el1761955778508" class="mdspan-comment">*Unless otherwise
    noted, all images are by the author</mdspan>*'
  prefs: []
  type: TYPE_NORMAL
