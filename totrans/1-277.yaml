- en: Evaluating Your RAG Solution
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/evaluating-your-rag-solution/](https://towardsdatascience.com/evaluating-your-rag-solution/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Introduction
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <mdspan datatext="el1758064165191" class="mdspan-comment">Retrieval-Augmented
    Generation</mdspan> (RAG) solutions are everywhere. Over the past few years, we
    have seen them grow rapidly as organizations use RAG or hybrid-RAG solutions in
    customer service, healthcare, intelligence, and more. **But how do we evaluate
    these solutions? And what methods can we use to determine the strengths and weaknesses
    of our RAG models?**
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: This article will give an introduction to RAG by building our own chatbot with
    open-source research data using [LangChain](https://python.langchain.com/docs/introduction/)
    and more. We will also leverage [DeepEval](https://deepeval.com/) to evaluate
    our RAG pipeline for both our retriever and generator. Lastly, we will discuss
    methods for human-testing RAG solutions.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: Retrieval-Augmented Generation
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: With the emergence of LLMs, lots of criticisms were raised when these “base”
    pre-trained models would give incorrect answers, despite being trained on massive
    datasets. **With that came Retrieval-Augmented Generation (RAG), a combination
    of search and generation capabilities that reference context-specific information
    before generating a response.**
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/867f072dd90d5681343d1de764ffb97e.png)'
  id: totrans-7
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: RAG has become very popular over the last few years due to its ability to reduce
    hallucinations and improve factuality. They are flexible, easy to update, and
    much cheaper than fine-tuning LLMs. We come across RAG solutions on a daily basis
    now. For example, many organizations have leveraged RAG to build internal chatbots
    for employees to navigate their knowledge base, and external chatbots to support
    customer service and other business functions.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
- en: Building a RAG Pipeline
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: For our RAG solution, we will use abstracts from open-source research related
    to artificial intelligence. We can use this data to generate more “technical”
    answers when asking questions related to artificial intelligence, machine learning,
    etc.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: '*The data used comes from the OpenAlex API ([https://openalex.org/](https://openalex.org/)).
    This is a dataset/catalogue of open-source research from around the world. The
    data is freely accessible under a No Rights Reserved license (CC0 license).*'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
- en: Data Ingestion
  id: totrans-13
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: First, we need to load our data using the OpenAlex API. Below is code to conduct
    searches by publication year and key terms. We run a search for AI/ML using key
    terms like “deep learning”, “natural language processing”, “computer vision”,
    etc.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  id: totrans-15
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: When querying the OpenAlex database, the abstracts are returned as an inverted
    index. Below is a function to undo the inverted index and return the original
    text of the abstract.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  id: totrans-17
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Create a Vector Database
  id: totrans-18
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Next, we need to generate embeddings to represent the abstracts, and store them
    in a vector database. **It is a best practice to leverage vector databases as
    they are designed for low-latency queries and can scale to handle billions of
    data points.** They also use specialized indexing and nearest neighbor algorithms
    to quickly retrieve data based on contextual and/or semantic similarity, making
    them essential for LLM applications.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们需要生成表示摘要的嵌入，并将它们存储在向量数据库中。**利用向量数据库是一个最佳实践，因为它们是为低延迟查询设计的，并且可以扩展以处理数十亿的数据点。**它们还使用专门的索引和最近邻算法，根据上下文和/或语义相似性快速检索数据，对于LLM应用至关重要。
- en: '![](../Images/c7ef6be75b9358e409fa286dba2db02a.png)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c7ef6be75b9358e409fa286dba2db02a.png)'
- en: Image by Author
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: First, we import the necessary libraires from LangChain and load our embedding
    model from HuggingFace. While we can probably get better results using larger
    embedding models, I decided to use a smaller model to emphasize speed in this
    pipeline.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们从LangChain导入必要的库，并从HuggingFace加载我们的嵌入模型。虽然我们可能使用更大的嵌入模型可以得到更好的结果，但我决定使用较小的模型来强调此管道的速度。
- en: '*You can find and compare embedding models based on their size, performance,
    intended use, etc. by using the MTEB leaderboard from Hugging Face (*[*https://huggingface.co/spaces/mteb/leaderboard*](https://huggingface.co/spaces/mteb/leaderboard)*).*'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: '*您可以通过使用Hugging Face的MTEB排行榜（[*https://huggingface.co/spaces/mteb/leaderboard*](https://huggingface.co/spaces/mteb/leaderboard)）根据大小、性能、预期用途等比较和查找嵌入模型。*'
- en: '[PRE2]'
  id: totrans-24
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Next, we create our vector database using FAISS (or LangChain’s wrapper for
    FAISS). We start by creating the index and formatting our data and documents,
    while also storing their metadata (title and year). We then create a list of IDs,
    add the documents and IDs to the database, and save the database locally.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们使用FAISS（或LangChain对FAISS的包装）创建我们的向量数据库。我们首先创建索引，格式化我们的数据和文档，同时存储它们的元数据（标题和年份）。然后我们创建一个ID列表，将文档和ID添加到数据库中，并将数据库本地保存。
- en: '[PRE3]'
  id: totrans-26
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: With LangChain’s vector stores, we can query our documents directly. Let’s quickly
    test this by searching for “computer vision”. We can see below that the first
    document returned , “Face Detection and Recognition Using OPENCV”, is highly-related
    to computer vision.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 使用LangChain的向量存储，我们可以直接查询我们的文档。让我们通过搜索“计算机视觉”来快速测试这一点。我们可以在下面看到，返回的第一个文档，“使用OPENCV进行人脸检测和识别”，与计算机视觉高度相关。
- en: '[PRE4]'
  id: totrans-28
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: '`[Document(id=''783'', metadata={''title'': ''FACE DETECTION AND RECOGNITION
    USING OPENCV'', ''year'': 2020}, page_content=''Computer Vision is one of the
    most fascinating and challenging tasks in the field of Artificial Intelligence.Computer
    Vision serves as a link between computer software and the visuals we see around
    us.It enables...`'
  id: totrans-29
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '`[文档(id=''783'', 元数据={''标题'': ''使用OPENCV进行人脸检测和识别'', ''年份'': 2020}, 页面内容=''计算机视觉是人工智能领域最迷人且最具挑战性的任务之一。计算机视觉充当计算机软件和我们所看到的视觉之间的桥梁。它使我们能够...'')`'
- en: Create RAG Pipeline
  id: totrans-30
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建RAG管道
- en: Now let’s develop our RAG pipeline. A major component of a RAG solution is the
    generative model leveraged to generate the responses. For this, we will use OpenAI’s
    model from LangChain.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们开发我们的RAG管道。RAG解决方案的一个主要组件是用于生成响应的生成模型。为此，我们将使用来自LangChain的OpenAI模型。
- en: 'So we can compare the response before and after we implement the RAG pipeline,
    let’s ask the “base” model: “What are the most recent advancements in computer
    vision?”.'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们可以比较在实现RAG管道前后响应的变化，让我们询问“基础”模型：“计算机视觉领域最近有哪些最新进展？”。
- en: '[PRE5]'
  id: totrans-33
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: '‘\n\n1\. Deep Learning: Deep learning, a subset of machine learning, has shown
    significant progress in computer vision tasks such as object detection, recognition,
    and image classification. It uses neural networks with multiple hidden layers
    to learn and extract features from images, leading to more accurate and efficient
    results.\n\n2\. Generative Adversarial Networks (GANs): GANs are a type of deep
    learning algorithm that generates new images by learning from a large dataset.
    They have been used in tasks such as image synthesis, super-resolution, and image-to-image
    translation, and have shown impressive results in creating realistic images.\n\n3\.
    Convolutional Neural Networks (CNNs): CNNs are a type of deep learning algorithm
    that has revolutionized the field of computer vision. They are highly effective
    in extracting features from images and have been used in various tasks such as
    image classification, object detection, and segmentation.\n\n4\. Transfer Learning:
    Transfer learning allows a pre-trained model to be used on a different task or
    dataset without starting from scratch. It has shown promising results in computer
    vision tasks, especially for tasks with limited training data.\n\n5\. Image Segmentation:
    With advancements in deep learning, image segmentation has become more accurate
    and efficient. It involves dividing an image into different regions or segments
    to identify objects’'
  id: totrans-34
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: ‘\n\n1. 深度学习：深度学习是机器学习的一个子集，在计算机视觉任务（如目标检测、识别和图像分类）中取得了显著的进展。它使用具有多个隐藏层的神经网络从图像中学习和提取特征，从而实现更准确和高效的结果。\n\n2.
    生成对抗网络（GANs）：GANs是一种深度学习算法，通过学习大量数据集来生成新的图像。它们已在图像合成、超分辨率和图像到图像翻译等任务中使用，并在创建逼真图像方面显示出令人印象深刻的结果。\n\n3.
    卷积神经网络（CNNs）：CNNs是一种深度学习算法，彻底改变了计算机视觉领域。它们在从图像中提取特征方面非常有效，已在图像分类、目标检测和分割等任务中使用。\n\n4.
    迁移学习：迁移学习允许在没有从头开始的情况下，将预训练模型用于不同的任务或数据集。它在计算机视觉任务中显示出有希望的结果，尤其是在训练数据有限的任务中。\n\n5.
    图像分割：随着深度学习的发展，图像分割变得更加准确和高效。它涉及将图像分割成不同的区域或段以识别对象
- en: From the response above, we can see a general summary of computer vision, a
    high-level description of how it works, and different types of models and applications.
    **While it is a good summary, is does not directly answer our question. A great
    opportunity for RAG!**
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 从上面的回答中，我们可以看到计算机视觉的一般概述，对其工作原理的高级描述，以及不同类型的模型和应用。**虽然这是一个很好的总结，但它并没有直接回答我们的问题。这是一个RAG的大好机会！**
- en: Next, we will build the components for our RAG pipeline. First we need a **retriever**
    to grab the top k documents related to our query. We then build a **prompt** instructing
    our model how to respond to questions. Lastly, we combine them with the **base
    generative model** to create our pipeline.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将构建我们的RAG管道组件。首先，我们需要一个**检索器**来获取与我们的查询相关的最相关的k个文档。然后，我们构建一个**提示**来指导我们的模型如何回答问题。最后，我们将它们与**基础生成模型**结合起来，以创建我们的管道。
- en: Let’s quickly retest our query of “What are the most recent advancements in
    computer vision?”.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们快速重测我们的查询：“计算机视觉中最新的进展是什么？”
- en: '[PRE6]'
  id: totrans-38
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: The most recent advancements in computer vision include the emergence of large
    language models equipped with vision capabilities, such as OpenAI’s GPT-4V, Google’s
    Bard AI, and Microsoft’s Bing AI. These models are able to analyze images and
    have the ability to access real-time information, making them directly embedded
    in many applications. Further advancements are expected as AI continues to rapidly
    evolve.
  id: totrans-39
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 计算机视觉最新的进展包括具有视觉能力的大型语言模型的出现，例如OpenAI的GPT-4V、谷歌的Bard AI和微软的Bing AI。这些模型能够分析图像，并具有访问实时信息的能力，使它们直接嵌入到许多应用中。随着AI的快速发展，预计将进一步取得进展。
- en: This response does a much better job at answering our question. It directly
    addresses the most recent advancements by calling out specific capabilities, models,
    and how they contribute to advancing computer vision. This is a promising result
    for our technical chatbot.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 这个回答在回答我们的问题方面做得更好。它直接指出了最新的进展，提到了具体的特性、模型以及它们如何推动计算机视觉的发展。这对于我们的技术聊天机器人来说是一个有希望的结果。
- en: '**But this is not a proper evaluation. Next, we will further test our RAG solution
    on a number of metrics to help us determine if its ready for production.**'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: '**但这不是一个恰当的评价。接下来，我们将进一步在我们的RAG解决方案上测试多个指标，以帮助我们确定它是否准备好投入生产。**'
- en: '* * *'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: LLM-as-a-Judge
  id: totrans-43
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: LLM-as-a-Judge
- en: To begin evaluating our solution, we will use another generative model to determine
    how our RAG solution meets certain criteria. While LLM-as-a-Judge methods have
    some caveats and need to be used carefully, they offer a lot of flexibility and
    efficiency. They can also give detailed insights during the evaluation process,
    as you will see below.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 为了开始评估我们的解决方案，我们将使用另一个生成模型来确定我们的RAG解决方案是否符合某些标准。虽然LLM作为裁判的方法有一些注意事项并且需要谨慎使用，但它们提供了很多灵活性和效率。它们还可以在评估过程中提供详细的见解，如下所示。
- en: Our RAG consists of 2 main components, the retriever and generator. **We will
    evaluate these components separately.** Our findings could prompt us to tune hyperparameters,
    replace the embedding model, or use a difference generative model.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的RAG由2个主要组件组成，即检索器和生成器。**我们将分别评估这些组件**。我们的发现可能会促使我们调整超参数，替换嵌入模型，或使用不同的生成模型。
- en: Retriever Evaluation
  id: totrans-46
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 检索器评估
- en: 'First we will evaluate our retriever, the component that fetches the relevant
    content. We will judge on 3 metrics:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们将评估我们的检索器，即获取相关内容的组件。我们将基于3个指标进行判断：
- en: '**Contextual Precision:** Represents a greater ability of the retrieval system
    to correctly rank relevant nodes. It first uses an LLM to determine whether each
    node is relevant to the input, before calculating the weighted cumulative precision.'
  id: totrans-48
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**上下文精确度**：代表检索系统正确排名相关节点的能力更强。它首先使用一个LLM来确定每个节点是否与输入相关，然后计算加权累积精确度。'
- en: '**Contextual Recall:** Represents a greater ability of the retrieval system
    to capture all relevant information from the total available relevant set within
    your knowledge base.'
  id: totrans-49
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**上下文召回率**：代表检索系统从知识库中可用的总相关集中捕获所有相关信息的更强能力。'
- en: '**Contextual Relevancy:** Evaluates the overall relevance of the information
    presented for the given output.'
  id: totrans-50
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**上下文相关性**：评估给定输出所呈现信息的整体相关性。'
- en: First, we import the libraries and initialize the metrics.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们导入库并初始化指标。
- en: '[PRE7]'
  id: totrans-52
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: '**Next, we need to build a test case, an expected output to a given query.
    These testing datasets can be difficult to build, and should have input from domain
    experts who understand the questions that may be asked, and what those answers
    should be.**'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: '**接下来，我们需要构建一个测试用例，即给定查询的预期输出。这些测试数据集可能很难构建，并且应该有来自理解可能被提出的问题及其答案的领域专家的输入。**'
- en: For this example, we will just create one test case with a mock expected output.
    This will not give us the true result, but will give us a result as an example.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这个例子，我们将只创建一个带有模拟预期输出的测试用例。这不会给我们真正的结果，但会给我们一个示例结果。
- en: '[PRE8]'
  id: totrans-55
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: With the components above, we can now build our test case and compute our 3
    metrics.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 使用上述组件，我们现在可以构建我们的测试用例并计算我们的3个指标。
- en: '[PRE9]'
  id: totrans-57
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: 'Score: 1.0 Reason: The score is 1.00 because the relevant nodes are ranked
    at the top: the first node discusses ‘recent progress on computer vision algorithms’
    and ‘prominent achievements,’ and the second node covers the ‘evolution of computer
    vision’ and foundational advancements. The irrelevant node, which only describes
    the OpenCV toolkit and lacks discussion of recent advancements, is correctly ranked
    last. This perfect ordering ensures the highest contextual precision.'
  id: totrans-58
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 分数：1.0 原因：分数为1.00是因为相关节点被排在最前面：第一个节点讨论了‘计算机视觉算法的近期进展’和‘显著成就’，第二个节点涵盖了‘计算机视觉的演变’和基础进步。那个不相关的节点，仅描述了OpenCV工具包且缺乏对近期进展的讨论，被正确地排在最后。这种完美的排序确保了最高的上下文精确度。
- en: ''
  id: totrans-59
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Score: 0.0 Reason: The score is 0.00 because none of the sentences in the expected
    output can be traced back to any node(s) in the retrieval context; there is no
    overlap or relevant information present.'
  id: totrans-60
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 分数：0.0 原因：分数为0.00是因为预期输出中的句子都无法追溯到检索上下文中的任何节点；没有重叠或相关信息存在。
- en: ''
  id: totrans-61
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Score: 0.5555555555555556 Reason: The score is 0.56 because, while there are
    several statements that discuss recent progress and deep learning advancements
    in computer vision (e.g., ‘The prominent achievements in computer vision tasks
    such as image classification, object detection and image segmentation brought
    by deep learning techniques are highlighted.’), much of the context is general
    background or unrelated details (e.g., ‘The explanation of the term ‘convolutional’
    as a mathematical operation is not directly relevant to the advancements in computer
    vision.’).'
  id: totrans-62
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 分数：0.5555555555555556 原因：得分为0.56，因为虽然有几条陈述讨论了计算机视觉（例如，‘深度学习技术在图像分类、目标检测和图像分割等计算机视觉任务中的显著成就被突出显示’）方面的最新进展和深度学习进步，但大部分上下文是通用背景或无关细节（例如，‘关于“卷积”作为数学运算的解释与计算机视觉的进步没有直接相关性。’）。
- en: As seen above, one of the benefits of using an LLM as a judge is that we get
    detailed feedback on why our scores are what they are. For example, get a 55%
    for contextual relevancy because the LLM deemed some of the information unnecessary
    (slightly going down a rabbit hole about CNNs).
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 如上所示，使用LLM作为评委的一个好处是我们能够得到关于为什么我们的分数是这样的详细反馈。例如，因为LLM认为一些信息是不必要的（稍微陷入关于CNN的兔子洞），所以得到了55%的上下文相关性。
- en: We can also use the ‘evaluate’ function from DeepEval to better automate this
    process. This is useful when testing your RAG on several test cases.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还可以使用DeepEval中的“evaluate”函数来更好地自动化这个过程。当在多个测试案例上测试你的RAG时，这很有用。
- en: '[PRE10]'
  id: totrans-65
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Generation Evaluation
  id: totrans-66
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 生成评估
- en: 'Next, we evaluate our generator, which generates the responses based on the
    context given by the retriever. Here, we will compute 2 metrics:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将评估我们的生成器，它根据检索器提供的上下文生成响应。在这里，我们将计算2个指标：
- en: '**Answer Relevancy:** Similar to contextual relevancy, evaluates whether the
    prompt template in your generator is able to instruct your LLM to give relevant
    outputs based on the context.'
  id: totrans-68
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**答案相关性**：类似于上下文相关性，评估你的生成器中的提示模板是否能够指导你的LLM根据上下文给出相关的输出。'
- en: '**Faithfulness:** Evaluates whether the LLM used in your generator can output
    information that does not hallucinate or contradict any factual information presented
    in the retrieval context.'
  id: totrans-69
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**忠实度**：评估你生成器中使用的LLM能否输出不虚构或与检索上下文中呈现的任何事实信息相矛盾的信息。'
- en: As before, lets initialize the metrics.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 和之前一样，让我们初始化这些指标。
- en: '[PRE11]'
  id: totrans-71
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: 'Score: 1.0 Reason: The score is 1.00 because the answer was fully relevant
    and addressed the question directly without any irrelevant information. Great
    job staying focused and informative!'
  id: totrans-72
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 分数：1.0 原因：得分为1.00，因为答案完全相关，并且直接回答了问题，没有包含任何无关信息。继续保持专注和信息丰富！
- en: ''
  id: totrans-73
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Score: 1.0 Reason: Great job! There are no contradictions, so the actual output
    is fully faithful to the retrieval context.'
  id: totrans-74
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 分数：1.0 原因：干得好！没有矛盾，所以实际输出完全忠实于检索上下文。
- en: As seen above, our generator operates very well (with this test case). The answer
    remains relevant and the model does not contradict itself. Again, we can use the
    ‘evaluate’ function to evaluate several test cases.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 如上所示，我们的生成器在这个测试案例中运行得非常好。答案保持相关，模型没有自相矛盾。再次强调，我们可以使用“evaluate”函数来评估多个测试案例。
- en: '[PRE12]'
  id: totrans-76
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: A caveat of using these metrics is that they generic and only go after a few
    aspects of our generated output, like relevancy. **But we can also create tailored
    metrics to determine how well our RAG solution performs in areas important to
    us specifically.**
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 使用这些指标的一个缺点是它们是通用的，并且只针对我们生成输出的一些方面，如相关性。**但我们可以创建定制的指标来决定我们的RAG解决方案在我们特别关心的领域表现如何。**
- en: For example, we can pose questions like “How does my RAG handle dark humor?”,
    or “Is the output written at a kid-friendly level?”. For our example, let’s determine
    how well our RAG provides technically written responses.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，我们可以提出像“我的RAG如何处理黑色幽默？”或“输出是否以适合儿童的水平编写？”这样的问题。以我们的例子为例，让我们确定我们的RAG在提供技术性回答方面做得如何。
- en: '[PRE13]'
  id: totrans-79
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: 'Score: 0.6437823499114202 Reason: The response uses appropriate technical terminology
    such as ‘deep learning’, ‘image classification’, ‘object detection’, ‘image segmentation’,
    ‘GPUs’, and ‘FPGAs’. The explanations are clear but somewhat general, lacking
    specific examples or recent breakthroughs. The technical detail is moderate, mentioning
    both algorithmic and hardware aspects, but does not delve into particular models
    or methods. The writing is mostly formal and adheres to technical conventions,
    but the depth and specificity could be improved.'
  id: totrans-80
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 得分：0.6437823499114202 原因：该响应使用了适当的技术术语，如“深度学习”、“图像分类”、“目标检测”、“图像分割”、“GPU”和“FPGA”。解释清晰，但有些泛泛而谈，缺乏具体的例子或最新的突破。技术细节适中，提到了算法和硬件方面，但没有深入探讨特定的模型或方法。写作主要是正式的，并遵循技术规范，但深度和具体性可以改进。
- en: In the output above, we can see that our RAG produces somewhat technically written
    answers. It uses the appropriate technical terminology with clear explanations,
    but lacks examples. This is likely due to using abstracts as our data source,
    which are written at a somewhat high level.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 在上面的输出中，我们可以看到我们的RAG产生了某些技术性的答案。它使用了适当的技术术语，并有清晰的解释，但缺乏例子。这可能是由于我们使用的是摘要作为数据源，这些摘要的写作水平相对较高。
- en: Human Evaluation
  id: totrans-82
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 人工评估
- en: '**While LLM-as-a-judge methods give us a lot a great information, they are
    generic and should be caveated as they do not fully assess real-world applicability.**
    Humans however, can better explore this, as no one knows the data better than
    the domain experts within the organization.'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: '**尽管LLM作为裁判的方法为我们提供了大量有价值的信息，但它们是通用的，应该谨慎使用，因为它们并没有完全评估现实世界的适用性。**然而，人类可以更好地探索这一点，因为没有人比组织内的领域专家更了解数据。'
- en: Human evaluation typically reviews for correctness, justification quality, and fluency.
    Evaluators must determine if the output is accurate, logically connects retrieved
    evidence to the conclusion, is natural, and useful. It is important to keep in
    mind the data, user, and purpose of your RAG solution to properly address these
    domain-specific requirements.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 人工评估通常审查正确性、论证质量和流畅度。评估者必须确定输出是否准确，逻辑上是否将检索到的证据与结论相连接，是否自然且有用。记住你的RAG解决方案的数据、用户和目的，这对于正确处理这些特定领域的要求非常重要。
- en: '* * *'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Conclusion
  id: totrans-86
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this article, we were able to build a RAG pipeline using open source research
    by leveraging FAISS, LangChain, and more. We also dove into how we can evaluate
    RAG solutions, evaluating both our retriever and generator. Libraries like DeepEval
    leverage LLM-as-a-judge metrics to build test cases and determine relevancy, faithfulness,
    and more. Lastly, we discussed how important human evaluation is when determining
    the real-world applicability or your RAG solution.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们能够利用FAISS、LangChain等开源研究构建一个RAG管道。我们还深入探讨了如何评估RAG解决方案，评估了我们的检索器和生成器。像DeepEval这样的库利用LLM作为裁判的指标来构建测试案例，并确定相关性、忠实度等。最后，我们讨论了在确定RAG解决方案的现实世界适用性时，人工评估的重要性。
- en: '* * *'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '*I hope you have enjoyed my article! Please feel free to comment, ask questions,
    or request other topics.*'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: '*希望您喜欢我的文章！请随时评论、提问或要求其他主题。*'
