- en: On Data Problems, and How to Solve (or Prevent) Them
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/on-data-problems-and-how-to-solve-or-prevent-them/](https://towardsdatascience.com/on-data-problems-and-how-to-solve-or-prevent-them/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Never miss a new edition of *The Variable*, our weekly newsletter featuring
    a top-notch selection of editors’ picks, deep dives, community news, and more.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[Subscribe today](https://newsletter.towardsdatascience.com/subscription-to-the-newsletter)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Data represents the actions, decisions, and opinions of human beings—or the
    outputs of the tools humans built. That means that, more often than not, it’s
    messy.
  prefs: []
  type: TYPE_NORMAL
- en: As the volume and complexity of available data grew exponentially in recent
    years, so did the importance of [data science](https://towardsdatascience.com/category/data-science/) and
    machine learning professionals. To help you stay up-to-date with effective problem-solving
    and insight-gathering approaches, we’ve selected several outstanding articles
    on the workflows that can help keep your data tidy, focused, and actionable. Let’s
    dive in.
  prefs: []
  type: TYPE_NORMAL
- en: Mining Rules from Data
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '[Mariya Mansurova](https://towardsdatascience.com/author/miptgirl/)‘s new must-read
    is both comprehensive and accessible. It shows how you can leverage your available
    data to generate business-focused rules, and walks us through a hands-on example
    (with a full Python implementation) demonstrating the power of decision trees.'
  prefs: []
  type: TYPE_NORMAL
- en: '[Mining Rules from Data](https://towardsdatascience.com/mining-rules-from-data/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'No More Tableau Downtime: Metadata API for Proactive Data Health'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Before you can analyze data, you need to ensure its availability. [Alle Sravani](https://towardsdatascience.com/author/alle-sravani/) explains
    how you can preemptively make your data pipelines more robust.
  prefs: []
  type: TYPE_NORMAL
- en: '[No More Tableau Downtime: Metadata API for Proactive Data Health](https://towardsdatascience.com/no-more-tableau-downtime-metadata-api-for-proactive-data-health/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Ivory Tower Notes: The Problem'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '[Marina Tosic](https://towardsdatascience.com/author/martosi/) shares time-tested
    insights on the steps you should take to tackle business problems methodically
    and focus on root causes.'
  prefs: []
  type: TYPE_NORMAL
- en: '[Ivory Tower Notes: The Problem](https://towardsdatascience.com/ivory-tower-notes-the-problem/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: How to Measure Real Model Accuracy When Labels Are Noisy
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Clear and concise, [Krishna Rao](https://towardsdatascience.com/author/kkrao/)‘s
    article unpacks the math behind “true” accuracy and error correlation.
  prefs: []
  type: TYPE_NORMAL
- en: '[How to Measure Real Model Accuracy When Labels Are Noisy](https://towardsdatascience.com/how-to-measure-real-model-accuracy-when-labels-are-noisy/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Other Recommended Reads
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Why not branch out into some other fascinating areas in the wide world of data,
    ML, and AI?
  prefs: []
  type: TYPE_NORMAL
- en: What happens [when we combine CNNs and transformers](https://towardsdatascience.com/the-art-of-hybrid-architectures/)? [Eric
    Chung](https://towardsdatascience.com/author/eric-chung/) invites us to explore
    the new frontiers of hybrid architectures.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[The Art of Hybrid Architectures](https://towardsdatascience.com/the-art-of-hybrid-architectures/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Every complex technology relies on an integrated set of tools and systems. [Ed
    Izaguirre](https://towardsdatascience.com/author/ed-izaguirre/) outlines [the
    different layers of the AI stack](https://towardsdatascience.com/layers-ai-stack/).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Layers of the AI Stack, Explained Simply](https://towardsdatascience.com/layers-ai-stack/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Focusing more specifically on [the components of the generative-AI tech stack](https://towardsdatascience.com/tech-stack-generative-ai/), [Sarah
    Schürch](https://towardsdatascience.com/author/schuerch_sarah/) covers foundation
    models, agents, vector databases, and more.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Understanding the Tech Stack Behind Generative AI](https://towardsdatascience.com/tech-stack-generative-ai/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: For an immersive technical deep dive, don’t miss [Muhammad Ardi](https://towardsdatascience.com/author/muhammad_ardi/)‘s
    excellent guide to [implementing a diffusion model from scratch](https://towardsdatascience.com/the-art-of-noise/) with
    PyTorch.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[The Art of Noise](https://towardsdatascience.com/the-art-of-noise/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Meet Our New Authors
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Explore top-notch work from some of our recently added contributors:'
  prefs: []
  type: TYPE_NORMAL
- en: '[Felipe Bandeira](https://towardsdatascience.com/author/felipe-bandeira/) (along
    with coauthors Giselle Fretta, Thu Than, and Elbion Redenica) presents cutting-edge
    work on how to evaluate the performance of MCMC samplers.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Are You Sure Your Posterior Makes Sense?](https://towardsdatascience.com/are-you-sure-your-posterior-makes-sense/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[Swapnil Patil](https://towardsdatascience.com/author/swpnilsp/) works on product
    analytics at Google; his debut TDS article leverages his experience in a thorough
    discussion of the power of ROC curves.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Unlock the Power of ROC Curves: Intuitive Insights for Better Model Evaluation](https://towardsdatascience.com/unlock-the-power-of-roc-curves-intuitive-insights-for-better-model-evaluation/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[Nikhil Dasari](https://towardsdatascience.com/author/nikhil-dasari/) just
    launched a beginner-friendly series on a perennially important topic: time-series
    forecasting.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Time Series Forecasting Made Simple (Part 1): Decomposition and Baseline Models](https://towardsdatascience.com/time-series-forecasting-made-simple-part-1-decomposition-baseline-models/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
