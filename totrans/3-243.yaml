- en: Honestly Uncertain
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 诚实地不确定
- en: 原文：[https://towardsdatascience.com/honestly-uncertain/](https://towardsdatascience.com/honestly-uncertain/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/honestly-uncertain/](https://towardsdatascience.com/honestly-uncertain/)
- en: '**Ethical issues aside, should you be honest when asked how certain you are
    about some belief? Of course, *it depends*. In this blog post, you’ll learn on
    what.**'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '**抛开伦理问题不谈，当被问及你对某个信念的确定性时，你应该诚实吗？当然，*这取决于*。在这篇博客文章中，你将了解到这一点。**'
- en: Different ways of evaluating probabilistic predictions come with dramatically
    different degrees of “optimal honesty”.
  id: totrans-3
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 评估概率预测的不同方式伴随着“最佳诚实度”的显著不同程度。
- en: Perhaps surprisingly, the linear function that assigns +1 to true and fully
    confident statements, 0 to admitted ignorance and -1 to wrong but fully confident
    statements incentivizes exaggerated, dishonest boldness. If you rate forecasts
    that way, you’ll be surrounded by self-important fools and suffer from badly calibrated
    machine forecasts.
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 令人惊讶的是，将线性函数分配给真实且完全自信的陈述为+1，承认无知为0，错误但完全自信的陈述为-1，这种激励会导致夸张、不诚实的勇敢行为。如果你这样评估预测，你将周围都是自以为是的傻瓜，并遭受严重校准的机器预测的困扰。
- en: If you want people (or machines) to give their truly unbiased and honest assessment,
    your scoring function should penalize confident but wrong convictions more strongly
    than it rewards confident correct ones.
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你希望人们（或机器）给出真正无偏和不诚实的评估，你的评分函数应该对自信但错误的信念的惩罚比对自信正确的信念的奖励更强。
- en: '**A probabilistic quiz game**'
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**概率问答游戏**'
- en: David Spiegelhalter’s new (as of 2025) fantastic book, “*The Art of Uncertainty*”
    – a must-read for everyone who deals with probabilities and their communication
    – features a short section on scoring rules. Spiegelhalter walks the reader through
    the quadratic scoring rule, and briefly mentions that a linear scoring rule will
    lead to dishonest behavior. I elaborate on that interesting point in this blog
    post.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 大卫·斯皮格尔哈特（David Spiegelhalter）的新书（截至2025年）——“*不确定的艺术*”——这是一本每个处理概率及其传播的人都必须阅读的书，其中包含一个关于评分规则的简短部分。斯皮格尔哈特引导读者了解二次评分规则，并简要提到线性评分规则会导致不诚实的行为。我在这篇博客文章中详细阐述了这一点。
- en: 'Let’s set the stage: Just like in so many other scenarios and paradoxes, you
    find yourself in a TV show (yes, what an old-fashioned way to start). You have
    the opportunity to answer questions on common knowledge and win some cash. You
    are asked yes/no-questions that are expressed in a binary fashion, such as: *Is
    the area of France larger than the area of Spain? Was Marie Curie born earlier
    than Albert Einstein? Is Montreal’s population larger than Kyoto’s?*'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们设定场景：就像在许多其他场景和悖论中一样，你发现自己在一个电视节目中（是的，这是一个多么老式的开场方式）。你有机会回答关于常识的问题并赢得一些现金。你被问到的是是/否问题，以二进制方式表达，例如：*法国的面积是否大于西班牙的面积？玛丽·居里是否比阿尔伯特·爱因斯坦出生得早？蒙特利尔的居民是否比京都的多？*
- en: Depending on your background, these questions might be obvious for you, or they
    might be difficult. In any case, you will have a subjective “*best guess*” in
    mind, and some degree of certainty. For example, I feel comfortable answering
    the first, slightly less for the second, and I already forgot the answer to the
    third, even though I looked it up to build the example. You might experience a
    similar level of confidence, or a very different one. Degrees of certainty are,
    of course, subjective.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 根据你的背景，这些问题对你来说可能很明显，或者可能很难。无论如何，你都会有一个主观的“*最佳猜测*”，以及一定程度的确定性。例如，我对第一个问题感到很自在，对第二个问题稍微不那么自在，我已经忘记了第三个问题的答案，尽管我查过它来构建这个例子。你可能会体验到相似程度的自信，或者非常不同的自信。当然，确定性的程度是主观的。
- en: 'The twist of the quiz: You are not supposed to give a binary yes/no-answer
    as in a multiple-choice test, but to honestly communicate your degree of conviction,
    that is, to produce the probability that you personally assign to the true answer
    being “yes”. The number 0 then means “definitely not”, 1 expresses “definitely
    yes”, and 0.5 reflects the degree of uncertainty corresponding to the toss of
    a fair coin — you then have absolutely no idea. Let’s call ***P(A)*** your true
    subjective conviction that statement ***A*** is true. That probability can take
    any value between 0 and 1, whereas ***A*** is bound to be ***either*** 0 or 1\.
    You can then communicate that number, but you don’t have to, so we’ll call **Q(A)** the
    probability that you eventually express in that quiz.'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 问卷的转折点：你不需要像在多项选择题中那样给出二元的肯定/否定答案，而是要诚实地传达你的信念程度，也就是说，产生你个人分配给“是”的答案的概率。数字0意味着“绝对不是”，1表示“绝对肯定”，0.5反映了与公平硬币投掷相对应的不确定性程度——你完全没有头绪。让我们称***P(A)***为你对陈述***A***为真的真实主观信念。这个概率可以取0到1之间的任何值，而***A***必然是***要么***0要么1。然后你可以传达这个数字，但你不一定必须这样做，所以我们称**Q(A)**为你在那次问卷中最终表达的概率。
- en: In general, not every probabilistic expression ***Q*** is met with the same
    excitement, because humans generally dislike uncertainty. We are much happier
    with the expert that gives us “99.99%” or “0.01%” probabilities for something
    to be or not to be the case, and we favor them considerably over the experts producing
    “25%” and “75%” *maybe-ish* assessments. From a rational perspective, more informative
    probabilities (“sharp predictions”, close to 0 or close to 1) are favorable over
    uninformative ones (“unsharp predictions”, close to 0.5). However, a modest but
    truthful prediction is still worth more than a bold but unreliable one that would
    make you go all-in. We should therefore ensure that people do not lie about their
    degree of conviction, so that really 99% of the “99%-sure” predictions are actually
    true, 12% or the “12%-sure”, and so on. How can the quiz master ensure that?
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，并非每个概率表达式***Q***都会引起同样的兴奋，因为人类通常不喜欢不确定性。我们更愿意接受给出“99.99%”或“0.01%”概率的专家，他们预测某事发生或不发生的可能性，并且我们相当重视他们，而那些给出“25%”和“75%”*可能*评估的专家则不太受欢迎。从理性角度来看，更有信息的概率（“精确预测”，接近0或接近1）比无信息的概率（“不精确预测”，接近0.5）更有利。然而，一个适度但真实的预测仍然比一个大胆但不可靠的预测更有价值，后者会让你孤注一掷。因此，我们应该确保人们不要对自己的信念程度撒谎，以确保真正有99%的“99%-肯定”预测是真实的，12%的“12%-肯定”，等等。考官如何确保这一点呢？
- en: The Linear Scoring Rule
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 线性评分规则
- en: 'The most straightforward way that one might come up with to judge probabilistic
    statements is to use a linear scoring rule: In the best case, you are very confident
    and right, which means ***Q(A)=P(A)*=1** and **A** is true, or ***Q(A)=P(A)*=0** and **A** is
    false. We then add the score **+1=r(Q=1, A=1)=r(Q=0, A=0)** to the balance. In
    the worst case, you were very sure of yourself, but wrong; that is, ***Q(A)=P(A)*=1** while ***A*** is
    false, or ***Q(A)=P(A)*=0** while ***A*** is true. In that unfortunate case, we
    subtract –**1=r(Q=1, A=0)=r(Q=0, A=1)** from the score. Between these extreme
    cases, we draw a straight line. When you express maximal uncertainty via ***Q(A)*=0.5**,
    we have **0=r(Q=0.5, A=1)=r(Q=0.5, A=0)**, and neither add nor subtract anything.'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 判断概率陈述最直接的方法可能是使用线性评分规则：在最佳情况下，你非常自信且正确，这意味着***Q(A)=P(A)*=1**，且**A**为真，或者***Q(A)=P(A)*=0**，且**A**为假。然后我们将分数**+1=r(Q=1,
    A=1)=r(Q=0, A=0)**加到总分上。在最坏的情况下，你非常自信，但错了；也就是说，***Q(A)=P(A)*=1**，而***A***为假，或者***Q(A)=P(A)*=0**，而***A***为真。在这种情况下，我们从分数中减去-**1=r(Q=1,
    A=0)=r(Q=0, A=1)**。在这两个极端情况之间，我们画一条直线。当你通过***Q(A)*=0.5**表达最大不确定性时，我们得到**0=r(Q=0.5,
    A=1)=r(Q=0.5, A=0)**，既不加也不减。
- en: 'The functional form of this linear reward function is not particularly spectacular,
    but its visualization will come handy in the following:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 这个线性奖励函数的功能形式并不特别引人注目，但它在以下情况下的可视化将很有用：
- en: '![](../Images/ab3e375e68d3963e18769249bce98079.png)'
  id: totrans-15
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/ab3e375e68d3963e18769249bce98079.png)'
- en: 'Linear scoring function: You are rewarded +1 for being very sure about your
    true belief, subtracted -1 when being equally sure about a wrong belief, you don’t
    get any reward nor punishment when you are openly ignorant with Q=0.5\. Image
    by the author.'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 线性评分函数：当你非常确定你的真实信念时，你会得到+1的奖励，当你同样确定一个错误的信念时，你会被减去-1的分数，当你公开无知且Q=0.5时，你既不会得到奖励也不会受到惩罚。图片由作者提供。
- en: 'No surprise here: If ***A*** is true, the best thing you could have done is
    to communicate “**Q=1**”, if ***A*** is false, the best strategy would have been
    to produce “**Q=0**”. That’s what is visualized by the black dots: They point
    to the largest value that the reward function can attain for the particular value
    of the truth. That’s a good start.'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 没有惊喜：如果***A***是真的，你能做的最好的事情就是传达“**Q=1**”，如果***A***是假的，最好的策略就是产生“**Q=0**”。这就是黑色圆点所表示的：它们指向奖励函数对于特定真相值的最大值。这是一个良好的开端。
- en: But you typically do ***not*** know with absolute certainty whether the answer
    is “*yes, A is true*” or “*no, A is false*”, you only have a subjective gut feeling.
    So what should you do? Should you just be honest and communicate your true belief,
    e.g. ***P*=0.7** or ***P*=0.1**?
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 但你通常并不绝对确定答案是否是“*是的，A是真的*”或“*不，A是假的*”，你只有一种主观的直觉。那么你应该怎么做？你应该只是诚实并传达你的真实信念，例如***P*=0.7**或***P*=0.1**？
- en: Let’s set ethics aside, and consider the reward that we want to maximize. It
    then turns out that you should not be honest. **When evaluated via the linear
    scoring rule, you should lie, and communicate Q*(A)*=0 when P*(A)*<0.5 and Q*(A)*=1
    when P*(A)*>0.5.**
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们把道德放在一边，考虑我们想要最大化的奖励。结果发现，你不应该诚实。**通过线性评分规则评估时，你应该撒谎，当***P*(A)*<0.5***时传达***Q*(A)*=0**，当***P*(A)*>0.5***时传达***Q*(A)*=1**。
- en: 'To see this surprising result, let’s compute the ***expectation value*** of
    the reward function, assuming that your belief is, on average, correct (cognitive
    psychology teaches us that this is an unrealistically optimistic assumption in
    the first place, we’ll come back to that below). That is, we assume that in about
    70% of the cases when you say ***P*=0.7**, the true answer is “*yes, A is true*”,
    in about 75% of the cases when you say ***P*=0.25**, the true answer is “*no,
    A is false*”. The expected reward ***R(P, Q)*** is then a function of both the ***honest
    subjective ***probability ***P*** and of the ***communicated*** probability ***Q, ***namely
    the weighted sum of the reward ***r(Q, A=1) ***and ***r(Q, A=0)***:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 为了看到这个令人惊讶的结果，让我们计算奖励函数的期望值，假设你的信念在平均上是正确的（认知心理学教给我们，这首先是一个不切实际的乐观假设，我们将在下面回到这一点）。也就是说，我们假设在你说的***P*=0.7***的大约70%的情况下，真正的答案是“*是的，A是真的*”，在你说的***P*=0.25***的大约75%的情况下，真正的答案是“*不，A是假的*”。因此，期望奖励***R(P,
    Q)***是诚实主观概率***P***和传达的概率***Q***（即加权奖励***r(Q, A=1)***和***r(Q, A=0)***的和）的函数：
- en: '***R(P, Q) = P * r(Q, A=1) + (1-P) * r(Q, A=0)***'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: '***R(P, Q) = P * r(Q, A=1) + (1-P) * r(Q, A=0)***'
- en: 'Here come the resulting ***R(P,Q)*** for four different values of the honest
    subjective probability ***P***:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是针对诚实主观概率***P***的四个不同值得到的结果 ***R(P,Q)***：
- en: '![](../Images/8c9d3623579ba709187af6267dc2d90d.png)'
  id: totrans-23
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/8c9d3623579ba709187af6267dc2d90d.png)'
- en: Expected reward as a function of honest and communicated probabilities P and
    Q. Image by the author.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 期望奖励作为诚实和传达概率P和Q的函数。图由作者提供。
- en: The maximally attainable reward on the long term is not always 1 anymore, but
    it’s bounded by ***2|P-*0.5*| — ***ignorance comes at a cost. Clearly, the best
    strategy is to confidently communicate ***Q=*1** as long as **P>0.5**, and to
    communicate an equally confident ***Q*=0** when ***P*<0.5 — **see where the black
    dots lie in the figure.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 长期可达到的最大奖励不再总是1，但它被***2|P-*0.5*|***所限制——无知是有代价的。显然，最好的策略是在***P>0.5***时自信地传达***Q=*1**，当***P*<0.5***时传达同样自信的***Q*=0**——**看看图中的黑色圆点在哪里。
- en: Under a linear scoring rule, when it is more likely than not that the event
    occurs — pretend you are absolutely certain that it will occur. When it’s marginally
    more likely that it does not occur — be bold and proclaim “that can never happen”.
    You will be wrong sometimes, but, on average, it’s more profitable to be bold
    than to be honest.
  id: totrans-26
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在线性评分规则下，当事件发生比不发生的可能性更大时——假装你绝对确信它会发生。当事件不发生的可能性略大时——大胆宣称“那永远不会发生”。你有时会犯错，但平均来看，大胆比诚实更有利。
- en: 'Even worse: What happens when you have absolutely no clue, no idea about the
    outcome, and your subjective belief is ***P***=0.5? Then you can play safe and
    communicate that, or you can take the chance and communicate **Q=1** or **Q=0** —
    the expectation value is the same.'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 更糟糕的是：当你对结果一无所知，没有任何想法，你的主观信念是***P***=0.5时会发生什么？那么你可以安全地传达这一点，或者你可以冒险传达**Q=1**或**Q=0**——期望值是相同的。
- en: 'If find this a disturbing result: A linear reward function makes people go
    all-in! There is no way as forecast consumer to distinguish a slight tendency
    of 51% from a “quite likely” conviction of 95% or from an almost-certain 99.9999999%.
    In that quiz, the smart players will always go all-in.'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 如果发现这是一个令人不安的结果：线性奖励函数会让人们孤注一掷！作为预测消费者，无法区分51%的轻微倾向与“相当可能”的信念95%或几乎确定的99.9999999%。在那个问答中，聪明的玩家总是会孤注一掷。
- en: Worse, many situations in life reward unsupported confidence more than thoughtful
    and careful assessments. Cautiously said, not many people are being heavily sanctioned
    for making clearly exaggerated claims…
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 更糟糕的是，生活中许多情况奖励无支持的自信胜过深思熟虑和细致的评估。谨慎地说，并不是很多人因为明显夸大的声明而受到严厉的制裁…
- en: A quiz show is one thing, but, obviously, it’s quite a problem when people (or
    machines…) are pushed to not communicate their true degree of conviction when
    it comes to estimating the risk of serious and dramatic events such as earthquakes,
    war and catastrophes.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 问答节目是一回事，但显然，当人们在评估诸如地震、战争和灾难等严重且戏剧性事件的风险时被迫不传达他们真正的信念程度时，这显然是个大问题。
- en: How can we make them to be honest (in the case of people) or [calibrated](https://medium.com/@maltetichy/calibration-and-sharpness-fd8270b71f07) (in
    the case of machines)?
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 我们如何让他们诚实（在人的情况下）或[校准](https://medium.com/@maltetichy/calibration-and-sharpness-fd8270b71f07)（在机器的情况下）？
- en: '**Punishing confident wrongness: The Quadratic Scoring Rule**'
  id: totrans-32
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**惩罚自信的错误：二次评分规则**'
- en: If the probability for something to happen is estimated to be **P**=55% by some
    expert, I want that expert to communicate **Q**=55%, and not **Q**=100%. For probabilities
    to have any value for our decisions, they should reflect the true level of conviction,
    and not an opportunistically optimized value.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 如果某位专家估计某件事情发生的概率为**P**=55%，我希望这位专家传达**Q**=55%，而不是**Q**=100%。为了使概率对我们的决策有任何价值，它们应该反映真正的信念水平，而不是机会主义优化后的值。
- en: 'This reasonable ask has been formalized by statisticians by ***proper*** scoring
    rules: A proper scoring rule is one that incentivizes the forecaster to communicate
    their true degree of conviction, it is maximized when the communicated probabilities
    are calibrated, i.e. when predicted events are realized with the predicted frequency.
    At first, the question might arise whether such a scoring rule can exist at all.
    Thankfully, it can!'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 统计学家通过**适当**的评分规则将这一合理的请求形式化：适当的评分规则是激励预报者传达他们真实信念程度的规则；当传达的概率校准时，即预测事件以预测的频率实现时，它是最大化的。起初，可能会有人质疑这样的评分规则是否真的存在。幸运的是，它确实存在！
- en: 'One proper scoring rule is the ***quadratic scoring rule***, also known as
    the ***Brier score***. For extreme communicated probabilities (**Q**=1, **Q**=0),
    the values are the very same as for the linear scoring rule, but we don’t draw
    straight line between these, but a parabola. By doing that, we reward honest ignorance:
    +0.5 is awarded for a communicated probability of **Q**=0.5.'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 一种适当的评分规则是**二次评分规则**，也称为**Brier评分**。对于极端的传达概率（**Q**=1，**Q**=0），其值与线性评分规则相同，但我们不在这两点之间画直线，而是画一个抛物线。通过这样做，我们奖励诚实的无知：传达概率为**Q**=0.5时，奖励+0.5。
- en: '![](../Images/49c1afe9956e5c3b41647eb6ef1b2002.png)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/49c1afe9956e5c3b41647eb6ef1b2002.png)'
- en: Quadratic reward as a function of outcome A and communicated probability Q.
    Image by the author.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 二次奖励作为结果A和传达概率Q的函数。图片由作者提供。
- en: 'This reward function is asymmetric: When you increase your confidence from ***Q***=0.95
    to ***Q***=0.98 (and ***A*** is true), the reward function only increases marginally.
    On the other hand, when **A** is false, that same increase of confidence leaning
    towards the wrong outcome is pushing down the reward considerably. Clearly, the
    quadratic reward thereby nudges one to be more cautious than the linear reward.
    But will it suffice to make people honest?'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 这个奖励函数是不对称的：当你将你的信心从**Q**=0.95提高到**Q**=0.98（且**A**为真）时，奖励函数仅略有增加。另一方面，当**A**为假时，同样的信心增加倾向错误的结果会显著降低奖励。显然，二次奖励因此促使人们比线性奖励更加谨慎。但这样做足以让人们诚实吗？
- en: 'To see that, let’s compute the expectation value of the quadratic reward as
    a function of both the true honest probability ***P*** and the communicated one ***Q, ***just
    like we did in the linear case:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 为了看到这一点，让我们计算二次奖励作为真实诚实概率**P**和传达概率**Q**的函数的期望值，就像我们在线性情况中所做的那样：
- en: '***R(P, Q) = P * r(Q, A=1) + (1-P) * r(Q, A=0)***'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: '**R(P, Q) = P * r(Q, A=1) + (1-P) * r(Q, A=0)***'
- en: 'The resulting expected reward, for different values of the honest probability
    P, is shown in the next figure:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 对于不同诚实概率P的值，结果期望奖励在下一张图中显示：
- en: '![](../Images/c9e2a9ab60718e9dbb4966d9bca51007.png)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c9e2a9ab60718e9dbb4966d9bca51007.png)'
- en: Image by the author.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供。
- en: Now, the maxima of the curves lie exactly at the point for which ***Q=P***,
    which makes the correct strategy communicating honestly one’s own probability ***P***.
    Both exaggerated confidence and excessive caution are penalized. Of course, by
    knowing more in the first place, you’ll be able to make sharper and more confident
    statements (more predictions **Q=P** that are either close to 1 or close to 0).
    But honest ignorance is now rewarded with +0.5\. Better be safe than sorry.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，曲线的极大值正好位于**Q=P**的点，这使得正确策略是诚实地传达自己的概率**P**。夸张的自信和过度的谨慎都会受到惩罚。当然，如果你一开始就知道得更多，你将能够做出更尖锐、更有自信的陈述（更接近1或0的预测**Q=P**）。但诚实的无知现在会得到+0.5的奖励。宁为安全，不为后悔。
- en: What do we learn from that? The reward that is maximized by honestly communicated
    probabilities sanctions “surprises” (**Q**<0.5 and the event is actually true,
    or **Q**>0.5 and the event is actually false) quite strongly. You lose more when
    you are wrong with your tendency (**Q**>0.5 or **Q**<0.5) than you would win when
    you are correct. At the same time, not knowing and being honest about it is rewarded
    a non-negligible value.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 我们从中学到了什么？通过诚实地传达的概率最大化的奖励对“惊喜”（**Q**<0.5且事件实际上是真实的，或**Q**>0.5且事件实际上是虚假的）进行了相当强的制裁。当你错误地倾向于（**Q**>0.5或**Q**<0.5）时，你失去的比你正确时赢得的要多。同时，不知道并诚实地承认这一点会得到一个不可忽视的价值。
- en: Logarithmic reward
  id: totrans-46
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 对数奖励
- en: 'The quadratic reward function is not the only one that rewards honesty (there
    are infinitely many proper scoring rules): The logarithmic reward penalizes being
    confidently wrong (**P**=0, but truth is “*yes*, ***A**** is true*”; **P**=1,
    yet truth is “*no, ****A**** is false*”) with an unassailable ***-infinity***:
    The score is simply the logarithm of the probability that had been predicted for
    the event that eventually occurred — the plot is cut off on the y-axis for that
    reason:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 二次奖励函数并不是唯一奖励诚实的函数（有无限多个适当的评分规则）：对数奖励通过对自信错误（**P**=0，但事实是“*是的，***A**** 是真的*”；**P**=1，但事实是“*不，****A**** 是假的*”）进行不可辩驳的**-infinity**进行惩罚：分数仅仅是预测发生事件的概率的对数——因此y轴上的图被截断：
- en: '![](../Images/d4a935b22c63858f3c68c662a08b92a7.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d4a935b22c63858f3c68c662a08b92a7.png)'
- en: Logarithmic reward as a function of the communicated probability. Image by the
    author.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 对数奖励作为传递概率的函数。图片由作者提供。
- en: 'The logarithmic reward breaks the symmetry between “*having communicated a
    slightly too-high*” and “*having expressed a slightly too-low*” probability: Towards
    uninformative **Q**=0.5, the penalty is weaker than towards informative **Q**=0
    or **Q**=1, which we see in the expectation values:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 对数奖励打破了“*传递略高概率*”和“*表达略低概率*”之间的对称性：向无信息量**Q**=0.5，惩罚较弱，而向信息量**Q**=0或**Q**=1，惩罚较强，这在期望值中可以看到：
- en: '![](../Images/1e03f0b5b44710f36b0fe9f596036005.png)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/1e03f0b5b44710f36b0fe9f596036005.png)'
- en: Image by the author.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供。
- en: 'The logarithmic scoring rule heavily penalizes the assignment of a probability
    of 0 to something that then very surprisingly happened: Somebody who has to admit
    “*I really though it was absolutely impossible*” after the fact that they assigned ***Q***=0
    won’t be invited to provide predictions ever again…'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 对数评分规则对将概率0分配给后来非常意外发生的事情进行严厉惩罚：在事后不得不承认“*我确实认为这是绝对不可能的*”的人，将不再被邀请提供预测…
- en: 'Incentivizing sandbagging: The Cubic Scoring Rule'
  id: totrans-54
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 激励沙袋策略：三次评分规则
- en: 'Scoring rules can push forecasters to be over-confident (see the linear scoring
    rule), they can be proper (see the quadratic and logarithmic scoring rules), but
    they can also punish “*being boldly wrong*” so thoroughly that forecasters would
    rather pretend they don’t know really even if they do. A ***cubic scoring rule*** would
    lead to such excessive caution:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 评分规则可能会促使预测者过于自信（参见线性评分规则），它们可以是适当的（参见二次和对数评分规则），但它们也可以对“*大胆错误*”进行严厉惩罚，以至于预测者宁愿假装自己真的不知道，即使他们确实知道。一个**三次评分规则**会导致这种过度的谨慎：
- en: '![](../Images/d42b18d321d4c75ef669f1cc7fad7162.png)'
  id: totrans-56
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d42b18d321d4c75ef669f1cc7fad7162.png)'
- en: Image by the author.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供。
- en: 'The expectation values of the reward now make people rather communicate values
    that are less informative (closer to 0.5) than their true convictions: Instead
    of an honest **Q=P**=0.2, the optimum is at** Q**=0.333, instead of honest **Q=P**=0.4,
    the optimum is **Q**=0.4495.'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 现在的奖励期望值使得人们倾向于传递比他们的真实信念更不具信息量的值（接近0.5）：而不是诚实的**Q=P**=0.2，最佳值是**Q**=0.333，而不是诚实的**Q=P**=0.4，最佳值是**Q**=0.4495。
- en: '![](../Images/1c6865e051b42a3f96e3a33489e48fd4.png)'
  id: totrans-59
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/1c6865e051b42a3f96e3a33489e48fd4.png)'
- en: Image by the author.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供。
- en: In other words, to be provided honest judgements, don’t exaggerate the punishment
    of strong but eventually wrong convictions either — otherwise you’ll be surrounded
    by indecisive and hesitant cowards…
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，为了得到诚实的判断，不要过分夸大强烈但最终错误的信念的惩罚——否则你将周围都是犹豫不决和犹豫不决的懦夫…
- en: Honest and communicated probabilities
  id: totrans-62
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 诚实和传递的概率
- en: The following plot recapitulates the argument by showing the optimal communicated
    probability **Q** as a function of the true belief **P**. For a linear reward
    (Exponent 1), you will either communicate **Q**=0 or **Q**=1, and not disclose
    any information about your true degree of conviction. The quadratic reward (Exponent
    2) makes you be honest (**Q**=**P**), while the cubic reward (Exponent 3) lets
    you set overly cautious **Q** values.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 以下图表通过展示最优传递概率**Q**作为真实信念**P**的函数来重述论点。对于线性奖励（指数1），你将要么传递**Q**=0或**Q**=1，而不会透露你真实信念程度的信息。二次奖励（指数2）会让你诚实（**Q**=**P**），而三次奖励（指数3）则让你设定过于谨慎的**Q**值。
- en: '![](../Images/7a61eeb5ac9ce9bda7e258ecbecc2931.png)'
  id: totrans-64
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7a61eeb5ac9ce9bda7e258ecbecc2931.png)'
- en: Optimally communicated probability **Q** as a function of the true conviction **P**,
    for different reward functions. A proper scoring rule ensures **Q=P**. Image by
    the author.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 最优传递概率**Q**作为真实信念**P**的函数，对于不同的奖励函数。适当的评分规则确保**Q=P**。图片由作者提供。
- en: In reality, our choices are often binary, and, depending on the “false positive”
    and “false negative” cost and the “true positive” and “true negative” reward,
    we will set the threshold on our subjective probability to take or not take a
    certain action to different values. It is not at all irrational to plan thoroughly
    for a probability **P**=0.01=1% catastrophe.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 在现实中，我们的选择往往是二元的，并且根据“假阳性”和“假阴性”成本以及“真阳性”和“真阴性”奖励，我们将设置主观概率的阈值，以决定是否采取某些行动。为概率**P**=0.01=1%的灾难性事件进行彻底的计划绝对不是不理性的。
- en: If probabilities are subjective, how can they be “wrong”?
  id: totrans-67
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如果概率是主观的，它们怎么可能“错误”呢？
- en: 'Scoring rules have two main applications: On a technical level, when training
    a probabilistic statistical or machine learning model on data, optimizing a proper
    scoring rule will yield calibrated and as-sharp-as-possible probabilistic forecasts.
    In a more informal setting, when several experts estimate the probability for
    something (typically dramatic) to happen, one wants to make sure that the experts
    are honest and don’t try to overplay or downplay their subjective uncertainty
    (beware of group dynamics!). Super-forecasters indeed use quadratic scoring rules
    to help reflect on their degree of confidence and to train themselves to become
    more calibrated.'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 评分规则有两个主要应用：在技术层面上，当在数据上训练概率统计或机器学习模型时，优化适当的评分规则将产生校准的、尽可能精确的概率预测。在更非正式的场合，当几位专家估计某事（通常是戏剧性事件）发生的概率时，人们希望确保专家是诚实的，并且不要试图夸大或低估他们的主观不确定性（注意群体动力学！）。超级预测者确实使用二次评分规则来帮助他们反思自己的信心程度，并训练自己变得更加校准。
- en: Back to our initial quiz game. Before answering, you should definitely ask how
    you are evaluated. The evaluation procedure does matter, even if you are told
    it does not. Similarly, when you are given a multiple-choice-test, be sure to
    understand whether it might be worthwhile to check a box even if you are only
    very marginally certain about its correctness.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 回到我们最初的测验游戏。在回答之前，你绝对应该询问你将如何被评估。评估程序确实很重要，即使被告知它不重要也是如此。同样，当你被给予多项选择题时，确保你理解即使你对正确性只有非常微小的确定性，检查一个选项也可能是有价值的。
- en: But how can a quiz involving subjective probabilities be evaluated at all in
    an objective fashion? According to Bruno De Finetti, “*probability does not exist”*,
    so how can we then judge the probabilities that people express? We don’t judge
    people’s taste either! David Spiegelhalter emphasizes in “The Art of Uncertainty”
    that uncertainty is not “*a property of the world, but of our relationship with
    the world*”.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 但如何以客观的方式评估涉及主观概率的测验呢？根据布鲁诺·德·菲内蒂的说法，“*概率不存在*”，那么我们如何判断人们表达的概率呢？我们也不会评判人们的品味！大卫·斯皮格尔哈尔特在《不确定性的艺术》中强调，不确定性不是“*世界的一个属性，而是我们与世界的关系*”。
- en: However, *subjective* does not mean *unfalsifiable*.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，*主观的*并不意味着*不可证伪的*。
- en: I might be 99% sure that France is larger than Spain, 75% sure that Marie Curie
    was born before Albert Einstein, and 55% sure that Montreal is larger than Kyoto.
    The numbers that ***you*** assign to these statements will *probably* (pun intended)
    be different. Your relationship to the world is a different one than mine. That’s
    OK.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 我可能99%确信法国比西班牙大，75%确信居里夫人比爱因斯坦出生得早，55%确信蒙特利尔比京都大。你为这些陈述分配的数字可能*很可能*（有意为之）是不同的。你与世界的关系不同于我的。这没关系。
- en: We can be both right in the sense that we express calibrated probabilities,
    even if we assign **different** probabilities to the **same** events.
  id: totrans-73
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我们可以表达校准的概率，即使我们对相同的事件分配**不同的**概率，我们也可以都是正确的。
- en: 'A more commonplace setting: When I enter a supermarket, I can assign quite
    informative (quite high or quite low) probabilities to me buying certain products
    — I typically know well what I intend to shop. The data scientist working at the
    supermarket does not know my personal shopping list, even after having collected
    considerable personal data. The probability that they assign to me buying a bottle
    of orange juice will be quite different from the one that I assign to me doing
    that — both probabilities can be “correct” in the sense that they are calibrated
    on the long term.'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 一个更为常见的场景：当我走进超市时，我可以为我购买某些产品的可能性分配相当有信息量的概率（相当高或相当低）——我通常很清楚我打算买什么。即使在收集了大量个人数据之后，超市工作的数据科学家也不知道我的个人购物清单。他们分配给我购买一瓶橙汁的概率将与我分配给自己购买该产品的概率大不相同——这两个概率都可以在长期上被认为是“正确”的。
- en: 'Subjectivity does not mean arbitrariness: We can aggregate predictions and
    outcomes, and evaluate to which extent the predictions are calibrated. Scoring
    rules help us precisely with that task, because they simultaneously grade honesty
    and information: Each forecaster can be evaluated separately upon their predicted
    probabilities. The one that is most informed (producing close-to-1 and close-to-0
    probabilities) while being honest at the same time will win the quiz. Different
    scoring rules can then rank strong-but-slightly-uncalibrated against weaker-but-calibrated
    predictions differently.'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 主观性并不意味着任意性：我们可以汇总预测和结果，并评估预测校准的程度。评分规则帮助我们精确地完成这项任务，因为它们同时评估诚实和信息：每个预报者可以根据他们的预测概率分别进行评估。那个最了解情况（产生接近1和接近0的概率）同时又是诚实的预报者将赢得比赛。不同的评分规则可以对强但略有不校准的预测与弱但校准的预测进行不同的排名。
- en: As mentioned above, honesty and [calibration](https://medium.com/@maltetichy/calibration-and-sharpness-fd8270b71f07) are
    not equivalent in practice. We might truly believe 100 times that certain events
    should occur in 20% of each case — but the true number of occurrences might significantly
    differ from 20\. We might be honest about our belief and express **P=Q**, but
    that belief itself is typically uncalibrated! Kahneman and Tversky have studied
    the cognitive biases that typically make more confident than we should be. In
    a way, we often behave as if a linear scoring rule judged our predictions, making
    us lean towards the bold side.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 如上所述，诚实和[校准](https://medium.com/@maltetichy/calibration-and-sharpness-fd8270b71f07)在实践中并不等价。我们可能真的相信在每种情况下，某些事件应该发生20%的概率有100次——但实际发生次数可能与20%有显著差异。我们可能对我们的信念诚实，并表达**P=Q**，但这个信念本身通常是没有校准的！卡尼曼和特沃斯基研究了通常使我们比应有的更自信的认知偏差。从某种意义上说，我们常常表现得好像一个线性评分规则在评判我们的预测，使我们倾向于大胆的一边。
