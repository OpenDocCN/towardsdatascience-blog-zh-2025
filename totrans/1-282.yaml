- en: My Experiments with NotebookLM for Teaching
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 我使用NotebookLM进行教学实验
- en: 原文：[https://towardsdatascience.com/my-experiments-with-notebooklm-for-teaching/](https://towardsdatascience.com/my-experiments-with-notebooklm-for-teaching/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/my-experiments-with-notebooklm-for-teaching/](https://towardsdatascience.com/my-experiments-with-notebooklm-for-teaching/)
- en: '<mdspan datatext="el1757965093024" class="mdspan-comment">If</mdspan> you were
    to <mdspan datatext="el1758044794402" class="mdspan-comment">scroll through</mdspan>
    my recent [X timeline](https://x.com/pandeyparul), you’d notice I’ve been experimenting
    with a lot of different AI tools for the purpose of teaching. I have been working
    on this project for nearly a year, primarily to explore how we can utilize AI
    to enhance the interactivity and effectiveness of learning. My focus is on educators,
    parents, and teachers so that they spend less time searching for resources online
    and more time with the students. I’m aware that there are already a ton of educational
    sites out there, but in my experience, they suffer from two main issues:'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1757965093024" class="mdspan-comment">如果你</mdspan>要<mdspan
    datatext="el1758044794402" class="mdspan-comment">滚动浏览</mdspan>我最近的[X时间线](https://x.com/pandeyparul)，你会注意到我一直在尝试许多不同的AI工具，目的是为了教学。我一直在从事这个项目近一年，主要是为了探索我们如何利用AI来增强学习的互动性和有效性。我的重点是教育工作者、家长和教师，以便他们花更少的时间在网上寻找资源，更多的时间与学生在一起。我意识到已经有大量的教育网站，但根据我的经验，它们存在两个主要问题：
- en: • A lot of these tools require unnecessary signups and are filled with a lot
    of irrelevant ads.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 许多这些工具都需要不必要的注册，并且充满了大量不相关的广告。
- en: • Sometimes the content is just not tailored to our requirements. Either it’s
    too basic or too complex.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 有时内容根本不符合我们的需求。要么太基础，要么太复杂。
- en: That’s why I started coding my own tools or creating custom resources by mixing
    and matching what’s available. Based on the positive responses I’m getting from
    the community, I’ve now compiled them in this article, starting with NotebookLM.
    Over time, I plan to continue this series with other tools as well.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 正因如此，我开始编写自己的工具或通过混合和匹配现有资源来创建定制资源。根据我从社区获得的积极反馈，我现在将它们整理在这篇文章中，从NotebookLM开始。随着时间的推移，我计划继续用其他工具继续这个系列。
- en: Through this article, I share my experiences of using NotebookLM to teach more
    effectively, focusing on the K—10 age group kids.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 通过这篇文章，我分享了我使用NotebookLM更有效地进行教学的经验，重点关注K—10年龄段的儿童。
- en: Why NotebookLM for Education
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么选择NotebookLM进行教育
- en: The tagline for [NotebookLM](https://notebooklm.google/) is ***understand anything,***
    and it really lives up to that. NotebookLM has been a great companion for me.
    I have been using it in a variety of ways, from understanding research papers
    to organizing ideas, summarizing technical talks, and a lot more. But it can be
    an effective tool for teaching as well, due to its features like mind maps, flashcards,
    quiz generator, customizable reports, video overviews, etc.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: NotebookLM的口号是***理解一切***，它确实做到了这一点。NotebookLM一直是我的一位优秀伴侣。我以各种方式使用它，从理解研究论文到组织想法，总结技术演讲，等等。但凭借其思维导图、闪卡、测验生成器、可定制的报告、视频概述等功能，它也可以成为有效的教学工具。
- en: What really stands out for me is that the answers are strongly grounded in the
    actual information provided. That’s one of the most important requirements when
    using any tool for education. You don’t want a hallucinating assistant, especially
    when it’s being used to study.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我来说，真正引人注目的是，答案与实际提供的信息紧密结合。这是使用任何教育工具时最重要的要求之一。你不想有一个产生幻觉的助手，尤其是在用它来学习的时候。
- en: 1\. Making History Dates Easy to Remember
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1. 使历史日期易于记忆
- en: NotebookLM has a **timeline feature** that can automatically generate timelines
    from the sources you provide. This is especially useful for remembering important
    dates or events in history, making it easier for students to see how things connect
    over time.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: NotebookLM有一个**时间线功能**，可以从您提供的来源自动生成时间线。这对于记住历史中的重要日期或事件特别有用，使学生更容易看到事物随时间如何相互关联。
- en: Let’s see it in action. Below, I’ve pasted some text from Wikipedia on human
    history as a source in NotebookLM. Then, by going to **Reports** and selecting
    the **Timeline** option, I can get a clear timeline of the main events.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看它的实际应用。下面，我在NotebookLM中粘贴了一些来自维基百科的人类历史文本作为来源。然后，通过转到**报告**并选择**时间线**选项，我可以获得主要事件的清晰时间线。
- en: To make these dates stick, kids need something visual. You can take the generated
    timeline and copy it into another tool called [**NapkinAI**](https://www.napkin.ai/),
    which is designed to turn text into visuals. NapkinAI will automatically convert
    into a nice timeline chart that students can use for studying or even include
    in their projects.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 为了让这些日期记住，孩子们需要一些视觉的东西。您可以将生成的时间线复制到另一个名为 [**NapkinAI**](https://www.napkin.ai/)
    的工具中，该工具旨在将文本转换为视觉内容。NapkinAI 将自动转换为学生可用于学习甚至包含在他们的项目中的漂亮时间线图表。
- en: '*Turning Wikipedia text into visual history timelines with NotebookLM + NapkinAI.*
    Video by Author'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: '*使用 NotebookLM + NapkinAI 将维基百科文本转换为视觉历史时间线。* 视频由作者制作'
- en: '* * *'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: But we don’t need to stop at history lessons; it works for academic papers,
    too. Just swap the source with a research paper and follow the same steps. It’s
    a neat way to pull out all the key milestones that led up to that particular research.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 但我们不需要仅限于历史课程；它也适用于学术论文。只需将来源换成研究论文，并遵循相同的步骤。这是一种巧妙的方法，可以提取导致该特定研究的关键里程碑。
- en: '![](../Images/78fc51f169ac4b9d94586c493d424be3.png)'
  id: totrans-17
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/78fc51f169ac4b9d94586c493d424be3.png)'
- en: '*Extracting milestones from research papers and turning them into timeline
    charts with NotebookLM + NapkinAI.* Video by Author'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: '*从研究论文中提取里程碑并将其转换为时间线图表，使用 NotebookLM + NapkinAI。* 视频由作者制作'
- en: 2\. Turn Lessons into interactive Crosswords
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2\. 将课程转换为互动填字游戏
- en: Students love crosswords, and if we can turn their lessons into crosswords,
    they’ll not only enjoy solving them, but it’s an excellent way to help them remember
    their lessons in a fun way. It’s also a great method to test understanding.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 学生喜欢填字游戏，如果我们能将他们的课程变成填字游戏，他们不仅会喜欢解答它们，而且这是一种帮助他们以有趣的方式记住课程内容的好方法。这也是一种测试理解能力的好方法。
- en: For this, we’ll use [**CrosswordLabs**](https://crosswordlabs.com/), a free
    website that makes it easy to create crosswords. But instead of making random
    ones, we’ll pull the clues directly from lesson plans.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 对于此，我们将使用 [**CrosswordLabs**](https://crosswordlabs.com/)，这是一个免费网站，可以轻松创建填字游戏。但我们将直接从课程计划中提取线索。
- en: 'Add your lesson materials to **NotebookLM**. Now, CrosswordLabs expects clues
    in a specific format:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 将您的课程材料添加到 **NotebookLM**。现在，CrosswordLabs 预期线索以特定格式：
- en: '[PRE0]'
  id: totrans-23
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'To generate clues from your lessons in this format, prompt NotebookLM with
    a few-shot example like the one above. For instance, the prompt can be:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 要以这种格式从您的课程中生成线索，请使用如上所示的几个示例提示 NotebookLM。例如，提示可以是：
- en: '[PRE1]'
  id: totrans-25
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Take the generated output and paste it into CrosswordLabs, and it will auto-build
    your crossword. Once it’s ready, you can print it, download it as a PDF, or share
    the link so students can solve it online.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 将生成的输出粘贴到 CrosswordLabs，它将自动构建您的填字游戏。一旦准备好，您可以打印它，将其下载为 PDF 文件，或分享链接以便学生在线解答。
- en: '![](../Images/8c847714b92fd96364575fa34b2abd9e.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/8c847714b92fd96364575fa34b2abd9e.png)'
- en: '*From lesson text → word–clue pairs → instant crosswords with NotebookLM +
    CrosswordLabs.* Video by Author'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: '*从课文文本 → 单词-线索对 → 使用 NotebookLM + CrosswordLabs 的即时填字游戏。* 视频由作者制作'
- en: 3\. From Study Guides to Storybooks
  id: totrans-29
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3\. 从学习指南到故事书
- en: '[Storybook](https://gemini.google/overview/storybook/) is a great feature in
    the [Gemini App](https://gemini.google.com/app?hl=en-IN) and one of my favorites.
    It allows you to create a 10-page, personalized, and illustrated storybook for
    any topic, idea, or situation you have in mind. Apart from being fun, these storybooks
    are incredibly useful for teaching new concepts to students. This is because you
    can tailor them based on their interests. For instance, if your students like
    Legos, you can generate one around that theme. Maybe they enjoy picnics, create
    one around that instead.'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: '[Storybook](https://gemini.google/overview/storybook/) 是 [Gemini App](https://gemini.google.com/app?hl=en-IN)
    中的一个出色功能，也是我最喜欢的之一。它允许您为任何主题、想法或情况创建一个 10 页的个性化、插图故事书。除了有趣之外，这些故事书对于向学生教授新概念非常有用。这是因为您可以根据他们的兴趣进行定制。例如，如果您的学生喜欢乐高，您可以围绕这个主题生成一个。也许他们喜欢野餐，可以围绕这个主题创建一个。'
- en: 'What is even more useful is that this technique can help students understand
    complex topics. So, if you’re an educator planning to introduce a new concept,
    here’s how you can use the Gemini Storybook feature together with NotebookLM to
    make it easier:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 更有用的是，这种技术可以帮助学生理解复杂主题。所以，如果您是一位计划介绍新概念的教师，以下是您如何使用 Gemini Storybook 功能与 NotebookLM
    一起使用，使其更容易的方法：
- en: First, create a simple study guide in NotebookLM from the material that you
    are planning to use.
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 首先，从您计划使用的材料中在 NotebookLM 中创建一个简单的学习指南。
- en: 'Paste the generated guide in the Gemini App along with the prompt:'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将生成的指南粘贴到 Gemini 应用中，并附带提示：
- en: '[PRE2]'
  id: totrans-34
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Here is how I created a storybook to introduce the concept of Magnetism to fifth
    graders.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是如何我为五年级学生介绍磁铁概念创建故事书的。
- en: '![](../Images/898494cbb230d456b59e311fef37158c.png)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/898494cbb230d456b59e311fef37158c.png)'
- en: '* I turned a NotebookLM study guide on Magnetism into a fun illustrated storybook
    with Gemini.* Video by Author'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: '* 我将 NotebookLM 的磁铁学习指南转换成一本有趣的插图故事书，使用了 Gemini。* 视频由作者制作'
- en: It’s a quick way to turn your syllabus into something students actually enjoy
    learning from.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一种快速将您的课程表转化为学生真正喜欢学习的方法。
- en: 4\. NotebookLM + Google AI Studio
  id: totrans-39
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4. NotebookLM + Google AI Studio
- en: I love the mindmaps from NotebookLM because they capture the whole topic so
    well. But for kids, plain text isn’t enough, so I turned to Google AI Studio to
    build an image flashcard generator from scratch. While NotebookLM recently added
    a Flashcard Generator, it’s text-based.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 我非常喜欢 NotebookLM 的思维导图，因为它们能够很好地捕捉整个主题。但对于孩子们来说，纯文本是不够的，所以我转向 Google AI Studio
    从头开始构建一个图像闪卡生成器。虽然 NotebookLM 最近增加了闪卡生成器，但它基于文本。
- en: '[Google AI Studio](https://aistudio.google.com/apps) hosts a variety of applets
    that can be remixed, making it easy to build on top of them. It works like an
    experimental playground to test Google Gemini models and create prototypes, which
    can then be deployed on the cloud. One of the applets was designed for generating
    flashcards, so I modified the flashcard app to pair text with images, making the
    flashcards more engaging and kid-friendly.'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: '[Google AI Studio](https://aistudio.google.com/apps) 提供了各种小程序，可以混合使用，便于在其基础上构建。它就像一个实验游乐场，用于测试
    Google Gemini 模型并创建原型，这些原型随后可以部署到云端。其中一个小程序是用于生成闪卡的，所以我修改了闪卡应用，将文本与图像配对，使闪卡更具吸引力和适合儿童。'
- en: '![](../Images/00be6e2293ff3aafccc0b0b1f4e7d3ac.png)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/00be6e2293ff3aafccc0b0b1f4e7d3ac.png)'
- en: '*Upgrading text-only mindmaps into image flashcards with NotebookLM + Google
    AI Studio.* Video by Author'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: '*使用 NotebookLM + Google AI Studio 将纯文本思维导图升级为图像闪卡。* 视频由作者制作'
- en: I have published the [app](https://aistudio.google.com/apps/drive/17wgHsdaCI89z3RK0GsWJsgpKzv_0VL_o?showPreview=true&showAssistant=true),
    and now you can use it as it is or make your own version of it.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 我已经发布了[应用](https://aistudio.google.com/apps/drive/17wgHsdaCI89z3RK0GsWJsgpKzv_0VL_o?showPreview=true&showAssistant=true)，现在您可以使用它，或者制作您自己的版本。
- en: 5\. NotebookLM for learning a new language
  id: totrans-45
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 5. 使用 NotebookLM 学习新语言
- en: I’ve been experimenting with **NotebookLM** for language learning, and the new
    Flashcards + Custom Reports feature fits really well. Since NotebookLM now supports
    many languages, I tried customizing prompts so that the outputs feel more like
    a language teacher explaining concepts, rather than just raw translations.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 我一直在尝试使用 **NotebookLM** 进行语言学习，新的闪卡和自定义报告功能非常适合。由于 NotebookLM 现在支持多种语言，我尝试定制提示，以便输出更像是语言教师解释概念，而不仅仅是原始翻译。
- en: In case you missed it, NotebookLM now comes with a custom reports feature. This
    means instead of just getting the regular reports, you can create your own report
    based on your preference and output language.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您错过了这个功能，NotebookLM 现在新增了自定义报告功能。这意味着您不仅可以获得常规报告，还可以根据您的偏好和输出语言创建自己的报告。
- en: '![](../Images/d7fb34bcdd93c4d9e3f1657b90365d55.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d7fb34bcdd93c4d9e3f1657b90365d55.png)'
- en: Custom reports option in NotebookLM | Image by Author
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: NotebookLM 中的自定义报告选项 | 图片由作者提供
- en: So let’s say I’m an English speaker and I want to learn Hindi. I can take any
    Hindi passage that I want to understand, generate a custom report by specifying
    the output language as Hindi, and then save that report as a source in NotebookLM.
    From there, I can create flashcards directly from the source.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我是一个英语使用者，并且我想学习印地语。我可以选择任何我想要理解的印地语段落，通过指定输出语言为印地语来生成一个自定义报告，然后将该报告作为 NotebookLM
    的源文件保存。从那里，我可以直接从源文件创建闪卡。
- en: 'For example, the report prompt could be:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，报告提示可以是：
- en: '[PRE3]'
  id: totrans-52
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '![](../Images/befba50962394d65995752b379b1d6aa.png)'
  id: totrans-53
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/befba50962394d65995752b379b1d6aa.png)'
- en: '*Using Custom Reports + Flashcards in NotebookLM to make Hindi learning more
    like a real tutor.* Video by Author'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: '*使用 NotebookLM 中的自定义报告和闪卡功能，让印地语学习更接近真实导师的教学。* 视频由作者制作'
- en: While there are plenty of good apps for learning a new language, not everyone
    learns best by answering a repetitive set of questions. For many people, myself
    included, it’s easier and more effective when an expert explains the grammatical
    nuances. In this case, that expert can be NotebookLM.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然有很多优秀的语言学习应用，但并非每个人都通过回答重复的问题来学习效果最佳。对我自己和其他许多人来说，当专家解释语法细微差别时，更容易也更有效。在这种情况下，这位专家可以是
    NotebookLM。
- en: Conclusion
  id: totrans-56
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this article, I’ve shared some of my experiments in the AI for education
    space using NotebookLM. Every child learns at their own pace and through different
    mechanisms. With AI, I believe we can offer a more personalized approach to teaching
    by creating content tailored to each learner. As I mentioned earlier, my focus
    is on empowering educators, since they are the ones who need the right tools to
