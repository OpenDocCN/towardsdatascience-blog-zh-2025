- en: Practical SQL Puzzles That Will Level Up Your Skill
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/practical-sql-puzzles-that-will-level-up-your-skill/](https://towardsdatascience.com/practical-sql-puzzles-that-will-level-up-your-skill/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: There are some SQL patterns that, once you know them, you start seeing them
    everywhere. The solutions to the puzzles that I will show you today are actually
    very simple SQL queries, but understanding the concept behind them will surely
    unlock new solutions to the queries you write on a day-to-day basis.
  prefs: []
  type: TYPE_NORMAL
- en: These challenges are all based on real-world scenarios, as over the past few
    months I made a point of writing down every puzzle-like query that I had to build.
    I also encourage you to try them for yourself, so that you can challenge yourself
    first, which will improve your learning!
  prefs: []
  type: TYPE_NORMAL
- en: All queries to generate the datasets will be provided in a PostgreSQL and DuckDB-friendly
    syntax, so that you can easily copy and play with them. At the end I will also
    provide you a link to a GitHub repo containing all the code, as well as the answer
    to the bonus challenge I will leave for you!
  prefs: []
  type: TYPE_NORMAL
- en: I organized these puzzles in order of increasing difficulty, so, if you find
    the first ones too easy, at least take a look at the last one, which uses a technique
    that I truly believe you won’t have seen before.
  prefs: []
  type: TYPE_NORMAL
- en: Okay, let’s get started.
  prefs: []
  type: TYPE_NORMAL
- en: Analyzing ticket moves
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: I love this puzzle because of how short and simple the final query is, even
    though it deals with many edge cases. The data for this challenge shows tickets
    moving in between Kanban stages, and the objective is to find how long, on average,
    tickets stay in the Doing stage.
  prefs: []
  type: TYPE_NORMAL
- en: The data contains the ID of the ticket, the date the ticket was created, the
    date of the move, and the “from” and “to” stages of the move. The stages present
    are New, Doing, Review, and Done.
  prefs: []
  type: TYPE_NORMAL
- en: 'Some things you need to know (edge cases):'
  prefs: []
  type: TYPE_NORMAL
- en: Tickets can move backwards, meaning tickets can go back to the Doing stage.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You should not include tickets that are still stuck in the Doing stage, as there
    is no way to know how long they will stay there for.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Tickets are not always created in the New stage.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/583c59e69c92d61fd5f4cdd2509d887f.png)'
  prefs: []
  type: TYPE_IMG
- en: 'A summary of the data:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Ticket 1:** Created in the New stage, moves normally to Doing, then Review,
    and then Done.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Ticket 2**: Created in New, then moves: New → Doing → Review → Doing again
    → Review.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Ticket 3**: Created in New, moves to Doing, but it is still stuck there.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Ticket 4**: Created in the Doing stage, moves to Review afterward.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It might be a good idea to stop for a bit and think how you would deal with
    this. Can you find out how long a ticket stays on a single stage?
  prefs: []
  type: TYPE_NORMAL
- en: Honestly, this sounds intimidating at first, and it looks like it will be a
    nightmare to deal with all the edge cases. Let me show you the full solution to
    the problem, and then I will explain what is happening afterward.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/39f65a82fe7d7187df7c18fb5af90fd8.png)'
  prefs: []
  type: TYPE_IMG
- en: The first CTE uses the LAG function to find the previous move of the ticket,
    which will be the time the ticket entered that stage. Calculating the duration
    is as simple as subtracting the previous date from the move date.
  prefs: []
  type: TYPE_NORMAL
- en: What you should notice is the use of the COALESCE in the previous move date.
    What that does is that if a ticket doesn’t have a previous move, then it uses
    the date of creation of the ticket. This takes care of the cases of tickets being
    created directly into the Doing stage, as it still will properly calculate the
    time it took to leave the stage.
  prefs: []
  type: TYPE_NORMAL
- en: This is the result of the first CTE, showing the time spent in each stage. Notice
    how the Ticket 2 has two entries, as it visited the Doing stage in two separate
    occasions.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/db1e8ebe7d2e4485f392732c19cf99b6.png)'
  prefs: []
  type: TYPE_IMG
- en: With this done, it’s just a matter of getting the average as the SUM of total
    days spent in doing, divided by the distinct number of tickets that ever left
    the stage. Doing it this way, instead of simply using the AVG, makes sure that
    the two rows for Ticket 2 get properly accounted for as a single ticket.
  prefs: []
  type: TYPE_NORMAL
- en: Not so bad, right?
  prefs: []
  type: TYPE_NORMAL
- en: Finding contract sequences
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The goal of this second challenge is to **find the most recent contract sequence
    of every employee**. A break of sequence happens when two contracts have a gap
    of more than one day between them.
  prefs: []
  type: TYPE_NORMAL
- en: In this dataset, there are no contract overlaps, meaning that a contract for
    the same employee either has a gap or ends a day before the new one starts.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/a87029104f1235c9fb7063bbd19e4cd6.png)'
  prefs: []
  type: TYPE_IMG
- en: 'As a summary of the data:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Employee 1:** Has two continuous contracts.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Employee 2:** One contract, then a gap of three days, then two contracts.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Employee 3:** One contract.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The expected result, given the dataset, is that all contracts should be included
    except for the first contract of Employee 2, which is the only one that has a
    gap.
  prefs: []
  type: TYPE_NORMAL
- en: Before explaining the logic behind the solution, I would like you to think about
    what operation can be used to join the contracts that belong to the same sequence.
    Focus only on the second row of data, what information do you need to know if
    this contract was a break or not?
  prefs: []
  type: TYPE_NORMAL
- en: I hope it’s clear that this is the perfect situation for window functions, again.
    They are incredibly useful for solving problems like this, and understanding when
    to use them helps a lot in finding clean solutions to problems.
  prefs: []
  type: TYPE_NORMAL
- en: First thing to do, then, is to get the end date of the previous contract for
    the same employee with the LAG function. Doing that, it’s simple to compare both
    dates and check if it was a break of sequence.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/1381c7b8e242752b77ff9f40cb19296d.png)'
  prefs: []
  type: TYPE_IMG
- en: An intuitive way to continue the query is to number the sequences of each employee.
    For example, an employee who has no gap, will always be on his first sequence,
    but an employee who had 5 breaks in contracts will be on his 5th sequence. Funnily
    enough, this is done by another window function.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/bc26f945a64fe9cb0612cdcfe3befb70.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Notice how, for Employee 2, he starts his sequence #2 after the first gapped
    value. To finish this query, I grouped the data by employee, got the value of
    their most recent sequence, and then did an inner join with the sequences to keep
    only the most recent one.'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/e6787b4c8401dcd6fdf0d6e462f44908.png)'
  prefs: []
  type: TYPE_IMG
- en: As expected, our final result is basically our starting query just with the
    first contract of Employee 2 missing!
  prefs: []
  type: TYPE_NORMAL
- en: Tracking concurrent events
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Finally, the last puzzle — I’m glad you made it this far.
  prefs: []
  type: TYPE_NORMAL
- en: For me, this is the most mind-blowing one, as when I first encountered this
    problem I thought of a completely different solution that would be a mess to implement
    in SQL.
  prefs: []
  type: TYPE_NORMAL
- en: For this puzzle, I’ve changed the context from what I had to deal with for my
    job, as I think it will make it easier to explain.
  prefs: []
  type: TYPE_NORMAL
- en: Imagine you’re a data analyst at an event venue, and you’re analyzing the talks
    scheduled for an upcoming event. You want to find the time of day where there
    will be the highest number of talks happening at the same time.
  prefs: []
  type: TYPE_NORMAL
- en: 'This is what you should know about the schedules:'
  prefs: []
  type: TYPE_NORMAL
- en: Rooms are booked in increments of 30min, e.g. from 9h-10h30.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The data is clean, there are no overbookings of meeting rooms.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: There can be back-to-back meetings in a single meeting room.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/7244f659bd9209193544c45ddf567b0c.png)'
  prefs: []
  type: TYPE_IMG
- en: Meeting schedule visualized (this is the actual data).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/123dd105149c439f1d19209dcf674d57.png)'
  prefs: []
  type: TYPE_IMG
- en: The way to solve this is using what is called a Sweep Line Algorithm, or also
    known as an event-based solution. This last name actually helps to understand
    what will be done, as the idea is that instead of dealing with intervals, which
    is what we have in the original data, we deal with events instead.
  prefs: []
  type: TYPE_NORMAL
- en: To do this, we need to transform every row into two separate events. The first
    event will be the Start of the meeting, and the second event will be the End of
    the meeting.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/b48d46c013f07a24bcfe82811ff02b95.png)'
  prefs: []
  type: TYPE_IMG
- en: Take the time to understand what is happening here. To create two events from
    a single row of data, we’re simply unioning the dataset on itself; the first half
    uses the start time as the timestamp, and the second part uses the end time.
  prefs: []
  type: TYPE_NORMAL
- en: You might already notice the delta column created and see where this is going.
    When an event starts, we count it as +1, when it ends, we count it as -1\. You
    might even be already thinking of another window function to solve this, and you’re
    actually right!
  prefs: []
  type: TYPE_NORMAL
- en: But before that, let me just explain the trick I used in the end dates. As I
    don’t want back-to-back meetings to count as two concurrent meetings, I’m subtracting
    a single minute of every end date. This way, if a meeting ends and another starts
    at 10h30, it won’t be assumed that two meetings are concurrently happening at
    10h30.
  prefs: []
  type: TYPE_NORMAL
- en: Okay, back to the query and yet another window function. This time, though,
    the function of choice is a rolling SUM.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/af318d5a474196c2c854ecf05bfafff8.png)'
  prefs: []
  type: TYPE_IMG
- en: The rolling SUM at the Delta column is essentially walking down every record
    and finding how many events are active at that time. For example, at 9 am sharp,
    it sees two events starting, so it marks the number of concurrent meetings as
    two!
  prefs: []
  type: TYPE_NORMAL
- en: When the third meeting starts, the count goes up to three. But when it gets
    to 9h59 (10 am), then two meetings end, bringing the counter back to one. With
    this data, the only thing missing is to find when the highest value of concurrent
    meetings happens.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/209303f90a781d90b47036e79b849936.png)'
  prefs: []
  type: TYPE_IMG
- en: That’s it! The interval of 9h30–10h is the one with the largest number of concurrent
    meetings, which checks out with the schedule visualization above!
  prefs: []
  type: TYPE_NORMAL
- en: This solution looks incredibly simple in my opinion, and it works for so many
    situations. Every time you are dealing with intervals now, you should think if
    the query wouldn’t be easier if you thought about it in the perspective of events.
  prefs: []
  type: TYPE_NORMAL
- en: But before you move on, and to really nail down this concept, I want to leave
    you with a bonus challenge, which is also a common application of theSweep Line
    Algorithm. I hope you give it a try!
  prefs: []
  type: TYPE_NORMAL
- en: Bonus challenge
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The context for this one is still the same as the last puzzle, but now, instead
    of trying to find the period when there are most concurrent meetings, the objective
    is to find bad scheduling. It seems that there are overlaps in the meeting rooms,
    which need to be listed so it can be fixed ASAP.
  prefs: []
  type: TYPE_NORMAL
- en: 'How would you find out if the same meeting room has two or more meetings booked
    at the same time? Here are some tips on how to solve it:'
  prefs: []
  type: TYPE_NORMAL
- en: It’s still the same algorithm.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This means you will still do the UNION, but it will look slightly different.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You should think in the perspective of each meeting room.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'You can use this data for the challenge:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: If you’re interested in the solution to this puzzle, as well as the rest of
    the queries, check this [GitHub repo](https://github.com/mtrentz/sql-puzzles-1).
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: The first takeaway from this blog post is that window functions are overpowered.
    Ever since I got more comfortable with using them, I feel that my queries have
    gotten so much simpler and easier to read, and I hope the same happens to you.
  prefs: []
  type: TYPE_NORMAL
- en: If you’re interested in learning more about them, you would probably enjoy reading
    [this other blog post](https://towardsdatascience.com/understand-sql-window-functions-once-and-for-all-4447824c1cb4/)
    I’ve written, where I go over how you can understand and use them effectively.
  prefs: []
  type: TYPE_NORMAL
- en: The second takeaway is that these patterns used in the challenges really do
    happen in many other places. You might need to find sequences of subscriptions,
    customer retention, or you might need to find overlap of tasks. There are many
    situations when you will need to use window functions in a very similar fashion
    to what was done in the puzzles.
  prefs: []
  type: TYPE_NORMAL
- en: The third thing I want you to remember is about this solution to using events
    besides dealing with intervals. I’ve looked at some problems I solved a long time
    ago that I could’ve used this pattern on to make my life easier, and unfortunately,
    I didn’t know about it at the time.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: I really do hope you enjoyed this post and gave a shot to the puzzles yourself.
    And I’m sure that if you made it this far, you either learned something new about
    SQL or strengthened your knowledge of window functions!
  prefs: []
  type: TYPE_NORMAL
- en: Thank you so much for reading. If you have questions or just want to get in
    touch with me, don’t hesitate to contact me at [mtrentz.com](https://mtrentz.com).
  prefs: []
  type: TYPE_NORMAL
- en: '*All images by the author unless stated otherwise.*'
  prefs: []
  type: TYPE_NORMAL
