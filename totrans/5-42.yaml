- en: This story was originally published on [alexdremov.me](https://alexdremov.me/understanding-flash-attention-writing-the-algorithm-from-scratch-in-triton?utm_source=medium)
    Check it out! (at least, TEX looks better there)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Conclusions
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In the post, I covered the motivation of the Flash Attention algorithm as well
    as its algorithm details. Finally, we were able to implement it from scratch in
    Triton, reproducing the speedups from the paper.
  prefs: []
  type: TYPE_NORMAL
- en: I hope this post improved your understanding of Flash Attention. Feel free to
    leave a comment below if you have any questions.
