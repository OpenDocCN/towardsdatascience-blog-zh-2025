- en: Talk to my Agent
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 与我的代理交谈
- en: 原文：[https://towardsdatascience.com/talk-to-my-agent/](https://towardsdatascience.com/talk-to-my-agent/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/talk-to-my-agent/](https://towardsdatascience.com/talk-to-my-agent/)
- en: <mdspan datatext="el1753719328649" class="mdspan-comment">In</mdspan> the past
    several months, I’ve had the opportunity to immerse myself in the task of adapting
    APIs and backend systems for consumption by LLMs, specifically agents using the
    MCP protocol. Initially, I expected the experience to be no different than any
    other similar development projects I’ve done in the past. I was fascinated to
    discover, however, that these autonomous clients are a new type of creature. Consequently,
    evolving APIs to yield the most value from agent interaction required more than
    simply making them accessible.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1753719328649" class="mdspan-comment">在过去几个月里，我有机会深入参与到为LLM（特别是使用MCP协议的代理）消费API和后端系统的适配工作中。最初，我预期这次经历将与我在过去完成的任何其他类似开发项目没有区别。然而，我发现这些自主客户端是一种全新的生物。因此，为了从代理交互中获得最大价值，仅仅使API可访问是不够的。>
- en: This post is a result of my experimentations and field testing, hopefully it
    can be useful to other practitioners.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 这篇文章是我实验和实地测试的结果，希望它对其他从业者有所帮助。
- en: The power and curse of autonomy
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 自主性的力量与诅咒
- en: '![](../Images/2dcd5274c53b77d4ac246b7a9cff976d.png)'
  id: totrans-5
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/2dcd5274c53b77d4ac246b7a9cff976d.png)'
- en: Image generated by author (Midjourney)
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 作者生成的图像（Midjourney）
- en: We developers are used to 3rd-party tools and automation processes interacting
    with the application APIs. Our interfaces have therefore evolved around best practices
    that best support these use cases. Transactional, versioned, contract-driven APIs,
    minded to enforce forward/backward compatibility and built for efficiency. These
    are all important concerns that are secondary in priority and often simply irrelevant
    when considering the autonomous user.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 我们开发者习惯于第三方工具和自动化流程与应用程序API的交互。因此，我们的接口已经围绕支持这些用例的最佳实践而演变。事务性、版本化、基于合同的API，旨在强制执行向前/向后兼容性，并旨在提高效率。这些都是重要的考虑因素，在优先级上属于次要，在考虑自主用户时通常无关紧要。
- en: With agents as clients, there is no need to worry about backward/forward compatibility
    as each session is stateless and unique. The model will study how to use tools
    each time it discovers them, arriving at the right combination of API calls to
    achieve its objective. As enthusiastic as this agent may be, however, it will
    also give up after a few failed attempts unless given proper incentive and guidelines.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 以代理作为客户，无需担心向后/向前兼容性问题，因为每个会话都是无状态的且唯一的。每次模型发现新工具时，它都会学习如何使用这些工具，并找到实现其目标的正确API调用组合。然而，尽管这个代理可能非常热情，但如果在几次失败的尝试后没有得到适当的激励和指导，它也会放弃。
- en: More importantly, without such clues it could succeed in the API call but fail
    to meet its objectives. Unlike scripted automations or experienced developers,
    it only has the API documentation and responses to go on in planning out how to
    meet its goals. The dynamic nature of its response is both a blessing and a curse
    as these two sources are also the sum of knowledge it can draw upon to be effective.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 更重要的是，没有这样的线索，它可能在API调用中成功，但无法达到其目标。与脚本自动化或经验丰富的开发者不同，它只能依靠API文档和响应来规划如何实现其目标。其响应的动态性质既是祝福也是诅咒，因为这两个来源也是它为了有效而可以借鉴的知识总和。
- en: Conversation-Driven APIs
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 驱动对话的API
- en: I had first realized that the agent would require a different type of design
    while troubleshooting some cases in which the agent was not able to get to the
    desired results. I provided MCP tool access to an API that provides usage information
    for any code function based on tracing data. Sometimes it seemed the agent was
    simply not using it correctly. Looking more closely at the interaction, it seemed
    that the model was correctly calling the tool and for various reasons received
    an empty array as a response. This behavior would be 100% correct for any similar
    operation in our API.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 我最初意识到代理需要不同类型的设计，是在解决一些代理无法达到预期结果的情况时。我提供了一种访问API的工具，该API基于跟踪数据提供任何代码函数的使用信息。有时似乎代理只是没有正确使用它。更仔细地观察交互，似乎模型正确地调用了工具，但由于各种原因收到了一个空数组作为响应。这种行为对于我们API中的任何类似操作都是100%正确的。
- en: The agent, however, had trouble comprehending why this was happening. After
    trying a few simple variations, it gave up and decided to move on to other avenues
    of exploration. To me, that interaction spelled out a missed opportunity. No one
    was at fault; transactionally, the behavior was correct. All of the relevant tests
    would pass, but in measuring the effectiveness of using this API, we found out
    the ‘success rate’ was ridiculously low.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，代理在理解为什么会发生这种情况时遇到了困难。尝试了几种简单的变化后，它放弃了，决定转向其他探索途径。对我来说，这次互动揭示了错失的机会。没有人有错；从事务的角度来看，行为是正确的。所有相关的测试都会通过，但在衡量使用此API的有效性时，我们发现“成功率”极其低。
- en: 'The solution turned out to be a simple one, instead of returning an empty response,
    I decided to provide a more detailed set of instructions and ideas:'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 解决方案最终变得很简单，而不是返回一个空响应，我决定提供一套更详细的指示和想法：
- en: '[PRE0]'
  id: totrans-14
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Instead of just returning the results to the agent, I was trying to do something
    agents will often attempt as well — keep the conversation going. My perceptions
    of API responses, therefore, changed. When being consumed by LLMs, beyond serving
    functional purposes, they are, in essence, a **reverse prompt.**An ended interaction
    is a dead end, however, any data we return back to the agent gives it a chance
    to pull on another thread in its investigative process.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 我试图做的不仅仅是将结果返回给代理，我还试图做代理经常尝试的事情——保持对话。因此，我对API响应的看法也发生了变化。当被LLMs消费时，除了服务功能目的之外，它们本质上是一个**反向提示**。结束的交互是一个死胡同，然而，我们返回给代理的任何数据都给了它一个机会，在它的调查过程中拉扯另一条线索。
- en: HATEOAS, the ‘choose your own adventure’ APIs
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: HATEOAS，即“选择你的冒险”API
- en: '![](../Images/1caf9d60898e4beebeef5243f85163cb.png)'
  id: totrans-17
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/1caf9d60898e4beebeef5243f85163cb.png)'
- en: Image generated by author (Midjourney)
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 由作者生成的图像（Midjourney）
- en: 'Thinking about the philosophy of this approach, I realized that there was something
    vaguely familiar about it. A long time ago, when I was taking my first steps crafting
    modern REST APIs, I was introduced to the concept of hypermedia APIs and HATEOAS:
    Hypertext As Engine of the Application State. The concept was outlined by Fielding
    in his seminal 2008 blog post [REST APIs must be hypertext-driven](https://roy.gbiv.com/untangled/2008/rest-apis-must-be-hypertext-driven).
    One sentence in that post completely blew my mind at the time:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到这种方法的哲学，我意识到它似乎有些似曾相识。很久以前，当我刚开始尝试构建现代REST API时，我接触到了超媒体API和HATEOAS的概念：超文本作为应用程序状态引擎。这个概念由Fielding在他的开创性2008年博客文章[REST
    APIs must be hypertext-driven](https://roy.gbiv.com/untangled/2008/rest-apis-must-be-hypertext-driven)中概述。文章中的一句话当时完全震撼了我的思想：
- en: “Application state transitions must be driven by client selection of server-provided
    choices that are present in the received representations”
  id: totrans-20
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “应用程序状态转换必须由客户端选择服务器提供的、存在于接收到的表示中的选择来驱动”
- en: 'In other words, the server can **teach** the client what to do next instead
    of simply sending back the requested data. The canonical example is a simple GET
    request for a specific resource, whereby the response provides information on
    actions the client can take next on that resource. A self-documenting API where
    the client was not required to know anything about it ahead of time except a single
    entry point from which a branch of choices emerges. Here is a good example from
    the Wikipedia [page](https://en.wikipedia.org/wiki/HATEOAS):'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，服务器可以**教导**客户端下一步该做什么，而不仅仅是简单地发送回请求的数据。一个典型的例子是对特定资源的简单GET请求，其中响应提供了关于客户端可以在此资源上采取的下一步行动的信息。这是一个自文档化的API，客户端在事先不需要了解任何关于它的情况，除了一个单一的入口点，从这个入口点可以出现一系列的选择。以下是从维基百科[页面](https://en.wikipedia.org/wiki/HATEOAS)的一个很好的例子：
- en: '[PRE1]'
  id: totrans-22
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: At the time, I was fascinated by this concept, which reminded me of what is
    commonly referred to as ‘choose your own adventure’ books or ‘[gamebooks](https://en.wikipedia.org/wiki/Gamebook)’.
    This genre of books, an inseparable part of my childhood, did not simply relay
    a story (or provide an API response by this metaphor), but also gave the reader
    a key as to what are the next set set of options available to it. Hypermedia REST
    APIs were self-documenting and offered users a way to understand the state of
    the application and the operations available for each entity or process resource
    without having to read through extensive documentation.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 在当时，我对这个概念非常着迷，它让我想起了通常所说的“选择你的冒险”书籍或“[游戏书籍](https://en.wikipedia.org/wiki/Gamebook)”。这类书籍，是我童年的一个不可或缺的部分，它不仅仅传达一个故事（或者用这个比喻来说，提供API响应），而且还给读者提供了一个关键，即它接下来可以有哪些选项。超媒体REST
    API是自文档化的，并为用户提供了一种了解应用程序状态和每个实体或进程资源可用的操作的方法，而无需阅读大量的文档。
- en: Hypermedia on steroids
  id: totrans-24
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 超媒体强化版
- en: One way to look at Hypermedia APIs is that they provide more context to the
    user as a part of the response. Context, to agents, is everything, and it certainly
    does not need to stop with available options or operation. An API is an interaction
    point in which context can be relayed and provided in a form that would encourage
    further interaction. Let’s take a look at another example!
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 从用户的角度来看，超媒体API提供更多的上下文作为响应的一部分。对代理来说，上下文是一切，它当然不需要仅仅停止在可用的选项或操作上。API是一个交互点，其中可以传达和提供上下文，以鼓励进一步的交互。让我们看看另一个例子！
- en: Another tool I was working on, allows the model to retrieve **runtime issues**
    found in the deployment environment, again based on observability data. The specific
    result I was testing prompt response for, was an anomaly found in the performance
    of a specific endpoint. It seems that at times responses were **EXTREMELY** slow,
    ~70X slower than the median. Providing that information piece to the LLM was helpful,
    but ultimately did not accomplish more than simple repeats of the data provided.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 我正在开发的一个工具，允许模型检索在部署环境中发现的**运行时问题**，同样基于可观察性数据。我正在测试的具体结果提示响应，是在特定端点的性能中发现的异常。似乎有时响应非常**慢**，比中位数慢70倍。将这一信息片段提供给LLM是有帮助的，但最终并没有比简单地重复提供的数据做得更多。
- en: 'For reference, here is the response provided, as well as the agent output:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 仅供参考，以下是提供的响应以及代理的输出：
- en: '[PRE2]'
  id: totrans-28
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '![](../Images/0182de4274823d130b1097cee7077af7.png)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0182de4274823d130b1097cee7077af7.png)'
- en: Image by author
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: 'There is nothing functionally wrong with the API response or the way the information
    was mediated to the user by the agent. The only problem is that there is a lot
    of context and ideas missing from it that could leverage the agent’s ability to
    take that conversation forward. In other words, this is a traditional API request/response
    interaction, but agents through reasoning are capable of so much more. Let’s see
    what happens if we modify our API to inject additional state and suggestions to
    try to carry the conversation forward:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: API响应或代理将信息传递给用户的方式没有任何功能性错误。唯一的问题是，其中缺少了很多上下文和想法，这些都可以利用代理的能力将对话继续下去。换句话说，这是一个传统的API请求/响应交互，但通过推理，代理能够做到更多。让我们看看如果我们修改我们的API以注入额外的状态和建议来尝试推动对话会发生什么：
- en: '[PRE3]'
  id: totrans-32
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'All we’ve done is give the AI model a little more to go on. Instead of simply
    returning the result, we can feed the model with ideas on how to use the information
    provided to it. Surely enough, these suggestions are immediately put to use. This
    time, the agent continues to investigate the problem by calling other tools to
    inspect the behavior, compare the traces and understand the problem lineage:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 我们所做的一切就是给AI模型提供更多的信息。我们不仅可以简单地返回结果，还可以向模型提供如何使用它提供的信息的想法。不出所料，这些建议立即得到了应用。这次，代理通过调用其他工具来检查行为、比较跟踪并理解问题来源来继续调查问题：
- en: '![](../Images/d6f11299265e1603db65b61a0373a029.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d6f11299265e1603db65b61a0373a029.png)'
- en: Image by author
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: '![图片](../Images/6bfe1306d20f1235fddc9ca5d16b957e.png)'
- en: 'With the new information in place, the agent is happy to continue the exploration,
    examine the timeline and synthesize the results from the various tools until it
    comes up with new data, that was in no way part of the original response scope:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 在新的信息到位后，代理很高兴继续探索，检查时间线，并从各种工具的结果中综合出新的数据，这些数据根本不是原始响应范围的一部分：
- en: '![](../Images/6bfe1306d20f1235fddc9ca5d16b957e.png)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6bfe1306d20f1235fddc9ca5d16b957e.png)'
- en: Image by author
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: Wait… Shouldn’t all APIs be designed like that?
  id: totrans-39
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 等等…难道所有API不都应该设计成那样吗？
- en: Absolutely! I definitely believe that this approach could benefit users, automation
    developers, and everyone else — even if they use brains for reasoning rather than
    LLM models. In essence, a conversation-driven API can expand the context beyond
    the realm of data and into the realm of possibilities. Opening up more branches
    of exploration for agents and users alike and improving the effectiveness of APIs
    in solving the underlying use case.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 绝对没错！我坚信这种方法能够惠及用户、自动化开发者以及所有人——即使他们依赖大脑进行推理而不是LLM模型。本质上，以对话驱动的API可以将语境扩展到数据领域之外，进入可能性领域。为代理和用户
    alike 开辟更多探索分支，并提高API在解决潜在用例方面的有效性。
- en: There is definitely more room for evolution. For example, the hints and ideas
    provided to the client by the API in our example were static, what if they were
    AI-generated as well? There are many different A2A models out there, but at some
    point, it could just be a backend system and a client brainstorming about what
    the data means and what could be done to understand it better. As for the user?
    Forget about him, talk to his agent.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 确实还有更多的发展空间。例如，在我们示例中API提供给客户端的提示和想法是静态的，如果它们也是由AI生成的会怎样？市面上有众多不同的A2A模型，但到了某个阶段，它可能仅仅是一个后端系统和客户端一起头脑风暴，探讨数据的含义以及如何更好地理解它。至于用户？先不考虑他，和他的代理交流吧。
