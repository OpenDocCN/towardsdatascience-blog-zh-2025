- en: Uh-Uh, Not Guilty
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/uh-uh-not-guilty/](https://towardsdatascience.com/uh-uh-not-guilty/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '<mdspan datatext="el1746667449210" class="mdspan-comment">When the six</mdspan>
    merry murderesses of the Cook County Jail climbed the stage in the Chicago musical,
    [they were aligned on the message](https://www.youtube.com/watch?v=C1VVB_9nCmg&ab_channel=ED5International):'
  prefs: []
  type: TYPE_NORMAL
- en: They had it coming, they had it coming all along.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I didn’t do it.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: But if I’d done it, how could you tell me that I was wrong?
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'And the part of the song I found interesting was the reframing of their violent
    actions through their moral lens: “*It was a murder, but not a crime.*”'
  prefs: []
  type: TYPE_NORMAL
- en: In short, the musical tells a story of [greed, murder, injustice](https://www.loreto.ac.uk/chicago-the-musical/#:~:text=greed%2C%20murder%20and%20injustice),
    and **blame-shifting plots** that unfold in a world where truth is manipulated
    by media, clever lawyers, and public fascination with scandal.
  prefs: []
  type: TYPE_NORMAL
- en: By being only an observer in the audience, it is easy to fall for their stories
    portrayed through the victim’s eyes, who was merely responding to intolerable
    situations.
  prefs: []
  type: TYPE_NORMAL
- en: There is (apparently) a scientific explanation for why blame-shifting feels
    satisfying. Attributing negative events to external causes (other people or situations)
    [activates brain regions associated with reward processing](https://pmc.ncbi.nlm.nih.gov/articles/PMC8019091/#:~:text=choosing%20a%20self%2Dserving%20attribution%20is%20a%20selection%20of%20the%20highest%20rewarding%20alternative).
    If it feels good, it reinforces the behaviour and makes it more automatic.
  prefs: []
  type: TYPE_NORMAL
- en: This interesting play of blame-shifting is in the theatre of life now, where
    humans can also start calling out the **tools powered by LLMs** for poor decisions
    and life outcomes. Probably pulling out the argument of…
  prefs: []
  type: TYPE_NORMAL
- en: '[Artistic differences](https://www.allmusicals.com/lyrics/chicago/cellblocktango.htm#:~:text=I%20guess%20you%20can%20say%20we%20broke%20up%20because%20of%20artistic%20differences)'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Knowing how the differences (artistic or not) lead us to justify our bad acts
    and shift blame to others, it’s only common sense to assume we will do the same
    to AI and the models behind it.
  prefs: []
  type: TYPE_NORMAL
- en: When searching for a responsible party for AI-related failures, one paper, “[*It’s
    the AI’s fault, not mine*](https://pubmed.ncbi.nlm.nih.gov/39693294/)*,*” reveals
    a pattern in how humans attribute blame depending on who’s involved and how they’re
    involved.
  prefs: []
  type: TYPE_NORMAL
- en: 'The research explored two key questions:'
  prefs: []
  type: TYPE_NORMAL
- en: (1) Would we blame AI more if we saw it as having human-like qualities?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: (2) And would this conveniently reduce blame for human stakeholders (programmers,
    teams, company, governments)?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Through three studies conducted in early 2022, before the “official” start
    of the generative AI era through UI, the research examined how humans distribute
    blame when AI systems commit moral transgressions, such as displaying racial bias,
    exposing children to inappropriate content, or unfairly distributing medical resources
    and found the following:'
  prefs: []
  type: TYPE_NORMAL
- en: When AI was portrayed with more human-like mental capacities, participants were
    more willing to point fingers at the AI system for moral failures.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Other findings were that not all human agents got off the hook equally:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Companies** benefited more from this blame-shifting game, receiving less
    blame when AI seemed more human-like.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Meanwhile, **AI programmers, teams, and government regulators** didn’t experience
    reduced blame regardless of how mind-like the AI appeared.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'And probably the most important discovery:'
  prefs: []
  type: TYPE_NORMAL
- en: Across all scenarios, AI consistently received a smaller percentage of blame
    compared to human agents, and the **AI programmer or the AI team** shouldered
    **the heaviest blame** burden.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: How were these findings explained?
  prefs: []
  type: TYPE_NORMAL
- en: The research suggested it’s about **perceived roles and structural clarity:**
  prefs: []
  type: TYPE_NORMAL
- en: '**Companies** with their “complex and often opaque structures” benefit from
    reduced blame when AI appears more human-like. They can more easily distance themselves
    from AI mishaps and shift blame to the seemingly autonomous AI system.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Programmers** with their direct technical involvement in creating the AI
    features remained firmly accountable regardless of AI anthropomorphisation. Their
    “fingerprints” on the system’s decision-making architecture make it nearly impossible
    for them to claim “the AI acted independently.”'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Government entities** with their regulatory oversight roles maintained steady
    (though lower overall) blame levels, as their responsibilities for monitoring
    AI systems remained clear, regardless of how human-like the AI appeared.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This “[moral scapegoating](https://en.wikipedia.org/wiki/Scapegoating)” suggests
    corporate accountability might increasingly dissolve as AI systems appear more
    autonomous and human-like.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a86f2529e866bd046046cceccde13b37.png)'
  prefs: []
  type: TYPE_IMG
- en: Moral scapegoating is defined in the study as the process of blaming an individual
    or group for a negative outcome to deflect personal or collective responsibility.
    [Photo by [Vaibhav Sanghavi](https://unsplash.com/@photoframiac?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)]
  prefs: []
  type: TYPE_NORMAL
- en: You would now say, this is…
  prefs: []
  type: TYPE_NORMAL
- en: '[All that jazz](https://en.wikipedia.org/wiki/All_That_Jazz_%28song%29#:~:text=cynical%20comment%20on%20the%20willingness%20of%20humans...to%20act%20solely%2C%20simply%2C%20and%20remorselessly%20in%20their%20own%20interest)'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Scapegoating and blaming others occur when the stakes are high, and the media
    usually likes to position a big headline, with the villain:'
  prefs: []
  type: TYPE_NORMAL
- en: '[*“New York lawyers sanctioned for using fake ChatGPT cases in legal brief*](https://www.reuters.com/legal/new-york-lawyers-sanctioned-using-fake-chatgpt-cases-legal-brief-2023-06-22/)*”*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[*“Cursor AI Chatbot Invents Fake Policy, Sparks Developer Outrage*](https://scalebytech.com/cursor-ai-chatbot-invents-fake-policy-sparks-developer-outrage/)*”*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*“*[*Greek Woman Divorces Husband After ChatGPT ‘Predicted’ He Would Cheat
    on Her!*](http://tovima.com/society/greek-woman-divorces-husband-after-chatgpt-predicted-he-would-cheat-on-her/)*”*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: From all these titles, you can instantly blame the end-user or developer because
    of a lack of knowledge of how the new tools (yes, [tools](https://medium.com/ai-advances/the-good-enough-truth-c7cb2e633799#:~:text=a%20tool.-,A%20tool%20that%20can%E2%80%99t%20understand.,-A%20tool%20that)!)
    are built and how they should be used, implemented or tested, but none of this
    helps when the damage is already done, and someone needs to be held accountable
    for it.
  prefs: []
  type: TYPE_NORMAL
- en: 'Talking about accountability, I can’t skip the [EU AI Act](https://artificialintelligenceact.eu/high-level-summary/)
    now, and its regulatory framework that is placing on the hook AI [*providers*,
    *deployers* and *importers*](https://www.ibm.com/think/topics/eu-ai-act#:~:text=Subscribe%20today-,Who%20does%20the%20EU%20AI%20Act%20apply%20to%3F,-The%20EU%20AI),
    by stating how:'
  prefs: []
  type: TYPE_NORMAL
- en: “Users (deployers) of high-risk AI systems have some obligations, though less
    than providers (developers).”
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: So, among others, the Act explains [different classes of AI systems](https://digital-strategy.ec.europa.eu/en/library/commission-publishes-guidelines-ai-system-definition-facilitate-first-ai-acts-rules-application#:~:text=The%20AI%20Act%2C%20which%20aims,those%20subject%20to%20transparency%20obligations.)
    and categorises ***high-risk AI systems*** as those used in critical areas like
    hiring, essential services, law enforcement, migration, justice administration,
    and democratic processes.
  prefs: []
  type: TYPE_NORMAL
- en: For these systems, *providers* must implement a [**risk-management system**](https://artificialintelligenceact.eu/article/9/)
    that identifies, analyses, and mitigates risks throughout the AI system’s lifecycle.
  prefs: []
  type: TYPE_NORMAL
- en: This extends into a mandatory [**quality management system**](https://artificialintelligenceact.eu/article/17/)
    covering regulatory compliance, design processes, development practices, testing
    procedures, data management, and post-market monitoring. It must include “[*an
    accountability framework setting out the responsibilities of management and other
    staff.*](https://artificialintelligenceact.eu/article/17/#:~:text=an%20accountability%20framework%20setting%20out%20the%20responsibilities%20of%20the%20management%20and%20other%20staff)”
  prefs: []
  type: TYPE_NORMAL
- en: On the other side, [*deployers* of high-risk AI systems](https://artificialintelligenceact.eu/article/26/)
    need to implement appropriate technical measures, ensure human oversight, monitor
    system performance, and, in certain cases, conduct f[undamental rights impact
    assessments](https://artificialintelligenceact.eu/article/27/).
  prefs: []
  type: TYPE_NORMAL
- en: To sweeten this up, [penalties for non-compliance](https://artificialintelligenceact.eu/article/99/)
    can result in a fine of up to €35 million or 7% of global annual turnover.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Maybe you now think, “*I’m off the hook…I am only the end-user, and all this
    is none of my concern*”, but let me remind you of the already existing headlines
    above, where no lawyer could [razzle-dazzle](https://www.youtube.com/watch?v=8ZYG2PCyNfE&ab_channel=BingeSociety)
    a judge into believing innocent for leveraging AI in a work situation that seriously
    affected other parties.
  prefs: []
  type: TYPE_NORMAL
- en: Now that we’ve clarified this, let’s discuss how everyone can contribute to
    the AI responsibility circle.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/42a6dc81b7529f0f01443900381adebd.png)'
  prefs: []
  type: TYPE_IMG
- en: '“You are a 10x hacker and it must be someone else’s fault.” [Image source:
    [LINK](https://orlybooks.com/books/blaming-the-user). The image is sourced from
    free online distribution.]'
  prefs: []
  type: TYPE_NORMAL
- en: '[When you’re good to AI, AI’s good to you](https://www.youtube.com/watch?v=3t6_odu4lNc&ab_channel=Miramax)'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'True responsibility in the AI pipeline requires personal commitment from everyone
    involved, and with this, the best you can do is:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Educate yourself on AI:** Instead of blindly relying on AI tools, learn first
    how they are built and [which tasks they can solve](https://medium.com/ai-advances/did-we-skip-on-machine-learning-d8893d88a02a).
    You, too, can classify your tasks into different criticalities and understand
    where it is crucial to have humans deliver them, and where AI can step in with
    [human-in-the-loop](https://learn.microsoft.com/en-us/semantic-kernel/frameworks/process/examples/example-human-in-loop?pivots=programming-language-python),
    or independently.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Build a testing system**: Create personal checklists for cross-checking AI
    outputs against other sources before acting on them. It’s worth mentioning here
    how a good approach is to have more than one testing technique and more than one
    human tester. (What can I say,  blame the [good development practices](https://www.practitest.com/resource-center/blog/software-testing-best-practices-checklist/).)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Question the outputs (always, even with the testing system)**: Before accepting
    AI recommendations, ask “How confident am I in this output?” and “What’s the worst
    that could happen if this is wrong and who will be affected?”'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Document your process**: Keep records of how you used AI tools, what inputs
    you provided, and what decisions you made based on the outputs. If you did everything
    by the book and followed processes, documentation in the AI-supported decision-making
    process will be a critical piece of evidence.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Speak up about concerns**: If you notice problematic patterns in the AI tools
    you use, report them to the relevant human agents. Being quiet about AI systems
    malfunctioning is not a good strategy, even if you caused part of this problem.
    However, reacting on time and taking responsibility is the long-term road to success.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Finally, I recommend **familiarising yourself with the regulations** to understand
    your rights alongside responsibilities. No framework can change the fact that
    AI decisions carry human fingerprints and that humans will consider other humans,
    not the tools, responsible for AI mistakes.
  prefs: []
  type: TYPE_NORMAL
- en: Unlike the fictional murderesses of the Chicago musical who danced their way
    through blame, in real AI failures, the evidence trail won’t disappear with a
    smart lawyer and superficial story.
  prefs: []
  type: TYPE_NORMAL
- en: '*Thank You for Reading!*'
  prefs: []
