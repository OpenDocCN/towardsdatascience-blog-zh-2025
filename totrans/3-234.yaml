- en: 'AI Agents from Scratch: Single Agents'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 从零开始构建AI代理：单个代理
- en: 原文：[https://towardsdatascience.com/ai-agents-from-zero-to-hero-part-1/](https://towardsdatascience.com/ai-agents-from-zero-to-hero-part-1/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://towardsdatascience.com/ai-agents-from-zero-to-hero-part-1/](https://towardsdatascience.com/ai-agents-from-zero-to-hero-part-1/)'
- en: '**Intro**'
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**简介**'
- en: '**AI Agents** are autonomous programs that perform tasks, make decisions, and
    communicate with others. Normally, they use a set of tools to help complete tasks.
    In GenAI applications, these Agents process sequential reasoning and can use external
    tools (like web searches or database queries) when the LLM knowledge isn’t enough.
    Unlike a basic chatbot, which generates random text when uncertain, an AI Agent
    activates tools to provide more accurate, specific responses.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '**AI代理**是执行任务、做出决策并与他人通信的自主程序。通常，它们使用一系列工具来帮助完成任务。在GenAI应用中，这些代理处理顺序推理，并在LLM知识不足时可以使用外部工具（如网络搜索或数据库查询）。与不确定时生成随机文本的基本聊天机器人不同，AI代理激活工具以提供更准确、更具体的响应。'
- en: We are moving closer and closer to the concept of **Agentic AI:** systems that
    exhibit a higher level of autonomy and decision-making ability, without direct
    human intervention. While today’s AI Agents respond reactively to human inputs,
    tomorrow’s Agentic AIs proactively engage in problem-solving and can adjust their
    behavior based on the situation.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我们越来越接近**代理AI**的概念：这些系统表现出更高水平的自主性和决策能力，无需直接的人为干预。虽然今天的AI代理对人类输入做出反应，但明天的代理AI将主动参与问题解决，并可以根据情况调整其行为。
- en: Today, building Agents from scratch is becoming as easy as training a logistic
    regression model 10 years ago. Back then, *Scikit-Learn* provided a straightforward
    library to quickly train Machine Learning models with just a few lines of code,
    abstracting away much of the underlying complexity.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 今天，从头开始构建代理变得和10年前训练逻辑回归模型一样简单。当时，*Scikit-Learn*提供了一个简单的库，只需几行代码就可以快速训练机器学习模型，抽象掉了许多底层复杂性。
- en: In this tutorial, I’m going to show how to **build from scratch different types
    of AI Agents**, from simple to more advanced systems. I will present some useful
    Python code that can be easily applied in other similar cases (just copy, paste,
    run) and walk through every line of code with comments so that you can replicate
    this example.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个教程中，我将展示如何**从头开始构建不同类型的AI代理**，从简单到更高级的系统。我将提供一些有用的Python代码，这些代码可以轻松应用于其他类似情况（只需复制、粘贴、运行），并逐行代码进行注释，以便您可以复制此示例。
- en: '**Setup**'
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**设置**'
- en: As I said, anyone can have a custom Agent running locally for free without GPUs
    or API keys. The only necessary library is [***Ollama***](https://ollama.com/)(`pip
    install ollama==0.4.7`), as it allows users to run LLMs locally, without needing
    cloud-based services, giving more control over data privacy and performance.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我所说，任何人都可以免费运行本地自定义代理，无需GPU或API密钥。唯一必要的库是[***Ollama***](https://ollama.com/)(`pip
    install ollama==0.4.7`)，因为它允许用户在本地运行LLMs，无需云服务，从而在数据隐私和性能方面提供更多控制。
- en: First of all, you need to download *Ollama* from the website.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，您需要从网站下载*Ollama*。
- en: '![](../Images/a6d60584479cb450d63a0dfebc540e5a.png)'
  id: totrans-10
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a6d60584479cb450d63a0dfebc540e5a.png)'
- en: Then, on the prompt shell of your laptop, use the command to download the selected
    LLM. I’m going with Alibaba’s ***Qwen***, as it’s both smart and lite.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，在您的笔记本电脑的提示符shell中，使用命令下载选定的LLM。我选择阿里巴巴的***Qwen***，因为它既智能又轻量。
- en: '![](../Images/5e62ad326652c20f96342b8f33f5046d.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/5e62ad326652c20f96342b8f33f5046d.png)'
- en: After the download is completed, you can move on to Python and start writing
    code.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 下载完成后，您可以继续使用Python并开始编写代码。
- en: '[PRE0]'
  id: totrans-14
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'Let’s test the LLM:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们测试LLM：
- en: '[PRE1]'
  id: totrans-16
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '![](../Images/f7a8bbb17c7f11d6cb47f2c23c233880.png)'
  id: totrans-17
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f7a8bbb17c7f11d6cb47f2c23c233880.png)'
- en: Obviously, the LLM per se is very limited and it can’t do much besides chatting.
    Therefore, we need to provide it the possibility to take action, or in other words,
    to **activate Tools**.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 显然，LLM本身非常有限，它除了聊天之外几乎什么也做不了。因此，我们需要提供它采取行动的可能性，换句话说，就是**激活工具**。
- en: One of the most common tools is the ability to **search the Internet**. In Python,
    the easiest way to do it is with the famous private browser [*DuckDuckGo*](https://pypi.org/project/duckduckgo-search/)(`pip
    install duckduckgo-search==6.3.5`). You can directly use the original library
    or import the [*LangChain*](https://www.langchain.com/) wrapper (`pip install
    langchain-community==0.3.17`).
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 最常见的工具之一是**搜索互联网**的能力。在Python中，最简单的方法是使用著名的私有浏览器[*DuckDuckGo*](https://pypi.org/project/duckduckgo-search/)(`pip
    install duckduckgo-search==6.3.5`)。你可以直接使用原始库或导入[*LangChain*](https://www.langchain.com/)包装器(`pip
    install langchain-community==0.3.17`)。
- en: With *Ollama*, in order to use a Tool, the function must be described in a dictionary.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 使用*Ollama*，为了使用工具，必须在字典中描述该函数。
- en: '[PRE2]'
  id: totrans-21
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '![](../Images/24112f07f627a8f8c3d9148c59ef9ff4.png)'
  id: totrans-22
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/24112f07f627a8f8c3d9148c59ef9ff4.png)'
- en: Internet searches could be very broad, and I want to give the Agent the option
    to be more precise. Let’s say, I’m planning to use this Agent to learn about financial
    updates, so I can give it a specific tool for that topic, like searching only
    a finance website instead of the whole web.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 网络搜索可能非常广泛，我希望给代理提供更精确的选项。比如说，我计划使用这个代理来了解金融更新，所以我可以给它一个特定主题的工具，比如只搜索金融网站而不是整个网络。
- en: '[PRE3]'
  id: totrans-24
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '![](../Images/b727bfb660cad509cfdcfd203cb2e1ab.png)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b727bfb660cad509cfdcfd203cb2e1ab.png)'
- en: '**Simple Agent (WebSearch)**'
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**简单代理（网络搜索**）'
- en: In my opinion, the most basic Agent should at least be able to choose between
    one or two Tools and re-elaborate the output of the action to give the user a
    proper and concise answer.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 在我看来，最基本的代理至少应该能够在一到两个工具之间进行选择，并重新阐述动作的输出，以给用户提供恰当且简洁的答案。
- en: '![](../Images/c6a233baf0362a73fffb81338354710e.png)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c6a233baf0362a73fffb81338354710e.png)'
- en: First, you need to write a prompt to describe the Agent’s purpose, the more
    detailed the better (mine is very generic), and that will be the first message
    in the chat history with the LLM.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，你需要写一个提示来描述代理的目的，越详细越好（我的非常通用），这将作为与LLM聊天历史中的第一条消息。
- en: '[PRE4]'
  id: totrans-30
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: In order to keep the chat with the AI alive, I will use a loop that starts with
    user’s input and then the Agent is invoked to respond (which can be a text from
    the LLM or the activation of a Tool).
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 为了保持与AI的聊天活跃，我将使用一个循环，从用户输入开始，然后调用代理来响应（这可能来自LLM的文本或激活一个工具）。
- en: '[PRE5]'
  id: totrans-32
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'Up to this point, the chat history could look something like this:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，聊天历史可能看起来像这样：
- en: '![](../Images/f04df8b8d50074c4f2b84bc8c81ca716.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f04df8b8d50074c4f2b84bc8c81ca716.png)'
- en: 'If the model wants to use a Tool, the appropriate function needs to be run
    with the input parameters suggested by the LLM in its response object:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 如果模型想要使用工具，需要运行适当的函数，并使用LLM在其响应对象中建议的输入参数：
- en: '![](../Images/1efd38e338e011c1f4c9a743b0b058f8.png)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/1efd38e338e011c1f4c9a743b0b058f8.png)'
- en: So our code needs to get that information and run the Tool function.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们的代码需要获取这些信息并运行工具函数。
- en: '[PRE6]'
  id: totrans-38
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Now, if we run the full code, we can chat with our Agent.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，如果我们运行完整的代码，我们就可以与我们的代理聊天。
- en: '![](../Images/617373a56cbef6d85d093af09229831a.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/617373a56cbef6d85d093af09229831a.png)'
- en: '**Advanced Agent (Coding)**'
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**高级代理（编码**）'
- en: LLMs know how to code by being exposed to a large corpus of both code and natural
    language text, where they learn patterns, syntax, and semantics of programming
    languages. The model learns the relationships between different parts of the code
    by predicting the next token in a sequence. In short, LLMs can generate Python
    code but can’t execute it, Agents can.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: LLM通过接触大量代码和自然语言文本的语料库来学习编码，它们学习编程语言的模式、语法和语义。模型通过预测序列中的下一个标记来学习代码不同部分之间的关系。简而言之，LLM可以生成Python代码但不能执行它，代理可以。
- en: I shall prepare a Tool allowing the Agent to **execute code**. In Python, you
    can easily create a shell to run code as a string with the native command *exec()*.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 我将准备一个工具，允许代理**执行代码**。在Python中，你可以轻松创建一个shell，以字符串的形式运行代码，使用原生的命令*exec()*。
- en: '[PRE7]'
  id: totrans-44
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: Just like before, I will write a prompt, but this time, at the beginning of
    the chat-loop, I will ask the user to provide a file path.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 就像之前一样，我会写一个提示，但这次，在聊天循环的开始，我会要求用户提供文件路径。
- en: '[PRE8]'
  id: totrans-46
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Since coding tasks can be a little trickier for LLMs, I am going to add also
    **memory reinforcement**. By default, during one session, there isn’t a true long-term
    memory. LLMs have access to the chat history, so they can remember information
    temporarily, and track the context and instructions you’ve given earlier in the
    conversation. However, memory doesn’t always work as expected, especially if the
    LLM is small. Therefore, a good practice is to reinforce the model’s memory by
    adding periodic reminders in the chat history.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 由于编码任务对于大型语言模型（LLMs）来说可能稍微复杂一些，因此我将添加**记忆强化**。默认情况下，在一次会话中，并没有真正的长期记忆。LLMs 可以访问聊天历史，因此它们可以暂时记住信息，并跟踪对话中之前给出的上下文和指令。然而，记忆并不总是按预期工作，尤其是如果LLM较小的话。因此，一个好的做法是通过在聊天历史中添加周期性提醒来强化模型的记忆。
- en: '[PRE9]'
  id: totrans-48
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: 'Please note that the default memory length in Ollama is 2048 characters. If
    your machine can handle it, you can increase it by changing the number when the
    LLM is invoked:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 请注意，Ollama中的默认记忆长度为2048个字符。如果你的机器可以处理，你可以在调用LLM时更改数字来增加它：
- en: '[PRE10]'
  id: totrans-50
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: In this usecase, the output of the Agent is mostly code and data, so I don’t
    want the LLM to re-elaborate the responses.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个用例中，代理的输出主要是代码和数据，因此我不想让LLM重新阐述响应。
- en: '[PRE11]'
  id: totrans-52
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: Now, if we run the full code, we can chat with our Agent.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，如果我们运行完整的代码，我们就可以与我们的代理进行聊天。
- en: '![](../Images/53848deb5c93ab14d8c8880ca6575d3a.png)'
  id: totrans-54
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/53848deb5c93ab14d8c8880ca6575d3a.png)'
- en: '**Conclusion**'
  id: totrans-55
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**结论**'
- en: This article has covered the foundational steps of creating Agents from scratch
    using only *Ollama*. With these building blocks in place, you are already equipped
    to start developing your own Agents for different use cases.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 本文已涵盖使用 *Ollama* 从零开始创建代理的基础步骤。有了这些构建块，你已经准备好开始为不同的用例开发自己的代理。
- en: '**Stay tuned for Part 2**, where we will dive deeper into more advanced examples.'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: '**敬请期待第二部分**，我们将深入探讨更多高级示例。'
- en: 'Full code for this article: [**GitHub**](https://github.com/mdipietro09/GenerativeAI/blob/main/Agents_ZeroToHero/notebook.ipynb)'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 本文章的完整代码：[**GitHub**](https://github.com/mdipietro09/GenerativeAI/blob/main/Agents_ZeroToHero/notebook.ipynb)
- en: I hope you enjoyed it! Feel free to contact me for questions and feedback or
    just to share your interesting projects.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 希望你喜欢它！欢迎联系我提问、反馈或只是分享你的有趣项目。
- en: 👉 [**Let’s Connect**](https://maurodp.carrd.co/) 👈
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 👉 [**让我们建立联系**](https://maurodp.carrd.co/) 👈
- en: '![](../Images/4c2c3ab2cdd49d1c82d8e04a3e625c2d.png)'
  id: totrans-61
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/4c2c3ab2cdd49d1c82d8e04a3e625c2d.png)'
