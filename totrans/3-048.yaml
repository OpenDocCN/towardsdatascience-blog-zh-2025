- en: Building a Scalable and Accurate Audio Interview Transcription Pipeline with
    Google Gemini
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用谷歌Gemini构建可扩展且准确的音频访谈转录管道
- en: 原文：[https://towardsdatascience.com/building-a-scalable-and-accurate-audio-interview-transcription-pipeline-with-google-gemini/](https://towardsdatascience.com/building-a-scalable-and-accurate-audio-interview-transcription-pipeline-with-google-gemini/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/building-a-scalable-and-accurate-audio-interview-transcription-pipeline-with-google-gemini/](https://towardsdatascience.com/building-a-scalable-and-accurate-audio-interview-transcription-pipeline-with-google-gemini/)
- en: '**This article is co-authored by Ugo Pradère and David Haüet**'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '**本文由Ugo Pradère和David Haüet合著**'
- en: '<mdspan datatext="el1745629161913" class="mdspan-comment">How hard</mdspan>
    can it be to transcribe an interview? You feed the audio to an AI model, wait
    a few minutes, and boom: perfect transcript, right? Well… not quite.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1745629161913" class="mdspan-comment">转录访谈有多难？</mdspan>你将音频输入到AI模型中，等待几分钟，然后砰：完美的转录，对吧？嗯……并不完全是这样。
- en: When it comes to accurately transcribe long audio interviews, even more when
    the spoken language is not English, things get a lot more complicated. You need
    high quality transcription with reliable speaker identification, precise timestamps,
    and all that at an affordable price. Not so simple after all.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 当涉及到准确转录长篇音频访谈时，尤其是当口语不是英语时，事情会变得更加复杂。你需要高质量的转录，可靠的说话人识别，精确的时间戳，所有这些都要在一个可承受的价格范围内。实际上并不简单。
- en: In this article, we take you behind the scenes of our journey to build a scalable
    and production-ready transcription pipeline using Google’s Vertex AI and Gemini
    models. From unexpected model limitations to budget evaluation and timestamp drift
    disasters, we’ll walk you through the real challenges, and how we solved them.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们将带您了解我们使用谷歌的Vertex AI和Gemini模型构建可扩展和现成转录管道的幕后之旅。从意外的模型限制到预算评估和时间戳漂移灾难，我们将向您展示真正的挑战以及我们如何解决它们。
- en: Whether you are building your own audio processing tool or just curious about
    what happens “under the hood” of a robust transcription system using a multimodal
    model, you will find practical insights, clever workarounds, and lessons learned
    that should be worth your time.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你是构建自己的音频处理工具，还是对使用多模态模型构建的强大转录系统“内部”发生的事情感到好奇，你都会发现实用的见解，巧妙的工作方法和值得你花时间的经验教训。
- en: Context of the project and constraints
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 项目背景和限制
- en: 'At the beginning of 2025, we started an interview transcription project with
    a clear goal: to build a system capable of transcribing interviews in French,
    typically involving a journalist and a guest, but not restricted to this situation,
    and lasting from a few minutes to over an hour. The final output was expected
    to be just a raw transcript but had to reflect the natural spoken dialogue written
    in a “book-like” dialogue, ensuring both a faithful transcription of the original
    audio content and a good readability.'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 在2025年初，我们启动了一个访谈转录项目，目标明确：构建一个能够转录法语访谈的系统，通常涉及一名记者和一位嘉宾，但不仅限于这种情况，持续时间从几分钟到超过一小时。预期的最终输出只是一个原始的转录文本，但必须反映自然对话的“书籍式”对话，确保忠实转录原始音频内容，同时具有良好的可读性。
- en: 'Before diving into development, we conducted a short market review of existing
    solutions, but the outcomes were never satisfactory: the quality was often disappointing,
    the pricing definitely too high for an intensive usage, and in most cases, both
    at once. At that point, we realized a custom pipeline would be necessary.'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 在深入开发之前，我们对现有的解决方案进行了简短的市场调研，但结果从未令人满意：质量往往令人失望，价格对于密集使用来说肯定太高，在大多数情况下，两者兼而有之。在那个时刻，我们意识到需要一个定制的管道。
- en: Because our organization is engaged in the Google ecosystem, we were required
    to use Google Vertex AI services. Google Vertex AI offers a variety of Speech-to-Text
    (S2T) models for audio transcription, including specialized ones such as “Chirp,”
    “Latestlong,” or “Phone call,” whose names already hint at their intended use
    cases. However, producing a complete transcription of an interview that combines
    high accuracy, speaker diarization, and precise timestamping, especially for long
    recordings, remains a real technical and operational challenge.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们的组织参与谷歌生态系统，我们被要求使用谷歌Vertex AI服务。谷歌Vertex AI提供各种语音到文本（S2T）模型用于音频转录，包括专门的模型，如“Chirp”、“Latestlong”或“Phone
    call”，其名称已经暗示了它们预期的使用场景。然而，制作一个结合高精度、说话人分割和精确时间戳的完整访谈转录，特别是对于长录音来说，仍然是一个真正的技术和操作挑战。
- en: First attempts and limitations
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 初次尝试和限制
- en: 'We initiated our project by evaluating all those models on our use case. However,
    after extensive testing, we came quickly to the following conclusion: no Vertex
    AI service fully meets the complete set of requirements and will allow us to achieve
    our goal in a simple and effective manner. There was always at least one missing
    specification, usually on timestamping or diarization.'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
- en: 'The terrible Google documentation, this must be said, cost us a significant
    amount of time during this preliminary research. This prompted us to ask Google
    for a meeting with a Google Cloud Machine Learning Specialist to try and find
    a solution to our problem. After a quick video call, our discussion with the Google
    rep quickly confirmed our conclusions: what we aimed to achieve was not as simple
    as it seemed at first. The entire set of requirements could not be fulfilled by
    a single Google service and a custom implementation of a VertexAI S2T service
    had to be developed.'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: 'We presented our preliminary work and decided to continue exploring two strategies:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: Use Chirp2 to generate the transcription and timestamping of long audio files,
    then use Gemini for diarization.
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Use Gemini 2.0 Flash for transcription and diarization, although the timestamping
    is approximate and the token output length requires looping.
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In parallel of these investigations, we also had to consider the financial aspect.
    The tool would be used for hundreds of hours of transcription per month. Unlike
    text, which is generally cheap enough not to have to think about it, audio can
    be quite costly. We therefore included this parameter from the beginning of our
    exploration to avoid ending up with a solution that worked but was too expensive
    to be exploited in production.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
- en: Deep dive into transcription with Chirp2
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'We began with a deeper investigation of the Chirp2 model since it is considered
    as the “best in class” Google S2T service. A straightforward application of the
    documentation provided the expected result. The model turned out to be quite effective,
    offering good transcription with word-by-word timestamping according to the following
    output in json format:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  id: totrans-20
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'However, a new requirement came along the project added by the operational
    team: the transcription must be as faithful as possible to the original audio
    content and include small filler words, interjections, onomatopoeia or even mumbling
    that can add meaning to a conversation, and typically come from the non-speaking
    participant either at the same time or toward the end of a sentence of the speaking
    one. We’re talking about words like “oui oui,” “en effet” but also simple expressions
    like (hmm, ah, etc.), so typical of the French language! It’s actually not uncommon
    to validate or, more rarely, oppose someone point with a simple “Hmm Hmm”. Upon
    analyzing Chirp with transcription, we noticed that while some of these small
    words were present, a number of those expressions were missing. First downside
    for Chirp2.'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: 'The main challenge in this approach lies in the reconstruction of the speaker
    sentences while performing diarization. We quickly abandoned the idea of giving
    Gemini the context of the interview and the transcription text, and asking it
    to determine who said what. This method could easily result in incorrect diarization.
    We instead explored sending the interview context, the audio file, and the transcription
    content in a compact format, instructing Gemini to only perform diarization and
    sentence reconstruction without re-transcribing the audio file. We requested a
    TSV format, an ideal structured format for transcription: “human readable” for
    fast quality checking, easy to process algorithmically, and lightweight. Its structure
    is as follows:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种方法中，主要挑战在于执行日历化时重建说话者的句子。我们很快放弃了给Gemini提供采访上下文和转录文本，并要求它确定谁说了什么的想法。这种方法很容易导致错误的日历化。我们转而探索以紧凑的格式发送采访上下文、音频文件和转录内容，指示Gemini仅执行日历化和句子重建，而不重新转录音频文件。我们请求了TSV格式，这是一种理想的转录结构化格式：“易于阅读”以快速进行质量检查，易于算法处理，且轻量。其结构如下：
- en: 'First line with speaker presentation:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 第一行包含说话者介绍：
- en: '*Diarization Speaker_1:speaker_name\Speaker_2:speaker_name\Speaker_3:speaker_name\Speaker_4:speaker_name,
    etc.*'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: '*Diarization Speaker_1:speaker_name\Speaker_2:speaker_name\Speaker_3:speaker_name\Speaker_4:speaker_name等.*'
- en: 'Then the transcription in the following format:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 然后以下格式的转录：
- en: '*speaker_id\ttime_start\ttime_stop\text* *with:*'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: '*speaker_id\ttime_start\ttime_stop\text* *with:*'
- en: '***speaker:*** *Numeric speaker ID (e.g., 1, 2, etc.)*'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***speaker:*** *数字说话者ID（例如，1，2等）*'
- en: '***time_start:*** *Segment start time in the format 00:00:00*'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***time_start:*** *以00:00:00格式的段开始时间*'
- en: '***time_stop:*** *Segment end time in the format 00:00:00*'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***time_stop:*** *以00:00:00格式的段结束时间*'
- en: '***text:*** *Transcribed text of the dialogue segment*'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***text:*** *对话段的转录文本*'
- en: 'An example output:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 一个示例输出：
- en: '*Diarization Speaker_1:Lea Finch\Speaker_2:David Albec *'
  id: totrans-32
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*Diarization Speaker_1:Lea Finch\Speaker_2:David Albec *'
- en: ''
  id: totrans-33
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*1**00:00:00**00:03:00**Hi Andrew, how are you? *'
  id: totrans-34
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*1**00:00:00**00:03:00**嗨，安德鲁，你好吗？**'
- en: ''
  id: totrans-35
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*2**00:03:00**00:03:00**Fine thanks. *'
  id: totrans-36
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*2**00:03:00**00:03:00**好的，谢谢。**'
- en: ''
  id: totrans-37
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*1**00:04:00**00:07:00**So, let’s start the interview *'
  id: totrans-38
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*1**00:04:00**00:07:00**那么，让我们开始采访**'
- en: ''
  id: totrans-39
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*2**00:07:00**00:08:00**All right.*'
  id: totrans-40
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*2**00:07:00**00:08:00**好的。**'
- en: ''
  id: totrans-41
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'A simple version of the context provided to the LLM:'
  id: totrans-42
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 提供给LLM的上下文简单版本：
- en: ''
  id: totrans-43
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*Here is the interview of David Albec, professional football player, by journalist
    Lea Finch*'
  id: totrans-44
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*以下是记者Lea Finch对职业足球运动员David Albec的采访**'
- en: The result was fairly qualitative with what appeared to be accurate diarization
    and sentence reconstruction. However, instead of getting the exact same text,
    it seemed slightly modified in several places. Our conclusion was that, despite
    our clear instructions, Gemini probably carries out more than just diarization
    and actually performed partial transcription.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 结果相当定性，看起来似乎实现了准确的日历化和句子重建。然而，并非得到完全相同的文本，它在几个地方似乎有所修改。我们的结论是，尽管我们给出了明确的指示，但Gemini可能不仅仅执行日历化，实际上还进行了部分转录。
- en: 'We also evaluated at this point the cost of transcription with this methodology.
    Below is the approximate calculation based only on audio processing:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在此还评估了使用这种方法进行转录的成本。以下是基于音频处理进行的近似计算：
- en: 'Chirp2 price /min: 0.016 usd'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: Chirp2价格/分钟：0.016美元
- en: 'Gemini 2.0 flash /min: 0,001875 usd'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 'Gemini 2.0 flash /分钟: 0,001875美元'
- en: 'Price /hour: 1,0725 usd'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 价格/小时：1,0725美元
- en: Chirp2 is indeed quite “expensive”, about ten times more than Gemini 2.0 flash
    at the time of writing, and still requires the audio to be processed by Gemini
    for diarization. We therefore decided to put this method aside for now and explore
    a way using the brand new multimodal Gemini 2.0 Flash alone, which had just left
    experimental mode.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: Chirp2确实相当“昂贵”，在撰写本文时比Gemini 2.0 flash贵十倍，并且仍然需要Gemini处理音频进行日历化。因此，我们决定暂时放弃这种方法，探索仅使用全新的多模态Gemini
    2.0 Flash的方法，它刚刚离开实验模式。
- en: 'Next: exploring audio transcription with Gemini flash 2.0'
  id: totrans-51
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 下一步：探索使用Gemini flash 2.0进行音频转录
- en: 'We provided Gemini with both the interview context and the audio file requesting
    a structured output in a consistent format. By carefully crafting our prompt with
    standard LLM guidelines, we were able to specify our transcription requirements
    with a high degree of precision. In addition with the typical elements any prompt
    engineer might include, we emphasized several key instructions essential for ensuring
    a quality transcription (*comment in italic)*:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 我们向Gemini提供了访谈上下文和音频文件，要求以一致格式提供结构化输出。通过仔细构建符合标准LLM指南的提示，我们能够以高度精确度指定我们的转录要求。除了任何提示工程师可能会包含的典型元素外，我们还强调了几个关键指令，这对于确保高质量的转录至关重要（*以下为斜体注释)*）：
- en: Transcribe interjections and onomatopoeia even when mid-sentence.
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 即使在句子中间，也要转录感叹词和拟声词。
- en: Preserve the full expression of words, including slang, insults, or inappropriate
    language. => *the model tends to change words it considers inappropriate. For
    this specific point, we had to require Google to deactivate the safety rules on
    our Google Cloud Project*.
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 保留单词的完整表达，包括俚语、侮辱性语言或不恰当的语言。=> *模型倾向于更改它认为不恰当的单词。对于这个具体点，我们不得不要求谷歌在我们的谷歌云项目中禁用安全规则*。
- en: Build complete sentences, paying particular attention to changes in speaker
    mid-sentence, for example when one speaker finishes another’s sentence or interrupts.
    => *Such errors affect diarization and accumulate throughout the transcript until
    context is strong enough for the LLM to correct*.
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 构建完整的句子，特别注意说话者在句子中发生的变化，例如当一个说话者完成另一个说话者的句子或打断时。=> *这样的错误会影响语音分离，并在整个转录中累积，直到上下文足够强大，使得LLM能够纠正*
- en: Normalize prolonged words or interjections like “euuuuuh” to “euh.” and not
    “euh euh euh euh euh …” => *this was a classical bug we were encountering called
    “repetition bug” and is discussed in more detail below*
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将长单词或感叹词，如“euuuuuh”，规范化为“euh.”，而不是“euh euh euh euh euh …”。=> *这是一个我们遇到的经典错误，称为“重复错误”，下面将详细讨论*
- en: Identify speakers by voice tone while using context to determine who is the
    journalist and who is the interviewee. => *in addition we can pass the information
    of the first speaker in the prompt*
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在使用上下文确定谁是记者和谁是受访者的同时，通过声音语调识别说话者。=> *此外，我们还可以在提示中传递第一个说话者的信息*
- en: Initial results were actually quite satisfying in terms of transcription, diarization,
    and sentence construction. Transcribing short test files made us feel like the
    project was nearly complete… until we tried longer files.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 初始结果在转录、语音分离和句子构建方面实际上相当令人满意。转录短测试文件让我们感觉项目几乎完成……直到我们尝试了更长的文件。
- en: Dealing with Long Audio and LLM Token Limitations
  id: totrans-59
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 处理长音频和LLM令牌限制
- en: 'Our early tests on short audio clips were encouraging but scaling the process
    to longer audios quickly revealed new challenges: what initially seemed like a
    simple extension of our pipeline turned out to be a technical hurdle in itself.
    Processing files longer than just a few minutes revealed indeed a series of challenges
    related to model constraints, token limits, and output reliability:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 我们对短音频剪辑的早期测试令人鼓舞，但将此过程扩展到更长的音频迅速揭示了新的挑战：最初看似简单扩展我们的管道，结果却变成了一个技术障碍。处理超过几分钟的文件确实揭示了一系列与模型约束、令牌限制和输出可靠性相关的问题：
- en: 'One of the first problems we encountered with long audio was the token limit:
    the number of output tokens exceeded the maximum allowed (MAX_INPUT_TOKEN = 8192)
    forcing us to implement a looping mechanism by repeatedly calling Gemini while
    resending the previously generated transcript, the initial prompt, a continuation
    prompt, and the same audio file.'
  id: totrans-61
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们在处理长音频时遇到的第一问题就是令牌限制：输出令牌数量超过了最大允许值（MAX_INPUT_TOKEN = 8192），迫使我们通过反复调用Gemini并重新发送先前生成的转录、初始提示、延续提示和相同的音频文件来实施循环机制。
- en: 'Here is an example of the continuation prompt we used:'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是我们使用的延续提示的一个例子：
- en: '*Continue transcribing audio interview from the previous result. Start processing
    the audio file from the previous generated text. Do not start from the beginning
    of the audio. Be careful to continue the previously generated content which is
    available between the following tags <previous_result>.*'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: '*从上一个结果继续转录音频访谈。从先前生成的文本开始处理音频文件。不要从音频的开始处开始。务必小心地继续之前生成的内容，这些内容位于以下标签之间 <previous_result>.*'
- en: Using this transcription loop with large data inputs seems to significantly
    degrade the LLM output quality, especially for timestamping. In this configuration,
    timestamps can drift by over 10 minutes on an hour-long interview. If a few seconds
    drift was considered compatible with our intended use, a few minutes made timestamping
    useless.
  id: totrans-64
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用这种转录循环处理大量数据输入似乎会显著降低LLM输出的质量，尤其是在时间戳方面。在这种配置下，时间戳可能会在一个小时的采访中漂移超过10分钟。如果我们认为几秒的偏差与我们的预期使用兼容，那么几分钟的偏差使得时间戳变得毫无用处。
- en: Our initial test on short audios of a few minutes resulted in a maximum 5 to
    10 seconds drift, and significant drift was observed generally after the first
    loop when max input token was reached. We conclude from these experimental observations,
    that while this looping technique ensures continuity in transcription fairly well,
    it not only leads to cumulative timestamp errors but also to a drastic loss of
    LLM timestamps accuracy.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 我们对几分钟的短音频进行的初步测试结果显示，最大偏差为5到10秒，通常在达到最大输入令牌后的第一个循环后观察到显著的偏差。从这些实验观察中，我们得出结论，虽然这种循环技术在确保转录连续性方面做得相当好，但它不仅会导致累积的时间戳错误，而且会导致LLM时间戳精度的大幅下降。
- en: 'We also encountered a recurring and particularly frustrating bug: the model
    would sometimes fall into a loop, repeating the same word or phrase over dozens
    of lines. This behavior made entire portions of the transcript unusable and often
    looked something like this:'
  id: totrans-66
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们还遇到了一个反复出现且特别令人沮丧的错误：模型有时会陷入循环，重复相同的单词或短语数十行。这种行为使得整个转录部分变得不可用，通常看起来像这样：
- en: '*1 00:00:00 00:03:00 Hi Andrew, how are you? *'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: '*1 00:00:00 00:03:00 嗨，安德鲁，你好吗？ *'
- en: '*2 00:03:00 00:03:00 Fine thanks.*'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: '*2 00:03:00 00:03:00 好吧，谢谢。*'
- en: '*2 00:03:00 00:03:00 Fine thanks*'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: '*2 00:03:00 00:03:00 好吧，谢谢*'
- en: '*2 00:03:00 00:03:00 Fine thanks*'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: '*2 00:03:00 00:03:00 好吧，谢谢*'
- en: '*2 00:03:00 00:03:00 Fine thanks. *'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: '*2 00:03:00 00:03:00 好吧，谢谢。 *'
- en: '*2 00:03:00 00:03:00 Fine thanks*'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: '*2 00:03:00 00:03:00 好吧，谢谢*'
- en: '*2 00:03:00 00:03:00 Fine thanks. *'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: '*2 00:03:00 00:03:00 好吧，谢谢。 *'
- en: '*etc.*'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: '*等等。*'
- en: This bug seems erratic but appears more frequently with medium-quality audio
    with strong background noise, far away speaker for example. And “on the field”,
    this is often the case.. Likewise, speaker hesitations or word repetitions seem
    to trigger it. We still don’t know exactly what causes this “repetition bug”.
    Google Vertex team is aware of it but hasn’t provided a clear explanation.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 这个错误似乎是不规则的，但在中等质量的音频中，例如背景噪音强烈、说话人距离较远的情况下，它出现的频率更高。在“现场”，这种情况很常见。同样，说话人的犹豫或词语重复似乎会触发它。我们仍然不知道这个“重复错误”的确切原因。Google
    Vertex团队已经知道这个问题，但还没有提供明确的解释。
- en: 'The consequences of this bug were especially limiting: once it occurred, the
    only viable solution was to restart the transcription from scratch. Unsurprisingly,
    the longer the audio file, the higher the probability of encountering the issue.
    In our tests, it affected roughly one out of every three runs on recordings longer
    than an hour, making it extremely difficult to deliver a reliable, production-quality
    service under such conditions.'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 这个错误的后果特别有限：一旦发生，唯一可行的解决方案是从头开始重新转录。不出所料，音频文件越长，遇到这个问题的概率就越高。在我们的测试中，它影响了大约每三个运行中的一次，在超过一小时的录音中，这使得在如此条件下提供可靠的生产质量服务变得极其困难。
- en: To make it worse, resuming transcription after a reached Max_token “cutoff”
    required resending the entire audio file each time. Although we only needed the
    next segment, the LLM would still process the full file again (without outputting
    the transcription), meaning we were billed the full audio time lenght for every
    resend.
  id: totrans-77
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 更糟糕的是，在达到最大令牌“截止”后恢复转录需要每次重新发送整个音频文件。尽管我们只需要下一个段落，但LLM仍然会再次处理整个文件（而不输出转录），这意味着我们每次重发都被计费为整个音频的时长。
- en: In practice, we found that the token limit was typically reached between the
    15th and 20th minute of the audio. As a result, transcribing a one hour long interview
    often required 4 to 5 separate LLM calls, leading to a total billing equivalent
    of 4 to 5 hours of audio for a single file.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 在实践中，我们发现通常在音频的第15到20分钟之间达到令牌限制。因此，转录一个长达一小时的采访通常需要4到5次单独的LLM调用，导致单个文件的总计计费相当于4到5小时的音频。
- en: With this process, the cost of audio transcription does not scale linearly.
    While a 15-minute audio would be billed as 15 minutes, in a single LLM call, a
    1-hour file could effectively cost 4 hours, and a 2-hour file could increase to
    16 hours, following a near quadratic pattern (≈ 4^x, where x = number of hours).
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 通过这个过程，音频转录的成本并不呈线性增长。虽然15分钟的音频会被计费为15分钟，但在单个LLM调用中，一个1小时的文件实际上可能有效成本为4小时，一个2小时的文件可能增加到16小时，遵循近二次模式（≈
    4^x，其中x =小时数）。
- en: This made long audio processing not just unreliable, but also expensive for
    long audio files.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 这使得长音频处理不仅不可靠，而且对于长音频文件来说成本高昂。
- en: Pivoting to Chunked Audio Transcription
  id: totrans-81
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 转向分块音频转录
- en: Given these major limitations, and being much more confident in the ability
    of the LLM to handle text-based tasks over audio, we decided to shift our approach
    and isolate the audio transcription process to maintain high transcription quality.
    A quality transcription is indeed the key step of the need and it makes sense
    to ensure that this part of the process should be at the core of the strategy.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到这些主要限制，并且对LLM处理基于文本的任务的能力更有信心，我们决定改变方法，将音频转录过程隔离出来，以保持高转录质量。高质量的转录确实是关键步骤，确保这一过程成为策略的核心是有意义的。
- en: At this point, splitting audio into chunks became the ideal solution. Not only,
    it seemed likely to greatly improve timestamp accuracy by avoiding the LLM timestamping
    performance degradation after looping and cumulative drift, but also reducing
    price since each chunk would be runned ideally once. While it introduced new uncertainties
    around merging partial transcriptions, the tradeoff seemed to our advantage.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 到这个时候，将音频分割成片段已成为理想的解决方案。不仅，它似乎可以大大提高时间戳的准确性，避免了LLM在循环和累积漂移后的时间戳性能下降，而且还能降低价格，因为每个片段理想情况下只会运行一次。虽然它引入了关于合并部分转录的新不确定性，但这种权衡似乎对我们有利。
- en: We thus focused on breaking long audio into shorter chunks that would insure
    a single LLM transcription request. During our tests, we observed that issues
    like repetition loops or timestamp drift typically began around the 18-minute
    mark in most interviews. It became clear that we should use 15-minute (or shorter)
    chunks for safety. Why not use 5-minute chunks? The quality improvement looked
    minimal to us while tripling the number of segments. In addition, shorter chunks
    reduce the overall context, which could hurt diarization.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们专注于将长音频分割成更短的片段，以确保单个LLM转录请求。在我们的测试中，我们观察到诸如重复循环或时间戳漂移等问题通常在大多数访谈的18分钟标记处开始。很明显，我们应该使用15分钟（或更短）的片段以确保安全。为什么不使用5分钟的片段呢？在我们看来，质量提升看起来微乎其微，而片段数量却增加了三倍。此外，较短的片段减少了整体上下文，这可能会损害说话人分割。
- en: 'Also this setup drastically minimized the repetition bug, we observed that
    it still occurred occasionally. In a desire to provide the best service possible,
    we definitely wanted to find an efficient counterback to this problem and we identified
    an opportunity with our previously annoying max_input_token: with 10-minute chunks,
    we could definitely be confident that token limits wouldn’t be exceeded in nearly
    all cases. Thus, if the token limit was hit, we knew for sure the repetition bug
    occurred and could restart that chunk transcription. This pragmatic method turned
    out to be indeed very effective at identifying and avoiding the bug. Great news.'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，这种设置极大地减少了重复错误，我们观察到它偶尔仍然会发生。为了提供尽可能好的服务，我们肯定希望找到一种有效的方法来解决这个问题，并且我们发现了之前令人烦恼的最大输入令牌：使用10分钟的片段，我们几乎可以肯定不会超过令牌限制。因此，如果达到令牌限制，我们就知道重复错误发生了，可以重新启动该片段的转录。这种方法实际上非常有效地识别和避免了错误。好消息。
- en: Correcting audio chunks transcription
  id: totrans-86
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 修正音频片段的转录
- en: 'With good transcripts of 10 minutes audio chunk in hand, we implemented at
    this stage an algorithmic post-processing of each transcript to address minor
    issues:'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 在手头有了10分钟音频片段的良好转录后，我们在这个阶段对每个转录进行了算法后处理，以解决一些小问题：
- en: 'Removal of header tags like tsv or json added at the start and the end of the
    transcription content:'
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 移除转录内容开始和结束时添加的标题标签，如tsv或json：
- en: Despite optimizing the prompt, we couldn’t fully eliminate this side effect
    without hurting the transcription quality. Since this is easily handled algorithmically,
    we chose to do so.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管优化了提示，但我们无法在不损害转录质量的情况下完全消除这种副作用。由于这很容易通过算法处理，我们选择这样做。
- en: 'Replacing speaker IDs with names:'
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用名字替换说话人ID：
- en: Speaker identification by name only begins once the LLM has enough context to
    determine who is the journalist and who is being interviewed. This results in
    incomplete diarization at the beginning of the transcript with early segments
    using numeric IDs (first speaker in chunk = 1, etc.). Moreover, since each chunk
    may have a different ID order (first person to talk being speaker 1), this would
    create confusion during merging. We instructed the LLM to only use IDs and provide
    a diarization mapping in the first line, during the transcription process. The
    speaker ids are therefore replaced during the algorithmic correction and the diarization
    headline removed.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 仅通过姓名识别说话人开始于LLM有足够的上下文来确定谁是记者，谁是被采访者。这导致转录开始时存在不完整的日历化，早期部分使用数字ID（片段中的第一个说话人=1等）。此外，由于每个片段可能具有不同的ID顺序（第一个说话者是说话人1），这会在合并过程中造成混淆。我们在转录过程中指示LLM仅使用ID，并在第一行提供日历化映射。因此，在算法纠正过程中替换了说话人ID，并移除了日历化标题。
- en: 'Rarely, malformed or empty transcript lines are encountered. These lines are
    deleted, but we flag them with a note to the user: “formatting issue on this line”
    so users are at least aware of a potential content loss and correct it eventually
    handwise. In our final optimized version, such lines were extremely rare.'
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 很少会遇到格式不正确或空的转录行。这些行被删除，但我们向用户标记了一个注释：“此行格式问题”，以便用户至少意识到潜在的内容丢失，并最终手动纠正。在我们的最终优化版本中，这样的行非常罕见。
- en: Merging chunks and maintaining content continuity
  id: totrans-93
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 合并片段并保持内容连续性
- en: At the previous stage of audio chunking, we initially tried to make chunks with
    clean cuts. Unsurprisingly, this led to words or even full sentences loss at cut
    points. So we naturally switched to overlapping chunk cuts to avoid such content
    loss, leaving the optimization of the size of the overlap to the chunk merging
    process.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 在音频片段划分的前一阶段，我们最初尝试制作干净的切割片段。不出所料，这导致了在切割点丢失单词甚至整个句子。因此，我们自然转向重叠片段切割以避免这种内容丢失，并将重叠大小的优化留给片段合并过程。
- en: Without a clean cut between chunks, the opportunity to merge the chunks algorithmically
    disappeared. For the same audio input, the transcript lines output can be quite
    different with breaks at different points of the sentences or even filler words
    or hesitations being displayed differently. In such a situation, it is complex,
    not to say impossible, to make an effective algorithm for a clean merge.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 由于片段之间没有干净的切割，算法合并片段的机会消失了。对于相同的音频输入，转录行输出可以相当不同，句子中的断点不同，甚至填充词或犹豫的表达方式也不同。在这种情况下，要制作一个有效的干净合并算法是复杂的，甚至可以说是不可能的。
- en: 'This left us with the use of the LLM option of course. Quickly, few tests confirmed
    the LLM could better merge together segments when overlaps included full sentences.
    A 30-second overlap proved sufficient. With a 10 min audio chunk structure, this
    would implies the following chunks cuts:'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 这就留下了我们使用LLM选项。很快，一些测试证实LLM在重叠包括完整句子时能更好地合并片段。30秒的重叠已经足够。以10分钟音频片段结构为例，这意味着以下片段切割：
- en: '1st transcript: 0 to 10 minutes'
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第1次转录：0到10分钟
- en: '2nd transcript: 9m30s to 19m30s'
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第2次转录：9分30秒到19分30秒
- en: '3rd transcript: 19m to 29m …and so on.'
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第3次转录：19分钟到29分钟 …以此类推。
- en: '![](../Images/452cbe35bf6e13991aa2ee17573c2812.png)'
  id: totrans-100
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/452cbe35bf6e13991aa2ee17573c2812.png)'
- en: Image by the authors
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: 'Those overlapped chunk transcripts were corrected by the previously described
    algorithm and sent to the LLM for merging to reconstruct the full audio transcript.
    The idea was to send the full set of chunk transcripts with a prompt instructing
    the LLM to merge and give the full merged audio transcript in tsv format as the
    previous LLM transcription step. In this configuration, the merging process has
    mainly three quality criterias:'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 那些重叠的片段转录被之前描述的算法纠正，并发送给LLM进行合并以重建完整的音频转录。想法是发送完整的片段转录集，并附上提示指导LLM合并，并以tsv格式提供完整的合并音频转录，作为之前LLM转录步骤。在这种配置下，合并过程主要包含三个质量标准：
- en: Ensure transcription continuity without content loss or duplication.
  id: totrans-103
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 确保转录连续性，不丢失或重复内容。
- en: Adjust timestamps to resume from where the previous chunk ended.
  id: totrans-104
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 调整时间戳以从上一个片段结束的地方继续。
- en: Preserve diarization.
  id: totrans-105
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 保留日历化。
- en: 'As expected, max_input_token was exceeded, forcing us into an LLM call loop.
    However, since we were now using text input, we were more confident in the reliability
    of the LLM… probably too much. The result of the merge was satisfactory in most
    cases but prone to several issues: tag insertions, multi-line entries merged into
    one line, incomplete lines, and even hallucinated continuations of the interview.
    Despite many prompt optimizations, we couldn’t achieve sufficiently reliable results
    for production use.'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 如预期的那样，max_input_token超出了限制，迫使我们进入LLM调用循环。然而，由于我们现在使用文本输入，我们对LLM的可靠性更有信心……可能太多。合并的结果在大多数情况下是令人满意的，但容易受到几个问题的困扰：标签插入、多行条目合并为单行、不完整的行，甚至是对访谈的幻觉性延续。尽管进行了许多提示优化，但我们无法实现足够可靠的结果以供生产使用。
- en: As with audio transcription, we identified the amount of input information as
    the main issue. We were sending several hundred, even thousands of text lines
    containing the prompt, the set of partial transcripts to fuse, a roughly similar
    amount with the previous transcript, and some more with the prompt and its example.
    Definitely too much for a precise application of our set of instructions.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 与音频转录一样，我们确定了输入信息量是主要问题。我们发送了包含提示、要融合的转录部分集、与前一个转录大致相同数量的文本行，以及一些带有提示及其示例的更多文本行。这肯定太多了，无法精确应用我们的指令集。
- en: 'On the plus side, timestamp accuracy did indeed improve significantly with
    this chunking approach: we maintained a drift of just 5 to 10 seconds max on transcriptions
    over an hour. As the start of a transcript should have minimal drift in timestamping,
    we instructed the LLM to use the timestamps of the “ending chunk” as reference
    for the fusion and correct any drift by a second per sentence. This made the cut
    points seamless and kept overall timestamp accuracy.'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 优点是，使用这种分块方法，时间戳的准确性确实显著提高：我们在一个小时内保持了最多5到10秒的漂移。由于转录的开始应该具有最小的时间戳漂移，我们指示LLM使用“结束片段”的时间戳作为融合的参考，并通过每句一秒来纠正任何漂移。这使得切割点无缝，并保持了整体时间戳的准确性。
- en: Splitting the chunk transcripts for full transcript reconstruction
  id: totrans-109
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 分割片段转录以进行完整转录重建
- en: 'In a modular approach similar to the workaround we used for transcription,
    we decided to carry out the merge of the transcript individually, in order to
    avoid the previously described issues. To do so, each 10 minute transcript is
    split into three parts based on the start_time of the segments:'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 在类似于我们用于转录的解决方案的模块化方法中，我们决定对转录进行单独合并，以避免之前描述的问题。为此，每个10分钟的转录根据片段的start_time分为三个部分：
- en: 'Overlap segment to merge at the beginning: 0 to 1 minute'
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要合并的重叠片段：0到1分钟
- en: 'Main segment to paste: 1 to 9 minutes'
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要粘贴的主要片段：1到9分钟
- en: 'Overlap segment to merge at the end: 9 to 10 minutes'
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要合并的重叠片段：9到10分钟
- en: '*NB: Since each chunk, including first and last ones, is processed the same
    way, the overlap at the beginning of the first chunk is directly merged with the
    main segment, and the overlap at the end of the last chunk (if there is one) is
    merged accordingly.*'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: '*注意：由于每个片段，包括第一个和最后一个，都以相同的方式进行处理，因此第一个片段的开始重叠直接与主要片段合并，最后一个片段的结束重叠（如果有）相应地合并。*'
- en: The beginning and end segments are then sent in pairs to be merged. As expected,
    the quality of the output drastically increased, resulting in an efficient and
    reliable merge between the transcripts chunk. With this procedure, the response
    of the LLM proved to be highly reliable and showed none of the previously mentioned
    errors encountered during the looping process.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 然后将开始和结束部分成对发送以进行合并。正如预期的那样，输出质量显著提高，从而在转录片段之间实现了高效且可靠的合并。使用此程序，LLM的响应证明非常可靠，并且在循环过程中没有遇到之前提到的任何错误。
- en: '*The process of transcript assembly for an audio of 28 minutes 42 seconds: *'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: '*转录28分42秒音频的过程：*'
- en: '![](../Images/563b438f1bf46663cc499ca33af86c9a.png)'
  id: totrans-117
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/563b438f1bf46663cc499ca33af86c9a.png)'
- en: Image by the authors
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: Full transcript reconstruction
  id: totrans-119
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 完整转录重建
- en: At this final stage, the only remaining task was to reconstruct the complete
    transcript from the processed splits. To achieve this, we algorithmically combined
    the main content segments with their corresponding merged overlaps alternately.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个最终阶段，唯一剩下的任务是从处理过的分割中重建完整的转录。为此，我们算法性地将主要内容片段与其相应的合并重叠交替组合。
- en: Overall process overview
  id: totrans-121
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 整体流程概述
- en: 'The overall process involves 6 steps from which 2 are carried out by Gemini:'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 整个过程涉及6个步骤，其中2个由Gemini执行：
- en: Chunking the audio into overlapped audio chunks
  id: totrans-123
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将音频分割成重叠的音频片段
- en: Transcribing each chunks into partial text transcripts (LLM step)
  id: totrans-124
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将每个片段转录成部分文本转录（LLM步骤）
- en: Correction of partial transcripts
  id: totrans-125
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 校正部分转录
- en: Splitting audio chunks transcripts into start, main, and end text splits
  id: totrans-126
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将音频片段转录分为开始、主要和结束文本分割
- en: Fusing end and start splits of each couple of chunk splits (LLM step)
  id: totrans-127
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将每对音频片段分割的开始和结束分割融合（LLM步骤）
- en: Reconstructing the full transcripts
  id: totrans-128
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 重建完整的转录
- en: '![](../Images/50b80e48ca4ba0faea506dce5baf957b.png)'
  id: totrans-129
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/50b80e48ca4ba0faea506dce5baf957b.png)'
- en: Image by the authors
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: The overall process takes about 5 min per hour of transcription deserved to
    the user in an asynchronous tool. Quite reasonable considering the quantity of
    work executed behind the scene, and this for a fraction of the price of other
    tools or pre-built Google models like Chirp2.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 整个过程大约需要每小时的转录时间花费5分钟，这是在异步工具中为用户应得的。考虑到幕后执行的工作量，这个价格相当合理，而且只需其他工具或预构建的Google模型（如Chirp2）的一小部分价格。
- en: One additional improvement that we considered but ultimately decided not to
    implement was the timestamp correction. We observed that timestamps at the end
    of each chunk typically ran about five seconds ahead of the actual audio. A straightforward
    solution could have been to incrementally adjust the timestamps algorithmically
    by approximately one second every two minutes to correct most of this drift. However,
    we chose not to implement this adjustment, as the minor discrepancy was acceptable
    for our business needs.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 我们考虑过的一项额外改进是时间戳校正，但最终决定不实施。我们观察到，每个片段末尾的时间戳通常比实际音频提前大约五秒钟。一个简单的解决方案可能是每两分钟算法性地递增调整时间戳大约一秒，以纠正大部分这种漂移。然而，我们选择不实施这种调整，因为这种小的差异对我们业务需求是可以接受的。
- en: Conclusion
  id: totrans-133
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: Building a high-quality, scalable transcription pipeline for long interviews
    turned out to be much more complex than simply choosing the “right” Speech-to-Text
    model. Our journey with Google’s Vertex AI and Gemini models highlighted key challenges
    around diarization, timestamping, cost-efficiency, and long audio handling, especially
    when aiming to export the full information of an audio.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 为长访谈构建高质量、可扩展的转录流水线比仅仅选择“正确”的语音到文本模型要复杂得多。我们与Google的Vertex AI和Gemini模型的合作历程突显了围绕说话人分割、时间戳、成本效益和长音频处理的挑战，尤其是在旨在导出音频全部信息的情况下。
- en: Using careful prompt engineering, smart audio chunking strategies, and iterative
    refinements, we were able to build a robust system that balances accuracy, performance,
    and operational cost, turning an initially fragmented process into a smooth, production-ready
    pipeline.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 通过仔细的提示工程、智能音频分割策略和迭代优化，我们能够构建一个平衡准确性、性能和运营成本的稳健系统，将最初碎片化的过程转变为流畅、生产就绪的流水线。
- en: There’s still room for improvement but this workflow now forms a solid foundation
    for scalable, high-fidelity audio transcription. As LLMs continue to evolve and
    APIs become more flexible, we’re optimistic about even more streamlined solutions
    in the near future.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管仍有改进空间，但这个工作流程现在已成为可扩展、高保真音频转录的坚实基础。随着LLM的持续发展和API的更加灵活，我们对未来能够实现更加简化的解决方案持乐观态度。
- en: Key takeaways
  id: totrans-137
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关键要点
- en: '**No Vertex AI S2T model met all our needs:** Google Vertex AI provides specialized
    models, but each one has limitations in terms of transcription accuracy, diarization,
    or timestamping for long audios.'
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**没有Vertex AI S2T模型能满足我们的所有需求**：Google Vertex AI提供了专用模型，但每个模型在转录准确性、说话人分割或长音频的时间戳方面都有局限性。'
- en: '**Token limits and long prompts influence transcription quality drastically:**
    Gemini output token limitation significantly degrades transcription quality for
    long audios, requiring heavily prompted looping strategies and finally forcing
    us to shift to shorter audio chunks.'
  id: totrans-139
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**令牌限制和长提示会极大地影响转录质量**：Gemini的输出令牌限制显著降低了长音频的转录质量，需要大量提示的循环策略，最终迫使我们转向更短的音频片段。'
- en: '**Chunked audio transcription and transcript reconstruction significantly improves
    quality and cost-efficiency:** Splitting audio into 10 minute overlapping segments
    minimized critical bugs like repeated sentences and timestamp drift, enabling
    higher quality results and drastically reduced costs.'
  id: totrans-140
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**分块音频转录和转录重建显著提高了质量和成本效益：** 将音频分割成10分钟重叠的段落，最小化了诸如重复句子和时间戳漂移等关键错误，从而实现了更高质量的结果和大幅降低的成本。'
- en: '**Careful prompt engineering remains essential:** Precision in prompts, especially
    regarding diarization and interjections for transcription, as well as transcript
    fusions, proved to be crucial for reliable LLM performance.'
  id: totrans-141
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**仔细的提示工程仍然至关重要：** 提示的精确性，尤其是关于转录的日历化和插话，以及转录融合，被证明对于可靠的LLM性能至关重要。'
- en: '**Short transcript fusion merging maximize reliability:** Splitting each chunk
    transcript into smaller segments with end to start merging of overlaps provided
    high accuracy and avoided common LLM issues like hallucinations or incorrect formatting.'
  id: totrans-142
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**短转录融合合并最大化可靠性：** 将每个转录块分割成更小的段落，并从末尾开始合并重叠部分，这提供了高精度并避免了常见的LLM问题，如幻觉或格式错误。'
