- en: How to Use Simple Data Contracts in Python for Data Scientists
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/how-to-use-simple-data-contracts-in-python-for-data-scientists/](https://towardsdatascience.com/how-to-use-simple-data-contracts-in-python-for-data-scientists/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1764654507571" class="mdspan-comment">The Issue</mdspan>
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Let’s be honest: we have all been there.'
  prefs: []
  type: TYPE_NORMAL
- en: It’s Friday afternoon. You’ve trained a model, validated it, and deployed the
    inference pipeline. The metrics look green. You close your laptop for the weekend,
    and enjoy the break.
  prefs: []
  type: TYPE_NORMAL
- en: Monday morning, you are greeted with the message **“Pipeline failed”** when
    checking into work. What’s going on? Everything was perfect when you deployed
    the inference pipeline.
  prefs: []
  type: TYPE_NORMAL
- en: 'The truth is that the issue could be a number of things. Maybe the upstream
    engineering team changed the `user_id` column from an integer to a string. Or
    maybe the `price` column suddenly contains negative numbers. Or my personal favorite:
    the column name changed from `created_at` to `createdAt` (camelCase strikes again!).'
  prefs: []
  type: TYPE_NORMAL
- en: The industry calls this **Schema Drift**. I call it a headache.
  prefs: []
  type: TYPE_NORMAL
- en: Lately, people are talking a lot about **Data Contracts**. Usually, this involves
    selling you an expensive SaaS platform or a complex microservices architecture.
    But if you are just a Data Scientist or Engineer trying to keep your Python pipelines
    from exploding, you don’t necessarily need enterprise bloat.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 'The Tool: Pandera'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let’s go through how to create a simple data contract in Python using the library
    **Pandera**. It’s an open-source Python library that allows you to define schemas
    as class objects. It feels very similar to Pydantic (if you’ve used FastAPI),
    but it is built specifically for DataFrames.
  prefs: []
  type: TYPE_NORMAL
- en: 'To get started, you can simply install `pandera` using pip:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 'A Real-Life Example: The Marketing Leads Feed'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let’s look at a classic scenario. You are ingesting a CSV file of marketing
    leads from a third-party vendor.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here is what we **expect** the data to look like:'
  prefs: []
  type: TYPE_NORMAL
- en: '**id**: An integer (must be unique).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**email**: A string (must actually look like an email).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**signup_date**: A valid datetime object.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**lead_score**: A float between 0.0 and 1.0.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Here is the messy reality of our raw data that we recieve:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: If you fed this dataframe into a model expecting a score between 0 and 1, your
    predictions would be garbage. If you tried to join on `id` and there were duplicates,
    your row counts would explode. Messy data leads to messy data science!
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 1: Define The Contract'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Instead of writing a dozen `if` statements to check data quality, we define
    a **SchemaModel**. This is our contract.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: Look over the code above to get the general feel for how Pandera sets up a contract.
    You can worry about the details later when you look through the Pandera documentation.
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 2: Enforce The Contract'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now, we need to apply the contract we made to our data. The naive way to do
    this is to run `LeadsContract.validate(df)`. This works, but it crashes on the
    *first* error it finds. In production, you usually want to know *everything* that
    is wrong with the file, not just the first row.
  prefs: []
  type: TYPE_NORMAL
- en: We can enable “lazy” validation to catch all errors at once.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: The Output
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'If you run the code above, you won’t get a generic `KeyError`. You will get
    a specific report detailing exactly why the contract was breached:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: In a more realistic scenario, you would probably log the output to a file and
    set up alerts so that you get notified with something is broken.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Why This Matters
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This approach shifts the dynamic of your work.
  prefs: []
  type: TYPE_NORMAL
- en: Without a contract, your code fails deep inside the transformation logic (or
    worse, it doesn’t fail, and you write bad data to the warehouse). You spend hours
    debugging `NaN` values.
  prefs: []
  type: TYPE_NORMAL
- en: '**With a contract:**'
  prefs: []
  type: TYPE_NORMAL
- en: '**Fail Fast:** The pipeline stops at the door. Bad data never enters your core
    logic.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Clear Blame:** You can send that Failure Report back to the data provider
    and say, “Rows 3 and 4 violated the schema. Please fix.”'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Documentation:** The `LeadsContract` class serves as living documentation.
    New joiners to the project don’t need to guess what the columns represent; they
    can just read the code. You also avoid setting up a separate data contract in
    SharePoint, Confluence, or wherever that quickly get outdated.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: The “Good Enough” Solution
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: You can definitely go deeper. You can integrate this with **Airflow**, push
    metrics to a dashboard, or use tools like **great_expectations** for more complex
    statistical profiling.
  prefs: []
  type: TYPE_NORMAL
- en: But for 90% of the use cases I see, a simple validation step at the start of
    your Python script is enough to sleep soundly on a Friday night.
  prefs: []
  type: TYPE_NORMAL
- en: Start small. Define a schema for your messiest dataset, wrap it in a try/catch
    block, and see how many headaches it saves you this week. When this simple approach
    is not suitable anymore, THEN I would consider more elaborate tools for data contacts.
  prefs: []
  type: TYPE_NORMAL
- en: If you are interested in AI, data science, or data engineering, please follow
