- en: 原文：[https://towardsdatascience.com/on-premise-computing-data-career-switches-ai-file-readers-and-other-march-must-reads/](https://towardsdatascience.com/on-premise-computing-data-career-switches-ai-file-readers-and-other-march-must-reads/)
