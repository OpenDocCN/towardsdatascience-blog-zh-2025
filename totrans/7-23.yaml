- en: Build your own Annotation Tool for Image Classification in 5 Minutes
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 5 分钟内构建自己的图像分类标注工具
- en: 原文：[https://towardsdatascience.com/build-your-own-annotation-tool-for-image-classification-in-5-minutes-c0549b644d15/](https://towardsdatascience.com/build-your-own-annotation-tool-for-image-classification-in-5-minutes-c0549b644d15/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/build-your-own-annotation-tool-for-image-classification-in-5-minutes-c0549b644d15/](https://towardsdatascience.com/build-your-own-annotation-tool-for-image-classification-in-5-minutes-c0549b644d15/)
- en: '![Image generated with AI](../Images/ef320a1333a2703c4d26839b1256d271.png)'
  id: totrans-2
  prefs: []
  type: TYPE_IMG
  zh: '![AI 生成的图像](../Images/ef320a1333a2703c4d26839b1256d271.png)'
- en: Image generated with AI
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: AI 生成的图像
- en: Any time machine learning is applied to solve a problem, in some way the goal
    is to fit a ***model*** to some ***data***. For your model to perform well and
    generalize to unseen data, you need to make sure that you use a high quality dataset
    for training. Especially in a supervised learning setting, you need to make sure
    that your data is accurately labeled.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 任何将机器学习应用于解决问题的时刻，目标都是以某种方式将一个 ***模型*** 调整到一些 ***数据*** 上。为了你的模型表现良好并泛化到未见过的数据，你需要确保你使用高质量的训练数据集。特别是在监督学习设置中，你需要确保你的数据被准确标记。
- en: Data is the most important part of machine learning.
  id: totrans-5
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 数据是机器学习最重要的部分。
- en: No matter how large you make your model, how many billion parameters you throw
    at it or how much augmentation you put the data set through, poor input will ***not
    magically turn into high quality output***.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你如何扩大你的模型，向它投入多少亿个参数，或者对数据集进行多少增强，糟糕的输入 ***不会神奇地变成高质量输出***。
- en: Depending on the task you’re trying to solve, there is not always an adequate
    public dataset available. In these cases, you might need to build your own dataset.
    However, in the beginning your data is most likely not labeled. Let me show you,
    how we can build a simple, quick annotation tool to classify your image data from
    an unlabeled dataset.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 根据你试图解决的问题，并不总是有足够的公共数据集可用。在这些情况下，你可能需要构建自己的数据集。然而，一开始你的数据很可能没有标记。让我向你展示，我们如何构建一个简单、快速的标注工具来从未标记的数据集中对图像数据进行分类。
- en: Demo
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 演示
- en: Image Dataset
  id: totrans-9
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 图像数据集
- en: '![Sample from the dataset](../Images/eaa64e931cd109e7f256fde57243cad2.png)'
  id: totrans-10
  prefs: []
  type: TYPE_IMG
  zh: '![数据集样本](../Images/eaa64e931cd109e7f256fde57243cad2.png)'
- en: Sample from the dataset
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 数据集样本
- en: 'To demonstrate the annotation tool, I will be using an image dataset from my
    phone recordings, where the goal is to classify three different USB connector
    types: USB-A, USB-C, Micro USB and Mini USB. In the beginning, all images will
    be unlabeled in an input directory. Our annotation tool should then present us
    with the images one at a time and upon specifying the class move it to the appropriate
    directory.'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 为了演示标注工具，我将使用我手机录制的图像数据集，目标是分类三种不同的 USB 连接器类型：USB-A、USB-C、Micro USB 和 Mini USB。一开始，所有图片将在输入目录中未标记。然后我们的标注工具应该一次向我们展示一张图片，并在指定类别后将其移动到相应的目录。
- en: '![Annotation Tool in action](../Images/5f7abdffcb8052350ab6dd5198a6f5ed.png)'
  id: totrans-13
  prefs: []
  type: TYPE_IMG
  zh: '![标注工具操作](../Images/5f7abdffcb8052350ab6dd5198a6f5ed.png)'
- en: Annotation Tool in action
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 标注工具操作
- en: Guide
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 指南
- en: Prerequisites
  id: totrans-16
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 前提条件
- en: If you want to follow along, you should install **opencv-python**. For some
    sample images, you can find some in the [example folder](https://github.com/trflorian/annotation-tool/tree/main/examples)
    in the project repository.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想跟上来，你应该安装 **opencv-python**。对于一些示例图片，你可以在项目仓库中的 [example 文件夹](https://github.com/trflorian/annotation-tool/tree/main/examples)
    找到一些。
- en: Data Loading
  id: totrans-18
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数据加载
- en: First, let’s start by loading our images from the input folder. We can use the
    **glob** function from **pathlib** to look for all files with a **jpg** image
    extension. Passing the result to the sorted function, we make sure that the images
    are processed in order.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们从输入文件夹中加载我们的图片。我们可以使用来自 **pathlib** 的 **glob** 函数来查找所有具有 **jpg** 图片扩展名的文件。将结果传递给排序函数，我们确保图片按顺序处理。
- en: '[PRE0]'
  id: totrans-20
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Let’s also prepare the output directory by making sure it exists.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们也准备输出目录，确保它存在。
- en: '[PRE1]'
  id: totrans-22
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: We can loop through our image list and load the images into arrays with **cv2.imread**.
    Let’s show the image and wait for a key press. By setting the delay in the **cv2.waitKey**
    function to 0, we wait indefinitely until a key is pressed. We then make sure
    that we can quit the application by pressing **Q** and at the end we close all
    **opencv** windows.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以通过循环我们的图像列表，并使用 **cv2.imread** 将图片加载到数组中。让我们显示图片并等待按键。通过将 **cv2.waitKey**
    函数的延迟设置为 0，我们无限期地等待直到按键按下。然后我们确保可以通过按下 **Q** 来退出应用程序，最后我们关闭所有 **opencv** 窗口。
- en: '[PRE2]'
  id: totrans-24
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '**NOTE:** Using the bitwise and (&) with **0xFF** we only look at the last
    bits of the key that’s pressed. This makes sure that even if e.g. NumLock is activated,
    the numbers will still be identical to the **ord** function for the numbers.'
  id: totrans-25
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**注意：** 使用位与运算符（&）与 **0xFF** 结合，我们只查看按键的最后几位。这确保了即使例如NumLock被激活，数字仍然与 **ord**
    函数对数字的处理结果相同。'
- en: '![](../Images/0f4b33a138095a63fc4918812061b0f1.png)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/0f4b33a138095a63fc4918812061b0f1.png)'
- en: Labeling
  id: totrans-27
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 标注
- en: 'Let’s define the labels for our task in a **list** of **strings**. In my case,
    I have four labels for the different connectors:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们定义我们的任务标签，在一个 **字符串** 的 **列表** 中。在我的情况下，我有四个标签用于不同的连接器：
- en: '[PRE3]'
  id: totrans-29
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Now we want the number keys 0, 1, 2 and 3 to classify our image into the respective
    label folder. The key variable from the waitKey function is an integer representing
    the unicode code of the character pressed. To check if the key is one of the numbers,
    we need to convert the number to a **unicode** with the ***ord*** function, similar
    to how we check for the key ***q*** to close the window. The function expects
    a string of length 1, so we need to convert the index to a string before passing
    it to the function.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们希望数字键0、1、2和3将我们的图像分类到相应的标签文件夹。waitKey函数中的key变量是一个整数，表示按下的字符的unicode码。为了检查按键是否是数字之一，我们需要使用
    ***ord*** 函数将数字转换为 **unicode**，类似于我们检查 ***q*** 键来关闭窗口的方式。该函数期望一个长度为1的字符串，因此我们需要在传递给函数之前将索引转换为字符串。
- en: '[PRE4]'
  id: totrans-31
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: To move the image to the classified label folder in the output path, we can
    use the **/** operation from **pathlib** to concatenate paths and then the **rename**
    function to move a file to a target destination.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 要将图像移动到输出路径中的分类标签文件夹，我们可以使用 **pathlib** 中的 **/** 操作来连接路径，然后使用 **rename** 函数将文件移动到目标位置。
- en: '[PRE5]'
  id: totrans-33
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Before we can do that though, we need to make sure that the target folder exists.
    So before the loop, we go through all our labels and create a respective folder.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们能够做到这一点之前，我们需要确保目标文件夹存在。因此，在循环之前，我们遍历所有标签并创建相应的文件夹。
- en: '[PRE6]'
  id: totrans-35
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: An alternative and more *pythontic* way for the label key checking, would be
    to create a mapping of key unicodes to labels before the loop. In this way, we
    don’t need to loop over all keys every step of the loop.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 对于标签键检查，一个替代的更 *pythontic* 的方法是在循环之前创建一个按键unicode码到标签的映射。这样，我们就不需要在循环的每一步都遍历所有键。
- en: '[PRE7]'
  id: totrans-37
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: Let’s also add a small help text for the key to label mapping.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们也为键到标签的映射添加一个小帮助文本。
- en: '[PRE8]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: '![](../Images/0038716b745e2e93a745b00996369a82.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/0038716b745e2e93a745b00996369a82.png)'
- en: Conclusion
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this tutorial, you learned how to create a simple annotation tool for an
    image classification task. There are a lot of things we could improve on this
    tool. One thing I want to explore further, is adding a possibility to not only
    classify the images, but also segment images and create segmentation masks.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个教程中，你学习了如何为图像分类任务创建一个简单的注释工具。我们可以在这个工具上改进很多。我想进一步探索的是，不仅能够对图像进行分类，还能对图像进行分割并创建分割掩码。
- en: Of course there are a ton of way more sophisticated tools out there that streamline
    your annotation process. However, sometimes a very simple tool is all you need,
    especially when doing exploratory data analysis in the early stages of a project
    and you need a quick proof of concept.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，还有许多更复杂、更高级的工具可以简化你的标注过程。然而，有时一个非常简单的工具就足够了，尤其是在项目早期进行探索性数据分析时，你需要一个快速的概念验证。
- en: The full code for this post is available on my **GitHub**, you can find it below.
    Happy coding!
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 本帖的完整代码可在我的 **GitHub** 上找到，如下所示。祝您编码愉快！
