- en: Using NumPy to Analyze My Daily Habits (Sleep, Screen Time & Mood)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用NumPy分析我的日常习惯（睡眠、屏幕时间与情绪）
- en: 原文：[https://towardsdatascience.com/using-numpy-to-analyze-my-daily-habits-sleep-screen-time-mood/](https://towardsdatascience.com/using-numpy-to-analyze-my-daily-habits-sleep-screen-time-mood/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://towardsdatascience.com/using-numpy-to-analyze-my-daily-habits-sleep-screen-time-mood/](https://towardsdatascience.com/using-numpy-to-analyze-my-daily-habits-sleep-screen-time-mood/)'
- en: <mdspan datatext="el1761675348118" class="mdspan-comment">I’ve been running</mdspan>
    a small NumPy project series where I try to actually *build something* with NumPy
    instead of just going through random functions and documentation. I’ve always
    felt that the best way to learn is by doing, so in this project, I wanted to create
    something both practical and personal.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1761675348118" class="mdspan-comment">我已经运行了一个小的NumPy项目系列，其中我试图真正*构建一些东西*，而不是仅仅通过随机函数和文档。我一直觉得最好的学习方式是通过实践，所以在这个项目中，我想创建一些既实用又个性化的东西。
- en: 'The idea was simple: analyze my daily habits — sleep, study hours, screen time,
    exercise, and mood — and see how they affect my productivity and general well-being.
    The data isn’t real; it’s fictional, simulated over 30 days. But the goal isn’t
    the accuracy of the data — it’s learning how to use NumPy meaningfully.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 简单的想法：分析我的日常习惯——睡眠、学习时间、屏幕时间、锻炼和情绪——看看它们如何影响我的生产力和整体福祉。数据不是真实的；它是虚构的，模拟了30天。但目标不是数据的准确性——而是学习如何有意义地使用NumPy。
- en: So let’s walk through the process step by step.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 所以让我们一步一步地走一遍这个过程。
- en: Step 1 — Loading and Understanding the Data
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第1步——加载数据和理解数据
- en: I started by creating a simple NumPy array that contained 30 rows (one for each
    day) and six columns — each column representing a different habit metric. Then
    I saved it as a `.npy` file so I could easily load it later.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 我首先创建了一个简单的NumPy数组，包含30行（每天一行）和六列——每一列代表一个不同的习惯指标。然后我将其保存为`.npy`文件，这样我就可以轻松地稍后加载它。
- en: '[PRE0]'
  id: totrans-7
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Once loaded, I wanted to confirm that everything looked as expected. So I checked
    the **shape** (to know how many rows and columns there were) and the **number
    of dimensions** (to confirm it’s a 2D table, not a 1D list).
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 加载后，我想确认一切看起来都符合预期。所以我检查了**形状**（以了解有多少行和列）和**维度数**（以确认它是一个2D表格，而不是1D列表）。
- en: '[PRE1]'
  id: totrans-9
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '**OUTPUT: 30 rows, 6 columns, and ndim=2**'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: '**输出：30行，6列，维度=2**'
- en: I also printed out the first few rows just to visually confirm that each value
    looked fine — for instance, that sleep hours weren’t negative or that the mood
    values were within a reasonable range.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 我还打印出了一些前几行，只是为了从视觉上确认每个值看起来都很好——例如，睡眠时间不是负数，或者情绪值在合理的范围内。
- en: '[PRE2]'
  id: totrans-12
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '**Output:**'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: '**输出：**'
- en: '[PRE3]'
  id: totrans-14
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Step 2 — Validating the Data
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第2步——验证数据
- en: Before doing any analysis, I wanted to make sure the data made sense. It’s something
    we often skip when working with fictional data, but it’s still good practice.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 在进行任何分析之前，我想确保数据是有意义的。当我们处理虚构数据时，我们经常跳过这一点，但这仍然是一个好的实践。
- en: 'So I checked:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 所以我检查了：
- en: No negative sleep hours
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 没有负睡眠时间
- en: No mood scores less than 1 or greater than 10
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 没有低于1或高于10的情绪分数
- en: For sleep, that meant selecting the sleep column (index 1 in my array) and checking
    if any values were below zero.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 对于睡眠，这意味着选择睡眠列（我的数组中的索引1）并检查是否有任何值低于零。
- en: '[PRE4]'
  id: totrans-21
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: '**Output:**'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '**输出：**'
- en: '[PRE5]'
  id: totrans-23
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: This means no negatives. Then I did the same for mood. I counted to find that
    the mood column was at index 5, and checked if any were below 1 or above 10.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着没有负数。然后我对情绪也做了同样的处理。我数了一下，发现情绪列在索引5，检查是否有任何值低于1或高于10。
- en: '[PRE6]'
  id: totrans-25
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: '**We got the same output.**'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: '**我们得到了相同的输出。**'
- en: Everything looked good, so we could move on.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 一切看起来都很好，所以我们可以继续。
- en: Step 3 — Splitting the Data into Weeks
  id: totrans-28
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第3步——将数据拆分为周
- en: I had 30 days of data, and I wanted to analyze it week by week. The first instinct
    was to use NumPy’s `split()` function, but that failed because 30 isn’t evenly
    divisible by 4\. So instead, I used `np.array_split()`, which allows uneven splits.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 我有30天的数据，我想按周分析它。第一个直觉是使用NumPy的`split()`函数，但失败了，因为30不能被4整除。所以，我使用了`np.array_split()`，它允许不均匀的拆分。
- en: 'That gave me:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 这给了我：
- en: Week 1 → 8 days
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第一周 → 8天
- en: Week 2 → 8 days
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第二周 → 8天
- en: Week 3 → 7 days
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第三周 → 7天
- en: Week 4 → 7 days
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第四周 → 7天
- en: '[PRE7]'
  id: totrans-35
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: '**Output:**'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: '**输出：**'
- en: '[PRE8]'
  id: totrans-37
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Now the data was in four chunks, and I could easily analyze each one separately.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 现在数据被分成了四块，我可以轻松地分别分析每一块。
- en: Step 4 — Calculating Weekly Metrics
  id: totrans-39
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第4步——计算每周指标
- en: 'I wanted to get a sense of how each habit changed from week to week. So I focused
    on four main things:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 我想了解每个习惯每周是如何变化的。所以我关注了四个主要方面：
- en: Average sleep
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 平均睡眠
- en: Average study hours
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 平均学习时间
- en: Average screen time
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 平均屏幕时间
- en: Average mood score
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 平均情绪评分
- en: I stored each week’s array in a separate variable, then used `np.mean()` to
    calculate the averages for each metric.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 我将每周的数组存储在单独的变量中，然后使用`np.mean()`计算每个指标的平均值。
- en: Average sleep hours
  id: totrans-46
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 平均睡眠时间
- en: '[PRE9]'
  id: totrans-47
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Average study hours
  id: totrans-48
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 平均学习时间
- en: '[PRE10]'
  id: totrans-49
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Average screen time
  id: totrans-50
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 平均屏幕时间
- en: '[PRE11]'
  id: totrans-51
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: Average mood score
  id: totrans-52
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 平均情绪评分
- en: '[PRE12]'
  id: totrans-53
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: Then, to make everything easier to read, I formatted the results nicely.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，为了使结果更容易阅读，我很好地格式化了结果。
- en: '[PRE13]'
  id: totrans-55
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: '**Output:**'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: '**输出：**'
- en: '[PRE14]'
  id: totrans-57
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: Step 5 — Making Sense of the Results
  id: totrans-58
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第5步—理解结果
- en: Once I printed out the numbers, some patterns started to show up.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦打印出这些数字，一些模式开始显现。
- en: My **sleep hours** were pretty steady for the first two weeks (around 6.9 hours),
    but in week three, they jumped to around 7.1 hours. That means I was “sleeping
    better” as the month went on. By week four, it stayed roughly around 7.0 hours.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 我的**睡眠时间**在前两周相当稳定（大约6.9小时），但在第三周，它们增加到了大约7.1小时。这意味着随着时间的推移，我的睡眠质量有所提高。到了第四周，它大致保持在7.0小时左右。
- en: For **study hours**, it was the opposite. Week one and two had an average of
    around 5 hours per day, but by week four, it had dropped to about 4 hours. Basically,
    I started off strong but slowly lost momentum — which, honestly, sounds about
    right.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 对于**学习时间**，情况正好相反。第一周和第二周的平均每天大约是5小时，但到了第四周，它下降到了大约4小时。基本上，我一开始势头很猛，但后来慢慢失去了动力——这说实话听起来很合理。
- en: Then came **screen time**. This one hurt a bit. In week one, it was roughly
    4.3 hours per day, and it just kept creeping up every week. The classic cycle
    of being productive early on, then slowly drifting into more “scrolling breaks”
    later in the month.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来是**屏幕时间**。这一点有点令人痛苦。在第一周，它大约是每天4.3小时，而且每周都在稳步上升。这是典型的早期生产力高，然后在月底慢慢转向更多“滚动休息”的周期。
- en: Finally, there was **mood**. My mood score started at around 6.5 in week one,
    went slightly up to 6.6 in week two, and then kind of hovered there for the rest
    of the period. It didn’t move dramatically, but it was interesting to see a small
    spike in week two — right before my study hours dropped and my screen time increased.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，还有**情绪**。我的情绪评分在一周开始时大约为6.5，在第二周略有上升至6.6，然后在整个期间徘徊。它没有大幅变动，但看到第二周的小幅上升——就在我的学习时间下降和屏幕时间增加之前，这很有趣。
- en: To make things interactive, I thought it’d be great to visualise using matplotlib.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使事物更具互动性，我认为使用matplotlib进行可视化会很好。
- en: '![Weekly Habit Trends Over 30 Days](../Images/9559707f64ec9a4389dedb4e467cf136.png)'
  id: totrans-65
  prefs: []
  type: TYPE_IMG
  zh: '![30天内每周习惯趋势图](../Images/9559707f64ec9a4389dedb4e467cf136.png)'
- en: Step 6 — Looking for Patterns
  id: totrans-66
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第6步—寻找模式
- en: Now that I had the numbers, I wanted to know *why* my mood went up in week two.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我有了这些数字，我想知道*为什么*我的情绪在第二周上升。
- en: So I compared the weeks side by side. Week two had decent sleep, high study
    hours, and relatively low screen time compared to the later weeks.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我并排比较了这些周。第二周有充足的睡眠，高学习时间，与后几周相比，屏幕时间相对较低。
- en: That might explain why my mood score peaked there. By week three, even though
    I slept more, my study hours had started to dip — maybe I was resting more but
    getting less done, which didn’t boost my mood as much as I expected.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 这可能解释了为什么我的情绪评分在那里达到峰值。到了第三周，尽管我睡得更多，但我的学习时间已经开始下降——也许我休息得更多，但完成的工作更少，这并没有像预期的那样大幅提升我的情绪。
- en: 'This is what I liked about the project: it’s not about the data being real,
    but about how you can *use NumPy* to explore patterns, relationships, and small
    insights. Even fictional data can tell a story when you look at it the right way.'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 我喜欢这个项目的这一点：这并不是关于数据是否真实，而是关于你如何*使用NumPy*来探索模式、关系和小的洞察。即使是虚构的数据，当你以正确的方式看待它时，也能讲述一个故事。
- en: Step 7 — Wrapping Up and Next Steps
  id: totrans-71
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第7步—总结和下一步
- en: In this little project, I learned a few key things — both about NumPy and about
    structuring analysis like this.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个小小的项目中，我学到了一些关键的东西——关于NumPy以及如何构建这种分析结构。
- en: We started with a raw array of fictional daily habits, learned how to check
    its structure and validity, split it into meaningful chunks (weeks), and then
    used simple NumPy operations to analyze each segment.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 我们从一个虚构的日常习惯的原始数组开始，学习了如何检查其结构和有效性，将其分割成有意义的块（周），然后使用简单的NumPy操作来分析每个部分。
- en: It’s the kind of small project that reminds you that data analysis doesn’t always
    have to be complex. Sometimes it’s just about asking simple questions like *“How
    is my screen time changing over time?”* or *“When do I feel the best?”*
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一种小型的项目，会让你意识到数据分析并不总是复杂的。有时，它只是关于提出简单的问题，比如*“我的屏幕时间是如何随时间变化的？”*或者*“我在什么时候感觉最好？”*
- en: 'If I wanted to take this further (which I probably will), there are so many
    directions to go:'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我想进一步深入（我可能会的），有这么多方向可以走：
- en: Find the **best and worst days** overall
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 找到整体上**最好和最坏的日子**
- en: Compare **weekdays vs weekends**
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 比较工作日和周末
- en: Or even create a simple “wellbeing score” based on multiple habits combined
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 或者甚至创建一个基于多种习惯结合的简单“幸福感评分”
- en: But that’ll probably be for the next part of the series.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 但这可能是系列下一部分的内容。
- en: For now, I’m happy that I got to apply NumPy to something that feels real and
    relatable — not just abstract arrays and numbers, but habits and emotions. That’s
    the kind of learning that sticks.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 目前为止，我很高兴能够将NumPy应用到感觉真实和贴近实际的事物上——不仅仅是抽象的数组和数字，还有习惯和情感。这就是那种能够留下深刻印象的学习。
- en: '**Thanks for reading.**'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: '**感谢阅读。**'
- en: If you’re following along with the series, try recreating this on your own fictional
    data. Even if your numbers are random, the process will teach you how to slice,
    split, and analyze arrays like a pro.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你正在跟随这个系列，尝试用自己的虚构数据重现这个过程。即使你的数字是随机的，这个过程也会教你如何像专业人士一样切割、拆分和分析数组。
