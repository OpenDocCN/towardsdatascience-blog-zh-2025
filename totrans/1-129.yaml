  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: '**代码可用：** [[link](https://github.com/Javihaus/Hamiltonian-Neural-Network-Optimization)]'
- en: '**The full paper:** Will be available soon. Contact me if you are interested
    in receiving it ([[email protected]](/cdn-cgi/l/email-protection))'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: '**完整论文：** 将很快可用。如果您有兴趣获取它，请联系我 ([[email protected]](/cdn-cgi/l/email-protection))'
- en: '**Questions or collaboration:** If you’re working on ranking problems with
    temporal stability requirements, I’d be interested to hear about your use case.'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: '**问题或合作：** 如果您正在处理具有时间稳定性要求的排名问题，我很想了解您的用例。'
