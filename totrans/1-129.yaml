- en: What to Do When Your Credit Risk Model Works Today, but Breaks Six Months Later
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/your-credit-risk-model-works-today-it-breaks-in-six-months/](https://towardsdatascience.com/your-credit-risk-model-works-today-it-breaks-in-six-months/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1762226535799" class="mdspan-comment">Credit risk modeling</mdspan>
    has a tricky secret. Organizations deploy models that achieve 98% accuracy in
    validation, then watch them quietly degrade in production. The team calls it “concept
    drift” and moves on. But what if this isn’t a mysterious phenomenon — what if
    it’s a predictable consequence of how we optimize?
  prefs: []
  type: TYPE_NORMAL
- en: 'I started asking this question after watching another production model fail.
    The answer led somewhere unexpected: the geometry we use for optimization determines
    whether models stay stable as distributions shift. Not the data. Not the hyperparameters.
    The space itself.'
  prefs: []
  type: TYPE_NORMAL
- en: 'I realized that credit risk is fundamentally a **ranking problem**, not a classification
    problem. You don’t need to predict “default” or “no default” with 98% accuracy.
    You need to order borrowers by risk: Is Borrower A riskier than Borrower B? If
    the economy deteriorates, who defaults first?'
  prefs: []
  type: TYPE_NORMAL
- en: 'Standard approaches miss this completely. Here’s what gradient-boosted trees
    ([XGBoost](https://xgboost.readthedocs.io/en/stable/), the field’s favorite tool)
    actually achieve on the [Freddie Mac Single-Family Loan-Level Dataset](https://www.freddiemac.com/research/datasets/sf-loanlevel-dataset) (692,640
    loans spanning 1999–2023):'
  prefs: []
  type: TYPE_NORMAL
- en: '**Accuracy:** 98.7% ← looks impressive'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**AUC (ranking ability):** 60.7% ← barely better than random'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**12 months later:** 96.6% accuracy, but ranking degrades'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**36 months later:** 93.2% accuracy, AUC is 66.7% (essentially useless)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'XGBoost achieves an **impressive accuracy** but fails at the actual task: ordering
    risk. And it **degrades predictably**.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Now compare this to what I’ve developed (presented in a paper accepted in IEEE
    DSA2025):'
  prefs: []
  type: TYPE_NORMAL
- en: '**Initial AUC:** 80.3%'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**12 months later:** 76.4%'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**36 months later:** 69.7%'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**60 months later:** 69.7%'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**The difference:** XGBoost loses 32 AUC points over 60 months. Our approach?
    Just 10.6 points in AUC — ([Area Under de Curve](https://developers.google.com/machine-learning/crash-course/classification/roc-and-auc))
    is what will tell us how our trained algorithm will predict risk on unseen data.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Why does this happen? It comes down to something unexpected: the geometry of
    optimization itself.'
  prefs: []
  type: TYPE_NORMAL
- en: Why This Matters (Even If You’re Not in Finance)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'This isn’t just about credit scores. Any system where ranking matters more
    than exact predictions faces this problem:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Medical risk stratification** — Who needs urgent care first?'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Customer churn prediction** — Which customers should we focus retention efforts
    on?'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Content recommendation** — What should we show next?'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Fraud detection** — Which transactions merit human review?'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Supply chain prioritization** — Which disruptions to address first?'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When your context changes gradually — and whose doesn’t? — accuracy metrics
    lie to you. A model can maintain 95% accuracy while completely scrambling the
    order of who’s actually at highest risk.
  prefs: []
  type: TYPE_NORMAL
- en: That’s not a model degradation problem. That’s an optimization problem.
  prefs: []
  type: TYPE_NORMAL
- en: What Physics Teaches Us About Stability
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Think about GPS navigation. If you only optimize for “shortest current route,”
    you might guide someone onto a road that’s about to close. But if you preserve
    the structure of how traffic flows — the relationships between routes — you can
    maintain good guidance even as conditions change. That’s what we need for credit
    models. But how do you preserve structure?
  prefs: []
  type: TYPE_NORMAL
- en: 'NASA has faced this exact problem for years. When simulating planetary orbits
    over millions of years, standard computational methods make planets slowly drift
    — not because of physics, but because of accumulated numerical errors. Mercury
    gradually spirals into the Sun. Jupiter drifts outward. They solved this with **symplectic
    integrators**: algorithms that preserve the geometric structure of the system.
    The orbits stay stable because the method respects what physicists call “phase
    space volume” — it maintains the relationships between positions and velocities.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Now here’s the surprising part: credit risk has a similar structure.'
  prefs: []
  type: TYPE_NORMAL
- en: The Geometry of Rankings
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Standard gradient descent optimizes in Euclidean space. It finds local minima
    for your training distribution. But Euclidean geometry doesn’t preserve **relative
    orderings** when distributions shift.
  prefs: []
  type: TYPE_NORMAL
- en: What does?
  prefs: []
  type: TYPE_NORMAL
- en: Symplectic manifolds.
  prefs: []
  type: TYPE_NORMAL
- en: In [Hamiltonian mechanics](https://en.wikipedia.org/wiki/Hamiltonian_mechanics) (a
    formalism used in physics), conservative systems (no energy loss) evolve on symplectic
    manifolds — spaces with a 2-form structure that preserves phase space volume ([Liouville’s
    theorem](https://en.wikipedia.org/wiki/Liouville%27s_theorem_(Hamiltonian))).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/878b631cff670adf53cf70ca19811705.png)'
  prefs: []
  type: TYPE_IMG
- en: Standard Symplectic 2-Form
  prefs: []
  type: TYPE_NORMAL
- en: In this phase space, symplectic transformations preserve relative distances.
    Not absolute positions, but orderings. Exactly what we need for ranking under
    distribution shift. When you simulate a frictionless pendulum using standard integration
    methods, energy drifts. The pendulum in Figure 1 slowly speeds up or slows down
    — not because of physics, but because of numerical approximation. Symplectic integrators
    don’t have this problem because they preserve the Hamiltonian structure exactly.
    The same principle can be applied to neural network optimization.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c6f5d5e24b3701c66a32df75b2c5276f.png)'
  prefs: []
  type: TYPE_IMG
- en: '**Figure 1.** Frictionless pendulum is the most basic example of Hamiltonian
    mechanics. Pendulum hasn’t friction with air as it would dissipate energy. Hamiltonian
    formalism in physics is applicable to conservative or non-dissipative systems
    with energy conservation. The image in the left show the trajectory of the pendulum
    in the phase space, represented by the velocity and the angle (central image).
    Image by author.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Protein folding simulations face the same problem. You’re modeling thousands
    of atoms interacting over microseconds to milliseconds — billions of integration
    steps. Standard integrators accumulate energy: molecules heat up artificially,
    bonds break that shouldn’t, the simulation explodes.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/4fe434adec6ab3535e6c40151d4d9fb5.png)'
  prefs: []
  type: TYPE_IMG
- en: '**Figure 2**: Equivalence between “Hamiltonian in physical systems”, and its
    application in NN optimization spaces. Position q is equivalent to the NN parameters
    θ, and momentum vector pis equivalent to the difference between consecutive parameters
    states. Despite we can call it “physics inspiration”, this is applied differential
    geometry symplectic forms, Liouville’s theorem, structure-preserving integration.
    But I think Hamiltonian analogy has more sense for divulgation purposes. Image
    by author.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The Implementation: Structure-Preserving Optimization'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Here’s what I actually did:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Hamiltonian Framework for Neural Networks**'
  prefs: []
  type: TYPE_NORMAL
- en: 'I reformulated neural network training as a Hamiltonian system:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/4b337fe02ff40d24607f9de3836a3be8.png)'
  prefs: []
  type: TYPE_IMG
- en: Hamiltonian Equation For Mechanical Systems
  prefs: []
  type: TYPE_NORMAL
- en: In Mechanical systems, T(p) is the kinetic energy term, and V(q) is the ’potential
    energy. In this analogy T(p) represents the cost of changing the model parameters,
    and V(q) represents the loss function of the current model state.
  prefs: []
  type: TYPE_NORMAL
- en: '**Symplectic Euler optimizer (not Adam/SGD):**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Instead of Adam or SGD for optimizing, I use a symplectic integration:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c47fd8a982a27151ecd59a2d23ba44a9.png)'
  prefs: []
  type: TYPE_IMG
- en: I have used the symplectic Euler method for a Hamiltonian system with position q and
    momentum p
  prefs: []
  type: TYPE_NORMAL
- en: 'Where:'
  prefs: []
  type: TYPE_NORMAL
- en: H is the Hamiltonian (energy function derived from the loss)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Δt is the time step (analogous to learning rate)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: q are the network weights (position coordinates), and
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: p are momentum variables (velocity coordinates)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Notice that p_{t+1} appears in both updates. This coupling is important — it’s
    what preserves the symplectic structure. This isn’t just momentum; it’s structure-preserving
    integration.
  prefs: []
  type: TYPE_NORMAL
- en: '**Hamiltonian-constrained loss**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Moreover, I have created a loss based on the Hamiltonian formalism:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/57a3fc1f255570fac4a7623e98677015.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Where:'
  prefs: []
  type: TYPE_NORMAL
- en: L_base(θ) is binary cross-entropy loss
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: R(θ) is regularization term (L2 penalty on weights), and
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: λ is regularization coefficient
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The regularization term penalizes deviations from energy conservation, constraining
    optimization to low-dimensional manifolds in parameter space.
  prefs: []
  type: TYPE_NORMAL
- en: How It Works
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The mechanism has three components:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Symplectic structure** → volume preservation → bounded parameter exploration'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Hamiltonian constraint** → energy conservation → stable long-term dynamics'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Coupled updates** → preserves geometric structure relevant for ranking'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: This structure is represented in the following algorithm
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/966d47e51d9f3927b6214b6c882ae51d.png)'
  prefs: []
  type: TYPE_IMG
- en: '**Figure 3**: Algorithm used applied both the momentum update and the Hamiltonian
    optimization.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The Results: 3x Better Temporal Stability'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As explained, I tested this framework using [Freddie Mac Single-Family Loan-Level
    Dataset](https://www.freddiemac.com/research/datasets/sf-loanlevel-dataset) —
    the only long-term credit dataset with proper temporal splits spanning economic
    cycles.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/76d4d0f5c92373b643770bbf6b5133bd.png)'
  prefs: []
  type: TYPE_IMG
- en: The logic tell us that accuracy has to decrease across the three datasets (from
    12 to 60 months). Long horizon predictions use to be less accurate than short
    term. But what we see is that XGBoost does not follow this pattern (AUC values
    from 0.61 to 0.67 — this is the signature of optimization in the wrong space)-
    Our symplectic optimizer, despite showing less accuracy, does it (AUC values decrease
    from 0.84 to 0.70). For example, what does guarantee you that a prediction for
    36 is going to more realistic? The 0.97 accuracy of XGBoost or the 0,77 AUC value
    from the Hamiltonian inspired approach? XGBoost has for 36 months an AUC of 0.63
    (very close to a random prediction).
  prefs: []
  type: TYPE_NORMAL
- en: '**What Each Component Contributes**'
  prefs: []
  type: TYPE_NORMAL
- en: In our ablation study, all components contribute, with momentum in symplectic
    space providing larger gains. This aligns with the theoretical backgroun— the
    symplectic 2-form is preserved through coupled position-momentum updates.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/12db4ad05859807b77b434342ce393f2.png)'
  prefs: []
  type: TYPE_IMG
- en: Table. Ablation Study. Standard NN with Adam optimizer vs. our approach (Full
    Hamiltonian Model)
  prefs: []
  type: TYPE_NORMAL
- en: When to Use This Approach
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Use symplectic optimization as alyternative to gradient descent optimizers
    when:'
  prefs: []
  type: TYPE_NORMAL
- en: Ranking matters more than classification accuracy
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Distribution shift is gradual and predictable (economic cycles, not black swans)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Temporal stability is critical (financial risk, medical prognosis over time)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Retraining is expensive (regulatory validation, approval overhead)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can afford 2–3x training time for production stability
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You have <10K features (works well up to ~10K dimensions)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Don’t Use When:'
  prefs: []
  type: TYPE_NORMAL
- en: Distribution shift is abrupt/unpredictable (market crashes, regime changes)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You need interpretability for compliance (this doesn’t help with explainability)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You’re in ultra-high dimensions (>10K features, cost becomes prohibitive)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Real-time training constraints (2–3x slower than Adam)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What This Actually Means for Production Systems
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'For organizations deploying credit models or similar challenges:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Problem:** You retrain quarterly. Each time, you validate on holdout data,
    see 97%+ accuracy, deploy, and watch AUC degrade over 12–18 months. You blame
    “market conditions” and retrain again.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Solution:** Use symplectic optimization. Accept slightly lower peak accuracy
    (80% vs 98%) in exchange for 3x times better temporal stability. Your model stays
    reliable longer. You retrain less often. Regulatory explanations are simpler: *“Our
    model maintains ranking stability under distribution shift.”*'
  prefs: []
  type: TYPE_NORMAL
- en: '**Cost:** 2–3x longer training time. For monthly or quarterly retraining, this
    is acceptable — you’re trading hours of compute for months of stability.'
  prefs: []
  type: TYPE_NORMAL
- en: This is engineering, not magic. We’re optimizing in a space that preserves what
    actually matters for the business problem.
  prefs: []
  type: TYPE_NORMAL
- en: The Bigger Picture
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Model degradation isn’t inevitable. It’s a consequence of optimizing in the
    wrong space. Standard gradient descent finds solutions that work for your current
    distribution. Symplectic optimization finds solutions that preserve structure
    — the relationships between examples that determine rankings. Our proposed approach
    won’t solve every problem in ML. But for the practitioner watching their production
    model decay — for the organization facing regulatory questions about model stability
    — it’s a solution that works today.
  prefs: []
  type: TYPE_NORMAL
