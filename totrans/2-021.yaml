- en: Everything You Need to Know About the New Power BI Storage Mode
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/50-shades-of-direct-lake-everything-you-need-to-know-about-the-new-power-bi-storage-mode/](https://towardsdatascience.com/50-shades-of-direct-lake-everything-you-need-to-know-about-the-new-power-bi-storage-mode/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**<mdspan datatext="el1755745271097" class="mdspan-comment">DISCLAIMER:</mdspan>**
    The purpose of this article ***IS NOT*** to provide the answer to the question:
    “Which one is ‘better’ — Import or Direct Lake?” because it’s impossible to answer,
    as there is no one solution to “rule-them-all”… While Import (still) should be
    a default choice in most cases, there are certain scenarios in which you might
    choose to take the Direct Lake path. The main goal of the article is to provide
    details about how Direct Lake mode works behind the scenes and shed more light
    on various Direct Lake concepts.'
  prefs: []
  type: TYPE_NORMAL
- en: 'If you want to learn more about how Import (and DirectQuery) compares to Direct
    Lake, and when to choose one over the other, I strongly encourage you to watch
    the following video: [https://www.youtube.com/watch?v=V4rgxmBQpk0](https://www.youtube.com/watch?v=V4rgxmBQpk0)'
  prefs: []
  type: TYPE_NORMAL
- en: Now, we can start…
  prefs: []
  type: TYPE_NORMAL
- en: I don’t know about you, but when I watch movies and see some breathtaking scenes,
    I’m always wondering — how did they do THIS?! What kind of tricks did they pull
    out of their sleeves to make it work like that?
  prefs: []
  type: TYPE_NORMAL
- en: And, I have this feeling when watching Direct Lake in action! For those of you
    who may not have heard about the new storage mode for Power BI semantic models,
    or are wondering what Direct Lake and Allen Iverson have in common, I encourage
    you to start by reading my [previous article](https://data-mozart.com/what-do-allen-iverson-and-direct-lake-have-in-common/).
  prefs: []
  type: TYPE_NORMAL
- en: The purpose of this one is to demystify what happens behind the scenes, how
    this “thing” actually works, and give you a hint about some nuances to keep in
    mind when working with Direct Lake semantic models.
  prefs: []
  type: TYPE_NORMAL
- en: '***Direct Lake storage mode overcomes shortcomings of both Import and DirectQuery
    modes — providing a performance similar to Import mode, without data duplication
    and data latency — because the data is being retrieved directly from delta tables
    during the query execution.***'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Sounds like a dream, right? So, let’s try to examine different concepts that
    enable this dream to come true…
  prefs: []
  type: TYPE_NORMAL
- en: Framing (aka Direct Lake “refresh”)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The most common question I’m hearing these days from clients is — how can we
    refresh the Direct Lake semantic model? It’s a fair question. Since they have
    been relying on Import mode for years, and Direct Lake promises an “import mode-like
    performance”… So, there has to be a similar process in place to keep your data
    up to date, right?
  prefs: []
  type: TYPE_NORMAL
- en: Well, ja-in… (What the heck is this now, I hear you wondering😀). Germans have
    a perfect word (one of many, to be honest) to define something that can be both
    “Yes” and “No” (**ja**=YES, ne**in**=NO). Chris Webb already wrote a [great blog
    post](https://blog.crossjoin.co.uk/2023/10/08/what-does-it-mean-to-refresh-a-direct-lake-power-bi-dataset-in-fabric/)
    on the topic, so I won’t repeat things written there (go and read Chris’s blog,
    this is one of the best resources for learning Power BI). My idea is to illustrate
    the process happening in the background and emphasize some nuances that might
    be impacted by your decisions.
  prefs: []
  type: TYPE_NORMAL
- en: But, first things first…
  prefs: []
  type: TYPE_NORMAL
- en: Syncing the data
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Once you create a Lakehouse in Microsoft Fabric, you’ll automatically get two
    additional objects provisioned — SQL Analytics Endpoint for querying the data
    in the lakehouse (yes, you can write T-SQL to **READ** the data from the lakehouse),
    and a default semantic model, which contains ***all the tables*** from the lakehouse.
    Now, what happens when a new table arrives in the lakehouse? Well, it depends:)
  prefs: []
  type: TYPE_NORMAL
- en: 'If you open the Settings window for the SQL Analytics Endpoint, and go to the
    Default Power BI semantic model property, you’ll see the following option:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/77ed3835e5b90470d11942748d886a1a.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: This setting allows you to define what happens when a new table arrives at a
    lakehouse. By default, this table **WILL NOT** be automatically included in the
    default semantic model. And, that’s the first point relevant for “refreshing”
    the data in Direct Lake mode.
  prefs: []
  type: TYPE_NORMAL
- en: 'At this moment, I have 4 delta tables in my lakehouse: DimCustomer, DimDate,
    DimProduct, and FactOnlineSales. Since I disabled auto-sync between the lakehouse
    and the semantic model, there are currently no tables in the default semantic
    model!'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ec020fa0e62e14d17bad90ed2ffbb51c.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 'This means I first need to add the data to my default semantic model. Once
    I open the SQL Analytics Endpoint and choose to create a new report, I’ll be prompted
    to add the data to the default semantic model:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/03d6a86e5d2f78a1639194c4a8139df8.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 'Ok, let’s examine what happens if a new table arrives in the lakehouse? I’ve
    added a new table in lakehouse: DimCurrency.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e9d7a184c6896c86161639ee4802c597.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 'But, when I choose to create a report on top of the default semantic model,
    there is no DimCurrency table available:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/167c4df2bbe1b96f26b7114c2e51c4c7.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 'I’ve now enabled the auto-sync option and after a few minutes, the DimCurrency
    table appeared in the default semantic model objects view:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/39de405df0a9569a0cf59f9d8b3662e2.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: So, this sync option allows you to decide if the new table from the lakehouse
    will be automatically added to a semantic model or not.
  prefs: []
  type: TYPE_NORMAL
- en: Syncing = Adding new tables to a semantic model
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: But, what happens with the data itself? Meaning, if the data in the delta table
    changes, do we need to refresh a semantic model, like we had to do when using
    Import mode to have the latest data available in our Power BI reports?
  prefs: []
  type: TYPE_NORMAL
- en: It’s the right time to introduce the concept of framing. Before that, let’s
    quickly examine how our data is stored under the hood. I’ve already written about
    the [Parquet file format](https://data-mozart.com/parquet-file-format-everything-you-need-to-know/)
    in detail, so here it’s just important to keep in mind that our delta table DimCustomer
    consists of one or more parquet files (in this case two parquet files), whereas
    delta_log enables versioning — tracking of all the changes that happened to DimCustomer
    table.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/108df3441af238d489a799c0201c7054.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 'I’ve created a super basic report to examine how framing works. The report
    shows the name and email address of the customer Aaron Adams:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/57a7462c9ae5a692f7dbc75a8c1448fa.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 'I’ll now go and change the email address in the data source, from aaron48 to
    aaron048:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/16d61924703af26513fd75cc6d92f45e.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s reload the data into Fabric lakehouse and check what happened to the
    DimCustomer table in the background:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/8eb75d300c7d410f0b7f9421c926f040.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: A new parquet file appeared, while at the same time in delta_log, a new version
    has been created.
  prefs: []
  type: TYPE_NORMAL
- en: Once I go back to my report and hit the Refresh button…
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b910835ef3203c3331ed57ba685aac70.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 'This happened because my default setting for semantic model refresh was configured
    to enable change detection in the delta table and automatically update the semantic
    model:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/48fff75ee2be0ca35d286b0ac0201d8d.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, what would happen if I disable this option? Let’s check… I’ll set the
    email address back to aaron48 and reload the data in the lakehouse. First, there
    is a new version of the file in delta_log, the same as in the previous case:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/0b3e82f248a3b6b6355f7f95fdc3e6df.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 'And, if I query the lakehouse via the SQL Analytics Endpoint, you’ll see the
    latest data included (aaron48):'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f63ba47c6f935ecd26c5654327403e8e.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: But, if I go to the report and hit Refresh… I still see aaron048!
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/8588a1434f85569e67ee300b0c353b64.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 'Since I disabled the automatic propagation of the latest data from the lakehouse
    (OneLake) to the semantic model, I have only two options available to keep my
    semantic model (and, consequentially, my report) intact:'
  prefs: []
  type: TYPE_NORMAL
- en: Enable the “Keep your Direct Lake data up to date” option again
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Manually refresh the semantic model. When I say manually, it can be really manually,
    by clicking on the Refresh now button, or by executing refresh programmatically
    (i.e. using Fabric notebooks, or REST APIs) as part of the orchestration pipeline
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Why would you want to keep this option disabled (like I did in the latest example)?
    Well, your semantic model usually consists of multiple tables, representing the
    serving layer for the end user. And, you don’t necessarily want to have data in
    the report updated in sequence (table by table), but probably after the entire
    semantic model is refreshed and synced with the source data.
  prefs: []
  type: TYPE_NORMAL
- en: This process of keeping the semantic model in sync with the latest version of
    the delta table is called ***framing***.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/2e5a06254afdb893ffabb82e4c4d63ae.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: In the illustration above, you see files currently “framed” in the context of
    the semantic model. Once the new file enters the lakehouse (OneLake), here is
    what should happen in order to have the latest file included in the semantic model.
  prefs: []
  type: TYPE_NORMAL
- en: The semantic model must be “reframed” to include the latest data. This process
    has multiple implications that you should be aware of. First, and most important,
    whenever framing occurs, all the data currently stored in the memory (we are talking
    about cache memory) is dumped out of the cache. This is of paramount importance
    for the next concept that we are going to discuss — transcoding.
  prefs: []
  type: TYPE_NORMAL
- en: Next, there is no “real” data refresh happening with framing…
  prefs: []
  type: TYPE_NORMAL
- en: '***Unlike with Import mode, where kicking off the refresh process will literally
    put the snapshot of the physical data in the semantic model, framing refreshes
    metadata only! So, data stays in the delta table in OneLake (no data is loaded
    in the Direct Lake semantic model), we are only telling our semantic model: hey,
    there is a new file down there, go and take it from here once you need the data
    for the report… This is one of the key differences between the Direct Lake and
    Import mode***'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Since the Direct Lake “refresh” is just a metadata refresh, it’s usually a low-intensive
    operation that shouldn’t consume too much time and resources. Even if you have
    a billion-row table, don’t forget — you are not refreshing a billion rows in your
    semantic model — you refresh only ***the information*** about that gigantic table…
  prefs: []
  type: TYPE_NORMAL
- en: Transcoding — Your on-demand cache magic
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Fine, now that you know how to sync data from a lakehouse with your semantic
    model (syncing), and how to include the latest “data about data” in the semantic
    model (framing), it’s time to understand what really happens behind the scenes
    once you put your semantic model into action!
  prefs: []
  type: TYPE_NORMAL
- en: This is the selling point of Direct Lake, right? Performance of the Import mode,
    but without copying the data. So, let’s examine the concept of Transcoding…
  prefs: []
  type: TYPE_NORMAL
- en: '***In plain English: transcoding represents a process of loading parts of the
    delta table (when I say parts, I mean certain columns) or the entire delta table
    into cache memory!***'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Let me stop here and put the sentence above in the context of Import mode:'
  prefs: []
  type: TYPE_NORMAL
- en: Loading data into memory (cache) is something that ensures a blazing-fast performance
    of the Import mode
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In Import mode, in case you haven’t enabled a Large Format Semantic Model feature,
    the entire semantic model is stored in memory (it must fit memory limits), whereas
    in Direct Lake mode, ***only columns needed by the queries*** are stored in memory!
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'To put it simply: bullet point one means that once Direct Lake columns are
    loaded into memory, this is absolutely the same as Import mode (the only potential
    difference may be the way data is sorted by VertiPaq vs how it’s sorted in the
    delta table)! Bullet point two means that the cache memory footprint of the Direct
    Lake semantic model could be significantly lower, or in the worst case, the same,
    as that of the Import mode (I promise to show you soon). Obviously, this lower
    memory footprint comes with a price, and that is the waiting time for the first
    load of the visual containing data that needs to be “transcoded” on-demand from
    OneLake to the semantic model.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Before we dive into examples, you might be wondering: how does this thing work?
    How can it be that data stored in the delta table can be read by the Power BI
    engine the same way as it was stored in Import mode?'
  prefs: []
  type: TYPE_NORMAL
- en: 'The answer is: there is a process called ***transcoding***, which happens on
    the fly when a Power BI query requests the data. This is not too expensive a process,
    since the data in Parquet files is stored very similarly to the way [VertiPaq](https://data-mozart.com/vertipaq-brain-muscles-behind-power-bi/) (a
    columnar database behind Power BI and AAS) stores the data. On top of it, if your
    data is written to delta tables using the v-ordering algorithm (Microsoft’s proprietary
    algorithm for reshuffling and sorting the data to achieve better read performance),
    transcoding makes the data from delta tables look exactly the same as if it were
    stored in the proprietary format of AAS.'
  prefs: []
  type: TYPE_NORMAL
- en: Let me now show you how paging works in reality. For this example, I’ll be using
    a healthcare dataset provided by Greg Beaumont (MIT license. Go and visit [Greg’s
    GitHub](https://github.com/isinghrana/fabric-samples-healthcare/blob/main/analytics-bi-directlake-starschema/Readme.md),
    it’s full of amazing resources). The fact table contains ca. 220 million rows,
    and my semantic model is a well-designed [star schema](https://data-mozart.com/data-modeling-for-mere-mortals-part-2-dimensional-modeling-fundamentals/).
  prefs: []
  type: TYPE_NORMAL
- en: Import vs Direct Lake
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The idea is the following: I have two identical semantic models (same data,
    same tables, same relationships, etc.) — one is in Import mode, while the other
    is in Direct Lake.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/6c169f3399c658b8ab4085e458253767.png)'
  prefs: []
  type: TYPE_IMG
- en: Import mode on the left, Direct Lake mode on the right
  prefs: []
  type: TYPE_NORMAL
- en: I’ll now open a Power BI Desktop and connect to each of these semantic models
    to create an identical report on top of them. I need the Performance Analyzer
    tool in the Power BI Desktop, to capture the queries and analyze them later in
    [DAX Studio](https://data-mozart.com/mastering-dp-500-dp-600-exam-troubleshoot-dax-performance-with-dax-studio/).
  prefs: []
  type: TYPE_NORMAL
- en: 'I’ve created a very basic report page, with only one table visual, which shows
    the total number of records per year. In both reports, I’m starting from a blank
    page, as I want to make sure that nothing is retrieved from the cache, so let’s
    compare the first run of each visual:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/2dde8e137d455fa57939095912dcb125.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 'As you may notice, the Import mode performs slightly better during the first
    run, probably because of the transcoding cost overhead for “paging” the data for
    the first time in Direct Lake mode. I’ll now create a year slicer in both reports,
    switch between different years, and compare performance again:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/9939f7a42ba3db6350d1a6c435dbcafc.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: There is basically no difference in performance (numbers were additionally tested
    using the Benchmark feature in DAX Studio)! This means, once the column from the
    Direct Lake semantic model is paged into memory, it behaves exactly the same as
    in the Import mode.
  prefs: []
  type: TYPE_NORMAL
- en: 'However, what happens if we include the additional column in the scope? Let’s
    test the performance of both reports once I put the Total Drug Cost measure in
    the table visual:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ecdbf08b0eaad9d55cca3b27d5c2a91c.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: And, this is a scenario where Import easily outperforms Direct Lake! Don’t forget,
    in Import mode, the entire semantic model was loaded into memory, whereas in Direct
    Lake, only columns needed by the query were loaded in memory. In this example,
    since Total Drug Cost wasn’t part of the original query, it wasn’t loaded into
    memory. Once the user included it in the report, Power BI had to spend some time
    to transcode this data on the fly from OneLake to VertiPaq and page it in the
    memory.
  prefs: []
  type: TYPE_NORMAL
- en: Memory footprint
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Ok, we also mentioned that the memory footprint of the Import vs Direct Lake
    semantic models may vary significantly. Let me quickly show you what I’m talking
    about. I’ll first check the Import mode semantic model details, using VertiPaq
    Analyzer in DAX Studio:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c91b8b79c13b834ca91e35d84efcf393.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: As you may see, the size of the semantic model is almost 4.3 GB! And, looking
    at the most expensive columns…
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/615ca272da9914f0703ba6be48163490.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: “Tot_Drug_Cost” and “65 or Older Total” columns take almost 2 GB of the entire
    model! So, in theory, even if no one ever uses these columns in the report, they
    will still take their fair share of RAM (unless you enable a Large Semantic Model
    option).
  prefs: []
  type: TYPE_NORMAL
- en: 'I’ll now analyze the DIrect Lake semantic model using the same approach:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/490948a474fb8cbbf91977a3c8b384a0.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: Oh, wow, it’s 4x less memory footprint! Let’s quickly check the most expensive
    columns in the model…
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/9c0d4ecd31c4720f9d63750d788d8631.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: Let’s briefly stop here and examine the results displayed in the illustration
    above. The “Tot_Drug_Cst” column takes practically the entire memory of this semantic
    model — since we used it in our table visual, it was paged into memory. But, look
    at all the other columns, including the “65 or Older Total” that previously consumed
    650 MBs in Import mode! It’s now 2.4 KBs! It’s just a metadata! As long as we
    don’t use this column in the report, it will not consume any RAM.
  prefs: []
  type: TYPE_NORMAL
- en: 'This implies, if we are talking about memory limits in Direct Lake, we are
    referring to a ***max memory limit per query***! Only if the query exceeds the
    memory limit of your Fabric capacity SKU, it will fall back to Direct Query (of
    course, assuming that your configuration follows the default fallback behavior
    setup):'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/9580b4886ee647125d0a56e092d34388.png)'
  prefs: []
  type: TYPE_IMG
- en: '[Table from official MS Learn documentation](https://learn.microsoft.com/en-us/fabric/fundamentals/direct-lake-overview#fabric-capacity-requirements)'
  prefs: []
  type: TYPE_NORMAL
- en: This is a key difference between the Import and DIrect Lake modes. Going back
    to our previous example, my Direct Lake report would work just fine with the lowest
    F SKU (F2).
  prefs: []
  type: TYPE_NORMAL
- en: “You’re hot then you’re cold… You’re in then you’re out…”
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'There is a famous song by Katy Perry “Hot N Cold”, where the refrain says:
    “You’re hot then you’re cold… You’re in then you’re out…” This perfectly summarizes
    how columns are being treated in Direct Lake mode! The last concept that I want
    to introduce to you is the column “temperature”.'
  prefs: []
  type: TYPE_NORMAL
- en: This concept is of paramount importance when working with Direct Lake mode,
    because based on the column temperature, the engine decides which column(s) stay
    in memory and which are kicked out back to OneLake.
  prefs: []
  type: TYPE_NORMAL
- en: '***The more the column is queried, the higher its temperature is!*** ***The
    higher the temperature of the column, the bigger chances are that it stays in
    memory.***'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Marc Lelijveld already wrote a [great article](https://data-marc.com/2023/09/28/understanding-data-temperature-with-direct-lake-in-fabric/)
    on the topic, so I won’t repeat all the details that Marc perfectly explained.
    Here, I just want to show you how to check the temperature of specific columns
    of your Direct Lake semantic model, and share some tips and tricks on how to keep
    the “fire” burning:)
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'The above query against the DMV Discover_Storage_Table_Columns can give you
    a quick hint of how the concept of “Hot N Cold” works in Direct Lake:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ae7cd7595aff7ce225669129cb80375b.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 'As you may notice, the engine keeps relationship columns’ dictionaries “warm”,
    because of the filter propagation. There are also columns that we used in our
    table visual: Year, Tot Drug Cst and Tot Clms. If I don’t do anything with my
    report, the temperature will slowly decrease over time. But, let’s perform some
    actions within the report and check the temperature again:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ce7e255c08db445b84ff7f0d6780b159.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 'I’ve added the Total Claims measure (based on the Tot Clms column) and changed
    the year on the slicer. Let’s take a look at the temperature now:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/16c7d78ec4be135022c6a9138d6cc17b.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: Oh, wow, these three columns have a temperature 10x higher than the columns
    not used in the report. This way, the engine ensures that the most frequently
    used columns will stay in cache memory, so that the report performance will be
    the best possible for the end user.
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, the fair question would be: what happens once all my end users go home
    at 5 PM, and no one touches Direct Lake semantic models until the next morning?'
  prefs: []
  type: TYPE_NORMAL
- en: Well, the first user will have to “sacrifice” for all the others and wait a
    little bit longer for the first run, and then everyone can benefit from having
    “warm” columns ready in the cache. But, what if the first user is your manager
    or a CEO?! No bueno:)
  prefs: []
  type: TYPE_NORMAL
- en: I have good news — there is a trick to pre-warm the cache, by loading the most
    frequently used columns in advance, as soon as your data is refreshed in OneLake.
    My friend Sandeep Pawar wrote a [step-by-step tutorial](https://fabric.guru/pre-warming-the-direct-lake-dataset-for-warm-cache-import-like-performance)
    on how to do it ([Semantic Link](https://data-mozart.com/augmenting-gold-layer-with-semantic-link-and-sparksql-in-microsoft-fabric/)
    to the rescue), and you should definitely consider implementing this technique
    if you want to avoid a bad experience for the first user.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Direct Lake is really a groundbreaking feature introduced with Microsoft Fabric.
    However, since this is a brand-new solution, it relies on a whole new world of
    concepts. In this article, we covered some of them that I consider the most important.
  prefs: []
  type: TYPE_NORMAL
- en: 'To wrap up, since I’m a visual person, I prepared an illustration of all the
    concepts we covered:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/214ca8847e7d5cb8530f8ec5fe2c09dd.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: Thanks for reading!
  prefs: []
  type: TYPE_NORMAL
