- en: The What, How, and Why of Agentic AI
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/the-what-how-and-why-of-agentic-ai/](https://towardsdatascience.com/the-what-how-and-why-of-agentic-ai/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Never miss a new edition of *The Variable*, our weekly newsletter featuring
    a top-notch selection of editors’ picks, deep dives, community news, and more.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[Subscribe today](https://newsletter.towardsdatascience.com/subscription-to-the-newsletter)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 'We’ve seen the same cycle play out in recent years: a new type of AI-powered
    technology arrives with great fanfare, generates a slew of buzzwords, and then
    leaves many practitioners scratching their heads, unsure of they can even do anything
    useful with it.'
  prefs: []
  type: TYPE_NORMAL
- en: '[Agentic AI](https://towardsdatascience.com/tag/agentic-ai/) has been following
    a similar path in the past year. To help you separate hype from reality, we’ve
    collected three standout articles that tackle the nitty-gritty details of working
    with these AI systems.'
  prefs: []
  type: TYPE_NORMAL
- en: From multi-agent workflows to the intersection of agents and knowledge graphs,
    you’ll leave this edition of the Variable with a deeper, hands-on understanding
    of this trending topic. (If you have your own nuanced take on it, do [share it
    with us!](https://towardsdatascience.com/questions-96667b06af5/))
  prefs: []
  type: TYPE_NORMAL
- en: 'Agentic AI: Single vs Multi-Agent Systems'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: How does the number of agents and the complexity of their tasks affect the construction
    and performance of agentic-AI systems? [Ida Silfverskiold](https://towardsdatascience.com/author/httpsmedium-comilsilfverskiold/) presents
    a focused walkthrough that unpacks the process of building a tech-news delivery
    app.
  prefs: []
  type: TYPE_NORMAL
- en: '[Agentic AI: Single vs Multi-Agent Systems](https://towardsdatascience.com/agentic-ai-single-vs-multi-agent-systems/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Agentic GraphRAG for Commercial Contracts
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '[Tomaz Bratanic](https://towardsdatascience.com/author/bratanic-tomaz/) leverages
    his deep expertise in knowledge graphs in a new deep dive that brings together
    agents, RAG, and the challenges of working with legal contracts.'
  prefs: []
  type: TYPE_NORMAL
- en: '[Agentic GraphRAG for Commercial Contracts](https://towardsdatascience.com/agentic-graphrag-for-commercial-contracts/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: AI Agents from Zero to Hero — Part 3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Many of you have been following [Mauro Di Pietro](https://towardsdatascience.com/author/maurodp/)‘s
    popular series on agentic AI; don’t miss the latest installment, which shows how
    to build different types of multi-agent systems.
  prefs: []
  type: TYPE_NORMAL
- en: '[AI Agents from Scratch: Multi-Agent System](https://towardsdatascience.com/ai-agents-from-zero-to-hero-part-3/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Other Recommended Reads
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: If you feel like exploring a wider set of topics this week, we invite you to
    read these excellent articles on the challenges of career transitions, graph neural
    networks, generative modeling, and more.
  prefs: []
  type: TYPE_NORMAL
- en: In a candid and insightful account, [Amy Ma](https://towardsdatascience.com/author/amyma101/) charts
    the highs and lows of [switching from a data scientist role](https://towardsdatascience.com/my-learning-to-be-hired-again-after-a-year-part-2/) to
    that of machine learning engineer.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[My Learning to Be Hired Again After a Year… Part 2](https://towardsdatascience.com/my-learning-to-be-hired-again-after-a-year-part-2/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Interested in GNNs? Don’t miss [Hennie de Harder](https://towardsdatascience.com/author/hennie-de-harder/)‘s latest
    addition to her accessible series, focusing this time on [the power of GraphSAGE](https://towardsdatascience.com/graph-neural-networks-part-3-how-graphsage-handles-changing-graph-structure/).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Graph Neural Networks Part 3: How GraphSAGE Handles Changing Graph Structure](https://towardsdatascience.com/graph-neural-networks-part-3-how-graphsage-handles-changing-graph-structure/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Moving to the theory-oriented end of the spectrum, we’re thrilled to share a [lucid
    exploration of Hamiltonian mechanics](https://towardsdatascience.com/from-physics-to-probability-hamiltonian-mechanics-for-generative-modeling-and-mcmc/) for
    generative modeling and MCMC, courtesy of [Soran Ghaderi](https://towardsdatascience.com/author/soran-ghaderi/).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[From Physics to Probability: Hamiltonian Mechanics for Generative Modeling
    and MCMC](https://towardsdatascience.com/from-physics-to-probability-hamiltonian-mechanics-for-generative-modeling-and-mcmc/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Could AI [play a role in addressing the difficulty](https://towardsdatascience.com/ai-in-social-research-and-polling/) of
    conducting political polls? [Stephanie Kirmer](https://towardsdatascience.com/author/s-kirmer/) weighs
    the potential benefits against some valid concerns.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[AI in Social Research and Polling](https://towardsdatascience.com/ai-in-social-research-and-polling/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: If you’re in the mood for a technical deep dive, [Umair Ali Khan](https://towardsdatascience.com/author/umairali-khan/) published
    a comprehensive guide to [developing an interactive AI application](https://towardsdatascience.com/talk-to-videos/) for
    video-based learning.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Talk to Videos](https://towardsdatascience.com/talk-to-videos/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Meet Our New Authors
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Explore top-notch work from some of our recently added contributors:'
  prefs: []
  type: TYPE_NORMAL
- en: '[Sudheer Singh](https://towardsdatascience.com/author/sudheer-singh/) joins
    TDS with a wealth of industry know-how, and devotes his debut article to circuit
    tracing, a novel AI-interpretability approach.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Circuit Tracing: A Step Closer to Understanding Large Language Models](https://towardsdatascience.com/circuit-tracing-a-step-closer-to-understanding-large-language-models/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[Arne Johan Pollestad](https://towardsdatascience.com/author/arnejohan-pollestad/) leans
    into his research interests in his new post, which looks at uncertainty quantification
    in the context of real-estate valuations.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Avoiding Costly Mistakes with Uncertainty Quantification for Algorithmic Home
    Valuations](https://towardsdatascience.com/avoiding-costly-mistakes-with-uncertainty-quantification-for-algorithmic-home-valuations/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[Jeremy Debattista](https://towardsdatascience.com/author/jeremy-debattista/) works
    at the intersection of data governance and semantics (among other areas); his
    TDS debut focuses on the RDF and LPG data models.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Let’s Call a Spade a Spade: RDF and LPG — Cousins Who Should Learn to Live
    Together](https://towardsdatascience.com/lets-call-a-spade-a-spade-rdf-and-lpg-cousins-who-should-learn-to-live-together/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Contribute to TDS
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We love publishing articles from new authors, so if you’ve recently written
    an interesting project walkthrough, tutorial, or theoretical reflection on any
    of our core topics, why not [share it with us?](https://towardsdatascience.com/questions-96667b06af5/)
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Subscribe to Our Newsletter
