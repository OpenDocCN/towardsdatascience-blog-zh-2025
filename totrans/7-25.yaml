- en: Building a Data Dashboard
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/building-a-data-dashboard-9441db646697/](https://towardsdatascience.com/building-a-data-dashboard-9441db646697/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![Image by Author](../Images/83a22cbc59708984d0cc59225b4138cd.png)'
  id: totrans-2
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: With source data from a Postgres database
  id: totrans-4
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As a Python data engineer for many years, one area I was not very involved in
    was the production of data dashboards. That all changed when Python-based libraries
    such as Streamlit, Gradio and Taipy came along.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: With their introduction, python programmers had no excuses ***not*** to use
    them to craft nice-looking front-ends and dashboards.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: Until then, the only other options were to use specialised tools like Tableau
    or AWS’s Quicksight or—horror of horrors—get your hands dirty with CSS, HTML,
    and Javascript.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: So, if you’ve never used one of these new Python-based graphical front-end libraries
    before, this article is for you as I’ll be taking you through how to code up a
    data dashboard using one of the most popular libraries for this purpose called
    **`Streamlit.`**
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: My intention is that this will be the first part of a series of articles on
    developing a data dashboard using three of the most popular Python-based GUI libraries.
    In addition to this one, I also plan to release articles on Gradio and Taipy,
    so look out for those. As much as possible I’ll try to replicate the same layout
    and functionality in each dashboard. I’ll use the exact same data for all three
    too, albeit in different formats e.g. a CSV, database etc …
  id: totrans-9
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-10
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Please also note that I have no connection or affiliation with Streamlit/Snowflake,
    Postgres or any other company or tool mentioned in this post.
  id: totrans-11
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: What is Streamlit?
  id: totrans-12
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Founded in 2018 by Adrien Treuille, Amanda Kelly, and Thiago Teixeira, Streamlit
    quickly gained popularity among data scientists and machine learning engineers
    when it introduced its open-source Python framework to simplify the creation of
    interactive data applications.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: In March 2022, Snowflake, a Data Cloud company, acquired Streamlit and its capabilities
    were integrated into the Snowflake ecosystem to enhance data application development.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: Streamlit’s open-source framework has been widely adopted, with over 8 million
    downloads and more than 1.5 million applications built using the platform. An
    active community of developers and contributors continues to play a significant
    role in its ongoing development and success.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: What we’ll develop
  id: totrans-16
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We’re going to develop a data dashboard. Our source data for the dashboard will
    be in a single Postgres database table and contain 100,000 synthetic sales records.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
- en: To be honest, the actual source of the data isn’t ***that*** important. It could
    just as easily be a text or CSV file, SQLite, or any database you can connect
    to. I chose Postgres because I have a copy on my local PC, and it’s convenient
    for me to use.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: This is what our final dashboard will look like.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: '![Image by Author](../Images/f4f3206bfc80d02e046e85834c9fed4b.png)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: There are four main sections.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: The top row allows the user to choose specific start and end dates and/or product
    categories via date pickers and a drop-down list, respectively.
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The second row – Key metrics – shows a top-level summary of the chosen data.
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The Visualisation section allows the user to select one of three graphs to display
    the input data set.
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The raw data section is exactly what it says. This is a tabular representation
    of the chosen data, effectively viewing the underlying Postgres database table
    data.
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Using the dashboard is easy. Initially, stats for the whole data set are displayed.
    The user can then narrow the data focus using the 3 choice fields at the top of
    the display. The graphs, key metrics and raw data sections dynamically change
    to reflect what the user has chosen.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
- en: The underlying data
  id: totrans-28
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As mentioned, the dashboard’s source data is contained in a single Postgres
    database table. The data is a set of 100,000 synthetic sales-related data records.
    Here is the Postgres table creation script for reference.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  id: totrans-30
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: And here is some Python code you can use to generate a data set for yourself.
    Make sure both numpy and polars libraries are installed first
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  id: totrans-32
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Setting up our development environment
  id: totrans-33
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Before we get to the example code, let’s set up a separate development environment.
    That way, what we do won’t interfere with other versions of libraries, programming,
    etc… we might have on the go for other projects we’re working on.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
- en: I use Miniconda for this, but you can use whatever method suits you best.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: If you want to go down the Miniconda route and don’t already have it, you must
    install Miniconda first. Get it using this link,
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
- en: '[**Miniconda – Anaconda documentation**](https://docs.anaconda.com/miniconda)'
  id: totrans-37
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Once the environment is created, switch to it using the **`activate`**command,
    and then **`pip install`** our required Python libraries.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '[PRE3]'
  id: totrans-40
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '[PRE4]'
  id: totrans-41
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: The Code
  id: totrans-42
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: I’ll split the code up into sections and explain each one along the way.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  id: totrans-44
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: We start by importing all the external libraries we’ll need. Next, we set up
    a **ThreadedConnectionPool** that allows **** multiple threads to share a pool
    of database connections. Two helper functions follow, one to get a database connection
    and the other to release it. This is overkill for a simple single-user app but
    essential for handling multiple simultaneous users or threads accessing the database
    in a web app environment.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  id: totrans-47
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'The **get_date_range** function executes the SQL query to find the range of
    dates (`MIN` and `MAX`) in the `order_date` column and returns the two dates as
    a tuple: `(start_date, end_date)`.'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
- en: The **get_unique_categories** function runs an SQL query to fetch unique values
    from the `categories` column. It capitalizes the category names (first letter
    uppercase) before returning them as a list.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
- en: 'The **get_dashboard_stats** function executes a SQL query with the following
    parts:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
- en: '**`category_totals`**: Calculates total revenue for each category in the given
    date range.'
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**`top_category`**: Finds the category with the highest revenue.'
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**`overall_stats`**: Computes overall statistics:'
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Total revenue (`SUM(price * quantity)`).
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Total number of unique orders (`COUNT(DISTINCT order_id)`).
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Average order value (total revenue divided by total orders).
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'It returns a single row containing:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
- en: '`total_revenue`: Total revenue in the specified period.'
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`total_orders`: Number of distinct orders.'
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`avg_order_value`: Average revenue per order.'
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`top_category`: The category with the highest revenue.'
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  id: totrans-63
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'The **get_plot_data** function fetches daily revenue within the given date
    range and category. It retrieves data grouped by the day (`DATE(order_date)`)
    and calculates daily revenue (`SUM(price * quantity)`), then returns a Pandas
    DataFrame with columns: `date` (the day) and `revenue` (total revenue for that
    day).'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
- en: 'The **get_revenue_by_category** function fetches revenue totals grouped by
    category within the specified date range. It groups data by `categories` and calculates
    revenue for each category (`SUM(price * quantity)`), orders the results by revenue
    in descending order and returns a Pandas DataFrame with columns: `categories`
    (category name) and `revenue` (total revenue for the category).'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
- en: 'The **get_top_products** function retrieves the top 10 products by revenue
    within the given date range and category. It groups data by `product_names` and
    calculates revenue for each product (`SUM(price * quantity)`), orders the products
    by revenue in descending order and limits results to the top 10 before returning
    a Pandas DataFrame with columns: `product_names` (product name) and `revenue`
    (total revenue for the product).'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
- en: The **get_raw_data** function fetches raw transaction data within the specified
    date range and category.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
- en: The **plot_data** function takes in some data (in a pandas DataFrame) and the
    names of the columns you want to plot on the x- and y-axes. It then creates a
    bar chart – either vertical or horizontal, depending on the chosen orientation
    – labels the axes, adds a title, and returns the finished chart (a Matplotlib
    Figure). If the data is empty, it just displays a "No data available" message
    instead of trying to plot anything.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  id: totrans-70
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'This code section creates the main structure for displaying the key metrics
    in the Streamlit dashboard. It:'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
- en: '**Sets up the page title**: "Sales Performance Dashboard."'
  id: totrans-72
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Presents filters** for start/end dates and category selection.'
  id: totrans-73
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Retrieves metrics** (such as total revenue, total orders, etc.) for the chosen
    filters from the database.'
  id: totrans-74
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Applies custom CSS** to style these metrics in a row of boxes with labels
    and values.'
  id: totrans-75
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Displays the metrics** within an HTML block, ensuring each metric gets its
    own styled container.'
  id: totrans-76
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  id: totrans-78
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: 'This section adds a header titled "Visualizations" to this part of the dashboard.
    It creates three tabs, each of which displays a different graphical representation
    of the data:'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
- en: 'Tab 1: Revenue Over Time'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
- en: Fetches **revenue data grouped by date** for the given filters using `get_plot_data()`.
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Calls `plot_data()` to generate a **bar chart** of revenue over time, with dates
    on the x-axis and revenue on the y-axis.
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Displays the chart in the first tab.
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Tab 2: Revenue by Category'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
- en: Fetches **revenue grouped by category** using `get_revenue_by_category()`.
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Calls `plot_data()` to create a **bar chart** of revenue by category.
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Displays the chart in the second tab.
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Tab 3: Top Products'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
- en: Fetches **top 10 products by revenue** for the given filters using `get_top_products()`.
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Calls `plot_data()` to create a **horizontal bar chart** (indicated by `orientation='h'`).
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Displays the chart in the third tab.
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  id: totrans-93
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: The final section displays the raw data in a dataframe. The user is able to
    scroll up and down as required to see all records available.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
- en: An empty `st.write("")` is added at the end to provide spacing for better visual
    alignment.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
- en: Running the App
  id: totrans-96
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Let’s say you save your code into a file called app.py. You can run it using
    this from the command line,
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  id: totrans-98
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: If everything works as expected, you will see this after you run the above command.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  id: totrans-100
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: Click on the Local URLs shown, and a browser screen should appear with the Streamlit
    app running.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  id: totrans-102
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In this article, I’ve attempted to provide a comprehensive guide to building
    an interactive sales performance dashboard using Streamlit with a Postgres database
    table as its source data.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
- en: Streamlit is a modern, Python-based open-source framework that simplifies the
    creation of data-driven dashboards and applications. The dashboard I developed
    allows users to filter data by date ranges and product categories, view key metrics
    such as total revenue and top-performing categories, explore visualizations like
    revenue trends and top products, and navigate through raw data with pagination.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
- en: This guide includes a complete implementation, from setting up a Postgres database
    with sample data to creating Python functions for querying data, generating plots,
    and handling user input. This step-by-step approach demonstrates how to leverage
    Streamlit’s capabilities to create user-friendly and dynamic dashboards, making
    it ideal for data engineers and scientists who want to build interactive data
    applications.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
- en: Although I used Postgres for my data, it should be straightforward to modify
    the code to use a CSV file or any other relational database management system
    (RDBMS), such as SQLite, as your data source.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
- en: _That’s all from me for now. I hope you found this article useful. If you did,
    please check out my profile page at [this link](https://medium.com/@thomas_reid).
    From there, you can see my other published stories and subscribe to get notified
    when I post new content._
  id: totrans-108
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: If you liked this content, Medium thinks you’ll find these articles interesting,
    too.
  id: totrans-109
  prefs: []
