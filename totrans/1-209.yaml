  prefs: []
  type: TYPE_NORMAL
- en: '[2] [https://www.nei.nih.gov/learn-about-eye-health/eye-conditions-and-diseases/color-blindness/types-color-vision-deficiency](https://www.nei.nih.gov/learn-about-eye-health/eye-conditions-and-diseases/color-blindness/types-color-vision-deficiency)'
  prefs: []
  type: TYPE_NORMAL
- en: '[3] [https://coolors.co/contrast-checker/112a46-acc8e5](https://coolors.co/contrast-checker/112a46-acc8e5)'
  prefs: []
  type: TYPE_NORMAL
- en: '[4] [https://webaim.org/resources/contrastchecker/](https://webaim.org/resources/contrastchecker/)'
  prefs: []
  type: TYPE_NORMAL
- en: '[5] [https://accessibleweb.com/color-contrast-checker/](https://accessibleweb.com/color-contrast-checker/)'
  prefs: []
  type: TYPE_NORMAL
