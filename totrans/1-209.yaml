- en: 'Data Visualization Explained (Part 3): The Role of Color'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/data-visualization-explained-part-3-the-role-of-color/](https://towardsdatascience.com/data-visualization-explained-part-3-the-role-of-color/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*This is the third article in my data visualization series. See [Part 1: “Data
    Visualization Explained: What It Is and Why It Matters](https://towardsdatascience.com/data-visualization-explained-what-it-is-and-why-it-matters/)*”
    *and [Part 2: “Data Visualization Explained: An Introduction to Visual Variables](https://towardsdatascience.com/data-visualization-explained-part-2-an-introduction-to-visual-variables/)*.”'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: <mdspan datatext="el1759866028213" class="mdspan-comment">How many colors</mdspan>
    do you see in the picture below?
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/816e7e39624fb475224d72707a75b283.png)'
  id: totrans-4
  prefs: []
  type: TYPE_IMG
- en: 'Most people see four: white, green, and two different shades of pinkish-red.
    In reality, those two shades are exactly the same; there are only three colors
    in the image.'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: 'This popular optical illusion illustrates an important fact to consider when
    designing data visualizations: Poorly chosen color combinations can trick the
    human eye. For a complete treatment of color, I would need to delve into physiological
    details of the human eye and learn how we actually “see” color.'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: However, seeing as this is not an optometry article, I’ll instead focus on the
    fundamentals of color usage that you will need to build clear data visualizations.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: The Difference Between Color Hue and Color Value
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'When I introduced visual encoding channels in the [previous article](https://towardsdatascience.com/data-visualization-explained-part-2-an-introduction-to-visual-variables/),
    I presented two different channels related to color: hue and value. Let us discuss
    these formally.'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
- en: '**Color hue** is what you generally think of when you hear the word “color.”
    Red, green, blue, pink, yellow, etc. are all different *hues*. **Color value**,
    on the other hand, refers to the “lightness” of an individual hue. The image below
    illustrates different values of the rainbow colors, showing how the same hue can
    vary greatly in lightness/saturation:'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/46dca0508f841becfa748343ca18862d.png)'
  id: totrans-11
  prefs: []
  type: TYPE_IMG
- en: Image by [Wikimedia Commons](https://commons.wikimedia.org/wiki/File:RGB_color_wheel_72.svg)
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
- en: 'While both of these can be effective visual encodings ([see my previous article
    in this series for a detailed discussion on visual encodings](https://towardsdatascience.com/data-visualization-explained-part-2-an-introduction-to-visual-variables/)),
    color value has one notable advantage over hue: **It can still be perceived if
    a visualization is printed in grayscale.**'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: Types of Color Scales
  id: totrans-14
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'If you want to use color as a visual encoding, you need to start by choosing
    a color scale. In doing so, there are a few characteristics you need to consider:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: If your data is nominal, then you can use a categorical color scale, which relies
    solely on color hue.
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'For quantitative data, you’ll need to make two additional decisions: 1) whether
    your scale will be sequential or divergent (i.e., if it will use one or two hues),
    and 2) whether your scale will be continuous or divided into classes.'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Thus, there are five color scales at our disposal, all of which we will discuss
    below: 1) sequential and unclassed, 2) sequential and classed, 3) divergent and
    unclassed, 4) divergent and classed, and 5) categorical [1].'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: Sequential scales (one hue) are useful for visualizing numerical values that
    go from low to high. Divergent scales can prove helpful when values go from negative
    to positive or when the designer wishes to emphasize some difference between the
    colors on two ends of the scale.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: Of course, these are just general rules. Different types of scales are best
    depending on the particular visualization, and sometimes more than one can work.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: Sequential and unclassed
  id: totrans-21
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The following map uses a sequential, unclassed color scale to illustrate the
    fraction of Australians that identified as Anglican at the time of the 2011 census.
    We can see that a single hue, green, increases in value from light to dark. Since
    there is only one color, there is no divergence, and since the scale is continuous,
    there are no classes.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/0fe50d06ebb783261477e8f95694f4fc.png)'
  id: totrans-23
  prefs: []
  type: TYPE_IMG
- en: '[Image by Toby Hudson on Wikimedia Commons](https://commons.wikimedia.org/wiki/User:99of9)'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
- en: Sequential and classed
  id: totrans-25
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In contrast to the visualization above, we can see that the map of the United
    States below has discrete classes which vary the color value. It is still sequential,
    as only a pink hue is used. The color value is increased as the percentage of
    adults in their early 20s within a county increases.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d559c8643fbf8c19e3a32c757bfc1dc8.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
- en: One noteworthy element of this visualization is the uneven nature of the classes.
    (Note the width of the largest category.) This is not always good practice, especially
    if no reason is given. [Image by Derek Montaño on Wikimedia Commons](https://commons.wikimedia.org/wiki/File:Choropleth_Map.png).
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
- en: Divergent, classed and unclassed
  id: totrans-29
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Divergent scales are a bit trickier to understand, so let’s consider both types
    together in a comparative example. In doing so, we’ll also see the different advantages
    of classed and unclassed scales.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
- en: 'The two charts below were generated in Python using mock data. The data consists
    of the following visual representations (i.e., visual encoding channels):'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
- en: The x-axis consists of a number representing store location.
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The y-axis represents the months of the year.
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The color represents a “customer satisfaction score” collected by the fictional
    stores via monthly surveys.
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/116eb573375ed4ddafb447b98a939471.png)'
  id: totrans-35
  prefs: []
  type: TYPE_IMG
- en: The classed vs. unclassed aspect of these visualizations is much like in the
    sequential scales above. In the left (unclassed) scale, the full totality of values
    is represented, whereas in the right (classed) one, colors represent grouped buckets
    of values. The left visualization provides more precision, but the right one is
    easier to interpret and apply.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 这些可视化的分类与未分类方面与上面的顺序尺度类似。在左边的（未分类）尺度中，代表所有数值的全集，而在右边的（分类）尺度中，颜色代表分组后的值桶。左边的可视化提供了更高的精度，但右边的更容易理解和应用。
- en: 'The divergent aspect of these scales is more convoluted. Let’s break it down:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 这些尺度的发散方面更为复杂。让我们来分解一下：
- en: 'The divergent scale here uses two colors: red and green (not the most accessible
    colors in the world, as we will see later in the article).'
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这里使用的发散尺度有两种颜色：红色和绿色（正如我们将在文章后面看到的，这并不是世界上最易获取的颜色）。
- en: The neutral, white color (or the two light colors in the classed scale) represents
    a logical “middle point” in the data, which in this case is the value *0.*
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 中性、白色颜色（或分类尺度中的两种浅色）代表数据中的逻辑“中间点”，在这种情况下是值*0*。
- en: This middle point is key, as it makes for a situation where a divergent scale
    lends itself naturally to the data. It makes little sense to use more than one
    color if values are just moving in one direction without a meaningful center.
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这个中间点至关重要，因为它使得一个发散的尺度自然地适用于数据。如果数值只是在一个方向上移动而没有一个有意义的中心，使用超过一种颜色就没什么意义了。
- en: Categorical
  id: totrans-41
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 分类
- en: The final, and arguably most straightforward, color scale type is a categorical
    one. The chart below, which shows government funding breakdowns across various
    countries, provides a clear example.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，也是可能最直接的，颜色尺度类型是分类的。下面的图表，展示了各国政府资金分配情况，提供了一个清晰的例子。
- en: '![](../Images/34dbb3db97eedc15f583d09fbe66ef96.png)'
  id: totrans-43
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/34dbb3db97eedc15f583d09fbe66ef96.png)'
- en: Image by [Our World in Data](https://ourworldindata.org/grapher/government-spending-by-function)
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由[我们的世界数据](https://ourworldindata.org/grapher/government-spending-by-function)提供
- en: If you have been paying attention to the principles discussed in this chapter
    this far, you will likely notice that this is not a particularly well-designed
    data visualization. It gets the general point across, but there are a few too
    many different colors, resulting in a confusing final design.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你一直关注本章讨论的原则，你可能会注意到这并不是一个特别设计良好的数据可视化。它传达了基本观点，但颜色太多，导致最终设计混乱。
- en: That said, it is an effective use of a categorical scale, correctly applying
    this scale type to nominal data (data that has distinct, unordered categories).
    **A common mistake in data visualization—and one you should take care to avoid—is
    using a categorical scale with several different hues when your data shows a clear
    numerical increase or decrease.** In those situations, refer to one of the color
    scales discussed above, depending on your specific data.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 话虽如此，这是一个有效的分类尺度使用，正确地将这种尺度类型应用于名义数据（具有明显、无序类别的数据）。**在数据可视化中常见的错误之一——也是你应该小心避免的是——当你的数据显示出明显的数值增加或减少时，使用具有几种不同色调的分类尺度。**在这些情况下，根据你的具体数据，参考上面讨论的某种颜色尺度。
- en: That sums up the basics of color scales that you must know to engage in effective
    data visualization. To conclude, let’s look at a couple more tips for using color
    well.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 这总结了你在进行有效数据可视化时必须了解的颜色尺度的基本知识。为了总结，让我们看看一些关于如何使用颜色的一些额外技巧。
- en: (Don’t) Use Color Redundantly
  id: totrans-48
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: （不要）过度使用颜色
- en: It can be tempting to use color in a visualization when it is not needed. For
    example, it’s quite common to see bar graphs with clear x-axis labels to distinguish
    the bars that still have bars of different colors.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 在可视化中不需要使用颜色时使用颜色可能会很有诱惑力。例如，很常见的是看到带有清晰的x轴标签的条形图，用以区分不同颜色的条形，尽管条形本身已经通过标签区分开来。
- en: This is not *wrong*, but it may be needless. If there are only a few categories
    and they’re linked with other visualizations, by all means use color to provide
    an additional visual cue. However, if the visualization functions fine without
    it, then don’t force it.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 这并不是*错误*的，但可能是多余的。如果只有几个类别并且它们与其他可视化相关联，那么当然可以使用颜色提供额外的视觉提示。然而，如果可视化没有颜色也能正常工作，那么就别强迫它了。
- en: In general, any and all redundant encodings (representations) should be avoided
    unless they provide some additional ease of interpretation for the viewer. It
    is either wasteful, as that encoding channel could be used for a different variable,
    or confusing, as the viewer is left to determine if the additional encoding is
    depicting something that is going over their head.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 通常情况下，应避免任何不必要的编码（表示），除非它们为观众提供一些额外的解释便利。这要么是浪费的，因为那个编码通道本可以用于其他变量，要么是令人困惑的，因为观众需要自行判断额外的编码是否描绘了超出他们理解范围的内容。
- en: Make Color Palettes Accessible
  id: totrans-52
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使调色板易于访问
- en: '**This last point it short, but incredibly important.** Do not assume that
    simply because you can distinguish among the colors in a visualization, so can
    everyone else. Data visualizations should be accessibly by everyone, including
    people who have various types of colorblindness [2].'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: '**这一点虽然简短，但极其重要。**不要假设你能够区分可视化中的颜色，其他人也能做到。数据可视化应该对所有观众都易于访问，包括各种类型色盲的人[2]。'
- en: For example, consider the Python visualizations in the section on divergent
    color scales above. Do you think someone with red-green color blindness will be
    able to interpret it correctly? Unlikely.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，考虑上面关于发散色阶的章节中的Python可视化。你认为红绿色盲的人能够正确解读它吗？不太可能。
- en: Luckily, we don’t need to do too much extra work to ensure our visualizations
    are accessible. There are countless online tools [3, 4, 5] which automatically
    check the accessibility of your chosen color palettes. Some will even help you
    generate them. Take advantage of them to make your visualizations as accessible
    as possible.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 幸运的是，我们不需要做太多额外的工作来确保我们的可视化易于访问。有无数在线工具[3, 4, 5]，它们可以自动检查你选择的调色板的易访问性。其中一些甚至可以帮助你生成它们。利用这些工具，尽可能使你的可视化易于访问。
- en: Final Thoughts
  id: totrans-56
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最后的想法
- en: Congratulations! With the third article in this series, you have learned the
    essential principles you will need to design compelling data visualizations. In
    the articles to come, we will finally start designing and building our own visualizations!
    Until then.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 恭喜！随着本系列文章的第三篇，你已经学到了设计引人入胜的数据可视化所必需的基本原则。在接下来的文章中，我们将最终开始设计和构建我们自己的可视化！直到那时。
