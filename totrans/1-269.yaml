- en: Why is optimal document retrieval important?
  id: totrans-22
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么最优文档检索很重要？
- en: 'It’s important to truly understand why the document fetching step is so critical
    to any RAG pipeline. To understand this, you must also have a general outline
    of the flow in a RAG pipeline:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 真正理解文档检索步骤为何对任何RAG管道如此关键非常重要。为了理解这一点，你还必须对RAG管道中的流程有一个大致的了解：
- en: The user enters their query
  id: totrans-24
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 用户输入他们的查询
- en: The query is embedded, and you calculate embedding similarity between the query
    and each individual document (or chunk of document)
  id: totrans-25
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 查询被嵌入，并计算查询与每个单独文档（或文档片段）之间的嵌入相似度
- en: We fetch the most relevant documents based on embedding similarity
  id: totrans-26
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们根据嵌入相似度检索最相关的文档。
- en: The most relevant documents (or chunks) are fed into an LLM, and it’s prompted
    to answer the user question given the provided chunks
  id: totrans-27
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 最相关的文档（或片段）被输入到LLM中，并提示它根据提供的片段回答用户问题。
- en: '![](../Images/b0fbac7b43d8d2bed9fae4df9f46243b.png)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b0fbac7b43d8d2bed9fae4df9f46243b.png)'
- en: This figure highlights the concept of embedding similarity. On the left side,
    you have the user query, with “Summarize the lease agreement”. This query is embedded
    into the vector you see below the text. Furthermore, in the top middle, you have
    the available document corpus, which in this instance is four documents, all of
    which have precomputed embeddings. We then calculate the similarity between the
    query embedding and each of the documents, and come out with a similarity. In
    this example, K=2, so we feed the two most relevant documents to our LLM for question
    answering. Image by the author.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 这张图突出了嵌入相似度的概念。在左侧，你有用户查询，“总结租赁协议”。这个查询被嵌入到文本下面的向量中。此外，在上中部的顶部，你有可用的文档语料库，在这个例子中是四个文档，所有这些文档都有预先计算的嵌入。然后我们计算查询嵌入与每个文档之间的相似度，并得出一个相似度。在这个例子中，K=2，所以我们向我们的LLM输入两个最相关的文档进行问答。图由作者提供。
- en: 'Now there are several aspects of the pipeline which is important. Elements
    such as:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 现在有几个管道方面很重要。例如：
- en: Which embedding model do you utilize
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你使用哪种嵌入模型
- en: Which LLM model do you use
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你使用哪种LLM模型
- en: How many documents (or chunks) do you fetch
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你检索多少文档（或片段）
- en: However, I would argue that there is likely no aspect more important than the
    selection of documents. This is because without the correct documents, it doesn’t
    matter how good you’re LLM is, or how many chunks you fetch, the answer is most
    likely to be incorrect.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我会争辩说，可能没有哪个方面比文档选择更重要。这是因为如果没有正确的文档，无论你的LLM有多好，或者你检索了多少片段，答案很可能是错误的。
- en: The model will probably work with a slightly worse embedding model or a slightly
    older LLM. However, if you don’t fetch the correct documents, you’re RAG pipeline
    will fail.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 模型可能使用稍微差一点的嵌入模型或稍微旧一点的LLM。然而，如果你没有检索到正确的文档，你的RAG管道将无法工作。
- en: Traditional approaches
  id: totrans-36
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 传统方法
- en: I’ll first understand some traditional approaches that are used today, mainly
    using embedding similarity or keyword search.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 我首先会了解一些今天仍在使用的传统方法，主要使用嵌入相似度或关键词搜索。
- en: Embedding similarity
  id: totrans-38
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 嵌入相似度
- en: Using embedding similarity to fetch the most relevant documents is the go-to
    approach today. This is a solid approach that is decent in most use cases. RAG
    with embedding similarity document retrieval is exactly as I described above.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 使用嵌入相似度来检索最相关文档是目前的首选方法。这是一个在大多数用例中相当可靠的方法。使用嵌入相似度检索文档的RAG正如我上面所描述的那样。
- en: Keyword search
  id: totrans-40
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 关键词搜索
- en: Keyword search is also commonly used to fetch relevant documents. Traditional
    approaches, such as TF-IDF or BM25, are still used today with success. However,
    keyword search also has its weaknesses. For example, it only fetches documents
    based on an exact match, which introduces issues when an exact match is not possible.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 关键词搜索也常用于检索相关文档。传统的做法，如TF-IDF或BM25，至今仍被成功使用。然而，关键词搜索也有其弱点。例如，它仅基于精确匹配来检索文档，当无法进行精确匹配时，这会引发问题。
- en: Thus, I want to discuss some other techniques you can use to improve your document
    retrieval step.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我想讨论一些你可以用来改进你的文档检索步骤的其他技术。
- en: Techniques to fetch more relevant documents
  id: totrans-43
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 检索更多相关文档的技术
- en: In this section, I will discuss some more advanced techniques to fetch the most
    relevant documents. I’ll divide the section into two. The first section will cover
    optimizing document retrieval for recall, referring to fetching as many of the
    relevant documents as possible from the corpus of available documents. The other
    subsection discusses how to optimize for precision. This means ensuring that the
    documents you fetch are actually correct and relevant for the user query.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我将讨论一些更高级的技术来获取最相关的文档。我将本节分为两部分。第一部分将涵盖优化文档检索以提高召回率，即从可用的文档语料库中尽可能多地获取相关文档。另一部分子节讨论如何优化精度。这意味着确保你获取的文档实际上对用户查询是正确且相关的。
- en: 'Recall: Fetch more of the relevant documents'
  id: totrans-45
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 召回：获取更多相关文档
- en: 'I’ll discuss the following techniques:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 我将讨论以下技术：
- en: Contextual retrieval
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 上下文检索
- en: Fetching more chunks
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 获取更多片段
- en: Reranking
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 重新排序
- en: '**Contextual retrieval**'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: '**上下文检索**'
- en: '![](../Images/403564bca0d39ab0987c6eb9f0f7cfd7.png)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/403564bca0d39ab0987c6eb9f0f7cfd7.png)'
- en: This figure highlights the pipeline for contextual retrieval. The pipeline contains
    similar elements to a traditional RAG pipeline with the user prompt, the vector
    database (DB), and prompting the LLM with the top K most relevant chunks. However,
    contextual retrieval further introduces a few new elements. First is the BM25
    index, where all documents (or chunks) are indexed for BM25 search. Whenever a
    search is performed, we can then quickly index the query and fetch the most relevant
    documents according to BM25\. We then keep the top K most relevant documents from
    both BM25 and semantic similarity (vector DB), and combine these embeddings. Finally,
    we, as usual, feed the most relevant documents into the LLM along with the user
    query, and receive a response. Image by the author.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 此图突出了上下文检索的流程。该流程包含与传统的RAG流程类似的基本元素，包括用户提示、向量数据库（DB）以及向LLM提示最相关的K个片段。然而，上下文检索还引入了一些新的元素。首先是BM25索引，其中所有文档（或片段）都为BM25搜索进行了索引。每次进行搜索时，我们都可以快速索引查询并按照BM25获取最相关的文档。然后，我们从BM25和语义相似度（向量数据库）中保留最相关的K个文档，并将这些嵌入组合起来。最后，我们像往常一样，将最相关的文档以及用户查询一起输入LLM，并接收响应。图由作者提供。
- en: '[Contextual retrieval](https://www.anthropic.com/engineering/contextual-retrieval)
    is a technique introduced by Anthropic in September 2024\. Their article covers
    two topics: Adding context to document chunks and combining keyword search (BM25)
    with semantic search to fetch relevant documents.'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: '[上下文检索](https://www.anthropic.com/engineering/contextual-retrieval)是Anthropic在2024年9月引入的一种技术。他们的文章涵盖了两个主题：向文档片段添加上下文以及将关键词搜索（BM25）与语义搜索相结合以获取相关文档。'
- en: To add context to documents, they take each document chunk and prompt an LLM,
    given the chunk and the entire document, to rewrite the chunk to include both
    information from the given chunk and relevant context from the entire document.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 为了向文档添加上下文，他们会对每个文档片段进行提示，给定的LLM根据片段和整个文档，重新编写片段以包含给定片段的信息和整个文档中的相关上下文。
- en: For example, if you have a document divided into two chunks. Where chunk one
    includes important metadata such as an address, date, location, and time, and
    the other chunk contains information about a lease agreement. The LLM might rewrite
    the second chunk to include both the lease agreement and the most relevant part
    of the first chunk, which in this case is the address, location, and date.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果你有一个分为两个片段的文档。其中第一个片段包含重要的元数据，如地址、日期、位置和时间，而另一个片段包含关于租赁协议的信息。LLM可能会重新编写第二个片段，以包含租赁协议和第一个片段中最相关的部分，在这种情况下是地址、位置和日期。
- en: Anthropic also discusses combining semantic search and keyword search in their
    article, essentially fetching documents with both techniques, and using a prioritized
    approach to combine the documents retrieved from each technique.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: Anthropic在其文章中也讨论了将语义搜索和关键词搜索相结合，本质上使用这两种技术获取文档，并采用优先级方法来组合从每种技术检索到的文档。
- en: '**Fetching more chunks**'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: '**获取更多片段**'
- en: 'A simpler approach to fetch more of the relevant documents is to simply fetch
    more chunks. The more chunks you fetch, the higher your likelihood of fetching
    the relevant chunks is. However, this has two main downsides:'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 获取更多相关文档的一个更简单的方法是简单地获取更多的片段。你获取的片段越多，获取相关片段的可能性就越高。然而，这有两个主要缺点：
- en: You’ll likely get more irrelevant chunks as well (impacting recall)
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你可能会得到更多不相关的片段（影响召回）
- en: You’ll increase the amount of tokens you feed to your LLM, which may negatively
    impact the LLM’s output quality
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你将增加提供给你的 LLM 的标记数量，这可能会对 LLM 的输出质量产生负面影响
- en: '**Reranking for recall**'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: '**召回率重排**'
- en: Rereanking is also a powerful technique, which can be used to increase precision
    and recall when fetching relevant documents to a user query. When fetching documents
    based on semantic similarity, you’ll assign a similarity score to all chunks,
    and typically only keep the top K most similar chunks (K is usually a number between
    10 and 20, but it varies for different applications). This means that a reranker
    should attempt to put the relevant documents within the K most relevant documents,
    while keeping irrelevant documents out of the same list. I think Qwen Reranker is
    a good model; however, there are also many other rerankers out there.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 重排也是一种强大的技术，可以在检索与用户查询相关的文档时用来提高精确度和召回率。在基于语义相似度检索文档时，你会为所有块分配一个相似度分数，通常只保留最相似的
    K 个块（K 通常在 10 到 20 之间，但根据不同的应用而有所不同）。这意味着重排器应尝试将相关文档放在最相关的 K 个文档中，同时将无关文档排除在相同的列表之外。我认为
    Qwen Reranker 是一个好的模型；然而，也有许多其他重排器。
- en: 'Precision: Filter away irrelevant documents'
  id: totrans-63
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 精确度：过滤掉无关文档
- en: Reranking
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 重排
- en: LLM verification
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: LLM 验证
- en: '**Reranking for precision**'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: '**精确度重排**'
- en: As discussed in the last section on recall, rerankers can also be used to improve
    precision. Rerankers will increase recall by adding relevant documents into the
    top K list of most relevant documents. On the other side, rerankers will improve
    precision, by ensuring that the irrelevant documents stay out of the top K most
    relevant documents list.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 如上一节关于召回率的讨论所述，重排器也可以用来提高精确度。重排器通过将相关文档添加到最相关的文档的前 K 列表中来增加召回率。另一方面，重排器通过确保无关文档不进入最相关的文档前
    K 列表来提高精确度。
- en: '**LLM verification**'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: '**LLM 验证**'
- en: 'Utilizing LLM to judge chunk (or document) relevance is also a powerful technique
    to filter away irrelevant chunks. You can simply create a function like below:'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 利用 LLM 判断块（或文档）的相关性也是一种强大的技术，可以用来过滤掉无关的块。你可以简单地创建一个如下所示的功能：
- en: '[PRE0]'
  id: totrans-70
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: You then feed each chunk (or document) through this function, and only keep
    the chunks or documents that are judged as relevant by the LLM.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 然后你将每个块（或文档）通过这个函数，并只保留被 LLM 判断为相关的块或文档。
- en: 'This technique has two main downsides:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 这种技术有两个主要的缺点：
- en: LLM cost
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: LLM 成本
- en: LLM response time
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: LLM 响应时间
- en: You’ll be sending a lot of LLM API calls, which will inevitably incur a significant
    cost. Furthermore, sending so many queries will take time, which adds delay to
    your RAG pipeline. You should balance this with the need for rapid responses to
    the users.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 你将发送大量的 LLM API 调用，这不可避免地会带来显著的成本。此外，发送这么多查询将花费时间，这会增加你的 RAG 管道的延迟。你应该平衡快速响应用户的需求。
- en: Benefits of improving document retrieval
  id: totrans-76
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 改进文档检索的好处
- en: 'There are numerous benefits to improving the document retrieval step in your
    RAG pipeline. Some examples are:'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 在你的 RAG 管道中改进文档检索步骤有许多好处。以下是一些例子：
- en: Better LLM question answering performance
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更好的 LLM 问答性能
- en: Less hallucinations
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 减少幻觉
- en: More often able to correctly answer users’ queries
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更经常能够正确回答用户的查询
- en: Essentially, it makes the LLMs’ job easier
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 实质上，这使得 LLM 的工作变得更简单
- en: Overall, the ability of your question answering model will increase in terms
    of the number of successfully answered user queries. This is the metric I recommend
    scoring your RAG system after, and you can read more about LLM system evaluations
    in my article on [Evaluating 5 Million Documents with Automatic Evals](https://eivindkjosbakken.com/2025/09/14/how-to-evaluate-5-million-documents-with-automatic-llm-evaluations/).
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 总体而言，你的问答模型在成功回答的用户查询数量方面将得到提升。这是我在评估你的 RAG 系统后推荐的指标，你可以在我的关于[使用自动 LLM 评估评估五百万份文档](https://eivindkjosbakken.com/2025/09/14/how-to-evaluate-5-million-documents-with-automatic-llm-evaluations/)的文章中了解更多关于
    LLM 系统评估的内容。
- en: Fewer hallucinations are also an incredibly important factor. Hallucinations
    are one of the most significant issues we are facing with LLMs. They are so detrimental
    because they lower the users’ trust in the question-answer system, which makes
    them less likely to continue using your application. However, ensuring the LLM
    both receives the relevant documents (precision), and minimizes the amount of
    irrelevant documents (recall), is valuable to minimize the amount of hallucinations
    the RAG system produces.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 减少幻觉也是一个极其重要的因素。幻觉是我们面临的最重要的问题之一。它们之所以有害，是因为它们降低了用户对问答系统的信任，这使得他们不太可能继续使用你的应用程序。然而，确保LLM既接收相关文档（精确度），又最大限度地减少无关文档的数量（召回率），对于减少RAG系统产生的幻觉数量是有价值的。
- en: Less irrelevant documents (precision), also avoids the problems of [context
    bloat](https://eval.16x.engineer/blog/llm-context-management-guide) (too much
    noise in the context), or even [context poisoning](https://www.dbreunig.com/2025/06/22/how-contexts-fail-and-how-to-fix-them.html)
    (incorrect information provided in the documents).
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 减少无关文档（精确度），也避免了[上下文膨胀](https://eval.16x.engineer/blog/llm-context-management-guide)（上下文中的过多噪音）或甚至[上下文中毒](https://www.dbreunig.com/2025/06/22/how-contexts-fail-and-how-to-fix-them.html)（在文档中提供错误信息）的问题。
- en: Summary
  id: totrans-85
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: In this article, I’ve discussed how you can improve the document retrieval step
    of your RAG pipeline. I started off discussing how I believe the document retrieval
    step is the most significant part of the RAG pipeline, and you should spend time
    optimizing this step. Furthermore, I discussed how traditional RAG pipelines fetch
    relevant documents through semantic search and keyword search. Continuing, I discussed
    techniques you can utilize to improve both the precision and recall of retrieved
    documents, with techniques such as contextual retrieval and LLM chunk verification.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我讨论了如何改进你的RAG管道的文档检索步骤。我首先讨论了我认为文档检索步骤是RAG管道中最重要的一部分，你应该花时间优化这一步骤。此外，我还讨论了传统RAG管道如何通过语义搜索和关键词搜索检索相关文档。继续讨论，我讨论了你可以利用的技术来提高检索文档的精确度和召回率，例如上下文检索和LLM块验证技术。
