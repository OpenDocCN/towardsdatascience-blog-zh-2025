- en: How to Select the 5 Most Relevant Documents for AI Search
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/how-to-select-the-5-most-relevant-documents-for-ai-search/](https://towardsdatascience.com/how-to-select-the-5-most-relevant-documents-for-ai-search/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '<mdspan datatext="el1758219366192" class="mdspan-comment">In this article</mdspan>,
    I discuss a specific step of the RAG pipeline: The document retrieval step. This
    step is critical for any RAG system’s performance, considering that without fetching
    the most relevant documents, it’s challenging for an LLM to correctly answer the
    user’s questions. I’ll discuss the traditional approach to fetching the most relevant
    documents, some techniques to improve it, and the benefits you’ll see from better
    document retrieval in your RAG pipeline.'
  prefs: []
  type: TYPE_NORMAL
- en: 'As per my last article on [Enriching LLM Context with Metadata](https://towardsdatascience.com/how-to-enrich-llm-context-to-significantly-enhance-capabilities/),
    I’ll write my main goal for this article:'
  prefs: []
  type: TYPE_NORMAL
- en: '**My goal** for this article is to to highlight how you can fetch and filter
    the most relevant documents for your AI search.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![](../Images/143ac54515e2c37160d1921d4ad7f67f.png)'
  prefs: []
  type: TYPE_IMG
- en: This figure showcases a traditional RAG pipeline. You start with the user query,
    which you encode using an embedding model. You then compare this embedding to
    the precomputed embedding of the entire document corpus. Usually, the documents
    are split into chunks, with some overlap between them, though some systems also
    just work with entire documents. After the embedding similarity is calculated,
    you only keep the top K most relevant documents, where K is a number you choose
    yourself, usually a number between 10 and 20\. The step of fetching the most relevant
    documents given the semantic similarity is the topic of today’s article. After
    fetching the most relevant documents, you feed them into an LLM along with the
    user query, and the LLM finally returns a response. Image by the author.
  prefs: []
  type: TYPE_NORMAL
