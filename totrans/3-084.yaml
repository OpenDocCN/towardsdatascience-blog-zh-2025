- en: A Moment of Rest
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Last year, DPG took place in Berlin, and this year — in Regensburg, which has
    about 23 times fewer population and is 10 times smaller in area. However, the
    cozy lands of Bavaria have always been closer to my ❤️
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/5afdebd70bf14f493450eab9ffd9a42f.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Image by author*'
  prefs: []
  type: TYPE_NORMAL
- en: And this is the university. A solid 60s-style building. Wha 💪🏻
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d9675305aae7f5bc0222dbd5afbcb8ec.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Image by author*'
  prefs: []
  type: TYPE_NORMAL
- en: A new invention — a cup “Drink and Eat Me”
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d8da747481a76a9291ae26fde8c9cdea.png)'
  prefs: []
  type: TYPE_IMG
