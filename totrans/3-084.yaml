- en: How to Use Gyroscope in Presentations, or Why Take a JoyCon to DPG2025
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/how-to-use-gyroscope-in-presentations-or-why-take-a-joycon-to-dpg2025/](https://towardsdatascience.com/how-to-use-gyroscope-in-presentations-or-why-take-a-joycon-to-dpg2025/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Image by author
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: <mdspan datatext="el1744918122091" class="mdspan-comment">This article</mdspan>
    explores how browser-based computational notebooks — particularly the WLJS Notebook — can
    transform static slides into dynamic, real-time experiences. This approach isn’t
    limited to presentations; you can prepare interactive lecture notes for students
    or colleagues and publish it on web. For data scientists, physicists, it highlights
    new ways to communicate models, simulations, and visualizations, making complex
    ideas more intuitive and engaging.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: Is a PDF Enough?
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Animations, *bells and whistles*, especially the kind that were popular in PowerPoint
    15–20 years ago, have largely taken a backseat. Add to this the compatibility
    issues between LibreOffice and MS Office (even between versions for Windows and
    Mac), the presence or absence of necessary fonts — and the desire to do something
    unusual on the “stage” fades away quickly.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: 'Have a look at modern technical presentations: quite often, it’s just a PDF
    document consisting of pages with vector and raster graphics, and sometimes GIF
    animations that eat up megabytes (like this post), with no mercy.'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: Unused Potential
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: It’s worth separating decorative *bells and whistles* from those that carry
    additional information in some media format. For example, take a look at [ECMA-363](https://en.wikipedia.org/wiki/Universal_3D)
    [1] specification.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: '[![](../Images/74d5b09b94a6027635b267b72d100182.png)](https://github.com/johnyf/fig2u3d)'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
- en: Convert MATLAB Figure to 3D PDF / Image by [Ioannis F. Filippidis](https://github.com/johnyf/fig2u3d)
    (fig2u3d manual), BSD-2-Clause
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: A 3D model inside a PDF document simply enhances the user/viewer experience.
    You observe the object from different angles/cross-sections.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: It’s disappointing that such a *feature* is almost nowhere supported except
    for Adobe Acrobat and likely will not be. It feels like we made a leap in the
    past, but now we have returned to static slides.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
- en: Large Scientific Conference DPG
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '[**DPG-Frühjahrstagung**](https://www.dpg-physik.de/aktivitaeten-und-programme/tagungen/fruehjahrstagungen/2025)  is
    a large European physics conference organized by the German Physical Society (DPG)
    [2]. Every year, they gather more than `10^4` scientists and take place in German
    cities, covering a vast array of physics fields.'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/df6502dc767ca570ed247e955177a129.png)'
  id: totrans-15
  prefs: []
  type: TYPE_IMG
- en: Deutsche Physikalische Gesellschaft / Image by Wikimedia, PD-textlogo
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f179f14abf512f9449a8884bc53e1443.png)'
  id: totrans-17
  prefs: []
  type: TYPE_IMG
- en: DPG2025 (Spring Meeting) took place in the wonderful city of Regensburg / Photo
    by [Tobi &Chris](https://www.pexels.com/@tobiandchris/), Pexels License
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: There are so many presentations, and it lasts almost a week, so by the end,
    it becomes too overwhelming. Nevertheless, this does not diminish its value as
    a platform for networking, practicing presentations, and a reliable way to learn
    *what is currently on the market, which trains have gone already, and which are
    just departing*.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: The participants in plenary sessions are mostly Master’s students and PhD students,
    with postdocs being rarer.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: Such a large and accessible platform is an excellent motivation to try something
    new 💡 *even if something may go wrong*.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: What is a JoyCon?
  id: totrans-22
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Surely, the reader has seen devices like this:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/5cfdb9895ce8919984d190435421c148.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
- en: An average PPT clicker device / AI Generated “PPT Clicker” image using Dalle
    3 by OpenAI
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
- en: This device acts as a slide switcher and sometimes as a laser pointer, connecting
    via Bluetooth or through a *dongle*. In any case, it is a type of controller with
    buttons. Controllers can be more interesting — like the one from the 2017 Nintendo
    Switch handheld console
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/aba4157cca94f60c9bded0df10f44b9c.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
- en: JoyCon (R) / Image adapted Wikimedia, PD
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
- en: 'It is not much bigger, but it has some additional cool *features*:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
- en: Analog stick 🕹️
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 11 buttons ☎️
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: IR camera 📸 (difficult to use, no good API documentation)
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Full IMU 🌐 (Inertial Measurement Unit) aka gyroscope with an accelerometer
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Bluetooth connectivity; recognized as a regular HID
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The buttons can indeed be mapped to PowerPoint, or the stick can be used to
    control slides, emulating mouse or keyboard clicks, as it was implemented in these
    projects:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: '[Hackster: Right Joy-con Controller as a Remote](https://www.hackster.io/leo49/right-joy-con-controller-as-a-presentation-remote-5810e4)
    (Python) [3]'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Medium: Nintendo Switch Joy-Con Presentation Remote](https://medium.com/@mimming/nintendo-switch-joy-con-presentation-remote-5a7e08e7ad11)
    (USB Override MacOS) [4]'
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I thought it would be cool to somehow use the IMU and analog stick. But for
    that, one would need to go beyond PowerPoint and PDF 🧙🏼‍♂️
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
- en: Moving Slides to Browser Environment
  id: totrans-39
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The idea behind this is not new, but it’s important to remember that this approach
    may not work for everyone. However, by moving the presentation display and creation
    to the browser (particularly Javascript and HTML lands), we automatically gain
    access to all the possibilities of modern web technology: peripheral device support,
    JavaScript, CSS animation magic, and much more, including video. It’s important
    to note that all of this is **cross-platform by default** and will work almost
    everywhere.'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
- en: For example, slides can be created in Markdown (or/and HTML) with the help of
    a simple framework (rather, a small library)  [RevealJS](https://revealjs.com/markdown/)
    [5]
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
- en: There is also MDX-based presentation engines, and things like Manim [6], Motion
    Canvas [7], but these guys require even more skills to master.
  id: totrans-42
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'The *RevealJS* API is quite simple, so controlling the slides via JavaScript
    commands is easy to implement:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  id: totrans-44
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: However, this direct approach has significant drawbacks. It requires an internet
    connection, and if you’d prefer to avoid it, you’ll need to use bundlers (such
    as Rollup) and embed all JavaScript libraries into a single HTML file, for instance.
    Alternatively, you could run a local web server.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
- en: Option with Jupyter Notebook
  id: totrans-46
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: If you like Python and IPYNB, then use *nbconvert* — it will convert your notebook
    directly into a RevealJS presentation, and you won’t even notice it! Or use the
    extension for Jupyter—[RISE](https://github.com/damianavila/RISE) [8]
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/79e6fdd044aa5b00f58e646726b8e51d.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
- en: Create Presentation from Jupyter Notebook / Image by author
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
- en: In any case, the idea remains simple — we need to somehow enter the web browser
    environment to take advantage of all the possibilities of JoyCon.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
- en: Try it on [Binder](https://mybinder.org/v2/gh/damianavila/RISE/master?filepath=examples%2FREADME.ipynb)!
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
- en: Option with WLJS Notebook
  id: totrans-52
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: My opinion on [WLJS](https://wljs.io) [9] might be somewhat biased as I am one
    of its developers (and active users). This open-source IDE with a notebook interface
    is more tightly integrated with the web environment, as slides are not exported
    there but are instead **executed** and are just another type of output cell, alongside
    the familiar Markdown.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/67f55b52676ae22071d1af17d17da24c.png)'
  id: totrans-54
  prefs: []
  type: TYPE_IMG
- en: WLJS Notebook / Image by author
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
- en: 'Under the hood, it also uses RevealJS but with a few extra features:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
- en: It works offline
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It allows embedding interactive elements and components, similar to LaTeX Beamer
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It is integrated with Wolfram Language (freeware distribution)
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'See more about it in[**this story**](https://medium.com/@krikus.ms/reinventing-dynamic-and-portable-notebooks-with-javascript-and-wolfram-language-22701d38d651)[10]**.**
    An ultimate guide on how to make presentation there we published in our official
    blog: [Dynamic Presentation, or How to Code a Slide with Markdown and WL](https://wljs.io/blog/2025/03/02/ultimate-ppt)
    [11].'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
- en: Let’s Dive into JoyCon
  id: totrans-61
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: So, the easiest option is to use the already ready-made library [joy-con-webhid](https://github.com/tomayac/joy-con-webhid)
    [12]. Why spend time reinventing the wheel when people have already done a great
    job for us?
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  id: totrans-63
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: All subsequent examples will be taken from the WLJS Notebook. However, you can
    do pretty much the same thing using Python + FAST API to interface with JavaScript
    or something similar, or even just use JS alone. The online version of the notebook
    is available [here](https://jerryi.github.io/wljs-demo/PresenterJoyCon.html) [13].
  id: totrans-64
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: First, let’s listen to what’s coming from the controller port.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
- en: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>Code</summary>
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]</details>'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
- en: 'The most important function here is:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  id: totrans-69
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'It looks like there are many steps to do. In reality, most of this code deals
    with connecting the controller and drawing a large “Connect” button. Don’t pay
    too much attention to the special methods — they can easily be replaced with those
    available in your specific environment:'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
- en: '`this.return(dom)` passes a `DOMElement` for embedding on the page'
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`this.ondestroy(function)` calls `function` when the cell is deleted, to clean
    up timers, etc.'
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The first line `.esm` is a way to specify the JavaScript cell subtype in WLJS
    Notebook, which requires pre-bundling.
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'When we run this code cell, we will see the following:'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/87bb8625d0c0a3515820a2bce509d6e8.png)'
  id: totrans-75
  prefs: []
  type: TYPE_IMG
- en: '*DOM Output Element / Image by author*'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
- en: 'Then follow these steps:'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
- en: Disconnect the controller from the Nintendo Switch (System → Controllers → Disconnect).
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Pair the JoyCon (R) with the PC by holding the small button on the side.
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Press “Connect” on our *presenter controller*.
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Opening the browser console, we reveal the following messages:'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  id: totrans-82
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Quite a lot of data! Let’s try using this for the benefit of our presentation
    💡
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
- en: Buttons ☎️
  id: totrans-84
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To begin, we can use two buttons to switch slides
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/32f1907079455c46414327d6c7df2ff4.png)'
  id: totrans-86
  prefs: []
  type: TYPE_IMG
- en: '*Image by author*'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
- en: In the WLJS notebook, slides can also be controlled programmatically through
    a Wolfram wrapper function that calls the RevealJS API.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  id: totrans-89
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'All that’s left is to trigger this function at the right moment when the button
    (or switch) is clicked. To do this, events need to be sent from the Javascript
    world to the Wolfram machine, where we can then do whatever we want with them.
    This results in the following diagram:'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a6d93e0eb3e0f79f6e08390311f17554.png)'
  id: totrans-91
  prefs: []
  type: TYPE_IMG
- en: '*Image by author*'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
- en: '*You don’t have to think about this, since it is seamlessly implemented via
    APIs*'
  id: totrans-93
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Let’s go back to the code cell and **modify the handler**.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
- en: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>Code</summary>
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]</details>'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
- en: 'As you can see, we have added several items here:'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
- en: '*Joystick calibration* — analog sticks drift, so their digital position is
    never perfect `0.,0.`.'
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*State of all buttons* — why hammer the door every time if you only need to
    gently knock when the state changes? This reduces system stress.'
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Sending states to the event pool* — this is specific to WLJS, where we send
    data to the Wolfram machine (or Python if you’re in Jupyter).'
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The last point looks like this (replace with the equivalent in your environment):'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  id: totrans-102
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: Then, on the Wolfram side, we can easily subscribe to these events like this
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  id: totrans-104
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'This is very convenient, as Javascript sends the names of the pressed buttons
    as the pattern. In this case, you can immediately subscribe to slide switching,
    for example, like this:'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
- en: ZR — next slide
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Y — back
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Thus, programmatically controlling slides becomes intuitive:'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  id: totrans-109
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Let’s Test in Practice
  id: totrans-110
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let’s create a simple presentation. Start typing with
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  id: totrans-112
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Now, let’s connect the JoyCon to the PC and link it to our Javascript script
    by pressing the Connect button. Then, subscribe to the events *once* in the active
    session.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, just run the cell with the slides:'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/9a730d4abf71e13ae5345852c3c86f0e.png)'
  id: totrans-115
  prefs: []
  type: TYPE_IMG
- en: The first big step in mastering JoyCon has been made! */ Image by author*
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
- en: Analog Stick 🕹️
  id: totrans-117
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The stick theoretically allows controlling two sliders simultaneously. For the
    DPG Spring Meetings, I had the idea of a live demonstration of a very peculiar
    effect **m𝒶𝑔𝒾c𝑎𝓁 𝓌𝑜𝓇𝒹𝓈 𝒻𝓇𝑜𝓂 𝓅𝒽𝓎𝓈𝒾𝒸𝓈**. I believe that some concepts are much more
    impactful and comprehensible when demonstrated live *on stage*.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
- en: 'Here is a condensed code snippet for the interactive widget:'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  id: totrans-120
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: The interactive online version of this [widget is available here](https://jerryi.github.io/wljs-demo/THzFaraday.html)
    [14]
  id: totrans-121
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![](../Images/5a6bb876e9a360febd1e6b96480c7618.png)'
  id: totrans-122
  prefs: []
  type: TYPE_IMG
- en: '*Image by author*'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
- en: 'To embed it in a slide, insert its symbol as a tag (similar to JSX):'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  id: totrans-125
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: Now, let’s link it to our stick
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/55d99e0229d820344cab5a713233a6e5.png)'
  id: totrans-127
  prefs: []
  type: TYPE_IMG
- en: '*Image by author*'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
- en: 'To begin with, let’s perform a simple test and bind its position to a disk
    on the screen:'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  id: totrans-130
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: '![](../Images/d74037f19f5025be1b572bc13626b15a.png)'
  id: totrans-131
  prefs: []
  type: TYPE_IMG
- en: '*Image by author*'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
- en: Obviously, the movements are too abrupt. Moreover, making small adjustments
    is kinda painful using JoyCon. The solution? *Integration!*
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  id: totrans-134
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: '![](../Images/9008ca52b28b88d0326b0d14fa6f7bca.png)'
  id: totrans-135
  prefs: []
  type: TYPE_IMG
- en: '**Image by author**'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, let’s link the `pos` variable to the sliders of our widget:'
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  id: totrans-138
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: 'Here’s how it looks live on a slide:'
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/af685f3e7ad0fc6a1d371e907c72e314.png)'
  id: totrans-140
  prefs: []
  type: TYPE_IMG
- en: '*Image by author*'
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
- en: 'And in the actual DPG presentation:'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/facac91bf46204c89878ab64673d774d.png)'
  id: totrans-143
  prefs: []
  type: TYPE_IMG
- en: '*Image by author*'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
- en: A Moment of Rest
  id: totrans-145
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Last year, DPG took place in Berlin, and this year — in Regensburg, which has
    about 23 times fewer population and is 10 times smaller in area. However, the
    cozy lands of Bavaria have always been closer to my ❤️
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/5afdebd70bf14f493450eab9ffd9a42f.png)'
  id: totrans-147
  prefs: []
  type: TYPE_IMG
- en: '*Image by author*'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
- en: And this is the university. A solid 60s-style building. Wha 💪🏻
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d9675305aae7f5bc0222dbd5afbcb8ec.png)'
  id: totrans-150
  prefs: []
  type: TYPE_IMG
- en: '*Image by author*'
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
- en: A new invention — a cup “Drink and Eat Me”
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d8da747481a76a9291ae26fde8c9cdea.png)'
  id: totrans-153
  prefs: []
  type: TYPE_IMG
- en: '*Image by author*'
  id: totrans-154
  prefs: []
