- en: IMU or Gyroscope-Accelerometer Combination 🌐
  id: totrans-160
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'To use them, we need to read the corresponding fields from the `details` object,
    namely:'
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
- en: '*actualAccelerometer*: x, y, z'
  id: totrans-162
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*actualGyroscope*: rps (radians per second)'
  id: totrans-163
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>Code</summary>
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]</details>'
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
- en: Since IMU is not always needed, the script includes a boolean variable and a
    control function `JoyConIMU[True | False]`, allowing IMU measurements to be enabled
    or disabled.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
- en: 'The JoyCon, like most other devices with IMU (some smartphones, watches, but
    definitely not VR headsets or quadcopters), includes:'
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
- en: '**3-axis gyroscope** — returns angular velocity in **rad/sec** around all three
    axes'
  id: totrans-168
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**3-axis accelerometer** — returns a single acceleration vector'
  id: totrans-169
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Question: Why can’t we use only a gyroscope or an accelerometer?**'
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s try outputting both. First, enable IMU usage:'
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  id: totrans-172
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: 'Now, define auxiliary functions and variables:'
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  id: totrans-174
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: '**What happens here:**'
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
- en: The accelerometer vector is simply stored in `acceleration`.
  id: totrans-176
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Gyroscope data is processed by:'
  id: totrans-177
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Reordering angular velocity values (JoyCon hardware orientation) and adjusting
    directions.
  id: totrans-178
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Integrating over time to obtain orientation angles
  id: totrans-179
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'As a result, we obtain:'
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
- en: '**Three angles** defining JoyCon orientation `angles`.'
  id: totrans-181
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**One acceleration vector** (at rest — the gravity direction) `acceleration`.'
  id: totrans-182
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'These three angles are conveniently expressed as a matrix (tensor):'
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE19]'
  id: totrans-184
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: 'Applying this matrix to any 3D object allows it to be oriented according to
    these angles. Physically, on the JoyCon, it looks like this:'
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e3b4fb67ab96e24ff52954899b9a1254.png)'
  id: totrans-186
  prefs: []
  type: TYPE_IMG
- en: Image by author
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
- en: It is important to note that since we measure only the first derivative (using
    Gyro), then the initial IMU orientation remains unknown. Therefore, we manually
    set the initial state, i.e.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
- en: '`angles = {0., 0., 0}`'
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE20]'
  id: totrans-190
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: 'Real-time Data Output:'
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b87163df01b20fcb08ae5c570564d70a.png)'
  id: totrans-192
  prefs: []
  type: TYPE_IMG
- en: Image by author
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
- en: 'Well… Not quite obvious what these values mean. Let’s try to draw then as vectors
    in 3D space:'
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE21]'
  id: totrans-195
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: 'And then render them as colored cones, where:'
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
- en: Blue and red — defines angles derived from the gyroscope data
  id: totrans-197
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Green — accelerometer data (inverted and normalized)
  id: totrans-198
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE22]'
  id: totrans-199
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: '![](../Images/bfdc16ac14abd637e608f6999d120fe8.png)'
  id: totrans-200
  prefs: []
  type: TYPE_IMG
- en: Image by author
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
- en: The green vector is always aligned “correctly,” while the blue and red vectors,
    representing gyroscope angles, accumulate errors over time, especially with rapid
    movements, causing **drift**.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
- en: There are many ways to solve this issue. The general idea is to adjust the angles
    using accelerometer data (green vector), as the accelerometer precisely determines
    the downward direction ( *until an external force disturbs it*).
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
- en: For a more detailed explanation, check out a great video by [**James Lambert**](https://www.youtube.com/@james.lambert)[15],
    which explores these problems and their solutions, including a [**detailed example
    with Oculus DK1**](https://www.youtube.com/watch?v=ha3fDU-1wHk).
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
- en: Why the heck do we need this in the presentation?
  id: totrans-205
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'I asked myself this question when I discovered how deep the rabbit hole goes.
    In my talk at the magnetism session, there was exactly one slide where the idea
    of an IMU made any sense:'
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/33b448af5488ffff9ae234ba4574a285.png)'
  id: totrans-207
  prefs: []
  type: TYPE_IMG
- en: '*Image by author*'
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
- en: Do you see the crystalline structure? Finding a “good” camera angle for it is
    indeed difficult, so why not rotate it directly, *lively*? We don’t need all three
    angles and acceleration-just one will suffice.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
- en: 'Thus, we discard the accelerometer and keep only the gyroscope:'
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE23]'
  id: totrans-211
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: Now, we just need to apply the `rotation` transformation tensor to our 3D structure.
    Since this crystal contains many ions, which are also colored, I compressed them
    into base64
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
- en: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>base64
    code</summary>
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE24]</details>'
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE25]'
  id: totrans-215
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: 'Let’s embed it into our slide:'
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE26]'
  id: totrans-217
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: '![](../Images/573c5e8e82bb476c636bbaeeb5cfd9db.png)'
  id: totrans-218
  prefs: []
  type: TYPE_IMG
- en: Image by author
  id: totrans-219
  prefs: []
  type: TYPE_NORMAL
- en: 'To make it even more convenient, it would be useful to subscribe to IMU only
    when the slide is active and unsubscribe when leaving it. This is easy to do because
    RevealJS signals the core on slide state change events. Let’s implement this as
    a component using `.wlx` cell type:'
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE27]'
  id: totrans-221
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: By placing this code on any slide, we achieve the desired result without polluting
    the global space or interfering with other event handlers. Thus, IMU subscription
    management is localized to the specific slide, and when switching slides, we correctly
    enable and disable data handling without affecting other slides and their processing
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE28]'
  id: totrans-223
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: 'These are actual slides from *DPG2025*:'
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/dd1de5d73f3e170768fbb2a3741b837a.png)'
  id: totrans-225
  prefs: []
  type: TYPE_IMG
- en: '*Image by author*'
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
- en: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>Short
    video with my DPG2025 slides</summary></details>
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
- en: Final Code and Notebook
  id: totrans-228
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The compiled presenter controller cell code is provided under the spoiler. If
    inserted into an empty cell, it will produce a functional widget for connecting
    a JoyCon.
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
- en: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>Compressed
    cells</summary>
  id: totrans-230
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE29]</details>'
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
- en: No evaluation is required (don’t run it ;)). Simply hide the input cell, leaving
    only the output visible through the properties (click on the top-right corner
    of the group).
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
- en: Here is a [**notebook with all**](https://jerryi.github.io/wljs-demo/PresenterJoyCon.html)
    **examples** [13](some of which work in a browser as well without a kernel).
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
- en: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>What
    if using my own laptop is not an option?</summary>
  id: totrans-234
  prefs: []
  type: TYPE_NORMAL
- en: The WLJS Notebook can be exported to HTML, [preserving even some dynamic behavior](https://wljs.io/frontend/Exporting/Dynamic%20HTML)
    [16]. This is achieved through a quite sophisticated algorithm that tracks all
    event chains occurring on the JS and WL sides, attempting to approximate them
    using a simple state machine. The result is a standard HTML file containing all
    cells, slides, and the data of these state machines.
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
- en: However, due to the variety of values received from the IMU, the exporter cannot
    automatically capture this in a JS state machine. Consequently, rotations and
    the joystick input will not be preserved. Nonetheless, everything else will function
    as expected. 🙂</details>
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
- en: … like a fish needs a bicycle
  id: totrans-237
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Please refer to the final sentence of [that beautiful comics](https://www.smbc-comics.com/comic/2010-12-09)
    by
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
- en: '**Zach Weinersmith**.'
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
- en: If not for the urgent need to showcase a rotating crystalline structure, this
    post would not exist.
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
- en: Thank you for your attention, and to those who read this far 🧙🏼‍♂️ 🤍
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
