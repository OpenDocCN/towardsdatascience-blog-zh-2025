  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: 'Here’s how it looks live on a slide:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/af685f3e7ad0fc6a1d371e907c72e314.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Image by author*'
  prefs: []
  type: TYPE_NORMAL
- en: 'And in the actual DPG presentation:'
  prefs: []
  type: TYPE_NORMAL
