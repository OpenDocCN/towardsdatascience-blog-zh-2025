- en: Building a Geospatial Lakehouse with Open Source and Databricks
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/building-a-geospatial-lakehouse-with-open-source-and-databricks-2/](https://towardsdatascience.com/building-a-geospatial-lakehouse-with-open-source-and-databricks-2/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1761325882442" class="mdspan-comment">Introduction</mdspan>
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Most data that relates to a measurable process in the real world has a geospatial
    aspect to it. Organisations that manage assets over a wide geographical area,
    or have a business process which requires them to consider many layers of geographical
    attributes that require mapping, will have more complicated geospatial analytics
    requirements, when they start to use this data to answer strategic questions or
    optimise. These geospatially focussed organisations might ask these sorts of questions
    of their data:'
  prefs: []
  type: TYPE_NORMAL
- en: '*How many of my assets fall within a geographical boundary?*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*How long does it take my customers to get to a site on foot or by car?*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*What is the density of footfall I should expect per unit area?*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: All of these are valuable geospatial queries, requiring that a number of data
    entities be integrated in a common storage layer, and that geospatial joins such
    as point-in-polygon operations and geospatial indexing be scaled to handle the
    inputs involved. This article will discuss approaches to scaling geospatial analytics
    using the features of Databricks, and open-source tools taking advantage of Spark
    implementations, the common Delta table storage format and Unity Catalog [1],
    focussing on batch analytics on vector geospatial data.
  prefs: []
  type: TYPE_NORMAL
- en: Solution Overview
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The diagram below summarises an open-source approach to building a geospatial
    Lakehouse in Databricks. Through a variety of ingestion modes (though often through
    public APIs) geospatial datasets are landed into cloud storage in a variety of
    formats; with Databricks this could be a volume within a Unity Catalog catalog
    and schema. Geospatial data formats mainly include vector formats (GeoJSONs, .csv
    and Shapefiles .shp) which represent Latitude/Longitude points, lines or polygons
    and attributes, and raster formats (GeoTIFF, HDF5) for imaging data. Using GeoPandas
    [2] or Spark-based geospatial tools such as Mosaic [3] or H3 Databricks SQL functions
    [4] we can prepare vector files in memory and save them in a unified bronze layer
    in Delta format, using Well Known Text (WKT) as a string representation of any
    points or geometries.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/05dd08398cef9e20d64ee41590b15e3e.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Overview of a geospatial analytics workflow built using Unity Catalog and
    open-source in Databricks. Image by author.*'
  prefs: []
  type: TYPE_NORMAL
- en: While the landing to bronze layer represents an audit log of ingested data,
    the bronze to silver layer is where data preparation and any geospatial joins
    common to all upstream use-cases can be applied. The finished silver layer should
    represent a single geospatial view and may integrate with other non-geospatial
    datasets as part of an enterprise data model; it also offers an opportunity to
    consolidate multiple tables from bronze into core geospatial datasets which may
    have multiple attributes and geometries, at a base level of grain required for
    aggregations upstream. The gold layer is then the geospatial presentation layer
    where the output of geospatial analytics such as journey time or density calculations
    can be stored. For use in dashboarding tools such as Power BI, outputs may be
    materialised as star schemas, whilst cloud GIS tools such as ESRI Online, will
    prefer GeoJSON files for specific mapping applications.
  prefs: []
  type: TYPE_NORMAL
- en: Geospatial Data Preparation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In addition to the typical data quality challenges faced when unifying many
    individual data sources in a data lake architecture (missing data, variable recording
    practices etc), geospatial data has unique data quality and preparation challenges.
    In order to make vectorised geospatial datasets interoperable and easily visualised
    upstream, it’s best to choose a geospatial co-ordinate system such as WGS 84 (the
    widely used international GPS standard). In the UK many public geospatial datasets
    will use other co-ordinate systems such as OSGB 36, which is an optimisation for
    mapping geographical features in the UK with increased accuracy (this format is
    often written in Eastings and Northings rather than the more typical Latitude
    and Longitude pairs) and a transformation to WGS 84 is needed for the these datasets
    to avoid inaccuracies in the downstream mapping as outlined in the Figure below.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/3ea33d8e7865bc7288effc24ad95ad87.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Overview of geospatial co-ordinate systems a) and overlay of WGS 84 and OSGB
    36 for the UK b). Images adapted from [5]* with permission from author. Copyright
    (c) Ordnance Survey 2018.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Most geospatial libraries such as GeoPandas, Mosaic and others have built-in
    functions to handle these conversions, for example from the Mosaic documentation:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Converts a multi-point geometry from WGS84 to Web Mercator projection format.
  prefs: []
  type: TYPE_NORMAL
- en: Another data quality issue unique to vector geospatial data, is the concept
    of invalid geometries outlined in the Figure below. These invalid geometries will
    break upstream GeoJSON files or analyses, so it is best to fix them or delete
    them if necessary. Most geospatial libraries offer functions to find or attempt
    to fix invalid geometries.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/19940221a2c3dbfd8eae6843795bb185.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Examples of types of invalid geometries. Image taken from [6] with permission
    from author*. Copyright (c) 2024 Christoph Rieke.'
  prefs: []
  type: TYPE_NORMAL
- en: These data quality and preparation steps should be implemented early on in the
    Lakehouse layers; I’ve done them in the bronze to silver step in the past, along
    with any reusable geospatial joins and other transformations.
  prefs: []
  type: TYPE_NORMAL
- en: Scaling Geospatial Joins and Analytics
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The geospatial aspect of the silver/enterprise layer should ideally represent
    a single geospatial view that feeds all upstream aggregations, analytics, ML modelling
    and AI. In addition to data quality checks and remediation, it’s sometimes beneficial
    to consolidate many geospatial datasets with aggregations or unions to simplify
    the data model, simplify upstream queries and prevent the need to redo expensive
    geospatial joins. Geospatial joins are often very computationally expensive due
    to the large number of bits required to represent sometimes complex multi-polygon
    geometries and the need for many pair-wise comparisons.
  prefs: []
  type: TYPE_NORMAL
- en: 'A few strategies exist to make these joins more efficient. You can, for example,
    simplify complex geometries, effectively reducing the number of lat lon pairs
    required to represent them; different approaches are available for doing this
    that might be geared towards different desired outputs (e.g., preserving area,
    or removing redundant points) and these can be implemented in the libraries, for
    example in Mosaic:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Another approach to scaling geospatial queries is to use a geospatial indexing
    system as outlined in the Figure below. By aggregating point or polygon geometry
    data to a geospatial indexing system such as H3, an approximation of the same
    information can be represented in a highly compressed form represented by a short
    string identifier, which maps to a set of fixed polygons (with visualisable lat/lon
    pairs) which cover the globe, over a range of hexagon/pentagon areas at different
    resolutions, that can be rolled up/down in a hierarchy.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f66810b09f33a9f8812c93b2ff9ad667.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Motivation for geospatial indexing systems (compression) [7] and visualisation
    of the H3 index from Uber [8]. Images adapted with permission from authors.* Copyright
    (c) CARTO 2023\. Copyright (c) Uber 2018.'
  prefs: []
  type: TYPE_NORMAL
- en: 'In Databricks the H3 indexing system is also optimised for use with its Spark
    SQL engine, so you can write queries such as this point in polygon join, as approximations
    in H3, first converting the points and polygons to H3 indexes at the desired resolution
    (res. 7 which is ~ 5km^2)  and then using the H3 index fields as keys to join
    on:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: GeoPandas and Mosaic will also allow you to do geospatial joins without any
    approximations if required, but often the use of H3 is a sufficiently accurate
    approximation for joins and analytics such as density calculations. With a cloud
    analytics platform you can also make use of APIs, to bring in live traffic data
    and journey time calculations using services such as Open Route Service [9], or
    enrich geospatial data with additional attributes (e.g., transport hubs or retail
    locations) using tools such as the Overpass API for Open Street Map [10].
  prefs: []
  type: TYPE_NORMAL
- en: Geospatial Presentation Layers
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now that some geospatial queries and aggregations have been done and analytics
    are ready to visualise downstream, the presentation layer of a geospatial lakehouse
    can be structured according to the downstream tools used for consuming the maps
    or analytics derived from the data. The Figure below outlines two typical approaches.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/5ed5babcd808f1580c76bf04f2356ab5.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Comparison of GeoJSON Feature Collection a) vs dimensionally modelled star
    schema b) as data structures for geospatial presentation layer outputs. Image
    by author.*'
  prefs: []
  type: TYPE_NORMAL
- en: When serving a cloud geospatial information system (GIS) such as ESRI Online
    or other web application with mapping tools, GeoJSON files stored in a gold/presentation
    layer volume, containing all of the necessary data for the map or dashboard to
    be created, can constitute the presentation layer. Using the FeatureCollection
    GeoJSON type you can create a nested JSON containing multiple geometries and associated
    attributes (“features”) which may be points, linestrings or polygons. If the downstream
    dashboarding tool is Power BI, a star schema might be preferred, where the geometries
    and attributes can be modelled as facts and dimensions to make the most of its
    cross filtering and measure support, with outputs materialised as Delta tables
    in the presentation layer.
  prefs: []
  type: TYPE_NORMAL
- en: Platform Architecture and Integrations
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Geospatial data will normally represent one part of a wider enterprise data
    model and portfolio of analytics and ML/AI use-cases and these will require (ideally)
    a cloud data platform, with a series of upstream and downstream integrations to
    deploy, orchestrate and actually see that the analytics prove valuable to an organisation.
    The Figure below shows a high-level architecture for the kind of Azure data platform
    I have worked with geospatial data on in the past.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/2352402d36c00b589c2ecc8dc2f93a38.png)'
  prefs: []
  type: TYPE_IMG
- en: '*High-level architecture of a geospatial Lakehouse in Azure*. Image by author.'
  prefs: []
  type: TYPE_NORMAL
- en: Data is landed using a variety of ETL tools (if possible Databricks itself is
    sufficient). Within the workspace(s) a medallion pattern of raw (bronze), enterprise
    (silver), and presentation (gold) layers are maintained, using the hierarchy of
    Unity Catalog catalog.schema.table/volume to generate per use-case layer separation
    (particularly of permissions) if needed. When presentable outputs are ready to
    share, there are a variety of options for data sharing, app building and dashboarding
    and GIS integration options.
  prefs: []
  type: TYPE_NORMAL
- en: For example with ESRI cloud, an ADLSG2 storage account connector within ESRI
    allows data written to an external Unity Catalog volume (i.e., GeoJSON files)
    to be pulled through into the ESRI platform for integration into maps and dashboards.
    Some organisations may prefer that geospatial outputs be written to downstream
    systems such as CRMs or other geospatial databases. Curated geospatial data and
    its aggregations are also frequently used as input features to ML models and this
    works seamlessly with geospatial Delta tables. Databricks are developing various
    AI analytics features built into the workspace (e.g., AI BI Genie [11] and Agent
    Bricks [12]), that give the ability to query data in Unity Catalog using English
    and the likely long-term vision is for any geospatial data to work with these
    AI tools in the same way as any other tabular data, only one of the visualise
    outputs will be maps.
  prefs: []
  type: TYPE_NORMAL
- en: In Closing
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: At the end of the day, it’s all about making cool maps that are useful for decision
    making. The figure below shows a couple of geospatial analytics outputs I’ve generated
    over the last few years. Geospatial analytics boils down to knowing things like
    where people or events or assets cluster, how long it typically takes to get from
    A to B, and what the landscape looks like in terms of the distribution of some
    attribute of interest (might be habitats, deprivation, or some risk factor). All
    important things to know for strategic planning (e.g., where do I put a fire station?),
    knowing your customer base (e.g., who is within 30 min of my location?) or operational
    decision support (e.g., this Friday which locations are likely to require additional
    capacity?).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/dd901e9533e4aa3c2dc072312129328c.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Examples of some geospatial analytics. a) Journey time analysis b) Hotspot
    finding with H3 c) Hotspot clustering with ML*. Image by author.'
  prefs: []
  type: TYPE_NORMAL
- en: Thanks for reading and if you’re interested in discussing or reading further,
    please get in touch or check out some of the references below.
  prefs: []
  type: TYPE_NORMAL
