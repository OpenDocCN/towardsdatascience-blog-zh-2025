  id: totrans-49
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/dd901e9533e4aa3c2dc072312129328c.png)'
- en: '*Examples of some geospatial analytics. a) Journey time analysis b) Hotspot
    finding with H3 c) Hotspot clustering with ML*. Image by author.'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: '*一些地理空间分析的示例。a) 行程时间分析 b) 使用 H3 的热点发现 c) 使用机器学习的热点聚类*。图片由作者提供。'
