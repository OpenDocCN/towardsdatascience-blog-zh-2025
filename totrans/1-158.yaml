- en: 'Data Visualization Explained (Part 4): A Review of Python Essentials'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 数据可视化解析（第四部分）：Python 基础知识回顾
- en: 原文：[https://towardsdatascience.com/data-visualization-explained-part-4-a-review-of-python-essentials/](https://towardsdatascience.com/data-visualization-explained-part-4-a-review-of-python-essentials/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/data-visualization-explained-part-4-a-review-of-python-essentials/](https://towardsdatascience.com/data-visualization-explained-part-4-a-review-of-python-essentials/)
- en: '*<mdspan datatext="el1761243970023" class="mdspan-comment">This is the fourth
    article</mdspan> in my data visualization series. See the following:*'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '*<mdspan datatext="el1761243970023" class="mdspan-comment">这是我的数据可视化系列中的第四篇文章。请参阅以下内容：*</mdspan>'
- en: '*[Part 1: “Data Visualization Explained: What It Is and Why It Matters](https://towardsdatascience.com/data-visualization-explained-what-it-is-and-why-it-matters/)*“'
  id: totrans-3
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*[第一部分：“数据可视化解析：它是什么以及为什么它很重要”](https://towardsdatascience.com/data-visualization-explained-what-it-is-and-why-it-matters/)*“'
- en: '*[Part 2: “Data Visualization Explained: An Introduction to Visual Variables](https://towardsdatascience.com/data-visualization-explained-part-2-an-introduction-to-visual-variables/)*.”'
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*[第二部分：“数据可视化解析：视觉变量的介绍”](https://towardsdatascience.com/data-visualization-explained-part-2-an-introduction-to-visual-variables/)*。”'
- en: '*[Part 3: “Data Visualizations Explained: The Role of Color.”](https://towardsdatascience.com/data-visualization-explained-part-3-the-role-of-color/)*'
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*[第三部分：“数据可视化解析：颜色的作用。”](https://towardsdatascience.com/data-visualization-explained-part-3-the-role-of-color/)*'
- en: Up to this point in my data visualization series, I have covered the foundational
    elements of visualization design. These principles are essential to understand
    before actually designing and building visualizations, as they ensure that the
    underlying data is done justice. If you have not done so already, I strongly encourage
    you to read my previous articles (linked above).
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的数据可视化系列中，到目前为止，我已经涵盖了可视化设计的基石。在真正设计和构建可视化之前，理解这些原则是至关重要的，因为它们确保了底层数据得到公正的处理。如果你还没有这样做，我强烈建议你阅读我之前的文章（如上链接）。
- en: At this point, you are ready to start building visualizations of our own. I
    will cover various ways to do so in future articles—and in the spirit of data
    science, many of these methods will require programming. To ensure you are ready
    for this next step, this article will consist of a brief review of Python essentials,
    followed by a discussion of their relevance to coding data visualizations.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，你已经准备好开始构建我们自己的可视化。我将在未来的文章中介绍各种实现方法——并且本着数据科学的精神，许多这些方法将需要编程。为了确保你为这一步做好准备，这篇文章将包括对
    Python 基础知识的简要回顾，然后讨论它们在编写数据可视化代码中的相关性。
- en: The Basics—Expressions, Variables, Functions
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 基础知识——表达式、变量、函数
- en: Expressions, variables, and functions are the primary building blocks of all
    Python code—and indeed, code in any language. Let’s take a look at how they work.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 表达式、变量和函数是所有 Python 代码——以及任何语言代码——的主要构建块。让我们看看它们是如何工作的。
- en: Expressions
  id: totrans-10
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 表达式
- en: 'An **expression** is a statement which evaluates to some value. The simplest
    possible expression is a constant value of any type. For instance, below are three
    simple expressions: The first is an integer, the second is a string, and the third
    is a floating-point value.'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: '**表达式**是一个返回某个值的语句。最简单的表达式是任何类型的常量值。例如，下面有三个简单的表达式：第一个是整数，第二个是字符串，第三个是浮点数。'
- en: '[PRE0]'
  id: totrans-12
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'More complex expressions often consist of mathematical operations. We can add,
    subtract, multiply, or divide various numbers:'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 更复杂的表达式通常由数学运算组成。我们可以添加、减去、乘以或除以各种数字：
- en: '[PRE1]'
  id: totrans-14
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: By definition, these expressions are evaluated into a single value by Python,
    following the mathematical order of operations outlined by the acronym [PEMDAS](https://www.khanacademy.org/math/cc-sixth-grade-math/x0267d782:cc-6th-exponents-and-order-of-operations/cc-6th-order-of-operations/v/more-complicated-order-of-operations-example)
    (Parentheses, Exponents, Multiplication, Division, Addition, Subtraction) [1].
    For example, the final expression above evaluates to the number `7.0`. (Do you
    see why?)
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 根据定义，这些表达式由 Python 评估为单个值，遵循由缩写词 [PEMDAS](https://www.khanacademy.org/math/cc-sixth-grade-math/x0267d782:cc-6th-exponents-and-order-of-operations/cc-6th-order-of-operations/v/more-complicated-order-of-operations-example)（括号、指数、乘法、除法、加法、减法）概述的数学运算顺序。例如，上面的最终表达式评估为数字
    `7.0`。（你明白为什么吗？）
- en: Variables
  id: totrans-16
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 变量
- en: 'Expressions are great, but they aren’t super useful by themselves. When programming,
    you usually need to save the value of certain expressions so that you can use
    them in later parts of our program. A **variable** is a container which holds
    the value of an expression and lets you access it later. Here are the exact same
    expressions as in the first example above, but this time with their value saved
    in various variables:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 表达式很棒，但它们本身并不是非常有用。在编程时，您通常需要保存某些表达式的值，以便您可以在程序的后续部分中使用它们。**变量** 是一个容器，它保存表达式的值，并允许您稍后访问它。以下是与上面第一个示例中完全相同的表达式，但这次它们的值被保存在各种变量中：
- en: '[PRE2]'
  id: totrans-18
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'Variables in Python have a few important properties:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: Python 中的变量有几个重要的属性：
- en: A variable’s **name** (the word to the left of the equal sign) must be one word,
    and it cannot start with a number. If you need to include multiple words in your
    variable names, the convention is to separate them with underscores (as in the
    examples above).
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 变量的 **名称**（等号左边的单词）必须是一个单词，并且不能以数字开头。如果您需要在变量名称中包含多个单词，惯例是使用下划线（如上面的示例所示）将它们分开。
- en: You do not have to specify a data type when we are working with variables in
    Python, as you may be used to doing if you have experience programming in a different
    language. This is because Python is a *dynamically typed* language.
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在我们使用 Python 中的变量时，您不需要指定数据类型，就像您在用其他语言编程时可能习惯做的那样。这是因为 Python 是一种 *动态类型* 语言。
- en: Some other programming language distinguish between the **declaration** and
    the **assignment** of a variable. In Python, we just assign variables in the same
    line that we declare them, so there is no need for the distinction.
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一些其他编程语言区分变量的 **声明** 和 **赋值**。在 Python 中，我们只是在声明变量的同一行中赋值，因此没有必要区分。
- en: 'When variables are declared, Python will always evaluate the expression on
    the right side of the equal sign into a single value before assigning it to the
    variable. (This connects back to how Python evaluates complex expressions). Here
    is an example:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 当声明变量时，Python 总会将等号右侧的表达式评估为单个值，然后再将其分配给变量。（这回到了 Python 如何评估复杂表达式的方式）。以下是一个示例：
- en: '[PRE3]'
  id: totrans-24
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: The variable above is assigned to the value `7.0`, not the compound expression
    `(2 * 2) + (9 / 3)`.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 上面的变量被分配了值 `7.0`，而不是复合表达式 `(2 * 2) + (9 / 3)`。
- en: Functions
  id: totrans-26
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 函数
- en: 'A **function** can be thought of as a kind of machine. It takes something (or
    multiple things) in, runs some code that transforms the object(s) you passed in,
    and outputs back exactly one value. In Python, functions are used for two primary
    reasons:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以将 **函数** 视为一种机器。它接受一些（或多个）东西，运行一些代码来转换您传递进来的对象（或多个对象），并输出一个精确的值。在 Python
    中，函数主要用于两个主要原因：
- en: To manipulate input variables of interest and come up with an output we need
    (much like mathematical functions).
  id: totrans-28
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为了操作感兴趣的输入变量并得出所需的输出（就像数学函数一样）。
- en: To avoid code repetition. By packaging code inside of a function, we can just
    call the function whenever we need to run that code (as opposed to writing the
    same code again and again).
  id: totrans-29
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为了避免代码重复。通过将代码包装在函数中，我们可以在需要运行该代码时随时调用该函数（而不是一次又一次地编写相同的代码）。
- en: 'The easiest way to understand how to define functions in Python is to look
    at an example. Below, we have written a simple function which doubles the value
    of a number:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 理解如何在 Python 中定义函数的最简单方法就是查看一个示例。下面，我们编写了一个简单的函数，该函数将数字的值加倍：
- en: '[PRE4]'
  id: totrans-31
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'There are a number of important points about the above example you should ensure
    you understand:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 关于上面的示例，您应该确保理解以下几个重要点：
- en: The `def` keyword tells Python that you want to define a function. The word
    directly after `def` is the name of the function, so the function above is called
    `double`.
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`def` 关键字告诉 Python 您想要定义一个函数。`def` 后面的单词是函数的名称，因此上面的函数被称为 `double`。'
- en: 'After the name, there is a set of parentheses, inside which you put the function’s
    parameters (a fancy term which just mean the function’s inputs). **Important:
    If your function does not need any parameters, you still need to include the parentheses—just
    don’t put anything inside them.**'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在名称之后，有一组括号，您可以在其中放置函数的参数（这是一个术语，意思是函数的输入）。**重要提示**：如果您的函数不需要任何参数，您仍然需要包括括号——只是不要在它们里面放任何内容。
- en: At the end of the `def` statement, a colon must be used, otherwise Python will
    not be happy (i.e., it will throw an error). Together, the entire line with the
    `def` statement is called the **function signature**.
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在`def`语句的末尾必须使用冒号，否则Python将不会高兴（即，它会抛出一个错误）。整个带有`def`语句的行被称为**函数签名**。
- en: All of the lines after the `def` statement contain the code that makes up the
    function, indented one level inward. Together, these lines make up the **function
    body**.
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`def`语句之后的所有行都包含构成函数的代码，缩进一级。这些行共同构成了**函数体**。'
- en: The last line of the function above is the **return statement**, which specifies
    the output of a function using the `return` keyword. A return statement does not
    necessarily need to be the last line of a function, but after it is encountered,
    Python will exit the function, and no more lines of code will be run. More complex
    functions may have multiple return statements.
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 上面的函数的最后一行是**返回语句**，它使用`return`关键字指定函数的输出。返回语句不一定是函数的最后一行，但在遇到它之后，Python将退出函数，并且不会运行更多的代码行。更复杂的函数可能有多个返回语句。
- en: You **call** a function by writing its name, and putting the desired inputs
    in parentheses. If you are calling a function with no inputs, you still need to
    include the parentheses.
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你通过写出函数的名称，并在括号中放入所需的输入来调用一个函数。如果你调用一个没有输入的函数，你仍然需要包括括号。
- en: Python and Data Visualization
  id: totrans-39
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Python和数据可视化
- en: 'Now then, let me address the question you may be asking yourself: Why all this
    Python review to begin with? After all, there are many ways you can visualize
    data, and they certainly aren’t all restricted by knowledge of Python, or even
    programming in general.'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们来回答你可能正在问自己的问题：为什么一开始要进行所有的Python复习？毕竟，你可以用很多种方式来可视化数据，而且它们肯定不是都受限于对Python的了解，甚至不是受限于一般的编程知识。
- en: This is true, but as a data scientist, it is likely that you will need to program
    at some point—and within programming, it is exceedingly likely the language you
    use will be Python. When you’ve just been handed a data cleaning and analysis
    pipeline by the data engineers on your team, it pays to know how to quickly and
    effectively turn it into a set of actionable and presentable visual insights.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 这一点是正确的，但作为一个数据科学家，你很可能会在某些时候需要编程——在编程中，你使用的语言极有可能是Python。当你刚刚从团队的数据工程师那里接手一个数据清洗和分析流程时，了解如何快速有效地将其转化为一系列可操作和可展示的视觉洞察力是非常有用的。
- en: 'Python is important to know for data visualization generally speaking, for
    several reasons:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: Python对于数据可视化来说非常重要，原因有几个：
- en: It is an accessible language. If you are just transitioning into data science
    and visualization work, it will be much easier to program visualizations in Python
    than it will be to work with lower-level tools such as [D3 in JavaScript](https://d3js.org/).
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它是一种易于使用的语言。如果你刚刚开始转向数据科学和可视化工作，用Python编写可视化程序会比使用像JavaScript中的[D3](https://d3js.org/)这样的底层工具要容易得多。
- en: There are many different and popular libraries in Python, all of which provide
    the ability to visualize data with code that builds directly on the Python basics
    we learned above. Examples include [Matplotlib](https://matplotlib.org/), [Seaborn](https://seaborn.pydata.org/),
    [Plotly](https://plotly.com/), and [Vega-Altair](https://altair-viz.github.io/)
    (previously known as just Altair). I will explore some of these, especially Altair,
    in future articles.
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Python中有许多不同且流行的库，它们都能提供使用代码来可视化数据的能力，这些代码直接建立在上面我们学到的Python基础知识之上。例如包括[Matplotlib](https://matplotlib.org/)、[Seaborn](https://seaborn.pydata.org/)、[Plotly](https://plotly.com/)和[Vega-Altair](https://altair-viz.github.io/)（之前仅被称为Altair）。我将在未来的文章中探讨其中的一些，特别是Altair。
- en: Furthermore, the libraries above all integrate seamlessly into pandas, the foundational
    data science library in Python. Data in pandas can be directly incorporated into
    the code logic from these libraries to build visualizations; you often won’t even
    need to export or transform it before you can start visualizing.
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 此外，上述所有库都无缝集成到Python的基础数据科学库pandas中。pandas中的数据可以直接集成到这些库的代码逻辑中，以构建可视化；你通常甚至不需要在开始可视化之前导出或转换它。
- en: '**The basic principles discussed in this article may seem elementary, but they
    go a long way toward enabling data visualization:**'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**本文讨论的基本原则可能看起来很基础，但它们对于实现数据可视化起到了很重要的作用：**'
- en: Computing expressions correctly and understanding those written by others is
    essential to ensuring you are visualizing an accurate representation of the data.
  id: totrans-47
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 正确计算表达式和理解他人编写的表达式对于确保你能够可视化数据的准确表示至关重要。
- en: You’ll often need to store specific values or sets of values for later incorporation
    into a visualization—you’ll need variables for that.
  id: totrans-48
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你通常会需要存储特定的值或值集以供以后在可视化中使用——你需要变量来做到这一点。
- en: Sometimes, you can even store *entire* *visualizations* in a variable for later
    use or display.
  id: totrans-49
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 有时，你甚至可以将整个*可视化*存储在变量中以供以后使用或显示。
- en: The more advanced libraries, such as Plotly and Altair, allow you to call built-in
    (and sometimes even user-defined) functions to customize visualizations.
  id: totrans-50
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更高级的库，如Plotly和Altair，允许你调用内置（有时甚至是用户自定义）的函数来自定义可视化。
- en: Basic knowledge of Python will enable you to integrate your visualizations into
    simple applications that can be shared with others, using tools such as [Plotly
    Dash](https://dash.plotly.com/tutorial) and [Streamlit](https://docs.streamlit.io/get-started).
    These tools aim to simplify the process of building applications for data scientists
    who are new to programming, and the foundational concepts covered in this article
    will be enough to get you started using them.
  id: totrans-51
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 基本的Python知识将使你能够将你的可视化集成到简单的应用程序中，这些应用程序可以与他人共享，使用工具如[Plotly Dash](https://dash.plotly.com/tutorial)和[Streamlit](https://docs.streamlit.io/get-started)。这些工具旨在简化对于编程新手的数据科学家构建应用程序的过程，而本文中涵盖的基础概念将足以让你开始使用它们。
- en: If that’s not enough to convince you, I’d urge you to click on one of the links
    above and start exploring some of these visualization tools yourself. Once you
    start seeing what you can do with them, you won’t go back.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 如果这还不足以说服你，我强烈建议你点击上面的链接之一，开始探索这些可视化工具。一旦你开始看到你可以用它们做什么，你就不会回头了。
- en: For my part, I’ll be back in the next article to present my own tutorial for
    building visualizations. (One or more of these tools may make an appearance.)
    Until then!
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我来说，我将在下一篇文章中回来展示我自己的可视化教程。（这些工具中的一个或多个可能会出现。）在此之前！
