- en: As always, feel free to check out the full working source code on [GitHub](https://github.com/broepke/dynamo-api).
    This is a really fun application for you to try on your own! There are some additional
    setup and configuration steps in the README for the repo, which might be helpful
    if you’re trying to set up your own.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 和往常一样，你可以自由地查看GitHub上的完整工作源代码[GitHub](https://github.com/broepke/dynamo-api)。这是一个非常有趣的应用程序，你可以自己尝试！在仓库的README中有一些额外的设置和配置步骤，这可能有助于你设置自己的环境。
- en: Conclusion
  id: totrans-69
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In conclusion, building your own API on top of DynamoDB using AWS services like
    Lambda and API Gateway is not only a rewarding experience but also a practical
    skill that can enhance your understanding of cloud-based applications. By following
    the steps outlined in this article, you have learned how to create a robust and
    scalable API that can be easily integrated with various platforms. Whether you’re
    looking to streamline data access, improve security, or simply explore new technologies,
    this project offers a comprehensive introduction to API development in a serverless
    environment. As you continue to experiment and refine your skills, remember that
    the possibilities are endless, and the knowledge gained here can be applied to
    countless other projects. Happy coding!
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，在DynamoDB之上使用AWS服务如Lambda和API Gateway构建自己的API不仅是一次有回报的经历，而且是一项实用的技能，它能增强你对基于云应用的理解。通过遵循本文中概述的步骤，你已经学会了如何创建一个强大且可扩展的API，它可以轻松地与各种平台集成。无论你是想简化数据访问、提高安全性，还是仅仅探索新技术，这个项目都为你提供了一个在无服务器环境中进行API开发的全面介绍。随着你继续实验和磨练技能，请记住，可能性是无限的，在这里获得的知识可以应用于无数其他项目。祝您编码愉快！
