- en: Build Your First API with Python and AWS
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/build-your-first-api-with-python-and-aws-09f13bc7b62c/](https://towardsdatascience.com/build-your-first-api-with-python-and-aws-09f13bc7b62c/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![Photo by Lucas Campoi on Unsplash](../Images/055648d95e29abe339a7b06e3df6543c.png)'
  id: totrans-2
  prefs: []
  type: TYPE_IMG
- en: Photo by [Lucas Campoi](https://unsplash.com/@campoilucas?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: Introduction
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Today, we’re going to take a small deviation from the normal Snowflake and Data
    Warehouse-centric concepts in this article. We’ll walk through the creation of
    your own API that sits on top of data stored in another type of database, DynamoDB,
    and then build a small web front end to test it.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: You’ve probably coded against numerous APIs in your day-to-day work, but what
    is it like to create your own? In this article, we’ll show you how you can create
    an API giving you some additional exposure to how a cloud service works, but also
    hopefully giving you inspiration for building your own in the future.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: 'The following is a diagram of what we’re going to build today: An API that
    is hosted in an AWS Lambda, all written in Python, and connected to the super
    powerful DynamoDB. The API is then exposed through the AWS API Gateway which allows
    us to add protections such as rate-limiting to our API. We also used Route 53
    (their domain management tool) and CloudWatch for logging.'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: Let’s jump in!
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: '![Image by Author](../Images/40556e8db72789af370aa4384a07639f.png)'
  id: totrans-9
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: Why an API?
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As mentioned, you’ve most certainly used APIs before. But how are they built
    and how do they work to help you get access to your data? Let’s start off with
    some of the potential advantages.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
- en: '**Abstraction and Decoupling**: An API abstracts the underlying schema, so
    users don’t need to understand anything about how the data is stored or how to
    query the system. You’re also able to centralize business rules, validation, and
    transformations, preventing duplication of logic.'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Enhanced Security**: With an API, you are limiting how users can get at your
    data and how they can interact with it – Can they update records? Can they delete?
    Whatever you want to expose, you can through the API, preventing unwanted mistakes.
    Additionally, you can implement Rate Limits and Throttling, which prevents abuse
    of the service.'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Maintainability**: By adding versioning to your API ( /v1, /v2 ), you can
    safely evolve your application without breaking older versions. And a huge advantage
    is that you could swap out where the data is stored (maybe you want to move to
    MySQL or Snowflake later), and the API can remain 100% compatible for clients.
    You just need to change where the data is retrieved from in the API layer.'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Cross-Platform Access**: Finally – An API like we’re building here is compatible
    with any programming language on Windows, Mac, Linux, and Mobile.'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Storing Data in DynamoDB
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: For this application, I chose [DynamoDB](https://aws.amazon.com/dynamodb/).
    DynamoDB is honestly incredible, and having some exposure to it is a must. It’s
    referred to as a NoSQL, key-value store. There are a lot of different versions
    of databases like this, but this is one of the most popular. It doesn’t look like
    a series of tables and doesn’t support your typical SQL syntax or generally the
    idea of joining tables together. Rather, Dynamo prefers schemas that are [denormalized](https://www.geeksforgeeks.org/denormalization-in-databases/)
    and, if possible, all stored in a single table. Because of this, some use cases
    are certainly not appropriate for it. [Read up](https://www.reddit.com/r/aws/comments/177sfoz/when_would_you_use_dynamodb_over_rds/)
    a bit on when you can and shouldn’t use this type of database before picking it.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: To get started, we need to create a new table in the DynamoDB console called
    Items. The only setting you need to deal with at this time is setting the Partition
    Key to `id`, which will represent the unique identifier for our data.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: After that, we can use the [AWS CLI](https://docs.aws.amazon.com/cli/latest/userguide/getting-started-install.html)
    to add items to our new table. You’ll notice that we don’t have to define any
    of the schema up front like we do with SQL; we simply add the key-value pairs
    and specify their data types when adding them. Simple as that.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  id: totrans-21
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: You can repeat that process with creating four or five additional items to get
    started.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: 'Note: the Unique Identifier is created as [UUID4](https://en.wikipedia.org/wiki/Universally_unique_identifier)
    values. You can use Python or any number of [sites](https://www.uuidgenerator.net/)
    on the internet to create one. This is a wonderful practice with any data identifiers
    you need, since there is a near-zero chance of collision between ones that are
    created, and you do not have to keep track of order or previously created value.
    Just simply generate a new one.'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: Building Routes with FastAPI
  id: totrans-24
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'For our API, we’re going to use the library [FastAPI](https://fastapi.tiangolo.com/).
    FastAPI is a simple yet production-quality API in Python. First off, let’s define
    what a Route is in FastAPI. A Route defines a specific endpoint (or URL path)
    that a client can access, along with the HTTP method (e.g., GET, POST, PUT, DELETE)
    used to interact with that endpoint. Let’s take a look at a very simple one for
    a health check:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  id: totrans-26
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: That’s it in its most basic form! The `@app.get` decorator tells the incoming
    request what to do when the `<URL>/health` is pinged. And the GET is the HTTP
    method. We can continue this pattern with all of the other endpoints we want to
    add, such as listing all items, creating a new item, editing an item, and deleting
    an item; also known as CRUD operations. Let’s look at the get all items route.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  id: totrans-28
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: This process repeats itself for each of the endpoints you want to implement.
    You simply need to make sure you’re picking the correct HTTP method and calling
    the proper DynamoDB APIs for performing the operation on the data.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
- en: Creating a Lambda Function
  id: totrans-30
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Next we want to wrap our APIs in the code needed to deploy this as a Lambda
    Function. Fortunately there is not that much involved with migrating a normal
    set of Python code to a Lambda. One of the main things we can do is ensure that
    we have logging implemented. We can use the standard Python logger module, anything
    done with this package will automatically be written to CloudWatch.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  id: totrans-32
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: The last step we need to do for this application is leverage a package called
    Mangum. The Mangum package acts as an adapter to bridge an ASGI (Asynchronous
    Server Gateway Interface) framework (like FastAPI) with AWS Lambda and API Gateway.
    It essentially allows you to deploy ASGI applications to AWS Lambda as serverless
    functions.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: Normally, an ASGI framework like FastAPI requires a persistent server to run
    (e.g., Uvicorn). However, AWS Lambda is event-driven and ephemeral, without a
    persistent server running in the background. Mangum bridges this gap by allowing
    FastAPI to function as an AWS Lambda handler. This is all done with a few lines
    of code.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  id: totrans-35
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Building the Lambda Function
  id: totrans-36
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: First, create a new Lambda Function from the AWS Console. Give it an appropriate
    name and make sure to select the proper runtime environment, Python, and whichever
    version suits your application. After the function is created, the one setting
    you probably want to change is the timeout. Its default is 3 seconds, and you
    can safely change that to 30 seconds. This setting can be found under General
    Configuration.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
- en: Creating the Function
  id: totrans-38
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![Image by Author](../Images/ffd19b40b7040cc08e00feb8507440c3.png)'
  id: totrans-39
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
- en: Granting Table Access
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: You will need to grant access to the DynamoDB table you created above by attaching
    an inline policy to the role that was created along with your Lambda function.
    You can navigate there from the Lambda function from the Configuration tab and
    the Permissions section.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
- en: '![Image by Author](../Images/2a0dd8787bcfde4126806e90b2969374.png)'
  id: totrans-43
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  id: totrans-45
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Deploying the Function
  id: totrans-46
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Deploying a Lambda function requires that you package up everything needed for
    your function in a zip file, including libraries that AWS may not have readily
    available in the Lambda environment. Since Lambdas have a file size limitation,
    do NOT package up libraries that are [already installed](https://gist.github.com/gene1wood/4a052f39490fae00e0c3),
    such as boto3, the Python AWS SDK.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
- en: To simplify this, you can create a Bash script that does all of the packaging
    for you. Simply run this to deploy your script and any updates.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  id: totrans-49
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Expose Endpoints with the API Gateway
  id: totrans-50
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The final step here is to expose our Lambda function with the AWS API Gateway.
    We first start by attaching a new API Gateway to the Lambda function from the
    Lambda function page in the AWS Console. Select Add Trigger and then choose API
    Gateway. From here, create a New API Gateway and select HTTP API and set the Security
    to Open.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
- en: The next and most critical step of this process is to map the routes to your
    Lambda function. This is a simple process you can do from the API Gateway console.
    Navigate to your newly created gateway and select Routes from the sidebar. Create
    a new route for each of the routes in your Lambda function. You can additionally
    include ones that are autogenerated by FastAPI, such as `/docs`.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
- en: After you have added all your routes, navigate to the Integrations section via
    the sidebar and then for each route, attach the Lambda function to the endpoint.
    This will tell the API gateway what to fire when it receives a request from the
    route.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
- en: '**Note**: You can also set up custom rate limits for your API from the console
    under Throttling.'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
- en: '![Image by Author](../Images/16caaef46c34669d7696095cb7b5cf7b.png)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
- en: Testing Your API with Streamlit
  id: totrans-57
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: If you’re a regular reader of this blog, you know that we’re a huge fan of Streamlit.
    It’s so easy to build a quick UI for data-driven apps. So, of course, we used
    that to build out a little test harness for our API.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
- en: One of the core concepts you will use when you work with a RESTful API is `requests`.
    This package allows you to make the various web API calls that we set up in our
    API. Let’s take a look at the first one, the GET Items Route.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  id: totrans-60
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: You’ll see in the try block that we use requests.get and simply directly call
    the API. This will return `JSON` that contains the results of your query. In our
    case, we can simply make a Pandas DataFrame directly from this and display it
    in Streamlit with the `st.dataframe()` function.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
- en: When it comes to the other verbs for our API ( `POST, PUT, DELETE`), we can
    follow a similar convention. Let’s take a look at the code for `EDIT`.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  id: totrans-63
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: To update a record we utilize `requests.put` and then pass it the URL per our
    API specification, and finally include the `JSON` needed to update the item. In
    this case, we only have three fields in our table, and we can simply create a
    dictionary with the key-value pairs that we want to update.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
- en: 'Note: The Add Item API is the exact same pattern except you use `requests.post`.'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
- en: '![Image by Author](../Images/06ff4995ddb882df4d7dd0b27250660a.png)'
  id: totrans-66
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
- en: As always, feel free to check out the full working source code on [GitHub](https://github.com/broepke/dynamo-api).
    This is a really fun application for you to try on your own! There are some additional
    setup and configuration steps in the README for the repo, which might be helpful
    if you’re trying to set up your own.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  id: totrans-69
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In conclusion, building your own API on top of DynamoDB using AWS services like
    Lambda and API Gateway is not only a rewarding experience but also a practical
    skill that can enhance your understanding of cloud-based applications. By following
    the steps outlined in this article, you have learned how to create a robust and
    scalable API that can be easily integrated with various platforms. Whether you’re
    looking to streamline data access, improve security, or simply explore new technologies,
    this project offers a comprehensive introduction to API development in a serverless
    environment. As you continue to experiment and refine your skills, remember that
    the possibilities are endless, and the knowledge gained here can be applied to
    countless other projects. Happy coding!
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，在DynamoDB之上使用AWS服务如Lambda和API Gateway构建自己的API不仅是一次有回报的经历，而且是一项实用的技能，它能增强你对基于云应用的理解。通过遵循本文中概述的步骤，你已经学会了如何创建一个强大且可扩展的API，它可以轻松地与各种平台集成。无论你是想简化数据访问、提高安全性，还是仅仅探索新技术，这个项目都为你提供了一个在无服务器环境中进行API开发的全面介绍。随着你继续实验和磨练技能，请记住，可能性是无限的，在这里获得的知识可以应用于无数其他项目。祝您编码愉快！
