- en: How Do Grayscale Images Affect Visual Anomaly Detection?
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/how-do-grayscale-images-affect-visual-anomaly-detection/](https://towardsdatascience.com/how-do-grayscale-images-affect-visual-anomaly-detection/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <mdspan datatext="el1753385948608" class="mdspan-comment">Content</mdspan>
  prefs: []
  type: TYPE_NORMAL
- en: '**Introduction:** Why grayscale images might affect anomaly detection.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Anomaly detection, grayscale images:** Quick recap on the two main subjects
    discussed in this article.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Experiment setting:** What and how we compare.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Performance results:** How grayscale images affect model performance.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Speed results:** How grayscale images affect inference speed.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Conclusion**'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**1.** Introduction'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this article, we’ll explore how grayscale images affect the performance of
    anomaly detection models and examine how this choice influences inference speed.
  prefs: []
  type: TYPE_NORMAL
- en: 'In computer vision, it’s well established that fine-tuning pre-trained classification
    models on grayscale images can [lead to degraded performance](https://towardsdatascience.com/transfer-learning-on-greyscale-images-how-to-fine-tune-pretrained-models-on-black-and-white-9a5150755c7a/).
    But what about [anomaly detection models](https://blog.ml6.eu/a-practical-guide-to-anomaly-detection-using-anomalib-b2af78147934)?
    These models do not require fine-tuning, but they use pre-trained classification
    models such as WideResNet or EfficientNet as feature extractors. This raises an
    important question: do these feature extractors produce less relevant features
    when applied to a grayscale image?'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/1a07b2ebaf711faf9ca3184c645a135c.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Image taken from the [VisA dataset](https://github.com/amazon-science/spot-diff)
    (CC-BY-4.0) and processed using [Anomalib library](https://github.com/open-edge-platform/anomalib)*'
  prefs: []
  type: TYPE_NORMAL
- en: This question is not just academic, but one with real-world implications for
    anyone working on automating industrial visual inspection in manufacturing. For
    example, you might find yourself wondering if a color camera is necessary or if
    a cheaper grayscale one will be sufficient. Or you could have concerns regarding
    the inference speed and want to use any opportunity to increase it.
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Anomaly detection, grayscale images
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: If you are already familiar with both anomaly detection in computer vision and
    the basics of digital image representation, feel free to skip this section. Otherwise,
    it provides a brief overview and links for further exploration.
  prefs: []
  type: TYPE_NORMAL
- en: Anomaly detection
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In computer vision, anomaly detection is a fast-evolving field within deep learning
    that focuses on identifying unusual patterns in images. Typically, these models
    are trained using only images without defects, allowing the model to learn what
    “normal” looks like. During inference, the model can detect images that deviate
    from this learned representation as abnormal. Such anomalies often correspond
    to various defects that may appear in a production environment but were not seen
    during training. For a more detailed introduction, see [this link](https://blog.ml6.eu/a-practical-guide-to-anomaly-detection-using-anomalib-b2af78147934).
  prefs: []
  type: TYPE_NORMAL
- en: Grayscale images
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: For humans, color and grayscale images look quite similar (aside from the lack
    of color). But for computers, an image is an array of numbers, so it becomes a
    little bit more complicated. A grayscale image is a two-dimensional array of numbers,
    typically ranging from 0 to 255, where each value represents the intensity of
    a pixel, with 0 being black and 255 being white.
  prefs: []
  type: TYPE_NORMAL
- en: In contrast, color images are typically composed of three such separate grayscale
    images (called channels) stacked together to form a three-dimensional array. Each
    channel ([red, green, and blue](https://en.wikipedia.org/wiki/RGB_color_model))
    describes the intensity of the respective color, and its combination creates a
    color image. You can learn more about this [here](https://towardsdatascience.com/transfer-learning-on-greyscale-images-how-to-fine-tune-pretrained-models-on-black-and-white-9a5150755c7a/).
  prefs: []
  type: TYPE_NORMAL
- en: '**3.** Experiment setting'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Models
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'We will use four [state-of-the-art](https://arxiv.org/abs/2503.23451) anomaly
    detection models: [PatchCore](https://arxiv.org/abs/2106.08265), [Reverse Distillation](https://arxiv.org/abs/2201.10703),
    [FastFlow](https://arxiv.org/abs/2111.07677), and [GLASS](https://arxiv.org/abs/2407.09359).
    These models represent different types of anomaly detection algorithms and, at
    the same time, they are widely used in practical applications due to fast training
    and inference speed. The first three models use the implementation from the [Anomalib
    library](https://github.com/open-edge-platform/anomalib), for GLASS we employ
    the [official implementation](https://github.com/cqylunlun/GLASS).'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/82beb2ddaaec47770de625a440b59519.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Image by author*'
  prefs: []
  type: TYPE_NORMAL
- en: Dataset
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: For our experiments, we use the [VisA](https://github.com/amazon-science/spot-diff)
    dataset with 12 categories of objects, which provides a variety of images and
    has no color-dependent defects.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b54ccf12866511d112878e1709b1a720.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Image taken from *the [VisA dataset](https://github.com/amazon-science/spot-diff)
    (CC-BY-4.0)**'
  prefs: []
  type: TYPE_NORMAL
- en: Metrics
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We will use image-level [AUROC](https://lightning.ai/docs/torchmetrics/stable/classification/auroc.html)
    to see if the whole image was classified correctly without the need to select
    a particular threshold, and pixel-level [AUPRO](https://ieeexplore.ieee.org/document/8954181),
    which shows how good we are at localizing defective areas in the image. Speed
    will be evaluated using the frames-per-second (FPS) metric. For all metrics, higher
    values correspond to better results.
  prefs: []
  type: TYPE_NORMAL
- en: Grayscale conversion
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: To make an image grayscale, we will use [torchvision transforms](https://docs.pytorch.org/vision/master/auto_examples/transforms/plot_transforms_getting_started.html).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/515b7edf818b3406097cb4dca7bb3502.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Image by author*'
  prefs: []
  type: TYPE_NORMAL
- en: For one channel, we also modify feature extractors using the *in_chans* parameter
    in the [timm library](https://timm.fast.ai/).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/70446d41e1ea3cd544fa19cc6769f092.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Image by author*'
  prefs: []
  type: TYPE_NORMAL
- en: The code for adapting Anomalib to use one channel is available [here](https://github.com/abc-125/viad-benchmark/blob/main/notebooks/grayscale.ipynb).
  prefs: []
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 4\. Performance results
  prefs: []
  type: TYPE_NORMAL
- en: '**RGB**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: These are regular images with red, blue, and green channels.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e9a24019c9038b734e000845fb0d0b58.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Image by author*'
  prefs: []
  type: TYPE_NORMAL
- en: Grayscale, three channels
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Images were converted to grayscale using torchvision transform [Grayscale](https://docs.pytorch.org/vision/main/generated/torchvision.transforms.Grayscale.html)
    with three channels.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/0061f3c0f7e876839ee81449eecf4666.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Image by author*'
  prefs: []
  type: TYPE_NORMAL
- en: Grayscale, one channel
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Images were converted to grayscale using the same torchvision transform Grayscale
    with one channel.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/052b8448eb3bd5ee6877108a766d89c0.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Image by author*'
  prefs: []
  type: TYPE_NORMAL
- en: Comparison
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We can see that **PatchCore** and **Reverse Distillation** have close results
    across all three experiments for both image and pixel-level metrics. **FastFlow**
    becomes somewhat worse, and **GLASS** becomes noticeably worse. Results are averaged
    across the 12 categories of objects in the VisA dataset.
  prefs: []
  type: TYPE_NORMAL
- en: What about results per category of objects? Maybe some of them perform worse
    than others, and some better, causing the average results to appear the same?
    Here is the visualization of results for PatchCore across all three experiments
    showing that results are quite stable within categories as well.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/5da67bd6de3aed9a338e093b816e2bbe.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Image by author*'
  prefs: []
  type: TYPE_NORMAL
- en: The same visualization for GLASS shows that some categories can be slightly
    better while some can be strongly worse. However, this is not necessarily caused
    by grayscale transformation only; some of it can be regular result fluctuations
    due to how the model is trained. Averaged results show a clear tendency that for
    this model, RGB images produce the best result, grayscale with three channels
    somewhat worse, and grayscale with one channel the worst result.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c83328d0918e8c468bf00b5c2845421e.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Image by author*'
  prefs: []
  type: TYPE_NORMAL
- en: Bonus
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: How do results change per category? It is possible that some categories are
    simply better suited for RGB or grayscale images, even if there are no color-dependent
    defects.
  prefs: []
  type: TYPE_NORMAL
- en: Here is the visualization of the difference between RGB and grayscale with one
    channel for all the models. We can see that only pipe_fryum category becomes slightly
    (or strongly) worse for every model. The rest of the categories become worse or
    better, depending on the model.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d3b3bd530850e1a98b2dbf5cf8848f4e.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Image by author*'
  prefs: []
  type: TYPE_NORMAL
- en: Extra bonus
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: If you are interested in how this pipe_fryum looks, here are a couple of examples
    with GLASS model predictions.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/476252f86d6f0aafdded0d7c5dd3a8f8.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Images taken from *the [VisA dataset](https://github.com/amazon-science/spot-diff)
    (CC-BY-4.0)* and processed using [GLASS](https://arxiv.org/abs/2407.09359) and
    [Anomalib library](https://github.com/open-edge-platform/anomalib)*'
  prefs: []
  type: TYPE_NORMAL
- en: 5**.** Speed results
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The number of channels affects only the first layer of the model, the rest remains
    unchanged. The speed improvement seems to be negligible, highlighting how the
    first layer feature extraction is just a small part of the calculations performed
    by the models. GLASS shows a somewhat noticeable improvement, but at the same
    time, it shows the worst metrics decline, so it requires caution if you want to
    speed it up by switching to one channel.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/09eb9e64cc1c23f4972a39b101f5b5a4.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Image by author*'
  prefs: []
  type: TYPE_NORMAL
- en: 6\. Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: So how does using grayscale images affect visual anomaly detection? **It depends,
    but RGB seems to be the safer bet**. The impact varies depending on the model
    and data. PatchCore and Reverse Distillation generally handle grayscale inputs
    well, but you need to be more careful with FastFlow and especially GLASS, which
    shows some speed improvement but also the most significant drop in performance
    metrics. If you want to use grayscale input, you need to test and compare it with
    RGB on your specific data.
  prefs: []
  type: TYPE_NORMAL
- en: 'The jupyter notebook with the Anomalib code: [link](https://github.com/abc-125/viad-benchmark/blob/main/notebooks/grayscale.ipynb).'
  prefs: []
  type: TYPE_NORMAL
- en: Follow author on [LinkedIn](https://www.linkedin.com/in/aimira-baitieva/) for
