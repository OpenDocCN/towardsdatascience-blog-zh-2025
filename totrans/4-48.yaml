- en: Does It Matter That Online Experiments Interact?
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 在线实验交互是否重要？
- en: 原文：[https://towardsdatascience.com/does-it-matter-that-online-experiments-interact-9c4012b75fbd/](https://towardsdatascience.com/does-it-matter-that-online-experiments-interact-9c4012b75fbd/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/does-it-matter-that-online-experiments-interact-9c4012b75fbd/](https://towardsdatascience.com/does-it-matter-that-online-experiments-interact-9c4012b75fbd/)
- en: '![Photo by Uriel Soberanes on Unsplash](../Images/7c11e31594f26901e51ecfda332ef8e9.png)'
  id: totrans-2
  prefs: []
  type: TYPE_IMG
  zh: '![由Uriel Soberanes在Unsplash上的照片](../Images/7c11e31594f26901e51ecfda332ef8e9.png)'
- en: Photo by [Uriel Soberanes](https://unsplash.com/@soberanes?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on [Unsplash](https://unsplash.com/photos/two-bisons-fighting-head-L1bAGEWYCtk?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 由[Uriel Soberanes](https://unsplash.com/@soberanes?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)在[Unsplash](https://unsplash.com/photos/two-bisons-fighting-head-L1bAGEWYCtk?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)上的照片
- en: 'Experiments do not run one at a time. At any moment, hundreds to thousands
    of experiments run on a mature website. The question comes up: what if these experiments
    interact with each other? Is that a problem? As with many interesting questions,
    the answer is "yes and no." Read on to get even more definite, actionable, entirely
    clear, and confident takes like that!'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 实验并不是一个接一个地运行的。在任何时刻，一个成熟的网站上可能同时运行数百到数千个实验。问题随之而来：如果这些实验相互交互，那会是个问题吗？正如许多有趣的问题一样，答案是“是”和“否”。继续阅读以获得更明确、可操作、完全清晰和自信的观点！
- en: 'Definitions: Experiments **interact** when the treatment effect for one experiment
    depends on which variant of another experiment the unit gets assigned to.'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 定义：当某个实验的治疗效果取决于单位被分配到另一个实验的哪个变体时，实验**交互**。
- en: 'For example, suppose we have an experiment testing a new search model and another
    testing a new recommendation model, powering a "people also bought" module. Both
    experiments are ultimately about helping customers find what they want to buy.
    Units assigned to the better recommendation algorithm may have a smaller treatment
    effect in the search experiment because they are less likely to be influenced
    by the search algorithm: they made their purchase because of the better recommendation.'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，假设我们有一个测试新搜索模型的实验，另一个测试新推荐模型的实验，为“人们也购买了”模块提供动力。这两个实验最终都是为了帮助客户找到他们想要购买的东西。分配给更好的推荐算法的单位在搜索实验中的治疗效果可能较小，因为它们不太可能受到搜索算法的影响：他们是因为更好的推荐而做出购买的。
- en: Some empirical evidence suggests that typical interaction effects are [small](https://www.microsoft.com/en-us/research/articles/a-b-interactions-a-call-to-relax/).
    Maybe you don’t find this particularly comforting. I’m not sure I do, either.
    After all, the size of interaction effects depends on the experiments we run.
    For your particular organization, experiments might interact more or less. It
    might be the case that interaction effects are larger in your context than at
    the companies typically profiled in these types of analyses.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 一些经验证据表明，典型的交互效应是[小的](https://www.microsoft.com/en-us/research/articles/a-b-interactions-a-call-to-relax/)。也许你并不觉得这特别令人安慰。我也不确定。毕竟，交互效应的大小取决于我们进行的实验。对于你的特定组织来说，实验的交互程度可能更多或更少。可能在你所处的环境中，交互效应比在这些类型分析中通常描述的公司要大。
- en: So, this blog post is not an empirical argument. It’s theoretical. That means
    it includes math. So it goes. We will try to understand the issues with interactions
    with an explicit model without reference to a particular company’s data. Even
    if interaction effects are relatively large, we’ll find that they rarely matter
    for *decision-making*. Interaction effects must be massive and have a peculiar
    pattern to affect which experiment wins. The point of the blog is to bring you
    peace of mind.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，这篇博客文章不是经验论证，而是理论性的。这意味着它包含数学。所以就这样。我们将尝试通过一个明确的模型来理解交互问题，而不参考特定公司的数据。即使交互效应相对较大，我们也会发现它们很少对*决策*产生影响。交互效应必须非常巨大，并且具有独特的模式，才能影响哪个实验获胜。博客的目的就是给你带来安心。
- en: Interactions Aren’t So Special, And They Aren’t So Bad
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 交互并不特别，也不那么糟糕
- en: Suppose we have two A/B experiments. Let Z = 1 indicate treatment in the first
    experiment and W = 1 indicate treatment in the second experiment. Y is the metric
    of interest.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我们有两个A/B实验。令Z = 1表示第一个实验的治疗，W = 1表示第二个实验的治疗。Y是感兴趣的指标。
- en: 'The treatment effect in experiment 1 is:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 实验1的治疗效果是：
- en: '![](../Images/10941116b19a4191028414eae4d0f7be.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/10941116b19a4191028414eae4d0f7be.png)'
- en: Let’s decompose these terms to look at how interaction impacts the treatment
    effect.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们分解这些项，看看交互作用如何影响处理效应。
- en: '![](../Images/fd355c9b2d5146224b1ffd4cde0398b4.png)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/fd355c9b2d5146224b1ffd4cde0398b4.png)'
- en: 'Bucketing for one randomized experiment is independent of bucketing in another
    randomized experiment, so:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 对于一个随机实验的桶划分与另一个随机实验的桶划分是独立的，因此：
- en: '![](../Images/9e45153e72572c44b62da9db10ddf035.png)'
  id: totrans-16
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/9e45153e72572c44b62da9db10ddf035.png)'
- en: 'So, the treatment effect is:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，处理效应是：
- en: '![](../Images/6411a9475e52f3ddf8af1e1818c007ef.png)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/6411a9475e52f3ddf8af1e1818c007ef.png)'
- en: 'Or, more succinctly, the treatment effect is the weighted average of the treatment
    effect within the W=1 and W=0 populations:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，更简洁地说，处理效应是 W=1 和 W=0 人群中处理效应的加权平均值：
- en: '![](../Images/bfe4edfc6f43409418812c47b2426989.png)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/bfe4edfc6f43409418812c47b2426989.png)'
- en: One of the great things about just writing the math down is that it makes our
    problem concrete. We can see exactly the form the bias from interaction will take
    and what will determine its size.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 只写下数学表达式的好处之一是它使我们的问题具体化。我们可以确切地看到交互作用偏差的形式以及什么将决定其大小。
- en: 'The problem is this: only W = 1 or W = 0 will launch after the second experiment
    ends. So, the environment during the first experiment will not be the same as
    the environment after it. This introduces the following bias in the treatment
    effect:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 问题在于：只有 W = 1 或 W = 0 会在第二次实验结束后启动。因此，第一次实验期间的环境将不同于之后的实验环境。这会在处理效应中引入以下偏差：
- en: 'Suppose W = w launches, then the post-experiment treatment effect for the first
    experiment, TE(W=w), is mismeasured by the experiment treatment effect, TE, leading
    to the bias:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 假设 W = w 启动，那么第一次实验的实验后处理效应 TE(W=w) 被实验处理效应 TE 错误地衡量，导致偏差：
- en: '![](../Images/9226989b7bb553da43e7d115eab4dc96.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/9226989b7bb553da43e7d115eab4dc96.png)'
- en: If there is an interaction between the second experiment and the first, then
    TE(W=1-w) – TE(W=w) != 0, so there is a bias.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 如果第二次实验和第一次实验之间存在交互作用，那么 TE(W=1-w) – TE(W=w) != 0，因此存在偏差。
- en: '**So, *yes*, interactions cause a bias.** The bias is directly proportional
    to the size of the interaction effect.'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: '**所以，*是的*，交互作用会导致偏差。**偏差与交互作用的大小成正比。'
- en: But **interactions are not special**. **Anything** __ that differs between the
    experiment’s environment and the future environment that affects the treatment
    effect leads to a bias with the same form. Does your product have seasonal demand?
    Was there a large supply shock? Did inflation rise sharply? What about the butterflies
    in Korea? Did they flap their wings?
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 但**交互作用并不特殊**。**任何**在实验环境与影响处理效应的未来环境之间不同的因素都会导致具有相同形式的偏差。你的产品是否有季节性需求？是否发生了大规模的供应冲击？通货膨胀是否急剧上升？韩国的蝴蝶怎么样？它们是否振翅？
- en: Online Experiments are **not** Laboratory Experiments. We cannot control the
    environment. The economy is not under our control (sadly). We always face biases
    like this.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 在线实验**不是**实验室实验。我们无法控制环境。经济不在我们的控制之下（遗憾的是）。我们总是面临这样的偏差。
- en: So, Online Experiments are not about estimating treatment effects that hold
    in perpetuity. They are about **making decisions**. Is A better than B? That answer
    is unlikely to change because of an interaction effect for the same reason that
    we don’t usually worry about it flipping because we ran the experiment in March
    instead of some other month of the year.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，在线实验不是关于估计永久存在的处理效应。它们是关于**做出决策**。A 是否比 B 更好？这个答案不太可能因为交互作用而改变，同样的原因，我们通常不会担心它因为我们在三月而不是在一年中的其他月份进行实验而翻转。
- en: For interactions to matter for decision-making, we need, say, TE ≥ 0 (so we
    would launch B in the first experiment) and TE(W=w) < 0 (but we should have launched
    A given what happened in the second experiment).
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使交互作用对决策产生影响，我们需要，比如说，TE ≥ 0（因此我们会在第一次实验中启动 B），而 TE(W=w) < 0（但根据第二次实验发生的情况，我们应该启动
    A）。
- en: 'TE ≥ 0 if and only if:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 当且仅当 TE ≥ 0 时：
- en: '![](../Images/af9625be7b846eef6b1b38da911a9882.png)'
  id: totrans-32
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/af9625be7b846eef6b1b38da911a9882.png)'
- en: 'Taking the typical allocation pr(W=w) = 0.50, this means:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 以典型的分配概率 pr(W=w) = 0.50 为例，这意味着：
- en: '![](../Images/e26d7ff679dc1805fa1a27e4629fee6b.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/e26d7ff679dc1805fa1a27e4629fee6b.png)'
- en: Because TE(W=w) < 0, this can only be true if TE(W=1-w) > 0\. Which makes sense.
    For interactions to be a problem for decision-making, the interaction effect has
    to be large enough that an experiment that is negative under one treatment is
    positive under the other.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 因为TE(W=w) < 0，这只有在TE(W=1-w) > 0的情况下才成立。这是有道理的。为了使交互成为决策的问题，交互效应必须足够大，以至于在一个治疗方案下为负的实验在另一个治疗方案下为正。
- en: The interaction effect has to be *extreme* at typical 50–50 allocations. If
    the treatment effect is +$2 per unit under one treatment, the treatment must be
    less than -$2 per unit under the other for interactions to affect decision-making.
    To make the wrong decision from the standard treatment effect, we’d have to be
    cursed with massive interaction effects that change the sign of the treatment
    *and* maintain the same magnitude!
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 交互效应在典型的50-50分配中必须非常**极端**。如果在一个治疗方案下，治疗效应为每单位+$2，那么在另一个治疗方案下，治疗效应必须小于每单位-$2，以便交互效应能够影响决策。为了从标准治疗效应中做出错误的决定，我们不得不遭受巨大的交互效应，这些效应会改变治疗的**符号**并保持相同的幅度！
- en: This is why we’re not concerned about interactions and all those other factors
    (seasonality, etc.) that we can’t keep the same during and after the experiment.
    The change in environment would have to radically alter the user’s experience
    of the feature. It probably doesn’t.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是为什么我们不会担心交互以及那些我们无法在实验期间和实验后保持不变的其他因素（季节性等）。环境的变化必须极大地改变用户对功能的体验。这可能并不成立。
- en: It’s always a good sign when your final take includes "probably."
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 当你的最终结论包括"可能"时，这总是一个好迹象。
- en: '* * *'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Thanks for reading!
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢阅读！
