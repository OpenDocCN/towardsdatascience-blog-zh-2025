- en: Data Culture Is the Symptom, Not the Solution
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/data-culture-is-the-symptom-not-the-solution/](https://towardsdatascience.com/data-culture-is-the-symptom-not-the-solution/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*Data culture and data governance are increasingly cited as prerequisites for
    building data-driven organizations. Both are seen as essential for turning investments
    in Business Intelligence and Artificial Intelligence (AI) into business value.
    But here is the catch: data governance can be actively designed — data culture
    cannot.*'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: '**This article is a detailed deep-dive of the* [*management summary published
    on CIO.com*](https://www.cio.com/article/4081999/stop-trying-to-engineer-data-culture.html)*.
    It *explores the true role of data culture when an organization sets out to become
    data-driven — a role that may be quite different from what you expect. Drawing
    on modern organizational theory, I offer a practical approach to move beyond failed
    ‘data culture’ initiatives and propose a way of thinking that finally unlocks
    the value of your data and AI investments. *'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: '*An appendix provides a* ***Data Culture Cheat*** *Sheet that distills the
    key points for immediate* use.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: '*[*I am Jens*](https://jens-linden.de/)*, a business-minded** *data expert
    with two decades of experience helping business leaders across industries unlock
    the full potential of data and algorithms.*'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: tl;dr
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Many data initiatives stay behind expectations not because of technology, but
    because leaders misunderstand culture.
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Culture is an emergent property of an organization, not an object of design.
    It can be diagnosed and influenced indirectly, but never directly shaped or engineered
    into a desired form.
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Therefore, unlike data governance, data culture cannot be treated as a prerequisite
    for value creation with data and artificial intelligence. It is effect not cause.
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The real use of data culture is diagnostic: like a sensor, it helps to reveal
    the hidden barriers to leveraging data as an asset.'
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Once the root causes of these barriers are identified, leaders can design targeted
    interventions that improve data value creation. When interventions have an effect,
    this indirectly shifts data culture as a side effect.
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'True *data value creation* is possible when both are considered together: governance
    providing the reliable foundation, and culture enabling its effective application.'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '* * *'
