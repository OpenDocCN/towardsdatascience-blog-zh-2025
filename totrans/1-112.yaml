- en: 1 Why do organizations strive for data culture?
  id: totrans-34
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1 为什么组织追求数据文化？
- en: 'Most organizations aim to become data-driven in order to harvest the promised
    potentials of data being an organizational asset. They aim to apply techniques
    such as Business Intelligence (BI) or Artificial Intelligence (AI) to re-use operational
    data for analytical purposes. Applications include:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数组织都旨在成为数据驱动型，以利用数据作为组织资产所承诺的潜力。他们旨在应用诸如商业智能（BI）或人工智能（AI）等技术，将运营数据用于分析目的。应用包括：
- en: '**Control**: Reports or BI dashboards are used for monitoring and oversight'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**控制**：报告或BI仪表板用于监控和监督'
- en: '**Automation**: Tasks to address *complicated* business challenges can be automated'
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自动化**：可以自动化处理解决复杂商业挑战的任务'
- en: '**Decision making**: Insights derived from data can sometimes support (not
    substitute!) human intuition required for decision-making to address *comple*x
    business problems'
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**决策制定**：从数据中得出的见解有时可以支持（而不是替代！）解决复杂商业问题所需的人类直觉'
- en: '**Innovation**: Creating insights that help ask (and answer) the right questions
    about customers, competitors, technology, and industry trends'
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**创新**：创造有助于提出（并回答）关于客户、竞争对手、技术和行业趋势的正确问题的见解'
- en: Despite the promised benefits [many businesses struggle to unlock the value
    of their data [1]](https://hbr.org/2022/02/why-becoming-a-data-driven-organization-is-so-hard).
    And this is not a new problem. BI, Analytics and AI — not just large language
    models, but also Data Science and Machine Learning — have been around for many
    decades. Yet, turning data into measurable outcomes remains a challenge for many
    organizations.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管承诺了诸多好处，[许多企业仍难以释放其数据的价值 [1]](https://hbr.org/2022/02/why-becoming-a-data-driven-organization-is-so-hard)。这并非新问题。商业智能（BI）、分析学和人工智能（AI）——不仅仅是大型语言模型，还包括数据科学和机器学习——已经存在了几十年。然而，将数据转化为可衡量的成果仍然是许多组织的挑战。
- en: As a result, in addition to [strategic clarity [2]](https://towardsdatascience.com/how-most-organizations-get-data-strategy-wrong-and-how-to-fix-it-b8afa59f1533/),
    the term *data cultur*e is increasingly [cited as a key success factor for organizations
    to become data-driven [3]](https://sloanreview.mit.edu/article/building-a-data-driven-culture-four-key-elements/).
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，除了[战略清晰度 [2]](https://towardsdatascience.com/how-most-organizations-get-data-strategy-wrong-and-how-to-fix-it-b8afa59f1533/)之外，术语*数据文化*越来越多地[被引用为组织成为数据驱动型成功的关键因素
    [3]](https://sloanreview.mit.edu/article/building-a-data-driven-culture-four-key-elements/)。
- en: But what exactly is data culture? Is it really the precondition for turning
    data into business value? And is it possible to actively shape it into a desired
    form, such that value creation with data succeeds?
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 但数据文化究竟是什么？它真的是将数据转化为商业价值的前提条件吗？并且我们能否积极地将其塑造为期望的形式，从而实现数据价值创造的成功？
- en: Since data culture is ultimately a perspective on the overall organizational
    culture, it is crucial to first align on what organizational culture is and how
    it should be approached.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 由于数据文化最终是对整体组织文化的看法，因此首先就组织文化是什么以及如何接近它达成一致至关重要。
- en: 2 Organizational culture
  id: totrans-44
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2 组织文化
- en: 2.1 Limitations of mainstream approaches
  id: totrans-45
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.1 主流方法的局限性
- en: 'Organizational culture has been a well-established field of study in sociology
    [[4](https://www.taylorfrancis.com/books/mono/10.4324/9781315242804/sociological-paradigms-organisational-analysis-gareth-morgan-gibson-burrell),
    [5](https://www.amazon.de/-/en/Images-Organization-Gareth-Morgan/dp/1412939798),
    [6](https://www.abebooks.com/book-search/title/organizational-culture-leadership/first-edition/)]
    for many decades. Yet many executives report that cultural change and transformation
    efforts are still among the most difficult challenges organizations face. Although
    the [famously quoted failure rate about 70% [7]](https://hbr.org/2000/05/cracking-the-code-of-change)
    is [subject to debate [8]](https://www.researchgate.net/publication/233202794_Do_70_Per_Cent_of_All_Organizational_Change_Initiatives_Really_Fail),
    there is broad consensus on one point: cultural change is far from trivial and
    many initiatives stay behind expectations. Why is this the case?'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
- en: 'Modern organizational theory based on Luhmann’s system theory [[9](https://www.transcript-verlag.de/978-3-8376-5674-9/unlocking-luhmann/?number=978-3-8394-5674-3),
    [10](https://luhmann.ir/wp-content/uploads/2021/07/Organization-and-Decision.pdf),
    [11](https://pure.au.dk/ws/portalfiles/portal/430217389/1352_Paper_0327100359.pdf)]
    offers an answer: Whilst many business leaders implicitly assume that culture
    is something that can be intentionally shaped, from a systems-theoretic perspective
    this is not possible. Consequently, the high failure rates of cultural change
    initiatives are not surprising, as many initiatives are designed based on a flawed
    assumption when taking on a systems-theoretic perspective.'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
- en: Luhmann conceptualized organizations as self-reproducing, complex social systems
    of decision communication. Culture, in this view, is *not* an object that can
    be directly designed, but a latent structure of meaning that guides and constrains
    decisions.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
- en: Culture is an emergent product of organizational communication. It can be observed,
    perturbed, or nudged, but can never be engineered.
  id: totrans-49
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Applying these insights can increase the success rate for change and transformation
    initiatives in practice, justifying the increasing interest in systems theory
    for researchers and practitioners alike [[12](https://www.researchgate.net/publication/258174061_Organizations_as_Distinction_Generating_and_Processing_Systems_Niklas_Luhmann%27s_Contribution_to_Organization_Studies),
    [13](https://www.amazon.de/befreiende-wirksame-Organisationsentwicklung-Mitarbeitermotivation-Leadership/dp/3947886128),
    [14](https://www.amazon.de/Denkwerkzeuge-H%C3%B6chstleister-dynamikrobuste-Unternehmen-Marktdruck/dp/3934900119)].
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
- en: 2.2 Definition of organizational culture
  id: totrans-51
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Adopting a systems-theoretic perspective here, organizational culture can be
    loosely defined as the largely unspoken and partly subconscious rules in an organization,
    the latter being a particular type of complex social system. Its purpose is to
    inform members of the organization about the expected behavior and thus makes
    certain actions more likely than others.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
- en: Organizational culture determines how things are done around here.
  id: totrans-53
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Culture acts as a so-called undecidable decision premise — a filter that becomes
    increasingly important in *complex* contexts, where individuals must decide and
    act more and more autonomously [14].
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
- en: 'Typical examples of such unspoken and subconscious rules (culture) include:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
- en: People help each other here
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We deal openly with mistakes
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In meetings, the highest-ranking person speaks first
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 2.3 Implications for cultural work
  id: totrans-59
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Adopting the systems-theoretic viewpoint provides new insights for cultural
    work in an organization:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
- en: Culture is not the cause but the effect of prevailing conditions.
  id: totrans-61
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Thus, [the assumption that a ‘good culture’ is a precondition for successful
    value creation does not hold [14]](https://www.amazon.de/Denkwerkzeuge-H%C3%B6chstleister-dynamikrobuste-Unternehmen-Marktdruck/dp/3934900119).
    Culture is better understood as a symptom of underlying problems (or successes)
    in value creation.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
- en: 'Several practical consequences follow from the systems-theoretic foundation
    for work with organizational culture:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
- en: '**Change context, not people**: Leaders should shift focus from changing people
    or their ‘mindset’ to changing context, as this is the bigger lever for achieving
    behavioral change.'
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Avoid culture-design initiatives:** Attempts to engineer an ‘optimal’ target
    culture have inherently low success rates and should be avoided.'
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Use culture as a diagnostic tool:** Treat culture as a sensor for hidden
    obstacles to value creation, rather than a variable that can be directly shaped.
    Use it to uncover the root causes that explain seemingly irrational behavior blocking
    value creation.'
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Work through small interventions and feedback loops:** Design and probe interventions
    that change the context people work in and observe the feedback, such that the
    obstacles are resolved. Possible interventions are changes in structures, management
    systems, the setup of interpersonal exchanges, or protecting (new) ways of working.'
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Beware of blueprints**: Organizations are complex social systems. As such,
    you cannot expect causality. What works in one context may fail in another. Therefore,
    learning from successful organizations has often limited value.'
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The real value of culture work therefore lies in identifying unseen barriers,
    experimenting with small context-specific interventions, and allowing more suitable
    patterns to emerge — rather than trying to engineer a desired target picture of
    culture, e.g., through designed corporate values.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
- en: 3 Data culture
  id: totrans-70
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 3.1 Definition and value of data culture
  id: totrans-71
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Data culture is merely a specific perspective on organizational culture. One
    potential definition might be:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
- en: Data culture focuses on the shared habits, values, and informal rules that decide
    how we use data here to create or protect business value
  id: totrans-73
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Because data culture is ultimately organizational culture in action, the principles
    from Section 2 apply: you cannot engineer a desired data culture directly, nor
    is it possible to define universal best practices to influence data culture in
    a desired way.'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
- en: Instead, organizations should use data culture to identify barriers that block
    the use of data as an asset, and then probe small interventions which gradually
    remove those obstacles. When successful, a suitable data culture will emerge by
    itself, once the value creation with data is functioning effectively.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
- en: 'As for organizational culture in general, the real value of data cultural work
    lies in its diagnostic power:'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
- en: '**Sensor:** Reveals hidden problems in data value creation'
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Lever identification:** Points to root causes instead of symptoms'
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Early indicator:** Shows whether an intervention is beginning to work'
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Risk management**: Flags unintended side-effects during digital transformation'
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 3.2 Fields of analysis for identifying data-cultural barriers
  id: totrans-81
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Where to start when identifying data-cultural barriers? It has proven helpful
    to look at typically relevant aspects of data culture. One possible collection
    of such aspects are the following six fields of analysis and their corresponding
    success patterns that often appear when cultural barriers are being addressed
    successfully. These should not be treated as target patterns for data culture
    design, but as perspectives to look at in order to identify relevant barriers.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/8a2ed2409f44bc62f9683f0ac72e33f7.png)'
  id: totrans-83
  prefs: []
  type: TYPE_IMG
- en: 'Figure 1: Data culture fields of analysis for identifying data-cultural barriers.'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
- en: '**Data Awareness:** Leaders and employees understand both the opportunities
    *and* limitations of data-driven value creation'
  id: totrans-85
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Data Leadership:** Leaders actively demand and champion data-informed ways
    of working — where they add value'
  id: totrans-86
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Data Literacy:** All members of the organization possess the relevant interdisciplinary
    competencies to use data in a value-creating way'
  id: totrans-87
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Insight-Based Way of Working:** Everyone in the organization is willing to
    explore and exploit data’s potential for value creation'
  id: totrans-88
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Collaborative Way of Working:** Data and insights are shared willingly and
    proactively across boundaries'
  id: totrans-89
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Data Availability:** Users can access the data relevant to them — easily,
    securely, and in time'
  id: totrans-90
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: These patterns are signals to monitor, not targets to engineer. Their formation
    indicates that barriers are being reduced and that data culture is beginning to
    shift as a byproduct of successful interventions.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
- en: 4 Data governance vs. data culture
  id: totrans-92
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 4.1 Data value creation
  id: totrans-93
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Data governance is another perceived precondition for organizations to become
    data-driven. But how does it relate to data culture?
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
- en: 'The term data governance is not uniquely defined, but one frequently quoted
    definition is that of [[15](https://dama.org/learning-resources/dama-data-management-body-of-knowledge-dmbok/)]:'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
- en: “Data governance is defined as the exercise of authority and control (planning,
    monitoring, and enforcement) over the management of data assets”
  id: totrans-96
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Using this common definition, data governance is mainly about implementing processes,
    roles, and responsibilities to enable sustainable value creation with data. It
    covers the formal rules to enable value creation with data. These formal rules
    can be enforced by management with argument, rewards, or punishment. It therefore
    complements data culture.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
- en: 'Data culture and data governance are two sides of the same coin: governance
    brings order to the complicated, whilst culture creates adaptability in the complex.'
  id: totrans-98
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The key is to see data governance and data culture not as separate initiatives,
    but as two essential modes whose interplay contributes to *data value creation:*
    the ongoing organizational process in which data is used, interpreted, and integrated
    into decisions to generate business value.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
- en: 4.2 Distinguishing data governance and data culture
  id: totrans-100
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The interplay between data governance and data culture is best understood by
    observing it through the lens of a powerful [guiding distinction used in organizational
    design [14]](https://www.amazon.de/Denkwerkzeuge-H%C3%B6chstleister-dynamikrobuste-Unternehmen-Marktdruck/dp/3934900119)
    and [management literature [16]](https://hbr.org/2007/11/a-leaders-framework-for-decision-making):
    the distinction between the *complicated* and the *complex*.'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
- en: Data governance is the attempt to master the complicated, while data culture
    is the emergent result of navigating the complex. This guiding distinction manifests
    across the organization in further corresponding distinctions.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ca5bded243124feb215cffc87169f3bd.png)'
  id: totrans-103
  prefs: []
  type: TYPE_IMG
- en: 'Figure 2: Data governance and data culture are two sides of the same coin for
    data-driven decision making.'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
- en: '**1 Context: Complicated / complex**'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
- en: This is the guiding distinction from which all others follow. Complicated contexts
    are knowable and predictable, even if they are difficult. Their interactions follow
    clear cause-and-effect relationships. With a sufficient blueprint and expertise,
    a desired outcome can be engineered. Data governance is the primary tool for mastering
    the complicated, e.g. defining who may access data or ensuring that data quality
    is sufficient.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
- en: Complex contexts are unpredictable and emergent. Cause-and-effect relationships
    are not clear in advance and are constantly shifting. Data culture allows an organization
    to effectively navigate the complex, e.g. when employees need to decide to address
    complex business problems, they proactively share analytical insights to improve
    their decision making.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
- en: '**2 Primary focus: The foundation / the application**'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
- en: 'This distinction highlights what each mode prioritizes in the journey from
    data to value. Data governance focuses on creating a reliable foundation. Its
    primary concern is to render data a stable, predictable, and manageable object — the
    data asset itself. This is largely a complicated task: it involves defining rules
    ensuring quality, and structuring access according to clear cause-and-effect relationships.'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
- en: Data culture, in contrast, enables the effective application of that foundation
    in the event of the decision-making moment. It determines if and how that stable
    foundation is actually used by people to navigate uncertainty and create business
    value.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
- en: '**3 Management: Command and control / commitment by choice**'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
- en: 'Data governance relies on command and control — the exercise of formal, positional
    authority. In contrast, data culture cannot be dictated. It enables decision-making
    in complex contexts through commitment by choice: an emergent phenomenon where
    people follow informal leaders based on voluntarily granted trust and perceived
    competence [[13](https://www.amazon.de/befreiende-wirksame-Organisationsentwicklung-Mitarbeitermotivation-Leadership/dp/3947886128),
    [14](https://www.amazon.de/Denkwerkzeuge-H%C3%B6chstleister-dynamikrobuste-Unternehmen-Marktdruck/dp/3934900119)].'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
- en: '**4 Rules: Formal / informal**'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
- en: 'Data governance operates through formal, explicit, written rules found in policies
    and processes. These manifest as tangible artifacts: written policies, process
    diagrams, role descriptions, or data quality KPIs.'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
- en: 'Data culture operates through informal, unwritten social norms and routines
    that dictate ‘how things are really done around here’. These manifest as invisible
    but decisive premises that guide action: the level of trust in a dashboard, the
    perceived relevance of data, the willingness to share insights, or the psychological
    safety to challenge data-driven assumptions.'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
- en: '**5 Decisions: Work by the book / decide autonomously**'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
- en: Data governance requires people to work by the book to ensure consistency and
    standardization. This is execution — no decision required.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
- en: Data culture helps people to decide autonomously in the face of uncertainty.
    Either by combining the available data with intuition, or by asking the right
    questions about customers, competitors, technology, and industry trends, which
    then requires identifying what data might be missing to validate hypotheses.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
- en: '**6 Goal: Stability / adaptability**'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
- en: Data governance aims to create stability, a predictable and reliable foundation
    where data quality is consistent, access is controlled, and processes follow defined
    standards. This stability enables reliability and compliance and allows organizations
    to use data for decision making with confidence.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
- en: Data culture aims to enable adaptability, the capability to respond effectively
    to changing business demands, emerging opportunities, and unexpected challenges.
    This adaptability allows organizations to survive and thrive in dynamic settings
    and to leverage data in novel ways.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
- en: '**7 Creation: Can be enforced / needs to emerge**'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
- en: This captures the fundamental difference in their origin and emphasizes one
    of the key messages in this article. Data governance needs to be designed and
    enforced, whilst data culture needs to emerge as an indirect result of the prevailing
    structural conditions.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
- en: '4.3 The interplay: A virtuous cycle'
  id: totrans-124
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: While the primary path of influence flows from data governance to data culture — with
    governance providing the reliable foundation for culture to emerge — the interplay
    goes both ways. A strong data culture brings the formal, complicated structures
    of governance to life.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
- en: 'Some examples are:'
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
- en: '**Data quality — **Data governance can define a data quality rule, but a culture
    of accountability motivates an employee to proactively report an anomaly observation.'
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Metadata management — **Data governance can mandate the creation of a data
    catalog, but only a culture of collaboration can ensure its ongoing curation with
    the rich, contextual, and up-to-date metadata that makes it truly valuable.'
  id: totrans-128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Data acquisition — **Data governance can define the processes for acquiring
    data, but a culture of inquiry constantly generates new business hypotheses that
    need testing, driving the acquisition of entirely new datasets through those very
    processes.'
  id: totrans-129
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This feedback loop between data governance and data culture creates a virtuous
    cycle. The designed, complicated systems of governance and the emergent, complex
    behaviors of culture continuously reinforce and improve each other, driving data
    value creation far beyond what rules alone could enforce. The practical example
    in Section 6 will also illustrate this effect.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
- en: 5 A tool to design and probe cultural interventions
  id: totrans-131
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: How can we put the above theory into practice? How can we identify the cultural
    patterns that hinder value generation with data and AI and design interventions
    that address their root causes?
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
- en: There are certainly different ways to approach culture work in an organization,
    here I select an approach, which we have successfully applied in our consulting
    practice. To structure the process of uncovering cultural patterns and designing
    interventions, we draw inspiration from the so-called [Culture Board [17]](https://www.amazon.de/Kulturarchitekt-Culture-Unternehmenskultur-analysieren-ver%C3%A4ndern/dp/3947711905).
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/72db36a7e3a692b7cc66dbf83b1fe612.png)'
  id: totrans-134
  prefs: []
  type: TYPE_IMG
- en: 'Figure 3: Modified culture board.'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
- en: 'Starting from a validated business need, the board guides you through identifying
    data-cultural barriers, condensing what you discovered, designing connectable
    interventions, and finally implementing and assessing them. In detail, the five
    steps are:'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
- en: '**Step 1 — Business Need**: Frame your guiding organizational problem clearly.
    Then trace it to its root cause to avoid treating symptoms. Document the business
    need to ensure a shared understanding between stakeholders. Hint: becoming data-driven
    is not your business need, it might be your solution.'
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Step 2 — Identify**: Analyze the data culture in light of the business need.
    What cultural patterns are in its way? The six fields of analysis from above can
    help to spot concrete barriers.'
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Step 3 — Sense**: Distill, integrate and document the barriers you have discovered
    to focus on what matters.'
  id: totrans-139
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Step 4 — Creating**: Design connectable interventions that are likely to
    address the barriers.'
  id: totrans-140
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Step 5 — Implement**: Anchor the interventions effectively and sustainably
    in the organization, then observe and evaluate their impact.'
  id: totrans-141
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Because success of interventions is never guaranteed in complex social systems — like
    organizations — , the culture board is used iteratively: loop as often as needed
    until the the barriers are resolved.'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
- en: 'Note that applying the culture board is in itself already an intervention:
    it exposes employees to previously unseen cultural patterns. These insights alone
    can already trigger change and have a positive impact on value creation with data.'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
- en: The following example from healthcare illustrates how the culture board helps
    put this approach into practice.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
- en: 6 Practical example — how a smarter approach to data culture can save lives
  id: totrans-145
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A hospital faces a high rate of treatment errors threatening patient safety,
    regulatory compliance as well as its strategic ambition to be a leader in quality
    of care. A so-called Critical Incident Reporting System (CIRS) is in place to
    capture and learn from near-misses and errors. However, it remains largely unused.
    The few reports submitted are often too vague for meaningful analysis.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
- en: '**Step 1: Business Need**'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
- en: To fulfill its strategic ambition and meet regulatory requirements, the hospital
    must reduce its error rate. This requires a systematic way to learn from incidents.
    The business need is not just to increase the number and quality of reports, but
    to create a reliable feedback loop that measurably improves patient safety. This
    is where [solid strategy work [2] plays out](https://medium.com/data-science/how-most-organizations-get-data-strategy-wrong-and-how-to-fix-it-b8afa59f1533),
    providing prioritization, management attention and the motivation for designing
    a data-driven organization.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
- en: '**Step 2: Identify**'
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
- en: 'Using the existing culture as a diagnostic tool, interviews with medical staff
    reveal several powerful, unspoken rules that block the use of the CIRS:'
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
- en: '**Fear:** “*Reporting an error is an admission of guilt. It starts a search
    for a culprit, not a cause.*” This points to a culture of blame, where reporting
    feels like a personal risk.'
  id: totrans-151
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Effort:** “*We are overloaded as it is. Taking 20 minutes to document something
    for a system that gives nothing back is a waste of time.*” This reveals a conflict
    with the core value of efficiency.'
  id: totrans-152
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Futility:** “*These reports go into a black box. We never hear what happens
    with them, so why bother?*” This shows a lack of a visible feedback loop, making
    the effort seem pointless.'
  id: totrans-153
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Step 3: Sense**'
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
- en: 'Distilling these findings makes the core problem visible: The organization’s
    context is incompatible with the desired learning ambition. While management officially
    asks for learning from incidents, the system’s structures, incentives, and routines
    actually punish the required behavior. The problem is not the mindset of the staff;
    it is the context in which they work.'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
- en: '**Step 4: Creating**'
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
- en: 'Instead of trying to force doctors to better document incidents or initiating
    a ‘culture change program’, three precise, structural interventions are designed
    to address the identified barriers:'
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
- en: '**To counter fear, a data governance intervention:** Clear, binding rules for
    a fully anonymized and protected reporting process are established. The process
    is explicitly designed to be ‘blame-free’, a formal guarantee protected by management.'
  id: totrans-158
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**To counter effort, a technology intervention:** The incident reporting platform
    is redesigned for minimal friction, making documentation as quick and easy as
    possible.'
  id: totrans-159
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**To counter futility, a data leadership intervention:** A protected, interdisciplinary
    *learning team* is created, sponsored by a senior manager. This team is shielded
    from the daily efficiency pressures and has the mandate to analyze the reports,
    develop concrete improvements (like new checklists), and, crucially, communicate
    successes and learnings back to the organization.'
  id: totrans-160
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Step 5: Implement**'
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
- en: The interventions create a positive feedback loop. Time to document incidents
    reduces significantly. As the first reports are handled under the new, protected
    process, staff see that it is safe and start providing detailed incident reports.
    The learning team can develop and optimize a surgical checklist based on early
    reports, which demonstrably reduces a specific class of error. This tangible success
    is widely communicated, proving the CIRS’s value, reinforcing report documentation
    further.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
- en: As a result, the quantity and quality of reports increase significantly. A new
    culture of psychological safety and data-based learning begins to emerge — not
    as a planned goal, but as a side effect of the tailored change in structural conditions.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
- en: 7 Conclusion
  id: totrans-164
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Data culture is not a set of values to be designed and rolled out, but an emergent
    property of the organization. It is the effect, not the cause, of successful value
    creation with data and AI. In contrast to data governance, it cannot be engineered
    or demanded.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
- en: Stay critical of one-size-fits-them-all best practices for designing a ‘good
    data culture’. Each organization is a complex social system and reacts differently
    to interventions. It is emergent — you never know what results you will get when
    following such recipes. What works in one organization might fail in another.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
- en: Instead, use data culture as a sensor. Let it reveal the crucial barriers that
    prevent your data foundation from being translated into better business decisions.
    Once these root causes are visible, design small, tailored interventions to bridge
    this gap, observe the impact, and allow a more effective data culture to take
    shape as a result.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
- en: The culture board is a practical tool for this data-cultural work. It helps
    leaders surface barriers, design targeted interventions, and iterate until the
    business need is met and, as a result, new cultural patterns have emerged.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-169
