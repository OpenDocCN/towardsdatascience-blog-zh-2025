- en: 'Preventing Context Overload: Controlled Neo4j MCP Cypher Responses for LLMs'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 防止上下文过载：为 LLM 提供受控的 Neo4j MCP Cypher 响应
- en: 原文：[https://towardsdatascience.com/preventing-context-overload-controlled-neo4j-mcp-cypher-responses-for-llms/](https://towardsdatascience.com/preventing-context-overload-controlled-neo4j-mcp-cypher-responses-for-llms/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/preventing-context-overload-controlled-neo4j-mcp-cypher-responses-for-llms/](https://towardsdatascience.com/preventing-context-overload-controlled-neo4j-mcp-cypher-responses-for-llms/)
- en: '<mdspan datatext="el1757105358537" class="mdspan-comment">Large language</mdspan>
    models connected to your Neo4j graph gain incredible flexibility: they can generate
    any Cypher queries through the Neo4j MCP Cypher server. This makes it possible
    to dynamically generate complex queries, explore database structure, and even
    chain multi-step agent workflows.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1757105358537" class="mdspan-comment">大型语言模型</mdspan>连接到您的
    Neo4j 图时，获得了极大的灵活性：它们可以通过 Neo4j MCP Cypher 服务器生成任何 Cypher 查询。这使得动态生成复杂查询、探索数据库结构，甚至串联多步代理工作流程成为可能。
- en: 'To generate meaningful queries, the LLM needs the graph schema as input: the
    node labels, relationship types, and properties that define the data model. With
    this context, the model can translate natural language into precise Cypher, discover
    connections, and chain together multi-hop reasoning.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 为了生成有意义的查询，LLM 需要输入图模式：节点标签、关系类型以及定义数据模型的属性。有了这个上下文，模型可以将自然语言翻译成精确的 Cypher 语句，发现联系，并串联多跳推理。
- en: '![](../Images/606e8106de0f9a89c4703533e725eba0.png)'
  id: totrans-4
  prefs: []
  type: TYPE_IMG
  zh: '![图像](../Images/606e8106de0f9a89c4703533e725eba0.png)'
- en: Image created by the author.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 由作者创建的图像。
- en: For example, if it knows about `(Person)-[:ACTED_IN]->(Movie)` and `(Person)-[:DIRECTED]->(Movie)`
    patterns in the graph, it can turn *“Which movies feature actors who also directed?”*
    into a valid query. The schema gives it the grounding needed to adapt to any graph
    and produce Cypher statements that are both correct and relevant.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果它知道图中 `(Person)-[:ACTED_IN]->(Movie)` 和 `(Person)-[:DIRECTED]->(Movie)`
    的模式，它可以将 *“哪些电影由也执导过电影的演员出演？”* 转换为有效的查询。该模式给它提供了适应任何图并生成既正确又相关的 Cypher 语句所需的根基。
- en: But this freedom comes at a cost. When left unchecked, an LLM can produce Cypher
    that runs far longer than intended, or returns enormous datasets with deeply nested
    structures. The result is not just wasted computation but also a serious risk
    of overwhelming the model itself. At the moment, every tool invocation returns
    its output back through the LLM’s context. That means when you chain tools together,
    all of the intermediate results must flow back through the model. Returning thousands
    of rows or embedding-like values into that loop quickly turns into noise, bloating
    the context window and reducing the quality of the reasoning that follows.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 但这种自由是有代价的。如果不受控制，LLM 可以生成运行时间远超预期的 Cypher 语句，或者返回具有深层嵌套结构的巨大数据集。结果是不仅浪费了计算资源，而且对模型本身造成严重风险。目前，每个工具调用都会将其输出通过
    LLM 的上下文返回。这意味着当你串联工具时，所有中间结果都必须通过模型返回。将数千行或类似嵌入的值返回到该循环中很快就会变成噪音，膨胀上下文窗口，并降低后续推理的质量。
- en: '![](../Images/36e735cf7361f9a3feda81196e31a554.png)'
  id: totrans-8
  prefs: []
  type: TYPE_IMG
  zh: '![图像](../Images/36e735cf7361f9a3feda81196e31a554.png)'
- en: Generated using Gemini
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 Gemini 生成
- en: This is why throttling responses matters. Without controls, the same power that
    makes the Neo4j MCP Cypher server so compelling also makes it fragile. By introducing
    timeouts, output sanitization, row limits, and token-aware truncation, we can
    keep the system responsive and ensure that query results stay useful to the LLM
    instead of drowning it in irrelevant detail.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是为什么限制响应很重要。如果没有控制，使 Neo4j MCP Cypher 服务器如此吸引人的同样力量也使其脆弱。通过引入超时、输出清理、行限制和基于令牌的截断，我们可以保持系统响应，并确保查询结果对
    LLM 来说仍然有用，而不是被无关的细节淹没。
- en: '***Disclaimer:** I work at Neo4j, and this reflects my exploration of potential
    future improvements to the current implementation.*'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: '**免责声明：** 我在 Neo4j 工作，这反映了我对当前实现潜在未来改进的探索。'
- en: The server is available on [GitHub](https://github.com/tomasonjo-labs/neo4j-mcp-experiments/tree/main/servers/mcp-neo4j-cypher-throttle).
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 服务器可在 [GitHub](https://github.com/tomasonjo-labs/neo4j-mcp-experiments/tree/main/servers/mcp-neo4j-cypher-throttle)
    上找到。
- en: Controlled outputs
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 受控输出
- en: 'So how do we prevent runaway queries and oversized responses from overwhelming
    our LLM? The answer is not to limit what kinds of Cypher an agent can write as
    the whole point of the Neo4j MCP server is to expose the full expressive power
    of the graph. Instead, we place smart constraints on *how much* comes back and
    *how long* a query is allowed to run. In practice, that means introducing three
    layers of protection: timeouts, result sanitization, and token-aware truncation.'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，我们如何防止查询失控和响应过大，以免压倒我们的LLM？答案是不要限制代理可以编写的Cypher类型，因为Neo4j MCP服务器的整个目的就是展示图形的全部表达能力。相反，我们对返回的“多少”和查询允许运行的时间进行智能约束。在实践中，这意味着引入三层保护：超时、结果清理和令牌感知截断。
- en: Query timeouts
  id: totrans-15
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 查询超时
- en: 'The first safeguard is simple: every query gets a time budget. If the LLM generates
    something expensive, like a giant Cartesian product or a traversal across millions
    of nodes, it will fail fast instead of hanging the whole workflow.'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 第一层保护很简单：每个查询都有一个时间预算。如果LLM生成了一些昂贵的操作，比如巨大的笛卡尔积或跨越数百万个节点的遍历，它将快速失败，而不是挂起整个工作流程。
- en: We expose this as an environment variable, `QUERY_TIMEOUT`, which defaults to
    ten seconds. Internally, queries are wrapped in `neo4j.Query` with the timeout
    applied. This way, both reads and writes respect the same bound. This change alone
    makes the server much more robust.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将其公开为环境变量，`QUERY_TIMEOUT`，默认为十秒。内部，查询被包装在`neo4j.Query`中，并应用超时。这样，读取和写入都尊重相同的界限。仅此一项变化就使服务器变得更加健壮。
- en: Sanitizing noisy values
  id: totrans-18
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 清理噪声值
- en: Modern graphs often attach **embedding vectors** to nodes and relationships.
    These vectors can be hundreds or even thousands of floating-point numbers per
    entity. They’re essential for similarity search, but when passed into an LLM context,
    they’re pure noise. The model can’t reason over them directly, and they consume
    a huge amount of tokens.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 现代图形通常将**嵌入向量**附加到节点和关系上。这些向量可以是每个实体数百甚至数千个浮点数。它们对于相似性搜索至关重要，但当传递到LLM上下文中时，它们纯粹是噪音。模型无法直接推理它们，并且它们消耗了大量的令牌。
- en: To solve this, we recursively sanitize results with a simple Python function.
    Oversized lists are dropped, nested dicts are pruned, and only values that fit
    within a reasonable bound (by default, lists under 52 items) are preserved.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 为了解决这个问题，我们通过一个简单的Python函数递归地清理结果。删除过大的列表，修剪嵌套字典，并仅保留在合理范围内（默认情况下，列表长度不超过52项）的值。
- en: Token-aware truncation
  id: totrans-21
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 令牌感知截断
- en: Finally, even sanitized results can be verbose. To guarantee they’ll always
    fit, we run them through a tokenizer and slice down to a maximum of 2048 tokens,
    using OpenAI’s `tiktoken` library.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，即使是清理后的结果也可能很冗长。为了保证它们始终适合，我们通过分词器处理，并使用OpenAI的`tiktoken`库将其截断到最多2048个令牌。
- en: '[PRE0]'
  id: totrans-23
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: This final step ensures compatibility with any LLM you connect, regardless of
    how big the intermediate data might be. It’s like a safety net that catches anything
    the earlier layers didn’t filter to avoid overwhelming the context.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 这最后一步确保了与任何连接的LLM的兼容性，无论中间数据可能有多大。它就像一个安全网，捕捉到早期层没有过滤掉的所有内容，以避免压倒上下文。
- en: YAML response format
  id: totrans-25
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: YAML响应格式
- en: Additionally, we can reduce the context size further by using YAML responses.
    At the moment, Neo4j Cypher MCP responses are returned as JSON, which introduce
    some extra overhead. By converting these dictionaries to YAML, we can reduce the
    number of tokens in our prompts, lowering costs and improving latency.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我们可以通过使用YAML响应进一步减少上下文大小。目前，Neo4j Cypher MCP响应以JSON格式返回，这引入了一些额外的开销。通过将这些字典转换为YAML，我们可以减少提示中的令牌数量，降低成本并提高延迟。
- en: '[PRE1]'
  id: totrans-27
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Tying it together
  id: totrans-28
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 综合起来
- en: With these layers combined — timeouts, sanitization, and truncation — the Neo4j
    MCP Cypher server remains fully capable but far more disciplined. The LLM can
    still attempt any query, but the responses are always bounded and context-friendly
    to an LLM. Using YAML as response format also helps lower the token count.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 结合这些层——超时、清理和截断——Neo4j MCP Cypher服务器仍然完全有能力，但更加自律。LLM仍然可以尝试任何查询，但响应总是有界限且对LLM友好的上下文。使用YAML作为响应格式也有助于降低令牌计数。
- en: Instead of flooding the model with large amounts of data, you return just enough
    structure to keep it smart. And that, in the end, is the difference between a
    server that feels brittle and one that feels purpose-built for LLMs.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 而不是用大量数据淹没模型，你只需返回足够的结构来保持其智能。这正是感觉脆弱的服务器和专为LLM量身定制的服务器之间的区别。
- en: The code for the server is available on [GitHub](https://github.com/tomasonjo-labs/neo4j-mcp-experiments/tree/main/servers/mcp-neo4j-cypher-throttle).
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 服务器代码可在 [GitHub](https://github.com/tomasonjo-labs/neo4j-mcp-experiments/tree/main/servers/mcp-neo4j-cypher-throttle)
    上获取。
