  zh: 点击 `<strong>选择文件</strong>` 按钮，并选择您创建的数据文件以输入到您的仪表板中。之后，从 `<strong>选择销售指标</strong>`
    下拉列表中选择一个合适的指标，然后点击 `<strong>分析数据</strong>` 按钮。根据您选择的显示选项，您应该在屏幕上看到类似的内容。
