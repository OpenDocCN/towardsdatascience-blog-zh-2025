- en: Summary
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: In this article, I described how using Pyodide and WebAssembly, we can run Python
    programs inside our browsers and showed several examples that demonstrate this.
    I talked about WebAssembly’s role as a portable, high-performance compilation
    target that extends browser capabilities and how this is realised in the Python
    ecosystem using the third-party library Pyodide.
  prefs: []
  type: TYPE_NORMAL
- en: To illustrate the power and versatility of Pyodide, I provided several examples
    of its use, including:-
  prefs: []
  type: TYPE_NORMAL
- en: A basic “Hello, World!” example.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Calling Python functions from JavaScript.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Utilising NumPy for numerical operations.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Generating visualisations with Matplotlib.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Running computationally heavy Python code in a Web Worker.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A data dashboard
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I hope that after reading this article, you will, like me, realise just how
    powerful a combination of Python, Pyodide, and a web browser can be.
  prefs: []
  type: TYPE_NORMAL
