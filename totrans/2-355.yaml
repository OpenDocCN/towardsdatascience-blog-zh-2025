- en: Running Python Programs in Your Browser
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/running-python-programs-in-your-browser/](https://towardsdatascience.com/running-python-programs-in-your-browser/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1746865029470" class="mdspan-comment">In</mdspan> recent
    years, WebAssembly (often abbreviated as WASM) has emerged as an interesting technology
    that extends web browsers’ capabilities far beyond the traditional realms of HTML,
    CSS, and JavaScript.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: As a Python developer, one particularly exciting application is the ability
    to run Python code directly in the browser. In this article, I’ll explore what
    WebAssembly is (and its relation to the Pyodide library), talk about its benefits
    and everyday use cases, and dive into some practical examples of how you can use
    WebAssembly to run Python programs on the web.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: These tools can also benefit data scientists and ML professionals. Pyodide brings
    a significant portion of the scientific Python stack (NumPy, Pandas, Scikit-learn,
    Matplotlib, SciPy, etc.) to the browser, meaning that using familiar tools and
    libraries during code development is possible. It can also be useful for demonstration
    purposes. As you’ll see in my final example, combining Python’s data processing
    power with HTML, CSS, and JavaScript for UI, you can quickly build interactive
    dashboards or tools without needing a separate backend for many use cases.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: What is WebAssembly?
  id: totrans-5
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'WebAssembly is a low-level binary instruction format designed as a portable
    target for compiling high-level languages, such as C, C++, Rust, and even Python.
    It was created to enable high-performance applications on the web without some
    of the pitfalls of traditional JavaScript execution, such as run-time speed. Some
    key aspects of WebAssembly include:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: '**Portability.** WebAssembly modules run consistently across all modern browsers.'
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Performance.** The binary format is compact and can be parsed quickly, which
    allows near-native execution speed.'
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Security.** Running in a sandboxed environment, WebAssembly provides strong
    security guarantees.'
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Language Agnosticism.** Although browsers primarily support JavaScript, WebAssembly
    enables developers to write code in other languages and compile it to WebAssembly
    (wasm).'
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What Can WebAssembly Be Used For?
  id: totrans-11
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: WebAssembly has a wide array of applications. Some of the most common use cases
    include:-
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
- en: '**High-Performance Web Apps.** WebAssembly can help applications such as games,
    image and video editors, and simulations achieve near-native performance.'
  id: totrans-13
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Porting Legacy Code.** Code written in C, C++, or Rust can be compiled into
    WebAssembly, allowing developers to reuse existing libraries and codebases on
    the web.'
  id: totrans-14
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Multimedia Processing.** Audio and video processing libraries benefit from
    webassembly’s speed, enabling more complex processing tasks in real-time.'
  id: totrans-15
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Scientific Computing.** Heavy computations such as machine learning, data
    visualisation, or numerical simulations can be offloaded to WebAssembly modules.'
  id: totrans-16
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Running Multiple Languages.** Projects like Pyodide allow Python (and its
    extensive ecosystem) to beexecuted in the browser without requiring a server backend.'
  id: totrans-17
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: If you frequently code in Python, that last point should make your ears prick
    up, so let’s dive into that aspect further.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: Running Python on the Web
  id: totrans-19
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Traditionally, Python runs on the server or in desktop applications. However,
    thanks to initiatives like [**Pyodide**](https://pyodide.org/), Python can run
    in the browser via WebAssembly. Pyodide compiles the CPython interpreter code
    into WebAssembly, allowing you to execute Python code and use many popular third-party
    libraries directly in your web application.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: And this isn’t just a gimmick. There are several advantages to doing this, including:-
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: Using Python’s extensive library ecosystem, including packages for data science
    (NumPy, Pandas, Matplotlib) and machine learning (Scikit-Learn, TensorFlow).
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Enhanced responsiveness as fewer round trips to a server are required.
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It is a simpler deployment as the entire application logic can reside in the
    front end.
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We’ve mentioned Pyodide a few times already, so let’s take a closer look at
    what exactly Pyodide is.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
- en: What is Pyodide
  id: totrans-26
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The idea behind Pyodide was born from the growing need to run Python code directly
    in the browser without relying on a traditional server-side setup. Traditionally,
    web applications had depended on JavaScript for client-side interactions, leaving
    Python confined to back-end or desktop applications. However, with the advent
    of WebAssembly, an opportunity arose to bridge this gap.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
- en: Mozilla Research recognised the potential of this approach and set out to port
    CPython, the reference implementation of Python, to WebAssembly using the Emscripten
    toolchain. This effort was about running Python in the browser and unlocking a
    new world of interactive, client-side applications powered by Python’s rich set
    of libraries for data science, numerical computing, and more.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
- en: To summarise, at its core, Pyodide is a port of CPython compiled into WebAssembly.
    This means that when you run Python code in the browser using Pyodide, you execute
    a fully functional Python interpreter optimised for the web environment.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
- en: Right, it’s time to look at some code.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
- en: Setting up a development environment
  id: totrans-31
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Before we start coding, let’s set up our development environment. The best practice
    is to create a separate Python environment where you can install any necessary
    software and experiment with coding, knowing that anything you do in this environment
    won’t affect the rest of your system.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
- en: I use conda for this, but you can use whatever method you know best suits you.
    Note that I’m using Linux (WSL2 on Windows).
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  id: totrans-34
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Now that our environment is set up, we can install the required libraries and
    software.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  id: totrans-36
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Now type in `jupyter notebook` into your command prompt. You should see a jupyter
    notebook open in your browser. If that doesn’t happen automatically, you’ll likely
    see a screenful of information after the `jupyter notebook` command. Near the
    bottom, there will be a URL that you should copy and paste into your browser to
    initiate the Jupyter Notebook.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
- en: Your URL will be different to mine, but it should look something like this:-
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Code example 1 — Hello World equivalent using Pyodide
  id: totrans-40
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Let’s start with the easiest example possible. The simplest way to include Pyodide
    in your HTML page is via a Content Delivery Network (CDN). We then print out the
    text “Hello World!”
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  id: totrans-42
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: I ran the above code in [W3Schools HTML TryIt](https://www.w3schools.com/html/tryit.asp?filename=tryhtml_headings)
    editor and got this,
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/57c348f2ff311c055c9200cb33485cee.png)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
- en: When the button is clicked, Pyodide runs the Python code that prints “Hello,
    World!”. We don’t see anything printed on the screen, as it is printed to the
    console by default. We’ll fix that in our following example.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
- en: Code Example 2 — Printing output to the browser
  id: totrans-47
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: In our second example, we’ll use Pyodide to run Python code in the browser that
    will perform a simple mathematical calculation. In this case, we will calculate
    the square root of 16 and output the result to the browser.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  id: totrans-49
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Running the above code in the W3Schools TryIT browser, I got this output.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d524493692f522f49fb33098be3d50b7.png)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
- en: Code Example 3 – Calling Python Functions from JavaScript
  id: totrans-53
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Another valuable and powerful feature of using Pyodide is the ability to call
    Python functions from JavaScript and vice versa.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
- en: In this example, we create a Python function that performs a simple mathematical
    operation—calculating the factorial of a number—and call it from JavaScript code.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  id: totrans-56
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Here is a sample output when running on W3Schools. I won’t include the code
    section this time, just the output.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/4769f0bdb22e829b0f25f35730cdc623.png)'
  id: totrans-58
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
- en: Code Example 4— Using Python Libraries, e.g. NumPy
  id: totrans-60
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Python’s power comes from its rich ecosystem of libraries. With Pyodide, you
    can import and use popular libraries like NumPy for numerical computations.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
- en: The following example demonstrates how to perform array operations using NumPy
    in the browser. The Numpy library is loaded using the **pyodide.loadPackage**
    function.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  id: totrans-63
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: '![](../Images/357161aaa759aa99adf3308301d4e212.png)'
  id: totrans-64
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
- en: Code Example 5— Using Python libraries, e.g. matplotlib
  id: totrans-66
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Another powerful aspect of running Python in the browser is the ability to generate
    visualisations. With Pyodide, you can use GUI libraries such as Matplotlib to
    create plots dynamically. Here’s how to generate and display a simple plot on
    a canvas element.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
- en: In this example, we create a quadratic plot (y = x²) using Matplotlib, save
    the image to an in-memory buffer as a PNG, and encode it as a base64 string before
    displaying it.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  id: totrans-69
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: '![](../Images/f18e5afeed1783a6f6f7c5f17aa48a73.png)'
  id: totrans-70
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
- en: 'Code Example 6: Running Python in a Web Worker'
  id: totrans-72
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: For more complex applications or when you need to ensure that heavy computations
    do not block the main UI thread, you can run Pyodide in a [Web Worker](https://developer.mozilla.org/en-US/docs/Web/API/Web_Workers_API).
    Web Workers allow you to run scripts in background threads, keeping your application
    responsive.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
- en: Below is an example of how to set up Pyodide in a Web Worker. We perform a calculation
    and simulate the calculation running for a while by introducing delays using the
    **sleep()** function. We also display a continuously updating counter showing
    the main UI running and responding normally.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
- en: We’ll need three files for this:- an index.html file and two JavaScript files.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
- en: '**index.html**'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  id: totrans-77
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: '**worker.js**'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  id: totrans-79
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: '**main.js**'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  id: totrans-81
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: To run this code, create all three files above and put them into the same directory
    on your local system. In that directory, type in the following command.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  id: totrans-83
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: Now, in your browser, type this URL into it.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  id: totrans-85
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: You should see a screen like this.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/5c01378dcfbbab935e0db4050f4f983f.png)'
  id: totrans-87
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
- en: Now, if you press the `<strong>Start Computation</strong>` button, you should
    see a counter displayed on the screen, starting at 1 and ticking up by 1 every
    second until the computation is complete and its final result is displayed — about
    5 seconds in total.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
- en: This shows that the front-end logic and computation are not constrained by the
    work that’s being done by the Python code behind the button.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/3d4e920dbfe244cb3f9da4bf55bcedf0.png)'
  id: totrans-91
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
- en: 'Code Example 7: Running a simple data dashboard'
  id: totrans-93
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: For our final example, I’ll show you how to run a simple data dashboard directly
    in your browser. Our source data will be synthetic sales data in a CSV file.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
- en: We need three files for this, all of which should be in the same folder.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
- en: '**sales_data.csv**'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
- en: The file I used had 100,000 records, but you can make this file as big or small
    as you like. Here are the first twenty records to give you an idea of what the
    data looked like.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  id: totrans-98
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: '**index.html**'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
- en: This is the main GUI interface to our dashboard.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  id: totrans-101
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: '**main.js**'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
- en: This contains our main Python pyodide code.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  id: totrans-104
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: Like the previous example, you can run this as follows. Create all three files
    and place them in the same directory on your local system. In that directory,
    on a command terminal, type in the following,
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  id: totrans-106
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: Now, in your browser, type this URL into it.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  id: totrans-108
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: Initially, your screen should look like this,
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/8a28f5df126ab9fef5e2f9ecbbe0611e.png)'
  id: totrans-110
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
- en: Click on the `<strong>Choose File</strong>` button and select the data file
    you created to input into your dashboard. After that, choose a suitable metric
    from the `<strong>Select Sales Metric</strong>` dropdown list and click the `<strong>Analyze
    data</strong>` button. Depending on what options you choose to display, you should
    see something like this on your screen.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/35cf28fd3b7bcbd846976d8f2c3fedb1.png)'
  id: totrans-113
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: Summary
  id: totrans-115
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 摘要
- en: In this article, I described how using Pyodide and WebAssembly, we can run Python
    programs inside our browsers and showed several examples that demonstrate this.
    I talked about WebAssembly’s role as a portable, high-performance compilation
    target that extends browser capabilities and how this is realised in the Python
    ecosystem using the third-party library Pyodide.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我描述了如何使用Pyodide和WebAssembly，在浏览器中运行Python程序，并展示了几个演示这一点的示例。我谈到了WebAssembly作为可移植、高性能的编译目标，它扩展了浏览器功能，以及这是如何在Python生态系统中通过第三方库Pyodide实现的。
- en: To illustrate the power and versatility of Pyodide, I provided several examples
    of its use, including:-
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 为了展示Pyodide的强大和多功能性，我提供了几个使用示例，包括：-
- en: A basic “Hello, World!” example.
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个基本的“Hello, World!”示例。
- en: Calling Python functions from JavaScript.
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从JavaScript中调用Python函数。
- en: Utilising NumPy for numerical operations.
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 利用NumPy进行数值运算。
- en: Generating visualisations with Matplotlib.
  id: totrans-121
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用Matplotlib生成可视化。
- en: Running computationally heavy Python code in a Web Worker.
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在Web Worker中运行计算密集型的Python代码。
- en: A data dashboard
  id: totrans-123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据仪表板
- en: I hope that after reading this article, you will, like me, realise just how
    powerful a combination of Python, Pyodide, and a web browser can be.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 希望在阅读这篇文章后，你们会像我一样，意识到Python、Pyodide和网页浏览器的结合有多么强大。
