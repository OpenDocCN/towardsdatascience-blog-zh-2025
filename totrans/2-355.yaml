  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: When the button is clicked, Pyodide runs the Python code that prints “Hello,
    World!”. We don’t see anything printed on the screen, as it is printed to the
    console by default. We’ll fix that in our following example.
  prefs: []
  type: TYPE_NORMAL
- en: Code Example 2 — Printing output to the browser
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: In our second example, we’ll use Pyodide to run Python code in the browser that
    will perform a simple mathematical calculation. In this case, we will calculate
    the square root of 16 and output the result to the browser.
  prefs: []
  type: TYPE_NORMAL
