- en: Code Example 3 – Calling Python Functions from JavaScript
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Another valuable and powerful feature of using Pyodide is the ability to call
    Python functions from JavaScript and vice versa.
  prefs: []
  type: TYPE_NORMAL
- en: In this example, we create a Python function that performs a simple mathematical
    operation—calculating the factorial of a number—and call it from JavaScript code.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: Here is a sample output when running on W3Schools. I won’t include the code
