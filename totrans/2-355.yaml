- en: 'Code Example 6: Running Python in a Web Worker'
  id: totrans-72
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 代码示例6：在Web Worker中运行Python
- en: For more complex applications or when you need to ensure that heavy computations
    do not block the main UI thread, you can run Pyodide in a [Web Worker](https://developer.mozilla.org/en-US/docs/Web/API/Web_Workers_API).
    Web Workers allow you to run scripts in background threads, keeping your application
    responsive.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 对于更复杂的应用或当您需要确保重计算不会阻塞主UI线程时，您可以在[Web Worker](https://developer.mozilla.org/en-US/docs/Web/API/Web_Workers_API)中运行Pyodide。Web
    Workers允许您在后台线程中运行脚本，保持您的应用程序响应。
- en: Below is an example of how to set up Pyodide in a Web Worker. We perform a calculation
    and simulate the calculation running for a while by introducing delays using the
    **sleep()** function. We also display a continuously updating counter showing
    the main UI running and responding normally.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是如何在Web Worker中设置Pyodide的示例。我们通过使用**sleep()**函数引入延迟来执行计算，并模拟计算运行了一段时间。我们还显示了一个持续更新的计数器，显示主UI正常运行并正常响应。
- en: We’ll need three files for this:- an index.html file and two JavaScript files.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要三个文件来完成这个任务：一个index.html文件和两个JavaScript文件。
- en: '**index.html**'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: '**index.html**'
- en: '[PRE8]'
  id: totrans-77
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: '**worker.js**'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: '**worker.js**'
- en: '[PRE9]'
  id: totrans-79
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: '**main.js**'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: '**main.js**'
- en: '[PRE10]'
  id: totrans-81
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: To run this code, create all three files above and put them into the same directory
    on your local system. In that directory, type in the following command.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 要运行此代码，创建上述所有三个文件，并将它们放在您本地系统上的同一目录中。在那个目录中，输入以下命令。
- en: '[PRE11]'
  id: totrans-83
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: Now, in your browser, type this URL into it.
  id: totrans-84
  prefs: []
