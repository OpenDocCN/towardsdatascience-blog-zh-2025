- en: Running Python Programs in Your Browser
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 在浏览器中运行Python程序
- en: 原文：[https://towardsdatascience.com/running-python-programs-in-your-browser/](https://towardsdatascience.com/running-python-programs-in-your-browser/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[在浏览器中运行Python程序](https://towardsdatascience.com/running-python-programs-in-your-browser/)'
- en: <mdspan datatext="el1746865029470" class="mdspan-comment">In</mdspan> recent
    years, WebAssembly (often abbreviated as WASM) has emerged as an interesting technology
    that extends web browsers’ capabilities far beyond the traditional realms of HTML,
    CSS, and JavaScript.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1746865029470" class="mdspan-comment">在</mdspan>近年来，WebAssembly（通常缩写为WASM）已经出现成为一种有趣的技术，它扩展了Web浏览器的功能，远远超出了传统的HTML、CSS和JavaScript领域。
- en: As a Python developer, one particularly exciting application is the ability
    to run Python code directly in the browser. In this article, I’ll explore what
    WebAssembly is (and its relation to the Pyodide library), talk about its benefits
    and everyday use cases, and dive into some practical examples of how you can use
    WebAssembly to run Python programs on the web.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 作为Python开发者，一个特别令人兴奋的应用是能够在浏览器中直接运行Python代码。在这篇文章中，我将探讨WebAssembly是什么（及其与Pyodide库的关系），讨论其优势和日常使用案例，并深入探讨一些实际示例，说明您如何使用WebAssembly在Web上运行Python程序。
- en: These tools can also benefit data scientists and ML professionals. Pyodide brings
    a significant portion of the scientific Python stack (NumPy, Pandas, Scikit-learn,
    Matplotlib, SciPy, etc.) to the browser, meaning that using familiar tools and
    libraries during code development is possible. It can also be useful for demonstration
    purposes. As you’ll see in my final example, combining Python’s data processing
    power with HTML, CSS, and JavaScript for UI, you can quickly build interactive
    dashboards or tools without needing a separate backend for many use cases.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 这些工具也可以惠及数据科学家和机器学习专业人士。Pyodide将科学Python栈的大部分内容（NumPy、Pandas、Scikit-learn、Matplotlib、SciPy等）带到了浏览器中，这意味着在代码开发期间可以使用熟悉的工具和库。它也可以用于演示目的。正如您将在我的最终示例中看到的那样，结合Python的数据处理能力与HTML、CSS和JavaScript进行UI开发，您可以快速构建交互式仪表板或工具，而无需为许多用例单独的后端。
- en: What is WebAssembly?
  id: totrans-5
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 什么是WebAssembly？
- en: 'WebAssembly is a low-level binary instruction format designed as a portable
    target for compiling high-level languages, such as C, C++, Rust, and even Python.
    It was created to enable high-performance applications on the web without some
    of the pitfalls of traditional JavaScript execution, such as run-time speed. Some
    key aspects of WebAssembly include:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: WebAssembly是一种低级二进制指令格式，旨在作为编译高级语言（如C、C++、Rust甚至Python）的可移植目标。它是为了在Web上实现高性能应用程序而创建的，避免了传统JavaScript执行的一些缺陷，例如运行时速度慢。WebAssembly的一些关键特性包括：
- en: '**Portability.** WebAssembly modules run consistently across all modern browsers.'
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可移植性**。WebAssembly模块在所有现代浏览器上运行一致。'
- en: '**Performance.** The binary format is compact and can be parsed quickly, which
    allows near-native execution speed.'
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**性能**。二进制格式紧凑，可以快速解析，这允许接近原生的执行速度。'
- en: '**Security.** Running in a sandboxed environment, WebAssembly provides strong
    security guarantees.'
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**安全性**。在沙盒环境中运行，WebAssembly提供了强大的安全保证。'
- en: '**Language Agnosticism.** Although browsers primarily support JavaScript, WebAssembly
    enables developers to write code in other languages and compile it to WebAssembly
    (wasm).'
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**语言无关性**。尽管浏览器主要支持JavaScript，但WebAssembly允许开发者用其他语言编写代码并将其编译成WebAssembly（wasm）。'
- en: What Can WebAssembly Be Used For?
  id: totrans-11
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: WebAssembly可以用作什么？
- en: WebAssembly has a wide array of applications. Some of the most common use cases
    include:-
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: WebAssembly具有广泛的应用。其中一些最常见的使用案例包括：-
- en: '**High-Performance Web Apps.** WebAssembly can help applications such as games,
    image and video editors, and simulations achieve near-native performance.'
  id: totrans-13
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**高性能Web应用**。WebAssembly可以帮助游戏、图像和视频编辑器以及模拟等应用程序实现接近原生的性能。'
- en: '**Porting Legacy Code.** Code written in C, C++, or Rust can be compiled into
    WebAssembly, allowing developers to reuse existing libraries and codebases on
    the web.'
  id: totrans-14
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**移植遗留代码**。用C、C++或Rust编写的代码可以编译成WebAssembly，允许开发者在Web上重用现有的库和代码库。'
- en: '**Multimedia Processing.** Audio and video processing libraries benefit from
    webassembly’s speed, enabling more complex processing tasks in real-time.'
  id: totrans-15
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**多媒体处理**。音频和视频处理库得益于WebAssembly的速度，使得实时处理更复杂的任务成为可能。'
- en: '**Scientific Computing.** Heavy computations such as machine learning, data
    visualisation, or numerical simulations can be offloaded to WebAssembly modules.'
  id: totrans-16
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**科学计算**。机器学习、数据可视化或数值模拟等重型计算可以卸载到WebAssembly模块中。'
- en: '**Running Multiple Languages.** Projects like Pyodide allow Python (and its
    extensive ecosystem) to beexecuted in the browser without requiring a server backend.'
  id: totrans-17
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**运行多种语言。**像Pyodide这样的项目允许Python（及其广泛的生态系统）在浏览器中执行，而不需要服务器后端。'
- en: If you frequently code in Python, that last point should make your ears prick
    up, so let’s dive into that aspect further.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你经常用Python编码，那么最后一个点可能会让你感到好奇，所以让我们更深入地探讨这个方面。
- en: Running Python on the Web
  id: totrans-19
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 在Web上运行Python
- en: Traditionally, Python runs on the server or in desktop applications. However,
    thanks to initiatives like [**Pyodide**](https://pyodide.org/), Python can run
    in the browser via WebAssembly. Pyodide compiles the CPython interpreter code
    into WebAssembly, allowing you to execute Python code and use many popular third-party
    libraries directly in your web application.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 传统上，Python在服务器或桌面应用程序上运行。然而，多亏了像[**Pyodide**](https://pyodide.org/)这样的倡议，Python可以通过WebAssembly在浏览器中运行。Pyodide将CPython解释器代码编译成WebAssembly，允许你在你的Web应用程序中直接执行Python代码并使用许多流行的第三方库。
- en: And this isn’t just a gimmick. There are several advantages to doing this, including:-
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 这不仅仅是一个噱头。这样做有几个优点，包括：-
- en: Using Python’s extensive library ecosystem, including packages for data science
    (NumPy, Pandas, Matplotlib) and machine learning (Scikit-Learn, TensorFlow).
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用Python广泛的库生态系统，包括数据科学（NumPy、Pandas、Matplotlib）和机器学习（Scikit-Learn、TensorFlow）的包。
- en: Enhanced responsiveness as fewer round trips to a server are required.
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 响应性增强，因为需要的往返服务器次数更少。
- en: It is a simpler deployment as the entire application logic can reside in the
    front end.
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 部署更简单，因为整个应用程序逻辑可以驻留在前端。
- en: We’ve mentioned Pyodide a few times already, so let’s take a closer look at
    what exactly Pyodide is.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经提到了Pyodide几次，所以让我们更仔细地看看Pyodide究竟是什么。
- en: What is Pyodide
  id: totrans-26
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 什么是Pyodide
- en: The idea behind Pyodide was born from the growing need to run Python code directly
    in the browser without relying on a traditional server-side setup. Traditionally,
    web applications had depended on JavaScript for client-side interactions, leaving
    Python confined to back-end or desktop applications. However, with the advent
    of WebAssembly, an opportunity arose to bridge this gap.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: Pyodide背后的想法源于在浏览器中直接运行Python代码而不依赖传统服务器设置的日益增长的需求。传统上，Web应用程序依赖于JavaScript进行客户端交互，将Python局限于后端或桌面应用程序。然而，随着WebAssembly的出现，出现了弥合这一差距的机会。
- en: Mozilla Research recognised the potential of this approach and set out to port
    CPython, the reference implementation of Python, to WebAssembly using the Emscripten
    toolchain. This effort was about running Python in the browser and unlocking a
    new world of interactive, client-side applications powered by Python’s rich set
    of libraries for data science, numerical computing, and more.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: Mozilla Research认识到这种方法的前景，并着手将CPython（Python的参考实现）使用Emscripten工具链移植到WebAssembly。这项工作是在浏览器中运行Python并解锁由Python丰富的数据科学、数值计算等库支持的新交互式客户端应用程序。
- en: To summarise, at its core, Pyodide is a port of CPython compiled into WebAssembly.
    This means that when you run Python code in the browser using Pyodide, you execute
    a fully functional Python interpreter optimised for the web environment.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 总结一下，Pyodide的核心是将CPython编译成WebAssembly的移植。这意味着当你使用Pyodide在浏览器中运行Python代码时，你执行的是一个针对Web环境优化的完全功能的Python解释器。
- en: Right, it’s time to look at some code.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 好的，是时候看看一些代码了。
- en: Setting up a development environment
  id: totrans-31
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 设置开发环境
- en: Before we start coding, let’s set up our development environment. The best practice
    is to create a separate Python environment where you can install any necessary
    software and experiment with coding, knowing that anything you do in this environment
    won’t affect the rest of your system.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们开始编码之前，让我们设置我们的开发环境。最佳实践是创建一个单独的Python环境，在那里你可以安装任何必要的软件并尝试编码，知道你在该环境中所做的任何操作都不会影响你的整个系统。
- en: I use conda for this, but you can use whatever method you know best suits you.
    Note that I’m using Linux (WSL2 on Windows).
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 我使用conda来做这件事，但你可以使用你最熟悉的方法。请注意，我使用的是Linux（Windows上的WSL2）。
- en: '[PRE0]'
  id: totrans-34
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Now that our environment is set up, we can install the required libraries and
    software.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经设置了环境，我们可以安装所需的库和软件。
- en: '[PRE1]'
  id: totrans-36
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Now type in `jupyter notebook` into your command prompt. You should see a jupyter
    notebook open in your browser. If that doesn’t happen automatically, you’ll likely
    see a screenful of information after the `jupyter notebook` command. Near the
    bottom, there will be a URL that you should copy and paste into your browser to
    initiate the Jupyter Notebook.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 现在在您的命令提示符中输入 `jupyter notebook`。您应该在浏览器中打开一个 jupyter notebook。如果它没有自动打开，您可能会在
    `jupyter notebook` 命令后看到一屏的信息。在底部附近，将有一个 URL，您应该将其复制并粘贴到浏览器中以启动 Jupyter Notebook。
- en: Your URL will be different to mine, but it should look something like this:-
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 您的 URL 将与我的不同，但它应该看起来像这样：-
- en: '[PRE2]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Code example 1 — Hello World equivalent using Pyodide
  id: totrans-40
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 代码示例 1 — 使用 Pyodide 的“Hello World”等效
- en: Let’s start with the easiest example possible. The simplest way to include Pyodide
    in your HTML page is via a Content Delivery Network (CDN). We then print out the
    text “Hello World!”
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从最简单的例子开始。将 Pyodide 包含到您的 HTML 页面中最简单的方法是通过内容分发网络（CDN）。然后我们打印出文本“Hello World!”
- en: '[PRE3]'
  id: totrans-42
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: I ran the above code in [W3Schools HTML TryIt](https://www.w3schools.com/html/tryit.asp?filename=tryhtml_headings)
    editor and got this,
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 我在 [W3Schools HTML TryIt](https://www.w3schools.com/html/tryit.asp?filename=tryhtml_headings)
    编辑器中运行了上述代码，并得到了这个结果，
- en: '![](../Images/57c348f2ff311c055c9200cb33485cee.png)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/57c348f2ff311c055c9200cb33485cee.png)'
- en: Image by Author
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: When the button is clicked, Pyodide runs the Python code that prints “Hello,
    World!”. We don’t see anything printed on the screen, as it is printed to the
    console by default. We’ll fix that in our following example.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 当按钮被点击时，Pyodide 将运行打印“Hello, World!”的 Python 代码。默认情况下，它将打印到控制台，我们将在下一个示例中修复这个问题。
- en: Code Example 2 — Printing output to the browser
  id: totrans-47
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 代码示例 2 — 将输出打印到浏览器
- en: In our second example, we’ll use Pyodide to run Python code in the browser that
    will perform a simple mathematical calculation. In this case, we will calculate
    the square root of 16 and output the result to the browser.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的第二个示例中，我们将使用 Pyodide 在浏览器中运行 Python 代码，该代码将执行一个简单的数学计算。在这种情况下，我们将计算 16 的平方根并将结果输出到浏览器。
- en: '[PRE4]'
  id: totrans-49
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Running the above code in the W3Schools TryIT browser, I got this output.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 在 W3Schools TryIT 浏览器中运行上述代码，我得到了这个输出。
- en: '![](../Images/d524493692f522f49fb33098be3d50b7.png)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d524493692f522f49fb33098be3d50b7.png)'
- en: Image by Author
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: Code Example 3 – Calling Python Functions from JavaScript
  id: totrans-53
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 代码示例 3 – 从 JavaScript 调用 Python 函数
- en: Another valuable and powerful feature of using Pyodide is the ability to call
    Python functions from JavaScript and vice versa.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 Pyodide 的另一个有价值且强大的功能是能够从 JavaScript 调用 Python 函数，反之亦然。
- en: In this example, we create a Python function that performs a simple mathematical
    operation—calculating the factorial of a number—and call it from JavaScript code.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个示例中，我们创建了一个执行简单数学运算的 Python 函数——计算一个数的阶乘，并从 JavaScript 代码中调用它。
- en: '[PRE5]'
  id: totrans-56
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Here is a sample output when running on W3Schools. I won’t include the code
    section this time, just the output.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是运行在 W3Schools 时的一个示例输出。这次我不会包括代码部分，只展示输出。
- en: '![](../Images/4769f0bdb22e829b0f25f35730cdc623.png)'
  id: totrans-58
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/4769f0bdb22e829b0f25f35730cdc623.png)'
- en: Image by Author
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: Code Example 4— Using Python Libraries, e.g. NumPy
  id: totrans-60
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 代码示例 4 — 使用 Python 库，例如 NumPy
- en: Python’s power comes from its rich ecosystem of libraries. With Pyodide, you
    can import and use popular libraries like NumPy for numerical computations.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: Python 的强大之处在于其丰富的库生态系统。使用 Pyodide，您可以导入和使用像 NumPy 这样的流行库进行数值计算。
- en: The following example demonstrates how to perform array operations using NumPy
    in the browser. The Numpy library is loaded using the **pyodide.loadPackage**
    function.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 以下示例演示了如何在浏览器中使用 NumPy 执行数组操作。NumPy 库是通过 **pyodide.loadPackage** 函数加载的。
- en: '[PRE6]'
  id: totrans-63
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: '![](../Images/357161aaa759aa99adf3308301d4e212.png)'
  id: totrans-64
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/357161aaa759aa99adf3308301d4e212.png)'
- en: Image by Author
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: Code Example 5— Using Python libraries, e.g. matplotlib
  id: totrans-66
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 代码示例 5 — 使用 Python 库，例如 matplotlib
- en: Another powerful aspect of running Python in the browser is the ability to generate
    visualisations. With Pyodide, you can use GUI libraries such as Matplotlib to
    create plots dynamically. Here’s how to generate and display a simple plot on
    a canvas element.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 在浏览器中运行 Python 的另一个强大方面是能够生成可视化。使用 Pyodide，您可以使用像 Matplotlib 这样的 GUI 库动态地创建图表。以下是如何在画布元素上生成和显示一个简单图表的示例。
- en: In this example, we create a quadratic plot (y = x²) using Matplotlib, save
    the image to an in-memory buffer as a PNG, and encode it as a base64 string before
    displaying it.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个示例中，我们使用 Matplotlib 创建一个二次图（y = x²），将图像保存到内存缓冲区作为 PNG 格式，并在显示之前将其编码为 base64
    字符串。
- en: '[PRE7]'
  id: totrans-69
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: '![](../Images/f18e5afeed1783a6f6f7c5f17aa48a73.png)'
  id: totrans-70
  prefs: []
  type: TYPE_IMG
