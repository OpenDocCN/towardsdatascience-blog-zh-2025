- en: 'Code Example 7: Running a simple data dashboard'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: For our final example, I’ll show you how to run a simple data dashboard directly
    in your browser. Our source data will be synthetic sales data in a CSV file.
  prefs: []
  type: TYPE_NORMAL
- en: We need three files for this, all of which should be in the same folder.
  prefs: []
  type: TYPE_NORMAL
- en: '**sales_data.csv**'
  prefs: []
  type: TYPE_NORMAL
- en: The file I used had 100,000 records, but you can make this file as big or small
    as you like. Here are the first twenty records to give you an idea of what the
    data looked like.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: '**index.html**'
  prefs: []
  type: TYPE_NORMAL
- en: This is the main GUI interface to our dashboard.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: '**main.js**'
  prefs: []
  type: TYPE_NORMAL
- en: This contains our main Python pyodide code.
  prefs: []
  type: TYPE_NORMAL
