- en: Running Python Programs in Your Browser
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/running-python-programs-in-your-browser/](https://towardsdatascience.com/running-python-programs-in-your-browser/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1746865029470" class="mdspan-comment">In</mdspan> recent
    years, WebAssembly (often abbreviated as WASM) has emerged as an interesting technology
    that extends web browsers’ capabilities far beyond the traditional realms of HTML,
    CSS, and JavaScript.
  prefs: []
  type: TYPE_NORMAL
- en: As a Python developer, one particularly exciting application is the ability
    to run Python code directly in the browser. In this article, I’ll explore what
    WebAssembly is (and its relation to the Pyodide library), talk about its benefits
    and everyday use cases, and dive into some practical examples of how you can use
    WebAssembly to run Python programs on the web.
  prefs: []
  type: TYPE_NORMAL
- en: These tools can also benefit data scientists and ML professionals. Pyodide brings
    a significant portion of the scientific Python stack (NumPy, Pandas, Scikit-learn,
    Matplotlib, SciPy, etc.) to the browser, meaning that using familiar tools and
    libraries during code development is possible. It can also be useful for demonstration
    purposes. As you’ll see in my final example, combining Python’s data processing
    power with HTML, CSS, and JavaScript for UI, you can quickly build interactive
    dashboards or tools without needing a separate backend for many use cases.
  prefs: []
  type: TYPE_NORMAL
- en: What is WebAssembly?
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'WebAssembly is a low-level binary instruction format designed as a portable
    target for compiling high-level languages, such as C, C++, Rust, and even Python.
    It was created to enable high-performance applications on the web without some
    of the pitfalls of traditional JavaScript execution, such as run-time speed. Some
    key aspects of WebAssembly include:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Portability.** WebAssembly modules run consistently across all modern browsers.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Performance.** The binary format is compact and can be parsed quickly, which
    allows near-native execution speed.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Security.** Running in a sandboxed environment, WebAssembly provides strong
    security guarantees.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Language Agnosticism.** Although browsers primarily support JavaScript, WebAssembly
    enables developers to write code in other languages and compile it to WebAssembly
    (wasm).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What Can WebAssembly Be Used For?
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: WebAssembly has a wide array of applications. Some of the most common use cases
    include:-
  prefs: []
  type: TYPE_NORMAL
- en: '**High-Performance Web Apps.** WebAssembly can help applications such as games,
    image and video editors, and simulations achieve near-native performance.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Porting Legacy Code.** Code written in C, C++, or Rust can be compiled into
    WebAssembly, allowing developers to reuse existing libraries and codebases on
    the web.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Multimedia Processing.** Audio and video processing libraries benefit from
    webassembly’s speed, enabling more complex processing tasks in real-time.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Scientific Computing.** Heavy computations such as machine learning, data
    visualisation, or numerical simulations can be offloaded to WebAssembly modules.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Running Multiple Languages.** Projects like Pyodide allow Python (and its
    extensive ecosystem) to beexecuted in the browser without requiring a server backend.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: If you frequently code in Python, that last point should make your ears prick
    up, so let’s dive into that aspect further.
  prefs: []
  type: TYPE_NORMAL
- en: Running Python on the Web
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Traditionally, Python runs on the server or in desktop applications. However,
    thanks to initiatives like [**Pyodide**](https://pyodide.org/), Python can run
    in the browser via WebAssembly. Pyodide compiles the CPython interpreter code
    into WebAssembly, allowing you to execute Python code and use many popular third-party
    libraries directly in your web application.
  prefs: []
  type: TYPE_NORMAL
- en: And this isn’t just a gimmick. There are several advantages to doing this, including:-
  prefs: []
  type: TYPE_NORMAL
- en: Using Python’s extensive library ecosystem, including packages for data science
    (NumPy, Pandas, Matplotlib) and machine learning (Scikit-Learn, TensorFlow).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Enhanced responsiveness as fewer round trips to a server are required.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It is a simpler deployment as the entire application logic can reside in the
    front end.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We’ve mentioned Pyodide a few times already, so let’s take a closer look at
    what exactly Pyodide is.
  prefs: []
  type: TYPE_NORMAL
- en: What is Pyodide
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The idea behind Pyodide was born from the growing need to run Python code directly
    in the browser without relying on a traditional server-side setup. Traditionally,
    web applications had depended on JavaScript for client-side interactions, leaving
    Python confined to back-end or desktop applications. However, with the advent
    of WebAssembly, an opportunity arose to bridge this gap.
  prefs: []
  type: TYPE_NORMAL
- en: Mozilla Research recognised the potential of this approach and set out to port
    CPython, the reference implementation of Python, to WebAssembly using the Emscripten
    toolchain. This effort was about running Python in the browser and unlocking a
    new world of interactive, client-side applications powered by Python’s rich set
    of libraries for data science, numerical computing, and more.
  prefs: []
  type: TYPE_NORMAL
- en: To summarise, at its core, Pyodide is a port of CPython compiled into WebAssembly.
    This means that when you run Python code in the browser using Pyodide, you execute
    a fully functional Python interpreter optimised for the web environment.
  prefs: []
  type: TYPE_NORMAL
- en: Right, it’s time to look at some code.
  prefs: []
  type: TYPE_NORMAL
- en: Setting up a development environment
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Before we start coding, let’s set up our development environment. The best practice
    is to create a separate Python environment where you can install any necessary
    software and experiment with coding, knowing that anything you do in this environment
    won’t affect the rest of your system.
  prefs: []
  type: TYPE_NORMAL
- en: I use conda for this, but you can use whatever method you know best suits you.
    Note that I’m using Linux (WSL2 on Windows).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Now that our environment is set up, we can install the required libraries and
    software.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Now type in `jupyter notebook` into your command prompt. You should see a jupyter
    notebook open in your browser. If that doesn’t happen automatically, you’ll likely
    see a screenful of information after the `jupyter notebook` command. Near the
    bottom, there will be a URL that you should copy and paste into your browser to
    initiate the Jupyter Notebook.
  prefs: []
  type: TYPE_NORMAL
- en: Your URL will be different to mine, but it should look something like this:-
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: Code example 1 — Hello World equivalent using Pyodide
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Let’s start with the easiest example possible. The simplest way to include Pyodide
    in your HTML page is via a Content Delivery Network (CDN). We then print out the
    text “Hello World!”
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: I ran the above code in [W3Schools HTML TryIt](https://www.w3schools.com/html/tryit.asp?filename=tryhtml_headings)
    editor and got this,
  prefs: []
  type: TYPE_NORMAL
