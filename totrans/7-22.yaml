- en: Skills a Data Scientist Must Have (But a Software Engineer Doesn’t)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/software-engineering-to-data-science-a07f178a98c4/](https://towardsdatascience.com/software-engineering-to-data-science-a07f178a98c4/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![A software engineer putting on a data science glasses. - Image generated
    with FLUX.1 [schnell] by the author.](../Images/5abb428b06b906b41bd0dd60215fe5fc.png)'
  id: totrans-2
  prefs: []
  type: TYPE_IMG
- en: A software engineer putting on a data science glasses. – Image generated with
    FLUX.1 [schnell] by the author.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: Mentoring teaches me a lot.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: I recently had the opportunity to guide a friend who worked as a software engineer
    (SE) for two years and wants to transition to a data science (DS) role. What started
    as a casual chat eventually became several hours of outlining plans to become
    a data scientist.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: Her first question was, "*What should I learn new?*"
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: Of course, I could list a dozen things in a minute, but it requires much more
    than a list of skills and links to popular courses. FYI, I never answered this
    question, neither in this post.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: Some of her existing skills are invaluable to her new endeavor. She could fast-track
    her transition by carefully learning one. But what’s more important is thinking
    like a data scientist.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: She doesn’t have to unlearn anything. However, some of her SE skills have little
    use in data science.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
- en: In this post, I summarize some of our discussions. These include which area
    of data science suits her interests, which new skills she needs to acquire, and
    how to start small and grow faster.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: '[**The Most Valuable LLM Dev Skill is Easy to Learn, But Costly to Practice.**](https://towardsdatascience.com/llm-evaluation-techniques-and-costs-3147840afc53)'
  id: totrans-11
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: How do data scientists think differently from software engineers?
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This is not to say that one’s work is easier than the others. However, a DS
    has significantly different goals regarding responsibilities than an SE.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: SEs care about designing, developing, and maintaining software. Mostly, SE’s
    work is more deterministic. In other words, they know the outcome they are building
    for. And there’s often a finite set of techniques to achieve them.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: SEs will have to make many choices in their work and sometimes will have to
    do course corrections. But these uncertainties will often have predictable solutions.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: On the other hand, a data scientist’s work is filled with more unknowns. There’s
    no guarantee that the data they have is of good quality. DS will have to work
    on them. No one can tell which ML model would work best for the problem at hand;
    it’s more or less trial and error. Which evaluation metric is more important than
    the others? And what’s an acceptable threshold for them? These are all questions
    a data scientist will have to figure out on the go.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: Due to these reasons, a DS has a more experimental mindset. As a professional
    SE, you’d often work in a framework like SCRUM, which expects you to finish the
    work in a strict timeframe called a sprint.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
- en: Data scientists are one kind of data science professionals.
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Although we interchange the name, not all data science professionals are data
    scientists. We’ve got several other roles that go along with data scientists.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: We rarely see a role that says full stack data scientist, though the full stack
    software developer role is very common.
  id: totrans-20
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Most people employed as data scientists are either analysts, machine learning
    engineers, or data engineers.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: The most common role in data science is **analyst**. Analysts play a key role
    in business decision-making. They extract key insights from the data they have
    and educate management. Analysts don’t have to be programmers, either. Most of
    the analysts I know work with only Excel.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: '[**This is How I Create Dazzling Dashboards Purely in Python.**](https://towardsdatascience.com/plotly-dashboards-in-python-28a3bb83702c)'
  id: totrans-23
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Machine learning engineer**s’ core responsibility is to train models that
    solve business problems. They work on data preprocessing, model selection, and
    training. As Andrew Ng points out, data scientists in industrial setups (or that
    closely resonate with ML engineers) don’t try to invent new models. Instead, they
    try to find the best data and preprocessing techniques to solve problems.'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
- en: '[**3 Ways to Deploy Machine Learning Models in Production**](https://towardsdatascience.com/3-ways-to-deploy-machine-learning-models-in-production-cdba15b00e)'
  id: totrans-25
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: On the other hand, **data engineer**s create and maintain data and infrastructure.
    This involves creating data pipelines and warehouses and managing databases.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
- en: Data engineers and ML engineers often work hand in hand. On some tasks, like
    model deployment, they both work together.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
- en: '[**In the 8 Key MLOps Roles, Where Do You Fit In?**](https://towardsdatascience.com/in-the-8-key-mlops-roles-where-do-you-fit-in-251272ca5488)'
  id: totrans-28
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Those wanting to be data scientists often need to pick one. Each has its challenges
    and tools to solve them. For instance, while ML engineers concentrate on tools
    like Scikit-learn, Tensorflow, and Pandas, data engineers focus on tools like
    Airflow, SQL, and cloud infrastructure management.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
- en: It is now clear that the technologies used by these different data scientists
    are fairly different and require an investment of your time to master them. For
    this reason, we rarely see a role that says full stack data scientist, though
    the full stack software developer role is very common.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
- en: How to pick the correct data science role for you
  id: totrans-31
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I already mentioned this. I don’t recommend that anyone try to master all the
    different data science roles, although my own career was kind of a kitchen sink.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
- en: The best thing is to choose a role that suits your personality and pick it as
    early as possible.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: Here’s my guide (of course, opinionated.)
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
- en: If you’re a person who likes less programming and less technical work, you focus
    more on aiding business decision-making. Still, you’d be happy as a **data analyst**
    if you want to be in a data-related role.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: Knowing some data-wrangling techniques in Python is helpful but not a must.
    I’ve had colleagues who continuously challenged me that they could do the stuff
    in Excel, for which I’m using Python. Guess what, sometimes they win.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
- en: However, you should discuss with your HR how your performance is measured because
    the insights you take from data don’t have any tangible value. They need to be
    acted upon, and even then, there’d be a delay in seeing their success. Thus, the
    traditional evaluation technique won’t apply to you.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
- en: Are you a person who doesn’t care about numbers, insights, or models? Do you
    consider yourself more like a software engineer than a data scientist? But do
    you want to be a data scientist anyway? Consider the **data engineer** role.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
- en: You’d still do a lot of coding and work with databases.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
- en: Lastly, if you like to train models, evaluate them, perform data preprocessing,
    build pipelines, etc., an **ML engineer** role is better for you than the other.
    In an industrial setup, ML engineers don’t create new models. Instead, they use
    data and model selection to find the best solutions to the requirements.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
- en: Skills you’ll rarely use as a data scientist (If you were a software engineer
    before)
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As a former software engineer and a data scientist, I know a few things that
    are of little use today. Here are a few.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
- en: Design patterns and principles
  id: totrans-43
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Software design patterns distinguish skilled SEs from amateurs. These best practices
    allow us to develop software that is easy to maintain, scale, and reuse components.
    Since other developers widely recognize patterns, it helps a new person understand
    and collaborate with you quickly.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
- en: Design principles guide better coding and help maintain the codebase. [I strictly
    follow SOLID design principles](https://www.freecodecamp.org/news/solid-design-principles-in-software-development/)
    whenever I develop software.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
- en: Likewise, design patterns are like templates you can borrow to solve problems
    without wasting time.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
- en: I couldn’t say these are completely useless. If you’ve used libraries like Pandas,
    scikit-learn (or literally anything), they use these patterns and principles.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
- en: But as a person who mainly cares about getting insights from a dataset you just
    received or developing pipelines that execute a set of instructions one -after
    another after another, you’d rarely need them.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
- en: Web development frameworks (like Django)
  id: totrans-49
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: I was a Django developer. I loved doing it.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
- en: You might ask, "What if a data scientist wants to package their work in a web
    app? Don’t they need Django?"
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
- en: They certainly did in the past.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
- en: However, today, the need for data scientists has been replaced by tools like
    Streemlit or BI tools like Tableau and PowerBI. You don’t have to program everything
    yourself.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
- en: '[**6 Python GUI Frameworks to Create Desktop, Web, and Even Mobile Apps.**](https://towardsdatascience.com/5-python-gui-frameworks-to-create-desktop-web-and-even-mobile-apps-c25f1bcfb561)'
  id: totrans-54
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I recently used Django to create a workaround for Streamlit’s authentication
    issues. I also documented the methods in two previous posts ([Authentication](https://towardsdatascience.com/secure-your-streamlit-app-with-django-bb0bee2a6519)
    and a[uthorization](https://towardsdatascience.com/streamlit-access-control-dae3ab8b7888)).
    Streamlit at that time didn’t have these features. But today, this is an outdated
    advice.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
- en: Agile project management (such as scrum)
  id: totrans-56
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: During the transition, this was my biggest challenge. As software engineers
    who want to put features out every other week, a system like SCRUM is super helpful.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
- en: But this wasn’t easy when working with data – especially when the client owns
    the data.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
- en: Most of the time, the work we do is experimental. There’s no guarantee that
    you’d find the perfect ML model within the timespan of a sprint. Every time you
    see new data, you see new challenges that make time estimations tricky.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
- en: Even an analyst couldn’t say in advance that they will extract some number or
    insights in 2 weeks.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
- en: I remember what a manager said in my early days as a data analyst. "Torture
    the data until it starts screaming insight." And you don’t know when that’ll happen.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
- en: I then asked seasoned data scientists and SCRUM experts how to implement these
    principles in data science projects. They didn’t know.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
- en: New skills you may have to learn as a data scientist
  id: totrans-63
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Finally, we’re now ready to discuss the purpose of this post – what skills a
    software engineer wanting to be a data scientist must learn.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
- en: This is what my unofficial mentee and I agreed at last.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
- en: I’m a believer in the 80/20 rule. This means there’s a small subset of skills
    (20%) that makes the most impact in your career (80%)
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
- en: '[**These 5 SQL Techniques Cover ~80% of Real-Life Projects**](https://towardsdatascience.com/5-advanced-sql-techniques-for-real-life-projects-f2db9b6680e2)'
  id: totrans-67
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Your job is to self-assess your relevant skills and discover the 20% of new
    skills you need to learn to take you to your future self.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
- en: My friend, an SE and Django developer, already knew **Python** well. She was
    also good at **SQL**. Python and SQL alone would make her a fine data analyst.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
- en: 'However, she thinks machine learning is cooler than extracting insights from
    datasets. This raises more questions: Should we use traditional ML or Deep learning
    models? Should we use model fitting, computer vision, or NLP?'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
- en: Here’s what I suggested.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
- en: Regardless of anything, all data scientists use **Pandas** to some extent. You
    could get started on it in a couple of hours (just like any other library). But
    to be a data scientist, you should have some proficiency in Pandas. Therefore,
    that’s the first.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
- en: I didn’t suggest any courses or resources to learn about Pandas; she should
    be able to find some good ones by googling them for a few minutes.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
- en: Next **scikit-learn**. Again, a lot of data scientists use them. Even if you’re
    working on deep learning projects, you’d still be using some of the modules in
    scikit-learn. It’s worth learning.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
- en: Scikit Learn isn’t simply a library to produce ML models. You could do data
    preprocessing, model selection, etc.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: Scikit Learn不仅仅是一个用于生成机器学习模型的库。你还可以进行数据预处理、模型选择等。
- en: Then, a little bit of NLP. I suggested the library **TextBlob**. It’s a wrapper
    around the NLTK library, the holy grail of the NLP library in Python.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，一点点的NLP。我建议她学习**TextBlob**库。它是NLTK库的包装器，NLTK是Python中NLP库的圣杯。
- en: Finally, I’ve asked her to master either **Plotly** or **Streamlit**. Streamlit
    is easier to learn, and many other data scientists use it. However, with her experience
    in SE, something like Plotly would still be within easy reach.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我建议她精通**Plotly**或**Streamlit**。Streamlit更容易学习，许多其他数据科学家也在使用它。然而，鉴于她在SE（软件工程师）方面的经验，像Plotly这样的工具仍然触手可及。
- en: Python, SQL, Pandas, Scikit-learn, Steamlit, and TextBlog are good skills to
    consider as the top 20 percent that have an 80% impact on her career.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: Python、SQL、Pandas、Scikit-learn、Steamlit和TextBlog是值得考虑的顶级技能，这20%的技能对她的职业有80%的影响。
- en: Anyone could argue that these aren’t sufficient for data scientists in today’s
    competitive market. I agree. But with this, she could figure out where to go next.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 任何人都可以争论，这些技能在当今竞争激烈的市场中对于数据科学家来说并不足够。我同意。但有了这些，她可以找出下一步该去哪里。
- en: She’d choose tools like OpenCV and PyTourch if it’s computer vision. If she
    advanced in NLP, she’d choose libraries like SpaCy.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 如果是计算机视觉，她会选择像OpenCV和PyTourch这样的工具。如果她在自然语言处理（NLP）方面有所进步，她会选择像SpaCy这样的库。
- en: Final thoughts
  id: totrans-81
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最后的想法
- en: A lot of us want a career change. Few get their dream job as their first job.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 我们中的许多人想要改变职业。很少有人能将梦想工作作为他们的第一份工作。
- en: In this post, I’ve summarized what I’ve discussed with a friend who is an SE
    but wants to be a data scientist.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我总结了我与一位SE（软件工程师）朋友讨论的内容，他希望成为一名数据科学家。
- en: We figured out she wanted to be an ML engineer more than an analyst or a data
    engineer. Since she already knew Python and SQL, picking up what she needed to
    learn was easy.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 我们了解到她更想成为一名机器学习工程师，而不是分析师或数据工程师。既然她已经掌握了Python和SQL，学习她需要掌握的内容就变得容易了。
- en: We discovered that anyone wanting to be an ML engineer can focus on Python,
    SQL, Pandas, Scikit-learn, Steamlit, and TextBlog, as these are top skills that
    make most of your life as a data scientist.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 我们发现，任何想要成为机器学习工程师的人都可以专注于Python、SQL、Pandas、Scikit-learn、Steamlit和TextBlog，因为这些是大多数数据科学家生活中最重要的技能。
