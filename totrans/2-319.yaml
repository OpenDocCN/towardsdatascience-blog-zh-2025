- en: How to Evaluate LLMs and Algorithms — The Right Way
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/how-to-evaluate-llms-and-algorithms-the-right-way/](https://towardsdatascience.com/how-to-evaluate-llms-and-algorithms-the-right-way/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Never miss a new edition of *The Variable*, our weekly newsletter featuring
    a top-notch selection of editors’ picks, deep dives, community news, and more.
    [Subscribe today](https://newsletter.towardsdatascience.com/subscription-to-the-newsletter)!
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: All the hard work it takes to integrate [large language models](https://towardsdatascience.com/category/large-language-models/) and
    powerful algorithms into your workflows can go to waste if the outputs you see
    don’t live up to expectations. It’s the fastest way to lose stakeholders’ interest—or
    worse, their trust.
  prefs: []
  type: TYPE_NORMAL
- en: In this edition of the Variable, we focus on the best strategies for evaluating
    and benchmarking the performance of ML approaches, whether it’s a cutting-edge
    reinforcement learning algorithm or a recently unveiled LLM. We invite you to
    explore these standout articles to find an approach that suits your current needs.
    Let’s dive in.
  prefs: []
  type: TYPE_NORMAL
- en: 'LLM Evaluations: from Prototype to Production'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Not sure where or how to start? [Mariya Mansurova](https://towardsdatascience.com/author/miptgirl)
    presents a comprehensive guide, which walks us through the end-to-end process
    of building an evaluation system for LLM products — from assessing early prototypes
    to implementing continuous quality monitoring in production.
  prefs: []
  type: TYPE_NORMAL
- en: '[LLM Evaluations: from Prototype to Production](https://towardsdatascience.com/llm-evaluations-from-prototype-to-production/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: How to Benchmark DeepSeek-R1 Distilled Models on GPQA
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Leveraging Ollama and OpenAI’s simple-evals, [Kenneth Leung](https://towardsdatascience.com/author/kennethleungty)
    explains how to assess the reasoning capabilities of models based on DeepSeek.
  prefs: []
  type: TYPE_NORMAL
- en: '[How to Benchmark DeepSeek-R1 Distilled Models on GPQA Using Ollama and OpenAI’s
    simple-evals](https://towardsdatascience.com/how-to-benchmark-deepseek-r1-distilled-models-on-gpqa-using-ollama-and-openais-simple-evals/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Benchmarking Tabular Reinforcement Learning Algorithms
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Learn how to run experiments in the context of RL agents: [Oliver S](https://towardsdatascience.com/author/hrmnmichaels)
    unpacks the inner workings of multiple algorithms and how they stack up against
    each other.'
  prefs: []
  type: TYPE_NORMAL
- en: '[Benchmarking Tabular Reinforcement Learning Algorithms](https://towardsdatascience.com/benchmarking-tabular-reinforcement-learning-algorithms/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Other Recommended Reads
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Why not explore other topics this week, too? our lineup includes smart takes
    on AI ethics, survival analysis, and more:'
  prefs: []
  type: TYPE_NORMAL
- en: '[James O’Brien](https://towardsdatascience.com/author/objf/) reflects on an
    increasingly thorny question: how should human users treat AI agents trained to
    emulate human emotions?'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[The Westworld Blunder](https://towardsdatascience.com/the-westworld-blunder/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Tackling a similar topic from a different angle, [Marina Tosic](https://towardsdatascience.com/author/martosi/) wonders
    who we should blame when LLM-powered tools produce poor outcomes or inspire bad
    decisions.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Uh-Uh, Not Guilty](https://towardsdatascience.com/uh-uh-not-guilty/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Survival analysis isn’t just for calculating health risks or mechanical failure. [Samuele
    Mazzanti](https://towardsdatascience.com/author/mazzanti-sam/) shows that it can
    be equally relevant in a business context.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Survival Analysis When No One Dies: A Value-Based Approach](https://towardsdatascience.com/survival-analysis-when-no-one-dies-a-value-based-approach/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Using the wrong type of log can create major issues when interpreting results. [Ngoc
    Doan](https://towardsdatascience.com/author/ngoc-doan/) explains how that happens—and how
    to avoid some common pitfalls.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Log Link vs Log Transformation in R — The Difference that Misleads Your Entire
    Data Analysis](https://towardsdatascience.com/log-link-vs-log-transformation-in-r-the-difference-that-misleads-your-entire-data-analysis/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: How has the arrival of ChatGPT changed the way we learn new skills? Reflecting
    on her own journey in programming, [Livia Ellen](https://towardsdatascience.com/author/liviaellen/) argues
    that it’s time for a new paradigm.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[How Would I Learn to Code with ChatGPT if I Had to Start Again](https://towardsdatascience.com/how-would-i-learn-to-code-with-chatgpt-if-i-had-to-start-again/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
