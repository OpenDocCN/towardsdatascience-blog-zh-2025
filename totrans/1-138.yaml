- en: Graph RAG vs SQL RAG
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 图形RAG与SQL RAG的比较
- en: 原文：[https://towardsdatascience.com/graph-rag-vs-sql-rag/](https://towardsdatascience.com/graph-rag-vs-sql-rag/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/graph-rag-vs-sql-rag/](https://towardsdatascience.com/graph-rag-vs-sql-rag/)
- en: I <mdspan datatext="el1761936385252" class="mdspan-comment">stored a Formula
    1 [results dataset](https://www.kaggle.com/datasets/rohanrao/formula-1-world-championship-1950-2020)</mdspan>
    in both a graph database and a SQL database, then used various large language
    models (LLMs) to answer questions about the data through a retrieval-augmented
    generation (RAG) approach. By using the same dataset and questions across both
    systems, I evaluated which database paradigm delivers more accurate and insightful
    results.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 我将一个一级方程式[结果数据集](https://www.kaggle.com/datasets/rohanrao/formula-1-world-championship-1950-2020)存储在图形数据库和SQL数据库中，然后使用各种大型语言模型（LLMs）通过检索增强生成（RAG）方法来回答关于数据的问题。通过在两个系统中使用相同的dataset和问题，我评估了哪种数据库范式能提供更准确和有洞察力的结果。
- en: '**Retrieval-Augmented Generation (RAG)** is an AI framework that enhances large
    language models (LLMs) by letting them *retrieve* relevant external information
    before generating an answer. Instead of relying solely on what the model was trained
    on, RAG dynamically queries a knowledge source (in this article a SQL or graph
    database) and integrates those results into its response. An introduction to RAG
    can be found [here](https://towardsdatascience.com/retrieval-augmented-generation-rag-an-introduction/).'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '**检索增强生成（RAG）**是一个AI框架，它通过允许模型在生成答案之前检索相关的外部信息来增强大型语言模型（LLMs）。RAG不是仅仅依赖于模型训练的内容，而是动态查询知识源（在本篇文章中是一个SQL或图形数据库），并将这些结果整合到其响应中。RAG的介绍可以在[这里](https://towardsdatascience.com/retrieval-augmented-generation-rag-an-introduction/)找到。'
- en: SQL databases organize data into **tables** made up of rows and columns. Each
    row represents a record, and each column represents an attribute. Relationships
    between tables are defined using **keys** and **joins**, and all data follows
    a fixed **schema**. SQL databases are ideal for structured, transactional data
    where consistency and precision are important — for example, finance, inventory,
    or patient records.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: SQL数据库将数据组织成由行和列组成的**表**。每一行代表一条记录，每一列代表一个属性。表之间的关系使用**键**和**连接**定义，所有数据都遵循固定的**模式**。SQL数据库非常适合结构化、事务性数据，其中一致性和精度很重要——例如，金融、库存或患者记录。
- en: Graph databases store data as **nodes** (entities) and **edges** (relationships)
    with optional **properties** attached to both. Instead of joining tables, they
    directly represent relationships, allowing for fast traversal across connected
    data. Graph databases are ideal for modelling **networks and relationships** —
    such as social graphs, knowledge graphs, or molecular interaction maps — where
    connections are as important as the entities themselves.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 图形数据库将数据存储为**节点**（实体）和**边**（关系），两者都可以附加可选的**属性**。它们不使用表连接，而是直接表示关系，允许快速遍历连接的数据。图形数据库非常适合建模**网络和关系**——例如社交图、知识图或分子相互作用图——在这些图中，连接与实体本身一样重要。
- en: Data
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据
- en: The dataset I used to compare the performance of RAGs contains Formula 1 results
    from 1950 to 2024\. It includes detailed results at races of drivers and constructors
    (teams) covering qualifying, sprint race, main race, and even lap times and pit
    stop times. The standings of the drivers and constructors’ championships after
    every race are also included.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 我用来比较RAG性能的dataset包含了从1950年到2024年的一级方程式结果。它包括关于车手和车队（团队）在资格赛、冲刺赛、主赛以及甚至圈速和停站时间的详细结果。每场比赛后的车手和车队冠军排名也包括在内。
- en: SQL Schema
  id: totrans-8
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: SQL模式
- en: 'This dataset is already structured in tables with keys so that a SQL database
    can be easily set up. The database’s schema is shown below:'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 此数据集已经以表格形式结构化，带有键，以便可以轻松设置SQL数据库。数据库的模式如下所示：
- en: '![](../Images/eddaf2d359140ccf3bb680a75405eed6.png)'
  id: totrans-10
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/eddaf2d359140ccf3bb680a75405eed6.png)'
- en: SQL Database Design
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: SQL数据库设计
- en: '*Races* is the central table which is linked with all types of results as well
    as additional information like season and circuits. The results tables are also
    linked with *Drivers* and *Constructors* tables to record their result at each
    race. The championship standings after each race are stored in the *Driver_standings*
    and *Constructor_standings* tables.'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '*Races*是中心表，它与所有类型的结果以及额外的信息（如赛季和赛道）相关联。结果表也与*Drivers*和*Constructors*表相关联，以记录他们在每场比赛的结果。每场比赛后的车手和车队冠军排名存储在*Driver_standings*和*Constructor_standings*表中。'
- en: Graph Schema
  id: totrans-13
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 图形模式
- en: 'The schema of the graph database is shown below:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是图数据库的模式：
- en: '![](../Images/79b2576f97ac8c9b0b98f2b9dbba7549.png)'
  id: totrans-15
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/79b2576f97ac8c9b0b98f2b9dbba7549.png)'
- en: Graph Database Design
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 图数据库设计
- en: As graph databases can store information in nodes and relationships it only
    requires six nodes compared to 14 tables of the SQL database. The *Car* node is
    an intermediate node that is used to model that a driver drove a car of a constructor
    at a particular race. Since driver – constructor pairings are changing over time,
    this relationship needs to be defined for each race. The race results are stored
    in the relationships e.g. *:RACED* between *Car* and *Race.* While the *:STOOD_AFTER*
    relationships contain the driver and constructor championship standings after
    each race.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 由于图数据库可以在节点和关系中存储信息，因此与SQL数据库的14张表相比，它只需要六个节点。*Car*节点是一个中间节点，用于表示车手在特定赛事中驾驶了某个构造商的赛车。由于车手-构造商配对会随时间变化，因此这种关系需要为每一场赛事定义。赛事结果存储在关系中，例如*Car*和*Race.*之间的*:RACED*关系。而*:STOOD_AFTER*关系则包含每场赛事后车手和构造商的锦标赛排名。
- en: Querying the Database
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 查询数据库
- en: I used [LangChain](https://python.langchain.com/docs/tutorials/sql_qa/) to build
    a RAG chain for both database types that generates a query based on a user question,
    runs the query, and converts the query result to an answer to the user. The code
    can be found in this [repo](https://github.com/ReinhardSellmair/graph_rag). I
    defined a generic system prompt that could be used to generate queries of any
    SQL or graph database. The only data specific information was included by inserting
    the auto-generated database schema into the prompt. The system prompts can be
    found [here](https://github.com/ReinhardSellmair/graph_rag/blob/main/src/qa_chain.py).
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 我使用了[LangChain](https://python.langchain.com/docs/tutorials/sql_qa/)来为两种数据库类型构建一个RAG链，该链根据用户问题生成查询，执行查询，并将查询结果转换为对用户的答案。代码可以在本[仓库](https://github.com/ReinhardSellmair/graph_rag)中找到。我定义了一个通用的系统提示，可用于生成任何SQL或图数据库的查询。唯一的数据特定信息是通过将自动生成的数据库模式插入提示中包含的。系统提示可以在[这里](https://github.com/ReinhardSellmair/graph_rag/blob/main/src/qa_chain.py)找到。
- en: 'Here is an example how to initialize the model chain and ask the question:
    “What driver won the 92 Grand Prix in Belgium?”'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是一个如何初始化模型链并提问的例子：“哪位车手赢得了在比利时举办的92年大奖赛？”
- en: '[PRE0]'
  id: totrans-21
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'Which returns:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 返回结果：
- en: '[PRE1]'
  id: totrans-23
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: The SQL query joins the *Results*, *Races*, and *Drivers* tables, selects the
    race at the 1992 Belgian Grand Prix and the driver who finished first. The LLM
    converted the year 92 to 1992 and the race name from “Grand Prix in Belgium” to
    “Belgian Grand Prix”. It derived these conversions from the database schema which
    included three sample rows of each table. The query result is “Michael Schumacher”
    which the LLM returned as answer.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: SQL查询将*Results*、*Races*和*Drivers*表连接起来，选择1992年比利时大奖赛的比赛和获得第一名的车手。LLM将年份92转换为1992年，并将赛事名称从“Grand
    Prix in Belgium”转换为“Belgian Grand Prix”。这些转换是从包含每个表三个样本行的数据库模式中得出的。查询结果是“迈克尔·舒马赫”，这是LLM返回的答案。
- en: Evaluation
  id: totrans-25
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 评估
- en: Now the question I want to answer is if an LLM is better in querying the SQL
    or the graph database. I defined three difficulty levels (easy, medium, and hard)
    where easy were questions that could be answered by querying data from only one
    table or node, medium were questions which required one or two links among tables
    or nodes and hard questions required more links or subqueries. For each difficulty
    level I defined five questions. Additionally, I defined five questions that could
    not be answered with data from the database.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我想要回答的问题是，LLM在查询SQL数据库或图数据库方面是否更好。我定义了三个难度级别（简单、中等和困难），其中简单的问题是只需查询一个表或节点的数据即可回答的问题，中等问题需要表或节点之间的一到两个链接，而困难问题则需要更多的链接或子查询。对于每个难度级别，我定义了五个问题。此外，我还定义了五个无法用数据库中的数据回答的问题。
- en: 'I answered each question with three LLM models (GPT-5, GPT-4, and GPT-3.5-turbo)
    to analyze if the most advanced models are needed or older and cheaper models
    could also create satisfactory results. If a model gave the correct answer, it
    got 1 point, if it replied that it could not answer the question it got 0 points,
    and in case it gave a wrong answer it got -1 point. All questions and answers
    are listed [here](https://github.com/ReinhardSellmair/graph_rag/blob/main/qa_results.csv).
    Below are the scores of all models and database types:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
- en: '| **Model** | **Graph DB** | **SQL DB** |'
  id: totrans-28
  prefs: []
  type: TYPE_TB
- en: '| GPT-3.5-turbo | -2 | 4 |'
  id: totrans-29
  prefs: []
  type: TYPE_TB
- en: '| GPT-4 | 7 | 9 |'
  id: totrans-30
  prefs: []
  type: TYPE_TB
- en: '| GPT-5 | 18 | 18 |'
  id: totrans-31
  prefs: []
  type: TYPE_TB
- en: Model – Database Evaluation Scores
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
- en: 'It is remarkable how more advanced models outperform simpler models: GPT-3-turbo
    got about half the number of questions wrong, GPT-4 got 2 to 3 questions wrong
    but could not answer 6 to 7 questions, and GPT-5 got all except one question correct.
    Simpler models seem to perform better with a SQL than graph database while GPT-5
    achieved the same score with either database.'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: The only question GPT-5 got wrong using the SQL database was “Which driver won
    the most world championships?”. The answer “Lewis Hamilton, with 7 world championships”
    is not correct because Lewis Hamilton and Michael Schumacher won 7 world championships.
    The generated SQL query aggregated the number of championships by driver, sorted
    them in descending order and only selected the first row while the driver in the
    second row had the same number of championships.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
- en: Using the graph database, the only question GPT-5 got wrong was “Who won the
    Formula 2 championship in 2017?” which was answered with “Lewis Hamilton” (Lewis
    Hamilton won the Formula 1 but not Formula 2 championship that year). This is
    a tricky question because the database only contains Formula 1 but not Formula
    2 results. The expected answer would have been to reply that this question could
    not be answered based on the provided data. However, considering that the system
    prompt did not contain any specific information about the dataset it is understandable
    that this question was not correctly answered.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: Interestingly using the SQL database GPT-5 gave the correct answer “Charles
    Leclerc”. The generated SQL query only searched the drivers table for the name
    “Charles Leclerc”. Here the LLM must have recognized that the database does not
    contain Formula 2 results and answered this question from its common knowledge.
    Although this led to the correct answer in this case it can be dangerous when
    the LLM is not using the provided data to answer questions. One way to reduce
    this risk could be to explicitly state in the system prompt that the database
    must be the only source to answer questions.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  id: totrans-37
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This comparison of RAG performance using a Formula 1 results dataset shows that
    the latest LLMs perform exceptionally well, producing highly accurate and contextually
    aware answers without any additional prompt engineering. While simpler models
    struggle, newer ones like GPT-5 handle complex queries with near-perfect precision.
    Importantly, there was no significant difference in performance between the graph
    and SQL database approaches – users can simply choose the database paradigm that
    best fits the structure of their data.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 使用一级方程式结果数据集对RAG性能进行的比较表明，最新的LLM表现异常出色，能够产生高度准确和上下文感知的答案，而无需任何额外的提示工程。虽然简单的模型难以应对，但像GPT-5这样的新模型能够以近乎完美的精确度处理复杂查询。重要的是，图数据库和SQL数据库方法在性能上没有显著差异——用户只需选择最适合其数据结构的数据库范式即可。
- en: The dataset used here serves only as an illustrative example; results may differ
    when using other datasets, especially those that require specialized domain knowledge
    or access to non-public data sources. Overall, these findings highlight how far
    retrieval-augmented LLMs have advanced in integrating structured data with natural
    language reasoning.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 这里使用的数据集仅作为说明性示例；使用其他数据集时，结果可能会有所不同，尤其是那些需要特定领域知识或访问非公开数据源的数据集。总的来说，这些发现突出了检索增强型大型语言模型在将结构化数据与自然语言推理相结合方面取得的进步。
- en: '*If not stated otherwise, all images were created by the author.*'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: '*除非另有说明，所有图像均由作者创建。*'
