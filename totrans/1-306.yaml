- en: Final Thoughts – Pitfalls, tips and next steps
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: LangChain is very practical for this example because it already includes and
    nicely illustrates the entire agent loop (planning, tool calling, control). For
    small or clearly structured tasks, however, alternatives such as pure function
    calling (e.g., via the OpenAI API) or classic EDA frameworks like Great Expectations
    might be sufficient. That said, LangChain does add some overhead. If you only
    need fixed EDA checks, a plain Python script would be leaner and faster. LangChain
    is especially worthwhile when you want to extend things flexibly or orchestrate
    multiple tools and agents.
  prefs: []
  type: TYPE_NORMAL
- en: 'When working with agents, there are a few things you should keep in mind:'
  prefs: []
  type: TYPE_NORMAL
- en: 'One common pitfall is unclear tool descriptions: If the descriptions are too
    vague, the model can easily choose the wrong tool (misrouting). With precise and
    concrete descriptions, we can greatly reduce this.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Another important point is testing: Even a small mini-evaluation with three
    simple tests is helpful in detecting regressions (errors that stay unnoticed due
    to subsequent changes) at an early stage.'
  prefs: []
  type: TYPE_NORMAL
- en: 'It’s also worth starting small: In our example, we only worked with three clearly
    defined tools, but now we know that they work reliably.'
  prefs: []
  type: TYPE_NORMAL
- en: With regard to this agent, it might also be useful to incorporate sampling (for
    example, *df.sample(n=10000))* for very large CSV files to avoid performance issues.
    Keep in mind that LLM agents can also become costly if every question triggers
    multiple tool calls.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this article, we built a single agent that checks CSV files. In practice,
    multiple agents would often work together: For example, one agent could ensure
    data quality while a second agent creates visualizations. Such multi-agent systems
    are the next step in solving more complex tasks.'
  prefs: []
  type: TYPE_NORMAL
- en: As a next step, we could also incorporate [LangGraph](https://www.langchain.com/langgraph)
    to extend the agent loop with states and orchestration. This would allow us to
    assemble agents as in a flowchart, including interruptions, memory, or more flexible
    control logic.
  prefs: []
  type: TYPE_NORMAL
- en: Finally, in our example, we manually defined the three tools schema, nulls,
    and describe. With the [Model Context Protocol](https://www.anthropic.com/news/model-context-protocol)
    (MCP), we could connect tools in a standardized way. For example, we could connect
    databases, APIs or IDEs.
  prefs: []
  type: TYPE_NORMAL
