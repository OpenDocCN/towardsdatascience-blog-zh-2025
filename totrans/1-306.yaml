- en: 'LangChain for EDA: Build a CSV Sanity-Check Agent in Python'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/langchain-for-eda-build-a-csv-sanity-check-agent-in-python/](https://towardsdatascience.com/langchain-for-eda-build-a-csv-sanity-check-agent-in-python/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1757360600202" class="mdspan-comment">Chatbots answer questions</mdspan>,
    agents perform actions.
  prefs: []
  type: TYPE_NORMAL
- en: That’s exactly what we’re going to try out in today’s article.
  prefs: []
  type: TYPE_NORMAL
- en: In this article, we’ll use LangChain and Python to build our own CSV sanity
    check agent. With this agent, we’ll automate typical exploratory data analysis
    (EDA) tasks as displaying columns, detecting missing values (NaNs) and retrieving
    descriptive statistics.
  prefs: []
  type: TYPE_NORMAL
- en: Agents decide step by step which tool to call and when to answer a question
    about our data. This is a big difference from an application in the traditional
    sense, where the developer defines how the process works (e.g., via if-else loops).
    It also goes far beyond simple prompting because we are building a system that
    acts (albeit in a simple way) and doesn’t just talk.
  prefs: []
  type: TYPE_NORMAL
- en: 'This article is for you if you:'
  prefs: []
  type: TYPE_NORMAL
- en: …work with Pandas and want to automate EDA.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: …find LLMs exciting, but have little experience with LangChain so far.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: …want to understand how agents really work (from setup to mini-evaluation) using
    a simple example.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '***Table of Contents**'
  prefs: []
  type: TYPE_NORMAL
- en: '[What we build & why](#pagejump1)'
  prefs: []
  type: TYPE_NORMAL
- en: '[Hands-On-Example: CSV-Sanity-Check Agent with LangChain](#pagejump2)'
  prefs: []
  type: TYPE_NORMAL
- en: '[Mini-Evaluation](#pagejump3)'
  prefs: []
  type: TYPE_NORMAL
- en: '[Final Thoughts – Pitfalls, Tips and Next Steps](#pagejump4)'
  prefs: []
  type: TYPE_NORMAL
- en: '[Where Can You Continue Learning?](#pagejump5)*'
  prefs: []
  type: TYPE_NORMAL
- en: What we build & why
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: An agent is a system to which we assign tasks. The system then decides for itself
    which tools to use to solve these tasks.
  prefs: []
  type: TYPE_NORMAL
- en: 'This requires three components:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Agent = LLM + Tools + Control logic**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s take a closer look at the three components:'
  prefs: []
  type: TYPE_NORMAL
- en: 'The LLM provides the intelligence: It understands the question, plans steps,
    and decides what to do.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The tools are small Python functions that the agent is allowed to call (e.g.,
    *get_schema()* or *get_nulls())*: They provide specific information from the data,
    such as column names or statistics.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The control logic (policy) ensures that the LLM does not respond immediately,
    but first decides whether it should use a tool. It thinks step by step: First,
    the question is analyzed, then the appropriate tool is selected, then the result
    is interpreted and, if necessary, a next step is selected, and finally a response
    is returned.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Instead of manually describing all data as in classic prompting, we transfer
    the responsibility to the agent: The system should act on its own, but only with
    the tools provided.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s look at a simple example:'
  prefs: []
  type: TYPE_NORMAL
- en: 'A user asks: “What is the average age in the CSV?”'
  prefs: []
  type: TYPE_NORMAL
- en: 'At this point, the agent calls up the tool we have defined, *df.describe()*.
    The output is a clearly structured value (e.g., “mean”: 29.7). Here we can also
    see that this can reduce or minimize hallucinations, as the system knows what
    to apply and cannot return an answer such as “Probably between 20 and 40.”'
  prefs: []
  type: TYPE_NORMAL
- en: LangChain as a framework
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'We use the [LangChain framework](https://www.langchain.com/) for the agent.
    This allows us to connect LLMs with tools and build systems with defined behavior.
    The system can perform actions instead of just providing answers or generating
    text. A detailed explanation would make this article too long. But in a previous
    article, you can find an explanation of LangChain and a comparison with Langflow:
    [LangChain vs Langflow: Build a Simple LLM App with Code or Drag & Drop](https://medium.com/data-science-collective/langchain-vs-langflow-build-a-simple-llm-app-with-code-or-drag-drop-cbace40c12b1).'
  prefs: []
  type: TYPE_NORMAL
- en: What the agent does for us
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'When we receive a new CSV, we usually ask ourselves the following questions
    first (start of exploratory data analysis):'
  prefs: []
  type: TYPE_NORMAL
- en: What columns are there?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Where is data missing?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What do the descriptive statistics look like?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This is exactly what we want the agent to do automatically.
  prefs: []
  type: TYPE_NORMAL
- en: Tools we define for the agent
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: For the agent to work, it needs clearly defined tools. It is best to define
    them as small, specific, and controlled as possible. This way, we avoid errors,
    hallucinations or unclear outputs because they make the output deterministic.
    They also make the agent reproducible and testable because the same input should
    produce a consistent result.
  prefs: []
  type: TYPE_NORMAL
- en: 'In our example, we define three tools:'
  prefs: []
  type: TYPE_NORMAL
- en: '**schema:** Returns column names and data types.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**nulls:** Shows columns with missing values (including number).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**describe:** Provides descriptive statistics for numeric columns.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Later, we will add a small mini-evaluation to ensure that our agent is working
    correctly.
  prefs: []
  type: TYPE_NORMAL
- en: Why is this an agent and not an app?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'We are not building a classic program with a fixed sequence (e.g., using if-else),
    but rather the model plans itself based on the question, selects the appropriate
    tool, and combines steps as necessary to arrive at an answer:'
  prefs: []
  type: TYPE_NORMAL
- en: '![The image shows the difference between a traditional app and this agent.](../Images/c1a6ca970dccd2a96919f1b644fc3aef.png)'
  prefs: []
  type: TYPE_IMG
- en: Visualization by the author.
  prefs: []
  type: TYPE_NORMAL
- en: 'Hands-On-Example: CSV-Sanity-Check Agent with LangChain'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 1) Setup
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Prerequisite: Python 3.10 or higher must be installed. Many packages in the
    AI tooling world require ≥ 3.10\. You can find the code and the link to the repo
    below.'
  prefs: []
  type: TYPE_NORMAL
- en: '*Tip for newbies:*'
  prefs: []
  type: TYPE_NORMAL
- en: '*You can check this by entering “python –version” in cmd.exe.*'
  prefs: []
  type: TYPE_NORMAL
- en: With the code below, we first create a new project, create an isolated Python
    environment and activate it. We do this so that packages and versions are reproducible
    and do not consolidate with other projects.
  prefs: []
  type: TYPE_NORMAL
- en: '*Tip for newbies:*'
  prefs: []
  type: TYPE_NORMAL
- en: '*I work with Windows. We open a terminal with Windows + R > cmd and paste the
    following code*.'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'Then we install the necessary packages:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: With this command, we pin LangChain to the 0.2 line and install the OpenAI connection
    and the community package. We also install pandas for the EDA functions and seaborn
    for loading the Titanic sample dataset.
  prefs: []
  type: TYPE_NORMAL
- en: '![The image shows creating an environment and installing packages.](../Images/2b28d0222ef24dbf60e833cc58e8ca80.png)'
  prefs: []
  type: TYPE_IMG
- en: Screenshot taken by the author.
  prefs: []
  type: TYPE_NORMAL
- en: '*Tip for newbies:*'
  prefs: []
  type: TYPE_NORMAL
- en: '*If you don’t want to use OpenAI, you can work locally with Ollama (e.g., with
    Llama or Mistral). This option is available later in the code*.'
  prefs: []
  type: TYPE_NORMAL
- en: 2) Prepare the data set in prepare_data.py
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Next, we create a Python file called *prepare_data.py*. I use Visual Studio
    Code for this, but you can also use another IDE. In this file, we load the Titanic
    dataset, as it is publicly available.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: With *seaborn.load_dataset(“titanic”)*, we load the public dataset (891 rows
    + first row with column names) directly into memory and save it as titanic.csv.
    The dataset contains only numeric, Boolean and categorical columns, making it
    ideal for an EDA agent.
  prefs: []
  type: TYPE_NORMAL
- en: '*Tips for newbies*:'
  prefs: []
  type: TYPE_NORMAL
- en: '*sns.load_dataset() requires internet access (the data comes from the seaborn
    repo).*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Save the file in the project folder (csv-agent) so htat main.py can find it.*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'In the terminal, we execute the Python file with the following command, so
    that the titanic.csv file is located in the project:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: 'We then see in the terminal that the csv has been saved and see the titanic.csv
    file in the folder:'
  prefs: []
  type: TYPE_NORMAL
- en: '![The image shows the result in the terminal after the csv is saved.](../Images/d57ffc543eccc46a2359cdb1c75df039.png)'
  prefs: []
  type: TYPE_IMG
- en: Screenshot taken by the author.
  prefs: []
  type: TYPE_NORMAL
- en: '![The image shows the folder structure of the project.](../Images/dcf157da1cc2cbec5d182b4c824ebe2f.png)'
  prefs: []
  type: TYPE_IMG
- en: Screenshot taken by the author.
  prefs: []
  type: TYPE_NORMAL
- en: Side Note – Titanic dataset
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The analysis is based on the Titanic dataset ([OpenML ID 40945](https://www.openml.org/search?type=data&sort=runs&id=40945&status=active)),
    which is marked as public on OpenML.
  prefs: []
  type: TYPE_NORMAL
- en: When we open the file, we see the following 14 columns and 891 rows of data.
    The Titanic dataset is a classic example of exploratory data analysis (EDA). It
    contains information on 891 passengers of the Titanic and is often used to investigate
    the relationship between characteristics (e.g., gender, age, ticket class) and
    survival.
  prefs: []
  type: TYPE_NORMAL
- en: '![The image shows the Titanic dataset in Excel.](../Images/91b322b1d04b64c9d501def1e9097f83.png)'
  prefs: []
  type: TYPE_IMG
- en: Screenshot taken by the author.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are the 14 columns with a brief explanation:'
  prefs: []
  type: TYPE_NORMAL
- en: '**survived**: Survived (1) or did not survive (0).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**pclass**: Ticket class (1 = 1st class, 2 = 2nd class, 3 = 3rd class).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**sex**: Gender of the passenger.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**age**: Age of the passenger (in years, may be missing).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**sibsp**: Number of siblings/spouses on board.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**parch**: Number of parents/children on board.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**fare**: Fare paid by the passenger.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**embarked**: Port of embarkation (C = Cherbourg, Q = Queenstown, S = Southampton).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**class**: Ticket class as text (First, Second, Third). Corresponds to pclass.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**who**: Categorization “man,” “woman,” “child.”'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**adult_male**: Boolean field: Was the passenger an adult male (True/False)?'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**deck**: Cabin deck (often missing).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**embark_town**: City of port of embarkation (Cherbourg, Queenstown, Southampton).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**alone**: Boolean field: Did the passenger travel alone (True/False)?'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '***Optional for advanced readers**'
  prefs: []
  type: TYPE_NORMAL
- en: If you want to track and evaluate your agent runs later, you can use [LangSmith](https://docs.langchain.com/langsmith/home).*
  prefs: []
  type: TYPE_NORMAL
- en: 2) Define tools in main.py
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Next, we define the various tools. To do this, we create a new Python file
    called *main.py* and save it in the csv-agent folder as well. We add the following
    code to it:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: 'After importing the necessary packages, we load titanic.csv into *df* once
    and define three small, narrowly defined tools. Let’s take a closer look at each
    of these tools:'
  prefs: []
  type: TYPE_NORMAL
- en: '*tool_schema* returns the column names and data types as JSON. This gives us
    an overview of what we are dealing with and is usually the first step in any data
    analysis. Even if a tool doesn’t need input (like schema), it must still accept
    one argument, because the agent always passes a string. We simply ignore it.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*tool_nulls* counts missing values per column and returns only columns with
    missing values.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*tool_describe* calls df.describe(). It is important to note that this tool
    only works for numeric columns. Strings or Booleans, on the other hand, are ignored.
    This is an important step in the sanity check or EDA. This allows us to quickly
    see the mean, min, max, etc. of the different columns. For large CSVs, describe()
    can take a long time. In this case, you could integrate *df.sample(n=10000)* as
    sampling logic, for example.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'These tools are the controlled interfaces through which the LLM is allowed
    to access the data. They are deterministic and therefore reproducible. Tools should
    ideally be clear and limited: In other words, they should have only one function
    or task.'
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Why do we need tools at all?
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: '*An LLM can generate text, but it cannot directly “see” data. In order for
    the LLM to work meaningfully with a CSV, we need to provide interfaces.* *That’s
    exactly what tools are for:*'
  prefs: []
  type: TYPE_NORMAL
- en: '*Tools are small Python functions that the agent is allowed to call. Instead
    of making everything free, we only allow very specific, reproducible actions.*'
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: What exactly does the code do?
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: With the @tool decorator, LangChain automatically infers the tool’s name, description
    and argument schema from the function signature and docstring. This means we only
    need to write the function itself. LangChain takes care of the rest.
  prefs: []
  type: TYPE_NORMAL
- en: 'The model passes arguments that match the tool’s schema (often JSON). In this
    tutorial we keep things simple and accept a single string argument (e.g., `input_str:
    str` or a dummy string we ignore).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Tools always return a string (text). JSON is ideal for structured data, which
    we define with *return json.dumps(…)*.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![This image shows how the agent uses multi-step reasoning with tools.](../Images/df70afb61c2552613bac21a3f6e006e4.png)'
  prefs: []
  type: TYPE_IMG
- en: Visualization by the author.
  prefs: []
  type: TYPE_NORMAL
- en: 'This is a multi-step thought process. The LLM plans iteratively. Instead of
    responding directly, it thinks step by step: it decides which tool to call, interprets
    the result, and may continue until it has enough information to respond.'
  prefs: []
  type: TYPE_NORMAL
- en: 4) Registering tools for LangChain in main.py
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'We add the code below to the same *main.py* file to register the previously
    defined tools for the agent:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: With this code, we simply collect the decorated functions into a list. Each
    function has already been converted into a LangChain tool by the @tool decorator.
  prefs: []
  type: TYPE_NORMAL
- en: 5) Configuring LLM in main.py
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Next, we configure the LLM that the agent uses. Here, you can either use the
    variant for OpenAI or for an open-source tool with Ollama.
  prefs: []
  type: TYPE_NORMAL
- en: 'I used OpenAI, which is why we first need to set the API key:'
  prefs: []
  type: TYPE_NORMAL
- en: 'At [OpenAI](https://platform.openai.com/api-keys), we create a new API key:'
  prefs: []
  type: TYPE_NORMAL
- en: '![The image shows how to create an API-Key in OpenAI.](../Images/a8434e3f3a33020358aaeb4c1260b1f8.png)'
  prefs: []
  type: TYPE_IMG
- en: Screenshot taken by the author.
  prefs: []
  type: TYPE_NORMAL
- en: We then copy it directly (it will not be displayed later) and set it as an environment
    variable in the terminal with the following command.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: It is important to restart cmd and reactivate .venv afterwards. We can use echo
    to check whether an API key has been saved.
  prefs: []
  type: TYPE_NORMAL
- en: '![The image shows how to check in the terminal, if the API-Key was saved.](../Images/1e8643114bfae0bda613198c34a9e846.png)'
  prefs: []
  type: TYPE_IMG
- en: Screenshot taken by the author.
  prefs: []
  type: TYPE_NORMAL
- en: 'Now we add the following code to the end of *main.py*:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: The code uses OpenAI if an OpenAI_API_KEY is available, otherwise Ollama locally.
  prefs: []
  type: TYPE_NORMAL
- en: We set the temperature to 0.1\. This ensures that the responses are more deterministic,
    which is important for the subsequent test.
  prefs: []
  type: TYPE_NORMAL
- en: We also use gpt-4o-mini as the LLM. This is a lightweight model from OpenAI
    with a focus on tool usage.
  prefs: []
  type: TYPE_NORMAL
- en: '*Tip for Newbies:*'
  prefs: []
  type: TYPE_NORMAL
- en: '*The temperature determines how creatively an LLM responds. If we enter 0.0,
    it responds deterministically. This means that the model almost always returns
    the same answer when the input is the same. This is good for structured tasks
    such as tool usage, code or facts, for example. If we specify 1.0, the model responds
    creatively and with a wide variety of options. This means that the model varies
    more and can suggest different formulations or solutions, which is good for brainstorming
    or text ideas, for example.*'
  prefs: []
  type: TYPE_NORMAL
- en: 6) Defining the agent’s behavior in main.py using the policy
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In this step, we define how the agent should behave. The system prompt sets
    the policy.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: 'First, we import *ChatPromptTemplate* to structure our agent’s prompt. The
    most important part of the code is the system prompt: it defines the policy, i.e.,
    the “rules of the game” for the agent. In it, we define that the agent may only
    use one tool per step, that it should be concise, and that it may only use the
    tools we have defined.'
  prefs: []
  type: TYPE_NORMAL
- en: With the last two lines in the system prompt, we ensure that *{tools}* lists
    all available tools with their descriptions and with *{tool_names}*, we ensure
    that the agent can only use these names and cannot invent fantasy tools.
  prefs: []
  type: TYPE_NORMAL
- en: 'In addition, we use *MesagesPlaceholder(“agent_scratchpad”)*. This is where
    the agent stores intermediate steps: The agent stores which tools it has called
    and which results it has received. This allows it to continue its own chain of
    reasoning until it arrives at a final answer.'
  prefs: []
  type: TYPE_NORMAL
- en: 7) Create tool-calling agent in main.py
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'In the last step, we define the agent:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: With *create_tool_calling_agent*, we connect our LLM, the tools and the prompt
    to form a tool-calling agent.
  prefs: []
  type: TYPE_NORMAL
- en: 'To ensure that the process runs smoothly, we use the *AgentExecutor*. It takes
    care of the so-called agent loop: The agent first plans what needs to be done,
    then calls up a tool, receives the result and decides whether another tool is
    needed or whether it can provide the final answer. This cycle repeats until the
    result is ready.'
  prefs: []
  type: TYPE_NORMAL
- en: With *verbose=True*, we can view the intermediate steps in the terminal, which
    is extremely helpful for debugging. For example, we can see which tool was called
    when or what data was returned. If everything is running smoothly, we can also
    set it to *=False* to keep the output clearer.
  prefs: []
  type: TYPE_NORMAL
- en: With *max_iterations=3*, we limit how many reasoning–tool–response cycles the
    agent may perform. This helps prevent infinite loops or excessive tool calls.
    In our example, the agent might reasonably call schema → nulls → describe before
    answering.
  prefs: []
  type: TYPE_NORMAL
- en: With the last part of the code, the agent is executed with the sample input
    “Which columns have missing values?”. The result is printed in the terminal.
  prefs: []
  type: TYPE_NORMAL
- en: '*Tip for newbies:*'
  prefs: []
  type: TYPE_NORMAL
- en: '*if name == “main”: is a standard Python pattern: If we execute the file directly
    in the terminal with python main.py, the code in this block will be started. However,
    if we only import the file (e.g., later in the mini_eval.py file), this block
    is skipped. This allows us to use the file as a standalone script or reuse it
    as a module in other projects.*'
  prefs: []
  type: TYPE_NORMAL
- en: '8) Run the script: Run the file main.py in the terminal.'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Now we enter *python main.py* in the terminal to start the agent. We then see
    the final answer in the terminal:'
  prefs: []
  type: TYPE_NORMAL
- en: '![The image shows the result that the agent shows in the terminal (how many
    missing values).](../Images/d35936b13da1ec02ed38712d0128883a.png)'
  prefs: []
  type: TYPE_IMG
- en: Screenshot taken by the author.
  prefs: []
  type: TYPE_NORMAL
- en: Mini-Evaluation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Finally, we want to check our agent, which we do with a small evaluation. This
    ensures that the agent behaves correctly and does not introduce any “regressions”
    when we change something in the code later on.
  prefs: []
  type: TYPE_NORMAL
- en: 'At the end of *main.py*, we add the code below:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: With *ask_agent*, we encapsulate the agent call in a function that simply returns
    a string. This allows us to call the agent later from other files.
  prefs: []
  type: TYPE_NORMAL
- en: The lower block ensures that a test run is performed when *main.py* is called
    directly. If, on the other hand, we import main into another file, only the function
    is provided.
  prefs: []
  type: TYPE_NORMAL
- en: 'Now we create the *mini_eval.py* file and insert the following code:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: In the code, we define three test cases. Each test consists of a question for
    the agent and a list of keywords that must appear in the answer. The *passed()*
    function checks whether these keywords are included.
  prefs: []
  type: TYPE_NORMAL
- en: '**Expected test results**'
  prefs: []
  type: TYPE_NORMAL
- en: '**Test 1: “Which columns have missing values?”**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Expected: Output mentions age, deck, embarked, embark_town.'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Test 2: “Show me the first 3 columns with their data types.”** Expected:
    Output contains survived, pclass, sex with types such as int64 or object.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Test 3: “Give me a statistical summary of the ‘age’ column.”** Expected output:
    Output contains mean ≈ 29.7, min = 0.42, max = 80.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If everything runs correctly, the script reports “Passed 3/3” at the end.
  prefs: []
  type: TYPE_NORMAL
- en: 'We get this output in the terminal. So the test works:'
  prefs: []
  type: TYPE_NORMAL
- en: '![The image shows the result of the mini-evaluation.](../Images/1312936a3f9c2490104bcd15f04fe0c2.png)'
  prefs: []
  type: TYPE_IMG
