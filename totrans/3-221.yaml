- en: Is Python Set to Surpass Its Competitors?
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/is-python-set-to-surpass-its-competitors/](https://towardsdatascience.com/is-python-set-to-surpass-its-competitors/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: A soufflé is a baked egg dish that originated in France in the 18th century.
    The process of making an elegant and delicious French soufflé is complex, and
    in the past, it was typically only prepared by professional French pastry chefs.
    However, with pre-made soufflé mixes now widely available in supermarkets, this
    classic French dish has found its way into the kitchens of countless households.
  prefs: []
  type: TYPE_NORMAL
- en: 'Python is like the pre-made soufflé mixes in programming. Many studies have
    consistently shown that Python is the most popular programming language among
    developers, and this advantage will continue to expand in 2025\. Python stands
    out compared to languages like C, C++, Java, and Julia because it’s highly readable
    and expressive, flexible and dynamic, beginner-friendly yet powerful. These characteristics
    make Python the most suitable programming language for people even without programming
    basics. The following features distinguish Python from other programming languages:'
  prefs: []
  type: TYPE_NORMAL
- en: Dynamic Typing
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: List Comprehensions
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Generators
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Argument Passing and Mutability
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These features reveal Python’s intrinsic nature as a programming language. Without
    this knowledge, you’ll never truly understand Python. In today’s article, I will
    elaborate how Python excels over other programming languages through these features.
  prefs: []
  type: TYPE_NORMAL
- en: Dynamic Typing
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: For most programming languages like Java or C++, explicit data type declarations
    are required. But when it comes to Python, you don’t have to declare the type
    of a variable when you create one. This feature in Python is called dynamic typing,
    which makes Python flexible and easy to use.
  prefs: []
  type: TYPE_NORMAL
- en: List Comprehensions
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: List comprehensions are used to generate lists from other lists by applying
    functions to each element in the list. They provide a concise way to apply loops
    and optional conditions in a list.
  prefs: []
  type: TYPE_NORMAL
- en: For example, if you’d like to create a list of squares for even numbers between
    0 and 9, you can use JavaScript, a regular loop in Python and Python’s list comprehension
    to achieve the same goal.
  prefs: []
  type: TYPE_NORMAL
- en: JavaScript
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Regular Loop in Python
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Python’s List Comprehension
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: All the three sections of code above generate the same list [0, 4, 16, 36, 64],
    but Python’s list comprehension is the most elegant because the syntax is concise
    and clearly express the intent while the Python function is more verbose and requires
    explicit initialization and appending. The syntax of JavaScript is the least elegant
    and readable because it requires chaining methods of using Array.from, filter,
    and map. Both Python function and JavaScript function are not intuitive and cannot
    be read as natural language as Python list comprehension does.
  prefs: []
  type: TYPE_NORMAL
- en: Generator
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Generators in Python are a special kind of iterator that allow developers to
    iterate over a sequence of values without storing them all in memory at once.
    They are created with the yield keyword. Other programming languages like C++
    and Java, though offering similar functionality, don’t have built-in yield keyword
    in the same simple, integrated way. Here are several key advantages that make
    Python Generators unique:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Memory Efficiency**: Generators yield one value at a time so that they only
    compute and hold one item in memory at any given moment. This is in contrast to,
    say, a list in Python, which stores all items in memory.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Lazy Evaluation:** Generators enable Python to compute values only as needed.
    This “lazy” computation results in significant performance improvements when dealing
    with large or potentially infinite sequences.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Simple Syntax:** This might be the biggest reason why developers choose to
    use generators because they can easily convert a regular function into a generator
    without having to manage state explicitly.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: The example above shows how to use the yield keyword when creating a sequence.
    For the memory usage and time difference between the code with and without Generators,
    generating 100 Fibonacci numbers can hardly see any differences. But when it comes
    to 100 million numbers in practice, you’d better use generators because a list
    of 100 million numbers could easily strain many system resources.
  prefs: []
  type: TYPE_NORMAL
- en: Argument Passing and Mutability
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In Python, we don’t really assign values to variables; instead, we bind variables
    to objects. The result of such an action depends on whether the object is mutable
    or immutable. If an object is mutable, changes made to it inside the function
    will affect the original object.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: In the example above, we’d like to append ‘4’ to the list my_list which is [1,2,3].
    Because lists are mutable, the behavior append operation changes the original
    list my_list without creating a copy.
  prefs: []
  type: TYPE_NORMAL
- en: However, immutable objects, such as integers, floats, strings, tuples and frozensets,
    cannot be changed after creation. Therefore, any modification results in a new
    object. In the example below, because integers are immutable, the function creates
    a new integer rather than modifying the original variable.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: Python’s argument passing is sometimes described as “pass-by-object-reference”
    or “pass-by-assignment.” This makes Python unique because Python pass references
    uniformly (pass-by-object-reference) while other languages need to differentiate
    explicitly between pass-by-value and pass-by-reference. Python’s uniform approach
    is simple yet powerful. It avoids the need for explicit pointers or reference
    parameters but requires developers to be mindful of mutable objects.
  prefs: []
  type: TYPE_NORMAL
- en: 'With Python’s argument passing and mutability, we can enjoy the following benefits
    in coding:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Memory Efficiency:** It saves memory by passing references instead of making
    full copies of objects. This especially benefits code development with large data
    structures.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Performance:** It avoids unnecessary copies and thus improves the overall
    coding performance.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Flexibility:** This feature provides convenience for updating data structure
    because developers don’t need to explicitly choose between pass-by-value and pass-by-reference.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: However, this characteristic of Python forces developers to carefully choose
    between mutable and immutable data types and it also brings more complex debugging.
  prefs: []
  type: TYPE_NORMAL
- en: So is Python Really Simple?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Python’s popularity results from its simplicity, memory efficiency, high performance,
    and beginner-friendiness. It’s also a programming language that looks most like
    a human’s natural language, so even people who haven’t received systematic and
    holistic programming training are still able to understand it. These characteristics
    make Python a top choice among enterprises, academic institutes, and government
    organisations.
  prefs: []
  type: TYPE_NORMAL
- en: For example, when we’d like to filter out the the “completed” orders with amounts
    greater than 200, and update a mutable summary report (a dictionary) with the
    total count and sum of amounts for an e-commerce company, we can use ***list comprehension***
    to create a list of orders meeting our criteria, ***skip the declaration of variable
    types*** and make changes of the original dictionary with ***pass-by-assignment***.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: If we’d like to achieve the same goal with Java, since Java lacks built-in generators
    and list comprehensions, we have to generate a list of orders, then filter and
    update a summary using explicit loops, and thus make the code more complex, less
    readable and harder to maintain.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Equipped with features of dynamic typing, list comprehensions, generators, and
    its approach to argument passing and mutability, Python is making itself a simplified
    coding while enhancing memory efficiency and performance. As a result, Python
    has become the ideal programming language for self-learners.
  prefs: []
  type: TYPE_NORMAL
- en: Thank you for reading!
  prefs: []
  type: TYPE_NORMAL
