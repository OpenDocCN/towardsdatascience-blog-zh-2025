- en: The Hidden Trap of Fixed and Random Effects
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/the-hidden-trap-of-fixed-and-random-effects/](https://towardsdatascience.com/the-hidden-trap-of-fixed-and-random-effects/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: What Are Random Effects and Fixed Effects?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'When designing a study, we often aim to isolate independent variables from
    those of no interest to observe their true effects on the dependent variables.
    For example, let’s say we would like to study the effects of using Github Copilot
    (*independent variable*) on developer productivity (*dependent variable*). One
    approach is to measure how much time developers spend using Copilot and how quickly
    they complete coding tasks. At first glance, we may observe a strong positive
    correlation: more Copilot usage, faster task completion.'
  prefs: []
  type: TYPE_NORMAL
- en: However, other factors can also influence how quickly developers finish their
    work. For example, Company A might have faster CI/CD pipelines or deal with smaller
    and simpler tasks, while Company B may require lengthy code reviews or handle
    more complex and time-consuming tasks. If we don’t account for these organizational
    differences, we might mistakenly conclude that Copilot is less effective for developers
    in Company B, although it’s the environment, not Copilot, that truly slows them
    down.
  prefs: []
  type: TYPE_NORMAL
- en: These kinds of group-level variations — differences across teams, companies,
    or projects — are typically known as **“*random effects*“** or **“*****fixed effects*****“**.
  prefs: []
  type: TYPE_NORMAL
- en: Fixed effects are variables of interest, where each group is treated separately
    using one-hot coding. This way, since the within-group variability is captured
    neatly within each dummy variable, we are assuming the variance of each group
    is similar, or homoscedastic.
  prefs: []
  type: TYPE_NORMAL
- en: \[y_i = \beta_0 + \beta_1 x_i + \gamma_1 D_{1i} + \gamma_2 D_{2i} + \cdots +
    \varepsilon_i\]
  prefs: []
  type: TYPE_NORMAL
- en: where D[1i], D[2i], … respectively are dummy variables representing group D[1i],
    D[2i], … and γ₁, γ₂, … respectively are fixed effect coefficients for each corresponding
    group.
  prefs: []
  type: TYPE_NORMAL
- en: Random effects, on the other hand, are typically not variables of interest.
    We assume each group is part of a broader population and each group effect lies
    somewhere within a broader probability distribution of that population. As such,
    the variance of each group is heterogeneous.
  prefs: []
  type: TYPE_NORMAL
- en: \[ y_{ij} = \beta_0 + \beta_1 x_{ij} + u_j + \varepsilon_{ij} \]
  prefs: []
  type: TYPE_NORMAL
- en: where u[j] is a random effect of group j of sample i, drawn from a distribution,
    typically a normal distribution 𝒩(0, σ²ᵤ).
  prefs: []
  type: TYPE_NORMAL
- en: Rethink Carefully Fixed and Random Effects
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: However, it may mislead your analysis if you just randomly insert these effects
    into your model without thinking carefully about what kinds of variations they
    are actually capturing.
  prefs: []
  type: TYPE_NORMAL
- en: 'I recently worked on a project analyzing [*Environmental Impacts of AI models*](https://towardsdatascience.com/rethinking-environmental-costs-of-training-ai-why-we-should-look-beyond-hardware/),
    which I studied how certain architectural features (number of parameters, number
    of compute, dataset size, and training time) and hardware choices (hardware type,
    number of hardware) of AI models affect energy use during training. I found that
    `Training_time`, `Hardware_quantity`, and `Hardware_type` significantly affected
    the energy usage. The relationship can be roughly modeled as:'
  prefs: []
  type: TYPE_NORMAL
- en: \[ \text{energy} = \text{Training_time} + \text{Hardware_quantity} + \text{Hardware}\]
  prefs: []
  type: TYPE_NORMAL
- en: 'Since I thought there might be differences between organizations, for example,
    in coding style, code structure, or algorithm preferences, I believed that including
    `Organization` as random effects would help account for all of these unobserved
    potential differences. To test my assumption, I compared the results of two models:
    with and without `Organization`, to see which one is a better fit. In the two
    models, the dependent variable `Energy` was extremely right-skewed, so I applied
    a log transformation to stabilize its variance. Here I used Generalized Linear
    Models (GLM) as the distribution of my data was not normal.'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: The GLM model without `Organization` produced an AIC of 312.55, with `Training_time`,
    `Hardware_quantity`, and certain types of `Hardware` were statistically significant.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 'On the other hand, the GLM model with `Organization` produced an AIC of 300.38,
    much lower than the previous model, indicating a better model fit. However, when
    taking a closer look, I noticed a significant issue: The statistical significance
    of other variables have gone away, as if `Organization` took away the significance
    from them!'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: Thinking over it carefully, it made a lot of sense. Certain organizations may
    consistently prefer specific types of hardware, or larger organizations may be
    able to afford more expensive hardware and resources to train bigger AI models.
    In other words, the random effects here likely overlapped and overly explained
    the variations of our available independent variables, hence they absorbed a large
    portion of what we were trying to study.
  prefs: []
  type: TYPE_NORMAL
- en: 'This highlights an important point: while random or fixed effects are useful
    tools to control for unwanted group-level differences, they can also unintentionally
    capture the underlying variations of our independent variables. We should carefully
    consider what these effects truly represent, before just blindly introducing them
    to our models hoping they would happily absorb all the noise.'
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 'References: Steve Midway, Data Analysis in R, [https://bookdown.org/steve_midway/DAR/random-effects.html](https://bookdown.org/steve_midway/DAR/random-effects.html)'
  prefs: []
  type: TYPE_NORMAL
