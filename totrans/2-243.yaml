  type: TYPE_NORMAL
- en: <mdspan datatext="el1750100894772" class="mdspan-comment">Introduction</mdspan>
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This blog is a deep dive into regularisation techniques, intended to give you
    simple intuitions, mathematical foundations, and implementation details.
  prefs: []
  type: TYPE_NORMAL
- en: The goal is to bridge conceptual gaps between theory and code for early researchers
    and practitioners. It took me a month to research and write this blog, and I hope
    it helps someone else going through the same learning journey.
  prefs: []
  type: TYPE_NORMAL
