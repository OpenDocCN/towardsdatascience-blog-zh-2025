- en: The Bias-Variance Tradeoff
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Before we get into the tradeoff, let’s understand what exactly Bias and Variance
    are.
  prefs: []
  type: TYPE_NORMAL
- en: The first thing we need to understand is that data contains patterns. Sometimes
    the data contains a lot of insightful patterns, sometimes not so much.
  prefs: []
  type: TYPE_NORMAL
- en: The job of a machine learning model is to capture these patterns and understand
    them to a point where it can notice these patterns in newer, unseen data and then
    predict based on its understanding of that pattern.
  prefs: []
  type: TYPE_NORMAL
- en: So, how does this relate to models having bias or variance?
  prefs: []
  type: TYPE_NORMAL
- en: 'Think of it this way:'
  prefs: []
  type: TYPE_NORMAL
- en: Bias is like an ignorant person who doesn’t pay a lot of attention and misses
    what’s really going on. A high-bias model is too simple in nature to understand
    or notice patterns in data.
  prefs: []
  type: TYPE_NORMAL
- en: The patterns and relationships in the data are oversimplified because of the
    model’s assumptions. This results in an underfitting model.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/85fd0784423264723ee95eda4550dc21.png)'
  prefs: []
  type: TYPE_IMG
- en: Image Generated using [ChatGPT 4o](https://chatgpt.com/)
  prefs: []
  type: TYPE_NORMAL
- en: An underfitting model results in poor performance on both training and test
    data.
  prefs: []
  type: TYPE_NORMAL
- en: Variance, on the other hand, is like a paranoid person. Someone who overreacts
    to every little detail.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b5851ca298dc7da8c7b2df6830b099fc.png)'
  prefs: []
  type: TYPE_IMG
- en: Image Generated using [ChatGPT 4o](https://chatgpt.com/)
  prefs: []
  type: TYPE_NORMAL
- en: A high variance model pays too much attention to the training data, even memorising
    the noise. It performs well on training data but fails to generalise, resulting
    in an overfitting model that performs poorly on the test set.
  prefs: []
  type: TYPE_NORMAL
- en: '*Generalisationrefers to the model’s ability to perform well on unseen data.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: When learning about bias and variance, you will come across the idea of the
    bias-variance tradeoff. The idea behind this is essentially that bias and variance
    are inversely related. i.e. when one increases, the other decreases.
  prefs: []
  type: TYPE_NORMAL
- en: The goal of a good model is to find the sweet spot where both bias and variance
    are balanced, leading to good performance on unseen data.
  prefs: []
  type: TYPE_NORMAL
- en: Clarifying Some Differences
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Bias and Underfitting; Variance and Overfitting are closely related but not
    the same thing.
  prefs: []
  type: TYPE_NORMAL
- en: 'Think of it like this:'
  prefs: []
  type: TYPE_NORMAL
- en: Bias/Variance is a measurement
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Underfitting/Overfitting is a diagnosis
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Just like a doctor uses a thermometer to diagnose illness, we are using bias/variance
    to diagnose the model’s sickness, underfitting/overfitting.
  prefs: []
  type: TYPE_NORMAL
- en: High bias → underfitting
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: High variance → overfitting
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: What does Overfitting Look Like?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: An overfitting model is caused by weights that are too high only for specific
    features of the data. This is caused by the model memorising some patterns and
    relying heavily on those few features.
  prefs: []
  type: TYPE_NORMAL
- en: These patterns are not general trends, but rather noise or some specific quirks.
  prefs: []
  type: TYPE_NORMAL
- en: 'To demonstrate this, we will look at a simple yet illustrative example:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/997f1bb925ab5bf5d7a469659bc99594.png)'
  prefs: []
  type: TYPE_IMG
- en: Visualising Our Randomly Generated Data Points | Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: Above, we have generated random data points using NumPy. On this data, we will
    fit a Polynomial Regression model. Since this is a complex and highly expressive
    model being used on a small dataset, it will overfit, giving us a perfect example
    of high variance.
  prefs: []
  type: TYPE_NORMAL
- en: Polynomial Regression implements Linear Regression on polynomially transformed
    features. Note that the changes are made to the data and not the model. To implement
    this, we will first apply polynomial feature expansion, followed by an unregularised
    Linear Regression model.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/fb2e2bd44a0d7b67c588e3e01ce0309a.png)'
  prefs: []
  type: TYPE_IMG
- en: Fitting the Polynomial Regression Model on our Randomly Generated Data Points
    | Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: The fitted curve bends to accommodate nearly every data point. This is a clear
    example of high variance, leading to overfitting.
  prefs: []
  type: TYPE_NORMAL
- en: 'Finally, we will calculate the MSE on both the train and test sets to see how
    the model performs:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: 'This gives us:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Train MSE:** 1.6713'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Test MSE:** 5.4532'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: As expected, the model is overfitting the data as the test error is higher than
    the train error. This means that the model performed well on the data it was trained
    on, but failed to generalise, i.e. it did not show good results on unseen data.
  prefs: []
  type: TYPE_NORMAL
- en: Further in the blog, we will take a look at how some techniques can be used
    to regularise this problem.
  prefs: []
  type: TYPE_NORMAL
- en: The Fix (Regularisation)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'So are we eternally doomed because of overfitting? Not at all. Researchers
    have developed various techniques that are used to mitigate overfitting. Here’s
    a brief overview before we go deeper:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Adding Penalties:** This method focuses on pulling the weights towards 0,
    which prevents weights from getting too large.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Tweaking the Training Process:** This includes trying different numbers of
    epochs, experimenting with hyperparameters, etc. These are the things that are
    not directly related to the data or the model itself.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Data-Level Techniques: **This involves modifying or augmenting data to reduce
    overfitting. This could be removing outliers, adding more data, balancing classes,
    etc.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Here’s a mind map to keep track of the methods discussed in this blog. Please
    note that although I have covered a lot of methods, the list is not exhaustive.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b286e7b87bdea9e9d6ad76557bd8a545.png)'
  prefs: []
  type: TYPE_IMG
- en: Regularisation Mind Map | Made with [LucidChart](https://www.lucidchart.com/pages) |
    Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Penalty-Based Regularisation Techniques
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Regularising your model using a penalty works by adding a “penalty term” to
    the loss function. This constrains the magnitude of the model weights efficiently,
    avoiding excessive reliance on a single feature.
  prefs: []
  type: TYPE_NORMAL
- en: 'To understand penalties, we will first look at the following foundational concepts:'
  prefs: []
  type: TYPE_NORMAL
- en: Norms
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The word “Norm” comes from the Latin word “Norma”, which means “standard” or
    “rule”.
  prefs: []
  type: TYPE_NORMAL
- en: In linear algebra, a norm is a function that sets a “standard” for measuring
    the magnitude (length) of a vector.
  prefs: []
  type: TYPE_NORMAL
- en: 'There are several common norms: L1, L2, Lp, L∞, and so on.'
  prefs: []
  type: TYPE_NORMAL
- en: A norm helps us calculate the length of a vector. How does it relate to our
    context?
  prefs: []
  type: TYPE_NORMAL
- en: Think of all the weights of our model being stored in a vector. When the model
    is overfitting, some of these weights will be larger than they need to be, and
    will cause the overall weight vector to be larger. But how do we know that? How
    do we know how large the vector is?
  prefs: []
  type: TYPE_NORMAL
- en: This is where we borrow from the concept of norms and calculate the total magnitude
    of our weight vector.
  prefs: []
  type: TYPE_NORMAL
- en: The L2 Norm
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The L2 norm, on which this L2 penalty is based, is also called the “Euclidean
    Norm”. It is represented as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/15ef290276ca3dc54318462864069c50.png)'
  prefs: []
  type: TYPE_IMG
- en: L2 Norm | Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: As you can see, the norm of any vector x is represented by a double bar around
    it, followed by the 2, which specifies that it is the L2 norm. This norm calculates
    the magnitude (length) of the vector by taking the squared sum of all the components
    and finally calculating the square root of the value.
  prefs: []
  type: TYPE_NORMAL
- en: You may have heard of the “Euclidean Distance”, which is based on the Euclidean
    Norm, but measures the distance between the tips of two vectors instead of the
    distance from the origin to the tip of one vector. [3]
  prefs: []
  type: TYPE_NORMAL
- en: The L1 Norm
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The L1 norm, also known as the Manhattan norm or Taxicab norm, is represented
    as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/bcf1511bd90cf2365787e28708435079.png)'
  prefs: []
  type: TYPE_IMG
- en: L1 Norm | Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: The norm is represented again by a double bar around it, followed by a 1 this
    time, specifying that it is the L1 norm.
  prefs: []
  type: TYPE_NORMAL
- en: '*This norm measures distances in a grid-like way by summing horizontal and
    vertical distances instead of going diagonally. Manhattan has a grid-like city
    structure, hence the name.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[3]'
  prefs: []
  type: TYPE_NORMAL
- en: λ (Lambda)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**λ** (lambda) is nothing but a hyperparameter which you set to control the
    output of a penalty.'
  prefs: []
  type: TYPE_NORMAL
- en: You can think of it as a volume dial that controls the difference between overfitting
    and underfitting of the model.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/3e327e9853c02ffeb7038b8377359ffe.png)'
  prefs: []
  type: TYPE_IMG
- en: Image Generated using [ChatGPT 4o](https://chatgpt.com/)
  prefs: []
  type: TYPE_NORMAL
- en: '**λ** = 0 would be equivalent to setting the penalty term to 0, resulting in
    no regularisation, where the overfitting stays as is.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**λ = **∞, on the other hand, would shrink all the weights close to 0, leading
    to the model underfitting, since the model is too restricted to learn anything
    meaningful.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Since there is no one-size-fits-all value for lambda, you would set it through
    experimentation. Generally, a common default value for this could be 0.01\. You
    could also try different values on a logarithmic scale (…, 0.001, 0.01, 0.1, 1,
    10, …, etc)
  prefs: []
  type: TYPE_NORMAL
- en: '*Note that in the code implementations of the upcoming sections, I have, in
    most places, set the value of lambda as 0\. This is simply because the code is
    only meant to show how the penalty is implemented. I avoided using an arbitrary
    value as it might be misinterpreted as a standard or a recommended default.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: How is a Penalty Applied?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: For general Machine Learning, we almost always use the penalty form as it works
    well with gradient-based optimisation methods. Although for visualising penalties,
    the constraint form is more interpretable, hence in the following sections, when
    we discuss graphical representations, we will be visualising the constraint form
    of the penalties.
  prefs: []
  type: TYPE_NORMAL
- en: We can represent a norm in two forms. A penalty form and a constraint form.
  prefs: []
  type: TYPE_NORMAL
- en: '**Penalty Form:** Here, we discourage vectors that lie outside a specified
    region by adding a cost to the loss function.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Mathemaically: **L = L + λ * ||w||'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Constraint Form: **Here, we define the region in which our optimal vector
    must lie strictly.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Mathematically: **L is subject to ||w|| ≤ r'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Where r is the maximum allowed norm of the weight vector. L is the loss and
    w is the weight vector.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: In our graphical representations, we will be looking at 2D representations with
    a parameter vector having coefficients w₁ and w₂.
  prefs: []
  type: TYPE_NORMAL
- en: Graphical Intuition of Optimisation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: When visualising optimisation, the first thing we need to visualise is the loss
    function. When we have only two parameters, w₁ and w₂, it means that our loss
    function will be plotted in three dimensions, where the x and y axes will represent
    w₁ and w₂, respectively, and the z axis will represent the value of the loss function.
    Our goal is to find the lowest loss, as it will satisfy our goal of minimising
    the cost function.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c315ccb2b5ed8bba5948ef4e4b00a5eb.png)'
  prefs: []
  type: TYPE_IMG
- en: Visualising a Loss Function in 3D | Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: If we were to visualise the above 3D plot in 2D, we would see concentric circles
    or ellipses, as shown in the above image, which represent our contours. These
    contours are nothing but rings created by points in the optimisation space. For
    each contour, all points contained in the contour would result in the same loss
    value.
  prefs: []
  type: TYPE_NORMAL
- en: If the loss function is convex (In our examples, we use the MSE loss function,
    which is convex), the global minima, which is the point at which the weights are
    optimal (lowest cost), will be present at the centre of the contours (lowest point
    on the plot).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/028929164e8099c06a7b1311d57e04bb.png)'
  prefs: []
  type: TYPE_IMG
- en: Visualising a Loss Function in 2D | Image by [Ryan Holbrook](https://mathformachines.com/) [4]
  prefs: []
  type: TYPE_NORMAL
- en: Now, during optimisation, we generally randomly set the values of w₁ and w₂.
    This w₁, w₂ parameter vector could be visualised as a vector with a base at (0,
    0) and tip at the current coordinates of our weights at (w₁, w₂).
  prefs: []
  type: TYPE_NORMAL
- en: It is important to know that this is just for intuition, and in reality, it
    is only a point in space. We expect this vector (point in space) to be as close
    as possible to the global minima.
  prefs: []
  type: TYPE_NORMAL
- en: After every optimisation step, this randomly initialised point is guided towards
    the global minimum by the optimisation algorithm until it finally converges (reaches
    the global minimum).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/1748f5f43f9420063879d15aff465fe7.png)'
  prefs: []
  type: TYPE_IMG
- en: Visualising the Optimisation Path | Image by [Ryan Holbrook](https://mathformachines.com/) [4]
  prefs: []
  type: TYPE_NORMAL
- en: The issue with this is that sometimes this set of weights at the global minima
    may be the best choice for the data they were trained on, but would not perform
    well on newer, unseen data. This causes overfitting and needs to be regularised.
  prefs: []
  type: TYPE_NORMAL
- en: In further sections, we will look at graphical intuitions of how adding regularisation
    affects our visualisation.
  prefs: []
  type: TYPE_NORMAL
- en: L2 Regularisation (Ridge)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '*Most sources talking about regularisation start by explaining L2 Regularisation
    (Tikhonov Regularisation) first, mainly because L2 Regularisation is more popular
    and widely used.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*It has also been around longer in statistics and machine learning literature
    than L1 Regularisation, which gained traction later with the emergence of sparse
    modelling techniques (more on this later).*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*The credits for L2 Regularisation’s popularity can be attributed not only
    to its longer history, but also to its ability to shrink weights smoothly, being
    differentiable everywhere (making it optimisation-friendly) and its ease of implementation.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: How the L2 Penalty is Formed from the L2 Norm
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The “L2” in L2 Regularisation comes from the “L2 Norm”.
  prefs: []
  type: TYPE_NORMAL
- en: 'To form the L2 penalty from the L2 norm, we first square the L2 norm formula
    to remove the square root. Here’s why:'
  prefs: []
  type: TYPE_NORMAL
- en: Calculating the square root repeatedly adds computational overhead.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Removing it makes differentiation easier during gradient calculation.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The goal of L2 Regularisation is not to calculate distances, but to penalise
    large weights. The squared sum of weights is sufficient to do so. In the L2 norm,
    the square root is taken to represent the actual distance.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s how we represent the L2 penalty (L2 Regularisation):'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/199d9a6f5cfa8a4c66f65a55339e5acb.png)'
  prefs: []
  type: TYPE_IMG
- en: L2 Penalty | Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: What is the L2 Penalty Actually Doing?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: L2 Regularisation works by adding a penalty term to the loss function, proportional
    to the square of the weights. This causes the weights to be gently pushed towards
    0.
  prefs: []
  type: TYPE_NORMAL
- en: The larger the weight, the larger the penalty and the stronger the push. The
    weights never actually become 0, rather, they only tend to 0.
  prefs: []
  type: TYPE_NORMAL
- en: This will become clearer when you read the gradient behaviour section.
  prefs: []
  type: TYPE_NORMAL
- en: Before getting deeper into the example, let’s first understand the penalty term
    in detail.
  prefs: []
  type: TYPE_NORMAL
- en: In this term, we simply calculate the sum of the squares of each weight and
    multiply it by lambda.
  prefs: []
  type: TYPE_NORMAL
- en: '*When we apply L2 Regularisation to any Linear Regression model, this model
    is known as “Ridge Regression”.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: What Are the Benefits of Having Squared Weights?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Penalises larger weights more heavily
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Keeps all values positive
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Smoother function when differentiating.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Mathematical Representation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Here’s a representation of how the L2 penalty term is added to the MSE loss
    function:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/807670a799987807e0605af610a49b05.png)'
  prefs: []
  type: TYPE_IMG
- en: MSE + L2 Penalty | Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: Where,
  prefs: []
  type: TYPE_NORMAL
- en: n = total number of training examples
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: m = total number of weights
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: y = true value
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: ŷ = predicted value
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: λ = regularisation strength
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: w = model weights
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Now, during gradient descent, we take the derivative of this loss function:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/57537c46ee41f54f7f1c20b9867da87b.png)'
  prefs: []
  type: TYPE_IMG
- en: Derivation of MSE + L2 Penalty | Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: Since we take the derivative with respect to each weight, an appropriately large/small
    penalty gets added for each of our weights.
  prefs: []
  type: TYPE_NORMAL
- en: '*It’s also important to note that some formulations include a 1/2 in the L2
    penalty term. This is done purely for mathematical convenience.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*During backpropagation, the 2 from the exponent and 1/2​ cancel out, leaving
    a cleaner gradient of λw instead of 2λw. However, this inclusion is not compulsory.
    Both forms are valid, and they just affect the scale of the gradient.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*As a result, the output of each version will differ unless you tune λ accordingly.
    In practice, a stronger gradient (without the 1/2) means you may need a smaller
    λ, and vice versa.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: When your weights are large, the gradient will be larger. This tells the model,
    “You need to adjust this weight, it’s causing big errors”. This way, the model
    makes a bigger step in the right direction, which makes learning faster.
  prefs: []
  type: TYPE_NORMAL
- en: Graphical Representation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The constraint form of L2 Regularisation is represented as w₁² + w₂² ≤ r².
  prefs: []
  type: TYPE_NORMAL
- en: Let’s consider r = 1 and also consider that the constraint is w₁² + w₂² = 1
    (not ≤ 1) for mathematical simplicity.
  prefs: []
  type: TYPE_NORMAL
- en: 'If we were to plot all the vectors that satisfy this condition, it would form
    a circle:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/335494685bdd2b8fdd067f659eb8eef1.png)'
  prefs: []
  type: TYPE_IMG
- en: Plotting the L2 Constraint Region | Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: Now, considering our original equation w₁² + w₂² ≤ 1², naturally, all the vectors
    existing within the bounds of this circle would satisfy our constraint.
  prefs: []
  type: TYPE_NORMAL
- en: In a previous section, we saw how a basic optimisation flow works graphically.
    Now, let’s look at how it would work if we were to introduce an L2 constraint
    on the graph.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f1242f8101920c6763d7987a5595b6f8.png)'
  prefs: []
  type: TYPE_IMG
- en: Loss Contours + L2 Constraint | Image by [Terence Parr](https://explained.ai/),
    used with permission [5]
  prefs: []
  type: TYPE_NORMAL
- en: With the L2 constraint added to the loss function, we now have an additional
    expectation with the weight vector (The initial expectation was that the coordinates
    should lie as close as possible to the global minimum).
  prefs: []
  type: TYPE_NORMAL
- en: We want the optimal vector to always lie within the bounds of the L2 constraint
    region (the circle).
  prefs: []
  type: TYPE_NORMAL
- en: In the above image, the pink spot is where our optimal weights would lie.
  prefs: []
  type: TYPE_NORMAL
- en: To find the optimal vector, we must find the lowest contour near the global
    minima that intersects our circle. This way we satisfy both conditions, by being
    in the bounds of the circle, as well as being as low (close to the global minimum)
    as possible.
  prefs: []
  type: TYPE_NORMAL
- en: To get a good intuition of this, you should try to visualise how it would look
    in 3D.
  prefs: []
  type: TYPE_NORMAL
- en: Although there is a slight issue with this. On plots, we choose the number of
    contours we draw. There will be cases where the intersection of the lowest circle
    and the lowest contour doesn’t give us the optimal vector.
  prefs: []
  type: TYPE_NORMAL
- en: You must remember that there is an infinite number of contour lines between
    the visualised contour lines. [5]
  prefs: []
  type: TYPE_NORMAL
- en: '*There is a chance that the global minimum (unconstrained minimum) can lie
    inside the constraint region.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Sparsity**'
  prefs: []
  type: TYPE_NORMAL
- en: L2 does not create a lot of sparsity. This means that it is rare for the L2
    penalty to push one of the parameters exactly to 0.
  prefs: []
  type: TYPE_NORMAL
- en: Instead, L2 shrinks weights smoothly toward 0\. This results in non-zero coefficients.
  prefs: []
  type: TYPE_NORMAL
- en: '**Gradient Behaviour**'
  prefs: []
  type: TYPE_NORMAL
- en: The gradient of the L2 penalty depends on the weight itself. This means big
    weights get a higher penalty and smaller weights get a smaller one. Hence, during
    training, even if the weights are tiny, the push they get toward 0 would be tiny
    and not enough to push the weight exactly to 0.
  prefs: []
  type: TYPE_NORMAL
- en: This results in a smooth, continuous update (a smooth gradient).
  prefs: []
  type: TYPE_NORMAL
- en: Code Implementation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The following is a representation of the L2 penalty in NumPy:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: 'In scikit-learn, L2 Regularisation is added by default in many models. Here’s
    how you can turn it off:'
  prefs: []
  type: TYPE_NORMAL
- en: Check for parameters like “penalty”, “alpha” or “weight_decay”. Setting them
    to “0” or “none” will disable regularisation.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: '*Wondering why we used a string instead of the None keyword in Python?*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*This is because the penalty parameter in scikit-learn expects a string containing
    options like l1, l2, elasticnet or none, letting us select which type of regularisation
    we would like to use for our model.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Below, you can see how to implement Ridge Regression. Since the alpha here is
    set to 0, this model will behave exactly like Linear Regression.
  prefs: []
  type: TYPE_NORMAL
- en: Once you set the value of alpha > 0, the model will apply the penalty.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: '*Note that in scikit-learn, “lambda” is called “alpha” since lambda is already
    a reserved keyword in Python (to define anonymous functions).*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*Mathematically → lambda.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*In Code → alpha*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*Also note that mathematically, we refer to the “learning rate” as “α” (alpha).
    In code, we refer to the learning rate as “lr”.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*These naming conventions can get confusing, so it is important to know the
    differences.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Here’s how you would implement L2 Regularisation in Neural Networks for Stochastic
    Gradient Descent using PyTorch:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: '*Note: When L2 Regularisation is applied to Neural Networks, it is called “weight
    decay”, because it is added directly to the gradient descent step rather than
    the loss function.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Applying the L2 Penalty to our Overfitting Model
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Previously, we looked at a simple example of overfitting with a Polynomial Regression
    Model. Now it’s time to see how L2 helps us regularise it.
  prefs: []
  type: TYPE_NORMAL
- en: We apply the L2 penalty by using Ridge Regression, which is the same as Linear
    Regression with the L2 penalty.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/dc3e297db0b5e5dafe35b7287f7ec876.png)'
  prefs: []
  type: TYPE_IMG
- en: Visualising the Regularised Model | Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: Clearly, our new model is doing a good job of not overfitting the data. We can
    confirm the results by looking at the train and test MSE values shown below.
  prefs: []
  type: TYPE_NORMAL
- en: '**Train MSE:** 2.9305'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Test MSE:** 1.7757'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The model now produces much better results on unseen data, hence improving generalisation.
  prefs: []
  type: TYPE_NORMAL
- en: When Should We Use This?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We can use L2 Regularisation for almost any loss function for almost any model.
    Should you?
  prefs: []
  type: TYPE_NORMAL
- en: Probably not.
  prefs: []
  type: TYPE_NORMAL
- en: Every model has its own requirements and might benefit from other types of regularisations.
    When should you think of using it? It is a great first choice for models like
    linear/logistic regression and neural networks when you suspect overfitting. Although
    if your goal is to introduce sparsity or to eliminate irrelevant features, you
    may want to take a look at L1 Regularisation or Elastic Net, which we will discuss
    further.
  prefs: []
  type: TYPE_NORMAL
- en: Ultimately, it depends on your problem, model and dataset, so it’s absolutely
    worth experimenting.
  prefs: []
  type: TYPE_NORMAL
- en: L1 Regularisation (Lasso)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '*Unlike L2 regularisation, L1 regularisation (Lasso) gained popularity later
    with the rise of sparse modelling techniques. L1 gained popularity for its feature
    selection ability.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*L1 encourages sparsity by forcing many weights to become exactly 0\. L1 is
    not very optimisation friendly since it isn’t differentiable at 0, yet it has
    proven its worth in high-dimensional problems.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: How the L1 Penalty is Formed from the L1 Norm
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Just like L2 Regularisation is based on the L2 norm, L1 Regularisation is based
    on the L1 norm.
  prefs: []
  type: TYPE_NORMAL
- en: The formula for the L1 norm and the L1 penalty is the same. The only difference
    is the context. One measures size, and the other applies a penalty in optimisation.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s how the L1 penalty is represented:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/6c0cb7e7d395e13fe6484ce70cef7924.png)'
  prefs: []
  type: TYPE_IMG
- en: L1 Penalty | Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: What is the L1 Penalty Actually Doing?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: I think that a good way to visualise it is to think of the Lasso penalty as
    a cowboy who is throwing their lasso around really big weights and yanking them
    down to 0.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f7c7dab9303cf646b8111c488c3de757.png)'
  prefs: []
  type: TYPE_IMG
- en: Image Generated using [ChatGPT 4o](https://chatgpt.com/)
  prefs: []
  type: TYPE_NORMAL
- en: More formally, L1 Regularisation works by adding a penalty term to the loss
    function, proportional to the absolutevalue of the weights.
  prefs: []
  type: TYPE_NORMAL
- en: '*When we apply the L1 Regularisation to any Linear Regression model, this model
    is known as “Lasso Regression”. Lasso stands for “Least Absolute Shrinkage and
    Selection Operator”. Sadly, it doesn’t have anything to do with lassos.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '***Least → **Least squares loss (Lasso was originally designed for linear regression
    using the least squares loss. However, it is not restricted to that, it can be
    used with any linear model and any loss function. But strictly speaking, it’s
    only called “Lasso Regression” when applied to regression problems.)*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '***Absolute** **Shrinkage → **The penalty uses absolute values of the weights.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '***Selection Operator → **Since it zeroes out features, it’s technically performing
    feature selection.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: How is it Different from the L2 Penalty?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: L1 does not have a smooth derivative at 0
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Unlike L2, L1 pushes some weights exactly to 0
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: More useful for feature selection than shrinking weights like L2 (sets more
    weights to 0)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Mathematical Representation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Here’s a representation of how the L1 penalty term is added to the MSE loss
    function:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e12bad77efdfc52f8b3c0286697a4a99.png)'
  prefs: []
  type: TYPE_IMG
- en: MSE + L1 Penalty | Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: 'Calculating the derivative for the above:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/242f02a7a47b22ca8dfea3cbcbf7f26c.png)'
  prefs: []
  type: TYPE_IMG
- en: Derivation of MSE + L1 Penalty | Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: Graphical Representation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The constraint form of L1 Regularisation is represented as |w₁| + |w₂| ≤ r.
  prefs: []
  type: TYPE_NORMAL
- en: Just like we did for L2, let’s consider r = 1 and the equation = 1 for mathematical
    simplicity.
  prefs: []
  type: TYPE_NORMAL
- en: 'If we were to plot all the vectors that satisfy this condition, it would form
    a diamond (technically a square that is rotated 45⁰):'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b0fb9aed8d9102a8588717f2937066a7.png)'
  prefs: []
  type: TYPE_IMG
- en: Plotting the L1 Constraint Region | Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: As you can see, unlike the L2 constraint, the L1 constraint has sharp edges
    and corners. The corners of our diamond lie on the axes.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s see how this looks alongside a loss function:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/2f7745b3532193f91bd948b5116a4f89.png)'
  prefs: []
  type: TYPE_IMG
- en: Loss Contours + L1 Constraint | Image by [Terence Parr](https://explained.ai/),
    used with permission [5]
  prefs: []
  type: TYPE_NORMAL
- en: '**Sparsity**'
  prefs: []
  type: TYPE_NORMAL
- en: For this L1 constraint, the intersection of the lowest contour and the constraint
    region is most likely to happen at one of the corners. These corners are points
    where one of the weights becomes exactly 0.
  prefs: []
  type: TYPE_NORMAL
- en: This is why we say that L1 Regularisation leads to sparsity. We often see weights
    being pushed to 0 entirely.
  prefs: []
  type: TYPE_NORMAL
- en: This is quite helpful with sparse modelling or feature selection.
  prefs: []
  type: TYPE_NORMAL
- en: '**Gradient Behaviour**'
  prefs: []
  type: TYPE_NORMAL
- en: If we plot the L1 penalty, we will see a V-shaped plot. This is because we take
    the gradient of the absolute value of the weights.
  prefs: []
  type: TYPE_NORMAL
- en: When w > 0, the gradient is +λ
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When w < 0, the gradient is -λ
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When w = 0, the gradient is undefined, so we use subgradients.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Taking the subgradient means that when w = 0, the gradient can take any value
    between [-λ, +λ]. The value of the subgradient (g) is selected by the optimiser,
    and is often selected as g = 0 when w = 0 to maintain stability.
  prefs: []
  type: TYPE_NORMAL
- en: If setting w = 0 increases the loss, this suggests that the feature is important
    and the optimiser may choose to move away from 0 in this situation.
  prefs: []
  type: TYPE_NORMAL
- en: The key difference between the gradient behaviour of L1 and L2 penalty is that
    the gradient of L2 is 2λw and is dependent on the value of w.
  prefs: []
  type: TYPE_NORMAL
- en: On the other hand, when we differentiate λ |w|, we get λ * sign(w), where sign(w)
    is +1 for w > 0 and -1 for w < 0 (sign(w) would be undefined at w = 0, which is
    why we use subgradients).
  prefs: []
  type: TYPE_NORMAL
- en: This means that the gradient is not dependent on the value of the weight and
    always produces a constant pull toward 0\. This makes a lot of weights snap exactly
    to 0 and stay there.
  prefs: []
  type: TYPE_NORMAL
- en: Code Implementation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The following is a representation of the L1 penalty in NumPy:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: In scikit-learn, since the default penalty in many models is L2, we would have
    to specifically change it to use the L1 penalty.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: '*A solver is an optimisation algorithm that minimises a loss function (Eg,
    gradient descent)*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: You can see here that we have specified a non-default solver for Logistic Regression
    when using the L1 penalty. This is because the default solver (lbfgs) does not
    support L1 and only works with L2.
  prefs: []
  type: TYPE_NORMAL
- en: Optionally, you can also use the saga solver.
  prefs: []
  type: TYPE_NORMAL
- en: '*The reason why lbfgs doesn’t work with L1 is because it expects the loss function
    to be differentiated smoothly during optimisation.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*You may remember we looked at gradient n of both L2 and L1 Regularisation,
    and we have studied that L2 smooth and differentiable everywhere, as opposed to
    L1 which is not smoothly differentiable at 0.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*liblinear on the other hand is better at dealing with L1 Regularisation using
    coordinate descent, which is well suited for non smooth loss surfaces.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: If you want to control the regularisation strength of the model using alpha
    for Logistic Regression, you would have to use a new parameter called C, which
    is nothing but the inverse of Lambda.
  prefs: []
  type: TYPE_NORMAL
- en: In scikit-learn, Regression models control lambda using alpha and Classification
    models use C (i.e. 1/λ).
  prefs: []
  type: TYPE_NORMAL
- en: Below is how you would implement Lasso Regression.
  prefs: []
  type: TYPE_NORMAL
- en: '*Since the alpha value is set to 0, the model behaves like Linear Regression,
    as there is no L1 Regularisation applied.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*Similarly, Ridge Regression with alpha=0 also reduces to Linear Regression.
    However, Lasso uses a different solver than Ridge, meaning that while both technically
    perform Ordinary Least Squares, their results may not be identical due to solver
    differences.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: It’s important to note that setting alpha=0 in Lasso is not recommended, as
    scikit-learn warns that it may cause numerical instability.
  prefs: []
  type: TYPE_NORMAL
- en: If you’re aiming for Linear Regression, it’s generally better to use LinearRegression()
    directly rather than setting alpha=0 in Lasso or Ridge.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s how you can apply the L1 penalty to Neural Networks:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: Here, we define a one-layer linear model with 10 inputs and one output. The
    loss function is set as MSE. We then calculate the loss function, calculate the
    L1 penalty and apply it to the loss.
  prefs: []
  type: TYPE_NORMAL
- en: Applying the L1 Penalty to our Overfitting Model
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We will now implement L1 Penalty by applying Lasso Regression to our previously
    seen example of an overfitting Polynomial Regression model.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/5193935bd73870fdcb3fd00bdf1eeb8a.png)'
  prefs: []
  type: TYPE_IMG
- en: Visualising the Regularised Model | Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: 'Evidently, the regularised model performs well and tackles overfitting nicely.
    We can confirm this by looking at the following train and test MSE values:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Train MSE:** 2.8759'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Test MSE:** 2.1135'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When Should We Use This?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In your problem at hand, if you suspect that many of your features are irrelevant,
    you may want to use the L1 penalty. This will result in a sparse model, with some
    features completely ignored.
  prefs: []
  type: TYPE_NORMAL
- en: Sometimes you may want a sparse model, since it leads to faster inference and
    is easier to interpret. A sparse model contains many weights which are exactly
    0.
  prefs: []
  type: TYPE_NORMAL
- en: You can also choose to use this model if you have multicollinearity. L1 will
    select 1 feature from a group of correlated ones, and the others will be ignored.
  prefs: []
  type: TYPE_NORMAL
- en: This regularisation helps with built-in feature selection, you don’t need to
    do it manually. It proves useful when you don’t know which features matter.
  prefs: []
  type: TYPE_NORMAL
- en: Elastic Net
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now that you know about L1 and L2 Regularisation, the natural thing to learn
    next would be Elastic Net, which combines both penalties to regularise the model.
  prefs: []
  type: TYPE_NORMAL
- en: The only new thing is the introduction of a “mix ratio”, which controls the
    proportion between L1 and L2 Regularisation.
  prefs: []
  type: TYPE_NORMAL
- en: Elastic Net gets its name because of its “stretchy net” nature, where it balances
    between L1 and L2.
  prefs: []
  type: TYPE_NORMAL
- en: What is the Mix Ratio?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The mix ratio acts like a dial between two elements. The value of r is always
    between 0 and 1.
  prefs: []
  type: TYPE_NORMAL
- en: r = 0 → Only L1 penalty gets applied
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: r = 1 → Only L2 penalty gets applied
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Considering we use it to control the proportion between A and B, which have
    values 15 and 20, respectively:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b86fcb5b876bdf943765f8bbf21e5442.png)'
  prefs: []
  type: TYPE_IMG
- en: Working of the Mix Ratio | Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: Notice how the result is gradually shifting from B to A, proportional to the
    ratio. You may notice that (1-r) is divided by 2.
  prefs: []
  type: TYPE_NORMAL
- en: If you are confused where this is coming from, refer to the L2 Regularisation
    part of this blog, where you will see a note about some representations that add
    1/2 to the penalty term (½ λ​ ∑ w²) to simplify the math of backpropagation and
    keep the gradients clean. This is the same ½ in the mix ratio complement.
  prefs: []
  type: TYPE_NORMAL
- en: Note that this ½ is mathematically neat and practically unnecessary. It is alright
    to omit it during code implementations.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: In scikit-learn, the mix ratio is referred to as the “l1_ratio”
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Mathematical Representation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '![](../Images/d6dd3e2b58206fc9ec3eaa7f85ceded6.png)'
  prefs: []
  type: TYPE_IMG
- en: MSE + Elastic Net Penalty | Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s now calculate the derivative of this loss + penalty:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/32f3d4ed5bda820218039dcb95b2d959.png)'
  prefs: []
  type: TYPE_IMG
- en: Derivation of MSE + Elastic Net Penalty | Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: Graphical Representation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Elastic Net combines the strengths of both L1 and L2 Regularisation. This combination
    is not just mathematical, but also has a visual interpretation when we try to
    understand it graphically.
  prefs: []
  type: TYPE_NORMAL
- en: 'The constraint form of Elastic Net is represented mathematically as:'
  prefs: []
  type: TYPE_NORMAL
- en: α ||w||₁ + (1-α) ||w||₂² ≤ r
  prefs: []
  type: TYPE_NORMAL
- en: Where ||w||₁ is the L1 component, ||w||₂² is the L2 component, and α is the
    mix ratio. (It is represented as α here to avoid confusion, since r is already
    being used as the maximum permitted value of the norm)
  prefs: []
  type: TYPE_NORMAL
- en: If we were to visualise the constraint region of Elastic Net, it would look
    like a mix of the diamond shape of L1 and the circle shape of L2.
  prefs: []
  type: TYPE_NORMAL
- en: 'The shape would look as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/27ba35fff014e3935618627fa45339c1.png)'
  prefs: []
  type: TYPE_IMG
- en: ElasticNet Constraint Region | Image Generated using [ChatGPT 4o](https://chatgpt.com/)
  prefs: []
  type: TYPE_NORMAL
- en: Here, just like L1 and L2, the optimal vector lies at the intersection of the
    constraint region and the lowest contour of the loss.
  prefs: []
  type: TYPE_NORMAL
- en: '**Sparsity**'
  prefs: []
  type: TYPE_NORMAL
- en: Elastic Net does promote sparsity, but it is less aggressive than L1\. The L2
    component keeps things stable, while the L1 component still encourages smaller
    models.
  prefs: []
  type: TYPE_NORMAL
- en: '**Gradient Behaviour**'
  prefs: []
  type: TYPE_NORMAL
- en: When it comes to optimisation, Elastic Net’s gradient is simply a weighted sum
    of the L1 and L2 gradients.
  prefs: []
  type: TYPE_NORMAL
- en: The L1 component contributes a constant pull, while the L2 component contributes
    a smooth, weight-dependent pull.
  prefs: []
  type: TYPE_NORMAL
- en: 'Mathematically, the gradient looks like this:'
  prefs: []
  type: TYPE_NORMAL
- en: gradient = λ₁ . sign(w) + 2 . λ₂. w
  prefs: []
  type: TYPE_NORMAL
- en: As a result, weights are nudged toward zero by L2 and snapped toward zero by
    L1\. The combination of the two creates a more balanced and stable regularisation
    behaviour.
  prefs: []
  type: TYPE_NORMAL
- en: Code Implementation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The following is a representation of the Elastic Net penalty in NumPy:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: Note that we have divided (1–r) by 2 here, but this is completely optional since
    it just scales the outputs. In fact, libraries like scikit-learn do not use this
    by default.
  prefs: []
  type: TYPE_NORMAL
- en: To apply Elastic Net in scikit-learn, we will set the penalty as “elasticnet”
    and the l1_ratio (i.e. mix ratio) to 0.5.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: Note that the only solver that works for Elastic Net is “saga”. Previously,
    we discussed that the only solvers that work for the L1 penalty are saga and liblinear.
  prefs: []
  type: TYPE_NORMAL
- en: Since Elastic Net uses both L1 and L2, we need a solver that can handle both
    penalties. Saga deals effectively with both non-differentiable points and large-scale
    datasets.
  prefs: []
  type: TYPE_NORMAL
- en: Like Ridge Regression and Lasso Regression, we can also use Elastic Net as a
    standalone model.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: In PyTorch, the implementation of this would be similar to what we saw in the
    implementation for the L1 Penalty.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: Applying Elastic Net to our Overfitting Model
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Let’s see how Elastic Net performs on our overfitting model. The l1_ratio here
    is our mix ratio, helping us control the level between L2 and L1 Regularisation.
  prefs: []
  type: TYPE_NORMAL
- en: Since the l1_ratio is set to 0.4, the model is utilising the L2 penalty more
    than L1.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/dd79506424d8c7b0aa2c42d8a0d51a40.png)'
  prefs: []
  type: TYPE_IMG
- en: Visualising the Regularised Model | Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: Above, the plots indicate that the Elastic Net model performs well in improving
    generalisation.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let us confirm it by looking at the train and test MSE values:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Train MSE:** 2.8328'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Test MSE:** 1.7885'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When Should We Use This?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A common misconception is that Elastic Net is always better than using just
    L1 or L2, since it uses both. It is good to use Elastic Net when L1 is too aggressive
    and L2 isn’t selective enough.
  prefs: []
  type: TYPE_NORMAL
- en: It is usually used when the number of features exceeds the number of samples,
    especially when the features are highly correlated or irrelevant.
  prefs: []
  type: TYPE_NORMAL
- en: Elastic net is rarely used in Deep Learning, and you will mostly find applications
    for this in classical Machine Learning.
  prefs: []
  type: TYPE_NORMAL
- en: Summary of our Penalties
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: It’s evident that all three penalties (Ridge, Lasso and Elastic Net) are performing
    quite similarly. This is largely because of the simplicity and small size of the
    dataset we used to demonstrate the effects of these penalties.
  prefs: []
  type: TYPE_NORMAL
- en: Further, I want you to know that these examples aren’t to show the superiority
    of one penalty over the other. Each penalty works better in different contexts.
    The intent of these examples was only to show how these penalties would be implemented
    and how they help regularise overfitting models.
  prefs: []
  type: TYPE_NORMAL
- en: 'To see the full effects of each of these penalties, we would have to take a
    look at real-world data. For example:'
  prefs: []
  type: TYPE_NORMAL
- en: Ridge will shine when all the features are important, even if minimally.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Lasso will perform well where many of the features are irrelevant.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Finally, Elastic Net will prove useful when neither L1 nor L2 is clearly better.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It is also important to note that the hyperparameters for these examples (alpha,
    l1_ratio) were selected manually and may not be optimal for this dataset. The
    results are illustrative and not exhaustive.
  prefs: []
  type: TYPE_NORMAL
- en: Hyperparameter Tuning
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Selecting the right value for alpha and l1_ratio is crucial to get the best
    coefficient values for your regularised model. Instead of doing an exhaustive
    grid search with GridSearchCV or a randomised search with RandomizedSearchCV,
    scikit-learn provides handy classes to do this much faster and more conveniently
    for tuning regularised linear models.
  prefs: []
  type: TYPE_NORMAL
- en: We can use RidgeCV, LassoCV and ElasticNetCV to determine the best alpha (and
    l1_ratio for Elastic Net) for our Ridge, Lasso and Elastic Net models, respectively.
  prefs: []
  type: TYPE_NORMAL
- en: In situations where you are dealing with multiple hyperparameters or have limited
    time and computation resources, using GridSearchCV and RandomizedSearchCV would
    prove to be better options.
  prefs: []
  type: TYPE_NORMAL
- en: However, when working specifically with linear regularised models, their respective
    CV classes would generally provide the best hyperparameter tuning.
  prefs: []
  type: TYPE_NORMAL
- en: Standardisation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: When applying regularisation penalties, we apply a penalty to the weights that
    is proportional to the weight of the feature, so that we punish the weights that
    are too large. This way, the model does not rely on any single feature.
  prefs: []
  type: TYPE_NORMAL
- en: The issue here is that if the scales of our features are not similar, for example,
    one feature has a scale from 0 to 1, and the other has a scale from 1 to 1000\.
    What happens is that the model assigns a larger weight to the smaller scaled feature,
    so that it can have a comparable influence on the output to the other feature
    with the larger scale. Now, when the penalty sees this, it does not account for
    the scales of the features and unfairly penalises the small-scale feature heavily.
  prefs: []
  type: TYPE_NORMAL
- en: To avoid this, it is crucial to standardise your features when applying Regularisation
    to your model.
  prefs: []
  type: TYPE_NORMAL
- en: '*I highly recommend reading “A visual explanation for regularisation of linear
    models” on explained.ai by Terence Parr [5]. His visual and intuitive explanations
    significantly helped me deepen my understanding of L1 and L2 Regularisation.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Training Process-Based Regularisation Techniques
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Dropout
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Dropout is one of the most popular methods for regularising deep neural networks.
    In this method, during each training step, we randomly “turn off” or “drop” a
    subset of neurons (excluding the output neurons) to reduce the model’s high dependence
    on certain features.
  prefs: []
  type: TYPE_NORMAL
- en: I thought this analogy from [1] (page 300) was pretty good. Imagine a company
    where employees flip a coin each morning to decide if they’re coming to work.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/3bdca3242b8a80ac47e2b0cefe4b10a3.png)'
  prefs: []
  type: TYPE_IMG
- en: Image Generated using [ChatGPT 4o](https://chatgpt.com/)
  prefs: []
  type: TYPE_NORMAL
- en: This would force the company to spread critical knowledge and avoid relying
    on just one person. Similarly, dropout prevents neurons from depending too much
    on their neighbours, making each one pull its own weight.
  prefs: []
  type: TYPE_NORMAL
- en: This results in a more resilient network that generalises better.
  prefs: []
  type: TYPE_NORMAL
- en: '*Each neuron has a probability p of being dropped out during each training
    step. This probability p is a hyperparameter and is called the “dropout rate”,
    and is typically set to 50%.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Sometimes, people refer to dropout as dilution, but it is important to note
    that they are not identical. Rather, dropout is a type of dilution.
  prefs: []
  type: TYPE_NORMAL
- en: Dilution is a broad term that covers techniques that weaken parts of the model
    or signal. This might include dropping inputs or features, scaling down weights,
    muting activations, etc.
  prefs: []
  type: TYPE_NORMAL
- en: A Deeper Look at How Dropout Works
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**How a General Neural Network Works**'
  prefs: []
  type: TYPE_NORMAL
- en: Calculate the linear transformation, i.e. z = w * x + b.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Apply the activation function to the output of our linear transformation.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: To compute the output of a given layer (Eg, Layer 1), we need the output from
    the previous layer (Layer 0), which acts as the input (x), and the weights and
    biases (parameters) associated with Layer 1.
  prefs: []
  type: TYPE_NORMAL
- en: 'This process is repeated from layer to layer. Here’s what the neural network
    looks like:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/8e82be779d99e313eca8ae02e16cb623.png)'
  prefs: []
  type: TYPE_IMG
- en: A General Neural Network | Made with [draw.io](https://www.drawio.com/) | Image
    by Author
  prefs: []
  type: TYPE_NORMAL
- en: Here, we have 4 input features (x₁ to x₄), and the first hidden layer has 6
    neurons (h₁ to h₆). Each neuron in the neural network (apart from the input layer)
    has a separate bias associated with it.
  prefs: []
  type: TYPE_NORMAL
- en: 'We represent the biases as b1 to b6 for the first hidden layer:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/46e3e9091b484f42930a05ede3ababb6.png)'
  prefs: []
  type: TYPE_IMG
- en: Bias in a Neural Network | Made with [draw.io](https://www.drawio.com/) | Image
    by Author
  prefs: []
  type: TYPE_NORMAL
- en: The weights are written in the format wᵢⱼ, where i refers to the neuron in the
    current (target) layer and j refers to the neuron in the previous (source) layer.
  prefs: []
  type: TYPE_NORMAL
- en: So, for example, when we connect neuron 1 of Hidden Layer 1 to neuron 2 of the
    Input Layer, we represent the weight of that connection as w₁₂, meaning “weight
    going to neuron 1 (current layer), coming from neuron 2 (previous layer).”
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/7a9beb0b03a6346b7a4f36885b52b785.png)'
  prefs: []
  type: TYPE_IMG
- en: Weights in a Neural Network | Made with [draw.io](https://www.drawio.com/) |
    Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: 'Finally, inside a neuron, we will have a linear transformation z and an activation
    ā, which is the final output of the particular neuron. This is what that looks
    like:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b699f172a0391ff17e590b90ec2c137d.png)'
  prefs: []
  type: TYPE_IMG
- en: Inside a Neuron | Made with [draw.io](https://www.drawio.com/) | Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: '**What Changes When We Add Dropout?**'
  prefs: []
  type: TYPE_NORMAL
- en: In a neural network with dropout, we have a slight update in the flow. After
    every output, right from the first hidden layer, we add a Bernoulli mask in between
    that and the input of the next layer.
  prefs: []
  type: TYPE_NORMAL
- en: 'Think of it as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d2212ce69ecde9fbbf0cb0c302190b66.png)'
  prefs: []
  type: TYPE_IMG
- en: The Bernoulli Mask | Made with [draw.io](https://www.drawio.com/) | Image by
    Author
  prefs: []
  type: TYPE_NORMAL
- en: As you can see, the output from our first neuron of Hidden Layer 1 (ā₁) goes
    through a Bernoulli mask (r), which in this case is a single number. The output
    of this is ȳ₁.
  prefs: []
  type: TYPE_NORMAL
- en: '**The Bernoulli Mask**'
  prefs: []
  type: TYPE_NORMAL
- en: As you can see, we have this new “r” mask in between. Now r is a vector that
    has values sampled from the Bernoulli distribution (It is resampled in each forward
    pass), so basically, the values are 0 or 1.
  prefs: []
  type: TYPE_NORMAL
- en: We multiply this r vector, also known as the Bernoulli mask, by the output vector
    element-wise. This results in the value of the outputs of the previous layer either
    turning to 0 or staying the same.
  prefs: []
  type: TYPE_NORMAL
- en: 'You can see how this works with the following example:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d0e2cc536c717f5983074d3a35d79fee.png)'
  prefs: []
  type: TYPE_IMG
- en: Working of the Bernoulli Mask | Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: Here, a is the vector of outputs that contains 6 outputs. The Bernoulli mask
    r and the output vector y will also be vectors of size 6\. y will be the input
    that goes into Hidden Layer 2.
  prefs: []
  type: TYPE_NORMAL
- en: The neurons that are “turned off” don’t contribute to the next layer, since
    they will be 0 when calculating the outputs of the next step.
  prefs: []
  type: TYPE_NORMAL
- en: 'You can see what that would look like as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/92c43d10e64429f326e46fa0246447d4.png)'
  prefs: []
  type: TYPE_IMG
- en: Zero Contribution of the “Turned Off” Neurons | Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: The logic behind this is that in each training step, we are training a “thinned”
    version of the neural network.
  prefs: []
  type: TYPE_NORMAL
- en: This means that every time we drop a random set of neurons, the model learns
    to be more robust and not rely on a specific path in the network while training.
  prefs: []
  type: TYPE_NORMAL
- en: '**How does this Affect Backpropagation?**'
  prefs: []
  type: TYPE_NORMAL
- en: During backpropagation, we use the same mask that was used in the forward pass.
    So, the neurons with mask 1 receive the gradient and update weights as usual.
    Although the dropped neurons with mask 0 do not.
  prefs: []
  type: TYPE_NORMAL
- en: 'Mathematically, if we have a neuron with output 0 during the forward pass,
    the gradient during backpropagation will also turn out to be 0\. This means that
    during the gradient descent step:'
  prefs: []
  type: TYPE_NORMAL
- en: w = w – α . 0
  prefs: []
  type: TYPE_NORMAL
- en: Here, **α **is the “learning rate”. The above calculation leads to w being the
    same, without any update.
  prefs: []
  type: TYPE_NORMAL
- en: This means that the weights remain unchanged and the neuron “skips learning”
    in that training step.
  prefs: []
  type: TYPE_NORMAL
- en: '**Where to Apply Dropout**'
  prefs: []
  type: TYPE_NORMAL
- en: It is important to keep in mind that we don’t apply dropout to all layers, as
    it can hurt performance. We usually apply dropout to the hidden layers. If we
    apply it to the input layer, it can drop crucial information from the raw input
    features.
  prefs: []
  type: TYPE_NORMAL
- en: Dropping neurons in the output layer may introduce randomness in our output.
    In small networks, it is common practice to apply dropout to one or two layers
    just before the output. Too many dropouts in smaller networks can cause underfitting.
  prefs: []
  type: TYPE_NORMAL
- en: In larger networks, you might apply dropout to multiple hidden layers, especially
    after dense layers, where overfitting is more probable.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/9ce4d8b8ae2a530dc546f4cb27215d4e.png)'
  prefs: []
  type: TYPE_IMG
- en: A General Neural Network with Dropout | Made with [draw.io](https://www.drawio.com/) |
    Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: Above is an example of a dropout neural network. The dropout neurons are represented
    in black, which signifies that these neurons are “turned off”.
  prefs: []
  type: TYPE_NORMAL
- en: Some representations remove the connections entirely, representing that the
    neuron is “inactive”. However, I have intentionally kept the connections in place
    to tell you that the outputs of these neurons are still calculated, just like
    any other neuron, and are passed on to the next layer.
  prefs: []
  type: TYPE_NORMAL
- en: In practice, the neuron is not actually inactive and goes through the full computation
    process like any other neuron. The only difference is that the output is 0 and
    has no effect on the following layers.
  prefs: []
  type: TYPE_NORMAL
- en: '[13]'
  prefs: []
  type: TYPE_NORMAL
- en: Code Implementation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/3fe59b9f93ff13dc6c97c362628ed47b.png)'
  prefs: []
  type: TYPE_IMG
- en: Result of the above Code Implementation | Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: When Should We Use This?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Dropout is quite useful when you are training deep neural networks on small/medium
    datasets, where overfitting is common. Further, if the neural network has many
    dense (fully connected) layers, there is a high chance that the model will fail
    to generalise.
  prefs: []
  type: TYPE_NORMAL
- en: In such cases, dropout will effectively reduce neuron co-dependency, increase
    redundancy and improve generalisation by making the model more robust.
  prefs: []
  type: TYPE_NORMAL
- en: Bonus
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: When I first studied dropout, I always wondered, “Why calculate the output and
    gradient descent for a dropped-out neuron at all if it’s going to be set to 0
    anyway?” I saw it as a waste of time and computation. Turns out, there is some
    good reason for this, as well as some other approaches, as discussed below.
  prefs: []
  type: TYPE_NORMAL
- en: Ironically, skipping the computation sounds efficient but ends up being slower
    on GPUs. That’s because skipping individual neurons makes memory access irregular
    and disrupts how GPUs parallelise computations. So, it’s faster to just compute
    everything and zero it out later.
  prefs: []
  type: TYPE_NORMAL
- en: 'That being said, researchers have proposed smarter ways of making dropout more
    efficient:'
  prefs: []
  type: TYPE_NORMAL
- en: For example, in Stochastic Depth (Huang et al., 2016), instead of dropping random
    neurons, we drop entire residual blocks during training. These are full sections
    of the network that would normally perform a series of computations.
  prefs: []
  type: TYPE_NORMAL
- en: By randomly skipping these blocks in each forward pass, we reduce the amount
    of computation done during training. This not only speeds things up, but also
    regularises the model by making it learn to perform well even when some layers
    are missing. At test time, all layers are kept, so we get the full power of the
    model. [14]
  prefs: []
  type: TYPE_NORMAL
- en: Another idea is Structured Dropout, like Row Dropout, where instead of dropping
    single values from the activation matrix, we drop entire rows or columns.
  prefs: []
  type: TYPE_NORMAL
- en: Think of it as switching off a whole group of neurons at once. This creates
    larger gaps in the signal, forcing the network to rely on more diverse parts of
    itself, just like dropout, but more structured.
  prefs: []
  type: TYPE_NORMAL
- en: The benefit is that it’s easier for GPUs to handle, since it doesn’t create
    chaotic, random patterns of zeros. This can lead to faster training and better
    generalisation. [2]
  prefs: []
  type: TYPE_NORMAL
- en: Early Stopping
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This is a method that can be used in both ML and DL applications, wherever you
    have an iterative model training process.
  prefs: []
  type: TYPE_NORMAL
- en: In this method, the idea is to stop the training process as soon as the performance
    of the model starts to degrade.
  prefs: []
  type: TYPE_NORMAL
- en: '**Iterative Training Flow of an ML Model.**'
  prefs: []
  type: TYPE_NORMAL
- en: We have a model which is nothing but a mathematical function with learnable
    parameters (weights and biases).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The parameters are set randomly (sometimes we can have a different strategy
    to set them).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The model takes in feature inputs and makes predictions.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: These predictions are compared with the training set labels by using a loss
    function to calculate error.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: We use the error to update our parameters.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: This full cycle is called one epoch of training. It is repeated multiple times
    until we get a model that performs well. (If we are using batching strategies,
    one epoch is completed when this cycle has been applied to the entire training
    dataset, batch by batch.)
  prefs: []
  type: TYPE_NORMAL
- en: Generally, after every epoch, we check the performance of the model on a separate
    validation set to see how well the model generalises.
  prefs: []
  type: TYPE_NORMAL
- en: On observing this performance after every epoch, we are hoping to see a steady
    decline in the loss (the model makes fewer errors) over the epochs. If we see
    the loss rising after some point in training, it means that the model has begun
    overfitting.
  prefs: []
  type: TYPE_NORMAL
- en: With early stopping, we monitor the validation performance for a set number
    of epochs (this is called ‘patience’ and is a hyperparameter). If the performance
    of the model stops showing improvement within its patience window, we stop training,
    and then we roll back to the model checkpoint which had the best validation performance.
  prefs: []
  type: TYPE_NORMAL
- en: Code Implementation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In scikit-learn, we need to set the early_stopping parameter as True, provide
    the size of your validation set (0.1 indicates that the validation set will be
    10% of the train set) and finally, we set the patience, which uses the name n_iter_no_change.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE19]'
  prefs: []
  type: TYPE_PRE
- en: Here, once the model stops improving, a counter begins. If there’s no improvement
    for the next 5 consecutive epochs (defined by the patience parameter), training
    stops, and the model is rolled back to the checkpoint with the best validation
    performance.
  prefs: []
  type: TYPE_NORMAL
- en: Unlike scikit-learn, PyTorch, unfortunately, does not have a shiny built-in
    function in its core library to implement early stopping.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE20]'
  prefs: []
  type: TYPE_PRE
- en: When Should We Use This?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Early Stopping is often used in conjunction with other regularisation techniques
    such as weight decay and/or dropout. Early Stopping is particularly useful when
    you are unsure of the optimal number of training epochs for your model, or if
    you are limited by time or computational resources.
  prefs: []
  type: TYPE_NORMAL
- en: In this situation, Early Stopping will help you find the best model while avoiding
    overfitting and unnecessary computation.
  prefs: []
  type: TYPE_NORMAL
- en: Max Norm Regularisation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Max norm is a popular regularisation technique used for Neural Networks (it
    can also be used for classical ML, but it’s very uncommon).
  prefs: []
  type: TYPE_NORMAL
- en: This method comes into play during optimisation. After every weight update (during
    each gradient descent step, for example), we calculate the L2 norm of the weight
    vector(s).
  prefs: []
  type: TYPE_NORMAL
- en: If the value of this norm exceeds a certain value (the max norm value), we scale
    down the weights proportionally. This ameliorates exploding weights and overfitting.
  prefs: []
  type: TYPE_NORMAL
- en: 'We use the L2 norm here because it scales the weights more uniformly and is
    a true reflection of the actual geometrical size of the vector in space. The scaling
    of the weight vector(s) is done using the following formula:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/5fca2722dca69206f1c4a92102f41a26.png)'
  prefs: []
  type: TYPE_IMG
- en: Max Norm Scaling Formula | Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: Here, r is the max norm hyperparameter. Lower r leads to a higher regularisation,
    i.e. higher reduction in weight magnitudes.
  prefs: []
  type: TYPE_NORMAL
- en: Math Example
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This simple example shows how the magnitude of the new weight vector is brought
    down to 6 (r), hence implementing regularisation on our weight vector.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/07fe83c4bc85400e5a9e4aaa9a69f963.png)'
  prefs: []
  type: TYPE_IMG
- en: Max Norm Math Example | Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: Code Implementation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '[PRE21]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/34be71cb0c9c772d3a4df8c26d30971d.png)'
  prefs: []
  type: TYPE_IMG
- en: Result of the above code implementation | Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: As we can see, the L2 norm comes out to be the same as we calculated before.
  prefs: []
  type: TYPE_NORMAL
- en: w.norm(2) specifies that we want to calculate the L2 norm of the weight vector
    w. dim=0 will calculate the norm column-wise, and keepdim will keep the dimensions
    of our output the same, which is helpful for broadcasting in later operations.
  prefs: []
  type: TYPE_NORMAL
- en: Wondering what a clamp does? It acts as a safety net for us. If the value of
    the L2 norm gets too low, it will cause issues in the later step, so if the norm
    value is less than r/2, it will get set to r/2.
  prefs: []
  type: TYPE_NORMAL
- en: In the following example, you can see that if we set the weight vector to [1,
    1], the norm is less than r/2 and is hence set to 3, i.e. r/2.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE22]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/cabfa8b5fc19ec141eb50481edf459bd.png)'
  prefs: []
  type: TYPE_IMG
- en: Result of the above code implementation | Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: The following line makes sure to clip the weight vector only if the L2 norm
    of it exceeds r.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE23]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/314d480073f4e9b81d64660bfa47737c.png)'
  prefs: []
  type: TYPE_IMG
- en: Result of the above code implementation | Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: 'torch.clamp() plays a crucial role here:'
  prefs: []
  type: TYPE_NORMAL
- en: If norm > r → desired = r
  prefs: []
  type: TYPE_NORMAL
- en: If norm ≤ r → desired = norm
  prefs: []
  type: TYPE_NORMAL
- en: This way, in the last step when we calculate desired / norm, the result is either
    r/norm or norm/norm, i.e. 1.
  prefs: []
  type: TYPE_NORMAL
- en: Notice how the desired is set to the norm when it is less than max.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE24]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/2128292db17e25b632ad324e25af96d6.png)'
  prefs: []
  type: TYPE_IMG
- en: Result of the above code implementation | Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: Finally, we will calculate the clipped weight since our norm exceeds r.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE25]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/b8b5c46d0adc695c57d9b9a2e1c3a919.png)'
  prefs: []
  type: TYPE_IMG
- en: Result of the above code implementation | Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: To check the answer we got for our updated weight vector, we will calculate
    its L2 norm, which should now be equal to r.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE26]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/2050ff62ba12007af9ea42dd98db46c8.png)'
  prefs: []
  type: TYPE_IMG
- en: Result of the above code implementation | Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: This code is adapted from [7] and is modified for understanding and matching
    our example.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: When Should We Use This?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Max norm becomes especially useful when you’re dealing with unnaturally large
    weights that need to be clipped. This situation often arises in very deep neural
    networks, where exploding gradients can affect training.
  prefs: []
  type: TYPE_NORMAL
- en: While techniques like weight decay help by gently nudging large weights toward
    0, they do so gradually.
  prefs: []
  type: TYPE_NORMAL
- en: Max norm applies a hard constraint, immediately clipping the weight to a fixed
    threshold. This makes it more effective in directly controlling unnaturally high
    weights.
  prefs: []
  type: TYPE_NORMAL
- en: Max norm is also commonly used with Dropout. Dropout randomly shuts off neurons,
    and max norm makes sure that the neurons that weren’t shut off don’t overcompensate.
    This maintains stability in the learning process.
  prefs: []
  type: TYPE_NORMAL
- en: Batch Normalisation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Batch Normalisation is a normalisation method, not originally meant for regularisation.
    I will cover this briefly since it still regularises the model (as a side effect)
    and prevents overfitting.
  prefs: []
  type: TYPE_NORMAL
- en: Batch Norm works by normalising the inputs to the activations within each mini-batch.
    This involves computing the batch-specific mean and variance, followed by scaling
    and shifting the activations using learnable parameters γ (gamma) and β (beta).
  prefs: []
  type: TYPE_NORMAL
- en: Why? This is because once we calculate z = wx + b, our linear transformation,
    we will apply the normalisation. This will alter the values of w and b.
  prefs: []
  type: TYPE_NORMAL
- en: Since the mean is subtracted across the whole batch, b turns out to be 0, and
    the scale of w also shifts. So, to maintain the scaling and shifting ability of
    our network, we introduce γ (gamma) and β (beta), the scaling and shifting parameters,
    respectively.
  prefs: []
  type: TYPE_NORMAL
- en: As a result, the inputs to each layer maintain a consistent distribution, leading
    to faster training and improved stability in deep learning models.
  prefs: []
  type: TYPE_NORMAL
- en: Batch norm was initially developed to address the issue of “internal covariate
    shift”. Although a set definition is not agreed upon, internal covariate shift
    is basically the phenomenon of change in the distribution of activations across
    the layers of a Neural Network during training.
  prefs: []
  type: TYPE_NORMAL
- en: Batch norm helps mitigate this by stabilising layer inputs, but later research
    suggests that these benefits may also come from smoothing the optimisation landscape.
  prefs: []
  type: TYPE_NORMAL
- en: Batch norm reduces the need for dropout, but it is not a replacement for it.
  prefs: []
  type: TYPE_NORMAL
- en: When Should We Use This?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We use Batch Normalisation when we notice that the internal distributions of
    the activations shift as the training progresses, or when we start noticing that
    the model is susceptible to vanishing/exploding gradients and has unusually slow
    or unstable convergence.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Data-Based Regularisation Techniques
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Data Augmentation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Algorithms that learn from data face a critical caveat. The quantity, quality,
    and distribution of data can significantly impact the model’s performance.
  prefs: []
  type: TYPE_NORMAL
- en: For example, in a classification problem, some classes may be underrepresented
    compared to others. This can lead to bias or poor generalisation.
  prefs: []
  type: TYPE_NORMAL
- en: To address this issue, we turn to data augmentation, which is a technique used
    to artificially inflate/balance the training data by modifying or generating new
    data.
  prefs: []
  type: TYPE_NORMAL
- en: We can use various techniques to do this, some of which we will discuss below.
    This acts as a form of regularisation as it exposes the model to varied data,
    thus encouraging general patterns and improving generalisation.
  prefs: []
  type: TYPE_NORMAL
- en: SMOTE
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: SMOTE (Synthetic Minority Oversampling TEchnique) proposes a method to oversample
    minority data by adding synthetic examples.
  prefs: []
  type: TYPE_NORMAL
- en: SMOTE was inspired by a technique that was used on the training data for handwritten
    character recognition, where they rotated and skewed the images to alter the existing
    data. This means that they modified the data directly in the “input space”.
  prefs: []
  type: TYPE_NORMAL
- en: SMOTE, on the other hand, takes a more general approach and works in “feature
    space”. In feature space, the data is represented by a vector of numerical features.
  prefs: []
  type: TYPE_NORMAL
- en: '**Working**'
  prefs: []
  type: TYPE_NORMAL
- en: Find the K nearest neighbours for each sample in the minority class.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Randomly select one or more neighbours (depends on how much oversampling you
    need).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: For each selected neighbour, compute the difference between the vector of the
    current sample and this neighbour’s vector.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Multiply this difference by a random number between 0 and 1 and add the result
    to the original feature vector.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: This results in a new synthetic point somewhere along the line segment connecting
    the two samples. [8]
  prefs: []
  type: TYPE_NORMAL
- en: Code Implementation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'We can implement this simply by using the **imbalanced-learn** library:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE27]'
  prefs: []
  type: TYPE_PRE
- en: '*SMOTE is typically used in classical ML. The following two techniques are
    more predominantly used in Deep Learning, particularly in image classification.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: When Should We Use This?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We use SMOTE when dealing with imbalanced classification datasets. When a particular
    dataset contains very little data on a class, and the model is biased towards
    the majority, we can augment the data for the minority class using SMOTE.
  prefs: []
  type: TYPE_NORMAL
- en: Mixup
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this method, we linearly combine two random input images and their labels.
  prefs: []
  type: TYPE_NORMAL
- en: If you are training the model to differentiate between bagels and croissants
    (sorry, I’m hungry), you would show the model one image at a time with a clear
    label that says “this is a croissant”.
  prefs: []
  type: TYPE_NORMAL
- en: Although this isn’t great for generalisation, rather, if we blend the images
    of the two together, an overlayed amalgamation of a bagel and croissant, in a
    70–30 per cent ratio, and assign a label like “this is 0.7 bagel and 0.3 croissant.”
  prefs: []
  type: TYPE_NORMAL
- en: The model learns to reason in percentages rather than absolutes, and this leads
    to better generalisation.
  prefs: []
  type: TYPE_NORMAL
- en: 'Calculating the mix of our images and labels:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a4a7713d740d00ab00a2a8de540833b3.png)'
  prefs: []
  type: TYPE_IMG
- en: Math of Mixing the Images and Labels | Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: '*Also, it’s important to note that most of the time the labels are one-hot
    encoded, so if bagel is [1, 0], croissant is [0, 1], then our mixed label of a
    70% bagel and 30% croissant image would be [0.7, 0.3].*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Code Implementation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '[PRE28]'
  prefs: []
  type: TYPE_PRE
- en: 'Here’s what the mixed image would look like:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/87388c0c48e7b2ddbf995c71fb825aed.png)'
  prefs: []
  type: TYPE_IMG
- en: Visualising our Mixup Image | Bagel Photo by [Terrillo Walls](https://unsplash.com/@terrillo) on [Unsplash ](https://unsplash.com/)|
    Croissant Photo by [Personalgraphic.com](https://unsplash.com/@personal_graphic) on [Unsplash ](https://unsplash.com/)|
    Mixup Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: When Should We Use This?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: When working with limited or noisy data, we can use Mixup as it can not only
    boost the amount of data we get to train the model on, but it also helps us make
    the decision boundary smoother.
  prefs: []
  type: TYPE_NORMAL
- en: When the classes in your dataset are not clearly separable or when there is
    label noise, training the model on labels like “70% Bagel, 30% Croissant” can
    help the model learn smoother and more robust decision surfaces.
  prefs: []
  type: TYPE_NORMAL
- en: Cutout
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Cutout is a regularisation strategy used to improve model generalisation by
    randomly masking out square regions of an input image during training. This forces
    the model to focus on a wider range of features rather than overfitting to specific
    parts of the image.
  prefs: []
  type: TYPE_NORMAL
- en: A similar idea is used in language modelling, known as Masked Language Modelling
    (MLM). Here, instead of masking parts of an image, we mask random tokens in a
    sentence, and the model is trained to predict the missing token based on the surrounding
    context.
  prefs: []
  type: TYPE_NORMAL
- en: Both techniques encourage better feature learning and generalisation by withholding
    parts of the input and forcing the model to fill in the blanks.
  prefs: []
  type: TYPE_NORMAL
- en: Code Implementation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '[PRE29]'
  prefs: []
  type: TYPE_PRE
- en: 'Here’s how the code is working logically:'
  prefs: []
  type: TYPE_NORMAL
- en: We check the dimensions (h, w) of our image
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We select a random coordinate (x, y) on the image
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Using the mask size and our coordinates, we create a mask for the image
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The values of all the pixels within this mask are set to 0, making a cutout
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Please note that in this example, I have not used lambda. Rather, I have set
    a fixed size for the cutout mask. We could use lambda to determine a dynamic size
    for the mask.
  prefs: []
  type: TYPE_NORMAL
- en: This will help us effectively control the level of regularisation applied to
    the model.
  prefs: []
  type: TYPE_NORMAL
- en: For example, if the lambda is too high, the whole image could be masked out,
    preventing effective learning in the model. This will lead to underfitting the
    model.
  prefs: []
  type: TYPE_NORMAL
- en: On the other hand, if we were to set the lambda too low, or 0, there would be
    no meaningful regularisation, and the model would continue to overfit.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s what a cutout image would look like:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/7bcba97c876566c92a7fc9be7e38b675.png)'
  prefs: []
  type: TYPE_IMG
- en: Visualising our Cutout Image | Cat Photo by [Manja Vitolic](https://unsplash.com/@madhatterzone) on [Unsplash](https://unsplash.com/) |
    Cutout Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: When Should We Use This?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In real-world scenarios of image recognition, you may often come across images
    of subjects where some parts or features of the subject’s view are obstructed.
  prefs: []
  type: TYPE_NORMAL
- en: For example, in a face recognition system, you may encounter people who are
    wearing sunglasses or a face mask. In these situations, it becomes important for
    the model to be able to recognise the subject based on a partial view.
  prefs: []
  type: TYPE_NORMAL
- en: This is where cutout proves useful, as it trains the model on images of the
    subject where there are obstructions in the view. This helps the model easily
    recognise a subject from various defining features rather than just a few.
  prefs: []
  type: TYPE_NORMAL
- en: CutMix
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In cutmix, instead of just blocking out a square of the image like we did in
    cutout, we replaced the cutout squares with a patch from another image.
  prefs: []
  type: TYPE_NORMAL
- en: These patches help the model understand diverse features, as well as the locations
    of the features, which would enhance its ability to identify the image from a
    partial view.
  prefs: []
  type: TYPE_NORMAL
- en: For example, if a model is focusing only on the snout of a dog when recognising
    the images, it could be considered as overfitting. In situations where there is
    no visible snout of the dog, the model would fail to recognise a dog in the image.
  prefs: []
  type: TYPE_NORMAL
- en: But if we now provide cutmix images in the model, the model would learn other
    defining features, such as ears, eyes, etc., to recognise a dog effectively. This
    would improve generalisation and reduce overfitting.
  prefs: []
  type: TYPE_NORMAL
- en: Code Implementation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '[PRE30]'
  prefs: []
  type: TYPE_PRE
- en: The code used here is similar to the one we saw in Cutout. Instead of blacking
    out a part of the image, we are patching it up with a part of a different image.
  prefs: []
  type: TYPE_NORMAL
- en: Again, in this current example, I have used a set size for the mask. We can
    use lambda to determine a dynamic size for the mask.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s what a cutmix image would look like:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f321fe744829f225ab63a8fd02c73a7e.png)'
  prefs: []
  type: TYPE_IMG
- en: Visualising our CutMix Image | Dog Photo by [Alvan Nee](https://unsplash.com/@alvannee) on [Unsplash](https://unsplash.com/) |
    CutMix Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: When Should We Use This?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Cutmix builds upon the concept of Cutout by not only masking out parts of the
    image but also replacing them with patches from other images.
  prefs: []
  type: TYPE_NORMAL
- en: This makes the model more context-aware, which means that the model can recognise
    the presence of a subject and also the level of presence.
  prefs: []
  type: TYPE_NORMAL
- en: This is especially useful when you have multi-class image recognition tasks
    where multiple subjects can appear in the same image, and the model must be able
    to discriminate between the presence/absence and level of presence of these subjects.
  prefs: []
  type: TYPE_NORMAL
- en: For example, recognising a face in a crowd, or recognising a certain fruit in
    a fruit basket with other overlapping fruits.
  prefs: []
  type: TYPE_NORMAL
- en: Noise Injection
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Noise injection is a type of data augmentation that involves adding noise to
    the input data or the model’s internal layers during training as a method of regularisation,
    helping to reduce overfitting.
  prefs: []
  type: TYPE_NORMAL
- en: This method is possible for classical Machine Learning, but is more widely used
    for Deep Learning.
  prefs: []
  type: TYPE_NORMAL
- en: But wait, we had mentioned that noisy datasets are one of the reasons for overfitting,
    because the model learns the noise… so how does adding more noise help?
  prefs: []
  type: TYPE_NORMAL
- en: This contradiction seemed confusing to me when I was first learning this topic.
  prefs: []
  type: TYPE_NORMAL
- en: '**There’s a difference.**'
  prefs: []
  type: TYPE_NORMAL
- en: The noise that occurs naturally in the model is uncontrolled. This causes overfitting,
    because the model is not supposed to learn this noise, since it mainly comes from
    errors, outliers or inconsistencies.
  prefs: []
  type: TYPE_NORMAL
- en: The noise we add to the model to battle overfitting, on the other hand, is controlled
    noise. The latter is added to the model temporarily during training.
  prefs: []
  type: TYPE_NORMAL
- en: Here’s an analogy to solidify the understanding
  prefs: []
  type: TYPE_NORMAL
- en: Imagine you are a basketball player, and your goal is to score the most shots.
  prefs: []
  type: TYPE_NORMAL
- en: '**Scenario A (Uncontrolled Noise): **You are training on a flawed court. Maybe
    the hoop is small/too big/skewed. The floor has bumpy spots, there is unpredictable
    strong wind and so on.'
  prefs: []
  type: TYPE_NORMAL
- en: This makes you (the model) adapt to this court and score well despite the issues.
    But when game day comes, you play on a perfect court and underperform because
    you are overfit to the flawed court.
  prefs: []
  type: TYPE_NORMAL
- en: '**Scenario B (Controlled Noise): **You start off with the perfect court, but
    your coach randomly dims the lights, turns on a gentle breeze to distract you
    or maybe puts weights on your hands.'
  prefs: []
  type: TYPE_NORMAL
- en: This is done in a temporary, reliable and stable manner. Once you take those
    weights off, you will be performing great in the real world, on the perfect court.
  prefs: []
  type: TYPE_NORMAL
- en: '**Dataset Size, Model Complexity and Noise-to-Signal Ratio.**'
  prefs: []
  type: TYPE_NORMAL
- en: A large dataset can deal with the effect of a small amount of noise. Although
    a smaller dataset is affected significantly by even a small level of noise.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: More complex models are prone to overfitting. They can easily memorise the noise
    in data.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A high noise-to-signal ratio requires more data or more sophisticated noise
    handling strategies to avoid overfitting/underfitting.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Injected noise must also be controlled, as too little can have no effect, and
    too much can block learning.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What is Noise?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Noise refers to variations in data that are unpredictable or irrelevant. These
    noisy data points don’t represent actual patterns in the data.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are some examples of noise in the dataset:'
  prefs: []
  type: TYPE_NORMAL
- en: Typos
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Mislabelled data (Eg, Picture of a cat labelled as a dog)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Outliers (Eg, an 8-foot-tall person in a height dataset)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Fluctuations (Eg, A sudden price spike in the stock market due to some news)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: etc
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Noise Injections and Types of Noise
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: There are different types of noise, most of which are based on statistical distributions.
    In Noise Injections, we add a type of noise into a specific part of our model,
    depending on which, there are different effects on the model’s learning and outputs.
  prefs: []
  type: TYPE_NORMAL
- en: '*Note: “Parts” of a model in this context refer to 4 parts, namely, Inputs,
    Weights, Gradients and Activations. For classical machine learning, we mainly
    focus on adding noise to the inputs. We only add noise to the rest of the parts
    in deep learning applications.*'
  prefs: []
  type: TYPE_NORMAL
- en: '**Gaussian Noise: **Generated using a normal distribution. This is the most
    common type of noise added during training. This can be applied to all parts of
    the model and is very flexible.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Uniform Noise: **Generated using a uniform distribution. This noise introduces
    consistent randomness. Unlike the Gaussian distribution, which favours values
    near the mean. Like the Gaussian noise, the Uniform noise can be applied to all
    parts of the model.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Poisson Noise: **Generated using the Poisson distribution. Here, higher values
    lead to higher noise. Typically, only used on input data. (You CAN use any noise
    on any part of the model, but some combinations can show no benefit or could even
    harm performance.)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Laplacian Noise: **Generated using the Laplacian distribution where the peak
    is sharp at the mean and tails are heavy. This can be used on inputs or activations.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Salt and Pepper Noise: **This is a type of noise which is used on image data.
    This noise randomly flips pixel values to max (salt) or min (pepper). This simulates
    real-world issues like transmission errors or corruption etc. This is used on
    input data.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In some cases, noise can also be added to the Bias of the model, although this
    is less common.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: How Do Noise Injections Affect Each Part?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**Inputs: **Adding noise to the inputs makes it hard for the model to memorise
    the training data and forces it to learn more general patterns. It is useful when
    the input data is noisy.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Weights: **Applying noise to the weights prevents the model from relying
    on any single weight too much. This makes the model more robust and improves generalisation.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Activations: **Adding noise to the activations makes the model understand
    more complex and diverse patterns.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Gradients: **When noise is introduced into the optimisation process, it becomes
    hard for the model to converge on a single solution. This means that the model
    can escape sharp local minima.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[10]'
  prefs: []
  type: TYPE_NORMAL
- en: Previously, we looked at Dropout regularisation in neural networks. This is
    also a type of noise injection, since it is introducing noise to the network by
    randomly dropping the neurons to 0.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Code Implementation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**To the Inputs**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Assuming that your dataset is a matrix X, to introduce noise to the input data,
    we will create a matrix of the same shape as X, and the values of this matrix
    will be random values selected from a distribution of your choice:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE31]'
  prefs: []
  type: TYPE_PRE
- en: '**To the Weights**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Adding noise sampled from a Gaussian distribution to the weights using PyTorch:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE32]'
  prefs: []
  type: TYPE_PRE
- en: '**To the Gradient**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Here, we add Gaussian noise to the gradients of our model:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE33]'
  prefs: []
  type: TYPE_PRE
- en: '**To the Activation**'
  prefs: []
  type: TYPE_NORMAL
- en: Adding noise to the activation functions would involve injecting noise into
    the neuron’s input, just before the activation function(ReLU, sigmoid, etc).
  prefs: []
  type: TYPE_NORMAL
- en: While this seems theoretically straightforward, I haven’t found many resources
    showing a clear implementation of how this should be done in practice.
  prefs: []
  type: TYPE_NORMAL
- en: I am keeping this section open for now and will revisit once the topic is clear
    to me. I would appreciate any suggestions in the comments!
  prefs: []
  type: TYPE_NORMAL
- en: When Should We Use This?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: When your dataset is small or noisy, we can use noise injections to reduce overfitting
    by helping the model understand broader patterns.
  prefs: []
  type: TYPE_NORMAL
- en: This method is used alongside other regularisation techniques, especially when
    deploying the model for real-world situations where noise and imperfect data are
    apparent.
  prefs: []
  type: TYPE_NORMAL
- en: Ensemble Methods
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Ensemble methods, specifically Bagging, are not a regularisation technique at
    their core, but still help us regularise the model as a side effect, similar to
    Batch Normalisation. I will cover this topic briefly.
  prefs: []
  type: TYPE_NORMAL
- en: In bagging, we randomly sample subsets of our dataset and then train separate
    models on these samples. Finally, we combine the separate results of each model
    to get one final result.
  prefs: []
  type: TYPE_NORMAL
- en: For example, in classification tasks, if we train 5 classifiers on 5 equal parts
    of our dataset, the result that occurs most often will be selected as the correct
    result. In regression problems, we would take the average of the predictions of
    all 5 models.
  prefs: []
  type: TYPE_NORMAL
- en: How does this play a role in regularisation? Since we are training the models
    on different slices of the dataset, each model sees a different part of the data.
    They don’t all catch on to noise or weird patterns in the data, instead, only
    some of them do.
  prefs: []
  type: TYPE_NORMAL
- en: When we average out the answers, we cancel out the random overfittings. This
    reduces variance, stabilising the model and indirectly preventing overfitting.
  prefs: []
  type: TYPE_NORMAL
- en: Boosting, on the other hand, learns by correcting mistakes step by step, improving
    weak models. Each model learns from the last model’s mistakes. Combined, they
    build a smarter final prediction.
  prefs: []
  type: TYPE_NORMAL
- en: This process reduces bias and is prone to overfitting if overdone. If we make
    sure to control that each step the model takes is small, then the model does not
    overfit.
  prefs: []
  type: TYPE_NORMAL
- en: A Quick Note on Underfitting
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now that we have a good idea about overfitting, on the other end of the spectrum,
    we have Underfitting.
  prefs: []
  type: TYPE_NORMAL
- en: I will cover this briefly since it is not this blog’s main topic or intent.
  prefs: []
  type: TYPE_NORMAL
- en: Underfitting is the effect of Bias, which is caused due to the model being too
    simple to capture the patterns in the data.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'The main causes of underfitting are:'
  prefs: []
  type: TYPE_NORMAL
- en: A very basic model (Eg, Using Simple Linear Regression on complex data)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Not enough training. If the model is not given enough time to understand the
    patterns in data, it will perform poorly, even if it is well capable of understanding
    the underlying trends in the data. It’s like telling a really smart person to
    prepare for the GRE in 2 days. Not enough.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Important features are not included in the data.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Too much regularisation. (Details covered in the Penalty-Based Regularisation
    section)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: So that should tell you that to deal with underfitting, the first thing you
    should think of doing is to get a more complex model. Perhaps using polynomial
    regression on the data you were struggling with when using simple linear regression?
  prefs: []
  type: TYPE_NORMAL
- en: You may also want to try out more training epochs / different learning rates,
    which are hyperparameters that you could experiment with.
  prefs: []
  type: TYPE_NORMAL
- en: Although keep in mind that this won’t be any good if your model is too simple
    in the first place.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Ultimately, Regularisation is about bringing balance between overfitting and
    underfitting. In this blog, we explored not only the intuitions but also the mathematical
    and practical implementations of many regularisation techniques.
  prefs: []
  type: TYPE_NORMAL
- en: While some methods, like L1 and L2, directly regularise through penalties, some
    introduce regularisation by introducing randomness into the model.
  prefs: []
  type: TYPE_NORMAL
- en: No matter the size and complexity of your model, it is quite important that
    you understand the why behind these techniques, so you are not just clicking buttons
    but are effectively selecting the correct regularisation techniques.
  prefs: []
  type: TYPE_NORMAL
- en: It is important to note that this is not an exhaustive guide as the field of
    AI continues to grow exponentially. The goal of this blog was to illuminate the
    core techniques and to encourage you to use them in your models.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
