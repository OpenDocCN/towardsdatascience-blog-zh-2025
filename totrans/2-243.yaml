  - PREF_UL
  type: TYPE_NORMAL
- en: Some exposure to optimisation
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This blog covers basic implementations of the regularisation topics.
  prefs: []
  type: TYPE_NORMAL
- en: To follow along and try the code while reading, you can find the complete implementation
    in this [GitHub Repository](https://github.com/souravmohile/regularisation-blog).
  prefs: []
