- en: Estimating Disease Rates Without Diagnosis
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 无诊断估计疾病率
- en: 原文：[https://towardsdatascience.com/estimating-disease-rates-without-diagnosis/](https://towardsdatascience.com/estimating-disease-rates-without-diagnosis/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://towardsdatascience.com/estimating-disease-rates-without-diagnosis/](https://towardsdatascience.com/estimating-disease-rates-without-diagnosis/)'
- en: <mdspan datatext="el1752704582718" class="mdspan-comment">The HLA immune</mdspan>
    genes are so important for triggering the immune system, that we can use these
    genes to predict a person’s immune response. Here I will demonstrate how to estimate
    disease rates just from immune gene frequencies. All the steps from getting the
    immune gene data, to identifying high risk countries, and assessing limitations
    of the model are discussed and the full code is available at [github.com/DAWells/HLA_spondylitis_rate](https://github.com/DAWells/HLA_spondylitis_rate).
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1752704582718" class="mdspan-comment">HLA 免疫基因</mdspan>对于触发免疫系统至关重要，以至于我们可以利用这些基因来预测一个人的免疫反应。在这里，我将演示如何仅从免疫基因频率中估计疾病率。从获取免疫基因数据，到识别高风险国家，以及评估模型局限性，所有步骤都进行了讨论，完整代码可在[github.com/DAWells/HLA_spondylitis_rate](https://github.com/DAWells/HLA_spondylitis_rate)找到。
- en: HLA genes are associated with a person’s response to infection, vaccination,
    and often very strongly linked to autoimmune diseases. So strongly linked in fact,
    that in large groups we can predict disease rates from HLA gene frequencies. HLA
    frequencies are widely studied and so often available, allowing us to estimate
    rates of autoimmune conditions which may be missing or inaccurate due to the challenges
    of diagnosis. In this post we’ll combine studies to generate accurate estimates
    of immune gene frequencies and use these to predict national rates of ankylosing
    spondylitis.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: HLA基因与一个人的感染、疫苗接种反应有关，并且通常与自身免疫疾病非常紧密地相关。事实上，在大型群体中，我们可以从HLA基因频率中预测疾病率。HLA频率被广泛研究，并且通常可用，这使得我们可以估计可能因诊断挑战而缺失或不准确的自身免疫状况的比率。在这篇文章中，我们将结合研究以生成免疫基因频率的准确估计，并使用这些估计来预测脊柱强直性脊柱炎的国家比率。
- en: '[allelefrequencies.net](http://allelefrequencies.net/) is a database of human
    immune gene frequency data from across the world which is an open access, free
    and public resource (Gonzalez-Galarza et al 2020). However, it can be difficult
    to download and combine data from multiple projects; this makes it hard to take
    advantage of all this data. Luckily [`HLAfreq`](https://barinthusbio.github.io/HLAfreq/HLAfreq.html)
    is a python package which makes it easy to get the latest data from allelefrequencies.net
    and prepare them for our analysis. (Full disclosure, I am one of the authors of
    HLAfreq!).'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: '[allelefrequencies.net](http://allelefrequencies.net/)是一个全球人类免疫基因频率数据库，它是一个开放获取、免费且公共的资源（Gonzalez-Galarza
    等人，2020年）。然而，从多个项目中下载和合并数据可能很困难；这使得很难充分利用这些数据。幸运的是，`HLAfreq`是一个Python包，它使得从allelefrequencies.net获取最新数据并为我们分析做准备变得容易。（完全披露，我是HLAfreq的作者之一！）'
- en: Ankylosing spondylitis is a form of arthritis, and 90% of patients have a specific
    version of the HLA B gene. To get the frequency of this version in different countries,
    I downloaded all available frequency for this gene and combined studies of the
    same country, weighting by sample size. In brief, the combination is based on
    the Dirichlet distribution and we can use a Bayesian approach to estimate uncertainty
    too. Singapore is used as an example in the figure below (all figures in this
    article are generated by the author). Different HLA-B gene versions (also known
    as alleles) are shown on the y axis, with their frequency in Singapore on the
    x axis. Data from the original Singapore studies are shown in colour, and combined
    estimates in black. I focused on the weighted average in this analysis, which
    is shown by the black circles. HLAfreq also calculates a Bayesian estimate with
    uncertainty which is indicated by the black bars.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 脊柱强直性脊柱炎是一种关节炎，90%的患者有一种特定的HLA B基因版本。为了获取这种版本在不同国家的频率，我下载了所有可用的基因频率，并合并了同一国家的相同研究，按样本大小进行加权。简而言之，组合基于Dirichlet分布，我们可以使用贝叶斯方法来估计不确定性。以下图中的新加坡被用作示例（本文中的所有图表均由作者生成）。y轴上显示了不同的HLA-B基因版本（也称为等位基因），x轴上显示了新加坡的频率。原始新加坡研究的数据以颜色显示，合并估计以黑色显示。我在此分析中关注加权平均值，用黑色圆圈表示。HLAfreq还计算了一个带有不确定性的贝叶斯估计，用黑色条形表示。
- en: '![](../Images/3fbc20aa6a418f3a71c4d975e1f79f30.png)'
  id: totrans-6
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/3fbc20aa6a418f3a71c4d975e1f79f30.png)'
- en: Frequncy of HLA-B alleles in Singapore. Each individual study has its own colour.
    Black shows the combined estimate with uncertainty.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 新加坡HLA-B等位基因的频率。每个独立研究的颜色各不相同。黑色表示带有不确定性的综合估计。
- en: The code used to download, combine, and plot the HLA-B allele frequency data
    for Singapore is below.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是用以下载、合并和绘制新加坡HLA-B等位基因频率数据的代码。
- en: '[PRE0]'
  id: totrans-9
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Now we have the national allele frequencies we can pair them with national disease
    rates to study the correlation. I have used the disease rates reported in Dean
    et al 2014\. I log transformed the disease rate to make it normally distributed
    so I could fit an ordinary least squares linear regression. As expected, there
    was a significant positive correlation; countries with higher frequencies of HLA-B*27
    had higher rates of ankylosing spondylitis. The exception to this was Finland
    which had an unusually high frequency of HLA-B*27 but a middling rate of disease.
    I removed Finland from the model as an outlier, a decision which was supported
    by “statistical leverage”. (Leverage means this one point had too large an influence
    on the overall model; we want the model to tell us about countries in general
    not any one country in particular).
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们有了国家的等位基因频率，我们可以将它们与国家的疾病率配对来研究相关性。我使用了Dean等人2014年报告的疾病率。我将疾病率进行了对数转换，使其呈正态分布，以便我可以拟合普通最小二乘线性回归。正如预期的那样，存在显著的正相关；HLA-B*27频率较高的国家，强直性脊柱炎的发病率也较高。芬兰是个例外，它HLA-B*27的频率异常高，但疾病率却处于中等水平。我将芬兰从模型中移除，作为一个异常值，这个决定得到了“统计杠杆”的支持。（杠杆意味着这个点对整体模型的影响太大；我们希望模型告诉我们关于国家的一般情况，而不是特定国家的任何情况）。
- en: We can use our linear regression model to predict rates of ankylosing spondylitis
    in countries where we know the HLA-B*27 frequency. This tells us that countries
    like Austria and Croatia have high predicted ankylosing spondylitis rates. Using
    these predictions increases the number of countries with disease rate estimates
    from 16 to 52 and can help identify countries that could benefit from additional
    surveillance. In the world map below, countries with low known or predicted rates
    of ankylosing spondylitis are plotted in blue and high rates in yellow. Countries
    with known rates are outlined in black and those with predicted rates are outlined
    in cyan or orange. Cyan is used for countries in the range of our model and orange
    is used for countries outside our model’s range, see below for why this is important.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以使用我们的线性回归模型来预测已知HLA-B*27频率的国家强直性脊柱炎的发病率。这告诉我们，像奥地利和克罗地亚这样的国家预测的强直性脊柱炎发病率很高。使用这些预测将使有疾病率估计的国家数量从16个增加到52个，并有助于确定可能从额外监测中受益的国家。在下面的世界地图中，强直性脊柱炎已知或预测的发病率低的国家用蓝色表示，高发病率的国家用黄色表示。已知发病率的国家的轮廓用黑色表示，预测发病率的国家的轮廓用青色或橙色表示。青色用于我们模型范围内的国家，橙色用于我们模型范围外的国家，下面将解释为什么这很重要。
- en: '![](../Images/703ac8f9c77407e331be269e1b428e3f.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/703ac8f9c77407e331be269e1b428e3f.png)'
- en: Known or predicted rate of ankylosing spondylitis by country. Countries with
    black outlines have known rates, cyan outlines have predicted rates, orange outlines
    have predicted rates with unusual HLA-B*27 frequencies.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 按国家已知的或预测的强直性脊柱炎发病率。有黑色轮廓的国家有已知的发病率，青色轮廓的国家有预测的发病率，橙色轮廓的国家有异常HLA-B*27频率的预测发病率。
- en: We should be cautious about predicting disease rates for countries with HLA-B*27
    rates outside of the range of our model. Of the 36 countries we have predicted
    disease rates for, 10 have HLA-B*27 frequencies higher or lower than any country
    we used in our model. Therefore, we can’t be sure the model will give accurate
    predictions for these countries. In particular, predictions may be unreliable
    for countries with high HLA-B*27 rates, we already know that Finland did not fit
    our model. This could be because of a non-linear trend but we do not have enough
    data to explore these high frequencies.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 我们应该谨慎预测HLA-B*27频率超出我们模型范围的国家疾病率。在36个我们预测疾病率的国家中，有10个国家的HLA-B*27频率高于或低于我们模型中使用的任何国家。因此，我们无法确定模型将为这些国家提供准确的预测。特别是，对于HLA-B*27频率高的国家，预测可能不可靠，我们已经知道芬兰不符合我们的模型。这可能是因为非线性趋势，但我们没有足够的数据来探索这些高频。
- en: '![](../Images/30a41dce150cc1e5c65c3aef18b05c33.png)'
  id: totrans-15
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/30a41dce150cc1e5c65c3aef18b05c33.png)'
- en: Correlation between HLA-B*27 frequency and rate of ankylosing spondylitis. Black
    points are countries with known rates. Predicted rates are cyan and orange circles;
    orange for countries with unusual HLA-B*27 frequencies. The outlier Finland is
    in red.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: HLA-B*27频率与强直性脊柱炎发生率之间的相关性。黑色点是已知发生率的各国。预测率以青色和橙色圆圈表示；橙色代表具有不寻常HLA-B*27频率的国家。异常值芬兰用红色表示。
- en: 'The countries with known disease rates are plotted with filled points. Finland
    which was omitted from the model is plotted in red. The predicted disease rates
    are plotted as open circles, cyan for countries in the model’s range and orange
    outside of it. The confidence intervals of the model are shown as dashed lines,
    and the prediction intervals are shown as a grey ribbon. A quick reminder about
    the difference: we expect the true relationship to fall within the confidence
    intervals 95% of the time, and we expect 95% of data points to fall within the
    prediction intervals.'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 已知疾病发生率的各国以实心点表示。被模型排除的芬兰用红色表示。预测的疾病发生率以空心圆圈表示，青色代表模型范围内的国家，橙色代表模型范围外的国家。模型的置信区间以虚线表示，预测区间以灰色带表示。快速提醒一下差异：我们预计95%的时间，真实关系将落在置信区间内，我们预计95%的数据点将落在预测区间内。
- en: It’s worth taking a moment to remind ourselves that despite this correlation,
    there are many other factors influencing disease rates. Obviously an individual’s
    chance of developing ankylosing spondylitis is also impacted by their environment
    and other genetic factors. So if we wanted really accurate disease rate predictions
    we would need consider these other variables. But given how easy it is to get
    HLA frequency data, it’s a pretty impressive predictor for a disease that can
    take years to diagnose.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 值得花点时间提醒自己，尽管存在这种相关性，但还有许多其他因素影响着疾病发生率。显然，个体患强直性脊柱炎的机会也受到其环境和遗传因素等其他因素的影响。因此，如果我们想要真正准确的疾病发生率预测，我们就需要考虑这些其他变量。但鉴于获取HLA频率数据如此容易，对于一种可能需要数年才能诊断的疾病来说，它是一个相当令人印象深刻的预测因子。
- en: Conclusion
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: HLA genes have a strong impact on human health through infection, vaccination,
    autoimmune diseases, and organ transplants. Because of these strong relationships,
    we can use widely available HLA frequency data to study these health traits indirectly.
    Resources like [allelefrequency.net](http://allelefrequencies.net/) and [HLAfreq](https://barinthusbio.github.io/HLAfreq/HLAfreq.html)
    make it easier to study these relationships, either by looking at these correlations
    directly or using allele frequencies as a proxy when other data is missing. I
    hope this post has got you thinking about questions to ask using HLA frequency
    data.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: HLA基因通过感染、疫苗接种、自身免疫性疾病和器官移植对人类健康产生强烈影响。由于这些强烈的关系，我们可以使用广泛可用的HLA频率数据间接研究这些健康特征。[allelefrequency.net](http://allelefrequencies.net/)和[HLAfreq](https://barinthusbio.github.io/HLAfreq/HLAfreq.html)等资源使得研究这些关系更加容易，无论是直接查看这些相关性，还是当其他数据缺失时使用等位基因频率作为代理。我希望这篇帖子能让你开始思考使用HLA频率数据可以提出的问题。
