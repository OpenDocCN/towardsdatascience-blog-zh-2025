- en: How to Implement Randomization with the Python Random Module
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/implementing-randomisation-with-the-python-random-module/](https://towardsdatascience.com/implementing-randomisation-with-the-python-random-module/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1764015159330" class="mdspan-comment">Introduction</mdspan>
    to Randomisation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In our day-to-day life, we come across several different phenomena that are
    totally random. The weather is random: sure, we can forecast and predict the weather,
    but to a certain degree only. Radioactive decay is also an interesting random
    process that lacks patterns and predictability. Unlike computers that are deterministic
    and function the way they are programmed, nature does not require any programming,
    conditionals, or loops. Things happen in the most random and unpredictable ways,
    and this is the kind of unpredictability that we also sometimes require in our
    computers and applications, such as games.'
  prefs: []
  type: TYPE_NORMAL
- en: We need randomness and unpredictability in the games that we play so that we
    do not get bored of the preprogrammed scenarios and predictable challenges. We
    also need the element of randomness in simulating real-world scenarios, testing
    algorithms, or generating sample datasets.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/bf923912b8123a493ed51f2420689e5f.png)'
  prefs: []
  type: TYPE_IMG
- en: Photo by [Wolfgang Hasselmann](https://unsplash.com/@wolfgang_hasselmann?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText)
    on [Unsplash](https://unsplash.com/photos/blue-sky-and-white-clouds-over-lake-bR_-gllg7Bs?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText)
  prefs: []
  type: TYPE_NORMAL
- en: In programming languages, randomisation refers to introducing unpredictability
    and variability in the computer’s output. Randomness is generated in a program
    through random numbers.
  prefs: []
  type: TYPE_NORMAL
- en: There are several methods for generating pseudo-random numbers. Python uses
    the Mersenne Twister for randomness in its random module. While extensively used
    as a Pseudo-Random Number Generator (PRNG), the Mersenne Twister has deterministic
    properties, making it unsafe for certain tasks that requires safety as a priority.
    In programming, generating a totally random number is quite difficult, so we make
    use of the concept of generating the pseudo-random numbers, although they are
    reproducible if given a seed value, as can be seen ahead.
  prefs: []
  type: TYPE_NORMAL
- en: In this article, we will explore the concept of randomisation by employing the
    Python random module to generate randomness in our code’s outputs.
  prefs: []
  type: TYPE_NORMAL
- en: The Python Random Module
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Now let us deep dive into the random module. Firstly, we know that randomness
    in this module is generated by the Mersenne Twister using Mersenne Primes. This
    built-in module of Python allows us to generate randomness in our code in a variety
    of ways and provides flexibility while we work with different datatypes. Let us
    understand its functions through examples. You can access the official documentation
    of this module via the following link:'
  prefs: []
  type: TYPE_NORMAL
- en: '[`random` — Generate pseudo-random numbers](https://docs.python.org/3/library/random.html)'
  prefs: []
  type: TYPE_NORMAL
- en: 'In order to use the random module, we need to make sure to import it in our
    code first:'
  prefs: []
  type: TYPE_NORMAL
