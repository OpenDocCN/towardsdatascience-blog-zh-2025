  - PREF_OL
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '![Photo by Piron Guillaume on Unsplash](../Images/6b27767f0356c3598888a446b77e2aaa.png)'
  prefs: []
  type: TYPE_IMG
- en: Photo by [Piron Guillaume](https://unsplash.com/@gpiron?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on [Unsplash](https://unsplash.com/photos/medical-professionals-working-U4FyCp3-KzY?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
  prefs: []
  type: TYPE_NORMAL
- en: Understanding Data Scarcity & Imbalance
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Machine learning, especially deep learning, thrives on having large datasets
    to work with. Without enough data, these models struggle to learn patterns effectively
    – particularly those rare, critical patterns (which I’ll get into shortly).
  prefs: []
  type: TYPE_NORMAL
- en: 'But here’s the reality: collecting the extensive datasets we need is often
    **EXTREMELY** challenging, especially when dealing with newer systems or components
    that lack historical data.'
  prefs: []
  type: TYPE_NORMAL
- en: Now, some of you might be wondering…
  prefs: []
  type: TYPE_NORMAL
- en: Why Data Scarcity and Imbalance Matter?
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: It’s simple – these challenges have a major impact on a model’s ability to predict
    and prevent critical events. I’ll convince you with a couple of examples to show
    why addressing these issues is so important, before diving into the techniques
    (the highlight of this article) we can use to solve them!
  prefs: []
  type: TYPE_NORMAL
- en: '**Healthcare Example: Lymphatic Cancer**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In healthcare, collecting sufficient data is inherently difficult, and the data
    that is available is often imbalanced.
  prefs: []
  type: TYPE_NORMAL
- en: Can you guess why?
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**For instance, consider lymphatic cancer.** Data collection for such rare
    diseases is limited for several reasons:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Privacy concerns:** Access to sensitive patient information is restricted,
    limiting the pool of data.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Disease rarity:** Rare diseases naturally yield fewer data points compared
    to more common conditions.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: As a result, datasets are often dominated by healthy cases, leading to imbalanced
    data. When datasets are imbalanced – dominated by one class over another – models
    tend to favor the majority class. This might mean that a diagnostic model trained
    on such data might disproportionately predict "healthy," leading to missed diagnoses.
    As you may be able to imagine, that is an outcome that may have severe consequences
    in a healthcare setting.
  prefs: []
  type: TYPE_NORMAL
- en: '**Industrial Example: Nuclear Power Plants**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The industrial sector faces similar issues. Take nuclear power plants, where
    data on equipment failures is crucial for predictive maintenance. These failures
    are rare (thank goodness!) but that rarity makes it hard to accumulate a robust
    dataset for training models.
  prefs: []
  type: TYPE_NORMAL
- en: Understanding patterns that might indicate equipment failure is vital for avoiding
    costly downtime. Yet the scarcity of failure data means that gathering enough
    information to train effective models takes a significant amount of time, if it’s
    even possible at all.
  prefs: []
  type: TYPE_NORMAL
- en: For instance, a study by Ali Hakami published in *Nature* analyzed production
    plant data with a Kaggle dataset **showing a healthy-to-failure observation ratio
    of 28,552:1**. This staggering imbalance really shows how difficult it is to develop
    reliable predictive models for real-world applications where failure data is so
    limited.
  prefs: []
  type: TYPE_NORMAL
- en: '**How Can We Address These Challenges?**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Waiting for more data isn’t always feasible, it’s costly and time-consuming.
    Make sense right? We don’t want to wait around years collecting data when we need
    an immediate solution. However, simply duplicating existing data also won’t help,
    as it doesn’t introduce new information and may lead to overfitting.
  prefs: []
  type: TYPE_NORMAL
- en: Instead, what if we generate *synthetic data or otherwise called "data augmentation"*.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: You may have heard "data augmentation," right? Data augmentation is simply creating
    new, artificial data points using existing data. By creating artificial data points
    based on the patterns in existing data, we can address gaps caused by scarcity
    and imbalance.
  prefs: []
  type: TYPE_NORMAL
- en: Enter GANs and SMOTE
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Generative Adversarial Networks (GANs) and Synthetic Minority Oversampling Technique
    (SMOTE) are two data augmentation techniques that help overcome these challenges.
    They enable the creation of new, realistic data points, reducing the reliance
    on costly data collection and improving model performance.
  prefs: []
  type: TYPE_NORMAL
- en: '**GANs:** Generate synthetic data by learning the distribution of the original
    dataset and creating new, realistic examples.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**SMOTE:** Focuses on oversampling by generating synthetic examples along the
    line segments connecting minority class samples.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: So let’s take a better look into these techniques!
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '![Generative Adversarial Network Flowchart](../Images/a006fd2c68259734bbee50ed3f53177e.png)'
  prefs: []
  type: TYPE_IMG
- en: Generative Adversarial Network Flowchart
  prefs: []
  type: TYPE_NORMAL
- en: Introducing Generative Adversarial Networks (GANs)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '"Generating synthetic data" is exactly where **Generative Adversarial Networks
    (GANs)** come into play. GANs have gained significant attention across industries
    for their ability to address data scarcity by generating **synthetic data that
    closely mimics real datasets.**'
  prefs: []
  type: TYPE_NORMAL
- en: At a high level, **Generative Adversarial Networks (GANs)** are a machine learning
    framework designed to create new, synthetic data that closely resembles a given
    dataset. This capability is invaluable in situations where real-world data is
    limited, imbalanced, or hard to acquire.
  prefs: []
  type: TYPE_NORMAL
- en: 'GANs consist of two core components:'
  prefs: []
  type: TYPE_NORMAL
- en: '**The Generator**'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**The Discriminator**'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Each of these components have a very specific role.
  prefs: []
  type: TYPE_NORMAL
- en: 1\. The Generator
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The generator’s role is to produce synthetic data. It starts with random noise
    (a set of random values) as input and generates data samples that resemble the
    real data.
  prefs: []
  type: TYPE_NORMAL
- en: Initially, the generator produces nonsensical, random outputs. However, through
    iterative training, it refines its ability to create synthetic data that becomes
    increasingly indistinguishable from real-world data.
  prefs: []
  type: TYPE_NORMAL
- en: 2\. The Discriminator
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The discriminator acts as a simple binary (0, 1) classifier. It is trained to
    distinguish between real data from the training set and fake data produced by
    the generator.
  prefs: []
  type: TYPE_NORMAL
- en: Its task is to correctly classify the input data as either "real" or "fake."
    As training progresses, the discriminator becomes increasingly adept at this classification
    task, sharpening its ability to differentiate between the two types of data.
  prefs: []
  type: TYPE_NORMAL
- en: This is where I might want to give you an example.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![Photo by George Bakos on Unsplash](../Images/536e1221d0183436a10d2f1c061e88bd.png)'
  prefs: []
  type: TYPE_IMG
- en: Photo by [George Bakos](https://unsplash.com/@georgebakos?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on [Unsplash](https://unsplash.com/photos/blue-and-white-round-container-83HwuZirc-c?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
  prefs: []
  type: TYPE_NORMAL
- en: A Bar-Themed Explanation of GANs
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I don’t know about you guys, but I like to go drink at a bar with my friends
    every now and then. Do you like drinking at bars? If you don’t well… unlucky because
    I’ll be using this setting as an analogy for understanding GANs.
  prefs: []
  type: TYPE_NORMAL
- en: '**Imagine a new bartender who is just learning the ropes.** At first, their
    drinks are poorly mixed and taste far from what you’d expect (random outputs).
    However, with guidance and feedback from a seasoned bartender, they gradually
    refine their skills. Over time, they master their craft and begin creating drinks
    that are indistinguishable from those made by experienced bartenders.'
  prefs: []
  type: TYPE_NORMAL
- en: '**In this scenario, the new bartender is like the generator in a GAN.**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Their job is to create something that can pass as real and convincing.
  prefs: []
  type: TYPE_NORMAL
- en: But as a customer, you wouldn’t want to pay for subpar drinks from a rookie,
    right? You’d prefer your money to go toward high-quality cocktails. So, how do
    you figure out if the bartender is a newbie or an expert?
  prefs: []
  type: TYPE_NORMAL
- en: That’s where the **discriminator comes in**.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Think of the discriminator as the bar’s loyal customer – you! Your job is to
    taste the drinks and decide whether they’re well-made (real) or a poor attempt
    (fake).
  prefs: []
  type: TYPE_NORMAL
- en: The generator (new bartender) and discriminator (you, the loyal customer) are
    constantly challenging each other. As the generator gets better at creating realistic
    drinks, the discriminator has to work harder to tell the difference. This playful
    back-and-forth is what makes GANs so effective.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: The Generator and Discriminator’s love-hate relationship
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Like mentioned in the example, the brilliance of GANs lies in their adversarial
    training process, which sets up a dynamic "game" between the generator and the
    discriminator.
  prefs: []
  type: TYPE_NORMAL
- en: '**Think of it as a playful rivalry:** the generator acts like a rookie bartender
    trying to pass off its creations as expertly crafted drinks, while the discriminator
    is the seasoned cocktail connoisseur determined to spot any flaws and call out
    the impostor.'
  prefs: []
  type: TYPE_NORMAL
- en: '**The generator’s objective** is to produce synthetic data convincing enough
    to deceive the discriminator.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**The discriminator’s mission** is to distinguish between real and fake data
    with precision.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**As this game unfolds**, the generator continuously improves its ability to
    create realistic data, while the discriminator becomes increasingly skilled at
    identifying what’s genuine and what’s not. This iterative process continues until
    the synthetic data generated is virtually indistinguishable from the real dataset,
    achieving a fine balance between the two adversaries!'
  prefs: []
  type: TYPE_NORMAL
- en: GANs in Action
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In predictive maintenance (like the powerplant), GANs can generate synthetic
    failure data for equipment, allowing models to learn failure patterns even when
    real failure data is scarce. Similarly, in healthcare, GANs can create synthetic
    patient data that mimics rare disease cases, helping to address imbalances in
    datasets.
  prefs: []
  type: TYPE_NORMAL
- en: Pretty cool, right? As I refreshed myself on this concept (while preparing for
    this article), it reminded me of how interesting some of these technical concepts
    were when I first studied them.
  prefs: []
  type: TYPE_NORMAL
- en: But enough about GANs.
  prefs: []
  type: TYPE_NORMAL
- en: What about some other possible techniques or frameworks?
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '![SMOTE Technique Mechanism](../Images/985e89de8d8ca9caacda0cc8957a4183.png)'
  prefs: []
  type: TYPE_IMG
- en: SMOTE Technique Mechanism
  prefs: []
  type: TYPE_NORMAL
- en: Introducing Synthetic Minority Over-sampling Technique (SMOTE)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Like Generative Adversarial Networks (GANs), **SMOTE (Synthetic Minority Over-sampling
    Technique)** is also a popular method used to address the problem of imbalanced
    datasets by generating new, synthetic samples.
  prefs: []
  type: TYPE_NORMAL
- en: SMOTE creates new data points for the minority class using a process called
    **interpolation (**Don’t let the term scare you, though it’s likely familiar to
    many of you). Interpolation simply means comparing data points that are close
    to each other and generating new data based on their characteristics.
  prefs: []
  type: TYPE_NORMAL
- en: Okay, that sentence actually probably defined what SMOTE does. But I know that
    single definition isn’t satisfactory, so I’ll give a concrete example followed
    by a technical explanation.
  prefs: []
  type: TYPE_NORMAL
- en: '![Photo by Ivan Cortez on Unsplash](../Images/201b545be8879801f1a1263d55e413c6.png)'
  prefs: []
  type: TYPE_IMG
- en: Photo by [Ivan Cortez](https://unsplash.com/@ivancortez14?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on [Unsplash](https://unsplash.com/photos/bartender-mixing-tequila-on-table-2FDstXKqaxI?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
  prefs: []
  type: TYPE_NORMAL
- en: How SMOTE Works (as a bartender)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Imagine you’re a bartender.** You’ve noticed that customers overwhelmingly
    order one drink say a "healthy drink of rum with some kale" (what an unusual choice)
    and only a few order a rare specialty drink (let’s call it "lymphatic cancer cocktail").
    You want to create more variations of the rare drink to promote it and balance
    the menu.'
  prefs: []
  type: TYPE_NORMAL
- en: Here’s what you do
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Choose a Minority Sample**: Start with one recipe for the rare drink.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Find Nearest Neighbors**: Look at the ingredients of similar specialty drinks.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Generate Synthetic Variations**: Mix and match proportions of the ingredients
    from your recipe and its neighbors to create new, unique variations of the rare
    drink.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Repeat**: Keep creating variations until the menu is balanced with both common
    and rare options.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**The rare options aren’t so rare anymore after this!** This is exactly what
    you want to have happen with SMOTE.'
  prefs: []
  type: TYPE_NORMAL
- en: How SMOTE works (technically)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As you’ve seen in the example with bartenders, it’s pretty easy to see how SMOTE
    works. It’s separated into four quick and intuitive steps.
  prefs: []
  type: TYPE_NORMAL
- en: '**1\. Choose a Minority Class Sample**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This is quite simple. Start by randomly selecting a data point from the minority
    class.
  prefs: []
  type: TYPE_NORMAL
- en: 2\. **Find Nearest Neighbors**
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Essentially, you want to look at the entire data and identify the k-nearest
    neighbors of the selected sample (we call this the feature space). Typically,
    k is set to 5, but this can be adjusted based on your dataset and model requirements!
  prefs: []
  type: TYPE_NORMAL
- en: '**3\. Generate Synthetic Samples**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Randomly pick one of the k-nearest neighbors. Using interpolation, create a
    new synthetic sample that lies between the selected sample and its neighbor.
  prefs: []
  type: TYPE_NORMAL
- en: '![An equation for the new sample](../Images/6256586b2531f40eecd4a44424c71d06.png)'
  prefs: []
  type: TYPE_IMG
- en: An equation for the new sample
  prefs: []
  type: TYPE_NORMAL
- en: You can think of xᵢ as the original minority sample and λ as a random number
    between 0 and 1.
  prefs: []
  type: TYPE_NORMAL
- en: 4\. Repeat
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Continue this process until the dataset achieves the desired balance between
    the majority and minority classes.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Why is SMOTE effective?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Okay if you held on this far, you might understand why SMOTE is so effective!
    To put it simply, it generates **new, meaningful data points** rather than simply
    duplicating existing ones.
  prefs: []
  type: TYPE_NORMAL
- en: Since duplicating data can cause a model to memorize patterns instead of learning
    them, SMOTE reduces this risk. Also by addressing data imbalance, SMOTE enables
    models to focus on minority class patterns, improving their ability to predict
    rare cases.
  prefs: []
  type: TYPE_NORMAL
- en: 'Example: Healthcare'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Consider a dataset on lymphatic cancer, where data for healthy patients far
    outweighs data for those with the disease. Using SMOTE, we can create synthetic
    patient profiles that closely mimic real-world cases of lymphatic cancer. These
    synthetic cases fill the gap in the dataset, allowing models to learn the subtle
    patterns associated with the disease and improving their prediction accuracy for
    rare conditions.
  prefs: []
  type: TYPE_NORMAL
- en: 'For instance, SMOTE might interpolate between two similar cancer cases:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Patient A: Age 60, Tumor Size 3.2 cm'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Patient B: Age 62, Tumor Size 3.5 cm'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'SMOTE could create a new synthetic patient:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Patient C: Age 61, Tumor Size 3.35 cm'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Example: Nuclear Power Plants'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In predictive maintenance, failures at nuclear power plants are thankfully rare.
    However, this rarity makes it difficult to train models on failure patterns. SMOTE
    addresses this by generating synthetic failure data based on existing failure
    records and their nearest neighbors.
  prefs: []
  type: TYPE_NORMAL
- en: 'For example, if we have two failure events:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Event A: Temperature Spike 500°C, Vibration Level 8.0'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Event B: Temperature Spike 520°C, Vibration Level 8.5'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'SMOTE might create a synthetic failure:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Event C: Temperature Spike 510°C, Vibration Level 8.25'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Limitations of SMOTE
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: However, while SMOTE is incredibly useful, it’s not without its challenges.
    I’ll make a brief note of this to let you know that all frameworks and techniques
    have their own unique limitations. For SMOTE, it’s very obvious.
  prefs: []
  type: TYPE_NORMAL
- en: '**Computationally Expensive**: For large datasets, finding k-nearest neighbors
    can become time-intensive, slowing down the process.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Class Boundary Issues**: SMOTE generates synthetic samples without considering
    the boundaries between classes. This can sometimes lead to overlap or samples
    in irrelevant regions, reducing the model’s effectiveness.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: For those interested in a simple python implementation, here you go!
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Like I mentioned at the start of my article, this was to give you an introduction
    and a better understanding of how you can addressing data scarcity and imbalance.
  prefs: []
  type: TYPE_NORMAL
- en: While it’s not perfect, understanding when and how to use GANs or SMOTE effectively
    can make a huge difference in building models that generalize well and perform
    reliably.
  prefs: []
  type: TYPE_NORMAL
- en: So there you have it! It’s one step towards learning more on how to deal with
    data!
