- en: Basics of GANs & SMOTE for Data Augmentation
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/overcoming-data-scarcity-imbalance-gans-smote-explained-through-bartending-6a868259b4d9/](https://towardsdatascience.com/overcoming-data-scarcity-imbalance-gans-smote-explained-through-bartending-6a868259b4d9/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![SMOTE Technique Mechanism](../Images/985e89de8d8ca9caacda0cc8957a4183.png)'
  prefs: []
  type: TYPE_IMG
- en: SMOTE Technique Mechanism
  prefs: []
  type: TYPE_NORMAL
- en: 'If you are not a paid member on Medium, I make my stories available for free:
    [Friends link](https://medium.com/@sahn1998/overcoming-data-scarcity-imbalance-gans-smote-explained-through-bartending-6a868259b4d9?sk=310b68e2bdc3beefca4bd0ef46b95136)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Personally, it feels like data is treated as the new oil of the digital age**.
    This feels especially true with the boom in machine learning, where data plays
    such an important role.'
  prefs: []
  type: TYPE_NORMAL
- en: However in my experience, it also seems like many people dive straight into
    machine learning without first mastering the underlying mathematics. That’s why
    I’ve made it a point to focus on mathematical concepts in my articles. However,
    as many readers have pointed out, it can be even more effective to learn math
    alongside machine learning. Applying mathematical principles in practical machine
    learning scenarios not only deepens understanding of the math, but also makes
    the learning process more engaging and effective.
  prefs: []
  type: TYPE_NORMAL
- en: And what better way to introduce machine learning than by talking about data
    – lots of data! (Or the lack of it, as you’ll see.)
  prefs: []
  type: TYPE_NORMAL
- en: I’ve been a part of a research team focused on health risk-prediction modeling.
    While I’ll skip the detailed topics of our work, a major challenge we encountered
    – one that’s common across many machine learning projects – was dealing with **data
    scarcity and imbalance**
  prefs: []
  type: TYPE_NORMAL
- en: How do we exactly deal with this issue of data scarcity and data imbalance?
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'This is the exact question that I will look to answer in this article by explaining
    two machine learning techniques: **Generative Adversarial Networks (GANs)** and
    the **Synthetic Minority Over-sampling Technique (SMOTE)**.'
  prefs: []
  type: TYPE_NORMAL
- en: '*This is a very basic topic for those who are just starting off learning about
    data with machine learning.* However, whether you’re new to data science or looking
    to refresh your understanding of foundational techniques, I hope this article
    has something for you!'
  prefs: []
  type: TYPE_NORMAL
- en: '*If you are only interested in GANs and SMOTE, please skip to section 2!*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Table of Contents
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Understanding Data Scarcity & Imbalance
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
