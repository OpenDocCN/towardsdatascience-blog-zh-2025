- en: STATISTICS
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Water Cooler Small Talk, Ep 6: Fraud Detection with Benford’s Law'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '![Image created by the author using GPT-4 / All other images created by the
    author unless specified otherwise](../Images/a62bd0327291c6f006339eb33772f4bd.png)'
  prefs: []
  type: TYPE_IMG
- en: Image created by the author using GPT-4 / All other images created by the author
    unless specified otherwise
  prefs: []
