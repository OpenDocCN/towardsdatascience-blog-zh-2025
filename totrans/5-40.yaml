- en: Ever heard a co-worker confidently declaring something like “*[The longer I
    lose at roulette, the closer I am to winning?](https://contributor.insightmediagroup.io/water-cooler-small-talk-gamblers-fallacy-and-ruin-3f882707fd19)*”
    Or had a boss that demanded you to not overcomplicate things and provide “*just
    one number*“, ignoring your attempts to explain why such a number doesn’t exist?
    Maybe you’ve even shared birthdays with a colleague, and everyone in office commented
    on [what a bizarre cosmic coincidence](https://contributor.insightmediagroup.io/water-cooler-small-talk-the-birthday-paradox-94ea294502c7)
    it must be.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 你有没有听说过同事自信地宣称“*[我越在轮盘赌上输得越多，我离赢就越近？](https://contributor.insightmediagroup.io/water-cooler-small-talk-gamblers-fallacy-and-ruin-3f882707fd19)*”
    或者有老板要求你不要把事情复杂化，只提供“*一个数字*”，而忽略你解释为什么这样的数字不存在的尝试？也许你甚至和同事分享过生日，办公室里的每个人都对[这必须是一个奇怪的宇宙巧合](https://contributor.insightmediagroup.io/water-cooler-small-talk-the-birthday-paradox-94ea294502c7)发表评论。
- en: These moments are typical examples of water cooler small talk – a special kind
    of small talk, thriving around break rooms, coffee machines, and of course, water
    coolers. It is where employees share all kinds of corporate gossip, myths, and
    legends, inaccurate scientific opinions, outrageous personal anecdotes, or outright
    lies. Anything goes. So, in my *[Water Cooler Small Talk](https://medium.com/@m.mouschoutzi/list/water-cooler-small-talk-dea705848095)*
    posts, I discuss strange and usually scientifically invalid opinions I have overheard
    in office, and explore what’s really going on.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 这些时刻是典型的水壶旁闲聊例子——一种特殊的小谈话，在休息室、咖啡机和当然，水壶旁盛行。这是员工分享各种公司八卦、神话和传说、不准确的科学观点、令人震惊的个人轶事或直接谎言的地方。什么都可以。所以，在我的*[Water
    Cooler Small Talk](https://medium.com/@m.mouschoutzi/list/water-cooler-small-talk-dea705848095)*帖子中，我讨论了我在办公室听到的奇怪且通常科学上无效的观点，并探讨了真正发生的事情。
- en: '*🍨* **[DataCream](https://datacream.substack.com/)** is a newsletter offering
    data-driven articles and perspectives on data, tech, AI, and ML. If you are interested
    in these topics subscribe **[here](https://datacream.substack.com/)**.'
  id: totrans-8
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*🍨* **[DataCream](https://datacream.substack.com/)** 是一份提供数据驱动文章和数据、技术、人工智能和机器学习观点的通讯。如果你对这些主题感兴趣，请**[订阅这里](https://datacream.substack.com/)**。'
