- en: 'Today’s water cooler moment comes from a curious observation about invoices:'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 今天的水壶旁时刻来自对发票的一个好奇观察：
- en: I was going through last month’s invoices, and it’s weird – so many of them
    start with a 1 or 2\. That’s just random, right?
  id: totrans-11
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我正在查看上个月的发票，这很奇怪——其中很多都是以1或2开头的。这仅仅是随机的，对吧？
- en: Nope, it’s not random. 🙃
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 不，这不是随机的。🙃
- en: In fact, the distribution of first digits in many naturally occurring datasets
    follows a phenomenon called Benford’s Law.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 事实上，许多自然发生的数据集中首位数字的分布遵循一种称为本福特定律的现象。
- en: '[**Maria Mouschoutzi, PhD – Medium**](https://medium.com/@m.mouschoutzi)'
  id: totrans-14
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[**Maria Mouschoutzi, PhD – Medium**](https://medium.com/@m.mouschoutzi)'
- en: '* * *'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: What about Benford’s Law?
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 那么，本福特定律是什么呢？
- en: '[Benford’s Law](https://en.wikipedia.org/wiki/Benford%27s_law) refers to the
    observation that in many naturally occurring datasets the leading digit is much
    more likely to be a 1 than a 9\. In particular, it provides a formula for the
    expected distribution of first digits in natural datasets, as well as, makes some
    predictions about the distribution of second digits, third digits, digit combinations,
    and so on. On the contrary, assigned and fabricated numbers, such as telephone
    numbers or fabricated financial statements, [usually don’t conform to Benford’s
    Law](https://www.researchgate.net/publication/254300534_Digital_Analysis_Using_Benford''s_Law_Tests_and_Statistics_for_Auditors).'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: '[本福德定律](https://en.wikipedia.org/wiki/Benford%27s_law)指的是在许多自然发生的数据集中，首位数字更可能是1而不是9的观察结果。特别是，它提供了一个自然数据集中首位数字预期分布的公式，以及关于第二位数字、第三位数字、数字组合等的预测。相反，分配和编造的数字，如电话号码或编造的财务报表，[通常不符合本福德定律](https://www.researchgate.net/publication/254300534_Digital_Analysis_Using_Benford''s_Law_Tests_and_Statistics_for_Auditors)。'
- en: The law is named after physicist [Frank Benford](https://en.wikipedia.org/wiki/Frank_Benford),
    who explained it in his 1938 article *‘[The Law of Anomalous Numbers](https://ui.adsabs.harvard.edu/abs/1938PAPhS..78..551B/abstract)‘.*
    Nonetheless, Benford was not the first person to make this observation – [Simon
    Newcomb](https://en.wikipedia.org/wiki/Simon_Newcomb) had previously stated the
    law in 1881, thus the law is also referred to as the Newcomb–Benford law. More
    specifically, Newcomb noticed that early pages of logarithmic tables, which corresponded
    to numbers beginning with 1, were noticeably dirtier and more frequently used
    than later pages containing numbers with larger leading digits. Notably, [he did
    publish the correct distribution](https://www.jstor.org/stable/2369148?seq=1).
    Later on, Benford demonstrated the law’s applicability across a wide range of
    datasets.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 这条定律是以物理学家[弗兰克·本福德](https://en.wikipedia.org/wiki/Frank_Benford)的名字命名的，他在1938年的文章*‘[异常数字定律](https://ui.adsabs.harvard.edu/abs/1938PAPhS..78..551B/abstract)‘*中对其进行了阐述。然而，本福德并不是第一个做出这一观察的人——[西蒙·纽科姆](https://en.wikipedia.org/wiki/Simon_Newcomb)早在1881年就提出了这一定律，因此这条定律也被称为纽科姆-本福德定律。更具体地说，纽科姆注意到，对数表的前几页，即以1开头的数字，比后面包含较大首位的数字的页码明显更脏、更频繁地被使用。值得注意的是，[他确实发表了正确的分布](https://www.jstor.org/stable/2369148?seq=1)。后来，本福德证明了这一定律在广泛的数据集中具有适用性。
- en: 'In particular, according to Benford’s Law the probability of each first digit
    *d* from 1 to 9 with base 10 is given by:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 特别是，根据本福德定律，每个首位数字*d*（从1到9）以10为基数出现的概率如下：
- en: '![](../Images/efa2df21e1afcfbc8a1f800213077f17.png)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/efa2df21e1afcfbc8a1f800213077f17.png)'
- en: Aww, how nice! 🤗 This formula results in a reverse logarithmic pattern – number
    1 is the leading digit about 30.1% of the time, while number 9 appears as the
    first digit in only 4.6% of cases. Although counterintuitive at first glance,
    this strange pattern holds true on a surprisingly large variety of datasets, ranging
    from stock prices to earthquake magnitudes, and from lengths of rivers to electricity
    bills. This phenomenon is scale-invariant, meaning the pattern remains consistent
    regardless of the unit of measurement, such as meters, kilometers, or miles. On
    top of this, the law only applies to datasets that span several orders of magnitude
    – amounts that are bound within a limited range, like human height or exam scores,
    don’t comply to Benford’s Law.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 哇，多好啊！🤗这个公式产生了一个反对数模式——数字1大约有30.1%的时间作为首位数字，而数字9只在4.6%的情况下作为首位数字出现。虽然乍一看可能感觉不合常理，但这种奇怪的规律在大量不同类型的数据集中都得到了验证，从股价到地震震级，从河流长度到电费。这种现象是尺度不变的，意味着无论测量单位是米、千米还是英里，模式都保持一致。更重要的是，这条定律仅适用于跨越几个数量级的数据集——如人类身高或考试成绩这样的有限范围内的数值，不符合本福德定律。
- en: '![](../Images/def0b406be7f377a82a143bf41b19315.png)'
  id: totrans-22
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/def0b406be7f377a82a143bf41b19315.png)'
- en: But why does this happen? 🤨 Many real-world phenomena grow proportionally -financial
    data like stock prices or interest rates, or population sizes, often grow proportionally
    or exponentially. This exponential growth leads to datasets whose leading digits
    inherently fit a logarithmic distribution. This happens because of the logarithmic
    spacing of numbers. For instance, on a logarithmic scale, the interval between
    1 and 10 is much larger than the interval between 90 and 100\. As a result, numbers
    with smaller leading digits – like 1 – appear more frequently, aligning with Benford’s
    Law. On top of this, random natural phenomena like the river lengths or lake sizes,
    generally follow highly skewed distributions that align with logarithmic spacing.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 但为什么会出现这种情况？🤨许多现实世界现象是成比例增长的——例如，股票价格或利率等金融数据，或人口规模，通常呈比例或指数增长。这种指数增长导致数据集的首位数字天生符合对数分布。这是因为数字的对数间隔。例如，在对数尺度上，1和10之间的间隔远大于90和100之间的间隔。因此，首位数字较小的数字（如1）出现的频率更高，符合本福特定律。此外，像河流长度或湖泊大小这样的随机自然现象通常遵循高度偏斜的分布，这些分布与本福特定律相符。
- en: '![Exponential growth causes data points to cluster at the beginning of each
    logarithmic class (e.g., 10, 100, 1000, etc.). This clustering occurs because
    smaller leading digits (like 1) cover a larger proportion of the logarithmic scale
    compared to larger digits (like 9). As a result, the distribution of leading digits
    in such datasets follows Benford''s Law.](../Images/b69507f12ef64b847e9696130f99aa30.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![指数增长导致数据点在每对数类（例如，10、100、1000等）的开头聚集。这种聚集发生是因为较小的首位数字（如1）相对于较大的数字（如9）覆盖了对数尺度更大的比例。因此，此类数据集中首位数字的分布遵循本福特定律。](../Images/b69507f12ef64b847e9696130f99aa30.png)'
- en: Exponential growth causes data points to cluster at the beginning of each logarithmic
    class (e.g., 10, 100, 1000, etc.). This clustering occurs because smaller leading
    digits (like 1) cover a larger proportion of the logarithmic scale compared to
    larger digits (like 9). As a result, the distribution of leading digits in such
    datasets follows Benford’s Law.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 指数增长导致数据点在每对数类（例如，10、100、1000等）的开头聚集。这种聚集发生是因为较小的首位数字（如1）相对于较大的数字（如9）覆盖了对数尺度更大的比例。因此，此类数据集中首位数字的分布遵循本福特定律。
- en: '* * *'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Catching cheaters with Benford’s Law
  id: totrans-27
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用本福特定律捕捉作弊者
- en: An unexpected, but very popular application of Benford’s Law is fraud detection,
    spanning from cooked accounting numbers to fake election votes. Organic processes
    often generate data that follow Benford’s distribution, making Benford’s Law an
    effective and simple test to detect fraud. There are numerous examples of successfully
    using Benford’s Law for fraud detection. It is important to highlight that a deviation
    from the Benford distribution does not necessarily mean that the data were manipulated
    – even rounding the data may result in deviation from the nominal distribution.
    Nevertheless, such a deviation certainly means that the data look suspicious and
    we need to take a closer, more careful look. It can be used rather as an initial
    screening for fraud detection.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 本福特定律的一个意外但非常流行的应用是欺诈检测，从伪造的会计数字到虚假的选举投票。有机过程通常产生遵循本福特定律分布的数据，使本福特定律成为检测欺诈的有效且简单的方法。有无数成功使用本福特定律进行欺诈检测的例子。重要的是要强调，偏离本福特定律的分布并不一定意味着数据被操纵——即使数据四舍五入也可能导致偏离名义分布。尽管如此，这种偏差确实意味着数据看起来可疑，我们需要进行更仔细、更谨慎的检查。它可以用作欺诈检测的初步筛查。
- en: Being Greek, I find it especially fascinating to reflect on the case of Greece
    allegedly manipulating macroeconomic data to join the EU back in the day. 🤡 This
    is a well-known incident, which has been repeatedly and publicly discussed since
    then – European Commission has officially confirmed concerns about the reliability
    of the provided data, leading to a widespread suspicions of manipulation. In particular,
    EU requires candidate countries to provide data for checking the Stability and
    Growth Pact criteria, like public deficit, public debt and gross national product.
    Sadly, Greece’s data from 1999 to 2009 had t[he largest deviation from Benford’s
    distribution,](https://onlinelibrary.wiley.com/doi/abs/10.1111/j.1468-0475.2011.00542.x)
    out of the 27 EU member states. Again, data not conforming to Benford’s Law is
    not conclusive proof. But c’mon! 🤷‍♀️
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 作为希腊人，我发现反思希腊当年涉嫌操纵宏观经济数据以加入欧盟的案例特别有趣。🤡 这是一个众所周知的事件，自那以后一直被反复公开讨论——欧洲委员会正式确认了对提供数据可靠性的担忧，导致普遍怀疑存在操纵。特别是，欧盟要求候选国提供数据以检查稳定与增长协议标准，如公共赤字、公共债务和国内生产总值。遗憾的是，希腊1999年至2009年的数据与27个欧盟成员国相比，[与本福特定律分布的偏差最大](https://onlinelibrary.wiley.com/doi/abs/10.1111/j.1468-0475.2011.00542.x)。再次强调，不符合本福特定律的数据并不构成结论性证据。但说真的！🤷‍♀️
- en: Another classic example of being caught through Benford’s Law includes financial
    advisor Wesley Rhodes, whose financial statements failed to pass a first digit
    Benford’s Law test. Taking a closer look, it was revealed that Rhodes was pulling
    his numbers out of thin air, and [had stolen millions of dollars from investors](https://www.sec.gov/enforcement-litigation/litigation-releases/lr-21030).
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个通过本福特定律被抓住的经典例子是财务顾问韦斯利·罗德斯，他的财务报表未能通过本福特定律的首位数字测试。仔细观察后，发现罗德斯是从空中捏造数字，[从投资者那里窃取了数百万美元](https://www.sec.gov/enforcement-litigation/litigation-releases/lr-21030)。
- en: Another famous but much more controversial application of the Benford’s Law
    is election fraud. In the 2020 U.S. presidential election between Biden and Trump,
    some analyses claimed that Trump’s distribution of vote tallies complied with
    Benford’s Law, whereas Biden’s did not. Of course there was a bit of a fuss, but
    this distribution was ultimately [explainable](https://www.reuters.com/article/world/fact-check-deviation-from-benfords-law-does-not-prove-election-fraud-idUSKBN27Q3A9/).
    A more controversial case is the Iranian 2009 election – overall, [vote counts
    appear not to satisfy Benford’s Law](https://link.springer.com/article/10.1007/s00144-010-0003-4),
    and look suspicious. Nonetheless, there is a large discussion about the applicability
    of Benford’s Law to election fraud detection, as electoral data often fail to
    meet the necessary conditions for the law to hold.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 本福特定律的另一个著名但争议性更大的应用是选举欺诈。在2020年拜登与特朗普之间的美国总统选举中，一些分析认为特朗普的选票分布符合本福特定律，而拜登的则不符合。当然，这引起了一些争议，但最终这种分布是[可解释的](https://www.reuters.com/article/world/fact-check-deviation-from-benfords-law-does-not-prove-election-fraud-idUSKBN27Q3A9/)。另一个更具争议的案例是伊朗2009年的选举——总体来看，[投票计数似乎并不满足本福特定律](https://link.springer.com/article/10.1007/s00144-010-0003-4)，看起来可疑。尽管如此，关于本福特定律在选举欺诈检测中的应用存在大量讨论，因为选举数据往往无法满足该定律成立的必要条件。
- en: Benford’s Law can also be very handy for [fraud detection in social media](https://journals.plos.org/plosone/article?id=10.1371/journal.pone.0135169).
    More specifically, the law applies on social media metrics, as for instance, follower
    counts, likes, or retweets. In this way, it allows for the identification of suspicious
    behaviors, such as [bot activity or purchased engagement](https://firstmonday.org/ojs/index.php/fm/article/view/10163/8063),
    by examining such amounts and comparing them to Benford’s distribution.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 本福特定律在社交媒体中的欺诈检测也非常有用。[社交媒体中的欺诈检测](https://journals.plos.org/plosone/article?id=10.1371/journal.pone.0135169)。更具体地说，该定律适用于社交媒体指标，例如关注者数量、点赞或转发。这样，它可以通过检查这些数量并将它们与本福特定律分布进行比较，来识别可疑行为，如[机器人活动或购买参与度](https://firstmonday.org/ojs/index.php/fm/article/view/10163/8063)。
- en: '* * *'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Getting our hands dirty
  id: totrans-34
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摸索实践
- en: We can easily check if a dataset fits Benford’s Law in Python. This allows us
    to quickly determine if a dataset is legitimate or suspicious, and thus needs
    further examination. To demonstrate [this](https://www.kaggle.com/datasets/mlg-ulb/creditcardfraud?select=creditcard.csv),
    I will be using this Kaggle dataset for credit card fraud detection. The dataset
    is licensed as [Open Data Commons](https://opendatacommons.org/licenses/dbcl/1-0/),
    allowing commercial use.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以轻松地在 Python 中检查数据集是否符合 Benford 法则。这使我们能够快速确定数据集是否合法或可疑，从而需要进一步检查。为了演示[这一点](https://www.kaggle.com/datasets/mlg-ulb/creditcardfraud?select=creditcard.csv)，我将使用这个
    Kaggle 数据集进行信用卡欺诈检测。该数据集许可为 [Open Data Commons](https://opendatacommons.org/licenses/dbcl/1-0/)，允许商业使用。
- en: 'The dataset contains numerous columns, but I will only use the following two:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 数据集包含许多列，但我只会使用以下两个：
- en: '*Amount:* indicating the amount of a transaction'
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*金额:* 表示交易的金额'
- en: '*Class:* indicating if the transaction is legitimate (0), or fraudulent (1)'
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*类别:* 表示交易是否合法（0）或欺诈（1）'
- en: 'So, we can import the necessary libraries and the dataset in Python by:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们可以通过以下方式在 Python 中导入必要的库和数据集：
- en: '[PRE0]'
  id: totrans-40
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Then, we can easily calculate the nominal probabilities predicted by Benford’s
    Law by applying the respective formula.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们可以通过应用相应的公式轻松计算出 Benford 法则预测的名义概率。
- en: '[PRE1]'
  id: totrans-42
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Next, we have to calculate the distribution of leading digits for the legitimate
    and fraudulent subsets of the dataset. To do this, it is essential to extract
    the leading digit of the ‘*Amount*‘ column for each transaction.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们必须计算数据集中合法和欺诈子集的首位数字分布。为此，提取每个交易的“*金额*”列的首位数字是至关重要的。
- en: '[PRE2]'
  id: totrans-44
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Then, we can plot the two distributions – legitimate and fraudulent – in comparison
    to the nominal Benford’s Law distribution. For the visualizations I use Plotly
    library, as usual.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们可以将两个分布——合法和欺诈——与名义上的 Benford 法则分布进行比较。对于可视化，我通常使用 Plotly 库。
- en: '[PRE3]'
  id: totrans-46
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Similarly, we produce the plot for the fraudulent transactions.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，我们为欺诈交易生成相应的图表。
- en: '![](../Images/48c2af24ba22606d62be787502caaddd.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/48c2af24ba22606d62be787502caaddd.png)'
- en: Even at a glance, it is visually apparent that the legitimate transactions align
    much more closely with the nominal distribution, whereas the fraudulent transactions
    show significant deviations. To further quantify these deviations, we can calculate
    the difference between the observed and nominal probabilities for each leading
    digit and then aggregate them.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 即使是粗略一看，也可以明显看出合法交易与名义分布的吻合度更高，而欺诈交易则显示出显著的偏差。为了进一步量化这些偏差，我们可以计算每个首位数字的观察值与名义概率之间的差异，然后汇总它们。
- en: '[PRE4]'
  id: totrans-50
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: '![](../Images/06059101cd036cf2f8a4163d48988bda.png)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/06059101cd036cf2f8a4163d48988bda.png)'
- en: Clearly, something is going on in the second subset, and we would be required
    to perform a closer and more in-depth investigation.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 显然，第二个子集中有些事情正在进行，我们需要进行更仔细和深入的调查研究。
- en: But does this make sense? 🤨 In credit card fraud, the transaction amounts themselves
    are not typically fabricated – fraudsters aim to charge your credit card with
    very real amounts. However, in their effort to bypass certain security thresholds,
    as for instance a 50 USD or 100 USD limit per purchase, they may produce irregular
    patterns that deviate from Benford’s Law. For example, attempting to stay below
    a $100 limit might result in an overrepresentation of transactions starting with
    9, such as $99.99\. Thus, while the data may not be outright fabricated, the irregularity
    in the patterns suggests that something unusual is happening.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 但这有意义吗？🤨 在信用卡欺诈中，交易金额本身通常不是伪造的——欺诈者旨在用非常真实的金额刷爆你的信用卡。然而，在试图绕过某些安全阈值的过程中，例如每次购买的
    50 美元或 100 美元限额，他们可能会产生不符合 Benford 法则的不规则模式。例如，试图保持在 100 美元以下可能会导致以 9 开头的交易过度代表，如
    99.99 美元。因此，虽然数据可能不是完全伪造的，但模式中的不规则性表明可能发生了不寻常的事情。
- en: '* * *'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: '* *'
- en: On my mind
  id: totrans-55
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在我心中
- en: Ultimately, Benford’s Law is not proof of fraud or data manipulation, but rather
    in indicator of something going on. If the data do not conform on the expected
    distribution, all we need to do is come up with an explanation on why the data
    do not conform – what aspect of the data may be unnatural, forced or fabricated.
    When a logical explanation cannot be found, it is most probably time to take a
    closer, more detailed look.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 最终，本福特定律并不是欺诈或数据操纵的证据，而是一个表明有某种情况发生的指标。如果数据不符合预期的分布，我们只需要提出一个解释，说明为什么数据不符合——数据可能存在哪些不自然、强制或伪造的方面。当找不到合理的解释时，可能就是时候进行更仔细、更详细的检查了。
