  zh: 对于那些想要亲自进行测试的读者，所有数据集都在 [Kaggle 上可用](https://www.kaggle.com/datasets/dmitriieliuseev/radiation-spectra-examples/)。如果有人想用自己的硬件进行测试，Radiacode
    制造商很友好地提供了一张 10% 的折扣码“DE10”，用于 [购买设备](https://102.radiacode.com/DmitriiE)（免责声明：我从中不获得任何利润或其他商业利益）。
