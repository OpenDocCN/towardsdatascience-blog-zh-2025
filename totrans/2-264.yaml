- en: 'Exploratory Data Analysis: Gamma Spectroscopy in Python'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/exploratory-data-analysis-gamma-spectroscopy-in-python/](https://towardsdatascience.com/exploratory-data-analysis-gamma-spectroscopy-in-python/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1749533078689" class="mdspan-comment">In some areas</mdspan>,
    data science and data analysis can be closely related to physics and hardware.
    Not everything can run in the cloud, and some applications require the use of
    *real* things. In this article, I will show how to collect the data from a [Radiacode
    103G](https://102.radiacode.com/DmitriiE) radiation detector and gamma spectrometer,
    and we will see what kind of information we can get from it. We will do this analysis
    in Python, and I will also show the gamma spectra of different objects that I
    got in the second-hand store. In the next part, I will use machine learning methods
    to detect object types and isotopes automatically.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: All files collected for this article are available on Kaggle, and readers are
    also welcome to run all tests on their own. The link is added to the end of the
    page.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: Let’s get started!
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Hardware
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As readers can guess from the top picture, we will talk about the radiation.
    Which is, interestingly, always around us, and the radiation level is never zero.
    Increased levels of radiation can be found in many places and objects, from vintage
    watches in the thrift store to airplane flights (because of cosmic rays, the radiation
    level during the flight is about 10x higher compared to ground level).
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: 'Simply speaking, there are mostly two kinds of radiation detectors:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: A **Geiger-Müller tube**. As its name suggests, it’s a tube filled with a mixture
    of gases. When a charged particle reaches the tube, the gas is ionized, and we
    can detect the short pulse. The higher the radiation level, the more pulses per
    minute we get. Radiation detectors often show values in CPM (counts per minute),
    which can be converted into Sieverts or other units. The Geiger tube is cheap
    and reliable; it is used in many radiation detectors.
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A **scintillation detector**. This detector is based on a special type of crystal,
    which generates light when a charged particle is detected. A scintillator has
    an important property—the intensity of the light is proportional to the particle’s
    energy. Because of that, we can not only detect the particles but can also determine
    which type of particles we get.
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Obviously, from a hardware perspective, it’s easier said than done. In a scintillation
    crystal, only several photons can be emitted when a particle is detected. Earlier,
    those detectors had a 5-6 digit price, and were used only in labs and institutions.
    Nowadays, because of the progress in electronics, we can buy a scintillation detector
    for the price of a mid-level smartphone. This makes gamma spectroscopy analysis
    doable even for science enthusiasts with a moderate budget.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: Let’s get into it and see how it works!
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Collecting the Data
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'As was mentioned in the beginning, I will use a *Radiacode 103G*. It’s a portable
    device that can be used as a radiation detector and a gamma spectrometer — we
    can get both CPS (counts per second) and gamma spectrum values. Radiacode needs
    only the USB connection and has the size of a USB stick:'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: '![Radiacode detector, Image by author](../Images/59301406c9acaff0de94fda8871d8b33.png)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
- en: Radiacode detector, Image by author
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: 'To get the data, I will use a [radiacode](https://github.com/cdump/radiacode)
    open-source library. As a simple example, let’s collect the gamma spectrum within
    30 seconds:'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  id: totrans-17
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: I will explain the meaning of these fields in the following chapter when we
    start the analysis.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: 'If we use the Radiacode in the Jupyter Notebook, we also need to close the
    connection at the end of the cell, otherwise the next run will get a USB “resource
    busy” error:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  id: totrans-20
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'We can also make a logger for both CPS (counts per second) and spectrum values.
    For example, let’s log gamma spectra into the CSV file every 60 seconds:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  id: totrans-22
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Here, I get two types of data. A *RawData* contains CPS values, which can be
    used to get radiation levels in µSv/hour. I use them only to see that the device
    works; they are not used for analysis. A *Spectrum* data contains what we’re interested
    in – gamma spectrum values.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: Collecting the data every 60 seconds allows me to see the dynamics of how the
    data is changing. Usually, the spectrum must be collected within several hours
    (the more the better), and I prefer to run this app on a Raspberry Pi. The output
    is saved as CSV, which we will process in Python and Pandas.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Data Analysis
  id: totrans-25
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 3.1 Gamma Spectrum
  id: totrans-26
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'To understand what kind of data we have, let’s print the spectrum again:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  id: totrans-28
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'What did we get here? As was mentioned before, a scintillation detector gives
    us not only the number of particles but also their energy. The energy of the charged
    particle is measured in keV (kiloelectronvolts) or MeV (megaelectronvolts), where
    the [electronvolt](https://en.wikipedia.org/wiki/Electronvolt) is the amount of
    kinetic energy of the particle. A Radiacode detector has 1024 channels, and the
    energy for each channel can be found using a simple formula:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d6929212b1d811816453a3c2d6843683.png)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
- en: Here, *ch* is a channel number, and *a0*, *a1*, and *a2* are calibration constants,
    stored in the device.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
- en: During the specified time (in our case, 30 seconds), the Radiacode detects the
    particles and saves the result into channels as a simple arithmetic sum. For example,
    the value “2” in the 5th place means that 2 particles with the 33.61 keV energy
    were detected in channel 5.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s draw the spectrum using Matplotlib:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  id: totrans-34
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'The output looks like this:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/6e8cd070f23a6d28122c443a21266283.png)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
- en: Image by author
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
- en: I collected the data in 30 seconds, and even within this short interval, we
    can already see a probability distribution! As usual in statistics, the longer
    the better, and by collecting the data within several hours, we can get good-visible
    results. It is also convenient that Radiacode collects the spectrum automatically.
    We can keep the device running autonomously for several hours or even days, then
    run the code and retrieve the spectrum.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
- en: 'For those readers who don’t have a Radiacode detector, I made two functions
    to **save and load the spectrum** to a JSON file:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  id: totrans-40
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'We can use it to get the data:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  id: totrans-42
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: As mentioned in the beginning, all collected files are available on Kaggle.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
- en: 3.2 Isotopes
  id: totrans-44
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now, we are approaching the fun part of the article. What is the purpose of
    the gamma spectrum? It turned out that different elements emit gamma rays with
    different energies. That allows us to tell what kind of object we have by observing
    the spectrum. This is a crucial difference between a simple Geiger-Müller tube
    and a scintillation detector. With a Geiger-Müller tube, we can tell that the
    object is radioactive and see that the level is, let’s say, 500 counts per minute.
    With a gamma spectrum, we can not only see the radiation level but also see *why*
    the object is radioactive and how the decay process is going.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
- en: How does it work in practice? Let’s say I want to measure radiation from a [banana](https://en.wikipedia.org/wiki/Banana_equivalent_dose).
    Bananas naturally contain [Potassium-40](https://en.wikipedia.org/wiki/Potassium-40),
    which emits gamma rays with a 1.46 MeV energy. In theory, if I take *a lot of
    bananas* (really a lot because each banana has less than 0.5g of potassium) and
    place them in an isolated lead chamber to block the background radiation, I will
    see a 1.46 MeV peak on a spectrum.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
- en: 'Practically, it is often more complicated. Some materials, like uranium-238,
    may have a complex decay chain like this:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
- en: '![Uranium-238 decay chain, Image source - Wikipedia](../Images/cb2e66e1728c7e560b6b48692fcb7f7d.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
- en: Uranium-238 decay chain, Image source – [Wikipedia](https://en.m.wikipedia.org/wiki/File:Decay_chain%284n%2B2,_Uranium_series%29.svg)
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
- en: As we can see, uranium has a series of radioactive decays. It decays to thorium,
    thorium to radium, and so on. Every element has its gamma spectrum peak and a
    half-life time. As a result, all these peaks will be present on a spectrum at
    the same time (but with different intensities).
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
- en: 'We can show isotope peaks with Matplotlib as well. As an example, let’s draw
    the K40 isotope line:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  id: totrans-52
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'We need to add only two lines of code in Matplotlib to draw it on a spectrum:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  id: totrans-54
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Now, let’s see how it works in action and do some experiments!
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
- en: 4\. Experiments
  id: totrans-56
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I don’t work in a nuclear institution, and I don’t have access to official test
    sources like Cesium-137 or Strontium-90, used in a “big science.” However, it
    is not required, and some objects around us can be slightly radioactive.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
- en: Ideally, a test object must be placed in a lead chamber to reduce the background
    radiation. A thick layer of lead will reduce the background radiation to a much
    lower level. However, lead is heavy, the shipment can be expensive, and it is
    a toxic material that requires a lot of safety precautions. Instead, I will collect
    two spectra—the first for the object itself and the second for the background
    (without the object). As we will see, it is enough, and the difference will be
    visible.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s combine all parts and draw both spectra and isotopes:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  id: totrans-60
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Different spectra can be collected during different time intervals. Because
    of that, I normalised the graph by dividing the count values by the total time,
    so we always see the counts per second on a graph.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
- en: Now, let’s start with experiments! As a reminder, all data files used in the
    tests are available on Kaggle.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
- en: 4.1 Bananas
  id: totrans-63
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: First, let’s answer the most asked question in nuclear physics – how radioactive
    are the bananas? A banana is a surprisingly difficult object to measure – it contains
    less than 1g of potassium-40, and it also contains 74% of water. As we can guess,
    the radiation from a banana is very low. First, I tried with a regular banana,
    and it did not work. Then I bought dried bananas in a supermarket, and only after
    that, I could see a small difference.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
- en: 'Using the methods created before, it’s easy to load a spectrum and see the
    result:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  id: totrans-66
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: 'The output looks like this:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/8c066e74b83134ee89be4c8bd3a75471.png)'
  id: totrans-68
  prefs: []
  type: TYPE_IMG
- en: Image by author
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
- en: 'As we can see, the difference is minuscule, and it is barely visible. Let’s
    calculate the difference caused by the Potassium-40 (1460 keV energy, which corresponds
    to a Radiacode channel number N=570):'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  id: totrans-71
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: Here, I compared the difference to the total number of particles, caused by
    background radiation. As we can see, the banana is only 0.019% more radioactive
    than the background! Obviously, this number is too small and cannot be seen with
    the naked eye just by watching the radiation counter.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
- en: 4.2 Vintage Watch with a Radium Dial
  id: totrans-73
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now, let’s test some “stronger” objects. Radium-226 was used for [painting](https://en.wikipedia.org/wiki/Radium_dial)
    watch hands and dials from the 1910s to the 1960s. The mix of radium and a special
    lume allowed watches to glow in the dark.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
- en: Many manufacturers were producing watches with radium paint, from cheap noname
    models to luxury ones like the Rolex Submariner with a >$40K modern price tag.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
- en: 'I bought this watch for testing in the vintage shop for about $20:'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/7edcc4bc52efd5a177cc8bd9c8ac3be7.png)'
  id: totrans-77
  prefs: []
  type: TYPE_IMG
- en: Image by author
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
- en: I also used a UV light to show how the watch was glowing in the dark when it
    was made (nowadays, the lume is depleted, and without UV, it does not glow anymore).
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s draw the spectrum:'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  id: totrans-81
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: 'The data was collected within 3.5 hours, and the output looks like this:'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a70e7d181ae917a63de227b9c53b49e2.png)'
  id: totrans-83
  prefs: []
  type: TYPE_IMG
- en: Image by author
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
- en: 'Lots of processes are going on here, and we can see the parts of the radium
    decay chain:'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
- en: '![Image source - Wikipedia](../Images/350aeb2aaa9b83e100f1fa0b0423018c.png)'
  id: totrans-86
  prefs: []
  type: TYPE_IMG
- en: Image source – [Wikipedia](https://en.m.wikipedia.org/wiki/File:Decay_chain%284n%2B2,_Uranium_series%29.svg)
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
- en: Radium-226 (1602-year half-life) yields an alpha particle and the radon gas
    (3.82-day half-life), but the radon itself is also an alpha emitter and does not
    produce gamma rays. Instead, we can see some daughter products as bismuth and
    lead.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
- en: 'As an aside question: is it dangerous to have a watch with a radium dial? Generally
    not, these watches are safe if the case and the glass are not damaged. We can
    see many decay products on the spectrum, but in the same way as with bananas,
    this spectrum was collected within several hours, and the real radiation level
    from this watch is relatively small.'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
- en: 4.3 Uranium Glass
  id: totrans-90
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Uranium glass has a surprisingly long history. Uranium ore was used for glass
    manufacturing since the 19th century, long before even the word “radioactivity”
    became known. Uranium glass was produced in huge amounts and can now be found
    in almost every vintage store. The production stopped in the 1950s; after that,
    all the uranium was mostly used for industrial and military purposes.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
- en: Uranium glass mostly contains only a tiny fraction of uranium; these objects
    are safe to keep in the cabinet (still, I would not use it for eating:). The amount
    of radiation produced by the glass is also small.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
- en: 'This Victorian glass was made in the 1890s, and it will be our test object:'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/6f5bf95f8d244d4b199b5d61f3b5fb99.png)'
  id: totrans-94
  prefs: []
  type: TYPE_IMG
- en: Image by author
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s see the spectrum:'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  id: totrans-97
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: 'As was mentioned, the radiation level from the uranium glass is not high. Most
    of the peaks are small, and I used a log scale to see them better. The result
    looks like this:'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/5495541c84ef55d0694eb5fcc6b5ef82.png)'
  id: totrans-99
  prefs: []
  type: TYPE_IMG
- en: Image by author
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
- en: Here, we can see some peaks from thorium and uranium; these elements are present
    in the uranium decay chain.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
- en: 4.4 “Quantum” Pendant
  id: totrans-102
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Readers may think that radioactive objects were produced only in the “dark ages,”
    a long time ago, when people did not know about radiation. Funny enough, it is
    not always true, and many “Negative Ion” related products are still available
    today.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
- en: 'I bought this pendant for $10 on eBay, and according to the seller’s description,
    it can be used as a negative ions source to “improve health”:'
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ebf97cdd2f4e23170126c4e3fa580694.png)'
  id: totrans-105
  prefs: []
  type: TYPE_IMG
- en: Image by author
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
- en: 'An ionizing radiation indeed can produce ions. The medical properties of those
    ions are out of the scope of this article. Anyway, it is a good test object for
    gamma spectroscopy – let’s draw the spectrum and see what is inside:'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  id: totrans-108
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: 'The result looks like this:'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/5229199bf41d3fe8d57361bde7d99e63.png)'
  id: totrans-110
  prefs: []
  type: TYPE_IMG
- en: Image by author
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
- en: According to [gammaspectacular.com](https://www.gammaspectacular.com/blue/th232-spectrum),
    this spectrum belongs to Thorium-232\. Obviously, it was not written in the product
    description, but with a gamma spectrum, we can see it without object disassembly
    or any chemical tests!
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
- en: 5\. Matplotlib Animation (Bonus)
  id: totrans-113
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 5. Matplotlib 动画（额外奖励）
- en: As a bonus for readers patient enough to read up to this point, I will show
    how to make an animated graph in Matplotlib.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 作为对那些耐心读到这里的读者的额外奖励，我将展示如何在 Matplotlib 中制作动画图。
- en: As a reminder, at the beginning of the article, I collected spectra from a Radiacode
    device every minute. We can use this data to animate a spectrum collection process.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 作为提醒，在文章开头，我每分钟从 Radiacode 设备收集光谱。我们可以使用这些数据来动画化光谱收集过程。
- en: 'First, let’s **load the data** into the dataframe:'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们将数据 **加载** 到数据框中：
- en: '[PRE15]'
  id: totrans-117
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: 'The output looks like this:'
  id: totrans-118
