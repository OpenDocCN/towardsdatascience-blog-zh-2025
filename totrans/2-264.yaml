- en: 6\. Conclusion
  id: totrans-131
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 6. 结论
- en: In this article, I described the basics of gamma spectroscopy analysis with
    a Radiacode scintillation detector, Python, and Matplotlib. As we can see, the
    data itself is simple, however, a lot of invisible processes are going “under
    the hood.” Using different test objects, we were able to see spectra of different
    elements of radioactive decay as Bismuth-214 or Protactinium-234\. And, amazingly,
    these tests can be done at home, and detectors like Radiacode are available for
    science enthusiasts for the price of a mid-level smartphone.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我描述了使用 Radiacode 闪烁探测器、Python 和 Matplotlib 进行伽马光谱分析的基础。正如我们所见，数据本身很简单，然而，许多看不见的过程正在“幕后”进行。使用不同的测试对象，我们能够看到不同放射性衰变元素的谱，如铋-214或钍-234。而且，令人惊讶的是，这些测试可以在家中进行，像
    Radiacode 这样的探测器对科学爱好者来说，价格与中档智能手机相当。
- en: This basic analysis allows us to go further. If there is some public interest
    in this topic, in the next article I will use machine learning to automate the
    isotopes detection. Stay tuned.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 这种基本分析使我们能够更进一步。如果对这个主题有公众兴趣，在下一篇文章中，我将使用机器学习来自动化同位素的检测。请保持关注。
- en: 'For those readers who would like to perform the tests on their own, all datasets
    are [available on Kaggle](https://www.kaggle.com/datasets/dmitriieliuseev/radiation-spectra-examples/).
