- en: The Art of Asking Good Questions
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 《提出好问题的艺术》
- en: 原文：[https://towardsdatascience.com/the-art-of-asking-good-questions/](https://towardsdatascience.com/the-art-of-asking-good-questions/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://towardsdatascience.com/the-art-of-asking-good-questions/](https://towardsdatascience.com/the-art-of-asking-good-questions/)'
- en: <mdspan datatext="el1758598968456" class="mdspan-comment">You’re running clean</mdspan>
    experiments, shipping insights, and automating reports. Your stakeholders praise
    your work. Your dashboards are beautiful. Your analyses are rigorous. But if the
    roadmap doesn’t change based on your work, are you really driving impact?
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1758598968456" class="mdspan-comment">你正在进行清洁的实验，发布洞察，并自动化报告。你的利益相关者赞扬你的工作。你的仪表板很美观。你的分析很严谨。但如果路线图没有根据你的工作而改变，你真的在产生影响力吗？</mdspan>
- en: 'The answer often comes down to one critical skill that separates strategic
    data scientists from tactical ones: the ability not just to ask better questions,
    but to *frame* them.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 答案通常归结于一项关键技能，它将战略数据科学家与战术数据科学家区分开来：不仅能够提出更好的问题，而且能够*构建*这些问题。
- en: Good questions generate impact. And impact—not just technical excellence—is
    your best defense against AI replacing your role.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 好问题能产生影响力。而这种影响力——不仅仅是技术上的卓越——是你抵御AI取代你角色的最佳防御。
- en: The Three Levels of Data Science Impact
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 《数据科学影响的三级》
- en: Before I talk about what makes a great question, I want to describe three levels
    of performance for a data scientist. With these levels defined, we’ll then be
    able to see why better questioning is the key differentiator across levels.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在我谈论什么造就了一个优秀的问题之前，我想描述数据科学家三个级别的表现。定义了这些级别之后，我们就能看到为什么更好的提问是跨级别的主要区分因素。
- en: As most data scientists advance in their careers, they progress up the levels
    when it comes to product influence. The lower level is where AI could be a threat,
    but the upper level sees it as an opportunity.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 当大多数数据科学家在职业生涯中进步时，他们在产品影响力方面也会提升到不同的级别。较低级别是AI可能构成威胁的地方，但高级别则将其视为机遇。
- en: '**Level 1: Reactive Executor** You answer questions after decisions have been
    made. Most of your work comes from Jira tickets or Slack requests. You focus on
    delivering clean analyses quickly, but you rarely know the broader strategic context
    for your work.'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: '**第1级：反应性执行者** 你在决策做出之后回答问题。你大部分的工作来自Jira工单或Slack请求。你专注于快速交付清洁的分析，但你很少知道你工作的更广泛的战略背景。'
- en: '**Level 2: Informed Collaborator** You participate in product planning meetings
    and run experiments, asking clarifying questions to better understand immediate
    problems. While still primarily reactive, you inform choices rather than frame
    them.'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: '**第2级：信息丰富的合作者** 你参与产品规划会议并运行实验，通过提出澄清问题来更好地理解即时问题。虽然仍然主要是反应性的，但你提供信息而不是构建框架。'
- en: '**Level 3: Strategic Partner** You shape what gets prioritized. You identify
    problems worth solving before anyone thinks to ask. You surface strategic questions.
    Your work directly influences what gets built, shipped, or funded.'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: '**第3级：战略合作伙伴** 你塑造优先事项。你确定在别人想到之前值得解决的问题。你提出战略问题。你的工作直接影响着什么被构建、发布或资助。'
- en: Moving up to Level 3 behavior, regardless of your actual seniority in your org,
    is what will insulate your career from potential AI impacts (and also set you
    up for a strong promotion!).
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 提升到第3级行为，无论你在组织中的实际资历如何，都能保护你的职业生涯免受潜在AI影响（并且还能为你获得强有力的晋升！）。
- en: The takeaway here is that at Level 1, you’re answering questions others have
    already framed. At Level 2, you’re clarifying questions to solve the immediate
    problem. But at Level 3, you’re asking the strategic questions that reshape how
    entire teams think about problems.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 这里的启示是，在第1级，你是在回答别人已经构建的问题。在第2级，你是在澄清问题以解决即时问题。但在第3级，你是在提出能够重塑整个团队对问题看法的战略问题。
- en: As you advance up the levels, you shift from answering questions to asking better
    ones. But what makes a question ‘better’? What transforms a routine data request
    into strategic insight? The answer lies in five specific attributes that define
    high-leverage questions.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 随着你向更高级别发展，你从回答问题转变为提出更好的问题。但什么使一个问题“更好”？什么将常规的数据请求转化为战略洞察？答案在于五个具体的属性，这些属性定义了高杠杆问题。
- en: The Anatomy of Questions That Drive Decisions
  id: totrans-14
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 驱动决策的问题解剖
- en: 'Not all questions are created equal; some generate busy work, others surface
    insights, but the best questions generate decisions. I’ve identified five attributes
    that separate high-leverage questions from low-leverage ones, that delineate the
    strategic questions from the busy work:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 并非所有问题都同等重要；有些会产生忙碌的工作，有些会揭示洞察，但最好的问题会产生决策。我已经确定了五个属性，这些属性将高杠杆问题与低杠杆问题区分开来，将战略问题与忙碌的工作区分开来：
- en: '**Decision-Linked**: Great questions have clear lines of sight to action. When
    you answer them, someone knows what to do next.'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: '**决策关联性**: 伟大的问题与行动有明确的联系。当你回答它们时，有人知道下一步该做什么。'
- en: '*Instead of*: “What’s our user engagement rate by cohort?”'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*而不是*: “我们用户群体的参与度是多少？”'
- en: '*Ask*: “Which cohorts should we target for our retention campaign, and how
    much budget should we allocate?”'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*问*: “我们应该针对哪些群体进行保留率活动，我们应该分配多少预算？”'
- en: '**Ambiguity-Reducing**: They clarify fuzzy or risky product bets. They take
    situations where smart people disagree and provide a framework for moving forward.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '**减少模糊性**: 它们澄清模糊或风险产品赌注。在聪明人意见不一致的情况下，它们提供了一个前进的框架。'
- en: '*Instead of*: “How many users tried the new feature?”'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*而不是*: “有多少用户尝试了新功能？”'
- en: '*Ask*: “Is the new feature cannibalizing our core usage, or is it expanding
    overall engagement?”'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*问*: “新功能是否正在蚕食我们的核心使用，还是它在扩大整体参与度？”'
- en: '**Directional**: They don’t just describe, they guide. They point toward specific
    actions and reveal important tradeoffs.'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '**方向性**: 它们不仅描述，还指导。它们指向具体行动并揭示重要的权衡。'
- en: '*Instead of*: “What’s the correlation between feature usage and retention?”'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*而不是*: “功能使用与保留率之间的相关性是什么？”'
- en: '*Ask*: “If we focus on this feature, what’s the maximum retention improvement
    we could expect?”'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*问*: “如果我们专注于这个功能，我们期望的最大保留率提升是多少？”'
- en: '**Scalable**: They create frameworks for solving similar problems in the future
    or across teams, building organizational capability rather than just individual
    insights.'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: '**可扩展性**: 他们为解决未来或跨团队中类似问题创建框架，构建组织能力，而不仅仅是个人洞察。'
- en: '*Instead of*: “What happened to conversion rates last week?”'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*而不是*: “上周转化率发生了什么变化？”'
- en: '*Ask*: “What early indicators should we monitor to predict conversion rate
    changes before they impact revenue?”'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*问*: “我们应该监控哪些早期指标来预测转化率变化，在它们影响收入之前？”'
- en: '**Non-Obvious**: They surface tradeoffs that weren’t being considered and challenge
    existing assumptions.'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: '**非显而易见**: 它们揭示了未被考虑的权衡，并挑战现有的假设。'
- en: '*Instead of*: “Are users engaging with our recommendations?”'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*而不是*: “用户是否在使用我们的推荐？”'
- en: '*Ask*: “Are our recommendations making users more autonomous or more dependent
    on our platform?”'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*问*: “我们的推荐是否使用户更加自主，还是更加依赖我们的平台？”'
- en: 'The Question Ladder: Your Path to Strategic Impact'
  id: totrans-31
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 问题阶梯：你的战略影响之路
- en: Now that you know what great questions accomplish, how do you apply that to
    the request you just received from your PM? I’ve developed a sequence of questions
    I like to ask—either just to myself, or to my PMs or engineering teams—that helps
    me take a tactical request and ensure it has strategic results. I call this the
    Question Ladder. It’s a practical tool that transforms how you engage with stakeholders.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你已经知道伟大的问题能取得什么成就，你是如何将这一点应用到刚刚从你的产品经理那里收到的请求上的呢？我开发了一系列我喜欢问的问题——无论是仅仅问自己，还是问我的产品经理或工程团队——这有助于我处理战术请求并确保它产生战略性的结果。我把这称为问题阶梯。这是一个实用的工具，它改变了你与利益相关者互动的方式。
- en: 'Instead of diving immediately into analysis, you work through each rung of
    the ladder to ensure you’re solving the right problem:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 在立即进行分析之前，你通过每个阶梯的工作来确保你正在解决正确的问题：
- en: '**1: Observation**: Something changed, or someone’s curious'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: '**1: 观察**: 有所变化，或者有人好奇'
- en: '**2: Clarification**: What exactly are we trying to learn?'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: '**2: 明确性**: 我们究竟想了解什么？'
- en: '**3: Relevance**: How does this tie to product or business goals?'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: '**3: 相关性**: 这如何与产品或业务目标相关联？'
- en: '**4: Decision**: What decision or action would this enable?'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: '**4: 决策**: 这将使什么决策或行动成为可能？'
- en: '**5: Prioritization**: Is this worth prioritizing over other work?'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: '**5: 优先级**: 这是否值得优先考虑其他工作？'
- en: As you progress through the Question Ladder, keep the Five Attributes from the
    previous section in mind. After each question you ask, use the five attributes
    of good questions to determine what should be asked next.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 在你通过问题阶梯前进的过程中，请记住上一节中的五个属性。在你问的每个问题之后，使用良好问题的五个属性来确定接下来应该问什么。
- en: 'Here’s how this works in practice. A product manager approaches you with what
    seems like a simple request: “Can you analyze our feature adoption rates?”'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是它在实践中是如何工作的。产品经理带着看似简单的请求来找你：“你能分析我们的特征采用率吗？”
- en: 'Instead of immediately writing queries, you climb the ladder:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 而不是立即编写查询，你先攀登这个阶梯：
- en: '**Observation**: “What specific change or pattern prompted this request?”'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: '**观察**：“是什么具体的变化或模式促使了这一请求？”'
- en: '**Clarification**: “Are we trying to understand which features are most popular,
    which users are most engaged, or which features drive retention?”'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: '**澄清**：“我们是在试图了解哪些功能最受欢迎，哪些用户最活跃，还是哪些功能推动留存？”'
- en: '**Relevance**: “How does feature adoption connect to our current product strategy?
    Are we evaluating existing features or deciding what to build next?”'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: '**相关性**：“特征采用如何与我们的当前产品战略相联系？我们是在评估现有功能还是决定下一步要构建什么？”'
- en: '**Decision**: “What decisions about product development are waiting for this
    analysis? What would we do if adoption rates were much higher or lower than expected?”'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: '**决策**：“关于产品开发的决定有哪些正在等待这个分析？如果采用率远高于或低于预期，我们会做什么？”'
- en: '**Prioritization**: “What other projects would we pause to act on insights
    from this analysis? What level of confidence would we need to change our development
    priorities?”'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: '**优先级**：“我们会暂停哪些其他项目来采取这个分析中的见解？我们需要多少信心来改变我们的开发优先级？”'
- en: This process usually takes 10-15 minutes of conversation, but it transforms
    a generic reporting request into a strategic analysis with clear implications
    for action.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 这个过程通常需要10-15分钟的对话，但它将一个通用的报告请求转变为具有明确行动含义的战略分析。
- en: From Executor to Strategic Partner
  id: totrans-48
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 从执行者到战略伙伴
- en: The Question Ladder also helps you identify when *not* to do analysis. If you
    can’t find clear answers at levels 4 and 5, that’s a strong signal that the analysis
    isn’t worth doing yet. Better to spend time clarifying the strategic context than
    to produce insights that won’t be used.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 问题阶梯还能帮助你识别何时**不**进行分析。如果你在4级和5级找不到清晰的答案，那么这是一个强烈的信号，表明分析目前还不值得进行。花时间明确战略背景比产生不会被使用的见解要好。
- en: I’ve seen data scientists go from the PM’s request directly to writing code,
    then wonder why their beautiful analysis gets ignored. The ladder forces you to
    do the strategic work upfront, when it’s most valuable and least expensive.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 我看到数据科学家直接从产品经理的请求跳到编写代码，然后 wonder 为什么他们漂亮的分析被忽视了。这个阶梯迫使你在最有价值和最不昂贵的时候做战略工作。
- en: This is how you move from being a “ticket-taker” to a strategic partner. An
    important differentiator from a Level 1 data scientist and a Level 3 one is that
    at Level 1 you’re a strong contributor, but at Level 3 you’re up-leveling the
    entire team. Using the ladder won’t just improve your questions, it will improve
    your stakeholders’ questions too.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是如何从“票务员”转变为战略伙伴。与第1级数据科学家和第3级数据科学家的一个重要区别是，在第1级，你是一个强大的贡献者，但在第3级，你是在提升整个团队。使用这个阶梯不仅会改善你的问题，还会改善你的利益相关者的问题。
- en: The frameworks in this post—the three levels, the five question attributes,
    and the Question Ladder—aren’t just tools for better analysis. They’re a critical
    skill for transforming how you show up as a data scientist. Master them, and you’ll
    find that the right questions don’t just improve your work—they elevate everyone
    around you.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 本文中的框架——三个级别、五个问题属性和问题阶梯——不仅仅是更好的分析工具。它们是转变你作为数据科学家展现方式的关键技能。掌握它们，你会发现正确的问题不仅能提高你的工作，还能提升周围人的水平。
- en: '* * *'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '**Did this post spark your curiosity about becoming a more strategic data scientist?**
    *I expand on these frameworks—and many others—in my new book* [The Strategic Data
    Scientist: How to Level Up and Thrive in the Age of AI](https://amzn.to/470s3YN)
    *(Affiliate link). I wrote it because throughout my career I’ve seen too many
    data scientists struggle to connect their technical work to the business problems
    that actually matter. If there’s one takeaway, it’s this: the best defense against
    AI isn’t more code, it’s a different way to think.*'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: '**这篇帖子是否激发了你成为更具战略性的数据科学家的好奇心？** *我在我的新书《战略数据科学家：如何在人工智能时代提升自己并茁壮成长》（[The Strategic
    Data Scientist: How to Level Up and Thrive in the Age of AI](https://amzn.to/470s3YN)）中扩展了这些框架——以及许多其他框架。我写这本书是因为在我的整个职业生涯中，我看到了太多的数据科学家在将他们的技术工作与真正重要的业务问题联系起来时遇到困难。如果有一个要点，那就是：对抗AI的最佳防御不是更多的代码，而是一种不同的思维方式。*'
- en: '*If you’d like to go deeper, you can buy the book now on [Amazon](https://amzn.to/470s3YN)—and
    start putting these frameworks into practice.* *Paperback and hardcover versions
    will be available on September 30th*.'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '*如果您想深入了解，现在就可以在[亚马逊](https://amzn.to/470s3YN)购买这本书——并开始将这些框架付诸实践。* *平装本和精装本将于9月30日上市*。'
