- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: With all data in dataframes it becomes a simple step to do spatial selections.
    The following code snippet^& shows how to select the buildings within the boundaries
    of the Loppersum municipality, and separately makes a selection of buildings that
    existed throughout the period (point cloud AHN-2 data was acquired in 2009 in
    this region). This resulted in 1196 buildings, out of the 2492 buildings currently.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: 'The three AHN versions used (2,3 and 4), further named as T1, T2 and T3 respectively,
    are then clipped based on the selected building data. The [`AggregatePoints`](https://developers.arcgis.com/geoanalytics-fabric/tools/aggregate-points/)
    function can be utilized to calculate, in this case from the height (z-values)
    some statistics, like the mean per roof, the standard deviation and the number
    of z-values it is based upon; see the code snippet:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: 'Step 3: Aggregate and Regress'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As the GeoAnalytics function [Geographically Weighted Regression (GWR)](https://developers.arcgis.com/geoanalytics-fabric/tools/gwr/)
    can only work on point data, from the building polygons their centroid is extracted
    with the [`centroid`](https://developers.arcgis.com/geoanalytics-fabric/sql-functions/st_centroid/)
    function. The 3 dataframes are joined to one, see also the notebook, and it is
    ready to perform the GWR function. In this instance, it predicts the height for
    T3 (AHN4) based on local regression functions.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: The model diagnostics can be consulted for the predicted z value, in this case,
    the following results were generated. Note, again, that these results cannot be
    used for real world applications as the data and methodology might not best fit
    the purpose of subsidence modelling — it merely shows here Fabric GeoAnalytics
    functionality.
  prefs: []
  type: TYPE_NORMAL
