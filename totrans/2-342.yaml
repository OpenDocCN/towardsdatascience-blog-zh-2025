- en: Summary
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: This blog post discusses the significance of geographical data. It highlights
    the challenges posed by increasing data volumes on geospatial data systems and
    suggests that traditional big data engines must adapt to handle geospatial data
    efficiently. Here, an example is presented on how to use the Microsoft Fabric
    Spark compute engine and its integration with the ESRI GeoAnalytics engine for
    effective geospatial big data processing and analytics.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 这篇博客文章讨论了地理数据的重要性。它强调了数据量增加对地理空间数据系统带来的挑战，并建议传统的大数据引擎必须适应以有效地处理地理空间数据。在这里，展示了如何使用Microsoft
    Fabric Spark计算引擎及其与ESRI GeoAnalytics引擎的集成，以进行有效的地理空间大数据处理和分析。
- en: Opinions here are mine.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 这里的观点是我的。
