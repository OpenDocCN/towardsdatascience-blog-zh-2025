- en: The Geospatial Capabilities of Microsoft Fabric and ESRI GeoAnalytics, Demonstrated
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 展示 Microsoft Fabric 和 ESRI GeoAnalytics 的地理空间功能
- en: 原文：[https://towardsdatascience.com/geospatial-capabilities-of-microsoft-fabric-and-esri-geoanalytics-demonstrated/](https://towardsdatascience.com/geospatial-capabilities-of-microsoft-fabric-and-esri-geoanalytics-demonstrated/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/geospatial-capabilities-of-microsoft-fabric-and-esri-geoanalytics-demonstrated/](https://towardsdatascience.com/geospatial-capabilities-of-microsoft-fabric-and-esri-geoanalytics-demonstrated/)
- en: <mdspan datatext="el1747287101152" class="mdspan-comment">The saying goes</mdspan>
    that 80% of data collected, stored and maintained by governments can be associated
    with geographical locations. Although never empirically proven, it illustrates
    the importance of location within data. Ever growing data volumes put constraints
    on systems that handle geospatial data. Common big data compute engines, originally
    designed to scale for textual data, need adaptation to work efficiently with geospatial
    data — think of geographical indexes, partitioning, and operators. Here, I present
    and illustrate how to utilize the [Microsoft Fabric](https://learn.microsoft.com/en-us/fabric/)
    Spark compute engine, with the natively integrated [ESRI GeoAnalytics engine](https://developers.arcgis.com/geoanalytics-fabric/)^#
    for geospatial big data processing and analytics.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1747287101152" class="mdspan-comment">俗话说</mdspan>，政府收集、存储和维护的
    80% 的数据可以与地理位置相关联。尽管从未经过经验证明，但它说明了地理位置在数据中的重要性。不断增长的数据量对处理地理空间数据的系统提出了限制。最初为扩展文本数据而设计的常见大数据计算引擎需要适应才能有效地与地理空间数据一起工作——想想地理索引、分区和运算符。在这里，我介绍并展示了如何利用
    [Microsoft Fabric](https://learn.microsoft.com/en-us/fabric/) Spark 计算引擎，该引擎与本地集成的
    [ESRI GeoAnalytics 引擎](https://developers.arcgis.com/geoanalytics-fabric/^#) 用于地理空间大数据处理和分析。
- en: The optional GeoAnalytics capabilities within Fabric enable the processing and
    analytics of vector-type geospatial data, where vector-type geospatial data refers
    to points, lines, polygons. These capabilities include more than 150 spatial functions
    to create geometries, test, and select spatial relationships. As it extends Spark,
    the GeoAnalytics functions can be called when using Python, SQL, or Scala. These
    spatial operations apply automatically spatial indexing, making the Spark compute
    engine also efficient for this data. It can handle 10 extra common spatial data
    formats to load and save data spatial data, on top of the Spark natively supported
    data source formats. This blog post focuses on the scalable geospatial compute
    engines as has been introduced in my post about [geospatial in the age of AI](https://medium.com/spatial-data-science/handling-geospatial-data-in-the-age-of-ai-9c751363e212).
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: Fabric 中的可选 GeoAnalytics 功能能够处理和分析矢量类型的地理空间数据，其中矢量类型的地理空间数据指的是点、线、多边形。这些功能包括超过
    150 个空间函数，用于创建几何形状、测试和选择空间关系。由于它扩展了 Spark，GeoAnalytics 函数可以在使用 Python、SQL 或 Scala
    时调用。这些空间操作自动应用空间索引，使得 Spark 计算引擎也适用于此类数据。它能够处理 10 种额外的常见空间数据格式来加载和保存空间数据，除了 Spark
    本地支持的数据源格式之外。本博客文章重点介绍了我在关于[人工智能时代的地理空间](https://medium.com/spatial-data-science/handling-geospatial-data-in-the-age-of-ai-9c751363e212)的帖子中介绍的可扩展地理空间计算引擎。
- en: Demonstration explained
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 演示说明
- en: Here, I demonstrate some of these spatial capabilities by showing the data manipulation
    and analytics steps on a large dataset. By using several tiles covering point
    cloud data (a bunch of x, y, z values), an enormous dataset starts to form, while
    it still covers a relatively small area. The open [Dutch AHN](https://www.ahn.nl/)
    dataset, which is a national digital elevation and surface model, is currently
    in its fifth update cycle, and spans a period of nearly 30 years. Here, the data
    from the second, third, and forth acquisition is used, as these hold full national
    coverage (the fifth just not yet), while the first version did not include a point
    cloud release (only the derivative gridded version).
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我通过展示在大数据集上的数据操作和分析步骤来演示这些空间功能。通过使用覆盖点云数据（一系列 x、y、z 值）的几个瓦片，一个庞大的数据集开始形成，尽管它仍然覆盖了一个相对较小的区域。目前，开放的
    [荷兰 AHN](https://www.ahn.nl/) 数据集，这是一个国家数字高程和表面模型，正处于第五次更新周期，跨越了近 30 年的时间。在这里，使用了第二次、第三次和第四次采集的数据，因为这些数据拥有全国覆盖（第五次尚未），而第一个版本没有包含点云发布（只有衍生的网格版本）。
- en: Another Dutch open dataset, namely [building data, the BAG](https://www.kadaster.nl/zakelijk/registraties/basisregistraties/bag/over-bag),
    is used to illustrate spatial selection. The building dataset contains the footprint
    of the buildings as polygons. Currently, this dataset holds more than 11 million
    buildings. To test the spatial functions, I use only 4 AHN tiles per AHN version.
    Thus in this case, 12 tiles, each of 5 x 6.25 km. Totalling to more than 3.5 billion
    points within an area of 125 square kilometers. The chosen area covers the municipality
    of Loppersum, an area prone to land subsidence due to gas extraction.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个荷兰公开数据集，即[建筑数据，BAG](https://www.kadaster.nl/zakelijk/registraties/basisregistraties/bag/over-bag)，用于说明空间选择。建筑数据集包含建筑的轮廓作为多边形。目前，此数据集包含超过1100万座建筑。为了测试空间函数，我使用每个AHN版本的4个AHN瓦片。因此，在这种情况下，共有12个瓦片，每个瓦片为5
    x 6.25平方公里。总面积超过125平方公里的3.5亿个点。所选区域覆盖了Loppersum市政区，这是一个由于天然气提取而容易发生地面沉降的区域。
- en: The steps to take include the selection of buildings within the area of Loppersum,
    selecting the x,y,z-points from the roofs of the buildings. Then, we bring the
    3 datasets into one dataframe and do an extra analysis with it. A spatial regression
    to predict the expected height of a building based on its height history as well
    as the history of the buildings in its direct surroundings. Not necessarily the
    best analysis to perform on this data to come to actual predictions* but it suits
    merely the purpose of demonstrating the spatial processing capabilities of Fabric’s
    ESRI GeoAnalytics. All the below code snippets are also available as [notebooks
    on github](https://github.com/delange/Fabric_GeoAnalytics).
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 需要采取的步骤包括在Loppersum区域内选择建筑，从建筑的屋顶选择x,y,z点。然后，我们将3个数据集合并到一个dataframe中，并对其进行额外分析。通过空间回归预测建筑预期高度，基于其高度历史以及其直接周围建筑的历史。这不一定是对这些数据进行实际预测的最佳分析，但它仅适用于展示Fabric的ESRI
    GeoAnalytics的空间处理能力。所有以下代码片段也作为[github上的notebooks](https://github.com/delange/Fabric_GeoAnalytics)提供。
- en: 'Step 1: Read data'
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第1步：读取数据
- en: Spatial data can come in many different data formats; we conform to the geoparquet
    data format for further processing. The BAG building data, both the footprints
    as well as the accompanied municipality boundaries, come in geoparquet format
    already. The point cloud AHN data, version 2, 3 and 4, however, comes as LAZ file
    formats — a compressed industry standard format for point clouds. I have not found
    a Spark library to read LAZ (please leave a message in case there is one), and
    created a txt file, separately, with the [LAStools](https://lastools.github.io/)^+
    first.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 空间数据可以以许多不同的数据格式存在；我们遵循地理帕克特数据格式进行进一步处理。BAG建筑数据，包括建筑轮廓以及伴随的市政边界，已经以地理帕克特格式提供。然而，点云AHN数据，版本2、3和4，以LAZ文件格式提供——这是一种用于点云的压缩行业标准格式。我还没有找到可以读取LAZ的Spark库（如果有，请留言），并使用[LAStools](https://lastools.github.io/)^+首先创建了一个单独的txt文件。
