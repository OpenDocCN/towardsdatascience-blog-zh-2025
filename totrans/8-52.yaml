- en: Easy Map Boundary Extraction with GeoPandas
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/easy-map-boundary-extraction-with-geopandas-7ee1465e1344/](https://towardsdatascience.com/easy-map-boundary-extraction-with-geopandas-7ee1465e1344/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: QUICK SUCCESS DATA SCIENCE
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '![Extracting a border imagined by DALL-E3](../Images/55ea1aec2d176ae734da2e395602564c.png)'
  prefs: []
  type: TYPE_IMG
- en: Extracting a border imagined by DALL-E3
  prefs: []
  type: TYPE_NORMAL
- en: I recently came across a geography game where you’re shown a segment of border
    between countries and asked to name them. Here’s an example; can you guess the
    two countries that share this border?
  prefs: []
  type: TYPE_NORMAL
- en: '![Guess this famous "open" border (by the author)](../Images/0e6ff21ed97f6cd33b9c46357763d53a.png)'
  prefs: []
  type: TYPE_IMG
- en: Guess this famous "open" border (by the author)
  prefs: []
  type: TYPE_NORMAL
- en: Here’s another "open" border. What’s the country to the north?
  prefs: []
  type: TYPE_NORMAL
- en: '![Guess the border (by the author)](../Images/e4f400f24a668e9430336a3c4c39348f.png)'
  prefs: []
  type: TYPE_IMG
- en: Guess the border (by the author)
  prefs: []
  type: TYPE_NORMAL
- en: 'What countries share this super long border:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Name that border! (by the author)](../Images/03a9f926079c2b8851e5a0bbe6c8819f.png)'
  prefs: []
  type: TYPE_IMG
- en: Name that border! (by the author)
  prefs: []
  type: TYPE_NORMAL
- en: 'Older Boomers may be familiar with this infamous border region:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Guess the border (by the author)](../Images/e841d9f9f2da6ae7f9321847a0adee7f.png)'
  prefs: []
  type: TYPE_IMG
- en: Guess the border (by the author)
  prefs: []
  type: TYPE_NORMAL
- en: In order these were the US-Mexico, US-Canada, Argentina-Chile, and Vietnam-Laos-Cambodia
    borders.
  prefs: []
  type: TYPE_NORMAL
- en: 'Besides testing your geographic knowledge, you can use extracted borders to
    make interesting infographics. Here, I show the length of the four longest shared
    borders:'
  prefs: []
  type: TYPE_NORMAL
- en: '![The top 4 longest shared borders (by the author)](../Images/c72a219039d1e047616f8c0bded87a45.png)'
  prefs: []
  type: TYPE_IMG
- en: The top 4 longest shared borders (by the author)
  prefs: []
  type: TYPE_NORMAL
- en: In this Quick Success Data Science project, we’ll use Python’s open-source GeoPandas
    geospatial library to extract, plot, and calculate the length of political borders.
    This process will also work with other borders stored in a shapefile, such as
    province, state, county, and municipal boundaries.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: The Process
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Here’s the high-level process we’ll use:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Load the shapefile**: use GeoPandas to load a shapefile containing country
    borders. A *shapefile* is a geospatial vector data format for geographic information
    system (GIS) software.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Filter to relevant countries**: use GeoPandas to filter the countries of
    interest into separate Geopandas GeoDataFrames.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Extract country boundaries:** Locate the country boundaries in the "Geometry"
    column of the GeoDataFrames. This column contains the coordinates used to draw
    the boundaries.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Find the shared borders:** Identify shared borders by computing the intersection
    of the primary country’s boundary with the boundaries of the adjacent countries.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Create a list of border coordinates:** Convert the border data from a geometry
    object (*e.g.*, `LineString` or `MultiLineString`) to a list.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Plot the borders:** Plot the borders as a GeoPandas `GeoSeries`.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: We’ll also look at how to calculate the length of a border.
  prefs: []
  type: TYPE_NORMAL
- en: 'For an overview of shapefiles and GeoPandas, including installation instructions,
    please refer to this article:'
  prefs: []
  type: TYPE_NORMAL
- en: '[**Comparing Country Sizes with GeoPandas**](https://towardsdatascience.com/comparing-country-sizes-with-geopandas-2ce027282ba0)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Download the Shapefile
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '[Natural Earth](https://www.naturalearthdata.com/) is a public domain dataset
    that includes shapefiles. You can download the *country boundaries* shapefile
    [here](https://www.naturalearthdata.com/downloads/10m-cultural-vectors/) (see
    figure below). This is Natural Earth’s most detailed dataset at a scale of 1:10,000,000
    (1 cm = 100 km).'
  prefs: []
  type: TYPE_NORMAL
- en: '![Click the Download link highlighted in yellow (Natural Earth webpage)](../Images/6c38bff592dff2191940bc7472f3a540.png)'
  prefs: []
  type: TYPE_IMG
- en: Click the Download link highlighted in yellow (Natural Earth webpage)
  prefs: []
  type: TYPE_NORMAL
- en: The link highlighted in the previous figure will download the _ne_10m_admin_0*countries.zip*
    file. There’s no need to unzip it as GeoPandas can handle zipped data. Store it
    in the same folder as your Python script or notebook for convenience.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Full Code
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The full annotated code follows. I’ll describe it in more detail in the sections
    that follow.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'This code plots the shared border of Venezuela, Colombia, and Guyana:'
  prefs: []
  type: TYPE_NORMAL
- en: '![The border between Venezuela, Colombia, and Guyana (by the author)](../Images/f79a46b3b54577484305621fce775bba.png)'
  prefs: []
  type: TYPE_IMG
- en: The border between Venezuela, Colombia, and Guyana (by the author)
  prefs: []
  type: TYPE_NORMAL
- en: Importing Libraries and Assigning Constants
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Start by importing Matplotlib (for plotting) and GeoPandas (for working with
    the shapefiles). Next, we assign constants for the name of the primary country
    (COUNTRY1_NAME) and the names of the adjoining countries (COUNTRY2_NAME) that
    share its border. The latter variable uses a Python *list* of one or more country
    names.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: '**NOTE:** The country names used as constants must match the names in the shapefile.
    We’ll look at this more in the next section.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Loading and Preparing the Shapefiles
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now we load the downloaded shapefile as a GeoDataFrame named "gdf." Note how
    we don’t need to unzip the shapefile.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: The Natural Earth shapefile uses the nonsensical name "ADMIN" for the country
    name column. We can fix this using the GeoPandas `rename()` method.
  prefs: []
  type: TYPE_NORMAL
- en: Next, we create two new GeoDataFrames using the newly minted "name" column.
    For the first (`country1`) we filter with COUNTRY1_NAME. As the COUNTRY2_NAME
    variable is a list, we add a twist and use the `isin()` method. That way, any
    matching names in the list are used for filtering.
  prefs: []
  type: TYPE_NORMAL
- en: 'Speaking of matching names, if you’re unsure how a country name is spelled
    or stored in the GeoDataFrame (such as, "United States of America" vs. "USA"),
    you can print all the names using this command:'
  prefs: []
  type: TYPE_NORMAL
- en: '`print(gdf[''name''].unique())`'
  prefs: []
  type: TYPE_NORMAL
- en: Finding the Shared Borders
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: With the data loaded in GeoDataFrames, we now extract the borders for each country
    and find where they intersect.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: To extract a border, we chain GeoPandas’ `boundary` operation with Shapely’s
    `unary_union` property (Shapely is a library that GeoPandas uses under the hood
    for geometric operations). The first part produces a `GeoSeries` of Shapely `LineString`
    or `MultiLineString` objects. The second part aggregates multiple geometries by
    performing a union operation across all the geometries in the `GeoSeries` (*e.g.*,
    from `country1.boundary`). It returns a single Shapely `Geometry` object (*e.g.*,
    a `LineString`, `MultiLineString`, or `GeometryCollection`).
  prefs: []
  type: TYPE_NORMAL
- en: The next step identifies the shared border using Shapely’s `intersection()`
    method. This method calculates the overlapping part of the two geometries, such
    as lines or polygons. It returns one of many Shapely geometry objects depending
    on the input geometries and their spatial relationship. Examples include line
    strings, points, polygons, and more.
  prefs: []
  type: TYPE_NORMAL
- en: Because of the potentially complex output from the `intersection()` method,
    we must check that the datatypes are valid for working with lines. We accomplish
    this with a block of conditionals that returns the final border coordinates as
    a Python list of Shapely geometries.
  prefs: []
  type: TYPE_NORMAL
- en: Plotting the Results
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The remainder of the code plots the border. After setting up the figure, we
    convert `borders` from a list to a GeoSeries (`gpd.GeoSeries(borders)`) and call
    `plot()` on this object.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: Using a GeoSeries for plotting is preferred because GeoPandas’ plotting functionality
    integrates with geographic projections and allows for more advanced handling of
    spatial data.
  prefs: []
  type: TYPE_NORMAL
- en: Calculating the Length of the Border
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '*In theory*, we can calculate the length of a border after extracting it. The
    first step is to convert the GeoDataFrame’s coordinate reference system (CRS)
    to an equal area projection (*e.g.*, EPSG:2163) after loading the data:'
  prefs: []
  type: TYPE_NORMAL
- en: '`gdf = gdf.to_crs(''EPSG:2163'')`'
  prefs: []
  type: TYPE_NORMAL
- en: 'Then, after extracting the border as a list of Shapely geometries, we could
    run the following code:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: Each geometry in `borders` (e.g., `LineString` or `MultiLineString`) has a `.length`
    property provided by Shapely. This attribute is the calculated length of the geometry
    in the units of the current CRS of the data.
  prefs: []
  type: TYPE_NORMAL
- en: Unfortunately, we won’t get accurate results with our Natural Earth dataset.
    According to their website, it’s designed to "[show the world on a large wall
    poster](https://www.naturalearthdata.com/downloads/)." This means it smooths out
    details for simplicity.
  prefs: []
  type: TYPE_NORMAL
- en: 'Calculating the true length of a country’s border is tricky business. You need
    a very high-resolution shapefile to handle *rugose* borders. For example, consider
    the boundary of Russia and Kazakhstan, which in places follows a meandering river:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Part of the Kazakhstan-Russia border (source: Google Maps)](../Images/ff182a04ec460a97c4bc06ba8e0e13b0.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Part of the Kazakhstan-Russia border (source: Google Maps)'
  prefs: []
  type: TYPE_NORMAL
- en: Most shapefiles won’t capture every twist and turn of this border, so we’ll
    underestimate its length. Of course, we’ll never know the *true* length of any
    border, as we’ll never have a shapefile with *infinite* resolution.
  prefs: []
  type: TYPE_NORMAL
- en: In addition to hi-res shapefiles, you may need to use multiple CRSs. Latitude-dependent
    distortions in geographic CRSs make lengths appear shorter or longer depending
    on proximity to the poles. Borders spanning more than six degrees of latitude
    or longitude should be divided into segments and reprojected using an appropriate
    *local* CRS that minimizes distortion in each segment. Options include [UTM zones](https://en.wikipedia.org/wiki/Universal_Transverse_Mercator_coordinate_system)
    or other locally optimized projections.
  prefs: []
  type: TYPE_NORMAL
- en: The method of measurement is also critical. Length calculations for long borders
    should be done using *[geodesic methods](https://www.ncesc.com/geographic-faq/what-is-planar-and-geodesic-measurement/)*,
    which account for the curvature of the Earth. GIS tools like GeoPandas support
    geodesic length calculations when using a geographic CRS.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: GeoPandas has tools that help you find and extract boundary lines shared between
    map regions. Once extracted, the boundaries can be plotted and measured. The accuracy
    of these measurements depends on the resolution of the shapefile and the projection
    and measurement methods used.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Thanks!
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Thanks for reading and please follow me for more *Quick Success Data Science*
    projects in the future.
  prefs: []
  type: TYPE_NORMAL
