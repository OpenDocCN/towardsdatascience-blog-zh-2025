- en: Software Engineering in the LLM Era
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/software-engineering-in-the-llm-era/](https://towardsdatascience.com/software-engineering-in-the-llm-era/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1751484315559" class="mdspan-comment">In the broad software</mdspan>
    engineering space, debates about whether using LLMs in coding is a good or a bad
    idea are raging. On the extremes, there are some people who think that any use
    of LLMs in coding is indefensible, and other people are ready to throw out the
    whole field of software engineering as too expensive and unnecessary. I’m fascinated
    by this discussion, particularly from my sociologist’s perspective, because so
    much of the conversation seems to be about [whether](https://www.zdnet.com/article/10-professional-developers-on-vibe-codings-true-promise-and-peril/)
    [an LLM](https://www.techdirt.com/2025/06/03/how-i-built-a-task-management-tool-for-almost-nothing/)
    [is useful](https://www.baldurbjarnason.com/2025/trusting-your-own-judgement-on-ai/).
    Is it so fatally flawed that it’s a total waste of time, or is it so unimaginably
    powerful that it’s a fool’s errand to avoid it? Instead of thinking about it so
    narrowly, I actually really want to talk about the broader context of software
    engineering in the context of LLM technology. (I consider software engineering
    only adjacent to my field of machine learning engineering, but I have worked alongside
    many extremely talented SWEs in my career, at tech companies of various sizes,
    and I’ve had the chance to observe the role quite closely. Some of the analysis
    below also applies to the MLE field, but not all of it.)
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: Context
  id: totrans-3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: During my own career I’ve seen a lot change in the American tech economy, and
    in the way the job of “coding” has been perceived and described. It’s a bit of
    a trope but it was certainly true for a period of time that “learning to code”
    was touted as the fastest way to a white collar career with a steady paycheck
    and future-proof prospects, both for young people and for career-changers trying
    to find a place in the shifting economy. [Coding bootcamps came and (mostly) went](https://www.insidehighered.com/news/tech-innovation/teaching-learning/2025/01/09/changes-boot-camp-marks-signal-shifts-workforce),
    for a time giving people a relatively quick way to gain the foundational skills
    of the job.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: In many fields, however, shortages of qualified employees can swiftly turn into
    a glut of talent with nowhere to go (ask lawyers), especially when high or at
    least comfortable salaries are on offer. While some people think this is happening
    in software engineering, it’s not clear if that’s necessarily the case yet, because
    there are other factors in play too. In the mid-2010s, many tech companies and
    startups were scrambling for hyper-growth and hiring as fast as possible, using
    cheap venture capital to fund their expansions without regard for profitability,
    but that’s definitively over now. Tech layoffs, including many software engineers,
    exploded in the years immediately following the start of the COVID pandemic, in
    large part as a response to the unsustainable hiring of preceding years and the
    sudden jolt to the economy of lockdowns. After that period of layoffs, hiring
    for SWE talent slowed in many sectors. Developer skillsets are diversifying and
    specializing, so there may still be sub-fields with strong hiring, but a lot of
    young SWEs in particular are struggling to break in.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，在许多领域，合格员工的短缺可以迅速转变为人才过剩，无处可去（问问律师吧），尤其是在提供高薪或至少舒适薪资的情况下。虽然有些人认为这种情况正在软件工程领域发生，但还不清楚这是否一定是必然的，因为还有其他因素在起作用。在2010年代中期，许多科技公司和小型初创公司都在为超速增长而争抢，尽可能快地招聘，使用廉价的创业资本来资助他们的扩张而不考虑盈利能力，但现在这已经结束了。COVID大流行开始后不久，科技行业裁员，包括许多软件开发工程师，爆炸性地增加，这在很大程度上是对之前几年不可持续招聘的回应和对封锁经济突然冲击的应对。在那段裁员期之后，许多领域的SWE人才招聘放缓。开发技能正在多样化并专业化，因此可能仍然有一些子领域有强劲的招聘需求，但许多年轻的SWE特别难以进入。
- en: Junior vs Senior
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 初级与高级
- en: This brings us around to now. Some people argue that there aren’t too many software
    engineers, but there are too many inexperienced or junior software engineers,
    and that employers are still desperate for experienced hires. What does that really
    mean? Is it true? Without doing academic research to really investigate (if anyone
    has done good research on this question, please send it to me!), we can still
    take a look at the issues involved. First, let’s define terms.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 这就带我们来到了现在。有些人认为软件工程师并不多，但缺乏经验或初级软件工程师太多，而且雇主仍然迫切需要经验丰富的招聘人员。这究竟意味着什么？这是真的吗？没有进行学术研究来真正调查这个问题（如果有人对这个问题进行了很好的研究，请把它发给我！），我们仍然可以看看涉及的问题。首先，让我们定义一下术语。
- en: I’m not using anybody’s in-house leveling terms, or talking about job titles
    here, but I want to clarify what the differences might be in someone’s role depending
    on the experience and skills they bring.
  id: totrans-8
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我在这里不使用任何人的内部级别术语，也不谈论职位名称，但我想澄清，根据他们带来的经验和技能，某人的角色可能会有哪些不同。
- en: A junior SWE is someone who needs quite a bit of support, coaching, and managing
    to produce good quality work. They’re not yet at a place of working independently
    or mentoring others. They are still learning how the job is done. This doesn’t
    mean they don’t produce value! Junior engineers do write code and get work done,
    and they can often learn very quickly and become more productive. However, a senior
    SWE is someone who can be expected to work mostly independently, with minimal
    supervision required for good work to be done and goals to be met, and they can
    be relied on to help those junior folks along. They start to be able to solve
    more difficult problems, write elegant code that is high quality, and even begin
    being part of strategy conversations about how to build your whole codebase for
    the long haul.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 一名初级软件开发工程师（SWE）需要相当多的支持、指导和管理工作才能产出高质量的工作。他们还没有达到独立工作或指导他人的水平。他们仍在学习如何完成这项工作。这并不意味着他们不产生价值！初级工程师确实会编写代码并完成工作，而且他们通常能快速学习并提高生产力。然而，一名高级SWE是可以预期主要独立工作的人，完成高质量工作和达成目标所需的监督最少，他们可以依靠来帮助那些初级人员。他们开始能够解决更复杂的问题，编写高质量、优雅的代码，甚至开始参与关于如何构建整个代码库以实现长期发展的战略讨论。
- en: This is more or less the pattern for most skilled professions — you’ll learn
    some amount of what you need to know from schooling or training, but you really
    learn how to be a member of the profession and do the job from experience and
    practice. There’s no set rule about how much time it takes for you to go from
    junior to senior in this framework, because it’s all about what you can do and
    the capabilities you have. Your perceived value as a worker (and your pay) go
    up as you get better at the job over time.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 这基本上是大多数熟练职业的模式——你会从学校或培训中学到你需要知道的一些知识，但你真正学会如何成为该职业的一员并完成工作是通过经验和实践。在这个框架中，从初级到高级所需的时间没有固定的规则，因为这完全取决于你能够做什么以及你拥有的能力。随着时间的推移，你在工作中的表现越好，作为工人的感知价值（以及你的薪酬）就越高。
- en: LLMs Enter Stage Left
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: LLMs Enter Stage Left
- en: With this, we can start to inquire about how that shifts, and how the existence
    of LLMs and LLM based coding tools actually may (to use a cliche) disrupt the
    context of the profession now.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，我们可以开始探讨这种变化，以及LLM和基于LLM的编码工具的存在实际上可能（用一种陈词滥调）如何扰乱目前的职业环境。
- en: As an individual, if you’re a senior SWE, you might find an LLM tool like Github
    Copilot or Cursor handy for doing scut work, such as getting unit tests working,
    writing basic docs, or sketching out the start of a project that you’ll then fill
    in based on your own knowledge. However, your own knowledge is really vital for
    this to be effective. As we in machine learning will tell you, LLM output is probabilistic
    at its core. If the training data has many examples of code that are relevant
    to what you’re doing, it’s going to be reasonably likely to produce code for you
    that works. But sooner or later (probably sooner) it’s going to generate something
    that won’t work. That might be failing loudly or failing silently, it might be
    opening up a security hole, or it might just be a suboptimal way of doing a task.
    The thing that matters at that point is what you do in response.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 作为个人，如果你是一名高级软件开发工程师（SWE），你可能会发现像Github Copilot或Cursor这样的LLM工具在做一些琐碎的工作时很有用，比如让单元测试工作，编写基本文档，或者勾勒出一个项目的大致轮廓，然后根据你自己的知识来填充。然而，你自己的知识对于这个效果来说至关重要。正如我们在机器学习领域会告诉你的，LLM的输出在本质上具有概率性。如果训练数据中有许多与你正在做的事情相关的代码示例，那么它为你生成有效代码的可能性是相当高的。但迟早（可能更早）它会生成一些无法工作的代码。这可能是一次明显的失败或无声的失败，可能是一个安全漏洞，或者可能只是完成任务的一种次优方式。在那个时刻，重要的是你如何应对。
- en: Assuming you are a senior SWE with significant experience writing all this stuff
    by hand yourself, you have the skills to spot the mistakes, and figure out how
    to fix them smoothly so the end product works well. The LLM probably makes you
    more productive in the end, because you could abstract away some of the work that
    isn’t interesting and doesn’t require much thought. If you’re not a senior person,
    well, then you may end up going back to the LLM to ask it to fix its own mistakes.
    And it might do that, but there’s always a risk of another mistake being introduced,
    and on down the road. There’s really no telling how long this could take, and
    it’s hard to compare the time with how long it would have taken you to learn the
    underlying code and just solve it yourself.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你是一名有丰富经验的资深SWE，自己亲手编写了所有这些内容，你拥有发现错误并找出如何平滑地修复它们以使最终产品良好的技能。LLM最终可能使你更有效率，因为你可以将一些不有趣且不需要太多思考的工作抽象出来。如果你不是资深人员，那么你可能最终会回到LLM那里，请求它修复自己的错误。它可能会这样做，但总是存在引入另一个错误的风险，并且随着时间的推移，错误可能会越来越多。实际上很难预测这需要多长时间，也很难将其与你自己学习底层代码并自行解决问题的所需时间进行比较。
- en: However, lots of people will argue that the LLM repeating workflow is fine.
    People may believe that just being there to click the hover button to tell Copilot
    to “Fix” over and over again is sufficient, even if it’s not a particularly satisfying
    job. However, there are serious arguments to be made that the output will be seriously
    flawed, whether in readability, maintainability, security holes, or other aspects.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，很多人可能会争论说，LLM重复工作流程是可行的。人们可能认为，只是在那里点击悬停按钮，一遍又一遍地告诉Copilot“修复”就足够了，即使这不是一项特别令人满意的工作。然而，有严重的论点可以提出，输出将严重有缺陷，无论是在可读性、可维护性、安全漏洞还是其他方面。
- en: '*“Sure, Gen AI supercharges development, but it also supercharges risk. Two
    engineers can now churn out the same amount of insecure, unmaintainable code as
    50 engineers.” — *[https://www.zdnet.com/article/10-professional-developers-on-vibe-codings-true-promise-and-peril/](https://www.zdnet.com/article/10-professional-developers-on-vibe-codings-true-promise-and-peril/)'
  id: totrans-16
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*“当然，通用人工智能（Gen AI）加速了开发，但也加速了风险。现在两个工程师可以产生与50个工程师相同数量的不安全、难以维护的代码。”—*[https://www.zdnet.com/article/10-professional-developers-on-vibe-codings-true-promise-and-peril/](https://www.zdnet.com/article/10-professional-developers-on-vibe-codings-true-promise-and-peril/)*'
- en: This question has been addressed by many writers recently. However, I’m less
    interested at this moment in whether Copilot can get to the desired result eventually
    than I am in what this process and way of working does to us.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 最近许多作家都提到了这个问题。然而，我此刻对Copilot最终能否达到预期结果不太感兴趣，我更感兴趣的是这个过程和工作方式对我们产生了什么影响。
- en: Broaden the Aperture
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 扩大视野
- en: Remember that we’re here to talk about the effect of the LLM on the profession.
    In the pre-AI era, a junior engineer would start working on a ticket, and make
    some mistakes, introduce a bug or two, and they’d basically be armed with StackOverflow
    and the docs, plus peers to collaborate with for help, to figure out how to get
    it right. Once they muddled through and got the code working, they’d make a PR
    and get feedback from more experienced peers, who would offer recommendations
    and corrections. Once those corrections were made, a PR could be approved and
    merged.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，我们在这里讨论的是LLM对职业的影响。在人工智能时代之前，一个初级工程师会开始处理一个工单，并犯一些错误，引入几个bug，他们基本上会依靠StackOverflow和文档，以及同事的帮助来合作解决问题。一旦他们摸索出正确的方法并使代码工作，他们会提交一个Pull
    Request（PR）并从更有经验的同事那里获得反馈，这些同事会提供建议和修正。一旦这些修正被采纳，PR就可以被批准并合并。
- en: I think the “muddling through” part of this process is actually pedagogically
    and professionally quite important. Once you’ve passed through the academic preparation
    for the software engineering role, the practical preparation is what you need
    to develop the capabilities to grow. I am a strong believer in the idea that making
    mistakes and fixing them is a tremendously valuable way to learn. Once the junior
    dev working on that bit of code has worked hard, fixed their own bugs, written
    the tests and docs, and gone through PR review, they know that bit of code better
    than any other person around. That process is the productive cognitive labor that
    brings them a step closer to being an engineer who can work independently, and
    take on more senior responsibilities successfully.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为这个过程中的“摸索”部分在教育和职业发展方面实际上非常重要。一旦你通过了软件工程角色的学术准备，实际准备就是你需要发展能力的步骤。我坚信犯错并改正它们是学习的一种极其宝贵的方式。一旦负责那部分代码的初级开发人员努力工作，修复了自己的bug，编写了测试和文档，并经历了PR审查，他们会比周围任何人都更了解那部分代码。这个过程是富有成效的认知劳动，使他们更接近成为一个能够独立工作并成功承担更高级职责的工程师。
- en: On Being Efficient
  id: totrans-21
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关于效率
- en: However, from the outside, this process looks slow. It looks like they had to
    spend a lot of time flailing around to just get to the end result of code that
    works, and surely it would be more efficient to either just make an LLM do it,
    or make a senior dev do it?
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，从外部来看，这个过程似乎很慢。它看起来他们不得不花费大量时间四处摸索，才能得到一个能够工作的代码最终结果，难道不是直接让一个大型语言模型（LLM）来做，或者让一个资深开发者来做会更有效率吗？
- en: If efficiency is your only criteria, then sure, maybe this is true. But I want
    to push back strongly on the premise. We do lots of things without thinking about
    broader context or impact, especially in the tech industry, and prioritizing efficiency
    today at all costs is a recipe for future disaster. Let’s spin out the narrative
    a bit — if efficiency is the priority, either we have an LLM do the bulk of the
    work, or a senior dev does it, or maybe a bit of both, like an LLM does the first
    stab and a senior dev reviews it. Setting aside any questions of quality (about
    which there should be questions), what’s the role of a junior SWE in this space?
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 如果效率是你的唯一标准，那么当然，这可能是对的。但我强烈反对这个前提。我们在很多情况下都没有考虑更广泛的背景或影响，尤其是在科技行业，不惜一切代价优先考虑效率是未来灾难的配方。让我们稍微展开这个叙述——如果效率是优先考虑的，那么我们可能让LLM完成大部分工作，或者让资深开发者来做，或者两者兼而有之，比如LLM先尝试，然后资深开发者进行审查。抛开任何关于质量的问题（对此应该有所质疑），在这个空间中，初级软件开发工程师（SWE）的角色是什么？
- en: Does a junior SWE watch the LLM do most of the coding? Do they just exist as
    an observer? Do they click “ok” from time to time as the LLM goes along, exemplifying
    “vibe coding”? Or do they not exist at all in this scenario? [Loud voices in the
    AI space certainly are arguing that they disappear altogether](https://www.bloodinthemachine.com/p/how-ai-is-killing-jobs-in-the-tech-f39).
    If so, in the immediate moment, employers in tech save a significant amount of
    money on salaries, so stock price goes up.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 初级SWE会看着LLM完成大部分编码吗？他们只是作为观察者存在吗？当LLM进行时，他们偶尔点击“确定”，这体现了“感觉编码”？或者在这个场景中他们根本不存在？[AI领域的响亮声音确实在争论他们完全消失](https://www.bloodinthemachine.com/p/how-ai-is-killing-jobs-in-the-tech-f39)。如果是这样，在短期内，科技行业的雇主在工资上节省了大量的钱，因此股价上涨。
- en: The idea of vibe coding is using an LLM based tool to write the code for your
    project, with minimal actual hand-writing of code involved. The name comes from
    the principle that you behind the keyboard have a general sense of the “vibe”
    of what you want your result to be, but you either don’t know how to do it yourself
    or don’t want to do it yourself, so you’re outsourcing the cognitive work of coding
    to a computer. You’ll just describe the broad strokes of what you want, in human
    language, and let the LLM figure out a way to achieve that through code.
  id: totrans-25
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 感觉编码的概念是使用基于LLM的工具来编写你的项目代码，实际手写代码的量最小。这个名字来源于这样一个原则：你坐在键盘后面对想要得到的结果有一个大致的“感觉”，但你要么不知道如何自己完成，要么不想自己完成，所以你将编码的认知工作外包给计算机。你只需用人类语言描述你想要的总体轮廓，然后让LLM找出通过代码实现这一目标的方法。
- en: Hollowing
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 空洞化
- en: However, we know that a healthy profession needs to be bringing in new talent
    as senior staff progress and eventually retire. Senior engineers are still being
    sought after, because they can solve the problems and write the complex code that
    neither junior devs nor LLMs can produce. Their experience and skills are undeniably
    valuable and necessary to good software being produced. But where do we think
    senior engineers come from? Just like senior doctors, or senior attorneys, they
    start out as junior people. Their capabilities must be acquired through experience.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我们知道一个健康的职业需要随着资深员工的晋升和最终退休而引入新的人才。资深工程师仍然很受欢迎，因为他们可以解决只有初级开发人员和LLM都无法解决的问题，并编写复杂的代码。他们的经验和技能无疑是宝贵的，对于生产高质量的软件是必要的。但我们要认为资深工程师是从哪里来的呢？就像资深医生或资深律师一样，他们都是从初级人员开始的。他们的能力必须通过经验来获得。
- en: If we build a working environment where junior software engineers no longer
    exist, we are hollowing out the pipeline of talent the profession needs. Instead
    of having a funnel of talent from academic study into the field, young people
    have no real way to get to the level of experience that is in highest demand.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们构建一个没有初级软件工程师的工作环境，我们就在削弱这个职业所需人才管道。而不是有一个从学术研究到该领域的才能漏斗，年轻人没有真正的方法达到最需要经验水平。
- en: Conclusions
  id: totrans-29
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: I appreciate readers coming along with me on this discussion, because it’s important
    to think about the technology we make ubiquitous not just from our own individual
    perspectives but from a broader view. How we employ LLM technology in the field
    of software engineering will have a serious impact on the future of the profession
    and what it looks like — and, I’d argue, this is true for many other fields as
    well where incorporating LLMs is becoming fashionable. I’m not arguing for zero
    LLM usage in coding, by any means — it can be incredibly useful if you have the
    experience and skills to make the most of it. (There are many important conversations
    to have about how it may impact our skill levels and the maintenance of our skills,
    but that’s a different topic for another day.)
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 我很感激有读者与我一同参与这次讨论，因为思考我们普遍采用的技术不仅仅是从我们个人的角度出发，还要从更广阔的视角来看待是非常重要的。我们在软件工程领域如何运用LLM技术将对职业的未来以及其形态产生重大影响——我敢说，这在许多其他领域也是如此，在这些领域中，整合LLMs正变得流行。我并不是在主张在编码中完全不使用LLM——如果你有经验和技能充分利用它，它可以非常有用。（关于它可能对我们技能水平的影响以及我们技能的维护，有许多重要的对话要谈，但这将是另一天的不同话题。）
- en: But in any profession, senior practitioners don’t just appear — they’re created,
    and that process of creation takes work and time, and may not be the most immediately
    “efficient” thing to do. Efficiency in the immediate moment just isn’t the most
    important thing — it can’t be, if we want the future to be bright.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 但在任何职业中，资深从业者并不是突然出现的——他们是经过培养的，这个过程需要付出努力和时间，可能不是最直接“高效”的事情去做。在当下的效率并不是最重要的事情——如果我们希望未来光明，它就不能是最重要的。
