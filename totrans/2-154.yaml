- en: Tracking Drill-Through Actions on Power BI Report Titles
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/tracking-drill-through-actions-on-power-bi-report-titles/](https://towardsdatascience.com/tracking-drill-through-actions-on-power-bi-report-titles/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1752518663105" class="mdspan-comment">Introduction</mdspan>
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Imagine this situation:'
  prefs: []
  type: TYPE_NORMAL
- en: 'We have two Reports:'
  prefs: []
  type: TYPE_NORMAL
- en: One showing data for Online sales over time, and compared to the previous year
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: One showing data for Retail sales over time, and compared to the previous year
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We have one details page, which serves as a drill-through target from both pages,
    displaying detailed information about sales.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/0ddb418e346a25fe6e5778a5b0629ed4.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1 – Scenario, where we have two report pages, which both point to the
    same drill-through page (Figure by the Author)
  prefs: []
  type: TYPE_NORMAL
- en: 'The question now is: How can we know which page was the originating page from
    the drill-through?'
  prefs: []
  type: TYPE_NORMAL
- en: Here is how we can create a solution for a dynamic title on the drill-through
    page showing the originating page.
  prefs: []
  type: TYPE_NORMAL
- en: Preparing the Data Model
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The first step is to store information about the currently active page before
    performing the drill-through action.
  prefs: []
  type: TYPE_NORMAL
- en: Unfortunately, DAX has no function for getting the name of the current page.
  prefs: []
  type: TYPE_NORMAL
- en: Therefore, we must create a custom solution.
  prefs: []
  type: TYPE_NORMAL
- en: The first step is to create a table with the names of all the pages in the report.
  prefs: []
  type: TYPE_NORMAL
- en: I do this with the “Enter Data” feature.
  prefs: []
  type: TYPE_NORMAL
- en: 'There I create this table:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/859391305fb2db14909064e6af04a429.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2 – Creating the “Report Pages” table with the Enter Data feature (Figure
    by the Author)
  prefs: []
  type: TYPE_NORMAL
- en: Here, I must enter all the report pages, which can be an originating page for
    a drill-through action.
  prefs: []
  type: TYPE_NORMAL
- en: Note that the names entered in the table will be displayed on the drill-through
    page. Therefore, we enter meaningful names, which can deviate from the page names.
  prefs: []
  type: TYPE_NORMAL
- en: 'The next step is to create a measure to get the current value:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: That’s all to prepare for this solution.
  prefs: []
  type: TYPE_NORMAL
- en: Set up the Report pages
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Next, we must add a filter on each of the two pages, which sets the page name:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e092ca2be90647b50bce058ac5a90c9a.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3 – Set a page filter to the current page name (Figure by the Author)
  prefs: []
  type: TYPE_NORMAL
- en: We do this for both pages with the corresponding page name.
  prefs: []
  type: TYPE_NORMAL
- en: 'On the drill-through page, we set the “Keep all filters” setting to On:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/597abfa4eec394636759b697bfe051a2.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4 – Set the “Keep all filters” setting to “On” on the Drill Through page
    (Figure by the Author)
  prefs: []
  type: TYPE_NORMAL
- en: This setting must be activated to ensure that the solution works as expected.
  prefs: []
  type: TYPE_NORMAL
- en: The reason for setting this to “On” is that the filter added to the source page
    must be passed to the drill-through page. I can see the value in DAX only with
    this approach.
  prefs: []
  type: TYPE_NORMAL
- en: 'This is what it looks like on the drill-through page:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/661adad8715e93abe4e990e1dbf05e91.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5 – Page filter on the drill-through page showing the filter for the
    source page (Figure by the Author)
  prefs: []
  type: TYPE_NORMAL
- en: But I had situations where this setting caused unwanted effects. For example,
    when the drill-through page must display data that is not affected by filters
    existing on the source page or source visual. This isn’t a typical scenario, but
    it can happen.
  prefs: []
  type: TYPE_NORMAL
- en: However, adding the column PageName as a drill-through column won’t help unless
    the source visual also includes this column. Adding this column to a Visual makes
    no sense, as it has no connection or meaning with the data displayed.
  prefs: []
  type: TYPE_NORMAL
- en: Therefore, this is the only meaningful way to pass the source page name to the
    drill-through page.
  prefs: []
  type: TYPE_NORMAL
- en: I’m unaware of another approach to solve this challenge.
  prefs: []
  type: TYPE_NORMAL
- en: Does it work?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now, let’s add a card visual to the drill-through page and add the measures
    created before as the Value.
  prefs: []
  type: TYPE_NORMAL
- en: 'After a drill-through action from the Retail Sales page, it looks like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/4eb77839a668edf7c3fcb470cb3d0d09.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6 – Card Visual displaying the Measure for the Source Page (Figure by
    the Author)
  prefs: []
  type: TYPE_NORMAL
- en: Based on this result, we can create a measure for a title or subtitle text,
    which includes this measure.
  prefs: []
  type: TYPE_NORMAL
- en: That’s all we need to do to complete the solution.
  prefs: []
  type: TYPE_NORMAL
- en: Drawbacks
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This is a straightforward solution to obtain the information about the originating
    page.
  prefs: []
  type: TYPE_NORMAL
- en: 'Nevertheless, it has two drawbacks:'
  prefs: []
  type: TYPE_NORMAL
- en: As soon as I add a new report page, which can act as a drill-through source
    page, I must remember to add the name of the new page to the table “Report Pages”.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: This will not work when you plan to have a second level of drill-through pages.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: For the second issue, as soon as you plan to jump to another drill-through page
    from the first, you must add further functionality.
  prefs: []
  type: TYPE_NORMAL
- en: For example, a separate table or another column in the “Report Pages” table.
  prefs: []
  type: TYPE_NORMAL
- en: You must select the approach depending on whether you plan to add something
    like a breadcrumb text, which allows the user to see the entire path, from the
    first to the second source page.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s look into why this is needed:'
  prefs: []
  type: TYPE_NORMAL
- en: For example, you add a new row to the “Report Pages” table for the first drill-through
    page with the page name “Details Page”.
  prefs: []
  type: TYPE_NORMAL
- en: Then, you add the page filter to the drill-through page, specifying the drill-through
    page name.
  prefs: []
  type: TYPE_NORMAL
- en: 'The result after the first drill-through action will be this:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/0114673193c9661634842a992818137c.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7 – Result for the conflicting filters, when adding a filter to the drill-through
    page (Figure by the Author)
  prefs: []
  type: TYPE_NORMAL
- en: The blue-marked filter is the one that sets the PageName to “Details Page”.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The green-marked filter is the one that passed with the drill-through action
    and is set to “Retail Sales”.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What we have now are two filters, which overwrite each other, resulting in a
    blank output. The result is **not** a table with both filter values, but conflicting
    filters.
  prefs: []
  type: TYPE_NORMAL
- en: For this reason, we cannot use [CONCATENATEX()](https://dax.guide/concatenatex/)
    to retrieve both values.
  prefs: []
  type: TYPE_NORMAL
- en: Therefore, we require either an additional column in the report pages table,
    which is used in this situation, or a separate table for the detail pages.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here is the approach with an additional column:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c2a699705467c999918abf3a703334fa.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8 – Extended report Pages table with the SubPageName column (Figure by
    the Author)
  prefs: []
  type: TYPE_NORMAL
- en: The column SubPageName contains the name of the drill-through page(s) reachable
    from the source pages.
  prefs: []
  type: TYPE_NORMAL
- en: 'After adding the Page Filter to the SubPageName and adding a new measure to
    retrieve the value of the SubPageName column, I get this result:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/93efc3edc085b1e960073d9e6ee30a9e.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9 – Result of the two measures to retrieve both PageName and SubPageName
    columns (Figure by the Author)
  prefs: []
  type: TYPE_NORMAL
- en: 'Combining these two measures into one title-measure can create a breadcrumb
    path that can be displayed on the second drill-through page:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c99cda91920f880a32cb132b70e2bb30.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10 – Breadcrumb subtitle on the second drill-through page (Figure by
    the Author)
  prefs: []
  type: TYPE_NORMAL
- en: 'The used measure is just a concatenation of a text and the two measures:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now that I have provided you with all the necessary tools, you can build your
    solution to track the originating page names in a drill-through scenario.
  prefs: []
  type: TYPE_NORMAL
- en: It is straightforward to realize. However, you must be aware of the technical
    requirements and potential side effects.
  prefs: []
  type: TYPE_NORMAL
- en: Once you have mastered them, you can apply them to all reports.
  prefs: []
  type: TYPE_NORMAL
- en: I wish you a lot of success with it.
  prefs: []
  type: TYPE_NORMAL
- en: References
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Like in my previous articles, I use the Contoso sample dataset. You can download
    the ContosoRetailDW Dataset for free from Microsoft [here](https://www.microsoft.com/en-us/download/details.aspx?id=18279).
  prefs: []
  type: TYPE_NORMAL
- en: The Contoso Data can be freely used under the MIT License, as described [in
    this document](https://github.com/microsoft/Power-BI-Embedded-Contoso-Sales-Demo).
    I changed the dataset to shift the data to contemporary dates.
  prefs: []
  type: TYPE_NORMAL
