- en: The Build vs. Buy Dilemma for GenAI Applications
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/the-build-vs-buy-dilemma-for-genai-applications-a6828f99c922/](https://towardsdatascience.com/the-build-vs-buy-dilemma-for-genai-applications-a6828f99c922/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Generative AI has been transformational to the world already, and it’s just
    getting started. It has fast been adopted in multiple industries, from retail
    to healthcare and banking, offering multiple capabilities ranging from information
    retrieval, expert help, and new content creation. With the growing interest in
    GenAI from a majority of boardrooms, there is a big question that CTOs/CIOs are
    facing now: *Should you build your GenAI application in house, or buy a pre-built
    solution?*'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: This article provides a framework to help product managers, business-leaders
    and technology leaders navigate this decision. Please note that many of these
    fundamental arguments hold true for all decisions of build vs. buy, but we bring
    forward some nuances that are unique to the current landscape in GenAI.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: '![Source: Generated with the help of AI](../Images/0c98d1f2b33f6c540927d974ee6fe9da.png)'
  id: totrans-4
  prefs: []
  type: TYPE_IMG
- en: 'Source: Generated with the help of AI'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: '**The core of the decision**'
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The build vs. buy (vs. modify, which I consider under the umbrella of buy) decision
    depends on multiple factors. What makes the decision even more difficult is that
    the AI landscape is fast-evolving, with new models and products launched every
    single week. What may be a gap in the market offerings today might see a new product
    in the next few weeks.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: 'The key factors that impact this decision are:'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: Market availability (now and in the near term) and business’s needed speed to
    market
  id: totrans-9
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Strategic importance of the application to the business
  id: totrans-10
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: ROI for the business
  id: totrans-11
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Risk and Compliance factors
  id: totrans-12
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Ability to maintain and evolve
  id: totrans-13
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Integration complexities
  id: totrans-14
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Source: Generated with the help of AI](../Images/3853a75c9008ab1b2c4fa68fdebbd77c.png)'
  id: totrans-15
  prefs: []
  type: TYPE_IMG
- en: 'Source: Generated with the help of AI'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: At the core, my personal advice is to reframe the build vs. buy question as
    *why do you need to build?* There are hundreds of amazing organizations pouring
    billions into the development of GenAI applications, so unless you are one of
    them, you should really try to understand what is out in the market that does
    not suit your needs.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
- en: '**The case for building GenAI applications**'
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Unique business requirements:** If your needs are unique such that off-the-shelf
    applications in the market do not fit your needs, and you believe that no such
    applications will be in the market in the near to medium term horizon. Given the
    fast-paced nature of development in GenAI, I have personally seen instances where
    organizations started to build a functionality, only to see it being available
    as a commodity in the market within a few months. One example of this is evaluations,
    which saw a lot of launches from many key players in 2024, including [AWS](https://aws.amazon.com/bedrock/evaluations/)
    and [Azure](https://learn.microsoft.com/en-us/azure/ai-services/openai/how-to/evaluations?tabs=question-eval-input).'
  id: totrans-19
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Competitive Advantage:** If the application is of strategic importance to
    your business and is critical for you to maintain your IP and market differentiation.
    These would be very unique circumstances in general and should have strong leadership
    alignment for this. One well-known example here is that of LLMs. Most organizations
    do not need to build their own LLM models; they can either use what is available
    in the market with well-engineered prompts, or fine-tune them to their own context.
    Bloomberg made a call to build their [own model](https://www.bloomberg.com/company/press/bloomberggpt-50-billion-parameter-llm-tuned-finance/),
    which was a strategic move to enable the use of their proprietary data with a
    finance-specific lexicon while solidifying their position as a leader in financial
    innovation.'
  id: totrans-20
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Long-term cost efficiency:** While upfront costs for development are higher,
    in-house solutions may be most cost-effective in the long run if your usage is
    large scale. One common pitfall here is not baking in the long-term maintenance
    overhead to the cost when building the business case. One must also note that
    even though many GenAI applications may be expensive now, the [costs are falling
    rapidly](https://opusresearch.net/2024/07/29/costs-of-generative-ai-continue-to-drop-unlocking-new-possibilities/)
    as we speak, so what may look like an expensive buy now, may end up being cheap
    in a few months.'
  id: totrans-21
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Data Privacy and Security**: Sensitive industries like [healthcare](https://www.cio.com/article/3480467/how-to-build-a-safe-path-to-ai-in-healthcare.html)
    and finance often have to abide by stringent data privacy regulations and concerns.
    In-house solutions provide additional control over data handling and compliance.'
  id: totrans-22
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'If you do end up deciding to build in-house, there are a few key challenges
    that emerge:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: You will need a skilled team of AI experts, substantial time, and significant
    upfront investment.
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Maintenance and updates, including abiding by the changing regulatory landscape
    become your responsibility.
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Even with the right team of experts, you may not be able to keep up with the
    speed of innovation that there is currently in GenAI.
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**The case for buying GenAI applications**'
  id: totrans-27
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Pre-built GenAI solutions, available as APIs or SaaS platforms, offer rapid
    deployment and lower upfront costs. Here’s when buying might be the better choice:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 可作为API或SaaS平台提供的预构建GenAI解决方案，提供快速部署和较低的前期成本。以下情况下，购买可能是一个更好的选择：
- en: '**Speed to market**: if you are looking to deploy quickly, even if an existing
    solution may not be a 100% fit to your needs right now. With new developments
    and releases, new features may address more of your needs.'
  id: totrans-29
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**上市速度**：如果你希望快速部署，即使现有的解决方案可能现在并不完全符合你的需求。随着新发展和发布，新功能可能会满足你更多的需求。'
- en: '**Predictable costs:** Subscription-based pricing models provide absolute clarity
    in terms of expense, avoiding cost overruns. On top of that, for GenAI, we have
    seen frequent price drops and expect that to happen in the near term. A recent
    example was that of [Amazon Bedrock reducing pricing by 85%.](https://aws.amazon.com/about-aws/whats-new/2024/12/amazon-bedrock-guardrails-reduces-pricing-85-percent/)'
  id: totrans-30
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**可预测的成本**：基于订阅的定价模型在费用方面提供了绝对的清晰度，避免了成本超支。除此之外，对于GenAI，我们已经看到价格频繁下降，并预计这种情况将在短期内发生。一个最近的例子是[亚马逊Bedrock将价格降低了85%。](https://aws.amazon.com/about-aws/whats-new/2024/12/amazon-bedrock-guardrails-reduces-pricing-85-percent/)'
- en: '**Focus on core priorities:** Buying allows your team to focus on business-specific
    tasks rather than the complexities of building AI. This is especially true of
    the solutions that are available as commoditized solutions and provide no competitive
    advantage.'
  id: totrans-31
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**关注核心优先事项**：购买让你的团队能够专注于业务特定的任务，而不是构建人工智能的复杂性。这对于那些作为商品化解决方案提供且不提供竞争优势的解决方案尤其如此。'
- en: 'If you do end up deciding to buy, there are a few key challenges that emerge:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你最终决定购买，会出现一些关键挑战：
- en: You may be limited by how much you can customize. There may be features you
    need, which remain on the vendor backlog for longer than you may want.
  id: totrans-33
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你可能受到可以定制的程度的限制。可能有一些你需要的功能，但它们在供应商的待办事项列表上停留的时间比你希望的更长。
- en: Potential concerns around vendor lock-in and data privacy.
  id: totrans-34
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 关于供应商锁定和数据隐私的潜在担忧。
- en: Key Questions to Guide Your Decision
  id: totrans-35
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 指导你决策的关键问题
- en: 'The decision for build vs. buy for each GenAI application has to take into
    account the overall enterprise GenAI strategy for building vs buying. The decision
    cannot be made in isolation, as you need a critical mass of applications to justify
    having a team to build these. The following questions, however should be asked
    to help guide the answer for individual applications:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 对于每个GenAI应用的建设与购买决策，必须考虑整体企业GenAI的构建与购买战略。这个决策不能孤立进行，因为你需要一个关键的应用数量来证明组建一个构建团队的合理性。然而，以下问题应该被提出，以帮助指导对个别应用的回答：
- en: Will this application enable a distinct competitive advantage?
  id: totrans-37
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 这个应用能否带来独特的竞争优势？
- en: What solutions exist in the market already?
  id: totrans-38
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 市场上已经存在哪些解决方案？
- en: What is your timeline for deployment?
  id: totrans-39
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你的部署时间表是什么？
- en: What capabilities are needed to build and maintain the GenAI application? Do
    you have that expertise, either internally or with partners?
  id: totrans-40
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 需要哪些能力来构建和维护GenAI应用？你是否有这种专业知识，无论是内部还是通过合作伙伴？
- en: What are your data privacy and compliance requirements?
  id: totrans-41
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你的数据隐私和合规要求是什么？
- en: How does the business case differ for build vs. buy?
  id: totrans-42
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 建设与购买的业务案例有何不同？
- en: Conclusion
  id: totrans-43
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: The decision on build vs. buy decision for GenAI applications is not one-size-fits-all.
    The core of the decision-making strategy is not too different from any other build
    vs. buy decision, but GenAI applications have the additional complexities of a
    fast-changing landscape, a high pace of innovation and high-but-reducing costs
    of a relatively new technology.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 对于通用人工智能（GenAI）应用而言，建设与购买的决定并非一刀切。决策策略的核心与其他建设与购买决策并没有太大区别，但GenAI应用还增加了快速变化的格局、高创新速度以及相对较新技术的成本高但逐渐降低的复杂性。
- en: While building offers control and customization at generally higher costs, buying
    provides speed and simplicity. Sometimes you may not have something available
    that fits your needs, but that may change in a few months. By carefully evaluating
    your organization’s needs, their urgency, resources, and goals, you can make a
    decision that drives success and long-term value.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 在建设过程中，虽然成本通常较高，但可以提供控制和定制化。有时你可能没有符合你需求的东西，但这可能在几个月后发生变化。通过仔细评估你组织的需要、紧迫性、资源和目标，你可以做出推动成功和长期价值的决策。
