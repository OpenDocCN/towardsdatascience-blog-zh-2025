- en: 'No More Tableau Downtime: Metadata API for Proactive Data Health'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 没有更多的 Tableau 停机时间：元数据 API 用于主动数据健康
- en: 原文：[https://towardsdatascience.com/no-more-tableau-downtime-metadata-api-for-proactive-data-health/](https://towardsdatascience.com/no-more-tableau-downtime-metadata-api-for-proactive-data-health/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[原文链接](https://towardsdatascience.com/no-more-tableau-downtime-metadata-api-for-proactive-data-health/)'
- en: In today’s world, the **reliability** of data solutions is everything. When
    we build dashboards and reports, one expects that the numbers reflected there
    are correct and up-to-date. Based on these numbers, insights are drawn and actions
    are taken. For any unforeseen reason, if the dashboards are broken or if the numbers
    are incorrect — then it becomes a **fire-fight** to fix everything. If the issues
    are not fixed in time, then it damages the **trust** placed on the data team and
    their solutions.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在当今世界，数据解决方案的**可靠性**至关重要。当我们构建仪表板和报告时，人们期望那里反映的数字是正确且最新的。基于这些数字，我们可以得出见解并采取行动。如果由于任何不可预见的原因，仪表板损坏或数字不正确——那么修复一切就会变成一场**灭火战**。如果问题没有及时解决，那么就会损害对数据团队及其解决方案的信任。
- en: 'But why would dashboards be broken or have wrong numbers? If the dashboard
    was built correctly the first time, then 99% of the time the issue comes from
    the data that feeds the dashboards — from the data warehouse. Some possible scenarios
    are:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 但为什么仪表板会损坏或出现错误的数据？如果仪表板第一次构建正确，那么 99% 的问题都来自为仪表板提供数据的来源——数据仓库。一些可能的场景包括：
- en: Few ETL pipelines failed, so the new data is not yet in
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一些 ETL 管道失败了，所以新的数据还没有进来
- en: A table is replaced with another new one
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个表被另一个新的表所取代
- en: Some columns in the table are dropped or renamed
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 表中的一些列被删除或重命名了
- en: Schemas in data warehouse have changed
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据仓库中的模式已经改变
- en: And many more.
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 以及更多。
- en: There is still a chance that the issue is on the Tableau site, but in my experience,
    most of the times, it is always due to some changes in data warehouse. Even though
    we know the root cause, it’s not always straightforward to start working on a
    fix. There is **no central place** where you can check which Tableau data sources
    rely on specific tables. If you have the Tableau Data Management add-on, it could
    help, but from what I know, its hard to find dependencies of custom sql queries
    used in data sources.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 仍然有可能问题是出在 Tableau 网站上，但根据我的经验，大多数情况下，问题总是由于数据仓库中的一些变化引起的。即使我们知道根本原因，开始修复工作也不总是那么直接。没有一个中心位置可以检查哪些
    Tableau 数据源依赖于特定的表。如果你有 Tableau 数据管理附加组件，它可能有所帮助，但据我所知，很难找到数据源中使用的自定义 SQL 查询的依赖关系。
- en: Nevertheless, the add-on is too expensive and most companies don’t have it.
    The real pain begins when you have to go through all the data sources manually
    to start fixing it. On top of it, you have a string of users on your head impatiently
    waiting for a quick-fix. The fix itself might not be difficult, it would just
    be a time-consuming one.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，这个附加组件太贵了，大多数公司都没有。真正的痛苦开始于你必须手动检查所有数据源以开始修复它们。更糟糕的是，你头上有一群用户，他们不耐烦地等待着快速修复。修复本身可能并不困难，但会非常耗时。
- en: What if we could **anticipate these issues** and **identify impacted data sources**
    before anyone notices a problem? Wouldn’t that just be great? Well, there is a
    way now with the Tableau [Metadata API](https://help.tableau.com/current/api/metadata_api/en-us/index.html).
    The Metadata API uses GraphQL, a query language for APIs that returns only the
    data that you’re interested in. For more info on what’s possible with GraphQL,
    do check out [GraphQL.org](https://graphql.org/).
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们能够在任何人注意到问题之前**预测这些问题**并**识别受影响的数据源**，那岂不是很好？现在，有了 Tableau [元数据 API](https://help.tableau.com/current/api/metadata_api/en-us/index.html)，就可以做到这一点。元数据
    API 使用 GraphQL，这是一种仅返回您感兴趣数据的 API 查询语言。有关 GraphQL 的更多信息，请查看 [GraphQL.org](https://graphql.org/)。
- en: In this blog post, I’ll show you how to connect to the **Tableau Metadata API**
    using Python’s Tableau Server Client (**TSC**) library to proactively identifydata
    sources using specific tables, so that you can act fast before any issues arise.
    Once you know which Tableau data sources are affected by a specific table, you
    can make some updates yourself or alert the owners of those data sources about
    the upcoming changes so they can be prepared for it.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇博客文章中，我将向您展示如何使用 Python 的 Tableau Server Client（**TSC**）库连接到 **Tableau 元数据
    API**，以主动识别使用特定表的 data sources，这样您就可以在出现任何问题之前迅速采取行动。一旦你知道哪些 Tableau 数据源受到特定表的影响，你就可以自己进行一些更新，或者提醒那些数据源的所有者即将到来的变化，以便他们可以为此做好准备。
- en: Connecting to the Tableau Metadata API
  id: totrans-13
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 连接到Tableau元数据API
- en: Lets connect to the Tableau Server using TSC. We need to import in all the libraries
    we would need for the exercise!
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们使用TSC连接到Tableau Server。我们需要导入进行练习所需的所有库！
- en: '[PRE0]'
  id: totrans-15
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: In order to connect to the Metadata API, you will have to first create a personal
    access token in your Tableau Account settings. Then update the `<API_TOKEN_NAME>`
    & `<TOKEN_KEY>` with the token you just created. Also update `<YOUR_SITE>` with
    your Tableau site. If the connection is established successfully, then “Connected”
    will be printed in the output window.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 为了连接到元数据API，你首先需要在Tableau账户设置中创建一个个人访问令牌。然后使用你刚刚创建的令牌更新`<API_TOKEN_NAME>`和`<TOKEN_KEY>`。同时更新`<YOUR_SITE>`为你的Tableau站点。如果连接成功建立，那么“Connected”将会在输出窗口中打印出来。
- en: '[PRE1]'
  id: totrans-17
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Lets now get a list of all data sources that are published on your site. There
    are many attributes you can fetch, but for the current use case, lets keep it
    simple and only get the id, name and owner contact information for every data
    source. This will be our master list to which we will add in all other information.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们来获取所有发布在你站点上的数据源的列表。你可以获取许多属性，但就当前用例而言，让我们保持简单，只获取每个数据源的id、名称和所有者联系信息。这将是我们主列表，我们将向其中添加所有其他信息。
- en: '[PRE2]'
  id: totrans-19
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Since I want this blog to be focussed on how to proactively identify which data
    sources are affected by a specific table, I’ll not be going into the nuances of
    Metadata API. To better understand how the query works, you can refer to a very
    detailed Tableau’s own [Metadata API documentation](https://help.tableau.com/current/api/metadata_api/en-us/docs/meta_api_model.html).
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我想让这个博客专注于如何积极识别哪些数据源受到特定表的影响，所以不会深入探讨元数据API的细微差别。为了更好地理解查询的工作原理，你可以参考非常详细的Tableau自己的[元数据API文档](https://help.tableau.com/current/api/metadata_api/en-us/docs/meta_api_model.html)。
- en: 'One thing to note is that the Metadata API returns data in a JSON format. Depending
    on what you are querying, you’ll end up with multiple nested json lists and it
    can get very tricky to convert this into a pandas dataframe. For the above metadata
    query, you will end up with a result which would like below (this is mock data
    just to give you an idea of what the output looks like):'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 需要注意的一点是，元数据API以JSON格式返回数据。根据你查询的内容，你最终会得到多个嵌套的JSON列表，将其转换为pandas dataframe可能会变得非常复杂。对于上述元数据查询，你最终会得到一个如下所示的结果（这只是一个模拟数据，只是为了给你一个输出外观的印象）：
- en: '[PRE3]'
  id: totrans-22
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: We need to convert this JSON response into a dataframe so that its easy to work
    with. Notice that we need to extract the name and email of the owner from inside
    the owner object.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要将这个JSON响应转换为dataframe，这样更容易处理。注意，我们需要从所有者对象中提取所有者的名称和电子邮件。
- en: '[PRE4]'
  id: totrans-24
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'This is how the structure of `master_df` would look like:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是`master_df`的结构看起来会是什么样子：
- en: '![](../Images/630a85f3b1ad69c62ffa327467aa2fa2.png)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/630a85f3b1ad69c62ffa327467aa2fa2.png)'
- en: Sample output of code
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 代码的样本输出
- en: Once we have the main list ready, we can go ahead and start getting the names
    of the tables embedded in the data sources. If you are an avid Tableau user, you
    know that there are two ways to selecting tables in a Tableau data source — one
    is to directly choose the tables and establish a relation between them and the
    other is to use a custom sql query with one or more tables to achieve a new resultant
    table. Therefore, we need to address both the cases.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦我们准备好了主列表，我们就可以开始获取数据源中嵌入的表名。如果你是Tableau的忠实用户，你知道在Tableau数据源中选择表有两种方式——一种是通过直接选择表并在它们之间建立关系，另一种是使用一个或多个表的定制SQL查询来生成一个新的结果表。因此，我们需要处理这两种情况。
- en: Processing of Custom SQL query tables
  id: totrans-29
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 处理自定义SQL查询表
- en: Below is the query to get the list of all custom SQLs used in the site along
    with their data sources. Notice that I have filtered the list to get only first
    500 custom sql queries. In case there are more in your org, you will have to use
    an offset to get the next set of custom sql queries. There is also an option of
    using cursor method in Pagination when you want to fetch large list of results
    (refer [here](https://help.tableau.com/current/api/metadata_api/en-us/docs/meta_api_examples.html)).
    For the sake of simplicity, I just use the offset method as I know, as there are
    less than 500 custom sql queries used on the site.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 以下查询用于获取网站中使用的所有自定义 SQL 列表及其数据源。请注意，我已经过滤了列表，只获取了前 500 个自定义 SQL 查询。如果您的组织中还有更多，您将需要使用偏移量来获取下一组自定义
    SQL 查询。当您想要获取大量结果时，也可以在分页中使用游标方法（请参阅[此处](https://help.tableau.com/current/api/metadata_api/en-us/docs/meta_api_examples.html)）。为了简化，我仅使用偏移量方法，因为我知道网站上使用的自定义
    SQL 查询少于 500 个。
- en: '[PRE5]'
  id: totrans-31
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'Based on our mock data, this is how our output would look like:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 根据我们的模拟数据，输出将如下所示：
- en: '[PRE6]'
  id: totrans-33
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Just like before when we were creating the master list of data sources, here
    also we have nested json for the downstream data sources where we would need to
    extract only the “name” part of it. In the “query” column, the entire custom sql
    is dumped. If we use regex pattern, we can easily search for the names of the
    table used in the query.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 就像之前创建数据源主列表时一样，这里也有嵌套的 JSON 用于下游数据源，其中我们需要提取其“name”部分。在“query”列中，整个自定义 SQL
    都被输出。如果我们使用正则表达式模式，可以轻松搜索查询中使用的表名。
- en: We know that the table names always come after FROM or a JOIN clause and they
    generally follow the format `<database_name>.<schema>.<table_name>`. The `<database_name>`
    is optional and most of the times not used. There were some queries I found which
    used this format and I ended up only getting the database and schema names, and
    not the complete table name. Once we have extracted the names of the data sources
    and the names of the tables, we need to merge the rows per data source as there
    can be multiple custom sql queries used in a single data source.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 我们知道表名总是在 FROM 或 JOIN 子句之后，并且通常遵循 `<database_name>.<schema>.<table_name>` 的格式。`<database_name>`
    是可选的，大多数情况下不使用。我发现了一些使用此格式的查询，结果我只得到了数据库和模式名称，而没有完整的表名。一旦我们提取了数据源和表名，我们需要合并每个数据源的行，因为单个数据源中可能使用了多个自定义
    SQL 查询。
- en: '[PRE7]'
  id: totrans-36
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'After we perform all the above operations, this is how the structure of `cs_df`
    would look like:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 在执行所有上述操作后，`cs_df` 的结构将如下所示：
- en: '![](../Images/b3ce2ec2460adc88b5de6df147a64e57.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b3ce2ec2460adc88b5de6df147a64e57.png)'
- en: Sample output of code
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 代码示例输出
- en: Processing of regular Tables in Data Sources
  id: totrans-40
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 数据源中常规表的处理
- en: Now we need to get the list of all the regular tables used in a datasource which
    are not a part of custom SQL. There are two ways to go about it. Either use the
    `publishedDatasources` object and check for `upstreamTables` or use `DatabaseTable`
    and check for `upstreamDatasources`. I’ll go by the first method because I want
    the results at a data source level (basically, I want some code ready to reuse
    when I want to check a specific data source in further detail). Here again, for
    the sake of simplicity, instead of going for pagination, I’m looping through each
    datasource to ensure I have everything. We get the `upstreamTables` inside of
    the field object so that has to be cleaned out.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们需要获取在数据源中使用的所有常规表列表，这些表不是自定义 SQL 的一部分。有两种方法可以做到这一点。要么使用 `publishedDatasources`
    对象并检查 `upstreamTables`，要么使用 `DatabaseTable` 并检查 `upstreamDatasources`。我将采用第一种方法，因为我想要在数据源级别得到结果（基本上，我想要一些代码，以便在我想进一步检查特定数据源时可以重用）。在这里，为了简化，我选择不使用分页，而是遍历每个数据源以确保一切就绪。我们在字段对象内部获取
    `upstreamTables`，因此必须清理掉。
- en: '[PRE8]'
  id: totrans-42
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'This is how the structure of `ds_df` would look:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: '`ds_df` 的结构如下所示：'
- en: '![](../Images/4918d48d7bef67b82c7dd7ef4e381588.png)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/4918d48d7bef67b82c7dd7ef4e381588.png)'
- en: Sample output of code
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 代码示例输出
- en: We can need to flatten out the `fields` object and extract the field names as
    well as the table names. Since the table names will be repeating multiple times,
    we would have to deduplicate to keep only the unique ones.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可能需要展开 `fields` 对象并提取字段名以及表名。由于表名会重复多次，因此我们必须去重，只保留唯一的名称。
- en: '[PRE9]'
  id: totrans-47
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: 'Once we do the above operations, the final structure of `ds_df` would look
    something like this:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 执行上述操作后，`ds_df` 的最终结构将类似于以下内容：
- en: '![](../Images/ffdbb186f81441bd8520a5be64e3f5b3.png)'
  id: totrans-49
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ffdbb186f81441bd8520a5be64e3f5b3.png)'
- en: Sample output of code
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
- en: 'We have all the pieces and now we just have to merge them together:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  id: totrans-52
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: 'This is our final `master_data`:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d9415ccdf1514e824f5b447ef331cb0b.png)'
  id: totrans-54
  prefs: []
  type: TYPE_IMG
- en: Sample Output of code
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
- en: Table-level Impact Analysis
  id: totrans-56
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Let’s say there were some schema changes on the “Sales” table and you want to
    know which data sources will be impacted. Then you can simply write a small function
    which checks if a table is present in either of the two columns — `upstreamTables`
    or `customSQLTables` like below.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  id: totrans-58
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: Below is the output. You can see that 3 data sources will be impacted by this
    change. You can also alert the data source owners Alice and Bob in advance about
    this so they can start working on a fix before something breaks on the Tableau
    dashboards.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/cc961af498c873a0c3b0f21d7010e499.png)'
  id: totrans-60
  prefs: []
  type: TYPE_IMG
- en: Sample output of code
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
- en: You can check out the complete version of the code in my Github repository [here](https://github.com/sravz3/Tableau-Metadata-Analysis).
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
- en: This is just one of the potential use-cases of the Tableau Metadata API. You
    can also extract the field names used in custom sql queries and add to the dataset
    to get a field-level impact analysis. One can also monitor the stale data sources
    with the `extractLastUpdateTime` to see if those have any issues or need to be
    archived if they are not used any more. We can also use the `dashboards` object
    to fetch information at a dashboard level.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
- en: Final Thoughts
  id: totrans-64
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: If you have come this far, kudos. This is just one use case of automating Tableau
    data management. It’s time to reflect on your own work and think which of those
    other tasks you could automate to make your life easier. I hope this mini-project
    served as an enjoyable learning experience to understand the power of Tableau
    Metadata API. If you liked reading this, you might also like another one of my
    blog posts about Tableau, on some of the challenges I faced when dealing with
    big <mdspan datatext="el1742335171356" class="mdspan-comment">datasets</mdspan>.
  id: totrans-65
