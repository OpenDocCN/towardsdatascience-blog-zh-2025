- en: 'Graph Coloring for Data Science: A Comprehensive Guide'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 数据科学中的图着色：全面指南
- en: 原文：[https://towardsdatascience.com/graph-coloring-for-data-science/](https://towardsdatascience.com/graph-coloring-for-data-science/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/graph-coloring-for-data-science/](https://towardsdatascience.com/graph-coloring-for-data-science/)
- en: '<mdspan datatext="el1756215885810" class="mdspan-comment">Rita</mdspan> is
    coloring a picture of a flower that has six petals arranged in a circle. She wants
    to color each of the six petals with exactly one of the following four colors:
    red, orange, yellow, and blue. No two neighboring petals can have the same color.
    Not all four colors need to be used. How many ways are there for Rita to color
    the flower petals while satisfying these constraints? This was the basis of problem
    #25 in the [2025 Cayley Contest](https://cemc.uwaterloo.ca/sites/default/files/documents/2025/2025CayleyContest.html),
    and it happens to be a specific example of a class of combinatorial data science
    problems related to the notion of *graph coloring*. In the following sections,
    we will solve Rita’s concrete problem, derive its general open and closed-form
    solutions, and look at some interesting practical applications in industry.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1756215885810" class="mdspan-comment">Rita</mdspan>正在给一朵有六个花瓣的圆形花朵的图片着色。她希望用以下四种颜色中的任意一种给每个花瓣着色：红色、橙色、黄色和蓝色。相邻的两个花瓣不能有相同的颜色。不一定需要使用所有四种颜色。Rita有多少种方式可以着色花朵花瓣，同时满足这些约束？这是[2025凯莱竞赛](https://cemc.uwaterloo.ca/sites/default/files/documents/2025/2025CayleyContest.html)问题#25的基础，它恰好是关于*图着色*概念的一类组合数据科学问题的具体例子。在以下各节中，我们将解决Rita的具体问题，推导其通解和闭式解，并探讨一些有趣的工业应用。
- en: '**Note:** All figures and formulas in the following sections have been created
    by the author of this article.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意：**以下各节中的所有图表和公式均由本文作者创建。'
- en: A Theoretical Puzzle
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 一个理论难题
- en: 'To solve Rita’s problem, let us begin by visualizing the flower petals as a
    cyclical graph consisting of 6 nodes connected by edges as shown in Figure 1:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 要解决Rita的问题，让我们首先将花瓣可视化为一个由6个节点组成的循环图，这些节点通过图1中所示的方式连接：
- en: '![](../Images/3c4742ca1023caa5cf51ac37225bfac7.png)'
  id: totrans-6
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/3c4742ca1023caa5cf51ac37225bfac7.png)'
- en: 'Figure 1: An uncolored cycle of flower petals'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 图1：未着色的花瓣循环
- en: 'Figure 2 shows some valid colorings (also called *proper* colorings) of the
    petals:'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 图2显示了花瓣的一些有效着色（也称为*正确*着色）：
- en: '![](../Images/14a3d7f78fe63aff9d4de5f048341648.png)'
  id: totrans-9
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/14a3d7f78fe63aff9d4de5f048341648.png)'
- en: 'Figure 2: Examples of valid colorings'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 图2：有效着色的例子
- en: Let *P*(*n*, *k*) be the number of ways we can color a cycle of *n* nodes with
    *k* colors, such that no neighboring nodes have the same color.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 设*P*(*n*, *k*)为我们可以用*k*种颜色着色*n*个节点的循环的方式的数量，使得相邻节点没有相同的颜色。
- en: 'Now, consider what happens if we break the cycle into a chain of *n* nodes.
    How many ways *P[chain]*(*n*, *k*)are there to color a chain of *n* nodes with
    *k* colors, such that no neighboring nodes have the same color? For the starting
    (left-most) node in the chain, we have a choice of *k* colors. But for each of
    the following *n* – 1 nodes, we have a choice of only *k* – 1 colors, since one
    of the colors will have already been taken by the preceding node. This intuition
    is illustrated in Figure 3 below:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，考虑如果我们把循环分解成由*n*个节点组成的链会发生什么。有多少种方式*P[chain]*(*n*, *k*)来用*k*种颜色着色*n*个节点的链，使得相邻节点没有相同的颜色？对于链中的起始（最左边的）节点，我们有*k*种颜色的选择。但对于链中接下来的*n*
    – 1个节点中的每一个，我们只有*k* – 1种颜色的选择，因为其中一个颜色已经被前面的节点占用。这种直觉在下图3中得到了说明：
- en: '![](../Images/94417ef20308220fde721810ab2ab8d1.png)'
  id: totrans-13
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/94417ef20308220fde721810ab2ab8d1.png)'
- en: 'Figure 3: From cycle to chain'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 图3：从循环到链
- en: 'Thus, we have:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们有：
- en: '![](../Images/40b729d1f64c03e557fdff15e51ded09.png)'
  id: totrans-16
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/40b729d1f64c03e557fdff15e51ded09.png)'
- en: 'However, notice that in some of these valid colorings, the first and last nodes
    in the chain will share the same color – if we subtract these cases from *P[chain]*(*n*,
    *k*), then we would obtain *P*(*n*, *k*) as required. Furthermore, notice that
    the cases to subtract are equivalent to *P*(*n –* 1, *k*), i.e., the number of
    ways to color a cycle of *n* – 1 nodes with *k* colors, such that no neighboring
    nodes have the same color. This so-called *deletion-contraction* maneuver is illustrated
    in Figure 4 below:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，请注意，在这些有效着色中，链中的第一个和最后一个节点将共享相同的颜色——如果我们从*P[chain]*(*n*, *k*)中减去这些情况，那么我们就会得到所需的*P*(*n*,
    *k*)。此外，请注意，要减去的情况等同于*P*(*n – 1, *k*)，即用*k*种颜色着色*n* – 1个节点的循环的方式，使得相邻节点没有相同的颜色。这种所谓的*删除-收缩*技巧在下图4中得到了说明：
- en: '![](../Images/c5bc8fab615536c9e689c3ac6cccfbd2.png)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c5bc8fab615536c9e689c3ac6cccfbd2.png)'
- en: 'Figure 4: Deletion-contraction maneuver'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 图4：删除-收缩操作
- en: 'Figure 5 below shows the base cases for *P*(*n*, *k*), for a given value *k*:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的图5显示了 *P*(*n*, *k*) 的基本案例，对于给定的值 *k*：
- en: '![](../Images/39534c8fdeffdff439e7c5f9f6fa9c3b.png)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/39534c8fdeffdff439e7c5f9f6fa9c3b.png)'
- en: 'Figure 5: Base cases'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 图5：基本案例
- en: 'Pulling all of these insights together yields the following first-order recurrence
    relation for positive integers *n* > 3 and *k*, with base cases as described above:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 将所有这些洞察力综合起来，我们得到以下一阶递归关系，适用于正整数 *n* > 3 和 *k*，以及上述描述的基本案例：
- en: '![](../Images/1ef353a469cb2c84f6f8fa777175b4d8.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/1ef353a469cb2c84f6f8fa777175b4d8.png)'
- en: 'Now, solving Rita’s problem amounts to evaluating the recurrence *P*(*n*, *k*)
    for *n* = 6 and *k* = 4\. Since the numbers in this case are relatively small,
    we can carry out the evaluation by expanding *P*(6, 4) as follows:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，解决丽塔的问题相当于评估递归函数 *P*(*n*, *k*)，其中 *n* = 6 且 *k* = 4。由于在这个情况下数字相对较小，我们可以通过如下展开
    *P*(6, 4) 来进行评估：
- en: '![](../Images/5f557f2221688209b9f5979b74967d44.png)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/5f557f2221688209b9f5979b74967d44.png)'
- en: 'Using the expression for the base case *P*(3, *k*), note that:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 使用基本案例 *P*(3, *k*) 的表达式，注意：
- en: '![](../Images/21e3ff76bb0ad9a592273ae3ee4287fe.png)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/21e3ff76bb0ad9a592273ae3ee4287fe.png)'
- en: 'As a result:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 因此：
- en: '![](../Images/b019ba1beb297beb1072cb1232be7dad.png)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b019ba1beb297beb1072cb1232be7dad.png)'
- en: Thus, there are exactly 732 ways for Rita to color her flower petals while satisfying
    the given constraints.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，丽塔在满足给定约束的情况下，为她花的花瓣着色有恰好732种方式。
- en: 'The following Python function (compatible with Python versions ≥ 3.9) operationalizes
    the recurrence to let us quickly evaluate *P*(*n*, *k*) for larger input values:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 以下Python函数（兼容Python版本≥3.9）实现了递归，使我们能够快速评估 *P*(*n*, *k*) 对于较大的输入值：
- en: '[PRE0]'
  id: totrans-33
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'Graph coloring can also be operationalized using *backtracking*, a useful technique
    for exploring the solution space of various types of data science problems and
    incrementally constructing candidate solutions. [This](https://towardsdatascience.com/a-gentle-introduction-to-backtracking/)
    article provides an intuitive introduction to backtracking, and the following
    video shows how backtracking can be applied to graph coloring problems in particular:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 图着色也可以通过回溯来实现，这是一种探索各种类型数据科学问题的解空间的有用技术，并逐步构建候选解。[这篇文章](https://towardsdatascience.com/a-gentle-introduction-to-backtracking/)提供了对回溯的直观介绍，以下视频展示了如何将回溯应用于图着色问题：
- en: Closed-Form Solution
  id: totrans-35
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 封闭形式解
- en: The iterative Python function shown above has a time complexity of *O*(*n*)
    with respect to number of nodes *n* in the cyclical graph. However, if we can
    find an *analytical* or *closed-form solution* to *P*(*n*, *k*), we could evaluate
    the result directly; the corresponding Python function would have a time complexity
    of just *O*(1) and thus represent a substantial time saving as *n* grows very
    large. Time complexity and the merits of closed-form solutions are discussed in
    more depth in [this](https://medium.com/data-science/algorithmic-thinking-for-data-scientists-4601ac68496f)
    article on algorithmic thinking for data scientists.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 上面的迭代Python函数在循环图中的节点数 *n* 方面的时间复杂度为 *O*(*n*)。然而，如果我们能找到 *P*(*n*, *k*) 的 *解析*
    或 *封闭形式解*，我们就可以直接评估结果；相应的Python函数的时间复杂度将仅为 *O*(1)，因此在 *n* 非常大时可以节省大量时间。时间复杂度和封闭形式解的优点在[这篇文章](https://medium.com/data-science/algorithmic-thinking-for-data-scientists-4601ac68496f)中进行了更深入的讨论。
- en: 'To find a simplified closed-form solution, let us rearrange our recurrence
    relation as follows:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 为了找到一个简化的封闭形式解，让我们将我们的递归关系重新排列如下：
- en: '![](../Images/bdf6b9ceba4b8f8bbfa67c1a166d32be.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/bdf6b9ceba4b8f8bbfa67c1a166d32be.png)'
- en: 'At this point, we can make use of a neat principle in linear algebra: the general
    solution of a linear algebraic equation *f*(*x*) = *y* is the sum *x[h]* + *x[p]*
    of the general solution *x[h]* of its homogeneous counterpart *f*(*x*) = 0 and
    a particular solution *x[p]* of *f*(*x*) = *y*. To remind ourselves of why this
    works, we can substitute *x[h]* + *x[p]* into *f*(*x*) = *y* to get *f*(*x[h]*
    + *x[p]*) = *y*. Since *f*(*x*) is a linear function, *f*(*x[h]* + *x[p]*) = *f*(*x[h]*)
    + *f*(*x[p]*) = *y*. We know that *f*(*x[h]*) = 0 and *f*(*x[p]*) = *y*. By substitution,
    *f*(*x[h]*) + *f*(*x[p]*) = 0 + *y* = *y*. The equation *y* = *y* is trivially
    true, confirming that *x[h]* + *x[p]* is indeed the general solution of *f*(*x*)
    = *y*. Thus, our task is now to:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 在这一点上，我们可以利用线性代数中的一个巧妙原理：线性代数方程 *f*(*x*) = *y* 的通解是其齐次方程 *f*(*x*) = 0 的通解 *x[h]*
    和方程 *f*(*x*) = *y* 的特解 *x[p]* 的和。为了提醒自己为什么这行得通，我们可以将 *x[h]* + *x[p]* 代入 *f*(*x*)
    = *y*，得到 *f*(*x[h]* + *x[p]*) = *y*。由于 *f*(*x*) 是一个线性函数，*f*(*x[h]* + *x[p]*) =
    *f*(*x[h]*) + *f*(*x[p]*) = *y*。我们知道 *f*(*x[h]*) = 0 和 *f*(*x[p]*) = *y*。通过代入，*f*(*x[h]*)
    + *f*(*x[p]*) = 0 + *y* = *y*。方程 *y* = *y* 显然是正确的，这证实了 *x[h]* + *x[p]* 确实是 *f*(*x*)
    = *y* 的通解。因此，我们的任务现在变成了：
- en: Find a general solution *x[h]* of the homogeneous equation *P*(*n*, *k*) + *P*(*n*
    – 1, *k*) = 0
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 找到齐次方程 *P*(*n*, *k*) + *P*(*n* – 1, *k*) = 0 的通解 *x[h]*
- en: Find a particular solution *x[p]* to our recurrence *P*(*n*, *k*) + *P*(*n*
    – 1, *k*) = *k*(*k* – 1)^((*n* – 1))
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 找到递推方程 *P*(*n*, *k*) + *P*(*n* – 1, *k*) = *k*(*k* – 1)^((*n* – 1)) 的特解 *x[p]*
- en: Combine *x[h]* and *x[p]* to derive the general closed-form solution of our
    recurrence
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将 *x[h]* 和 *x[p]* 结合起来，推导出我们递推的通解
- en: 'So, let us start by solving the following homogeneous equation:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，让我们从解决以下齐次方程开始：
- en: '![](../Images/a94d4215842c617dc5408849a56d0b51.png)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a94d4215842c617dc5408849a56d0b51.png)'
- en: 'Note that, for simplicity, we let:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，为了简化，我们让：
- en: '![](../Images/9d8273a6ed79c98b3a62b0552d668023.png)'
  id: totrans-46
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/9d8273a6ed79c98b3a62b0552d668023.png)'
- en: 'Each term seems to cancel the previous one, so it must alternate in sign at
    every step, i.e., there exists a constant term *C* (which we will derive shortly)
    such that:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 每一项似乎都抵消了前一项，所以它必须在每一步交替符号，即存在一个常数项 *C*（我们将在下面推导它）使得：
- en: '![](../Images/f9fd37088b240a8bf8a29a041dd0bbab.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f9fd37088b240a8bf8a29a041dd0bbab.png)'
- en: 'Next, since the right-hand side of the original recurrence is a multiple of
    (*k* – 1)^((*n* – 1)), let us try the following particular solution *P*‘:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，由于原始递推方程的右侧是 (*k* – 1)^((*n* – 1)) 的倍数，让我们尝试以下特解 *P*‘：
- en: '![](../Images/014e84bd773b3f9fede63c9fec44efa2.png)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/014e84bd773b3f9fede63c9fec44efa2.png)'
- en: '*A* is a constant term that we can derive by plugging *P’* into the left-hand
    side of the original recurrence as follows:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: '*A* 是一个常数项，我们可以通过将 *P’* 插入原始递推方程的左侧来推导出来，如下所示：'
- en: '![](../Images/a3fd78b83ad91c752033f62bf301c17b.png)'
  id: totrans-52
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a3fd78b83ad91c752033f62bf301c17b.png)'
- en: 'This means *A* = 1, so we have:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着 *A* = 1，所以我们有：
- en: '![](../Images/829e453c6373fc1642304599374b054c.png)'
  id: totrans-54
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/829e453c6373fc1642304599374b054c.png)'
- en: 'Combining the particular and homogeneous solutions gives us:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 将特解和齐次解结合起来，我们得到：
- en: '![](../Images/e367e91ee04db07bfab77d9bd27ce619.png)'
  id: totrans-56
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e367e91ee04db07bfab77d9bd27ce619.png)'
- en: 'Now, we can use our base case for *n* = 3 to derive *C*:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们可以使用我们的基例 *n* = 3 来推导 *C*：
- en: '![](../Images/a6a71459a80552b932dbf6fda30488c5.png)'
  id: totrans-58
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a6a71459a80552b932dbf6fda30488c5.png)'
- en: 'Substituting *C* back into the combined solution gives us the following closed-form
    solution:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 将 *C* 代回到组合解中，我们得到以下闭式解：
- en: '![](../Images/310a0028944c195de300271f316a6773.png)'
  id: totrans-60
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/310a0028944c195de300271f316a6773.png)'
- en: 'We can verify that this indeed gives us the correct solution for the Cayley
    contest problem:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以验证这确实为我们提供了凯莱竞赛问题的正确解：
- en: '![](../Images/7c3ca8b6132674e90f3473a00053f9fc.png)'
  id: totrans-62
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7c3ca8b6132674e90f3473a00053f9fc.png)'
- en: Practical Applications
  id: totrans-63
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实际应用
- en: Graph coloring is a fundamental problem in graph theory that involves assigning
    labels (or “colors”) to the nodes of a graph such that no two adjacent nodes share
    the same color. In essence, graph coloring attempts to partition a graph into
    independent sets that may be treated uniformly (i.e., all elements of a set may
    be assigned the same color) without violating adjacency constraints. This type
    of problem framing can be applied in a wide range of data science use cases involving
    constraint-based optimization and resource allocation. We look at some of these
    applications below.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 图着色是图论中的一个基本问题，涉及将标签（或“颜色”）分配给图的节点，使得没有两个相邻节点共享相同的颜色。本质上，图着色试图将图划分为独立的集合，这些集合可以统一处理（即，集合中的所有元素可以分配相同的颜色），同时不违反相邻约束。这种问题框架可以应用于涉及基于约束的优化和资源分配的广泛数据科学用例。我们下面将探讨一些这些应用。
- en: Scheduling and Timetabling
  id: totrans-65
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 调度和排程
- en: Graph coloring can be used to solve scheduling problems, where tasks or events
    must be arranged without conflicts. Graphs used to model such scenarios are often
    called *conflict graphs*.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 图着色可以用来解决调度问题，其中任务或事件必须安排得没有冲突。用于模拟此类场景的图通常被称为*冲突图*。
- en: Consider the intuitive case of designing school timetables. Each class can be
    represented by a node in the graph, and an edge connects two classes if some students
    go to both classes. Time slots are represented by colors. A proper coloring of
    the graph – in which adjacent nodes do not share the same color – ensures that
    no student is faced with the predicament of having to attend two classes at the
    same time. The case of exam scheduling poses a similar problem, since exams must
    be assigned time slots in such a way that no student has conflicting exam times.
    Graph coloring can be used to solve this type of problem and minimize the number
    of time slots needed overall.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑设计学校课程表的直观情况。每个班级可以在图中表示为一个节点，如果有些学生同时上这两个班级，则两个班级之间有一条边连接。时间槽由颜色表示。图的适当着色——即相邻节点不共享相同的颜色——确保没有学生面临同时参加两个课程的困境。考试排程的情况也类似，因为考试必须分配时间槽，以便没有学生有冲突的考试时间。图着色可以用来解决这类问题，并最小化整体所需的时间槽数量。
- en: Graph coloring can also help solve problems of constraint-based scheduling in
    industrial settings. For example, product assembly in a car manufacturing plant
    typically involves various tasks, such as painting, wiring electronics, chassis
    fitting, and installing engines. Each task requires specialized tooling, workstations,
    and skilled workers, and there may be certain restrictions on task ordering. Painting
    should not happen immediately before wiring, since residual paint fumes could
    damage sensitive electronics. Engine installation and chassis fitting may require
    some of the same equipment (e.g., lifts or alignment rigs) that is in short supply
    and cannot be used simultaneously. To apply graph coloring, we can model each
    task as a node in a graph, with an edge connecting two nodes if the corresponding
    tasks are in conflict (i.e., the tasks cannot be scheduled consecutively). Colors
    represent distinct time slots or stages of assembly. Proper graph coloring ensures
    that conflicting tasks are not scheduled back-to-back; this helps optimize the
    manufacturing workflow, reduce downtime and resource bottlenecks, and prevent
    costly errors.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 图着色还可以帮助解决工业环境中基于约束的调度问题。例如，汽车制造厂的产品组装通常涉及各种任务，如喷漆、布线、底盘装配和安装发动机。每个任务都需要专门的工具、工作站和熟练的工人，并且可能对任务顺序有某些限制。喷漆不应紧接布线之后进行，因为残留的油漆气味可能会损坏敏感的电子产品。发动机安装和底盘装配可能需要一些相同的设备（例如，升降机或校准装置），这些设备短缺且不能同时使用。为了应用图着色，我们可以将每个任务建模为图中的一个节点，如果相应的任务存在冲突（即，任务不能连续安排），则两个节点之间有一条边连接。颜色代表不同的时间槽或组装阶段。适当的图着色确保冲突任务不会连续安排；这有助于优化制造工作流程，减少停机时间和资源瓶颈，并防止昂贵的错误。
- en: Clustering and Feature Selection
  id: totrans-69
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 聚类和特征选择
- en: In data mining and machine learning (ML), clustering algorithms group data points
    together based on shared characteristics or relationships. Graph coloring offers
    a natural approach to clustering by treating the data as a graph, where nodes
    represent individual data points and edges indicate some relationship between
    the respective nodes (e.g., similarity, class membership). Graph coloring enables
    us to partition the data into independent sets (i.e., groups of nodes that are
    not directly connected) for effective detection of clusters; this method may be
    particularly useful in social network analysis, biological data modeling, and
    recommendation systems, where relationships between entities can be quite complex.
    Proper graph coloring helps ensure that each cluster is internally cohesive while
    being distinct from other clusters, providing a clean and interpretable structure
    for downstream analysis. Interested readers can check out [this article](https://doi.org/10.1016/j.ijresmar.2018.10.001)
    and [this book](https://www.amazon.com/Advanced-Applications-Network-Analysis-Marketing/dp/3746068118)
    for a deep dive into graph-theoretic representations of data for feature engineering.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 在数据挖掘和机器学习（ML）中，聚类算法根据共享特征或关系将数据点分组在一起。图着色通过将数据视为一个图，其中节点代表单个数据点，边表示节点之间的某种关系（例如，相似性、类别成员资格）提供了一种自然的方法来进行聚类。图着色使我们能够将数据划分为独立的集合（即，不直接连接的节点组），以有效地检测聚类；这种方法在社交网络分析、生物数据建模和推荐系统中可能特别有用，在这些系统中实体之间的关系可能相当复杂。适当的图着色有助于确保每个聚类在内部具有凝聚力，同时与其他聚类区分开来，为下游分析提供了一个干净且可解释的结构。感兴趣的读者可以查看[这篇文章](https://doi.org/10.1016/j.ijresmar.2018.10.001)和[这本书](https://www.amazon.com/Advanced-Applications-Network-Analysis-Marketing/dp/3746068118)，深入了解数据特征工程中图论表示的深入探讨。
- en: 'Finally, feature selection is an important consideration in building efficient
    and interpretable ML models, especially in the context of high-dimensional data
    (e.g., as seen in domains such as genomics and finance). Training a model on many
    features is computationally expensive, and highly correlated features tend to
    hold redundant information, which can lead to inefficient training and overfitting.
    Graph coloring offers an elegant solution: construct a graph where each node represents
    a feature, and edges connect pairs of highly correlated features. A proper coloring
    of such a graph ensures that no two highly correlated features are assigned the
    same color, allowing the selection of one representative feature per color. This
    technique reduces dimensionality while preserving informational diversity, leading
    to simpler models that can potentially generalize better.'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，特征选择在构建高效且可解释的机器学习（ML）模型时是一个重要的考虑因素，尤其是在高维数据（例如，在基因组学和金融等领域）的背景下。在许多特征上训练模型计算成本高昂，并且高度相关的特征往往包含冗余信息，这可能导致训练效率低下和过拟合。图着色提供了一种优雅的解决方案：构建一个图，其中每个节点代表一个特征，边连接高度相关的特征对。适当的图着色确保没有两个高度相关的特征被分配相同的颜色，从而允许每个颜色选择一个代表性的特征。这种技术降低了维度，同时保留了信息多样性，导致模型更简单，可能具有更好的泛化能力。
- en: The Wrap
  id: totrans-72
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 总结
- en: 'Graph coloring, while rooted in combinatorial mathematics, has practical relevance
    that extends well beyond theoretical puzzles. Starting from a math contest problem
    involving flower petals, we derived general open and closed-form solutions for
    the proper coloring of cyclical graphs, and looked at how graph coloring can be
    applied to a wide range of data science problems. The key to such practical applications
    lies in smart problem framing: if the problem is framed as a graph in the right
    way – with careful consideration given to the definition of nodes, edges, and
    coloring constraints – then the solution approach may become readily apparent.
    To borrow a [quote that is often (mis)attributed to Einstein](https://quoteinvestigator.com/2014/05/22/solve/),
    “if [you] had an hour to solve a problem, [you should] spend 55 minutes thinking
    about the problem and 5 minutes thinking about solutions.” Ultimately, as the
    field of data science continues to evolve, techniques such as graph coloring will
    likely become increasingly relevant in both research and applied settings.'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 图着色，虽然根植于组合数学，但其实际相关性远远超出了理论谜题。从涉及花瓣的数学竞赛问题开始，我们推导出了循环图正确着色的通用和封闭形式解，并探讨了图着色如何应用于广泛的数据科学问题。此类实际应用的关键在于智能的问题构建：如果问题以正确的方式构建为一个图——仔细考虑节点、边和着色约束的定义——那么解决方案可能就会显而易见。借用一个经常（错误地）归功于爱因斯坦的[引言](https://quoteinvestigator.com/2014/05/22/solve/)，“如果你有一个小时来解决一个问题，你应该花55分钟思考问题，5分钟思考解决方案。”最终，随着数据科学领域的持续发展，图着色等技术可能会在研究和应用环境中变得更加相关。
