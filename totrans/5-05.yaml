- en: 'Topic Modelling in Business Intelligence: FASTopic and BERTopic in Code'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/topic-modelling-in-business-intelligence-fastopic-and-bertopic-in-code-2d3949260a37/](https://towardsdatascience.com/topic-modelling-in-business-intelligence-fastopic-and-bertopic-in-code-2d3949260a37/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Topic Modelling in Business Intelligence: FASTopic and BERTopic in Code'
  prefs: []
  type: TYPE_NORMAL
- en: '![Source: Freepic, Image by rawpixel.com](../Images/ca51b08bdba0624abcec19e3446c5ead.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Source: [Freepic](https://www.freepik.com/free-vector/illustration-network-shareing_2808109.htm#fromView=search&page=2&position=3&uuid=c11e1dc6-4be2-45d5-9c7b-29bc16bc69f0),
    Image by rawpixel.com'
  prefs: []
  type: TYPE_NORMAL
- en: '**Customer reviews** about products and services provide valuable information
    about customer satisfaction. They provide insight into what should be improved
    across the whole product development. Dynamic topic models in business intelligence
    can identify key product qualities and other satisfaction factors, cluster them
    into categories, and evaluate how business decisions materialized in customer
    satisfaction over time. This is highly valuable information not only for product
    managers.'
  prefs: []
  type: TYPE_NORMAL
- en: 'This article will compare two of the latest topic models to classify customer
    complaints data. **BERTopic** by [Maarten Grootendorst (2022)](https://arxiv.org/pdf/2203.05794)
    and the recent **[FASTopic](https://pypi.org/project/fastopic/)** by [Xiaobao
    Wu et al. (2024)](https://arxiv.org/pdf/2405.17978) presented at last year’s [NeurIPS](https://neurips.cc/virtual/2024/poster/96416),
    are the current leading models for topic analytics of customer data. For these
    models, we’ll explore in Python code:'
  prefs: []
  type: TYPE_NORMAL
- en: how to effectively **preprocess data**
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: how to train a **Bigram topic model** for customer complaint analysis
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: how to model **topic activity** over time.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 1\. Customer complaints data in companies
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Complaints data are generated by interaction with customers and typically recorded
    in [ERP systems](https://www.sap.com/products/erp/what-is-erp.html). There are
    many channels where customers can raise a concern about a product or service.
    Here are just a few examples:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Email**: email communication is stored for the BI team, e.g., in the SQL
    database.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**After-purchase** **survey**: feedback sent to customers after product purchase.
    Companies either send the emails themselves or use a price comparison website
    (e.g., [Billiger](https://www.billiger-mietwagen.de/) in Germany) where customers
    order the product.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Phone transcriptions**: after prior consent from a customer, some companies
    record the phone communication with customers, which is then available for the
    BI team.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Google reviews:** customers leave comments and reviews on products and services
    worldwide. Google enables authorized users to [export the data](https://takeout.google.com/?pli=1)
    not only for text mining purposes.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Review platforms:** independent review platforms **** (such as [Trustpilot](https://www.trustpilot.com/))
    offer customers a place to provide feedback to brands and companies. This data
    is available through [various APIs.](https://developers.trustpilot.com/service-reviews-api)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Social media** **conversations**: Instagram, X, and Facebook are full of
    product or brand-related comments. The simplest way is to use an official API
    to collect the data. For Instagram and Facebook, go to the [developers’ portal](https://developers.facebook.com/)
    to receive an API key. X works the [same way.](https://developer.x.com/en/docs/x-api)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 2\. Example data
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'As example data, we’ll use the **[Amazon Dog Food Reviews](https://huggingface.co/datasets/NiyatiC/amazon_food_reviews)**
    dataset from **Hugging Face**, released under the [Apache-2.0 license](https://github.com/huggingface/datasets/blob/main/LICENSE).
    The subset for topic modeling only contains 3693 customer reviews collected over
    02/01/2016: 31/12/2020\. Here is what the data looks like:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Image 1\. Amazon dog food reviews dataset](../Images/97ed53fa122597a1c65a97f8d20c2b26.png)'
  prefs: []
  type: TYPE_IMG
- en: Image 1\. Amazon dog food reviews dataset
  prefs: []
  type: TYPE_NORMAL
- en: '![Image 2\. General preprocessing steps for (customer feedback) topic modeling.
    Image by author](../Images/cb486603b34c90392dab5036a8ff05c5.png)'
  prefs: []
  type: TYPE_IMG
- en: Image 2\. General preprocessing steps for (customer feedback) topic modeling.
    Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Data preprocessing
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Processing data systematically in the right order keeps the essential information
    and does not add a new bias. Let’s go along these steps:'
  prefs: []
  type: TYPE_NORMAL
- en: '***#1: Numbers:*** digits are typically the characters to remove in the first
    step.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '***#2: Emoticons:*** product reviews are typically full of them. For topic
    modeling in customer reviews, emojis don’t have much significance.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '***#3: Stopwords:*** apart from [standard stopwords](https://www.geeksforgeeks.org/removing-stop-words-nltk-python/),
    it is common to remove an [extended](https://github.com/PetrKorab/Arabica/blob/main/stopwords_extended.py)
    stopwords list for one or more languages.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '***#4: Punctuation:*** general language has a myriad of special characters
    and punctuation, which should be cleaned in this step.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '***#5: Additional stopwords:*** depending on the use case, some additional
    words are also useful to remove. With the Amazon dog food reviews, these are *"dog",
    "food", "blue", "buffalo", "ha", "month"*, and *"ago".*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '"Delivery" and "deliveries", "box" and "Boxes", or "Price" and "prices" share
    the same word root, but without lemmatization, topic models would model them as
    separate factors. That’s why product reviews should always be lemmatized in the
    last step of preprocessing.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '***#6: Lemmatization:*** groups words into a single form (the lemma), keeping
    the word root information and semantics.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Text preprocessing is model-specific:'
  prefs: []
  type: TYPE_NORMAL
- en: '***FASTopic*** works with clean data on input; some cleaning (stopwords) can
    be done during the training. The simplest and most effective way is to use the
    ***[Washer: The no-code app for text data cleaning](https://washer.textminingstories.com/)***
    offering a no-code way of processing data for text mining projects.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '***BERTopic:*** the [documentation](https://maartengr.github.io/BERTopic/faq.html#how-do-i-reduce-topic-outliers)
    recommends that " r*emoving stop words as a preprocessing step is not advised
    as the transformer-based embedding models that we use need the full context to
    create accurate embeddings".* It uses transformers based on real text, not clean
    text without stopwords, lemmas, or tokens. For this reason, cleaning operations
    should be included in the model training.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![Source: Freepic, Image by macrovector](../Images/0644d607a8c089a179083188347f8479.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Source: [Freepic](https://www.freepik.com/free-vector/romantic-train-trip-background_5972223.htm#fromView=search&page=1&position=24&uuid=1b2ccb61-1b56-453e-b67a-befe1eba6858),
    Image by macrovector'
  prefs: []
  type: TYPE_NORMAL
- en: 4\. Topic modeling with top-notch models
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Let’s now check how the satisfaction factors are distributed across the topics.
    The questions we ask here are:'
  prefs: []
  type: TYPE_NORMAL
- en: '*What were the key problems and qualities customers reported on the product?*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*How has product satisfaction changed over time?*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The [BERTopi](https://arxiv.org/pdf/2203.05794)c and [FASTopic](https://arxiv.org/pdf/2405.17978)
    papers describe the model architectures in detail. Also, my [TDS tutorial](https://towardsdatascience.com/topic-modelling-with-berttopic-in-python-8a80d529de34)
    on topic modeling explains topic classification with BERTopic on a political speech
    dataset.
  prefs: []
  type: TYPE_NORMAL
- en: 4.1\. FASTopic
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Import the libraries and the data (complete code and the requirements are [here](https://github.com/PetrKorab/Topic-Modelling-in-Business-Intelligence-BERTopic-and-FASTopic-in-Code/tree/main)).
    Then, create a list of clean reviews:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: In FASTopic, bigram generation is not directly implemented. To solve this, we
    will make a bigram preprocessing class. The model works with bigrams as with individual
    tokens, so we join the words in bigrams with underscores.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Let’s train the model for eight topics and display the top 20 bigrams for each
    topic in a data frame. We train on single tokens, then remove the underscores
    generating the bigrams.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: 'We’ve modeled the customer satisfaction factors with a dog food product in
    eight distinct topics. Here are the manually annotated topic names:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Image 3: Satisfaction factors modeling with FASTopic. Image by author](../Images/44489c5d9c85709ae603fbc37a6ff234.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Image 3: Satisfaction factors modeling with FASTopic. Image by author'
  prefs: []
  type: TYPE_NORMAL
- en: 'FASTopic returns relatively distinct topics, sorting the comments of the customers:'
  prefs: []
  type: TYPE_NORMAL
- en: '**0: Negative health effects,** *"sensitive stomach", "small bite", "stomach
    issue", "lose weight", "refuse eat", "taste wild", "digestive issue", "upset stomach",
    "stop eat", "gain weight"*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**1: Food quality,** *"love flavor", "quality ingredient", "good ingredient",
    "healthy ingredient", "ingredient quality", "flavor good", "taste great", "healthy
    love", "great healthy", "good healthy", "good health", …*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**2: Positive health effects,** *"healthy fur", "awesome pup", "eye bright"*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**3: Digestion effects,** *"smell bad", "runny poop", "horrible gas", "diarrhea
    vet", "terrible diarrhea," "sick week", "sick buy", "day vomit"*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**4: Pricing,** *"great price", "good price", "love price", "price great",
    "love cheap", "price deliver", "great deal", "price increase", "free shipping",
    …*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**5: Other,** other factors.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**6: Fur effects,** *"coat shiny", "fur baby", "skin issue", "shiny coat",
    "love coat", "coat soft"*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**7: Delivery,** *"open box", "bag rip", "big bag", "hole bag", "open bag",
    "inside box", "bag open", "bag hole", "heavy bag", "rip open", …*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It is also useful to check the weight of these categories in the data. The full
    code is [here](https://github.com/PetrKorab/Topic-Modelling-in-Business-Intelligence-BERTopic-and-FASTopic-in-Code/blob/main/FASTopic.ipynb).
  prefs: []
  type: TYPE_NORMAL
- en: We’ve modeled the customer satisfaction factors with a dog food product. But
    why is it beneficial for companies? Dynamic topic models offer a straightforward
    way of monitoring customer satisfaction over time. They indicate product-related
    problems and help take the right measures. Once the business decisions are taken
    into action, topic models check if they have an effect over time.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: To do so, let’s model topic activity over time at a quarterly frequency.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: The delivery problems in topic 7 peaked in Q3 2018\. Customers complained about
    open and rip boxes much more often, but these problems were fixed in early 2019
    (see the picture below).
  prefs: []
  type: TYPE_NORMAL
- en: '![Image 4: Topic activity over time, FASTopic. Image by author.](../Images/f7a81deed37be4d9e9cf3ed763af3db5.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Image 4: Topic activity over time, FASTopic. Image by author.'
  prefs: []
  type: TYPE_NORMAL
- en: 4.2\. BERTopic
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: BERTopic implements bigrams with _[vectorizer_model](https://scikit-learn.org/1.5/modules/generated/sklearn.feature_extraction.text.CountVectorizer.html),_
    which also works as a data processing pipeline. The code and the requirements
    are [here](https://github.com/PetrKorab/Topic-Modelling-in-Business-Intelligence-BERTopic-and-FASTopic-in-Code/tree/main).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: We train on raw data and clean it with the vectorizer. During the training,
    the vectorizer cleans data from numbers and stopwords, returning lemmatized tokens
    for the bigram model.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: Next, let’s prepare a dataframe with tokens from the model.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: The annotated topics show similar categorization to FASTopic. The differences
    are categorizing Spanish tokens into a separate topic (T7) and filling T1 and
    T5 with adjectives of positive meaning. Delivery problems in T4 are identical
    to FASTopic’s classification.
  prefs: []
  type: TYPE_NORMAL
- en: '![Image 5: Satisfaction factors modeling with BERTopic. Image by author](../Images/62616eab4bdbbf16cfa9bc2559f42fb2.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Image 5: Satisfaction factors modeling with BERTopic. Image by author'
  prefs: []
  type: TYPE_NORMAL
- en: Again, let’s focus on topic activity over time, which gives dynamic topic models
    additional value for BI. BERTopic uses token frequencies (not topic weights as
    FASTopic) for topic activity analysis.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: Most topics are stable over time, except T4, which categorizes delivery problems.
    As with FASTopic, BERTopic shows that customers’ negative complaints about damaged
    boxes rose in mid-2018.
  prefs: []
  type: TYPE_NORMAL
- en: '![Image 6: Topic activity over time, BERTopic. Image by author.](../Images/06e5e5d40541bb77eac16c139c0d9163.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Image 6: Topic activity over time, BERTopic. Image by author.'
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Both models indicated delivery problems in mid-2018, which vanished in early
    2019\. With a topic model API monitoring customer comments on various channels,
    these problems can be fixed before they have a harmful effect on the brand.
  prefs: []
  type: TYPE_NORMAL
- en: The right **data processing is essential** for topic models to make sense in
    the applied world. Cleaning text in the right order minimizes the bias of each
    cleaning operation. Numbers and emoticons are typically removed first, followed
    by stopwords. Punctuation is cleaned afterward so that stopwords don’t break up
    into two tokens ("we’ve" -> "we" + ‘ve"). Additional tokens are removed in the
    next step in the clean data before lemmatization, which unifies tokens with the
    same semantics.
  prefs: []
  type: TYPE_NORMAL
- en: '**FASTopic** deserves much better [documentation](https://github.com/BobXWu/FASTopic),
    which now provides only basic information. Especially because its (1) simplicity
    of use and (2) stability in training on small datasets makes it a top-notch alternative
    to BERTopic. It is mainly practical for small companies like e-shops that typically
    don’t collect large text datasets and seek simple and efficient solutions. Data
    and full codes for this tutorial [here](https://github.com/PetrKorab/Topic-Modelling-in-Business-Intelligence-BERTopic-and-FASTopic-in-Code/tree/main).'
  prefs: []
  type: TYPE_NORMAL
- en: '*If you enjoy my work, you can invite me [for coffee](https://www.buymeacoffee.com/petrkorab)
    and support my writing. You can also subscribe to my [email list](https://medium.com/subscribe/@petrkorab)
    to get notified about my new articles. Thanks!*'
  prefs: []
  type: TYPE_NORMAL
- en: References
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '[1] Grootendorst (2022). Bertopic: Neural Topic Modeling With A Class-Based
    TF-IDF Procedure. *[Computer Science.](https://arxiv.org/abs/2203.05794)*'
  prefs: []
  type: TYPE_NORMAL
- en: '[2] Wu, X, Nguyen, T., Ce Zhang, D., Yang Wang, W., Luu, A. T. (2024). FASTopic:
    [A Fast, Adaptive, Stable, and Transferable Topic Modeling Paradigm](https://arxiv.org/abs/2405.17978).
    arXiv preprint: 2405.17978.'
  prefs: []
  type: TYPE_NORMAL
