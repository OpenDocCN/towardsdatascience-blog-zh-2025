- en: 'Not Everything Needs Automation: 5 Practical AI Agents That Deliver Enterprise
    Value'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/not-everything-needs-automation-5-practical-ai-agents-that-deliver-enterprise-value/](https://towardsdatascience.com/not-everything-needs-automation-5-practical-ai-agents-that-deliver-enterprise-value/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '<mdspan datatext="el1749232156517" class="mdspan-comment">If you’re working</mdspan>
    in an enterprise organization, you’ve probably felt the paradox firsthand. AI
    dominates your strategic decks, fills your review meetings, and weaves into roadmap
    discussions. However, when you actually try to turn these AI visions into practical
    solutions, you’re often left wondering:'
  prefs: []
  type: TYPE_NORMAL
- en: '*What’s actually working? Where do we start to see measurable value of AI?*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Right now, most AI conversations revolve around copilots, autonomous workflows,
    and agent chains. But what I’ve seen consistently succeed across data, operations,
    and platform teams are solutions that are focused AI agents that streamline repetitive
    tasks, remove daily frustrations, and enable teams to spend their time more meaningfully.
  prefs: []
  type: TYPE_NORMAL
- en: I believe that real enterprise AI value starts not with ambitious goals, but
    lies in improving the existing messy and complex environments that your teams
    navigate every day. The AI agents that deliver tangible results meet your organization
    exactly where it stands, helping your teams reclaim time, optimize your workflows,
    and amplify your business impact. Here are the top five use cases that matter
    most if you’re looking for clarity on how to start or scale your enterprise AI
    journey.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f67d041ed74fb21f555b4a7fb3f0532a.png)'
  prefs: []
  type: TYPE_IMG
- en: Photo by Weiwei Hu from [The Next Step](https://thenextsteps1.substack.com/)
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 1\. AI Knowledge Assistant
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: One of the most impactful use cases of AI agents is helping teams effectively
    leverage their own internal knowledge. Think of an AI knowledge assistant as your
    organization’s trusted internal advisor, which is searchable, conversational,
    and capable of finding critical information buried within documents across SharePoint
    folders, confluence sites, and internal wikis, etc.
  prefs: []
  type: TYPE_NORMAL
- en: In many organizations, institutional knowledge often gets trapped in disorganized
    documentation, outdated intranet pages, or long email chains. New hires often
    ask the same basic questions repeatedly, and even tenured employees spend hours
    tracking down answers they’ve seen before. It slows teams down, reduces productivity,
    and leads to unnecessary frustration.
  prefs: []
  type: TYPE_NORMAL
- en: AI knowledge assistants leverage the RAG-based approach. When someone poses
    a question, agents retrieve relevant chunks of information from your organization’s
    internal documentation using an embedding model and vector database. They provide
    this curated context to a language model, which generates a tailored response.
    Instead of relying on generalized internet knowledge, these agents deliver answers
    based on your company’s content.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/6d9b46fd7b787b911ec660811ec08b0e.png)'
  prefs: []
  type: TYPE_IMG
- en: Photo by Weiwei Hu from [The Next Step](https://thenextsteps1.substack.com/)
  prefs: []
  type: TYPE_NORMAL
- en: Tools like LangChain and LlamaIndex streamline this process by abstracting complexity
    and simplifying how you organize, index, and query knowledge repositories. Platforms
    such as Langchain-Chatchat or FastGPT offer user-friendly solutions that your
    teams can quickly deploy without extensive coding or custom engineering.
  prefs: []
  type: TYPE_NORMAL
- en: To illustrate the real-world impact, consider a supply-chain organization managing
    contracts across numerous global regions. Employees frequently struggled to locate
    critical information, which often led to delays. They implemented an AI knowledge
    assistant trained on years of shipping policies, warranty rules, and regional
    compliance guidelines. Now employees could simply ask questions like, “What are
    the warranty requirements for shipments to a given country?” and receive real-time
    precise answers. With these agents, teams can reclaim their time that is previously
    lost due to repetitive research and email exchanges. They become an essential
    partner of the supply chain team, freeing up their capacity for more valuable
    tasks.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Data Analysis Assistant
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In today’s enterprise, most enterprise teams have adopted BI tools to streamline
    reporting and dashboards. But these tools alone cannot always meet the demand
    for flexible, ad-hoc data inquiries. Despite self-service dashboards being readily
    available, business stakeholders still frequently message data analysts directly,
    asking questions like, “Can you help pull this data for me?” This dynamic creates
    a bottleneck: data analysts become overwhelmed by JIRA ad-hoc requests, and stakeholders
    remain operating in a blackbox, waiting for simple answers to their questions.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The underlying issue is this: decision-makers tend to ask specific questions
    that dashboards aren’t explicitly designed to answer. Data analysts spend hours
    each day trying to fulfill these one-off requests, leaving them very little bandwidth
    to address deeper, strategic questions. As a result, important business questions
    often remain unasked or unanswered, which slow down the decision-making process
    across the organization.'
  prefs: []
  type: TYPE_NORMAL
- en: This is exactly where data analysis agents come into play. These agents enable
    stakeholders to pose their questions without the need to write SQL queries themselves
    or navigate complex analytics tools. By converting plain-language requests into
    structured queries, code snippets, or direct API calls, data analysis agents can
    significantly reduce the time and effort involved in accessing critical data.
    Operating within secure, curated data environments, data agents can leverage semantic
    layers, permission-aware queries, and context-sensitive prompts to ensure both
    accuracy and security.
  prefs: []
  type: TYPE_NORMAL
- en: Depending on the specific requests and available data sources, data analysis
    agents can also interact directly with reporting APIs, query local SQL warehouses,
    parse data from Excel files, or even orchestrate multi-step workflows culminating
    in visual reports or dashboards.
  prefs: []
  type: TYPE_NORMAL
- en: 'Consider a typical scenario: a product manager wants to quickly determine how
    many inactive subscribers have reactivated their accounts over the past quarter.
    Rather than creating another JIRA ad-hoc request, the manager can simply ask the
    agent in plain English. The agent will generate a SQL query tailored to the curated
    datasets, execute it securely, and provide the results instantly. It reduces data
    analyst workloads, clears ad-hoc request backlogs, and slashes response times
    from days or weeks down to minutes or even seconds.'
  prefs: []
  type: TYPE_NORMAL
- en: It’s important to note, however, that the effectiveness of these data analysis
    agents heavily depends on the reliability of the underlying LLMs. Even highly
    tuned approaches like Text2SQL currently achieve around 80% accuracy at best.
    Therefore, in complex enterprise environments, it’s essential to have fallback
    logic and human oversight to ensure accuracy and trust in the data analysis findings
    and results.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/157c8907ec121b6f4801aecdd3242b08.png)'
  prefs: []
  type: TYPE_IMG
- en: Photo by Weiwei Hu from [The Next Step](https://thenextsteps1.substack.com/)
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Tool and App Integration Assistants
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Today AI tools and APIs are pretty accessible, but turning an employee’s intention
    into real action remains surprisingly difficult. Even when APIs exist, they’re
    often poorly documented or inconsistently maintained. Parameters might change
    without clear communication, leaving teams confused and frustrated. On top of
    this, people may also not fully aware of what tools or APIs are available to them.
    Even when they are, they may lack the necessary permissions or skills to effectively
    leverage them.
  prefs: []
  type: TYPE_NORMAL
- en: This is where integration agents become critical. They can help bridge the gap
    between messy user requests and structured API calls. These agents use smart retrieval
    techniques, such as vector search over comprehensive API documentation, combined
    with structured prompt engineering and JSON parsing, to ensure requests are accurately
    understood and reliably executed. Some teams further enhance this approach by
    structuring API capabilities as JSON schema objects, retrieving relevant tools
    to avoid overwhelming context, and assembling prompts in ways that significantly
    reduce confusion or errors.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/75540f60970000d03c261f44e8b5da6d.png)'
  prefs: []
  type: TYPE_IMG
- en: Photo by Weiwei Hu from [The Next Step](https://thenextsteps1.substack.com/)
  prefs: []
  type: TYPE_NORMAL
- en: Imagine a common scenario where an enterprise HR platform manages multiple disconnected
    internal systems. Employees must navigate each separate system for routine tasks,
    like submitting their vacation requests, retrieving their tax documents, or checking
    their benefits. It’s cumbersome, slow, and frustrating for everyone involved.
  prefs: []
  type: TYPE_NORMAL
- en: An integration agent can solve this by allowing employees to simply ask, “Can
    you get me my latest tax form?” The agent interprets the request, authenticates
    across payroll, HRIS, and document management systems, executes the required API
    calls, and delivers the requested document in seconds rather than through multiple
    clicks across different HR portals. This streamlined approach not only reduces
    the time spent on routine tasks but also empowers employees and cuts down HR support
    tickets, allowing HR teams to focus on more strategic and meaningful activities.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 4\. Web Automation Agents
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: For many enterprise organizations, there are critical workflows and data-gathering
    tasks that depend entirely on manual browser interactions. Legacy portals, partner
    sites, or internal dashboards frequently lack accessible APIs, and the effort
    required to rebuild or integrate them rarely takes priority. As a result, teams
    continue to perform repetitive, UI-driven tasks day after day.
  prefs: []
  type: TYPE_NORMAL
- en: Instead of relying on rigid RPA scripts, which can break as soon as anything
    in the interface changes, web automation agents use natural language instructions
    to interact with the browser. They help navigate pages, click buttons, fill out
    forms, and scrape data, adapting to minor interface shifts.
  prefs: []
  type: TYPE_NORMAL
- en: An e-commerce team was responsible for tracking pricing and inventory levels
    across multiple vendor websites. Maintaining price parity was crucial for protecting
    profit margins, yet the tracking process itself was manual and prone to inconsistency.
    The solution was to deploy a web automation agent that logged into vendor portals
    each day, navigated directly to relevant product pages, scraped accurate pricing
    and stock information, and compiled it into structured daily reports. As a result,
    the agent freed up the equivalent workload of two full-time coordinators and boosted
    price-tracking accuracy. Pricing mismatches that previously went unnoticed for
    days were now identified within a day, which significantly reduced the lost margin.
  prefs: []
  type: TYPE_NORMAL
- en: Of course, even with these improvements, web automation has its challenges.
    The DOM structure might change overnight, page layouts may shift unexpectedly,
    or login flows may change, which will introduce brittleness and require systematic
    monitoring. Because of these inherent limitations, web automation agents are best
    suited to well-defined workflows. They work well when tasks are clear, consistent,
    and repeatable, like bulk data extraction or structured form submissions. Looking
    ahead, more sophisticated visual agents powered by technologies like GPT-4V could
    expand this flexibility even further, recognizing UI elements visually and adapting
    intuitively to complex changes.
  prefs: []
  type: TYPE_NORMAL
- en: When applied thoughtfully, web automation agents can transform repeated inefficient
    tasks into workflows that are both manageable and scalable. They help save teams
    hours of manual labor and allowing them to refocus on more meaningful, strategic
    work.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 5\. Custom Workflow Assistant
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: How do you make everything come together? Can you have agents plan, reason,
    and coordinate multiple actions across diverse tools without slipping into full,
    unchecked automation? For enterprise leaders and risk teams, it’s important to
    maintain transparency, checkpoints, and control. Black-box processes that just
    run with full automation and insufficient oversight raise red flags for audit,
    compliance, and risk management teams.
  prefs: []
  type: TYPE_NORMAL
- en: 'That’s why orchestrated agents resonate well. Think of them as intelligent
    orchestration: agents handle retrieval, decision logic, and execution, all while
    operating safely within clearly defined guardrails. Instead of promising full
    autonomy, the AI agents provide assistive intelligence. They help draft the first
    version, route tasks appropriately, gather necessary context, and suggest useful
    next steps. Humans retain the final approvers, ensuring clear accountability at
    every step. It’s a model that can scale because it fosters trust and demonstrate
    reliability, clarity, and safety as well.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/4e2f216f566424d1540d4e0c60889727.png)'
  prefs: []
  type: TYPE_IMG
- en: Photo by Weiwei Hu from [The Next Step](https://thenextsteps1.substack.com/)
  prefs: []
  type: TYPE_NORMAL
- en: In practice, these custom workflow agents break down complex, multi-step requests
    into understandable sub-tasks. They route decisions using retrieval from internal
    knowledge, call relevant tools, generate and execute code snippets, and importantly,
    stop at critical checkpoints for human verification. Agent platforms like OpenAgents
    reflect this approach, emphasizing controlled, step-by-step execution with checkpoints
    built into the workflow.
  prefs: []
  type: TYPE_NORMAL
- en: Consider an enterprise procurement team that needs to manage a rapid influx
    of vendor quotes. The challenge was that these buyers needed to quickly respond
    to price fluctuations, validating limits, securing necessary approvals, and finalizing
    documentation. They deployed a custom workflow agent that helps monitor the incoming
    vendor quotes, automatically checking prices against internal guidelines, preparing
    draft purchase intents, and routing them directly to procurement managers for
    quick approval. They were able to reduce the processing time, enable the procurement
    team to react swiftly and capture twice as many margin-enhancing opportunities
    each month.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: What’s Working and Why
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The most valuable AI agents aren’t the ones that try to achieve full autonomy.
    They’re embedded helpers focused on getting things done, making your existing
    processes smoother, and giving your teams back time and focus. If you’re thinking
    about where to begin, don’t start with general-purpose AI. Instead, start with
    specific use cases that align with how your team works today:'
  prefs: []
  type: TYPE_NORMAL
- en: A **knowledge assistant agent** that surfaces answers from your internal documents,
    policies, or historical decisions.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A **data analysis agent** that transforms natural language into SQL or reporting
    logic, so you don’t wait days for answers.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: An **integration agent** that bridges your internal tools and APIs, connecting
    intent to action.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A **web automation agent** that handles routine clicks and logins across legacy
    or third-party systems.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A **custom workflow agent** that sequences multi-step actions, routes approvals,
    and keeps people in the loop.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/c312fca4477effa5151f0d810474a410.png)'
  prefs: []
  type: TYPE_IMG
- en: Photo by Weiwei Hu from [The Next Step](https://thenextsteps1.substack.com/)
  prefs: []
  type: TYPE_NORMAL
- en: These are the kinds of AI agents that can actually scale in the enterprise.
    They deliver results you can trust, because they’re modular, human-checked, and
    built to fit your environment. When you build AI agents with clear scope, smart
    fallback logic, and tight integration, they become the teammates that everyone
    can rely on, handling the things that very few people has time for, but that make
    everything else work better.
  prefs: []
  type: TYPE_NORMAL
- en: Therefore, you don’t need to automate everything. Just enough to make what you’re
    already doing smarter. That’s where real enterprise AI value happens with capable
    and scalable agents you want on your side.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
