- en: The ONLY Data Science Roadmap You Need to Get a Job
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/the-only-data-science-roadmap-you-need-to-get-a-job/](https://towardsdatascience.com/the-only-data-science-roadmap-you-need-to-get-a-job/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1753973363296" class="mdspan-comment">Are</mdspan> you looking
    to become a data scientist and don’t know where to start?
  prefs: []
  type: TYPE_NORMAL
- en: In this article, I want to provide you with a straightforward, no-nonsense learning
    roadmap that you can follow to break into the industry.
  prefs: []
  type: TYPE_NORMAL
- en: By the end, you’ll finally have a clear understanding of what is required and
    the best resources to use, which should hopefully reduce any overwhelm you may
    have and help you land that data science job quicker!
  prefs: []
  type: TYPE_NORMAL
- en: Statistics
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: A hill that I am willing to die on is that, in my opinion, statistics is the
    most important area you should know as a data scientist.
  prefs: []
  type: TYPE_NORMAL
- en: New machine learning trends come and go, technologies often get replaced, but
    statistics has stood the test of time for centuries.
  prefs: []
  type: TYPE_NORMAL
- en: 'According to [Wikipedia](https://en.wikipedia.org/wiki/Statistics):'
  prefs: []
  type: TYPE_NORMAL
- en: '*Statistics is the discipline that concerns the collection, organisation, analysis,
    interpretation, and presentation of data.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Given the title is “data” scientist, I think it’s obvious how vital statistics
    is to our field.
  prefs: []
  type: TYPE_NORMAL
- en: Fortunately, you don’t need to have a PhD in causal inference or stochastic
    calculus to have the required statistics knowledge. The fundamentals are the most
    important and literally 90% of the job.
  prefs: []
  type: TYPE_NORMAL
- en: What To Learn
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The areas you need to strongly grasp are:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Summary Statistics** — Mean, median, mode, variance, correlations, anything
    that allows you to summarise data to draw interesting conclusions.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Visualisations** — Learn to plot data with graphs like bar chart, line graph,
    pie chart, etc. After all, a picture speaks a 1000 words.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Probability Distributions** — Learn the most common ones like Normal, Poisson,
    Binomial and Gamma. These are the ones I use most frequently.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Probability Theory** **— **This area is quite big, but the main things to
    learn are: random variables, central limit theorem, sampling and maximum likelihood
    estimation.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Hypothesis Testing** — If you are going to work on any experiments, you need
    to understand how they are statistically run. This involves learning about confidence
    intervals, significance levels, the z-test, the t-test, and test statistics. You
    simply need to know how to run hypothesis testing.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Bayesian Statistics** — It’s well worth knowing some Bayesian statistics,
    as I find people throw around this term loosely in the field all the time without
    really understanding. It’s a massive area, but as always, learn the fundamentals,
    such as Bayes’ theorem, conjugate priors, credible intervals, and Bayesian regression.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How To Learn
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As I mentioned at the beginning, I want this roadmap to be simple and prevent
    any analysis paralysis you may experience, so to learn nearly all the above, I
    recommend getting the [**Practical Statistics for Data Science**](https://amzn.to/4m86nPk)
    **(affiliate link)** textbook.
  prefs: []
  type: TYPE_NORMAL
- en: However, it does not cover Bayesian statistics, and for that, I recommend [**Think
    Bayes**](https://amzn.to/3J4AYih) **(affiliate link)** textbook.
  prefs: []
  type: TYPE_NORMAL
- en: These two books are all you need and they are specifically designed for data
    scientists and are in Python.
  prefs: []
  type: TYPE_NORMAL
- en: Maths
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Statistics, by nature, is a pretty applied field, and some of the concepts require
    pure maths knowledge to fully understand.
  prefs: []
  type: TYPE_NORMAL
- en: Additionally, when it comes to areas like machine learning, you need a good
    understanding of linear algebra and calculus to fully grasp what is happening
    under the hood.
  prefs: []
  type: TYPE_NORMAL
- en: What To Learn
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Calculus
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '[**Calculus**](https://en.wikipedia.org/wiki/Calculus) is how machine learning
    algorithms actually “learn.” Their “learning” is done through numerical continuous
    optimisation, and the areas you should learn are:'
  prefs: []
  type: TYPE_NORMAL
- en: What is a derivative, and what is it measuring?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Learn the derivatives of standard functions like sine, cosine, exponential,
    tan, etc.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What are turning points, maxima and minima?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Chain and product rules are the reason neural networks work so well, as they
    are the core process behind backpropagation.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Understand partial derivatives and their use in multivariable calculus.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What is integration, and what is it doing?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Integration by parts and substitution.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The integral of standard functions like sine, natural log and other polynomials.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Linear Algebra
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '[**Linear algebra**](https://en.wikipedia.org/wiki/Linear_algebra) is a mathematical
    field that deals with vectors, matrices, and their transformations.'
  prefs: []
  type: TYPE_NORMAL
- en: 'You should learn:'
  prefs: []
  type: TYPE_NORMAL
- en: Vectors, their magnitude, orientation and component. Additionally, operations
    such as the dot and cross product rules.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Matrices and their operations, including trace, inverse, transpose, dot product,
    and cross product rules.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Learn how to solve systems of linear equations through techniques like elimination,
    row reduction, and Cramer’s rule.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Gain an understanding of eigenvalues and eigenvectors. These are the foundation
    of techniques like Principal Component Analysis, which helps reduce dimensionality
    in datasets.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How To Learn
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In previous videos, I recommended some textbooks which, while useful, were quite
    dense and not practical for most people to get through in just a few months.
  prefs: []
  type: TYPE_NORMAL
- en: That’s why I now suggest taking the [**Mathematics for Machine Learning and
    Data Science Specialization**](https://www.coursera.org/specializations/mathematics-for-machine-learning-and-data-science/)
    on Coursera.
  prefs: []
  type: TYPE_NORMAL
- en: This course is tailored specifically for data science with exercises in Python.
    It skips the unnecessary theory and focuses on what you actually need for real-world
    work.
  prefs: []
  type: TYPE_NORMAL
- en: Programming
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'There are two, and only two, programming languages you need: [**Python**](https://medium.com/data-science/how-i-would-learn-python-in-2024-from-zero-b1c5edcdec84?sk=7d25e0dc7d72decdd9636142bf6f1a77)
    and [**SQL**](https://www.youtube.com/watch?v=DfLELVaXgi0).'
  prefs: []
  type: TYPE_NORMAL
- en: What To Learn
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Python**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Keep it simple and learn the fundamentals:'
  prefs: []
  type: TYPE_NORMAL
- en: Variables and data types
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Boolean and comparison operators
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Control flow and conditionals
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For and while loops
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Functions and classes
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'You also want to learn specific scientific computing libraries:'
  prefs: []
  type: TYPE_NORMAL
- en: '[**NumPy**](https://numpy.org/devdocs/user/quickstart.html) — Numerical computing
    and arrays.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**Pandas**](https://pandas.pydata.org/) — Data manipulation and analysis.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**Matplotlib**](https://matplotlib.org/stable/tutorials/index.html), [**Plotly**](https://plotly.com/)
    and [**Seaborn**](https://seaborn.pydata.org/) — Data visualisation.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**scikit-learn**](https://scikit-learn.org/1.4/tutorial/index.html)— Implementing
    classical ML algorithms.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: SQL
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: You want to learn all the fundamental functions needed for analysis in SQL.
    It’s quite a small language, so there aren’t many things to learn.
  prefs: []
  type: TYPE_NORMAL
- en: '**SELECT * FROM** (standard query)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**ALTER, INSERT, CREATE** (modify tables)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**GROUP BY, ORDER BY **'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**WHERE, AND, OR, BETWEEN, IN, HAVING** (filter tables)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**AVG, COUNT, MIN, MAX, SUM** (aggregate functions)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**FULL JOIN, LEFT JOIN, RIGHT JOIN, INNER JOIN, UNION**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**CASE** (if statements)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**DATEADD, DATEDIFF, DATEPART** (date and time functions)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How To Learn
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: There are many introductory Python and SQL courses, and they all teach the same
    material. So, choose one and get going with it. You literally can’t go wrong here.
  prefs: []
  type: TYPE_NORMAL
- en: If you want a recommendation, then checkout [**W3Schools**](https://www.w3schools.com/)or[**freeCodeCamp
    videos**](https://www.freecodecamp.org/news/tag/python/). I have used both and
    found them very good.
  prefs: []
  type: TYPE_NORMAL
- en: Tech Tools
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: As well as Python and SQL, you need to invest some time learning other technologies
    that are used on the job.
  prefs: []
  type: TYPE_NORMAL
- en: What To Learn
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'There are so many tools, and every company is different, but these are the
    ones that remain consistent throughout:'
  prefs: []
  type: TYPE_NORMAL
- en: '[**Git and GitHub**](https://github.com/egorhowell) — Virtually every company
    uses this for version control, so you need to learn it; there’s no way around
    it, I am afraid.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**Bash**](https://en.wikipedia.org/wiki/Bash_%28Unix_shell%29)**/Zsh — **You
    will work in the terminal a lot, and the majority of companies rely on UNIX-like
    systems, so you need to be comfortable operating in the command line.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**Poetry**](https://python-poetry.org/) **/** [**PyEnv**](https://github.com/pyenv/pyenv)
    / [**UV**](https://docs.astral.sh/uv/)** — **Managing packages and Python versions
    is crucial in any real-world application, so it’s well worth getting familiar
    with these tools.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How To Learn
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'For git, I recommend this crash course from freeCodeCamp:'
  prefs: []
  type: TYPE_NORMAL
- en: For learning terminal and bash shell scripting, I also recommend this video
    from freeCodeCamp.
  prefs: []
  type: TYPE_NORMAL
- en: 'And for learning PyEnv, Poetry and UV, check out these articles:'
  prefs: []
  type: TYPE_NORMAL
- en: '[Managing Multiple Python Versions With Pyenv](https://realpython.com/intro-to-pyenv/)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Dependency Management With Python Poetry](https://realpython.com/dependency-management-python-poetry/)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Managing Python Projects With UV](https://realpython.com/python-uv/)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Machine Learning
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Right, time for the fun stuff!
  prefs: []
  type: TYPE_NORMAL
- en: Machine learning is a vast field, and we can’t learn everything, even if we
    tried our whole lives.
  prefs: []
  type: TYPE_NORMAL
- en: To be a data scientist, like I always say, we only need to know the fundamentals
    and a little bit of deep learning.
  prefs: []
  type: TYPE_NORMAL
- en: Forget learning LLMs, transformers, diffusion models, etc. That is not necessary
    for the majority of entry-level positions, and to be honest, for many jobs in
    general.
  prefs: []
  type: TYPE_NORMAL
- en: Focus on nailing the basics, as they transcend into everything else. To this
    day, I still use basic regression models, as do many senior machine learning engineers
    I work with.
  prefs: []
  type: TYPE_NORMAL
- en: It’s all about the application and understanding your problem, rather than trying
    to be flashy by using the latest state-of-the-art technology when it is not needed.
  prefs: []
  type: TYPE_NORMAL
- en: What To Learn
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The key algorithms and concepts you should learn are:'
  prefs: []
  type: TYPE_NORMAL
- en: Linear, logistic and polynomial regression.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Decision trees, random forests and gradient-boosted trees.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Support vector machines.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Regular neural networks.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: K-means and K-nearest neighbour clustering.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Regularisation, bias vs variance tradeoff and cross-validation.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How To Learn
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The following two resources is all you need. So, work through them iteratively,
    and your machine learning knowledge will surpass that of most practitioners in
    the industry. Trust me.
  prefs: []
  type: TYPE_NORMAL
- en: The first course ML course I took was [**Machine Learning Specialisation by
    Andrew Ng**](https://www.coursera.org/learn/machine-learning)and I think it is
    probably the best one out there. You could get away with just doing this one on
    its own, as it’s that good.
  prefs: []
  type: TYPE_NORMAL
- en: 'The second one is probably the best machine learning book ever written: [**Hands-On
    ML with Scikit-Learn, Keras, and TensorFlow**](https://amzn.to/4iJxGyh) **(affiliate
    link).** If I had to give only one book to learn machine learning, this would
    be it!'
  prefs: []
  type: TYPE_NORMAL
- en: Deep Learning
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: In my opinion, this is optional, but I know many of you are interested in deep
    learning, so I have included it here for completeness.
  prefs: []
  type: TYPE_NORMAL
- en: I personally wouldn’t waste too much time here, as it can be easy to get lost
    in all the latest developments.
  prefs: []
  type: TYPE_NORMAL
- en: What To Learn
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'These deep learning concepts have stood the test of time, so they are well
    worth investing your learning in:'
  prefs: []
  type: TYPE_NORMAL
- en: '[**Convolutional Neural Networks (CNNs)** ](https://medium.com/towards-data-science/convolution-explained-introduction-to-convolutional-neural-networks-5babc47fbcaa?sk=e6ce3db3f3c8a1a38798779beb719578)— These
    were used for computer vision tasks such as recognising and categorising images.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**Recurrent Neural Networks (RNNs) **](https://towardsdatascience.com/recurrent-neural-networks-an-introduction-to-sequence-modelling-478e0e07c4ec?sk=3d8ff48072b608f38bf120f78a050718)**— **These
    were used for sequence-based data like time series and natural language.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**Transformers**](https://jalammar.github.io/illustrated-transformer/)** — **The
    current state of the art algorithms powering the AI boom.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How To Learn
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: These are the resources I have used to learn deep learning, and they are all
    you need.
  prefs: []
  type: TYPE_NORMAL
- en: '[**Deep Learning Specialization**](https://www.coursera.org/specializations/deep-learning)byAndrew
    Ng. — This is the follow-on course from the Machine Learning Specialisation and
    will teach all you need to know about deep learning, CNNs, and RNNs.'
  prefs: []
  type: TYPE_NORMAL
- en: Again, the [**Hands-On ML with Scikit-Learn, Keras, and TensorFlow**](https://amzn.to/4iJxGyh)
    **(affiliate link)** textbook as an excellent deep learning section from chapter
    14 onwards.
  prefs: []
  type: TYPE_NORMAL
- en: Finally, some of you may have heard of [**Andrej Karpathy**](https://karpathy.ai/),
    if you haven’t he is probably one of the best AI researchers at the moment and
    has worked at Tesla and OpenAI.
  prefs: []
  type: TYPE_NORMAL
- en: 'Anyway, his [**Neural Networks: Zero to Hero**](https://www.youtube.com/playlist?list=PLAqhIrjkxbuWI23v9cThsA9GvCAUhRvKZ)YouTubecourse
    is phenomenal and teaches you how to build your own Generative Pre-trained Transformers
    (GPT) from scratch.'
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: If you go through everything in this article, you will have excellent knowledge
    to enter the data science field.
  prefs: []
  type: TYPE_NORMAL
- en: However, having this knowledge is not enough; you need to build a solid portfolio
    to land a job.
  prefs: []
  type: TYPE_NORMAL
- en: That’s why I recommend checking out my previous article, where I explain the
    exact projects you need to build to secure a job as soon as possible.
  prefs: []
  type: TYPE_NORMAL
- en: See you there!
  prefs: []
  type: TYPE_NORMAL
