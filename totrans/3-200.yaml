- en: Generative AI Is Declarative
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 生成式AI是声明式的
- en: 原文：[https://towardsdatascience.com/generative-ai-is-declarative/](https://towardsdatascience.com/generative-ai-is-declarative/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/generative-ai-is-declarative/](https://towardsdatascience.com/generative-ai-is-declarative/)
- en: ChatGPT launched in 2022 and kicked off the generative AI boom. In the two years
    since, academics, technologists, and armchair experts have written libraries worth
    of articles on the technical underpinnings of generative AI and about the potential
    capabilities of both current and future generative AI models.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT于2022年推出，引发了生成式AI的繁荣。在这两年里，学者、技术专家和沙发上的专家们撰写了大量关于生成式AI技术基础和当前及未来生成式AI模型潜在能力的文章。
- en: Surprisingly little has been written about how we interact with these tools—the
    human-AI interface. The point where we interact with AI models is at least as
    important as the algorithms and data that create them. “There is no success where
    there is no possibility of failure, no art without the resistance of the medium”
    (Raymond Chandler). In that vein, it’s useful to examine human-AI interaction
    and the strengths and weaknesses inherent in that interaction. If we understand
    the “resistance in the medium” then product managers can make smarter decisions
    about how to incorporate generative AI into their products. Executives can make
    smarter decisions about what capabilities to invest in. Engineers and designers
    can build around the tools’ limitations and showcase their strengths. Everyday
    people can know when to use generative AI and when not to.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 关于我们如何与这些工具互动——人机界面——的讨论出奇地少。我们与AI模型互动的点至少与创建它们的算法和数据一样重要。“没有失败可能性的成功不是成功，没有媒介抵抗的艺术不是艺术”（雷蒙德·钱德勒）。沿着这个思路，研究人机交互及其内在的优缺点是有用的。如果我们理解了“媒介的抵抗”，那么产品经理可以更明智地决定如何将生成式AI融入他们的产品中。高管可以更明智地决定投资哪些能力。工程师和设计师可以围绕工具的限制构建，并展示其优势。普通人可以知道何时使用生成式AI，何时不使用。
- en: 'Imagine walking into a restaurant and ordering a cheeseburger. You don’t tell
    the chef how to grind the beef, how hot to set the grill, or how long to toast
    the bun. Instead, you simply describe what you want: “I’d like a cheeseburger,
    medium rare, with lettuce and tomato.” The chef interprets your request, handles
    the implementation, and delivers the desired outcome. This is the essence of **declarative
    interaction**—focusing on the what rather than the how.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下走进一家餐厅点一个芝士汉堡。你不需要告诉厨师如何磨碎牛肉，如何设置烤架的温度，或者如何烤面包。相反，你只是描述你想要的东西：“我想要一个五分熟的芝士汉堡，加上生菜和番茄。”厨师解释你的要求，处理实施，并交付你想要的结果。这就是**声明式交互**的本质——关注“是什么”而不是“如何”。
- en: 'Now, imagine interacting with a Large Language Model (LLM) like ChatGPT. You
    don’t have to provide step-by-step instructions for how to generate a response.
    Instead, you describe the result you’re looking for: “A user story that lets us
    implement A/B testing for the Buy button on our website.” The LLM interprets your
    prompt, fills in the missing details, and delivers a response. Just like ordering
    a cheeseburger, this is a declarative mode of interaction.'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，想象一下与一个像ChatGPT这样的大型语言模型（LLM）互动。你不需要提供如何生成响应的逐步指令。相反，你描述你想要的结果：“一个让我们能够对我们网站上的购买按钮进行A/B测试的用户故事。”LLM解释你的提示，填补缺失的细节，并给出响应。就像点一个芝士汉堡一样，这是一种声明式交互模式。
- en: 'Explaining the steps to make a cheeseburger is an **imperative interaction**.
    Our LLM prompts sometimes *feel* imperative. We might phrase our prompts like
    a question: ”What is the tallest mountain on earth?” This is equivalent to describing
    “the answer to the question ‘What is the tallest mountain on earth?’” We might
    phrase our prompt as a series of instructions: ”Write a summary of the attached
    report, then read it as if you are a product manager, then type up some feedback
    on the report.” But, again, we’re describing the result of a process with some
    context for what that process is. In this case, it is a sequence of descriptive
    results—the report then the feedback.'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 解释制作芝士汉堡的步骤是一种**命令式交互**。我们的LLM提示有时*感觉*像是命令式的。我们可能会把提示语说成一个问题：“地球上最高的山是什么？”这相当于描述“‘地球上最高的山是什么？’这个问题的答案”。我们可能会把提示语说成一系列指令：“写一份关于所附报告的摘要，然后像产品经理一样阅读它，然后对报告写一些反馈。”但，再次强调，我们是在描述一个过程的结果，并提供了关于该过程的一些背景。在这种情况下，它是一系列描述性的结果——报告然后是反馈。
- en: This is a more useful way to think about LLMs and generative AI. In some ways
    it is more accurate; the neural network model behind the curtain doesn’t explain
    *why* or *how* it produced one output instead of another. More importantly though,
    the limitations and strengths of generative AI make more sense and become more
    predictable when we think of these models as declarative.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一种更有用的思考 LLMs 和生成式 AI 的方式。在某种程度上，它更准确；幕后的神经网络模型并不能解释**为什么**或**如何**产生一个输出而不是另一个。更重要的是，当我们把这些模型视为声明式时，生成式
    AI 的局限性和优势就更有意义，也更可预测。
- en: LLMs as a declarative mode of interaction
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: LLMs 作为一种声明式交互模式
- en: Computer scientists use the term “declarative” to describe coding languages.
    SQL is one of the most common. The code describes the output table and the procedures
    in the database figure out how to retrieve and combine the data to produce the
    result. LLMs share many of the benefits of declarative languages like SQL or declarative
    interactions like ordering a cheeseburger.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 计算机科学家使用“声明式”这个术语来描述编程语言。SQL 是其中最常见的一种。代码描述了输出表和数据库中的过程确定如何检索和组合数据以产生结果。LLMs
    与 SQL 或点芝士汉堡等声明式交互有许多共同的好处。
- en: '**Focus on desired outcome**: Just as you describe the cheeseburger you want,
    you describe the output you want from the LLM. For example, “Summarize this article
    in three bullet points” focuses on the result, not the process.'
  id: totrans-10
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**关注期望的结果**：就像你描述你想要的芝士汉堡一样，你描述 LLMs 的输出。例如，“用三个要点总结这篇文章”关注的是结果，而不是过程。'
- en: '**Abstraction of implementation**: When you order a cheeseburger, you don’t
    need to know how the chef prepares it. When submitting SQL code to a server, the
    server figures out where the data lives, how to fetch it, and how to aggregate
    it based on your description. You as the user don’t need to know how. With LLMs,
    you don’t need to know how the model generates the response. The underlying mechanisms
    are abstracted away.'
  id: totrans-11
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**实现的抽象化**：当你点一份芝士汉堡时，你不需要知道厨师是如何准备的。当你向服务器提交 SQL 代码时，服务器会确定数据存储的位置、如何获取它以及如何根据你的描述进行聚合。作为用户的你不需要知道这些。在使用
    LLMs 时，你不需要知道模型是如何生成响应的。底层机制被抽象化了。'
- en: '**Filling in missing details**: If you don’t specify onions on your cheeseburger,
    the chef won’t include them. If you don’t specify a field in your SQL code, it
    won’t show up in the output table. This is where LLMs *differ slightly* from declarative
    coding languages like SQL. If you ask ChatGPT to create an image of “a cheeseburger
    with lettuce and tomato” it may also show the burger on a sesame seed bun or include
    pickles, even if that wasn’t in your description. The details you omit are inferred
    by the LLM using the “average” or “most likely” detail depending on the context,
    with a bit of randomness thrown in. Ask for the cheeseburger image six times;
    it may show you three burgers with cheddar cheese, two with Swiss, and one with
    pepper jack.'
  id: totrans-12
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**填补缺失的细节**：如果你在你的芝士汉堡中没有指定洋葱，厨师就不会加。如果你在 SQL 代码中没有指定字段，它就不会出现在输出表中。这就是 LLMs
    与 SQL 等声明式编程语言略有不同之处。如果你要求 ChatGPT 创建一张“带有生菜和番茄的芝士汉堡”的图片，它可能也会展示一个放在芝麻面包上的汉堡，或者包括腌黄瓜，即使这些细节没有在你的描述中。LLMs
    会根据上下文使用“平均”或“最可能”的细节来推断你省略的细节，并加入一些随机性。要求六次展示芝士汉堡图片；它可能展示三个带有切达奶酪的汉堡，两个带有瑞士奶酪，和一个带有胡椒杰克奶酪的汉堡。'
- en: Like other forms of declarative interaction, LLMs share one key limitation.
    **If your description is vague, ambiguous, or lacks enough detail, then the result
    may not be what you hoped to see**. **It is up to the user to describe the result
    with sufficient detail.**
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 与其他声明式交互形式一样，LLMs 存在一个关键的限制。**如果你的描述模糊、含糊不清或缺乏足够的细节，那么结果可能不是你所期望的**。**用户需要用足够的细节来描述结果**。
- en: This explains why we often iterate to get what we’re looking for when using
    LLMs and generative AI. Going back to our cheeseburger analogy, the process to
    generate a cheeseburger from an LLM may look like this.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 这解释了为什么我们使用 LLMs 和生成式 AI 时经常需要迭代以获得我们想要的结果。回到我们的芝士汉堡类比，从 LLMs 生成芝士汉堡的过程可能看起来是这样的。
- en: “Make me a cheeseburger, medium rare, with lettuce and tomatoes.” *The result
    also has pickles and uses cheddar cheese. The bun is toasted. There’s mayo on
    the top bun.*
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “给我来一份中等熟度的芝士汉堡，加上生菜和番茄。”**结果还包括腌黄瓜，并使用了切达奶酪。面包是烤过的。上面有美乃滋**。
- en: “Make the same thing but this time no pickles, use pepper jack cheese, and a
    sriracha mayo instead of plain mayo.” *The result now has pepper jack, no pickles.
    The sriracha mayo is applied to the* bottom *bun and the bun is no longer toasted.*
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “再做一次同样的东西，但这次不要放黄瓜，用胡椒杰克奶酪，而不是普通的蛋黄酱。”*现在结果有了胡椒杰克奶酪，没有黄瓜。辣酱蛋黄酱涂在了*底部*面包上，面包也不再烤过。
- en: “Make the same thing again, but this time, put the sriracha mayo on the top
    bun. The buns should be toasted.” *Finally, you have the cheeseburger you’re looking
    for.*
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “再做一次同样的东西，但这次，把辣酱蛋黄酱放在上面那片面包上。面包应该是烤过的。”*最后，你得到了你想要的芝士汉堡。*
- en: This example demonstrates one of the main points of friction with human-AI interaction.
    **Human beings are really bad at describing what they want with sufficient detail
    on the first attempt.**
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 这个例子展示了人机交互中的一个主要摩擦点。**人类在第一次尝试时很难用足够的细节描述他们想要的东西。**
- en: When we asked for a cheeseburger, we had to refine our description to be more
    specific (the type of cheese). In the second generation, some of the inferred
    details (whether the bun was toasted) changed from one iteration to the next,
    so then we had to add that specificity to our description as well. Iteration is
    an important part of AI-human generation.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们要求一个芝士汉堡时，我们必须细化我们的描述以使其更具体（芝士的类型）。在第二代中，一些推断的细节（面包是否烤过）从一个迭代到下一个迭代发生了变化，因此我们不得不将这种具体性添加到我们的描述中。迭代是AI-人生成的一个重要部分。
- en: '***Insight: When using generative AI, we need to design an iterative human-AI
    interaction loop that enables people to discover the details of what they want
    and refine their descriptions accordingly.***'
  id: totrans-20
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**洞见：在使用生成式AI时，我们需要设计一个迭代的人机交互循环，使人们能够发现他们想要的细节，并据此完善他们的描述。**'
- en: To iterate, we need to *evaluate* the results. Evaluation is extremely important
    with generative AI. Say you’re using an LLM to write code. You can evaluate the
    code quality if you know enough to understand it or if you can execute it and
    inspect the results. On the other hand, hypothetical questions can’t be tested.
    Say you ask ChatGPT, “What if we raise our product prices by 5 percent?” A seasoned
    expert could read the output and know from experience if a recommendation doesn’t
    take into account important details. If your product is property insurance, then
    increasing premiums by 5 percent may mean pushback from regulators, something
    an experienced veteran of the industry would know. For non-experts in a topic,
    there’s no way to tell if the “average” details inferred by the model make sense
    for your specific use case. You can’t test and iterate.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 为了迭代，我们需要*评估*结果。在生成式AI中，评估非常重要。比如说你正在使用LLM来编写代码。如果你足够了解它，或者可以执行它并检查结果，你就可以评估代码质量。另一方面，假设性问题无法测试。比如说你问ChatGPT，“如果我们把产品价格提高5%，会怎么样？”一个经验丰富的专家可以阅读输出，并从经验中知道如果建议没有考虑到重要细节。如果你的产品是财产保险，那么提高5%的保险费率可能意味着来自监管机构的反对，这是行业经验丰富的老兵会知道的事情。对于某个主题的非专家来说，没有方法可以判断模型推断出的“平均”细节是否适合你的特定用例。你不能测试和迭代。
- en: '**Insight: LLMs work best when the user can evaluate the result quickly, whether
    through execution or through prior knowledge.**'
  id: totrans-22
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**洞见：当用户能够快速评估结果时，LLMs工作得最好，无论是通过执行还是通过先验知识。**'
- en: The examples so far involve general knowledge. We all know what a cheeseburger
    is. When you start asking about non-general information—like when you can make
    dinner reservations next week—you delve into new points of friction.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止的例子涉及一般知识。我们都知道什么是芝士汉堡。当你开始询问非一般信息——比如你下周什么时候可以预订晚餐——你就进入了新的摩擦点。
- en: In the next section we’ll think about different types of information, what we
    can expect the AI to “know”, and how this impacts human-AI interaction.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一节中，我们将思考不同类型的信息，我们可以期望AI“知道”什么，以及这如何影响人机交互。
- en: What did the AI know, and when did it know it?
  id: totrans-25
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: AI知道什么，它什么时候知道的？
- en: Above, I explained how generative AI is a declarative mode of interaction and
    how that helps understand its strengths and weaknesses. Here, I’ll identify how
    different types of information create better or worse human-AI interactions.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 在上面，我解释了生成式AI是一种声明式交互模式，以及这种模式如何帮助我们理解其优势和劣势。在这里，我将探讨不同类型的信息如何创造更好或更差的人机交互。
- en: Understanding the information available
  id: totrans-27
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 理解可用的信息
- en: 'When we describe what we want to an LLM, and when it *infers* missing details
    from our description, it draws from different sources of information. Understanding
    these sources of information is important. Here’s a useful taxonomy for information
    types:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们向LLM描述我们想要的内容，并且当它从我们的描述中推断出缺失的细节时，它会从不同的信息来源中获取。理解这些信息来源很重要。这里有一个关于信息类型的有用分类法：
- en: '**General information** used to train the base model.'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**通用信息**，用于训练基础模型。'
- en: '**Non-general information** that the base model is not aware of.'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**非通用信息**，这是基础模型所不知的信息。'
- en: '**Fresh information** that is new or changes rapidly, like stock prices or
    current events.'
  id: totrans-31
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**新鲜信息**，指那些新颖或变化迅速的信息，例如股票价格或时事新闻。'
- en: '**Non-public information**, like facts about you and where you live or about
    your company, its employees, its processes, or its codebase.'
  id: totrans-32
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**非公开信息**，例如关于你和你居住的地方的事实，或者关于你的公司、其员工、其流程或其代码库的事实。'
- en: General information vs. non-general information
  id: totrans-33
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 通用信息与非通用信息
- en: LLMs are built on a massive corpus of written word data. A large part of GPT-3
    [was trained](https://s10251.pcdn.co/pdf/2022-Alan-D-Thompson-Whats-in-my-AI-Rev-0.pdf)
    on a combination of books, journals, Wikipedia, Reddit, and CommonCrawl (an open-source
    repository of web crawl data). You can think of the models as a highly compressed
    version of that data, organized in a gestalt manner—all the like things are close
    together. When we submit a prompt, the model takes the words we use (and any words
    added to the prompt behind the scenes) and finds the closest set of related words
    based on how those things appear in the data corpus. So when we say “cheeseburger”
    it knows that word is related to “bun” and “tomato” and “lettuce” and “pickles”
    because they all occur in the same context throughout many data sources. Even
    when we don’t specify pickles, it uses this gestalt approach to fill in the blanks.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: LLM是基于大量书面语料库构建的。GPT-3的很大一部分[是在书籍、期刊、维基百科、Reddit和CommonCrawl（一个开源的网页爬取数据仓库）的组合上训练的](https://s10251.pcdn.co/pdf/2022-Alan-D-Thompson-Whats-in-my-AI-Rev-0.pdf)。你可以把模型看作是那种数据的高度压缩版本，以一种整体的方式组织——所有类似的事物都紧密相连。当我们提交一个提示时，模型会根据这些事物在数据语料库中的出现方式，找到最接近的一组相关词汇。所以当我们说“cheeseburger”时，它知道这个词与“bun”（面包）、“tomato”（番茄）、“lettuce”（生菜）和“pickles”（泡菜）相关，因为它们在许多数据源中的上下文中都出现过。即使我们没有指定泡菜，它也会使用这种整体方法来填补空白。
- en: 'This training information is **general information**, and a good rule of thumb
    is this: if it was in Wikipedia a year ago then the LLM “knows” about it.There
    could be *new* articles on Wikipedia, but that didn’t exist when the model was
    trained. The LLM doesn’t know about that unless told.'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 这份训练信息是**通用信息**，一个很好的经验法则是这样的：如果一年前它出现在维基百科上，那么LLM“知道”它。维基百科上可能会有新的文章，但在模型训练时它们并不存在。除非被告知，LLM不会知道这些信息。
- en: Now, say you’re a company using an LLM to write a product requirements document
    for a new web app feature. Your company, like most companies, is full of its own
    lingo. It has its own lore and history scattered across thousands of Slack messages,
    emails, documents, and some tenured employees who remember that one meeting in
    Q1 last year. The LLM doesn’t know any of that. It will infer any missing details
    from *general information*. You need to supply everything else. If it *wasn’t*
    in Wikipedia a year ago, the LLM doesn’t know about it. The resulting product
    requirements document may be full of general facts about your industry and product
    but could lack important details specific to your firm.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，假设你是一家公司，正在使用LLM为一个新的网络应用功能编写产品需求文档。像大多数公司一样，你的公司充满了自己的术语。它有自己的传说和历史，散布在数千条Slack消息、电子邮件、文档中，以及一些资深的员工，他们记得去年第一季度的那次会议。LLM对此一无所知。它会从**通用信息**中推断出任何缺失的细节。你需要提供其他所有信息。如果它**一年前**不在维基百科上，LLM就不知道它。结果的产品需求文档可能会充满关于你的行业和产品的通用事实，但可能缺少你公司特有的重要细节。
- en: This is **non-general information**. This includes personal info, anything kept
    behind a log-in or paywall, and non-digital information. This non-general information
    permeates our lives, and incorporating it is another source of friction when working
    with generative AI.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 这属于**非通用信息**。这包括个人信息，任何需要登录或付费墙才能访问的内容，以及非数字化信息。这种非通用信息渗透到我们的生活中，将其纳入是使用生成式AI时摩擦的另一个来源。
- en: 'Non-general information can be incorporated into a generative AI application
    in three ways:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 非通用信息可以通过三种方式纳入生成式AI应用：
- en: Through model fine-tuning (supplying a large corpus to the base model to expand
    its reference data).
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过模型微调（向基础模型提供大量语料库以扩展其参考数据）。
- en: Retrieved and fed it to the model at query time (e.g., the retrieval augmented
    generation or “RAG” technique).
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在查询时检索并输入模型中（例如，检索增强生成或“RAG”技术）。
- en: Supplied by the user in the prompt.
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 由用户在提示中提供。
- en: '**Insight: When designing any human-AI interactions, you should think about
    what non-general information is required, where you will get it, and how you will
    expose it to the AI.**'
  id: totrans-42
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**洞见：在设计任何人机交互时，你应该考虑需要哪些非通用信息，你将在哪里获取它，以及你将如何将其暴露给AI。**'
- en: Fresh information
  id: totrans-43
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 新鲜信息
- en: Any information that changes in real-time or is new can be called **fresh information**.
    This includes new facts like current events but also frequently changing facts
    like your bank account balance. If the fresh information is available in a database
    or some searchable source, then it needs to be retrieved and incorporated into
    the application. To retrieve the information from a database, the LLM must create
    a query, which may require specific details that the user didn’t include.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 任何实时变化或新的信息都可以称为**新鲜信息**。这包括新事实，如当前事件，也包括经常变化的事实，如你的银行账户余额。如果新鲜信息在数据库或可搜索的资源中可用，那么它需要被检索并纳入应用程序中。为了从数据库中检索信息，LLM必须创建一个查询，这可能需要用户未包含的特定细节。
- en: 'Here’s an example. I have a chatbot that gives information on the stock market.
    You, the user, type the following: “What is the current price of Apple? Has it
    been increasing or decreasing recently?”'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个例子。我有一个提供股市信息的聊天机器人。作为用户，你输入以下内容：“苹果的当前价格是多少？最近是增加还是减少？”
- en: The LLM doesn’t have the current price of Apple in its training data. This is
    fresh, non-general information. So, we need to retrieve it from a database.
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: LLM的训练数据中没有苹果公司的当前价格。这是新鲜的非通用信息。因此，我们需要从数据库中检索它。
- en: The LLM can read “Apple”, know that you’re talking about the computer company,
    and that the ticker symbol is AAPL. This is all general information.
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: LLM可以读取“苹果”，知道你在谈论的是电脑公司，其股票代码是AAPL。这些都是通用信息。
- en: What about the “increasing or decreasing” part of the prompt? You did not specify
    over what period—increasing in the past day, month, year? In order to construct
    a database query, we need more detail. LLMs are bad at knowing when to ask for
    detail and when to fill it in. The application could easily pull the wrong data
    and provide an unexpected or inaccurate answer. Only you know what these details
    *should* be, depending on your intent. You must be more specific in your prompt.
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示中的“增加或减少”部分怎么办？你没有指定在什么时间段内——过去一天、一个月、一年内的增加？为了构建数据库查询，我们需要更多细节。LLM在何时请求细节以及何时填充细节方面做得不好。应用程序可能会轻易地拉取错误的数据并提供意外或不准确的答案。只有你知道这些细节*应该*是什么，这取决于你的意图。你必须在你的提示中更加具体。
- en: A designer of this LLM application can improve the user experience by specifying
    required parameters for expected queries. We can ask the user to explicitly input
    the time range or design the chatbot to ask for more specific details if not provided.
    In either case, we need to have a specific type of query in mind and explicitly
    design how to handle it. The LLM will not know how to do this unassisted.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 这个LLM应用程序的设计师可以通过指定预期查询所需参数来改进用户体验。我们可以要求用户明确输入时间范围或设计聊天机器人，如果未提供，则要求用户提供更具体的细节。在两种情况下，我们都需要有一个特定的查询类型，并明确设计如何处理它。LLM将不知道如何在不辅助的情况下完成这项工作。
- en: '**Insight: If a user is expecting a more specific type of output, you need
    to explicitly ask for enough detail. Too little detail could produce a poor quality
    output.**'
  id: totrans-50
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**洞见：如果用户期望更具体的输出类型，你需要明确要求足够的细节。细节太少可能会产生低质量的输出。**'
- en: Non-public information
  id: totrans-51
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 非公开信息
- en: Incorporating non-public information into an LLM prompt can be done if that
    information can be accessed in a database. This introduces privacy issues (should
    the LLM be able to access my medical records?) and complexity when incorporating
    multiple non-public sources of information.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 如果相关信息可以在数据库中访问，则可以将非公开信息纳入LLM提示中。这引入了隐私问题（LLM是否应该能够访问我的医疗记录？）以及当结合多个非公开信息来源时的复杂性。
- en: 'Let’s say I have a chatbot that helps you make dinner reservations. You, the
    user, type the following: “Help me make dinner reservations somewhere with good
    Neapolitan pizza.”'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我有一个聊天机器人，它能帮助你预订晚餐。作为用户，你输入以下内容：“帮我预订一个有很好那不勒斯披萨的地方。”
- en: The LLM knows what a Neapolitan pizza is and can infer that “dinner” means this
    is for an evening meal.
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: To do this task well, it needs information about your location, the restaurants
    near you and their booking status, or even personal details like dietary restrictions.
    Assuming all that non-public information is available in databases, bringing them
    all together into the prompt takes a lot of engineering work.
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Even if the LLM could find the “best” restaurant for you and book the reservation,
    can you be confident it has done that correctly? You never specified how many
    people you need a reservation for. Since only you know this information, the application
    needs to ask for it upfront.
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If you’re designing this LLM-based application, you can make some thoughtful
    choices to help with these problems. We could ask about a user’s dietary restrictions
    when they sign up for the app. Other information, like the user’s schedule that
    evening, can be given in a prompting tip or by showing the default prompt option
    “show me reservations for two for tomorrow at 7PM”. Promoting tips may not feel
    as *automagical* as a bot that does it all, but they are a straightforward way
    to collect and integrate the non-public information.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
- en: Some non-public information is large and can’t be quickly collected and processed
    when the prompt is given. These need to be fine-tuned in batch or retrieved at
    prompt time and incorporated. A chatbot that answers information about a company’s
    HR policies can obtain this information from a corpus of non-public HR documents.
    You can fine-tune the model ahead of time by feeding it the corpus. Or you can
    implement a retrieval augmented generation technique, searching a corpus for relevant
    documents and summarizing the results. Either way, the response will only be as
    accurate and up-to-date as the corpus itself.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
- en: '**Insight: When designing an AI application, you need to be aware of non-public
    information and how to retrieve it. Some of that information can be pulled from
    databases. Some needs to come from the user, which may require prompt suggestions
    or explicitly asking.**'
  id: totrans-59
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: If you understand the types of information and treat human-AI interaction as
    declarative, you can more easily predict which AI applications will work and which
    ones won’t. In the next section we’ll look at OpenAI’s Operator and deep research
    products. Using this framework, we can see where these applications fall short,
    where they work well, and why.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
- en: Critiquing OpenAI’s Operator and deep research through a declarative lens
  id: totrans-61
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I have now explained how thinking of generative AI as declarative helps us understand
    its strengths and weaknesses. I also identified how different types of information
    create better or worse human-AI interactions.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
- en: Now I’ll apply these ideas by critiquing two recent products from OpenAI—Operator
    and deep research. It’s important to be honest about the shortcomings of AI applications.
    Bigger models trained on more data or using new techniques might one day solve
    some issues with generative AI. But other issues arise from the human-AI interaction
    itself and can only be addressed by making appropriate design and product choices.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我将通过批评OpenAI的两个最近的产品——操作符和深度研究——来应用这些想法。诚实地讨论AI应用的不足是很重要的。在更多数据上训练的更大模型或使用新技术可能在某一天解决一些生成式AI的问题。但其他问题源于人机交互本身，只能通过适当的设计和产品选择来解决。
- en: These critiques demonstrate how the framework can help identify where the limitations
    are and how to address them.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 这些批评展示了框架如何帮助识别局限性以及如何解决这些问题。
- en: The limitations of Operator
  id: totrans-65
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 操作符的限制
- en: Journalist Casey Newton of Platformer [reviewed Operator](https://www.platformer.news/openai-operator-ai-agent-hands-on/)
    in an article that was largely positive. Newton has covered AI extensively and
    optimistically. Still, Newton couldn’t help but point out some of Operator’s frustrating
    limitations.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 平台者记者Casey Newton在一篇主要积极的文章中[评论了操作符](https://www.platformer.news/openai-operator-ai-agent-hands-on/)。牛顿广泛且乐观地报道了AI。然而，牛顿还是忍不住指出了一些操作符令人沮丧的局限性。
- en: '[Operator] can take action on your behalf in ways that are new to AI systems
    — but at the moment it requires a lot of hand-holding, and may cause you to throw
    up your hands in frustration.'
  id: totrans-67
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[操作符]可以代表你采取一些AI系统之前未曾有过的行动——但到目前为止，它需要大量的手动操作，可能会让你感到沮丧，甚至可能让你感到绝望。'
- en: ''
  id: totrans-68
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'My most frustrating experience with Operator was my first one: trying to order
    groceries. “Help me buy groceries on Instacart,” I said, expecting it to ask me
    some basic questions. Where do I live? What store do I usually buy groceries from?
    What kinds of groceries do I want?'
  id: totrans-69
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我与操作符最令人沮丧的经历是我第一次尝试：尝试订购杂货。“帮助我在Instacart上购买杂货，”我说，期待它会问我一些基本问题。我住在哪里？我通常从哪个商店购买杂货？我想要什么类型的杂货？
- en: ''
  id: totrans-70
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: It didn’t ask me any of that. Instead, Operator opened Instacart in the browser
    tab and begin searching for milk in grocery stores located in Des Moines, Iowa.
  id: totrans-71
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 它没有问我任何这些问题。相反，操作符在浏览器标签中打开了Instacart，并开始在爱荷华州的迪莫因寻找杂货店中的牛奶。
- en: The prompt “Help me buy groceries on Instacart,” viewed declaratively, describes
    groceries being purchased using Instacart. It *doesn’t* have a lot of the information
    someone would need to buy groceries, like what exactly to buy, when it would be
    delivered, and to where.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 当从声明性角度看待“帮助我在Instacart上购买杂货”的提示时，它描述了使用Instacart购买杂货的情况。它*并没有*包含人们购买杂货所需的大量信息，比如确切要买什么，何时会送货，以及送到哪里。
- en: 'It’s worth repeating: LLMs are not good at knowing when to ask additional questions
    unless explicitly programmed to do so in the use case. Newton gave a vague request
    and expected follow-up questions. Instead, the LLM filled in all the missing details
    with the “average”. The average item was milk. The average location was Des Moines,
    Iowa. Newton doesn’t mention when it was scheduled to be delivered, but if the
    “average” delivery time is tomorrow, then that was likely the default.'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 值得重复的是：除非在用例中明确编程以这样做，否则LLMs在知道何时提出额外问题方面并不擅长。牛顿给出了一个模糊的要求，并期待后续问题。相反，LLM用“平均”填补了所有缺失的细节。平均商品是牛奶。平均位置是爱荷华州的迪莫因。牛顿没有提到何时安排送货，但如果“平均”送货时间是明天，那么这很可能是默认设置。
- en: If we engineered this application specifically for ordering groceries, keeping
    in mind the declarative nature of AI and the information it “knows”, then we could
    make thoughtful design choices that improve functionality. We would need to prompt
    the user to specify when and where they want groceries up front (non-public information).
    With that information, we could find an appropriate grocery store near them. We
    would need access to that grocery store’s inventory (more non-public information).
    If we have access to the user’s previous orders, we could also pre-populate a
    cart with items typical to their order. If not, we may add a few suggested items
    and guide them to add more. By limiting the use case, we only have to deal with
    two sources of non-public information. This is a more tractable problem than Operator’s
    “agent that does it all” approach.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们专门为此应用程序设计订购杂货，考虑到AI的声明性特性和它“知道”的信息，那么我们可以做出深思熟虑的设计选择来提高功能。我们需要提示用户提前指定他们想要订购杂货的时间和地点（非公开信息）。有了这些信息，我们可以找到他们附近的合适杂货店。我们需要访问该杂货店的库存（更多非公开信息）。如果我们能访问用户的先前订单，我们还可以预先填充一个包含他们典型订单项目的购物车。如果没有，我们可能会添加一些建议的项目并引导他们添加更多。通过限制用例，我们只需要处理两种非公开信息来源。这比操作员的“全能代理”方法更容易处理。
- en: Newton also mentions that this process took eight minutes to complete, and “complete”
    means that Operator did everything up to placing the order. This is a long time
    with very little human-in-the-loop iteration. Like we said before, an iteration
    loop is very important for human-AI interaction. A better-designed application
    would generate smaller steps along the way and provide more frequent interaction.
    We could prompt the user to describe what to add to their shopping list. The user
    might say, “Add barbeque sauce to the list,” and see the list update. If they
    see a vinegar-based barbecue sauce, they can refine that by saying, “Replace that
    with a barbeque sauce that goes well with chicken,” and might be happier when
    it’s replaced by a honey barbecue sauce. These frequent iterations make the LLM
    a creative tool rather than a does-it-all agent. The does-it-all agent looks automagical
    in marketing, but a more guided approach provides more utility with a less frustrating
    and more delightful experience.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 牛顿还提到，这个过程花费了八分钟来完成，“完成”意味着操作员完成了从下单到所有事情。这是一个很长的时间，而且几乎没有人工迭代。正如我们之前所说的，迭代循环对于人机交互非常重要。一个设计得更好的应用程序会在过程中生成更小的步骤并提供更频繁的交互。我们可以提示用户描述要添加到购物清单中的内容。用户可能会说，“把烧烤酱加到清单上”，然后看到清单更新。如果他们看到基于醋的烧烤酱，他们可以通过说，“用适合鸡肉的烧烤酱替换那个”，在它被替换为蜂蜜烧烤酱时可能会更满意。这些频繁的迭代使LLM成为一个创造性的工具，而不是一个全能的代理。全能代理在营销中看起来很神奇，但更引导性的方法提供了更多效用，体验更少挫败感，更多乐趣。
- en: 'Elsewhere in the article, Newton gives an example of a prompt that Operator
    performed well: “Put together a lesson plan on the Great Gatsby for high school
    students, breaking it into readable chunks and then creating assignments and connections
    tied to the Common Core learning standard.” This prompt describes an output using
    much more specificity. It also solely relies on general information—the Great
    Gatsby, the Common Core standard, and a general sense of what assignments are.
    The general-information use case lends itself better to AI generation, and the
    prompt is explicit and detailed in its request. In this case, very little guidance
    was given to create the prompt, so it worked better. (In fact, this prompt [comes
    from Ethan Mollick](https://www.oneusefulthing.org/p/when-you-give-a-claude-a-mouse)
    who has used it to evaluate AI chatbots.)'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 在文章的其他部分，牛顿举了一个操作员表现良好的例子：“为高中生准备一份关于《了不起的盖茨比》的课程计划，将其分解成可读的片段，然后创建与共同核心学习标准相关的作业和联系。”这个提示描述了一个具有更多具体性的输出。它完全依赖于一般信息——《了不起的盖茨比》、共同核心标准以及一般意义上的作业是什么。这种一般信息的用例更适合AI生成，而且提示在请求上既明确又详细。在这种情况下，创建提示时提供的指导非常少，因此效果更好。（事实上，这个提示[来自伊桑·莫利克](https://www.oneusefulthing.org/p/when-you-give-a-claude-a-mouse)，他使用它来评估AI聊天机器人。）
- en: This is the risk of general-purpose AI applications like Operator. The quality
    of the result relies heavily on the use case and specificity provided by the user.
    An application with a more specific use case allows for more design guidance and
    can produce better output more reliably.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是像Operator这样的通用AI应用的风险。结果的质量在很大程度上依赖于用户提供的用例和具体性。具有更具体用例的应用程序允许更多的设计指导，并可以更可靠地产生更好的输出。
- en: The limitations of deep research
  id: totrans-78
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 深度研究的局限性
- en: Newton also reviewed deep research, which, according to OpenAI’s website, is
    an “agent that uses reasoning to synthesize large amounts of online information
    and complete multi-step research tasks for you.”
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 牛顿还回顾了深度研究，根据OpenAI的网站，这是一个“使用推理来综合大量在线信息并为你完成多步研究任务的代理。”
- en: 'Deep research came out after Newton’s review of Operator. Newton chose an intentionally
    tricky prompt that prods at some of the tool’s limitations regarding fresh information
    and non-general information: “I wanted to see how OpenAI’s agent would perform
    given that it was researching a story that was less than a day old, and for which
    much of the coverage was behind paywalls that the agent would not be able to access.
    And indeed, the bot struggled more than I expected.”'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 深度研究是在牛顿对Operator的回顾之后出现的。牛顿选择了一个故意棘手的提示，以刺激工具在新鲜信息和非通用信息方面的某些局限性：“我想看看OpenAI的代理在研究一个不到一天的故事时会如何表现，其中大部分报道都隐藏在代理无法访问的付费墙后面。果然，机器人比预期的更难应对。”
- en: Near the end of the article, Newton elaborates on some of the shortcomings he
    noticed with deep research.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 在文章的结尾附近，牛顿详细阐述了他通过深入研究注意到的一些不足之处。
- en: 'OpenAI’s deep research suffers from the same design problem that almost all
    AI products have: its superpowers are completely invisible and must be harnessed
    through a frustrating process of trial and error.'
  id: totrans-82
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: OpenAI的深度研究遭受了几乎所有AI产品都有的设计问题：它的超级能力完全不可见，必须通过令人沮丧的反复试验和错误的过程来利用。
- en: ''
  id: totrans-83
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Generally speaking, the more you already know about something, the more useful
    I think deep research is. This may be somewhat counterintuitive; perhaps you expected
    that an AI agent would be well suited to getting you up to speed on an important
    topic that just landed on your lap at work, for example.
  id: totrans-84
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 一般而言，你对某件事了解得越多，我认为深度研究就越有用。这可能有些反直觉；也许你期望一个AI代理能够很好地帮助你熟悉一个刚刚在工作中落在你手中的重要主题，例如。
- en: ''
  id: totrans-85
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: In my early tests, the reverse felt true. Deep research excels for drilling
    deep into subjects you already have some expertise in, letting you probe for specific
    pieces of information, types of analysis, or ideas that are new to you.
  id: totrans-86
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在我早期的测试中，情况正好相反。深度研究在深入钻研你已经有些专长的主题方面表现出色，让你能够探索对你来说是具体的信息、分析类型或新想法。
- en: The “frustrating trial and error” shows a mismatch between Newton’s expectations
    and a necessary aspect of many generative AI applications. A good response requires
    more information than the user will probably give in the first attempt. The challenge
    is to design the application and set the user’s expectations so that this interaction
    is not frustrating but exciting.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: “令人沮丧的反复试验和错误”展示了牛顿的期望与许多生成式AI应用的一个必要方面之间的不匹配。一个好的回应需要比用户在第一次尝试中可能给出的信息更多。挑战在于设计应用程序并设定用户的期望，使得这种交互不是令人沮丧的，而是令人兴奋的。
- en: Newton’s more poignant criticism is that the application requires already knowing
    something about the topic for it to work well. From the perspective of our framework,
    this makes sense. The more you know about a topic, the more detail you can provide.
    And as you iterate, having knowledge about a topic helps you observe and evaluate
    the output. Without the ability to describe it well or evaluate the results, the
    user is less likely to use the tool to generate good output.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 牛顿更为尖锐的批评是，该应用程序需要用户对主题已经有所了解才能有效运行。从我们的框架角度来看，这是有道理的。你对一个主题了解得越多，你就能提供越多的细节。随着你不断地迭代，对主题的了解有助于你观察和评估输出。如果没有很好地描述或评估结果的能力，用户就不太可能使用该工具生成好的输出。
- en: A version of deep research designed for lawyers to perform legal research could
    be powerful. Lawyers have an extensive and common vocabulary for describing legal
    matters, and they’re more likely to see a result and know if it makes sense. Generative
    AI tools are fallible, though. So, the tool should focus on a generation-evaluation
    loop rather than writing a final draft of a legal document.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 一种专为律师设计的深度研究版本，用于执行法律研究，可能会非常强大。律师在描述法律事务方面拥有广泛且常见的词汇，他们更有可能看到结果并知道它是否合理。尽管生成式AI工具是可出错的，但该工具应专注于生成-评估循环，而不是撰写法律文件的最终草稿。
- en: The article also highlights many improvements compared to Operator. Most notably,
    the bot asked clarifying questions. This is the most impressive aspect of the
    tool. Undoubtedly, it helps that deep search has a focused use-case of retrieving
    and summarizing general information instead of a does-it-all approach. Having
    a focused use case narrows the set of likely interactions, letting you design
    better guidance into the prompt flow.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 文章还突出了与Operator相比的许多改进。最值得注意的是，机器人会提出澄清问题。这是该工具最令人印象深刻的地方。毫无疑问，这得益于深度搜索有一个专注于检索和总结一般信息的用例，而不是“包罗万象”的方法。有一个专注的用例缩小了可能的交互集，让你能够更好地设计提示流程的指导。
- en: Good application design with generative AI
  id: totrans-91
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 生成式AI的良好应用设计
- en: 'Designing effective generative AI applications requires thoughtful consideration
    of how users interact with the technology, the types of information they need,
    and the limitations of the underlying models. Here are some key principles to
    guide the design of generative AI tools:'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 设计有效的生成式AI应用需要对用户如何与技术互动、他们需要的信息类型以及底层模型的限制进行深思熟虑的考虑。以下是一些指导生成式AI工具设计的原则：
- en: 1\. Constrain the input and focus on providing details
  id: totrans-93
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 1. 限制输入并专注于提供细节
- en: Applications are inputs and outputs. We want the outputs to be useful and pleasant.
    By giving a user a conversational chatbot interface, we allow for a vast surface
    area of potential inputs, making it a challenge to guarantee useful outputs. One
    strategy is to limit or guide the input to a more manageable subset.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 应用是输入和输出。我们希望输出是有用且令人愉悦的。通过为用户提供对话式聊天机器人界面，我们允许有大量的潜在输入，这使得保证有用的输出变得具有挑战性。一种策略是限制或引导输入到一个更可管理的子集。
- en: For example, FigJam, a collaborative whiteboarding tool, uses pre-set template
    prompts for timelines, Gantt charts, and other common whiteboard artifacts. This
    provides some structure and predictability to the inputs. Users still have the
    freedom to describe further details like color or the content for each timeline
    event. This approach ensures that the AI has enough specificity to generate meaningful
    outputs while giving users creative control.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，FigJam，一个协作式白板工具，使用预设的模板提示来创建时间线、甘特图和其他常见的白板元素。这为输入提供了一些结构和可预测性。用户仍然可以自由描述更详细的细节，如颜色或每个时间线事件的详细内容。这种方法确保AI有足够的特定性来生成有意义的输出，同时给予用户创意控制。
- en: 2\. Design frequent iteration and evaluation into the tool
  id: totrans-96
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 2. 将频繁的迭代和评估设计到工具中
- en: Iterating in a tight generation-evaluation loop is essential for refining outputs
    and ensuring they meet user expectations. OpenAI’s Dall-E is great at this. Users
    quickly iterate on image prompts and refine their descriptions to add additional
    detail. If you type “a picture of a cheeseburger on a plate”, you may then add
    more detail by specifying “with pepperjack cheese”.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 在紧密的生成-评估循环中进行迭代对于完善输出并确保其满足用户期望至关重要。OpenAI的Dall-E在这方面做得很好。用户可以快速迭代图像提示并细化描述以添加更多细节。如果你输入“一个放在盘子上的芝士汉堡的图片”，你可能会通过指定“带有胡椒杰克芝士”来添加更多细节。
- en: AI code generating tools work well because users can run a generated code snippet
    immediately to see if it works, enabling rapid iteration and validation. This
    quick evaluation loop produces better results and a better coder experience.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: AI代码生成工具工作得很好，因为用户可以立即运行生成的代码片段以查看其是否工作，从而实现快速迭代和验证。这个快速评估循环产生了更好的结果和更好的编码体验。
- en: Designers of generative AI applications should pull the user in the loop early,
    often, in a way that is engaging rather than frustrating. Designers should also
    consider the user’s knowledge level. Users with domain expertise can iterate more
    effectively.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式AI应用的开发者应尽早、频繁地将用户纳入循环，以吸引人的方式而非令人沮丧的方式。开发者还应考虑用户的认知水平。具有领域专业知识的用户可以更有效地迭代。
- en: Referring back to the FigJam example, the prompts and icons in the app quickly
    communicate “this is what we call a mind map” or “this is what we call a gantt
    chart” for users who want to generate these artifacts but don’t know the terms
    for them. Giving the user some basic vocabulary can help them better generate
    desired results quickly with less frustration.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 回到FigJam的例子，应用中的提示和图标迅速传达“这是我们所说的思维导图”或“这是我们所说的甘特图”给那些想要生成这些工具但不知道术语的用户。给用户一些基本词汇可以帮助他们更快地生成期望的结果，减少挫败感。
- en: 3\. Be mindful of the types of information needed
  id: totrans-101
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 3. 注意所需信息的类型
- en: LLMs excel at tasks involving general knowledge already in the base training
    set. For example, writing class assignments involves absorbing general information,
    synthesizing it, and producing a written output, so LLMs are very well-suited
    for that task.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: LLM在涉及基础训练集中已有通用知识的任务上表现出色。例如，撰写课堂作业涉及吸收通用信息，综合它，并产生书面输出，因此LLM非常适合这项任务。
- en: 'Use cases that require non-general information are more complex. Some questions
    the designer and engineer should ask include:'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 需要非通用信息的用例更复杂。设计师和工程师应该提出的一些问题包括：
- en: '**Does this application require fresh information?** Maybe this is knowledge
    of current events or a user’s current bank account balance. If so, that information
    needs to be retrieved and incorporated into the model.'
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**这个应用需要新鲜信息吗？** 可能是关于当前事件或用户当前银行账户余额的知识。如果是这样，需要检索并整合这些信息到模型中。'
- en: '**How much non-general information does the LLM need to know?** If it’s a lot
    of information—like a corpus of company documentation and communication—then the
    model may need to be fine tuned in batch ahead of time. If the information is
    relatively small, a retrieval augmented generation (RAG) approach at query time
    may suffice.'
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**LLM需要了解多少非通用信息？** 如果信息量很大——比如公司文档和通信的语料库——那么模型可能需要在批量调整之前进行微调。如果信息量相对较小，查询时的检索增强生成（RAG）方法可能就足够了。'
- en: '**How many sources of non-general information—small and finite or potentially
    infinite?** General purpose agents like Operator face the challenge of potentially
    infinite non-general information sources. Depending on what the user requires,
    it could need to access their contacts, restaurant reservation lists, financial
    data, or even other people’s calendars. A single-purpose restaurant reservation
    chatbot may only need access to Yelp, OpenTable, and the user’s calendar. It’s
    much easier to reconcile access and authentication for a handful of known data
    sources.'
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**需要多少非通用信息来源——小而有限的还是可能无限的？** 通用代理如Operator面临着可能无限的非通用信息来源的挑战。根据用户的需求，它可能需要访问他们的联系人、餐厅预订列表、财务数据，甚至其他人的日历。一个专门的餐厅预订聊天机器人可能只需要访问Yelp、OpenTable和用户的日历。对于少量已知数据源，协调访问和身份验证要容易得多。'
- en: '**Is there context-specific information that can only come from the user?**
    Consider our restaurant reservation chatbot. Is the user making reservations for
    just themselves? Probably not. “How many people and who” is a detail that only
    the user can provide, an example of non-public information that only the user
    knows. We shouldn’t expect the user to provide this information upfront and unguided.
    Instead, we can use prompt suggestions so they include the information. We may
    even be able to design the LLM to ask these questions when the detail is not provided.'
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**是否存在只能从用户那里获得的具体上下文信息？** 以我们的餐厅预订聊天机器人为例。用户是为仅自己预订吗？可能不是。“有多少人和谁”是只有用户才能提供的细节，这是只有用户知道的非公开信息的一个例子。我们不应该期望用户在没有指导的情况下提前提供这些信息。相反，我们可以使用提示建议来确保他们包含这些信息。我们甚至可能设计LLM在细节未提供时询问这些问题。'
- en: 4\. Focus on specific use cases
  id: totrans-108
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 4. 专注于特定用例
- en: Broad, all-purpose chatbots often struggle to deliver consistent results due
    to the complexity and variability of user needs. Instead, focus on specific use
    cases where the AI’s shortcomings can be mitigated through thoughtful design.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 广泛的通用聊天机器人往往难以提供一致的结果，因为用户需求复杂多变。相反，专注于特定用例，在这些用例中，通过深思熟虑的设计可以减轻AI的不足。
- en: Narrowing the scope helps us address many of the issues above.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 窄化范围有助于我们解决上述许多问题。
- en: We can identify common requests for the use case and incorporate those into
    prompt suggestions.
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们可以识别出用例中的常见请求，并将这些请求纳入提示建议中。
- en: We can design an iteration loop that works well with the type of thing we’re
    generating.
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们可以设计一个与我们要生成的事物类型很好地工作的迭代循环。
- en: We can identify sources of non-general information and devise solutions to incorporate
    it into the model or prompt.
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们可以识别非通用信息的来源，并制定解决方案将其纳入模型或提示中。
- en: 5\. Translation or summary tasks work well
  id: totrans-114
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 5. 翻译或摘要任务效果良好
- en: A common task for ChatGPT is to rewrite something in a different style, explain
    what some computer code is doing, or summarize a long document. These tasks involve
    converting a set of information from one form to another.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT的一个常见任务是重写内容以不同的风格，解释一些计算机代码的功能，或者总结一份长文档。这些任务涉及将一组信息从一种形式转换为另一种形式。
- en: We have the same concerns about non-general information and context. For instance,
    a Chatbot asked to explain a code script doesn’t know the system that script is
    part of unless that information is provided.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 我们对非通用信息和上下文也有相同的担忧。例如，如果一个聊天机器人被要求解释一个代码脚本，除非提供了相关信息，否则它不知道该脚本所属的系统。
- en: But in general, the task of transforming or summarizing information is less
    prone to missing details. By definition, you have provided the details it needs.
    The result should have the same information in a different or more condensed form.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 但总的来说，转换或摘要信息的任务不太可能遗漏细节。根据定义，你已经提供了它需要的细节。结果应该以不同或更简洁的形式包含相同的信息。
- en: The exception to the rules
  id: totrans-118
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 规则的例外
- en: There is a case when it doesn’t matter if you break any or all of these rules—when
    you’re just having fun. LLMs are creative tools by nature. They can be an easel
    to paint on, a sandbox to build in, a blank sheet to scribe. Iteration is still
    important; the user wants to see the thing they’re creating as they create it.
    But unexpected results due to lack of information or omitted details may *add*
    to the experience. If you ask for a cheeseburger recipe, you might get some funny
    or interesting ingredients. If the stakes are low and the process is its own reward,
    don’t worry about the rules.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 有一种情况，即使你打破任何或所有这些规则也没有关系——当你只是玩乐的时候。大型语言模型（LLMs）本质上是有创造性的工具。它们可以是一幅画布，一个沙盒，一张空白纸。迭代仍然很重要；用户希望在创作过程中看到他们正在创造的东西。但由信息不足或遗漏的细节导致的意外结果可能会*增加*体验。如果你要求一份芝士汉堡的食谱，你可能会得到一些有趣或有趣的成分。如果风险很低，过程本身就是一种奖励，那么不必担心规则。
