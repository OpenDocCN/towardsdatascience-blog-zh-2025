  prefs: []
  type: TYPE_NORMAL
- en: Final Thoughts
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Data science is often touted as the perfect synthesis of statistics, computing,
    and society, a way to obtain and share deep and meaningful insights about an information-heavy
    world. This is true–but as the capacity to widely share such insights expands,
    so must our general ability to interpret them accurately. It is my hope that in
    light of that, you have found this primer to be helpful.
  prefs: []
  type: TYPE_NORMAL
- en: Stay tuned for Part 2, in which I’ll talk about a few deceptive techniques a
    bit more involved in nature–including base proportions, (un)trustworthy statistical
    measures, and measures of correlation.
  prefs: []
  type: TYPE_NORMAL
- en: In the meantime, try not to get deceived.
  prefs: []
  type: TYPE_NORMAL
