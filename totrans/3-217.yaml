- en: '![](../Images/7f9a4a9d524d8c4f0dd8139b6fcce24f.png)'
  prefs: []
  type: TYPE_IMG
- en: Notice how the blue is not quite as dominant as the 3D version seems to suggest,
    and that the red and orange are closer to one another in size than originally
    portrayed. I also removed the percentage labels intentionally (technically bad
    practice) in order to emphasize how even with the labels present in the first
