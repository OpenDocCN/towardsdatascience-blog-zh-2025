- en: Introducing Google’s File Search Tool
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/introducing-googles-file-search-tool/](https://towardsdatascience.com/introducing-googles-file-search-tool/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '<mdspan datatext="el1763425676090" class="mdspan-comment">Large Language Models</mdspan>
    (LLMs) like Gemini have revolutionised what’s possible in software development.
    Their ability to understand, generate, and reason about text is remarkable. However,
    they have a fundamental limitation: they only know what they were trained on.
    They’re unaware of your company’s internal documentation, your project’s specific
    codebase, or the latest research paper published yesterday.'
  prefs: []
  type: TYPE_NORMAL
- en: To build intelligent and practical applications, we need to bridge this gap
    and ground the model’s vast reasoning capabilities in your own specific, private
    data. This is the domain of Retrieval-Augmented Generation (RAG). This powerful
    technique retrieves relevant information from, typically, an external knowledge
    base. Then it provides it to the LLM as context to generate a more accurate, appropriate,
    and verifiable response to questions.
  prefs: []
  type: TYPE_NORMAL
- en: 'While highly effective, building a robust RAG pipeline from scratch is a significant
    engineering challenge. It involves a complex sequence of steps:'
  prefs: []
  type: TYPE_NORMAL
- en: Data Ingestion and Chunking. Parsing various file formats (PDFs, DOCX, etc.)
    and intelligently splitting them into smaller, semantically meaningful chunks.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Embedding Generation. Using an embedding model to convert these text chunks
    into numerical vector representations.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Vector Storage. Setting up, managing, and scaling a dedicated vector database
    to store these embeddings for efficient searching.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Retrieval Logic. Implementing a system to take a user’s query, embed it, and
    perform a similarity search against the vector database to find the most relevant
    chunks.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Context Injection. Dynamically inserting the retrieved chunks into a prompt
    for the LLM in a way that it can effectively use the information. Each of these
    steps requires careful consideration, infrastructure management, and ongoing maintenance.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Each of these steps requires careful consideration, infrastructure management,
    and ongoing maintenance.
  prefs: []
  type: TYPE_NORMAL
- en: Recently, continuing its effort to bring an end to traditional RAG as we know
    it, Google has bought out yet another new product targeting this space. Google’s
    new **File Search** tool completely obviates the need for you to chunk, embed
    and vectorise your documents before carrying out semantic searches on them.
  prefs: []
  type: TYPE_NORMAL
- en: What is the Google File Search tool?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: At its core, the File Search Tool is a powerful abstraction layer over a complete
    RAG pipeline. It handles the entire lifecycle of your data, from ingestion to
    retrieval, providing a simple yet powerful way to ground Gemini’s responses in
    your documents.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s break down its core components and the problems they solve.
  prefs: []
  type: TYPE_NORMAL
- en: 1) Simple, Integrated Developer Experience
  prefs: []
  type: TYPE_NORMAL
- en: File Search is not a separate API or a complex external service you need to
    orchestrate. It’s implemented as a **Tool** directly within the existing GeminiAPI**.**
    This seamless integration enables you to add powerful RAG capabilities to your
    application with just a few additional lines of code. The tool automatically…
  prefs: []
  type: TYPE_NORMAL
- en: Securely stores your uploaded documents.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Applies sophisticated strategies to break down your documents into appropriately
    sized, coherent chunks for the best retrieval results.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Processes your files, generates embeddings using Google’s state-of-the-art models,
    and indexes them for fast retrieval.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Handles the retrieval and injects the relevant context into the prompt sent
    to Gemini.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 2) Powerful Vector Search at its Core
  prefs: []
  type: TYPE_NORMAL
- en: The retrieval engine is powered by the **gemini-embedding-001** model, designed
    for high-performance semantic search. Unlike traditional keyword searching, which
    only finds exact matches, vector search understands the **meaning and context**
    of a query. This allows it to surface relevant information from your documents
    even if the user’s query uses entirely different wording.
  prefs: []
  type: TYPE_NORMAL
- en: 3) Built-in Citations for Verifiability
  prefs: []
  type: TYPE_NORMAL
- en: Trust and transparency are critical for enterprise-grade AI applications. The
    File Search Tool automatically includes grounding metadata in the model’s response.
    This metadata contains citations that specify exactly which parts of which source
    documents were used to generate the answer.
  prefs: []
  type: TYPE_NORMAL
- en: This is an important feature that allows you to:-
  prefs: []
  type: TYPE_NORMAL
- en: Verify Accuracy. Easily check the model’s sources to confirm the correctness
    of its response.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Build User Trust. Show users where the information is coming from, increasing
    their confidence in the system.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Enable Deeper Exploration. Provides links to the source documents, enabling
    users to explore topics of interest in greater depth.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 4\. Support for a Wide Range of Formats.
  prefs: []
  type: TYPE_NORMAL
- en: A knowledge base is rarely composed of simple text files. The File Search Tool
    supports a wide range of standard file formats out of the box, including PDF,
    DOCX, TXT, JSON, and various programming language and application file formats.
    This flexibility means you can build a comprehensive knowledge base from your
    existing documents without needing to perform cumbersome pre-processing or data
    conversion steps.
  prefs: []
  type: TYPE_NORMAL
- en: 5\. Affordability
  prefs: []
  type: TYPE_NORMAL
- en: Google has made using its File Search tool extremely cost-effective. Storage
    and embedding of queries is free of charge. You only pay for any embeddings of
    your initial document contents, which can be as low as $0.15 per 1 million tokens
    (based on, for example, the gemini-embedding-001 embedding model).
  prefs: []
  type: TYPE_NORMAL
- en: Using File Search
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now that we have a better idea of what the File Search tool is, it’s time to
    see how we can use it in our workflows. For that, I’ll be showcasing some example
    Python code that shows you how to call and use File Search.
  prefs: []
  type: TYPE_NORMAL
- en: However, before that, it is best practice to set up a separate development environment
    to keep our various projects isolated from each other.
  prefs: []
  type: TYPE_NORMAL
- en: I’ll be using the UV tool for this and will run my code in a Jupyter notebook
    under WSL2 Ubuntu for Windows. However, feel free to use whichever package manager
    suits you best.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: You’ll also need a Gemini API key, which you can get from Google’s AI Studio
    home page using the link below.
  prefs: []
  type: TYPE_NORMAL
- en: '[**Google AI Studio**](https://aistudio.google.com/)'
  prefs: []
  type: TYPE_NORMAL
- en: Look for a Get API Key link near the bottom left of the screen after you’ve
    logged in.
  prefs: []
  type: TYPE_NORMAL
- en: Example code — a simple search on a PDF document
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: For testing purposes, I downloaded the user manual for the Samsung S25 mobile
    phone from their website to my local desktop PC. It’s over 180 pages long. You
    can get it using [this link](https://downloadcenter.samsung.com/content/UM/202505/20250522202232085/SM-S93X_UG_EU_15_Eng_Rev.2.0_250514.pdf).
  prefs: []
  type: TYPE_NORMAL
- en: Start up Jupyter notebook and type in the following code into a cell.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: After importing the required libraries, we create a “file search store”, which
    is a container for the data and indexes of your uploaded files. Next, we upload
    our input file to the store and wait until the upload has completed.
  prefs: []
  type: TYPE_NORMAL
- en: Next, we call the **generate_content** function, which will answer the question
    we posed to our chosen model (Gemini 2.5 flash in our example) about our input
    file, before printing out the model’s response.
  prefs: []
  type: TYPE_NORMAL
- en: Here is the response I got when running the above code.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: We can verify the accuracy of this information by examining the first page of
    the PDF, where the list of relevant models is provided.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/889a19fa07eacdf35a89a5d22f3d4acd.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s dig a little deeper and find a trickier question. Say you want to find
    out how to turn off your screen automatically when it’s not in use. On page 156
    of the PDF, it says this:'
  prefs: []
  type: TYPE_NORMAL
- en: You can set the screen to turn off automatically when you are not using it.
    Open Settings, tap Display → Screen timeout, and then select the length of time
    you want the device to wait before turning off the screen.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Can the File Search tool identify this?
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: And the response?
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: Be aware that File Search can also utilise its model’s own internal knowledge
    base when answering questions, without necessarily consulting the document store
    to find an answer.
  prefs: []
  type: TYPE_NORMAL
- en: Dealing with multiple input files
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: If your document corpus consists of multiple files, it’s easy to incorporate
    them all using a simple for loop, but you should be aware of some of the limitations
    of File Search. From Google’s own documentation, these limits are,
  prefs: []
  type: TYPE_NORMAL
- en: 'The File Search API has the following limits to enforce service stability:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Maximum file size / per document limit: 100 MB'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Total size of project File Search stores (based on user tier):'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Free: 1 GB'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Tier 1: 10 GB'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Tier 2: 100 GB'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Tier 3: 1 TB'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Controlling the chunking
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: When a file is added to a File Search store, the system automatically splits
    it into smaller chunks, embeds and indexes the content, and then uploads it. If
    you want to fine-tune how this segmentation happens, you can use the **chunking_config**
    option to set limits on chunk size and specify how many tokens should overlap
    between chunks. Here’s a code snippet showing how you would do that.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: How does File Search differ from Google’s other RAG-related tools, such as Context
    Grounding and LangExtract?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'I’ve recently written articles on two similar products from Google in this
    space: Context Grounding and LangExtract. On the surface, they do similar things.
    And that’s right — up to a point.'
  prefs: []
  type: TYPE_NORMAL
- en: The main difference is that File Search **is an actual** RAG product in that
    it stores your document embeddings permanently, whereas the other two tools don’t.
    This means that once your embeddings are in the File Search store, they remain
    there forever or until you choose to delete them. You don’t have to re-upload
    your files every time you want to answer a question on them.
  prefs: []
  type: TYPE_NORMAL
- en: Here’s a handy table of the differences for reference.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: Deleting a file search store
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Google automatically deletes your raw file contents from its File Store after
    48 hours, but it retains the document embeddings, allowing you to continue querying
    your document contents. If you decide they are no longer needed, you can delete
    them. This can be done programmatically as shown in the code snippet below.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Traditionally, building a RAG pipeline required complex steps — ingesting data,
    splitting it into chunks, generating embeddings, setting up vector databases,
    and injecting retrieved context into prompts. Google’s new File Search tool abstracts
    all these tasks away, offering a fully managed, end-to-end RAG solution integrated
    directly into the Gemini API via the **generateContent** call.
  prefs: []
  type: TYPE_NORMAL
- en: In this article, I outlined some of the key features and advantages of File
    Search before providing a fully working Python code example of its use. My example
    demonstrated the uploading of a large PDF file (a Samsung phone manual) into a
    File Search store and querying it through the Gemini model and API to accurately
    extract specific information. I also showed code you can use to micro-manage your
    document’s chunking strategy if the default employed by File Search doesn’t meet
    your needs. Finally, to keep costs to a minimum, I also provided a code snippet
    showing how to delete unwanted Stores when you’re done with them.
  prefs: []
  type: TYPE_NORMAL
- en: As I was writing this, it occurred to me that, on the face of it, this tool
    shares many similarities with other Google products in this space that I’ve written
    about before, i.e LangExtract and Context Grounding. However, I went on to explain
    that there were key differentiators in each, with File Search being the only true
    RAG system of the three, and highlighted the differences in an easy-to-read table
    format.
  prefs: []
  type: TYPE_NORMAL
- en: There is much more to Google’s File Search tool than I was able to cover in
    this article, including the use of File Metadata and Citations. I encourage you
    to explore Google’s API documentation online using the link below for a comprehensive
    description of all File Search’s capabilities.
  prefs: []
  type: TYPE_NORMAL
- en: '[https://ai.google.dev/gemini-api/docs/file-search#file-search-stores](https://ai.google.dev/gemini-api/docs/file-search#file-search-stores)'
  prefs: []
  type: TYPE_NORMAL
- en: 'Note: I have no affiliation with Google or any of its tools mentioned in this
    article.'
  prefs: []
  type: TYPE_NORMAL
