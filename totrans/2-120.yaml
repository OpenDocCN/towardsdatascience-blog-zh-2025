- en: 'Hands‑On with Agents SDK: Your First API‑Calling Agent'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/hands%e2%80%91on-with-agents-sdk-your-first-api%e2%80%91calling-agent/](https://towardsdatascience.com/hands%e2%80%91on-with-agents-sdk-your-first-api%e2%80%91calling-agent/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1753142599864" class="mdspan-comment">The current hype</mdspan>
    around LLMs is now evolving into the hype of Agentic AI. While I hope this article
    doesn’t fall into an “over‑hyped” category, I personally believe this topic is
    important to learn. Coming from a data and analytics background, I find that getting
    familiar with it can be very helpful in day‑to‑day work and to prepare for how
    it might potentially reshape current processes.
  prefs: []
  type: TYPE_NORMAL
- en: 'My own journey with Agentic AI is still quite new (after all, it’s a relatively
    new topic), and I’m still learning along the way. In this series of articles,
    I’d like to share a beginner‑friendly, step‑by‑step guide to developing Agentic
    AI based on my personal experience—focusing on the OpenAI Agents SDK framework.
    Some topics I plan to cover in this series include: tool‑use agents, multi‑agent
    collaboration, structured output, generating data visualizations, chat features,
    and more. So stay tuned!'
  prefs: []
  type: TYPE_NORMAL
- en: In this article, we’ll start by building a basic agent and then enhance it into
    a tool‑using agent capable of retrieving data from an API. Finally, we’ll wrap
    everything in a simple Streamlit UI so users can interact with the agent we build.
  prefs: []
  type: TYPE_NORMAL
- en: 'Throughout this guide, we’ll stick to a single use case: creating a weather
    assistant app. I chose this example because it’s relatable for everyone and covers
    most of the topics I plan to share. Since the use case is simple and generic,
    you can easily adapt this guide for your own projects.'
  prefs: []
  type: TYPE_NORMAL
- en: '*The link to the GitHub repository and the deployed Streamlit app is provided
    at the end of this article.*'
  prefs: []
  type: TYPE_NORMAL
- en: A Brief Intro to OpenAI Agents SDK
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The OpenAI Agents SDK is a Python-based framework that allows us to create an
    agentic AI system in a simple and easy-to-use way [1]. As a beginner myself, I
    found this statement to be quite true, which makes the learning journey feel less
    intimidating.
  prefs: []
  type: TYPE_NORMAL
- en: At the core of this framework are “Agents”—Large Language Models (LLMs) that
    we can configure with specific instructions and tools they can use.
  prefs: []
  type: TYPE_NORMAL
- en: As we already know, an LLM is trained on a vast amount of data, giving it strong
    capabilities in understanding human language and generating text or images. When
    combined with clear instructions and the ability to interact with tools, it becomes
    more than just a generator—it can act and becomes an agent [2].
  prefs: []
  type: TYPE_NORMAL
- en: One practical use of tools is enabling an agent to retrieve factual data from
    external sources. This means the LLM no longer relies solely on its (often outdated)
    training data, allowing it to produce more accurate and up‑to‑date results.
  prefs: []
  type: TYPE_NORMAL
- en: In this article, we will focus on this advantage by building an agent that can
    retrieve “real‑time” data from an API. Let’s get started!
  prefs: []
  type: TYPE_NORMAL
- en: Set Up the Environment
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Create a `requirements.txt` file containing the following two important packages.
    I prefer using `requirements.txt` for two reasons: reusability and preparing the
    project for Streamlit deployment.'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'Next, set up a virtual environment named `venv` and install the packages listed
    above. Run the following commands in your terminal:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Lastly, since we will use the OpenAI API to call the LLM, you need to have an
    API key ([get your API key here](http://platform.openai.com/api-keys)). Store
    this key in a `.env` file as follows. **Important:** make sure you add `.env`
    to your `.gitignore` file if you are using Git for this project.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: Once everything is set up, you’re good to go!
  prefs: []
  type: TYPE_NORMAL
- en: A Simple Agent
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let’s begin with a simple agent by creating a Python file called `01-single-agent.py`.
  prefs: []
  type: TYPE_NORMAL
- en: Import Libraries
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The first thing we need to do in the script is import the necessary libraries:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: From the Agents SDK package, we use `Agent` to define the agent and `Runner`
    to run it. We also import `asyncio` to enable our program to perform multiple
    tasks without waiting for one to finish before starting another.
  prefs: []
  type: TYPE_NORMAL
- en: Lastly, `load_dotenv` from the `dotenv` package loads the environment variables
    we defined earlier in the `.env` file. In our case, this includes `OPENAI_API_KEY`,
    which will be used by default when we define and call an agent.
  prefs: []
  type: TYPE_NORMAL
- en: Define a Simple Agent
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '![](../Images/32575f1bddd8f7cc9fac3646c893d216.png)'
  prefs: []
  type: TYPE_IMG
- en: Structure of Weather Assistant Agent.
  prefs: []
  type: TYPE_NORMAL
- en: Generated using GraphViz.
  prefs: []
  type: TYPE_NORMAL
- en: Next, we will define a simple agent called **Weather Assistant**.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: An agent can be defined with several properties. In this simple example, we
    only configure the `name` and the `instructions` for the agent. If needed, we
    can also specify which LLM model to use. For instance, if we want to use a smaller
    model such as `gpt-4o-mini` (currently, the default model is `gpt-4o`), we can
    add the configuration as shown below.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: There are several other parameters that we will cover later in this article
    and in the next one. For now, we will keep the model configuration simple as shown
    above.
  prefs: []
  type: TYPE_NORMAL
- en: After defining the agent, the next step is to create an asynchronous function
    that will run the agent.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: The `Runner.run(agent, ...)` method calls the `agent` with the query *“What’s
    the weather like today in Jakarta?”*. The `await` keyword pauses the function
    until the task is complete, allowing other asynchronous tasks (if any) to run
    in the meantime. The result of this task is stored in the `result` variable. To
    view the output, we print `result.final_output` to the terminal.
  prefs: []
  type: TYPE_NORMAL
- en: The last part we need to add is the program’s entry point to execute the function
    when the script runs. We use [`asyncio.run`](http://asyncio.run) to execute the
    `run_agent` function.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: Run the Simple Agent
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Now, let’s run the script in the terminal by executing:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: The result will most likely be that the agent says it cannot provide the information.
    This is expected because the LLM was trained on past data and does not have access
    to real-time weather conditions.
  prefs: []
  type: TYPE_NORMAL
- en: '*I can’t provide real-time information, but you can check a reliable weather
    website or app for the latest updates on Jakarta’s weather today.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: In the worst case, the agent might hallucinate by returning a random temperature
    and giving suggestions based on that value. To handle this situation, we will
    later enforce the agent to call an API to retrieve the actual weather conditions.
  prefs: []
  type: TYPE_NORMAL
- en: Using Trace
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'One of the useful features of the Agents SDK is **Trace**, which allows you
    to visualize, debug, and monitor the workflow of the agent you’ve built and executed.
    You can access the tracing dashboard here: [https://platform.openai.com/traces](https://platform.openai.com/traces).'
  prefs: []
  type: TYPE_NORMAL
- en: 'For our simple agent, the trace will look like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Example of a trace dashboard](../Images/1db536a1aca8f226c724dac0d7408e3d.png)'
  prefs: []
  type: TYPE_IMG
- en: Screenshot of Trace Dashboard.
  prefs: []
  type: TYPE_NORMAL
- en: In this dashboard, you can find useful information about how the workflow is
    executed, including the input and output of each step. Since this is a simple
    agent, we only have one agent run. However, as the workflow becomes more complex,
    this trace feature will be extremely helpful for tracking and troubleshooting
    the process.
  prefs: []
  type: TYPE_NORMAL
- en: User Interface with Streamlit
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Previously, we built a simple script to define and call an agent. Now, let’s
    make it more interactive by adding a user interface with Streamlit [3].
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s create a script named [`02-single-agent-app.py`](http://02-single-agent-app.py)
    as shown below:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: Compared to the previous script, we now import the Streamlit library to build
    an interactive app. The agent definition remains the same, but we modify the `run_agent`
    function to accept user input and pass it to the [`Runner.run`](http://Runner.run)
    function. Instead of printing the result directly to the console, the function
    now returns the result.
  prefs: []
  type: TYPE_NORMAL
- en: 'In the `main` function, we use Streamlit components to build the interface:
    setting the title, adding a text box for user input, and creating a button that
    triggers the `run_agent` function.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The agent’s response is stored in `agent_response` and displayed using the
    `st.write` component. To run this Streamlit app in your browser, use the following
    command:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/f1aa789322d5e65336fda4c921179274.png)'
  prefs: []
  type: TYPE_IMG
- en: Screenshot for single agent app using Streamlit
  prefs: []
  type: TYPE_NORMAL
- en: To stop the app, press `Ctrl + C` in your terminal.
  prefs: []
  type: TYPE_NORMAL
- en: To keep the article focused on the Agents SDK framework, I kept the Streamlit
    app as simple as possible. However, that doesn’t mean you need to stop here. Streamlit
    offers a wide variety of components that allow you to get creative and make your
    app more intuitive and engaging. For a complete list of components, check the
    Streamlit documentation in the reference section.
  prefs: []
  type: TYPE_NORMAL
- en: From this point onward, we will continue using this basic Streamlit structure.
  prefs: []
  type: TYPE_NORMAL
- en: A Tool-Use Agent
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As we observed in the previous section, the agent struggles when asked about
    the current weather condition. It may return no information or, worse, produce
    a hallucinated answer. To ensure our agent uses real data, we can allow it to
    call an external API so it can retrieve actual information.
  prefs: []
  type: TYPE_NORMAL
- en: This process is a practical example of using **Tools** in the Agents SDK. In
    general, tools enable an agent to take actions—such as fetching data, running
    code, calling an API (as we will do shortly), or even interacting with a computer
    [1]. Using tools and taking actions is one of the key capabilities that distinguishes
    an agent from a typical LLM.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s dive into the code. First, create another file named `03-tooluse-agent-app.py`.
  prefs: []
  type: TYPE_NORMAL
- en: Import Libraries
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'We will need the following libraries:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: 'Notice that from the Agents SDK, we now import an additional module: `function_tool`.
    Since we will call an external API, we also import the `requests` library.'
  prefs: []
  type: TYPE_NORMAL
- en: Define the Function Tool
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The API we will use is Open‑Meteo [4], which offers free access for non‑commercial
    use. It provides many features, including weather forecasts, historical data,
    air quality, and more. In this article, we will start with the simplest feature:
    retrieving current weather data.'
  prefs: []
  type: TYPE_NORMAL
- en: As an additional note, Open‑Meteo provides its own library, `openmeteo‑requests`.
    However, in this guide I use a more generic approach with the `requests` module,
    with the intention of making the code reusable for other purposes and APIs.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here is how we can define a function to retrieve the current weather for a
    specific location using Open-Meteo:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: The function takes `latitude` and `longitude` as inputs to identify the location
    and construct an API request. The parameters include metrics such as temperature,
    humidity, and wind speed. If the API request succeeds, it returns the JSON response
    as a Python dictionary. If an error occurs, it returns an error message instead.
  prefs: []
  type: TYPE_NORMAL
- en: To make the function accessible to the agent, we decorate it with `@function_tool`,
    allowing the agent to call it when the user’s query is related to current weather
    data.
  prefs: []
  type: TYPE_NORMAL
- en: Additionally, we include a docstring in the function, providing both a description
    of its purpose and details of its arguments. Including a docstring is extremely
    helpful for the agent to understand how to use the function.
  prefs: []
  type: TYPE_NORMAL
- en: Define a Tool-Use Agent
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '![](../Images/1b64f2a2ce8a2a1857fe86d63d925e9f.png)'
  prefs: []
  type: TYPE_IMG
- en: Structure of Weather Specialist Agent, a toll-use agent.
  prefs: []
  type: TYPE_NORMAL
- en: Generated using GraphViz.
  prefs: []
  type: TYPE_NORMAL
- en: After defining the function, let’s move on to defining the agent.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: For the most part, the structure is the same as in the previous section. However,
    since we are now using tools, we need to add some additional parameters.
  prefs: []
  type: TYPE_NORMAL
- en: The first is `tools`, which is a list of tools the agent can use. In this example,
    we only provide the `get_current_weather` tool. The next is `tool_use_behavior`,
    which configures how tool usage is handled. For this agent, we set it to `"run_llm_again"`,
    which means that after receiving the response from the API, the LLM will process
    it further and present it in a clear, easy-to-read format. Alternatively, you
    can use `"stop_on_first_tool"`, where the LLM will not process the tool’s output
    further. We will experiment with this option later.
  prefs: []
  type: TYPE_NORMAL
- en: The rest of the script follows the same structure we used earlier to build the
    main Streamlit function.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: 'Make sure to save the script, then run it in the terminal:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: 'You can now ask a question about the weather in your city. For example, when
    I asked about the current weather in Jakarta—at the time of writing this (around
    four o’clock in the morning)—the response was as shown below:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Example of agent response for Jakarta weather](../Images/41699e7c8f5a498af8cff3cdf6ecf67d.png)'
  prefs: []
  type: TYPE_IMG
- en: Screenshot for tool-use agent app using Streamlit
  prefs: []
  type: TYPE_NORMAL
- en: Now, instead of hallucinating, the agent can provide a human‑readable current
    weather condition for Jakarta. You might recall that the `get_current_weather`
    function requires latitude and longitude as arguments. In this case, we rely on
    the LLM to supply them, as it is likely trained with basic location information.
    A future improvement would be to add a tool that retrieves a more accurate geographical
    location based on a city name.
  prefs: []
  type: TYPE_NORMAL
- en: (Optional) Use “stop_on_first_tool”
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Out of curiosity, let’s try changing the `tool_use_behavior` parameter to `"stop_on_first_tool"`
    and see what it returns.
  prefs: []
  type: TYPE_NORMAL
- en: '![Example output when using stop_on_first_tool](../Images/bdcd4612234dd7348e66e5a32e6e3196.png)'
  prefs: []
  type: TYPE_IMG
- en: Screenshot for tool-use agent app with stop_on_first_tool option using Streamlit
  prefs: []
  type: TYPE_NORMAL
- en: As expected, without the LLM’s help to parse and transform the JSON response,
    the output is harder to read. However, this behavior can be useful in scenarios
    where you need a raw, structured result without any additional processing by the
    LLM.
  prefs: []
  type: TYPE_NORMAL
- en: Improved Instruction
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now, let’s change the `tool_use_behavior` parameter back to `"run_llm_again"`.
  prefs: []
  type: TYPE_NORMAL
- en: 'As we’ve seen, using an LLM is very helpful for parsing the result. We can
    take this a step further by giving the agent more detailed instructions—specifically,
    asking for a structured output and practical suggestions. To do this, update the
    `instructions` parameter as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: After saving the changes, rerun the app. Using the same question, you should
    now receive a clearer, well‑structured response along with practical suggestions.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a9cc7cec3d88976e4c0384659a25a2d0.png)'
  prefs: []
  type: TYPE_IMG
- en: Screenshot for tool-use agent app with an improved instruction using Streamlit
  prefs: []
  type: TYPE_NORMAL
- en: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>The
    final script of `03-tooluse-agent-app.py` can be seen here.</summary>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]</details>'
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: At this point, we have explored how to create a simple agent and why we need
    a tool‑using agent—one powerful enough to answer specific questions about real‑time
    weather conditions that a simple agent cannot handle. We have also built a simple
    Streamlit UI to interact with this agent.
  prefs: []
  type: TYPE_NORMAL
- en: This first article focuses only on the core concept of how agentic AI can interact
    with a tool, rather than relying solely on its training data to generate output.
  prefs: []
  type: TYPE_NORMAL
- en: 'In the next article, we will shift our focus to another important concept of
    agentic AI: agent collaboration. We will cover why a multi‑agent system can be
    more effective than a single “super” agent, and explore different ways agents
    can interact with each other.'
  prefs: []
  type: TYPE_NORMAL
- en: I hope this article has provided helpful insights to start your journey into
    these topics.
  prefs: []
  type: TYPE_NORMAL
- en: Next Articles
  prefs:
