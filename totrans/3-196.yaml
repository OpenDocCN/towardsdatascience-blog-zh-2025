- en: How to Spot and Prevent Model Drift Before it Impacts Your Business
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何在模型漂移影响业务之前发现和预防它
- en: 原文：[https://towardsdatascience.com/how-to-spot-and-prevent-model-drift-before-it-impacts-your-business/](https://towardsdatascience.com/how-to-spot-and-prevent-model-drift-before-it-impacts-your-business/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[如何在模型漂移影响业务之前发现和预防它](https://towardsdatascience.com/how-to-spot-and-prevent-model-drift-before-it-impacts-your-business/)'
- en: Despite the AI hype, many tech companies still rely heavily on machine learning
    to power critical applications, from personalized recommendations to fraud detection.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管人工智能炒作盛行，许多科技公司仍然严重依赖机器学习来驱动关键应用，从个性化推荐到欺诈检测。
- en: I’ve seen firsthand how undetected drifts can result in significant costs —
    missed fraud detection, lost revenue, and suboptimal business outcomes, just to
    name a few. So, it’s crucial to have robust monitoring in place if your company
    has deployed or plans to deploy machine learning models into production.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 我亲眼见证了未检测到的漂移如何导致重大成本——错过的欺诈检测、收入损失以及次优的商业结果，仅举几例。因此，如果您的公司已经部署或计划部署机器学习模型到生产环境中，拥有强大的监控至关重要。
- en: 'Undetected model drift can lead to significant financial losses, operational
    inefficiencies, and even damage to a company’s reputation. To mitigate these risks,
    it’s important to have effective model monitoring, which involves:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 未检测到的模型漂移可能导致重大经济损失、运营效率低下，甚至损害公司的声誉。为了减轻这些风险，拥有有效的模型监控至关重要，这包括：
- en: Tracking model performance
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 跟踪模型性能
- en: Monitoring feature distributions
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 监控特征分布
- en: Detecting both univariate and multivariate drifts
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 检测单变量和多变量漂移
- en: A well-implemented monitoring system can help identify issues early, saving
    considerable time, money, and resources.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 一个实施良好的监控系统可以帮助早期发现问题，节省大量时间、金钱和资源。
- en: In this comprehensive guide, I’ll provide a framework on how to think about
    and implement effective model monitoring, helping you stay ahead of potential
    issues and ensure stability and reliability of your models in production.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇全面的指南中，我将提供一个框架，介绍如何思考和实施有效的模型监控，帮助您提前发现潜在问题，并确保模型在生产中的稳定性和可靠性。
- en: What’s the difference between feature drift and score drift?
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 特征漂移和分数漂移之间的区别是什么？
- en: Score drift refers to a gradual change in the distribution of model scores.
    If left unchecked, this could lead to a **decline in model performance**, making
    the model less accurate over time.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 分数漂移指的是模型分数分布的逐渐变化。如果未加控制，这可能导致**模型性能下降**，使模型随着时间的推移变得越来越不准确。
- en: On the other hand, feature drift occurs when one or more features experience
    changes in the distribution. These changes in feature values can affect the underlying
    relationships that the model has learned, and ultimately lead to inaccurate model
    predictions.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，当一个或多个特征经历分布变化时，就会发生特征漂移。这些特征值的变化可能会影响模型学习到的潜在关系，并最终导致模型预测不准确。
- en: Simulating score shifts
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 模拟分数变化
- en: To model real-world fraud detection challenges, I created a synthetic dataset
    with five financial transaction features.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 为了模拟现实世界的欺诈检测挑战，我创建了一个包含五个金融交易特征的合成数据集。
- en: The **reference dataset** represents the original distribution, while the **production
    dataset** introduces shifts to simulate an increase in **high-value transactions
    without PIN verification on newer accounts,** indicating an increase in fraud.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: '**参考数据集**代表原始分布，而**生产数据集**引入变化来模拟在较新账户上**无需PIN验证的高价值交易增加**，这表明欺诈的增加。'
- en: 'Each feature has different underlying distributions:'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 每个特征都有不同的潜在分布：
- en: '**Transaction Amount:** Log-normal distribution (right-skewed with a long tail)'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**交易金额：** 对数正态分布（右偏斜，尾部较长）'
- en: '**Account Age (months):** clipped normal distribution between 0 to 60 (assuming
    a 5-year-old company)'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**账户年龄（月数）：** 0到60之间的截断正态分布（假设公司成立5年）'
- en: '**Time Since Last Transaction**: Exponential distribution'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自上次交易以来时间：** 指数分布'
- en: '**Transaction Count**: Poisson distribution'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**交易次数：** 泊松分布'
- en: '**Entered PIN:** Binomial distribution.'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**输入PIN码：** 二项式分布。'
- en: To approximate model scores, I randomly assigned weights to these features and
    applied a sigmoid function to constrain predictions between 0 to 1\. This mimics
    how a logistic regression fraud model generates risk scores.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 为了近似模型分数，我随机分配了这些特征的权重，并应用了Sigmoid函数来限制预测值在0到1之间。这模仿了逻辑回归欺诈模型生成风险分数的方式。
- en: 'As shown in the plot below:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 如下图中所示：
- en: '**Drifted features:** *Transaction Amount, Account Age, Transaction Count,
    and Entered PIN* all experienced shifts in distribution, scale, or relationships.'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**漂移特征**：*交易金额、账户年龄、交易次数和输入的 PIN* 都经历了分布、尺度或关系的偏移。'
- en: '![](../Images/adba41f95c5524a3243b94593a860c24.png)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/adba41f95c5524a3243b94593a860c24.png)'
- en: Distribution of drifted features (image by author)
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 漂移特征的分布（图片由作者提供）
- en: '**Stable feature:** *Time Since Last Transaction* remained unchanged.'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**稳定特征**：*自上次交易以来时间* 保持不变。'
- en: '![](../Images/4d231cd2c678c32b8bdd6e73d2a8596c.png)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/4d231cd2c678c32b8bdd6e73d2a8596c.png)'
- en: Distribution of stable feature (image by author)
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 稳定特征的分布（图片由作者提供）
- en: '**Drifted scores:** As a result of the drifted features, the distribution in
    model scores has also changed.'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**漂移得分**：由于特征漂移，模型得分中的分布也发生了变化。'
- en: '![](../Images/bee89cc1fd9283ed2ebdb7f6e742f941.png)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/bee89cc1fd9283ed2ebdb7f6e742f941.png)'
- en: Distribution of model scores (image by author)
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 模型得分分布（图片由作者提供）
- en: This setup allows us to analyze how feature drift impacts model scores in production.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 这种设置使我们能够分析特征漂移如何影响生产中的模型得分。
- en: Detecting model score drift using PSI
  id: totrans-34
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用 PSI 检测模型得分漂移
- en: To monitor model scores, I used population stability index (PSI) to measure
    how much model score distribution has shifted over time.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 为了监控模型得分，我使用了人口稳定性指数（PSI）来衡量模型得分分布随时间的变化程度。
- en: PSI works by binning continuous model scores and comparing the proportion of
    scores in each bin between the reference and production datasets. It compares
    the differences in proportions and their logarithmic ratios to compute a single
    summary statistic to quantify the drift.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: PSI 通过对连续模型得分进行分箱，并比较参考和生产数据集中每个分箱中得分的比例来工作。它比较比例的差异及其对数比率，以计算一个单一的汇总统计量来量化漂移。
- en: '**Python implementation:**'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: '**Python 实现：**'
- en: '[PRE0]'
  id: totrans-38
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'Below is a summary of how to interpret PSI values:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是如何解释 PSI 值的总结：
- en: '**PSI < 0.1**: No drift, or very minor drift (distributions are almost identical).'
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**PSI < 0.1**：没有漂移，或者非常轻微的漂移（分布几乎相同）。'
- en: '**0.1 ≤ PSI < 0.25**: Some drift. The distributions are somewhat different.'
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**0.1 ≤ PSI < 0.25**：存在一些漂移。分布有些不同。'
- en: '**0.25 ≤ PSI < 0.5**: Moderate drift. A noticeable shift between the reference
    and production distributions.'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**0.25 ≤ PSI < 0.5**：中等漂移。参考和生产分布之间存在明显的偏移。'
- en: '**PSI ≥ 0.5:** Significant drift. There is a large shift, indicating that the
    distribution in production has changed substantially from the reference data.'
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**PSI ≥ 0.5**：显著漂移。存在很大的偏移，表明生产中的分布与参考数据相比发生了实质性变化。'
- en: '![](../Images/189e91dc42a7409bc81359d573bbc426.png)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/189e91dc42a7409bc81359d573bbc426.png)'
- en: Histogram of model score distributions (image by author)
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 模型得分分布的直方图（图片由作者提供）
- en: The **PSI value of 0.6374** suggests a significant drift between our reference
    and production datasets. This aligns with the histogram of model score distributions,
    which visually confirms the shift towards higher scores in production — **indicating
    an increase in risky transactions.**
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: '**PSI 值为 0.6374** 暗示我们的参考和生产数据集之间存在显著的漂移。这与模型得分分布的直方图相一致，直观地确认了生产中得分向更高值偏移——**表明风险交易的增加**。'
- en: Detecting feature drift
  id: totrans-47
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 检测特征漂移
- en: '**Kolmogorov-Smirnov test for numeric features**'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: '**数值特征的 Kolmogorov-Smirnov 测试**'
- en: The Kolmogorov-Smirnov (K-S) test is my preferred method for detecting drift
    in numeric features, because it is **non-parametric,** meaning it doesn’t assume
    a normal distribution.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: Kolmogorov-Smirnov (K-S) 测试是我检测数值特征漂移的首选方法，因为它是非参数的，这意味着它不假设正态分布。
- en: 'The test compares a feature’s distribution in the reference and production
    datasets by measuring the maximum difference between the empirical cumulative
    distribution functions (ECDFs). The resulting K-S statistic ranges from 0 to 1:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 该测试通过测量经验累积分布函数（ECDF）之间的最大差异来比较参考和生产数据集中特征的分布。得到的 K-S 统计量范围从 0 到 1：
- en: 0 indicates no difference between the two distributions.
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 0 表示两个分布之间没有差异。
- en: Values closer to 1 suggest a greater shift.
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 接近 1 的值表示更大的偏移。
- en: '**Python implementation:**'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: '**Python 实现：**'
- en: '[PRE1]'
  id: totrans-54
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'Below are ECDF charts of the four numeric features in our dataset:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是我们数据集中四个数值特征的 ECDF 图表：
- en: '![](../Images/6656dc58b81f3a721c97aa913718cee4.png)'
  id: totrans-56
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6656dc58b81f3a721c97aa913718cee4.png)'
- en: ECDFs of four numeric features (image by author)
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 四个数值特征的 ECDF（图片由作者提供）
- en: 'Let’s look at the account age feature as an example: the x-axis represents
    account age (0-50 months), while the y-axis shows the ECDF for both reference
    and production datasets. The production dataset skews towards newer accounts,
    as it has a larger proportion of observations with lower account ages.'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 以账户年龄特征为例：x轴表示账户年龄（0-50个月），y轴显示参考数据集和生产数据集的ECDF。生产数据集倾向于新账户，因为它有更多低账户年龄的观测值。
- en: '**Chi-Square test for categorical features**'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: '**分类特征的卡方检验**'
- en: To detect shifts in categorical and boolean features, I like to use the Chi-Square
    test.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 为了检测分类和布尔特征的变动，我喜欢使用卡方检验。
- en: 'This test compares the frequency distribution of a categorical feature in the
    reference and production datasets, and returns two values:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 此测试比较参考数据集和生产数据集中分类特征的频率分布，并返回两个值：
- en: '**Chi-Square statistic:** A higher value indicates a greater shift between
    the reference and production datasets.'
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**卡方统计量**：更高的值表示参考数据集和生产数据集之间有更大的变化。'
- en: '**P-value**: A p-value below 0.05 suggests that the difference between the
    reference and production datasets is statistically significant, indicating potential
    feature drift.'
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**p值**：p值低于0.05表明参考数据集和生产数据集之间的差异在统计上具有显著性，表明可能存在特征漂移。'
- en: '**Python implementation:**'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: '**Python实现：**'
- en: '[PRE2]'
  id: totrans-65
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'The Chi-Square statistic of 57.31 with a p-value of 3.72e-14 confirms a large
    shift in our categorical feature, `Entered PIN`. This finding aligns with the
    histogram below, which visually illustrates the shift:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 卡方统计量为57.31，p值为3.72e-14，这证实了我们的分类特征“输入PIN”发生了较大的变化。这一发现与下面的直方图相符，它直观地展示了这种变化：
- en: '![](../Images/0fdc7805f2970c9a0942f6c00e642d8f.png)'
  id: totrans-67
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/0fdc7805f2970c9a0942f6c00e642d8f.png)'
- en: Distribution of categorical feature (image by author)
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 分类特征的分布（作者图片）
- en: Detecting multivariate shifts
  id: totrans-69
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 检测多元变化
- en: '**Spearman correlation for shifts in pairwise interactions**'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: '**成对交互变化的斯皮尔曼相关性**'
- en: In addition to monitoring individual feature shifts, it’s important to track
    **shifts in relationships or interactions between features**, known as multivariate
    shifts. Even if the distributions of individual features remain stable, multivariate
    shifts can signal meaningful differences in the data.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 除了监控单个特征的变化外，跟踪特征之间或交互中的**变化或交互**也很重要，这被称为多元变化。即使单个特征的分布保持稳定，多元变化也可能表明数据中的有意义差异。
- en: By default, Pandas’ `.corr()` function calculates Pearson correlation, which
    only captures linear relationships between variables. However, **relationships
    between features are often non-linear** yet still follow a consistent trend.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 默认情况下，Pandas的`.corr()`函数计算皮尔逊相关系数，它仅捕捉变量之间的线性关系。然而，**特征之间的关系通常是非线性**的，但仍然遵循一致的趋势。
- en: To capture this, we use **Spearman correlation** to measure **monotonic relationships**
    between features. It captures whether features **change together** in a consistent
    direction, even if their relationship isn’t strictly linear.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 为了捕捉这一点，我们使用**斯皮尔曼相关性**来衡量特征之间的**单调关系**。它捕捉特征是否**以一致的方向变化**，即使它们之间的关系不是严格线性的。
- en: 'To assess shifts in feature relationships, we compare:'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 为了评估特征关系的变化，我们比较：
- en: '**Reference correlation** (`ref_corr`): Captures historical feature relationships
    in the reference dataset.'
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**参考相关性**（`ref_corr`）：捕捉参考数据集中历史特征关系。'
- en: '**Production correlation** (`prod_corr`): Captures new feature relationships
    in production.'
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**生产相关性**（`prod_corr`）：捕捉生产中的新特征关系。'
- en: '**Absolute difference in correlation**: Measures how much feature relationships
    have shifted between the reference and production datasets. **Higher values indicate
    more significant shifts.**'
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**绝对相关差异**：衡量参考数据集和生产数据集之间特征关系发生了多少变化。**更高的值表示更显著的变化。**'
- en: '**Python implementation:**'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: '**Python实现：**'
- en: '[PRE3]'
  id: totrans-79
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '**Example: Change in correlation**'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: '**示例：相关性的变化**'
- en: 'Now, let’s look at the correlation between `transaction_amount` and `account_age_in_months`:'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们看看`transaction_amount`和`account_age_in_months`之间的相关性：
- en: In `ref_corr`, the correlation is 0.00095, indicating a weak relationship between
    the two features.
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在`ref_corr`中，相关系数为0.00095，表明两个特征之间关系较弱。
- en: In `prod_corr`, the correlation is -0.0325, indicating a weak negative correlation.
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在`prod_corr`中，相关系数为-0.0325，表明存在弱负相关性。
- en: Absolute difference in the Spearman correlation is 0.0335, which is a small
    but noticeable shift.
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 斯皮尔曼相关性的绝对差异为0.0335，这是一个小但明显的变化。
- en: The absolute difference in correlation indicates a **shift** in the relationship
    between `transaction_amount` and `account_age_in_months`.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 相关性的绝对差异表明`transaction_amount`和`account_age_in_months`之间关系的变化。
- en: There used to be no relationship between these two features, but the production
    dataset indicates that there is now a weak negative correlation, meaning that
    newer accounts have higher transaction amounts. This is spot on!
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 这两个特征之间曾经没有关系，但生产数据集表明现在存在微弱的负相关性，这意味着新账户的交易金额更高。这正是我们要找的！
- en: '**Autoencoder for complex, high-dimensional multivariate shifts**'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: '**用于复杂、高维多元变化的自动编码器**'
- en: In addition to monitoring pairwise interactions, we can also look for shifts
    across more dimensions in the data.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 除了监控成对交互外，我们还可以寻找数据中更多维度的变化。
- en: Autoencoders are powerful tools for detecting **high-dimensional multivariate
    shifts**, where multiple features collectively change in ways that may not be
    apparent from looking at individual feature distributions or pairwise correlations.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 自动编码器是检测**高维多元变化**的强大工具，其中多个特征以可能从单个特征分布或成对相关性中不明显的方式集体变化。
- en: 'An autoencoder is a neural network that learns a compressed representation
    of data through two components:'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 自动编码器是一种神经网络，通过两个组件学习数据的压缩表示：
- en: '**Encoder:** Compresses input data into a lower-dimensional representation.'
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**编码器**：将输入数据压缩到低维表示。'
- en: '**Decoder**: Reconstructs the original input from the compressed representation.'
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**解码器**：从压缩表示中重建原始输入。'
- en: To detect shifts, we compare the **reconstructed output** to the **original
    input** and compute the **reconstruction loss**.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 为了检测变化，我们比较**重建输出**与**原始输入**，并计算**重建损失**。
- en: '**Low reconstruction loss** → The autoencoder successfully reconstructs the
    data, meaning the new observations are similar to what it has seen and learned.'
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**低重建损失** → 自动编码器成功重建数据，意味着新的观测值与其所见和所学相似。'
- en: '**High reconstruction loss** → The production data deviates significantly from
    the learned patterns, indicating potential drift.'
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**高重建损失** → 生产数据与学习到的模式有显著偏差，表明可能存在漂移。'
- en: Unlike traditional drift metrics that focus on **individual features or pairwise
    relationships**, autoencoders capture **complex, non-linear dependencies** across
    multiple variables simultaneously.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 与传统关注**个体特征或成对关系**的漂移度量不同，自动编码器可以同时捕捉多个变量之间的**复杂、非线性依赖关系**。
- en: '**Python implementation:**'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: '**Python实现**：'
- en: '[PRE4]'
  id: totrans-98
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: The charts below show the distribution of reconstruction loss between both datasets.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的图表显示了两个数据集之间重建损失的分布。
- en: '![](../Images/035dc1a5df8bd047e8b69e4a16c71e3c.png)'
  id: totrans-100
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/035dc1a5df8bd047e8b69e4a16c71e3c.png)'
- en: Distribution of reconstruction loss between actuals and predictions (image by
    author)
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 实际值与预测值之间重建损失的分布（图片由作者提供）。
- en: The production dataset has a higher mean reconstruction error than that of the
    reference dataset, indicating a shift in the overall data. This aligns with the
    changes in the production dataset with a higher number of newer accounts with
    high-value transactions.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 生产数据集的重建误差绝对值高于参考数据集，这表明整体数据发生了变化。这与生产数据集中新账户数量增加且交易价值较高的变化相一致。
- en: Summarizing
  id: totrans-103
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 总结
- en: Model monitoring is an essential, yet often overlooked, responsibility for data
    scientists and machine learning engineers.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 模型监控是数据科学家和机器学习工程师的一项基本但往往被忽视的责任。
- en: 'All the statistical methods led to the same conclusion, which aligns with the
    observed shifts in the data: they detected **a trend in production towards newer
    accounts making higher-value transactions**. This shift resulted in higher model
    scores, signaling an increase in potential fraud.'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 所有统计方法得出的结论一致，这与数据中观察到的变化相吻合：它们检测到**生产方向上向新账户进行更高价值交易的趋势**。这种变化导致模型得分提高，表明潜在欺诈的增加。
- en: 'In this post, I covered techniques for detecting drift on three different levels:'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我介绍了在三个不同级别检测漂移的技术：
- en: '**Model score drift:** Using **Population Stability Index** (PSI)'
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**模型得分漂移**：使用**人口稳定性指数**（PSI）。'
- en: '**Individual feature drift**: Using **Kolmogorov-Smirnov tes**t for numeric
    features and **Chi-Square test** for categorical features'
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**个体特征漂移**：使用**柯尔莫哥洛夫-斯米尔诺夫检验**对数值特征进行测试，以及**卡方检验**对分类特征进行测试。'
- en: '**Multivariate drift**: Using **Spearman correlation** for pairwise interactions
    and **autoencoders** for high-dimensional, multivariate shifts.'
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**多元漂移**: 使用**斯皮尔曼相关系数**进行成对交互，以及**自编码器**进行高维、多元的漂移。'
- en: These are just a few of the techniques I rely on for comprehensive monitoring
    — there are plenty of other equally valid statistical methods that can also detect
    drift effectively.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 这些只是我依赖的用于全面监控的几种技术——还有许多其他同样有效的统计方法也可以有效地检测到漂移。
- en: Detected shifts often point to underlying issues that warrant further investigation.
    The root cause could be as serious as a data collection bug, or as minor as a
    time change like daylight savings time adjustments.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 检测到的漂移通常指向需要进一步调查的潜在问题。根本原因可能像数据收集错误那样严重，也可能像时区调整这样的小问题。
- en: There are also fantastic python packages, like [evidently.ai](http://evidently.ai),
    that automate many of these comparisons. However, I believe there’s significant
    value in deeply understanding the statistical techniques behind drift detection,
    rather than relying solely on these tools.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，还有一些出色的Python包，如[evidently.ai](http://evidently.ai)，可以自动化许多这些比较。然而，我认为深入理解漂移检测背后的统计技术具有重大价值，而不仅仅依赖于这些工具。
- en: What’s the model monitoring process like at places you’ve worked?
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 你在之前工作的地方，模型监控过程是怎样的？
