- en: 'Reducing Time to Value for Data Science Projects: Part 3'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 减少数据科学项目的时间到价值：第3部分
- en: 原文：[https://towardsdatascience.com/reducing-time-to-value-for-data-science-projects-part-3/](https://towardsdatascience.com/reducing-time-to-value-for-data-science-projects-part-3/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/reducing-time-to-value-for-data-science-projects-part-3/](https://towardsdatascience.com/reducing-time-to-value-for-data-science-projects-part-3/)
- en: <mdspan datatext="el1752175012309" class="mdspan-comment">Introduction</mdspan>
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1752175012309" class="mdspan-comment">引言</mdspan>
- en: Parts [1](https://towardsdatascience.com/reducing-time-to-value-for-data-science-projects-part-1/)
    and [2](https://towardsdatascience.com/reducing-time-to-value-for-data-science-projects-part-2/)
    of this series focussed on the technical aspect of improving the experimentation
    process. This started with rethinking how code is created, stored and used, and
    ended with utilising large scale parallelization to cut down the time taken to
    run experiments. This article takes a step back from the implementation details
    and instead takes a wider look at how / why we experiment, and how we can reduce
    the time of value of our projects by being smarter about experimenting.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 本系列的第[1](https://towardsdatascience.com/reducing-time-to-value-for-data-science-projects-part-1/)和[2](https://towardsdatascience.com/reducing-time-to-value-for-data-science-projects-part-2/)部分专注于改进实验过程的技术方面。这始于重新思考代码的创建、存储和使用方式，并以利用大规模并行化来减少实验运行时间结束。本文从实现细节退后一步，更广泛地审视了为什么/如何进行实验，以及我们如何通过更智能地进行实验来减少项目的时间到价值。
- en: Failing to plan is planning to fail
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 没有计划就是计划失败
- en: Starting on a new project is often a very exciting time as a data scientist.
    You are faced with a new dataset with different requirements compared to previous
    projects and may have the possibility to try out novel modelling techniques you
    have never used before. It is sorely tempting to jump straight into the data,
    starting with EDA and possibly some preliminary modelling. You are feeling energised
    and optimistic about the prospects of building a model that can deliver results
    to the business.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 开始一个新的项目对于数据科学家来说通常是一个非常激动人心的时刻。你面对的是一个与以前项目不同的新数据集，也许有机会尝试之前从未使用过的创新建模技术。直接跳入数据，从EDA（数据探索分析）开始，并可能进行一些初步建模，这种做法非常有诱惑力。你感到充满活力，对构建一个能为业务带来结果的模型充满乐观。
- en: While enthusiasm is commendable, the situation can quickly change. Imagine now
    that months have passed and you are still running experiments after having previously
    run 100’s, trying to tweak hyperparameters to gain an extra 1-2% in model performance.
    Your final model configuration has turned into a complex interconnected ensemble,
    using 4-5 base models that all need to be trained and monitored. Finally, after
    all of this you find that your model barely improves upon the current process
    in place.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然热情值得赞扬，但情况可能会迅速改变。想象一下，几个月过去了，你仍然在进行实验，之前已经进行了100多次实验，试图调整超参数以在模型性能上获得额外的1-2%。你的最终模型配置已经变成了一个复杂的相互关联的集成模型，使用了4-5个基础模型，所有这些模型都需要训练和监控。最终，你发现你的模型几乎无法在当前流程上有所改进。
- en: All of this could have been avoided if a more structured approach to the experimentation
    process was taken. You are a data scientist, with emphasis on the scientist part,
    so knowing how to conduct an experiment is critical. In this article, I want to
    give some guidance about how to efficiently structure your project experimentation
    to ensure you stay focussed on what is important when providing a solution to
    the business.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 如果在实验过程中采取更结构化的方法，所有这些都可以避免。你是一个数据科学家，重点在于“科学家”这一部分，因此知道如何进行实验是至关重要的。在这篇文章中，我想提供一些关于如何高效地组织项目实验的指导，以确保你在为业务提供解决方案时始终关注重要的事情。
- en: Gather more business information and then start simple
  id: totrans-8
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 收集更多业务信息，然后从简单开始
- en: 'Before any modelling begins, you need to set out very clearly what you are
    trying to achieve. This is where a disconnect can happen between the technical
    and business side of projects. The most important thing to remember as a data
    scientist is:'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 在任何建模开始之前，你需要非常清楚地设定你试图实现的目标。这就是项目的技术和业务方面可能发生脱节的地方。作为数据科学家，最重要的记住的事情是：
- en: Your job is not to build a model, your job is to solve a business problem that
    may involve a model!
  id: totrans-10
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 你的工作不是构建模型，而是解决一个可能涉及模型的企业问题！
- en: Using this point of view is invaluable in succeeding as a data scientist. I
    have been on projects before where we built a solution that had no problem to
    solve. Framing everything you do around supporting your business will greatly
    improve the chances of your solution being adopted.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 使用这种观点对于成为一名成功的数据科学家至关重要。我之前参与过一些项目，我们构建的解决方案没有任何问题需要解决。围绕支持你的业务来界定你做的每一件事将大大提高你的解决方案被采纳的机会。
- en: 'With this is mind, your first steps should always be to gather the following
    pieces of information if they have not already been supplied:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到这一点，你的第一步应该是收集以下信息，如果他们还没有提供的话：
- en: What is the current business situation?
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当前业务状况如何？
- en: What are the key metrics that define their problem and how are they wanting
    to improve them?
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定义他们问题的关键指标是什么？他们希望如何改进它们？
- en: What is an acceptable metric improvement to consider any proposed solution a
    success?
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 什么是可以接受的指标改进，以考虑任何提出的解决方案是成功的？
- en: 'An example of this would be:'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 例如：
- en: You work for an online retailer who need to make sure they are always stocked.
    They are currently experiencing issues with either having too much stock lying
    around which takes up inventory space, or not having enough stock to meet customer
    demands which leads to delays. They require you to improve this process, ensuring
    they have enough product to meet demand while not overstocking.
  id: totrans-17
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 你为一家在线零售商工作，他们需要确保他们总是有库存。他们目前正在经历以下问题：要么库存过多，占用库存空间，要么库存不足，无法满足客户需求，导致延误。他们需要你改进这个过程，确保他们有足够的产品来满足需求，同时不造成过剩库存。
- en: 'Admittedly this is a contrived problem but it hopefully illustrates that your
    role is here to unblock a business problem they are having, and not necessarily
    building a model to do so. From here you can dig deeper and ask:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然这是一个人为的问题，但它希望说明你的角色是解决他们遇到的业务问题，而不仅仅是构建一个模型来这样做。从这里开始，你可以深入了解并询问：
- en: How often are they overstocked or understocked?
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 他们多久会一次过剩库存或库存不足？
- en: Is it better to be overstocked or understocked?
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 是过剩库存更好还是库存不足更好？
- en: 'Now we have the problem properly framed, we can start thinking of a solution.
    Again, before going straight into a model think about if there are simpler methods
    that could be used. While training a model to forecast future demand may give
    great results, it also comes with baggage:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经正确地界定了问题，我们可以开始考虑解决方案。再次提醒，在直接进入模型之前，考虑一下是否有更简单的方法可以使用。虽然训练一个模型来预测未来需求可能会得到很好的结果，但它也伴随着一些问题：
- en: Where is the model going to be deployed?
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模型将要部署在哪里？
- en: What will happen if performance drops and the model needs re-trained?
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果性能下降，模型需要重新训练，会发生什么？
- en: How can you explain its decision to stakeholders if something goes wrong?
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果出现问题，你如何向利益相关者解释其决策？
- en: Starting with something simpler and non-ML based gives us a baseline to work
    from. There is also the possibly that this baseline could solve the problem at
    hand, entirely removing the need for a complex ML solution. Continuing the above
    example, perhaps a simple or weighted rolling average of previous customer demand
    may be sufficient. Or perhaps the items are seasonal and you need to up demand
    depending on the time of year.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 从一个更简单且非机器学习（ML）基础的方法开始，给我们提供了一个工作基准。还有可能这个基准可以解决手头的问题，完全消除对复杂机器学习解决方案的需求。继续上面的例子，可能一个简单的或加权滚动平均的先前客户需求就足够了。或者，也许这些商品是季节性的，你需要根据一年中的时间来增加需求。
- en: '![](../Images/ce6b45eddc99583119c6d5d58ca96aa2.png)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ce6b45eddc99583119c6d5d58ca96aa2.png)'
- en: Simpler methods may be able to answer the business question. Image by author
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 简单的方法可能能够回答业务问题。图片由作者提供
- en: If a non model baseline is not feasible or cannot answer the business problem
    then moving onto a model based solution is the next step. Taking a principled
    approach to iterating through ideas and trying out different experiment configurations
    will be critical to ensure you arrive at a solution in a timely manner.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 如果非模型基线不可行或无法回答业务问题，那么转向基于模型的解决方案是下一步。采取原则性的方法迭代想法并尝试不同的实验配置将是确保你及时找到解决方案的关键。
- en: Have a clear plan about experimentation
  id: totrans-29
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 制定清晰的实验计划
- en: Once you have decided that a model is required, it is now time to think about
    how you approach experimenting. While you could go straight into an exhaustive
    search of every possibly model, hyperparameter, feature selection process, data
    treatments etc, being more focussed in your setups and having a deliberate strategy
    will make it easier to determine what is working and what isn’t. With this in
    mind, here are some ideas that you should consider.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你决定需要一个模型，现在就是考虑如何进行实验的时候了。虽然你可以直接进行对每个可能模型、超参数、特征选择过程、数据处理等进行彻底搜索，但更专注于你的设置并有一个明确的策略将使你更容易确定哪些有效，哪些无效。考虑到这一点，以下是一些你应该考虑的想法。
- en: Be aware of any constraints
  id: totrans-31
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 注意任何限制
- en: 'Experimentation does not happen in a vacuum, it is one part of the the project
    development process which itself is just one project going on within an organisation.
    As such you will be forced to run your experimentation subject to limitations
    placed by the business. These constraints will require you to be economical with
    your time and may steer you towards particular solutions. Some example constraints
    that are likely to be placed on experiments are:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 实验不是在真空中发生的，它是项目开发过程的一部分，而项目开发过程本身只是组织内部进行的一个项目。因此，你将不得不在商业设定的限制下进行实验。这些限制将要求你节约时间，并可能引导你走向特定的解决方案。一些可能施加在实验上的限制示例包括：
- en: 'Timeboxing: Letting experiments go on forever is a risky endeavour as you run
    the risk of your solution never making it to productionisation. As such it common
    to give a set time to develop a viable working solution after which you move onto
    something else if it is not feasible'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 时间盒：让实验无限期地进行是一种风险很大的尝试，因为你面临的风险是解决方案永远无法投入生产。因此，在开发一个可行的有效解决方案后，如果不可行，通常会给予一定的时间，然后转向其他事情。
- en: 'Monetary: Running experiments take up compute time and that isn’t free. This
    is especially true if you are leveraging 3^(rd) party compute where VM’s are typically
    priced by the hour. If you are not careful you could easily rack up a huge compute
    bill, especially if you require GPU’s for example. So care must be taken to understand
    the cost of your experimentation'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 货币成本：运行实验需要计算时间，而这并不是免费的。如果你正在利用第三方计算资源，例如虚拟机通常按小时计费，这一点尤其正确。如果你不小心，你可能会轻易地产生巨大的计算账单，特别是如果你需要GPU等。因此，必须小心理解你实验的成本。
- en: 'Resource Availability: Your experiment will not be the only one going on in
    your organisation and there may be fixed computational resources. This means you
    may be limited in how many experiments you can run at any one time. You will therefore
    need to be smart in choosing which lines of work to explore.'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 资源可用性：你的实验不会是组织中唯一进行的实验，并且可能存在固定的计算资源。这意味着你可能受到限制，无法在任何时候运行大量实验。因此，你需要明智地选择要探索的工作线。
- en: 'Explainability: While understanding the decisions made by your model is always
    important, it becomes critical if you work in a regulated industry such as finance,
    where any bias or prejudice in your model could have serious repercussions. To
    ensure compliance you may need to restrict yourself to simpler but easier to interpret
    models such as regressions, Decision Trees or Support Vector Machines.'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可解释性：虽然理解你的模型所做的决策始终很重要，但如果你在金融等受监管的行业工作，那么这变得至关重要，因为你的模型中的任何偏见或偏见都可能导致严重后果。为了确保合规性，你可能需要限制自己使用更简单但更容易解释的模型，例如回归、决策树或支持向量机。
- en: You may be subject to one or all of these constraints, so be prepared to navigate
    them.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能面临这些限制中的一个或所有，因此要做好准备去应对它们。
- en: Start with simple baselines
  id: totrans-38
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 从简单的基线开始
- en: 'When dealing with binary classification for example, it would make sense to
    go straight to a complex model such as LightGBM as there is a wealth of literature
    on their efficacy for solving these types of problems. Before that however, having
    a simple Logistic Regression model trained to serve as a baseline comes with the
    following benefits:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，在处理二元分类时，直接转向复杂的模型如LightGBM是有意义的，因为关于它们解决这类问题的文献非常丰富。然而，在那之前，有一个简单的Logistic
    Regression模型被训练出来作为基线，它带来了以下好处：
- en: Little to no hyperparameters to assess so quick iteration of experiments
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 几乎没有超参数需要评估，因此实验迭代非常快。
- en: Very straightforward to explain decision process
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 决策过程非常简单易懂
- en: More complicated models have to be better than this
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更复杂的模型必须比这更好
- en: It may be enough to solve the problem at hand
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 解决当前问题可能已经足够
- en: '![](../Images/55474c2177de7c3d11300b847589fb7f.png)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/55474c2177de7c3d11300b847589fb7f.png)'
- en: Assessing clearly what additional complexity brings you in terms of performance
    is important. Image by author
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 明确评估额外复杂性在性能方面带来的影响很重要。图片由作者提供
- en: Beyond Logistic Regression, having an ‘untuned’ experiment for a particular
    model (little to no data treatments, no explicit feature selection, default hyperparameters)
    could also be important as it will give an indication of how much you can push
    a particular avenue of experimentation. For example, if different experimental
    configurations are barely outperforming the untuned experiment, then that could
    be evidence that you should refocus your efforts elsewhere.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 除了逻辑回归之外，对于特定模型进行“未调优”的实验（少量或没有数据处理，没有显式的特征选择，默认超参数）也可能很重要，因为它将表明您可以在特定实验途径上推进多少。例如，如果不同的实验配置仅略优于未调优的实验，那么这可能表明您应该将精力重新集中在其他方面。
- en: Using raw vs semi-processed data
  id: totrans-47
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用原始数据与半处理数据
- en: 'From a practicality standpoint the data you receive from data engineering may
    not be in the perfect format to be consumed by your experiment. Issues can include:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 从实用性角度来看，您从数据工程中获得的数据可能不是完美的格式，无法直接用于实验。可能出现的问题包括：
- en: 1000’s of columns and 1,000,000’s of transaction making it a strain on memory
    resources
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 1000多列和100万笔交易，对内存资源造成压力
- en: Features which cannot be easily used within a model such as nested structures
    like dictionaries or datatypes like datetimes
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 无法轻松用于模型中的特征，例如嵌套结构如字典或数据类型如日期时间
- en: '![](../Images/804509ab8a51fa2f977ba36a8171dd8e.png)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/804509ab8a51fa2f977ba36a8171dd8e.png)'
- en: Non-tabular data poses a problem to traditional ML methods. Image by author
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 非表格数据对传统机器学习方法构成问题。图片由作者提供
- en: 'There are a few different tactics to handle these scenarios:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 处理这些场景有几种不同的策略：
- en: Scale up the memory allocation of your experiment to handle the data size requirements.
    This may not always be possible
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 扩大实验的内存分配以处理数据大小需求。这可能并不总是可行的
- en: Include feature engineering as part of the experiment process
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将特征工程作为实验过程的一部分
- en: Process your data slightly prior to experimentation
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在实验之前稍微处理一下您的数据
- en: There are pro and cons to each approach and it is up to you to decide. Doing
    some pre-processing such as removing features with complex data structures or
    with incompatible datatypes may be beneficial now, but it may require backtracking
    if they come into scope later on in the experimentation process. Feature engineering
    within the experiment may give you better control over what is being created,
    but it will introduce extra processing overheard for something that may be common
    across all experiments. There is no correct choice in this scenario and it is
    very much situation dependent.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 每种方法都有其优缺点，您需要自己决定。进行一些预处理，例如删除具有复杂数据结构或不兼容数据类型的特征，现在可能有益，但如果它们在实验过程的后期进入范围，可能需要回溯。实验中的特征工程可以更好地控制创建的内容，但会为所有实验中可能共有的内容引入额外的处理开销。在这种情况下没有正确的选择，并且非常依赖于具体情况。
- en: Evaluate model performance fairly
  id: totrans-58
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 公平地评估模型性能
- en: 'Calculating final model performance is the end goal of your experimentation.
    This is the result you are going to present to the business with the hope of getting
    approval to move onto the production phase of your project. So it is crucial that
    you give a fair and unbiased evaluation of your model that aligns with stakeholder
    requirements. Key aspects are:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 计算最终模型性能是您实验的最终目标。这是您打算向业务展示的结果，希望获得将项目推进到生产阶段批准。因此，您对模型进行公平且无偏见的评估，使其符合利益相关者的要求至关重要。关键方面包括：
- en: Make sure you evaluation dataset took no part in your experimentation process
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确保您的评估数据集没有参与您的实验过程
- en: Your evaluation dataset should reflect a real life production setting
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您的评估数据集应该反映现实生活中的生产环境
- en: Your evaluation metrics should be business and not model focussed
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您的评价指标应该是以业务为导向，而不是以模型为导向
- en: '![](../Images/0428b916053d723ae7e123653eaf631c.png)'
  id: totrans-63
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0428b916053d723ae7e123653eaf631c.png)'
- en: Unbiased evaluation gives absolute confidence in results. Image by author
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 无偏见的评估使结果具有绝对的信心。图片由作者提供
- en: Having a standalone dataset for final evaluation ensures there is no bias in
    your results. For example, evaluating on the validation dataset you used to select
    features or hyperparameters is not a fair comparison as you run the risk of overfitting
    your solution to that data. You therefore need a clean dataset that hasn’t been
    used before. This may feel simplistic to call out but it so important that it
    bears repeating.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 为最终评估拥有一个独立的独立数据集确保你的结果没有偏差。例如，在用于选择特征或超参数的验证数据集上进行评估并不是一个公平的比较，因为你冒着将解决方案过度拟合到该数据的风险。因此，你需要一个以前未使用过的干净数据集。这可能听起来很简单，但它非常重要，值得重复。
- en: Your evaluation dataset being a true reflection of production gives confidence
    in your results. As an example, models I have trained in the past were done so
    on months or even years worth of data to ensure behaviours such as seasonality
    were captured. Due to these time scales, the data volume was too large to use
    in its raw state so downsampling had to occur prior to experimenting. However
    the evaluation dataset should not be downsampled or modified in such a way to
    distort it from real life. This is acceptable as for inference you can use techniques
    like streaming or mini-batching to ingest the data.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 你的评估数据集如果真正反映了生产情况，那么你的结果就会更有信心。例如，我过去训练的模型是在数月甚至数年的数据上完成的，以确保捕捉到季节性等行为。由于这些时间尺度，数据量太大，无法以原始状态使用，因此在进行实验之前必须进行下采样。然而，评估数据集不应进行下采样或以任何方式修改，以使其偏离现实。这是可以接受的，因为在推理时，你可以使用流式处理或小批量等技术来处理数据。
- en: Your evaluation data should also be at least the minimum length that will be
    used in production, and ideally multiples of that length. For example, if your
    model will score data every week then having your evaluation data be a days worth
    of data is not sufficient. It should at least be a weeks worth of data, ideally
    3 or 4 weeks worth so you can assess variability in results.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 你的评估数据也应该至少与生产中使用的最小长度相同，理想情况下是那个长度的倍数。例如，如果你的模型每周会对数据进行评分，那么只有一天的数据是不够的。它至少应该是一周的数据，理想情况下是3或4周的数据，这样你才能评估结果的变化性。
- en: Validating the business value of your solution links back to what was said earlier
    about your role as a data scientist. You are here to solve a problem and not merely
    build a model. As such it is very important to balance the statistical vs business
    significance when deciding how to showcase your proposed solution. The first aspect
    of this statement is to present results in terms of a metric the business can
    act on. Stakeholders may not know what a model with an F1 score of 0.95 is, but
    they know what a model that can save them £10 million annually brings to the company.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 验证你解决方案的商业价值与你之前所说的作为数据科学家的角色有关。你是来解决问题，而不仅仅是构建模型。因此，在决定如何展示你提出的解决方案时，平衡统计意义和商业意义非常重要。这个声明的第一方面是，用业务可以采取行动的指标来呈现结果。利益相关者可能不知道F1得分为0.95的模型是什么，但他们知道每年能帮他们节省1000万英镑的模型对公司意味着什么。
- en: 'The second aspect of this statement is to take a cautious view on any proposed
    solution and think of all the failure points that can occur, especially if we
    start introducing complexity. Consider 2 proposed models:'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 这个声明的第二方面是对任何提出的解决方案持谨慎态度，并考虑所有可能发生的故障点，特别是如果我们开始引入复杂性。考虑以下两个提出的模型：
- en: A Logistic Regression model that operates on raw data with a projected saving
    of £10 million annually
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个在原始数据上运行的逻辑回归模型，预计每年可节省1000万英镑
- en: A 100M parameter Neural Network that required extensive feature engineering,
    selection and model tuning with a projected saving of £10.5 million annually
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个拥有1000万个参数的神经网络，它需要大量的特征工程、选择和模型调整，预计每年可节省1050万英镑
- en: The Neural Network is best in terms of absolute return, but it has significantly
    more complexity and potential points of failure. Additional engineering pipelines,
    complex retraining protocols and loss of explainability are all important aspects
    to consider and we need to think about whether this overheard is worth an extra
    5% uplift in performance. This scenario is fantastical in nature but hopes to
    illustrate the need to have a critical eye when evaluating results.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 神经网络在绝对回报方面表现最佳，但它具有显著更多的复杂性和潜在故障点。额外的工程流程、复杂的重新训练协议和可解释性的丧失都是需要考虑的重要方面，我们需要思考这种开销是否值得额外的5%性能提升。这种场景在本质上很夸张，但希望说明在评估结果时需要保持批判性的眼光。
- en: Know when to stop
  id: totrans-73
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 知道何时停止
- en: 'When running the experimentation phase you are balancing 2 objectives: the
    want to try out as many different experimental setups as possible vs any constrains
    you are facing, most likely the time allocated by the business for you to experiment.
    There is a third aspect you need to consider, and that is knowing if you need
    to end the experiment phase early. This can be for a variety reasons:'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 在运行实验阶段时，您正在平衡两个目标：尽可能尝试尽可能多的不同实验设置，以及您面临的任何约束，最可能的是业务分配给您进行实验的时间。您还需要考虑第三个方面，那就是知道是否需要提前结束实验阶段。这可能有多种原因：
- en: Your proposed solution already answers the business problem
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您提出的解决方案已经解决了商业问题
- en: Further experiments are experiencing diminishing returns
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 进一步的实验正在经历收益递减
- en: Your experiments aren’t producing the results you wanted
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您的实验没有产生您想要的结果
- en: Your first instinct will be to use up all your available time, either to try
    and fix your model or to really push your solution to be the best it can be. However
    you need to ask yourself if your time could be better spent elsewhere, either
    by moving onto productionisation, re-interpreting the current business problem
    if your solution isn’t working or moving onto another problem entirely. Your time
    is precious and you should treat it accordingly to make sure whatever you are
    working on is going to have the biggest impact to the business.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 您的第一反应可能是用尽所有可用的时间，要么尝试修复模型，要么真正推动您的解决方案达到最佳状态。然而，您需要问自己，您的时间是否可以更好地用于其他地方，比如转向生产化，如果您的解决方案不起作用，重新解释当前的商业问题，或者转向另一个完全不同的问题。您的时间非常宝贵，您应该相应地对待它，以确保您正在从事的工作将对业务产生最大的影响。
- en: Conclusion
  id: totrans-79
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this article we have considered how to plan the model experiment phase of
    your project. We have focussed less on technical details and more on the ethos
    you need to bring to experimentation. This started with taking time to understand
    the business problem more to clearly define what needs to be achieved to consider
    any proposed solution a success. We spoke about the importance of simple baselines
    as a reference point that more complicated solutions can be compared against.
    We then moved onto any constraints you may face and how that can impact your experimentation.
    We then finished off by emphasising the importance of a fair dataset to calculate
    business metrics to ensure there is no bias in your final result. By adhering
    to the recommendations laid out here, we greatly increase our chances of reducing
    the time to value of our data science projects by quickly and confidently iterating
    through the experimentation process.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我们讨论了如何规划您项目中的模型实验阶段。我们更注重实验所需的伦理精神，而不是技术细节。这始于花时间更深入地理解商业问题，以便更清晰地定义需要实现的目标，才能将任何提出的解决方案视为成功。我们讨论了简单基线作为参考点的重要性，以便将更复杂的解决方案与之比较。然后，我们转向您可能面临的任何约束以及这些约束如何影响您的实验。最后，我们强调了拥有一个公平的数据集来计算业务指标的重要性，以确保最终结果没有偏见。通过遵循这里提出的建议，我们大大增加了通过快速、自信地迭代实验过程来减少数据科学项目价值实现时间的机会。
