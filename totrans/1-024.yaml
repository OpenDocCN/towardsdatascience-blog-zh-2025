- en: The Best Data Scientists are Always Learning
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/part-1-the-best-data-scientists-are-always-learning/](https://towardsdatascience.com/part-1-the-best-data-scientists-are-always-learning/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1764655196412" class="mdspan-comment">Do you think</mdspan>
    it’s possible to fully master every topic in data science?
  prefs: []
  type: TYPE_NORMAL
- en: With data science covering such a broad range of areas — statistics, programming,
    optimization, experimental design, data storytelling, generative AI, to name a
    few — I personally don’t think so.
  prefs: []
  type: TYPE_NORMAL
- en: Here’s a narrower question. Is it possible to *fully* master a single topic
    within data science? Sure, you can become an expert in some areas, but can you
    ever reach a point where there’s nothing left to learn? Again, I really don’t
    think so.
  prefs: []
  type: TYPE_NORMAL
- en: Every data scientist has something to learn, even those with extensive experience.
    The aim of my writing is to provide some insights from my learning journey that
    I hope will help you in yours.
  prefs: []
  type: TYPE_NORMAL
- en: 'This is the first part in a two-part series. In this article I’ll cover:'
  prefs: []
  type: TYPE_NORMAL
- en: Why you should continuously learn as a data scientist
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: How to come up with topics to study
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Let’s jump in!
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Why continuously learn as a data scientist?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Continuous learners differentiate themselves
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: When I was younger, I studied Spanish in a group setting. Something interesting
    happened after the group became conversational. Many students stopped studying,
    they were content with their level of proficiency. Others continued to do daily
    study and practice.
  prefs: []
  type: TYPE_NORMAL
- en: At first, there wasn’t much difference between the two groups. But over time,
    those who continued learning pulled ahead. Their fluency, vocabulary, and confidence
    compounded, while the others plateaued.
  prefs: []
  type: TYPE_NORMAL
- en: Unfortunately, the same thing can happen to data scientists. Some stop learning
    after they have developed sufficient skills to do their jobs well. Similar to
    the Spanish cohort, early in a career, continuous learners and *content* data
    scientists will look similar. But as time passes, those who keep learning start
    to stand out. Their knowledge compounds, their judgment improves, and their ability
    to solve complex problems deepens.
  prefs: []
  type: TYPE_NORMAL
- en: Continuous learners and *content* data scientists will look similar early in
    their careers. But as time passes, those who keep learning will start to stand
    out.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Continuous learners shine because they can use their knowledge to come up with
    smarter solutions to problems. They will have a more mature understanding of data
    science tools and how to use them correctly in their work.
  prefs: []
  type: TYPE_NORMAL
- en: Learning brings fulfillment (for most)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This is a little bit fluffy, so I’ll keep it short. But I really do enjoy learning.
    I get a lot of fulfillment and satisfaction from taking some time to invest in
    myself and master new topics. If you like the idea of continuous learning, you
    will probably get a lot of fulfillment from it as well!
  prefs: []
  type: TYPE_NORMAL
- en: 2\. How to come up with things to study
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We’ve established the value of career-long learning in the previous section,
    let’s talk about how to come up with things to study.
  prefs: []
  type: TYPE_NORMAL
- en: The best thing about studying on your own is that ***no one is telling you what
    to study.*** The worst thing about studying on your own is that ***no one is telling
    you what to study**.*
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: You’re not in school anymore, which is great. No more deadlines, no more exams
    and, perhaps most importantly, no more tuition. But you also lose the curated
    list of topics to study with corresponding materials, texts and lectures. Creating
    that is your job now! The flexibility of developing your own study plan is amazing.
    But the ambiguous, undirected space can be daunting.
  prefs: []
  type: TYPE_NORMAL
- en: Over the years, I’ve developed three approaches to come up with study subjects
    that work really well for me. My goal is that they can be a good starter for you
    to develop your own approach. Ultimately, you’ll have to find what works best
    for you.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s get into the three approaches.
  prefs: []
  type: TYPE_NORMAL
- en: Topics from projects at work
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: If you are working as a data scientist, your projects will give you a rich supply
    of ‘deep dive’ study topics. This approach is pretty straight forward – study
    techniques/subjects that are pertinent to your work. Give special focus to areas
    where your understanding is the weakest.
  prefs: []
  type: TYPE_NORMAL
- en: For example, if you are designing an experiment, study experimental design.
    If you are solving an optimization problem, study optimization.
  prefs: []
  type: TYPE_NORMAL
- en: One great benefit of this approach is that it makes you better at your job immediately.
    You will have a deeper understanding of the problems you’re facing, and you’ll
    be able apply that understanding right away.
  prefs: []
  type: TYPE_NORMAL
- en: Following a “web” of topics
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Data science is such a rich field of study, you can always go deeper on any
    given subject and so many topics are interrelated.
  prefs: []
  type: TYPE_NORMAL
- en: When studying, you’ll find many ‘tangent’ topics that are related to the topic
    at hand. I often take note of those topics and come back to them later. I call
    this the ‘web of topics.’ This is a great technique because you slowly build up
    a web of understanding around groups or related topics. This gives a deep knowledge
    that will differentiate you.
  prefs: []
  type: TYPE_NORMAL
- en: Here is an example of a small web of topics around logistic regression. I only
    included a few topics for the illustration – I’m sure you could come up with many
    more. Each one of the topics in the web have their own web, making a mega-web
    of related study topics.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/439c3d91f6a55e8c2e31dd536e206efd.png)'
  prefs: []
  type: TYPE_IMG
- en: Image generated by Dall-e based on specific prompt from user
  prefs: []
  type: TYPE_NORMAL
- en: I could keep going, but you get the point. Any individual topic will have a
    huge web of related topics. Keep a list of these somewhere and when you are done
    with the current subject you will always have a backlog of pertinent topics to
    dive into!
  prefs: []
  type: TYPE_NORMAL
- en: 'Note: Your web of topics needs to start somewhere. If you are having a hard
    time kicking it off, I recommend reading ‘The Elements of Statistical Learning’
    or ‘Introduction to Statistical Learning’ by Hastie, Tibshirani and Friedman.
    These are foundational reads that will get you into a great web of study topics.'
  prefs: []
  type: TYPE_NORMAL
- en: Discovery channels
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Work projects and topic webs are two excellent approaches to curating a list
    of study subjects. However, these two approaches have a major blind spot. If you
    only use these techniques, you won’t be exposed to topics that don’t show up at
    work or in your natural sequence of study. There are likely really important topics
    that will be left untouched.
  prefs: []
  type: TYPE_NORMAL
- en: I use ‘discovery channels’ to help catch important topics that don’t come up
    organically. A discovery channel is any source of content that expose me to topics
    that are independent from my other studies. My main source of discovery channels
    are Towards Data Science, podcasts and YouTube channels.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/2d9756c05daad18145a1c076a350fbbc.png)'
  prefs: []
  type: TYPE_IMG
- en: My current favorite ‘discovery channel’ sources – image by author
  prefs: []
  type: TYPE_NORMAL
- en: When choosing a discovery channel, it is important to choose a source that covers
    a broad range of topics. If I, for example, followed a podcast that focused on
    experimental design – I probably wouldn’t source a wide array of topics to study
    from it. It might be a great resource for DOE study, but it wouldn’t be a good
    discovery channel.
  prefs: []
  type: TYPE_NORMAL
- en: I spend a relatively small percentage of my overall study effort on discovery
    channels, but they play the very important role in my studies.
  prefs: []
  type: TYPE_NORMAL
- en: Wrapping it up
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I hope that this article leaves you feeling motivated to start independently
    studying if you aren’t already or has given you additional motivation to keep
    going if you already are studying. I also hope that I’ve given you a few fresh
    ideas on how to come up with things to study.
  prefs: []
  type: TYPE_NORMAL
- en: In a few weeks I’ll be posting part 2 of this article that will cover how to
    (1) avoid burnout, (2) choose learning strategies and (3) leverage solitude to
    cement and deepen your knowledge – stay tuned!
  prefs: []
  type: TYPE_NORMAL
