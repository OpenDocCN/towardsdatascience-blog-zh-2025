- en: A Simple Implementation of the Attention Mechanism from Scratch
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/a-simple-implementation-of-the-attention-mechanism-from-scratch/](https://towardsdatascience.com/a-simple-implementation-of-the-attention-mechanism-from-scratch/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1743469379175" class="mdspan-comment">Introduction</mdspan>
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The attention mechanism is often associated with the transformer architecture,
    but it was already used in RNNs. In Machine Translation or MT (e.g., English-Italian)
    tasks, when you want to predict the next Italian word, you need your model to
    focus, or pay attention, on the most important English words that are useful to
    make a good translation.
  prefs: []
  type: TYPE_NORMAL
- en: '![Attention in RNNs](../Images/ad862aa4333c33d99da693fdc65dd443.png)'
  prefs: []
  type: TYPE_IMG
- en: I will not go into details of RNNs, but attention helped these models to mitigate
    the vanishing gradient problem and to capture more long-range dependencies among
    words.
  prefs: []
  type: TYPE_NORMAL
- en: At a certain point, we understood that the only important thing was the attention
    mechanism, and the entire RNN architecture was overkill. Hence, [Attention is
    All You Need!](https://arxiv.org/abs/1706.03762)
  prefs: []
  type: TYPE_NORMAL
- en: Self-Attention in Transformers
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Classical attention indicates where words in the output sequence should focus
    attention in relation to the words in input sequence. This is important in sequence-to-sequence
    tasks like MT.
  prefs: []
  type: TYPE_NORMAL
- en: The **self-attention** is a specific type of attention. It operates between
    any two elements in the same sequence. It provides information on how “correlated”
    the words are in the same sentence.
  prefs: []
  type: TYPE_NORMAL
- en: For a given token (or word) in a sequence, self-attention generates a list of
    attention weights corresponding to all other tokens in the sequence. This process
    is applied to each token in the sentence, obtaining a matrix of attention weights
    (as in the picture).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e3b4afcd130e2aacf9d70f9df56a8fbb.png)'
  prefs: []
  type: TYPE_IMG
- en: This is the general idea, in practice things are a bit more complicated because
    we want to add many learnable parameters to our neural network, let’s see how.
  prefs: []
  type: TYPE_NORMAL
- en: K, V, Q representations
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Our model input is a sentence like “*my name is Marcello Politi”*. With the
    process of **tokenization**, a sentence is converted into a list of numbers like
    [2, 6, 8, 3, 1].
  prefs: []
  type: TYPE_NORMAL
- en: Before feeding the sentence into the transformer we need to create a dense representation
    for each token.
  prefs: []
  type: TYPE_NORMAL
- en: How to create this representation? We multiply each token by a matrix. The matrix
    is learned during training.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s add some complexity now.
  prefs: []
  type: TYPE_NORMAL
- en: 'For each token, we create 3 vectors instead of one, we call these vectors:
    *key, value* and *query*. (We see later how we create these 3 vectors).'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/009c29ad015bc39d9e7838ec8d733d73.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Conceptually these 3 tokens have a particular meaning:'
  prefs: []
  type: TYPE_NORMAL
- en: The vector key represents the core information captured by the token
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The vector value captures the full information of a token
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The vector query, it’s a question about the token relevance for the current
    task.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: So the idea is that we focus on a particular token i , and we want to ask what
    is the importance of the other tokens in the sentence regarding the token i we
    are taking into consideration.
  prefs: []
  type: TYPE_NORMAL
- en: This means that we take the vector q_i (we ask a question regarding i) for token
    i, and we do some mathematical operations with all the other tokens k_j (j!=i).
    This is like wondering at first glance what are the other tokens in the sequence
    that look really important to understand the meaning of token i.
  prefs: []
  type: TYPE_NORMAL
- en: What is this magical mathematical operation?
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/cdabb4e4ae81e79081a3871813ba7300.png)'
  prefs: []
  type: TYPE_IMG
- en: We need to multiply (dot-product) the query vector by the key vectors and divide
    by a scaling factor. We do this for each k_j token.
  prefs: []
  type: TYPE_NORMAL
- en: In this way, we obtain a score for each pair (q_i, k_j). We make this list become
    a probability distribution by applying a softmax operation on it. Great now we
    have obtained the **attention weights**!
  prefs: []
  type: TYPE_NORMAL
- en: With the attention weights, we know what is the importance of each token k_j
    to for undestandin the token i. So now we multiply the value vector v_j associated
    with each token per its weight and we sum the vectors. In this way we obtain the
    final **context-aware vector** of **token_i**.
  prefs: []
  type: TYPE_NORMAL
- en: 'If we are computing the contextual dense vector of token_1 we calculate:'
  prefs: []
  type: TYPE_NORMAL
- en: z1 = a11*v1 + a12*v2 + … + a15*v5
  prefs: []
  type: TYPE_NORMAL
- en: Where a1j are the computer attention weights, and v_j are the value vectors.
  prefs: []
  type: TYPE_NORMAL
- en: Done! Almost…
  prefs: []
  type: TYPE_NORMAL
- en: 'I didn’t cover how we obtained the vectors k, v and q of each token. We need
    to define some matrices w_k, w_v and w_q so that when we multiply:'
  prefs: []
  type: TYPE_NORMAL
- en: token * w_k -> k
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: token * w_q -> q
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: token * w_v -> v
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These 3 matrices are set at random and are learned during training, this is
    why we have many parameters in modern models such as LLMs.
  prefs: []
  type: TYPE_NORMAL
- en: Multi-head Self-Attention in Transformers (MHSA)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Are we sure that the previous self-attention mechanism is able to capture all
    important relationships among tokens (words) and create dense vectors of those
    tokens that really make sense?
  prefs: []
  type: TYPE_NORMAL
- en: It could actually not work always perfectly. What if to mitigate the error we
    re-run the entire thing 2 times with new w_q, w_k and w_v matrices and somehow
    merge the 2 dense vectors obtained? In this way maybe one self-attention managed
    to capture some relationship and the other managed to capture some other relationship.
  prefs: []
  type: TYPE_NORMAL
- en: 'Well, this is what exactly happens in MHSA. The case we just discussed contains
    two heads because it has two sets of w_q, w_k and w_v matrices. We can have even
    more heads: 4, 8, 16 etc.'
  prefs: []
  type: TYPE_NORMAL
- en: The only complicated thing is that all these heads are managed in parallel,
    we process the all in the same computation using tensors.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/424a44697ca28a6b5da534d02949f650.png)'
  prefs: []
  type: TYPE_IMG
- en: The way we merge the dense vectors of each head is simple, we concatenate them
    (hence the dimension of each vector shall be smaller so that when concat them
    we obtain the original dimension we wanted), and we pass the obtained vector through
    another w_o learnable matrix.
  prefs: []
  type: TYPE_NORMAL
- en: Hands-on
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'Suppose you have a sentence. After tokenization, each token (word for simplicity)
    corresponds to an index (number):'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Before feeding the sentence into the transofrmer we need to create a dense representation
    for each token.
  prefs: []
  type: TYPE_NORMAL
- en: How to create these representation? We multiply each token per a matrix. This
    matrix is learned during training.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s build this embedding matrix.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: If we multiply our tokenized sentence with the embeddings, we obtain a dense
    representation of dimension 16 for each token
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: In order to use the attention mechanism we need to create 3 new We define 3
    matrixes w_q, w_k and w_v. When we multiply one input token time the w_q we obtain
    the vector q. Same with w_k and w_v.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: '**Compute attention weights**'
  prefs: []
  type: TYPE_NORMAL
- en: Let’s now compute the attention weights for only the first input token of the
    sentence.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: We need to multiply the query vector associated to token1 (query_1) with all
    the keys of the other vectors.
  prefs: []
  type: TYPE_NORMAL
- en: So now we need to compute all the keys (key_2, key_2, key_4, key_5). But wait,
    we can compute all of these in one time by multiplying the sentence_embed times
    the w_k matrix.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: Let’s do the same thing with the values
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: Let’s compute the first part of the attions formula.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/cdabb4e4ae81e79081a3871813ba7300.png)'
  prefs: []
  type: TYPE_IMG
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: With the attention weights we know what is the importance of each token. So
    now we multiply the value vector associated to each token per its weight.
  prefs: []
  type: TYPE_NORMAL
- en: To obtain the final context aware vector of token_1.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: In the same way we could compute the context aware dense vectors of all the
    other tokens. Now we are always using the same matrices w_k, w_q, w_v. We say
    that we use one head.
  prefs: []
  type: TYPE_NORMAL
- en: But we can have multiple triplets of matrices, so multi-head. That’s why it
    is called multi-head attention.
  prefs: []
  type: TYPE_NORMAL
- en: The dense vectors of an input tokens, given in oputut from each head are at
    then end concatenated and linearly transformed to get the final dense vector.
  prefs: []
  type: TYPE_NORMAL
- en: Implementing MultiheadSelf-Attention
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: Same steps as before…
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: We’ll define a multi-head attention mechanism with h heads (let’s say 4 heads
    for this example). Each head will have its own w_q, w_k, and w_v matrices, and
    the output of each head will be concatenated and passed through a final linear
    layer.
  prefs: []
  type: TYPE_NORMAL
- en: Since the output of the head will be concatenated, and we want a final dimension
    of d, the dimension of each head needs to be d/h. Additionally each concatenated
    vector will go though a linear transformation, so we need another matrix w_ouptut
    as you can see in the formula.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: Since we have 4 heads, we want 4 copies for each matrix. Instead of copies,
    we add a dimension, which is the same thing, but we only do one operation. (Imagine
    stacking matrices on top of each other, its the same thing).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: I’m using for simplicity torch’s einsum. If you’re not familiar with it check
    out my [blog post](https://towardsdatascience.com/understanding-einsteins-notation-and-einsum-multiplication-a690bd4da0b2/).
  prefs: []
  type: TYPE_NORMAL
- en: 'The einsum operation `torch.einsum(''sd,hde->hse'', sentence_embed, w_query)`
    in PyTorch uses letters to define how to multiply and rearrange numbers. Here’s
    what each part means:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Input Tensors:**'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '`sentence_embed` with the notation `''sd''`:'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '`s` represents the number of words (sequence length), which is 5.'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '`d` represents the number of numbers per word (embedding size), which is 16.'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: The shape of this tensor is `[5, 16]`.
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '`w_query` with the notation `''hde''`:'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '`h` represents the number of heads, which is 4.'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '`d` represents the embedding size, which again is 16.'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '`e` represents the new number size per head (d_k), which is 4.'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: The shape of this tensor is `[4, 16, 4]`.
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Output Tensor:**'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'The output has the notation `''hse''`:'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '`h` represents 4 heads.'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '`s` represents 5 words.'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '`e` represents 4 numbers per head.'
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: The shape of the output tensor is `[4, 5, 4]`.
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: 'This einsum equation performs a dot product between the queries (hse) and the
    transposed keys (hek) to obtain scores of shape [h, seq_len, seq_len], where:'
  prefs: []
  type: TYPE_NORMAL
- en: h -> Number of heads.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: s and k -> Sequence length (number of tokens).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: e -> Dimension of each head (d_k).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The division by (d_k ** 0.5) scales the scores to stabilize gradients. Softmax
    is then applied to obtain attention weights:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: Now we concatenate all the heads of token 1
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: Let’s finally multiply per the last w_output matrix as in the formula above
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE19]'
  prefs: []
  type: TYPE_PRE
- en: Final Thoughts
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this blog post I’ve implemented a simple version of the attention mechanism.
    This is not how it is really implemented in modern frameworks, but my scope is
    to provide some insights to allow anyone an understanding of how this works. In
    future articles I’ll go through the entire implementation of a transformer architecture.
  prefs: []
  type: TYPE_NORMAL
- en: Follow me on [TDS](https://towardsdatascience.com/author/marcellopoliti/) if
    you like this article! 😁
  prefs: []
  type: TYPE_NORMAL
