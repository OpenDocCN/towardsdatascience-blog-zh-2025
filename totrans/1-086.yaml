- en: Wrapping up
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Creating DataFrames in pandas might seem complex, but it actually isn’t. In
    most cases, you’ll probably be reading CSV files anyway. So don’t sweat it. I
    hope you found this article helpful. Would love to hear your thoughts in the comments.
    Thanks for reading!
