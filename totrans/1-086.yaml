- en: The Absolute Beginner’s Guide to Pandas DataFrames
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 《Pandas DataFrame 绝对入门指南》
- en: 原文：[https://towardsdatascience.com/the-absolute-beginners-guide-to-pandas-dataframes/](https://towardsdatascience.com/the-absolute-beginners-guide-to-pandas-dataframes/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/the-absolute-beginners-guide-to-pandas-dataframes/](https://towardsdatascience.com/the-absolute-beginners-guide-to-pandas-dataframes/)
- en: <mdspan datatext="el1763170336957" class="mdspan-comment">Coming from a SQL</mdspan>
    background, learning Python for data analysis has been a bit challenging. The
    syntax is simpler — true. However, the language and terminology are completely
    different. In SQL, you’ll have to interact with databases, tables and columns.
    In Python, however, for data analysis, your bread and butter is going to be data
    structures.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1763170336957" class="mdspan-comment">来自 SQL 背景，学习 Python
    进行数据分析有些挑战。语法更简单——是真的。然而，语言和术语完全不同。在 SQL 中，你将不得不与数据库、表和列进行交互。然而，在 Python 中，数据分析的核心将是数据结构。
- en: Data structures in Python are like data storage objects. Python includes several
    built-in data structures, such as lists, tuples, sets, and dictionaries. All these
    are used to store and manipulate data. Some are mutable (lists) and some are not
    (tuples). To learn more about Python data structures, I highly recommend reading
    the book **“Python for Data Analysis” by Wes McKinney.** I just started reading
    it, and I think it’s stellar.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: Python 中的数据结构就像数据存储对象。Python 包含几个内置数据结构，如列表、元组、集合和字典。所有这些都用于存储和管理数据。有些是可变的（列表）和不可变的（元组）。要了解更多关于
    Python 数据结构的信息，我强烈推荐阅读 Wes McKinney 的书籍**“Python for Data Analysis”**。我刚开始阅读它，我认为它很棒。
- en: In this article, I’m going to walk you through what a DataFrame is in Pandas
    and how to create one step by step.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我将逐步向您介绍 Pandas 中的 DataFrame 是什么以及如何创建它。
- en: Understand Array fundamentals
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 理解数组基础
- en: There’s a library in Python called NumPy; [you might have heard of it](https://towardsdatascience.com/numpy-for-absolute-beginners-a-project-based-approach-to-data-analysis/).
    It’s mostly used for mathematical and numerical computations. One of the features
    it offers is the ability to create arrays. You might be wondering. What the heck
    is an Array?
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: Python 中有一个名为 NumPy 的库；[你可能听说过它](https://towardsdatascience.com/numpy-for-absolute-beginners-a-project-based-approach-to-data-analysis/)。它主要用于数学和数值计算。它提供的一个功能是能够创建数组。你可能想知道。数组究竟是什么东西？
- en: An array is similar to a list, except it only stores values of the same data
    type. Lists, however, can store values of different data types (int, text, boolean,
    etc). Here’s an example of a list
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 数组类似于列表，但它只存储相同数据类型的值。然而，列表可以存储不同数据类型的值（整数、文本、布尔值等）。以下是一个列表的例子
- en: '[PRE0]'
  id: totrans-8
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Lists are also mutable. In other words, you can add and remove elements.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 列表也是可变的。换句话说，你可以添加和删除元素。
- en: Back to arrays. In Numpy, Arrays can be multidimensional — this is called ndarrays
    (N-dimensional arrays). For instance, let’s import the Numpy library in Python.
  id: totrans-10
