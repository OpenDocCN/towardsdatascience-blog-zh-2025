- en: Creating a DataFrame from a dictionary
  id: totrans-53
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 从字典创建DataFrame
- en: 'One of the built-in data structures Python offers is dictionaries. Basically,
    dictionaries are used to store key-value pairs, where all keys must be unique
    and immutable. It’s represented by curly brackets {}. Here’s an example of a dictionary:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: Python提供的一个内置数据结构是字典。基本上，字典用于存储键值对，其中所有键必须是唯一的且不可变的。它由大括号{}表示。以下是一个字典的示例：
- en: '`dict = {"name": "John", "age": 30}`'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '`dict = {"name": "John", "age": 30}`'
- en: Here, the keys are name and age, and the values are Alice and 30\. Simple as
    that. Now, let’s create a DataFrame from a dictionary.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 这里，键是name和age，值是Alice和30。就这么简单。现在，让我们从一个字典创建一个DataFrame。
