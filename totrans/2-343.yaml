- en: 'Strength in Numbers: Ensembling Models with Bagging and Boosting'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 数量优势：使用 Bagging 和 Boosting 集成模型
- en: 原文：[https://towardsdatascience.com/strength-in-numbers-ensembling-models-with-bagging-and-boosting/](https://towardsdatascience.com/strength-in-numbers-ensembling-models-with-bagging-and-boosting/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[原文：https://towardsdatascience.com/strength-in-numbers-ensembling-models-with-bagging-and-boosting/](https://towardsdatascience.com/strength-in-numbers-ensembling-models-with-bagging-and-boosting/)'
- en: '<mdspan datatext="el1747271955507" class="mdspan-comment">Bagging</mdspan>
    and boosting are two powerful ensemble techniques in machine learning – they are
    must-knows for data scientists! After reading this article, you are going to have
    a solid understanding of how bagging and boosting work and when to use them. We’ll
    cover the following topics, relying heavily on examples to give hands-on illustration
    of the key concepts:'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1747271955507" class="mdspan-comment">Bagging</mdspan> 和
    Boosting 是机器学习中的两种强大集成技术 – 对于数据科学家来说是必须了解的！阅读完这篇文章后，你将会有一个扎实的理解，了解 Bagging 和 Boosting
    的工作原理以及何时使用它们。我们将涵盖以下主题，并大量使用示例来提供关键概念的动手演示：
- en: How ensembling helps create powerful models
  id: totrans-3
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 集成如何帮助创建强大的模型
- en: 'Bagging: Adding stability to ML models'
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Bagging：为 ML 模型增加稳定性
- en: 'Boosting: Reducing bias in weak learners'
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Boosting：减少弱学习者的偏差
- en: Bagging vs. Boosting – when to use each and why
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Bagging 与 Boosting – 何时使用每种方法及其原因
- en: Creating powerful models with ensembling
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 通过集成创建强大的模型
- en: In machine learning, **ensembling** is a broad term that refers to any technique
    that creates predictions by combining the predictions from multiple models. If
    there is more than one model involved in making a prediction, the technique is
    using ensembling!
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 在机器学习中，**集成**是一个广泛的概念，指的是通过结合多个模型的预测来创建预测的任何技术。如果涉及多个模型进行预测，则该技术正在使用集成！
- en: 'Ensembling approaches can often improve the performance of a single model.
    Ensembling can help reduce:'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 集成方法通常可以提高单个模型的表现。集成可以帮助减少：
- en: Variance by averaging multiple models
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过平均多个模型来减少方差
- en: Bias by iteratively improving on errors
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过迭代改进错误来减少偏差
- en: Overfitting because using multiple models can increase robustness to spurious
    relationships
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 由于使用多个模型可以增加对虚假关系的鲁棒性，因此可能会出现过度拟合
- en: Bagging and boosting are both ensemble methods that can perform much better
    than their single-model counterparts. Let’s get into the details of these now!
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: Bagging 和 Boosting 都是比它们的单模型对应物表现更好的集成方法。现在让我们深入了解这些方法的细节！
- en: 'Bagging: Adding stability to ML models'
  id: totrans-14
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Bagging：为 ML 模型增加稳定性
- en: Bagging is a specific ensembling technique that is used to reduce the variance
    of a predictive model. Here, I’m talking about variance in the machine learning
    sense – i.e., how much a model varies with changes to the training dataset – not
    variance in the statistical sense which measures the spread of a distribution.
    Because bagging helps reduce an ML model’s variance, it will often improve models
    that are high variance (e.g., decision trees and KNN) but won’t do much good for
    models that are low variance (e.g., linear regression).
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: Bagging 是一种特定的集成技术，用于减少预测模型的方差。在这里，我谈论的是机器学习意义上的方差，即模型随着训练数据集的变化而变化的程度，而不是统计意义上的方差，后者衡量分布的分散程度。因为
    Bagging 有助于减少 ML 模型的方差，它通常可以改善高方差模型（例如决策树和 KNN），但对于低方差模型（例如线性回归）则帮助不大。
- en: 'Now that we understand ***when*** bagging helps (high variance models), let’s
    get into the details of the inner workings to understand ***how*** it helps! The
    bagging algorithm is iterative in nature – it builds multiple models by repeating
    the following three steps:'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经了解了 ***何时*** Bagging 有助于（高方差模型），让我们深入了解其内部工作原理，以了解 ***如何*** 它有助于！Bagging
    算法本质上是迭代的 – 它通过重复以下三个步骤来构建多个模型：
- en: Bootstrap a dataset from the original training data
  id: totrans-17
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从原始训练数据中生成数据集的 Bootstrap
- en: Train a model on the bootstrapped dataset
  id: totrans-18
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 Bootstrap 数据集上训练模型
- en: Save the trained model
  id: totrans-19
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 保存训练好的模型
- en: The collection of models created in this process is called an ensemble. When
    it is time to make a prediction, each model in the ensemble makes its own prediction
    – the final bagged prediction is the average (for regression) or majority vote
    (for classification) of all of the ensemble’s predictions.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 在此过程中创建的模型集合被称为集成。当需要做出预测时，集成中的每个模型都会做出自己的预测 – 最终的 Bagging 预测是所有集成预测的平均值（对于回归）或多数投票（对于分类）。
- en: 'Now that we understand how bagging works, let’s take a few minutes to build
    an intuition for why it works. We’ll borrow a familiar idea from traditional statistics:
    sampling to estimate a population mean.'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经了解了袋装法的原理，让我们花几分钟时间来建立对它为何有效的感觉。我们将借鉴传统统计学中的一个熟悉概念：通过抽样来估计总体均值。
- en: In statistics, each sample drawn from a distribution is a random variable. Small
    sample sizes tend to have high variance and may provide poor estimates of the
    true mean. But as we collect more samples, the average of those samples becomes
    a much better approximation of the population mean.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 在统计学中，从分布中抽取的每个样本都是一个随机变量。小样本量往往具有高方差，可能无法很好地估计真实均值。但随着我们收集更多的样本，这些样本的平均值将更好地近似总体均值。
- en: Similarly, we can think of each of our individual decision trees as a random
    variable — after all, each tree is trained on a different random sample of the
    data! By averaging predictions from many trees, bagging reduces variance and produces
    an ensemble model that better captures the true relationships in the data.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，我们可以将我们的每个单独的决策树视为一个随机变量——毕竟，每棵树都是在数据的不同随机样本上训练的！通过平均许多树的预测，袋装减少了方差，并产生了一个更好地捕捉数据中真实关系的集成模型。
- en: '**Bagging Example**'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: '**袋装示例**'
- en: We will be using the load_diabetes¹ dataset from the scikit-learn Python package
    to illustrate a simple bagging example. The dataset has 10 input variables – Age,
    Sex, BMI, Blood Pressure and 6 blood serum levels (S1-S6). And a single output
    variable that is a measurement of disease progression. The code below pulls in
    our data and does some very simple cleaning. With our dataset established, let’s
    start modeling!
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用scikit-learn Python包中的load_diabetes¹数据集来展示一个简单的袋装示例。该数据集有10个输入变量——年龄、性别、BMI、血压和6种血液血清水平（S1-S6）。以及一个单一的输出变量，它是疾病进展的测量。下面的代码将导入我们的数据并进行一些非常简单的清理。在建立了我们的数据集后，让我们开始建模！
- en: '[PRE0]'
  id: totrans-26
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: For our example, we will use basic decision trees as our base models for bagging.
    Let’s first verify that our decision trees are indeed high variance. We will do
    this by training three decision trees on different bootstrapped datasets and observing
    the variance of the predictions for a test dataset. The graph below shows the
    predictions of three different decision trees on the same test dataset. Each dotted
    vertical line is an individual observation from the test dataset. The three dots
    on each line are the predictions from the three different decision trees.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的例子中，我们将使用基本的决策树作为袋装的基模型。让我们首先验证我们的决策树确实是高方差。我们将通过在不同的自助数据集上训练三个决策树，并观察测试数据集预测的方差来做这件事。下面的图表显示了同一测试数据集上三个不同决策树的预测。每条虚线代表测试数据集的一个单独观察值。每条线上的三个点是从三个不同的决策树得到的预测。
- en: '![](../Images/dfa69c8f46bf2de4fc0958a82b8775ed.png)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/dfa69c8f46bf2de4fc0958a82b8775ed.png)'
- en: Variance of decision trees on test data points – image by author
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 测试数据点的决策树方差 - 图片由作者提供
- en: In the chart above, we see that individual trees can give very different predictions
    (spread of the three dots on each vertical line) when trained on bootstrapped
    datasets. This is the variance we have been talking about!
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 在上面的图表中，我们看到当在自助数据集上训练时，单个树可以给出非常不同的预测（每条垂直线上的三个点的分布）。这就是我们一直在谈论的方差！
- en: Now that we see that our trees aren’t very robust to training samples – let’s
    average the predictions to see how bagging can help! The chart below shows the
    average of the three trees. The diagonal line represents perfect predictions.
    As you can see, with bagging, our points are tighter and more centered around
    the diagonal.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们看到我们的树对训练样本的鲁棒性不是很强——让我们通过平均预测来查看袋装法如何有所帮助！下面的图表显示了三棵树的平均预测。对角线代表完美的预测。正如你所见，通过袋装，我们的点更加紧密且更集中在对角线周围。
- en: '![](../Images/16d2d4dee0bec8d0e2fb99720bad76d0.png)'
  id: totrans-32
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/16d2d4dee0bec8d0e2fb99720bad76d0.png)'
- en: image by author
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: We’ve already seen significant improvement in our model with the average of
    just three trees. Let’s beef up our bagging algorithm with more trees!
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经通过仅仅三棵树的平均预测看到了模型的重要改进。让我们通过增加更多的树来增强我们的袋装算法！
- en: 'Here is the code to bag as many trees as we want:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是用于袋装任意数量树的代码：
- en: '[PRE1]'
  id: totrans-36
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: The functions above are very simple, the first trains the bagging ensemble model,
    the second takes the ensemble (simply a list of trained trees) and makes predictions
    given a dataset.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 上面的函数非常简单，第一个用于训练袋装集成模型，第二个则接收集成（简单地说就是训练好的树列表）并根据数据集做出预测。
- en: With our code established, let’s run multiple ensemble models and see how our
    out-of-bag predictions change as we increase the number of trees.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e0347e8ba6b653aaa3d79ddbea26deaf.png)'
  id: totrans-39
  prefs: []
  type: TYPE_IMG
- en: Out-of-bag predictions vs. actuals colored by number of bagged trees – image
    by author
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
- en: 'Admittedly, this chart looks a little crazy. Don’t get too bogged down with
    all of the individual data points, the lines dashed tell the main story! Here
    we have 1 basic decision tree model and 3 bagged decision tree models – with 3,
    50 and 150 trees. The color-coded dotted lines mark the upper and lower ranges
    for each model’s residuals. There are two main takeaways here: (1) as we add more
    trees, the range of the residuals shrinks and (2) there is diminishing returns
    to adding more trees – when we go from 1 to 3 trees, we see the range shrink a
    lot, when we go from 50 to 150 trees, the range tightens just a little.'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
- en: 'Now that we’ve successfully gone through a full bagging example, we are about
    ready to move onto boosting! Let’s do a quick overview of what we covered in this
    section:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
- en: Bagging reduces variance of ML models by averaging the predictions of multiple
    individual models
  id: totrans-43
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Bagging is most helpful with high-variance models
  id: totrans-44
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The more models we bag, the lower the variance of the ensemble – but there are
    diminishing returns to the variance reduction benefit
  id: totrans-45
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Okay, let’s move on to boosting!
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
- en: 'Boosting: Reducing bias in weak learners'
  id: totrans-47
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: With bagging, we create multiple independent models – the independence of the
    models helps average out the noise of individual models. Boosting is also an ensembling
    technique; similar to bagging, we will be training multiple models…. But very
    different from bagging, the models we train will be **dependent**. Boosting is
    a modeling technique that trains an initial model and then sequentially trains
    additional models to improve the predictions of prior models. The primary target
    of boosting is to reduce bias – though it can also help reduce variance.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
- en: 'We’ve established that boosting iteratively improves predictions – let’s go
    deeper into how. Boosting algorithms can iteratively improve model predictions
    in two ways:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
- en: Directly predicting the residuals of the last model and adding them to the prior
    predictions – think of it as residual corrections
  id: totrans-50
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Adding more weight to the observations that the prior model predicted poorly
  id: totrans-51
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Because boosting’s main goal is to reduce bias, it works well with base models
    that typically have more bias (e.g., shallow decision trees). For our examples,
    we are going to use shallow decision trees as our base model – we will only cover
    the residual prediction approach in this article for brevity. Let’s jump into
    the boosting example!
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
- en: '**Predicting prior residuals**'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
- en: The residuals prediction approach starts off with an initial model (some algorithms
    provide a constant, others use one iteration of the base model) and we calculate
    the residuals of that initial prediction. The second model in the ensemble predicts
    the residuals of the first model. With our residual predictions in-hand, we add
    the residual predictions to our initial prediction (this gives us residual corrected
    predictions) and recalculate the updated residuals…. we continue this process
    until we have created the number of base models we specified. This process is
    pretty simple, but is a little hard to explain with just words – the flowchart
    below shows a simple, 4-model boosting algorithm.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 剩余预测方法从初始模型开始（一些算法提供常数，其他算法使用基模型的单次迭代）并计算该初始预测的残差。集成中的第二个模型预测第一个模型的残差。有了我们的残差预测，我们将残差预测添加到初始预测中（这给出了修正后的残差预测）并重新计算更新的残差……我们继续这个过程，直到我们创建了指定的基模型数量。这个过程相当简单，但只用文字解释有点困难——下面的流程图显示了简单的4模型boosting算法。
- en: '![](../Images/2b65ba7d8f1411d43f0de72965639ba4.png)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/2b65ba7d8f1411d43f0de72965639ba4.png)'
- en: Flowchart of simple, 4 model boosting algorithm – image by author
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 简单的4模型boosting算法流程图——图片由作者提供
- en: 'When boosting, we need to set three main parameters: (1) the number of trees,
    (2) the tree depth and (3) the learning rate. I’ll spend a little time discussing
    these inputs now.'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 当进行boosting时，我们需要设置三个主要参数：（1）树的数量，（2）树的深度和（3）学习率。我现在将花一点时间讨论这些输入。
- en: '**Number of Trees**'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: '**树的数量**'
- en: For boosting, the number of trees means the same thing as in bagging – i.e.,
    the total number of trees that will be trained for the ensemble. But, unlike boosting,
    we should **not** err on the side of more trees! The chart below shows the test
    RMSE against the number of trees for the diabetes dataset.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 对于boosting来说，树的数量与bagging中的含义相同——即，将用于集成训练的总树数。但是，与boosting不同，我们**不应该**倾向于更多的树！下面的图表显示了针对糖尿病数据集的测试RMSE与树的数量之间的关系。
- en: '![](../Images/d86e56b1ebac8332b8ef16269cfdd91b.png)'
  id: totrans-60
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/d86e56b1ebac8332b8ef16269cfdd91b.png)'
- en: Unlike with bagging, too many trees in boosting leads to overfitting! – image
    by author
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 与bagging不同，在boosting中，树太多会导致过拟合！——图片由作者提供
- en: This shows that the test RMSE drops quickly with the number of trees up until
    about 200 trees, then it starts to creep back up. It looks like a classic ‘overfitting’
    chart – we reach a point where more trees becomes worse for the model. This is
    a key difference between bagging and boosting – with bagging, more trees eventually
    *stop helping*, with boosting more trees eventually *start hurting*!
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 这表明，随着树的数量增加到大约200棵时，测试RMSE迅速下降，然后开始缓慢上升。这看起来像是一个经典的“过拟合”图表——我们达到一个点，更多的树对模型来说变得更糟。这是bagging和boosting之间的一个关键区别——在bagging中，更多的树最终会*停止帮助*，而在boosting中，更多的树最终会*开始伤害*！
- en: With bagging, more trees eventually ***stops helping***, with boosting more
    trees eventually ***starts hurting***!
  id: totrans-63
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在bagging中，更多的树最终会***停止帮助***，而在boosting中，更多的树最终会***开始伤害***！
- en: We now know that too many trees are bad, and too few trees are bad as well.
    We will use hyperparameter tuning to select the number of trees. Note – hyperparameter
    tuning is a huge subject and way outside of the scope of this article. I’ll demonstrate
    a simple grid search with a train and test dataset for our example a little later.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在知道，树太多和树太少都是不好的。我们将使用超参数调整来选择树的数量。注意——超参数调整是一个很大的主题，并且超出了本文的范围。我将在稍后用我们的示例演示一个简单的网格搜索，包括训练集和测试集。
- en: '**Tree Depth**'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: '**树的最大深度**'
- en: This is the maximum depth for each tree in the ensemble. With bagging, trees
    are often allowed to go as deep they want because we are looking for low bias,
    high variance models. With boosting however, we use sequential models to address
    the bias in the base learners – so we aren’t as concerned about generating low-bias
    trees. How do we decide how the maximum depth? The same technique that we’ll use
    with the number of trees, hyperparameter tuning.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 这是集成中每个树的最大深度。在bagging中，树通常可以无限深入，因为我们正在寻找低偏差、高方差模型。然而，在boosting中，我们使用顺序模型来解决基学习器的偏差——所以我们并不那么关心生成低偏差的树。我们如何决定最大深度？与树的数量一样，我们将使用超参数调整技术。
- en: '**Learning Rate**'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: '**学习率**'
- en: The number of trees and the tree depth are familiar parameters from bagging
    (although in bagging we often didn’t put a limit on the tree depth) – but this
    ‘learning rate’ character is a new face! Let’s take a moment to get familiar.
    The learning rate is a number between 0 and 1 that is multiplied by the current
    model’s residual predictions before it is added to the overall predictions.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 树的数量和树深度是来自bagging（尽管在bagging中我们通常不对树深度设置限制）的熟悉参数 – 但这个“学习率”特性是一个新面孔！让我们花点时间熟悉一下。学习率是一个介于0和1之间的数字，在将其添加到整体预测之前，它会乘以当前模型的残差预测。
- en: Here’s a simple example of the prediction calculations with a learning rate
    of 0.5\. Once we understand the mechanics of how the learning rate works, we will
    discuss the why the learning rate is important.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个使用学习率为0.5的预测计算的简单示例。一旦我们理解了学习率如何工作的机制，我们将讨论为什么学习率很重要。
- en: '![](../Images/1181770ac24c577d0542356bd658bc14.png)'
  id: totrans-70
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/1181770ac24c577d0542356bd658bc14.png)'
- en: The learning rate discounts the residual prediction before updating the actual
    target prediction – image by author
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 学习率在更新实际目标预测之前会折扣残差预测 – 图片由作者提供
- en: So, why would we want to ‘discount’ our residual predictions, wouldn’t that
    make our predictions worse? Well, yes and no. For a single iteration, it will
    likely make our predictions worse – but, we are doing multiple iterations. For
    multiple iterations, the learning rate keeps the model from overreacting to a
    single tree’s predictions. It will probably make our current predictions worse,
    but don’t worry, we will go through this process multiple times! Ultimately, the
    learning rate helps mitigate overfitting in our boosting model by lowering the
    influence of any single tree in the ensemble. You can think of it as slowly turning
    the steering wheel to correct your driving rather than jerking it. In practice,
    the number of trees and the learning rate have an opposite relationship, i.e.,
    as the learning rate goes down, the number of trees goes up. This is intuitive,
    because if we only allow a small amount of each tree’s residual prediction to
    be added to the overall prediction, we are going to need a lot more trees before
    our overall prediction will start looking good.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，我们为什么要对我们的残差预测进行“折扣”，这不会使我们的预测变得更糟吗？嗯，是的，也不完全是。对于单次迭代，它可能会使我们的预测变得更糟 – 但我们正在进行多次迭代。对于多次迭代，学习率会防止模型对单个树的预测过度反应。它可能会使我们的当前预测变得更糟，但不用担心，我们将多次经历这个过程！最终，学习率通过降低集成中任何单个树的影响来帮助缓解我们的提升模型中的过拟合。你可以把它想象成慢慢地转动方向盘来纠正你的驾驶，而不是猛地转动。在实践中，树的数量和学习率之间存在相反的关系，即，当学习率下降时，树的数量就会增加。这是直观的，因为如果我们只允许每棵树的残差预测的一小部分被添加到整体预测中，那么在我们整体预测开始看起来不错之前，我们需要更多的树。
- en: Ultimately, the learning rate helps mitigate overfitting in our boosting model
    by lowering the influence of any single tree in the ensemble.
  id: totrans-73
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 最终，学习率通过降低集成中任何单个树的影响来帮助缓解我们的提升模型中的过拟合。
- en: 'Alright, now that we’ve covered the main inputs in boosting, let’s get into
    the Python coding! We need a couple of functions to create our boosting algorithm:'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 好的，现在我们已经涵盖了提升中的主要输入，让我们进入Python编码！我们需要几个函数来创建我们的提升算法：
- en: Base decision tree function – a simple function to create and train a single
    decision tree. We will use the same function from the last section called ‘plain_vanilla_tree.’
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 基础决策树函数 – 一个用于创建和训练单个决策树的简单函数。我们将使用上一节中称为‘plain_vanilla_tree’的相同函数。
- en: Boosting training function – this function sequentially trains and updates residuals
    for as many decision trees as the user specifies. In our code, this function is
    called ‘boost_resid_correction.’
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提升训练函数 – 此函数按顺序训练和更新用户指定的决策树残差。在我们的代码中，此函数被称为‘boost_resid_correction。’
- en: Boosting prediction function – this function takes a series of boosted models
    and makes final ensemble predictions. We call this function ‘boost_resid_correction_pred.’
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提升预测函数 – 此函数接受一系列提升模型并做出最终的集成预测。我们称此函数为‘boost_resid_correction_pred。’
- en: 'Here are the functions written in Python:'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是使用Python编写的函数：
- en: '[PRE2]'
  id: totrans-79
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Sweet, let’s make a model on the same diabetes dataset that we used in the bagging
    section. We’ll do a quick grid search (again, not doing anything fancy with the
    tuning here) to tune our three parameters and then we’ll train the final model
    using the `boost_resid_correction` function.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 太好了，让我们在袋装部分使用的相同糖尿病数据集上构建一个模型。我们将进行快速网格搜索（再次强调，这里没有进行任何复杂的调整）来调整我们的三个参数，然后我们将使用`boost_resid_correction`函数训练最终的模型。
- en: '[PRE3]'
  id: totrans-81
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: And our winner is 🥁— 50 trees, a learning rate of 0.1 and a max depth of 1!
    Let’s take a look and see how our predictions did.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 而我们的赢家是 🥁——50棵树，学习率为0.1，最大深度为1！让我们看看我们的预测做得如何。
- en: '![](../Images/08d2f4e1fc1ed8f7a543d0535a339810.png)'
  id: totrans-83
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/08d2f4e1fc1ed8f7a543d0535a339810.png)'
- en: Tuned boosting actuals vs. residuals – image by author
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 调整提升实际值与残差对比——图片由作者提供
- en: While our boosting ensemble model seems to capture the trend reasonably well,
    we can see off the bat that it isn’t predicting as well as the bagging model.
    We could probably spend more time tuning – but it could also be the case that
    the bagging approach fits this specific data better. With that said, we’ve now
    earned an understanding of bagging and boosting – let’s compare them in the next
    section!
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然我们的提升集成模型似乎合理地捕捉到了趋势，但我们一眼就能看出，它的预测效果不如袋装模型。我们可能需要花更多的时间来调整——但这也可能是袋装方法更适合这个特定数据集。话虽如此，我们现在已经对袋装和提升有了理解——让我们在下一节中比较它们！
- en: Bagging vs. Boosting – understanding the differences
  id: totrans-86
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 袋装与提升——理解差异
- en: 'We’ve covered bagging and boosting separately, the table below brings all the
    information we’ve covered to concisely compare the approaches:'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 我们分别介绍了袋装和提升，下表总结了我们所涵盖的所有信息，以便简洁地比较这些方法：
- en: '![](../Images/67722d20a07b76834c530b52c8a697c4.png)'
  id: totrans-88
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/67722d20a07b76834c530b52c8a697c4.png)'
- en: image by author
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: 'Note: In this article, we wrote our own bagging and boosting code for educational
    purposes. In practice you will just use the excellent code that is available in
    Python packages or other software. Also, people rarely use ‘pure’ bagging or boosting
    – it is much more common to use more advanced algorithms that modify the plain
    vanilla bagging and boosting to improve performance.'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 注意：在这篇文章中，我们为了教育目的自己编写了袋装和提升的代码。在实践中，你将只使用Python包或其他软件中可用的优秀代码。此外，人们很少使用“纯”袋装或提升——更常见的是使用更先进的算法，这些算法修改了原始的袋装和提升，以提高性能。
- en: Wrapping it up
  id: totrans-91
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 总结
- en: Bagging and boosting are powerful and practical ways to improve weak learners
    like the humble but flexible decision tree. Both approaches use the power of ensembling
    to address different problems – bagging for variance, boosting for bias. In practice,
    pre-packaged code is almost always used to train more advanced machine learning
    models that use the main ideas of bagging and boosting but, expand on them with
    multiple improvements.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 袋装和提升是提高像灵活但朴实的决策树这样的弱学习者的强大且实用的方法。两种方法都利用集成方法来解决不同的问题——袋装用于方差，提升用于偏差。在实践中，几乎总是使用预包装的代码来训练更先进的机器学习模型，这些模型使用袋装和提升的主要思想，并通过多项改进来扩展它们。
- en: I hope that this has been helpful and interesting – happy modeling!
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 希望这对你有所帮助并有趣——建模愉快！
- en: Dataset is originally from the National Institute of Diabetes and Digestive
    and Kidney Diseases and is distributed under the public domain license for use
    without restriction.
  id: totrans-94
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 数据集最初来自美国国家糖尿病和消化及肾脏疾病研究所，并按照公共领域许可证分发，使用时不受限制。
