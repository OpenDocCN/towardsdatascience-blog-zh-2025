- en: Are You Being Unfair to LLMs?
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/are-you-being-unfair-to-llms/](https://towardsdatascience.com/are-you-being-unfair-to-llms/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1752259072569" class="mdspan-comment">Amidst the current</mdspan>
    hype surrounding AI, some ill-informed ideas about the nature of LLM intelligence
    are floating around, and I’d like to address some of these. I will provide sources—most
    of them preprints—and welcome your thoughts on the matter.
  prefs: []
  type: TYPE_NORMAL
- en: Why do I think this topic matters? First, I feel we are creating a new intelligence
    that in many ways competes with us. Therefore, we should aim to judge it fairly.
    Second, the topic of AI is deeply introspective. It raises questions about our
    thinking processes, our uniqueness, and our feelings of superiority over other
    beings.
  prefs: []
  type: TYPE_NORMAL
- en: 'Millière and Buckner write [1]:'
  prefs: []
  type: TYPE_NORMAL
- en: In particular, we need to understand what LLMs represent about the sentences
    they produce—and the world those sentences are about. Such an understanding cannot
    be reached through armchair speculation alone; it calls for careful empirical
    investigation.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: LLMs are more than prediction machines
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Deep neural networks can form complex structures, with linear-nonlinear paths.
    Neurons can take on multiple functions in superpositions [2]. Further, LLMs build
    internal world models and mind maps of the context they analyze [3]. Accordingly,
    they are not just prediction machines for the next word. Their internal activations
    think ahead to the end of a statement—they have a rudimentary plan in mind [4].
  prefs: []
  type: TYPE_NORMAL
- en: However, all of these capabilities depend on the size and nature of a model,
    so they may vary, especially in specific contexts. These general capabilities
    are an active field of research and are probably more similar to the human thought
    process than to a spellchecker’s algorithm (if you need to pick one of the two).
  prefs: []
  type: TYPE_NORMAL
- en: LLMs show signs of creativity
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: When faced with new tasks, LLMs do more than just regurgitate memorized content.
    Rather, they can produce their own answers [5]. Wang et al. analyzed the relation
    of a model’s output to the [Pile dataset](https://pile.eleuther.ai/) and found
    that larger models advance both in recalling facts and at creating more novel
    content.
  prefs: []
  type: TYPE_NORMAL
- en: Yet Salvatore Raieli recently [reported on TDS](https://towardsdatascience.com/can-machines-dream-on-the-creativity-of-large-language-models-d1d20cf51939/)
    that LLMs are not creative. The quoted studies largely focused on ChatGPT-3\.
    In contrast, Guzik, Erike & Byrge found that GPT-4 is in the top percentile of
    human creativity [6]. Hubert et al. agree with this conclusion [7]. This applies
    to originality, fluency, and flexibility. Generating new ideas that are unlike
    anything seen in the model’s training data may be another matter; this is where
    exceptional humans may still be at an advantage.
  prefs: []
  type: TYPE_NORMAL
- en: Either way, there is too much debate to dismiss these indications entirely.
    To learn more about the general topic, you can look up [computational creativity](https://en.wikipedia.org/wiki/Computational_creativity).
  prefs: []
  type: TYPE_NORMAL
- en: LLMs have a concept of emotion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'LLMs can analyze emotional context and write in different styles and emotional
    tones. This suggests that they possess internal associations and activations representing
    emotion. Indeed, there is such correlational evidence: One can probe the activations
    of their neural networks for certain emotions and even artificially induce them
    with *steering vectors* [8]. (One way to identify these steering vectors is to
    determine the contrastive activations when the model is processing statements
    with an opposite attribute, e.g., sadness vs. happiness.)'
  prefs: []
  type: TYPE_NORMAL
- en: Accordingly, the concept of emotional attributes and their possible relation
    to internal world models seems to fall within the scope of what LLM architectures
    can represent. There is a relation between the emotional representation and the
    subsequent reasoning, i.e., the world as the LLM understands it.
  prefs: []
  type: TYPE_NORMAL
- en: Furthermore, emotional representations are localized to certain areas of the
    model, and many intuitive assumptions that apply to humans can also be observed
    in LLMs—even psychological and cognitive frameworks may apply [9].
  prefs: []
  type: TYPE_NORMAL
- en: Note that the above statements do not imply *phenomenology*, that is, that LLMs
    have a subjective experience.
  prefs: []
  type: TYPE_NORMAL
- en: Yes, LLMs don’t learn (post-training)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: LLMs are neural networks with *static weights*. When we are chatting with an
    LLM chatbot, we are interacting with a model that does not change, and only learns
    *in-context* of the ongoing chat. This means it can pull additional data from
    the web or from a database, process our inputs, etc. But its *nature*, built-in
    knowledge, skills, and biases remain unchanged.
  prefs: []
  type: TYPE_NORMAL
- en: Beyond mere long-term memory systems that provide additional in-context data
    to static LLMs, future approaches could be self-modifying by adapting the core
    LLM’s weights. This can be achieved by continually pretraining with new data or
    by continually fine-tuning and overlaying additional weights [10].
  prefs: []
  type: TYPE_NORMAL
- en: Many alternative neural network architectures and adaptation approaches are
    being explored to efficiently implement continuous-learning systems [11]. These
    systems exist; they are just not reliable and economical yet.
  prefs: []
  type: TYPE_NORMAL
- en: Future development
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let’s not forget that the AI systems we are currently seeing are very new. “It’s
    not good at X” is a statement that may quickly become invalid. Furthermore, we
    are usually judging the low-priced consumer products, not the top models that
    are too expensive to run, unpopular, or still kept behind locked doors. Much of
    the last year and a half of LLM development has focused on creating cheaper, easier-to-scale
    models for consumers, not just smarter, higher-priced ones.
  prefs: []
  type: TYPE_NORMAL
- en: While computers may lack originality in some areas, they excel at quickly trying
    different options. And now, LLMs can judge themselves. When we lack an intuitive
    answer while being creative, aren’t we doing the same thing—cycling through thoughts
    and picking the best? The inherent creativity (or whatever you want to call it)
    of LLMs, coupled with the ability to rapidly iterate through ideas, is already
    benefiting scientific research. See my previous article on [AlphaEvolve](https://towardsdatascience.com/googles-alphaevolve-getting-started-with-evolutionary-coding-agents/)
    for an example.
  prefs: []
  type: TYPE_NORMAL
- en: Weaknesses such as hallucinations, biases, and jailbreaks that confuse LLMs
    and circumvent their safeguards, as well as safety and reliability issues, are
    still pervasive. Nevertheless, these systems are so powerful that myriad applications
    and improvements are possible. LLMs also do not have to be used in isolation.
    When combined with additional, traditional approaches, some shortcomings may be
    mitigated or become irrelevant. For instance, LLMs can generate realistic training
    data for traditional AI systems that are subsequently used in industrial automation.
    Even if development were to slow down, I believe that there are decades of benefits
    to be explored, from drug research to education.
  prefs: []
  type: TYPE_NORMAL
- en: LLMs are just algorithms. Or are they?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Many researchers are now finding similarities between human thinking processes
    and LLM information processing (e.g., [12]). It has long been accepted that CNNs
    can be likened to the layers in the human visual cortex [13], but now we are talking
    about the neocortex [14, 15]! Don’t get me wrong; there are also clear differences.
    Nevertheless, the [capability explosion](https://arstechnica.com/ai/2025/07/how-a-big-shift-in-training-llms-led-to-a-capability-explosion/)
    of LLMs cannot be denied, and our claims of uniqueness don’t seem to hold up well.
  prefs: []
  type: TYPE_NORMAL
- en: The question now is where this will lead, and where the limits are—at what point
    must we discuss consciousness? Reputable thought leaders like Geoffrey Hinton
    and Douglas Hofstadter have begun to appreciate the possibility of consciousness
    in AI in light of recent LLM breakthroughs [16, 17]. Others, like Yann LeCun,
    are doubtful [18].
  prefs: []
  type: TYPE_NORMAL
- en: 'Professor James F. O’Brien [shared his thoughts](https://towardsdatascience.com/an-illusion-of-life-5a11d2f2c737/)
    on the topic of LLM sentience last year on TDS, and asked:'
  prefs: []
  type: TYPE_NORMAL
- en: Will we have a way to test for sentience? If so, how will it work and what should
    we do if the result comes out positive?
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Moving on
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We should be careful when ascribing human traits to machines—anthropomorphism
    happens all too easily. However, it is also easy to dismiss other beings. We have
    seen this happen too often with animals.
  prefs: []
  type: TYPE_NORMAL
- en: Therefore, regardless of whether current LLMs turn out to be creative, possess
    world models, or are sentient, we might want to refrain from belittling them.
    The next generation of AI could be all three [19].
  prefs: []
  type: TYPE_NORMAL
- en: What do you think?
  prefs: []
  type: TYPE_NORMAL
