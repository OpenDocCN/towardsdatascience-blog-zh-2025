- en: 'ROC AUC Explained: A Beginner’s Guide to Evaluating Classification Models'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: ROC AUC 解释：评估分类模型的入门指南
- en: 原文：[https://towardsdatascience.com/roc-auc-explained-a-beginners-guide-to-evaluating-classification-models/](https://towardsdatascience.com/roc-auc-explained-a-beginners-guide-to-evaluating-classification-models/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/roc-auc-explained-a-beginners-guide-to-evaluating-classification-models/](https://towardsdatascience.com/roc-auc-explained-a-beginners-guide-to-evaluating-classification-models/)
- en: <mdspan datatext="el1758064775135" class="mdspan-comment">In the earlier blog</mdspan>
    post on the [Confusion Matrix](https://towardsdatascience.com/confusion-matrix-made-simple-accuracy-precision-recall-f1-score/),
    we applied the logistic regression algorithm to the Breast Cancer Wisconsin dataset
    to classify whether the tumor is malignant or benign.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1758064775135" class="mdspan-comment">在之前的博客文章中</mdspan>关于[混淆矩阵](https://towardsdatascience.com/confusion-matrix-made-simple-accuracy-precision-recall-f1-score/)，我们应用了逻辑回归算法到威斯康星乳腺癌数据集以分类肿瘤是恶性还是良性。
- en: We evaluated the classification model using various metrics like accuracy, precision,
    etc.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用各种指标如准确率、精确度等评估了分类模型。
- en: Now, in binary classification models, we have another way to evaluate the model,
    and that is **ROC AUC**.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，在二元分类模型中，我们还有另一种评估模型的方法，那就是**ROC AUC**。
- en: In this blog, we will discuss why we have another metric and when it should
    be used.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇博客中，我们将讨论为什么我们需要另一个指标以及何时应该使用它。
- en: To understand ROC AUC in detail, we will consider the [IBM HR Analytics](https://www.kaggle.com/datasets/pavansubhasht/ibm-hr-analytics-attrition-dataset)
    dataset.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 要详细了解ROC AUC，我们将考虑[IBM HR Analytics](https://www.kaggle.com/datasets/pavansubhasht/ibm-hr-analytics-attrition-dataset)数据集。
- en: In this dataset, we have information about 1,470 employees such as their age,
    job role, gender, monthly income, job satisfaction, etc.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个数据集中，我们拥有1,470名员工的信息，例如他们的年龄、职位、性别、月收入、工作满意度等。
- en: In total, there are 34 features describing each employee.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 总共有34个特征描述每个员工。
- en: We also have a target column, **‘Attrition’**, which is **‘Yes’** if the employee
    left the company and **‘No’** if the employee stayed.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还有一个目标列，**‘离职’**，如果员工离职则标记为**‘是’**，如果员工留任则标记为**‘否’**。
- en: Let’s have a look at the class distribution of the target column.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们来看看目标列的类别分布。
- en: '![](../Images/72bebbcdebd6309140518466129a5d91.png)'
  id: totrans-11
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/72bebbcdebd6309140518466129a5d91.png)'
- en: Image by Author
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: From the above class distribution, we can observe that the dataset is **imbalanced**.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 从上面的类别分布中，我们可以观察到数据集是**不平衡的**。
- en: Now, we need to build a model based on this data to classify employees according
    to whether they will stay in the company or not.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们需要根据员工是否会留在公司来构建一个基于这些数据的模型进行分类。
- en: As this is a binary classification (Yes/No) task, let’s use the logistic regression
    algorithm on this data.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 由于这是一个二元分类（是/否）任务，让我们在这个数据上应用逻辑回归算法。
- en: 'Code:'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 代码：
- en: '[PRE0]'
  id: totrans-17
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Confusion Matrix and Classification Report
  id: totrans-18
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 混淆矩阵和分类报告
- en: '![](../Images/d0028f02c8cc7178022de95c9300c7c6.png)'
  id: totrans-19
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/d0028f02c8cc7178022de95c9300c7c6.png)'
- en: Image by Author
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: From the above classification report, we observe that the accuracy is 86%. However,
    the recall for **‘1’** (attrition = Yes, meaning the employee left the job) is
    0.34, indicating that the model correctly identified only 34% of employees who
    left the job.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 从上面的分类报告中，我们观察到准确率是86%。然而，对于**‘1’**（离职 = 是，意味着员工离职）的召回率是0.34，这表明模型仅正确识别了34%离职的员工。
- en: The recall for **‘0’** (attrition = No, meaning the employee stayed in the job)
    is 0.96, indicating that the model correctly identified 96% of employees who stayed.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 对于**‘0’**（离职 = 否，意味着员工留任）的召回率是0.96，这表明模型正确识别了96%留任的员工。
- en: This happens due to an imbalanced dataset. Accuracy can be misleading here.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 这种情况是由于数据集不平衡造成的。在这里，准确率可能会误导。
- en: Does this mean we need to change our algorithm? No.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 这是否意味着我们需要更改我们的算法？不。
- en: We need to change the way we evaluate our model, and the best way to evaluate
    classification models with an imbalanced dataset is **ROC AUC**.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要改变评估模型的方式，对于不平衡数据集，评估分类模型的最佳方式是**ROC AUC**。
- en: '* * *'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Now we know that there is another method to evaluate classification models,
    i.e., ROC AUC. But before exploring ROC AUC, let’s have a clear idea of what has
    happened so far.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们知道，还有另一种评估分类模型的方法，即ROC AUC。但在探索ROC AUC之前，让我们先明确到目前为止发生了什么。
- en: We applied Logistic Regression on the IBM HR dataset, and the model gave us
    a probability score for each employee, representing how likely they are to leave
    the job.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在IBM HR数据集上应用了逻辑回归，模型为每个员工提供了一个概率分数，表示他们离职的可能性有多大。
- en: '![](../Images/6d92a633897d90f106dcb08af65e0b82.png)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/6d92a633897d90f106dcb08af65e0b82.png)'
- en: Image by Author
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: When we generate a confusion matrix and classification report, they are based
    on a threshold, which by default is 0.5\.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们生成混淆矩阵和分类报告时，它们基于一个阈值，默认值为0.5。
- en: If the predicted probability is greater than 0.5, the employee is considered
    to have left the job; if the probability is smaller than 0.5, the employee is
    considered to have stayed.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 如果预测概率大于0.5，则认为员工已经离职；如果概率小于0.5，则认为员工留任。
- en: From this, we obtained an accuracy of 86%, but recall was only 34%. We observed
    that accuracy is misleading, so we decided to evaluate the model using ROC AUC.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 从这里，我们得到了86%的准确率，但召回率仅为34%。我们观察到准确率具有误导性，因此我们决定使用ROC AUC来评估模型。
- en: '* * *'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: ROC AUC
  id: totrans-35
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ROC AUC
- en: First, we will discuss the Receiver Operating Characteristic (ROC) curve.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们将讨论接收者操作特征（ROC）曲线。
- en: We get the ROC curve by plotting the **True Positive Rate versus False Positive
    Rate.**
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 我们通过绘制**真正率与假正率**来获得ROC曲线。
- en: We already know that the classification report is based on a single threshold,
    But the ROC curve is generated by calculating True Positive Rate (TPR) and False
    Positive Rate (FPR) at all possible thresholds and then plotting them.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经知道分类报告是基于单个阈值的，但ROC曲线是通过计算所有可能阈值下的真正率（TPR）和假正率（FPR）然后绘制它们来生成的。
- en: Let’s take a sample dataset and see how we generate the ROC curve from it.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们取一个样本数据集，看看我们如何从中生成ROC曲线。
- en: '![](../Images/c3d6e430318b95e6b2bb973b7ff434ff.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/c3d6e430318b95e6b2bb973b7ff434ff.png)'
- en: Image by Author
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: Now, for the above data, we calculate TPR and FPR at the possible thresholds
    and then plot them.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，对于上述数据，我们将在可能的阈值下计算TPR和FPR，然后绘制它们。
- en: '**What are Possible Thresholds?**'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: '**可能的阈值是什么？**'
- en: To generate the ROC curve, we don’t need to calculate the TPR and FPR at every
    value between 0 and 1\.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 要生成ROC曲线，我们不需要在0到1之间的每个值上计算TPR和FPR。
- en: '**Instead, we use the predicted probabilities from the dataset and one value
    above the maximum predicted probability (so all predictions are negative, starting
    the curve at (0,0)) and one below the minimum predicted probability as thresholds
    (so all predictions are positive, ending the curve at (1,1)).**'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: '**相反，我们使用数据集中的预测概率以及最大预测概率之上的一个值（因此所有预测都是负的，曲线从(0,0)开始）和最小预测概率之下的一个值作为阈值（因此所有预测都是正的，曲线在(1,1)结束）。**'
- en: '**Why not every number between 0 and 1 as Threshold?**'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: '**为什么不是0到1之间的每一个数作为阈值？**'
- en: Consider our sample data. We have a predicted probability of 0.6592, and we
    will use that as a threshold to calculate TPR and FPR.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑我们的样本数据。我们有一个预测概率为0.6592，我们将使用该值作为阈值来计算TPR和FPR。
- en: Now, between 0.6592 and 0.8718 the TPR and FPR remain the same, and they only
    change once the threshold crosses a predicted probability.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，在0.6592和0.8718之间，TPR和FPR保持不变，只有当阈值超过预测概率时它们才会改变。
- en: That is why we use unique predicted probabilities as thresholds to generate
    the ROC curve.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 正因如此，我们使用唯一的预测概率作为阈值来生成ROC曲线。
- en: Now, based on our sample data, let’s generate the ROC curve and see what we
    can observe.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，基于我们的样本数据，让我们生成ROC曲线并看看我们能观察到什么。
- en: To generate the ROC curve, we need to calculate the TPR and FPR.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 要生成ROC曲线，我们需要计算TPR和FPR。
- en: \[
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \text{True Positive Rate (TPR)} = \frac{\text{True Positives (TP)}}{\text{True
    Positives (TP)} + \text{False Negatives (FN)}}
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: \text{真正率 (TPR)} = \frac{\text{真正性 (TP)}}{\text{真正性 (TP)} + \text{假阴性 (FN)}}
- en: \]
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: The True Positive Rate (TPR) is also called **Recall**.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 真正率（TPR）也称为**召回率**。
- en: \[
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \text{False Positive Rate (FPR)} = \frac{\text{False Positives (FP)}}{\text{False
    Positives (FP)} + \text{True Negatives (TN)}}
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: \text{假正率 (FPR)} = \frac{\text{假阳性 (FP)}}{\text{假阳性 (FP)} + \text{真阴性 (TN)}}
- en: \]
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: The thresholds we are going to use for this sample data to calculate TPR and
    FPR are {1, 0.9799, 0.9709, 0.8737, 0.8718, 0.6592, 0.6337, 0}.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将要使用此样本数据计算TPR和FPR的阈值是{1, 0.9799, 0.9709, 0.8737, 0.8718, 0.6592, 0.6337,
    0}。
- en: Let’s calculate TPR and FPR at each threshold.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们计算每个阈值下的TPR和FPR。
- en: \[
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \begin{aligned}
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: \begin{aligned}
- en: \mathbf{At\ threshold\ 0.9799:} & \\[4pt]
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: \mathbf{在阈值0.9799时：} & \\[4pt]
- en: \mathrm{True\ Positives\ (TP)} &= 1,\quad \mathrm{False\ Negatives\ (FN)} =
    2,\\
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: \mathrm{True\ Positives\ (TP)} &= 1,\quad \mathrm{False\ Negatives\ (FN)} =
    2,\\
- en: \mathrm{False\ Positives\ (FP)} &= 0,\quad \mathrm{True\ Negatives\ (TN)} =
    3\\[6pt]
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: \mathrm{False\ Positives\ (FP)} &= 0,\quad \mathrm{True\ Negatives\ (TN)} =
    3\\[6pt]
- en: \mathrm{TPR} &= \frac{\mathrm{TP}}{\mathrm{TP}+\mathrm{FN}} = \frac{1}{1+2}
    = \frac{1}{3} \approx 0.33\\[6pt]
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: \mathrm{TPR} &= \frac{\mathrm{TP}}{\mathrm{TP}+\mathrm{FN}} = \frac{1}{1+2}
    = \frac{1}{3} \approx 0.33\\[6pt]
- en: \mathrm{FPR} &= \frac{\mathrm{FP}}{\mathrm{FP}+\mathrm{TN}} = \frac{0}{0+3}
    = 0\\[6pt]
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: \mathrm{FPR} &= \frac{\mathrm{FP}}{\mathrm{FP}+\mathrm{TN}} = \frac{0}{0+3}
    = 0\\[6pt]
- en: \Rightarrow (\mathrm{FPR},\,\mathrm{TPR}) &= (0,\,0.33)
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: \Rightarrow (\mathrm{FPR},\,\mathrm{TPR}) &= (0,\,0.33)
- en: \end{aligned}
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: \end{aligned}
- en: \]
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: This way, we calculate TPR and FPR at each threshold.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 这样，我们在每个阈值下计算TPR和FPR。
- en: '![](../Images/33a36983777ea6b761ed881b59149b3c.png)'
  id: totrans-72
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/33a36983777ea6b761ed881b59149b3c.png)'
- en: Image by Author
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: Now, let’s plot TPR versus FPR to obtain the ROC curve.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们绘制TPR与FPR的关系图以获得ROC曲线。
- en: '![](../Images/51a48a47f9a21eaaf7fabbf66dab46c5.png)'
  id: totrans-75
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/51a48a47f9a21eaaf7fabbf66dab46c5.png)'
- en: Image by Author
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: This is how the ROC curve is generated. Since we considered only a 6-point sample,
    it is difficult to observe and interpret the curve clearly. The main goal here
    is to understand how a ROC curve is generated.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是ROC曲线是如何生成的。由于我们只考虑了6个点的样本，因此很难清楚地观察和解释曲线。这里的主要目标是理解ROC曲线是如何生成的。
- en: Now we need to interpret the ROC curve, and for that we will generate the ROC
    curve using Python on our dataset.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们需要解释ROC曲线，为此我们将使用Python在我们的数据集上生成ROC曲线。
- en: '**Code:**'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: '**代码：**'
- en: '[PRE1]'
  id: totrans-80
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '**Plot:**'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: '**图表：**'
- en: '![](../Images/6b4360bcc4a0f4707f4dda9d4345e409.png)'
  id: totrans-82
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6b4360bcc4a0f4707f4dda9d4345e409.png)'
- en: Image by Author
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: Let’s see what we can interpret from the ROC curve alone, irrespective of AUC,
    since we will discuss AUC later.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看我们可以从ROC曲线中解读什么，不考虑AUC，因为我们稍后会讨论AUC。
- en: In the above plot, the y-axis represents the True Positive Rate, which means
    how many actual positives the model correctly identifies, and the x-axis represents
    the False Positive Rate, which means how many false positives it generates.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 在上述图中，y轴代表真正率，即模型正确识别的实际正例数量，x轴代表假正率，即模型产生的假正例数量。
- en: In the ROC curve, we observe how the model behaves by varying thresholds. We
    want the True Positive Rate to be as high as possible while keeping the False
    Positive Rate low, which means the curve should rise toward the top-left corner.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 在ROC曲线上，我们通过改变阈值来观察模型的行为。我们希望真正率尽可能高，同时保持假正率低，这意味着曲线应该向左上角上升。
- en: If the curve is near or along the diagonal, the model is essentially making
    random guesses, and its performance is not satisfactory.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 如果曲线接近或沿着对角线，则模型实际上是在随机猜测，其性能不令人满意。
- en: If the curve lies below the diagonal, the model’s performance is very poor.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 如果曲线位于对角线以下，则模型的性能非常差。
- en: This way, we can get an idea of the model’s performance across various thresholds.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 这样，我们可以了解模型在不同阈值下的性能。
- en: Now let’s discuss about **Area Under the Curve (AUC)**.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们讨论**曲线下面积（AUC）**。
- en: We have already seen that, for our data AUC is **0.81**.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经看到，对于我们的数据，AUC是**0.81**。
- en: '![](../Images/4f147348743181e39a388c2ea35ea91a.png)'
  id: totrans-92
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/4f147348743181e39a388c2ea35ea91a.png)'
- en: Image by Author
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: An AUC of 0.81 means that if you pick one employee who left and another who
    stayed, there is an 81% chance that the model assigns a higher probability to
    the employee who left.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: AUC为0.81意味着如果你随机选择一个离职员工和一个留下来的员工，模型将给离职员工分配更高概率的概率为81%。
- en: Now, let’s use the sample dataset to understand how AUC is calculated.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们使用样本数据集来了解AUC是如何计算的。
- en: Now once again we go back to the ROC curve that we generated using our sample
    data.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们再次回到我们使用样本数据生成的ROC曲线。
- en: '![](../Images/b8fdd68fc54ea93051154a387b30aa12.png)'
  id: totrans-97
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b8fdd68fc54ea93051154a387b30aa12.png)'
- en: Image by Author
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: The shaded regions in the above plot represents the AUC.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 上图中的阴影区域表示AUC。
- en: Now let’s proceed with calculation of AUC.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们继续计算AUC。
- en: From point (0.00, 0.33) to (0.33, 0.33), the area under the curve is represented
    by the orange rectangle.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 从点（0.00，0.33）到（0.33，0.33），曲线下方的面积由橙色矩形表示。
- en: From point (0.33, 0.33) to (0.67, 0.33), the area under the curve is represented
    by the green rectangle.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 从点（0.33，0.33）到（0.67，0.33），曲线下方的面积由绿色矩形表示。
- en: From point (0.67, 0.33) to (1.00, 0.33), the area under the curve is represented
    by the red rectangle.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 从点（0.67，0.33）到（1.00，0.33），曲线下方的面积由红色矩形表示。
- en: Now to find the AUC, we need to calculate the areas of rectangles and add them.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 现在要找到AUC，我们需要计算矩形的面积并将它们相加。
- en: $$
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: $$
- en: '\text{Orange Rectangle: } l \times b = 0.33 \times 0.33 = 0.11'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: '\text{橙色矩形: } l \times b = 0.33 \times 0.33 = 0.11'
- en: $$
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: $$
- en: $$
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: $$
- en: '\text{Green Rectangle: } l \times b = 0.34 \times 0.33 = 0.11'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: '\text{绿色矩形: } l \times b = 0.34 \times 0.33 = 0.11'
- en: $$
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: $$
- en: $$
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: $$
- en: '\text{Red Rectangle: } l \times b = 0.33 \times 0.33 = 0.11'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: '\text{红色矩形: } l \times b = 0.33 \times 0.33 = 0.11'
- en: $$
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: $$
- en: $$
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: $$
- en: \text{Total AUC} = 0.11 + 0.11 + 0.11 = 0.33
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: \text{总AUC} = 0.11 + 0.11 + 0.11 = 0.33
- en: $$
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: $$
- en: This way we calculate AUC.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 这样我们计算AUC。
- en: In the above sample, we can also find the area without dividing it into point-by-point
    segments, but in the real world we don’t get to see such ROC curves.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 在上述示例中，我们还可以找到不需要将其划分为逐点段来找到的区域，但在现实世界中我们看不到这样的ROC曲线。
- en: Now let’s consider an example ROC curve that is similar to real-world cases
    and calculate the AUC.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们考虑一个类似于现实世界案例的ROC曲线，并计算AUC。
- en: '![](../Images/94d3a965c14758c4ca537fbae4f04beb.png)'
  id: totrans-120
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/94d3a965c14758c4ca537fbae4f04beb.png)'
- en: Image by Author
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 图像由作者提供
- en: Now let’s find AUC for this ROC curve.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们找到这个ROC曲线的AUC。
- en: Here we have three segments. Two of them are trapezoids and one looks like a
    triangle. However, we don’t use separate formulas for each shape, since rectangles
    and triangles are rarely formed.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 这里我们有三个段。其中两个是梯形，另一个看起来像三角形。然而，我们不需要为每个形状使用单独的公式，因为矩形和三角形很少形成。
- en: We only use the trapezoid area formula.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 我们只使用梯形面积公式。
- en: $$
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: $$
- en: \text{Area} = \tfrac{1}{2} \times (y_1 + y_2) \times (x_2 – x_1)
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: \text{面积} = \tfrac{1}{2} \times (y_1 + y_2) \times (x_2 – x_1)
- en: $$
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: $$
- en: Now, using this formula, let’s find the AUC.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，使用这个公式，让我们找到AUC。
- en: $$
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: $$
- en: '\text{Segment 1: } (0.0,0.0) \;\rightarrow\; (0.2,0.4) \\'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: '\text{段1: } (0.0,0.0) \;\rightarrow\; (0.2,0.4) \\'
- en: \text{Area} = \tfrac{1}{2} \times (0.0 + 0.4) \times (0.2 – 0.0) = 0.04
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: \text{面积} = \tfrac{1}{2} \times (0.0 + 0.4) \times (0.2 – 0.0) = 0.04
- en: $$
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: $$
- en: Here, the trapezoid formula automatically reduces to the formula for the area
    of a triangle.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 这里，梯形公式自动简化为三角形面积的公式。
- en: $$
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: $$
- en: '\text{Segment 2: } (0.2,0.4) \;\rightarrow\; (0.6,0.8) \\'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: '\text{段2: } (0.2,0.4) \;\rightarrow\; (0.6,0.8) \\'
- en: \text{Area} = \tfrac{1}{2} \times (0.4 + 0.8) \times (0.6 – 0.2) = 0.24
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: \text{面积} = \tfrac{1}{2} \times (0.4 + 0.8) \times (0.6 – 0.2) = 0.24
- en: $$
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: $$
- en: $$
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: $$
- en: '\text{Segment 3: } (0.6,0.8) \;\rightarrow\; (1.0,1.0) \\'
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: '\text{段3: } (0.6,0.8) \;\rightarrow\; (1.0,1.0) \\'
- en: \text{Area} = \tfrac{1}{2} \times (0.8 + 1.0) \times (1.0 – 0.6) = 0.36
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: \text{面积} = \tfrac{1}{2} \times (0.8 + 1.0) \times (1.0 – 0.6) = 0.36
- en: $$
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: $$
- en: $$
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: $$
- en: \text{Total AUC} = 0.04 + 0.24 + 0.36 = 0.64
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: \text{总AUC} = 0.04 + 0.24 + 0.36 = 0.64
- en: $$
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: $$
- en: This is how the AUC is calculated. We now understand how we got an AUC of 0.81
    for our HR dataset.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是AUC是如何计算的。我们现在理解了我们如何得到HR数据集的AUC为0.81。
- en: '* * *'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: But there is also a second method to calculate AUC.
  id: totrans-147
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 但还有第二种计算AUC的方法。
- en: Again, we go back to our sample dataset.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 再次，我们回到我们的样本数据集。
- en: '![](../Images/c3d6e430318b95e6b2bb973b7ff434ff.png)'
  id: totrans-149
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/c3d6e430318b95e6b2bb973b7ff434ff.png)'
- en: Image by Author
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 图像由作者提供
- en: 'Positives (1’s): [0.9799, 0.6592, 0.6337]'
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 正例（1）：[0.9799, 0.6592, 0.6337]
- en: 'Negatives (0’s): [0.9709, 0.8737, 0.8718]'
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 负例（0）：[0.9709, 0.8737, 0.8718]
- en: Here we have total 9 positive-negative pairs.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 这里我们总共有9个正负对。
- en: Now we compare each positive with each negative to see whether the positive
    is ranked higher or the negative.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们将每个正例与每个负例进行比较，以查看正例是否被排名更高。
- en: $$
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: $$
- en: 0.9799 \;(\text{positive}) > 0.9709 \;(\text{negative}) \;\;\;\Rightarrow\;\;
    \text{positive ranked higher}
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 0.9799 \;(\text{正}) > 0.9709 \;(\text{负}) \;\;\;\Rightarrow\;\; \text{正被排名更高}
- en: $$
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: $$
- en: $$
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: $$
- en: 0.9799 \;(\text{positive}) > 0.8737 \;(\text{negative}) \;\;\;\Rightarrow\;\;
    \text{positive ranked higher}
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 0.9799 \;(\text{正}) > 0.8737 \;(\text{负}) \;\;\;\Rightarrow\;\; \text{正被排名更高}
- en: $$
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: $$
- en: $$
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: $$
- en: 0.9799 \;(\text{positive}) > 0.8718 \;(\text{negative}) \;\;\;\Rightarrow\;\;
    \text{positive ranked higher}
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 0.9799 \;(\text{正}) > 0.8718 \;(\text{负}) \;\;\;\Rightarrow\;\; \text{正被排名更高}
- en: $$
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: $$
- en: $$
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: $$
- en: 0.6592 \;(\text{positive}) < 0.9709 \;(\text{negative}) \;\;\;\Rightarrow\;\;
    \text{positive ranked lower} $$ $$ 0.6592 \;(\text{positive}) < 0.8737 \;(\text{negative})
    \;\;\;\Rightarrow\;\; \text{positive ranked lower} $$ $$ 0.6592 \;(\text{positive})
    < 0.8718 \;(\text{negative}) \;\;\;\Rightarrow\;\; \text{positive ranked lower}
    $$ $$ 0.6337 \;(\text{positive}) < 0.9709 \;(\text{negative}) \;\;\;\Rightarrow\;\;
    \text{positive ranked lower} $$ $$ 0.6337 \;(\text{positive}) < 0.8737 \;(\text{negative})
    \;\;\;\Rightarrow\;\; \text{positive ranked lower} $$ $$ 0.6337 \;(\text{positive})
    < 0.8718 \;(\text{negative}) \;\;\;\Rightarrow\;\; \text{positive ranked lower}
    $$ $$ \text{Correctly ranked pairs} = 3, \quad \text{Total pairs} = 9, \quad \text{AUC}
    = \tfrac{3}{9} = 0.33 $$
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 0.6592 \;(\text{正类}) < 0.9709 \;(\text{负类}) \;\;\;\Rightarrow\;\; \text{正类排名较低}
    $$ $$ 0.6592 \;(\text{正类}) < 0.8737 \;(\text{负类}) \;\;\;\Rightarrow\;\; \text{正类排名较低}
    $$ $$ 0.6592 \;(\text{正类}) < 0.8718 \;(\text{负类}) \;\;\;\Rightarrow\;\; \text{正类排名较低}
    $$ $$ 0.6337 \;(\text{正类}) < 0.9709 \;(\text{负类}) \;\;\;\Rightarrow\;\; \text{正类排名较低}
    $$ $$ 0.6337 \;(\text{正类}) < 0.8737 \;(\text{负类}) \;\;\;\Rightarrow\;\; \text{正类排名较低}
    $$ $$ 0.6337 \;(\text{正类}) < 0.8718 \;(\text{负类}) \;\;\;\Rightarrow\;\; \text{正类排名较低}
    $$ $$ \text{正确排名的配对数} = 3, \quad \text{总配对数} = 9, \quad \text{AUC} = \tfrac{3}{9}
    = 0.33 $$
- en: This is called as **Ranking Method for AUC.**
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 这被称为**AUC 排名方法**。
- en: We obtained the same value of 0.33 using both methods for sample data.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用两种方法对样本数据获得了相同的 0.33 值。
- en: We can understand that
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以理解这一点
- en: $$
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: $$
- en: \text{AUC} = \frac{\text{Number of correctly ranked pairs}}{\text{Total number
    of pairs}}
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: \text{AUC} = \frac{\text{正确排名的配对数}}{\text{总配对数}}
- en: $$
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: $$
- en: '**We can interpret AUC as the probability that a randomly chosen positive is
    ranked higher than a randomly chosen negative.**'
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: '**我们可以将 AUC 解释为随机选择的一个正类比随机选择的一个负类排名更高的概率。**'
- en: '* * *'
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Now that we have an idea of how to generate the ROC curve and calculate AUC,
    let’s discuss the **significance of ROC-AUC**.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 既然我们已经了解了如何生成 ROC 曲线和计算 AUC，让我们讨论 ROC-AUC 的**重要性**。
- en: 'We used ROC-AUC when we found that accuracy is misleading. But instead of ROC-AUC,
    we may ask: why not run a loop over all threshold values, calculate accuracy and
    other metrics, and then select the best threshold?'
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们发现准确率具有误导性时，我们使用了 ROC-AUC。但除了 ROC-AUC，我们可能会问：为什么不在所有阈值值上运行循环，计算准确率和其他指标，然后选择最佳阈值？
- en: Yes, that is possible. However, when we compare two models, we cannot compare
    them based on their best thresholds, since different models may have different
    best thresholds.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，这是可能的。然而，当我们比较两个模型时，我们不能仅基于它们的最佳阈值进行比较，因为不同的模型可能有不同的最佳阈值。
- en: ROC-AUC gives us a single number that summarizes a model’s performance and allows
    comparison across different models.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: ROC-AUC 给我们一个单一的数字来总结模型的表现，并允许跨不同模型进行比较。
- en: Another point is that the best threshold depends on the metric we choose.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 另一点是，最佳阈值取决于我们选择的指标。
- en: The “best” threshold changes depending on whether we optimize for accuracy,
    precision, recall, or F1-score. ROC-AUC is threshold-independent, making it a
    more general measure of model quality.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: “最佳”阈值取决于我们是否优化准确率、精确率、召回率或 F1 分数。ROC-AUC 是阈值无关的，使其成为模型质量的更一般性度量。
- en: Finally, ROC-AUC captures the **ranking ability** of the model, which makes
    it especially useful for imbalanced datasets.
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，ROC-AUC 捕捉了模型的**排名能力**，这使得它在处理不平衡数据集时特别有用。
- en: '* * *'
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Dataset
  id: totrans-182
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数据集
- en: The [IBM HR Analytics Employee Attrition dataset](https://www.kaggle.com/datasets/pavansubhasht/ibm-hr-analytics-attrition-dataset)
    used in this article is from Kaggle, which is licensed under CC0 (Public Domain),
    making it safe for use in this analysis and publication.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 本文使用的 [IBM HR Analytics 员工流失数据集](https://www.kaggle.com/datasets/pavansubhasht/ibm-hr-analytics-attrition-dataset)
    来自 Kaggle，该数据集在 CC0 (公共领域) 许可下，这使得它在分析和发表中安全使用。
- en: '* * *'
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: I hope you found this article helpful.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望你觉得这篇文章有帮助。
- en: If you haven’t read my recent blog on the [Gini Coefficient](https://towardsdatascience.com/beyond-roc-auc-and-ks-gini-coefficient-explained-simply/)
    in the context of ML and finance yet, you can check it out here.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
