    [*Neural Style Transfer (NST)*](https://towardsdatascience.com/paper-walkthrough-neural-style-transfer-fc5c978cdaed)*,
    and* [*Transformer*](https://towardsdatascience.com/paper-walkthrough-attention-is-all-you-need-80399cdc59e1)*.*'
