- en: 'Diffusion Model Paper Walkthrough: The Art of Noise'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 扩散模型论文解读：噪声的艺术
- en: 原文：[https://towardsdatascience.com/the-art-of-noise/](https://towardsdatascience.com/the-art-of-noise/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/the-art-of-noise/](https://towardsdatascience.com/the-art-of-noise/)
- en: '**<mdspan datatext="el1743642535607" class="mdspan-comment">Introduction</mdspan>**'
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**<mdspan datatext="el1743642535607" class="mdspan-comment">引言</mdspan>**'
- en: In my last several articles I talked about generative deep learning algorithms,
    which mostly are related to text generation tasks. So, I think it would be interesting
    to switch to generative algorithms for image generation now. We knew that nowadays
    there have been plenty of deep learning models specialized for generating images
    out there, such as Autoencoder, Variational Autoencoder (VAE), Generative Adversarial
    Network (GAN) and Neural Style Transfer (NST). I actually got some of my writings
    about these topics posted on Medium as well. I provide you the links at the end
    of this article if you want to read them.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在我之前的几篇文章中，我讨论了生成式深度学习算法，这些算法大多与文本生成任务相关。因此，我认为现在转向图像生成的生成算法会很有趣。我们知道，如今已经有许多专门用于生成图像的深度学习模型，例如自动编码器、变分自动编码器（VAE）、生成对抗网络（GAN）和神经风格迁移（NST）。实际上，我的一些关于这些主题的文章也发布在Medium上。如果你想阅读它们，我会在文章末尾提供链接。
- en: In today’s article, I would like to discuss the so-called *diffusion model *— one
    of the most impactful models in the field of deep learning for image generation.
    The idea of this algorithm was first proposed in the paper titled *Deep Unsupervised
    Learning using Nonequilibrium Thermodynamics* written by Sohl-Dickstein *et al.*
    back in 2015 [1]. Their framework was then developed further by Ho *et al.* in
    2020 in their paper titled *Denoising Diffusion Probabilistic Models* [2]. *DDPM*
    was later adapted by OpenAI and Google to develop DALLE-2 and Imagen, which we
    knew that these models have impressive capabilities to generate high-quality images.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在今天的文章中，我想讨论所谓的*扩散模型*——这是图像生成领域深度学习中最具影响力的模型之一。这个算法的想法最初是在2015年由Sohl-Dickstein等人撰写的题为《使用非平衡热力学进行深度无监督学习》的论文中提出的
    [1]。随后，Ho等人于2020年在他们的论文《去噪扩散概率模型》中进一步发展了这一框架 [2]。*DDPM*后来被OpenAI和Google采用，以开发DALLE-2和Imagen，我们知道这些模型在生成高质量图像方面具有令人印象深刻的性能。
- en: '**How Diffusion Model Works**'
  id: totrans-5
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**扩散模型的工作原理**'
- en: Generally speaking, diffusion model works by generating image from noise. We
    can think of it like an artist transforming a splash of paint on a canvas into
    a beautiful artwork. In order to do so, the diffusion model needs to be trained
    first. There are two main steps required to be followed to train the model, namely
    *forward diffusion* and *backward diffusion*.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 通常来说，扩散模型通过从噪声中生成图像来工作。我们可以将其想象成一个艺术家将画布上的溅泼颜料变成一幅美丽的艺术品。为了做到这一点，扩散模型首先需要被训练。训练模型需要遵循两个主要步骤，即*前向扩散*和*后向扩散*。
- en: '![](../Images/835ea2c8630817bd6009775bebdfb8f9.png)'
  id: totrans-7
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/835ea2c8630817bd6009775bebdfb8f9.png)'
- en: Figure 1\. The forward and backward diffusion process [3].
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 图1. 前向和后向扩散过程 [3]。
- en: As you can see in the above figure, forward diffusion is a process where Gaussian
    noise is applied to the original image iteratively. We keep adding the noise until
    the image is completely unrecognizable, at which point we can say that the image
    now lies in the *latent space*. Different from Autoencoders and GANs where the
    latent space typically has a lower dimension than the original image, the latent
    space in DDPM maintains the exact same dimensionality as the original one. This
    noising process follows the principle of a Markov Chain, meaning that the image
    at timestep *t* is affected only by timestep *t*-1\. Forward diffusion is considered
    easy since what we basically do is just adding some noise step by step.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 如上图所示，前向扩散是一个迭代地将高斯噪声应用于原始图像的过程。我们持续添加噪声，直到图像完全无法辨认，此时我们可以认为图像现在位于*潜在空间*中。与潜在空间通常比原始图像维度低的Autoencoders和GANs不同，DDPM中的潜在空间保持了与原始图像完全相同的维度。这一噪声过程遵循马尔可夫链的原则，意味着图像在时间步长*t*时只受时间步长*t*-1的影响。前向扩散被认为相对简单，因为我们基本上只是逐步添加一些噪声。
- en: The second training phase is called backward diffusion, which our objective
    here is to remove the noise little by little until we obtain a clear image. This
    process follows the principle of the *reverse* Markov Chain, where the image at
    timestep *t*-1 can only be obtained based on the image at timestep *t*. Such a
    denoising process is really difficult since we need to guess which pixels are
    noise and which ones belong to the actual image content. Thus, we need to employ
    a neural network model to do so.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 第二个训练阶段被称为反向扩散，我们的目标是逐步去除噪声，直到获得清晰的图像。这个过程遵循*反向*马尔可夫链的原则，其中时间步长*t*-1的图像只能基于时间步长*t*的图像获得。这种去噪过程非常困难，因为我们需要猜测哪些像素是噪声，哪些像素属于实际图像内容。因此，我们需要使用神经网络模型来完成这项工作。
- en: DDPM uses U-Net as the basis of the deep learning architecture for backward
    diffusion. However, instead of using the original U-Net model [4], we need to
    make several modifications to it so that it will be more suitable for our task.
    Later on, I am going to train this model on the MNIST Handwritten Digit dataset
    [5], and we will see whether it can generate similar images.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: DDPM使用U-Net作为反向扩散深度学习架构的基础。然而，我们不是使用原始的U-Net模型[4]，而是需要对其进行一些修改，以便使其更适合我们的任务。稍后，我将在MNIST手写数字数据集[5]上训练这个模型，我们将看看它是否能够生成类似的图像。
- en: Well, that was pretty much all the fundamental concepts you need to know about
    diffusion models for now. In the next sections we are going to get even deeper
    into the details while implementing the algorithm from scratch.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧，这就是你现在需要了解的关于扩散模型的所有基本概念。在接下来的几节中，我们将更深入地探讨细节，并从头开始实现算法。
- en: '* * *'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '**PyTorch Implementation**'
  id: totrans-14
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**PyTorch实现**'
- en: We are going to start by importing the required modules. In case you’re not
    yet familiar with the imports below, both `torch` and `torchvision` are the libraries
    we’ll use for preparing the model and the dataset. Meanwhile, `matplotlib` and
    `tqdm` will help us display images and progress bars.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将首先导入所需的模块。如果你还不熟悉下面的导入，`torch`和`torchvision`是我们将用于准备模型和数据集的库。同时，`matplotlib`和`tqdm`将帮助我们显示图像和进度条。
- en: '[PRE0]'
  id: totrans-16
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: As the modules have been imported, the next thing to do is to initialize some
    config parameters. Look at the Codeblock 2 below for the details.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 模块导入完成后，接下来要做的是初始化一些配置参数。请查看下面的代码块2以获取详细信息。
- en: '[PRE1]'
  id: totrans-18
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '[PRE2]'
  id: totrans-19
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: At the lines marked with `#(1)` and `#(2)` I set `IMAGE_SIZE` and `NUM_CHANNELS`
    to 28 and 1, which these numbers are obtained from the image dimension in the
    MNIST dataset. The `BATCH_SIZE`, `NUM_EPOCHS`, and `LEARNING_RATE` variables are
    pretty straightforward, so I don’t think I need to explain them further.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 在标记为`#(1)`和`#(2)`的行中，我将`IMAGE_SIZE`和`NUM_CHANNELS`设置为28和1，这些数字是从MNIST数据集中的图像维度获得的。`BATCH_SIZE`、`NUM_EPOCHS`和`LEARNING_RATE`变量相当直观，所以我认为没有必要进一步解释。
- en: At line `#(3)`, the variable `NUM_TIMESTEPS` denotes the number of iterations
    in the forward and backward diffusion process. Timestep 0 is the condition where
    the image is in its original state (the leftmost image in Figure 1). In this case,
    since we set this parameter to 1000, timestep number 999 is going to be the condition
    where the image is completely unrecognizable (the rightmost image in Figure 1).
    It is important to keep in mind that the choice of the number of timesteps involves
    a tradeoff between model accuracy and computational cost. If we assign a small
    value for `NUM_TIMESTEPS`, the inference time is going to be shorter, yet the
    resulting image might not be really good since the model has fewer steps to refine
    the image in the backward diffusion stage. On the other hand, increasing `NUM_TIMESTEPS`
    will slow down the inference process, but we can expect the output image to have
    better quality thanks to the gradual denoising process which results in a more
    precise reconstruction.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 在标记为`#(3)`的行中，变量`NUM_TIMESTEPS`表示正向和反向扩散过程中的迭代次数。时间步长0是图像在其原始状态下的条件（图1中最左边的图像）。在这种情况下，由于我们将此参数设置为1000，时间步长999将是图像完全无法识别的条件（图1中最右边的图像）。重要的是要记住，时间步长数量的选择涉及模型精度和计算成本之间的权衡。如果我们为`NUM_TIMESTEPS`分配一个较小的值，推理时间将会更短，但生成的图像可能并不理想，因为模型在反向扩散阶段对图像的细化步骤较少。另一方面，增加`NUM_TIMESTEPS`将减慢推理过程，但我们可以期待输出图像的质量会更好，因为逐步去噪过程会导致更精确的重构。
- en: Next, the `BETA_START` (`#(4)`) and `BETA_END` (`#(5)`) variables are used to
    control the amount of Gaussian noise added at each timestep, whereas `TIME_EMBED_DIM`
    (`#(6)`) is employed to determine the feature vector length for storing the timestep
    information. Lastly, at line `#(7)` I assign `“cuda”` to the `DEVICE` variable
    if PyTorch detects GPU installed in our machine. I highly recommend you run this
    project on GPU since training a diffusion model is computationally expensive.
    In addition to the above parameters, the values set for `NUM_TIMESTEPS`, `BETA_START`
    and `BETA_END` are all adopted directly from the DDPM paper [2].
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，`BETA_START` (`#(4)`) 和 `BETA_END` (`#(5)`) 变量用于控制每个时间步添加的高斯噪声量，而 `TIME_EMBED_DIM`
    (`#(6)`) 用于确定存储时间步信息的特征向量长度。最后，在行 `#(7)` 中，如果 PyTorch 检测到我们的机器中安装了 GPU，我将 `“cuda”`
    分配给 `DEVICE` 变量。我强烈建议你在 GPU 上运行这个项目，因为训练扩散模型计算成本很高。除了上述参数外，`NUM_TIMESTEPS`、`BETA_START`
    和 `BETA_END` 的值都是直接从 DDPM 论文 [2] 中采用的。
- en: 'The complete implementation will be done in several steps: constructing the
    U-Net model, preparing the dataset, defining noise scheduler for the diffusion
    process, training, and inference. We are going to discuss each of those stages
    in the following sub-sections.'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 完整的实现将分为几个步骤：构建 U-Net 模型、准备数据集、定义扩散过程的噪声调度器、训练和推理。我们将在接下来的子节中讨论这些阶段。
- en: '* * *'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '**The U-Net Architecture: Time Embedding**'
  id: totrans-25
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**U-Net 架构：时间嵌入**'
- en: As I’ve mentioned earlier, the basis of a diffusion model is U-Net. This architecture
    is used because its output layer is suitable to represent an image, which definitely
    makes sense since it was initially introduced for image segmentation task at the
    first place. The following figure shows what the original U-Net architecture looks
    like.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 如我之前提到的，扩散模型的基础是 U-Net。这种架构被使用是因为其输出层适合表示图像，这确实很有意义，因为它是首先为图像分割任务而引入的。以下图展示了原始
    U-Net 架构的样子。
- en: '![](../Images/60509abfcb359bce4bff96b4abcf2f59.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/60509abfcb359bce4bff96b4abcf2f59.png)'
- en: Figure 2\. The original U-Net model proposed in [4].
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2. 在 [4] 中提出的原始 U-Net 模型。
- en: However, it is necessary to modify this architecture so that it can also take
    into account the timestep information. Not only that, since we will only use MNIST
    dataset, we also need to make the model smaller. Just remember the convention
    in deep learning that simpler models are often more effective for simple tasks.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，有必要修改这个架构，使其也能考虑到时间步信息。不仅如此，由于我们只会使用 MNIST 数据集，我们还需要使模型更小。记住深度学习中的惯例：对于简单任务，简单的模型通常更有效。
- en: In the figure below I show you the entire U-Net model that has been modified.
    Here you can see that the *time embedding* tensor is injected to the model at
    every stage, which will later be done by element-wise summation, allowing the
    model to capture the timestep information. Next, instead of repeating each of
    the downsampling and the upsampling stages four times like the original U-Net,
    in this case we will only repeat each of them twice. Additionally, it is worth
    noting that the stack of downsampling stages is also known as the *encoder*, whereas
    the stack of upsampling stages is often called the *decoder*.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 在下面的图中，我展示了修改后的整个 U-Net 模型。在这里，你可以看到 *时间嵌入* 张量被注入到模型的每个阶段，这将通过元素级加和来完成，使模型能够捕捉到时间步信息。接下来，与原始
    U-Net 不同，在这种情况下，我们将每个阶段只重复两次。此外，值得注意的是，下采样阶段的堆叠也被称为 *编码器*，而上采样阶段的堆叠通常被称为 *解码器*。
- en: '![](../Images/c68ef10780383824386d29fc6eed7053.png)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c68ef10780383824386d29fc6eed7053.png)'
- en: Figure 3\. The modified U-Net model for our diffusion task [3].
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3. 用于我们的扩散任务的修改后的 U-Net 模型 [3]。
- en: Now let’s start constructing the architecture by creating a class for generating
    the time embedding tensor, which the idea is similar to the *positional embedding*
    in Transformer. See the Codeblock 3 below for the details.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们通过创建一个用于生成时间嵌入张量的类来开始构建架构，这个想法与 Transformer 中的 *位置嵌入* 类似。下面 Codeblock
    3 中有详细说明。
- en: '[PRE3]'
  id: totrans-34
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: What we basically do in the above code is to create a tensor of size `NUM_TIMESTEPS`
    × `TIME_EMBED_DIM` (1000×32), where every single row of this tensor will contain
    the timestep information. Later on, each of the 1000 timesteps will be represented
    by a feature vector of length 32\. The values in the tensor themselves are obtained
    based on the two equations in Figure 4\. In the Codeblock 3 above, these two equations
    are implemented at line `#(1)` and `#(2)`, each forming a tensor having the size
    of 1000×16\. Next, these tensors are combined using the code at line `#(3)` and
    `#(4)`.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 在上面的代码中，我们基本上创建了一个大小为 `NUM_TIMESTEPS` × `TIME_EMBED_DIM`（1000×32）的张量，其中这个张量的每一行都将包含时间步信息。稍后，每个
    1000 个时间步都将由一个长度为 32 的特征向量表示。张量中的值是基于图 4 中的两个方程获得的。在上面的代码块 3 中，这两个方程在行 `#(1)`
    和 `#(2)` 中实现，每个方程形成一个大小为 1000×16 的张量。接下来，这些张量通过行 `#(3)` 和 `#(4)` 中的代码组合在一起。
- en: Here I also print out every single step done in the above codeblock so that
    you can get a better understanding of what is actually being done in the TimeEmbedding
    class. If you still want more explanation about the above code, feel free to read
    my previous post about Transformer which you can access through the link at the
    end of this article. Once you clicked the link, you can just scroll all the way
    down to the Positional Encoding section.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 我还打印出了上述代码块中执行的每个步骤，以便你能更好地理解在 TimeEmbedding 类中实际做了什么。如果你还想了解更多关于上述代码的解释，请随时阅读我之前关于
    Transformer 的帖子，你可以通过本文末尾的链接访问。一旦点击链接，你只需滚动到底部的位置编码部分即可。
- en: '![](../Images/b038e6f1b234c1a36195d5f329c314c0.png)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/b038e6f1b234c1a36195d5f329c314c0.png)'
- en: Figure 4\. The sinusoidal positional encoding formula from the Transformer paper
    [6].
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 图 4. 来自 Transformer 论文的正弦位置编码公式 [6]。
- en: Now let’s check if the `TimeEmbedding` class works properly using the following
    testing code. The resulting output shows that it successfully produced a tensor
    of size 1000×32, which is exactly what we expected earlier.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们使用以下测试代码检查 `TimeEmbedding` 类是否正常工作。结果输出显示，它成功生成了一个大小为 1000×32 的张量，这正是我们之前预期的。
- en: '[PRE4]'
  id: totrans-40
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: '[PRE5]'
  id: totrans-41
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: '* * *'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '**The U-Net Architecture: DoubleConv**'
  id: totrans-43
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**U-Net 架构：DoubleConv**'
- en: If you take a closer look at the modified architecture, you will see that we
    actually got lots of repeating patterns, such as the ones highlighted in yellow
    boxes in the following figure.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你仔细观察修改后的架构，你会看到我们实际上得到了很多重复的模式，如下图中黄色框中突出显示的那样。
- en: '![](../Images/f52f3c8c642ec3988ed562a591782c78.png)'
  id: totrans-45
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/f52f3c8c642ec3988ed562a591782c78.png)'
- en: Figure 5\. The processes done inside the yellow boxes will be implemented in
    the `DoubleConv` class [3].
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 图 5. 黄色框内执行的过程将在 `DoubleConv` 类 [3] 中实现。
- en: These five yellow boxes share the same structure, where they consist of two
    convolution layers with the time embedding tensor injected right after the first
    convolution operation is performed. So, what we are going to do now is to create
    another class named `DoubleConv` to reproduce this structure. Look at the Codeblock
    5a and 5b below to see how I do that.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 这五个黄色框具有相同的结构，其中它们由两个卷积层组成，时间嵌入张量在第一个卷积操作执行后立即注入。因此，我们现在要创建另一个名为 `DoubleConv`
    的类来重现这种结构。请看下面的代码块 5a 和 5b，以了解我是如何做到这一点的。
- en: '[PRE6]'
  id: totrans-48
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: The two inputs of the `__init__()` method above gives us flexibility to configure
    the number of input and output channels (`#(1)`) so that the `DoubleConv` class
    can be used to instantiate all the five yellow boxes simply by adjusting its input
    arguments. As the name suggests, here we initialize two convolution layers (line
    `#(2)` and `#(6)`), each followed by a batch normalization layer and a ReLU activation
    function. Keep in mind that the two normalization layers need to be initialized
    separately (line `#(3)` and `#(7)`) since each of them has their own trainable
    normalization parameters. Meanwhile, the ReLU activation function should only
    be initialized once (`#(8)`) because it contains no parameters, allowing it to
    be used multiple times in different parts of the network. At line `#(4)`, we initialize
    the `TimeEmbedding` layer we created earlier, which will later be connected to
    a standard linear layer (`#(5)`). This linear layer is responsible to adjust the
    dimension of the time embedding tensor so that the resulting output can be summed
    with the output from the first convolution layer in an element-wise manner.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 上面的`__init__()`方法的两个输入为我们提供了配置输入和输出通道数量（`#(1)`）的灵活性，这样`DoubleConv`类就可以通过调整其输入参数简单地实例化所有五个黄色框。正如其名称所暗示的，在这里我们初始化了两个卷积层（`#(2)`行和`#(6)`行），每个卷积层后面都跟着一个批量归一化层和一个ReLU激活函数。请注意，两个归一化层需要分别初始化（`#(3)`行和`#(7)`行），因为它们各自有自己的可训练归一化参数。同时，ReLU激活函数只需要初始化一次（`#(8)`行），因为它不包含任何参数，允许它在网络的多个不同部分多次使用。在`#(4)`行，我们初始化了我们之前创建的`TimeEmbedding`层，它将被连接到一个标准的线性层（`#(5)`行）。这个线性层负责调整时间嵌入张量的维度，以便结果输出可以以逐元素的方式与第一个卷积层的输出相加。
- en: 'Now let’s take a look at the Codeblock 5b below to better understand the flow
    of the `DoubleConv` block. Here you can see that the `forward()` method accepts
    two inputs: the raw image `x` and the timestep information `t` as shown at line
    `#(1)`. We initially process the image with the first Conv-BN-ReLU sequence (`#(2–4)`).
    This Conv-BN-ReLU structure is typically used when working with CNN-based models,
    even if the illustration does not explicitly show the batch normalization and
    the ReLU layers. Apart from the image, we then take the *t*-th timestep information
    from our embedding tensor of the corresponding image (`#(5)`) and pass it through
    the linear layer (`#(6)`). We still need to expand the dimension of the resulting
    tensor using the code at line `#(7)` before performing element-wise summation
    at line `#(8)`. Finally, we process the resulting tensor with the second Conv-BN-ReLU
    sequence (`#(9–11)`).'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们看一下下面的Codeblock 5b，以更好地理解`DoubleConv`块的流程。在这里，你可以看到`forward()`方法接受两个输入：原始图像`x`和如`#(1)`行所示的时间步信息。我们最初使用第一个Conv-BN-ReLU序列（`#(2–4)`）处理图像。这种Conv-BN-ReLU结构通常用于处理基于CNN的模型，即使插图没有明确显示批量归一化和ReLU层。除了图像之外，我们还从对应图像的嵌入张量中取出第`t`个时间步信息（`#(5)`行），并通过线性层（`#(6)`行）传递。在执行`#(8)`行的逐元素加和之前，我们仍然需要使用`#(7)`行的代码来扩展结果张量的维度。最后，我们使用第二个Conv-BN-ReLU序列（`#(9–11)`）处理得到的张量。
- en: '[PRE7]'
  id: totrans-51
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: To see if our `DoubleConv` implementation works properly, we are going to test
    it with the Codeblock 6 below. Here I want to simulate the very first instance
    of this block, which corresponds to the leftmost yellow box in Figure 5\. To do
    so, we need to we need to set the `in_channels` and `out_channels` parameters
    to 1 and 64, respectively (`#(1)`). Next, we initialize two input tensors, namely
    `x_test` and `t_test`. The `x_test` tensor has the size of 2×1×28×28, representing
    a batch of two grayscale images having the size of 28×28 (`#(2)`). Keep in mind
    that this is just a dummy tensor of random values which will be replaced with
    the actual images from MNIST dataset later in the training phase. Meanwhile, `t_test`
    is a tensor containing the timestep numbers of the corresponding images (`#(3)`).
    The values for this tensor are randomly selected between 0 and `NUM_TIMESTEPS`
    (1000). Note that the datatype of this tensor must be an integer since the numbers
    will be used for indexing, as shown at line `#(5)` back in Codeblock 5b. Lastly,
    at line `#(4)` we pass both `x_test` and `t_test` tensors to the `double_conv_test`
    layer.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 为了检查我们的`DoubleConv`实现是否正常工作，我们将使用下面的代码块6进行测试。在这里，我想模拟这个块的第一个实例，这对应于图5中左边的最黄色方框。为此，我们需要将`in_channels`和`out_channels`参数分别设置为1和64（`#(1)`）。接下来，我们初始化两个输入张量，即`x_test`和`t_test`。`x_test`张量的大小为2×1×28×28，代表一个大小为28×28的灰度图像的批次。请注意，这只是一个随机值的虚拟张量，在训练阶段稍后将被MNIST数据集中的实际图像所替换。同时，`t_test`是一个包含对应图像时间步数的张量（`#(3)`）。这个张量的值在0和`NUM_TIMESTEPS`（1000）之间随机选择。请注意，这个张量的数据类型必须是整数，因为数字将被用于索引，正如在代码块5b中的`#(5)`行所示。最后，在`#(4)`行，我们将`x_test`和`t_test`张量传递给`double_conv_test`层。
- en: By the way, I re-run the previous codeblocks with the `print()` functions removed
    prior to running the following code so that the outputs will look neater.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 顺便说一下，我在运行下面的代码之前移除了之前的代码块中的`print()`函数，以便使输出看起来更整洁。
- en: '[PRE8]'
  id: totrans-54
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: '[PRE9]'
  id: totrans-55
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: The shape of our original input tensors can be seen at lines `#(1)` and `#(2)`
    in the above output. Specifically at line `#(2)`, I also print out the two timesteps
    that we selected randomly. In this example we assume that each of the two images
    in the x tensor are already noised with the noise level from 468-th and 304-th
    timesteps prior to being fed into the network. We can see that the shape of the
    image tensor x changes to 2×64×28×28 after being passed through the first convolution
    layer (`#(3)`). Meanwhile, the size of our time embedding tensor becomes 2×32
    (`#(4)`), which is obtained by extracting rows 468 and 304 from the original embedding
    of size 1000×32\. In order to allow element-wise summation to be performed (`#(6)`),
    we need to map the 32-dimensional time embedding vectors into 64 and expand their
    axes, resulting in a tensor of size 2×64×1×1 (`#(5)`) so that it can be broadcast
    to the 2×64×28×28 tensor. After the summation is done, we then pass the tensor
    through the second convolution layer, at which point the tensor dimension does
    not change at all (`#(7)`).
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以在上述输出的`#(1)`和`#(2)`行中看到原始输入张量的形状。具体来说，在`#(2)`行，我还打印出了我们随机选择的两个时间步。在这个例子中，我们假设x张量中的两个图像在输入网络之前已经用468次和304次时间步的噪声水平进行了噪声处理。我们可以看到，图像张量x在通过第一个卷积层（`#(3)`）后，其形状变为2×64×28×28。同时，我们的时间嵌入张量的大小变为2×32（`#(4)`），这是通过从原始的1000×32大小的嵌入中提取第468行和第304行得到的。为了允许执行逐元素求和（`#(6)`），我们需要将32维的时间嵌入向量映射到64维，并扩展它们的轴，从而得到一个大小为2×64×1×1的张量（`#(5)`），这样它就可以广播到2×64×28×28的张量。求和完成后，我们再将张量通过第二个卷积层，此时张量的维度没有任何变化（`#(7)`）。
- en: '* * *'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '**The U-Net Architecture: Encoder**'
  id: totrans-58
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**U-Net架构：编码器**'
- en: As we have successfully implemented the `DoubleConv` block, the next step to
    do is to implement the so-called `DownSample` block. In Figure 6 below, this corresponds
    to the parts enclosed in the red box.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们已经成功实现了`DoubleConv`块，下一步要做的是实现所谓的`DownSample`块。在下面的图6中，这对应于红色方框内的部分。
- en: '![](../Images/2aef8ffa16d21d562b0db1d565d59722.png)'
  id: totrans-60
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/2aef8ffa16d21d562b0db1d565d59722.png)'
- en: Figure 6\. The parts of the network highlighted in red are the so-called `DownSample`
    blocks [3].
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 图6。用红色突出显示的网络部分是所谓的`DownSample`块[3]。
- en: The purpose of a `DownSample` block is to reduce the spatial dimension of an
    image, but it is important to note that at the same time it increases the number
    of channels. In order to achieve this, we can simply stack a `DoubleConv` block
    and a maxpooling operation. In this case the pooling uses 2×2 kernel size with
    the stride of 2, causing the spatial dimension of the image to be twice as small
    as the input. The implementation of this block can be seen in Codeblock 7 below.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: '`DownSample`块的作用是减少图像的空间维度，但重要的是要注意，同时它增加了通道数。为了实现这一点，我们可以简单地堆叠一个`DoubleConv`块和一个最大池化操作。在这种情况下，池化使用2×2的核大小和步长为2，导致图像的空间维度是输入的一半。这个块的实现可以在下面的代码块7中看到。'
- en: '[PRE10]'
  id: totrans-63
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Here I set the `__init__()` method to take number of input and output channels
    so that we can use it for creating the two `DownSample` blocks highlighted in
    Figure 6 without needing to write them in separate classes (`#(1)`). Next, the
    `DoubleConv` and the maxpooling layers are initialized at line `#(2)` and `#(3)`,
    respectively. Remember that since the `DoubleConv` block accepts image `x` and
    the corresponding timestep `t` as the inputs, we also need to set the `forward()`
    method of this `DownSample` block such that it accepts both of them as well (`#(4)`).
    The information contained in x and t are then combined as the two tensors are
    processed by the `double_conv` layer, which the output is stored in the variable
    named `convolved` (`#(5)`). Afterwards, we now actually perform the downsampling
    with the maxpooling operation at line `#(6)`, producing a tensor named `maxpooled`.
    It is important to note that both the `convolved` and `maxpooled` tensors are
    going to be returned, which is essentially done because we will later bring `maxpooled`
    to the next downsampling stage, whereas the `convolved` tensor will be transferred
    directly to the upsampling stage in the decoder through skip-connections.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我将`__init__()`方法设置为接受输入和输出通道数，这样我们就可以使用它来创建图6中突出显示的两个`DownSample`块，而无需单独编写它们（`#(1)`）。接下来，`DoubleConv`和最大池化层分别在行`#(2)`和`#(3)`初始化。记住，由于`DoubleConv`块接受图像`x`和对应的时间步`t`作为输入，我们还需要设置这个`DownSample`块的`forward()`方法，使其也接受这两个输入（`#(4)`）。`x`和`t`包含的信息随后被组合，当两个张量通过`double_conv`层处理时，输出存储在名为`convolved`的变量中（`#(5)`）。之后，我们现在实际上在行`#(6)`执行下采样，使用最大池化操作产生一个名为`maxpooled`的张量。重要的是要注意，`convolved`和`maxpooled`两个张量都将被返回，这主要是因为我们稍后会将`maxpooled`带到下一个下采样阶段，而`convolved`张量将通过跳跃连接直接传输到解码器中的上采样阶段。
- en: Now let’s test the `DownSample` class using the Codeblock 8 below. The input
    tensors used here are exactly the same as the ones in Codeblock 6\. Based on the
    resulting output, we can see that the pooling operation successfully converted
    the output of the `DoubleConv` block from 2×64×28×28 (`#(1)`) to 2×64×14×14 (`#(2)`),
    indicating that our DownSample class works properly.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们使用下面的代码块8测试`DownSample`类。这里使用的输入张量与代码块6中的完全相同。根据产生的输出，我们可以看到池化操作成功地将`DoubleConv`块的输出从2×64×28×28
    (`#(1)`)转换为2×64×14×14 (`#(2)`)，这表明我们的`DownSample`类工作正常。
- en: '[PRE11]'
  id: totrans-66
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: '[PRE12]'
  id: totrans-67
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: '* * *'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '**The U-Net Architecture: Decoder**'
  id: totrans-69
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**U-Net架构：解码器**'
- en: We need to introduce the so-called `UpSample` block in the decoder, which is
    responsible for reverting the tensor in the intermediate layers to the original
    image dimension. In order to maintain a symmetrical structure, the number of `UpSample`
    blocks must match that of the `DownSample` blocks. Look at the Figure 7 below
    to see where the two `UpSample` blocks are placed.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要在解码器中引入所谓的`UpSample`块，该块负责将中间层的张量还原到原始图像维度。为了保持对称结构，`UpSample`块的数量必须与`DownSample`块的数量相匹配。查看下面的图7，以了解两个`UpSample`块的位置。
- en: '![](../Images/19d045fe28a84240c76cb24f6857e7cf.png)'
  id: totrans-71
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/19d045fe28a84240c76cb24f6857e7cf.png)'
- en: Figure 7\. The components inside the blue boxes are the so-called `UpSample`
    blocks [3].
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 图7。蓝色框内的组件是所谓的`UpSample`块 [3]。
- en: Since both `UpSample` blocks are structurally identical, we can just initialize
    a single class for them, just like the `DownSample` class we created earlier.
    Look at the Codeblock 9 below to see how I implement it.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 由于两个`UpSample`块在结构上完全相同，我们可以为它们初始化一个单独的类，就像我们之前创建的`DownSample`类一样。查看下面的代码块9，以了解我是如何实现它的。
- en: '[PRE13]'
  id: totrans-74
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: In the `__init__()` method, we use `nn.ConvTranspose2d` to upsample the spatial
    dimension (`#(1)`). Both the kernel size and stride are set to 2 so that the output
    will be twice as large (`#(2)`). Next, the `DoubleConv` block will be employed
    to reduce the number of channels, while at the same time combining the timestep
    information from the time embedding tensor (`#(3)`).
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 在`__init__()`方法中，我们使用`nn.ConvTranspose2d`上采样空间维度（`#(1)`）。内核大小和步长都设置为2，以便输出将是原来的两倍大（`#(2)`）。接下来，将使用`DoubleConv`块来减少通道数，同时结合时间嵌入张量（`#(3)`）中的时间步信息。
- en: The flow of this `UpSample` class is a bit more complicated than the `DownSample`
    class. If we take a closer look at the architecture, we’ll see that that we also
    have a skip-connection coming directly from the encoder. Thus, we need the `forward()`
    method to accept another argument in addition to the original image `x` and the
    timestep `t`, namely the residual tensor `connection` (`#(4)`). The first thing
    we do inside this method is to process the original image `x` with the transpose
    convolution layer (`#(5)`). In fact, not only upsampling the spatial size, but
    this layer also reduces the number of channels at the same time. However, the
    resulting tensor is then directly concatenated with `connection` in a channel-wise
    manner (`#(6)`), causing it to seem like no channel reduction is performed. It
    is important to know that at this point these two tensors are just concatenated,
    meaning that the information from the two are not yet combined. We finally feed
    these concatenated tensors to the `double_conv` layer (`#(7)`), allowing them
    to share information to each other through the learnable parameters inside the
    convolution layers.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 这个`UpSample`类的流程比`DownSample`类要复杂一些。如果我们仔细观察其架构，会发现我们还有一个从编码器直接来的跳跃连接。因此，`forward()`方法除了接受原始图像`x`和时间步`t`之外，还需要接受另一个参数，即残差张量`connection`（`#(4)`）。在这个方法内部的第一件事就是用转置卷积层（`#(5)`）处理原始图像`x`。实际上，这个层不仅上采样了空间大小，同时也在减少通道数。然而，得到的张量随后直接以通道方式与`connection`连接（`#(6)`），看起来像是没有进行通道减少。重要的是要知道，在这个点上，这两个张量只是连接在一起，这意味着它们的信息还没有结合。我们最后将这些连接的张量输入到`double_conv`层（`#(7)`），通过卷积层内部的可学习参数使它们能够相互分享信息。
- en: The Codeblock 10 below shows how I test the `UpSample` class. The size of the
    tensors to be passed through are set according to the second upsampling block,
    i.e., the rightmost blue box in Figure 7.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的代码块10展示了我是如何测试`UpSample`类的。要传递的张量大小是根据第二个上采样块设置的，即图7中最右侧的蓝色框。
- en: '[PRE14]'
  id: totrans-78
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: In the resulting output below, if we compare the input tensor (`#(1)`) with
    the final tensor shape (`#(2)`), we can clearly see that the number of channels
    successfully reduced from 128 to 64, while at the same time the spatial dimension
    increased from 14×14 to 28×28\. This essentially means that our `UpSample` class
    is now ready to be used in the main U-Net architecture.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 在下面的输出结果中，如果我们比较输入张量（`#(1)`）和最终张量形状（`#(2)`），我们可以清楚地看到通道数成功从128减少到64，同时空间维度从14×14增加到28×28。这实际上意味着我们的`UpSample`类现在可以用于主U-Net架构。
- en: '[PRE15]'
  id: totrans-80
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: '* * *'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '**The U-Net Architecture: Putting All Components Together**'
  id: totrans-82
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**U-Net架构：将所有组件组合在一起**'
- en: Once all U-Net components have been created, what we are going to do next is
    to wrap them together into a single class. Look at the Codeblock 11a and 11b below
    for the details.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦创建了所有U-Net组件，我们接下来要做的是将它们组合成一个单独的类。请查看下面的代码块11a和11b以获取详细信息。
- en: '[PRE16]'
  id: totrans-84
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: You can see in the `__init__()` method above that we initialize two downsampling
    (`#(1–2)`) and two upsampling (`#(4–5)`) blocks, which the number of input and
    output channels are set according to the architecture shown in the illustration.
    There are actually two additional components I haven’t explained yet, namely the
    *bottleneck* (`#(3)`) and the *output* layer (`#(6)`). The former is essentially
    just a `DoubleConv` block, which acts as the main connection between the encoder
    and the decoder. Look at the Figure 8 below to see which components of the network
    belong to the *bottleneck* layer. Next, the *output* layer is a standard convolution
    layer which is responsible to turn the 64-channel image produced by the last `UpSampling`
    stage into 1-channel only. This operation is done using a kernel of size 1×1,
    meaning that it combines information across all channels while operating independently
    at each pixel position.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 在上面的`__init__()`方法中，你可以看到我们初始化了两个下采样（`#(1–2)`）和两个上采样（`#(4–5)`）块，输入和输出通道的数量根据图示中的架构设置。实际上还有两个我尚未解释的额外组件，即*瓶颈*（`#(3)`）和*输出*层（`#(6)`）。前者本质上只是一个`DoubleConv`块，它作为编码器和解码器之间的主要连接。查看下面的图8，以了解网络中哪些组件属于*瓶颈*层。接下来，*输出*层是一个标准的卷积层，它负责将最后`UpSampling`阶段产生的64通道图像转换为仅1通道。这个操作使用的是1×1大小的核，这意味着它在每个像素位置独立操作的同时，结合了所有通道的信息。
- en: '![](../Images/be41547dcfd954102c0dedece943eaf8.png)'
  id: totrans-86
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/be41547dcfd954102c0dedece943eaf8.png)'
- en: Figure 8\. The bottleneck layer (the lower part of the model) acts as the main
    bridge between the encoder and the decoder of U-Net [3].
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 图8. 瓶颈层（模型的下部分）作为U-Net [3]编码器和解码器之间的主要桥梁。
- en: I guess the `forward()` method of the entire U-Net in the following codeblock
    is pretty straightforward, as what we essentially do here is pass the tensors
    from one layer to another — just don’t forget to include the skip connections
    between the downsampling and upsampling blocks.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 我猜在下面的代码块中，整个U-Net的`forward()`方法相当直接，因为我们在这里本质上只是将tensor从一个层传递到另一个层——只是别忘了包括下采样和上采样块之间的跳过连接。
- en: '[PRE17]'
  id: totrans-89
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: Now let’s see whether we have correctly constructed the U-Net class above by
    running the following testing code.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们通过运行以下测试代码来查看我们是否正确构建了上面的U-Net类。
- en: '[PRE18]'
  id: totrans-91
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: '[PRE19]'
  id: totrans-92
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: We can see in the above output that the two downsampling stages successfully
    converted the original tensor of size 1×28×28 (`#(1)`) into 64×14×14 (`#(2)`)
    and 128×7×7 (`#(3)`), respectively. This tensor is then passed through the bottleneck
    layer, causing its number of channels to expand to 256 without changing the spatial
    dimension (`#(4)`). Lastly, we upsample the tensor twice before eventually shrinking
    the number of channels to 1 (`#(5)`). Based on this output, it looks like our
    model is working properly. Thus, it is now ready to be trained for our diffusion
    task.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 在上面的输出中，我们可以看到两个下采样阶段成功地将原始大小为1×28×28的tensor（`#(1)`）转换为64×14×14（`#(2)`）和128×7×7（`#(3)`），分别。然后这个tensor通过瓶颈层，使其通道数增加到256，而空间维度没有改变（`#(4)`）。最后，我们对该tensor进行两次上采样，最终将通道数缩减到1（`#(5)`）。根据这个输出，看起来我们的模型正在正常工作。因此，它现在可以准备用于我们的扩散任务训练了。
- en: '* * *'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '**Dataset Preparation**'
  id: totrans-95
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**数据集准备**'
- en: 'As we have successfully created the entire U-Net architecture, the next thing
    to do is to prepare the MNIST Handwritten Digit dataset. Before actually loading
    it, we need to define the preprocessing steps first using the `transforms.Compose()`
    method from Torchvision, as shown at line `#(1)` in Codeblock 13\. There are two
    things we do here: converting the images into PyTorch tensors which also scales
    the pixel values from 0–255 to 0–1 (`#(2)`), and normalize them so that the final
    pixel values ranging between -1 and 1 (`#(3)`). Next, we download the dataset
    using `datasets.MNIST()`. In this case, we are going to take the images from the
    training data, hence we use `train=True` (`#(5)`). Don’t forget to pass the `transform`
    variable we initialized earlier to the `transform` parameter (`transform=transform`)
    so that it will automatically preprocess the images as we load them (`#(6)`).
    Lastly, we need to employ `DataLoader` to load the images from `mnist_dataset`
    (`#(7)`). The arguments I use for the input parameters are intended to randomly
    pick `BATCH_SIZE` (2) images from the dataset in each iteration.'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们已经成功创建了整个U-Net架构，下一步要做的是准备MNIST手写数字数据集。在实际加载之前，我们需要首先使用Torchvision中的`transforms.Compose()`方法定义预处理步骤，如代码块13中的行`#(1)`所示。这里我们做了两件事：将图像转换为PyTorch张量，并将像素值从0–255缩放到0–1
    (`#(2)`), 然后归一化它们，使得最终的像素值介于-1和1之间 (`#(3)`). 接下来，我们使用`datasets.MNIST()`下载数据集。在这种情况下，我们将从训练数据中获取图像，因此我们使用`train=True`
    (`#(5)`). 不要忘记将之前初始化的`transform`变量传递给`transform`参数（`transform=transform`），这样它就会在加载图像时自动进行预处理
    (`#(6)`). 最后，我们需要使用`DataLoader`从`mnist_dataset`加载图像 (`#(7)`). 我用于输入参数的参数是为了在每次迭代中从数据集中随机选择`BATCH_SIZE`（2）个图像。
- en: '[PRE20]'
  id: totrans-97
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: 'In the following codeblock, I try to load a batch of images from the dataset.
    In every iteration, `loader` provides both the images and the corresponding labels,
    hence we need to store them in two separate variables: `images` and `labels`.'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 在下面的代码块中，我尝试从数据集中加载一批图像。在每次迭代中，`loader`提供图像和相应的标签，因此我们需要将它们存储在两个不同的变量中：`images`和`labels`。
- en: '[PRE21]'
  id: totrans-99
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: We can see in the resulting output below that the `images` tensor has the size
    of 2×1×28×28 (`#(1)`), indicating that two grayscale images of size 28×28 have
    been successfully loaded. Here we can also see that the length of the `labels`
    tensor is 2, which matches the number of the loaded images (`#(2)`). Note that
    in this case the labels are going to be completely ignored. My plan here is that
    I just want the model to generate any number it previously seen from the entire
    training dataset without even knowing what number it actually is. Lastly, this
    output also shows that the preprocessing works properly, as the pixel values now
    range between -1 and 1.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以在下面的输出结果中看到，`images`张量的大小为2×1×28×28 (`#(1)`), 这表明已经成功加载了两个大小为28×28的灰度图像。在这里我们还可以看到，`labels`张量的长度为2，这与加载的图像数量相匹配
    (`#(2)`). 注意，在这种情况下，标签将被完全忽略。我的计划是，我只是想让模型从整个训练数据集中生成它之前看到过的任何数字，甚至不知道它实际上是什么数字。最后，这个输出还显示，预处理工作正常，因为像素值现在介于-1和1之间。
- en: '[PRE22]'
  id: totrans-101
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: Run the following code if you want to see what the image we just loaded looks
    like.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想看到我们刚刚加载的图像的样子，请运行以下代码。
- en: '[PRE23]'
  id: totrans-103
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: '![](../Images/3a56959f244f1e5e82f59b33221d147a.png)'
  id: totrans-104
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/3a56959f244f1e5e82f59b33221d147a.png)'
- en: Figure 9\. Output from Codeblock 15 [3].
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 图9. 代码块15的输出 [3]。
- en: '* * *'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Noise Scheduler
  id: totrans-107
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 噪声调度器
- en: In this section we are going to talk about how the forward and backward diffusion
    are performed, which the process essentially involves adding or removing noise
    little by little at each timestep. It is necessary to know that we basically want
    a uniform amount of noise across all timesteps, where in the forward diffusion
    the image should be completely full of noise exactly at timestep 1000, while in
    the backward diffusion, we have to get the completely clear image at timestep
    0\. Hence, we need something to control the noise amount for each timestep. Later
    in this section, I am going to implement a class named `NoiseScheduler` to do
    so. — This will probably be the most mathy section of this article, as I’ll display
    many equations here. But don’t worry about that since we’ll focus on implementing
    these equations rather than discussing the mathematical derivations.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们将讨论正向和反向扩散是如何进行的，这个过程本质上涉及到在每个时间步长逐渐添加或去除噪声。有必要知道，我们基本上希望所有时间步长都有均匀的噪声量，在正向扩散中，图像应该在时间步长1000时完全充满噪声，而在反向扩散中，我们必须在时间步长0时获得完全清晰的图像。因此，我们需要某种东西来控制每个时间步长的噪声量。在本节的后面部分，我将实现一个名为
    `NoiseScheduler` 的类来完成这项工作。— 这可能是本文中最数学的部分，因为我将在这里展示许多方程。但不用担心，因为我们将专注于实现这些方程，而不是讨论数学推导。
- en: Now let’s take a look at the equations in Figure 10 which I will implement in
    the `__init__()` method of the `NoiseScheduler` class below.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们来看看图10中的方程，我将在下面的 `NoiseScheduler` 类的 `__init__()` 方法中实现这些方程。
- en: '![](../Images/b122a1ca8cb157c2c3e522fedbdf726c.png)'
  id: totrans-110
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/b122a1ca8cb157c2c3e522fedbdf726c.png)'
- en: Figure 10\. The equations we need to implement in the **__init__()** method
    of the `<strong>NoiseScheduler</strong>` class [3].
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 图10\. 我们需要在 `<strong>NoiseScheduler</strong>` 类的 `__init__()` 方法中实现的方程 [3]。
- en: '[PRE24]'
  id: totrans-112
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: The above code works by creating multiple sequences of numbers, all of them
    are basically controlled by `BETA_START` (0.0001), `BETA_END` (0.02), and `NUM_TIMESTEPS`
    (1000). The first sequence we need to instantiate is the `betas` itself, which
    is done using `torch.linspace()` (`#(1)`). What it essentially does is that it
    generates a 1-dimensional tensor of length 1000 starting from 0.0001 to 0.02,
    where every single element in this tensor corresponds to a single timestep. The
    interval between each element is uniform, allowing us to generate uniform amount
    of noise throughout all timesteps as well. With this `betas` tensor, we then compute
    `alphas`, `alphas_cum_prod`, `sqrt_alphas_cum_prod` and `sqrt_one_minus_alphas_cum_prod`
    based on the four equations in Figure 10\. Later on, these tensors will act as
    the basis of how the noise is generated or removed during the diffusion process.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 上述代码通过创建多个数字序列，所有这些序列基本上都受 `BETA_START` (0.0001)、`BETA_END` (0.02) 和 `NUM_TIMESTEPS`
    (1000) 控制。我们需要实例化的第一个序列是 `betas` 本身，这是通过 `torch.linspace()` (`#(1)`) 实现的。它本质上生成一个从0.0001到0.02的长度为1000的一维张量，其中张量中的每个元素对应一个单独的时间步长。每个元素之间的间隔是均匀的，这使得我们能够在所有时间步长中生成均匀的噪声量。有了这个
    `betas` 张量，我们就可以根据图10中的四个方程计算 `alphas`、`alphas_cum_prod`、`sqrt_alphas_cum_prod`
    和 `sqrt_one_minus_alphas_cum_prod`。稍后，这些张量将成为在扩散过程中生成或去除噪声的基础。
- en: Diffusion is normally done in a sequential manner. However, the forward diffusion
    process is deterministic, hence we can derive the original equation into a closed
    form so that we can obtain the noise at a specific timestep without having to
    iteratively add noise from the very beginning. The Figure 11 below shows what
    the closed form of the forward diffusion looks like, where *x₀* represents the
    original image while epsilon (*ϵ)* denotes an image made up of random Gaussian
    noise. We can think of this equation as a weighted combination, where we combine
    the clear image and the noise according to weights determined by the timestep,
    resulting in an image with a specific amount of noise.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 扩散通常是以顺序方式进行。然而，正向扩散过程是确定性的，因此我们可以将原始方程推导成封闭形式，这样我们就可以在特定时间步长获得噪声，而无需从一开始就迭代地添加噪声。下方的图11展示了正向扩散的封闭形式，其中
    *x₀* 代表原始图像，而 epsilon (*ϵ*) 表示由随机高斯噪声组成的图像。我们可以将这个方程视为一个加权组合，其中我们根据时间步长确定的权重将清晰图像和噪声结合起来，从而得到具有特定噪声量的图像。
- en: '![](../Images/becbbe821239cf1ae48323e9520783ec.png)'
  id: totrans-115
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/becbbe821239cf1ae48323e9520783ec.png)'
- en: Figure 11\. The closed form of the forward diffusion process [3].
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 图11\. 正向扩散过程的封闭形式 [3]。
- en: The implementation of this equation can be seen in Codeblock 16b. In this `forward_diffusion()`
    method, *x₀* and *ϵ* are denoted as `original` and `noise`. Here you need to keep
    in mind that these two input variables are images, whereas `sqrt_alphas_cum_prod_t`
    and `sqrt_one_minus_alphas_cum_prod_t` are scalars. Thus, we need to adjust the
    shape of these two scalars (`#(1)` and `#(2)`) so that the operation at line `#(3)`
    can be performed. The `noisy_image` variable is going to be the output of this
    function, which I guess the name is self-explanatory.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 该方程的实现可以在代码块16b中看到。在这个`forward_diffusion()`方法中，*x₀*和*ϵ*分别表示为`original`和`noise`。在这里，你需要记住这两个输入变量是图像，而`sqrt_alphas_cum_prod_t`和`sqrt_one_minus_alphas_cum_prod_t`是标量。因此，我们需要调整这两个标量的形状（`#(1)`和`#(2)`），以便在行`#(3)`处执行操作。`noisy_image`变量将是此函数的输出，我认为这个名字是自解释的。
- en: '[PRE25]'
  id: totrans-118
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: Now let’s talk about backward diffusion. In fact, this one is a bit more complicated
    than the forward diffusion since we need three more equations here. Before I give
    you these equations, let me show you the implementation first. See the Codeblock
    16c below.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们来谈谈反向扩散。实际上，这个比正向扩散要复杂一些，因为我们在这里需要三个额外的方程。在我给你这些方程之前，让我先展示一下实现。请看下面的代码块16c。
- en: '[PRE26]'
  id: totrans-120
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: Later in the inference phase, the `backward_diffusion()` method will be called
    inside a loop that iterates `NUM_TIMESTEPS` (1000) times, starting from *t* =
    999, continued with *t* = 998, and so on all the way to *t* = 0\. This function
    is responsible to remove the noise from the image iteratively based on the `current_image`
    (the image produced by the previous denoising step), the `predicted_noise` (the
    noise predicted by U-Net in the previous step), and the timestep information `t`
    (`#(1)`). In each iteration, noise removal is done using the equation shown in
    Figure 12, which in Codeblock 16c, this corresponds to lines `#(4-5)`.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 在推理阶段稍后，`backward_diffusion()`方法将在一个循环中被调用，该循环迭代`NUM_TIMESTEPS`（1000）次，从*t*
    = 999开始，继续到*t* = 998，一直到最后*t* = 0。这个函数负责根据`current_image`（前一个去噪步骤产生的图像）、`predicted_noise`（U-Net在之前步骤中预测的噪声）和时间步信息`t`（`#(1)`）迭代地去除图像中的噪声。在每次迭代中，使用图12中显示的方程进行噪声去除，在代码块16c中，这对应于行`#(4-5)`。
- en: '![](../Images/03205bfb93688608c349e2e17a4cce4b.png)'
  id: totrans-122
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/03205bfb93688608c349e2e17a4cce4b.png)'
- en: Figure 12\. The equation used for removing noise from the image [3].
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 图12. 用于从图像中去除噪声的方程[3]。
- en: As long as we haven’t reached *t* = 0, we will compute the variance based on
    the equation in Figure 13 (`#(7–8)`). This variance will then be used to introduce
    another controlled noise to simulate the stochasticity in the backward diffusion
    process since the noise removal equation in Figure 12 is a deterministic approximation.
    This is essentially also the reason that we don’t calculate the variance once
    we reached *t* = 0 (`#(6)`) since we no longer need to add more noise as the image
    is completely clear already.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 只要我们没有达到*t* = 0，我们就会根据图13中的方程（`#(7–8)`）计算方差。然后，这个方差将被用来在反向扩散过程中引入另一个受控噪声，以模拟随机性，因为图12中的噪声去除方程是一个确定性近似。这也是我们一旦达到*t*
    = 0（`#(6)`）就不计算方差的基本原因，因为我们不再需要添加更多噪声，因为图像已经完全清晰了。
- en: '![](../Images/b1515d81b2b918af0da58a1817618b74.png)'
  id: totrans-125
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b1515d81b2b918af0da58a1817618b74.png)'
- en: Figure 13\. The equation used to calculate variance for introducing controlled
    noise [3].
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 图13. 用于计算引入受控噪声方差的方程[3]。
- en: Different from `current_prediction` which aims to estimate the image of the
    previous timestep (*xₜ₋₁*), the objective of the `denoised_image` tensor is to
    reconstruct the original image (*x₀*). Thanks to these different objectives, we
    need a separate equation to compute `denoised_image`, which can be seen in Figure
    14 below. The implementation of the equation itself is written at line `#(2–3)`.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 与旨在估计前一时间步图像（*xₜ₋₁*）的`current_prediction`不同，`denoised_image`张量的目标是重建原始图像（*x₀*）。由于这些不同的目标，我们需要一个单独的方程来计算`denoised_image`，这可以在下面的图14中看到。方程的实现本身写在行`#(2–3)`。
- en: '![](../Images/b890fcf67a061dcaa3a53b89e35b347b.png)'
  id: totrans-128
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b890fcf67a061dcaa3a53b89e35b347b.png)'
- en: Figure 14\. The equation for reconstructing the original image [3].
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 图14. 重建原始图像的方程[3]。
- en: Now let’s test the `NoiseScheduler` class we created above. In the following
    codeblock, I instantiate a `NoiseScheduler` object and print out the attributes
    associated with it, which are all computed using the equation in Figure 10 based
    on the values stored in the `betas` attribute. Remember that the actual length
    of these tensors is `NUM_TIMESTEPS` (1000), but here I only print out the first
    6 elements.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们测试我们上面创建的 `NoiseScheduler` 类。在下面的代码块中，我实例化了一个 `NoiseScheduler` 对象，并打印出与之相关的属性，这些属性都是根据图
    10 中的方程式，基于存储在 `betas` 属性中的值计算得出的。请记住，这些张量的实际长度是 `NUM_TIMESTEPS`（1000），但在这里我只打印出前
    6 个元素。
- en: '[PRE27]'
  id: totrans-131
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: '[PRE28]'
  id: totrans-132
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: 'The above output indicates that our `__init__()` method works as expected.
    Next, we are going to test the `forward_diffusion()` method. If you go back to
    Figure 16b, you will see that `forward_diffusion()` accepts three inputs: original
    image, noise image and the timestep number. Let’s just use the image from the
    MNIST dataset we loaded earlier for the first input (`#(1)`) and a random Gaussian
    noise of the exact same size for the second one (`#(2)`). Run the Codeblock 18
    below to see what these two images look like.'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 上述输出表明我们的 `__init__()` 方法按预期工作。接下来，我们将测试 `forward_diffusion()` 方法。如果您回到图 16b，您会看到
    `forward_diffusion()` 接受三个输入：原始图像、噪声图像和时间步数。让我们使用我们之前加载的 MNIST 数据集中的图像作为第一个输入（`#(1)`），以及大小完全相同的随机高斯噪声作为第二个输入（`#(2)`）。运行下面的代码块
    18，看看这两张图像是什么样子。
- en: '[PRE29]'
  id: totrans-134
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: '![](../Images/ef6ae0a38e61b8fc12759014f1a71eeb.png)'
  id: totrans-135
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ef6ae0a38e61b8fc12759014f1a71eeb.png)'
- en: Figure 15\. The two images to be used as the original (left) and the noise image
    (right). The one on the left is the same image I showed earlier in Figure 9 [3].
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 图 15. 作为原始图像（左）和噪声图像（右）使用的两张图像。左边的是我在图 9 中之前展示过的同一张图像[3]。
- en: As we already got the image and the noise ready, what we need to do afterwards
    is to pass them to the `forward_diffusion()` method alongside the *t*. I actually
    tried to run the Codeblock 19 below multiple times with *t* = 50, 100, 150, and
    so on up to *t* = 300\. You can see in Figure 16 that the image becomes less clear
    as the parameter increases. In this case, the image is going to be completely
    filled by noise when the *t* is set to 999.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们已经准备好了图像和噪声，接下来我们需要做的是将它们传递给 `forward_diffusion()` 方法，并附带 *t* 参数。我实际上尝试了多次运行下面的代码块
    19，其中 *t* 分别为 50、100、150 等等，直到 *t* = 300。您可以在图 16 中看到，随着参数的增加，图像变得越来越不清晰。在这种情况下，当
    *t* 设置为 999 时，图像将被噪声完全填充。
- en: '[PRE30]'
  id: totrans-138
  prefs: []
  type: TYPE_PRE
  zh: '[PRE30]'
- en: '![](../Images/a5272ec7202a78e2fec8fe29be76f8a4.png)'
  id: totrans-139
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a5272ec7202a78e2fec8fe29be76f8a4.png)'
- en: Figure 16\. The result of the forward diffusion process at t=50, 100, 150, and
    so on until t=300 [3].
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 图 16. 在 t=50、100、150 等等直到 t=300 时的前向扩散过程的结果[3]。
- en: Unfortunately, we cannot test the `backward_diffusion()` method since this process
    requires us to have our U-Net model trained. So, let’s just skip this part for
    now. I’ll show you how we can actually use this function later in the inference
    phase.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 不幸的是，我们无法测试 `backward_diffusion()` 方法，因为这个过程需要我们拥有已经训练好的 U-Net 模型。所以，我们现在就跳过这部分内容。我会在推理阶段向您展示如何实际使用这个函数。
- en: '* * *'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: Training
  id: totrans-143
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 训练
- en: As the U-Net model, MNIST dataset, and the noise scheduler are ready, we can
    now prepare a function for training. Before we do that, I instantiate the model
    and the noise scheduler in Codeblock 20 below.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 随着 U-Net 模型、MNIST 数据集和噪声调度器的准备就绪，我们现在可以准备一个用于训练的函数了。在我们这样做之前，我在下面的代码块 20 中实例化了模型和噪声调度器。
- en: '[PRE31]'
  id: totrans-145
  prefs: []
  type: TYPE_PRE
  zh: '[PRE31]'
- en: The entire training procedure is implemented in the `train()` function shown
    in Codeblock 21\. Before doing anything, we first initialize the optimizer and
    the loss function, which in this case we use Adam and MSE, respectively (`#(1–2)`).
    What we basically want to do here is to train the model such that it will be able
    to predict the noise contained in the input image, which later on, the predicted
    noise will be used as the basis of the denoising process in the backward diffusion
    stage. To actually train the model, we first need to perform forward diffusion
    using the code at line `#(6)`. This noising process will be done on the `images`
    tensor (`#(3)`) using the random noise generated at line `#(4)`. Next, we take
    random number somewhere between 0 and `NUM_TIMESTEPS` (1000) for the `t` (`#(5)`),
    which is essentially done because we want our model to see images of varying noise
    levels as an approach to improve generalization. As the noisy images have been
    generated, we then pass it through the U-Net model alongside the chosen `t` (`#(7)`).
    The input `t` here is useful for the model as it indicates the current noise level
    in the image. Lastly, the loss function we initialized earlier is responsible
    to compute the difference between the actual noise and the predicted noise from
    the original image (`#(8)`). So, the objective of this training is basically to
    make the predicted noise as similar as possible to the noise we generated at line
    `#(4)`.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 整个训练过程在代码块21中所示的`train()`函数中实现。在执行任何操作之前，我们首先初始化优化器和损失函数，在这种情况下我们分别使用Adam和MSE（`#(1–2)`）。我们在这里基本上想要做的是训练模型，使其能够预测输入图像中包含的噪声，随后，预测的噪声将作为反向扩散阶段去噪过程的基础。为了实际训练模型，我们首先需要使用第`#(6)`行的代码执行正向扩散。这个过程将在`images`张量（`#(3)`）上使用第`#(4)`行生成的随机噪声进行。接下来，我们为`t`（`#(5)`）取一个介于0和`NUM_TIMESTEPS`（1000）之间的随机数，这主要是因为我们希望我们的模型看到不同噪声级别的图像，作为一种提高泛化能力的方法。由于已经生成了噪声图像，我们随后将其与选择的`t`（`#(7)`）一起通过U-Net模型。这里的输入`t`对模型很有用，因为它表示图像中的当前噪声水平。最后，我们之前初始化的损失函数负责计算实际噪声和从原始图像预测的噪声之间的差异（`#(8)`）。因此，这次训练的目标基本上是使预测的噪声尽可能接近我们在第`#(4)`行生成的噪声。
- en: '[PRE32]'
  id: totrans-147
  prefs: []
  type: TYPE_PRE
  zh: '[PRE32]'
- en: Now let’s run the above training function using the codeblock below. Sit back
    and relax while waiting the training completes. In my case, I used Kaggle Notebook
    with Nvidia GPU P100 turned on, and it took around 45 minutes to finish.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们使用下面的代码块来运行上述训练函数。在等待训练完成的过程中，请坐下来放松。在我的情况下，我使用了开启Nvidia GPU P100的Kaggle
    Notebook，大约花费了45分钟来完成。
- en: '[PRE33]'
  id: totrans-149
  prefs: []
  type: TYPE_PRE
  zh: '[PRE33]'
- en: If we take a look at the loss graph, it seems like our model learned pretty
    well as the value is generally decreasing over time with a rapid drop at early
    stages and a more stable (yet still decreasing) trend in the later stages. So,
    I think we can expect good results later in the inference phase.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们看一下损失图，似乎我们的模型学习得相当好，因为随着时间的推移，值总体上是下降的，在早期阶段有一个快速的下降，而在后期阶段有一个更稳定的（尽管仍在下降）趋势。所以，我认为我们可以在推理阶段期待良好的结果。
- en: '[PRE34]'
  id: totrans-151
  prefs: []
  type: TYPE_PRE
  zh: '[PRE34]'
- en: '![](../Images/61a365d1aaf3f4d06a4f3e004d14f3f1.png)'
  id: totrans-152
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/61a365d1aaf3f4d06a4f3e004d14f3f1.png)'
- en: Figure 17\. How the loss value decreases as the training goes [3].
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 图17.随着训练的进行，损失值如何下降[3]。
- en: '* * *'
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: Inference
  id: totrans-155
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 推理
- en: At this point we have already got our model trained, so we can now perform inference
    on it. Look at the Codeblock 24 below to see how I implement the `inference()`
    function.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们已经训练好了我们的模型，现在我们可以对其进行推理。查看下面的代码块24，以了解我是如何实现`inference()`函数的。
- en: '[PRE35]'
  id: totrans-157
  prefs: []
  type: TYPE_PRE
  zh: '[PRE35]'
- en: At the line marked with `#(1)` I initialize an empty list which will be used
    to store the denoising result every 100 timesteps (`#(7)`). This will later allow
    us to see how the backward diffusion goes. The actual inference process is encapsulated
    inside `torch.no_grad()` (`#(2)`). Remember that in diffusion models we generate
    images from a completely random noise, which we assume that these images are initially
    at *t* = 999\. To implement this, we can simply use `torch.randn()` as shown at
    line `#(3)`. Here we initialize a tensor of size 64×1×28×28, indicating that we
    are about to generate 64 images simultaneously. Next, we write a `for` loop that
    iterates backwards starting from 999 to 0 (`#(4)`). Inside this loop, we feed
    the current image and the timestep as the input for the trained U-Net and let
    it predict the noise (`#(5)`). The actual backward diffusion is then performed
    at line `#(6)`. At the end of the iteration, we should get new images similar
    to the ones we have in our dataset. Now let’s call the `inference()` function
    in the following codeblock.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 在标记为`#(1)`的行中，我初始化了一个空列表，该列表将用于每100个时间步存储去噪结果（`#(7)`）。这将在以后允许我们看到反向扩散的过程。实际的推理过程封装在`torch.no_grad()`（`#(2)`）中。记住，在扩散模型中，我们是从完全随机的噪声中生成图像，我们假设这些图像最初在*t*
    = 999。为了实现这一点，我们可以简单地使用`torch.randn()`，如第`#(3)`行所示。在这里，我们初始化了一个大小为64×1×28×28的张量，表示我们即将同时生成64幅图像。接下来，我们编写一个从999开始反向迭代的`for`循环（`#(4)`）。在这个循环内部，我们将当前图像和时间步作为输入提供给训练好的U-Net，并让它预测噪声（`#(5)`）。实际的反向扩散在`#(6)`行执行。迭代结束时，我们应该得到与我们的数据集中相似的新的图像。现在让我们在下面的代码块中调用`inference()`函数。
- en: '[PRE36]'
  id: totrans-159
  prefs: []
  type: TYPE_PRE
  zh: '[PRE36]'
- en: As the inference completed, we can now see what the resulting images look like.
    The Codeblock 26 below is used to display the first 42 images we just generated.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 推理完成后，我们现在可以看到生成的图像的样子。下面的代码块26用于显示我们刚刚生成的第一幅图像。
- en: '[PRE37]'
  id: totrans-161
  prefs: []
  type: TYPE_PRE
  zh: '[PRE37]'
- en: '![](../Images/fbd477bb21c0a0db50d51433d9331d22.png)'
  id: totrans-162
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/fbd477bb21c0a0db50d51433d9331d22.png)'
- en: Figure 18\. The images generated by the diffusion model trained on the MNIST
    Handwritten Digit dataset [3].
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: 图18. 在MNIST手写数字数据集上训练的扩散模型生成的图像[3]。
- en: If we take a look at the above codeblock, you can see that the indexer of `[-1]`
    at line `#(1)` indicates that we only display the images from the last iteration
    (which corresponds to timestep 0). This is the reason that the images you see
    in Figure 18 are all free from noise. I do acknowledge that this might not be
    the best of a result since not all the generated images are valid digit numbers. — But
    hey, this instead indicates that these images are not merely duplicates from the
    original dataset.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们看一下上面的代码块，你可以看到第`#(1)`行的`[-1]`索引器表示我们只显示最后迭代（对应时间步长0）的图像。这就是为什么你在图18中看到的图像都是无噪声的原因。我确实承认这可能不是最好的结果，因为并非所有生成的图像都是有效的数字。— 但是嘿，这反而表明这些图像不仅仅是原始数据集的重复。
- en: Here we can also visualize the backward diffusion process using the Codeblock
    27 below. You can see in the resulting output in Figure 19 that we initially start
    from a complete random noise, which gradually disappears as we move to the right.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们也可以使用下面的代码块27可视化反向扩散过程。你可以在图19的结果输出中看到，我们最初从一个完全随机的噪声开始，随着我们向右移动，噪声逐渐消失。
- en: '[PRE38]'
  id: totrans-166
  prefs: []
  type: TYPE_PRE
  zh: '[PRE38]'
- en: '![](../Images/a64a4fba554ba527222d4162d7810246.png)'
  id: totrans-167
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a64a4fba554ba527222d4162d7810246.png)'
- en: Figure 19\. What the image looks like at timestep 900, 800, 700 and so on until
    timestep 0 [3].
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 图19. 图片在时间步长900、800、700等直至时间步长0时的样子[3]。
- en: '* * *'
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Ending
  id: totrans-170
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结束
- en: There are plenty of directions you can go from here. First, you might probably
    need to tweak the parameter configurations in Codeblock 2 if you want better results.
    Second, it is also possible to modify the U-Net model by implementing attention
    layers in addition to the stack of convolution layers we used in the downsampling
    and the upsampling stages. This does not guarantee you to obtain better results
    especially for a simple dataset like this, but it’s definitely worth trying. Third,
    you can also try to use a more complex dataset if you want to challenge yourself.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 从这里开始，你可以有很多方向。首先，如果你想要更好的结果，你可能需要调整代码块2中的参数配置。其次，你也可以通过在降采样和升采样阶段使用的卷积层堆叠之外实现注意力层来修改U-Net模型。这并不保证你能够获得更好的结果，尤其是对于像这样简单的数据集，但它绝对值得一试。第三，你也可以尝试使用更复杂的数据集来挑战自己。
- en: When it comes to practical applications, there are actually lots of things you
    can do with diffusion models. The simplest one might be for data augmentation.
    With diffusion model, we can easily generate new images from a specific data distribution.
    For example, suppose we are working on an image classification project, but the
    number of images in the classes are imbalanced. To address this problem, it is
    possible for us to take the images from the minority class and feed them into
    a diffusion model. By doing so, we can ask the trained diffusion model to generate
    a number of samples from that class as many as we want.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
- en: And well, that’s pretty much everything about the theory and the implementation
    of diffusion model. Thanks for reading, I hope you learn something new today!
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
- en: '*You can access the code used in this project through* [*this link*](https://github.com/MuhammadArdiPutra/medium_articles/blob/main/The%20Art%20of%20Noise.ipynb)*.
