- en: 5 Crucial Tweaks That Will Make Your Charts Accessible to People with Visual
    Impairments
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 5 Crucial Tweaks That Will Make Your Charts Accessible to People with Visual
    Impairments
- en: 原文：[https://towardsdatascience.com/5-crucial-tweaks-that-will-make-your-charts-accessible-to-people-with-visual-impairments/](https://towardsdatascience.com/5-crucial-tweaks-that-will-make-your-charts-accessible-to-people-with-visual-impairments/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/5-crucial-tweaks-that-will-make-your-charts-accessible-to-people-with-visual-impairments/](https://towardsdatascience.com/5-crucial-tweaks-that-will-make-your-charts-accessible-to-people-with-visual-impairments/)
- en: '[Approximately 4.5% of the world’s population is colorblind.](https://www.colorblindguide.com/post/colorblind-people-population-live-counter)'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '[大约4.5%的世界人口患有色盲。](https://www.colorblindguide.com/post/colorblind-people-population-live-counter)'
- en: <mdspan datatext="el1749213472718" class="mdspan-comment">That’s about 350</mdspan>
    million people worldwide having just one type of visual impairment. The numbers
    get significantly higher if you were to take all conditions into account. Yet,
    it’s a rarely discussed topic.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1749213472718" class="mdspan-comment">这大约是3.5亿人，他们仅有一种视觉障碍。如果考虑所有情况，数字会显著增加。然而，这是一个很少被讨论的话题。
- en: As a data professional, you don’t want anyone misinterpreting your visuals.
    Sure, being extra clear is more work, but you’ll make a decent chunk of the population
    happier.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 作为数据专业人士，你不想任何人误解你的视觉呈现。当然，更加清晰明确需要更多的工作，但你会让相当一部分人感到满意。
- en: Today you’ll get 5 actionable tips for making your existing visualizations accessible.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 今天，你将获得5个实用的技巧，帮助你使现有的可视化对视觉障碍人士更易访问。
- en: Concrete Guidelines for Implementing Accessibility In Your Data Visualization
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在你的数据可视化中实施可访问性的具体指南
- en: But first, let’s go over some general guidelines you should follow when accessibility
    is a top priority.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 但首先，让我们回顾一下当可访问性是首要任务时应遵循的一些一般性指南。
- en: Everything listed below is a curated and significantly shortened checklist of
    the [A11Y project](https://www.a11yproject.com/checklist/). If you’re wondering,
    “A11Y” is an abbreviation for “accessibility” (11 letters between “A” and “Y”).
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 以下列出的每一项都是[A11Y项目](https://www.a11yproject.com/checklist/)的精选和显著简化的清单。如果你想知道，“A11Y”是“可访问性”（A和Y之间有11个字母）的缩写。
- en: 'Anyhow, here’s what you should pay attention to:'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，以下是你应该注意的事项：
- en: '**Don’t rely on color to explain the data** – A decent chunk of the population
    is color blind or suffers from some other visual impairment. Patterns are a way
    to go.'
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**不要仅依赖颜色来解释数据** – 相当一部分人患有色盲或存在其他视觉障碍。模式是一种可行的方式。'
- en: '**If using color, go with darker, high-contrast tones** – Light and low-contrast
    colors make it nearly impossible to distinguish between groups on a chart visually.'
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**如果使用颜色，请选择深色、高对比度的色调** – 浅色和低对比度的颜色几乎无法在图表中视觉上区分各组。'
- en: '**Don’t hide important data behind interactions** – Hover events are available
    only on the desktop. The majority of your users are on smartphones.'
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**不要将重要数据隐藏在交互之后** – 悬停事件仅在桌面版上可用。大多数用户都在智能手机上。'
- en: '**Use labels and legends** – Without them, the reader doesn’t know what the
    data represents.'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**使用标签和图例** – 没有它们，读者不知道数据代表什么。'
- en: '**Translate data into clear insights** – Simplify the data as much as possible,
    and then some. You don’t want anything to be open for interpretation.'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**将数据转化为清晰的见解** – 尽可能简化数据，然后进一步简化。你不想让任何事物存在解释的余地。'
- en: '**Provide context and explain the visualization** – If feasible, annotate data
    points of interest, and add subtitle/caption.'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**提供上下文并解释可视化** – 如果可行，标注感兴趣的数据点，并添加副标题/字幕。'
- en: '**Have users with screen readers in mind** – People with visual impairments
    use screen readers to navigate web pages. Use alt text to describe your embedded
    charts.'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**考虑到屏幕阅读器的用户** – 视觉障碍人士使用屏幕阅读器来浏览网页。使用替代文本来描述你嵌入的图表。'
- en: With these in mind, I came up with 5 actionable tweaks you can make to your
    visualizations right now.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到这些因素，我提出了5个你可以立即实施的实用调整。
- en: 'Let’s dive into #1.'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们深入探讨#1。
- en: 1\. Use a High-Contrast or Colorblind-Friendly Color Palette
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1\. 使用高对比度或色盲友好型调色板
- en: The easiest way to understand why color choice matters is by doing the wrong
    thing first.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 理解为什么颜色选择很重要最简单的方法是先做错。
- en: 'Consider the following dataset:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑以下数据集：
- en: '[PRE0]'
  id: totrans-22
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: It’s a perfect candidate for a stacked bar chart. In other words, to show office
    locations on the X-axis and stack employee counts on the Y-axis.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个完美的堆叠柱状图的候选者。换句话说，要在X轴上显示办公地点，在Y轴上堆叠员工数量。
- en: Now imagine you’re really into the color green.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 现在想象一下你真的很喜欢绿色。
- en: 'You might want to color individual bar portions in different shades of green.
    It’s a horrible practice (except for some monochromatic color palettes), as you
    can see from the following:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能想要用不同深浅的绿色来着色单个条形部分。这是一种糟糕的做法（除了某些单色调色板），如下所示：
- en: '[PRE1]'
  id: totrans-26
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '![](../Images/fd1cc79181984e76f82f63e3b0b74bcc.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/fd1cc79181984e76f82f63e3b0b74bcc.png)'
- en: Image 1 – Color palette with indistinguishable colors (image by author)
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 图像 1 – 难以区分颜色的调色板（图片由作者提供）
- en: Many people wonder what their chart would look like if it was printed in a black-and-white
    book.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 许多人想知道如果他们的图表被印在黑白书中会是什么样子。
- en: This one would look only marginally worse, but only because it looks horrendous
    from the get-go. Distinguishing between bar portions is challenging even for people
    without visual impairments.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 这个看起来只会稍微差一点，但仅仅是因为它一开始就看起来很糟糕。即使对于没有视力障碍的人来说，区分条形部分也很困难。
- en: '*[You can use this website to check the contrast between two colors.](https://contrastchecker.online/)*'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: '*[你可以使用这个网站来检查两种颜色之间的对比度。](https://contrastchecker.online/)*'
- en: Let’s fix it by using a high-contrast color palette.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们通过使用高对比度调色板来解决这个问题。
- en: Custom High-Contrast Color Palette
  id: totrans-33
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 自定义高对比度调色板
- en: I’ll continue with the assumption you like the color green.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 我将继续假设你喜欢绿色。
- en: '**Question: **how can you create a high-contrast color palette from one color?'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: '**问题：**如何从一个颜色创建一个高对比度调色板？'
- en: '**Answer:** start with a dark shade and finish with a color similar enough
    to your primary color. In this case, yellow-gold is a perfect candidate.'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: '**答案：**从深色调开始，以与主色调相似的颜色结束。在这种情况下，黄金色是一个完美的选择。'
- en: You get the best of both worlds this way. You’re still using colors you like
    and the colors don’t have to get lighter (which would reduce the contrast) as
    you go through bar segments.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 这样你就能兼顾两者。你仍然在使用你喜欢的颜色，而且颜色不需要随着条形部分的过渡而变浅（这会降低对比度）。
- en: 'In practice, this boils down to playing around with the `color` parameter for
    all segments:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 实际上，这归结为对所有部分玩转`color`参数：
- en: '[PRE2]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '![](../Images/5c61a696ac73737dbcf5404fa002b808.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/5c61a696ac73737dbcf5404fa002b808.png)'
- en: Image 2 – Custom color palette (image by author)
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 图像 2 – 自定义调色板（图片由作者提供）
- en: So much easier on the eyes.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 这样对眼睛来说更容易接受。
- en: Predefined Colorblind Color Palette
  id: totrans-43
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 预定义的色盲调色板
- en: 'But consider the following scenarios:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 但请考虑以下场景：
- en: You don’t have the time to play around with different color combinations
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你没有时间玩转不同的颜色组合
- en: 'You do have the time, but there are about a dozen categories in your dataset
    (read: dozen colors to find)'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你确实有时间，但你的数据集中大约有十几个类别（读作：要找到十几种颜色）
- en: There’s an easier solution to make your chart color scheme easier on the eyes
    while accounting for people with visual impairments.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 有一个更简单的解决方案可以使你的图表配色方案更容易接受，同时考虑到视力受损的人。
- en: One such solution is to use a colorblind-friendly color palette.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 一种解决方案是使用色盲友好的调色板。
- en: 'The first line of the snippet shows you how:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 片段的第一行显示了如何操作：
- en: '[PRE3]'
  id: totrans-50
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '![](../Images/24cd7198fbc9da4588d940089fc614fe.png)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/24cd7198fbc9da4588d940089fc614fe.png)'
- en: Image 3 – Built-in colorblind palette (image by author)
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 图像 3 – 内置色盲调色板（图片由作者提供）
- en: This palette contains 10 colorblind-friendly colors, so it’s a good fit for
    charts with 10 groups or less.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 这个调色板包含10种色盲友好颜色，因此它非常适合有10组或更少的图表。
- en: If you need more, maybe you’ll be better off rethinking your visualization strategy.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你需要更多，也许重新思考你的可视化策略会更好。
- en: 2\. Stop Using Colors – Use Patterns Instead
  id: totrans-55
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2. 停止使用颜色 - 使用图案代替
- en: Another great way to remove any kind of misinterpretation from your charts is
    to use patterns instead of colors (or as an addition to colors).
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 从你的图表中移除任何误解的另一个好方法是使用图案而不是颜色（或者作为颜色的补充）。
- en: Matplotlib has [10 hatch patterns](https://matplotlib.org/stable/gallery/shapes_and_collections/hatch_style_reference.html) you
    can choose from.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: Matplotlib有[10种图案样式](https://matplotlib.org/stable/gallery/shapes_and_collections/hatch_style_reference.html)可供选择。
- en: You can further customize the hatches by increasing their density or by combining
    multiple patterns. But that’s a topic for another time.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以通过增加密度或组合多个图案来进一步自定义图案。但这将是另一个话题。
- en: 'To implement patterns, add the `hatch` parameter to `plt.bar()`. The example
    below removes color altogether by setting `fill=False`:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 要实现图案，将`hatch`参数添加到`plt.bar()`中。以下示例通过设置`fill=False`完全去除了颜色：
- en: '[PRE4]'
  id: totrans-60
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: '![](../Images/55660e41a8aeee6a225b9f64147cbf9a.png)'
  id: totrans-61
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/55660e41a8aeee6a225b9f64147cbf9a.png)'
- en: Image 4 – Plotting with patterns (image by author)
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 图像 4 – 使用图案绘图（图片由作者提供）
- en: Now there’s no way to misinterpret data on this chart.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 现在无法误解这个图表上的数据。
- en: Can You Mix Patterns with Color?
  id: totrans-64
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 你能将图案与颜色混合吗？
- en: If you want the best of both worlds, color + pattern is where it’s at.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想两者兼得，颜色加图案就是关键所在。
- en: 'You’ll want to remove the fill=False parameter and change it with `color`.
    Or, just copy the following code snippet:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能想移除 fill=False 参数，并用 `color` 替换它。或者，只需复制以下代码片段：
- en: '[PRE5]'
  id: totrans-67
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: '![](../Images/95980cc69da290b3dfe030b4ca276257.png)'
  id: totrans-68
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/95980cc69da290b3dfe030b4ca276257.png)'
- en: Image 5 – Plotting with colors and patterns (image by author)
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 图像 5 – 使用颜色和图案绘图（作者图片）
- en: Dark patterns are clearly visible on bar segments, but that might not always
    be the case.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 暗色图案在条形段上清晰可见，但情况不一定总是如此。
- en: 'The `edgecolor` parameter controls the pattern color. Let’s see what happens
    after setting it to white:'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: '`edgecolor` 参数控制图案颜色。让我们看看将其设置为白色后会发生什么：'
- en: '[PRE6]'
  id: totrans-72
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: '![](../Images/e2a9644fbf075459d652341fb16ba687.png)'
  id: totrans-73
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e2a9644fbf075459d652341fb16ba687.png)'
- en: Image 6 – Plotting with colors and patterns (2) (image by author)
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 图像 6 – 使用颜色和图案绘图（2）（作者图片）
- en: The pattern is visible for *HR* and *Engineering* departments, but the two on
    the top are a different story.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 图案对于 **HR** 和 **Engineering** 部门是可见的，但顶部的两个则不同。
- en: You might have no trouble seeing the lines on the topmost chart segment, but
    put yourself in the shoes of a person with visual impairments. They should always
    be your frame of reference.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能没有困难地看到最上面的图表段上的线条，但请设身处地考虑一个有视觉障碍的人。他们应该始终是你的参考框架。
- en: '**Remember:** Light-colored patterns work well on dark backgrounds. Dark-colored
    patterns work well on light backgrounds. Adjust accordingly.'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: '**记住**：浅色图案在深色背景上效果很好。深色图案在浅色背景上效果很好。相应调整。'
- en: 3\. Don’t Overwhelm User with the Information
  id: totrans-78
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3. 不要让用户信息过载
- en: 'This principle goes in two directions:'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 这个原则有两个方向：
- en: Don’t put too much information on a single chart
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不要在单个图表上放置太多信息
- en: Don’t put too many charts next to each other, e.g., in your applications/dashboards
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不要把太多的图表放在一起，例如，在你的应用程序/仪表板上。
- en: Doing both simultaneously is somewhat of an **ultimate sin** in data visualization.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 同时做这两件事在数据可视化中可以说是**终极罪过**。
- en: Let’s start by adding a couple more departments into the mix.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们先添加几个更多部门到混合中。
- en: 'The data is getting difficult to manage with Python lists, so I’ve opted for
    a Pandas DataFrame instead:'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 Python 列表管理数据变得越来越困难，所以我选择了 Pandas DataFrame：
- en: '[PRE7]'
  id: totrans-85
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: '![](../Images/7ce22dff6777043f13d8c5e3728de316.png)'
  id: totrans-86
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7ce22dff6777043f13d8c5e3728de316.png)'
- en: Image 7 – Wider dataset (image by author)
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 图像 7 – 更宽的数据集（作者图片）
- en: 'Now, using the colorblind-friendly palette, let’s plot the employee count per
    location and department as a stacked bar chart. To make things extra crammed,
    I’ve also thrown text counts into the mix:'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，使用色盲友好调色板，让我们按地点和部门绘制员工数量堆叠条形图。为了使事情更加拥挤，我还加入了文本计数：
- en: '[PRE8]'
  id: totrans-89
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: '![](../Images/f8aee5e2e6844772b9e0089288ce77f0.png)'
  id: totrans-90
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f8aee5e2e6844772b9e0089288ce77f0.png)'
- en: Image 8 – Crammed visualization (image by author)
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 图像 8 – 拥挤的可视化（作者图片）
- en: Now that’s just ugly.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 现在看起来真的很丑。
- en: 'Fix #1 – Present Less Information'
  id: totrans-93
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '修正 #1 – 展示更少的信息'
- en: One way to solve this unpresentable mess is by showing less information to the
    user.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 解决这种难以呈现的混乱的一种方法是通过向用户展示更少的信息。
- en: For example, only show employee count in one city (across departments). You
    can then add a **dropdown menu** to the side of the chart so the user can control
    the office location.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，只在一个城市（跨部门）显示员工数量。然后你可以在图表旁边添加一个**下拉菜单**，让用户可以控制办公室位置。
- en: 'The following snippet plots employees per department in Chicago as a horizontal
    bar chart:'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 以下代码片段以水平条形图的形式绘制芝加哥的每个部门的员工数量：
- en: '[PRE9]'
  id: totrans-97
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: '![](../Images/1d5860eddaa1da33c3dc914eee71a134.png)'
  id: totrans-98
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/1d5860eddaa1da33c3dc914eee71a134.png)'
- en: Image 9 – More readable visualization (image by author)
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 图像 9 – 更易读的可视化（作者图片）
- en: 'Fix #2 – Reorganize the Data'
  id: totrans-100
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '修正 #2 – 重新组织数据'
- en: If showing less information isn’t an option, maybe you can **transpose your
    data**.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 如果展示更少的信息不是一个选择，也许你可以**转置你的数据**。
- en: For example, we’re dealing with 5 office locations and 10 departments. Showing
    10 columns instead of 10 bar segments is easier on the eyes.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，我们处理了 5 个办公室位置和 10 个部门。显示 10 列而不是 10 个条形段对眼睛来说更容易。
- en: 'This way, you’ll end up showing office locations as bar segments instead of
    departments:'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 这样，你最终会以条形段的形式显示办公室位置，而不是部门：
- en: '[PRE10]'
  id: totrans-104
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: '![](../Images/1f81d34574ba27347b497434a62dd9b1.png)'
  id: totrans-105
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/1f81d34574ba27347b497434a62dd9b1.png)'
- en: Image 10 – Transposed column chart (image by author)
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 图像 10 – 转置的柱状图（作者图片）
- en: It’s just a matter of reframing the problem.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 这只是重新定义问题。
- en: The chart on *Image 10* is miles ahead of the chart on *Image 8*. It’s a fact.
    No one can argue with it.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: '*图像10*上的图表比*图像8*上的图表好得多。这是一个事实。没有人可以对此提出异议。'
- en: 4\. Provide In-Depth Explanations of Data On Your Charts
  id: totrans-109
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4. 在图表中提供数据的深入解释
- en: You can leverage subtitle and/or caption sections of your chart to add extra
    information.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以利用图表的副标题和/或说明部分添加额外信息。
- en: This comes in handy when you want to provide more context about the data, cite
    sources, or summarize the main point(s) of your visualization. The last one is
    most applicable for people with visual impairments.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 当你想提供更多关于数据的背景信息、引用来源或总结可视化中的主要观点时，这很有用。最后一个对于视力障碍人士来说最适用。
- en: The problem with matplotlib is that it **doesn’t have a dedicated function** for
    chart subtitles and captions. You can use suptitle(), but you’ll have to play
    around with x and y-axis coordinates.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: matplotlib的问题在于它**没有为图表副标题和标题提供专用函数**。你可以使用suptitle()，但你需要调整x和y轴坐标。
- en: 'Here’s an example:'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个例子：
- en: '[PRE11]'
  id: totrans-114
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: '![](../Images/585919f7c7e29ca55faa83e50616c6d4.png)'
  id: totrans-115
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/585919f7c7e29ca55faa83e50616c6d4.png)'
- en: Image 11 – Chart with title and subtitle (image by author)
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 图像11 – 带有标题和副标题的图表（图片由作者提供）
- en: 'If you prefer a caption over a subtitle, you only have the change y-axis coordinate
    in `plt.suptitle()`:'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你更喜欢标题而不是副标题，你只需要在`plt.suptitle()`中更改y轴坐标：
- en: '[PRE12]'
  id: totrans-118
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: '![](../Images/805bdcd10c5213ba0a877bf927094a59.png)'
  id: totrans-119
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/805bdcd10c5213ba0a877bf927094a59.png)'
- en: Image 12 – Chart with title and caption (image by author)
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 图像12 – 带有标题和说明的图表（图片由作者提供）
- en: All in all, a subtitle or a caption may be the deciding factor in correctly
    getting your message to a person with visual impairments.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 总的来说，副标题或标题可能是正确传达信息给视力障碍人士的决定性因素。
- en: Just don’t make it 10 paragraphs long. Otherwise, it’s the 3rd point of this
    article all over again.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 只不过不要让它变成10个段落那么长。否则，这又成了这篇文章的第三点。
- en: 5\. Add Alt Text When Embedding Plots
  id: totrans-123
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 5. 在嵌入图表时添加替代文本
- en: Many people with visual impairments use screen readers.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 许多视力障碍人士使用屏幕阅读器。
- en: '**The problem with screen readers and charts** is that they simply can’t coexist.
    They might be able to pick up textual elements from the graph, but they can’t
    interpret the visual content. So, whenever you’re sharing your visualizations
    (e.g., embedding them into a website), you must add alt text.'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: '**屏幕阅读器和图表的问题**在于它们根本无法共存。它们可能能够从图表中提取文本元素，但无法解释视觉内容。因此，每次你分享你的可视化（例如，将其嵌入到网站中），你必须添加替代文本。'
- en: This is a paragraph the screen reader will read to your user.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个屏幕阅读器将读给用户听的段落。
- en: 'To demonstrate, let’s use the `plt.savefig()` function to save the chart as
    an image:'
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 为了演示，让我们使用`plt.savefig()`函数将图表保存为图像：
- en: '[PRE13]'
  id: totrans-128
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: 'In a new HTML document, add an `<img>` tag that points to the image. This is
    where you should provide alt text:'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 在一个新的HTML文档中，添加一个指向图片的`<img>`标签。这是你应该提供替代文本的地方：
- en: '[PRE14]'
  id: totrans-130
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: '![](../Images/a23b1ae22e5a428679656ce8613d8008.png)'
  id: totrans-131
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/a23b1ae22e5a428679656ce8613d8008.png)'
- en: Image 13 – Plot image embedded in HTML (image by author)
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 图像13 – 嵌入HTML中的图表图像（图片由作者提供）
- en: You can’t see alt text when you open the HTML file, but that’s because you’re
    not using a screen reader.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 当你打开HTML文件时，你无法看到替代文本，但这是因为你没有使用屏幕阅读器。
- en: If the screen reader is detected, the alt text will be automatically read to
    the user.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 如果检测到屏幕阅读器，替代文本将自动读给用户听。
- en: 'The best you can do is use a [screen reader plugin](https://chromewebstore.google.com/detail/screen-reader/kgejglhpjiefppelpmljglcjbhoiplfn) or
    point to the image that doesn’t exist in HTML:'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 你能做的最好的事情是使用一个[屏幕阅读器插件](https://chromewebstore.google.com/detail/screen-reader/kgejglhpjiefppelpmljglcjbhoiplfn)或者指向HTML中不存在的图片：
- en: '[PRE15]'
  id: totrans-136
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: '![](../Images/12ed873cd3ff6a440678201020f4972e.png)'
  id: totrans-137
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/12ed873cd3ff6a440678201020f4972e.png)'
- en: Image 14 – Alt text for unfound images (image by author)
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 图像14 – 未找到图片的替代文本（图片由作者提供）
- en: Now the image can’t be found, so alt text is displayed instead.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 现在图片找不到，所以显示替代文本。
- en: Summing Up Data Visualization Accessibility
  id: totrans-140
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 总结数据可视化可访问性
- en: And there you have it — 5 things you should always keep in mind when designing
    data visualizations.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 就这样——在设计数据可视化时，你应该始终牢记这5件事。
- en: These tips are helpful in general but are of vital importance when accessibility
    is essential. And it always should be. It requires a tiny bit of extra work from
    your end, but makes your findings accessible to millions of additional people
    worldwide.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 这些技巧在一般情况下很有帮助，但在可访问性至关重要时更是如此。而且它始终应该是这样。这需要你做一点额外的工作，但可以使你的发现对全球数百万额外的人可访问。
- en: '*<mdspan datatext="el1749213397534" class="mdspan-comment">Which data visualization
    features for accessibility do you implement for your charts and applications?</mdspan>*'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: '*<mdspan datatext="el1749213397534" class="mdspan-comment">您为您的图表和应用实现了哪些可访问性的数据可视化功能？</mdspan>*'
