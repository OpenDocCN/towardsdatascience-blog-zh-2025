- en: '**Dataset:** This blog uses publicly available data from FRED (Federal Reserve
    Economic Data). The series *Advance Retail Sales: Department Stores (RSDSELD)*
    is published by the U.S. Census Bureau and can be used for analysis and publication
    with appropriate citation.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Official citation:'
  prefs: []
  type: TYPE_NORMAL
- en: 'U.S. Census Bureau, *Advance Retail Sales: Department Stores* [RSDSELD], retrieved
    from FRED, Federal Reserve Bank of St. Louis; [https://fred.stlouisfed.org/series/RSDSELD](https://fred.stlouisfed.org/series/RSDSELD),
    July 7, 2025.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Note: All images, unless otherwise noted, are by the author.**'
  prefs: []
  type: TYPE_NORMAL
- en: I hope you got a basic idea of how STL decomposition works, from calculating
    initial trend and seasonality to finding final components using LOESS smoothing.
  prefs: []
  type: TYPE_NORMAL
- en: Next in the series, we discuss ‘**Stationarity of a Time Series’** in detail.
  prefs: []
  type: TYPE_NORMAL
- en: Thanks for reading!
  prefs: []
  type: TYPE_NORMAL
