- en: 'Time Series Forecasting Made Simple (Part 3.2): A Deep Dive into LOESS-Based
    Smoothing'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 时间序列预测简单化（第 3.2 部分）：深入探讨基于 LOESS 的平滑
- en: 原文：[https://towardsdatascience.com/time-series-forecasting-made-simple-part-3-2-a-deep-dive-into-loess-based-smoothing/](https://towardsdatascience.com/time-series-forecasting-made-simple-part-3-2-a-deep-dive-into-loess-based-smoothing/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://towardsdatascience.com/time-series-forecasting-made-simple-part-3-2-a-deep-dive-into-loess-based-smoothing/](https://towardsdatascience.com/time-series-forecasting-made-simple-part-3-2-a-deep-dive-into-loess-based-smoothing/)'
- en: In **[Part 3.1](https://towardsdatascience.com/time-series-forecasting-made-simple-part-3-1-stl-decomposition-understanding-initial-trend-and-seasonality-prior-to-loess-smoothing/)**
    we started discussing how <mdspan datatext="el1754594417353" class="mdspan-comment">STL
    Decomposition</mdspan> decomposes the time series data into trend, seasonality,
    and residual components, and as it is a smoothing-based technique, it means we
    need rough estimates of trend and seasonality for STL to perform smoothing.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在 **[第 3.1 部分](https://towardsdatascience.com/time-series-forecasting-made-simple-part-3-1-stl-decomposition-understanding-initial-trend-and-seasonality-prior-to-loess-smoothing/)**
    中，我们开始讨论 STL 分解如何将时间序列数据分解为趋势、季节性和残差成分，由于它是一种基于平滑的技术，这意味着我们需要对趋势和季节性进行粗略估计，以便
    STL 进行平滑。
- en: For that, we calculated a rough estimate of a trend by calculating it using
    the Centered Moving Averages method, and then by using this initial trend, we
    also calculated the initial seasonality. (Detailed math is discussed in **Part
    3.1**)
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 为了这个目的，我们通过使用中心移动平均法计算了一个趋势的粗略估计，然后使用这个初始趋势，我们还计算了初始的季节性。（详细的数学讨论见 **第 3.1 部分**）
- en: In this part, we implement the **LOESS (Locally Estimated Scatterplot Smoothing)
    method** next to get the final trend and seasonal components of the time series.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在本部分，我们实现 **LOESS (局部估计散点图平滑) 方法** 以获取时间序列的最终趋势和季节成分。
- en: 'At the end of part 3.1, we have the following data:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在 3.1 部分的结尾，我们有以下数据：
- en: '![](../Images/332480e8ad5d27d2e418be820604ddc9.png)'
  id: totrans-6
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/332480e8ad5d27d2e418be820604ddc9.png)'
- en: '**Table: Centered Seasonal values from Part 3.1**'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: '**表：第 3.1 部分的中心化季节值**'
- en: As we have the centered seasonal component, the next step is to subtract this
    from the original time series to get the deseasonalized series.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们有了中心化的季节成分，下一步就是从原始时间序列中减去这部分以获得去季节化序列。
- en: '![](../Images/0cbbd0285d9ff86f995dfa7f62e23f59.png)'
  id: totrans-9
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0cbbd0285d9ff86f995dfa7f62e23f59.png)'
- en: '**Table: Deseasonalized values**'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: '**表：去季节化值**'
- en: We got the series of deseasonalized values, and we know that this contains both
    trend and residual components.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 我们得到了去季节化值的序列，我们知道这包含了趋势和残差成分。
- en: '**Now we apply LOESS (Locally Estimated Scatterplot Smoothing) on this deseasonalized
    series.**'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '**现在我们将 LOESS (局部估计散点图平滑) 应用于这个去季节化序列。**'
- en: Here, we aim to understand the concept and mathematics behind the LOESS technique.
    To do this we consider a single data point from the deseasonalized series and
    implement LOESS step by step, observing how the value changes.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们的目标是理解 LOESS 技术背后的概念和数学。为此，我们考虑去季节化序列中的一个单独数据点，并逐步实现 LOESS，观察值是如何变化的。
- en: '* * *'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Before understanding the math behind the LOESS, we try to understand what is
    actually done in the LOESS smoothing process.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 在理解 LOESS 背后的数学之前，我们试图理解 LOESS 平滑过程中的实际操作是什么。
- en: LOESS is the process similar to Simple Linear Regression, but the only difference
    here is, we assign weights to the points such that the points nearer to the target
    point gets more weight and farther from the target point gets less weight.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: LOESS 是类似于简单线性回归的过程，但这里的唯一区别是，我们给点分配权重，使得靠近目标点的点获得更多的权重，远离目标点的点获得较少的权重。
- en: We can call it a Weighted Simple Linear Regression.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以将其称为加权简单线性回归。
- en: Here the target point is the point at which the LOESS smoothing is done, and,
    in this process, we select an alpha value which ranges between 0 and 1.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，目标点是 LOESS 平滑执行的位置，在这个过程中，我们选择一个介于 0 和 1 之间的 alpha 值。
- en: Mostly we use 0.3 or 0.5 as the alpha value.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 我们通常使用 0.3 或 0.5 作为 alpha 值。
- en: For example, let’s say alpha = 0.3 which means 30% of the data points is used
    in this regression, which means if we have 100 data points then 15 points before
    the target point and 15 points after target point (including target point) are
    used in this smoothing process.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，假设 alpha = 0.3，这意味着 30% 的数据点用于这个回归，这意味着如果我们有 100 个数据点，那么在目标点之前和之后（包括目标点）使用
    15 个点进行平滑过程。
- en: Same as with Simple Linear Regression, in this smoothing process we fit a line
    to the data points with added weights.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 与简单线性回归类似，在这个平滑过程中，我们给数据点添加权重，并拟合一条线。
- en: We add weights to the data points because it helps the line to adapt to the
    local behavior of the data and ignoring fluctuations or outliers, as we are trying
    to estimate the trend component in this process.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 我们给数据点添加权重，因为这有助于线适应数据的局部行为，忽略波动或异常值，因为我们试图在这个过程中估计趋势成分。
- en: Now we got an idea that in LOESS smoothing process we fit a line that best fits
    the data and from that we calculate the smoothed value at the target point.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经了解到在LOESS平滑过程中，我们拟合一条最佳拟合数据的线，并从那条线计算目标点的平滑值。
- en: Next, we will implement LOESS smoothing by taking a single point as an example.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将通过以一个点为例来实现LOESS平滑。
- en: '* * *'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: Let’s try to understand what’s actually done in LOESS smoothing by taking a
    single point as an example.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们通过以一个点为例来尝试理解LOESS平滑实际上是如何进行的。
- en: Consider 01-08-2010, here the deseasonalized value is 14751.02.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 以2010年01月08日为例，这里去季节化的值是14751.02。
- en: Now to understand the math behind LOESS easily, let’s consider a span of five
    points.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 现在为了更容易地理解LOESS背后的数学，让我们考虑五个点的跨度。
- en: Here the span of five points means we consider the points which are nearest
    to target point (1-8-2010) including the target point.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 这里五个点的跨度意味着我们考虑的是最接近目标点（2010-08-01）的点，包括目标点本身。
- en: '![](../Images/2647b95dae60fe87f35b9dcd1695d091.png)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/2647b95dae60fe87f35b9dcd1695d091.png)'
- en: Image by Author
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: To demonstrate LOESS smoothing at August 2010, we considered values from June
    2010 to October 2010.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 为了展示2010年8月的LOESS平滑处理，我们考虑了从2010年6月到2010年10月的数据值。
- en: Here the index values (starting from zero) are from the original data.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 这里索引值（从零开始）来自原始数据。
- en: The first step in LOESS smoothing is that we calculate the distances between
    the target point and neighboring points.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: LOESS平滑的第一步是计算目标点与邻近点之间的距离。
- en: We calculate this distance based on the index values.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 我们根据索引值计算这个距离。
- en: '![](../Images/3bf0555f7791e04f1df6126377972083.png)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/3bf0555f7791e04f1df6126377972083.png)'
- en: Image by Author
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: We calculated the distances and the maximum distance from the target point is
    ‘2’.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 我们计算了距离，目标点的最大距离是‘2’。
- en: Now the next step in LOESS smoothing is to calculate the tricube weights, LOESS
    assigns weights to each point based on the scaled distances.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 现在LOESS平滑的下一步是计算三立方权重，LOESS根据缩放距离为每个点分配权重。
- en: '![](../Images/4add4e6ae3c75e7522b9ac553574a93f.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/4add4e6ae3c75e7522b9ac553574a93f.png)'
- en: Image by Author
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: Here the tricube weights for 5 points are [0.00, 0.66, 1.00, 0.66, 0.00].
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 这里五个点的三立方权重是[0.00, 0.66, 1.00, 0.66, 0.00]。
- en: Now that we have calculated the tricube weights, the next step is to perform
    weighted simple linear regression.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经计算了三立方权重，下一步是执行加权简单线性回归。
- en: The formulas are similar as SLR with usual averages getting replaced by weighted
    averages.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 公式与线性回归（SLR）类似，只是将常规平均值替换为加权平均值。
- en: Here’s the full step by step math to calculate the LOESS smoothed value at t=7.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是计算t=7时LOESS平滑值的完整逐步数学过程。
- en: '![](../Images/f737b8da0c4c90c931496f6fae5de742.png)'
  id: totrans-46
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f737b8da0c4c90c931496f6fae5de742.png)'
- en: Image by Author
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: '![](../Images/0c27375b1c6ed2dbbab44cb84f1170b9.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0c27375b1c6ed2dbbab44cb84f1170b9.png)'
- en: Image by Author
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: Here the LOESS trend estimate at August 2010 is 14212.96 which is less than
    the deseasonalized value of 14751.02.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 这里2010年8月的LOESS趋势估计值是14212.96，这低于去季节化的值14751.02。
- en: In our 5-point window, if we see the values of neighboring months, we can observe
    that the values are decreasing, and the August value looks like a sudden jump.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的5点窗口中，如果我们看到邻近月份的值，我们可以观察到值在下降，而8月的值看起来像是一个突然的跳跃。
- en: LOESS tries to fit a line that best fits the data which represents the underlying
    local trend; it smooths out sharp spikes or dips and it gives us a true local
    behavior of the data.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: LOESS试图拟合一条最佳拟合数据的线，它代表了潜在的本地区域趋势；它平滑掉了尖锐的峰值或低谷，并给出了数据的真实局部行为。
- en: '* * *'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: This is how LOESS calculates the smoothed value for a data point.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是LOESS如何计算数据点的平滑值。
- en: For our dataset when we implement STL decomposition using Python, the alpha
    value may be between 0.3 and 0.5 based on the number of points in the dataset.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我们的数据集，当我们使用Python实现STL分解时，alpha值可能介于0.3和0.5之间，这取决于数据集中的点数。
- en: We can also try different alpha values and see which one represents the data
    best and select the appropriate one.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还可以尝试不同的alpha值，看看哪一个最能代表数据，并选择合适的值。
- en: This process is repeated for each and every point in the data.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 这个过程对数据中的每一个点都重复进行。
- en: Once we get the LOESS smoothed trend component, it is subtracted from the original
    series to isolate seasonality and noise.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦我们获得LOESS平滑趋势成分，就从原始序列中减去它以隔离季节性和噪声。
- en: Next, we follow the same LOESS smoothing procedure across seasonal subseries
    like all Januaries, Februaries etc. (as in part 3.1) to get LOESS smoothed seasonal
    component.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们遵循相同的LOESS平滑程序，对季节性子序列（如所有一月份、二月份等）进行平滑处理（如第3.1部分所述），以获得LOESS平滑季节性成分。
- en: After getting both the LOESS smoothed trend and seasonality components, we subtract
    them from original series to get the residual.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 在获得LOESS平滑趋势和季节性成分后，我们从原始序列中减去它们以获得残差。
- en: After this, the whole process is repeated to further refine the components,
    the LOESS smoothed seasonality is subtracted from the original series to find
    LOESS smoothed trend and this new LOESS smoothed trend is subtracted from the
    original series to find the LOESS smoothed seasonality.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 之后，整个过程重复进行以进一步细化组成部分，从原始序列中减去LOESS平滑季节性成分以找到LOESS平滑趋势，然后从这个新的LOESS平滑趋势中减去原始序列以找到LOESS平滑季节性。
- en: This we can call as one Iteration, and after several rounds of iteration (10-15),
    the three components get stabilized and there is no further change and STL returns
    the final trend, seasonality, and residual components.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以将这个过程称为一次迭代，经过几轮迭代（10-15轮）后，三个组成部分趋于稳定，不再发生变化，STL返回最终趋势、季节性和残差成分。
- en: This is what happens when we use the code below to apply STL decomposition on
    the dataset to get the three components.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是我们使用以下代码在数据集上应用STL分解以获取三个成分时发生的情况。
- en: '[PRE0]'
  id: totrans-64
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '![](../Images/b264bd863a5e1df5e054398f96cf805e.png)'
  id: totrans-65
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b264bd863a5e1df5e054398f96cf805e.png)'
