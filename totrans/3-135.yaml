  id: totrans-132
  prefs: []
  type: TYPE_TB
  zh: '| Runge-Kutta 4 | ❌ | 4 | 显式 |'
- en: '| Forest-Ruth Integrator | ✅ | 4 | Explicit |'
  id: totrans-133
  prefs: []
  type: TYPE_TB
  zh: '| Forest-Ruth 积分器 | ✅ | 4 | 显式 |'
- en: '| Yoshida 6th-order | ✅ | 6 | Explicit |'
  id: totrans-134
  prefs: []
  type: TYPE_TB
  zh: '| Yoshida 6阶 | ✅ | 6 | 显式 |'
- en: '| Heun’s Method (RK2) | ❌ | 2 | Explicit |'
  id: totrans-135
  prefs: []
  type: TYPE_TB
  zh: '| Heun方法（RK2） | ❌ | 2 | 显式 |'
- en: '| Third-order Runge-Kutta | ❌ | 3 | Explicit |'
  id: totrans-136
  prefs: []
  type: TYPE_TB
  zh: '| 三阶Runge-Kutta | ❌ | 3 | 显式 |'
- en: '| Implicit Midpoint Rule | ✅ | 2 | Implicit (solving equations) |'
  id: totrans-137
  prefs: []
  type: TYPE_TB
