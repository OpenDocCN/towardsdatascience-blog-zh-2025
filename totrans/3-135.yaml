- en: 'Mathematical Reformation: From Second-Order to First Order ⚙️'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Newton’s \( F = m\ddot{q} \) requires solving second-order differential equations,
    which become unwieldy for constrained systems or when identifying conserved quantities.
  prefs: []
  type: TYPE_NORMAL
- en: '**The Core Idea**'
  prefs: []
  type: TYPE_NORMAL
- en: '**Hamiltonian mechanics splits** \( \ddot{q} = F(q)/m \) **into two first-order
    equations** by introducing conjugate momentum \( p \):'
  prefs: []
  type: TYPE_NORMAL
- en: \[
  prefs: []
  type: TYPE_NORMAL
- en: \begin{align*}
  prefs: []
  type: TYPE_NORMAL
- en: \dot{q} = \frac{\partial H}{\partial p} & \text{(Position)}, \quad \dot{p} =
    -\frac{\partial H}{\partial q} & \text{(Momentum)}
  prefs: []
  type: TYPE_NORMAL
- en: \end{align*}
  prefs: []
  type: TYPE_NORMAL
- en: \]
  prefs: []
  type: TYPE_NORMAL
- en: It decomposes acceleration into complementary momentum/position flows. This
    phase space perspective reveals hidden geometric structure.
  prefs: []
  type: TYPE_NORMAL
- en: 'Lagrangian Prelude: Action Principles'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The Lagrangian \( \mathcal{L}(q, \dot{q}) = K – U \) leads to Euler-Lagrange
    equations via variational calculus:'
  prefs: []
  type: TYPE_NORMAL
- en: \[ \frac{d}{dt}\left( \frac{\partial \mathcal{L}}{\partial \dot{q}} \right)
    – \frac{\partial \mathcal{L}}{\partial q} = 0 \]
  prefs: []
  type: TYPE_NORMAL
- en: '**Kinetic Energy Symbol**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Note that the \( K \) in the \( \mathcal{L}(q, \dot{q}) = K – U \) is also represented
    as **\( T \)**.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'But these remain second-order. The critical leap comes through **Legendre Transformation
    \( (\dot{q} \rightarrow p) \)**. The Hamiltonian is derived from the Lagrangian
    through a **Legendre transformation** by defining the conjugate momentum as \(
    p_i = \frac{\partial \mathcal{L}}{\partial \dot{q}_i} \); then the Hamiltonian
    can be written as:'
  prefs: []
  type: TYPE_NORMAL
- en: \[ H(q,p) = \sum_i p_i \dot{q}_i – \mathcal{L}(q, \dot{q}) \]
  prefs: []
  type: TYPE_NORMAL
- en: 'We can write \( H(q,p) \) more intuitively as:'
  prefs: []
  type: TYPE_NORMAL
- en: \[ H(q,p) = K(p) + U(q) \]
  prefs: []
  type: TYPE_NORMAL
- en: 'This flips the script: instead of \( \dot{q} \)-centric dynamics, we get **symplectic
    phase flow**.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Why This Matters**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The Hamiltonian becomes the system’s total energy \( H = K + U \) for many physical
    systems. It also provides a framework where time evolution is a **canonical transformation**
    – a symmetry preserving the fundamental Poisson bracket structure \( \{q_i, p_j\}
    = \delta_{ij} \).
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: For more about canonical, non-canonical transformations, and Poisson bracket,
    including detailed math and examples, check out the [TorchEBM post on Hamiltonian
    mechanics](https://soran-ghaderi.github.io/torchebm/latest/blog/hamiltonian-mechanics/#lagrangian-prelude-action-principles).
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: This transformation is not canonical because it does not preserve the Poisson
    bracket structure.
  prefs: []
  type: TYPE_NORMAL
- en: 'Newton vs. Lagrange vs. Hamilton: A Philosophical Showdown'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '| Aspect | Newtonian | Lagrangian | Hamiltonian |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| **State Variables** | Position \( x \) and velocity \( \dot{x} \) | Generalized
    coordinates \( q \) and velocities \( \dot{q} \) | Generalized coordinates \(
    q \) and conjugate momenta \( p \) |'
  prefs: []
  type: TYPE_TB
- en: '| **Formulation** | Second-order differential equations \( (F=ma) \) | Principle
    of least action (\( \delta \int L \, dt = 0 \)): \( L = K – U \) | First-order
    differential equations from Hamiltonian function (Phase flow \( (dH) \)): \( H
    = K + U \) |'
  prefs: []
  type: TYPE_TB
- en: '| **Identifying Symmetries** | Manual identification or through specific methods
    | Noether’s theorem | Canonical transformations and Poisson brackets |'
  prefs: []
  type: TYPE_TB
- en: '| **Machine Learning Connection** | Physics-informed neural networks, simulations
    | Optimal control, reinforcement learning | Hamiltonian Monte Carlo (HMC) sampling,
    energy-based models |'
  prefs: []
  type: TYPE_TB
- en: '| **Energy Conservation** | Not inherent (must be derived) | Built-in through
    conservation laws | Central (Hamiltonian is energy) |'
  prefs: []
  type: TYPE_TB
- en: '| **General Coordinates** | Possible, but often cumbersome | Natural fit |
    Natural fit |'
  prefs: []
  type: TYPE_TB
- en: '| **Time Reversibility** | Yes | Yes | Yes, especially in symplectic formulations
    |'
  prefs: []
  type: TYPE_TB
- en: 'Hamilton’s Equations: The Geometry of Phase Space ⚙️'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The phase space is a mathematical space where we can represent the set of possible
    states of a physical system. For a system with \( n \) degrees of freedom, the
    phase space is a \( 2n \)-dimensional space, often visualized as a map where each
    point \( (q, p) \) represents a unique state. The evolution of the system is described
    by the motion of a point in this space, governed by Hamilton’s equations.
  prefs: []
  type: TYPE_NORMAL
- en: <https://contributor.insightmediagroup.io/wp-content/uploads/2025/03/pendulum_phase_space-1.mp4>
  prefs: []
  type: TYPE_NORMAL
- en: Phase space portrait of a nonlinear pendulum showing oscillatory motion (closed
    orbits), rotational motion (wavy trajectories), and separatrices (red curves)
    connecting unstable equilibrium points. Position (q) and momentum (p) dynamics
    illustrate energy conservation principles fundamental to Hamiltonian systems.
    The animation is done by the [author](https://soran-ghaderi.github.io/).
  prefs: []
  type: TYPE_NORMAL
- en: 'This formulation offers several advantages. It makes it straightforward to
    identify conserved quantities and symmetries through canonical transformations
    and Poisson brackets, which provides deeper insights into the system’s behavior.
    For instance, Liouville’s theorem states that the volume in phase space occupied
    by an ensemble of systems remains constant over time, expressed as:'
  prefs: []
  type: TYPE_NORMAL
- en: \[ \frac{\partial \rho}{\partial t} + \{\rho, H\} = 0 \]
  prefs: []
  type: TYPE_NORMAL
- en: 'or equivalently:'
  prefs: []
  type: TYPE_NORMAL
- en: \[ \frac{\partial \rho}{\partial t} + \sum_i \left(\frac{\partial \rho}{\partial
    q_i}\frac{\partial H}{\partial p_i} – \frac{\partial \rho}{\partial p_i}\frac{\partial
    H}{\partial q_i}\right) = 0 \]
  prefs: []
  type: TYPE_NORMAL
- en: where \( \rho(q, p, t) \) is the density function. This helps us to represent
    the phase space flows and how they preserve area under symplectic transformations.
    Its relation to [symplectic geometry](https://en.wikipedia.org/wiki/Symplectic_geometry)
    enables mathematical properties that are directly relevant to many numerical methods.
    For instance, it enables Hamiltonian Monte Carlo to perform well in high-dimensions
    by defining MCMC strategies that increases the chances of accepting a sample (particle).
  prefs: []
  type: TYPE_NORMAL
- en: 'Symplecticity: The Sacred Invariant'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Hamiltonian flows preserve the symplectic 2-form \( \omega = \sum_i dq_i \wedge
    dp_i \).
  prefs: []
  type: TYPE_NORMAL
- en: '**Symplectic 2-form \( \omega \)**'
  prefs: []
  type: TYPE_NORMAL
- en: The symplectic 2-form, denoted by \( \omega = \sum_i dq_i \wedge dp_i \), is
    a mathematical object used in symplectic geometry. It measures the area of parallelograms
    formed by vectors in the tangent space of a phase space.
  prefs: []
  type: TYPE_NORMAL
- en: '\( dq_i \) and \( dp_i \): Infinitesimal changes in position and momentum coordinates.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**\( \wedge \)**: The wedge product, which combines differential forms in an
    antisymmetric way meaning that \( dq_i \wedge dp_i = -dp_i \wedge dq_i \).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**\( \sum_i \)**: Sum over all degrees of freedom.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Imagine a phase space where each point represents a state of a physical system.
    The symplectic form assigns a value to each pair of vectors, effectively measuring
    the area of the parallelogram they span. This area is preserved under Hamiltonian
    flows.
  prefs: []
  type: TYPE_NORMAL
- en: '**Key Properties**'
  prefs: []
  type: TYPE_NORMAL
- en: '**Closed**: \( d\omega = 0 \) which means its exterior derivative is zero \(
    d\omega=0 \). This property ensures that the form does not change under continuous
    transformations.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Non-degenerate**: The form is non-degenerate if \( d\omega(X,Y)=0 \) for
    all \( Y \)s, then \( X=0 \). This ensures that every vector has a unique “partner”
    vector such that their pairing under \( \omega \) is non-zero.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Example**'
  prefs: []
  type: TYPE_NORMAL
- en: For a simple harmonic oscillator with one degree of freedom, \( \omega = dq
    \wedge dp \). This measures the area of parallelograms in the phase space spanned
    by vectors representing changes in position and momentum.
  prefs: []
  type: TYPE_NORMAL
- en: '**A Very Simplistic PyTorch Code**:'
  prefs: []
  type: TYPE_NORMAL
- en: 'While PyTorch doesn’t directly handle differential forms, you can conceptually
    represent the symplectic form using tensors:'
  prefs: []
  type: TYPE_NORMAL
- en: This code illustrates the antisymmetric nature of the wedge product.
  prefs: []
  type: TYPE_NORMAL
- en: 'Numerically, this means good integrators must respect:'
  prefs: []
  type: TYPE_NORMAL
- en: \[ \frac{\partial (q(t + \epsilon), p(t + \epsilon))}{\partial (q(t), p(t))}^T
    J \frac{\partial (q(t + \epsilon), p(t + \epsilon))}{\partial (q(t), p(t))} =
    J \\ \text{where } J = \begin{pmatrix} 0 & I \\ -I & 0 \end{pmatrix} \]
  prefs: []
  type: TYPE_NORMAL
- en: '**Breaking Down the Formula**'
  prefs: []
  type: TYPE_NORMAL
- en: '**Geometric numerical integration**: Solves differential equations while preserving
    geometric properties of the system.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Symplecticity**: A geometric property inherent to Hamiltonian systems. It
    ensures that the area of geometric structures (e.g., parallelograms) in phase
    space \( (q, p) \) remains constant over time. This is encoded in the symplectic
    form \( \omega = \sum_i dq_i \wedge dp_i \).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'A numerical method is **symplectic**: If it preserves \( \omega \). The Jacobian
    matrix of the transformation from \( (q(t), p(t)) \) to \( (q(t + \epsilon), p(t
    + \epsilon)) \) must satisfy the condition above.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Jacobian matrix** \( \frac{\partial (q(t + \epsilon), p(t + \epsilon))}{\partial
    (q(t), p(t))} \): Quantifies how small changes in the initial state \( (q(t),
    p(t)) \) propagate to the next state \( (q(t + \epsilon), p(t + \epsilon)) \).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '\( q(t) \) and \( p(t) \): Position and momentum at time \( t \).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '\( q(t + \epsilon) \) and \( p(t + \epsilon) \): Updated position and momentum
    after one time step \( \epsilon \).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**\( \frac{\partial}{\partial (q(t), p(t))} \)**: Partial derivatives with
    respect to the initial state.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How are We Going to Solve it?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Numerical solvers for differential equations inevitably introduce errors that
    affect solution accuracy. These errors manifest as deviations from the true trajectory
    in phase space, particularly noticeable in energy-conserving systems like the
    harmonic oscillator. The errors fall into two main categories: local truncation
    error, arising from the approximation of continuous derivatives with discrete
    steps (proportional to \( \mathcal{O}(\epsilon^n+1) \) where \( \epsilon \) is
    the step size and n depends on the method); and global accumulation error, which
    compounds over integration time.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Forward Euler Method Fails at This!**'
  prefs: []
  type: TYPE_NORMAL
- en: '**Key Issue: Energy Drift from Non-Symplectic Updates**'
  prefs: []
  type: TYPE_NORMAL
- en: The forward Euler method (FEM) violates the geometric structure of Hamiltonian
    systems, leading to **energy drift** in long-term simulations. Let’s dissect why.
  prefs: []
  type: TYPE_NORMAL
- en: For a detailed exploration of how methods like Forward Euler perform in Hamiltonian
    systems and why they don’t preserve symplecticity—including mathematical breakdowns
    and practical examples—check out this post on Hamiltonian mechanics from the [TorchEBM
    library documentation](https://soran-ghaderi.github.io/torchebm/latest/blog/hamiltonian-mechanics/#how-are-we-going-to-solve-it).
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: To overcome this, we turn to symplectic integrators—methods that respect the
    underlying geometry of Hamiltonian systems, leading us naturally to the Leapfrog
    Verlet method, a powerful symplectic alternative. 🚀
  prefs: []
  type: TYPE_NORMAL
- en: Symplectic Numerical Integrators 💻
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Leapfrog Verlet
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'For a separable Hamiltonian \( H(q,p) = K(p) + U(q) \), where the corresponding
    probability distribution is given by:'
  prefs: []
  type: TYPE_NORMAL
- en: \[ P(q,p) = \frac{1}{Z} e^{-U(q)} e^{-K(p)}, \]
  prefs: []
  type: TYPE_NORMAL
- en: 'the Leapfrog Verlet integrator proceeds as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: \[ \begin{aligned} p_{i}\left(t + \frac{\epsilon}{2}\right) &= p_{i}(t) – \frac{\epsilon}{2}
    \frac{\partial U}{\partial q_{i}}(q(t)) \\ q_{i}(t + \epsilon) &= q_{i}(t) + \epsilon
    \frac{\partial K}{\partial p_{i}}\left(p\left(t + \frac{\epsilon}{2}\right)\right)
    \\ p_{i}(t + \epsilon) &= p_{i}\left(t + \frac{\epsilon}{2}\right) – \frac{\epsilon}{2}
    \frac{\partial U}{\partial q_{i}}(q(t + \epsilon)) \end{aligned} \]
  prefs: []
  type: TYPE_NORMAL
- en: This Störmer-Verlet scheme preserves symplecticity exactly, with local error
    \( \mathcal{O}(\epsilon^3) \) and global error \( \mathcal{O}(\epsilon^2) \).
    You can read more about [numerical methods and analysis in Python here](https://lemesurierb.people.charleston.edu/numerical-methods-and-analysis-python/main/ODE-IVP-6-multi-step-methods-introduction-python.html).
  prefs: []
  type: TYPE_NORMAL
- en: '**How Exactly?**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Want to know exactly how the Leapfrog Verlet method ensures symplecticity with
    detailed equations and proofs? The [TorchEBM library documentation on Leapfrog
    Verlet](https://soran-ghaderi.github.io/torchebm/latest/blog/hamiltonian-mechanics/#leapfrog-verlet)
    breaks it down step-by-step.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Why Symplecticity Matters
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: They’re the **reversible neural nets** of physics simulations!
  prefs: []
  type: TYPE_NORMAL
- en: Symplectic integrators like Leapfrog Verlet are critical for **long-term stability**
    in Hamiltonian systems.
  prefs: []
  type: TYPE_NORMAL
- en: '**Phase space preservation**: The volume in \( (q, p) \)-space is conserved
    exactly, avoiding artificial energy drift.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Approximate energy conservation**: While energy \( H(q,p) \) is not perfectly
    conserved (due to \( \mathcal{O}(\epsilon^2) \) error), it oscillates near the
    true value over exponentially long timescales.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Practical relevance**: This makes symplectic integrators indispensable in
    molecular dynamics and Hamiltonian Monte Carlo (HMC), where accurate sampling
    relies on stable trajectories.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/4d0fade77fb114955d6eb245822a6e3f.png)'
  prefs: []
  type: TYPE_IMG
- en: Comparison of numerical integration methods for a simple harmonic oscillator
    in phase space. Color gradients indicate error magnitude with brighter colors
    showing larger divergence from the exact solution (white). Euler’s method (a)
    exhibits energy growth, Modified Euler’s method (b) shows improved stability,
    while Leapfrog maintains excellent energy conservation at small stepsize (c) but
    develops geometric distortion at larger stepsize (d). Photo by the [author](https://soran-ghaderi.github.io/).
  prefs: []
  type: TYPE_NORMAL
- en: Euler’s method (first-order) systematically injects energy into the system,
    causing the characteristic outward spiral seen in the plots. Modified Euler’s
    method (second-order) significantly reduces this energy drift. Most importantly,
    symplectic integrators like the Leapfrog method preserve the geometric structure
    of Hamiltonian systems even with relatively large step sizes by maintaining phase
    space volume conservation. This structural preservation is why Leapfrog remains
    the preferred method for long-time simulations in molecular dynamics and astronomy,
    where energy conservation is critical despite the visible polygon-like discretization
    artifacts at large step sizes.
  prefs: []
  type: TYPE_NORMAL
- en: Non-symplectic methods (e.g., Euler-Maruyama) often fail catastrophically in
    these settings.
  prefs: []
  type: TYPE_NORMAL
- en: '| Integrator | Symplecticity | Order | Type |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| Euler Method | ❌ | 1 | Explicit |'
  prefs: []
  type: TYPE_TB
- en: '| Symplectically Euler | ✅ | 1 | Explicit |'
  prefs: []
  type: TYPE_TB
- en: '| Leapfrog (Verlet) | ✅ | 2 | Explicit |'
  prefs: []
  type: TYPE_TB
- en: '| Runge-Kutta 4 | ❌ | 4 | Explicit |'
  prefs: []
  type: TYPE_TB
- en: '| Forest-Ruth Integrator | ✅ | 4 | Explicit |'
  prefs: []
  type: TYPE_TB
- en: '| Yoshida 6th-order | ✅ | 6 | Explicit |'
  prefs: []
  type: TYPE_TB
- en: '| Heun’s Method (RK2) | ❌ | 2 | Explicit |'
  prefs: []
  type: TYPE_TB
- en: '| Third-order Runge-Kutta | ❌ | 3 | Explicit |'
  prefs: []
  type: TYPE_TB
- en: '| Implicit Midpoint Rule | ✅ | 2 | Implicit (solving equations) |'
  prefs: []
  type: TYPE_TB
- en: '| Fourth-order Adams-Bashforth | ❌ | 4 | Multi-step (explicit) |'
  prefs: []
  type: TYPE_TB
- en: '| Backward Euler Method | ❌ | 1 | Implicit (solving equations) |'
  prefs: []
  type: TYPE_TB
- en: 'For more details on things like local and global errors or what these integrators
    are best suited for, there’s a handy write-up over at [Hamiltonian mechanics:
    Why Symplecticity Matters](https://soran-ghaderi.github.io/torchebm/latest/blog/hamiltonian-mechanics/#why-symplectic-matters)
    that covers it all.'
  prefs: []
  type: TYPE_NORMAL
- en: Hamiltonian Monte Carlo
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Hamiltonian Monte Carlo (HMC) is a Markov chain Monte Carlo (MCMC) method that
    leverages Hamiltonian dynamics to efficiently sample from complex probability
    distributions, particularly in Bayesian statistics and machine learning.
  prefs: []
  type: TYPE_NORMAL
- en: From Phase Space to Probability Space
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'HMC interprets target distribution \( P(z) \) as a Boltzmann distribution:'
  prefs: []
  type: TYPE_NORMAL
- en: \[ P(z) = \frac{1}{Z} e^{\frac{-E(z)}{T}} \]
  prefs: []
  type: TYPE_NORMAL
- en: 'Substituting into this formulation, the Hamiltonian gives us a joint density:'
  prefs: []
  type: TYPE_NORMAL
- en: \[ P(q,p) = \frac{1}{Z} e^{-U(q)} e^{-K(p)} \\ \text{where } U(q) = -\log[p(q),
    p(q|D)] \]
  prefs: []
  type: TYPE_NORMAL
- en: where \( p(q|D) \) is the likelihood of the given data \( D \) and T=1 and therefore
    removed. We estimate our posterior distribution using the potential energy \(
    U(q) \) since \( P(q,p) \) consists of two independent probability distributions.
  prefs: []
  type: TYPE_NORMAL
- en: Augment with artificial momentum \( p \sim \mathcal{N}(0,M) \), then simulate
    Hamiltonian dynamics to propose new \( q’ \) based on the distribution of the
    position variables \( U(q) \) which acts as the “potential energy” of the target
    distribution \( P(q) \), thereby creating valleys at high-probability regions.
  prefs: []
  type: TYPE_NORMAL
- en: For more on HMC, check out [this explanation](https://arxiv.org/abs/1701.02434)
    or [this tutorial](https://mc-stan.org/docs/2_19/reference-manual/hamiltonian-monte-carlo.html).
  prefs: []
  type: TYPE_NORMAL
- en: '**Physical Systems**: \( H(q,p) = U(q) + K(p) \) represents total energy'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Sampling Systems**: \( H(q,p) = -\log P(q) + \frac{1}{2}p^T M^{-1} p \) defines
    exploration dynamics'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The kinetic energy with the popular form of \( K(p) = \frac{1}{2}p^T M^{-1}
    p \), often Gaussian, injects momentum to traverse these landscapes. Crucially,
    the mass matrix \( M \) plays the role of a **preconditioner** – diagonal \( M
    \) adapts to parameter scales, while dense \( M \) can align with correlation
    structure. \( M \) is symmetric, positive definite and typically diagonal.
  prefs: []
  type: TYPE_NORMAL
- en: '**What is Positive Definite?**'
  prefs: []
  type: TYPE_NORMAL
- en: '**Positive Definite**: For any non-zero vector \( x \), the expression \( x^T
    M x \) is always positive. This ensures stability and efficiency.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/94e858bd935a90fc01a570f5ae717e98.png)'
  prefs: []
  type: TYPE_IMG
- en: Illustration of different quadratic forms in two variables that shows how different
    covariance matrices
  prefs: []
  type: TYPE_NORMAL
- en: 'influence the shape of these forms. The plots depict:'
  prefs: []
  type: TYPE_NORMAL
- en: 'a) **Positive Definite Form**: A bowl-shaped surface where all eigenvalues
    are positive, indicating a minimum.'
  prefs: []
  type: TYPE_NORMAL
- en: 'b) **Negative Definite Form**: An inverted bowl where all eigenvalues are negative,
    indicating a maximum.'
  prefs: []
  type: TYPE_NORMAL
- en: 'c) **Indefinite Form**: A saddle-shaped surface with both positive and negative
    eigenvalues, indicating neither a maximum nor a minimum.'
  prefs: []
  type: TYPE_NORMAL
- en: Each subplot includes the matrix ( M ) and the corresponding quadratic form
    (Q(x) = x^T M x). Photo by the [author](https://soran-ghaderi.github.io/).
  prefs: []
  type: TYPE_NORMAL
- en: \[
  prefs: []
  type: TYPE_NORMAL
- en: x^T M x > 0
  prefs: []
  type: TYPE_NORMAL
- en: \]
  prefs: []
  type: TYPE_NORMAL
- en: '**Kinetic Energy Choices**'
  prefs: []
  type: TYPE_NORMAL
- en: '**Gaussian (Standard HMC)**: \( K(p) = \frac{1}{2}p^T M^{-1} p \)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Yields Euclidean trajectories, efficient for moderate dimensions.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Relativistic (Riemannian HMC)**: \( K(p) = \sqrt{p^T M^{-1} p + c^2} \)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Limits maximum velocity, preventing divergences in ill-conditioned spaces.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Adaptive (Surrogate Gradients)**: Learn \( K(p) \) via neural networks to
    match target geometry.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Key Intuition**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The Hamiltonian \( H(q,p) = U(q) + \frac{1}{2}p^T M^{-1} p \) creates an energy
    landscape where momentum **carries the sampler through high-probability regions**,
    avoiding random walk behavior.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The HMC Algorithm
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The algorithm involves:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Initialization**: Start with an initial position \( q_0 \) and sample momentum
    \( p_0 \sim \mathcal{N}(0,M) \).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Leapfrog Integration**: Use the leapfrog method to approximate Hamiltonian
    dynamics. For a step size \( \epsilon \) and L steps, update:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Half-step momentum: \( p(t + \frac{\epsilon}{2}) = p(t) – \frac{\epsilon}{2}
    \frac{\partial U}{\partial q}(q(t)) \)'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Full-step position: \( q(t + \epsilon) = q(t) + \epsilon \frac{\partial K}{\partial
    p}(p(t + \frac{\epsilon}{2})) \), where \( K(p) = \frac{1}{2} p^T M^{-1} p \),
    so \( \frac{\partial K}{\partial p} = M^{-1} p \)'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Full-step momentum: \( p(t + \epsilon) = p(t + \frac{\epsilon}{2}) – \frac{\epsilon}{2}
    \frac{\partial U}{\partial q}(q(t + \epsilon)) \)This is repeated L times to get
    proposed \( \dot{q} \) and \( \dot{p} \).'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Metropolis-Hastings Acceptance**: Accept the proposed \( \dot{q} \) with
    probability \( \min(1, e^{H(q_0,p_0) – H(\dot{q},\dot{p})}) \), where \( H(q,p)
    = U(q) + K(p) \).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: This process generates a Markov chain with stationary distribution \( P(q) \),
    leveraging Hamiltonian dynamics to take larger, more efficient steps compared
    to random-walk methods.
  prefs: []
  type: TYPE_NORMAL
- en: '**Why Better Than Random Walk?**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: HMC navigates high-dimensional spaces along energy contours – like following
    mountain paths instead of wandering randomly!
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Recap of the Hamilton’s equations?**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: \[
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: \begin{cases}
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: \dot{q} = \nabla_p K(p) = M^{-1}p & \text{(Guided exploration)} \\
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: \dot{p} = -\nabla_q U(q) = \nabla_q \log P(q) & \text{(Bayesian updating)}
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: \end{cases}
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: \]
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'This coupled system drives \( (q,p) \) along iso-probability contours of \(
    P(q) \), with momentum **rotating** rather than **resetting** at each step like
    in Random Walk Metropolis–think of following mountain paths instead of wandering
    randomly! The key parameters – integration time \( \tau = L\epsilon \) and step
    size \( \epsilon \) – balance exploration vs. computational cost:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Short \( \tau \)**: Local exploration, higher acceptance'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Long \( \tau \)**: Global moves, risk of U-turns (periodic orbits)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Key Parameters and Tuning**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Tuning \( M \) to match the covariance of \( P(q) \) (e.g., via warmup adaptation)
    and setting \( \tau \sim \mathcal{O}(1/\lambda_{\text{max}}) \), where \( \lambda_{\text{max}}
    \) is the largest eigenvalue of \( \nabla^2 U \), often yields optimal mixing.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: TorchEBM Library 📚
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Oh, by the way, I’ve been messing around with this stuff in Python and threw
    together a library called [**TorchEBM**](https://soran-ghaderi.github.io/torchebm/latest/).
    It’s got some tools for energy-based, score matching, diffusion- and flow-based
    models and HMC bits I’ve been playing with. Nothing fancy, just a researcher’s
    sandbox for testing ideas like these. If you’re into coding this kind of thing,
    poke around on [TorchEBM GitHub](https://github.com/soran-ghaderi/torchebm) and
    lemme know what you think—PRs welcome! Been fun tinkering with it while writing
    this post.
  prefs: []
  type: TYPE_NORMAL
- en: Connection with Energy-Based Models
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Energy-based models (EBMs) are a class of generative models that define a probability
    distribution over data points using an energy function. The probability of a data
    point is proportional to \( e^{-E(x)} \), where \( E(x) \) is the energy function.
    This formulation is directly analogous to the Boltzmann distribution in statistical
    physics, where the probability is related to the energy of a state. In Hamiltonian
    mechanics, the Hamiltonian function \( H(q, p) \) represents the total energy
    of the system, and the probability distribution in phase space is given by \(
    e^{-H(q,p)/T} \), where \( T \) is the temperature.
  prefs: []
  type: TYPE_NORMAL
- en: In EBMs, Hamiltonian Monte Carlo (HMC) is often used to sample from the model’s
    distribution. HMC leverages Hamiltonian dynamics to propose new states, which
    are then accepted or rejected based on the Metropolis-Hastings criterion. This
    method is particularly effective for high-dimensional problems, as it reduces
    the correlation between samples and allows for more efficient exploration of the
    state space. For instance, in image generation tasks, HMC can sample from the
    distribution defined by the energy function, facilitating the generation of high-quality
    images.
  prefs: []
  type: TYPE_NORMAL
- en: 'EBMs define probability through Hamiltonians:'
  prefs: []
  type: TYPE_NORMAL
- en: \[ p(x) = \frac{1}{Z}e^{-E(x)} \quad \leftrightarrow \quad H(q,p) = E(q) + K(p)
    \]
  prefs: []
  type: TYPE_NORMAL
- en: Potential Research Directions 🔮
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Symplecticity in Machine Learning Models
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '![](../Images/e3afb8c58f5526f90ec73739ef0f042a.png)'
  prefs: []
  type: TYPE_IMG
- en: Overview of the Hamiltonian Neural Networks architecture. Image from the [HNN](https://arxiv.org/abs/1906.01563)
    paper.
  prefs: []
  type: TYPE_NORMAL
- en: Incorporate the symplectic structure of Hamiltonian mechanics into machine learning
    models to preserve properties like energy conservation, which is crucial for long-term
    predictions. Generalizing Hamiltonian Neural Networks (HNNs), as discussed in
    [Hamiltonian Neural Networks](https://greydanus.github.io/2019/05/15/hamiltonian-nns/),
    to more complex systems or developing new architectures that preserve symplecticity
  prefs: []
  type: TYPE_NORMAL
- en: HMC for Complex Distributions
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: HMC for sampling from complex, high-dimensional, and multimodal distributions,
    such as those encountered in deep learning. Combining HMC with other techniques,
    like parallel tempering, could handle distributions with multiple modes more effectively.
  prefs: []
  type: TYPE_NORMAL
- en: Combining Hamiltonian Mechanics with Other ML Techniques
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Integrate Hamiltonian mechanics with reinforcement learning to guide exploration
    in continuous state and action spaces. Using it to model the environment could
    improve exploration strategies, as seen in potential applications in robotics.
    Additionally, using Hamiltonian mechanics to define approximate posteriors in
    variational inference could lead to more flexible and accurate approximations.
  prefs: []
  type: TYPE_NORMAL
- en: Hamiltonian GANs
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Employing Hamiltonian formalism as an inductive bias for the generation of physically
    plausible videos with neural networks.
  prefs: []
  type: TYPE_NORMAL
- en: Wanna Team Up on This? 🤓
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: If some of you brilliant folks wherever you’re doing high-level wizardry are
    into research collaboration, I’d love to chat generative models over coffee ☕️
    (virtual or IRL (London)). If you’re into pushing these ideas further, hit me
    up! Follow me on [Twitter](https://twitter.com/soranghadri)/[BlueSky](https://bsky.app/profile/soranghaderi.bsky.social)
    or [GitHub](https://github.com/soran-ghaderi)—I’m usually rambling about this
    stuff there. Also on [LinkedIn](https://www.linkedin.com/in/soran-ghaderi) and
    [Medium](https://soran-ghaderi.medium.com/)/[TDS](https://towardsdatascience.com/author/soran-ghaderi/)
    if you’re curious. To find more about my research interests, check out my [personal
    website](https://soran-ghaderi.github.io/).
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Hamiltonian mechanics reframes physical systems through energy, using phase
    space to reveal symmetries and conservation laws via first-order equations. Symplectic
    integrators like Leapfrog Verlet preserve this structure, ensuring stability in
    simulations—crucial for applications like molecular dynamics and Hamiltonian Monte
    Carlo (HMC). HMC leverages these dynamics to sample complex distributions efficiently,
    bridging classical physics with modern machine learning.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
