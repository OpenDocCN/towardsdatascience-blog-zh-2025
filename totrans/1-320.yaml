- en: Why you should care about context engineering
  id: totrans-29
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么你应该关注上下文工程
- en: 'First, let me highlight three key points for why you should care about context
    engineering:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我强调三个你应该关注上下文工程的关键点：
- en: Better output **quality** by avoiding [context rot](https://research.trychroma.com/context-rot).
    Fewer unnecessary tokens increase output quality. You can read more details about
    it [in this article](https://eval.16x.engineer/blog/llm-context-management-guide?utm_source=tldrai)
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过避免[上下文退化](https://research.trychroma.com/context-rot)来提高输出**质量**。减少不必要的标记可以提高输出质量。你可以在[这篇文章](https://eval.16x.engineer/blog/llm-context-management-guide?utm_source=tldrai)中了解更多细节。
- en: '**Cheaper** (don’t send unnecessary tokens, they cost money)'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**更便宜**（不发送不必要的标记，它们会花钱）'
- en: '**Speed** (less tokens = faster response times)'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**速度**（标记越少，响应时间越快）'
- en: These are three core metrics for most question answering systems. The output
    quality is naturally of utmost priority, considering users will not want to use
    a low-performing system.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是大多数问答系统的三个核心指标。输出质量自然是首要考虑的，因为用户不会希望使用性能低下的系统。
- en: Furthermore, price should always be a consideration, and if you can lower it
    (without too much engineering cost), it’s a simple decision to do so. Lastly,
    a faster question answering system provides a better user experience. You don’t
    want users waiting numerous seconds to get a response when ChatGPT will respond
    much faster.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，价格始终应该是一个考虑因素，如果你可以降低它（而不需要太多的工程成本），那么做出这样的决定很简单。最后，一个更快的问答系统可以提供更好的用户体验。你不想让用户等待数秒才能得到回复，而ChatGPT会更快地做出回应。
- en: The traditional question-answering approach
  id: totrans-36
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 传统的问答方法
- en: 'Traditional, in this sense, means the most common question answering approach
    in systems built after [the release of ChatGPT](https://help.openai.com/en/articles/6825453-chatgpt-release-notes).
    This system is traditional RAG, which works as follows:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个意义上，传统意味着在ChatGPT[发布后](https://help.openai.com/en/articles/6825453-chatgpt-release-notes)构建的系统中最常见的问答方法。这个系统是传统的RAG，它的工作方式如下：
- en: Fetch the most relevant documents to the user’s question, using vector similarity
    retrieval
  id: totrans-38
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用向量相似度检索获取与用户问题最相关的文档
- en: Feed relevant documents along with a question into an LLM, and receive a response
  id: totrans-39
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将相关文档与问题一起输入到LLM中，并接收回应
- en: Considering its simplicity, this approach works incredibly well. Interestingly
    enough, we also see this happening with another traditional approach. [BM25 has
    been around since 1994](https://www.cs.cornell.edu/courses/cs630/2006sp/guides/lec6.kr.pdf?)
    and was, for example, recently utilized by Anthropic when they introduced [Contextual
    Retrieval](https://www.anthropic.com/news/contextual-retrieval), proving how effective
    even simple information retrieval techniques are.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到其简单性，这种方法效果非常好。有趣的是，我们还在另一种传统方法中看到了这种情况。[BM25自1994年以来一直存在](https://www.cs.cornell.edu/courses/cs630/2006sp/guides/lec6.kr.pdf?)，例如，最近在Anthropic推出[上下文检索](https://www.anthropic.com/news/contextual-retrieval)时被使用，证明了即使是简单的信息检索技术也是多么有效。
- en: However, you can still vastly improve your question answering system by updating
    your RAG using some techniques I’ll describe in the next section.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，通过更新你的RAG并使用我在下一节中描述的一些技术，你仍然可以极大地改进你的问答系统。
- en: Improving RAG context fetching
  id: totrans-42
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 改进RAG上下文检索
- en: 'Even though RAG works relatively well, you can likely achieve better performance
    by introducing the techniques I’ll discuss in this section. The techniques I describe
    here all focus on improving the context you feed to the LLM. You can improve this
    context with two main approaches:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管RAG相对有效，但你很可能会通过引入我在本节中讨论的技术来获得更好的性能。我这里描述的所有技术都集中在改进你提供给LLM的上下文上。你可以通过两种主要方法来改进这个上下文：
- en: Use fewer tokens on irrelevant context (for example, removing or using less
    material from relevant documents)
  id: totrans-44
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在不相关上下文中使用更少的标记（例如，从相关文档中删除或使用较少的材料）
- en: Add documents that are relevant
  id: totrans-45
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 添加相关文档
- en: 'Thus, you should focus on achieving one of the points above. If you think in
    terms of [precision and recall](https://developers.google.com/machine-learning/crash-course/classification/accuracy-precision-recall):'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，你应该专注于实现上述目标之一。如果你从[精确度和召回率](https://developers.google.com/machine-learning/crash-course/classification/accuracy-precision-recall)的角度思考：
- en: Increases precision (at the cost of recall)
  id: totrans-47
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提高精确度（以召回率为代价）
- en: Increase recall (at the cost of precision)
  id: totrans-48
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提高召回率（以精确度为代价）
- en: This is a tradeoff you must make while working on context engineering your question
    answering system.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 这是在进行问答系统上下文工程时你必须做出的权衡。
- en: Reducing the number of irrelevant tokens
  id: totrans-50
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 减少无关标记的数量
- en: 'In this section, I highlight three main approaches to reduce the number of
    irrelevant tokens you feed into the LLMs context:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我强调三种主要方法来减少你输入到 LLMs 上下文中的无关标记数量：
- en: Reranking
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 重新排序
- en: Summarization
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 摘要
- en: Prompting GPT
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示 GPT
- en: When fetching documents from vector similarity search, they are returned in
    order of most relevant to least relevant, given the vector similarity score. However,
    this similarity score might not accurately represent which documents are most
    relevant.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 当从向量相似度搜索中获取文档时，它们是按照最相关到最不相关的顺序返回的，给定向量相似度分数。然而，这个相似度分数可能无法准确代表哪些文档是最相关的。
- en: '**Reranking**'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: '**重新排序**'
- en: You can thus use a reranking model, for example, [Qwen reranker](https://huggingface.co/Qwen/Qwen3-Reranker-8B),
    to reorder the document chunks. You can then choose to only keep the top X most
    relevant chunks (according to the reranker), which should remove some irrelevant
    documents from your context.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，你可以使用重新排序模型，例如，[Qwen 重新排序器](https://huggingface.co/Qwen/Qwen3-Reranker-8B)，来重新排序文档块。然后你可以选择只保留最相关的
    X 个文档块（根据重新排序器的结果），这应该会从你的上下文中移除一些无关的文档。
- en: '**Summarization**'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: '**摘要**'
- en: You can also choose to summarize documents, reducing the number of tokens used
    per document. You can, for example, keep the full document from the top 10 most
    similar documents fetched, summarize documents ranked from 11-20, and discard
    the rest.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 你也可以选择摘要文档，减少每个文档使用的标记数量。例如，你可以保留从获取的前 10 个最相似文档中的完整文档，摘要排名第 11-20 的文档，并丢弃其余的文档。
- en: This approach will increase the likelihood that you keep the full context from
    relevant documents, while at least maintaining some context (the summary) from
    documents that are less likely to be relevant.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法将增加你保留相关文档完整上下文的概率，同时至少保留一些来自不太可能相关的文档的上下文（摘要）。
- en: '**Prompting GPT**'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示 GPT**'
- en: Lastly, you can also prompt GPT whether the fetched documents are relevant to
    the user query. For example, if you fetch 15 documents, you can make 15 individual
    LLM calls to judge if each document is relevant. You then discard documents that
    are deemed irrelevant. Keep in mind that these LLM calls need to be parallelized
    to keep response time within an acceptable limit.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，你也可以提示 GPT 判断获取的文档是否与用户查询相关。例如，如果你获取了 15 个文档，你可以进行 15 次单独的 LLM 调用来判断每个文档是否相关。然后丢弃被认为不相关的文档。请注意，这些
    LLM 调用需要并行化以将响应时间保持在可接受的范围内。
- en: Adding relevant documents
  id: totrans-63
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 添加相关文档
- en: 'Before or after removing irrelevant documents, you also ensure you include
    relevant documents. I include two main approaches in this subsection:'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 在移除无关文档之前或之后，你也要确保包括相关文档。我在本小节中包括两种主要方法：
- en: Better embedding models
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更好的嵌入模型
- en: Searching through more documents (at the cost of lower precision)
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在更多文档中进行搜索（以降低精度为代价）
- en: '**Better embedding models**'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: '**更好的嵌入模型**'
- en: To find the best embedding models, you can go to the [HuggingFace embedding
    model leaderboard](https://huggingface.co/spaces/mteb/leaderboard), where Gemini
    and Qwen are in the top 3 as of the writing of this article. Updating your embedding
    model is usually a cheap approach to fetch more relevant documents. This is because
    running and storing embeddings is usually cheap, for example, embedding through
    the [Gemini API](https://ai.google.dev/gemini-api/docs/embeddings), and storing
    vectors in [Pinecone](https://www.pinecone.io/).
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 要找到最佳的嵌入模型，你可以访问 [HuggingFace 嵌入模型排行榜](https://huggingface.co/spaces/mteb/leaderboard)，截至本文撰写时，Gemini
    和 Qwen 排名前三。更新你的嵌入模型通常是一种便宜的方法来获取更多相关文档。这是因为运行和存储嵌入通常很便宜，例如，通过 [Gemini API](https://ai.google.dev/gemini-api/docs/embeddings)
    进行嵌入，以及在 [Pinecone](https://www.pinecone.io/) 中存储向量。
- en: '**Search more documents**'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: '**搜索更多文档**'
- en: 'Another (relatively simple) approach to fetch more relevant documents is to
    fetch more documents in general. Fetching more documents naturally increases the
    probability that you add relevant ones. However, you have to balance this with
    avoiding context rot and reducing the number of irrelevant documents to a minimum.
    Every unnecessary token in an LLM call is, as earlier, likely to:'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种（相对简单）的方法来获取更多相关文档是获取更多的文档。获取更多文档自然会增加你添加相关文档的概率。然而，你必须平衡这一点，以避免上下文过时并尽可能减少无关文档的数量。在
    LLM 调用中，每个不必要的标记，如前所述，很可能会：
- en: Reduce output quality
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 降低输出质量
- en: Increase cost
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 增加成本
- en: Lower speed
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 降低速度
- en: These are all crucial aspects of a question-answering system.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 这些都是问答系统的关键方面。
- en: Agentic search approach
  id: totrans-75
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 代理搜索方法
- en: I’ve discussed agentic search approaches in previous articles, for example,
    when I discussed [Scaling your AI Search](https://towardsdatascience.com/how-to-scale-your-ai-search-to-handle-10m-queries-with-5-powerful-techniques/).
    However, in this section, I’ll dive deeper into setting up an agentic search,
    which replaces some or all of the vector retrieval step in your RAG.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 我在之前的文章中讨论了代理搜索方法，例如，当我讨论[扩展你的AI搜索](https://towardsdatascience.com/how-to-scale-your-ai-search-to-handle-10m-queries-with-5-powerful-techniques/)时。然而，在本节中，我将更深入地探讨设置代理搜索，这将在你的RAG中替换一些或所有向量检索步骤。
- en: The first step is that the user provides their question to a given set of data
    points, for example, a set of documents. You then set up an agentic system consisting
    of an orchestra agent and a list of sub-agents.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 第一步是用户向一组给定的数据点提供他们的问题，例如，一组文档。然后你设置一个由一个乐队代理和一系列子代理组成的代理系统。
- en: '![](../Images/ffa30c1233d5415eb7b33c459fcf5906.png)'
  id: totrans-78
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/ffa30c1233d5415eb7b33c459fcf5906.png)'
- en: This figure highlights an orchestra system of LLM agents. The main agent receives
    the user query and assigns tasks to subagents. Image by ChatGPT.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 此图突出了LLM代理的乐队系统。主要代理接收用户查询并将任务分配给子代理。图由ChatGPT提供。
- en: This is an example of the pipeline the agents would follow (though there are
    many ways to set it up).
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 这是代理将遵循的管道示例（尽管有许多设置方法）。
- en: Orchestra agent tells two subagents to iterate over all document filenames and
    return relevant documents
  id: totrans-81
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 乐队代理告诉两个子代理遍历所有文档文件名并返回相关文档
- en: Relevant documents are fed back to the orchestra agent, which again releases
    a subagent to each of the relevant documents, to fetch subparts (chunks) of the
    document that are relevant to the user’s question. These chunks are then fed back
    to the orchestra agent
  id: totrans-82
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 相关文档被反馈给乐队代理，乐队代理再次向每个相关文档释放一个子代理，以获取与用户问题相关的文档的子部分（片段）。然后这些片段被反馈给乐队代理。
- en: The orchestra agent answers the user’s question, given the provided chunks
  id: totrans-83
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 乐队代理根据提供的片段回答用户的问题。
- en: Another flow you could implement could be to store document embeddings, and
    replace step one with vector similarity between the user question and each document.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以实施另一种流程，例如存储文档嵌入，并用用户问题与每个文档之间的向量相似度替换第一步。
- en: This agentic approach has upsides and downsides.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 这种代理方法有优点和缺点。
- en: '**Upsides:**'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: '**优点：**'
- en: Better chance of fetching relevant chunks than with traditional RAG
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 比传统RAG有更高的机会获取相关的片段
- en: More control over the RAG system. You can update system prompts, etc, while
    RAG is relatively static with its embedding similarities
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对RAG系统有更多的控制。你可以在RAG相对静态的嵌入相似度的情况下更新系统提示等。
- en: '**Downside:**'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: '**缺点：**'
- en: This requires a lot of LLM calls. In [their article on building a multi-agent
    system, Anthropic](https://www.anthropic.com/engineering/multi-agent-research-system) noted
    that single-agent systems use 4x the tokens of single LLM calls, while multi-agent
    systems use 15x!
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这需要大量的LLM调用。在[他们关于构建多代理系统的文章中，Anthropic](https://www.anthropic.com/engineering/multi-agent-research-system)指出，单代理系统使用的token是单次LLM调用的4倍，而多代理系统使用的是15倍！
- en: In my opinion, building such an agent-based retrieval system is a super powerful
    approach that can lead to amazing results. The consideration you have to make
    when building such a system is whether the increased quality you’ll (likely) see
    is worth the increase in cost.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 在我看来，构建这样的基于代理的检索系统是一种超级强大的方法，可以带来惊人的结果。在构建这样的系统时，你必须考虑的是，你将（很可能）看到的提高的质量是否值得成本的增加。
- en: Other context engineering aspects
  id: totrans-92
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 其他上下文工程方面
- en: 'In this article, I’ve mainly covered context engineering for the documents
    we fetch in a question answering system. However, there are also other aspects
    you should be aware of, mainly:'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我主要介绍了我们在问答系统中获取的文档的上下文工程。然而，还有其他你应该注意的方面，主要是：
- en: The system/user prompt you are using
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你正在使用的系统/用户提示
- en: Other information fed into the prompt
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 其他信息被输入到提示中
- en: The prompt you write for your question answering system should be precise, structured,
    and avoid irrelevant information. You can read many other articles on the topic
    of structuring prompts, and you can typically ask an LLM to improve these aspects
    of your prompt.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 你为问答系统编写的提示应该精确、结构化，并避免无关信息。你可以阅读许多关于结构化提示的文章，通常你可以要求LLM改进这些提示的方面。
- en: 'Sometimes, you also feed other information into your prompt. A common example
    is feeding in metadata, for example, data covering information about the user,
    such as:'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 有时，你也会将其他信息输入到你的提示中。一个常见的例子是输入元数据，例如，涵盖用户信息的数据，例如：
- en: Name
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 姓名
- en: Job role
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 职位
- en: What they usually search for
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 他们通常搜索的内容
- en: etc
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 等等
- en: 'Whenever you add such information, you should always ask yourself:'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 每次你添加此类信息时，你应该总是问自己：
- en: Does amending this information help my question answering system answer the
    question?
  id: totrans-103
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 修改这些信息是否有助于我的问答系统回答问题？
- en: Sometimes the answer is yes, other times it’s no. The most important part is
    that you made a rational decision on whether the information is needed in the
    prompt. If you can’t justify having this information in the prompt, it should
    usually be removed.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 有时答案是肯定的，有时则是否定的。最重要的是，你在提示中是否需要这些信息已经做出了合理的决定。如果你无法证明在提示中包含这些信息是合理的，通常应该将其删除。
- en: Conclusion
  id: totrans-105
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this article, I have discussed context engineering for your question answering
    system, and why it’s important. Question answering systems usually consist of
    an initial step to fetch relevant information. The focus on this information should
    be to reduce the number of irrelevant tokens to a minimum, while also including
    as many relevant pieces of information as possible.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我讨论了为你的问答系统进行上下文工程的重要性，以及为什么它很重要。问答系统通常包括一个初始步骤来获取相关信息。对这个信息的关注应该减少无关标记的数量到最小，同时尽可能包含尽可能多的相关信息。
