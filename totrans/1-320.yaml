- en: How to Context Engineer to Optimize Question Answering Pipelines
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何通过上下文工程优化问答管道
- en: 原文：[https://towardsdatascience.com/how-to-context-engineer-to-optimize-question-answering-pipelines/](https://towardsdatascience.com/how-to-context-engineer-to-optimize-question-answering-pipelines/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/how-to-context-engineer-to-optimize-question-answering-pipelines/](https://towardsdatascience.com/how-to-context-engineer-to-optimize-question-answering-pipelines/)
- en: <mdspan datatext="el1757028037019" class="mdspan-comment">I believe context</mdspan>
    engineering is one of the most relevant topics in machine learning today, which
    is why I’m writing my third article on the topic. My goal is to both broaden my
    understanding of engineering contexts for LLMs and share that knowledge through
    my articles.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1757028037019" class="mdspan-comment">我相信上下文</mdspan>工程是当前机器学习中最相关的话题之一，这就是我撰写关于这个主题的第三篇文章的原因。我的目标是扩大我对LLM上下文工程的理解，并通过我的文章分享这些知识。
- en: In today’s article, I’ll discuss improving the context you feed into your LLMs
    for question answering. Usually, this context is based on retrieval augmented
    generation (RAG), however, in today’s ever-shifting environment, this approach
    should be updated.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在今天的文章中，我将讨论如何改进你为问答输入到LLM中的上下文。通常，这种上下文基于检索增强生成（RAG），然而，在今天的不断变化的环境中，这种方法应该得到更新。
- en: 🆕 "RAG is Dead, Context Engineering is King"[https://t.co/CUxBNvAuqi](https://t.co/CUxBNvAuqi)
