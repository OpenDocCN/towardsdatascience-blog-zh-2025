- en: Deploy a Streamlit App to AWS
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 将 Streamlit 应用程序部署到 AWS
- en: 原文：[https://towardsdatascience.com/deploy-a-streamlit-app-to-aws/](https://towardsdatascience.com/deploy-a-streamlit-app-to-aws/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://towardsdatascience.com/deploy-a-streamlit-app-to-aws/](https://towardsdatascience.com/deploy-a-streamlit-app-to-aws/)'
- en: <mdspan datatext="el1752603054976" class="mdspan-comment">OK, so you’ve developed</mdspan>
    a fantastic Streamlit app, and now it’s time to let the world see and use it.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1752603054976" class="mdspan-comment">好的，所以你已经开发了一个**出色的
    Streamlit 应用程序**，现在是时候让全世界看到并使用它了。
- en: What options do you have?
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 你有哪些选择？
- en: The easiest way is to use the Streamlit Community Cloud service. That method
    lets anyone online access your Streamlit app, provided they have the required
    URL. It’s a relatively straightforward process, but it’s a publicly available
    endpoint and, due to potential security issues and scalability options, it isn’t
    an option for most organisations.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 最简单的方法是使用 Streamlit Community Cloud 服务。这种方法允许任何拥有所需 URL 的在线用户访问你的 Streamlit
    应用程序。这是一个相对简单的过程，但它是一个公开可用的端点，由于潜在的安全问题和可扩展性选项，它并不是大多数组织的选项。
- en: Since Streamlit was acquired by Snowflake, deploying to that platform is now
    a viable option as well.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 由于 Streamlit 被Snowflake 收购，现在将该平台部署为可行选项。
- en: The third option is to deploy to one of the many cloud services, such as Heroku,
    Google Cloud, or Azure.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 第三个选项是将应用程序部署到众多云服务之一，例如 Heroku、Google Cloud 或 Azure。
- en: As an AWS user, I wanted to see how easy it would be to deploy a streamlit app
    to AWS, and this is what this article is about. If you refer to the official Streamlit
    documentation online (link at the end of the article), you’ll notice that there
    is no information or guidance on how to do this. So this is the “missing manual”.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 作为 AWS 用户，我想看看将 Streamlit 应用程序部署到 AWS 会多么简单，这正是本文的主题。如果你参考了在线的官方 Streamlit 文档（本文末尾的链接），你会注意到没有关于如何做到这一点的信息或指导。因此，这是“缺失的手册”。
- en: The deployment process is relatively straightforward. The challenging part is
    ensuring that the AWS networking configuration is set up correctly. By that, I
    mean your VPC, security groups, subnets, route tables, subnet associations, Nat
    Gateways, Elastic IPS, etc…
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 部署过程相对简单。最具挑战性的部分是确保 AWS 网络配置正确设置。我的意思是你的 VPC、安全组、子网、路由表、子网关联、NAT 网关、弹性 IP 等...
- en: Because every organisation’s networking setup is different, I will assume that
    you or someone in your organisation can resolve this aspect. However, I include
    some troubleshooting tips at the end of the article for the most common reasons
    for deployment issues. If you follow my steps to the letter, you ***should*** have
    a working, deployed app by the end of it.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 由于每个组织的网络设置都不同，我将假设你或你组织中的某个人可以解决这个问题。然而，我在文章末尾包含了一些针对部署问题的最常见原因的故障排除技巧。如果你严格按照我的步骤操作，你应该会在文章结束时拥有一个运行良好、已部署的应用程序。
- en: In my sample deployment, I’ll be using a VPC with a Public subnet and an Internet
    gateway. By contrast, in real-life scenarios, you’ll probably want to use a mix
    of all or some of elastic load balancers, private subnets, NAT gateways and Cognito
    for user authentication and enhanced security. Later on, I will discuss some options
    for securing your app.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的示例部署中，我将使用一个包含公共子网和互联网网关的 VPC。相比之下，在实际场景中，你可能希望使用弹性负载均衡器、私有子网、NAT 网关和 Cognito
    进行用户身份验证和增强安全性的组合。稍后，我将讨论一些保护你的应用程序的选项。
- en: The app we will deploy is the dashboard I wrote using Streamlit. TDS published
    that article a while back, and you can find a link to it at the end of this article.
    In that case, I retrieved my dashboard data from a PostgreSQL database running
    locally. However, to avoid the costs and hassle of setting up an RDS Postgres
    database on AWS, I will convert my dashboard code to retrieve its data from a
    CSV file on S3 — Amazon’s mass storage service.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将要部署的应用程序是我使用 Streamlit 编写的仪表板。TDS 之前发表过那篇文章，你可以在本文末尾找到链接。在这种情况下，我从本地运行的 PostgreSQL
    数据库中检索了我的仪表板数据。然而，为了避免在 AWS 上设置 RDS Postgres 数据库的成本和麻烦，我将我的仪表板代码转换为从 S3 上的 CSV
    文件中检索数据——这是亚马逊的大容量存储服务。
- en: Once that’s done, it’s only a matter of copying over a CSV to AWS S3 storage,
    and the dashboard should work just as it did when running locally using Postgres.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 完成这些后，只需将 CSV 文件复制到 AWS S3 存储即可，仪表板应该会像在本地使用 PostgreSQL 运行时一样工作。
- en: I assume you have an AWS account with access to the AWS console. Additionally,
    if you are opting for the S3 route as your data source, you’ll need to set up
    AWS credentials. Once you have them, either create an .aws/credentials file in
    your HOME directory (as I have done), or you can pass your credential key information
    directly in the code.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 我假设你有一个可以访问 AWS 控制台的 AWS 账户。此外，如果你选择 S3 作为数据源，你需要设置 AWS 凭据。一旦你有了它们，你可以在你的 HOME
    目录中创建一个 .aws/credentials 文件（就像我这样做的那样），或者你可以在代码中直接传递你的凭据密钥信息。
- en: Assuming all these prerequisites are met, we can look at the deployment using
    AWS’s Elastic Beanstalk service.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 假设所有这些先决条件都已满足，我们可以查看使用 AWS 的 Elastic Beanstalk 服务进行的部署。
- en: What is AWS Elastic Beanstalk (EB)?
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是 AWS Elastic Beanstalk (EB)？
- en: AWS Elastic Beanstalk (EB) is a fully managed service that simplifies the deployment,
    scaling, and management of applications in the AWS Cloud. It allows you to upload
    your application code in popular languages like Python, Java, .NET, Node.js, and
    more. It automatically handles the provisioning of the underlying infrastructure,
    such as servers, load balancers, and networking. With Elastic Beanstalk, you can
    focus on writing and maintaining your application rather than configuring servers
    or managing capacity because the service seamlessly scales resources as your application’s
    traffic fluctuates.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: AWS Elastic Beanstalk (EB) 是一个完全托管的服务，它简化了在 AWS 云中部署、扩展和管理应用程序的过程。它允许你上传你的应用程序代码，支持流行的语言，如
    Python、Java、.NET、Node.js 等。它自动处理底层基础设施的配置，例如服务器、负载均衡器和网络。使用 Elastic Beanstalk，你可以专注于编写和维护你的应用程序，而不是配置服务器或管理容量，因为该服务可以无缝地根据你的应用程序流量波动扩展资源。
- en: In addition to provisioning your EC2 servers, etc., EB will install any required
    external libraries on your behalf, depending on the deployment type. It can also
    be configured to run OS commands on server startup.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 除了配置你的 EC2 服务器等，EB 还会根据部署类型为你安装任何必需的外部库。它还可以配置在服务器启动时运行 OS 命令。
- en: The code
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 代码
- en: Before deploying, let’s review the changes I made to my original code to accommodate
    the change in data source from Postgres to S3\. It boils down to replacing calls
    to read a Postgres table with calls to read an S3 object to feed data into the
    dashboard. I also put the main graphical component creation and display inside
    a **main()** module, which I call at the end of the code. Here is a full listing.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 在部署之前，让我们回顾一下我对原始代码所做的更改，以适应数据源从 Postgres 到 S3 的变化。这归结为用读取 S3 对象的调用替换读取 Postgres
    表的调用，以将数据馈入仪表板。我还将主要图形组件的创建和显示放在一个名为 **main()** 的模块中，我在代码的末尾调用它。以下是完整的列表。
- en: '[PRE0]'
  id: totrans-20
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Although it’s a pretty chunky piece of code, I won’t explain exactly what it
    does, as I have already covered that in some detail in my previously referenced
    TDS article. I have included a link to the article at the end of this one for
    those who would like to learn more.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然这是一段相当庞大的代码，但我不会详细解释它具体做什么，因为我已经在之前引用的 TDS 文章中详细介绍了这一点。我在本文末尾包含了一个链接，供那些想了解更多信息的人参考。
- en: So, assuming you have a working Streamlit app that runs locally without issues,
    here are the steps you need to take to deploy it to AWS.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，假设你有一个运行良好的 Streamlit 应用程序，在本地运行时没有问题，以下是你需要采取的步骤将其部署到 AWS。
- en: Preparing our code for deployment
  id: totrans-23
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 准备我们的代码以进行部署
- en: 1/ Create a new folder on your local system to hold your code.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 1/ 在你的本地系统上创建一个新的文件夹来存放你的代码。
- en: 2/ In that folder, you’ll need three files and a sub-folder containing two more
    files
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 2/ 在那个文件夹中，你需要三个文件和一个包含两个更多文件的子文件夹
- en: File 1 is **app.py — ** this is your main Streamlit code file
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 文件 1 是 **app.py**—这是你的主要 Streamlit 代码文件
- en: File 2 is **requirements.txt —** this lists all external libraries your code
    needs to function. Depending on what your code does, it will have at least one
    record referencing the Streamlit library. For my code, the file contained this,
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 文件 2 是 **requirements.txt**—这列出了你的代码需要运行的 所有外部库。根据你的代码做什么，它至少会包含一个引用 Streamlit
    库的记录。对于我的代码，文件包含以下内容，
- en: '[PRE1]'
  id: totrans-28
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: File 3 is called **Procfile **— this tells EB how to run your code. It’s contents
    should look like this
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 文件 3 被称为 **Procfile**—这告诉 EB 如何运行你的代码。其内容应如下所示
- en: '[PRE2]'
  id: totrans-30
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: .**ebextensions** — this is a subfolder which holds additional files (see below)
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: .**ebextensions**—这是一个包含附加文件的子文件夹（见下文）
- en: 3/ The .ebextensions subfolder has these two files.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 3/ .ebextensions 子文件夹包含这两个文件。
- en: '**nginx.config**'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**nginx.config**'
- en: 'It should have this content:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 它应包含以下内容：
- en: '[PRE3]'
  id: totrans-35
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '**python.config**'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**python.config**'
- en: '[PRE4]'
  id: totrans-37
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Note, although I didn’t need it for what I was doing, for completenes, you can
    optionally add one or more packages.config files under the .ebextensions subfolder
    that can contain operating system commands that are run when the EC2 server starts
    up. For example,
  id: totrans-38
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 注意，尽管我做的这件事不需要它，但为了完整性，您可以可选地在.ebextensions子文件夹下添加一个或多个packages.config文件，这些文件可以在EC2服务器启动时运行操作系统命令。例如，
- en: '[PRE5]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Once you have all the necessary files, the next step is to zip them into an
    archive, preserving the folder and subfolder structure. You can use any tool you
    like, but I use 7-Zip.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦您有了所有必要的文件，下一步是将它们压缩成存档，保留文件夹和子文件夹结构。您可以使用任何您喜欢的工具，但我使用7-Zip。
- en: Deploying our code
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 部署我们的代码
- en: Deployment is a multi-stage process. First, log in to the AWS console, search
    for “Elastic Beanstalk” in the services search bar, and click on the link. From
    there, you can click the large orange** “Create Application”** button. You’ll
    see the first of around six screens, for which you must fill in the details. In
    the following sections, I’ll describe the fields you must input. Leave everything
    else as it is.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 部署是一个多阶段的过程。首先，登录AWS控制台，在服务搜索栏中搜索“Elastic Beanstalk”，然后点击链接。从那里，您可以点击大型的橙色**“创建应用程序”**按钮。您将看到大约六个屏幕中的第一个，您必须填写详细信息。在以下部分，我将描述您必须输入的字段。其他所有内容保持不变。
- en: 1/ Creating the application
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 1/ 创建应用程序
- en: 'This is easy: fill in the name of your application and, optionally, its description.'
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这很简单：填写您应用程序的名称，以及可选的描述。
- en: 2/ Configure Environment
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 2/ 配置环境
- en: The environment tier should be set to Web Server.
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 环境层应设置为Web服务器。
- en: Fill in the application name.
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 填写应用程序名称。
- en: For Platform type, choose **Managed;** for Platform, choose **Python,** then
    decide which version of Python you want to use. I used Python version 3.11.
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于平台类型，选择**托管**；对于平台，选择**Python**，然后决定您想使用哪个版本的Python。我使用了Python版本3.11。
- en: In the **Application Code** section, click the **Upload your code** option and
    follow the instructions. Type in a version label, then click ‘Local File’ or ‘S3
    Upload’, depending on where your source files are located. You want to upload
    the single **zip file** we created earlier.
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在**应用程序代码**部分，点击**上传您的代码**选项，并按照说明操作。输入一个版本标签，然后根据源文件所在位置点击‘本地文件’或‘S3上传’。您想要上传我们之前创建的单个**zip文件**。
- en: Choose your instance type in the **Presets** section. I went for the **Single
    instance (free tier eligible).** Then hit the **Next** button.
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在**预设**部分选择您的实例类型。我选择了**单个实例（免费层适用）**。然后点击**下一步**按钮。
- en: 3/ Configure Service Access
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 3/ 配置服务访问
- en: '![](../Images/9c89c9f49da8a23179031612590e7f10.png)'
  id: totrans-52
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/9c89c9f49da8a23179031612590e7f10.png)'
- en: Image from AWS website
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: AWS网站图片
- en: For the Service role, you can use an existing one if you have it, or AWS will
    create one for you.
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于服务角色，如果您有现有的，可以使用它，否则AWS会为您创建一个。
- en: For the instance profile role, you’ll probably need to create this. It just
    needs to have the **AWSElasticBeanstalkWebTier** and **AmazonS3ReadOnlyAccess**
    policies attached. Hit the **Next** button.
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于实例配置文件角色，您可能需要创建它。它只需要附加**AWSElasticBeanstalkWebTier**和**AmazonS3ReadOnlyAccess**策略。点击**下一步**按钮。
- en: I would also advise setting up an EC2 key pair at this stage, as you’ll need
    it to log in to the EC2 server that EB creates on your behalf. This can be invaluable
    for investigating potential server issues.
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我也建议在这个阶段设置EC2密钥对，因为您将需要它来登录EB为您创建的EC2服务器。这对于调查潜在的服务器问题非常有价值。
- en: 4/ Set up networking, database and tags
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 4/ 设置网络、数据库和标签
- en: Choose your VPC. I had only one default VPC set up. You also have the option
    to create one here if you don’t already have one. Make sure your VPC has at least
    one public subnet.
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 选择您的VPC。我只有一个默认的VPC已设置。如果您还没有，您也可以在这里创建一个。确保您的VPC至少有一个公共子网。
- en: In Instance Settings, I checked the Public IP Address option, and I chose to
    use my public subnets. Click the **Next** button.
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在实例设置中，我选中了公共IP地址选项，并选择使用我的公共子网。点击**下一步**按钮。
- en: 5/ Configure the instance and scaling
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 5/ 配置实例和扩展
- en: Under the EC2 Security Groups section, I chose my default security group. Under
    Instance Type, I opted for the t3.micro. Hit the **Nex**t button.
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在EC2安全组部分，我选择了我的默认安全组。在实例类型中，我选择了t3.micro。点击**下一步**按钮。
- en: 6/ Monitoring
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 6/ 监控
- en: Select basic system health monitoring
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 选择基本系统健康监控
- en: Uncheck the Managed Updates checkbox
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 取消选中“管理更新”复选框
- en: Click **Next**
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 点击**下一步**
- en: 7/ Review
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 7/ 审查
- en: Click **Create** if all is OK
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果一切正常，点击**创建**。
- en: After this, you should see a screen like this,
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，您应该会看到一个像这样的屏幕，
- en: '![](../Images/7af443d81229246083d0d3e698a6d2e1.png)'
  id: totrans-69
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7af443d81229246083d0d3e698a6d2e1.png)'
- en: Image from AWS website
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 图片来自AWS网站
- en: Keep an eye on the Events tab, as this will notify you if any issues arise.
    If you encounter problems, you can use the Logs tab to retrieve either a full
    set of logs or the last 100 lines of the deployment log, which can help you debug
    any issues.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 关注事件标签，因为它会通知你是否有任何问题出现。如果你遇到问题，可以使用日志标签检索完整的日志集或部署日志的最后100行，这有助于调试任何问题。
- en: 'After a few minutes, if all has gone well, the Health label will switch from
    grey to green and your screen will look something like this:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 几分钟后，如果一切顺利，健康标签将从灰色切换到绿色，你的屏幕看起来可能像这样：
- en: '![](../Images/cf961fafc1bf45a719c6d912b5950e03.png)'
  id: totrans-73
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/cf961fafc1bf45a719c6d912b5950e03.png)'
- en: Image from AWS website
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 图片来自AWS网站
- en: Now, you should be able to click on the Domain URL (circled in red above), and
    your dashboard should appear.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你应该能够点击域名URL（如上图红色圆圈所示），然后你的仪表板应该会出现。
- en: '![](../Images/ec686b509b2f7a9b4097d383ebb1746d.png)'
  id: totrans-76
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ec686b509b2f7a9b4097d383ebb1746d.png)'
- en: Image by Author
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: Troubleshooting
  id: totrans-78
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 故障排除
- en: The first thing to check if you encounter problems when running your dashboard
    is that your source data is in the correct location and is referenced correctly
    in your Streamlit app source code file. If you rule that out as an issue, then
    you will more than likely have hit a networking setup problem, and you’ll probably
    see a screen like this.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你运行仪表板时遇到问题，首先要检查的是你的源数据是否位于正确的位置，并且在Streamlit应用程序源代码文件中正确引用。如果你排除了这个问题，那么你很可能遇到了网络配置问题，你可能会看到这样的屏幕。
- en: '![](../Images/74ed37e62528379f1e8d76edc5cd6223.png)'
  id: totrans-80
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/74ed37e62528379f1e8d76edc5cd6223.png)'
- en: Image by Author
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: If that’s the case, here are a few things you can check out. You may need to
    log in to your EC2 instance and review the logs. In my case, I encountered an
    issue with my pip install command, which ran out of space to install all the necessary
    packages. To solve that, I had to add extra Elastic Block storage to my instance.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 如果是这样的话，这里有一些你可以检查的事项。你可能需要登录到你的EC2实例并检查日志。在我的情况下，我遇到了pip安装命令的问题，因为空间不足而无法安装所有必要的包。为了解决这个问题，我不得不给我的实例添加额外的弹性块存储。
- en: The more likely cause will be a networking issue. In that case, try some or
    all of the suggestions below.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 更可能的原因将是网络问题。在这种情况下，尝试以下建议中的某些或全部。
- en: '**VPC Configuration**'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: '**VPC配置**'
- en: Ensure your Elastic Beanstalk environment is deployed in a VPC with at least
    one public subnet.
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确保你的Elastic Beanstalk环境部署在至少有一个公共子网的VPC中。
- en: Verify that the VPC has an Internet Gateway attached.
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 验证VPC是否连接了互联网网关。
- en: '**Subnet Configuration**'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: '**子网配置**'
- en: Confirm that the subnet used by your Elastic Beanstalk environment is public.
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确认你的Elastic Beanstalk环境使用的子网是公共的。
- en: Check that the “Auto-assign public IPv4 address” setting is enabled for this
    subnet.
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确保为这个子网启用了“自动分配公共IPv4地址”设置。
- en: '**Route Table**'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: '**路由表**'
- en: Verify that the route table associated with your public subnet has a route to
    the Internet Gateway (0.0.0.0/0 -> igw-xxxxxxxx).
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 验证与你的公共子网关联的路由表是否有一个指向互联网网关的路由（0.0.0.0/0 -> igw-xxxxxxxx）。
- en: '**Security Group**'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: '**安全组**'
- en: Review the inbound rules of the security group attached to your Elastic Beanstalk
    instances.
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 检查附加到你的Elastic Beanstalk实例的安全组入站规则。
- en: Ensure it allows incoming traffic on port 80 (HTTP) and/or 443 (HTTPS) from
    the appropriate sources.
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确保它允许来自适当来源的端口80（HTTP）和/或443（HTTPS）的入站流量。
- en: Check that outbound rules allow necessary outgoing traffic.
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 检查出站规则是否允许必要的出站流量。
- en: '**Network Access Control Lists (NACLS)**'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: '**网络访问控制列表（NACLs**）'
- en: Review the Network ACLS associated with your subnet.
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 检查与你的子网关联的网络ACL。
- en: Ensure they allow both inbound and outbound traffic on the necessary ports.
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确保它们允许在必要端口上的入站和出站流量。
- en: '**Elastic Beanstalk Environment Configuration**'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: '**Elastic Beanstalk环境配置**'
- en: Verify that your environment is using the correct VPC and public subnet in the
    Elastic Beanstalk console.
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 验证你的环境是否在Elastic Beanstalk控制台中使用了正确的VPC和公共子网。
- en: '**EC2 Instance Configuration**'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: '**EC2实例配置**'
- en: Verify that the EC2 instances launched by Elastic Beanstalk have public IP addresses
    assigned.
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 验证由Elastic Beanstalk启动的EC2实例是否分配了公共IP地址。
- en: '**Load Balancer Configuration (if applicable)**'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: '**负载均衡器配置（如果适用**）'
- en: If you use a load balancer, ensure it’s configured correctly in the public subnet.
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你使用负载均衡器，确保它在公共子网中配置正确。
- en: Check that the load balancer security group allows incoming traffic and can
    communicate with the EC2 instances.
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确认负载均衡器安全组允许传入流量并且可以与 EC2 实例通信。
- en: Securing your app
  id: totrans-106
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 保护您的应用程序
- en: As it stands, your deployed app is visible to anyone on the internet who knows
    your deployed EB domain name. This is ***probably*** not what you want. So, what
    are your options for securing your app on AWS infrastructure?
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 目前，您的已部署应用程序对任何知道您的已部署 EB 域名的互联网用户都是可见的。这**可能**不是您想要的。那么，您在 AWS 基础设施上保护应用程序有哪些选择？
- en: '**1/ Lock the security group to trusted CIDRs**'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: '**1/ 锁定安全组到受信任的 CIDR**'
- en: In the console, find the security group associated with your EB deployment and
    click on it. It should look like this,
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 在控制台中，找到与您的 EB 部署关联的安全组并点击它。它应该看起来像这样，
- en: '![](../Images/4c3db049fb25641406b1515d4b17a6b9.png)'
  id: totrans-110
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/4c3db049fb25641406b1515d4b17a6b9.png)'
- en: Image from AWS website
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: AWS 网站图片
- en: Make sure you’re on the Inbound Rules TAB, choose Edit Inbound Rules, and change
    the source IP ranges to your corporate IP ranges or another set of IP addresses.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 确保您在“入站规则”选项卡上，选择“编辑入站规则”，并将源 IP 范围更改为您的企业 IP 范围或另一组 IP 地址。
- en: '**2/ Use private subnets, internal load balancers and NAT Gateways**'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: '**2/ 使用私有子网、内部负载均衡器和 NAT 网关**'
- en: This is a more challenging option to implement and likely requires the expertise
    of your AWS network administrator or deployment specialist.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个更具挑战性的实施选项，可能需要您的 AWS 网络管理员或部署专家的专业知识。
- en: '**3/ Using AWS Cognito and an application load balancer**'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: '**3/ 使用 AWS Cognito 和应用程序负载均衡器**'
- en: Again, this is a more complex setup that you’ll probably need assistance with
    if you’re not an AWS network guru, but it is perhaps the most robust of them all.
    The flow is this:-
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 再次强调，这是一个更复杂的设置，如果您不是 AWS 网络专家，您可能需要帮助。但这可能是其中最稳健的。流程是这样的：-
- en: A user navigates to your public Streamlit URL.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 用户导航到您的公共 Streamlit URL。
- en: The ALB intercepts the request. It sees that the user is either not already
    logged in or not authenticated.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: ALB 会在请求中拦截。它看到用户要么尚未登录，要么未经过身份验证。
- en: The ALB automatically redirects the user to Cognito to sign in or create an
    account. Upon successful login, Cognito redirects the user back to your application
    URL. The ALB now recognises a valid session and allows the request to proceed
    to your Streamlit app.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: ALB 会自动将用户重定向到 Cognito 进行登录或创建账户。登录成功后，Cognito 会将用户重定向回您的应用程序 URL。此时，ALB 会识别有效的会话并允许请求继续到您的
    Streamlit 应用程序。
- en: Your Streamlit app only ever receives traffic from authenticated users.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 您的 Streamlit 应用程序仅从经过身份验证的用户那里接收流量。
- en: '* * *'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Summary
  id: totrans-122
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: In this article, I discussed deploying a Streamlit dashboard application I had
    previously written to AWS. The original app utilised PostgreSQL as its data source,
    and I demonstrated how to switch to using AWS S3 in preparation for deploying
    the app to AWS.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我讨论了将之前编写的 Streamlit 仪表板应用程序部署到 AWS 的过程。原始应用程序使用 PostgreSQL 作为其数据源，我演示了如何切换到使用
    AWS S3 以便将应用程序部署到 AWS。
- en: I discussed deploying the app to AWS using their Elastic Beanstalk service.
    I described and explained all the extra files required before deployment, including
    the need for them to be contained in a zip archive.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 我讨论了使用他们的 Elastic Beanstalk 服务将应用程序部署到 AWS。我描述并解释了在部署之前所需的额外文件，包括它们需要包含在一个 zip
    存档中。
- en: I then briefly explained the Elastic Beanstalk service and described the detailed
    steps required to use it to deploy our Streamlit app to AWS infrastructure. I
    described the multiple input screens that needed to be navigated and showed what
    inputs to use at various stages.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 我随后简要介绍了 Elastic Beanstalk 服务，并描述了使用它将我们的 Streamlit 应用程序部署到 AWS 基础设施所需的详细步骤。我描述了需要导航的多个输入屏幕，并展示了在各个阶段应使用哪些输入。
- en: I highlighted some troubleshooting methods if the app deployment doesn’t go
    as expected.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 如果应用程序部署不符合预期，我突出了一些故障排除方法。
- en: Finally, I provided some suggestions on how to protect your app from unauthorised
    access.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我提供了一些关于如何保护您的应用程序免受未经授权访问的建议。
- en: For more information on Streamlit, check out their online documention using
    the link below.
  id: totrans-128
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 要了解更多关于 Streamlit 的信息，请查看下文链接中的在线文档。
- en: ''
  id: totrans-129
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[https://docs.streamlit.io](https://docs.streamlit.io)'
  id: totrans-130
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://docs.streamlit.io](https://docs.streamlit.io)'
- en: ''
  id: totrans-131
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: To find out more about developing with Streamlit I show how to develop a modern
    data dashboard with it in the article linked below.
  id: totrans-132
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 要了解更多关于使用 Streamlit 开发的信息，请参阅下文链接中的文章，了解如何用它开发现代数据仪表板。
- en: '[Building a Data Dashboard](https://towardsdatascience.com/building-a-data-dashboard-9441db646697/)'
  id: totrans-133
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[构建数据仪表板](https://towardsdatascience.com/building-a-data-dashboard-9441db646697/)'
