- en: 'Scaling Statistics: Incremental Standard Deviation in SQL with dbt'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/scaling-statistics-incremental-standard-deviation-in-sql-with-dbt-2eb0505aad2b/](https://towardsdatascience.com/scaling-statistics-incremental-standard-deviation-in-sql-with-dbt-2eb0505aad2b/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'SQL aggregation functions can be computationally expensive when applied to
    large datasets. As datasets grow, recalculating metrics over the entire dataset
    repeatedly becomes inefficient. To address this challenge, **incremental aggregation**
    is often employed – a method that involves maintaining a previous state and updating
    it with new incoming data. While this approach is straightforward for aggregations
    like COUNT or SUM, the question arises: how can it be applied to more complex
    metrics like standard deviation?'
  prefs: []
  type: TYPE_NORMAL
- en: '[Standard deviation](https://en.wikipedia.org/wiki/Standard_deviation) is a
    statistical metric that measures the extent of variation or dispersion in a variable’s
    values relative to its mean. It is derived by taking the square root of the [variance](https://en.wikipedia.org/wiki/Variance).
    The formula for calculating the variance of a sample is as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Sample variance formula](../Images/a740f71788ea7a1d8d6d0c0d0f50e3cb.png)'
  prefs: []
  type: TYPE_IMG
- en: Sample variance formula
  prefs: []
  type: TYPE_NORMAL
- en: Calculating standard deviation can be complex, as it involves updating both
    the mean and the sum of squared differences across all data points. However, with
    algebraic manipulation, we can derive a formula for incremental computation –
    enabling updates using an existing dataset and incorporating new data seamlessly.
    This approach avoids recalculating from scratch whenever new data is added, making
    the process much more efficient (A detailed derivation is available [on my GitHub](https://github.com/YuvalGorch/math_proofs/blob/main/incremental_stddev_proof.pdf)).
  prefs: []
  type: TYPE_NORMAL
- en: '![Derived sample variance formula](../Images/4fca54cd3a23b2c9bb93c97533c98baa.png)'
  prefs: []
  type: TYPE_IMG
- en: Derived sample variance formula
  prefs: []
  type: TYPE_NORMAL
- en: 'The formula was basically broken into 3 parts:'
  prefs: []
  type: TYPE_NORMAL
- en: The existing’s set weighted variance
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The new set’s weighted variance
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The mean difference variance, accounting for between-group variance.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: This method enables incremental variance computation by retaining the COUNT
    (k), AVG (µk), and VAR (Sk) of the existing set, and combining them with the COUNT
    (n), AVG (µn), and VAR (Sn) of the new set. As a result, the updated standard
    deviation can be calculated efficiently without rescanning the entire dataset.
  prefs: []
  type: TYPE_NORMAL
- en: Now that we’ve wrapped our heads around the math behind incremental standard
    deviation (or at least caught the gist of it), let’s dive into the dbt SQL implementation.
    In the following example, we’ll walk through how to set up an incremental model
    to calculate and update these statistics for a user’s transaction data.
  prefs: []
  type: TYPE_NORMAL
- en: Consider a transactions table named **stg__transactions**, which tracks user
    transactions (events). Our goal is to create a time-static table, **int__user_tx_state**,
    that aggregates the ‘state’ of user transactions. The column details for both
    tables are provided in the picture below.
  prefs: []
  type: TYPE_NORMAL
- en: '![Image by the author](../Images/56200361ee96923ee490c50dd75af9e8.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  prefs: []
  type: TYPE_NORMAL
- en: To make the process efficient, we aim to update the state table incrementally
    by combining the new incoming transactions data with the existing aggregated data
    (i.e. the current user state). This approach allows us to calculate the updated
    user state without scanning through all historical data.
  prefs: []
  type: TYPE_NORMAL
- en: '![Image by the author](../Images/16bce03be1aff0e1acb238599dabe6e5.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  prefs: []
  type: TYPE_NORMAL
- en: The code below assumes understanding of some dbt concepts, if you’re unfamiliar
    with it, you may still be able to understand the code, although I strongly encourage
    going through [dbt’s incremental guide](https://docs.getdbt.com/docs/build/incremental-models-overview)
    or read [this awesome post](https://towardsdatascience.com/dbt-incremental-the-right-way-63f931263f4a).
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: We’ll construct a full dbt SQL step by step, aiming to calculate incremental
    aggregations efficiently without repeatedly scanning the entire table. The process
    begins by defining the model as incremental in dbt and using `unique_key` to update
    existing rows rather than inserting new ones.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Next, we fetch records from the _**stg__transactions**_ table. The `is_incremental`
    block filters transactions with timestamps later than the latest user update,
    effectively including "only new transactions".
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
