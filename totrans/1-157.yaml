- en: 'AI Agents: From Assistants for Efficiency to Leaders of Tomorrow?'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: AI 代理：从效率助手到未来的领导者？
- en: 原文：[https://towardsdatascience.com/ai-agents-from-assistants-for-efficiency-to-leaders-of-tomorrow/](https://towardsdatascience.com/ai-agents-from-assistants-for-efficiency-to-leaders-of-tomorrow/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/ai-agents-from-assistants-for-efficiency-to-leaders-of-tomorrow/](https://towardsdatascience.com/ai-agents-from-assistants-for-efficiency-to-leaders-of-tomorrow/)
- en: '**<mdspan datatext="el1761327822671" class="mdspan-comment">We are witnessing</mdspan>
    a super-fast evolution of artificial intelligence from a mere tool for execution
    to an agent of evaluation… and, potentially, leadership. As AI systems begin to
    master complex reasoning we *must* confront a profound question: What is the next
    step? Here I explore the provocative possibility of AI as a leader, i.e. a manager,
    coordinator, CEO, or even as a head of state. Let’s discuss the immense potential
    for a utopian hyper-efficient, data-driven, unbiased society, while assessing
    the inherent dangers of algorithmic bias, of uncontrolled surveillance**, **and
    of the erosion of human accountability. Then a more balanced system emerges, where
    AI brainstorms with a decentralized human governance to maximally balance progress
    with prudence.**'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '**<mdspan datatext="el1761327822671" class="mdspan-comment">我们正在见证</mdspan>人工智能从仅仅是一个执行工具到评估代理，甚至可能的领导者的超快速进化。随着人工智能系统开始掌握复杂的推理，我们**必须**面对一个深刻的问题：下一步是什么？在这里，我探讨了人工智能作为领导者的挑衅性可能性，即管理者、协调者、首席执行官，甚至国家元首。让我们讨论一个乌托邦式的、高度高效、数据驱动、无偏见的社会的巨大潜力，同时评估算法偏差、不受控制的监控**以及人类责任感的侵蚀所带来的固有危险。然后，一个更平衡的系统出现，其中人工智能与去中心化的人类治理一起头脑风暴，以最大限度地平衡进步与谨慎。**'
- en: It is no news that artificial intelligence is rapidly and continuously shifting
    and evolving. But let’s stop to think about this in detail. We have already moved
    well beyond the initial excitement of chatbots and image generators to much more
    complex AI systems that have penetrated all of science, technology, and entertainment.
    And now we are reaching the point of quite profound discussions about AI’s role
    in complex decision-making. Already since last year, quite advanced systems have
    been proposed and keep being developed that can assess very complex subjects,
    even the quality of hardcore scientific research, engineering problems, and coding.
    And this is just the tip of the iceberg. As AI’s capabilities grow, it’s not a
    huge leap to imagine these systems taking on roles as project managers, coordinators,
    and even “governors” in various domains — in the extreme, possibly even as CEOs,
    presidents and the like. Yes, I know it feels creepy, but that is why we better
    talk about this now!
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能正在快速且持续地转变和进化，这早已不是新闻。但让我们详细地思考一下这一点。我们已经远远超出了聊天机器人和图像生成器的初始兴奋，进入了更加复杂的AI系统，这些系统已经渗透到科学、技术和娱乐的各个领域。现在，我们正在达到对人工智能在复杂决策中作用的深入讨论。去年以来，已经提出了相当先进的系统，并且仍在不断开发中，可以评估非常复杂的问题，甚至包括硬核科学研究、工程问题和编码的质量。这只是冰山一角。随着人工智能能力的增长，想象这些系统承担项目经理、协调员，甚至在各个领域的“监管者”角色——在极端情况下，甚至可能是首席执行官、总统等，并不是巨大的飞跃。是的，我知道这感觉有点令人毛骨悚然，这就是为什么我们现在最好讨论这个话题的原因！
- en: 'AI in the Lab: A New Scientific Revolution'
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实验室中的AI：一场新的科学革命
- en: If you follow me, you know I come from the academic world, more precisely the
    world revolving around molecular biology of the kinds done both with computers
    and in the wet lab. As such I’m witnessing first-hand how the academic world is
    feeling the impact of AI and automation. I was there as a CASP assessor when DeepMind
    introduced its AlphaFold models. I was there to see the revolution on protein
    structure prediction extending over protein design too (see my comment on the
    [related Nobel prize at Nature’s *Communication Biology*](https://www.nature.com/articles/s42003-024-07113-5)).
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你跟随我，你就知道我来自学术界，更确切地说，是围绕计算机和湿实验室进行的分子生物学世界。因此，我亲眼目睹了学术界如何感受到人工智能和自动化的影响。当
    DeepMind 介绍其 AlphaFold 模型时，我作为 CASP 评估员在那里。我见证了蛋白质结构预测的革命，它不仅扩展到蛋白质设计（参见我在 [Nature
    的 *Communication Biology* 上的相关诺贝尔奖评论](https://www.nature.com/articles/s42003-024-07113-5))）。
- en: Emerging startups now put forward automated labs (to be honest, still largely
    reliant on human experts, still there they go) for testing new molecules at scale,
    even allowing for competitions among protein designers — most based on one or
    another kind of AI system for molecules. I use myself the power of AI to summarize,
    brainstorm, get and process information, code, and more.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 现在新兴的初创公司正在提出自动化的实验室（说实话，仍然很大程度上依赖于人类专家，但它们仍在前进），用于大规模测试新的分子，甚至允许蛋白质设计师之间进行竞赛——大多数基于一种或另一种分子人工智能系统。我自己就利用人工智能的力量来总结、头脑风暴、获取和处理信息、编码等等。
- en: I also follow the leaderboards and get amazed at the continuously improving
    reasoning capabilities, multimodal AI systems, and every new thing that comes
    up, many applicable to project planning, execution, and probably even management
    — the latter key to the discussion I present here.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 我也关注排行榜，并对不断进步的推理能力、多模态人工智能系统以及涌现出的每一项新事物感到惊讶，其中许多适用于项目规划、执行，甚至可能是管理——这是我在这里讨论的关键点。
- en: As a concrete, very recent example, a conference called Agents4Science 2025
    is set to feature papers and reviews entirely produced by AI agents. This “sandbox”
    environment will allow researchers to study how AI-driven science compares to
    human-led research, and to understand the strengths and weaknesses of these systems.
    This is all directly consistent with someone’s view of a future where AI is not
    just an assistant or specialized agent but actually a planner, and, why not, a
    (co-)leader.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一个非常具体的、最近的事例，名为Agents4Science 2025的会议将展示完全由人工智能代理产生的论文和评论。这个“沙盒”环境将允许研究人员研究由人工智能驱动的科学与由人类领导的科学研究相比的情况，并了解这些系统的优势和劣势。这一切都与某人对未来的看法一致，即人工智能不仅仅是助手或专业代理，而实际上是一个规划者，甚至可能是（共同）领导者。
- en: And no need to say that this isn’t just a theoretical exercise. New startups
    like QED are developing platforms that use “Critical Thinking AI” to evaluate
    scientific manuscripts, breaking them down into claims and exposing their underlying
    logic to identify weaknesses. I have tried it on some manuscripts and it is impressive,
    despite not flawless to be honest — but surely they will improve. This automated
    approach could help to alleviate the immense pressure on human reviewers and accelerate
    the pace of scientific discovery. As Oded Rechavi, a creator of QED, puts it,
    there’s a need for alternatives to a publishing system often characterized by
    delays and arbitrary reviews. And tools like QED could provide the much-needed
    speed up and objectivity.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 无需多言，这不仅仅是一个理论练习。像QED这样的新初创公司正在开发使用“批判性思维人工智能”来评估科学论文的平台，将它们分解为论点，并揭示其背后的逻辑以识别弱点。我尝试过一些论文，尽管说实话并不完美——但无疑他们会改进。这种自动化方法可以帮助减轻人类审稿人面临的重压，并加快科学发现的步伐。正如QED的创造者Oded
    Rechavi所说，我们需要替代一个经常被描述为延误和任意审查的出版系统。像QED这样的工具可以提供急需的速度和客观性。
- en: Google, like all tech giants (although I’m still waiting to see what’s up with
    Apple…), is also pushing the boundaries with AI that can evolve and improve scientific
    software, in some cases outperforming state-of-the-art tools created by humans.
    Did you try their new AI mode for searches, and how you can follow up on the results?
    I’ve been using this feature for a week and I’m still in awe.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 谷歌，像所有科技巨头一样（尽管我仍在等待看到苹果的最新动态……），也在利用人工智能推动科学软件的边界，在某些情况下甚至超过了人类创造的最先进工具。你尝试过他们新的AI搜索模式了吗？以及你如何跟进这些结果？我已经使用这个功能一周了，我仍然感到敬畏。
- en: All these observations, that I bring from the academic world but surely most
    (if not all) other readers of TDS also experience, suggest a future where AI not
    only evaluates science (and any other human activity or developments of the world)
    but actively contributes to its advancement. Further demonstrating this is the
    development of AI systems that can discover “their own” learning algorithms, achieving
    state-of-the-art performance on tasks it has never encountered before.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些观察，我来自学术界，但当然，TDS的绝大多数（如果不是所有）读者也会经历，预示着一个未来，其中人工智能不仅评估科学（以及任何其他人类活动或世界的发展），而且积极促进其进步。进一步证明这一点的是，人工智能系统可以发现“它们自己的”学习算法，在它以前从未遇到过的任务上实现最先进的性能。
- en: Of course, there have been bumps in the road. Remember for example how Meta’s
    Galactica was taken down shortly after its release due to its tendency to generate
    plausible but largely incorrect information — similar to the hallucinations of
    today’s LLM systems but orders of magnitude worse! That was a true disaster that
    serves as a critical reminder of the need for robust validation and human oversight
    as we integrate AI into the scientific process, and especially so if we deposit
    on them increasingly more trust.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，路上也有一些波折。比如，记得Meta的Galactica在发布后不久就被关闭，因为它倾向于生成看似合理但实际上大部分错误的信息——类似于今天LLM系统的幻觉，但程度要差得多！那是一场真正的灾难，它作为了一个关键的提醒，即在我们将AI整合到科学过程中，尤其是在我们越来越信任它们时，需要强大的验证和人类监督。
- en: From AI as a Coder Fellow to AI as the Manager
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 从AI作为编码员同仁到AI作为管理者
- en: Of course, and here you will feel more identified if you are into programming
    yourself, the world of software development has been radically transformed by
    a plethora of AI-powered coding assistants. These tools can generate code, identify
    and fix bugs, and even explain complex code snippets in natural language. This
    not only speeds up the development process but also makes it more accessible to
    a wider range of people.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，如果你自己也对编程感兴趣，那么你会在这里感到更加认同，软件开发的世界已经被众多AI驱动的编码助手彻底改变。这些工具可以生成代码，识别和修复错误，甚至用自然语言解释复杂的代码片段。这不仅加快了开发过程，也使它对更广泛的人群更加容易接近。
- en: The principles of AI-driven evaluation and task execution are also being applied
    in the business and management worlds. AI-powered project management tools are
    becoming increasingly common, capable of automating task scheduling, resource
    allocation, and progress tracking. These systems can provide a level of efficiency
    and oversight that would be impossible for a human manager to achieve alone. AI
    can analyze historical project data to create optimized schedules and even predict
    potential roadblocks before they occur. Some say that by 2030, 80% of the work
    in today’s project management will be eliminated as AI takes on traditional functions
    like data collection, tracking and reporting.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: AI驱动的评估和任务执行原则也正在商业和管理领域得到应用。AI驱动的项目管理工具越来越普遍，能够自动化任务调度、资源分配和进度跟踪。这些系统可以提供一种效率和管理水平，这是人类管理者单独难以实现的。AI可以分析历史项目数据以创建优化的日程安排，甚至预测潜在的障碍，在它们发生之前。有些人说，到2030年，今天项目管理中的80%的工作将被消除，因为AI承担了传统功能，如数据收集、跟踪和报告。
- en: Governing with AI Algorithms?
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 用AI算法来治理？
- en: The idea of “automated governance” is a fascinating and controversial one. But…
    if AI could soon manage complex projects and contribute to scientific discovery,
    could it also play a role in governing our societies?
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: “自动化治理”的想法既迷人又具有争议性。但是……如果AI很快就能管理复杂的项目并促进科学发现，那么它是否也能在我们社会的治理中发挥作用？
- en: On the one hand, AI could bring unprecedented efficiency and data-driven decision-making
    to governance. It could analyze vast datasets to create more effective policies,
    eliminate human bias and corruption, and provide personalized services. An AI-powered
    system could even help to anticipate and prevent crises, such as disease outbreaks
    or infrastructure failures. We’re already seeing this in practice, with Singapore
    using AI-powered chatbots for citizen services and Japan using an AI-powered system
    for earthquake prediction. Estonia has also been a leader in digital governance,
    using AI to improve public services in healthcare and transportation.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 一方面，AI可以为治理带来前所未有的效率和数据驱动的决策。它可以分析大量数据集以创建更有效的政策，消除人类偏见和腐败，并提供个性化服务。一个AI驱动的系统甚至可以帮助预测和预防危机，如疾病爆发或基础设施故障。我们已经在实践中看到了这一点，新加坡正在使用AI驱动的聊天机器人提供公民服务，日本正在使用AI驱动的系统进行地震预测。爱沙尼亚也在数字治理方面处于领先地位，利用AI改善医疗保健和交通领域的公共服务。
- en: 'However, the risks are equally significant. Algorithmic bias, a lack of transparency
    in “black box” systems, and the potential for mass surveillance are all serious
    concerns. A major bank’s AI-driven credit card approval system was found to be
    giving women lower credit limits than men with similar financial backgrounds,
    a clear example of how biased historical data can lead to discriminatory outcomes.
    There’s also the question of accountability: who is responsible when an AI system
    makes a mistake?'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，风险同样重大。算法偏见、“黑箱”系统中的不透明性以及大规模监控的可能性都是严重的问题。一家主要银行的AI驱动信用卡审批系统被发现给女性设定的信用额度低于具有相似财务背景的男性，这是历史数据偏见导致歧视性结果的一个明显例子。还有问责制的问题：当AI系统出错时，谁负责？
- en: 'A Hybrid Future: Decentralized Human-AI Governance'
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 混合未来：去中心化人机治理
- en: 'Perhaps the most realistic and desirable future is one of “augmented intelligence”
    where AI supports human decision-makers rather than replacing them. We can draw
    inspiration from existing political systems, such as the Swiss model of a collective
    head of state. Switzerland is governed by a seven-member Federal Council, with
    the presidency rotating annually, a system designed to prevent the concentration
    of power and encourage consensus-based decision-making. We could imagine a future
    where a similar model is used for human-AI governance: A council of human experts
    could work alongside a suite of AI “governors”, each with its own area of expertise.
    This would allow for a more balanced and robust decision-making process, with
    humans providing the ethical guidance and contextual understanding that AI currently
    lacks. Like, the humans could be part of a board that takes the decisions collectively
    in consultation with specialized AI systems, and then the latter plan, execute
    and manage their implementation.'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 可能最现实和理想的前景是“增强智能”的未来，其中AI支持人类决策者而不是取代他们。我们可以从现有的政治体系中汲取灵感，例如瑞士的集体国家元首模式。瑞士由七人组成的联邦委员会治理，主席每年轮换，这种制度旨在防止权力集中并鼓励基于共识的决策。我们可以设想一个未来，其中类似的模式被用于人机治理：一个由人类专家组成的委员会可以与一套AI“监管者”并肩工作，每个“监管者”都有自己的专业领域。这将允许有一个更加平衡和稳健的决策过程，人类提供AI目前所缺乏的伦理指导和情境理解。例如，人类可以成为董事会的一部分，在咨询专业AI系统后集体做出决策，然后后者计划、执行和管理其实施。
- en: The idea of decentralized governance is already being explored in the world
    of blockchain with Decentralized Autonomous Organizations (DAOs). These organizations
    run on blockchain protocols, with rules encoded in smart contracts. Decisions
    are made by a community of members, often through the use of governance tokens
    that grant voting power. This model removes the need for a central authority and
    allows for a more transparent and democratic form of governance.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 去中心化治理的想法已经在区块链世界中得到探索，即去中心化自治组织（DAOs）。这些组织运行在区块链协议上，规则编码在智能合约中。决策由一个成员社区做出，通常通过使用赋予投票权的治理代币。这种模式消除了对中央权威的需求，并允许一种更加透明和民主的治理形式。
- en: The decentralized nature of this system would also help to mitigate the risks
    of placing too much power in the hands of a single entity, be it human or machine.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 该系统的去中心化特性也有助于减轻将过多权力集中在单个实体（无论是人类还是机器）的风险。
- en: The road to this future is still a long one, but the building blocks are being
    put in place today — and that’s why it might be worth engaging on these kinds
    of brainstorming sessions already now. As AI continues to evolve, it’s crucial
    that we have an open and honest conversation about the role we want it to play
    in our lives. The potential benefits are immense, but so are the risks. By proceeding
    with caution, and by designing systems that augment rather than replace human
    intelligence, we can ensure that AI is a force for good in the world.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 通向这个未来的道路仍然很长，但基石正在今天被奠定——这就是为什么现在就参与这类头脑风暴会议可能值得。随着AI的持续发展，我们进行开放和诚实的对话，关于我们希望它在我们的生活中扮演的角色至关重要。潜在的利益是巨大的，但风险也同样巨大。通过谨慎行事，并通过设计增强而非取代人类智能的系统，我们可以确保AI成为世界上的正能量。
