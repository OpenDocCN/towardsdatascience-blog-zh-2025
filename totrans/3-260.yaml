- en: Method of Moments Estimation with Python Code
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 基于Python代码的矩估计法
- en: 原文：[https://towardsdatascience.com/method-of-moments-estimation-with-python-code/](https://towardsdatascience.com/method-of-moments-estimation-with-python-code/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/method-of-moments-estimation-with-python-code/](https://towardsdatascience.com/method-of-moments-estimation-with-python-code/)
- en: 'Let’s say you are in a customer care center, and you would like to know the
    probability distribution of the number of calls per minute, or in other words,
    you want to answer the question: what is the probability of receiving zero, one,
    two, … etc., calls per minute? You need this distribution in order to predict
    the probability of receiving different number of calls based on which you can
    plan how many employees are needed, whether or not an expansion is required, etc.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你在一个客户服务中心，你想要知道每分钟通话次数的概率分布，换句话说，你想要回答这样的问题：每分钟接收到零个、一个、两个、等等通话的概率是多少？你需要这个分布来预测基于不同数量的通话概率，从而可以计划需要多少员工，是否需要扩张等。
- en: In order to let our decision ‘data informed’ we start by collecting data from
    which we try to infer this distribution, or in other words, we want to generalize
    from the sample data to the unseen data which is also known as the population
    in statistical terms. This is the essence of statistical inference.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使我们的决策“数据驱动”，我们首先从数据中收集信息，试图推断出这种分布，换句话说，我们希望从样本数据推广到未见数据，这在统计学中也被称作总体。这是统计推断的本质。
- en: 'From the collected data we can compute the relative frequency of each value
    of calls per minute. For example, if the collected data over time looks something
    like this: 2, 2, 3, 5, 4, 5, 5, 3, 6, 3, 4, … etc. This data is obtained by counting
    the number of calls received every minute. In order to compute the relative frequency
    of each value you can count the number of occurrences of each value divided by
    the total number of occurrences. This way you will end up with something like
    the grey curve in the below figure, which is equivalent to the histogram of the
    data in this example.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 从收集到的数据中，我们可以计算每分钟通话次数的相对频率。例如，如果收集到的数据随时间变化看起来像这样：2, 2, 3, 5, 4, 5, 5, 3, 6,
    3, 4, …等等。这些数据是通过计算每分钟收到的通话次数获得的。为了计算每个值的相对频率，你可以计算每个值出现的次数除以总出现次数。这样，你最终会得到类似于下面图中灰色曲线的东西，这相当于本例中数据的直方图。
- en: '![](../Images/fe71e0c107cbe7f61d4758f58e308bd7.png)'
  id: totrans-5
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/fe71e0c107cbe7f61d4758f58e308bd7.png)'
- en: Image generated by the Author
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 作者生成的图像
- en: Another option is to assume that each data point from our data is a realization
    of a random variable (X) that follows a certain probability distribution. This
    probability distribution represents all the possible values that are generated
    if we were to collect this data long into the future, or in other words, we can
    say that it represents the population from which our sample data was collected.
    Furthermore, we can assume that all the data points come from the same probability
    distribution, i.e., the data points are identically distributed. Moreover, we
    assume that the data points are independent, i.e., the value of one data point
    in the sample is not affected by the values of the other data points. The independence
    and identical distribution (iid) assumption of the sample data points allows us
    to proceed mathematically with our statistical inference problem in a systematic
    and straightforward way. In more formal terms, we assume that a generative probabilistic
    model is responsible for generating the iid data as shown below.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种选择是假设我们的数据中的每个数据点都是一个随机变量（X）的实现，该随机变量遵循某种概率分布。这种概率分布代表了如果我们长期收集这些数据时可能生成的所有可能值。换句话说，我们可以说它代表了我们的样本数据所收集的总体。此外，我们可以假设所有数据点都来自同一个概率分布，即数据点是同分布的。此外，我们假设数据点是独立的，即样本中一个数据点的值不受其他数据点值的影响。样本数据点的独立同分布（iid）假设使我们能够以系统且直接的方式对统计推断问题进行数学处理。更正式地说，我们假设一个生成概率模型负责生成如下所示的同分布数据。
- en: '![](../Images/50da41d5676bd53bb3709be624665293.png)'
  id: totrans-8
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/50da41d5676bd53bb3709be624665293.png)'
- en: Image generated by the Author
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 作者生成的图像
- en: In this particular example, a Poisson distribution with mean value λ = 5 is
    assumed to have generated the data as shown in the blue curve in the below figure.
    In other words, we assume here that we know the true value of λ which is generally
    not known and needs to be estimated from the data.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个特定的例子中，假设数据是由均值为λ = 5的泊松分布生成的，如图下蓝色曲线所示。换句话说，我们假设我们知道λ的真实值，这通常是不知的，需要从数据中估计出来。
- en: '![](../Images/c2ae5959939f7b157d23d96647c4c301.png)'
  id: totrans-11
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c2ae5959939f7b157d23d96647c4c301.png)'
- en: Image generated by the Author
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 作者生成的图像
- en: As opposed to the previous method in which we had to compute the relative frequency
    of each value of calls per minute (e.g., 12 values to be estimated in this example
    as shown in the grey figure above), now we only have one parameter that we aim
    at finding which is λ. Another advantage of this generative model approach is
    that it is better in terms of generalization from sample to population. The assumed
    probability distribution can be said to have summarized the data in an elegant
    way that follows the Occam’s razor principle.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 与之前的方法不同，我们不得不计算每分钟呼叫次数的相对频率（例如，本例中需要估计12个值，如上图灰色部分所示），现在我们只有一个参数，即λ，我们旨在找到它。这种生成模型方法的另一个优点是它在从样本到总体的泛化方面表现更好。假设的概率分布可以说以一种优雅的方式总结了数据，遵循奥卡姆剃刀原则。
- en: Before proceeding further into how we aim at finding this parameter λ, let’s
    show some Python code first that was used to generate the above figure.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 在进一步探讨我们如何寻找参数λ之前，让我们首先展示一些用于生成上述图的Python代码。
- en: '[PRE0]'
  id: totrans-15
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Our problem now is about estimating the value of the unknown parameter λ using
    the data we collected. This is where we will use the *method of moments (MoM) *approach
    that appears in the title of this article.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在的问题是使用我们收集到的数据估计未知参数λ的值。这就是我们将使用本文标题中出现的*矩法(MoM)*方法的地方。
- en: 'First, we need to define what is meant by the moment of a random variable.
    Mathematically, the kth moment of a discrete random variable (X) is defined as
    follows:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们需要定义随机变量的矩是什么意思。从数学上讲，离散随机变量(X)的第k个矩定义为以下：
- en: '![](../Images/a913278f19fb231c29f45cc8e73518b6.png)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a913278f19fb231c29f45cc8e73518b6.png)'
- en: 'Take the first moment E(X) as an example, which is also the mean μ of the random
    variable, and assuming that we collect our data which is modeled as N iid realizations
    of the random variable X. A reasonable estimate of μ is the sample mean which
    is defined as follows:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 以第一矩E(X)为例，它也是随机变量的均值μ，假设我们收集的数据是随机变量X的N个独立同分布(N iid)实现。μ的合理估计是样本均值，其定义如下：
- en: '![](../Images/1e55009719b87ee324d69e66f7e0ade6.png)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/1e55009719b87ee324d69e66f7e0ade6.png)'
- en: Thus, in order to obtain a MoM estimate of a model parameter that parametrizes
    the probability distribution of the random variable X, we first write the unknown
    parameter as a function of one or more of the kth moments of the random variable,
    then we replace the kth moment with its sample estimate. The more unknown parameters
    we have in our models, the more moments we need.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，为了获得一个MoM估计，该估计参数化随机变量X的概率分布，我们首先将未知参数表示为随机变量第k个矩的一个或多个函数，然后将第k个矩替换为其样本估计。我们模型中的未知参数越多，我们需要的矩就越多。
- en: In our Poisson model example, this is very simple as shown below.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的泊松模型示例中，这很简单，如下所示。
- en: '![](../Images/537ea5cc14fdb1c05f7ec15f272590d7.png)'
  id: totrans-23
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/537ea5cc14fdb1c05f7ec15f272590d7.png)'
- en: In the next part, we test our MoM estimator on the simulated data we had earlier.
    The Python code for obtaining the estimator and plotting the corresponding probability
    distribution using the estimated parameter is shown below.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一部分，我们将在之前生成的模拟数据上测试我们的MoM估计器。以下代码用于获取估计器和使用估计参数绘制相应概率分布。
- en: '[PRE1]'
  id: totrans-25
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: The below figure shows the estimated distribution versus the true distribution.
    The distributions are quite close indicating that the MoM estimator is a reasonable
    estimator for our problem. In fact, replacing expectations with averages in the
    MoM estimator implies that the estimator is a consistent estimator by the law
    of large numbers, which is a good justification for using such estimator.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 下图显示了估计分布与真实分布的比较。分布非常接近，表明MoM估计器是我们问题的合理估计器。事实上，在MoM估计器中将期望值替换为平均值意味着根据大数定律，估计器是一致的估计器，这是使用此类估计器的好理由。
- en: '![](../Images/75c468a568b6b24d9d15bcdf4293f377.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/75c468a568b6b24d9d15bcdf4293f377.png)'
- en: Image generated by the Author
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 由作者生成的图像
- en: Another MoM estimation example is shown below assuming the iid data is generated
    by a normal distribution with mean μ and variance σ² as shown below.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个 MoM 估计示例如下，假设独立同分布的数据是由均值为 μ 和方差 σ² 的正态分布生成的，如下所示。
- en: '![](../Images/617cabcc2d69ed74816df519f5d5d514.png)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/617cabcc2d69ed74816df519f5d5d514.png)'
- en: Image generated by the Author
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 由作者生成的图像
- en: In this particular example, a Gaussian (normal) distribution with mean value
    μ = 10 and σ = 2 is assumed to have generated the data. The histogram of the generated
    data sample (sample size = 1000) is shown in grey in the below figure, while the
    true distribution is shown in the blue curve.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个特定的例子中，假设数据是由均值为 μ = 10 和标准差 σ = 2 的高斯（正态）分布生成的。生成的数据样本（样本大小 = 1000）的直方图在下面的图形中以灰色显示，而真实分布以蓝色曲线显示。
- en: '![](../Images/da15a55a24a340bf153f980aab12164d.png)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/da15a55a24a340bf153f980aab12164d.png)'
- en: Image generated by the Author
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 由作者生成的图像
- en: The Python code that was used to generate the above figure is shown below.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 生成上述图形所使用的 Python 代码如下所示。
- en: '[PRE2]'
  id: totrans-36
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Now, we would like to use the MoM estimator to find an estimate of the model
    parameters, i.e., μ and σ² as shown below.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们希望使用 MoM 估计器找到模型参数的估计值，即 μ 和 σ²，如下所示。
- en: '![](../Images/150a4266fda0bff2b1bfb9ef42bdbebc.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/150a4266fda0bff2b1bfb9ef42bdbebc.png)'
- en: In order to test this estimator using our sample data, we plot the distribution
    with the estimated parameters (orange) in the below figure, versus the true distribution
    (blue). Again, it can be shown that the distributions are quite close. Of course,
    in order to quantify this estimator, we need to test it on multiple realizations
    of the data and observe properties such as bias, variance, etc. Such important
    aspects [have been discussed in an earlier article](https://medium.com/@mahmoudabdelaziz_67006/bias-variance-tradeoff-in-parameter-estimation-with-python-code-74e531092c6e).
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使用我们的样本数据测试这个估计器，我们在下面的图形中绘制了具有估计参数（橙色）的分布，与真实分布（蓝色）进行比较。再次，可以看出这两个分布非常接近。当然，为了量化这个估计器，我们需要在多个数据实现上测试它，并观察偏差、方差等属性。这些重要方面[已在之前的文章中讨论过](https://medium.com/@mahmoudabdelaziz_67006/bias-variance-tradeoff-in-parameter-estimation-with-python-code-74e531092c6e)。
- en: '![](../Images/1c59dafe3a1680e6a94b5e73bffd6142.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/1c59dafe3a1680e6a94b5e73bffd6142.png)'
- en: Image generated by the Author
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 由作者生成的图像
- en: The Python code that was used to estimate the model parameters using MoM, and
    to plot the above figure is shown below.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 以下代码展示了使用 MoM 方法估计模型参数并绘制上述图形所使用的 Python 代码。
- en: '[PRE3]'
  id: totrans-43
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Another useful probability distribution is the Gamma distribution. An example
    for the application of this distribution in real life was discussed in a previous [article](https://medium.com/python-in-plain-english/univariate-statistical-modeling-fundamentals-0b178fbe8686).
    However, in this article, we derive the MoM estimator of the Gamma distribution
    parameters α and β as shown below, assuming the data is iid.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个有用的概率分布是伽马分布。在之前的[文章](https://medium.com/python-in-plain-english/univariate-statistical-modeling-fundamentals-0b178fbe8686)中讨论了该分布在实际生活中的应用示例。然而，在这篇文章中，我们推导了伽马分布参数
    α 和 β 的 MoM 估计器，如下所示，假设数据是独立同分布的。
- en: '![](../Images/d76a1055e8e18d1c9e92e575e2e59813.png)'
  id: totrans-45
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/d76a1055e8e18d1c9e92e575e2e59813.png)'
- en: Image generated by the Author
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 由作者生成的图像
- en: In this particular example, a Gamma distribution with α = 6 and β = 0.5 is assumed
    to have generated the data. The histogram of the generated data sample (sample
    size = 1000) is shown in grey in the below figure, while the true distribution
    is shown in the blue curve.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个特定的例子中，假设数据是由 α = 6 和 β = 0.5 的伽马分布生成的。生成的数据样本（样本大小 = 1000）的直方图在下面的图形中以灰色显示，而真实分布以蓝色曲线显示。
- en: '![](../Images/b7dbf5e1423bd112d4c431078d26508c.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/b7dbf5e1423bd112d4c431078d26508c.png)'
- en: Image generated by the Author
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 由作者生成的图像
- en: The Python code that was used to generate the above figure is shown below.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 生成上述图形所使用的 Python 代码如下所示。
- en: '[PRE4]'
  id: totrans-51
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Now, we would like to use the MoM estimator to find an estimate of the model
    parameters, i.e., α and β, as shown below.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们希望使用 MoM 估计器找到模型参数的估计值，即 α 和 β，如下所示。
- en: '![](../Images/89abc9a24d3d1a41c7aa3d181d8edbc0.png)'
  id: totrans-53
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/89abc9a24d3d1a41c7aa3d181d8edbc0.png)'
- en: In order to test this estimator using our sample data, we plot the distribution
    with the estimated parameters (orange) in the below figure, versus the true distribution
    (blue). Again, it can be shown that the distributions are quite close.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使用我们的样本数据测试这个估计器，我们在下面的图形中绘制了具有估计参数（橙色）的分布，与真实分布（蓝色）进行比较。再次，可以看出这两个分布非常接近。
- en: '![](../Images/69a4a072bb46c366864dbd1a651cbff4.png)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/69a4a072bb46c366864dbd1a651cbff4.png)'
- en: Image generated by the Author
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 由作者生成的图像
- en: The Python code that was used to estimate the model parameters using MoM, and
    to plot the above figure is shown below.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 下面展示了用于使用MoM估计模型参数并绘制上述图形的Python代码。
- en: '[PRE5]'
  id: totrans-58
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Note that we used the following equivalent ways of writing the variance when
    deriving the estimators in the cases of Gaussian and Gamma distributions.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，在推导高斯分布和伽马分布情况下的估计器时，我们使用了以下等价的方差表示方法。
- en: '![](../Images/4096e4278a4640268621457a5b50036b.png)'
  id: totrans-60
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/4096e4278a4640268621457a5b50036b.png)'
- en: Conclusion
  id: totrans-61
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this article, we explored various examples of the method of moments estimator
    and its applications in different problems in data science. Moreover, detailed
    Python code that was used to implement the estimators from scratch as well as
    to plot the different figures is also shown. I hope that you will find this article
    helpful.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我们探讨了矩估计法在不同数据科学问题中的应用实例。此外，还展示了用于从头实现估计器和绘制不同图形的详细Python代码。希望这篇文章对您有所帮助。
