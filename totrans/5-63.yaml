- en: Speed up Pandas code with Numpy
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/speed-up-pandas-code-with-numpy-fdee76210794/](https://towardsdatascience.com/speed-up-pandas-code-with-numpy-fdee76210794/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![Image by AI (Dalle-3)](../Images/0b58b0660e82625f817aeda184a5a99b.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by AI (Dalle-3)
  prefs: []
  type: TYPE_NORMAL
- en: In one of the first articles I wrote on Medium, I talked about using the apply()
    method on Pandas dataframes and said it should be avoided, if possible, on larger
    dataframes. I’ll put a link to that article at the end of this one if you want
    to check it out.
  prefs: []
  type: TYPE_NORMAL
- en: Although I talked then a bit about possible alternatives, i.e. using vectorisation,
    I didn’t give many examples of using vectorisation, so I intend to remedy that
    here. Specifically, I want to talk about how NumPy and a couple of its lesser-known
    methods **( `where`**and **`select`)** can be used to speed up Pandas operations
    that involve complex if/then/else conditions.
  prefs: []
  type: TYPE_NORMAL
- en: Vectorisation in the context of Pandas refers to the method of applying operations
    to entire blocks of data at once rather than iterating through them row by row
    or element by element. This approach is possible due to Pandas’ reliance on NumPy,
    which supports vectorised operations that are highly optimized and written in
    C, enabling faster processing. When you use vectorised operations in Pandas, such
    as applying arithmetic operations or functions to DataFrame or Series objects,
    the operations are dispatched to multiple data elements simultaneously.
  prefs: []
  type: TYPE_NORMAL
- en: This not only leads to more concise and readable code but can significantly
    boost performance by reducing the overhead of Python loops and taking advantage
    of modern CPUs’ capabilities to perform operations on multiple data points in
    parallel. Vectorization is a key feature that makes Pandas powerful for data manipulation
    and analysis in Python.
  prefs: []
  type: TYPE_NORMAL
- en: The problem is that some vectorisation operations are obvious and happen without
    you even realising that’s what’s being done under the hood. Many times, though,
    when the types of operations you want to perform become more complex, it is difficult
    to see how vectorisation can be applied in these situations.
  prefs: []
  type: TYPE_NORMAL
- en: In this article, I’ll discuss some common scenarios in which this is the case
    and show you how vectorisation can be applied.
  prefs: []
  type: TYPE_NORMAL
- en: Getting some data to work with
  prefs:
