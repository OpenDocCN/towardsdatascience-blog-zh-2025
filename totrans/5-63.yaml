  type: TYPE_NORMAL
- en: '`customer_name` (str)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`product_id` (int)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`product_name` (str)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`category` (str)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`quantity` (int)'
