- en: Here is a Python program that you can use to generate such a data set. It produces
    a CSV. The number of records to create and the location of the output file is
    configurable. It uses the NumPy and polars libraries, so you must install these
    before running it.
  prefs: []
  type: TYPE_NORMAL
- en: For this test, as I have a fairly high-spec PC, I’ll create and use a 1 million
    record CSV.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
