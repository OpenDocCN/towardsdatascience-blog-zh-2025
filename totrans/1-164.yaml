- en: 'From Vision to Language: How Spectral Intensity Guided My Intent Classifier'
  id: totrans-81
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 从视觉到语言：光谱强度如何指导我的意图分类器
- en: '![](../Images/571f8badf000730cfcdd46e6c9fd8139.png)'
  id: totrans-82
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/571f8badf000730cfcdd46e6c9fd8139.png)'
- en: 'Source: Author'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：作者
- en: 'Let a layer activation tensor be:'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 让一个层激活张量是：
- en: '![](../Images/5cebd24cec58b53255ba7f152f82513a.png)'
  id: totrans-85
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/5cebd24cec58b53255ba7f152f82513a.png)'
- en: 'where:'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 其中：
- en: N = number of samples (batch size)
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: N = 样本数（批量大小）
- en: L = sequence length (number of tokens/time steps)
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: L = 序列长度（标记/时间步数）
- en: H = hidden dimension (number of channels/features produced by the layer)
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: H = 隐藏维度（层产生的通道/特征数）
- en: Each Sample i has an activation matrix Xᵢ ∈ Rᴸ ˣ ᴴ (sequence positions x hidden
    features)
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 每个样本 i 有一个激活矩阵 Xᵢ ∈ Rᴸˣᴴ（序列位置 x 隐藏特征）
- en: Now again, you can compute the FFT of that Xᵢ and then measure the frequency
    length using the real and imaginary components and average out across the channels,
    and then for each layer.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 再次，你可以计算 Xᵢ 的 FFT，然后使用实部和虚部来测量频率长度，并在通道间平均，然后对每一层进行。
- en: '**Frequency length:**'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: '**频率长度：**'
- en: '![](../Images/f82e4b6676a1d1fa36727b559c0d3ae0.png)'
