  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f82e4b6676a1d1fa36727b559c0d3ae0.png)'
- en: '**Frequency across channels:**'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: '**通道间的频率：**'
- en: '![](../Images/26a35c5aab0d8e3ca15eae2bb6c9722f.png)'
  id: totrans-95
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/26a35c5aab0d8e3ca15eae2bb6c9722f.png)'
- en: '**Frequency across a layer:**'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: '**层内的频率：**'
- en: '![](../Images/936f3402ae94d3897a875ea7f0bd9aca.png)'
