- en: 'When Transformers Sing: Adapting SpectralKD for Text-Based Knowledge Distillation'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 当变换器歌唱时：将SpectralKD应用于基于文本的知识蒸馏
- en: 原文：[https://towardsdatascience.com/when-transformers-sing-adapting-spectralkd-for-text-based-knowledge-distillation/](https://towardsdatascience.com/when-transformers-sing-adapting-spectralkd-for-text-based-knowledge-distillation/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/when-transformers-sing-adapting-spectralkd-for-text-based-knowledge-distillation/](https://towardsdatascience.com/when-transformers-sing-adapting-spectralkd-for-text-based-knowledge-distillation/)
- en: <mdspan datatext="el1761183506645" class="mdspan-comment">Introduction</mdspan>
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1761183506645" class="mdspan-comment">引言</mdspan>
- en: While working on my Knowledge Distillation problem for intent classification,
    I faced a puzzling roadblock. My setup involved a teacher model, which is RoBERTa-large
    (finetuned on my intent classification), and a student model, which I was trying
    to train without losing too much accuracy compared to the teacher.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在处理我的意图分类的知识蒸馏问题时，我遇到了一个令人困惑的难题。我的设置涉及一个教师模型，即RoBERTa-large（在我的意图分类上微调），以及一个学生模型，我试图训练它，同时与教师模型相比，尽量不损失太多准确性。
- en: I experimented with multiple mapping techniques, connecting every 2nd layer
    to the student layer, averaging two teacher layers into one, and even assigning
    custom weights like giving (0.3 to l1 and 0.7 to l2). But no matter what combination
    I tried, the teacher’s accuracy never matched the student model.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我尝试了多种映射技术，将每个第二层连接到学生层，将两个教师层平均合并为一个，甚至分配自定义权重，例如给l1分配0.3，给l2分配0.7。但无论我尝试什么组合，教师的准确性从未与学生模型匹配。
- en: That’s when I started exploring **how to map the most informative layers *to
    my student model so that the student can maximize its performance***. I wanted
    a way to quantify which layer of the teacher model truly matters for distillation.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 那时我开始探索**如何将最有信息量的层映射到我的学生模型上，以便学生可以最大化其性能**。我想找到一种方法来量化教师模型中哪个层真正对蒸馏至关重要。
- en: 'In that search, I stumbled upon a fascinating paper—”[**SpectralKD: A Unified
    Framework for Interpreting and Distilling Vision Transformers via Spectral Analysis**](https://arxiv.org/pdf/2412.19055),”
    which tackled a similar problem but in the image domain. The authors used a spectral
    analysis approach (Spectral KD) to more intelligently align the teacher and student
    models.'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在那次搜索中，我偶然发现了一篇迷人的论文——“[**SpectralKD：通过光谱分析解释和蒸馏视觉变换器的统一框架**](https://arxiv.org/pdf/2412.19055)”，它解决了类似的问题，但是在图像领域。作者使用光谱分析方法（Spectral
    KD）来更智能地调整教师和学生模型。
- en: Curious, I decided to adapt the idea to text data – and ***BOOM!!!, it actually
    worked!*** For the first time, my student model started thinking almost like its
    teacher.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 好奇心驱使下，我决定将这个想法应用到文本数据上——***BOOM!!!，它竟然真的有效！*** 首次，我的学生模型开始几乎像它的老师一样思考。
- en: '![](../Images/3658ff1da43414f028b6bc14fe685fd7.png)'
  id: totrans-8
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/3658ff1da43414f028b6bc14fe685fd7.png)'
- en: 'Source: Author'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：作者
- en: Here’s the **layer intensity graph** of my fine-tuned **RoBERTa-large** model.
    Based on the spectral insights, I selected **layers 1–9 and 21–23** for my **student
    model** during knowledge distillation, the ones carrying the richest information.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我微调后的**RoBERTa-large**模型的**层强度图**。基于光谱洞察，我在知识蒸馏期间选择了**层1-9和21-23**用于我的**学生模型**，这些层承载着最丰富的信息。
- en: I can’t share my dataset or code for confidentiality reasons, but I’ll walk
    you through how the **paper’s image-based approach** inspired my **text-based
    adaptation**, and how you can think about doing the same.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 由于保密原因，我无法分享我的数据集或代码，但我将向您展示**论文中的基于图像的方法**如何启发我的**基于文本的改编**，以及您如何考虑进行同样的操作。
- en: '* * *'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Behind the Scenes: How FFT Reveals a Model’s Spectral Soul'
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 背后故事：FFT如何揭示模型的光谱灵魂
- en: 'So, let’s start with **spectral intensity**, and slowly dive into the real
    magician here: the **Fast Fourier Transform (FFT)**.'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，让我们从**光谱强度**开始，然后慢慢深入到真正的魔术师：**快速傅里叶变换（FFT）**。
- en: In the [spectralKD paper](https://arxiv.org/pdf/2412.19055), the authors introduce
    a framework that helps us to see Vision Transformer(ViTs), not just what they
    are predicting, but also **how the information flows in the layers**. Instead
    of relying on intuition or visualisation, they use spectral analysis, a way **to
    measure the frequency richness of the model’s internal representations.**
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 在[spectralKD论文](https://arxiv.org/pdf/2412.19055)中，作者介绍了一个框架，帮助我们看到视觉变换器（ViTs），不仅看到它们预测的内容，还能看到**信息在层中的流动**。他们不是依靠直觉或可视化，而是使用光谱分析，这是一种**测量模型内部表示频率丰富度的方法**。
- en: Imagine each Transformer layer as the musician in an orchestra, some layers
    play high notes(fine details), while others play low notes(broad features). The
    FFT helps us to listen to each player’s music separately and filter out which
    one is having the strongest melodies, i.e., the most information-rich signals.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 想象每个Transformer层就像管弦乐队的音乐家，一些层演奏高音（精细细节），而其他层演奏低音（广泛特征）。FFT帮助我们分别聆听每个演奏者的音乐，并过滤出哪个演奏者拥有最强的旋律，即信息最丰富的信号。
- en: '![](../Images/ee37544aaa3eb37fd40424da8ed5a6f2.png)'
  id: totrans-17
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ee37544aaa3eb37fd40424da8ed5a6f2.png)'
- en: 'Source: Author'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：作者
- en: 'Step 1: Feature maps, The raw material'
  id: totrans-19
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 第1步：特征图，原材料
- en: ''
  id: totrans-20
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![](../Images/85cec5b50db3dff72e7ffd62cca4350e.png)'
  id: totrans-21
  prefs:
  - PREF_BQ
  type: TYPE_IMG
  zh: '![图片](../Images/85cec5b50db3dff72e7ffd62cca4350e.png)'
- en: ''
  id: totrans-22
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: B is batch size
  id: totrans-23
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: B是批量大小
- en: C is number of channels and,
  id: totrans-24
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: C是通道数，
- en: H,W is the spatial height and width.
  id: totrans-25
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: H,W是空间高度和宽度。
- en: 'Step 2: Applying the fourier Transform'
  id: totrans-26
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 第2步：应用傅里叶变换
- en: ''
  id: totrans-27
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'The authors apply a 1-dimensional FFT along the channel dimension to translate
    these real-valued activations into the frequency domain:'
  id: totrans-28
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 作者沿着通道维度应用一维FFT，将这些实值激活转换为频域：
- en: '**F(X)=FFT(X)**'
  id: totrans-29
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**F(X)=FFT(X)**'
- en: ''
  id: totrans-30
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'This means:'
  id: totrans-31
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这意味着：
- en: For every spatial location (b, h, w), a **1D FFT** is computed across all channels.
  id: totrans-32
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 对于每个空间位置（b, h, w），对所有通道进行一维快速傅里叶变换（FFT）。
- en: The result is a **complex-valued tensor** (since FFT outputs real + imaginary
    parts).
  id: totrans-33
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 结果是一个**复值张量**（因为FFT输出实部和虚部）。
- en: F(X) therefore tells us how much of each frequency is present in that layer’s
    representation.
  id: totrans-34
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 因此，F(X)告诉我们该层表示中每种频率有多少。
- en: And if you’re wondering, *“Why FFT though?”* — hold that thought.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想知道，“*为什么是FFT呢？*” —— 保持这个想法。
- en: Because later in this blog, we’re going to uncover **exactly why FFT is the
    perfect tool** to measure a model’s inner intensity.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 因为在本文的后面，我们将揭示**为什么FFT是测量模型内部强度的完美工具**。
- en: 'Step 3: measuring frequency strength'
  id: totrans-37
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 第3步：测量频率强度
- en: ''
  id: totrans-38
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![](../Images/543487f1b4c24e66fc0981ed466fcc1e.png)'
  id: totrans-39
  prefs:
  - PREF_BQ
  type: TYPE_IMG
  zh: '![图片](../Images/543487f1b4c24e66fc0981ed466fcc1e.png)'
- en: ''
  id: totrans-40
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Re(F(X))** is the real part,'
  id: totrans-41
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**Re(F(X))**是实部，'
- en: '**Im(F(X))** is the imaginary part.'
  id: totrans-42
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**Im(F(X))**是虚部。'
- en: 'Step 4: Averaging across the map'
  id: totrans-43
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 第4步：在整个地图上平均
- en: ''
  id: totrans-44
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Now we want to summarize this intensity across all positions in the layer:'
  id: totrans-45
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 现在我们想要总结层中所有位置上的这种强度：
- en: ''
  id: totrans-46
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![](../Images/284a3861c5199652574dfb3407d8c772.png)'
  id: totrans-47
  prefs:
  - PREF_BQ
  type: TYPE_IMG
  zh: '![图片](../Images/284a3861c5199652574dfb3407d8c772.png)'
- en: ''
  id: totrans-48
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: This step tells us the average intensity of the single channel
  id: totrans-49
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这一步告诉我们单个通道的平均强度
- en: ''
  id: totrans-50
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![](../Images/4ff0c6c356372add60cca7ff900c6cfe.png)'
  id: totrans-51
  prefs:
  - PREF_BQ
  type: TYPE_IMG
  zh: '![图片](../Images/4ff0c6c356372add60cca7ff900c6cfe.png)'
- en: ''
  id: totrans-52
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: And then you can simply do average of each channels. Voilà! Now you have the
    spectral intensity of the single layer of the Vision Transformer.
  id: totrans-53
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 然后你可以简单地对每个通道进行平均。哇！现在你有了视觉Transformer单层的光谱强度。
- en: '* * *'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Peeking into the Frequency Realm: The Fourier Lens of SpectralKD'
  id: totrans-55
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 探索频率领域：SpectralKD的光谱透镜
- en: 'Let’s look into the Fast Fourier Transform:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们来看看快速傅里叶变换：
- en: '![](../Images/6e3fda77eafa3f749ef899dcaed613e0.png)'
  id: totrans-57
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6e3fda77eafa3f749ef899dcaed613e0.png)'
- en: Xₖ is the input sequence (your signal, feature, or activation pattern).
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: Xₖ是输入序列（你的信号、特征或激活模式）。
- en: xₙ is the frequency component at the frequency index.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: xₙ是频率索引处的频率分量。
- en: N is the number of points in the sequence (i.e., number of channels or features).
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: N是序列中的点数（即通道数或特征数）。
- en: Each term e⁻ʲ²πᵏⁿ/ᴺ acts as a **rotating phasor**, a tiny complex wave spinning
    through the signal space, and together, they form one of the most beautiful ideas
    in signal processing.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 每个项e⁻ʲ²πᵏⁿ/ᴺ充当一个**旋转相量**，一个在信号空间中旋转的微小复波，并且它们共同构成了信号处理中最美丽的想法之一。
- en: '![](../Images/36698c1a2b5c039f4d80a5cdd3024cda.png)'
  id: totrans-62
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/36698c1a2b5c039f4d80a5cdd3024cda.png)'
- en: 'Source: Author (Here, a rotating phasor e⁻ʲ²πᵏⁿ/ᴺ is getting multiplied by
    g(t) in a complex plane)'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：作者（在这里，旋转相量e⁻ʲ²πᵏⁿ/ᴺ在复平面上乘以g(t)）
- en: '![](../Images/bf5b85f9d431d3597481c11d98dbe4ed.png)'
  id: totrans-64
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/bf5b85f9d431d3597481c11d98dbe4ed.png)'
- en: 'source: Author (Average out all the points in the complex plane, then it will
    give you the center of mass of the phasor entity, and it gets peaked only at a
    specific frequency or K (in the above case, it is 3))'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：作者（在复平面上平均所有点，然后它将给出相量实体的质心，并且只在特定的频率或K（在上述情况下，是3）处达到峰值）
- en: .**OMG! What just happened here?** Let me break it down.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: .**OMG！这里到底发生了什么？**让我来分解一下。
- en: 'When you multiply your hidden activations xₙ (say, across channels or feature
    dimensions) by this phasor, you’re essentially asking:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 当你将隐藏激活xₙ（例如，在通道或特征维度上）乘以这个相量时，你实际上是在询问：
- en: “Hey, layer, how much of the *k-th type of variation* do you contain in your
    representations?”
  id: totrans-68
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “嘿，层，你在你的表示中包含了多少 *第 k 种类型的变异*？”
- en: Each frequency k corresponds to a distinct **pattern scale** across the feature
    dimensions.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 每个频率 k 对应特征维度上的一个独特的 **模式尺度**。
- en: Lower k values capture **broad, smooth semantic structures** (like topic-level
    context), while higher k values capture **rapid, fine-grained variations** (like
    token-level nuances or syntactic signals).
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 较低的 k 值捕捉 **广泛的、平滑的语义结构**（如主题级上下文），而较高的 k 值捕捉 **快速、细粒度的变化**（如标记级细微差别或句法信号）。
- en: 'Now here’s the fun part: if some layer resonates with a particular frequency
    pattern, the multiplication of the Fourier Transform aligns perfectly, and the
    sum in the Fourier formula produces a **strong response** for that k.'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 现在是时候来点有趣的：如果某些层与特定的频率模式产生共鸣，傅里叶变换的乘积将完美对齐，傅里叶公式中的和将产生一个 **强烈的响应** 对应于那个 k。
- en: If not, the rotations cancel out, meaning that frequency doesn’t play a big
    role in that layer’s representation.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 如果不是，旋转会相互抵消，这意味着频率在那个层的表示中不起重要作用。
- en: So, the Fourier Transform isn’t adding anything new; it is just finding out
    how our layer encodes information across different scales of abstraction.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，傅里叶变换并没有添加任何新内容；它只是找出我们的层在不同抽象尺度上如何编码信息。
- en: 'It’s like zooming out and realizing:'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 这就像放大并意识到：
- en: Some layers hum quietly with smooth, conceptual meanings (low frequencies),
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 有些层以平稳、概念性的意义（低频）安静地嗡嗡作响，
- en: Others buzz with sharp, detailed interactions between tokens (high frequencies).
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 其他则通过标记之间的尖锐、详细的交互（高频）而嗡嗡作响。
- en: The FFT basically **turns a layer’s hidden states into a frequency fingerprint**
    — a map of what kinds of information that layer is focusing on.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: FFT基本上 **将层的隐藏状态转换为一个频率指纹**——一个映射，显示了该层关注的信息类型。
- en: And that’s exactly what SpectralKD uses to figure out which layers are *actually
    doing the heavy lifting* during knowledge distillation.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 这正是 SpectralKD 用来确定在知识蒸馏过程中哪些层实际上是在做“重活”的方法。
- en: If you still need the visualization and more intuition of the Fourier transform,
    you can just go through the 3Blue1Brown Video, [“But what is the Fourier Transform?
    A visual introduction.”](https://youtu.be/spUNpyF58BY?si=C6v49BiX0-F-cfo5)
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
