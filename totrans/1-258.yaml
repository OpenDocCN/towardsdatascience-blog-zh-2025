- en: How to Connect an MCP Server for an AI-Powered, Supply-Chain Network Optimization
    Agent
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/mcp-server-for-an-ai-powered-supply-chain-network-optimization-agent/](https://towardsdatascience.com/mcp-server-for-an-ai-powered-supply-chain-network-optimization-agent/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1758590453313" class="mdspan-comment">What if a single prompt</mdspan>
    redesigned your entire supply chain for more cost-efficient and sustainable operations?
  prefs: []
  type: TYPE_NORMAL
- en: Supply Chain Network **Optimisation** determines **where goo****ds are** **produced
    to serve** markets at the **lowest cost**in an environmentally friendly way.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/65bf649a23c4524f2d3c9ab76ff44d32.png)'
  prefs: []
  type: TYPE_IMG
- en: Examples of network design with different objectives – (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: We must consider real-world constraints (capacity, demand) to find the optimal
    set of factories that will minimise the objective function.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/1a2a0167abcde41d1a4220842a93e811.png)'
  prefs: []
  type: TYPE_IMG
- en: Example of environmental constraints of maximum impact per unit produced – (Image
    by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: As a Supply Chain Solution Manager, I have led multiple network design studies
    that typically took 10–12 weeks.
  prefs: []
  type: TYPE_NORMAL
- en: The final deliverable was usually a deck of slides presenting multiple scenarios,
    allowing supply chain directors to weigh the trade-offs.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/63e5ff0da54f51599bbcc4fe1fccc6fb.png)'
  prefs: []
  type: TYPE_IMG
- en: Example of Network Designs with different constraints – (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: 'But decision-makers were often frustrated during the presentations of the study
    results:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Direction: “What if we increase the factory capacity by 25%?”'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: They wanted to challenge assumptions and re-run scenarios live, while all we
    had were the slides we had taken hours to prepare.
  prefs: []
  type: TYPE_NORMAL
- en: What if we could improve this user experience using conversational agents?
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: In this article, I show how I connected an **MCP server** to a **FastAPI microservice**
    with a **Supply Chain Network Optimisation** algorithm.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/798b22c8a37af3c772dca8ec1dd5feab.png)'
  prefs: []
  type: TYPE_IMG
- en: Example of a request to Claude Desktop connected to an MCP Server calling our
    FastAPI microservice – Image by Samir Saci
  prefs: []
  type: TYPE_NORMAL
- en: The result is a conversational agent that can run one or multiple scenarios
    and provide a detailed analysis with smart visuals.
  prefs: []
  type: TYPE_NORMAL
- en: We will even ask this agent to **advise us on the best decision to take**, considering
    our goals and the constraints.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d957bee2737da864bbfc2d91216bf05f.png)'
  prefs: []
  type: TYPE_IMG
- en: Example of strategic recommendations provided by the agent – (Image by Samir
    Saci)
  prefs: []
  type: TYPE_NORMAL
- en: 'For this experiment, I’ll use:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Claude Desktop** as the conversational interface'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**MCP Server** to expose typed tools to the agent'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**FastAPI microservice** with the network optimisation endpoint'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In the first section, I will introduce the problem of Supply Chain Network design
    with a concrete example.
  prefs: []
  type: TYPE_NORMAL
- en: Then, I will show multiple deep analyses performed by the conversational agent
    to support strategic decision-making.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/7aa0929896c2223b02a4b67794cb90e7.png)'
  prefs: []
  type: TYPE_IMG
- en: Example of advanced visuals generated by the agent to answer an open question
    – (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: For the first time, I have been impressed by AI when the agent selected the
    correct visuals to answer an open question without any guidance!
  prefs: []
  type: TYPE_NORMAL
- en: Supply Chain Network Optimisation with Python
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Problem Statement: Supply Chain Network Design'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We are supporting the Supply Chain Director of an international manufacturing
    company that would like to redefine their network for a long-term transformation
    plan.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/79bd95af0d30e6e73cfbca6a661bc39b.png)'
  prefs: []
  type: TYPE_IMG
- en: Supply Chain Network Design Problem – (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: 'This multinational company has operations in **5 different markets**: Brazil,
    the USA, Germany, India and Japan.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ec8e2c87ff5f350ca9ff3981c8d19f99.png)'
  prefs: []
  type: TYPE_IMG
- en: Example of demand per market – (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: To meet this demand, we can open low or high-capacity factories in each of the
    markets.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/312e77b188ea6bddd6af34a5a4b5919b.png)'
  prefs: []
  type: TYPE_IMG
- en: Capacities per factory type and location – (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: If you open a facility, you must consider the fixed costs (associated with electricity,
    Real Estate, and CAPEX) and the variable costs per unit produced.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/8cc2c505072e9ca9a5f24948020ba783.png)'
  prefs: []
  type: TYPE_IMG
- en: Example of fixed and variable costs per production country – (Image by Samir
    Saci)
  prefs: []
  type: TYPE_NORMAL
- en: In this example, high-capacity plants in India have lower fixed costs than those
    in the USA with lower capacity.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/2525b1d00bdefa7bc53e12c4a99dbe93.png)'
  prefs: []
  type: TYPE_IMG
- en: Example of freight costs per container – (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: Additionally, there are the costs associated with shipping a container from
    Country XXX to Country YYY.
  prefs: []
  type: TYPE_NORMAL
- en: Everything summed up will define the total cost of producing and delivering
    products from a manufacturing site to the different markets.
  prefs: []
  type: TYPE_NORMAL
- en: What about sustainability?
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: In addition to these parameters, we consider the amount of resources consumed
    per unit produced.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d148c0a2ce00564e6d6146a702be6cc6.png)'
  prefs: []
  type: TYPE_IMG
- en: Example of energy and water usage per unit produced in each country – (Image
    by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: For instance, we consume **780 MJ/Unit** of energy and **3,500 litres** of water
    to produce a single unit in Indian factories.
  prefs: []
  type: TYPE_NORMAL
- en: For the environmental impacts, we also consider the pollution resulting from
    CO2 emissions and waste generation.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ad08adb5f8b81be1f31f89fc1f20e8a7.png)'
  prefs: []
  type: TYPE_IMG
- en: Environmental impact per unit produced for each country – (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: In the example above, Japan is the cleanest production country.
  prefs: []
  type: TYPE_NORMAL
- en: Where should we produce to minimize water usage?
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The idea is to select a metric to minimise, which could be costs, water usage,
    CO2 emissions or energy usage.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/11bc8597a4634baa99edecb5acd3f745.png)'
  prefs: []
  type: TYPE_IMG
- en: Example of the output in the LogiGreen App – (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: The model will indicate where to locate factories and outline the flows from
    these factories to the various markets.
  prefs: []
  type: TYPE_NORMAL
- en: This solution has been packaged as a **web application** (FastAPI backend, Streamlit
    front-end) used as a demo to showcase the capabilities of our startup, [LogiGreen](https://www.logi-green.com/logigreen-applications-for-supply-chain-optimization).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/5e956e2431c8201891c0bc4375ac6013.png)'
  prefs: []
  type: TYPE_IMG
- en: '[User interface of the LogiGreen App (Sustainability Module)](https://www.logi-green.com/blog/case-studies-2/sustainable-supply-chain-optimization-1)
    – Image by Samir Saci'
  prefs: []
  type: TYPE_NORMAL
- en: The idea of today’s experiment is to connect the backend with Claude Desktop
    using a local MCP server built with Python.
  prefs: []
  type: TYPE_NORMAL
- en: 'FastAPI Microservice: 0–1 Mixed-Integer Optimiser for Supply Chain Network
    Design'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This tool is an optimisation model packaged in a FastAPI microservice.
  prefs: []
  type: TYPE_NORMAL
- en: What are the input data for this problem?
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: As inputs, we should provide the objective function **(mandatory)** and constraints
    of maximum environmental impact per unit produced **(optional)**.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: The default values for the thresholds are stored in a config file.
  prefs: []
  type: TYPE_NORMAL
- en: We send these parameters to a specific endpoint `launch_network` that will run
    the optimisation algorithm.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: The API returns the JSON outputs in two parts.
  prefs: []
  type: TYPE_NORMAL
- en: In the section `input_params`, you can find
  prefs: []
  type: TYPE_NORMAL
- en: The objective function selected
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: All the maximum limits per environmental impact
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: 'I also added information to bring context to the agent:'
  prefs: []
  type: TYPE_NORMAL
- en: '`plant_name` is a list of all the potential manufacturing locations we can
    open by location and type'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`prod_name` is the list of all the potential production flows we can have (production,
    market)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`total_demand` of all the markets'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We don’t return the demand per market as it is loaded on the backend side.
  prefs: []
  type: TYPE_NORMAL
- en: And you have the results of the analysis.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: 'They include:'
  prefs: []
  type: TYPE_NORMAL
- en: '`plant_opening`: a list of boolean values set to 1 if a site is open'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Three sites open for this scenario: 1 low-capacity plant *in India and three
    high-capacity plants in India, Japan, and Brazil.*'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '`flow_volumes`: mapping of the flow between countries'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Brazil will produce 12,500 units for the USA*'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Overall volumes with `local_prod`, `export_prod` and the `total_prod`
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A cost breakdown with `total_fixedcosts`, `total_varcosts` and `total_costs`
    along with an analysis of the COGS
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Environmental impacts per unit delivered with resource usage (Energy, Water)
    and pollution (CO2, waste).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This network design can be visually represented with this Sankey chart.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/0d7c9ff8e2e20e9d6e12861e0884fc91.png)'
  prefs: []
  type: TYPE_IMG
- en: Sankey Chart generated by the [LogiGreen App](https://www.logi-green.com/logigreen-applications-for-supply-chain-optimization)
    for the scenario ‘Production Cost’ – (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: Let us see what our conversational agent can do with that!
  prefs: []
  type: TYPE_NORMAL
- en: 'For a quick demo, you can have a look at this YouTube video:'
  prefs: []
  type: TYPE_NORMAL
- en: Building a local MCP Server to connect Claude Desktop to a FastAPI Microservice
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This follows a series of articles in which I experimented with connecting FastAPI
    microservices to AI agents for [a Production Planning tool](https://towardsdatascience.com/ai-agents-for-supply-chain-optimisation-production-planning/)
    and a [Budget Optimiser](https://towardsdatascience.com/how-to-build-an-ai-budget-planning-optimizer-for-your-2026-capex-review-langgraph-fastapi-and-n8n/).
  prefs: []
  type: TYPE_NORMAL
- en: For this time, I wanted to replicate the experiment with Anthropic’s Claude
    Desktop.
  prefs: []
  type: TYPE_NORMAL
- en: Set up a local MCP Server in WSL
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: I will run everything inside **WSL (Ubuntu)** and let **the Claude Desktop (Windows)** communicate
    with my MCP server via a small JSON configuration.
  prefs: []
  type: TYPE_NORMAL
- en: 'The first step was to install `uv` the package manager:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: 'We can now use it to initiate a project with a local environment:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: 'This will be used by our `network.py` file that will contain our server setup:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: For the input parameters, I have defined a model in a separate file `network_models.py`
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: This will ensure that the agent sends the correct queries to the FastAPI microservice.
  prefs: []
  type: TYPE_NORMAL
- en: Before starting to build the functionalities of our MCP Server, we need to ensure
    that the Claude Desktop (Windows) can find `network.py`.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/4bb067ec03d868eb2f2dbe3b8f5016bf.png)'
  prefs: []
  type: TYPE_IMG
- en: Developper Settings of Claude Desktop for the config file – (Image by Samir
    Saci)
  prefs: []
  type: TYPE_NORMAL
- en: 'As I am using WSL, I could only do it manually using the Claude Desktop config
    JSON file:'
  prefs: []
  type: TYPE_NORMAL
- en: Open **Claude Desktop → Settings → Developer → Edit Config** (or open the config
    file directly).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Add an entry that starts your MCP server **in WSL**
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: With this config file, we instruct Claude Desktop to run WSL in the folder `mcp_tuto`
    and use `uv` to run mpc[cli] launching `budget.py`.
  prefs: []
  type: TYPE_NORMAL
- en: If you are in this special case of building your MCP server in a Windows machine
    using WSL, you can follow this approach.
  prefs: []
  type: TYPE_NORMAL
- en: You can initiate your server with this “special” functionality that will be
    used by Claude as a tool.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: We inform Claude (in the docstring) that this addition is intended for Supply
    Chain Professionals only.
  prefs: []
  type: TYPE_NORMAL
- en: If you restart Claude Desktop, you should be able to see this functionality
    under **Network.**
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/cef0599bafe42acb28fe32653f97fc75.png)'
  prefs: []
  type: TYPE_IMG
- en: Tab with tools available – (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: You can find our “special addition”, called `Add`, which is now waiting for
    us to be used!
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/950d29afa244ef99f641eac0906a4953.png)'
  prefs: []
  type: TYPE_IMG
- en: Add functions among others that we are going to build together – (Image by Samir
    Saci)
  prefs: []
  type: TYPE_NORMAL
- en: Let’s test now with a simple question.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a8567e0d2c057edbb41600ee75d1a933.png)'
  prefs: []
  type: TYPE_IMG
- en: Example of request expecting an output using the special function – (Image by
    Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: We can see that the conversational agent is calling **the correct function**
    based on the context provided in the question.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a8e11c500352f4a6e28385d1889ea2cf.png)'
  prefs: []
  type: TYPE_IMG
- en: Comment of the output – (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: It even provides a nice comment interrogating the validity of the results.
  prefs: []
  type: TYPE_NORMAL
- en: What if we complexify a bit the exercise?
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I will create a hypothetical scenario to determine if the conversational agent
    can associate a context with the use of a tool.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/1566fbfbd2ec5d45a75cc35309f4cd7d.png)'
  prefs: []
  type: TYPE_IMG
- en: Context with two characters / Samir is a Supply Chain Professional – (Image
    by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: Let us see what happens when we ask a question requiring the use of addition.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f41e149749479873d6ec1cea27132578.png)'
  prefs: []
  type: TYPE_IMG
- en: Example of a tool calling based on a “complex” context – (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: Even if it was reluctantly, the agent had the reflex of using the special `add`
    tool for Samir, as he is a supply chain professional.
  prefs: []
  type: TYPE_NORMAL
- en: Now that we are familiar with our new MCP server, we can start adding tools
    for Supply Chain Network Optimisation.
  prefs: []
  type: TYPE_NORMAL
- en: Build a Supply Chain Optimisation MCP Server connected to a FastAPI Microservice
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We can get rid of the special `add` tool and start introducing key parameters
    to connect to the FastAPI microservice.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: The variable `last_run` will be used to store the results of the last run.
  prefs: []
  type: TYPE_NORMAL
- en: We need to create a tool that can connect to the FastAPI microservice.
  prefs: []
  type: TYPE_NORMAL
- en: For that, we introduced the function below.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: This function takes parameters following the Pydantic model `LaunchParamsNetwork`,
    sending a clean JSON payload with None fields dropped.
  prefs: []
  type: TYPE_NORMAL
- en: It calls the FastAPI endpoint asynchronously and collects the results that are
    cached in `last_run`.
  prefs: []
  type: TYPE_NORMAL
- en: The key part of this function is the docstring, which I removed from the code
    snippet for concision, as this is the only way to describe what the function does
    to the agent.
  prefs: []
  type: TYPE_NORMAL
- en: '**Section 1: Context**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: The first section is only to introduce the context in which the tool is used.
  prefs: []
  type: TYPE_NORMAL
- en: '**Section 2: Describe Input Data**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: This brief description is crucial if we want to be sure that the agent adheres
    to the Pydantic schema of input parameters imposed by our FastAPI microservice.
  prefs: []
  type: TYPE_NORMAL
- en: '**Section 3: Description of output results**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: This part describes to the agent the outputs it will receive.
  prefs: []
  type: TYPE_NORMAL
- en: I did not want to only count on “self-explicit” naming of variables in the JSON.
  prefs: []
  type: TYPE_NORMAL
- en: I wanted ot make sure that it can understand the data it has on hand to provide
    summaries following the guidelines listed below.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: I share a list of potential scenarios and explanations of the type of analysis
    I expect using an actual example.
  prefs: []
  type: TYPE_NORMAL
- en: '**This is far from being concise**, but my objective here is to ensure that
    the agent is equipped to use the tool at its highest potential.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Experiment with the tool: from simple to complex instructions'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: To test the workflow, I ask the agent to run the simulation with default parameters.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/3cf284306607ae8a23af81a6663525b4.png)'
  prefs: []
  type: TYPE_IMG
- en: Sample of analysis provided by the conversation agent – (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: As expected, the agent calls the FastAPI microservice, collects the results,
    and concisely summarises them.
  prefs: []
  type: TYPE_NORMAL
- en: This is cool, but I already had that with my [Production Planning Optimisation
    Agent](https://towardsdatascience.com/ai-agents-for-supply-chain-optimisation-production-planning/)
    built with LangGraph and FastAPI.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/89201e2f7730ece054c6fbe56847bd39.png)'
  prefs: []
  type: TYPE_IMG
- en: Example of output analysis of the [Production Planning Optimisation Agent](https://towardsdatascience.com/ai-agents-for-supply-chain-optimisation-production-planning/)
    – (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: I wanted to explore MCP Servers with Claude Desktop for a more advanced usage.
  prefs: []
  type: TYPE_NORMAL
- en: 'Supply Chain Director: “I want to have a comparative study of multiple scenario.”'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: If we come back to the original plan, the idea was to equip our decision-makers
    (customers who pay us) with a conversational agent that would assist them in their
    decision-making process.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let us try a more advanced question:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/7c7f611ef77c84567e7a1c44d62761c5.png)'
  prefs: []
  type: TYPE_IMG
- en: Here we provide more open questions that reflect the needs of our customers
    – (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: We explicitly request a comparative study while allowing `Claude Sonnet 4` to
    be creative in terms of visual rendering.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/bfadafca385c0c42309a4ed3359c28e1.png)'
  prefs: []
  type: TYPE_IMG
- en: Claude Agent sharing its plan – (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: To be honest, I was impressed by the dashboard that was generated by Claude,
    which you can [access via this link](https://claude.ai/public/artifacts/03f17e2f-04ed-4d8e-8fa5-f2fb76c3cb59).
  prefs: []
  type: TYPE_NORMAL
- en: At the top, you can find an executive summary listing what can be considered
    the most important indicators of this problem.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/490f04d6634e70ac06cfc77d302343db.png)'
  prefs: []
  type: TYPE_IMG
- en: Executive Summary generated by Claude – (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: The model understood, without being explicitly asked in the prompt, that these
    four indicators were key to the decision-making process resulting from this study.
  prefs: []
  type: TYPE_NORMAL
- en: At this stage, in my opinion, we already get the added value of incorporating
    an LLM into the loop.
  prefs: []
  type: TYPE_NORMAL
- en: The following outputs are more conventional and could have been generated with
    deterministic code.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/2f44a6c244053db2c783076488976359.png)'
  prefs: []
  type: TYPE_IMG
- en: Financial and Environmental Metrics Summary Table – (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: However, I admit that the creativity of Claude outperformed my own web application
    with this smart visual showing the plant openings per scenario.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/3a53d45234907e526cf6eb56938dd36e.png)'
  prefs: []
  type: TYPE_IMG
- en: Plant open per scenario – (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: While I was starting to worry about getting replaced by AI, I had a look at
    the strategic analysis generated by the agent.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/6148bfa2baddac7e58ea14a85ef56973.png)'
  prefs: []
  type: TYPE_IMG
- en: Example of trade-off analysis – (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: The approach of comparing each scenario vs a baseline of cost optimisation has
    never been explicitly requested.
  prefs: []
  type: TYPE_NORMAL
- en: The agent took the initiative to bring up this angle when presenting results.
  prefs: []
  type: TYPE_NORMAL
- en: This appeared to demonstrate the ability to select the appropriate indicators
    to convey a message effectively using data.
  prefs: []
  type: TYPE_NORMAL
- en: Can we ask open questions?
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Let me explore that in the next section.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 🏫 Discover 70+ case studies using data analytics for supply chain **sustainability**🌳and **business
    optimization** 🏪 in this: [Cheat Sheet](https://bit.ly/supply-chain-cheat)
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: A Conversation Agent capable of decision-making?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To further explore the capabilities of our new tool and test its potential,
    I will pose open-ended questions.
  prefs: []
  type: TYPE_NORMAL
- en: 'Question 1: Trade-off between cost and sustainability'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '![](../Images/5606d0f0bc2783de2be419c28481fac2.png)'
  prefs: []
  type: TYPE_IMG
- en: Question 1 – (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: This is the type of question I got when I was in charge of network studies.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/bbdc980413cc661f30f0fdab48e57361.png)'
  prefs: []
  type: TYPE_IMG
- en: Executive Summary – Image by Samir Saci
  prefs: []
  type: TYPE_NORMAL
- en: This appeared to be a recommendation to adopt the Water-optimised strategy to
    find the perfect balance.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/7aa0929896c2223b02a4b67794cb90e7.png)'
  prefs: []
  type: TYPE_IMG
- en: Visuals – (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: It used compelling visuals to support its idea.
  prefs: []
  type: TYPE_NORMAL
- en: I really like the cost vs. environmental impact scatter plot!
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/45ad93dd3a3f028a817b0ed175317eae.png)'
  prefs: []
  type: TYPE_IMG
- en: Implementation Plan – (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: Unlike some strategy consulting firms, it did not forget the implementation
    part.
  prefs: []
  type: TYPE_NORMAL
- en: For more details, you can access the complete dashboard [at this link.](https://claude.ai/public/artifacts/aead1a7a-7aed-48e1-b693-83fcf6b4a39d)
  prefs: []
  type: TYPE_NORMAL
- en: Let’s try another tricky question.
  prefs: []
  type: TYPE_NORMAL
- en: 'Question 2: Best CO2 Emissions Performance'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '![](../Images/35cfc769bcbed30968f43fe7ffc5854c.png)'
  prefs: []
  type: TYPE_IMG
- en: What is the best performance for indicator XXX under budget limits – (Image
    by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: This is a challenging question that required seven runs to answer.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/1e65b2741c7e2827c93d9c53b27750bf.png)'
  prefs: []
  type: TYPE_IMG
- en: 7 runs to answer the question – (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: This was enough to provide the question with the correct solution.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/2229d67f5af62284348c13724264b6a5.png)'
  prefs: []
  type: TYPE_IMG
- en: Optimal Solution – (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: What I appreciate the most is the quality of the visuals used to support its
    reasoning.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/09b006d9102cb72c21f32322eefd1d53.png)'
  prefs: []
  type: TYPE_IMG
- en: Example of visual used – (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: In the visual above, we can see the different scenarios simulated by the tool.
  prefs: []
  type: TYPE_NORMAL
- en: Although we could question the wrong orientation of the (x-axis), the visual
    remains self-explicit.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/96ebe8f23e2730d2bc4dcfa34cd12854.png)'
  prefs: []
  type: TYPE_IMG
- en: Strategic Recommendation – (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: Where I feel beaten by the LLM is when we look at the quanlity and concision
    of the strategic recommendations.
  prefs: []
  type: TYPE_NORMAL
- en: Considering that these recommendations serve as the primary point of contact
    with decision-makers, who often lack the time to delve into details, this remains
    a strong argument in favour of using this agent.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This experiment is a success!
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: There is no doubt about the added value of MCP Servers compared to the simple
    AI workflows introduced in the previous articles.
  prefs: []
  type: TYPE_NORMAL
- en: When you have an **optimisation module with multiple scenarios** (depending
    on objective functions and constraints), you can leverage MCP servers to enable
    agents to make decisions based on data.
  prefs: []
  type: TYPE_NORMAL
- en: I would apply this solution to algorithms like
  prefs: []
  type: TYPE_NORMAL
- en: '[Production Planning Optimisation Module](https://towardsdatascience.com/ai-agents-for-supply-chain-optimisation-production-planning/)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Case study: *Simulate scenarios with different holding and setup costs to understand
    their impacts.*'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '[Distribution Planning Optimisation Module](https://youtu.be/DPWPTWXylas)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Case study: *Simulate multiple distribution setups with additional warehouses
    or different capacities for order processing.*'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '[Procurement Optimisation Module](https://towardsdatascience.com/procurement-process-optimization-with-python-a4c7a2e3ba76/)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Case study: *Test the impact of Minimum Order Quantity (MOQ) or ordering costs
    on the optimal procurement strategy.*'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: These are opportunities to equip your entire supply chain with conversation
    agents (connected to optimisation tools) that can support decision-making.
  prefs: []
  type: TYPE_NORMAL
- en: Can we go beyond operational topics?
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The reasoning capacity that Claude showcased in this experiment also inspired
    me to explore business topics.
  prefs: []
  type: TYPE_NORMAL
- en: A solution presented in one of my [YouTube tutorials](https://www.youtube.com/watch?v=XAS5hLDHfQM)
    could be a good candidate for our next MCP integration.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/9c4f29b11080ce42c618fd0f281651df.png)'
  prefs: []
  type: TYPE_IMG
- en: Value chain of the example used in the video – (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: The goal was to support a friend who runs a business in the food and beverage
    industry.
  prefs: []
  type: TYPE_NORMAL
- en: They sell renewable cups produced in China to coffee shops and bars in Paris.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/2ebe473a387fc8c0f7b2bd707f76de2d.png)'
  prefs: []
  type: TYPE_IMG
- en: '[Value Chain of this business](https://youtu.be/XAS5hLDHfQM) – (Image by Samir
    Saci)'
  prefs: []
  type: TYPE_NORMAL
- en: I wanted to use Python to simulate its entire value chain to identify optimisation
    levers to maximise its profitability.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/db6a3c39ef2d238e8ae12e3cdbb1ca54.png)'
  prefs: []
  type: TYPE_IMG
- en: '[Business Planning with Python — Inventory and Cash Flow Management](https://youtu.be/XAS5hLDHfQM)
    (Image by Samir Saci)'
  prefs: []
  type: TYPE_NORMAL
- en: This algorithm, also packaged in a FastAPI microservice, can become your next
    data-driven business strategy consultant.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/1570220f4cf98f2d77b9b9a4e8e6c13d.png)'
  prefs: []
  type: TYPE_IMG
- en: '[Simulation of scenarios to find the optimal setup to maximise profitability](https://youtu.be/XAS5hLDHfQM)
    – (Image by Samir Saci)'
  prefs: []
  type: TYPE_NORMAL
- en: Part of the job involves simulating multiple scenarios to determine the optimal
    trade-off between several metrics.
  prefs: []
  type: TYPE_NORMAL
- en: I clearly see a conversational agent powered by an MCP server doing the job
    perfectly.
  prefs: []
