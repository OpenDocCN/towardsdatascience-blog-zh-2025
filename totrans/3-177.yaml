- en: 7 Powerful DBeaver Tips and Tricks to Improve Your SQL Workflow
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/7-powerful-dbeaver-tips-and-tricks-to-improve-your-sql-workflow/](https://towardsdatascience.com/7-powerful-dbeaver-tips-and-tricks-to-improve-your-sql-workflow/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[DBeaver](https://github.com/dbeaver/dbeaver) is the most powerful open-source
    SQL IDE, but there are several features people don’t know about. In this post,
    I will share with you several features to speed up your workflow, with zero fluff.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: I’ve learned these as I’m currently digging deeper into the tools I use daily,
    starting with DBeaver. In a future post, I’ll compare the workflow between DBeaver
    versus building your SQL development environment on VSCode (or Cursor). If you’re
    interested in that, be sure to follow my publications!
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: Today, though, the focus is on learning the cool features of DBeaver. Let’s
    get started.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: The Command Palette
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This is one of the most powerful yet hidden features in DBeaver. Maybe people
    overlook it because it’s not called a “Command Palette”. You can open it with
    **CMD + 3 (Mac) or CTRL + 3 (Windows)**.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f399a1b003c0268b71aa603c849acf7d.png)'
  id: totrans-7
  prefs: []
  type: TYPE_IMG
- en: 'From here, you can access basically any action in the IDE. I mostly use it
    for:'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: Switching between SQL scripts.
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Navigating to specific settings.
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Quickly accessing actions like Export Results, Refresh Schema, Open Templates,
    Rename File, etc.
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: (Officially, this feature in DBeaver is called “Find Actions.”)
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
- en: Custom SQL formatter
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Did you know you can easily set up a different formatter in DBeaver? I’m personally
    not a fan of the default formatting, and since I mainly use PostgreSQL, I prefer
    pg_formatter.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: Let me show you how it works to set up pg_formatter, but keep in mind that the
    process will be similar for any SQL formatter that you can call via the terminal.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  id: totrans-16
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Next, go to **Preferences → Editors → SQL Editor → Formatting, select an “External
    Formatter,”** and then paste the path to your desired formatter.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
- en: 💡 Or you can simply open the command palette and search for “Formatting”.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/15617aac1a9e0b853381cae4ba898af7.png)'
  id: totrans-19
  prefs: []
  type: TYPE_IMG
- en: Expand columns on SELECT
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Often, you might need to select most columns from a table, excluding just a
    few. DBeaver makes this easier by expanding your SELECT * into explicit column
    names.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: You can do this with the **CTRL + Space** hotkey, both on Mac or on Windows.
    This might not work if you have it bound to another system shortcut, in which
    case you can look up for “Content Assist” in the command palette.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/32acd54df82e837c977e8c601a1615e5.png)'
  id: totrans-23
  prefs: []
  type: TYPE_IMG
- en: Quickly find column statistics
  id: totrans-24
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: DBeaver has a bunch of features to speed up your analysis. One of them that
    I use frequently is the “Calc tab”, located to the right of your query results.
    It lets you quickly get the information about columns in your query results.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
- en: 'Here is what you can do with it:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
- en: Find the amount of unique and non-null values of categorical columns.
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Get min, max, mean, median, etc., of numerical columns.
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/06fc9494831e6f0a01ae2b6711c02c08.png)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
- en: Very handy for quickly understanding your dataset!
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
- en: Ad-hoc groups
  id: totrans-31
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Similarly to the Calc tab, the “Groupings tab” lets you quickly create group-by
    queries without writing SQL manually.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
- en: 'What you can do with it:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: Quickly count occurrences of values.
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Add multiple aggregations.
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/284eeeaa95a3c8e9af86d279c378e151.png)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
- en: Although this one is pretty nice for simple aggregations, I find it a bit underwhelming
    as there is no way to count unique values, as I do in the GIF above, without having
    to manually write the metric function.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
- en: SQL templates
  id: totrans-38
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: SQL Templates are extremely powerful, although I admit I don’t use them as often
    as I should. Templates save you from repeatedly writing common expressions.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
- en: 'You can see the built-in templates by opening the command palette and searching
    for “Templates”. You will see shortcuts for:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
- en: '`SELECT * FROM {table}`'
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`SELECT * FROM {table} WHERE {col} = {value}`'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: And others, like selecting and ordering, counting by groups, etc.
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'All you need to do is to write the shorthand for the query and press tab:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/0bad88b91d37da4bcc77467268c3ed00.png)'
  id: totrans-45
  prefs: []
  type: TYPE_IMG
- en: You can also create your own templates, which is not hard if you just copy the
    existing ones and adapt them.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
- en: Advanced copy tips
  id: totrans-47
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: You might already know DBeaver has extensive data export options. However, the
    standard export wizard can feel a bit overwhelming, as it shows you tons of configurations,
    even when you just want to quickly export a CSV.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
- en: A quicker way is selecting data in the Results tab, right-clicking, and choosing
    “Advanced Copy”. By doing this, you can copy your data in many formats like CSV,
    JSON, Markdown, TXT, and even SQL Insert Statements.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f21f89343322f6bcc326ca1da24a329b.png)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
- en: I find this one super helpful, especially when I need to quickly send data to
    a teammate.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
- en: A bonus tip is that you can copy this data to TSV, which gets properly recognized
    by Excel and Google Sheets into their proper cells! For this one though, you have
    to be double advanced, according to DBeaver 😅
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/39e64f7b3221ebe4820d0431acf7dae8.png)'
  id: totrans-53
  prefs: []
  type: TYPE_IMG
- en: Conclusions
  id: totrans-54
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I love DBeaver as a SQL IDE. It’s incredibly powerful and the interface is very
    clean. It’s honestly mindblowing that this tool is free and open-source. If you
    haven’t tried it yet, I recommend it a lot!
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
- en: I haven’t seen that many people talking about some of its nicest features and
    tricks, and most tips I’ve shared came from just using the software. There is
    probably a lot that I missed, especially when it comes to Plugins, which I haven’t
    used much.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
- en: I know I went through all of the tips very fast, so if you’re in doubt, feel
    free to reach out. Also, if you have more workflow tips, I would love to hear
    about them!
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
- en: I hope you learned something new!
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
- en: If you’re curious about other tips that didn’t make it into this post, or enjoy
    learning about general data topics, **subscribe to my** [**free newsletter on
    Substack**](https://mtrentz.substack.com/). I publish whenever I have something
    genuinely interesting to share.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你对这篇帖子中没有提到的其他技巧感到好奇，或者喜欢了解一般的数据话题，**请订阅我在Substack上的免费通讯**[**免费通讯链接**](https://mtrentz.substack.com/)。我会在有真正有趣的内容分享时发布。
- en: Want to connect directly or have questions? **Reach out anytime at** [**mtrentz.com**](https://mtrentz.com)**.**
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 想直接联系或有问题？**随时通过[mtrentz.com](https://mtrentz.com)联系我**。**
