- en: How to Build a Resume Optimizer with AI
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/how-to-build-a-resume-optimizer-with-ai-d73c2f9b9fcd/](https://towardsdatascience.com/how-to-build-a-resume-optimizer-with-ai-d73c2f9b9fcd/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: In a previous blog post, I shared [5 AI Projects You Can Build This Weekend](https://towardsdatascience.com/5-ai-projects-you-can-build-this-weekend-with-python-c57724e9c461),
    where the first project idea was a resume optimization tool. Since then, many
    people have asked for more guidance on implementing this project. In this article,
    I’ll walk through an example implementation using Python and OpenAI’s API.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: '![Image from Canva.](../Images/26319a2a43bfc31efde00e9919f86205.png)'
  id: totrans-3
  prefs: []
  type: TYPE_IMG
- en: Image from Canva.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: Adapting your resume to different job descriptions is an effective yet tedious
    part of finding a job. Even if you’ve tailored your resume for a specific role,
    companies may have **varying expectations for similar job titles**.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: For instance, below are two comparable data scientist roles at Netflix and Google
    with slightly different job descriptions. Lucky for us, with today’s AI tools,
    **we can build an app to streamline this process**.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: '![Comparison of similar data scientist roles. Image by author.](../Images/1f8a389eefc97dfe4ba7e32b600c9f5f.png)'
  id: totrans-8
  prefs: []
  type: TYPE_IMG
- en: Comparison of similar data scientist roles. Image by author.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
- en: '**Can’t I Use ChatGPT?**'
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Hearing this idea, you might think, *can’t I just use a no-code AI tool like
    ChatGPT or Claude for this?*
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: The answer is yes! In fact, **I’d recommend starting with no-code solutions**
    anytime you want to build a project like this. However, there are two limitations
    to consider.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
- en: '**First**, working with long prompts in a chat UI can get cumbersome, especially
    when you have several jobs you want to apply to. **Second**, if you want to scale
    this process up from 5 resumes to 50, using ChatGPT (or the like) may become impractical.'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: '**The Project Workflow**'
  id: totrans-14
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: At a high level, this project aims to take a resume and job description (JD)
    and return an optimized version of the resume based on the JD. While one could
    implement such a tool in many ways, here I’ll use the following **4-step workflow**.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: '**Import the Resume and JD**: Load your resume and define the job description
    you want to target.'
  id: totrans-16
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Construct a Prompt**: Create a prompt to guide the AI in rewriting your resume.'
  id: totrans-17
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Make API Call**: Use OpenAI’s API to prompt GPT-4o-mini to rewrite your resume.'
  id: totrans-18
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Display and Save the Results**: Save the new resume as a PDF.'
  id: totrans-19
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![4-step workflow. Image by author.](../Images/5ee50068aea62df4d58d91795ce7244a.png)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
- en: 4-step workflow. Image by author.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: '**Example Code: Automated Resume Optimizer**'
  id: totrans-22
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: With a basic understanding of what we are trying to build and why, let’s see
    how to implement this project in Python. The example code is freely available
    on [GitHub](https://github.com/ShawhinT/AI-Builders-Bootcamp-2/tree/main/lightning-lesson).
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: '[**AI-Builders-Bootcamp-2/lightning-lesson at main · ShawhinT/AI-Builders-Bootcamp-2**](https://github.com/ShawhinT/AI-Builders-Bootcamp-2/tree/main/lightning-lesson)'
  id: totrans-24
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
- en: '**Imports**'
  id: totrans-26
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'We start by importing a few hand Python libraries. The key ones are *openai*
    for accessing GPT-4o-mini, as well as *markdown* and *weasyprint* to create a
    PDF version of the final resume. *Note: An OpenAI API key is required for this
    project, which I imported from a separate Python script.*'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  id: totrans-28
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '**Step 1: Input Resume & JD**'
  id: totrans-29
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Next, we will load our input resume into Python as a string and use Python’s
    *input()* function to allow us to copy-paste it into any job description when
    we run the script.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  id: totrans-31
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'A detail here is that the **resume is saved in a markdown format**. This is
    important because it will encourage GPT-4o-mini to generate a new resume in markdown,
    which we can easily style into a PDF. *Note: ChatGPT (or the like) can convert
    your PDF resume to markdown.*'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
- en: '**Step 2: Construct Prompt**'
  id: totrans-33
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: With our resume and JD imported, we can now craft a prompt to instruct the model
    to optimize the resume. A pro tip here is to **use ChatGPT to write an initial
    version of this prompt** because 1) it’s pretty long, and 2) LLMs tend to write
    instructions more aligned with the expectations of other LLMs.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
- en: After some experimentation, I ended up with the following prompt template, which
    rewrites the resume and makes additional suggestions for improvement if skill
    gaps exist.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  id: totrans-36
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '**Step 3: Make API Call**'
  id: totrans-37
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Using the above prompt template, we can dynamically construct a prompt using
    the input resume and JD and then send it to OpenAI via their API.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'Step 4: Save New Resume'
  id: totrans-40
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Finally, we can extract the optimized resume and suggestions for improvement.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  id: totrans-42
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: For the resume, we can convert the markdown output to HTML using the markdown
    library. Then, convert the HTML to a PDF using weasyprint.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  id: totrans-44
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Here’s what the final result looks like.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
- en: '![Final PDF version of resume. Image by author.](../Images/477b6acacf36a6be76f941ce8c4be077.png)'
  id: totrans-46
  prefs: []
  type: TYPE_IMG
- en: Final PDF version of resume. Image by author.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
- en: For the improvement suggestions, we can print those directly.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  id: totrans-49
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: '![Improvement suggestions. Image by author.](../Images/a5c1211fcfb8417a86ff0b62f7760318.png)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
- en: Improvement suggestions. Image by author.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
- en: '**Bonus: Build a GUI**'
  id: totrans-52
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: While the code above streamlines this process to some extent, we can do better.
    To improve the usability of this tool, we can **create a simple web interface
    using Gradio**.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
- en: The final product is shown below. A user can upload a markdown file of their
    resume and paste it into any job description more straightforwardly. I also added
    an area where users can edit the new resume before exporting it as a PDF.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
- en: '![Demo of final GUI. GIF by author.](../Images/79e2754ca4d40ebe65256f10bea45e12.png)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
- en: Demo of final GUI. GIF by author.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
- en: The **example code is available at the GitHub** repository [here](https://github.com/ShawhinT/AI-Builders-Bootcamp-2/blob/main/lightning-lesson/resume_optimizer_UI.ipynb).
    Check out the [YouTube video](https://youtu.be/R5WXaxmb6m4) to see me talk through
    the code.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: '**示例代码可在GitHub仓库[此处](https://github.com/ShawhinT/AI-Builders-Bootcamp-2/blob/main/lightning-lesson/resume_optimizer_UI.ipynb)找到**。查看[YouTube视频](https://youtu.be/R5WXaxmb6m4)以了解我如何讲解代码。'
- en: '**What’s Next?**'
  id: totrans-58
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**接下来是什么？**'
- en: While tailoring one’s resume to specific job descriptions is an effective way
    to make an application stand out, it can be quite tedious. Here, we walk through
    the implementation of an AI-powered resume optimization tool using Python and
    OpenAI’s API.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然根据特定的职位描述定制简历是一种让申请脱颖而出有效的方法，但这可能相当繁琐。在这里，我们通过使用Python和OpenAI的API来实现一个AI驱动的简历优化工具。
- en: If you have any questions or want to dive deeper into any of the topics covered,
    let me know in the comments 🙂
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您有任何问题或想要深入了解所涵盖的任何主题，请在评论中告诉我 🙂
