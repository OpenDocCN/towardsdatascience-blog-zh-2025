- en: Deploy an OpenAI Agent Builder Chatbot to your Website
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/deploy-an-openai-agent-builder-chatbot-to-a-website/](https://towardsdatascience.com/deploy-an-openai-agent-builder-chatbot-to-a-website/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1761240166455" class="mdspan-comment">OpenAI’s recent dev</mdspan>
    day was dominated by its new Agentic workflow product, Agent Builder. It allows
    you to craft agentic processes via a simple-to-use graphical user interface. It
    quite rightly garnered most of the attention, but the other side of their workflow
    process — deployment — received less attention.
  prefs: []
  type: TYPE_NORMAL
- en: All we had were fleeting glances of screens and code, and there was no real
    explanation of how to integrate an agent built with Agent Builder into your own
    or your business’s website or application.
  prefs: []
  type: TYPE_NORMAL
- en: This is where OpenAI’s other agent builder tool, Chatkit, is supposed to come
    in. It is just as important a product as their Agent builder — arguably more so.
  prefs: []
  type: TYPE_NORMAL
- en: Why? That’s because ChatKit is used to deploy any agentic process you create
    using the Agent builder into real-world web apps and pages.
  prefs: []
  type: TYPE_NORMAL
- en: No worries, you might think, I’ll head over and read OpenAI’s documentation
    on ChatKit. Well, good luck to you. Apart from being poorly written, it requires
    a considerable amount of programming knowledge and an understanding of GitHub
    and various other technical processes.
  prefs: []
  type: TYPE_NORMAL
- en: In the remainder of this article, I’ll outline the exact process, step by step,
    for deploying an agent built using OpenAI’s Agent Builder onto a publicly accessible
    website.
  prefs: []
  type: TYPE_NORMAL
- en: What we’ll do
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This article will be your **“missing manual”** for Agent Builder deployment.
    We’ll first create two simple websites, one using Lovable and one using HuggingFace
    (HF) spaces and deploy them to the World Wide Web.
  prefs: []
  type: TYPE_NORMAL
- en: After that, we’ll develop a chatbot agent using OpenAI’s Agent Builder. We will
    then deploy it to our new Lovable and HF websites using the Agent Builder ChatKit.
  prefs: []
  type: TYPE_NORMAL
- en: What you’ll need
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: There are several prerequisites, but most of them are free to set up.
  prefs: []
  type: TYPE_NORMAL
- en: An OpenAI account and API key (Paid plan)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: A Vercel account (Free)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: A HuggingFace account (Free)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: A test website (FREE and/or paid)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: ChatKit deployment
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: There are several steps we need to take, but none are complicated. Take your
    time and follow the steps methodically, and you’ll be fine.
  prefs: []
  type: TYPE_NORMAL
- en: Step 1 — Create our test websites
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: If you already have a website and you can edit/change the code behind it, feel
    free to use this.
  prefs: []
  type: TYPE_NORMAL
- en: Otherwise, you can use a tool like [lovable.dev](https://lovable.dev?via=tom-reid),
    which can not only create a website for you but can also deploy it to the web
    using one of its own domains or a custom domain that you provide.
  prefs: []
  type: TYPE_NORMAL
- en: Note that the lovable link above is an affiliate link, which means if you sign
    up to a paid plan using it, I get a small commission.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Here was my prompt to Lovable,
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Lovable took around 15 seconds to produce a website, and I deployed it using
    one of Lovable’s own example domains. Here is what it produced. I’ll put a link
    to the website at the end of the article.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a65753acddec0ba348c76729f7ed000d.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: For those on a tight budget, a free option for creating a webpage is to use
    HuggingFace (HF) Spaces. Here’s how to do that.
  prefs: []
  type: TYPE_NORMAL
- en: Create an HF account and log in.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Click the **Spaces** link at the top of the home page, then click the **New
    Space** button, also towards the top right of the page.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Fill in the space’s name, choose a licence type, and select **‘Static’** for
    the SDK, **‘Blank’** for the Template, **‘CPU Basic’** for the hardware, and **‘Public’**
    for the scope.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Click on the **Create Space** button at the bottom of the screen when you’re
    ready. You should see a screen like this appear,
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/ce0be72af451fd307b95661903f99d49.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: 'The URL link to your HF website will be something like:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: At this point, you should have at least one publicly available website that
    you can modify to integrate an Agent Builder agent with. But first, we need an
    agent.
  prefs: []
  type: TYPE_NORMAL
- en: Step 2 — Create an OpenAI Agent Builder Chatbot agent
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: I won’t spend too much on this step, as there are plenty of tutorials and demos
    available online on how to do it. Additionally, the OpenAI team covered this part
    very well at their developer day.
  prefs: []
  type: TYPE_NORMAL
- en: 'However, my agent builder is as simple as it gets. It will be a straightforward
    chatbot containing just two nodes: a start node and an agent node. In fact, that
    is the default setup you get if you click the Create button on the agent builder
    home page. The only other change I made to the agent node was to select GPT5-nano
    as my agent LLM, and I updated the agent instructions to this:'
  prefs: []
  type: TYPE_NORMAL
- en: You are a helpful assistant. Tell the user an interesting fact about the proposed
    subject, then tell a “dad joke” about the subject
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Here is an example of the chat.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: To create your own agent, head over to [https://platform.openai.com/agent-builder](https://platform.openai.com/agent-builder).
    Depending on what LLM model you choose to use for your agent, you may also need
    to pass an identification check before you can run any agents, so bear that in
    mind.
  prefs: []
  type: TYPE_NORMAL
- en: 'NB: Take note of the project name you used when creating your agent. It’s located
    near the top left of the Agent Builder home screen. We’ll need this when creating
    our OpenAI API key, as the project under which the API key is made **must match**
    the project in which your agent is built. I was working on all my tasks under
    the **Default project**.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Click the **Preview** button at the top right of the page to ensure that your
    agent is working as expected. When you’re satisfied, click the **Publish** button, located
    near the top right of the page. Fill in the name of your agent and click the Publish
    button again. When you do this, a pop-up will appear like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d055b93c860a9d334f3cbdc4a159ed15.png)'
  prefs: []
  type: TYPE_IMG
- en: Image from OpenAI website
  prefs: []
  type: TYPE_NORMAL
- en: You’ll need the workflow ID later, so please take note of it now. Also, notice
    the **Clone sample app** link near the bottom of the pop-up. We’ll use that in
    the next step.
  prefs: []
  type: TYPE_NORMAL
- en: Step 3 — Fork OpenAI’s sample ChatKit app to your own GitHub repo
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: To help with deploying agents using ChatKit, OpenAI provides some example starter
    kit code in a GitHub repository. We need to fork that app (i.e copy it) to our
    own GitHub repo and deploy it to the web.
  prefs: []
  type: TYPE_NORMAL
- en: For the deployment stage, we’ll use Vercel. Vercel is a cloud platform for deploying
    and hosting web applications.
  prefs: []
  type: TYPE_NORMAL
- en: To fork the OpenAI app, use the **Clone Sample app** link in the pop-up from
    Step 2\. This will take you to the appropriate OpenAI GitHub page. Now, click
    the **Fork** button on the repo. It’s just above and to the right of the green
    **Code** button.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/aae776d8ea956fedac36a88c231bedb0.png)'
  prefs: []
  type: TYPE_IMG
- en: Image from OpenAI GitHub repo
  prefs: []
  type: TYPE_NORMAL
- en: You’ll be prompted to enter a name for your new repository, if you’d like, or
    you can leave it as the default.
  prefs: []
  type: TYPE_NORMAL
- en: Step 4 — Deploy your fork of OpenAI’s sample ChatKit app to Vercel
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: For this step, you’ll need a Vercel account if you don’t already have one. It’s
    free to set up and use for the limited example we’ll be showing here. Head over
    to [https://vercel.com](https://vercel.com) and create your account now.
  prefs: []
  type: TYPE_NORMAL
- en: Once you’re logged in, go to the dashboard and click the **Add New->Project**
    button to start a new project. You can find the link to the dashboard underneath
    your user profile icon at the extreme top left of the page.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ce90fb8646deb083fa8a3d137dcf7f43.png)'
  prefs: []
  type: TYPE_IMG
- en: Image from the Vercel web site
  prefs: []
  type: TYPE_NORMAL
- en: The first time around, you’ll need to authorise Vercel access rights to your
    GitHub account, so click the Continue with GitHub button. You’ll then be asked
    to authorise Vercel. Choose to allow Vercel access to all your repos or just an
    individual repo. Once that’s completed, you’ll be able to import your GitHub repository
    into Vercel. After the import is complete, the final stage is deployment. However,
    before you proceed, you need to add a couple of environment variables. The link
    to do this is just above the deploy button.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ea2dc9da5f4a0dbb4778887f40ba4a07.png)'
  prefs: []
  type: TYPE_IMG
- en: Image from Vercel website
  prefs: []
  type: TYPE_NORMAL
- en: 'The environment variables you need to add are:'
  prefs: []
  type: TYPE_NORMAL
- en: '`OPENAI_API_KEY` — This must be an API key created within the same project
    as your Agent Builder. To get your API key, head over to'
  prefs: []
  type: TYPE_NORMAL
- en: '[https://platform.openai.com/api-keys](https://platform.openai.com/api-keys)'
  prefs: []
  type: TYPE_NORMAL
- en: Create or reuse an API key, **ensuring the Project Name matches the one from
    the Agent Builder.**
  prefs: []
  type: TYPE_NORMAL
- en: '`NEXT_PUBLIC_CHATKIT_WORKFLOW_ID` — This is the ID of the workflow you created
    in Agent Builder, which starts with wf_…'
  prefs: []
  type: TYPE_NORMAL
- en: After that, you can click the **Deploy** button on Vercel. This will take a
    minute or two, but once it’s finished, we can test our chatbot. Once the deployment
    is complete, return to your Vercel dashboard. Ensure you’re on the correct project,
    and you should see a button labelled **Visit**, which will take you to your ChatBot.
    Before we click on it, we have one more thing to do. We must let OpenAI know the
    domain of our chatbot app on Vercel for security reasons.
  prefs: []
  type: TYPE_NORMAL
- en: Copy the Vercel ***domain*** URL for your project and return to your OpenAI
    agent builder project.
  prefs: []
  type: TYPE_NORMAL
- en: Next, click the Code button near the top right of the screen to display the
    Chatkit details pop-up. Click the **“Add Domain”** button. On the mini popup screen
    that appears, enter the Vercel domain URL into the field, and then click the **“Generate
    Key”** button.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/1cdf255a3c3e285de5ab367ef911392e.png)'
  prefs: []
  type: TYPE_IMG
- en: Image from OpenAI website
  prefs: []
  type: TYPE_NORMAL
- en: Now, back on Vercel, click the **“Visit”** button to test your chat app. This
    is what mine looked like.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d4ec938e170deaa7e05dc614fca6263e.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: Step 5—Modify our original Lovable and HuggingFace websites to incorporate the
    new chatbot.
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This is our final step, which involves generating embed code that we can insert
    in our own web pages. We achieve this by modifying the index.html file of our
    web application. I got ChatGPT to create the code we need to inject.
  prefs: []
  type: TYPE_NORMAL
- en: You can get the domain URL of your chatbot from the Vercel dashboard.
  prefs: []
  type: TYPE_NORMAL
- en: Here is my ChatGPT conversation. Replace my domain URL with your own.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: And GPT’s response was this.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: I took the above code and manually edited the index.html file in my repository
    that was created by Lovable when it generated my original web page. I inserted
    the above embed code into the `<head>` section of my index.html file and saved
    the file contents. After that, I redeployed the repo to my lovely domain, and
    you can see the results below. As expected, a little speech bubble icon was created
    in the bottom right-hand corner of the page, and when I clicked on this, the Chatbot
    dialogue screen appeared, and I was able to interact with it.
  prefs: []
  type: TYPE_NORMAL
- en: '**Lovable (** [https://little-react-wave.lovable.app/](https://little-react-wave.lovable.app/)
    )'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/2f9cb851ec864655943a8865bdb7d90f.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: I did a similar operation on my web page on HuggingFace. You can edit the index.html
    file on your HF website by clicking the **Files** link on your space, then clicking
    the index.html file link that’s displayed.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/edfa41baffdc5917e2f23a781c3fa185.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: I added the same embed code to my HF index.html file as I did with lovable,
    and after committing the changes, my new web page appeared as follows, with the
    same Chatbot icon and capability.
  prefs: []
  type: TYPE_NORMAL
- en: '**Hugging Face (** [https://huggingface.co/spaces/taupirho/chatkit](https://huggingface.co/spaces/taupirho/chatkit)
    )'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a7c578b51223e70e935fa5963a857a0f.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: Not too shabby!
  prefs: []
  type: TYPE_NORMAL
