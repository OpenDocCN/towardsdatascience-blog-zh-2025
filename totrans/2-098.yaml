- en: Declarative and Imperative Prompt Engineering for Generative AI
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 生成式AI的声明性和命令性提示工程
- en: 原文：[https://towardsdatascience.com/declarative-and-imperative-prompt-engineering-for-generative-ai/](https://towardsdatascience.com/declarative-and-imperative-prompt-engineering-for-generative-ai/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/declarative-and-imperative-prompt-engineering-for-generative-ai/](https://towardsdatascience.com/declarative-and-imperative-prompt-engineering-for-generative-ai/)
- en: '*<mdspan datatext="el1753475965481" class="mdspan-comment">Prompt engineering</mdspan>*
    refers to the careful design and optimization of inputs (e.g., queries or instructions)
    for guiding the behavior and responses of generative AI models. Prompts are typically
    structured using either the declarative or imperative paradigm, or a mixture of
    both. The choice of paradigm can have a big impact on the accuracy and relevance
    of the resulting model output. This article provides a conceptual overview of
    declarative and imperative prompting, discusses advantages and limitations of
    each paradigm, and considers the practical implications.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '*<mdspan datatext="el1753475965481" class="mdspan-comment">提示工程</mdspan>*指的是精心设计和优化输入（例如查询或指令）以引导生成式AI模型的行为和响应。提示通常使用声明性或命令性范式，或两者的混合来结构化。范式选择可能对模型输出的准确性和相关性产生重大影响。本文提供了声明性和命令性提示的概念概述，讨论了每种范式的优缺点，并考虑了实际影响。'
- en: The What and the How
  id: totrans-3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是“什么”和“如何”
- en: In simple terms, declarative prompts express *what* should be done, while imperative
    prompts specify *how* something should be done. Suppose you are at a pizzeria
    with a friend. You tell the waiter that you will have the Neapolitan. Since you
    only mention the type of pizza you want without specifying exactly how you want
    it prepared, this is an example of a declarative prompt. Meanwhile, your friend
    — who has some very particular culinary preferences and is in the mood for a bespoke
    pizza *alle quattro stagioni* — proceeds to tell the waiter exactly how she would
    like it made; this is an example of an imperative prompt.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，声明性提示表达的是*应该做什么*，而命令性提示则指定*如何做某事*。假设你和朋友在一家比萨店。你告诉服务员你要点那不勒斯风味比萨。由于你只提到了你想要比萨的类型，而没有具体说明你想要如何准备它，这是一个声明性提示的例子。与此同时，你的朋友——她有一些非常特别的饮食偏好，并且想要定制一款*四季*比萨——开始详细告诉服务员她想要如何制作；这是一个命令性提示的例子。
- en: 'Declarative and imperative paradigms of expression have a long history in computing,
    with some programming languages favoring one paradigm over the other. A language
    such as C tends to be used for imperative programming, while a language like Prolog
    is geared towards declarative programming. For example, consider the following
    problem of identifying the ancestors of a person named Charlie. We happen to know
    the following facts about Charlie’s relatives: Bob is Charlie’s parent, Alice
    is Bob’s parent, Susan is Dave’s parent, and John is Alice’s parent. Based on
    this information, the code below shows how we can identify Charlie’s ancestors
    using Prolog.'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 表达的声明性和命令性范式在计算机科学中有着悠久的历史，一些编程语言倾向于偏好一种范式而不是另一种。例如，C语言通常用于命令式编程，而Prolog语言则更适合声明式编程。例如，考虑以下问题：识别名叫Charlie的人的祖先。我们恰好知道Charlie亲戚的一些事实：Bob是Charlie的父母，Alice是Bob的父母，Susan是Dave的父母，John是Alice的父母。基于这些信息，下面的代码展示了我们如何使用Prolog识别Charlie的祖先。
- en: '[PRE0]'
  id: totrans-6
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Although the Prolog syntax may seem strange at first, it actually expresses
    the problem we wish to solve in a concise and intuitive way. First, the code lays
    out the known facts (i.e., who is whose parent). It then recursively defines the
    predicate `ancestor(X, Y)`, which evaluates to true if `X` is an ancestor of `Y`.
    Finally, the predicate `findall(X, Goal, List)` triggers the Prolog interpreter
    to repeatedly evaluate `Goal` and store all successful bindings of `X` in `List`.
    In our case, this means identifying all solutions to `ancestor(X, Person)` and
    storing them in the variable `Ancestors`. Notice that we do not specify the implementation
    details (the “how”) of any of these predicates (the “what”).
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然Prolog语法一开始可能看起来很奇怪，但实际上它以简洁直观的方式表达了我们希望解决的问题。首先，代码列出已知事实（即谁是谁的父母）。然后递归地定义了谓词`ancestor(X,
    Y)`，如果`X`是`Y`的祖先，则该谓词返回true。最后，谓词`findall(X, Goal, List)`触发Prolog解释器反复评估`Goal`并将所有成功的`X`绑定存储在`List`中。在我们的例子中，这意味着识别所有`ancestor(X,
    Person)`的解决方案并将它们存储在变量`Ancestors`中。请注意，我们没有指定这些谓词（即“是什么”）的实现细节（即“如何”）。
- en: In contrast, the C implementation below identifies Charlie’s ancestors by describing
    in painstaking detail exactly how this should be done.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  id: totrans-9
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Nowadays, the increasing availability of feature-rich libraries and APIs, and
    the consolidation of architectural best practices (e.g., programming to interfaces,
    using configuration over code), allows us to focus on the “what” without having
    to worry about the “how” in many cases. Indeed, as suggested in the short video
    below, a lot of code can — and perhaps should — be written in a declarative manner.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: From Programming to Prompting
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: If we think of prompt engineering as the next evolutionary step in programming
    — tracing the journey from machine-centric languages such as Assembly and C to
    more human-centric languages like Java and Python — then the relevance of declarative
    and imperative paradigms to prompt engineering becomes apparent. Although we can
    now instruct a generative AI model simply using natural language, we still need
    to decide on the extent to which the instruction should express *what* is to be
    achieved versus *how* it is to be achieved.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
- en: Consider the scenario of a developer who would like to use an AI assistant to
    generate code — specifically, Python code to compute the cosine distance between
    two vectors. Following are three versions of a prompt that the developer might
    write to achieve her goal. Version 1 is declarative, Version 2 is imperative,
    and Version 3 is a hybrid of the two. The code generated by OpenAI’s GPT-4 model
    in response to each of these prompts is also provided.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: Prompt Version 1 (Declarative)
  id: totrans-14
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '*Write a short and fast function in Python to compute the cosine distance between
    two input vectors.*'
  id: totrans-15
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Result:**'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  id: totrans-17
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Prompt Version 2 (Imperative)
  id: totrans-18
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '*Write a Python function cosine_distance(v1, v2) that computes the cosine distance
    between two vectors. Follow these steps using only built-in functions:*'
  id: totrans-19
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-20
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*1\. Raise a ValueError exception if v1 or v2 are empty, or if v1 and v2 are
    of different lengths.*'
  id: totrans-21
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-22
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*2\. Compute the dot product of v1 and v2.*'
  id: totrans-23
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-24
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*3\. Compute the magnitude of each vector and raise a ValueError if either
    magnitude is zero.*'
  id: totrans-25
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-26
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*4\. Divide the dot product by the product of the two magnitudes to get the
    cosine similarity.*'
  id: totrans-27
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-28
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*5\. Do 1 minus the cosine similarity to obtain cosine distance.*'
  id: totrans-29
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-30
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*6\. Return the resulting distance.*'
  id: totrans-31
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Result:**'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  id: totrans-33
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Prompt Version 3 (Hybrid)
  id: totrans-34
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '*Write a fast Python function that computes the cosine distance between two
    vectors v1 and v2 using relevant optimized functions from numpy and scipy. The
    function should validate the input vectors (non-empty, equal length) and gracefully
    handle invalid inputs with exceptions.*'
  id: totrans-35
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Result:**'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  id: totrans-37
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Horses for Courses
  id: totrans-38
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The three prompts and their respective AI-generated implementations shown above
    imply different trade-offs and may be suited to different personas and scenarios
    in practice.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
- en: The declarative prompt (Version 1) is short and simple. It does not specify
    details of the exact algorithmic approach to be taken, expressing instead the
    high-level task only. As such, it promotes creativity and flexibility in implementation.
    The downside of such a prompt, of course, is that the result may not always be
    reproducible or robust; in the above case, the code generated by the declarative
    prompt could vary significantly across inference calls, and does not handle edge
    cases, which could be a problem if the code is intended for use in production.
    Despite these limitations, typical personas who may favor the declarative paradigm
    include product managers, UX designers, and business domain experts who lack coding
    expertise and may not need production-grade AI responses. Software developers
    and data scientists may also use declarative prompting to quickly generate a first
    draft, but they would be expected to review and refine the code afterward. Of
    course, one must keep in mind that the time needed to improve AI-generated code
    may cancel out the time saved by writing a short declarative prompt in the first
    place.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 声明式提示（版本1）简短且简单。它不指定要采取的确切算法方法的细节，而是仅表达高级任务。因此，它促进了实现中的创造性和灵活性。当然，这种提示的缺点是结果可能并不总是可重复或稳健的；在上面的例子中，声明式提示生成的代码在推理调用之间可能会有很大差异，并且不处理边缘情况，如果代码打算用于生产，这可能会成为一个问题。尽管存在这些限制，但可能更喜欢声明式范式的典型人物包括产品经理、UX设计师和缺乏编码专业知识且可能不需要生产级AI响应的业务领域专家。软件开发人员和数据科学家也可能使用声明式提示快速生成初稿，但预计他们会在之后审查和改进代码。当然，必须记住，改进AI生成代码所需的时间可能会抵消最初编写简短声明式提示所节省的时间。
- en: By contrast, the imperative prompt (Version 2) leaves very little to chance
    — each algorithmic step is specified in detail. Dependencies on non-standard packages
    are explicitly avoided, which can sidestep certain problems in production (e.g.,
    breaking changes or deprecations in third-party packages, difficulty debugging
    strange code behavior, exposure to security vulnerabilities, installation overhead).
    But the greater control and robustness come at the cost of a verbose prompt, which
    may be almost as effort-intensive as writing the code directly. Typical personas
    who opt for imperative prompting may include software developers and data scientists.
    While they are quite capable of writing the actual code from scratch, they may
    find it more efficient to feed pseudocode to a generative AI model instead. For
    example, a Python developer might use pseudocode to quickly generate code in a
    different and less familiar programming language, such as C++ or Java, thereby
    reducing the likelihood of syntactic errors and the time spent debugging them.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 与之相比，命令式提示（版本2）留给偶然性的空间非常小——每个算法步骤都详细指定。明确避免了对非标准软件包的依赖，这可以避免生产中的一些问题（例如，第三方软件包的破坏性更改或弃用、调试奇怪代码行为困难、暴露于安全漏洞、安装开销）。但更大的控制和稳健性是以冗长的提示为代价的，这可能与直接编写代码一样费时。选择命令式提示的典型人物可能包括软件开发人员和数据科学家。虽然他们完全能够从头开始编写实际代码，但他们可能会发现将伪代码输入到生成式AI模型中更有效率。例如，一个Python开发者可能会使用伪代码快速生成不同且不太熟悉的编程语言（如C++或Java）的代码，从而降低语法错误的概率和调试它们所需的时间。
- en: Finally, the hybrid prompt (Version 3) seeks to combine the best of both worlds,
    using imperative instructions to fix key implementation details (e.g., stipulating
    the use of NumPy and SciPy), while otherwise employing declarative formulations
    to keep the overall prompt concise and easy to follow. Hybrid prompts offer freedom
    within a framework, guiding the implementation without completely locking it in.
    Typical personas who may lean toward a hybrid of declarative and imperative prompting
    include senior developers, data scientists, and solution architects. For example,
    in the case of code generation, a data scientist may wish to optimize an algorithm
    using advanced libraries that a generative AI model might not select by default.
    Meanwhile, a solution architect may need to explicitly steer the AI away from
    certain third-party components to comply with architectural guidelines.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，混合提示（版本 3）旨在结合两者的优点，使用命令式指令来固定关键实现细节（例如，规定使用 NumPy 和 SciPy），而在其他方面则采用声明式表述以保持整体提示简洁且易于理解。混合提示在框架内提供自由度，指导实现而不完全锁定它。可能倾向于声明式和命令式提示混合的典型人物包括高级开发者、数据科学家和解决方案架构师。例如，在代码生成的案例中，数据科学家可能希望使用高级库来优化算法，而这些库可能不是生成式
    AI 模型默认选择的。同时，解决方案架构师可能需要明确引导 AI 避免某些第三方组件，以符合架构指南。
- en: Ultimately, the choice between declarative and imperative prompt engineering
    for generative AI should be a deliberate one, weighing the pros and cons of each
    paradigm in the given application context.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 最终，对于生成式 AI 的声明式和命令式提示工程之间的选择应该是一个深思熟虑的决定，权衡在特定应用环境中每种范式的优缺点。
