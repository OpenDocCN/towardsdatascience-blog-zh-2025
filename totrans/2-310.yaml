- en: 'Code Agents: The Future of Agentic AI'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/code-agents-the-future-of-agentic-ai/](https://towardsdatascience.com/code-agents-the-future-of-agentic-ai/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1748303756896" class="mdspan-comment">We are living in the
    age</mdspan> of AI agents. LLMs are no longer just tools. They’ve become active
    participants in our lives, boosting productivity and transforming the way we live
    and work.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: OpenAI recently launched [Operator](https://en.wikipedia.org/wiki/OpenAI_Operator?utm_source=chatgpt.com),
    an AI agent that can autonomously perform various tasks, from browsing the web
    to filling out forms and scheduling appointments.
  id: totrans-3
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Anthropic introduced [MCP (Model Context Protocol)](https://www.anthropic.com/news/model-context-protocol),
    a new standard for how AI assistants interact with the outside world. With over
    five thousand active MCP servers already, adoption is growing rapidly.
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: AI agents are also changing the landscape of software engineering. Tools like
    GitHub Copilot’s agentic mode, Claude Code, OpenAI Codex, and others are not only
    [improving developer productivity and code quality](https://github.blog/news-insights/research/research-quantifying-github-copilots-impact-on-developer-productivity-and-happiness/)
    but also democratising the field, making software development accessible to people
    without a technical background.
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We’ve previously looked at different AI Agent frameworks, such as [LangGraph](https://towardsdatascience.com/from-basics-to-advanced-exploring-langgraph-e8c1cf4db787/)
    or [CrewAI](https://towardsdatascience.com/multi-ai-agent-systems-101-bac58e3bcc47/).
    In this article, I would like to discuss a new one I’ve been exploring recently — **HuggingFace
    smolagents**. It’s an interesting framework since it implements the concept of
    code agents.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: 'In this article, we will explore several topics:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: 'What code agents are (*teaser: it’s not related to vibe coding*).'
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How to use the HuggingFace smolagents framework in practice.
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Whether it’s secure to give LLMs so much agency.
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The real difference in performance between code agents and traditional tool-calling
    agents.
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: AI Agents recap
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Let’s start with a quick refresher: what exactly are AI agents? HuggingFace
    [provides](https://huggingface.co/docs/smolagents/conceptual_guides/intro_agents)
    a clear and concise definition of what they mean by agents.'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: '*AI Agents are programs where LLM outputs control the workflow.*'
  id: totrans-14
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: So, we need an agentic flow when we want a system to reason and act based on
    observations. Actually, agency is not a binary variable (yes or no), but a spectrum.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: At one end, we can have systems without agency at all, for example, a simple
    process where an LLM defines the sentiment of a text, translates it or summarises
    it.
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The next level is routing, where an LLM can classify an incoming question and
    decide which path to take —  for example, calling a tool if a customer is asking
    about the status of their current order, and transferring the conversation to
    a human CS agent otherwise.
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: More advanced systems can exhibit higher degrees of agency. These might include
    the ability to execute other LLMs (multi-agent setup) or even create new tools
    on the fly.
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Code agents fall into this more advanced category. They are multi-step agents
    that execute tool calls in the form of code, in contrast to the more traditional
    approach using a JSON format with the tool name and arguments.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: 'Several recent papers have shown that using code in agentic flows leads to
    better results:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: Wang, Xingyao, et al. [“Executable Code Actions Elicit Better LLM Agents”](https://arxiv.org/abs/2402.01030)
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Nguyen, Dang, et al. [“DynaSaur: Large Language Agents Beyond Predefined Actions”](https://arxiv.org/abs/2411.01747)'
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Yang, Ke, et al. [“If LLM Is the Wizard, Then Code Is the Wand: A Survey on
    How Code Empowers Large Language Models to Serve as Intelligent Agents.”](https://arxiv.org/abs/2401.00812)'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It makes sense when you think about it. We’ve been developing programming languages
    for decades to solve complex problems. So, it’s natural that these languages are
    better suited to LLM’s tasks than simple JSON configs. An additional benefit is
    that LLMs are already quite good at writing code in common programming languages,
    thanks to the vast amount of available data for training.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
- en: 'This approach comes with several other benefits as well:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
- en: By generating code, an LLM is not limited to a predefined set of tools and can
    create its own functions.
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It can combine multiple tools within a single action using conditions and loops,
    which helps reduce the number of steps required to complete a task.
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It also enables the model to work with a wider variety of outputs, such as generating
    charts, images, or other complex objects.
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These benefits aren’t just theoretical; we can observe them in practice. In
    [“Executable Code Actions Elicit Better LLM Agents”](https://arxiv.org/abs/2402.01030),
    the authors show that code agents outperform traditional methods, achieving a
    higher success rate and completing a task in fewer steps, which in turn reduces
    costs.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/95f2e71a612e8d2fc7bb4d05a7ddead0.png)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
- en: Chart from [Wang, Xingyao, et al](https://arxiv.org/abs/2402.01030). [“Executable
    Code Actions Elicit Better LLM Agents”](https://arxiv.org/abs/2402.01030)
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
- en: Code agents look promising, which inspired me to try this approach in practice.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
- en: HuggingFace smolagents framework
  id: totrans-33
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: First try
  id: totrans-34
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Luckily, we don’t need to build code agents from scratch, as HuggingFace has
    released a handy library called [smolagents](https://huggingface.co/docs/smolagents/index)
    that implements this approach.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: Let’s start by installing the library.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  id: totrans-37
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'Next, let’s build a basic example. To initialise the agent, we need just two
    parameters: **model** and **tools**.'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
- en: I plan to use OpenAI for the model, which is accessible via [LiteLLM](https://docs.litellm.ai/).
    However, the framework supports other options as well. You can use a local model
    via [Ollama](https://ollama.com/) or [TransformersModel](https://huggingface.co/docs/smolagents/v1.15.0/en/reference/models#smolagents.TransformersModel),
    or public models via [Inference Providers](https://huggingface.co/blog/inference-providers)
    or choose other options (you can find more details in [the documentation](https://huggingface.co/docs/smolagents/guided_tour)).
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
- en: I didn’t specify any tools, but used `add_base_tools = True`, so my agent has
    a [default set of tools](https://huggingface.co/docs/smolagents/reference/tools#default-tools),
    such as a Python interpreter or DuckDuckGo search. Let’s try it out with a simple
    question.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  id: totrans-41
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: As a result, we see a really nicely formatted execution flow. It’s just amazing
    and allows you to understand the process perfectly.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/338e5eba15ca86ca55ac6363ed5b3c1a.png)'
  id: totrans-43
  prefs: []
  type: TYPE_IMG
- en: Image by author
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
- en: So, the agent found an answer in one step and wrote Python code to calculate
    the number of combinations.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
- en: The output is quite helpful, but we can go even deeper and look at the complete
    information related to execution (including prompts), via `agent.memory.steps`.
    Let’s look at the system prompt used by the agent.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  id: totrans-47
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'It’s pretty clear that smolagents implements the ReAct approach (introduced
    in the paper by Yao et al. [“ReAct: Synergizing Reasoning and Acting in Language
    Models”](https://arxiv.org/abs/2210.03629)) and uses a few-shot prompting technique.'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
- en: 'The smolagents library handles all behind-the-scenes work involved in the agent
    workflow: assembling the system prompt with all necessary information for the
    LLM (i.e. available tools), parsing the output and executing the generated code.
    It also provides comprehensive logging and a retry mechanism to help correct mistakes.'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
- en: Additionally, the library offers memory management features. By default, all
    execution results are saved to memory, but you can customise this behaviour. For
    example, you can remove some intermediary results from the memory to reduce the
    number of tokens or execute the agent step-by-step. While we won’t dive deep into
    memory management here, you can find handy code examples in [the documentation](https://huggingface.co/docs/smolagents/tutorials/memory).
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
- en: Security
  id: totrans-51
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now, it’s time to discuss the drawbacks of the code agents’ approach. Giving
    an LLM more agency by allowing it to execute arbitrary code introduces higher
    risks. Indeed, an LLM can run harmful code either by mistake (since LLMs are still
    far from perfect) or due to targeted attacks like prompt injections or compromised
    models.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
- en: 'To mitigate these risks, the local Python executor implemented in the smolagents
    library has a bunch of safety checks:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
- en: By default, imports are not allowed unless the package has been explicitly added
    to `additional_authorized_imports` list.
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Moreover, submodules are blocked by default, so you must authorise them specifically
    (i.e. `numpy.*` ). It’s been done because some packages can expose potentially
    harmful submodules, i.e. `random._os` .
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The total number of executed operations is capped, preventing infinite loops
    and resource bloating.
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Any operation not explicitly defined in the interpreter will raise an error.
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Let’s test whether these safety measures actually work.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  id: totrans-59
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: It seems we have some safety nets with code agents. However, despite these safeguards,
    risks persist when you’re executing code locally. For example, an LLM can recursively
    create threads on your computer or create too many files, leading to resource
    bloating. A possible solution is to execute code in a sandboxed environment, such
    as using Docker or solutions like [E2B](https://e2b.dev/). I’m willing to be adventurous
    and run my code locally, but if you prefer a more risk-averse approach, you can
    follow the sandbox set-up guidance in [the documentation](https://huggingface.co/docs/smolagents/tutorials/secure_code_execution).
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
- en: Code agent vs traditional Tool-Calling agent
  id: totrans-61
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: It’s claimed that the code agents perform better compared to the traditional
    JSON-based approach. Let’s put this to the test.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
- en: 'I will use the task of metrics change analysis that I described in my previous
    article, [“Making sense of KPI changes”](https://towardsdatascience.com/making-sense-of-kpi-changes/).
    We will start with a straightforward case: analysing a simple metric (revenue)
    split by one dimension (country).'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  id: totrans-64
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: '![](../Images/565b6881c80524ccfe3d857514571825.png)'
  id: totrans-65
  prefs: []
  type: TYPE_IMG
- en: Image by author
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
- en: 'The smolagents library supports two classes, which we can use to compare two
    approaches:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
- en: '[CodeAgent](https://huggingface.co/docs/smolagents/v1.14.0/en/reference/agents#smolagents.CodeAgent) — an
    agent that acts by generating and executing code,'
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[ToolCallingAgent](https://huggingface.co/docs/smolagents/v1.14.0/en/reference/agents#smolagents.ToolCallingAgent) — a
    traditional JSON-based agent.'
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Our agents will need some tools, so let’s implement them. There are [multiple
    options to create tools](https://huggingface.co/docs/smolagents/tutorials/tools)
    in smolagents: we can re-use LangChain tools, download them from HuggingFace Hub
    or simply create Python functions. We will take the most straightforward approach
    by writing a couple of Python functions and annotating them with `@tool`.'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
- en: 'I will create two tools: one to estimate the relative difference between metrics,
    and another to calculate the sum of a list. Since LLM will be using these tools,
    providing detailed descriptions is crucial.'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  id: totrans-72
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: '*Teaser: I will later realise that I should have provided more tools to the
    agent, but I genuinely overlooked them.*'
  id: totrans-73
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: CodeAgent
  id: totrans-74
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Let’s start with a CodeAgent. I’ve initialised the agent with the tools we defined
    earlier and authorised the usage of some Python packages that might be helpful.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  id: totrans-76
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Overall, the code agent completed the task in just two steps, using only 5,451
    input and 669 output tokens. The result also looks quite plausible.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  id: totrans-78
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: Let’s take a look at the execution flow. The LLM received the following prompt.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  id: totrans-80
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: In the first step, the LLM generated a dataframe and performed all calculations.
    Interestingly, it chose to write all the code independently rather than using
    the provided tools.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
- en: Even more surprisingly, the LLM recreated the dataframe based on the input data
    instead of referencing it directly. This approach is not ideal (especially when
    working with massive datasets), as it can lead to errors and higher token usage.
    This behaviour could potentially be improved by using a more explicit system prompt.
    Here’s the code the agent executed in the first step.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  id: totrans-83
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: In the second step, the LLM simply constructed the final answer by referring
    to the variables calculated at the previous step (which is really neat).
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  id: totrans-85
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: It worked pretty well.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
- en: ToolCallingAgent
  id: totrans-87
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now, it’s time to see how traditional tool-calling agents can tackle this problem.
    We initialised it in a similar manner and ran the task.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  id: totrans-89
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: 'The results are far from ideal: only the relative changes are correct, while
    the rest of the numbers are pure hallucinations. I have to admit, the core issue
    was the lack of appropriate tools (specifically, tools to calculate differences
    and to estimate shares). However, the agent should have flagged missing tools
    rather than generating random numbers.'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  id: totrans-91
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: 'In terms of resource usage, the tool-calling agent performed significantly
    worse: 12 steps, with 29,201 input and 1,695 output tokens. So, code agents clearly
    offer cost savings when it comes to agent execution.'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
- en: Let’s dig a bit deeper to understand what the agent actually did. First, it
    took four iterations just to figure out how to call `calculate_sum` correctly
    and estimate the total revenue before and after.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  id: totrans-94
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: The next seven steps were spent calculating the relative metric changes using
    the `calculate_metric_increase` tool.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  id: totrans-96
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: In the end, the agent put together a final call.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
- en: 'So, if the LLM had had tools to calculate the absolute difference and the share
    of the sum, it would have taken an additional 14 iterations and even more tokens.
    Of course, we can prevent such inefficiencies by carefully designing the tools
    we provide:'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
- en: We could modify our functions to work with lists of values instead of single
    items, which would significantly reduce the number of steps.
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Additionally, we could create more complex functions that calculate all necessary
    metrics at once (similar to what the code agent did). This way, LLM wouldn’t need
    to perform calculations step-by-step. However, this approach might reduce the
    flexibility of the system.
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Even though the results weren’t ideal due to a poor choice of tools, I still
    find this example quite insightful. It’s clear that code agents are more powerful,
    cost-efficient and flexible as they can invent their own comprehensive tools and
    perform multiple actions in a single step.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
- en: '*You can find the complete code and execution logs on [GitHub](https://github.com/miptgirl/miptgirl_medium/blob/main/growth_narrative_llm_agent/code_agents_mvp.ipynb).*'
  id: totrans-102
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*您可以在[GitHub](https://github.com/miptgirl/miptgirl_medium/blob/main/growth_narrative_llm_agent/code_agents_mvp.ipynb)上找到完整的代码和执行日志。*'
- en: Summary
  id: totrans-103
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: We’ve learned a lot about the code agents. Now, it’s time to wrap things up
    with a quick summary.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 我们对代码代理有了很多了解。现在，是时候通过一个简要总结来总结一下了。
- en: Code agents are LLM agents that “think” and act using Python code. Instead of
    calling tools via JSON, they generate and execute actual code. It makes them more
    flexible and cost-efficient as they can invent their own comprehensive tools and
    perform multiple actions in a single step.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 代码代理是使用Python代码“思考”和行动的LLM代理。它们不是通过JSON调用工具，而是生成并执行实际的代码。这使得它们更加灵活且成本效益高，因为它们可以发明自己的综合工具并在单步中执行多个操作。
- en: HuggingFace has brought this approach to life in their framework, smolagents.
    Smolagents makes it easy to build quite complex agents without much hassle, while
    also providing safety measures during the code execution.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: HuggingFace在其框架smolagents中实现了这一方法。Smolagents使得构建相当复杂的代理变得容易，同时也在代码执行过程中提供了安全措施。
- en: In this article, we’ve explored the basic functionality of the smolagents library.
    But there’s a lot more to it. In the next article, we will dive into more advanced
    features (like multi-agent setup and planning steps) to build the agent that can
    narrate KPI changes. Stay tuned!
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
