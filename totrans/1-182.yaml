- en: How to Build Guardrails for Effective Agents
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何构建有效代理的防护栏
- en: 原文：[https://towardsdatascience.com/how-to-build-guardrails-for-effective-agents/](https://towardsdatascience.com/how-to-build-guardrails-for-effective-agents/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/how-to-build-guardrails-for-effective-agents/](https://towardsdatascience.com/how-to-build-guardrails-for-effective-agents/)
- en: <mdspan datatext="el1760743599765" class="mdspan-comment">AI agents are becoming</mdspan>
    increasingly prevalent in a lot of applications. However, integrating agents into
    your application is a lot more than just giving an LLM access to all data and
    functions. You also need to build effective guardrails that ensure the agent only
    has access to relevant data and prevent misuse of functions. You need to do this,
    while also ensuring the model can work effectively with access to necessary data,
    and utilize as many functions as possible, without needing a human in the loop.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1760743599765" class="mdspan-comment">AI代理在许多应用中变得越来越普遍。然而，将代理集成到你的应用中不仅仅是给LLM访问所有数据和功能。你还需要构建有效的防护栏，确保代理只能访问相关的数据，并防止功能被滥用。你需要这样做，同时确保模型可以有效地访问必要的数据，并尽可能多地利用功能，而不需要人类在回路中。
- en: 'My goal for this article is to highlight, on a high level, how to build effective
    agentic guardrails to ensure your agent only has access to necessary data and
    functions while maintaining a good user experience, for example, minimizing the
    number of times a human has to approve an agent’s access. I’ll first discuss why
    guardrails are so important, before I move into a crucial component of guardrails:
    fine-grained authorization. Next, I’ll discuss building guardrails for your data,
    and continue covering guardrails for functions.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 我写这篇文章的目标是在高层次上强调如何构建有效的代理防护栏，以确保你的代理只能访问必要的数据，同时保持良好的用户体验，例如，最小化人类批准代理访问的次数。我首先将讨论为什么防护栏如此重要，然后我将进入防护栏的一个关键组成部分：细粒度授权。接下来，我将讨论为你的数据构建防护栏，并继续介绍功能防护栏。
- en: '![](../Images/cfe2e816d754312bd89f83f31e959ce7.png)'
  id: totrans-4
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/cfe2e816d754312bd89f83f31e959ce7.png)'
- en: This infographic highlights the main topics of this article. I’ll discuss fine-grained
    authorization, guardrails for data, and guardrails for functions, which are all
    essential topics when discussing guardrails for AI agents. Image by Google Gemini.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 这张信息图表突出了本文的主要主题。我将讨论细粒度授权、数据防护栏和功能防护栏，这些都是讨论AI代理防护栏时的关键主题。图片由Google Gemini提供。
- en: Why you need guardrails for your agents
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么你需要为你的代理设置防护栏
- en: First, I want to describe why we need guardrails for AI agents. You could, in
    theory, just give the agent access to all databases and functions in your applications,
    right?
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我想描述为什么我们需要为AI代理设置防护栏。从理论上讲，你完全可以给代理访问你应用中所有数据库和功能，对吧？
- en: There are multiple reasons guardrails are necessary. The main reason is to prevent
    the agent from performing any undesired actions, such as deleting database tables.
    Furthermore, you also need to ensure agents only have access to data within a
    scope, for example, ensuring that an agent used by one customer cannot use the
    data from another customer.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 有多个原因说明为什么需要防护栏。主要原因是为了防止代理执行任何不希望的操作，例如删除数据库表。此外，你还需要确保代理只能访问特定范围内的数据，例如，确保一个客户使用的代理不能使用另一个客户的数据。
- en: Some guardrails can be set up automatically and never need human involvement.
    Database access is on such a guardrail, where you set the scope an agent operates
    in (for example, within a customer), and only allow the agent access to that customer’s
    data. Other guardrails, however, need human interaction. Imagine if an agent wants
    to run a command, how do we make sure the agent is not performing a destructive
    action (like deleting a database table), and the user allows the command?
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 一些防护栏可以自动设置，并且永远不需要人类介入。数据库访问就是这样一种防护栏，你设置代理操作的范围（例如，在客户内部），并且只允许代理访问该客户的数据。然而，其他防护栏则需要人类交互。想象一下，如果代理想要运行一个命令，我们如何确保代理不会执行破坏性操作（如删除数据库表），并且用户允许该命令？
- en: In these scenarios, we have a human-in-the-loop, where the agent asks for permission
    to perform a specific action. If the user allows it, the agent can continue, and
    if it’s not allowed, the agent has to decide on a different course of action.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 在这些场景中，我们有一个人类在回路中，代理会请求执行特定操作的许可。如果用户允许，代理可以继续，如果不允许，代理必须决定采取不同的行动。
- en: Fine-grained permissions
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 细粒度权限
- en: 'A likely requirement for working with agents is to have fine-grained permissions.
    This means you can easily check if a function, or some data, is available within
    a certain scope, such as:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
- en: Does this customer 1 have access to database table A?
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Does user 2 have access to function B?
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Does organization 3 have access to function C?
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It’s crucial that you have fine-grained authorization implemented in your application.
    There are numerous providers out there offering this functionality.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: When you have fine-grained authorization implemented, you have to implement
    it into all functions in your applications, and handle both the scenario where
    access is granted and where access is denied. If access is denied, for example,
    you might consider adding a message stating that you need to ask an admin for
    a specific access level to be able to perform a certain action.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
- en: Agentic guardrails for data
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: After you’ve implemented fine-grained permissions, we can start discussing guardrails
    around your data. It’s important that your agent has access to as much data as
    possible to effectively answer user questions. You then need to balance this with
    the fact that the agent shouldn’t access restricted data, or fetch unnecessary
    information it doesn’t need to answer the user query
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: Access to restricted data
  id: totrans-20
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Restricting access to data for your agents is mostly up to the fine-grained
    authorization. In your functions that perform data search (database lookup, bucket
    retrieval, …), you should check the user’s access scope first.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: Furthermore, you should also consider informing your agent in the prompt what
    it’s allowed to do. Having the agent try to access data and then being denied
    access for whatever reason will be costly, both with regard to token usage and
    time-wise.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: Avoid fetching unnecessary information
  id: totrans-23
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: If you give your agent access to all database tables and data buckets, you might
    experience issues where the agents have too many options, and it will be challenging
    for the agent to pick the correct document table and fields. This is also a topic
    I discussed recently in [my article about building tools for effective agent](https://towardsdatascience.com/how-to-build-tools-for-ai-agents/)s.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
- en: To solve this problem, I would focus on only informing the agent of relevant
    information sources. If the agent is working on a task that you know can be solved
    only using database A, you should consider only informing the agent about database
    A, and leaving all other databases out of the agents prompt. This, of course,
    assumes that you know which data is potentially relevant for the agent to answer
    queries.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
- en: Agentic guardrails for functions
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'I think the topic of building agentic guardrails for functions is even more
    interesting. The reason is that there is a lot of elements to consider when building
    these guardrails:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
- en: How do you prevent destructive actions?
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How do you minimize human-in-the-loop interactions?
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How do you prevent destructive actions
  id: totrans-30
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The most important subtopic on function guardrails is preventing destructive
    actions. To solve this, you should mark all functions on whether they perform
    **irreversible actions**. For example
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 函数护栏最重要的子主题是防止破坏性行为。为了解决这个问题，您应该在所有函数上标记它们是否执行 **不可逆操作**。例如
- en: Deleting a database table is irreversible (you can, of course, load a backup,
    but this requires some work)
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 删除数据库表是不可逆的（当然，您可以加载备份，但这需要一些工作）
- en: Reading from a table has no destructive impact
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从表中读取没有破坏性影响
- en: If the agent performs an easily reversible action (it can be reversed with the
    click of an undo button), or an action that has no destructive impact, you can
    likely just allow the agent to run the function.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 如果代理执行的是容易恢复的操作（可以通过点击撤销按钮恢复），或者没有破坏性影响的操作，您可能只需允许代理运行该函数。
- en: If a function performs an irreversible action, however, you should inform the
    agent of such, and likely prompt the human user if the agent can perform this
    action.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 如果一个函数执行不可逆的操作，那么你应该通知代理，并且如果代理可以执行此操作，可能还需要提示人类用户。
- en: How do you minimize human-in-the-loop interactions
  id: totrans-36
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 如何最小化人工交互
- en: Naturally, you want to prevent destructive actions. However, you also don’t
    want to bother the user too much by prompting them if the agent can perform an
    action or not.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 自然地，您想防止破坏性行为。然而，您也不希望因为提示代理是否可以执行操作而过多地打扰用户。
- en: 'A great approach to minimizing human interactions is to perform function whitelisting,
    such as what Cursor does for running terminal commands: The first time Cursor
    wants to perform a command, such as:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 最小化人工交互的一个很好的方法是执行函数白名单，例如Cursor为运行终端命令所做的那样：Cursor第一次想要执行命令时，例如：
- en: cd into a folder
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 进入文件夹
- en: Run *pytest tests*
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 运行 *pytest 测试*
- en: move a file from one location to another
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将文件从一个位置移动到另一个位置
- en: 'Cursor will prompt the user if it’s allowed to perform a command. You can then
    choose one of the three options below:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 光标会提示用户是否允许执行命令。然后您可以选择以下三个选项之一：
- en: Deny the request
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 拒绝请求
- en: Accept the request (one-time)
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 接受请求（一次性）
- en: Whitelist the command (accept the request now, and going forward)
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 白名单命令（现在接受请求，并继续）
- en: Whitelisting works well because you ensure the user allows the agent to run
    a function or command, but you don’t have to bother them anymore about that exact
    function going forward. Still, whitelisting has a downside that some commands
    can’t be whitelisted, considering a user has to review the context every time
    the agent suggests running some functions (such as deleting a database table)
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 白名单效果很好，因为您确保用户允许代理运行一个函数或命令，但您不必再为此特定的函数打扰他们。尽管如此，白名单也有一个缺点，即某些命令不能被白名单，因为每次代理建议运行某些函数（如删除数据库表）时，用户都必须审查上下文。
- en: Conclusion
  id: totrans-47
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this high-level article, I’ve discussed how you should approach building
    agentic applications with regard to guardrails. Guardrails are necessary because
    you need to ensure the agent acts in desired behavior and isn’t allowed to perform
    actions like fetching information that is out of the access scope or performing
    destructive actions without explicit permission from the user. I discussed building
    guardrails for your data and for the functions you make available to your agent.
    I believe guardrails are an important part of agentic application building, which
    should always be kept top-of-mind when building agentic applications. Ensuring
    proper guardrails are in place will make your agents safer to use, which is critical,
    considering that if a user’s trust in the agent is broken, it will be hard to
    recover the trust of the user.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我讨论了在考虑护栏的情况下如何构建代理应用程序。护栏是必要的，因为您需要确保代理以期望的行为行事，并且不允许执行诸如获取超出访问范围的信息或在没有用户明确许可的情况下执行破坏性操作等行为。我讨论了为您的数据和您提供给代理的功能构建护栏。我相信护栏是构建代理应用程序的重要组成部分，在构建代理应用程序时应该始终牢记。确保有适当的护栏将使您的代理更安全，这是至关重要的，因为如果用户的信任被破坏，将很难恢复用户的信任。
