- en: Pharmacy Placement in Urban Spain
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 西班牙城市药店布局
- en: 原文：[https://towardsdatascience.com/pharmacy-placement-in-urban-spain/](https://towardsdatascience.com/pharmacy-placement-in-urban-spain/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/pharmacy-placement-in-urban-spain/](https://towardsdatascience.com/pharmacy-placement-in-urban-spain/)
- en: 1.- <mdspan datatext="el1746663950850" class="mdspan-comment">INTRODUCTION</mdspan>
    AND BACKGROUND.
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1.- <mdspan datatext="el1746663950850" class="mdspan-comment">引言</mdspan>和背景。
- en: 1.1.- INTRODUCTION
  id: totrans-3
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1.1.- 引言
- en: This case study demonstrates the use of geospatial technologies to address a
    business challenge in the development of the pharmacy network in the Community
    of Madrid, Spain. This analysis is based on a project that includes legal, urban
    planning, engineering, administrative law and business considerations, but these
    aspects are outside the scope of this analysis. Here we focus exclusively on the
    application of advanced geospatial technologies, such as OSMnx and NetworkX, to
    overcome the geospatial challenges involved in the deployment of the pharmacy
    network, specifically how to find gaps in the urban pharmacy network where it
    is possible to install a new pharmacy while respecting the legal restrictions
    on the minimum distance between pharmacies.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 本案例研究展示了地理空间技术在解决西班牙马德里社区药店网络发展中的商业挑战方面的应用。该分析基于一个包括法律、城市规划、工程、行政法和商业考虑因素的项目，但这些方面超出了本分析的范围。在这里，我们专注于高级地理空间技术的应用，如OSMnx和NetworkX，以克服药店网络部署中的地理空间挑战，特别是如何在尊重药店之间最低距离法律限制的情况下，找到城市药店网络中的空白区域，以便安装新的药店。
- en: 1.2.- BACKGROUND
  id: totrans-5
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1.2.- 背景
- en: 'The pharmaceutical sector in Spain is regulated by the government with the
    aim of ensuring the supply and dispensing of medicines under appropriate quality
    and price conditions. Within this sector, distribution is affected by numerous
    limitations such as: the ownership, location and technical-economic conditions
    of pharmacies through state laws [1] and numerous regulations of the Autonomous
    Communities. This publication will deal with the limitations regarding location
    in the Autonomous Community of Madrid.'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 西班牙的药品行业由政府监管，目的是确保在适当的质量和价格条件下提供和分发药品。在这个行业内部，分销受到许多限制，如：药店的所有权、位置和技术经济条件通过国家法律[1]和众多自治社区的法规。本出版物将处理马德里自治区关于位置的限制。
- en: In relation to investment in the network of pharmacies in Spain in general,
    and in the Autonomous Community of Madrid in particular, the interesting problem
    of finding suitable locations for setting up a pharmacy arises. Although this
    search for locations can be in new urban areas under development, the most interesting
    is consolidated urban land. This is because the investment maturity period is
    shorter, as there is already a population living in the area, and the population
    density is usually higher than that planned for development areas. However, the
    problem is that in these consolidated urban areas there are already pharmacies
    in operation and the minimum distances between them must be respected by law.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 关于在西班牙（特别是马德里自治区）的药店网络投资，寻找合适的药店位置设置成为一个有趣的问题。尽管这种位置搜索可以在正在开发的新城区进行，但最有趣的是在已经巩固的城市土地上。这是因为投资成熟期较短，因为该地区已经居住着人口，而且人口密度通常高于开发区的计划密度。然而，问题是，在这些巩固的城市区域中，已经存在运营中的药店，并且它们之间的最小距离必须依法得到尊重。
- en: 'The Spanish legal framework for the pharmaceutical sector establishes a minimum
    distance limitation of 250 m between pharmacies in order to locate a pharmacy
    office [2], [3]. This distance should be measured by following a route according
    to the following considerations:'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 西班牙药品行业的法律框架规定了药店之间250米的最低距离限制，以便定位药店办公室[2]，[3]。此距离应按照以下考虑因素沿路线测量：
- en: It should be a route similar to that which a pedestrian would follow.
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 应该是一条类似于行人会走的路线。
- en: It should connect the centres of the fronts of pharmacies, not the entrances
    to pharmacies.
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 应该连接药店前方的中心，而不是药店入口。
- en: In addition, it must be ensured that the distance to public health facilities
    is more than 150 m measured along a pedestrian route.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，必须确保从公共健康设施的距离超过150米，沿步行路线测量。
- en: 'Some issues are highlighted below:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 下面突出了一些问题：
- en: Pharmacies established prior to these laws do not follow these rules, with the
    result that some pharmacies are located at a distance of less than 250m. Despite
    this, there are still urban openings for the location of new pharmacies in areas
    of interest from the point of view of the pharmaceutical business.
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在这些法律之前建立的药店不遵循这些规则，结果是有些药店位于距离小于250米的地点。尽管如此，从药品业务的角度来看，在感兴趣的区域内仍有城市空间可用于新药店的定位。
- en: The existence of these urban openings is not enough and requires additional
    fieldwork to analyse the existence of available properties to house the pharmacy
    in these areas and to study the possibility offered by urban planning to actually
    establish a pharmacy in these areas. This is therefore a first step in the investment
    process.
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这些城市空间的存在不足以满足需求，还需要额外的实地调查来分析这些区域是否有可用的房产来容纳药店，并研究城市规划为在这些区域实际建立药店提供的可能性。因此，这是投资过程中的第一步。
- en: The effectiveness of open-source tools such as OSMnx [4] and NetworkX [5] in
    addressing complex problems related to urban fabric analysis, urban transport
    and mobility has been demonstrated in numerous publications [6]–[8]. **The aim
    of this publication is to present a methodology based on OSMnx and NerworkX to
    reveal potential openings (opportunities) in the urban fabric for the location
    of pharmacies taking into account the legal restrictions.**
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 在众多出版物[6]–[8]中，已经证明了开源工具如OSMnx[4]和NetworkX[5]在解决与城市结构分析、城市交通和流动性相关的复杂问题方面的有效性。**本出版物的目的是提出一种基于OSMnx和NerworkX的方法，以揭示在考虑法律限制的情况下，城市结构中潜在的开放空间（机会）。**
- en: NetworkX is a Python library designed for the application of graph theory [9]
    to analyse complex networks of relationships. It operates through a complicated
    framework of objects, where the basic elements are *nodes*, which are interconnected
    by *edges*, representing relationships between nodes. This tool is extensively
    employed in the study, analysis, and resolution of real-world problems, including
    but not limited to geospatial transportation networks, urban geospatial networks,
    and social networks. OSMnx is a specialized open-source python library that utilizes
    OpenStreetMap geospatial data to vectorize the street networks of cities globally
    as NetworkX graphs, facilitating their analysis through Python code. This approach
    is exemplified in [10], where various urban areas worldwide are systematically
    analyzed.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: NetworkX是一个Python库，旨在将图论[9]应用于分析复杂的关系网络。它通过一个复杂的对象框架运行，其中基本元素是*节点*，它们通过*边*相互连接，代表节点之间的关系。这个工具在研究、分析和解决现实世界问题中被广泛使用，包括但不限于地理空间交通网络、城市地理空间网络和社会网络。OSMnx是一个专门的开源Python库，它利用OpenStreetMap地理空间数据将全球城市的街道网络矢量化为NetworkX图，通过Python代码促进其分析。这种方法在[10]中得到例证，其中系统地分析了世界各地的各种城市区域。
- en: Given the numerous variables and alternatives to consider when employing these
    tools to address geospatial challenges, a broad selection of publications on the
    subject has been reviewed. Due to the innovative and rapidly evolving nature of
    these tools, some of these sources are exclusively available through online forums,
    such as [https://stackoverflow.com/](https://stackoverflow.com/), or in web-native
    scientific journals. A key issue that has prompted considerable debate in these
    sources is the method for connecting points of interest (POIs) to the city graphs
    of OSMnx, as discussed in [11] – [12], to enable computations over those graphs
    to solve problems related to the POIs. For the specific case addressed in this
    paper—the localization of pharmacy offices (POIs) in compliance with legal distance
    requirements—a new methodology has been developed to best suit the case, drawing
    on the relevant literature and online resources consulted. This methodology will
    be presented in the methodology section and is anticipated to be applicable to
    similar cases.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 在使用这些工具解决地理空间问题时，需要考虑众多变量和替代方案，因此已经审查了大量关于该主题的出版物。由于这些工具的创新性和快速发展的特性，其中一些资料仅可通过在线论坛，如[https://stackoverflow.com/](https://stackoverflow.com/)，或原生网络科学期刊获取。在这些资料中，一个关键问题引发了相当多的讨论，即如何将兴趣点（POIs）连接到OSMnx的城市图，正如在[11]
    – [12]中讨论的那样，以便对这些图进行计算以解决与POIs相关的问题。对于本文中讨论的特定案例——即符合法律距离要求的药店办公室（POIs）定位——已经开发了一种新的方法来最适合该案例，借鉴了相关文献和在线资源。该方法将在方法部分进行介绍，并预计可适用于类似案例。
- en: 2.- METHOD
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2.- 方法
- en: 'After collecting the necessary data: UTM coordinates of the pharmacies and
    the appropriate OSMnx graph of the city of Madrid, a first phase of this methodology
    consists of projecting the UTM coordinates of the pharmacies onto the OSMnx grid
    of Madrid as nodes. To do this, first, the edges of the OSMnx graph closest to
    each pharmacy will be identified in the “Data Placement on the Grid” phase of
    this methodology. This is done by importing the OSMnx graph without simplifying
    it. This way, all the curved lines of the Madrid urban graph can be approximated
    by several lines of reduced size, suitable for subsequent vector calculation.
    Furthermore, in this case it is necessary to project the UTM coordinates of the
    pharmacy offices, which are usually located inside their establishments, onto
    the OSMnx graph. This is done in the ‘Vector calculation’ phase of the methodology.
    In this way, the location of the midpoints of their façades on the public road
    is approximated.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 在收集必要的数据：药房的UTM坐标和马德里城市的适当OSMnx图之后，这个方法的第一阶段包括将药房的UTM坐标投影到马德里OSMnx网格上作为节点。为此，首先，在“数据放置在网格上”的该方法论阶段，将识别出每个药房最近的OSMnx图的边。这是通过导入未简化的OSMnx图来完成的。这样，所有马德里城市图的弯曲线都可以通过几条较小的线来近似，这些线适合后续的矢量计算。此外，在这种情况下，有必要将药房办公室的UTM坐标投影到OSMnx图上，这些办公室通常位于它们的建筑内部。这是在方法论的“矢量计算”阶段完成的。这样，它们立面中点在公共道路上的位置就被近似了。
- en: Thirdly, once the UTM coordinates of the pharmacies have been projected as nodes
    of the OSMnx graph of the city of Madrid, in the subsequent ‘Grid Overlay’ phase,
    the areas of the network that are less than 250 m from each of the pharmacy-nodes
    are calculated. For this purpose, we do not consider the Euclidean distance but
    the topological distance, according to the walkable urban graph. Thus, n networks
    are obtained, one per pharmacy. Then, all of them are superimposed. Finally, the
    result of this superposition is subtracted from the OSMnx graph of Madrid. The
    result of this subtraction is a new network with the edges that are more than
    250 m away from any pharmacy. Finally, this result is visualised as the final
    solution, since these edges constitute the axes on which a pharmacy office can
    be housed from the topological point of view.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 第三，一旦药房的UTM坐标被投影为马德里城市OSMnx图的节点，在随后的“网格叠加”阶段，计算距离每个药房节点小于250米的网络区域。为此，我们不考虑欧几里得距离，而是根据可步行城市图考虑拓扑距离。因此，获得n个网络，每个药房一个。然后，将它们全部叠加。最后，从这个叠加的结果中减去马德里OSMnx图。这个减法的结果是一个新的网络，其边距离任何药房都超过250米。最后，这个结果被可视化作为最终解决方案，因为这些边构成了从拓扑角度来看可以容纳药房办公室的轴线。
- en: To illustrate this publication and test the methodology, an urban area with
    a very complicated urban fabric has been selected, centred on the Madrid district
    of *Tetuán*, where pharmacies are also very close to each other, as some of them
    have been installed before the inclusion of the distance limitation in the legal
    framework.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 为了说明这篇论文并测试该方法，选择了一个具有非常复杂的城市结构的城市区域，中心位于马德里的*特图安*区，那里的药房也彼此非常接近，因为其中一些药房是在法律框架中包含距离限制之前安装的。
- en: To simplify the initial exposition of the methodology, the minimum legal distance
    condition of 150 m to health centres has been dispensed with, considering only
    the minimum distance between pharmacies as a limiting factor. Once the methodology
    has been explained in its entirety, it will be seen how this condition is easily
    introduced in the ‘discussion’ section.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 为了简化方法论的初始阐述，已经省略了距离医疗中心的最小法定距离150米条件，只考虑药房之间的最小距离作为限制因素。一旦完整地解释了方法论，就会看到这个条件如何容易地在“讨论”部分中引入。
- en: Each phase of the methodology is explained in detail below.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 下面将详细解释方法论的每个阶段。
- en: 2.1.- Data collection
  id: totrans-24
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.1.- 数据收集
- en: 'The Community of Madrid has publicly available data on its pharmacies and health
    centres: addresses, codes, geographic coordinates, pharmacist in charge, etc.
    These data are available on the web [13]. The csv files used in this publication
    have been extracted from it [14]. Since the points to be considered for the calculation
    of distances should be the midpoints of the facades, and not the accesses to the
    pharmacies, it is a better approximation to use the UTM coordinates of the centre
    of the pharmacy establishments and project them onto the OSMnx graph, instead
    of geocoding the addresses of the pharmacies. In this way, the centre of the pharmacy
    establishments can be better approximated. This is particularly important in the
    case of pharmacy premises with long facades or corner facades, where the geolocation
    of the premises is assigned to the entrance and not to the middle point of the
    facade, which is the point referred to in the distance measurement regulation.'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 马德里社区公开了其药房和卫生中心的数据：地址、代码、地理坐标、负责人药师等。这些数据可在网络上找到[13]。本出版物中使用的csv文件已从中提取[14]。由于用于计算距离的点应该是建筑立面的中点，而不是药房的入口，因此使用药房设施中心的UTM坐标并将其投影到OSMnx图上，而不是对药房的地址进行地理编码，是一种更好的近似方法。这样，可以更好地近似药房设施的中心。这在药房有长立面或转角立面的情况下尤为重要，因为场所的地理位置被分配到入口，而不是立面的中间点，这是距离测量规定中提到的点。
- en: 'As for the OSMnx network to be considered, it will be of type ‘walk’ (`network_type=’walk’`)
    [15], which includes all public pedestrian routes in Madrid. Since part of the
    methodology uses vector calculations, the default simplification of the OSMnx
    network is discarded (hence, `simplify= ’False’`) in order to obtain the totality
    of the network nodes [16]. Thus, the curved parts of the network can be approximated
    by straight lines between the ‘nodes’ of the ‘edges’. With respect to this previous
    publication, in this case, in addition the centre of the pharmacy establishments
    should also be projected onto the OSMnx network. As a conclusion of the above
    discussion, the Madrid graph will be imported as follows in code 1:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 对于要考虑的OSMnx网络，它将是“步行”类型（`network_type=’walk’`）[15]，这包括马德里所有的公共步行路线。由于部分方法使用矢量计算，因此放弃了OSMnx网络的默认简化（因此，`simplify=’False’`），以获得网络节点的全部数据[16]。因此，网络曲线部分可以通过“边”的“节点”之间的直线来近似。与之前的出版物相比，在这种情况下，除了将药房设施的中心投影到OSMnx网络之外，还应将中心投影到OSMnx网络。根据上述讨论的结论，马德里图将按以下方式导入代码1：
- en: '[PRE0]'
  id: totrans-27
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Code 1\. Python 3.11.5.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 代码1. Python 3.11.5。
- en: 2.2.- Data placement on the grid
  id: totrans-29
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.2.- 网格上的数据放置
- en: As explained above, the first step is to identify the edges of the detailed
    version of the OSMnx graph of Madrid that are closest to each pharmacy. This is
    done through the OSMnx distances module, saving the data of each nearest edge
    in the corresponding row of the pharmacies DataFrame, as well as the distance,
    as a check, code 2.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 如上所述，第一步是识别与每个药房最接近的OSMnx图详细版本的边缘。这是通过OSMnx距离模块完成的，将每个最近边缘的数据以及距离（作为检查）保存到药房的DataFrame对应行中，代码2。
- en: '[PRE1]'
  id: totrans-31
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Code 2\. Python 3.11.5\. ‘lon’ and ‘lat’ stand for the geographical coordinates
    Longitude and Latitude.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 代码2. Python 3.11.5。‘lon’和‘lat’分别代表地理坐标经度和纬度。
- en: Although not necessary for the subsequent calculations, the identification of
    the nearest node has also been included for information and quality control purposes.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然对后续计算不是必需的，但为了信息和质量控制的目的，也包含了识别最近节点的步骤。
- en: These are shown below in Fig. 1 for the chosen Madrid pilot environment.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 这些在图1中所示，用于选择的马德里试点环境。
- en: '![](../Images/e45f84a1c870a8dd3aea60c296019813.png)'
  id: totrans-35
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/e45f84a1c870a8dd3aea60c296019813.png)'
- en: Fig. 1\. Data Placement on the grid. UTM coordinates of the pharmacies, blue
    points. Nearest nodes of the graph, red points. Closest edges of the graph, red
    segments. Own elaboration using OSMnx. Data © OpenStreetMap contributors, available
    under the Open Database License
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 图1. 网格上的数据放置。药房的UTM坐标，蓝色点。图的最接近节点，红色点。图的最接近边缘，红色线段。使用OSMnx自行编制。数据©OpenStreetMap贡献者，可在开放数据库许可下获得
- en: 2.3.- Vector calculation
  id: totrans-37
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.3.- 矢量计算
- en: In order to project the pharmacies on the graph of Madrid, it is taken into
    account that what is of interest in this case is to identify the midpoint of their
    façade on the public ways, i.e. on the graph. As mentioned above, in most cases,
    the UTM provided in the Public Administration files refer to a point inside the
    commercial establishment. Therefore, it is necessary to project these points on
    the Madrid graph, transforming them into a new node of the graph. In this case,
    it is not correct to link pharmacies to the graph through an edge, since only
    pedestrian routes on public ways are of interest for distance measurement. So,
    instead, a new node should be created where each pharmacy office is projected
    on the graph, on the nearest edge determined in the previous section.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 为了将药房投影到马德里图的图形上，考虑到在此情况下，重要的是要确定它们立面中点在公共道路上的位置，即图上。如上所述，在大多数情况下，公共行政部门文件中提供的
    UTM 坐标指的是商业设施内部的点。因此，有必要将这些点投影到马德里图上，将它们转换成图的新节点。在这种情况下，通过边将药房链接到图上是不正确的，因为只有公共道路上的步行路线对距离测量感兴趣。因此，相反，应该创建一个新节点，其中每个药房办公室都投影到图上，在上一节确定的最近边上。
- en: 'The projection is performed using the Python library Numpy [17] using the following
    vector calculation, which provides the coordinates of the new P nodes that are
    the projection of each pharmacy on the graph, Fig. 2:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 投影使用 Python 库 Numpy [17] 通过以下向量计算进行，它提供了每个药房在图上的新 P 节点的坐标，图 2：
- en: '![](../Images/b6843ccde790c20d3b48f8b345f6223e.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b6843ccde790c20d3b48f8b345f6223e.png)'
- en: Fig. 2\. Vector calculation scheme. F, pharmacy UTM point. P, projected pharmacy
    node. E[1] and E[2], edge ends. L, is the length of the edge in OSMnx. Own elaboration.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2\. 向量计算方案。F，药房 UTM 点。P，投影药房节点。E[1] 和 E[2]，边端点。L，是 OSMnx 中边的长度。本节自述。
- en: '![](../Images/6a702b7c6cdbc6a5aa0615999b43bb33.png)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6a702b7c6cdbc6a5aa0615999b43bb33.png)'
- en: In the case that “d” or “L[2]” is negative, which could occur due to small differences
    between the lengths of the edges in OSMnx and the projections made using UTM coordinates,
    the node where the pharmacy is projected will be one of the extreme nodes defining
    the edge, depending on which of the two quantities is negative. If “d” is negative,
    then the pharmacy will be projected as “E[1]”; if “L[2]” is negative, then as
    “E[2]”.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 如果“d”或“L[2]”为负，这可能是由于 OSMnx 中边的长度与使用 UTM 坐标进行的投影之间的微小差异造成的，药房投影的节点将是定义边的极端节点之一，具体取决于两个量中的哪一个为负。如果“d”为负，则药房将投影为“E[1]”；如果“L[2]”为负，则投影为“E[2]”。
- en: Thus, a new edge is created that connects this new node with the nodes of the
    nearest edge. Subsequently, the previously determined nearest edge is deleted,
    as it is replaced by the one just created. See code 3.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，创建了一条新边，将这个新节点与最近边的节点连接起来。随后，删除之前确定的最近边，因为它被刚刚创建的边所取代。参见代码 3。
- en: '[PRE2]'
  id: totrans-45
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Code 3\. . Python 3.11.5\. ‘farmacia_nro_soe’ stands for pharmacy code. The
    variables in the beginning (F, E1, E2, d, etc) refer to those in Fig. 2\. The
    other attributes of nodes and edges (‘color’, ‘size’) are intended to highlight
    them in the drawing process.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 代码 3\. . Python 3.11.5\. ‘farmacia_nro_soe’ 代表药房代码。开头（F, E1, E2, d, 等）的变量指的是图
    2 中的那些。节点和边的其他属性（‘color’，‘size’）旨在在绘图过程中突出显示。
- en: The result of this calculation is shown in Fig. 3
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 此计算的结果显示在图 3 中
- en: '![](../Images/a99db100b9acd94c2f964051c05f4c32.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a99db100b9acd94c2f964051c05f4c32.png)'
- en: Fig. 3\. Projected pharmacies as red nodes in the Madrid graph. Own elaboration
    using OSMnx. Data © OpenStreetMap contributors, available under the Open Database
    License
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 图 3\. 马德里图上投影的药房作为红色节点。使用 OSMnx 自述。数据 © OpenStreetMap 贡献者，可在开放数据库许可下获得
- en: 2.4.- Grid overlay.
  id: totrans-50
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.4.- 网格叠加。
- en: 'In this phase we are going to create graphs of 250 m walking distance with
    centre at each of the pharmacy nodes in Madrid: `nx.generators.ego_graph([...],
    radius=250, centre=True, distance=’length‘)`. They are then composed to form a
    larger one containing them all: `MultiGraph.nx.compose_all()`. They are then subtracted
    from the base Madrid graph initially used: `MultiGraph.remove_edges_from()`. This
    graph with the edges and nodes remaining after the subtraction contains edges
    that meet the condition of having all their points located more than 250 m from
    all the other pharmacy nodes, therefore, likely to house a new pharmacy, code
    4.'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个阶段，我们将为马德里每个药房节点创建250米步行距离的图：`nx.generators.ego_graph([...], radius=250,
    centre=True, distance=’length‘)`。然后，它们被组合成包含所有这些图的大图：`MultiGraph.nx.compose_all()`。然后，从最初使用的基马德里图中减去它们：`MultiGraph.remove_edges_from()`。这个减去后的图包含满足所有点都位于所有其他药房节点250米以外的条件的边，因此，可能容纳新药房，代码4。
- en: '[PRE3]'
  id: totrans-52
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Code 4\. . Python 3.11.5\. ‘farmacia_nro_soe’ stands for pharmacy code.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 代码4\. . Python 3.11.5\. ‘farmacia_nro_soe’代表药房代码。
- en: 3.- RESULTS
  id: totrans-54
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3.- 结果
- en: Fig. 4 shows the result of applying the procedure to the set of pharmacies represented
    by the green dots only in an almond-shaped area of the city of Madrid. All edges
    containing points that are less than 250 m away from the given pharmacy network
    have been removed, so that a gap is observed within the illustration. The edges
    that are still present within the gap after the removal are those where it would
    be possible to house a new pharmacy from a topological point of view. Obviously,
    in the actual project it is necessary to check the urban conditions of these ‘edges’,
    as well as the availability of a commercial real estate to house a pharmacy, see
    the following section.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 图4显示了将此程序应用于仅用绿色点表示的位于马德里城市杏仁形区域内的药房集合的结果。所有包含距离给定药房网络小于250米的点的边已被移除，因此在插图内部观察到间隙。在移除后仍存在于间隙内的边是那些从拓扑角度来看可以容纳新药房的边。显然，在实际项目中，有必要检查这些“边”的
    urban conditions，以及容纳药房的商业房地产的可用性，见下一节。
- en: '![](../Images/303d53416355f6eafdb58b1fdafce2ea.png)'
  id: totrans-56
  prefs: []
  type: TYPE_IMG
  zh: '![图4](../Images/303d53416355f6eafdb58b1fdafce2ea.png)'
- en: 'Fig. 4\. Result: the edges where it may be possible to host new pharmacies,
    given a constellation of existing pharmacies as blue dots. The edges of the graph
    located outside the topological distance of 250 m within the given constellation
    of pharmacies, shown as red segments, are possible suitable locations for a pharmacy.
    Grey background: shadows of buildings. Own elaboration using OSMnx. Data © OpenStreetMap
    contributors, available under the Open Database License'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 图4\. 结果：在现有药房（以蓝色点表示）的星座中，可能容纳新药房的边。位于给定药房星座拓扑距离250米之外的图边（以红色段表示）是可能的合适位置。灰色背景：建筑物的阴影。使用OSMnx自行编制。数据©OpenStreetMap贡献者，可在开放数据库许可下获得
- en: 4.- DISCUSSION AND CONCLUSIONS
  id: totrans-58
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4.- 讨论和结论
- en: 4.1.-Graph selection
  id: totrans-59
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.1.-图选择
- en: Given that pharmacy offices in Spain can only be located on public pathways
    and that the 250 m distance limitations between pharmacy offices are measured
    through pedestrian routes, the network type ‘walk’ [15], which includes all public
    pedestrian routes in Madrid, has been chosen as the OSMnx Madrid graph, code 5.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 由于西班牙的药房只能位于公共通道上，并且药房之间的250米距离限制是通过步行路线测量的，因此选择了网络类型“步行”[15]，它包括马德里所有的公共步行路线，作为OSMnx马德里图，代码5。
- en: '[PRE4]'
  id: totrans-61
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Code 5\. Python 3.11.5
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 代码5\. Python 3.11.5
- en: 'In cases different from the one at hand, in which not only public roads are
    useful for the work, but also non-public ones, a graph that includes all of them—both
    public and non-public—could be selected by using the Overpass QL code to specify
    a custom filter [18], code 6:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 在不同的情况下，不仅公共道路对工作有用，非公共道路也有用，可以使用Overpass QL代码通过指定自定义过滤器[18]来选择包括所有这些道路的图——既包括公共道路也包括非公共道路，代码6：
- en: '[PRE5]'
  id: totrans-64
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Code 6\. Python 3.11.5
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 代码6\. Python 3.11.5
- en: 4.2.-Procesing the data.
  id: totrans-66
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.2.-数据处理。
- en: As explained in the introduction, for vector calculation reasons, the “unsimplified”
    OSMnx graph for Madrid has been chosen. However, this means that the number of
    nodes in the NetworkX graph is quite large, namely 465,976, compared to 154,311
    in the simplified network of Madrid. This, together with the complexity of a city
    like Madrid, makes the calculation process described above take quite a long time,
    depending on the hardware used. If there are hardware limitations, there are interesting
    publications worth consulting, which can speed up the calculations of the Python
    engine, as is the case of using the Numba library [11].
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 如引言中所述，由于向量计算的原因，选择了“未简化”的OSMnx图用于马德里。然而，这意味着NetworkX图中的节点数量相当大，即465,976个，与简化后的马德里网络中的154,311个相比。这一点，加上像马德里这样的城市的复杂性，使得上述计算过程需要相当长的时间，这取决于所使用的硬件。如果存在硬件限制，有一些值得咨询的有趣出版物，可以加快Python引擎的计算速度，例如使用Numba库[11]的情况。
- en: 4.3.- The Approximate Nature of the Solution.
  id: totrans-68
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.3.- 解的近似性质。
- en: The range of urban situations related to commercial premises is vast. For example,
    there are commercial premises whose façades are not continuous. In such cases,
    legal regulations require considering the part of the façade that is most relevant
    to each specific case. Even in these situations, the solution is fairly precise.
    However, it remains an approximate solution that serves as a useful starting point
    for a detailed on-site analysis.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 与商业场所相关的城市情况范围很广。例如，有些商业场所的立面不连续。在这种情况下，法律规范要求考虑与每个具体案例最相关的立面部分。即使在这些情况下，解决方案也相当精确。然而，它仍然是一个近似解，可以作为详细现场分析的有用起点。
- en: 4.4.-Simplification.
  id: totrans-70
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.4.- 简化。
- en: For the sake of clarity, so far only the minimum distance limitation between
    pharmacies of 250 m along a pedestrian route has been considered. As indicated
    in section *2.- METHOD*, it is also necessary for a pharmacy to respect a minimum
    distance of 150 m from health centres. Having seen the methodology, this can easily
    be done by adding the health centres of Madrid, publicly available as csv file
    in the web of the Community of Madrid [19]. We proceed with the same methodology
    as in the case of pharmacies to create the graphs containing points located less
    than 150 m from each health centre; in this case `nx.generators.ego_graph([...],
    radius=150, centre=True, distance=’length‘)`. Then, in the ‘Grid Overlay’ phase,
    we superimpose this graph with the one for pharmacies in the `MultiGraph.nx.compose_all()`
    step. Subsequently subtracting this total set from the Madrid city graph.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 为了清晰起见，到目前为止，仅考虑了沿步行路线的药店之间250米的最低距离限制。如*2.- 方法*节中所示，药店还必须遵守距离卫生中心150米的最低距离。在了解了该方法之后，通过添加马德里公共卫生中心（作为马德里自治区网站上的公开csv文件[19]提供）可以轻松实现这一点。我们采用与药店相同的方法来创建包含位于每个卫生中心150米范围内的点的图；在这种情况下使用`nx.generators.ego_graph([...],
    radius=150, centre=True, distance='length')`。然后，在“网格叠加”阶段，我们在`MultiGraph.nx.compose_all()`步骤中将此图与药店的图叠加。随后从马德里城市图中减去这个总集。
- en: 4.5.- Applications other than those relating to consolidated urban land.
  id: totrans-72
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.5.- 除了与巩固的城市土地相关的应用之外。
- en: Although this publication has dealt with the case of locating pharmacies on
    consolidated urban land, NetworkX functionalities in Python can also be used to
    study the best locations for pharmacies in developing urban areas that do not
    yet have urban services and facilities installed. This can be done through centrality
    measures. There are very interesting examples of using centrality measures to
    analyse an urban network, for example in the case of an urban cycling network
    [16]. In the case of pharmacies, the NetworkX “betweenness centrality” measure
    can be an interesting candidate to help determine the most interconnected pedestrian
    routes in a developing urban area, which is a desirable feature to host a pharmacy,
    as they tend to be where most pedestrians circulate. This is the criterion used
    to analyse the improvement points of cycle lane networks in Copenhagen [20]. But
    this is a different problem from the one addressed in this publication, and should
    be dealt with in another publication.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管这篇出版物讨论了在城市集中土地上定位药店的情况，但Python中的NetworkX功能同样可以用来研究尚未安装城市服务和设施的发展中城市地区的最佳药店位置。这可以通过中心性度量来实现。使用中心性度量分析城市网络有许多有趣的例子，例如在分析城市自行车网络的情况下[16]。在药店的情况下，NetworkX的“中介中心性”度量可以是一个有趣的候选指标，有助于确定发展中城市区域中最相互连接的步行路线，这对于药店来说是一个理想的特征，因为它们往往位于大多数行人流动的地方。这是分析哥本哈根自行车道网络改进点的标准[20]。但这与本文所解决的问题不同，应该在另一篇出版物中处理。
- en: 4.6.- Discussion of the outcome.
  id: totrans-74
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.6.- 结果讨论。
- en: 'As indicated in the introduction, the given solution is topological in nature.
    For example, in Fig. 5, the edges highlighted within green squares “a” correspond
    to roads in a very wide street in Madrid, the “*Paseo de La Castellana*”, with
    several lanes at different levels and boulevards, which pedestrians can only access
    through very few zebra crossings following a circuitous route. These ‘edges’ have
    been selected in the computation precisely for this reason: although their Euclidean
    distance to the nearest pharmacies is not large, the actual route a pedestrian
    has to take to reach them is much longer, as they can only be accessed via a few
    zebra crossings following a circuitous route. However, due to urban planning constraints,
    they are not suitable locations for a pharmacy.'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 如引言中所述，所提供的解决方案在本质上具有拓扑性质。例如，在图5中，绿色方框“a”中突出显示的边对应于马德里一个非常宽阔的街道上的道路，“*Paseo
    de La Castellana*”，有多个不同级别的车道和林荫大道，行人只能通过非常少的斑马线和迂回的路线才能进入。这些‘边’正是出于这个原因被选中的：尽管它们到最近药店的欧几里得距离并不大，但行人实际上需要走的路线要长得多，因为他们只能通过几个斑马线和迂回的路线才能到达。然而，由于城市规划的限制，它们并不适合作为药店的地点。
- en: 'As explained above, after identifying the edges that respect the limitation
    of distances between pharmacies following this methodology, it is necessary to
    further analyse them in terms of: availability of commercial real estate in them
    to house a pharmacy and the possibilities offered by urban planning on permitted
    uses and activities on them. An example is the highlighted within green square
    ‘b’. This is a large urban plot belonging to the public water supply company in
    Madrid, ‘*Canal de Isabel II*’, which also functions as a green space in the city.
    In this case, despite having been selected for computation, it is not a suitable
    space to house a pharmacy due to urban planning and ownership issues. Despite
    its Euclidean proximity to the surrounding pharmacies, the computation has selected
    these edges because of their difficult accessibility, as they are surrounded by
    a wall, which requires many detours to enter them following a pedestrian route
    from the surrounding locations.'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 如上所述，在根据这种方法确定了遵守药店之间距离限制的边之后，有必要进一步从以下方面分析它们：其中商业房地产的可用性以容纳药店，以及城市规划在允许使用和活动方面提供的可能性。一个例子是绿色方框“b”中突出显示的。这是一个属于马德里公共供水公司“*Canal
    de Isabel II*”的大型城市地块，它也作为城市中的绿地。在这种情况下，尽管它已被选中进行计算，但由于城市规划和所有权问题，它不是一个适合容纳药店的场所。尽管它与周围药店的欧几里得距离很近，但由于它们被围墙包围，需要绕行许多路线才能从周围地点通过步行路线进入，因此计算选择了这些边，因为它们的可进入性很差。
- en: The selected study area has a high saturation of pharmacies, mainly due to the
    fact that many of them were installed before the regulation of distances between
    pharmacies came into force. In addition, due to the urban chaos of the area, pedestrian
    routes are very circuitous. This means that, despite the high density of pharmacies
    in the urban area, the computation has been able to find gaps that could *a priori*
    house pharmacies. Some of them are inscribed in cyan ellipses and circles, Fig.
    5.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 选择的研究区域药店密度很高，这主要是因为许多药店是在药店间距离规定实施之前安装的。此外，由于该地区的城市混乱，步行路线非常曲折。这意味着，尽管城市区域药店密度很高，但计算仍然能够找到可以预先容纳药店的空隙。其中一些用青色椭圆和圆圈标出，见图5。
- en: '![](../Images/7a6a54b40fa9a326649dc2c12c9e6c74.png)'
  id: totrans-78
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7a6a54b40fa9a326649dc2c12c9e6c74.png)'
- en: Fig. 5\. Special cases. Own elaboration using OSMnx. Data © OpenStreetMap contributors,
    available under the Open Database License
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 图5. 特殊情况。使用OSMnx自行编制。数据© OpenStreetMap贡献者，可在开放数据库许可下使用
- en: 5.- Data Availability and Disclaimer
  id: totrans-80
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 5. 数据可用性和免责声明
- en: 'The datasets utilized in this study are publicly accessible and licensed for
    any use by the Autonomous Community of Madrid, Spain. Street network data was
    sourced from OpenStreetMap © OpenStreetMap contributors, via the OSMnx Python
