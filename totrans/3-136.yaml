- en: 'How to Format Your TDS Draft: A Quick(ish) Guide'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/how-to-format-your-tds-draft-a-quickish-guide/](https://towardsdatascience.com/how-to-format-your-tds-draft-a-quickish-guide/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 'We all know what makes both authors and editors happy: a smooth, streamlined
    publication process where the path from draft to published article is quick and
    painless.'
  prefs: []
  type: TYPE_NORMAL
- en: We also know that many of our contributors—old-timers and new ones alike—might
    not have a lot of experience working with WordPress, the software powering our
    [independent publication](https://towardsdatascience.com/towards-data-science-is-launching-as-an-independent-publication/),
    and specifically with its block editor. We put together this guide to offer you
    concrete pointers, and to address some of the common questions authors have asked
    us. You can read this post from top to bottom (especially if you have zero block-editor
    experience), or jump ahead to the sections that are relevant to your current needs.
  prefs: []
  type: TYPE_NORMAL
