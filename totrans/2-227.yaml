- en: 'Understanding Matrices | Part 2: Matrix-Matrix Multiplication'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/understanding-matrices-part-2-matrix-matrix-multiplication/](https://towardsdatascience.com/understanding-matrices-part-2-matrix-matrix-multiplication/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'In the [first story](https://towardsdatascience.com/understanding-matrices-part-1-matrix-vector-multiplication/)
    [1] of this series, we have:'
  prefs: []
  type: TYPE_NORMAL
- en: Addressed multiplication of a matrix by a vector,
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Introduced the concept of X-diagram for a given matrix,
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Observed behavior of several special matrices, when being multiplied by a vector.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In the current 2nd story, we will grasp the physical meaning of matrix-matrix
    multiplication, understand why multiplication is not a symmetrical operation (i.e.,
    why “*A***B* ≠ *B***A*“), and finally, we will see how several special matrices
    behave when being multiplied over each other.
  prefs: []
  type: TYPE_NORMAL
- en: 'So let’s start, and we’ll do it by recalling the definitions that I use throughout
    this series:'
  prefs: []
  type: TYPE_NORMAL
- en: Matrices are denoted with uppercase (like ‘*A*‘ and ‘*B*‘), while vectors and
    scalars are denoted with lowercase (like ‘*x*‘, ‘*y*‘ or ‘*m*‘, ‘*n*‘).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '|*x*| – is the length of vector ‘*x*‘,'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*rows*(*A*) – number of rows of matrix ‘*A*‘,'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*columns*(*A*) – number of columns of matrix ‘*A*‘.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: The concept of multiplying matrices
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Multiplication of 2 matrices “*A*” and “*B*” is probably the most common operation
    in matrix analysis. A known fact is that “*A*” and “*B*” can be multiplied only
    if “*columns*(*A*) = *rows*(*B*)”. At the same time, “*A*” can have any number
    of rows, and “*B*” can have any number of columns. Cells of the product matrix
    “*C* = *A***B*” are calculated by the following formula:'
  prefs: []
  type: TYPE_NORMAL
- en: \[
  prefs: []
  type: TYPE_NORMAL
- en: \begin{equation*}
  prefs: []
  type: TYPE_NORMAL
- en: c_{i,j} = \sum_{k=1}^{p} a_{i,k}*b_{k,j}
  prefs: []
  type: TYPE_NORMAL
- en: \end{equation*}
  prefs: []
  type: TYPE_NORMAL
- en: \]
  prefs: []
  type: TYPE_NORMAL
- en: 'where “*p* = *columns*(*A*) = *rows*(*B*)”. The result matrix “*C*” will have
    the dimensions:'
  prefs: []
  type: TYPE_NORMAL
- en: '*rows*(*C*) = *rows*(*A*),'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*columns*(*C*) = *columns*(*B*).'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Acting upon the multiplication formula, when calculating “*A***B*” we should
    scan *i*-th row of “*A*” in parallel to scanning *j*-th column of “*B*“, and after
    summing up all the products “*a[i,k]***b[k,j]*” we will have the value of “*c[i,j]*“.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/4ea1b9a5f56fc6e969305d78da7fff01.png)'
  prefs: []
  type: TYPE_IMG
- en: '*The row and the column that should be scanned, to calculate cell “c[i,j]”
    of the product matrix “C = A*B”. Here we scan the 3rd row of “A” and the 2nd column
    of “B”, by which we obtain the value “c[3,2]“.*'
  prefs: []
  type: TYPE_NORMAL
- en: 'Another well-known fact is that matrix multiplication is not a symmetrical
    operation, i.e., “*A***B* ≠ *B***A*“. Without going into details, we can already
    see that when multiplying 2 rectangular matrices:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/acd387aa165f49f7f0cdb2dc4e0e7aa4.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Two matrices “A” and “B”, with sizes 2×4 and 4×2, respectively. Multiplying
    “A*B” will result in a 2×2-sized matrix, while multiplying “B*A” will result in
    a 4×4-sized matrix. The highlighted areas show directions of scans – red areas
    for calculating one cell of “A*B”, and green areas for calculating a cell of “B*A”.*'
  prefs: []
  type: TYPE_NORMAL
- en: For newbies, the fact that matrix multiplication is not a symmetrical operation
    often seems strange, as multiplication defined for almost any other object is
    a symmetrical operation. Another fact that is often unclear is why matrix multiplication
    is performed by such a strange formula.
  prefs: []
  type: TYPE_NORMAL
- en: In this story, I am going to give my answers to both of these questions, and
    not only to them…
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Derivation of the matrices multiplication formula
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Multiplying “*A***B*” should produce such a matrix ‘*C*‘, that:'
  prefs: []
  type: TYPE_NORMAL
- en: '*y* = *C***x* = (*A***B*)**x* = *A**(*B***x*).'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: In other words, multiplying any vector ‘*x*‘ by the product matrix “*C*=*A***B*”
    should result in the same vector ‘*y*‘, which we will receive if at first multiplying
    ‘*B*‘ by ‘*x*‘, and then multiplying ‘*A*‘ by that intermediate result.
  prefs: []
  type: TYPE_NORMAL
- en: 'This already explains why in “*C*=*A***B*“, the condition that “*columns*(*A*)
    = *rows*(*B*)” should be kept. That is because of the length of the intermediate
    vector. Let’s denote it as ‘*t*‘:'
  prefs: []
  type: TYPE_NORMAL
- en: '*t* = *B***x*,'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*y* = *C***x* = (*A***B*)**x* = *A**(*B***x*) = *A***t*.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Obviously, as “*t* = *B***x*“, we will receive a vector ‘*t*‘ of length “|*t*|
    = *rows*(*B*)”. But later, matrix ‘*A*‘ is going to be multiplied by ‘*t*‘, which
    requires ‘*t*‘ to have the length “|*t*| = *columns*(*A*)”. From those 2 facts,
    we can already figure out that:'
  prefs: []
  type: TYPE_NORMAL
- en: '*rows*(*B*) = |*t*| = *columns*(*A*), or'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*rows*(*B*) = *columns*(*A*).'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'In the first story [1] of this series, we have learned the “X-way interpretation”
    of matrix-vector multiplication “*A***x*“. Considering that for “*y* = (*A***B*)*x*“,
    vector ‘*x*‘ goes at first through the transformation of matrix ‘*B*‘, and then
    it continues through the transformation of matrix ‘*A*‘, we can broaden the concept
    of “X-way interpretation” and present matrix-matrix multiplication “*A***B*” as
    2 adjacent X-diagrams:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/aa14aade6c48e469f2e99bcea3598d49.png)'
  prefs: []
  type: TYPE_IMG
- en: '*The transformation of vector ‘x’ (the right stack), passing through the product
    matrix “C=A*B”, from right to left. At first, it passes through matrix ‘B’, and
    an intermediate vector ‘t’ is produced (the middle stack). Then ‘t’ passes through
    the transformation of ‘A’ and the final vector ‘y’ is produced (the left stack).*'
  prefs: []
  type: TYPE_NORMAL
- en: Now, what should a certain cell “*c[i,j]*” of matrix ‘*C*‘ be equal to? From
    part 1 – “matrix-vector multiplication” [1], we remember that the physical meaning
    of “*c[i,j]*” is – how much the input value ‘*x[j]*‘ affects the output value
    ‘*y[i]*‘. Considering the picture above, let’s see how some input value ‘*x[j]*‘
    can affect some other output value ‘*y[i]*‘. It can affect through the intermediate
    value ‘*t[1]*‘, i.e., through arrows “*a[i,1]*” and “*b[1,j]*“. Also, the affection
    can take place through the intermediate value ‘*t[2]*‘, i.e., through arrows “*a[i,2]*”
    and “*b[2,j]*“. Generally, the affection of ‘*x[j]*‘ on ‘*y[i]*‘ can take place
    through any value ‘*t[k]*‘ of the intermediate vector ‘*t*‘, i.e., through arrows
    “*a[i,k]*” and “*b[k,j]*“.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d52a979ccd60246815ea5a36525b6a28.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Illustration of all possible ways in which the input value ‘x[2]‘ can influence
    the output value ‘y[3]‘. The influence can go through intermediate value ‘t[1]‘
    (as “a[3,1]*b[1,2]“), as well as through intermediate value ‘t[2]‘ (as “a[3,2]*b[2,2]“),
    or any other k-th value of the intermediate vector ‘t’ (as “a[3,k]*b[k,2]“). All
    4 possible ways are highlighted here in red.*'
  prefs: []
  type: TYPE_NORMAL
- en: 'So there are ‘*p*‘ possible ways in which the value ‘*x[j]*‘ influences ‘*y[i]*‘,
    where ‘*p*‘ is the length of the intermediate vector: “*p* = |*t*| = |*B***x*|”.
    The influences are:'
  prefs: []
  type: TYPE_NORMAL
- en: \[\begin{equation*}
  prefs: []
  type: TYPE_NORMAL
- en: \begin{matrix}
  prefs: []
  type: TYPE_NORMAL
- en: a_{i,1}*b_{1,j}, \\
  prefs: []
  type: TYPE_NORMAL
- en: a_{i,2}*b_{2,j}, \\
  prefs: []
  type: TYPE_NORMAL
- en: a_{i,3}*b_{3,j}, \\
  prefs: []
  type: TYPE_NORMAL
- en: \dots \\
  prefs: []
  type: TYPE_NORMAL
- en: a_{i,p}*b_{p,j}
  prefs: []
  type: TYPE_NORMAL
- en: \end{matrix}
  prefs: []
  type: TYPE_NORMAL
- en: \end{equation*}\]
  prefs: []
  type: TYPE_NORMAL
- en: 'All those ‘*p*‘ influences are independent of each other, which is why in the
    formula of matrices multiplication they participate as a sum:'
  prefs: []
  type: TYPE_NORMAL
- en: \[\begin{equation*}
  prefs: []
  type: TYPE_NORMAL
- en: c_{i,j} =
  prefs: []
  type: TYPE_NORMAL
- en: a_{i,1}*b_{1,j} + a_{i,2}*b_{2,j} + \dots + a_{i,p}*b_{p,j} =
  prefs: []
  type: TYPE_NORMAL
- en: \sum_{k=1}^{p} a_{i,k}*b_{k,j}
  prefs: []
  type: TYPE_NORMAL
- en: \end{equation*}\]
  prefs: []
  type: TYPE_NORMAL
- en: 'This is my visual explanation of the matrix-matrix multiplication formula.
    By the way, interpreting “*A***B*” as a concatenation of X-diagrams of “*A*” and
    “*B*” explicitly shows why the condition “*columns*(*A*) = *rows*(*B*)” should
    be held. That’s simple, because otherwise it will not be possible to concatenate
    the two X-diagrams:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/93bca12249780e5166075e77ba3031bb.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Trying to multiply such two matrices “C” and “D”, where “columns(C) ≠ rows(D)”.
    Their X-diagrams will just not match each other, and can’t be concatenated.*'
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Why is it that “A*B ≠ B*A”
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Interpreting matrix multiplication “*A***B*” as a concatenation of X-diagrams
    of “*A*” and “*B*” also explains why multiplication is not symmetrical for matrices,
    i.e., why “*A***B* ≠ *B***A*“. Let me show that on two certain matrices:'
  prefs: []
  type: TYPE_NORMAL
- en: \[\begin{equation*}
  prefs: []
  type: TYPE_NORMAL
- en: A =
  prefs: []
  type: TYPE_NORMAL
- en: \begin{bmatrix}
  prefs: []
  type: TYPE_NORMAL
- en: 0 & 0 & 0 & 0 \\
  prefs: []
  type: TYPE_NORMAL
- en: 0 & 0 & 0 & 0 \\
  prefs: []
  type: TYPE_NORMAL
- en: a_{3,1} & a_{3,2} & a_{3,3} & a_{3,4} \\
  prefs: []
  type: TYPE_NORMAL
- en: a_{4,1} & a_{4,2} & a_{4,3} & a_{4,4}
  prefs: []
  type: TYPE_NORMAL
- en: \end{bmatrix}
  prefs: []
  type: TYPE_NORMAL
- en: ',\ \ B ='
  prefs: []
  type: TYPE_NORMAL
- en: \begin{bmatrix}
  prefs: []
  type: TYPE_NORMAL
- en: b_{1,1} & b_{1,2} & 0 & 0 \\
  prefs: []
  type: TYPE_NORMAL
- en: b_{2,1} & b_{2,2} & 0 & 0 \\
  prefs: []
  type: TYPE_NORMAL
- en: b_{3,1} & b_{3,2} & 0 & 0 \\
  prefs: []
  type: TYPE_NORMAL
- en: b_{4,1} & b_{4,2} & 0 & 0
  prefs: []
  type: TYPE_NORMAL
- en: \end{bmatrix}
  prefs: []
  type: TYPE_NORMAL
- en: \end{equation*}\]
  prefs: []
  type: TYPE_NORMAL
- en: 'Here, matrix ‘*A*‘ has its upper half filled with zeroes, while ‘*B*‘ has zeroes
    on its right half. Corresponding X-diagrams are:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/9233a9a0f4de5cf5a2a2a0fbef5dd091.png)'
  prefs: []
  type: TYPE_IMG
- en: '*The X-diagrams which correspond to the matrices “A” and “B” mentioned above.
    Note, for the zero-cells, we just don’t draw corresponding arrows.'
  prefs: []
  type: TYPE_NORMAL
- en: The fact that ‘A’ has zeroes on its upper rows results in the upper items of
    its left stack being disconnected.
  prefs: []
  type: TYPE_NORMAL
- en: The fact that ‘B’ has zeroes on its right columns results in the lower items
    of its right stack being disconnected.*
  prefs: []
  type: TYPE_NORMAL
- en: What will happen if trying to multiply “*A***B*“? Then A’s X-diagram should
    be placed to the left of B’s X-diagram.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/81a64798c3b8e3d32fe137baf0348e79.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Concatenation of X-diagrams of “A” and “B”, corresponding to “A*B”. There
    are 4 pairs of left and right items, which actually can influence each other.
    An example pair (y*[*3*]*, x*[*1*]*) is highlighted.*'
  prefs: []
  type: TYPE_NORMAL
- en: Having such a placement, we see that input values ‘*x*[1]‘ and ‘*x*[2]‘ can
    affect both output values ‘*y*[3]‘ and ‘*y*[4]‘. Particularly, this means that
    the product matrix “*A***B*” is non-zero.
  prefs: []
  type: TYPE_NORMAL
- en: \[
  prefs: []
  type: TYPE_NORMAL
- en: \begin{equation*}
  prefs: []
  type: TYPE_NORMAL
- en: A*B =
  prefs: []
  type: TYPE_NORMAL
- en: \begin{bmatrix}
  prefs: []
  type: TYPE_NORMAL
- en: 0 & 0 & 0 & 0 \\
  prefs: []
  type: TYPE_NORMAL
- en: 0 & 0 & 0 & 0 \\
  prefs: []
  type: TYPE_NORMAL
- en: c_{3,1} & c_{3,2} & 0 & 0 \\
  prefs: []
  type: TYPE_NORMAL
- en: c_{4,1} & c_{4,2} & 0 & 0
  prefs: []
  type: TYPE_NORMAL
- en: \end{bmatrix}
  prefs: []
  type: TYPE_NORMAL
- en: \end{equation*}
  prefs: []
  type: TYPE_NORMAL
- en: \]
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, what will happen if we try to multiply these two matrices in the opposite
    order? For presenting the product “*B***A*“, B’s X-diagram should be drawn to
    the left of A’s diagram:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/2c3d1fa8ffc20688e075f5c07bf9ceba.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Concatenation of X-diagrams of “B” and “A”, which corresponds to the product
    “B*A”. This results in two disjoint parts, so there is no way in which any item
    ‘x[j]‘ of the right stack can influence any item ‘y[i]‘ of the left stack.*'
  prefs: []
  type: TYPE_NORMAL
- en: We see that now there is no connected path, by which any input value “*x*[*j*]”
    can affect any output value “*y*[*i*]“. In other words, in the product matrix
    “*B***A*” there is no affection at all, and it is actually a zero-matrix.
  prefs: []
  type: TYPE_NORMAL
- en: \[\begin{equation*}
  prefs: []
  type: TYPE_NORMAL
- en: B*A =
  prefs: []
  type: TYPE_NORMAL
- en: \begin{bmatrix}
  prefs: []
  type: TYPE_NORMAL
- en: 0 & 0 & 0 & 0 \\
  prefs: []
  type: TYPE_NORMAL
- en: 0 & 0 & 0 & 0 \\
  prefs: []
  type: TYPE_NORMAL
- en: 0 & 0 & 0 & 0 \\
  prefs: []
  type: TYPE_NORMAL
- en: 0 & 0 & 0 & 0
  prefs: []
  type: TYPE_NORMAL
- en: \end{bmatrix}
  prefs: []
  type: TYPE_NORMAL
- en: \end{equation*}\]
  prefs: []
  type: TYPE_NORMAL
- en: This example clearly illustrates why order is important for matrix-matrix multiplication.
    Of course, many other examples can also be figured out.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Multiplying chain of matrices
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'X-diagrams can also be concatenated when we multiply 3 or more matrices. As
    an example, for the case of:'
  prefs: []
  type: TYPE_NORMAL
- en: '*G* = *A***B***C*,'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'we can draw the concatenation in the following way:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e35154fed829d7ff009cc63a1ef4b295.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Concatenation of 3 X-diagrams, corresponding to matrices “A”, “B”, and “C”.
    Sizes of the matrices are 4×3, 3×2, and 2×4, respectively. The 2 intermediate
    vectors ‘t’ and ‘s’ are presented with light green and teal items.*'
  prefs: []
  type: TYPE_NORMAL
- en: 'Here we now have 2 intermediate vectors:'
  prefs: []
  type: TYPE_NORMAL
- en: '*t* = *C***x*, and'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*s* = (*B***C*)**x* = *B**(*C**x) = *B***t*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'while the result vector is:'
  prefs: []
  type: TYPE_NORMAL
- en: '*y* = (*A***B***C*)**x* = *A**(*B**(*C***x*)) = *A**(*B***t*) = *A***s*.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The number of possible ways in which some input value “*x[j]*” can affect some
    output value “*y[i]*” grows here by an order of magnitude.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/cc24c87f63e7197227db21b9d2843a71.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Two of six possible ways, highlighted with red and light blue, by which input
    value “x[1]” can influence output value “y[3]“.*'
  prefs: []
  type: TYPE_NORMAL
- en: 'More precisely, the influence of certain “*x[j]*” over “*y[i]*” can come through
    any item of the first intermediate stack “*t*“, and any item of the second intermediate
    stack “*s*“. So the number of ways of influence becomes “|*t*|*|*s*|”, and the
    formula for “*g[i,j]*” becomes:'
  prefs: []
  type: TYPE_NORMAL
- en: \[\begin{equation*}
  prefs: []
  type: TYPE_NORMAL
- en: g_{i,j} = \sum_{v=1}^{|s|} \sum_{u=1}^{|t|} a_{i,v}*b_{v,u}*c_{u,j}
  prefs: []
  type: TYPE_NORMAL
- en: \end{equation*}\]
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Multiplying matrices of special types
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We can already visually interpret matrix-matrix multiplication. In the first
    story of this series [1], we also learned about several special types of matrices
    – the scale matrix, shift matrix, permutation matrix, and others. So let’s take
    a look at how multiplication works for those types of matrices.
  prefs: []
  type: TYPE_NORMAL
- en: Multiplication of scale matrices
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'A scale matrix has non-zero values only on its diagonal:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/6dc150bff44def27a803e838eae5a9b6.png)'
  prefs: []
  type: TYPE_IMG
- en: '*The X-diagram of a 4×4 scale matrix. Every input item “x[i]” can affect only
    the corresponding output item “y[i]“.*'
  prefs: []
  type: TYPE_NORMAL
- en: 'From theory, we know that multiplying two scale matrices results in another
    scale matrix. Why is it that way? Let’s concatenate X-diagrams of two scale matrices:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/082601e1d4ea51165cb5e62200cb688a.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Multiplication of two scale matrices “Q” and “S”, as a concatenation of their
    X-diagrams.*'
  prefs: []
  type: TYPE_NORMAL
- en: The concatenation X-diagram clearly shows that any input item “*x[i]*” can still
    affect only the corresponding output item “*y[i]*“. It has no way of influencing
    any other output item. Therefore, the result structure behaves the same way as
    some other scale matrix.
  prefs: []
  type: TYPE_NORMAL
- en: Multiplication of shift matrices
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A shift matrix is one that, when multiplied over some input vector ‘*x*‘, shifts
    upwards or downwards values of ‘*x*‘ by some ‘*k*‘ positions, filling the emptied
    slots with zeroes. To achieve that, a shift matrix ‘*V*‘ must have 1(s) on a line
    parallel to its main diagonal, and 0(s) at all other cells.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/dcfd1f987091e45e1ad77c117de7e46f.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Example of a shift matrix ‘V’ and its X-diagram. The matrix shifts upwards
    all values of the input vector ‘x’ by 2 positions.*'
  prefs: []
  type: TYPE_NORMAL
- en: 'The theory says that multiplying 2 shift matrices ‘*V1*‘ and ‘*V2*‘ results
    in another shift matrix. Interpretation with X-diagrams gives a clear explanation
    of that. Multiplying the shift matrices ‘*V1*‘ and ‘*V2*‘ corresponds to concatenating
    their X-diagrams:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a4d54b84bfe82d518b11e2082b2b7f89.png)'
  prefs: []
  type: TYPE_IMG
- en: '*The concatenation of X-diagrams of 2 shift matrices ‘V1’ and ‘V2’ behaves
    like another shift matrix, as every value of the input vector ‘x’ is still being
    shifted by a certain number of positions upwards.*'
  prefs: []
  type: TYPE_NORMAL
- en: We see that if shift matrix ‘*V1*‘ shifts values of its input vector by ‘*k1*‘
    positions upwards, and shift matrix ‘*V2*‘ shifts values of the input vector by
    ‘*k2*‘ positions upwards, then the results matrix “*V3* = *V1***V2*” will shift
    values of the input vector by ‘*k1*+*k2*‘ positions upwards, which means that
    “*V3*” is also a shift matrix.
  prefs: []
  type: TYPE_NORMAL
- en: Multiplication of permutation matrices
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'A permutation matrix is one that, when multiplied by an input vector ‘*x*‘,
    rearranges the order of values in ‘*x*‘. To act like that, the *N*x*N*-sized permutation
    matrix ‘*P*‘ must satisfy the following criteria:'
  prefs: []
  type: TYPE_NORMAL
- en: it should have *N* 1(s),
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: no two 1(s) should be on the same row or the same column,
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: all remaining cells should be 0(s).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/1cd4a915922c51261033780fe3f0d353.png)'
  prefs: []
  type: TYPE_IMG
- en: '*An example of a 5×5-sized permutation matrix ‘P’, and corresponding X-diagram.
    We see that values of input vector “(x1, x2, x3, x4, x5)” are being rearranged
    as “(x4, x1, x5, x3, x2)”.*'
  prefs: []
  type: TYPE_NORMAL
- en: Upon theory, multiplying 2 permutation matrices ‘*P1*‘ and ‘*P2*‘ results in
    another permutation matrix ‘*P3*‘. While the reason for this might not be clear
    enough if looking at matrix multiplication in the ordinary way (as scanning rows
    of ‘*P1*‘ and columns of ‘*P2*‘), it becomes much clearer if looking at it through
    the interpretation of X-diagrams. Multiplying “*P1***P2*” is the same as concatenating
    X-diagrams of ‘*P1*‘ and ‘*P2*‘.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/356bee3dcf4896824fc9e529abab2c36.png)'
  prefs: []
  type: TYPE_IMG
- en: '*The concatenation of X-diagrams of permutation matrices ‘P1’ and ‘P2’ behaves
    as another rearrangement of values.*'
  prefs: []
  type: TYPE_NORMAL
- en: We see that every input value ‘*x[j]*‘ of the right stack still has only one
    path for reaching some other position ‘*y[i]*‘ on the left stack. So “*P1***P2*”
    still acts as a rearrangement of all values of the input vector ‘*x*‘, in other
    words, “*P1***P2*” is also a permutation matrix.
  prefs: []
  type: TYPE_NORMAL
- en: Multiplication of triangular matrices
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A triangular matrix has all zeroes either above or below its main diagonal.
    Here, let’s concentrate on upper-triangular matrices, where zeroes are below the
    main diagonal. The case of lower-triangular matrices is similar.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d41d1f3636c8650c6a6a7dd588a80916.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Example of an upper-triangular matrix ‘B’ and its X-diagram.*'
  prefs: []
  type: TYPE_NORMAL
- en: The fact that non-zero values of ‘*B*‘ are either on its main diagonal or above,
    makes all the arrows of its X-diagram either horizontal or directed upwards. This,
    in turn, means that any input value ‘*x[j]*‘ of the right stack can affect only
    those output values ‘*y[i]*‘ of the left stack, which have a lesser or equal index
    (i.e., “*i* ≤ *j*“). That is one of the properties of an upper-triangular matrix.
  prefs: []
  type: TYPE_NORMAL
- en: 'According to theory, multiplying two upper-triangular matrices results in another
    upper-triangular matrix. And here too, interpretation with X-diagrams provides
    a clear explanation of that fact. Multiplying two upper-triangular matrices ‘*A*‘
    and ‘*B*‘ is the same as concatenating their X-diagrams:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/17d01801c252c5f8ee2e2c53963c8c45.png)'
  prefs: []
  type: TYPE_IMG
- en: '*Concatenation of X-diagrams of two upper-triangular matrices ‘A’ and ‘B’.*'
  prefs: []
  type: TYPE_NORMAL
- en: We see that putting two X-diagrams of triangular matrices ‘*A*‘ and ‘*B*‘ near
    each other results in such a diagram, where every input value ‘*x[j]*‘ of the
    right stack still can affect only those output values ‘*y[i]*‘ of the left stack,
    which are either on its level or above it (in other words, “*i* ≤ *j*“). This
    means that the product “*A***B*” also behaves like an upper-triangular matrix;
    thus, it must have zeroes below its main diagonal.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In the current 2nd story of this series, we observed how matrix-matrix multiplication
    can be presented visually, with the help of so-called “X-diagrams”. We have learned
    that doing multiplication “*C* = *A***B*” is the same as concatenating X-diagrams
    of those two matrices. This method clearly illustrates various properties of matrix
    multiplications, like why it is not a symmetrical operation (“*A***B* ≠ *B***A*“),
    as well as explains the formula:'
  prefs: []
  type: TYPE_NORMAL
- en: \[\begin{equation*}
  prefs: []
  type: TYPE_NORMAL
- en: c_{i,j} = \sum_{k=1}^{p} a_{i,k}*b_{k,j}
  prefs: []
  type: TYPE_NORMAL
- en: \end{equation*}\]
  prefs: []
  type: TYPE_NORMAL
- en: We have also observed why multiplication behaves in certain ways when operands
    are matrices of special types (scale, shift, permutation, and triangular matrices).
  prefs: []
  type: TYPE_NORMAL
- en: I hope you enjoyed reading this story!
  prefs: []
  type: TYPE_NORMAL
- en: In the coming story, we will address how matrix transposition “*A^T*” can be
    interpreted with X-diagrams, and what we can gain from such interpretation, so
    subscribe to my page to not miss the updates!
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
