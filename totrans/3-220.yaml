- en: 'When Optimal is the Enemy of Good: High-Budget Differential Privacy for Medical
    AI'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 当最优成为良善的敌人：为医疗人工智能提供高预算差分隐私
- en: 原文：[https://towardsdatascience.com/when-optimal-is-the-enemy-of-good-high-budget-differential-privacy-for-medical-ai/](https://towardsdatascience.com/when-optimal-is-the-enemy-of-good-high-budget-differential-privacy-for-medical-ai/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/when-optimal-is-the-enemy-of-good-high-budget-differential-privacy-for-medical-ai/](https://towardsdatascience.com/when-optimal-is-the-enemy-of-good-high-budget-differential-privacy-for-medical-ai/)
- en: '**Imagine you’re building your dream home.** Just about everything is ready.
    **All that’s left to do is pick out a front door.** Since the neighborhood has
    a low crime rate, you decide you want a door with a standard lock — nothing too
    fancy, but probably enough to deter 99.9% of would-be burglars.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '**想象你正在建造你的梦想家园。**几乎所有事情都准备好了。**剩下的唯一事情就是挑选一扇前门**。由于该地区的犯罪率很低，你决定想要一个标准锁的门窗——不需要太花哨，但可能足以阻止99.9%的潜在窃贼。'
- en: '**Unfortunately, the local homeowners’ association (HOA) has a rule stating
    that all front doors in the neighborhood must be bank vault doors.** Their reasoning?
    Bank vault doors are the only doors that have been mathematically proven to be
    absolutely secure. As far as they’re concerned, any front door below that standard
    may as well not be there at all.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '**不幸的是，当地的业主协会（HOA）有一条规定，即该地区所有前门都必须是银行保险库门。**他们的理由是，银行保险库门是唯一经过数学证明绝对安全的门。在他们看来，任何低于这个标准的门几乎可以忽略不计。'
- en: '**You’re left with three options, none of which seems particularly appealing:**'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: '**你只剩下三个选择，没有一个看起来特别吸引人：**'
- en: '**Concede defeat and have a bank vault door installed.** Not only is this expensive
    and cumbersome, but you’ll be left with a front door that bogs you down every
    single time you want to open or close it. At least burglars won’t be a problem!'
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**放弃并安装银行保险库门。**这不仅昂贵且麻烦，而且每次你想打开或关闭门时都会让你感到不便。至少窃贼不会成为问题！'
- en: '**Leave your house doorless.** The HOA rule imposes requirements on any front
    door in the neighborhood, but it doesn’t *technically* forbid you from not installing
    a door at all. That would save you a lot of time and money. The downside, of course,
    is that it would allow anyone to come and go as they please. On top of that, the
    HOA could always close the loophole, taking you back to square one.'
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**让你的房子没有门。**业主协会规则对社区内的任何前门都提出了要求，但它**技术上**并没有禁止你完全不安装门。这样会节省你很多时间和金钱。当然，缺点是任何人都可以随意进出。更重要的是，业主协会总是可以关闭这个漏洞，让你回到起点。'
- en: '**Opt out entirely.** Faced with such a stark dilemma (all-in on either security
    or practicality), you choose not to play the game at all, selling your nearly-complete
    house and looking for someplace else to live.'
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**完全退出。**面对如此明显的困境（要么完全投入安全，要么投入实用性），你选择不参与游戏，出售你几乎完工的房子，并寻找其他地方居住。'
- en: This scenario is obviously completely unrealistic. In real life, **everybody
    strives to strike an appropriate balance between security and practicality.**
    This balance is informed by everyone’s own circumstances and risk analysis, but
    it universally **lands somewhere between the two extremes of bank vault door and
    no door at all.**
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 这种场景显然是完全不切实际的。在现实生活中，**每个人都努力在安全和实用性之间找到一个合适的平衡**。这种平衡取决于每个人的自身情况和风险评估，但普遍来说，它会在银行保险库门和完全没有门这两个极端之间找到某个位置。
- en: '**But what if instead of your dream home, you imagined a medical AI model that
    has the power to help doctors improve patient outcomes?** Highly-sensitive training
    data points from patients are your valuables. The privacy protection measures
    you take are the front door you choose to install. Healthcare providers and the
    scientific community are the HOA.'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: '**但如果你的梦想不是房子，而是想象一个有力量帮助医生提高患者治疗效果的医疗人工智能模型呢？**来自患者的敏感训练数据点是你的宝贵财富。你采取的隐私保护措施是你选择安装的前门。医疗提供者和科学界是业主协会。'
- en: '**Suddenly, the scenario is much closer to reality. In this article, we’ll
    explore why that is.** After understanding the problem, we’ll consider a simple
    but empirically effective solution proposed in the paper [*Reconciling privacy
    and accuracy in AI for medical imaging*](https://doi.org/10.1038/s42256-024-00858-y)[1].
    The authors propose a **balanced alternative to the three bad choices laid out
    above, much like the real-life approach of a typical front door.**'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: '**突然间，这个场景与现实更加接近。在这篇文章中，我们将探讨这是为什么。**在了解问题之后，我们将考虑论文[*在AI医学成像中协调隐私和准确性*](https://doi.org/10.1038/s42256-024-00858-y)[1]中提出的简单但经验上有效的解决方案。作者提出了一种**平衡的替代方案，类似于现实生活中典型前门的处理方式**。'
- en: '* * *'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: The State of Patient Privacy in Medical AI
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 医疗AI中患者隐私的状态
- en: '**Over the past few years, artificial intelligence has become an ever more
    ubiquitous part of our day-to-day lives, proving its utility across a wide range
    of domains. The rising use of AI models has, however, **raised questions and concerns
    about protecting the privacy of the data used to train them.** You may remember
    the well-known case of ChatGPT, just months after its initial release, [exposing
    proprietary code from Samsung](https://www.forbes.com/sites/siladityaray/2023/05/02/samsung-bans-chatgpt-and-other-chatbots-for-employees-after-sensitive-code-leak/)
    [2].'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: '**在过去几年中，人工智能已经成为我们日常生活中的一个越来越普遍的部分，证明了它在各个领域的实用性。然而，AI模型的使用增加，也引发了关于保护用于训练它们的数据隐私的问题和担忧。**你可能还记得ChatGPT的一个著名案例，就在其最初发布后的几个月，[暴露了三星的专有代码](https://www.forbes.com/sites/siladityaray/2023/05/02/samsung-bans-chatgpt-and-other-chatbots-for-employees-after-sensitive-code-leak/)
    [2]。**'
- en: Some of the privacy risks associated with AI models are obvious. For example,
    if the training data used for a model isn’t stored securely enough, bad actors
    could find ways to access it directly. **Others are more insidious, such as the
    risk of *reconstruction*.** As the name implies, in a [reconstruction attack](https://en.wikipedia.org/wiki/Reconstruction_attack),
    a bad actor attempts to reconstruct a model’s training data without needing to
    gain direct access to the dataset.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 与AI模型相关的某些隐私风险是显而易见的。例如，如果用于模型训练的数据存储不够安全，恶意行为者可能会找到直接访问它的方法。**其他风险则更为隐蔽，例如*重建*的风险。**正如其名所示，在[重建攻击](https://en.wikipedia.org/wiki/Reconstruction_attack)中，恶意行为者试图在不直接访问数据集的情况下重建模型的数据。**
- en: Medical records are one of the most sensitive kinds of personal information
    there are. Although specific regulation varies by jurisdiction, patient data is
    generally subject to stringent safeguards, with hefty fines for inadequate protection.
    **Beyond the letter of the law, unintentionally exposing such data could irreparably
    damage our ability to use specialized AI to empower medical professionals.**
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 医疗记录是存在的一种最敏感的个人隐私信息。尽管具体法规因司法管辖区而异，但患者数据通常受到严格的保护，对保护不力的处罚相当严厉。**除了法律条文之外，无意中泄露此类数据可能会不可修复地损害我们使用专用AI赋能医疗专业人员的的能力。**
- en: As Ziller, Mueller, Stieger, *et al.* point out [1], **fully taking advantage
    of medical AI requires rich datasets comprising information from actual patients.**
    This information must be obtained with the full consent of the patient. Ethically
    acquiring medical data for research was challenging enough as it was before the
    unique challenges posed by AI came into play. But if proprietary code being exposed
    caused Samsung to ban the use of ChatGPT [2], what would happen if attackers managed
    to reconstruct MRI scans and identify the patients they belonged to? **Even isolated
    instances of negligent protection against data reconstruction could end up being
    a monumental setback for medical AI as a whole.**
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 正如Ziller、Mueller、Stieger等[1]指出，**充分利用医疗AI需要包含来自实际患者信息的丰富数据集**。这些信息必须得到患者的完全同意才能获取。在AI带来的独特挑战出现之前，为了研究而道德地获取医疗数据就已经是极具挑战性的。但如果暴露的专有代码导致三星禁止使用ChatGPT[2]，如果攻击者设法重建MRI扫描并识别出属于哪些患者，会发生什么呢？**即使是对数据重建的疏忽保护也可能对整个医疗AI造成巨大的挫折。**
- en: Tying this back into our front door metaphor, the HOA statute calling for bank
    vault doors starts to make a little bit more sense. **When the cost of a single
    break-in could be so catastrophic for the entire neighborhood, it’s only natural
    to want to go to any lengths to prevent them. **
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 将这一点与我们的前门隐喻联系起来，要求银行保险库门的HOA法规开始显得更有道理。**当一次入侵的成本可能对整个社区造成灾难性的影响时，自然想要不择手段地防止它们发生。**
- en: Differential Privacy (DP) as a Theoretical Bank Vault Door
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 差分隐私（DP）作为理论上的银行保险库门
- en: '**Before we discuss what an appropriate balance between privacy and practicality
    might look like in the context of medical AI, we have to turn our attention to
    **the inherent tradeoff between protecting an AI model’s training data and optimizing
    for quality of performance.** This will set the stage for us to develop a basic
    understanding of **differential privacy (DP), the theoretical gold standard of
    privacy protection.**'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '**在讨论医疗人工智能背景下隐私和实用性之间适当平衡可能是什么样子之前，我们必须将注意力转向**保护人工智能模型训练数据与优化性能质量之间的固有权衡**。这将为我们提供一个基本理解**差分隐私（DP），隐私保护的理论黄金标准**的基础。'
- en: 'Although academic interest in training data privacy has increased significantly
    over the past four years, **principles on which much of the conversation is based
    were pointed out by researchers well before the recent LLM boom,** and even before
    OpenAI was founded in 2015\. Though it doesn’t deal with reconstruction *per se*,
    **the 2013 paper**[***Hacking smart machines with smarter ones***](https://doi.org/10.48550/arXiv.1306.4447)
    **[3]** demonstrates a generalizable attack methodology capable of accurately
    **inferring statistical properties of machine learning classifiers,** noting:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管过去四年里对训练数据隐私的学术兴趣显著增加，但**许多对话所基于的原则早在最近大型语言模型（LLM）兴起之前就被研究人员指出了**，甚至在2015年OpenAI成立之前。尽管它本身不涉及重建**，但2013年的论文[***用更智能的机器来破解智能机器***](https://doi.org/10.48550/arXiv.1306.4447)
    **[3]** 展示了一种可推广的攻击方法，能够准确**推断机器学习分类器的统计属性**，并指出：
- en: “Although ML algorithms are known and publicly released, training sets may not
    be reasonably ascertainable and, indeed, may be guarded as trade secrets. While
    much research has been performed about the privacy of the elements of training
    sets, […] we focus our attention on ML classifiers and on the statistical information
    that can be unconsciously or maliciously revealed from them. We show that it is
    possible to infer unexpected but useful information from ML classifiers.” [3]
  id: totrans-21
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “尽管机器学习算法是已知且公开发布的，但训练集可能无法合理确定，实际上，它们可能被视为商业机密。虽然关于训练集元素隐私的研究已经很多，[...] 我们将注意力集中在机器学习分类器以及可以从它们中无意或恶意泄露的统计信息上。我们表明，从机器学习分类器中可以推断出意外但有用的信息。”
    [3]
- en: '**Theoretical data reconstruction attacks were described even earlier,** in
    a context not directly pertaining to machine learning. The landmark 2003 paper
    [***Revealing information while preserving privacy***](https://crypto.stanford.edu/seclab/sem-03-04/psd.pdf)
    [4] demonstrates a **polynomial-time reconstruction algorithm for statistical
    databases.** (Such databases are intended to provide answers to questions about
    their data in aggregate while keeping individual data points anonymous.) The authors
    show that **to mitigate the risk of reconstruction, a certain amount of noise
    needs to be introduced into the data.** Needless to say, perturbing the original
    data in this way, while necessary for privacy, **has implications for the quality
    of the responses to queries,** i.e., the accuracy of the statistical database.'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '**理论上的数据重建攻击甚至更早就有描述**，在一个与机器学习不直接相关的背景下。里程碑式的2003年论文[***在保护隐私的同时揭示信息***](https://crypto.stanford.edu/seclab/sem-03-04/psd.pdf)
    [4] 展示了一种**多项式时间重建算法**，用于统计数据库。（此类数据库旨在提供关于其数据的聚合答案，同时保持单个数据点的匿名性。）作者表明，**为了减轻重建的风险，需要在数据中引入一定量的噪声**。不用说，以这种方式扰动原始数据，虽然对于隐私是必要的，**但对查询响应的质量有影响**，即统计数据库的准确性。'
- en: 'In explaining the purpose of DP in the first chapter of their book [*The Algorithmic
    Foundations of Differential Privacy*](https://www.cis.upenn.edu/~aaroth/Papers/privacybook.pdf)[5],
    Cynthia Dwork and Aaron Roth address this tradeoff between privacy and accuracy:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 在他们书籍《[*算法隐私基础*](https://www.cis.upenn.edu/~aaroth/Papers/privacybook.pdf)[5]》的第一章中解释差分隐私（DP）的目的时，Cynthia
    Dwork 和 Aaron Roth 讨论了隐私和准确率之间的权衡：
- en: '**“[T]he Fundamental Law of Information Recovery states that overly accurate
    answers to too many questions will destroy privacy in a spectacular way.** The
    goal of algorithmic research on differential privacy is to postpone this inevitability
    as long as possible. **Differential privacy addresses the paradox of learning
    nothing about an individual while learning useful information about a population.”**
    [5]'
  id: totrans-24
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**“[T]信息恢复的基本法则指出，对太多问题的过度精确回答将以惊人的方式破坏隐私。”** 差分隐私算法研究的目的是尽可能推迟这种不可避免性。**差分隐私解决了在了解有关人群的有用信息的同时，对个人一无所知的悖论。”**
    [5]'
- en: 'The notion of *“learning nothing about an individual while learning useful
    information about a population”* is captured by considering two datasets that
    differ by a single entry (one that includes the entry and one that doesn’t). **An
    (*ε*, *δ*)-differentially private querying mechanism is one for which the probability
    of a certain output being returned when querying one dataset is at most a multiplicative
    factor of the probability when querying the other dataset.** Denoting the mechanism
    by *M*, the set of possible outputs by *S*, and the datasets by *x* and *y*, we
    formalize this as [5]:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 通过考虑两个仅在一个条目上有所不同的数据集（一个包含该条目，另一个不包含），捕捉了 *“在了解有关人群的有用信息的同时，对个人一无所知”* 的概念。**一个
    (*ε*, *δ*)-差分隐私查询机制是指，当查询一个数据集时，返回特定输出的概率至多是被查询另一个数据集时概率的乘性因子。**用 *M* 表示机制，用 *S*
    表示可能的输出集合，用 *x* 和 *y* 表示数据集，我们将其形式化如下 [5]：
- en: '**Pr[*M*(*x*)** **∈** ***S*] ≤ exp(*ε*)** **⋅** **Pr[*M*(*y*)** **∈** ***S*]
    + *δ***'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: '**Pr[*M*(*x*) **∈** ***S*] ≤ exp(*ε*) **⋅** **Pr[*M*(*y*) **∈** ***S*] + *δ***'
- en: Where ***ε*** is the *privacy loss parameter* and ***δ*** is the *failure probability
    parameter*. *ε* quantifies how much privacy is lost as a result of a query, while
    a positive *δ* allows for privacy to fail altogether for a query at a certain
    (usually very low) probability. Note that *ε* is an exponential parameter, meaning
    that even slightly increasing it can cause privacy to decay significantly.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 ***ε*** 是 *隐私损失参数*，而 ***δ*** 是 *失败概率参数*。*ε* 量化了查询导致隐私损失的程度，而一个正的 *δ* 允许在一定的（通常非常低）概率下，查询完全失去隐私。请注意，*ε*
    是一个指数参数，这意味着即使略微增加它也可能导致隐私显著衰减。
- en: '**An important and useful property of DP is *composition*.** Notice that the
    definition above only applies to cases where we run a single query. The composition
    property helps us generalize it to cover multiple queries based on the fact that
    **privacy loss and failure probability accumulate predictably when we compose
    several queries,** be they based on the same mechanism or different ones. This
    accumulation is easily proven to be (at most) linear [5]. What this means is that,
    **rather than considering a privacy loss parameter for one query, we may view
    *ε* as a *privacy budget* that can be utilized across a number of queries.** For
    example, when taken together, one query using a (1, 0)-DP mechanism and two queries
    using a (0.5, 0)-DP mechanism satisfy (2, 0)-DP.'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: '**DP（差分隐私）的一个重要且有用的特性是 *可组合性***。注意，上述定义仅适用于我们运行单个查询的情况。可组合性特性帮助我们将其推广到涵盖多个查询，基于这样一个事实：当我们组合多个查询时，**隐私损失和失败概率会以可预测的方式累积**，无论这些查询是基于相同的机制还是不同的机制。这种累积很容易被证明（最多）是线性的
    [5]。这意味着，**我们不必考虑单个查询的隐私损失参数，我们可以将 *ε* 视为一个可以在多个查询中使用的 *隐私预算***。例如，当一起考虑时，一个使用
    (1, 0)-DP 机制和一个使用 (0.5, 0)-DP 机制的查询满足 (2, 0)-DP。'
- en: '**The value of DP comes from the theoretical privacy guarantees it promises.**
    Setting *ε* = 1 and *δ* = 0, for example, we find that the probability of any
    given output occurring when querying dataset *y* is at most exp(1) = e ≈ 2.718
    times greater than that same output occurring when querying dataset *x*. Why does
    this matter? Because **the greater the discrepancy between the probabilities of
    certain outputs occurring, the easier it is to determine the contribution of the
    individual entry by which the two datasets differ, and the easier it is to ultimately
    reconstruct that individual entry.**'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: '**DP 的价值来自于它承诺的理论隐私保证**。例如，将 *ε* 设置为 1 和 *δ* 设置为 0，我们发现查询数据集 *y* 时出现任何给定输出的概率至多为
    exp(1) = e ≈ 2.718 倍于查询数据集 *x* 时出现相同输出的概率。这为什么重要？因为 **输出发生的概率差异越大，就越容易确定两个数据集差异的贡献，也就越容易最终重建该个人条目**。'
- en: 'In practice, designing an (*ε*, *δ*)-differentially private randomized mechanism
    entails the **addition of random noise drawn from a distribution dependent on
    *ε* and *δ.*** The specifics are beyond the scope of this article. Shifting our
    focus back to machine learning, though, we find that the idea is the same: DP
    for ML hinges on introducing noise into the training data, which yields robust
    privacy guarantees in much the same way.'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 在实践中，设计一个(*ε*, *δ*)-差分隐私随机机制涉及到**添加从依赖于*ε*和*δ*的分布中抽取的随机噪声**。具体细节超出了本文的范围。然而，将我们的焦点转回机器学习，我们发现这个想法是相同的：DP对于ML的关键在于向训练数据中引入噪声，这以几乎相同的方式提供了强大的隐私保证。
- en: Of course, this is where the tradeoff we mentioned comes into play. **Adding
    noise to the training data comes at the cost of making learning more difficult.**
    We could *absolutely* add enough noise to achieve *ε* = 0.01 and *δ* = 0, making
    the difference in output probabilities between *x* and *y* virtually nonexistent.
    **This would be wonderful for privacy, but terrible for learning.** **A model
    trained on such a noisy dataset would perform very poorly on most tasks.**
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，这就是我们之前提到的权衡所在。**向训练数据添加噪声会使得学习变得更加困难**。我们可以**绝对地**添加足够的噪声，使得*ε* = 0.01和*δ*
    = 0，使得输出概率之间*x*和*y*的差异几乎不存在。**这对隐私来说是个好消息，但对学习来说却是个坏消息**。在如此嘈杂的数据集上训练的模型在大多数任务上的表现都会非常糟糕。
- en: '**There is no consensus on what constitutes a “good” *ε* value, or on universal
    methodologies or best practices for *ε* selection [6].** In many ways, *ε* embodies
    the privacy/accuracy tradeoff, and the “proper” value to aim for is highly context-dependent.
    *ε* = 1 is generally regarded as offering high privacy guarantees. Although privacy
    diminishes exponentially with respect to *ε*, values as high as *ε* = 32 are mentioned
    in literature and thought to provide moderately strong privacy guarantees [1].'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: '**关于什么构成一个“好的”*ε*值，或者关于*ε*选择的通用方法或最佳实践，并没有共识[6]**。在许多方面，*ε*体现了隐私/准确性的权衡，而“正确”的目标值高度依赖于具体情境。*ε*
    = 1通常被认为提供了高隐私保证。尽管随着*ε*的增加，隐私呈指数下降，但文献中提到了高达*ε* = 32的值，并认为它们提供了适度的隐私保证[1]。'
- en: 'The authors of [*Reconciling privacy and accuracy in AI for medical imaging*](https://doi.org/10.1038/s42256-024-00858-y)[1]
    test the effects of DP on the accuracy of AI models on three real-world medical
    imaging datasets. They do so using various values of *ε* and comparing them to
    a non-private (non-DP) control. **Table 1** provides a partial summary of their
    results for *ε* = 1 and *ε* = 8:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 在[*Reconciling privacy and accuracy in AI for medical imaging*](https://doi.org/10.1038/s42256-024-00858-y)[1]的作者测试了差分隐私（DP）对三个真实世界医学影像数据集上AI模型准确性的影响。他们使用各种*ε*值，并将其与非隐私（非DP）控制进行比较。**表1**提供了他们对于*ε*
    = 1和*ε* = 8结果的局部总结：
- en: '![](../Images/294df24625431b0274203375a30ebc43.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/294df24625431b0274203375a30ebc43.png)'
- en: '**Table 1:** Comparison of AI model performance across the RadImageNet [7],
    HAM10000 [8], and MSD Liver [9] datasets with *δ = 8*⁻⁷⋅10 and privacy budgets
    of ε = 1, ε = 8, and without DP (non-private). A higher MCC/Dice score indicates
    higher accuracy. Although providing strong theoretical privacy guarantees in the
    face of a worst-case adversary, **DP significantly degrades model accuracy.**
    The negative impact on performance is especially noticeable in the latter two
    datasets, which are considered small datasets. Image by the author, based on image
    by A. Ziller, T.T. Mueller, S. Stieger, et al from Table 3 in [***Reconciling
    privacy and accuracy in AI for medical imaging***](https://doi.org/10.1038/s42256-024-00858-y)[1]
    (use under [CC-BY 4.0 license](https://creativecommons.org/licenses/by/4.0/)).'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: '**表1**：在RadImageNet [7]、HAM10000 [8]和MSD Liver [9]数据集上，*δ = 8*⁻⁷⋅10和隐私预算为ε
    = 1、ε = 8以及无DP（非隐私）的AI模型性能比较。MCC/Dice分数越高，表示准确性越高。尽管在面对最坏情况对手时提供了强大的理论隐私保证，**DP显著降低了模型准确性**。对性能的负面影响在最后两个数据集中尤为明显，这些数据集被认为是小型数据集。图片由作者根据A.
    Ziller、T.T. Mueller、S. Stieger等人[***Reconciling privacy and accuracy in AI for
    medical imaging***](https://doi.org/10.1038/s42256-024-00858-y)[1]中的表3中的图片制作，根据[CC-BY
    4.0许可](https://creativecommons.org/licenses/by/4.0/)使用。'
- en: '**Even approaching the higher end of the typical *ε* values attested in literature,
    DP is still as cumbersome as a bank vault door for medical imaging tasks.** The
    noise introduced into the training data is catastrophic for AI model accuracy,
    especially when the datasets at hand are small. Note, for example, the huge drop-off
    in Dice score on the MSD Liver dataset, even with the relatively high *ε* value
    of 8.'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: '**即使接近文献中证实的典型*ε*值的上限，DP在医学影像任务中仍然像银行保险库门一样繁琐。**引入训练数据中的噪声对AI模型准确性具有灾难性的影响，尤其是在数据集较小的情况下。例如，MSD肝脏数据集上的Dice分数大幅下降，即使*ε*值相对较高为8。'
- en: '**Ziller, Mueller, Stieger, *et al.* suggest that the accuracy drawbacks of
    DP with typical *ε* values may contribute to the lack of widespread adoption of
    DP in the field of medical AI [1].** Yes, wanting mathematically-provable privacy
    guarantees is definitely sensible, but at what cost? Leaving so much of the diagnostic
    power of AI models on the table in the name of privacy is not an easy choice to
    make.'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: '**Ziller、Mueller、Stieger等**建议，具有典型*ε*值的DP的准确性缺点可能是DP在医疗人工智能领域[1]未得到广泛应用的原因。是的，想要数学上可证明的隐私保证是合理的，但代价是什么？以隐私的名义放弃AI模型的大部分诊断能力并不是一个容易做出的选择。'
- en: Revisiting our dream home scenario armed with an understanding of DP, we find
    that the options we (seem to) have map neatly onto the three we had for our front
    door.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 重新审视我们的梦想家园场景，并带着对差分隐私（DP）的理解，我们发现我们（似乎）拥有的选项与我们的前门所拥有的三个选项完美对应。
- en: '**DP with typical values of *ε* is like installing a bank vault door:** costly,
    but effective for privacy. As we’ll see, it’s also complete overkill in this case.'
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**具有典型*ε*值的DP就像安装一个银行保险库门：**成本高昂，但有效保护隐私。正如我们将看到的，在这种情况下，它也是完全过度杀鸡用牛刀。'
- en: '**Not using DP is like not installing a door at all:** much easier, but risky.
    As mentioned above, though, DP has yet to be widely applied in medical AI [1].'
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**不使用DP就像完全没有安装门一样：**虽然更容易，但风险很大。然而，如上所述，DP在医疗人工智能领域[1]尚未得到广泛应用。'
- en: '**Passing up opportunities to use AI is like giving up and selling the house:**
    it saves us the headache of dealing with privacy concerns weighed against incentives
    to maximize accuracy, but a lot of potential is lost in the process.'
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**放弃使用AI的机会就像放弃并出售房子一样：**这可以节省我们处理隐私问题与最大化准确性的激励之间的头痛，但在过程中损失了大量的潜力。'
- en: It looks like we’re at an impasse… **unless we think outside the box.**
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 看起来我们陷入了僵局……**除非我们跳出思维定式。**
- en: 'High-Budget DP: Privacy and Accuracy Aren’t an Either/Or'
  id: totrans-43
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 高预算DP：隐私和准确性并非非此即彼
- en: '**In [*Reconciling privacy and accuracy in AI for medical imaging*](https://doi.org/10.1038/s42256-024-00858-y)
    [1], Ziller, Mueller, Stieger, *et al.* offer the medical AI equivalent of a regular
    front door — **an approach that manages to protect privacy while giving up very
    little in the way of model performance.** Granted, this protection is not theoretically
    optimal — far from it. However, as the authors show through a series of experiments,
    **it *is* good enough to counter almost any realistic threat of reconstruction. **'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: '**在[*在医学影像人工智能中协调隐私和准确性*](https://doi.org/10.1038/s42256-024-00858-y) [1]中，Ziller、Mueller、Stieger等**提出了医疗人工智能领域的常规前门——**一种在保护隐私的同时，在模型性能方面损失很少的方法。诚然，这种保护在理论上并非最优——远非如此。然而，正如作者通过一系列实验所展示的，**它确实足够好，可以抵御几乎任何现实的重建威胁。**'
- en: '**As the saying goes, “Perfect is the enemy of good.” In this case, it is the
    “optimal” — an insistence on arbitrarily low *ε* values — that locks us into the
    false dichotomy of total privacy versus total accuracy.** Just as a bank vault
    door has its place in the real world, so does DP with *ε* ≤ 32\. Still, the existence
    of the bank vault door **doesn’t mean plain old front doors don’t also have a
    place in the world. The same goes for *high-budget* DP.**'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: '**俗话说，“完美是优秀的敌人。”在这种情况下，它是对“最优”的坚持——对任意低*ε*值的执着——将我们锁定了完全隐私与完全准确性之间的错误二分法。**就像现实世界中的银行保险库门有其位置一样，*ε*
    ≤ 32的DP也是如此。然而，银行保险库门的存在并不意味着普通的门在世界中没有位置。同样，对于*高预算*DP也是如此。'
- en: 'The idea behind high-budget DP is straightforward: using privacy budgets (*ε*
    values) that are so high that they *“are near-universally shunned as being meaningless”*
    [1] — **budgets ranging from *ε =* 10⁶ to as high as *ε =* 10¹⁵.** In theory,
    these provide such weak privacy guarantees that it seems like common sense to
    dismiss them as no better than not using DP at all. In practice, though, this
    couldn’t be further from the truth. As we will see by looking at the results from
    the paper, high-budget DP shows significant promise in countering realistic threats.
    As Ziller, Mueller, Stieger, *et al.* put it [1]:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 高预算DP背后的想法很简单：使用如此高的隐私预算（*ε*值），以至于它们*“几乎普遍被忽视，认为没有意义”* [1]——**预算范围从*ε =* 10⁶到高达*ε
    =* 10¹⁵**。从理论上讲，这些提供了如此弱的隐私保证，以至于似乎有常识认为将它们视为与不使用DP一样好是没有意义的。然而，在实践中，这完全不是事实。正如我们将通过查看论文的结果所看到的，高预算DP在应对现实威胁方面显示出巨大的潜力。正如Ziller,
    Mueller, Stieger, *et al.*所说[1]：
- en: “[E]ven a ‘pinch of privacy’ has drastic effects in practical scenarios.”
  id: totrans-47
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “[E]ven a ‘pinch of privacy’ has drastic effects in practical scenarios.”
- en: First, though, we need to ask ourselves what we consider to be a “realistic”
    threat. **Any discussion of the efficacy of high-budget DP is inextricably tied
    to the *threat model* under which we choose to evaluate it.** In this context,
    a threat model is simply the set of assumptions we make about what a bad actor
    interested in obtaining our model’s training data is able to do.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们需要问自己，我们认为什么是“现实的”威胁。**关于高预算差分隐私（DP）有效性的任何讨论都不可避免地与我们所选择的评估它的** **威胁模型**
    **紧密相关**。在这个背景下，威胁模型只是我们对一个感兴趣的恶意行为者能够做什么的假设集合。
- en: '![](../Images/885af53b989be2a5872a0a13d311cf81.png)'
  id: totrans-49
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/885af53b989be2a5872a0a13d311cf81.png)'
- en: '**Table 2:** Comparison of threat models. For all three, we also assume that
    the adversary has unbounded computational ability. Image by A. Ziller, T.T. Mueller,
    S. Stieger, et al from Table 1 in [***Reconciling privacy and accuracy in AI for
    medical imaging***](https://doi.org/10.1038/s42256-024-00858-y) [1] (use under
    [CC-BY 4.0 license](https://creativecommons.org/licenses/by/4.0/)).'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: '**表2：威胁模型比较。对于所有三种情况，我们还假设对手具有无界的计算能力。图片由A. Ziller, T.T. Mueller, S. Stieger等从[***在AI医学成像中协调隐私和准确性的论文](https://doi.org/10.1038/s42256-024-00858-y)
    [1]中的表1提供](https://doi.org/10.1038/s42256-024-00858-y) [1]（在[CC-BY 4.0许可](https://creativecommons.org/licenses/by/4.0/)下使用)。”'
- en: '**The paper’s findings hinge on a calibration of the assumptions to better
    suit real-world threats to patient privacy.** The authors argue that the worst-case
    model, which is the one typically used for DP, is far too pessimistic. For example,
    it assumes that the adversary has full access to each original image while attempting
    to reconstruct it based on the AI model (see Table 2) [1]. This pessimism explains
    the discrepancy between the reported *“drastic effects in practical scenarios”*
    of high privacy budgets and the very weak *theoretical* privacy guarantees that
    they offer. We may liken it to incorrectly assessing the security threats a typical
    house faces, wrongly assuming they are likely to be as sophisticated and enduring
    as those faced by a bank.'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: '**论文的发现依赖于对假设的校准，以更好地适应对病人隐私的现实威胁**。作者们认为，通常用于差分隐私的最坏情况模型过于悲观。例如，它假设对手可以完全访问每个原始图像，并基于AI模型尝试重建它（见表2）[1]。这种悲观主义解释了高隐私预算的“实际场景中的剧烈影响”与它们提供的非常弱的**“理论”**隐私保证之间的差异。我们可以将其比作错误地评估典型房屋面临的安全威胁，错误地假设它们可能像银行面临的那样复杂和持久。'
- en: '**The authors therefore propose two alternative threat models,** which they
    call the “relaxed” and “realistic” models. Under both of these, adversaries keep
    some core capabilities from the worst-case model: access to the AI model’s architecture
    and weights, the ability to manipulate its hyperparameters, and unbounded computational
    abilities (see Table 2). The realistic adversary is assumed to have no access
    to the original images and an imperfect reconstruction algorithm. **Even these
    assumptions leave us with a rigorous threat model that may still be considered
    pessimistic for most real-world scenarios [1].**'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: '**因此，作者们提出了两种替代的威胁模型，他们称之为“放宽”和“现实”模型**。在这两种情况下，对手都保留了一些最坏情况模型的核心能力：访问AI模型的架构和权重，操纵其超参数的能力，以及无界的计算能力（见表2）。现实中的对手假设无法访问原始图像，并且重建算法不完美。**即使这些假设也让我们拥有一个可能仍然被认为对大多数现实场景过于悲观的严格威胁模型[1]**。'
- en: Having established the three relevant threat models to consider, Ziller, Mueller,
    Stieger, *et al.* **compare AI model accuracy in conjunction with the reconstruction
    risk under each threat model at different values of *ε*.** As we saw in Table
    1, this is done for three exemplary medical imaging datasets. Their full results
    are presented in **Table 3:**
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 在确定了要考虑的三个相关威胁模型后，Ziller、Mueller、Stieger等**比较了在不同ε值下每个威胁模型下的AI模型准确性和重构风险。**正如我们在表1中看到的，这是针对三个典型的医学影像数据集进行的。他们的完整结果在**表3**中展示：
- en: '![](../Images/ea6eba90e92ff35aa5970e3ebdaceb64.png)'
  id: totrans-54
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/ea6eba90e92ff35aa5970e3ebdaceb64.png)'
- en: '**Table 3:** Comparison of AI model performance and reconstruction risk per
    threat model across the RadImageNet [7], HAM10000 [8], and MSD Liver [9] datasets
    with *δ = 8*⁻⁷⋅10 and various privacy budgets, including some as high as ε = 10⁹
    and ε = 10¹². A higher MCC/Dice score indicates higher accuracy. Image by A. Ziller,
    T.T. Mueller, S. Stieger, et al from Table 3 in [***Reconciling privacy and accuracy
    in AI for medical imaging***](https://doi.org/10.1038/s42256-024-00858-y) [1]
    (use under [CC-BY 4.0 license](https://creativecommons.org/licenses/by/4.0/)).'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '**表3**：在RadImageNet[7]、HAM10000[8]和MSD肝脏[9]数据集上，以*δ = 8*⁻⁷⋅10和不同的隐私预算进行比较，包括一些高达ε
    = 10⁹和ε = 10¹²的预算。MCC/Dice分数越高，表示准确度越高。图像由A. Ziller、T.T. Mueller、S. Stieger等从[***在医学影像AI中协调隐私和准确性***](https://doi.org/10.1038/s42256-024-00858-y)
    [1]中的表3提供（在[CC-BY 4.0许可](https://creativecommons.org/licenses/by/4.0/)下使用）。'
- en: 'Unsurprisingly, high privacy budgets (exceeding *ε* = 10⁶) significantly mitigate
    the loss of accuracy seen with lower (stricter) privacy budgets. Across all tested
    datasets, **models trained with high-budget DP at *ε* = 10⁹ (HAM10000, MSD Liver)
    or *ε* = 10¹² (RadImageNet) perform nearly as well as their non-privately trained
    counterparts.** This is in line with our understanding of the privacy/accuracy
    tradeoff: the less noise introduced into the training data, the better a model
    can learn.'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 并非意外，高隐私预算（超过*ε* = 10⁶）显著减轻了与较低（更严格）隐私预算相关的准确度损失。在所有测试的数据集中，**在ε = 10⁹（HAM10000、MSD肝脏）或ε
    = 10¹²（RadImageNet）下使用高预算DP训练的模型，其表现几乎与非隐私训练的对应模型相当。**这与我们对隐私/准确度权衡的理解一致：训练数据中引入的噪声越少，模型的学习效果越好。
- en: '**What *is* surprising is the degree of empirical protection afforded by high-budget
    DP against reconstruction under the realistic threat model.** Remarkably, the
    realistic reconstruction risk is assessed to be 0% for each of the aforementioned
    models. **The high efficacy of high-budget DP** in defending medical AI training
    images against realistic reconstruction attacks **is made even clearer by looking
    at the results of reconstruction attempts.** **Figure 1** below shows the five
    most readily reconstructed images from the MSD Liver dataset [9] using DP with
    high privacy budgets of ε = 10⁶, ε = 10⁹, ε = 10¹², and ε = 10¹⁵.'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: '**令人惊讶的是，在现实威胁模型下，高预算差分隐私（DP）提供的经验保护程度。**令人瞩目地，现实的重构风险被评估为上述所有模型均为0%。**高预算DP在防御医疗AI训练图像免受现实重构攻击方面的有效性，通过观察重构尝试的结果变得更加清晰。**图1**以下展示了使用DP和ε
    = 10⁶、ε = 10⁹、ε = 10¹²和ε = 10¹⁵的高隐私预算从MSD肝脏数据集[9]中重构的五张最易重构的图像。'
- en: '![](../Images/e2c9e06cb5eebe28e50d6337ad78ae23.png)'
  id: totrans-58
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/e2c9e06cb5eebe28e50d6337ad78ae23.png)'
- en: 'Figure 1: The five most readily reconstructed images from the MSD Liver dataset
    [9] using DP with high privacy budgets of ε = 10⁶, ε = 10⁹, ε = 10¹², and ε =
    10¹⁵. Image by A. Ziller, T.T. Mueller, S. Stieger, et al from Figure 3 in Reconciling
    privacy and accuracy in AI for medical imaging [1] (use under CC-BY 4.0 license).'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: '**图1**：使用DP和ε = 10⁶、ε = 10⁹、ε = 10¹²和ε = 10¹⁵的高隐私预算从MSD肝脏数据集[9]中重构的五张最易重构的图像。图像由A.
    Ziller、T.T. Mueller、S. Stieger等从《在医学影像AI中协调隐私和准确性的矛盾》[1]中的图3提供（在CC-BY 4.0许可下使用）。'
- en: Note that, at least to the naked eye, **even the best reconstructions obtained
    when using the former two budgets are visually indistinguishable from random noise.**
    This lends intuitive credence to the argument that **budgets often deemed too
    high to provide any meaningful protection could be instrumental in protecting
    privacy without giving up accuracy when using AI for medical imaging.** In contrast,
    the reconstructions when using ε = 10¹⁵ closely resemble the original images,
    showing that not all high budgets are created equal.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，至少从肉眼来看，**即使在使用前两种预算获得的最优重建结果，在视觉上与随机噪声也难以区分**。这为以下论点提供了直观的支持：**通常被认为过高而无法提供任何有意义保护的预算，在利用人工智能进行医学成像时，可能有助于保护隐私，同时不牺牲准确性**。相比之下，当使用
    ε = 10¹⁵ 进行重建时，结果与原始图像非常相似，这表明并非所有高预算都是相同的。
- en: Based on their findings, Ziller, Mueller, Stieger, *et al.* **make the case
    for training medical imaging AI models using (at least) high-budget DP as the
    norm.** They note the empirical efficacy of high-budget DP in countering realistic
    reconstruction risks at very little cost in terms of model accuracy. **The authors
    go so far as to claim that “*it seems negligent to train AI models without any
    form of formal privacy guarantee.*” [1]**
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 基于他们的发现，Ziller、Mueller、Stieger等**提出，使用（至少）高预算DP作为训练医学成像人工智能模型的规范**。他们指出，高预算DP在应对现实重建风险方面的实证有效性，在模型准确性方面的成本极低。**作者甚至声称，“*不提供任何形式的正式隐私保证来训练AI模型似乎是疏忽的。*”
    [1]
- en: '* * *'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Conclusion
  id: totrans-63
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: '**We started with a hypothetical scenario in which you were forced to decide
    between a bank vault door or no door at all for your dream home (or giving up
    and selling the incomplete house). After an exploration of the risks posed by
    inadequate privacy protection in medical AI, we looked into the ***privacy/accuracy
    tradeoff*** as well as the history and theory behind ***reconstruction attacks***
    and ***differential privacy (DP)*.** We then saw how **DP with common privacy
    budgets (*ε* values) degrades medical AI model performance** and compared it to
    the bank vault door in our hypothetical.'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: '**我们从一种假设情景开始，在这种情景中，你必须决定在你的梦想之家中是选择银行保险库门还是完全放弃（并出售未完成的房子）。在探讨了医疗人工智能中隐私保护不足所造成的风险之后，我们研究了***隐私/准确性权衡***以及***重建攻击***和***差分隐私（DP）***的历史和理论。然后，我们看到了DP与常见的隐私预算（*ε*值）如何降低医疗人工智能模型性能，并将其与我们假设中的银行保险库门进行了比较**。'
- en: Finally, we examined empirical results from the paper [*Reconciling privacy
    and accuracy in AI for medical imaging*](https://doi.org/10.1038/s42256-024-00858-y)
    to find out how ***high-budget differential privacy* can be used to escape the
    false dichotomy of bank vault door vs. no door** and protect patient privacy in
    the real world without sacrificing model accuracy in the process.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们查阅了论文[*在人工智能医学成像中协调隐私和准确性*](https://doi.org/10.1038/s42256-024-00858-y)的实证结果，以了解如何使用***高预算差分隐私***来摆脱银行保险库门与无门之间的虚假二分法，并在不牺牲模型准确性的情况下，在现实世界中保护患者隐私。
- en: If you enjoyed this article, please consider following me on [LinkedIn](https://www.linkedin.com/in/jhyahav/)
    to keep up with future articles and projects.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你喜欢这篇文章，请考虑在[LinkedIn](https://www.linkedin.com/in/jhyahav/)上关注我，以了解未来的文章和项目。
