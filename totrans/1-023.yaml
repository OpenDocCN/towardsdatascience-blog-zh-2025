- en: 3) Load and mutate data (INSERT / UPDATE / DELETE / MERGE)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Athena supports real Iceberg DML, allowing you to insert rows, update and delete
    records, and upsert using the MERGE statement. Under the hood, Iceberg uses snapshot-based
    ACID with delete files; readers stay consistent while writers work in parallel.
  prefs: []
  type: TYPE_NORMAL
