  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: To get the various version (snapshot) IDs associated with a particular table,
    use this query.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: '5) Keeping your data healthy: OPTIMIZE and VACUUM'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Row-level writes (UPDATE/DELETE/MERGE) create many **delete files** and can
    fragment data. Two statements keep things fast and storage-friendly:'
  prefs: []
  type: TYPE_NORMAL
- en: '**OPTIMIZE … REWRITE DATA USING BIN_PACK** — compacts small/fragmented files
    and folds deletes into data'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**VACUUM** — expires old snapshots + cleans **orphan** files'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: 6) Local analytics with DuckDB (read-only)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: It’s great to be able to sanity-check production tables from a laptop without
    having to run a cluster. DuckDB’s **httpfs** + **iceberg** extensions make this
    simple.
