- en: Bootstrap a Data Lakehouse in an Afternoon
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 在下午构建数据湖屋
- en: 原文：[https://towardsdatascience.com/bootstrap-a-data-lakehouse-in-an-afternoon/](https://towardsdatascience.com/bootstrap-a-data-lakehouse-in-an-afternoon/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/bootstrap-a-data-lakehouse-in-an-afternoon/](https://towardsdatascience.com/bootstrap-a-data-lakehouse-in-an-afternoon/)
- en: '<mdspan datatext="el1764701792928" class="mdspan-comment">Building a data lakehouse</mdspan>
    doesn’t need to be ***that*** complicated. In this article, I’ll show you how
    to develop a basic, “starter” one that uses an Iceberg table on AWS S3 storage.
    Once the table is registered using AWS Glue, you’ll be able to query and mutate
    it from Amazon Athena, including using:'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1764701792928" class="mdspan-comment">构建数据湖屋**并不需要那么复杂**。
    在本文中，我将向您展示如何开发一个基本的、“入门级”的数据湖屋，它使用 AWS S3 存储上的 Iceberg 表格。一旦使用 AWS Glue 注册了表格，您将能够从
    Amazon Athena 查询和修改它，包括使用：
- en: '**Time travel queries**,'
  id: totrans-3
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**时间旅行查询**，'
- en: '**Merging, updating and deleting data**'
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**合并、更新和删除数据**'
- en: '**Optimising and vacuuming your tables.**'
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**优化和清理您的表格**。'
- en: I’ll also show you how to inspect *the same tables locally* from **DuckDB,**
    and we’ll also see how to use **Glue/Spark** to insert more table data.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 我还将向您展示如何从 **DuckDB** 本地检查**相同的表格**，我们还将看到如何使用 **Glue/Spark** 插入更多表格数据。
- en: Our example might be basic, but it’ll showcase the setup, the different tools
    and the processes you can put in place to build up a more extensive data store.
    All modern cloud providers have equivalents of the AWS services I’m discussing
    in this article, so it should be fairly straightforward to replicate what I discuss
    here on Azure, Google Cloud, and others.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的示例可能很简单，但它将展示设置、不同的工具和您可以实施的过程来构建更广泛的数据存储。所有现代云服务提供商都有与我在这篇文章中讨论的 AWS 服务等效的产品，因此应该可以很容易地在
    Azure、Google Cloud 等平台上复制我在这里讨论的内容。
- en: To make sure we’re all on the same page, here is a brief explanation of some
    of the key technologies we’ll be using.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 为了确保我们都在同一页面上，以下是对我们将使用的一些关键技术的简要解释。
- en: AWS Glue/Spark
  id: totrans-9
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: AWS Glue/Spark
- en: AWS Glue is a fully managed, serverless ETL service from Amazon that streamlines
    data preparation and integration for analytics and machine learning. It automatically
    detects and catalogues metadata from various sources, such as S3, into a centralised
    Data Store. Additionally, it can create customisable Python-based Spark ETL scripts
    to execute these tasks on a scalable, serverless Apache Spark platform. This makes
    it great for building data lakes on Amazon S3, loading data into data warehouses
    like Amazon Redshift, and performing data cleaning and transformation. all without
    managing infrastructure.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: AWS Glue 是亚马逊提供的一项完全托管的无服务器 ETL 服务，它简化了数据分析与机器学习中的数据准备和集成。它能够自动检测和将来自各种来源（如
    S3）的元数据分类到中央数据存储中。此外，它还可以创建基于 Python 的可定制的 Spark ETL 脚本，在可扩展的无服务器 Apache Spark
    平台上执行这些任务。这使得它在构建 Amazon S3 上的数据湖、将数据加载到像 Amazon Redshift 这样的数据仓库以及执行数据清洗和转换方面非常出色，而且无需管理基础设施。
- en: AWS Athena
  id: totrans-11
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: AWS Athena
- en: AWS Athena is an interactive query service that simplifies data analysis directly
    in Amazon S3 using standard SQL. As a serverless platform, there’s no need to
    manage or provision servers; just point Athena at your S3 data, define your schema
    (usually with AWS Glue), and begin running SQL queries. It’s frequently utilised
    for ad hoc analysis, reporting, and exploration of large datasets in formats such
    as CSV, JSON, ORC, or Parquet.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: AWS Athena 是一种交互式查询服务，它简化了在 Amazon S3 中使用标准 SQL 直接进行数据分析。作为一个无服务器平台，无需管理或配置服务器；只需将
    Athena 指向您的 S3 数据，定义您的模式（通常使用 AWS Glue），然后开始运行 SQL 查询。它常用于对大型数据集进行临时分析、报告和探索，这些数据集的格式可以是
    CSV、JSON、ORC 或 Parquet。
- en: Iceberg tables
  id: totrans-13
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Iceberg 表格
- en: Iceberg tables are an open table format for datasets that provide database-like
    capabilities for data stored in data lakes, such as Amazon S3 object storage.
    Traditionally, on S3, you can create, read, and delete objects(files), but updating
    them is not possible. The Iceberg format addresses that limitation while also
    offering other benefits, including ACID transactions, schema evolution, hidden
    partitioning, and time-travel features.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: Iceberg 表格是一种开放表格格式，为存储在数据湖（如 Amazon S3 对象存储）中的数据集提供类似数据库的功能。传统上，在 S3 上，您可以创建、读取和删除对象（文件），但无法更新它们。Iceberg
    格式解决了这一限制，同时还提供了其他好处，包括 ACID 事务、模式演变、隐藏分区和时间旅行功能。
- en: DuckDB
  id: totrans-15
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: DuckDB
- en: DuckDB is an in-memory analytical database written in C++ and designed for analytical
    SQL workloads. Since its release a couple of years ago, it has grown in popularity
    and is now one of the premier data processing tools used by data engineers and
    scientists, thanks to its grounding in SQL, performance, and versatility.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: DuckDB 是一个用 C++ 编写的内存分析数据库，专为分析 SQL 工作负载而设计。自其几年前发布以来，其受欢迎程度不断提高，现在已成为数据工程师和科学家使用的顶级数据处理工具之一，这得益于其在
    SQL、性能和多功能性方面的优势。
- en: Scenario overview
  id: totrans-17
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 情景概述
- en: 'Let’s say you have been tasked with building a small “warehouse-lite” analytics
    table for order events, but you don’t want to adopt a heavyweight platform just
    yet. You need:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 假设您被分配了一个构建小型“轻量级仓库”分析表的任务，用于订单事件，但您目前不想采用重量级平台。您需要：
- en: '**Safe writes** (no broken readers, no partial commits)'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**安全写入**（没有损坏的读取器，没有部分提交）'
- en: '**Row-level** changes (UPDATE/DELETE/MERGE, not only append)'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**行级**更改（UPDATE/DELETE/MERGE，而不仅仅是追加）'
- en: '**Point-in-time reads** (for audits and debugging)'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**点时间读取**（用于审计和调试）'
- en: '**Local analytics** against production-accurate data for quick checks'
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对生产准确数据进行的**本地分析**以进行快速检查
- en: What we’ll build
  id: totrans-23
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我们将构建
- en: Create an Iceberg table in **Glue** & **S3** via **Athena**
  id: totrans-24
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过 **Athena** 在 **Glue** 和 **S3** 中创建一个 Iceberg 表
- en: Load and mutate rows (**INSERT/UPDATE/DELETE/MERGE**)
  id: totrans-25
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 加载和修改行（**INSERT/UPDATE/DELETE/MERGE**）
- en: '**Time travel** to prior snapshots (by timestamp and by snapshot ID)'
  id: totrans-26
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**时间旅行**到先前的快照（通过时间戳和快照 ID）'
- en: Keep it fast with **OPTIMIZE** and **VACUUM**
  id: totrans-27
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用 **OPTIMIZE** 和 **VACUUM** 保持快速
- en: Read *the same table* locally from **DuckDB** (S3 access via DuckDB Secrets)
  id: totrans-28
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从 **DuckDB**（通过 DuckDB Secrets 访问 S3）本地读取**相同的表**
- en: See how to add new records to our table using Glue Spark code
  id: totrans-29
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 查看如何使用 Glue Spark 代码向我们的表中添加新记录
- en: So, in a nutshell, we’ll be using:-
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，简而言之，我们将使用：-
- en: S3 for data storage
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: S3 用于数据存储
- en: Glue Catalogue for table metadata/discovery
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Glue 目录用于表元数据和发现
- en: Athena for serverless SQL reads *and* writes
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Athena 用于无服务器 SQL 读取和写入
- en: DuckDB for cheap, local analytics against the same Iceberg table
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 DuckDB 对相同的 Iceberg 表进行低成本本地分析
- en: Sparkfor processing grunt
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Spark 处理工作
- en: The key takeaway from our perspective is that by using the above technologies,
    we will be able to perform database-like queries on object storage.
  id: totrans-36
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我们的观点的关键收获是，通过使用上述技术，我们将在对象存储上执行类似数据库的查询。
- en: Setting up our development environment
  id: totrans-37
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 设置我们的开发环境
- en: I prefer to isolate local tooling in a separate environment. Use any tool you
    like to do this; I’ll show using conda since that’s what I usually do. For demo
    purposes, I’ll be running all the code within a Jupyter Notebook environment.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 我更喜欢将本地工具隔离在单独的环境中。使用您喜欢的任何工具来完成此操作；我将使用 conda 来演示，因为这是我通常的做法。出于演示目的，我将在 Jupyter
    Notebook 环境中运行所有代码。
- en: '[PRE0]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Prerequisites
  id: totrans-40
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 先决条件
- en: As we’ll be using AWS services, you’ll need an AWS account. Also,
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们将使用 AWS 服务，您需要一个 AWS 账户。此外，
- en: An S3 bucket for the data lake (e.g., `s3://my-demo-lake/warehouse/`)
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用于数据湖的 S3 存储桶（例如，`s3://my-demo-lake/warehouse/`)
- en: A Glue database (we’ll create one)
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个 Glue 数据库（我们将创建一个）
- en: Athena Engine Version 3 **i**n your workgroup
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您工作组中的 Athena 引擎版本 3 **i**
- en: An IAM role or user for Athena with S3 + Glue permissions
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个具有 S3 + Glue 权限的 IAM 角色或用户用于 Athena
- en: 1/ Athena setup
  id: totrans-46
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1/ Athena 设置
- en: Once you’ve signed into AWS, open Athena in the console and set your workgroup,
    engine version and S3 output location (for query results). To do this, look for
    a hamburger-style menu icon on the top left of the Athena home screen. Click on
    it to bring up a new menu block on the left. In there, you should see an Administration->
    Workgroups link. You will automatically be assigned to the primary workgroup.
    You can stick with this or create a new one if you like. Whichever option you
    choose, edit it and ensure that the following options are selected.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦您登录 AWS，请在控制台中打开 Athena 并设置您的工作组、引擎版本和 S3 输出位置（用于查询结果）。为此，请在 Athena 主屏幕的左上角寻找汉堡式菜单图标。点击它以在左侧弹出一个新的菜单块。在那里，您应该看到一个
    Administration-> Workgroups 链接。您将自动分配到主工作组。您可以保留这个工作组，或者如果您喜欢，可以创建一个新的工作组。无论您选择哪个选项，都要编辑它并确保以下选项被选中。
- en: Analytics Engine — Athena SQL. Manually set the engine version to 3.0.
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分析引擎—Athena SQL。手动将引擎版本设置为 3.0。
- en: Select customer-managed query result configuration and enter the required bucket
    and account information.
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 选择客户管理的查询结果配置，并输入所需的存储桶和账户信息。
- en: 2/ Create an Iceberg table in Athena
  id: totrans-50
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2/ 在 Athena 中创建一个 Iceberg 表
- en: We’ll store order events and let Iceberg manage partitioning transparently.
    I’ll use a “hidden” partition on the day of the timestamp to spread writes/reads.
    Go back to the Athena home page and launch the Trino SQL query editor. Your screen
    should look like this.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将存储订单事件，并让 Iceberg 透明地管理分区。我将在时间戳的日期上使用一个“隐藏”分区来分散写/读操作。返回 Athena 主页并启动 Trino
    SQL 查询编辑器。你的屏幕应该看起来像这样。
- en: '![](../Images/2327f76f87feff5ceb30e7d6896fd0e3.png)'
  id: totrans-52
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/2327f76f87feff5ceb30e7d6896fd0e3.png)'
- en: Image from AWS website
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 图片来自 AWS 网站
- en: Type in and run the following SQL. Change bucket/table names to suit.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 输入并运行以下 SQL。根据需要更改 bucket/表名。
- en: '[PRE1]'
  id: totrans-55
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '[PRE2]'
  id: totrans-56
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 3) Load and mutate data (INSERT / UPDATE / DELETE / MERGE)
  id: totrans-57
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3) 加载数据并修改数据（INSERT / UPDATE / DELETE / MERGE）
- en: Athena supports real Iceberg DML, allowing you to insert rows, update and delete
    records, and upsert using the MERGE statement. Under the hood, Iceberg uses snapshot-based
    ACID with delete files; readers stay consistent while writers work in parallel.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: Athena 支持真实的 Iceberg DML，允许你使用 MERGE 语句插入行、更新和删除记录以及更新。在底层，Iceberg 使用基于快照的 ACID
    与删除文件；读者保持一致性，而写者并行工作。
- en: '**Seed a few rows.**'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: '**种几行**。'
- en: '[PRE3]'
  id: totrans-60
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: A quick sanity check.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 快速检查。
- en: '[PRE4]'
  id: totrans-62
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: '**Update and delete.**'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: '**更新和删除**。'
- en: '[PRE5]'
  id: totrans-64
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: '[PRE6]'
  id: totrans-65
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: '**Idempotent upserts with MERGE**'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: '**Idempotent upserts with MERGE**'
- en: Let’s treat order 104 as refunded and create a new order 105.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们将订单 104 视为已退款并创建新的订单 105。
- en: '[PRE7]'
  id: totrans-68
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'You can now re-query to see: 101/102 → **paid**, 103 deleted, 104 → **refunded**,
    and 105 → **created.** (If you’re running this in a “real” account, you’ll notice
    the S3 object count ticking up — more on maintenance shortly.)'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 你现在可以重新查询以查看：101/102 → **已支付**，103 已删除，104 → **已退款**，105 → **已创建**。（如果你在一个“真实”账户中运行此操作，你会注意到
    S3 对象计数正在增加——稍后会有更多关于维护的内容。）
- en: '[PRE8]'
  id: totrans-70
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 4) Time travel (and version travel)
  id: totrans-71
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4) 时间旅行（和版本旅行）
- en: This is where the real value of using Iceberg shines. You can query the table
    as it looked at a moment in time **or** by a specific snapshot ID. In Athena,
    use this syntax,
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是使用 Iceberg 的真正价值所在。你可以查询在某个时间点看起来像这样的表，或者通过特定的快照 ID。在 Athena 中，使用此语法，
- en: '[PRE9]'
  id: totrans-73
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: To get the various version (snapshot) IDs associated with a particular table,
    use this query.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 要获取与特定表关联的各种版本（快照）ID，请使用此查询。
- en: '[PRE10]'
  id: totrans-75
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: '5) Keeping your data healthy: OPTIMIZE and VACUUM'
  id: totrans-76
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5) 保持数据健康：OPTIMIZE 和 VACUUM
- en: 'Row-level writes (UPDATE/DELETE/MERGE) create many **delete files** and can
    fragment data. Two statements keep things fast and storage-friendly:'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 行级写操作（UPDATE/DELETE/MERGE）创建许多**删除文件**并可能使数据碎片化。两个语句保持事物快速且存储友好：
- en: '**OPTIMIZE … REWRITE DATA USING BIN_PACK** — compacts small/fragmented files
    and folds deletes into data'
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**OPTIMIZE … 使用 BIN_PACK 重新编写数据**—压缩小/碎片化文件并将删除折叠到数据中'
- en: '**VACUUM** — expires old snapshots + cleans **orphan** files'
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**VACUUM**—过期旧快照 + 清理**孤儿**文件'
- en: '[PRE11]'
  id: totrans-80
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: 6) Local analytics with DuckDB (read-only)
  id: totrans-81
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 6) 使用 DuckDB 进行本地分析（只读）
- en: It’s great to be able to sanity-check production tables from a laptop without
    having to run a cluster. DuckDB’s **httpfs** + **iceberg** extensions make this
    simple.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 能够从笔记本电脑上检查生产表而无需运行集群真是太好了。DuckDB 的 **httpfs** + **iceberg** 扩展使这变得简单。
- en: 6.1 Install & load extensions
  id: totrans-83
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 6.1 安装和加载扩展
- en: Open your Jupyter notebook and type in the following.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 打开你的 Jupyter 笔记本并输入以下内容。
- en: '[PRE12]'
  id: totrans-85
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: 6.2 Provide S3 credentials to DuckDB the “right” way (Secrets)
  id: totrans-86
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 6.2 以“正确”的方式向 DuckDB 提供S3凭据（密钥）
- en: DuckDB has a small but powerful secrets manager. The most robust setup in AWS
    is the **credential chain** provider, which reuses whatever the AWS SDK can find
    (environment variables, IAM role, etc.). Therefore, you will need to ensure that,
    for instance, your AWS CLI credentials are configured.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: DuckDB 有一个小巧但强大的密钥管理器。在 AWS 中最稳健的设置是 **凭证链** 提供者，它重用 AWS SDK 可以找到的任何内容（环境变量、IAM
    角色等）。因此，你需要确保，例如，你的 AWS CLI 凭据已配置。
- en: '[PRE13]'
  id: totrans-88
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: After that, any **s3://…** reads in this DuckDB session will use the secret
    data.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 之后，在这个 DuckDB 会话中的任何 **s3://…** 读取都将使用密钥数据。
- en: 6.3 Point DuckDB at the Iceberg table’s metadata
  id: totrans-90
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 6.3 将 DuckDB 指向 Iceberg 表的元数据
- en: The most explicit way is to reference a concrete metadata file (e.g., the latest
    one in your table’s `metadata/` folder:)
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 最明确的方式是引用一个具体的元数据文件（例如，你表中的 `metadata/` 文件夹中的最新一个）：
- en: To get a list of those, use this query
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 要获取这些列表，请使用此查询
- en: '[PRE14]'
  id: totrans-93
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: Look for the metadata.json file with **the highest numbered start to the file
    name**, 00004 in my case. Then, you can use that in a query like this to retrieve
    the latest position of your underlying table.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 寻找具有**最高编号起始文件名**的 metadata.json 文件，例如我的情况是 00004。然后，你可以在查询中使用它来检索底层表的最新位置。
- en: '[PRE15]'
  id: totrans-95
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: Want a specific snapshot? Use this to get a list.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 想要特定的快照？使用此方法获取列表。
- en: '[PRE16]'
  id: totrans-97
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: '7) Optional extra: Writing from Spark/Glue'
  id: totrans-98
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 7) 可选额外：从Spark/Glue写入
- en: If you prefer Spark for larger batch writes, Glue can read/write Iceberg tables
    registered in the Glue Catalogue. You’ll probably still want to use Athena for
    ad-hoc SQL, time travel, and maintenance, but large CTAS/ETL can come via Glue
    jobs. (Just be aware that version compatibility and AWS LakeFormation permissions
    can bite, as Glue and Athena may lag slightly on Iceberg versions.)
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你更喜欢Spark进行更大的批量写入，Glue可以读取/写入在Glue目录中注册的Iceberg表。你可能仍然希望使用Athena进行即席SQL、时间旅行和维护，但大型CTAS/ETL可以通过Glue作业完成。（但请注意，版本兼容性和AWS
    LakeFormation权限可能会出现问题，因为Glue和Athena可能在Iceberg版本上略有滞后。）
- en: Here’s an example of some Glue Spark code that inserts a few new data rows,
    starting at order_id = 110, into our existing table. Before running this, you
    should add the following Glue job parameter (under Glue Job Details-> Advanced
    Parameters-> Job parameters.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是一个Glue Spark代码示例，它将一些新的数据行插入到我们的现有表中，起始订单ID为110。在运行此代码之前，你应该添加以下Glue作业参数（在Glue作业详情->高级参数->作业参数下）。
- en: '[PRE17]'
  id: totrans-101
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: '[PRE18]'
  id: totrans-102
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: Double-check with Athena.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Athena进行双重检查。
- en: '[PRE19]'
  id: totrans-104
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: Future Steps
  id: totrans-105
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 未来步骤
- en: 'From here, you could:'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 从这里，你可以：
- en: Create more tables with data.
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建更多包含数据的表。
- en: Add schema evolution’
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 添加模式演变
- en: Experiment with partition evolution (e.g., change table partition from day →
    hour as volumes grow),
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 尝试分区演变实验（例如，随着数据量的增长，将表分区从日更改为小时），
- en: Add scheduled maintenance. For example, EventBridge, Step, and Lambdas could
    be used to run **OPTIMIZE/VACUUM** on a scheduled cadence.
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 添加计划维护。例如，EventBridge、Step和Lambdas可以用于按计划执行**OPTIMIZE/VACUUM**。
- en: Summary
  id: totrans-111
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: In this article, I’ve tried to provide a clear path for building an **Iceberg
    data lakehouse** on AWS. It should serve as a guide for data engineers who want
    to connect simple object storage with complex enterprise data warehouses.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我试图为在AWS上构建**Iceberg数据湖屋**提供一条清晰的路径。它应该作为想要将简单的对象存储与复杂的企业数据仓库连接的数据工程师的指南。
- en: Hopefully, I’ve shown that building a Data Lakehouse—a system that combines
    the low cost of data lakes with the transactional integrity of warehouses—doesn’t
    necessarily require extensive infrastructure deployment. And while creating a
    full lakehouse is something that evolves over a long time, I hope I’ve convinced
    you that you really can make the bones of one in an afternoon.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 希望我已经展示了构建一个数据湖屋——一个结合数据湖低成本和仓库事务完整性的系统——不一定需要大量的基础设施部署。虽然创建一个完整的湖屋可能需要很长时间才能演变，但我希望我已经说服你，你真的可以在一个下午内构建其基本框架。
- en: By leveraging **Apache Iceberg** on a cloud storage system like **Amazon S3**,
    I demonstrated how to transform static files into dynamic, managed tables capable
    of ACID transactions, row-level mutations (MERGE, UPDATE, DELETE), and time travel,
    all without provisioning a single server.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 通过在云存储系统（如**Amazon S3**）上利用**Apache Iceberg**，我演示了如何将静态文件转换为动态、可管理的表，这些表能够进行ACID事务、行级变更（MERGE、UPDATE、DELETE）和时间旅行，而无需部署任何服务器。
- en: I also showed that by using new analytic tools such as **DuckDB**, it’s possible
    to read small to medium data lakes locally. And when your data volumes grow and
    get too big for local processing, I showed how easy it was to step up to an enterprise
    class data processing platform like **Spark**.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 我还展示了通过使用新的分析工具，如**DuckDB**，可以在本地读取从小型到中型数据湖。当你的数据量增长并变得太大而无法进行本地处理时，我展示了如何轻松升级到企业级数据处理平台，如**Spark**。
