- en: The Ultimate Guide to Power BI Aggregations
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/power-bi-aggregations-the-ultimate-guide/](https://towardsdatascience.com/power-bi-aggregations-the-ultimate-guide/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1762979076775" class="mdspan-comment">If you’ve ever</mdspan>
    used a Composite model feature in Power BI, you might have already heard about
    another extremely important and powerful concept – Aggregations! It’s because
    in many scenarios, especially with enterprise-scale models, aggregations are a
    natural “ingredient” of the composite model.
  prefs: []
  type: TYPE_NORMAL
- en: However, as composite models feature can also be leveraged without aggregations
    involved, I thought that it would make sense to explain the aggregations concept
    in a separate article.
  prefs: []
  type: TYPE_NORMAL
- en: 'Before we explain how aggregations work in Power BI and take a look at some
    specific use cases, let’s first answer the following questions:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Why do we need aggregations in the first place? What is the benefit of having
    two tables with identical data in the model?*'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Before we come to clarify these two points, it’s important to keep in mind that
    there are two different types of aggregations in Power BI.
  prefs: []
  type: TYPE_NORMAL
- en: '***User-defined aggregations*** were, until a couple of years ago, the only
    aggregation type in Power BI. Here, you are in charge of defining and managing
    aggregations, even though Power BI later automatically identifies aggregations
    when executing the query.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '***Automatic aggregations*** are one of the fresher features in Power BI. With
    the automatic aggregations feature enabled, you can grab a coffee, sit and relax,
    as machine learning algorithms will collect the data about the most frequently
    running queries in your reports and automatically build aggregations to support
    those queries.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The important distinction between these two types, of course besides the fact
    that with Automatic aggregations you don’t need to do anything except to turn
    this feature on in your tenant, is licensing limitations. While User-defined aggregations
    will work with both Premium and Pro, automatic aggregations at this moment require
    a Premium license.
  prefs: []
  type: TYPE_NORMAL
- en: From now on, we will talk about user-defined aggregations only, just keep that
    in mind.
  prefs: []
  type: TYPE_NORMAL
- en: 'Ok, here is a short explanation of aggregations and the way they work in Power
    BI. Here is the scenario: you have a large, very large fact table, which may contain
    hundreds of millions, or even billions of rows. So, how do you handle analytical
    requests over such a huge amount of data?'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/50febd48892ee09c9dd492a27437eba1.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 'You simply create aggregated tables! In reality, it is a very rare situation,
    or let’s say it’s more of an exception than a rule, that the analytic requirement
    is to see the individual transaction, or individual record as the lowest level
    of detail. In most scenarios, you want to perform analysis over summarized data:
    like, how much revenue we had on a specific day? Or, what was the total sales
    amount for product X? Further, how much did customer X spent in total?'
  prefs: []
  type: TYPE_NORMAL
- en: Additionally, you can aggregate the data over multiple attributes, which is
    usually the case, and summarize the figures for a specific date, customer, and
    product.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/55bc404f723c350327028593da08b83d.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: If you’re wondering what’s the point in aggregating the data…Well, the final
    goal is to reduce the number of rows and consequentially, reduce the overall data
    model size, by preparing the data in advance.
  prefs: []
  type: TYPE_NORMAL
- en: So, if I need to see the total sales amount spent by customer X on product Y
    in the first quarter of the year, I can take advantage of having this data already
    summarized in advance.
  prefs: []
  type: TYPE_NORMAL
- en: Key “Ingredient” – Make Power BI “aware” of the aggregations!
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Ok, that’s one side of the story. Now comes the more interesting part. Creating
    aggregations per-se is not enough to speed up your Power BI reports – you need
    to make Power BI aware of aggregations!
  prefs: []
  type: TYPE_NORMAL
- en: 'Just one remark before we proceed further: aggregation awareness is something
    that will work only, and only if the original fact table uses DirectQuery storage
    mode. We’ll come soon to explain how to design and manage aggregations and how
    to set the proper storage mode of your tables. At this moment, just keep in mind
    that the original fact table should be in DirectQuery mode.'
  prefs: []
  type: TYPE_NORMAL
- en: Let’s start building our aggregations!
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '![](../Images/da549811227e15c145f5499f34a9d412.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: As you may see in the illustration above, our model is fairly simple – consisting
    of one fact table (FactOnlineSales) and three dimensions (DimDate, DimStore, and
    DimProduct). All tables are currently using DirectQuery storage mode.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s go and create two additional tables that we will use as aggregated tables:
    the first one will group the data on date and product, while the other will use
    date and store for grouping:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/a82bf2b381eb6ccd126f395cbfdffa77.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: I’ve renamed these queries to Sales Product Agg and Sales Store Agg respectively
    and closed the Power Query editor.
  prefs: []
  type: TYPE_NORMAL
- en: 'As we want to get the best possible performance for the majority of our queries
    (these queries that retrieve the data summarized by date and/or product/store),
    I’ll switch the storage mode of the newly created aggregated tables from DirectQuery
    to Import:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/3bb73259b20e2a084da0acf729d8e1fb.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, these tables are loaded into cache memory, but they are still not connected
    to our existing dimension tables. Let’s create relationships between dimensions
    and aggregated tables:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c71038e4f66ccec1d02e26ec2cef36c6.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 'Before we proceed, let me stop for a moment and explain what happened when
    we created relationships. If you recall our previous article, I’ve mentioned that
    there are two types of relationships in Power BI: regular and limited. This is
    important: whenever there is a relationship between the tables from different
    source groups (Import mode is one source group, DirectQuery is another), you will
    have a limited relationship! With all its limitations and constraints.'
  prefs: []
  type: TYPE_NORMAL
- en: 'But, I have good news for you! If I switch the storage mode of my dimension
    tables to Dual, that means that they’ll be also loaded into cache memory, and
    depending on which fact table provides the data at the query time, dimension table
    will behave either as Import mode (if the query targets Import mode fact tables),
    or DirectQuery (if the query retrieves the data from the original fact table in
    DirectQuery):'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/db837fdea6f190634528ea2771ee77bc.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: As you may notice, there are no more limited relationships, which is fantastic!
  prefs: []
  type: TYPE_NORMAL
- en: 'So, to wrap up, our model is configured as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: The original FactOnlineSales table (with all the detailed data) – DirectQuery
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Dimension tables (DimDate, DimProduct, DimStore) – Dual
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Aggregated tables (Sales Product Agg and Sales Store Agg) – Import
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Awesome! Now we have our aggregated tables and queries should run faster, right?
    Beep! Wrong!
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/24d09d913b78d0043fe20b881456863d.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: Table visual contains exactly these columns that we pre-aggregated in our Sales
    Product Agg table – so, why on Earth does Power BI runs a DirectQuery instead
    of getting the data from the imported table? That’s a fair question!
  prefs: []
  type: TYPE_NORMAL
- en: Remember when I told you in the beginning that we need to make Power BI ***aware*** of
    the aggregated table, so it can be used in the queries?
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s go back to Power BI Desktop and do this:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/84344ba4ae345329beb700d44d7b16ab.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 'Right-click on the Sales Product Agg table and choose the Manage aggregations
    option:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ea3bf4f08ab99bf915018f217cafe29b.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 'A few important remarks here: in order for aggregations to work, *data types
    between the columns from the original fact table and aggregated table must match*!
    In my case, I had to change the data type of the SalesAmount column in my aggregated
    table from “Decimal number” to “Fixed decimal number”.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Additionally, you see the message written in red: that means, once you create
    an aggregated table, it will be hidden from the end user! I’ve applied exactly
    the same steps for my second aggregated table (Store), and now these tables are
    hidden:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/83385745c19de928529707b508445683.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s go back now and refresh our report page to see if something changed:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/8411829ffe826b54b1792db73e2b14c3.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: Nice! No DirectQuery this time, and instead of almost 2 seconds needed to render
    this visual, this time it took only 58 milliseconds! Moreover, if I grab the query
    and go to DAX Studio to check what’s going on…
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/3a6956fe934462d122b6e3faaa6c4ae0.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: As you see, the original query was mapped to target the aggregated table from
    import mode, and the message “Match found” clearly says that the data for the
    visual came from the Sales Product Agg table! Even though our user doesn’t have
    a clue that this table even exists in the model!
  prefs: []
  type: TYPE_NORMAL
- en: The difference in performance, even on this relatively small dataset, is huge!
  prefs: []
  type: TYPE_NORMAL
- en: Multiple aggregated tables
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now, you’re probably wondering why I’ve created two different aggregated tables.
    Well, let’s say that I have a query that displays the data for various stores,
    also grouped by date dimension. Instead of having to scan 12.6 million rows in
    DirectQuery mode, the engine can easily serve the numbers from the cache, from
    the table that has just a few thousand rows!
  prefs: []
  type: TYPE_NORMAL
- en: Essentially, you can create multiple aggregated tables in the data model – not
    just combining two grouping attributes (like we had here with Date+Product or
    Date+Store), but including additional attributes (for example, including Date
    and both Product and Store in the one aggregated table). This way, you’ll increase
    the granularity of the table, but in case your visual needs to display the numbers
    both for product and store, you’ll be able to retrieve results from the cache
    only!
  prefs: []
  type: TYPE_NORMAL
- en: 'In our example, as I don’t have pre-aggregated data on the level that includes
    both product and store, if I include a store in the table, I’m losing the benefit
    of having aggregated tables:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c6e10bb3367662370d69a226ec484d2a.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: So, in order to leverage aggregations, you need to have them defined on the
    exact same level of grain as the visual requires!
  prefs: []
  type: TYPE_NORMAL
- en: Aggregation Precedence
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'There is one more important property to understand when working with aggregations
    – precedence! When the Manage aggregations dialog box opens, there is an option
    to set the aggregation precedence:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ed1a3566bf7cc94743778b9d75d6cd9b.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: This value “instructs” Power BI on which aggregated table to use in case the
    query can be satisfied from multiple different aggregations! By default, it’s
    set to 0, but you can change the value. The higher the number, the higher the
    precedence of that aggregation.
  prefs: []
  type: TYPE_NORMAL
- en: 'Why is this important? Well, think of a scenario where you have the main fact
    table with billion of rows. And, you create multiple aggregated tables on different
    grains:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Aggregated table 1: groups data on Date level – has ~ 2000 rows (5 years of
    dates)'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Aggregated table 2: groups data on Date & Product level – has ~ 100.000 rows
    (5 years of dates x 50 products)'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Aggregated table 3: groups data on Date, Product & Store level – has ~ 5.000.000
    rows (100.000 from the previous grain x 50 stores)'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Now, let’s say that the report visual displays aggregated data on the date
    level only. What do you think: is it better to scan Table 1 (2.000 rows) or Table
    3 (5 million rows)? I believe you know the answer:) In theory, the query can be
    satisfied from both tables, so why rely on the arbitrary choice of Power BI?!'
  prefs: []
  type: TYPE_NORMAL
- en: Instead, when you’re creating multiple aggregated tables, with different levels
    of granularity, make sure to set the precedence value in a way that tables with
    lower granularity get priority!
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Aggregations are one of the most powerful features in Power BI, especially in
    scenarios with large datasets! Despite the fact that both composite models feature
    and aggregations can be used independently of each other, these two are usually
    used in synergy, to provide the most optimal balance between performance and having
    all the details of the data available!
  prefs: []
  type: TYPE_NORMAL
- en: Thanks for reading!
  prefs: []
  type: TYPE_NORMAL
