- en: 3 Steps to Context Engineering a Crystal-Clear Project
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 3 Steps to Context Engineering a Crystal-Clear Project
- en: 原文：[https://towardsdatascience.com/3-steps-to-ai-context-engineering-for-a-crystal-clear-project/](https://towardsdatascience.com/3-steps-to-ai-context-engineering-for-a-crystal-clear-project/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/3-steps-to-ai-context-engineering-for-a-crystal-clear-project/](https://towardsdatascience.com/3-steps-to-ai-context-engineering-for-a-crystal-clear-project/)
- en: <mdspan datatext="el1752690294944" class="mdspan-comment">The next</mdspan>
    level of prompt engineering
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1752690294944" class="mdspan-comment">下一个</mdspan>级别的提示工程
- en: Wouldn’t it be amazing to easily understand any software source code and gain
    a better view of even the most complex of projects?
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 不知是否令人惊叹，能够轻松理解任何软件源代码，并对甚至最复杂的项目有一个更好的视角？
- en: The continual augmentation of AI throughout enterprises has had the effect of
    making work much easier — but also **more complex**. Between AI generated code
    and quicker turnaround times for deliverables, companies around the world are
    pushing creative output to a new level.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 企业中AI的持续增强使得工作变得更加容易——但也**更加复杂**。在AI生成的代码和交付物更快的周转时间之间，全球各地的公司正在将创意输出推向新的水平。
- en: In this article, you’ll learn **three easy steps** for gaining an intelligent
    picture for any project by using the skill of **context engineering**.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，你将学习使用**上下文工程**技能为任何项目获得智能图画的**三个简单步骤**。
- en: Building upon your personal knowledge
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 建立在个人知识的基础上
- en: '[Context engineering](https://www.promptingguide.ai/guides/context-engineering-guide)
    is a technique for prompting an LLM with **specific knowledge** to complete a
    task.'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: '[上下文工程](https://www.promptingguide.ai/guides/context-engineering-guide)是一种提示LLM以**特定知识**完成任务的技术。'
- en: This method of providing context is the same technique used in **retrieval augmented
    generation** (RAG), where contextual data or conversation history is provided
    along with each request to an LLM. This additional knowledge is used to intelligently
    answer the question at hand.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 这种提供上下文的方法与**检索增强生成**（RAG）中使用的相同技术，其中上下文数据或对话历史与对LLM的每个请求一起提供。这种额外的知识被用来智能地回答手头的问题。
- en: Context can consist of **internal** or **private data** that the AI would not
    normally have been trained upon — which is what makes this style of [prompt engineering](https://itnext.io/prompt-engineering-the-magical-world-of-large-language-models-dde7d8d043ee)
    so powerful.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 上下文可以包括AI通常没有训练过的**内部**或**私人数据**——这就是这种风格的[提示工程](https://itnext.io/prompt-engineering-the-magical-world-of-large-language-models-dde7d8d043ee)如此强大的原因。
- en: A real world example for software developers
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 一个面向软件开发者的真实世界示例
- en: Context engineering is highly effective for understanding an app’s **source
    code** and **interconnected systems**.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 上下文工程对于理解应用程序的**源代码**和**相互连接的系统**非常有效。
- en: While accessible AI such as ChatGPT and Copilot offer varying ways of integrated
    access within a development environment (IDE), it can become complicated or even
    impossible to span questions across **multiple code-bases** or architectures.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然像ChatGPT和Copilot这样的可访问AI在开发环境（IDE）中提供了不同的集成访问方式，但跨越多个**代码库**或架构的问题可能会变得复杂，甚至不可能。
- en: This is a perfect use-case for context engineering. *Here’s how to use it!*
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 这是对上下文工程的一个完美用例。*以下是使用它的方法！*
- en: Step 1\. Build the context
  id: totrans-14
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第1步. 建立上下文
- en: Our goal is to understand a software’s source code that happens to span across
    **multiple storage repositories**.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的目标是理解一个软件的源代码，它恰好跨越了**多个存储库**。
- en: This would normally be a complex task, involving searching through the code
    in **various locations**, pulling in diagrams for **different sources**, and trying
    to understand all of the disparities. Rather than manually searching through each
    individual project, we can build a **context** and allow the AI to intelligently
    perform this work for us.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 这通常是一个复杂的工作，需要搜索代码中的**各种位置**，引入**不同来源**的图表，并试图理解所有的差异。而不是手动搜索每个单独的项目，我们可以构建一个**上下文**，并让AI智能地为我们完成这项工作。
- en: This process begins by formulating the context.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 这个过程从制定上下文开始。
- en: Chatting with the source code
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 与源代码聊天
- en: Context can be built by having a simple conversation with the AI about **one
    of the projects**.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 通过与AI简单交谈关于**其中一个项目**，可以建立上下文。
- en: Using the Copilot built into the software development environment provides a
    convenient way for building this context. A developer working on an unfamiliar
    project can simply **chat with the source code**.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: As an example, consider a web development project that has one repository for
    a **client-side** UI and a second project for a **server-side database**. Both
    projects are hosted in separate repositories on GitHub.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: We can build an execution flow across both projects by starting with an **outline**.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a083590056c576c89aea0c7cd3e17d30.png)'
  id: totrans-23
  prefs: []
  type: TYPE_IMG
- en: 'A web application consisting of two projects that span multiple repositories.
    Source: Author.'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
- en: Generating an outline
  id: totrans-25
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The first of the projects (the client) can be loaded in a software development
    IDE, from which we can ask the AI copilot to generate an outline of an **execution
    path**.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
- en: Suppose we are trying to understand how clicking a button in the application
    results in saving a record into the database. We might simply **ask** the Copilot
    how the button works. This conversation would include asking for an outline of
    the **main functions** that are executed after the button is clicked until the
    request is sent to the server, including **function names** and **parameters**.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
- en: Make an outline of the execution path after the submit button is clicked, including
    the HTTP POST request to the server side code, the endpoint method that receives
    the payload, and any validation that is performed on the client.
  id: totrans-28
  prefs:
  - PREF_BQ
  - PREF_BQ
  type: TYPE_NORMAL
- en: Once we have an outline from the first project as context, it’s time to move
    on to the second.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
- en: Step 2\. Use the context
  id: totrans-30
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The **output** from the conversation with the first project can now be used
    in order to better understand the second.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
- en: Since AI Copilots can typically only work with the **currently loaded project**,
    we’ll need to load the second project into the same IDE and start a **new conversation**.
    We can ask the Copilot the same questions — to generate an execution path from
    the behavior of the button click. However, this time, we can include the response
    from the first project, effectively providing **context** to the LLM.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
- en: Notice how we’re **carrying over** the conversation from the first project into
    the second, allowing the LLM to leverage a more detailed understanding of both
    projects in order to combine the result into a **unified answer**.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: 'Make an outline of the execution path after the form is submitted, including
    the endpoint method that receives the payload, and any validation that is performed
    on the server before a response is returned. Use the following client-side execution
    path as context: [context]'
  id: totrans-34
  prefs:
  - PREF_BQ
  - PREF_BQ
  type: TYPE_NORMAL
- en: Extending context over multiple projects is just one amazing part. We can actually
    take this one step further to create a **graphical flowchart**.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: Step 3\. Visualize the result
  id: totrans-36
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: An outline of the software execution that spans across two projects provides
    a **textual view** of the program’s behavior, but we can do even better.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
- en: We can reuse the joint context from our prior conversations with the AI to generate
    a comprehensive visualization. Multimodal models including **ChatGPT**, **Sonnet**,
    and **Gemini**, are perfect for this purpose.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
- en: The following describes the complete execution for submitting a business form.
    Generate a flowchart using Mermaid Markdown, compatible in a GitHub pull request,
    and include a text description of all events in the flowchart.
  id: totrans-39
  prefs:
  - PREF_BQ
  - PREF_BQ
  type: TYPE_NORMAL
- en: A flowchart is generated using [Mermaid](https://docs.github.com/en/get-started/writing-on-github/working-with-advanced-formatting/creating-diagrams#creating-mermaid-diagrams).
    The result is compatible with GitHub pull requests and can be directly displayed
    within the PR description.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  id: totrans-41
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: The resulting flowchart is [rendered](https://github.com/primaryobjects/business-profile-form?tab=readme-ov-file#execution-flowchart)
    in GitHub, providing a clear picture of the **complete execution** of the software.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/48378072b5b708ba75bffe419425ef7a.png)'
  id: totrans-43
  prefs: []
  type: TYPE_IMG
- en: 'A flowchart spanning multiple projects through context engineering. Source:
    Author.'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
- en: Taking a pull request to the next level
  id: totrans-45
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Flowcharts are not just effective for understanding the code-base as a developer,
    they’re also a great way to document and even present your work to peers.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
- en: The process of using context engineering across multiple prompts allows **carrying
    over** knowledge between **multiple projects** to obtain a single **cohesive result**.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
- en: Displaying this result as a flowchart directly in a pull request provides a
    **professional** **level** of documentation that can be quickly and easily understood
    by others.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
- en: A stepping stone towards higher AI
  id: totrans-49
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As we’ve seen, **context engineering** can be leveraged to generate powerful
    flowcharts for understanding the code across multiple repositories.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
- en: However, perhaps this manual process is merely an **intermediate step** to when
    a more powerful AI becomes available. After all, there has been a steady advancement
    of AI in software development. Nonetheless, as we’ve seen in prior years with
    prompt engineering, it’s important to leverage the power of AI copilots to **augment**
    skill as a developer.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
- en: By creating easily understandable code changes with AI-powered flowcharts, you
    can enhance your programming output and demonstrate your skill with AI.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
- en: '***How have you used AI to boost your work? Let me know!***'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
