- en: Detection
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 检测
- en: To detect Sudoku grids I considered many different approaches ranging from simple
    thresholding, hough line transformations or some form of edge detection to training
    a deep learning model for segmentation or keypoint detection.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 为了检测数独网格，我考虑了许多不同的方法，从简单的阈值、霍夫线变换或某种形式的边缘检测到训练深度学习模型进行分割或关键点检测。
- en: 'Let’s define some ***assumptions*** to scope the problem:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们定义一些 ***假设*** 来界定问题范围：
- en: The Sudoku grid is clearly and fully visible in the frame with a clear quadrilateral
    border, with strong contrast from the background.
  id: totrans-23
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 数独网格在具有清晰四边形边界的框架中清晰且完整地可见，与背景有强烈的对比。
- en: The surface on which the Sudoku grid is printed needs to be flat, but can be
    captured from an angle and appear skewed or rotated.
  id: totrans-24
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 数独网格打印的表面需要平坦，但可以从一个角度捕捉并看起来倾斜或旋转。
- en: '![Examples for different image qualities](../Images/9ffb64a0e3f2d0c6f77f97528f9e1778.png)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![不同图像质量的示例](../Images/9ffb64a0e3f2d0c6f77f97528f9e1778.png)'
- en: Examples for different image qualities
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 不同图像质量的示例
- en: 'I will show you a simple pipeline with some filtering steps to detect the bounds
    of our Sudoku grid. On a high level, the processing pipeline looks as follows:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 我将向您展示一个简单的流程，其中包含一些过滤步骤来检测我们的数独网格的边界。从高层次来看，处理流程如下：
- en: '![Diagram of processing pipeline steps](../Images/5503e73d8d460785d01e10ee4da7fe66.png)![Visualization
    of processing pipeline steps](../Images/1d95c82b957847040738612530fa3067.png)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
  zh: '![处理流程步骤图](../Images/5503e73d8d460785d01e10ee4da7fe66.png)![处理流程步骤的可视化](../Images/1d95c82b957847040738612530fa3067.png)'
- en: Visualization of processing pipeline steps
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 处理流程步骤的可视化
- en: Grayscale
  id: totrans-30
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 灰度
- en: In this first step we simply convert the input image from its three color channels
    to a single channel grayscale image, as we don’t need any color information to
    process these images.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 在这一第一步中，我们简单地将输入图像从其三个颜色通道转换为单通道灰度图像，因为我们不需要任何颜色信息来处理这些图像。
- en: '[PRE0]'
  id: totrans-32
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Edge Detection
  id: totrans-33
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 边缘检测
- en: 'After converting the image to grayscale we can use the Canny edge detection
    algorithm to extract edges. There are two thresholds to choose for this algorithm
    that determine if pixels are accepted as edges:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 在将图像转换为灰度后，我们可以使用Canny边缘检测算法提取边缘。为此算法选择两个阈值，以确定像素是否被接受为边缘：
- en: '![Canny edge thresholds explained](../Images/87af9412fe8ee80e6e1bc2d1df309bd1.png)'
  id: totrans-35
  prefs: []
  type: TYPE_IMG
  zh: '![Canny边缘阈值解释](../Images/87af9412fe8ee80e6e1bc2d1df309bd1.png)'
- en: Thresholds of Canny edge detection
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: Canny边缘检测的阈值
- en: In our case of detecting Sudoku grids, we assume very strong edges on the border
    lines of our grid. We can choose a high upper threshold to reject noise from appearing
    in our mask, and a lower threshold not too low to reject small noisy edges connected
    to the main border from showing up in our mask.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们检测数独网格的案例中，我们假设网格的边界线上有非常强的边缘。我们可以选择一个高的上限阈值来拒绝噪声出现在我们的掩码中，以及一个不太低的下限阈值，以拒绝连接到主要边界的较小噪声边缘出现在我们的掩码中。
- en: A blur filter is often used before passing images to Canny to reduce noise,
    but in this case the edges are very strong but narrow, hence the blur is omitted.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 在将图像传递给Canny之前，通常使用模糊过滤器来减少噪声，但在此情况下，边缘非常强而窄，因此省略了模糊。
- en: '[PRE1]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '![](../Images/93f89182cb3834ef8d79732ed89a822f.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/93f89182cb3834ef8d79732ed89a822f.png)'
- en: Mask image after Canny edge
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: Canny边缘后的掩码图像
- en: Dilation
  id: totrans-42
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 膨胀
- en: In this next step, we post-process the edge detection mask with a dilation kernel
    to close small gaps in the mask.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 在这一步中，我们使用膨胀核对边缘检测掩码进行后处理，以关闭掩码中的小间隙。
- en: '[PRE2]'
  id: totrans-44
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '![](../Images/684eb2a3e99ebaec4d9d74dea7668c68.png)'
  id: totrans-45
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/684eb2a3e99ebaec4d9d74dea7668c68.png)'
- en: Mask image after Dilation
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 膨胀后的掩码图像
- en: Contour Detection
  id: totrans-47
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 轮廓检测
- en: Now that the binary mask is ready, we can run a contour detection algorithm
    to find coherent blobs and filter down to a single contour with four points.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 现在二值掩码已经准备好了，我们可以运行一个轮廓检测算法来找到连贯的块，并过滤到一个具有四个点的单个轮廓。
- en: '[PRE3]'
  id: totrans-49
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '![](../Images/7548069e80dab09aa55843caa88b5bf1.png)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7548069e80dab09aa55843caa88b5bf1.png)'
- en: Detected contours on mask image
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 掩码图像上的检测到的轮廓
- en: This initial contour detection will return a list of contours that contain every
    single pixel that is part of the contour. We can use the **Douglas–Peucker** algorithm
    to iteratively reduce the number of points in the contour and approximate the
    contour with a simple polygon. We can choose a minimum distance between points
    for the algorithm.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 这个初始轮廓检测将返回一个包含轮廓中每个像素的轮廓列表。我们可以使用**Douglas–Peucker**算法迭代地减少轮廓中的点数，并用一个简单的多边形近似轮廓。我们可以为算法选择点之间的最小距离。
- en: '![](../Images/8186aab4b9f2c448030839e9246140f3.png)![](../Images/cb9165c5208e1e9f02543949e1f6f068.png)'
  id: totrans-53
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/8186aab4b9f2c448030839e9246140f3.png)![图片](../Images/cb9165c5208e1e9f02543949e1f6f068.png)'
- en: If we assume that even for some of the most skewed rectangle, the shortest side
    is at least 10% of the circumference of the shape, we can filter the contours
    down to polygons with exactly four points.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们假设即使是对于一些最倾斜的矩形，最短边至少是形状周长的10%，我们可以过滤轮廓到具有精确四个点的多边形。
- en: '[PRE4]'
  id: totrans-55
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Finally we take the largest detected contour, presumably the final Sudoku grid.
    We sort the contours by area in reverse order and then take the first element,
    corresponding to the largest contour area.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们取最大的检测到的轮廓，假设是最终的数独网格。我们按面积降序排列轮廓，然后取第一个元素，对应于最大的轮廓面积。
- en: '[PRE5]'
  id: totrans-57
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: '![](../Images/d62ba9336fcd4097a11c54be452bd34c.png)'
  id: totrans-58
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d62ba9336fcd4097a11c54be452bd34c.png)'
- en: Filtered contour highlighted on original image
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 在原始图像上突出显示的过滤轮廓
- en: Perspective Transformation
  id: totrans-60
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 透视变换
- en: 'Finally we need to transform the detected grid back to its square. To achieve
    this, we can use a perspective transformation. The transformation matrix can be
    calculated by specifying where the four points of our Sudoku grid contour need
    to be placed in the end: the four corners of the image.'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们需要将检测到的网格转换回其正方形。为了实现这一点，我们可以使用透视变换。变换矩阵可以通过指定 Sudoku 网格轮廓的四个点最终需要放置的位置来计算：图像的四个角。
- en: '[PRE6]'
  id: totrans-62
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: '![](../Images/0821aea7a01b04a1d555caede6bd793f.png)'
  id: totrans-63
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/0821aea7a01b04a1d555caede6bd793f.png)'
- en: 'To match the contour points to the corners, they need to be ordered first,
    so they can be assigned correctly. Let’s define the following order for our corner
    points:'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 为了将轮廓点匹配到角点，首先需要对这些点进行排序，以便正确分配。让我们为我们的角点定义以下顺序：
- en: '![](../Images/fe4f0008214012152d278c7ad6b122d7.png)'
  id: totrans-65
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/fe4f0008214012152d278c7ad6b122d7.png)'
- en: 'Variant A: Simple sort based on sum/diff'
  id: totrans-66
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 变体 A：基于和/差的简单排序
- en: To sort the extracted corners and assign them to these target points, a simple
    algorithm could look at the `sum` and `differences` of the `x` and `y` coordinates
    for each corner.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 为了对提取的角点进行排序并将它们分配到这些目标点，一个简单的算法可以查看每个角点的 x 和 y 坐标的 `sum` 和 `differences`。
- en: '[PRE7]'
  id: totrans-68
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'Based on these values, it is now possible to differentiate the corners:'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 基于这些值，现在可以区分角点：
- en: The top left corner has both a small x and y value, it has the smallest sum
    `argmin(p_sum)`
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 左上角具有最小的 x 和 y 值，因此它具有最小的和 `argmin(p_sum)`
- en: Bottom right corner has the largest sum `argmax(p_sum)`
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 右下角具有最大的和 `argmax(p_sum)`
- en: Top right corner has the largest diff `argmax(p_diff)`
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 右上角具有最大的差 `argmax(p_diff)`
- en: Bottom left corner has the smallest difference `argmin(p_diff)`
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 左下角具有最小的差 `argmin(p_diff)`
- en: In the following animation, I tried to visualize this assignment of the four
    corners of a rotating square. The colored lines represent the respective image
    corner assigned to each square corner.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 在以下动画中，我尝试可视化旋转正方形的四个角的分配。彩色线条表示分配给每个正方形角的相应图像角。
- en: '![Animation of a rotating square, each corner with a different color and lines
    indicating the assignment to image corners](../Images/29163e12e9a6fc955b6d1c1301135bcb.png)'
  id: totrans-75
  prefs: []
  type: TYPE_IMG
  zh: '![旋转正方形的动画，每个角有不同的颜色，并且线条指示分配到图像角的位置](../Images/29163e12e9a6fc955b6d1c1301135bcb.png)'
- en: Animation of a rotating square, each corner with a different color and lines
    indicating the assignment to image corners
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 旋转正方形的动画，每个角有不同的颜色，并且线条指示分配到图像角的位置
- en: '[PRE8]'
  id: totrans-77
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: This works well unless the rectangle is heavily skewed, like the following one.
    In this case, you can clearly see that this method is flawed, as there the same
    rectangle corner is assigned multiple image corners.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 这在矩形严重倾斜的情况下效果很好，如下所示。在这种情况下，你可以清楚地看到这种方法是存在缺陷的，因为同一个矩形角被分配到多个图像角。
- en: '![Same assignment procedure fails with a skewed rotating quadrilateral shape](../Images/13fee6fee91d04ff2315c2d80aa81553.png)'
  id: totrans-79
  prefs: []
  type: TYPE_IMG
  zh: '![倾斜旋转的四边形形状的相同分配过程失败](../Images/13fee6fee91d04ff2315c2d80aa81553.png)'
- en: Same assignment procedure fails with a skewed rotating quadrilateral shape
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 倾斜旋转的四边形的相同分配过程失败
- en: 'Variant B: Assignment Optimization Problem'
  id: totrans-81
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 变体 B：分配优化问题
- en: Another approach would be to minimize the distances between each point and its
    assigned corner. This can be implemented using a `pairwise_distances` calculation
    between each point and the corners and the `linear_sum_assignment` function from
    [scipy](https://docs.scipy.org/doc/scipy/reference/generated/scipy.optimize.linear_sum_assignment.html),
    which solves the assignment problem while minimizing a cost function.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种方法是通过最小化每个点与其分配的角之间的距离。这可以通过使用 `pairwise_distances` 计算每个点与角之间的距离以及来自 [scipy](https://docs.scipy.org/doc/scipy/reference/generated/scipy.optimize.linear_sum_assignment.html)
    的 `linear_sum_assignment` 函数来实现，该函数在最小化成本函数的同时解决分配问题。
- en: '[PRE9]'
  id: totrans-83
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: '![Animated rotating skewed quadrilaterl with corners assigned correctly to
    image corners](../Images/c7f005b4bd0dcda9978e8ab96cadfeed.png)'
  id: totrans-84
  prefs: []
  type: TYPE_IMG
  zh: '![动画旋转倾斜的四边形，其角正确分配到图像角](../Images/c7f005b4bd0dcda9978e8ab96cadfeed.png)'
- en: Animated rotating skewed quadrilateral with corners assigned correctly to image
    corners
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 动画旋转倾斜的四边形，其角正确分配到图像角
- en: Even though this solution works, it is not ideal, as it relies on the image
    distance between the shape points and the corners and it is computationally more
    expensive because a distance matrix has to be constructed. Of course here in the
    case of four points assigned this is negligible, but this solution would not be
    well suited for a polygon with many points!
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管这个解决方案是可行的，但它并不理想，因为它依赖于形状点与角之间的图像距离，并且计算上更昂贵，因为必须构建一个距离矩阵。当然，在这种情况下，四个点分配是微不足道的，但这个解决方案不适合具有许多点的多边形！
- en: 'Variant C: Cyclic sorting with anchor'
  id: totrans-87
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 变体C：带有锚点的循环排序
- en: This third variant is a very lightweight and efficient way to sort and assign
    the points of the shape to the image corners. The idea is to calculate an angle
    for each point of the shape based on the centroid position.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 这种第三种变体是一种非常轻量级且高效的方法来排序和分配形状点到图像角。想法是计算形状每个点的角度，基于质心位置。
- en: '![Sketch of angles assigned to each corner](../Images/74678cac5e862eebecd682b135cb88f8.png)'
  id: totrans-89
  prefs: []
  type: TYPE_IMG
  zh: '![分配给每个角的角度草图](../Images/74678cac5e862eebecd682b135cb88f8.png)'
- en: Sketch of angles assigned to each corner
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 分配给每个角的角度草图
- en: Since the angles are *cyclic*, we need to choose an anchor to guarantee the
    absolute order of the points. We simply select the point with the lowest sum of
    x and y.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 由于角度是**循环的**，我们需要选择一个锚点来保证点的绝对顺序。我们简单地选择x和y坐标和最小的点。
- en: '[PRE10]'
  id: totrans-92
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: '![Animated rotating skewed quadrilaterl with corners assigned correctly with
    angle assignment method](../Images/b752b72a29adafc39d93804b6be48511.png)'
  id: totrans-93
  prefs: []
  type: TYPE_IMG
  zh: '![带有正确分配角度的旋转倾斜四边形动画](../Images/b752b72a29adafc39d93804b6be48511.png)'
- en: Animated rotating skewed quadrilaterl with corners assigned correctly with angle
    assignment method
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 带有正确分配角度的旋转倾斜四边形动画
- en: 'We can now use this function to sort our contour points:'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在可以使用这个函数来排序我们的轮廓点：
- en: '[PRE11]'
  id: totrans-96
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: Applying the Perspective Transformation
  id: totrans-97
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 应用透视变换
- en: 'Now that we know which points need to go where, we can finally move on to the
    most interesting part: creating and actually applying the perspective transformation
    to the image.'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们知道了哪些点需要移动到哪个位置，我们最终可以进入最有趣的部分：创建并实际应用图像的透视变换。
- en: '![Animation of applying perspective transformation](../Images/78afe87e9b6d8a7b64b0f29ab57507cc.png)'
  id: totrans-99
  prefs: []
  type: TYPE_IMG
  zh: '![应用透视变换的动画](../Images/78afe87e9b6d8a7b64b0f29ab57507cc.png)'
- en: Animation of applying perspective transformation
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 应用透视变换的动画
- en: 'Since we already have our list of points for the detected quadrilateral sorted
    in `rect_src`, and we have our target corner points in `rect_dst`, we can use
    the **[OpenCV](https://docs.opencv.org/4.x/da/d54/group__imgproc__transform.html#gae66ba39ba2e47dd0750555c7e986ab85)**
    method for calculating the transformation matrix:'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们已经将检测到的四边形的点列表按`rect_src`排序，并且我们有了目标角点在`rect_dst`中，我们可以使用**[OpenCV](https://docs.opencv.org/4.x/da/d54/group__imgproc__transform.html#gae66ba39ba2e47dd075055c7e986ab85)**方法来计算变换矩阵：
- en: '[PRE12]'
  id: totrans-102
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: 'The result is a *3×3 warp matrix*, defining how to transform from a skewed
    3D perspective view to a 2D flat top-down view. To get this flat top-down view
    of our Sudoku grid, we can apply this perspective transformation to our original
    image:'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 结果是一个**3×3的扭曲矩阵**，定义了如何从倾斜的3D透视视图转换到2D平视俯视图。为了得到我们数独网格的平视俯视图，我们可以将这个透视变换应用到原始图像上：
- en: '[PRE13]'
  id: totrans-104
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: And voilà, we have our perfectly square Sudoku grid!
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 哇，我们得到了一个完美的正方形数独网格！
- en: '![](../Images/ee6f2fb0f4c4a108f8a270e8cb92e8ca.png)'
  id: totrans-106
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/ee6f2fb0f4c4a108f8a270e8cb92e8ca.png)'
- en: Final flat top-down view of Sudoku square after perspective transformation
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 透视变换后的数独方格的最终俯视图
- en: Conclusion
  id: totrans-108
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this project we walked through a simple pipeline using classical Computer
    Vision techniques to extract Sudoku grids from pictures. These methods provide
    a simple way to detect the bounds of the Sudoku grids. Of course due to its simplicity
    there are some limitations to how well this approach generalizes to different
    settings and extreme environments such as low light or hard shadows. Using a deep-learning
    based approach could make sense if the detection needs to generalize to a vast
    amount of different settings.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个项目中，我们使用经典的计算机视觉技术，通过一个简单的流程从图片中提取数独网格。这些方法提供了一种简单的方式来检测数独网格的边界。当然，由于它的简单性，这种方法在推广到不同的设置和极端环境（如低光或硬阴影）时存在一些局限性。如果检测需要推广到大量不同的设置，使用基于深度学习的方案可能是有意义的。
- en: Next, a perspective transformation is used to get a flat top-down view of the
    grid. This image can now be used in further processing, such as extracting the
    numbers in the grid and actually solving the Sudoku. In a next article we will
    look further into these natural next steps in this project.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，使用透视变换来获取网格的平坦俯视图。现在，这张图片可以用于进一步处理，例如提取网格中的数字以及实际解决数独。在下一篇文章中，我们将进一步探讨这个项目中的这些自然下一步。
- en: Check out the source code of the project below and let me know if you have any
    questions or thoughts on this project. Until then, happy coding!
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 查看以下项目的源代码，并告诉我您对这个项目有任何问题或想法。在此之前，祝您编码愉快！
