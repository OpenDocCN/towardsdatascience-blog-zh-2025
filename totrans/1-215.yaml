- en: Classical Computer Vision and Perspective Transformation for Sudoku Extraction
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/classical-computer-vision-and-perspective-transformation-for-sudoku-extraction/](https://towardsdatascience.com/classical-computer-vision-and-perspective-transformation-for-sudoku-extraction/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![Animated perspective transformation warping the Sudoku grid](../Images/a2ba2041473cc98049255c1bcd1da37d.png)'
  id: totrans-2
  prefs: []
  type: TYPE_IMG
- en: '<mdspan datatext="el1759535304447" class="mdspan-comment">In the current age</mdspan>
    of AI hype, it feels like everyone is using *Vision-Language Models* and large
    *Vision Transformers* for every problem in Computer Vision. Many people see these
    tools as one-size-fits-all solutions and immediately use the latest, shiniest
    model instead of **understanding the underlying signal** they want to extract.
    But oftentimes there’s beauty to simplicity. It’s one of the most important lessons
    I’ve learned as an engineer: don’t overcomplicate solutions to simple problems.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: '![Animation of processing pipeline](../Images/b5ecf0261006a3caa3d23fd622fd2cf3.png)'
  id: totrans-4
  prefs: []
  type: TYPE_IMG
- en: Processing pipeline steps animated
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: Let me show you a practical application of some simple classical Computer Vision
    techniques to detect rectangular objects on flat surfaces and apply a perspective
    transformation to transform the skewed rectangle. Similar methods are widely used,
    for example, in document scanning and extraction applications.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: Along the way you will learn some interesting concepts from standard classical
    Computer Vision techniques to how to order polygon points and why this is related
    to a combinatoric assignment problem.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>***Overview***</summary>
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
