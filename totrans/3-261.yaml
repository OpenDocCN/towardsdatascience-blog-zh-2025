- en: How to Measure the Reliability of a Large Language Model’s Response
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/how-to-measure-the-reliability-of-a-large-language-models-response/](https://towardsdatascience.com/how-to-measure-the-reliability-of-a-large-language-models-response/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'The basic principle of Large Language Models (LLMs) is very simple: to predict
    the next word (or token) in a sequence of words based on statistical patterns
    in their training data. However, this seemingly simple capability turns out to
    be incredibly sophisticated when it can do a number of amazing tasks such as text
    summarization, idea generation, brainstorming, code generation, information processing,
    and content creation. That said, LLMs do not have any memory no do they actually
    “understand” anything, other than sticking to their basic function: *predicting
    the next word*.'
  prefs: []
  type: TYPE_NORMAL
- en: The process of next-word prediction is probabilistic. The LLM has to select
    each word from a probability distribution. In the process, they often generate
    false, fabricated, or inconsistent content in an attempt to produce coherent responses
    and fill in gaps with plausible-looking but incorrect information. This phenomenon
    is called hallucination, an inevitable, well-known feature of LLMs that warrants
    validation and corroboration of their outputs.
  prefs: []
  type: TYPE_NORMAL
- en: Retrieval augment generation (RAG) methods, which make an LLM work with external
    knowledge sources, do minimize hallucinations to some extent, but they cannot
    completely eradicate them. Although advanced RAGs can provide in-text citations
    and URLs, verifying these references could be hectic and time-consuming. Therefore,
    we need an objective criterion for assessing the reliability or trustworthiness
    of an LLM’s response, whether it is generated from its own knowledge or an external
    knowledge base (RAG).
  prefs: []
  type: TYPE_NORMAL
- en: In this article, we will discuss how the output of an LLM can be assessed for
    trustworthiness by a trustworthy language model which assigns a score to the LLM’s
    output. We will first discuss how we can use a trustworthy language model to assign
    scores to an LLM’s answer and explain trustworthiness. Subsequently, we will develop
    an example RAG with LlamaParse and LlamaIndex that assesses the RAG’s answers
    for trustworthiness.
  prefs: []
  type: TYPE_NORMAL
- en: The entire code of this article is available in the jupyter notebook on [GitHub](https://github.com/umairalipathan1980/Trustworthy-LLM).
  prefs: []
  type: TYPE_NORMAL
- en: '**Assigning a Trustworthiness Score to an LLM’s Answer**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To demonstrate how we can assign a trustworthiness score to an LLM’s response,
    I will use [Cleanlab’s Trustworthy Language Model (TLM)](https://cleanlab.ai/blog/trustworthy-language-model/).
    Such TLMs use a combination of **uncertainty quantification** and **consistency
    analysis** to compute trustworthiness scores and explanations for LLM responses.
  prefs: []
  type: TYPE_NORMAL
- en: '[Cleanlab](https://cleanlab.ai/) offers free trial APIs which can be obtained
    by creating an account at their website. We first need to install Cleanlab’s Python
    client:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Cleanlab supports several proprietary models such as ‘*gpt-4o*’, ‘*gpt-4o-mini*’,
    ‘*o1-preview*’, ‘*claude-3-sonnet*’, ‘*claude-3.5-sonnet*’, ‘*claude-3.5-sonnet-v2*’
    and others. Here is how TLM assigns a trustworhiness score to gpt-4o’s answer.
    The trustworthiness score ranges from 0 to 1, where higher values indicate greater
    trustworthiness.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: The above code tested the response of gpt-4o for the question “*How many vowels
    are there in the word ‘Abracadabra’.?*”. The TLM’s output contains the model’s
    answer (response), trustworthiness score, and explanation. Here is the output
    of this code.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: It can be seen how the most advanced language model hallucinates for such simple
    tasks and produces the wrong output. Here is the response and trustworthiness
    score for the same question for *claude-3.5-sonnet-v2*.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: '*claude-3.5-sonnet-v2* produces the correct output. Let’s compare the two models’
    responses to another question.'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: 'Here is the response of the two models:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b191494dc8137ee95fe383b289188f7c.png)'
  prefs: []
  type: TYPE_IMG
- en: Wrong outputs generated by gpt-4o and claude-3.5-sonnet-v2, represented by low
    trustworthiness score
  prefs: []
  type: TYPE_NORMAL
- en: 'We can also generate a trustworthiness score for open-source LLMs. Let’s check
    the recent, much-hyped open-source LLM: deepseek-R1\. I will use *DeepSeek-R1-Distill-Llama-70B*,
    based on Meta’s *Llama-3.3–70B-Instruct model* and distilled from DeepSeek’s larger
    671-billion parameter Mixture of Experts (MoE) model. [Knowledge distillation](https://www.ibm.com/think/topics/knowledge-distillation)
    is a machine learning technique that aims to transfer the learnings of a large
    pre-trained model, the “teacher model,” to a smaller “student model.”'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: Here is the output of *deepseek-r1-distill-llama-70b* model.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b50d7c650c229055bfcfb0630d52d142.png)'
  prefs: []
  type: TYPE_IMG
- en: The correct output of deepseek-r1-distill-llama-70b model with a high trustworthiness
    score
  prefs: []
  type: TYPE_NORMAL
- en: '**Developing a Trustworthy RAG**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We will now develop an RAG to demonstrate how we can measure the trustworthiness
    of an LLM response in RAG. This RAG will be developed by scraping data from given
    links, parsing it in markdown format, and creating a vector store.
  prefs: []
  type: TYPE_NORMAL
- en: The following libraries need to be installed for the next code.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: To render HTML into PDF format, we also need to install *wkhtmltopdf* command
    line tool from [their website](https://wkhtmltopdf.org/downloads.html).
  prefs: []
  type: TYPE_NORMAL
- en: 'The following libraries will be imported:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: The next steps will involve scraping data from given URLs using Python’s *BeautifulSoup*
    library, saving the scraped data in PDF file(s) using *pdfkit*, and parsing the
    data from PDF(s) to markdown file using *LlamaParse* which is a genAI-native document
    parsing platform built with LLMs and for LLM use cases.
  prefs: []
  type: TYPE_NORMAL
- en: We will first configure the LLM to be used by CleanlabTLM and the embedding
    model (*Huggingface* embedding model *BAAI/bge-small-en-v1.5*) that will be used
    to compute the embeddings of the scraped data to create the vector store.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: We will now define a custom event handler, *GetTrustworthinessScore*, that is
    derived from a base event handler class. This handler gets triggered by the end
    of an LLM completion and extracts a trustworthiness score from the response metadata.
    A helper function, *display_response*, displays the LLM’s response along with
    its trustworthiness score.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: We will now generate PDFs by scraping data from given URLs. For demonstration,
    we will scrap data only from [this Wikipedia article about large language models](https://en.wikipedia.org/wiki/Large_language_model)
    (*Creative Commons Attribution-ShareAlike 4.0 License*).
  prefs: []
  type: TYPE_NORMAL
- en: '**Note**: Readers are advised to always double-check the status of the content/data
    they are about to scrape and ensure they are allowed to do so.'
  prefs: []
  type: TYPE_NORMAL
- en: The following piece of code scrapes data from the given URLs by making an HTTP
    request and using *BeautifulSoup* Python library to parse the HTML content. HTML
    content is cleaned by converting protocol-relative URLs to absolute ones. Subsequently,
    the scraped content is converted into a PDF file(s) using *pdfkit*.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: After generating PDF(s) from the scraped data, we parse these PDFs using *LlamaParse*.
    We set the parsing instructions to extract the content in markdown format and
    parse the document(s) page-wise along with the document name and page number.
    These extracted entities (pages) are referred to as *nodes*. The parser iterates
    over the extracted nodes and updates each node’s metadata by appending a citation
    header which facilitates later referencing.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: We now create a vector store and a query engine. We define a customer prompt
    template to guide the LLM’s behavior in answering the questions. Finally, we create
    a query engine with the created index to answer queries. For each query, we retrieve
    the top 3 nodes from the vector store based on their semantic similarity with
    the query. The LLM uses these retrieved nodes to generate the final answer.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: Now let’s test the RAG for some queries and their corresponding trustworthiness
    scores.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/025127cfe0ceb24e27067f489c5b967d.png)'
  prefs: []
  type: TYPE_IMG
- en: Response to the query ‘When is mixture of experts approach used?’ (image by
    author)
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/3db6892794d546591a88d63c2c55488e.png)'
  prefs: []
  type: TYPE_IMG
- en: Response to the query ‘How do you compare the Deepseek model with OpenAI’s models?’
    (image by author)
  prefs: []
  type: TYPE_NORMAL
- en: Assigning a trustworthiness score to LLM’s response, whether generated through
    direct inference or RAG, helps to define the reliability of AI’s output and prioritize
    human verification where needed. This is particularly important for critical domains
    where a wrong or unreliable response could have severe consequences.
  prefs: []
  type: TYPE_NORMAL
- en: '*That’s all folks! If you like the article, please follow me on* [*Medium*](https://medium.com/@umairali.khan)
    *and* [*LinkedIn*](http://www.linkedin.com/in/uakhan80)*.*'
  prefs: []
  type: TYPE_NORMAL
