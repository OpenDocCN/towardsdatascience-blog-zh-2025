- en: Analyze Tornado Data with Python and GeoPandas
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用Python和GeoPandas分析龙卷风数据
- en: 原文：[https://towardsdatascience.com/analyze-tornado-data-with-python-and-geopandas-591d5e559bb4/](https://towardsdatascience.com/analyze-tornado-data-with-python-and-geopandas-591d5e559bb4/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/analyze-tornado-data-with-python-and-geopandas-591d5e559bb4/](https://towardsdatascience.com/analyze-tornado-data-with-python-and-geopandas-591d5e559bb4/)
- en: QUICK SUCCESS DATA SCIENCE
  id: totrans-2
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 快速成功数据科学
- en: '![Reported tornadoes with an assigned EF magnitude from 1950–2023 (by the author)](../Images/72adc2fdcd059b259e76d0551aed19b3.png)'
  id: totrans-3
  prefs: []
  type: TYPE_IMG
  zh: '![1950-2023年间报告的具有分配的EF等级的龙卷风（作者提供）](../Images/72adc2fdcd059b259e76d0551aed19b3.png)'
- en: Reported tornadoes with an assigned EF magnitude from 1950–2023 (by the author)
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 1950-2023年间报告的具有分配的EF等级的龙卷风（作者提供）
- en: If you’re interested in studying tornadoes, the *National Oceanic and Atmospheric
    Administration (NOAA)* has a wonderful public-domain database to make your day.
    Extending back to 1950, it covers tornado starting and ending locations, magnitudes,
    injuries, fatalities, financial costs, and more.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你对研究龙卷风感兴趣，*国家海洋和大气管理局（NOAA）*有一个很棒的公有领域数据库，让你的研究更加方便。该数据库追溯到1950年，涵盖了龙卷风的起始和结束位置、强度、伤害、死亡人数、经济损失等。
- en: The data is accessible through NOAA’s *[Storm Prediction Center](https://www.spc.noaa.gov/wcm/).*
    In addition to the raw data, this site supplies many charts and maps that slice
    and dice the data in multiple ways. One of my favorite maps is the 20-year average
    of severe weather watches. It makes it look like Oklahoma’s borders are mostly
    based on bad weather!
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 数据可以通过NOAA的*[风暴预测中心](https://www.spc.noaa.gov/wcm/)*获取。除了原始数据外，该网站还提供了许多图表和地图，以多种方式对数据进行切片和切块。我最喜欢的地图是20年的严重天气监视平均数。它使得俄克拉荷马州的边界看起来大部分是基于恶劣天气的！
- en: '![Oklahoma (circled) experiences more than its share of bad weather (NOAA)](../Images/cd9f1c6fbdef72e22f6cc871758bf534.png)'
  id: totrans-7
  prefs: []
  type: TYPE_IMG
  zh: '![俄克拉荷马州（圈出）经历的恶劣天气比其份额多（NOAA）](../Images/cd9f1c6fbdef72e22f6cc871758bf534.png)'
- en: Oklahoma (circled) experiences more than its share of bad weather ([NOAA](https://www.spc.noaa.gov/wcm/20ywatcha.png))
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 俄克拉荷马州（圈出）经历的恶劣天气比其份额多([NOAA](https://www.spc.noaa.gov/wcm/20ywatcha.png))
- en: These prefab maps are useful, but they can’t address every situation. There
    will be times when you need to make *custom* maps, either to answer a specific
    question or to incorporate outside data.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 这些预制地图很有用，但它们不能解决每一种情况。有时你需要制作*自定义*地图，要么是为了回答特定问题，要么是为了整合外部数据。
- en: In this *Quick Success Data Science* project, we’ll use Python, pygris, GeoPandas,
    Plotly Express, and part of NOAA’s extensive database to map tornado occurrences,
    graph their frequencies and magnitudes, and chart the loss of life.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个*快速成功数据科学*项目中，我们将使用Python、pygris、GeoPandas、Plotly Express以及NOAA广泛数据库的一部分来绘制龙卷风发生地点、图表其频率和强度，以及绘制生命损失图。
- en: '* * *'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: The Dataset
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据集
- en: The CSV-format dataset, highlighted in yellow in the following figure, covers
    the period 1950–2023\. Don’t bother downloading it. For convenience, I’ve provided
    a link in the code to access it programmatically.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 下图中的CSV格式数据集，黄色高亮显示，涵盖了1950-2023年期间。请勿下载。为了方便，我在代码中提供了一个链接，可以编程访问它。
- en: '![From the NOAA Severe Weather Database page (by the author)](../Images/7829422fd493f78bd2c7a75fd9a7f152.png)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
  zh: '![来自NOAA严重天气数据库页面（作者提供）](../Images/7829422fd493f78bd2c7a75fd9a7f152.png)'
- en: From the NOAA Severe Weather Database page (by the author)
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 来自NOAA严重天气数据库页面（作者提供）
- en: This CSV file contains 29 columns. You can find a key to the column names [here](https://www.spc.noaa.gov/wcm/data/SPC_severe_database_description.pdf).
    We’ll work primarily with the tornado starting locations (`slat`, `slon`), the
    year (`yr`) and month (`mo`), the storm magnitudes (`mag`), and the number of
    fatalities (`fat`).
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 此CSV文件包含29列。您可以在[这里](https://www.spc.noaa.gov/wcm/data/SPC_severe_database_description.pdf)找到列名的键。我们将主要使用龙卷风起始位置（`slat`，`slon`），年份（`yr`）和月份（`mo`），风暴强度（`mag`）以及死亡人数（`fat`）。
- en: As noted, this data is in the [public domain](https://www.climate.gov/faqs).
    Anything credited to NOAA Climate.gov can be freely re-used with proper attribution.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，这些数据属于[公有领域](https://www.climate.gov/faqs)。任何归功于NOAA Climate.gov的内容都可以自由重新使用，只要适当注明出处。
- en: '* * *'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Installing Libraries
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 安装库
- en: You’ll want to install [Matplotlib](https://matplotlib.org/stable/users/getting_started/),
    [GeoPandas](https://geopandas.org/en/stable/getting_started/install.html), [Plotly
    Express](https://pypi.org/project/plotly-express/), and Pygris. The previous links
    provide installation instructions.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能还需要安装[Matplotlib](https://matplotlib.org/stable/users/getting_started/)、[GeoPandas](https://geopandas.org/en/stable/getting_started/install.html)、[Plotly
    Express](https://pypi.org/project/plotly-express/)和Pygris。前面的链接提供了安装说明。
- en: 'You may also need to install *nbformat* for Plotly Express. You can do this
    with either:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能还需要为Plotly Express安装*nbformat*。你可以通过以下方式之一完成此操作：
- en: '`pip install nbformat`'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '`pip install nbformat`'
- en: or
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 或者
- en: '`conda install nbformat`'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: '`conda install nbformat`'
- en: or
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 或者
- en: '`conda install anaconda::nbformat`'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: '`conda install anaconda::nbformat`'
- en: '**NOTE:** *`pygris`* must be installed with *`pip`*. If you’re using conda
    with a conda environment, the best practice would be to install *`pygris`* last.'
  id: totrans-27
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**注意：** *`pygris`*必须使用*`pip`*安装。如果你使用conda环境，最佳实践是在最后安装*`pygris`*。'
- en: '* * *'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: Map Code
  id: totrans-29
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 地图代码
- en: The following code, written in JupyterLab, plots the starting location of tornadoes
    across the Lower 48 states. We’ll plot the full dataset first (almost 69,000 tornadoes!)
    and then plot subsets by year and magnitude.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 以下代码，用JupyterLab编写，绘制了美国下48个州龙卷风的起始位置。我们首先绘制整个数据集（近69,000个龙卷风！）然后按年份和震级绘制子集。
- en: Importing Libraries
  id: totrans-31
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 导入库
- en: The imported libraries support the maps and charts we’ll produce in this project.
    The `calendar` module will help us convert *numerical* months to month name *abbreviations*.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 导入的库支持我们在本项目中产生的地图和图表。`calendar`模块将帮助我们将*数值*月份转换为月份名称*缩写*。
- en: We’ll use the popular `matplotlib` library to make static plots and `geopandas`
    to handle the geospatial data. Pandas will help with data loading and manipulation.
    (Because `geopandas` includes `pandas` as a dependency there’s no reason for a
    separate install). GeoPandas includes `shapely`, which we’ll use to create a geospatially
    aware GeoDataFrame from the CSV file.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用流行的`matplotlib`库来制作静态图表，并使用`geopandas`处理地理空间数据。Pandas将帮助加载数据和处理数据。（因为`geopandas`包含`pandas`作为依赖项，所以没有必要单独安装）。GeoPandas包含`shapely`，我们将使用它从CSV文件创建一个具有地理空间意识的GeoDataFrame。
- en: Finally, the `pygris` module provides easy access and loading of [US Census
    Bureau TIGER/Line](https://www.census.gov/geographies/mapping-files/time-series/geo/tiger-line-file.html)
    cartographic boundary shapefiles. This lets us plot both US state *and* county
    boundaries.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，`pygris`模块提供了方便访问和加载[美国人口普查局TIGER/Line](https://www.census.gov/geographies/mapping-files/time-series/geo/tiger-line-file.html)地图边界形状文件的功能。这使得我们可以绘制美国州和县的边界。
- en: '[PRE0]'
  id: totrans-35
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Loading Data and Preparing the GeoDataFrame
  id: totrans-36
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 加载数据和准备GeoDataFrame
- en: The NOAA CSV file is stored on a Gist for convenience. We’ll start by loading
    it as a pandas DataFrame and then filter out the non-contiguous US components.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: NOAA CSV文件存储在一个Gist上以方便使用。我们将首先将其加载为一个pandas DataFrame，然后过滤掉非连续的美国组成部分。
- en: '[PRE1]'
  id: totrans-38
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Note that the tilde (`~`) in the second line *negates* the boolean Series. So,
    we’re telling pandas to give us a DataFrame *without* the listed states.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，第二行中的波浪号(`~`)是否定布尔序列。因此，我们告诉pandas给我们一个没有列出州的DataFrame。
- en: 'The primary geospatial data in the CSV file is the latitude (`slat`) and longitude
    (`slon`) columns. We’ll use GeoPandas and Shapely to turn these into a geometry
    column, which is what distinguishes GeoDataFrames from DataFrames. We’ll also
    assign a coordinate reference system (`crs`) so GeoPandas knows how to project
    the data onto a flat map. (For more on GeoDataFrames and projection systems, check
    out this article):'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: CSV文件中的主要地理空间数据是纬度(`slat`)和经度(`slon`)列。我们将使用GeoPandas和Shapely将这些转换为几何列，这是GeoDataFrames与DataFrames的区别所在。我们还将分配一个坐标参考系统(`crs`)，这样GeoPandas就知道如何将数据投影到平面上。（有关GeoDataFrames和投影系统的更多信息，请参阅这篇文章）：
- en: '[https://towardsdatascience.com/comparing-country-sizes-with-geopandas-2ce027282ba0](https://towardsdatascience.com/comparing-country-sizes-with-geopandas-2ce027282ba0)'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://towardsdatascience.com/comparing-country-sizes-with-geopandas-2ce027282ba0](https://towardsdatascience.com/comparing-country-sizes-with-geopandas-2ce027282ba0)'
- en: 'The final step filters out tornadoes with no assigned magnitude value (unknown
    = -9). We do this so that we can work with magnitude values later. This removes
    about 1,000 tornadoes from the dataset:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 最后一步过滤掉没有分配震级值（未知=-9）的龙卷风。我们这样做是为了稍后可以处理震级值。这从数据集中移除了大约1,000个龙卷风：
- en: '[PRE2]'
  id: totrans-43
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '[PRE3]'
  id: totrans-44
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Preparing the County and State Borders
  id: totrans-45
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 准备县和州边界
- en: The `pygris` library provides easy access to official US Census shapefiles for
    political boundaries. The following code uses `pygris` and GeoPandas to prepare
    the map onto which we’ll plot the tornado data.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: '`pygris`库提供了访问官方美国人口普查政治边界形状文件的便捷途径。以下代码使用`pygris`和GeoPandas来准备我们将绘制龙卷风数据的地图。'
- en: '[PRE4]'
  id: totrans-47
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: We first call the `pygris` `states` and `counties` modules, which return DataFrames.
    Each of these is passed to the GeoPandas `GeoDataFrame()` class to make a GeoDataFrame.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 我们首先调用`pygris`的`states`和`counties`模块，它们返回DataFrames。这些DataFrame中的每一个都被传递给GeoPandas的`GeoDataFrame()`类，以创建GeoDataFrame。
- en: 'Here’s an example of the first few rows of the `states_gdf` GeoDataFrame:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是`states_gdf` GeoDataFrame的前几行示例：
- en: '![First 5 rows of the states_gdf GeoDataFrame (by the author)](../Images/a3a622ebb0d629fe76e478e47d9d5802.png)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![First 5 rows of the states_gdf GeoDataFrame (by the author)](../Images/a3a622ebb0d629fe76e478e47d9d5802.png)'
- en: First 5 rows of the states_gdf GeoDataFrame (by the author)
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: First 5 rows of the states_gdf GeoDataFrame (by the author)
- en: Next, we use the "STUSPS" column of `states_gdf` to filter out states and territories
    not in the Lower 48\. Then we use the FIPS state codes in the "STSTEFP" column
    to filter out the counties in these excluded states from the `counties_gdf` GeoDataFrame.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们使用`states_gdf`的"STUSPS"列来过滤掉不在下48州内的州和领地。然后我们使用"STSTEFP"列中的FIPS州代码来过滤掉这些排除州中的县，从`counties_gdf`
    GeoDataFrame中。
- en: A FIPS state code is a numeric code defined in *U.S. Federal Information Processing
    Standard Publication ("FIPS PUB") 5–2* to identify U.S. states and other associated
    areas. You can find these codes [here](https://www.census.gov/library/reference/code-lists/ansi.html).
  id: totrans-53
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: FIPS州代码是一个在*U.S. Federal Information Processing Standard Publication ("FIPS
    PUB") 5–2*中定义的数字代码，用于识别美国各州和其他相关区域。您可以在[这里](https://www.census.gov/library/reference/code-lists/ansi.html)找到这些代码。
- en: The last two steps create a bounding box that encompasses the contiguous US
    and then uses it to clip the GeoDataFrames. This produces a better-looking map,
    in my opinion.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 最后两个步骤创建了一个包含整个美国大陆的边界框，然后使用它来裁剪GeoDataFrames。在我看来，这会产生一个看起来更好的地图。
- en: Plotting the Map
  id: totrans-55
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 绘制地图
- en: Now we use Matplotlib and GeoPandas to plot the data. While GeoPandas is built
    on Matplotlib and can plot without it, you get more refined results using Matplotlib.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们使用Matplotlib和GeoPandas来绘制数据。虽然GeoPandas建立在Matplotlib之上，可以不使用它进行绘图，但使用Matplotlib可以得到更精细的结果。
- en: '[PRE5]'
  id: totrans-57
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: This code is annotated and straightforward. One thing to note, however, is that
    we are only plotting the f*irst reported location of the tornadoes* (the "s" in
    `slat` and `slon` stands for "start"). The ending locations (`elat` and `elon`)
    are also included in the NOAA data, and you can use them to draw tornado tracks.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 这段代码有注释且简单易懂。但要注意的一点是，我们只绘制了龙卷风的*首次报告位置*（`slat`和`slon`中的"s"代表"start"）。结束位置（`elat`和`elon`）也包含在NOAA数据中，您可以使用它们来绘制龙卷风轨迹。
- en: 'Here’s the result, showing almost 70,000 tornadoes:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是结果，显示了近70,000次龙卷风：
- en: '![The starting location of all tornadoes of known magnitude from 1950–2023
    (by the author)](../Images/72adc2fdcd059b259e76d0551aed19b3.png)'
  id: totrans-60
  prefs: []
  type: TYPE_IMG
  zh: '![The starting location of all tornadoes of known magnitude from 1950–2023
    (by the author)](../Images/72adc2fdcd059b259e76d0551aed19b3.png)'
- en: The starting location of all tornadoes of known magnitude from 1950–2023 (by
    the author)
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 1950–2023年间已知强度所有龙卷风的起始位置（作者提供）
- en: Look carefully at this map. You should be able to identify major cities (like
    Houston, Dallas, and Oklahoma City) and major roadways (like I-35 between San
    Antonio and Dallas, and I-20 across central Mississippi and northern Louisiana).
    This is because it’s easier to detect tornadoes where there are more people and
    radar stations.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 仔细观察这张地图。你应该能够识别出主要城市（如休斯顿、达拉斯和俄克拉荷马城）以及主要道路（如圣安东尼奥和达拉斯之间的I-35，以及穿越密西西比州中部和路易斯安那州北部的I-20）。这是因为人口和雷达站越多，检测到龙卷风就越容易。
- en: 'Another interesting aspect of this map is that "[Tornado Alley](https://en.wikipedia.org/wiki/Tornado_Alley)",
    historically located in midwestern states like Texas, Oklahoma, Kansas, South
    Dakota, Iowa, and Nebraska, is expanding *eastward*. In fact, a new term, "[Dixie
    Alley](https://en.wikipedia.org/wiki/Dixie_Alley)," is now applied to southeastern
    states, especially Mississippi and Alabama. To see this, we can plot the data
    in two 30-year tranches from 1950 to 1978 and from 1980 to 2009:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 这张地图的另一个有趣方面是，"[龙卷风走廊](https://en.wikipedia.org/wiki/Tornado_Alley)"，历史上位于德克萨斯州、俄克拉荷马州、堪萨斯州、南达科他州、爱荷华州和内布拉斯加州等中西部州，正在向*东扩展*。事实上，一个新的术语"[迪西走廊](https://en.wikipedia.org/wiki/Dixie_Alley)"现在被应用于东南部各州，尤其是密西西比州和阿拉巴马州。为了看到这一点，我们可以从1950年到1978年和1980年到2009年的两个30年时间段绘制数据：
- en: '![Comparison of reported tornadoes from 1950–1979 with those from 1980–2009
    show an increase in reports and the formation of "Dixie Alley." (by the author)](../Images/38597a86bfa08ddf365217d6bb0adbab.png)'
  id: totrans-64
  prefs: []
  type: TYPE_IMG
  zh: '![1950–1979年与1980–2009年报告的风暴比较显示报告数量增加，并形成了“迪克西走廊”。（作者制）](../Images/38597a86bfa08ddf365217d6bb0adbab.png)'
- en: Comparison of reported tornadoes from 1950–1979 with those from 1980–2009 show
    an increase in reports and the formation of "Dixie Alley." (by the author)
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 1950–1979年与1980–2009年报告的风暴比较显示报告数量增加，并形成了“迪克西走廊”。（作者制）
- en: '**NOTE:** The widespread use of Doppler weather radar networks, especially
    the [NEXRAD network](https://www.test.roc.noaa.gov/branches/program-branch/site-id-database/site-id-location-maps.php),
    greatly improved tornado prediction and detection starting around 1990.'
  id: totrans-66
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**注意：**多普勒天气雷达网络的广泛应用，特别是[NEXRAD网络](https://www.test.roc.noaa.gov/branches/program-branch/site-id-database/site-id-location-maps.php)，从大约1990年开始极大地提高了风暴预测和检测能力。'
- en: 'Dixie Alley is even more apparent in this KDE map from the NOAA website:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 在NOAA网站上的这个KDE地图上，“迪克西走廊”甚至更加明显：
- en: '![Mean number of EF1 and stronger tornado days per year within 25 miles of
    a point (1986–2015) (NOAA)](../Images/d825fd3fabfc638c70f18384c0df1bc8.png)'
  id: totrans-68
  prefs: []
  type: TYPE_IMG
  zh: '![每年25英里范围内EF1级及以上风暴日的平均数量（1986–2015）(NOAA)](../Images/d825fd3fabfc638c70f18384c0df1bc8.png)'
- en: Mean number of EF1 and stronger tornado days per year within 25 miles of a point
    (1986–2015) ([NOAA](https://www.spc.noaa.gov/wcm/#20yavg))
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 每年25英里范围内EF1级及以上风暴日的平均数量（1986–2015）([NOAA](https://www.spc.noaa.gov/wcm/#20yavg))
- en: Mapping a Single Year’s Tornado Outbreaks
  id: totrans-70
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 映射单年的龙卷风爆发
- en: 'Next, we’ll leverage the previous code to look at the tornadoes occurring in
    2023 (the 2024 dataset isn’t finalized yet). This involves copying the original
    GeoDataFrame to a new one named `gdf_2023` and filtering out all rows where the
    "yr" column is not 2023:'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将利用之前的代码来查看2023年发生的风暴（2024年的数据集尚未最终确定）。这涉及到将原始GeoDataFrame复制到一个名为`gdf_2023`的新GeoDataFrame中，并过滤掉所有“yr”列不是2023年的行：
- en: '[PRE6]'
  id: totrans-72
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Here’s the result. Note how the *inverted triangle* marker style (`'v'`) resembles
    little tornadoes. Never give up the opportunity for a zestful life!
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 这是结果。注意，*倒三角形*标记样式(`'v'`)类似于小龙卷风。永远不要放弃追求充满活力的生活！
- en: '![Tornadoes with assigned EF magnitudes in 2023 (by the author)](../Images/15ac6848f36347329d13da27865acdd0.png)'
  id: totrans-74
  prefs: []
  type: TYPE_IMG
  zh: '![2023年分配了EF等级的风暴图（作者制）](../Images/15ac6848f36347329d13da27865acdd0.png)'
- en: Tornadoes with assigned EF magnitudes in 2023 (by the author)
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 2023年分配了EF等级的风暴图（作者制）
- en: The "Dixie Alley" really shows up in this plot. Oklahoma and Mississippi appear
    to be battling for the title of "stormiest state."
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: “迪克西走廊”在这张图上表现得非常明显。俄克拉荷马州和密西西比州似乎在争夺“风暴最频繁的州”的称号。
- en: '![2023 tornadoes in south-central US (by the author)](../Images/4ec82eb84e35685fc55f7972aa86e35c.png)'
  id: totrans-77
  prefs: []
  type: TYPE_IMG
  zh: '![2023年美国中南部风暴图（作者制）](../Images/4ec82eb84e35685fc55f7972aa86e35c.png)'
- en: 2023 tornadoes in south-central US (by the author)
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 2023年美国中南部风暴图（作者制）
- en: Also of interest are the tornadoes dotted along the Gulf of Mexico and Atlantic
    coastlines. These tornadoes may have been spawned from hurricanes or tropical
    storms.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 同样引人注目的是墨西哥湾和大西洋沿岸线上的风暴。这些风暴可能是由飓风或热带风暴引发的。
- en: Mapping Magnitudes
  id: totrans-80
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 映射强度
- en: In 2007 the *[Enhanced Fujita Scale](https://www.weather.gov/oun/efscale),*
    or *EF Scale*, became operational. This scale uses estimated wind speeds and related
    damage to assign a rating of 0 to 5 to each tornado, with 5 being the strongest.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 2007年，*[增强富吉塔等级](https://www.weather.gov/oun/efscale)，*或*EF等级*，开始投入使用。这个等级使用估计的风速和相关损害来为每个龙卷风分配0到5的评级，5表示最强。
- en: The following code breaks out the weakest (EF0–1) and strongest (EF2–5) storms
    and maps them using different colors.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 以下代码将最弱的风暴（EF0–1）和最强的风暴（EF2–5）分离出来，并使用不同的颜色进行映射。
- en: '[PRE7]'
  id: totrans-83
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: '![2023 tornadoes color-coded by magnitude groups (by the author)](../Images/197dc029077caccd70549da76160a14c.png)'
  id: totrans-84
  prefs: []
  type: TYPE_IMG
  zh: '![2023年按强度分组的风暴颜色编码图（作者制）](../Images/197dc029077caccd70549da76160a14c.png)'
- en: 2023 tornadoes color-coded by magnitude groups (by the author)
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 2023年按强度分组的风暴颜色编码图（作者制）
- en: Note how the more severe storms (colored maroon) are often near — or east of — the
    Mississippi River, rather than in the historical "Tornado Alley" in the Midwest.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 注意到更严重的风暴（深红色）通常位于密西西比河附近或其东边，而不是历史上的“龙卷风走廊”的中西部。
- en: 'Bonus: Plotting 2023 Tornadoes with Plotly Express'
  id: totrans-87
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 奖励：使用Plotly Express绘制2023年龙卷风图
- en: So far, we’ve been plotting with Matplotlib/GeoPandas. For a more interactive
    plot, you can use the *[Plotly Express](https://plotly.com/python/plotly-express/)*
    library. This also obviates the need for GeoPandas, as Plotly Express works with
    pandas DataFrames with latitude and longitude columns.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们一直在使用Matplotlib/GeoPandas进行绘图。为了获得更交互式的图表，你可以使用*[Plotly Express](https://plotly.com/python/plotly-express/)*库。这也消除了对GeoPandas的需求，因为Plotly
    Express与具有纬度和经度列的pandas DataFrames一起工作。
- en: The following code plots the location of tornadoes reported in 2023.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 以下代码绘制了2023年报告的龙卷风位置。
- en: '[PRE8]'
  id: totrans-90
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'Here’s the output:'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是输出结果：
- en: '![The Plotly Express figure showing the hover window in action (by the author)](../Images/d506d7104916228e5be7c3e903556d69.png)'
  id: totrans-92
  prefs: []
  type: TYPE_IMG
  zh: '![显示悬停窗口动作的Plotly Express图形（作者）](../Images/d506d7104916228e5be7c3e903556d69.png)'
- en: The Plotly Express figure showing the hover window in action (by the author)
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 显示悬停窗口动作的Plotly Express图形（作者）
- en: While I prefer the appearance of the Matplotlib-based maps, Plotly Express permits
    many useful features like zooming, panning, and viewing detailed point data with
    the hover window.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然我更喜欢基于Matplotlib的地图的外观，但Plotly Express允许许多有用的功能，如缩放、平移以及通过悬停窗口查看详细点数据。
- en: '* * *'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Charting Code
  id: totrans-96
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 绘图代码
- en: You can visualize the NOAA data with more than just maps. In this section, we’ll
    make various graphs to analyze tornado frequency, EF magnitude, and fatalities
    per EF magnitude.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以用不仅仅是地图的方式来可视化NOAA数据。在本节中，我们将制作各种图表来分析龙卷风频率、EF等级和每EF等级的死亡人数。
- en: Number of Tornadoes per Year
  id: totrans-98
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 每年龙卷风数量
- en: First, we’ll look at the number of tornadoes per year. This time, we’ll include
    the roughly one thousand tornadoes with no recorded EF magnitude.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们将查看每年发生的龙卷风数量。这次，我们将包括大约一千次没有记录EF等级的龙卷风。
- en: '[PRE9]'
  id: totrans-100
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: '![Bar chart of the number of tornadoes per year (1950–2023) (by the author)](../Images/f188624db2b39a32809fae10d279250d.png)'
  id: totrans-101
  prefs: []
  type: TYPE_IMG
  zh: '![每年龙卷风数量的条形图（1950–2023）（作者）](../Images/f188624db2b39a32809fae10d279250d.png)'
- en: Bar chart of the number of tornadoes per year (1950–2023) (by the author)
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 每年龙卷风数量的条形图（1950–2023）（作者）
- en: The increase in the number of tornadoes starting around 1990 is partly due to
    the deployment of the NEXRAD weather surveillance radar network in the early-to-mid
    1990s. While climate change has surely influenced the number of tornadoes, it’s
    important to be cognizant of sampling issues when interpreting data.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 大约从1990年开始的龙卷风数量增加部分是由于20世纪90年代初至中期部署的NEXRAD天气监视雷达网络。虽然气候变化无疑影响了龙卷风的数量，但在解释数据时，重要的是要意识到采样问题。
- en: Number of Tornadoes per Month
  id: totrans-104
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 每月龙卷风数量
- en: Now, we’ll look at the monthly frequency of tornadoes over the full timeframe.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们将查看整个时间框架内龙卷风的月度频率。
- en: '[PRE10]'
  id: totrans-106
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: '![Number of tornadoes reported per month (1950–2023) (by the author)](../Images/99edfa6a333a224c6d6fe573169adbe6.png)'
  id: totrans-107
  prefs: []
  type: TYPE_IMG
  zh: '![每月报告的龙卷风数量（1950–2023）（作者）](../Images/99edfa6a333a224c6d6fe573169adbe6.png)'
- en: Number of tornadoes reported per month (1950–2023) (by the author)
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 每月报告的龙卷风数量（1950–2023）（作者）
- en: As expected, tornadoes are more common in the spring, when the weather transitions
    from winter to summer.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 如预期，龙卷风在春季更为常见，此时天气从冬季过渡到夏季。
- en: '**NOTE:** you can make charts like these directly from a GeoDataFrame by changing
    the `df` to `gdf` in the previous code. The syntax is the same.'
  id: totrans-110
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**注意：**你可以通过将上一段代码中的`df`改为`gdf`直接从GeoDataFrame制作这样的图表。语法是相同的。'
- en: 'Annual Counts of Tornadoes: Cumulative Plot'
  id: totrans-111
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 龙卷风年度计数：累积图
- en: 'Here’s a question: *"Have the number of tornadoes in the last 15 years increased
    or decreased relative to the long-term average?"*'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个问题：“在过去的15年里，龙卷风的数量与长期平均数相比是增加还是减少了？”
- en: To answer this, we’ll use the NOAA data to make a cumulative plot of tornadoes
    per month for each year since 2008 and overlay it with the cumulative average
    per month for the full dataset (1950–2023).
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 为了回答这个问题，我们将使用NOAA数据制作自2008年以来每年每月龙卷风数量的累积图，并将其与整个数据集（1950–2023）每月累积平均数叠加。
- en: 'Here’s the annotated code:'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是注释过的代码：
- en: '[PRE11]'
  id: totrans-115
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: 'And here’s the result; the older curves use dashed lines for clarity:'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是结果；为了清晰起见，较老的曲线使用虚线：
- en: '![Cumulative tornado counts vs. month with 1950–2023 mean (by the author)](../Images/5e5ee826970e1b548974dae77d504c14.png)'
  id: totrans-117
  prefs: []
  type: TYPE_IMG
  zh: '![累积龙卷风计数与月份对比，以及1950–2023的平均值（作者）](../Images/5e5ee826970e1b548974dae77d504c14.png)'
- en: Cumulative tornado counts vs. month with 1950–2023 mean (by the author)
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 累积龙卷风计数与月份对比，以及1950–2023的平均值（作者）
- en: 'For most of the last 15 years, the number of tornadoes per month and year has
    been greater than the long-term average. However, this is partly due to the use
    of modern weather surveillance radar over this period. If we look at the mean
    for 1990–2023, when these new systems became widespread, the relationship is more
    reasonable:'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 在过去15年的大部分时间里，每月和每年的龙卷风数量都超过了长期平均水平。然而，这部分是由于在此期间使用了现代天气监视雷达。如果我们看1990-2023年的平均值，在这些新系统广泛使用时，这种关系更为合理：
- en: '![Cumulative tornado counts vs. month with 1990–2023 mean (by the author)](../Images/84b8c92d58d2192b417f57b5b515c4e2.png)'
  id: totrans-120
  prefs: []
  type: TYPE_IMG
  zh: '![龙卷风累计数量与月份对比，1990-2023年平均值（作者）](../Images/84b8c92d58d2192b417f57b5b515c4e2.png)'
- en: Cumulative tornado counts vs. month with 1990–2023 mean (by the author)
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 龙卷风累计数量与月份对比，1990-2023年平均值（作者）
- en: Based on [preliminary reports](https://en.wikipedia.org/wiki/Tornadoes_of_2024),
    2024 will be the second most active year for tornadoes, with at least 1,777 tornadoes
    confirmed out of 1,880 reports. Only [2004](https://en.wikipedia.org/wiki/Tornadoes_of_2004)
    had more tornadoes with 1,817.
  id: totrans-122
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 根据[初步报告](https://en.wikipedia.org/wiki/Tornadoes_of_2024)，2024年将成为继2004年之后的第二活跃的龙卷风年，共有至少1777起龙卷风被确认，而报告总数为1880起。只有2004年有更多的龙卷风，共有1817起。
- en: Number of Tornadoes by EF Magnitude
  id: totrans-123
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 按EF等级划分的龙卷风数量
- en: Now we’ll count tornadoes by EF magnitude, where 0 is the weakest and 5 is the
    strongest. We’ll do this for the full dataset (1950–2023).
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们将按EF等级计算龙卷风数量，其中0是最弱的，5是最强的。我们将对整个数据集（1950-2023年）进行此操作。
- en: '[PRE12]'
  id: totrans-125
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: '![Number of tornadoes by EF magnitude (-9 = Unknown magnitude) (by the author)](../Images/cb2409b157689270913ad16c5ea73357.png)'
  id: totrans-126
  prefs: []
  type: TYPE_IMG
  zh: '![按EF等级划分的龙卷风数量（-9 = 未知等级）（作者）](../Images/cb2409b157689270913ad16c5ea73357.png)'
- en: Number of tornadoes by EF magnitude (-9 = Unknown magnitude) (by the author)
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 按EF等级划分的龙卷风数量（-9 = 未知等级）（作者）
- en: A magnitude value of -9 represents an *unknown* EF magnitude. For magnitudes
    0–5, the behavior is logical. The weakest tornadoes are the most abundant, and
    the strongest (EF4–5) are thankfully rare.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: -9的等级代表一个*未知*的EF等级。对于0-5的等级，其行为是合理的。最弱的龙卷风是最常见的，而最强的（EF4-5）则相对罕见。
- en: Number of Fatalities by EF Magnitude
  id: totrans-129
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 按EF等级划分的死亡人数
- en: 'Here’s an interesting question: *do you expect more fatalities from EF1 storms,
    due to their abundance, or from EF5 storms, due to their intensity?*'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个有趣的问题：*你认为EF1风暴会因数量众多而导致更多死亡，还是EF5风暴会因强度大而导致更多死亡？*
- en: 'Let’s find out:'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们来看看：
- en: '[PRE13]'
  id: totrans-132
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: '![Fatalities by EF magnitude (1950–2023) (by the author)](../Images/e9263e206eb230d8842e5c052b096ffd.png)'
  id: totrans-133
  prefs: []
  type: TYPE_IMG
  zh: '![按EF等级划分的死亡人数（1950-2023）（作者）](../Images/e9263e206eb230d8842e5c052b096ffd.png)'
- en: Fatalities by EF magnitude (1950–2023) (by the author)
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 按EF等级划分的死亡人数（1950-2023年）（作者）
- en: Tornadoes become increasingly deadly up through EF4\. EF5 tornadoes are technically
    deadlier than EF4 tornadoes but have killed fewer people due to their extreme
    rarity.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 龙卷风在EF4级别时变得越来越致命。EF5龙卷风在技术上比EF4龙卷风更致命，但由于其极端罕见，造成的死亡人数较少。
- en: We’ll stop here but be aware that we’ve only scratched the surface. To see more
    tornado-related visualizations, visit the *[Severe Weather Maps, Graphics, and
    Data Page](https://www.spc.noaa.gov/wcm/#stats)*, and elsewhere on NOAA’s *[Storm
    Prediction Center](https://www.spc.noaa.gov/)* website.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在这里就结束了，但请注意，我们只是触及了表面。要查看更多与龙卷风相关的可视化内容，请访问*[严重天气地图、图形和数据页面](https://www.spc.noaa.gov/wcm/#stats)*，以及NOAA的*[风暴预测中心](https://www.spc.noaa.gov/)*网站的其他部分。
- en: '* * *'
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: Tornado Alley and the Hundredth Meridian
  id: totrans-138
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 龙卷风走廊和百慕大经线
- en: As previously noted, the famous "Tornado Alley" has been migrating eastward.
    Interestingly, another famous climatic feature, the "Hundredth Meridian," has
    also been marching eastward. This vertical boundary traces the demarcation of
    the arid west from the humid east. Scientists now believe it is closer to the
    98th meridian, just west of the Dallas-Fort Worth metroplex in Texas. This represents
    an eastward shift of about 140 miles (224 km) since it was first recognized in
    the late 1800s.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，著名的“龙卷风走廊”一直在向东迁移。有趣的是，另一个著名的气候特征，“百慕大经线”也在向东移动。这条垂直边界标志着干旱的西部与湿润的东部之间的分界线。科学家们现在认为它更接近98度经线，位于德克萨斯州的达拉斯-沃斯堡都会区以西。这代表着自19世纪末首次被识别以来，向东移动了大约140英里（224公里）。
- en: 'You can read more about it here:'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在这里了解更多相关信息：
- en: '[**Tell a Climate Story with Plotly Express**](https://betterprogramming.pub/tell-a-climate-story-with-plotly-express-bca33a723bc4)'
  id: totrans-141
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[**用Plotly Express讲述气候故事**](https://betterprogramming.pub/tell-a-climate-story-with-plotly-express-bca33a723bc4)'
- en: '* * *'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: Summary
  id: totrans-143
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: In this project, we used [free NOAA data](https://www.spc.noaa.gov/wcm/#data)
    to investigate tornado statistics in the contiguous USA from 1950 to 2023\. While
    we generated static maps and charts using Matplotlib, GeoPandas, and pandas, we
    also looked at Plotly Express as a dynamic mapping alternative.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个项目中，我们使用了[免费的NOAA数据](https://www.spc.noaa.gov/wcm/#data)来调查从1950年到2023年美国本土的龙卷风统计数据。虽然我们使用了Matplotlib、GeoPandas和pandas生成了静态地图和图表，但我们还研究了Plotly
    Express作为动态映射的替代方案。
