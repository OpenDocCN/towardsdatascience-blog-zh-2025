- en: Hitchhiker’s Guide to RAG with ChatGPT API and LangChain
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/hitchhikers-guide-to-rag-with-chatgpt-api-and-langchain/](https://towardsdatascience.com/hitchhikers-guide-to-rag-with-chatgpt-api-and-langchain/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1750879903177" class="mdspan-comment">Nowadays, LLMs can
    easily</mdspan> generate tons of words and responses based on general knowledge,
    but what happens when we need answers requiring accurate and specific knowledge?
    Solely generative models frequently struggle to provide answers on domain-specific
    questions for a bunch of reasons; maybe the data they were trained on is now outdated,
    maybe what we are asking for is *really *specific and specialized, maybe we want
    responses that take into account personal or corporate data that just aren’t public…
    🤷‍♀️ the list goes on.
  prefs: []
  type: TYPE_NORMAL
- en: 'So, how can we leverage generative AI while keeping our responses accurate,
    relevant, and down-to-earth? A good answer to this question is the [Retrieval-Augmented
    Generation (RAG)](https://en.wikipedia.org/wiki/Retrieval-augmented_generation) framework.
    RAG is a framework that consists of two key components: retrieval and generation
    (duh!). Unlike solely generative models that are pre-trained on specific data,
    RAG incorporates an extra step of retrieval that allows us to push additional
    information into the model from an external source, such as a database or a document.
    To put it differently, a RAG pipeline allows for providing coherent and natural
    responses (provided by the generation step), which are also factually accurate
    and grounded in a knowledge base of our choice (provided by the retrieval step).'
  prefs: []
  type: TYPE_NORMAL
- en: 🍨*[**DataCream**](https://datacream.substack.com/) is a newsletter offering
    stories and tutorials on AI, data, tech. If you are interested in these topics,
    **[subscribe here](https://datacream.substack.com/).***
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: In this way, RAG can be an extremely valuable tool for applications where highly
    specialized data is needed, as for instance customer support, legal advice, or
    technical documentation. One typical example of a RAG application is customer
    support chatbots, answering customer issues based on a company’s database of support
    documents and FAQs. Another example would be complex software or technical products
    with extensive troubleshooting guides. One more example would be legal advice — a
    RAG model would access and retrieve custom data from law libraries, previous cases,
    or firm guidelines. The examples are really endless; however, in all these cases,
    the access to external, specific, and relevant to the context data enables the
    model to offer more precise and accurate responses.
  prefs: []
  type: TYPE_NORMAL
- en: So, in this post, I walk you through building a simple RAG pipeline in Python,
    utilizing ChatGPT API, LangChain, and FAISS.
  prefs: []
  type: TYPE_NORMAL
- en: What about RAG?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: From a more technical perspective, RAG is a technique used to enhance an LLM’s
    responses by injecting it with additional, domain-specific information. In essence,
    RAG allows for a model to also take into account additional external information — like
    a recipe book, a technical manual, or a company’s internal knowledge base — while
    forming its responses.
  prefs: []
  type: TYPE_NORMAL
- en: 'This is very important because it allows us to eliminate a bunch of problems
    inherent to LLMs, as for instance:'
  prefs: []
  type: TYPE_NORMAL
- en: '[Hallucinations](https://en.wikipedia.org/wiki/Hallucination_%28artificial_intelligence%29) — making
    things up'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Outdated information — if the model wasn’t trained on recent data
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Transparency — not knowing where responses are coming from
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: To make this work, the external documents are first processed into vector embeddings
    and stored in a vector database. Then, when we submit a prompt to the LLM, any
    relevant data is retrieved from the vector database and passed to the LLM along
    with our prompt. As a result, the response of the LLM is formed by considering
    both our prompt and any relevant information existing in the vector database in
    the background. Such a vector database can be hosted locally or in the cloud,
    using a service like [Pinecone](https://www.pinecone.io/) or [Weaviate](https://github.com/weaviate/weaviate).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e3c3352727b0ff1f5371a2821b3a5162.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: What about ChatGPT API, LangChain, and FAISS?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The first component for building a RAG pipeline is the LLM model that will generate
    the responses. This can be any LLM, like Gemini or Claude, but in this post, I
    will be using OpenAI’s ChatGPTmodels via their [API platform](https://openai.com/api/).
    In order to use their API, we need to sign in and obtain an API key. We also need
    to make sure the respective Python libraries are installed.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'The other major component of building a RAG is processing external data — generating
    embeddings from documents and storing them in a vector database. The most popular
    framework for performing such a task is [LangChain](https://www.langchain.com/langchain).
    In particular, LangChain allows:'
  prefs: []
  type: TYPE_NORMAL
- en: Load and extract text from various document types (PDFs, DOCX, TXT, etc.)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Split the text into chunks suitable for generating the embeddings
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Generate vector embeddings (in this post, with the assistance of OpenAI’s API)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Store and search embeddings via vector databases like [FAISS](https://github.com/facebookresearch/faiss), [Chroma](https://www.trychroma.com/),
    and [Pinecone](https://www.pinecone.io/)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'We can easily install the required LangChain libraries by:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 'In this post, I’ll be using LangChain together with [FAISS](https://github.com/facebookresearch/faiss),
    a local vector database developed by Facebook AI Research. FAISS is a very lightweight
    package, and is thus appropriate for building a simple/small RAG pipeline. It
    can be easily installed with:'
  prefs: []
  type: TYPE_NORMAL
