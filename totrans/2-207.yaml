- en: Notice how the system prompt is defined. Essentially, a system prompt is an
    instruction given to the LLM that sets the behavior, tone, or constraints of the
    assistant before the user interacts. For example, we could set the system prompt
    to make the LLM provide responses like talking to a 4-year-old or a rocket scientist — here
    we ask to provide responses only based on the external data we provided, the ‘*Maria
    facts*’
  prefs: []
  type: TYPE_NORMAL
- en: So, let’s see what we’ve cooked! 🍳
  prefs: []
  type: TYPE_NORMAL
- en: Firstly, I ask a question that is irrelevant to the provided external datasource,
    to make sure that the model only uses the provided datasource when forming the
    responses and not general knowledge.
  prefs: []
  type: TYPE_NORMAL
