- en: Applications of Density Estimation to Legal Theory
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/applications-of-density-estimation-to-legal-theory/](https://towardsdatascience.com/applications-of-density-estimation-to-legal-theory/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1749573129974" class="mdspan-comment">Previously</mdspan>,
    I wrote an [article](https://towardsdatascience.com/non-parametric-density-estimation-theory-and-applications/)
    about the theory (and some applications!) of density estimation, and how it is
    a powerful tool for a variety of methods in statistical analysis. By *overwhelmingly*
    popular demand, I thought it may be interesting to use density estimation to derive
    some insight on some interesting data — in this case, data related to legal theory.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/811ad58a8468618f011ad089bcb7f460.png)'
  prefs: []
  type: TYPE_IMG
- en: Constructive criticism
  prefs: []
  type: TYPE_NORMAL
- en: Although it’s great to dive deep into the mathematical details behind the statistical
    methods to form a solid understanding behind the algorithm, at the end of the
    day we want to use these tools to derive cool insights from data!
  prefs: []
  type: TYPE_NORMAL
- en: In this article, we’ll use density estimation to analyze some data regarding
    the impact of a two-verdict vs. a three-verdict system on the juror’s perceived
    confidence in their final verdict.
  prefs: []
  type: TYPE_NORMAL
- en: Contents
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**[Background & Dataset](#background-and-dataset)**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**[Density Estimation for Exploratory Analysis](#eda)**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**[Formally Testing Distributional Differences](#formal-testing)**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**[Future Investigation & Wrap-up](#future-investigation)**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**[Sources](#sources)**'
  prefs:
