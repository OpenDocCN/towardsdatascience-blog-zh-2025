  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Background & Dataset
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Our legal system in the US uses a two-option verdict system (guilty/not guilty)
    in criminal trials. However, some other countries, specifically Scotland, use
    a three-verdict system (guilty/not guilty/not proven) to determine the fate of
    a defendant. In this three-verdict system, jurors have the additional choice to
    choose a verdict of “not proven”, which means that the prosecution has delivered
    insufficient evidence to determine whether the defendant is guilty or innocent.
  prefs: []
  type: TYPE_NORMAL
- en: Legally, the “not proven” and “not guilty” verdicts are equivalent, as the defendant
    is acquitted under either outcome. However, the two verdicts carry different semantic
    meanings, as “not proven” is intended to be selected by jurors when they are not
    convinced that the defendant is culpable for or innocent from the crime at hand.
  prefs: []
  type: TYPE_NORMAL
- en: Scotland has [recently abolished](https://www.bbc.com/news/uk-scotland-65397235)
    this third verdict due to its confusing nature. Indeed, when reading about this
    myself, I came upon conflicting definitions for this verdict — [some sources](https://pubmed.ncbi.nlm.nih.gov/17703354/)
    defined it as the option to select when the juror believes that the defendant
    is *culpable*, but the prosecution has failed to deliver sufficient evidence to
    convict them. This may give a defendant who has been acquitted by the “not proven”
    outcome a similar stigma as a defendant who was found guilty in the eyes of the
    public. In contrast, [other sources](https://scholarship.law.umn.edu/faculty_articles/1089/)
    defined the verdict as the middle ground between guilty and innocence (confusing!).
  prefs: []
  type: TYPE_NORMAL
- en: In this article, we’ll analyze data containing the perceived confidence of verdicts
    from mock jurors under the two-option and three-option verdict system. The data
    also contains information regarding whether there was conflicting evidence present
    in the testimony. These features will allow us to investigate whether the perceived
    confidence levels of jurors in their final verdicts differ depending on the verdict
    system and/or the presence of conflicting evidence.
  prefs: []
  type: TYPE_NORMAL
- en: For more information about the data, check out the [doc](https://vincentarelbundock.github.io/Rdatasets/doc/betareg/MockJurors.html).
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Density Estimation for Exploratory Analysis
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Without further ado, let’s dive into the data!
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/650aade2bb2390378d084bd96b1d3a8c.png)'
  prefs: []
  type: TYPE_IMG
- en: Data Summary
  prefs: []
  type: TYPE_NORMAL
- en: 'Our data consists of 104 observations and three variables of interest. Each
    observation corresponds to a mock juror’s verdict. The three variables we’re interested
    in are described below:'
  prefs: []
  type: TYPE_NORMAL
- en: '`verdict`: whether the juror’s decision was made under the two-option or three-option
    verdict system.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`conflict`: whether conflicting testimonial evidence was present in the trial.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`confidence`: the juror’s degree of confidence in their verdict on a scale
    from 0 to 1, where 0/1 corresponds to low/high confidence, respectively.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Let’s take a brief look at each of these individual features.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/c74e05007408587b8cd02b40dd39593a.png)'
  prefs: []
  type: TYPE_IMG
- en: Barplot of Verdict
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/54029e44b3926147f656d58d141462d3.png)'
  prefs: []
  type: TYPE_IMG
- en: Barplot of Conflict
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/91781f8995d25fe42ca4746b6a8f8f85.png)'
  prefs: []
  type: TYPE_IMG
- en: Barplot of Verdict stratified by Conflict
  prefs: []
  type: TYPE_NORMAL
- en: The observations are evenly split among the verdict levels (52/52) and nearly
    evenly split across the `conflict` factor (53 no, 51 yes). Additionally, the distribution
    of `conflict` appears to be evenly split across both levels of `verdict` i.e.
    there are approximately an equal number of verdicts made under conflicting/no
    conflicting evidence recorded for both verdict systems. Thus, we can proceed to
    compare the distribution of confidence levels across these groups without worrying
    about imbalanced data affecting the quality of our distribution estimates.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s look at the distribution of juror confidence levels.
  prefs: []
  type: TYPE_NORMAL
- en: We can visualize the distribution of confidence levels using density estimates.
    [Density estimates](https://medium.com/data-science-collective/non-parametric-density-estimation-theory-and-applications-6b31eeb0ee20),
    can provide a clear, intuitive display of a variable’s distribution, especially
    when working with large amounts of data. However, the estimate may vary considerably
    with respect to a few parameters. For instance, let’s look at the density estimates
    produced by various [bandwidth selection methods](https://aakinshin.net/posts/kde-bw/).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/b4006eabe0c99647bda83a9446805a32.png)'
  prefs: []
  type: TYPE_IMG
- en: Density estimates of Confidence across various bandwidths
  prefs: []
  type: TYPE_NORMAL
- en: The density estimates produced by the Sheather-Jones, unbiased cross-validation,
    and normal reference distribution methods are pictured above.
  prefs: []
  type: TYPE_NORMAL
- en: Clearly, the choice of bandwidth can give us a very different picture of the
    confidence level distribution.
  prefs: []
  type: TYPE_NORMAL
- en: Using unbiased cross-validation gives the impression that the distribution of
    `confidence` is very sparse, which is not surprising considering how small our
    dataset is (104 observations).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The density estimates produced by the other bandwidths are fairly similar. The
    estimates produced by the normal reference distribution methods appear to be slightly
    smoother than that produced by Sheather-Jones, since the normal reference distribution
    methods use the Gaussian kernel in their computation. Overall, confidence levels
    appear to be highly concentrated around values of 0.6 or greater, and its distribution
    appears to have a heavy left tail.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Now, let’s get into the interesting part and examine how juror confidence levels
    may change depending on the presence of conflicting evidence and the verdict system.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/846d3e260c5d3068530b3d83425a4f13.png)'
  prefs: []
  type: TYPE_IMG
- en: Density of Confidence by Conflict
  prefs: []
  type: TYPE_NORMAL
- en: It appears that juror confidence levels do not differ much in the presence of
    conflicting evidence, as shown by the large overlap in the `confidence` density
    estimates above. Perhaps in the presence of no conflicting evidence, jurors may
    be slightly more confident in their verdicts, as the `confidence` density estimate
    under *no conflict* appears to show higher concentration of confidence values
    greater than 0.8 relative to the density estimate under the presence of conflicting
    evidence. However, the distributions appear nearly the same.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s examine whether juror confidence levels vary across two-option vs. three-option
    verdict systems.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/4c7789508091eee7496924cdddc01a20.png)'
  prefs: []
  type: TYPE_IMG
- en: Density of Confidence by Verdict
  prefs: []
  type: TYPE_NORMAL
- en: This visual provides more compelling evidence to suggest that `confidence` levels
    are not identically distributed across the two verdict systems. It appears that
    jurors may be slightly less confident in their verdicts under the two-option verdict
    system relative to the three-option system. This is supported by the fact that
    the distribution of `confidence` under the two-option and three-option verdict
    systems appear to peak around 0.625 and 0.875, respectively. However, there is
    still significant overlap in the `confidence` distributions for both verdict systems,
    so we would need to formally test our claim to conclude whether confidence levels
    differ significantly across these verdict systems.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s examine whether the distribution of `confidence` differs across joint
    levels of `verdict` and `conflict`.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/046c9c62a0d57e61f041a2d1ed415687.png)'
  prefs: []
  type: TYPE_IMG
- en: Density of Confidence by Conflict & Verdict
  prefs: []
  type: TYPE_NORMAL
- en: Analyzing the distribution of `confidence` stratified by `conflict` and `verdict`
    gives us some interesting insights.
  prefs: []
  type: TYPE_NORMAL
- en: Under the two-verdict system, confidence levels of verdicts made under conflicting
    evidence/no conflicting evidence appear to be very similar. That is, jurors seem
    to be equally confident in their verdicts in the face of conflicting evidence
    when working under the traditional *guilty/not guilty* judgement paradigm.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In contrast, under the three-option verdict, jurors seem to be more confident
    in their verdicts under no conflicting evidence relative to when conflicting evidence
    is present. Their corresponding density plots show that verdicts with no conflicting
    evidence show much higher concentration at high `confidence` levels (`confidence`
    > 0.75) compared to verdicts made with conflicting evidence. Furthermore, there
    are nearly no verdicts made under the absence of conflicting evidence where the
    jurors reported `confidence` levels less than 0.2\. In contrast, in the presence
    of conflicting evidence, there is a much larger concentration of verdicts that
    had low `confidence` levels (`confidence` < 0.25).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Formally Testing Distributional Differences
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Our exploratory data analysis showed that juror confidence levels may differ
    depending on the verdict system and whether there was conflicting evidence. Let’s
    formally test this by comparing the `confidence` densities stratified by these
    factors.
  prefs: []
  type: TYPE_NORMAL
- en: 'We will carry out tests to compare the distribution of `confidence` in the
    following settings (as we did above in a qualitative manner):'
  prefs: []
  type: TYPE_NORMAL
- en: Distribution of `confidence` across levels of `conflict`.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Distribution of `confidence` across levels of `verdict`.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Distribution of `confidence` across levels of `conflict` and `verdict`.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'First, let’s compare the distribution of `confidence` in the presence of conflicting/no
    conflicting evidence. We can compare these `confidence` distributions across these
    `conflict` levels using the [**sm.density.compare()**](https://cran.r-project.org/web/packages/sm/index.html)
    function that’s provided as part of the [**sm**](https://cran.r-project.org/web/packages/sm/index.html)
    package. To carry out this test, we can specify the following key parameters:'
  prefs: []
  type: TYPE_NORMAL
- en: '`x`: vector of data whose density we want to model. For our purposes, this
    will be `confidence`.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`group`: the factor over which to compare the density of `x`. For this example,
    this will be `conflict`.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`model`: setting this to `equal` will conduct a hypothesis test determining
    whether the distribution of `confidence` differs across levels of `conflict`.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Additionally, we will establish a common bandwidth for the density estimates
    of `confidence` across the levels of `conflict`. We’ll do this by computing the
    Sheather-Jones bandwidth for the `confidence` levels for each `conflict` subgroup,
    then computing the harmonic mean of these bandwidths, and then set that to the
    bandwidth for our density comparison.
  prefs: []
  type: TYPE_NORMAL
- en: For all of our hypothesis tests below, we will be using the standard α = 0.05
    criteria for [statistical significance](https://www.statsig.com/blog/understanding-significance-levels-a-key-to-accurate-data-analysis).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/1ab6752787c4d2efce100b1422181748.png)'
  prefs: []
  type: TYPE_IMG
- en: Density comparison test of Confidence by Conflict
  prefs: []
  type: TYPE_NORMAL
- en: The output of our call to **sm.density.compare()** produces the p-value of the
    hypothesis test mentioned above, as well as a graphical display overlaying the
    density curves of `confidence` across both levels of `conflict`. The large p-value
    (p=0.691) suggests that we have insufficient evidence to reject the null hypothesis
    that the densities of `confidence` for conflict/no-conflict are equal. In other
    words, this suggests that jurors in our dataset tend to have similar confidence
    in their verdicts, regardless of whether there was conflicting evidence in the
    testimony.
  prefs: []
  type: TYPE_NORMAL
- en: Now, we’ll conduct a similar analysis to formally compare juror confidence levels
    across both verdict systems.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/15fc442420fea8adcdec1fbe2cccd550.png)'
  prefs: []
  type: TYPE_IMG
- en: Density comparison test of Confidence by Verdict
  prefs: []
  type: TYPE_NORMAL
- en: We see that the p-value associated with the comparison of `confidence` across
    the two-verdict vs. three-verdict system is much smaller (p=0.069). Although we
    still fail to reject the null hypothesis, a p-value of 0.069 in this context means
    that if the true distribution of `confidence` levels was identical for two-verdict
    and three-verdict systems, then there is an approximately 7% chance that we come
    across empirical data where the distribution of `confidence` across both verdict
    systems differs at least as much as what we see here. In other words, our empirical
    data is fairly unlikely to occur if jurors were equally confident in their verdicts
    across both verdict systems.
  prefs: []
  type: TYPE_NORMAL
- en: This conclusion aligns with what we saw in our qualitative analysis above, where
    it appeared that the confidence levels for verdicts under the two-verdict vs.
    three-verdict system were different — specifically, verdicts under the three-verdict
    system seemed to be made with higher confidence than verdicts made under two-verdict
    systems.
  prefs: []
  type: TYPE_NORMAL
- en: Now, for the purposes of future investigation, it would be great to extend the
    data to include the final verdict decision (i.e. guilty/not guilty/not proven).
    Perhaps, this additional data could help shed light on how jurors truly see the
    “not proven” verdict.
  prefs: []
  type: TYPE_NORMAL
- en: If we see higher confidence levels in the “guilty”/“not guilty” verdicts under
    the three-verdict system relative to the two-verdict system, this may suggest
    that the “not-proven” verdict is effectively capturing the uncertainty behind
    the decision making of the jurors, and having it as a third verdict provides desirable
    flexibility that two-option verdict system lacks.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If the confidence levels in the “guilty”/“not guilty” verdicts are approximately
    equal across both verdict systems, and the confidence levels of all three verdicts
    are approximately equal in the three-verdict system, then this may suggest that
    the “not proven” verdict is serving as a true third option independent of the
    typical binary verdicts. That is, jurors are opting to choose “not proven” primarily
    for reasons other than their uncertainty behind classifying the defendant as guilty/not
    guilty. Perhaps, jurors view “not proven” as the verdict to choose when the prosecution
    has failed to deliver convincing evidence, even when the juror has a hint of the
    true culpability of the defendant.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Lastly, let’s test whether there are any differences in the distribution of
    `confidence` across different levels of `conflict` and `verdict`.
  prefs: []
  type: TYPE_NORMAL
- en: To test for differences in the distribution of confidence across these subgroups,
    we can run a [Kruskal-Wallis test](https://datatab.net/tutorial/kruskal-wallis-test).
    The Kruskal-Wallis test is a non-parametric statistical method to test for differences
    in the distribution of a variable of interest across groups. It is appropriate
    when you want to avoid making assumptions about the variable’s distribution (i.e.
    non-parametric), the variable is ordinal in nature, and the subgroups under comparison
    are independent of each other. Essentially, you may think of it as the non-parametric,
    multi-group version of a [one-way ANOVA](https://datatab.net/tutorial/one-factorial-anova).
  prefs: []
  type: TYPE_NORMAL
- en: 'R makes this easy for us via the [**kruskal.test()**](https://www.rdocumentation.org/packages/stats/versions/3.6.2/topics/kruskal.test)
    API. We can specify the following parameters to carry out our test:'
  prefs: []
  type: TYPE_NORMAL
- en: '`x`: vector of data whose distribution we want to compare across groups. For
    our purposes, this will be `confidence`.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`g`: factor identifying the groups over which we want to compare the distribution
    of `x`. We will set this to `group_combo`, which contains the subgroups of `verdict`
    and `conflict`.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/62aea90be23a80906ec4d31ce943f445.png)'
  prefs: []
  type: TYPE_IMG
- en: Kruskal-Wallis test of Confidence by Conflict & Verdict
  prefs: []
  type: TYPE_NORMAL
- en: The output of the Kruskal-Wallis test (p=0.189) suggests that we lack sufficient
    evidence to claim that juror confidence levels differ across levels of `verdict`
    and `conflict`.
  prefs: []
  type: TYPE_NORMAL
- en: This is somewhat unexpected, as our qualitative analysis seemed to suggest that
    partitioning each `verdict` group by `conflict` segmented the `confidence` values
    in a meaningful way. It’s worthy to note that there was a small amount of data
    in each of these subgroups (25-27 observations), so collecting more data could
    be a next step to investigate this further.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Future Investigation & Wrap-up
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Let’s briefly recap the results of our analysis:'
  prefs: []
  type: TYPE_NORMAL
- en: Our exploratory data analysis seemed to indicate that juror confidence levels
    differed across verdict systems. Furthermore, the presence of conflicting evidence
    seemed to affect juror confidence levels in the three verdict system, but have
    little affect in the two-verdict system. However, none of our statistical tests
    provided significant evidence to support these conclusions.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Although our statistical tests were not supportive, we should not be so quick
    to dismiss our qualitative analysis. Next steps for this investigation could include
    getting more data, as we were working with only 104 observations. Additionally,
    extending our data to include the verdict decisions of the jurors (guilty/not
    guilty/not proven) could enable further investigation into when jurors opt to
    choose the “not proven” verdict.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Thanks for reading! If you have any additional thoughts about how you would’ve
    carried out this analysis, I would love to hear it in the comments. I’m certainly
    no domain expert on legal theory, so applying statistical methods on legal data
    was a great learning experience for me, and I’d love to hear about other interesting
    problems at the intersection of the two fields. If you’re interested in learning
    further, I highly recommend checking out the sources below!
  prefs: []
  type: TYPE_NORMAL
- en: '*The author has created all images in this article.*'
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
