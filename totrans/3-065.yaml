  type: TYPE_NORMAL
  zh: '[立即订阅](https://newsletter.towardsdatascience.com/subscription-to-the-newsletter)'
- en: '* * *'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: The growing footprint of [AI-powered tools](https://towardsdatascience.com/tag/generative-ai-tools/) comes
    with numerous challenges and sources of confusion. It often falls to data scientists
    and ML engineers to unpack these tools’ potential and limitations so other stakeholders
    can make informed and sustainable decisions.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 随着人工智能工具的日益普及，随之而来的是众多挑战和困惑来源。通常情况下，数据科学家和机器学习工程师需要解开这些工具的潜力和局限性，以便其他利益相关者能够做出明智且可持续的决策。
- en: If you’re not sure how to go about this process—let alone lead it—we invite
    you to explore this week’s highlights, which focus on the nitty-gritty details
    of integrating AI workflows into new contexts, from business and product teams
    to doctors’ practices.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不确定如何进行这个过程——更不用说领导它了——我们邀请你探索本周的亮点，这些亮点专注于将人工智能工作流程整合到新环境中的细节，从商业和产品团队到医生的诊所。
- en: 'Before we jump in, though, we wanted to make sure that none of our current
    and prospective authors miss out on an exciting update. [We’ve recently introduced
    a more inclusive, lower-barrier earnings tier](https://towardsdatascience.com/many-more-tds-contributors-are-now-eligible-for-earning-through-the-author-payment-program/) to
    our Author Payment Program: articles that gain **500 engaged views** can now earn
    a **minimum payout of $100**. We can’t wait to read new, top-notch work from members
    of our community!'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们深入探讨之前，我们想确保我们的当前和潜在作者不会错过一个令人兴奋的更新。 [我们最近推出了一个更具包容性、门槛更低的收益层级](https://towardsdatascience.com/many-more-tds-contributors-are-now-eligible-for-earning-through-the-author-payment-program/)，纳入我们的作者支付计划：获得
    **500 次参与查看** 的文章现在可以获得 **最低支付金额为 100 美元**。我们迫不及待地想阅读我们社区成员的新作品！
- en: 'Enterprise AI: From Build-or-Buy to Partner-and-Grow'
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 企业人工智能：从构建或购买到合作与成长
- en: “If this expertise is not available internally, you need to get it from external
    partners or providers.” [Janna Lipenkova](https://towardsdatascience.com/author/janna-lipenkova_52659/)‘s
    excellent article outlines the different approaches companies can adopt in their
    quest to develop a sustainable, goal-focused AI strategy, and zooms in on finding
    the right partners for the projects you’re considering.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: “如果这种专业知识内部不可用，你需要从外部合作伙伴或供应商那里获得。” [安娜·利彭科娃](https://towardsdatascience.com/author/janna-lipenkova_52659/)
    的优秀文章概述了公司在追求可持续、目标导向的人工智能战略时可以采用的不同方法，并聚焦于寻找你考虑的项目中的合适合作伙伴。
- en: '[Enterprise AI: From Build-or-Buy to Partner-and-Grow](https://towardsdatascience.com/enterprise-ai-from-build-or-buy-to-partner-and-grow/)'
  id: totrans-11
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[企业人工智能：从构建或购买到合作与成长](https://towardsdatascience.com/enterprise-ai-from-build-or-buy-to-partner-and-grow/)'
- en: The Case for Centralized AI Model Inference Serving
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 集中式人工智能模型推理服务的案例
- en: Even tech-forward organizations have to grapple with rapid change and growing
    complexity. [Chaim Rand](https://towardsdatascience.com/author/chaimrand/) addresses
    the challenge of processing large-scale inputs through algorithmic pipelines that
    include deep learning models.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 即使是技术前沿的组织也必须应对快速变化和日益增长的复杂性。 [查伊姆·兰德](https://towardsdatascience.com/author/chaimrand/)
    讨论了通过包括深度学习模型在内的算法管道处理大规模输入的挑战。
- en: '[The Case for Centralized AI Model Inference Serving](https://towardsdatascience.com/the-case-for-centralized-ai-model-inference-serving/)'
  id: totrans-14
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[集中式人工智能模型推理服务的案例](https://towardsdatascience.com/the-case-for-centralized-ai-model-inference-serving/)'
- en: Google’s New AI System Outperforms Physicians in Complex Diagnoses
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 谷歌的新人工智能系统在复杂诊断方面超越了医生
- en: As [Luciano Abriata](https://towardsdatascience.com/author/lucianosphere/) points
    out, medical ML use cases aren’t new. But recent research from Google, covered
    in this lucid walkthrough, suggests that a powerful new player is entering the
    arena of medical diagnosis.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 如 [卢西亚诺·阿布里阿塔](https://towardsdatascience.com/author/lucianosphere/) 所指出的，医疗机器学习用例并不新鲜。但谷歌最近的研究表明，一个新的强大玩家正在进入医疗诊断领域。
- en: '[Google’s New AI System Outperforms Physicians in Complex Diagnoses](https://towardsdatascience.com/googles-new-ai-system-outperforms-physicians-in-complex-diagnoses/)'
  id: totrans-17
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[谷歌的新AI系统在复杂诊断中优于医生](https://towardsdatascience.com/googles-new-ai-system-outperforms-physicians-in-complex-diagnoses/)'
- en: Other Recommended Reads
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 其他推荐阅读
- en: If you feel like exploring a wider set of topics this week, we invite you to
    read these excellent articles on RAG, LLMs, the human aspects of machine learning,
    and more.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你这周想探索更广泛的主题，我们邀请你阅读这些关于RAG、LLM、机器学习的人性方面以及更多内容的优秀文章。
- en: If you’re just starting to [explore retrieval-augmented generation](https://towardsdatascience.com/retrieval-augmented-generation-rag-an-introduction/),
    don’t miss [Carolina Bento](https://towardsdatascience.com/author/carolina-bento/)‘s
    beginner-friendly introduction.
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你刚开始探索[检索增强生成](https://towardsdatascience.com/retrieval-augmented-generation-rag-an-introduction/)，不要错过[卡罗琳娜·本托](https://towardsdatascience.com/author/carolina-bento/)的入门友好介绍。
- en: '[Retrieval Augmented Generation (RAG) — An Introduction](https://towardsdatascience.com/retrieval-augmented-generation-rag-an-introduction/)'
  id: totrans-21
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[检索增强生成 (RAG) — 简介](https://towardsdatascience.com/retrieval-augmented-generation-rag-an-introduction/)'
- en: For a more specialized—but equally accessible—primer, we present [Shubham Gandhi](https://towardsdatascience.com/author/lunarfeet/)‘s
    guide to [the inner workings of CatBoost.](https://towardsdatascience.com/catboost-inner-workings-and-optimizations/)
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为了提供更专业但同样易于理解的入门指南，我们展示了[舒巴姆·甘地](https://towardsdatascience.com/author/lunarfeet/)对[CatBoost内部工作原理](https://towardsdatascience.com/catboost-inner-workings-and-optimizations/)的指南。
- en: '[Why CatBoost Works So Well: The Engineering Behind the Magic](https://towardsdatascience.com/catboost-inner-workings-and-optimizations/)'
  id: totrans-23
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[为什么CatBoost表现如此出色：魔法背后的工程](https://towardsdatascience.com/catboost-inner-workings-and-optimizations/)'
- en: How will large language models shape the concepts of truth and knowledge? [Marina
    Tosic](https://towardsdatascience.com/author/martosi/) presents a thoughtful [reflection
    on an increasingly timely set of questions](https://towardsdatascience.com/the-good-enough-truth/).
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 大型语言模型将如何塑造真理和知识的概念？[玛琳娜·托西奇](https://towardsdatascience.com/author/martosi/)对一系列越来越及时的问题进行了深思熟虑的[反思](https://towardsdatascience.com/the-good-enough-truth/)。
- en: '[The Good-Enough Truth](https://towardsdatascience.com/the-good-enough-truth/)'
  id: totrans-25
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[足够好的真相](https://towardsdatascience.com/the-good-enough-truth/)'
- en: From subject-matter experts and executives to end-users, [David Martin](https://towardsdatascience.com/author/dmartin0409/) maps
    out the different groups of people [machine learning engineers have to keep in
    mind](https://towardsdatascience.com/learnings-from-a-machine-learning-engineer-part-6-the-human-side/)—and
    interact with.
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从主题专家和执行者到最终用户，[大卫·马丁](https://towardsdatascience.com/author/dmartin0409/)概述了[机器学习工程师必须牢记并与之互动的不同人群](https://towardsdatascience.com/learnings-from-a-machine-learning-engineer-part-6-the-human-side/)。
- en: '[Learnings from a Machine Learning Engineer — Part 6: The Human Side](https://towardsdatascience.com/learnings-from-a-machine-learning-engineer-part-6-the-human-side/)'
  id: totrans-27
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[机器学习工程师的经验教训 — 第6部分：人的方面](https://towardsdatascience.com/learnings-from-a-machine-learning-engineer-part-6-the-human-side/)'
- en: Looking for a more hands-on technical read? Learn [how to load-test your LLM
    using LLMPerf](https://towardsdatascience.com/load-testing-llmperf/) by following
    along [Ram Vegiraju](https://towardsdatascience.com/author/ram-vegiraju/)‘s step-by-step
    tutorial.
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在寻找更实用的技术阅读？通过跟随[拉姆·维吉拉朱](https://towardsdatascience.com/author/ram-vegiraju/)的逐步教程，学习如何使用LLMPerf[负载测试你的LLM](https://towardsdatascience.com/load-testing-llmperf/)。
- en: '[Load-Testing LLMs Using LLMPerf](https://towardsdatascience.com/load-testing-llmperf/)'
  id: totrans-29
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[使用LLMPerf进行LLM负载测试](https://towardsdatascience.com/load-testing-llmperf/)'
- en: Contribute to TDS
  id: totrans-30
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为TDS做出贡献
- en: We love publishing articles from new authors, so if you’ve recently written
    an interesting project walkthrough, tutorial, or theoretical reflection on any
    of our core topics, why not [share it with us?](https://towardsdatascience.com/questions-96667b06af5/)
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 我们喜欢发布新作者的文章，所以如果你最近写了一个有趣的项目教程、教程或对我们核心主题的理论反思，为什么不[与我们分享呢？](https://towardsdatascience.com/questions-96667b06af5/)
