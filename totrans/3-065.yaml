  type: TYPE_NORMAL
  zh: 如何将人工智能集成到复杂工作流程中
- en: 原文：[https://towardsdatascience.com/how-to-integrate-ai-into-complex-workflows/](https://towardsdatascience.com/how-to-integrate-ai-into-complex-workflows/)
  id: totrans-1
