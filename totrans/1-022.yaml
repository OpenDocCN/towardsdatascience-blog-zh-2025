- en: Integrating the inventory simulation module in the Streamlit App
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We can now start working on the main page.
  prefs: []
  type: TYPE_NORMAL
- en: Let us imagine that our Logistics Director arrives on the page, selects the
    different parameters and clicks on **“Run Simulation”**.
  prefs: []
  type: TYPE_NORMAL
- en: 'This should trigger the simulation module:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: 'In this short piece of code, we do many things:'
  prefs: []
  type: TYPE_NORMAL
- en: We build the input parameter object using the Pydantic class from `inventory_models.py`
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*This ensures every value (demand, lead time, review period, sigma…) has the
    correct data type before running the simulation.*'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: We create the simulation engine `InventorySimulation` class from `inventory_analysis.py`
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*This class contains all the inventory logic I developed in the first tutorial.*'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Nothing will change on the user interface.
  prefs: []
  type: TYPE_NORMAL
- en: We can now start to define the computation part.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: First, we select the correct ordering method.
  prefs: []
  type: TYPE_NORMAL
- en: 'Depending on the ordering rule chosen in the radio button of the sidebar, we
    call the appropriate simulation method:'
  prefs: []
  type: TYPE_NORMAL
- en: '**method=”order”**: is the initial method that I showed you, which failed to
    keep a stable inventory when I added a lead time'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**method=”order_leadtime”**: is the improved method that orders at day = T
    – LD'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/af2a82c9237858bb90302b9911477e17.png)'
  prefs: []
  type: TYPE_IMG
- en: Inventory On Hand with negative values on top (Simple Ordering) vs. Lead-time
    ordering – (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: The results, stored in the pandas dataframe, `df` are used to compute key indicators
    such as the number of **stockouts** and the **minimum** and **maximum inventory
    levels**.
  prefs: []
  type: TYPE_NORMAL
- en: Now that we have simulation results available, let’s create our visuals.
  prefs: []
  type: TYPE_NORMAL
- en: Create Inventory Simulation Visuals on Streamlit
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: If you followed the video version of this tutorial, you probably noticed that
    I copied and pasted the code from the notebook created in the first tutorial.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: Indeed, the same visual code that you use to prototype in your Notebooks will
    work in your app.
  prefs: []
  type: TYPE_NORMAL
- en: 'The only difference is that instead of using `plt.show()`, you conclude the
    section with:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: Streamlit needs to explicitly control of the rendering using
  prefs: []
  type: TYPE_NORMAL
- en: '**`fig`** which is the Matplotlib figure you created earlier.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**`clear_figure=True`** which is a parameter to clear the figure from memory
    after rendering to avoid duplicated plots when parameters are updated.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**`use_container_width=True`** to make the chart automatically resize to the
    width of the Streamlit page'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'At this stage, normally you have this on your app:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/96cbba8085b51a391bbdbc3eee5c704c.png)'
  prefs: []
  type: TYPE_IMG
- en: Screen of your app with the visual generated – (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: If you try to change any parameter, for example, change the ordering method,
    you will see the visual automatically updated.
