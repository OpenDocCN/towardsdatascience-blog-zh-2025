- en: How AI Agents “Talk” to Each Other
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: AI智能体“如何”相互交谈
- en: 原文：[https://towardsdatascience.com/how-ai-agents-talk-to-each-other/](https://towardsdatascience.com/how-ai-agents-talk-to-each-other/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://towardsdatascience.com/how-ai-agents-talk-to-each-other/](https://towardsdatascience.com/how-ai-agents-talk-to-each-other/)'
- en: Never miss a new edition of *The Variable*, our weekly newsletter featuring
    a top-notch selection of editors’ picks, deep dives, community news, and more.
  id: totrans-2
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 不要错过我们每周的精选编辑推荐、深度分析、社区新闻等内容的**《变量》**新版本。
- en: ''
  id: totrans-3
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[Subscribe today](https://newsletter.towardsdatascience.com/subscription-to-the-newsletter)'
  id: totrans-4
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[立即订阅](https://newsletter.towardsdatascience.com/subscription-to-the-newsletter)'
- en: The [agentic-AI landscape](https://towardsdatascience.com/tag/agentic-ai/) continues
    to evolve at a staggering rate, and practitioners are finding it increasingly
    challenging to keep multiple agents on task even as they criss-cross each other’s
    workflows.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: '[agentic-AI](https://towardsdatascience.com/tag/agentic-ai/)领域正以惊人的速度发展，实践者发现，即使智能体在各自的流程中交错，保持多个智能体专注于任务也越来越具挑战性。'
- en: 'To help you minimize chaos and maintain inter-agent harmony, we’ve put together
    a stellar lineup of articles that explore two recently launched tools: Google’s
    Agent2Agent protocol and Hugging Face’s smolagents framework. Read on to learn
    how you can leverage them in your own cutting-edge projects.'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 为了帮助您最小化混乱并保持智能体间的和谐，我们精选了一系列文章，探讨了最近推出的两个工具：谷歌的Agent2Agent协议和Hugging Face的smolagents框架。继续阅读，了解您如何在您自己的前沿项目中利用它们。
- en: '* * *'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Inside Google’s Agent2Agent (A2A) Protocol: Teaching AI Agents to Talk to Each
    Other'
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 深入谷歌的Agent2Agent (A2A) 协议：教AI智能体相互交谈
- en: 'If you’re taking your first steps with AI agents, don’t miss [Hailey Quach](https://towardsdatascience.com/author/hailey-quach/)‘s
    accessible introduction to the A2A protocol: it “matters because it promises to
    break AI agents out of their silos and let them work together like a well-coordinated
    team rather than isolated geniuses.”'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您是AI智能体的初学者，不要错过[Hailey Quach](https://towardsdatascience.com/author/hailey-quach/)对A2A协议的易于理解的介绍：它“很重要，因为它承诺将AI智能体从孤岛中解放出来，让它们像协调一致的团队一样一起工作，而不是孤立的天才。”
- en: '[Inside Google’s Agent2Agent (A2A) Protocol: Teaching AI Agents to Talk to
    Each Other](https://towardsdatascience.com/inside-googles-agent2agent-a2a-protocol-teaching-ai-agents-to-talk-to-each-other/)'
  id: totrans-10
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[深入谷歌的Agent2Agent (A2A) 协议：教AI智能体相互交谈](https://towardsdatascience.com/inside-googles-agent2agent-a2a-protocol-teaching-ai-agents-to-talk-to-each-other/)'
- en: Multi-Agent Communication with the A2A Python SDK
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用A2A Python SDK进行多智能体通信
- en: Ready to tinker with A2A? [Deborah Mesquita](https://towardsdatascience.com/author/mesquitadeh/) builds
    a toy example to help you make sense of the protocol’s inner workings.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 准备好动手尝试A2A了吗？[Deborah Mesquita](https://towardsdatascience.com/author/mesquitadeh/)构建了一个玩具示例，帮助你理解该协议的内部工作原理。
- en: '[Multi-Agent Communication with the A2A Python SDK](https://towardsdatascience.com/multi-agent-communication-with-the-a2a-python-sdk/)'
  id: totrans-13
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[使用A2A Python SDK进行多智能体通信](https://towardsdatascience.com/multi-agent-communication-with-the-a2a-python-sdk/)'
- en: 'From Data to Stories: Code Agents for KPI Narratives'
  id: totrans-14
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 从数据到故事：为KPI叙事编写代码智能体
- en: For a different approach to multi-agent orchestration, [Mariya Mansurova](https://towardsdatascience.com/author/miptgirl/) walks
    us through a smolagents-powered workflow.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 对于多智能体编排的不同方法，[Mariya Mansurova](https://towardsdatascience.com/author/miptgirl/)带我们了解由smolagents驱动的流程。
- en: '[From Data to Stories: Code Agents for KPI Narratives](https://towardsdatascience.com/from-data-to-stories-code-agents-for-kpi-narratives/)'
  id: totrans-16
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[从数据到故事：为KPI叙事编写代码智能体](https://towardsdatascience.com/from-data-to-stories-code-agents-for-kpi-narratives/)'
