- en: Meet Our New Authors
  id: totrans-40
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 认识我们的新作者
- en: 'Every week, we’re thrilled to welcome a fresh cohort of data science, machine
    learning, and AI experts. Don’t miss the work of some of our newest contributors:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 每周，我们都兴奋地欢迎一批新的数据科学、机器学习和AI专家。不要错过我们一些最新贡献者的作品：
- en: '[Maciej Adamiak](https://towardsdatascience.com/author/maciej-adamiak/) combines
    a passion for geospatial data and deep learning with research at the University
    of Łódź.'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Maciej Adamiak](https://towardsdatascience.com/author/maciej-adamiak/) 将对地理空间数据和深度学习的热情与在罗兹大学的科研相结合。'
- en: '[Audio Spectrogram Transformers Beyond the Lab](https://towardsdatascience.com/audio-spectrogram-transformers-beyond-the-lab/)'
  id: totrans-43
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[音频频谱图Transformer超越实验室](https://towardsdatascience.com/audio-spectrogram-transformers-beyond-the-lab/)'
- en: '[Sylvain Kalache](https://towardsdatascience.com/author/sylvainkalache/) is
    the Head of AI Labs at Rootly, and has an interdisciplinary background that includes
    communications and education.'
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Sylvain Kalache](https://towardsdatascience.com/author/sylvainkalache/) 是Rootly的AI实验室负责人，拥有包括传播和教育在内的跨学科背景。'
- en: '[Automate Models Training: An MLOps Pipeline with Tekton and Buildpacks](https://towardsdatascience.com/automate-models-training-an-mlops-pipeline-with-tekton-and-buildpacks/)'
  id: totrans-45
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[自动化模型训练：使用Tekton和Buildpacks的MLOps管道](https://towardsdatascience.com/automate-models-training-an-mlops-pipeline-with-tekton-and-buildpacks/)'
- en: '[Doster Esh](https://towardsdatascience.com/author/doster-esh/) imbues his
    writing with deep expertise in data science, economics, and risk assessment, among
    other fields.'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Doster Esh](https://towardsdatascience.com/author/doster-esh/) 的作品融入了数据科学、经济学和风险评估等领域的深厚专业知识。'
- en: '[Pairwise Cross-Variance Classification](https://towardsdatascience.com/pairwise-cross-variance-classification/)'
  id: totrans-47
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[成对交叉方差分类](https://towardsdatascience.com/pairwise-cross-variance-classification/)'
- en: We love publishing articles from new authors, so if you’ve recently written
    an interesting project walkthrough, tutorial, or theoretical reflection on any
    of our core topics, why not [share it with us](https://towardsdatascience.com/questions-96667b06af5/)?
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 我们热爱发布新作者的文章，所以如果你最近撰写了一篇关于我们核心主题的有趣项目教程、教程或理论反思，为什么不[与我们分享](https://towardsdatascience.com/questions-96667b06af5/)呢？
