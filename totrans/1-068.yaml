- en: Natural Language Visualization and the Future of Data Analysis and Presentation
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 自然语言可视化与数据分析及展示的未来
- en: 原文：[https://towardsdatascience.com/natural-language-visualization-and-the-future-of-data-analysis-and-presentation/](https://towardsdatascience.com/natural-language-visualization-and-the-future-of-data-analysis-and-presentation/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/natural-language-visualization-and-the-future-of-data-analysis-and-presentation/](https://towardsdatascience.com/natural-language-visualization-and-the-future-of-data-analysis-and-presentation/)
- en: '<mdspan datatext="el1763668652967" class="mdspan-comment">For decades, data
    analysis</mdspan> has been like classical art. We used to commission a report
    from our data analyst—our Michelangelo—and wait patiently. Weeks later, we received
    an email with a magnificent hand-carved masterpiece: a link to a 50-KPI dashboard
    or a 20-page report attached. We could admire the meticulous craftsmanship, but
    we could not change it. What’s more: we could not even ask follow-up questions.
    Neither the report nor our analyst, since she was already busy with another assignment.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1763668652967" class="mdspan-comment">几十年来，数据分析</mdspan>就像古典艺术一样。我们曾经委托我们的数据分析师——我们的米开朗基罗——耐心等待。几周后，我们收到了一封电子邮件，附有一个精美的手工雕刻杰作：一个链接到50个关键绩效指标仪表板或20页的报告。我们可以欣赏到精湛的工艺，但我们无法改变它。更重要的是：我们甚至无法提出后续问题。既不是报告，也不是我们的分析师，因为她已经忙于另一个任务。
- en: '****That’s why the future of data analysis does not belong to an ‘analytical
    equivalent’ of Michelangelo. It is probably closer to the art of Fujiko Nakaya.****'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '****这就是为什么数据分析的未来不属于‘分析等价物’的米开朗基罗。它可能更接近于富子·中野的艺术。****'
- en: 'Source: YouTube.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：YouTube。
- en: 'Fujiko Nakaya is famous for her fog ‘sculptures’: breathtaking, living clouds
    of fog. **But she doesn’t ‘sculpt’ the fog herself. She has the idea. She designs
    the concept.** The actual, complex work of building the pipe systems and programming
    the water pressure to produce fog is done by engineers and plumbers.'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 中山富子·中野因她的雾“雕塑”而闻名：令人叹为观止的活雾云。**但她并不是亲自‘雕塑’雾。她有这个想法。她设计了概念。**实际上，构建管道系统和编程水压以产生雾的复杂工作是由工程师和管道工完成的。
- en: '**The paradigm shift of Natural Language Visualization is the same.**'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: '**自然语言可视化的范式转变也是如此。**'
- en: 'Imagine that you need to understand a phenomenon: client churn increasing,
    sales declining, or delivery times not improving. Because of that, you become
    the conceptual artist. You provide the idea:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下，你需要理解一个现象：客户流失增加，销售额下降，或交货时间没有改善。因此，你成为概念艺术家。你提供想法：
- en: '*What were our sales in the northeast, and how did that compare to last year?*'
  id: totrans-8
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*我们在东北的销售情况如何，与去年相比如何？*'
- en: The system becomes your master technician. It does all the complex painting,
    sculpting, or, as in Nakaya’s case, plumbing in the background. It builds the
    query, chooses visualizations, and writes the interpretation. Finally, the answer,
    like fog in Nakaya’s sculptures, appears right in front of you.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 系统成为你的首席技术官。它完成所有复杂的绘画、雕塑，或者在中山富子·中野的案例中，是管道工作。它在后台构建查询，选择可视化，并撰写解释。最后，答案，就像中山富子·中野的雕塑中的雾一样，出现在你面前。
- en: '*Computer, analyze all sensor logs from the last hour. Correlate for ion fluctuations.*'
  id: totrans-10
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*电脑，分析过去一小时的全部传感器日志。关联离子波动。*'
- en: Do you remember the bridge of the Enterprise starship? When Captain Kirk needed
    to research a historical figure or Commander Spock needed to cross-reference a
    new energy signature, they never had to open a complex dashboard. They spoke to
    the computer (or at least used the interface and buttons on the captain’s chair)
    [*].
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 你还记得“企业号”的船桥吗？当柯克船长需要研究一个历史人物或斯波克指挥官需要交叉引用一个新的能量特征时，他们从未需要打开一个复杂的仪表板。他们与电脑对话（或者至少使用船长座椅上的界面和按钮）[*]。
- en: 'There was no need to use a BI app or write a single line of SQL. Kirk or Spock
    needed only to state their need: ask a question, sometimes add a simple hand gesture.
    In return, they received an immediate, visual or vocal response. **For decades,
    that fluid, conversational power was pure science fiction.**'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 没有必要使用BI应用程序或编写一行SQL代码。柯克或斯波克只需要表达他们的需求：提出一个问题，有时加上一个简单的手势。作为回报，他们会立即得到视觉或语音响应。**几十年来，这种流畅的对话能力纯粹是科幻小说中的东西。**
- en: '**Today, I ask myself a question:**'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: '**今天，我自问一个问题：**'
- en: '*Are we at the beginning of this particular reality of data analysis?*'
  id: totrans-14
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*我们是否处于这个特定数据分析现实的开始阶段？*'
- en: Data analysis is undergoing a significant transformation. We are moving away
    from traditional software that requires endless clicking on icons, menus, and
    windows, learning querying and programming languages or mastering complex interfaces.
    Instead, we are starting to have simple conversations with our data.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 数据分析正在经历重大的变革。我们正在远离需要无限点击图标、菜单和窗口的传统软件，学习查询和编程语言或掌握复杂的界面。相反，我们开始与我们的数据进行简单的对话。
- en: The goal is to replace the steep learning curve of complex tools with the natural
    simplicity of human language. This opens up data analysis to everyone, not just
    experts, allowing them to ‘talk with their data.’
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 目标是用人类语言的天然简单性取代复杂工具的陡峭学习曲线。这使得数据分析对每个人开放，而不仅仅是专家，使他们能够“与数据对话”。
- en: At this point, you are probably skeptical about what I have written.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，你可能对我的写作持怀疑态度。
- en: '**And you have every right to be.**'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: '**你有充分的理由这样做。**'
- en: 'Many of us have tried using ‘the modern era’ AI tools for visualizations or
    presentations, only to find the results were inferior to what sometimes even a
    junior analyst could produce. These outputs were often inaccurate. Or even worse:
    they were hallucinations, far away from the answers we need, or are simply incorrect.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 我们中的许多人尝试使用“现代时代”的AI工具进行可视化或演示，结果却发现结果往往不如有时连初级分析师都能制作出来的。这些输出往往不准确。或者更糟：它们是幻觉，远离我们需要的答案，或者仅仅是错误的。
- en: This isn’t just a glitch; there are clear reasons for the gap between promise
    and reality, which we will address today.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 这不仅仅是一个故障；造成承诺与现实之间差距的明显原因，我们将在今天讨论。
- en: '**In this article, I delve into a new approach called Natural Language Visualization
    (NLV). In particular, I will describe how the technology actually works, how we
    can use it, and what the major challenges are that still need to be solved before
    we enter our own Star Trek era.**'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: '**在这篇文章中，我将深入探讨一种称为自然语言可视化（NLV）的新方法。特别是，我将描述这项技术实际上是如何工作的，我们如何使用它，以及在我们进入自己的星际迷航时代之前，我们还需要解决哪些主要挑战。**'
- en: 'I recommend treating this article as a structured journey through our existing
    knowledge on this topic. *A sidenote: this article also marks a slight return
    for me to my earlier posts on data visualization, bridging that work with my more
    recent focus on storytelling.*'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 我建议将这篇文章视为一次结构化的旅程，通过它我们可以了解这个主题的现有知识。*顺便说一句：这篇文章也标志着我对我早期关于数据可视化的帖子的一种轻微回归，将这项工作与我最近对叙事的关注联系起来。*
- en: What I found in the process of writing this particular piece—and what I hope
    you’ll discover while reading, too—is that this subject seemed perfectly obvious
    at first glance. However, it quickly revealed a surprising, hidden depth of nuance.
    Eventually, after reviewing all the cited and non-cited sources, my own reflections,
    and carefully balancing the facts, I arrived at a fairly unexpected conclusion.
    Taking this systemic, academic-like approach was a true eye-opener in many ways,
    and I hope it will be for you as well.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 在撰写这篇特定文章的过程中，我发现——并且希望你在阅读时也能发现——这个主题乍一看似乎是再明显不过了。然而，它很快揭示了令人惊讶的、隐藏的细微差别。最终，在审查所有引用和非引用来源、我的个人反思，并仔细权衡事实之后，我得出了一些相当意外的结论。以这种系统性的、类似学术的方法来看，确实在很多方面都是一种真正的启发，我希望它对你也是如此。
- en: What is Natural Language Visualization?
  id: totrans-24
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是自然语言可视化？
- en: A critical barrier to understanding this field is the ambiguity of its core
    terminology. The acronym NLV (Natural Language Visualization) carries two distinct,
    historical meanings.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 理解这个领域的关键障碍是其核心术语的模糊性。缩写NLV（自然语言可视化）承载着两个截然不同、历史悠久的意义。
- en: '**Historical NLV (Text-to-Scene):** The older field of generating 2D or 3D
    graphics from descriptive text [1],[2].'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**历史NLV（文本到场景）**：从描述性文本生成2D或3D图形的较老领域[1],[2]。'
- en: '**Modern NLV (Text-to-Viz):** The contemporary field of generating data visualizations
    (like charts) from descriptive text [3].'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**现代NLV（文本到可视化）**：从描述性文本生成数据可视化（如图表）的当代领域[3]。'
- en: 'To maintain precision and allow you to cross-reference ideas and analysis presented
    in this article, I will use a specific academic methodology used in the HCI and
    visualization communities:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 为了保持精确性并允许你交叉引用本文中提出的思想和分析，我将使用在HCI和可视化社区中使用的特定学术方法：
- en: '**Natural Language Interface (NLI):** Broad, overarching term for any human-computer
    interface that accepts natural language as an input.'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**自然语言界面（NLI）**：任何接受自然语言作为输入的人机界面的广泛、总体术语。'
- en: '**Visualization-oriented Natural Language Interface (V-NLI):** It is a system
    that allows users to interact with and analyze visual data (like charts and graphs)
    using everyday speech or text. Its main purpose is to democratize data by serving
    as an easy, complementary input method for visual analytics tools, ultimately
    letting users focus entirely on their data tasks rather than grappling with the
    technical operation of complex visualization software [4],[5].'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可视化自然语言接口（V-NLI）：** 这是一个允许用户通过日常语言或文本与视觉数据（如图表和图形）交互并进行分析的系统。其主要目的是通过作为可视化分析工具的简单、补充输入方法来民主化数据，最终让用户完全专注于他们的数据任务，而不是与复杂可视化软件的技术操作纠缠
    [4],[5]。'
- en: 'V-NLIs are interactive systems that facilitate visual analytics tasks through
    two primary user interfaces: **form-based** or **chatbot-based**. **A form-based
    V-NLI** typically uses a text box for natural language queries, sometimes with
    refinement widgets, but is generally not designed for conversational follow-up
    questions. In contrast, a **chatbot-based V-NLI features a named agent with anthropomorphic
    traits**—such as personality, appearance, and emotional expression—that interacts
    with the user in a separate chat window, displaying the conversation alongside
    complementary outputs. While both are interactive, the chatbot-based V-NLI is
    also anthropomorphic, possessing all the defined chatbot characteristics, whereas
    the form-based V-NLI lacks the human-like traits [6].'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: V-NLIs是交互式系统，通过两种主要用户界面促进可视化分析任务：**基于表单**或**基于聊天机器人**。**基于表单的V-NLI**通常使用文本框进行自然语言查询，有时带有细化控件，但通常不是为对话后续问题而设计的。相比之下，**基于聊天机器人的V-NLI具有一个具有拟人化特征的命名代理**——例如个性、外观和情感表达——在单独的聊天窗口中与用户互动，显示对话和补充输出。虽然两者都是交互式的，但基于聊天机器人的V-NLI也是拟人化的，拥有所有定义的聊天机器人特征，而基于表单的V-NLI缺乏类似人类的特征
    [6]。
- en: '**The value proposition of V-NLIs is best understood by contrasting the conversational
    paradigm with traditional data analysis workflows. These are presented in the
    infographic below.**'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: '**V-NLIs的价值主张最好通过将对话范式与传统数据分析工作流程进行对比来理解。这些内容在下方的信息图中展示。**'
- en: '![](../Images/8a61814f67a6c6705dd1e95978344677.png)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/8a61814f67a6c6705dd1e95978344677.png)'
- en: 'Source: Image by the author based on [5], [7] – [10]. Images in the upper section
    of the image were generated in ChatGPT.'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：作者根据[5]、[7] – [10]制作并受到启发的图像。图像的上半部分是在ChatGPT中生成的。
- en: This shift represents a move from a static, high-friction, human-gated process
    to a dynamic, low-friction, automated one. I further illustrate how this new approach
    could impact how we work with data in Table 1.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 这种转变代表了一种从静态、高摩擦、人工干预的过程向动态、低摩擦、自动化的过程转变。我在表1中进一步说明了这种新方法如何影响我们处理数据的方式。
- en: 'Table 1: Comparative Analysis: Traditional BI vs. Conversational Analytics'
  id: totrans-36
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 表1：比较分析：传统BI与对话分析
- en: '| **Feature** | **Conversational Analytics** | **Traditional Analytics** |'
  id: totrans-37
  prefs: []
  type: TYPE_TB
  zh: '| **功能** | **对话分析** | **传统分析** |'
- en: '| **Focus** | All customer-agent interactions and CRM data | Phone conversations
    and customer profiles |'
  id: totrans-38
  prefs: []
  type: TYPE_TB
  zh: '| **焦点** | 所有客户-代理交互和CRM数据 | 电话通话和客户档案 |'
- en: '| **Data Sources** | Recent conversations across calls, chat, text, and emails
    | Historical records (sales, customer profiles) |'
  id: totrans-39
  prefs: []
  type: TYPE_TB
  zh: '| **数据来源** | 电话、聊天、文本和电子邮件中的近期对话 | 历史记录（销售、客户档案） |'
- en: '| **Timing** | Real-Time / Recent | Retrospective / Historical |'
  id: totrans-40
  prefs: []
  type: TYPE_TB
  zh: '| **时间** | 实时/近期 | 回顾/历史 |'
- en: '| **Immediacy** | High (analyzes very recent data) | Low (insights developed
    over longer periods) |'
  id: totrans-41
  prefs: []
  type: TYPE_TB
  zh: '| **即时性** | 高（分析非常近期的数据） | 低（在较长时间内发展出的洞察） |'
- en: '| **Insights** | Deep understanding of specific pain points, emerging issues
    | High-level contact center insights over time |'
  id: totrans-42
  prefs: []
  type: TYPE_TB
  zh: '| **洞察** | 对特定痛点的深入理解，新兴问题 | 随时间推移的高级接触中心洞察 |'
- en: '| **Use Case** | Improving immediate customer satisfaction, agent behavior
    | Understanding long-term trends and business dynamics |'
  id: totrans-43
  prefs: []
  type: TYPE_TB
  zh: '| **用例** | 提高即时客户满意度、代理行为 | 理解长期趋势和业务动态 |'
- en: 'Source: Table by the author based on and inspired by [8].'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：作者根据[8]制作并受到启发的表格。
- en: How does V-NLI work?
  id: totrans-45
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: V-NLI是如何工作的？
- en: 'To analyze the V-NLI mechanics, I adopted the theoretical framework from the
    academic survey ‘*The Why and The How: A Survey on Natural Language Interaction
    in Visualization*’ [11]. This framework offers a powerful lens for classifying
    and critiquing V-NLI systems by distinguishing between user intent and dialogue
    implementation. It dissects two major axes of the V-NLI system: **‘The Why’**
    and **‘How’**. **‘The Why’ axis represents user intent.** It examines why users
    interact with visualizations. **The ‘How’ axis represents dialogue structure.**
    It answers the question of how the human-machine dialogue is technically implemented.
    Each of these axes can be further divided into specific tasks in the case of ‘Why’
    and attributes in the case of ‘How’. I list them below.'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 为了分析V-NLI的机制，我采用了学术调查“*为什么和如何：可视化自然语言交互调查*” [11]中的理论框架。这个框架通过区分用户意图和对话实现，为对V-NLI系统进行分类和批评提供了一个强大的视角。它剖析了V-NLI系统的两个主要轴：**“Why”**和**“How”**。**“Why”轴代表用户意图。**它考察了用户为什么与可视化互动。**“How”轴代表对话结构。**它回答了人机对话在技术上是如何实现的。在“Why”的情况下，每个轴都可以进一步细分为具体任务；在“How”的情况下，可以细分为属性。以下是我列出的内容。
- en: '**The four key high-level ‘Why’ tasks are:**'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: '**四个关键的高层次“Why”任务是：**'
- en: '**Present:** Using visualization to communicate a narrative, for instance,
    for visual storytelling or explanation generation.'
  id: totrans-48
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**现在：** 使用可视化来传达叙事，例如，用于视觉叙事或解释生成。'
- en: '**Discover:** Using visualization to find new information, for instance, writing
    natural language queries, performing keyword search, visual question answering
    (VQA), or analytical conversation.'
  id: totrans-49
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**发现：** 使用可视化来寻找新信息，例如编写自然语言查询，执行关键词搜索，视觉问答（VQA）或分析对话。'
- en: '**Enjoy:** Using visualization for non-professional goals, such as augmentation
    of images or description generation.'
  id: totrans-50
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**享受：** 使用可视化实现非专业目标，例如图像增强或描述生成。'
- en: '**Produce:** Using visualization to create or record new artifacts, for instance,
    by making annotations or creating additional visualizations.'
  id: totrans-51
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**生产：** 使用可视化来创建或记录新的工件，例如通过制作注释或创建额外的可视化。'
- en: '**The ‘How,’ on the other hand, has three major attributes:**'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: '**另一方面，“如何”有三个主要属性：**'
- en: '**Initiative:** Answers who drives the conversation. It can be user-initiated,
    system-initiated, or mixed-initiated.'
  id: totrans-53
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**主动性：** 答案是谁驱动对话。它可以是由用户发起的，由系统发起的，或者混合发起的。'
- en: '**Duration:** How long is the interaction? It might be a single turn for a
    simple query, or a multi-turn conversation for a complex analytical discussion.'
  id: totrans-54
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**持续时间：** 交互有多长时间？它可能是一个简单的查询的单轮，或者是一个复杂分析讨论的多轮对话。'
- en: '**Communicative Functions:** What is the form of the language? The language
    model supports several interaction forms: users may issue direct commands, pose
    questions, or engage in a responsive dialogue in which they modify their input
    based on suggestions from the NLI.'
  id: totrans-55
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**交际功能：** 语言的形式是什么？语言模型支持多种交互形式：用户可以发出直接命令，提出问题，或者参与基于NLI建议的响应对话，他们可以根据NLI的建议修改他们的输入。'
- en: '**This framework can also help illustrate the most fundamental issue causing
    our disbelief in NLI.** Historically, both commercial and non-commercial Visual
    Natural Language Interfaces (V-NLIs) operated within a very narrow functional
    scope. The ‘Why’ was often reduced to **Discover** task, while the ‘How’ was limited
    to simple, **single-turn queries** initiated by the user.'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: '**这个框架还可以帮助我们说明导致我们对NLI不相信的最基本问题。** 历史上，商业和非商业的视觉自然语言接口（V-NLIs）都在一个非常狭窄的功能范围内运行。‘Why’通常被简化为**发现**任务，而‘How’则限于用户发起的简单、**单轮查询**。'
- en: As a result, most ‘talk-to-your-data’ tools functioned as little more than basic
    ‘ask me a question’ search boxes. This model has proven consistently frustrating
    for users because it is **overly rigid and brittle**, often failing unless a query
    is phrased with perfect precision.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，大多数“与你的数据交谈”工具的功能仅限于基本的“问我一个问题”的搜索框。这种模式对用户来说一直是非常令人沮丧的，因为它**过于僵化和脆弱**，除非查询被完美地精确表达，否则常常失败。
- en: The entire history of this technology is the story of growth in two key ways.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 这项技术的整个历史就是两个关键方面增长的历程。
- en: First, **our interactions have been improving, moving from asking just one question
    at a time to having a full, back-and-forth conversation.**
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 首先，**我们的交互正在改善，从一次只问一个问题发展到进行完整的、一来一往的对话。**
- en: Second, the reasons for using V-NLIs have been expanding. **We have progressed
    from simply finding information to having the tool automatically create new charts
    for us, and even explain the data in a written story.**
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 其次，使用V-NLIs的原因正在不断扩大。**我们已经从简单地查找信息发展到工具自动为我们创建新的图表，甚至用书面故事解释数据。**
- en: Working using fully all four tasks of ‘Why’ and three attributes of ‘How’ in
    the future will be the biggest leap of all. The system will stop waiting for us
    to ask a question and will start the conversation itself, proactively pointing
    out insights you may have missed. **This journey, from a simple search box to
    a smart, proactive partner, is the main story connecting this technology’s past,
    present, and future.**
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 在未来，完全利用“为什么”的四个任务和“如何”的三个属性将是最大的飞跃。系统将不再等待我们提问，而是主动开始对话，指出我们可能错过的见解。**从简单的搜索框到智能的、主动的伙伴，这一旅程是连接这项技术过去、现在和未来的主要故事。**
- en: Before going further, I would like to make a small course deviation and show
    you an example of how our interactions with AI could improve. For that purpose
    I will use a recent post published by my friend **Kasia Drogowska, PhD**, on [LinkedIn](https://www.linkedin.com/posts/activity-7385617192316207104-6gJv?utm_source=share&utm_medium=member_desktop&rcm=ACoAAAA2wgsBBextjRVtW637I5AIQO-dQ0EZKDo).
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 在进一步讨论之前，我想稍微偏离一下课程，并展示一个例子，说明我们与AI的互动如何得到改善。为此，我将使用我朋友**Kasia Drogowska，博士**最近在[LinkedIn](https://www.linkedin.com/posts/activity-7385617192316207104-6gJv?utm_source=share&utm_medium=member_desktop&rcm=ACoAAAA2wgsBBextjRVtW637I5AIQO-dQ0EZKDo)上发表的一篇帖子。
- en: AI models often become stereotyped, suffering from ‘mode collapse’ because they
    learn our own biases from their training data. A technique called ‘Verbalized
    Sampling’ (VS) offers a powerful solution by changing the prompt. Instead of asking
    for one answer (like ‘Tell me a joke’), you ask for a probability distribution
    of answers (like ‘Generate five different jokes and their probabilities’). This
    simple shift not only yields 1.6-2.1x more diverse and creative results but, more
    importantly, it teaches us to think probabilistically. It shatters the illusion
    of a single ‘correct answer’ in complex business decisions and puts the power
    of choice back in our hands, not the model’s.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: AI模型常常会陷入刻板印象，遭受“模式崩溃”的困扰，因为它们从训练数据中学习了我们的自身偏见。一种名为“语言化采样”（VS）的技术通过改变提示词提供了一种强大的解决方案。你不再要求一个答案（比如“讲一个笑话”），而是要求一个答案的概率分布（比如“生成五个不同的笑话及其概率”）。这种简单的转变不仅产生了1.6-2.1倍更多样化和创造性的结果，更重要的是，它教会了我们进行概率性思考。它打破了复杂商业决策中单一“正确答案”的幻觉，并将选择权重新交回到我们手中，而不是模型手中。
- en: '![](../Images/a0ce679b7ae3c69bcbf2353b7887a24e.png)'
  id: totrans-64
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a0ce679b7ae3c69bcbf2353b7887a24e.png)'
- en: 'Source: image by the author based on [12]. Answers generated in Gemini 2.5.'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：作者基于[12]创作的图像。Gemini 2.5生成的答案。
- en: 'The image above displays a direct comparison between two AI prompting methods:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 上图显示了两种AI提示方法的直接比较：
- en: '**The left side exemplifies direct prompting.** On this side I show what happens
    when you ask the AI the same simple question five times: ‘Tell me a joke about
    data visualization.’ The result is five very similar jokes, all following the
    same format.'
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**左侧展示了直接提示。**在这一侧，我展示了当你五次向AI提出相同简单的问题：“讲一个关于数据可视化的笑话。”时的结果：五个非常相似的笑话，都遵循相同的格式。'
- en: '**The right side exemplifies verbalized sampling.** Here I show a different
    prompting method. The question is changed to ask for a range of answers: ‘Generate
    five responses with their corresponding probabilities…’ The result is five completely
    different jokes, each unique in its setup and punchline, and each assigned a probability
    by the AI (as a matter of fact, it is not true probability, but anyway gives you
    the idea).'
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**右侧展示了语言化采样。**在这里，我展示了一种不同的提示方法。问题被改为要求一系列答案：“生成五个带有相应概率的响应……”结果是五个完全不同的笑话，每个笑话的设置和结尾都独特，并且AI为每个笑话分配了一个概率（实际上，这并不是真正的概率，但无论如何，它给你一个概念）。'
- en: 'The key benefit of a method like VS is diversity. Instead of just getting the
    AI’s single ‘default’ answer, it forces the AI to explore a wider spectrum of
    creative possibilities, letting you choose from the most common to the most unique.
    ****This is a perfect example of my point: changing how we interact with these
    tools can yield very different results.****'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: VS方法的关键好处是多样性。它不仅让你得到AI的单一“默认”答案，而且迫使AI探索更广泛的创造性可能性，让你从最常见的选择到最独特的选项中进行选择。****这是一个完美的例子，说明了我的观点：改变我们与这些工具的互动方式可以产生非常不同的结果。**
- en: The V-NLI pipeline
  id: totrans-70
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: V-NLI流水线
- en: To understand how a V-NLI translates a natural language query, such as ‘show
    me last quarter’s sales trend,’ into a precise and accurate data visualization,
    it is necessary to deconstruct its underlying technical architecture. Academics
    in the V-NLI community have proposed a **classic information visualization pipeline**
    as a structured model for these systems [5]. To illustrate the general mechanism
    of the process, I prepared the following infographic.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 要理解V-NLI如何将自然语言查询，如“显示上一季度的销售趋势”，转换为精确准确的数据可视化，有必要分解其底层技术架构。V-NLI社区的学者们提出了一个**经典的信息可视化管道**作为这些系统的结构化模型[5]。为了说明该过程的通用机制，我准备了以下信息图。
- en: '![](../Images/975ae59a1d73759a8997be56c2120d96.png)'
  id: totrans-72
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/975ae59a1d73759a8997be56c2120d96.png)'
- en: 'Source: Image by the author based on [5]. Concept for the infographic created
    in Gemini. Icons and graphics generated by the author in Gemini.'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：作者基于[5]的图片。信息图的构思在Gemini中创建。图标和图形由作者在Gemini中生成。
- en: For a single ‘text-to-viz’ query, the two most critical and challenging stages
    are (1) Query Interpretation and (3/4) Visual mapping/encoding. **In other words,
    it is understanding exactly what the user means.** The other stages, particularly
    (6) Dialogue Management, become paramount in more advanced conversational systems.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 对于单个“文本到可视化”查询，最关键和最具挑战性的两个阶段是（1）查询解释和（3/4）视觉映射/编码。**换句话说，就是准确理解用户的意思。**其他阶段，尤其是（6）对话管理，在更高级的对话系统中变得至关重要。
- en: 'The older systems consistently failed to grasp this understanding. The reason
    is that this task is essentially solving two problems instantly:'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 老系统始终无法理解这一点。原因是这个任务本质上是在瞬间解决两个问题：
- en: First, the system **must guess the user’s intent** (e.g., is the request to
    compare sales or to see a trend?).
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 首先，系统**必须猜测用户的意图**（例如，请求是比较销售还是查看趋势？）。
- en: Second, it **must translate casual words** (like ‘best sellers’) into a perfect
    database query.
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第二，它**必须将口语词汇**（如“畅销书”）翻译成完美的数据库查询。
- en: If the system misunderstood the user’s intent, it would display a table when
    the user wanted a chart. If it couldn’t parse user’s words, it would just return
    an error, or worse, make up something out of the blue.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 如果系统误解了用户的意图，它会显示表格，而用户想要图表。如果它无法解析用户的词汇，它只会返回错误，或者更糟糕的是，随意编造一些东西。
- en: Once the system understands your question, it must create the visual answer.
    It should automatically select the best chart for the given intent (e.g., a line
    chart for a trend) and then map appropriate characteristics to it (e.g., placing
    ‘Sales’ on the Y-axis and ‘Region’ on the X-axis). Interestingly, this chart-building
    part evolved in a similar way to the language-understanding part. Both transitioned
    from old, clunky, hard-coded rules to flexible, new AI models. This parallel evolution
    set the stage for modern Large Language Models (LLMs), which can now perform both
    tasks simultaneously.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦系统理解了你的问题，它就必须创建视觉答案。它应该自动选择最适合给定意图的图表（例如，趋势使用折线图）并将适当的特征映射到它上（例如，将“销售”放在Y轴上，“地区”放在X轴上）。有趣的是，这部分图表构建的演变与语言理解部分的演变方式相似。两者都从旧的、笨拙的、硬编码的规则转变为灵活的新AI模型。这种并行进化为现代大型语言模型（LLMs）奠定了基础，它们现在可以同时执行这两个任务。
- en: '**In fact, the complex, multi-stage V-NLI pipeline described above, with its
    distinct modules for intent recognition, semantic parsing, and visual encoding,
    has been significantly disrupted by the advent of LLMs.** **These models have
    not just improved one stage of the pipeline; they have collapsed the entire pipeline
    into a single, generative step.**'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: '**实际上，上述复杂的多阶段V-NLI管道，其中包含用于意图识别、语义解析和视觉编码的独立模块，已经被LLMs的出现所显著颠覆。**这些模型不仅改进了管道的一个阶段；它们将整个管道压缩成一个单一的生成步骤。'
- en: Why is that, you may ask? Well, the parsers of the previous era were algorithm-centric.
    They required years of effort by computational linguists and developers to build,
    and they would break upon encountering a new domain or an unexpected query.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能会问，为什么是这样呢？嗯，上一代的解析器是以算法为中心的。它们需要计算语言学家和开发者多年的努力来构建，而且一旦遇到新的领域或意外的查询就会崩溃。
- en: 'LLMs, in contrast, are data-centric. They offer a pre-trained, simplified solution
    to the most difficult problem in understanding natural language [13],[14]. This
    is **the great unification**: a single, pre-trained LLM can now execute all the
    core tasks of the V-NLI pipeline simultaneously. This architectural revolution
    has triggered an equivalent revolution in the V-NLI developer’s workflow. The
    core engineering challenge has undergone a fundamental shift. Previously, the
    challenge was to build a perfect, domain-specific semantic parser [11]. Now, the
    new challenge is to **create the ideal prompt and curate the perfect data to guide
    a pre-trained LLM.**'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 相比之下，LLM是数据中心的。它们为理解自然语言中最困难的问题提供了一个预训练、简化的解决方案[13],[14]。这是**伟大的统一**：现在，单个预训练的LLM可以同时执行V-NLI管道的所有核心任务。这种架构革命引发了V-NLI开发者工作流程的等效革命。核心工程挑战经历了根本性的转变。以前，挑战是构建一个完美的、特定领域的语义解析器[11]。现在，新的挑战是**创建理想的提示并精选完美的数据来指导预训练的LLM**。
- en: '**Three key techniques power this new, LLM-centric workflow.** The first is
    **Prompt Engineering**, a new discipline focused on carefully structuring the
    text prompt—sometimes using advanced strategies like ‘Tree-of-Thoughts’—to help
    the LLM reason through a complex data query instead of just making a quick guess.
    A related method is **In-Context Learning (ICL),** which primes the LLM by placing
    a few examples of the desired task (like sample text-to-chart pairs) directly
    into the prompt itself. Finally, for highly specialized fields, **Fine-Tuning**
    is used. This involves re-training the base LLM on a large, domain-specific dataset.
    These pillars, when in place, enable the creation of a powerful V-NLI that can
    handle complex tasks and specialized charts that would be impossible for any generic
    model.'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: '**三种关键技术推动了这个以LLM为中心的新工作流程**。首先是**提示工程**，这是一门专注于精心构建文本提示的新学科——有时会使用像“思维树”这样的高级策略——以帮助LLM通过复杂的查询进行推理，而不是仅仅做出快速猜测。相关的方法是**上下文学习（ICL）**，通过将几个所需任务的示例（如文本到图表的样本对）直接放入提示本身中，来为LLM进行预热。最后，对于高度专业化的领域，使用**微调**。这涉及到在大型、特定领域的数据集上重新训练基础LLM。这些支柱一旦到位，就能创建一个强大的V-NLI，它可以处理复杂任务和任何通用模型都无法处理的特定图表。'
- en: '![](../Images/54d958bdcd55e569b961ccaa8290816f.png)'
  id: totrans-84
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/54d958bdcd55e569b961ccaa8290816f.png)'
- en: Image generated by the author in Gemini, further edited and corrected in Microsoft
    PowerPoint.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 作者在Gemini中生成的图像，随后在Microsoft PowerPoint中进行进一步编辑和校正。
- en: This shift has profound implications for the scalability of V-NLI systems. The
    old approach (symbolic parsing) required building new, complex algorithms for
    every new domain. The latest LLM-based approach requires a new dataset for fine-tuning.
    ****While creating high-quality datasets remains a significant challenge, it is
    a data-scaling problem that is far more solvable and economical than the previous
    algorithmic-scaling problem. ****This change in fundamental scaling economics
    is the true and most lasting impact of the LLM revolution.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 这种转变对V-NLI系统的可扩展性产生了深远的影响。旧的方法（符号解析）需要为每个新的领域构建新的、复杂的算法。最新的基于LLM的方法需要一个新的数据集进行微调。****虽然创建高质量的数据集仍然是一个重大的挑战，但它是一个比之前的算法扩展问题更可解决、更经济的可扩展性问题。****这种基本扩展经济学的变化是LLM革命真正的、最持久的影响。
- en: What is the true meaning of this?
  id: totrans-87
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 这到底是什么意思？
- en: The single biggest promise of ‘talk-to-your-data’ tools is **data democratization**.
    They are designed to eliminate the steep learning curve of traditional, complex
    BI software, which often requires extensive training. ‘Talk-to-your-data’ tools
    provide a zero-learning-curve entry point for non-technical professionals (like
    managers, marketers, or sales teams) who can finally get their own insights without
    having to file a ticket with an IT or data team. This fosters a data-driven culture
    by enabling self-service for common, high-value questions.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: “与数据对话”工具的最大承诺是**数据民主化**。它们旨在消除传统、复杂的BI软件的陡峭学习曲线，这种软件通常需要广泛的培训。“与数据对话”工具为非技术专业人士（如经理、营销人员或销售团队）提供了一个零学习曲线的入门点，他们最终可以自己获得见解，而无需向IT或数据团队提交工单。这通过使常见的高价值问题自助服务成为可能，从而培养了一种数据驱动型文化。
- en: '**For the business, value is measured in terms of speed and efficiency.** The
    decision lag of waiting for an analyst, lasting days or sometimes weeks, is eliminated.
    This shift from a multi-day, human-gated process to a real-time, automated one
    saves an average of 2-3 hours per user per week, allowing the organization to
    react to market changes instantly.'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: '**对于企业来说，价值体现在速度和效率上。** 等待分析师的决策滞后，可能持续数天或有时数周，被消除了。这种从多日、人工控制的过程到实时、自动化的转变，平均每周为每位用户节省2-3小时，使组织能够即时应对市场变化。'
- en: 'However, this democratization creates a new and profound socio-technical tension
    within organizations. The below anecdote illustrates this perfectly: *an HR Business
    Partner (a non-technical user) used one of these tools to present calculations
    to managers. The managers, however, started discussing… the way we got to the
    calculation instead of the actual conclusions, because they didn’t trust that
    HR could ‘actually do the math.’*'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，这种民主化在组织内部产生了新的、深刻的社技术张力。以下轶事完美地说明了这一点：*一位人力资源业务伙伴（非技术用户）使用这些工具之一向经理展示计算结果。然而，经理们开始讨论……我们如何得出计算结果，而不是实际的结论，因为他们不相信人力资源部门“实际上能做数学。”*
- en: 'This reveals the critical conflict: the tool’s primary value is in direct tension
    with the organization’s fundamental need for governance and trust. **When a non-technical
    user is suddenly empowered to produce complex analytics, it challenges the authority
    of the traditional data gatekeepers, creating a conflict that is a direct consequence
    of the technology’s success.**'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 这揭示了关键的冲突：工具的主要价值与组织对治理和信任的基本需求直接对立。**当非技术用户突然获得产生复杂分析的能力时，它挑战了传统数据守门人的权威，这种冲突是技术成功直接后果。**
- en: '![](../Images/6e2572e8c329dd865428651bea3e089d.png)'
  id: totrans-92
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/6e2572e8c329dd865428651bea3e089d.png)'
- en: Classic and modern art together… Photo by [Serena Repice Lentini](https://unsplash.com/@serenarepice?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText) on [Unsplash](https://unsplash.com/photos/topless-man-sculpture-inside-room-wCxnoz_vc7s?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText).
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 古典与现代艺术并存……由[Serena Repice Lentini](https://unsplash.com/@serenarepice?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText)在[Unsplash](https://unsplash.com/photos/topless-man-sculpture-inside-room-wCxnoz_vc7s?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText)拍摄的照片。
- en: Which current LLM-based AI assistant is the best as a ‘talk-to-your-data’ tool?
  id: totrans-94
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 哪个基于当前LLM的AI助手作为“与数据对话”的工具最好？
- en: You might expect to see a ranking of the best assistants using LLMs for V-NLI
    here, but I chose not to include one. With numerous tools available, it’s impossible
    to review them all and rank them objectively and in a competent manner.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 您可能期望在这里看到使用LLM进行V-NLI的最好助手的排名，但我选择不包含一个。由于有众多工具可用，不可能对所有工具进行审查并客观、有根据地排名。
- en: My own experience is mainly with Gemini, ChatGPT, and built-in assistants like
    Microsoft Copilot or Google Workspace. Still, using a few online sources, I’ve
    put together a brief overview to highlight the key factors you should evaluate
    when selecting the option that’s most suitable for you. In the end, you’ll need
    to explore the possibilities yourself and consider aspects such as performance,
    cost, payment model, and—above all—safety.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 我自己的经验主要与Gemini、ChatGPT以及内置助手如Microsoft Copilot或Google Workspace有关。尽管如此，通过使用一些在线资源，我已经整理了一个简要概述，以突出在选择最适合您的选项时应评估的关键因素。最终，您需要亲自探索可能性，并考虑性能、成本、支付模式，以及——最重要的是——安全性。
- en: The table below outlines several tools with short descriptions. Later, I focus
    especially on Gemini and ChatGPT, which I know best.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 下表概述了几个工具及其简短描述。稍后，我将特别关注我最熟悉的Gemini和ChatGPT。
- en: Table 2\. Examples of LLMs that could serve as V-NLI
  id: totrans-98
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 表2. 可用作V-NLI的LLM示例
- en: '| **[BlazeSQL](https://www.blazesql.com)** | An AI data analyst and chatbot
    that connects to SQL databases, letting non-technical users ask questions in natural
    language, visualize results, and build interactive dashboards. There is no coding
    required. |'
  id: totrans-99
  prefs: []
  type: TYPE_TB
  zh: '| **[BlazeSQL](https://www.blazesql.com)** | 一个连接到SQL数据库的人工智能数据分析师和聊天机器人，允许非技术用户用自然语言提问，可视化结果，并构建交互式仪表板。无需编写代码。|'
- en: '| **[DataGPT](https://datagpt.com)** | A conversational analytics tool that
    answers natural language queries with visualizations, detects anomalies, and offers
    features like an AI onboarding agent and Lightning Cache for rapid query processing.
    |'
  id: totrans-100
  prefs: []
  type: TYPE_TB
  zh: '| **[DataGPT](https://datagpt.com)** | 一种对话分析工具，用可视化图表回答自然语言查询，检测异常，并提供AI入职代理和闪电缓存等快速查询处理功能。|'
- en: '| **Gemini (Google)** | Google Cloud’s conversational AI interface for BigQuery,
    enables instant data analysis, real-time insights, and customizable dashboards
    through everyday language. |'
  id: totrans-101
  prefs: []
  type: TYPE_TB
  zh: '| **Gemini (Google)** | Google Cloud的BigQuery对话式AI界面，通过日常语言实现即时数据分析、实时洞察和可定制的仪表板。
    |'
- en: '| **ChatGPT (OpenAI)** | A flexible conversational tool capable of exploring
    datasets, running basic statistical analysis, generating charts, and producing
    custom reports, all via natural language interaction. |'
  id: totrans-102
  prefs: []
  type: TYPE_TB
  zh: '| **ChatGPT (OpenAI)** | 一个灵活的对话工具，能够探索数据集、运行基本统计分析、生成图表并生成定制报告，所有这些都可以通过自然语言交互完成。
    |'
- en: '| **[Lumenore](https://lumenore.com)** | A platform focused on personalized
    insights and faster decision-making, with scenario analysis, an organizational
    data dictionary, predictive analytics, and centralized data management. |'
  id: totrans-103
  prefs: []
  type: TYPE_TB
  zh: '| **[Lumenore](https://lumenore.com)** | 一个专注于个性化洞察和快速决策的平台，提供情景分析、组织数据字典、预测分析和集中式数据管理。
    |'
- en: '| **[Dashbot](https://www.dimensionlabs.io)** | A tool designed to address
    the ‘dark data’ challenge by analyzing both unstructured data (e.g., emails, transcripts,
    logs) and structured data to turn previously unused information into actionable
    insights. |'
  id: totrans-104
  prefs: []
  type: TYPE_TB
  zh: '| **[Dashbot](https://www.dimensionlabs.io)** | 一个旨在解决“暗数据”挑战的工具，通过分析非结构化数据（例如，电子邮件、记录、日志）和结构化数据，将以前未使用的信息转化为可操作的见解。
    |'
- en: 'Source: table by the author based on [15].'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：作者基于[15]制作的表格。
- en: '**Both Gemini and ChatGPT exemplify the new wave of powerful, visualization-oriented
    V-NLIs, each with a distinct strategic advantage.** Gemini’s primary bonus is
    its deep integration within the Google ecosystem; it works directly with BigQuery
    and Google Suite. For example, you can open a PDF attachment directly from Gmail
    and perform a deep analysis using the Gemini assistant interface, using either
    a pre-built agent or ad-hoc prompts. Its core strength lies in translating simple,
    everyday language not just into data points, but directly into interactive visualizations
    and dashboards.'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: '**Gemini和ChatGPT都是可视化导向的强大V-NLI的新浪潮的典范，各自具有独特的战略优势。** Gemini的主要优势是其与Google生态系统的深度集成；它可以直接与BigQuery和Google
    Suite协同工作。例如，您可以直接从Gmail中打开PDF附件，并使用Gemini助手界面进行深度分析，无论是使用预构建的代理还是即兴提示。其核心优势在于将简单、日常的语言不仅转化为数据点，而且直接转化为交互式可视化和仪表板。'
- en: ChatGPT, in contrast, can serve as a more general-purpose yet equally powerful
    V-NLI for analytics, capable of handling various data formats, such as CSVs and
    Excel files. This makes it an ideal tool for users who want to make informed decisions
    without diving into complex software or coding. Its Natural Language Visualization
    (NLV) function is explicit, allowing users to ask it to summarize data, identify
    patterns, or even generate visualizations.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 与之相比，ChatGPT可以作为一个更通用但同样强大的V-NLI用于分析，能够处理各种数据格式，例如CSV和Excel文件。这使得它成为那些希望在不深入研究复杂软件或编码的情况下做出明智决策的用户的理想工具。它的自然语言可视化（NLV）功能明确，允许用户要求它总结数据、识别模式，甚至生成可视化。
- en: The true, shared strength of both platforms is their ability to handle interactive
    conversations. They allow users to ask follow-up questions and refine their queries.
    This iterative, conversational approach makes them highly effective V-NLIs that
    don’t just answer a single question, but enable a full, exploratory data analysis
    workflow.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 这两个平台真正的、共享的优势在于它们处理交互式对话的能力。它们允许用户提出后续问题并细化他们的查询。这种迭代、对话的方法使它们成为高度有效的V-NLI，不仅回答单个问题，而且能够实现全面、探索性的数据分析工作流程。
- en: 'Application example: Gemini as V-NLI'
  id: totrans-109
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 应用示例：Gemini作为V-NLI
- en: Let’s do a small experiment and see, step by step, how Gemini (version 2.5 Pro)
    works as a V-NLI. For the purpose of this experiment, I used Gemini to generate
    a set of artificial daily sales data, split by product, region, and sales representative.
    Then I asked it to simulate an interaction between a non-technical user (e.g.,
    a sales manager) and a V-NLI. Let’s see what the outcome was.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们进行一个小实验，逐步了解Gemini（2.5 Pro版）作为V-NLI的工作方式。为了进行这个实验，我使用Gemini生成了一组按产品、地区和销售代表划分的人工每日销售数据。然后我要求它模拟一个非技术用户（例如，销售经理）与V-NLI之间的交互。让我们看看结果如何。
- en: 'Generated data sample:'
  id: totrans-111
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 生成数据样本：
- en: '[PRE0]'
  id: totrans-112
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'Experiment:'
  id: totrans-113
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 实验：
- en: My typical workflow starts with a high-level query for a broad overview. If
    that initial view looks normal, I might stop. However, if I suspect an underlying
    issue, I’ll ask the tool to dig deeper for anomalies that aren’t visible on the
    surface.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 我的典型工作流程从对广泛概述的高层次查询开始。如果初始视图看起来正常，我可能会停止。然而，如果我发现潜在问题，我会要求工具深入挖掘表面看不到的异常。
- en: '![](../Images/e4f14943fb50488cd23c9f8a508997dc.png)'
  id: totrans-115
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e4f14943fb50488cd23c9f8a508997dc.png)'
- en: 'Source: print screen by the author.'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：作者截屏。
- en: '![](../Images/f7c94152652205f90c9d42e856c64c9e.png)'
  id: totrans-117
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f7c94152652205f90c9d42e856c64c9e.png)'
- en: 'Source: image generated by Gemini.'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：Gemini生成的图像。
- en: Next, I focused on the North region to see if I could spot any anomalies.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我专注于北部地区，看看是否能发现任何异常。
- en: '![](../Images/d4b2fbdb83a50e62e1a9e4d1258538f9.png)'
  id: totrans-120
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d4b2fbdb83a50e62e1a9e4d1258538f9.png)'
- en: 'Source: print screen by the author.'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：作者截屏。
- en: '![](../Images/48bc169ce6b0a7684fc62203e451fdce.png)'
  id: totrans-122
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/48bc169ce6b0a7684fc62203e451fdce.png)'
- en: 'Source: image generated by Gemini.'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：Gemini生成的图像。
- en: For the last query, I shifted my perspective to analyze the daily sales progression.
    This new view serves as a launchpad for subsequent, more detailed follow-up questions.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 对于最后一个查询，我将我的视角转向分析每日销售进展。这个新视角为随后的更详细后续问题提供了一个跳板。
- en: '![](../Images/aecf91d8ad6094ae8a217708df8f0c40.png)'
  id: totrans-125
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/aecf91d8ad6094ae8a217708df8f0c40.png)'
- en: 'Source: print screen by the author.'
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：作者截屏。
- en: '![](../Images/37627b5896a8d05b5558ef44afc5bb87.png)'
  id: totrans-127
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/37627b5896a8d05b5558ef44afc5bb87.png)'
- en: 'Source: image generated by Gemini.'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：Gemini生成的图像。
- en: As a matter of fact, the above examples were fairly simple and not far away
    from the ‘Old-era’ NLIs. But let’s see what happens, if the chatbot is empowered
    to take initiative during the discussion.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 实际上，上述例子相当简单，并不远离“旧时代”的NLIs。但让我们看看，如果聊天机器人被赋予在讨论中采取主动的能力会发生什么。
- en: '![](../Images/259a5b32341c6eb71f373b3b133ba3e2.png)'
  id: totrans-130
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/259a5b32341c6eb71f373b3b133ba3e2.png)'
- en: 'Source: print screen by the author.'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：作者截屏。
- en: '![](../Images/8878312756a252334a12a34b2c151d69.png)'
  id: totrans-132
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/8878312756a252334a12a34b2c151d69.png)'
- en: 'Source: print screen by the author.'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：作者截屏。
- en: 'This demonstrates a more advanced V-NLI capability: not just answering the
    question, but also providing context and identifying underlying patterns or outliers
    that the user might have missed.'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 这展示了更高级的V-NLI能力：不仅回答问题，还提供上下文，并识别用户可能错过的潜在模式或异常。
- en: '![](../Images/3769b877bc03bb21d0c38d199d48d80d.png)'
  id: totrans-135
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/3769b877bc03bb21d0c38d199d48d80d.png)'
- en: 'Source: image generated by Gemini.'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：Gemini生成的图像。
- en: 'This small experiment hopefully demonstrates that AI assistants, such as Gemini,
    can effectively serve as V-NLIs. The simulation began with the model successfully
    interpreting a high-level natural-language query about sales data and translating
    it into an appropriate visualization. The process showcased the model’s ability
    to handle iterative, conversational follow-ups, such as drilling down into a specific
    data segment or shifting the analytical perspective to a time series. Most significantly,
    the final experiment demonstrated proactive capability, in which the model not
    only answered the user’s query but also independently identified and visualized
    a critical data anomaly. This indicates that such AI tools can transcend the role
    of simple executors, acting instead as interactive partners in the data exploration
    process. But it’s not that they will do that on their own: they must first be
    empowered through an appropriate prompt.'
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 这个小实验希望表明，像Gemini这样的AI助手可以作为有效的V-NLIs。模拟从模型成功解释关于销售数据的高级自然语言查询并将其转换为适当的可视化开始。这个过程展示了模型处理迭代、对话式后续问题的能力，例如深入特定数据段或改变分析视角到时间序列。最重要的是，最后的实验展示了主动性能力，模型不仅回答了用户的查询，还独立识别并可视化了关键数据异常。这表明这样的AI工具可以超越简单执行者的角色，而成为数据探索过程中的互动伙伴。但它们不会自己这样做：它们必须首先通过适当的提示获得授权。
- en: So is this world really so ideal?
  id: totrans-138
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 那么这个世界真的如此理想吗？
- en: 'Despite the promise of democratization, V-NLI tools are plagued by fundamental
    challenges that have led to their past failures. The first and most significant
    is the Ambiguity Problem, the ‘Achilles’ heel’ of all natural language systems.
    Human language is inherently imprecise, which manifests in several ways:'
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管民主化的承诺，V-NLI工具仍然受到导致其过去失败的根本挑战的困扰。首先是模糊性问题，这是所有自然语言系统的“阿基里斯之踵”。人类语言本质上是模糊的，这表现在几种方式中：
- en: '**Linguistic ambiguity:** Words have multiple meanings. A query for ‘top customers’
    could mean top by revenue, volume, or growth, and a wrong guess instantly destroys
    user trust.'
  id: totrans-140
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**语言歧义**：单词有多种含义。对“顶级客户”的查询可能意味着按收入、数量或增长排名，一个错误的猜测会立即摧毁用户的信任。'
- en: '**Under-specification:** Users are often vague, asking ‘show me sales’ without
    specifying the time frame, granularity, or analytical intent (such as a trend
    versus a total).'
  id: totrans-141
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**不明确指定**：用户通常很含糊，询问“显示销售”而不指定时间范围、粒度或分析意图（如趋势与总数）。'
- en: '**Domain-specific context:** A generic LLM might be useless for a specific
    business because it doesn’t understand internal jargon or company-specific business
    logic [16], [17].'
  id: totrans-142
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**特定领域背景**：一个通用的 LLM 可能对特定业务无用，因为它不理解内部行话或公司特定的业务逻辑 [16]，[17]。'
- en: Second, even if a tool provides a correct answer, it is socially useless if
    the user cannot trust it. This is the **‘Black Box’** problem, as cited above
    in the story of the HR business partner. Because the HR user couldn’t explain
    the ‘why’ behind the ‘what,’ the insight was rejected. **This ‘chain of trust’
    is critical.** When the V-NLI is an opaque black box, the user becomes a ‘data
    parrot,’ unable to defend the numbers and rendering the tool unusable in any high-stakes
    business context.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 第二，即使一个工具提供了正确的答案，如果用户不能信任它，那么它在社会上就是无用的。这就是上面提到的 HR 业务伙伴故事中的**“黑箱”**问题。因为 HR
    用户无法解释“为什么”背后的“是什么”，所以这个洞察被拒绝了。**这个“信任链”至关重要**。当 V-NLI 是一个不透明的黑箱时，用户变成了一个“数据鹦鹉”，无法捍卫这些数字，使得这个工具在任何高风险的商业环境中都无法使用。
- en: 'Finally, there is the ‘Last Mile’ problem of technical and economic feasibility.
    A user’s simple-sounding question (e.g., ‘show me the lifetime value of customers
    from our last campaign’) may require a hyper-complex, 200-line SQL query that
    no current AI can reliably generate. LLMs are not a magic fix for this. Even to
    be remotely useful, they must be trained on a company-specific, prepared, cleaned,
    and properly described dataset. Unfortunately, this is still an enormous and recurring
    expense. This leads to the most important conclusion:'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，还有技术和经济可行性的“最后一英里”问题。一个用户听起来简单的问题（例如，“显示我们上次活动的客户终身价值”）可能需要一个超复杂的、200 行的
    SQL 查询，而当前的任何 AI 都无法可靠地生成。LLM 并不是这个问题的魔法解决方案。即使要稍微有用，它们也必须在公司特定的、准备好的、清理过的和正确描述的数据集上进行训练。不幸的是，这仍然是一个巨大的、反复出现的费用。这导致了最重要的结论：
- en: '**The only viable path forward is a hybrid future.**'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: '**唯一可行的道路是走向混合未来**。'
- en: '**An ungoverned ‘ask anything box’ is a no-go.**'
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: '**一个无管理的“问任何问题”的盒子是不可行的**。'
- en: 'The future of V-NLI is not a generic, all-powerful LLM; it is a flexible LLM
    (for language) operating on top of a rigid, curated semantic model (for governance,
    accuracy, and domain-specific knowledge) [18], [19]. Instead of ‘killing’ BI and
    dashboards, LLMs and V-NLI will be the opposite: a powerful catalyst. **They won’t
    replace the dashboard or static report. They will enhance it.** We should expect
    them to be integrated as the next generation of user interface, dramatically improving
    the quality and utility of data interaction.'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: V-NLI 的未来不是一个通用的、全能的 LLM；它是一个灵活的 LLM（用于语言），运行在严格、精心构建的语义模型之上（用于治理、准确性和特定领域知识）[18]，[19]。LLM
    和 V-NLI 不会像“杀死”BI 和仪表板那样，相反，它们将是一个强大的催化剂。**它们不会取代仪表板或静态报告。它们将增强它**。我们应该期待它们作为下一代用户界面被集成，这将极大地提高数据交互的质量和实用性。
- en: '![](../Images/0236dbc8e4307db1cf81d1db1e45965d.png)'
  id: totrans-148
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0236dbc8e4307db1cf81d1db1e45965d.png)'
- en: Image generated by the author in Gemini.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 作者在 Gemini 生成的图像。
- en: What will the future bring?
  id: totrans-150
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 未来会带来什么？
- en: 'The future of data interaction points toward a hypothetical paradigm shift,
    moving well beyond a simple search box to a **Multi-Modal Agentic System**. Imagine
    a system that operates more like a collaborator and less like a tool. A user,
    perhaps wearing an AR/VR headset, might ask, ‘Why did our last campaign fail?’
    Then the AI agent would reason over **all** available data. Not just the sales
    database, but also unstructured customer feedback emails, the ad creative images
    themselves, and website logs. Instead of a simple chart, it would proactively
    present an augmented reality dashboard and offer a predictive conclusion, such
    as, ‘The creative performed poorly with your target demographic, and the landing
    page had a 70% bounce rate.’ The crucial evolution is the final ‘agentic’ step:
    the system wouldn’t stop at the insight but would bridge the gap to action, perhaps
    concluding:'
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 数据交互的未来指向一个假设性的范式转变，远远超出简单的搜索框，转向一个**多模态智能代理系统**。想象一个更像合作伙伴而不是工具的系统。用户，可能戴着AR/VR头戴设备，可能会问：“为什么我们上次的宣传活动失败了？”然后AI代理会综合**所有**可用数据进行推理。不仅仅是销售数据库，还包括非结构化的客户反馈电子邮件、广告创意图像本身以及网站日志。它不会只是一个简单的图表，而是会主动展示增强现实仪表板并提供预测性结论，例如：“创意在目标受众中的表现不佳，着陆页的跳出率为70%。”关键性的进化是最后的“代理”步骤：系统不会止于洞察，而是会填补到行动的差距，也许会得出结论：
- en: '*I have already analyzed Q2’s top-performing creatives, drafted a new A/B test,
    and alerted DevOps to the page-load issue.*'
  id: totrans-152
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*我已经分析了Q2表现最好的创意，起草了新的A/B测试，并通知DevOps页面加载问题。*'
- en: ''
  id: totrans-153
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '***Would you like me to deploy the new test?*** **Y/N_**'
  id: totrans-154
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '***您希望我部署新的测试吗？*** **是/否**_'
- en: As scary as it may sound, this vision completes the evolution from simply ‘talking
    to data’ to actively ‘collaborating with an agent about data’ to achieve an automated,
    real-world outcome [20].
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管听起来可能很可怕，但这个愿景完成了从简单地“与数据交谈”到积极“与代理合作关于数据”以实现自动化、现实世界结果的进化[20]。
- en: I realize this last statement opens up even more questions, but this seems like
    the right place to pause and turn the conversation over to you. I’m eager to hear
    your opinions on this. Is a future like this realistic? Is it exciting, or frankly,
    a little scary? And in this advanced agentic system, is that final human ‘yes
    or no’ truly necessary? Or is it the safety mechanism we will always want / need
    to keep? ****I look forward to the discussion.****
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 我意识到这个最后的陈述引出了更多的问题，但这似乎是暂停并转向你的地方。我渴望听到你对这个问题的看法。这样的未来是现实的吗？它是令人兴奋的，还是坦白说有点可怕？在这个高级代理系统中，最后的“是”或“否”的人类决定真的必要吗？或者它是我们始终希望/需要的保护机制？**我期待着讨论。**
- en: Concluding remarks
  id: totrans-157
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: So, will conversational interaction make the data analyst—the one who painstakingly
    writes queries and manually builds charts—jobless? **My conclusion is that the
    question isn’t about replacement but redefinition.**
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，对话交互会使数据分析师——那些痛苦地编写查询和手动构建图表的人——失业吗？**我的结论是这个问题不在于替代，而在于重新定义**。
- en: The pure ‘Star Trek’ vision of an ‘ask anything’ box will not happen. It is
    plagued by its ‘Achilles’ heel’ of human language ambiguity and the ‘Black Box’
    problem that destroys the trust it needs to function. **Hence, the future, therefore,
    is not a generic, all-powerful LLM.**
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 纯粹的“星际迷航”式的“问任何问题”的盒子不会出现。它受到其“阿基里斯之踵”即人类语言模糊性和“黑箱”问题的困扰，这些问题破坏了其正常运作所需的信任。**因此，未来不会是一个通用、全能的LLM**。
- en: Instead, the only viable path forward is a hybrid system that combines the flexibility
    of an LLM with the rigidity of a curated semantic model. This new paradigm doesn’t
    replace the analysts; it elevates them. It frees them from being a ‘data plumber’.
    It empowers them as a strategic partner, working with a new, multi-modal agentic
    system that can finally bridge the chasm between data, insight, and automated
    action.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，唯一可行的道路是结合LLM的灵活性和精选语义模型的刚性。这个新范式不会取代分析师；它会提升他们。它使他们从“数据管道工”的角色中解放出来。它赋予他们作为战略伙伴的权力，与一个全新的多模态智能代理系统合作，该系统能够最终弥合数据、洞察和自动化行动之间的鸿沟。
