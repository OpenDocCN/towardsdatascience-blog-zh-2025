- en: Let’s Analyze OpenAI’s Claims About ChatGPT Energy Use
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/lets-analyze-openais-claims-about-chatgpt-energy-use/](https://towardsdatascience.com/lets-analyze-openais-claims-about-chatgpt-energy-use/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1750102197936" class="mdspan-comment">OpenAI CEO Sam</mdspan>
    Altman [recently shared](https://blog.samaltman.com/the-gentle-singularity) a
    concrete figure for the energy and water consumption of ChatGPT queries. According
    to his blog post, each query to ChatGPT consumes about 0.34 Wh of electricity
    (0.00034 KWh) and about 0.000085 gallons of water. The equivalent to what a high-efficiency
    lightbulb uses in a couple of minutes and roughly one-fifteenth of a teaspoon.
  prefs: []
  type: TYPE_NORMAL
- en: This is the first time OpenAI has publicly shared such data, and it adds an
    important data point to ongoing debates about the environmental impact of large
    AI systems. The announcement sparked widespread discussion – both supportive and
    skeptical. In this post I analyze the claim and unpack reactions on social media
    to look at the arguments on both sides.
  prefs: []
  type: TYPE_NORMAL
- en: What Supports the 0.34 Wh Claim?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let’s look at the arguments that lend credibility to OpenAI’s number.
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Independent estimates align with OpenAI’s number
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A key reason some consider the figure credible is that it aligns closely with
    previous third-party estimates. In 2025, research institute Epoch.AI estimated
    that a single query to GPT-4o consumes approximately 0.0003 KWh of energy  –  closely
    aligning with OpenAI’s own estimate. This assumes GPT-4o uses a mixture-of-experts
    architecture with 100 billion active parameters and a typical response length
    of 500 tokens. However, they do not account for other factors than the energy
    consumption by the GPU servers and they do not incorporate power usage effectiveness
    (PUE) as is otherwise customary.
  prefs: []
  type: TYPE_NORMAL
- en: A recent academic study by [Jehham et al (2025)](https://arxiv.org/pdf/2505.09598)
    estimates that GPT-4.1 nano uses 0.000454 KWh, o3 uses 0.0039 KWh and GPT-4.5
    uses 0.030 KWh for long prompts (approximately 7,000 words of input and 1,000
    words of output).
  prefs: []
  type: TYPE_NORMAL
- en: The agreement between the estimates and OpenAI’s data point suggests that OpenAI’s
    figure falls within a reasonable range, at least when focusing only on the stage
    where the model responds to a prompt (called “inference”).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a3857c995245129cfa6dab1a0818cc5f.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  prefs: []
  type: TYPE_NORMAL
- en: 2\. OpenAI’s number might be plausible at the hardware level
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: It’s [been reported](https://www.demandsage.com/chatgpt-statistics/#:~:text=How%20Many%20Chatgpt%20Queries%20Per,messages%20daily%20on%20the%20platform.)
    that OpenAI servers 1 billion queries per day. Let’s consider the math behind
    how ChatGPT could serve that amount of queries per day. If this is true, and the
    energy per query is 0.34 Wh, then the total daily energy could be around 340 megawatt-hours,
    according to an [industry expert](https://www.linkedin.com/feed/update/urn:li:activity:7338549458990718976/).
    He speculates that this would mean OpenAI could support ChatGPT with about 3,200
    servers (assuming Nvidia DGX A100). If 3,200 servers have to handle 1 billion
    daily queries, then each server would have to handle around 4.5 prompts per second.
    If we assume one instance of ChatGPT’s underlying LLM is deployed on each server,
    and that the average prompt results in 500 output tokens (roughly 375 words, according
    to OpenAI’s rule of thumb), then the servers would need to generate 2,250 tokens
    per second. Is that realistic?
  prefs: []
  type: TYPE_NORMAL
- en: '[Stojkovic et al (2024)](https://arxiv.org/html/2408.00741v1) have been able
    to achieve a throughput of 6,000 tokens per second from Llama-2–70b on an Nvidia
    DGX H100 server with 8 H100 GPUs.'
  prefs: []
  type: TYPE_NORMAL
- en: However, Jegham et al (2025) have found that three different OpenAI models generated
    between 75 and 200 tokens per second on average. It is, however, unclear how they
    arrived at this.
  prefs: []
  type: TYPE_NORMAL
- en: So it seems that we cannot reject the idea that 3,200 servers could be able
    to handle 1 billion daily queries.
  prefs: []
  type: TYPE_NORMAL
- en: Why some experts are skeptical
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Despite the supporting evidence, many remain cautious or critical of the 0.34
    Wh figure, raising several key concerns. Let’s take a look at those.
  prefs: []
  type: TYPE_NORMAL
- en: 1\. OpenAI’s number might leave out major parts of the system
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: I suspect the number only includes the energy used by the GPU servers themselves,
    and not the rest of the infrastructure – such as data storage, cooling systems,
    networking equipment, firewalls, electricity conversion loss, or backup systems.
    This is a common limitation in energy reporting across tech companies.
  prefs: []
  type: TYPE_NORMAL
- en: For instance, Meta has also reported GPU-only energy numbers in the past. But
    in real-world data centers, GPU power is only part of the full picture.
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Server estimates seem low compared to industry reports
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Some commentators, such as GreenOps advocate Mark Butcher, argue that 3,200
    GPU servers seems far too low to support all of ChatGPT’s users, especially if
    you consider global usage, high availability, and other applications beyond casual
    chat (like coding or image analysis).
  prefs: []
  type: TYPE_NORMAL
- en: Other reports suggest that OpenAI uses tens or even hundreds of thousands of
    GPUs for inference. If that’s true, the total energy use could be much higher
    than what the 0.34 Wh/query number implies.
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Lack of detail raises questions
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Critics, eg [David Mytton](https://www.devsustainability.com/p/chatgpt-energy-usage-is-034-wh-per),
    also point out that OpenAI’s statement lacks basic context. For instance:'
  prefs: []
  type: TYPE_NORMAL
- en: What exactly is an “average” query? A single question, or a full conversation?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Does this figure apply to just one model (e.g., GPT-3.5, GPT-4o) or an average
    across several?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Does it include newer, more complex tasks like multimodal input (e.g., analyzing
    PDFs or generating images)?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Is the water usage number direct (used for cooling servers) or indirect (from
    electricity sources like hydro power)?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What about carbon emissions? That depends heavily on the location and energy
    mix.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Without answers to these questions, it’s hard to know how much trust to place
    in the number or how to compare it to other AI systems.
  prefs: []
  type: TYPE_NORMAL
- en: Perspectives
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Are big tech finally hearing our prayers?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: OpenAI’s disclosure comes in the wake of [Nvidia’s release](https://images.nvidia.com/aem-dam/Solutions/documents/HGX-H100-PCF-Summary.pdf)
    of data about the embodided emissions of the GPU’s, and [Google’s blog post](https://cloud.google.com/blog/topics/sustainability/tpus-improved-carbon-efficiency-of-ai-workloads-by-3x)
    about the life cycle emissions of their TPU hardware. This could suggest that
    the corporations are finally responding to the many calls that have been made
    for more transparency. Are we witnessing the dawn of a new era? Or is Sam Altman
    just playing tricks on us because it is in his financial interests to downplay
    the climate impact of his company? I will leave that question as a thought experiment
    for the reader.
  prefs: []
  type: TYPE_NORMAL
- en: Inference vs training
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Historically, the numbers that we have seen estimated and reported about AI’s
    energy consumption has related to the energy use of *training* AI models. And
    while the training stage can be very energy intensive, over time, serving billions
    of queries (inference) can actually use more total energy than training the model
    in the first place. My own [estimates suggest](https://medium.com/data-science/the-carbon-footprint-of-gpt-4-d6c676eb21ae)
    that training GPT-4 may have used around 50–60 million KWh of electricity. With
    0.34 Wh per query and 1 billion daily queries, the energy used to answer user
    queries would surpass the energy use of the training stage after 150-200 days.
    This lends credibility to the idea that inference energy is worth measuring closely.
  prefs: []
  type: TYPE_NORMAL
- en: 'Conclusion: A welcome first step, but far from the full picture'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Just as we thought the debate about OpenAI’s energy use had gotten old, the
    notoriously closed company stirs it up with their disclosure of this figure. Many
    are excited about the fact that OpenAI has now entered the debate about the energy
    and water use of their products and hope that this is the first step towards greater
    transparency about the ressource draw and climate impact of big tech. On the other
    hand, many are skeptical of OpenAI’s figure. And for good reason. It was disclosed
    as a parenthesis in a blog post about an a wholly different topic, and no context
    was given whatsoever as detailed above.
  prefs: []
  type: TYPE_NORMAL
- en: Even though we might be witnessing a shift towards more transparency, we still
    need a lot of information from OpenAI in order to be able to critically assess
    their 0.34 Wh figure. Until then, it should be taken not just with a grain of
    salt, but with a handful.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: That’s it! I hope you enjoyed the story. Let me know what you think!
  prefs: []
  type: TYPE_NORMAL
- en: Follow me for more on AI and sustainability and feel free to follow me on [LinkedIn](https://www.linkedin.com/in/kaspergroesludvigsen).
  prefs: []
  type: TYPE_NORMAL
