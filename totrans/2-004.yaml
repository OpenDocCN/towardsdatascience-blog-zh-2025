- en: Using Google’s LangExtract and Gemma for Structured Data Extraction
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/using-googles-langextract-and-gemma-for-structured-data-extraction/](https://towardsdatascience.com/using-googles-langextract-and-gemma-for-structured-data-extraction/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1756185469217" class="mdspan-comment">Documents</mdspan>
    like insurance policies, medical records, and compliance reports are notoriously
    long and tedious to parse.
  prefs: []
  type: TYPE_NORMAL
- en: Important details (e.g., coverage limits and obligations in insurance policies)
    are buried in dense, unstructured text that is challenging for the average person
    to sift through and digest.
  prefs: []
  type: TYPE_NORMAL
- en: Large language models (LLMs), already known for their versatility, serve as
    powerful tools to cut through this complexity, pulling out the key facts and turning
    messy documents into clear, structured information.
  prefs: []
  type: TYPE_NORMAL
- en: In this article, we explore Google’s **LangExtract** framework and its open-source
    LLM, **Gemma 3**, which together make extracting structured information from unstructured
    text accurate and efficient.
  prefs: []
  type: TYPE_NORMAL
- en: To bring this to life, we will walk through a demo on parsing an insurance policy,
    showing how details like [**exclusions**](https://www.nextinsurance.com/glossary/insurance-exclusion/)can
    be surfaced effectively.
  prefs: []
  type: TYPE_NORMAL
- en: Contents
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**(1)** [Understanding LangExtract and Gemma](#heading-one)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**(2)** [Under the Hood of LangExtract](#heading-two)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**(3)** [Example Walkthrough](#heading-three)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The accompanying GitHub repo can be found [**here**](https://github.com/kennethleungty/LangExtract-Gemma-Structured-Extraction)**.**
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: (1) Understanding LangExtract and Gemma
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: (i) LangExtract
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**LangExtract** is an open-source Python library (released under Google’s GitHub)
    that uses LLMs to extract structured information from messy unstructured text
    based on user-defined instructions.'
  prefs: []
  type: TYPE_NORMAL
- en: It enables LLMs to excel at **named entity recognition** (such as coverage limits,
    exclusions, and clauses) and **relationship extraction** (logically linking each
    clause to its conditions) by efficiently grouping related entities.
  prefs: []
  type: TYPE_NORMAL
- en: 'Its popularity stems from its simplicity, as just a few lines of code are enough
    to perform structured information extraction. Beyond its simplicity, several key
    features make **LangExtract** stand out:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Exact Source Alignment:** Each extracted item is linked back to its precise
    location in the original text, ensuring full traceability.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Built for Long Documents:** Handles the “needle-in-a-haystack” problem with
    smart chunking, parallel processing, and iterative passes to maximize recall so
    as to find additional entities.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Broad Model Compatibility:** Works seamlessly with different LLMs, from cloud-based
    models like Gemini to local open-source options.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Domain Agnostic:** Adapts to any domain with only a handful of examples,
    removing the need for costly fine-tuning.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Consistent Structured Outputs:** Uses few-shot examples and controlled generation
    (only for certain LLMs like Gemini) to enforce a stable output schema and produce
    reliable, structured results.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Interactive Visualization**: Generates an interactive HTML file to visualize
    and review extracted entities in their original context.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![Illustration of LangExtract''s interactive HTML visualization | Apache License
    2.0 (https://github.com/google/langextract/blob/main/LICENSE)](../Images/276cb0faf3d2db99e7a5ffc3b80b2c8c.png)'
  prefs: []
  type: TYPE_IMG
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: (ii) Gemma 3
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**Gemma** is a family of **lightweight, state-of-the-art open LLMs from Google**,
    built from the same research used to create the Gemini models.'
  prefs: []
  type: TYPE_NORMAL
- en: '[**Gemma 3**](https://ai.google.dev/gemma/docs/core/model_card_3) is the latest
    release in the Gemma family, and is available in five parameter sizes: 270M, 1B,
    4B, 12B, and 27B. It is also purported to be the **current, most capable model
    that runs on a single GPU.**'
  prefs: []
  type: TYPE_NORMAL
- en: It can handle prompt inputs of up to 128K tokens, allowing us to process many
    multi-page articles (or hundreds of images) in a single prompt.
  prefs: []
  type: TYPE_NORMAL
- en: In this article,we will use the **Gemma 3 4B model** (4-billion parameter variant),
    deployed locally via **Ollama.**
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: (2) Under the Hood of LangExtract
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: LangExtract comes with many standard features expected in modern LLM frameworks,
    such as document ingestion, preprocessing (e.g., tokenization), prompt management,
    and output handling.
  prefs: []
  type: TYPE_NORMAL
- en: 'What caught my attention are the **three capabilities that support optimized
    long-context information extraction**:'
  prefs: []
  type: TYPE_NORMAL
- en: Smart chunking
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Parallel processing
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Multiple extraction passes
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: To see how these were implemented, I dug into the source code and traced how
    they work under the hood.
  prefs: []
  type: TYPE_NORMAL
- en: (i) Chunking strategies
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: LangExtract uses smart [chunking strategies](https://github.com/google/langextract/blob/main/langextract/chunking.py)
    to improve extraction quality over a single inference pass on a large document.
  prefs: []
  type: TYPE_NORMAL
- en: The goal is to split documents into smaller, focused chunks of manageable context
    size, so that the relevant text is kept in a way that is well-formed and easy
    to understand.
  prefs: []
  type: TYPE_NORMAL
- en: Instead of mindlessly cutting at character limits, it respects sentences, paragraphs,
    and newlines.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here is a summary of the key behaviors in the chunking strategy:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Sentence- and paragraph-aware:** Chunks are formed from whole sentences where
    possible (by respecting text delimiters like paragraph breaks), so that the context
    stays intact.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Handles long sentences:** If a sentence is too long, it is broken at natural
    points like newlines. Only if necessary will it split inside a sentence.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Edge case handling:** If a single word or token is longer than the limit,
    it becomes a chunk to avoid errors.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Token-based splitting:** All cuts respect token boundaries, so words are
    never split mid-way.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Context preservation:** Each chunk carries metadata (token and character
    positions) that map it back to the source document.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Efficient processing:** Chunks can be grouped into batches and processed
    in parallel, so quality gains do not add extra latency.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: As a result, LangExtract creates well-formed chunks that pack in as much context
    as possible while avoiding messy splits, which helps the LLM maintain extraction
    quality across large documents.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: (ii) Parallel processing
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: LangExtract’s support for parallel processing at LLM inference (as seen in [model
    provider scripts](https://github.com/google/langextract/blob/803fe681b87b7f238c5f53118db18c6c72d0df15/langextract/providers/gemini.py))
    enables extraction quality to be high over long documents (i.e., good entity coverage
    and attribute assignment) **without significantly increasing overall latency.**
  prefs: []
  type: TYPE_NORMAL
- en: When given a list of text chunks, the `max_workers` parameter controls how many
    tasks can run in parallel. These workers send multiple chunks to the LLM simultaneously,
    with up to `max_workers` chunks processed in parallel.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: (iii) Multiple extraction passes
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The purpose of iterative extraction passes is to improve the recall by capturing
    entities that might be missed in any single run.
  prefs: []
  type: TYPE_NORMAL
- en: In essence, it adopts a [**multi-sample and merge**](https://github.com/google/langextract/blob/main/langextract/annotation.py)
    strategy, where extraction is run multiple times independently, relying on the
    LLM’s stochastic nature to surface entities that might be missed in a run.
  prefs: []
  type: TYPE_NORMAL
- en: Afterwards, results from all passes are merged. If two extractions cover the
    same region of text, the version from the earlier pass is kept.
  prefs: []
  type: TYPE_NORMAL
- en: This approach boosts recall by capturing additional entities across runs, while
    resolving conflicts by a *first-pass-wins* rule. The downside is that it reprocesses
    tokens multiple times, **which can increase costs**.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: (3) Example Walkthrough
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let’s put LangExtract and Gemma to the test on a sample motor insurance policy
    document, found publicly on the [MSIG Singapore website](https://www.msig.com.sg/sites/msig_sg/files/2019-04/PrivateMotor-MotorMax-QMX091807.pdf).
  prefs: []
  type: TYPE_NORMAL
- en: Check out the [accompanying GitHub repo](https://github.com/kennethleungty/LangExtract-Gemma-Structured-Extraction)
    to follow along.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![Preview of the MSIG Motor Insurance document | Source: MSIG Singapore](../Images/6b4fc531505714af2deca176766d525e.png)'
  prefs: []
  type: TYPE_IMG
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: (i) Initial Setup
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'LangExtract can be installed from PyPI with:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: We then download and run Gemma 3 (4B model) locally with Ollama.
  prefs: []
  type: TYPE_NORMAL
- en: '[**Ollama**](http://ollama.com/) is an open-source tool that simplifies running
    LLMs on our computer or a local server. It allows us to interact with these models
    without needing an Internet connection or relying on cloud services.'
  prefs: []
  type: TYPE_NORMAL
- en: To install Ollama, visit the [Downloads page](https://ollama.com/download) and
    choose the installer for your operating system. Once done, verify the installation
    by running `ollama --version` in your terminal.
  prefs: []
  type: TYPE_NORMAL
- en: '**Important**: **Ensure your local device has GPU access** for Ollama, as this
    dramatically accelerates performance.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: After Ollama is installed, we get the service running by opening the application
    (macOS or Windows) or entering `ollama serve` for Linux.
  prefs: []
  type: TYPE_NORMAL
- en: 'To download Gemma 3 (4B) locally (3.3GB in size), we run this command: `ollama
    pull gemma3:4b`, after which we run `ollama list` to verify that Gemma is downloaded
    locally on your system.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a408c01fea16db6108843572c1bea5ce.png)'
  prefs: []
  type: TYPE_IMG
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: (ii) PDF Parsing and Processing
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The first step is to read the PDF policy document and parse the contents using
    [PyMuPDF](https://pymupdf.readthedocs.io/en/latest/) (installed with `pip install
    PyMuPDF`).
  prefs: []
  type: TYPE_NORMAL
- en: We create a `Document` class storing a piece of text and associated metadata,
    and a `PDFProcessor` class for the overall document parsing.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here is an explanation of the code above:'
  prefs: []
  type: TYPE_NORMAL
- en: '`load_documents`: Goes through each page, extracts text blocks, and saves them
    as `Document` objects. Each block includes the text and metadata (e.g., page number,
    coordinates with page width/height).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The coordinates capture where the text appears on the page, preserving layout
    information such as whether it is a header, body text, or footer.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '`get_all_text`: Combines all extracted text into one string, with clear markers
    separating pages.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`get_page_text`: Gets only the text from a specific page.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: (iii) Prompt Engineering
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The next step is to provide instructions to guide the LLM in the extraction
    process via **LangExtract**.
  prefs: []
  type: TYPE_NORMAL
- en: We begin with a system prompt that specifies the structured information we want
    to extract, focusing on the policy exclusion clauses.
  prefs: []
  type: TYPE_NORMAL
- en: In the prompt above, I explicitly specified a JSON output as the expected response
    format. Without this, we will likely hit an error of `<a href="https://github.com/google/langextract/issues/127"
    rel="noreferrer noopener" target="_blank">langextract.resolver.ResolverParsingError</a>`.
  prefs: []
  type: TYPE_NORMAL
- en: The issue is that **Gemma** does **not** include built-in structured-output
    enforcement, so by default, it outputs unstructured text in natural language.
    It may then inadvertently include extra text or malformed JSON, potentially breaking
    the strict JSON parsers in LangExtract.
  prefs: []
  type: TYPE_NORMAL
- en: However, if we use LLMs like Gemini that have **schema-constrained decoding**
    (i.e., configurable for structured output), then prompt lines 11–21 can be omitted.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Next, we introduce **few-shot prompting** by providing an example of what exclusion
    clauses mean in the context of insurance.
  prefs: []
  type: TYPE_NORMAL
- en: LangExtract’s `ExampleData` class serves as a template that shows the LLM worked
    examples of how text should map to structured outputs, informing it **what to
    extract** and **how to format it**.
  prefs: []
  type: TYPE_NORMAL
- en: It contains a list of `Extraction` objects representing the desired output,
    where each one is a container class comprising attributes of a single piece of
    extracted information.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: (iv) Extraction Run
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'With our PDF parser and prompts set up, we are ready to run the extraction
    with LangExtract’s `extract` method:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Here is an explanation of the parameters above:'
  prefs: []
  type: TYPE_NORMAL
- en: We pass our input text, prompts, and several few-shot examples into the `text_or_documents`,
    `prompt_description`, and `examples` parameters respectively
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We pass the model version `gemma3:4b` into `model_id`
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The `model_url` is defaulted to Ollama’s local endpoint (`http://localhost:11434`).
    *Ensure that the Ollama service is already running on your local machine*
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We set `fence_output` and `use_schema_constraint` to `False` since Gemma is
    not geared for structured output, and LangExtract does not yet support schema
    constraints for Ollama
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`max_char_buffer` sets the maximum number of characters for inference. Smaller
    values improve accuracy (by reducing context size) but increase the number of
    LLM calls'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`extraction_passes` sets the number of extraction passes for improved recall
    in the extraction'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: On my 8GB VRAM GPU, the 10-page document took **<10 minutes** to complete parsing
    and extraction.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: (v) Save and Postprocess Output
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'We finally save the output using LangExtract’s `io` module:'
  prefs: []
  type: TYPE_NORMAL
- en: '[Custom post-processing](https://github.com/kennethleungty/LangExtract-Gemma-Structured-Extraction/blob/main/utils/postprocessor.py)
    is then applied to beautify the result for easy viewing, and here is a snippet
    of the output:'
  prefs: []
  type: TYPE_NORMAL
- en: We can see that the LLM responses contain structured extractions from the original
    text, grouping them by class (specifically exclusions) and providing both the
    source text line and a plain-English explanation.
  prefs: []
  type: TYPE_NORMAL
- en: This format makes complex insurance clauses easier to interpret, offering a
    clear mapping between formal policy language and simple summaries.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: (4) Wrapping it up
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this article, we explored how LangExtract’s chunking, parallel processing,
    and iterative passes, combined with Gemma 3’s capabilities, enable reliable extraction
    of structured data from lengthy documents.
  prefs: []
  type: TYPE_NORMAL
- en: These techniques demonstrate how the right combination of models and extraction
    strategies can turn long, complex documents into structured insights that are
    accurate, traceable, and ready for practical use.
  prefs: []
  type: TYPE_NORMAL
- en: Before You Go
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: I invite you to follow my [GitHub](https://github.com/kennethleungty) and [LinkedIn](https://www.linkedin.com/in/kennethleungty/)
    pages for more engaging and practical content. Meanwhile, have fun extracting
    structured information with LangExtract and Gemma 3!
  prefs: []
  type: TYPE_NORMAL
