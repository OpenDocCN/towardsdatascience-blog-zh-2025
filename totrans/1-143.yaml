- en: Build LLM Agents Faster with Datapizza AI
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用 Datapizza AI 快速构建 LLM 代理
- en: 原文：[https://towardsdatascience.com/datapizza-the-ai-framework-made-in-italy/](https://towardsdatascience.com/datapizza-the-ai-framework-made-in-italy/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/datapizza-the-ai-framework-made-in-italy/](https://towardsdatascience.com/datapizza-the-ai-framework-made-in-italy/)
- en: <mdspan datatext="el1761766675960" class="mdspan-comment">Intro</mdspan>
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1761766675960" class="mdspan-comment">简介</mdspan>
- en: Organizations are increasingly investing in AI as these new tools are adopted
    in everyday operations more and more. This continuous wave of innovation is fueling
    the demand for more efficient and reliable frameworks. Following this trend, [Datapizza](https://datapizza.tech/en/)
    (the startup behind Italy’s tech community) just released an open-source framework
    for GenAI with Python, called ***Datapizza AI***.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 随着这些新工具在日常运营中被越来越多地采用，组织越来越投资于 AI。这股持续的创新浪潮正在推动对更高效和可靠的框架的需求。遵循这一趋势，[Datapizza](https://datapizza.tech/en/)（意大利科技社区的初创公司）刚刚发布了一个名为
    ***Datapizza AI*** 的用于 GenAI 的开源框架。
- en: 'When creating LLM-powered Agents, you need to pick an **AI stack**:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 当创建 LLM 驱动的代理时，您需要选择一个 **AI 栈**：
- en: '**Language Model** – the brain of the Agent. The first big choice is open-source
    (i.e. *Llama*, *DeepSeek*, *Phi*) vs paid (i.e. *ChatGPT*, *Claude*, *Gemini*).
    Then, based on the usecase, one needs to consider the LLM knowledge: generic (knows
    a little bit of everything like Wikipedia) vs topic-specific (i.e. fine-tuned
    for coding or finance).'
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**语言模型** – 代理的大脑。第一个大的选择是开源（即 *Llama*，*DeepSeek*，*Phi*）与付费（即 *ChatGPT*，*Claude*，*Gemini*）。然后，根据用例，需要考虑
    LLM 的知识：通用（了解一点关于所有事物的知识，如维基百科）与特定主题（例如，针对编码或金融进行微调）。'
- en: '**LLM Engine** – it’s what runs the language model, responding to prompts,
    inferring meaning, and creating text. Basically, it generates intelligence. The
    most used are [OpenAI](https://platform.openai.com/) (*ChatGPT*), [Anthropic](https://www.anthropic.com/)
    (*Claude*), [Google](https://gemini.google.com/) (*Gemini*), and [Ollama](https://ollama.com/)
    (runs open-source models locally).'
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**LLM Engine** – 它是运行语言模型的部分，响应提示，推断意义，并创建文本。基本上，它生成智能。最常用的有 [OpenAI](https://platform.openai.com/)
    (*ChatGPT*)，[Anthropic](https://www.anthropic.com/) (*Claude*)，[Google](https://gemini.google.com/)
    (*Gemini*)，和 [Ollama](https://ollama.com/)（在本地运行开源模型）。'
- en: '**AI Framework** – it’s the orchestration layer to build and manage workflows.
    To put it in another way, the framework must structure the intelligence created
    by LLMs. At the moment, the landscape is dominated by [*LangChain*](https://www.langchain.com/),
    [*LLamaIndex*](https://docs.llamaindex.ai/en/stable/), and *[CrewAI](https://www.crewai.com/)*.
    The new library [*Datapizza AI*](https://github.com/datapizza-labs/datapizza-ai)
    falls in this category and wants to be an alternative to the other main frameworks.'
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**AI 框架** – 它是构建和管理工作流程的编排层。换句话说，框架必须结构化 LLMs 创建的智能。目前，该领域由 [*LangChain*](https://www.langchain.com/)，[*LLamaIndex*](https://docs.llamaindex.ai/en/stable/)，和
    *[CrewAI](https://www.crewai.com/)* 主导。新的库 [*Datapizza AI*](https://github.com/datapizza-labs/datapizza-ai)
    属于这一类别，并希望成为其他主要框架的替代品。'
- en: In this article, I’m going to show how to **use the new Datapizza framework
    for building LLM-powered AI Agents**. I will present some useful Python code that
    can be easily applied in other similar cases (just copy, paste, run) and walk
    through every line of code with comments so that you can replicate this example.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我将展示如何使用新的 Datapizza 框架来构建 LLM 驱动的 AI 代理。我将展示一些可以轻松应用于其他类似情况的实用 Python
    代码（只需复制、粘贴、运行），并逐行代码进行注释，以便您可以复制此示例。
- en: Setup
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 设置
- en: I will use **Ollama** as the LLM engine, because I like to host models locally
    on my computer. That is the standard practice for all companies with sensitive
    data. Keeping everything local gives full control over data privacy, model behavior,
    and cost.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 我将使用 **Ollama** 作为 LLM 引擎，因为我喜欢在我的电脑上本地托管模型。这是所有拥有敏感数据公司的标准做法。将一切保持在本地可以完全控制数据隐私、模型行为和成本。
- en: First of all, you need to [download Ollama from the website](https://ollama.com/download). Then,
    pick a model and run the command indicated on the page to pull the LLM. I’m going
    with [Alibaba’s ***Qwen***](https://ollama.com/library/qwen3), as it’s both smart
    and lite (`ollama run qwen3`).
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，您需要从网站 [下载 Ollama](https://ollama.com/download)。然后，选择一个模型并运行页面上的指示命令来拉取 LLM。我选择
    [阿里巴巴的 ***Qwen***](https://ollama.com/library/qwen3)，因为它既智能又轻量（`ollama run qwen3`）。
- en: '*Datapizza AI* supports all the main LLM engines. We can complete the setup
    by running the following commands:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '*Datapizza AI* 支持所有主要的 LLM 引擎。我们可以通过运行以下命令来完成设置：'
- en: '[PRE0]'
  id: totrans-13
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: As indicated in the [official documentation](https://docs.datapizza.ai/0.0.2/Guides/Clients/local_model/),
    we can quickly test our AI stack by calling the model with a simple prompt and
    asking a question. The object `OpenAILikeClient()` is how you connect to the Ollama
    API, which is usually hosted on the same localhost URL.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 如 [官方文档](https://docs.datapizza.ai/0.0.2/Guides/Clients/local_model/) 所示，我们可以通过用简单的提示调用模型并提问来快速测试我们的
    AI 栈。`OpenAILikeClient()` 对象是连接到 Ollama API 的方式，该 API 通常托管在同一本地主机 URL 上。
- en: '[PRE1]'
  id: totrans-15
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '![](../Images/283076c8e42d72b29ddd378a5f063669.png)'
  id: totrans-16
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/283076c8e42d72b29ddd378a5f063669.png)'
- en: Chatbot
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 聊天机器人
- en: Another way to test the capability of the LLM is to build a simple Chatbot and
    do some conversation. To do so, at every interaction, we need to store the chat
    history and feed it back to the model, specifying what was said by whom. The Datapizza
    frameworkalready has a built-in **memory system**.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种测试 LLM 能力的方法是构建一个简单的聊天机器人并进行一些对话。为此，在每次交互时，我们需要存储聊天历史并将其反馈给模型，指定是谁说了什么。Datapizza
    框架已经内置了 **内存系统**。
- en: '[PRE2]'
  id: totrans-19
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '![](../Images/f85fbff847f78bce22e229eb96280c32.png)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f85fbff847f78bce22e229eb96280c32.png)'
- en: 'If you want to **retrieve the chat history**, you can just access the memory.
    Usually, AI frameworks usethree rolesin the interaction with an LLM: “*system*”
    (core instructions), “*user*” (what was said by the human), “*assistant*” (what
    the chatbot replied).'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要 **检索聊天历史**，你只需访问内存。通常，AI 框架在 LLM 交互中使用了三个角色：“*系统*”（核心指令）、“*用户*”（人类所说的话）、“*助手*”（聊天机器人回复的话）。
- en: '[PRE3]'
  id: totrans-22
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '![](../Images/e7a4892a24eead018951caf8ef9f4a21.png)'
  id: totrans-23
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e7a4892a24eead018951caf8ef9f4a21.png)'
- en: Obviously, the LLM alone is very limited and it can’t do much besides chatting.
    Therefore, we need to give it the possibility to take action, or in other words,
    to activate Tools.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 显然，LLM 单独是非常有限的，它除了聊天之外几乎什么都不能做。因此，我们需要给它提供采取行动的可能性，换句话说，就是激活工具。
- en: Tools
  id: totrans-25
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 工具
- en: Tools are **the main difference between a simple LLM and an AI Agent**. When
    the user requests something that goes beyond the LLM knowledge base (i.e. “*what
    time is it now?*“), the Agent should understand that it doesn’t know the answer,
    activate a Tool to get additional information (i.e. checking the clock), elaborate
    the result through the LLM, and generate an answer.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 工具是 **简单 LLM 和 AI 代理之间的主要区别**。当用户请求超出 LLM 知识库范围的内容时（例如，“*现在是什么时间？*”），代理应理解它不知道答案，激活一个工具来获取更多信息（例如检查时钟），通过
    LLM 精炼结果，并生成答案。
- en: The Datapizza framework allows you to create Tools from scratch very easily.
    You just need to import the [decorator](https://www.w3schools.com/python/python_decorators.asp)
    *@tool* and any function can become actionable for the Agent.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: Datapizza 框架允许你非常容易地从零开始创建工具。你只需要导入 [装饰器](https://www.w3schools.com/python/python_decorators.asp)
    `@tool`，任何函数都可以成为代理可执行的操作。
- en: '[PRE4]'
  id: totrans-28
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Then, assign the designated Tool to the** Agent**, and you’ll have an AI that
    combines language understanding + autonomy decision making + tool use.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，将指定的工具分配给 **代理**，你将拥有一个结合语言理解 + 自主决策 + 工具使用的 AI。
- en: '[PRE5]'
  id: totrans-30
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: '![](../Images/877ed871a54906da0a482af83c7000ea.png)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/877ed871a54906da0a482af83c7000ea.png)'
- en: An LLM-powered AI Agent is an intelligent system built around a language model
    that doesn’t just respond, but it reasons, decides, and acts. Besides conversation
    (which means chatting with a general-purpose knowledge base), the most common
    actions that Agents can do are **RAG** (chatting with your documents), **Querying **(chatting
    with a database), **Web Search** (chatting with the whole Internet).
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 一个由语言模型驱动的 AI 代理是一个围绕语言模型构建的智能系统，它不仅响应，还能推理、决策和行动。除了对话（即与通用知识库聊天）之外，代理可以执行的最常见操作是
    **RAG**（与你的文档聊天）、**查询**（与数据库聊天）、**网络搜索**（与整个互联网聊天）。
- en: For instance, let’s try a web searching Tool. In Python, the easiest way to
    do it is with the famous private browser *[DuckDuckGo](https://duckduckgo.com/)*.
    You can directly use the [original library](https://github.com/deedy5/ddgs) or
    the Datapizza framework wrapper (`pip install datapizza-ai-tools-duckduckgo`).
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，让我们尝试一个网络搜索工具。在 Python 中，最简单的方法是使用著名的私人浏览器 [DuckDuckGo](https://duckduckgo.com/)。你可以直接使用
    [原始库](https://github.com/deedy5/ddgs) 或 Datapizza 框架包装器（`pip install datapizza-ai-tools-duckduckgo`）。
- en: '[PRE6]'
  id: totrans-34
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: '![](../Images/72d5195771599d566dd13eb6509bf088.png)'
  id: totrans-35
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/72d5195771599d566dd13eb6509bf088.png)'
- en: Let’s create an Agent that can search the web for us. If you want to make it
    more interactive, you can structure the AI like I did for the Chatbot.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们创建一个可以为我们搜索网络的代理。如果你想让它更加互动，你可以像我为聊天机器人所做的那样构建 AI。
- en: '[PRE7]'
  id: totrans-37
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: '![](../Images/1c068c3be707cc1f08ded00d247cc275.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/1c068c3be707cc1f08ded00d247cc275.png)'
- en: Multi-Agent System
  id: totrans-39
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 多智能体系统
- en: The real strength of Agents is the ability to **collaborate with each other**,
    just like humans do. These teams are called [Multi-Agent Systems (MAS)](https://en.wikipedia.org/wiki/Multi-agent_system),
    a group of AI Agents that work together in a shared environment to solve complex
    problems that are too difficult for a single one to handle alone.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 代理的真实优势是**相互协作的能力**，就像人类一样。这些团队被称为[多智能体系统（MAS）](https://en.wikipedia.org/wiki/Multi-agent_system)，是一组在共享环境中共同工作以解决单个代理单独难以处理的复杂问题的AI代理。
- en: 'This time, let’s create a more advanced Tool: code execution. Please note that
    LLMs know how to code by being exposed to a large corpus of both code and natural
    language text, where they learn patterns, syntax, and semantics of programming
    languages. But since they can not complete any real action, the code they create
    is just text. In short, **LLMs can generate Python code but can’t execute it,
    Agents can**.'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 这次，让我们创建一个更高级的工具：代码执行。请注意，LLM通过接触大量代码和自然语言文本的语料库来学习编程语言的模式、语法和语义。但由于它们无法完成任何实际操作，它们创建的代码只是文本。简而言之，**LLM可以生成Python代码，但不能执行它，代理可以**。
- en: '[PRE8]'
  id: totrans-42
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'There are two types of MAS: the **sequential process** ensures tasks are executed
    one after the other, following a linear progression. On the other hand, the **hierarchical
    structure** simulates traditional organizational hierarchies for efficient task
    delegation and execution. Personally, I tend to prefer the latter as there is
    more parallelism and flexibility.'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: MAS有两种类型：**顺序过程**确保任务一个接一个地执行，遵循线性进度。另一方面，**层次结构**模拟传统的组织层次结构，以实现高效的任务委派和执行。我个人倾向于后者，因为其具有更多的并行性和灵活性。
- en: Withthe Datapizza framework, you can link two or more Agents with the function
    `can_call()`. In this way, one Agent can pass the current task to another Agent.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Datapizza框架，您可以使用`can_call()`函数将两个或多个代理链接起来。这样，一个代理可以将当前任务传递给另一个代理。
- en: '[PRE9]'
  id: totrans-45
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: '![](../Images/de3db6586ac296dfa89e2927d1a7c4a0.png)![](../Images/0ea503e24d005059d5edbea05fb88e6b.png)'
  id: totrans-46
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/de3db6586ac296dfa89e2927d1a7c4a0.png)![](../Images/0ea503e24d005059d5edbea05fb88e6b.png)'
- en: Conclusion
  id: totrans-47
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: This article has been a tutorial to **introduce *Datapizza AI***, a brand new
    framework to build LLM-powered Chatbots and AI Agents. The library is very flexible
    and user-friendly, and can cover different GenAI usecases. I used it with Ollama,
    but it can be linked with all the famous engines, like OpenAI.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 本文是一篇教程，旨在**介绍*Datapizza AI***，这是一个全新的框架，用于构建由LLM（大型语言模型）驱动的聊天机器人和AI代理。该库非常灵活且用户友好，可以覆盖不同的GenAI用例。我使用它与Ollama一起工作，但它可以与所有著名的引擎链接，如OpenAI。
- en: Full code for this article: **[GitHub](https://github.com/mdipietro09/GenerativeAI/blob/main/DatapizzaAI/datapizza.ipynb)**
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 本文的完整代码：**[GitHub](https://github.com/mdipietro09/GenerativeAI/blob/main/DatapizzaAI/datapizza.ipynb)**
- en: I hope you enjoyed it! Feel free to contact me for questions and feedback or
    just to share your interesting projects.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 希望您喜欢！如有任何问题、反馈或只是想分享您有趣的项目，请随时联系我。
- en: 👉 [**Let’s Connect**](https://maurodp.carrd.co/) 👈
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 👉 [**让我们建立联系**](https://maurodp.carrd.co/) 👈
