- en: 'Hidden Gems in NumPy: 7 Functions Every Data Scientist Should Know'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: NumPy中的隐藏宝石：每个数据科学家都应该知道的7个函数
- en: 原文：[https://towardsdatascience.com/hidden-gems-in-numpy-7-functions-every-data-scientist-should-know/](https://towardsdatascience.com/hidden-gems-in-numpy-7-functions-every-data-scientist-should-know/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/hidden-gems-in-numpy-7-functions-every-data-scientist-should-know/](https://towardsdatascience.com/hidden-gems-in-numpy-7-functions-every-data-scientist-should-know/)
- en: <mdspan datatext="el1761024381571" class="mdspan-comment">I’ve been learning</mdspan>
    data analytics for a year now. So far, I can consider myself confident in SQL
    and Power BI. The transition to Python has been quite exciting. I’ve been exposed
    to some neat and smarter approaches to data analysis.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1761024381571" class="mdspan-comment">我已经学习</mdspan>数据分析一年了。到目前为止，我可以自信地认为自己对SQL和Power
    BI很熟悉。转向Python的过程非常令人兴奋。我接触到了一些 neat 和更智能的数据分析方法。
- en: After brushing up on my skills on the Python fundamentals, the ideal next step
    was to start learning about some of the Python libraries for data analysis. NumPy
    is one of them. Being a math nerd, naturally, I’d enjoy exploring this Python
    library.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在巩固了我的Python基础知识后，理想的下一步是开始学习一些Python数据分析库。NumPy就是其中之一。作为一个数学狂热者，自然地，我会喜欢探索这个Python库。
- en: This library is designed for individuals who want to perform mathematical computations
    using Python, from basic mathematics and algebra to advanced concepts like calculus.
    NumPy can pretty much do it all.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 这个库是为那些想使用Python进行数学计算的人设计的，从基本的数学和代数到高级概念如微积分。NumPy几乎可以做到所有这些。
- en: In this article, I wanted to introduce you to some NumPy functions I’ve been
    playing around with. Whether you’re a data scientist, financial analyst, or research
    nerd, these functions would help you out a lot. Without further ado, let’s get
    to it.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我想向您介绍一些我一直在尝试的NumPy函数。无论您是数据科学家、金融分析师还是研究狂热者，这些函数都会对您有很大帮助。无需多言，让我们开始吧。
- en: Sample Dataset (used throughout)
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 样本数据集（用于整个示例）
- en: 'Before diving in, I’ll define a small dataset that will anchor all examples:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 在深入之前，我将定义一个小数据集，它将锚定所有示例：
- en: '[PRE0]'
  id: totrans-8
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Using this small temperature dataset, I’ll be sharing 7 functions that make
    array operations effortless.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 使用这个小的温度数据集，我将分享7个使数组操作变得轻松的函数。
- en: 1\. np.where()— The Vectorized If-Else
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1. np.where()——向量化If-Else
- en: '**Before I define what this function is, here’s a quick showcase of the function**'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: '**在定义这个函数之前，先快速展示一下这个函数**'
- en: '[PRE1]'
  id: totrans-12
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '**Output: (array([3, 4]),)**'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: '**输出：**(array([3, 4]),)'
- en: '`np.where` is a condition-based function. When a condition is specified, it
    outputs the index/indices where that condition is true.'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: '`np.where`是一个基于条件的函数。当指定条件时，它输出满足该条件的索引/索引。'
- en: For instance, in the example above, an array is specified, and I have declared
    a np.where function that retrieves records where the array element is greater
    than 20\. The output is array([3, 4]), because that’s the location/indices where
    that condition is true — that will be 25 and 30.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，在上面的例子中，指定了一个数组，并声明了一个np.where函数，用于检索数组元素大于20的记录。输出是array([3, 4])，因为这将是满足该条件的位置/索引——即25和30。
- en: Conditional selection/replacement
  id: totrans-16
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 条件选择/替换
- en: 'It’s also useful when you’re trying to define a custom output for the outputs
    that meet your condition. This is used a lot in data analysis. For instance:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 当您试图为满足您条件的结果定义自定义输出时，这也很有用。这在数据分析中经常使用。例如：
- en: '[PRE2]'
  id: totrans-18
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '**Output: [‘odd’ ‘even’ ‘odd’ ‘even’ ‘odd’]**'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '**输出：**[‘odd’ ‘even’ ‘odd’ ‘even’ ‘odd’]'
- en: The example above tries to retrieve even numbers. After retrieving, a condition
    selection/replacement function is called that adds a custom name to our conditions.
    If the condition is true, it’s replaced by even, and if the condition is false,
    it’s replaced by odd.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 上面的例子试图检索偶数。检索后，调用一个条件选择/替换函数，为我们的条件添加一个自定义名称。如果条件为真，则替换为偶数，如果条件为假，则替换为奇数。
- en: Alright, let’s apply this to our small dataset.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧，让我们将这个应用到我们的小数据集上。
- en: '**Problem: Replace all temperatures above 35°C with 35 (cap extreme readings).**'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '**问题：将所有高于35°C的温度替换为35（消除极端读数）。**'
- en: In real-world data, especially from sensors, weather stations, or user inputs,
    outliers are quite common — sudden spikes or unrealistic values that aren’t realistic.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 在现实世界的数据中，尤其是来自传感器、气象站或用户输入的数据，异常值相当常见——突然的峰值或不切实际的价值，这些价值并不现实。
- en: For example, a temperature sensor might momentarily glitch and record 42°C when
    the actual temperature was 35°C.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，一个温度传感器可能会暂时出现故障，记录42°C，而实际温度是35°C。
- en: 'Leaving such anomalies in your data can:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 在你的数据中留下这样的异常值可能会导致：
- en: Skew averages — a single high value can pull your mean upward.
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 偏斜平均值 — 一个高值可能会将平均值向上拉。
- en: Distorted visualisations — charts might stretch to accommodate a few extreme
    points.
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 扭曲的视觉呈现 — 图表可能会拉伸以适应几个极端点。
- en: Mislead models — machine learning algorithms are sensitive to unexpected ranges.
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 欺骗模型 — 机器学习算法对意外的范围很敏感。
- en: '**Let’s fix that**'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: '**让我们来修复这个问题**'
- en: '[PRE3]'
  id: totrans-30
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '**Output: array([30, 32, 29, 35, 35, 33, 31])**'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: '**输出：array([30, 32, 29, 35, 35, 33, 31])** '
- en: Looks much better now. With just a few lines of code, we managed to fix unrealistic
    outliers in our dataset.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 现在看起来好多了。仅用几行代码，我们就成功地修复了数据集中的不切实际异常值。
- en: 2\. np.clip() — Keep Values in Range
  id: totrans-33
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2. np.clip() — 保持值在范围内
- en: In many practical datasets, values can spill outside the expected range, probably
    due to measurement noise, user error, or scaling mismatches.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 在许多实际数据集中，值可能会超出预期范围，这可能是由于测量噪声、用户错误或缩放不匹配造成的。
- en: 'For instance:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 例如：
- en: A temperature sensor might read −10°C when the lowest possible is 0°C.
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个温度传感器可能读取 -10°C，而最低可能值为 0°C。
- en: A model output might predict probabilities like 1.03 or −0.05 due to rounding.
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 模型输出可能会预测概率，如 1.03 或 -0.05，这是由于四舍五入造成的。
- en: When normalising pixel values for an image, a few might go beyond 0–255.
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在对图像的像素值进行归一化时，一些值可能会超出 0-255。
- en: 'These “out-of-bounds” values may seem minor, but they can:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 这些“超出范围”的值可能看起来很小，但它们可以：
- en: Break downstream calculations (e.g., log or percentage computations).
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 打断下游计算（例如，对数或百分比计算）。
- en: Cause unrealistic plots or artefacts (especially in signal/image processing).
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 导致不切实际的图表或伪影（尤其是在信号/图像处理中）。
- en: Distort normalisation and make metrics unreliable.
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 扭曲归一化并使指标不可靠。
- en: '`np.clip()` neatly solves this problem by constraining all elements of an array
    within a specified minimum and maximum range. It’s kinda like setting boundaries
    in your dataset.'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: '`np.clip()` 通过将数组中的所有元素约束在指定的最小和最大范围内，巧妙地解决了这个问题。它有点像在你的数据集中设置边界。'
- en: 'Example:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：
- en: '**Problem: Ensure all readings stay within [28, 35] range.**'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: '**问题：确保所有读数保持在 [28, 35] 范围内。**'
- en: '[PRE4]'
  id: totrans-46
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: '**Output: array([30, 32, 29, 35, 35, 33, 31])**'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: '**输出：array([30, 32, 29, 35, 35, 33, 31])** '
- en: 'Here’s what it does:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是它的作用：
- en: Any value below 28 becomes 28.
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 任何低于 28 的值变为 28。
- en: Any value above 35 becomes 35.
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 任何高于 35 的值变为 35。
- en: Everything else stays the same.
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 其他所有值保持不变。
- en: Sure, this could also be done with `np.where()` like so
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，这也可以用 `np.where()` 来完成，如下所示
- en: '`temps = np.where(temps < 28, 28, np.where(temps > 35, 35, temps))`'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: '`temps = np.where(temps < 28, 28, np.where(temps > 35, 35, temps))`'
- en: But I’d rather go with np.clip() cos it’s much cleaner and faster.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 但我更愿意使用 np.clip()，因为它更干净、更快。
- en: 3\. np.ptp() — Find Your Data’s Range in One Line
  id: totrans-55
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3. np.ptp() — 一行找出你的数据范围
- en: '`np.ptp()` (peak-to-peak) basically shows you the difference between the maximum
    and minimum elements.'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: '`np.ptp()`（峰值到峰值）基本上显示了最大和最小元素之间的差异。'
- en: 'It’s basically:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 它基本上：
- en: '`np.ptp(a) == np.max(a) — np.min(a)`'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: '`np.ptp(a) == np.max(a) — np.min(a)`'
- en: But in one clean, expressive function.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 但在一个干净、表达清晰的功能中。
- en: Here’s how it works
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 这是它的工作原理
- en: '[PRE5]'
  id: totrans-61
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: So that’ll be our maximum value (8) — minimum value(1)
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，这将是我们最大值（8）减去最小值（1）。
- en: '**Output: Peak-to-peak range of the entire array: 7**'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: '**输出：整个数组的峰值到峰值范围：7**'
- en: So why is this useful? Similar to averages, understanding how much your data
    varies is often as important. In weather data, for instance, it shows you how
    stable or volatile the conditions were.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 那为什么这很有用呢？与平均值类似，了解你的数据变化程度通常同样重要。例如，在气象数据中，它显示了条件是稳定还是波动。
- en: Instead of separately calling max() and min(), or manually subtracting. `np.ptp()` makes
    it concise, readable, and vectorised, especially useful when you’re computing
    ranges across multiple rows or columns.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 与分别调用 max() 和 min() 或手动相减相比，`np.ptp()` 使其更加简洁、易读和向量化，尤其是在计算多行或多列的范围时特别有用。
- en: Now, let’s apply this to our dataset.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们将此应用于我们的数据集。
- en: '**Problem: How much did the temperature vary this week?**'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: '**问题：这周温度变化了多少？**'
- en: '[PRE6]'
  id: totrans-68
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: '**Output: np.int64(7)**'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: '**输出：np.int64(7)**'
- en: This tells us the temperature fluctuated by 7°C over the period, from 29°C to
    36°C.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 这告诉我们温度在 29°C 到 36°C 的期间波动了 7°C。
- en: 4\. np.diff() — Detect Daily Changes
  id: totrans-71
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4. np.diff() — 检测每日变化
- en: '`np.diff()` is the quickest way to measure momentum, growth, or decline across
    time. It basically calculates differences between elements in an array.'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: '`np.diff()` 是测量动量、增长或下降的最快方式。它基本上是计算数组中元素之间的差异。'
- en: To paint a picture for you, if your dataset were a journey, `np.ptp()` tells
    you how far you’ve travelled overall, while np.diff() tells you how far you moved
    between each stop.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 为了给你描绘一幅图，如果你的数据集是一次旅行，`np.ptp()` 会告诉你总共走了多远，而 `np.diff()` 会告诉你每次停留之间的移动距离。
- en: 'Essentially:'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 本质上：
- en: '**np.diff([a1, a2, a3, …]) = [a2 — a1, a3 — a2, …]**'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: '**np.diff([a1, a2, a3, …]) = [a2 — a1, a3 — a2, …]**'
- en: Let’s apply this to our dataset.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们将这个应用到我们的数据集上。
- en: '**Let’s look at our temperature data again:**'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: '**让我们再次看看我们的温度数据：**'
- en: '[PRE7]'
  id: totrans-78
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: '**Output: [ 2 -3 6 1 -3 -2]**'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: '**输出：[ 2 -3 6 1 -3 -2]**'
- en: '**In the real world, np.diff() is used for**'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: '**在现实世界中，np.diff() 用于**'
- en: Time series analysis — Track daily changes in temperature, sales, or stock prices.
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 时间序列分析——追踪温度、销售或股价的每日变化。
- en: Signal processing — Identify spikes or sudden drops in sensor data.
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 信号处理——识别传感器数据中的峰值或突然下降。
- en: Data validation — Detect jumps or inconsistencies between consecutive measurements.
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据验证——检测连续测量之间的跳跃或不一致性。
- en: 5\. np.gradient() — Capture Smooth Trends and Slopes
  id: totrans-84
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 5. np.gradient() — 捕获平滑趋势和斜率
- en: To be honest, when I first came across this, i found it hard to grasp. But essentially,
    `np.gradient()` computes the numerical gradient (a smooth estimate of change or
    slope) across your data. It’s similar to np.diff(), however, `np.gradient()` works
    even if your x-values are unevenly spaced (e.g., irregular timestamps). It provides
    a smoother signal, making trends easier to interpret visually.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 老实说，当我第一次遇到这个时，我觉得很难理解。但本质上，`np.gradient()` 计算数据点的数值梯度（变化的平滑估计），类似于 `np.diff()`，然而，`np.gradient()`
    即使x值不均匀分布（例如，不规则的时戳）也能工作。它提供了一个更平滑的信号，使得趋势更容易从视觉上进行解释。
- en: 'For instance:'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 例如：
- en: '[PRE8]'
  id: totrans-87
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: '**Output: array([2\. , 2\. , 1.5 , 0.43333333, 0.33333333])**'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: '**输出：array([2.0, 2.0, 1.5, 0.43333333, 0.33333333])**'
- en: Let’s break this down a bit.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们稍微分析一下。
- en: 'Normally, `np.gradient()` assumes the x-values (your index positions) are evenly
    spaced — like 0, 1, 2, 3, 4, etc. But in the example above, the time array isn’t
    evenly spaced: notice the jumps are 1, 1, 2, 3\. That means temperature readings
    weren’t taken every hour.'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，`np.gradient()` 假设x值（你的索引位置）是均匀分布的——比如0, 1, 2, 3, 4等。但在上面的例子中，时间数组并不是均匀分布的：注意跳跃是1,
    1, 2, 3。这意味着温度读数并不是每小时都进行。
- en: By passing time as the second argument, we’re essentially telling NumPy to use
    the actual time gaps when calculating how fast temperature changes.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将时间作为第二个参数传递，我们实际上是在告诉NumPy在计算温度变化速度时使用实际的时间间隔。
- en: To explain the output above. It’s saying between 0–2 hours, the temperature
    rose quickly (about 2°C per hour), and between 2–7 hours, the rise slowed down
    to around 0.3–1°C per hour.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 为了解释上面的输出。它表示在0-2小时内，温度迅速上升（每小时约上升2°C），而在2-7小时内，上升速度放缓至每小时约0.3-1°C。
- en: Let’s apply this to our dataset.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们将这个应用到我们的数据集上。
- en: '**Problem: Estimate the rate of temperature change (like slope).**'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: '**问题：估计温度变化率（如斜率）。**'
- en: '[PRE9]'
  id: totrans-95
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: '**Output: array([ 2\. , -0.5, 1.5, 3.5, -1\. , -2.5, -2\. ])**'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: '**输出：array([ 2.0, -0.5, 1.5, 3.5, -1.0, -2.5, -2.0 ])**'
- en: 'You can read it like:'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以这样读：
- en: +2 → temp rising fast (early warm-up)
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: +2 → 温度快速上升（早期预热）
- en: -0.5 → slight drop (minor cooling)
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: -0.5 → 稍微下降（轻微降温）
- en: +1.5, +3.5 → strong rise (big heat jump)
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: +1.5, +3.5 → 强烈上升（大的热量跳跃）
- en: -1, -2.5, -2 → steady cooling trend
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: -1, -2.5, -2 → 稳定的降温趋势
- en: So this tells a story of the week’s temperature. Let’s visualise this real quick
    with matplotlib.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 所以这讲述了本周的温度变化故事。让我们用matplotlib快速可视化一下。
- en: Notice how easy it is to interpret the visualisation. That’s what makes np.gradient() so
    useful.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 注意如何轻松地解释可视化。这就是为什么 `np.gradient()` 非常有用的原因。
- en: '![](../Images/26858457578f5e5b96ad9060540f0fd5.png)'
  id: totrans-104
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/26858457578f5e5b96ad9060540f0fd5.png)'
- en: 6. `np.percentile()` – Spot Outliers or Thresholds
  id: totrans-105
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 6. `np.percentile()` – 发现异常值或阈值
- en: This is one of my favourite functions. `np.percentile()` helps you retrieve
    chunks or slices of your data. Numpy defines it well.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我最喜欢的函数之一。`np.percentile()` 帮助你检索数据的一部分或切片。NumPy定义得很好。
- en: numpy.percentile **computes the q-th percentile of data along a specified axis**,
    where q is a percentage between 0 and 100.
  id: totrans-107
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: numpy.percentile **计算数据沿指定轴的第q百分位数**，其中q是介于0和100之间的百分比。
- en: In `np.percentile(),` usually there’s a threshold to meet (which is 100%). You
    can then walk backwards and check the percentage of records that fall below this
    threshold.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 在 `np.percentile()` 中，通常有一个阈值需要满足（即100%）。然后你可以回溯并检查低于此阈值的记录百分比。
- en: Let’s try this out with sales records
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们用销售记录试一试。
- en: Let’s say your monthly sales target is $60,000.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你的月销售目标是60,000美元。
- en: You can use np.percentile() to understand how often and how strongly you’re
    hitting or missing that target.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以使用 np.percentile() 来了解你达到或未达到目标的频率和强度。
- en: '[PRE10]'
  id: totrans-112
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: 'Output: **[51.0 61.0 67.5 73.0]**'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 输出：**[51.0 61.0 67.5 73.0]**
- en: '**To break this down:**'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: '**为了分解：**'
- en: 25th percentile = $51k → 25% of your months were below $51k (low performers)
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 25% 分位数 = $51k → 25% 的月份收入低于 $51k（表现不佳）
- en: 50th percentile = $61k → half of your months were below $61k (around your target)
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 50% 分位数 = $61k → 你的一半月份收入低于 $61k（大约是你的目标）
- en: 75th percentile = $67.5k → top-performing months are comfortably above target
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 75% 分位数 = $67.5k → 表现最好的月份轻松超过目标
- en: 90th percentile = $73k → your best months hit $73k or more
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 90% 分位数 = $73k → 你最好的几个月收入达到 $73k 或更多
- en: 'So now you can say:'
  id: totrans-119
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 所以现在你可以这样说：
- en: “We hit or exceeded our $60k target in roughly half of all months.”
  id: totrans-120
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “我们大约在所有月份的一半中达到了或超过了 $60k 的目标。”
- en: This can also be visualised using a KPI card. That’s pretty powerful.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 这也可以用 KPI 卡来可视化。这非常强大。
- en: That’s KPI storytelling with data.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是用数据讲故事的关键绩效指标。
- en: Let’s apply that to our temperature dataset.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们将其应用于我们的温度数据集。
- en: '[PRE11]'
  id: totrans-124
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: '**Output: [30.5 32\. 34.5]**'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: '**输出：[30.5 32\. 34.5]**'
- en: 'Here’s what it means:'
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着：
- en: 25% of the readings are below 30.5°C
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 25% 的读数低于 30.5°C
- en: 50% (the median) are below 32°C
  id: totrans-128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 50%（中位数）低于 32°C
- en: 75% are below 34.5°C
  id: totrans-129
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 75% 低于 34.5°C
- en: '`7\. np.unique()` — Quickly Find Unique Values and Their Counts'
  id: totrans-130
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '`7\. np.unique()` — 快速查找唯一值及其计数'
- en: This function is perfect for cleaning, summarising, or categorising data. `np.unique()` finds
    all the unique elements in your array. It can also check how often those elements
    appear in your array.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 这个函数非常适合清理、总结或分类数据。`np.unique()` 找出你数组中的所有唯一元素。它还可以检查这些元素在你的数组中出现的频率。
- en: 'For instance, let’s say you have a list of product categories from your store:'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，假设你有一个来自你商店的产品类别列表：
- en: '[PRE12]'
  id: totrans-133
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: '**Output: array([‘Bags’, ‘Belts’, ‘Hats’, ‘Shoes’], dtype=’<U5′)**'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: '**输出：array([‘Bags’, ‘Belts’, ‘Hats’, ‘Shoes’], dtype=’<U5′)**'
- en: 'You can take things further by counting the number of times they appear using
    the return_counts property:'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以通过使用 return_counts 属性来计算它们出现的次数：
- en: '[PRE13]'
  id: totrans-136
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: '**Output: (array([‘Bags’, ‘Belts’, ‘Hats’, ‘Shoes’], dtype=’<U5′), array([2,
    1, 2, 3])).**'
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: '**输出：(array([‘Bags’, ‘Belts’, ‘Hats’, ‘Shoes’], dtype=’<U5′), array([2, 1,
    2, 3])).**'
- en: Let’s apply that to my temperature dataset. Currently, there aren’t any duplicates,
    so we are just gonna get our same input back.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们将其应用于我的温度数据集。目前，没有重复项，所以我们只会得到相同的输入。
- en: '[PRE14]'
  id: totrans-139
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: '**Output: array([29, 30, 31, 32, 33, 35, 36])**'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: '**输出：array([29, 30, 31, 32, 33, 35, 36])**'
- en: Notice how the figures are organised accordingly, too — in ascending order.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 注意数字是如何相应地组织的，也是按升序排列的。
- en: 'You can also ask NumPy to count how many times each value appears:'
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 你也可以要求 NumPy 计算每个值出现的次数：
- en: '[PRE15]'
  id: totrans-143
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: '**Output: (array([29, 30, 31, 32, 33, 35, 36]), array([1, 1, 1, 1, 1, 1, 1]))**'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: '**输出：(array([29, 30, 31, 32, 33, 35, 36]), array([1, 1, 1, 1, 1, 1, 1]))**'
- en: Wrapping up
  id: totrans-145
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 总结
- en: So far, these are the functions I stumbled upon. And I find them to be pretty
    helpful in data analysis. The beauty of NumPy is that the more you play with it,
    the more you uncover these tiny one-liners that replace pages of code. So next
    time you’re wrangling data or debugging a messy dataset, stay away from Pandas
    for a bit, and try dropping in one of these functions. Thanks for reading!
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，这些都是我偶然发现的函数。我发现它们在数据分析中非常有帮助。NumPy 的美妙之处在于，你越玩它，就越能发现这些简短的一行代码，它们可以替代成页的代码。所以下次你在处理数据或调试一个混乱的数据集时，暂时远离
    Pandas，尝试使用这些函数之一。感谢阅读！
