- en: Meet GPT, The Decoder-Only Transformer
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/meet-gpt-the-decoder-only-transformer-12f4a7918b36/](https://towardsdatascience.com/meet-gpt-the-decoder-only-transformer-12f4a7918b36/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![Photo by Emiliano Vittoriosi on Unsplash](../Images/60394d79467104a406bb237bb9650a27.png)'
  prefs: []
  type: TYPE_IMG
- en: Photo by [Emiliano Vittoriosi](https://unsplash.com/@emilianovittoriosi?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  prefs: []
  type: TYPE_NORMAL
- en: Introduction
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Large Language Models (LLMs), such as ChatGPT, Gemini, Claude, etc., have been
    around for a while now, and I believe all of us already used at least one of them.
    As this article is written, ChatGPT already implements the fourth generation of
    the GPT-based model, named GPT-4\. But do you know what GPT actually is, and what
    the underlying neural network architecture looks like? In this article we are
    going to talk about GPT models, especially GPT-1, GPT-2 and GPT-3\. I will also
    demonstrate how to code them from scratch with PyTorch so that you can get better
    understanding about the structure of these models.
  prefs: []
  type: TYPE_NORMAL
- en: A Brief History of GPT
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Before we get into GPT, we need to understand the original Transformer architecture
    in advance. Generally speaking, a Transformer consists of two main components:
    the *Encoder* and the *Decoder*. The former is responsible for understanding input
    sequence, whereas the latter is used for generating another sequence based on
    the input. For example, in a question answering task, the decoder will produce
    an answer to the input sequence, while in a machine translation task it is used
    for generating the translation of the input.'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 1\. The Transformer model. The block on the left is the Encoder and
    the one on the right is the Decoder [1].](../Images/4eca89483cba810090b788ea911bb2e3.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1\. The Transformer model. The block on the left is the Encoder and the
    one on the right is the Decoder [1].
  prefs: []
  type: TYPE_NORMAL
- en: The [t](https://medium.com/towards-data-science/paper-walkthrough-attention-is-all-you-need-80399cdc59e1)wo
    main components of the Transformer mentioned above also consist of several sub-components,
    such as *attention block*, l*ook-ahead mask*, and *layer normalization*. Here
    I assume that you already have basic knowledge about them. If you haven’t, I highly
    recommend you read my previous post regarding the topic which you can access through
    the link I provided at the end of this article [2].
  prefs: []
  type: TYPE_NORMAL
- en: It was proven that Transformer has an impressive performance in language modeling.
    Interestingly, future researchers found that its encoder and decoder part can
    work individually to do so. This was actually the moment when BERT (*Bidirectional
    Encoder Representation of Transformers*) and GPT (*Generative Pretrained Transformers*)
    were invented, where BERT is basically just a stack of encoders, while GPT is
    a stack of decoders.
  prefs: []
  type: TYPE_NORMAL
- en: Talking more specifically about GPT, its first version (GPT-1) was released
    by OpenAI back in 2018\. This was then followed by GPT-2 and GPT-3 in 2019 and
    2020, respectively. However, there were not so many people knew about GPT at the
    moment since it was only usable via an API. It wasn’t until 2022 when OpenAI released
    ChatGPT with the GPT-3.5 backend which allows public to interact with this LLM
    easily. Below is a figure showing the evolution of GPT models.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 2\. The evolution of GPT models over time [3].](../Images/2aa937d52bdf5c87114826bca84867bd.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2\. The evolution of GPT models over time [3].
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: GPT-1
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The first GPT version was published in a research paper titled "*Improving Language
    Understanding by Generative Pre-Training*" by Radford et al. [4] back in 2018\.
    Previously I’ve mentioned that GPT is basically just a stack of decoders, and
    in the case of GPT-1 the decoder block is repeated 12 times. It is important to
    keep in mind that the decoder architecture implemented in GPT-1 is not completely
    identical with the one in the original Transformer. In in the following figure,
    the model on the left is the decoder proposed in the GPT-1 paper, whereas the
    one on the right is the decoder part of the original Transformer. Here we can
    see that the part highlighted in red in the original decoder does not exist in
    GPT-1\. This is essentially because this component is employed to combine the
    information coming from the encoder and from the decoder input itself. In the
    case of GPT-1, since we don’t have the encoder part, hence we can just omit it.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 3\. The GPT-1 architecture (left) [4] and the Decoder part of the
    original Transformer architecture [5].](../Images/be95068022c2ec5e6e30101b175864de.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3\. The GPT-1 architecture (left) [4] and the Decoder part of the original
    Transformer architecture [5].
  prefs: []
  type: TYPE_NORMAL
- en: GPT-1 Pretraining
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The training process of the GPT-1 model is divided into two steps: *pretraining*
    and *fine-tuning*. The goal of pretraining is to teach the model to predict the
    next token in a sequence based on the preceding tokens – a process commonly known
    as *language modeling*. This pretraining step uses a self-supervised mechanism,
    i.e., a training process where the label comes from the dataset itself. With this
    method, we don’t need to perform manual labeling. Instead, we can just chunk 513
    tokens at random positions from a long text, setting the first 512 as the features
    and the last one as the label. This number of tokens is chosen based on the *context
    window* parameter of GPT-1, which by default is set to 512\. In addition to the
    tokenization mechanism, GPT-1 uses BPE (*Byte Pair Encoding*). This essentially
    means that every single token does not necessarily correspond to a single word.
    Rather, it can also be a sub-word or even an individual letter.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The GPT-2 pretraining is done using the objective function shown in Figure
    4 below, where *uᵢ* is the token being predicted, *uᵢ₋ₖ, …, uᵢ₋₁*, are the *k*
    previous tokens (*context window*), and *Θ* is the model parameters. What’s essentially
    done by this equation is that it computes the likelihood of a token occurring
    given the previous tokens in the sequence. The token with the highest probability
    will be returned as the predicted output. By doing this process iteratively, the
    model will continue the text provided in the prompt. If we go back to Figure 3,
    we will see that the GPT-1 model has two heads: *text prediction* and *task classifier*.
    Later on, this text generation process is going to be done using the *text prediction*
    head.'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 4\. The objective function for pretraining [4].](../Images/fd0d465c3ade8257893fafdc8d22204a.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4\. The objective function for pretraining [4].
  prefs: []
  type: TYPE_NORMAL
- en: GPT-1 Fine-Tuning
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Even though by default GPT is a *generative model*, but during the fine-tuning
    phase we treat it as a *discriminative model*. This is essentially because in
    this phase the goal is just to perform a typical classification task. In the following
    objective function, *y* represents the class to be predicted, while *x¹, …, xᵐ*
    denote *m* input tokens in sequence *x*. We can simply think of this equation
    like we want to categorize a text into a specific class. Such a classification
    mechanism will later be used to perform varying *downstream tasks*, which I will
    explain very soon.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 5\. The objective function for the downstream classification task
    [4].](../Images/03529a65cff048c71b5e649d0943a6f1.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5\. The objective function for the downstream classification task [4].
  prefs: []
  type: TYPE_NORMAL
- en: 'There are four different downstream tasks experimented in the paper: *classification*,
    *natural language inference (entailment)*, *sentence similarity*, and *multiple-choice
    question answering*. The figure below illustrates the workflow of these tasks.'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 6\. The downstream task workflows of the GPT-1 model [4].](../Images/0c0551b2345bc700e46c5b6c29cc3c62.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6\. The downstream task workflows of the GPT-1 model [4].
  prefs: []
  type: TYPE_NORMAL
- en: The Transformer blocks colored in green are GPT-1 models, each having the exact
    same architecture. In order to allow the model to perform different tasks, we
    need to arrange the input texts accordingly. For a standard **text classification
    task**, e.g., sentiment analysis or document classification, we can simply put
    the token sequence between the *start* and *extract* token to mark the beginning
    and the end of a text before feeding it into the GPT-1 model. The resulting tensor
    will then be forwarded to a linear layer, which each neuron in the layer corresponds
    to a single class.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 7\. Examples of input texts and the corresponding labels for sentiment
    analysis (classification) task [3].](../Images/3eecd53dff750dcd88bc62b5e8de9358.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7\. Examples of input texts and the corresponding labels for sentiment
    analysis (classification) task [3].
  prefs: []
  type: TYPE_NORMAL
- en: For **textual entailment**, the model accepts *premise* and *hypothesis* as
    a single sequence, separated by a *delimiter* token. In this case, the *Task Classifier*
    head is responsible for classifying whether the *hypothesis* entails the *premise*.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8\. Examples of input texts and the corresponding labels for textual
    entailment task [3].](../Images/2aca08fed31515123029efd1cb7e8924.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8\. Examples of input texts and the corresponding labels for textual
    entailment task [3].
  prefs: []
  type: TYPE_NORMAL
- en: 'In the case of **text similarity task**, the model works by accepting two texts
    to be compared in two different orders: *text 1* followed by *text 2*, and *text
    2* followed by *text 1*. These two sequences are fed into the GPT model in parallel,
    which the resulting outputs are then summed before eventually predicted whether
    they are similar. Or, we can also configure the output layer to perform a regression
    task, returning a continuous similarity score.'
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 9\. Example of a dataset for text similarity measurement [3].](../Images/42ba605a0d2b59664c9d8d5d617d1372.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9\. Example of a dataset for text similarity measurement [3].
  prefs: []
  type: TYPE_NORMAL
- en: Lastly, for **multiple-choice question answering** we wrap both the text containing
    facts and the corresponding question inside the *context* block. Next, we place
    a *delimiter* token before appending one of the answers to it. We do the same
    thing for all possible answers for every question. With this dataset structure,
    we perform inference by passing them into the model, letting it calculate the
    similarity score between each question-answer pair. This score indicates how well
    each answer addresses the question based on the given facts. We can basically
    think of this like a standard classification task, where the selected answer is
    the one having the highest similarity score.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 10\. An example of a dataset for multiple-choice question answering
    task [3].](../Images/df87cd9091d9c82087d50fdba76a0948.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10\. An example of a dataset for multiple-choice question answering task
    [3].
  prefs: []
  type: TYPE_NORMAL
- en: During the fine-tuning phase, we don’t completely ignore the language modeling
    process as it still gives some ideas regarding what token should come next. In
    other words, we can perceive it as an *auxiliary objective*, which is useful for
    accelerating convergence while at the same time improving the generalization of
    the classifier model. Therefore, the downstream task objective function (L2) needs
    to be combined with the language modeling objective function (L1). The Figure
    11 below shows how it is expressed in a formal mathematical definition, where
    the weight *λ* is typically set to be less than 1, allowing the model to pay more
    attention to the downstream task.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 11\. The objective function used for fine-tuning [4].](../Images/9a1b2bd32068ed8e663fd01308771e76.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 11\. The objective function used for fine-tuning [4].
  prefs: []
  type: TYPE_NORMAL
- en: So, to sum up, the point of GPT-1 is that it basically works by continuing the
    preceding sequence. If we don’t further fine-tune the model, it will continue
    the sequence based on its understanding of the data provided in the self-supervised
    training phase. Meanwhile, if we perform fine-tuning, the model will also continue
    the sequence but only using the specific ground truths provided in the supervised
    learning phase.
  prefs: []
  type: TYPE_NORMAL
- en: 'GPT-1 Implementation: Look-Ahead Mask & Positional Encoding'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As we already know the theory behind GPT-1, let’s now implement the architectural
    design from scratch! We are going to start by importing the required modules.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Afterwards, we will continue with the parameter configuration, which you can
    see in Codeblock 2 below. All variables we set here are exactly the same as the
    ones specified in the GPT-1 paper, except for the `BATCH_SIZE` and `N_CLASS` (written
    at line marked with `#(1)` and `#(2)`). The `BATCH_SIZE` variable is necessary
    because PyTorch by default processes tensors in a batch regardless of the number
    of samples contained inside. In this case, I assume that there is only a single
    sample in each batch. Meanwhile, `N_CLASS` will be used for the *task classifier*
    head which will run when the downstream task is performed. As an example, here
    I set the parameter to 3\. With this configuration, we can use the head for 3-class
    classification task like the sentiment analysis or the textual entailment cases
    I showed you earlier in Figure 7 and 8.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: The `SEQ_LENGTH` parameter (`#(3)`), which is another term to denote *context
    window*, is set to 512\. The BPE tokenization mechanism performed on the training
    dataset produces 40,000 unique tokens, hence we need to use this number for `VOCAB_SIZE`
    (`#(4)`). Next, the `D_MODEL` parameter denotes the feature vector length used
    to represent a token, which in the case of GPT-1, this is set to 768 (`#(5)`).
    Previously I mentioned that the decoder layer is repeated 12 times. In the above
    code, this number is assigned to the `N_LAYERS` variable (`#(6)`). Each of the
    decoder layers themselves comprises some other components which the parameters
    need to be manually configured as well. Those parameters are the number of *attention
    heads* (`#(7)`), the number of hidden neurons in the *feed forward* block (`#(8)`),
    and the rate for the *dropout* layers (`#(9)`).
  prefs: []
  type: TYPE_NORMAL
- en: As the required parameters have been configured, the next thing to be done is
    initializing a function for creating the so-called *look-ahead* mask and a class
    for creating *positional embedding*. The *look-ahead* mask can be thought of as
    a tool that prevents the model from looking at the subsequent tokens during the
    training phase, considering that later in the inference phase, subsequent tokens
    are unavailable. Meanwhile, the *positional embedding* is used to label each token
    with specific numbers, which is useful to preserve information regarding the token
    orders. In fact, even though the *look-ahead* mask already contains this information,
    but the *positional embedding* emphasizes it even further.
  prefs: []
  type: TYPE_NORMAL
- en: Look at the Codeblock 3 and 4 below to see how I implement the two concepts
    I just explained. I am not going to get any deeper into them as I’ve provided
    the complete explanation in my article about Transformer, which the link is provided
    in the references list [2] – you can just click it and scroll all the way down
    to the *Positional Encoding* and the *Look-Ahead Mask* sections. Even the following
    codes are exactly the same as what I wrote there!
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: 'GPT-1 Implementation: Decoder'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now let’s talk about the decoder part which I implement inside the `DecoderGPT1()`
    class. The reason that I name it this way is because we are going to use it exclusively
    for GPT-1\. See the detailed implementation in Codeblock 5a and 5b.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: There are several neural network layers I initialize in the `__init__()` method
    above, in which every single of those corresponds to each sub-component inside
    the decoder shown back in Figure 3\. The first one is the *multihead attention*
    layer (`#(1)`), where the values used for `embed_dim` and `num_heads` are taken
    from the variables we initialized earlier. Additionally, here I set the `batch_first`
    parameter to `True` (`#(2)`) since our batch dimension is on the 0th axis, which
    is a common practice when it comes to working with PyTorch tensors. Next, we initialize
    two *layer normalization* layers with `D_MODEL` as the input argument for each
    (at line `#(3)` and `#(5)`). This essentially means that these two layers will
    perform normalization across the 768 values for each token.
  prefs: []
  type: TYPE_NORMAL
- en: To the *feed forward* block, I create it using `nn.Sequential()` (`#(4)`), where
    I initialize two linear layers and a GELU activation function in between. The
    first linear layer is responsible to expand the 768 (`D_MODEL`)-dimensional token
    representation into 3072 (`HIDDEN_DIM`) dimensions. Afterwards, we pass it through
    GELU before shrinking it back to 768 dimensions. The authors of this paper mentioned
    that the weight initialization for these layers follows a normal distribution
    with the mean and standard deviation of 0 and 0.02, respectively. We can manually
    configure them using the code at line `#(6)` and `#(7)`.
  prefs: []
  type: TYPE_NORMAL
- en: 'Now let’s move on to Codeblock 5b where I define the `forward()` method of
    the `DecoderGPT1()` class. You can see below that it works by accepting two inputs:
    `x` and `attn_mask` (`#(1)`). The first input is the embedded token sequence,
    while the second one is the *look-ahead* mask generated by the `create_mask()`
    function we defined earlier.'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: Before doing anything, the first thing we do inside the `forward()` method above
    is to store the original input tensor `x` to the `residual` variable (`#(2)`).
    The `x` tensor itself is then processed with the *multihead attention* layer (`#(3)`).
    Since we are about to perform *self* *attention* (not a *cross* *attention*),
    hence the *query*, *key* and *value* inputs for the layer are all derived from
    `x`. Not only that, here we also need to pass the *look-ahead* mask as the argument
    for the `attn_mask` parameter. After processing with the *attention* layer is
    complete, we will then pass the `x` tensor through a *dropout* layer (`#(4)`)
    before it is eventually combined again with `residual` (`#(5)`) and normalized
    by *layer norm* (`#(6)`). The remaining processes are nearly the same, except
    that we replace the `self.multihead_attention` layer with the `self.feed_forward`
    layer (`#(7)`).
  prefs: []
  type: TYPE_NORMAL
- en: To check if our decoder works properly, we can pass a tensor with the size of
    1×512×768 as shown in Codeblock 6 below. This simulates a sequence of 512 tokens,
    each represented as a 768-dimensional vector.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: We can see in the resulting output that this tensor successfully passed through
    all components in the decoder. It is worth noting that the tensor dimensions remain
    the same at each process, including the final output. This property allows us
    to stack multiple decoders without worrying that the tensor dimensions will break.
    – Well, in fact, there are actually some dimensionality changes inside the *attention*
    and the *feed forward* layer, but it immediately returns back to its original
    dimension before being fed into the subsequent layers.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: 'GPT-1 Implementation: Decoder with Input & Text Prediction'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As we have completed the decoder block, we will now connect the input layer
    before it and attach the *text prediction* head to the output. You can see how
    I implement them in the `GPT1()` class below.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: Inside the `__init__()` method, we first initialize an `nn.Embedding()` layer.
    This layer is used to map each token into 768 (`D_MODEL`)-dimensional vector (`#(1)`).
    Secondly, we initialize a *positional encoding* tensor using the `PositionalEncoding()`
    class we created earlier (`#(2)`). The 12 decoder layers need to be initialized
    one by one, and in this case I do it using a simple `for` loop. All these decoders
    are then stored in `self.decoders` (`#(3)`). Next, we initialize a linear layer,
    which basically corresponds to the *text prediction* head (`#(4)`). This layer
    is responsible to map each vector into `VOCAB_SIZE` (40,000) number of neurons,
    where every single of those indicates the probability of a specific token being
    selected. Again, here I also manually configure the weight initialization distribution
    using the code at line `#(5)` and `#(6)`.
  prefs: []
  type: TYPE_NORMAL
- en: Moving on to the `forward()` method in Codeblock 7b, the first thing we do is
    processing the input tensor with the `self.token_embedding` layer (`#(1)`). Next,
    we inject the *positional encoding* tensor into `x` by element-wise addition (`#(2)`).
    The resulting tensor is then forwarded to the stack of 12 decoders, which we can
    do with another loop as shown at line `#(3)`. Remember that the GPT-1 model has
    two heads. In this case, the *text prediction* head will be included inside the
    `forward()` method, whereas the *task classifier* head will later be implemented
    in separate class. To accomplish this, I will return both the raw decoder output
    (`decoder_output`) as well as the next-word prediction output (`text_output`)
    as shown at line `#(5)`. Later on, I will use `decoder_output` as the input for
    the *task classifier* head.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: We can check if our `GPT1()` class works properly with the Codeblock 8 below.
    The `x` tensor here is assumed as a sequence of tokens with the length of `SEQ_LENGTH`
    (512), in which every single of the element is a random integer within the range
    of 0 to `VOCAB_SIZE` (40,000), representing the encoded tokens.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: Based on the above output, we can see that our `self.token_embedding` layer
    successfully converted the sequence of 512 tokens (`#(1)`) into a sequence of
    768-dimensional token vectors (`#(2)`). This tensor dimension remained the same
    all the way to the last decoder layer, which the output was then stored in the
    `decoder_output` variable (`#(3)`). Finally, after being processed with the *task
    classifier* head, the tensor dimension changed to 1×512×40000 (`#(4)`), containing
    the information regarding the next-token prediction. – In the original Transformer,
    this is often called *shifted-right* output. It basically means that the information
    stored in the 0th row is the prediction for the 1st token, the 1st row contains
    the prediction for 2nd token, and so on. Hence, since we want to predict the 513th
    token, we can simply take the last (512th) row and select the element corresponding
    to the token with the highest probability.
  prefs: []
  type: TYPE_NORMAL
- en: To calculate the number of model parameters, we can use the `count_parameters()`
    function below.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: We can see here that our GPT-1 implementation has approximately 146 million
    number of params. – I do need to acknowledge that this number is different to
    the one disclosed in the original paper, i.e., 117 million. Such a difference
    might probably be because I missed some intricate details. Feel free to comment
    if you know which part of the code I should change to achieve this number!
  prefs: []
  type: TYPE_NORMAL
- en: 'GPT-1 Implementation: Task Classifier Head'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Remember that our `GPT1()` class only includes the *text prediction* head. For
    language modeling alone, this is already sufficient, yet for fine-tuning, we need
    to manually create the *task classifier* head. Look at the Codeblock 10 below
    to see how I implement it.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: Similar to *text prediction*, the *task classifier* head is basically just a
    linear layer as well. However, in this case, it maps every 768-dimensional token
    embedding into 3 (`N_CLASS`) output values corresponding to the number of classes
    for the classification task we want to train it on (`#(1)`). Later on, the output
    from the decoder will be used as the input for the `forward()` method (`#(2)`).
    Thus, to test this `TaskClassifier()` class, I will pass through a dummy tensor
    which the dimension exactly matches with the decoder output, i.e., 1×512×768\.
    We can see in the Codeblock 11 below that this tensor successfully passes through
    the *task classifier* head.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: 'If we take a closer look at the above output, we can see that the resulting
    tensor is now having the shape of 1×512×3 (`#(1)`). This essentially means that
    every single token is now represented as 3 numbers. As mentioned earlier, in this
    example we are about to simulate a sentiment analysis task with 3 classes: *positive*,
    *negative* and *neutral*. To determine the sentiment of the entire sequence, we
    can either aggregate the logits across all tokens or use only the logits from
    the last token (considering that it already contains information from the entire
    sequence). Additionally, with the same output tensor shape, we can use the similar
    idea to perform token-level classification task, such as *NER (Named Entity Recognition)*
    or *POS (Part-of-Speech) tagging*.'
  prefs: []
  type: TYPE_NORMAL
- en: Later in the inference phase, we will use the `TaskClassifier()` head every
    time we want to perform a specific downstream task. The Codeblock 12 below is
    a sample code to perform the forward pass. What it essentially does is that we
    pass the tokenized sentence into the `gpt1` model, which returns the raw decoder
    output and the next-word prediction (`#(1)`). Then, we use the output from the
    decoder as the input for the *task classifier* head, which will return the logits
    of the available classes (`#(2)`).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: Based on the output produced by the following codeblock, we can see that our
    `gpt1_fine_tune()` function above works properly.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE19]'
  prefs: []
  type: TYPE_PRE
- en: GPT-1 Limitations
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Despite obtaining remarkable results in handling the four downstream tasks I
    showed in Figure 6, it is important to know that this approach has some drawbacks.
    First, the training procedure is complex since we need to perform *pretraining*
    and *fine-tuning* in separate processes. Second, since fine-tuning is a discriminative
    process, we still need to perform manual labeling (unlike the generative process
    for pretraining that uses self-supervised labeling method). Third, the model is
    not flexible, as it can only work on the task it is fine-tuned on. For instance,
    a model specialized for sentiment analysis cannot be used for question answering
    task. – Fortunately, GPT-2 was then introduced soon after to handle these issues.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: GPT-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: GPT-2 was introduced in the paper titled "*Language Models are Unsupervised
    Multitask Learners*" published several months after GPT-1 [6]. The authors of
    this paper found that the plain GPT language model could actually perform various
    downstream tasks without fine-tuning. It is possible to achieve this by modifying
    the objective function. If GPT-1 makes predictions based solely on the previous
    token sequence, i.e., *P(output | input)*, GPT-2 does so not only based on the
    sequence, but also based on the given task, i.e., *P(output | input, task)*. With
    this property, the same prompt will cause the model to produce different output
    whenever the given task is different. And interestingly, we can simply include
    the task in the prompt as a natural language.
  prefs: []
  type: TYPE_NORMAL
- en: As an example, if you prompt a model with "*lorem ipsum dolor sit amet*", it
    will likely continue with "*consectetur adipiscing elit.*" But if you include
    a task like "what does it mean?" in the prompt, the model will give an explanation
    regarding what it actually is. I tried this in ChatGPT, and the answer was exactly
    what I expected.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 12\. ChatGPT only continues the input sentence if the task is not
    specified [3].](../Images/077b01df98b1defbc6d4a9d76de48a1b.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 12\. ChatGPT only continues the input sentence if the task is not specified
    [3].
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 13\. An example of how assigning a specific task causes the model
    to respond differently [3].](../Images/61bbd50cadbc5094f390a3c89f5c6631.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 13\. An example of how assigning a specific task causes the model to
    respond differently [3].
  prefs: []
  type: TYPE_NORMAL
- en: The idea of providing the task in form of natural language can be achieved by
    training the model with an enormous amount of text in self-supervised manner.
    For the sake of comparison, the dataset used for GPT-1 to perform language modeling
    is the BooksCorpus dataset, in which it contains more than 7000 unpublished books
    and is equivalent to approximately 5 GB of text. Meanwhile, the dataset used for
    GPT-2 is WebText which has the size of approximately 40 GB. Not only the dataset,
    but the model itself is also larger. The author of the GPT-2 paper created four
    model variations, each having different configurations as summarized in Figure
    14 below. The one in the first row is equivalent with the GPT-1 paper we just
    implemented, whereas the model recognized as GPT-2 is the one in the last row.
    Here we can see that GPT-2 is roughly 13 times larger than GPT-1 in terms of the
    number of parameters. Based on this information regarding the dataset and model
    size, we can definitely expect GPT-2 to perform much better than its predecessor.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 14\. The four model variations proposed in the GPT-2 paper [6].](../Images/88de20c407bef7368cf9124bb5ccbf5f.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 14\. The four model variations proposed in the GPT-2 paper [6].
  prefs: []
  type: TYPE_NORMAL
- en: It is important to know that `N_LAYERS` and `D_MODEL` are not the only parameters
    we need to change if we were to actually create the model. The codeblock below
    shows the complete parameter configuration for GPT-2.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE20]'
  prefs: []
  type: TYPE_PRE
- en: In this GPT version, instead of only taking into account 512 tokens for predicting
    next token, authors extend it further to 1024 (`#(1)`) so that it can now attend
    and process longer token sequence, allowing the model to accept longer prompts.
    The vocabulary size also gets larger. Previously in GPT-1, the number of unique
    tokens was only 40,000, but in GPT-2 this number increased to 50,257 (`#(2)`).
    The last thing we need to change is the number of attention heads, which is now
    set to 25 as shown at line `#(3)`. The `HIDDEN_DIM` parameter actually also changes,
    but we don’t need to manually specify the value for this as it remains configured
    to be 4 times larger than the embedding dimension (`#(4)`).
  prefs: []
  type: TYPE_NORMAL
- en: 'GPT-2 Implementation: Decoder'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Talking about the architecture implementation, it is important to know that
    the decoder used in GPT-2 is somewhat different from the one used in GPT-1\. In
    the case of GPT-2, we use the so-called *pre-normalization*, as opposed to GPT-1
    that uses *post-normalization*. The idea of *pre-normalization* is that we place
    *layer norm* before the main operation is performed, i.e., the *multihead attention*
    and the *feed forward* blocks. You can see the illustration in the following figure.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 15\. The GPT-1 architecture without Task Classifier head (left) and
    the GPT-2 architecture (right) [3].](../Images/f77fea48d22c1492219a5bd307aa3b61.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 15\. The GPT-1 architecture without Task Classifier head (left) and the
    GPT-2 architecture (right) [3].
  prefs: []
  type: TYPE_NORMAL
- en: 'I implement the decoder for GPT-2 in the `DecoderGPT23()` class below. Spoiler
    alert: I named it this way because the structure of the GPT-2 and GPT-3 architectures
    is exactly the same.'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE21]'
  prefs: []
  type: TYPE_PRE
- en: Well, I don’t think I need to explain the above code any further since it is
    mostly the same as the decoder for GPT-1, except that here we place the *layer
    normalization* blocks at different positions. So, now we will jump directly into
    the testing code. See the Codeblock 16 below.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE22]'
  prefs: []
  type: TYPE_PRE
- en: We can see in the resulting output that our `x` tensor successfully passed through
    all sub-components inside the decoder layer.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE23]'
  prefs: []
  type: TYPE_PRE
- en: 'GPT-2 Implementation: Decoder with Input & Text Prediction'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Although the decoder used in GPT-2 is different from the one used in GPT-1,
    yet the other components, namely *positional encoding* and the *look-ahead* mask,
    remain the same. Hence, we can just reuse them. The code used to attach these
    two components is mostly the same, but there are still some intricate details
    to pay attention to in Codeblock 17 below. First, here we initialize another *layer
    normalization* layer at line `#(1)` before placing it in the flow at line `#(2)`.
    This is essentially done because in GPT-2 we have another *layer norm* block placed
    outside the decoder, which previously does not exist in GPT-1 (see Figure 15).
    Secondly, it is not necessary to store the raw decoder output like what we did
    in the `GPT1()` class (at line `#(4)` Codeblock 7b). This is basically because
    GPT-2 does not require fine-tuning to perform any kind of downstream tasks. Rather,
    it will rely solely on the *task prediction* head to do so.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE24]'
  prefs: []
  type: TYPE_PRE
- en: Now that we can test the `GPT23()` class above with the following codeblock.
    Here I test it with a sequence of tokens of length 1024\. The resulting output
    is very long since we have the decoder layer repeated 48 times.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE25]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE26]'
  prefs: []
  type: TYPE_PRE
- en: If we try to print out the number of parameters, we can see that GPT-2 has around
    1.6 billion. Just like the GPT-1 implementation we did earlier, this number of
    parameters is also slightly different to the one disclosed in the paper, which
    is around 1.5 billion as shown in Figure 14.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE27]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE28]'
  prefs: []
  type: TYPE_PRE
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: GPT-3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: GPT-3 was proposed in the paper titled "*Language Models are Few-Shot Learners*"
    which was published back in 2020 [7]. This title signifies that the proposed model
    is able to perform a wide range of tasks given only several examples, a.k.a. "*shots.*"
    Despite this emphasis on *few-shot* learning, in practice this model is also able
    to perform *one-shot* or even *zero-shot* learning. In case you’re not yet familiar
    with *few-shot* learning, it is basically a method to adapt the model to a specific
    task using only a small number of examples. Even though the objective is similar
    to *fine-tuning*, but *few-shot* learning allows it to do so without updating
    model weights. In the case of GPT models, this can be achieved thanks to the presence
    of the *attention* mechanism, which allows the model to dynamically focus on the
    most relevant parts of the instruction and examples provided in the prompt. Similar
    to the improvements made from GPT-1 to GPT-2, the ability of GPT-3 to perform
    much better in *few-shot* learning than its predecessors are also due to the increased
    amount of training data used and the larger model size.
  prefs: []
  type: TYPE_NORMAL
- en: '**GPT-3 Implementation: Model Configuration & Architectural Design**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: You already read the spoiler, right? The architectural design of GPT-3 is exactly
    the same as GPT-2\. What makes them different is only the model size, which we
    can adjust by using larger values for the parameters. The Codeblock 20 below shows
    the parameter configuration for GPT-3.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE29]'
  prefs: []
  type: TYPE_PRE
- en: As the above variables have been updated, we can simply run the following codeblock
    to initialize the GPT-3 model (`#(1)`) and pass a tensor representing a sequence
    of tokens through it (`#(2)`).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE30]'
  prefs: []
  type: TYPE_PRE
- en: Unfortunately, I cannot run the above code due to the limited memory I have.
    I even tried to run it on Kaggle Notebook with 30 GB of memory, but the out-of-memory
    error persists. So, for this one, I cannot show you the number of parameters the
    model creates when it is initialized. However, it is mentioned in the paper that
    GPT-3 consists of around 175 billion parameters, which basically means that it’s
    more than 100 times larger than GPT-2, – so it makes sense now why it can only
    be run on an extremely large and powerful machine. Look at the figure below to
    see how GPT versions differ from each other.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 16\. Comparison of different GPT versions [3].](../Images/cc9ae545b306f93ce89baa4a71c5626e.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 16\. Comparison of different GPT versions [3].
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Ending
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: That’s pretty much everything about the theory and the implementation of different
    GPT versions, especially GPT-1, GPT-2 and GPT-3\. As this article is written,
    OpenAI hasn’t officially disclosed the architectural details for GPT-4, so we
    can’t reproduce it just yet. I hope OpenAI will publish the paper very soon!
  prefs: []
  type: TYPE_NORMAL
- en: Thank you for reading my article up to this point. I do appreciate your time,
    and I hope you learn something new here. Have a nice day!
  prefs: []
  type: TYPE_NORMAL
