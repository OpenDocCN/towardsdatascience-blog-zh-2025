- en: 'When Physics Meets Finance: Using AI to Solve Black-Scholes'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/when-physics-meets-finance-using-ai-to-solve-black-scholes/](https://towardsdatascience.com/when-physics-meets-finance-using-ai-to-solve-black-scholes/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '***DISCLAIMER***: This is not financial advice. I’m a PhD in Aerospace Engineering
    with a strong focus on Machine Learning: I’m **not** a financial advisor. This
    article is intended solely to demonstrate the power of Physics-Informed Neural
    Networks (PINNs) in a financial context.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '<mdspan datatext="el1744948982397" class="mdspan-comment">When I was 16</mdspan>,
    I fell in love with Physics. The reason was simple yet powerful: I thought Physics
    was ***fair***.'
  prefs: []
  type: TYPE_NORMAL
- en: It never happened that I got an exercise wrong because the speed of light changed
    overnight, or because suddenly e^x could be negative. Every time I read a physics
    paper and thought, *“This doesn’t make sense,*” it turned out ***I was the one
    not making sense.***
  prefs: []
  type: TYPE_NORMAL
- en: So, Physics is always fair, and because of that, it’s always ***perfect***.
    And Physics displays this perfection and fairness through its set of rules, which
    are known as **differential equations**.
  prefs: []
  type: TYPE_NORMAL
- en: 'The simplest differential equation I know is this one:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/0d3635ef9998977128551568451c1d05.png)'
  prefs: []
  type: TYPE_IMG
- en: Image made by author
  prefs: []
  type: TYPE_NORMAL
- en: 'Very simple: we start here, x[0]=0, at time t=0, then we move with a constant
    speed of 5 m/s. This means that after 1 second, we are 5 meters (or miles, if
    you like it best) away from the origin; after 2 seconds, we are 10 meters away
    from the origin; after 43128 seconds… I think you got it.'
  prefs: []
  type: TYPE_NORMAL
- en: 'As we were saying, this is written in stone: perfect, ideal, and unquestionable.
    Nonetheless, imagine this in real life. Imagine you are out for a walk or driving.
    Even if you try your best to go at a target speed, you will never be able to keep
    it constant. Your mind will race in certain parts; maybe you will get distracted,
    maybe you will stop for red lights, most likely a combination of the above. So
    maybe the simple differential equation we mentioned earlier is not enough. What
    we could do is to try and predict your location from the differential equation,
    ***but* with the help of Artificial Intelligence**.'
  prefs: []
  type: TYPE_NORMAL
- en: This idea is implemented in [Physics Informed Neural Networks](https://www.sciencedirect.com/science/article/pii/S0021999118307125)
    (PINN). We will describe them later in detail, but the idea is that we try to
    match *both* the data and what we know from the differential equation that describes
    the phenomenon. This means that we enforce our solution to generally meet what
    we expect from Physics. I know it sounds like black magic, I promise it will be
    clearer throughout the post.
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, the big question:'
  prefs: []
  type: TYPE_NORMAL
- en: What does Finance have to do with Physics and Physics Informed Neural Networks?
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Well, it turns out that differential equations are not only useful for nerds
    like me who are interested in the laws of the natural universe, but they can be
    useful in **financial models** as well. For example, the **Black-Scholes** model
    uses a differential equation to set the price of a call option to have, given
    certain quite strict assumptions, a **risk-free portfolio**.
  prefs: []
  type: TYPE_NORMAL
- en: 'The goal of this very convoluted introduction was twofold:'
  prefs: []
  type: TYPE_NORMAL
- en: Confuse you just a little, so that you will keep reading 🙂
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Spark your curiosity just enough to see where this is all going.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Hopefully I managed 😁. If I did, the rest of the article would follow these
    steps:'
  prefs: []
  type: TYPE_NORMAL
- en: We will discuss the **Black-Scholes model**, its assumptions, and its differential
    equation
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: We will talk about **Physics Informed Neural Networks (PINNs),** where they
    come from, and why they are helpful
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: We will develop our algorithm that trains a PINN on Black-Scholes using **Python,
    Torch,** and **OOP.**
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: We will show the results of our algorithm.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: I’m excited! To the lab! 🧪
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Black Scholes Model
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: If you are curious about the original paper of Black-Scholes, you can find it
    [here](https://www.cs.princeton.edu/courses/archive/fall09/cos323/papers/black_scholes73.pdf).
    It’s definitely worth it 🙂
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Ok, so now we have to understand the finance universe we are in, what the variables
    are, and what the laws are.
  prefs: []
  type: TYPE_NORMAL
- en: First off, in Finance, there is a powerful tool called a call **option**. The
    call option gives you the right (not the obligation) to buy a stock at a certain
    price in the fixed future (let’s say a year from now), which is called the strike
    **price**.
  prefs: []
  type: TYPE_NORMAL
- en: Now let’s think about it for a moment, shall we? Let’s say that today the given
    stock price is $100\. Let us also assume that we hold a call option with a $100
    strike price. Now let’s say that in one year the stock price goes to $150\. That’s
    amazing! We can use that call option to buy the stock and then immediately resell
    it! We just made $150 – $150-$100 = $50 profit. On the other hand, if in one year
    the stock price goes down to $80, then we can’t do that. Actually, we are better
    off not exercising our right to buy at all, not to lose money.
  prefs: []
  type: TYPE_NORMAL
- en: So now that we think about it, the idea of **buying a stock** and **selling
    an option** turns out to be **perfectly complementary**. What I mean is the randomness
    of the stock price (the fact that it goes up and down) can actually be **mitigated**
    by holding the right number of options. This is called **delta hedging.**
  prefs: []
  type: TYPE_NORMAL
- en: Based on a set of assumptions, we can derive the **fair option price** in order
    to have a **risk-free** portfolio.
  prefs: []
  type: TYPE_NORMAL
- en: 'I don’t want to bore you with all the details of the derivation (they are honestly
    not that hard to follow in the original paper), but the differential equation
    of the risk-free portfolio is this:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b3d5384089fb422f73d4b08ce41064c5.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Where:'
  prefs: []
  type: TYPE_NORMAL
- en: '`C` is the price of the option at time t'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`sigma` is the volatility of the stock'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`r` is the risk-free rate'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`t` is time (with t=0 now and T at expiration)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`S` is the current stock price'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'From this equation, we can derive the fair price of the call option to have
    a risk-free portfolio. The equation is closed and analytical, and it looks like
    this:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/11ed199f7746ee4fe7df2cef9c68a55a.png)'
  prefs: []
  type: TYPE_IMG
- en: 'With:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/59cbc920b1032eebae3cda8a577b617c.png)'
  prefs: []
  type: TYPE_IMG
- en: Where N(x) is the cumulative distribution function (CDF) of the standard normal
    distribution, K is the strike price, and T is the expiration time.
  prefs: []
  type: TYPE_NORMAL
- en: For example, this is the plot of the **Stock Price (x)** vs ****Call Option**
    (y)**, according to the Black-Scholes model.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e0706ffee1db78bc21c3cb916ee160f9.png)'
  prefs: []
  type: TYPE_IMG
- en: Image made by author
  prefs: []
  type: TYPE_NORMAL
- en: 'Now this looks cool and all, but what does it have to do with Physics and PINN?
    It looks like the equation is analytical, so why PINN? Why AI? Why am I reading
    this at all? The answer is below 👇:'
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Physics Informed Neural Networks
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: If you are curious about Physics Informed Neural Networks, you can find out
    in the original paper [here](http://Physics Informed Neural Networks). Again,
    worth a read. 🙂
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Now, the equation above is **analytical**, but again, that is an equation of
    a fair price in an ideal scenario. What happens if we ignore this for a moment
    and try to guess the price of the option given the stock price and the time? For
    example, we could use a Feed Forward Neural Network and train it through backpropagation.
  prefs: []
  type: TYPE_NORMAL
- en: In this training mechanism, we are minimizing the error
  prefs: []
  type: TYPE_NORMAL
- en: '`L = |Estimated C - Real C|`:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b775b4b59f2163adc0ecd6b3971611a4.png)'
  prefs: []
  type: TYPE_IMG
- en: Image made by author
  prefs: []
  type: TYPE_NORMAL
- en: This is fine, and it is the simplest Neural Network approach you could do. The
    issue here is that we are completely ignoring the Black-Scholes equation. So,
    is there another way? Can we possibly integrate it?
  prefs: []
  type: TYPE_NORMAL
- en: Of course, we can, that is, if we set the error to be
  prefs: []
  type: TYPE_NORMAL
- en: '`L = |Estimated C - Real C|+ PDE(C,S,t)`'
  prefs: []
  type: TYPE_NORMAL
- en: Where PDE(C,S,t) is
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b3d5384089fb422f73d4b08ce41064c5.png)'
  prefs: []
  type: TYPE_IMG
- en: 'And it needs to be as close to 0 as possible:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/70c52f610dd28ec66eba3678e4cebd2a.png)'
  prefs: []
  type: TYPE_IMG
- en: Image made by author
  prefs: []
  type: TYPE_NORMAL
- en: 'But the question still stands. Why is this “better” than the simple Black-Scholes?
    Why not just use the differential equation? Well, because sometimes, in life,
    solving the differential equation doesn’t guarantee you the “real” solution. Physics
    is usually approximating things, and it is doing that in a way that could create
    a difference between what we expect and what we see. That is why the PINN is an
    amazing and fascinating tool: you try to match the physics, but you are strict
    in the fact that the results have to match what you “see” from your dataset.'
  prefs: []
  type: TYPE_NORMAL
- en: In our case, it might be that, in order to obtain a risk-free portfolio, we
    find that the theoretical Black-Scholes model doesn’t fully match the noisy, biased,
    or imperfect market data we’re observing. Maybe the volatility isn’t constant.
    Maybe the market isn’t efficient. Maybe the assumptions behind the equation just
    don’t hold up. That is where an approach like PINN can be helpful. We not only
    find a solution that meets the Black-Scholes equation, but we also “trust” what
    we see from the data.
  prefs: []
  type: TYPE_NORMAL
- en: Ok, enough with the theory. Let’s code. 👨‍💻
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Hands On Python Implementation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The whole code, with a cool README.md, a fantastic notebook and a super clear
    modular code, can be found [here](https://github.com/PieroPaialungaAI/BlackScholesPINN)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: P.S. This will be a little intense (a lot of code), and if you are not into
    software, feel free to skip to the next chapter. I will show the results in a
    more friendly way 🙂
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Thank you a lot for getting to this point ❤️
  prefs: []
  type: TYPE_NORMAL
- en: Let’s see how we can implement this.
  prefs: []
  type: TYPE_NORMAL
- en: 3.1 Config.json file
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The whole code can run with a very simple configuration file, which I called
    **config.json**.
  prefs: []
  type: TYPE_NORMAL
- en: You can place it wherever you like, as we will see.
  prefs: []
  type: TYPE_NORMAL
- en: 'This file is crucial, as it defines all the parameters that govern our simulation,
    data generation, and model training. Let me quickly walk you through what each
    value represents:'
  prefs: []
  type: TYPE_NORMAL
- en: '`K`: the **strike price** — this is the price at which the option gives you
    the right to buy the stock in the future.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`T`: the **time to maturity**, in years. So `T = 1.0` means the option expires
    one unit (for example, one year) from now.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`r`: the **risk-free interest rate is** used to discount future values. This
    is the interest rate we are setting in our simulation.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`sigma`: the **volatility** of the stock, which quantifies how unpredictable
    or “risky” the stock price is. Again, a simulation parameter.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`N_data`: the number of **synthetic data points** we want to generate for training.
    This will condition the size of the model as well.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`min_S` and `max_S`: the **range of stock prices** we want to sample when generating
    synthetic data. Min and max in our stock price.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`bias`: an optional **offset added to the option prices**, to simulate a systemic
    shift in the data. This is done to create a discrepancy between the real world
    and the Black-Scholes data'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`noise_variance`: the **amount of noise** added to the option prices to simulate
    measurement or market noise. This parameter is add for the same reason as before.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`epochs`: how many **iterations** the model will train for.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`lr`: the **learning rate** of the optimizer. This controls how fast the model
    updates during training.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`log_interval`: how often (in terms of epochs) we want to **print logs** to
    monitor training progress.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Each of these parameters plays a specific role, some shape the financial world
    we’re simulating, others control how our neural network interacts with that world.
    Small tweaks here can lead to very different behavior, which makes this file both
    powerful and delicate. Changing the values of this JSON file will radically change
    the output of the code.
  prefs: []
  type: TYPE_NORMAL
- en: 3.2 main.py
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now let’s look at how the rest of the code uses this config in practice.
  prefs: []
  type: TYPE_NORMAL
- en: The main part of our code comes from ***main.py***, train your PINN using Torch,
    and ***black_scholes*.py**.
  prefs: []
  type: TYPE_NORMAL
- en: 'This is main.py:'
  prefs: []
  type: TYPE_NORMAL
- en: 'So what you can do is:'
  prefs: []
  type: TYPE_NORMAL
- en: Build your config.json file
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Run `python main.py --config config.json`
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: main.py uses a lot of other files.
  prefs: []
  type: TYPE_NORMAL
- en: 3.3 black_scholes.py and helpers
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The implementation of the model is inside **black_scholes.py**:'
  prefs: []
  type: TYPE_NORMAL
- en: This can be used to build the model, train, export, and predict.
  prefs: []
  type: TYPE_NORMAL
- en: The function uses some helpers as well, like data.py, loss.py, and model.py.
  prefs: []
  type: TYPE_NORMAL
- en: 'The torch model is inside **model.py**:'
  prefs: []
  type: TYPE_NORMAL
- en: 'The data builder (given the config file) is inside **data*****.*****py**:'
  prefs: []
  type: TYPE_NORMAL
- en: And the beautiful loss function that incorporates the value of is **loss.py**
  prefs: []
  type: TYPE_NORMAL
- en: 4\. Results
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Ok, so if we run main.py, our FFNN gets trained, and we get this.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/9efa383314a6a52cec3240f2b3cde8e8.png)'
  prefs: []
  type: TYPE_IMG
- en: Image made by author
  prefs: []
  type: TYPE_NORMAL
- en: 'As you notice, the model error is not quite 0, but the PDE of the model is
    much smaller than the data. That means that the model is (naturally) aggressively
    forcing our predictions to meet the differential equations. This is exactly what
    we said before: we optimize both in terms of the data that we have and in terms
    of the Black-Scholes model.'
  prefs: []
  type: TYPE_NORMAL
- en: We can notice, qualitatively, that there is a great match between the noisy
    + biased real-world (rather realistic-world lol) dataset and the PINN.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/6f5a9796d07a83a0104ee77e2d14627a.png)'
  prefs: []
  type: TYPE_IMG
- en: Image made by author
  prefs: []
  type: TYPE_NORMAL
- en: 'These are the results when t = 0, and the Stock price changes with the Call
    Option at a fixed t. Pretty cool, right? But it’s not over! You can explore the
    results using the code above in two ways:'
  prefs: []
  type: TYPE_NORMAL
- en: Playing with the multitude of **parameters** that you have in config.json
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Seeing the predictions at **t>0**
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Have fun! 🙂
  prefs: []
  type: TYPE_NORMAL
- en: 5\. Conclusions
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Thank you so much for making it all the way through. Seriously, this was a long
    one 😅
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s what you’ve seen in this article:'
  prefs: []
  type: TYPE_NORMAL
- en: '**We started with Physics**, and how its rules, written as differential equations,
    are fair, beautiful, and (usually) predictable.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**We jumped into Finance**, and met the Black-Scholes model — a differential
    equation that aims to price options in a risk-free way.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**We explored Physics-Informed Neural Networks (PINNs)**, a type of neural
    network that doesn’t just fit data but respects the underlying differential equation.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**We implemented everything in Python**, using PyTorch and a clean, modular
    codebase that lets you tweak parameters, generate synthetic data, and train your
    own PINNs to solve Black-Scholes.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**We visualized the results** and saw how the network learned to match not
    only the noisy data but also the behavior expected by the Black-Scholes equation.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Now, I know that digesting all of this at once is not easy. In some areas, I
    was necessarily short, maybe shorter than I needed to be. Nonetheless, if you
    want to see things in a clearer way, again, give a look at the [GitHub folder.](https://github.com/PieroPaialungaAI/BlackScholesPINN/tree/main)
    Even if you are not into software, there is a clear README.md and a simple **example/BlackScholesModel.ipynb**
    that explains the project step by step.
  prefs: []
  type: TYPE_NORMAL
