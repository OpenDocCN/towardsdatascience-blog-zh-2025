- en: I Analysed 25,000 Hotel Names and Found Four Surprising Truths
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/i-analysed-25000-hotel-names-and-found-something-unexpected/](https://towardsdatascience.com/i-analysed-25000-hotel-names-and-found-something-unexpected/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1753143695213" class="mdspan-comment">Introduction</mdspan>
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The other day I was walking around Oslo when I passed a fancy building with
    a red carpet, black awning and a name in big capital letters: Hotel Bristol. I
    was mystified. Bristol? In Oslo?'
  prefs: []
  type: TYPE_NORMAL
- en: Well, it turns out that the Hotel California is in Paris, that the Manhattan
    Hotel is in Jakarta and that the Hotel Vienna exists pretty much everywhere except
    in Vienna.
  prefs: []
  type: TYPE_NORMAL
- en: 'I thought it would all come down to marketing. But the more I explored, the
    more I saw three stories unfolding: location, aspiration, and old-world tradition.'
  prefs: []
  type: TYPE_NORMAL
- en: Follow along for a fun data analysis into the world of hotels that borrow city
    names from somewhere else. The results? Way more surprising than I expected.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: What are the top hotel names?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'After I was back from my Oslo trip, I just couldn’t let it go. So I did what
    I do best: develop a mild obsession and open far too many tabs. On one of those
    tabs, I came across the [Hotel Data API](https://docs.liteapi.travel/reference/get_data-hotels)
    from liteAPI, who were very kind to let me use their data for this analysis.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s how I went about it:'
  prefs: []
  type: TYPE_NORMAL
- en: I ran a global search for hotel names that referenced major cities, but weren’t
    actually in them. For each city name (say, Roma), I looped through every country
    code and pulled hotels with that name anywhere in the world.
  prefs: []
  type: TYPE_NORMAL
- en: '*I refer to “cities” throughout this article, but a few names (like California
    and Manhattan) aren’t cities. I included them because they’re widely used in hotel
    names.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The code below illustrates how to extract data for a list of cities. It uses
    a function called *launch_requests* to handle the API queries, which I won’t share
    here—details on querying the API and obtaining keys are available in the official
    [documentation](https://docs.liteapi.travel/reference/get_data-hotels).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: I filtered for exact matches to keep things clean, so *“Hotel romantic”* didn’t
    sneak in as a false Roma. I also further tagged the results with *“incity”* where
    the hotel is based in the same city as the name (e.g Hotel Roma in Rome), *“inaddress”*
    when the hotel is on a street named after a city (e.g Hotel Roma on Roma Street)
    and “outside” for everything else.
  prefs: []
  type: TYPE_NORMAL
- en: As for the city names, aside from the obvious Bristol, I picked them based on
    vibe rather than geography.
  prefs: []
  type: TYPE_NORMAL
- en: 'I started the list with old-world charm: London, Rome and Paris. Sun by the
    poolside? That’s *Miami*, *California*, *Barcelona* and *Havana*. I threw in *Venice*,
    *Prague* and *Vienna* for some elegance. *Marrakesh*, *Casablanca* and *Cairo*?
    Exotic and mysterious. And finished with cosmopolitan: *Manhattan*, *Berlin* and
    *Shanghai*.'
  prefs: []
  type: TYPE_NORMAL
- en: To illustrate, take the beautiful lobby of **The Parisian Macao**, a Paris-themed
    hotel in, you guessed it, Macao, China.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![](../Images/116d51b4b9d5ee43798bb20caa960ad0.png)'
  prefs: []
  type: TYPE_IMG
- en: Photo by [Hr Hao](https://unsplash.com/es/@hrhao?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on [Unsplash](https://unsplash.com/es/fotos/una-gran-habitacion-con-un-candelabro-y-pinturas-en-las-paredes-3ijRTiX9HLU?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
  prefs: []
  type: TYPE_NORMAL
- en: And now, the big reveal… Below is the definitive list of the most borrowed city
    names used in hotel names all over the world. Think of it as the Olympics of city
    names that look good on a hotel room key.
  prefs: []
  type: TYPE_NORMAL
- en: But before we get to the full table, here’s a map of the top 7 finishers and,
    of course, the reason behind this article, the mysterious Bristol. Each dot is
    a real hotel, so feel free to zoom in, filter and watch the points appear across
    borders.
  prefs: []
  type: TYPE_NORMAL
- en: Interactive Map Generated with Flourish by the Author
  prefs: []
  type: TYPE_NORMAL
- en: '*My biggest surprise? The big concentration of City Name hotels in Europe compared
    to the small scatter in North America. What are hotels called after in NA? Maybe
    content for another article?*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Now, back to the numbers, here’s how to read the table *(If you’re curious,
    I used the library [PlotTable](https://plottable.readthedocs.io/en/latest/index.html))*.
  prefs: []
  type: TYPE_NORMAL
- en: 'Hotel Name: The City mentioned in the hotel’s name.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Number of Countries: How many countries have hotels with this name.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Number of Hotels: Total hotels worldwide with this name.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'In city: How many are actually located in the real city.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'In Address: How many are on a street or area with the same name.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Outside: The rest and the interesting bit – hotels borrowing the name but located
    nowhere near the actual place.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/b85c9b4540255f4d37d58c83fa1994e8.png)'
  prefs: []
  type: TYPE_IMG
- en: Part 1 of “Top Borrowed City Names in Hotels”. Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c27e74cd839f9b267a44789ec27bb195.png)'
  prefs: []
  type: TYPE_IMG
- en: Part 2 of “Top Borrowed City Names in Hotels”. Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: And the winner is…
  prefs: []
  type: TYPE_NORMAL
- en: '**Paris**, the city of light and love, comes out on top with over 1100 hotels
    all over the world. Enough to book a new one each weekend for 20 years?'
  prefs: []
  type: TYPE_NORMAL
- en: Not far behind is **Vienna**, quite a surprise, especially in China, where the
    name is a massive hit.
  prefs: []
  type: TYPE_NORMAL
- en: At number three is Rome, where it feels like there’s Hotel Roma in just about
    every town in Italy.
  prefs: []
  type: TYPE_NORMAL
- en: And I do wonder, is this really due to the luxury and charm that these cities
    evoke? — or that some names just sound “expensive”? Let’s deep dive in the next
    section.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Why do hotels borrow city names?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Visibility**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Sometimes — and as a frugal traveller I can vouch for this — it’s not about
    being in the city, it’s about being close enough. Take Mestre, the mainland neighbour
    of Venice. Many hotels there brand themselves with “Venice” in the name to appear
    in travel searches. For example, the “*Hilton Garden Inn Venice Mestre San Giuliano*”
    is far more likely to show up when someone googles “places to stay in Venice”.
    Check out the following map, which illustrates all hotels near Venice that include
    ‘Venice’ in their name.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/3d30ee75368ec56b0c700c2aba348b35.png)'
  prefs: []
  type: TYPE_IMG
- en: Location of hotels using the name Venice in Venice and Mestre. Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: Same thing happens with Paris. Many hotels are located outside the official
    city limits, but close enough so you still feel like you’re on holiday in Paris.
    Maybe even close enough to smell that five Euro coffee in front of the Eiffel
    Tower.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/770c47fe540494e078e8907f17d8978f.png)'
  prefs: []
  type: TYPE_IMG
- en: Location of hotels using the name Paris in the City of Paris and outside. Image
    by Author
  prefs: []
  type: TYPE_NORMAL
- en: '**Branding**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Other times, the name has little to do with geography and everything to do with
    the music played in the lobby.
  prefs: []
  type: TYPE_NORMAL
- en: I am talking about the **Vienna Hotels Group,** founded in 1993 in Shenzhen,
    China. The founder chose the name “Vienna” to sell elegance, comfort and classical
    music—a European fantasy.
  prefs: []
  type: TYPE_NORMAL
- en: To this day, many of their hotels adopt a European-inspired branding style with
    neoclassical columns, chandeliers and classical piano music played in the lobby.
    Hard to resist, right?
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/81d2533423653122a6030ece31d829c4.png)'
  prefs: []
  type: TYPE_IMG
- en: Vienna Hotel Lobby in Shenzhen. Image is Public Domain from Wikimedia Commons.
    [Link](https://commons.wikimedia.org/wiki/File:SZ_%E6%B7%B1%E5%9C%B3_Shenzhen_%E9%BE%8D%E8%8F%AF%E5%8D%80_Longhua_%E6%B0%91%E6%B2%BB_Minzhi_%E7%8E%89%E9%BE%8D%E8%B7%AF_Yulong_Road_%E7%B6%AD%E4%B9%9F%E7%BA%B3%E5%9C%8B%E9%9A%9B%E9%85%92%E5%BA%97_Vienna_Hotel_lobby_April_2024_R12S_102.jpg)
  prefs: []
  type: TYPE_NORMAL
- en: In fact, when I look at the data, China alone accounts for almost 1000 hotels
    that include Vienna in their name, far more than any country, including Austria
    itself.
  prefs: []
  type: TYPE_NORMAL
- en: 'Other fun examples of branding are the **Manhattan** Hotel in Jakarta:'
  prefs: []
  type: TYPE_NORMAL
- en: ✨️Check out Manhattan Hotel Jakarta on[https://t.co/IJRO0eD4Bm](https://t.co/IJRO0eD4Bm)
    [pic.twitter.com/GG370ZyD3H](https://t.co/GG370ZyD3H)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — TwinMompreneur (@TLoopid) [April 22, 2024](https://twitter.com/TLoopid/status/1782367495346950234?ref_src=twsrc%5Etfw)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'The **Venetian** Hotel in Las Vegas, which you couldn’t pay me enough to go
    to:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/83018894d25f921b910bb8a521184224.png)'
  prefs: []
  type: TYPE_IMG
- en: Photo by [tommao wang](https://unsplash.com/@tommaomaoer?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on [Unsplash](https://unsplash.com/photos/white-and-brown-concrete-building-beside-river-under-blue-sky-during-daytime-yfvSBMQO7lA?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
  prefs: []
  type: TYPE_NORMAL
- en: And just look at the **Miami** Heat Beach Resort in Bataan, Philippines.
  prefs: []
  type: TYPE_NORMAL
- en: Mid-December break at Miami Heat Beach Resort in Bataan [pic.twitter.com/DFp20H5zPh](https://t.co/DFp20H5zPh)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — HANA (@hannahlynnenano) [December 21, 2018](https://twitter.com/hannahlynnenano/status/1076160692464435200?ref_src=twsrc%5Etfw)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Tradition**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Not every hotel is named to sell a location or a fantasy. Some are named out
    of pure tradition.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s go back to the name that started this whole journey: **Bristol**.'
  prefs: []
  type: TYPE_NORMAL
- en: The first thing that I did was to map out every Hotel Bristol – just scroll
    up to see the interactive map yourself. The result? Not a single Hotel Bristol
    in the UK outside of the City of Bristol.
  prefs: []
  type: TYPE_NORMAL
- en: 'The hotels are rather scattered across Europe and even as far as South America.
    So I wondered: how far are these hotels from the actual city of Bristol?'
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s how I measured it:'
  prefs: []
  type: TYPE_NORMAL
- en: I calculated the distance from each hotel’s coordinates to the coordinates of
    Bristol.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 2\. I then plotted the distribution of those distances alongside Paris and Vienna,
    using Seaborn’s *FacetGrid* as a RidgePlot. The code (too long for this article)
    is based on Thiago Carvalho’s guide in [Plain English](https://plainenglish.io/blog/ridge-plots-with-pythons-seaborn-4de5725881af).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/08368f00b66ad14da3e60531e41210e3.png)'
  prefs: []
  type: TYPE_IMG
- en: Distance Distribution between hotels and the city they’re named after. Image
    by Author
  prefs: []
  type: TYPE_NORMAL
- en: 'The results speak for themselves:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Paris** hotels are, on average, just **22km** from the actual city, mostly
    location-driven, as we explored in the first section.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Vienna** hotels average **8,416km** away — a clear case of fun branding.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Bristol** hotels? They sit at an average of **1,649km** from Bristol — way
    too far for location to be the reason.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: So, what’s the real story here? For that, I turn to **[Roger Williams](http://thefirsthotelbristol.blogspot.com/)**,
    a journalist and author of *“High Times at the Bristol Hotel”*, a book that explores
    the fascinating origins of Bristol Hotels around the globe.
  prefs: []
  type: TYPE_NORMAL
- en: What a lovely surprise. We got a complimentary room upgrade when we checked
    into the hotel [@BristolVienna](https://twitter.com/BristolVienna?ref_src=twsrc%5Etfw)
    today… [#amex](https://twitter.com/hashtag/amex?src=hash&ref_src=twsrc%5Etfw)
    [#bristol](https://twitter.com/hashtag/bristol?src=hash&ref_src=twsrc%5Etfw) [#vienna](https://twitter.com/hashtag/vienna?src=hash&ref_src=twsrc%5Etfw)
    [pic.twitter.com/bKy3u6k7kP](https://t.co/bKy3u6k7kP)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: — Alexander Falk (@afalk) [June 11, 2017](https://twitter.com/afalk/status/873921208743587841?ref_src=twsrc%5Etfw)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Williams talks about an 18th-century English nobleman, **Lord Bristol**. He
    was known as a true connoisseur of art and travel, and his visits often elevated
    a place’s status: hotels where he stayed would even become informally known as
    “Lord Bristol’s Hotel.” This, it turns out, was how the very first Hotels Bristol
    opened across Europe. Later, other hotels adopted the name, either to sound sophisticated
    and luxurious, or, as the owner of Le Bristol in **Paris** said back in 1925,
    simply to keep up an old tradition that went all the way back to the 18th century.'
  prefs: []
  type: TYPE_NORMAL
- en: It’s more than just a name
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'This journey started with a simple question about the Hotel Bristol in Oslo,
    a name that felt strangely out of place. It all started with one hotel, but soon
    I was mapping names across the world. What began as just city names turned into
    a story about geography, branding, and even a bit of old European tradition. Here’s
    a summary of what we found:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Paris** is the city with the most hotel names to its name. Most of them aren’t
    even in Paris —the average “Paris Hotel” is 22km away from the actual city.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Vienna** came next. But it’s not just a city—it’s also a Chinese hotel brand
    with close to 1,000 locations, all selling a refined, classical, European fantasy.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Rome** is third, and it turns out hotels all across Italy love naming themselves
    after the capital. Location or aspiration? Maybe both.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: What all of this shows is that hotel names are rarely random. They’re selling
    a location, a fantasy, or—sometimes—a tradition.
  prefs: []
  type: TYPE_NORMAL
- en: 'And yes, the cat’s out of the bag: there are over 200 Hotels Bristol worldwide,
    and the reason goes all the way back to an 18th-century English aristocrat whose
    hotel preferences turned into a naming tradition.'
  prefs: []
  type: TYPE_NORMAL
- en: So next time you find yourself staying at a London in Uruguay, a Rome in Lisbon
    or a Barcelona in Mexico—you’ll know there’s probably more to that name than meets
    the eye. And now, you know how to start uncovering it.
  prefs: []
  type: TYPE_NORMAL
- en: '*All images and code in this article are by the author*'
  prefs: []
  type: TYPE_NORMAL
