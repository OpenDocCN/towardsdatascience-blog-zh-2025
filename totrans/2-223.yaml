- en: 原文：[https://towardsdatascience.com/building-ai-powered-low-code-workflows-with-n8n/](https://towardsdatascience.com/building-ai-powered-low-code-workflows-with-n8n/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '<mdspan datatext="el1750203913555" class="mdspan-comment">How this</mdspan>
    post is divided:'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: What is n8n?
  id: totrans-3
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Step-by-step: Build Powerful Workflows'
  id: totrans-4
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Daily Briefing Personal Assistant
  id: totrans-5
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Customer Support Assistant
  id: totrans-6
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Appointment Scheduler Assistant
  id: totrans-7
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 3\. Prompt Injection
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: 4\. Similar Tools
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
- en: 5\. Conclusion
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: '***Disclaimer**: This article is not affiliated with or sponsored by n8n. All
    opinions and examples shared here are based on my personal experience*.'
  id: totrans-11
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 1\. What is n8n?
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**N8n** is a source-available, low-code workflow automation platform that **combines
    AI capabilities with business process automation**. In other words, it allows
    you to connect various apps, services, and Large Language Models (LLMs) to create
    automated workflows. N8n offers **over 1000 integrations**, including Google Workspace,
    Slack, WhatsApp, and Notion. You can explore all available integrations [here](https://n8n.io/integrations/).'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: Using n8n, you can build everything from simple personal automations to advanced
    AI-powered systems capable of interpreting context and making autonomous decisions — not
    just following predefined rules. In this way, AI can understand, reason, and adapt,
    enabling the automation of complex decision-making processes as well.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: The platform has become particularly popular in the microSaaS community, where
    developers use it to quickly prototype and deploy AI-driven services without having
    to build infrastructure from scratch.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: '2\. Step-by-step: Build Powerful Workflows'
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I’m going to walk you through **3 simple but powerful workflows you can apply
    to your personal life or business today**.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: 'What are we going to build:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: Daily Briefing Personal Assistant
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Customer Support Assistant
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Appointment Scheduler Assistant
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'When using n8n, you have two hosting options:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: You can use **n8n Cloud**, which offers a free 14-day trial. After that, you’ll
    need to choose a paid plan. This is the easiest way to get started since there’s
    no need to install anything.
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Or you can **self-host**, where you’ll be responsible for the infrastructure
    and setup. There’s a free and a paid version of n8n for self-hosting. The free
    version, called the **Community Edition**, comes with some feature limitations.
    You can check the required setup [here](https://docs.n8n.io/hosting/) and see
    which features are included [here](https://docs.n8n.io/hosting/community-edition-features/).
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For this tutorial, I recommend starting with the 14-day free trial on n8n Cloud,
    so you can build and test everything in this guide quickly. Plus, all the tools
    I’ll be using are free or have a free tier, making it easy for you to follow along.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
- en: 2.1 Daily Briefing Personal Assistant
  id: totrans-27
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Let’s build a personal assistant that runs every morning to gather key information
    and help you start your day.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s what the assistant will do:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
- en: At 8 a.m the workflow starts.
  id: totrans-30
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Fetches news about AI from the previous day via Google Search.
  id: totrans-31
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Check your calendar events for the day using Google Calendar.
  id: totrans-32
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Retrieves unread emails from Gmail.
  id: totrans-33
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Summarizes all the information.
  id: totrans-34
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Sends an organized message directly to your Slack.
  id: totrans-35
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: First, go to [n8n](https://n8n.io) and create your account. On your dashboard,
    you’ll see that the free trial includes up to 5 active workflows and 1,000 production
    executions. The executions we’ll run during this tutorial won’t count toward that
    limit, since they are done in test mode. **Executions only count once you activate
    your workflow.**
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
- en: Click on “Open instance” and then “Create Workflow”.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/38b94700a216c0fa25cdf7c31ef91f77.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
- en: 'Every workflow in n8n starts with a **trigger**, which determines when the
    workflow should run. Some common types of triggers include:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
- en: '**Manual trigger**: runs the workflow when you click a button.'
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Schedule**: runs the workflow at a specific time, date, or custom interval.'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Chat message**: runs when a message is received on a connected chat platform.'
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Form submission**: generate a form on n8n and their response passes to the
    workflow.'
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Webhook call**: runs when an HTTP request is received (e.g., you can use
    a form from another platform and send the data to n8n via a webhook).'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Called by another workflow**: triggered as part of a separate workflow.'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**App event**: runs when a specific event occurs in an app (e.g., new row in
    Google Sheets, new email, etc).'
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In this example, choose the **Schedule**, so the assistant will run every day
    at 8 a.m., right before you start your day.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
- en: First, click on “Add first step…”
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f5c123cdd99192354ebd75baaf3c4338.png)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
- en: Select “Schedule Trigger”. Here, we’re setting it to run every day at 8 a.m.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e8636c1151e018a3aa9ff33d52aa713d.png)'
  id: totrans-53
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
- en: 'Now we have several options for what can happen next:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/346e36b09ed80426ed7f11d21961f061.png)'
  id: totrans-56
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
- en: 'In this case, we’ll create an AI agent. If you’re not familiar with AI, agents
    are systems that can independently accomplish tasks on your behalf. An agent is
    typically made up of three main components: a **model**, **instructions**, and
    **tools**. If you want to read more about agents, check out [my previous article](https://towardsdatascience.com/new-to-llms-start-here/).'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/8fe19ce363dfae4c3588aefd0a377879.png)'
  id: totrans-59
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
- en: Select “AI Agent”. Now you’ll need to set up the components I mentioned.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/71f27ced6c061cabfe43782ec4a84027.png)'
  id: totrans-62
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
- en: '**Chat Model**: Select the language model you want to use.'
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Memory**: Allows the AI model to “remember” and reference past interactions.'
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Tools**: Enable the agent to interact with external data and perform actions.
    You can connect multiple tools.'
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Agent Setup**: Inside the AI Agent node, you define the instructions by configuring
    the user prompt and the system prompt.'
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 2.1.1 Set up Chat Model
  id: totrans-68
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Choose the model you want to use. In this tutorial, we’ll use Gemini because
    it has a free tier.
  id: totrans-69
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the “Credential to connect with”, create a new credential and add your API
    Key.
  id: totrans-70
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'If you don’t have an API Key yet, you can get one from Gemini for free here:'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
- en: Go to [https://aistudio.google.com/](https://aistudio.google.com/)
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Create or log in to your account.
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Click on “**Create API Key”**, create it, and copy it.
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Don’t set up billing if you just want to use the free tier. It should say “Free”
    under “Plan”, like here:'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a15ef4a446933437563cf99bd2d82b3b.png)'
  id: totrans-76
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Now you can choose which model you want to use. For this example, I selected
    **models/gemini-2.0-flash**, because performs well on simple tasks and has a generous
    free tier. **If you’re working on something more complex, I recommend using a
    model with stronger reasoning capabilities**, such as Gemini 2.5 Pro — but keep
    in mind there’s a trade-off in terms of cost and latency.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s a table with the rate limits for Gemini models:'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/8f3ff543ba3b3e9ad81d1bf03ec23d86.png)'
  id: totrans-80
  prefs: []
  type: TYPE_IMG
- en: '[https://ai.google.dev/gemini-api/docs/rate-limits](https://ai.google.dev/gemini-api/docs/rate-limits)'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
- en: 'The limits for models/gemini-2.0-flash:'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
- en: 15 RPM = 15 Requests per minute
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 1,000,000 TPM = 1 Million Tokens Per Minute
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 1,500 RPD = 1,500 Requests Per Day
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Note: These limits are accurate as of June 2025 and may change over time.*'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
- en: 4\. In “**Options**“, you can also configure some of the model’s parameters.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/cb11649a01801451b8e799311714159d.png)'
  id: totrans-88
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
- en: '**Maximum number of tokens**: Sets the maximum length of the response in tokens,
    one token is approximately four characters.'
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Sampling Temperature**: Controls the randomness of the output, ranging from
    0 to 1\. Lower values produce more deterministic outputs, while higher values
    produce more creative ones.'
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Top K**: Limits the model to only choose from the K most likely next words
    (e.g., if K = 5, the model will randomly pick the next word from the top 5 most
    likely options). Use when you want more control over the randomness, but still
    want some variation.'
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Top P**: Instead of limiting to a specific number of words, like Top K, it
    limits by probability. If you set it to 0.9, the model keeps adding the most likely
    words until they add up to 90% probability mass. Sometimes that might be just
    3 words, sometimes it might be 20 words – it depends on how sure the model is
    about what should come next. Lower values make outputs more focused and deterministic
    while higher values allow more diversity.'
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Safety settings**: Controls content filtering. There are the categories:
    harassment, hate speech, sexually explicit and dangerous content.'
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'I usually adjust the parameters: **sampling temperature** and **maximum number
    of tokens**. For this tutorial, I won’t modify any of them, but feel free to experiment.'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
- en: 'Your setup should look like this:'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/5d04059b6dd8abc30094a952fbf37eec.png)'
  id: totrans-97
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
- en: 2.1.2 Set up Memory
  id: totrans-99
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Memory allows an AI model to “remember” and **reference past interactions**.
    Essentially, it means including previous messages in the prompt so the model has
    context for better responses.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/4e89b1877699032b84555782ab0b83fe.png)'
  id: totrans-101
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
- en: 'There are two types of memory we can refer to:'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
- en: '**Short-term memory**: Refers to the immediate context the model has access
    to during a session. For example, using “Simple Memory” in n8n. This method is
    built into the platform, it automatically stores interactions **within a session**,
    so you don’t need to configure any credentials or external storage.'
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Long-term memory**: Involves storing important information beyond the session
    for future use. For example, saving messages in an **external storage** like “Postgres
    Chat Memory”. This is useful for more advanced cases, such as keeping a user’s
    history in storage, sharing memory between workflows, or customizing how and when
    memory is retrieved.'
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/9303f8508a4162a4fbda00852bffaf19.png)'
  id: totrans-106
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
- en: In this example, **we won’t use memory, since our workflow runs independently
    each day**. However, if we were building a chatbot, memory would make the interaction
    feel more natural.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
- en: 2.1.3 Set Up Tools
  id: totrans-109
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Set Up Google Calendar
  id: totrans-110
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: '**Credential to connect with**: Click “Create new credential” and sign in with
    your Google account.'
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Tool Description**: You can provide a custom description to help the model
    understand how to use this tool. However, since our workflow is simple, I’ll choose
    “Set Automatically” and leave the default description.'
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Resource**: We want to retrieve calendar “Events”.'
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Operation**: There are several operations like create, delete, get, get many,
    and update. Since we want to retrieve all events for a specific day, select “Get
    many”.'
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Calendar**: Choose “From list” and select the calendar name from your account.
    If you have more than one calendar the model can access, you can use “Let the
    model define this parameter”, and it will choose the appropriate one.'
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Return All**: Enable this if you want to get all matching events. Otherwise,
    you can disable it and set a specific limit.'
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**After / Before**: These define the time range to search for events. Since
    this workflow runs daily at 8 a.m., I’ll set this manually:'
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`After`: `{{ $now }}`'
  id: totrans-118
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '`Before`: `{{ $now.plus({ hours: 16 }) }}`'
  id: totrans-119
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: This will fetch all events for the same day. If this were a chat-based workflow
    where the agent could check any date, I would select **“Let the model define this
    parameter”** for both fields.
  id: totrans-120
  prefs:
  - PREF_IND
  - PREF_IND
  type: TYPE_NORMAL
- en: '![](../Images/116a273c6fec6bd81f9a94baf1908ce8.png)'
  id: totrans-121
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
- en: Set Up Gmail
  id: totrans-123
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
- en: '**Credential to connect with**: Click “Create new credential” and sign in with
    your Google account.'
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Tool Description**: You can add a custom description to help the model understand
    how to use this tool. Since our workflow is simple, I’ll choose “Set Automatically”
    and keep the default description.'
  id: totrans-125
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Resource**: Select “Messages”, since we want to retrieve emails.'
  id: totrans-126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Operation**: There are several operations such as add label, delete, get,
    get many, mark as read/unread, reply, and send. In this case, we’ll select “Get
    many” to retrieve multiple emails.'
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Return All**: Enable this to retrieve all matching emails. Alternatively,
    you can disable it and define a specific limit.'
  id: totrans-128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Simplify**: Choose true to return a simplified version of the response instead
    of raw Gmail data.'
  id: totrans-129
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Filters**: Gmail provides various filters such as sender, read status, date
    received, label names, etc. For this example, we’ll filter by **“Read Status”**
    and select **“Unread emails only”**.'
  id: totrans-130
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/9e378c1bf4bd4177eba68ab07d9fe570.png)'
  id: totrans-131
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
- en: Set Up SerpAPI
  id: totrans-133
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
- en: '**SerpAPI** is the Google Search API. We’ll use it to search the internet for
    news about AI and include the results in our daily summary. It offers a free plan
    with **100 searches per month**.'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
- en: Go to [https://serpapi.com/pricing](https://serpapi.com/pricing)
  id: totrans-135
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Create an account or sign in.
  id: totrans-136
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: You’ll find your **API key** under **“Your Account**“.
  id: totrans-137
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'In n8n, add a new tool: **SerpAPI**.'
  id: totrans-138
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Create a new credential and paste your API key.
  id: totrans-139
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Under the **“Options”** section, you can configure various properties:'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
- en: '**Country**: Set the country code to search results.'
  id: totrans-141
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Device**: Choose the device type (e.g., desktop, mobile).'
  id: totrans-142
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Explicit Array**: If enabled, forces SerpAPI to fetch live Google results
    instead of using cached versions.'
  id: totrans-143
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Google Domain**: Choose the Google domain to use (e.g., google.com, google.co.uk).'
  id: totrans-144
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Language**: Set the preferred language for the search.'
  id: totrans-145
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In this example, we won’t configure any additional options — we’ll just use
    the default settings.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a2871437892ede7ee74bb73cfb5f5c06.png)'
  id: totrans-147
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
- en: 2.1.4 Set Up Agent
  id: totrans-149
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Here, we’ll define the **instructions** — explicit guidelines that shape **how
    the agent behaves**. A good prompt helps make the model’s responses more accurate,
    consistent, and aligned with your goals.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
- en: '**Source for Prompt (User Message):**'
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
- en: '**Connect Chat Trigger Node**: Use this if your agent is connected to a chat.
    The user input will be passed automatically.'
  id: totrans-152
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Define Below**: Manually write the prompt yourself.'
  id: totrans-153
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In our case, we’re **not using a Chat Trigger**, so we’ll manually define the
    prompt.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
- en: We’ll set it in the **“Prompt (User Message)”** field. However, if this were
    a chat-based flow, that field would receive the actual user message, and you would
    define your agent instructions separately in the **“System Prompt”** under **“Options”**.
    I’ll show an example of this in the next workflow.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
- en: When filling in any field, you have the option to choose between **“Fixed”**
    and **“Expression”**. Expressions let you dynamically generate content using variables
    or functions.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
- en: In our example, **we’re using an expression to insert the current date**. That
    way, the agent can understand what “yesterday” means when fetching the news.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/6d2a93ba5e22d2a1ec7104f258c6069b.png)'
  id: totrans-158
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
- en: 'Here is the prompt:'
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  id: totrans-161
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Let’s execute this step to make sure it is working. Click on **“Test workflow”**. This
    will show you which nodes were executed. If all your **nodes turn green**, it
    means they ran successfully.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
- en: If you’re testing your agent and notice that the tools weren’t triggered correctly,
    it likely means your **prompt needs to be improved** with clearer instructions.
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/53e62b3f0c85996f187042c101dbb796.png)'
  id: totrans-164
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
- en: 2.1.5 Set up Slack
  id: totrans-166
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: '**Credential to connect with**: Use OAuth2 — you’ll just need to log into your
    Slack account.'
  id: totrans-167
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Resource**: Choose “Message”.'
  id: totrans-168
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Operation**: Choose “Send”.'
  id: totrans-169
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Channel**: Select the desired channel.'
  id: totrans-170
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Message Type**: Choose “Simple Text Message”.'
  id: totrans-171
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Now that we’ve executed the previous steps, you’ll see an example of the agent’s
    output in the “**INPUT**” section — this helps us configure the Slack step.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
- en: '**“Message Text**“: You can drag the output from the previous step into this
    field. This links the agent’s response to your Slack message.'
  id: totrans-173
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Under **“Options**“, you can explore further and customize the message, such
    as enabling link previews, mentioning users or channels, replying to a specific
    message, unfurling links and media, and more.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/7ec896c03f0f8f848b21e6c1b4ea2da8.png)'
  id: totrans-175
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
- en: Now, if we click on “Test Step”, we’ll receive a message on Slack.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/2e029e75ec2ed717e099cf6883316a3b.png)'
  id: totrans-178
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
- en: 'Some observations:'
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
- en: The emails were in Portuguese, which is why there is some mixed language.
  id: totrans-181
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It only returned 3 news items — we could improve the prompt to ensure it retrieves
    more, but it’s great that all 3 are about AI and from yesterday (assuming I executed
    this on May 30th), so that part worked well!
  id: totrans-182
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It didn’t handle conflicts accurately — we could also improve this by refining
    the prompt to explain what a “conflict” means in this context.
  id: totrans-183
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Now you can play around and keep improving the prompt, or put it into production.
    To do that, **simply toggle the “Inactive” button to activate the workflow**.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/516c2b72a41f72880d3512821d16e30d.png)'
  id: totrans-185
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
- en: And your workflow is now active! You can expect it to run on schedule every
    day.
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/bdc3e87a20d755fa94d61389db985a19.png)'
  id: totrans-188
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
- en: During the free trial, you have 14 days and a limit of 1000 production executions,
    which is great for building and testing an MVP.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
- en: 2.2 Customer Support Assistant
  id: totrans-192
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Next example, let’s build a product feedback system that:'
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
- en: Receives responses from a form.
  id: totrans-194
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Runs the text through a sentiment classifier.
  id: totrans-195
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Saves all feedback in a Google Sheets spreadsheet.
  id: totrans-196
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: If the sentiment is negative, it triggers an AI agent that generates a personalized
    email response, and, if necessary, offers a 5% discount coupon to prevent customer
    churn.
  id: totrans-197
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 2.2.1 Set up Forms
  id: totrans-198
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Create a new workflow and select “On Form Submission” as the trigger.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
- en: '**Form URL**: This is the link to your form. n8n provides two different URLs,
    one for testing and one for production. Once your workflow is active, you can
    share the **production URL** with users.'
  id: totrans-200
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Authentication**: You can choose whether authentication is required to submit
    the form. In this case, I selected None, so anyone can fill it out.'
  id: totrans-201
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Form Elements**: Create new fields for your form by adding elements. You
    can choose the element type, set a placeholder, and define whether the field is
    required or optional. For this example, I created three fields: Name, Email, and
    Feedback.'
  id: totrans-202
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/336e38150544c6773b3c8c993a5b9a52.png)'
  id: totrans-203
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
- en: Click on “Test Workflow” and fill out the form.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
- en: 'Here is a example of feedback:'
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
- en: '“I’m extremely frustrated with the Bluetooth headset I purchased two weeks
    ago (order #78934562). Not only did it arrive five days late, but the sound quality
    is terrible — there’s a constant static noise during calls, and the battery lasts
    only 2 hours instead of the 8 hours promised in the description. To make matters
    worse, the right volume button has already stopped working. I paid R$299 for a
    product that feels like it’s worth R$50\. This was my first purchase from your
    store, and it will probably be my last.”'
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/3105c4e6eb5984b78ab970b4fafa7f7f.png)'
  id: totrans-208
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
- en: After submitting the form, you can **pin the data** to use it as a reference
    while building the rest of the workflow. This way, you’ll be able to access the
    expected field values during setup.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/0e5696a722754190ff39e4cf8c279340.png)'
  id: totrans-211
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
- en: 2.2.2 Set up Sentiment Analysis
  id: totrans-213
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: For the next node, add **“Sentiment Analysis”**.
  id: totrans-214
  prefs: []
  type: TYPE_NORMAL
- en: Drag the Feedback field from the previous node to the “Text to Analyze” field
    in the sentiment analysis node. Then, choose the categories you want to classify.
    In this case, I used “Positive, Neutral, Negative” — separated by commas.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
- en: Test this step, and the text will be classified into one of the three branches.
    In our example, it was correctly classified under the “Negative Branch”.
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a59ed8ba5dfab273af8f3b9b0945b9c5.png)'
  id: totrans-217
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  id: totrans-218
  prefs: []
  type: TYPE_NORMAL
- en: 2.2.3 Set up Google Sheets
  id: totrans-219
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: First, go to your Google account and create a new spreadsheet in Google Sheets.
    In this example, I’ll append the Name, Email, Feedback, Date, and Sentiment to
    the sheet every time someone submits the form.
  id: totrans-220
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/48b019bf2c55f579f741dbbf5ce7c4eb.png)'
  id: totrans-221
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
- en: Second, in your workflow, add a Google Sheets node as the next step. **Connect
    all branches** from the Sentiment Analysis node to it, since we want to save the
    data regardless of the sentiment.
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
- en: 'Set up the node following this:'
  id: totrans-224
  prefs: []
  type: TYPE_NORMAL
- en: '**Credential to connect with**: Sign in with your Google account.'
  id: totrans-225
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Resource**: Select “Sheet Within Document”.'
  id: totrans-226
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Operation**: Choose an operation like get, create, append, delete, or update
    rows or sheets. For this case, select append.'
  id: totrans-227
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Document**: Select the sheets you created in your account.'
  id: totrans-228
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Sheet**: Choose the sheet where the data will be stored.'
  id: totrans-229
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Mapping Column Mode**: Select manual mapping to ensure the data goes to the
    correct columns. The column names from your sheet will appear here. Drag the corresponding
    fields from previous steps into each one.'
  id: totrans-230
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/df6326cef7e434c0193cf8154b95f4c4.png)'
  id: totrans-231
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  id: totrans-232
  prefs: []
  type: TYPE_NORMAL
- en: 'If you execute this step, the data will be added to your sheet like this:'
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c1cae298cb1dd1718b81c79341acbe6f.png)'
  id: totrans-234
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
- en: 2.2.4 Set Up Agent
  id: totrans-236
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Now for the final part of our workflow! Add an AI Agent node and **connect it
    only to the “Negative”** **output** from the Sentiment Analysis node, since we
    only want the agent to respond to negative feedback.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
- en: Configure it to use the Gemini model and add Gmail as a tool.
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
- en: Since we’ll send an email to the customer, set the operation to **“Send”** and
    drag the **“Email”** field from the form submission into the **“To”** field.
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, here’s an interesting feature that n8n offers: **“Let the model define
    this parameter”** (represented by the sparkles).'
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
- en: This is super useful, it means the agent understands which parameters are needed
    to use that tool, and can decide on its own how to use them based on the input.
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
- en: In this case, we’ll use that option to let the AI decide both the subject and
    the content of the message.
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/14c5bf9de65e29535a3c484d4959e636.png)'
  id: totrans-243
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
- en: 'Finally, open the Agent node:'
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
- en: '**Source for Prompt (User Message)**: Select “Define below”.'
  id: totrans-246
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Prompt (User Message)**: Drag the Feedback field from the form submission
    into this field.'
  id: totrans-247
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Options**: Add a **System Message** and write your prompt there. Choose the
    “Expression” option so you can dynamically insert values from previous steps,
    like I did with the customer’s name below.'
  id: totrans-248
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/9740589cc53ddac725abc21499d3dda1.png)'
  id: totrans-249
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
- en: 'Here is the prompt example:'
  id: totrans-251
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  id: totrans-252
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'Our final workflow will look like this:'
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/7dfd2f0d377d14360d8a5ef28d4683a5.png)'
  id: totrans-254
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  id: totrans-255
  prefs: []
  type: TYPE_NORMAL
- en: Now you can run the workflow to test it. Here’s the email I received. You could
    define a template or provide more detailed instructions to ensure the email is
    more concise and well-structured.
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/fb9d92e86f1038578de40dd7b83fd899.png)'
  id: totrans-257
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
- en: 2.3 Appointment Scheduler Assistant
  id: totrans-260
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'This final example simulates an Appointment Booking Assistant for a nutritionist,
    where the system:'
  id: totrans-261
  prefs: []
  type: TYPE_NORMAL
- en: Interacts naturally with the customer and collects essential information like
    name, email, and whether they want to book an appointment.
  id: totrans-262
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Checks Google Calendar for available time slots.
  id: totrans-263
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Creates the appointment in Google Calendar.
  id: totrans-264
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Sends a confirmation email to the customer.
  id: totrans-265
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Finally, collects feedback about the interaction and saves it in a Google Sheets
    spreadsheet.
  id: totrans-266
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Start by creating a new workflow and selecting **“On Chat Message”** as the
    trigger. Then, add an **“AI Agent”** as the next step in the workflow. Set up
    the model as we did in the previous workflows.
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
- en: 2.3.1 Set up Memory
  id: totrans-268
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Since we’re simulating a chat in this example, we need to add memory to make
    the interaction feel more fluid and natural for the customer.
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
- en: In this example, I used **Simple Memory**, which stores messages **during a
    session** in n8n. No credentials are required, and the memory only lasts for the
    duration of the session. This is a good example of **short-term memory**, as mentioned
    in topic 2.1.2, it’s useful for keeping context during a conversation, but it
    doesn’t persist once the session ends.
  id: totrans-270
  prefs: []
  type: TYPE_NORMAL
- en: There’s also a parameter called “**Context Window Length**“, where you can define
    how many past interactions the model receive as context.
  id: totrans-271
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/9940b9b0f1991121ab5a6ee2848b337f.png)'
  id: totrans-272
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
- en: 2.3.2 Set up Tools
  id: totrans-274
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: I won’t go over the other tools and parameters in detail here, since we already
    covered those concepts in the previous examples. Below is how I configured each
    node.
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/22eff482f7d5d7b2fedcee0ac4b18f6f.png)'
  id: totrans-276
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  id: totrans-277
  prefs: []
  type: TYPE_NORMAL
- en: In this example, we’re letting the model define most of the parameters because
    it needs to take actions dynamically based on the user’s interaction.
  id: totrans-278
  prefs: []
  type: TYPE_NORMAL
- en: Unlike our previous example, here we allow the model to define the **“To”**
    field (the email) — since it will collect that information during the conversation.
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b0b34dedd5d14500bd0f01d690e03a25.png)'
  id: totrans-280
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  id: totrans-281
  prefs: []
  type: TYPE_NORMAL
- en: When creating an event, you can configure **“Additional Fields”** to guide how
    the agent should create it and which details to include. In this case, we’re setting
    the **“Summary”** field so the agent gives the event a name — otherwise, it would
    default to “No title”.
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
- en: 2.3.3 Set up Agent
  id: totrans-283
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The most important part in this workflow is the **system message** — it needs
    to be clear and well-structured so the agent can follow the steps accurately.
  id: totrans-284
  prefs: []
  type: TYPE_NORMAL
