- en: 'Empirical Mode Decomposition: The Most Intuitive Way to Decompose Complex Signals
    and Time Series'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/preprocessing-signal-data-with-empirical-mode-decomposition/](https://towardsdatascience.com/preprocessing-signal-data-with-empirical-mode-decomposition/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1763695848038" class="mdspan-comment">Are you struggling</mdspan>
    to analyze your time series as a data scientist?
  prefs: []
  type: TYPE_NORMAL
- en: Have you ever wondered whether signal processing could make your life easier?
  prefs: []
  type: TYPE_NORMAL
- en: If yes — stay with me. This article is made for you. 🙂
  prefs: []
  type: TYPE_NORMAL
- en: 'Working with real-world time series can be… painful. Financial curves, ECG
    traces, neural signals: they often look like chaotic spikes with no structure
    at all.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Working with real-world time series can be… painful. Financial curves, ECG
    traces, neural signals: they often look like chaotic spikes with no structure
    at all.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Working with real-world time series can be… painful. Financial curves, ECG
    traces, neural signals: they often look like chaotic spikes with no structure
    at all.'
  prefs: []
  type: TYPE_NORMAL
- en: 'In data science, we tend to rely on classical statistical preprocessing: seasonal
    decomposition, detrending, smoothing, moving averages… These techniques are useful,
    but they come with strong assumptions that are rarely valid in practice. And when
    those assumptions fail, your machine learning model might underperform or not
    generalize.'
  prefs: []
  type: TYPE_NORMAL
- en: Today, we’ll explore a family of methods that are rarely taught in data-science
    training, yet they can completely transform how you work with time data.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: On Today’s Menu 🍔
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 🍰 Why traditional methods struggle with real-world time series
  prefs: []
  type: TYPE_NORMAL
- en: 🍛 How signal-processing tools can help
  prefs: []
  type: TYPE_NORMAL
- en: 🍔 How Empirical Mode Decomposition (EMD) works and where it fails
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: The “classic” preprocessing techniques I mentioned above are good starting points,
    but as i said they rely on fixed, defined assumptions about how a signal should
    behave.
  prefs: []
  type: TYPE_NORMAL
- en: Most of them assume that the signal is stationary, meaning its statistical properties
    (mean, variance, spectral content) stay constant over time.
  prefs: []
  type: TYPE_NORMAL
- en: 'But in reality, most real signals are:'
  prefs: []
  type: TYPE_NORMAL
- en: '**non-stationary** (their frequency content evolves)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**non-linear** (they cannot be explained by simple additive components)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**noisy**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**mixed with multiple oscillations at once**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: So… what exactly is a “signal”?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A signal is simply any quantity that varies over time (what we usually call
    a *time series* in data science).
  prefs: []
  type: TYPE_NORMAL
- en: 'Some examples:'
  prefs: []
  type: TYPE_NORMAL
- en: ❤️ **ECG or EEG** — biomedical/brain signals
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 🌋 **Seismic activity** — geophysics
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 🖥️ **CPU usage** — system monitoring
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 💹 **Stock prices, volatility, order flow** — finance
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 🌦️ **Temperature or humidity** — climate science
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 🎧 **Audio waveforms** — speech & sound analysis
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/a316705429ccfaceff83f1984030d5bc.png)'
  prefs: []
  type: TYPE_IMG
- en: '**Figure 1:** Example of Magnetoencephalography (MEG) signal data. (Image by
    author)'
  prefs: []
  type: TYPE_NORMAL
- en: Signals are everywhere. And almost all of them violate the assumptions of classical
    time-series models.
  prefs: []
  type: TYPE_NORMAL
- en: They are rarely “clean.” What i mean is that a single signal is usually a mixture
    of several processes happening at the same time.
  prefs: []
  type: TYPE_NORMAL
- en: 'Inside one signal, you can often find:'
  prefs: []
  type: TYPE_NORMAL
- en: '**slow trends**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**periodic oscillations**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**short bursts**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**random noise**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**hidden rhythms you can’t see directly**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 👉 Now imagine you could separate all of these components — *directly from the
    data* — without assuming stationarity, without specifying frequency bands, and
    without forcing the signal into a predefined basis.
  prefs: []
  type: TYPE_NORMAL
- en: That’s the promise of **data-driven signal decomposition**.
  prefs: []
  type: TYPE_NORMAL
- en: 'This article is Part 1 of a 3-article series on adaptive decomposition:'
  prefs: []
  type: TYPE_NORMAL
- en: '**EMD — Empirical Mode Decomposition** *(today)*'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**VMD — Variational Mode Decomposition** *(next)*'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**MVMD — Multivariate VMD** *(next)*'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Each method is more powerful and more stable than the previous one — and by
    the end of the series, you’ll understand how signal-processing methods can extract
    clean, interpretable components.
  prefs: []
  type: TYPE_NORMAL
- en: Empirical Mode Decomposition
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Empirical Mode Decomposition was introduced by Huang et al. (1998) as part of
    the Hilbert–Huang Transform.
  prefs: []
  type: TYPE_NORMAL
- en: 'Its goal is simple but powerful: take a signal and split it into a set of clean
    oscillatory components, called Intrinsic Mode Functions (IMFs).'
  prefs: []
  type: TYPE_NORMAL
- en: Each IMF corresponds to an oscillation present in your signal, from the fastest
    to the slowest trends.
  prefs: []
  type: TYPE_NORMAL
- en: 'Take a look at Figure 2 below:'
  prefs: []
  type: TYPE_NORMAL
- en: At the top, you see the original signal.
  prefs: []
  type: TYPE_NORMAL
- en: Below it, you see several IMFs — each one capturing a different “layer” of oscillation
    hidden inside the data.
  prefs: []
  type: TYPE_NORMAL
- en: '**IMF₁** contains the fastest variations'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**IMF₂** captures a slightly slower rhythm'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: …
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The last IMF + residual represent the slow trend or baseline
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Some IMFs will be useful for your machine learning task; others may correspond
    to noise, artifacts, or irrelevant oscillations.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/bfcf997ef91b8c562c63616dbc98628f.png)'
  prefs: []
  type: TYPE_IMG
- en: '**Figure 2:** Original signal (top) and 5 IMFs (bottom), ordered from high-frequency
    to low-frequency components. (Image by author)'
  prefs: []
  type: TYPE_NORMAL
- en: What is the Math behind EMD?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Any signal x(t) is decomposed by EMD as:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/6be9ab6e046b0581bacd4df6f7c7aaa4.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Where:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Ci(t)** are the **Intrinsic Mode Functions (IMFs)**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**IMF₁** captures the **fastest oscillations**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**IMF₂** captures a **slower oscillation**, and so on…'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**r(t)** is the **residual** — the slow trend or baseline'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Adding all IMFs + the residual reconstructs the original signal exactly**.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: An IMF is a *clean oscillation* obtained directly from the data.
  prefs: []
  type: TYPE_NORMAL
- en: 'It must satisfy two simple properties:'
  prefs: []
  type: TYPE_NORMAL
- en: '**The number of zero crossings ≈ the number of extrema**'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: → The oscillation is well-behaved.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**The mean of the upper and lower envelopes is approximately zero**'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: → The oscillation is locally symmetric, with no long-term information.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: These two rules make IMFs fundamentally **data-driven** and **adaptive** unlike
    Fourier or wavelets, which force the signal into predetermined shapes.
  prefs: []
  type: TYPE_NORMAL
- en: The intuition behind the EMD Algorithm
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The EMD algorithm is surprisingly intuitive. Here’s the extraction loop:'
  prefs: []
  type: TYPE_NORMAL
- en: Start with your signal
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Find all local maxima and minima
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Interpolate them to form an upper and a lower envelope
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: (see Figure 3)
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Compute the mean of both envelopes
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Subtract this mean from the signal
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**→** This gives you a “candidate IMF.”'
  prefs: []
  type: TYPE_NORMAL
- en: '6\. Then check the two IMF conditions:'
  prefs: []
  type: TYPE_NORMAL
- en: Does it have the same number of zero crossings and extrema?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Is the mean of its envelopes approximately zero?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If **yes** → You have extracted **IMF₁**.
  prefs: []
  type: TYPE_NORMAL
- en: If **no** → You repeat the process (called *sifting*) until it meets the criteria.
  prefs: []
  type: TYPE_NORMAL
- en: '7\. Once you obtain IMF₁ (the fastest oscillation):'
  prefs: []
  type: TYPE_NORMAL
- en: '**You subtract it from the original signal**,'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The remainder becomes the **new signal**,
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: And you repeat the process to extract IMF₂, IMF₃, …
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This continues until there is no meaningful oscillation left.
  prefs: []
  type: TYPE_NORMAL
- en: What remains is the **residual trend r(t)**.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/bce0ac7e5ff551bd6b04015f7891fd4f.png)'
  prefs: []
  type: TYPE_IMG
- en: '**Figure 3:** One iteration of the EMD. Top: Original signal (blue). Middle:
    Upper and lower envelopes (red). Bottom: Local mean (black). (Image by author)'
  prefs: []
  type: TYPE_NORMAL
- en: EMD in Practice
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: To really understand how EMD works, let’s create our own synthetic signal.
  prefs: []
  type: TYPE_NORMAL
- en: 'We’ll mix three components:'
  prefs: []
  type: TYPE_NORMAL
- en: A low-frequency oscillation (around 5 Hz)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A high-frequency oscillation (around 30 Hz)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A bit of random white noise
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Once everything is summed into one single messy signal, we’ll apply the EMD
    method.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/a051dcab52083382ed7a7e036ddeffef.png)'
  prefs: []
  type: TYPE_IMG
- en: '**Figure 4:** A Synthetic Signal Containing Multiple Frequencies. (Image by
    author)'
  prefs: []
  type: TYPE_NORMAL
- en: 'An important detail:'
  prefs: []
  type: TYPE_NORMAL
- en: '**EMD automatically chooses the number of IMFs.**'
  prefs: []
  type: TYPE_NORMAL
- en: 'It keeps decomposing the signal until a *stopping criterion* is reached — typically
    when:'
  prefs: []
  type: TYPE_NORMAL
- en: no more oscillatory structure can be extracted
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: or the residual becomes a monotonic trend
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: or the sifting process stabilizes
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: (You can also set a maximum number of IMFs if needed, but the algorithm naturally
    stops on its own.)
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/efb5ada25d7dfaf42033dfffd5af62bf.png)'
  prefs: []
  type: TYPE_IMG
- en: '**Figure 5:** EMD Decomposition of the Synthetic Signal. (Image by author)'
  prefs: []
  type: TYPE_NORMAL
- en: EMD Limitations
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'EMD is powerful, but it has several weaknesses:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Mode mixing:** different frequencies can end up in the same IMF.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Oversplitting:** EMD decides the number of IMFs on its own and can extract
    too many.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Noise sensitivity:** small noise changes can completely alter the IMFs.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**No solid mathematical foundation:** results are not guaranteed to be stable
    or unique.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Because of these limitations, several improved versions exist (EEMD, CEEMDAN),
    but they remain empirical.
  prefs: []
  type: TYPE_NORMAL
- en: This is exactly why methods like **VMD** were created — and this is what we’ll
    explore in the next article of this series.
  prefs: []
  type: TYPE_NORMAL
