- en: '* * *'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'How the agent learns which options are worthwhile: Estimating Q-values'
  id: totrans-92
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 智能体如何学习哪些选项是值得的：估计 Q 值
- en: For an agent to make good decisions, it must estimate how good each individual
    arm is. It needs to find out which arm will bring the highest reward in the long
    term.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 为了让智能体做出好的决策，它必须估计每个单独臂的好坏。它需要找出哪个臂在长期内会带来最高的奖励。
- en: However, the agent does not know the true reward distribution.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，智能体并不知道真正的奖励分布。
- en: This means the agent must estimate the average reward of each arm based on experience.
    The more often an arm is drawn, the more reliable this estimate becomes.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着智能体必须根据经验估计每个臂的平均奖励。一个臂被抽取的次数越多，这个估计就越可靠。
- en: 'We use an estimated value Q(a) for this:'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用估计值 Q(a) 来实现这一点：
- en: Q(a) ≈ expected reward if we choose arm a
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: Q(a) ≈ 如果我们选择臂 a 的预期奖励
- en: 'Our aim here is for our estimated value Q[t](a) to get better and better. So
    good until it comes as close as possible to the true value q[∗](a):'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在这里的目标是让我们的估计值 Q[t](a) 不断改进。直到它尽可能接近真实值 q[∗](a)：
- en: '![](../Images/53f6cdf8165695b040aa4088b8ae7cfa.png)'
  id: totrans-99
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/53f6cdf8165695b040aa4088b8ae7cfa.png)'
- en: The agent wants to learn from his experience in such a way that his estimated
    valuation Q[t](a) corresponds in the long run to the average profit of arm a in
    the long term.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 智能体想要通过他的经验学习，使得他的估计估值 Q[t](a) 在长期内与臂 a 的平均利润相对应。
- en: 'Let’s look again at our simple restaurant example:'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们再次看看我们的简单餐厅例子：
- en: We imagine that we want to find out how good a particular café is. Every time
    we go there, we get some feedback by giving it 3, 4 or 5 stars, for example. Our
    goal is that the perceived average will eventually match the real average that
    we would get if we went infinitely often.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 我们想象我们想要找出一家特定咖啡馆的好坏。每次我们去那里，我们都会通过给它 3、4 或 5 星的评价来获得一些反馈。我们的目标是感知的平均值最终会与如果我们无限次去那里所得到的真实平均值相匹配。
- en: 'There are two basic ways in which an agent calculates this Q value:'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 代理计算这个 Q 值有两种基本方法：
- en: '![Methods (Sample average & Incremental update) to estimate Q-Values in Multi-Armed
    Bandits and Reinforcement Learning](../Images/d539a053b6252fa66772e4cacd55c834.png)'
  id: totrans-104
  prefs: []
  type: TYPE_IMG
  zh: '![在多臂老虎机和强化学习中估计 Q 值的方法（样本平均和增量更新）](../Images/d539a053b6252fa66772e4cacd55c834.png)'
- en: Visualization by the author.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 作者可视化。
- en: Method 1 – Sample average method
  id: totrans-106
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 方法 1 – 样本平均法
- en: This method calculates the average of the observed rewards and is actually as
    simple as it sounds.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法计算观察到的奖励的平均值，实际上就像它听起来那么简单。
- en: All previous rewards for this arm are looked at and the average is calculated.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 看看这个臂的所有以前奖励，并计算平均值。
- en: '![](../Images/a092b8651eb86cd99155c726d28d5f0f.png)'
  id: totrans-109
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a092b8651eb86cd99155c726d28d5f0f.png)'
- en: 'n: Number of times arm a was chosen'
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'n: 臂 a 被选择次数'
- en: 'R[i]: Reward on the i-th time'
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'R[i]: 第 i 次的奖励'
- en: The advantage of this method is that it is simple and intuitive. And it is statistically
    correct for stable, stationary problems.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法的优点是简单直观。对于稳定、静态问题，它在统计上是正确的。
- en: The disadvantage is that it reacts too slowly to changes. Especially in non-stationary
    environments, where conditions shift over time.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 其缺点是它对变化的反应太慢。特别是在非静态环境中，条件会随着时间的推移而变化。
- en: 'For example, imagine a music recommendation system: A user might suddenly develop
    a new taste. The user used to prefer rock, but now they listen to jazz. If the
    system keeps averaging over all past preferences, it reacts very slowly to this
    change.'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，想象一个音乐推荐系统：一个用户可能会突然发展出新的品味。用户以前喜欢摇滚，但现在他们听爵士乐。如果系统继续对所有过去的偏好进行平均，它对这种变化的反应会非常慢。
- en: Similarly, in the mult-armed bandit setting, if arm 3 suddenly starts giving
    much better rewards from round 100 onwards, the running average will be too sluggish
    to reflect that. The early data still dominates and hides the improvement.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 类似地，在多臂老虎机设置中，如果臂 3 从第 100 轮开始突然开始提供更好的奖励，运行平均数将太慢，无法反映这一点。早期数据仍然占主导地位，掩盖了改进。
- en: Method 2 – Incremental Implementation
  id: totrans-116
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 方法 2 – 增量实现
- en: 'Here the Q value is adjusted immediately with each new reward – without saving
    all previous data:'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，Q 值会随着每个新的奖励立即调整——而不需要保存所有以前的数据：
- en: '![](../Images/4d57ae3dd07776c5ef8aeb9ee2308daa.png)'
  id: totrans-118
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/4d57ae3dd07776c5ef8aeb9ee2308daa.png)'
- en: 'α: Learning rate (0 < α\alphaα ≤ 1)'
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'α: 学习率 (0 < α ≤ 1)'
- en: 'R[n]: Newly observed reward'
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'R[n]: 新观察到的奖励'
- en: 'Q[n](a): Previous estimated value'
  id: totrans-121
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'Q[n](a): 之前的估计值'
- en: 'Q[n+1]: Updated estimated value'
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 'Q[n+1]: 更新后的估计值'
- en: If the environment is stable and rewards don’t change, the sample average method
    works best. But if things change over time, the incremental method with a constant
    learning rate α adapts more quickly.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 如果环境稳定且奖励不改变，样本平均法效果最佳。但如果随着时间的推移事情发生变化，具有恒定学习率 α 的增量方法适应得更快。
- en: '![Before Reinforcement Learning: Understand the Multi-Armed Bandit](../Images/ade6fc36e9308282397f99b1cd5fa43f.png)'
  id: totrans-124
  prefs: []
  type: TYPE_IMG
  zh: '![在强化学习之前：理解多臂老虎机](../Images/ade6fc36e9308282397f99b1cd5fa43f.png)'
- en: Own visualization — Illustrations from [unDraw.com](https://undraw.com/).
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 自行可视化 — 来自 [unDraw.com](https://undraw.com/) 的插图。
- en: 'Final Thoughts: What do we need it for?'
  id: totrans-126
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最后的想法：我们用它来做什么？
- en: Multi-armed bandits are the basis for many real-world applications such as recommendation
    engines or online advertising.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 多臂老虎机是许多现实世界应用的基础，例如推荐引擎或在线广告。
- en: 'At the same time, it’s the perfect stepping stone into reinforcement learning.
    It teaches us the mindset: Learning through feedback, acting under uncertainty
    and balancing exploration and exploitation.'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 同时，这也是进入强化学习的完美垫脚石。它教会我们这种心态：通过反馈学习，在不确定性下行动，平衡探索和利用。
- en: 'Technically, multi-armed bandits are a simplified form of Reinforcement Learning:
    There are no states, no future planning, but only the rewards right now. But the
    logic behind them shows up again and again in advanced methods like Q-learning,
    policy gradients, and deep reinforcement learning.'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 从技术上讲，多臂老虎机是强化学习的一种简化形式：没有状态，没有未来规划，只有现在的奖励。但它们背后的逻辑在 Q 学习、策略梯度以及深度强化学习等高级方法中反复出现。
