- en: 'Simple Guide to Multi-Armed Bandits: A Key Concept Before Reinforcement Learning'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 多臂老虎机简单指南：强化学习前的关键概念
- en: 原文：[https://towardsdatascience.com/simple-guide-to-multi-armed-bandits-a-key-concept-before-reinforcement-learning/](https://towardsdatascience.com/simple-guide-to-multi-armed-bandits-a-key-concept-before-reinforcement-learning/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/simple-guide-to-multi-armed-bandits-a-key-concept-before-reinforcement-learning/](https://towardsdatascience.com/simple-guide-to-multi-armed-bandits-a-key-concept-before-reinforcement-learning/)
- en: <mdspan datatext="el1752520606550" class="mdspan-comment">How can an algorithm</mdspan>
    make smart choices when it starts out knowing nothing and can only learn through
    trial and error?
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1752520606550" class="mdspan-comment">算法如何做出明智的选择，当它一开始一无所知，只能通过试错来学习时？</mdspan>
- en: 'This is exactly what one of the simplest but most important models in reinforcement
    learning is all about:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 这正是强化学习中最简单但最重要的模型所关注的内容：
- en: A multi-armed bandit is a simple model for learning by trial and error.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 多臂老虎机是一个简单的试错学习模型。
- en: Just like we do.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 就像我们一样。
- en: We’ll explore why the decision between trying something new (exploration) and
    sticking to what works (exploitation) is trickier than it seems. And what this
    has to do with AI, online ads and A/B testing.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将探讨为什么在尝试新事物（探索）和坚持有效的方法（利用）之间的决策比看起来要复杂。以及这与人工智能、在线广告和A/B测试有什么关系。
- en: '![This image shows the Multi-Armed Bandit Problem.](../Images/50d32069e07e60b61233a8abc778db73.png)'
  id: totrans-7
  prefs: []
  type: TYPE_IMG
  zh: '![此图像展示了多臂老虎机问题。](../Images/50d32069e07e60b61233a8abc778db73.png)'
- en: Visualization by ChatGPT 4o.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 由ChatGPT 4o进行可视化。
- en: Why is it important to understand this concept?
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么理解这个概念很重要？
- en: 'The multi-armed bandit introduces one of the core dilemmas of reinforcement
    learning: How to make good decisions under uncertainty.'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 多臂老虎机引入了强化学习的一个核心困境：如何在不确定的情况下做出好的决策。
- en: It is not only relevant for AI, data science and behavioral models, but also
    because it reflects how we humans learn through trial and error.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 它不仅与人工智能、数据科学和行为模型相关，而且因为它反映了我们人类如何通过试错来学习。
- en: What machines learn by trial and error is not so different from what we humans
    do intuitively.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 通过试错学习，机器所学习的内容与我们人类直觉行为并没有太大的不同。
- en: The difference?
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 差别在哪里？
- en: Machines do it in a mathematically optimized way.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 机器以数学优化的方式做到这一点。
- en: '**Let’s imagine a simple example:**'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: '**让我们想象一个简单的例子：**'
- en: We are standing in front of a slot machine. This machine has 10 arms and each
    of these arms has an unknown chance of winning.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 我们站在一台老虎机前。这台机器有10只手臂，每只手臂都有未知的中奖概率。
- en: Some levers give higher rewards, others lower ones.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 一些杠杆给出更高的奖励，而另一些则给出较低的奖励。
- en: We can pull the levers as often as we like, but our goal is to win as much as
    possible.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以随心所欲地拉动杠杆，但我们的目标是赢得尽可能多的东西。
- en: This means that we have to find out which arm is the best (= yields the most
    profit) without knowing from the start which one it is.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着我们必须找出哪只手臂是最好的（=带来最大利润），而一开始并不知道哪一个是。
- en: 'The model is very reminiscent of what we often experience in everyday life:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 这个模型非常类似于我们在日常生活中经常经历的事情：
- en: We test out different strategies. At some point, we use the one that brings
    us the most pleasure, enjoyment, money, etc. Whatever it is that we are aiming
    for.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 我们测试不同的策略。在某个时候，我们使用那个能给我们带来最大快乐、享受、金钱等的东西。无论我们追求的是什么。
- en: In behavioral psychology, we speak of trial-and-error learning.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 在行为心理学中，我们谈论试错学习。
- en: 'Or we can also think of reward learning in cognitive psychology: Animals in
    a laboratory experiment find out over time at which lever there is food because
    they get the greatest gain at that particular lever.'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 或者我们也可以从认知心理学的角度思考奖励学习：在实验室实验中，动物随着时间的推移会发现哪个杠杆有食物，因为它们在那个特定的杠杆上获得最大的收益。
- en: '**Now back to the concept of multi-armed bandits:**'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: '**现在回到多臂老虎机的概念：**'
- en: It serves as an introduction to decision-making under uncertainty and is a cornerstone
    for understanding reinforcement learning.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 它作为不确定条件下决策的介绍，是理解强化学习的基础。
- en: 'I wrote about reinforcement learning (RL) in detail in the last article “[Reinforcement
    Learning Made Simple: Build a Q-Learning Agent in Python](https://towardsdatascience.com/reinforcement-learning-made-simple-build-a-q-learning-agent-in-python/)”.
    But at its core, it’s about an agent learning to make good decisions through trial
    and error. It is a subfield of machine learning. The agent finds itself in an
    environment, decides on certain actions and receives rewards or penalties for
    them. The goal of the agent is to develop a strategy (policy) that maximizes the
    long-term overall benefit.'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 我在上一篇文章中详细介绍了强化学习（RL），“[强化学习简单化：用Python构建Q学习智能体](https://towardsdatascience.com/reinforcement-learning-made-simple-build-a-q-learning-agent-in-python/)”。但它的核心是关于一个智能体通过试错学习做出好的决策。它是机器学习的一个子领域。智能体发现自己处于一个环境中，决定采取某些行动，并因这些行动而获得奖励或惩罚。智能体的目标是制定一个策略（策略），以最大化长期的整体利益。
- en: '**So we have to find out in the multi-armed bandits:**'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: '**所以我们必须在多臂老虎机中找出：**'
- en: Which levers are worthwhile in the long term?
  id: totrans-28
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 哪些杠杆在长期内是值得的？
- en: When should we exploit a lever further (exploitation)?
  id: totrans-29
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们应该在什么时候进一步利用杠杆（利用）？
- en: When should we try out a new lever (exploration)?
  id: totrans-30
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我们应该在什么时候尝试新的杠杆（探索）？
- en: 'These last two questions leads us directly to the central dilemma of reinforcement
    learning:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 这两个问题直接引出了强化学习的核心困境：
- en: 'Central dilemma in Reinforcement Learning: Exploration vs. Exploitation'
  id: totrans-32
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 强化学习中的核心困境：探索与利用
- en: Have you ever held on to a good option? Only to find out later that there’s
    a better one? That’s exploitation winning over exploration.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 你有没有一直坚持一个好的选择？结果发现还有更好的一个？这就是利用胜过探索。
- en: 'This is the core problem of learning through experience:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 这是通过经验学习的核心问题：
- en: 'Exploration: We try something new in order to learn more. Maybe we discover
    something better. Or maybe not.'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 探索：我们尝试新事物以获得更多信息。也许我们会发现更好的东西。也许不会。
- en: 'Exploitation: We use the best of what we have learned so far. With the aim
    of gaining as much reward as possible.'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 利用：我们使用我们迄今为止学到的最好的东西。目的是获得尽可能多的奖励。
- en: The problem with this?
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 这有什么问题？
- en: We never know for sure whether we have already found the best option.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 我们永远不知道我们是否已经找到了最佳选项。
- en: Choosing the arm with the highest reward so far means relying on what we know.
    This is called exploitation. However, if we commit too early to a seemingly good
    arm, we may overlook an even better option.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 选择到目前为止奖励最高的臂意味着依赖我们所知道的信息。这被称为利用。然而，如果我们过早地承诺一个看似好的臂，我们可能会忽略一个更好的选择。
- en: Trying a different or rarely used arm gives us new information. We gain more
    knowledge. This is exploration. We might find a better option. But it could also
    be that we find a worse option.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试不同的或很少使用的臂给我们带来新的信息。我们获得了更多的知识。这是探索。我们可能会找到一个更好的选择。但也可能找到一个更差的选择。
- en: That is the dilemma at the heart of reinforcement learning.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是强化学习核心的困境。
- en: '![If we only exploit too early, we may miss out on the better arms (here arm
    3 instead of arm 1). However, too much exploration also leads to less overall
    yield (if we already know that arm 1 is good).](../Images/3b31232140e267b155353e3cd906f473.png)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![如果我们过早地利用，我们可能会错过更好的选择（这里指臂3而不是臂1）。然而，过多的探索也会导致整体产量减少（如果我们已经知道臂1是好的）](../Images/3b31232140e267b155353e3cd906f473.png)'
- en: Visualization by the author.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 作者的视觉化。
- en: 'What we can conclude from this:'
  id: totrans-44
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 我们可以从中得出什么结论：
- en: If we only exploit too early, we may miss out on the better arms (here arm 3
    instead of arm 1). However, too much exploration also leads to less overall yield
    (if we already know that arm 1 is good).
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们过早地利用，我们可能会错过更好的选择（这里指臂3而不是臂1）。然而，过多的探索也会导致整体产量减少（如果我们已经知道臂1是好的）。
- en: 'Let me explain the same thing again in non-techy language (but somewhat simplified):'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 让我用非技术性的语言（但有些简化）再次解释同样的事情：
- en: Let’s imagine we know a good restaurant. We’ve gone to the same restaurant for
    10 years because we like it. But what if there is a better, cheaper place just
    around the corner? And we have never tried it? If we never try something new,
    we’ll never find out.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们想象我们知道一家好餐厅。我们因为喜欢它，已经去了10年。但如果我们附近有一个更好、更便宜的地方呢？而我们从未尝试过？如果我们从不尝试新事物，我们就永远不会发现。
- en: '**Interestingly, this isn’t just a problem in AI. It is well known in psychology
    and economics too:**'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: '**有趣的是，这不仅仅是一个AI问题。在心理学和经济学中也很知名：**'
- en: The exploration vs. exploitation dilemma is a prime example of decision-making
    under uncertainty.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 探索与利用的困境是决策不确定性的一个典型例子。
- en: The psychologist and Nobel Prize winner [Daniel Kahnemann and his colleague
    Amos Tversky](https://en.wikipedia.org/wiki/Prospect_theory) have shown that people
    often do not make rational decisions when faced with uncertainty. Instead, we
    follow heuristics, i.e. mental shortcuts.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 心理学家和诺贝尔奖获得者[丹尼尔·卡尼曼（Daniel Kahnemann）和他的同事阿莫斯·特沃斯基（Amos Tversky）](https://en.wikipedia.org/wiki/Prospect_theory)
    已经表明，当人们面对不确定性时，往往不会做出理性的决策。相反，我们遵循启发式方法，即心理捷径。
- en: 'These shortcuts often reflect either habit (=exploitation) or curiosity (=exploration).
    It is precisely this dynamic that is also visible in the Multi-Armed Bandit:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 这些捷径通常反映了习惯（=利用）或好奇心（=探索）。这种动态在多臂老虎机中也是可见的：
- en: Do we play it safe (=known arm with high reward)
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们是否采取保守策略（=具有高奖励的已知臂）？
- en: or
  id: totrans-53
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 或者
- en: do we risk something new (=new arm with unknown reward)?
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们是否冒险尝试新事物（=具有未知奖励的新臂）？
- en: Why does this matter for reinforcement learning?
  id: totrans-55
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 这为什么对强化学习很重要？
- en: We face the dilemma between exploration vs. exploitation everywhere in reinforcement
    learning (RL).
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 在强化学习（RL）中，我们面临着探索与利用的困境。
- en: An RL agent must constantly decide whether it should stick with what has worked
    best so far (=exploitation) or should try something new to discover even better
    strategies (=exploration).
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 强化学习代理必须不断决定是坚持到目前为止表现最好的策略（=利用）还是尝试新事物以发现更好的策略（=探索）。
- en: 'You can see this trade-off in action in recommendation systems: Should we keep
    showing users content they already like or risk suggesting something new they
    might love?'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在推荐系统中看到这种权衡：我们应该继续向用户展示他们已经喜欢的内容，还是冒险建议他们可能喜欢的新内容？
- en: And what strategies are there to select the best arm? Action selection strategies
  id: totrans-59
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 那么有哪些策略来选择最佳臂？动作选择策略
- en: Action selection strategies determine how an agent decides which arm to select
    in the next step. In other words, how an agent deals with the exploration vs.
    exploitation dilemma.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 动作选择策略决定了代理如何决定在下一步选择哪个臂。换句话说，代理如何处理探索与利用的困境。
- en: 'Each of the following strategies (also policies/rules) answers one simple question:
    How do we choose the next action when we don’t know for sure what’s best?'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 以下每种策略（也是策略/规则）都回答了一个简单的问题：当我们不确定什么是最优的时候，我们如何选择下一个动作？
- en: Strategy 1 – Greedy
  id: totrans-62
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 策略 1 – Greedy
- en: 'This is the simplest strategy: We always choose the arm with the highest estimated
    reward (= the highest Q(a)). In other words, always go for what seems best right
    now.'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 这是 simplest 策略：我们总是选择估计奖励最高的臂（即最高的 Q(a)）。换句话说，总是选择现在看起来最好的。
- en: The advantage of this strategy is that the reward is maximized in the short
    term and that the strategy is very simple.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 这种策略的优势在于短期内的奖励最大化，而且策略非常简单。
- en: The disadvantage is that there is no exploration. No risk is taken to try something
    new, because the current best always wins. The agent might miss better options
    that simply haven’t discovered yet.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 缺点是缺乏探索。没有冒险去尝试新事物，因为当前的最佳选择总是获胜。代理可能会错过尚未发现的更好选项。
- en: 'The formal rule is as follows:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 正式规则如下：
- en: '![](../Images/0ac147d9903c28d428ff1c23dbf2df81.png)'
  id: totrans-67
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/0ac147d9903c28d428ff1c23dbf2df81.png)'
- en: 'Let’s have a look at a simplified example:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看一个简化的例子：
- en: Imagine we try two new pizzerias. And the second one is quite good. From then
    on, we only go back to that one, even though there are six more we’ve never tried.
    Maybe we’re missing out on the best Pizzas in town. But we’ll never know.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下，我们尝试了两家新的披萨店。第二家相当不错。从那时起，我们只去那家，即使还有六家我们从未尝试过。也许我们错过了镇上最好的披萨。但我们永远不会知道。
- en: 'Strategy 2 – ε-Greedy:'
  id: totrans-70
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 策略 2 – ε-Greedy：
- en: 'Instead of always picking the best-known option, we allow in this strategy
    some randomness:'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 与总是选择已知的最佳选项不同，在这个策略中，我们允许一些随机性：
- en: With probability ε, we explore (try something new).
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 以概率 ε，我们探索（尝试新事物）。
- en: With probability 1-ε, we exploit (stick with the current best).
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 以概率 1-ε，我们利用（坚持当前的最佳选择）。
- en: This strategy deliberately mixes chance into the decision and is therefore practical
    and often effective.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 这种策略故意将机会混合到决策中，因此实用且通常有效。
- en: The higher ε is chosen, the more exploration happens.
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ε值越高，探索越多。
- en: The lower ε is chosen, the more we exploit what we already know.
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ε 越低，我们利用已知信息的程度就越高。
- en: For example, if ε = 0.1, exploration occurs in 10% of cases, while exploitation
    occurs in 90% of cases.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果 ε = 0.1，10% 的情况下发生探索，而 90% 的情况下发生利用。
- en: The advantage of ε-Greedy is that it is easy to implement and provides good
    basic performance.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: ε-Greedy的优势在于易于实现，并提供良好的基本性能。
- en: 'The disadvantage is that choosing the right ε is difficult: If ε is chosen
    too large, a lot of exploration takes place and the loss of rewards can be too
    great. If ε is too small, there is little exploration.'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 缺点是选择正确的 ε 很困难：如果 ε 选择得太大，就会进行大量的探索，奖励损失可能太大。如果 ε 太小，探索就很少。
- en: 'If we stay with the pizza example:'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们继续以披萨为例：
- en: We roll the dice before every restaurant visit. If we get a 6, we try out a
    new pizzeria. If not, we go to the regular pizza.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在每次访问餐厅之前掷骰子。如果我们掷出6，我们就尝试一家新的披萨店。如果不是，我们就去常去的披萨店。
- en: 'Strategy 3 – Optimistic Initial Values:'
  id: totrans-82
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 策略 3 – 乐观初始值：
- en: The point in this strategy is that all Q[0​](a) start with artificially high
    values (e.g. 5.0 instead of 0.0). At the beginning, the agent assumes all options
    are great.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 这种策略的要点是所有 Q[0](a) 都从人工设置的高值（例如 5.0 而不是 0.0）开始。一开始，智能体假设所有选项都是很好的。
- en: This encourages the agent to try everything (exploration). It wants to disprove
    the high initial value. As soon as an action has been tried, the agent sees that
    it is worth less and adjusts the estimate downwards.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 这鼓励智能体尝试一切（探索）。它想要推翻初始的高估值。一旦尝试了一个动作，智能体就会看到它的价值更低，并调整估值向下。
- en: The advantage of this strategy is that exploration occurs automatically. This
    is particularly suitable in deterministic environments where rewards do not change.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 这种策略的优势在于探索是自动发生的。这在奖励不变化的确定性环境中尤其合适。
- en: The disadvantage is that the strategy works poorly if the rewards are already
    high.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 缺点是如果奖励已经很高，这种策略效果不佳。
- en: If we look at the restaurant example again, we would rate each new restaurant
    with 5 stars at the beginning. As we try them, we adjust the ratings based on
    real experience.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们再次看看餐厅例子，我们最初会给每个新餐厅评5星。随着我们尝试它们，我们会根据实际经验调整评分。
- en: To put it simply, Greedy is pure habitual behavior. ε-Greedy is a mixture of
    habit and curiosity behavior. Optimistic Initial Values is comparable to when
    a child initially thinks every new toy is great – until it has tried it out.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 简单来说，贪婪策略是纯粹的习惯性行为。ε-贪婪是习惯和好奇行为的混合。乐观初始值策略可以比作一个孩子最初认为每个新玩具都很棒——直到他尝试过。
- en: '* * *'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '*On my *[*Substack Data Science Espresso*](https://sarahleaschrch.substack.com/)*,
