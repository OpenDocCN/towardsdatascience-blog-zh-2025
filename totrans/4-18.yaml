- en: 'AI Development vs Software Engineering: Key Differences Explained'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/ai-development-vs-software-engineering-key-differences-explained-0709633e81d2/](https://towardsdatascience.com/ai-development-vs-software-engineering-key-differences-explained-0709633e81d2/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Having worked in and led many Artificial Intelligence (AI) and software engineering
    teams, I’ve noticed **major misunderstandings about how these teams work**, in
    particular, the assumption that these processes are the same.
  prefs: []
  type: TYPE_NORMAL
- en: Although some believe that the development of AI is the same as the development
    of standard software or maybe even less complex because "the AI can figure it
    out" – the reality of course is quite different.
  prefs: []
  type: TYPE_NORMAL
- en: This article **discusses the fundamental differences and provides actionable
    ways to help businesses adopt AI effectively**.
  prefs: []
  type: TYPE_NORMAL
- en: Key Differences Between AI and Traditional Software Development
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Firstly, when I discuss AI development I will combine some of the standard approaches
    for **AI, machine learning and data science** since there are many key similarities
    between these, all of which are in contrast to the traditional software development
    process.
  prefs: []
  type: TYPE_NORMAL
- en: 'AI projects are different from traditional software development in terms of
    approach, workflow, and success criteria. The following summaries many of the
    critical differences:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Core Differences - image created by author](../Images/5f3d2df5026938bbf327307100c833a8.png)'
  prefs: []
  type: TYPE_IMG
- en: Core Differences – image created by author
  prefs: []
  type: TYPE_NORMAL
- en: 'Development Lifecycle: Iterative Exploration vs. Linear Execution'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: AI Workflow
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: AI projects follow iterative frameworks (like [CRISP-DM](https://www.datascience-pm.com/crisp-dm-2/),
    which is typically used in data science projects), which emphasise discovery and
    adaptation.
  prefs: []
  type: TYPE_NORMAL
- en: Here I have used a similar workflow to CRISP-DM, but adding an explicit monitoring
    step (which emphasises its importance when developing AI and machine learning
    models). Although this can also be important within data science, in some circumstances
    the output is a set of reports or insights rather than a model.
  prefs: []
  type: TYPE_NORMAL
- en: In the case of an AI model, there is an increased need for monitoring, which
    can then retrigger the need for an updated model (starting the cycle again). The
    need for AI models to be retrained is not a failing of the model, it is a natural
    process to capture new patterns that are prevalent (that may not have existed
    in the data the model was trained on).
  prefs: []
  type: TYPE_NORMAL
- en: '**Problem Definition**: State the objectives of the project in relation to
    business objectives (e.g., "Reduce customer churn by 20%").'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Data Preparation**: Data cleaning, preprocessing and exploration (e.g., how
    to deal with missing values in the sales data).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Model Development**: Experiment with algorithms (for example, neural networks
    versus support vector machines).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Evaluation**: Validate model based on data it has never seen before (and
    optimise hyperparameters).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Deployment**: It is released to production (for example, provide an API for
    real time predictions)'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Monitoring**: Monitor model performance and track any deviations from what
    is expected. Allow for regular model retraining (e.g., quarterly updates).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![AI Development Workflow - image created by author](../Images/bac45cfe36db75b897ea947d74c88ec2.png)'
  prefs: []
  type: TYPE_IMG
- en: AI Development Workflow – image created by author
  prefs: []
  type: TYPE_NORMAL
- en: Software Development Workflow
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Traditional projects follow methodologies such as the Software Development
    Lifecycle (SDLC):'
  prefs: []
  type: TYPE_NORMAL
- en: '**Planning**: Defining the scope, features, costs, and time frames.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Analysis & Design**: Developing UI/UX prototypes and system architecture.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Development**: Developing code (for instance, React for the front end, Node.js
    for the back end).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Testing**: Checking whether it meets the set criteria.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Deployment**: It is released to app stores or servers.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Maintenance**: To fix bugs and make updates available to users'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Software Development Workflow - image created by author](../Images/ad39c2847c4ed1d1661cfad4bf4b8101.png)'
  prefs: []
  type: TYPE_IMG
- en: Software Development Workflow – image created by author
  prefs: []
  type: TYPE_NORMAL
- en: 'Software development follows a less complex flow: the main difference here
    is that the forward progression is continuous compared to the AI workflow where
    at several points in the development it can go back to an earlier stage in the
    process.'
  prefs: []
  type: TYPE_NORMAL
- en: Why AI Projects Demand Iteration
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Problem Definition Uncertainty
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '• **Challenge**: Complex problems are often not easy to define and scope (e.g.,
    fraud detection involves patterns and behaviours that are constantly evolving).'
  prefs: []
  type: TYPE_NORMAL
- en: '• **Solution**: The problem should be refined as the data is investigated (in
    conjunction with the stakeholders).'
  prefs: []
  type: TYPE_NORMAL
- en: Data Uncertainty
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: • **Challenge:** Data flaws or prejudice may not appear until the middle of
    the project (for example, lacking patient demographics data in a healthcare database).
  prefs: []
  type: TYPE_NORMAL
- en: '• **Solution**: Feasibility studies and iterative data audits should be conducted.'
  prefs: []
  type: TYPE_NORMAL
- en: Exploratory Model Development
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: • **Challenge:** There is no single ‘best fit’ algorithm (for instance, a fraud
    detection model might require the use of decision trees at one stage and graph
    neural networks at another)).
  prefs: []
  type: TYPE_NORMAL
- en: '• **Solution**: Multiple approaches should be prototyped in the MVP phases.'
  prefs: []
  type: TYPE_NORMAL
- en: Probabilistic Outcomes
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '• **Challenge**: Models can be brittle with respect to changes in the data
    coming from the real world (for instance, a fraud detection model may not cope
    well with a new type of fraud).'
  prefs: []
  type: TYPE_NORMAL
- en: '• **Solution**: Schedule retraining cycles and monitor performance.'
  prefs: []
  type: TYPE_NORMAL
- en: Recommendations for Success
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 1\. Prioritise Data Strategy Over Immediate Model Building
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**Build Robust Data Infrastructure**:'
  prefs: []
  type: TYPE_NORMAL
- en: Data collection, cleaning and labelling should be automated
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Implement version control systems to track dataset iterations and make sure
    you can reproduce results
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Conduct Pre-Project Audits**:'
  prefs: []
  type: TYPE_NORMAL
- en: Aim to find out any issues within the data before modelling.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 2\. Build Cross-Functional Teams
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Essential Roles**:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Data Engineers**: Design pipelines for scalable data processing.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Data Scientists/AI Engineers:** Design, build and test effective AI/ML models'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Domain Experts**: Provide feedback (e.g., clinicians for healthcare AI).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Break Down Silos**:'
  prefs: []
  type: TYPE_NORMAL
- en: Hold regular meetings between technical teams and business stakeholders to align
    priorities.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 3\. Embrace Phased Development
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Start with an MVP**:'
  prefs: []
  type: TYPE_NORMAL
- en: Focus on a narrow, high-impact use case (e.g., *"Predict equipment failure for
    one production line"*).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Use the results of the MVP to justify further investment.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Iterate Incrementally**:'
  prefs: []
  type: TYPE_NORMAL
- en: Adjust the models based on feedback
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 4\. Plan for Model Decay and Drift
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Monitor Continuously**:'
  prefs: []
  type: TYPE_NORMAL
- en: Track important performance metrics (for example accuracy, latency)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Set automated alerts based on performance (e.g., *"Retrain if precision drops
    below 90%"*).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Budget for Retraining**:'
  prefs: []
  type: TYPE_NORMAL
- en: It should be assumed that models will need to be retrained
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: According to the use case, it may require more or less frequent retraining.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For instance, a fraud detection model will need to be trained regularly to detect
    new patterns
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 5\. Prioritise Explainability and Transparency
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Choose Interpretable Models**:'
  prefs: []
  type: TYPE_NORMAL
- en: Use simpler models (for example decision trees) in regulated industries (such
    as healthcare) unless a highly complex model is justified.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Document Rigorously**:'
  prefs: []
  type: TYPE_NORMAL
- en: Maintain logs of model versions, training data, and hyperparameters
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 6\. Align AI Goals with Business Outcomes
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Avoid "AI for AI’s Sake"**:'
  prefs: []
  type: TYPE_NORMAL
- en: If the solution can be achieved with a similar software solution or a set of
    rules, then pursue the simpler option
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It begins with a clear problem statement linked to business KPIs (for instance,
    "Decrease customer churn by 15%").
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Measure Holistic ROI**:'
  prefs: []
  type: TYPE_NORMAL
- en: Indirect benefits are also included (for instance, customer satisfaction) together
    with accuracy metrics.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 7\. Build Ethical Guardrails Early
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Test for Fairness**:'
  prefs: []
  type: TYPE_NORMAL
- en: There are packages such as [fairlearn](https://fairlearn.org/) or [AIF360](https://aif360.res.ibm.com/)
    to assess the models’ fairness across subgroups, for instance, age, gender, geography.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Compliance Integration**:'
  prefs: []
  type: TYPE_NORMAL
- en: Comply with regulations such as GDPR, EU AI Act from the beginning.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Conclusion: Transforming Uncertainty into Strategic Advantage'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: While AI development and software engineering can often serve different purposes,
    they each have their own strengths and can also complement each other.
  prefs: []
  type: TYPE_NORMAL
- en: Software engineering excels at creating deterministic systems for well defined
    problems, while AI development handles pattern based problems which can not be
    programmed in a conventional manner.
  prefs: []
  type: TYPE_NORMAL
- en: 'The exploratory nature of AI development is not a flaw: it’s simply what’s
    needed to handle complex and uncertain problems.'
  prefs: []
  type: TYPE_NORMAL
- en: For organisations who are new to AI development, success is achieved through
    an understanding and acceptance of the iterative process rather than attempting
    to implement traditional software development approaches.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
