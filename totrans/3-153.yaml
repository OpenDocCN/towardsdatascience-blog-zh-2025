- en: Build Your Own AI Coding Assistant in JupyterLab with Ollama and Hugging Face
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/build-your-own-ai-coding-assistant-in-jupyterlab-with-ollama-and-hugging-face/](https://towardsdatascience.com/build-your-own-ai-coding-assistant-in-jupyterlab-with-ollama-and-hugging-face/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[**Jupyter AI**](https://jupyter-ai.readthedocs.io/en/latest/index.html) brings
    generative [AI capabilities](https://blog.jupyter.org/generative-ai-in-jupyter-3f7174824862)
    right into the <mdspan datatext="el1742588122661" class="mdspan-comment">Jupyter</mdspan>
    interface. Having a local AI assistant ensures privacy, reduces latency, and provides
    offline functionality, making it a powerful tool for developers. In this article,
    we’ll learn how to set up a local AI coding assistant in **JupyterLab** using
    **Jupyter AI**, **Ollama** and **Hugging Face**. By the end of this article, you’ll
    have a fully functional coding assistant in JupyterLab capable of autocompleting
    code, fixing errors, creating new notebooks from scratch, and much more, as shown
    in the screenshot below.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c050eacd680a95bd818ac642f60ca62c.png)'
  prefs: []
  type: TYPE_IMG
- en: Coding assistant in Jupyter Lab via Jupyter AI | Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: '*⚠️ Jupyter AI is still under heavy development, so some features may break.
    As of writing this article, I’ve tested the setup to confirm it works, but expect
    [potential changes](https://github.com/jupyterlab/jupyter-ai) as the project evolves.
    Also the performance of the assistant depends on the model that you select so
    make sure you choose the one that is fit for your use case.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: What is Jupyter AI
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: First things first — what is Jupyter AI? As the name suggests, Jupyter AI is
    a JupyterLab extension for generative AI. This powerful tool transforms your standard
    Jupyter notebooks or JupyterLab environment into a generative AI playground. The
    best part? It also works seamlessly in environments like **Google Colaboratory**
    and **Visual Studio** Code. This extension does all the heavy lifting, providing
    access to a variety of model providers (both open and closed source) right within
    your Jupyter environment.
  prefs: []
  type: TYPE_NORMAL
- en: Installation and Setup
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: '![](../Images/aa1730d2d9bb57c0821b6421bc4ef7b6.png)'
  prefs: []
  type: TYPE_IMG
- en: Flow diagram of the installation process | Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: 'Setting up the environment involves three main components:'
  prefs: []
  type: TYPE_NORMAL
- en: JupyterLab
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The Jupyter AI extension
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Ollama (for Local Model Serving)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Optional] Hugging Face (for [GGUF](https://huggingface.co/docs/hub/en/gguf)
    models)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Honestly, getting the assistant to resolve coding errors is the easy part.
    What is tricky is ensuring all the installations have been done correctly. It’s
    therefore essential you follow the steps correctly.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 1\. Installing the Jupyter AI Extension
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'It’s recommended to create a[**new environment**](https://docs.python.org/3/library/venv.html)
    specifically for Jupyter AI to keep your existing environment clean and organised.
    Once done follow the next steps. Jupyter AI requires **JupyterLab 4.x** or **Jupyter
    Notebook 7+**, so make sure you have the latest version of Jupyter Lab installed​.
    You can install/upgrade JupyterLab with pip or conda:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Next, install the Jupyter AI extension as follows.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 'This is the easiest method for installation as it includes all provider dependencies
    (so it supports Hugging Face, Ollama, etc., out of the box). To date, Jupyter
    AI supports the following [model providers](https://jupyter-ai.readthedocs.io/en/latest/users/index.html#model-providers)
    :'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/dac965bc8a3772c56590beca77aa3252.png)'
  prefs: []
  type: TYPE_IMG
- en: Supported Model providers in Jupyter AI along with the dependencies | Created
    by Author from the [documentation](https://jupyter-ai.readthedocs.io/en/latest/users/index.html#model-providers)
  prefs: []
  type: TYPE_NORMAL
- en: 'If you encounter errors during the Jupyter AI installation, manually install
    Jupyter AI using `pip` without the [all] optional dependency group. This way you
    can control which models are available in your Jupyter AI environment. For example,
    to install Jupyter AI with only added support for Ollama models, use the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: The dependencies depend upon the model providers (see table above).  Next, restart
    your JupyterLab instance. If you see a chat icon on the left sidebar, this means
    everything has been installed perfectly. With Jupyter AI, you can chat with models
    or use inline magic commands directly within your notebooks.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/3d3aed9d44894eefa67dc5e268ceb632.png)'
  prefs: []
  type: TYPE_IMG
- en: Native chat UI in JupyterLab | Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Setting Up Ollama for Local Models
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now that Jupyter AI is installed, we need to configure it with a model. While
    Jupyter AI integrates with Hugging Face models directly, some models [may not
    work properly](https://github.com/jupyterlab/jupyter-ai/issues/576). Instead,
    Ollama provides a more reliable way to load models locally.
  prefs: []
  type: TYPE_NORMAL
- en: '[**Ollama**](https://ollama.com/) is a handy tool for running large language
    models locally. It lets you download pre-configured AI models from its [library](https://ollama.com/library).
    Ollama supports all major platforms (macOS, Windows, Linux)​, so choose the method
    for your OS and download and install it from the official [website](https://ollama.com/download).
    After installation, verify that it is set up correctly by running:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: 'Also, ensure that your Ollama server *must* be running which you can check
    by calling *`ollama serve`* at the terminal:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: If the server is already active, you will see an error like above confirming
    that Ollama is running and in use.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Using models via Ollama
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'Option 1: Using Pre-Configured Models'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Ollama provides a [library](https://ollama.com/library) of pre-trained models
    that you can **download and run locally.** To start using a model, download it
    using the **pull** command. For example, to use **`qwen2.5-coder:1.5b`**, run:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: 'This will download the model in your local environment. To confirm if the model
    has been downloaded, run:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: This will list all the models you’ve downloaded and stored locally on your system
    using Ollama.
  prefs: []
  type: TYPE_NORMAL
- en: 'Option 2: Loading a Custom Model'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: If the model you need isn’t available in Ollama’s library, you can load a custom
    model by creating a [**Model File**](https://github.com/ollama/ollama/blob/main/docs/modelfile.md)
    that specifies the model’s source.For detailed instructions on this process, refer
    to the [Ollama Import Documentation](https://github.com/ollama/ollama/blob/main/docs/import.md).
  prefs: []
  type: TYPE_NORMAL
- en: 'Option 3: Running GGUF Models directly from Hugging Face'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Ollama now supports [**GGUF models directly from the Hugging Face Hub**](https://huggingface.co/docs/hub/en/ollama),
    including both public and private models. This means if you want to use GGUF model
    directly from Hugging Face Hub you can do so without requiring a custom Model
    File as mentioned in Option 2 above.
  prefs: []
  type: TYPE_NORMAL
- en: 'For example, to load a `4-bit quantized Qwen2.5-Coder-1.5B-Instruct model`
    from Hugging Face:'
  prefs: []
  type: TYPE_NORMAL
- en: 1\. First, enable Ollama under your [Local Apps settings](https://huggingface.co/settings/local-apps).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/57782f3dafb31060e0a025d444c22376.png)'
  prefs: []
  type: TYPE_IMG
- en: How to enable Ollama under your [Local Apps settings](https://huggingface.co/settings/local-apps)
    on Hugging Face | Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: 2\. On the model page, choose Ollama from the Use this model dropdown as shown
    below.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c116328f9d828ee122df605a40650d17.png)'
  prefs: []
  type: TYPE_IMG
- en: Accessing GGUF model from HuggingFace Hub via Ollama | Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: Configuring Jupyter AI with Ollama
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: We are almost there. In JupyterLab, open the Jupyter AI **chat interface on
    the sidebar.** At the top of the chat panel or in its settings (gear icon), there
    is a dropdown or field to select the **Model provider** and model ID. Choose **Ollama**
    as the provider, and enter the model name exactly as shown by Ollama list in the
    terminal (e.g. `qwen2.5-coder:1.5b`). Jupyter AI will connect to the local Ollama
    server and load that model for queries​. No API keys are needed since this is
    local.
  prefs: []
  type: TYPE_NORMAL
- en: Set Language model, Embedding model and inline completions models based on the
    models of your choice.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Save the settings and return to the chat interface.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/2c6ba349a5ab7b0542e0504284ebecdc.png)'
  prefs: []
  type: TYPE_IMG
- en: Configure Jupyter AI with Ollama | Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: 'This configuration links Jupyter AI to the locally running model via Ollama.
    While inline completions should be enabled by this process, if that doesn’t happen,
    you can do it manually by clicking on the **Jupyternaut** icon, which is located
    in the bottom bar of the JupyterLab interface to the left of the **Mode indicator**
    (e.g., Mode: Command). This opens a dropdown menu where you can select `Enable
    completions by Jupyternaut` to activate the feature.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e95227d86223bbdc79abc41584c04177.png)'
  prefs: []
  type: TYPE_IMG
- en: Enabling code completions in notebook | Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: Using the AI Coding Assistant
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Once set up, you can use the AI coding assistant for various tasks like code
    autocompletion, debugging help, and generating new code from scratch. It’s important
    to note here that you can interact with the assistant either through the **chat
    sidebar** or directly in notebook cells using `%%ai magic commands`. Let’s look
    at both the ways.
  prefs: []
  type: TYPE_NORMAL
- en: Coding assistant via Chat interface
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This is pretty straightforward. You can simply chat with the model to perform
    an action. For instance, here is how we can ask the model to explain the error
    in the code and then subsequently fix the error by selecting code in the notebook.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/aabec3a8e8150e982dbe41e1adc819a2.png)'
  prefs: []
  type: TYPE_IMG
- en: Debugging Assistance Example using Jupyter AI via Chat | Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: You can also ask the AI to generate code for a task from scratch, just by describing
    what you need in natural language. Here is a Python function that returns all
    prime numbers up to a given positive integer N, generated by Jupyternaut.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a31b10b84b13ea3535beb59ceddbf8c5.png)'
  prefs: []
  type: TYPE_IMG
- en: Generating New Code from Prompts using Jupyter AI via Chat | Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: 'Coding assistant via notebook cell or IPython shell:'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'You can also interact with models directly within a Jupyter notebook. First,
    load the IPython extension:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: Now, you can use the `%%ai` cell magic to interact with your chosen language
    model using a specified prompt. Let’s replicate the above example but this time
    within the notebook cells.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/bf80dedcfd11070e91e1badb2cdc4fb7.png)'
  prefs: []
  type: TYPE_IMG
- en: Generating New Code from Prompts using Jupyter AI in the notebook | Image by
    Author
  prefs: []
  type: TYPE_NORMAL
- en: For more details and options you can refer to the official [documentation](https://jupyter-ai.readthedocs.io/en/latest/users/index.html#the-ai-and-ai-magic-commands).
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 'As you can gauge from this article, Jupyter AI makes it easy to set up a coding
    assistant, provided you have the right installations and setup in place. I used
    a relatively small model, but you can choose from a variety of models supported
    by Ollama or Hugging Face. The key advantage here is that using a local model
    offers significant benefits: it enhances privacy, reduces latency, and decreases
    dependence on proprietary model providers. However, running **l**arge models locally
    with Ollama can be resource-intensive so ensure that you have sufficient RAM**.**
    With the rapid pace at which open-source models are improving, you can achieve
    comparable performance even with these alternatives.'
  prefs: []
  type: TYPE_NORMAL
