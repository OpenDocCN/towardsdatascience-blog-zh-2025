- en: 'Regression Discontinuity Design: How It Works and When to Use It'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/regression-discontinuity-design-how-it-works-and-when-to-use-it/](https://towardsdatascience.com/regression-discontinuity-design-how-it-works-and-when-to-use-it/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: You’re an avid data scientist and experimenter. You know that randomisation
    is the summit of Mount Evidence Credibility, and you also know that when you can’t
    randomise, you resort to observational data and causal inference techniques. At
    your disposal are various methods for spinning up a control group — difference-in-differences,
    inverse propensity score weighting, and others. With an assumption here or there
    (some shakier than others), you estimate the causal effect and drive decision-making.
    But if you thought it couldn’t get more exciting than “vanilla” causal inference,
    read on.
  prefs: []
  type: TYPE_NORMAL
- en: Personally, I’ve often found myself in at least two scenarios where “just doing
    causal inference” wasn’t straightforward. The common denominator in these two
    scenarios? A missing control group — at first glance, that is.
  prefs: []
  type: TYPE_NORMAL
- en: 'First, **the cold-start scenario:** the company wants to break into an uncharted
    opportunity space. Often there is no experimental data to learn from, nor has
    there been any change (read: “exogenous shock”), from the business or product
    side, to leverage in the more common causal inference frameworks like difference-in-differences
    (and other cousins in the pre-post paradigm).'
  prefs: []
  type: TYPE_NORMAL
- en: Second, **the unfeasible randomisation scenario:** the organisation is perfectly
    intentional about testing an idea, but randomisation is not feasible—or not even
    wanted. Even emulating a natural experiment might be constrained legally, technically,
    or commercially (especially when it’s about pricing), or when interference bias
    arises in the marketplace.
  prefs: []
  type: TYPE_NORMAL
- en: These situations open up the space for a “different” type of causal inference.
    Although the method we’ll focus on here is not the only one suited for the job,
    I’d love for you to tag along in this deep dive into Regression Discontinuity
    Design (RDD).
  prefs: []
  type: TYPE_NORMAL
- en: In this post, I’ll give you a crisp view of *how* and *why* RDD works. Inevitably,
    this will involve a bit of math — a pleasant sight for some — but I’ll do my best
    to keep it accessible with classic examples from the literature.
  prefs: []
  type: TYPE_NORMAL
- en: 'We’ll also see how RDD can tackle a thorny causal inference challenge in e-commerce
    and online marketplaces: the impact of listing position on listing performance.
    In this practical section we’ll cover key modelling considerations that practitioners
    often face: parametric versus non-parametric RDD, choosing the right bandwidth
    parameter, and more. So, grab yourself a cup of of coffee and let’s jump in!'
  prefs: []
  type: TYPE_NORMAL
