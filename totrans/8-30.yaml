- en: 'Model Calibration, Explained: A Visual Guide with Code Examples for Beginners'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 模型校准详解：初学者视觉指南及代码示例
- en: 原文：[https://towardsdatascience.com/model-calibration-explained-a-visual-guide-with-code-examples-for-beginners-55f368bafe72/](https://towardsdatascience.com/model-calibration-explained-a-visual-guide-with-code-examples-for-beginners-55f368bafe72/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/model-calibration-explained-a-visual-guide-with-code-examples-for-beginners-55f368bafe72/](https://towardsdatascience.com/model-calibration-explained-a-visual-guide-with-code-examples-for-beginners-55f368bafe72/)
- en: MODEL EVALUATION & OPTIMIZATION
  id: totrans-2
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 模型评估与优化
- en: You’ve trained several classification models, and they all seem to be performing
    well with high accuracy scores. Congratulations!
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 您已经训练了几个分类模型，并且它们似乎都表现出良好的高准确度得分。恭喜！
- en: But hold on – is one model truly better than the others? Accuracy alone doesn’t
    tell the whole story. What if one model consistently overestimates its confidence,
    while another underestimates it? This is where **model calibration** comes in.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 但等等——是否有一个模型真的比其他模型更好？仅仅准确度并不能说明全部。如果一个模型持续高估其置信度，而另一个模型低估其置信度，那会怎样？这就是**模型校准**发挥作用的地方。
- en: Here, we’ll see what model calibration is and explore how to assess the reliability
    of your models’ predictions – using visuals and practical code examples to show
    you how to identify calibration issues. Get ready to go beyond accuracy and light
    up the true potential of your machine learning models!
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们将了解模型校准是什么，并探讨如何评估模型预测的可靠性——使用视觉和实用的代码示例向您展示如何识别校准问题。准备好超越准确度，激发机器学习模型的真正潜力吧！
- en: '![All visuals: Author-created using Canva Pro. Optimized for mobile; may appear
    oversized on desktop.](../Images/4676493368ca2de800b74fa13ac500b5.png)'
  id: totrans-6
  prefs: []
  type: TYPE_IMG
  zh: '![所有视觉图像：作者使用Canva Pro创建。针对移动设备优化；在桌面设备上可能显示过大。](../Images/4676493368ca2de800b74fa13ac500b5.png)'
- en: 'All visuals: Author-created using Canva Pro. Optimized for mobile; may appear
    oversized on desktop.'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 所有视觉图像：作者使用Canva Pro创建。针对移动设备优化；在桌面设备上可能显示过大。
- en: '**Understanding Calibration**'
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**理解校准**'
- en: Model calibration measures how well a model’s [prediction probabilities](https://towardsdatascience.com/predicted-probability-explained-a-visual-guide-with-code-examples-for-beginners-7c34e8994ec2)
    match its actual performance. A model that gives a 70% probability score should
    be correct 70% of the time for similar predictions. This means its probability
    scores should reflect the true likelihood of its predictions being correct.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 模型校准衡量模型预测概率与其实际性能匹配的程度。一个给出70%概率分数的模型应该在相似预测中正确70%的时间。这意味着其概率分数应该反映其预测正确的真实可能性。
- en: Why Calibration Matters
  id: totrans-10
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 为什么校准很重要
- en: While accuracy tells us how often a model is correct overall, calibration tells
    us **whether we can trust its probability scores**. Two models might both have
    90% accuracy, but one might give realistic probability scores while the other
    gives overly confident predictions. In many real applications, having reliable
    probability scores is just as important as having correct predictions.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然准确度告诉我们模型整体正确性的频率，但校准告诉我们**我们是否可以信赖其概率分数**。两个模型可能都有90%的准确度，但一个可能给出合理的概率分数，而另一个可能给出过于自信的预测。在许多实际应用中，拥有可靠的概率分数与拥有正确的预测一样重要。
- en: '![Two models that are equally accurate (70% correct) show different levels
    of confidence in their predictions. Model A uses balanced probability scores (0.3
    and 0.7) while Model B only uses extreme probabilities (0.0 and 1.0), showing
    it''s either completely sure or completely unsure about each prediction.](../Images/cc11d95cb333b498052545fb7e0b944f.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![两个准确度相同的模型（70%正确）在预测中表现出不同的置信度水平。模型A使用平衡的概率分数（0.3和0.7），而模型B仅使用极端概率（0.0和1.0），表明它对每个预测要么完全确定，要么完全不确定。](../Images/cc11d95cb333b498052545fb7e0b944f.png)'
- en: Two models that are equally accurate (70% correct) show different levels of
    confidence in their predictions. Model A uses balanced probability scores (0.3
    and 0.7) while Model B only uses extreme probabilities (0.0 and 1.0), showing
    it’s either completely sure or completely unsure about each prediction.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 两个准确度相同的模型（70%正确）在预测中表现出不同的置信度水平。模型A使用平衡的概率分数（0.3和0.7），而模型B仅使用极端概率（0.0和1.0），表明它对每个预测要么完全确定，要么完全不确定。
- en: Perfect Calibration vs. Reality
  id: totrans-14
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 完美校准与现实的对比
- en: 'A perfectly calibrated model would show a direct match between its prediction
    probabilities and actual success rates: When it predicts with 90% probability,
    it should be correct 90% of the time. The same applies to all probability levels.'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 一个完美校准的模型会在其预测概率和实际成功率之间显示直接匹配：当它以90%的概率预测时，它应该有90%的时间是正确的。同样适用于所有概率级别。
- en: 'However, most models aren’t perfectly calibrated. They can be:'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，大多数模型并不是完美校准的。它们可以是：
- en: 'Overconfident: giving probability scores that are too high for their actual
    performance'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 过于自信：给出的概率评分高于其实际表现
- en: 'Underconfident: giving probability scores that are too low for their actual
    performance'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 缺乏自信：给出的概率评分低于其实际表现
- en: 'Both: overconfident in some ranges and underconfident in others'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 两者都有：在某些范围内过于自信，在其他方面缺乏自信
- en: '![Four models with the same accuracy (70%) showing different calibration patterns.
    The overconfident model makes extreme predictions (0.0 or 1.0), while the underconfident
    model stays close to 0.5\. The over-and-under confident model switches between
    extremes and middle values. The well-calibrated model uses reasonable probabilities
    (0.3 for ''NO'' and 0.7 for ''YES'') that match its actual performance.](../Images/09035a500cfea196d00d6a16c70a643b.png)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
  zh: '![四个具有相同准确率（70%）但校准模式不同的模型。过于自信的模型做出极端预测（0.0或1.0），而缺乏自信的模型保持在0.5附近。过于和缺乏自信的模型在极端值和中值之间切换。校准良好的模型使用合理的概率（‘NO’为0.3和‘YES’为0.7），这些概率与其实际表现相匹配。](../Images/09035a500cfea196d00d6a16c70a643b.png)'
- en: Four models with the same accuracy (70%) showing different calibration patterns.
    The overconfident model makes extreme predictions (0.0 or 1.0), while the underconfident
    model stays close to 0.5\. The over-and-under confident model switches between
    extremes and middle values. The well-calibrated model uses reasonable probabilities
    (0.3 for ‘NO’ and 0.7 for ‘YES’) that match its actual performance.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 四个具有相同准确率（70%）但校准模式不同的模型。过于自信的模型做出极端预测（0.0或1.0），而缺乏自信的模型保持在0.5附近。过于和缺乏自信的模型在极端值和中值之间切换。校准良好的模型使用合理的概率（‘NO’为0.3和‘YES’为0.7），这些概率与其实际表现相匹配。
- en: This mismatch between predicted probabilities and actual correctness can lead
    to poor decision-making when using these models in real applications. This is
    why understanding and improving model calibration is necessary for building reliable
    machine learning systems.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 预测概率与实际正确性之间的这种不匹配，当在实际应用中使用这些模型时可能会导致决策不当。这就是为什么理解和改进模型校准对于构建可靠的机器学习系统是必要的。
- en: 📊 Dataset Used
  id: totrans-23
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 📊 使用的数据集
- en: 'To explore model calibration, we’ll continue with [the same dataset used in
    my previous articles on Classification Algorithms](https://medium.com/@samybaladram/list/classification-algorithms-b3586f0a772c):
    predicting whether someone will play golf or not based on weather conditions.'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 为了探索模型校准，我们将继续使用[我在之前关于分类算法的文章中使用的相同数据集](https://medium.com/@samybaladram/list/classification-algorithms-b3586f0a772c)：根据天气条件预测某人是否会打高尔夫。
- en: '![Columns: ''Overcast (one-hot-encoded into 3 columns)'', ''Temperature'' (in
    Fahrenheit), ''Humidity'' (in %), ''Windy'' (Yes/No) and ''Play'' (Yes/No, target
    feature)](../Images/5440101d4b6ca74d41236618922fc734.png)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![列：''多云（独热编码为3列）''，''温度''（华氏度），''湿度''（百分比），''有风''（是/否）和''玩''（是/否，目标特征）](../Images/5440101d4b6ca74d41236618922fc734.png)'
- en: 'Columns: ‘Overcast (one-hot-encoded into 3 columns)’, ‘Temperature’ (in Fahrenheit),
    ‘Humidity’ (in %), ‘Windy’ (Yes/No) and ‘Play’ (Yes/No, target feature)'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 列：‘多云（独热编码为3列）’，‘温度’（华氏度），‘湿度’（百分比），‘有风’（是/否）和‘玩’（是/否，目标特征）
- en: '[PRE0]'
  id: totrans-27
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Before training our models, we normalized numerical weather measurements through
    [standard scaling](https://medium.com/towards-data-science/scaling-numerical-data-explained-a-visual-guide-with-code-examples-for-beginners-11676cdb45cb?source=your_stories_page-------------------------------------)
    and transformed categorical features with [one-hot encoding](https://towardsdatascience.com/encoding-categorical-data-explained-a-visual-guide-with-code-example-for-beginners-b169ac4193ae).
    These preprocessing steps ensure all models can effectively use the data while
    maintaining fair comparisons between them.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 在训练我们的模型之前，我们通过[标准缩放](https://medium.com/towards-data-science/scaling-numerical-data-explained-a-visual-guide-with-code-examples-for-beginners-11676cdb45cb?source=your_stories_page-------------------------------------)对数值天气测量进行归一化，并将分类特征通过[独热编码](https://towardsdatascience.com/encoding-categorical-data-explained-a-visual-guide-with-code-example-for-beginners-b169ac4193ae)进行转换。这些预处理步骤确保所有模型都能有效地使用数据，同时在它们之间保持公平的比较。
- en: '![](../Images/f41a057e2f4fab774ba2b10433a34e31.png)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/f41a057e2f4fab774ba2b10433a34e31.png)'
- en: '[PRE1]'
  id: totrans-30
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Models and Training
  id: totrans-31
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 模型和训练
- en: 'For this exploration, we trained four classification models to similar accuracy
    scores:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 为了这次探索，我们训练了四个分类模型以达到相似的准确率分数：
- en: K-Nearest Neighbors (kNN)
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: K-Nearest Neighbors (kNN)
- en: Bernoulli Naive Bayes
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 伯努利朴素贝叶斯
- en: Logistic Regression
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 逻辑回归
- en: Multi-Layer Perceptron (MLP)
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 多层感知器（MLP）
- en: 'For those who are curious with how those algorithms make prediction and their
    probability, you can refer to this article:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 对于那些对那些算法如何进行预测及其概率感到好奇的人，可以参考这篇文章：
- en: '[**Predicted Probability, Explained: A Visual Guide with Code Examples for
    Beginners**](https://towardsdatascience.com/predicted-probability-explained-a-visual-guide-with-code-examples-for-beginners-7c34e8994ec2)'
  id: totrans-38
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[**预测概率解释：初学者视觉指南及代码示例**](https://towardsdatascience.com/predicted-probability-explained-a-visual-guide-with-code-examples-for-beginners-7c34e8994ec2)'
- en: While these models achieved the same accuracy in this simple problem, they calculate
    their prediction probabilities differently.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管这些模型在这个简单问题中达到了相同的准确率，但它们计算预测概率的方式不同。
- en: '![Even though the four models are correct 85.7% of the time, they show different
    levels of confidence in their predictions. Here, The MLP model tends to be very
    sure about its answers (giving values close to 1.0), while the kNN model is more
    careful, giving more varied confidence scores.](../Images/b1fe7a830d5ccab9fca178fac338b8bd.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
  zh: '![尽管这四个模型有85.7%的时间是正确的，但它们在预测中的信心水平不同。在这里，MLP模型倾向于对其答案非常有信心（给出接近1.0的值），而kNN模型则更为谨慎，给出更多变化的信心分数。](../Images/b1fe7a830d5ccab9fca178fac338b8bd.png)'
- en: Even though the four models are correct 85.7% of the time, they show different
    levels of confidence in their predictions. Here, The MLP model tends to be very
    sure about its answers (giving values close to 1.0), while the kNN model is more
    careful, giving more varied confidence scores.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 即使这四个模型有85.7%的时间是正确的，它们在预测中的信心水平也不同。在这里，MLP模型倾向于对其答案非常有信心（给出接近1.0的值），而kNN模型则更为谨慎，给出更多变化的信心分数。
- en: '[PRE2]'
  id: totrans-42
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Through these differences, we’ll explore why we need to look beyond accuracy.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 通过这些差异，我们将探讨为什么我们需要超越准确率去寻找其他因素。
- en: Measuring Calibration
  id: totrans-44
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 校准测量
- en: To assess how well a model’s prediction probabilities match its actual performance,
    we use several methods and metrics. These measurements help us understand whether
    our model’s confidence levels are reliable.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 为了评估一个模型的预测概率与其实际性能匹配得有多好，我们使用了多种方法和指标。这些测量帮助我们了解我们的模型信心水平是否可靠。
- en: Brier Score
  id: totrans-46
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Brier 分数
- en: '**The Brier Score** measures the **mean squared difference** between predicted
    probabilities and actual outcomes. It ranges from 0 to 1, where lower scores indicate
    better calibration. This score is particularly useful because it considers both
    calibration and accuracy together.'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: '**Brier 分数**衡量预测概率与实际结果之间的**均方差异**。其范围从0到1，分数越低表示校准越好。这个分数特别有用，因为它同时考虑了校准和准确率。'
- en: '![The score (0.148) shows how well the model''s confidence matches its actual
    performance. It''s found by comparing the model''s predicted chances with what
    actually happened (0 for ''NO'', 1 for ''YES''), where smaller differences mean
    better predictions.](../Images/23c223d8895f3a83d56c7087a5f0fbec.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
  zh: '![分数（0.148）显示了模型的信心与其实际性能匹配得有多好。这是通过比较模型的预测概率与实际发生的情况（''NO''为0，''YES''为1）来计算的，差异越小表示预测越好。](../Images/23c223d8895f3a83d56c7087a5f0fbec.png)'
- en: The score (0.148) shows how well the model’s confidence matches its actual performance.
    It’s found by comparing the model’s predicted chances with what actually happened
    (0 for ‘NO’, 1 for ‘YES’), where smaller differences mean better predictions.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 分数（0.148）显示了模型的信心与其实际性能匹配得有多好。这是通过比较模型的预测概率与实际发生的情况（‘NO’为0，‘YES’为1）来计算的，差异越小表示预测越好。
- en: Log Loss
  id: totrans-50
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 对数损失
- en: '**Log Loss** calculates the negative log probability of correct predictions.
    This metric is especially sensitive to confident but wrong predictions – when
    a model says it’s 90% sure but is wrong, it receives a much larger penalty than
    when it’s 60% sure and wrong. Lower values indicate better calibration.'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: '**对数损失**计算正确预测的负对数概率。这个指标对自信但错误的预测特别敏感——当模型说它有90%的把握但错了，它受到的惩罚比它有60%的把握但错了要大得多。较低的值表示校准更好。'
- en: '![For each prediction, it looks at how confident the model was in the correct
    answer. When the model is very confident but wrong (like in index 26), it gets
    a bigger penalty. The final score of 0.455 is the average of all these penalties,
    where lower numbers mean better predictions.](../Images/f109ed11b2e7a2db2e0868fdf644c756.png)'
  id: totrans-52
  prefs: []
  type: TYPE_IMG
  zh: '![对于每个预测，它查看模型对正确答案的信心程度。当模型非常自信但错误（如索引26所示）时，它会受到更大的惩罚。最终得分0.455是所有这些惩罚的平均值，其中数字越低表示预测越好。](../Images/f109ed11b2e7a2db2e0868fdf644c756.png)'
- en: For each prediction, it looks at how confident the model was in the correct
    answer. When the model is very confident but wrong (like in index 26), it gets
    a bigger penalty. The final score of 0.455 is the average of all these penalties,
    where lower numbers mean better predictions.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 对于每个预测，它查看模型对正确答案的信心程度。当模型非常自信但错误（如索引26所示）时，它会受到更大的惩罚。最终得分0.455是所有这些惩罚的平均值，其中数字越低表示预测越好。
- en: Expected Calibration Error (ECE)
  id: totrans-54
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 预期校准误差（ECE）
- en: '**ECE** measures the average difference between predicted and actual probabilities
    (taken as average of the label), weighted by how many predictions fall into each
    probability group. This metric helps us understand if our model has systematic
    biases in its probability estimates.'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '**ECE**衡量预测概率与实际概率（取标签的平均值）之间的平均差异，并按每个概率组中预测的数量进行加权。此指标有助于我们了解我们的模型在概率估计中是否存在系统性偏差。'
- en: '![The predictions are grouped into 5 bins based on how confident the model
    was. For each group, we compare the model''s average confidence to how often it
    was actually right. The final score (0.1502) tells us how well these match up,
    where lower numbers are better."](../Images/75e4da884365762751125ceff9ae34f7.png)'
  id: totrans-56
  prefs: []
  type: TYPE_IMG
  zh: '![根据模型信心程度将预测分为5个组。对于每个组，我们比较模型的平均信心与它实际上正确的频率。最终得分（0.1502）告诉我们这些匹配得有多好，其中数字越低表示越好。"](../Images/75e4da884365762751125ceff9ae34f7.png)'
- en: The predictions are grouped into 5 bins based on how confident the model was.
    For each group, we compare the model’s average confidence to how often it was
    actually right. The final score (0.1502) tells us how well these match up, where
    lower numbers are better."
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 根据模型信心程度将预测分为5个组。对于每个组，我们比较模型的平均信心与它实际上正确的频率。最终得分（0.1502）告诉我们这些匹配得有多好，其中数字越低表示越好。"
- en: Reliability Diagrams
  id: totrans-58
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 可靠性图
- en: Similar to ECE, a reliability diagram (or calibration curve) visualizes model
    calibration by binning predictions and comparing them to actual outcomes. While
    ECE gives us a single number measuring calibration error, the reliability diagram
    **shows us the same information graphically**. We use the same binning approach
    and calculate the actual frequency of positive outcomes in each bin. When plotted,
    these points show us exactly where our model’s predictions deviate from perfect
    calibration, which would appear as a diagonal line.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 类似于ECE，可靠性图（或校准曲线）通过将预测分组并与之比较实际结果来可视化模型校准。虽然ECE给我们一个衡量校准误差的单个数字，但可靠性图**以图形方式展示了相同的信息**。我们使用相同的分组方法，并计算每个分组中实际积极结果的频率。当绘制时，这些点显示我们的模型预测与完美校准的偏差，这会表现为一条对角线。
- en: '![Like ECE, the predictions are grouped into 5 bins based on confidence levels.
    Each dot shows how often the model was actually right (up/down) compared to how
    confident it was (left/right). The dotted line shows perfect matching - the model''s
    curve shows it sometimes thinks it''s better or worse than it really is.](../Images/af96b16398447d508bf9fd4703f52e52.png)'
  id: totrans-60
  prefs: []
  type: TYPE_IMG
  zh: '![与ECE类似，根据置信水平将预测分为5个组。每个点显示模型实际上正确的频率（上下）与它自信的程度（左右）相比。虚线表示完美匹配 - 模型的曲线显示它有时认为它比实际情况更好或更差。](../Images/af96b16398447d508bf9fd4703f52e52.png)'
- en: Like ECE, the predictions are grouped into 5 bins based on confidence levels.
    Each dot shows how often the model was actually right (up/down) compared to how
    confident it was (left/right). The dotted line shows perfect matching – the model’s
    curve shows it sometimes thinks it’s better or worse than it really is.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 与ECE类似，根据置信水平将预测分为5个组。每个点显示模型实际上正确的频率（上下）与它自信的程度（左右）相比。虚线表示完美匹配 – 模型的曲线显示它有时认为它比实际情况更好或更差。
- en: Comparing Calibration Metrics
  id: totrans-62
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 比较校准指标
- en: 'Each of these metrics shows different aspects of calibration problems:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 这些指标展示了校准问题的不同方面：
- en: A high Brier Score suggests overall poor probability estimates.
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 高Brier分数表明整体概率估计较差。
- en: High Log Loss points to overconfident wrong predictions.
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 高对数损失表明过度自信的错误预测。
- en: A high ECE indicates systematic bias in probability estimates.
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 高ECE表示概率估计存在系统性偏差。
- en: Together, these metrics give us a complete picture of how well our model’s probability
    scores reflect its true performance.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 这些指标共同为我们提供了关于我们的模型概率分数如何反映其真实性能的完整图景。
- en: Our Models
  id: totrans-68
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 我们的模型
- en: 'For our models, let’s calculate the calibration metrics and draw their calibration
    curves:'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我们的模型，让我们计算校准指标并绘制它们的校准曲线：
- en: '[PRE3]'
  id: totrans-70
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '![](../Images/807cdb2c8d5cd23058d817749dbe14b1.png)'
  id: totrans-71
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/807cdb2c8d5cd23058d817749dbe14b1.png)'
- en: 'Now, let’s analyze the calibration performance of each model based on those
    metrics:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们根据这些指标分析每个模型的校准性能：
- en: The k-Nearest Neighbors (KNN) model performs well at estimating how certain
    it should be about its predictions. Its graph line stays close to the dotted line,
    which shows good performance. It has solid scores – a Brier score of 0.148 and
    the best ECE score of 0.090\. While it sometimes shows too much confidence in
    the middle range, it **generally makes reliable estimates** about its certainty.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: k-最近邻（KNN）模型在估计其预测的确定性方面表现良好。其图形线紧贴虚线，显示出良好的性能。它有稳定的分数——Brier分数为0.148，最佳ECE分数为0.090。虽然它有时在中间范围表现出过多的自信，但它**通常对其确定性做出可靠的估计**。
- en: '![](../Images/8dd99d640bcac7761888fd041aeeac2e.png)'
  id: totrans-74
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/8dd99d640bcac7761888fd041aeeac2e.png)'
- en: The Bernoulli Naive Bayes model shows an unusual stair-step pattern in its line.
    This means it jumps between different levels of certainty instead of changing
    smoothly. While it has the same Brier score as KNN (0.148), its higher ECE of
    0.150 shows it’s less accurate at estimating its certainty. The model **switches
    between being too confident and not confident enough**.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 伯努利朴素贝叶斯模型在其线条上显示出不寻常的阶梯状模式。这意味着它在不同的确定性水平之间跳跃，而不是平滑变化。虽然它与KNN有相同的Brier分数（0.148），但其更高的ECE为0.150表明它在估计其确定性方面不太准确。该模型**在过于自信和不够自信之间切换**。
- en: '![](../Images/a48d8724b2135d79ffa334b2d5bc6c8a.png)'
  id: totrans-76
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a48d8724b2135d79ffa334b2d5bc6c8a.png)'
- en: The Logistic Regression model shows clear issues with its predictions. Its line
    moves far away from the dotted line, meaning it often misjudges how certain it
    should be. It has the worst ECE score (0.181) and a poor Brier score (0.164).
    The model consistently shows **too much confidence in its predictions**, making
    it unreliable.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 逻辑回归模型在其预测中显示出明显的问题。其线条远离虚线，这意味着它经常错误地判断其应该有多大的确定性。它有最差的ECE分数（0.181）和较差的Brier分数（0.164）。该模型始终表现出**对其预测过多的自信**，使其不可靠。
- en: '![](../Images/e28d85ca2130710c7c1956648fbc762a.png)'
  id: totrans-78
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e28d85ca2130710c7c1956648fbc762a.png)'
- en: The Multilayer Perceptron shows a distinct problem. Despite having the best
    Brier score (0.129), its line reveals that **it mostly makes extreme predictions**
    – either very certain or very uncertain, with little in between. Its high ECE
    (0.167) and flat line in the middle ranges show it struggles to make balanced
    certainty estimates.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 多层感知器显示出明显的问题。尽管它有最佳的Brier分数（0.129），但其线条揭示它**主要做出极端预测**——要么非常确定，要么非常不确定，中间很少。它的高ECE（0.167）和中间范围的平坦线条表明它难以做出平衡的确定性估计。
- en: '![](../Images/57c52210f18f8cb624f3a7e7868b225b.png)'
  id: totrans-80
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/57c52210f18f8cb624f3a7e7868b225b.png)'
- en: After examining all four models, the **k-Nearest Neighbors clearly performs
    best** at estimating its prediction certainty. It maintains consistent performance
    across different levels of certainty and shows the most reliable pattern in its
    predictions. While other models might score well in certain measures (like the
    Multilayer Perceptron’s Brier score), their graphs reveal they aren’t as reliable
    when we need to trust their certainty estimates.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 在检查了所有四个模型之后，**k-最近邻在估计预测确定性方面表现最佳**。它在不同确定性水平上保持一致的性能，并在其预测中显示出最可靠的模式。虽然其他模型可能在某些指标（如多层感知器的Brier分数）上得分较高，但它们的图形揭示，当我们需要信任它们的确定性估计时，它们并不那么可靠。
- en: Final Remark
  id: totrans-82
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最后的备注
- en: When choosing between different models, we need to consider both their accuracy
    and calibration quality. A model with slightly lower accuracy but better calibration
    might be more valuable than a highly accurate model with poor probability estimates.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 在选择不同的模型时，我们需要考虑它们的准确性和校准质量。一个准确度略低但校准质量更好的模型可能比一个准确度高但概率估计差的模型更有价值。
- en: By understanding calibration and its importance, we can build more reliable
    machine learning systems that users can trust not just for their predictions,
    but also for their confidence in those predictions.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 通过理解校准及其重要性，我们可以构建更可靠的机器学习系统，用户不仅信任其预测，也信任其对预测的信心。
- en: 🌟 Model Calibration Code Summarized (1 Model)
  id: totrans-85
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 🌟 模型校准代码总结（1 个模型）
