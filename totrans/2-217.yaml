- en: 'Agentic AI: Implementing Long-Term Memory'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/agentic-ai-implementing-long-term-memory/](https://towardsdatascience.com/agentic-ai-implementing-long-term-memory/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1750793593142" class="mdspan-comment">If you’ve ever worked
    with LLMs</mdspan>, you know they are stateless. If you haven’t, think of them
    as having no short-term memory.
  prefs: []
  type: TYPE_NORMAL
- en: An example of this is the movie *Memento*, where the protagonist constantly
    needs to be reminded of what has happened, using post-it notes with facts to piece
    together what he should do next.
  prefs: []
  type: TYPE_NORMAL
- en: To converse with LLMs, we need to constantly remind them of the conversation
    each time we interact.
  prefs: []
  type: TYPE_NORMAL
- en: Implementing what we call “short-term memory” or state is easy. We just grab
    a few previous question-answer pairs and include them in each call.
  prefs: []
  type: TYPE_NORMAL
- en: Long-term memory, on the other hand, is an entirely different beast.
  prefs: []
  type: TYPE_NORMAL
- en: To make sure the LLM can pull up the right facts, understand previous conversations,
    and connect information, we need to build some fairly complex systems.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/1ec427ec7013c5e0cbbd8972e12c9711.png)'
  prefs: []
  type: TYPE_IMG
- en: Different things we’ll need for an efficient memory solution | Image by author
  prefs: []
  type: TYPE_NORMAL
- en: This article will walk through the problem, explore what’s needed to build an
    efficient system, go through the different architectural choices, and look at
    the open-source and cloud providers that can help us out.
  prefs: []
  type: TYPE_NORMAL
- en: Thinking through a solution
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let’s first walk through the thought process of building memory for LLMs, and
    what we will need for it to be efficient.
  prefs: []
  type: TYPE_NORMAL
- en: The first thing we need is for the LLM to be able to pull up old messages to
    tell us what has been said. So we can ask it, “What was the name of that restaurant
    you told me to go to in Stockholm?” This would be **basic information extraction. **
  prefs: []
  type: TYPE_NORMAL
- en: If you’re entirely new to building LLM systems, your first thought may be to
    just dump each memory into the context window and let the LLM make sense of it.
  prefs: []
  type: TYPE_NORMAL
- en: This strategy though makes it hard for the LLM to figure out what’s important
    and what’s not, which can lead it to hallucinate answers.
  prefs: []
  type: TYPE_NORMAL
- en: Your second thought may be to store every message, along with summaries, and
    use hybrid search to fetch information when a query comes in.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/9dc17a21f112935658104dd793770786.png)'
  prefs: []
  type: TYPE_IMG
- en: Using plain retrieval for memory | Image by author
  prefs: []
  type: TYPE_NORMAL
- en: This would be similar to how you build standard retrieval systems.
  prefs: []
  type: TYPE_NORMAL
- en: The issue with this is that once it starts scaling, you’ll run into memory bloat,
    outdated or contradicting facts, and a growing vector database that constantly
    needs pruning.
  prefs: []
  type: TYPE_NORMAL
- en: You might also need to understand when things happen, so that you can ask, “When
    did you tell me about this restaurant?” This means you’d need some level of **temporal
    reasoning.**
  prefs: []
  type: TYPE_NORMAL
- en: This may drive you to implement better metadata with timestamps, and possibly
    a **self-editing system that updates and summarizes inputs.**
  prefs: []
  type: TYPE_NORMAL
- en: Although more complex, a self-editing system could update facts and invalidate
    them when needed.
  prefs: []
  type: TYPE_NORMAL
- en: If you keep thinking through the problem, you may also want the LLM to connect
    different facts — perform multi-hop reasoning — and recognize patterns.
  prefs: []
  type: TYPE_NORMAL
- en: So you can ask it questions like, “How many concerts have I been to this year?”
    or “What do you think my music taste is?” which may lead you to experiment with
    knowledge graphs.
  prefs: []
  type: TYPE_NORMAL
- en: Organizing the solution
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The fact that this has become such a large problem is pushing people to organize
    it better. I think of long-term memory as two parts: **pocket-sized facts** and
    **long-span memory** of previous conversations.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/60651b3722303a58aea2aa3cd468afdd.png)'
  prefs: []
  type: TYPE_IMG
- en: Organizing long term memory | Image by author
  prefs: []
  type: TYPE_NORMAL
- en: For the first part, pocket-sized facts, we can look at ChatGPT’s memory system
    as an example.
  prefs: []
  type: TYPE_NORMAL
- en: To build this type of memory, they likely use a classifier to decide if a message
    contains a fact that should be stored.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/57fd66dc8568cbfc18d0e0cb4545c0d2.png)'
  prefs: []
  type: TYPE_IMG
- en: Simulating ChatGPT’s pocket-fact memory | Image by author
  prefs: []
  type: TYPE_NORMAL
- en: Then they classify the fact into a predefined bucket (such as profile, preferences,
    or projects) and either update an existing memory if it’s similar or create a
    new one if it’s not.
  prefs: []
  type: TYPE_NORMAL
- en: The other part, long-span memory, means storing all messages and summarizing
    entire conversations so they can be referred to later. This also exists in ChatGPT,
    but just like with pocket-sized memory, you have to enable it.
  prefs: []
  type: TYPE_NORMAL
- en: Here, if you build this on your own, you need to decide how much detail to keep,
    while being mindful of memory bloat and the growing database we talked about earlier.
  prefs: []
  type: TYPE_NORMAL
- en: Standard architectural solutions
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'There are two main architecture choices you can go for here if we look at what
    others are doing: vectors and knowledge graphs.'
  prefs: []
  type: TYPE_NORMAL
- en: I walked through a retrieval-based approach at first. It’s usually what people
    jump at when getting started. Retrieval uses a vector store (and often sparse
    search), which just means it supports both semantic and keyword searches.
  prefs: []
  type: TYPE_NORMAL
- en: Retrieval is simple to start with — you embed your documents and fetch based
    on the user question.
  prefs: []
  type: TYPE_NORMAL
- en: But doing it this way, as we talked about earlier, means that every input is
    immutable. This means that the texts will still be there even if the facts have
    changed.
  prefs: []
  type: TYPE_NORMAL
- en: Problems that may come up here include fetching multiple conflicting facts,
    which can confuse the agent. At worst, the relevant facts might be buried somewhere
    in the piles of retrieved texts.
  prefs: []
  type: TYPE_NORMAL
- en: The agent also won’t know when something was said or whether it was referring
    to the past or the future.
  prefs: []
  type: TYPE_NORMAL
- en: As we talked about previously, there are ways around this.
  prefs: []
  type: TYPE_NORMAL
- en: You can search old memories and update them, add timestamps to metadata, and
    periodically summarize conversations to help the LLM understand the context around
    fetched details.
  prefs: []
  type: TYPE_NORMAL
- en: But with vectors, you also face the problem of a growing database. Eventually,
    you’ll need to prune old data or compress it, which may force you to drop useful
    details.
  prefs: []
  type: TYPE_NORMAL
- en: If we look at Knowledge Graphs (KGs), they represent information as a network
    of entities (nodes) and the relationships between them (edges), rather than as
    unstructured text like you get with vectors.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/44f5b528a09728d7719ad9e9e79477a3.png)'
  prefs: []
  type: TYPE_IMG
- en: Knowledge Graphs | Image by author
  prefs: []
  type: TYPE_NORMAL
- en: Instead of overwriting data, KGs can assign an `invalid_at` date to an old fact,
    so you can still trace its history. They use graph traversals to fetch information,
    which lets you follow relationships across multiple hops.
  prefs: []
  type: TYPE_NORMAL
- en: Because KGs can jump between connected nodes and keep facts updated in a more
    structured way, they tend to be better at temporal and multi-hop reasoning.
  prefs: []
  type: TYPE_NORMAL
- en: KGs do come with their own challenges though. As they grow, infrastructure becomes
    more complex, and you may start to notice higher latency during deep traversals
    when the system has to look far to find the right information.
  prefs: []
  type: TYPE_NORMAL
- en: Whether the solution is vector- or KG-based, people usually update memories
    rather than just keep adding new ones, add in the ability to set specific buckets
    that we saw for the “pocket-sized” facts and frequently use LLMs to summarize
    and extract information from the messages before ingesting them.
  prefs: []
  type: TYPE_NORMAL
- en: If we go back to the original goal — having both pocket-sized memories and long-span
    memory — you can mix RAG and KG approaches to get what you want.
  prefs: []
  type: TYPE_NORMAL
- en: Current vendor solutions (plug’n play)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I’ll go through a few different independent solutions that help you set up memory,
    looking at how they work, which architecture they use, and how mature their frameworks
    are.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/6f0a4a93f753a24a8bc679d157bc344c.png)'
  prefs: []
  type: TYPE_IMG
- en: Long term mem providers – I always collect resources in [this](https://github.com/ilsilfverskiold/Awesome-LLM-Resources-List/blob/main/README.md#long-term-memory)
    repository | Image by author
  prefs: []
  type: TYPE_NORMAL
- en: Building advanced LLM applications is still very new, so most of these solutions
    have only been released in the last year or two. When you’re starting out, it
    can be helpful to check out how these frameworks are built to get a sense of what
    you might need.
  prefs: []
  type: TYPE_NORMAL
- en: As mentioned earlier, most of them fall into either KG-first or vector-first
    categories.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/7e384a224e208bbc1646cd0ab4de98ca.png)'
  prefs: []
  type: TYPE_IMG
- en: Mem provider features – I always collect resources in [this](https://github.com/ilsilfverskiold/Awesome-LLM-Resources-List/blob/main/README.md#long-term-memory)
    repository | Image by author
  prefs: []
  type: TYPE_NORMAL
- en: If we look at Zep (or Graphiti) first, a KG-based solution, they use LLMs to
    extract, add, invalidate, and update nodes (entities) and edges (relationships
    with timestamps).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/de4123b5cc8452e6c0d93baae292cca7.png)'
  prefs: []
  type: TYPE_IMG
- en: Visualizing Zep adding data to the nodes and updating | Image by author
  prefs: []
  type: TYPE_NORMAL
- en: When you ask a question, it performs semantic and keyword search to find relevant
    nodes, then traverses to connected nodes to fetch related facts.
  prefs: []
  type: TYPE_NORMAL
- en: If a new message comes in with contradicting facts, it updates the node while
    keeping the old fact in place.
  prefs: []
  type: TYPE_NORMAL
- en: This differs from Mem0, a vector-based solution, which adds extracted facts
    on top of each other and uses a self-editing system to identify and overwrite
    invalid facts entirely.
  prefs: []
  type: TYPE_NORMAL
- en: Letta works in a similar way but also includes extra features like core memory,
    where it stores conversation summaries along with blocks (or categories) that
    define what should be populated.
  prefs: []
  type: TYPE_NORMAL
- en: All solutions have the ability to set categories, where we define what needs
    to be captured with the system. For instance, if you’re building a mindfulness
    app, one category can be “current mood” of user. These are the same pocket-based
    buckets we saw earlier in ChatGPT’s system.
  prefs: []
  type: TYPE_NORMAL
- en: One thing, that I talked about before, is how the vector-first approaches has
    issues with temporal and multi-hop reasoning.
  prefs: []
  type: TYPE_NORMAL
- en: For example, if I say I’ll move to Berlin in two months, but previously mentioned
    living in Stockholm and California, will the system understand that I now live
    in Berlin if I ask months later?
  prefs: []
  type: TYPE_NORMAL
- en: Can it recognize patterns? With knowledge graphs, the information is already
    structured, making it easier for the LLM to use all available context.
  prefs: []
  type: TYPE_NORMAL
- en: With vectors, as the information grows, the noise may get too strong for the
    system to connect the dots.
  prefs: []
  type: TYPE_NORMAL
- en: With Letta and Mem0, although more mature in general, these two issues can still
    occur.
  prefs: []
  type: TYPE_NORMAL
- en: For knowledge graphs, the concern is about infrastructure complexity as they
    scale, and how they manage growing amounts of information.
  prefs: []
  type: TYPE_NORMAL
- en: Although I haven’t tested all of them thoroughly and there are still missing
    pieces (like latency numbers), I want to mention how they handle enterprise security
    in case you’re looking to use these internally with your company.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/62c7c1f7feb0622e42337518d697e230.png)'
  prefs: []
  type: TYPE_IMG
- en: Mem cloud security – I always collect resources in [this](https://github.com/ilsilfverskiold/Awesome-LLM-Resources-List/blob/main/README.md#long-term-memory)
    repository | Image by author
  prefs: []
  type: TYPE_NORMAL
- en: The only cloud option I found that is SOC 2 Type 2 certified is Zep. However,
    many of these can be self-hosted, in which case security depends on your own infra.
  prefs: []
  type: TYPE_NORMAL
- en: These solutions are still very new. You may end up building your own later,
    but I’d recommend testing them out to see how they handle edge cases.
  prefs: []
  type: TYPE_NORMAL
- en: Economics of using vendors
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: It’s great to be able to add features to your LLM applications, but you need
    to keep in mind that this also adds costs.
  prefs: []
  type: TYPE_NORMAL
- en: I always include a section on the economics of implementing a technology, and
    this time is no different. It’s the first thing I check when adding something
    in. I need to understand how it will affect the unit economics of the application
    down the line.
  prefs: []
  type: TYPE_NORMAL
- en: Most vendor solutions will let you get started for free. But once you go beyond
    a few thousand messages, the costs can add up quickly.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c49222ba98bb15de458dd005487e9f23.png)'
  prefs: []
  type: TYPE_IMG
- en: “Estimate” mem pricing per messages – I always collect resources in [this](https://github.com/ilsilfverskiold/Awesome-LLM-Resources-List/blob/main/README.md#long-term-memory)
    repository | Image by author
  prefs: []
  type: TYPE_NORMAL
- en: Remember if you have a few hundred conversations per day in your organization
    the pricing will start to add up when you send in every message through these
    cloud solutions.
  prefs: []
  type: TYPE_NORMAL
- en: Starting with a cloud solution may be ideal, and then switching to self-hosting
    as you grow.
  prefs: []
  type: TYPE_NORMAL
- en: You can also try a hybrid approach.
  prefs: []
  type: TYPE_NORMAL
- en: For example, implement your own classifier to decide which messages are worth
    storing as facts to keep costs down, while pushing everything else into your own
    vector store to be compressed and summarized periodically.
  prefs: []
  type: TYPE_NORMAL
- en: That said, using byte-sized facts in the context window should beat pasting
    in a 5,000-token history chunk. Giving the LLM relevant facts up front also helps
    reduce hallucinations and in general lowers LLM generation costs.
  prefs: []
  type: TYPE_NORMAL
- en: Notes
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: It’s important to note that even with memory systems in place, you shouldn’t
    expect perfection. These systems still hallucinate or miss answers at times.
  prefs: []
  type: TYPE_NORMAL
- en: It’s better to go in expecting imperfections than to chase 100 % accuracy, you’ll
    save yourself the frustration.
  prefs: []
  type: TYPE_NORMAL
- en: No current system hits perfect accuracy, at least not yet. Research shows hallucinations
    are an inherent part of LLMs. Even adding memory layers doesn’t eliminate this
    issue completely.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: I hope this exercise helped you see how to implement memory in LLM systems if
    you’re new to it.
  prefs: []
  type: TYPE_NORMAL
- en: There are still missing pieces, like how these systems scale, how you evaluate
    them, security, and how latency behaves in real-world settings.
  prefs: []
  type: TYPE_NORMAL
- en: You’ll have to test this out on your own.
  prefs: []
  type: TYPE_NORMAL
- en: If you want to follow my writing you can connect with me at [LinkedIn](https://www.linkedin.com/in/ida-silfverskiold/),
    or keep a check out for my work [here](https://towardsdatascience.com/author/ilsilfverskiold/),
    [Medium](https://medium.com/@ilsilfverskiold) or via my own [website](https://www.ilsilfverskiold.com/).
  prefs: []
  type: TYPE_NORMAL
- en: I’m hoping to push out some more articles on evals and prompting this summer
    and would love the support.
  prefs: []
  type: TYPE_NORMAL
- en: ❤️
  prefs: []
  type: TYPE_NORMAL
