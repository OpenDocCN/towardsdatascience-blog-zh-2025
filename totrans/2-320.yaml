- en: Multiple Linear Regression Analysis
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/multiple-linear-regression-analysis/](https://towardsdatascience.com/multiple-linear-regression-analysis/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1747886201306" class="mdspan-comment">You can find the</mdspan>
    full code for this example at the bottom of this post.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Multiple regression is used when your response variable Y is continuous and
    you have at least k covariates, or independent variables that are linearly correlated
    with it. The data are of the form:'
  prefs: []
  type: TYPE_NORMAL
- en: (Y₁, X₁), … ,(Yᵢ, Xᵢ), … ,(Yₙ, Xₙ)
  prefs: []
  type: TYPE_NORMAL
- en: where Xᵢ = (Xᵢ₁, …, Xᵢₖ) is a vector of covariates and n is the number of observations.
    Here, Xi is the vector of k covariate values for the ith observation.
  prefs: []
  type: TYPE_NORMAL
- en: Understanding the Data
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'To make this concrete, imagine the following scenario:'
  prefs: []
  type: TYPE_NORMAL
- en: 'You enjoy running and tracking your performance by recording the distance you
    run each day. Over 100 consecutive days, you collect four pieces of information:'
  prefs: []
  type: TYPE_NORMAL
- en: The distance you run,
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The number of hours you spent running,
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The number of hours you slept last night,
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: And the number of hours you worked
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Now, on the 101st day, you recorded everything **except** the distance you
    ran. You want to estimate that missing value using the information you do have:
    the number of hours you spent running, the number of hours you slept the night
    before, and the number of hours you worked on that day.'
  prefs: []
  type: TYPE_NORMAL
- en: 'To do this, you can rely on the data from the previous 100 days, which takes
    the form:'
  prefs: []
  type: TYPE_NORMAL
- en: '**(Y₁, X₁), … , (Yᵢ, Xᵢ), … , (Y₁₀₀, X₁₀₀)**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Here, each **Yᵢ** is the distance you ran on day *i*, and each covariate vector
    **Xᵢ = (Xᵢ₁, Xᵢ₂, Xᵢ₃)** corresponds to:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Xᵢ₁**: number of hours spent running,'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Xᵢ₂**: number of hours slept the previous night,'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Xᵢ₃**: number of hours worked on that day.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The index *i = 1, …, 100* refers to the 100 days with complete data. With this
    dataset, you can now fit a multiple linear regression model to estimate the missing
    response variable for day 101.
  prefs: []
  type: TYPE_NORMAL
- en: Specification of the model
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'If we assume the linear relationship between the response variable and the
    covariates, which you can measure using the Pearson correlation, we can specify
    the model as:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/2fe3ac7bd7d148ebef6b74e3f8a37ed3.png)'
  prefs: []
  type: TYPE_IMG
- en: Specification of linear regression model
  prefs: []
  type: TYPE_NORMAL
- en: for i = 1, …, n where E(ϵᵢ | Xᵢ₁, … , Xᵢₖ). To take into account the intercept,
    the first variable is set to **Xᵢ₁ = 1,** for i =1, …, n. To estimate the coefficient,
    the model is expressed in matrix notation.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c2f3e60f074fa1ad97084c3e7df4795e.png)'
  prefs: []
  type: TYPE_IMG
- en: outcome variable.
  prefs: []
  type: TYPE_NORMAL
- en: 'And the covariates will be denoted by:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/2a8bef9c608f7171098f2ed7cd9f19b5.png)'
  prefs: []
  type: TYPE_IMG
- en: X is the **design matrix** (with an intercept and k covariates)
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/eabe1efc00ec965cc522117b178ec5f9.png)'
  prefs: []
  type: TYPE_IMG
- en: β is a column vector of coefficients, used in the linear regression model; ε
    is a column vector of random error terms, one for each observation.
  prefs: []
  type: TYPE_NORMAL
- en: 'Then, we can rewrite the model as:'
  prefs: []
  type: TYPE_NORMAL
- en: Y = Xβ + ε
  prefs: []
  type: TYPE_NORMAL
- en: Estimation of coefficients
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Assuming that the (k+1)*(k+1) matrix is invertible, the form of the least squares
    estimate is given by:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/596cfbede773dc10e8fe667479f1972e.png)'
  prefs: []
  type: TYPE_IMG
- en: The least squares estimate of β.
  prefs: []
  type: TYPE_NORMAL
- en: 'We can derive the estimate of the regression function, an unbiased estimate
    of σ², and an approximate 1−α confidence interval for βⱼ:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Estimate of the regression function: r(x) = ∑ⱼ₌₁ᵏ βⱼ xⱼ'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: σ̂² = (1 / (n − k)) × ∑ᵢ₌₁ⁿ ε̂ᵢ² where ϵ̂ = Y − Xβ̂ is the vector of residuals.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: And β̂ⱼ ± tₙ₋ₖ,₁₋α⁄₂ × SE(β̂ⱼ) is an approximate **(1 − α)** confidence interval.
    Where SE(β̂ⱼ) is the jth diagonal element of the matrix σ̂² (Xᵀ X)⁻¹
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Example of application
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Because we did not record the data of our running performance, we will use a
    crime dataset from 47 states in 1960 that can be obtained from [here](https://stats.oarc.ucla.edu/wp-content/uploads/2016/02/crime.txt).
    Before we fit a linear regression, there are many steps we must follow.
  prefs: []
  type: TYPE_NORMAL
- en: '**Understanding different variables of the data.**'
  prefs: []
  type: TYPE_NORMAL
- en: 'The first 9 observations of the data are given by:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'The data has 14 continuous variables (the response variable R, the 12 predictor
    variables, and one categorical variable S):'
  prefs: []
  type: TYPE_NORMAL
- en: 'R: Crime rate: # of offenses reported to police per million population'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Age: The number of males of age 14–24 per 1000 population'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'S: Indicator variable for Southern states (0 = No, 1 = Yes)'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Ed: Mean # of years of schooling x 10 for persons of age 25 or older'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Ex0: 1960 per capita expenditure on police by state and local government'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Ex1: 1959 per capita expenditure on police by state and local government'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'LF: Labor force participation rate per 1000 civilian urban males age 14–24'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'M: The number of males per 1000 females'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'N: State population size in hundred thousands'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'NW: The number of non-whites per 1000 population'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'U1: Unemployment rate of urban males per 1000 of age 14–24'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'U2: Unemployment rate of urban males per 1000 of age 35–39'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'W: Median value of transferable goods and assets or family income in tens of
    $'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'X: The number of families per 1000 earning below 1/2 the median income'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The data does not have missing values.
  prefs: []
  type: TYPE_NORMAL
- en: Graphical analysis of the relationship between the covariates X and the response
    variable Y
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Graphical analysis of the relationship between explanatory variables and the
    response variable is a step when performing linear regression.
  prefs: []
  type: TYPE_NORMAL
- en: It helps visualize linear trends, detect anomalies, and assess the relevance
    of variables before building any model.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e688b7888ae85cc7230fd2f18396ae9c.png)'
  prefs: []
  type: TYPE_IMG
- en: '**Box plots and scatter plots with fitted linear regression lines** illustrate
    the trend between each variable and **R**.'
  prefs: []
  type: TYPE_NORMAL
- en: Some variables are positively correlated with the crime rate, while others are
    negatively correlated.
  prefs: []
  type: TYPE_NORMAL
- en: For instance, we observe a strong positive relationship between R (the crime
    rate) and Ex1.
  prefs: []
  type: TYPE_NORMAL
- en: In contrast, age appears to be negatively correlated with crime.
  prefs: []
  type: TYPE_NORMAL
- en: 'Finally, the boxplot of the binary variable S (indicating region: North or
    South) suggests that the crime rate is relatively similar between the two regions.
    Then, we can analyse the correlation matrix.'
  prefs: []
  type: TYPE_NORMAL
- en: Heatmap of Pearson correlation matrix
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The correlation matrix allows us to study the strength of the relationship between
    variables. While the Pearson correlation is commonly used to measure linear relationships,
    the Spearman correlation is more appropriate when we want to capture monotonic,
    potentially non-linear relationships between variables.
  prefs: []
  type: TYPE_NORMAL
- en: In this analysis, we will use the Spearman correlation to better account for
    such non-linear associations.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/6c68f0cf29d8dda27ec2759e9f68e380.png)'
  prefs: []
  type: TYPE_IMG
- en: A **heatmap of the correlation matrix** in Python
  prefs: []
  type: TYPE_NORMAL
- en: The first row of the correlation matrix shows the strength of the relationship
    between each covariate and the response variable R.
  prefs: []
  type: TYPE_NORMAL
- en: For example, Ex0 and Ex1 both show a correlation greater than 60% with R, indicating
    a strong association. These variables appear to be good predictors of the crime
    rate.
  prefs: []
  type: TYPE_NORMAL
- en: However, since the correlation between Ex0 and Ex1 is nearly perfect, they likely
    convey similar information. To avoid redundancy, we can select just one of them,
    preferably the one with the strongest correlation with R.
  prefs: []
  type: TYPE_NORMAL
- en: When several variables are **strongly correlated with each other (a correlation
    of 60%, for example)**, they tend to carry redundant information. In such cases,
    we keep only one of them — the one that is most strongly correlated with the response
    variable R. This allow us to reduce multicollinearity.
  prefs: []
  type: TYPE_NORMAL
- en: 'This exercise allows us to select these variables : [‘Ex1’, ‘LF’, ‘M’, ’N’,
    ‘NW’, ‘U2’].'
  prefs: []
  type: TYPE_NORMAL
- en: Study of multicollinearity using the VIF (Variance Inflation Factors)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Before fitting the logistic regression, it is important to study the multicollinearity.
  prefs: []
  type: TYPE_NORMAL
- en: When correlation exists among predictors, the standard errors of the coefficient
    estimates increase, leading to an inflation of their variances. The Variance Inflation
    Factor (VIF) is a diagnostic tool used to measure how much the variance of a predictor’s
    coefficient is inflated due to multicollinearity, and it is typically provided
    in the regression output under a “VIF” column.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/850df7cc001f19127fb08a10c6cc1afd.png)'
  prefs: []
  type: TYPE_IMG
- en: VIF interpretation
  prefs: []
  type: TYPE_NORMAL
- en: 'This VIF is calculated for each predictor in the model. The approach is to
    regress the i-th predictor variable against all the other predictors. We then
    obtain Rᵢ², which can be used to compute the VIF using the formula:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/657c339f1d50ec7c5ef0ee36dfd00e20.png)'
  prefs: []
  type: TYPE_IMG
- en: The VIF of the ith variable
  prefs: []
  type: TYPE_NORMAL
- en: The table below presents the VIF values for the six remaining variables, all
    of which are below 5\. This indicates that multicollinearity is not a concern,
    and we can proceed with fitting the linear regression model.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/00dbff1dc891d9846bfcc9949235a19b.png)'
  prefs: []
  type: TYPE_IMG
- en: The VIF of each variable is above 5.
  prefs: []
  type: TYPE_NORMAL
- en: Fitting a linear regression on six variables
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'If we fit a linear regression of crime rate on 10 variables, we get the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/759a96c6a867047af5a3c019f9015bbe.png)'
  prefs: []
  type: TYPE_IMG
- en: Output of the Multiple Linear Regression Analysis. The corresponding code is
    provided in the appendix.
  prefs: []
  type: TYPE_NORMAL
- en: Diagnosis of residuals
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Before interpreting the regression results, we must first assess the quality
    of the residuals, particularly by checking for autocorrelation, homoscedasticity
    (constant variance), and normality. The diagnostic of residuals is given by the
    table below:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/833d51fbda1001566234043bab027850.png)'
  prefs: []
  type: TYPE_IMG
- en: Diagnosis of the residuals. Come to the summary of the regression
  prefs: []
  type: TYPE_NORMAL
- en: The Durbin-Watson ≈2 indicates no autocorrelation in residuals.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: From the omnibus to Kurtosis, all values show that the residuals are symmetric
    and have a normal distribution.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The low condition number (3.06) confirms that there is no multicollinearity
    among the predictors.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Main Points to Remember
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We can also assess the overall quality of the model through indicators such
    as the R-squared and F-statistic, which show satisfactory results in this case.
    *(See the appendix for more details.)*
  prefs: []
  type: TYPE_NORMAL
- en: We can now interpret the regression coefficients from a statistical perspective.
  prefs: []
  type: TYPE_NORMAL
- en: We intentionally exclude any business-specific interpretation of the results.
  prefs: []
  type: TYPE_NORMAL
- en: The objective of this analysis is to illustrate a few simple and essential steps
    for modeling a problem using multiple linear regression.
  prefs: []
  type: TYPE_NORMAL
- en: 'At the 5% significance level, two coefficients are statistically significant:
    Ex1 and NW.'
  prefs: []
  type: TYPE_NORMAL
- en: This is not surprising, as these were the two variables that showed a correlation
    greater than 40% with the response variable R. Variables that are not statistically
    significant may be removed or re-evaluated, or retained, depending on the study’s
    context and objectives.
  prefs: []
  type: TYPE_NORMAL
- en: 'This post gives you some guidelines to perform linear regression:'
  prefs: []
  type: TYPE_NORMAL
- en: It is important to check **linearity** through graphical analysis and to study
    the **correlation between the response variable and the predictors**.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Examining correlations among variables helps reduce **multicollinearity** and
    supports **variable selection**.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When two predictors are highly correlated, they may convey **redundant information**.
    In such cases, you can retain the one that is **more strongly correlated with
    the response**, or — based on domain expertise — the one with greater **business
    relevance** or **practical interpretability**.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The **Variance Inflation Factor (VIF)** is a useful tool to quantify and assess
    multicollinearity.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Before interpreting the model coefficients statistically, it is essential to
    verify the autocorrelation, normality, and homoscedasticity of the residuals to
    ensure that the model assumptions are met.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: While this analysis provides valuable insights, it also has certain limitations.
  prefs: []
  type: TYPE_NORMAL
- en: The absence of missing values in the dataset simplifies the study, but this
    is rarely the case in real-world scenarios.
  prefs: []
  type: TYPE_NORMAL
- en: If you’re building a **predictive model**, it’s important to **split the data**
    into **training**, **testing**, and potentially an **out-of-time validation set**
    to ensure robust evaluation.
  prefs: []
  type: TYPE_NORMAL
- en: For **variable selection**, techniques such as **stepwise selection** and other
    feature selection methods can be applied.
  prefs: []
  type: TYPE_NORMAL
- en: When comparing multiple models, it’s essential to define appropriate **performance
    metrics**.
  prefs: []
  type: TYPE_NORMAL
- en: In the case of linear regression, commonly used metrics include the **Mean Absolute
    Error (MAE)** and the **Mean Squared Error (MSE)**.
  prefs: []
  type: TYPE_NORMAL
- en: Image Credits
  prefs:
