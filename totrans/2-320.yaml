- en: The dataset used in this article contains crime-related and demographic statistics
    for 47 U.S. states in 1960.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 本文使用的数据集包含了1960年47个美国州的犯罪相关和人口统计数据。
- en: It originates from the FBI’s Uniform Crime Reporting (UCR) Program and additional
    U.S. government sources.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 它源自联邦调查局的统一犯罪报告（UCR）计划以及额外的美国政府来源。
- en: As a U.S. government work, the data is in the public domain under 17 U.S. Code
    § 105 and is free to use, share, and reproduce without restriction.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 作为美国政府作品，数据根据17 U.S. Code § 105属于公共领域，可以无限制地使用、分享和复制。
