  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在上下文学习 – [https://transformer-circuits.pub/2022/in-context-learning-and-induction-heads/index.html](https://transformer-circuits.pub/2022/in-context-learning-and-induction-heads/index.html)
