- en: From RGB to HSV — and Back Again
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/from-rgb-to-hsv-and-back-again/](https://towardsdatascience.com/from-rgb-to-hsv-and-back-again/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1746559529827" class="mdspan-comment">Introduction</mdspan>
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A fundamental concept in **Computer Vision** is understanding how images are
    stored and represented. On disk, image files are encoded in various ways, from
    lossy, compressed *JPEG* files to lossless *PNG* files. Once you load an image
    into a program and decode it from the respective file format, it will most likely
    have an array-like structure that represents the pixels in the image.
  prefs: []
  type: TYPE_NORMAL
- en: RGB
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Each pixel contains some **color information** about that specific point in
    the image. Now the most common way to represent this color is in the *RGB* space,
    where each pixel has three values: red, green and blue. These values describe
    how much of each color is present and they will be mixed additively. So for example,
    an image with all values set to zero will be black. If all three values are set
    to 100%, the resulting image will be white.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/2ac3180f5981c0d81ec1c16898a1dbac.png)'
  prefs: []
  type: TYPE_IMG
- en: Sometimes the order of these color channels can be swapped. Another common order
    is *BGR*, so the order is reversed. This is commonly used in **OpenCV** and the
    default when reading or displaying images.
  prefs: []
  type: TYPE_NORMAL
- en: Alpha Channel
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Images can also contain information about transparency. In that case, an additional
    alpha channel is present (*RGBA*). The alpha value indicates the opacity of each
    pixel: an alpha of zero means the pixel is fully transparent and a value of 100%
    represents a fully opaque pixel.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e49b3d1b80fc9c7d0b21675b9e1814c8.png)'
  prefs: []
  type: TYPE_IMG
- en: HSV
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now *RGB(A)* is not the only way to represent colors. In fact there are many
    different color models that represent color. One of the most useful models is
    the *HSV* model. In this model, each color is represented by a **hue**, **saturation**
    and **value** property. The hue describes the tone of color, irrespective of brightness
    and saturation. Sometimes this is represented on a circle with values between
    0 and 360 or 0 to 180, or simply between 0 and 100%. Importantly, it is cyclical,
    meaning the values wrap around. The second property, the saturation describes
    how *intense* a color tone is, so a saturation of 0 results in gray colors. Finally
    the value property describes the brightness of the color, so a brightness of 0%
    is always black.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/42244489d8544f9000a9cb88cb97235d.png)'
  prefs: []
  type: TYPE_IMG
- en: Now this color model is extremely helpful in image processing, as it allows
    us to decouple the color tone from the saturation and brightness, which is impossible
    to do directly in *RGB*. For example, if you want a transition between two colors
    and keep the same brightness during the full transition, this will be very complex
    to achieve using the *RGB* color model, whereas in the *HSV* model this is straightforward
    by just interpolating the hue.
  prefs: []
  type: TYPE_NORMAL
- en: Practical Examples
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We will look at three examples of how to work with these color spaces in Python
    using OpenCV. In the first example, we extract parts of an image that are of a
    certain color. In the second part, we create a utility function to convert colors
    between the color spaces. Finally, in the third application, we create a continuous
    animation between two colors with constant brightness and saturation.
  prefs: []
  type: TYPE_NORMAL
- en: 1 – Color Mask
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The goal of this part is to find a mask that isolates colors based on their
    hue in an image. In the following picture, there are different colored paper pieces
    that we want to separate.
  prefs: []
  type: TYPE_NORMAL
- en: '![colored paper pieces](../Images/fecdd643734065d821f09b292bbd90c5.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Using OpenCV, we can load the image and convert it to the HSV color space.
    By default images are read in *BGR* format, hence we need the flag `cv2.COLOR_BGR2HSV`
    in the conversion:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'Now on the *HSV* image we can apply a color filter using the `cv2.inRange`
    function to specify a lower and upper bound for each property (hue, saturation,
    value). With some experimentation I arrived at the following values for the filter:'
  prefs: []
  type: TYPE_NORMAL
- en: '| **Property** | **Lower Bound** | **Upper Bound** |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| **Hue** | 90 | 110 |'
  prefs: []
  type: TYPE_TB
- en: '| **Saturation** | 60 | 100 |'
  prefs: []
  type: TYPE_TB
- en: '| **Value** | 150 | 200 |'
  prefs: []
  type: TYPE_TB
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: The hue filter here is constrained between 90 and 110, which corresponds to
    the light blue paper at the bottom of the image. We also set a range of the saturation
    and the brightness value to get a reasonably accurate mask.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/0f90d3c104e0baa722ff89f23df4dd81.png)'
  prefs: []
  type: TYPE_IMG
- en: To show the results, we first need to convert the single-channel mask back to
    a *BGR* image shape with 3 channels. Additionally, we can also apply the mask
    to the original image and visualize the result.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/fbe81de0a131578d9f7ce4b6892b06a1.png)'
  prefs: []
  type: TYPE_IMG
- en: 'By changing the hue range, we can also isolate other pieces. For example for
    the purple paper, we can specify the following range:'
  prefs: []
  type: TYPE_NORMAL
- en: '| **Property** | **Lower Bound** | **Upper Bound** |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| **Hue** | 160 | 175 |'
  prefs: []
  type: TYPE_TB
- en: '| **Saturation** | 80 | 110 |'
  prefs: []
  type: TYPE_TB
- en: '| **Value** | 170 | 210 |'
  prefs: []
  type: TYPE_TB
- en: '![](../Images/30916fb11592821ee14bfda5a1f99139.png)'
  prefs: []
  type: TYPE_IMG
- en: 2 – Color Conversion
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: While OpenCV provides a handy function to convert full images between color
    spaces, it doesn’t provide an out-of-the-box solution to convert single colors
    between color spaces. We can write a simple wrapper that creates a small 1×1 pixel
    image with an input color, uses the integrated OpenCV function to convert to another
    color space and extract the color of this single pixel again.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: Now we can test the function with any color. We can verify that if we convert
    from RGB -> HSV -> RGB back to the original format, we get the same values.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: 3 – Continuous Color Transition
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In this third example, we will create a transition between two colors with a
    constant brightness and saturation interpolation. This will be compared to a direct
    interpolation between the initial and final RGB values.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: Now we can write a loop to compare these two interpolation methods. To create
    the image, we use the `np.full` method to fill all pixels of the image array with
    a specified color. Using `cv2.hconcat` we can combine the two images horizontally
    into one image. Before we display them, we need to convert to the OpenCV format
    BGR.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: Now we can simply call this function with two colors for which we want to visualize
    the transition. Below I visualize the transition from *blue* to *yellow*.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/6f56f39a5a9dab085925f20b2bc2e3d9.png)'
  prefs: []
  type: TYPE_IMG
- en: The difference is quite drastic. While the saturation and brightness remain
    constant in the right animation, they change considerably for the transition that
    interpolates directly in the *RGB* space.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
