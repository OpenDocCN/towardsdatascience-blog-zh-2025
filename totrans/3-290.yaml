- en: How to Get Promoted as a Data Scientist
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何作为数据科学家获得晋升
- en: 原文：[https://towardsdatascience.com/how-to-get-promoted-as-a-data-scientist-25fa81daace4/](https://towardsdatascience.com/how-to-get-promoted-as-a-data-scientist-25fa81daace4/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/how-to-get-promoted-as-a-data-scientist-25fa81daace4/](https://towardsdatascience.com/how-to-get-promoted-as-a-data-scientist-25fa81daace4/)
- en: '![Image artificially generated using Grok 2.](../Images/da56c27b79fcd7de3035a2990935bf4d.png)'
  id: totrans-2
  prefs: []
  type: TYPE_IMG
  zh: '![使用Grok 2人工生成的图像](../Images/da56c27b79fcd7de3035a2990935bf4d.png)'
- en: Image artificially generated using Grok 2.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Grok 2人工生成的图像。
- en: Introduction
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 简介
- en: I have been working as a Data Scientist since 2017, and during that time I have
    been promoted from a junior/mid-level to a senior, and most recently to a Lead
    Data Scientist.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 我自2017年以来一直担任数据科学家，在这段时间里，我从初级/中级晋升到高级，最近晋升为首席数据科学家。
- en: There is a lot of content online regarding landing your first Data Scientist
    position, but what I find is lacking is the amount of knowledge being shared regarding
    how to progress your Data Scientist career after you have already landed your
    first position.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在线有很多关于如何获得第一个数据科学家职位的内容，但我发现缺乏的是关于如何在获得第一个职位后如何推进数据科学家职业生涯的知识分享。
- en: In this article, I will share my experiences over the past 8 years and offer
    advice to those looking to take the leap and get promoted in 2025.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我将分享我过去8年的经验，并为那些希望在2025年晋升的人提供建议。
- en: Show What You Can Do
  id: totrans-8
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 展示你能做什么
- en: I have always been a believer in earning your promotion through hard work rather
    than receiving it under alternative circumstances. It might seem like an obvious
    suggestion but simply demonstrating what you’re capable of and that you’re ready
    to step up and take on more responsibility is key to landing a promotion.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 我一直相信通过努力工作而不是在其他情况下获得晋升。这可能看起来像是一个明显的建议，但仅仅展示你的能力，表明你准备好承担更多责任，这是获得晋升的关键。
- en: Take advantage of opportunities to showcase your work and vocalise what you
    have achieved. Many companies host internal show-and-tell sessions where individuals
    are given the opportunity to present their work to the wider organisation, take
    advantage of these opportunities! During these interactions, don’t just focus
    on the technical elements of your work, provide insights into how your work has
    directly contributed to business goals (e.g. increasing ROI, reducing costs, or
    improving efficiency).
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 利用机会展示你的工作并表达你所取得的成就。许多公司举办内部展示和讲述会，让个人有机会向更广泛的组织展示他们的工作，利用这些机会！在这些互动中，不要只关注你工作的技术方面，提供关于你的工作如何直接有助于业务目标的见解（例如，提高投资回报率、降低成本或提高效率）。
- en: With that said, it is not only about showcasing your work once complete. You
    also need to show that you are ready to take the lead on projects and that you
    understand how project success directly impacts company goals. Start to take more
    ownership of your work, when speaking to stakeholders, demonstrate that you are
    willing to take on more responsibility for your tasks and their outcomes.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 话虽如此，这不仅仅是在工作完成后展示你的成果。你还需要展示你准备好在项目中担任领导角色，并且理解项目成功如何直接影响公司目标。开始更多地承担你的工作责任，在与利益相关者交谈时，表明你愿意承担更多任务及其结果的责任。
- en: Always remember, actions speak louder than words!
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 总是记住，行动胜于言语！
- en: Keep Track of Your Achievements
  id: totrans-13
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 跟踪你的成就
- en: Most of the companies I have worked for have their employees fill out annual
    or quarterly personal development plans (PDPs) as a way to set goals and track
    progress over time. If your company does not do this, I highly recommend that
    you set these goals yourself as a benchmark of what you want to achieve in the
    short/mid-term. Having a PDP in place provides you with a formal future checkpoint
    which you can discuss with your line manager. Individuals who are overachieving
    in their PDP goals are much more likely to gain promotion or receive a salary
    increase.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 我曾经为的大部分公司都要求员工填写年度或季度个人发展计划（PDPs），作为一种设定目标和跟踪进展的方式。如果你的公司没有这样做，我强烈建议你自己设定这些目标，作为你短期/中期想要实现的目标的基准。有一个PDP可以为你提供一个正式的未来检查点，你可以与你的直接经理讨论。在PDP目标上超额完成的人更有可能获得晋升或加薪。
- en: I also recommend keeping an updated personal list of all of your main achievements
    broken down by quarter, therefore you have solid evidence to back up your claims
    that you are ready to step up and be promoted. Always ask for feedback from senior
    colleagues when completing projects and document this, a strong candidate for
    promotion should be able to demonstrate their ability to implement feedback and
    improve their performance over time.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 我还建议你保持一份更新后的个人主要成就列表，按季度划分，这样你就有坚实的证据来支持你准备晋升的声明。在完成项目时，总是向资深同事寻求反馈，并记录下来，一个有望晋升的候选人应该能够展示他们实施反馈并随着时间的推移提高自己表现的能力。
- en: Don’t just focus on technical achievements; also focus on non-technical achievements,
    such as leading a workshop, mentoring a junior team member, or temporarily taking
    on more responsibility due to an annual leave or absence.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 不要只关注技术成就；也要关注非技术成就，例如主持研讨会、指导初级团队成员，或者因为年假或缺席而临时承担更多责任。
- en: In my experience, those who approach the conversation of promotion with factual
    documented achievements have a much better chance of being promoted, and preparation
    is key.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 根据我的经验，那些用事实记录的成就来谈论晋升的人有更大的晋升机会，而准备是关键。
- en: Be Visible
  id: totrans-18
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 保持可见性
- en: Throughout my 8 years as a Data Scientist, I have witnessed individuals less
    qualified get promoted over others simply because they were more visible and had
    established a presence within the company.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 在我作为数据科学家8年的职业生涯中，我目睹了一些资历较低的人因为更引人注目，在公司内部建立了自己的地位而被晋升，而其他人则没有。
- en: There is the perception that Data Scientists are promoted primarily based on
    their technical experience, but this is not the case. Having a broader presence
    within your company is a great asset when looking to land a promotion. I believe
    the higher the promotion, the more visible you should be to both technical and
    non-technical colleagues.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 有一种观点认为，数据科学家主要是基于他们的技术经验晋升的，但这并不正确。在公司内部拥有更广泛的地位在寻求晋升时是一大优势。我相信晋升越高，你应该对技术和非技术同事都越加可见。
- en: 'To become more visible in your company, you should:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 为了在你的公司中更加引人注目，你应该：
- en: Speak up during group discussions, vocalise your ideas, and do not be afraid
    to challenge other people’s opinions, regardless of job titles.
  id: totrans-22
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在小组讨论中发言，表达你的想法，不要害怕挑战他人的观点，无论职位高低。
- en: Spend time getting to know others within the business, and engage with product
    managers, stakeholders, and broader technical teams e.g. software developers.
  id: totrans-23
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 花时间了解业务中的其他人，并与产品经理、利益相关者和更广泛的工程技术团队（例如软件开发人员）进行互动。
- en: Present your work at technical talks or write about your achievements via company
    blogs.
  id: totrans-24
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在技术讲座中展示你的工作，或者通过公司博客撰写你的成就。
- en: Spend time at lunch and after work with colleagues, and get to know them personally
    outside of a work setting.
  id: totrans-25
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在午餐时间和下班后与同事共度时光，并在工作环境之外了解他们。
- en: These actions can be challenging, especially for more introverted people. To
    simplify, just start communicating with others outside of your immediate team.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 这些行为可能具有挑战性，尤其是对于更内向的人来说。为了简化，只需开始与你的直接团队之外的人进行沟通。
- en: Business Structure
  id: totrans-27
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 业务结构
- en: Every company is different. What you first need to do is understand how your
    company handles promotions. Some companies will batch promotions together, others
    will prefer to recruit externally, and others will promote ad-hoc throughout the
    year.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 每家公司都不同。首先你需要做的是了解你的公司如何处理晋升。一些公司会将晋升批量处理，其他公司可能更倾向于外部招聘，而还有一些公司会在全年不定期晋升。
- en: You will find in larger companies there are more hoops to jump through, more
    people are involved, and there is a higher level of sign-off before a promotion
    is granted. Smaller companies and start-ups are often able to promote at a much
    faster pace.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 你会发现在大公司中，晋升需要跳过更多的障碍，涉及更多的人，而且在晋升被批准之前需要更高层次的批准。小型公司和初创公司通常能够以更快的速度晋升。
- en: My advice would be to look at existing employees who have been promoted during
    the time you have worked at the company. Analyse their path and understand whether
    or not this is something you are able to replicate. It wouldn’t be a bad idea
    to approach them and ask them about their own journey. Once you understand this
    process, it gives you more information to roadmap your own progression.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 我的建议是看看在你工作的这段时间里公司里晋升的现有员工。分析他们的路径，了解你是否能够复制。向他们询问他们自己的经历并不是一个坏主意。一旦你了解了这个过程，它就会给你提供更多信息来规划你自己的进步。
- en: Unfortunately, some things can arise that are out of your control, such as restructures,
    funding, and people’s opinions that you are not quite at the level they expect
    for the position you are hoping to be promoted to.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 不幸的是，有些事情可能超出了你的控制范围，比如重组、资金和人们对你不符他们期望的职位水平的看法，这些你希望晋升到的职位。
- en: Keep Learning
  id: totrans-32
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 持续学习
- en: To be successful as a Data Scientist you must have a passion for continuous
    learning. New research is being published daily at a rate that makes it impossible
    to keep up, but we need to try!
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 要作为一个成功的数据科学家，你必须对持续学习有热情。每天都有新的研究成果发表，速度之快使得跟上节奏变得不可能，但我们仍然需要努力尝试！
- en: Throughout your day-to-day responsibilities as a Data Scientist, you will be
    picking up new skills and learning. While this is great, I would advise you to
    also keep an eye on trending topics outside of the remit in which you are working.
    Personally, I have found podcasts and newsletters to be a great tool for providing
    me with the perfect level of information I require to ensure I am up-to-date with
    the most recent data science news.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 在作为数据科学家的日常职责中，你将不断学习新技能。虽然这很好，但我建议你也要关注你工作范围之外的趋势话题。我个人发现播客和新闻通讯是提供我所需信息的绝佳工具，以确保我了解最新的数据科学新闻。
- en: An often disregarded learning resource is actually the people around you who
    you work with day-to-day. Keep an interest in their projects, ask them what they
    are working on, and learn from them.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 一个经常被忽视的学习资源实际上是那些你每天一起工作的同事。对他们感兴趣的项目保持关注，询问他们正在做什么，并向他们学习。
- en: Take Advice from Others
  id: totrans-36
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 从他人那里寻求建议
- en: The best place to get advice on getting promoted is to ask those who have recently
    experienced this themselves (that is why you are reading this, right?).
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 获得晋升建议的最佳地方是向那些最近亲身经历过的人询问（这就是你为什么在读这篇文章的原因，对吧？）。
- en: Sometimes you believe you are ready for a promotion when in fact you are not.
    In these circumstances, it is great to have a mentor or senior colleague who can
    provide you with advice and recommend areas for you to develop further before
    pursuing a conversation regarding promotion.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 有时候你认为自己已经准备好晋升，但实际上你还没有。在这种情况下，有一个导师或高级同事能为你提供建议，并推荐你进一步发展的领域，在寻求晋升谈话之前，这是非常棒的。
- en: For instances where you are ready, you want to set yourself up with the best
    pitch possible to deliver to your line manager. Although I am providing you with
    my personal advice in this article, you must understand that all companies are
    different. I strongly advise you to reach out to your senior colleagues and ask
    them about what makes a good senior in your company. Take their advice, build
    your case, work on developing any areas they believe are essential, and arrange
    the conversation to pitch yourself as a strong candidate for the newly available
    senior position at your company.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 当你准备好时，你想要为自己设定一个尽可能好的提案，向你的直接经理展示。虽然我在这篇文章中提供了我的个人建议，但你必须理解，每个公司都是不同的。我强烈建议你联系你的高级同事，并询问在你公司里什么是一个好的高级职位。接受他们的建议，构建你的案例，发展他们认为至关重要的任何领域，并安排对话，将自己定位为公司新空缺的高级职位的强大候选人。
- en: Final Thoughts
  id: totrans-40
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最后的想法
- en: Your tenure at a company alone does not warrant you to be next in line for promotion,
    neither does your technical ability alone or your relationship with your stakeholders.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 仅在公司的工作年限并不能保证你将是下一个晋升的人选，你的技术能力或与利益相关者的关系也不能。
- en: From my experience, those who demonstrate what they are capable of, keep a log
    of all their achievements, enhance their visibility, understand the business structure,
    continue to expand their knowledge, and take advice from others have a much higher
    likelihood of getting promoted.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 根据我的经验，那些展示他们能力的人，记录下他们所有的成就，提高他们的可见度，理解业务结构，继续扩展他们的知识，并从他人那里寻求建议的人，晋升的可能性要高得多。
- en: Don’t get me wrong, there are instances where promotions are not handed to the
    best-suited candidate, but by following the six points in this article, you will
    be maximising your chances of being successfully promoted in 2025.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 请不要误解我，确实存在一些情况，晋升并不是给予最适合的候选人，但通过遵循本文中的六个要点，你将最大化在2025年成功晋升的机会。
