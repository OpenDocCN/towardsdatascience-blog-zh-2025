- en: Meet Our New Authors
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The latest cohort of TDS contributors has done a fantastic job translating innovative
    work into engaging and accessible articles.
  prefs: []
  type: TYPE_NORMAL
- en: '[Iva Pezo](https://towardsdatascience.com/author/iva-pezo/) explores AI’s potential
    to make the resource-intensive process of fact-checking faster, scalable, and
    more reliable.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Sruly Rosenblat](https://towardsdatascience.com/author/sruly-rosenblat/) and
    coauthors Ilan Strauss, Isobel Moure, and Tim O’Reilly take a close look at the
    emerging AI developer ecosystem and the rise of MCP.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Karol Struniawski](https://towardsdatascience.com/author/karol-struniawski/) (along
    with Antoni Olbrysz and Tomasz Wierzbicki) presents an image recognition project
    at the intersection of computer vision, ecology, and biotechnology.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We love publishing articles from new authors, so if you’ve recently written
    an interesting project walkthrough, tutorial, or theoretical reflection on any
    of our core topics, why not [share it with us?](https://towardsdatascience.com/questions-96667b06af5/)
  prefs: []
  type: TYPE_NORMAL
