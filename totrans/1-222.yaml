- en: 'TDS Newsletter: September Must-Reads on ML Career Roadmaps, Python Essentials,
    AI Agents, and More'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/tds-newsletter-september-must-reads-on-ml-career-roadmaps-python-essentials-ai-agents-and-more/](https://towardsdatascience.com/tds-newsletter-september-must-reads-on-ml-career-roadmaps-python-essentials-ai-agents-and-more/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Never miss a new edition of *The Variable*, our weekly newsletter featuring
    a top-notch selection of editors’ picks, deep dives, community news, and more.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[Subscribe today](https://newsletter.towardsdatascience.com/subscription-to-the-newsletter)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: It’s been exciting to see so many TDS authors dive headfirst into Fall, sharing
    hands-on, [actionable insights](https://towardsdatascience.com/tag/editors-pick/) on
    topics ranging from cutting-edge (agents, MCP…) to evergreen (Python skills and
    machine learning engineering, to name a few).
  prefs: []
  type: TYPE_NORMAL
- en: Equally thrilling? To see our September articles resonate with so many readers,
    who then share them far and wide. Join us as we celebrate our most-read stories
    of the past month — they cover a broad spectrum of data science, ML, and AI themes,
    so you’re bound to discover something relevant to your current interests.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: How to Become a Machine Learning Engineer (Step-by-Step)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '[Egor Howell](https://towardsdatascience.com/author/egorhowell/) has made it
    his specialty to create guides for aspiring data and ML practitioners — and their
    success proves how eager job seekers are for honest, pragmatic, and detailed advice.
    His latest, on the (increasingly popular) machine learning engineer career path,
    is another resource that should go straight to your bookmarks.'
  prefs: []
  type: TYPE_NORMAL
- en: '[How to Become a Machine Learning Engineer (Step-by-Step)](https://towardsdatascience.com/dont-follow-generic-ml-engineer-roadmaps-do-this-instead-2/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Implementing the Coffee Machine in Python
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Programming basics explained with an engaging twist? Yes, please! Mahnoor Javed’s
    latest Python tutorial covers conditional statements, loops, and dictionaries.
  prefs: []
  type: TYPE_NORMAL
- en: '[Implementing the Coffee Machine in Python](https://towardsdatascience.com/implementing-the-coffee-machine-in-python/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Python Can Now Call Mojo
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'A second Python post zoomed all the way to the top of our best-performing articles
    this month: Thomas Reid’s comprehensive, example-filled guide to boosting your
    runtime with a healthy dose of Mojo code.'
  prefs: []
  type: TYPE_NORMAL
- en: '[Python Can Now Call Mojo](https://towardsdatascience.com/python-can-now-call-mojo/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Author Spotlights
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: TDS contributors are embedded across industries, disciplines, and organization
    types, so chatting with them gives us — and you — an unfiltered view of life at
    the forefront of data science and AI. Here are two recent Q&As you shouldn’t miss.
  prefs: []
  type: TYPE_NORMAL
- en: '[Generalists Can Also Dig Deep](https://towardsdatascience.com/generalists-can-also-dig-deep/) —
    Ida Silfverskiöld discusses AI agents, RAG, and the design choices that make a
    real impact.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Actual Intelligence in the Age of AI](https://towardsdatascience.com/actual-intelligence-in-the-age-of-ai/) —
    Jarom Hulet unpacks the stakes of mastering fundamentals and hiring well.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Other September Highlights
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Don’t miss our other top reads from September, tackling some of the most buzz-generating
    tools, concepts, and workflows of the moment.
  prefs: []
  type: TYPE_NORMAL
