- en: How to Design My First AI Agent
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何设计我的第一个AI代理
- en: 原文：[https://towardsdatascience.com/how-to-design-my-first-ai-agent/](https://towardsdatascience.com/how-to-design-my-first-ai-agent/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://towardsdatascience.com/how-to-design-my-first-ai-agent/](https://towardsdatascience.com/how-to-design-my-first-ai-agent/)'
- en: <mdspan datatext="el1748974649517" class="mdspan-comment">AI agents, autonomous</mdspan>
    systems powered by large language models (LLMs), are rapidly reshaping how we
    build software and solve problems. Once confined to narrow chatbot use cases or
    for content generation, they are now orchestrating tools, reasoning over structured
    data, and automating workflows across domains like customer support, software
    engineering, financial analysis, and scientific research.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 由大型语言模型（LLMs）驱动的**AI代理**自主系统正在迅速改变我们构建软件和解决问题的方法。它们曾经仅限于狭窄的聊天机器人用例或内容生成，现在正协调工具、对结构化数据进行推理，并在客户支持、软件工程、金融分析和科学研究等领域的自动化工作流程中发挥作用。
- en: From research to industry applications, AI Agents and multi-agent collaboration
    have shown not only a lot of potential by a house-power that can automate and
    accelerate productivity while simplifying many day-to-day tasks. Recent work in
    multi-agent collaboration (AutoGPT, LangGraph), tool-augmented reasoning (ReAct,
    Toolformer), and structured prompting (Pydantic-AI, Guardrails) demonstrates the
    growing maturity of this paradigm and how fast it will change software development
    as well as other adjacent areas.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 从研究到工业应用，AI代理和多代理协作不仅显示出巨大的潜力，而且具有自动化和加速生产力、简化许多日常任务的力量。在多代理协作（AutoGPT、LangGraph）、工具增强推理（ReAct、Toolformer）和结构化提示（Pydantic-AI、Guardrails）方面的最新工作，展示了这一范式的日益成熟以及它将如何快速改变软件开发以及其他相关领域。
- en: AI agents are evolving into *generalist assistants* capable of planning, reasoning,
    and interacting with APIs and data – faster than we could ever imagine. So if
    you’re planning to expand your career goals as an AI engineer, Data Scientist
    or even software engineer, consider that building AI agents might have just become
    a must in your curriculum.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: AI代理正在演变成为**通用助手**，能够规划、推理并与API和数据交互——比我们想象的要快。所以，如果你计划扩大你的职业目标，成为AI工程师、数据科学家甚至软件工程师，考虑一下，构建AI代理可能已经成为你课程中的必备内容。
- en: 'In this post, I’ll walk you through:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我将带你了解：
- en: How to **choose the right LLM** without losing your sanity (or tokens)
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何**选择正确的LLM**而不会失去理智（或令牌）
- en: Which tools to pick depending on your vibe (and architecture)
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据你的感觉（和架构）选择哪些工具
- en: How to make sure your agent **doesn’t hallucinate its way into chaos**
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何确保你的代理**不会陷入混乱的幻觉**
- en: Choose your model (or models) wisely
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 聪明地选择你的模型（或模型）
- en: 'Yes, I know. You’re itching to get into coding. Maybe you’ve already opened
    a Colab, imported LangChain, and whispered sweet prompts into *llm.predict()*.
    But hold up, before you vibe your way into a flaky prototype, let’s talk about
    something really important: choosing your LLM (on purpose!).'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，我知道。你迫不及待地想要开始编码。也许你已经打开了Colab，导入了LangChain，并在*llm.predict()*中低声说出甜美的提示。但等等，在你以一种不稳定的方式进入原型之前，让我们谈谈一些真正重要的事情：有目的地选择你的LLM（是的，真的！）。
- en: Your model choice is foundational. It shapes what your AI agent can do, how
    fast it does it, how much it ***costs***. And let’s not forget, if you’re working
    with proprietary data, privacy is still very much a thing. So before piping it
    into the cloud, maybe run it past your security and data teams first.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 你的模型选择是基础性的。它决定了你的AI代理能做什么，它做得有多快，它**花费**多少。而且别忘了，如果你正在处理专有数据，隐私仍然非常重要。所以在将其传输到云端之前，也许先让你的安全和数据团队先看看。
- en: Before building, align your choice of LLM(s) with your application’s needs.
    Some agents can thrive with a single powerful model; others require orchestration
    between specialized ones.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 在构建之前，将你的LLM（s）的选择与你的应用需求对齐。一些代理可以用一个强大的模型茁壮成长；而其他代理则需要在不同专业模型之间进行协调。
- en: 'Important things that you should consider while designing your AI agent:'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 设计你的AI代理时应考虑的重要事项：
- en: What’s the goal of this agent?
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这个代理的目标是什么？
- en: How accurate or deterministic does it need to be?
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它需要有多准确或多确定？
- en: Does cost or fastness to get answers are relevant to you?
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 成本或快速获取答案对你来说是否相关？
- en: What type of information are you expecting the model to excel at – is it code,
    content generation, OCR of existing documents, etc.
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你期望模型在哪种类型的信息上表现出色——是代码、内容生成、现有文档的OCR等。
- en: Are you building one-shot prompts or a full multi-turn workflow?
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你是在构建一次性提示还是完整的全多轮工作流程？
- en: 'Once you’ve got that context, you can match your needs to what different model
    providers actually offer. The LLM landscape in 2025 is rich, weird, and a bit
    overwhelming. So here’s a quick lay of the land:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你有了这个背景，你就可以将你的需求与不同模型提供商实际提供的内容相匹配。2025年的LLM（大型语言模型）领域丰富、奇特，有些令人不知所措。所以，这里有一个快速的地形图：
- en: '***Your are not sure yet and you want a swiss knife – [OpenAI](https://openai.com/api/)***
    Start with **OpenAI’s GPT-4 Turbo** or **GPT-4o**. These models are the go-to
    choice for agents that need to *do stuff and not mess up while doing it*. They’re
    good at reasoning, coding, and providing well context answers. But (of course)
    there’s a catch. They’re API-bound and the models are proprietary, which means
    you can’t pick under the hood, no tweaking or fine-tuning.'
  id: totrans-20
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '***你还没有确定，但想要一把瑞士军刀——[OpenAI](https://openai.com/api/)*** 从**OpenAI的GPT-4 Turbo**或**GPT-4o**开始。这些模型是那些需要*做事而不出错*的代理的首选。它们擅长推理、编码和提供良好的上下文回答。 但（当然）有一个缺点。它们受限于API，并且模型是专有的，这意味着你无法深入查看，无法调整或微调。'
- en: 'And while OpenAI does offer enterprise-grade privacy guarantees, remember:
    by default, your data is still going *out there.*  If you’re working with anything
    proprietary, regulated, or just sensitive, double-check your legal and security
    teams are on board.'
  id: totrans-21
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 虽然OpenAI确实提供了企业级的隐私保证，但请记住：默认情况下，你的数据仍然会“出去”。如果你正在处理任何专有、受监管或只是敏感的数据，请确保你的法律和安全团队已经同意。
- en: 'Also worth knowing: these models are **generalists**, which is both a gift
    and a curse. They’ll do pretty much anything, but sometimes in the most average
    way possible. Without detailed prompts, they can default to safe, bland, or boilerplate
    answers.'
  id: totrans-22
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 值得了解的是：这些模型是**通才**，这既是礼物也是诅咒。它们几乎可以做任何事情，但有时是以最普通的方式。如果没有详细的提示，它们可能会默认给出安全、平淡或模板化的答案。
- en: And lastly, brace your wallet!
  id: totrans-23
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 最后，准备好你的钱包！
- en: '***If your agent needs to write code and crunch math – [DeepSeek](https://api-docs.deepseek.com/)***'
  id: totrans-24
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '***如果你的代理需要编写代码和进行数学运算——[DeepSeek](https://api-docs.deepseek.com/)***'
- en: If your agent will be heavily working in operations with dataframes, functions,
    or math-heavy tasks, DeepSeek is like hiring a math PhD who also happens to write
    Python! It’s optimized for **reasoning and code generation**, and often outperforms
    bigger names in structured thinking. And yes, it’s open-weight — more room for
    customization if you need it!
  id: totrans-25
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 如果你的代理将在涉及数据框、函数或数学密集型任务的操作中大量工作，DeepSeek就像雇佣了一个同时会写Python的数学博士！它针对**推理和代码生成**进行了优化，通常在结构化思维方面优于更大的名字。而且，是的，它是开放式的——如果你需要，有更多的定制空间！
- en: '***If you want thoughtful, careful answers and a model that feels like it’s
    double-checking the results that give you? – [Anthropic](https://www.anthropic.com/api)***'
  id: totrans-26
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '***如果你想要深思熟虑、谨慎的回答，并且感觉模型在双重检查给你提供的结果——[Anthropic](https://www.anthropic.com/api)***'
- en: If GPT-4 is the fast-talking polymath, Claude is the one that thinks deeply
    before telling you anything, then proceeds to deliver something quietly insightful.
  id: totrans-27
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 如果GPT-4是健谈的多面手，那么Claude就是那种在告诉你任何事情之前先深思熟虑的人，然后才会提供一些安静而有洞察力的内容。
- en: Claude is trained to be careful, deliberate, and safe. It’s ideal for agents
    that need to reason ethically, review sensitive data, or generate reliable, well-structured
    responses with a calm tone.It’s also better at staying within bounds and understanding
    long, complex contexts. If your agent is making decisions or dealing with user
    data, Claude feels like it’s double-checking before replying, and I mean this
    in a good way!
  id: totrans-28
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: Claude被训练得小心、谨慎和安全。它非常适合需要伦理推理、审查敏感数据或生成可靠、结构良好且语气平和的响应的代理。它还擅长保持界限并理解长而复杂的环境。如果你的代理正在做出决策或处理用户数据，Claude在回复前会像是在双重检查，我这里是指的好的方面！
- en: '**If you want full control, local inference, and no cloud dependencies – [Mistral](https://docs.mistral.ai/api/)**'
  id: totrans-29
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**如果你想要完全控制、本地推理和没有云依赖——[Mistral](https://docs.mistral.ai/api/)**'
- en: Mistral models are open-weight, fast, and surprisingly capable — ideal if you
    want full control or prefer running things on your own hardware. They’re lean
    by design, with minimal abstractions or baked-in behavior, giving you direct access
    to the model’s outputs and performance. You can run them locally and skip the
    per-token fees entirely, making them perfect for startups, hobbyists, or anyone
    tired of watching costs tick up by the word. While they may fall short on nuanced
    reasoning compared to GPT-4 or Claude, and require external tools for tasks like
    image processing, they offer privacy, flexibility, and customization without the
    overhead of managed services or locked-down APIs.
  id: totrans-30
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: Mistral 模型是开放权重、快速且令人惊讶地强大——如果你想要完全控制或更愿意在自己的硬件上运行，它们是理想的选择。它们的设计简洁，抽象最少或内置行为最少，让你能够直接访问模型的输出和性能。你可以在本地运行它们，完全跳过按令牌收费，这使得它们非常适合初创公司、爱好者或任何厌倦了看到成本逐字上升的人。虽然与
    GPT-4 或 Claude 相比，它们在细微推理方面可能有所不足，并且需要外部工具来处理图像处理等任务，但它们提供了隐私、灵活性和定制化，而没有托管服务或锁定
    API 的开销。
- en: '***Mix-and-match***'
  id: totrans-31
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '***混合搭配***'
- en: But, you don’t have to pick just one model! Depending on your agent’s architecture,
    you can mix and match to play to each model’s strengths. Use Claude for careful
    reasoning and nuanced responses, while offloading code generation to a local Mixtral
    instance to keep costs low. Smart routing between models lets you optimize for
    quality, speed, and budget.
  id: totrans-32
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 但是，你不必只选择一个模型！根据你的代理架构，你可以混合搭配以发挥每个模型的优势。使用 Claude 进行谨慎的推理和细微的回应，同时将代码生成任务卸载到本地的
    Mixtral 实例以降低成本。模型之间的智能路由让你能够优化质量、速度和预算。
- en: Choose the right tools
  id: totrans-33
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 选择合适的工具
- en: '![](../Images/362edb8501e4dab650ef2bf54b491c2e.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/362edb8501e4dab650ef2bf54b491c2e.png)'
- en: Image extracted from te [AI Agents Directory](https://aiagentsdirectory.com/landscape)
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 图像来自 [AI 代理目录](https://aiagentsdirectory.com/landscape)
- en: 'When you’re building an AI agent, it’s tempting to think in terms of frameworks
    and libraries — just pick LangChain or Pydantic-AI and wire things together, right?
    But the reality might be a bit different depending on whether you are planning
    to deploy your agent to be used for production workflows or not. So if you have
    questions about what you should consider, let me cover the following areas for
    you: infrastructure, coding frameworks and agent security operations.'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 当你构建一个 AI 代理时，很容易想到框架和库——只需选择 LangChain 或 Pydantic-AI，然后将它们连接起来，对吧？但现实可能因你是否有计划将代理部署到用于生产工作流程而有所不同。所以，如果你对应该考虑什么有疑问，让我为你概述以下领域：基础设施、编码框架和代理安全操作。
- en: '**Infrastructure:** Before your agent can think, it needs somewhere to run.
    Most teams start with the usual cloud vendors (AWS, GCP and Azure), which offer
    the scale and flexibility needed for production workloads. If you’re rolling your
    own deployment, tools like FastAPI, vLLM, or Kubernetes will likely be in the
    mix. But if you’d rather skip DevOps, platforms like AgentsOps.a or Langfusei
    manage the hard parts for you. They handle deployment, scaling, and monitoring
    so you can focus on the agent’s logic.'
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**基础设施：** 在你的代理能够思考之前，它需要一个运行的地方。大多数团队从常见的云服务提供商（AWS、GCP 和 Azure）开始，它们提供了生产工作负载所需的规模和灵活性。如果你在自行部署，FastAPI、vLLM
    或 Kubernetes 等工具可能会被纳入其中。但如果你想跳过 DevOps，像 AgentsOps.a 或 Langfusei 这样的平台会为你管理困难的部分。它们处理部署、扩展和监控，这样你就可以专注于代理的逻辑。'
- en: '**Frameworks:** Once your agent is running, it needs logic! LangGraph is ideal
    if your agent needs structured reasoning or stateful workflows. For strict outputs
    and schema validation, Pydantic-AI lets you define exactly what the model should
    return, turning fuzzy text into clean Python objects. If you’re building multi-agent
    systems, CrewAI or AutoGen are the best choice as they let you coordinate multiple
    agents with defined roles and goals. Each framework brings a different lens: some
    focus on flow, others on structure or collaboration.'
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**框架：** 一旦你的代理开始运行，它就需要逻辑！如果你的代理需要结构化推理或状态化工作流程，LangGraph 是理想的选择。对于严格的输出和模式验证，Pydantic-AI
    允许你精确定义模型应该返回的内容，将模糊的文本转换为干净的 Python 对象。如果你正在构建多代理系统，CrewAI 或 AutoGen 是最佳选择，因为它们允许你协调具有定义好的角色和目标的多个代理。每个框架都提供了不同的视角：一些专注于流程，而另一些则专注于结构或协作。'
- en: '**Security**: It’s the dull part most people skip — but agent auth and security
    matter. Tools like AgentAuth and Arcade AI help manage permissions, credentials,
    and safe execution. Even a personal agent that reads your email can have deep
    access to sensitive data. If it can act on your behalf, it should be treated like
    any other privileged system.'
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**安全性**：这是大多数人跳过的枯燥部分——但智能体身份验证和安全至关重要。像 AgentAuth 和 Arcade AI 这样的工具有助于管理权限、凭证和安全的执行。即使是读取您电子邮件的个人智能体也可能对敏感数据有深入访问权限。如果它可以代表您行事，那么它应该像任何其他特权系统一样被对待。'
- en: All combined together, gives you a solid foundation to build agents that not
    only work, but scale, adapt and are secure.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些结合在一起，为您构建不仅能够工作，而且能够扩展、适应和安全的智能体提供了坚实的基础。
- en: Nevertheless, even the best-engineered agent can go off the rails if you are
    not careful. In the next section, I’ll cover how to ensure your agent stays as
    much as possible within those rails.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管如此，即使是最精心设计的智能体，如果您不小心，也可能出轨。在下一节中，我将介绍如何确保您的智能体尽可能多地保持在轨道上。
- en: Align Agent flow with application needs
  id: totrans-42
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 将智能体流程与应用程序需求对齐
- en: Once your agent is deployed, the focus shifts from getting it to run, to making
    sure it runs **reliably**. That means reducing hallucinations, enforcing correct
    behavior, and ensuring outputs align with the expectations of your system.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦您的智能体部署，重点就转移到了确保它可靠地运行，这意味着减少幻觉、强制正确行为并确保输出与您系统的期望一致。
- en: Reliability in AI agents doesn’t come from longer prompts or only a matter of
    better wording. It comes from aligning the agent’s **control flow** with your
    application’s logic, and applying well-established techniques from recent LLM
    research and engineering practice. But what are those techniques that you can
    rely on while developing your agent?
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能智能体的可靠性并非来自更长的提示或仅仅是更好的措辞。它来自于将智能体的**控制流**与您的应用程序逻辑对齐，并应用最近 LLM 研究和工程实践中的成熟技术。但那些您在开发智能体时可以依赖的技术是什么呢？
- en: '**Structure the task with planning and modular prompting:**'
  id: totrans-45
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**使用规划和模块化提示来结构化任务**：'
- en: 'Instead of relying on a single prompt to solve complex tasks, break down the
    interaction using planning-based methods:'
  id: totrans-46
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 而不是依赖于单个提示来解决复杂任务，而是使用基于规划的方法分解交互：
- en: '**[Chain-of-Thought (CoT) prompting](https://arxiv.org/abs/2201.11903)**: Force
    the model to think step-by-step (Wei et al., 2022). Helps reduce logical leaps
    and increases transparency.'
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**[思维链 (CoT) 提示](https://arxiv.org/abs/2201.11903)**: 强制模型逐步思考（Wei 等人，2022年）。有助于减少逻辑跳跃并增加透明度。'
- en: '[**ReAct**:](https://arxiv.org/abs/2210.03629) Combines reasoning and acting
    (Yao et al., 2022), allowing the agent to alternate between internal reasoning
    and external tool usage.'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[**ReAct**:](https://arxiv.org/abs/2210.03629) 结合推理和行动（Yao 等人，2022年），允许智能体在内部推理和外部工具使用之间交替。'
- en: '**[Program-Aided Language Models (PAL)](https://arxiv.org/abs/2211.10435)**:
    Use the LLM to generate executable code (often Python) for solving tasks rather
    than freeform output (Gao et al., 2022).'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**[程序辅助语言模型 (PAL)](https://arxiv.org/abs/2211.10435)**: 使用 LLM 生成可执行代码（通常是
    Python）来解决任务，而不是自由形式的输出（Gao 等人，2022年）。'
- en: '**[Toolformer](https://arxiv.org/abs/2302.04761)**: Automatically augments
    the agent with external tool calls where reasoning alone is insufficient (Shick
    et al., 2023).'
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**[Toolformer](https://arxiv.org/abs/2302.04761)**: 自动为智能体添加外部工具调用，当仅凭推理不足时（Shick
    等人，2023年）。'
- en: '***Enforce your output structure***'
  id: totrans-51
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**强制输出结构**'
- en: LLM’s are flexible systems, with the ability to express in Natural Language,
    but, there’s a chance that your system isn’t.
  id: totrans-52
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: LLM 是灵活的系统，能够用自然语言表达，但您的系统可能不是。
- en: Leveraging schema enforcing tactics is important to ensure that your outcomes
    are compatible with the existing systems and integrations.
  id: totrans-53
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 利用模式强制策略对于确保您的结果与现有系统和集成兼容至关重要。
- en: Some of the AI agents frameworks, like Pydantic AI, already let you define response
    schemas in code and validate against them in real time.
  id: totrans-54
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 一些 AI 智能体框架，如 Pydantic AI，已经允许您在代码中定义响应模式并在实时中验证它们。
- en: '***Plan failure handling ahead***'
  id: totrans-55
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**提前规划失败处理**'
- en: 'Failures are inevitable, after all we are dealing with probabilistic systems.
    Plan for hallucinations, irrelevant completions or lack of compliance with your
    objectives:'
  id: totrans-56
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 失败是不可避免的，毕竟我们正在处理概率系统。计划应对幻觉、不相关完成或不符合您目标的情况：
- en: Add **retry strategies** for malformed or incomplete outputs.
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为格式错误或不完整的输出添加 **重试策略**。
- en: Use **Guardrails AI** or custom validators to intercept and reject invalid generations.
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 **Guardrails AI** 或自定义验证器来拦截和拒绝无效的生成。
- en: Implement **fallback prompts**, **backup models**, or even **human-in-the-loop
    escalation** for critical flows.
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于关键流程，实施**后备提示**、**备份模型**，甚至**人工介入的升级**。
- en: A reliable AI agent does not only depend on how good the model is or how accurate
    the training data was, in the end it’s the outcome of deliberate systems engineering,
    relying on strong assumptions about data, structure, and control!
  id: totrans-60
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 一个可靠的AI代理不仅取决于模型的好坏或训练数据的准确性，最终它还是精心系统工程的成果，依赖于对数据、结构和控制的强烈假设！
- en: 'As we move toward more autonomous and API-integrated agents, one principle
    becomes increasingly clear: *data quality is no longer a secondary concern but
    rather fundamental to agent performance.* The ability of an agent to reason, plan,
    or act depends not just on model weights, but on the clarity, consistency, and
    semantics of the data it processes.'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 随着我们朝着更自主和API集成的代理发展，一个原则变得越来越清晰：*数据质量不再是次要关注点，而是代理性能的基础。代理推理、计划或行动的能力不仅取决于模型权重，还取决于它处理的数据的清晰度、一致性和语义。*
- en: LLMs are generalists, but agents are specialists. And to specialize effectively,
    they need curated signals, not noisy exhaust. That means enforcing structure,
    designing robust flows, and embedding domain knowledge into both the data and
    the agent’s interactions with it.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: LLMs是通才，但代理是专家。为了有效地专业化，他们需要经过精心挑选的信号，而不是嘈杂的废气。这意味着要实施结构，设计稳健的流程，并将领域知识嵌入到数据以及代理与其交互中。
- en: The future of AI agents won’t be defined by larger models alone, but by the
    quality of the data and infrastructure that surrounds them. The engineers who
    understand this will be the ones leading the next generation of AI systems.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: AI代理的未来不会仅仅由更大的模型来定义，而是由围绕它们的 数据和基础设施的质量来定义。理解这一点的工程师将是引领下一代AI系统的那些人。
