    The second argument is the payload_str constructed from the file above.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: We use the above function to test for both serialization and deserialization
    speeds.
  prefs: []
  type: TYPE_NORMAL
- en: Benchmarking Deserialization Speed
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We load the three libraries being tested. We then run the function benchmark_load()
