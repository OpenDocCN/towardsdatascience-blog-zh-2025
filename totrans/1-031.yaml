- en: We see that orjson was able to serialize both the dataclass and the datetime
    datatypes.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/cc37edcf5dfeb826fa3f46b10735d02e.png)'
  prefs: []
  type: TYPE_IMG
- en: Working with NDJSON (A special Mention)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We’ve seen the libraries for JSON parsing, but what about NDJSON? NDJSON (Newline
    Delimited JSON), as you might know, is a format in which each line is a JSON object.
    In other words, the delimiter is not a comma but a newline character. As an example,
    this is what NDJSON looks like.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: NDJSON is mostly used for logs and streaming data, and hence, NDJSON payloads
    are excellent candidates for being parsed using the ijson library. For small to
    moderate NDJSON payloads, it is recommended to use the stdlib JSON. Other than
    ijson and stdlib JSON, there’s a dedicated NDJSON library. Below are code snippets
    showing each approach.
  prefs: []
  type: TYPE_NORMAL
- en: NDJSON using stdlib JSON & ijson
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: As NDJSON is not delimited by commas, it doesn’t qualify for a bulk load, because
    stdlib json expects to see a list of dicts. In other words, stdlib JSON’s parser
    looks for a single valid JSON element, but is instead given several JSON elements
    in the payload file. Therefore, the file has to be parsed iteratively, line by
    line, and sent to the caller function for further processing.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: With ijson, the parsing is done as shown below. With standard JSON, we have
    just one root element, which is either a dictionary if it’s a single JSON or an
    array if it is a list of dicts. But with NDJSON, each line is its own root element.
    The argument “” in ijson.items() tells the ijson parser to look at each root element.
    The arguments “” and multiple_values=True let the ijson parser know that there
    are multiple JSON root elements in the file, and to fetch one line (each JSON)
    at a time.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: Lastly, we have the dedicated library NDJSON. It basically converts the NDJSON
    format to standard JSON.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: As you have seen, NDJSON file formats can usually be parsed using stdlib json
    and ijson. For very large payloads, ijson is the best choice as it is memory-efficient.
    But if you are looking to generate NDJSON payloads from other Python objects,
    the NDJSON library is the ideal choice. This is because the function ndjson.dumps()
    automatically converts python objects to NDJSON format without having to iterate
    over these data structures.
  prefs: []
  type: TYPE_NORMAL
- en: Now that we’ve explored NDJSON, let’s pivot back to benchmarking the libraries
    stdlib json, ujson, and orjson.
  prefs: []
  type: TYPE_NORMAL
- en: The reason IJSON is not considered for Benchmarking
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: ‘ijson’ being a streaming parser is very different from the bulk parsers that
    we looked at. If we benchmarked ijson along with these bulk parsers, we would
    be comparing apples to oranges. Even if we benchmarked ijson alongside the other
    parsers, we would get the false impression that ijson is the slowest, when in
    fact it serves a different purpose altogether. ijson is optimized for memory efficiency
    and therefore has lower throughput than bulk parsers.
  prefs: []
  type: TYPE_NORMAL
