- en: You can find the source code and my early learning milestone in this [GitHub
    repository](https://github.com/miqbalrp/agentic-ai/tree/main). In this project,
    I used **OpenAI Agents SDK**, **Sectors.app API**, and **Streamlit** to build
    a simple interactive financial app that allows users to interact with AI Agents
    and ask questions related to companies listed on Indonesia Stock Exchange (IDX).
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以在本[GitHub 仓库](https://github.com/miqbalrp/agentic-ai/tree/main)中找到源代码和我的早期学习里程碑。在这个项目中，我使用了**OpenAI
    Agents SDK**、**Sectors.app API**和**Streamlit**来构建一个简单的交互式金融应用，允许用户与AI代理互动并询问与印尼证券交易所（IDX）上市的公司相关的问题。
- en: Lastly, let’s connect on [LinkedIn](https://www.linkedin.com/in/miqbalrp/)!
