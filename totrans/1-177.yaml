- en: How to Build An AI Agent with Function Calling and GPT-5
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何使用函数调用和GPT-5构建人工智能代理
- en: 原文：[https://towardsdatascience.com/how-to-build-an-ai-agent-with-function-calling-and-gpt-5/](https://towardsdatascience.com/how-to-build-an-ai-agent-with-function-calling-and-gpt-5/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/how-to-build-an-ai-agent-with-function-calling-and-gpt-5/](https://towardsdatascience.com/how-to-build-an-ai-agent-with-function-calling-and-gpt-5/)
- en: <mdspan datatext="el1761003705735" class="mdspan-comment">AI Agents</mdspan>
    and Large Language Models (LLMs)
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1761003705735" class="mdspan-comment">人工智能代理</mdspan>和大型语言模型（LLM）
- en: '**Large language models (LLMs)** are advanced AI systems built on deep neural
    network such as transformers and trained on vast amounts of text to generate human-like
    language. LLMs like ChatGPT, Claude, Gemini and Grok can tackle many challenging
    tasks and are used across fields such as science, healthcare, education, and finance.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '**大型语言模型（LLMs）**是建立在深度神经网络（如transformers）之上的高级AI系统，在大量文本上进行训练以生成类似人类的语言。LLM如ChatGPT、Claude、Gemini和Grok可以处理许多挑战性任务，并被用于科学、医疗保健、教育和金融等领域的多个方面。'
- en: 'An AI agent extends the capabilites of LLMs to solve tasks that are beyond
    their pre-trained knowledge. An LLM can write a Python tutorial from what it learned
    during training. If you ask it to book a flight, the task requires access to your
    calendar, web search and the ability to take actions, these fall beyond the LLM’s
    pre-trained knowledge. Some of the common actions include:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能代理扩展了LLM的能力，以解决超出其预训练知识的任务。LLM可以从训练期间学到的内容编写Python教程。如果你要求它预订航班，这项任务需要访问你的日历、网络搜索以及执行操作的能力，这些都超出了LLM的预训练知识。一些常见的操作包括：
- en: '***Weather forecast:** *The LLM connects to a web search tool to fetch the
    latest weather forecast.'
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***天气预报：***LLM连接到网络搜索工具以获取最新的天气预报。'
- en: '***Booking agent: ***An AI agent that can check a user’s calendar, search the
    web to visit a booking site like Expedia to find available options for flights
    and hotels, present them to the user for confirmation, and complete the booking
    on behalf of the user.'
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***预订代理：***一种能够检查用户的日历，搜索网络以访问Expedia等预订网站以查找航班和酒店的可用选项，向用户展示以供确认，并代表用户完成预订的人工智能代理。'
- en: How an AI Agent Works
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 人工智能代理的工作原理
- en: AI agents form a system that uses a Large Language Model to plan, reason, and
    take steps to interact with its environment using tools suggested from the model’s
    reasoning to solve a particular task.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能代理形成一个系统，该系统使用大型语言模型来规划、推理并采取步骤，使用模型推理中建议的工具与环境交互，以解决特定任务。
- en: Basic Structure of an AI Agent
  id: totrans-9
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 人工智能代理的基本结构
- en: '![](../Images/77d1923178fce7364d4de1c1b7974ba5.png)'
  id: totrans-10
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/77d1923178fce7364d4de1c1b7974ba5.png)'
- en: Image Generated By Gemini
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 由Gemini生成的图像
- en: '***A Large Language Model (LLM):*** the LLM is the ***brain*** of an AI agent.
    It takes a user’s prompt, plans and reasons through the request and breaks the
    problem into steps that determine which tools it should use to complete the task.'
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***大型语言模型（LLM）：***LLM是人工智能代理的**大脑**。它接收用户的提示，通过请求进行规划和推理，并将问题分解为步骤，以确定它应该使用哪些工具来完成任务。'
- en: '***A tool ***is the framework that the agent uses to perform an action based
    on the plan and reasoning from the Large Language Model. If you ask an LLM to
    book a table for you at a restaurant, possible tools that will be used include
    calendar to check your availability and a web search tool to access the restaurant
    website and make a reservation for you.'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***工具：***这是代理根据大型语言模型的计划和推理执行动作的框架。如果你要求LLM为你预订餐厅的桌子，可能使用的工具包括日历来检查你的可用性，以及网络搜索工具来访问餐厅网站并为你预订。'
- en: Ilustrated Decision Making of a Booking AI Agent
  id: totrans-14
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 预订人工智能代理的决策图示
- en: '![](../Images/728d143685fcf0c2ea22dd4b5eb11e39.png)'
  id: totrans-15
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/728d143685fcf0c2ea22dd4b5eb11e39.png)'
- en: Image Generated By ChatGPT
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 由ChatGPT生成的图像
- en: AI agents can access different tools depending on the task. A tool might be
    a data store, such as a database. For example, a customer-support agent could
    access a customer’s account details and purchase history and decide when to retrieve
    that information to help resolve an issue.
  id: totrans-17
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 人工智能代理可以根据任务访问不同的工具。一个工具可能是一个数据存储，例如数据库。例如，一个客户支持代理可以访问客户的账户详情和购买历史，并决定何时检索这些信息以帮助解决问题。
- en: AI agents are used to solve a wide range of tasks, and there are many powerful
    agents available. Coding agents, particularly agentic IDEs such as Cursor, Windsurf,
    and GitHub Copilot help engineers write and debug code faster and build projects
    quickly. CLI Coding agents like Claude Code and Codex CLI can interact with a
    user’s desktop and terminal to carry out coding tasks. ChatGPT supports agents
    that can perform actions such as booking reservations on a user’s behalf. Agents
    are also integrated into customer support workflows to communicate with customers
    and resolve their issues.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: AI 代理用于解决各种任务，并且有许多强大的代理可供选择。编码代理，尤其是 Cursor、Windsurf 和 GitHub Copilot 等代理 IDE，可以帮助工程师更快地编写和调试代码，并快速构建项目。CLI
    编码代理，如 Claude Code 和 Codex CLI，可以与用户的桌面和终端交互，执行编码任务。ChatGPT 支持代表用户进行预订等操作的代理。代理还集成到客户支持工作流程中，以与客户沟通并解决他们的问题。
- en: Function Calling
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 函数调用
- en: Function calling is a technique for connecting a large language model (LLM)
    to external tools such as APIs or databases. It is used in creating AI agents
    to connect LLMs to tools. In function calling, each tool is defined as a code
    function (for example, a weather API to fetch the latest forecast) along with
    a JSON Schema that specifies the function’s parameters and instructs the LLM on
    when and how to call the function for a given task.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 函数调用是一种将大型语言模型 (LLM) 连接到外部工具（如 API 或数据库）的技术。它在创建 AI 代理时用于将 LLM 连接到工具。在函数调用中，每个工具都被定义为一个代码函数（例如，用于获取最新预报的天气
    API），以及一个 JSON Schema，该 Schema 指定函数的参数并指导 LLM 在何时以及如何针对特定任务调用该函数。
- en: The type of function defined depends on the task the agent is designed to perform.
    For example, for a customer support agent we can define a function that can extract
    information from unstructured data, such as PDFs containing details about a business’s
    products.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 定义函数的类型取决于代理设计要执行的任务。例如，对于一个客户支持代理，我们可以定义一个可以从非结构化数据中提取信息的功能，例如包含有关企业产品详细信息的
    PDF 文件。
- en: In this post I will demonstrate how to use function calling to build a simple
    web search agent using GPT-5 as the large language model.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我将演示如何使用函数调用构建一个简单的网络搜索代理，使用 GPT-5 作为大型语言模型。
- en: Basic Structure of a Web Search Agent
  id: totrans-23
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 网络搜索代理的基本结构
- en: '![](../Images/b04c68d07877f979963141f772014ae8.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/b04c68d07877f979963141f772014ae8.png)'
- en: Image Generated By Gemini
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: Gemini 生成的图像
- en: 'The main logic behind the web search agent:'
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 网络搜索代理背后的主要逻辑：
- en: Define a code function to handle the web search.
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定义一个代码函数来处理网络搜索。
- en: Define custom instructions that guide the large language model in determining
    when to call the web search function based on the query. For example, if the query
    asks about the current weather, the web search agent will recognize the need to
    search the internet to get the latest weather reports. However, if the query asks
    it to write a tutorial about a programming language like Python, something it
    can answer from its pre-trained knowledge it will not call the web search function
    and will respond directly instead.
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 定义自定义指令，以指导大型语言模型确定何时根据查询调用网络搜索功能。例如，如果查询询问当前的天气，网络搜索代理将识别出需要搜索互联网以获取最新的天气报告的需求。然而，如果查询要求它编写关于
    Python 等编程语言的教程，它可以从其预训练的知识中回答，它将不会调用网络搜索功能，而是直接回答。
- en: Prerequisite
  id: totrans-29
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 前提
- en: '**Create an OpenAI account and generate an API key**'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: '**创建 OpenAI 账户并生成 API 密钥**'
- en: 1:Create an [OpenAI Account](https://auth.openai.com/create-account) if you
    don’t have one
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 1：如果您还没有，请创建一个 [OpenAI 账户](https://auth.openai.com/create-account)
- en: 2: [Generate an API Key](https://platform.openai.com/account/api-keys)
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 2：[生成 API 密钥](https://platform.openai.com/account/api-keys)
- en: '**Set up and Activate Environment**'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: '**设置和激活环境**'
- en: '[PRE0]'
  id: totrans-34
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '**Export OpenAI API Key**'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: '**导出 OpenAI API 密钥**'
- en: '[PRE1]'
  id: totrans-36
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '**Setup Tavily for Web Search**'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: '**为网络搜索设置 Tavily**'
- en: Tavily is a specialized web-search tool for AI agents. Create an account on [Tavily.com](https://www.tavily.com/),
    and once your profile is set up, an API key will be generated that you can copy
    into your environment. New accounta receive 1000 free credits that can be used
    for up to 1000 web searches.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: Tavily 是专为 AI 代理定制的网络搜索工具。在 [Tavily.com](https://www.tavily.com/) 上创建账户，一旦您的个人资料设置完成，就会生成一个
    API 密钥，您可以将它复制到您的环境中。新账户将获得 1000 个免费积分，可用于最多 1000 次网络搜索。
- en: '**Export TAVILY API Key**'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: '**导出 TAVILY API 密钥**'
- en: '[PRE2]'
  id: totrans-40
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '**Install Packages**'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: '**安装包**'
- en: '[PRE3]'
  id: totrans-42
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Building a Web Search Agent with Function Calling Step by Step
  id: totrans-43
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 步步构建具有函数调用的网络搜索代理
- en: 'Step 1: Create Web Search Function with Tavily'
  id: totrans-44
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 步骤 1：使用 Tavily 创建网络搜索功能
- en: A web search function is implemented using Tavily, serving as the tool for function
    calling in the web search agent.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 Tavily 实现了网络搜索功能，作为网络搜索代理中函数调用的工具。
- en: '[PRE4]'
  id: totrans-46
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: '**Web function code breakdown**'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: '**网络函数代码分解**'
- en: 'Tavily is initialized with its API key. In the `web_search` function, the following
    steps are performed:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 API 密钥初始化了 Tavily。在 `web_search` 函数中，执行以下步骤：
- en: Tavily search function is called to search the internet and retrieve the top
    10 results.
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 调用 Tavily 搜索函数以搜索互联网并检索前 10 个结果。
- en: The search results and their corresponding sources are returned.
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 返回搜索结果及其对应来源。
- en: 'This returned output will serve as relevant context for the web search agent:
    which we will define later in this article, to fetch up-to-date information for
    queries (prompts) that require real-time data such as weather forecasts.'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 此返回输出将作为网络搜索代理的相关上下文：我们将在本文的后面定义，以获取需要实时数据（如天气预报）的查询（提示）的最新信息。
- en: 'Step 2: Create Tool Schema'
  id: totrans-52
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第 2 步：创建工具模式
- en: The tool schema defines custom instructions for an AI model on when it should
    call a tool, in this case the tool that will be used in a web search function.
    It also specifies the conditions and actions to be taken when the model calls
    a tool. A json tool schema is defined below based on the [OpenAI tool schema structure](https://platform.openai.com/docs/guides/structured-outputs?context=with_parse#supported-schemas).
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 工具模式定义了 AI 模型何时应该调用工具的定制指令，在这种情况下是用于网络搜索功能的工具。它还指定了模型调用工具时应采取的条件和操作。以下是基于 [OpenAI
    工具模式结构](https://platform.openai.com/docs/guides/structured-outputs?context=with_parse#supported-schemas)
    定义的 json 工具模式。
- en: '[PRE5]'
  id: totrans-54
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Tool schema’s Properties
  id: totrans-55
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 工具模式的属性
- en: '***type:*** Specifies that the type of tool is a function.'
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***type:*** 指定工具类型为函数。'
- en: '***name:*** the name of the function that will be used for tool call, which
    is ***web_search***.'
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***name:*** 将用于工具调用的函数名称，即 ***web_search***。'
- en: '***description:*** Describes what the AI model should do when calling the web
    search tool. It instructs the model to search the internet using the ***web_search*** function
    to fetch up-to-date information and extract relevant details to generate the best
    response.'
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***description:*** 描述了当调用网络搜索工具时 AI 模型应该做什么。它指示模型使用 ***web_search*** 函数在互联网上搜索，以获取最新信息并提取相关细节以生成最佳响应。'
- en: '***strict: ***It is set to true, this property instructs the LLM to strictly
    follow the tool schema’s instructions.'
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***strict:*** 被设置为 true，此属性指示 LLM 严格遵循工具模式的指令。'
- en: '***parameters: ***Defines the parameters that will be passed into the ***web_search*** function.
    In this case, there is only one parameter: ***query*** which represents the search
    term to look up on the internet.'
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***parameters:*** 定义了将传递给 ***web_search*** 函数的参数。在这种情况下，只有一个参数：***query***，它代表要在互联网上查找的搜索词。'
- en: '***required: ***Instructs the LLM that query is a mandatory parameter for the ***web_search*** function.'
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***required:*** 指示 LLM，查询是 ***web_search*** 函数的必填参数。'
- en: '***additionalProperties:*** it is set to false, meaning that the tool’s *arguments
    object* cannot include any parameters other than those defined under ***parameters.properties.***'
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***additionalProperties:*** 被设置为 false，意味着工具的 *arguments 对象* 不能包含除 ***parameters.properties***
    下定义的参数之外的其他参数。'
- en: 'Step 3: Create the Web Search Agent Using GPT-5 and Function Calling'
  id: totrans-63
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第 3 步：使用 GPT-5 和函数调用创建网络搜索代理
- en: Finally I will build an agent that we can chat with, which can search the web
    when it needs up-to-date information. I will use **GPT-5-mini**, a fast and accurate
    model from OpenAI, along with function calling to invoke the ***tool schema ***and
    the ***web search function ***already defined.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我将构建一个我们可以与之交谈的代理，当它需要最新的信息时可以搜索网络。我将使用 OpenAI 的快速且精确的模型 **GPT-5-mini**，并结合函数调用来调用已定义的
    ***tool schema*** 和 ***web search function***。
- en: '[PRE6]'
  id: totrans-65
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: '**Step by Step Code Breakdown**'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: '**逐步代码分解**'
- en: '[PRE7]'
  id: totrans-67
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: Initialized the OpenAI model API with an API key.
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 API 密钥初始化了 OpenAI 模型 API。
- en: Initialized two variables ***prev_response_id*** and ***tool_results***. ***prev_response_id ***keeps
    track of the model’s response to maintain conversation state, and ***tool_results ***is
    a list that stores outputs returned from the ***web_search ***function call.
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 初始化了两个变量 ***prev_response_id*** 和 ***tool_results***。***prev_response_id***
    用于跟踪模型的响应以维护会话状态，而 ***tool_results*** 是一个存储从 ***web_search*** 函数调用返回的输出的列表。
- en: The chat runs inside the*** loop***. A user enters a message and the model called
    with tool schema accepts the message, reasons over it, decides whether to call
    the web search tool, and then the tool’s output is passed back to the model. The
    model generates a context-aware response. This continues until the user exits
    the chat.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 聊天在***循环***内运行。用户输入一条消息，使用工具模式调用的模型接受该消息，对其进行推理，决定是否调用网络搜索工具，然后将工具的输出传递回模型。模型生成一个上下文感知的响应。这个过程会一直持续到用户退出聊天。
- en: '**Code Walkthrough of the Loop**'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: '**循环的代码遍历**'
- en: '[PRE8]'
  id: totrans-72
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Checks if the ***tool_results*** is empty. If it is, the user will be prompted
    to type in a message, with an option to quit using ***exit*** or ***q***.
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 检查***tool_results***是否为空。如果是空的，用户将被提示输入消息，可以选择使用***exit***或***q***退出。
- en: If the ***tool_results*** is not empty, ***user_message ***will be set to the
    collected tool outputs to be sent to the model. ***tool_results*** is cleared
    to avoid resending the same ***tool outputs ***on the next loop iteration.
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果***tool_results***不为空，***user_message***将被设置为收集到的工具输出，以便发送到模型。***tool_results***被清除，以避免在下一个循环迭代中重新发送相同的***tool
    outputs***。
- en: The current date (***today_date***) is obtained to be used by the model to make
    time-aware decisions.
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 获取当前日期（***today_date***）以供模型使用，以便做出时间感知的决策。
- en: 'Calls ***client.responses.create*** to generate the model’s response and it
    accepts the following parameters:'
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 调用***client.responses.create***生成模型的响应，并接受以下参数：
- en: 'model: set to ***gpt-5-mini***.'
  id: totrans-77
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: model：设置为***gpt-5-mini***。
- en: 'input: accepts the user’s message.'
  id: totrans-78
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: input：接受用户的消息。
- en: 'instructions: set to current’s date (today_date).'
  id: totrans-79
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: instructions：设置为当前日期（today_date）。
- en: 'tools: set to the tool schema that was defined earlier.'
  id: totrans-80
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: tools：设置为之前定义的工具模式。
- en: 'previous_response_id: set to the previous response’s id so the model can maintain
    conversation state.'
  id: totrans-81
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: previous_response_id：设置为前一个响应的ID，以便模型可以维持对话状态。
- en: 'text: verbosity is set to low to keep model’s response concise.'
  id: totrans-82
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: text：将详尽性设置为低，以保持模型响应的简洁性。
- en: 'reasoning: GPT-5-mini is a reasoning model, set the reasoning’s effort to low
    for faster’s response. For more complex tasks we can set it to high.'
  id: totrans-83
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: reasoning：GPT-5-mini是一个推理模型，将推理的努力程度设置为低以获得更快的响应。对于更复杂的任务，我们可以将其设置为高。
- en: 'store: tells the model to store the current’s response so it can be retrieved
    later and helps with conversation continuity.'
  id: totrans-84
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: store：告诉模型存储当前响应，以便以后可以检索，并有助于对话的连续性。
- en: '***prev_response_id***is set to current’s response id so the next function
    call can thread onto the same conversation.'
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***prev_response_id***设置为当前响应ID，以便下一个函数调用可以继续同一对话。'
- en: '[PRE9]'
  id: totrans-86
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: This processes the model’s response output and does the following;
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 这处理模型的响应输出，并执行以下操作；
- en: If the output type is reasoning, print each item in the reasoning summary.
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果输出类型是推理，打印推理摘要中的每个项。
- en: If the output type is message, iterate through the content and print each text
    item.
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果输出类型是消息，遍历内容并打印每个文本项。
- en: If the output type is a function call, obtain the function’s name, parse its
    arguments, and pass them to the function (***web_search***) to generate a response.
    In this case, the web search response contains up-to-date information relevant
    to the user’s message. Finally appends the function call’s response and function
    call id to ***tool_results***. This lets the next loop send the tool result back
    to the model.
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果输出类型是函数调用，获取函数的名称，解析其参数，并将它们传递给函数（***web_search***）以生成响应。在这种情况下，网络搜索响应包含与用户消息相关的最新信息。最后将函数调用的响应和函数调用ID添加到***tool_results***中。这允许下一个循环将工具结果发送回模型。
- en: Full Code for the Web Search Agent
  id: totrans-91
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 网络搜索代理的完整代码
- en: '[PRE10]'
  id: totrans-92
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: When you run the code, you can easily chat with the agent to ask questions that
    require the latest information, such as the current weather or the latest product
    releases. The agent responds with up-to-date information along with the corresponding
    sources from the internet. Below is a sample output from the terminal.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 当您运行代码时，您可以轻松地与代理聊天，询问需要最新信息的问题，例如当前天气或最新产品发布。代理会提供最新的信息，以及来自互联网的相关源代码。以下是从终端输出的示例。
- en: '[PRE11]'
  id: totrans-94
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: You can see the results with their corresponding web sources. When you ask it
    to perform a task that doesn’t require up-to-date information, such as maths calculations
    or writing code the agent responds directly without any web search.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以看到它们对应网页源代码的结果。当您要求它执行不需要最新信息的任务，例如数学计算或编写代码时，代理会直接响应，而无需进行任何网络搜索。
- en: 'Note: The web search agent is a simple, single-tool agent. Advanced agentic
    systems orchestrate multiple specialized tools and use efficient memory to maintain
    context, plan, and solve more complex tasks.'
  id: totrans-96
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 注意：网络搜索代理是一个简单、单工具的代理。高级代理系统协调多个专业工具，并使用高效的记忆来维持上下文、规划和解决更复杂的任务。
- en: Conclusion
  id: totrans-97
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this post I explained how an AI agent works and how it extends the capabilities
    of a large language model to interact with its environment, perform actions and
    solve tasks through the use of tools. I also explained function calling and how
    it enables LLMs to call tools. I demonstrated how to create a tool schema for
    function calling that defines when and how an LLM should call a tool to perform
    an action. I defined a web search function using Tavily to fetch information from
    the web and then showed step by step how to build a web search agent using function
    calling and GPT-5-mini as the LLM. In the end, we built a web search agent capable
    of retrieving up-to-date information from the internet to answer user queries.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇帖子中，我解释了人工智能代理的工作原理以及它是如何通过使用工具来扩展大型语言模型与环境交互、执行动作和解决任务的能力。我还解释了函数调用以及它是如何使大型语言模型能够调用工具的。我演示了如何创建一个用于函数调用的工具模式，该模式定义了大型语言模型何时以及如何调用工具来执行动作。我使用Tavily定义了一个网络搜索函数，用于从网络中获取信息，然后逐步展示了如何使用函数调用和GPT-5-mini作为大型语言模型来构建网络搜索代理。最后，我们构建了一个能够从互联网检索最新信息以回答用户查询的网络搜索代理。
- en: Check out my GitHub repo, *[GenAI-Courses](https://github.com/ayoolaolafenwa/GenAI-Courses/tree/main) *where
    I have published more courses on various Generative AI topics. It also includes
    a guide on building an [Agentic RAG using function calling.](https://github.com/ayoolaolafenwa/GenAI-Courses/blob/main/AI%20Agents/Agentic_RAG.md)
  id: totrans-99
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 查看我的GitHub仓库*[GenAI-Courses](https://github.com/ayoolaolafenwa/GenAI-Courses/tree/main)*，我在那里发布了关于各种生成式人工智能主题的更多课程。它还包括一个关于使用函数调用构建[代理RAG](https://github.com/ayoolaolafenwa/GenAI-Courses/blob/main/AI%20Agents/Agentic_RAG.md)的指南。
