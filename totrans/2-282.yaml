- en: That’s it! Let’s see how to go from this to a meaningful report next.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
- en: 'The Boring Part: Extracting Summary Statistics'
  id: totrans-27
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Even with all the advances in AI capability and availability, you probably don’t
    want to send your entire dataset to an LLM provider. There are a couple of good
    reasons why.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
- en: It could **consume way too many tokens**, which translates directly to higher
    costs. Processing large datasets can **take a long time**, especially when you’re
    running models locally on your own hardware. You might also be dealing with **sensitive
    data** that shouldn’t leave your organization.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
- en: Some manual work is still the way to go.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
- en: This approach requires you to write a function that extracts key elements and
    statistics from your Pandas DataFrame. You’ll have to write this function from
    scratch for different datasets, but the core idea transfers easily between projects.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
- en: 'The `get_summary_context_message()` function takes in a DataFrame and returns
    a formatted multi-line string with a detailed summary. Here’s what it includes:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
- en: Total application count and gender distribution
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: International vs domestic applicant breakdown
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: GPA and GMAT score quartile statistics
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Admission rates by academic major (sorted by rate)
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Admission rates by work industry (top 8 industries)
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Work experience analysis with categorical breakdowns
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Key insights highlighting top-performing categories
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Here’s the complete source code for the function:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  id: totrans-41
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'Once you’ve defined the function, simply call it and print the results:'
  id: totrans-42
  prefs: []
