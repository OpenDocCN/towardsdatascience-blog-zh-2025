  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
- en: Now let’s move on to the fun part.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
- en: 'The Cool Part: Working with LLMs'
  id: totrans-47
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This is where things get interesting and your manual data extraction work pays
    off.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
- en: Python helper function for working with LLMs
  id: totrans-49
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: If you have decent hardware, I strongly recommend using local LLMs for simple
    tasks like this. I use [Ollama](https://ollama.com) and the latest version of
    the **Mistral model** for the actual LLM processing.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/0113d2718e99aafe577d15c355ead7ae.png)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
- en: Image 4 – Available Ollama models (image by author)
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
- en: If you want to use something like ChatGPT through OpenAI API, you can still
    do that. You’ll just need to modify the function below to set up your API key
    and return the appropriate instance from Langchain.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
- en: 'Regardless of the option you choose, a call to `get_llm()` with a test message
    shouldn’t return an error:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  id: totrans-55
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: '![](../Images/40bf6497fe514b935b95ea29e7610480.png)'
  id: totrans-56
  prefs: []
  type: TYPE_IMG
- en: Image 5 – LLM test message (image by author)
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
- en: Summarization prompt
  id: totrans-58
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This is where you can get creative and write ultra-specific instructions for
    your LLM. I’ve decided to keep things light for demonstration purposes, but feel
    free to experiment here.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
- en: There isn’t a single right or wrong prompt.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
- en: 'Whatever you do, make sure to include the format arguments using curly brackets
    – these values will be filled dynamically later:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  id: totrans-62
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Summarization Python function
  id: totrans-63
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: With the prompt and the `get_llm()` functions declared, the only thing left
    is to connect the dots. The `get_report_summary()` function takes in arguments
    that will fill the format placeholders in the prompt, then invokes the LLM with
    that prompt to generate a report.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
- en: 'You can choose between Markdown or HTML formats:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  id: totrans-66
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'Using the function is straightforward – just pass in the dataset, its name,
    and source. The report format defaults to Markdown:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 使用该功能非常简单——只需传入数据集、其名称和来源。报告格式默认为Markdown：
- en: '[PRE8]'
  id: totrans-68
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: '![](../Images/904b63a1f43b5d74917e233785b0b38d.png)'
  id: totrans-69
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/904b63a1f43b5d74917e233785b0b38d.png)'
- en: Image 6 – Final report in Markdown format (image by author)
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 图像6 - Markdown格式的最终报告（作者提供）
- en: The HTML report is just as detailed, but could use some styling. Maybe you could
    ask the LLM to handle that as well!
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: HTML报告同样详细，但可能需要一些样式。也许你可以请LLM也处理这一点！
- en: '![](../Images/2589a13e0356e020c4ed61a16e641f79.png)'
  id: totrans-72
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/2589a13e0356e020c4ed61a16e641f79.png)'
- en: Image 7 – Final report in HTML format (image by author)
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 图像7 - HTML格式的最终报告（作者提供）
- en: What You Could Improve
  id: totrans-74
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 你可以改进的地方
- en: I could have easily turned this into a 30-minute read by optimizing every detail
    of the pipeline, but I kept it simple for demonstration purposes. You don’t have
    to (and shouldn’t) stop here though.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 我本可以将这变成一篇30分钟的阅读材料，通过优化管道的每一个细节，但我为了演示目的保持了简单。不过，你不必（也不应该）就此止步。
- en: 'Here are the things you can improve to make this pipeline even more powerful:'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些你可以改进的地方，使这个管道更加强大：
- en: '**Write a function that saves the report (Markdown or HTML) directly to disk**.
    This way you can automate the entire process and generate reports on a schedule
    without manual intervention.'
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**编写一个函数，将报告（Markdown或HTML）直接保存到磁盘**。这样，你可以自动化整个过程，并按计划生成报告，无需人工干预。'
- en: In the prompt, **ask the LLM to add CSS styling to the HTML report** to make
    it look more presentable. You could even provide your company’s brand colors and
    fonts to maintain consistency across all your data reports.
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在提示中，**要求LLM为HTML报告添加CSS样式**，使其看起来更易于展示。你甚至可以提供你公司的品牌颜色和字体，以保持所有数据报告的一致性。
- en: '**Expand the prompt to follow more specific instructions**. You might want
    reports that focus on specific business metrics, follow a particular template,
    or include recommendations based on the findings.'
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**扩展提示以遵循更具体的指令**。你可能希望报告专注于特定的业务指标，遵循特定的模板，或基于发现提供建议。'
- en: Expand the `get_llm()` function so it can **connect both to Ollama and other
    vendors** like OpenAI, Anthropic, or Google. This gives you flexibility to switch
    between local and cloud-based models depending on your needs.
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 扩展`get_llm()`函数，使其能够**连接到Ollama和其他供应商**，如OpenAI、Anthropic或Google。这为你提供了根据需要在不同本地和云模型之间切换的灵活性。
- en: Do literally anything in the get_summary_context_message() function since it
    serves as the foundation for all **context data provided to the LLM**. This is
    where you can get creative with feature engineering, statistical analysis, and
    data insights that matter to your specific use case.
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在get_summary_context_message()函数中，你可以做任何实际的事情，因为它为LLM提供的所有**上下文数据**提供了基础。这是你可以发挥创意进行特征工程、统计分析以及对你特定用例有意义的见解的地方。
- en: I hope this minimal example has set you on the right track to automate your
    own data reporting workflows.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望这个最小示例能让你走上自动化自己的数据报告工作流程的正确道路。
