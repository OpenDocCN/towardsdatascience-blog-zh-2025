- en: The Ultimate AI/ML Roadmap For Beginners
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/the-ultimate-ai-ml-roadmap-for-beginners/](https://towardsdatascience.com/the-ultimate-ai-ml-roadmap-for-beginners/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: AI is transforming the way businesses operate, and nearly every company is exploring
    how to leverage this technology.
  prefs: []
  type: TYPE_NORMAL
- en: As a result, the demand for AI and machine learning skills has skyrocketed in
    recent years.
  prefs: []
  type: TYPE_NORMAL
- en: With nearly four years of experience in AI/ML, I’ve decided to create the ultimate
    guide to help you enter this rapidly growing field.
  prefs: []
  type: TYPE_NORMAL
- en: Why work in AI/ML?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: It’s no secret that AI and machine learning are some of the most desired technologies
    nowadays.
  prefs: []
  type: TYPE_NORMAL
- en: Being well-versed in these fields will open many career opportunities going
    forward, not to mention that you will be at the forefront of scientific advancement.
  prefs: []
  type: TYPE_NORMAL
- en: And to be blunt, you will be paid a lot.
  prefs: []
  type: TYPE_NORMAL
- en: According to [**Levelsfyi**](https://www.levels.fyi/t/software-engineer/title/ai-engineer?country=253),
    the median salary for a machine learning engineer is £93k, and for an AI engineer
    is £75k. Whereas for a data scientist, it is £70k, and software engineer is £83k.
  prefs: []
  type: TYPE_NORMAL
- en: Don’t get me wrong; these are super high salaries on their own, but AI/ML will
    give you that edge, and the difference will likely grow more prominent in the
    future.
  prefs: []
  type: TYPE_NORMAL
- en: You also don’t need a PhD in computer science, maths, or physics to work on
    AI/ML. Good engineering and problem-solving skills, along with a good understanding
    of the fundamental ML concepts, are enough.
  prefs: []
  type: TYPE_NORMAL
- en: Most jobs are not research jobs but more implementing AI/ML solutions to real-life
    problems.
  prefs: []
  type: TYPE_NORMAL
- en: For example, I work as a machine learning engineer, but I don’t do research.
    I aim to use algorithms and apply them to business problems to benefit the customers
    and, thus, the company.
  prefs: []
  type: TYPE_NORMAL
- en: 'Below are jobs that use AI/ML:'
  prefs: []
  type: TYPE_NORMAL
- en: Machine Learning Engineer
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: AI Engineer
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Research Scientist
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Research Engineer
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Data Scientist
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Software Engineer (AI/ML focus)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Data Engineer (AI/ML focus)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Machine Learning Platform Engineer
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Applied Scientist
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: They all have different requirements and skills, so there will be something
    that suits you well.
  prefs: []
  type: TYPE_NORMAL
- en: If you want to learn more about the roles above, I recommend reading some of
    my previous articles.
  prefs: []
  type: TYPE_NORMAL
- en: '[The Difference Between ML Engineers and Data Scientists](https://towardsdatascience.com/the-difference-between-ml-engineers-and-data-scientists-b64ac19c0f41/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[**Should You Become A Data Scientist, Data Analyst Or Data Engineer?**'
  prefs: []
  type: TYPE_NORMAL
- en: '*Explaining the differences and requirements between the various data roles*medium.com](https://medium.com/data-science/should-you-become-a-data-scientist-data-analyst-or-data-engineer-a9cd5c529650)'
  prefs: []
  type: TYPE_NORMAL
- en: Right, let’s now get into the roadmap!
  prefs: []
  type: TYPE_NORMAL
- en: Maths
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: I’d argue that solid mathematics skills are probably the most essential for
    any tech professional, especially if you are working with AI/ML.
  prefs: []
  type: TYPE_NORMAL
- en: You need a good grounding to understand how AI and ML models work under the
    hood. This will help you better debug them and develop intuition about how to
    work with them.
  prefs: []
  type: TYPE_NORMAL
- en: Don’t get me wrong; you don’t need a PhD in quantum physics, but you should
    be knowledgeable in the following three areas.
  prefs: []
  type: TYPE_NORMAL
- en: '**Linear Algebra** — to understand how matrices, eigenvalues and vectors work,
    which are used everywhere in AI and machine learning.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Calculus** — to understand how AI actually learns using algorithms like gradient
    descent and backpropagation that utilise differentiation and integration.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Statistics** — to understand the probabilistic nature of machine learning
    models through learning probability distributions, statistical inference and Bayesian
    statistics.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Resources:**'
  prefs: []
  type: TYPE_NORMAL
- en: '[**Practical Statistics for Data Science**](https://amzn.to/4l1lFFU) **(affiliate
    link)**— Great applied book with coding examples in Python.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**Mathematics for Machine Learning**](https://amzn.to/4hxRCmb) **(affiliate
    link)**— Best all-round book, but quite dense.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**Essence of Linear Algebra (3Blue1Brown)**](https://www.youtube.com/watch?v=fNk_zzaMoSs) — Fantastic
    visual explanations'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**Brilliant**](https://brilliant.org/) & [**Khan Academy**](https://www.khanacademy.org/) — Wide
    range of information on all topics.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This is pretty much all you need; if anything, it’s slightly overkill in some
    aspects!
  prefs: []
  type: TYPE_NORMAL
- en: '**Timeline:** Depending on background, this should take you a couple/few months
    to get up to speed.'
  prefs: []
  type: TYPE_NORMAL
- en: '*I have in-depth breakdowns of the maths you need for data science, which is
    equally applicable here for AI/ML.*'
  prefs: []
  type: TYPE_NORMAL
- en: '[How to Learn the Math Needed for Data Science](https://towardsdatascience.com/how-to-learn-the-math-needed-for-data-science-86c6643b0c59/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Python
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Python is the gold standard and the go-to programming language for machine learning
    and AI.
  prefs: []
  type: TYPE_NORMAL
- en: Beginners often get caught up in the so-called “best way” to learn Python. Any
    introductory course will suffice, as they teach the same things.
  prefs: []
  type: TYPE_NORMAL
- en: 'The main things you want to learn are:'
  prefs: []
  type: TYPE_NORMAL
- en: Native data structures (dictionaries, lists, sets, and tuples)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For and while loops
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If-else conditional statements
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Functions and classes
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'You also want to learn specific scientific computing libraries such as:'
  prefs: []
  type: TYPE_NORMAL
- en: '[**NumPy**](https://numpy.org/devdocs/user/quickstart.html) — Numerical computing
    and arrays.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**Pandas**](https://www.w3schools.com/python/pandas/default.asp) — Data manipulation
    and analysis.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**Matplotlib**](https://matplotlib.org/stable/tutorials/index.html)& [**Plotly**](https://plotly.com/) — Data
    visualization.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**scikit-learn**](https://scikit-learn.org/1.4/tutorial/index.html)— Implementing
    classical ML algorithms.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Resources:**'
  prefs: []
  type: TYPE_NORMAL
- en: '[**W3Schools Python Course (free)**](https://www.w3schools.com/python/)** — **Great
    free resource.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**Python for Everybody Specialization (Coursera)**](https://imp.i384100.net/e4ZdXX)** — **Probably
    the most popular course on Python.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**Machine Learning with Python and Scikit-Learn — Full Course**](https://www.youtube.com/watch?v=hDKCxebp88A) — A
    video course on implementing basic ML algorithms using Python.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Timeline:** Again, depending on your background, this should take a couple
    of months. If you know Python already, it will be a lot quicker.'
  prefs: []
  type: TYPE_NORMAL
- en: Data structures and algorithms
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This one may seem slightly out of place, but if you want to be a machine learning
    or AI engineer, you must know data structures and algorithms.
  prefs: []
  type: TYPE_NORMAL
- en: This is not only for interviews; it is also used in AI/ML algorithms. You will
    come across things like backtracking, depth-first search, and binary trees more
    than you think.
  prefs: []
  type: TYPE_NORMAL
- en: 'The things to learn are:'
  prefs: []
  type: TYPE_NORMAL
- en: Arrays & Linked Lists
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Trees & Graphs
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: HashMaps, Queues & Stacks
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Sorting & Searching Algorithms
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Dynamic Programming
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Resources:**'
  prefs: []
  type: TYPE_NORMAL
- en: '[**Neetcode.io**](https://neetcode.io/courses) — Great introductory, intermediate
    and advanced data structure and algorithm courses.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**Leetcode**](https://leetcode.com/) & [**Hackerrank**](https://www.hackerrank.com/) — Platforms
    to practise.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Timeline:** Around a month to nail the basics.'
  prefs: []
  type: TYPE_NORMAL
- en: Machine learning
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This is where the fun begins!
  prefs: []
  type: TYPE_NORMAL
- en: The previous four steps involved getting your foundation ready to tackle machine
    learning.
  prefs: []
  type: TYPE_NORMAL
- en: 'In general, machine learning falls into two categories:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Supervised learning** — where we have target labels to train the model.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Unsupervised learning **— when there are no target labels.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The diagram below illustrates this split and some algorithms in each category.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/0d1e53c6aa387b3ce295af6be17af7ac.png)'
  prefs: []
  type: TYPE_IMG
- en: Diagram by author.
  prefs: []
  type: TYPE_NORMAL
- en: 'The key algorithms and concepts you should learn are:'
  prefs: []
  type: TYPE_NORMAL
- en: Linear, logistic and polynomial regression.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Decision trees, random forests and gradient-boosted trees.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Support vector machines.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: K-means and K-nearest neighbour clustering.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Feature engineering.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Evaluation metrics.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Regularisation, bias vs variance tradeoff and cross-validation.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Resources:**'
  prefs: []
  type: TYPE_NORMAL
- en: '[**Machine Learning Specialisation by Andrew Ng**](https://www.coursera.org/learn/machine-learning)— This
    is my first ML course, and I think it is probably the best one out there.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**The Hundred-Page ML Book**](https://amzn.to/4hGSHIA) **(affiliate link)**—
    Concise with practical insights into building ML models.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**Hands-On ML with Scikit-Learn, Keras, and TensorFlow**](https://amzn.to/4iJxGyh)
    **(affiliate link)** — If I had to give only one book to learn machine learning,
    this would be it!'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**The Elements of Statistical Learning**](https://amzn.to/4iRRizR) **(affiliate
    link)**— Excellent for mastering machine learning fundamentals, basically statistical
    learning.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Timeline:** This section is quite dense, so it will likely take roughly ~3
    months to know most of this information. In reality, it will take years to truly
    master everything in those resources.'
  prefs: []
  type: TYPE_NORMAL
- en: AI and deep learning
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: There has been a lot of hype around AI since ChatGPT was released in 2022.
  prefs: []
  type: TYPE_NORMAL
- en: However, AI itself has been around as a concept for a long time, dating back
    in its current form to the 1950s, when the [**neural network originated**.](https://medium.com/gitconnected/intro-perceptron-architecture-neural-networks-101-2a487062810c?sk=a738fb46cf55825c3dd47f91b26ad5e7)
  prefs: []
  type: TYPE_NORMAL
- en: The AI we refer to at the moment is specifically called generative AI (GenAI),
    which is actually quite a small subset of the whole AI eco-system as shown below.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e6297783c3f178b2edfd11bbbce1d0e6.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author.
  prefs: []
  type: TYPE_NORMAL
- en: As its name suggests, GenAI is an algorithm that generates text, images, audio,
    and even code.
  prefs: []
  type: TYPE_NORMAL
- en: 'Until recently, the AI landscape was dominated by two main models:'
  prefs: []
  type: TYPE_NORMAL
- en: '[**Convolutional Neural Networks (CNNs)** ](https://towardsdatascience.com/convolution-explained-introduction-to-convolutional-neural-networks-5babc47fbcaa/)— These
    were used for computer vision tasks such as recognising and categorising images.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**Recurrent Neural Networks (RNNs) **](https://towardsdatascience.com/recurrent-neural-networks-an-introduction-to-sequence-modelling-478e0e07c4ec?sk=3d8ff48072b608f38bf120f78a050718)**— **These
    were used for sequence-based data like time series and natural language.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: However, in 2017, a paper called [**“Attention Is All You Need”**](https://arxiv.org/abs/1706.03762)
    was published, introducing the transformer architecture and model, which has since
    superseded CNNs and RNNs.
  prefs: []
  type: TYPE_NORMAL
- en: Today, transformers are the backbone of large language models (LLMs) and unequivocally
    rule the AI landscape.
  prefs: []
  type: TYPE_NORMAL
- en: 'With all this in mind, the things you should know are:'
  prefs: []
  type: TYPE_NORMAL
- en: '[**Neural Networks**](https://medium.com/@egorhowell/list/neural-networks-616db722dbbb)** — **The
    algorithm that really puts AI/ML on the map.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Convolutional and Recurrent Neural Networks — **Still used today quite a
    bit for their specific tasks.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Transformers — **The current state of the art.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**RAG, Vector Databases, LLM Fine Tuning —** These technologies and concepts
    are crucial to the current AI infrastructure.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Reinforcement Learning** — The third type of learning used to create AI like
    [**AlphaGO**](https://en.wikipedia.org/wiki/AlphaGo).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Resources:**'
  prefs: []
  type: TYPE_NORMAL
- en: '[**Deep Learning Specialization**](https://www.coursera.org/specializations/deep-learning)
    **by** Andrew Ng. — This is the follow-on course from the Machine Learning SpecialiSation
    and will teach all you need to know about deep learning, CNNs, and RNNs.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**Introduction to LLMs**](https://www.youtube.com/watch?v=zjkBMFhNj_g&t=3065s)
    **by Andrej Karpathy (former senior director of AI at Tesla) —**learn more about
    LLMs and how they are trained.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**Neural Networks: Zero to Hero**](https://www.youtube.com/playlist?list=PLAqhIrjkxbuWI23v9cThsA9GvCAUhRvKZ)** — **Starts
    relatively slow, building a neural network from scratch. However, in the last
    video, he gets you building your own Generative Pre-trained Transformers (GPT)!'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**Reinforcement Learning Course**](https://www.youtube.com/watch?v=2pWv7GOvuf0&list=PLqYmG7hTraZDM-OYHWgPebj2MfCFzFObQ)— Lectures
    by David Silver, a lead researcher at DeepMind.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Timeline:** There is a lot here and it’s call quite hard and cutting edge
    stuff. So around 3 months is probably what it will take you.'
  prefs: []
  type: TYPE_NORMAL
- en: MLOps
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A model in a Jupyter Notebook has no value, as I have said many times.
  prefs: []
  type: TYPE_NORMAL
- en: For your AI/ML models to be useful, you must learn how to deploy them to production.
  prefs: []
  type: TYPE_NORMAL
- en: 'Areas to learn are:'
  prefs: []
  type: TYPE_NORMAL
- en: Cloud technologies like AWS, GCP or Azure.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Docker and Kubernetes.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How to write production code.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Git, CircleCI, Bash/Zsh.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Resources:**'
  prefs: []
  type: TYPE_NORMAL
- en: '[**Practical MLOps**](https://amzn.to/413ztXe) **(affiliate link)** — This
    is probably the only book you need to understand how to deploy your machine-learning
    model. I use it more as a reference text, but it teaches almost everything you
    need to know.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**Designing Machine Learning Systems**](https://amzn.to/41Ps4LB) **(affiliate
    link)**— Another great book and resource to vary your information source.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Research papers
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: AI is evolving rapidly, so it’s worth staying up to date with all the latest
    developments.
  prefs: []
  type: TYPE_NORMAL
- en: '[**ML papers of the week**](https://github.com/dair-ai/ML-Papers-of-the-Week/tree/main#top-ml-papers-of-the-week-january-15---january-21---2024)** — **A[newsletter](https://nlp.elvissaravia.com/)
    and [Twitter account](https://twitter.com/dair_ai) that sends out the most significant
    AI papers published that week, along with their key links, every week.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**ArXiv**](https://arxiv.org/) — The de-facto place to find research papers.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Some papers I recommend you read are:'
  prefs: []
  type: TYPE_NORMAL
- en: '[**Attention Is All You Need**](https://arxiv.org/pdf/1706.03762) — This is
    the original paper introducing Transformers, which power models like ChatGPT,
    BERT, and GPT-4.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**Mastering the game of Go with deep neural networks and tree search**](https://www.nature.com/articles/nature16961) — DeepMind’s
    paper on how they created an AI that beat the world’s best GO player.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**DeepSeek R1: Incentivizing Reasoning Capability in LLMs**](https://arxiv.org/pdf/2501.12948) — Recent
    work on improving logical reasoning in large language models.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**BERT: Pre-training of Deep Bidirectional Transformers**](https://arxiv.org/pdf/1810.04805) — A
    deep dive into BERT, one of the first self-supervised NLP models that improved
    contextual understanding.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**Highly accurate protein structure prediction with AlphaFold**](https://www.nature.com/articles/s41586-021-03819-2) — DeepMind
    solving protein folding using AI, a massive issue in healthcare that AI has helped
    to advance!'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can find a comprehensive list [here](https://github.com/daturkel/learning-papers).
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Breaking into AI/ML may seem overwhelming, but it’s all about taking it one
    step at a time.
  prefs: []
  type: TYPE_NORMAL
- en: Learn the basics likePython, maths and data structures and algorithms.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Get your AI/ML knowledge learning supervised learning, neural networks and transformers.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Learn how to deploy AI algorithms.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The space is ginormous, so it will probably take you about a year to fully grasp
    everything in this roadmap, and that’s fine. There are literally bachelor’s degrees
    dedicated to this space, which take three years,
  prefs: []
  type: TYPE_NORMAL
- en: Just go at your own pace, and eventually, you will get to where you want to
    be.
  prefs: []
  type: TYPE_NORMAL
- en: Happy learning!
  prefs: []
  type: TYPE_NORMAL
- en: Another thing!
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
