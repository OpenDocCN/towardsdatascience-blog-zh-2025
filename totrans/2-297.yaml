- en: 'A Bird’s Eye View of Linear Algebra: The Basics'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 线性代数的鸟瞰：基础
- en: 原文：[https://towardsdatascience.com/a-birds-eye-view-of-linear-algebra-the-basics/](https://towardsdatascience.com/a-birds-eye-view-of-linear-algebra-the-basics/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/a-birds-eye-view-of-linear-algebra-the-basics/](https://towardsdatascience.com/a-birds-eye-view-of-linear-algebra-the-basics/)
- en: <mdspan datatext="el1748542439682" class="mdspan-comment">This is the first
    chapter</mdspan> of the in-progress book on linear algebra, “A birds eye view
    of linear algebra”. This book will put a special emphasis on AI applications and
    how they leverage linear algebra.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1748542439682" class="mdspan-comment">这是正在编写的线性代数书籍“线性代数的鸟瞰”的第一章</mdspan>。这本书将特别强调人工智能应用以及它们如何利用线性代数。
- en: 'Linear algebra is a fundamental discipline underlying anything one can do with
    Math. From Physics to machine learning, probability theory (ex: Markov chains),
    you name it. No matter what you’re doing, linear algebra is always lurking under
    the covers, ready to spring at you as soon as things go multi-dimensional. In
    my experience (and I’ve heard this from others), this was at the source of a big
    shock between high school and university. In high school (India), I was exposed
    to some very basic linear algebra (mainly determinants and matrix multiplication). Then
    in university level engineering education, every subject all of a sudden seems
    to be assuming proficiency in concepts like Eigen values, Jacobians, etc. like
    you were supposed to be born with the knowledge.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 线性代数是数学中任何应用的基石。从物理学到机器学习，概率论（例如马尔可夫链），无论你做什么，线性代数总是在幕后潜伏，一旦事情变得多维，它就会随时出现。根据我的经验（我也从其他人那里听到过），这是高中和大学之间产生巨大冲击的根源。在高中（印度），我接触了一些非常基础的线性代数（主要是行列式和矩阵乘法）。然后在大一工程教育中，所有科目突然似乎都假定你天生就具备像特征值、雅可比矩阵等概念的能力。
- en: This chapter is meant to provide a high level overview of the concepts and their
    obvious applications that exist and are important to know in this discipline.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 本章旨在提供一个高级概述，介绍该学科中存在的重要概念及其明显的应用。
- en: The AI revolution
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 人工智能革命
- en: Almost any information can be embedded in a vector space. Images, video, language,
    speech, biometric information and whatever else you can imagine. And all the applications
    of machine learning and artificial intelligence (like the recent chat-bots, text
    to image, etc.) work on top of these vector embeddings. Since linear algebra is
    the science of dealing with high dimensional vector spaces, it is an indispensable
    building block.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 几乎任何信息都可以嵌入到向量空间中。图像、视频、语言、语音、生物识别信息以及你能想象到的任何其他东西。所有机器学习和人工智能的应用（如最近的聊天机器人、文本到图像等）都是基于这些向量嵌入工作的。由于线性代数是处理高维向量空间的科学，因此它是不可或缺的基石。
- en: '![](../Images/87dca56663634e19cec9e10d097d6327.png)'
  id: totrans-7
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/87dca56663634e19cec9e10d097d6327.png)'
- en: Complex concepts from our real world like images, text, speech, etc. can be
    embedded in high dimensional vector spaces. The higher the dimensionality of the
    vector space, the more complex information it can encode. Image created using
    MIdjourney.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 来自我们现实世界的复杂概念，如图像、文本、语音等，可以嵌入到高维向量空间中。向量空间的维度越高，它可以编码的信息就越复杂。使用MIdjourney创建的图像。
- en: A lot of the techniques involve taking some input vectors from one space and
    mapping them to other vectors from some other space.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 许多技术涉及从一个空间中取一些输入向量，并将它们映射到另一个空间中的其他向量。
- en: But why the focus on “linear” when most interesting functions are non-linear?
    It’s because the problem of making our models high dimensional and that of making
    them non-linear (general enough to capture all kinds of complex relationships)
    turn out to be orthogonal to each other. Many neural network architectures work
    by using linear layers with simple one dimensional non-linearities in between
    them. And there is [a theorem](https://en.wikipedia.org/wiki/Universal_approximation_theorem)
    that says this kind of architecture can model any function.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 但为什么关注“线性”，而大多数有趣的功能都是非线性的？这是因为使我们的模型高维和使它们非线性（足够通用以捕捉各种复杂关系）的问题实际上是正交的。许多神经网络架构通过使用线性层并在它们之间使用简单的一维非线性来实现。而且有一个[定理](https://en.wikipedia.org/wiki/Universal_approximation_theorem)表明这种架构可以模拟任何函数。
- en: Since the way we manipulate high dimensional vectors is primarily matrix multiplication,
    it isn’t a stretch to say it is the bedrock of the modern AI revolution.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们操作高维向量的方式主要是矩阵乘法，所以说它是现代人工智能革命的基础并不夸张。
- en: I) Vector spaces
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: I) 向量空间
- en: As mentioned in the previous section, linear algebra inevitably crops up when
    things go multi-dimensional. We start off with a scalar, which is just a number
    of some sort. For this article, we’ll be considering real and complex numbers
    for these scalars. In general, a scalar can be any object where the basic operations
    of addition, subtraction, multiplication and division are defined (abstracted
    as a “field”). Now, we want a framework to describe collections of such numbers
    (add dimensions). These collections are called “vector spaces”. We’ll be considering
    the cases where the elements of the vector space are either real or complex numbers (the
    former being a special case of the latter). The resulting vector spaces are called
    “real vector spaces” and “complex vector spaces” respectively.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 如前文所述，当事情变得多维时，线性代数不可避免地会出现。我们从一个标量开始，它只是某种类型的数字。对于这篇文章，我们将考虑这些标量是实数和复数。一般来说，标量可以是任何对象，其中加法、减法、乘法和除法的基本运算被定义（抽象为“域”）。现在，我们想要一个框架来描述这样的数字集合（添加维度）。这些集合被称为“向量空间”。我们将考虑向量空间的元素是实数或复数的情况（前者是后者的特殊情况）。由此产生的向量空间分别被称为“实向量空间”和“复向量空间”。
- en: The ideas in linear algebra are applicable to these “vector spaces”. The most
    common example is your floor, table or the computer screen you’re reading this
    on. These are all two-dimensional vector spaces since every point on your table
    can be specified by two numbers (the x and y coordinates as shown below). This
    space is denoted by *R² *since two real numbers specify it.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 线性代数中的概念适用于这些“向量空间”。最常见的例子是你的地板、桌子或你正在阅读的电脑屏幕。这些都是二维向量空间，因为你的桌子上的每个点都可以用两个数字（如下面所示）来指定（x和y坐标）。这个空间表示为*R²*，因为两个实数可以指定它。
- en: 'We can generalize R²in different ways. First, we can add dimensions. The space
    we live in is 3 dimensional (*R³*). Or, we can curve it. The surface of a sphere
    like the Earth for example (denoted *S²*), is still two dimensional, but unlike *R²* (which
    is flat), it is curved. So far, these spaces have all basically been arrays of
    numbers. But the idea of a vector space is more general. It is a **collection
    of objects** where the following ideas should be well defined:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以以不同的方式泛化R²。首先，我们可以添加维度。我们生活的空间是三维的（*R³*）。或者，我们可以将其弯曲。例如，地球这样的球面（表示为*S²*），仍然是二维的，但与*R²*（它是平的）不同，它是弯曲的。到目前为止，这些空间基本上都是数字数组。但向量空间的概念更为广泛。它是一个**对象的集合**，其中以下概念应该被很好地定义：
- en: Addition of any two of the objects.
  id: totrans-16
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 任何两个对象的加法。
- en: Multiplication of the objects by a scalar (a real number).
  id: totrans-17
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对象乘以一个标量（一个实数）。
- en: Not only that, but the objects should be “closed” under these operations. This
    means that if you apply these two operations to the objects of the vector space,
    you should get objects of the same type (you shouldn’t leave the vector space). For
    example, the set of integers isn’t a vector space because multiplication by a
    scalar (real number) can give us something that isn’t an integer (3*2.5 = 7.5
    which isn’t an integer).
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，这些对象应该在这些操作下是“封闭”的。这意味着如果你将这些操作应用于向量空间的对象，你应该得到相同类型的对象（你不应该离开向量空间）。例如，整数集不是一个向量空间，因为标量乘法（实数）可能会给我们一些不是整数的东西（3*2.5
    = 7.5，这不是一个整数）。
- en: One of the ways to express the objects of a vector space is with vectors. Vectors
    require an arbitrary “basis”. An example of a basis is the compass system with
    directions — North, South, East and West. Any direction (like “SouthWest”) can
    be expressed in terms of these. These are “direction vectors” but we can also
    have “position vectors” where we need an origin and a coordinate system intersecting
    at that origin. The latitude and longitude system for referencing every place
    on the surface of the Earth is an example. The latitude and longitude pair are
    one way to identify your house. But there are infinite other ways. Another culture
    might draw the latitude and longitude lines at a slightly different angle to what
    the standard is. And so, they’ll come up with different numbers for your house.
    But that doesn’t change the physical location of the house itself. The house exists
    as an object in the vector space and these different ways to express that location
    are called “bases”. Choosing one basis allows you to assign a pair of numbers
    to the house and choosing another one allows you to assign a different set of
    numbers that are equally valid.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 表达向量空间对象的一种方法是通过向量。向量需要一个任意的“基”。一个基的例子是带有方向的罗盘系统——北、南、东和西。任何方向（如“西南”）都可以用这些方向表示。这些是“方向向量”，但我们也可以有“位置向量”，其中需要一个原点和与该原点相交的坐标系。地球表面上每个位置的经纬度系统就是一个例子。经纬度对是识别你家的方法之一。但还有无限种其他方法。另一种文化可能会以略不同的角度绘制经纬度线，因此他们会为你的房子提供不同的数字。但这并不改变房子的物理位置。房子作为向量空间中的一个对象存在，而表达该位置的不同方式被称为“基”。选择一个基允许你为房子分配一对数字，选择另一个基允许你分配另一组同样有效的数字。
- en: '![](../Images/a7e41876caf210884681707d7df939d2.png)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/a7e41876caf210884681707d7df939d2.png)'
- en: A vector space where every position is organized and neatly mapped to a collection
    of numbers. Image created using Midjourney.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 一个向量空间，其中每个位置都被组织得井井有条，并精确地映射到一组数字。此图像使用Midjourney创建。
- en: Vector spaces can also be infinite dimensional. For instance, in miniature 12
    of [2], the entire set of real numbers is thought of as an infinite dimensional
    vector space.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 向量空间也可以是无限维的。例如，在[2]的第12微型版本中，整个实数集被看作是一个无限维向量空间。
- en: II) Linear maps
  id: totrans-23
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: II) 线性映射
- en: Now that we know what a vector space is, let’s take it to the next level and
    talk about two vector spaces. Since vector spaces are simply collections of objects,
    we can think of a mapping that takes an object from one of the spaces and maps
    it to an object from the other. An example of this is recent AI programs like
    Midjourney where you enter a text prompt and they return an image matching it.
    The text you enter is first converted to a vector. Then, that vector is converted
    to another vector in the image space via such a “mapping”.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经知道了什么是向量空间，让我们将其提升到下一个层次，并讨论两个向量空间。由于向量空间仅仅是对象的集合，我们可以考虑一个映射，它将一个空间的对象映射到另一个空间的对象。这种映射的一个例子是最近的AI程序，如Midjourney，你输入一个文本提示，它会返回一个与之匹配的图像。你输入的文本首先被转换为向量。然后，通过这样的“映射”，该向量被转换为图像空间中的另一个向量。
- en: 'Let *V* and *W *be vector spaces (either both real or complex vector spaces). A
    function *f: V ->W* is said to be a ‘linear map’ if for any two vectors *u, v
    𝞮 V* and any scalar *c *(a real number of complex number depending on weather we’re
    working with real or complex vector spaces)the following two conditions are satisfied:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: '设*V*和*W*为向量空间（可以是实向量空间或复向量空间）。如果对于任意的两个向量*u, v ∈ V*和任意的标量*c*（一个实数或复数，取决于我们是在处理实向量空间还是复向量空间），满足以下两个条件，则函数*f:
    V -> W*被称为“线性映射”：'
- en: $$f(u+v) = f(u) + f(v) \tag{1}$$
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: $$f(u+v) = f(u) + f(v) \tag{1}$$
- en: $$f(c.v) = c.f(v)\tag{2}$$
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: $$f(c.v) = c.f(v)\tag{2}$$
- en: Combining the above two properties, we can get the following result about a
    linear combination of *n* vectors.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 结合上述两个性质，我们可以得到关于*n*个向量线性组合的以下结果。
- en: $$f(c_1.u_1+ c_2.u_2+ … c_n.u_n) = c_1.f(u_1)+c_2.f(u_2)+…+c_n.f(u_n)$$
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: $$f(c_1.u_1+ c_2.u_2+ … c_n.u_n) = c_1.f(u_1)+c_2.f(u_2)+…+c_n.f(u_n)$$
- en: And now we can see where the name “linear map” comes from. If we pass to the
    linear map, *f*, a [linear combination](https://en.wikipedia.org/wiki/Linear_combination) of *n* vectors
    (LHS of equation above), this is equivalent to applying the same linear map to
    the functions (*f*) of the individual vectors. We can apply the linear map first
    and then the linear combination or the linear combination first and then the linear
    map. The two are equivalent.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们可以看到“线性映射”这个名字的由来。如果我们向线性映射 *f* 传递一个 *n* 个向量的线性组合（上述方程的左侧），这相当于对单个向量的函数（*f*）应用相同的线性映射。我们可以先应用线性映射然后应用线性组合，或者先应用线性组合然后应用线性映射。这两种方法是等价的。
- en: In high school, we learn about linear equations. In two dimensional space, such
    an equation is represented by *f(x)=m.x+c.* Here, *m* and *c* are the parameters
    of the equation. Note that this function isn’t a linear map. Although it satisfies
    equation (1) above, it fails to satisfy equation (2). If we set *f(x)=m.x* instead,
    then this is a linear map since it satisfies both equations.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 在高中，我们学习了线性方程。在二维空间中，这样的方程由 *f(x)=m.x+c.* 表示。在这里，*m* 和 *c* 是方程的参数。请注意，这个函数不是一个线性映射。尽管它满足上述方程（1），但它未能满足方程（2）。如果我们设 *f(x)=m.x* ，那么这是一个线性映射，因为它满足两个方程。
- en: '![](../Images/567e7825890cf65c7e8cb787b75a65f4.png)'
  id: totrans-32
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/567e7825890cf65c7e8cb787b75a65f4.png)'
- en: A linear map takes objects from one vector space and maps them to objects in
    another vector space. Kind of like a portal between worlds. Of course, there can
    be many such “maps” or “portals”. A linear map has to satisfy other properties.
    If you pass a linear combination of vectors from the first space to it, it shouldn’t
    matter weather you apply the linear map first or the linear combination first.
    Image created using Midjourney.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 线性映射将对象从一矢量空间映射到另一矢量空间，有点像世界之间的门户。当然，可以存在许多这样的“映射”或“门户”。线性映射必须满足其他性质。如果你将来自第一个空间的向量线性组合传递给它，那么你先应用线性映射还是先应用线性组合并不重要。使用Midjourney创建的图像。
- en: III) Matrices
  id: totrans-34
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: III) 矩阵
- en: In section I, we introduced the concept of basis for a vector space. Given a
    basis for the first vector space (*V*) and the dimensionality of the second one
    (*U*), every linear map can be expressed as a matrix (for details, see [here](https://math.libretexts.org/Bookshelves/Linear_Algebra/Book%3A_Linear_Algebra_(Schilling_Nachtergaele_and_Lankham)/06%3A_Linear_Maps/6.06%3A_The_matrix_of_a_linear_map)). A
    matrix is just a collection of vectors. These vectors can be arranged in columns,
    giving us a 2-d grid of numbers as shown below.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 在第一部分，我们介绍了矢量空间基的概念。给定第一个矢量空间（*V*）的基和第二个的维度（*U*），每个线性映射都可以表示为一个矩阵（详情见[这里](https://math.libretexts.org/Bookshelves/Linear_Algebra/Book%3A_Linear_Algebra_(Schilling_Nachtergaele_and_Lankham)/06%3A_Linear_Maps/6.06%3A_The_matrix_of_a_linear_map)）。矩阵只是向量的集合。这些向量可以按列排列，给我们一个如下面所示的二维数字网格。
- en: '![](../Images/d045a0aa72585c65445e6472073094d8.png)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/d045a0aa72585c65445e6472073094d8.png)'
- en: A matrix as a collection of vectors arranged in columns. Image by author.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 矩阵作为按列排列的向量集合。图由作者提供。
- en: Matrices are the objects people first think of in the context of linear algebra.
    And for good reason. Most of the time spent practicing linear algebra is dealing
    with matrices. But it is important to remember that there (in general) are an
    infinite number of matrices that can represent a linear map, depending on the
    basis we choose for the first space, *V*. The linear map is hence a more general
    concept than the matrix one happens to be using to represent it.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 矩阵是人们在线性代数背景下首先想到的对象。而且有很好的理由。我们大部分时间都在练习线性代数，处理矩阵。但重要的是要记住，在一般情况下，有无限多种矩阵可以表示线性映射，这取决于我们为第一个空间，*V*，选择的基。因此，线性映射是一个比所使用的矩阵表示更一般的概念。
- en: How do matrices help us perform the linear map they represent (from one vector
    to the other)? Through the matrix getting multiplied with the first vector. The
    result is the second vector and the mapping is complete (from first to second).
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 矩阵如何帮助我们执行它们所表示的线性映射（从一个矢量到另一个矢量）？通过矩阵与第一个矢量相乘。结果是第二个矢量，映射就完成了（从第一个到第二个）。
- en: In detail, we take the dot product (sum product) of the first vector, *v_1* with
    the first row of the matrix and this yields the first entry of the resulting vector, *v_2* and
    then the dot product of *v_1* with the second row of the matrix to get the second
    entry of *v_2* and so on. This process is demonstrated below for a matrix with
    2 rows and 3 columns. The first vector, *v_1* is three dimensional and the second
    vector, *v_2* is two dimensional.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 详细来说，我们取第一个向量，*v_1*，与矩阵的第一行的点积（求和乘积），这得到结果向量 *v_2* 的第一个元素，然后取 *v_1* 与矩阵的第二行的点积以得到
    *v_2* 的第二个元素，依此类推。以下是一个具有 2 行 3 列的矩阵的示例，这个过程得到了演示。第一个向量，*v_1*，是三维的，第二个向量，*v_2*，是二维的。
- en: '![](../Images/6b7869d83f8dfbad58959104d64d9c15.png)'
  id: totrans-41
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6b7869d83f8dfbad58959104d64d9c15.png)'
- en: How matrix multiplication with a vector works. Image by author.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 矩阵与向量相乘的工作原理。图片由作者提供。
- en: Note that the underlying linear map behind a matrix with this dimensionality
    (*2*x*3*)will always take a three dimensional vector, *v_1* and map it to a two
    dimensional space, *v_2.*
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，具有这种维数（*2*x*3*）的矩阵背后的线性映射将始终将三维向量 *v_1* 映射到二维空间，*v_2*。
- en: '![](../Images/b2e466d79e7b8043ac283386c7727b77.png)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b2e466d79e7b8043ac283386c7727b77.png)'
- en: A linear transformation that takes vectors in three dimensional space and maps
    them to two dimensional space. Image created with MidJourney.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 一种线性变换，它将三维空间中的向量映射到二维空间。使用 MidJourney 创建的图像。
- en: In general an (*n*x*m*) matrix will map an *m* dimensional vector to an *n* dimensional
    one.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 一般而言，一个 (*n*x*m*) 矩阵会将一个 m 维向量映射到一个 n 维向量。
- en: III-A) Properties of matrices
  id: totrans-47
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: III-A) 矩阵的性质
- en: Let’s cover some properties of matrices that’ll allow us to identify properties
    of the linear maps they represent.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们探讨一些矩阵的性质，这将使我们能够识别它们所代表的线性映射的性质。
- en: Rank
  id: totrans-49
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 行列式
- en: An important property of matrices and their corresponding linear maps is the
    rank. We can talk about this in terms of a collection of vectors, since that’s
    all a matrix is. Say we have a vector, *v1=[1,0,0]*. The first element of the
    vector is the coordinate along the x-axis, the second one is that along the y-axis
    and the third one the z-axis. These three axes are a basis (there are many) of
    the 3-dimensional space, *R³, *meaning that any vector in this space can be expressed
    as a linear combination of those three vectors.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 矩阵及其对应的线性映射的一个重要性质是秩。由于矩阵本质上是一组向量，我们可以从这个角度来讨论这个问题。假设我们有一个向量，*v1=[1,0,0]*。向量的第一个元素是
    x 轴上的坐标，第二个元素是 y 轴上的坐标，第三个元素是 z 轴上的坐标。这三个轴是三维空间（*R³*）的一个基（有多个），意味着这个空间中的任何向量都可以表示为这三个向量的线性组合。
- en: '![](../Images/f9473fe794789a90ea016d2d69fb30cd.png)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f9473fe794789a90ea016d2d69fb30cd.png)'
- en: A single vector in 3-dimensional space. Image by author
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 三维空间中的一个向量。图片由作者提供
- en: 'We can multiply this vector by a scalar, *s*. This gives us *s.[1,0,0] = [s,0,0]*.
    As we vary the value of *s*, we can get any point along the x-axis. But that’s
    about it. Say we add another vector to our collection, *v2=[3.5,0,0]*. Now, what
    are the vectors we can make with linear combinations of those two vectors? We
    get to multiply the first one with any scalar, *s_1 *and the second one with any
    scalar, *s_2*. This gives us:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以将这个向量乘以一个标量，*s*。这将给我们 *s.[1,0,0] = [s,0,0]*。当我们改变 *s* 的值时，我们可以得到 x 轴上的任何点。但仅此而已。假设我们向我们的集合中添加另一个向量，*v2=[3.5,0,0]*。现在，我们可以通过这两个向量的线性组合得到哪些向量？我们需要将第一个向量乘以任何标量，*s_1*，并将第二个向量乘以任何标量，*s_2*。这将给我们：
- en: $$s_1.[1,0,0] + s_2[3.5,0,0] = [s_1+3.5 s_2, 0,0] = [s’,0,0]$$
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: $$s_1.[1,0,0] + s_2[3.5,0,0] = [s_1+3.5 s_2, 0,0] = [s’，0,0]$$
- en: Here, *s’* is just another scalar. So, we can still reach points only on the
    x-axis, even with linear combinations of both these vectors. The second vector
    didn’t “expand our reach” at all. The number of points we can reach with linear
    combinations of the two is exactly the same as the number we can reach with the
    first. So even though we have two vectors, the rank of this collection of vectors
    is *1 *since the space they span is one dimensional. If on the other hand, the
    second vector were v2=*[0,1,0]* then you could get any point on the x-y plane
    with these two vectors. So, the space spanned would be two dimensional and the
    rank of this collection would be *2. *If the second vector were *v2=[2.1,1.5,0.8]*,
    we could still span a two dimensional space with *v1* and *v2* (though that space
    would be different from the x-y plane now, it would be some other 2-d plane). And
    the two vectors would still have a rank of *2*. If the rank of a collection of
    vectors is the same as the number of vectors (meaning they can together span a
    space of dimensionality as high as the number of vectors), then they are called
    “linearly independent”.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里， *s’* 只是一个标量。 因此，我们仍然可以通过这两个向量的线性组合到达x轴上的点，即使没有第二个向量“扩展我们的范围”。 我们可以通过这两个向量的线性组合到达的点数与第一个向量可以到达的点数完全相同。 所以即使我们有两个向量，这个向量集合的秩仍然是 *1* 因为它们张成的空间是一维的。 另一方面，如果第二个向量是
    v2=*[0,1,0]* ，那么你可以用这两个向量得到x-y平面上的任何点。 因此，张成的空间将是二维的，这个向量集合的秩将是 *2*。 如果第二个向量是 *v2=[2.1,1.5,0.8]* ，我们仍然可以用 *v1* 和 *v2* 张成二维空间（尽管现在这个空间不再是x-y平面，而是一个其他的2维平面）。 这两个向量仍然具有秩 *2*。 如果一个向量集合的秩与向量的数量相同（意味着它们可以一起张成一个维度高达向量数量的空间），那么它们被称为“线性无关”。
- en: If the vectors that make up the matrix can span an *m* dimensional space, then
    the rank of the matrix is *m*. But a matrix can be thought of as a collection
    of vectors in two ways. Since it’s a simple two dimensional grid of numbers, we
    can either consider all the columns as the group of vectors or consider all the
    rows as the group as shown below. Here, we have a (*3*x*4*) matrix (three rows
    and 4 columns). It can be thought of either as a collection of 4 column vectors
    (each 3-dimensional) or 3 row vectors (each 4 dimensional).
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 如果组成矩阵的向量可以张成 *m* 维空间，那么矩阵的秩是 *m*。 但是矩阵可以被看作是向量的集合有两种方式。 由于它是一个简单的二维数字网格，我们可以要么考虑所有列作为向量组，要么考虑所有行作为向量组，如下所示。 这里，我们有一个 (*3*x*4*)矩阵（三行四列）。它可以被视为4个列向量（每个3维）的集合，或者3个行向量（每个4维）的集合。
- en: '![](../Images/41fa511bc0de0c677b5894e71a2865bd.png)'
  id: totrans-57
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/41fa511bc0de0c677b5894e71a2865bd.png)'
- en: A matrix can be thought as a collection of row vectors or a collection of column
    vectors. Image by author.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 矩阵可以被看作是行向量的集合或列向量的集合。图片由作者提供。
- en: Full row rank means all row the row vectors are linearly independent. Full column
    rank means all column vectors are linearly independent.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 完全行秩意味着所有行向量都是线性无关的。完全列秩 意味着所有列向量都是线性无关的。
- en: When the matrix is a square matrix, it turns out that the row rank and column
    rank will always be the same. This isn’t obvious at all and a proof is given in
    the mathexchange post, [[3](https://math.stackexchange.com/questions/332908/looking-for-an-intuitive-explanation-why-the-row-rank-is-equal-to-the-column-ran)].
    This means that for a square matrix, we can talk just in terms of the rank and
    don’t have to bother specifying “row rank” or “column rank”.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 当矩阵是一个方阵时，行秩和列秩总是相同的。这并不明显，数学交流帖子中给出了证明，[[3](https://math.stackexchange.com/questions/332908/looking-for-an-intuitive-explanation-why-the-row-rank-is-equal-to-the-column-ran)]。这意味着对于方阵，我们只需谈论秩，而无需麻烦地指定“行秩”或“列秩”。
- en: The linear transformation corresponding to a (*3* x *3*) matrix that has a rank
    of 2 will map everything in the 3-d space to a lower, 2-d space much like the
    (*3 *x* 2*) matrix we encountered in the last section.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 与秩为2的(*3* x *3*)矩阵对应的线性变换会将3维空间中的所有内容映射到一个较低的2维空间，就像我们在上一节中遇到的(*3 *x* 2*)矩阵一样。
- en: '![](../Images/5de2ed78cb2e8835280c572e33b2620d.png)'
  id: totrans-62
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/5de2ed78cb2e8835280c572e33b2620d.png)'
- en: A light source forming shadows of points in 3-d space onto a 2-d floor or wall
    is one linear transformation that maps 3-d vectors to 2-d vectors. Image created
    with MidJourney.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 一个光源将3维空间中点的影子投射到2维地板或墙上，这是一种将3维向量映射到2维向量的线性变换。图片由MidJourney创建。
- en: Notions closely related to the rank of square matrices are the determinant and
    invertibility.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 与方阵秩密切相关的概念是行列式和可逆性。
- en: Determinants
  id: totrans-65
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 矩阵行列式
- en: 'The determinant of a square matrix is its “measure” in a sense. Let me explain
    by going back to thinking of a matrix as a collection of vectors. Let’s start
    with just one vector. The way to “measure” it is obvious — its length. And since
    we’re dealing only with square matrices, the only way to have one vector is to
    have it be one dimensional. Which is basically just a scalar. Things get interesting
    when we go from one dimension to two. Now, we’re in two dimensional space. So,
    the notion of “measure” is no longer length, but has graduated to areas. And with
    two vectors in that two dimensional space, it is the area of the parallelogram
    they form. If the two vectors are parallel to each other (ex: both lie on x-axis).
    In other words, they are not linearly independent, then the area of the parallelogram
    between them will become zero. The determinant of the matrix formed by them will
    be zero and so will the rank of that matrix be zero.'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 方阵的行列式在某种意义上是其“度量”。让我通过将矩阵视为向量的集合来解释。让我们从一个向量开始。测量它的方式很明显——它的长度。由于我们只处理方阵，只有一个向量的方式是它是一维的。这基本上就是一个标量。当我们从一维过渡到二维时，事情变得有趣。现在，我们处于二维空间中。因此，“度量”的概念不再是长度，而是已经发展到面积。在二维空间中的两个向量，它们形成的平行四边形的面积。如果两个向量彼此平行（例如，都位于x轴上）。换句话说，它们不是线性独立的，那么它们之间的平行四边形面积将变为零。由它们构成的矩阵的行列式将是零，该矩阵的秩也将是零。
- en: '![](../Images/ab8c1b51de9d1ea883849fa4453962fc.png)'
  id: totrans-67
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/ab8c1b51de9d1ea883849fa4453962fc.png)'
- en: Two vectors forming a parallelogram between them. The area of the parallelogram
    is the determinant of the matrix formed by those two vectors. Image by author.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 两个向量之间形成一个平行四边形。该平行四边形的面积是由这两个向量构成的矩阵的行列式。图片由作者提供。
- en: Taking it one dimension higher, we get 3 dimensional space. And to construct
    a square matrix (*3*x*3*), we now need three vectors. And since the notion of
    “measure” in three dimensional space is volume, the determinant of a (*3*x*3*)
    matrix becomes the volume contained between the vectors that make it up.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 将维度提升一个维度，我们得到三维空间。要构建一个方阵（3×3），我们现在需要三个向量。由于三维空间中的“度量”是体积，因此3×3矩阵的行列式变成了构成它的向量之间的体积。
- en: '![](../Images/d470e5c9fceb1e2e9cbe41a5ca489aad.png)'
  id: totrans-70
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/d470e5c9fceb1e2e9cbe41a5ca489aad.png)'
- en: In three dimensional space, three vectors are needed to create a 3×3 matrix.
    The determinant of the matrix is the volume contained between those vectors. Image
    by MidJourney.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 在三维空间中，需要三个向量来创建一个3×3的矩阵。该矩阵的行列式是这些向量之间的体积。图片由MidJourney提供。
- en: And this can be extended to space of any dimensionality.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 这可以扩展到任何维度的空间。
- en: Notice that we spoke about the area or the volume contained between the vectors.
    We didn’t specify if these were the vectors composing the rows of the square matrix
    or the ones composing its columns. And the somewhat surprising thing is that we
    don’t need to specify this because it doesn’t matter either way. Weather we take
    the vectors forming the rows and measure the volume between them or the vectors
    forming the columns, we get the same answer. This is proven in the mathexchange
    post [[4](https://math.stackexchange.com/a/636198/155881)].
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，我们提到了向量之间的面积或体积。我们没有指定这些是构成方阵行的向量还是构成其列的向量。有些令人惊讶的是，我们不需要指定这一点，因为无论如何都没有关系。无论是取构成行的向量并测量它们之间的体积，还是取构成列的向量，我们都会得到相同的答案。这在mathexchange帖子[[4](https://math.stackexchange.com/a/636198/155881)]中得到证明。
- en: There are a host of other properties of linear maps and corresponding matrices
    which are invaluable in understanding them and extracting value out of them. We’ll
    be delving into invertability, eigen values, diagonalizability and different transformations
    one can do in the coming articles (check back here for links).
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 线性映射及其对应矩阵有许多其他属性，这些属性在理解它们和从中提取价值方面是无价的。我们将在未来的文章中深入探讨可逆性、特征值、对角化以及可以进行的不同变换（请在此处查看链接）。
- en: '* * *'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: If you liked this story, buy me a coffee 🙂 [https://www.buymeacoffee.com/w045tn0iqw](https://www.buymeacoffee.com/w045tn0iqw)
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你喜欢这个故事，请给我买杯咖啡 :) [https://www.buymeacoffee.com/w045tn0iqw](https://www.buymeacoffee.com/w045tn0iqw)
- en: References
  id: totrans-77
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 参考文献
- en: '[1] Linear map: [https://en.wikipedia.org/wiki/Linear_map](https://en.wikipedia.org/wiki/Linear_map)'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: '[1] 线性映射：[https://en.wikipedia.org/wiki/Linear_map](https://en.wikipedia.org/wiki/Linear_map)'
- en: '[2] Matousek’s miniatures: [https://kam.mff.cuni.cz/~matousek/stml-53-matousek-1.pdf](https://kam.mff.cuni.cz/~matousek/stml-53-matousek-1.pdf)'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: '[2] Matousek的微型作品集：[https://kam.mff.cuni.cz/~matousek/stml-53-matousek-1.pdf](https://kam.mff.cuni.cz/~matousek/stml-53-matousek-1.pdf)'
- en: '[3] Mathexchange post proving row rank and column rank are the same: [https://math.stackexchange.com/questions/332908/looking-for-an-intuitive-explanation-why-the-row-rank-is-equal-to-the-column-ran](https://math.stackexchange.com/questions/332908/looking-for-an-intuitive-explanation-why-the-row-rank-is-equal-to-the-column-ran)'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: '[3] Mathexchange 帖子证明行秩和列秩相同：[https://math.stackexchange.com/questions/332908/looking-for-an-intuitive-explanation-why-the-row-rank-is-equal-to-the-column-ran](https://math.stackexchange.com/questions/332908/looking-for-an-intuitive-explanation-why-the-row-rank-is-equal-to-the-column-ran)'
- en: '[4] Mathexchange post proving the determinants of a matrix and its transpose
    are the same: [https://math.stackexchange.com/a/636198/155881](https://math.stackexchange.com/a/636198/155881)'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: '[4] Mathexchange 帖子证明矩阵及其转置的行列式相同：[https://math.stackexchange.com/a/636198/155881](https://math.stackexchange.com/a/636198/155881)'
