- en: 'Data Science in 2026: Is It Still Worth It?'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 2026年的数据科学：它仍然值得吗？
- en: 原文：[https://towardsdatascience.com/data-science-in-2026-is-it-still-worth-it/](https://towardsdatascience.com/data-science-in-2026-is-it-still-worth-it/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[原文链接](https://towardsdatascience.com/data-science-in-2026-is-it-still-worth-it/)'
- en: <mdspan datatext="el1764293855945" class="mdspan-comment">Are you thinking</mdspan>
    about switching to Data Science in 2026?
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1764293855945" class="mdspan-comment">你在想</mdspan>在2026年转向数据科学吗？
- en: If the answer is “yes,” this article is for you.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 如果答案是“是”，这篇文章就是为你准备的。
- en: I’m Sabrine. I have spent the last 10 years working in the AI field across Europe—from
    big companies and startups to research labs. And if I had to start over again
    today, I would honestly still choose this field. Why?
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我是Sabrine。我在过去10年里在欧洲的AI领域工作，从大公司、初创公司到研究实验室。如果今天我必须重新开始，我会诚实地再次选择这个领域。为什么？
- en: 'For the same reasons that brought many of us here: the intellectual challenge,
    the impact you can have, the love for mathematics and code, and the possibility
    to solve real-life problems.'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 正是因为这些原因让我们中的许多人来到这里：智力挑战、你可以产生的影响、对数学和代码的热爱以及解决现实生活问题的可能性。
- en: But looking toward 2026… is it still worth it?
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 但展望2026年...它仍然值得吗？
- en: 'If you scroll through LinkedIn, you will see two teams fighting: one saying
    “Data Science is dead,” and the other saying it is growing thanks to the AI trend.'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你浏览LinkedIn，你会看到两个团队在争斗：一个说“数据科学已经死亡”，另一个说它得益于人工智能趋势而正在增长。
- en: When I look around me, I personally think we will always need computational
    skills. We will always need people who can understand data and help make decisions.
    Numbers have always been everywhere, and why would they disappear in 2026?
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 当我环顾四周时，我个人认为我们始终需要计算技能。我们始终需要能够理解数据并帮助做出决策的人。数字无处不在，为什么它们会在2026年消失？
- en: However, the market has changed. And to navigate it now, you need good guidance
    and clear information.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，市场已经发生了变化。现在要导航它，你需要良好的指导和明确的信息。
- en: In this article, I’ll share my own experience from working in research and industry,
    and from mentoring more than 200 Data Scientists over the last few years.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我将分享我在研究和行业工作以及在过去几年中指导超过200名数据科学家方面的个人经验。
- en: '* * *'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: So what is happening in the market now?
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 那么，现在市场上正在发生什么？
- en: I will be honest and not sell you any dream about it.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 我会坦诚相待，不会向你推销任何关于它的梦想。
- en: The goal is not to introduce biases, but to give you enough information to make
    your own decision.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 目标不是引入偏见，而是给你足够的信息来做出自己的决定。
- en: Is the Data Science job family broader than ever?
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据科学的工作领域是否比以往任何时候都更广泛？
- en: '![](../Images/b48507e0a3ef9c24a9684f34feb16d11.png)'
  id: totrans-16
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b48507e0a3ef9c24a9684f34feb16d11.png)'
- en: 'Source: [pixabay](https://pixabay.com/photos/sea-wave-splash-big-wave-ocean-5499649/)
    (Kanenori)'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：[pixabay](https://pixabay.com/photos/sea-wave-splash-big-wave-ocean-5499649/)
    (Kanenori)
- en: One of the biggest mistakes of junior Data Scientists is thinking Data Science
    is one single job.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 初级数据科学家犯的最大错误之一是认为数据科学是一份单一的工作。
- en: In 2026, Data Science is a large family of roles. Before writing a single line
    of code, you need to understand where you fit.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 到2026年，数据科学是一个庞大的角色家族。在写下一行代码之前，你需要了解你适合的位置。
- en: 'People are fascinated by AI: how ChatGPT talks, how Neuralink stimulates brains,
    and how algorithms affect health and security. But let’s be honest: not all aspiring
    Data Scientists will build these types of projects.'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 人们被人工智能所吸引：ChatGPT是如何说话的，Neuralink是如何刺激大脑的，以及算法是如何影响健康和安全的。但让我们坦诚一点：并非所有有志于成为数据科学家的人都会构建这些类型的项目。
- en: These roles need strong applied math and advanced coding skills. Does that mean
    you will never reach them? No. But they are often for people with PhDs, computational
    scientists, and engineers trained exactly for these niche jobs.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 这些角色需要强大的应用数学和高级编码技能。这意味着你永远无法达到它们吗？不。但它们通常是为具有博士学位、计算科学家和为这些利基职位受过专门训练的工程师准备的。
- en: 'Let’s take a real example: a Machine Learning/Data Scientist job offer I saw
    today (Nov 27) at a GAFAM company.'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们用一个真实的例子来说明：我今天（11月27日）看到的一家GAFAM公司的机器学习/数据科学家职位报价。
- en: '![](../Images/80ac3dfc7998a361083fc9c69bedd6bc.png)'
  id: totrans-23
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/80ac3dfc7998a361083fc9c69bedd6bc.png)'
- en: '*Screenshot taken by the author*'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: '[作者截图](../Images/80ac3dfc7998a361083fc9c69bedd6bc.png)'
- en: 'If you look at the description, they ask for:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你查看描述，他们会要求：
- en: Patents
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 专利
- en: First-author publications
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第一作者出版物
- en: Research contributions
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 研究贡献
- en: Does everyone interested in Data Science have a patent or a publication? Of
    course not.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 所有对数据科学感兴趣的人都有专利或出版物吗？当然不是。
- en: This is why you must avoid moving blindly.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是为什么你必须避免盲目行动。
- en: If you just finished a bootcamp or are early in your studies, applying for jobs
    that explicitly require research publications will only bring frustration. These
    very specialized jobs are usually for people with advanced academic backgrounds
    (PhD, post-doc, or computational engineering).
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你刚刚完成了一个训练营或者学习初期，申请那些明确要求研究出版物的工作只会带来挫败感。这些非常专业的职位通常是为具有高级学术背景的人（博士、博士后或计算工程）准备的。
- en: 'My advice: be strategic. Focus on roles that match your skills.'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 我的建议：要有战略眼光。专注于与你技能相匹配的角色。
- en: Don’t waste time applying everywhere.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 不要浪费时间四处申请。
- en: Use your energy to build a portfolio that aligns with your goals.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 用你的能量建立一个与你的目标相一致的投资组合。
- en: 'You must understand the different sub-fields inside Data Science and choose
    what fits your background. For example:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 你必须了解数据科学内部的不同子领域，并选择适合你背景的领域。例如：
- en: '**Product Data Analyst / Scientist:** product lifecycle and user needs'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**产品数据分析师/科学家：产品生命周期和用户需求**'
- en: '**Machine Learning Engineer:** deploying models'
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**机器学习工程师：部署模型**'
- en: '**GenAI Engineer:** works on LLMs'
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**GenAI工程师：在LLMs上工作**'
- en: '**Classic Data Scientist:** inference and prediction'
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**经典数据科学家：推理和预测**'
- en: If you look at a Product Data Scientist role at Meta, the technical level is
    often more adapted to most Data Scientists on the market compared to a Core AI
    Research Engineer or Senior Data Scientist role.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你看看Meta的产品数据科学家角色，其技术水平通常比核心人工智能研究工程师或高级数据科学家角色更适合市场上的大多数数据科学家。
- en: These roles are more realistic for someone without a PhD.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 这些角色对于没有博士学位的人来说更加现实。
- en: '![](../Images/e7a845d29e29cbb20875676f4dc5cc1b.png)![](../Images/cc261816ce66829d09f8d015ba145c76.png)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e7a845d29e29cbb20875676f4dc5cc1b.png)![图片](../Images/cc261816ce66829d09f8d015ba145c76.png)'
- en: '*Screenshot taken by the author*'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: '**截图由作者拍摄**'
- en: 'Even if you don’t want to work at GAFAM, keep in mind:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 即使你不想在GAFAM公司工作，也要记住：
- en: '**They set the direction. What they require today becomes the norm everywhere
    else tomorrow.**'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: '**他们设定了方向。他们今天要求的东西明天将成为其他地方的规范。**'
- en: '* * *'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Now, how about coding and math in 2026?
  id: totrans-47
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 现在，关于2026年的编码和数学呢？
- en: '![](../Images/35bfb508015959dd3d0acd3271d45a70.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/35bfb508015959dd3d0acd3271d45a70.png)'
- en: 'Source: [pixabay](https://pixabay.com/photos/heart-couple-together-1731755/)
    (NoName_13)'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：[pixabay](https://pixabay.com/photos/heart-couple-together-1731755/) (NoName_13)
- en: 'Here is a controversial but honest truth for 2026: **Analytical and mathematical
    skills matter more than just coding.**'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是关于2026年的一个有争议但诚实的事实：**分析和数学技能比编码更重要。**
- en: 'Why? Almost every company now uses AI tools to help write code. But AI cannot
    replace your ability to:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么？现在几乎每家公司都在使用AI工具来帮助编写代码。但AI不能取代你以下的能力：
- en: understand trends
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 理解趋势
- en: explain where the value comes from
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 解释价值从何而来
- en: design a valid experiment
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 设计一个有效的实验
- en: interpret a model in a real context
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在实际环境中解释模型
- en: Coding is still important, but you cannot be a “General Importer”—someone who
    only imports sklearn and runs `.fit()` and `.predict()`.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 编码仍然很重要，但你不能成为一个“通用导入者”——那种只导入sklearn并运行`.fit()`和`.predict()`的人。
- en: Very soon, an AI agent may do that part for us.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 很快，一个AI代理可能会为我们完成这部分工作。
- en: But your math and analytical skills are still important, and will always be.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 但你的数学和分析技能仍然很重要，并且始终如此。
- en: 'A simple example:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 一个简单的例子：
- en: 'You can ask an AI: *“Explain PCA like I’m 2 years old.”*'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以问人工智能：“像对我两岁孩子解释主成分分析（PCA）。”
- en: 'But your real value as a Data Scientist comes when you ask something like:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 但作为数据科学家，你的真正价值在于你提出的问题，例如：
- en: “I need to optimize the water production of my company in a specific region.
    This region is facing issues that make the network unavailable in specific patterns.
    I have hundreds of features about this state of the network. How can I use PCA
    and be sure the most important variables are represented in the PC I’m using?”
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: “我需要优化公司在特定地区的制水产量。这个地区存在一些问题，导致网络在某些模式中不可用。我有关于这个网络状态的数百个特征。我如何使用主成分分析（PCA）并确保我使用的PC中包含了最重要的变量？”
- en: -> This human context is your value.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: -> 这种人类背景是你的价值。
- en: -> AI writes the code.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: -> 人工智能编写代码。
- en: -> You bring the logic.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: -> 你提供逻辑。
- en: '* * *'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: And how about the Data Science toolbox?
  id: totrans-67
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 那数据科学工具箱呢？
- en: Let’s start with Python. As a programming language with a large data community,
    Python is still essential and probably the first language to learn as a future
    Data Scientist.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从Python开始。作为一种拥有庞大数据社区的语言，Python仍然至关重要，并且可能是未来数据科学家首先学习的语言。
- en: The same for Scikit-learn, a classic library for machine learning tasks.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 对于Scikit-learn，这是一个经典的机器学习任务库。
- en: '![](../Images/9431c8f450d60d08f8b24f02f0a9a680.png)'
  id: totrans-70
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/9431c8f450d60d08f8b24f02f0a9a680.png)'
- en: '*Screenshot taken by the author*'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: '*作者截图*'
- en: 'We can also see on Google Trends (late 2025) that:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还可以从Google Trends（2025年底）看到：
- en: PyTorch is now more popular than TensorFlow
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: PyTorch现在比TensorFlow更受欢迎
- en: GenAI integration is growing much faster than classical libraries
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: GenAI的集成增长速度比经典库快得多
- en: Data Analyst interest stays stable
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据分析师的兴趣保持稳定
- en: Data Engineer and AI Specialist roles interested more people than general Data
    Scientist roles
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据工程师和AI专家角色比一般数据科学家角色吸引了更多人
- en: Don’t ignore these patterns; they are very helpful for making decisions.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 不要忽视这些模式；它们对于做出决策非常有帮助。
- en: You need to stay flexible.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要保持灵活。
- en: '*If the market wants PyTorch and GenAI, don’t stay stuck with only Keras and
    old NLP.*'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: '*如果市场需要PyTorch和GenAI，不要只停留在Keras和旧的NLP上。*'
- en: '* * *'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: And what about the new stack for 2026?
  id: totrans-81
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 那么，2026年的新堆栈是什么样子？
- en: This is where the 2026 roadmap is different from 2020.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是2026年的路线图与2020年不同的地方。
- en: To get hired today, you need to be **production-ready**.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 要在今天被雇佣，你需要准备好**生产就绪**。
- en: '**Version Control (Git):** You will use it daily. And to be honest, this is
    one of the first skills you need to learn at the beginning. It helps you organize
    your projects and everything you learn.'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: '**版本控制（Git）**：你将每天使用它。说实话，这是你开始时需要学习的第一个技能之一。它帮助你组织你的项目和所有你学到的知识。'
- en: Whether you are starting a Master’s program or beginning a bootcamp, please
    don’t forget to create your first GitHub repository and learn a few basic commands
    before going further.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 无论你是开始攻读硕士学位还是开始参加训练营，请不要忘记在继续之前创建你的第一个GitHub仓库，并学习一些基本命令。
- en: '**AutoML:** Understand how it works and when to use it. Some companies use
    AutoML tools, especially for Data Scientists who are more product-oriented.'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: '**AutoML**：了解它是如何工作的以及何时使用它。一些公司使用AutoML工具，特别是对于更注重产品导向的数据科学家。'
- en: The tool I have in mind, and that you can access for free, is **Dataiku**. They
    have a great academy with free certifications. It is one of the AutoML tools that
    has exploded in the market in the last two years.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 我心中所想的工具，你可以免费访问，是**Dataiku**。他们有一个很棒的学院，提供免费的认证。这是在过去两年中在市场上爆炸式增长的AutoML工具之一。
- en: 'If you don’t know what AutoML is: it is a tool that lets you build ML models
    *without coding*. Yes, it exists.'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不知道什么是AutoML：它是一个让你无需编码就能构建ML模型的工具。是的，它确实存在。
- en: Remember what I said earlier about coding? This is one of the reasons why other
    skills are becoming more important, especially if you are a product-oriented Data
    Scientist.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 记住我之前说的关于编码的话？这是其他技能变得更重要的一个原因，尤其是如果你是一个以产品为导向的数据科学家。
- en: '**MLOps:** Notebooks are not enough anymore. This applies to everyone. Notebooks
    are good for exploration, but if at some point you need to deploy your model in
    production, you must learn other tools.'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: '**MLOps**：笔记本已经不够了。这适用于每个人。笔记本适合探索，但如果在某个时候你需要将你的模型部署到生产环境中，你必须学习其他工具。'
- en: And even if you don’t like data engineering, you still need to understand these
    tools so you can communicate with data engineers and work together.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 即使你不喜欢数据工程，你仍然需要了解这些工具，这样你才能与数据工程师沟通并合作。
- en: When I talk about this, I think about tools like **Docker** ([check out my article](https://medium.com/code-like-a-girl/mlops-fundamentals-a-beginners-guide-to-docker-containerization-4f5a984e7117)),
    **MLflow** ([link here](https://towardsdatascience.com/model-management-with-mlflow-azure-and-docker-2920b51a5bdd/)),
    and **FastAPI**.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 当我谈到这个话题时，我会想到像**Docker**([查看我的文章](https://medium.com/code-like-a-girl/mlops-fundamentals-a-beginners-guide-to-docker-containerization-4f5a984e7117))、**MLflow**([链接在这里](https://towardsdatascience.com/model-management-with-mlflow-azure-and-docker-2920b51a5bdd/))和**FastAPI**这样的工具。
- en: '**LLMs and RAG:** You don’t need to be an expert, but you should know the basics:
    how the LangChain API works, how to train a small language model, what RAG means,
    and how to implement it. This will really help you stand out in the market and
    maybe move further if you need to build a project that involves an AI Agent.'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: '**LLMs和RAG**：你不需要成为专家，但你应该了解基础知识：LangChain API是如何工作的，如何训练一个小型语言模型，RAG代表什么，以及如何实现它。这真的会帮助你脱颖而出，也许如果你需要构建涉及AI代理的项目，还能更进一步。'
- en: '* * *'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Portfolio: Quality over quantity'
  id: totrans-95
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 投资组合：质量胜于数量
- en: In this fast and competitive market, how can you prove you can do the job? I
    remember I’ve written an article about how to create a portfolio 2 years ago and
    what I’m going to say here can look a bit contradictory, but let me explain. Before
    ChatGPT and AI tools flooded the market, having a portfolio with a bunch of projects
    to show your different skills like data cleaning and data processing was very
    important, but today all these basic steps are often done using AI tools that
    are ready for that, so we will focus more on building something that will make
    you different and make the recruiter want to meet you.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个快速且竞争激烈的市场中，你如何证明你能胜任这份工作？我记得我两年前写过一篇关于如何创建个人作品集的文章，而且我在这里要说的可能会有些矛盾，但让我来解释一下。在ChatGPT和AI工具充斥市场之前，拥有一个包含多个项目以展示你在数据清洗和数据处理等不同技能的作品集非常重要，但如今，所有这些基本步骤通常都是通过为这些步骤准备好的AI工具来完成的，因此我们将更多地关注构建能够让你脱颖而出并让招聘人员想要见你的东西。
- en: '***I would say: “Avoid burnout. Build smart.”***'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: '***我会说：“避免过度劳累，聪明地构建。”***'
- en: Don’t think you need 10 projects. If you’re a student or a junior, one or two
    good projects are enough.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 不要认为你需要10个项目。如果你是学生或初级人员，一两个好的项目就足够了。
- en: 'Take advantage of the time you have during your internship or your final bootcamp
    project to build it. Please don’t use simple Kaggle datasets. Look online: you
    can find a huge amount of real use-case data, or research datasets that are more
    often used in industry and labs to build new architectures.'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 利用你在实习期间或最后的训练营项目中的时间来构建它。请不要使用简单的Kaggle数据集。上网搜索：你可以找到大量的实际用例数据，或者更常用于工业和实验室中构建新架构的研究数据集。
- en: 'If your goal is not to go deep into the technical side, you can still show
    other skills in your portfolio: slides, articles, explanations of how you thought
    about the business value, what results you got, and how these results can be used
    in reality. Your portfolio depends on the job you want.'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不想深入技术层面，你仍然可以在你的个人作品集中展示其他技能：幻灯片、文章、解释你是如何思考商业价值的，你得到了什么结果，以及这些结果如何在现实中得到应用。你的个人作品集取决于你想要的职位。
- en: If your goal is more math-oriented, the recruiter will probably want to see
    your literature review and how you implemented the latest architecture on your
    data.
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你的目标是更偏向数学，招聘人员可能会想看到你的文献综述以及你是如何在你自己的数据上实现最新架构的。
- en: If you are more product-oriented, I would be more interested in your slides
    and how you interpret your ML results than in the quality of your code.
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你更倾向于产品导向，我更感兴趣的是你的幻灯片以及你是如何解释你的机器学习结果的，而不是你的代码质量。
- en: If you are more MLOps-oriented, the recruiter will look at how you deployed,
    monitored, and tracked your model in production.
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你更倾向于MLOps，招聘人员会关注你是如何部署、监控和跟踪你的模型在生产中的表现。
- en: To finish, I want to remind you that the market is changing fast, but it is
    not the end of Data Science. It just means you need to be more aware of where
    you fit, what skills you want to grow, and how you present yourself.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我想提醒你，市场变化很快，但这并不意味着数据科学走到了尽头。这只意味着你需要更清楚地了解自己的定位，你想要发展哪些技能，以及你如何展示自己。
- en: Keep learning, and build a portfolio that truly reflects who you are. You will
    find your place **❤️**
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 继续学习，并构建一个真正反映你自己的个人作品集。你将找到属于你的位置 **❤️**
- en: If you enjoyed this article, feel free to follow me on LinkedIn for more honest
    insights about AI, Data Science, and careers.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你喜欢这篇文章，欢迎在LinkedIn上关注我，获取更多关于AI、数据科学和职业的真诚见解。
- en: 👉 **LinkedIn:** *[Sabrine Bendimerad](http://linkedin.com/in/sabrine-bendimerad-43570b107/?skipRedirect=true)*
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 👉 **LinkedIn:** *[Sabrine Bendimerad](http://linkedin.com/in/sabrine-bendimerad-43570b107/?skipRedirect=true)*
- en: 👉 **Medium:** [https://medium.com/@sabrine.bendimerad1](https://medium.com/@sabrine.bendimerad1)
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 👉 **Medium:** [https://medium.com/@sabrine.bendimerad1](https://medium.com/@sabrine.bendimerad1)
