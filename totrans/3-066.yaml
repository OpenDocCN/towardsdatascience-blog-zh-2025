- en: 'Choose the Right One: Evaluating Topic Models for Business Intelligence'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 选择正确的：评估商业智能中的主题模型
- en: 原文：[https://towardsdatascience.com/choose-the-right-one-evaluating-topic-models-for-business-intelligence/](https://towardsdatascience.com/choose-the-right-one-evaluating-topic-models-for-business-intelligence/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/choose-the-right-one-evaluating-topic-models-for-business-intelligence/](https://towardsdatascience.com/choose-the-right-one-evaluating-topic-models-for-business-intelligence/)
- en: '**<mdspan datatext="el1745524147724" class="mdspan-comment">Topic models</mdspan>**
    are used in businesses to classify brand-related text datasets (such as product
    and site reviews, surveys, and social media comments) and to track how customer
    satisfaction metrics change over time.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '**<mdspan datatext="el1745524147724" class="mdspan-comment">主题模型</mdspan>**在商业中被用于对品牌相关的文本数据集（如产品和服务评论、调查以及社交媒体评论）进行分类，并跟踪客户满意度指标随时间的变化。'
- en: 'There is a myriad of recent topic models one can choose from: the widely used
    [BERTopic](https://pypi.org/project/bertopic/) by [Maarten Grootendorst (2022)](https://arxiv.org/pdf/2203.05794),
    the recent [FASTopic](https://pypi.org/project/fastopic/) presented at last year’s
    [NeurIPS](https://neurips.cc/virtual/2024/poster/96416), ([Xiaobao Wu et al.,2024)](https://arxiv.org/pdf/2405.17978),
    the [Dynamic Topic Model](https://bab2min.github.io/tomotopy/v0.13.0/en/#tomotopy.DTModel)by
    [Blei and Lafferty (2006](https://arxiv.org/pdf/1602.06049.pdf)), or a fresh semi-supervised
    [Seeded Poisson Factorization](https://pypi.org/project/seededPF/) model ([Prostmaier
    et al., 2025](https://arxiv.org/abs/2503.02741)).'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 市场上可供选择的主题模型种类繁多：广泛使用的[BERTopic](https://pypi.org/project/bertopic/)由[Maarten
    Grootendorst (2022)](https://arxiv.org/pdf/2203.05794)开发，去年在[NeurIPS](https://neurips.cc/virtual/2024/poster/96416)上展示的最近[FASTopic](https://pypi.org/project/fastopic/)（[Xiaobao
    Wu 等人，2024](https://arxiv.org/pdf/2405.17978)），[Blei 和 Lafferty (2006)](https://arxiv.org/pdf/1602.06049.pdf)开发的[动态主题模型](https://bab2min.github.io/tomotopy/v0.13.0/en/#tomotopy.DTModel)，或者一个全新的半监督[种子泊松因子分解](https://pypi.org/project/seededPF/)模型([Prostmaier
    等人，2025](https://arxiv.org/abs/2503.02741))。
- en: For a business use case, training topic models on customer texts, we often get
    results that are not identical and sometimes even conflicting. In business, imperfections
    cost money, so the engineers should place into production the model that provides
    the best solution and solves the problem most effectively. At the same pace that
    new topic models appear on the market, methods for evaluating their quality using
    new metrics also evolve.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 对于商业用例，在客户文本上训练主题模型，我们经常得到不相同的甚至有时是相互矛盾的结果。在商业中，不完美会带来成本，因此工程师应该将提供最佳解决方案并最有效地解决问题的模型投入生产。随着市场上出现新的主题模型，使用新指标评估它们质量的方法也在不断发展。
- en: 'This practical tutorial will focus on bigram topic models*,* which provide
    more relevant information and identify better key qualities and problems for business
    decisions than single-word models *(“delivery” vs. “poor delivery”, “stomach”
    vs. “sensitive stomach”,* etc.). On one side, bigram models are more detailed;
    on the other, many evaluation metrics were not originally designed for their evaluation.
    To provide more background in this area, we will explore in detail:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 本实用教程将专注于二元主题模型*，*与单词模型相比，它们提供更相关的信息，并识别出对商业决策更有帮助的关键品质和问题。一方面，二元模型更详细；另一方面，许多评估指标最初并非为它们的评估而设计。为了提供更多背景信息，我们将详细探讨以下内容：
- en: How to **evaluate the quality of bigram topic models**
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何**评估二元主题模型的质量**
- en: How to prepare an **email classification pipeline** in Python.
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何在Python中准备**电子邮件分类流程**
- en: Our example use case will show how bigram topic models ([BERTopic](https://pypi.org/project/bertopic/)
    and [FASTopic](https://pypi.org/project/fastopic/)) help prioritize email communication
    with customers on certain topics and reduce response times.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的示例用例将展示如何使用二元主题模型（[BERTopic](https://pypi.org/project/bertopic/) 和 [FASTopic](https://pypi.org/project/fastopic/)）来优先处理与客户在某些主题上的电子邮件沟通，并减少响应时间。
- en: 1\. What are topic model quality indicators?
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1. 主题模型质量指标是什么？
- en: 'The evaluation task should target the ideal state:'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 评估任务应针对理想状态：
- en: '*The ideal topic model should produce topics where words or bigrams (two consecutive
    words) in each topic are highly semantically related and distinct for each topic.*'
  id: totrans-11
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*理想的主题模型应产生包含每个主题中单词或二元组（连续的两个单词）高度语义相关且对每个主题都是独特的主题。*'
- en: In practice, this means that the words predicted for each topic are [semantically
    similar](https://paperswithcode.com/task/semantic-similarity) to human judgment,
    and there is low duplication of words between topics.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 在实践中，这意味着为每个主题预测的单词在语义上与人类判断相似，并且主题之间单词的重复率很低。
- en: '*It is standard to calculate a set of metrics for each trained model to make
    a qualified decision on which model to place into production or use for a business
    decision, comparing the model performance metrics.*'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: '*计算每个训练模型的一组指标是标准的，以便对哪个模型投入生产或用于商业决策做出合格的决定，比较模型性能指标。*'
- en: '**Coherence** metricsevaluate how well the words discovered by a topic model
    make sense to humans (have [similar semantics](https://www.geeksforgeeks.org/understanding-semantic-analysis-nlp/)
    in each topic).'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**一致性**指标评估主题模型发现的单词对人类来说有多合理（在各个主题中具有[相似的语义](https://www.geeksforgeeks.org/understanding-semantic-analysis-nlp/)）。'
- en: '**Topic diversity** measures how different the discovered topics are from one
    another.'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**主题多样性**衡量所发现的主题之间差异的程度。'
- en: 'Bigram topic models work well with these metrics:'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 双词主题模型与这些指标配合良好：
- en: '**NPMI** *(Normalized Point-wise Mutual Information)* uses probabilities estimated
    in a reference corpus to calculate a [-1:1] score for each word (or bigram) predicted
    by the model. Read [[1]](https://arxiv.org/pdf/2401.15351) for more details.'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**NPMI** *(归一化点互信息)*使用参考语料库中估计的概率来为模型预测的每个单词（或双词）计算一个[-1:1]分数。更多详情请参阅[[1](https://arxiv.org/pdf/2401.15351)]。'
- en: The reference corpus can be either internal (the training set) or external (e.g.,
    an external email dataset). A large, external, and comparable corpus is a better
    choice because it can help reduce bias in training sets. Because this metric works
    with word frequencies, **the training set and the reference corpus should be preprocessed
    the same way** (i.e., if we remove numbers and stopwords in the training set,
    we should also do it in the reference corpus). The aggregate model score is the
    average of words across topics.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 参考语料库可以是内部的（训练集）或外部的（例如，外部电子邮件数据集）。一个大型、外部且可比的语料库是更好的选择，因为它可以帮助减少训练集中的偏差。因为这个指标与词频有关，**训练集和参考语料库应该以相同的方式进行预处理**（即，如果我们从训练集中删除数字和停用词，我们也应该在参考语料库中这样做）。聚合模型分数是跨主题的词的平均值。
- en: '**SC***(Semantic Coherence)* does not need a reference corpus. It uses the
    same dataset as was used to train the topic model. Read more in [[2](https://aclanthology.org/D11-1024/)].'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**SC***(语义一致性)*不需要参考语料库。它使用与训练主题模型相同的数据集。更多详情请参阅[[2](https://aclanthology.org/D11-1024/)]。'
- en: 'Let’s say we have the Top 4 words for one topic: *“apple”, “banana”, “juice”,
    “smoothie”* predicted by a topic model.Then *SC* looks at all combinations of
    words in the training set going from left to right, starting with the first word
    *{apple, banana}*, *{apple, juice}*, *{apple, smoothie}* then the second word
    *{banana, juice}*, *{banana, smoothie}*, then last word *{juice, smoothie}* and
    it counts the number of documents that contain both words, divided by the frequency
    of documents that contain the first word. Overall SC score for a model is the
    mean of all topic-level scores.'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我们有一个主题的前4个单词：*“苹果”，“香蕉”，“果汁”，“冰沙”*，这是由主题模型预测的。然后*SC*查看训练集中从左到右的所有单词组合，从第一个单词*{苹果，香蕉}*，*{苹果，果汁}*，*{苹果，冰沙}*开始，然后是第二个单词*{香蕉，果汁}*，*{香蕉，冰沙}*，然后是最后一个单词*{果汁，冰沙}*，并计算包含这两个单词的文档数量，除以包含第一个单词的文档频率。一个模型的总体SC分数是所有主题级别分数的平均值。
- en: '![](../Images/0f9aff5889b6f61ce7eb3d2472956108.png)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0f9aff5889b6f61ce7eb3d2472956108.png)'
- en: Image 1\. Semantic coherence by Mimno et al. (2011) illustration. Image by author.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 图1. Mimno等人（2011年）的语义一致性说明。图由作者提供。
- en: '**PUV***(Percentage of Unique Words)* calculates the share of unique words
    across topics in the model. *PUV = 1* means that each topic in the model contains
    unique bigrams. Values close to 1 indicate a well-shaped, high-quality model with
    small word overlap between topics. [[3].](https://aclanthology.org/2020.tacl-1.29/)'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: '**PUV***(独特单词百分比)*计算模型中主题间独特单词的份额。*PUV = 1*意味着模型中的每个主题都包含独特的双词。接近1的值表明模型形状良好、质量高，主题之间的单词重叠小。[3].](https://aclanthology.org/2020.tacl-1.29/)'
- en: '*The **closer to 0 the SC and NIMP scores are**, the more coherent the model
    is (bigrams predicted by the topic model for each topic are semantically similar).
    The **closer to 1 PUV is**, the easier the model is to interpret and use, because
    bigrams between topics do not overlap. *'
  id: totrans-24
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*SC和NIMP分数越接近0，模型就越连贯（主题模型为每个主题预测的双语是语义上相似的）。PUV越接近1，模型就越容易解释和使用，因为主题之间的双语不重叠。*'
- en: 2\. How can we prioritize email communication with topic models?
  id: totrans-25
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2. 我们如何使用主题模型来优先处理电子邮件沟通？
- en: A large share of customer communication, not only in e-commerce businesses,
    is now solved with chatbots and personal client sections. Yet, it is common to
    communicate with customers by email. Many email providers offer developers broad
    flexibility in APIs to customize their email platform ([*e.g., MailChimp*](https://mailchimp.com/developer/tools/)*,*
    [*SendGrid*](https://github.com/sendgrid/sendgrid-python)*,* [*Brevo*](https://github.com/getbrevo/brevo-python)).
    In this place, topic models make mailing more flexible and effective.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 在电子商务业务中，客户沟通的大部分内容现在都通过聊天机器人和个人客户区域来解决。然而，通过电子邮件与客户沟通是很常见的。许多电子邮件提供商为开发者提供了广泛的API灵活性，以定制他们的电子邮件平台（例如，[MailChimp](https://mailchimp.com/developer/tools/)，[SendGrid](https://github.com/sendgrid/sendgrid-python)，[Brevo](https://github.com/getbrevo/brevo-python)）。在这里，主题模型使邮件更加灵活和有效。
- en: '*In this use case, the pipeline takes the input from the incoming emails and
    uses the trained topic classifier to categorize the incoming email content. The
    outcome is the classified topic that the Customer Care (CC) Department sees next
    to each email. The main objective is to allow the CC staff to prioritize the categories
    of emails and reduce the response time to the most sensitive requests (that directly
    affect margin-related KPIs or OKRs).*'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: '*在这个用例中，流程从收到的电子邮件中获取输入，并使用训练好的主题分类器对收到的电子邮件内容进行分类。结果是客户服务（CC）部门在每封电子邮件旁边看到的分类主题。主要目标是允许CC工作人员优先处理电子邮件类别，并减少对最敏感请求（直接影响与利润相关的关键绩效指标或OKR）的响应时间。*'
- en: '![](../Images/74b8293c2580ffac506e5f89dd69707e.png)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/74b8293c2580ffac506e5f89dd69707e.png)'
- en: Image 2\. Topic model pipeline illustration. Image by author.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 图2. 主题模型流程图。图由作者提供。
- en: 3\. Data and model set-ups
  id: totrans-30
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3. 数据和模型设置
- en: We will train **FASTopic a**nd **BERTopic** to classify emails into 8 and 10
    topics and evaluate the quality of all model specifications. Read my previous
    [TDS tutorial](https://towardsdatascience.com/topic-modelling-in-business-intelligence-fastopic-and-bertopic-in-code-2d3949260a37/)
    on topic modeling with these cutting-edge topic models.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将训练**FASTopic**和**BERTopic**将电子邮件分类到8个和10个主题，并评估所有模型规格的质量。阅读我之前关于使用这些前沿主题模型进行主题建模的[TDS教程](https://towardsdatascience.com/topic-modelling-in-business-intelligence-fastopic-and-bertopic-in-code-2d3949260a37/)。
- en: 'As a training set, we use a synthetically generated [Customer Care Email](https://www.kaggle.com/datasets/rtweera/customer-care-emails)
    dataset available on Kaggle with a [GPL-3 license](https://www.gnu.org/licenses/gpl-3.0.html).
    The prefiltered data covers 692 incoming emails and looks like this:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 作为训练集，我们使用在Kaggle上可用的合成[客户服务电子邮件](https://www.kaggle.com/datasets/rtweera/customer-care-emails)数据集，该数据集具有[GPL-3许可证](https://www.gnu.org/licenses/gpl-3.0.html)。预过滤的数据包括692封收到的电子邮件，看起来像这样：
- en: '![](../Images/c14f555fe718657fc07b98517ec8439b.png)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/c14f555fe718657fc07b98517ec8439b.png)'
- en: Image 3\. Customer Care Email dataset. Image by author.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 图3. 客户服务电子邮件数据集。图由作者提供。
- en: 3.1\. Data preprocessing
  id: totrans-35
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.1. 数据预处理
- en: Cleaning text in the right order is essential for topic models to work in practice
    because it minimizes the bias of each cleaning operation.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 按正确顺序清理文本对于主题模型在实际中有效运行至关重要，因为它最小化了每个清理操作的偏差。
- en: '**Numbers** are typically removed first, followed by **emojis,** unless we
    don’t need them for special situations, such as extracting sentiment. [**Stopwords**](https://www.geeksforgeeks.org/removing-stop-words-nltk-python/)
    for one or more languages are removed afterward, followed by **punctuation** so
    that stopwords don’t break up into two tokens (*“we’ve”* -> *“we” + ‘ve”*). **Additional
    tokens** (company and people’s names, etc.) are removed in the next step in the
    clean data before [**lemmatization**](https://www.techtarget.com/searchenterpriseai/definition/lemmatization#:~:text=Lemmatization%20is%20the%20process%20of,processing%20%28NLP%29%20and%20chatbots.),
    which unifies tokens with the same semantics.'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: '**数字**通常首先被移除，然后是**表情符号**，除非在特殊情况下（如提取情感）我们不需要它们，否则会移除。之后移除一个或多个语言的[**停用词**](https://www.geeksforgeeks.org/removing-stop-words-nltk-python/)，然后是**标点符号**，这样停用词就不会被分成两个标记（*“we’ve”*
    -> *“we” + ‘ve”*）。在[**词形还原**](https://www.techtarget.com/searchenterpriseai/definition/lemmatization#:~:text=Lemmatization%20is%20the%20process%20of,processing%20%28NLP%29%20and%20chatbots.)之前，在清理数据中的下一步移除**额外标记**（公司名称和人物名称等），词形还原将具有相同语义的标记统一。'
- en: '![](../Images/c903cec110f1988854b116bd1fb10023.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/c903cec110f1988854b116bd1fb10023.png)'
- en: Image 4\. General preprocessing steps for topic modeling. Image by author
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 图4. 主题建模的一般预处理步骤。图由作者提供
- en: '*“Delivery” and “deliveries”, “box” and “Boxes”, or “Price” and “prices” share
    the same word root, but without lemmatization, topic models would model them as
    separate factors. That’s why customer emails should be lemmatized in the last
    step of preprocessing.*'
  id: totrans-40
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*“Delivery”和“deliveries”， “box”和“Boxes”，或“Price”和“prices”具有相同的词根，但如果没有进行词形还原，主题模型会将它们建模为不同的因素。这就是为什么在预处理步骤的最后一步，客户电子邮件应该进行词形还原的原因。*'
- en: 'Text preprocessing is model-specific:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 文本预处理是针对特定模型的：
- en: '***FASTopic*** works with clean data on input; some cleaning (stopwords) can
    be done during the training. The simplest and most effective way is to use the
    [*Washer, a no-code app for text data cleaning*](https://washer.textminingstories.com/)that
    offers a no-code way of data preprocessing for text mining projects.'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***FASTopic*** 在输入数据上工作，可以进行一些清理（如去除停用词）；清理工作可以在训练过程中进行。最简单且最有效的方法是使用[*Washer，一个用于文本数据清理的无代码应用程序*](https://washer.textminingstories.com/)，它为文本挖掘项目提供了一种无代码的数据预处理方式。'
- en: '***BERTopic:*** the [documentation](https://maartengr.github.io/BERTopic/faq.html#how-do-i-reduce-topic-outliers)
    recommends that “r*emoving stop words as a preprocessing step is not advised as
    the transformer-based embedding models that we use need the full context to create
    accurate embeddings”.* For this reason, cleaning operations should be included
    in the model training.'
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***BERTopic：*** [文档](https://maartengr.github.io/BERTopic/faq.html#how-do-i-reduce-topic-outliers)建议“作为预处理步骤移除停用词是不推荐的，因为我们使用的基于transformer的嵌入模型需要完整的上下文来创建准确的嵌入。”因此，清理操作应包含在模型训练中。'
- en: 3.2\. Model compilation and training
  id: totrans-44
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.2. 模型编译和训练
- en: You can check the full codes for FASTopic and BERTopic’s training with bigram
    preprocessing and cleaning in [this repo](https://github.com/PetrKorab/Choose-the-Right-One-Evaluating-Topic-Models-for-Business-Intelligence).
    My previous TDS tutorials [(](https://medium.com/data-science/topic-modelling-in-business-intelligence-fastopic-and-bertopic-in-code-2d3949260a37?sk=9a88660d4e4c64a1d91ad8ede730a520)[4](https://towardsdatascience.com/topic-modelling-in-business-intelligence-fastopic-and-bertopic-in-code-2d3949260a37/)[)](https://medium.com/data-science/topic-modelling-in-business-intelligence-fastopic-and-bertopic-in-code-2d3949260a37?sk=9a88660d4e4c64a1d91ad8ede730a520)
    and [(](https://medium.com/data-science/topic-modelling-with-berttopic-in-python-8a80d529de34?sk=16ca7ea6c5cdbbc92fead7f9c34c8584)[5](https://towardsdatascience.com/topic-modelling-with-berttopic-in-python-8a80d529de34/)[)](https://medium.com/data-science/topic-modelling-with-berttopic-in-python-8a80d529de34?sk=16ca7ea6c5cdbbc92fead7f9c34c8584)
    explain all steps in detail.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以在[这个仓库](https://github.com/PetrKorab/Choose-the-Right-One-Evaluating-Topic-Models-for-Business-Intelligence)中查看FASTopic和BERTopic使用二元词预处理和清理进行训练的完整代码。我之前的TDS教程[(1)](https://medium.com/data-science/topic-modelling-in-business-intelligence-fastopic-and-bertopic-in-code-2d3949260a37?sk=9a88660d4e4c64a1d91ad8ede730a520)[(2)](https://towardsdatascience.com/topic-modelling-in-business-intelligence-fastopic-and-bertopic-in-code-2d3949260a37/)[(3)](https://medium.com/data-science/topic-modelling-in-business-intelligence-fastopic-and-bertopic-in-code-2d3949260a37?sk=9a88660d4e4c64a1d91ad8ede730a520)和[(4)](https://medium.com/data-science/topic-modelling-with-berttopic-in-python-8a80d529de34?sk=16ca7ea6c5cdbbc92fead7f9c34c8584)[(5)](https://towardsdatascience.com/topic-modelling-with-berttopic-in-python-8a80d529de34?sk=16ca7ea6c5cdbbc92fead7f9c34c8584)详细解释了所有步骤。
- en: We train both models to classify 8 topics in customer email data. A simple inspection
    of the topic distribution shows that incoming emails to FASTopic are quite well
    distributed across topics. BERTopic classifies emails unevenly, keeping outliers
    (uncategorized tokens) in T-1 and a large share of incoming emails in T0.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 我们训练这两个模型对客户电子邮件数据中的8个主题进行分类。简单检查主题分布显示，发送给FASTopic的电子邮件在主题上分布得相当均匀。BERTopic对电子邮件的分类不均匀，将异常值（未分类的标记）保留在T-1中，并将大量收到的电子邮件保留在T0中。
- en: '![](../Images/d4020f4ab9f54f7ab45a800cf62ec2f4.png)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d4020f4ab9f54f7ab45a800cf62ec2f4.png)'
- en: 'Image 5: Topic distribution, email classification. Image by author.'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 图5：主题分布，电子邮件分类。图由作者提供。
- en: 'Here are the predicted bigrams for both models with topic labels:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是两个模型带有主题标签的预测大词组：
- en: '![](../Images/6e4bed54948c22cb943710b266e285df.png)![](../Images/9dff22818230c62631cdb7cddb8e2311.png)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6e4bed54948c22cb943710b266e285df.png)![图片](../Images/9dff22818230c62631cdb7cddb8e2311.png)'
- en: 'Image 6: Models’ predictions. Image by author.'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 图6：模型的预测。图由作者提供。
- en: 'Because the email corpus is a synthetic LLM-generated dataset, the naive labelling
    of the topics for both models shows topics that are:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 由于电子邮件语料库是一个合成的LLM生成的数据集，因此两个模型的主题简单标记显示的主题是：
- en: '**Comparable:** *Time Delays, Latency Issues, User Permissions, Deployment
    Issues, Compilation Errors,*'
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**相似之处**：*时间延迟，延迟问题，用户权限，部署问题，编译错误，*'
- en: '**Differing**: *Unclassified* (BERTopic classifies outliers into T-1), *Improvement
    Suggestions, Authorization Errors, Performance Complaints* (FASTopic), *Cloud
    Management, Asynchronous Requests, General Requests* (BERTopic)'
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**不同之处**：*未分类*（BERTopic将异常值分类为T-1），*改进建议，授权错误，性能投诉*（FASTopic），*云管理，异步请求，一般请求*（BERTopic）'
- en: For business purposes, topics should be labelled by the company’s insiders who
    know the customer base and the business priorities.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 对于商业目的，主题应由了解客户基础和业务优先级的公司内部人士进行标记。
- en: 4\. Model evaluation
  id: totrans-56
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4. 模型评估
- en: If three out of eight classified topics are labeled differently, then which
    model should be deployed? Let’s now evaluate the coherence and diversity for the
    trained BERTopic and FASTopic T-8 models.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 如果八个分类主题中有三个被标记不同，那么应该部署哪个模型？现在让我们评估训练好的BERTopic和FASTopic T-8模型的一致性和多样性。
- en: 4.1\. NPMI
  id: totrans-58
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.1. NPMI
- en: We need a reference corpus to calculate an *NPMI* for each model. The [Customer
    IT Support Ticket Dataset](https://www.kaggle.com/datasets/tobiasbueck/multilingual-customer-support-tickets)
    from Kaggle, distributed with [Attribution 4.0 International license](https://creativecommons.org/licenses/by/4.0/),
    provides comparable data to our training set. The data is filtered to 11923 English
    email bodies.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要一个参考语料库来为每个模型计算NPMI。Kaggle上的[客户IT支持票务数据集](https://www.kaggle.com/datasets/tobiasbueck/multilingual-customer-support-tickets)，以[Attribution
    4.0国际许可](https://creativecommons.org/licenses/by/4.0/)分发，为我们提供了与训练集相当的数据。数据被过滤到11923个英语电子邮件正文。
- en: '*Calculate an NPMI for each bigram in the reference corpus with* [*this code*](https://github.com/PetrKorab/Choose-the-Right-One-Evaluating-Topic-Models-for-Business-Intelligence/blob/main/NPMI_eval.ipynb)*.*'
  id: totrans-60
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*使用[*此代码*](https://github.com/PetrKorab/Choose-the-Right-One-Evaluating-Topic-Models-for-Business-Intelligence/blob/main/NPMI_eval.ipynb)计算参考语料库中每个大词组的NPMI。*'
- en: '*Merge bigrams predicted by FASTopic and BERTopic with their NPMI scores from
    the reference corpus. The fewer NaNs are in the table, the more accurate the metric
    is.*'
  id: totrans-61
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*将FASTopic和Bertopic预测的大词组及其来自参考语料库的NPMI分数合并。表中NaN值越少，指标越准确。*'
- en: '![](../Images/c64f247712ad52234ed855924b810b8b.png)'
  id: totrans-62
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c64f247712ad52234ed855924b810b8b.png)'
- en: 'Image 7: NPMI coherence evaluation.Image by author.'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 图7：NPMI一致性评估。图由作者提供。
- en: '*3\. Average NPMIs within and across topics to get a single score for each
    model.*'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: '*3. 计算每个主题内和跨主题的平均NPMI，为每个模型得到一个单一分数。*'
- en: 4.2\. SC
  id: totrans-65
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.2. SC
- en: 'With *SC*, we learn the context and semantic similarity of bigrams predicted
    by a topic model by calculating their position in the corpus in relation to other
    tokens. To do so, we:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 使用*SC*，我们通过计算大词组在语料库中的位置相对于其他标记来学习由主题模型预测的大词组的上下文和语义相似度。为此，我们：
- en: '*Create a document-term matrix (DTM) with a count of how many times each bigram
    appears in each document.*'
  id: totrans-67
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*创建一个文档-词矩阵（DTM），记录每个大词组在每个文档中出现的次数。*'
- en: '*Calculate topic SC scores by searching for bigram co-occurrences in the DTM
    and the bigrams predicted by topic models.*'
  id: totrans-68
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*通过在DTM和主题模型预测的大词组中搜索大词组共现来计算主题SC分数。*'
- en: '*Average topic SC to a model SC score.*'
  id: totrans-69
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*平均主题SC到模型SC分数。*'
- en: 4.3\. PUV
  id: totrans-70
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.3. PUV
- en: Topic diversity *PUV* metric checks the duplicates of bigrams between topics
    in a model.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 主题多样性*PUV*指标检查模型中主题之间的大词组的重复情况。
- en: '*Join bigrams into tokens by replacing spaces with underscores in the FASTopic
    and BERTopic tables of predicted bigrams.*'
  id: totrans-72
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*将FASTopic和BERTopic表中预测的大词组中的空格替换为下划线，将大词组合并成标记。*'
- en: '![](../Images/af76d70557b880cd8db6bcefea85abd1.png)'
  id: totrans-73
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/af76d70557b880cd8db6bcefea85abd1.png)'
- en: 'Image 8: Topic diversity illustration. Image by author.'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 图8：主题多样性说明。图由作者提供。
- en: '*2\. Calculate topic diversity as count of distinct tokens/ count of tokens
    in the tables for both models.*'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: '*2. 计算主题多样性，即不同标记的数量/表中标记的数量，对于两个模型。*'
- en: 4.4\. Model comparison
  id: totrans-76
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.4. 模型比较
- en: Let’s now summarize the coherence and diversity evaluation in Image 9\. BERTopic
    models are more coherent but less diverse than FASTopic. The differences are not
    very large, but BERTopic suffers from uneven distribution of incoming emails into
    the pipeline (see charts in Image 5). Around 32% of classified emails fall into
    *T0*, and 15% into *T-1*, which covers the unclassified outliers. The models are
    trained with a min. of 20 tokens per topic. Increasing this parameter causes the
    model to be unable to train, probably because of the small data size.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们总结图9中的连贯性和多样性评估。BERTopic模型比FASTopic更连贯但更不多样。差异不是很大，但BERTopic在将收到的电子邮件分配到流程中时存在不均匀分布（参见图5中的图表）。大约32%的分类电子邮件属于*T0*，15%属于*T-1*，这涵盖了未分类的异常值。模型每个主题至少训练20个标记。增加此参数会导致模型无法训练，可能是因为数据量较小。
- en: For this reason, FASTopic is a better choice for topic modelling in email classification
    with small training datasets.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，对于具有小型训练数据集的电子邮件分类，FASTopic是更好的选择。
- en: '![](../Images/711b1221405ba650b4779b22b21518d0.png)'
  id: totrans-79
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/711b1221405ba650b4779b22b21518d0.png)'
- en: 'Image 9: Topic model evaluation metrics. Image by author.'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 图9：主题模型评估指标。图由作者提供。
- en: 'The last step is to deploy the model with topic labels in the email platform
    to classify incoming emails:'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 最后一步是将带有主题标签的模型部署到电子邮件平台中，以对收到的电子邮件进行分类：
- en: '![](../Images/41cecbae7a5778e31c1c6c7766e6e310.png)'
  id: totrans-82
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/41cecbae7a5778e31c1c6c7766e6e310.png)'
- en: Image 10\. Topic model classification pipeline, output. Image by author.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 图10. 主题模型分类流程，输出。图由作者提供。
- en: Summary
  id: totrans-84
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: Coherence and diversity metrics compare models with similar training setups,
    the same dataset, and cleaning strategy. We cannot compare their absolute values
    with the results of different training sessions. But they help us decide on the
    best model for our specific use case. They offer a ***relative comparison*** of
    various model specifications and help decide which model should be deployed in
    the pipeline. Topic models evaluation should always be the last step before model
    deployment in business practice.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 准确性和多样性指标比较具有相似训练设置、相同数据集和清理策略的模型。我们无法将它们的绝对值与不同训练会话的结果进行比较。但它们帮助我们决定最适合我们特定用例的最佳模型。它们提供了各种模型规格的**相对比较**，并帮助我们决定哪个模型应该部署到流程中。在商业实践中，主题模型评估应该是模型部署前的最后一步。
- en: How does customer care benefit from the topic modelling exercise? After the
    topic model is put into production, the pipeline sends a classified topic for
    each email to the email platform that Customer Care uses for communicating with
    customers. With a limited staff, it is now possible to prioritize and respond
    faster to the most sensitive business requests (such as *“time delays*” and *“latency
    issues”*), and change priorities dynamically.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 客户服务如何从主题建模练习中受益？主题模型投入生产后，流程会将每个电子邮件的分类主题发送到客户服务使用的电子邮件平台。在人员有限的情况下，现在可以优先处理并更快地响应最敏感的业务请求（例如*“时间延迟”*和*“延迟问题”*），并动态地更改优先级。
- en: Data and complete codes for this tutorial are [here](https://github.com/PetrKorab/Choose-the-Right-One-Evaluating-Topic-Models-for-Business-Intelligence).
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 本教程的数据和完整代码[在此](https://github.com/PetrKorab/Choose-the-Right-One-Evaluating-Topic-Models-for-Business-Intelligence)。
