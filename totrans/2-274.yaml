- en: 'The Journey from Jupyter to Programmer: A Quick-Start Guide'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 从Jupyter到程序员的旅程：快速入门指南
- en: 原文：[https://towardsdatascience.com/the-journey-from-jupyter-to-programmer-a-quick-start-guide/](https://towardsdatascience.com/the-journey-from-jupyter-to-programmer-a-quick-start-guide/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/the-journey-from-jupyter-to-programmer-a-quick-start-guide/](https://towardsdatascience.com/the-journey-from-jupyter-to-programmer-a-quick-start-guide/)
- en: <mdspan datatext="el1749079091056" class="mdspan-comment">Most Data Scientists</mdspan>,
    myself included, start their coding journey using a [Jupyter Notebook](https://jupyter.org/).
    These files have the extension .ipynb, which stands for **Interactive Python Notebook**.
    As the extension name suggests, it has an intuitive and interactive user interface.
    The notebook is broken down into ‘cells’ or small blocks of separated code or
    markdown (text) language. Outputs are displayed underneath each cell once the
    code within that cell has been executed. This promotes a flexible and interactive
    environment for coders to build their coding skills and start working on data
    science projects.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1749079091056" class="mdspan-comment">大多数数据科学家</mdspan>，包括我自己，都是使用[Jupyter
    Notebook](https://jupyter.org/)开始他们的编码之旅。这些文件具有.ipynb扩展名，代表**交互式Python笔记本**。正如扩展名所暗示的，它具有直观且交互式的用户界面。笔记本被分解为“单元格”或分离的代码或Markdown（文本）语言的小块。一旦单元格中的代码被执行，输出就会显示在每个单元格下方。这促进了灵活且交互的环境，让编码者能够提升他们的编码技能并开始着手数据科学项目。
- en: 'A typical example of a Jupyter Notebook is below:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一个典型的Jupyter Notebook示例：
- en: '![](../Images/3c7a77134cdf17bca532ab3b7e6804e8.png)'
  id: totrans-4
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/3c7a77134cdf17bca532ab3b7e6804e8.png)'
- en: Example of a Jupyter Notebook with code cells, markdown cells and a sample visualisation.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一个包含代码单元格、Markdown单元格和示例可视化的Jupyter Notebook示例。
- en: 'This all sounds great. And don’t get me wrong, for use cases such as conducting
    solo research or exploratory data analysis (EDA), Jupyter Notebooks ***are***
    great. The issues arise when you ask the following questions:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 这听起来很棒。而且请别误会，对于像进行独立研究或探索性数据分析（EDA）这样的用例，Jupyter Notebook***确实***很棒。问题出现在你提出以下问题的时候：
- en: How do you turn a Jupyter Notebook into code that can be leveraged by a business?
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你如何将Jupyter Notebook转换为可以被企业利用的代码？
- en: Can you collaborate with other developers on the same project using a version
    control system?
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你能否使用版本控制系统与其他开发者协作同一个项目？
- en: How can you deploy code to a production environment?
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 你如何将代码部署到生产环境？
- en: Pretty soon, the limitations of exclusively using Jupyter Notebooks within a
    commercial context will start to cause problems. It’s simply not designed for
    these purposes. The general solution is to organise code in a modular fashion.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 很快，仅限于在商业环境中使用Jupyter Notebook的局限性将开始引起问题。它根本不适合这些用途。一般的解决方案是以模块化的方式组织代码。
- en: By the end of this article, you should have a clear understanding of how to
    structure a small data science project as a Python program and appreciate the
    advantages of transitioning to a programming approach. You can check out an example
    template to supplement this article in my github [here](https://github.com/lucydickinson/datascience/tree/main/datascience_project_template).
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 到本文结束时，你应该对如何将小型数据科学项目结构化为Python程序有一个清晰的理解，并欣赏转向编程方法的优点。你可以查看我在github上的一个示例模板，以补充本文内容[这里](https://github.com/lucydickinson/datascience/tree/main/datascience_project_template)。
- en: '* * *'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Disclaimer
  id: totrans-13
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 免责声明
- en: The contents of this article are based on my experience of migrating away from
    solely using Jupyter Notebooks to write code. Do notebooks still have a purpose?
    Yes. Are there alternative ways to organise and execute code beyond the methods
    I discuss in this article? Yes.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 本文内容基于我迁移到不再仅使用Jupyter Notebook编写代码的经验。笔记本是否还有其用途？是的。除了我在本文中讨论的方法之外，还有没有其他组织和执行代码的替代方式？是的。
- en: I wanted to share this information to help anyone wanting to make the move away
    from notebooks and towards writing scripts and programs. If I’ve missed any features
    of Jupyter Notebooks that mitigate the limitations I’ve mentioned, please drop
    a comment!
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 我想分享这些信息，帮助任何想要从笔记本转向编写脚本和程序的人。如果我在提到的局限性中遗漏了Jupyter Notebook的任何功能，请留下评论！
- en: Let’s get back to it.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们回到这个问题上来。
- en: '* * *'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Programming: what’s the big deal?'
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 编程：这有什么大不了的？
- en: For the purpose of this article, I’ll be focusing on the Python programming
    language as this is the language I use for data science projects. Structuring
    code as a Python program unlocks a range of functionalities that are difficult
    to achieve when working exclusively within a Jupyter Notebook. These benefits
    include collaboration, versatility and portability – you’re simply able to do
    more with your code. I’ll explain these benefits further down – stay with me a
    little longer!
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 为了本文的目的，我将专注于Python编程语言，因为这是我用于数据科学项目的语言。将代码结构化为Python程序可以解锁一系列在仅使用Jupyter Notebook时难以实现的功能。这些好处包括协作、多功能性和便携性——你只需用代码就能做更多的事情。我将在下面进一步解释这些好处——请稍等片刻！
- en: Python programs are typically organised into [modules](https://docs.python.org/3/tutorial/modules.html)
    and [packages](https://docs.python.org/3/tutorial/modules.html#packages). A module
    is a python script (files with a .py extension) that contains python code which
    can be imported into other files. A package is a directory that contains python
    modules. I’ll discuss the purpose of the file `__init__.py` later in the article.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: Python程序通常组织成[模块](https://docs.python.org/3/tutorial/modules.html)和[包](https://docs.python.org/3/tutorial/modules.html#packages)。模块是一个Python脚本（以.py扩展名结尾的文件），其中包含可以导入到其他文件中的Python代码。包是一个包含Python模块的目录。我将在文章的后面讨论文件`__init__.py`的作用。
- en: '![](../Images/2ff77dc03d9c7f81dabbc2bd75ead0a9.png)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/2ff77dc03d9c7f81dabbc2bd75ead0a9.png)'
- en: Schematic of package and module structure in a data science project
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 数据科学项目中包和模块结构的示意图
- en: Anytime you import a python library into your code, such as built-in libraries
    like `os` or third-party libraries like `pandas` , you are interacting with a
    python program that’s been organised into a package and modules.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 每次你将Python库导入到你的代码中，比如内置库如`os`或第三方库如`pandas`，你实际上是在与一个组织成包和模块的Python程序交互。
- en: 'For example, let’s say you want to use the [randint](https://numpy.org/doc/2.1/reference/random/generated/numpy.random.randint.html)
    function from [numpy](https://numpy.org/doc/2.1/index.html). This function allows
    you to generate a random integer based on specified parameters. You might write:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，假设你想使用[numpy](https://numpy.org/doc/2.1/index.html)中的[randint](https://numpy.org/doc/2.1/reference/random/generated/numpy.random.randint.html)函数。这个函数允许你根据指定的参数生成一个随机整数。你可能这样写：
- en: '[PRE0]'
  id: totrans-25
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Let’s annotate that import statement to show what you’re actually importing.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们注释那个导入语句来展示你实际上在导入什么。
- en: '![](../Images/458ed5596d57aeab8b868d80cf4da567.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/458ed5596d57aeab8b868d80cf4da567.png)'
- en: In this instance, `numpy` is a *package*; `random` is a *module* and `randint`
    is a *function*.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，`numpy`是一个*包*；`random`是一个*模块*，而`randint`是一个*函数*。
- en: So, it turns out you probably interact with python programs on a regular basis.
    This poses the question, what does the journey look like towards becoming a python
    programmer?
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，你很可能在定期地与Python程序互动。这引发了一个问题，成为Python程序员的过程是什么样的？
- en: 'The great transition: where do you even start?'
  id: totrans-30
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 伟大的转变：你甚至从哪里开始呢？
- en: The trick to building a functional python program is all in the file structure
    and organisation. It sounds boring but it plays a super important part in setting
    yourself up for success!
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 构建一个功能性的Python程序的关键在于文件结构和组织。这听起来很无聊，但它对你取得成功起着至关重要的作用！
- en: 'Let me use an analogy to explain: every house has a drawer that has just about
    everything in it; tools, elastic bands, medicine, your hopes and dreams, the lot.
    There’s no rhyme or reason, it’s a dumping ground of just about everything. Think
    of this as a Jupyter Notebook. This one file typically contains all stages of
    a project, from importing data, exploring what the data looks like, visualising
    trends, extracting features, training a model etc. For a project that’s destined
    to be deployed on a production system or co-developed with colleagues, it’s going
    to cause chaos. What’s needed is some organisation, to put all the tools in one
    compartment, the medicine in another and so on.'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 让我用一个类比来解释：每座房子都有一个抽屉，里面几乎什么都有；工具、橡皮筋、药品、你的希望和梦想，应有尽有。没有规律或理由，它是一个几乎什么都有的大杂烩。想象一下这是一个Jupyter
    Notebook。这个文件通常包含项目的所有阶段，从导入数据、探索数据的样子、可视化趋势、提取特征、训练模型等。对于一个注定要部署在生产系统上或与同事共同开发的项目，它将会造成混乱。所需要的是一些组织，把所有工具放在一个隔间里，药品放在另一个隔间，等等。
- en: A great way to do that with code is to use a project template. One that I use
    frequently is the [Cookie Cutter Data Science template](https://github.com/drivendataorg/cookiecutter-data-science).
    You can create a whole directory for your project with all the relevant files
    needed to do just about anything in a few simple operations in a terminal window
    – see the link above for information on how to install and run Cookie Cutter.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 使用代码的一个好方法是使用项目模板。我经常使用的是 [Cookie Cutter Data Science 模板](https://github.com/drivendataorg/cookiecutter-data-science)。您可以在终端窗口中通过几个简单的操作创建一个包含所有相关文件的项目目录，以完成几乎所有工作
    - 请参阅上面的链接以获取有关如何安装和运行 Cookie Cutter 的信息。
- en: 'Below are some of the key features of the project template:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是项目模板的一些关键特性：
- en: '**package** or **src** directory — directory for python scripts/modules, equipped
    with examples to get you started'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**package** 或 **src** 目录 — 用于 Python 脚本/模块的目录，配备了示例以帮助您开始'
- en: '**readme.md** — file to describe usage, setup and how to run the package'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**readme.md** — 描述使用方法、设置和如何运行包的文件'
- en: '**docs** directory — containing files that enable seamless autodocumentation'
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**docs** 目录 — 包含使无缝自动文档化成为可能的文件'
- en: '**Makefile**— for writing OS ambivalent bespoke run commands'
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Makefile** — 用于编写与操作系统无关的定制运行命令'
- en: '**pyproject.toml/requirements.txt** — for dependency management'
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**pyproject.toml/requirements.txt** — 用于依赖管理'
- en: '![](../Images/e4d79727e766304dc10aad0766519bc4.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/e4d79727e766304dc10aad0766519bc4.png)'
- en: Project template created by the Cookie Cutter Data Science package.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 由 Cookie Cutter Data Science 包创建的项目模板。
- en: '**Top tip**. Make sure to keep Cookie Cutter up to date. With every release,
    new features are added according to the ever-evolving data science universe. I’ve
    learnt quite a few things from exploring a new file or feature in the template!'
  id: totrans-42
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**Top tip**. 确保Cookie Cutter保持最新。随着每一次发布，都会根据不断发展的数据科学宇宙添加新功能。我在探索模板中的新文件或新功能时学到了很多！'
- en: Alternatively, you can use other templates to build your project such as that
    provided by [Poetry](https://python-poetry.org/). Poetry is a package manager
    which you can use to generate a project template that’s more lightweight than
    Cookie Cutter.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，您可以使用其他模板来构建您的项目，例如 [Poetry](https://python-poetry.org/) 提供的模板。Poetry 是一个包管理器，您可以使用它生成比
    Cookie Cutter 更轻量级的项目模板。
- en: The best way to interact with your project is through an **IDE (Integrated Development
    Environment)**. This software, such as [Visual Studio Code](https://code.visualstudio.com/)
    (VS Code) or [PyCharm](https://www.jetbrains.com/pycharm/), encompass a variety
    of features and processes that enable you to code, test, debug and package your
    work efficiently. My personal preference is VS Code!
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 与您的项目交互的最佳方式是通过 **IDE（集成开发环境）**。这种软件，如 [Visual Studio Code](https://code.visualstudio.com/)
    (VS Code) 或 [PyCharm](https://www.jetbrains.com/pycharm/)，包含各种功能和流程，使您能够高效地进行编码、测试、调试和打包工作。我个人的偏好是
    VS Code！
- en: '* * *'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'From cells to scripts: let’s get coding'
  id: totrans-46
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 从单元格到脚本：让我们开始编码
- en: Now that we have a development environment and a nicely structured project template,
    how exactly do you write code in a python script if you’ve only ever coded in
    a Jupyter Notebook? To answer that question, let’s first consider a few industry-standard
    coding best practices.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们有了开发环境和结构良好的项目模板，如果您以前只在 Jupyter Notebook 中编写过代码，那么您如何在 Python 脚本中编写代码呢？为了回答这个问题，让我们首先考虑一些行业标准编码最佳实践。
- en: '**Modular **— follow the software engineering philosophy of ‘[Single Responsibility
    Principle](https://en.wikipedia.org/wiki/Single-responsibility_principle)’. All
    code should be encapsulated in functions, with each function performing a single
    task. The [Zen of Python](https://peps.python.org/pep-0020/) states: ‘Simple is
    better than complex’.'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**模块化** — 遵循软件工程哲学的“[单一责任原则](https://en.wikipedia.org/wiki/Single-responsibility_principle)”。所有代码都应该封装在函数中，每个函数执行单一任务。《Python之禅》中提到：“简单比复杂好”。'
- en: '**Readable **— if code is readable, then there’s a good chance it will be maintainable.
    Ensure the code is full of docstrings and comments!'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可读性** — 如果代码可读，那么它很可能易于维护。确保代码中充满了文档字符串和注释！'
- en: '**Stylish **— format code in a consistent and clear way. The [PEP 8 guidelines](https://peps.python.org/pep-0008/)
    are designed for this purpose to advise how code should be presented. You can
    install autoformatters such as [Black](https://pypi.org/project/black/) in an
    IDE so that code is automatically formatted in compliance with PEP 8 each time
    the python script is saved. For example, the right level of indentation and spacing
    will be applied so you don’t even have to think about it!'
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**时尚**——以一致和清晰的方式格式化代码。[PEP 8指南](https://peps.python.org/pep-0008/)旨在为此目的提供建议，说明代码应该如何呈现。你可以在IDE中安装自动格式化工具，如[Black](https://pypi.org/project/black/)，以便在每次保存Python脚本时自动按照PEP
    8格式化代码。例如，将应用正确的缩进和间距，这样你甚至都不必去想它！'
- en: '**Versatile **— if code is encapsulated into functions or classes, these can
    be reused throughout a project.'
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**多功能**——如果代码封装到函数或类中，这些可以在整个项目中重用。'
- en: For a deeper dive into coding best practice, [this article](https://medium.com/bitgrit-data-science-publication/8-coding-practices-for-data-scientists-2db7fa34bf76)
    is a fantastic overview of principles to adhere to as a Data Scientist, be sure
    to check it out!
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 对于更深入的了解编码最佳实践，[这篇文章](https://medium.com/bitgrit-data-science-publication/8-coding-practices-for-data-scientists-2db7fa34bf76)是作为数据科学家应遵守的原则的绝佳概述，务必查看！
- en: 'With those best practices in mind, let’s go back to the question: how do you
    write code in a python script?'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到这些最佳实践，让我们回到问题：如何在Python脚本中编写代码？
- en: '* * *'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Module structure
  id: totrans-55
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 模块结构
- en: 'First, separate the different stages of your notebook or project into different
    python files. And make sure to name them according to the task. For example, you
    might have the following scripts in a typical machine learning package: `data.py`,
    `preprocess.py`, `features.py`, `train.py`, `predict.py`, `evaluate.py` etc. Depending
    on your project structure, these would sit within the `package` or `src` directory.'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，将笔记本或项目的不同阶段分别放入不同的Python文件中。并确保根据任务命名它们。例如，在一个典型的机器学习包中，你可能会有以下脚本：`data.py`、`preprocess.py`、`features.py`、`train.py`、`predict.py`、`evaluate.py`等。根据你的项目结构，这些将位于`package`或`src`目录中。
- en: Within each script, code should be organised or ‘encapsulated’ into a classes
    and/or functions. A **[function](https://docs.python.org/3/tutorial/controlflow.html#defining-functions)**
    is a reusable block of code that performs a single, well-defined task. A **[class](https://docs.python.org/3/tutorial/classes.html)**
    is a blueprint for creating an object, with its own set of attributes (variables)
    and methods (functions). Encapsulating code in this manner permits reusability
    and avoids duplication, thus keeping code concise.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 在每个脚本中，代码应该是有组织的或“封装”成类和/或函数。一个**[函数](https://docs.python.org/3/tutorial/controlflow.html#defining-functions)**是一个可重用的代码块，执行单个、定义良好的任务。一个**[类](https://docs.python.org/3/tutorial/classes.html)**是创建对象的蓝图，具有自己的属性（变量）和方法（函数）。以这种方式封装代码允许重用并避免重复，从而保持代码简洁。
- en: A script might only need one function if the task is simple. For example, a
    data loading module (e.g. `data.py`) may only contain a single function ‘load_data’
    which loads data from a csv file into a `pandas` DataFrame. Other scripts, such
    as a data processing module (e.g. `preprocess.py`) will inherently involve more
    tasks and hence requires more functions or a class to encapsulate these tasks.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 如果任务简单，脚本可能只需要一个函数。例如，一个数据加载模块（例如 `data.py`）可能只包含一个名为‘load_data’的函数，该函数将数据从csv文件加载到`pandas`
    DataFrame中。其他脚本，如数据处理模块（例如 `preprocess.py`），将涉及更多任务，因此需要更多函数或类来封装这些任务。
- en: '![](../Images/690821e52de6689dd6bf34d8bf1c6e1e.png)'
  id: totrans-59
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/690821e52de6689dd6bf34d8bf1c6e1e.png)'
- en: Example template of a typical module in a data science project.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 数据科学项目中典型模块的示例模板。
- en: '**Top tip**. Transitioning from Jupyter Notebooks to scripts may take some
    time and everyone’s personal journey will look different. Some Data Scientists
    I know write code as python scripts straight away and don’t touch a notebook.
    Personally, I use a notebook for EDA, I then encapsulate the code into functions
    or classes before porting to a script. Do whatever feels right for you.'
  id: totrans-61
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**技巧**。从Jupyter Notebooks过渡到脚本可能需要一些时间，每个人的个人旅程都会有所不同。我知道的一些数据科学家直接编写Python脚本代码，而不接触笔记本。我个人使用笔记本进行EDA，然后封装代码到函数或类中，再移植到脚本中。做任何你觉得合适的事情。'
- en: ''
  id: totrans-62
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: There are a few tools that can help with the transition. 1) In VS Code, you
    can select one or more lines, right click and select Run Python > Run Selection/Line
    in Python Terminal. This is similar to running a cell in Jupyter Notebook. 2)
    You can convert a notebook to a python script by clicking File > Download as >
    Python (.py). I wouldn’t recommend that approach with large notebooks for fear
    of creating monster scripts, but the option is there!
  id: totrans-63
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 有一些工具可以帮助过渡。1) 在VS Code中，你可以选择一行或多行，右键点击并选择运行Python > 在Python终端中运行选择/行。这类似于在Jupyter
    Notebook中运行一个单元格。2) 你可以通过点击文件 > 下载为 > Python (.py)将笔记本转换为Python脚本。我不建议用大型笔记本这样做，因为担心会创建出巨无霸脚本，但这个选项是存在的！
- en: The ‘__main__’ event
  id: totrans-64
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '`''__main__''`事件'
- en: At this point, we’ve established that code should be encapsulated into functions
    and stored within clearly named scripts. The next logical question is, how can
    you tie all these scripts together so code gets executed in the right order?
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 在这一点上，我们已经确定代码应该封装到函数中，并存储在命名清晰的脚本中。接下来的逻辑问题是，你如何将这些脚本串联起来，以确保代码按正确的顺序执行？
- en: The answer is to import these scripts into a single-entry point and execute
    the code in one place. Within the context of developing a simple project, this
    entry point is typically a script named `main.py` (but can be called anything).
    At the top of `main.py`, just as you would import necessary built-in packages
    or third-party packages from [PyPI](https://pypi.org/), you’ll import your own
    modules or specific classes/functions from modules. Any classes or functions defined
    in these modules will be available to use by the script they’ve been imported
    into.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 答案是将这些脚本导入到一个单入口点，并在一个地方执行代码。在开发简单项目的上下文中，这个入口点通常是名为`main.py`的脚本（但也可以命名为其他任何名称）。在`main.py`的顶部，就像你会从[PyPI](https://pypi.org/)导入必要的内置包或第三方包一样，你会导入你自己的模块或从模块中导入特定的类/函数。在这些模块中定义的任何类或函数都将可供导入它们的脚本使用。
- en: To do this, the package directory within your project needs to contain a `__init__.py`
    file, which is typically left blank for simple projects. This file tells the python
    interpreter to treat the directory as a package, meaning that any files with a
    .py extension get treated as modules and can therefore be imported into other
    files.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 要做到这一点，你的项目目录中需要包含一个`__init__.py`文件，对于简单的项目通常留空。这个文件告诉Python解释器将目录视为一个包，这意味着任何以.py扩展名的文件都被视为模块，因此可以被其他文件导入。
- en: The structure of `main.py` is project dependent, but it will generally be dictated
    by the necessary order of code execution. For a typical machine learning project,
    you would first need to use the load_data function from the module `data.py`.
    You then might instantiate the preprocessor class that is imported from the module
    `preprocess.py` and apply a variety of class methods to the preprocessor object.
    You would then move onto feature engineering and so on until you have the whole
    workflow written out. This workflow would typically be contained or referenced
    within a conditional statement at the bottom of `main.py`.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: '`main.py`的结构取决于项目，但通常将由代码执行的必要顺序决定。对于一个典型的机器学习项目，你首先需要使用`data.py`模块中的`load_data`函数。然后你可能实例化从`preprocess.py`模块导入的预处理类，并应用各种类方法到预处理对象上。然后你会继续进行特征工程，等等，直到整个工作流程编写完成。这个工作流程通常会被包含或引用在`main.py`底部的条件语句中。'
- en: 'Wait….. who mentioned anything about a conditional statement? The conditional
    statement is as follows:'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 等等……谁提到了条件语句？条件语句如下：
- en: '[PRE1]'
  id: totrans-70
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '`__name__` is a special python variable that can have two different values
    depending on how the script is run:'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: '`__name__`是一个特殊的Python变量，它的值取决于脚本的运行方式：'
- en: If the script is run directly in terminal, the interpreter assigns the `__name__`
    variable the value `'__main__'`. Because the statement `if '__name__=='__main__':`
    is true, any code that sits within this statement is executed.
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果脚本直接在终端中运行，解释器会将`__name__`变量赋值为`'__main__'`。因为`if '__name__'=='__main__':`这个语句为真，所以任何位于这个语句内的代码都会被执行。
- en: If the script is run as an imported module, the interpreter assigns the name
    of the module as a string to the `__name__` variable. Because the statement if
    `if '__name__=='__main__':` is false, the contents of this statement is not executed.
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果脚本作为导入的模块运行，解释器会将模块的名称作为字符串赋值给`__name__`变量。因为`if '__name__'=='__main__':`这个语句为假，所以这个语句的内容不会被执行。
- en: Some more information on this can be found [here](https://realpython.com/if-name-main-python/).
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 关于这方面的更多信息可以在[这里](https://realpython.com/if-name-main-python/)找到。
- en: Given this process, you’ll need to reference the master function within the
    `if '__name__=='__main__':` conditional statement so that it is executed when
    `main.py` is run. Alternatively, you can place the code underneath `if '__name__=='__main__':`
    to achieve the same outcome.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 给定这个过程，你需要在`if '__name__=='__main__':`条件语句中引用主函数，以便在运行`main.py`时执行。或者，你也可以将代码放在`if
    '__name__=='__main__':`之下，以实现相同的效果。
- en: '![](../Images/db4c553b49d8e7407974aca5a3467ccf.png)'
  id: totrans-76
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/db4c553b49d8e7407974aca5a3467ccf.png)'
- en: Example template of main.py, which serves as the main entry point to the program
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: main.py的示例模板，它是程序的入口点
- en: '`main.py` (or any python script) can be executed in terminal using the following
    syntax:'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: '`main.py`（或任何Python脚本）可以使用以下语法在终端中执行：'
- en: '[PRE2]'
  id: totrans-79
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Upon running `main.py`, code will be executed from all the imported modules
    in the specified order. This is the same as clicking the ‘run all’ button on a
    Jupyter Notebook where each cell is executed in sequential order. The difference
    now is that the code is organised into individual scripts in a logical manner
    and encapsulated within classes and functions.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 运行`main.py`后，代码将按照指定的顺序执行所有导入的模块中的代码。这和在Jupyter Notebook上点击“运行所有”按钮一样，每个单元格按顺序执行。现在的不同之处在于，代码被组织成逻辑上的独立脚本，并封装在类和函数中。
- en: You can also add **CLI (command-line interface) arguments** to your code using
    tools such as [argparse](https://docs.python.org/3/library/argparse.html) and
    [typer](https://typer.tiangolo.com/), allowing you to toggle specific variables
    when running `main.py` in the terminal. This provides a great deal of flexibility
    during code execution.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 你还可以使用[argparse](https://docs.python.org/3/library/argparse.html)和[typer](https://typer.tiangolo.com/)等工具将**CLI（命令行界面）参数**添加到你的代码中，允许你在终端运行`main.py`时切换特定变量。这为代码执行提供了很大的灵活性。
- en: So we’ve now reached the best part. The pièce de résistance. The real reasons
    why, beyond having fantastically organised and readable code, you should go to
    the effort of programming.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们现在已经到达了最好的部分。真正的亮点。除了拥有组织得非常好且易于阅读的代码之外，你应该努力编程的真实原因。
- en: '* * *'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'The end game: what’s the point of programming?'
  id: totrans-84
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最终目标：编程的意义是什么？
- en: Let’s walk through some of the key benefits of moving beyond Jupyter Notebooks
    and transitioning to writing Python scripts instead.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们来看看超越Jupyter Notebooks并转向编写Python脚本的一些关键好处。
- en: '![](../Images/d4a1f01d8276e491cb2aa46c3a5c0599.png)'
  id: totrans-86
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d4a1f01d8276e491cb2aa46c3a5c0599.png)'
- en: Visualisation of the key benefits to programming. Image generated by author.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 编程关键好处的可视化。图像由作者生成。
- en: '**Packaging & distribution** — you can package and distribute your python program
    so it can be shared, installed and run on another computer. Package managers such
    as pip, poetry or conda can be used to install the package, just as you would
    install packages from PyPI, such as `pandas` or `numpy`. The trick to successfully
    distributing your package is to ensure that the dependencies are managed correctly,
    which is where the files `pyproject.toml` or `requirements.txt` come in. Some
    useful resources can be found [here](https://packaging.python.org/en/latest/tutorials/packaging-projects/)
    and [here](https://realpython.com/python-wheels/).'
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**打包与分发**—你可以打包并分发你的Python程序，以便可以在另一台计算机上共享、安装和运行。可以使用pip、poetry或conda等包管理器来安装包，就像你从PyPI安装包一样，例如`pandas`或`numpy`。成功分发你的包的关键是确保依赖关系得到正确管理，这正是`pyproject.toml`或`requirements.txt`文件的作用所在。一些有用的资源可以在[这里](https://packaging.python.org/en/latest/tutorials/packaging-projects/)和[这里](https://realpython.com/python-wheels/)找到。'
- en: '**Deployment **— whilst there are multiple methods and platforms to deploy
    code, using a modular approach will put you in good stead to get your code production
    ready. Tools such as [Docker](https://www.docker.com/) enable the deployment of
    programs or applications in isolated environments called containers, which can
    be easily managed through CI/CD (continuous integration & deployment) pipelines.
    It’s worth noting that while Jupyter Notebooks can be deployed using [JupyterLab](https://jupyterlab.readthedocs.io/en/latest/),
    this approach lacks the flexibility and scalability of adopting a modular, script-based
    workflow.'
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**部署**—虽然有多种方法和平台可以部署代码，但采用模块化方法将使你的代码更容易进入生产环境。例如，Docker 这样的工具可以在称为容器的隔离环境中部署程序或应用程序，这些容器可以通过
    CI/CD（持续集成与部署）管道轻松管理。值得注意的是，虽然可以使用 [JupyterLab](https://jupyterlab.readthedocs.io/en/latest/)
    部署 Jupyter Notebooks，但这种方法缺乏采用基于脚本的工作流程的灵活性和可扩展性。'
- en: '**Version control** — moving away from Jupyter Notebooks opens up the wonderful
    worlds of version control and collaboration. Version control systems such as [Git](https://git-scm.com/)
    are very much industry standard and offer a wealth of benefits, providing you
    use them appropriately! Follow the motto ‘incremental changes are key’ and ensure
    that you make small, regular commits with logical commit messages in imperative
    language whenever you make functional changes whilst developing. This will make
    it far easier to keep track of changes and test code. [Here](https://towardsdatascience.com/comprehensive-guide-to-github-for-data-scientist-d3f71bd320da/)
    is a super useful guide to using git as a data scientist.'
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**版本控制**—远离 Jupyter Notebooks 将开启版本控制和协作的奇妙世界。例如，Git 这样的版本控制系统是行业标准，并提供丰富的功能，只要你正确使用它们！遵循“增量更改是关键”的格言，确保你在开发过程中进行功能更改时，做出小而频繁的提交，并使用命令性语言编写有逻辑的提交信息。这将使跟踪更改和测试代码变得容易得多。[这里](https://towardsdatascience.com/comprehensive-guide-to-github-for-data-scientist-d3f71bd320da/)
    是一个非常有用的指南，介绍了数据科学家如何使用 Git。'
- en: '**Fun fact**. It’s generally discouraged to commit Jupyter Notebooks to version
    control systems as it is difficult to track changes!'
  id: totrans-91
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**有趣的事实**。通常不建议将 Jupyter Notebooks 提交到版本控制系统，因为跟踪更改非常困难！'
- en: '**(Auto)Documentation** — we all know that documenting code increases its readability
    thus helping the reader understand what the code is doing. It’s considered best
    practice to add docstrings to functions and classes within python scripts. What’s
    really cool is that we can use these docstrings to build an index of formatted
    documentation of your whole project in the form of html files. Tools such as Sphinx
    enable you to do this in a quick and easy way. You can read my previous [article](https://medium.com/data-science/step-by-step-basics-code-autodocumentation-fa0d9ae4ac71)
    which takes you through this process step by step.'
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**（自动）文档**—我们都清楚，编写代码文档可以提高代码的可读性，从而帮助读者理解代码的功能。在 Python 脚本中为函数和类添加文档字符串被认为是最佳实践。真正酷的是，我们可以使用这些文档字符串以
    HTML 文件的形式构建整个项目的格式化文档索引。例如，Sphinx 这样的工具可以让你快速轻松地完成这项工作。你可以阅读我之前的[文章](https://medium.com/data-science/step-by-step-basics-code-autodocumentation-fa0d9ae4ac71)，它将逐步引导你完成这个过程。'
- en: '**Reusability **— adopting a modular approach promotes the reuse of code. There
    are many common tasks within data science projects, such as cleansing data or
    scaling features. There’s little point in reinventing the wheel, so if you can
    reuse functions or classes with minor modification from previous projects, as
    long as there are no confidentiality restrictions, then save yourself that time!
    You might have a `utils.py` or `classes.py` module which contains ambivalent code
    that can be used across modules.'
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可重用性**—采用模块化方法可以促进代码的重用。数据科学项目中有很多常见的任务，例如数据清洗或特征缩放。重新发明轮子没什么意义，所以如果你可以从以前的项目中重用函数或类，只需进行少量修改，并且没有保密限制，那么就节省那份时间吧！你可能有一个
    `utils.py` 或 `classes.py` 模块，其中包含可以在模块间使用的模糊代码。'
- en: '**Configuration management** — whilst this is possible with a Jupyter Notebook,
    it is common practice to use configuration management for a python program. Configuration
    management refers to organising and managing a project’s parameters and variables
    in a centralised way. Instead of defining variables throughout the code, they
    are stored in a file that sits within the project directory. This means that you
    do not need to interrogate the code to change a parameter. An overview of this
    can be found [here](https://ibm.github.io/data-science-best-practices/configuration_management.html).'
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**配置管理**—虽然使用Jupyter Notebook也可以做到这一点，但通常的做法是使用配置管理来处理Python程序。配置管理是指以集中化的方式组织和管理工作参数和变量。而不是在代码中定义变量，它们被存储在位于项目目录中的文件中。这意味着您不需要检查代码来更改参数。有关此内容的概述可以在[这里](https://ibm.github.io/data-science-best-practices/configuration_management.html)找到。'
- en: '**Note**. If you use a YAML file (.yml) for configuration, this requires the
    python package `yaml`. Make sure to install the [pyyaml](https://pypi.org/project/PyYAML/)
    package (not ‘yaml’) using `pip install pyyaml`. Forgetting this can lead to “package
    not found” errors—I’ve made this mistake, maybe more than once..'
  id: totrans-95
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**注意**。如果您使用YAML文件（.yml）进行配置，则需要Python包`yaml`。请确保使用`pip install pyyaml`安装[pyyaml](https://pypi.org/project/PyYAML/)包（不是‘yaml’）。忘记这一点可能会导致“找不到包”错误——我犯过这个错误，可能不止一次。'
- en: '**Logging **— using loggers within a python program enables you to easily track
    code execution, provide debugging information and monitor a program or application.
    Whilst this functionality is possible within a Jupyter Notebook, it is generally
    considered overkill and is fulfilled with the print() statement instead. By using
    python’s [logger](https://docs.python.org/3/library/logging.html) module, you
    can format a logging object to your liking. It has five different messaging levels
    (info, debug, warning, error, critical) relative to the severity of the events
    being logger. You can include logging messages throughout the code to provide
    insight into code execution, which can be printed to terminal and/or written to
    a file. You can learn more about logging [here](https://docs.python.org/3/howto/logging.html).'
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**日志记录**—在Python程序中使用日志记录器可以轻松跟踪代码执行、提供调试信息并监控程序或应用程序。虽然这种功能在Jupyter Notebook中也是可能的，但通常被认为过于冗余，因此通常使用print()语句来替代。通过使用Python的[logger](https://docs.python.org/3/library/logging.html)模块，您可以按照自己的喜好格式化日志对象。它有五种不同的消息级别（info、debug、warning、error、critical），这些级别与被记录事件的严重性相关。您可以在代码中包含日志消息，以提供对代码执行的洞察，这些消息可以打印到终端和/或写入文件。您可以在[这里](https://docs.python.org/3/howto/logging.html)了解更多关于日志记录的信息。'
- en: When are Jupyter Notebooks useful?
  id: totrans-97
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Jupyter Notebook在何时有用？
- en: 'As I eluded at the beginning of this article, Jupyter Notebooks still have
    their place in data science projects. Their easy-to-use interface makes them great
    for exploratory and interactive tasks. Two key use cases are listed below:'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 正如我在本文开头所暗示的，Jupyter Notebook在数据科学项目中仍然有其位置。它们易于使用的界面使它们非常适合探索性和交互式任务。以下列出了两个关键用例：
- en: Conducting exploratory data analysis on a dataset during the initial stages
    of a project.
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在项目初期对数据集进行探索性数据分析。
- en: Creating an interactive resource or report to demonstrate analytical findings.
    Note there are plenty of tools out there that you can use in this nature, but
    a Jupyter Notebook can also do the trick.
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建一个交互式资源或报告来展示分析结果。请注意，市面上有许多可以用于此类目的的工具，但Jupyter Notebook也可以做到这一点。
- en: '* * *'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Final thoughts
  id: totrans-102
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最后的想法
- en: Thanks for sticking with me to the very end! I hope this discussion has been
    insightful and has shed some light on how and why to start programming. As with
    most things in Data Science, there isn’t a single ‘correct’ way to solve a problem,
    but a considered multi-faceted approach depending on the task at hand.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢您一直陪伴我到最后！我希望这次讨论能够让您有所启发，并对如何以及为什么开始编程有一些了解。在数据科学中，与大多数事情一样，解决问题并没有一种“正确”的方法，而是根据手头的任务采取一种经过深思熟虑的多方面方法。
- en: Shout out to my colleague and fellow data scientist Hannah Alexander for reviewing
    this article 🙂
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 向我的同事和同行数据科学家Hannah Alexander致敬，感谢她审阅这篇文章 🙂
- en: Thanks for reading!
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢您的阅读！
