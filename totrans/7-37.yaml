- en: 'Showcasing Soaring Wildfire Counts With Streamlit and Python: A Powerful Approach'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/showcasing-soaring-wildfire-counts-with-streamlit-and-python-a-powerful-approach-e759b3da1a77/](https://towardsdatascience.com/showcasing-soaring-wildfire-counts-with-streamlit-and-python-a-powerful-approach-e759b3da1a77/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![CL-415 In Action (in Italy). Image By Maarten Visser - Wikimedia commons](../Images/3de2cb31670bf5242b0c513677ddb7d4.png)'
  prefs: []
  type: TYPE_IMG
- en: CL-415 In Action (in Italy). Image By Maarten Visser – [Wikimedia commons](https://commons.wikimedia.org/w/index.php?curid=76331722)
  prefs: []
  type: TYPE_NORMAL
- en: Python ***Streamlit*** is terrific for creating interactive maps from a GIS
    dataset.
  prefs: []
  type: TYPE_NORMAL
- en: Interactive maps that allow input from your audience can be used for deeper
    analysis and storytelling.
  prefs: []
  type: TYPE_NORMAL
- en: Python ***Streamlit*** is the right tool for the job. It can be used alongside
    the ***pandas*** for easy data frame creation and manipulation.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s test this out with a deep and detailed dataset on a very prescient issue
    – the seeming escalation of wildfires. There is a terrific public wildfires dataset
    available on the site managed by Natural Resources Canada.
  prefs: []
  type: TYPE_NORMAL
- en: 'With this detailed dataset let’s take a modular approach to our data analysis
    and create:'
  prefs: []
  type: TYPE_NORMAL
- en: A ***static map*** that shows all forest fires in Canada for a period of time
    (ie. a particular year).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: An ***interactive map that*** allows the user to select a shorter period of
    time (ie. a dropdown menu by year) to view more granular data.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A ***bar chart*** that shows more granularity -the number of fires at a provincial
    level.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Can Python ***Streamlit*** do this for us?
  prefs: []
  type: TYPE_NORMAL
- en: '***Let’s give it a go!***'
  prefs: []
  type: TYPE_NORMAL
- en: The Issue
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Forest fires in North America have been particularly destructive over the past
    10–15 years. The most recent California fires have amplified the public awareness
    of this growing concern.
  prefs: []
  type: TYPE_NORMAL
- en: For us in Canada, our recent summers are often spent on our sundecks staring
    into a smoky haze, wondering if the winds may shift in a way that puts our community
    in peril.
  prefs: []
  type: TYPE_NORMAL
- en: '![Forest fire smoke on the left, normal day on the right (Photo by author)](../Images/465eecfcd4a70b20155be218e7836a17.png)'
  prefs: []
  type: TYPE_IMG
- en: Forest fire smoke on the left, normal day on the right (Photo by author)
  prefs: []
  type: TYPE_NORMAL
- en: A common question that comes up in conversation is ***how bad has the wildfire
    situation become compared to how it used to be?***
  prefs: []
  type: TYPE_NORMAL
- en: To better answer this question, and armed with a good dataset, we can create
    a set of visuals that tell us a data story on forest fires over time (ie. by year)
    for Canada, my home.
  prefs: []
  type: TYPE_NORMAL
- en: We can create these visuals as maps and charts to analyze and to learn about
    how the situation has changed from then to now.
  prefs: []
  type: TYPE_NORMAL
- en: The Dataset
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To show the monthly effects of forest fires, we can use a dataset to create
    a set of data visuals that shows forest fires over time.
  prefs: []
  type: TYPE_NORMAL
- en: Natural Resources Canada (a branch of the Canadian Government) has a very detailed
    public data set on wildfires for the past 75 years.
  prefs: []
  type: TYPE_NORMAL
- en: All of this historical fire data for Canada is stored [HERE](https://cwfis.cfs.nrcan.gc.ca/datamart/download/nfdbpnt).
  prefs: []
  type: TYPE_NORMAL
- en: 'On the site, we can scroll down to view and download:'
  prefs: []
  type: TYPE_NORMAL
- en: '![For this tutorial, we can download the dataset that contains fires over 200
    ha in size (Screenshot by author)](../Images/a8c2895e3eaf2b704383360a7fdb144d.png)'
  prefs: []
  type: TYPE_IMG
- en: For this tutorial, we can download the dataset that contains fires over 200
    ha in size (Screenshot by author)
  prefs: []
  type: TYPE_NORMAL
- en: After downloading the file, we will first need to unzip it.
  prefs: []
  type: TYPE_NORMAL
- en: Once unzipped, we can select the file called _**NFDB_point_20240613_large_fires.txtThe**_
  prefs: []
  type: TYPE_NORMAL
- en: '![Choosing the large fires CSV file. (Screenshot by author)](../Images/d8322404cc62b880ad45305bc9e39929.png)'
  prefs: []
  type: TYPE_IMG
- en: Choosing the large fires CSV file. (Screenshot by author)
  prefs: []
  type: TYPE_NORMAL
- en: This file is a comma-separated file (CSV). For ease of use, I renamed my file
    _**NFDB_large_fires.csv**_
  prefs: []
  type: TYPE_NORMAL
- en: 'Each record in this dataset represents a unique forest fire and includes several
    key fields:'
  prefs: []
  type: TYPE_NORMAL
- en: '**YEAR**: The year when the fire occurred.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**LATITUDE** and **LONGITUDE**: The geographic coordinates of the fire.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**FIRE_ID**: A unique identifier for each fire.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**SIZE_HA**: The size of the fire in hectares.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**FIRENAME**: The given name of the fire or the nearest geographic feature.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**REP_DATE**: The date when the fire was first reported.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**OUT_DATE**: The date when the fire was extinguished (if available).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**CAUSE**: The reported cause of the fire (e.g., natural causes like lightning
    or human activity).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Knowing the available fields can now assist us in asking some questions about
    the data.
  prefs: []
  type: TYPE_NORMAL
- en: Questions that we want answered
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Now we can craft some questions about the issues that can be answered by this
    dataset:'
  prefs: []
  type: TYPE_NORMAL
- en: '***Where are the wildfires in Canada occurring?***'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '***How many fires are there in Canada each year?***'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '***Is the number of fires increasing year over year as we move forward in time?***'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: To get warmed up, let’s start by creating a simple static map that shows us
    the fire distribution for Canada in 2023.
  prefs: []
  type: TYPE_NORMAL
- en: Creating a Static Map Using Python
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To start with, we can create a **static map** using Python, specifically using
    the ***pydeck*** library.
  prefs: []
  type: TYPE_NORMAL
- en: The goal here is to generate a map displaying forest fires in Canada for the
    year 2023 and save it as an HTML file that can be viewed in a web browser.
  prefs: []
  type: TYPE_NORMAL
- en: '**NOTE:** ALL of the code and data files from this tutorial are available on
    Github: [HERE](https://github.com/loewenj700/streamlit_wildfires)'
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Loading and Filtering the Data
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Here, we load the dataset containing historical forest fire data using the
    ***pandas*** library:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: The file, `NFDB_large_fires.csv`, is read into a DataFrame named `df_fires`.
    This dataset likely contains information such as fire location (latitude, longitude),
    year of occurrence, fire ID, and size in hectares.
  prefs: []
  type: TYPE_NORMAL
- en: Since we are only interested in visualizing forest fires that occurred in **2023**,
    we filter the DataFrame to include only rows where the `YEAR` column equals 2023\.
    This filtered DataFrame, `df_fires_2023`, will be used to layer the data points
    on the map.
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Defining the PyDeck Layer
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Designing a map digitally requires the creation of layers that are displayed
    on the map. For this map, we need to create a layer for our point data. Each fire
    on the map has a longitude and latitude that defines the exact point of the fire
    on the map:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: This block creates a **scatterplot layer** using `pydeck.Layer`. Each forest
    fire is represented by a red circular marker on the map.
  prefs: []
  type: TYPE_NORMAL
- en: '**`"ScatterplotLayer"`**: Specifies the type of layer to render. Here, we use
    a scatterplot layer to display points.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**`data=df_fires_2023`**: The filtered DataFrame is passed as the data source.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**`get_position=''[LONGITUDE, LATITUDE]''`**: Specifies the coordinates for
    each fire point, using the columns `LONGITUDE` and `LATITUDE` from the DataFrame.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**`get_radius=10000`**: Sets the radius of each marker in meters.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**`get_color=[255, 0, 0]`**: Defines the color of the markers in RGB format.
    `[255, 0, 0]` corresponds to red.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**`pickable=True`**: Enables interaction with the points, allowing tooltips
    or popups to display information when a user hovers over a marker.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 3\. Setting the Map’s Viewport
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'We need to set a longitude and latitude point for the initial load of our map
    view:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: The `view_state` defines the initial view of the map when it is loaded. It specifies
    the **latitude**, **longitude**, **zoom level**, and **pitch** (tilt) of the camera.
  prefs: []
  type: TYPE_NORMAL
- en: '**`latitude` and `longitude`**: The center of the map is set to the mean latitude
    and longitude of all fire points in the filtered dataset.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**`zoom=3`**: Sets the zoom level, ensuring that the map covers a large portion
    of Canada.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**`pitch=0`**: The pitch, or tilt angle, of the map is set to 0, meaning the
    view is directly overhead.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 4\. Rendering and Saving the Map
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: 'This line creates a `Deck` object, which combines the scatterplot layer (`layer`)
    and the viewport (`view_state`). Additionally, a **tooltip** is defined to display
    information when the user hovers over a point on the map. The tooltip shows:'
  prefs: []
  type: TYPE_NORMAL
- en: '**LOCATION**: A unique identifier for the fire.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Size**: The size of the fire in hectares.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Finally, the map is saved as an HTML file using `r.to_html()`. The resulting
    file, `forest_fires_2023_map.html`, contains a fully functional static map that
    can be opened in any web browser. This allows the user to explore the forest fire
    data interactively without needing Python or PyDeck.
  prefs: []
  type: TYPE_NORMAL
- en: 'The detailed result:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Static map generated as HTML and viewed in browser. (Screenshot by author)](../Images/89867e32772c19ac369a0d2f32a49c22.png)'
  prefs: []
  type: TYPE_IMG
- en: Static map generated as HTML and viewed in browser. (Screenshot by author)
  prefs: []
  type: TYPE_NORMAL
- en: 'OK, that looks pretty good. It looks like quite a number of fires in the year
    2023\. However, we have no further context for this data. For example:'
  prefs: []
  type: TYPE_NORMAL
- en: Is this number more or less than other years?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Is this a normal distribution of fires?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: So using this static map as our foundation, let’s try integrating PyDeck with
    ***Streamlit*** to allow dynamic interaction. For example, we can provide users
    with a dropdown menu containing multiple years of data.
  prefs: []
  type: TYPE_NORMAL
- en: Creating a Dynamic Map Using Streamlit
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: For this phase, let’s start by allowing users to select a specific year from
    a dropdown menu. The fires for that year are then visualized on the map.
  prefs: []
  type: TYPE_NORMAL
- en: With ***Streamlit**,* we can create a dynamic web application that enables users
    to select a specific year from a dropdown menu and visualize the corresponding
    forest fires on an interactive map.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s go through a step-by-step implementation!
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Additional Libraries
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'We need to add 2 libraries to our code:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: '`streamlit`: allows us to create an interactive web application'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`plotly.express`: allows us to create interactive charts and graphs.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 2\. Adding a Dropdown Menu for Year Selection
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'For interactivity, let’s add a dropdown menu that allows the user to select
    a year from a range of years. Fo this tutorial, let’s set the range of years from
    2000 to 2023:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: This line of Python code creates a dropdown menu using `st.selectbox`, allowing
    the user to select a specific year from 2000 to 2023\. The selected year is stored
    in the variable `year_selected`.
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Filtering Data Based on the Selected Year
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Once the user selects a year, then we can filter the pandas dataframe to use
    the data from only that year:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: The `YEAR` column matches the selected year. Any `NaN` values in the dataset
    are replaced with `None` to ensure proper JSON formatting when rendering the map.
  prefs: []
  type: TYPE_NORMAL
- en: 4\. Creating the PyDeck Layer
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Those of you who have worked with GIS data before know that we present data
    on a map in layers. We only have one layer of data to add to our map, for the
    fire points:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: 'A scatterplot layer is created using `pydeck.Layer` to display the fires on
    the map. The key parameters are:'
  prefs: []
  type: TYPE_NORMAL
- en: '**`"**ScatterplotLayer"`: Specifies the type of layer.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`data=df_fires_selected`: Uses the filtered dataset for the selected year.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`get_position=''[LONGITUDE, LATITUDE]''`: Specifies the coordinates for each
    fire point.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`get_radius=15000`: Sets the marker radius to 15,000 meters for better visibility.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`get_color=[255, 0, 0]`: Colors the markers red.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`pickable=True`: Enables interaction, allowing tooltips to display information
    when hovering over a point.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 5\. Setting the Viewport for the Map
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The viewport gives us a window into a map base layer. For our map, we want
    to center it in on Canada so we can view all the fires for a given year:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: The viewport is configured using `pdk.ViewState`, centering the map over Canada
    with a zoom level of 2.6 to display the entire country.
  prefs: []
  type: TYPE_NORMAL
- en: 6\. Creating the Pydeck Deck.gl Map
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Now that we have our fire data layer ready to go and our view set to Canada,
    we can load in the base map:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: '`pdk.Deck` : object is created to render the map.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`layers` : loads the data from our fire data layer'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`map_style` : is set to a satellite view using a Mapbox style. If you want
    to change the type of base map, you can do it here.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`tool_tip`: display the province, date, and size of each fire (when the user
    hovers the mouse over the marker)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: That’s it for the map! Now let’s add in a bar chart to tell a more detailed
    story.
  prefs: []
  type: TYPE_NORMAL
- en: 7\. Generating a Bar Chart for Fire Counts by Province
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'For the bar chart, let’s break down the fire data by province for the current
    year that has been chosen:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: The bar chart is using Plotly to visualize the number of fires by reporting
    agency (province).
  prefs: []
  type: TYPE_NORMAL
- en: The bar chart is configured to display horizontal bars, with the fire count
    on the x-axis and province codes on the y-axis.
  prefs: []
  type: TYPE_NORMAL
- en: The bars are colored red to match the red theme of the map markers. Lastly,
    we add in the code (`st.columns`) to put the map side-by-side with the chart.
    This layout ensures a clean and intuitive user interface.
  prefs: []
  type: TYPE_NORMAL
- en: Perfect!
  prefs: []
  type: TYPE_NORMAL
- en: 8\. Displaying the Total Fire Count
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Lastly, below the map and chart, for some additional context, let’s add in
    the total count of fires for that particular year:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: The fire count is styled in bold red text for emphasis.
  prefs: []
  type: TYPE_NORMAL
- en: 'Our beautiful result:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Intereactive Streamlit map viewed in browser (Screenshot by author)](../Images/f8b7189864a973c0bf97ea8464745cb5.png)'
  prefs: []
  type: TYPE_IMG
- en: Intereactive Streamlit map viewed in browser (Screenshot by author)
  prefs: []
  type: TYPE_NORMAL
- en: Wow! That really does look great. The user can select the year from the dropdown
    menu and the map, bar chart and total values are all updated based on the selected
    year.
  prefs: []
  type: TYPE_NORMAL
- en: Now if we go from year to year and view the charts and numbers, this data set
    shows that 2023 was a truly terrible year for fires in Canada.
  prefs: []
  type: TYPE_NORMAL
- en: 'To verify this observation, we can create a chart from this dataset that calculates
    the total number of fires by year:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Time-series line chart showing total number of fires from 1945–2023 (Screenshot
    by author)](../Images/6ce329aae5d19942b4ad705821428460.png)'
  prefs: []
  type: TYPE_IMG
- en: Time-series line chart showing total number of fires from 1945–2023 (Screenshot
    by author)
  prefs: []
  type: TYPE_NORMAL
- en: This chart shows that 2023 was the worst wildfire year in Canadian history.
  prefs: []
  type: TYPE_NORMAL
- en: The total of 923 fires (larger than 200 hectares) eclipses the old record of
    775, set in 1989.
  prefs: []
  type: TYPE_NORMAL
- en: 'NOTE: The code for this chart is also available on Github ([HERE](https://github.com/loewenj700/streamlit_wildfires))'
  prefs: []
  type: TYPE_NORMAL
- en: And that’s all she wrote!
  prefs: []
  type: TYPE_NORMAL
- en: In Summary…
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Not being a ***Streamlit*** expert prior to this exercise, I found this process
    of creating an interactive Python ***Streamlit*** dashboard much easier than I
    expected.
  prefs: []
  type: TYPE_NORMAL
- en: If you follow a modular approach as laid out in this article, you can apply
    it using ***any*** CSV file that includes GIS data.
  prefs: []
  type: TYPE_NORMAL
- en: It’s worth noting that I was expecting to have to use a JSON or geoJSON file
    to accurately display the points on a map (ie. By country and by province). As
    our dataset contained a "Province" field, this greatly simplified the categorization
    of our data, particularly for the bar chart.
  prefs: []
  type: TYPE_NORMAL
- en: Give this code a try! And please leave a comment – let me know how it goes!
  prefs: []
  type: TYPE_NORMAL
- en: 'GITHUB repository: [HERE](https://github.com/loewenj700/streamlit_wildfires)'
  prefs: []
  type: TYPE_NORMAL
- en: 'NOTE: The fire points dataset used in this article is distributed by the CWFIS
    dataset under the Open Government License Canada. More details can be found [HERE](https://cwfis.cfs.nrcan.gc.ca/datamart/metadata/nfdbpnt).'
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: If this type of story is right up your alley, and you want to support me as
