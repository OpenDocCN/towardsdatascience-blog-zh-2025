  type: TYPE_NORMAL
  zh: 文章的“小份量”格式旨在就单一、小范围的主题提供简洁、集中的见解。我的目标是写一篇文章，让你在工作中的短暂休息时能够获得一些关键收获。阅读这篇文章后，你将理解这些关键点：
