- en: 1\. What is Deep Research from OpenAI and what can you do with it?
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1. OpenAI的深度研究是什么？你可以用它做什么？
- en: If you have an OpenAI Plus account (the $20 per month plan), you have access
    to Deep Research. This gives you access to 10 queries per month. With the Pro
    subscription ($200 per month) you have extended access to Deep Research and access
    to the research preview of GPT-4.5 with 120 queries per month.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你拥有OpenAI Plus账户（每月20美元的计划），你可以访问深度研究。这为你每月提供10个查询。通过Pro订阅（每月200美元），你可以扩展对深度研究的访问，并获得GPT-4.5的研究预览，每月提供120个查询。
- en: '[OpenAI](https://help.openai.com/en/articles/10500283-deep-research-faq) promises
    that we can perform multi-step research using data from the public web.'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: '[OpenAI](https://help.openai.com/en/articles/10500283-deep-research-faq)承诺我们可以使用来自公共网络的数据进行多步骤研究。'
- en: 'Duration: 5 to 30 minutes, depending on complexity.'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 持续时间：5到30分钟，具体取决于复杂程度。
- en: Previously, such research usually took hours.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 以前，此类研究通常需要数小时。
- en: It is intended for complex tasks that require a deep search and thoroughness.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 它旨在处理需要深度搜索和彻底性的复杂任务。
- en: What do concrete use cases look like?
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 具体的用例是什么样的？
- en: 'Conduct a literature review: Conduct a literature review on state-of-the-art
    machine learning and energy consumption.'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 进行文献综述：对最先进的机器学习和能耗进行文献综述。
- en: 'Market analysis: Create a comparative report on the best marketing automation
    platforms for companies in 2025 based on current market trends and evaluations.'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 市场分析：根据当前市场趋势和评估，为2025年的公司创建最佳营销自动化平台的比较报告。
- en: 'Technology & software development: Investigate programming languages and frameworks
    for AI application development with performance and use case analysis'
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 技术与软件开发：调查用于人工智能应用开发的编程语言和框架，并进行性能和用例分析。
- en: 'Investment & financial analysis: Conduct research on the impact of AI-powered
    trading on the financial market based on recent reports and academic studies.'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 投资与财务分析：基于最近的报告和学术研究，对人工智能驱动的交易对金融市场的影响进行研究。
- en: 'Legal research: Conduct an overview of data protection laws in Europe compared
    to the US, including relevant rulings and recent changes.'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 法律研究：对欧洲与美国的数据保护法律进行概述，包括相关裁决和最近的变化。
- en: 2\. How does Deep Research work?
  id: totrans-25
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2. 深度研究是如何工作的？
- en: 'Deep Research uses various deep learning methods to carry out a systematic
    and detailed analysis of information. The entire process can be divided into four
    main phases:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 深度研究使用各种深度学习方法对信息进行系统性和详细的分析。整个过程可以分为四个主要阶段：
- en: 1\. Decomposition and structuring of the research question
  id: totrans-27
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 研究问题的分解和结构化
- en: In the first step the tool processes the research question using natural language
    processing (NLP) methods. It identifies the most important key terms, concepts,
    and sub-questions.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 在第一步，工具使用自然语言处理（NLP）方法处理研究问题。它识别最重要的关键词、概念和子问题。
- en: This step ensures that the AI understands the question not only literally, but
    also in terms of content.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 此步骤确保AI不仅从字面上理解问题，而且从内容上理解。
- en: 2\. Obtaining relevant information
  id: totrans-30
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 获取相关信息
- en: Once the tool has structured the research question, it searches specifically
    for information. Deep Research uses a mixture of internal databases, scientific
    publications, APIs, and web scraping. These can be open-access databases such
    as arXiv, PubMed, or Semantic Scholar, for example, but also public websites or
    news sites such as The Guardian, New York Times, or BBC. In the end, any content
    that can be accessed online and is publicly available.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦工具已经结构化研究问题，它就会专门搜索相关信息。深入研究使用内部数据库、科学出版物、API和网页抓取的混合。这些可以是如arXiv、PubMed或Semantic
    Scholar等开放获取数据库，也可以是如《卫报》、《纽约时报》或BBC等公共网站或新闻网站。最后，任何可以在线访问且公开可用的内容。
- en: 3\. Analysis & interpretation of the data
  id: totrans-32
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. 数据分析与解释
- en: The next step is for the AI model to summarize large amounts of text into compact
    and understandable answers. Transformers & Attention mechanisms ensure that the
    most important information is prioritized. This means that it does not simply
    create a summary of all the content found. Also, the quality and credibility of
    the sources is assessed. And cross-validation methods are normally used to identify
    incorrect or contradictory information. Here, the AI tool compares several sources
    with each other. However, it is not publicly known exactly how this is done in
    Deep Research or what criteria there are for this.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 下一步是让AI模型将大量文本总结成紧凑且易于理解的答案。Transformers和注意力机制确保了最重要的信息被优先考虑。这意味着它不仅仅是对找到的所有内容进行总结。同时，还会评估来源的质量和可信度。通常使用交叉验证方法来识别错误或矛盾的信息。在这里，AI工具会将几个来源相互比较。然而，在Deep
    Research中确切如何进行以及有哪些标准尚不公开。
- en: 4\. Generation of the final report
  id: totrans-34
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4. 生成最终报告
- en: Finally, the final report is generated and displayed to us. This is done using
    Natural Language Generation (NLG) so that we see easily readable texts.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，生成并显示最终报告。这是使用自然语言生成（NLG）完成的，以便我们能够看到易于阅读的文本。
- en: The AI system generates diagrams or tables if requested in the prompt and adapts
    the response to the user’s style. The primary sources used are also listed at
    the end of the report.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 如果在提示中请求，AI系统会生成图表或表格，并将响应适应用户的风格。报告末尾也会列出主要来源。
- en: '3\. How you can use Deep Research: A practical example'
  id: totrans-37
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3. 如何使用Deep Research：一个实际例子
- en: 'In the first step, it is best to use one of the standard models to ask how
    you should optimize the prompt in order to conduct deep research. I have done
    this with the following prompt with ChatGPT 4o:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 在第一步，最好使用其中一个标准模型来询问如何优化提示以进行深入研究。我已经用以下提示与ChatGPT 4o做了这个：
- en: '*“Optimize this prompt to conduct a deep research:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: '*“优化此提示以进行深入研究：'
- en: 'Carrying out a literature search: Carry out a literature search on the state
    of the art on machine learning and energy consumption.”*'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 进行文献检索：对机器学习和能耗的最新研究状态进行文献检索。”*
- en: 'The 4o model suggested the following prompt for the Deep Research function:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 4o模型为Deep Research功能建议了以下提示：
- en: '![Deep Research screenshot (German and English)](../Images/f1d0bf7138de860c458a9513b2ecb3f4.png)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![Deep Research截图（德语和英语）](../Images/f1d0bf7138de860c458a9513b2ecb3f4.png)'
- en: Screenshot taken by the author
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 作者截图
- en: 'The tool then asked me if I could clarify the scope and focus of the literature
    review. I have, therefore, provided some additional specifications:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 工具随后问我是否可以澄清文献综述的范围和重点。因此，我提供了以下一些额外的说明：
- en: '![Deep research screenshot](../Images/5fca7711de1ef88c61c8a80ba1495019.png)'
  id: totrans-45
  prefs: []
  type: TYPE_IMG
  zh: '![Deep research截图](../Images/5fca7711de1ef88c61c8a80ba1495019.png)'
- en: Screenshot taken by the author
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 作者截图
- en: ChatGPT then returned the clarification and started the research.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT随后返回了澄清并开始研究。
- en: In the meantime, I could see the progress and how more sources were gradually
    added.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 同时，我可以看到进度以及更多来源逐渐被添加。
- en: After 6 minutes, the state-of-the-art literature review was complete, and the
    report, including all sources, was available to me.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 经过6分钟后，最新的文献综述已完成，包括所有来源的报告都可供我查阅。
- en: '[Deep Research Example.mp4](https://drive.google.com/file/d/1GHAi1eMxlzW2YDpBqp5szTD78_hMf_jF/view?usp=sharing&source=post_page-----08c5c2395df4---------------------------------------)'
  id: totrans-50
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '[Deep Research Example.mp4](https://drive.google.com/file/d/1GHAi1eMxlzW2YDpBqp5szTD78_hMf_jF/view?usp=sharing&source=post_page-----08c5c2395df4---------------------------------------)'
- en: 4\. Challenges and risks of the Deep Research feature
  id: totrans-51
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4. 深度研究功能的挑战和风险
- en: 'Let’s take a look at two definitions of research:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们来看看研究的两个定义：
- en: “A detailed study of a subject, especially in order to discover new information
    or reach a new understanding.”
  id: totrans-53
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “对某一主题的详细研究，特别是为了发现新信息或达到新的理解。”
- en: ''
  id: totrans-54
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[*Reference: Cambridge Dictionary*](https://dictionary.cambridge.org/de/worterbuch/englisch/research#google_vignette)'
  id: totrans-55
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[*参考：剑桥词典*](https://dictionary.cambridge.org/de/worterbuch/englisch/research#google_vignette)'
- en: “Research is creative and systematic work undertaken to increase the stock of
    knowledge. It involves the collection, organization, and analysis of evidence
    to increase understanding of a topic, characterized by a particular attentiveness
    to controlling sources of bias and error.”
  id: totrans-56
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “研究是一种创造性和系统性的工作，旨在增加知识存量。它涉及收集、组织和分析证据，以增加对某一主题的理解，其特点是对控制偏差和错误的来源具有特别的关注。”
- en: ''
  id: totrans-57
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[*Reference: Wikipedia Research*](https://en.wikipedia.org/wiki/Research)'
  id: totrans-58
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[*参考：维基百科研究*](https://en.wikipedia.org/wiki/Research)'
- en: The two definitions show that research is a detailed, systematic investigation
    of a topic — with the aim of discovering new information or achieving a deeper
    understanding.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 这两个定义表明，研究是对某一主题的详细、系统性的调查——旨在发现新信息或达到更深入的理解。
- en: 'Basically, the deep research function fulfills these definitions to a certain
    extent: it collects existing information, analyzes it, and presents it in a structured
    way.'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 深度研究功能基本上在某种程度上满足了这些定义：它收集现有信息，分析它，并以结构化的方式呈现。
- en: 'However, I think we also need to be aware of some challenges and risks:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我认为我们还需要意识到一些挑战和风险：
- en: '**Danger of superficiality**: Deep Research is primarily designed to efficiently
    search, summarize, and provide existing information in a structured form (at least
    at the current stage). Absolutely great for overview research. But what about
    digging deeper? Real scientific research goes beyond mere reproduction and takes
    a critical look at the sources. Science also thrives on generating new knowledge.'
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**表面性的危险**：深度研究功能主要是为了高效地搜索、总结并以结构化的形式提供现有信息（至少在当前阶段是这样）。这对于概述研究来说绝对很棒。但深入挖掘呢？真正的科学研究不仅超越了简单的复制，而且对来源进行了批判性的审视。科学也依赖于生成新知识。'
- en: '**Reinforcement of existing biases in research & publication**: Papers are
    already more likely to be published if they have significant results. “Non-significant”
    or contradictory results, on the other hand, are less likely to be published.
    This is known to us as [publication bias](https://en.wikipedia.org/wiki/Publication_bias).
    If the AI tool now primarily evaluates frequently cited papers, it reinforces
    this trend. Rare or less widespread but possibly important findings are lost.
    A possible solution here would be to implement a mechanism for weighted source
    evaluation that also takes into account less cited but relevant papers. If the
    AI methods primarily cite sources that are quoted frequently, less widespread
    but important findings may be lost. Presumably, this effect also applies to us
    humans.'
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**研究和出版中现有偏见的强化**：如果论文有显著的结果，它们更有可能被发表。“非显著”或矛盾的结果则不太可能被发表。这被称为[发表偏差](https://en.wikipedia.org/wiki/Publication_bias)。如果AI工具现在主要评估被频繁引用的论文，它就会强化这一趋势。罕见或不太普遍但可能重要的发现就会丢失。可能的解决方案是实施一种加权源评估机制，同时考虑那些被引用较少但相关的论文。如果AI方法主要引用那些被频繁引用的来源，那么不太普遍但重要的发现可能会丢失。大概，这种效应也适用于我们人类。'
- en: '**Quality of research papers**: While it is obvious that a bachelor’s, master’s,
    or doctoral thesis cannot be based solely on AI-generated research, the question
    I have is how universities or scientific institutions deal with this development.
    Students can get a solid research report with just a single prompt. Presumably,
    the solution here must be to adapt assessment criteria to give greater weight
    to in-depth reflection and methodology.'
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**研究论文的质量**：虽然很明显，学士学位、硕士学位或博士学位论文不能仅仅基于AI生成的科研成果，但我所关心的问题是大学或科研机构如何处理这一发展。学生只需一个简单的提示就能获得一份扎实的研究报告。大概，这里的解决方案必须是对评估标准进行调整，以给予深入反思和方法论更大的权重。'
- en: Final thoughts
  id: totrans-65
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最终思考
- en: 'In addition to OpenAI, other companies and platforms have also integrated similar
    functions (even before OpenAI): For example, [Perplexity AI](https://www.perplexity.ai/de/hub/blog/introducing-perplexity-deep-research) has
    introduced a deep research function that independently conducts and analyzes searches.
    Also [Gemini by Google](https://blog.google/products/gemini/google-gemini-deep-research/) has
    integrated such a deep research function.'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 除了 OpenAI，其他公司和平台也集成了类似的功能（甚至在 OpenAI 之前）：例如，[Perplexity AI](https://www.perplexity.ai/de/hub/blog/introducing-perplexity-deep-research)
    引入了一个独立进行和分析搜索的深度研究功能。同样，[Google 的 Gemini](https://blog.google/products/gemini/google-gemini-deep-research/)
    也集成了这样的深度研究功能。
- en: The function gives you an incredibly quick overview of an initial research question.
    It remains to be seen how reliable the results are. Currently (beginning March
    2025), [OpenAI itself writes as limitations](https://openai.com/index/introducing-deep-research/) that
    the feature is still at an early stage, can sometimes hallucinate facts into answers
    or draw false conclusions, and has trouble distinguishing authoritative information
    from rumors. In addition, it is currently unable to accurately convey uncertainties.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 该函数为你提供了一个关于初始研究问题的非常快速的了解。目前（从 2025 年 3 月开始），[OpenAI 本身将其限制性描述为](https://openai.com/index/introducing-deep-research/)该功能仍处于早期阶段，有时会将事实错误地加入答案中或得出错误的结论，并且难以区分权威信息和谣言。此外，它目前无法准确传达不确定性。
- en: But it can be assumed that this function will be expanded further and become
    a powerful tool for research. If you have simpler questions, it is better to use
    the standard GPT-4o model (with or without search), where you get an immediate
    answer.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 但可以假设这个功能将进一步扩展并成为研究的有力工具。如果你有更简单的问题，最好使用标准的 GPT-4o 模型（带或不带搜索），你将立即得到答案。
