- en: 'Deep Research by OpenAI: A Practical Test of AI-Powered Literature Review'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: OpenAI的深度研究：人工智能驱动的文献综述的实际测试
- en: 原文：[https://towardsdatascience.com/deep-research-by-openai-a-practical-test-of-ai-powered-literature-review/](https://towardsdatascience.com/deep-research-by-openai-a-practical-test-of-ai-powered-literature-review/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/deep-research-by-openai-a-practical-test-of-ai-powered-literature-review/](https://towardsdatascience.com/deep-research-by-openai-a-practical-test-of-ai-powered-literature-review/)
- en: “Conduct a comprehensive literature review on the state-of-the-art in Machine
    Learning and energy consumption. […]”
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: “对机器学习和能耗的最新进展进行全面的文献综述。 [...]”
- en: With this prompt, I tested the new Deep Research function, which has been integrated
    into the OpenAI o3 reasoning model since the end of February — and conducted a
    state-of-the-art literature review within 6 minutes.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 使用这个提示，我测试了自2月底以来集成到OpenAI o3推理模型中的新深度研究功能，并在6分钟内完成了一项最先进的文献综述。
- en: 'This function goes beyond a normal web search (for example, with ChatGPT 4o):
    The research query is broken down & structured, the Internet is searched for information,
    which is then evaluated, and finally, a structured, comprehensive report is created.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 此功能超越了正常的网络搜索（例如，使用ChatGPT 4o）：研究查询被分解和结构化，互联网被搜索以获取信息，然后对这些信息进行评估，最后创建一个结构化、全面的报告。
- en: Let’s take a closer look at this.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们更深入地了解一下。
