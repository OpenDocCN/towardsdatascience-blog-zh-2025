- en: Why We Should Focus on AI for Women
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 我们为什么应该关注女性的人工智能
- en: 原文：[https://towardsdatascience.com/why-we-should-focus-on-ai-for-women/](https://towardsdatascience.com/why-we-should-focus-on-ai-for-women/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/why-we-should-focus-on-ai-for-women/](https://towardsdatascience.com/why-we-should-focus-on-ai-for-women/)
- en: <mdspan datatext="el1751395776247" class="mdspan-comment">Introduction</mdspan>
  id: totrans-2
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1751395776247" class="mdspan-comment">引言</mdspan>
- en: The story began with a conversation I had with my girlfriend last Sunday. She,
    interested in medical research, mentioned that women are often underdiagnosed
    for stroke. There are often many false negative cases among women because initial
    stroke research was mainly conducted on male subjects. As a result, the symptoms
    seen in women—often different from those observed in men—could not be recognized
    clinically.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 这个故事始于上周日我与女友的一次对话。她对医学研究感兴趣，提到女性往往在中风诊断中被低估。由于最初的中风研究主要是在男性受试者身上进行的，因此女性中常常存在许多假阴性病例。结果，女性观察到的症状——通常与男性观察到的症状不同——在临床上无法被识别。
- en: A similar issue has been observed in skin cancer diagnosis. Individuals with
    darker skin tones have less of a chance of being correctly diagnosed.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在皮肤癌诊断中也观察到了类似的问题。肤色较深的人被正确诊断的机会更少。
- en: Examples like these show how bias in data collection and research design can
    lead to harmful outcomes. We are living in an era where AI is present in nearly
    every domain — and it’s inevitable that biased data is fed into these systems.
    I’ve even witnessed doctors using chatbot tools as medical assistants while writing
    prescriptions.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 这样的例子表明，数据收集和研究设计中的偏差可能导致有害的结果。我们生活在一个几乎每个领域都存在人工智能的时代——将这些有偏差的数据输入这些系统是不可避免的。我甚至亲眼看到医生在写处方时使用聊天机器人工具作为医疗助手。
- en: From this aspect, before a subject or a topic has been fully studied among different
    groups—such as those based on gender or race—applying its incomplete findings
    to AI systems carries significant risks, both scientifically and ethically. AI
    systems not only tend to inherit existing human cognitive biases, but might also
    unintentionally amplify and entrench these biases within their technical structures.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 从这个角度来看，在将不同群体（如基于性别或种族的群体）对某个主题或课题的研究结果应用到人工智能系统之前，其不完整的研究结果可能带来重大的科学和伦理风险。人工智能系统不仅倾向于继承现有的人类认知偏差，还可能无意中在其技术结构中放大和固化这些偏差。
- en: 'In this post, I will walk through a case study from my personal experience:
    defining the optimal temperature in an office building, considering the different
    thermal comfort levels of men and women.'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇帖子中，我将通过我个人的案例研究来探讨：在考虑男性和女性的不同热舒适度水平的情况下，如何确定办公大楼的最佳温度。
- en: 'Case study: Thermal comfort'
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 案例研究：热舒适度
- en: 'Two years ago, I worked on a project to optimize the energy efficiency in a
    building while maintaining thermal comfort. This raised an essential question:
    What exactly is thermal comfort? In many office buildings or commercial centers,
    the answer is a fixed temperature. However, research has shown that women report
    significantly more dissatisfaction than men under similar thermal conditions (Indraganti
    & Humphreys, 2015). Beyond the serious scientific investigation, I, along with
    other female colleagues, have all reported feeling cold during office hours.'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 两年前，我参与了一个项目，旨在在保持热舒适度的同时优化建筑物的能源效率。这引发了一个基本问题：热舒适度究竟是什么？在许多办公楼或商业中心，答案是固定的温度。然而，研究表明，在相似的热条件下，女性比男性报告的满意度显著更低（Indraganti
    & Humphreys，2015）。除了严肃的科学调查之外，我以及其他女性同事都报告说在办公时间内感到寒冷。
- en: We will now design a simulation experiment to show just how gender inclusivity
    is important in defining thermal comfort, as well as in other real‑world scenarios.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在将设计一个模拟实验，以展示性别包容性在定义热舒适度以及其他现实世界场景中的重要性。
- en: '![](../Images/362a3f35c29b2981f68c052fa92d9bad.png)'
  id: totrans-11
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/362a3f35c29b2981f68c052fa92d9bad.png)'
- en: 'Image by Author: Experimental Flowchart'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 作者提供的图片：实验流程图
- en: Simulation setup
  id: totrans-13
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 模拟设置
- en: We now simulate two populations—male and female—with slightly different thermal
    preferences. This difference may seem of small importance at first glance, but
    we will see it really becomes something in the following chapter, where we introduce
    a reinforcement learning (RL) model to learn the optimal temperature. We see how
    well the agent satisfies the female occupants if the agent is trained only on
    males.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们模拟两个群体——男性和女性——具有略微不同的热偏好。这种差异乍一看可能不太重要，但我们将看到它确实在下一章中变得很重要，在那里我们介绍了一个强化学习（RL）模型来学习最佳温度。我们看到如果智能体仅用男性数据进行训练，它如何满足女性居住者的需求。
- en: 'We begin with defining an idealized thermal comfort model inspired by the Predicted
    Mean Vote (PMV) framework. Each temperature is assigned a comfort score defined
    as max(0, 1 – dist / zone), based on how close its value is to the center of the
    gender-specific comfort range:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 我们首先定义了一个理想化的热舒适度模型，该模型受预测平均投票（PMV）框架的启发。每个温度都分配一个舒适度评分，定义为max(0, 1 – dist /
    zone)，基于其值与性别特定舒适范围中心的接近程度：
- en: 'Males: 21–23°C (centered at 22°C)'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 男性：21–23°C（中心在22°C）
- en: 'Females: 23–25°C (centered at 24°C)'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 女性：23–25°C（中心在24°C）
- en: By definition, the further the temperature moves from the center of this range,
    the more the comfort score decreases.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 根据定义，温度越偏离这个范围的中心，舒适度评分就越低。
- en: 'Next, we simulate a simplified room-like environment where an agent controls
    the temperature. Three possible actions:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们模拟一个简化的房间环境，其中智能体控制温度。三种可能的行为：
- en: Decrease the temperature by 1°C
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 降低温度1°C
- en: Maintain the temperature
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 维持温度
- en: Increase the temperature by 1°C
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提高温度1°C
- en: The environment updates the temperature accordingly and returns a comfort-based
    reward.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 环境相应地更新温度并返回基于舒适度的奖励。
- en: The agent’s goal is to maximize this reward over time, and it learns the optimal
    temperature setting for the occupants. See the code below for the environment
    simulation.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 智能体的目标是最大化这个奖励，并学习为居住者设置最佳温度。请参阅下面的代码以了解环境模拟。
- en: 'RL agent: Q-learning'
  id: totrans-25
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 强化学习智能体：Q学习
- en: We implement a Q-learning method, letting the agent interact with the environment.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 我们实现了一种Q学习方法，让智能体与环境互动。
- en: It learns an optimal policy by updating a Q-table, where the expected comfort
    rewards for each state-action pair are stored. The agent balances exploration—that
    is, trying random actions—and exploitation—that is, choosing the best-known actions—as
    it learns a temperature-controlling strategy by maximizing the reward.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 它通过更新Q表来学习最优策略，其中存储了每个状态-动作对的预期舒适度奖励。智能体在学习温度控制策略时，通过最大化奖励来平衡探索——即尝试随机动作——和利用——即选择已知最佳动作。
- en: '[PRE0]'
  id: totrans-28
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: We updated our Q-table by letting the agent choose either the best-known action
    based on the current environment or a random action. We control the trade-off
    with a small epsilon—here, 0.2—representing the level of uncertainty we want.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 我们通过让智能体选择基于当前环境的最佳已知行为或随机行为来更新我们的Q表。我们通过一个小的epsilon值——这里为0.2——来控制权衡，代表我们想要的的不确定性水平。
- en: Biased training and testing
  id: totrans-30
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 偏差训练和测试
- en: As promised before, we train the agent using only male data.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，我们仅使用男性数据来训练智能体。
- en: We let the agent interact with the environment for 1000 episodes, 20 steps each.
    It gradually learns how to associate desired temperature levels with high comfort
    scores for men.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 我们让智能体与环境互动1000个回合，每个回合20步。它逐渐学会如何将期望的温度水平与男性的高舒适度评分相关联。
- en: '[PRE1]'
  id: totrans-33
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: The code shows a standard training process of Q-learning. Here is a plot of
    the learning curve.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 代码展示了Q学习的标准训练过程。以下是学习曲线的图表。
- en: '![](../Images/1d78438569e207797b79f5beada3cd5f.png)'
  id: totrans-35
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/1d78438569e207797b79f5beada3cd5f.png)'
- en: 'Image by Author: Learning curve'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 作者提供的图片：学习曲线
- en: We can now evaluate how well the male-trained agent performs when placed in
    a female comfort environment. The test is done in the same environmental setting,
    only with a slightly different comfort scoring model reflecting female preferences.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们可以评估当男性训练的智能体被放置在女性舒适环境中时，其表现如何。测试在相同的环境设置中进行，但舒适度评分模型略有不同，反映了女性的偏好。
- en: Result
  id: totrans-38
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 结果
- en: 'The experiment shows the following result:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 实验结果显示以下结果：
- en: The agent has achieved an average comfort reward of 16.08 per episode for male
    comfort. We see that it successfully learned how to maintain temperatures around
    the male-optimal comfort range (21–23 °C).
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 智能体在男性舒适度方面实现了每个回合平均16.08的舒适度奖励。我们看到它成功地学会了如何维持男性最佳舒适度范围（21–23°C）的温度。
- en: The agent’s performance dropped to an average reward of 0.24 per episode on
    female comfort. This shows that the male-trained policy, unfortunately, cannot
    be generalized to female comfort needs.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 在女性舒适度方面，代理的性能下降到每集平均奖励0.24。这表明，不幸的是，男性训练的策略无法推广到女性舒适需求。
- en: '![](../Images/44ca8dcf497f90d575db1b40117cd15c.png)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/44ca8dcf497f90d575db1b40117cd15c.png)'
- en: 'Image by Author: Reward Difference'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供：奖励差异
- en: We can thus say that such a model, trained only on one group, may not perform
    well when applied to another, even when the difference between groups appears
    small.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们可以这样说，仅在一个群体上训练的模型，当应用于另一个群体时，即使群体间的差异看似很小，也可能表现不佳。
- en: Conclusion
  id: totrans-45
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: This is only a small and simple example.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 这只是一个微小且简单的例子。
- en: 'But it might highlight a bigger issue: when AI models are trained on data from
    only one or several groups, they have some risks to fail to meet the needs of
    others—even when differences between groups seem small. You see the above male-trained
    agent fails to satisfy the female comfort, and it proves that bias in training
    data reflects directly on outcomes.'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 但这可能会突出一个更大的问题：当AI模型仅从一组或几组数据中训练时，它们存在无法满足其他群体需求的风险——即使群体间的差异看似很小。您可以看到上述男性训练的代理未能满足女性舒适需求，这证明了训练数据中的偏差直接反映在结果上。
- en: This can go beyond the case of office temperature control. In many domains like
    healthcare, finance, education, etc., if we train models on some non-representative
    data, we can anticipate unfair or harmful results for underrepresented groups.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 这不仅限于办公室温度控制案例。在医疗保健、金融、教育等许多领域，如果我们基于一些非代表性数据进行模型训练，我们可以预见对于代表性不足的群体会有不公平或有害的结果。
- en: For readers, this means questioning how AI systems around us are built and pushing
    for transparency and fairness in their design. It also means recognizing the limitations
    of “one-size-fits-all” solutions and advocating for approaches that consider diverse
    experiences and needs. Only then can AI truly serve everyone equitably.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 对于读者来说，这意味着质疑我们周围的AI系统是如何构建的，并推动其设计和透明度以及公平性。这也意味着认识到“一刀切”解决方案的限制，并倡导考虑多样经验和需求的方法。只有这样，AI才能真正公平地为每个人服务。
- en: However, I always feel that empathy is super difficult in our society. Differences
    in race, gender, wealth, and culture make it very hard for the majority of us
    to stay in others’ shoes. AI, a data-driven system, can not only easily inherit
    existing human cognitive biases but also may embed these biases into its technical
    structures. Groups already less recognized may thus receive even less attention
    or, worse, be further marginalized.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我总是觉得在我们的社会中同情心非常难以实现。种族、性别、财富和文化的差异使得我们中的大多数人很难站在他人的立场上。AI作为一个数据驱动系统，不仅容易继承现有的人类认知偏差，还可能将这些偏差嵌入其技术结构中。因此，那些已经不太被认可的群体可能会得到更少的关注，或者更糟，进一步被边缘化。
