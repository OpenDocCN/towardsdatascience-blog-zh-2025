- en: Artificial Intelligence, Machine Learning, Deep Learning, and Generative AI —
    Clearly Explained
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 人工智能、机器学习、深度学习和生成式人工智能 — 清晰解释
- en: 原文：[https://towardsdatascience.com/artificial-intelligence-machine-learning-deep-learning-and-generative-ai-clearly-explained/](https://towardsdatascience.com/artificial-intelligence-machine-learning-deep-learning-and-generative-ai-clearly-explained/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/artificial-intelligence-machine-learning-deep-learning-and-generative-ai-clearly-explained/](https://towardsdatascience.com/artificial-intelligence-machine-learning-deep-learning-and-generative-ai-clearly-explained/)
- en: <mdspan datatext="el1764880111451" class="mdspan-comment">Artificial Intelligence
    is everywhere</mdspan>. Machine Learning and Deep Learning are mentioned just
    as often.
  id: totrans-2
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1764880111451" class="mdspan-comment">人工智能无处不在</mdspan>。机器学习和深度学习被提及的频率同样高。
- en: ''
  id: totrans-3
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: And now, Generative AI seems to dominate nearly every technology conversation.
  id: totrans-4
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 现在，生成式人工智能似乎几乎主导了每一次技术对话。
- en: ''
  id: totrans-5
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: For many professionals outside the AI field, this vocabulary can be confusing.
    These terms are often used interchangeably, sometimes mixed together, and sometimes
    presented as competing technologies.
  id: totrans-6
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 对于许多非人工智能领域的专业人士来说，这个词汇表可能会令人困惑。这些术语经常被互换使用，有时混合在一起，有时被作为竞争性技术提出。
- en: ''
  id: totrans-7
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'If you have ever asked yourself:'
  id: totrans-8
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果你曾经问过自己：
- en: ''
  id: totrans-9
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: What exactly is AI?
  id: totrans-10
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 什么是人工智能？
- en: How are Machine Learning and Deep Learning connected?
  id: totrans-11
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 机器学习和深度学习是如何相互关联的？
- en: What makes Generative AI different?
  id: totrans-12
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 生成式人工智能有什么不同之处？
- en: ''
  id: totrans-13
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: This article is for you 😉
  id: totrans-14
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这篇文章是为你准备的 😉
- en: ''
  id: totrans-15
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The objective here is **clarity** — not simplification through approximation,
    but accurate explanation in plain language. No technical background is required
    for the rest of the article.
  id: totrans-16
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这里的目标是 **清晰性** — 不是通过近似来简化，而是用普通语言准确解释。本文的其余部分不需要任何技术背景。
- en: ''
  id: totrans-17
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![](../Images/5a42f81ea5c1964cc139df2d33538196.png)'
  id: totrans-18
  prefs:
  - PREF_BQ
  type: TYPE_IMG
  zh: '![](../Images/5a42f81ea5c1964cc139df2d33538196.png)'
- en: ''
  id: totrans-19
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*Figure 1 — AI Ecosystem (created by the author using Excalidraw)*'
  id: totrans-20
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*图 1 — AI 生态系统（由作者使用 Excalidraw 创建）*'
- en: ''
  id: totrans-21
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'The key idea: the Matryoshka doll'
  id: totrans-22
  prefs:
  - PREF_BQ
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关键思想：套娃
- en: ''
  id: totrans-23
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: A useful way to understand the relationship between Artificial Intelligence,
    Machine Learning, Deep Learning, and Generative AI is to imagine **Matryoshka
    dolls**.
  id: totrans-24
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 理解人工智能、机器学习、深度学习和生成式人工智能之间关系的一个有用方法是想象 **套娃**。
- en: ''
  id: totrans-25
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Each concept contains the next one inside it:'
  id: totrans-26
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每个概念都包含下一个概念：
- en: Nothing replaces what came before,
  id: totrans-27
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 没有什么可以取代之前的东西，
- en: Each layer builds upon the previous one.
  id: totrans-28
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每一层都建立在之前的基础上。
- en: ''
  id: totrans-29
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Let’s open them one by one.
  id: totrans-30
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 让我们逐一打开它们。
- en: ''
  id: totrans-31
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-32
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '* * *'
- en: ''
  id: totrans-33
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Artificial Intelligence: the outer shell'
  id: totrans-34
  prefs:
  - PREF_BQ
  - PREF_H2
  type: TYPE_NORMAL
  zh: 人工智能：外壳
- en: ''
  id: totrans-35
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Artificial Intelligence (AI)** is the broadest definition.'
  id: totrans-36
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**人工智能 (AI)** 是最广泛的概念定义。'
- en: 'At its core, AI refers to systems designed to perform tasks that typically
    require human intelligence. In practice, AI includes systems that can:'
  id: totrans-37
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在其核心，AI 指的是设计用来执行通常需要人类智能的任务的系统。在实践中，AI 包括以下系统：
- en: ''
  id: totrans-38
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '1\. Make decisions. Example: A navigation system choosing the fastest route
    based on real-time traffic conditions.'
  id: totrans-39
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 1. 做出决定。例如：一个基于实时交通状况选择最快路线的导航系统。
- en: '2\. Draw conclusions. Example: A system deciding whether to approve or reject
    a loan application based on multiple factors.'
  id: totrans-40
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 2. 得出结论。例如：一个基于多个因素的贷款申请审批或拒绝的系统。
- en: '3\. Recognize patterns. Example: Detecting fraudulent credit card transactions
    by identifying unusual spending behavior.'
  id: totrans-41
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 3. 识别模式。例如：通过识别不寻常的消费行为来检测欺诈信用卡交易。
- en: '4\. Predict outcomes. Example: Estimating future energy consumption or product
    demand.'
  id: totrans-42
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 4. 预测结果。例如：估计未来的能源消耗或产品需求。
- en: ''
  id: totrans-43
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Rule-based AI: intelligence written by humans'
  id: totrans-44
  prefs:
  - PREF_BQ
  - PREF_H2
  type: TYPE_NORMAL
  zh: 基于规则的 AI：由人类编写的人工智能
- en: ''
  id: totrans-45
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: In the early decades of AI, particularly in the 1970s and 1980s, systems were
    primarily **rule-based**. What I mean is that humans explicitly wrote the logic.
    The computer did not learn — it executed predefined instructions.
  id: totrans-46
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在人工智能的早期几十年，尤其是在 20 世纪 70 年代和 80 年代，系统主要是 **基于规则的**。我的意思是，人类明确编写了逻辑。计算机没有学习，它执行预定义的指令。
- en: ''
  id: totrans-47
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '-> A rule looked like this in human natural language: `“If a house has at least
    three bedrooms and is located in a good neighborhood, then its price should be
    around €500,000.”`'
  id: totrans-48
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: -> 在人类自然语言中，规则看起来是这样的：`“如果一个房子至少有三个卧室并且位于好社区，那么它的价格应该在 50 万欧元左右。”`
- en: '-> In programming terms, the logic is similar but written in code with something
    that can looks like this : *`IF bedrooms ≥ 3 AND neighborhood = "good" THEN price
    ≈ 500000`*'
  id: totrans-49
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: -> 在编程术语中，逻辑类似，但用代码编写，看起来可能像这样：*`IF 卧室 ≥ 3 AND 社区 = "好" THEN 价格 ≈ 500000`*
- en: ''
  id: totrans-50
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: This was considered Artificial Intelligence because **human reasoning was encoded
    and executed entirely by a machine**.
  id: totrans-51
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这被认为是人工智能，因为**人类推理被完全编码并由机器执行**。
- en: ''
  id: totrans-52
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Why rule-based AI was limited
  id: totrans-53
  prefs:
  - PREF_BQ
  - PREF_H3
  type: TYPE_NORMAL
  zh: 为什么基于规则的AI有限制
- en: ''
  id: totrans-54
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Rule-based systems work well only in controlled environments.
  id: totrans-55
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 基于规则的系统仅在受控环境中表现良好。
- en: Real-world conditions are not controlled. If we are still with our real estate
    example.
  id: totrans-56
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 实际条件无法控制。如果我们还是以房地产为例。
- en: ''
  id: totrans-57
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: markets evolve,
  id: totrans-58
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 市场演变，
- en: contexts change,
  id: totrans-59
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 环境变化，
- en: exceptions multiply.
  id: totrans-60
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 异常情况增多。
- en: ''
  id: totrans-61
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The system cannot adapt unless a human rewrites the rules.
  id: totrans-62
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 除非人类重写规则，否则系统无法适应。
- en: This limitation led to the next layer.
  id: totrans-63
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这种限制导致了下一层。
- en: ''
  id: totrans-64
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-65
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '* * *'
- en: ''
  id: totrans-66
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Machine Learning: letting data speak'
  id: totrans-67
  prefs:
  - PREF_BQ
  - PREF_H2
  type: TYPE_NORMAL
  zh: 机器学习：让数据说话
- en: ''
  id: totrans-68
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Machine Learning (ML)** is a subset of Artificial Intelligence.'
  id: totrans-69
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**机器学习（ML）**是人工智能的一个子集。'
- en: 'The key shift is simple but profound:'
  id: totrans-70
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 关键的转变简单但深刻：
- en: ''
  id: totrans-71
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Instead of telling the computer what the rules are, we let the system learn
    them directly from examples.
  id: totrans-72
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我们不再告诉计算机规则是什么，而是让系统直接从例子中学习它们。
- en: ''
  id: totrans-73
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '-> Let’s return to the house price example. Instead of writing rules, we collect
    data:'
  id: totrans-74
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: -> 让我们回到房价的例子。我们不是编写规则，而是收集数据：
- en: ''
  id: totrans-75
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: surface area,
  id: totrans-76
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 表面积，
- en: number of rooms,
  id: totrans-77
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 房间数量，
- en: location,
  id: totrans-78
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 位置，
- en: historical sale prices.
  id: totrans-79
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 历史销售价格。
- en: ''
  id: totrans-80
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![](../Images/f8637ef0c89968e9f4657c7531cb6927.png)'
  id: totrans-81
  prefs:
  - PREF_BQ
  type: TYPE_IMG
  zh: '![图片](../Images/f8637ef0c89968e9f4657c7531cb6927.png)'
- en: ''
  id: totrans-82
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*Table 1 — Example of Data (created by the author using *Excalidraw*)*'
  id: totrans-83
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*表1 — 数据示例（由作者使用*Excalidraw*创建）*'
- en: ''
  id: totrans-84
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Thousands, sometimes millions, of past examples.
  id: totrans-85
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 数千甚至数百万个过去的例子。
- en: ''
  id: totrans-86
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: This data is provided as training data to a machine learning model.
  id: totrans-87
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这些数据被提供给机器学习模型作为训练数据。
- en: ''
  id: totrans-88
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![](../Images/64947ff8ecb68f399ba37b941ca089ef.png)'
  id: totrans-89
  prefs:
  - PREF_BQ
  type: TYPE_IMG
  zh: '![图片](../Images/64947ff8ecb68f399ba37b941ca089ef.png)'
- en: ''
  id: totrans-90
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*Figure 2 — Machine Learning Pipeline (created by the author using *Excalidraw*)*'
  id: totrans-91
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*图2 — 机器学习流程（由作者使用*Excalidraw*创建）*'
- en: ''
  id: totrans-92
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: But what does “training a model” using data actually mean?
  id: totrans-93
  prefs:
  - PREF_BQ
  - PREF_H3
  type: TYPE_NORMAL
  zh: 但使用数据“训练模型”实际上意味着什么？
- en: ''
  id: totrans-94
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Training is not a black box. We begin by choosing a **mathematical model** —
    essentially an equation — that could describe the relationship between inputs
    (surface, location, etc.) and output (price).
  id: totrans-95
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 训练不是黑盒子。我们首先选择一个**数学模型**——本质上是一个方程——它可以描述输入（表面积、位置等）与输出（价格）之间的关系。
- en: ''
  id: totrans-96
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: We do not test one equation. We test many (We call them models).
  id: totrans-97
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 我们不是测试一个方程。我们测试许多（我们称之为模型）。
- en: '*A very simplified example might look like:* `price = 2 × surface + 3 × location`'
  id: totrans-98
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*一个非常简化的例子可能看起来像：* `价格 = 2 × 表面积 + 3 × 位置`'
- en: ''
  id: totrans-99
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The model adjusts its parameters by comparing prices with real prices across
    many examples.
  id: totrans-100
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 模型通过比较许多例子中的价格与实际价格来调整其参数。
- en: ''
  id: totrans-101
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: No human could manually analyze hundreds of thousands of houses at once. A machine
    can.
  id: totrans-102
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 没有人能够手动分析数十万套房屋。机器可以。
- en: ''
  id: totrans-103
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: How do we know a model works?
  id: totrans-104
  prefs:
  - PREF_BQ
  - PREF_H3
  type: TYPE_NORMAL
  zh: 我们如何知道模型是有效的？
- en: ''
  id: totrans-105
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Before adopting a model — that is, the equation that best represents the phenomenon
    we are studying — we evaluate it.
  id: totrans-106
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在采用模型之前——即最能代表我们研究现象的方程——我们对其进行评估。
- en: Part of the data is intentionally hidden. This is known as **test data**.
  id: totrans-107
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 部分数据是有意隐藏的。这被称为**测试数据**。
- en: 'The model:'
  id: totrans-108
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 模型：
- en: ''
  id: totrans-109
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Never sees this data during training,
  id: totrans-110
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在训练期间从未见过这些数据，
- en: Must make predictions on it afterward.
  id: totrans-111
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 必须在之后对其做出预测。
- en: Predictions are then compared to reality.
  id: totrans-112
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 然后将预测与现实进行比较。
- en: ''
  id: totrans-113
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![](../Images/06f2c16121ad7eee10dd5c6cbe2d7206.png)'
  id: totrans-114
  prefs:
  - PREF_BQ
  type: TYPE_IMG
  zh: '![图片](../Images/06f2c16121ad7eee10dd5c6cbe2d7206.png)'
- en: ''
  id: totrans-115
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*Figure 3 — Train/Test Data (created by the author using *Excalidraw*)*'
  id: totrans-116
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*图3 — 训练/测试数据（由作者使用*Excalidraw*创建）*'
- en: ''
  id: totrans-117
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: If performance is good on unseen data, the model is useful.
  id: totrans-118
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果在未见过的数据上表现良好，则该模型是有用的。
- en: If not, it is discarded and another model is tried.
  id: totrans-119
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果不是，它就会被丢弃，并尝试另一个模型。
- en: This evaluation step is essential.
  id: totrans-120
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这个评估步骤是至关重要的。
- en: ''
  id: totrans-121
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Machine learning excels at tasks humans struggle with:'
  id: totrans-122
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 机器学习在人类难以应对的任务上表现出色：
- en: ''
  id: totrans-123
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Analyzing large volumes of data,
  id: totrans-124
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分析大量数据，
- en: Detecting subtle patterns,
  id: totrans-125
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 检测微妙的模式，
- en: Generalizing from past examples.
  id: totrans-126
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从过去的例子中进行泛化。
- en: 'Examples of applications:'
  id: totrans-127
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 应用示例：
- en: ''
  id: totrans-128
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Healthcare**'
  id: totrans-129
  prefs:
  - PREF_BQ
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**医疗保健**'
- en: -> disease risk prediction,
  id: totrans-130
  prefs:
  - PREF_BQ
  - PREF_IND
  type: TYPE_NORMAL
  zh: -> 疾病风险预测，
- en: -> analysis of medical images.
  id: totrans-131
  prefs:
  - PREF_BQ
  - PREF_IND
  type: TYPE_NORMAL
  zh: -> 医学图像分析。
- en: '**Industry**'
  id: totrans-132
  prefs:
  - PREF_BQ
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**行业**'
- en: -> predicting equipment failures,
  id: totrans-133
  prefs:
  - PREF_BQ
  - PREF_IND
  type: TYPE_NORMAL
  zh: -> 预测设备故障，
- en: -> optimizing production processes.
  id: totrans-134
  prefs:
  - PREF_BQ
  - PREF_IND
  type: TYPE_NORMAL
  zh: -> 优化生产流程。
- en: '**Consumer products**'
  id: totrans-135
  prefs:
  - PREF_BQ
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**消费品**'
- en: -> recommendation systems,
  id: totrans-136
  prefs:
  - PREF_BQ
  - PREF_IND
  type: TYPE_NORMAL
  zh: -> 推荐系统，
- en: -> fraud detection.
  id: totrans-137
  prefs:
  - PREF_BQ
  - PREF_IND
  type: TYPE_NORMAL
  zh: -> 欺诈检测。
- en: ''
  id: totrans-138
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The limits of traditional machine learning
  id: totrans-139
  prefs:
  - PREF_BQ
  - PREF_H3
  type: TYPE_NORMAL
  zh: 传统机器学习的局限性
- en: ''
  id: totrans-140
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Nevertheless, traditional Machine Learning has important limitations. It works
    very well with **structured data**:'
  id: totrans-141
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 尽管如此，传统的机器学习有重要的局限性。它非常适合**结构化数据**：
- en: ''
  id: totrans-142
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: tables,
  id: totrans-143
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 表格，
- en: numerical values,
  id: totrans-144
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数值，
- en: clearly defined variables.
  id: totrans-145
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 明确定义的变量。
- en: ''
  id: totrans-146
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'However, it struggles with types of data that humans handle naturally, such
    as:'
  id: totrans-147
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 然而，它在处理人类自然处理的数据类型上挣扎，例如：
- en: ''
  id: totrans-148
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: images,
  id: totrans-149
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 图像，
- en: audio,
  id: totrans-150
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 音频，
- en: text.
  id: totrans-151
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 文本。
- en: ''
  id: totrans-152
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The reason for this limitation is fundamental -> *“**computers only understand
    numbers**“*
  id: totrans-153
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这种限制的原因是根本性的 -> *“**计算机只理解数字**”*
- en: ''
  id: totrans-154
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Computers do not understand images, sounds, or words the way humans do.
  id: totrans-155
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 计算机并不像人类那样理解图像、声音或文字。
- en: ''
  id: totrans-156
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: They only understand **numbers**.
  id: totrans-157
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 它们只理解**数字**。
- en: ''
  id: totrans-158
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: When working with images, text, or audio, these data must first be transformed
    into numerical representations.
  id: totrans-159
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 当与图像、文本或音频一起工作时，这些数据必须首先被转换为数值表示。
- en: ''
  id: totrans-160
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: For example, an image is converted into a **matrix of numbers**, where each
    value corresponds to pixel information such as color intensity. Only after this
    conversion can a machine learning model process the data.
  id: totrans-161
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 例如，一个图像被转换为一个**数字矩阵**，其中每个值对应于像素信息，如颜色强度。只有在这个转换之后，机器学习模型才能处理数据。
- en: ''
  id: totrans-162
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: This transformation step is mandatory.
  id: totrans-163
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这个转换步骤是强制性的。
- en: ''
  id: totrans-164
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![](../Images/237f6facc17f63d6c286c84727567c5b.png)'
  id: totrans-165
  prefs:
  - PREF_BQ
  type: TYPE_IMG
  zh: '![](../Images/237f6facc17f63d6c286c84727567c5b.png)'
- en: ''
  id: totrans-166
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*Figure 4 — Converting an Image to Matrices (created by the author using *Excalidraw*)*'
  id: totrans-167
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*图4 — 将图像转换为矩阵（作者使用 *Excalidraw* 创建）*'
- en: ''
  id: totrans-168
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Feature extraction: the traditional approach'
  id: totrans-169
  prefs:
  - PREF_BQ
  - PREF_H3
  type: TYPE_NORMAL
  zh: 特征提取：传统方法
- en: ''
  id: totrans-170
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Before the rise of deep learning, this transformation relied heavily on **manual
    feature engineering**.
  id: totrans-171
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在深度学习兴起之前，这种转换在很大程度上依赖于**手动特征工程**。
- en: ''
  id: totrans-172
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Engineers had to decide in advance which characteristics might be useful:'
  id: totrans-173
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 工程师必须事先决定哪些特征可能是有用的：
- en: ''
  id: totrans-174
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: edges or shapes for images,
  id: totrans-175
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 边缘或形状用于图像，
- en: keywords or word frequencies for text,
  id: totrans-176
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 关键词或词频用于文本，
- en: spectral components for audio.
  id: totrans-177
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 频谱成分用于音频。
- en: ''
  id: totrans-178
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'This process, known as **feature extraction**, was:'
  id: totrans-179
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这个过程，被称为**特征提取**，是：
- en: ''
  id: totrans-180
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: time-consuming,
  id: totrans-181
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 耗时，
- en: fragile,
  id: totrans-182
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 易碎的，
- en: strongly dependent on human intuition.
  id: totrans-183
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 强烈依赖于人类直觉。
- en: ''
  id: totrans-184
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Small changes in the data often required redesigning the features from scratch.
  id: totrans-185
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 数据中的微小变化通常需要从头开始重新设计特征。
- en: ''
  id: totrans-186
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Why deep learning was needed
  id: totrans-187
  prefs:
  - PREF_BQ
  - PREF_H3
  type: TYPE_NORMAL
  zh: 为什么需要深度学习
- en: ''
  id: totrans-188
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The limitations of manual feature extraction in complex settings were a key
    motivation for the development of Deep Learning. (I’m not covering the more technical
    motivations in this article. My goal is to give you a clear understanding of the
    big picture).
  id: totrans-189
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在复杂设置中手动特征提取的限制是深度学习发展的关键动机。（本文不涉及更技术性的动机。我的目标是让你对整体有一个清晰的理解）。
- en: ''
  id: totrans-190
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Deep Learning does not eliminate the need for numerical data.
  id: totrans-191
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 深度学习并没有消除对数值数据的需求。
- en: Instead, it changes **how features are obtained**.
  id: totrans-192
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 相反，它改变了**特征获取的方式**。
- en: ''
  id: totrans-193
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Rather than relying on hand-crafted features designed by humans, deep learning
    models **learn useful representations directly from raw data**.
  id: totrans-194
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 深度学习模型不是依赖于人类设计的特征，而是直接从原始数据中**学习有用的表示**。
- en: ''
  id: totrans-195
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: This marks a structural shift.
  id: totrans-196
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这标志着结构性的转变。
- en: ''
  id: totrans-197
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-198
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '* * *'
- en: ''
  id: totrans-199
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Deep Learning: the structural shift'
  id: totrans-200
  prefs:
  - PREF_BQ
  - PREF_H2
  type: TYPE_NORMAL
  zh: 深度学习：结构性的转变
- en: ''
  id: totrans-201
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Deep Learning still works as Machine Learning. The learning process is the
    same:'
  id: totrans-202
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 深度学习仍然像机器学习一样工作。学习过程是相同的：
- en: -> data,
  id: totrans-203
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: -> 数据，
- en: -> training,
  id: totrans-204
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: -> 训练，
- en: -> evaluation.
  id: totrans-205
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: -> 评估。
- en: ''
  id: totrans-206
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: What changes is what we call the **architecture of the model**.
  id: totrans-207
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 变化的是我们所说的**模型架构**。
- en: Deep learning relies on **neural networks with many layers**.
  id: totrans-208
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 深度学习依赖于**多层神经网络**。
- en: ''
  id: totrans-209
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Layers as progressive representations
  id: totrans-210
  prefs:
  - PREF_BQ
  - PREF_H3
  type: TYPE_NORMAL
  zh: 层作为渐进表示
- en: ''
  id: totrans-211
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![](../Images/a33f2a9794dc74df79d40ada58d77f2b.png)'
  id: totrans-212
  prefs:
  - PREF_BQ
  type: TYPE_IMG
  zh: '![](../Images/a33f2a9794dc74df79d40ada58d77f2b.png)'
- en: ''
  id: totrans-213
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*Figure* 5 *— Deep Learning Pipeline (created by the author using *Excalidraw*)*'
  id: totrans-214
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*图5* — 深度学习流程（作者使用 *Excalidraw* 创建）'
- en: ''
  id: totrans-215
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Each layer in a deep learning model applies a mathematical transformation to
    its input and passes the result to the next layer.
  id: totrans-216
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 深度学习模型中的每一层都对它的输入应用数学变换，并将结果传递给下一层。
- en: ''
  id: totrans-217
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: These layers can be understood as **progressive representations** of the data.
  id: totrans-218
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这些层可以理解为数据的**渐进表示**。
- en: ''
  id: totrans-219
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'In the case of image recognition:'
  id: totrans-220
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在图像识别的情况下：
- en: ''
  id: totrans-221
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Early layers detect simple patterns such as edges and contrasts,
  id: totrans-222
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 早期层检测简单的模式，如边缘和对比度，
- en: intermediate layers combine these patterns into shapes and textures,
  id: totrans-223
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 中间层将这些模式组合成形状和纹理，
- en: later layers capture higher-level concepts such as faces, objects, or animals.
  id: totrans-224
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 后续层捕获更高层次的概念，如面孔、物体或动物。
- en: ''
  id: totrans-225
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The model does not “see” images the way humans do.
  id: totrans-226
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 模型并不“看到”图像的方式与人类相同。
- en: It learns a hierarchy of numerical representations that make accurate predictions
    possible.
  id: totrans-227
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 它学习了一个数值表示的层次结构，这使得准确的预测成为可能。
- en: ''
  id: totrans-228
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Instead of being told explicitly which features to use, the model learns them
    directly from the data.
  id: totrans-229
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-230
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: This ability to **automatically learn representations** is what makes deep learning
    effective for complex, unstructured data (see the representation above).
  id: totrans-231
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-232
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: And once this level of understanding is reached, an important shift becomes
    possible.
  id: totrans-233
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-234
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Up to this point, deep learning models have mainly been used to **analyze existing
    data**.
  id: totrans-235
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-236
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'They are trained to:'
  id: totrans-237
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-238
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: recognize what is present in an image,
  id: totrans-239
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: understand the structure of a text,
  id: totrans-240
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: classify or predict outcomes based on learned patterns.
  id: totrans-241
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: ''
  id: totrans-242
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'In short, they help answer the question: *What is this?*'
  id: totrans-243
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-244
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'But learning rich representations of data naturally raises a new question:'
  id: totrans-245
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-246
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: If a model has learned how data is structured, could it also **produce new data**
    that follows the same structure?
  id: totrans-247
  prefs:
  - PREF_BQ
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-248
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: This question is the foundation of **Generative AI**.
  id: totrans-249
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-250
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-251
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-252
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Generative AI: from analysis to creation'
  id: totrans-253
  prefs:
  - PREF_BQ
  - PREF_H2
  type: TYPE_NORMAL
- en: ''
  id: totrans-254
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![](../Images/6061c9a52d6ad7b2de51d9275e7df674.png)'
  id: totrans-255
  prefs:
  - PREF_BQ
  type: TYPE_IMG
- en: ''
  id: totrans-256
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*Figure* 6 *— GenAI Pipeline (created by the author using Gemini3)*'
  id: totrans-257
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-258
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Generative AI does not replace deep learning. It builds directly on top of it.
  id: totrans-259
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-260
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'The same deep neural networks that learned to recognize patterns can now be
    trained with a different objective: **generation**.'
  id: totrans-261
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-262
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Instead of focusing only on classification or prediction, generative models
    learn how data is *produced*, step by step.
  id: totrans-263
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-264
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: As a result, they are able to create new content that is coherent and realistic.
  id: totrans-265
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-266
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: A concrete example
  id: totrans-267
  prefs:
  - PREF_BQ
  - PREF_H3
  type: TYPE_NORMAL
- en: ''
  id: totrans-268
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Consider the prompt:'
  id: totrans-269
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-270
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: “Describe a luxury apartment in Paris.”
  id: totrans-271
  prefs:
  - PREF_BQ
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-272
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The model does not retrieve an existing description.
  id: totrans-273
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-274
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Instead:'
  id: totrans-275
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-276
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: It starts from the prompt,
  id: totrans-277
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: predicts the most likely next word,
  id: totrans-278
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: then the next one,
  id: totrans-279
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: and continues this process sequentially.
  id: totrans-280
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: ''
  id: totrans-281
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Each prediction depends on:'
  id: totrans-282
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-283
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: What has already been generated,
  id: totrans-284
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: The original prompt,
  id: totrans-285
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: And the patterns learned from large amounts of data.
  id: totrans-286
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: ''
  id: totrans-287
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The final text is new — it has never existed before — yet it feels natural because
    it follows the same structure as similar texts seen during training.
  id: totrans-288
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-289
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The same principle across data types
  id: totrans-290
  prefs:
  - PREF_BQ
  - PREF_H3
  type: TYPE_NORMAL
- en: ''
  id: totrans-291
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'This mechanism is not limited to text. The same generative principle applies
    to:'
  id: totrans-292
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-293
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: images, by generating pixel values,
  id: totrans-294
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: audio, by generating sound signals over time,
  id: totrans-295
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: video, by generating sequences of images,
  id: totrans-296
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: code, by generating syntactically and logically consistent programs.
  id: totrans-297
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: ''
  id: totrans-298
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'This is why these models are often called **foundation models**: a single trained
    model can be adapted to many different tasks.'
  id: totrans-299
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-300
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-301
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-302
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Why Generative AI feels different today
  id: totrans-303
  prefs:
  - PREF_BQ
  - PREF_H2
  type: TYPE_NORMAL
- en: ''
  id: totrans-304
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Artificial Intelligence, Machine Learning, and Deep Learning have existed for
    many years.
  id: totrans-305
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-306
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: What makes Generative AI feel like a turning point is not only improved performance,
    but **how humans interact with AI**.
  id: totrans-307
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-308
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'In the past, working with advanced AI required:'
  id: totrans-309
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-310
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: technical interfaces,
  id: totrans-311
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: programming knowledge,
  id: totrans-312
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: infrastructure and model management.
  id: totrans-313
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: ''
  id: totrans-314
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Today, interaction happens primarily through:'
  id: totrans-315
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-316
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: natural language,
  id: totrans-317
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: simple instructions,
  id: totrans-318
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: conversation.
  id: totrans-319
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: ''
  id: totrans-320
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Users no longer need to specify *how* to do something.
  id: totrans-321
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: They can simply describe *what they want*.
  id: totrans-322
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 它们可以简单地描述**它们想要的**。
- en: ''
  id: totrans-323
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: This shift dramatically reduces the barrier to entry and allows AI to integrate
    directly into everyday workflows across a wide range of professions.
  id: totrans-324
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这种转变极大地降低了进入门槛，并允许AI直接集成到广泛职业的日常工作中。
- en: ''
  id: totrans-325
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-326
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '* * *'
- en: ''
  id: totrans-327
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Putting everything together
  id: totrans-328
  prefs:
  - PREF_BQ
  - PREF_H2
  type: TYPE_NORMAL
  zh: 将一切整合起来
- en: ''
  id: totrans-329
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'These concepts are not competing technologies. They form a coherent progression:'
  id: totrans-330
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这些概念不是相互竞争的技术。它们形成了一个连贯的进步：
- en: ''
  id: totrans-331
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Artificial Intelligence** defines the goal: intelligent systems.'
  id: totrans-332
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**人工智能**定义了目标：智能系统。'
- en: '**Machine Learning** enables systems to learn from data.'
  id: totrans-333
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**机器学习**使系统能够从数据中学习。'
- en: '**Deep Learning** allows learning from complex, unstructured information.'
  id: totrans-334
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**深度学习**允许从复杂、非结构化的信息中学习。'
- en: '**Generative AI** uses this understanding to create new content.'
  id: totrans-335
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**生成式AI**利用这种理解来创建新的内容。'
- en: ''
  id: totrans-336
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Seen this way, Generative AI is not a sudden break from the past.
  id: totrans-337
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 以这种方式看，生成式AI并不是与过去突然断裂。
- en: It is the natural continuation of everything that came before.
  id: totrans-338
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这是之前所有事物的自然延续。
- en: ''
  id: totrans-339
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Once this structure is clear, AI terminology stops being confusing and becomes
    a coherent story.
  id: totrans-340
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 一旦这个结构清晰，AI术语就不再令人困惑，而成为一个连贯的故事。
- en: ''
  id: totrans-341
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: But, Have we finished? Almost.
  id: totrans-342
  prefs:
  - PREF_BQ
  - PREF_H3
  type: TYPE_NORMAL
  zh: 但是，我们已经完成了吗？几乎。
- en: ''
  id: totrans-343
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![](../Images/0c669459595e24eb9c8b2edad140b2ec.png)'
  id: totrans-344
  prefs:
  - PREF_BQ
  type: TYPE_IMG
  zh: '![](../Images/0c669459595e24eb9c8b2edad140b2ec.png)'
- en: ''
  id: totrans-345
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*Figure 6 — The Complete AI Ecosystem in 2025 (created by the author using
    *Excalidraw*)*'
  id: totrans-346
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*图6——2025年的完整AI生态系统（由作者使用*Excalidraw*创建)*'
- en: ''
  id: totrans-347
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'At this point, we’ve covered the **core AI ecosystem**: artificial intelligence,
    machine learning, deep learning, and generative AI — and how they naturally build
    on one another.'
  id: totrans-348
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 到目前为止，我们已经涵盖了**核心AI生态系统**：人工智能、机器学习、深度学习和生成式AI——以及它们如何自然地相互构建。
- en: ''
  id: totrans-349
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: If you are reading this article, there is a good chance you already use tools
    like ChatGPT in your daily life. I won’t go much deeper here — this deserves an
    article of its own.
  id: totrans-350
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果你正在阅读这篇文章，那么你很可能已经在日常生活中使用ChatGPT等工具。这里我不会深入探讨——这值得一篇单独的文章。
- en: ''
  id: totrans-351
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: However, there is one important final idea worth remembering.
  id: totrans-352
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 然而，有一个重要的最终想法值得记住。
- en: ''
  id: totrans-353
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Earlier, we said that **Generative AI is a continuation of Deep Learning**,
    specialized in learning patterns well enough to generate new data that follows
    those same patterns.
  id: totrans-354
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 之前，我们说**生成式AI是深度学习的延续**，专门学习足够好的模式来生成遵循这些模式的新数据。
- en: ''
  id: totrans-355
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: That is true — but when it comes to **language**, the patterns involved are
    far more complex.
  id: totrans-356
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这是真的——但是当涉及到**语言**时，涉及的模式要复杂得多。
- en: ''
  id: totrans-357
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Human language is not just a sequence of words. It is structured by grammar,
    syntax, semantics, context, and long-range dependencies. Capturing these relationships
    required a major evolution in deep learning architectures.
  id: totrans-358
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 人类语言不仅仅是单词的序列。它由语法、句法、语义、上下文和长距离依赖性结构化。捕捉这些关系需要深度学习架构的重大演变。
- en: ''
  id: totrans-359
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-360
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '* * *'
- en: ''
  id: totrans-361
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: From Deep Learning to Large Language Models
  id: totrans-362
  prefs:
  - PREF_BQ
  - PREF_H2
  type: TYPE_NORMAL
  zh: 从深度学习到大型语言模型
- en: ''
  id: totrans-363
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: To handle language at this level of complexity, new deep learning architectures
    emerged. These models are known as **Large Language Models (LLMs)**.
  id: totrans-364
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 为了处理这种复杂程度的语言，出现了新的深度学习架构。这些模型被称为**大型语言模型（LLMs）**。
- en: ''
  id: totrans-365
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Instead of trying to understand the full meaning of a sentence all at once,
    LLMs learn language in a very particular way:'
  id: totrans-366
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: LLMs不是一次性理解整个句子的全部意义，而是以非常特别的方式学习语言：
- en: ''
  id: totrans-367
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: They learn to **predict the next word (or token) given everything that comes
    before it**.
  id: totrans-368
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 它们学会**预测下一个词（或标记）给定之前的一切**。
- en: ''
  id: totrans-369
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'This might sound simple, but when trained on massive amounts of text, this
    objective forces the model to internalize:'
  id: totrans-370
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这可能听起来很简单，但当在大量文本上训练时，这个目标迫使模型内化：
- en: ''
  id: totrans-371
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: grammar rules,
  id: totrans-372
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 语法规则，
- en: sentence structure,
  id: totrans-373
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 句子结构，
- en: writing style,
  id: totrans-374
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 写作风格，
- en: facts,
  id: totrans-375
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 事实，
- en: and even elements of reasoning.
  id: totrans-376
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 以及推理的元素。
- en: ''
  id: totrans-377
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: By repeating this process billions of times, the model learns an implicit representation
    of how language works.
  id: totrans-378
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 通过重复这个过程数十亿次，模型学习了对语言工作方式的隐式表示。
- en: ''
  id: totrans-379
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: From these Large Language Models, conversational systems such as **ChatGPT**
    are built — combining language generation with instruction-following, dialogue,
    and alignment techniques.
  id: totrans-380
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 从这些大型语言模型中，构建了对话系统，如**ChatGPT**，结合语言生成、指令遵循、对话和对齐技术。
- en: ''
  id: totrans-381
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'The illustration above shows this idea visually: generation happens **one word
    at a time**, each step conditioned on what was generated before.'
  id: totrans-382
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 上面的插图直观地展示了这个想法：生成是**一次一个词**，每个步骤都基于之前生成的内容。
- en: ''
  id: totrans-383
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-384
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '* * *'
- en: ''
  id: totrans-385
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The final big picture
  id: totrans-386
  prefs:
  - PREF_BQ
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最终的大图景
- en: ''
  id: totrans-387
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Nothing you see today came out of nowhere.
  id: totrans-388
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 你今天所看到的任何东西都不是凭空出现的。
- en: ''
  id: totrans-389
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'ChatGPT is not a separate technology. It is the visible result of a long progression:'
  id: totrans-390
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: ChatGPT不是一项独立的技术。它是长期发展过程中的一个可见结果：
- en: ''
  id: totrans-391
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Artificial Intelligence set the goal.
  id: totrans-392
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人工智能设定了目标。
- en: Machine Learning made learning from data possible.
  id: totrans-393
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 机器学习使得从数据中学习成为可能。
- en: Deep Learning enabled learning from complex, unstructured data.
  id: totrans-394
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 深度学习使得从复杂、非结构化数据中学习成为可能。
- en: Generative AI made creation possible.
  id: totrans-395
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 生成式人工智能使得创作成为可能。
- en: Large Language Models brought language into this framework.
  id: totrans-396
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 大型语言模型将语言引入了这个框架。
- en: ''
  id: totrans-397
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I hope this article was helpful. And now, you’re no longer lost in tech conversations
    — even at your end-of-year family gatherings 🙂
  id: totrans-398
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '我希望这篇文章对你有所帮助。现在，你在技术对话中不再感到迷茫——即使在年终家庭聚会时也是如此 :) '
- en: ''
  id: totrans-399
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: If you enjoyed this article, feel free to follow me on LinkedIn for more honest
    insights about AI, Data Science, and careers.
  id: totrans-400
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果你喜欢这篇文章，请随意在领英上关注我，获取更多关于人工智能、数据科学和职业的真实见解。
