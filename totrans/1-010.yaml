- en: Artificial Intelligence, Machine Learning, Deep Learning, and Generative AI —
    Clearly Explained
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/artificial-intelligence-machine-learning-deep-learning-and-generative-ai-clearly-explained/](https://towardsdatascience.com/artificial-intelligence-machine-learning-deep-learning-and-generative-ai-clearly-explained/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1764880111451" class="mdspan-comment">Artificial Intelligence
    is everywhere</mdspan>. Machine Learning and Deep Learning are mentioned just
    as often.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: And now, Generative AI seems to dominate nearly every technology conversation.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: For many professionals outside the AI field, this vocabulary can be confusing.
    These terms are often used interchangeably, sometimes mixed together, and sometimes
    presented as competing technologies.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'If you have ever asked yourself:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: What exactly is AI?
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: How are Machine Learning and Deep Learning connected?
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: What makes Generative AI different?
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: This article is for you 😉
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The objective here is **clarity** — not simplification through approximation,
    but accurate explanation in plain language. No technical background is required
    for the rest of the article.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![](../Images/5a42f81ea5c1964cc139df2d33538196.png)'
  prefs:
  - PREF_BQ
  type: TYPE_IMG
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*Figure 1 — AI Ecosystem (created by the author using Excalidraw)*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'The key idea: the Matryoshka doll'
  prefs:
  - PREF_BQ
  - PREF_H2
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: A useful way to understand the relationship between Artificial Intelligence,
    Machine Learning, Deep Learning, and Generative AI is to imagine **Matryoshka
    dolls**.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Each concept contains the next one inside it:'
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: Nothing replaces what came before,
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: Each layer builds upon the previous one.
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Let’s open them one by one.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* * *'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Artificial Intelligence: the outer shell'
  prefs:
  - PREF_BQ
  - PREF_H2
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Artificial Intelligence (AI)** is the broadest definition.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'At its core, AI refers to systems designed to perform tasks that typically
    require human intelligence. In practice, AI includes systems that can:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '1\. Make decisions. Example: A navigation system choosing the fastest route
    based on real-time traffic conditions.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '2\. Draw conclusions. Example: A system deciding whether to approve or reject
    a loan application based on multiple factors.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '3\. Recognize patterns. Example: Detecting fraudulent credit card transactions
    by identifying unusual spending behavior.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '4\. Predict outcomes. Example: Estimating future energy consumption or product
    demand.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Rule-based AI: intelligence written by humans'
  prefs:
  - PREF_BQ
  - PREF_H2
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: In the early decades of AI, particularly in the 1970s and 1980s, systems were
    primarily **rule-based**. What I mean is that humans explicitly wrote the logic.
    The computer did not learn — it executed predefined instructions.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '-> A rule looked like this in human natural language: `“If a house has at least
    three bedrooms and is located in a good neighborhood, then its price should be
    around €500,000.”`'
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: '-> In programming terms, the logic is similar but written in code with something
    that can looks like this : *`IF bedrooms ≥ 3 AND neighborhood = "good" THEN price
    ≈ 500000`*'
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: This was considered Artificial Intelligence because **human reasoning was encoded
    and executed entirely by a machine**.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Why rule-based AI was limited
  prefs:
  - PREF_BQ
  - PREF_H3
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Rule-based systems work well only in controlled environments.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Real-world conditions are not controlled. If we are still with our real estate
    example.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: markets evolve,
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: contexts change,
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: exceptions multiply.
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The system cannot adapt unless a human rewrites the rules.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: This limitation led to the next layer.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* * *'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Machine Learning: letting data speak'
  prefs:
  - PREF_BQ
  - PREF_H2
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Machine Learning (ML)** is a subset of Artificial Intelligence.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'The key shift is simple but profound:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Instead of telling the computer what the rules are, we let the system learn
    them directly from examples.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '-> Let’s return to the house price example. Instead of writing rules, we collect
    data:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: surface area,
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: number of rooms,
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: location,
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: historical sale prices.
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![](../Images/f8637ef0c89968e9f4657c7531cb6927.png)'
  prefs:
  - PREF_BQ
  type: TYPE_IMG
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*Table 1 — Example of Data (created by the author using *Excalidraw*)*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Thousands, sometimes millions, of past examples.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: This data is provided as training data to a machine learning model.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![](../Images/64947ff8ecb68f399ba37b941ca089ef.png)'
  prefs:
  - PREF_BQ
  type: TYPE_IMG
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*Figure 2 — Machine Learning Pipeline (created by the author using *Excalidraw*)*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: But what does “training a model” using data actually mean?
  prefs:
  - PREF_BQ
  - PREF_H3
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Training is not a black box. We begin by choosing a **mathematical model** —
    essentially an equation — that could describe the relationship between inputs
    (surface, location, etc.) and output (price).
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: We do not test one equation. We test many (We call them models).
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*A very simplified example might look like:* `price = 2 × surface + 3 × location`'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The model adjusts its parameters by comparing prices with real prices across
    many examples.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: No human could manually analyze hundreds of thousands of houses at once. A machine
    can.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: How do we know a model works?
  prefs:
  - PREF_BQ
  - PREF_H3
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Before adopting a model — that is, the equation that best represents the phenomenon
    we are studying — we evaluate it.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Part of the data is intentionally hidden. This is known as **test data**.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'The model:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Never sees this data during training,
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: Must make predictions on it afterward.
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: Predictions are then compared to reality.
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![](../Images/06f2c16121ad7eee10dd5c6cbe2d7206.png)'
  prefs:
  - PREF_BQ
  type: TYPE_IMG
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*Figure 3 — Train/Test Data (created by the author using *Excalidraw*)*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: If performance is good on unseen data, the model is useful.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: If not, it is discarded and another model is tried.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: This evaluation step is essential.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Machine learning excels at tasks humans struggle with:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Analyzing large volumes of data,
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: Detecting subtle patterns,
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: Generalizing from past examples.
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Examples of applications:'
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Healthcare**'
  prefs:
  - PREF_BQ
  - PREF_OL
  type: TYPE_NORMAL
- en: -> disease risk prediction,
  prefs:
  - PREF_BQ
  - PREF_IND
  type: TYPE_NORMAL
- en: -> analysis of medical images.
  prefs:
  - PREF_BQ
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Industry**'
  prefs:
  - PREF_BQ
  - PREF_OL
  type: TYPE_NORMAL
- en: -> predicting equipment failures,
  prefs:
  - PREF_BQ
  - PREF_IND
  type: TYPE_NORMAL
- en: -> optimizing production processes.
  prefs:
  - PREF_BQ
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Consumer products**'
  prefs:
  - PREF_BQ
  - PREF_OL
  type: TYPE_NORMAL
- en: -> recommendation systems,
  prefs:
  - PREF_BQ
  - PREF_IND
  type: TYPE_NORMAL
- en: -> fraud detection.
  prefs:
  - PREF_BQ
  - PREF_IND
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The limits of traditional machine learning
  prefs:
  - PREF_BQ
  - PREF_H3
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Nevertheless, traditional Machine Learning has important limitations. It works
    very well with **structured data**:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: tables,
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: numerical values,
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: clearly defined variables.
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'However, it struggles with types of data that humans handle naturally, such
    as:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: images,
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: audio,
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: text.
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The reason for this limitation is fundamental -> *“**computers only understand
    numbers**“*
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Computers do not understand images, sounds, or words the way humans do.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: They only understand **numbers**.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: When working with images, text, or audio, these data must first be transformed
    into numerical representations.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: For example, an image is converted into a **matrix of numbers**, where each
    value corresponds to pixel information such as color intensity. Only after this
    conversion can a machine learning model process the data.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: This transformation step is mandatory.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![](../Images/237f6facc17f63d6c286c84727567c5b.png)'
  prefs:
  - PREF_BQ
  type: TYPE_IMG
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*Figure 4 — Converting an Image to Matrices (created by the author using *Excalidraw*)*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Feature extraction: the traditional approach'
  prefs:
  - PREF_BQ
  - PREF_H3
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Before the rise of deep learning, this transformation relied heavily on **manual
    feature engineering**.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Engineers had to decide in advance which characteristics might be useful:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: edges or shapes for images,
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: keywords or word frequencies for text,
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: spectral components for audio.
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'This process, known as **feature extraction**, was:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: time-consuming,
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: fragile,
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: strongly dependent on human intuition.
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Small changes in the data often required redesigning the features from scratch.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Why deep learning was needed
  prefs:
  - PREF_BQ
  - PREF_H3
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The limitations of manual feature extraction in complex settings were a key
    motivation for the development of Deep Learning. (I’m not covering the more technical
    motivations in this article. My goal is to give you a clear understanding of the
    big picture).
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Deep Learning does not eliminate the need for numerical data.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Instead, it changes **how features are obtained**.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Rather than relying on hand-crafted features designed by humans, deep learning
    models **learn useful representations directly from raw data**.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: This marks a structural shift.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* * *'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Deep Learning: the structural shift'
  prefs:
  - PREF_BQ
  - PREF_H2
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Deep Learning still works as Machine Learning. The learning process is the
    same:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: -> data,
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: -> training,
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: -> evaluation.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: What changes is what we call the **architecture of the model**.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Deep learning relies on **neural networks with many layers**.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Layers as progressive representations
  prefs:
  - PREF_BQ
  - PREF_H3
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![](../Images/a33f2a9794dc74df79d40ada58d77f2b.png)'
  prefs:
  - PREF_BQ
  type: TYPE_IMG
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*Figure* 5 *— Deep Learning Pipeline (created by the author using *Excalidraw*)*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Each layer in a deep learning model applies a mathematical transformation to
    its input and passes the result to the next layer.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: These layers can be understood as **progressive representations** of the data.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'In the case of image recognition:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Early layers detect simple patterns such as edges and contrasts,
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: intermediate layers combine these patterns into shapes and textures,
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: later layers capture higher-level concepts such as faces, objects, or animals.
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The model does not “see” images the way humans do.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: It learns a hierarchy of numerical representations that make accurate predictions
    possible.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Instead of being told explicitly which features to use, the model learns them
    directly from the data.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: This ability to **automatically learn representations** is what makes deep learning
    effective for complex, unstructured data (see the representation above).
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: And once this level of understanding is reached, an important shift becomes
    possible.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Up to this point, deep learning models have mainly been used to **analyze existing
    data**.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'They are trained to:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: recognize what is present in an image,
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: understand the structure of a text,
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: classify or predict outcomes based on learned patterns.
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'In short, they help answer the question: *What is this?*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'But learning rich representations of data naturally raises a new question:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: If a model has learned how data is structured, could it also **produce new data**
    that follows the same structure?
  prefs:
  - PREF_BQ
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: This question is the foundation of **Generative AI**.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* * *'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Generative AI: from analysis to creation'
  prefs:
  - PREF_BQ
  - PREF_H2
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![](../Images/6061c9a52d6ad7b2de51d9275e7df674.png)'
  prefs:
  - PREF_BQ
  type: TYPE_IMG
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*Figure* 6 *— GenAI Pipeline (created by the author using Gemini3)*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Generative AI does not replace deep learning. It builds directly on top of it.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'The same deep neural networks that learned to recognize patterns can now be
    trained with a different objective: **generation**.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Instead of focusing only on classification or prediction, generative models
    learn how data is *produced*, step by step.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: As a result, they are able to create new content that is coherent and realistic.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: A concrete example
  prefs:
  - PREF_BQ
  - PREF_H3
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Consider the prompt:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: “Describe a luxury apartment in Paris.”
  prefs:
  - PREF_BQ
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The model does not retrieve an existing description.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Instead:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: It starts from the prompt,
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: predicts the most likely next word,
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: then the next one,
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: and continues this process sequentially.
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Each prediction depends on:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: What has already been generated,
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: The original prompt,
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: And the patterns learned from large amounts of data.
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The final text is new — it has never existed before — yet it feels natural because
    it follows the same structure as similar texts seen during training.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The same principle across data types
  prefs:
  - PREF_BQ
  - PREF_H3
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'This mechanism is not limited to text. The same generative principle applies
    to:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: images, by generating pixel values,
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: audio, by generating sound signals over time,
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: video, by generating sequences of images,
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: code, by generating syntactically and logically consistent programs.
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'This is why these models are often called **foundation models**: a single trained
    model can be adapted to many different tasks.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* * *'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Why Generative AI feels different today
  prefs:
  - PREF_BQ
  - PREF_H2
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Artificial Intelligence, Machine Learning, and Deep Learning have existed for
    many years.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: What makes Generative AI feel like a turning point is not only improved performance,
    but **how humans interact with AI**.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'In the past, working with advanced AI required:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: technical interfaces,
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: programming knowledge,
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: infrastructure and model management.
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Today, interaction happens primarily through:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: natural language,
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: simple instructions,
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: conversation.
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Users no longer need to specify *how* to do something.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: They can simply describe *what they want*.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: This shift dramatically reduces the barrier to entry and allows AI to integrate
    directly into everyday workflows across a wide range of professions.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* * *'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Putting everything together
  prefs:
  - PREF_BQ
  - PREF_H2
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'These concepts are not competing technologies. They form a coherent progression:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Artificial Intelligence** defines the goal: intelligent systems.'
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Machine Learning** enables systems to learn from data.'
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Deep Learning** allows learning from complex, unstructured information.'
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Generative AI** uses this understanding to create new content.'
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Seen this way, Generative AI is not a sudden break from the past.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: It is the natural continuation of everything that came before.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Once this structure is clear, AI terminology stops being confusing and becomes
    a coherent story.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: But, Have we finished? Almost.
  prefs:
  - PREF_BQ
  - PREF_H3
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![](../Images/0c669459595e24eb9c8b2edad140b2ec.png)'
  prefs:
  - PREF_BQ
  type: TYPE_IMG
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*Figure 6 — The Complete AI Ecosystem in 2025 (created by the author using
    *Excalidraw*)*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'At this point, we’ve covered the **core AI ecosystem**: artificial intelligence,
    machine learning, deep learning, and generative AI — and how they naturally build
    on one another.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: If you are reading this article, there is a good chance you already use tools
    like ChatGPT in your daily life. I won’t go much deeper here — this deserves an
    article of its own.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: However, there is one important final idea worth remembering.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Earlier, we said that **Generative AI is a continuation of Deep Learning**,
    specialized in learning patterns well enough to generate new data that follows
    those same patterns.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: That is true — but when it comes to **language**, the patterns involved are
    far more complex.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Human language is not just a sequence of words. It is structured by grammar,
    syntax, semantics, context, and long-range dependencies. Capturing these relationships
    required a major evolution in deep learning architectures.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* * *'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: From Deep Learning to Large Language Models
  prefs:
  - PREF_BQ
  - PREF_H2
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: To handle language at this level of complexity, new deep learning architectures
    emerged. These models are known as **Large Language Models (LLMs)**.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Instead of trying to understand the full meaning of a sentence all at once,
    LLMs learn language in a very particular way:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: They learn to **predict the next word (or token) given everything that comes
    before it**.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'This might sound simple, but when trained on massive amounts of text, this
    objective forces the model to internalize:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: grammar rules,
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: sentence structure,
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: writing style,
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: facts,
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: and even elements of reasoning.
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: By repeating this process billions of times, the model learns an implicit representation
    of how language works.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: From these Large Language Models, conversational systems such as **ChatGPT**
    are built — combining language generation with instruction-following, dialogue,
    and alignment techniques.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'The illustration above shows this idea visually: generation happens **one word
    at a time**, each step conditioned on what was generated before.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* * *'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The final big picture
  prefs:
  - PREF_BQ
  - PREF_H2
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Nothing you see today came out of nowhere.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'ChatGPT is not a separate technology. It is the visible result of a long progression:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Artificial Intelligence set the goal.
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: Machine Learning made learning from data possible.
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: Deep Learning enabled learning from complex, unstructured data.
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: Generative AI made creation possible.
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: Large Language Models brought language into this framework.
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I hope this article was helpful. And now, you’re no longer lost in tech conversations
    — even at your end-of-year family gatherings 🙂
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: If you enjoyed this article, feel free to follow me on LinkedIn for more honest
    insights about AI, Data Science, and careers.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
