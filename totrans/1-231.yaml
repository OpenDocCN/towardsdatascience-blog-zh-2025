- en: 'Under the Hood: How DAX Works with Filters'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 内部机制：DAX如何与过滤器协同工作
- en: 原文：[https://towardsdatascience.com/under-the-hood-how-dax-works-with-filters/](https://towardsdatascience.com/under-the-hood-how-dax-works-with-filters/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/under-the-hood-how-dax-works-with-filters/](https://towardsdatascience.com/under-the-hood-how-dax-works-with-filters/)
- en: <mdspan datatext="el1759192734018" class="mdspan-comment">Introduction</mdspan>
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1759192734018" class="mdspan-comment">介绍</mdspan>
- en: 'Let’s start with a simple table:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从一张简单的表格开始：
- en: '![](../Images/e2f890567aa074b8fe027f73bce7ae89.png)'
  id: totrans-4
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/e2f890567aa074b8fe027f73bce7ae89.png)'
- en: Figure 1 – The simple table to start with (Figure by the Author)
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 图1 – 从简单的表格开始（图由作者绘制）
- en: Each row in the matrix visual shows the total online sales for each month.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 矩阵视觉中的每一行都显示了每个月的总在线销售额。
- en: So far, so good.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，一切顺利。
- en: The interpretation is that we see the total online sales filtered by month.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 解释是，我们看到按月份过滤的在线销售额总额。
- en: But this isn’t the entire truth.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 但这并不是全部真相。
- en: 'Let’s take a look at the data model:'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看数据模型：
- en: '![](../Images/2ef0c4115645224fb02b9ebd61194b6a.png)'
  id: totrans-11
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/2ef0c4115645224fb02b9ebd61194b6a.png)'
- en: Figure 2 – The part of the data model with the Date table and the fact table
    (Figure by the Author)
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 图2 – 包含日期表和事实表的数据库模型部分（图由作者绘制）
- en: When you look carefully, you see that the relationship is built between the
    two date columns.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 当你仔细观察时，你会发现两个日期列之间建立了关系。
- en: There is no relationship to the month column.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 它与月份列没有关系。
- en: When we take this route, the interpretation above is not entirely accurate.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们采取这条路线时，上述解释并不完全准确。
- en: 'The complete interpretation should be: Each row shows the total of online sales
    filtered by the date table. The rows of the Date table are grouped by the months.
    Each row shows the total sales for all days for each month.'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 完整的解释应该是：每一行显示了通过日期表过滤的在线销售额总额。日期表的行按月份分组。每一行显示了每个月所有天的总销售额。
- en: We are a step closer to understanding DAX in general, and time intelligence
    functions in particular, when we realize this detail.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们意识到这个细节时，我们就更接近于理解DAX的一般原理，特别是时间智能函数。
- en: Let’s go one step further.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们更进一步。
- en: YTD and the Basic query
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: YTD和基本查询
- en: 'Now, let’s add a YTD Measure to examine what happens:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们添加一个YTD度量来检查会发生什么：
- en: '![](../Images/ef401daee616456dc55ea63620b03787.png)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/ef401daee616456dc55ea63620b03787.png)'
- en: Figure 3 – The YTD Measure and the results are in the same table as before (Figure
    by the Author)
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 图3 – YTD度量及其结果与之前相同（图由作者绘制）
- en: The Measure is nothing special, and the results are easy to understand.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 这个度量没有什么特别之处，结果也容易理解。
- en: Now, let’s take a look at what precisely the [DATESYTD()](https://dax.guide/datesytd/)
    function does.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们看看[DATESYTD()](https://dax.guide/datesytd/)函数究竟做了什么。
- en: 'The explanation from [dax.guide](https://dax.guide/) says: “Returns a **set
    of dates** in the year up to the last date visible in the filter context”.'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: '[dax.guide](https://dax.guide/)的解释说：“返回一年中在过滤器上下文中可见的最后一天之前的**日期集”]。'
- en: What does this mean exactly?
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 这究竟意味着什么？
- en: 'To dive into this question, let’s write a DAX query first, to get the list
    of dates in June 2024, as is done in the visualization above:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 要深入了解这个问题，让我们首先编写一个DAX查询，以获取6月2024年的日期列表，如上图所示的可视化中所示：
- en: '[PRE0]'
  id: totrans-28
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'The result is a list of 30 days for June:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 结果是6月的30天列表：
- en: '![](../Images/1f24580d5068c7ab9f3e0c1e32f3ca0c.png)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/1f24580d5068c7ab9f3e0c1e32f3ca0c.png)'
- en: Figure 4 – Basis Query to get all days for June 2024 (Figure by the Author)
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 图4 – 获取2024年6月所有天的基本查询（图由作者绘制）
- en: This is the filter applied to the row for June 2024 in the Matrix shown above.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 这是应用于上述矩阵中6月2024年行的过滤器。
- en: What is the result when we apply the DATESYTD() function to the result?
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们将DATESYTD()函数应用于结果时，会出现什么结果？
- en: 'Here is the query:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是查询：
- en: '[PRE1]'
  id: totrans-35
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'And here, the result:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是结果：
- en: '![](../Images/7c2c298543ea3305361ce48083c8344e.png)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/7c2c298543ea3305361ce48083c8344e.png)'
- en: Figure 5 – List of dates starting on the first of January up to the last day
    of June 2024 (Figure by the Author)
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 图5 – 从2024年1月1日开始到6月最后一天的日期列表（图由作者绘制）
- en: It’s a list of 182 rows, containing all dates starting from the beginning of
    the year up to the last day of June 2024.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个包含182行的列表，包含从年初到2024年6月最后一天的所有日期。
- en: This is the definition of YTD.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是YTD的定义。
- en: 'When we look at the following Measure:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们查看以下度量：
- en: '[PRE2]'
  id: totrans-42
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: We realize that the variable YTDDates is “only” a list of dates applied as a
    filter to the CALCULATE() function.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 我们意识到变量YTDDates“仅仅”是一个日期列表，作为CALCULATE()函数的过滤器应用。
- en: This is the key to all Time intelligence functions.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 这是所有时间智能函数的关键。
- en: Go back one year – some examples
  id: totrans-45
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 回退一年 – 一些例子
- en: What happens when applying another function to the result?
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 应用另一个函数到结果上会发生什么？
- en: For example, [SAMEPERIODLASTYEAR()](https://dax.guide/sameperiodlastyear/)?
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，[SAMEPERIODLASTYEAR()](https://dax.guide/sameperiodlastyear/)？
- en: 'To answer this question, I use the following DAX query:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 为了回答这个问题，我使用了以下DAX查询：
- en: '[PRE3]'
  id: totrans-49
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: I intentionally separated the calling of SAMEPERIODLASTYEAR() from DATESYTD()
    to make it easier to read. It would have been possible to nest DATESYTD() into
    SAMEPERIODLASTYEAR().
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 我故意将SAMEPERIODLASTYEAR()的调用与DATESYTD()分开，以便更容易阅读。本来可以将DATESYTD()嵌套到SAMEPERIODLASTYEAR()中。
- en: This time, we have 181 rows, as 2024 was a leap year.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 这次，我们有181行，因为2024年是闰年。
- en: 'And the dates are shifted back by one year:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 日期被回退了一年：
- en: '![](../Images/14665aab9576eeaa02b0ceefdefb4fcc.png)'
  id: totrans-53
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/14665aab9576eeaa02b0ceefdefb4fcc.png)'
- en: Figure 6 – The result of the query after applying SAMEPERIODLASTYEAR() (Figure
    by the Author)
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 图6 – 应用SAMEPERIODLASTYEAR()后的查询结果（作者制图）
- en: So, again, when we apply a Time Intelligence function to a measure, the function,
    for example, DATESYTD(), returns a list of dates.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，再次强调，当我们将时间智能函数应用于度量值时，该函数，例如DATESYTD()，返回一个日期列表。
- en: 'Please note: When applying the filter, **any** existing filters on the date
    table are removed.'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 请注意：在应用过滤器时，**任何**现有的日期表过滤器都会被移除。
- en: Custom logic
  id: totrans-57
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 自定义逻辑
- en: Now, let’s use this knowledge on custom time intelligence logic.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们将这个知识应用到自定义时间智能逻辑中。
- en: 'First, let’s slightly change the filter for the year and month:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们稍微改变一下年份和月份的过滤器：
- en: '[PRE4]'
  id: totrans-60
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: The result of this query is the same as at the beginning of this article.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 这个查询的结果与本文开头相同。
- en: This time, I set the filter with a numerical value on the [MonthKey] column.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 这次，我在[MonthKey]列上设置了一个数值过滤器。
- en: How can I go back to the previous year?
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 我如何回到上一年？
- en: 'If you think mathematically, it’s just by subtracting 100:'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你从数学的角度思考，它只是减去100：
- en: 202406 – 100 = 202306
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 202406 – 100 = 202306
- en: 'Let’s try it:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们试试：
- en: '![](../Images/000239f4257cd4ac844e1cafe1bfa444.png)'
  id: totrans-67
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/000239f4257cd4ac844e1cafe1bfa444.png)'
- en: Figure 7 – The result of the query after deducting 100 from the [MonthKey] column
    (Figure by the Author)
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 图7 – 从[MonthKey]列减去100后的查询结果（作者制图）
- en: You can also do this with other numeric formats.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 你也可以用其他数字格式来做这件事。
- en: 'When you take a fiscal year, for example, like this: 2425 (For the Fiscal Year
    24/25)'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果你取一个财政年度，比如这样：2425（对于24/25财年）
- en: 'You can deduce 101 to get the previous fiscal year: 2425 – 101 = 2324'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以推断出101来得到上一年度的财政年：2425 – 101 = 2324
- en: 'Another example of a custom time intelligence logic is a running average, where
    for each day, we calculate the average value over the past 10 days:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 自定义时间智能逻辑的另一个例子是滚动平均，其中对于每一天，我们计算过去10天的平均值：
- en: '![](../Images/9581617524a2a5879289fe983c07a078.png)'
  id: totrans-73
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/9581617524a2a5879289fe983c07a078.png)'
- en: Figure 8 – The Code and the results of the Measure for a moving average over
    the previous ten days (Figure by the Author)
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 图8 – 上十天移动平均度量的代码和结果（作者制图）
- en: 'As the content of the variable DateRange is again a list of dates, I can apply
    the SAMEPERIODLASTYEAR() function to it, and get the result I need:'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 因为变量DateRange的内容再次是一个日期列表，我可以将SAMEPERIODLASTYEAR()函数应用到它上面，并得到我需要的结果：
- en: '[PRE5]'
  id: totrans-76
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'And this is the result:'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是结果：
- en: '![](../Images/3b07b9ed45bb5cf132e8f4270fff9713.png)'
  id: totrans-78
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/3b07b9ed45bb5cf132e8f4270fff9713.png)'
- en: Figure 9 – The result for the moving average for the previous year (Figure by
    the Author)
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 图9 – 上一年度移动平均的结果（作者制图）
- en: This logic returns 11 rows, as it includes the last day of the month. Depending
    on the required result, we need to adjust the way we calculate the first and last
    dates of the date list (the filter applied to the measure).
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 这个逻辑返回11行，因为它包括了月份的最后一天。根据所需的结果，我们需要调整计算日期列表（应用于度量值的过滤器）的第一天和最后一天的方式。
- en: Of course, this is a repetition of what I showed above. However, it demonstrates
    that the same approach can be applied to various scenarios.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，这和我上面展示的是重复的。然而，它表明同样的方法可以应用于各种场景。
- en: As soon as you understand this, your work with time intelligence functions and
    other functions that accept tables of values as input will become much easier
    to comprehend and master.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你理解了这个，你与时间智能函数和其他接受值表作为输入的函数的工作将变得更容易理解和掌握。
- en: Conclusion
  id: totrans-83
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: While I used DAX Studio for the queries, you can use the same queries in the
    DAX Query tool within Power BI Desktop.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 当我使用 DAX Studio 进行查询时，你可以在 Power BI Desktop 中的 DAX 查询工具中使用相同的查询。
- en: I intentionally used these queries to demonstrate that we work with tables all
    the time in DAX, even though we may not always be aware of it.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 我故意使用这些查询来演示我们在 DAX 中始终与表一起工作，即使我们可能没有意识到这一点。
- en: But it’s an important detail that helps us on our way to understanding DAX.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 但这是一个重要的细节，有助于我们理解 DAX。
- en: Although some of the DAX code shown here may be obsolete with the advent of
    the new [calendar-based time intelligence](https://powerbi.microsoft.com/en-us/blog/calendar-based-time-intelligence-time-intelligence-tailored-preview/)
    feature in Power BI, the principles explained here remain valid. The functions,
    such as DATESYTD() or SAMEPERIODLASTYEAR(), still exist and work in the same way
    as before. For the time being, nothing will change on this side, as the concepts
    described here are still valid.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管这里展示的一些 DAX 代码可能随着 Power BI 中新[基于日历的时间智能](https://powerbi.microsoft.com/en-us/blog/calendar-based-time-intelligence-time-intelligence-tailored-preview/)功能的推出而变得过时，但这里解释的原则仍然有效。函数，如
    DATESYTD() 或 SAMEPERIODLASTYEAR()，仍然存在并且以与之前相同的方式工作。目前，这一侧不会有任何变化，因为这里描述的概念仍然有效。
- en: References
  id: totrans-88
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 参考文献
- en: Like in my previous articles, I use the Contoso sample dataset. You can download
    the ContosoRetailDW Dataset for free from Microsoft [here](https://www.microsoft.com/en-us/download/details.aspx?id=18279).
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 就像我之前的文章一样，我使用了 Contoso 示例数据集。你可以从微软[这里](https://www.microsoft.com/en-us/download/details.aspx?id=18279)免费下载
    ContosoRetailDW 数据集。
- en: The Contoso Data can be freely used under the MIT License, as described [in
    this document](https://github.com/microsoft/Power-BI-Embedded-Contoso-Sales-Demo).
    I changed the dataset to shift the data to contemporary dates.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 根据该文档中的描述[在此](https://github.com/microsoft/Power-BI-Embedded-Contoso-Sales-Demo)，Contoso
    数据可以在 MIT 许可证下自由使用。我将数据集更改以将数据转移到当代日期。
