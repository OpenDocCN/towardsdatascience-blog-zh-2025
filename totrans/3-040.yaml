- en: Modern GUI Applications for Computer Vision in Python
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: Python中计算机视觉的现代GUI应用程序
- en: 原文：[https://towardsdatascience.com/modern-gui-applications-for-computer-vision-in-python/](https://towardsdatascience.com/modern-gui-applications-for-computer-vision-in-python/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/modern-gui-applications-for-computer-vision-in-python/](https://towardsdatascience.com/modern-gui-applications-for-computer-vision-in-python/)
- en: '![](../Images/9c536bbe50ae3508d1512bdf639ab03f.png)'
  id: totrans-2
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/9c536bbe50ae3508d1512bdf639ab03f.png)'
- en: <mdspan datatext="el1746063411947" class="mdspan-comment">Introduction</mdspan>
  id: totrans-3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1746063411947" class="mdspan-comment">简介</mdspan>
- en: 'I’m a huge fan of interactive visualizations. As a computer vision engineer,
    I deal almost daily with image processing related tasks and more often than not
    I am iterating on a problem where I need **visual feedback** to make decisions.
    Let’s think of a very simple image processing pipeline with a single step that
    has some parameters to transform an image:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我是一个交互式可视化的超级粉丝。作为一名计算机视觉工程师，我几乎每天都要处理与图像处理相关的任务，而且往往是在需要**视觉反馈**来做出决策的问题上进行迭代。让我们考虑一个非常简单的图像处理流程，其中包含一个具有一些参数以转换图像的单个步骤：
- en: '![Sample processing pipeline with missing visualization of output](../Images/a4e3ec0e9d7f97720262c947659f5c30.png)'
  id: totrans-5
  prefs: []
  type: TYPE_IMG
  zh: '![带有缺失输出可视化的示例处理流程](../Images/a4e3ec0e9d7f97720262c947659f5c30.png)'
- en: How do you know which parameters to adjust? Does the pipeline even work as expected?
    Without visualizing your output, you might miss out on some key insights and make
    sub optimal choices.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 您如何知道要调整哪些参数？该流程是否按预期工作？如果没有可视化您的输出，您可能会错过一些关键见解并做出次优选择。
- en: Sometimes simply showing the output image and/or some calculated metrics can
    be enough to iterate on the parameters. But I’ve found myself in many situations
    where a tool would be immensely helpful to iterate quickly and interactively on
    my pipeline. So in this article I will show you how to work with simple built-in
    interactive elements from `OpenCV` as well as how to build more modern user interfaces
    for Computer Vision projects using `customtkinter`.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 有时仅显示输出图像和/或一些计算出的指标就足以对参数进行迭代。但我发现自己处于许多需要快速、交互式迭代我的流程的工具将非常有帮助的情况。因此，在这篇文章中，我将向您展示如何使用`OpenCV`中的简单内置交互元素，以及如何使用`customtkinter`为计算机视觉项目构建更现代的用户界面。
- en: Prerequisites
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 前提条件
- en: 'If you want to follow along, I recommend you to set up your local environment
    with [uv](https://docs.astral.sh/uv/) and install the following packages:'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您想跟上，我建议您使用[uv](https://docs.astral.sh/uv/)设置您的本地环境，并安装以下包：
- en: '[PRE0]'
  id: totrans-10
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Goal
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 目标
- en: 'Before we dive into the code of the project, let’s quickly outline what we
    want to build. The application should use the webcam feed and allow the user to
    select different types of filters that will be applied to the stream. The processed
    image should be shown in real-time in the window. A rough sketch of a potential
    UI would look as follows:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们深入到项目的代码之前，让我们快速概述一下我们想要构建的内容。该应用程序应使用网络摄像头流，并允许用户选择要应用于流的过滤器类型。处理后的图像应在窗口中实时显示。一个潜在UI的粗略草图如下所示：
- en: '![](../Images/d808a2ba08c10cb9bb76f95473e90765.png)'
  id: totrans-13
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/d808a2ba08c10cb9bb76f95473e90765.png)'
- en: OpenCV – GUI
  id: totrans-14
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: OpenCV – GUI
- en: Let’s start with a simple loop that fetches frames from your webcam and displays
    them in an OpenCV window.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从一个非常简单的循环开始，这个循环从您的网络摄像头中获取帧并在OpenCV窗口中显示它们。
- en: '[PRE1]'
  id: totrans-16
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Keyboard Input
  id: totrans-17
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 键盘输入
- en: The simplest way to add interactivity here, is by adding keyboard inputs. For
    example, we can cycle through different filters with the number keys.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里添加交互性的最简单方法是通过添加键盘输入。例如，我们可以使用数字键循环切换不同的过滤器。
- en: '[PRE2]'
  id: totrans-19
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Now you can switch between the normal image and the grayscale version by pressing
    the number keys 1 and 2\. Let’s also quickly add a caption to the image so we
    can actually see the name of the filter we’re applying.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 现在您可以通过按数字键1和2在正常图像和灰度版本之间切换。让我们也快速给图像添加一个标题，这样我们就可以真正看到我们正在应用的过滤器名称。
- en: 'Now we need to be careful here: if you take a look at the shape of the frame
    after the filter, you will notice that the dimensionality of the frame array has
    changed. Remember that OpenCV image arrays are ordered **HWC** (height, width,
    color) with color as **BGR** (green, blue, red), so the 640×480 image from my
    webcam has shape `(480, 640, 3)`.'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们需要小心：如果您查看过滤器后的帧的形状，您会注意到帧数组的维度已经改变。请记住，OpenCV图像数组是按**HWC**（高度、宽度、颜色）顺序排列的，颜色为**BGR**（绿色、蓝色、红色），因此我的网络摄像头的640×480图像的形状为`(480,
    640, 3)`。
- en: '[PRE3]'
  id: totrans-22
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Now because the grayscale operation outputs a single channel image, the color
    dimension is dropped. If we now want to draw on top of this image, we either need
    to specify a single channel color for the grayscale image or we convert that image
    back to the original **BGR** format. The second option is a bit cleaner because
    we can unify the annotation of the image.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 因为灰度操作输出的是单通道图像，所以颜色维度被丢弃了。如果我们现在想在上面绘制图像，我们要么需要为灰度图像指定一个单通道颜色，要么将图像转换回原始**BGR**格式。第二种方法更干净一些，因为我们可以在图像的注释上统一。
- en: '[PRE4]'
  id: totrans-24
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Caption
  id: totrans-25
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 标题
- en: I want to add a black border at the bottom of the image, on top of which the
    name of the filter will be shown. We can make use of the `copyMakeBorder` function
    to pad the image with a border color at the bottom. Then we can add the text on
    top of this border.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 我想在图像底部添加一个黑色边框，在其上方将显示过滤器的名称。我们可以使用`copyMakeBorder`函数在底部用边框颜色填充图像。然后我们可以在这个边框上添加文本。
- en: '[PRE5]'
  id: totrans-27
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: This is how the output should look, and you can switch between the normal and
    grayscale mode and the frames will be captioned accordingly.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是输出应该看起来像的样子，你可以在这两种模式之间切换：正常模式和灰度模式，并且相应的帧将被标注。
- en: '![](../Images/b1950f31fe4058a68c832b758333e4c1.png)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b1950f31fe4058a68c832b758333e4c1.png)'
- en: Sliders
  id: totrans-30
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 滑块
- en: Now instead of using the keyboard as input method, OpenCV offers a basic trackbar
    slider UI element. The trackbar needs to be initialized at the beginning of the
    script. We need to reference the same window as we will be showing our images
    in later, so I will create a variable for the name of the window. Using this name,
    we can create the trackbar and let it be a selector for the index in the list
    of filters.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 现在不再使用键盘作为输入方法，OpenCV提供了一个基本的滑块UI元素。滑块需要在脚本开始时初始化。我们需要引用我们将要显示图像的相同窗口，所以我将创建一个变量来存储窗口名称。使用这个名称，我们可以创建滑块，并让它成为过滤器列表索引的选择器。
- en: '[PRE6]'
  id: totrans-32
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: Notice how we use an empty lambda for the `onChange` callback, we will fetch
    the value manually in the loop. Everything else will stay the same.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 注意我们如何使用一个空的lambda函数作为`onChange`回调，我们将在循环中手动获取值。其他一切都将保持不变。
- en: '[PRE7]'
  id: totrans-34
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: And voilà, we have a trackbar to select our filter.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 哇，我们有一个滑块来选择我们的过滤器。
- en: '![](../Images/3090c2135efed0f43c3b78735ac72e53.png)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/3090c2135efed0f43c3b78735ac72e53.png)'
- en: Now we can also easily add more filters easily by extending our list and implementing
    each processing step.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们可以通过扩展我们的列表并实现每个处理步骤来轻松地添加更多过滤器。
- en: '[PRE8]'
  id: totrans-38
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: '![](../Images/954290716287fddd04047e5f807ed1e1.png)'
  id: totrans-39
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/954290716287fddd04047e5f807ed1e1.png)'
- en: Modern GUI with CustomTkinter
  id: totrans-40
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用CustomTkinter的现代GUI
- en: Now I don’t know about you but the current user interface does not look very
    *modern* to me. Don’t get me wrong, there is some beauty in the style of the interface,
    but I prefer cleaner, more modern designs. Plus we’re already at the limit of
    what **OpenCV** offers out of the box in terms of UI elements. Yep, no buttons,
    text fields, dropdowns, checkboxes or radio buttons and no custom layouts. So
    let’s see how we can transform the look and user experience of this basic application
    to a fresh and clean one.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我不知道你们的情况，但在我看来，当前的用户界面并不非常*现代*。请别误会，界面的风格中确实有一些美感，但我更喜欢更干净、更现代的设计。此外，我们已经在UI元素方面达到了**OpenCV**提供的即用功能的极限。是的，没有按钮、文本字段、下拉菜单、复选框或单选按钮，也没有自定义布局。所以让我们看看我们如何将这个基本应用程序的外观和用户体验转变为一个新鲜且干净的样子。
- en: '![](../Images/70bf0d3fa1b211301c9f6fb90aa4a7d3.png)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/70bf0d3fa1b211301c9f6fb90aa4a7d3.png)'
- en: 'So to get started, we first need to create a class for our app. We create two
    frames: the first one contains our filter selection on the left side and the second
    one wraps the image display. For now, let’s start with a simple placeholder text.
    Unfortunately there’s no out of the box opencv component from customtkinter directly,
    so we will need to quickly build our own in the next few steps. But let’s first
    finish the basic UI layout.'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 要开始，我们首先需要为我们的应用程序创建一个类。我们创建两个框架：第一个框架包含左侧的过滤器选择，第二个框架包裹图像显示。目前，让我们从一个简单的占位文本开始。不幸的是，从customtkinter中并没有现成的opencv组件，所以我们需要在接下来的几个步骤中快速构建自己的组件。但首先，让我们完成基本的UI布局。
- en: '[PRE9]'
  id: totrans-44
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: '![](../Images/4323560b4b47c911c6c1f3828774e463.png)'
  id: totrans-45
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/4323560b4b47c911c6c1f3828774e463.png)'
- en: Filter Radio Buttons
  id: totrans-46
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 过滤器单选按钮
- en: Now that the skeleton is built, we can start filling in our components. For
    the left side, I will be using the same list of `filter_types` to populate a group
    of radio buttons to select the filter.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 现在骨架已经搭建好了，我们可以开始填充我们的组件。对于左侧，我将使用相同的`filter_types`列表来填充一组单选按钮以选择过滤器。
- en: '[PRE10]'
  id: totrans-48
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: '![](../Images/917bf59071404fcac670a9bb3e5a5f9c.png)'
  id: totrans-49
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/917bf59071404fcac670a9bb3e5a5f9c.png)'
- en: Image Display Component
  id: totrans-50
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 图像显示组件
- en: Now we can get started on the interesting part, how to get our OpenCV frames
    to show up in the image component. Because there’s no built-in component, let’s
    create our own based on the `CTKLabel`. This allows us to display a loading text
    while the webcam stream is starting up.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们可以开始有趣的部分了，那就是如何让我们的OpenCV帧在图像组件中显示出来。因为没有内置的组件，让我们基于`CTKLabel`创建自己的组件。这允许我们在摄像头流启动时显示加载文本。
- en: '[PRE11]'
  id: totrans-52
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: So far nothing has changed, we simply swapped out the existing label with our
    custom class implementation. In our `CTKImageDisplay` class we can define an function
    to show an image in the component, let’s call it `set_frame`.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，没有什么变化，我们只是用我们的自定义类实现替换了现有的标签。在我们的`CTKImageDisplay`类中，我们可以定义一个函数来在组件中显示图像，让我们称它为`set_frame`。
- en: '[PRE12]'
  id: totrans-54
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: Let’s digest this. First we need to know how big our image component will be,
    we can extract that information from the shape property of our image array. To
    display the image in `tkinter`, we need a Pillow `Image` type, we cannot directly
    use the OpenCV array. To convert an OpenCV array to Pillow, we first need to convert
    the color space from **BGR** to **RGB** and then we can use the `Image.fromarray`
    function to create the Pillow Image object. Next we can create a CTKImage, where
    we use the same image no matter the theme and set the size according to our frame.
    Finally we can use the configure method to set the image in our frame. At the
    end, we also reset the text variable to remove the *“Loading…”* text, even though
    it would theoretically be hidden behind the image.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们消化一下。首先，我们需要知道我们的图像组件有多大，我们可以从图像数组的形状属性中提取这个信息。要在`tkinter`中显示图像，我们需要一个Pillow
    `Image`类型，我们不能直接使用OpenCV数组。要将OpenCV数组转换为Pillow，我们首先需要将颜色空间从**BGR**转换为**RGB**，然后我们可以使用`Image.fromarray`函数来创建Pillow
    Image对象。接下来，我们可以创建一个CTKImage，无论主题如何，我们都使用相同的图像，并根据我们的框架设置大小。最后，我们可以使用`configure`方法在我们的框架中设置图像。最后，我们还将文本变量重置，以移除*“正在加载…”*文本，即使它理论上会被图像隐藏在后面。
- en: To quickly test this, we can set the first image of our webcam in the constructor.
    (We will see in a second why this is not such a good idea)
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 为了快速测试这个，我们可以在构造函数中设置摄像头的第一张图像。（我们将在下一秒看到为什么这不是一个好主意）
- en: '[PRE13]'
  id: totrans-57
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: If you run this, you will notice that the window takes a bit longer to pop up,
    but after a short delay you should see a static image from your webcam.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您运行这个，您会注意到窗口弹出需要更长一点的时间，但经过短暂的延迟后，您应该能看到来自摄像头的静态图像。
- en: '**NOTE:** If you don’t have a webcam ready you can also just use a local video
    file by passing the file path to the `cv2.VideoCapture` constructor call.'
  id: totrans-59
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**注意：**如果您没有准备好摄像头，您也可以通过将文件路径传递给`cv2.VideoCapture`构造函数调用，使用本地视频文件。'
- en: '![](../Images/2f2dc5c80dcae2f1ffae0909eef02738.png)'
  id: totrans-60
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/2f2dc5c80dcae2f1ffae0909eef02738.png)'
- en: Now this is not very exciting, since the frame doesn’t update yet. So let’s
    see what happens if we try to do this naively.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 现在这并不非常令人兴奋，因为框架还没有更新。所以让我们看看如果我们尝试这样做会发生什么。
- en: '[PRE14]'
  id: totrans-62
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: Almost the same as before, except now we run the frame loop as we did in the
    previous chapter with the OpenCV GUI. If you run this, you will see… exactly nothing.
    The window never shows up, since we’re creating an infinite loop in the constructor
    of the app! This is also the reason why the program only showed up after a delay
    in the previous example, the opening of the Webcam stream is a blocking operation,
    and the event loop for the window cannot run, so it doesn’t show up yet.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 几乎和之前一样，但现在我们运行帧循环，就像我们在上一章的OpenCV GUI中做的那样。如果您运行这个，您将看到……完全什么也没有。窗口从未显示出来，因为我们正在应用程序的构造函数中创建一个无限循环！这也是为什么在先前的例子中程序在延迟后出现的原因，打开Webcam流是一个阻塞操作，窗口的事件循环无法运行，所以它还没有显示出来。
- en: So let’s fix this by adding a slightly better implementation that allows the
    gui event loop to run while we also update the frame every once in a while. We
    can use the `after` method of `tkinter` to schedule a function call while yielding
    the process during the wait time.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，让我们通过添加一个稍微好一点的实现来修复这个问题，这个实现允许在更新帧的同时运行GUI事件循环。我们可以使用`tkinter`的`after`方法在等待时安排函数调用。
- en: '[PRE15]'
  id: totrans-65
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: So now we still set up the webcam stream in the constructor, so we haven’t solved
    that problem yet. But at least we can see a continuous stream of frames in our
    image component.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们仍然在构造函数中设置摄像头流，所以我们还没有解决这个问题。但至少我们可以在图像组件中看到连续的帧流。
- en: '![](../Images/d11e9e8db919e2cbdb1fe916246bb411.png)'
  id: totrans-67
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d11e9e8db919e2cbdb1fe916246bb411.png)'
- en: Applying Filters
  id: totrans-68
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 应用过滤器
- en: Now that the frame loop is running. we can re-implement our filters from the
    beginning and apply them to our webcam stream. In the update_frame function, we
    can check the current filter variable and apply the corresponding filter function.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 现在帧循环正在运行，我们可以从开始重新实现我们的过滤器并将它们应用到我们的网络摄像头流中。在`update_frame`函数中，我们可以检查当前的过滤器变量并应用相应的过滤器函数。
- en: '[PRE16]'
  id: totrans-70
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: And now we’re back to the full functionality of the application, you can select
    any filter on the left side and it will be applied in real-time to the webcam
    feed!
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们回到了应用程序的完整功能，你可以在左侧选择任何过滤器，它将实时应用到网络摄像头流中！
- en: '![](../Images/ad84825fec7e71c34c2a0fe13943dfd1.png)'
  id: totrans-72
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ad84825fec7e71c34c2a0fe13943dfd1.png)'
- en: Multithreading and Synchronization
  id: totrans-73
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 多线程与同步
- en: Now although the application runs as is, there are some problems with the current
    way we run our frame loop. Currently everything runs in a single thread, the main
    GUI thread. This is why in the beginning, we don’t immediately see the window
    pop up, our webcam initialization blocks the main thread. Now imagine, if we did
    some heavier image processing, maybe running the images through neural network,
    you wouldn’t want your user interface to always be blocked while the network is
    running inference. This will lead to a very unresponsive user experience when
    clicking the UI elements!
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然应用程序目前可以正常运行，但我们当前运行帧循环的方式存在一些问题。目前所有操作都在单个线程中运行，即主GUI线程。这就是为什么一开始我们没有立即看到窗口弹出，我们的网络摄像头初始化阻塞了主线程。现在想象一下，如果我们进行了一些更重的图像处理，比如通过神经网络处理图像，你不想在神经网络进行推理时总是阻塞用户界面。这会导致在点击UI元素时用户体验非常不流畅！
- en: '![](../Images/e5463b0e05f5a5ce3152055c59016d23.png)'
  id: totrans-75
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e5463b0e05f5a5ce3152055c59016d23.png)'
- en: A better way to handle this in our application is to *separate the image processing
    from the user interface*. Generally this is almost always a good idea to separate
    your GUI logic from any type of non-trivial processing. So in our case, we will
    run a separate thread that is responsible for the image loop. It will read the
    frames from the webcam stream and apply the filters.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的应用程序中处理这个问题的一个更好的方法是*将图像处理与用户界面分离*。通常，将你的GUI逻辑与任何类型的非平凡处理分离几乎总是一个好主意。因此，在我们的情况下，我们将运行一个单独的线程，该线程负责图像循环。它将从网络摄像头流中读取帧并应用过滤器。
- en: '![](../Images/784eca070b1af15651b36df1ac0b0987.png)'
  id: totrans-77
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/784eca070b1af15651b36df1ac0b0987.png)'
- en: '**NOTE:** Python threads are not *“real”* threads in a sense that they do not
    have the capability to run on different logical cpu cores and hence will not *really*
    run in parallel. In Python multithreading the context will switch between the
    threads, but due to the GIL, the global interpreter lock, a single python process
    can only run one physical thread. If you want *“real”* parallel processing, you
    will need to use **multiprocessing**. Since our process here is not CPU bound
    but actually **I/O bound**, multithreading suffices.'
  id: totrans-78
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**注意：**Python线程在某种意义上并不是“真正的”线程，因为它们没有在不同的逻辑CPU核心上运行的 capability，因此它们不会“真正”并行运行。在Python多线程中，上下文将在线程之间切换，但由于GIL（全局解释器锁），单个Python进程只能运行一个物理线程。如果你想实现“真正的”并行处理，你需要使用**多进程**。由于我们这里的进程不是CPU密集型，而是**I/O密集型**，多线程就足够了。'
- en: '[PRE17]'
  id: totrans-79
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: If you run this, you will now see that our window opens up immediately and we
    even see our loading text while the webcam stream is opening up. However, as soon
    as the stream starts, the frames start to flicker. Depending on a lot of factors,
    you might experience different visual artifacts or errors at this stage.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你运行这个程序，你现在会看到我们的窗口立即打开，甚至在网络摄像头流打开时我们甚至能看到我们的加载文本。然而，一旦流开始，帧开始闪烁。根据许多因素，你可能会在这个阶段体验到不同的视觉伪影或错误。
- en: '<details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>Warning:
    flashing image</summary>![](../Images/3b519f7682d8b1e679059d60e6132de9.png)</details>'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>警告：闪烁图像</summary>![图片](../Images/3b519f7682d8b1e679059d60e6132de9.png)</details>
- en: Now why is this happening? The problem is that we’re simultaneously trying to
    update the new frame while the internal refresh loop of the user interface might
    be using the information of the array to draw it on the screen. They are both
    competing for the same frame array.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 现在为什么会发生这种情况？问题是我们在尝试同时更新新帧时，用户界面的内部刷新循环可能正在使用数组的信息将其绘制到屏幕上。它们都在争夺相同的帧数组。
- en: It is generally not a good idea to directly update the UI elements from a different
    thread, in some frameworks this might even be prevented and will raise exceptions.
    In **Tkinter**, we can do it, but we will get weird results. We need some type
    of ***synchronization*** between our threads. That’s where the `Queue` comes into
    play.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 通常来说，直接从不同的线程更新UI元素不是一个好主意，在某些框架中，这甚至可能被阻止并引发异常。在**Tkinter**中，我们可以这样做，但我们会得到奇怪的结果。我们需要在线程之间进行某种类型的**同步**。这就是`Queue`发挥作用的地方。
- en: '![](../Images/391bc9c0769b8aae0aefc5fe86d09967.png)'
  id: totrans-84
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/391bc9c0769b8aae0aefc5fe86d09967.png)'
- en: 'You’re probably familiar with queues from the grocery store or theme parks.
    The concept of the queue here is very similar: the first element that goes into
    the queue also leaves first (**F**irst **I**n **F**irst **O**ut).'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能熟悉来自杂货店或主题公园的队列。这里的队列概念非常相似：首先进入队列的元素也是第一个离开的（**F**irst **I**n **F**irst
    **O**ut）。
- en: In this case, we actually just want a queue with a single element, a single
    slot queue. The queue implementation in Python is *thread-safe*, meaning we can
    **put** and **get** objects from the queue from different threads. Perfect for
    our use case, the processing thread will put the image arrays to the queue and
    the GUI thread will try to get an element, but not block if the queue is empty.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，我们实际上只需要一个包含单个元素的队列，一个单槽队列。Python中的队列实现是**线程安全的**，这意味着我们可以从不同的线程中向队列中**put**和**get**对象。这对于我们的用例非常完美，处理线程将图像数组放入队列，而GUI线程将尝试获取一个元素，但如果队列为空，则不会阻塞。
- en: '[PRE18]'
  id: totrans-87
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: Notice how we move the direct call to the `set_frame` function from the webcam
    loop which runs in its own thread to the `_update_frame` function that is running
    on the main thread, repeatedly scheduled in **16ms** intervals.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 注意我们是如何将直接调用`set_frame`函数从运行在其自身线程中的摄像头循环移动到在主线程上运行的`_update_frame`函数，该函数以**16ms**的间隔重复调度。
- en: Here it’s important to use the `get_nowait` function in the main thread, otherwise
    if we would use the get function, we would be blocking there. This call does *not
    block*, but raises a `queue.Empty` exception if there’s no element to fetch so
    we have to catch this and ignore it. In the webcam loop, we can use the blocking
    put function because it doesn’t matter that we *block* the `run_webcam_loop`,
    there’s nothing else needing to run there.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，在主线程中使用`get_nowait`函数很重要，否则如果我们使用get函数，我们将会在那里阻塞。这个调用**不会阻塞**，如果没有要获取的元素，则会引发一个`queue.Empty`异常，因此我们必须捕获这个异常并忽略它。在摄像头循环中，我们可以使用阻塞的put函数，因为即使我们**阻塞**了`run_webcam_loop`，那里也没有其他需要运行的事情。
- en: '![](../Images/9c96503f024690c52b4f277448193dc4.png)'
  id: totrans-90
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/9c96503f024690c52b4f277448193dc4.png)'
- en: And now everything is running as expected, no more flashing frames!
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 现在一切运行得都很正常，不再有闪烁的帧了！
- en: Conclusion
  id: totrans-92
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: Combining a UI framework like **Tkinter** with **OpenCV** allows us to build
    modern looking applications with an interactive graphical user interface. Due
    to the UI running in the main thread, we run the image processing in a separate
    thread and synchronize the data between the threads using a single-slot queue.
    You can find a cleaned up version of this demo in the repository below with a
    more modular structure. Let me know if you build something interesting with this
    approach. Take care!
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 将UI框架如**Tkinter**与**OpenCV**结合使用，使我们能够构建具有交互式图形用户界面的现代外观应用程序。由于UI在主线程中运行，我们在单独的线程中运行图像处理，并使用单槽队列在线程之间同步数据。你可以在下面的仓库中找到一个结构更模块化的这个演示的清理版本。如果你用这种方法构建了有趣的东西，请告诉我。请多保重！
