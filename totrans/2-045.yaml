- en: 'Reducing Time to Value for Data Science Projects: Part 4'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 数据科学项目缩短价值实现时间：第4部分
- en: 原文：[https://towardsdatascience.com/reducing-time-to-value-for-data-science-projects-part-4/](https://towardsdatascience.com/reducing-time-to-value-for-data-science-projects-part-4/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://towardsdatascience.com/reducing-time-to-value-for-data-science-projects-part-4/](https://towardsdatascience.com/reducing-time-to-value-for-data-science-projects-part-4/)'
- en: <mdspan datatext="el1755024170002" class="mdspan-comment">The final part in
    this</mdspan> series in reducing the time to value of your projects (see [part
    1](https://towardsdatascience.com/reducing-time-to-value-for-data-science-projects-part-1/),
    [part 2](https://towardsdatascience.com/reducing-time-to-value-for-data-science-projects-part-2/)
    and [part 3](https://towardsdatascience.com/reducing-time-to-value-for-data-science-projects-part-3/))
    takes a less implementation-led approach and instead focusses on the best practises
    of developing code. Instead of detailing what and how to code explicitly, I want
    to talk about how you should approach development of projects in general which
    underpins everything that has been covered previously.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1755024170002" class="mdspan-comment">本系列中关于缩短项目价值实现时间的最后一部分（参见[第1部分](https://towardsdatascience.com/reducing-time-to-value-for-data-science-projects-part-1/)、[第2部分](https://towardsdatascience.com/reducing-time-to-value-for-data-science-projects-part-2/)和[第3部分](https://towardsdatascience.com/reducing-time-to-value-for-data-science-projects-part-3/))采取了一种不那么以实施为导向的方法，而是专注于代码开发的最佳实践。不是详细说明具体要编写什么和如何编写代码，我想谈谈你应该如何一般性地处理项目开发，这为之前所涵盖的所有内容奠定了基础。
- en: Introduction
  id: totrans-3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 引言
- en: Being a data scientist involves bringing together lots of different disciplines
    and applying them to drive value for a business. The most commonly prized skill
    of a data scientist is the technical ability to produce a trained model ready
    to go live. This covers a wide range in required knowledge such as exploratory
    data analysis, feature engineering, data transformations, feature selection, hyperparameter
    tuning, model training and model evaluation. Learning these steps alone are a
    significant undertaking, especially in the constantly evolving world of Large
    Language Models and Generative AI. Data scientists could devote all their learning
    to becoming technical powerhouses, knowing the inner working of the most advanced
    models.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 成为数据科学家意味着将众多不同的学科结合起来，并将它们应用于为企业创造价值。数据科学家最被看重的技能是技术能力，能够生产出可以立即投入使用的训练有素的模型。这涵盖了广泛的知识领域，如探索性数据分析、特征工程、数据转换、特征选择、超参数调整、模型训练和模型评估。仅学习这些步骤本身就是一项重大任务，尤其是在大型语言模型和生成式AI不断发展的世界中。数据科学家可以将所有学习都投入到成为技术高手，了解最先进模型内部运作的过程中。
- en: While being technically proficient is important, there are other skills that
    should be developed if you want be a truly great data scientist. The chief amongst
    these is being a good software developer. Being able to write robust, flexible
    and scalable code is just as important, if not more so, than knowing all the latest
    techniques and models. Lacking these software skills will allow bad practises
    to creep into your work and you will end up with code that may not be suitable
    for production. Embracing software development principles will give a structured
    way of ensuring your code is high quality and will speed up the overall project
    development process.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然技术熟练度很重要，但如果你想要成为一名真正优秀的数据科学家，还需要培养其他技能。其中最重要的技能是成为一名优秀的软件开发者。能够编写健壮、灵活和可扩展的代码与掌握所有最新的技术和模型一样重要，甚至更为重要。缺乏这些软件技能会让不良实践渗透到你的工作中，最终导致代码可能不适合生产环境。拥抱软件开发原则将为你确保代码高质量提供一种结构化的方法，并加快整体项目开发过程。
- en: This article will serve as a brief introduction to topics that multiple books
    have been written about. As such I do not expect this to be a comprehensive breakdown
    of everything software development; instead I want this to merely be a starting
    point in your journey in writing clean code that helps to drive forward value
    for your business.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 本文将作为对多个书籍所讨论主题的简要介绍。因此，我并不期望这篇文章能全面地剖析所有软件开发的内容；相反，我希望这仅仅是你编写清晰代码、帮助推动企业价值之旅的起点。
- en: Set Up Your DevOps Platform Properly
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 正确设置您的DevOps平台
- en: All data scientists are taught to use Git as part of their education to carry
    out tasks such as cloning repositories, creating branches, pulling / pushing changes
    etc. These tend to be backed by platforms such as GitHub or GitLab, and data scientists
    are content to use these purely as a place to store code remotely. However they
    have significantly more to offer as fully fledged DevOps platforms, and using
    them as such will greatly improve your coding experience.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 所有数据科学家都被教导在他们的教育中使用 Git 来执行诸如克隆仓库、创建分支、拉取/推送更改等任务。这些通常由 GitHub 或 GitLab 等平台支持，数据科学家乐于将这些平台纯粹用作远程存储代码的地方。然而，它们作为完整的
    DevOps 平台提供了更多功能，并且以这种方式使用将极大地改善您的编码体验。
- en: Assigning Roles To Team Members In Your Repository
  id: totrans-9
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在您的仓库中为团队成员分配角色
- en: 'Many people will want or need to access your project repository for different
    purposes. As a matter of security, it is good practice to limit how each person
    can interact with it. The roles that people can take typically fall into categories
    such as:'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 许多人可能出于不同目的想要或需要访问你的项目仓库。出于安全考虑，限制每个人如何与之交互是一种良好的做法。人们可以承担的角色通常分为以下几类：
- en: 'Analyst: Only needs to be able to read the repository'
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分析师：只需要能够读取仓库
- en: 'Developer: Needs to be able to read and write to the repository'
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 开发者：需要能够读取和写入仓库
- en: 'Maintainer: Needs to be able to edit repository settings'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 维护者：需要能够编辑仓库设置
- en: For data scientists, you should have more senior members of staff on the project
    be maintainers and junior members be developers. This becomes important when deciding
    who can merge changes into production.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 对于数据科学家来说，你应该让项目中的高级员工担任维护者，而初级员工担任开发者。这在决定谁可以将更改合并到生产中时变得很重要。
- en: Managing Branches
  id: totrans-15
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 管理分支
- en: 'When developing a project with Git, you will make extensive use of branches
    that add features / develop functionality. Branches can split into different categories
    such as:'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 当使用 Git 开发项目时，你将广泛使用分支来添加功能/开发功能。分支可以分为不同的类别，例如：
- en: 'main/master: Used for official production releases'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: main/master：用于官方生产发布
- en: 'development: Used to bring together features and functionality'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 开发：用于汇集功能和功能
- en: 'features: What to use when doing code development work'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 功能：在进行代码开发工作时应该使用什么
- en: 'bugfixes: Used for minor fixes'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 修复错误：用于小修复
- en: '![](../Images/407397a77874f36051a45a95ed488368.png)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/407397a77874f36051a45a95ed488368.png)'
- en: Proper management of branching structure simplifies the development process.
    Image by author
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 正确管理分支结构可以简化开发过程。图片由作者提供
- en: 'The main and development branches are special as they are permanent and represent
    the work that is closest to production. As such special care must be taken with
    these, namely:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 主分支和开发分支是特殊的，因为它们是永久的，代表着最接近生产的作业。因此，对这些分支必须特别小心，具体来说：
- en: Ensure they cannot be deleted
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确保它们不能被删除
- en: Ensure they cannot be pushed to directly
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确保它们不能直接被推送
- en: They can only be updated via merge requests
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它们只能通过合并请求进行更新
- en: Limit who can merge changes into them
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 限制谁可以将更改合并到其中
- en: We can and should protect these branches to enforce the above. This is normally
    the job of project maintainers.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以也应该保护这些分支来强制执行上述规则。这通常是项目维护者的工作。
- en: 'When deciding merge strategies for adding to development / main we need to
    consider:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 当决定将功能添加到开发/主分支的合并策略时，我们需要考虑：
- en: Who is allowed to trigger and approve these merges (specific roles / people?)
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 谁有权限触发和批准这些合并（特定角色/人员）？
- en: How many approvals are required before a merge is accepted?
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在合并被接受之前需要多少个批准？
- en: What checks does a branch need to pass to be accepted?
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分支需要通过哪些检查才能被接受？
- en: In general we may have less strict controls for updating development vs updating
    main but it is important to have a consistent strategy in place.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，我们对更新开发分支和更新主分支的控制可能不那么严格，但重要的是要有一个一致的策略。
- en: 'When dealing with feature branches you need to consider:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 当处理功能分支时，你需要考虑：
- en: What will the branch be called?
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这个分支将被称为什么？
- en: What is the structure to the commit messages?
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提交信息应该遵循什么样的结构？
- en: What is important is to agree as a team the guidelines for naming branches.
    Some examples could be to name them after a ticket, to have a common list of prefixes
    to start a branch with or to add a suffix at the end to easily identify the owner.
    For the commit messages, you may want to use a 3^(rd) party library such as Commitizen
    to enforce standardisation across the team.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 重要的是，作为团队达成一致，制定分支命名的指南。一些例子可以是根据工单命名，有一个共同的列表作为分支的前缀，或者添加一个后缀以方便识别所有者。对于提交信息，你可能希望使用第三方库如
    Commitizen 来在整个团队中强制标准化。
- en: Maintain a Consistent Development Environment
  id: totrans-38
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 维护一致的开发环境
- en: 'Taking a step back, developing code will require you to:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 退一步，编写代码将需要你：
- en: Have access to the programming languages software developer kit
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 有权访问软件开发工具包中的编程语言
- en: Install 3^(rd) party libraries to develop your solution
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 安装第三方库以开发你的解决方案
- en: 'Even at this point care must be taken. It is all too common to run into the
    scenario where solutions that work locally fail when another team member tries
    to run them. This is caused by inconsistent development environments where:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 即使到了这个阶段，也必须小心。遇到解决方案在本地运行正常，而其他团队成员尝试运行时却失败的情况非常普遍。这是由于不一致的开发环境造成的：
- en: Different version of the programming language are installed
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 安装了不同版本的编程语言
- en: Different versions of the 3^(rd) party library are installed
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 安装了第三方库的不同版本
- en: 'Ensuring that everyone is developing within the same environment that replicates
    the production conditions will ensure we have no compatibility issues between
    developers, the solution will work in production and will eliminate the need for
    ad-hoc installation of libraries. Some recommendations are:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 确保每个人都在与生产条件相同的环境中开发，这将确保我们之间没有兼容性问题，解决方案将在生产中工作，并消除对库的临时安装的需求。以下是一些建议：
- en: Use a requirements.txt / pyproject.toml at a minimum. No pip installing libraries
    on the fly!
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 至少使用 requirements.txt / pyproject.toml。不要在运行时即时安装库！
- en: Look into using docker / containerisation to have fully shippable environments
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 考虑使用 docker / 容器化以拥有完全可交付的环境
- en: '![](../Images/1c0a050997b2afdf44bdc9c6a34d7a13.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/1c0a050997b2afdf44bdc9c6a34d7a13.png)'
- en: Consistent environments and libraries ensures reproducibility and reduces friction.
    Image by author
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 一致的环境和库确保可重复性和减少摩擦。图片由作者提供
- en: Without these standardisations in place there is no guarantee that your solution
    will work when deployed into production
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 如果没有这些标准化措施，就无法保证你的解决方案在生产部署时能够正常工作
- en: Readme.md
  id: totrans-51
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Readme.md
- en: 'Readme’s are the first thing that are seen when you open a project on your
    DevOps platform. It gives you an opportunity to provide a high level summary of
    your project and informs your audience how to interact with it. Some important
    sections to put in a readme are:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 当你在DevOps平台上打开一个项目时，首先看到的是 Readme。它为你提供了一个机会，提供项目的高级概述，并告知你的受众如何与之互动。在 Readme
    中应包含的一些重要部分有：
- en: Project title, description and setup to get people onboarded
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 项目标题、描述和设置，以便让人们加入
- en: How to run / use so people can use any core functionality and interpret the
    results
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何运行/使用，以便人们可以使用任何核心功能并解释结果
- en: Contributors / point of contact for people to follow up with
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 贡献者/联系人信息，以便人们跟进
- en: '![](../Images/79cbf68917ae260f830392de9feec17d.png)'
  id: totrans-56
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/79cbf68917ae260f830392de9feec17d.png)'
- en: A one-stop shop to getting users onboarded onto your project. Image by author
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 一个一站式商店，让用户加入你的项目。图片由作者提供
- en: A readme doesn’t need to be extensive documentation of everything relevant to
    a project, merely a quick start guide. More detailed background, experimental
    results etc can be hosted somewhere else, such as an internal Wiki like Confluence.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: Readme 不需要是关于项目所有相关内容的详尽文档，而只是一个快速入门指南。更详细的历史背景、实验结果等可以放在其他地方，例如内部 Wiki 如 Confluence。
- en: Test, Test And Test Some More!
  id: totrans-59
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 测试，测试，再测试！
- en: 'Anyone can write code but not everyone can write correct and maintainable code.
    Ensuring that your code is bug free is critical and every precaution should be
    taken to mitigate this risk. The simplest way to do this is to write tests for
    whatever code you develop. There are different varieties of tests you can write,
    such as:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 任何人都可以编写代码，但不是每个人都能编写正确且可维护的代码。确保你的代码没有错误是至关重要的，并且应该采取一切预防措施来减轻这种风险。最简单的方法是为你开发的任何代码编写测试。你可以编写不同类型的测试，例如：
- en: 'Unit tests: Test individual components'
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 单元测试：测试单个组件
- en: 'Integration tests: Test how the individual components work together'
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Regression tests: Test that any new changes haven’t broken existing functionality'
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Writing a good unit test is reliant on a well written function. Functions should
    try to adhere to principles such as Do One Thing (DOT) or Don’t Repeat Yourself
    (DRY) to ensure that you can write clear tests. In general you should test to:'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
- en: Show the function working
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Show the function failing
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Trigger any exceptions raised within the function
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Another important aspect to consider is how much of your code is tested aka
    the test coverage. While achieving 100% coverage is the idealised scenario, in
    practise you may have to settle for less which is okay. This is common when you
    are coming into an existing project where standards haven’t been properly maintained.
    The important thing is to start with a coverage baseline and then try and increase
    that over time as your solution matures. This will involve some technical debt
    work to get the tests written.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  id: totrans-69
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: This example pytest invocation both runs the tests and checks that a minimum
    level of coverage has been attained.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
- en: Code Reviews
  id: totrans-71
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The single most important part of writing code is having it reviewed and approved
    by another developer. Having code looked at ensures:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
- en: The code produced answers the original question
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The code meets the required standards
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The code uses an appropriate implementation
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Code reviewing data science projects may involve extra steps due to its experimental
    nature. While this is far for an exhaustive list, some general checks are:'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
- en: Does the code run?
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Is it tested sufficiently?
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Are appropriate programming paradigms and data structures used?
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Is the code readable?
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Is it code maintainable and extensible?
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE1]'
  id: totrans-82
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'The above code snippets highlights a variety of bad habits such as using lists
    instead of dictionary and no typehints or docstrings. From a data science perspective
    you will additionally want to check:'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
- en: Are notebooks used sparingly and commented appropriately?
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Has the analysis been communicated sufficiently (e.g. graphs labelled, dataframes
    described etc.)
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Has care been taken when producing models (no data leakage, only using features
    available at inference etc.)
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Are any artefacts produced and are they stored appropriately?
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Are experiments carried out to a high standard, e.g. set out with a research
    question, tracked and documented?
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Are there clear next steps from this work?
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'There will come a time where you move off the project onto other things, and
    someone else will take over. When writing code you should always ask yourself:'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
- en: How easy would it be for someone to understand what I have written and be comfortable
    with maintaining or extending functionality?
  id: totrans-91
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Use CICD To Automate The Mundane
  id: totrans-92
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'As projects grow in size, both in people and code, having checks and standards
    becomes more and more important. This is typically done through code reviews and
    can involve tasks like checking:'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
- en: Implementation
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Testing
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Test Coverage
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Code Style Standardization
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'We additionally want to check security concerns such as exposed API keys /
    credentials or code that is vulnerable to malicious attack. Having to manually
    check all of these for each code review can quickly become time consuming and
    could also lead to checks being overlooked. A lot of these checks can be covered
    by 3^(rd) party libraries such as:'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还希望检查安全相关的问题，例如暴露的API密钥/凭证或容易受到恶意攻击的代码。对于每次代码审查都需要手动检查所有这些内容，这很快就会变得耗时，也可能导致检查被忽视。许多这些检查可以通过第三方库来覆盖，例如：
- en: Black, Flake8 and isort
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Black, Flake8 和 isort
- en: Pytest
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Pytest
- en: While this alleviates some of the reviewers work, there is still the problem
    of having to run these libraries yourself. What would be better is the ability
    to automate these checks and others so that you no longer have to. This can allow
    code reviews to be more focussed on the solution and implementation. This is exactly
    where Continuous Integration / Continuous Deployment (CICD) comes to the rescue.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然这减轻了一些审查者的工作负担，但仍然存在需要自行运行这些库的问题。更好的做法是能够自动化这些检查和其他检查，这样您就不再需要这样做。这可以使代码审查更加专注于解决方案和实现。这正是持续集成/持续部署（CICD）发挥作用的地方。
- en: '![](../Images/bba4e5e148b5f590c3d561e6d21ff471.png)'
  id: totrans-102
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/bba4e5e148b5f590c3d561e6d21ff471.png)'
- en: Automating checks frees up developer time. Image by author
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 自动化检查可以释放开发者的时间。图片由作者提供
- en: There are a variety of CICD tools available (GitLab Pipelines, GitHub Actions,
    Jenkins, Travis etc) that allow the automation of tasks. We could go further and
    automate tasks such as building environments and even training / deploying models.
    While CICD can encompasses the whole software development process, I hope I have
    motivated some useful examples for its use in improving data science projects.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 可用的持续集成/持续部署（CICD）工具有很多（GitLab Pipelines、GitHub Actions、Jenkins、Travis等），它们允许自动化任务。我们可以更进一步，自动化构建环境甚至训练/部署模型的任务。虽然CICD可以涵盖整个软件开发过程，但我希望我已经激发了一些有用的例子，说明其在改善数据科学项目中的应用。
- en: Conclusion
  id: totrans-105
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: This article concludes a series where I have focussed on how we can reduce the
    time to value for data science projects by being more rigorous in our code development
    and experimentation strategies. This final article has covered a wide range of
    topics related to software development and how they can be applied within a data
    science context to improve your coding experience. The key areas focussed on were
    leveraging DevOps platforms to their full potential, maintaining a consistent
    development environment, the importance of readme’s and code reviews and leveraging
    automation through CICD. All of these will ensure that you develop software that
    is robust enough to help support your data science projects and provide value
    to your business as quickly as possible.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 本文总结了一系列文章，在这些文章中，我专注于如何通过更加严谨的代码开发和实验策略来缩短数据科学项目的价值实现时间。最后一篇文章涵盖了与软件开发相关的广泛主题，以及它们如何在数据科学环境中应用以改善您的编码体验。重点关注的关键领域包括充分利用DevOps平台，保持一致的开发环境，readme文件和代码审查的重要性，以及通过持续集成/持续部署（CICD）利用自动化。所有这些都将确保您开发的软件足够健壮，能够帮助支持您的数据科学项目，并尽快为您的业务提供价值。
