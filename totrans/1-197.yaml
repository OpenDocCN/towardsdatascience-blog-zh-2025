- en: How to Build Tools for AI Agents
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/how-to-build-tools-for-ai-agents/](https://towardsdatascience.com/how-to-build-tools-for-ai-agents/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1760554281621" class="mdspan-comment">AI agents are programs</mdspan>
    performing a series of LLM calls. These agents typically receive a task from a
    user and utilize tools to effectively solve the task. Tools are essentially functions
    that an agent can invoke. However, building an agent is much more than simply
    defining a set of tools and providing them in the agent’s context. You need to
    make careful considerations of how your tools are defined, and which context you
    are feeding to your agent
  prefs: []
  type: TYPE_NORMAL
- en: The goal of this article is to highlight what to focus on when building tools
    for AI agents. Proper tools are essential for high-performing agents, and I’ll
    thus make a deeper dive into agentic tool usage. I’ll cover topics such as good
    tool definitions and descriptions, and the optimal way to make tools available
    to your agent.
  prefs: []
  type: TYPE_NORMAL
- en: Why tools are important for AI agents
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![](../Images/d54ca724adb8c1d79d227ed9104a1449.png)'
  prefs: []
  type: TYPE_IMG
- en: This infographic highlights the content of the article. I’ll discuss why good
    tools are critical for your agents. Then I’ll highlight how to define proper tools
    with clean naming and docstrings, as well as how to improve the functionality
    of your tools. Lastly, I’ll also discuss how you should make your tools available
    to your agent. Image by ChatGPT.
  prefs: []
  type: TYPE_NORMAL
- en: Having tools available is a large part of what makes agents effective. Without
    access to tools, the LLM wouldn’t have the same options, such as performing internet
    searches or finding information in a database table. How you define and utilize
    your agentic tools is thus essential for the performance of your agent.
  prefs: []
  type: TYPE_NORMAL
- en: 'There are various considerations to make when defining tools for your agents.
    From working with agents myself, I find that a lot of these considerations also
    apply to humans using the tools as well, for example:'
  prefs: []
  type: TYPE_NORMAL
- en: Tools should be well-defined with proper naming and descriptions
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A tool should have one specific purpose
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You should have proper type definitions, both for what the tool inputs and outputs
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In general, I think you can come a long way by following the principle quoted
    below. All tools you create should be defined in such a way that a human finds
    it easy to understand the tool and how it works.
  prefs: []
  type: TYPE_NORMAL
- en: Tools should be defined in such a way that it’s easy to utilize for a human
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I find that this principle applies a lot when working in ML, for example, also
    when analyzing the prompts you feed to your LLMs. You should always ask yourself
    the question of whether a human can understand the task provided in the prompt.
    If not, the prompt needs to be clarified.
  prefs: []
  type: TYPE_NORMAL
- en: Proper tool definitions
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Proper tool definitions are a simple improvement you can make to your AI agents.
    With proper tool definitions, I refer to:'
  prefs: []
  type: TYPE_NORMAL
- en: You’re tools should have a clear name, representing the function of the tool
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You’re tools should have a well-descriptive docstring, including a short description
    of what the tool does, a description of all input parameters along with their
    type, and a definition of what the tool returns
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I’ll first show a bad example of a tool, highlight the issues, and then provide
    an example of a good tool definition.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'This is a bad tool definition because of the following issues:'
  prefs: []
  type: TYPE_NORMAL
- en: The tool naming is not descriptive. Search is ambiguous; it could, for example,
    also refer to performing a semantic search
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It’s missing a docstring defining input and output types, and what the tool
    does
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The tool is missing types for both input and output parameters. The LLM utilizing
    this tool is probably able to infer that the *query* is a string. However, the
    model will have to spend time understanding the output format once it uses the
    tool
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Instead, you should thus define the tool as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: In this example, I made a separate data class, representing the output format
    of the tool. This makes it a lot easier for your agent to understand how the tool
    works, and will make it easier to handle the output. Furthermore, I defined a
    proper docstring, which contains a simple description of what the tool does, and
    the input and output parameters. I made the tool name more specific by calling
    it *keyword_search* instead of just *search*.
  prefs: []
  type: TYPE_NORMAL
- en: Making these simple improvements to your tools will yield large increases in
    your agents’ performance. However, there are also other techniques you can apply
    to how you define your tools, which makes your agent even more effective.
  prefs: []
  type: TYPE_NORMAL
- en: Tool functionality
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Continuing on the topic of your tool, you can also improve agentic performance
    by making tools more specific and providing the model with clean outputs from
    the tools. I’ll continue with the keyword example to specify what I mean.
  prefs: []
  type: TYPE_NORMAL
- en: Making specific tools
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Tools should be as specific as possible. Creating vague tools makes it harder
    for the model to know when to utilize the tool. You’ll therefore more often encounter
    the model incorrectly utilizing the tool. This could, for example, be:'
  prefs: []
  type: TYPE_NORMAL
- en: Using the tool at incorrect times. For example, using *keyword_search* when
    it should be using *semantic_search*
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Using the model with incorrect parameters
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Incorrectly handling the output of the tool
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Your tools should thus always have a clear, singular purpose.
  prefs: []
  type: TYPE_NORMAL
- en: Provide clean outputs
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Another way to greatly improve the quality of your agents’ tools is to provide
    the agent with a clean output. This means parsing the results within the tool
    into a string that is structured in an easy way for the agent to understand. I’ll
    again describe this using an example below.
  prefs: []
  type: TYPE_NORMAL
- en: I’ll make a _*parse_keyword_search_output* tool that takes in the keyword search
    outputs and parses them into a structured string. In this example, I also include
    that the KeywordSearchResult contains some unnecessary results. These results
    are naturally excluded when we parse the output.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: Parsing the output like this makes it much easier for the agent to handle the
    outputs of the keyword search tool. Remember to ensure that the docstring of the
    *keyword_search* tool describes the output format that the parse keyword search
    tool will provide.
  prefs: []
  type: TYPE_NORMAL
- en: Avoid returning all results
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'When using tools such as keyword search, the tools can sometimes return hundreds,
    if not thousands, of results. This will immediately bloat the context of your
    agent. To prevent this, you should add options to sort the outputs of the tool
    and to only return a maximum number of items, as I highlight in the example below:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: Usually, it’s enough for the model to see the top 10 or 20 results, to both
    fetch the most useful information (in keyword searches the top results are usually
    the most relevant ones), and to understand the format of the output
  prefs: []
  type: TYPE_NORMAL
- en: Informative error handling
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Informative error handling is a critical failsafe to have in place when your
    agents inevitably encounter issues. This issue can be caused by:'
  prefs: []
  type: TYPE_NORMAL
- en: The agent incorrectly uses a tool, in which case you should inform the agent
    why it used the tool incorrectly, and potentially also how to fix it
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: An API fails because of a third-party provider. In which case, you might inform
    the model to either wait or inform the user of the issue
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Missing packages, in which case you should inform your agent to install the
    required packages
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: 'This informative error handling makes it much easier for your agent to handle
    the scenario where a tool fails. You should, in general, ensure the following
    in your error handling:'
  prefs: []
  type: TYPE_NORMAL
- en: You return a descriptive error message, including both the error trace and a
    string describing the error
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You should ideally inform the agent how it should act after receiving this error.
    For example, if the model encounters the rate limit error, it should run time.sleep()
    if it’s the first time it’s encountering this error, else it should inform the
    user.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Make tools available to your agents
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now that you have both functional and properly defined tools, it’s time to make
    them available to your agents. There are, however, still some considerations to
    make when providing your agent with tools.
  prefs: []
  type: TYPE_NORMAL
- en: How many tools fit into the context?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When to make tools available?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How to make tools available in the context?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: To the first bullet point, I think it’s important to consider how many tools
    you should fix in your context. Providing the agent with too many tools makes
    it hard for the agent to know when to use which tools, and thus, the model will
    struggle with effectively utilizing the tools. You should thus review your tools
    and consider if they’re all necessary for your agent to perform well.
  prefs: []
  type: TYPE_NORMAL
- en: Continuing on this topic, you may also consider when to make tools available.
    For example, the *keyword_search* tool might not be relevant when the agent is
    performing simple summarisation tasks for the user. You can modify your agent’s
    context to make some tools only available when they are relevant to use.
  prefs: []
  type: TYPE_NORMAL
- en: Lastly, you should also consider how you make tools available. In your prompt,
    you should create a separate section for your tools, either using a markdown heading
    or a separate XML tag. You should then put all your tools and the descriptions
    for how and when to utilize your tools in this section.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this article, I’ve covered how to work with tools for your agents. I’ve discussed
    how tools are the most important aspect for AI agents, which allows them to be
    as effective as they are. Furthermore, I also discussed how to create proper tool
    definitions and how to create specialized tools. I believe working with your tools,
    improving how they’re defined and how your agent utilizes them, is the most important
    aspect you can spend time on when working on your AI agent.
  prefs: []
  type: TYPE_NORMAL
