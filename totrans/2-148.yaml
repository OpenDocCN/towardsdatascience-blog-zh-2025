- en: 'Accuracy Is Dead: Calibration, Discrimination, and Other Metrics You Actually
    Need'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 准确率已死：校准、区分度以及其他你真正需要的指标
- en: 原文：[https://towardsdatascience.com/accuracy-is-dead-calibration-discrimination-and-other-metrics-you-actually-need/](https://towardsdatascience.com/accuracy-is-dead-calibration-discrimination-and-other-metrics-you-actually-need/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/accuracy-is-dead-calibration-discrimination-and-other-metrics-you-actually-need/](https://towardsdatascience.com/accuracy-is-dead-calibration-discrimination-and-other-metrics-you-actually-need/)
- en: <mdspan datatext="el1752539982542" class="mdspan-comment">Accuracy is often
    the metric</mdspan> we, data scientists, cite the most — but also the most misleading.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1752539982542" class="mdspan-comment">准确率通常是数据科学家引用最多的指标——但也是最误导性的。</mdspan>
- en: It was long ago that we found out that models are developed for far more than
    just making predictions. We create models to make decisions, and that requires
    trust. And relying on the accuracy is simply not enough.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 很久以前我们就发现，模型的发展不仅仅是为了做出预测。我们创建模型是为了做出决策，这需要信任。而仅仅依赖准确率是远远不够的。
- en: In this post, we’ll see why and we’ll check other alternatives, more advanced
    and tailored to our needs. As always, we’ll do it following a practical approach,
    with the end goal of deep diving into evaluation beyond standard metrics.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们将看到为什么，并检查其他更先进且符合我们需求的替代方案。一如既往，我们将采取实用方法，最终目标是深入挖掘标准指标之外的评估。
- en: 'Here’s the table of contents for today’s read:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 这是今天阅读的目录：
- en: Setting Up the Models
  id: totrans-6
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 设置模型
- en: 'Classification: Beyond Accuracy'
  id: totrans-7
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 分类：超越准确率
- en: 'Regression: Advanced Evaluation'
  id: totrans-8
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 回归：高级评估
- en: Conclusion
  id: totrans-9
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 结论
- en: Setting Up the Models
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 设置模型
- en: Accuracy makes more sense for classification algorithms rather than regression
    tasks… Hence, not all problems are measured equally.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 准确率对于分类算法比回归任务更有意义……因此，并不是所有问题都是同等衡量的。
- en: That’s the reason why I’ve decided to tackle both scenarios — the regression
    and the classification ones — separately by creating two different models.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是为什么我决定分别处理两种场景——回归和分类——通过创建两个不同的模型。
- en: 'And they’ll be very simple ones, because their performance and application
    isn’t what matters today:'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 因为它们的性能和应用并不是今天关注的重点，所以它们将会非常简单：
- en: '**Classification**: Will a striker score in the next match?'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**分类**：下一个比赛中前锋会进球吗？'
- en: '**Regression**: How many goals will a player score?'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**回归**：球员会进多少球？'
- en: If you’re a recurrent reader, I’m sure that the use of football examples didn’t
    come as a surprise.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你是一个经常阅读的读者，我确信足球示例的使用不会让你感到惊讶。
- en: '**Note**: Even though we won’t be using accuracy on our regression problem
    and this post is thought to be more focused on that metric, I didn’t want to leave
    these cases behind. So that’s why we’ll be exploring regression metrics too.'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意**：尽管我们不会在我们的回归问题中使用准确率，而且这篇文章被认为更关注这个指标，但我不想遗漏这些案例。所以这就是为什么我们也会探索回归指标。'
- en: 'Again, because we don’t care about the data nor the performance, let me skip
    all the preprocessing part and go straight to the models themselves:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 再次，因为我们不关心数据也不关心性能，让我跳过所有预处理部分，直接进入模型本身：
- en: '[PRE0]'
  id: totrans-19
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'As you can see, we stick to simple models: logistic regression for the binary
    classification, and gradient boosting for regression.'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，我们坚持使用简单的模型：逻辑回归用于二元分类，梯度提升用于回归。
- en: 'Let’s check the metrics we’d usually check:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们检查我们通常会检查的指标：
- en: '[PRE1]'
  id: totrans-22
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: The printed accuracy is 92.43%, which is honestly way higher than what I’d have
    expected. Is the model really that good?
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 打印的准确率是92.43%，老实说，这比我预期的要高得多。模型真的那么好吗？
- en: '[PRE2]'
  id: totrans-24
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: I got an RMSE of 0.3059\. Not that good. But is it enough to discard our regression
    model?
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 我得到了0.3059的RMSE。并不好。但这足以摒弃我们的回归模型吗？
- en: We need to do better.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要做得更好。
- en: 'Classification: Beyond Accuracy'
  id: totrans-27
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 分类：超越准确率
- en: Too many data science projects stop at accuracy, which is often misleading,
    especially with imbalanced targets (e.g., scoring a goal is rare).
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 太多的数据科学项目只停留在准确率上，这往往是误导性的，尤其是在不平衡的目标（例如，进球是罕见的）的情况下。
- en: 'To evaluate whether our model *really* predicts “Will this player perform?”,
    here are other metrics we should consider:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 为了评估我们的模型是否真的能预测“这位球员会表现吗？”，这里有其他我们应该考虑的指标：
- en: '**ROC-AUC**: Measures ability to rank positives above negatives. Insensitive
    to threshold but doesn’t care about calibration.'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**ROC-AUC**：衡量将正例排在负例之上的能力。对阈值不敏感，但不关心校准。'
- en: '**PR-AUC**: Precision-Recall curve is essential for rare events (e.g., scoring
    probability). It focuses on the positive class, which matters when positives are
    scarce.'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**PR-AUC**：精确-召回曲线对于稀有事件（例如，评分概率）至关重要。它专注于正类，当正类数量稀少时这一点很重要。'
- en: '**Log Loss**: Punishes overconfident wrong predictions. Ideal for comparing
    calibrated probabilistic outputs.'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Log Loss**：惩罚过于自信的错误预测。非常适合比较校准的概率输出。'
- en: '**Brier Score**: Measures mean squared error between predicted probabilities
    and actual outcomes. Lower is better, and it’s interpretable as overall probability
    calibration.'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Brier分数**：衡量预测概率与实际结果之间的平均平方误差。越低越好，它可以解释为整体概率校准。'
- en: '**Calibration Curves**: Visual diagnostic to see if predicted probabilities
    match observed frequencies.'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**校准曲线**：视觉诊断工具，用于查看预测概率是否与观察到的频率相匹配。'
- en: We won’t test all of them now, but let’s briefly touch upon ROC-AUC and Log
    Loss, probably the most used after accuracy.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在不会测试所有这些，但让我们简要地谈谈ROC-AUC和Log Loss，这可能是除准确度之外最常用的指标。
- en: ROC-AUC
  id: totrans-36
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: ROC-AUC
- en: ROC-AUC, or *Receiver Operating Characteristic – Area Under the Curve*, is a
    popular metric that consists in measuring the area under the ROC curve, which
    is a curve that plots the True Positive rate (TPR) against the False Positive
    rate (FPR).
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: ROC-AUC，或*接收者操作特征 – 曲线下面积*，是一个流行的指标，它包括测量ROC曲线下的面积，ROC曲线是绘制真阳性率（TPR）与假阳性率（FPR）的曲线。
- en: Simply put, the ROC-AUC score (ranging from 0 to 1) sums up how well a model
    can produce relative scores to discriminate between positive or negative instances
    across all classification thresholds.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，ROC-AUC分数（范围从0到1）总结了模型在所有分类阈值下，如何产生相对分数以区分正例和负例的能力。
- en: A score of 0.5 indicates random guessing and a 1 is a perfect performance.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 分数为0.5表示随机猜测，而1表示完美表现。
- en: 'Computing it in Python is easy:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 在Python中计算它很容易：
- en: '[PRE3]'
  id: totrans-41
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Here, y_true contains the real labels and y_proba contains our model’s predicted
    prorbabilities. In my case the score is 0.7585, which is relatively low compared
    to the accuracy. But how can this be possible, if we got an accuracy above 90%?
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，y_true包含真实标签，而y_proba包含我们模型的预测概率。在我的情况下，分数是0.7585，与准确度相比相对较低。但这是怎么可能的，如果我们得到的准确度超过了90%？
- en: 'Context: We’re trying to predict whether a player will score in a match or
    not. The “problem” is that this is highly imbalanced data: most players won’t
    score in a match, so our model learns that predicting a 0 is the most probable,
    without really learning anything about the data itself.'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 背景：我们试图预测球员是否会在比赛中得分。问题是这是一个高度不平衡的数据：大多数球员不会得分，因此我们的模型学习到预测0是最可能的，而没有真正了解数据本身。
- en: It can’t capture the minority class correctly and accuracy simply doesn’t show
    us that.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 它无法正确捕捉少数类，而准确度也无法显示这一点。
- en: Log Loss
  id: totrans-45
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Log Loss
- en: The logarithmic loss, cross-entropy or, simply, log loss, is used to evaluate
    the performance with probability outputs. It measures the difference between the
    predicted probabilities and the actual (true) values, logarithmically.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 对数损失、交叉熵，或者简单地说，对数损失，用于评估具有概率输出的性能。它衡量预测概率与实际（真实）值之间的差异，以对数形式计算。
- en: 'Again, we can do this with a one-liner in python:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 再次，我们可以用一行Python代码来完成这个任务：
- en: '[PRE4]'
  id: totrans-48
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: As you’ve probably guessed, the lower the value, the better. A 0 would be the
    perfect model. In my case, I got a 0.2345.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 如你可能猜到的，值越低越好。0将是完美的模型。在我的情况下，我得到了0.2345。
- en: 'This one is also affected by class imbalance: Log loss penalizes confident
    wrong predictions very harshly and, since our model predicts a 0 most of the time,
    those cases in which there was indeed a goal scored affect the final score.'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 这一个也受到类别不平衡的影响：对数损失对自信的错误预测惩罚非常严厉，而且由于我们的模型大多数时候预测0，那些确实有进球的情况会影响最终得分。
- en: 'Regression: Advanced Evaluation'
  id: totrans-51
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 回归：高级评估
- en: Accuracy makes no sense in regression but we have a handful of interesting metrics
    to evaluate the problem of how many goals will a player score in a given match.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 在回归中，准确度没有意义，但我们有一系列有趣的指标来评估球员在给定比赛中将进球多少的问题。
- en: When predicting **continuous outcomes** (e.g., expected minutes, match ratings,
    fantasy points), simple RMSE/MAE is a start—but we can go much further.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 当预测**连续结果**（例如，预期分钟数、比赛评分、幻想得分）时，简单的RMSE/MAE是一个起点——但我们可以走得更远。
- en: 'Other metrics and checks:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 其他指标和检查：
- en: '**R²**: Represents the proportion of the variance in the target variable explained
    by the model.'
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**R²**：表示模型解释目标变量变差的比例。'
- en: '**RMSLE**: Penalizes underestimates more and is useful if values vary exponentially
    (e.g., fantasy points).'
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**RMSLE**：对低估的惩罚更轻，如果值呈指数变化（例如，幻想得分），则很有用。'
- en: '**MAPE / SMAPE**: Percentage errors, but beware divide-by-zero issues.'
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**MAPE / SMAPE**：百分比误差，但要注意除以零的问题。'
- en: '**Quantile Loss**: Train models to predict intervals (e.g., 10th, 50th, 90th
    percentile outcomes).'
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**分位数损失**：训练模型预测区间（例如，第10、50、90百分位数的输出）。'
- en: '**Residual vs. Predicted** **(plot)**: Check for heteroscedasticity.'
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**残差与预测值**（plot）：检查异方差性。'
- en: Again, let’s focus on a subgroup of them.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 再次，让我们关注其中的一小部分。
- en: R² Score
  id: totrans-61
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: R²得分
- en: Also called the coefficient of determination, it compares a model’s error to
    the baseline error. A score of 1 is the perfect fit, a 0 means that it predicts
    the mean only, and a value below 0 means that it’s worse than mean prediction.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 也称为决定系数，它比较模型误差与基线误差。得分为1表示完美拟合，得分为0表示仅预测均值，得分低于0表示比均值预测更差。
- en: '[PRE5]'
  id: totrans-63
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: I got a value of 0.0557, which is pretty close to 0… Not good.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 我的得分是0.0557，这非常接近0… 这并不好。
- en: RMSLE
  id: totrans-65
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: RMSLE
- en: 'The *Root Mean Squared Logarithmic Error,* or RMSLE, measures the square root
    of the average squared difference between the **l**og-transformed predicted and
    actual values. This metric is useful when:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: '**均方根对数误差**（Root Mean Squared Logarithmic Error，或RMSLE），衡量的是预测值和实际值对数变换后平均平方差的平方根。当以下情况时，这个指标很有用：'
- en: We want to penalize under-prediction more gently.
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们希望更温和地惩罚低估。
- en: Our target variables are skewed (it reduces the impact of large outliers).
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们的目标变量是偏斜的（它减少了大型异常值的影响）。
- en: '[PRE6]'
  id: totrans-69
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: I got a 0.19684 which means that my average prediction error is about 0.2 goals.
    It’s not that big but, given that our target variable is a value between 0 and
    4 and highly skewed towards 0…
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 我的得分是0.19684，这意味着我的平均预测误差大约是0.2个目标。这并不大，但考虑到我们的目标变量介于0到4之间，且高度偏向0…
- en: Quantile Loss
  id: totrans-71
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 分位数损失
- en: 'Also called Pinball Loss, it can be used for quantile regression models to
    evaluate how well our predicted quantiles perform. If we build a quantile model
    (GradientBoostingRegressor with quantile loss), we can test it as follows:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 也称为弹珠损失，它可以用于分位数回归模型来评估我们的预测分位数表现如何。如果我们构建一个分位数模型（使用分位数损失的GradientBoostingRegressor），我们可以这样测试：
- en: '[PRE7]'
  id: totrans-73
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: Here, with alpha 0.9 we’re trying to predict the 90th percentile. My quantile
    loss is 0.0644 which is very small in relative terms (~1.6% of my target variable
    range).
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们使用alpha 0.9试图预测第90百分位数。我的分位数损失是0.0644，这在相对意义上非常小（~目标变量范围的1.6%）。
- en: 'However, distribution matters: Most of our *y_test* values are 0, and we need
    to interpret it as “*on average, our model’s error in capturing the upper tail
    is very low*“.'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，分布很重要：我们的大部分*y_test*值都是0，我们需要将其解释为“*平均而言，我们的模型在捕捉上尾误差方面非常低*”。
- en: It’s especially impressive given the 0-heavy target.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到目标变量中0的占比很高，这一点尤其令人印象深刻。
- en: But, because most outcomes are 0, other metrics like the ones we saw and mentioned
    above should be used to assess whether our model is in fact performing well or
    not.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，因为大多数输出都是0，所以我们应该使用我们之前看到和提到的其他指标来评估我们的模型是否真的表现良好。
- en: Conclusion
  id: totrans-78
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: Building predictive models goes far beyond simply achieving “good accuracy.”
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 构建预测模型远不止简单地实现“良好的准确性”。
- en: For **classification** tasks, you need to think about imbalanced data, probability
    calibration, and real-world use cases like pricing or risk management.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 对于**分类**任务，你需要考虑不平衡数据、概率校准和现实世界的用例，如定价或风险管理。
- en: For **regression**, the goal is not just minimizing error but understanding
    uncertainty—vital if your predictions inform strategy or trading decisions.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 对于**回归**任务，目标不仅仅是最小化误差，还要理解不确定性——如果你的预测涉及策略或交易决策，这一点至关重要。
- en: 'Ultimately, true value lies in:'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 最终，真正的价值在于：
- en: Carefully curated, temporally valid features.
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 精心挑选，时间上有效的特征。
- en: Advanced evaluation metrics tailored to the problem.
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 针对问题的先进评估指标。
- en: Transparent, well-visualized comparisons.
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 透明，可视化良好的比较。
- en: If you get these right, you’re no longer building “just another model.” You’re
    delivering robust, decision-ready tools. And the metrics we explored here are
    just the entry point.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你做对了这些，你就不再是在构建“仅仅另一个模型”。你正在提供稳健、决策就绪的工具。而我们在这里探讨的指标只是入门点。
