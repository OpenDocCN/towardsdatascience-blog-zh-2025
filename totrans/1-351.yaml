- en: 'Stepwise Selection Made Simple: Improve Your Regression Models in Python'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 步骤化选择简化：在Python中改进你的回归模型
- en: 原文：[https://towardsdatascience.com/model-selection-in-linear-regression/](https://towardsdatascience.com/model-selection-in-linear-regression/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/model-selection-in-linear-regression/](https://towardsdatascience.com/model-selection-in-linear-regression/)
- en: To get the most out of this tutorial, you should already have a solid understanding
    of how linear regression works and the assumptions behind it. You should also
    be aware that, in practice, multicollinearity is addressed using the Variance
    Inflation Factor (VIF). In addition, you need to understand what prediction risk
    means, and be familiar with the basics of Python as well as its core functions.
  id: totrans-2
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 为了充分利用这篇教程，你应该已经对线性回归的工作原理及其背后的假设有扎实的理解。你应该还知道，在实践中，多重共线性问题通常是通过使用方差膨胀因子（VIF）来解决的。此外，你需要了解预测风险的含义，并且熟悉Python的基础知识以及其核心功能。
- en: ''
  id: totrans-3
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'At the end of this article, you will find the code for the stepwise selection
    procedure used here. The implementation follows two key principles: **orthogonality**
    and **Don’t Repeat Yourself (DRY)**, ensuring clean, modular, and reusable code.'
  id: totrans-4
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在本文的结尾，你可以找到这里使用的步骤化选择过程的代码。实现遵循两个关键原则：**正交性**和**不要重复自己（DRY）**，确保代码干净、模块化和可重用。
- en: <mdspan datatext="el1756252704902" class="mdspan-comment">Introduction</mdspan>
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1756252704902" class="mdspan-comment">引言</mdspan>
- en: 'Reducing the number of variables in a regression model is not only a technical
    exercise; it is a strategic choice that must be guided by the objectives of the
    analysis. In a [previous work](https://towardsdatascience.com/multiple-linear-regression-analysis/),
    we demonstrated how simple tools, such as correlation analysis and the Variance
    Inflation Factor (VIF), can already shrink a dataset with hundreds of predictors
    into a far more compact model. Yet, even after this initial reduction, models
    often still contain too many variables to work effectively. A smaller model with
    fewer predictors offers several advantages: it may yield better predictions than
    a larger model, it is more parsimonious, hence easier to interpret, and it often
    generalizes better. As more variables are added, the model’s bias decreases but
    its variance increases. This is the essence of the bias–variance trade-off: too
    few variables lead to high bias (underfitting), whereas too many lead to high
    variance (overfitting). Good predictive performance requires a balance between
    the two.'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 减少回归模型中的变量数量不仅是一项技术练习，而且是一个必须由分析目标指导的战略选择。在[之前的工作](https://towardsdatascience.com/multiple-linear-regression-analysis/)中，我们展示了如何使用简单的工具，如相关分析和方差膨胀因子（VIF），将包含数百个预测因子的数据集压缩成一个更加紧凑的模型。然而，即使经过这种初步的减少，模型通常仍然包含过多的变量而无法有效工作。一个具有较少预测因子的较小模型提供了几个优点：它可能比大模型产生更好的预测结果，它更加简约，因此更容易解释，并且通常泛化得更好。随着变量的增加，模型的偏差降低但方差增加。这就是偏差-方差权衡的本质：变量过少会导致高偏差（欠拟合），而变量过多会导致高方差（过拟合）。良好的预测性能需要在两者之间取得平衡。
- en: 'This raises a fundamental question for anyone working with regression models:
    **how do we decide which variables deserve to be included in the model?** In other
    words, how can we reduce the dimensionality of our data without losing essential
    information?'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 这为使用回归模型的人提出了一个基本问题：**我们如何决定哪些变量应该包含在模型中？**换句话说，我们如何在不丢失关键信息的情况下减少数据的维度？
- en: The challenge depends on the purpose of the analysis. Should the model provide
    precise estimates of the coefficients? Should it identify which predictors are
    important? Or should it maximize predictive accuracy? Each of these objectives
    calls for different approaches to model selection, and ignoring this distinction
    can lead to misleading conclusions.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 挑战取决于分析的目的。模型是否应该提供系数的精确估计？是否应该识别哪些预测因子是重要的？或者应该最大化预测准确性？每个目标都需要不同的模型选择方法，忽视这种区别可能会导致误导性的结论。
- en: In this article, we address the challenge of model selection in regression.
    We begin by outlining the general framework of linear regression (readers already
    familiar with it may skip this section). We then review the main scoring criteria
    used to evaluate competing models, followed by a discussion of the procedures
    that allow us to explore subsets of the possible model space. Finally, we illustrate
    these methods with a Python application using the [Communities and Crime dataset.](https://archive.ics.uci.edu/dataset/183/communities+and+crime)
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我们讨论了回归中的模型选择挑战。我们首先概述了线性回归的一般框架（对于已经熟悉它的读者，可以跳过这一部分）。然后，我们回顾了用于评估竞争模型的主要评分标准，接着讨论了允许我们探索可能模型空间子集的程序。最后，我们通过使用
    [Communities and Crime 数据集](https://archive.ics.uci.edu/dataset/183/communities+and+crime)
    的 Python 应用来展示这些方法。
- en: 1\. Framework of linear regression.
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1. 线性回归框架。
- en: In this section, we provide a brief overview of the linear regression model.
    We begin by describing the dataset, including the number of observations and the
    number of covariates. We then introduce the model itself and outline the assumptions
    made about the data.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我们简要概述线性回归模型。我们首先描述数据集，包括观测数和协变量数。然后介绍模型本身，并概述对数据所做的假设。
- en: 'We assume that we have a dataset with n observations and p covariates. The
    response variable is denoted by Y is continuous and the covariates are denoted
    by X[1], … , X[p]. We assume that the relationship between the response variable
    and the covariates is linear, that is:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 我们假设我们有一个包含 n 个观测值和 p 个协变量的数据集。响应变量用 Y 表示，是连续的，协变量用 X[1]，…，X[p] 表示。我们假设响应变量和协变量之间的关系是线性的，即：
- en: '![](../Images/b76621dbd05b68c8c8d3f9f947b20426.png)'
  id: totrans-13
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b76621dbd05b68c8c8d3f9f947b20426.png)'
- en: for i = 1, …, 𝑛, where β[0] is the intercept, β[j] is the coefficient of the
    𝑗-th covariate, and εᵢ is the error term. We assume that the error term is independent
    and identically distributed (i.i.d.) with mean zero and variance σ².
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 对于 i = 1, …, 𝑛，其中 β[0] 是截距，β[j] 是第 j 个协变量的系数，εᵢ 是误差项。我们假设误差项是独立同分布的 (i.i.d.)，均值为零，方差为
    σ²。
- en: 'With the regression framework in place, the next step is to face the central
    challenge of model selection: how do we compare different subsets of variables?'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 在回归框架建立之后，下一步是面对模型选择的中心挑战：我们如何比较不同变量的子集？
- en: 2\. Scoring Criteria for Evaluating Competing Models
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2. 评估竞争模型的评分标准
- en: In model selection, the first challenge is to assign a score to each model,
    where a model is defined by a particular subset of covariates. This section explains
    how models can be scored.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 在模型选择中，第一个挑战是为每个模型分配一个分数，其中模型由特定的协变量子集定义。本节解释了如何对模型进行评分。
- en: 'Let us first discuss the problem of scoring models. Let S ⊂ {1, …, p} and let
    𝓧[S] = {Xⱼ : j ∈ S} denote a subset of the covariates. Let β[S] denote the coefficients
    of the corresponding set of covariates and let β̂[S] denote the least squares
    estimate of β[S]. Also, let X[S] denote the X matrix for this subset of covariates
    and define r̂[S](x), to be the estimated regression function. The predicted values
    from model S are denoted by Ŷᵢ(S) = r̂[S](Xᵢ). The 𝐩𝐫𝐞𝐝𝐢𝐜𝐭𝐢𝐨𝐧 𝐫𝐢𝐬𝐤 is defined
    to be'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: '让我们先讨论评分模型的问题。设 S ⊂ {1, …, p}，令 𝓧[S] = {Xⱼ : j ∈ S} 表示协变量的一个子集。令 β[S] 表示相应协变量集的系数，令
    β̂[S] 表示 β[S] 的最小二乘估计。此外，令 X[S] 表示这个协变量子集的 X 矩阵，并定义 r̂[S](x) 为估计的回归函数。模型 S 的预测值表示为
    Ŷᵢ(S) = r̂[S](Xᵢ)。预测误差定义为'
- en: '![](../Images/d9b1439646f64c31c86177d784044151.png)'
  id: totrans-19
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d9b1439646f64c31c86177d784044151.png)'
- en: where Y[i]* is the future observation of Y[i] at the covariate X[i].
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 Y[i]* 是 Y[i] 在协变量 X[i] 下的未来观测值。
- en: The goal of model selection is to find the subset S that minimizes the prediction
    risk R(S).
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 模型选择的目的是找到子集 S，使其预测风险 R(S) 最小化。
- en: With data, we cannot directly compute the prediction risk R(S). In this situation,
    we generally use its estimate  based on the available data. The estimation of
    the prediction risk is used as our **scoring criterion**.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 在有数据的情况下，我们无法直接计算预测风险 R(S)。在这种情况下，我们通常使用基于可用数据的估计。预测风险的估计被用作我们的 **评分标准**。
- en: 'The naive estimate of the prediction risk that we can use is: the training
    error, which is defined as:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以使用的预测风险的朴素估计是：训练误差，其定义为：
- en: '![](../Images/fda41232d638b3f528b10fa7fe5210a6.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/fda41232d638b3f528b10fa7fe5210a6.png)'
- en: where Y[i] is the observed value of the response variable for the i-th observation.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 Y[i] 是第 i 个观测值的响应变量的观测值。
- en: However, the training error is very biased as an estimate of the prediction
    risk. It is always smaller than the prediction risk . In fact,
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，训练误差作为预测风险的估计是非常有偏差的。它总是小于预测风险。事实上，
- en: '![](../Images/357cb3da832ca7d31beeaa2cc527780a.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/357cb3da832ca7d31beeaa2cc527780a.png)'
- en: 'What explains this biaïs is that the data is used twice: once to fit the model
    and once to compute the training error. When we fit a complex model, with many
    parameters, the covariance 𝐶𝑜𝑣(Ŷᵢ(S), 𝑌ᵢ) will be large and the bias of the training
    error will get worse. This is why we need to use a more reliable estimate of the
    prediction risk.'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 解释这种偏差的原因是数据被使用了两次：一次用于拟合模型，一次用于计算训练误差。当我们拟合一个具有许多参数的复杂模型时，协方差 𝐶𝑜𝑣(Ŷᵢ(S), 𝑌ᵢ)
    将会很大，训练误差的偏差会变得更差。这就是为什么我们需要使用一个更可靠的预测风险估计。
- en: 2.1 Mallow’s C[p] statistic
  id: totrans-29
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.1 Mallow 的 C[p] 统计量
- en: 'The Mallow’s C[p] statistic is a popular method for model selection. It is
    defined as:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: Mallow 的 C[p] 统计量是模型选择的一种流行方法。它定义为：
- en: '![](../Images/265e30f345c47a69ecda988489316a1c.png)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/265e30f345c47a69ecda988489316a1c.png)'
- en: Here, |𝑆| is the number of terms in 𝑆, and σ̂² is the estimate of σ², the variance
    of the error term obtained from the full model with all variables (𝑘). This value
    represents the training error plus a bias correction. The first term measures
    how well the model fits the data, while the second term measures the model’s complexity.
    The more complex the model, the larger the second term will be, and consequently,
    the larger the Mallow’s 𝐶ₚ statistic will be.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 这里，|𝑆| 是 𝑆 中的项数，σ̂² 是从包含所有变量（𝑘）的完整模型中获得的误差项方差的估计。这个值代表训练误差加上偏差校正。第一个项衡量模型拟合数据的好坏，而第二个项衡量模型的复杂度。模型越复杂，第二个项就越大，因此
    Mallows 的 𝐶ₚ 统计量也会越大。
- en: Mallow’s 𝐶ₚ statistic represents a trade-off between model fit and complexity.
    Finding a good model therefore requires balancing these two aspects. The goal
    is to identify the model that minimizes the Mallow’s 𝐶ₚ statistic.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: Mallow 的 𝐶ₚ 统计量代表了模型拟合和复杂度之间的权衡。因此，找到一个好的模型需要平衡这两个方面。目标是识别最小化 Mallow 的 𝐶ₚ 统计量的模型。
- en: Beyond Mallows’ C[P], model selection criteria can also be derived from likelihood-based
    estimation with penalty terms. This leads us to the next family of methods.”
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 除了 Mallows 的 C[P] 之外，模型选择标准还可以从基于似然估计的带有惩罚项中推导出来。这使我们引出下一系列方法。”
- en: 2.2 Likelihood and penalization
  id: totrans-35
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.2 概率估计与惩罚
- en: The approach below to estimate the prediction risk is based on the maximum likelihood
    estimation of the parameters.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 以下估计预测风险的方法是基于参数的最大似然估计。
- en: 'In the hypothesis that the error term is normally distributed, the likelihood
    function is given by:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 在假设误差项服从正态分布的情况下，似然函数如下所示：
- en: '![](../Images/06c569d0fa47c3b287283ca9512efac5.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/06c569d0fa47c3b287283ca9512efac5.png)'
- en: 'If you compute the maximum likelihood estimate of the parameters β and σ²,
    for the model 𝑆, that has |𝑆| variables, you will get respectively:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你计算模型 𝑆 的参数 β 和 σ² 的最大似然估计，该模型有 |𝑆| 个变量，你将分别得到：
- en: β̂(𝑆)[mv] = β̂(𝑆)[mco] and σ̂(𝑆)²[mv]= (1/𝑛) ∑ᵢ₌₁ⁿ (𝑌ᵢ − 𝑌̂ᵢ(𝑆))².
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: β̂(𝑆)[mv] = β̂(𝑆)[mco] 和 σ̂(𝑆)²[mv]= (1/𝑛) ∑ᵢ₌₁ⁿ (𝑌ᵢ − 𝑌̂ᵢ(𝑆))².
- en: 'The log-likelihood of the model for the model $S$ which has $|S|$ variables
    is then given by:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 对于具有 $|S|$ 个变量的模型 $S$ 的对数似然如下所示：
- en: '![](../Images/14abe54c16eb0a7e785d345032ad25be.png)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/14abe54c16eb0a7e785d345032ad25be.png)'
- en: 'Choosing the model that maximizes the log-likelihood is equivalent to choosing
    the model that have the smallest residual sum of squares (RSS), that is:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 选择最大化对数似然的模型等同于选择具有最小残差平方和（RSS）的模型，即：
- en: '![](../Images/334246b11e2f7ea3f6bbcf4b13553436.png)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/334246b11e2f7ea3f6bbcf4b13553436.png)'
- en: 'In order to minimize a criterion, we use the negative log-likelihood. The criterion
    is generally defined as:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 为了最小化一个标准，我们使用负对数似然。标准通常定义为：
- en: −2𝓁(𝑆) + 2|𝑆|·𝑓(𝑛)
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: −2𝓁(𝑆) + 2|𝑆|·𝑓(𝑛)
- en: where 𝑓(𝑛) is a penalty function that depends on the sample size 𝑛.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 𝑓(𝑛) 是一个依赖于样本大小 𝑛 的惩罚函数。
- en: 'This formulation allows us to define the AIC and BIC criteria, given as follows:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 这种公式允许我们定义 AIC 和 BIC 标准，如下所示：
- en: 2.2.1 Akaike Information Criterion (AIC)
  id: totrans-49
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 2.2.1 赤池信息量准则（AIC）
- en: 'Another approach to model selection is the **Akaike Information Criterion (AIC)**.
    The goal of the AIC is to identify the model that minimizes information loss.
    In practice, this means choosing the subset S that minimizes the AIC, defined
    as:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种模型选择的方法是**赤池信息量准则（AIC）**。AIC 的目标是识别最小化信息损失的模型。在实践中，这意味着选择最小化 AIC 的子集 S，AIC
    定义如下：
- en: AIC(𝑆) = −2𝓁ₛ + 2|𝑆|
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: AIC(𝑆) = −2𝓁ₛ + 2|𝑆|
- en: where 𝓁ₛ is the log-likelihood of model 𝑆 evaluated at the maximum likelihood
    estimates of its parameters. Here, 𝑓(𝑛) = 2.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 𝓁ₛ 是模型 𝑆 在其参数的最大似然估计下的对数似然。在这里，𝑓(𝑛) = 2。
- en: This criterion can be viewed as a combination of **goodness of fit** and **model
    complexity**.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 这个准则可以看作是**拟合优度**和**模型复杂度**的结合。
- en: When comparing two models, the one with the lower AIC value is preferred.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 当比较两个模型时，倾向于选择 AIC 值较低的模型。
- en: 2.2.2 Bayesian Information Criterion (BIC)
  id: totrans-55
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 2.2.2 贝叶斯信息准则（BIC）
- en: 'The Bayesian Information Criterion (BIC) is another method for model selection.
    It is similar to the AIC, and BIC is defined as:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 贝叶斯信息准则（BIC）是模型选择的一种方法。它与 AIC 类似，BIC 定义为：
- en: BIC(𝑆) = −2𝓁ₛ + |𝑆|·log(𝑛)
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: BIC(𝑆) = −2𝓁ₛ + |𝑆|·log(𝑛)
- en: where 𝓁ₛ is the log-likelihood of model 𝑆 evaluated at the maximum likelihood
    estimates of its parameters.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 𝓁ₛ 是模型 𝑆 在其参数的最大似然估计下的对数似然。
- en: 'It is called the *Bayesian* Information Criterion because it can be derived
    from a Bayesian perspective. Let 𝑆 = {𝑆₁, …, 𝑆ₘ} denote a set of models. If we
    assign each model 𝑆ᵢ a prior probability π(𝑆ᵢ) = 1/𝑚, then the posterior probability
    of model 𝑆ᵢ given the data is proportional to its likelihood. This leads to the
    following expression:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 它被称为贝叶斯信息准则，因为它可以从贝叶斯视角推导出来。设 𝑆 = {𝑆₁, …, 𝑆ₘ} 表示一组模型。如果我们为每个模型 𝑆ᵢ 分配一个先验概率 π(𝑆ᵢ)
    = 1/𝑚，那么在给定数据的情况下，模型 𝑆ᵢ 的后验概率与它的似然成比例。这导致以下表达式：
- en: '![](../Images/2d90e991a580cf9e483ac3042b9dfcfd.png)'
  id: totrans-60
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/2d90e991a580cf9e483ac3042b9dfcfd.png)'
- en: Thus, choosing the model that minimizes the BIC is equivalent to choosing the
    model with the highest posterior probability given the data.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，选择使 BIC 最小的模型等同于选择在给定数据下后验概率最高的模型。
- en: 'BIC also has an interpretation in terms of **minimum description length**:
    it balances model fit against complexity. Because its penalty term is 𝑓(𝑛) = ½·log(𝑛),
    the BIC applies a stronger penalty than the AIC when 𝑛 > 7\. As a result, BIC
    typically selects more parsimonious models than AIC, especially as the sample
    size grows.'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 贝叶斯信息准则（BIC）在**最小描述长度**方面也有解释：它在模型拟合和复杂度之间取得平衡。因为其惩罚项是 𝑓(𝑛) = ½·log(𝑛)，当 𝑛 >
    7 时，BIC 对 AIC 的惩罚更强。因此，BIC 通常比 AIC 选择更简约的模型，尤其是在样本量增加时。
- en: As with AIC, when comparing two models, the preferred model is the one with
    the lower BIC.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 与 AIC 类似，当比较两个模型时，倾向于选择 BIC 较低的模型。
- en: 2.3 Leave-One-Out Cross-Validation (LOOCV) and k-Fold Cross-Validation
  id: totrans-64
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.3 留一法交叉验证（LOOCV）和 k-Fold 交叉验证
- en: 'Another widely used method for model selection is **leave-one-out cross-validation
    (LOOCV)**. In this approach, the risk estimator is defined as:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种广泛使用的模型选择方法是**留一法交叉验证（LOOCV）**。在这种方法中，风险估计器定义为：
- en: '![](../Images/ba997345ea6ad0a7a5fdb261f05b5f60.png)'
  id: totrans-66
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ba997345ea6ad0a7a5fdb261f05b5f60.png)'
- en: where Ŷ₋ᵢ(𝑆) is the prediction for 𝑌ᵢ using model 𝑆 fitted on all observations
    except the *i*-th one, and 𝑌ᵢ is the actual response for the *i*-th observation.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 Ŷ₋ᵢ(𝑆) 是使用除第 *i*-th 个观测值外的所有观测值拟合的模型 𝑆 对 𝑌ᵢ 的预测，而 𝑌ᵢ 是第 *i*-th 个观测的实际响应。
- en: 'It can be shown that:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 可以证明：
- en: '![](../Images/7903ee71ba73b43871408f8bc8878ddf.png)'
  id: totrans-69
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7903ee71ba73b43871408f8bc8878ddf.png)'
- en: 'where hᵢᵢ(𝑆) is the *i*-th diagonal element of the hat matrix: H[S] = X[S]
    (X[S]ᵀ X[S])⁻¹ X[S]ᵀ for the model S.'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 hᵢᵢ(𝑆) 是帽子矩阵 H[S] = X[S] (X[S]ᵀ X[S])⁻¹ X[S]ᵀ 的 *i*-th 对角元素：对于模型 S。
- en: This formulation shows that it is unnecessary to refit the model repeatedly
    by leaving out one observation at a time. Instead, LOOCV can be computed directly
    using the fitted values and the hat matrix.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 这个公式表明没有必要通过每次留出一个观测值来反复重新拟合模型。相反，LOOCV 可以直接使用拟合值和帽子矩阵来计算。
- en: A natural extension of LOOCV is **k-fold cross-validation**, where the data
    is partitioned into *k* folds, and the model is trained on *k − 1* folds and validated
    on the remaining fold. This process is repeated across all folds, and the results
    are averaged to estimate prediction error.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: LOOCV 的自然扩展是 **k-fold 交叉验证**，其中数据被划分为 *k* 组，模型在 *k − 1* 组上训练并在剩余的组上验证。这个过程在所有组上重复进行，并将结果平均以估计预测误差。
- en: K-Fold Cross-Validation
  id: totrans-73
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: K-Fold 交叉验证
- en: 'In this approach, the data is divided into 𝑘 groups, or *folds* (commonly 𝑘
    = 5 or 𝑘 = 10). One fold is left out, and the model is fitted on the remaining
    𝑘 − 1 folds. The fitted model is then used to predict the responses in the omitted
    fold. The risk for that fold is estimated as:'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种方法中，数据被分为 𝑘 组，或称为 *folds*（通常 𝑘 = 5 或 𝑘 = 10）。留出一组，然后在剩下的 𝑘 − 1 组上拟合模型。然后使用拟合的模型来预测被省略的组中的响应。该组的风险估计如下：
- en: '![](../Images/fdf87cb7c8a516d5d85061aa0d7a4220.png)'
  id: totrans-75
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/fdf87cb7c8a516d5d85061aa0d7a4220.png)'
- en: where the sum is taken over all observations in the omitted fold. This procedure
    is repeated for each of the 𝑘 folds, and the overall risk estimate is obtained
    by averaging the 𝑘 individual risk values.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 其中求和是对省略的折叠中的所有观测值进行的。此过程对每个𝑘折叠重复进行，并通过平均𝑘个单独的风险值来获得整体风险估计。
- en: This method is particularly suitable when the primary goal of regression is
    **prediction**. In this setting, alternative performance measures [such as the
    **Mean Absolute Error (MAE)** or the **Root Mean Squared Error (RMSE)**] can also
    be used to evaluate predictive accuracy.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 此方法特别适合当回归的主要目标是**预测**时。在这种情况下，也可以使用其他性能指标[如**平均绝对误差（MAE）**或**均方根误差（RMSE）**]来评估预测精度。
- en: 2.4 Other criteria
  id: totrans-78
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2.4 其他标准
- en: 'In the literature, in addition to the criteria discussed above, several other
    measures are commonly used for model selection. One widely used option is the
    **adjusted coefficient of determination**, defined as:'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 在文献中，除了上述讨论的标准外，还常用其他一些措施进行模型选择。一个广泛使用的选项是**调整后的确定系数**，定义为：
- en: '![](../Images/30fba9c75ec8c0304f7dc45d8a118bb6.png)'
  id: totrans-80
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/30fba9c75ec8c0304f7dc45d8a118bb6.png)'
- en: 'Another approach is to use **nested model tests**, such as the **F-test**.
    The F-test compares two nested models: a smaller model 𝑆₁, whose covariates form
    a subset of those in a larger model 𝑆₂. The null hypothesis states that the additional
    variables in 𝑆₂ do not significantly improve the fit relative to 𝑆₁.'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种方法是使用**嵌套模型检验**，例如**F检验**。F检验比较两个嵌套模型：一个较小的模型𝑆₁，其协变量是较大模型𝑆₂中协变量的子集。零假设表明𝑆₂中额外的变量相对于𝑆₁并没有显著提高拟合度。
- en: 'Overall, the methods presented above primarily address the two central objectives
    of linear regression: **parameter estimation** and **variable selection**.'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 总体而言，上述方法主要针对线性回归的两个核心目标：**参数估计**和**变量选择**。
- en: Having defined several ways to score a model, the remaining question is how
    to search the set of candidates to find the model with the best score.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 定义了多种评分模型的方法后，剩下的问题是如何搜索候选集以找到评分最高的模型。
- en: 3\. Selection Procedure
  id: totrans-84
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3. 选择程序
- en: 'Once models can be scored, the next step is to search either the entire space
    of possible models or a selected subset to identify the one with the best score.
    With 𝑘 covariates, there are 2^k−1 possible models [a number that quickly becomes
    impractical for large 𝑘 (for instance, more than one million models when 𝑘 = 20].
    In such cases, exhaustive search is computationally infeasible, and heuristic
    methods are preferred. Broadly, model selection strategies fall into two categories:
    **exhaustive search** and **stepwise search**.'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦模型可以评分，下一步是搜索所有可能的模型空间或选定的子集，以确定评分最高的模型。对于𝑘个协变量，有2^𝑘−1个可能的模型[这个数字在𝑘较大时很快就会变得不切实际（例如，当𝑘=20时，超过一百万个模型）]。在这种情况下，穷举搜索在计算上是不可行的，因此更倾向于使用启发式方法。总的来说，模型选择策略可以分为两大类：**穷举搜索**和**逐步搜索**。
- en: 3.1 Exhaustive Search
  id: totrans-86
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.1 穷举搜索
- en: This approach evaluates every possible model and selects the one with the best
    score. It is feasible only when 𝑘 is small, as the computational burden becomes
    prohibitive with a large number of covariates.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法评估了所有可能的模型，并选择评分最高的模型。这种方法仅在𝑘较小的情况下可行，因为随着协变量数量的增加，计算负担变得难以承受。
- en: 3.2 Stepwise Search
  id: totrans-88
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.2 逐步搜索
- en: Stepwise methods aim to identify a *local optimum*—a model that performs better
    than its immediate neighbors. These methods are generally recommended only when
    exhaustive search is not feasible (e.g., when both 𝑛 and 𝑝 are large).
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 逐步方法旨在识别一个**局部最优解**——一个比其直接邻居表现更好的模型。这些方法通常只在穷举搜索不可行时推荐（例如，当𝑛和𝑝都很大时）。
- en: 3.2.1 Forward Stepwise Selection
  id: totrans-90
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 3.2.1 前向逐步选择
- en: Choose a scoring criterion (e.g., AIC, BIC, Mallows’ 𝐶ₚ).
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 选择一个评分标准（例如，AIC，BIC，Mallows的𝐶ₚ）。
- en: Start with an empty model.
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从一个空模型开始。
- en: At each step, add the variable that provides the greatest improvement in the
    criterion.
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在每一步中，添加能提供最大改进的变量。
- en: Continue until no variable improves the score or all variables are included
    in the model.
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 继续进行，直到没有变量能提高评分或所有变量都包含在模型中。
- en: 3.2.2 Backward Stepwise Selection
  id: totrans-95
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 3.2.2 后向逐步选择
- en: Choose a scoring criterion (e.g., AIC, BIC, Mallows’ 𝐶ₚ).
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 选择一个评分标准（例如，AIC，BIC，Mallows的𝐶ₚ）。
- en: Start with the full model containing all variables.
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从包含所有变量的完整模型开始。
- en: At each step, remove the variable whose removal yields the greatest improvement
    in the criterion.
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在每一步中，移除移除后能带来最大改进标准的变量。
- en: Continue until no further improvement is possible or only the essential variables
    remain.
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 继续进行，直到没有进一步的改进可能或只剩下必要的变量。
- en: 3.2.3 Stepwise Selection (Mixed Method)
  id: totrans-100
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 3.2.3 步骤选择（混合方法）
- en: Choose a scoring criterion (e.g., AIC, BIC, Mallows’ 𝐶ₚ).
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 选择一个评分标准（例如，AIC，BIC，Mallows 的 𝐶ₚ）。
- en: Start with an empty model and add variables one at a time, as in forward selection,
    until no variable further improves the score.
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从一个空模型开始，逐个添加变量，就像向前选择一样，直到没有变量能进一步改进得分。
- en: Then proceed as in backward selection, removing variables one at a time if doing
    so improves the criterion.
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 然后按照向后选择的方式继续，如果这样做能改进标准，则一次移除一个变量。
- en: Stop when no additional improvement can be achieved or when all variables are
    included.
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当无法实现进一步改进或所有变量都已包含时停止。
- en: The next section is how to apply it on real data.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个部分是关于如何在真实数据上应用它的方法。
- en: 4\. Application
  id: totrans-106
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4. 应用
- en: 'In practice, before applying model selection techniques, it is essential to
    ensure that the covariates are not highly correlated. The following procedure
    can be applied:'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 在实践中，在应用模型选择技术之前，确保协变量之间没有高度相关性是至关重要的。以下程序可以应用：
- en: '**Preliminary filtering**: Remove covariates that are clearly irrelevant to
    the response variable (based on expert judgment, treatment of missing values,
    etc.).'
  id: totrans-108
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**初步过滤**：移除显然与响应变量无关的协变量（基于专家判断、处理缺失值等）。'
- en: '**Correlation with the response variable**: Define a threshold for the correlation
    between each covariate and the response variable (e.g., 0.6). Covariates below
    this threshold may be excluded. *(Here, we will not apply this filter to retain
    a sufficient number of covariates for selection.)*'
  id: totrans-109
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**与响应变量的相关性**：为每个协变量与响应变量之间的相关性定义一个阈值（例如，0.6）。低于此阈值的协变量可能被排除。（在此，我们将不应用此过滤器以保留足够数量的协变量进行选择。）'
- en: '**Correlation among covariates**: Define a threshold for pairwise correlations
    between covariates (e.g., 0.7). Compute the correlation matrix; if two covariates
    exceed the threshold, keep the one with the strongest correlation with the response
    variable or the one with greater interpretability from a domain perspective.'
  id: totrans-110
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**协变量之间的相关性**：为协变量之间的成对相关性定义一个阈值（例如，0.7）。计算相关矩阵；如果两个协变量的相关性超过阈值，则保留与响应变量相关性最强的一个或从领域角度更具可解释性的一个。'
- en: '**Variance Inflation Factor (VIF)**: Compute the VIF for all remaining covariates.
    If a covariate’s VIF exceeds 5 or 10, it is considered highly collinear with others
    and should be removed.'
  id: totrans-111
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**方差膨胀因子 (VIF)**: 计算所有剩余协变量的 VIF。如果一个协变量的 VIF 超过 5 或 10，则认为它与其它变量高度共线性，应该被移除。'
- en: '**Model selection**: Apply the chosen model selection techniques. In this case,
    we will use Mallows’ 𝐶ₚ as the scoring criterion and backward stepwise selection
    as the variable selection method.'
  id: totrans-112
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**模型选择**：应用选定的模型选择技术。在这种情况下，我们将使用 Mallows 的 𝐶ₚ 作为评分标准，并使用向后逐步选择作为变量选择方法。'
- en: Finally, we will implement a **stepwise selection procedure** that can incorporate
    all the criteria discussed above (AIC, BIC, Mallows’ 𝐶ₚ, etc.) under either forward
    or backward strategies. This unified approach will allow us to compare models
    and select the one that best balances goodness of fit and complexity.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们将实施一个可以结合上述所有标准（AIC，BIC，Mallows 的 𝐶ₚ 等）的**逐步选择程序**，无论是向前还是向后策略。这种统一的方法将使我们能够比较模型并选择一个在拟合优度和复杂性之间取得最佳平衡的模型。
- en: To illustrate the procedure, let us now present the dataset that will be used
    for the analysis.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 为了说明这个程序，我们现在将展示用于分析的数据集。
- en: 4.1 Presentation of the Dataset
  id: totrans-115
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.1 数据集的展示
- en: We use the **Communities and Crime** dataset from the UCI Machine Learning Repository,
    which contains socio-economic and demographic information about U.S. communities.
    The dataset includes more than 100 variables. The **response variable** is the
    number of violent crimes per population (`violentCrimesPerPop`). Our goal is to
    apply the model selection techniques discussed above to identify the covariates
    most strongly associated with this response.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用来自 UCI 机器学习仓库的**社区与犯罪**数据集，该数据集包含关于美国社区的社会经济和人口统计信息。该数据集包括超过 100 个变量。**响应变量**是每人口暴力犯罪的数量（`violentCrimesPerPop`）。我们的目标是应用上述讨论的模型选择技术来识别与这个响应最强烈相关的协变量。
- en: 4.2 Handling Missing Values
  id: totrans-117
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.2 处理缺失值
- en: For this analysis, we remove all rows containing missing values.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这次分析，我们移除了所有包含缺失值的行。
- en: 'An alternative strategy would be to:'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种策略可以是：
- en: Drop variables with a high proportion of missingness (e.g., >10%), and
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 删除缺失值比例高的变量（例如，>10%），并且
- en: Assess whether the remaining missing values are **Missing At Random (MAR)**,
    Missing Completely at Random (MCAR), or Missing Not at Random (MNAR), applying
    an appropriate imputation method if necessary.
  id: totrans-121
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 评估剩余的缺失值是否为 **随机缺失 (MAR)**、**完全随机缺失 (MCAR)** 或 **非随机缺失 (MNAR)**，如有必要，应用适当的插补方法。
- en: 'Here, however, we adopt the simpler approach of discarding all incomplete rows.
    After this step, the dataset contains no missing values and includes **103 variables**
    in total: the response variable `violentCrimesPerPop` plus the covariates.'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我们采用更简单的方法，即丢弃所有不完整的行。在此步骤之后，数据集不包含缺失值，并包含总共 **103 个变量**：响应变量 `violentCrimesPerPop`
    加上协变量。
- en: 4.3 Selection of Relevant Variables Using Expert Judgment
  id: totrans-123
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.3 使用专家判断选择相关变量
- en: We then apply **expert judgment** to assess the relevance of each variable and
    determine whether its correlation with the response is meaningful. This requires
    consultation between the statistician and domain experts to understand the context
    and importance of each covariate.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们应用 **专家判断** 来评估每个变量的相关性，并确定其与响应的相关性是否有意义。这需要统计学家和领域专家之间的协商，以了解每个协变量的背景和重要性。
- en: 'For this dataset, we remove:'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这个数据集，我们删除：
- en: '`communityname` (a categorical variable with many levels), and'
  id: totrans-126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`communityname`（具有许多级别的分类变量），并且'
- en: '`fold` (a technical variable used only for cross-validation).'
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`fold`（仅用于交叉验证的技术变量）。'
- en: 'After this filtering step, we retain **101 variables**: the response `violentCrimesPerPop`
    and 100 covariates.'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 在此过滤步骤之后，我们保留了 **101 个变量**：响应变量 `violentCrimesPerPop` 和 100 个协变量。
- en: 4.4 Reducing Covariates Using a Correlation Threshold
  id: totrans-129
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 4.4 使用相关阈值减少协变量
- en: To further reduce dimensionality, we compute the **correlation matrix** of the
    covariates and the response. When several covariates are highly correlated with
    each other (correlation > 0.6), we retain only the one with the strongest correlation
    to the response. This procedure reduces redundancy while mitigating multicollinearity.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 为了进一步降低维度，我们计算协变量和响应的 **相关矩阵**。当多个协变量之间高度相关（相关系数 > 0.6）时，我们仅保留与响应最强的那个。此程序减少了冗余，同时减轻了多重共线性。
- en: After applying this filtering and computing the **Variance Inflation Factor
    (VIF)**, we retain a final set of **19 covariates** with VIF values below 5.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 在应用此过滤和计算 **方差膨胀因子 (VIF)** 后，我们保留最终的一组 **19 个协变量**，其 VIF 值低于 5。
- en: '![](../Images/b09de01648c63f3933343076013aa1da.png)'
  id: totrans-132
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/b09de01648c63f3933343076013aa1da.png)'
- en: '**Table 1 : Variance inflation factor of covariates.**'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: '**表 1：协变量的方差膨胀因子。**'
- en: 'These preprocessing steps are explained in greater detail in my article: [Feature
    Selection](https://towardsdatascience.com/multiple-linear-regression-analysis/).
    Now, let us apply our **selection procedure** to identify the most relevant variables'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 这些预处理步骤在我文章中有更详细的解释：[特征选择](https://towardsdatascience.com/multiple-linear-regression-analysis/)。现在，让我们应用我们的
    **选择程序** 来识别最相关的变量
- en: 4.5 Model Selection with Stepwise Selection
  id: totrans-135
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 4.5 使用逐步选择进行模型选择
- en: With 19 variables, the total number of possible models is 2^(19)-1 = 524,287,
    which can be computationally infeasible for many systems. To reduce the search
    space, we use a **stepwise selection procedure**. We implement a function, `stepwise_selection`,
    that identifies the most relevant variables based on a chosen selection criterion
    and method (forward, backward, or mixed). In this example, we use **Mallows’ 𝐶ₚ**
    as the selection criterion and apply both forward and backward stepwise selection
    methods.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 有 19 个变量，可能的模型总数为 2^(19)-1 = 524,287，对于许多系统来说可能计算上不可行。为了减少搜索空间，我们使用 **逐步选择程序**。我们实现了一个函数，`stepwise_selection`，它根据选择的选取标准和方法（正向、逆向或混合）识别最相关的变量。在这个例子中，我们使用
    **Mallows’ 𝐶ₚ** 作为选择标准，并应用了正向和逆向逐步选择方法。
- en: 4.5.1 Backward Stepwise Selection Using Mallows’ 𝐶ₚ
  id: totrans-137
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 4.5.1 使用 Mallows’ 𝐶ₚ 进行逆向逐步选择
- en: 'Applying backward selection with Mallows’ 𝐶ₚ, we proceed as follows:'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 应用 Mallows’ 𝐶ₚ 的逆向选择，我们按以下步骤进行：
- en: '**Step 1:** Remove `pctWFarmSelf`. Its exclusion reduces the criterion to 𝐶ₚ
    = 41.74, lower than the full model.'
  id: totrans-139
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**步骤 1：** 删除 `pctWFarmSelf`。其排除将标准降低到 𝐶ₚ = 41.74，低于完整模型。'
- en: '**Step 2:** Remove `PctWOFullPlumb`. This further decreases 𝐶ₚ to 41.69895.'
  id: totrans-140
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**步骤 2：** 删除 `PctWOFullPlumb`。这进一步将 𝐶ₚ 降低到 41.69895。'
- en: '**Step 3:** Remove `indianPerCap`. The criterion is reduced again to 𝐶ₚ = 41.66073.'
  id: totrans-141
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**步骤 3：** 删除 `indianPerCap`。标准再次降低到 𝐶ₚ = 41.66073。'
- en: In total, **three variables are removed**, yielding the final model.
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 总共**移除了三个变量**，得到了最终的模型。
- en: 4.5.2 Forward Stepwise Selection Using Mallows’ 𝐶ₚ
  id: totrans-143
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 4.5.2 使用Mallows的𝐶ₚ进行正向逐步选择
- en: Forward stepwise selection is generally recommended when the number of variables
    is large, since it is less computationally demanding than backward selection.
    Starting from an empty model, variables are added sequentially, one at a time,
    according to the criterion improvement.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 当变量数量较多时，通常推荐使用正向逐步选择，因为它比反向选择计算量要求小。从一个空模型开始，根据改进标准，逐个添加变量。
- en: In this example, forward selection identifies **the same set of variables**
    as backward selection. The Figure 1 below illustrates the sequence of variables
    added to the model, along with their corresponding 𝐶ₚ values. The process begins
    with `PctKids2Par`, followed by `PctWorkMom`, `LandArea`, and continues until
    the final model is reached, achieving a criterion value of 𝐶ₚ = 41.66.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，正向选择识别出与反向选择**相同的变量集**。下面的图1展示了添加到模型中的变量序列及其相应的𝐶ₚ值。过程从`PctKids2Par`开始，接着是`PctWorkMom`、`LandArea`，并继续直到达到最终模型，其标准值为𝐶ₚ
    = 41.66。
- en: '![](../Images/d3c0de8ac9ea344d613d78082f4c714c.png)'
  id: totrans-146
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/d3c0de8ac9ea344d613d78082f4c714c.png)'
- en: '**Figure 1\. Variable selection based on Mallows’ Cp​ criterion. The corresponding
    Python implementation is provided in the appendix.**'
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: '**图1. 基于Mallows的𝐶ₚ准则的变量选择。相应的Python实现见附录。**'
- en: '**Warning!** This does not yet address the question of which variables are
    causes of the independent variable.'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: '**警告！** 这尚未解决哪些变量是独立变量的原因的问题。'
- en: Conclusion
  id: totrans-149
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this article, we addressed the question of model selection. The core principle
    of the procedure is to assign a score to each model in order to measure its quality,
    and then to search through the set of possible models to identify the one with
    the best score. This score is defined by balancing both the quality of fit and
    the complexity of the model.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我们讨论了模型选择的问题。该过程的核心原则是为每个模型分配一个分数以衡量其质量，然后搜索所有可能的模型集合以识别得分最高的模型。这个分数是通过平衡拟合质量和模型复杂度来定义的。
- en: 'Among the available procedures, we presented the stepwise forward and backward
    methods, which we implemented in Python. We applied them using different evaluation
    criteria: AIC, BIC, and Mallows’ C[P].'
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 在可用的程序中，我们介绍了逐步正向和反向方法，我们使用Python实现了它们。我们应用了不同的评估标准：AIC、BIC和Mallows的C[P]。
- en: 'These methods, however, have a limitation: they explore a subset of all possible
    models. As a result, the selected models may sometimes represent oversimplifications
    of reality. Nevertheless, they remain very useful when the number of variables
    is large and exhaustive approaches become computationally too expensive.'
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，这些方法有一个局限性：它们只探索所有可能模型的一个子集。因此，选定的模型有时可能代表现实的一种过度简化。尽管如此，当变量数量较多且穷举方法计算成本过高时，它们仍然非常有用。
- en: 'Finally, when dealing with regression for predictive purposes, it is essential
    to split the dataset into two parts: training and test sets. Variable selection
    must be carried out **exclusively** on the training set; and never on the test
    set in order to ensure an honest evaluation of the model’s predictive performance.'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，在处理预测目的的回归时，将数据集分为两部分：训练集和测试集至关重要。变量选择必须仅在训练集上执行；绝不能在测试集上执行，以确保对模型预测性能的诚实评估。
