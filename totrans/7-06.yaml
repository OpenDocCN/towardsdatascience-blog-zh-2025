- en: Annex I
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Brief commentary on the status of the Flare Index Dataset (NOAA), Kandilli Observatory.
  prefs: []
  type: TYPE_NORMAL
- en: The dataset status is not satisfactory. It is hard and painfully slow to navigate
    (considered programming and using a webscraper, but ended up downloading files
    from 1976 to 2023 manually which took around an hour). The formatting is extremely
    inconsistent. In my repo, I analyze in more detail these problems.
  prefs: []
  type: TYPE_NORMAL
- en: I would like to remark that having access to precious data like this is extremely
    helpful for research, and that by no means I’m trying to disregard or undermine
    the work done by Kandil Observatory and Bogazici University. I do believe, though,
    that it is a pity that such accurate and important data as this has become complicated
    to utilize due to poor maintenance.
  prefs: []
  type: TYPE_NORMAL
- en: In this repository I share a python script which is able to clean up and reformat
    the data. Feel free to use it or tweak it if needed.
  prefs: []
  type: TYPE_NORMAL
- en: GitHub repository with code and clean dataset
  prefs:
