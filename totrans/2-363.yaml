- en: 'Clustering Eating Behaviors in Time: A Machine Learning Approach to Preventive
    Health'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/clustering-eating-behaviors-in-time-a-machine-learning-approach-to-preventive-health/](https://towardsdatascience.com/clustering-eating-behaviors-in-time-a-machine-learning-approach-to-preventive-health/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: It’s well <mdspan datatext="el1746728528988" class="mdspan-comment">known</mdspan>
    that *what* we eat matters — but what if *when* and *how often* we eat matters
    just as much?
  prefs: []
  type: TYPE_NORMAL
- en: In the midst of ongoing scientific debate around the benefits of **intermittent
    fasting**, this question becomes even more intriguing. As someone passionate about
    machine learning and healthy living, I was inspired by a 2017 research paper[1]
    exploring this intersection. The authors introduced a novel distance metric called **Modified
    Dynamic Time Warping (MDTW)** — a technique designed to account not only for the
    nutritional content of meals but also their **timing** throughout the day.
  prefs: []
  type: TYPE_NORMAL
- en: Motivated by their work[1], I built a full implementation of MDTW from scratch
    using Python. I applied it to cluster simulated individuals into **temporal dietary
    patterns**, uncovering distinct behaviors like skippers, snackers, and night eaters.
  prefs: []
  type: TYPE_NORMAL
- en: While MDTW may sound like a niche metric, it fills a critical gap in time-series
    comparison. Traditional distance measures — such as Euclidean distance or even
    classical Dynamic Time Warping (DTW) — struggle when applied to dietary data.
    People don’t eat at fixed times or with consistent frequency. They skip meals,
    snack irregularly, or eat late at night.
  prefs: []
  type: TYPE_NORMAL
- en: '**MDTW is designed for exactly this kind of temporal misalignment and behavioral
    variability.** By allowing flexible alignment while penalizing mismatches in both
    nutrient content and meal timing, MDTW reveals subtle but meaningful differences
    in how people eat.'
  prefs: []
  type: TYPE_NORMAL
- en: 'What this article covers:'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Mathematical foundation of MDTW** — explained intuitively.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**From formula to code** — implementing MDTW in Python with dynamic programming.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Generating synthetic dietary data** to simulate real-world eating behavior.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Building a distance matrix** between individual eating records.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Clustering individuals** with K-Medoids and evaluating with silhouette and
    elbow methods.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Visualizing clusters** as scatter plots and joint distributions.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Interpreting temporal patterns** from clusters: who eats when and how much?'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Quick Note on Classical Dynamic Time Warping (DTW)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Dynamic Time Warping (DTW) is a classic algorithm used to measure similarity
    between two sequences that may vary in length or timing. It’s widely used in speech
    recognition, gesture analysis, and time series alignment. Let’s see a very simple
    example of the Sequence A is aligned to Sequence B (shifted version of B) with
    using traditional dynamic time warping algorithm using *fastdtw* library. As input,
    we give a distance metric as Euclidean. Also, we put time series to calculate
    the distance between these time series and optimized aligned path.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/8377bbbfdd4e5936ea47b6e4fd7d0ad4.png)'
  prefs: []
  type: TYPE_IMG
- en: Illustration of the application of dynamic time warping to two time series (Image
    by author)
  prefs: []
  type: TYPE_NORMAL
- en: The path returned by `fastdtw` (or any DTW algorithm) is a sequence of index
    pairs `(i, j)` that represent the optimal alignment between two time series. Each
    pair indicates that element `A[i]` is matched with `B[j]`. By summing the distances
    between all these matched pairs, the algorithm computes the **optimized cumulative
    cost** — the minimum total distance required to warp one sequence to the other.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/5baf03443355f07a44c5f12727c8f3f6.png)'
  prefs: []
  type: TYPE_IMG
- en: Modified Dynamic Warping
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The key challenge when applying **dynamic time warping (DTW)** to **dietary
    data** (vs. simple examples like sine waves or fixed-length sequences) lies in
    the **complexity and variability** of real-world eating behaviors. Some challenges
    and the proposed solution in the paper[1] as a response to each challenge are
    as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Irregular Time Steps: MDTW accounts for this by explicitly incorporating the
    time difference in the distance function.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Multidimensional Nutrients: MDTW supports multidimensional vectors to represent
    nutrients such as calories, fat etc. and uses a weight matrix to handle differing
    units and the importance of nutrients,'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Unequal number of meals: MDTW allows for **matching with empty eating events**,
    penalizing skipped or unmatched meals appropriately.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Time Sensitivity: MDTW includes **a time difference penalty**, weighting eating
    events far apart in time even if the nutrients are similar.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Eating Occasion Data Representation
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'According to the modified dynamic time warping proposed in the paper[1], each
    person’s diet can be thought of as a **sequence of eating events**, where each
    event has:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/2a9a932bef40c9f91d1e17baae9b86f0.png)'
  prefs: []
  type: TYPE_IMG
- en: 'To illustrate how eating records appear in real data, I created **three synthetic
    dietary profiles** only considering calorie consumption — **Skipper**, **Night
    Eater**, and **Snacker.** Let’s assume if we ingest the raw data from an API in
    this format:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: As suggested in the paper, the nutritional values should be normalized by the
    total calorie consumptions.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/1b4672b48a7934f5bbd29fb8666a29b5.png)'
  prefs: []
  type: TYPE_IMG
- en: Plot of eating occasion of three different profiles (Image by author)
  prefs: []
  type: TYPE_NORMAL
- en: Calculation Distance of Pairs
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The computation of distance measure between pair of individuals are defined
    in the formula below. The first term represent an Euclidean distance of nutrient
    vectors whereas the second one takes into account the time penalty.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b8959b77c0dfd6a12933fafbe4160ce5.png)'
  prefs: []
  type: TYPE_IMG
- en: 'This formula is implemented in the `local_distance` function with the suggested
    values:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: We construct a local distance matrix *deo*(*i*,*j*) for each pair of individuals
    being compared. The number of rows and columns in this matrix corresponds to the
    number of eating occasions for each individual.
  prefs: []
  type: TYPE_NORMAL
- en: 'Once the local distance matrix deo(i,j) is constructed — capturing the pairwise
    distances between all eating occasions of two individuals — the next step is to
    compute the **global cost matrix** dER(i,j). This matrix accumulates the minimal
    alignment cost by considering three possible transitions at each step: matching
    two eating occasions, skipping an occasion in the first record (aligning to an
    empty), or skipping an occasion in the second record.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/390d0d247fe7b73f7bee0c7e53650d96.png)'
  prefs: []
  type: TYPE_IMG
- en: 'To compute the **overall distance** between two sequences of eating occasions,
    we build:'
  prefs: []
  type: TYPE_NORMAL
- en: A **local distance matrix** `deo` filled using `local_distance`.
  prefs: []
  type: TYPE_NORMAL
- en: 'A **global cost matrix** `dER` using dynamic programming, minimizing over:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Match
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Skip in the first sequence (align to empty)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Skip in the second sequence
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'These directly implement the recurrence:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: From Pairwise Comparisons to a Distance Matrix
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Once we define how to calculate the distance between two individuals’ eating
    patterns using MDTW, the next natural step is to compute distances across the
    **entire dataset**. To do this, we construct a distance matrix where each entry
    (i,j) represents the MDTW distance between person i and person j.
  prefs: []
  type: TYPE_NORMAL
- en: 'This is implemented in the function below:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: After computing the pairwise Modified Dynamic Time Warping (MDTW) distances,
    we can **visualize the similarities and differences** between individuals’ dietary
    patterns using a heatmap. Each cell (i,j) in the matrix represents the MDTW distance
    between person i and person j— lower values indicate more similar temporal eating
    profiles.
  prefs: []
  type: TYPE_NORMAL
- en: This heatmap offers a **compact and interpretable view** of dietary dissimilarities,
    making it easier to identify clusters of similar eating behaviors.
  prefs: []
  type: TYPE_NORMAL
- en: This indicates that `skipper_1` **shares more similarity with** `night_eater_1`
    than with `snacker_1`. The reason is that both skipper and night eater have **fewer,
    larger meals concentrated later in the day**, while the snacker distributes smaller
    meals more evenly across the entire timeline.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/bea14bfa5050af85daa775165a2e7712.png)'
  prefs: []
  type: TYPE_IMG
- en: Distance Matrix Heatmap (Image by author)
  prefs: []
  type: TYPE_NORMAL
- en: '**Clustering Temporal Dietary Patterns**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: After calculating the pairwise distances using Modified Dynamic Time Warping
    (MDTW), we’re left with a distance matrix that reflects how dissimilar each individual’s
    eating pattern is from the others. But this matrix alone doesn’t tell us much
    at a glance — to reveal structure in the data, we need to go one step further.
  prefs: []
  type: TYPE_NORMAL
- en: Before applying any clustering algorithm, we first need a dataset that reflects
    realistic dietary behaviors. Since access to large-scale dietary intake datasets
    can be limited or subject to usage restrictions, I generated synthetic eating
    event records that simulate diverse daily patterns. Each record represents a person’s
    calorie intake at specific hours throughout a 24-hour period.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: Choosing the Optimal Number of Clusters
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'To determine the appropriate number of clusters for grouping dietary patterns,
    I evaluated two popular methods: the **Elbow Method** and the **Silhouette Score**.'
  prefs: []
  type: TYPE_NORMAL
- en: The **Elbow Method** analyzes the clustering cost (inertia) as the number of
    clusters increases. As shown in the plot, the cost decreases sharply up to **4
    clusters**, after which the rate of improvement slows significantly. This “elbow”
    suggests diminishing returns beyond 4 clusters.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The **Silhouette Score**, which measures how well each object lies within its
    cluster, showed a relatively high score at **4 clusters** (≈0.50), even if it
    wasn’t the absolute peak.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/90ac4cb8a72c71df3fb895c0a285e2a3.png)'
  prefs: []
  type: TYPE_IMG
- en: Optimal number of cluster (Image by author)
  prefs: []
  type: TYPE_NORMAL
- en: 'The following code computes the clustering cost and silhouette scores for different
    values of *k* (number of clusters), using the **K-Medoids** algorithm and a precomputed
    distance matrix derived from the MDTW metric:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: Interpreting the Clustered Dietary Patterns
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Once the optimal number of clusters (**k=4**) was determined, each individual
    in the dataset was assigned to one of these clusters using the K-Medoids model.
    Now, we need to understand what characterizes each cluster.
  prefs: []
  type: TYPE_NORMAL
- en: 'To do so, I followed the approach suggested in the original MDTW paper [1]:
    analyzing the **largest eating occasion** for every individual, defined by both
    the **time of day** it occurred and the **fraction of total daily intake** it
    represented. This provides insight into *when* people consume the most calories
    and *how much* they consume during that peak occasion.'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/942f2fcdf29fff53dab1d01575fd0fba.png)'
  prefs: []
  type: TYPE_IMG
- en: Each point represents an individual’s largest eating event (Image by author)
  prefs: []
  type: TYPE_NORMAL
- en: '**While the scatter plot offers a broad overview, a more detailed understanding
    of each cluster’s eating behavior can be gained by examining their joint distributions.**'
  prefs: []
  type: TYPE_NORMAL
- en: 'By plotting the joint histogram of the hour and fraction of daily intake for
    the largest meal, we can identify characteristic patterns, using the code below:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/279a2fa340800a654df669a40a7ce579.png)'
  prefs: []
  type: TYPE_IMG
- en: Each subplot represents the joint distribution of time (x-axis) and fractional
    calorie intake (y-axis) for individuals within a cluster. Higher densities indicate
    common timings and portion sizes of the largest meals. (Image by author)
  prefs: []
  type: TYPE_NORMAL
- en: To understand how individuals were distributed across clusters, I visualized
    the number of people assigned to each cluster. The bar plot below shows the frequency
    of individuals grouped by their temporal dietary pattern. This helps assess whether
    certain eating behaviors — such as skipping meals, late-night eating, or frequent
    snacking — are more prevalent in the population.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/632d239e7f872903da2c1b27da435b66.png)'
  prefs: []
  type: TYPE_IMG
- en: Histogram showing the number of individuals assigned to each dietary pattern
    cluster (Image by author)
  prefs: []
  type: TYPE_NORMAL
- en: '**Based on the joint distribution plots**, distinct temporal dietary behaviors
    emerge across clusters:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Cluster 0** (Flexible or Irregular Eater) reveals a **broad dispersion**
    of the largest eating occasions across both the **24-hour day** and the **fraction
    of daily caloric intake**.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Cluster 1** (Frequent Light Eaters) displays a **more evenly distributed
    eating pattern**, where no single eating occasion exceeds **30% of the total daily
    intake**, reflecting frequent but smaller meals throughout the day. This is the
    cluster that most likely represents **“normal eaters”** — those who consume **three
    relatively balanced meals spread throughout the day.** That is because of low
    variance in timing and fraction per eating event.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Cluster 2** (Early Heavy Eaters) is defined by a very **distinct and consistent
    pattern**: individuals in this group consume **almost their entire daily caloric
    intake (close to 100%) in a single meal**, predominantly during the **early hours
    of the day (midnight to noon)**.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Cluster 3** (Late Night Heavy Eaters) is characterized by individuals who
    consume **nearly all of their daily calories in a single meal during the late
    evening or night hours (between 6 PM and midnight)**. Like Cluster 2, this group
    exhibits a **unimodal eating pattern** with a **very high fractional intake (~1.0)**,
    indicating that most members eat **once per day**, but unlike Cluster 2, their
    eating window is significantly delayed.'
  prefs: []
  type: TYPE_NORMAL
- en: CONCLUSION
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In this project, I explored how **Modified Dynamic Time Warping (MDTW)** can
    help uncover temporal dietary patterns — focusing not just on what we eat, but
    **when** and **how much**. Using **synthetic data** to simulate realistic eating
    behaviors, I demonstrated how MDTW can cluster individuals into distinct profiles
    like irregular or flexible eaters, frequent light eaters, early heavy eaters and
    later night eaters based on the timing and magnitude of their meals.
  prefs: []
  type: TYPE_NORMAL
- en: 'While the results show that MDTW combined with **K-Medoids** can reveal meaningful
    patterns in eating behaviors, this approach isn’t without its challenges. Since
    the dataset was synthetically generated and clustering was based on a single initialization,
    there are several caveats worth noting:'
  prefs: []
  type: TYPE_NORMAL
- en: The clusters appear messy, possibly because the synthetic data lacks strong,
    naturally separable patterns — especially if meal times and calorie distributions
    are too uniform.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Some clusters overlap significantly, particularly **Cluster 0** and **Cluster
    1**, making it harder to distinguish between truly different behaviors.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Without labeled data or expected ground truth, evaluating cluster quality is
    difficult. A potential improvement would be to inject known patterns into the
    dataset to test whether the clustering algorithm can reliably recover them.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Despite these limitations, this work shows how a nuanced distance metric — designed
    for irregular, real-life patterns — can surface insights traditional tools may
    overlook. The methodology can be extended to **personalized health monitoring**,
    or any domain where **when things happen** matters just as much as **what happens**.
  prefs: []
  type: TYPE_NORMAL
- en: I’d love to hear your thoughts on this project — whether it’s feedback, questions,
    or ideas for where MDTW could be applied next. This is very much a work in progress,
    and I’m always excited to learn from others.
  prefs: []
  type: TYPE_NORMAL
- en: If you found this useful, have ideas for improvements, or want to collaborate,
    feel free to open an issue or send a Pull Request on GitHub. Contributions are
    more than welcome!
  prefs: []
  type: TYPE_NORMAL
- en: Thanks so much for reading all the way to the end — it really means a lot.
  prefs: []
  type: TYPE_NORMAL
