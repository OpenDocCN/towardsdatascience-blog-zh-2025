- en: How to Evaluate LLM Summarization
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何评估 LLM 摘要
- en: 原文：[https://towardsdatascience.com/how-to-evaluate-llm-summarization-18a040c3905d/](https://towardsdatascience.com/how-to-evaluate-llm-summarization-18a040c3905d/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/how-to-evaluate-llm-summarization-18a040c3905d/](https://towardsdatascience.com/how-to-evaluate-llm-summarization-18a040c3905d/)
- en: '![Image from Unsplash](../Images/def69b0a1ea3148bb04e26ce1a0f257f.png)'
  id: totrans-2
  prefs: []
  type: TYPE_IMG
  zh: '![图片来自 Unsplash](../Images/def69b0a1ea3148bb04e26ce1a0f257f.png)'
- en: Image from Unsplash
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 图片来自 Unsplash
- en: '**Summarization** is one of the most practical and convenient tasks enabled
    by LLMs. However, compared to other LLM tasks like question-asking or classification,
    evaluating LLMs on summarization is far more challenging.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: '**摘要** 是 LLMs 启动的最实用和方便的任务之一。然而，与其他 LLM 任务（如提问或分类）相比，评估 LLMs 在摘要上的表现要困难得多。'
- en: And so I myself have neglected evals for summarization, even though two apps
    I’ve built rely heavily on summarization (*Podsmart* summarizes podcasts, while
    *[aiRead](https://www.airead.me/)* creates personalized PDF summaries based on
    your highlights)
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我自己也忽视了摘要的评估，尽管我开发的两个应用程序严重依赖摘要（*Podsmart* 摘要播客，而 *[aiRead](https://www.airead.me/)*
    则根据您的突出显示创建个性化的 PDF 摘要）。
- en: But recently, I’ve been persuaded – thanks to insightful posts from thought
    leaders in the AI industry – of the critical role of evals in systematically assessing
    and improving LLM systems. ([[link](https://applied-llms.org/)](https://hamel.dev/blog/posts/evals/)
    and link). This motivated me to start investigating evals for summaries.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 但最近，我受到了启发——多亏了 AI 行业思想领袖的深刻见解——认识到评估在系统地评估和改进 LLM 系统中的关键作用。（[[链接](https://applied-llms.org/)](https://hamel.dev/blog/posts/evals/)
    和链接）。这激励我开始研究摘要的评估。
- en: So in this article, I will talk about an **easy-to-implement, research-backed
    and quantitative framework to evaluate summaries,** which improves on the Summarization
    metric in the [DeepEval](https://docs.confident-ai.com/docs/getting-started) framework
    created by Confident AI.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，在这篇文章中，我将讨论一个 **易于实施、基于研究和量化的框架来评估摘要**，它改进了 Confident AI 创建的 [DeepEval](https://docs.confident-ai.com/docs/getting-started)
    框架中的摘要指标。
- en: 'I will illustrate my process with an example notebook (code in [Github](https://github.com/thamsuppp/summary-eval-article)),
    attempting to evaluate a ~500-word summary of a ~2500-word article *Securing the
    AGI Laurel: Export Controls, the Compute Gap, and China’s Counterstrategy* (found
    [here](https://www.csis.org/analysis/securing-agi-laurel-export-controls-compute-gap-and-chinas-counterstrategy),
    published in December 2024).'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: '我将通过一个示例笔记本（代码在 [Github](https://github.com/thamsuppp/summary-eval-article)）来展示我的过程，尝试评估一篇约
    2500 字文章的约 500 字摘要 *Securing the AGI Laurel: Export Controls, the Compute Gap,
    and China’s Counterstrategy*（可在 [这里](https://www.csis.org/analysis/securing-agi-laurel-export-controls-compute-gap-and-chinas-counterstrategy)找到，发表于
    2024 年 12 月）。'
- en: Table of Contents
  id: totrans-9
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 目录
- en: ∘ [Why it’s difficult to evaluate summarization](#f083) ∘ [What makes a good
    summary](#05af) ∘ [Introduction to DeepEval](#60ce) ∘ [DeepEval’s Summarization
    Metric](#f6d5) ∘ [Improving the Summarization Metric](#8959) ∘ [Conciseness Metrics](#6a41)
    ∘ [Coherence Metric](#d06e) ∘ [Putting it all together](#7f21) ∘ [Future Work](#b3a6)
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: ∘ [为什么评估摘要很难](#f083) ∘ [什么使摘要好](#05af) ∘ [DeepEval 简介](#60ce) ∘ [DeepEval 的摘要指标](#f6d5)
    ∘ [改进摘要指标](#8959) ∘ [简洁性指标](#6a41) ∘ [连贯性指标](#d06e) ∘ [综合起来](#7f21) ∘ [未来工作](#b3a6)
- en: '**Why it’s difficult to evaluate summarization**'
  id: totrans-11
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**为什么评估摘要很难**'
- en: Before I start, let me elaborate on why I claim that summarization is a difficult
    task to evaluate.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 在我开始之前，让我详细说明为什么我认为摘要的评估是一个困难的任务。
- en: Firstly, the output of a summary is inherently open-ended (as opposed to tasks
    like classification or entity extraction). So, what makes a summary good depends
    on qualitative metrics such as fluency, coherence and consistency, which are not
    straightforward to measure quantitatively. Furthermore, these metrics are often
    subjective – for example, relevance depends on the context and audience.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，摘要的输出本质上是开放式的（与分类或实体提取等任务不同）。因此，什么使摘要变得好，取决于诸如流畅性、连贯性和一致性等定性指标，这些指标难以进行定量测量。此外，这些指标往往是主观的——例如，相关性取决于上下文和受众。
- en: Secondly, it is difficult to create gold-labelled datasets to evaluate your
    system’s summaries against. For RAG, it is straightforward to create a dataset
    of synthetic question-answer pairs to evaluate the retriever (see this [nice walkthrough](https://playbooks.capdev.govtext.gov.sg/appendix_dataset/)).
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 其次，创建用于评估系统摘要的带有金标签的数据集是困难的。对于RAG，创建一个合成问题-答案对的数据集来评估检索器是直接的（参见这个[很好的教程](https://playbooks.capdev.govtext.gov.sg/appendix_dataset/))。
- en: For summarization, there isn’t an obvious way to generate reference summaries
    automatically, so we have to turn to humans to create them. While researchers
    have curated summarization datasets, these would not be customized to your use
    case.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 对于摘要，没有明显的自动生成参考摘要的方法，所以我们不得不求助于人类来创建它们。虽然研究人员已经整理了摘要数据集，但这些数据集不会针对您的特定用例进行定制。
- en: Thirdly, I find that most summarization metrics in the academic literature are
    not suitable for practical-oriented AI developers to implement. Some papers trained
    neural summarization metrics (e.g. [Seahorse](https://github.com/google-research-datasets/seahorse),
    [Summac](https://github.com/tingofurro/summac) etc.), which are several GBs big
    and challenging to run at scale (*perhaps I’m just lazy and should learn how to
    run HuggingFace models locally and on a GPU cluster, but still it’s a barrier
    to entry for most*). Other traditional metrics such as BLEU and ROUGE rely on
    exact word/phrase overlap and were created in the pre-LLM era for extractive summarization,
    and may not work well for evaluating abstractive summaries generated by LLMs,
    which could paraphrase the source text.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 第三，我发现学术文献中的大多数摘要指标都不适合以实用为导向的AI开发者实现。一些论文训练了神经摘要指标（例如[Seahorse](https://github.com/google-research-datasets/seahorse)，[Summac](https://github.com/tingofurro/summac)等），这些指标有数GB大，并且在大规模运行时具有挑战性（*也许我只是懒惰，应该学习如何在本地和GPU集群上运行HuggingFace模型，但这对大多数人来说仍然是一个入门障碍*）。其他传统指标，如BLEU和ROUGE，依赖于精确的单词/短语重叠，并且是在LLM时代之前为提取式摘要而创建的，可能不适合评估由LLM生成的抽象摘要，这些摘要可能会改写源文本。
- en: Nevertheless, in my experience, humans can easily distinguish a good summary
    from a bad one. One common failure mode is being vague and roundabout-y (e.g.
    ‘*this summary describes the reasons for…’).*
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，根据我的经验，人类很容易区分一个好的摘要和一个不好的摘要。一种常见的失败模式是含糊其辞和拐弯抹角（例如，“*这个摘要描述了……的原因”）。*
- en: '**What makes a good summary**'
  id: totrans-18
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**什么是一个好的摘要**'
- en: 'So what is a good summary? Eugene Yan’s [article](https://eugeneyan.com/writing/abstractive/)
    offers good detail on various summary metrics. For me, I will distil them into
    4 key qualities:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，一个好的摘要是什么样的呢？Eugene Yan的[文章](https://eugeneyan.com/writing/abstractive/)对各种摘要指标提供了很好的细节。对我来说，我会将它们提炼成4个关键品质：
- en: '**Relevant** – the summary retains important points and details from the source
    text'
  id: totrans-20
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**相关** – 摘要保留了源文本中的重要观点和细节'
- en: '**Concise** – the summary is information-dense, does not repeat the same point
    multiple times, and is not unnecessarily verbose'
  id: totrans-21
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**简洁** – 摘要信息密集，不会多次重复相同的内容，也不会冗长'
- en: '**Coherent** – the summary is well-structured and easy to follow, not just
    a jumble of condensed facts'
  id: totrans-22
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**连贯** – 摘要有良好的结构，易于理解，不仅仅是压缩的事实杂乱无章'
- en: '**Faithful** – the summary does not hallucinate information that is not supported
    by the source text'
  id: totrans-23
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**忠实** – 摘要不会凭空捏造与源文本不支持的信息'
- en: One key insight is that you can actually formulate the first two as a **precision
    and recall** problem – how many facts from the source text are retained in the
    summary (**recall**), and how many facts from the summary are supported by the
    main text (**precision**).
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 一个关键的见解是，您实际上可以将前两点表述为一个**精确度和召回率**问题——摘要中保留了源文本中多少事实（**召回率**），以及摘要中有多少事实得到了主要文本的支持（**精确率**）。
- en: This formulation brings us back to more familiar territory of classification
    problems in ML, and suggests a quantitative way to evaluate summaries.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 这种表述将我们带回到了机器学习中更熟悉的分类问题领域，并提出了一种定量评估摘要的方法。
- en: 'Some differences here are: firstly, a higher recall is better, *holding summary
    length constant*. You don’t want to score 100% recall with a summary the same
    length as the source. Secondly, you’d ideally want precision to be close to 100%
    as possible – hallucinating information is really bad. I’ll come back to these
    later.'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 这里的一些差异是：首先，在保持摘要长度不变的情况下，更高的召回率更好。您不希望得到100%的召回率，而摘要的长度与源文本相同。其次，理想情况下，您希望精确度尽可能接近100%——捏造信息是非常糟糕的。我稍后会回到这些内容。
- en: '**Introduction to DeepEval**'
  id: totrans-27
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**DeepEval简介**'
- en: You’d be spoilt for choice with all the different LLM eval frameworks out there
    – from Braintrust to Langfuse and more. However, today I’ll be using DeepEval,
    a very user-friendly framework to get started quickly, both in general, as well
    as specifically with summarization.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 在所有不同的 LLM 评估框架中，您将有很多选择——从 Braintrust 到 Langfuse 以及更多。然而，今天我将使用 DeepEval，这是一个非常用户友好的框架，可以快速入门，无论是总体上还是具体到摘要。
- en: DeepEval has easy out-of-the-box implementations of many key RAG metrics, and
    it has a flexible Chain-of-Thought-based LLM-as-a-judge tool called GEval for
    you too define any custom criteria you want (I’ll use this later)
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: DeepEval 为许多关键的 RAG 度量标准提供了易于使用的现成实现，并且它有一个基于思维链的 LLM 作为裁判的工具 GEval，让您可以定义任何想要的定制标准（我稍后会使用它）
- en: 'Additionally, it has helpful infrastructure to organize and speed up evals:
    they’ve nicely **parallelized** everything with async and so you can run evals
    on your entire dataset rapidly. They have handy features for **synthetic** data
    generation (*will cover in later articles*), and they allow you to define **custom
    metrics** to adapt their metrics (exactly what we’re going to do today), or to
    define non-LLM-based eval metrics for more cost-effective & robust evals (e.g.
    entity density, later).'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，它还提供了有用的基础设施来组织和加速评估：他们已经使用异步很好地**并行化**了一切，因此您可以快速运行整个数据集的评估。他们有方便的**合成**数据生成功能（将在后续文章中介绍），并允许您定义**自定义度量标准**以适应他们的度量标准（这正是我们今天要做的），或者定义基于非
    LLM 的评估度量标准以进行更经济高效且更稳健的评估（例如，实体密度，稍后）。
- en: '**DeepEval’s Summarization Metric**'
  id: totrans-31
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**DeepEval 的摘要度量标准**'
- en: DeepEval’s summarization metric (read more about it [here](https://docs.confident-ai.com/docs/metrics-summarization)
    ) is a reference-free metric (i.e. no need for gold-standard summaries), and just
    requires the source text (that you put as `input` field) and the generated summary
    to be evaluated (`actual_output`) field. As you can see, the set-up and evaluation
    code below is really simple!
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: DeepEval 的摘要度量标准（了解更多信息[这里](https://docs.confident-ai.com/docs/metrics-summarization)）是一个无参考度量标准（即不需要黄金标准摘要），只需要源文本（您将其作为“输入”字段）和要评估的生成的摘要（“实际输出”字段）。如您所见，下面的设置和评估代码非常简单！
- en: '[PRE0]'
  id: totrans-33
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'The summarization metric actually evaluates two separate components under-the-hood:
    **alignment** and **coverage**. These correspond closely to the **precision**
    and **recall** formulation I introduced earlier!'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 摘要度量标准实际上在幕后评估两个单独的组件：**对齐**和**覆盖率**。这些与之前我介绍的**精确度**和**召回率**公式密切相关！
- en: For alignment, the evaluator LLM generates a list of **claims** from the summary,
    and for each claim, the LLM will determine how many of these claims are supported
    by **truths** which are extracted from the source text, producing the **alignment
    score**.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 对于对齐，评估器 LLM 从摘要中生成一系列**主张**，对于每个主张，LLM 将确定有多少这些主张得到了从源文本中提取的**真相**的支持，从而产生**对齐得分**。
- en: In the case of coverage, the LLM generates a list of assessment questions from
    the source text, then tries to answer the questions, using only the summary as
    context. The LLM is prompted to respond ‘idk’ if the answer cannot be found. Then,
    the LLM will determine how many of these answers are correct, to get the **coverage
    score**.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 在覆盖率的案例中，LLM 从源文本生成一系列评估问题，然后尝试使用仅作为上下文的摘要来回答这些问题。如果找不到答案，LLM 将被提示回答“idk”。然后，LLM
    将确定这些答案中有多少是正确的，以获得**覆盖率得分**。
- en: The final summarization score is the minimum of the alignment and coverage scores.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 最终的摘要得分是对齐得分和覆盖率得分中的最小值。
- en: '**Improving the Summarization Metric**'
  id: totrans-38
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**改进摘要度量标准**'
- en: However, while what DeepEval has done is a great starting point, there are three
    key issues that hinder the reliability and usefulness of the Summarization metric
    in its current form.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，尽管 DeepEval 做的事情是一个很好的起点，但当前形式下，有三个关键问题阻碍了摘要度量标准的可靠性和实用性。
- en: 'So I have built a **custom summarization metric** which adapts DeepEval’s version.
    Below, I’ll explain each problem and the corresponding solution I’ve implemented
    to overcome it:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我构建了一个**自定义摘要度量标准**，它适应了 DeepEval 的版本。以下，我将解释每个问题和为克服这些问题而实施的相应解决方案：
- en: '**1: Using yes/no questions for the coverage metric is too simplistic**'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: '**1: 使用是/否问题作为覆盖率度量标准过于简单**'
- en: 'Currently, the assessment questions are constrained to be yes/no questions,
    in which the answer to the question is yes – have a look at the questions:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 目前，评估问题被限制为是/否问题，其中问题的答案是肯定的——看看这些问题：
- en: '![Image by author](../Images/11a7b191c5f92032a7229b4ac9f8d834.png)'
  id: totrans-43
  prefs: []
  type: TYPE_IMG
  zh: '![图片由作者提供](../Images/11a7b191c5f92032a7229b4ac9f8d834.png)'
- en: Image by author
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: 'There are two problems with this:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 这个方法有两个问题：
- en: Firstly, by framing the questions as binary yes/no, this limits their informativeness,
    especially in determining nuanced qualitative points.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，通过将问题表述为二元的“是/否”，这限制了它们的信息量，特别是在确定细微的定性点方面。
- en: 'Secondly, if the LLM that answers given the summary hallucinates a ‘yes’ answer
    (as there are only 3 possible answers: ‘yes’, ‘no’, ‘idk’, it’s not unlikely it’ll
    hallucinate yes), the evaluator will erroneously deem this answer to be correct.
    It is much more difficult to hallucinate the correct answer to an open-ended question.
    Furthermore, if you look at the questions, they are phrased in a contrived way
    almost hinting that the answer is ‘yes’ (e.g. "Does China employ informational
    opacity as a strategy?"), hence increasing the likelihood of a hallucinated ‘yes’.'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 其次，如果用于回答摘要的LLM（由于只有三个可能的答案：“是”、“否”、“不知道”，因此它不太可能不产生“是”的幻觉），评估者会错误地认为这个答案是正确的。对于开放性问题，要产生正确的答案要困难得多。此外，如果你看看这些问题，它们几乎是以一种巧妙的方式提出的，几乎暗示答案应该是“是”（例如，“中国是否将信息不透明作为一项策略？”），这增加了产生幻觉“是”的可能性。
- en: My solution was to ask the LLM **generate open-ended questions** from the source
    text – in the code, these are referred to as ‘complex questions’.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 我的解决方案是要求LLM从源文本中**生成开放性问题**——在代码中，这些被称为“复杂问题”。
- en: Additionally, I ask the LLM to assign an **importance of the question** (so
    we can perhaps upweight more important questions in the coverage score).
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我还要求LLM分配**问题的权重**（这样我们可能可以在覆盖率分数中提高更重要问题的权重）。
- en: Since the questions are now open-ended, I use an **LLM for evaluation** – I
    ask the LLM to give a **0–5 score of how similar** the answer generated from the
    summary is to the answer generated with the source text (the reference answer),
    as well as an explanation.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 由于现在的问题是开放式的，我使用一个**LLM进行评估**——我要求LLM给出一个**0-5分的评分，以表示**从摘要生成的答案与使用源文本（参考答案）生成的答案的相似程度，以及一个解释。
- en: '[PRE1]'
  id: totrans-51
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '**2: Extracting truths from source text for alignment is flawed**'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: '**2: 从源文本中提取真理以进行对齐是有缺陷的**'
- en: Currently, for the alignment metric, a list of **truths** is extracted from
    the source text using an LLM (a parameter `truths_extraction_limit` which can
    be controlled). This leads to some facts/details from the source text being omitted
    from the truths, which the summary’s claims are then compared against.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 目前，对于对齐指标，使用LLM从源文本中提取一个**真理列表**（有一个可以控制的参数`truths_extraction_limit`）。这导致源文本中的一些事实/细节被省略在真理之外，然后摘要的论点与之进行比较。
- en: To be honest, I’m not sure what the team was thinking when they implemented
    it like this – perhaps I had missed a nuance or misunderstood their intention.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 说实话，我不确定团队当时是如何想的，他们这样实施——也许我错过了一个细微差别，或者误解了他们的意图。
- en: However, this leads to two problems that renders the alignment score ‘unusable’
    according to a [user on Github](https://github.com/confident-ai/deepeval/issues/937).
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，这导致两个问题，使得对齐分数“不可用”，根据GitHub上的一个[用户](https://github.com/confident-ai/deepeval/issues/937)的说法。
- en: Firstly, the LLM-generated list of truths is non-deterministic, hence [people
    have reported](https://github.com/confident-ai/deepeval/issues/565) wildly changing
    alignment scores. This inconsistency likely stems from the LLM choosing different
    subsets of truths each time. More critically, the truth extraction process makes
    this not a fair judge of the summary’s faithfulness, because a detail from the
    summary could possibly be found in the source text but not the extracted truths.
    Anecdotally, all the claims that were detected as unfaithful, indeed were in the
    main text but not in the extracted truths. Additionally, people have reported
    that when you pass in the summary as equal to input, the alignment score is less
    than 1, which is strange.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，LLM生成的真理列表是非确定性的，因此[人们已经报告](https://github.com/confident-ai/deepeval/issues/565)对齐分数变化很大。这种不一致性可能源于LLM每次选择不同的真理子集。更重要的是，真理提取过程使得这并不是对摘要忠实度的一个公平评判，因为摘要中的一个细节可能在源文本中找到，但不在提取的真理中。据观察，所有被检测为不忠实的事实确实在正文中有，但不在提取的真理中。此外，人们报告说，当你将摘要作为输入传递时，对齐分数小于1，这很奇怪。
- en: To address this, I just made a simple adjustment – which was to pass the **entire
    source text** into the LLM evaluating the summary claims, instead of the list
    of truths. Since all the claims are evaluated together in one LLM call, this won’t
    significantly raise token costs.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 为了解决这个问题，我仅仅做了一个简单的调整——那就是将**整个源文本**传递给评估摘要声明的LLM，而不是传递真理列表。由于所有声明都在一个LLM调用中一起评估，这不会显著增加token成本。
- en: '**3: Final score being min(alignment score, coverage score) is flawed**'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: '**3: 最终得分取对齐得分和覆盖得分的较小值是错误的**'
- en: Currently, the score that is output is the minimum of the alignment and coverage
    scores (and there’s actually no way of accessing the individual scores without
    placing it in the logs).
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 目前输出的分数是对齐得分和覆盖得分的较小值（实际上没有方法可以访问这些分数，除非将它们放入日志中）。
- en: This is problematic, because the coverage score will likely be lower than the
    alignment score (if not, then there’re real problems!). This means that changes
    in the alignment score do not affect the final score. However, that doesn’t mean
    that we can ignore deteriorations in the alignment score (say from 1 to 0.8),
    which are arguably signal a more severe problem with the summary (i.e. hallucinating
    a claim).
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 这是有问题的，因为覆盖得分可能会低于对齐得分（如果不是，那么就真的有问题了！）。这意味着对齐得分的改变不会影响最终得分。然而，这并不意味着我们可以忽视对齐得分的下降（例如从1到0.8），这可能会被认为是摘要存在更严重问题的信号（即产生了虚假的声明）。
- en: My solution was to **change the final score to the F1 score**, just like in
    ML classification, to capture importance of both precision and recall. An extension
    is to can change the weighting of precision & recall. (e.g. upweight precision
    if you think that hallucination is something to avoid at all costs – see [here](https://stats.stackexchange.com/questions/559736/is-there-a-metric-that-combines-recall-and-precision-other-than-the-f1-score))
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 我的解决方案是将**最终得分改为F1得分**，就像在机器学习分类中一样，以捕捉精确度和召回率的重要性。一个扩展是改变精确度和召回率的权重。（例如，如果你认为幻觉是无论如何都要避免的事情——参见[这里](https://stats.stackexchange.com/questions/559736/is-there-a-metric-that-combines-recall-and-precision-other-than-the-f1-score)）
- en: With these 3 changes, the summarization metric now better reflects the relevance
    and faithfulness of the generated summaries.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 通过这三个变化，摘要指标现在更好地反映了生成摘要的相关性和忠实度。
- en: '**Conciseness Metrics**'
  id: totrans-63
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**简洁度指标**'
- en: However, this still gives an incomplete picture. A summary should also **concise**
    and information-dense, condensing key information into a shorter version.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，这仍然只提供了一个不完整的画面。摘要还应该**简洁**且信息密集，将关键信息压缩成更短的形式。
- en: '**Entity density** is a useful and cheap metric to look at. The Chain-of-Density
    paper shows that human-created summaries, as well as human-preferred AI-generated
    summaries, have an entity density of ~0.15 entities/tokens, striking the right
    balance between clarity (favoring less dense) and informativeness (favoring more
    dense).'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: '**实体密度**是一个有用且成本低的指标。Chain-of-Density论文显示，人类创建的摘要以及人类偏好的AI生成的摘要，其实体密度约为0.15个实体/标记，在清晰度（倾向于较少的密度）和信息量（倾向于较多的密度）之间取得了平衡。'
- en: Hence, we can create a **Density Score** which penalizes summaries with Entity
    Density further away from 0.15 (either too dense or not dense enough). Initial
    AI-generated summaries are typically less dense (0.10 or less), and the Chain-of-Density
    [paper](https://arxiv.org/pdf/2309.04269) shows an iterative process to increase
    the density of summaries. Ivan Leo & Jason Liu wrote a good [article](https://python.useinstructor.com/blog/2023/11/05/chain-of-density/)
    on fine-tuning Chain-of-Density summaries using entity density as the key metric.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们可以创建一个**密度分数**，惩罚实体密度远离0.15（要么过于密集，要么不够密集）的摘要。初始的AI生成的摘要通常密度较低（0.10或更低），而Chain-of-Density
    [论文](https://arxiv.org/pdf/2309.04269)展示了一个迭代过程来增加摘要的密度。Ivan Leo和Jason Liu撰写了一篇很好的[文章](https://python.useinstructor.com/blog/2023/11/05/chain-of-density/)，介绍了使用实体密度作为关键指标微调Chain-of-Density摘要的方法。
- en: '[PRE2]'
  id: totrans-67
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Next, I use a **Sentence Vagueness** metric to explicitly penalize vague sentences
    ( ‘*this summary describes the reasons for…’*) that don’t actually state the key
    information.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我使用一个**句子模糊度**指标来明确惩罚那些没有实际陈述关键信息的模糊句子（例如，“*这个总结描述了……的原因”*）。
- en: For this, I break up the summary into sentences (similar to the alignment metric)
    and ask an LLM to classify if each sentence is vague or not, with the final score
    being the proportion of sentences classified as vague.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这一点，我将摘要分解成句子（类似于对齐指标），并要求LLM判断每个句子是否模糊，最终得分是分类为模糊的句子的比例。
- en: '[PRE3]'
  id: totrans-70
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Lastly, a summary that repeats the same information is inefficient, as it wastes
    valuable space that could have been used to convey new meaningful insights.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，重复相同信息的总结是不高效的，因为它浪费了本可以用来传达新有意义的见解的宝贵空间。
- en: 'Hence, we construct a **Repetitiveness** score using **GEval**. As I briefly
    mentioned above, GEval uses LLM-as-a-judge with chain-of-thoughts to evaluate
    any custom criteria. As detecting repeated concepts is a more complex problem,
    we need a more intelligent detector aka an LLM. (*Warning: the results for this
    metric seemed quite unstable – the LLM would change its answer when I ran it repeatedly
    on the same input. Perhaps try some prompt engineering)*'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们使用 **GEval** 构建了一个 **重复性** 分数。正如我上面简要提到的，GEval 使用具有思维链的 LLM 作为评判者来评估任何自定义标准。由于检测重复概念是一个更复杂的问题，我们需要一个更智能的检测器，也就是一个
    LLM。(*警告：这个指标的结果似乎相当不稳定 – 当我反复在相同的输入上运行它时，LLM 会改变它的答案。也许可以尝试一些提示工程)*
- en: '[PRE4]'
  id: totrans-73
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: '**Coherence Metric**'
  id: totrans-74
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**连贯性指标**'
- en: Finally, we want to ensure that LLM outputs are coherent – having a logical
    flow with related points together and making smooth transitions. Meta’s recent
    Large Concept Models [paper](https://arxiv.org/pdf/2412.08821) used this metric
    for local coherence from Parola et al (2023) – the average cosine similarity between
    each nth and n+2th sentence. A simple metric that is easily implemented. We find
    that the LLM summary has a score of ~0.45\. As a sense check, if we randomly permute
    the sentences of the summary, the coherence score drops below 0.4.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们希望确保 LLM 输出是连贯的 – 具有逻辑流程，相关点放在一起，并实现平滑过渡。Meta 的最近大型概念模型 [论文](https://arxiv.org/pdf/2412.08821)
    使用了 Parola 等人（2023）的局部连贯性指标 – 每个第 n 个和第 n+2 个句子之间的平均余弦相似度。这是一个简单且易于实现的指标。我们发现
    LLM 总结的分数约为 ~0.45。作为一个感觉检查，如果我们随机排列总结中的句子，连贯性分数会低于 0.4。
- en: '[PRE5]'
  id: totrans-76
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: '**Putting it all together**'
  id: totrans-77
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**综合来看**'
- en: We can package each of the above metrics into Custom Metrics. The benefit is
    that we can evaluate all of them in parallel on your dataset of summaries and
    get all your results in one place! (see the [code notebook](https://github.com/thamsuppp/summary-eval-article/blob/main/summary_eval_article_notebook.ipynb))
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以将上述每个指标打包成自定义指标。好处是，我们可以在你的总结数据集上并行评估所有这些指标，并在一个地方获得所有结果！（见[代码笔记本](https://github.com/thamsuppp/summary-eval-article/blob/main/summary_eval_article_notebook.ipynb)）
- en: One caveat, though, is that for some of these metrics, like Coherence or Recall,
    there isn’t a sense of what the ‘optimal’ value is for a summary, and we can only
    compare scores across different AI-generated summaries to determine better or
    worse.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，有一个注意事项，对于一些这些指标，如连贯性或召回率，对于总结的“最佳”值没有明确的概念，我们只能比较不同 AI 生成的总结的分数，以确定哪个更好或更差。
- en: '**Future Work**'
  id: totrans-80
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**未来工作**'
- en: What I’ve introduced in this article provides a solid starting point for evaluating
    your summaries!
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 我在这篇文章中介绍的内容为评估你的总结提供了一个坚实的起点！
- en: It’s not perfect though, and there areas for future exploration and improvement.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然它并不完美，但仍有未来探索和改进的空间。
- en: One area is to better test whether the summaries capture **important points**
    from the source text. You don’t want a summary that has a high recall, but of
    unimportant details.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 一个方面是更好地测试总结是否捕捉到了源文本中的 **重要点**。你不想得到一个召回率很高的总结，但其中包含的是不重要的细节。
- en: Currently, when we generate assessment questions, we ask LLM to rate their **importance**.
    However, it’s hard to take those importance ratings as the ground-truth either
    – if you think about it, when LLMs summarize they essentially rate the importance
    of different facts too. Hence, we need a measure of **importance outside the LLM.**
    Of course, the ideal is to have human reference summaries, but these are expensive
    and not scalable. Another source of reference summaries would be reports with
    executive summaries (e.g. finance pitches, conclusion from slide decks, abstract
    from papers). We could also use techniques like the PageRank of embeddings to
    identify the central concepts algorithmically.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 目前，当我们生成评估问题时，我们会要求 LLM 评估其 **重要性**。然而，将这些重要性评分作为事实真相也很困难 – 如果你这么想的话，当 LLM 总结时，它们本质上也在评估不同事实的重要性。因此，我们需要一个
    **LLM 之外的重要性** 度量。当然，理想的情况是拥有人类参考总结，但这些既昂贵又不可扩展。另一个参考总结的来源是带有执行摘要的报告（例如，财务提案、幻灯片演示文稿的结论、论文的摘要）。我们还可以使用像嵌入的
    PageRank 这样的技术来算法性地识别中心概念。
- en: An interesting idea to try is generating **synthetic source articles** – start
    with a set of main points (representing ground-truth "important" points) on a
    given topic, and then ask the LLM lengthen into a full article (run this multiple
    times with high temperature to generate many diverse synthetic articles!). Then
    run the full articles through the summarization process, and evaluate the summaries
    on retaining the original main points.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 一个值得尝试的有趣想法是生成**合成源文章**——从一个给定主题的主要观点（代表真实“重要”观点）开始，然后让LLM扩展成完整的文章（多次使用高温运行以生成许多多样化的合成文章！）。然后运行完整的文章通过摘要过程，并评估摘要是否保留了原始的主要观点。
- en: Last but not least, it is very important to ensure that each of the summarization
    metrics I’ve introduced **correlates with human evaluations of summary preference**.
    While researchers have done so for some metrics on large summarization datasets,
    these findings might not generalize to your texts and/or audience. (perhaps your
    company prefers a specific style of summaries e.g. with many statistics).
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 最后但同样重要的是，确保我介绍的所有摘要指标都与人类对摘要偏好的评估**相关联**。虽然研究人员已经在大型摘要数据集上对某些指标进行了这样的操作，但这些发现可能不适用于你的文本和/或受众。（也许你的公司更喜欢特定风格的摘要，例如包含许多统计数据）。
- en: For an excellent discussion on this topic, see ‘Level 2’ of Hamel Husain’s [article
    on evals](https://hamel.dev/blog/posts/evals/#automated-evaluation-w-llms). For
    example, if you find that LLM’s Sentence Vagueness scores don’t correlate well
    with what you consider to be vague sentences, then some prompt engineering (providing
    examples of vague sentences, elaborating more) can hopefully bring the correlation
    up.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 关于这个话题的精彩讨论，请参阅Hamel Husain关于评估的文章中的“Level 2”部分。[文章链接](https://hamel.dev/blog/posts/evals/#automated-evaluation-w-llms)。例如，如果你发现LLM的句子模糊度评分与你认为的模糊句子相关性不好，那么一些提示工程（提供模糊句子的例子，进行更多阐述）可能会希望提高相关性。
- en: Although this step can be time-consuming, it is essential, in order to ensure
    you can trust the LLM evals. This will save you time in the long run anyway –
    when your LLM evals are aligned, you essentially gain an infinitely-scalable evaluator
    customised to your needs and preferences.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管这一步可能耗时，但它对于确保你可以信赖LLM评估是至关重要的。从长远来看，这也会为你节省时间——当你的LLM评估对齐时，你实际上获得了一个无限可扩展的、针对你需求和偏好的定制化评估器。
- en: You can speed up your human evaluation process by creating an easy-to-use Gradio
    annotation interface – I one-shotted a decent interface using OpenAI o1!
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以通过创建一个易于使用的Gradio注释界面来加速你的人类评估过程——我一次性使用OpenAI o1创建了一个不错的界面！
- en: In a future article, I will talk about how to actually use these insights to
    improve my summarization process. Two years ago I [wrote](https://medium.com/towards-data-science/summarize-podcast-transcripts-and-long-texts-better-with-nlp-and-ai-e04c89d3b2cb)
    about how to summarize long texts, but both LLM advances and 2 years of experience
    have led to my summarization methods changing dramatically.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 在未来的文章中，我将讨论如何实际使用这些见解来改进我的摘要过程。两年前我[写了](https://medium.com/towards-data-science/summarize-podcast-transcripts-and-long-texts-better-with-nlp-and-ai-e04c89d3b2cb)关于如何摘要长文本的文章，但LLM的进步和两年来的经验导致我的摘要方法发生了巨大变化。
- en: Thanks so much for reading! In case you missed it, all the code can be found
    in the GitHub repo [here](https://github.com/thamsuppp/summary-eval-article).
    Follow me on [X/Twitter](https://x.com/thamsuppp) and for more posts on AI!
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 非常感谢阅读！如果你错过了，所有代码都可以在GitHub仓库[这里](https://github.com/thamsuppp/summary-eval-article)找到。在[X/Twitter](https://x.com/thamsuppp)上关注我，了解更多关于AI的帖子！
- en: What metrics do you use to evaluate LLM summarization? Let me know in the comments!
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 你使用哪些指标来评估LLM摘要？在评论中告诉我！
