  id: totrans-172
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: '![](../Images/70246c2da54c8fb66a6bc046427220ca.png)'
  id: totrans-173
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/70246c2da54c8fb66a6bc046427220ca.png)'
- en: The correct order 2 is returned, but the distribution is still dominated by
    the quantum noise.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 返回了正确的阶数 2，但分布仍然主要由量子噪声主导。
- en: Concluding thoughts
  id: totrans-175
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论性思考
- en: We have given a tentatively complete presentation of the implementation of Shor’s
    algorithm, including a somewhat detailed description of the quantum modular arithmetic
    operations involved. Using the implementation of the [qiskit-shor](https://github.com/benjamin-assel/qiskit-shor)
    module, we have run some simulations and some actual quantum computations on the
    IBM Quantum platform. The quantum computations turned out to be dominated by quantum
    noise, making it impossible, for the time being, to run Shor’s algorithm and extract
    meaningful results.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经对 Shor 算法的实现给出了一个试探性的完整展示，包括对涉及的量子同余运算的某种详细描述。使用 [qiskit-shor](https://github.com/benjamin-assel/qiskit-shor)
    模块的实现，我们在 IBM Quantum 平台上进行了一些模拟和一些实际的量子计算。这些量子计算结果主要由量子噪声主导，使得目前无法运行 Shor 算法并提取有意义的成果。
- en: The implementation we used was naive, in the sense that it did not include state-of-the-art
    optimisation. But the observed noisy outputs of this naive implementation when
    running Shor’s algorithm for very small values of N, indicates that similar results
    would be obtained, even with extra circuit optimisations.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用的实现是原始的，从某种意义上说，它没有包括最先进的优化。但是，当运行 Shor 算法时，对于非常小的 N 值，观察到的这种原始实现的噪声输出表明，即使有额外的电路优化，也会得到类似的结果。
- en: In the future it might become more realistic to run Shor’s algorithm successfully.
    The enormous progress in quantum hardware capacities in the recent years leave
    us with decent hopes to see this happen in a few years time.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 在未来，成功运行 Shor 算法可能会变得更加现实。近年来在量子硬件能力方面的巨大进步，让我们有理由相信，在几年内这种情况可能会发生。
