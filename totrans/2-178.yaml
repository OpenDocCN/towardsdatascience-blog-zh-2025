- en: Where Are We with Shor’s Algorithm?
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: Shor 算法的进展如何？
- en: 原文：[https://towardsdatascience.com/where-are-we-with-shors-algorithm/](https://towardsdatascience.com/where-are-we-with-shors-algorithm/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/where-are-we-with-shors-algorithm/](https://towardsdatascience.com/where-are-we-with-shors-algorithm/)
- en: <mdspan datatext="el1751674404623" class="mdspan-comment">Shor’s algorithm</mdspan>
    was proposed by Peter Shor in a seminal paper [1] in 1995 as an algorithm for
    factoring large numbers using quantum computing. In 2025, i.e. 30 years later,
    early quantum processors are produced and made available to the public, making
    it possible to test the algorithm for real. Can we successfully run Shor’s algorithm
    on large numbers? The answer is well-known to be no, because this would require
    quantum processors with thousands of qubits and very low quantum noise, and we
    are not there yet. But what about small numbers? And, by the way, how do we implement
    Shor’s algorithm concretely?
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1751674404623" class="mdspan-comment">Shor 算法</mdspan>由
    Peter Shor 在 1995 年发表的开创性论文 [1] 中提出，作为一种使用量子计算分解大数的算法。到 2025 年，即 30 年后，早期的量子处理器被生产出来并公之于众，这使得测试该算法成为可能。我们能否在大型数字上成功运行
    Shor 算法？答案众所周知是肯定的，因为这需要具有数千个量子比特和非常低量子噪声的量子处理器，但我们还没有达到那个水平。那么对于小数字呢？顺便问一下，我们如何具体实现
    Shor 算法？
- en: In this post we give a guide to the implementation of Shor’s algorithm, with
    a special emphasis on the realisation of the order-finding quantum circuit and
    the modular arithmetic computations that are at the core of the algorithm. We
    link a [git repository](https://github.com/benjamin-assel/qiskit-shor) with the
    full implementation in Qiskit. Finally we run some simulations and provide the
    results of actual computations on IBM quantum hardware, as of 2025.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们提供了一个关于 Shor 算法实现的指南，特别强调了实现寻找阶量子电路和算法核心的模运算。我们提供了一个 [git 仓库](https://github.com/benjamin-assel/qiskit-shor)，其中包含了
    Qiskit 的完整实现。最后，我们进行了一些模拟，并提供了截至 2025 年在 IBM 量子硬件上实际计算的结果。
- en: In order to follow this post, it would be ideal if you know some basics of quantum
    computing, namely qubit manipulations and standard unitary gate operations, and
    a bit of linear algebra.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 为了阅读这篇文章，如果你了解一些量子计算的基础知识，例如量子比特操作和标准幺正门操作，以及一些线性代数，那就再好不过了。
- en: 'Disclaimer 1: Although I aim at a scientific level of rigorousness, this is
    not an academic paper and I do not pretend to be an expert in the field.'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 免责声明 1：尽管我力求达到科学严谨的水平，但这不是一篇学术论文，我也不假装自己是该领域的专家。
- en: 'Disclaimer 2: No artificial intelligence was used to produce this post.'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 免责声明 2：本帖未使用人工智能生成。
- en: A breakthrough algorithm for number factoring
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 一种用于数论分解的突破性算法
- en: Shor’s algorithm is an algorithm which aims at finding a non-trivial factor
    of an integer N. While it is easy to find a factor for a small enough N, by trying
    possible values up to N^(1/2) for instance, the problem becomes impractical when
    N is really big, like N ~ 2^(1000), simply because the search space becomes too
    big. A human lifetime would not suffice to find a factor of such a large integer,
    using a classical computer.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: Shor 算法是一种旨在寻找整数 N 的非平凡因子的算法。虽然对于足够小的 N，例如通过尝试 N^(1/2) 的可能值，找到因子是容易的，但当 N 非常大时，例如
    N ~ 2^(1000)，问题就变得不切实际了，因为搜索空间变得太大。使用经典计算机找到这样大整数的因子，人类一生的时间都不够。
- en: If we denote by n = ⌈log[2](N)⌉ the number of digits to write N in binary notation,
    [the best known ***classical*** algorithm](https://en.wikipedia.org/wiki/General_number_field_sieve)
    has time complexity exp(c n^(1/3) (log n)^(2/3)), for some constant c, i.e. ***exponential***
    time complexity. By “classical” algorithm one means an algorithm which can be
    run on a traditional computer, namely an algorithm which is made of arithmetic
    operations on numbers. This is basically all algorithms, except *quantum* algorithms.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们用 n = ⌈log[2](N)⌉ 表示用二进制表示法写 N 所需的位数，[已知最佳 ***经典*** 算法](https://en.wikipedia.org/wiki/General_number_field_sieve)的时间复杂度为
    exp(c n^(1/3) (log n)^(2/3))，其中 c 是某个常数，即 ***指数*** 时间复杂度。所谓“经典”算法，是指可以在传统计算机上运行的算法，即由数字的算术运算组成的算法。这基本上是所有算法，除了
    *量子* 算法。
- en: Shor’s algorithm is a ***quantum*** algorithm, which means that it involves
    operations on a quantum system, in this case on qubits. Moreover, it is a probabilistic
    algorithm, which means that it is guaranteed to work with high probability, but
    occasionally it can fail.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: Shor 算法是一种 ***量子*** 算法，这意味着它涉及到对量子系统进行的操作，在这种情况下是对量子比特的操作。此外，它是一个概率算法，这意味着它以高概率保证能够工作，但偶尔可能会失败。
- en: Shor’s algorithm is able to find a factor of N in time complexity O(n² log n)
    with high probability, in its most efficient implementation, i.e. in ***polynomial***
    time complexity. This is probably the most impressive example of a quantum algorithm
    beating classical algorithms, so far.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: Moreover, it happens that the problem of factoring large integers is at the
    heart of public key cryptography and the [RSA algorithm](https://en.wikipedia.org/wiki/RSA_cryptosystem),
    which is widely used today to secure Internet communications. Shor’s algorithm,
    if successfully run on a quantum computer holding a few thousand qubits, could
    break this encryption scheme. This makes it one of the most popular applications
    in quantum computing.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
- en: While we are still somewhat far from having a quantum computer with the capacity
    to run Shor’s algorithm on large numbers, the current progress makes it possible
    to try it on small numbers. So it is about time to take a deeper look at Shor’s
    algorithm, see how it works, how we can actually implement it and run it on quantum
    hardware.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: Taking advantage of the [IBM quantum platform](https://quantum.cloud.ibm.com/),
    which allows for a limited amount of free access to real quantum processors (QPUs),
    I have implemented the full algorithm with the [Qiskit SDK](https://www.ibm.com/quantum/qiskit)
    and tried it on small numbers. The full implementation is available in this [qiskit-shor
    repository](https://github.com/benjamin-assel/qiskit-shor).
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: Let’s dive now into the algorithm.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: The algorithm
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Introductions to Shor’s algorithm are numerous on the web (see e.g. [Wikipedia](https://en.wikipedia.org/wiki/Shor%27s_algorithm)).
    We will only write down the algorithm itself and explain the ideas involved, but
    **we will not explain why it works, nor give a proof of every statement**.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
- en: Consider a [composite](https://en.wikipedia.org/wiki/Composite_number) integer
    N, i.e. an integer which admits non-trivial prime factors. Also require that N
    is odd and is not the power of a prime number (in those cases, we can easily find
    a non-trivial factor).
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: 'Then, the algorithm steps are:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: Choose a random integer 1 < A < N and compute gcd(A, N). If gcd(A, N) > 1, then
    gcd(A, N) is a non-trivial factor of N and we are done (lucky case). Otherwise
    A and N are coprime (typical case).
  id: totrans-20
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Find the ***order*** of A in *Z*[N], i.e. the smallest integer 1 < r < N such
    that A^r = 1 mod N, using the ***phase estimation*** quantum algorithm (see below).
  id: totrans-21
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: If r is odd, go back to step 1 and choose another A. Otherwise, compute d =
    gcd(A^(r/2) − 1, N). If d > 1, then d is a non-trivial factor of N. If not, start
    again in step 1.
  id: totrans-22
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Peter Shor proposed this algorithm in a seminal paper [1] and proved that it
    finds a factor of N in polynomial time, with high probability.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: Among the steps listed above only the order finding step requires a quantum
    operation. The other steps are classical operations, which are easily performed
    on a classical computer.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
- en: The quantum algorithm consists in applying unitary operations on a set of qubits
    representing numbers in binary notation. The integer
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 量子算法包括对表示二进制表示中数字的一组量子比特应用单位算子。整数
- en: \[ x = \sum_{i=0}^{m-1} x_i 2^i, \quad x_i \in \{0,1\} \,,\]
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: \[ x = \sum_{i=0}^{m-1} x_i 2^i, \quad x_i \in \{0,1\} \,,\]
- en: is represented by the m-qubit state
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 由 m 个量子比特状态表示
- en: \[ |x\rangle = |x_0\rangle |x_1\rangle …|x_{m-1}\rangle \]
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: \[ |x\rangle = |x_0\rangle |x_1\rangle …|x_{m-1}\rangle \]
- en: For instance, the number 13 = 2⁰ +2² + 2³ in represented by the “quantum integer”
    (4-qubit state) |13⟩ = |1⟩|0⟩|1⟩|1⟩.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，数字 13 = 2⁰ +2² + 2³ 在“量子整数”（4-量子比特状态）|13⟩ = |1⟩|0⟩|1⟩|1⟩中表示。
- en: To find the order r of the integer A in *Z*[N], the idea of Shor’s algorithm
    is to leverage the fact that the unitary operator
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 要找到整数 A 在 *Z*[N] 中的阶 r，Shor 算法的想法是利用单位算子
- en: '\[ U_A : x \rightarrow Ax \,\, \text{mod} \,\, N \]'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: '\[ U_A : x \rightarrow Ax \,\, \text{mod} \,\, N \]'
- en: admits eigenvalues of the form *exp*(2*π*i j/r), with 0 ≤ j < r, and that the
    vector |1⟩ (the “quantum integer 1”) can be expressed as a linear combination
    of the corresponding eigenvectors. The algorithm tries to estimate at least one
    of the fraction j/r. This is referred to as *phase estimation*, as we estimate
    the phase Φ = 2*π* j/r of an eigenvalue exp(iΦ) of the operator U[A].
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 该算子接受形式为 *exp*(2*π*i j/r) 的特征值，其中 0 ≤ j < r，并且向量 |1⟩（“量子整数 1”）可以表示为相应特征向量的线性组合。算法试图估计至少一个分数
    j/r。这被称为 *相位估计*，因为我们估计了算子 U[A] 的特征值 exp(iΦ) 的相位 Φ = 2*π* j/r。
- en: We will provide the actual quantum circuit that needs to be run in the next
    section. The quantum algorithm consists in running this circuit and measuring
    its m output bits, forming a number k in binary notation. This number k is such
    that k/2^m should be close to j/r for some 0 ≤ j < r , with high probability.
    Unless we end up in some unlucky case (like j=0), we can extract the value of
    r by finding the fraction of the form a/b, with b < N, closest to k/2^m and identifying
    r=b (there are libraries doing this efficiently). Typically, one would run the
    order finding circuit and measure its outcomes many times to find r with very
    large probability. The expectation is that the distribution of outputs k/2^m should
    have peaks (of same magnitude) at all the values j/r, for 0 ≤ j < r.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将在下一节提供需要运行的量子电路的实际电路。量子算法包括运行这个电路并测量其 m 个输出比特，形成一个二进制表示的数字 k。这个数字 k 应该是 k/2^m
    接近某个 0 ≤ j < r 的 j/r，以高概率。除非我们最终陷入某些不幸的情况（如 j=0），否则我们可以通过找到形式为 a/b 的分数，其中 b <
    N，最接近 k/2^m 并识别 r=b（有一些库可以有效地完成这项工作）来提取 r 的值（there are libraries doing this efficiently）。通常，人们会多次运行阶查找电路并测量其结果，以非常高的概率找到
    r。预期输出 k/2^m 的分布应该在所有 0 ≤ j < r 的 j/r 值处有峰值（相同的大小）。
- en: All the classical operations are easy to implement and they can be run in log
    N time, so we only need to worry about the realisation and running of the order-finding
    quantum circuit. Let’s see how it looks.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 所有经典操作都很容易实现，并且它们可以在 log N 时间内运行，所以我们只需要担心阶查找量子电路的实现和运行。让我们看看它是什么样子。
- en: Order-finding quantum circuit
  id: totrans-35
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 阶查找量子电路
- en: The order-finding circuit is depicted in the following figure. Several modifications
    can be brought to the circuit to improve its efficiency, but let’s leave this
    for later.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 阶查找电路如图所示。可以对电路进行一些修改以提高其效率，但让我们留到以后再说。
- en: '![](../Images/68793394c75c5ef4c6fbf29ba2389b1d.png)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/68793394c75c5ef4c6fbf29ba2389b1d.png)'
- en: Order finding circuit. Figure from Beauregard [2]. The variable *a* corresponds
    to the integer A in the text.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 阶查找电路。图来自 Beauregard [2]。变量 *a* 对应于文本中的整数 A。
- en: 'There are two groups of qubits: one group of n qubits initialised to the quantum
    integer state |1⟩, i.e. |x⟩ with x=1, called the *target* qubits (lower qubits
    in the figure), and another group of 2n qubits, called the *control* qubits (upper
    qubits in the figure). The control qubits are initialised to the superposition
    of all integer states, using Hadamard gates,'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 有两组量子比特：一组 n 个量子比特初始化为量子整数状态 |1⟩，即 x=1 的 |x⟩，称为 *目标* 量子比特（图中的下量子比特），另一组 2n 个量子比特，称为
    *控制* 量子比特（图中的上量子比特）。控制量子比特使用哈达玛门初始化为所有整数状态的叠加，
- en: \[ (H|0\rangle)^{\otimes 2n} = \left( \frac{|0\rangle + |1\rangle}{\sqrt 2}\right)^{\otimes
    2n} = \frac{1}{2^n} \sum_{x =0}^{2^{2n}-1} |x\rangle \]
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: \[ (H|0\rangle)^{\otimes 2n} = \left( \frac{|0\rangle + |1\rangle}{\sqrt 2}\right)^{\otimes
    2n} = \frac{1}{2^n} \sum_{x =0}^{2^{2n}-1} |x\rangle \]
- en: and are then used as control qubits for unitary operations U[D] acting on the
    target qubits sequentially,
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 然后用作对目标量子比特进行单位算子 U[D] 作用的控制量子比特，
- en: \[
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: CU_{D}|b\rangle|x\rangle = \left\{
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: CU_{D}|b\rangle|x\rangle = \left\{
- en: \begin{align}
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: \begin{align}
- en: '& |0\rangle \, |x\rangle & \text{if $b = 0$} \\'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: '& |0\rangle \, |x\rangle & \text{if $b = 0$} \\'
- en: '& |1\rangle \, |Dx\, \text{mod}\, N\rangle & \text{if $b = 1$}'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: '& |1\rangle \, |Dx\, \text{mod}\, N\rangle & \text{if $b = 1$}'
- en: \end{align}
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: \end{align}
- en: \right.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: \right.
- en: \,,
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: \,,
- en: \]
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: with D taking values
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: D 取值
- en: \[ D = A^{2^i} \, \text{mod} \, N \,, \quad i = 0, …, 2n-1, \]
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: \[ D = A^{2^i} \, \text{mod} \, N \,, \quad i = 0, …, 2n-1, \]
- en: Finally the control qubits are transformed by an inverse QFT gate and are all
    measured (indicated by circles with “m” in the figure).
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，控制量子比特通过一个逆量子傅里叶变换门进行转换，并且都被测量（图中用带有“m”的圆圈表示）。
- en: One could replace the number of control qubits 2n by another number of control
    qubits m. The more control qubits, the better will be the estimated phase k/2^m
    of the U[A] operator. The choice m=2n is a compromise between precision and circuit
    size.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 可以用另一个控制量子比特的数量 m 替换控制量子比特的数量 2n。控制量子比特越多，U[A] 操作符的估计相位 k/2^m 就越好。选择 m=2n 是在精度和电路大小之间的一种折衷。
- en: Why this circuit performs phase estimation is the topic of many introductions
    to Shor’s algorithm. The [IBM lecture](https://learning.quantum.ibm.com/course/fundamentals-of-quantum-algorithms/phase-estimation-and-factoring)
    is a very good place to study this topic.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 为什么这个电路能执行相位估计是许多关于 Shor 算法介绍的课题。IBM 讲座([IBM lecture](https://learning.quantum.ibm.com/course/fundamentals-of-quantum-algorithms/phase-estimation-and-factoring))是研究这个主题的一个非常好的地方。
- en: In the above circuit, all ingredients are easily implemented in the Qiskit SDK,
    except for the unitary operator U[A] (and its controlled version CU[A]). This
    is where all the difficulty stands. The majority of academic research on Shor’s
    algorithm revolves around optimising the implementation of U[A]. The above depiction
    of the order finding circuit suggests that 3n qubits are enough to implement the
    quantum algorithm, but the U[A] gate itself actually requires n + c extra qubits,
    termed *ancilla*ry or *ancilla* qubits (the exact constant c depends on the chosen
    implementation).
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 在上述电路中，所有成分都很容易在 Qiskit SDK 中实现，除了幺正操作符 U[A]（及其受控版本 CU[A]）。这正是所有困难所在。关于 Shor
    算法的学术研究的大部分都围绕着优化 U[A] 的实现。上述顺序查找电路的描述表明，3n 个量子比特足以实现量子算法，但实际上 U[A] 门本身需要 n +
    c 个额外的量子比特，称为辅助或辅助量子比特（确切常数 c 取决于所选择的实现）。
- en: Before discussing the circuit implementation of U[A], let us mention that there
    is an important simplification of the above circuit. The 2n control qubits can
    be replaced by a single qubit (!), which undergoes a series of unitary gate actions,
    measurements and reset, leading to a large reduction in the number of qubits required
    to run Shor’s algorithm, but at the price of introducing control flow operations,
    namely gate actions depending on intermediate measurements. While this may look
    like a cheap price to pay in theory, in practice control flow gates are operationally
    more complex to handle than standard unitary operations. The “one-control-qubit”
    circuit is depicted in the following figure.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 在讨论 U[A] 的电路实现之前，让我们提一下上述电路的一个重要简化。2n 个控制量子比特可以被一个单独的量子比特替换（!），该量子比特经历一系列的幺正门操作、测量和重置，从而大大减少了运行
    Shor 算法所需的量子比特数量，但代价是引入了控制流操作，即依赖于中间测量的门操作。虽然在理论上这可能看起来是一个微不足道的代价，但在实践中，控制流门在操作上比标准的幺正操作更复杂。以下图示的是“单控制量子比特”电路。
- en: '![](../Images/4feee9810ab221d1a57a53d0d9c9b330.png)'
  id: totrans-58
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/4feee9810ab221d1a57a53d0d9c9b330.png)'
- en: One-control order finding circuit. Figure from Beauregard [2]
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 单控制量子比特的顺序查找电路。图来自 Beauregard [2]
- en: where m[i] ∈ {0, 1} are successive measurement values of the unique control
    qubit, and X^m is the X gate (= NOT gate) if m=1, or the identity gate if m=0\.
    Applying X^m resets the control qubit to |0⟩. The R[i] are phase gates (= RZ rotation
    gates) with phase parameters depending on all the previous measurement values.
    The details and the explanations for this simplification can be found, for instance,
    in [3].
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 m[i] ∈ {0, 1} 是唯一控制量子比特的连续测量值，X^m 是 X 门（即非门）如果 m=1，或者如果 m=0 则是单位门。应用 X^m
    将控制量子比特重置为 |0⟩。R[i] 是相位门（即 RZ 旋转门），其相位参数取决于所有之前的测量值。关于这种简化的详细内容和解释可以在[3]中找到。
- en: The U[A] gate and quantum modular arithmetics
  id: totrans-61
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: U[A] 门和量子模运算
- en: '*Note: This section is more technical. Some readers might want to skip this
    part on a first read and go directly to the next section.*'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: '*注意：本节较为技术性。一些读者可能希望在第一次阅读时跳过这部分，直接进入下一节。*'
- en: Let us now focus on the circuit implementing the unitary action
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们集中讨论实现幺正作用
- en: '\[ U_A : x \rightarrow Ax \,\, \text{mod} \,\, N \]'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: '\[ U_A : x \rightarrow Ax \,\, \text{mod} \,\, N \]'
- en: The insightful reader might ask whether this is really a unitary operation,
    as the operation does not look very bijective, due to the modulo N operation.
    This is quite an important point, as, using only unitary gates, we can only implement
    unitary operations. The fact is that U[A], acting on the space of integers in
    [0, N), is a bijective function, if and only if A and N are coprime integers,
    which is true for the values considered in Shor’s algorithm. The inverse operation
    is U[B], with B the inverse of A in *Z*[N], i.e. B is an integer such that BA
    = 1 mod N. The fact that A and N are coprime guarantees the existence of B.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 略具洞察力的读者可能会问这究竟是不是一个单位操作，因为这个操作看起来并不是非常双射，因为模 N 操作。这是一个相当重要的观点，因为，仅使用单位门，我们只能实现单位操作。事实上，U[A]
    在 [0, N) 的整数空间上作用是一个双射函数，当且仅当 A 和 N 是互质的整数，这在 Shor 算法考虑的值中是正确的。逆操作是 U[B]，其中 B
    是 *Z*[N] 中 A 的逆，即 B 是一个整数，使得 BA ≡ 1 (mod N)。A 和 N 互质保证了 B 的存在。
- en: So it is theoretically possible to build a unitary operator U[A] acting on the
    space S spanned by the vectors |x⟩, with 0 ≤ x < N. In the order-finding circuit,
    a sequence of (controlled) U[D] operations, with various values of D, are applied
    to the initial state |1⟩, which is in S. The action of U[A] on states |x⟩, with
    x ≥ N, does not matter, as this case will not occur. We can ignore how our U[A]
    gate circuit acts on those larger integer states.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，从理论上讲，可以构建一个作用于由向量 |x⟩ 生成的空间 S 上的单位算子 U[A]，其中 0 ≤ x < N。在求序电路中，一系列（受控）U[D]
    操作，具有不同的 D 值，被应用于初始状态 |1⟩，该状态位于 S 中。U[A] 在状态 |x⟩ 上的作用，其中 x ≥ N，并不重要，因为这种情况不会发生。我们可以忽略我们的
    U[A] 电路如何作用于这些较大的整数状态。
- en: To keep the presentation short enough, we will only present the most important
    features of the implementation of U[A], leaving some pointers to relevant papers
    to the interested reader.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使演示足够简短，我们只将展示 U[A] 实现的最重要特性，并将一些相关论文的引用留给感兴趣的读者。
- en: 'The important building block that needs to be implemented is the modular addition:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 需要实现的重要构建块是模加法：
- en: '\[ \text{add}(Y,N): \quad |x\rangle \rightarrow |(x+Y) \, \text{mod} \, N \rangle
    \]'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: '\[ \text{add}(Y,N): \quad |x\rangle \rightarrow |(x+Y) \, \text{mod} \, N \rangle
    \]'
- en: with 0 ≤ Y < N  a “classical” integer, i.e. a given parameter, and 0 ≤ x < N 
    a “quantum” integer, i.e. an integer represented by the quantum state |x⟩, as
    described in previous sections. To implement this operation, we need at least
    n = ⌈log[2](N)⌉ qubits to represent quantum integers modulo N, so we will assume
    that n is the size of the quantum register we work with, i.e. the number of qubits
    holding x. This means we can represent quantum integers between 0 and 2^n-1.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 0 ≤ Y < N 是一个“经典”整数，即一个给定的参数，0 ≤ x < N 是一个“量子”整数，即由量子态 |x⟩ 表示的整数，如前几节所述。为了实现这个操作，我们需要至少
    n = ⌈log[2](N)⌉ 个量子比特来表示模 N 的量子整数，因此我们将假设 n 是我们工作的量子寄存器的大小，即持有 x 的量子比特的数量。这意味着我们可以表示
    0 到 2^n-1 之间的量子整数。
- en: There are two “schools of thought” for implementing this operation. The “Clifford+T”
    approach uses only the gates NOT, H, S, S^(-1), CNOT and Toffoli, while the “Quantum
    Fourier Transform” (QFT) approach performs addition via parametrised phase gates
    P(λ) on the Fourier space representation of the input integer (more on this below).
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 实现这个操作有两种“思想流派”。“Clifford+T”方法仅使用 NOT、H、S、S^(-1)、CNOT 和 Toffoli 门，而“量子傅里叶变换”（QFT）方法通过在输入整数的傅里叶空间表示上执行参数化的相位门
    P(λ) 来进行加法（关于这一点下面会详细说明）。
- en: The Clifford+T approach essentially uses a somewhat straightforward “school-boy”
    procedure, adding the bits of two quantum numbers written in binary notation and
    keeping track of carry-over units in ancilla qubits. In the implementation [6],
    the whole procedure requires around 10n gates and one ancilla qubit, and has depth
    roughly 2n (these notions are discussed in the section on algorithm complexity
    below). This approach can be adapted to adding a classical and a quantum number.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: Clifford+T 方法本质上使用了一种相当直接的“小学生”程序，将用二进制表示的两个量子数的位相加，并在辅助量子比特中跟踪进位单位。在实现[6]中，整个过程需要大约
    10n 个门和 1 个辅助量子比特，深度大约为 2n（这些概念在下面的算法复杂度部分讨论）。这种方法可以适应添加一个经典数和一个量子数。
- en: The QFT approach was proposed in the work of Draper [4]. It starts by acting
    on |x⟩ with a QFT gate, which is composed of H and P(π/2^j) gates, producing a
    superposition of states
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: QFT 方法由 Draper [4] 的工作提出。它首先对 |x⟩ 应用一个 QFT 门，该门由 H 和 P(π/2^j) 门组成，产生一个状态叠加
- en: \[ QFT|x\rangle = \frac{1}{2^{n/2}} \sum_{y=0}^{2^n-1} e^{2i\pi \frac{xy}{2^n}}
    |y\rangle \]
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: \[ QFT|x\rangle = \frac{1}{2^{n/2}} \sum_{y=0}^{2^n-1} e^{2i\pi \frac{xy}{2^n}}
    |y\rangle \]
- en: In this representation, the addition of a classical number Y can be implemented
    with n phase rotation gates acting on the n qubits of the register
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种表示法中，向经典数字Y的添加可以通过对寄存器的n个量子比特执行n个相位旋转门来实现
- en: \[ \prod_{i=0}^{n-1} P\left(2\pi Y\frac{2^i}{2^n}\right) QFT|x\rangle = QFT|(x
    + Y) \, \text{mod} \, 2^n \rangle \]
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: \[ \prod_{i=0}^{n-1} P\left(2\pi Y\frac{2^i}{2^n}\right) QFT|x\rangle = QFT|(x
    + Y) \, \text{mod} \, 2^n \rangle \]
- en: The strategy is thus to sandwich phase rotations between a QFT and a QFT^(-1)
    to implement the addition
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，策略是在QFT和QFT^(-1)之间夹入相位旋转来实现加法
- en: \[ |(x + Y)\, \text{mod}\, 2^n \rangle = QFT^{-1} \prod_{i=0}^{n-1} P\left(2\pi
    Y\frac{2^i}{2^n}\right) QFT |x\rangle \]
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: \[ |(x + Y)\, \text{mod}\, 2^n \rangle = QFT^{-1} \prod_{i=0}^{n-1} P\left(2\pi
    Y\frac{2^i}{2^n}\right) QFT |x\rangle \]
- en: The implementation of *controlled* addition is obtained by replacing phase gates
    by controlled phase gates.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将相位门替换为受控相位门，实现了*受控*添加的实现
- en: While the number of elementary gates in the QFT and QFT^(-1) operations is large,
    O(n²) actually, the subsequent addition in Fourier space requires only n phase
    gates which can operate in parallel. Several additions, or controlled additions,
    can be implemented sequentially, along the execution of a quantum circuit, while
    the quantum integer x is represented in Fourier space, via a sequence of (controlled)
    phase rotations. Moreover, the whole QFT-adder gate does not require ancilla qubits.
    This makes the QFT approach a preferred choice in many projects requiring quantum
    adder circuits.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然QFT和QFT^(-1)操作中的基本门数量很大，实际上是O(n²)，但在傅里叶空间中的后续加法只需要n个相位门，这些门可以并行操作。可以在量子整数x在傅里叶空间中通过一系列（受控）相位旋转表示的量子电路执行过程中，顺序地实现几个加法或受控加法。此外，整个QFT-加法器门不需要辅助量子比特。这使得QFT方法在许多需要量子加法电路的项目中成为首选选择。
- en: A recent review by S. Wang et al [5] compares the different state-of-the-art
    algorithms for quantum arithmetics and provides an extensive bibliography on the
    topic.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: S. Wang等人最近的一篇综述[5]比较了量子算术的不同最先进算法，并提供了关于该主题的广泛参考文献。
- en: It is important to note that the addition operation described above is always
    **modulo 2^n**. This is as expected, since we can only represent integers in the
    range [0, 2^n) with n qubits. So the operation that is implemented so far is
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 需要注意的是，上述描述的加法操作始终是 **模 2^n**。这是预期的，因为我们只能用n个量子比特表示范围 [0, 2^n) 内的整数。因此，到目前为止所实现的操作是
- en: '\[ \text{add}(Y): \quad |x\rangle_n \rightarrow |x+Y\rangle_n := |(x + Y)\,
    \text{mod}\, 2^n \rangle_n \]'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: '\[ \text{add}(Y): \quad |x\rangle_n \rightarrow |x+Y\rangle_n := |(x + Y)\,
    \text{mod}\, 2^n \rangle_n \]'
- en: where the subscript n indicates the number of qubits in the quantum register.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 其中下标n表示量子寄存器中的量子比特数量。
- en: The next step is to implement the “modulo N” part. This is substantially harder
    and requires a series of (controlled) additions and (controlled) subtractions.
    The basic ideas have been described in the work of Beauregard [2].
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 下一步是实现“模N”部分。这要困难得多，需要一系列（受控）加法和（受控）减法。基本思想已在Beauregard的工作[2]中描述。
- en: 'The steps proposed by Beauregard, with 0 ≤ Y < N and 0 ≤ x < N, are:'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: Beauregard提出的步骤，对于 0 ≤ Y < N 和 0 ≤ x < N，如下所示：
- en: With n = ⌈log[2](N)⌉, consider the n+1 qubit state |x⟩[n+1]. This is one more
    qubit than necessary to hold x, i.e. there is one “overflow” qubit initialised
    to |0⟩.
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当 n = ⌈log[2](N)⌉ 时，考虑n+1位量子态 |x⟩[n+1]。这比存储x所需的量子比特多一个，即有一个“溢出”量子比特初始化为 |0⟩。
- en: Add Y-N, using the add(Y-N) operation. This yields |x+Y-N⟩[n+1] if x+Y-N≥ 0,
    or |2^(n+1)-x+N)⟩ if x+Y-N < 0 .
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用add(Y-N)操作添加Y-N。如果 x+Y-N≥ 0，则得到 |x+Y-N⟩[n+1]，如果 x+Y-N < 0，则得到 |2^(n+1)-x+N)⟩。
- en: Compute the sign of x+Y-N in an ancilla qubit |a⟩. This is done via a CNOT gate
    acting on |a⟩ and controlled by the most significant bit (i.e. the overflow bit)
    of the n+1-qubit register. After this step |a⟩ = |0⟩ if x+Y ≥ N and |a⟩ = |1⟩
    if x+Y < N.
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在辅助量子比特 |a⟩ 中计算 x+Y-N 的符号。这是通过在 |a⟩ 上作用一个CNOT门并受控于n+1位寄存器的最高有效位（即溢出位）来完成的。在此步骤之后，如果
    x+Y ≥ N，则 |a⟩ = |0⟩；如果 x+Y < N，则 |a⟩ = |1⟩。
- en: Add N back to n+1-qubit register, controlled on |a⟩, using a controlled add(N)
    operation. The resulting state is |(x + Y) mod N⟩|a⟩.
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用受控加(N)操作，在 |a⟩ 上将N加回到n+1位寄存器中。结果状态是 |(x + Y) mod N⟩|a⟩。
- en: 'The following steps allow to reset the ancilla qubit to its initial state |0⟩:'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: '以下步骤允许将辅助量子比特重置到其初始状态 |0⟩:'
- en: Add -Y using an add(-Y) operation. After this step the n+1-register is in the
    state |x⟩ if x + Y < N, or in the state |2^(n+1)+x-N)⟩ if x+Y ≥ N.
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 add(-Y) 操作添加 -Y。在此步骤之后，n+1 个寄存器处于 |x\rangle 状态，如果 x + Y < N，或者处于 |2^(n+1)+x-N)⟩
    状态，如果 x+Y ≥ N。
- en: 'Reverse the ancilla bit controlled on the most significant bit of the n+1-qubit
    register with a CNOT gate. After this step the ancilla bit is always in the state
    |a⟩ = |1⟩. We reset it to |0⟩ by acting with a NOT gate: |a⟩ = NOT|1⟩ = |0⟩.'
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 CNOT 门反转控制于 n+1 个量子比特寄存器最高位的辅助比特。在此步骤之后，辅助比特始终处于 |a⟩ = |1\rangle 状态。我们通过作用
    NOT 门将其重置为 |0\rangle：|a⟩ = NOT|1\rangle = |0\rangle。
- en: Add Y back using an add(Y) operation. This leads to the final state |(x + Y)
    mod N⟩|0⟩.
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用 add(Y) 操作将 Y 添加回来。这导致最终状态 |(x + Y) mod N\rangle|0\rangle。
- en: This may look a little involved, but this is arguably the simplest quantum algorithm
    found so far to perform modular addition.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 这可能看起来有些复杂，但这是迄今为止找到的执行模加法最简单的量子算法。
- en: The last three steps, reverting the ancilla qubit |a⟩ back to its initial state
    |0⟩, are important, if the ancilla qubit is to be re-used in subsequent modular
    addition operations, which is the case in Shor’s algorithm. Alternatively, one
    could use new ancilla qubits for each modular addition, reducing the depths and
    gate counts of the full order-finding circuit, at the cost of increasing the number
    of qubits. Minimising the number of qubits is usually the primary objective, as
    current quantum processors have a limited number of qubits (more on this below).
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 最后三个步骤，将辅助量子比特 |a⟩ 恢复到其初始状态 |0⟩，如果辅助量子比特要在后续的模加法操作中重新使用，这在 Shor 算法中是这种情况。或者，可以为每个模加法使用新的辅助量子比特，这会减少全阶查找电路的深度和门计数，但会增加量子比特的数量。最小化量子比特的数量通常是主要目标，因为当前的量子处理器具有有限的量子比特数量（更多内容见下文）。
- en: The implementation of the *controlled* modular addition is obtained by replacing
    each addition/subtraction of a factor Y, by a controlled addition/subtraction.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将每个因子的加法/减法替换为受控加法/减法，得到受控模加法的实现。
- en: The next step is to implement the operation
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 下一步是实现以下操作
- en: \[ |x\rangle |y\rangle -> |x\rangle|(y+Ax) \,\text{mod}\, N\rangle \]
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: \[ |x\rangle |y\rangle -> |x\rangle|(y+Ax) \,\text{mod}\, N\rangle \]
- en: where 0 ≤ y < N is another quantum integer. This is done by decomposing the
    modular addition y ↦ (y + Ax) mod N into a sequence of modular additions y ↦ (y
    + 2^iA) mod N, implemented as add(2^iA, N)|y⟩ = |(y + 2^iA) mod N⟩, controlled
    on the i-th bit |x[i]⟩ of x = Σ[i] x[i] 2^i. As we saw, the modular addition requires
    an overflow qubit and an ancilla qubit, so the true operation we implement with
    this prescription is
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 0 ≤ y < N 是另一个量子整数。这是通过将模加法 y ↦ (y + Ax) mod N 分解为一系列模加法 y ↦ (y + 2^iA) mod
    N 来实现的，作为 add(2^iA, N)|y⟩ = |(y + 2^iA) mod N\rangle，受控于 x = Σ[i] x[i] 2^i 的 i-th
    位 |x[i]⟩。正如我们所见，模加法需要一个溢出量子比特和一个辅助量子比特，因此我们根据这个规定实施的真正操作是
- en: '\[ V_A: |x\rangle_n |y\rangle_{n+1} |0\rangle \rightarrow |x\rangle_n |(y+Ax)
    \, \text{mod}\, N\rangle_{n+1} |0\rangle \]'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: '\[ V_A: |x\rangle_n |y\rangle_{n+1} |0\rangle \rightarrow |x\rangle |(y+Ax)
    \, \text{mod}\, N\rangle_{n+1} |0\rangle \]'
- en: with subscripts indicating the number of qubits.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 使用下标表示量子比特的数量。
- en: Finally the U[A] operation is realised with
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，U[A] 操作是通过以下方式实现的
- en: \[
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: \[
- en: \begin{align}
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: \begin{align}
- en: 'U_A \, : \quad'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 'U_A \, : \quad'
- en: '|x\rangle_n |0\rangle_{n+1} |0\rangle  &\rightarrow |x\rangle_n |Ax\,\text{mod}\,
    N\rangle_{n+1} |0\rangle \\'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: '|x\rangle_n |0\rangle_{n+1} |0\rangle  &\rightarrow |x\rangle_n |Ax\,\text{mod}\,
    N\rangle_{n+1} |0\rangle \\'
- en: '&\rightarrow |Ax\,\text{mod}\, N\rangle_n |x\rangle_{n+1} |0\rangle \\'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: '&\rightarrow |Ax\,\text{mod}\, N\rangle_n |x\rangle_{n+1} |0\rangle \\'
- en: '&\rightarrow |Ax\,\text{mod}\, N\rangle_n |0\rangle_{n+1} |0\rangle'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: '&\rightarrow |Ax\,\text{mod}\, N\rangle_n |0\rangle_{n+1} |0\rangle'
- en: \end{align}
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: \end{align}
- en: \]
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: \]
- en: The first step is the V[A] operation. The second step uses SWAP gates to exchange
    the two sets of n qubits. Note that the overflow qubit of the middle state is
    not swapped (it is in the |0> state at this stage). The third step is the V[-B]
    operation with B = A^(-1), the inverse of A in *Z*[N], using the fact that (x
    – BAx) mod N = (x – x) mod N = 0. This is the first and only place where the condition
    that A and N are coprime integers is used (otherwise B does not exist).
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 第一步是 V[A] 操作。第二步使用 SWAP 门交换两组 n 个量子比特。请注意，中间状态的溢出量子比特没有交换（它目前处于 |0> 状态）。第三步是
    V[-B] 操作，其中 B = A^(-1)，是 A 在 *Z*[N] 中的逆，利用了 (x – BAx) mod N = (x – x) mod N =
    0 的性质。这是 A 和 N 是互质整数时使用的第一个也是唯一的位置（否则 B 不存在）。
- en: Counting the number of qubits used, we see that the full U[A] operation requires
    2n+2 qubits.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 计算使用的量子比特数量，我们看到完整的 U[A] 操作需要 2n+2 个量子比特。
- en: Quantum complexity analysis
  id: totrans-114
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 量子复杂度分析
- en: 'The “complexity” of a quantum algorithm is usually expressed in terms of three
    quantities: the number of qubits used, the number of gates used and the depth
    of the circuit.'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 量子算法的“复杂度”通常用三个量来表示：使用的量子比特数、使用的门数和电路的深度。
- en: The **number of qubits** used is a clear notion. It is important as quantum
    processors still have a limited number of qubits to work with (typically in the
    hundreds as of 2025).
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: '**量子比特数**是一个明确的概念。它很重要，因为量子处理器仍然有有限的量子比特可以工作（截至 2025 年，通常在数百个左右）。'
- en: The **number of gates** is a more fuzzy notion and often refers to the number
    of single-qubit and two-qubit gates such as H, NOT, P, SWAP, CNOT. This can be
    deceptive as the physical implementation of those gates may require several “physical”
    gates, representing qubit operations implemented at the hardware level. Typically
    two-qubit gates, such as SWAP and CNOT, between distant qubits require a chain
    of physical two-qubit gates acting on neighbouring qubits. The number of physical
    gates depends on the “connectivity” of the quantum processors, namely which two-qubit
    operations are allowed physically. Those correspond to operations on nearby qubits.
    Even single-qubit gates, such as the Hadamard gate, may require several physical
    single-qubit gates.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: '**门数**是一个较为模糊的概念，通常指的是单量子比特和双量子比特门（如 H、NOT、P、SWAP、CNOT）的数量。这可能会产生误导，因为那些门的物理实现可能需要几个“物理”门，代表在硬件级别上实现的量子比特操作。通常，远距离量子比特之间的双量子比特门（如
    SWAP 和 CNOT）需要一系列作用于邻近量子比特的物理双量子比特门。物理门的数量取决于量子处理器的“连通性”，即哪些双量子比特操作是物理上允许的。这些对应于邻近量子比特的操作。甚至单量子比特门，如
    Hadamard 门，也可能需要几个物理单量子比特门。'
- en: Since the set of physical gates and the hardware connectivity vary from one
    provider to the other, most of academic research simply focuses on counting the
    number of “basic” single-qubit and two-qubit gates.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 由于物理门集合和硬件连通性因提供商而异，大多数学术研究只是简单地关注计算“基本”单量子比特和双量子比特门的数量。
- en: The **depth** of the quantum circuit refers to the number of sequential operations
    on the qubits necessary to reach the final measurement step. The more parallelised
    operations on qubits there are, the lower is the depth. The depth can be roughly
    visualised as the length of the circuit in a pictorial representation. It is important
    to minimise the depth of a quantum circuit because the quantum coherence of qubits
    diminishes with the depth. The more sequential operations there are, the longer
    it takes to run the circuit before measuring its outcomes and the more time there
    is for qubits to interact with the environment and loose their coherence.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 量子电路的**深度**指的是达到最终测量步骤所需的量子比特的顺序操作数。量子比特上的并行操作越多，深度就越低。深度可以大致想象为电路在图示表示中的长度。最小化量子电路的深度很重要，因为量子比特的量子相干性会随着深度的增加而减弱。顺序操作越多，在测量结果之前运行电路所需的时间就越长，量子比特与环境相互作用并失去相干性的时间也就越多。
- en: If we take a look at our implementation of U[A] , we see that it requires (at
    least) 2n+2 qubits. The number of gates we used is O(n³) (a factor n² comes from
    using the QFT gate) and the depth is O(n²) (a factor n comes from using the QFT
    gate).
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们看看我们实现的 U[A]，我们会发现它至少需要 2n+2 个量子比特。我们使用的门数是 O(n³)（n² 的因子来自于使用 QFT 门），深度是
    O(n²)（n 的因子来自于使用 QFT 门）。
- en: The total order-finding circuit requires one more ancilla qubit, if we use the
    1-control qubit simplification, and performs O(n) sequential U[A] operations,
    so the total number of qubits required is 2n+3 (4n+2 if we use the circuit with
    2n control qubits), the total number of gates is O(n⁴) and the depth is O(n³).
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 如果使用 1 控制量子比特的简化，总阶数查找电路需要额外一个辅助量子比特，并执行 O(n) 个顺序 U[A] 操作，因此所需的量子比特总数是 2n+3（如果使用
    2n 控制量子比特的电路，则是 4n+2），总门数是 O(n⁴)，深度是 O(n³)。
- en: There is one more standard simplification, which is to use an approximate QFT
    transformation using only O(n log n) gates, instead of O(n²). This makes the evaluation
    of the order-finding fraction k/2^(2n) a bit less precise, but still good enough
    for running Shor’s algorithm with high success probability. This brings down the
    number of gates to O(n³ log n).
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 还有一个标准的简化方法，就是使用仅需要 O(n log n) 个门的近似量子场论（QFT）变换，而不是 O(n²)。这使得求出阶数分数 k/2^(2n)
    的精度略有降低，但对于以高成功概率运行 Shor 算法来说仍然足够好。这降低了门的数量到 O(n³ log n)。
- en: Many research papers have come with small improvements on these numbers, but
    no major breakthrough to my knowledge.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 许多研究论文都带来了这些数字的小幅改进，但据我所知，没有出现重大的突破。
- en: Overall the cost of running the algorithm, both in terms of number of qubits
    and number of operations is polynomial in n, which was the promise of Shor’s algorithm,
    showing a quantum advantage on the factoring task for very large integers N.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 总体而言，运行该算法的成本，无论是从量子比特的数量还是从操作的数量来看，都是n的多项式，这正是Shor算法的承诺，展示了在分解非常大的整数N的任务上的量子优势。
- en: Simulations and runs on IBM quantum hardware
  id: totrans-125
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在IBM量子硬件上的模拟和运行
- en: So far everything we discussed was theoretical, and known 20 years ago. Today
    several companies are trying to develop quantum processors which could in principle
    run Shor’s algorithm. In particular the [IBM Quantum Platform](https://quantum.cloud.ibm.com/)
    offers the possibility to perform a limited of number of quantum computations
    for free on quantum processors (QPUs) with 128 qubits.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 到目前为止，我们讨论的一切都是理论性的，并且20年前就已经为人所知。如今，有几家公司正在尝试开发量子处理器，这些处理器原则上可以运行Shor算法。特别是[IBM量子平台](https://quantum.cloud.ibm.com/)提供了在具有128个量子比特的量子处理器（QPUs）上免费执行一定数量的量子计算的可能性。
- en: The Qiskit SDK provides a convenient interface to implement quantum circuits,
    perform simulations and run the circuits on IBM quantum hardware. The learning
    platform offers an [introduction to Qiskit](https://learning.quantum.ibm.com/learning-path/getting-started-with-qiskit)
    for newcomers.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: Qiskit SDK提供了一个方便的接口来实现量子电路、执行模拟和在IBM量子硬件上运行电路。学习平台为新用户提供了一个[Qiskit简介](https://learning.quantum.ibm.com/learning-path/getting-started-with-qiskit)。
- en: '[PRE0]'
  id: totrans-128
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: To run Shor’s algorithm, we use the open-source *[qiskit-shor](https://github.com/benjamin-assel/qiskit-shor)*
    library, implemented by the author of this post. We invite any reader interested
    in the exact implementation to take a look at the linked repository.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 要运行Shor算法，我们使用作者开发的开源[qiskit-shor](https://github.com/benjamin-assel/qiskit-shor)库。我们邀请任何对精确实现感兴趣的读者查看链接的仓库。
- en: 'The *[qiskit-shor](https://github.com/benjamin-assel/qiskit-shor)* API has
    two functions: *find_order(A, N)* running the order-finding circuit and returning
    the order r of A in *Z*[N] , together with the distribution of measured outputs,
    and *find_factor(N)* which runs Shor’s algorithm in full and returns a factor
    of N, if one was found.'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: '[qiskit-shor](https://github.com/benjamin-assel/qiskit-shor) API有两个函数：*find_order(A,
    N)*运行顺序查找电路，并返回A在*Z*[N]中的顺序r，以及测量输出的分布，还有*find_factor(N)*，它运行完整的Shor算法，如果找到了因子，则返回N的一个因子。'
- en: To increase the chances of success, we run the order-finding circuit many times,
    between 100 and 1000 times, and observe a distribution of measured outputs. From
    this distribution, we consider the top 10 most frequent values to try and extract
    the order.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 为了增加成功的可能性，我们多次运行顺序查找电路，在100到1000次之间，并观察测量输出的分布。从这个分布中，我们考虑最频繁出现的10个值，以尝试提取顺序。
- en: The library implements both the order-finding circuit with 2n control qubits
    and the optimised version with one control qubit. However, we mostly use the less
    optimal version with 2n control qubits, as the IBM platform has stricter usage
    limitations for circuits using control flow operations.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 该库实现了包含2n个控制量子比特的顺序查找电路和包含一个控制量子比特的优化版本。然而，我们主要使用2n个控制量子比特的较不优版本，因为IBM平台对使用控制流操作的电路有更严格的限制。
- en: Simulations
  id: totrans-133
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 模拟
- en: After cloning the *[qiskit-shor](https://github.com/benjamin-assel/qiskit-shor)*
    repository, we can start with running simulations, using the qiskit Aer simulator.
    We run simulations without noise, to test the code. We will work only with small
    integers as simulating a quantum state of many qubits on a classical computer
    is computationally intensive and we only want to illustrate the above presentation
    with simple examples.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 在克隆[qiskit-shor](https://github.com/benjamin-assel/qiskit-shor)仓库后，我们可以开始运行模拟，使用qiskit
    Aer模拟器。我们进行无噪声模拟，以测试代码。我们只使用小整数，因为在经典计算机上模拟许多量子比特的量子状态计算量很大，我们只想用简单的例子来说明上述演示。
- en: '[PRE1]'
  id: totrans-135
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '[PRE2]'
  id: totrans-136
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '![](../Images/1a1b439ed50a27b08dc5be4f10d42bfe.png)'
  id: totrans-137
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/1a1b439ed50a27b08dc5be4f10d42bfe.png)'
- en: Histogram of the measured output values of the order-finding circuit with A=7
    and N=15, using Qiskit Aer simulations (100 runs)
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Qiskit Aer模拟的顺序查找电路的测量输出值的直方图，其中A=7，N=15（100次运行）
- en: 'The function returns the order 4, which is correct, 7⁴ = 1 mod 15\. The output
    distribution shows four values for the returned integer k: 00000000, 01000000,
    1000000, 11000000, corresponding to the binary notation of the integers 0, 2⁶,
    2⁷ and 2⁶+2⁷ respectively. The output has 2n=8 qubits, with n=⌈log[2](15)⌉=4\.
    The distribution of approximate fractions k/2⁸ has values 0, 1/4, 1/2, 3/4, with
    similar number of occurrences. These correspond to the expected phases estimates
    j/4, j=0, 1, 2, 3, of the operator U[7]. The common denominator 4 of these fractions
    gives us the order of 7 in *Z*[15] .'
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: 函数返回了正确的阶数4，7⁴ = 1 mod 15。输出分布显示了返回整数k的四个值：00000000、01000000、1000000、11000000，分别对应于整数0、2⁶、2⁷和2⁶+2⁷的二进制表示。输出有2n=8个量子位，其中n=⌈log[2](15)⌉=4。近似分数k/2⁸的分布值为0、1/4、1/2、3/4，出现次数相似。这些对应于算子U[7]的预期相位估计j/4，j=0,
    1, 2, 3。这些分数的公共分母4给出了7在*Z*[15]中的阶数。
- en: Let us look at a second example and search for the order of 5 in *Z*[21].
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看第二个例子，并搜索*Z*[21]中5的阶数。
- en: '[PRE3]'
  id: totrans-141
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '[PRE4]'
  id: totrans-142
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: '![](../Images/189a46f77421e24bcdfcae951e8003cd.png)'
  id: totrans-143
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/189a46f77421e24bcdfcae951e8003cd.png)'
- en: Distribution of the order-finding circuit outputs (500 runs) for A=5, N=21.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 阶数查找电路输出的分布（500次运行）对于A=5，N=21。
- en: The quantum search returns the correct value 6\. The distribution of outputs
    has more outcomes and importantly shows some peaks. Replacing the histogram bin
    labels by the corresponding fractions k/2^(10) (rounded to 4 decimals) the histogram
    becomes
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 量子搜索返回了正确的值6。输出分布有更多的结果，并且更重要的是显示出一些峰值。将直方图箱标签替换为相应的分数k/2^(10)（四舍五入到小数点后四位），直方图变为
- en: '![](../Images/66a759b37a3a5dffd3857c94b0fb3e44.png)'
  id: totrans-146
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/66a759b37a3a5dffd3857c94b0fb3e44.png)'
- en: Same distribution, labeled with estimated phases k/2^(10)
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 同样的分布，标记为估计相位k/2^(10)
- en: We see that there are peaks at 0, 1/6, 1/3, 1/2, 2/3 and 5/6, which are all
    the values of the form j/6, j =0, 1, 2, 3, 4, 5 (the peaks do not appear regularly
    spaced in the figure, due to bins with zero outcomes dropping). The values j/6
    correspond to the eigenvalues of the unitary operator U[5], with 6 being the order
    of 5 in Z[21], as expected.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 我们看到在0、1/6、1/3、1/2、2/3和5/6处有峰值，这些值都是j/6的形式，其中j=0, 1, 2, 3, 4, 5（由于零结果的出现不规律，图中的峰值分布不均匀）。j/6对应于单位算子U[5]的特征值，6是5在Z[21]中的阶数，正如预期的那样。
- en: We can simulate the full algorithm for completeness and extract non-trivial
    factors for N=15 and N=21\. The following code runs Shor’s algorithm with a maximum
    of 3 trial values for A, stopping if a factor of N is found. Each trial consists
    in running 100 times the order-finding circuit.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 为了完整性，我们可以模拟整个算法，并提取N=15和N=21的非平凡因子。以下代码运行Shor算法，对A进行最多3次尝试，如果找到N的因子则停止。每次尝试包括运行100次阶数查找电路。
- en: '[PRE5]'
  id: totrans-150
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: '[PRE6]'
  id: totrans-151
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: The value A=4 was randomly selected, then the order 2 was found, finally the
    factor 3 of N=15 was returned.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 随机选择了A=4的值，然后找到了阶数2，最后返回了N=15的因子3。
- en: '[PRE7]'
  id: totrans-153
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: '[PRE8]'
  id: totrans-154
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: The value A=17 was tried first, getting the order 6, but gcd(A^(r/2) – 1, N)
    = gcd(4912, 21) = 1, so this does not give a factor of 21\. The value 19 was tried
    next, getting the order 6 again. This time gcd(A^(r/2) – 1, N) = gcd(6858, 21)
    = 3, giving the factor 3 of 21.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 首先尝试了A=17的值，得到了阶数6，但gcd(A^(r/2) – 1, N) = gcd(4912, 21) = 1，所以这不会给出21的因子。接下来尝试了19的值，又得到了阶数6。这次gcd(A^(r/2)
    – 1, N) = gcd(6858, 21) = 3，给出了21的因子3。
- en: Quantum runs
  id: totrans-156
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 量子运行
- en: Now that we are convinced that the order-finding circuit is correctly implemented,
    we can try to run it on actual QPUs.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 既然我们已经确信阶数查找电路被正确实现，我们就可以尝试在真实的量子处理器（QPUs）上运行它。
- en: '[PRE9]'
  id: totrans-158
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: '[PRE10]'
  id: totrans-159
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Let us now try to find the order of 7 in *Z*[15], as in the simulation above.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们尝试在*Z*[15]中找到7的阶数，就像上面的模拟一样。
- en: '[PRE11]'
  id: totrans-161
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: '[PRE12]'
  id: totrans-162
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: '![](../Images/66bbc946f4b41bad9b0aa9ec9004d14f.png)'
  id: totrans-163
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/66bbc946f4b41bad9b0aa9ec9004d14f.png)'
- en: The correct order 4 of 7 in Z[15] is returned, but the distribution of outcomes
    is far from the one in the simulation, which had only 4 observed values. Here
    almost all values between 0 and 2⁸-1 appear, making the plot rather unreadable.
    There are some small peaks, but the result is largely dominated by noise. It is
    somewhat miraculous that from the 10 most frequent values, the algorithm is able
    to extract the correct order.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 返回了Z[15]中7的正确阶数4，但结果分布与模拟中的分布大相径庭，模拟中只有4个观察到的值。这里几乎所有的值都在0到2⁸-1之间，使得图表难以阅读。有一些小的峰值，但结果主要受噪声主导。从10个最频繁的值中，算法能够提取出正确的阶数。
- en: Other runs for different values of A, for N=15 or N=21, produce similar noisy
    data. This is because the quantum hardware is subject to quantum noise interfering
    with unitary gate operations. The more gates there are, the more noise there is.
    In the N=15 order finding circuit, our implementation has already 2482 gates.
    This is way to much for the current quantum computation capacities.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 对于 N=15 或 N=21 的不同 A 值的其他运行，产生相似的有噪声数据。这是因为量子硬件容易受到量子噪声的干扰，影响单位门操作。门越多，噪声就越大。在
    N=15 的阶数查找电路中，我们的实现已经有 2482 个门。这对于当前的量子计算能力来说已经太多了。
- en: '[PRE13]'
  id: totrans-166
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: '[PRE14]'
  id: totrans-167
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: We can try a case with fewer qubits, by searching for the order of 5 in *Z*[6],
    using the one-control qubit optimised circuit.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以通过搜索 *Z*[6] 中 5 的阶数，使用单控制比特优化电路来尝试一个具有较少量子比特的案例。
- en: '[PRE15]'
  id: totrans-169
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: '[PRE16]'
  id: totrans-170
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
