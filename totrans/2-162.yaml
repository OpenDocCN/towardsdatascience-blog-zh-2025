  type: TYPE_NORMAL
  zh: '[基于列级血缘的感知变化数据验证](https://towardsdatascience.com/change-aware-data-validation-with-column-level-lineage/)'
- en: '[Jens Winkelmann](https://towardsdatascience.com/author/jens-winkelmann/) joins
    our author community with a multidisciplinary background in physics, data science,
