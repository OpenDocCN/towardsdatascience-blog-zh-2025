- en: Worried About AI? Use It to Your Advantage
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 担心人工智能？利用它来为你带来优势
- en: 原文：[https://towardsdatascience.com/worried-about-ai-use-it-to-your-advantage/](https://towardsdatascience.com/worried-about-ai-use-it-to-your-advantage/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/worried-about-ai-use-it-to-your-advantage/](https://towardsdatascience.com/worried-about-ai-use-it-to-your-advantage/)
- en: Never miss a new edition of *The Variable*, our weekly newsletter featuring
    a top-notch selection of editors’ picks, deep dives, community news, and more.
  id: totrans-2
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 不要错过我们每周精选的编辑推荐、深度分析、社区新闻等内容的《变量》周刊的新一期。
- en: ''
  id: totrans-3
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[Subscribe today](https://newsletter.towardsdatascience.com/subscription-to-the-newsletter)'
  id: totrans-4
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[今天订阅](https://newsletter.towardsdatascience.com/subscription-to-the-newsletter)'
- en: The debate around AI’s impact on [tech careers](https://towardsdatascience.com/tag/career-advice/) has
    been polarizing—to put it very, *very* mildly.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 关于人工智能对[技术职业](https://towardsdatascience.com/tag/career-advice/)影响的辩论已经两极分化——说得非常、非常温和。
- en: The utopians are pointing towards a future where data scientists and programmers
    can focus on management, strategy, and deep thinking, instead of on boring, repetitive
    tasks. The pessimists, meanwhile, are dreading a future in which there are no
    more data scientists and programmers.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 乌托邦主义者指向一个未来，在那里数据科学家和程序员可以专注于管理、战略和深度思考，而不是无聊、重复的任务。与此同时，悲观主义者害怕一个没有更多数据科学家和程序员的未来。
- en: This week, we invite you to explore the space between these positions and the
    opportunities that arise amid uncertainty. The articles we’ve selected suggest
    that we can harness AI’s power to become better and more effective at our jobs—while
    foregrounding the qualities that make humans irreplaceable.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 这周，我们邀请您探索这些立场之间的空间以及在不确定性中出现的机遇。我们精选的文章表明，我们可以利用人工智能的力量，使我们的工作变得更好、更有效，同时突出人类不可替代的品质。
- en: '* * *'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Become a Better Data Scientist with These Prompt Engineering Tips and Tricks
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '[使用这些提示工程技巧和窍门成为更好的数据科学家](https://towardsdatascience.com/become-a-better-data-scientist-with-these-prompt-engineering-hacks/)'
- en: “I see prompt engineering as a superpower,” says [Sara Nobrega](https://towardsdatascience.com/author/saranobregafn/)—one
    that enables smarter work and substantial time savings for junior and seasoned
    data professionals alike. In the first part of her new series, Sara unpacks the
    benefits of prompt engineering during the EDA (exploratory data analysis) process.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: “我认为提示工程是一种超级能力，”[Sara Nobrega](https://towardsdatascience.com/author/saranobregafn/)说——这种能力使初级和资深数据专业人士都能更聪明地工作并节省大量时间。在她的新系列的第一部分，Sara探讨了提示工程在EDA（探索性数据分析）过程中的好处。
- en: '[Become a Better Data Scientist with These Prompt Engineering Tips and Tricks](https://towardsdatascience.com/become-a-better-data-scientist-with-these-prompt-engineering-hacks/)'
  id: totrans-11
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[使用这些提示工程技巧和窍门成为更好的数据科学家](https://towardsdatascience.com/become-a-better-data-scientist-with-these-prompt-engineering-hacks/)'
- en: Rethinking Data Science Interviews in the Age of AI
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在人工智能时代重新思考数据科学面试
- en: Yu Dong makes a compelling case for an AI-informed hiring process, and explains
    how candidates can use new tools to showcase their skills.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: Yu Dong提出了一个有说服力的论点，主张采用人工智能驱动的招聘流程，并解释了候选人如何使用新工具来展示他们的技能。
- en: '[Rethinking Data Science Interviews in the Age of AI](https://towardsdatascience.com/rethinking-data-science-interviews-in-the-age-of-ai/)'
  id: totrans-14
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[在人工智能时代重新思考数据科学面试](https://towardsdatascience.com/rethinking-data-science-interviews-in-the-age-of-ai/)'
- en: Your Personal Analytics Toolbox
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 你的个人分析工具箱
- en: With the aid of the open-source MCP (model context protocol), Mariya Mansurova
    believes data scientists stand to make their work more streamlined—and more interesting.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 在开源MCP（模型上下文协议）的帮助下，Mariya Mansurova相信数据科学家可以使他们的工作更加流畅和有趣。
- en: '[Your Personal Analytics Toolbox](https://towardsdatascience.com/your-personal-analytics-toolbox/)'
  id: totrans-17
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[你的个人分析工具箱](https://towardsdatascience.com/your-personal-analytics-toolbox/)'
