- en: 4 Techniques to Optimize Your LLM Prompts for Cost, Latency and Performance
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 4 Techniques to Optimize Your LLM Prompts for Cost, Latency and Performance
- en: 原文：[https://towardsdatascience.com/4-techniques-to-optimize-your-llm-prompts-for-cost-latency-and-performance/](https://towardsdatascience.com/4-techniques-to-optimize-your-llm-prompts-for-cost-latency-and-performance/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/4-techniques-to-optimize-your-llm-prompts-for-cost-latency-and-performance/](https://towardsdatascience.com/4-techniques-to-optimize-your-llm-prompts-for-cost-latency-and-performance/)
- en: <mdspan datatext="el1761767594681" class="mdspan-comment">LLMs are capable</mdspan>
    of automating a significant number of tasks. Since the release of ChatGPT in 2022,
    we have seen more and more AI products on the market utilizing LLMs. However,
    there are still a lot of improvements that should be made in the way we utilize
    LLMs. Improving your prompt with an LLM prompt improver and utilizing cached tokens
    are, for example, two simple techniques you can utilize to vastly improve the
    performance of your LLM application.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1761767594681" class="mdspan-comment">LLMs能够</mdspan>自动化大量的任务。自从2022年ChatGPT发布以来，我们看到了市场上越来越多的AI产品开始使用LLMs。然而，在如何使用LLMs的方式上，还有很多改进的空间。例如，使用LLM提示优化器优化你的提示以及利用缓存令牌是两种你可以利用来极大地提高你LLM应用性能的简单技术。
- en: In this article, I’ll discuss several specific techniques you can apply to the
    way you create and structure your prompts, which will reduce latency and cost,
    and also increase the quality of your responses. The goal is to present you with
    these specific techniques, so you can immediately implement them into your own
    LLM application.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我将讨论你可以应用于创建和结构化提示的具体技术，这将减少延迟和成本，并提高你回答的质量。目标是向你展示这些具体技术，以便你可以立即将它们应用到自己的LLM应用中。
- en: '![](../Images/3fb3ddc924f10aa50ba21093d5f4631f.png)'
  id: totrans-4
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/3fb3ddc924f10aa50ba21093d5f4631f.png)'
- en: This infographic highlights the main contents of this article. I’ll discuss
    four different techniques to greatly improve the performance of your LLM application,
    with regard to cost, latency, and output quality. I’ll cover utilizing cached
    tokens, having the user question at the end, using prompt optimizers, and having
    your own customized LLM benchmarks. Image by Gemini.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 这张信息图表突出了本文的主要内容。我将讨论四种不同的技术，以极大地提高你的LLM应用在成本、延迟和输出质量方面的性能。我将涵盖利用缓存令牌、让用户在最后提问、使用提示优化器以及拥有你自己的定制LLM基准。图片由Gemini提供。
- en: Why you should optimize your prompt
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么你应该优化你的提示
- en: In a lot of cases, you might have a prompt that works with a given LLM and yields
    adequate results. However, in a lot of cases, you haven’t spent much time optimizing
    the prompt, which leaves a lot of potential on the table.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 在很多情况下，你可能有一个与特定LLM一起工作并产生足够结果的提示。然而，在许多情况下，你没有花太多时间优化提示，这留下了很多潜在的机会。
- en: I argue that using the specific techniques I’ll present in this article, you
    can easily both improve the quality of your responses and reduce costs without
    much effort. Just because a prompt and LLM work doesn’t mean it’s performing optimally,
    and in a lot of cases, you can see great improvements with very little effort.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为，使用我在本文中将要介绍的具体技术，你可以轻松地提高你回答的质量，同时减少成本，而不需要付出太多努力。仅仅因为一个提示和LLM在运行，并不意味着它正在以最佳状态运行，而且在很多情况下，你只需付出很少的努力，就能看到很大的改进。
- en: Specific techniques to optimize
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 优化特定技术
- en: In this section, I’ll cover the specific techniques you can utilize to optimize
    your prompts.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我将介绍你可以利用的具体技术来优化你的提示。
- en: Always keep static content early
  id: totrans-11
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 总是尽早保持静态内容
- en: The first technique I’ll cover is to always keep static content early in your
    prompt. With static content, I refer to content that remains the same when you
    make multiple API calls.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 我将要介绍的第一种技术是在你的提示中尽早保持静态内容。在这里，我指的是当你进行多次API调用时保持不变的内容。
- en: The reason you should keep the static content early is that all the big LLM
    providers, such as Anthropic, Google, and OpenAI, utilize cached tokens. Cached
    tokens are tokens that have already been processed in a previous API request,
    and that can be processed cheaply and quickly. It varies from provider to provider,
    but cached input tokens are usually priced around 10% of normal input tokens.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 你应该尽早保持静态内容的原因是，所有的LLM主要提供商，如Anthropic、Google和OpenAI，都使用缓存令牌。缓存令牌是之前API请求中已经处理过的令牌，可以以较低的成本和速度处理。这因提供商而异，但缓存输入令牌的价格通常在正常输入令牌的10%左右。
- en: Cached tokens are tokens that have already been processed in a previous API
    request, and that can be processed **cheaper and faster than normal tokens**
  id: totrans-14
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 缓存的标记是之前在API请求中已处理的标记，并且可以比正常标记**更便宜、更快地处理**
- en: That means, if you send in the same prompt two times in a row, the input tokens
    of the second prompt will only cost 1/10th the input tokens of the first prompt.
    This works because the LLM providers cache the processing of these input tokens,
    which makes processing your new request cheaper and faster.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着，如果你连续两次发送相同的提示，第二个提示的输入标记将只花费第一个提示输入标记的1/10。这是因为LLM提供商缓存了这些输入标记的处理，这使得处理你的新请求更便宜、更快。
- en: '* * *'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: In practice, caching input tokens is done by keeping variables at the end of
    the prompt.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 在实践中，通过在提示的末尾保持变量来实现输入标记的缓存。
- en: 'For example, if you have a long system prompt with a question that varies from
    request to request, you should do something like this:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果你有一个长的系统提示，其中包含的问题随请求而变化，你应该这样做：
- en: '[PRE0]'
  id: totrans-19
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'For example:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 例如：
- en: '[PRE1]'
  id: totrans-21
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Here we have the static content of the prompt first, before we put the variable
    contents (the user question) last.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 在此，我们首先放置提示的静态内容，然后在我们将变量内容（用户问题）放在最后之前。
- en: '* * *'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'In some scenarios, you want to feed in document contents. If you’re processing
    a lot of different documents, you should keep the document content at the end
    of the prompt:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 在某些情况下，你想要输入文档内容。如果你正在处理很多不同的文档，你应该在提示的末尾保留文档内容：
- en: '[PRE2]'
  id: totrans-25
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'However, suppose you’re processing the same documents multiple times. In that
    case, you can make sure the tokens of the document are also cached by ensuring
    no variables are put into the prompt beforehand:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，如果你正在多次处理相同的文档，你可以确保通过确保在提示之前不放入任何变量来确保文档标记也被缓存：
- en: '[PRE3]'
  id: totrans-27
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Note that cached tokens are usually only activated if the first 1024 tokens
    are the same in two requests. For example, if your static system prompt in the
    above example is shorter than 1024 tokens, you’ll not utilize any cached tokens.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，缓存的标记通常仅在两个请求的前1024个标记相同的情况下才会被激活。例如，如果你的上述示例中的静态系统提示短于1024个标记，你将无法利用任何缓存的标记。
- en: '[PRE4]'
  id: totrans-29
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Your prompts should always be built up with the most static contents first (the
    content varying the least from request to request), the the most dynamic content
    (the content varying the most from request to request)
  id: totrans-30
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 你的提示应该始终以最静态的内容开始（与请求变化最少的内容），然后是最动态的内容（与请求变化最多的内容）
- en: If you have a long system and user prompt without any variables, you should
    keep that first, and add the variables at the end of the prompt
  id: totrans-31
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果你有一个没有变量的长系统和用户提示，你应该首先保留它，然后在提示的末尾添加变量
- en: If you are fetching text from documents, for example, and processing the same
    document twice, you should
  id: totrans-32
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 如果你正在从文档中获取文本，例如，并且处理相同的文档两次，你应该
- en: Could be document contents, or if you have a long prompt -> make use of caching
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 可能是文档内容，或者如果你有一个长的提示 -> 利用缓存
- en: Question at the end
  id: totrans-34
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 问题的结尾
- en: 'Another technique you should utilize to improve LLM performance is to always
    put the user question at the end of your prompt. Ideally, you organize it so you
    have your system prompt containing all the general instructions, and the user
    prompt simply consists of only the user question, such as below:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 你应该利用的另一种技术来提高LLM性能是始终将用户问题放在你的提示的末尾。理想情况下，你组织它，使你的系统提示包含所有一般指令，而用户提示仅由用户问题组成，如下所示：
- en: '[PRE5]'
  id: totrans-36
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: In Anthropic’s prompt engineering docs, the state that includes the user prompt
    at the end can improve performance by up to 30%, especially if you are using long
    contexts. Including the question in the end makes it clearer to the model which
    task it’s trying to achieve, and will, in many cases, lead to better results.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 在Anthropic的提示工程文档中，包括用户提示的状态可以提高性能高达30%，特别是如果你使用的是长上下文。在最后包含问题可以使模型更清楚地了解它试图完成的任务，并且在许多情况下会导致更好的结果。
- en: Using a prompt optimizer
  id: totrans-38
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用提示优化器
- en: A lot of times, when humans write prompts, they become messy, inconsistent,
    include redundant content, and lack structure. Thus, you should always feed your
    prompt through a prompt optimizer.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 很多次，当人类编写提示时，它们变得混乱、不一致，包含冗余内容，缺乏结构。因此，你应该始终通过提示优化器来处理你的提示。
- en: The simplest prompt optimizer you can use is to prompt an LLM to *improve this
    prompt {prompt}*,and it will provide you with a more structured prompt, with less
    redundant content, and so on.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以使用最简单的提示优化器是提示一个LLM来*改进这个提示 {prompt}*，它将为你提供一个更结构化的提示，内容更少冗余，等等。
- en: 'An even better approach, however, is to use a specific prompt optimizer, such
    as one you can find in OpenAI’s or Anthropic’s consoles. These optimizers are
    LLMs specifically prompted and created to optimize your prompts, and will usually
    yield better results. Furthermore, you should make sure to include:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，更好的方法是使用特定的提示优化器，例如你可以在OpenAI或Anthropic的控制台中找到的优化器。这些优化器是专门针对LLM进行提示和创建的，以优化你的提示，并且通常会得到更好的结果。此外，你应该确保包括：
- en: Details about the task you’re trying to achieve
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 关于你试图完成的任务的详细信息
- en: Examples of tasks the prompt succeeded at, and the input and output
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示成功完成的任务示例，以及输入和输出
- en: Example of tasks the prompt failed at, with the input and output
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示失败的任务示例，包括输入和输出
- en: Providing this additional information will usually yield way better results,
    and you’ll end up with a much better prompt. In many cases, you’ll only spend
    around 10-15 minutes and end up with a way more performant prompt. This makes
    using a prompt optimizer one of the lowest effort approaches to improving LLM
    performance.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 提供这些额外的信息通常会得到更好的结果，你最终会得到一个更好的提示。在许多情况下，你只需花费大约10-15分钟，就能得到一个性能更高的提示。这使得使用提示优化器成为提高LLM性能最低效力的方法之一。
- en: Benchmark LLMs
  id: totrans-46
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 基准LLM
- en: The LLM you use will also significantly impact the performance of your LLM application.
    Different LLMs are good at different tasks, so you need to try out the different
    LLMs on your specific application area. I recommend at least setting up access
    to the biggest LLM providers like Google Gemini, OpenAI, and Anthropic. Setting
    this up is quite simple, and switching your LLM provider takes a matter of minutes
    if you already have credentials set up. Furthermore, you can consider testing
    open-source LLMs as well, though they usually require more effort.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 你使用的LLM也会显著影响你的LLM应用性能。不同的LLM擅长不同的任务，因此你需要尝试在你的特定应用领域使用不同的LLM。我建议至少设置访问最大的LLM提供商，如Google
    Gemini、OpenAI和Anthropic。设置这一点相当简单，如果你已经设置了凭证，切换LLM提供商只需几分钟。此外，你也可以考虑测试开源LLM，尽管它们通常需要更多的努力。
- en: You now need to set up a specific benchmark for the task you’re trying to achieve,
    and see which LLM works best. Additionally, you should regularly check model performance,
    since the big LLM providers occasionally upgrade their models, without necessarily
    coming out with a new version. You should, of course, also be ready to try out
    any new models coming out from the large LLM providers.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 你现在需要为你要完成的任务设置一个特定的基准，并查看哪个LLM表现最好。此外，你应该定期检查模型性能，因为大型LLM提供商偶尔会升级他们的模型，而不一定推出新版本。当然，你也应该准备好尝试来自大型LLM提供商的任何新模型。
- en: Conclusion
  id: totrans-49
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this article, I’ve covered four different techniques you can utilize to improve
    the performance of your LLM application. I discussed utilizing cached tokens,
    having the question at the end of the prompt, using prompt optimizers, and creating
    specific LLM benchmarks. These are all relatively simple to set up and do, and
    can lead to a significant performance increase. I believe many similar and simple
    techniques exist, and you should always try to be on the lookout for them. These
    topics are usually described in different blog posts, where Anthropic is one of
    the blogs that has helped me improve LLM performance the most.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我介绍了四种你可以利用来提高你的LLM应用性能的技术。我讨论了使用缓存令牌、将问题放在提示的末尾、使用提示优化器以及创建特定的LLM基准。这些设置和操作相对简单，并且可以带来显著的性能提升。我相信存在许多类似且简单的技术，你应该始终努力寻找它们。这些主题通常在不同的博客文章中描述，其中Anthropic是我帮助我提高LLM性能最多的博客之一。
