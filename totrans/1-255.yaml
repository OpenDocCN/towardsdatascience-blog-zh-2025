- en: 'Generative AI Myths, Busted: An Engineer’s Quick Guide'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/gen-ai-myths-busted-a-engineerss-quick-guide/](https://towardsdatascience.com/gen-ai-myths-busted-a-engineerss-quick-guide/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '<mdspan datatext="el1758562821536" class="mdspan-comment">I wrote this article</mdspan>
    initially for my team, as a number of our engineers felt uneasy utilizing AI in
    their daily job. They asked some large and reasonable questions: Where do these
    models originate? Any concern on data breaches? And the hardest one (took me a
    bit of time to figure it out myself) – am I making AI replace me by using it?
    As a team member who is actually quite passionate about AI, I get those worries.'
  prefs: []
  type: TYPE_NORMAL
- en: 'That’s why I’ve put together this short, handy manual: **to debunk some myths
    and provide a helpful playbook for engineers to utilize AI.** To me, success for
    AI isn’t measured by how many fancy tools it can spit out. That’s not the point.
    The point is: does it actually make us more productive? How effectively does it
    make humans work smarter and even lazier? And since engineers are among the most
    important consumers of this technology, I believe it’s worth clearing things up.'
  prefs: []
  type: TYPE_NORMAL
- en: So … What is Generative AI, and What is an LLM?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: When people discuss tools like ChatGPT, Claude, or Amazon Q, what they’re really
    referring to is a **language model**. This is the core technology that powers
    much of generative AI. It’s trained to understand written language and respond
    by generating new text. When these models are scaled up to include billions, or
    even trillions, of parameters, they become what we call **Large Language Models**,
    or **LLMs**. LLMs are just one kind of generative AI, specifically designed to
    work with text and code.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s start with the basics.
  prefs: []
  type: TYPE_NORMAL
- en: Tokens, not just words
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'In language models, the smallest unit of understanding isn’t always a full
    word, it’s a **token**. Think of tokens like LEGO bricks: small pieces that come
    together to build bigger structures. A token might be a complete word (like “castle”),
    part of a word (“cast”), or even just a single letter or character. For example:'
  prefs: []
  type: TYPE_NORMAL
- en: '*The sentence* “I love programming” *might be split into tokens:* [I] [love]
    [pro] [gramming]*.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'This process is called *tokenization*. It’s how a model learns those materials
    to build its vocabulary. These vocabularies can be huge: GPT-4’s has around 100,000
    tokens. Claude’s is even larger.'
  prefs: []
  type: TYPE_NORMAL
- en: How Language Models Learn (differently)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'There are two main learning approaches for language models:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Masked models**: These models learn by *hiding a word* and trying to predict
    what should go in the blank..'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '*“Tony Stark is also known as ___ Man.”*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The model learns to fill in the blank. It figures out that “Tony Stark” provides
    the strongest clue, while “is” and “also” don’t a add much value.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '2\. **Autoregressive models**: These models predict *the next word*, one word
    at a time.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Start with: “Elsa walked into the castle…”'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'The model continues: “…and the doors slammed shut behind her.”'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: In this way it builds the story, word by word.
  prefs: []
  type: TYPE_NORMAL
- en: 'Both of these approaches give the model a superpower: the ability to **generate
    text**. **A model that can generate open-ended outputs is called generative, hence
    the term generative AI.**'
  prefs: []
  type: TYPE_NORMAL
- en: What Does “Open-Ended Output” Mean?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Back to our Marvel example:'
  prefs: []
  type: TYPE_NORMAL
- en: '*“Tony Stark is also known as ___ Man.”*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Most people (and most models) would say “Iron.” But a model could also come
    up with “Powerful,” “Funny,” or even “Family.”
  prefs: []
  type: TYPE_NORMAL
- en: 'That’s open-ended output: the model isn’t tied to just one “correct” answer.
    It makes predictions based on probabilities. Sometimes it nails it. Other times?
    Not so much. This is why AI can feel both **magical and unpredictable**.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The big leap: from LM to LLM'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Scaling up turns a language model into a large language model. It is similar
    to studying the whole dictionary to score high on the GRE. Given more data and
    more parameters, the model can capture more nuanced patterns. Parameters are similar
    to knobs on a soundboard — the more knobs you have, the more complicated the music
    gets. GPT-4, for example, has been estimated to have 1.76 trillion parameters.
  prefs: []
  type: TYPE_NORMAL
- en: Obviously, that requires enormous quantities of data. And we can’t label data
    forever. The thing that changed everything was self-supervised learning. Instead
    of relying on humans to label every sentence, the model is able to learn by itself
    by covering up words and predicting them back out. It’s like taking fill-in-the-blanks
    questions at superhuman speed.
  prefs: []
  type: TYPE_NORMAL
- en: 'And that’s why LLMs shine with code: **programming languages are a trainer’s
    ideal domain.** Code is highly formal, syntactically rigorous, and avoids the
    messy vagaries of natural language. The same action in Python will behave in the
    same manner each and every time, as opposed to the English sentence, which can
    hold multiple different meanings depending upon tone, culture, or situation. That
    precision is what makes the model not need trillions of lines of code in order
    to “get it.” Even with smaller data sets of code, the patterns are consistent
    enough that the model can generalize well and produce surprisingly robust results.'
  prefs: []
  type: TYPE_NORMAL
- en: Not only LLMs
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Let it be noted before we go further that an **LLM is just one type of generative
    AI**. It just happens that it’s the most common and most widely used today, but
    not the whole story.
  prefs: []
  type: TYPE_NORMAL
- en: Current models are typically **LMMs (Large Multimodal Models)**. They don’t
    just work with text. They also comprehend and generate through images, audio,
    or even video. That’s why you see models that can read a block of code, describe
    an image, and then translate it to plain English, in one go.
  prefs: []
  type: TYPE_NORMAL
- en: 'In the past several years, there has also been another term in the conversation:
    **foundation models**. They are very large models trained on general-purpose data
    with broad scope. Think of them as the “ground floor” or “vanilla flavor in ice
    cream world”. Once trained, they can subsequently be fine-tuned or stretched to
    apply to more specialized tasks ,  like creating software documentation, powering
    a company chatbot, or reviewing contracts. “Foundation” is the term used to describe
    them in opposition to the smaller, specialty models developed above them.'
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Common Myths (If you don’t care about definitions and details)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Myth 1: “AI understands like we do.”'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**Fact:** AI doesn’t “understand” in the human sense, it predicts (with probabilities).
    With previous text (the context) it makes an educated guess about what comes next.
    Good predictions can simulate understanding, but under the hood probabilities
    all the way down. Nevertheless, some experiments are intriguing. One blog showed
    how different models seem to play “personalities.” OpenAI’s O3 turned out to be
    a master of deception in a diplomacy game, while Claude Opus 4 just wanted everyone
    to get along.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Myth 2: “AI just copies training data.”'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**Fact:** It doesn’t store training examples about like a clipboard. It stores
    patterns into weights (numerical dials of the model) that it tweaks during training.
    When you query it, the model doesn’t copy-paste but instead creates new sequences.
    That being said, data privacy remains an issue. If private data was used for training,
    it can still pop out indirectly, or be read by humans during reinforcement.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Myth 3: “Prompts are hacks.”'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**Fact:** Prompts aren’t hacks, they’re steering wheels. A prompt sets up context
    so the model knows which tokens to weight more heavily. If you still remember
    our previous example:'
  prefs: []
  type: TYPE_NORMAL
- en: '*“Tony Stark is also known as ___ Man.”*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Here, “Tony Stark” carries the greatest weight, and capitalized “Man” helps
    the model to zero in on “Iron.” The filler words (“is also known as”) weigh relatively
    less. An effective prompt does the same: it highlights the important cues so the
    model can reach a correct inference. That is no hack but a guidance.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Myth 4: “AI always gives the same answer.”'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**Fact:** Nope. Generative AI relies on probabilities, not preprogrammed scripts.
    That means that the same question will have different answers depending on randomness,
    temperature settings, or even slight difference in your prompt. Every now and
    then that’s fantastic (brainstorming), and sometimes it’s confusing and frustrating
    (inconsistent answers).'
  prefs: []
  type: TYPE_NORMAL
- en: 'Myth 5: “Bigger models are always better.”'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**Fact:** Size helps, but it’s not everything. That’s to say, big is not always
    better. An enormous model such as GPT-4 may be amazing, but a smaller specialized
    model may outdo it on a specific task. Agility and specialization can sometimes
    beat force..'
  prefs: []
  type: TYPE_NORMAL
- en: 'Myth 6: “AI can replace engineers.”'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**Fact:** Generative AI is a fantastic programming assistant, thanks to its
    disposition towards systematic, rule-governed programming languages. But it still
    doesn’t qualify it as a lead engineer. Rather, it’s akin to a speedy intern, who
    are wonderful at creating rough drafts, boilerplate, and even great snippets,
    but in need of review and oversight.'
  prefs: []
  type: TYPE_NORMAL
- en: In short, **Generative AI will not replace engineers, but it will change what
    engineering is.** The skill set will be different. Instead of spending most of
    their time typing out every line of code, engineers are able to focus more on
    system architecture, design, and project oversight. Generative AI can write functions
    but cannot weigh trade-offs, understand business goals, or manage complexity at
    scale. That’s where there needs to be a human at the helm.
  prefs: []
  type: TYPE_NORMAL
- en: 'Myth 7: “AI is just too dumb when it makes things up.”'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**Fact:** What make AI seems to be very stupid is usually a hallucination.
    Remember when we told you that a model gives open-ended responses based on probabilities?
    That’s where it begins. If the model doesn’t have context, or if the fact you’re
    asking about is an unusual one, it still has to fill in the blank and make you
    happy. So it anticipates something that sounds good, though it may be mistaken.'
  prefs: []
  type: TYPE_NORMAL
- en: Another common reason is the **context window**. A model has only a chance to
    “see” a number of tokens at once like a short-term memory buffer. If your question
    depends on information outside of that window, it simply gets lost. The model
    then guesses and fills in the blank with it, and it could be completely off.
  prefs: []
  type: TYPE_NORMAL
- en: Hallucinations do not mean the AI is malfunctioning, they’re a consequence of
    a system designed to generate freely and never follow a script.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 'Practical Playbook: Working with AI as a Software Engineer'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Think of AI as a (human) team member. Tell it what you need in plain language.
    Don’t mind grammar, and don’t try to be funny. Be direct and keep going. Ask as
    many “stupid” questions as you want along the way. The loop is simple: ask, review
    (results), refine (requests), repeat.'
  prefs: []
  type: TYPE_NORMAL
- en: 1) Context first
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Tell the model who this is for, what the goal is, and what constraints matter.
  prefs: []
  type: TYPE_NORMAL
- en: '*Mini prompt Example*:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]python[PRE1]'
  prefs: []
  type: TYPE_NORMAL
- en: 2) Declare the task
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Define steps or acceptance criteria clearly, so “done” is well-defined.
  prefs: []
  type: TYPE_NORMAL
- en: '*Mini prompt Example*:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: 3) Constrain the output
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Ask for a shape so you don’t get a wall of text.
  prefs: []
  type: TYPE_NORMAL
- en: '*Mini prompt Example*:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: 4) Inspect and iterate
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Treat the first draft as a sketch. Point to the piece that is wrong. Ask for
    a correction. Loop again.
  prefs: []
  type: TYPE_NORMAL
- en: 5) Keep a living log file
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Ask the model to save each large step and change into a file so you can reuse
    context later.
  prefs: []
  type: TYPE_NORMAL
- en: '*Mini prompt* Example:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: 6) Work within the context window
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Models only “see” a brief snippet of recent text. Compress chat history when
    the thread grows too long.
  prefs: []
  type: TYPE_NORMAL
- en: '**A. Do it with a prompt**. You can use the following compression prompt and
    paste it when the chat is heavy:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: '**B. Use the tool when available**. Some of the services that employ AI also
    have built-in tools to help. For example, Amazon Q has a `/compact` command, which
    condenses the chat history into a shorter one. It even warns you when your conversation
    is getting close to the limit and suggests compacting. [(Related AWS Documentation)](https://docs.aws.amazon.com/amazonq/latest/qdeveloper-ug/command-line-chat-compact.html)'
  prefs: []
  type: TYPE_NORMAL
- en: '**C. Re-seed the next turn**. Paste the brief back in after compaction as the
    new context. Then your next request.'
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Wrapping Up
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Generative AI is not out to replace engineers, but it’s revolutionizing what
    engineering is. Properly leveraged, it’s less of a competitor and more of an assistant
    to help speed up the drudge so that we (engineers) can focus on design, systems,
    and the hard decisions. The engineers that’ll thrive will be those who can guide
    it, push back on it, and make it a team player. Because, ultimately, even Iron
    Man had to fly the suit.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Enjoyed this? Read more posts from me on TDS — or subscribe to [my newsletter](https://theamyma101.substack.com/)
    for more. Thank you!
  prefs: []
  type: TYPE_NORMAL
