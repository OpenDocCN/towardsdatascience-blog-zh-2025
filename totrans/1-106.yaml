- en: 'The Three Ages of Data Science: When to Use Traditional Machine Learning, Deep
    Learning, or a LLM (Explained with One Example)'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/the-three-ages-of-data-science-when-to-use-traditional-machine-learning-deep-learning-or-a-large-language-models-explained-with-one-example/](https://towardsdatascience.com/the-three-ages-of-data-science-when-to-use-traditional-machine-learning-deep-learning-or-a-large-language-models-explained-with-one-example/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '<mdspan datatext="el1762806271152" class="mdspan-comment">One of the best songs</mdspan>
    of the universe (made by one of the most iconic singers ever) says this:'
  prefs: []
  type: TYPE_NORMAL
- en: Wish I could go back
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: And change these years
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I’m going through changes
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Black sabbath – Changes
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: This song is incredibly powerful and talks about how life can change right in
    front of you so quickly.
  prefs: []
  type: TYPE_NORMAL
- en: 'That song is about a broken heart and a love story. However, it also reminds
    me a lot of the changes that my job, as a Data Scientist, has undergone over the
    last 10 years of my career:'
  prefs: []
  type: TYPE_NORMAL
- en: When I started studying Physics, the only thing I thought of when someone said
    “Transformer” was Optimus Prime. Machine Learning for me was all about **Linear
    Regression, SVM, Random Forest** etc…[***2016***]
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When I did my Master’s Degree in Big Data and Physics of Complex Systems, I
    first heard of “**BERT**” and various Deep Learning technologies that seemed very
    promising at that time. The first GPT models came out, and they looked very interesting,
    even though no one expected them to be as powerful as they are today. [***2018-2020***]
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Fast forward to my life now as a full-time Data Scientist. Today, if you don’t
    know what GPT stands for and have never read **“Attention is All You Need”** you
    have very few chances of passing a Data Science System Design interview. [***2021
    – today***]
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When people state that the tools and the everyday life of a person working with
    data are substantially different than 10 (or even 5) years ago, I agree all the
    way. What *I do not agree* with is the idea that the tools used in the past should
    be erased just because everything now seems to be solvable with GPT, LLMs, or
    Agentic AI.
  prefs: []
  type: TYPE_NORMAL
- en: The goal of this article is to consider a single task, which is **classifying
    the love/hate/neutral intent of a Tweet.** In particular, we will do it with **traditional
    Machine Learning, Deep Learning,** and **Large Language Models.**
  prefs: []
  type: TYPE_NORMAL
- en: 'We will do this hands-on, using Python, and we will describe why and when to
    use each approach. Hopefully, after this article, you will learn:'
  prefs: []
  type: TYPE_NORMAL
- en: The **tools** used in the early days should still be considered, studied, and
    at times adopted.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Latency, Accuracy, and Cost** should be evaluated when choosing the best
    algorithm for your use case'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Changes** in the Data Scientist world are necessary and to be embraced without
    fear 🙂'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Let’s get started!
  prefs: []
  type: TYPE_NORMAL
- en: 1\. The Use Case
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The case we are dealing with is something that is actually very adopted in
    Data Science/AI applications: **sentiment analysis**. This means that, given a
    text, we want to extrapolate the “feeling” behind the author of that text. This
    is very useful for cases where you want to gather the feedback behind a given
    review of an object, a movie, an item you are recommending, etc…'
  prefs: []
  type: TYPE_NORMAL
- en: In this blog post, we are using a very “famous” sentiment analysis example,
    **which is classifying the feeling behind a tweet**. As I wanted more control,
    we will not work with organic tweets scraped from the web (where labels are uncertain).
    Instead, we will be using content generated by **Large Language Models** that
    we can control.
  prefs: []
  type: TYPE_NORMAL
- en: This technique also allows us to tune the difficulty and the variety of the
    problem and to observe how different techniques react.
  prefs: []
  type: TYPE_NORMAL
- en: '**Easy case**: the love tweets sound like postcards, the hate ones are blunt,
    and the neutral messages talk about weather and coffee. If a model struggles here,
    something else is off.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Harder case**: still love, hate, neutral, but now we inject sarcasm, mixed
    tones, and subtle hints that demand attention to context. We also have **less**
    data, to have a smaller dataset to train with.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Extra Hard case:** we move to five emotions: love, hate, anger, disgust,
    envy, so the model has to parse richer, more layered sentences. Moreover, we have
    0 entries to train the data: we can not do any training.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I have generated the data and put each of the files in a specific folder of
    the public [GitHub Folder](https://github.com/PieroPaialungaAI/DataScienceJobChanges_TDS/tree/main)
    I have created for this project [[data](https://github.com/PieroPaialungaAI/DataScienceJobChanges_TDS/tree/main/data)].
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Our goal is to build a smart classification system that will be able to efficiently
    grasp the **sentiment** behind the tweets. But how shall we do it? Let’s figure
    it out.
  prefs: []
  type: TYPE_NORMAL
- en: 2\. System Design
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'A picture that is always extremely helpful to consider is the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/fb7a0dbbb6f6b280862d4280ad77ba10.png)'
  prefs: []
  type: TYPE_IMG
- en: Image made by author
  prefs: []
  type: TYPE_NORMAL
- en: '**Accuracy**, **latency**, and **scale** in a Machine Learning system form
    a triangle. You can only fully optimize two at the same time.'
  prefs: []
  type: TYPE_NORMAL
- en: You can have a very accurate model that scales very well with millions of entries,
    but it won’t be quick. You can have a quick model that scales with millions of
    entries, but it won’t be that accurate. You can have an accurate and quick model,
    but it won’t scale very well.
  prefs: []
  type: TYPE_NORMAL
- en: These considerations are abstracted from the specific problem, but they help
    guide which ML System Design to build. We will come back to this.
  prefs: []
  type: TYPE_NORMAL
- en: Also, the power of our model should be proportional to the size of our training
    set. In general, we try to avoid the training set error to decrease at the cost
    of an increase in the test set (the famous **overfitting**).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/1e8d72651a2bc8e91eefe738843a95b6.png)'
  prefs: []
  type: TYPE_IMG
- en: Image made by author
  prefs: []
  type: TYPE_NORMAL
- en: We don’t want to be in the Underfitting or Overfitting area. Let me explain
    why.
  prefs: []
  type: TYPE_NORMAL
- en: In simple terms, underfitting happens when your model is too simple to learn
    the real pattern in your data. It is like trying to draw a straight line through
    a spiral. Overfitting is the opposite. The model learns the training data too
    well, including all the noise, so it performs great on what it has already seen
    but poorly on new data. The sweet spot is the middle ground, where your model
    understands the structure without memorizing it.
  prefs: []
  type: TYPE_NORMAL
- en: We will come back to this one as well.
  prefs: []
  type: TYPE_NORMAL
- en: '3\. Easy Case: Traditional Machine Learning'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'We open with the friendliest scenario: a highly structured dataset of 1,000
    tweets that we generated and labelled. The three classes (positive, neutral, negative)
    are balanced on purpose, the language is very explicit, and every row lives in
    a clean CSV.'
  prefs: []
  type: TYPE_NORMAL
- en: Let’s start with a simple import block of code.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s see what the dataset looks like:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/adf9baf47c407ca11f39fd35417a1f6a.png)'
  prefs: []
  type: TYPE_IMG
- en: Image made by author
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, we anticipate that this **won’t scale** for millions of rows (because
    the dataset is too structured to be diverse). However, we can build a very quick
    and accurate method for this tiny and specific use case. Let’s start with the
    modeling. Three main points to consider:'
  prefs: []
  type: TYPE_NORMAL
- en: We are doing **train/test split** with 20% of the dataset in the test set.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: We are going to use a [**TF-IDF**](https://en.wikipedia.org/wiki/Tf%E2%80%93idf)
    approach to get the embeddings of the words. TF-IDF stands for Term Frequency–Inverse
    Document Frequency. It is a classic technique that transforms text into numbers
    by giving each word a weight based on how important it is in a document compared
    to the whole dataset.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'We will combine this technique with two ML models: **Logistic Regression**
    and **Support Vector Machines**, from [scikit-learn](https://scikit-learn.org/).
    Logistic Regression is simple and interpretable, often used as a strong baseline
    for text classification. Support Vector Machines focus on finding the best boundary
    between classes and usually perform very well when the data is not too noisy.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: And the performance is essentially perfect for both models.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/2dd73e4f3c310bd5cc68031cf9a97222.png)'
  prefs: []
  type: TYPE_IMG
- en: Image made by author
  prefs: []
  type: TYPE_NORMAL
- en: For this very simple case, where we have a consistent dataset of 1,000 rows,
    a traditional approach gets the job done. No need for billions of parameter models
    like GPT.
  prefs: []
  type: TYPE_NORMAL
- en: '4\. Hard Case: Deep Learning'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The second dataset is still synthetic, but it is designed to be annoying on
    purpose. Labels remain love, hate, and neutral, yet the tweets lean on sarcasm,
    mixed tone, and backhanded compliments. On top of that, the training pool is smaller
    while the validation slice stays large, so the models work with less evidence
    and more ambiguity.
  prefs: []
  type: TYPE_NORMAL
- en: Now that we have this ambiguity, we need to take out the bigger guns. There
    are Deep Learning embedding models that maintain strong accuracy and still scale
    well in these cases (remember the triangle and the error versus complexity plot!).
    In particular, Deep Learning embedding models learn the meaning of words from
    their context instead of treating them as isolated tokens.
  prefs: []
  type: TYPE_NORMAL
- en: 'For this blog post, we will use [BERT](https://arxiv.org/abs/1810.04805), which
    is one of the most famous embedding models out there. Let’s first import some
    libraries:'
  prefs: []
  type: TYPE_NORMAL
- en: … and some helpers.
  prefs: []
  type: TYPE_NORMAL
- en: Thanks to these functions, we can quickly evaluate our embedding model vs the
    TF-IDF approach.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/2d99ef465058004a5f91e93cfa381a1b.png)![](../Images/ffb342b7deb34fdb8b275fd4614f1420.png)'
  prefs: []
  type: TYPE_IMG
- en: Image made by author
  prefs: []
  type: TYPE_NORMAL
- en: As we can see, the TF-IDF model is extremely underperforming in the positive
    labels, while it preserves high accuracy when using the embedding model (BERT).
  prefs: []
  type: TYPE_NORMAL
- en: '5\. Extra Hard case: LLM Agent'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Ok, now let’s make things VERY hard:'
  prefs: []
  type: TYPE_NORMAL
- en: We only have **100 rows.**
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: We assume **we do not know the labels**, meaning we cannot train any machine
    learning model.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'We have **five** labels: envy, hate, love, disgust, anger.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![](../Images/3b502c34d2608fd66c42e46cd20aea56.png)'
  prefs: []
  type: TYPE_IMG
- en: As we can not train anything, but we still want to perform our classification,
    we must adopt a method that somehow already has the classifications within. **Large
    Language Models** are the greatest example of such a method.
  prefs: []
  type: TYPE_NORMAL
- en: 'Note that if we used LLMs for the other two cases, it would be like shooting
    a fly with a cannon. But here, it makes perfect sense: the task is challenging,
    and we have no way to do anything smart, because we can not train our model (we
    don’t have the training set).'
  prefs: []
  type: TYPE_NORMAL
- en: In this case, we have accuracy at a large scale. However, the API takes some
    time, so we have to wait a second or two before the response comes back (remember
    the triangle!).
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s import some libraries:'
  prefs: []
  type: TYPE_NORMAL
- en: 'And this is the classification API call:'
  prefs: []
  type: TYPE_NORMAL
- en: 'And we can see that the LLM does an amazing classification job:'
  prefs: []
  type: TYPE_NORMAL
- en: 6\. Conclusions
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Over the past decade, the role of the Data Scientist has changed as dramatically
    as the technology itself. This might lead to the idea of just using the most powerful
    tools out there, but that is NOT the best route for many cases.
  prefs: []
  type: TYPE_NORMAL
- en: 'Instead of reaching for the biggest model first, we tested one problem through
    a simple lens: accuracy, latency, and cost.'
  prefs: []
  type: TYPE_NORMAL
- en: 'In particular, here is what we did, step by step:'
  prefs: []
  type: TYPE_NORMAL
- en: '**We defined our use case as tweet sentiment classification, aiming to detect
    love, hate, or neutral intent**. We designed three datasets of increasing difficulty:
    a clean one, a sarcastic one, and a zero-training one.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**We tackled the easy case using TF-IDF with Logistic Regression and SVM.**
    The tweets were clear and direct, and both models performed almost perfectly.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**We moved to the hard case, where sarcasm, mixed tone, and subtle context
    made the task more complex**. We used BERT embeddings to capture meaning beyond
    individual words.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Finally, for the extra hard case with no training data, we used a Large Language
    Model to classify emotions directly through zero-shot learning.**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Each step showed how the right tool depends on the problem. Traditional ML is
    fast and reliable when the data is structured. Deep Learning models help when
    meaning hides between the lines. LLMs are powerful when you have no labels or
    need broad generalization.
  prefs: []
  type: TYPE_NORMAL
- en: 7\. Before you head out!
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Thank you again for your time. It means a lot ❤️
  prefs: []
  type: TYPE_NORMAL
- en: 'My name is Piero Paialunga, and I’m this guy here:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/0c5430e219c906f69a60578e6620b560.png)'
  prefs: []
  type: TYPE_IMG
- en: Image made by author
  prefs: []
  type: TYPE_NORMAL
- en: 'I’m originally from Italy, hold a Ph.D. from the **University of Cincinnati**,
    and work as a **Data Scientist at The Trade Desk** in New York City. I write about
    **AI, Machine Learning, and the evolving role of data scientists** both here on
    TDS and on LinkedIn. If you liked the article and want to know more about machine
    learning and follow my studies, you can:'
  prefs: []
  type: TYPE_NORMAL
- en: A. Follow me on [**Linkedin**](https://www.linkedin.com/in/pieropaialunga/),
    where I publish all my stories
  prefs: []
  type: TYPE_NORMAL
- en: B. Follow me on [**GitHub**](https://github.com/PieroPaialungaAI), where you
    can see all my code
  prefs: []
  type: TYPE_NORMAL
- en: C. For questions, you can send me an email at ***piero.paialunga@hotmail***
  prefs: []
