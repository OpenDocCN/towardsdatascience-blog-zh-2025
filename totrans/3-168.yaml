- en: Effortless Spreadsheet Normalisation With LLM
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/effortless-spreadsheet-normalisation-with-llm/](https://towardsdatascience.com/effortless-spreadsheet-normalisation-with-llm/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: This article is part of a series of articles on automating data cleaning for
    any tabular dataset.
  prefs: []
  type: TYPE_NORMAL
- en: You can test the feature described in this article on your own dataset using
    the [CleanMyExcel.io](https://cleanmyexcel.io/) service, which is free and requires
    no registration.
  prefs: []
  type: TYPE_NORMAL
- en: '![Tidy and untidy examples of a spreadsheet](../Images/b130a9f2839958fe1debc3c410db7f85.png)'
  prefs: []
  type: TYPE_IMG
- en: Start with the why
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![A spreadsheet containing information about awards given to films](../Images/52615ed264438020704e23a1a667b429.png)'
  prefs: []
  type: TYPE_IMG
- en: Let’s consider this Excel spreadsheet, which contains information on awards
    given to films. It is sourced from the book [*Cleaning Data for Effective Data
    Science*](https://github.com/PacktPublishing/Cleaning-Data-for-Effective-Data-Science)
    and is available [here](https://www.gnosis.cx/cleaning/Film_Awards.xlsx).
  prefs: []
  type: TYPE_NORMAL
- en: This is a typical and common spreadsheet that everyone may own and deal with
    in their daily tasks. But what is wrong with it?
  prefs: []
  type: TYPE_NORMAL
- en: 'To answer that question, let us first recall the end goal of using data: to
    derive insights that help guide our decisions in our personal or business lives.
    This process requires at least two crucial things:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Reliable data: clean data without issues, inconsistencies, duplicates, missing
    values, etc.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Tidy data: a well-normalised data frame that facilitates processing and manipulation.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The second point is the primary foundation of any analysis, including dealing
    with data quality.
  prefs: []
  type: TYPE_NORMAL
- en: 'Returning to our example, imagine we want to perform the following actions:'
  prefs: []
  type: TYPE_NORMAL
- en: 1\. For each film involved in multiple awards, list the award and year it is
    associated with.
  prefs: []
  type: TYPE_NORMAL
- en: 2\. For each actor/actress winning multiple awards, list the film and award
    they are associated with.
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Check that all actor/actress names are correct and well-standardised.
  prefs: []
  type: TYPE_NORMAL
- en: Naturally, this example dataset is small enough to derive those insights by
    eye or by hand if we structure it (as quickly as coding). But imagine now that
    the dataset contains the entire awards history; this would be time-consuming,
    painful, and error-prone without any automation.
  prefs: []
  type: TYPE_NORMAL
- en: Reading this spreadsheet and directly understanding its structure by a machine
    is difficult, as it does not follow good practices of data arrangement. That is
    why tidying data is so important. By ensuring that data is structured in a machine-friendly
    way, we can simplify parsing, automate quality checks, and enhance business analysis—all
    without altering the actual content of the dataset.
  prefs: []
  type: TYPE_NORMAL
- en: 'Example of a reshaping of this data:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Example of a reshaping of the data from the previous spreadsheet:](../Images/04713d4cfc4f17a7aeee579838c22583.png)'
  prefs: []
  type: TYPE_IMG
- en: Now, anyone can use low/no-code tools or code-based queries (SQL, Python, etc.)
    to interact easily with this dataset and derive insights.
  prefs: []
  type: TYPE_NORMAL
- en: The main challenge is how to turn a shiny and human-eye-pleasant spreadsheet
    into a machine-readable tidy version.
  prefs: []
  type: TYPE_NORMAL
- en: Moving on to the what? The tidy data guidelines
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: What is tidy data? A well-shaped data frame?
  prefs: []
  type: TYPE_NORMAL
- en: The term *tidy data* was described in a well‐known article named [Tidy Data](https://www.jstatsoft.org/article/view/v059i10)
    by Hadley Wickham and published in the Journal of Statistical Software in 2014\.
    Below are the key quotes required to understand the underlying concepts better.
  prefs: []
  type: TYPE_NORMAL
- en: '**Data tidying **'
  prefs: []
  type: TYPE_NORMAL
- en: “Structuring datasets to facilitate manipulation, visualisation and modelling.”
  prefs: []
  type: TYPE_NORMAL
- en: “Tidy datasets provide a standardised way of linking the structure of a dataset
    (its physical layout) with its semantics (its meaning).”
  prefs: []
  type: TYPE_NORMAL
- en: '**Data structure**'
  prefs: []
  type: TYPE_NORMAL
- en: “Most statistical datasets are rectangular tables composed of rows and columns.
    The columns are almost always labelled, and the rows are sometimes labelled.”
  prefs: []
  type: TYPE_NORMAL
- en: '**Data semantics**'
  prefs: []
  type: TYPE_NORMAL
- en: “A dataset is a collection of values, usually either numbers (if quantitative)
    or strings (if qualitative). Values are organised in two ways. Every value belongs
    to both a variable and an observation. A variable contains all values that measure
    the same underlying attribute (such as height, temperature or duration) across
    units. An observation contains all values measured on the same unit (for example,
    a person, a day or a race) across attributes.”
  prefs: []
  type: TYPE_NORMAL
- en: '“In a given analysis, there may be multiple levels of observation. For example,
    in a trial of a new allergy medication, we might have three types of observations:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Demographic data* collected from each person (age, sex, race),'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Medical data* collected from each person on each day (number of sneezes, redness
    of eyes), and'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Meteorological data* collected on each day (temperature, pollen count).”'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Tidy data**'
  prefs: []
  type: TYPE_NORMAL
- en: '“Tidy data is a standard way of mapping the meaning of a dataset to its structure.
    A dataset is considered messy or tidy depending on how its rows, columns and tables
    correspond to observations, variables and types. In tidy data:'
  prefs: []
  type: TYPE_NORMAL
- en: Each variable forms a column.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Each observation forms a row.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Each type of observational unit forms a table.”
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Common problems with messy datasets
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**Column headers might be values rather than variable names.**'
  prefs: []
  type: TYPE_NORMAL
- en: '**Messy example:** A table where column headers are years (2019, 2020, 2021)
    instead of a “Year” column.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Tidy version:** A table with a “Year” column and each row representing an
    observation for a given year.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Multiple variables might be stored in one column.**'
  prefs: []
  type: TYPE_NORMAL
- en: '**Messy example:** A column named “Age_Gender” containing values like 28_Female'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Tidy version:** Separate columns for “Age” and “Gender”'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Variables might be stored in both rows and columns.**'
  prefs: []
  type: TYPE_NORMAL
- en: '**Messy example:** A dataset tracking student test scores where subjects (Math,
    Science, English) are stored as both column headers and repeated in rows instead
    of using a single “Subject” column.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Tidy version:** A table with columns for “Student ID,” “Subject,” and “Score,”
    where each row represents one student’s score for one subject.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Multiple types of observational units might be stored in the same table.**'
  prefs: []
  type: TYPE_NORMAL
- en: '**Messy example:** A sales dataset that contains both customer information
    and store inventory in the same table.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Tidy version:** Separate tables for “Customers” and “Inventory.”'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**A single observational unit might be stored in multiple tables.**'
  prefs: []
  type: TYPE_NORMAL
- en: '**Messy example:** A patient’s medical records are split across multiple tables
    (Diagnosis Table, Medication Table) without a common patient ID linking them.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Tidy version:** A single table or properly linked tables using a unique “Patient
    ID.”'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Now that we have a better understanding of what tidy data is, let’s see how
    to transform a messy dataset into a tidy one.
  prefs: []
  type: TYPE_NORMAL
- en: Thinking about the how
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '*“Tidy datasets are all alike, but every messy dataset is messy in its own
    way.” Hadley Wickham (cf. Leo Tolstoy)*'
  prefs: []
  type: TYPE_NORMAL
- en: Although these guidelines sound clear in theory, they remain difficult to generalise
    easily in practice for any kind of dataset. In other words, starting with the
    messy data, no simple or deterministic process or algorithm exists to reshape
    the data. This is mainly explained by the singularity of each dataset. Indeed,
    it is surprisingly hard to precisely define variables and observations in general
    and then transform data automatically without losing content. That is why, despite
    massive improvements in data processing over the last decade, data cleaning and
    formatting are still done “manually” most of the time.
  prefs: []
  type: TYPE_NORMAL
- en: Thus, when complex and hardly maintainable rules-based systems are not suitable
    (i.e. to precisely deal with all contexts by describing decisions in advance),
    machine learning models may offer some benefits. This grants the system more freedom
    to adapt to any data by generalising what it has learned during training. Many
    large language models (LLMs) have been exposed to numerous data processing examples,
    making them capable of analysing input data and performing tasks such as spreadsheet
    structure analysis, table schema estimation, and code generation.
  prefs: []
  type: TYPE_NORMAL
- en: Then, let’s describe a workflow made of code and LLM-based modules, alongside
    business logic, to reshape any spreadsheet.
  prefs: []
  type: TYPE_NORMAL
- en: '![Diagram of a workflow made of code and LLM-based modules alongside business
    logic to reshape a spreadsheet](../Images/330ed39e1feccb4260309111364fd554.png)'
  prefs: []
  type: TYPE_IMG
- en: '**Spreadsheet encoder**'
  prefs: []
  type: TYPE_NORMAL
- en: 'This module is designed to serialise into text the main information needed
    from the spreadsheet data. Only the necessary subset of cells contributing to
    the table layout is retained, removing non-essential or overly repetitive formatting
    information. By retaining only the necessary information, this step minimises
    token usage, reduces costs, and enhances model performance.. The current version
    is a deterministic algorithm inspired by the paper [SpreadsheetLLM: Encoding Spreadsheets
    for Large Language Models](https://arxiv.org/abs/2407.09025), which relies on
    heuristics. More details about it will be the topic of a next article.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Table structure analysis**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Before moving forward, asking an LLM to extract the spreadsheet structure is
    a crucial step in building the next actions. Here are examples of questions addressed:'
  prefs: []
  type: TYPE_NORMAL
- en: How many tables are present, and what are their locations (regions) in the spreadsheet?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What defines the boundaries of each table (e.g., empty rows/columns, specific
    markers)?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Which rows/columns serve as headers, and do any tables have multi-level headers?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Are there metadata sections, aggregated statistics, or notes that need to be
    filtered out or processed separately?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Are there any merged cells, and if so, how should they be handled?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Table schema estimation**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Once the analysis of the spreadsheet structure has been completed, it is now
    time to start thinking about the ideal target table schema. This involves letting
    the LLM process iteratively by:'
  prefs: []
  type: TYPE_NORMAL
- en: Identifying all potential columns (multi-row headers, metadata, etc.)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Comparing columns for domain similarities based on column names and data semantics
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Grouping related columns
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The module outputs a final schema with names and a short description for each
    retained column.
  prefs: []
  type: TYPE_NORMAL
- en: '**Code generation to format the spreadsheet**'
  prefs: []
  type: TYPE_NORMAL
- en: Considering the previous structure analysis and the table schema, this last
    LLM-based module should draft code that transforms the spreadsheet into a proper
    data frame compliant with the table schema. Moreover, no useful content must be
    omitted (e.g. aggregated or computed values may still be derived from other variables).
  prefs: []
  type: TYPE_NORMAL
- en: 'As generating code that works well from scratch at the first iteration is challenging,
    two internal iterative processes are added to revise the code if needed:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Code checking**: Whenever code cannot be compiled or executed, the trace
    error is provided to the model to update its code.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Data frame validation**: The metadata of the created data frame—such as column
    names, first and last rows, and statistics about each column—is checked to validate
    whether the table conforms to expectations. Otherwise, the code is revised accordingly.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Convert the data frame into an Excel file**'
  prefs: []
  type: TYPE_NORMAL
- en: Finally, if all data fits properly into a single table, a worksheet is created
    from this data frame to respect the tabular format. The final asset returned is
    an Excel file whose active sheet contains the tidy spreadsheet data.
  prefs: []
  type: TYPE_NORMAL
- en: Et voilà! The sky’s the limit for making the most of your newly tidy dataset.
  prefs: []
  type: TYPE_NORMAL
- en: Feel free to test it with your own dataset using the [CleanMyExcel.io](https://cleanmyexcel.io/)
    service, which is free and requires no registration.
  prefs: []
  type: TYPE_NORMAL
- en: '**Final note on the workflow**'
  prefs: []
  type: TYPE_NORMAL
- en: Why is a workflow proposed instead of an [agent](https://www.anthropic.com/research/building-effective-agents)
    for that purpose?
  prefs: []
  type: TYPE_NORMAL
- en: 'At the time of writing, we consider that a workflow based on LLMs for precise
    sub-tasks is more robust, stable, iterable, and maintainable than a more autonomous
    agent. An agent may offer advantages: more freedom and liberty in actions to perform
    tasks. Nonetheless, they may still be hard to deal with in practice; for example,
    they may diverge quickly if the objective is not clear enough. I believe this
    is our case, but that does not mean that this model would not be applicable in
    the future in the same way as [SWE-agent](https://arxiv.org/abs/2405.15793) coding
    is performing, for example.'
  prefs: []
  type: TYPE_NORMAL
- en: Next articles in the series
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In upcoming articles, we plan to explore related topics, including:'
  prefs: []
  type: TYPE_NORMAL
- en: A detailed description of the spreadsheet encoder mentioned earlier.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Data validity: ensuring each column meets the expectations.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Data uniqueness: preventing duplicate entities within the dataset.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Data completeness: handling missing values effectively.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Evaluating data reshaping, validity, and other key aspects of data quality.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Stay tuned!
  prefs: []
  type: TYPE_NORMAL
- en: Thank you to Marc Hobballah for reviewing this article and providing feedback.
  prefs: []
  type: TYPE_NORMAL
- en: '*All images, unless otherwise noted, are by the author.*'
  prefs: []
  type: TYPE_NORMAL
