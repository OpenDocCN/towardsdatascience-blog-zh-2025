- en: How to Use Gemini 3 Pro Efficiently
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/how-to-use-gemini-3-pro-efficiently/](https://towardsdatascience.com/how-to-use-gemini-3-pro-efficiently/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '<mdspan datatext="el1763615760275" class="mdspan-comment">Gemini just released</mdspan>
    its latest LLM: Gemini 3\. The model is long-awaited and has been widely discussed
    before its release. In this article, I’ll cover my first experience with the model
    and how it differs from other frontier LLMs.'
  prefs: []
  type: TYPE_NORMAL
- en: The goal of the article is to share my first impressions when using Gemini 3,
    highlighting what works well and what doesn’t work well. I’ll highlight my experience
    using Gemini 3 in the console and while coding with it.
  prefs: []
  type: TYPE_NORMAL
- en: '![Learn the pros and cons of Gemini 3 Pro, from testing with both coding and
    console usage](../Images/187deed44d4f35c0715feaa4e8507284.png)'
  prefs: []
  type: TYPE_IMG
- en: This infographic highlights the main contents of this article. I’ll discuss
    my first impressions using Gemini 3, both through the Gemini console and from
    coding with it. I’ll highlight what I like about the model and the parts I dislike.
    Image by ChatGPT.
  prefs: []
  type: TYPE_NORMAL
- en: Why you should use Gemini 3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In my opinion, Gemini 2.5 pro was already the best conversational LLM available
    before the release of Gemini 3\. The only area I believe another LLM was better
    at was Claude Sonnet 4.5 thinking, for coding.
  prefs: []
  type: TYPE_NORMAL
- en: 'The reason I believe Gemini 2.5 pro is the best non-coding LLM is due to its:'
  prefs: []
  type: TYPE_NORMAL
- en: Ability to efficiently find the correct information
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Low amount of hallucinations
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Its willingness to disagree with me
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'I believe the last point is the most important. Some people want warm LLMs
    that feel good to talk to; however, I’d argue you (as a problem-solver) always
    want the opposite:'
  prefs: []
  type: TYPE_NORMAL
- en: You want an LLM that goes straight to the point and is willing to say that you
    are wrong
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: My experience was that Gemini 2.5 was far better at this, compared to other
    LLMs such as GPT-5, Grok 4, and Claude Sonnet 4.5\.
  prefs: []
  type: TYPE_NORMAL
- en: Considering Google, in my opinion, already had the best LLM out there, the release
    of a newer Gemini model is thus very interesting, and something I started testing
    right after release.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: It’s worth pointing out that Google released Gemini 3 Pro, but has not yet released
    a flash alternative, though it’s natural to think such a model will be released
    soon.
  prefs: []
  type: TYPE_NORMAL
- en: I’m not endorsed by Google in the writing of this article.
  prefs: []
  type: TYPE_NORMAL
- en: Gemini 3 in the console
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I first started testing Gemini 3 Pro in the console. The first thing that struck
    me was that it was relatively slow compared to Gemini 2.5 Pro. However, this is
    usually not an issue, as I mostly value intelligence over speed, of course, up
    to a certain threshold. Though Gemini 3 Pro is slower, I definitely wouldn’t say
    it’s too slow.
  prefs: []
  type: TYPE_NORMAL
- en: 'Another point I noticed is that when explaining, Gemini 3 creates or utilises
    more photos in its explanations. For example, when discussing EPC certificates
    with Gemini, the model found the image below:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f321f020ab14b0bfe87d6eb68b526701.png)'
  prefs: []
  type: TYPE_IMG
- en: This is an image of Gemini 3 Pro, which I used to answer my questions about
    EPC certificates. Image by Gemini 3 Pro
  prefs: []
  type: TYPE_NORMAL
- en: I also noticed it would sometimes generate images, even if I didn’t explicitly
    prompt for it. The image generation in the Gemini console is surprisingly fast.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: The moment I was most impressed by Gemini 3’s capabilities was when I was analyzing
    the first research paper on diffusion models, and I discussed with Gemini to understand
    the paper. The model was, of course, good at reading the paper, including text,
    images, and equations; however, this is also a capability the other frontier models
    possess. I was most impressed when I was chatting with Gemini 3 about diffusion
    models, trying to understand them.
  prefs: []
  type: TYPE_NORMAL
- en: I made a misconception about the paper, thinking we were discussing conditional
    diffusion models, though we were in fact looking at unconditional diffusion. Note
    that I was discussing this before even knowing about the terms *conditional* and
    *unconditional* diffusion.
  prefs: []
  type: TYPE_NORMAL
- en: Gemini 3 then proceeded to call out that I was misunderstanding the concepts,
    efficiently understanding the real intent behind my question, and significantly
    helped me deepen my understanding of diffusion models.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d79aeef81fab60cdf804d3810836ab0c.png)'
  prefs: []
  type: TYPE_IMG
- en: This image highlights a good interaction with Gemini 3 Pro, where the model
    understood where I was misunderstanding the topic at hand and called it out. Being
    able to call out things like this is an important trait for LLMs, in my opinion.
    Image from Gemini.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: I also took some of the older queries I ran in the Gemini console with Gemini
    2.5 Pro, and ran the exact same queries again, this time using Gemini 3 Pro. They
    were usually broader questions, though not particularly difficult ones.
  prefs: []
  type: TYPE_NORMAL
- en: The responses I got were overall quite similar, though I did notice Gemini 3
    was better at telling me things I didn’t know, or uncovering topics / areas I
    (or Gemini 2.5 Pro) hadn’t thought about before. I was, for example, discussing
    how I write articles, and what I can do to improve, where I believe Gemini 3 was
    better at providing feedback, and coming up with more creative approaches to improving
    my writing.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 'Thus, to sum it up, Gemini 3 in the console is:'
  prefs: []
  type: TYPE_NORMAL
- en: A bit slow
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Smart, and provides good explanations
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Good at uncovering things I haven’t thought about, which is super helpful when
    dealing with problem-solving
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Is willing to disagree with you, and help call out ambiguities, traits I believe
    are really important in an LLM assistant
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Coding with Gemini 3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: After working with Gemini 3 in the console, I started coding with it through
    Cursor. My overall experience is that it’s definitely a good model, though I still
    prefer Claude Sonnet 4.5 thinking as my main coding model. The main reason for
    this is that Gemini 3 too often comes up with more complex solutions and is a
    slower model. However, Gemini 3 is most definitely a very capable coding model
    that might be better for other coding use-cases than what I’m dealing with. I’m
    mostly coding infrastructure around AI agents and CDK stacks.
  prefs: []
  type: TYPE_NORMAL
- en: 'I tried Gemini 3 for coding in two main ways:'
  prefs: []
  type: TYPE_NORMAL
- en: Making the game shown in this [X post](https://x.com/minchoi/status/1990825299391431060?s=20),
    from just a screenshot of the game
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Coding some agentic infrastructure
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: First, I attempted to make the Game from the X post. On the first prompt, the
    model made a Pygame with all the squares, but it forgot to add all the sprites
    (art), the bar on the left side, and so on. Basically, it made a very minimalist
    version of the game.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/81dcd77ae598e9068b48c83843bd49f6.png)'
  prefs: []
  type: TYPE_IMG
- en: 'I then wrote a follow-up prompt with the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'Note: When coding, you should be way more specific in your instructions than
    my prompt above. I used this prompt because I was essentially vibing in the game,
    and wanted to see Gemini 3 Pro’s ability to create a game from scratch.'
  prefs: []
  type: TYPE_NORMAL
- en: After running the prompt above, it made a working game, where the guests are
    walking around, I can buy pavements and different machines, and the game essentially
    works as expected. Very impressive!
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: I continued coding with Gemini 3, but this time on a more production-grade code
    base. My overall conclusion is that Gemini 3 Pro usually gets the job done, though
    I more often experience bloated or worse code than I do when using Claude 4.5
    Sonnet. Additionally, Claude Sonnet 4.5 is quite a bit faster, making it the definite
    model of choice for me when coding. However, I would probably regard Gemini 3
    Pro as the second-best coding model I’ve used.
  prefs: []
  type: TYPE_NORMAL
- en: I also think that which coding model is best highly depends on what you’re coding.
    In some situations, speed is more important. In particular forms of coding, another
    model might be better, and so on, so you should really try out the models yourself
    and see what works best for you. The price of using these models is going down
    rapidly, and you can easily revert any changes made, making it super cheap to
    test out different models.
  prefs: []
  type: TYPE_NORMAL
- en: It’s also worth mentioning that Google released [a new IDE called Antigravity](https://antigravity.google/),
    though I haven’t tried it yet.
  prefs: []
  type: TYPE_NORMAL
- en: Overall impressions
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'My overall impression of Gemini 3 is good, and my updated LLM usage stack will
    look like this:'
  prefs: []
  type: TYPE_NORMAL
- en: Claude 4.5 Sonnet thinking for coding
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: GPT-5 when I need quick answers to simple questions (the GPT-app works well
    to open with a shortcut).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: GPT-5 when generating images
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When I want more thorough answers and have longer discussions with an LLM about
    a topic, I’ll use Gemini 3\. Typically, to learn new topics, discuss software
    architecture, or similar.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The pricing for Gemini 3 per million tokens looks like the following (per November
    19, 2025, from [Gemini Developer API Docs](https://ai.google.dev/gemini-api/docs/pricing))
  prefs: []
  type: TYPE_NORMAL
- en: 'If you have less than 200k input tokens:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Input tokens: 2 USD'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Output tokens: 12 USD'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'If you have more than 200k input tokens:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Input tokens: 4 USD'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Output tokens: 18 USD'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: In conclusion, I have good first impressions from Gemini 3, and highly recommend
    checking it out.
  prefs: []
  type: TYPE_NORMAL
