- en: 'LLM-as-a-Judge: What It Is, Why It Works, and How to Use It to Evaluate AI
    Models'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/llm-as-a-judge-what-it-is-why-it-works-and-how-to-use-it-to-evaluate-ai-models/](https://towardsdatascience.com/llm-as-a-judge-what-it-is-why-it-works-and-how-to-use-it-to-evaluate-ai-models/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '<mdspan datatext="el1764012648271" class="mdspan-comment">When I first heard</mdspan>
    about the idea of **using AI to evaluate AI**, also known as “LLM-as-a-Judge,”
    my reaction was:'
  prefs: []
  type: TYPE_NORMAL
- en: '***“Ok, we have officially lost our minds.”***'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: We live in a world where even toilet paper is marketed as “AI-powered.” I assumed
    this was just another hype-driven trend in our chaotic and fast-moving AI landscape.
  prefs: []
  type: TYPE_NORMAL
- en: But once I looked into what LLM-as-a-Judge actually means, I realized I was
    wrong. Let me explain.
  prefs: []
  type: TYPE_NORMAL
- en: 'There is one picture that every Data Scientist and Machine Learning Engineer
    should keep in the back of their mind, and it captures the entire spectrum of
    model complexity, training set size, and expected performance level:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/be19e6b5d779895a043986a190672a43.png)'
  prefs: []
  type: TYPE_IMG
- en: Image made by author
  prefs: []
  type: TYPE_NORMAL
- en: If the task is **simple**, having a **small** training set is usually not a
    problem. In some extreme cases, you can even solve it with a simple rule-based
    approach. Even when the task becomes more **complex**, you can often reach high
    performance as long as you have a **large** and diverse training set.
  prefs: []
  type: TYPE_NORMAL
- en: The real trouble begins when the task is complex and you do not have access
    to a comprehensive training set. At that point, there is no clean recipe. You
    need domain experts, manual data collection, and careful evaluation procedures,
    and in the worst situations, you might face months or even years of work just
    to build reliable labels.
  prefs: []
  type: TYPE_NORMAL
- en: … this was **before** **Large Language Models (LLMs).**
  prefs: []
  type: TYPE_NORMAL
- en: The LLM-as-a-Judge paradigm
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The promise of LLMs is simple: you get something close to “PhD-level” expertise
    in many fields that you can reach through a single API call. We can (and probably
    should) argue about how “intelligent” these systems really are. There is growing
    evidence that an LLM behaves more like an extremely powerful pattern matcher and
    information retriever than a truly intelligent agent [you should absolutely watch
    **[this](https://www.youtube.com/watch?v=4__gg83s_Do)**].'
  prefs: []
  type: TYPE_NORMAL
- en: However, one thing is hard to deny. When the task is **complex**, difficult
    to formalize, and **you do not have a ready-made dataset**, **LLMs can be incredibly
    useful**. In these situations, they give you high-level reasoning and domain knowledge
    on demand, long before you could ever collect and label enough data to train a
    traditional model.
  prefs: []
  type: TYPE_NORMAL
- en: So let’s go back to our “***big trouble***” red square. Imagine you have a difficult
    problem and only a very rough first version of a model. Maybe it was trained on
    a tiny dataset, or maybe it is a pre-existing model that you have not fine-tuned
    at all (e.g. BERT or whatever other embedding model).
  prefs: []
  type: TYPE_NORMAL
- en: In situations like this, you can use an LLM to evaluate how this V0 model is
    performing. The **LLM becomes the evaluator** (or the **judge**) for your early
    prototype, giving you immediate feedback without requiring a large labeled dataset
    or the huge effort we mentioned earlier.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/543c908414113e2cedde4f0759f5e524.png)'
  prefs: []
  type: TYPE_IMG
- en: Image made by author
  prefs: []
  type: TYPE_NORMAL
- en: 'This would have many beneficial downstream applications:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Evaluating** the state of the V0 and its performance'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Building a **training set** to improve the existing model
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Monitoring** the stage of the existing model or the fine-tuned version (following
    point 2).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: So let’s build this!
  prefs: []
  type: TYPE_NORMAL
- en: LLM-as-a-Judge in Production
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Now there is a fake syllogism: as you don’t have to train an LLM and they are
    intuitive to use on the ChatGPT/Anthropic/Gemini UI, then it must be **easy**
    to build an LLM system. That is ***not***the case.'
  prefs: []
  type: TYPE_NORMAL
- en: If your goal is not a simple plug-and-play feature, then you need active effort
    to make sure your LLM is reliable, precise, and as hallucination-free as possible,
    designing it to fail gracefully when it fails (not ***if*** but ***when***).
  prefs: []
  type: TYPE_NORMAL
- en: Here are the main topics we will cover to build a production-ready LLM-as-a-Judge
    system.
  prefs: []
  type: TYPE_NORMAL
- en: '**System design**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We will define the role of the LLM, how it should behave, and what perspective
    or “persona” it should use during evaluation.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Few-shot examples**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We will give the LLM concrete examples that show exactly how the evaluation
    should look for different test cases.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Triggering Chain-of-Thought**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We will ask the LLM to produce notes, intermediate reasoning, and a confidence
    level in order to trigger a more reliable form of Chain-of-Thought. This encourages
    the model to actually “think.”
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Batch evaluation**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: To reduce cost and latency, we will send multiple inputs at once and reuse the
    same prompt across a batch of examples.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Output formatting**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We will use Pydantic to enforce a structured output schema and provide that
    schema directly to the LLM, which makes integration cleaner and production-safe.
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Let’s dive in the code! 🚀
  prefs: []
  type: TYPE_NORMAL
- en: Code
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The whole code can be found in the following GitHub page [[here]](https://github.com/PieroPaialungaAI/LLMAsAJudge.git).
    I’m going to go through the main parts of it in the following paragraph.
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Setup
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Let’s start with some housekeeping.
  prefs: []
  type: TYPE_NORMAL
- en: 'The dirty work of the code is done using **OpenAI** and wrapped using **llm_judge.**
    For this reason, everything you need to import is the following block:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Note: You will need the [OpenAI API key](https://platform.openai.com/api-keys).'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: All the production-level code is handled on the backend (thank me later). Let’s
    carry on.
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Our Use Case
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Let’s say we have a sentiment classification model that we want to evaluate.
    The model takes customer reviews and predicts: **Positive, Negative,** or **Neutral.**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s sample data our model classified:'
  prefs: []
  type: TYPE_NORMAL
- en: 'For each prediction, we want to know:'
  prefs: []
  type: TYPE_NORMAL
- en: '**– Is this output correct?**'
  prefs: []
  type: TYPE_NORMAL
- en: '**– How confident are we in that judgment?**'
  prefs: []
  type: TYPE_NORMAL
- en: '**– Why is it correct or incorrect?**'
  prefs: []
  type: TYPE_NORMAL
- en: '**– How would we score the quality?**'
  prefs: []
  type: TYPE_NORMAL
- en: This is where LLM-as-a-Judge comes in. Notice that **ground_truth** is actually
    not in our real-world dataset; this is why we are using LLM in the first place.
    🙃
  prefs: []
  type: TYPE_NORMAL
- en: The only reason you see it here is to display the classifications where our
    original model is underperforming (index 2 and index 3)
  prefs: []
  type: TYPE_NORMAL
- en: Note that in this case, we are ***pretending*** to have a weaker model in place
    with some errors. In a real case scenario, this happens when you use a small model
    or you adapt a non fine-tuned deep learning model.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 3\. Role Definition
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Just like with any prompt engineering, we need to clearly define:'
  prefs: []
  type: TYPE_NORMAL
- en: 1\. **Who is the judge?** The LLM will act like one, so we need to define their
    expertise and background
  prefs: []
  type: TYPE_NORMAL
- en: 2\. **What are they evaluating?** The specific task we want the LLM to evaluate.
  prefs: []
  type: TYPE_NORMAL
- en: 3\. **What criteria should they use?** What the LLM has to do to determine if
    an output is good or bad.
  prefs: []
  type: TYPE_NORMAL
- en: 'This is how we are defining this:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Some recipe notes: Use **clear indications**. Provide what you want the LLM
    to do (not what you want it ***not*** to do). **Be very specific** in the evaluation
    procedure.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 4\. ReAct Paradigm
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The ReAct pattern (Reasoning + Acting) is built into our framework. Each judgment
    includes:'
  prefs: []
  type: TYPE_NORMAL
- en: '1\. **Score (0-100)**: Quantitative quality assessment'
  prefs: []
  type: TYPE_NORMAL
- en: '2\. **Verdict**: Binary or categorical judgment'
  prefs: []
  type: TYPE_NORMAL
- en: '3\. **Confidence**: How certain the judge is'
  prefs: []
  type: TYPE_NORMAL
- en: '4. **Reasoning**: Chain-of-thought explanation'
  prefs: []
  type: TYPE_NORMAL
- en: '5\. **Notes**: Additional observations'
  prefs: []
  type: TYPE_NORMAL
- en: 'This enables:'
  prefs: []
  type: TYPE_NORMAL
- en: '– **Transparency**: You can see why the judge made each decision'
  prefs: []
  type: TYPE_NORMAL
- en: '– **Debugging**: Identify patterns in errors'
  prefs: []
  type: TYPE_NORMAL
- en: '– **Human-in-the-loop**: Route low-confidence judgments to humans'
  prefs: []
  type: TYPE_NORMAL
- en: '– **Quality control**: Track judge performance over time'
  prefs: []
  type: TYPE_NORMAL
- en: 5\. Few-shot examples
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Now, let’s provide some more examples to make sure the LLM has some context
    on how to evaluate real-world cases:'
  prefs: []
  type: TYPE_NORMAL
- en: We will put these examples with the prompt so the LLM will learn how to perform
    the task based on the examples we give.
  prefs: []
  type: TYPE_NORMAL
- en: 'Some recipe notes: **Cover different scenarios**: correct, incorrect, and partially
    correct. **Show score calibration** (100 for perfect, 20-30 for clear errors,
    60 for debatable cases). **Explain the reasoning** in detail. **Reference specific
    words/phrases** from the input'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 6\. LLM Judge Definition
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The whole thing is packaged in the following block of code:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Just like that. 10 lines of code. Let’s use this:'
  prefs: []
  type: TYPE_NORMAL
- en: 7\. Let’s run!
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'This is how to run the whole LLM Judge API call:'
  prefs: []
  type: TYPE_NORMAL
- en: So we can immediately see that the LLM Judge is correctly judging the performance
    of the “model” in place. In particular, it is identifying that the last two model
    outputs are incorrect, which is what we expected.
  prefs: []
  type: TYPE_NORMAL
- en: 'While this is good to show that everything is working, in a production environment,
    we can’t just “print” the output in the console: we need to store it and make
    sure the format is standardized. This is how we do it:'
  prefs: []
  type: TYPE_NORMAL
- en: And this is how it looks.
  prefs: []
  type: TYPE_NORMAL
- en: Note that we are also “batching”, meaning we are sending multiple pieces of
    input at once. This saves cost and time.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 8\. Bonus
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Now, here is the kicker. Say you have a completely different task to evaluate.
    Say you want to evaluate the chatbot response of your model. The **whole** **code**
    can be refactored using a few lines:'
  prefs: []
  type: TYPE_NORMAL
- en: As two different “judges” change only based on the prompts we provide the LLM
    with, the modifications between two different evaluations are extremely straightforward.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusions
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: LLM-as-a-Judge is a simple idea with a lot of practical power. When your model
    is rough, your task is complex, and you do not have a labeled dataset, an LLM
    can help you evaluate outputs, understand mistakes, and iterate faster.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here is what we built:'
  prefs: []
  type: TYPE_NORMAL
- en: '**A clear role and persona** for the judge'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Few-shot examples** to guide its behavior'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Chain-of-Thought** reasoning for transparency'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Batch evaluation** to save time and cost'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Structured output** with Pydantic for production use'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The result is a flexible evaluation engine that can be reused across tasks with
    only minor changes. It is not a replacement for human evaluation, but it provides
    a strong starting point long before you can collect the necessary data.
  prefs: []
  type: TYPE_NORMAL
- en: Before you head out
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Thank you again for your time. It means a lot ❤️
