  type: TYPE_NORMAL
  zh: 这个故事最初发表在 [alexdremov.me](https://alexdremov.me/understanding-flash-attention-writing-the-algorithm-from-scratch-in-triton?utm_source=medium)
    上，去看看吧！（至少，那里的 TEX 看起来更好）
- en: Conclusions
  id: totrans-81
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In the post, I covered the motivation of the Flash Attention algorithm as well
    as its algorithm details. Finally, we were able to implement it from scratch in
    Triton, reproducing the speedups from the paper.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我介绍了 Flash Attention 算法的动机以及其算法细节。最后，我们能够在 Triton 中从头实现它，重现了论文中的速度提升。
- en: I hope this post improved your understanding of Flash Attention. Feel free to
    leave a comment below if you have any questions.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 希望这篇帖子能提高你对 Flash Attention 的理解。如果你有任何问题，请随时在下面留言。
