- en: On the Challenge of Converting TensorFlow Models to PyTorch
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 将 TensorFlow 模型转换为 PyTorch 的挑战
- en: 原文：[https://towardsdatascience.com/on-the-challenge-of-converting-tensorflow-models-to-pytorch/](https://towardsdatascience.com/on-the-challenge-of-converting-tensorflow-models-to-pytorch/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/on-the-challenge-of-converting-tensorflow-models-to-pytorch/](https://towardsdatascience.com/on-the-challenge-of-converting-tensorflow-models-to-pytorch/)
- en: <mdspan datatext="el1764721965620" class="mdspan-comment">Prologue</mdspan>
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1764721965620" class="mdspan-comment">序言</mdspan>
- en: In the interest of managing reader expectations and preventing disappointment,
    we would like to begin by stating that this post does **not **provide a fully
    satisfactory solution to the problem described in the title. We will propose and
    assess two possible schemes for auto-conversion of TensorFlow models to PyTorch
    — the first based on the [Open Neural Network Exchange](https://onnx.ai/) (ONNX)
    format and libraries and the second using the [Keras3](https://keras.io/) API.
    However, as we will see, each comes with its own set of challenges and limitations.
    To the best of the authors’ knowledge, at the time of this writing, there are
    no publicly available foolproof solutions to this problem.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 为了管理读者的期望并防止失望，我们首先声明，本文**并不**提供对标题中描述的问题的完全令人满意的解决方案。我们将提出并评估两种自动将 TensorFlow
    模型转换为 PyTorch 的方案——第一种基于[开放神经网络交换](https://onnx.ai/)（ONNX）格式和库，第二种使用[Keras3](https://keras.io/)
    API。然而，正如我们将看到的，每种方案都伴随着其自身的挑战和限制。据作者所知，在撰写本文时，尚无公开可用的万无一失的解决方案。
- en: Many thanks to [Rom Maltser](https://www.linkedin.com/in/rom-maltser) for his
    contributions to this post.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢 [Rom Maltser](https://www.linkedin.com/in/rom-maltser) 对本文的贡献。
- en: The Decline of TensorFlow
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: TensorFlow 的衰落
- en: Over the years, the field of computer science has known its fair share of “religious
    wars” — heated, sometimes hostile, debates among programmers and engineers over
    the “best” tools, languages, and methodologies. Up until a few years ago, the
    religious war between PyTorch and TensorFlow, two prominent open-source deep learning
    frameworks, loomed large. Proponents of TensorFlow would highlight its fast graph-execution
    mode, while those in the PyTorch camp would emphasize its “Pythonic” nature and
    ease of use.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 多年来，计算机科学领域经历了其份额的“宗教战争”——程序员和工程师之间关于“最佳”工具、语言和方法的热烈、有时是敌对的辩论。直到几年前，两个突出的开源深度学习框架
    PyTorch 和 TensorFlow 之间的宗教战争仍然很严重。TensorFlow 的支持者会强调其快速的图执行模式，而 PyTorch 营地的成员则会强调其“Pythonic”特性和易用性。
- en: However, these days, the amount of activity in PyTorch far overshadows that
    of TensorFlow. This is evidenced by the number of big-tech companies that have
    embraced PyTorch over TensorFlow, by the number of models per framework in [HuggingFace’s
    models](https://huggingface.co/models) repository, and by the amount of innovation
    and optimization in each framework. Simply put, TensorFlow is a shell of its former
    self. The war is over, with PyTorch the definitive winner. For a brief history
    of the Pytorch-TensorFlow wars and the reasons for TensorFlow’s downfall, see [Pan
    Xinghan’s](https://medium.com/@sampan090611) post: [TensorFlow Is Dead. PyTorch
    Won](https://medium.com/@sampan090611/tensorflow-is-dead-pytorch-won-2d0bc6e9b1a4).
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，如今，PyTorch 的活跃度远远超过了 TensorFlow。这一点可以从拥抱 PyTorch 而非 TensorFlow 的大科技公司数量、[HuggingFace
    的模型](https://huggingface.co/models)存储库中每个框架的模型数量以及每个框架中的创新和优化程度得到证明。简单来说，TensorFlow
    已经不再是过去的自己。战争已经结束，PyTorch 是最终的赢家。关于 PyTorch-TensorFlow 战争的简要历史和 TensorFlow 衰退的原因，请参阅[潘星汉](https://medium.com/@sampan090611)的文章：[TensorFlow
    已死。PyTorch 获胜](https://medium.com/@sampan090611/tensorflow-is-dead-pytorch-won-2d0bc6e9b1a4)。
- en: 'Problem: What do we do with all of our legacy TensorFlow models?!!'
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 问题：我们该如何处理所有遗留的 TensorFlow 模型？！！！
- en: 'In light of this new reality, many organizations that once used TensorFlow
    have moved all of their new AI/ML model development to PyTorch. But they are faced
    with a difficult challenge when it comes to their legacy code: What should they
    do with all of the models that have already been built and deployed in TensorFlow?'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 鉴于这一新的现实情况，许多曾经使用 TensorFlow 的组织已经将所有新的 AI/ML 模型开发迁移到 PyTorch。但他们在处理遗留代码时面临着一个难题：他们应该如何处理已经在
    TensorFlow 中构建和部署的所有模型？
- en: 'Option 1: Do Nothing.'
  id: totrans-10
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 选项 1：什么都不做。
- en: 'You might be wondering why this is even a problem — the TensorFlow models work — let’s
    not touch them. While this is a valid approach, there are a number of disadvantages
    that should be taken into consideration:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 您可能会想知道这为什么会成为一个问题——TensorFlow模型是工作的——我们不要动它们。虽然这是一种有效的方法，但应该考虑以下缺点：
- en: '**Reduced maintenance**: As TensorFlow continues to decline so will its maintenance.
    Inevitably, things will start to break. For example, there may be issues of compatibility
    with newer Python packages or system libraries.'
  id: totrans-12
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**维护减少**：随着TensorFlow的持续衰落，其维护也将减少。不可避免的是，一些问题将会出现。例如，可能与新的Python包或系统库的兼容性问题。'
- en: '**Limited Ecosystem**: AI/ML solutions typically involve multiple supporting
    software libraries and services that interface with our framework of choice, be
    it PyTorch or TensorFlow. Over time, we can expect to see many of these discontinue
    their support for TensorFlow. Case in point: HuggingFace recently [announced the
    deprecation of its support for TensorFlow](https://www.linkedin.com/posts/lysandredebut_i-have-bittersweet-news-to-share-yesterday-activity-7338966863403528192-om5p?).'
  id: totrans-13
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**受限的生态系统**：AI/ML解决方案通常涉及多个支持软件库和服务，这些库和服务与我们的选择框架接口，无论是PyTorch还是TensorFlow。随着时间的推移，我们可以预期其中许多将停止对TensorFlow的支持。以HuggingFace最近[宣布停止对TensorFlow的支持](https://www.linkedin.com/posts/lysandredebut_i-have-bittersweet-news-to-share-yesterday-activity-7338966863403528192-om5p?)为例。'
- en: '**Limited Community**: The AI/ML industry owes its fast pace of development,
    in large part, to its community. The number of open source projects, the number
    of online tutorials, and the amount of activity in dedicated support channels
    in the AI/ML space, is unparalleled. As TensorFlow declines, so will its community
    and you may experience increasing difficulty getting the help you need. Needless
    to say, the PyTorch community is flourishing.'
  id: totrans-14
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**社区有限**：AI/ML行业的快速发展在很大程度上归功于其社区。开源项目数量、在线教程数量以及AI/ML领域专用支持渠道的活动量都是无与伦比的。随着TensorFlow的衰落，其社区也将衰落，您可能会越来越难以获得所需的帮助。不用说，PyTorch社区正在蓬勃发展。'
- en: '**Opportunity Cost**: The PyTorch ecosystem is thriving with constant innovations
    and optimizations. Recent years have seen the development of flash-attention kernels,
    support for the eight-bit floating-point data type, graph compilation, and many
    other advancements that have demonstrated significant boosts to runtime performance
    and significant reductions in AI/ML costs. During the same time period the feature
    offering in TensorFlow has remained mostly static. Sticking with TensorFlow means
    forgoing many opportunities for AI/ML cost optimization.'
  id: totrans-15
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**机会成本**：PyTorch生态系统充满创新和优化，发展势头强劲。近年来，开发了闪存注意力内核、支持八位浮点数据类型、图编译等多项进步，这些进步显著提高了运行时性能，并显著降低了AI/ML成本。与此同时，TensorFlow的功能提供基本上保持不变。坚持使用TensorFlow意味着放弃了许多AI/ML成本优化的机会。'
- en: 'Option 2: Manually Convert TensorFlow Models to PyTorch'
  id: totrans-16
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 选项2：手动将TensorFlow模型转换为PyTorch
- en: The second option is to rewrite legacy TensorFlow models in PyTorch. This is
    probably the best option in terms of its result, but for companies that have built
    up technical debt over many years, converting even a single model could be a daunting
    task. Given the effort required, you may choose to do this only for models that
    are still under active development (e.g., in the model training phase). Doing
    this for all of the models that are already deployed may prove prohibitive.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 第二种选择是将遗留的TensorFlow模型重写为PyTorch。从结果来看，这可能是最佳选择，但对于在多年中积累了大量技术债务的公司来说，即使是转换单个模型也可能是一项艰巨的任务。考虑到所需的努力，您可能只选择对仍在积极开发中的模型（例如，在模型训练阶段）进行转换。对所有已部署的模型进行此操作可能过于昂贵。
- en: 'Option 3: Automate TensorFlow to PyTorch Conversion'
  id: totrans-18
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 选项3：自动化TensorFlow到PyTorch的转换
- en: The third option, and the approach we explore in this post, is to automate the
    conversion of legacy TensorFlow models to PyTorch. In this manner, we hope to
    accomplish the benefit of model execution in PyTorch, but without the enormous
    effort of manually converting each one.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 第三种选择，也是我们在本文中探讨的方法，是将遗留的TensorFlow模型自动转换为PyTorch。通过这种方式，我们希望实现PyTorch模型执行的好处，但无需手动转换每一个模型。
- en: To facilitate our discussion we will define a toy TensorFlow model and assess
    two proposals for converting it to PyTorch. As our runtime environment, we will
    use an [Amazon EC2 g6e.xlarge](https://aws.amazon.com/ec2/instance-types/g6e/) with
    an [NVIDIA L40S](https://www.nvidia.com/en-eu/data-center/l40s/) GPU, an [AWS
    Deep Learning Ubuntu (22.04) AMI](https://docs.aws.amazon.com/dlami/latest/devguide/aws-deep-learning-x86-gpu-tensorflow-2.18-ubuntu-22-04.html),
    and a Python environment that includes the [TensorFlow](https://www.tensorflow.org/install) (2.20), [PyTorch](https://pytorch.org/get-started/locally/) (2.9), [torchvision](https://pypi.org/project/torchvision/) (0.24.0),
    and [transformers](https://huggingface.co/docs/transformers/en/index) (4.55.4)
    libraries. Please note that the code blocks we will share are intended for demonstrative
    purposes. Please do not interpret our use of any code, library, or platform as
    an endorsement of its use.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 为了便于讨论，我们将定义一个玩具 TensorFlow 模型，并评估将其转换为 PyTorch 的两个提案。作为我们的运行环境，我们将使用一个带有 [NVIDIA
    L40S](https://www.nvidia.com/en-eu/data-center/l40s/) GPU 的 [Amazon EC2 g6e.xlarge](https://aws.amazon.com/ec2/instance-types/g6e/)，以及一个
    [AWS Deep Learning Ubuntu (22.04) AMI](https://docs.aws.amazon.com/dlami/latest/devguide/aws-deep-learning-x86-gpu-tensorflow-2.18-ubuntu-22-04.html)。我们的
    Python 环境将包括 [TensorFlow](https://www.tensorflow.org/install)（2.20）、[PyTorch](https://pytorch.org/get-started/locally/)（2.9）、[torchvision](https://pypi.org/project/torchvision/)（0.24.0）和
    [transformers](https://huggingface.co/docs/transformers/en/index)（4.55.4）库。请注意，我们将分享的代码块仅用于演示目的。请勿将我们对任何代码、库或平台的使用视为对其使用的认可。
- en: Model Conversion — Why is it Hard?
  id: totrans-21
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 模型转换——为什么这么难？
- en: 'An AI model definition is comprised of two components: a model architecture
    and its trained weights. A model conversion solution must address both components.
    Conversion of the model weights is pretty straightforward; the weights are typically
    stored in a format that can be easily parsed into individual tensor arrays and
    reapplied in the framework of choice. In contrast, conversion of the model architecture
    presents a much greater challenge.'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 一个 AI 模型定义由两个组件组成：模型架构和其训练好的权重。模型转换解决方案必须解决这两个组件。模型权重的转换相对简单；权重通常以可以轻松解析为单个张量数组的格式存储，并可以在选择的框架中重新应用。相比之下，模型架构的转换则是一个更大的挑战。
- en: 'One approach could be to create a mapping between the building blocks of the
    model in each of the frameworks. However, there are a number of factors that make
    this approach, for all intents and purposes, virtually intractable:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 一种可能的方法是在每个框架中创建模型构建块的映射。然而，有许多因素使得这种方法在实际上几乎无法实现：
- en: '**API Overlap and Proliferation**: When you take into account the sheer number
    of, often overlapping, TensorFlow APIs for building model components and then
    add the vast number of API controls and arguments for each layer, you can see
    how creating a comprehensive, one-to-one mapping can quickly get ugly.'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**API 重叠和激增**：当你考虑到构建模型组件的 TensorFlow API 数量庞大，且往往重叠，再加上每个层的 API 控制和参数数量庞大，你就能理解创建一个全面的一对一映射是如何迅速变得复杂的。'
- en: '**Differing Implementation Approaches**: At the implementation level, TensorFlow
    and PyTorch have fundamentally different approaches. Although usually hidden behind
    the top-level APIs, some assumptions require special user attention. For example,
    while TensorFlow defaults to the “channels-last” (NHWC) format, PyTorch prefers
    “channels-first” (NCHW). This difference in how tensors are indexed and stored
    complicates the conversion of model operations, as every layer must be checked/altered
    for correct dimension ordering.'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**不同的实现方法**：在实现层面，TensorFlow 和 PyTorch 采用了根本不同的方法。尽管这些方法通常隐藏在顶层 API 之后，但一些假设需要用户特别注意。例如，虽然
    TensorFlow 默认使用“channels-last”（NHWC）格式，但 PyTorch 更倾向于“channels-first”（NCHW）。这种张量索引和存储方式的不同，使得模型操作的转换变得复杂，因为每个层都必须检查/修改以确保维度顺序正确。'
- en: Rather than attempt conversion at the API level, an alternative approach could
    be to capture and convert an internal TensorFlow graph representation. However,
    as anyone who has ever looked under the hood of TensorFlow will tell you, this
    too could get pretty nasty very quickly. TensorFlow’s internal graph representation
    is incredibly complex, often including a multitude of low-level operations, control
    flow, and auxiliary nodes that do not have a direct equivalent in PyTorch (especially
    if you’re dealing with older versions of TensorFlow). Just its comprehension seems
    beyond normal human ability, let alone its conversion to PyTorch.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 与在API级别尝试转换相比，另一种替代方法可能是捕获并转换TensorFlow的内部图表示。然而，正如任何曾经查看TensorFlow内部结构的人都会告诉你的，这也可能很快变得相当复杂。TensorFlow的内部图表示非常复杂，通常包括许多低级操作、控制流和辅助节点，这些在PyTorch中没有直接等价物（尤其是如果你处理的是TensorFlow的旧版本）。仅仅理解它似乎就超出了普通人的能力，更不用说将其转换为PyTorch了。
- en: Note that the same challenges would make it difficult for a generative AI model
    to perform the conversion in a manner that is fully reliable.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，同样的挑战将使生成式AI模型以完全可靠的方式进行转换变得困难。
- en: Proposed Conversion Schemes
  id: totrans-28
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 提出的转换方案
- en: 'In light of these difficulties, we abandon our attempt at implementing our
    own model converter and instead look to see what tools the AI/ML community has
    to offer. More specifically, we consider two different strategies for overcoming
    the challenges we described:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 鉴于这些困难，我们放弃了实现我们自己的模型转换器的尝试，而是转向查看AI/ML社区提供了哪些工具。更具体地说，我们考虑了两种不同的策略来克服我们描述的挑战：
- en: '**Conversion Via a Unified Graph Representation**: This solution assumes a
    common standard for representing an AI/ML model definition and utilities for converting
    models to and from this standard. The solution we will explore uses the popular
    ONNX format.'
  id: totrans-30
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**通过统一图表示进行转换**：这个解决方案假设有一个共同的标准来表示AI/ML模型定义，以及将模型转换为和从这个标准转换的工具。我们将探索的解决方案使用的是流行的ONNX格式。'
- en: '**Conversion Based on a Standardized High-level API**: In this solution we
    simplify the conversion task by limiting our model to a defined set of high level
    abstract APIs with supported implementations in each of the AI/ML frameworks of
    interest. For this approach, we will use the Keras3 library.'
  id: totrans-31
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**基于标准化高级API的转换**：在这个解决方案中，我们通过将我们的模型限制为定义的一组高级抽象API，并在感兴趣的每个AI/ML框架中支持这些API的实现，从而简化了转换任务。对于这种方法，我们将使用Keras3库。'
- en: In the next sections we will assess these strategies on a toy TensorFlow model.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 在接下来的几节中，我们将评估这些策略在一个玩具TensorFlow模型上的效果。
- en: A Toy TensorFlow Model
  id: totrans-33
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 一个玩具TensorFlow模型
- en: 'In the code block below we initialize and run a TensorFlow Vision Transformer
    (ViT) model from [HuggingFace’s](https://huggingface.co/) popular [transformers](https://pypi.org/project/transformers/) library
    (version 4.55.4), [TFViTForImageClassification](https://huggingface.co/docs/transformers/v4.55.4/en/model_doc/vit#transformers.TFViTForImageClassification).
    Note that in keeping with [HuggingFace’s](https://huggingface.co/) decision to
    deprecate support for TensorFlow, this class was removed from recent releases
    of the library. The HuggingFace TensorFlow model is dependent on Keras 2 which
    we dutifully install via the [tf-keras](https://pypi.org/project/tf-keras/) (2.20.1)
    package. We set the [ViTConfig.hidden_act](https://huggingface.co/docs/transformers/v4.55.4/en/model_doc/vit#transformers.ViTConfig.hidden_act) field
    to “gelu_new” for ONNX compatibility:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 在下面的代码块中，我们初始化并运行了一个来自[HuggingFace的](https://huggingface.co/)流行的[transformers](https://pypi.org/project/transformers/)库（版本4.55.4）的TensorFlow视觉Transformer（ViT）模型，[TFViTForImageClassification](https://huggingface.co/docs/transformers/v4.55.4/en/model_doc/vit#transformers.TFViTForImageClassification)。请注意，根据[HuggingFace的](https://huggingface.co/)决定弃用对TensorFlow的支持，这个类已被从库的最近版本中移除。HuggingFace的TensorFlow模型依赖于Keras
    2，我们通过[tf-keras](https://pypi.org/project/tf-keras/)（2.20.1）包尽职尽责地安装了它。我们将[ViTConfig.hidden_act](https://huggingface.co/docs/transformers/v4.55.4/en/model_doc/vit#transformers.ViTConfig.hidden_act)字段设置为“gelu_new”以实现ONNX兼容性：
- en: '[PRE0]'
  id: totrans-35
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Model Conversion Using ONNX
  id: totrans-36
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用ONNX进行模型转换
- en: The first method we assess relies on [Open Neural Network Exchange](https://onnx.ai/) (ONNX),
    a community project that aims to define an open format for building AI/ML models
    to increase interoperability between AI/ML frameworks and reduce the dependence
    on any single one. Included in the ONNX API offering are utilities for converting
    models from common frameworks, including [TensorFlow](https://github.com/onnx/tensorflow-onnx),
    to the ONNX format. There are also several public libraries for converting ONNX
    models to PyTorch. In this post we use the [onnx2torch](https://github.com/ENOT-AutoDL/onnx2torch) utility.
    Thus, model conversion from TensorFlow to PyTorch can be achieved by successively
    applying TensorFlow-to-ONNX conversion followed by ONNX-to-PyTorch conversion.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 我们评估的第一种方法依赖于[Open Neural Network Exchange](https://onnx.ai/)（ONNX），这是一个旨在定义一个开放格式来构建AI/ML模型，以增加AI/ML框架之间的互操作性并减少对任何单一框架的依赖的社区项目。ONNX
    API提供了一系列工具，可以将模型从常见的框架转换为ONNX格式，包括[TensorFlow](https://github.com/onnx/tensorflow-onnx)。还有几个公共库可以将ONNX模型转换为PyTorch。在这篇文章中，我们使用了[onnx2torch](https://github.com/ENOT-AutoDL/onnx2torch)工具。因此，可以通过依次应用TensorFlow到ONNX的转换，然后是ONNX到PyTorch的转换来实现从TensorFlow到PyTorch的模型转换。
- en: 'To assess this solution we install the [onnx](https://pypi.org/project/onnx/) (1.19.1), [tf2onnx](https://pypi.org/project/tf2onnx/) (1.16.1),
    and [onnx2torch](https://pypi.org/project/onnx2torch/) (1.5.15 ) libraries. We
    apply the *no-deps* flag to prevent an undesired downgrade of the protobuf library:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 为了评估这个解决方案，我们安装了[onnx](https://pypi.org/project/onnx/)（1.19.1），[tf2onnx](https://pypi.org/project/tf2onnx/)（1.16.1），以及[onnx2torch](https://pypi.org/project/onnx2torch/)（1.5.15）库。我们应用了*no-deps*标志来防止protobuf库的不期望降级：
- en: '[PRE1]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'The conversion scheme appears in the code block below:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 转换方案如下面的代码块所示：
- en: '[PRE2]'
  id: totrans-41
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'To make sure that the resultant model is indeed a PyTorch module, we run the
    following assertion:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 为了确保结果模型确实是一个PyTorch模块，我们运行以下断言：
- en: '[PRE3]'
  id: totrans-43
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Let us now assess the quality and makeup of the resultant PyTorch model.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们现在评估结果PyTorch模型的质量和组成。
- en: Numerical Precision
  id: totrans-45
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数值精度
- en: 'To verify the validity of the converted model, we execute both the TensorFlow
    model and the converted model on the same input and compare the results:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 为了验证转换后模型的正确性，我们在相同的输入上执行TensorFlow模型和转换后的模型，并比较结果：
- en: '[PRE4]'
  id: totrans-47
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: The outputs are certainly close enough to validate the converted model.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 输出确实足够接近，可以验证转换后的模型。
- en: Model Structure
  id: totrans-49
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 模型结构
- en: 'To get a feel for the structure of the converted model, we calculate the number
    of trainable comparisons and compare it that of the original model:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 为了了解转换后模型的结构，我们计算可训练参数的数量，并将其与原始模型进行比较：
- en: '[PRE5]'
  id: totrans-51
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'The difference in the number of trainable parameters is profound, just 589,824
    in the converted model compared to over 85 million in the original model. Traversing
    the layers of the converted model leads to that same conclusion: The ONNX-based
    conversion has completely altered the model structure, rendering it essentially
    unrecognizable. There are a number of ramifications to this finding, including:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 可训练参数数量的差异是显著的，转换后的模型中只有589,824个，而原始模型中超过8500万个。遍历转换后模型的层得出同样的结论：基于ONNX的转换已经完全改变了模型结构，使其几乎无法识别。这一发现带来了一系列影响，包括：
- en: '**Training/fine-tuning the converted model**: Although we have shown that the
    converted model can be used for inference, the change in structure — particularly
    the fact that some of the model parameters have been baked in, means that we cannot
    use the converted model for training or fine-tuning.'
  id: totrans-53
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**训练/微调转换后的模型**：尽管我们已经表明转换后的模型可以用于推理，但结构的变化——尤其是模型参数中的一些已经被固定的事实——意味着我们无法使用转换后的模型进行训练或微调。'
- en: '**Applying pinpoint PyTorch optimizations to the model**: The converted model
    is composed of a very large number of layers each representing a relatively low-level
    operation. This greatly limits our ability to replace inefficient operations with
    optimized PyTorch equivalents, such as [torch.nn.functional.scaled_dot_product_attention](https://docs.pytorch.org/docs/stable/generated/torch.nn.functional.scaled_dot_product_attention.html) (SPDA).'
  id: totrans-54
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**将精确的PyTorch优化应用于模型**：转换后的模型由大量层组成，每层代表一个相对低级的操作。这极大地限制了我们将低效操作替换为优化的PyTorch等价物的能力，例如[torch.nn.functional.scaled_dot_product_attention](https://docs.pytorch.org/docs/stable/generated/torch.nn.functional.scaled_dot_product_attention.html)（SPDA）。'
- en: Model Optimization
  id: totrans-55
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 模型优化
- en: 'We have already seen that our ability to access and modify model operations
    is limited, but there are a number of optimizations that we can apply that do
    not require such access. In the code block below, we apply [PyTorch compilation](https://docs.pytorch.org/tutorials/intermediate/torch_compile_tutorial.html) and [automatic
    mixed precision](https://docs.pytorch.org/tutorials/recipes/recipes/amp_recipe.html) (AMP)
    and compare the resultant throughput to that of the TensorFlow model. For further
    context, we also test the runtime of the PyTorch version of the [ViTForImageClassification](https://huggingface.co/docs/transformers/v4.55.4/en/model_doc/vit#transformers.ViTForImageClassification) model:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经看到我们访问和修改模型操作的能力有限，但我们可以应用一些不需要这种访问的优化。在下面的代码块中，我们应用了[PyTorch编译](https://docs.pytorch.org/tutorials/intermediate/torch_compile_tutorial.html)和[自动混合精度](https://docs.pytorch.org/tutorials/recipes/recipes/amp_recipe.html)（AMP），并将结果吞吐量与TensorFlow模型进行比较。为了进一步了解，我们还测试了[ViTForImageClassification](https://huggingface.co/docs/transformers/v4.55.4/en/model_doc/vit#transformers.ViTForImageClassification)模型的PyTorch版本：
- en: '[PRE6]'
  id: totrans-57
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'Note that initially PyTorch compilation fails on the converted model due to
    the use of [torch.Size](https://github.com/ENOT-AutoDL/onnx2torch/blob/v1.5.15/onnx2torch/node_converters/reshape.py#L23) operator
    in the [OnnxReshape](https://github.com/ENOT-AutoDL/onnx2torch/blob/v1.5.15/onnx2torch/node_converters/reshape.py#L17C7-L17C18) layer.
    While this is easily fixable (e.g., `tuple([int(i) for i in shape])`), it points
    to a deeper obstacle to optimization of the model: The reshape layer, which appears
    dozens of times in the model, treats shapes as PyTorch tensors residing on the
    GPU. This means that each call requires detaching the shape tensor from the graph
    and copying it to the CPU. The conclusion is that although the converted model
    is functionally accurate, its resultant definition is not optimized for runtime
    performance. This can be seen from the step time results of the different model
    configurations:'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，最初由于在[OnnxReshape](https://github.com/ENOT-AutoDL/onnx2torch/blob/v1.5.15/onnx2torch/node_converters/reshape.py#L17C7-L17C18)层中使用了[torch.Size](https://github.com/ENOT-AutoDL/onnx2torch/blob/v1.5.15/onnx2torch/node_converters/reshape.py#L23)运算符，PyTorch编译在转换后的模型上失败。虽然这很容易修复（例如，`tuple([int(i)
    for i in shape])`），但它指向了模型优化的更深层次的障碍：该模型中出现数十次的reshape层将形状视为位于GPU上的PyTorch张量。这意味着每次调用都需要将形状张量从图中分离出来并复制到CPU。结论是，尽管转换后的模型在功能上是准确的，但其结果定义并未针对运行时性能进行优化。这可以从不同模型配置的步骤时间结果中看出：
- en: '![](../Images/cbf02db99da45ddf7be03dce296e72ed.png)'
  id: totrans-59
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/cbf02db99da45ddf7be03dce296e72ed.png)'
- en: ONNX-Based Conversion Step Time Results (by Author)
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 基于ONNX的转换步骤时间结果（作者）
- en: The converted model is slower than the original TensorFlow flow and significantly
    slower than PyTorch version of the ViT model.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 转换后的模型比原始的TensorFlow流程慢，并且比ViT模型的PyTorch版本慢得多。
- en: Limitations
  id: totrans-62
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 局限性
- en: 'Although (in the case of our toy model) the ONNX-based conversion scheme works,
    it has a number of significant limitations:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管在我们的玩具模型的情况下，基于ONNX的转换方案是有效的，但它存在一些显著的局限性：
- en: During the conversion many parameters were baked into the model, limiting its
    use to inference workloads only.
  id: totrans-64
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在转换过程中，许多参数被烘焙到模型中，限制了其仅适用于推理工作负载。
- en: The ONNX conversion breaks the computation graph into low level operators in
    a manner that makes it difficult to apply and/or reap the benefit of some PyTorch
    optimizations.
  id: totrans-65
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: ONNX转换将计算图分解为低级运算符，这使得难以应用和/或获得一些PyTorch优化的好处。
- en: The reliance on ONNX implies that our conversion scheme will only work on ONNX-friendly
    models. It will not work on models that cannot be mapped to the standard ONNX
    operator set (e.g., models with dynamic control flow).
  id: totrans-66
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 依赖于ONNX意味着我们的转换方案将仅适用于ONNX友好的模型。它将无法在无法映射到标准ONNX运算符集的模型上工作（例如，具有动态控制流的模型）。
- en: The conversion scheme relies on the health and maintenance of a third-party
    library that is not part of the official ONNX offering.
  id: totrans-67
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 转换方案依赖于一个第三方库的健康和维护，该库不属于官方ONNX提供的内容。
- en: Although the scheme works — at least for inference workloads — you may find
    the limitations to be too restrictive for use on your own TensorFlow models. One
    possible option is to abandon the ONNX-to-PyTorch conversion and perform inference
    using the [ONNX Runtime](https://onnxruntime.ai/) library.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然该方案是有效的——至少对于推理工作负载——但你可能会发现这些局限性过于严格，不适合用于你自己的TensorFlow模型。一个可能的选择是放弃ONNX到PyTorch的转换，并使用[ONNX
    Runtime](https://onnxruntime.ai/)库进行推理。
- en: Model Conversion Via Keras3
  id: totrans-69
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 通过Keras3进行模型转换
- en: '[Keras3](https://keras.io/) is a high-level deep learning API focused on maximizing
    the readability, maintainability, and ease of use of AI/ML applications. In a [previous
    post](https://towardsdatascience.com/multi-framework-ai-ml-development-with-keras-3-cf7be29eb23d/),
    we evaluated Keras3 and highlighted its support for multiple backends. In this
    post we revisit its multi-framework support and assess whether this can be utilized
    for model conversion. The scheme we propose is to 1) [migrate the existing TensorFlow
    model to Keras3](https://keras.io/guides/migrating_to_keras_3/) and then 2) run
    the model with the Keras3 PyTorch backend.'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: '[Keras3](https://keras.io/) 是一个面向高级深度学习 API，旨在最大化 AI/ML 应用程序的易读性、可维护性和易用性。在[之前的文章](https://towardsdatascience.com/multi-framework-ai-ml-development-with-keras-3-cf7be29eb23d/)中，我们评估了
    Keras3 并强调了其对多个后端的支持。在这篇文章中，我们重新审视了其多框架支持，并评估这能否用于模型转换。我们提出的方案是1)将现有的 TensorFlow
    模型迁移到 Keras3[迁移指南](https://keras.io/guides/migrating_to_keras_3/)，然后2)使用 Keras3
    PyTorch 后端运行模型。'
- en: Upgrading TensorFlow to Keras3
  id: totrans-71
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 将 TensorFlow 升级到 Keras3
- en: Contrary to the ONNX-based conversion scheme, our current solution may require
    some code changes to the TensorFlow model to migrate it to Keras3\. While the [documentation](https://keras.io/guides/migrating_to_keras_3/) makes
    it sound simple, in practice the difficulty of the migration will depend greatly
    on the details of the model implementation. In the case of our toy model, HuggingFace
    explicitly enforces the use of the legacy [tf-keras](https://pypi.org/project/tf-keras/),
    preventing the use of Keras3\. To implement our scheme, we need to 1) redefine
    the model without this restriction, and 2) replace native TensorFlow operators
    with Keras3 equivalents. The code block below contains a stripped-down version
    of the model, along with the required adjustments. To get a full grasp of the
    changes that were required, perform a side-by-side code comparison with the [original
    model definition](https://github.com/huggingface/transformers/blob/v4.55.4/src/transformers/models/vit/modeling_tf_vit.py).
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 与基于 ONNX 的转换方案相反，我们的当前解决方案可能需要对 TensorFlow 模型进行一些代码更改，以便将其迁移到 Keras3。虽然[文档](https://keras.io/guides/migrating_to_keras_3/)听起来很简单，但在实践中，迁移的难度将很大程度上取决于模型实现的细节。在我们的玩具模型中，HuggingFace
    明确强制使用遗留的[tf-keras](https://pypi.org/project/tf-keras/)，防止使用 Keras3。为了实现我们的方案，我们需要1)重新定义模型，不使用这种限制，2)用
    Keras3 等效操作符替换原生 TensorFlow 操作符。下面的代码块包含了一个简化后的模型版本，以及所需的调整。要全面了解所需的更改，请与[原始模型定义](https://github.com/huggingface/transformers/blob/v4.55.4/src/transformers/models/vit/modeling_tf_vit.py)进行逐行代码比较。
- en: '[PRE7]'
  id: totrans-73
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: TensorFlow to PyTorch Conversion
  id: totrans-74
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: TensorFlow 到 PyTorch 转换
- en: The conversion sequence appears in the code block below. As before, we validate
    the output of the resultant model as well as the number of trainable parameters.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 以下代码块中显示了转换序列。与之前一样，我们验证了结果模型的输出以及可训练参数的数量。
- en: '[PRE8]'
  id: totrans-76
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Training/Fine-tuning the Model
  id: totrans-77
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 训练/微调模型
- en: Contrary to the ONNX-converted model, the Keras3 model maintains the same structure
    and trainable parameters. This allows for resuming training and/or finetuning
    on the converted model. This can either be done within the [Keras3 training](https://keras.io/api/models/model_training_apis/) framework
    or using a [standard PyTorch training loop](https://keras.io/guides/writing_a_custom_training_loop_in_torch/).
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 与基于 ONNX 转换的模型相反，Keras3 模型保持了相同的结构和可训练参数。这允许在转换后的模型上继续训练和/或微调。这可以在[Keras3 训练](https://keras.io/api/models/model_training_apis/)框架内完成，或者使用[标准的
    PyTorch 训练循环](https://keras.io/guides/writing_a_custom_training_loop_in_torch/)。
- en: Optimizing Model Layers
  id: totrans-79
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 优化模型层
- en: Contrary to the ONNX-converted model, the coherence of the Keras3 model definition
    allows for easily modifying and optimizing the layer implementations. In the code
    block below, we replace the existing attention mechanism with PyTorch’s highly
    efficient [SDPA](https://docs.pytorch.org/docs/stable/generated/torch.nn.functional.scaled_dot_product_attention.html) operator.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 与基于 ONNX 转换的模型相反，Keras3 模型定义的连贯性使得修改和优化层实现变得容易。在下面的代码块中，我们用 PyTorch 的非常高效的[SDPA](https://docs.pytorch.org/docs/stable/generated/torch.nn.functional.scaled_dot_product_attention.html)操作符替换了现有的注意力机制。
- en: '[PRE9]'
  id: totrans-81
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: 'We using the same benchmarking function from above to assess the impact of
    this optimization on the model’s runtime performance:'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用上面相同的基准测试函数来评估这种优化对模型运行时性能的影响：
- en: '[PRE10]'
  id: totrans-83
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: 'The results are captured in the table below:'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 结果如下表所示：
- en: '![](../Images/4aa1e3089d971e0e0c536a1a1bb84f88.png)'
  id: totrans-85
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/4aa1e3089d971e0e0c536a1a1bb84f88.png)'
- en: Keras3 Conversion Step Time Results (by Author)
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: Keras3 转换步骤时间结果（作者提供）
- en: Using the Keras3-based model conversion scheme, and applying the SDPA optimization,
    we are able to accelerate the model inference throughput by 22% compared to the
    original TensorFlow model.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 使用基于 Keras3 的模型转换方案，并应用 SDPA 优化，我们能够将模型推理吞吐量比原始 TensorFlow 模型提高 22%。
- en: Model Compilation
  id: totrans-88
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 模型编译
- en: Another optimization we would like to apply is [PyTorch compilation](https://docs.pytorch.org/tutorials/intermediate/torch_compile_tutorial.html).
    Unfortunately (as of the time of this writing), PyTorch compilation in Keras3
    is limited. In the case of our toy model, both our attempt to apply torch.compile
    directly to the model, as well as setting the *jit_compile* field of the Keras3 [Model.compile](https://keras.io/api/models/model_training_apis/) function,
    failed. In both cases, the failure resulted from multiple recompilations that
    were triggered by the Keras3 internal machinery. While Keras3 grants access to
    the PyTorch ecosystem, its high-level abstraction might impose some limitations.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还希望应用另一种优化是 [PyTorch 编译](https://docs.pytorch.org/tutorials/intermediate/torch_compile_tutorial.html)。不幸的是（截至本文写作之时），在
    Keras3 中 PyTorch 编译有限。在我们的玩具模型中，无论是直接尝试将 torch.compile 应用到模型上，还是设置 Keras3 [Model.compile](https://keras.io/api/models/model_training_apis/)
    函数的 *jit_compile* 字段，都失败了。在这两种情况下，失败都是由于 Keras3 内部机制触发的多次重新编译引起的。虽然 Keras3 提供了对
    PyTorch 生态系统的访问，但其高级抽象可能施加一些限制。
- en: Limitations
  id: totrans-90
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 局限性
- en: 'Once again, we have a conversion scheme that works but has several limitations:'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 再次强调，我们有一个可行的转换方案，但有几个限制：
- en: The TensorFlow models must be Keras3-compatible. The amount of work this will
    require will depend on the details of your model implementation. It may require
    some [Keras layer customization](https://keras.io/guides/making_new_layers_and_models_via_subclassing/).
  id: totrans-92
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: TensorFlow 模型必须是 Keras3 兼容的。这将需要的工作量将取决于您模型实现的细节。可能需要一些 [Keras 层定制](https://keras.io/guides/making_new_layers_and_models_via_subclassing/)。
- en: While the resultant model is a torch.nn.Module, it is not a “pure” PyTorch model
    in the sense that it is comprised of Keras3 layers and includes a lot of additional
    Keras3 code. This may require some adaptations to our PyTorch tooling and could
    impose some restrictions, as we saw when we tried to apply PyTorch compilation.
  id: totrans-93
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '虽然生成的模型是 torch.nn.Module，但它不是一个“纯”PyTorch 模型，因为它由 Keras3 层组成，并包含大量的额外 Keras3
    代码。这可能需要对我们 PyTorch 工具进行一些调整，并可能施加一些限制，正如我们在尝试应用 PyTorch 编译时所见。 '
- en: The solution relies on the health and maintenance of Keras3 and its support
    for the TensorFlow and PyTorch backends.
  id: totrans-94
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 该方案依赖于 Keras3 的健康维护及其对 TensorFlow 和 PyTorch 后端的支持。
- en: Summary
  id: totrans-95
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: In this post we have proposed and assessed two methods for auto-conversion of
    legacy TensorFlow models to PyTorch. We summarize our findings in the following
    table.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我们提出了两种将遗留 TensorFlow 模型自动转换为 PyTorch 的方法，并对其进行了评估。我们将在以下表格中总结我们的发现。
- en: '![](../Images/1dec92db7a806026b7116f65b68b41cc.png)'
  id: totrans-97
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/1dec92db7a806026b7116f65b68b41cc.png)'
- en: Comparison of Conversion Schemes (by Author)
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 转换方案比较（作者）
- en: Ultimately, the best approach, whether it be one of the methods discussed here,
    manual conversion, a solution based on generative AI, or the decision not to perform
    conversion at all, will greatly depend on the details of the model and the situation.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 最终，最佳方法，无论是这里讨论的方法之一、手动转换、基于生成式 AI 的解决方案，还是决定完全不进行转换的决定，都将极大地取决于模型的细节和具体情况。
