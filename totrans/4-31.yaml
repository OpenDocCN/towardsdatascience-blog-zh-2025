- en: Exploring DeepSeek’s R1 Training Process
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 探索DeepSeek的R1训练过程
- en: 原文：[https://towardsdatascience.com/exploring-deepseeks-r1-training-process-5036c42deeb1/](https://towardsdatascience.com/exploring-deepseeks-r1-training-process-5036c42deeb1/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[原文链接](https://towardsdatascience.com/exploring-deepseeks-r1-training-process-5036c42deeb1/)'
- en: '![Image by Author - Flux.1 Schnell](../Images/f4e021065acf895801258f636f4d537e.png)'
  id: totrans-2
  prefs: []
  type: TYPE_IMG
  zh: '![图片由作者 – Flux.1 Schnell提供](../Images/f4e021065acf895801258f636f4d537e.png)'
- en: Image by Author – Flux.1 Schnell
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者 – Flux.1 Schnell提供
- en: One of the most powerful AI models in the world today was released open-source.
    Based off both metrics and user interactions, it is as good – if not better –
    than OpenAI’s ChatGPT. The authors were kind enough to release a paper outlining
    how they trained such a model. DeepSeek-R1 is a big deal in the tech world right
    now, so I wanted to break down my understanding of the insights from their paper.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 世界上今天发布的最强大的AI模型之一已经开源。根据指标和用户互动，它和OpenAI的ChatGPT一样好，甚至更好。作者们非常慷慨，发布了一篇论文，概述了他们如何训练这样的模型。DeepSeek-R1目前在科技界是一个大事件，所以我想要分析他们论文中的见解。
- en: In this blog post, we’ll dive deep into how they formulated their policy optimization
    equations to allow for Reinforcement Learning. After that, I’ll go through the
    different stages they put their models through to get deeply impressive performance.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇博客文章中，我们将深入探讨他们如何制定策略优化方程以允许强化学习。之后，我将介绍他们让模型经历的各个阶段，以获得令人印象深刻的表现。
- en: Let’s dive in!
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们深入探讨！
- en: Group Relative Policy Optimization (GRPO)
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 组相对策略优化（GRPO）
- en: 'When we are looking to create a better model, we say we are optimizing our
    model’s policy (basically just the data it uses to explain stuff). Historically,
    the industry has relied on two forms of policy optimization: Proximal Policy Optimization
    (PPO) and Direct Policy Optimization (DPO). [You can learn more about them in
    my previous blog post here](https://towardsdatascience.com/understanding-the-implications-of-direct-preference-optimization-a4bbd2d85841),
    for this entry all you need to understand is that GRPO is another mathematical
    way we are going to figure out how best to update our policy.'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们试图创建一个更好的模型时，我们说我们在优化我们的模型策略（基本上就是它用来解释事物的数据）。历史上，行业依赖于两种策略优化形式：近端策略优化（PPO）和直接策略优化（DPO）。[你可以在我的上一篇博客文章中了解更多关于它们的信息，这里](https://towardsdatascience.com/understanding-the-implications-of-direct-preference-optimization-a4bbd2d85841)，对于这篇帖子，你需要了解的是，GRPO是我们将用来找出如何最佳更新策略的另一种数学方法。
- en: Before I dive into the formulation, I’ll briefly explain some key concepts.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 在我深入公式之前，我将简要解释一些关键概念。
- en: Key Concepts
  id: totrans-10
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 关键概念
- en: A **policy** is a function (defined by a model’s weights and biases) that determines
    the probability of different **outputs** (o) for a given **query** (q). A **group**
    is a set of outputs produced by the model for the same query, sampled from an
    older version of the policy. We sample our outputs from the older version because
    it isn’t being updated, making its outputs consistent. We will use the probabilities
    given by the new policy for the outputs of the old policy to guide our updates.
    Importantly, **advantage** (A) is where reinforcement learning comes into GRPO.
    Advantage tells us how much better a specific output is than the rest of the group.
    We use this value to weight responses and directly influence the score we’ll train
    our model on.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: '**策略**是一个函数（由模型的权重和偏差定义），它决定了给定**查询**（q）的不同**输出**（o）的概率。一个**组**是由模型为同一查询产生的输出集，这些输出是从策略的旧版本中采样的。我们之所以从旧版本中采样输出，是因为它没有被更新，这使得其输出保持一致。我们将使用新策略为旧策略输出提供的概率来指导我们的更新。重要的是，**优势**（A）是强化学习在GRPO中发挥作用的地方。优势告诉我们一个特定的输出比组中的其他输出好多少。我们使用这个值来加权响应，并直接影响我们将训练模型上的分数。'
- en: '![Equation 1 from the paper](../Images/e17e3e8412b1a90ab262abb1cb09fa33.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![方程1来自论文](../Images/e17e3e8412b1a90ab262abb1cb09fa33.png)'
- en: Equation 1 [from the paper](https://github.com/deepseek-ai/DeepSeek-R1/blob/main/DeepSeek_R1.pdf)
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: '[方程1来自论文](https://github.com/deepseek-ai/DeepSeek-R1/blob/main/DeepSeek_R1.pdf)'
- en: Our model tries to maximize the value output by the above equation
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的模型试图最大化上述方程输出的价值
- en: Left-Hand Part of Equation
  id: totrans-15
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 方程的左侧部分
- en: The above formula is how we calculate the score for a certain policy based on
    the group and the last used policy. If the model is doing much better now, we
    should keep the new policy. If the change is incremental, our next policy will
    not be a major shift towards the new one. From this high-level, we can now drill
    deeper.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 上述公式是我们根据组和最后使用的策略计算特定策略得分的公式。如果模型现在表现得多好，我们应该保留新策略。如果变化是渐进的，我们的下一个策略不会是向新策略的重大转变。从高层次来看，我们现在可以深入挖掘。
- en: '![Zooming into the Left-Hand Part of Equation 1 from the Paper](../Images/89cd31fef4742abd37737f8fe8c20d9d.png)'
  id: totrans-17
  prefs: []
  type: TYPE_IMG
  zh: '![将论文中的方程1的左侧部分放大](../Images/89cd31fef4742abd37737f8fe8c20d9d.png)'
- en: Zooming into the Left-Hand Part of Equation 1 [from the Paper](https://github.com/deepseek-ai/DeepSeek-R1/blob/main/DeepSeek_R1.pdf)
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 将论文中的方程1的左侧部分放大 [来自论文](https://github.com/deepseek-ai/DeepSeek-R1/blob/main/DeepSeek_R1.pdf)
- en: The above section of the equation is how we determine if the data is correct.
    I’m going to go left to right explaining each parameter of the min function. At
    the beginning, we take the ratio between the new policy output given a certain
    query over the old policy output given the same query. This ratio is used to tell
    us how much the new policy deviates from the old policy. This ratio doesn’t tell
    us if the change is good or bad, so we need the Advantage value to determine if
    the change is good (positive) or bad (negative). To keep stability in our training
    run, we also calculate a clipped version of this number – with values bounded
    between 1-ε and 1+ε. We then choose the smaller between the bounded and unbounded
    values, as this will be the more stable update. Because the model’s goal is to
    maximize the value min returns, if we choose the smaller version always we reduce
    the odds of giant overcorrections through the run.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 方程的上述部分是我们确定数据是否正确的方法。我将从左到右解释min函数的每个参数。一开始，我们取给定一定查询的新策略输出与给定相同查询的旧策略输出的比率。这个比率用来告诉我们新策略与旧策略偏离了多少。这个比率并不能告诉我们变化是好是坏，因此我们需要优势值来确定变化是好（正值）还是坏（负值）。为了保持训练过程中的稳定性，我们还计算了这个数字的裁剪版本——值在1-ε和1+ε之间。然后我们选择有界和无界值中的较小者，因为这将是更稳定的更新。因为模型的目标是最大化min返回值，如果我们总是选择较小的版本，那么在整个运行过程中减少巨大过校正的机会就会降低。
- en: Reward Modeling
  id: totrans-20
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 奖励建模
- en: '![Equation 3 from the paper](../Images/1f40643d637ef81d56c2bfd20072352e.png)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![论文中的方程3](../Images/1f40643d637ef81d56c2bfd20072352e.png)'
- en: Equation 3 [from the paper](https://github.com/deepseek-ai/DeepSeek-R1/blob/main/DeepSeek_R1.pdf)
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 方程3 [来自论文](https://github.com/deepseek-ai/DeepSeek-R1/blob/main/DeepSeek_R1.pdf)
- en: Now let’s cover Advantage – or how we know whether an update is good or not.
    For reinforcement learning, we do not have a ‘ground truth’ to compare answers
    to. Consequently, we need a good way to figure out, absent of human interaction,
    if the response is good. To solve for this, DeepSeek decided to use a rules based
    system to determine what made for a good answer.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们来谈谈优势——或者我们如何知道一个更新是好是坏。对于强化学习，我们没有“真实值”来比较答案。因此，我们需要一个好的方法来确定，在没有人类交互的情况下，响应是否良好。为了解决这个问题，DeepSeek决定使用基于规则的系统来确定什么构成了一个好的答案。
- en: First, each answer was checked to see if it was accurate – for example by checking
    the final computation value or by compiling and checking its output. Second, they
    checked to see if the response was in the right format (shown below). The paper
    leads me to believe they used models for each of these, but rather than having
    it give a subjective score it instead took complex input and gave an objective
    output.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，每个答案都被检查以确定其准确性——例如通过检查最终的计算值或通过编译并检查其输出。其次，他们检查响应是否在正确的格式中（如下所示）。论文使我相信他们为这些内容使用了模型，但它们不是给出主观评分，而是接受复杂输入并给出客观输出。
- en: '![Table 1 from the paper](../Images/579b216e94b39913c079efb0833a9dab.png)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![论文中的表1](../Images/579b216e94b39913c079efb0833a9dab.png)'
- en: Table 1 [from the paper](https://github.com/deepseek-ai/DeepSeek-R1/blob/main/DeepSeek_R1.pdf)
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 表1 [来自论文](https://github.com/deepseek-ai/DeepSeek-R1/blob/main/DeepSeek_R1.pdf)
- en: Right-Hand Part of Equation
  id: totrans-27
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 方程的右侧部分
- en: For the final part of our equation, we are going to take the Kullback-Leibler
    Divergence between the new policy and our reference policy. Like we had discussed
    before in my blog post on Direct Preference Optimization, this is a way to measure
    the difference between two continuous probability distributions.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们方程的最后一部分，我们将取新策略和参考策略之间的Kullback-Leibler散度。就像我在关于直接偏好优化的博客文章中讨论的那样，这是一种衡量两个连续概率分布之间差异的方法。
- en: '![Zooming in on the Right-Hand part of Equation 1 from the paper](../Images/fa711f5887c339d362a054fbac4ac153.png)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
  zh: '![论文中方程1右手部分的放大图](../Images/fa711f5887c339d362a054fbac4ac153.png)'
- en: Zooming in on the Right-Hand part of Equation 1 [from the paper](https://github.com/deepseek-ai/DeepSeek-R1/blob/main/DeepSeek_R1.pdf)
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 专注于方程1的右手部分（来自论文[链接](https://github.com/deepseek-ai/DeepSeek-R1/blob/main/DeepSeek_R1.pdf)）
- en: While the Left-Hand part of the equation uses min to reduce dramatic changes
    to the policy, it apparently isn’t enough, as we have this subtraction to ensure
    the policy doesn’t deviate too radically from a reference policy. The paper doesn’t
    specify what the reference policy is, but likely this is a previous policy that
    had performed well, which we are benchmarking off to ensure similar or better
    performance.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然方程的左手部分使用min来减少策略的剧烈变化，但它显然还不够，因为我们有这个减法来确保策略不会与参考策略有太大的偏差。论文没有指定参考策略是什么，但很可能这是一个表现良好的先前策略，我们正在以此作为基准来确保相似或更好的性能。
- en: '* * *'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: With the reinforcement modeling out of the way, let’s go through how they were
    actually training!
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 在强化建模完成之后，让我们来看看他们实际上是如何进行训练的！
- en: 'The researchers trained two models in different ways: DeepSeek-R1-Zero and
    DeepSeek-R1'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 研究者们以不同的方式训练了两个模型：DeepSeek-R1-Zero 和 DeepSeek-R1
- en: DeepSeek-R1-Zero
  id: totrans-35
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: DeepSeek-R1-Zero
- en: Here, we are beginning with a base model and then using reinforcement learning
    to have the model develop reasoning capabilities. One might reasonably ask why
    avoid using supervised fine-tuning (SFT) to train the model? Well, to do fine-tuning
    where you enhance the model’s capability, you typically need a lot of good data.
    As this is hard to come by, finding ways around this requirement is useful. Additionally,
    it’s possible with reinforcement learning to find better ways of solving problems
    than supervised models.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们从一个基础模型开始，然后使用强化学习来让模型发展推理能力。有人可能会合理地问，为什么不用监督微调（SFT）来训练模型？嗯，为了进行微调，增强模型的能力，你通常需要大量的好数据。由于这很难获得，找到绕过这一要求的方法是有用的。此外，与监督模型相比，强化学习有可能找到更好的解决问题的方法。
- en: While the authors don’t say what problems they were giving the model to test
    its reasoning ability, it’s reasonable to assume that these were a fairly large
    dataset. They would run the model to get the answer to a group of queries, and
    then use the GRPO equation from above to determine the loss. The loss was then
    used to perform backwards gradient updates and improve the model.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管作者没有说明他们向模型提供了哪些问题来测试其推理能力，但可以合理地假设这些数据集相当庞大。他们会运行模型以获取对一组查询的答案，然后使用上面的GRPO方程来确定损失。然后，损失被用来执行反向梯度更新并改进模型。
- en: There were a number of really interesting takeaways from this session. The most
    immediate one is that the researchers were able to effectively recreate the accuracy
    of OpenAI’s o1 model using this approach. This alone signals that many other labs
    will likely follow this approach.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 从这次会议中，我们得到了许多非常有趣的见解。最直接的一个是，研究人员能够有效地使用这种方法重现了OpenAI的o1模型的准确性。仅此一点就表明，许多其他实验室可能会效仿这种方法。
- en: '![Figure 2 from the paper](../Images/ad1b75a8b7a38d325ceb85cb10107e62.png)'
  id: totrans-39
  prefs: []
  type: TYPE_IMG
  zh: '![论文中的图2](../Images/ad1b75a8b7a38d325ceb85cb10107e62.png)'
- en: Figure 2 [from the paper](https://github.com/deepseek-ai/DeepSeek-R1/blob/main/DeepSeek_R1.pdf)
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 图2 [来自论文](https://github.com/deepseek-ai/DeepSeek-R1/blob/main/DeepSeek_R1.pdf)
- en: Interestingly, we also see that DeepSeek-R1-Zero learns on its own to create
    longer responses. The graph below shows how long its average response tends to
    be as the training run continues. Note that neither the questions asked nor GRPO
    give any bonus points for length. This result gives strong evidence that Chain
    Of Thought reasoning is the way to boost accuracy for these models.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 有趣的是，我们还看到DeepSeek-R1-Zero能够自主学习以创建更长的响应。下面的图表显示了随着训练运行的继续，其平均响应长度倾向于多长。请注意，提出的问题和GRPO都不会因长度而给予任何加分。这一结果为思维链推理是提高这些模型准确性的方法提供了强有力的证据。
- en: '![Figure 3 from the paper](../Images/fa9c4083f8bc185b626e71ac1ea22639.png)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![论文中的图3](../Images/fa9c4083f8bc185b626e71ac1ea22639.png)'
- en: Figure 3 [from the paper](https://github.com/deepseek-ai/DeepSeek-R1/blob/main/DeepSeek_R1.pdf)
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 图3 [来自论文](https://github.com/deepseek-ai/DeepSeek-R1/blob/main/DeepSeek_R1.pdf)
- en: Finally, the authors also saw the model begin to develop reflective tendencies.
    Similar to how prompt engineers would ask the model to reflect on its answers,
    here we can see the model appears to develop this tendency on its own. One of
    the fascinating things here is seeing the model use reinforcement learning to
    discover many of the prompting techniques we’ve been using.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，作者们也看到模型开始表现出反思的趋势。类似于提示工程师会要求模型反思其答案，在这里我们可以看到模型似乎自发地发展了这种趋势。这里令人着迷的一件事是看到模型使用强化学习来发现我们一直在使用的许多提示技术。
- en: '![Table 3 from the paper](../Images/e065de9c230ecd2ba375efebff89c919.png)'
  id: totrans-45
  prefs: []
  type: TYPE_IMG
  zh: '![论文中的表3](../Images/e065de9c230ecd2ba375efebff89c919.png)'
- en: Table 3 [from the paper](https://github.com/deepseek-ai/DeepSeek-R1/blob/main/DeepSeek_R1.pdf)
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 表3 [来自论文](https://github.com/deepseek-ai/DeepSeek-R1/blob/main/DeepSeek_R1.pdf)
- en: Nevertheless, R1-Zero had some issues after its training run. For one thing,
    it would occasionally mix languages – meaning it would splice in words from different
    languages. Additionally, the researchers found R1-Zero would occasionally have
    responses with poor readability. To address these issues while maintaining their
    gains, the researchers began work on an improved methodology.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管如此，R1-Zero在训练运行后出现了一些问题。一方面，它偶尔会混合语言——这意味着它会将来自不同语言的单词拼接到一起。此外，研究人员发现R1-Zero偶尔会有可读性差的回答。为了解决这些问题同时保持他们的收益，研究人员开始研究改进的方法。
- en: DeepSeek-R1
  id: totrans-48
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: DeepSeek-R1
- en: 'From here, the authors once again began with a base model, but this time went
    through 4 distinct steps to train the model: Cold Start, Reasoning-oriented Reinforcement
    Learning, Rejection Sampling and Supervised Fine-Tuning, Reinforcement Learning
    for all Scenarios.'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 从这里，作者们再次从一个基础模型开始，但这次经过了4个不同的步骤来训练模型：冷启动、以推理为导向的强化学习、拒绝采样和监督微调、适用于所有场景的强化学习。
- en: 'Stage 1: Cold Start'
  id: totrans-50
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第一阶段：冷启动
- en: Unlike R1-Zero, the authors wanted to avoid having the model begin the training
    run going in a bad direction (a cold start problem). They began by using their
    DeepSeek-V3 model to generate thousands of examples of Chain Of Thought Reasoning.
    By having it begin with supervised fine-tuning, the authors could ensure that
    the `<think>` tokens were always understandable to the user (something R1-Zero
    struggled with, either mixing languages, or having unintelligible responses).
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 与R1-Zero不同，作者们希望避免模型在训练运行开始时走向错误的方向（冷启动问题）。他们开始使用他们的DeepSeek-V3模型生成成千上万的思维链推理示例。通过使用监督微调开始，作者们可以确保`<think>`标记始终对用户可理解（这是R1-Zero所挣扎的，要么是混合语言，要么是有不可理解的回答）。
- en: 'Stage 2: Reasoning-oriented Reinforcement Learning'
  id: totrans-52
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第二阶段：以推理为导向的强化学习
- en: Once the fine-tune was completed, they began a reinforcement learning run focused
    entirely on reasoning-oriented questions. This would involve coding, mathematics,
    science, and logical reasoning skills. All of these are precise problems with
    correct answers.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 在微调完成后，他们开始了一轮完全专注于推理导向问题的强化学习。这会涉及编码、数学、科学和逻辑推理技能。所有这些都是精确问题，有正确答案。
- en: While training, they noticed that the model would often begin language-mixing
    in its `<think>` tokens. To avoid this, they introduced a language-consistency
    reward into their Advantage calculation, ensuring the model would steer towards
    using just one language. The authors note that this alignment does degrade performance
    slightly. Once the model converges on all its reasoning tasks, they stop the run.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 在训练过程中，他们注意到模型经常会开始在其`<think>`标记中进行语言混合。为了避免这种情况，他们在优势计算中引入了语言一致性奖励，确保模型会倾向于只使用一种语言。作者们指出，这种对齐会略微降低性能。一旦模型在其所有推理任务上收敛，他们就会停止运行。
- en: 'Stage 3: Rejection Sampling and Supervised Fine-Tuning'
  id: totrans-55
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第三阶段：拒绝采样和监督微调
- en: The researchers now expand the type of questions they are curating for their
    fine-tuning. They create both reasoning and non-reasoning questions to improve
    the model’s performance.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 研究人员现在扩展了他们为微调所整理的问题类型。他们创建了推理和非推理问题来提高模型的表现。
- en: For reasoning questions, they no longer require that the question have an objective
    answer. Instead to determine correctness, they use DeepSeek-V3 as their judge.
    After filtering out for wrong answers, mixed language use, long paragraphs, and
    code blocks, they had roughly 600 thousand samples to train on.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 对于推理问题，他们不再要求问题有一个客观的答案。相反，为了确定正确性，他们使用DeepSeek-V3作为他们的评判标准。在过滤掉错误答案、混合语言使用、长段落和代码块后，他们大约有60万个样本用于训练。
- en: For the non-reasoning questions (think writing, translation, story-telling),
    the authors reused their data pipeline from DeepSeek-V3\. For some of the data,
    the authors required the full Chain-of-Thought reasoning, but when they felt the
    question was simple enough (for example "hi"), they did not generate the full
    Chain-of-Thought. They ended up with roughly 200 thousand samples here.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 对于非推理问题（如写作、翻译、讲故事），作者们重新使用了DeepSeek-V3的数据管道。对于一些数据，作者们要求完整的思维链推理，但当他们认为问题足够简单（例如“hi”）时，他们没有生成完整的思维链。最终他们这里大约有20万个样本。
- en: They took this data and fine-tuned for two epochs.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 他们使用这些数据进行了两个epoch的微调。
- en: 'Stage 4: Reinforcement Learning for all Scenarios'
  id: totrans-60
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第四阶段：所有场景的强化学习
- en: They end with a final reinforcement learning run. They adjusted their Advantage
    calculation so that they could capture both proper reasoning (they used the same
    rules-based approach as before) and human preferences for helpfulness and harmlessness.
    For the latter, they seem to have fallen back to using external reward models
    to estimate human preferences. They used a similar data corpus to build this reward
    model as they did for DeepSeek-V3’s pipeline. Note, for helpfulness the final
    summary was what they focused the reward model on, but for harmlessness they took
    into account the thinking tokens as well.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 他们以最后的强化学习运行结束。他们调整了优势计算，以便能够捕捉到正确的推理（他们使用了之前相同的基于规则的策略）以及人类对有用性和无害性的偏好。对于后者，他们似乎又回到了使用外部奖励模型来估计人类偏好的方法。他们使用与DeepSeek-V3管道相同的数据语料库来构建这个奖励模型。注意，对于有用性，最终的总结是他们奖励模型关注的焦点，但对于无害性，他们也考虑了思考标记。
- en: With this final step, they were able to get incredible performance from DeepSeek-R1.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 通过这一最终步骤，他们能够从DeepSeek-R1中获得令人难以置信的性能。
- en: Results
  id: totrans-63
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结果
- en: As the table below shows, the model is directly comparable to some of the best
    models from Anthropic and OpenAI. Even more so, in a few benchmarks DeepSeek R1
    is decidedly better.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 如下表所示，该模型与Anthropic和OpenAI的一些最佳模型直接可比。更不用说，在几个基准测试中，DeepSeek R1的表现明显更好。
- en: '![Table 4 from the paper](../Images/5eac6c78296919fb590bc37c798900e0.png)'
  id: totrans-65
  prefs: []
  type: TYPE_IMG
  zh: '![论文中的表4](../Images/5eac6c78296919fb590bc37c798900e0.png)'
- en: Table 4 from [the paper](https://github.com/deepseek-ai/DeepSeek-R1/blob/main/DeepSeek_R1.pdf)
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: '[论文](https://github.com/deepseek-ai/DeepSeek-R1/blob/main/DeepSeek_R1.pdf)中的表4'
- en: Perhaps the most interesting gauge of performance has been the public’s reaction.
    On Chatbot Arena DeepSeek-R1 ranks very high, being the only model with an MIT
    license in the top 10.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 可能最有趣的性能指标是公众的反应。在Chatbot竞技场中，DeepSeek-R1排名很高，是唯一一个在前十名中拥有麻省理工学院许可证的模型。
- en: '![Image by Author - Screen Capture of Chatbot Arena from 1/27/2025](../Images/dc94ea577704d470c16d697ce826a08e.png)'
  id: totrans-68
  prefs: []
  type: TYPE_IMG
  zh: '![作者图片 - 2025年1月27日Chatbot竞技场的屏幕截图](../Images/dc94ea577704d470c16d697ce826a08e.png)'
- en: Image by Author – Screen Capture of Chatbot Arena from 1/27/2025
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 作者图片 - 2025年1月27日Chatbot竞技场的屏幕截图
- en: Additionally, many in the tech community have also weighed in on how impressed
    they are with this.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，技术社区中的许多人也对这一点表示了他们的印象深刻。
- en: Additionally, the authors also shared with us the other methods they tried (including
    using a Process Reward Model, [which I explain here](https://medium.com/towards-data-science/how-to-improve-model-quality-without-building-larger-models-d6c8e76a86fe)).
    It is worth going through to their analysis to see why they walked away from other
    methods.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，作者们还与我们分享了他们尝试的其他方法（包括使用流程奖励模型，[我在这里解释了](https://medium.com/towards-data-science/how-to-improve-model-quality-without-building-larger-models-d6c8e76a86fe)）。值得仔细阅读他们的分析，看看为什么他们放弃了其他方法。
- en: Conclusion
  id: totrans-72
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: This paper is a great way to see how the most cutting-edge labs are training
    foundation models. Given the success seen here, I think it is only a matter of
    time until people switch to reinforcement learning for a lot of (if not all) fine-tuning.
    I think it’s fair to say this is a seminal moment in the history of AI.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 这篇论文是了解最前沿实验室如何训练基础模型的一个很好的方式。鉴于这里取得的成果，我认为人们转向强化学习进行大量（如果不是全部）微调只是时间问题。我认为这可以说是人工智能历史上的一个开创性时刻。
- en: It is an exciting time to be building!
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 现在是构建模型的一个激动人心的时刻！
