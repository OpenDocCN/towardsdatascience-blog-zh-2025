- en: Become a Better Data Scientist with These Prompt Engineering Tips and Tricks
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/become-a-better-data-scientist-with-these-prompt-engineering-hacks/](https://towardsdatascience.com/become-a-better-data-scientist-with-these-prompt-engineering-hacks/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan class="mdspan-comment is-selected" datatext="el1750963439283">In this
    article,</mdspan> I am sharing with you my favorite prompts and prompt engineering
    tipsthat help me tackle Data Science and AI tasks.
  prefs: []
  type: TYPE_NORMAL
- en: As **Prompt Engineering** is emerging as a required skillin mostjobdescriptions,
    I thought it would be useful to share with you some tips and tricks to improve
    your Data Science workflows.
  prefs: []
  type: TYPE_NORMAL
- en: We are talking here about specific promptsfor cleaning data, exploratory data
    analysis, and feature engineering.
  prefs: []
  type: TYPE_NORMAL
- en: 'This is the **first** of a series of **3 articles** I am going to write about
    Prompt Engineering for Data Science:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Part 1: Prompt Engineering for Planning, Cleaning, and EDA** (this article)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Part 2:** Prompt Engineering for Features, Modeling, and Evaluation'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Part 3:** Prompt Engineering for Docs, DevOps, and Learning'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 👉All the promptsin this article are available at the end of this article as
    a cheat sheet 😉
  prefs: []
  type: TYPE_NORMAL
- en: 'In this article:'
  prefs: []
  type: TYPE_NORMAL
- en: Why Prompt Engineering Is a Superpower for DSs
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The DS Lifecycle, Reimagined with LLMs
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Prompt Engineering for Planning, Cleaning, and EDA
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Why Prompt Engineering is a superpower for DSs
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I know, *Prompt Engineering* sounds just like a trending buzzword these days.
    I used to think that when I started hearing the term.
  prefs: []
  type: TYPE_NORMAL
- en: 'I would see it everywhere and think: it is just writing a prompt. Why are people
    so overhyped about it? What could be so difficult about it?'
  prefs: []
  type: TYPE_NORMAL
- en: After testing several prompts and watching several tutorials, I now understand
    that it is one of the most useful (and also underestimated) skills a data scientist
    can acquire right now.
  prefs: []
  type: TYPE_NORMAL
- en: It is already common to see in the job descriptionsthat prompt engineering is
    one of the required skills for the job.
  prefs: []
  type: TYPE_NORMAL
- en: '**Reflect with me:** how often do you ask ChatGPT/Claude/your fav chatbot to
    help you re-write code, clean data, or just brainstorm a project or some ideas
    you have? And how often do you get useful and meaningful, non-generical answers?'
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompt Engineering** is the art (and science) of getting large language models
    (LLMs) like GPT-4 or Claude to actually do what you want, when you want it, in
    a way that makes sense for your workflow.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Because here’s the thing: **LLMs are everywhere now.**'
  prefs: []
  type: TYPE_NORMAL
- en: In your notebooks.
  prefs: []
  type: TYPE_NORMAL
- en: In your IDE.
  prefs: []
  type: TYPE_NORMAL
- en: In your BI dashboards.
  prefs: []
  type: TYPE_NORMAL
- en: In your code review tools.
  prefs: []
  type: TYPE_NORMAL
- en: And they’re only getting better**.**
  prefs: []
  type: TYPE_NORMAL
- en: As data science work gets more complex—more tools, more expectations, more pipelines—being
    able to *talk* to AI in a precise, structured way becomes a serious advantage.
  prefs: []
  type: TYPE_NORMAL
- en: I see prompt engineering as a superpower. Not just for junior folks trying to
    speed things up, but for experienced data scientists who want to work smarter.
  prefs: []
  type: TYPE_NORMAL
- en: In this series, I’ll show you how prompt engineering can support you *at every
    stage* of the data science lifecycle—from brainstorming and cleaning, to modeling,
    evaluation, documentation, and beyond.
  prefs: []
  type: TYPE_NORMAL
- en: The DS lifecycle, reimagined with LLMs
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: When you are building a Data Science or Machine Learning project, it really
    feels like a whole journey.
  prefs: []
  type: TYPE_NORMAL
- en: From figuring out what problem you’re solving, all the way to making a stakeholder
    understand *why* your model matters (without showing them a single line of code).
  prefs: []
  type: TYPE_NORMAL
- en: Here’s a **typical DS lifecycle:**
  prefs: []
  type: TYPE_NORMAL
- en: You **plan & brainstorm**, to figuring out the right questions to ask and what
    problems need to be solved
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You **gather** data, or data is gathered for you.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You **clean data and preprocess it** – this where you spend 80% of your time
    (and patience!).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The fun begins: you start making exploratory data analysis **(EDA)** – getting
    a feel for the data, finding stories in numbers.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'You start building: **feature engineering** and **modeling** begins.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Then, you **evaluate** and **validate** if things actually *do* work.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Finally, you **document** and **report** your findings, so others can understand
    it too.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Now… imagine having a helpful assistant that:'
  prefs: []
  type: TYPE_NORMAL
- en: Writes solid **starter code** in seconds,
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Suggests better ways to **clean** or **visualize** data,
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Helps you explain **model performance** to non-tech people,
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Reminds you to check for things you might miss (like data leakage or class imbalance),
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: And is available 24/7.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: That’s what LLMs can be, **if you prompt them the right way!**
  prefs: []
  type: TYPE_NORMAL
- en: They won’t replace you, do not worry. They are not able to do it!
  prefs: []
  type: TYPE_NORMAL
- en: But they can and will definitely amplify you. You still need to know **what**
    you’re building and **how** (and why!), but now you have an assistant that allows
    you to do all of this in a smarter way.
  prefs: []
  type: TYPE_NORMAL
- en: Now I’ll show you how prompt engineering can amplify you as a data scientist.
  prefs: []
  type: TYPE_NORMAL
- en: Prompt Engineering for planning, cleaning, and EDA
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '1\. Planning & brainstorming: No more blank pages'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: You’ve got a dataset. You’ve got a goal. Now what?
  prefs: []
  type: TYPE_NORMAL
- en: You can prompt GPT-4 or Claude to list steps for an end-to-end project given
    a dataset description and goal.
  prefs: []
  type: TYPE_NORMAL
- en: This phase is where LLMs can already give you a boost.
  prefs: []
  type: TYPE_NORMAL
- en: 'Example: Planning an energy consumption prediction project'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Here’s an actual prompt I’ve used (with ChatGPT):'
  prefs: []
  type: TYPE_NORMAL
- en: “You are a senior data scientist. I have an energy consumption dataset (12,000
    rows, hourly data over 18 months) including features like temperature, usage_kwh,
    region, and weekday.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Task: Propose a step-by-step project plan to forecast future energy consumption.
    Include preprocessing steps, seasonality handling, feature engineering ideas,
    and model options. We’ll be deploying a dashboard for internal stakeholders.”'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'This kind of structured prompt gives:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Context** (dataset size, variables, goal)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Constraints** (class imbalance)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Hints at **deployment**
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Note: if you are using ChatGPT’s newest model, **o3-pro**, make sure to give
    it a **lot** of context. This new model thrives when you feed it with full transcripts,
    docs, data, etc.'
  prefs: []
  type: TYPE_NORMAL
- en: A similar **Claude** prompt would work, as Claude also favors explicit instructions.
    Claude’s larger context window even allows including more dataset schema details
    or examples if needed, which can yield a more tailored plan
  prefs: []
  type: TYPE_NORMAL
- en: I re-tested this prompt with o3-pro as I was curious to see the results
  prefs: []
  type: TYPE_NORMAL
- en: 'The response from o3-pro was nothing less than a full data science project
    plan, from cleaning and feature engineering to model selection and deployment,
    but more importantly: with critical decision points, realistic timelines, and
    questions that challenge our assumptions upfront.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Here is a snapshot of the response:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Response from o3-pro. Image by author](../Images/1e0f639729005d8605d46da8e86bdab4.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author.
  prefs: []
  type: TYPE_NORMAL
- en: 'Bonus strategy: Clarify – Confirm – Complete'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: If you need a more complex planning, there is a trick called “Clarify, Confirm,
    Complete” that you can use before the AI gives the final plan.
  prefs: []
  type: TYPE_NORMAL
- en: 'You can ask the model to:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Clarify** what it needs to know first'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Confirm** the right approach'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Then **complete** a full plan
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'For example:'
  prefs: []
  type: TYPE_NORMAL
- en: '*“*I want to analyze late deliveries for our logistics network.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Before giving an analysis plan:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Clarify** what data or operational metrics might be relevant to delivery
    delays'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Confirm** the best analysis approach for identifying delay drivers'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Then **complete** a detailed project plan (data cleaning, feature engineering,
    model or analysis techniques, and reporting steps).”
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: This approach forces the LLM to first ask questions or state assumptions (e.g.,
    about available data or metrics). This forces the model to slow down and think,
    just like we humans do!
  prefs: []
  type: TYPE_NORMAL
- en: 'Data cleaning & preprocessing: Bye bye boilerplate'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now that the plan’s ready, it’s time to roll up your sleeves. Cleaning data
    is 80% of the job, and for sure not a fun task.
  prefs: []
  type: TYPE_NORMAL
- en: GPT-4 and Claude can both generate code snippets for common tasks like handling
    missing values or transforming variables, given a good prompt.
  prefs: []
  type: TYPE_NORMAL
- en: 'Example: Write me some pandas code'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: '**Prompt:**'
  prefs: []
  type: TYPE_NORMAL
- en: “I have a DataFrame `df` with columns `age`, `income`, `city`.
  prefs: []
  type: TYPE_NORMAL
- en: Some values are missing, and there are income outliers.
  prefs: []
  type: TYPE_NORMAL
- en: 'Task:'
  prefs: []
  type: TYPE_NORMAL
- en: Drop rows where `city` is missing
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Fill missing `age` with the median
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Cap income outliers using IQR method
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Include comments in the code.”
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Within seconds, you get a code block with `dropna()`, `fillna()`, and the IQR
    logic, all with explanations.
  prefs: []
  type: TYPE_NORMAL
- en: '**Example: Guidance on cleaning strategies**'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: You can query conceptual advice as well.
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompt:**'
  prefs: []
  type: TYPE_NORMAL
- en: “What are different approaches to handle outliers in a financial transactions
    dataset? Explain when to use each and the pros/cons.”
  prefs: []
  type: TYPE_NORMAL
- en: A prompt’s answer like this will output the multiple methodsspecific to your
    niche, instead of a one-size-fits-all solution.
  prefs: []
  type: TYPE_NORMAL
- en: This helps avoid the **simplistic** or even misleading advice one might get
    from a too-general question (for example, asking “best way to handle outliers”
    will probably output an oversimplified “remove all outliers” recommendation.
  prefs: []
  type: TYPE_NORMAL
- en: Try few-shot prompting for Consistency
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Need variable descriptions in a consistent format?
  prefs: []
  type: TYPE_NORMAL
- en: 'Just show the LLM how:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompt:**'
  prefs: []
  type: TYPE_NORMAL
- en: '“Original: “Customer age” → Standardized: “Age of customer at time of transaction.”'
  prefs: []
  type: TYPE_NORMAL
- en: 'Original: “purchase_amt” → Standardized: “Transaction amount in USD.”'
  prefs: []
  type: TYPE_NORMAL
- en: 'Now standardize:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Original: “cust_tenure”'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Original: “item_ct” “'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It follows the style perfectly. You can use this trick to standardize labels,
    define features, or even describe model steps later.
  prefs: []
  type: TYPE_NORMAL
- en: 'Exploratory data analysis (EDA): Ask better questions'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: EDA is where we start asking, “What’s interesting here?” and this is where vague
    prompts can really hurt.
  prefs: []
  type: TYPE_NORMAL
- en: A generic “analyze this dataset” will often return… generic suggestions.
  prefs: []
  type: TYPE_NORMAL
- en: '**Examples: EDA tasks**'
  prefs: []
  type: TYPE_NORMAL
- en: “I have an e-commerce dataset with `customer_id`, `product`, `date`, and `amount`.
  prefs: []
  type: TYPE_NORMAL
- en: 'I want to understand:'
  prefs: []
  type: TYPE_NORMAL
- en: Purchase behavior patterns
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Products often bought together
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Changes in purchasing over time
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: For each, suggest columns to analyze and Python methods.”
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: The answer will probably include grouped stats, time trends, and even code snippets
    using `groupby()`, `seaborn`, and `market basket analysis`.
  prefs: []
  type: TYPE_NORMAL
- en: 'If you already have **synopsis statistics**, you could even paste them and
    ask:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompt:**'
  prefs: []
  type: TYPE_NORMAL
- en: “Based on these summary stats, what stands out or what potential issues should
    I look into?”.
  prefs: []
  type: TYPE_NORMAL
- en: GPT-4/Claude might point out a highvariance in one feature or a suspicious number
    of missing entries in another. (**Be cautious:** the model can only infer from
    what you show; it may hallucinate patterns if asked to speculate without data.)
  prefs: []
  type: TYPE_NORMAL
- en: '**Example prompt: Guided EDA**'
  prefs: []
  type: TYPE_NORMAL
- en: '“I have a dataset with 50 columns (mix of numeric and categorical). Suggest
    an exploratory data analysis plan: list 5 key analyses to perform (e.g., distribution
    checks, correlations, etc.). For each, specify which specific columns or pairs
    of columns to look at, given I want to understand sales performance drivers.”'
  prefs: []
  type: TYPE_NORMAL
- en: This promptis specific about the goal (sales drivers) so the AI might recommend,
    say, analyzing sales vs marketing_spend scatter plot, a time series plot if date
    is present, etc., customized to “performance drivers.” Besides, the structured
    output (list of 5 analyses) will be easier to follow than a long paragraph.
  prefs: []
  type: TYPE_NORMAL
- en: 'Example: Let the LLM explain your plots'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'You can even ask:'
  prefs: []
  type: TYPE_NORMAL
- en: '*“What can a box plot of income by occupation tell me?”*'
  prefs: []
  type: TYPE_NORMAL
- en: It will explain quartiles, IQR, and what outliers might mean. This is more helpful
    when mentoring juniors or preparing slides for reports, presentations, etc.
  prefs: []
  type: TYPE_NORMAL
- en: Pitfalls to be careful about
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'This early stage is where most people misuse LLMs. Here’s what to watch for:'
  prefs: []
  type: TYPE_NORMAL
- en: Broad or vague prompts
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'If you say: “What should I do with this dataset?”'
  prefs: []
  type: TYPE_NORMAL
- en: 'You’ll get something like: “Clean the data, analyze it, build a model.”'
  prefs: []
  type: TYPE_NORMAL
- en: 'Instead, *always include*:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Context** (data type, size, variables)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Goals** (predict churn, analyze sales, etc.)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Constraints** (imbalanced data, missing values, domain rules)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Blind trust in the output
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Yes, LLMs write code fast. But test everything.
  prefs: []
  type: TYPE_NORMAL
- en: I once asked for code to impute missing values. It used `fillna()` for *all
    columns*, including the categorical ones. It didn’t check data types, and neither
    did I… the first time. 😬
  prefs: []
  type: TYPE_NORMAL
- en: Privacy and leakage
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: If you’re working with real company data, **don’t paste raw rows** into the
    prompt unless you’re using a private/enterprise model. Describe the data abstractly
    instead. Or even better, consult your manager about this matter.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Thank you for reading!
  prefs: []
  type: TYPE_NORMAL
- en: 👉 Grab the **Prompt Engineering Cheat Sheet** with all prompts of this article
