- en: Will You Spot the Leaks? A Data Science Challenge
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 你能发现泄露吗？一个数据科学挑战
- en: 原文：[https://towardsdatascience.com/will-you-spot-the-leaks-a-data-science-challenge/](https://towardsdatascience.com/will-you-spot-the-leaks-a-data-science-challenge/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/will-you-spot-the-leaks-a-data-science-challenge/](https://towardsdatascience.com/will-you-spot-the-leaks-a-data-science-challenge/)
- en: Not another explanation
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 不是另一个解释
- en: 'You’ve probably heard of data leakage, and you might know both flavours well:
    **Target Variable** and **Train-Test Split**. But will you spot the holes in my
    faulty logic, or the oversights in my optimistic code? Let’s find out.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能听说过数据泄露，你可能对这两种类型都很熟悉：**目标变量**和**训练-测试集分割**。但你能否发现我错误逻辑中的漏洞，或者我乐观代码中的疏忽？让我们来看看。
- en: I’ve seen many articles on Data Leakage, and I thought they were are all quite
    insightful. However, I did notice they tended to focus on the theoretical aspect
    of it. And I found them somewhat lacking in examples that zero in on the lines
    of code or precise decisions that lead to an overly optimistic model.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我看过很多关于数据泄露的文章，我认为它们都很有洞察力。然而，我注意到它们往往侧重于理论方面。我发现它们在针对导致过度乐观模型的代码行或精确决策的示例方面有些不足。
- en: My goal in this article is not a theoretical one; it is to truly put your Data
    Science skills to the test. To see if you can spot all the decisions I make that
    lead to data leakage in a real-world example.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 我在这篇文章中的目标不是理论上的；而是真正地测试你的数据科学技能。看看你是否能发现我做出的所有可能导致真实世界示例中数据泄露的决定。
- en: '*Solutions at the end *'
  id: totrans-6
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*解决方案在最后*'
- en: An *Optional* Review
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 可选的回顾
- en: 1\. Target (Label) Leakage
  id: totrans-8
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 目标（标签）泄露
- en: '**When features contain information about what you’re trying to predict**.'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: '**当特征包含关于你试图预测的信息时**。'
- en: '**Direct Leakage:** Features computed directly from the target → *Example:*
    Using “days overdue” to predict loan default → *Fix*: Remove feature.'
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**直接泄露：** 直接从目标计算的特征 → *示例：* 使用“逾期天数”来预测贷款违约 → *修复：* 删除特征。'
- en: '**Indirect Leakage:** Features that serve as proxies for the target → *Example:*
    Using “insurance payout amount” to predict hospital readmission → *Fix*: Remove
    feature.'
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**间接泄露：** 作为目标代理的特征 → *示例：* 使用“保险赔偿金额”来预测医院再入院 → *修复：* 删除特征。'
- en: '**Post-Event Aggregates:** Using data from after the prediction point → *Example:*
    Including “total calls in first 30 days” for a 7-day churn model → *Fix* calculate
    aggregate on the fly'
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**事件后聚合：** 使用预测点之后的数据 → *示例：* 对于7天流失模型，包括“前30天的总通话次数” → *修复：* 在线计算聚合'
- en: 2\. Train-Test (Split) Contamination
  id: totrans-13
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 训练-测试（分割）污染
- en: '**When test set information leaks into your training process**.'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: '**当测试集信息泄露到你的训练过程中**。'
- en: '**Data Analysis Leakage:** Analyzing full dataset before splitting → *Example:*
    Examining correlations or covariance matrices of entire dataset → *Fix:* Perform
    exploratory analysis only on training data'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据分析泄露：** 在分割之前分析完整数据集 → *示例：* 检查整个数据集的相关性或协方差矩阵 → *修复：* 仅在训练数据上执行探索性分析'
- en: '**Preprocessing Leakage:** Fitting transformations before splitting data →
    *Examples:* Computing covariance matrices, scaling, normalization on full dataset
    → *Fix:* Split first, then fit preprocessing on train only'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**预处理泄露：** 在分割数据之前拟合转换 → *示例：* 在整个数据集上计算协方差矩阵、缩放、归一化 → *修复：* 首先分割，然后在训练数据上仅拟合预处理'
- en: '**Temporal Leakage:** Ignoring time order in time-dependent data → *Fix:* Maintain
    chronological order in splits.'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**时间泄露：** 忽略时间依赖数据中的时间顺序 → *修复：* 在分割中保持时间顺序。'
- en: '**Duplicate Leakage:** Same/similar records in both train and test → *Fix:*
    Ensure variants of an entity stay entirely in one split'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**重复泄露：** 训练集和测试集中有相同/相似的记录 → *修复：* 确保实体的变体完全保留在一个分割中'
- en: '**Cross-Validation Leakage:** Information sharing between CV folds → *Fix:*
    Keep all transformations inside each CV loop'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**交叉验证泄露：** CV折叠之间的信息共享 → *修复：* 将所有转换保留在每个CV循环内部'
- en: '**Entity (Identifier) Leakage:** When a high‑cardinality ID appears in both
    train and test, the model “learns” → *Fix: Drop the columns or see Q3*'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**实体（标识符）泄露：** 当高基数ID同时出现在训练集和测试集中时，模型“学习”了 → *修复：* 删除列或查看Q3'
- en: Let the Games Begin
  id: totrans-21
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 游戏开始
- en: In total there at 17 points. The rules of the game are simple. At the end of
    each section pick your answers before moving ahead. The scoring is simple.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 总共有17个点。游戏规则很简单。在每个部分的结尾选择你的答案，然后再继续前进。评分很简单。
- en: +1 pt. identifying a column that leads to data leakage.
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: +1 分识别出导致数据泄露的列。
- en: +1 pt. identifying a problematic preprocessing.
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: +1 分识别出有问题的预处理。
- en: +1 pt. identifying when no data leakage has taken place.
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Along the way, when you see
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/987306e454c1cc98b7c9efa3afd2a08e.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
- en: That is to tell you how many points are available in the above section.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
- en: Problems in the Columns
  id: totrans-29
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Let’s say we are hired by Hexadecimal Airlines to create a machine learning
    model that identifies planes most likely to have an accident on their trip. In
    other words, a supervised classification problem with the target variable **Outcome**
    in **df_flight_outcome**.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
- en: '![Image of dataframes in python by Marco Hening Tallarico](../Images/252377f6f47008113270e0b3a7f82939.png)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
- en: 'This is what we know about our data: Maintenance checks and reports are made
    first thing in the morning, prior to any departures. Our black-box data is recorded
    continuously for each plane and each flight. This monitors vital flight data such
    as Altitude, Warnings, Alerts, and Acceleration. Conversations in the cockpit
    are even recorded to help investigations in the event of a crash. At the end of
    every flight a report is generated, then an update is made to **df_flight_outcome**.'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
- en: '**Question 1:** Based on this information, what columns can we immediately
    remove from consideration?'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/70d6a2a4bf6b50e0db287bd51d8db023.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
- en: '* * *'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: A Convenient Categorical
  id: totrans-36
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now, suppose we review the original .csv files we received from Hexadecimal
    Airlines and realize they went through all the work of splitting up the data into
    2 files **(no_accidents.csv and previous_accidents.csv)**.Separating planes with
    an accident history from planes with no accident history. Believing this to be
    useful data we add into our data-frame as a categorical column.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
- en: '**Question 2**: Has data leakage taken place?'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/328b63ca51bd812d54a1802aa7a0e1dd.png)'
  id: totrans-39
  prefs: []
  type: TYPE_IMG
- en: '* * *'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
- en: Needles in the Hay
  id: totrans-41
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now let’s say we join our data on **date** and **Tail#**. To get the resulting
    **data_frame,** which wewill use to train our model. In total, we have 12,345
    entries, over 10 years of observation with 558 unique tail numbers, and 6 types
    maintenance checks. This data has no missing entries and has been joined together
    correctly using SQL so no temporal leakage takes place.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
- en: '![Dataframe by Marco Hening Tallarico](../Images/0b77f7f688891ad6e2a24ec791500a2a.png)'
  id: totrans-43
  prefs: []
  type: TYPE_IMG
- en: '**Tail Number** is a unique identifier for the plane.'
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Flight Number** is a unique identifier for the flight.'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Last Maintenance Day** is always in the past.'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Flight hours since last maintenance** are calculated prior to departure.'
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Cycle count** is the number of takeoffs and landings completed, used to track
    airframe stress.'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**N1 fan speed** is the rotational speed of the engine’s front fan, shown as
    a percentage of maximum RPM.'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**EGT temperature** stands for Exhaust Gas Temperature and measures engine
    combustion heat output.'
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Question 3:** Could any of these features be a source of data leakage?'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
- en: '**Question 4:** Are there missing preprocessing steps that could lead to data
    leakage?'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/078ec6add8f665eb05b7ce8bbcf83f57.png)'
  id: totrans-53
  prefs: []
  type: TYPE_IMG
- en: '**Hint** — If there are missing preprocessing steps, or problematic columns,
    I **do not** fix them in the next section, i.e the mistake carries through.'
  id: totrans-54
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**提示** — 如果有缺失的预处理步骤或问题列，我 **不会** 在下一节中修复它们，即错误会延续下去。'
- en: '* * *'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Analysis and Pipelines
  id: totrans-56
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 分析和管道
- en: Now we focus our analysis on the numerical columns in **df_maintenance**. Our
    data shows a high amount of correlation between (Cycle, Flight hours) and (N1,
    EGT), so we make a note to use Principal Component Analysis (PCA) to reduce dimensionality.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们将分析的重点放在 **df_maintenance** 中的数值列上。我们的数据显示（Cycle、飞行小时数）与（N1、EGT）之间存在高度的相关性，因此我们记录下来使用主成分分析（PCA）来降低维度。
- en: We split our data into training and testing sets, use **OneHotEncoder** on categorical
    data, apply **StandardScaler**, and then use **PCA** to reduce the dimensionality
    of our data.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将数据分为训练集和测试集，对分类数据使用 **OneHotEncoder**，应用 **StandardScaler**，然后使用 **PCA**
    来降低数据的维度。
- en: '![Correlation matrix by Marco Hening Tallarico](../Images/aa20dbcc73dca6b68d0180e38d611d56.png)'
  id: totrans-59
  prefs: []
  type: TYPE_IMG
  zh: '![由 Marco Hening Tallarico 生成的相关矩阵](../Images/aa20dbcc73dca6b68d0180e38d611d56.png)'
- en: '[PRE0]'
  id: totrans-60
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '**Question 5:** Has data leakage taken place?'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: '**问题 5**：是否发生了数据泄露？'
- en: '![](../Images/328b63ca51bd812d54a1802aa7a0e1dd.png)'
  id: totrans-62
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/328b63ca51bd812d54a1802aa7a0e1dd.png)'
- en: '* * *'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Solutions
  id: totrans-64
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 解决方案
- en: '**Answer 1**: Remove all 4 columns from **df_flight_outcome** and all 8 columns
    from **df_black_box**, as this information is only available after landing, not
    at takeoff, when predictions would be made. Including this post-flight data would
    create *temporal leakage*. *(12 pts.)*'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: '**答案 1**：从 **df_flight_outcome** 中删除所有 4 列，从 **df_black_box** 中删除所有 8 列，因为这些信息仅在飞机着陆后可用，而在起飞时（预测时）不可用。包含这些飞行后的数据将导致
    *时间泄露*。（12 分）'
- en: Simply plugging data into a model is not enough we need to know how this data
    is being generated.
  id: totrans-66
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 简单地将数据插入模型是不够的，我们需要知道这些数据是如何生成的。
- en: '**Answer 2**: Adding the file names as a column is a source of data leakage,
    as we could be essentially giving away the answer by adding a column that tells
    us if a plane has had an accident or not. (1 pt.)'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: '**答案 2**：将文件名作为列添加是一个数据泄露的来源，因为我们实际上可能通过添加一个告诉我们飞机是否发生事故的列来给出答案。（1 分）'
- en: As a rule of thumb you should always be incredibly critical in including file
    names or file paths.
  id: totrans-68
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 作为一项经验法则，你应该始终对包括文件名或文件路径持极其批判的态度。
- en: '**Answer 3**: Although all listed fields are available before departure, the
    high‐cardinality identifiers **(Tail#, Flight#)** causes *entity (ID) leakage* .
     The model simply memorizes “Plane X never crashes” rather than learning genuine
    maintenance signals. To prevent this leakage, you should either drop those ID
    columns entirely or use a group‑aware split so no single plane appears in both
    train and test sets. (2 pt.)'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: '**答案 3**：尽管所有列出的字段在起飞前都可用，但高基数标识符 **(Tail#、Flight#**) 导致了 *实体（ID）泄露*。模型只是简单地记住“飞机
    X 从不坠毁”，而不是学习真正的维护信号。为了防止这种泄露，你应该完全删除这些 ID 列，或者使用组感知拆分，以确保没有单个飞机同时出现在训练集和测试集中。（2
    分）'
- en: '**Corrected code for Q3 and Q4**'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: '**Q3 和 Q4 的修正代码**'
- en: '[PRE1]'
  id: totrans-71
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '**Answer 4**: If we look carefully, we see that the date columns are not in
    order, and we did not sort the data chronologically. If you randomly shuffle time‐ordered
    records before splitting, “future” flights end up in your training set, letting
    the model learn patterns it wouldn’t have when actually predicting. That information
    leak inflates your performance metrics and fails to simulate real‐world forecasting.
    *(1 pt.)*'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: '**答案 4**：如果我们仔细观察，我们会发现日期列没有按顺序排列，我们没有按时间顺序排序数据。如果你在拆分之前随机打乱时间顺序的记录，那么“未来的”航班最终会出现在你的训练集中，让模型学习到它在实际预测时不会有的模式。这种信息泄露会夸大你的性能指标，并无法模拟现实世界的预测。（1
    分）'
- en: '**Answer 5**: Data Leakage has taken place because we looked at the covariance
    matrix for **df_maintenance,** which included both train and test data. *(1 pt.)*'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: '**答案 5**：由于我们查看了 **df_maintenance** 的协方差矩阵，其中包括了训练数据和测试数据，因此发生了数据泄露。（1 分）'
- en: Always do data analysis on the training data. Pretend the testing data does
    not exist, put it completely behind glass until its time to test you model.
  id: totrans-74
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 总是在训练数据上进行分析。假装测试数据不存在，将其完全放在玻璃后面，直到测试模型的时候。
- en: '* * *'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Conclusion
  id: totrans-76
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: The core principle sounds simple — never use information unavailable at prediction
    time — yet the application proves remarkably elusive. The most dangerous leaks
    slip through undetected until deployment, turning promising models into costly
    failures. True prevention requires not just technical safeguards but a commitment
    to experimental integrity. By approaching model development with rigorous skepticism,
    we transform data leakage from an invisible threat to a manageable challenge.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 核心原则听起来很简单——永远不要使用预测时不可用的信息——然而，其应用却证明非常难以捉摸。最危险的数据泄露在部署前未被察觉，将有潜力的模型变成了代价高昂的失败。真正的预防不仅需要技术保障，还需要对实验完整性的承诺。通过以严格的怀疑态度来处理模型开发，我们将数据泄露从一种无形的威胁转变为一种可管理的挑战。
- en: '*Key Takeaway: To spot data leakage, it is not enough to have a theoretical
    understanding of it; one must critically evaluate code and processing decisions,
    practice, and think critically about every decision.*'
  id: totrans-78
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*关键要点：要发现数据泄露，仅仅有理论上的理解是不够的；必须批判性地评估代码和处理决策，实践，并对每个决策进行批判性思考。*'
- en: All images by the author unless otherwise stated.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 所有图片除非另有说明，均为作者所有。
- en: '* * *'
  id: totrans-80
  prefs: []
