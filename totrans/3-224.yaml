- en: 'Enhancing RAG: Beyond Vanilla Approaches'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 增强 RAG：超越传统方法
- en: 原文：[https://towardsdatascience.com/enhancing-rag-beyond-vanilla-approaches/](https://towardsdatascience.com/enhancing-rag-beyond-vanilla-approaches/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/enhancing-rag-beyond-vanilla-approaches/](https://towardsdatascience.com/enhancing-rag-beyond-vanilla-approaches/)
- en: Retrieval-Augmented Generation (RAG) is a powerful technique that enhances language
    models by incorporating external information retrieval mechanisms. While standard
    RAG implementations improve response relevance, they often struggle in complex
    retrieval scenarios. This article explores the limitations of a vanilla RAG setup
    and introduces advanced techniques to enhance its accuracy and efficiency.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 检索增强生成（RAG）是一种强大的技术，通过结合外部信息检索机制来增强语言模型。虽然标准的RAG实现提高了响应的相关性，但它们在复杂的检索场景中往往难以应对。本文探讨了传统RAG设置的局限性，并介绍了提高其准确性和效率的高级技术。
- en: '**The Challenge with Vanilla RAG**'
  id: totrans-3
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**传统RAG的挑战**'
- en: 'To illustrate RAG’s limitations, consider a simple experiment where we attempt
    to retrieve relevant information from a set of documents. Our dataset includes:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 为了说明RAG的限制，考虑一个简单的实验，我们尝试从一组文档中检索相关信息。我们的数据集包括：
- en: A primary document discussing best practices for staying healthy, productive,
    and in good shape.
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一篇主要讨论保持健康、高效和良好体态的最佳实践的文档。
- en: Two additional documents on unrelated topics, but contain some similar words
    used in different contexts.
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 两篇关于无关主题的额外文档，但包含在不同语境中使用的某些相似词汇。
- en: '[PRE0]'
  id: totrans-7
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'Using a standard RAG setup, we query the system with:'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 使用标准的RAG设置，我们用以下方式查询系统：
- en: '*What should I do to stay healthy and productive?*'
  id: totrans-9
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*为了保持健康和高效，我应该做什么？*'
- en: '*What are the best practices to stay healthy and productive?*'
  id: totrans-10
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '*保持健康和高效的最佳实践是什么？*'
- en: '**Helper Functions**'
  id: totrans-11
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**辅助函数**'
- en: To enhance retrieval accuracy and streamline query processing, we implement
    a set of essential helper functions. These functions serve various purposes, from
    querying the ChatGPT API to computing document embeddings and similarity scores.
    By leveraging these functions, we create a more efficient RAG pipeline that effectively
    retrieves the most relevant information for user queries.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 为了提高检索准确性和简化查询处理，我们实现了一系列基本的辅助函数。这些函数服务于各种目的，从查询ChatGPT API到计算文档嵌入和相似度分数。通过利用这些函数，我们创建了一个更高效的RAG管道，能够有效地检索用户查询的最相关信息。
- en: 'To support our RAG improvements, we define the following helper functions:'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 为了支持我们的RAG改进，我们定义了以下辅助函数：
- en: '[PRE1]'
  id: totrans-14
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '[PRE2]'
  id: totrans-15
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '[PRE3]'
  id: totrans-16
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '[PRE4]'
  id: totrans-17
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: '[PRE5]'
  id: totrans-18
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: '**Evaluating the Vanilla RAG**'
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**评估传统RAG**'
- en: To evaluate the effectiveness of a vanilla RAG setup, we conduct a simple test
    using predefined queries. Our goal is to determine whether the system retrieves
    the most relevant document based on semantic similarity. We then analyze the limitations
    and explore possible improvements.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 为了评估传统RAG设置的有效性，我们使用预定义的查询进行简单测试。我们的目标是确定系统是否基于语义相似性检索到最相关的文档。然后，我们分析其局限性并探索可能的改进。
- en: '[PRE6]'
  id: totrans-21
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: '**Advanced Techniques for Improved RAG**'
  id: totrans-22
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**改进RAG的高级技术**'
- en: To further refine the retrieval process, we introduce advanced functions that
    enhance the capabilities of our RAG system. These functions generate structured
    information that aids in document retrieval and query processing, making our system
    more robust and context-aware.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 为了进一步细化检索过程，我们引入了增强RAG系统功能的高级函数。这些函数生成结构化信息，有助于文档检索和查询处理，使我们的系统更加健壮和具有上下文意识。
- en: 'To address these challenges, we implement three key enhancements:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 为了解决这些挑战，我们实施了三个关键增强：
- en: '**1\. Generating FAQs**'
  id: totrans-25
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**1. 生成FAQs**'
- en: By automatically creating a list of frequently asked questions related to a
    document, we expand the range of potential queries the model can match. These
    FAQs are generated once and stored alongside the document, providing a richer
    search space without incurring ongoing costs.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 通过自动创建与文档相关的常见问题列表，我们扩展了模型可以匹配的潜在查询范围。这些FAQs一旦生成，就会与文档一起存储，提供更丰富的搜索空间，而无需承担持续的成本。
- en: '[PRE7]'
  id: totrans-27
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: '**2\. Creating an Overview**'
  id: totrans-28
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**2. 创建概述**'
- en: A high-level summary of the document helps capture its core ideas, making retrieval
    more effective. By embedding the overview alongside the document, we provide additional
    entry points for relevant queries, improving match rates.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 文档的高级总结有助于捕捉其核心思想，使检索更加有效。通过将概述嵌入到文档中，我们为相关查询提供了额外的入口点，提高了匹配率。
- en: '[PRE8]'
  id: totrans-30
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: '**3\. Query Decomposition**'
  id: totrans-31
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: '**3. 查询分解**'
- en: 'Instead of searching with broad user queries, we break them down into smaller,
    more precise sub-queries. Each sub-query is then compared against our enhanced
    document collection, which now includes:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 我们不是用宽泛的用户查询进行搜索，而是将它们分解成更小、更精确的子查询。然后，每个子查询都与我们的增强文档集合进行比较，该集合现在包括：
- en: The original document
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 原始文档
- en: The generated FAQs
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 生成的FAQ
- en: The generated overview
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 生成的概述
- en: By merging the retrieval results from these multiple sources, we significantly
    improve the likelihood of finding relevant information.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 通过合并这些多个来源的检索结果，我们显著提高了找到相关信息的可能性。
- en: '[PRE9]'
  id: totrans-37
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: '**Evaluating the Improved RAG**'
  id: totrans-38
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**评估改进后的RAG**'
- en: Implementing these techniques, we re-run our initial queries. This time, query
    decomposition generates several sub-queries, each focusing on different aspects
    of the original question. As a result, our system successfully retrieves relevant
    information from both the FAQ and the original document, demonstrating a substantial
    improvement over the vanilla RAG approach.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 实施这些技术后，我们重新运行了初始查询。这次，查询分解生成了几个子查询，每个子查询都专注于原始问题的不同方面。因此，我们的系统成功从常见问题解答（FAQ）和原始文档中检索到相关信息，这比传统的RAG方法有显著的改进。
- en: '[PRE10]'
  id: totrans-40
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: 'Here are some of the FAQ that were generated:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是一些生成的FAQ：
- en: '[PRE11]'
  id: totrans-42
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: '**Cost-Benefit Analysis**'
  id: totrans-43
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**成本效益分析**'
- en: 'While these enhancements introduce an upfront processing cost—generating FAQs,
    overviews, and embeddings—this is a one-time cost per document. In contrast, a
    poorly optimized RAG system would lead to two major inefficiencies:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然这些增强引入了前期处理成本——生成FAQ、概述和嵌入，但这是对每份文档的一次性成本。相比之下，一个优化不良的RAG系统会导致两个主要低效性：
- en: Frustrated users due to low-quality retrieval.
  id: totrans-45
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 由于检索质量低而感到沮丧的用户。
- en: Increased query costs from retrieving excessive, loosely related documents.
  id: totrans-46
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从检索过多、松散相关的文档中产生的查询成本增加。
- en: For systems handling high query volumes, these inefficiencies compound quickly,
    making preprocessing a worthwhile investment.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 对于处理高查询量的系统，这些低效性会迅速累积，使得预处理成为一个值得的投资。
- en: '**Conclusion**'
  id: totrans-48
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**结论**'
- en: By integrating document preprocessing (FAQs and overviews) with query decomposition,
    we create a more intelligent RAG system that balances accuracy and cost-effectiveness.
    This approach enhances retrieval quality, reduces irrelevant results, and ensures
    a better user experience.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 通过将文档预处理（FAQ和概述）与查询分解相结合，我们创建了一个更智能的RAG系统，该系统在准确性和成本效益之间取得平衡。这种方法提高了检索质量，减少了无关结果，并确保了更好的用户体验。
- en: As RAG continues to evolve, these techniques will be instrumental in refining
    AI-driven retrieval systems. Future research may explore further optimizations,
    including dynamic thresholding and reinforcement learning for query refinement.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 随着RAG的不断发展，这些技术将在改进AI驱动检索系统中发挥关键作用。未来的研究可能会探索进一步的优化，包括动态阈值和强化学习用于查询优化。
