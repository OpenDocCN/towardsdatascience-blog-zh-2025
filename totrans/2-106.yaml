  type: TYPE_NORMAL
- en: Fine-tuning? RAG? Chain-of-thought? We suspect that for many of our readers,
    these [LLM-optimization](https://towardsdatascience.com/tag/llm/) approaches—as
    relevant as they might still be—feel a tad stale.
  prefs: []
  type: TYPE_NORMAL
- en: If you’d like to catch up on cutting-edge topics in the sprawling world of large
    language models, read on. This week’s Variable highlights three recent articles
    that will help you create powerful LLM workflows and overcome emerging challenges.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: How to Create an LLM Judge That Aligns with Human Labels
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Evaluating the quality of LLM outputs continues to be a thorn in many a practitioner’s
    side. [Elena Samuylova](https://towardsdatascience.com/author/elena-samuylova/) presents
    a lucid, hands-on guide to building a robust LLM-as-a-judge pipeline that produces
    reliable and consistent results.
  prefs: []
  type: TYPE_NORMAL
- en: '[How to Create an LLM Judge That Aligns with Human Labels](https://towardsdatascience.com/how-to-create-an-llm-judge-that-aligns-with-human-labels/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Your 1M+ Context Window LLM Is Less Powerful Than You Think
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Before you worry about how many tokens your model can process, consider its
    effective working memory. Tobias Schnabel explains why.
  prefs: []
  type: TYPE_NORMAL
- en: '[Your 1M+ Context Window LLM Is Less Powerful Than You Think](https://towardsdatascience.com/your-1m-context-window-llm-is-less-powerful-than-you-think/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Exploring Prompt Learning: Using English Feedback to Optimize LLM Systems'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Based on her team’s recent work, Aparna Dhinakaran outlines a promising new
    approach that “uses natural language feedback to iteratively improve prompts.”
  prefs: []
  type: TYPE_NORMAL
- en: '[Exploring Prompt Learning: Using English Feedback to Optimize LLM Systems](https://towardsdatascience.com/exploring-prompt-learning-using-english-feedback-to-optimize-llm-systems/)'
  prefs:
  - PREF_BQ
