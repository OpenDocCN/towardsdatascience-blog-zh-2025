- en: Government Funding Graph RAG
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/government-funding-graph-rag/](https://towardsdatascience.com/government-funding-graph-rag/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1745527782909" class="mdspan-comment">In this article</mdspan>,
    I present my latest open-source project — Government Funding Graph.
  prefs: []
  type: TYPE_NORMAL
- en: The inspiration for this project came from a desire to make better tooling for
    grant writing, namely to suggest research topics, funding bodies, research institutions,
    and researchers. I have made [Innovate UK](https://www.ukri.org/councils/innovate-uk/) grant
    applications in the past, so I have had an interest in the government funding
    landscape for some time.
  prefs: []
  type: TYPE_NORMAL
- en: Concretely, a lot of the recent political discourse focuses on government spending,
    namely Elon Musk’s [Department of Government Efficiency (DOGE](https://doge.gov/savings))
    in the United States and similar sentiments echoed here in the UK, as Kier Starmer
    looks to integrate [AI into government](https://www.bbc.co.uk/news/articles/c74kep983x3o).
  prefs: []
  type: TYPE_NORMAL
- en: Perhaps the release of this project is quite timely. Albeit not the original
    intention, I hope as a secondary outcome of this article is that it inspires more
    exploration into open source datasets for public spending.
  prefs: []
  type: TYPE_NORMAL
- en: '![Government Funding Graph (Image by author)](../Images/32d00b22f6748008b8b71660863960c6.png)'
  prefs: []
  type: TYPE_IMG
- en: Government Funding Graph (Image by author)
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: I have used NetworkX & PyVis to visualise the graph of UKRI API data. Then,
    I detail a LlamaIndex graph RAG implementation. For completeness, I have also
    included my initial LangChain-based solution. The web framework is Streamlit,
    the demo is hosted on Streamlit community cloud.
  prefs: []
  type: TYPE_NORMAL
- en: This article contains the following sections.
  prefs: []
  type: TYPE_NORMAL
- en: Definitions
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: UKRI API
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Construct NetworkX Graph
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Filter a NetworkX Graph
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Graph Visualisation Using PyVis
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Graph RAG Using LlamaIndex
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Linting With Pylint
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
