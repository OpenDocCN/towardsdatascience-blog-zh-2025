- en: 1\. Definitions
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1. 定义
- en: What is UKRI?
  id: totrans-21
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 什么是 UKRI？
- en: UK Research and Innovation is a non-departmental public body sponsored by the
    Department for Science, Innovation and Technology (DSIT) that allocates funding
    for research and development. Generally, funding is awarded to research institutions
    and businesses.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 英国研究与创新（UKRI）是由科学、创新和技术部（DSIT）资助的非部门性公共机构，负责分配研发资金。通常，资金授予研究机构和企业。
- en: “We invest £8 billion of taxpayers’ money each year into research and innovation
    and the people who make it happen. We work across a huge range of fields — from
    biodiversity conservation to quantum computing, and from space telescopes to innovative
    health care. We give everyone the opportunity to contribute and to benefit, bringing
    together people and organisations nationally and globally to create, develop and
    deploy new ideas and technologies.” — [UKRI Website](https://www.ukri.org/)
  id: totrans-23
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “我们每年投资80亿英镑的纳税人资金用于研究和创新以及使之成为可能的人们。我们在广泛的领域工作——从生物多样性保护到量子计算，从太空望远镜到创新医疗保健。我们为每个人提供贡献和受益的机会，将全国和全球的人们和组织聚集在一起，创造、开发和部署新的想法和技术。”
    —— [UKRI 网站](https://www.ukri.org/)
- en: What is a Graph?
  id: totrans-24
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 什么是图？
- en: A graph is a convenient data structure showing the relationships between different
    entities (nodes) and their relationships to each other (edges). In some instances,
    we also associate those relationships with a numerical value.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 图是一种方便的数据结构，显示了不同实体（节点）及其相互关系（边）。在某些情况下，我们还将这些关系与数值相关联。
- en: “In computer science, a graph is an abstract data type that is meant to implement
    the undirected graph and directed graph concepts from the field of graph theory
    within mathematics.
  id: totrans-26
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “在计算机科学中，图是一种抽象数据类型，旨在在数学的图论领域中实现无向图和有向图的概念。
- en: ''
  id: totrans-27
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: A graph data structure consists of a finite (and possibly mutable) set of vertices
    (also called nodes or points), together with a set of unordered pairs of these
    vertices for an undirected graph or a set of ordered pairs for a directed graph.
    These pairs are known as edges (also called links or lines), and for a directed
    graph are also known as edges but also sometimes arrows or arcs.” — [Wikipedia](https://en.wikipedia.org/wiki/Graph_(abstract_data_type))
  id: totrans-28
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 图数据结构由有限（可能可变）的顶点集（也称为节点或点）组成，以及一组无序的顶点对，用于无向图，或有序对，用于有向图。这些对被称为边（也称为链接或线），在有向图中也称为边，但有时也称为箭头或弧。“——[维基百科](https://en.wikipedia.org/wiki/Graph_(abstract_data_type))
- en: '![Government Funding Graph (Image By Author)](../Images/0c135fd7d2138a3848bbe1273a9a50c2.png)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
  zh: '![政府资助图（作者图片）](../Images/0c135fd7d2138a3848bbe1273a9a50c2.png)'
- en: Government Funding Graph (Image By Author)
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 政府资助图（作者图片）
- en: What is NetworkX?
  id: totrans-31
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 什么是 NetworkX？
- en: NetworkX is a useful library in this project to construct and store our graph.
    Specifically, a digraph though the library supports many graph variants such as
    multigraphs, the library also supports graph-related utility functions.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: NetworkX 是本项目中的一个有用库，用于构建和存储我们的图。具体来说，虽然库支持许多图变体，如多重图，但库也支持与图相关的实用函数。
- en: “NetworkX is a Python package for the creation, manipulation, and study of the
    structure, dynamics, and functions of complex networks.” — [NetworkX Website](https://networkx.org/)
  id: totrans-33
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “NetworkX 是一个用于创建、操作和研究复杂网络的结构、动态和功能的 Python 包”——[NetworkX 网站](https://networkx.org/)
- en: What is PyVis?
  id: totrans-34
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 什么是 PyVis？
- en: We use the PyVis Python package to create dynamic network views for our graph,
    screenshots of these can be found throughout the article.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用 PyVis Python 包来创建我们图的动态网络视图，这些截图可以在文章的各个部分找到。
- en: “The pyvis library is meant for quick generation of visual network graphs with
    minimal python code. It is designed as a wrapper around the popular Javascript
    visJS library” —[ PyVis Docs](https://pyvis.readthedocs.io/en/latest/tutorial.html)
  id: totrans-36
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “pyvis 库旨在通过最少的 Python 代码快速生成可视网络图。它被设计为一个围绕流行的 Javascript visJS 库的包装器”——[PyVis
    文档](https://pyvis.readthedocs.io/en/latest/tutorial.html)
- en: What is LlamaIndex?
  id: totrans-37
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 什么是 LlamaIndex？
- en: LlamaIndex is a popular library for LLM applications, including support for
    agentic workflows, we use it to perform the graph RAG component of this project.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: LlamaIndex 是一个流行的 LLM 应用库，包括对代理工作流程的支持，我们用它来执行本项目中的图 RAG 组件。
- en: “LlamaIndex (GPT Index) is a data framework for your LLM application. Building
    with LlamaIndex typically involves working with LlamaIndex core and a chosen set
    of integrations (or plugins).” — [LlamaIndex Github](https://github.com/run-llama/llama_index)
  id: totrans-39
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “LlamaIndex（GPT Index）是 LLM 应用的数据框架。使用 LlamaIndex 通常涉及与 LlamaIndex 核心和所选集成（或插件）一起工作。”——[LlamaIndex
    Github](https://github.com/run-llama/llama_index)
- en: What is Graph RAG?
  id: totrans-40
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 什么是图 RAG？
- en: '![Graph RAG at a high level (Image By Author)](../Images/ddd859b28b28349844f96fc2b4baed69.png)'
  id: totrans-41
  prefs: []
  type: TYPE_IMG
  zh: '![图 RAG 高级视图（作者图片）](../Images/ddd859b28b28349844f96fc2b4baed69.png)'
- en: Graph RAG at a high level (Image By Author)
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 图 RAG 高级视图（作者图片）
- en: Retrieval-augmented generation, or RAG as it is commonly known, is an AI framework
    for which additional context from an external knowledge base is used to ground
    LLM answers. Graph RAG, by extension, pertains to the use of a Graph to provide
    this additional context.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 检索增强生成，或简称 RAG，是一个 AI 框架，它使用来自外部知识库的额外上下文来使 LLM 答案具体化。通过扩展，图 RAG 涉及到使用图来提供这种额外上下文。
- en: “GraphRAG is a powerful retrieval mechanism that improves GenAI applications
    by taking advantage of the rich context in graph data structures… Basic RAG systems
    rely solely on semantic search in vector databases to retrieve and rank sets of
    isolated text fragments. While this approach can surface some relevant information,
    it fails to capture the context connecting these pieces. For this reason, basic
    RAG systems are ill-equipped to answer complex, multi-hop questions. This is where
    GraphRAG comes in. It uses knowledge graphs to represent and connect information
    to capture not only more data points but also their relationships. Thus, graph-based
    retrievers can provide more accurate and relevant results by uncovering hidden
    connections that aren’t often obvious but are crucial for correlating information.”
    — [Neo4j Website](https://neo4j.com/blog/genai/what-is-graphrag/)
  id: totrans-44
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “GraphRAG是一个强大的检索机制，通过利用图数据结构中的丰富上下文来改进GenAI应用……基本的RAG系统完全依赖于向量数据库中的语义搜索来检索和排名孤立文本片段的集合。虽然这种方法可以揭示一些相关信息，但它无法捕捉连接这些片段的上下文。因此，基本的RAG系统在回答复杂的多跳问题时准备不足。这正是GraphRAG发挥作用的地方。它使用知识图来表示和连接信息，不仅捕获更多的数据点，还捕获它们之间的关系。因此，基于图的检索器可以通过揭示通常不明显但对于关联信息至关重要的隐藏连接，提供更准确和相关的结果。”
    — [Neo4j网站](https://neo4j.com/blog/genai/what-is-graphrag/)
- en: What is Streamlit?
  id: totrans-45
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 什么是Streamlit？
- en: Streamlit is a lightweight Python web framework we will use to create the web
    application for this project.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: Streamlit是我们将用于创建此项目网络应用的轻量级Python网络框架。
- en: “Streamlit is an open-source Python framework for data scientists and AI/ML
    engineers to deliver dynamic data apps with only a few lines of code. Build and
    deploy powerful data apps in minutes.” — [Streamlit website](https://docs.streamlit.io/)
  id: totrans-47
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “Streamlit是一个开源的Python框架，数据科学家和AI/ML工程师可以使用它仅用几行代码来交付动态数据应用。在几分钟内构建和部署强大的数据应用。”
    — [Streamlit网站](https://docs.streamlit.io/)
- en: 2\. UKRI API
  id: totrans-48
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2. UKRI API
- en: The UKRI API is a service that facilitates access to the public UKRI grant funding
    dataset, authentication is not required and the docs can be found [here](https://gtr.ukri.org/resources/api.html).
    I use only two endpoints for our application, they are the [Search projects endpoint](https://gtr.ukri.org/resources/gtrapi-search-api.html) and
    the [Projects endpoint](https://gtr.ukri.org/resources/gtrapi-project-api.html#get-project).
    This allows a user to search for projects based on a keyword search and retrieve
    all project-specific information.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: UKRI API是一个便于访问公共UKRI资助数据集的服务，无需认证，文档可以在[这里](https://gtr.ukri.org/resources/api.html)找到。我只为我们的应用程序使用两个端点，它们是[搜索项目端点](https://gtr.ukri.org/resources/gtrapi-search-api.html)和[项目端点](https://gtr.ukri.org/resources/gtrapi-project-api.html#get-project)。这允许用户根据关键词搜索来查找项目，并检索所有项目特定信息。
- en: A search term, page size and page number are provided as query string parameters.
    The query string parameters;
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 搜索词、页面大小和页面号作为查询字符串参数提供。查询字符串参数；
- en: '*`selectedSortableField=pro.am&selectedSortOrder=DESC`*'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: '*`selectedSortableField=pro.am&selectedSortOrder=DESC`*'
- en: Ensure that the results are returned by funded value descending.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 确保结果按资助金额降序返回。
- en: I have also included the code I used for asynchronous pagination.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 我还包含了用于异步分页的代码。
- en: '[PRE0]'
  id: totrans-54
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: The following function is used to get project-specific data using the unique
    UKRI project reference. The project reference is derived from the aforementioned
    project search results.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 以下函数用于使用独特的UKRI项目参考获取项目特定数据。项目参考是从上述项目搜索结果中派生的。
- en: '[PRE1]'
  id: totrans-56
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Similarly, we parse out the relevant data for the construction of the graph
    and remove superfluous information.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，我们解析出构建图所需的相关数据，并删除冗余信息。
- en: '[PRE2]'
  id: totrans-58
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 3\. Construct NetworkX Graph
  id: totrans-59
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3. 构建NetworkX图
- en: There are different types of graphs, and I elected for a directed graph where
    the direction of the edges are important. More formally;
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 有不同类型的图，我选择了有向图，其中边的方向很重要。更正式地说；
- en: “A DiGraph stores nodes and edges with optional data, or attributes. DiGraphs
    hold directed edges. Self loops are allowed but multiple (parallel) edges are
    not.” — [NetworkX Website](https://networkx.org/documentation/stable/reference/classes/digraph.html)
  id: totrans-61
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “DiGraph存储具有可选数据或属性的节点和边。DiGraph包含有向边。自环是允许的，但多边（并行）边是不允许的。” — [NetworkX网站](https://networkx.org/documentation/stable/reference/classes/digraph.html)
- en: To construct the NetworkX graph, we must add nodes and edges — including the
    sequential updating of node attributes.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 要构建NetworkX图，我们必须添加节点和边——包括节点属性的顺序更新。
- en: The standard attributes, compatible with PyVis graph rendering for nodes are
    as follows;
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 与PyVis图渲染兼容的标准属性如下；
- en: Title (The label that appears on hover over)
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 标题（悬停时出现的标签）
- en: Group (The colour coding)
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 组（颜色编码）
- en: Size (How large the nodes appear in the graph)
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 大小（节点在图中的显示大小）
- en: We also use the custom attribute “funding”, which we will use to sum all of
    the funding for research and funding organizations. This will be normalized to
    set the node size according to the percentage of total funding for a particular
    group.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还使用自定义属性“funding”，我们将用它来汇总所有的研究和资助组织的资金。这将根据特定组的总资金百分比来规范化节点大小。
- en: 'For our graph, we have nodes from four groups. They are classified as: `funder_name`,
    `lead_research_organisation`, `project_title` and `person_name`.'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我们的图，我们有来自四个组的节点。它们被分类为：`funder_name`、`lead_research_organisation`、`project_title`和`person_name`。
- en: HTML links can be used in the node title to allow the user to easily click through
    to a URL. I have included a helper function to do this below. There are project,
    people, and research organisation-specific links that, if redirected to provide
    additional information to the user.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 可以在节点标题中使用HTML链接，以便用户可以轻松点击通过到URL。我下面包括了一个辅助函数来做这件事。有项目、人员和研究组织特定的链接，如果重定向将向用户提供更多信息。
- en: '![Government Funding Graph (Image By Author)](../Images/5b085bcc52b79225b787ddc43b431235.png)'
  id: totrans-70
  prefs: []
  type: TYPE_IMG
  zh: '![政府资助图（作者图片）](../Images/5b085bcc52b79225b787ddc43b431235.png)'
- en: Government Funding Graph (Image By Author)
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 政府资助图（作者图片）
- en: The code to construct the NetworkX graph can be seen below. The DiGraph class
    has methods to check if a graph already has a node and similarly for edges. There
    are also methods for adding nodes and edges. As we iterate through projects, we
    want to sum the total funding amount for the funding organization and lead research
    institution. There are methods to both get an attribute from a node in the graph
    and set an attribute on a node. Depending on the source and destination node,
    we also apply different titles and labels to reflect that specific predicate.
    These can be seen in the code below.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 构建NetworkX图的代码如下。DiGraph类有检查图是否已经有一个节点的方法，同样也有检查边的方法。还有添加节点和边的方法。当我们遍历项目时，我们想要汇总资助组织和主导研究机构的总资金。有从图中节点获取属性和在节点上设置属性的方法。根据源节点和目标节点，我们还应用不同的标题和标签来反映特定的谓词。这些可以在下面的代码中看到。
- en: '[PRE3]'
  id: totrans-73
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Once the graph has been constructed and as previously described, I wanted to
    normalize the node sizes depending on the percentage of the total amount of funding
    for particular groups. I also append the total funding, both as a summation and
    as a percentage to the node label so it can be more easily viewed by a user.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦构建了图，如前所述，我想根据特定组的总资金百分比来规范化节点大小。我还将总资金，无论是作为总和还是作为百分比，附加到节点标签上，以便用户更容易查看。
- en: The scale factor is just a multiple applied for aesthetic reasons, such that
    the node sizes appear relative to the other node groups present.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 缩放因子只是一个应用于美观目的的倍数，使得节点大小相对于其他节点组呈现相对大小。
- en: '[PRE4]'
  id: totrans-76
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 4\. Filter a NetworkX Graph
  id: totrans-77
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4. 过滤NetworkX图
- en: '![Government Funding Graph UI (Image By Author)](../Images/084b8445f7f5953acdd5c7d0a11c027e.png)'
  id: totrans-78
  prefs: []
  type: TYPE_IMG
  zh: '![政府资助图UI（作者图片）](../Images/084b8445f7f5953acdd5c7d0a11c027e.png)'
- en: Government Funding Graph UI (Image By Author)
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 政府资助图UI（作者图片）
- en: I allow the user to filter nodes via the UI to create a subgraph. The form to
    do this in Streamlit is below. I also find the neighbors of neighbors for the
    filtered nodes. I had some issues with Pylint raising unnecessary comprehension
    errors from the generator, which I have disabled — more on Pylint later in the
    article. A smaller graph will take less time to render and will ensure that irrelevant
    context will be excluded.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 我允许用户通过UI过滤节点以创建子图。在Streamlit中执行此操作的表单如下。我还找到了过滤节点的邻居。我遇到了一些问题，Pylint从生成器中引发了不必要的理解错误，我已经禁用了它——在文章的后面部分将详细介绍Pylint。较小的图将需要较少的时间来渲染，并确保排除无关的上下文。
- en: '[PRE5]'
  id: totrans-81
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: NetworkX makes it easy to create a subgraph from a list of nodes with the [subgraph_view](https://networkx.org/documentation/stable/reference/classes/generated/networkx.classes.graphviews.subgraph_view.html)
    function, which takes a callable as a parameter. The callable takes a graph node
    as a parameter and if the boolean True value is returned, the node would be included
    in the subgraph.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: NetworkX通过[subgraph_view](https://networkx.org/documentation/stable/reference/classes/generated/networkx.classes.graphviews.subgraph_view.html)函数使从节点列表创建子图变得容易，该函数接受一个可调用的参数。可调用函数接受一个图节点作为参数，如果返回布尔值True，则该节点将被包含在子图中。
- en: '[PRE6]'
  id: totrans-83
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 5\. Graph Visualisation Using PyVis
  id: totrans-84
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 5. 使用PyVis进行图可视化
- en: To produce the visualizations I have presented earlier in the article, we must
    first convert the NetworkX graph to a PyVis network and then render the HTML file
    within the Streamlit UI.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 为了生成文章中前面提到的可视化，我们必须首先将NetworkX图转换为PyVis网络，然后在Streamlit UI中渲染HTML文件。
- en: If you are unfamiliar with [Streamlit](https://docs.streamlit.io/), you can
    see one of my other articles that explore the topic [here](https://towardsdatascience.com/custom-ai-jira-agent-google-mesop-django-langchain-agent-co-star-chain-of-thought-cot-and-fb903468bff6/).
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你不太熟悉[Streamlit](https://docs.streamlit.io/)，你可以查看我其他关于这个主题的文章，[这里](https://towardsdatascience.com/custom-ai-jira-agent-google-mesop-django-langchain-agent-co-star-chain-of-thought-cot-and-fb903468bff6/)有介绍。
- en: Converting a NetworkX graph to PyVis format is relatively trivial and can be
    achieved with the code below. The Network class is the main class for visualization
    functionality, first we instantiate the class and in this example, the graph is
    directed. The `barnes_hut` method is then called, which is a gravity model. The
    `from_nx` method takes an existing NetworkX graph as an argument and translates
    it to PyVis, which is called in place.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 将NetworkX图转换为PyVis格式相对简单，以下代码可以实现。Network类是可视化功能的主要类，首先我们实例化这个类，在这个例子中，图是定向的。然后调用`barnes_hut`方法，这是一个重力模型。`from_nx`方法接受一个现有的NetworkX图作为参数，并将其转换为PyVis，这是在原地调用的。
- en: '[PRE7]'
  id: totrans-88
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: To render the Graph to the UI, we first create a unique user ID as we use the
    PyVis [save_graph](https://pyvis.readthedocs.io/en/latest/documentation.html)
    method to save the HTML file for the graph on the server. The [uuid](https://docs.python.org/3/library/uuid.html)
    ensures a unique file name, which is then read into the streamlit UI and after
    the file is deleted.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 要将图渲染到UI上，我们首先创建一个唯一的用户ID，因为我们使用PyVis的[save_graph](https://pyvis.readthedocs.io/en/latest/documentation.html)方法在服务器上保存图的HTML文件。`uuid`确保了文件名的唯一性，然后这个文件被读入streamlit
    UI中，文件删除后。
- en: '[PRE8]'
  id: totrans-90
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 6\. Graph RAG Using LlamaIndex
  id: totrans-91
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 6. 使用LlamaIndex进行图RAG
- en: '![Government Funding Graph RAG (Image By Author)](../Images/6bc63973a0e67b65c6fee69264903745.png)'
  id: totrans-92
  prefs: []
  type: TYPE_IMG
  zh: '![政府资助图RAG（图片由作者提供）](../Images/6bc63973a0e67b65c6fee69264903745.png)'
- en: Government Funding Graph RAG (Image By Author)
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 政府资助图RAG（图片由作者提供）
- en: Through graph retrieval-augmented generation, we can query our graph data directly,
    an example can be seen in the prior screenshot. Extracted entities from the user
    query are looked up in the graph to give specific context to the AI to ground
    its response, as this information would likely not have been in the training corpus,
    and hence any answer given would have had an increased likelihood of being a hallucination.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 通过图检索增强生成，我们可以直接查询我们的图数据，一个例子可以在之前的屏幕截图中看到。从用户查询中提取的实体在图中查找，为AI提供特定的上下文，以便其定位响应，因为这个信息可能不会在训练语料库中，因此任何给出的答案都有更高的可能性是幻觉。
- en: We create a chat engine to pass a user’s previous query history into the model.
    Usually, the Open AI API key is read as an environment variable within LlamaIndex — however,
    since this is user-submitted for our application and we don’t want to save users’
    Open AI credentials, we need to pass credentials to the LLM and embedding model
    classes as keyword arguments.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 我们创建一个聊天引擎，将用户的先前查询历史传递给模型。通常，Open AI API密钥在LlamaIndex中作为环境变量读取——然而，由于这是用户提交给我们的应用程序，我们不希望保存用户的Open
    AI凭据，因此我们需要将凭据作为关键字参数传递给LLM和嵌入模型类。
- en: We then create an empty LlamaIndex Knowledge Graph Index and populate the knowledge
    graph by inserting [triple](https://www.oxfordsemantic.tech/faqs/what-is-a-triple)s.
    The triples come from traversing the edges of our NetworkX graph and calling the
    `upsert_triplet_and_node` method, which will create the triple and node if they
    don’t already exist.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们创建一个空的LlamaIndex知识图谱索引，并通过插入[三元组](https://www.oxfordsemantic.tech/faqs/what-is-a-triple)来填充知识图谱。这些三元组来自遍历我们的NetworkX图的边并调用`upsert_triplet_and_node`方法，如果它们还不存在，该方法将创建三元组和节点。
- en: Since the graph is directed, we can interchange the subjects and objects so
    that the graph is traversable in either direction. The chat engine uses the tree_summarize
    option for the response builder.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 由于图是定向的，我们可以交换主语和宾语，使得图可以双向遍历。聊天引擎使用响应构建器的tree_summarize选项。
- en: '“Tree summarize response builder. This response builder recursively merges
    text chunks and summarizes them in a bottom-up fashion (i.e. building a tree from
    leaves to root). More concretely, at each recursively step: 1\. we repack the
    text chunks so that each chunk fills the context window of the LLM 2\. if there
    is only one chunk, we give the final response 3\. otherwise, we summarize each
    chunk and recursively summarize the summaries.”— [LlamaIndex Website](https://docs.llamaindex.ai/en/stable/api_reference/response_synthesizers/tree_summarize/)'
  id: totrans-98
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “树形总结响应构建器。此响应构建器递归地合并文本块并以自下而上的方式总结它们（即从叶子到根构建树）。更具体地说，在每一步递归中：1. 我们重新打包文本块，以便每个块填充LLM的上下文窗口
    2. 如果只有一个块，我们给出最终响应 3. 否则，我们总结每个块并递归地总结总结。” — [LlamaIndex网站](https://docs.llamaindex.ai/en/stable/api_reference/response_synthesizers/tree_summarize/)
- en: Calling the chat method with the user’s query and constructing the chat history
    from the Streamlit state object is included here.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 调用聊天方法并从Streamlit状态对象中构建聊天历史包括在此处。
- en: '[PRE9]'
  id: totrans-100
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Similarly, I initially explored a [LangChain](https://www.langchain.com/) implementation,
    though during some experimentation, I decided to continue wth the LlamaIndex-based
    approach previously demonstrated. For reference, I have included this below if
    it is useful to you.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，我最初探索了[LangChain](https://www.langchain.com/)的实现，尽管在实验过程中，我决定继续使用之前展示的基于LlamaIndex的方法。为了参考，如果对你有用，我将其包含在下面。
- en: In the interest of brevity, the explanation is omitted, though it should be
    self-explanatory for the reader.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 为了简洁起见，解释被省略了，尽管对于读者来说应该是显而易见的。
- en: '[PRE10]'
  id: totrans-103
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: 7\. Linting With Pylint
  id: totrans-104
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 7. 使用Pylint进行代码检查
- en: '![](../Images/e8a6309cefacea9286ae32820b3f186b.png)'
  id: totrans-105
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/e8a6309cefacea9286ae32820b3f186b.png)'
- en: Government Funding Graph (Image By Author)
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 政府资助图（作者提供）
- en: Since I have left some comments in the code to disable the linter in the examples
    above (examples are referenced from the GitHub repo), I thought I’d cover the
    topic of linting briefly.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我在上述示例（示例来自GitHub仓库）中留下了一些注释来禁用代码检查器，我想简要地介绍一下代码检查的主题。
- en: For those unfamiliar, linting helps to check your code for potential bugs and
    stylistic issues. Linters automatically enforce coding standards.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 对于不熟悉的人来说，代码检查有助于检查你的代码中可能存在的错误和风格问题。代码检查器自动强制执行编码标准。
- en: To get started, install [Pylint](https://github.com/pylint-dev/pylint) by running
    the command.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 要开始，通过运行命令安装[Pylint](https://github.com/pylint-dev/pylint)。
- en: '[PRE11]'
  id: totrans-110
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: Secondly, we need to create a .pylintrc file at the root of the project (we
    can also set default global and user-specific settings depending on where we create
    the .pylintrc file). To do this, you will need to run.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 其次，我们需要在项目的根目录下创建一个.pylintrc文件（我们也可以根据我们在哪里创建.pylintrc文件来设置默认的全局和用户特定设置）。为此，你需要运行。
- en: '[PRE12]'
  id: totrans-112
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: We can configure this file to fit our preferences by updating the default values
    within the .pylintrc file.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以通过更新.pylintrc文件中的默认值来配置此文件以适应我们的偏好。
- en: To run the linter manually, you can use.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 要手动运行代码检查器，你可以使用。
- en: '[PRE13]'
  id: totrans-115
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: When the [Docker](https://www.docker.com/) image is built, it will automatically
    run Pylint and raise an error should it detect an issue with the code. This can
    be seen in the Dockerfile.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 当[Docker](https://www.docker.com/)镜像构建时，它将自动运行Pylint，并在检测到代码问题时引发错误。这可以在Dockerfile中看到。
- en: '[PRE14]'
  id: totrans-117
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: A popular formatter that you might also find useful is [Black ](https://github.com/psf/black)—
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 一个你可能也会觉得有用的流行格式化工具是[Black](https://github.com/psf/black)——
- en: “*Black* is a [PEP 8](https://peps.python.org/pep-0008/) compliant opinionated
    formatter. *Black* reformats entire files in place.”
  id: totrans-119
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “*Black*是一个符合[PEP 8](https://peps.python.org/pep-0008/)的偏执格式化工具。*Black*会就地重新格式化整个文件。”
- en: Running Black will automatically resolve some of the issues that would be raised
    by the linter.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 运行 Black 将自动解决一些由代码检查器引发的问题。
