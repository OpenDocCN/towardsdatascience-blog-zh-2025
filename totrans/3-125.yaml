- en: 'Agentic AI: Single vs Multi-Agent Systems'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 智能体AI：单智能体与多智能体系统
- en: 原文：[https://towardsdatascience.com/agentic-ai-single-vs-multi-agent-systems/](https://towardsdatascience.com/agentic-ai-single-vs-multi-agent-systems/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/agentic-ai-single-vs-multi-agent-systems/](https://towardsdatascience.com/agentic-ai-single-vs-multi-agent-systems/)
- en: We’ve seen this shift the last few years from building rigid programming systems
    to natural language-driven workflows, all made possible with more advanced large
    language models.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在过去几年中看到了这种转变，从构建僵化的编程系统到自然语言驱动的流程，这一切都得益于更高级的大型语言模型。
- en: One of the interesting areas into these agentic AI systems is the difference
    between building a single versus multi-agent workflow, or perhaps the difference
    between working with more flexible vs controlled systems.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在这些智能体AI系统中，有趣的一个领域是构建单智能体与多智能体工作流程之间的差异，或者说是与更灵活的系统相比，与更受控的系统工作的差异。
- en: This article will help you understand what agentic AI is, how to build simple
    workflows with LangGraph, and the differences in results you can achieve with
    the different architectures. I’ll demonstrate this by building a tech news agent
    with various data sources.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 本文将帮助您了解什么是智能体AI，如何使用LangGraph构建简单的流程，以及不同架构可以实现的不同结果。我将通过构建具有各种数据源的技术新闻智能体来演示这一点。
- en: As for the use case, I’m a bit obsessed with getting automatic news updates,
    based on my preferences, without me drowning in information overload every day.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 至于用例，我对根据我的偏好获取自动新闻更新非常着迷，这样我每天就不会被信息过载淹没。
- en: '![](../Images/634b01e0e6b14fab819ddff41cfda5db.png)'
  id: totrans-6
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/634b01e0e6b14fab819ddff41cfda5db.png)'
- en: Having AI summarize for us instead of scouting info on our own | Image by author
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 让人工智能为我们总结信息，而不是我们自己搜集信息 | 图片由作者提供
- en: Working with summarizing and gathering research is one of those areas that agentic
    AI can really shine.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 与总结和收集研究一起工作，是智能体AI可以真正大放异彩的领域之一。
- en: So follow along while I keep trying to make AI do the grunt work for me, and
    we’ll see how single-agent compares to multi-agent setups.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 所以请跟我一起，看看我如何尝试让AI为我做基础工作，我们将比较单智能体与多智能体设置之间的差异。
- en: '*I always keep my work jargon-free, so if you’re new to agentic AI, this piece
    should help you understand what it is and how to work with it. If you’re not new
    to it, you can scroll past some of the sections.*'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: '*我总是保持我的工作术语无障碍，所以如果你对智能体AI是新手，这篇文章应该能帮助你了解它是什么以及如何与之合作。如果你不是新手，你可以跳过一些部分。*'
- en: Agentic AI (& LLMs)
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 智能体AI（& LLMs）
- en: Agentic AI is about programming with natural language. Instead of using rigid,
    explicit code, you’re instructing large language models (LLMs) to route data and
    perform actions through plain language in automating tasks.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 智能体AI是关于用自然语言编程。你不再使用僵化的、明确的代码，而是指导大型语言模型（LLMs）通过普通语言路由数据和执行操作，以自动化任务。
- en: Using natural language in workflows isn’t new, we’ve used NLP for years to extract
    and process data. What’s new is the amount of freedom we can now give language
    models, allowing them to handle ambiguity and make decisions dynamically.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 在工作流程中使用自然语言并不新鲜，我们多年来一直使用NLP来提取和处理数据。新的地方在于我们现在可以给予语言模型多少自由，允许它们处理歧义并动态做出决策。
- en: '![](../Images/ddb08f1d953c287cca2b81c176493f7a.png)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ddb08f1d953c287cca2b81c176493f7a.png)'
- en: Traditional automation from programmatic to NLP to LLMs | Image by author
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 从程序自动化到NLP再到LLMs的传统自动化 | 图片由作者提供
- en: But just because LLMs can understand nuanced language doesn’t mean they inherently
    validate facts or maintain data integrity. I see them primarily as a communication
    layer that sits on top of structured systems and existing data sources.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 但仅仅因为LLMs能够理解细微的语言，并不意味着它们天生就验证事实或保持数据完整性。我认为它们主要是位于结构化系统及其现有数据源之上的一个通信层。
- en: '![](../Images/cc22bb72fe5e1a5597090c6acd4367ae.png)'
  id: totrans-17
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/cc22bb72fe5e1a5597090c6acd4367ae.png)'
- en: LLMs is a communication layer and not the system itself | Image by author
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: LLMs是一个通信层，而不是系统本身 | 图片由作者提供
- en: 'I usually explain it like this to non-technical people: they work a bit like
    we do. If we don’t have access to clean, structured data, we start making things
    up. Same with LLMs. They generate responses based on patterns, not truth-checking.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 我通常这样向非技术人员解释：它们的工作方式有点像我们。如果我们无法访问干净、结构化的数据，我们就会开始编造东西。LLMs也是如此。它们根据模式生成响应，而不是进行事实核查。
- en: So just like us, they do their best with what they’ve got. If we want better
    output, we need to build systems that give them reliable data to work with. So,
    with Agentic systems we integrate ways for them to interact with different data
    sources, tools and systems.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，就像我们一样，他们尽其所能。如果我们想要更好的输出，我们需要构建能够提供可靠数据的系统。因此，在代理系统中，我们整合了它们与不同数据源、工具和系统交互的方式。
- en: Now, just because we *can* use these larger models in more places, doesn’t mean
    we *should*. LLMs shine when interpreting nuanced natural language, think customer
    service, research, or human-in-the-loop collaboration.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，仅仅因为我们*可以*在更多地方使用这些更大的模型，并不意味着我们*应该*这样做。LLMs在解释细微的自然语言方面表现出色，例如客户服务、研究或人机协作。
- en: But for structured tasks — like extracting numbers and sending them somewhere
    — you need to use traditional approaches. LLMs aren’t inherently better at math
    than a calculator. So, instead of having an LLM do calculations, you give an LLM
    access to a calculator.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 但对于结构化任务——比如提取数字并将它们发送到某个地方——你需要使用传统方法。LLMs在数学上并不比计算器更擅长。因此，与其让LLM进行计算，不如给LLM访问计算器的权限。
- en: So whenever you *can* build parts of a workflow programmatically, that will
    still be the better option.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，无论何时你*可以*通过编程方式构建工作流程的一部分，这仍然是一个更好的选择。
- en: Nevertheless, LLMs are great at adapting to messy real-world input and interpreting
    vague instructions so combining the two can be a great way to build systems.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管如此，LLMs在适应混乱的现实世界输入和解释模糊指令方面非常出色，因此将两者结合起来可以是一种构建系统的绝佳方式。
- en: Agentic Frameworks
  id: totrans-25
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 代理框架
- en: I know a lot of people jump straight to CrewAI or AutoGen here, but I’d recommend
    checking out [LangGraph](https://www.langchain.com/langgraph), [Agno](https://github.com/agno-agi/agno),
    [Mastra](https://github.com/mastra-ai/mastra), and [Smolagents](https://github.com/huggingface/smolagents).
    Based on my research, these frameworks have received some of the strongest feedback
    so far.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 我知道很多人会直接跳到CrewAI或AutoGen，但我建议检查[LangGraph](https://www.langchain.com/langgraph)、[Agno](https://github.com/agno-agi/agno)、[Mastra](https://github.com/mastra-ai/mastra)和[Smolagents](https://github.com/huggingface/smolagents)。根据我的研究，这些框架迄今为止收到了一些最强烈的反馈。
- en: '![](../Images/e3c7d0e6e691da7681e0744fd400402c.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/e3c7d0e6e691da7681e0744fd400402c.png)'
- en: I collect resources in a Github repo [here](https://github.com/ilsilfverskiold/Awesome-LLM-Resources-List/tree/main?tab=readme-ov-file#top-agentic-frameworks)
    with the most popular frameworks | Image by author
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 我在GitHub仓库[这里](https://github.com/ilsilfverskiold/Awesome-LLM-Resources-List/tree/main?tab=readme-ov-file#top-agentic-frameworks)收集了最受欢迎的框架资源
    | 图片由作者提供
- en: LangGraph is more technical and can be complex, but it’s the preferred choice
    for many developers. Agno is easier to get started with but less technical. Mastra
    is a solid option for JavaScript developers, and Smolagents shows a lot of promise
    as a lightweight alternative.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: LangGraph更技术化且可能比较复杂，但它是许多开发者的首选选择。Agno更容易上手但技术性较低。Mastra是JavaScript开发者的一个稳健选择，而Smolagents作为一个轻量级替代品显示出很大的潜力。
- en: In this case, I’ve gone with LangGraph — built on top of LangChain — not because
    it’s my favorite, but because it’s becoming a go-to framework that more devs are
    adopting.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个案例中，我选择了LangGraph——建立在LangChain之上——并不是因为它是我最喜欢的，而是因为它正成为更多开发者采用的常用框架。
- en: So, it’s worth being familiar with.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，熟悉它是值得的。
- en: It has a lot of abstractions though, where you may want to rebuild some of it
    just to be able to control and understand it better.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然它有很多抽象，你可能需要重建其中一部分，以便更好地控制和理解它。
- en: I will not go into detail on LangGraph here, so I decided to build a quick [guide](https://howtouseai.substack.com/p/agentic-ai-frameworks-learning-langgraph)
    for those that need to get a review.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 我不会在这里详细讨论LangGraph，因此我决定为那些需要回顾的人快速构建一个[指南](https://howtouseai.substack.com/p/agentic-ai-frameworks-learning-langgraph)。
- en: As for this use case, you’ll be able to run the workflow without coding anything,
    but if you’re here to learn you may also want to understand how it works.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这个用例，你将能够运行工作流程而无需编写任何代码，但如果你在这里学习，你可能还想了解它是如何工作的。
- en: Choosing an LLM
  id: totrans-35
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 选择LLM
- en: Now, you might jump into this and wonder why I’m choosing certain LLMs as the
    base for the agents.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你可能会跳进来并想知道为什么我会选择某些LLM作为代理的基础。
- en: You can’t just pick any model, especially when working within a framework. They
    need to be compatible. Key things to look for are tool calling support and the
    ability to generate structured outputs.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 你不能随便选择任何模型，尤其是在框架内工作时。它们需要兼容。需要关注的关键事项包括工具调用支持和生成结构化输出的能力。
- en: I’d recommend checking HuggingFace’s Agent [Leaderboard](https://huggingface.co/spaces/galileo-ai/agent-leaderboard)
    to see which models actually perform well in real-world agentic systems.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 我建议查看HuggingFace的代理[排行榜](https://huggingface.co/spaces/galileo-ai/agent-leaderboard)，看看哪些模型在现实世界的代理系统中实际表现良好。
- en: For this workflow, you should be fine using models from Anthropic, OpenAI, or
    Google. If you’re considering another one, just make sure it’s compatible with
    LangChain.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这个工作流程，你应该可以使用Anthropic、OpenAI或Google的模型。如果你在考虑其他模型，请确保它与LangChain兼容。
- en: Single vs. Multi-Agent Systems
  id: totrans-40
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 单代理与多代理系统
- en: If you build a system around one LLM and give it a bunch of tools you want it
    to use, you’re working with a single-agent workflow. It’s fast, and if you’re
    new to agentic AI, it might seem like the model should just figure things out
    on its own.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你围绕一个LLM构建一个系统，并给它提供你希望它使用的工具，你就是在使用单代理工作流程。这很快速，如果你是初学者，可能会觉得模型应该自己解决问题。
- en: '![](../Images/b0d8d5fb08f6d983dd281d2e95a1f133.png)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/b0d8d5fb08f6d983dd281d2e95a1f133.png)'
- en: One agent has access to many tools | Image by author
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 一个代理可以访问许多工具 | 图片由作者提供
- en: But the thing is these workflows are just another form of system design. Like
    any software project, you need to plan the process, define the steps, structure
    the logic, and decide how each part should behave.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 但问题是这些工作流程只是系统设计的一种形式。就像任何软件项目一样，你需要规划流程，定义步骤，构建逻辑结构，并决定每个部分应该如何表现。
- en: '![](../Images/d603d6251723466a1a4c7f2d25a9083c.png)'
  id: totrans-45
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/d603d6251723466a1a4c7f2d25a9083c.png)'
- en: Think about how the logic should work for your use case | Image by author
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑一下你的用例中逻辑应该如何工作 | 图片由作者提供
- en: This is where multi-agent workflows come in.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是多代理工作流程的用武之地。
- en: Not all of them are hierarchical or linear though, some are collaborative. Collaborative
    workflows would then also fall into the more flexible approach that I find more
    difficult to work with, at least as it is now with the capabilities that exist.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然并非所有的工作流程都是层次结构或线性的，但有些是协作性的。协作工作流程因此也会落入我更难以与之合作的更灵活的方法中，至少就目前存在的功能而言。
- en: However, collaborative workflows do also break apart different functions into
    their own modules.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，协作工作流程也将不同的功能分解成各自的模块。
- en: Single-agent and collaborative workflows are great to start with when you’re
    just playing around, but they don’t always give you the precision needed for actual
    tasks.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 当你只是随意尝试时，单代理和协作工作流程是很好的起点，但它们并不总是能提供实际任务所需的精确度。
- en: For the workflow I will build here, I already know how the APIs should be used
    — so it’s my job to guide the system to use it the right way.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我将要构建的工作流程，我已经知道API应该如何使用——所以我的工作就是引导系统正确使用它。
- en: We’ll go through comparing a single-agent setup with a hierarchical multi-agent
    system, where a lead agent delegates tasks across a small team so you can see
    how they behave in practice.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将比较单代理设置与层次结构多代理系统，其中主要代理将任务委派给一个小团队，以便你可以看到它们在实际中的表现。
- en: Building a Single Agent Workflow
  id: totrans-53
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 构建单代理工作流程
- en: With a single thread — i.e., one agent — we give an LLM access to several tools.
    It’s up to the agent to decide which tool to use and when, based on the user’s
    question.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 使用单线程——即一个代理——我们给LLM提供访问几个工具的权限。根据用户的问题，由代理决定使用哪个工具以及何时使用。
- en: '![](../Images/8d6dceb3e726ba120d636c2ded5645d6.png)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/8d6dceb3e726ba120d636c2ded5645d6.png)'
- en: One LLM/Agent has access to many tool with many options | Image by author
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 一个LLM/代理可以访问许多带有许多选项的工具 | 图片由作者提供
- en: The challenge with a single agent is control.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 单代理的挑战在于控制。
- en: No matter how detailed the system prompt is, the model may not follow our requests
    (this can happen in more controlled environments too). If we give it too many
    tools or options, there’s a good chance it won’t use all of them or even use the
    right ones.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 无论系统提示多么详细，模型可能不会遵循我们的要求（这在更受控的环境中也可能发生）。如果我们给它太多工具或选项，它很可能不会使用所有工具，甚至可能不会使用正确的工具。
- en: To illustrate this, we’ll build a tech news agent that has access to several
    API endpoints with custom data with several options as parameters in the tools.
    It’s up to the agent to decide how many to use and how to setup the final summary.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 为了说明这一点，我们将构建一个技术新闻代理，它可以访问几个具有自定义数据的API端点，这些工具的参数有几个选项。由代理决定使用多少以及如何设置最终的摘要。
- en: '*Remember, I build these workflows using LangGraph. I won’t go into LangGraph
    in depth here, so if you want to learn the basics to be able to tweak the code,
    [go here](https://howtouseai.substack.com/p/agentic-ai-frameworks-learning-langgraph).*'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: '*记住，我使用LangGraph构建了这些工作流程。在这里，我不会深入介绍LangGraph，所以如果您想学习基础知识以便能够调整代码，[请点击这里](https://howtouseai.substack.com/p/agentic-ai-frameworks-learning-langgraph)。*'
- en: You can find the single-agent workflow [here](https://github.com/ilsilfverskiold/Awesome-LLM-Resources-List/tree/main/guides/langgraph/single-agent-workflow).
    To run it, you’ll need LangGraph Studio and the latest version of Docker installed.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以在[这里](https://github.com/ilsilfverskiold/Awesome-LLM-Resources-List/tree/main/guides/langgraph/single-agent-workflow)找到单代理工作流程。要运行它，您需要安装LangGraph
    Studio和最新版本的Docker。
- en: Once you’re set up, open the project folder on your computer, add your `GOOGLE_API_KEY`
    in a `.env` file, and save. You can get a key from Google [here.](https://aistudio.google.com/app/apikey)
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦设置好，打开您电脑上的项目文件夹，在`.env`文件中添加您的`GOOGLE_API_KEY`，并保存。您可以从[这里](https://aistudio.google.com/app/apikey)获取密钥。
- en: '*Gemini Flash 2.0 has a generous free tier, so running this shouldn’t cost
    anything (but you may run into errors if you use it too much).*'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: '*Gemini Flash 2.0有一个慷慨的免费层，所以运行这个不会花费任何费用（但如果你过度使用它，可能会遇到错误）。*'
- en: If you want to switch to another LLM or tools, you can tweak the code directly.
    But, again, remember the LLM needs to be compatible.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您想切换到另一个LLM或工具，可以直接调整代码。但再次提醒，LLM需要兼容。
- en: After setup, launch LangGraph Studio and select the correct folder.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 设置完成后，启动LangGraph Studio并选择正确的文件夹。
- en: This will boot up our workflow so we can test it.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 这将启动我们的工作流程，以便我们可以对其进行测试。
- en: '![](../Images/97c3a43805e6c42645bf96c5e8f18d87.png)'
  id: totrans-67
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/97c3a43805e6c42645bf96c5e8f18d87.png)'
- en: Opening LangGraph Studio | Image by author
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 打开LangGraph Studio | 图片由作者提供
- en: If you run into issues booting this up, double-check that you’re using the latest
    version of Docker.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您在启动时遇到问题，请确保您正在使用Docker的最新版本。
- en: Once it’s loaded, you can test the workflow by entering a human message and
    hitting submit.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 加载完成后，您可以通过输入人类消息并点击提交来测试工作流程。
- en: '![](../Images/0b1321efe74c203557c9b427318c53d1.png)'
  id: totrans-71
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0b1321efe74c203557c9b427318c53d1.png)'
- en: LangGraph Studio opening the single agent workflow | Image by author
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: LangGraph Studio打开单代理工作流程 | 图片由作者提供
- en: You can see me run the workflow below.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以看到我下面运行的工作流程。
- en: '![](../Images/2147ff368e33b0a04453f7afcee06213.png)'
  id: totrans-74
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/2147ff368e33b0a04453f7afcee06213.png)'
- en: LangGraph Studio running the single agent workflow | Image by author
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: LangGraph Studio运行单代理工作流程 | 图片由作者提供
- en: You can see the final response below.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以看到下面的最终响应。
- en: '![](../Images/8da207dab35b372b283cff987052e06d.png)'
  id: totrans-77
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/8da207dab35b372b283cff987052e06d.png)'
- en: LangGraph Studio finishing the single agent workflow | Image by author
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: LangGraph Studio完成单代理工作流程 | 图片由作者提供
- en: For this prompt it decided that it would check weekly trending keywords filtered
    by the category ‘companies’ only, and then it fetched the sources of those keywords
    and summarized for us.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这个提示，它决定只检查按“公司”类别过滤的每周趋势关键词，然后它获取这些关键词的来源，并为我们总结。
- en: It had some issues in giving us a unified summary, where it simply used the
    information it got last and failed to use all of the research.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 它在提供统一总结方面存在一些问题，它只是简单地使用了最后得到的信息，而没有使用所有的研究成果。
- en: In reality we want it to fetch both trending and top keywords within several
    categories (not just companies), check sources, track specific keywords, and reason
    and summarize it all nicely before returning a response.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 在现实中，我们希望它获取几个类别（不仅仅是公司）中的趋势和顶级关键词，检查来源，跟踪特定关键词，并在返回响应之前将所有这些内容合理地总结。
- en: We can of course probe it and keep asking it questions but as you can imagine
    if we need something more complex it would start to make shortcuts in the workflow.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 我们当然可以对其进行探测并不断提问，但正如您所想象的那样，如果我们需要更复杂的东西，它可能会在工作流程中开始走捷径。
- en: The key thing is, an agent system isn’t just gonna think the way we expect,
    we have to actually orchestrate it to do what we want.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 关键在于，代理系统不会仅仅按照我们的预期思考，我们必须实际编排它以完成我们想要的事情。
- en: So a single agent is great for something simple but as you can imagine it may
    not think or behave as we are expecting.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，单个代理非常适合简单的事情，但正如您所想象的那样，它可能不会像我们预期的那样思考和表现。
- en: This is why going for a more complex system where each agent is responsible
    for one thing can be really useful.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是为什么选择一个更复杂的系统，其中每个代理负责一件事，可能非常有用。
- en: Testing a Multi-Agent Workflow
  id: totrans-86
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 测试多代理工作流程
- en: Building multiagent workflows is a lot more difficult than building a single
    agent with access to some tools. To do this, you need to carefully think about
    the architecture beforehand and how data should flow between the agents.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 构建多智能体工作流程比构建具有工具访问权限的单个智能体要困难得多。为此，你需要事先仔细考虑架构以及数据如何在智能体之间流动。
- en: The multi-agent [workflow](https://github.com/ilsilfverskiold/Awesome-LLM-Resources-List/tree/main/guides/langgraph/tech_news_bot_multiagent)
    I’ll set up here uses two different teams — a research team and an editing team
    — with several agents under each.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 我在这里设置的多智能体[工作流程](https://github.com/ilsilfverskiold/Awesome-LLM-Resources-List/tree/main/guides/langgraph/tech_news_bot_multiagent)使用了两个不同的团队——一个研究团队和一个编辑团队，每个团队下都有几个智能体。
- en: Every agent has access to a specific set of tools.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 每个智能体都可以访问一组特定的工具。
- en: '![](../Images/5fbed6d685f19080d42fdeff49f589e6.png)'
  id: totrans-90
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/5fbed6d685f19080d42fdeff49f589e6.png)'
- en: The multiagent workflow logic with a hierarchical team | Image by author
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 多智能体工作流程逻辑与分层团队 | 图像由作者提供
- en: We’re introducing some new tools, like a research pad that acts as a shared
    space — one team writes their findings, the other reads from it. The last LLM
    will read everything that has been researched and edited to make a summary.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 我们引入了一些新工具，比如一个充当共享空间的研究便签，一个团队写下他们的发现，另一个从那里读取。最后一个LLM将阅读所有已研究和编辑的内容，以制作摘要。
- en: An alternative to using a research pad is to store data in a scratchpad in state,
    isolating short-term memory for each team or agent. But that also means thinking
    carefully about what each agent’s memory should include.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 使用研究便签的替代方案是将数据存储在状态中的便签中，为每个团队或智能体隔离短期记忆。但这也意味着需要仔细思考每个智能体的记忆应该包含什么。
- en: I also decided to build out the tools a bit more to provide richer data upfront,
    so the agents don’t have to fetch sources for each keyword individually. Here
    I’m using normal programmatic logic because I can.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 我还决定更详细地构建工具，以便提供更丰富的数据，这样智能体就不必为每个关键词单独获取来源。在这里，我使用正常的程序逻辑，因为我可以这么做。
- en: '*A key thing to remember: if you can use normal programming logic, do it.*'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: '*一个需要记住的关键点：如果你可以使用正常的编程逻辑，那就这么做。*'
- en: Since we’re using multiple agents, you can lower costs by using cheaper models
    for most agents and reserving the more expensive ones for the important stuff.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们使用多个智能体，你可以通过为大多数智能体使用更便宜的模型，并将更昂贵的模型保留用于重要任务来降低成本。
- en: Here, I’m using Gemini Flash 2.0 for all agents except the summarizer, which
    runs on OpenAI’s GPT-4o. If you want higher-quality summaries, you can use an
    even more advanced LLM with a larger context window.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我使用Gemini Flash 2.0为所有智能体，除了摘要器，它运行在OpenAI的GPT-4o上。如果你想获得更高质量的摘要，你可以使用具有更大上下文窗口的更先进的LLM。
- en: The workflow is set up for you [here](https://github.com/ilsilfverskiold/Awesome-LLM-Resources-List/tree/main/guides/langgraph/tech_news_bot_multiagent).
    Before loading it, make sure to add both your OpenAI and Google API keys in a
    `.env` file.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 工作流程已经为你设置好了[这里](https://github.com/ilsilfverskiold/Awesome-LLM-Resources-List/tree/main/guides/langgraph/tech_news_bot_multiagent)。在加载之前，请确保在`.env`文件中添加你的OpenAI和Google
    API密钥。
- en: In this workflow, the routes (edges) are setup dynamically instead of manually
    like we did with the single agent. It’ll look more complex if you peek into the
    code.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个工作流程中，路由（边）是动态设置的，而不是像我们处理单个智能体那样手动设置。如果你查看代码，它看起来会更复杂。
- en: Once you boot up the workflow in LangGraph Studio — same process as before —
    you’ll see the graph with all these nodes ready.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你在LangGraph Studio中启动工作流程——与之前相同的过程——你将看到所有这些节点都准备就绪的图。
- en: '![](../Images/b1f9cc0d2a154b48fdbb339791d6758f.png)'
  id: totrans-101
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b1f9cc0d2a154b48fdbb339791d6758f.png)'
- en: Opening the multiagent workflow in LangGraph Studio | Image by author
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 在LangGraph Studio中打开多智能体工作流程 | 图像由作者提供
- en: LangGraph Studio lets us visualize how the system delegates work between agents
    when we run it—just like we saw in the simpler workflow above.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: LangGraph Studio让我们在运行系统时可视化系统如何在智能体之间分配工作——就像我们在上面的简单工作流程中看到的那样。
- en: Since I understand the tools each agent is using, I can prompt the system in
    the right way. But regular users won’t know how to do this properly. So if you’re
    building something similar, I’d suggest introducing an agent that transforms the
    user’s query into something the other agents can actually work with.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我了解每个智能体使用的工具，我可以以正确的方式提示系统。但普通用户不知道如何正确地做这件事。所以如果你在构建类似的东西，我建议引入一个智能体，它将用户的查询转换成其他智能体可以实际处理的内容。
- en: We can test it out by setting a message.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以通过设置一条消息来测试它。
- en: '“I’m an investor and I’m interested in getting an update for what has happened
    within the week in tech, and what people are talking about (this means categories
    like companies, people, websites and subjects are interesting). Please also track
    these specific keywords: AI, Google, Microsoft, and Large Language Models”'
  id: totrans-106
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “我是一个投资者，我想要了解本周科技领域发生的事情的更新，以及人们都在谈论什么（这意味着公司、人物、网站和主题等类别是有趣的）。请也跟踪以下这些特定关键词：AI、Google、Microsoft和大型语言模型”
- en: Then choosing “supervisor” as the Next parameter (we’d normally do this programmatically).
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 然后选择“supervisor”作为下一个参数（我们通常会以编程方式执行此操作）。
- en: '![](../Images/c2193e3e5a5fc581944a8075829ca8a8.png)'
  id: totrans-108
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/c2193e3e5a5fc581944a8075829ca8a8.png)'
- en: Running the multiagent workflow in LangGraph Studio — it will take several minutes
    | Image by author
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 在LangGraph Studio中运行多代理工作流程——这将需要几分钟时间 | 图片由作者提供
- en: This workflow will take several minutes to run, unlike the single-agent workflow
    we ran earlier which finished in under a minute.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 与我们之前运行的单代理工作流程不同，这个工作流程将需要几分钟才能运行完成。
- en: '*So be patient while the tools are running.*'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: '*所以在工具运行时请耐心等待。*'
- en: In general, these systems take time to gather and process information and that’s
    just something we need to get used to.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，这些系统需要时间来收集和处理信息，这是我们必须要习惯的。
- en: 'The final summary will look something like this:'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 最终的总结看起来可能像这样：
- en: '![](../Images/34bbefc00c7415b4b02f2469a58e47b0.png)'
  id: totrans-114
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/34bbefc00c7415b4b02f2469a58e47b0.png)'
- en: The result from the multiagent workflow in LangGraph Studio | Image by author
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: LangGraph Studio中的多代理工作流程的结果 | 图片由作者提供
- en: You can read the whole thing [here](https://github.com/ilsilfverskiold/Awesome-LLM-Resources-List/blob/main/guides/langgraph/tech_news_bot_multiagent/example-summary.md)
    instead if you want to check it out.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想查看它，可以在这里阅读整个内容 [here](https://github.com/ilsilfverskiold/Awesome-LLM-Resources-List/blob/main/guides/langgraph/tech_news_bot_multiagent/example-summary.md)。
- en: '*The news will obviously vary depending on when you run the workflow.* *I ran
    it the 28th of March so the example report will be for this date.*'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: '*新闻显然会根据你运行工作流程的时间而有所不同。* *我是在3月28日运行的，所以示例报告将是这个日期的。*'
- en: It should save the summary to a text document, but if you’re running this inside
    a container, you likely won’t be able to access that file easily. It’s better
    to send the output somewhere else — like Google Docs or via email.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 它应该将总结保存到文本文档中，但如果你在容器内运行此操作，你很可能无法轻松访问该文件。最好将输出发送到其他地方——比如Google Docs或通过电子邮件。
- en: As for the results, I’ll let you decide for yourself the difference between
    using a more complex system versus a simple one, and how it gives us more control
    over the process.
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 至于结果，我会让你自己决定使用更复杂的系统与简单系统之间的差异，以及它如何让我们对过程有更多的控制。
- en: Finishing Notes
  id: totrans-120
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结束语
- en: I’m working with a good data source here. Without that, you’d need to add a
    lot more error handling, which would slow everything down even more.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 我在这里使用了一个好的数据源。没有它，你需要添加更多的错误处理，这将使一切变得更加缓慢。
- en: Clean and structured data is key. Without it, the LLM won’t perform at its best.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 清洁和结构化的数据是关键。没有它，LLM无法发挥最佳性能。
- en: Even with solid data, it’s not perfect. You still need to work on the agents
    to make sure they do what they’re supposed to.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 即使有可靠的数据，它也不是完美的。你仍然需要工作在代理上，确保它们做它们应该做的事情。
- en: You’ve probably already noticed the system works — but it’s not quite there
    yet.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能已经注意到了系统是有效的——但它还没有完全达到那里。
- en: 'There are still several things that need improvement: parsing the user’s query
    into a more structured format, adding guardrails so agents always use their tools,
    summarizing more effectively to keep the research doc concise, improving error
    handling, and introducing long-term memory to better understand what the user
    actually needs.'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 仍然有几个方面需要改进：将用户的查询解析为更结构化的格式，添加护栏以确保代理始终使用他们的工具，更有效地总结以保持研究文档简洁，改进错误处理，并引入长期记忆以更好地理解用户实际需要。
- en: State (short-term memory) is especially important if you want to optimize for
    performance and cost.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 状态（短期记忆）对于想要优化性能和成本特别重要。
- en: Right now, we’re just pushing every message into state and giving all agents
    access to it, which isn’t ideal. We really want to separate state between the
    teams. In this case, it’s something I haven’t done, but you can try it by introducing
    a scratchpad in the state schema to isolate what each team knows.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 目前，我们只是将每条消息推入状态，并让所有代理都能访问它，这并不是理想的。我们真的希望在不同团队之间分离状态。在这种情况下，这是我还没有做的事情，但你可以通过在状态模式中引入一个草稿本来隔离每个团队所知道的内容。
- en: Regardless, I hope it was a fun experience to understand the results we can
    get by building different agentic workflows.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 不论如何，我希望理解通过构建不同的代理工作流程我们可以得到的结果是一种有趣的体验。
- en: If you want to see more of what I’m working on, you can follow me [here](https://towardsdatascience.com/author/ilsilfverskiold/)
    but also on [Medium](https://medium.com/@ilsilfverskiold), [GitHub](https://github.com/ilsilfverskiold),
    or [LinkedIn](https://www.linkedin.com/in/ida-silfverskiold/) (though I’m hoping
    to move over to X soon). I also have a [Substack](https://howtouseai.substack.com/),
    where I hope to publishing shorter pieces in.
  id: totrans-129
  prefs: []
