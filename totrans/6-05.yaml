- en: Building Visual Agents that can Navigate the Web Autonomously
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/building-visual-agents-that-can-navigate-the-web-autonomously-1184efbfe895/](https://towardsdatascience.com/building-visual-agents-that-can-navigate-the-web-autonomously-1184efbfe895/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*This post was co-authored with Rafael Guedes.*'
  prefs: []
  type: TYPE_NORMAL
- en: Introduction
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In the age of exponential growth in artificial intelligence, the topic of the
    moment is the rise of agentic AI. These AI systems leverage large language models
    (LLMs) to make decisions, plan, and collaborate with other agents or humans.
  prefs: []
  type: TYPE_NORMAL
- en: When we wrap an LLM with a role, a set of tools, and a specific goal, we create
    what we call an agent. By focusing on a well-defined objective and having access
    to relevant APIs or external tools (like search engines, databases, or even browser
    interfaces – more about this later), agents can autonomously explore paths to
    achieve their targets. Thus, agentic AI opens up a new paradigm where multiple
    agents can tackle complex, multi-step workflows.
  prefs: []
  type: TYPE_NORMAL
- en: John Carmack and Andrej Karpathy recently discussed a topic on X (formerly Twitter)
    that inspired this article. Carmack mentioned that AI-powered assistants can push
    applications to expose features through text-based interfaces. In this world,
    LLMs talk to a command-line interface wrapped under the graphical user interface
    (a.k.a. GUI), sidestepping some of the complexity of pure vision-based navigation
    (that exists because we humans need it). Karpathy raises the valid point that
    advanced AI systems can become better at automating GUIs before developers can
    provide comprehensive textual interfaces to every application. We agree with Karpathy
    on this one.
  prefs: []
  type: TYPE_NORMAL
- en: Building on these ideas, this aHi rticle explores how to implement and empower
    AI agents with visual navigation capabilities. We will walk through how to build
    agents that can navigate the web autonomously by solely relying on their vision
    skills (no APIs or scraping). We can browse websites, move through pages to achieve
    a pre-defined goal, and retrieve the necessary information without human intervention.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 2: Visual Agentic AI (image by author with DALL-E)](../Images/0afec05cd562ea872c469adbd6f3a757.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 2: Visual Agentic AI (image by author with DALL-E)'
  prefs: []
  type: TYPE_NORMAL
- en: As always, the code is available on our [GitHub](https://github.com/zaai-ai/lab).
  prefs: []
  type: TYPE_NORMAL
- en: 'Multimodal LLMs: how do they work?'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Multimodal LLMs (MLLM) were developed to address the limitations of LLMs. The
    latter performs well in zero-shot reasoning on most NLP tasks but fall short when
    dealing with vision elements. On the other hand, MLLMs complement Large Vision
    Models (LVM), which can process visual elements but lack the advanced reasoning
    capabilities of LLMs. By combining both, MLLMs integrate LLM reasoning with LVM
    visual processing, enabling the analysis of different inputs such as text and
    images [1]. Figure 2 shows the current state-of-the-art MLLMs and their evolution
    over time.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 3: Existing MLLMs landscape (source)](../Images/6e429c4f263d9d99c69127a6ac10f9c9.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 3: Existing MLLMs landscape ([source](https://arxiv.org/pdf/2306.13549))'
  prefs: []
  type: TYPE_NORMAL
- en: Architecture
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'A typical MLLM architecture consists of three elements:'
  prefs: []
  type: TYPE_NORMAL
- en: '**1.** The **pre-trained modality encoder** is responsible for understanding
    the relationship between text and any other modality, such as audio or image.
    It aligns their respective representations in a shared latent space.'
  prefs: []
  type: TYPE_NORMAL
- en: In this case, our model receives images and text as input. Thus, it has two
    encoders, one targeting images and the other text. An image encoder is typically
    a convolution neural network (CNN) or a vision transformer (ViT) that converts
    the image into a high-dimensional vector representation, i.e., an embedding. A
    text encoder is usually a transformer-based language model that equally converts
    text into an embedding representation.
  prefs: []
  type: TYPE_NORMAL
- en: Afterward, the model aligns the outputs of both encoders in the shared latent
    space so that the embeddings of similar images and text descriptions are closer
    in that space.
  prefs: []
  type: TYPE_NORMAL
- en: 'This alignment is crucial for the model to understand which images match the
    text descriptions, and it is achieved by training the model using a contrastive
    loss that:'
  prefs: []
  type: TYPE_NORMAL
- en: Computes the similarity (dot product) between every image-text pair in the batch.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Applies a softmax function to create a probability distribution over the pairs.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Optimizes the model using, for example, cross-entropy loss. It maximizes the
    similarity between correct image-text pairs and minimizes the similarity between
    unrelated image-text pairs.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![Figure 4: Training a multimodal model to align text and image embeddings
    (image by author)](../Images/bfb1f65be67957a8d96c2e05f09892f8.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 4: Training a multimodal model to align text and image embeddings (image
    by author)'
  prefs: []
  type: TYPE_NORMAL
- en: '**2\. Modality interface** consists of a learnable connector. It is responsible
    for bridging the gap between modalities. This learnable connector is faster and
    cheaper to train than training an MLLM in an end-to-end manner, and its objective
    consists of aligning the output of the visual/audio encoder and the input text.
    It can be implemented in two ways:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Token-level fusion** is where the output of the image/audio encoders is transformed
    into tokens (through query-based learning or by simply using a linear MLP) and
    concatenated with the text tokens.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Feature-level fusion** adds extra modules to capture deeper interactions
    between text and visual/audio features through cross-attention layers.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![Figure 5: Token and Feature level fusion (image by author)](../Images/ed184311ad222391b9b95c434aa599d4.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 5: Token and Feature level fusion (image by author)'
  prefs: []
  type: TYPE_NORMAL
- en: '**3\. Pre-trained LLMs** are responsible for receiving the aligned representation
    of the different input modalities as input to reason and generate a text answer.
    One can also add an optional generator to create more modalities besides text.'
  prefs: []
  type: TYPE_NORMAL
- en: We can use any LLMs in this layer, like GPT-4o, LLaMA, Mixtral, Gemini, Qwen,
    etc. The choice of the LLM depends on the specific use case, as these models come
    in varying sizes (usually larger models mean better performance). Some models
    are multilingual, while others focus on a single language, most commonly English.
    And certain models, such as Mixtral, achieve faster inference times by using a
    Mixture of Experts (MoE). This technique scales up model expressiveness without
    increasing so much the total number of parameters.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 6: MLLM architecture (source)](../Images/2384ef8868d5e72094a9b6d547dab58a.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 6: MLLM architecture ([source](https://arxiv.org/pdf/2306.13549))'
  prefs: []
  type: TYPE_NORMAL
- en: Google GenAI SDK
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Google recently launched its GenAI SDK which can be easily installed by running
    the following command `pip install google-generativeai`. This new package is the
    easiest way for developers to interact with Gemini, Google’s multimodal model
    developed by Google DeepMind [2].
  prefs: []
  type: TYPE_NORMAL
- en: 'The team at Google developed several notebooks with different use cases that
    can be used with this new package [3]. Some of the most interesting use cases
    are:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Object Detection** can be easily performed with `gemini-1.5-flash-002` by
    simply sending the image and the object you want to extract as input. In the example
    below, the user targeted the umbrellas in the image.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![Figure 6: Extracting bounding boxes with Gemini (source)](../Images/86bbdd5e0980b115069d493fd60ca3cc.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 6: Extracting bounding boxes with Gemini ([source](https://colab.research.google.com/github/google-gemini/cookbook/blob/main/examples/Object_detection.ipynb#scrollTo=nLL28l-Cln_f))'
  prefs: []
  type: TYPE_NORMAL
- en: '**Video Analysis** is possible by leveraging Gemini multimodal capabilities
    to analyze a video. One can use it to identify elements of interest in the different
    frames or to summarize its content.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Entity extraction** from a large corpus can be a hard and time-consuming
    task for a human, but not for Gemini. In this [example](https://github.com/google-gemini/cookbook/blob/main/examples/Entity_Extraction.ipynb),
    the team at Google shows how to extract streets and means of transportation from
    a long text by just prompting the following:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: '{ "Street": [ "Via dei Fori Imperiali", "Via del Corso", "Via della Lungara"
    ], "Transport": [ "train", "metro", "bus", "Terravision shuttle", "taxi", "private
    transfer service" ] }'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Interpreting Charts, Graphs, and Slides.** As we saw earlier, being multimodal
    means that Gemini can process both text and image inputs and reason across both
    input types. In this example, Gemini is asked to explain the different pub/sub
    patterns using the image below:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The image shows three different Pub/Sub patterns:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Many-to-One (Fan-In):** In this pattern, multiple publishers send messages
    to a single topic. A single subscriber listens to this topic and consumes all
    the messages.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Many-to-Many:** This pattern allows multiple publishers to send messages
    to a single topic and multiple subscribers can consume messages from that topic.
    It is useful for load balancing and ensuring that messages are distributed across
    multiple consumers.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**One-to-Many (Fan-Out):** This pattern has a single publisher sending messages
    to a topic, and multiple subscribers are listening to that topic. This pattern
    is used to distribute messages to a large number of consumers.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![Figure 7: Slide with Cloud Pub/Sub explanation (source)](../Images/cdd20655b88af5f838cb32baa23859df.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 7: Slide with Cloud Pub/Sub explanation ([source](https://github.com/google-gemini/cookbook/blob/main/examples/Working_with_Charts_Graphs_and_Slide_Decks.ipynb))'
  prefs: []
  type: TYPE_NORMAL
- en: Navigating web pages using Google GenAI SDK
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this section, we work through our use case using Google GenAI SDK. We create
    an agent capable of navigating web pages and extracting content from them. The
    goal is to have the agent navigate to [ZAAI](https://zaai.ai/)‘s web page, search
    for its blog, and get some metadata from the last article published. This agent
    leverages Gemini’s multimodal capabilities to extract the necessary information
    based only on screenshots from the website (image) and the instructions we provide
    through text.
  prefs: []
  type: TYPE_NORMAL
- en: These agents will open the door to many use cases that were impossible before.
    Even a few months ago, agents only relied on APIs to get information from third-party
    systems. In this case, there is no need to spend time building an API since the
    agent can navigate and extract information as humans do. Unlike traditional scraping,
    our agent will adapt to changes in the UI/UX of the websites and won’t require
    custom code to find specific elements on the page.
  prefs: []
  type: TYPE_NORMAL
- en: 'We start by importing the libraries, defining global variables, and loading
    the Gemini API Key from an env file (the API key can be obtained [here](https://ai.google.dev/gemini-api/docs/api-key)):'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: We create three utility functions to handle the input and output for Gemini.
    The first function reads an image file and converts it into a Base64-encoded string
    (necessary for Gemini’s API). The second function extracts JSON data from the
    LLM’s response and performs the necessary pre-processing to ensure the data is
    usable. The third function transforms bounding box coordinates, which Google normalizes
    to a range of 0 to 1000, into actual pixel values.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]json|[PRE3]'
  prefs: []
  type: TYPE_NORMAL
- en: Then, we developed functions to make tools available for the agent. First, we
    define a tool that overlays bounding boxes on an image and saves it. The second
    one captures a screenshot of the screen. A third one launches the Chrome browser
    and navigates to a specified URL. Finally, the last one identifies and clicks
    on bounding boxes, enabling interaction with specific UI elements.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: Finally, we implement capabilities for our agent to extract specific information
    from what it is "seeing."
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: The visual workflow of the process can be seen in Figure 8.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 8: Steps performed by the Visual Agent to extract the metadata from
    the latest blog article (image by author).](../Images/86663db21e1166e05c9eb688f6b4077b.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 8: Steps performed by the Visual Agent to extract the metadata from
    the latest blog article (image by author).'
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Agentic AI opens up many new possibilities. As we make these agents more autonomous,
    the ability to act on goals and adapt to new information makes old and complex
    problems suddenly easy to solve. They are also gaining more and more human-like
    capabilities. For instance, the ability to interpret an image and extract information
    was a characteristic that only humans could do until recently. A few months ago,
    if we wanted a machine to be able to extract this level of detailed information
    from an image, we would 1) train a model for a specific goal or 2) program the
    machine to perform a very specific task. None of the approaches were scalable
    since if something changed, we would most likely need to retrain or reprogram
    our approach.
  prefs: []
  type: TYPE_NORMAL
- en: Nowadays, multimodal models can interpret and analyze visual information by
    simply following text instructions and reasoning over the inputs. This means that,
    without any modifications, the model can still function even if the context or
    the visual appearance of the desired information changes.
  prefs: []
  type: TYPE_NORMAL
- en: Agentic AI is still taking the first steps, and we look forward to seeing what
    comes next!
  prefs: []
  type: TYPE_NORMAL
