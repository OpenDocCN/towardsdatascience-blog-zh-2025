- en: 'Zero-Inflated Data: A Comparison of Regression Models'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 零膨胀数据：回归模型比较
- en: 原文：[https://towardsdatascience.com/zero-inflated-data-comparison-of-regression-models/](https://towardsdatascience.com/zero-inflated-data-comparison-of-regression-models/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/zero-inflated-data-comparison-of-regression-models/](https://towardsdatascience.com/zero-inflated-data-comparison-of-regression-models/)
- en: <mdspan datatext="el1757014699606" class="mdspan-comment">I have recently worked</mdspan>
    on a regression problem. I knew that **the target** I wanted to design a predictive
    model for **was countable** (i.e. 0, 1, 2, …). Consequently, I immediately thought
    about choosing a Generalized Linear Model (GLM) with a relevant **discrete distribution**,
    like the **Poisson distribution** or the **Negative binomial distribution**. But
    everything did not go as well as expected. I mistook haste for speed.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1757014699606" class="mdspan-comment">我最近在处理一个回归问题。我知道**我想要设计的预测模型的目标**是可计数的（即0、1、2、……）。因此，我立即想到了选择一个具有相关**离散分布**的广义线性模型（GLM），如**泊松分布**或**负二项分布**。但一切并没有像预期的那样顺利。我误将仓促行事当作了迅速行动。
- en: Zero inflated data
  id: totrans-3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 零膨胀数据
- en: First of all, let us have a look at a dataset suitable for the post. I have
    chosen the results of the [**NextGen National Household Travel Survey**](http://nhts.ornl.gov)
    [1]. The variable of interest, named “BIKETRANSIT”, is the number of “days in
    last 30 days cycling used”, so this is an integer value between 0 and 30 for daily
    users. Here is a histogram of the variable in question.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们看看适合这篇文章的数据集。我选择了[**NextGen National Household Travel Survey**](http://nhts.ornl.gov)
    [1]的结果。感兴趣的变量名为“BIKETRANSIT”，表示“过去30天内骑自行车使用的天数”，因此对于每日用户来说，这是一个介于0到30之间的整数。以下是该变量的直方图。
- en: '![](../Images/978e97fb2a55c96d4aef144fe50ffaaa.png)'
  id: totrans-5
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/978e97fb2a55c96d4aef144fe50ffaaa.png)'
- en: Histogram of the number of cycling days
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 自行车日数的直方图
- en: 'We can clearly see the **countable data is zero inflated**. Most of the respondents
    have not used a bike a single day over the last 30 days. I have also noticed some
    interesting patterns: there tend to be more people reporting bike use on exactly
    5, 10, 15, 20, 25, or 30 days compared to the adjacent numbers. This is probably
    because respondents prefer to choose round numbers when they are unsure of the
    precise count. Whatever the reason, in this post we will focus primarily on the
    issue of zero inflation by **comparing models designed for zero-inflated count
    data**.'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以清楚地看到**计数数据是零膨胀的**。大多数受访者在过去30天内没有骑过一天自行车。我还注意到一些有趣的模式：与相邻数字相比，报告在恰好5、10、15、20、25或30天使用自行车的人数似乎更多。这可能是因为受访者在不确定确切计数时倾向于选择整数。无论原因如何，在这篇文章中，我们将主要关注**通过比较针对零膨胀计数数据设计的模型**来探讨零膨胀问题。
- en: 'Several survey fields have been selected as **independent variables** to explain
    the number of bike days (e.g., age, gender, worker category, education level,
    household size, and district characteristics). I intentionally excluded features
    that count the number of days spent on other activities (such as using taxis or
    shared bikes), since some of them are highly correlated with the outcome of interest.
    I want the model to remain realistic: predicting bike usage over 30 days based
    on taxi, car, or public transport usage over the same period would not provide
    meaningful insights.'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 几个调查领域已被选为**独立变量**来解释自行车日数（例如，年龄、性别、工人类别、教育水平、家庭规模和地区特征）。我故意排除了计数其他活动（如使用出租车或共享单车）天数的特点，因为其中一些与感兴趣的结果高度相关。我希望模型保持现实：基于同一时期的出租车、汽车或公共交通使用情况来预测30天内的自行车使用情况不会提供有意义的见解。
- en: Poisson regression limits
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 泊松回归限制
- en: Before introducing the zero inflated model, I would like to **illustrate the
    limit of the Poisson regression**, which I first considered for this dataset.
    I have not looked at the Negative Binomial distribution in the section. Poisson
    regression assumes that the dependent random variable Y follows a Poisson distribution,
    conditional on the independent variables X and the parameters β.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 在介绍零膨胀模型之前，我想**说明泊松回归的局限性**，这是我最初考虑用于此数据集的。我尚未在该部分查看负二项分布。泊松回归假设在独立变量X和参数β的条件下，因变量Y遵循泊松分布。
- en: '![](../Images/15ac241d6dc510e5d559e2af71350207.png)'
  id: totrans-11
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/15ac241d6dc510e5d559e2af71350207.png)'
- en: Poisson regression distribution model
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 泊松回归分布模型
- en: So, let’s take a **look at some empirical distributions of Y∣X,β**. Since I
    included many features, it is difficult to find a large number of observations
    with exactly the same values of X. To address this, I used a clustering algorithm — [AgglomerativeClustering
    from scikit-learn](https://scikit-learn.org/stable/modules/generated/sklearn.cluster.AgglomerativeClustering.html)
    [2] — to group observations with similar feature profiles.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，让我们来看看Y∣X,β的一些经验分布。由于我包含了众多特征，很难找到具有完全相同X值的大量观测值。为了解决这个问题，我使用了一个聚类算法——[scikit-learn中的AgglomerativeClustering](https://scikit-learn.org/stable/modules/generated/sklearn.cluster.AgglomerativeClustering.html)
    [2]——将具有相似特征轮廓的观测值分组。
- en: 'First, I preprocessed the data so that it can feed the regression models and
    also the clustering algorithm. I do not want to spend too much explaining all
    the preprocessing steps as this post does not focus on it. **The full preprocessing
    code is available on a** [**repo**](https://github.com/kapytaine/zero_inflated_data)
    **[8]**. In brief, I encoded the categorical features using one-hot encoding.
    I also applied several preprocessing steps to the other features: imputing missing
    values, clipping outliers, and applying transformation functions where appropriate.
    Finally, I performed clustering on the transformed dataset.'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我预处理了数据，使其可以输入回归模型和聚类算法。我不想花太多时间解释所有预处理步骤，因为这篇文章并不专注于这一点。**完整的预处理代码可在** [**repo**](https://github.com/kapytaine/zero_inflated_data)
    **[8]** 上找到。简而言之，我使用独热编码对分类特征进行了编码。我还对其他特征应用了几个预处理步骤：填补缺失值、剪裁异常值，并在适当的地方应用转换函数。最后，我在转换后的数据集上执行了聚类。
- en: '[PRE0]'
  id: totrans-15
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Then I estimated the parameter of the Poisson distribution Ⲗ with the unbiased
    estimator being the mean of the observed random variables for each group of the
    cluster.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我使用每个聚类组的观测随机变量的均值作为无偏估计量来估计泊松分布的参数Ⲗ。
- en: '![](../Images/bc5d58a130ea0607ecb9c86c9d08c4eb.png)'
  id: totrans-17
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/bc5d58a130ea0607ecb9c86c9d08c4eb.png)'
- en: Ⲗ estimator
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: Ⲗ估计量
- en: I then plotted the **empirical histograms** along with the **probability mass
    functions of the fitted Poisson distributions** for several groups of observations.
    To assess the quality of the fit, I computed both the **cross-entropy** and the
    **entropy**, noting that entropy serves as a lower bound for cross-entropy according
    to [Gibbs’ inequality](https://en.wikipedia.org/wiki/Gibbs%27_inequality) [3].
    A good model should produce a cross-entropy value close to the entropy (though
    slightly larger).
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 我随后绘制了**经验直方图**以及拟合泊松分布的**概率质量函数**，针对几个观测值组。为了评估拟合质量，我计算了**交叉熵**和**熵**，并注意到根据[吉布斯不等式](https://en.wikipedia.org/wiki/Gibbs%27_inequality)
    [3]，熵是交叉熵的下界。一个好的模型应该产生接近熵的交叉熵值（尽管略大）。
- en: For this analysis, I focused on three of the largest groups, since parameter
    estimation is more reliable with larger sample sizes. This is particularly important
    here because the data is skewed due to zero inflation, making it necessary to
    collect many observations. Among the groups, two contain bike users, while one
    group (228 respondents) reported no bike usage at all. For this last group, no
    Poisson distribution was fitted, as the Poisson parameter must be strictly greater
    than zero. Finally, I used a vertical log scale in the plots to account for the
    zero inflation.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 在这次分析中，我专注于三个最大的组，因为在大样本量下参数估计更可靠。在这里尤其重要，因为数据由于零膨胀而偏斜，需要收集大量观测值。在这些组中，有两个包含自行车用户，而一个组（228个受访者）报告根本不使用自行车。对于这个最后组，没有拟合泊松分布，因为泊松参数必须严格大于零。最后，我在图表中使用了垂直对数刻度来考虑零膨胀。
- en: '![](../Images/eab8f50dc9e0c8d6f8cf4e27be351eb3.png)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/eab8f50dc9e0c8d6f8cf4e27be351eb3.png)'
- en: I find it difficult to evaluate the quality of the fitted distribution by looking
    at the entropy and the cross entropy. However **I can see that the histogram and
    the probability mass function differ a lot**. **This is why I then considered
    the Zero Inflated Poisson (ZIP) distribution**.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 我发现通过观察熵和交叉熵来评估拟合分布的质量比较困难。然而**我可以看到直方图和概率质量函数差异很大**。**这就是我随后考虑使用零膨胀泊松（ZIP）分布的原因**。
- en: Zero inflated data adapted models
  id: totrans-23
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 零膨胀数据适应模型
- en: 'Models designed for zero-inflated data aim to **capture both the high probability
    of zeros and the relatively low probabilities of other events**. I explored **two
    main families** of such models:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 为零膨胀数据设计的模型旨在**捕捉零的高概率和其他事件的相对低概率**。我探索了**两种主要模型家族**：
- en: '“**Zero-inflated models** […] model the zeros using a two-component mixture
    model. […] The probability of the variable being zero is determined by both the
    main distribution and the mixture weight”. “A zero-inflated model can only increase
    the probability of P(x = 0)” [5]. For notation, I use the following setup (slightly
    different from Wikipedia and other sources). Let X1 be a hidden variable following
    a Bernoulli distribution. In my notation, the probability of success is p (whereas
    Wikipedia uses 1-π). Let X2 be another hidden variable following a distribution
    that allows zeros with nonzero probability. For my use case, I assume X2 is discrete.
    The observed variable is then defined as X=X1*X2 which leads to the following
    probability mass function:'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: “**零膨胀模型** [...] 使用双组分混合模型来模拟零值。 [...] 变量为零的概率由主要分布和混合权重共同决定”。 “零膨胀模型只能增加 P(x
    = 0) 的概率” [5]。为了表示，我使用了以下设置（与维基百科和其他来源略有不同）。令 X1 为一个服从伯努利分布的隐藏变量。在我的表示法中，成功的概率是
    p（而维基百科使用 1-π）。令 X2 为另一个服从允许零值有非零概率的分布的隐藏变量。对于我的用例，我假设 X2 是离散的。观察变量定义为 X=X1*X2，从而得到以下概率质量函数：
- en: '![](../Images/18f297ab3df162ca27af92010d71a632.png)We can notice that X1 and
    X2 are partially hidden. When X=0, then we cannot know the values of X1 and X2,
    but as soon as X>0, both variables X1 and X2 are known.'
  id: totrans-26
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '![图片](../Images/18f297ab3df162ca27af92010d71a632.png)我们可以注意到 X1 和 X2 部分是隐藏的。当
    X=0 时，我们无法知道 X1 和 X2 的值，但一旦 X>0，X1 和 X2 这两个变量都是已知的。'
- en: '[**Hurdle models**](https://en.wikipedia.org/wiki/Hurdle_model) model the observable
    “random variable […] using two parts, the first of which is the probability of
    attaining the value 0, and the second part models the probability of the non-zero
    values” [5]. Unlike zero-inflated models, the second component must follow a distribution
    in which the probability of zero is exactly zero. Using the same notation as before,
    X1 models whether the observation is zero or non-zero (typically via a Bernoulli
    distribution). X2 follows a distribution that assigns no probability mass to zero.
    Consequently, the probability mass function is:'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[**门槛模型**](https://en.wikipedia.org/wiki/Hurdle_model) 使用两部分来模拟可观察的“随机变量 [...]”，其中第一部分是达到值
    0 的概率，第二部分模拟非零值的概率 [5]。与零膨胀模型不同，第二部分必须遵循一个零概率恰好为零的分布。使用与之前相同的表示法，X1 模拟观察值是零还是非零（通常通过伯努利分布）。X2
    遵循一个不对零分配概率质量的分布。因此，概率质量函数为：'
- en: '![](../Images/d617ea5b2f7526ca03c7a2646e25f22d.png)'
  id: totrans-28
  prefs:
  - PREF_IND
  type: TYPE_IMG
  zh: '![图片](../Images/d617ea5b2f7526ca03c7a2646e25f22d.png)'
- en: Zero Inflated Poisson model
  id: totrans-29
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 零膨胀泊松模型
- en: 'Let us have a look a the [**Zero Inflated Poisson model**](https://en.wikipedia.org/wiki/Zero-inflated_model#Zero-inflated_Poisson)
    [4]. The ZIP probability mass function is:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看[**零膨胀泊松模型**](https://en.wikipedia.org/wiki/Zero-inflated_model#Zero-inflated_Poisson)
    [4]。ZIP 概率质量函数为：
- en: '![](../Images/b006468b67a7427dffd009376cdb3326.png)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b006468b67a7427dffd009376cdb3326.png)'
- en: ZIP probability mass function
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: ZIP 概率质量函数
- en: 'It is now possible to extend the previous histograms and Poisson-fitted probability
    mass functions by adding the ZIP-fitted probability mass functions. To do this,
    estimators of the two parameters, p and λ, are required. I used the method of
    moments to derive these estimators: the first two moments provide a system of
    two equations with two unknowns, which can then be solved.'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 现在可以通过添加 ZIP-拟合的概率质量函数来扩展先前的直方图和泊松拟合的概率质量函数。为此，需要两个参数 p 和 λ 的估计量。我使用了矩估计法来推导这些估计量：前两个矩提供了一组包含两个未知数的两个方程，然后可以求解。
- en: '![](../Images/9ea1c0faa929bb63f9d162bf72763e20.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/9ea1c0faa929bb63f9d162bf72763e20.png)'
- en: Moment method to get ZIP parameter estimators
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 矩估计法获取 ZIP 参数估计量
- en: 'So the parameter estimators are:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，参数估计量为：
- en: '![](../Images/95680e0ab71ccdf4d6eef34b9c277c1b.png)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/95680e0ab71ccdf4d6eef34b9c277c1b.png)'
- en: ZIP parameter estimators
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: ZIP 参数估计量
- en: Finally I have plotted the same two figures with the fitted ZIP distribution
    probability mass functions as well as the cross entropy measures.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我绘制了相同的两个图，其中包含了拟合的 ZIP 分布概率质量函数以及交叉熵度量。
- en: '![](../Images/a426e0a3b5dd141e7ec739aa981d252d.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a426e0a3b5dd141e7ec739aa981d252d.png)'
- en: Both **visual inspection** and **cross-entropy** values show that the **ZIP
    model fits the observed data better than the Poisson model**. This provides an
    objective and quantifiable reason to **prefer ZIP regression over Poisson regression.**
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: '**视觉检查**和**交叉熵**值都表明 ZIP 模型比泊松模型更好地拟合观察数据。这为选择 ZIP 回归而不是泊松回归提供了一个客观和可量化的理由。'
- en: Model comparison
  id: totrans-42
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 模型比较
- en: 'Let us now compare several models. I split the data into training and test
    sets, but it was not immediately clear which evaluation metrics would be most
    appropriate. For instance, should I rely on Poisson deviance, even though the
    data is zero-inflated? Or mean squared error, which heavily penalizes outliers?
    In the end, I chose to use multiple metrics to better capture model performance:
    **mean absolute error**, **Poisson deviance**, and **correlation.** The models
    I evaluated are:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们来比较几个模型。我将数据分为训练集和测试集，但并不立即清楚哪种评估指标最为合适。例如，我应该依赖泊松偏差，尽管数据是零膨胀的？还是均方误差，它对异常值有严重的惩罚？最终，我选择使用多个指标来更好地捕捉模型性能：**平均绝对误差**、**泊松偏差**和**相关系数**。我评估的模型包括：
- en: A **naïve model** predicting the mean value of the training set,
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个预测训练集平均值的**朴素模型**，
- en: '**Linear regression** (*lr*),'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**线性回归** (*lr*),'
- en: '**Poisson regression** (*pr*),'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**泊松回归** (*pr*),'
- en: '**Zero-inflated Poisson regression** (*zip*),'
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**零膨胀泊松回归** (*zip*),'
- en: A **chained Logistic–Poisson regression** (hurdle model, *lr_pr*),
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个**链式逻辑-泊松回归**（障碍模型，*lr_pr*），
- en: A **chained Logistic–Zero-Truncated Poisson regression** (hurdle model, *lr_tpr*).
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个**链式逻辑-零截断泊松回归**（障碍模型，*lr_tpr*）。
- en: ZIP model
  id: totrans-50
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: ZIP模型
- en: 'Let us look at the ZIP regression implementation. First the **negative log
    likelihood of the observed data**, noted y, is:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看ZIP回归的实现。首先，观察数据的**负对数似然**，记为y，是：
- en: '![](../Images/ce661b4ea561ec3f47081de94dfd83f0.png)'
  id: totrans-52
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/ce661b4ea561ec3f47081de94dfd83f0.png)'
- en: Negative log likelihood
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 负对数似然
- en: 'The marginal likelihood of the observed data, P(Y=y), can be expressed analytically
    without the integral formulation of the joint distribution, P(Y=y, X1=x1). So
    it **can be optimized directly without needing to use the** [**expectation minimization
    algorithm**](https://en.wikipedia.org/wiki/Expectation%E2%80%93maximization_algorithm)
    [6]. The two distribution parameters p and Ⲗ are functions of the features X and
    the parameters of the model β that will be learnt. I have chosen that **p is defined
    as the sigmoid of the dot product between X and β** and **Ⲗ is defined as the
    exponential of the dot product between X and β**. To make the model more flexible,
    I use separate sets of parameters β: one for p and another for λ.'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 观察数据的边缘似然，P(Y=y)，可以在不使用联合分布的积分公式P(Y=y, X1=x1)的情况下解析地表示。因此，**可以直接优化，无需使用**[**期望最大化算法**](https://en.wikipedia.org/wiki/Expectation%E2%80%93maximization_algorithm)
    [6]。两个分布参数p和Ⲗ是特征X和模型参数β的函数，这些参数将被学习。我选择将**p定义为X和β的点积的sigmoid函数**，**Ⲗ定义为X和β的点积的指数函数**。为了使模型更加灵活，我使用不同的参数集β：一个用于p，另一个用于λ。
- en: '![](../Images/ef5135e395ec850faaca01f4b0cb340c.png)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/ef5135e395ec850faaca01f4b0cb340c.png)'
- en: ZIP parameter expressions
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: ZIP参数表达式
- en: Moreover, I have added a **prior on the parameters β to regularize the model**,
    especially useful for the Poisson model for which there is few observations because
    of the zero inflation. I have assumed a Normal prior, hence the L2 regularization
    terms added to the loss function. I have assumed two different priors, one on
    the β for the Bernoulli model and one on the β for the Poisson model, hence the
    two α hyper parameters, noted as alpha_b and alpha_p attributes in the model.
    I have optimized these values by means of a hyper parameter optimization.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我还为参数β添加了一个**先验，以正则化模型**，这对于由于零膨胀而观察较少的泊松模型特别有用。我假设了一个正态先验，因此在损失函数中添加了L2正则化项。我假设了两个不同的先验，一个用于伯努利模型的β，一个用于泊松模型的β，因此有两个超参数α，分别记为模型中的alpha_b和alpha_p属性。我通过超参数优化来优化这些值。
- en: 'I created a class that inherits from scikit-learn’s [`BaseEstimator`](https://scikit-learn.org/stable/modules/generated/sklearn.base.BaseEstimator.html).
    The Python implementation of the loss function is shown below (implemented within
    the class, hence the `self` argument):'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 我创建了一个从scikit-learn的`BaseEstimator`继承的类。损失函数的Python实现如下（在类内部实现，因此有`self`参数）：
- en: '[PRE1]'
  id: totrans-59
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: In order to optimize the loss objective function, I have also computed the **jacobian
    of the loss**.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 为了优化损失目标函数，我还计算了**损失的雅可比矩阵**。
- en: '![](../Images/725a9bce5a8e74f34c11b937706de0a7.png)'
  id: totrans-61
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/725a9bce5a8e74f34c11b937706de0a7.png)'
- en: Jacobian of the negative log likelihood
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 负对数似然的雅可比矩阵
- en: 'The Python implementation is:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: Python实现如下：
- en: '[PRE2]'
  id: totrans-64
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Unfortunately the loss function is not convex, a local minima is not guaranteed
    to be a global minima. I have chosen the light implementation of Broyden-Fletcher-Goldfarb-Shanno
    from scipy because it is faster than the gradient descent methods that I have
    tested.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 不幸的是，损失函数不是凸的，局部最小值不一定是全局最小值。我选择了scipy中Broyden-Fletcher-Goldfarb-Shanno的轻量级实现，因为它比我已经测试过的梯度下降方法更快。
- en: '[PRE3]'
  id: totrans-66
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: The entire class is coded in this [file](https://github.com/kapytaine/zero_inflated_data/blob/master/src/model/MixtureBernPoisRegression.py)
    from the shared repo.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 整个班级的代码都包含在这个[文件](https://github.com/kapytaine/zero_inflated_data/blob/master/src/model/MixtureBernPoisRegression.py)中，来自共享仓库。
- en: After performing an hyper optimization tuning phase to get the best regularization
    hyper parameters, I have finally computed the chosen metrics on the test set.
    The fitting time has been displayed in addition to the metrics.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 在执行超参数优化调整阶段以获得最佳正则化超参数之后，我终于在测试集上计算了所选指标。除了指标外，还显示了拟合时间。
- en: '![](../Images/fddc30f74b309234e5f6ed27b0453f17.png)'
  id: totrans-69
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/fddc30f74b309234e5f6ed27b0453f17.png)'
- en: Benchmark results
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 基准结果
- en: '**Zero-inflated models** — both ZIP and hurdle — **achieve better metrics than
    the naïve model, linear regression, and standard Poisson regression**. I initially
    expected a larger performance gap, given that the empirical histogram of the observed
    Y more closely resembles a ZIP distribution than a Poisson distribution. The **improvement,
    however, comes at the cost of longer fitting times**, particularly for the ZIP
    model. For this use case, hurdle models appear to offer the best compromise, delivering
    strong performance while keeping training time relatively low.'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: '**零膨胀模型**（ZIP和门槛）**比朴素模型、线性回归和标准泊松回归实现了更好的指标**。鉴于观察到的Y的经验直方图比泊松分布更接近ZIP分布，我最初预计性能差距会更大。然而，这种改进是以更长的拟合时间为代价的，尤其是对于ZIP模型。对于这个用例，门槛模型似乎提供了最佳折衷方案，在保持训练时间相对较低的同时提供强大的性能。'
- en: One possible reason for the relatively modest improvement may be that the data
    does not strictly follow a ZIP distribution. To investigate this, I ran another
    benchmark using the same models on a synthetic dataset specifically generated
    to follow a ZIP distribution. This dataset was designed to have approximately
    the same number of observations and features as the original one, but with a target
    variable that follows ZIP distribution by design.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 相对较小的改进可能的一个原因是数据并不严格遵循ZIP分布。为了调查这一点，我使用相同的模型在特别为遵循ZIP分布而生成的人工数据集上运行了另一个基准测试。这个数据集被设计成具有与原始数据集大致相同的观测数和特征数，但目标变量按照设计遵循ZIP分布。
- en: '![](../Images/1cf2a48de704142083c781b5886e9109.png)'
  id: totrans-73
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/1cf2a48de704142083c781b5886e9109.png)'
- en: Benchmark results for a fake ZIP distributed dataset
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 假设ZIP分布数据集的基准结果
- en: '**When the target truly follows a ZIP distribution, the ZIP model outperforms
    all the other models considered**. It is also worth noting that, in this synthetic
    setup, the features are no longer sparse (by design), which may help explain the
    reduction in fitting time.'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: '**当目标真正遵循ZIP分布时，ZIP模型优于所有其他考虑的模型**。还值得注意的是，在这个合成设置中，特征不再是稀疏的（按设计），这可能有助于解释拟合时间的减少。'
- en: Conclusions
  id: totrans-76
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: '**Before choosing a statistical model**, it is crucial to **carefully analyze
    the dataset** rather than relying solely on prior assumptions about its characteristics.
    Examining the empirical distribution — such as through histograms — often reveals
    insights that guide the choice of an appropriate probability model.'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: '**在选择统计模型之前**，仔细分析数据集比仅仅依赖对其特征的先验假设至关重要。通过检查经验分布（例如通过直方图）通常可以揭示指导选择适当概率模型的见解。'
- en: This is particularly important for zero-inflated data, where standard models
    may struggle. A synthetic example with a zero-inflated Poisson (ZIP) distribution
    shows how **the right model can provide a much better fit compared to alternatives**,
    even if those alternatives are not entirely misguided.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 这对于零膨胀数据尤为重要，标准模型可能难以处理。一个具有零膨胀泊松（ZIP）分布的合成示例展示了**正确的模型如何与替代方案相比提供更好的拟合**，即使这些替代方案并不完全错误。
- en: '**For zero-inflated datasets**, models such as the **zero-inflated Poisson**
    or **hurdle models** are especially useful. While both can capture excess zeros
    effectively, hurdle models sometimes offer comparable performance with faster
    training.'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: '**对于零膨胀数据集**，如**零膨胀泊松**或**门槛模型**之类的模型特别有用。虽然两者都能有效地捕捉额外的零，但门槛模型有时在训练速度上提供可比的性能。'
