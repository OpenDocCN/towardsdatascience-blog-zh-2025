    Image created using Google Earth Engine Python API and Geemap. Data source: Friedl,
    M., Sulla-Menashe, D. (2022); Lehner, B., Grill G. (2013) and Lehner, B., Verdin,
    K., Jarvis, A. (2008).](../Images/625d6d2b6763ca4b119c72ba6166a293.png)'
  id: totrans-2
  prefs: []
  type: TYPE_IMG
  zh: '![厄瓜多尔Paute水库2020年的土地覆盖图。使用Google Earth Engine Python API和Geemap创建的图像。数据来源：Friedl,
    M.，Sulla-Menashe, D.（2022）；Lehner, B.，Grill G.（2013）和Lehner, B.，Verdin, K.，Jarvis,
    A.（2008）](../Images/625d6d2b6763ca4b119c72ba6166a293.png)'
- en: 'Land cover map for the Paute water bassin in Ecuador for the year 2020\. Image
    created using Google Earth Engine Python API and Geemap. Data source: Friedl,
    M., Sulla-Menashe, D. (2022); Lehner, B., Grill G. (2013) and Lehner, B., Verdin,
    K., Jarvis, A. (2008).'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 厄瓜多尔的Paute水库2020年的土地覆盖图。使用Google Earth Engine Python API和Geemap创建的图像。数据来源：Friedl,
    M.，Sulla-Menashe, D.（2022）；Lehner, B.，Grill G.（2013）和Lehner, B.，Verdin, K.，Jarvis,
    A.（2008）。
- en: Introduction
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 简介
- en: As a climate scientist, Google Earth Engine (GEE) is a powerful tool in my toolkit.
    No more downloading heavy satellite images to my computer.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一名气候科学家，Google Earth Engine（GEE）是我工具箱中的强大工具。不再需要将沉重的卫星图像下载到我的电脑上。
- en: GEE primary API is Javascript, although Python users can also access a powerful
    API to perform similar tasks. Unfortunately, there are fewer materials for learning
    GEE with Python.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: GEE的主要API是JavaScript，尽管Python用户也可以访问一个功能强大的API来执行类似任务。不幸的是，用Python学习GEE的材料较少。
- en: However, I love Python. Since I learned that GEE has a Python API, I imagined
    a world of possibilities combining the powerful GEE’s powerful cloud-processing
    capabilities with Python frameworks.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我喜欢Python。自从我了解到GEE有一个Python API，我就想象了一个结合GEE强大的云处理能力和Python框架的可能性。
- en: The five lessons come from my most recent project, which involved analyzing
    water balance and drought in a water basin in Ecuador. Nevertheless, the tips,
    code snippets and examples could apply to any project.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 这五个课程来自我的最新项目，该项目涉及分析厄瓜多尔一个水库的水平衡和干旱。尽管如此，这些提示、代码片段和示例可以应用于任何项目。
- en: 'The story presents each lesson following the sequence of any data analysis
    project: data preparation (and planning), analysis, and visualization.'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 故事按照任何数据分析项目的顺序介绍每一课：数据准备（和规划）、分析和可视化。
- en: It is also worth mentioning that I also provide some general advice independent
    of the language you use.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 值得一提的是，我还会提供一些与您使用的语言无关的一般性建议。
- en: This article for GEE beginners assumes an understanding of Python and some geospatial
    concepts.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 本文面向GEE初学者，假设您了解Python和一些地理空间概念。
- en: 'Lesson 1: Get familiar with GEE functions'
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第1课：熟悉GEE函数
- en: If you know Python but are new to GEE (like me some time ago), you should know
    that GEE has optimized functions for processing satellite images. We won’t delve
    into the details of these functions here; you should check the [official documentation](https://developers.google.com/earth-engine/guides/getstarted).
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您了解Python但GEE（就像我之前一样）是新手，您应该知道GEE为处理卫星图像提供了优化函数。我们不会深入探讨这些函数的细节；您应该查看[官方文档](https://developers.google.com/earth-engine/guides/getstarted)。
- en: However, my advice is to check first if a GEE can perform the analysis you want
    to conduct. When I first started using GEE, I used it as a catalogue for finding
    data, relying only on its basic functions. I would then write Python code for
    most of the analyses. While this approach can work, it often leads to significant
    challenges. I will discuss these challenges in later lessons.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我的建议是首先检查GEE是否能够执行您想要进行的分析。当我最初开始使用GEE时，我将其用作数据目录，仅依靠其基本功能。然后我会为大多数分析编写Python代码。虽然这种方法可以工作，但它往往会导致重大挑战。我将在后面的课程中讨论这些挑战。
- en: Don’t limit yourself to learning only the basic GEE functions. If you know Python
    (or coding in general), the learning curve for these functions is not very steep.
    Try to use them as much as possible – it is worth it in terms of efficiency.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 不要只限于学习基本的GEE函数。如果您了解Python（或一般编码），这些函数的学习曲线并不陡峭。尽可能多地使用它们——从效率的角度来看，这是值得的。
- en: 'A final note: GEE functions even support machine learning tasks. These GEE
    functions are easy to implement and can help you solve many problems. Only when
    you cannot solve your problem with these functions should you consider writing
    Python code from scratch.'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 最后一点：GEE函数甚至支持机器学习任务。这些GEE函数易于实现，可以帮助你解决许多问题。只有在你无法使用这些函数解决问题时，才应该考虑从头开始编写Python代码。
- en: As an example for this lesson, consider the implementation of a clustering algorithm.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 作为本课的示例，考虑聚类算法的实施。
- en: Example code with GEE functions
  id: totrans-18
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 带有GEE函数的示例代码
- en: '[PRE0]'
  id: totrans-19
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Example code with Python
  id: totrans-20
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 带有Python的示例代码
- en: '[PRE1]'
  id: totrans-21
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: The first block of code is not only shorter, but it will handle the large satellite
    datasets more efficiently because GEE functions are designed to scale across the
    cloud.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个代码块不仅更短，而且将更有效地处理大型卫星数据集，因为GEE函数被设计为可以在云中扩展。
- en: While GEE’s functions are powerful, understanding the limitations of cloud processing
    is crucial when scaling up your project.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然GEE的函数功能强大，但在扩大你的项目时，了解云处理的局限性是至关重要的。
- en: 'Lesson 2: Understand the limitations of GEE cloud processing capabilities'
  id: totrans-24
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第2课：了解GEE云处理能力的局限性
- en: 'Access to free cloud computing resources to process satellite images is a blessing.
    However, it’s not surprising that GEE imposes limits to ensure fair resource distribution.
    If you plan to use it for a non-commercial large-scale project (e.g. research
    deforestation in the Amazon region) and intend to stay within the free-tier limits
    you should plan accordingly. My general guidelines are:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 能够访问免费云计算资源来处理卫星图像是一种祝福。然而，GEE对资源分配公平性的限制并不令人惊讶。如果你计划用于非商业的大规模项目（例如，研究亚马逊地区的森林砍伐）并且打算遵守免费层限制，你应该相应地计划。我的总体指南是：
- en: Limit the sizes of your regions, divide them, and work in batches. I didn’t
    need to do this in my project because I was working with a single small water
    basin. However, if your project involves large geographical areas this would be
    the first logical step.
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 限制你区域的尺寸，将其分割，并分批工作。在我的项目中，我没有这样做，因为我只处理了一个单一的小型水系。然而，如果你的项目涉及大地理区域，这将是一个合乎逻辑的第一步。
- en: Optimize your scripts by prioritizing using GEE functions (see Lesson 1).
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过优先使用GEE函数（参见第1课）来优化你的脚本。
- en: Choose datasets that enable you to optimize computing power. For example, in
    my last project, I used the Climate Hazards Group InfraRed Precipitation with
    Station data (CHIRPS). The original dataset has a daily temporal resolution. However,
    it offers an alternative version called "PENTAD", which provides data every five
    days. It corresponds to the sum of precipitation for these five days. Using this
    dataset allowed me to save computer power by processing the compacted version
    without sacrificing the quality of my results.
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 选择能够帮助你优化计算能力的数据集。例如，在我的上一个项目中，我使用了气候灾害小组红外降水与站点数据（CHIRPS）。原始数据集具有每日时间分辨率。然而，它提供了一个名为“PENTAD”的替代版本，每五天提供数据。这对应于这五天的降水量总和。使用这个数据集使我能够在不牺牲结果质量的情况下，通过处理压缩版本来节省计算机功率。
- en: Examine the description of your dataset, as it might reveal scaling factors
    that could save computer power. For instance, in my water balance project, I used
    the Moderate Resolution Imaging Spectroradiometer (MODIS) data. Specifically,
    the MOD16 dataset, which is a readily available Evapotranspiration (ET) product.
    According to the documentation, I could multiply my results by a scaling factor
    of 0.1\. Scaling factors help reduce storage requirements by adjusting the data
    type.
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 检查你的数据集描述，因为它可能揭示出可以节省计算机功率的缩放因子。例如，在我的水平衡项目中，我使用了中分辨率成像光谱仪（MODIS）数据。具体来说，是MOD16数据集，这是一个现成的蒸散量（ET）产品。根据文档，我可以将我的结果乘以0.1的缩放因子。缩放因子通过调整数据类型有助于减少存储需求。
- en: If worst comes to worst, be prepared to compromise. Reduce the resolution of
    the analyses if the standards of the study allow it. For example, the "reduceRegion"
    GEE function lets you summarize the values of a region (sum, mean, etc.). It has
    a parameter called "scale" which allows you to change the scale of the analysis.
    For instance, if your satellite data has a resolution of 10 m and GEE can’t process
    your analysis, you can adjust the scale parameter to a lower resolution (e.g.
    50 m).
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果情况最糟，要做好妥协的准备。如果研究标准允许，降低分析分辨率。例如，“reduceRegion”GEE函数允许你总结区域内值（总和、平均值等）。它有一个名为“scale”的参数，允许你更改分析的尺度。例如，如果你的卫星数据分辨率为10米，而GEE无法处理你的分析，你可以将比例参数调整到更低的分辨率（例如50米）。
- en: 'As an example from my water balance and drought project, consider the following
    block of code:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 以我的水均衡和干旱项目为例，考虑以下代码块：
- en: '[PRE2]'
  id: totrans-32
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: In my project, I used a Sentinel-2 satellite image to calculate a moisture soil
    index (MSI). Then, I applied the "reduceRegion" GEE function, which calculates
    a summary of values in a region (mean, sum, etc.).
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的项目中，我使用Sentinel-2卫星图像来计算土壤湿度指数（MSI）。然后，我应用了“reduceRegion”GEE函数，该函数计算区域内值的摘要（平均值、总和等）。
- en: In my case, I needed to find the maximum and minimum MSI values to check if
    my results made sense. The following plot shows the MSI values spatially distributed
    in my study region.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的情况下，我需要找到最大和最小的MSI值，以检查我的结果是否合理。以下图表显示了在我的研究区域内MSI值的空间分布。
- en: '![Monthly mean of moisture soil index values for the Paute basin (Ecuador)
    for the period 2010–2020\. Image created using Google Earth Engine Python API
    and Geemap. Data source: European Space Agency (2025) ; Lehner, B., Grill G. (2013)
    and Lehner, B., Verdin, K., Jarvis, A. (2008).](../Images/e42d6dd0a982c16acd1a273460e1cff8.png)'
  id: totrans-35
  prefs: []
  type: TYPE_IMG
  zh: '![2010-2020年期间帕乌特盆地（厄瓜多尔）土壤湿度指数值的月平均值。使用Google Earth Engine Python API和Geemap创建的图像。数据来源：欧洲航天局（2025）；Lehner,
    B., Grill G. (2013) 和 Lehner, B., Verdin, K., Jarvis, A. (2008)。](../Images/e42d6dd0a982c16acd1a273460e1cff8.png)'
- en: 'Monthly mean of moisture soil index values for the Paute basin (Ecuador) for
    the period 2010–2020\. Image created using Google Earth Engine Python API and
    Geemap. Data source: European Space Agency (2025) ; Lehner, B., Grill G. (2013)
    and Lehner, B., Verdin, K., Jarvis, A. (2008).'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 2010-2020年期间帕乌特盆地（厄瓜多尔）土壤湿度指数值的月平均值。使用Google Earth Engine Python API和Geemap创建的图像。数据来源：欧洲航天局（2025）；Lehner,
    B., Grill G. (2013) 和 Lehner, B., Verdin, K., Jarvis, A. (2008)。
- en: The original image has a 10 m resolution. GEE struggled to process the data.
    Therefore, I used the scale parameter and lowered the resolution to 500 m. After
    changing this parameter GEE was able to process the data.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 原始图像的分辨率为10米。GEE在处理数据时遇到了困难。因此，我使用了比例参数，将分辨率降低到500米。在更改此参数后，GEE能够处理数据。
- en: 'Lesson 3: Prioritize using ready-to-use analysis products'
  id: totrans-38
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第3课：优先使用现成的分析产品
- en: I am obsessed with data quality. As a result, I use data but rarely trust it
    without verification. I like to invest time in ensuring the data is ready for
    analysis. However, don’t let image corrections paralyze your progress.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 我对数据质量非常着迷。因此，我使用数据，但很少在没有验证的情况下信任它。我喜欢投入时间确保数据适合分析。然而，不要让图像校正阻碍你的进度。
- en: My tendency to invest too much time with image corrections stems from learning
    remote sensing and image corrections "the old way". By this, I mean using software
    that assists in applying atmospheric and geometric correction to images.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 我倾向于在图像校正上花费过多时间，这源于我学习遥感图像校正的“老方法”。这意味着使用辅助应用大气和几何校正的软件。
- en: Nowadays, scientific agencies supporting satellite missions can deliver images
    with a high level of preprocessing. In fact, a great feature of GEE is its catalogue,
    which makes it easy to find ready-to-use analysis products.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，支持卫星任务的科学机构可以提供高度预处理的图像。实际上，GEE的一个显著特点是它的目录，这使得找到现成的分析产品变得容易。
- en: Preprocessing is the most time-consuming task in any data science project. Therefore,
    it must be appropriately planned and managed.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 预处理是任何数据科学项目中耗时最长的任务。因此，它必须得到适当的规划和管理。
- en: The best approach before starting a project is to establish data quality standards.
    Based on your standards, allocate enough time to find the best product (which
    GEE facilitates) and apply only the required corrections (e.g. cloud masking).
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 在开始一个项目之前，最佳的做法是建立数据质量标准。根据你的标准，分配足够的时间来寻找最佳的产品（GEE可以提供这一便利），并且只应用所需的校正（例如云遮蔽校正）。
- en: 'Lesson 4: Check the GEE catalogue thoroughly to avoid starting from scratch'
  id: totrans-44
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第4课：彻底检查GEE目录，避免从头开始
- en: If you love programming in Python (like me), you might often find yourself coding
    everything from scratch.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你像我一样喜欢用Python编程，你可能会经常发现自己从头开始编写代码。
- en: As a PhD student (starting with coding), I wrote a script to perform a t-test
    over a study region. Later, I discovered a Python library that performed the same
    task. When I compared my script’s results with those using the library, the results
    were correct. However, using the library from the start could have saved me time.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一名博士研究生（从编码开始），我编写了一个脚本来对一个研究区域进行t检验。后来，我发现了一个执行相同任务的Python库。当我将我的脚本结果与使用库的结果进行比较时，结果是正确的。然而，如果一开始就使用库，可能会节省我很多时间。
- en: I’m sharing this lesson to help you avoid these silly mistakes with GEE. I will
    mention two examples of my water balance project.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 我分享这个经验教训是为了帮助你避免这些与GEE相关的愚蠢错误。我将提到我水资源平衡项目的两个例子。
- en: Example 1
  id: totrans-48
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例1
- en: To calculate the water balance in my basin, I needed ET data. ET is not an observed
    variable (like precipitation); it must be calculated.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 为了计算我流域的水资源平衡，我需要ET数据。ET不是一个观测变量（如降水）；它必须计算。
- en: The ET calculation is not trivial. You can look up the equations in textbooks
    and implement them in Python. However, some researchers have published papers
    related to this calculation and shared their results with the community.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: ET计算并非易事。你可以在教科书中查找相关方程，并在Python中实现它们。然而，一些研究人员已经发表了与此计算相关的论文，并与社区分享了他们的结果。
- en: This is when GEE comes in. The GEE catalogue not only provides observed data
    (as I initially thought) but also many derived products or modelled datasets (e.g.
    reanalysis data, land cover, vegetation indices, etc.). Guess what? I found a
    ready-to-use global ET dataset in the GEE catalogue – a lifesaver!
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 这时GEE就派上用场了。GEE目录不仅提供了观测数据（正如我最初所想），还提供了许多派生产品或模型数据集（例如再分析数据、土地覆盖、植被指数等）。猜猜看？我在GEE目录中找到了一个现成的全球ET数据集——救星！
- en: 'Example 2:'
  id: totrans-52
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例2：
- en: I also consider myself a Geographic Information System (GIS) professional. Over
    the years, I’ve acquired a substantial amount of GIS data for my work such as
    water basin boundaries in shapefile format.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 我也认为自己是一名地理信息系统（GIS）专业人士。多年来，我为我自己的工作收集了大量的GIS数据，例如流域边界的shapefile格式。
- en: In my water balance project, my intuition was to import my water basin boundary
    shapefile to my GEE project. From there, I transformed the file into a Geopandas
    object and continued my analysis.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的水资源平衡项目中，我的直觉是将我的流域边界shapefile导入到我的GEE项目中。从那里，我将文件转换成Geopandas对象，并继续我的分析。
- en: In this case, I wasn’t as lucky as in Example 1\. I lost precious time trying
    to work with this Geopandas object which I could not integrate well with GEE.
    Ultimately, this approach didn’t make sense. GEE does have in its catalogue a
    product for water basin boundaries that is easy to handle.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，我没有像示例1那样幸运。我失去了宝贵的时间，试图与这个Geopandas对象一起工作，而这个对象与GEE的整合并不好。最终，这种方法并不合理。GEE在其目录中确实有一个易于处理的水域边界产品。
- en: Thus, a key takeaway is to maintain your workflow within GEE whenever possible.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，一个重要的经验教训是尽可能在GEE内维护你的工作流程。
- en: 'Lesson 5: Use Geemap for plotting'
  id: totrans-57
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第5课：使用Geemap进行绘图
- en: As mentioned at the beginning of this article, integrating GEE with Python libraries
    can be incredibly powerful.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 如本文开头所述，将GEE与Python库集成可以非常强大。
- en: However, even for simple analyses and plots, the integration doesn’t seem straightforward.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，即使是简单的分析和图表，整合似乎并不直接。
- en: This is where Geemp comes in. [Geemap](https://geemap.org/) is a Python package
    designed for interactive geospatial analysis and visualization with GEE.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是Geemp的作用。[Geemap](https://geemap.org/)是一个Python包，旨在通过GEE进行交互式地理空间分析和可视化。
- en: Additionally, I also found that it can assist with creating static plots in
    Python. I made plots using GEE and Geemap in my water balance and drought project.
    The images included in this story used these tools.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我还发现它可以帮助在Python中创建静态图表。我在我的水资源平衡和干旱项目中使用了GEE和Geemap制作图表。这个故事中包含的图像使用了这些工具。
- en: Summary
  id: totrans-62
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: GEE is a powerful tool. However, as a beginner, pitfalls are inevitable. This
    article provides tips and tricks to help you start on the right foot with GEE
    Python API.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: GEE是一个强大的工具。然而，作为一个初学者，不可避免地会遇到陷阱。这篇文章提供了技巧和窍门，帮助你正确地开始使用GEE Python API。
