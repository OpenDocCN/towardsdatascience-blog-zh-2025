- en: Things I Wish I Had Known Before Starting ML
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: “if you try to keep up with *everything*, you’ll end up keeping up with *nothing*.”
    Pascal Janetzky offers insights on what it takes to achieve success in a highly
    competitive field.
