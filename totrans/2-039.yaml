- en: What Does “Following Best Practices” Mean in the Age of AI?
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/what-does-following-best-practices-mean-in-the-age-of-ai/](https://towardsdatascience.com/what-does-following-best-practices-mean-in-the-age-of-ai/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Never miss a new edition of *The Variable*, our weekly newsletter featuring
    a top-notch selection of editors’ picks, deep dives, community news, and more.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[Subscribe today](https://newsletter.towardsdatascience.com/subscription-to-the-newsletter)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'AI’s footprint is growing rapidly across roles and industries. As [generative-AI
    tools](https://towardsdatascience.com/tag/generative-ai-tools/) move from the
    margins into core workflows, practitioners increasingly ask themselves a deceptively
    simple question: what does being good at one’s job mean these days?'
  prefs: []
  type: TYPE_NORMAL
- en: 'There’s no one answer, of course, but the articles we’ve selected for you this
    week point to a key insight: it might be time to redefine what “following best
    practices” mean, and to focus our understanding of performance around skills in
    which humans continue to hold an edge over their LLM-based assistants.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Before we jump right in, a quick reminder:** [the TDS Reader Survey is now
    open](https://towardsdatascience.typeform.com/reader-survey/), and we’re eager
    to hear your insights. It will only take a few minutes of your time — thanks in
    advance for weighing in with your feedback!'
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 'The MCP Security Survival Guide: Best Practices, Pitfalls, and Real-World Lessons'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: It’s been impossible to miss the buzz around the model context protocol in recent
    months. [Hailey Quach](https://towardsdatascience.com/author/hailey-quach/) highlights
    the risks that this open-source framework poses, and the mitigating steps data
    and ML professionals should take to ensure its integration doesn’t become a security
    nightmare.
  prefs: []
  type: TYPE_NORMAL
- en: '[The MCP Security Survival Guide: Best Practices, Pitfalls, and Real-World
    Lessons](https://towardsdatascience.com/the-mcp-security-survival-guide-best-practices-pitfalls-and-real-world-lessons/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Reducing Time to Value for Data Science Projects: Part 4'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Kristopher McGlinchey stresses that nothing is more important for data scientists
    than “being a good software developer”—even with the rise of coding agents.
  prefs: []
  type: TYPE_NORMAL
- en: '[Reducing Time to Value for Data Science Projects: Part 4](https://towardsdatascience.com/reducing-time-to-value-for-data-science-projects-part-4/)'
