  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提到的LLM：由OpenAI开发的[GPT](https://openai.com/fr-FR/index/gpt-4-research/)，由Anthropic开发的[Claude](https://www.anthropic.com/claude)，由Meta开发的[Llama](https://www.llama.com/)，由Google开发的[Gemini](http://gemini.google.com/)，以及我们还可以提及更多，例如[Mistral](https://mistral.ai/)，[DeepSeek](https://www.deepseek.com/)等…
