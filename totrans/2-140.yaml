    by Black Forest Labs'
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与视觉相关的模型：由Meta开发的[SAM](https://ai.meta.com/sam2/)，由OpenAI开发的[CLIP](https://openai.com/index/clip/)，由Meta开发的[DINO](https://dinov2.metademolab.com/)，由StabilityAI开发的StableDiffusion，以及由Black
    Forest Labs开发的[FLUX](https://bfl.ai/models/flux-kontext)
