- en: Do You Really Need a Foundation Model?
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/do-you-really-need-a-foundation-model/](https://towardsdatascience.com/do-you-really-need-a-foundation-model/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1752602330074" class="mdspan-comment">Foundation models</mdspan>
    are everywhere — but are they always the right choice? In today’s AI world, it
    seems like everyone wants to use foundation models and agents.
  prefs: []
  type: TYPE_NORMAL
- en: 'From GPT to CLIP to SAM, companies are racing to build applications around
    large, general-purpose models. And for good reason: these models are powerful,
    flexible, and often easy to prototype with. But do you really need one?'
  prefs: []
  type: TYPE_NORMAL
- en: In many cases — especially in production scenarios — a simpler, custom-trained
    model can perform just as well, if not better. With lower cost, lower latency,
    and more control.
  prefs: []
  type: TYPE_NORMAL
- en: 'This article aims to help you navigate this decision by covering:'
  prefs: []
  type: TYPE_NORMAL
- en: What foundation models are, and their pros and cons
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What custom models are, and their pros and cons
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How to choose the right approach based on your needs, with real world examples
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A visual decision framework to wrap it all up
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Let’s get into it.
  prefs: []
  type: TYPE_NORMAL
- en: Foundation Models
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A foundation model is a large, pretrained model trained on massive datasets
    across multiple domains. These models are designed to be flexible enough to solve
    a wide range of downstream tasks with little or no additional training. They can
    be seen as generalist models.
  prefs: []
  type: TYPE_NORMAL
- en: 'They come in various types:'
  prefs: []
  type: TYPE_NORMAL
- en: '**LLMs (Large Language Models)** such as GPT-4, Claude, Gemini, LLaMA, Mistral…
    We hear a lot about them since the launch of ChatGPT.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**VLMs (Vision-Language Models)** such as CLIP, Flamingo, Gemini Vision… They
    now tend to be used more and more, even in solutions like ChatGPT.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Vision-specific models** such as SAM, DINO, Stable Diffusion, FLUX. They
    are a bit more specialized and mostly used by practitioners, yet extremely powerful.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Video-specific models** such as RunwayML, SORA, Veo… This field has made
    incredible progress in the last couple of years, and is now reaching impressive
    results.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Most are accessible through APIs or open-source libraries, and many support
    zero-shot or few-shot learning.
  prefs: []
  type: TYPE_NORMAL
- en: 'These models are usually trained at a scale that is just not reachable by most
    companies, both in terms of data and computing power. That makes them really attractive
    for many reasons:'
  prefs: []
  type: TYPE_NORMAL
- en: '**General-purpose and versatile:** One model can tackle many different tasks.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Fast to prototype with:** No need for your own dataset or training pipeline.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Pretrained on vast, diverse data:** They encode world knowledge and general
    reasoning.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Zero/few-shot capabilities:** They work reasonably well out of the box.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Multimodal and flexible:** They can sometimes handle text, images, code,
    audio, and more, which can be hard to reproduce for small teams.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'While they are powerful, they come with some drawbacks and limitations:'
  prefs: []
  type: TYPE_NORMAL
- en: '**High operational cost:** Inference is expensive, especially at scale.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Opaque behavior:** Results can be hard to debug or explain.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Latency limitations:** These models tend to be very large and have high latency,
    which may not be ideal for real-time applications.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Privacy and compliance concerns:** Data often needs to be sent to third-party
    APIs.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Lack of control:** Difficult to fine-tune or optimize for specific use cases,
    sometimes not even an option.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/3f94d93b5fdfd52a1ec75a3476a1973c.png)'
  prefs: []
  type: TYPE_IMG
- en: Pros and cons of foundation models. Image by author.
  prefs: []
  type: TYPE_NORMAL
- en: 'To recap, foundation models are very powerful: they are trained on massive
    datasets, can handle text, image, video and more. They don’t need to be trained
    on your data to work. But they are usually not cost effective, may have high latency
    and may required sending your data to third parties.'
  prefs: []
  type: TYPE_NORMAL
- en: The alternative is to use custom models. Let’s now see what that means.
  prefs: []
  type: TYPE_NORMAL
- en: Custom Models
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A custom model is a model built and trained specifically for a defined task
    using your own data. This could be as simple as a logistic regression or as complex
    as a deep learning architecture tailored to your unique problem.
  prefs: []
  type: TYPE_NORMAL
- en: 'They often require more upfront work but offer greater control, lower cost,
    and better performance on narrow tasks. Many powerful and business-driving models
    are actually custom models, some famous and widely used, some addressing really
    niche problems:'
  prefs: []
  type: TYPE_NORMAL
- en: Netflix’s recommendation engine, used by billions, is a custom model
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Most churn prediction models, widely used in many subscription-based companies,
    are custom models (sometimes just a well-tuned logistic regression)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Credit scoring models
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'When using custom models, you master every single step, making them really
    powerful for several reasons:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Task-specific and optimized:** You control the model, the training data,
    and the evaluation.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Lower latency and cost:** Custom models are usually smaller and less expensive.
    It’s critical in edge or real-time environments.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Full control and explainability:** They are easier to debug, retrain, and
    monitor.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Better for tabular or structured data:** Foundation models excel with unstructured
    data. Custom models tend to do better on tabular data.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Improved data privac**y: No need to send data to external APIs.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'On the other hand, you have to train and deploy your custom models yourself
    to get business value out of them. It comes with some drawbacks:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Labeled data may be required:** Which can be expensive or time-consuming
    to get.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Slower to develop:** Custommodels require training a model, implement pipelines,
    deploy and maintain. This is time consuming.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Skilled resources needed:** In-house ML expertise is a must.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Feel free to dig into deployment strategies and how to choose the best approach
    in that article:*'
  prefs: []
  type: TYPE_NORMAL
- en: '[How to Choose the Best ML Deployment Strategy: Cloud vs. Edge](https://towardsdatascience.com/how-to-choose-the-best-ml-deployment-strategy-cloud-vs-edge-7b62d9db9b20/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![](../Images/958a9d172e580ac06ce07c636ca7fd12.png)'
  prefs: []
  type: TYPE_IMG
- en: Pros and cons for custom models. Image by author.
  prefs: []
  type: TYPE_NORMAL
- en: In one word, custom models give more control and are usually less expensive
    to scale. But it comes at the cost of a more expensive and longer development
    phase — not to mention the skills. Then how to choose wisely whether to use a
    custom model or a foundation model? Let’s try to answer that question.
  prefs: []
  type: TYPE_NORMAL
- en: 'Foundation Model or Custom Model: How to Choose?'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: When to Choose a Custom Model
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'I would say that a custom model must be the default choice overall. But to
    be more fair, let’s see in what specific cases it is clearly a better solution
    than a foundation model. It comes down a few requirements:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Teams & Resources**: you have a machine learning engineer or data team, you
    can label or generate training data, and you’re able to spend time training and
    optimizing your model'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Business**: either you have a really specific case to solve, you have privacy
    requirements, you need low infra cost, or you need low latency or even edge deployment'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Long-term goals**: you want control, and you don’t want to rely on third-party
    APIs'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'If you find yourself in one or more of these situations, a custom model may
    be your best option. Some typical examples I faced in my career were in that situation,
    for example:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Building an in-house, custom forecasting model for YouTube video revenue: you
    can’t compromise on privacy, and no foundation model will do well enough on such
    specific use cases'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Deploying real-time video solution on smartphone: when you need to work at
    more than 30 frames per second, no VLM can handle the task yet'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Credit scoring for a bank: you can’t compromise on privacy, and can’t use third-party
    solutions'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*If you want to dig into it, here is an article about how to forecast YouTube
    video revenue:*'
  prefs: []
  type: TYPE_NORMAL
- en: '[**How Jellysmack Monetized YouTube Videos with Predictive Algorithms**'
  prefs: []
  type: TYPE_NORMAL
- en: '*A Revolutionary Idea in the Creator Economy*](https://medium.datadriveninvestor.com/how-jellysmack-monetized-youtube-videos-with-predictive-algorithms-0b241e9688c2)'
  prefs: []
  type: TYPE_NORMAL
- en: That being said, while in some cases foundation models are not the solution,
    let’s see when they actually are a viable option.
  prefs: []
  type: TYPE_NORMAL
- en: When to Choose a Foundation Model
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'Let’s make the equivalent exercise for foundation models: let’s first check
    the requirements that make them a good option, and let’s look at some typical
    business cases where they would thrive:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Team & Resources**: you don’t necessarily have labeled data, nor ML engineers
    or data scientists, but you do have AI or Software engineers'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Business:** you want to test an idea quickly or ship an MVP, you’re fine
    with using external APIs, and latency or scaling cost aren’t major concerns'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Task Characteristics:** your task is open-ended, or you’re exploring a novel
    or creative problem space'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Here are some typical examples where foundation models have proven valuable
  prefs: []
  type: TYPE_NORMAL
- en: 'Prototyping a chatbot for internal support or knowledge management: you have
    an open-ended task, with low requirements on latency and scale'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Many early-stage MVPs without long-term infra concerns are good candidates
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: As of now, foundation models are really popular for many MVPs revolving around
    text and image, while custom models have proven their value in many business cases.
    But why not combining both? In some cases, it’s possible to get the best solutions
    with hybrid approaches. Let’s see what that means.
  prefs: []
  type: TYPE_NORMAL
- en: When to Use Hybrid Solutions
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: In many real-world workflows, the best answer is a **combination** of both approaches.
    For example, here are a few common hybrid patterns that can leverage the best
    of both worlds
  prefs: []
  type: TYPE_NORMAL
- en: '**Foundation model as a labeling tool:** use SAM or GPT to create labeled data,
    then train a smaller model.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Knowledge distillation:** train a custom model to mimic the outputs of a
    foundation model.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Bootstrapping:** start with foundation model to test, then switch to custom
    later.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Feature extraction:** use CLIP or GPT embeddings as input to a simpler downstream
    model.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I used some of these approaches in past projects during my career, and they
    sometimes allow to get state-of-the-art solutions, using the generalistic power
    of foundation models and the flexibility and scalability of custom models.
  prefs: []
  type: TYPE_NORMAL
- en: In computer vision projects, I used Stable Diffusion to create diverse and realistic
    datasets, as well as SAM to annotate data quickly and efficiently
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Small Language Models are getting traction, and sometimes get advantage of knowledge
    distillation to get the best out of LLMs while remaining smaller, more specialized
    and more scalable
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: One can also use tools like ChatGPT to easily annotate data at scale before
    training custom models
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Here is a concrete example of using foundation models in hybrid solutions
    for computer vision:*'
  prefs: []
  type: TYPE_NORMAL
- en: '[How to Train an Instance Segmentation Model with No Training Data](https://towardsdatascience.com/how-to-train-an-instance-segmentation-model-with-no-training-data-190dc020bf73/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: In a word, in many cases when dealing with unstructured data, a hybrid approach
    can be powerful and give the best of both worlds.
  prefs: []
  type: TYPE_NORMAL
- en: 'Conclusion: Decision Framework'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Let’s now summarize with a decision chart when to go for a foundation model,
    when to go for a custom model, and when to explore a hybrid approach.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d593b343f190e5ccc265164f11c4a7b9.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Decision chart to choose the right approach: custom model, foundation model
    or hybrid. Image by author.'
  prefs: []
  type: TYPE_NORMAL
- en: In a few words, it all comes down to the project and the need. Sure, foundation
    models are buzzing right now, and they are at the heart of the current agents
    revolution. Still, many very valuable business problems can be addressed with
    custom models, while foundation models are proven powerful in many unstructured
    data problems. To choose wisely, a proper analysis of the needs and requirements
    with stakeholders and engineers, along with a decision framework remains a good
    solution.
  prefs: []
  type: TYPE_NORMAL
- en: 'What about you: have you faced any situation where the best solution is not
    what you might think?'
  prefs: []
  type: TYPE_NORMAL
- en: References
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Mentioned LLMs: [GPT](https://openai.com/fr-FR/index/gpt-4-research/) by OpenAI,
    [Claude](https://www.anthropic.com/claude) by Anthropic, [Llama](https://www.llama.com/)
    by Meta, [Gemini](http://gemini.google.com/) by Google, and we could cite more
    such as [Mistral](https://mistral.ai/), [DeepSeek](https://www.deepseek.com/),
    etc…'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Vision-related models: [SAM](https://ai.meta.com/sam2/) by Meta, [CLIP](https://openai.com/index/clip/)
    by OpenAI, [DINO](https://dinov2.metademolab.com/) by Meta, StableDiffusion by
    [StabilityAI](https://stability.ai/), [FLUX](https://bfl.ai/models/flux-kontext)
    by Black Forest Labs'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Video-specific models: [Veo](https://deepmind.google/models/veo/) by Google,
    [RunwayML](https://runwayml.com/), [SORA](https://openai.com/sora/) by OpenAI…'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
