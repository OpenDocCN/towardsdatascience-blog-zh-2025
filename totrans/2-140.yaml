  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 视频特定模型：由Google开发的[Veo](https://deepmind.google/models/veo/)，[RunwayML](https://runwayml.com/)，由OpenAI开发的[SORA](https://openai.com/sora/)…
