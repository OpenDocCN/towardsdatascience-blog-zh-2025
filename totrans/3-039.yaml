- en: '***About the Author***'
  id: totrans-117
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
  zh: '***关于作者***'
- en: '*I’m Ellen, a machine learning engineer with 6 years of experience, currently
    working at a fintech startup in San Francisco. My background spans data science
    roles in oil & gas consulting, as well as leading AI and data training programs
    across APAC, the Middle East, and Europe.*'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: '*我是Ellen，一名拥有6年经验的机器学习工程师，目前在旧金山的金融科技初创公司工作。我的背景包括在石油和天然气咨询中的数据科学角色，以及领导亚太、中东和欧洲的AI和数据培训项目。*'
