- en: How Would I Learn to Code with ChatGPT if I Had to Start Again
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如果我必须重新开始，我将如何使用 ChatGPT 学习编程
- en: 原文：[https://towardsdatascience.com/how-would-i-learn-to-code-with-chatgpt-if-i-had-to-start-again/](https://towardsdatascience.com/how-would-i-learn-to-code-with-chatgpt-if-i-had-to-start-again/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/how-would-i-learn-to-code-with-chatgpt-if-i-had-to-start-again/](https://towardsdatascience.com/how-would-i-learn-to-code-with-chatgpt-if-i-had-to-start-again/)
- en: Coding has been a part of my life since I was 10\. From modifying HTML & CSS
    for my Friendster profile during the simple internet days to exploring SQL injections
    for the thrill, building a three-legged robot for fun, and lately diving into
    Python coding, my coding journey has been diverse and fun!
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 从我10岁开始，编程就成了我生活的一部分。从在简单的互联网时代修改 Friendster 个人资料中的 HTML 和 CSS，到为了刺激而探索 SQL
    注入，为了乐趣而制作一个三条腿的机器人，再到最近深入 Python 编程，我的编程之旅丰富多彩且充满乐趣！
- en: Here’s what I’ve learned from various programming approaches.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我从各种编程方法中学到的东西。
- en: '**The way I learn coding is always similar; As people say, mostly it’s just
    copy-pasting. 😅**'
  id: totrans-4
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**我的学习编程的方式总是相似的；正如人们所说，大部分时间只是复制粘贴。😅**'
- en: 'When it comes to building something in the coding world, here’s a breakdown
    of my method:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 当涉及到在编程世界中构建某些东西时，以下是我方法的分解：
- en: '**Choose the Right Framework or Library**'
  id: totrans-6
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**选择正确的框架或库**'
- en: '**Learn from Past Projects**'
  id: totrans-7
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**从过往项目中学习**'
- en: '**Break It Down into Steps** Slice your project into actionable item steps,
    making development less overwhelming.'
  id: totrans-8
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**将项目分解为步骤**：将你的项目分解为可操作的项目步骤，使开发不那么令人压倒。'
- en: '**Google Each Chunk** For every step, consult Google/Bing/DuckDuckGo/any search
    engine you prefer for insights, guidance, and potential solutions.'
  id: totrans-9
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**逐块搜索 Google**：对于每一步，咨询你偏好的 Google/Bing/DuckDuckGo/任何搜索引擎以获取见解、指导和潜在解决方案。'
- en: '**Start Coding**'
  id: totrans-10
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**开始编码**'
- en: Try to implement each step systematically.
  id: totrans-11
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 尝试系统地实施每个步骤。
- en: 'However, even the most well-thought-out code can encounter bugs. Here’s my
    strategy for troubleshooting:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，即使是最周密思考的代码也可能遇到bug。以下是我的故障排除策略：
- en: '**1. Check Framework Documentation: **ALWAYS read the docs!'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: '**1. 检查框架文档**：始终阅读文档！'
- en: '**2\. Google and Stack Overflow Search**: search on Google and Stack Overflow.
    Example keyword would be:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: '**2. Google 和 Stack Overflow 搜索**：在 Google 和 Stack Overflow 上进行搜索。示例关键词可以是：'
- en: site:stackoverflow.com [coding language] [library] error [error message]
  id: totrans-15
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: site:stackoverflow.com [编程语言] [库] 错误 [错误信息]
- en: ''
  id: totrans-16
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**site:stackoverflow.com python error ImportError: pandas** *module not found*'
  id: totrans-17
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**site:stackoverflow.com python error ImportError: pandas** *模块未找到*'
- en: '– **Stack Overflow Solutions**: If the issue is already on Stack Overflow,
    I look for the most upvoted comments and solutions, often finding a quick and
    reliable answer.'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: – **Stack Overflow 解决方案**：如果问题已经在 Stack Overflow 上，我会寻找获得最多点赞的评论和解决方案，通常能找到快速且可靠的答案。
- en: '– **Trust My Intuition**: When Stack Overflow doesn’t have the answer, I trust
    my intuition to search for trustworthy sources on Google; GeeksForGeeks, Kaggle,
    W3School, and Towards Data Science for DS stuff 😉'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: – **信任我的直觉**：当 Stack Overflow 没有答案时，我信任我的直觉在 Google 上搜索可信赖的资源；GeeksForGeeks、Kaggle、W3School
    和 Towards Data Science 用于数据科学相关内容 😉
- en: '**3\. Copy-Paste the Code Solution**'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: '**3. 复制粘贴代码解决方案**'
- en: '**4\. Verify and Test**: The final step includes checking the modified code
    thoroughly and testing it to ensure it runs as intended.'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: '**4. 验证和测试**：最后一步包括彻底检查修改后的代码并测试它以确保它按预期运行。'
- en: And Voila you just solve the bug!
  id: totrans-22
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 然后Voila，你就可以解决这个bug了！
- en: '![](../Images/d11c94d5bc11f1421afc11a7df77f8b5.png)'
  id: totrans-23
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/d11c94d5bc11f1421afc11a7df77f8b5.png)'
- en: Photo by [Stephen Hocking](https://unsplash.com/@shocking57?utm_source=medium&utm_medium=referral) on [Unsplash](https://unsplash.com/?utm_source=medium&utm_medium=referral)
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由 [Stephen Hocking](https://unsplash.com/@shocking57?utm_source=medium&utm_medium=referral)
    在 [Unsplash](https://unsplash.com/?utm_source=medium&utm_medium=referral) 提供
- en: Isn’t it beautiful?
  id: totrans-25
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 这难道不美吗？
- en: But in reality, are we still doing this?!
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 但在现实中，我们还在这样做吗？！
- en: Lately, I’ve noticed a shift in how new coders are tackling coding. I’ve been
    teaching how to code professionally for about three years now, bouncing around
    in coding boot camps and guest lecturing at universities and corporate training.
    The way coders are getting into code learning has changed a bit.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 最近，我注意到新程序员处理编程的方式有所变化。我现在已经教授编程大约三年了，在编码训练营和大学及企业培训中客座授课。程序员进入代码学习的方式已经有所改变。
- en: I usually tell the fresh faces to stick with the old-school method of browsing
    and googling for answers, but people are still using ChatGPT eventually. And their
    alibi is
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 我通常会告诉新手坚持使用老式的方法，即浏览和谷歌搜索答案，但人们最终还是使用了 ChatGPT。他们的借口是
- en: “Having ChatGPT (for coding) is like having an extra study buddy -who chats
    with you like a regular person”.
  id: totrans-29
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “拥有 ChatGPT（用于编码）就像拥有一个额外的学习伙伴——他像普通人一样与你聊天”。
- en: It comes in handy, especially when you’re still trying to wrap your head around
    things from search results and documentation — to develop what is so-called **programmer
    intuition**.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 这在处理搜索结果和文档中的内容时非常有用，特别是当你还在试图理解哪些是正确的，哪些是错误的时候——以发展所谓的**程序员直觉**。
- en: Now, don’t get me wrong, I’m all for the basics. Browsing, reading docs, and
    throwing questions into the community pot — those are solid moves, in my book.
    Relying solely on ChatGPT might be a bit much. Sure, it can whip up a speedy summary
    of answers, but **the traditional browsing methods give you the freedom to pick
    and choose, to experiment a bit, which is pretty crucial in the coding world.**
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，请别误会，我完全支持基础知识。浏览、阅读文档，将问题抛入社区——在我的书中，这些都是稳固的举动。完全依赖 ChatGPT 可能有点过分。当然，它可以迅速总结答案，但**传统的浏览方法给你自由选择，可以尝试一些实验，这在编码世界中非常关键**。
- en: But, I’ve gotta give credit where it’s due — ChatGPT is lightning-fast at giving
    out answers, especially when you’re still trying to figure out the right from
    the wrong in search results and docs.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，我必须给予应有的赞誉——ChatGPT 在给出答案方面非常迅速，尤其是在你还在试图在搜索结果和文档中区分对错的时候。
- en: I realize this shift of using ChatGPT as a study buddy is not only happening
    in the coding scene, Chatgpt has revolutionized the way people learn, I even use
    ChatGPT to fix my grammar for this post, sorry Grammarly.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 我意识到使用 ChatGPT 作为学习伙伴的这种转变不仅发生在编码场景中，ChatGPT 已经彻底改变了人们的学习方式，我甚至使用 ChatGPT 来修复这篇帖子的语法，对不起
    Grammarly。
- en: '**Saying no to ChatGPT is like saying no to search engines in the early 2000
    era**. While ChatGPT may come with biases and hallucinations, similar to search
    engines having unreliable information or hoaxes. When ChatGPT is used appropriately,
    it can expedite the learning process.'
  id: totrans-34
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**拒绝 ChatGPT 就像拒绝 2000 年代初期的搜索引擎一样**。虽然 ChatGPT 可能会带有偏见和幻觉，类似于搜索引擎可能包含不可靠的信息或骗局。当
    ChatGPT 被适当使用时，它可以加速学习过程。'
- en: Now, let’s imagine a real-life scenario where ChatGPT could help you by being
    your coding buddy to help with debugging.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们想象一个现实生活中的场景，其中 ChatGPT 可以通过作为你的编码伙伴来帮助你进行调试。
- en: 'Scenario: Debugging a Python Script'
  id: totrans-36
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 场景：调试 Python 脚本
- en: Imagine you’re working on a Python script for a project, and you encounter an
    unexpected error that you can’t solve.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你正在为一个项目编写 Python 脚本，并且遇到了一个无法解决的意外错误。
- en: Here is how I used to be taught to do it — the era before ChatGPT.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是我以前是如何被教导做这件事的——ChatGPT 时代之前。
- en: 'Browsing Approach:'
  id: totrans-39
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 浏览方法：
- en: '**Check the Documentation:**'
  id: totrans-40
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**检查文档：**'
- en: Start by checking the Python documentation for the module or function causing
    the error.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，检查导致错误的模块或函数的 Python 文档。
- en: 'For example:'
  id: totrans-42
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 例如：
- en: – visit [https://scikit-learn.org/stable/modules/](https://scikit-learn.org/stable/modules/) for
    Scikit Learn Doc
  id: totrans-43
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: – 访问 [https://scikit-learn.org/stable/modules/](https://scikit-learn.org/stable/modules/)
    查看Scikit Learn 文档
- en: '**2\. Search on Google & Stack Overflow:**'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: '**2. 在 Google 和 Stack Overflow 上搜索：**'
- en: If the documentation doesn’t provide a solution, you turn to Google and Stack
    Overflow. Scan through various forum threads and discussions to find a similar
    issue and its resolution.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 如果文档没有提供解决方案，你转向 Google 和 Stack Overflow。浏览各种论坛帖子讨论，以找到类似的问题及其解决方案。
- en: '![](../Images/ce26fd0d4a2017bf395db3faeea4eaeb.png)'
  id: totrans-46
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/ce26fd0d4a2017bf395db3faeea4eaeb.png)'
- en: StackOverflow Thread
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: StackOverflow 帖子
- en: 3**. Trust Your Intuition:**
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 3**. 信任你的直觉：**
- en: If the issue is unique or not well-documented, trust your intuition! You might
    explore articles and sources on Google that you’ve found trustworthy in the past,
    and try to adapt similar solutions to your problem.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 如果问题独特或没有很好地记录，信任你的直觉！你可能会探索在 Google 上找到的值得信赖的文章和来源，并尝试将类似的解决方案应用到你的问题上。
- en: '![](../Images/dbf1de55b9ce7e2dfcdfe97eb495942a.png)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/dbf1de55b9ce7e2dfcdfe97eb495942a.png)'
- en: Google Search Result
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: Google 搜索结果
- en: You can see that on the search result above, the results are from W3school –
    (trusted coding tutorial site, great for cheatsheet) and the other 2 results are
    official Pandas documentation. You can see that search engines do suggest users
    look at the official documentation. 😉
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以从上面的搜索结果中看到，结果来自 W3school –（受信任的编码教程网站，非常适合速查表）和其他 2 个结果来自官方 Pandas 文档。你可以看到搜索引擎确实建议用户查看官方文档。😉
- en: And this is how you can use ChatGPT to help you debug an issue.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是你可以如何使用 ChatGPT 来帮助你调试问题的方法。
- en: 'New Approach with ChatGPT:'
  id: totrans-54
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用 ChatGPT 的新方法：
- en: '**Engage ChatGPT in Conversations:**'
  id: totrans-55
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**与ChatGPT进行对话：**'
- en: Instead of only navigating through documentation and forums, you can engage
    ChatGPT in a conversation. Provide a concise description of the error and ask.
    For example,
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 而不是仅仅通过文档和论坛导航，您可以将ChatGPT纳入对话中。提供对错误的简洁描述并提问。例如，
- en: '**“I’m encountering an issue in my [programming language] script where [describe
    the error]. Can you help me understand what might be causing this and suggest
    a possible solution?”**'
  id: totrans-57
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**“我在我的[编程语言]脚本中遇到了一个问题，[描述错误]。你能帮我理解可能的原因并建议一个可能的解决方案吗？”**'
- en: '![](../Images/fcb664fe44aa541b9efbef0c3c8b57f6.png)'
  id: totrans-58
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/fcb664fe44aa541b9efbef0c3c8b57f6.png)'
- en: '**Engage ChatGPT in Conversations**'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: '**与ChatGPT进行对话**'
- en: '**2. Clarify Concepts with ChatGPT:**'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: '**2. 使用ChatGPT澄清概念：**'
- en: If the error is related to a concept you are struggling to grasp, you can ask
    ChatGPT to explain that concept. For example,
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 如果错误与您难以掌握的概念有关，您可以要求ChatGPT解释该概念。例如，
- en: '**“Explain how [specific concept] works in [programming language]? I think
    it might be related to the error I’m facing. The error is: [the error]”**'
  id: totrans-62
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**“解释[特定概念]在[编程语言]中是如何工作的？我认为它可能与我遇到的问题有关。错误是：[错误]”**'
- en: '![](../Images/89ab9c52b2d680580927b089d9f56caf.png)'
  id: totrans-63
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/89ab9c52b2d680580927b089d9f56caf.png)'
- en: '**Clarify Concepts with ChatGPT**'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: '**使用ChatGPT澄清概念**'
- en: '**3. Seek Recommendations for Troubleshooting:**'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: '**3. 寻求故障排除建议：**'
- en: You ask ChatGPT for general tips on troubleshooting Python scripts. For instance,
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 您向ChatGPT寻求关于调试Python脚本的通用技巧。例如，
- en: '**“What are some common strategies for dealing with [issue]? Any recommendations
    on tools or techniques?”**'
  id: totrans-67
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**“处理[问题]有哪些常见的策略？有什么工具或技术的推荐？”**'
- en: '![](../Images/40fedb51bf043448452b81a3dcb4403e.png)'
  id: totrans-68
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/40fedb51bf043448452b81a3dcb4403e.png)'
- en: Using ChatGPT as coding buddy
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 使用ChatGPT作为编程伙伴
- en: 'Potential Advantages:'
  id: totrans-70
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 潜在优势：
- en: '**Personalized Guidance: **ChatGPT can provide personalized guidance ***based
    on the specific details you provide*** about the error and your understanding
    of the problem.'
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**个性化指导：**ChatGPT可以根据您提供的关于错误和您对问题理解的具体细节提供个性化指导。'
- en: '**Concept Clarification: **You can seek explanations and clarifications on
    concepts directly from ChatGPT leveraging their LLM capability.'
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**概念澄清：**您可以直接利用ChatGPT的LLM能力，从ChatGPT那里寻求对概念的解释和澄清。'
- en: '**Efficient Troubleshooting: **ChatGPT might offer concise and relevant tips
    for troubleshooting, potentially streamlining the debugging process.'
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**高效故障排除：**ChatGPT可能会提供简洁且相关的故障排除技巧，可能简化调试过程。'
- en: 'Possible Limitations:'
  id: totrans-74
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 可能的局限性：
- en: Now let’s talk about the cons of relying on ChatGPT 100%. I saw these issues
    a lot in my student’s journey on using ChatGPT. Post ChatGPT era, my students
    just copied and pasted the 1-line error message from their Command Line Interface
    despite the error being 100 lines and linked to some modules and dependencies.
    Asking ChatGPT to explain the workaround by providing a 1 line error code might
    work sometimes, or worse — it might add 1–2 hour manhour of debugging.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们来谈谈完全依赖ChatGPT的缺点。我在学生使用ChatGPT的旅程中看到了很多这些问题。ChatGPT时代之后，我的学生只是从他们的命令行界面复制粘贴了1行错误信息，尽管错误有100行并且与一些模块和依赖项有关。要求ChatGPT通过提供1行错误代码来解释解决方案可能有时有效，或者更糟——它可能增加了1-2小时的调试时间。
- en: ChatGPT comes with a limitation of not being able to see the context of your
    code. For sure, you can always give a context of your code. On a more complex
    code, you might not be able to give every line of code to ChatGPT. The fact that
    Chat GPT only sees the small portion of your code, ChatGPT will either **assume** the
    rest of the code based on its knowledge base or **hallucinate**.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: ChatGPT存在一个限制，即无法看到您代码的上下文。当然，您总是可以提供代码的上下文。在更复杂的代码中，您可能无法将每一行代码都提供给ChatGPT。由于Chat
    GPT只能看到您代码的小部分，ChatGPT将基于其知识库**假设**其余的代码，或者**产生幻觉**。
- en: 'These are the possible limitations of using ChatGPT:'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是使用ChatGPT的可能的局限性：
- en: '**Lack of Real-Time Dynamic Interaction: **While ChatGPT provides valuable
    insights, it lacks the real-time interaction and dynamic back-and-forth that forums
    or discussion threads might offer. On StackOverflow, you might have 10 different
    people who would suggest 3 different solutions which you can compare either by
    DIY ( do it yourself, try it out) or see the number of upvotes.'
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**缺乏实时动态交互：**虽然ChatGPT提供了有价值的见解，但它缺乏论坛或讨论线程可能提供的实时交互和动态来回。在StackOverflow上，您可能会遇到10个不同的人提出3种不同的解决方案，您可以通过DIY（自己动手尝试）或查看点赞数来比较。'
- en: '**Dependence on Past Knowledge: **The quality of ChatGPT’s response depends
    on the information it has been trained on, and it may not be aware of the latest
    framework updates or specific details of your project.'
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**依赖过去知识：**ChatGPT 的回答质量取决于其训练的信息，它可能不知道最新的框架更新或你项目的具体细节。'
- en: '**Might add extra Debugging Time: **ChatGPT does not have a context of your
    full code, so it might lead you to more debugging time.'
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可能增加额外的调试时间：**ChatGPT 没有你的完整代码的上下文，这可能会导致你花费更多的时间进行调试。'
- en: '**Limited Understanding of Concept:** The traditional browsing methods give
    you the freedom to pick and choose, to experiment a bit, which is pretty crucial
    in the coding world. If you know how to handpick the right source, you probably
    learn more from browsing on your own than relying on the ChatGPT general model.'
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**对概念理解有限：** 传统的浏览方法让你有选择和挑选的自由，可以稍微实验一下，这在编码世界中非常关键。如果你知道如何挑选正确的来源，你可能从自己浏览中学到的比依赖
    ChatGPT 通用模型更多。'
- en: Unless you ask a language model that is trained and specialized in coding and
    tech concepts, research papers on coding materials, or famous deep learning lectures
    from Andrew Ng, Yann Le Cunn’s tweet on X (formerly Twitter), pretty much ChatGPT
    would just give a general answer.
  id: totrans-82
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 除非你询问的是经过训练并专门针对编码和技术概念的语模，或者是关于编码材料的学术论文，或者是安德鲁·吴（Andrew Ng）、杨立昆（Yann Le Cunn）在
    X（前 Twitter）上的著名深度学习讲座，否则 ChatGPT 很可能只会给出一个一般性的答案。
- en: This scenario showcases how ChatGPT can be a valuable tool in your coding toolkit,
    especially for obtaining personalized guidance and clarifying concepts. Remember
    to balance ChatGPT’s assistance with the methods of browsing and ask the community,
    keeping in mind its strengths and limitations.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 这种场景展示了 ChatGPT 如何成为你的编码工具包中的宝贵工具，尤其是在获得个性化指导和阐明概念方面。记住，在 ChatGPT 的辅助和浏览方法以及询问社区之间保持平衡，考虑到其优势和局限性。
- en: '* * *'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Final Thoughts
  id: totrans-85
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最后的想法
- en: Things I would recommend for a coder
  id: totrans-86
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 我会推荐给程序员的几件事
- en: If you really want to leverage the autocompletion model; instead of solely using
    ChatGPT, try using VScode extensions for auto code-completion tasks such as [CodeGPT
    — GPT4 extension on VScode](https://codegpt.co/), [GitHub Copilot](https://github.com/features/copilot),
    or Google Colab Autocomplete AI tools in Google Colab.
  id: totrans-87
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果你真的想利用自动补全模型；而不仅仅使用 ChatGPT，尝试使用 VScode 扩展程序进行自动代码补全任务，例如 [CodeGPT — VScode
    上的 GPT4 扩展](https://codegpt.co/)、[GitHub Copilot](https://github.com/features/copilot)，或者
    Google Colab 中的自动补全 AI 工具。
- en: '![](../Images/80f969358e8ae66b8ce3931fb7033164.png)'
  id: totrans-88
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/80f969358e8ae66b8ce3931fb7033164.png)'
- en: Auto code completion on Google Colab
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: Google Colab 上的自动代码补全
- en: As you can see in the screenshot above, Google Colab automatically gives the
    user suggestions on what code comes next.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 如上图所示，Google Colab 会自动为用户提供下一步代码的建议。
- en: Another alternative is Github Copilot. With GitHub Copilot, you can get an AI-based
    suggestion in real-time. GitHub Copilot suggests code completions as developers
    type and turn prompts into coding suggestions based on the project’s context and
    style conventions. As per this [release from Github](https://github.blog/changelog/2023-11-30-github-copilot-november-30th-update/),
    Copilot Chat is now powered by OpenAI GPT-4 (a similiar model that ChatGPT is
    using).
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个选择是 Github Copilot。使用 GitHub Copilot，你可以实时获得基于 AI 的建议。GitHub Copilot 在开发者键入代码时会提供代码补全建议，并根据项目的上下文和风格约定将提示转换为编码建议。根据这个 [GitHub
    发布](https://github.blog/changelog/2023-11-30-github-copilot-november-30th-update/)，Copilot
    Chat 现在由 OpenAI GPT-4（与 ChatGPT 使用类似模型）提供动力。
- en: '![](../Images/a0798433c04cedcb85133396e2576aaa.png)'
  id: totrans-92
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a0798433c04cedcb85133396e2576aaa.png)'
- en: Github Copilot Example — image by Github
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: Github Copilot 示例 — 图片来自 Github
- en: I have been actively using CodeGPT as a VSCode Extension before I knew that
    Github Copilot is accessible for free if you are in education program. CodeGPT
    Co has 1M download to this date on the VSCode Extension Marketplace. CodeGPT allows
    seamless integration with the ChatGPT API, Google PaLM 2, and Meta Llama.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 在我知道 Github Copilot 如果你是教育项目的一部分可以免费使用之前，我已经积极地将 CodeGPT 作为 VSCode 扩展程序使用。CodeGPT
    Co 到目前为止在 VSCode 扩展市场中已有 1M 次下载。CodeGPT 允许与 ChatGPT API、Google PaLM 2 和 Meta Llama
    无缝集成。
- en: '**You can get code suggestions through comments**, here is how:'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: '**你可以通过注释获得代码建议**，以下是方法：'
- en: Write a comment asking for a specific code
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 写一个请求特定代码的注释
- en: Press `cmd + shift + i`
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 按 `cmd + shift + i`
- en: Use the code 😎
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用代码 😎
- en: '![](../Images/263358e62151130f4fa8e230e16f314a.png)'
  id: totrans-99
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/263358e62151130f4fa8e230e16f314a.png)'
- en: '**You can also initiate a chat** via the extension in the menu and jump into
    coding conversations 💬'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: '**你也可以通过菜单中的扩展程序启动聊天** 并进入编码对话 💬'
- en: '![](../Images/71ddba2b52ff98d712c8ae1f6181fcaf.png)'
  id: totrans-101
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/71ddba2b52ff98d712c8ae1f6181fcaf.png)'
- en: As I reflect on my coding journey, the invaluable lesson learned is that there’s
    no one-size-fits-all approach to learning. It’s essential to embrace a diverse
    array of learning methods, seamlessly blending traditional practices like browsing
    and community interaction with the innovative capabilities of tools like ChatGPT
    and auto code-completion tools.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 当我回顾我的编码之旅时，学到的宝贵教训是，没有一种适合所有学习的方法。重要的是要拥抱多样化的学习方法，无缝地将传统的浏览和社区互动实践与ChatGPT和自动代码补全工具等创新工具的能力相结合。
- en: 'What to Do:'
  id: totrans-103
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 要做什么：
- en: '***Utilize Tailored Learning Resources**:* Make the most of ChatGPT’s recommendations
    for learning materials.'
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***利用定制学习资源：**充分利用ChatGPT对学习材料的推荐。'
- en: '***Collaborate for Problem-Solving**:* Utilize ChatGPT as a collaborative partner
    as if you are coding with your friends.'
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***协作解决问题：**将ChatGPT作为协作伙伴使用，就像你与朋友一起编码一样。'
- en: 'What Not to Do:'
  id: totrans-106
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 不要做什么：
- en: '***Over-Dependence on ChatGPT:* **Avoid relying solely on ChatGPT and ensure
    a balanced approach to foster independent problem-solving skills.'
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***过度依赖ChatGPT：**避免仅依赖ChatGPT，并确保采取平衡的方法来培养独立解决问题的能力。'
- en: '***Neglect Real-Time Interaction with Coding Community:* **While ChatGPT offers
    valuable insights, don’t neglect the benefits of real-time interaction and feedback
    from coding communities. That also helps build a reputation in the community'
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***忽视与编码社区的实时互动：**虽然ChatGPT提供了有价值的见解，但不要忽视实时互动和编码社区反馈的好处。这也有助于在社区中建立声誉'
- en: '***Disregard Practical Coding Practice:* **Balance ChatGPT guidance with hands-on
    coding practice to reinforce theoretical knowledge with practical application.'
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***忽视实际编码实践：**平衡ChatGPT的指导与实际编码实践，以通过实际应用巩固理论知识。'
- en: '**Let me know in the comments how you use ChatGPT to help you code!**'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: '**在评论中告诉我你是如何使用ChatGPT来帮助你编码的！**'
- en: Happy coding!
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 编程愉快！
