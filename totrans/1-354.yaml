- en: Welcome to our final monthly recap of the summer! From [agentic AI](https://towardsdatascience.com/tag/agentic-ai/) workflows
    to cutting-edge tools, our community ignored the heat and remained as focused
    as ever on practical data and machine learning solutions that help teams and practitioners
    excel.
  prefs: []
  type: TYPE_NORMAL
- en: As for our authors, they responded with top-notch articles that cut through
    the noise—whether it’s LLM hype or the nearest beach party—and unpacked complex
    topics into accessible and actionable reads. Let’s explore August’s most popular
    stories.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: How We Reduced LLM Costs by 90% with 5 Lines of Code
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '[Uri Peled](https://towardsdatascience.com/author/uri-peled/)‘s first TDS article
    made waves as soon as it came out — which is hardly a surprise when an article
    is engaging, clear, *and* might just help your company spend less on LLMs. The
    takeaway is essential: “small, overlooked design decisions, sometimes just a few
    lines of code, can lead to massive inefficiencies.”'
  prefs: []
  type: TYPE_NORMAL
- en: '[How We Reduced LLM Costs by 90% with 5 Lines of Code](https://towardsdatascience.com/how-we-reduced-llm-cost-by-90-with-5-lines-of-code/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Advanced Prompt Engineering for Data Science Projects
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Can better prompts help data professionals become more productive? For Sara
