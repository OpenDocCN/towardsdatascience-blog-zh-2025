  prefs: []
  type: TYPE_NORMAL
- en: LangGraph in the Spotlight
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'While not exactly new, several authors have found fresh use cases for LangGraph,
    an open-source tool that enables multi-agent systems using graph-based architectures.
    Two such articles became instant hits in the past month:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: 'LangGraph 101: Let’s Build A Deep Research Agent, by Shuai Guo'
  id: totrans-20
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '[LangGraph 101: Let’s Build A Deep Research Agent](https://towardsdatascience.com/langgraph-101-lets-build-a-deep-research-agent/)'
  id: totrans-21
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'LangGraph + SciPy: Building an AI That Reads Documentation and Makes Decisions,
    by Gustavo Santos'
  id: totrans-22
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '[LangGraph + SciPy: Building an AI That Reads Documentation and Makes Decisions](https://towardsdatascience.com/langgraph-scipy-building-an-ai-that-reads-documentation-and-makes-decisions/)'
