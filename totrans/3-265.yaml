- en: Build a Decision Tree in Polars from Scratch
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/build-a-decision-tree-in-polars-from-scratch/](https://towardsdatascience.com/build-a-decision-tree-in-polars-from-scratch/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Decision tree algorithms have always fascinated me. They are easy to implement
    and achieve good results on various classification and regression tasks. Combined
    with boosting, decision trees are still state-of-the-art in many applications.
  prefs: []
  type: TYPE_NORMAL
- en: Frameworks such as sklearn, lightgbm, xgboost and catboost have done a very
    good job until today. However, in the past few months, I have been missing support
    for arrow datasets. While lightgbm has recently added support for that, it is
    still missing in most other frameworks. The arrow data format could be a perfect
    match for decision trees since it has a columnar structure optimized for efficient
    data processing. Pandas already added support for that and also polars uses the
    advantages.
  prefs: []
  type: TYPE_NORMAL
- en: Polars has shown some significant performance advantages over most other data
    frameworks. It uses the data efficiently and avoids copying the data unnecessarily.
    It also provides a streaming engine that allows the processing of larger data
    than memory. This is why I decided to use polars as a backend for building a decision
    tree from scratch.
  prefs: []
  type: TYPE_NORMAL
- en: The goal is to explore the advantages of using polars for decision trees in
    terms of memory and runtime. And, of course, learning more about polars, efficiently
    defining expressions, and the streaming engine.
  prefs: []
  type: TYPE_NORMAL
- en: The code for the implementation can be found in this [repository](https://github.com/tocab/efficient-trees).
  prefs: []
  type: TYPE_NORMAL
- en: Code overview
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'To get a first overview of the code, I will show the structure of the `DecisionTreeClassifier`
    first:'
  prefs: []
  type: TYPE_NORMAL
- en: The first important thing can be seen in the imports. It was important for me
    to keep the import section clean and with as few dependencies as possible. This
    was successful with only having dependencies to polars, pickle, and typing.
  prefs: []
  type: TYPE_NORMAL
- en: The init method allows to define if the polars streaming engine should be used.
    Also, the `max_depth` of the tree can be set here. Another feature in the definition
    of categorical columns. These are handled in a different way than numerical features
    using a target encoding.
  prefs: []
  type: TYPE_NORMAL
- en: It is possible to save and load the decision tree model. It is represented as
    a nested dict and can be saved to disk as a pickled file.
  prefs: []
  type: TYPE_NORMAL
- en: The polars magic happens in the `fit()` and `build_tree()` methods. These accept
    both LazyFrames and DataFrames to have support for in-memory processing and streaming.
  prefs: []
  type: TYPE_NORMAL
- en: There are two prediction methods available, `predict()` and `predict_many()`.
    The `predict()` method can be used on a small example size, and the data needs
    to be provided as a dict. If we have a big test set, it is more efficient to use
    the `predict_many()` method. Here, the data can be provided as a polars DataFrame
    or LazyFrame.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Fitting the tree
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To train the decision tree classifier, the `fit()` method needs to be used.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: It receives a polars LazyFrame or DataFrame that contains all features and the
    target column. To identify the target column, the `target_name` needs to be provided.
  prefs: []
  type: TYPE_NORMAL
- en: Polars provides a convenient way to optimize the memory usage of the data.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: With that, all columns are selected and evaluated. It will convert the `dtype`
    to the smallest possible value.
  prefs: []
  type: TYPE_NORMAL
- en: The categorical encoding
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To encode categorical values, a target encoding is used. For that, all instances
    of a categorical feature will be aggregated, and the average target value will
    be calculated. Then, the instances are sorted by the average target value, and
    a rank is assigned. This rank will be used as the representation of the feature
    value.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: Since it is possible to provide polars DataFrames and LazyFrames, I use `data.lazy()`
    first. If the given data is a DataFrame, it will be converted to a LazyFrame.
    If it is already a LazyFrame, it only returns self. With that trick, it is possible
    to ensure that the data is processed in the same way for LazyFrames and DataFrames
    and that the `collect()` method can be used, which is only available for LazyFrames.
  prefs: []
  type: TYPE_NORMAL
- en: To illustrate the outcome of the calculations in the different steps of the
    fitting process, I apply it to a dataset for heart disease prediction. It can
    be found on [Kaggle](https://www.kaggle.com/datasets/colewelkins/cardiovascular-disease) and
    is published under the Database Contents License.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here is an example of the categorical feature representation for the glucose
    levels:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: For each of the glucose levels, the probability of having a heart disease is
    calculated. This is sorted and then ranked so that each of the levels is mapped
    to a rank value.
  prefs: []
  type: TYPE_NORMAL
- en: Getting the target values
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As the last part of the `fit()` method, the unique target values are determined.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: This serves as the last preparation before calling the `_build_tree()` method
    recursively.
  prefs: []
  type: TYPE_NORMAL
- en: Building the tree
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: After the data is prepared in the `fit()` method, the `_build_tree()` method
    is called. This is done recursively until a stopping criterion is met, e.g., the
    max depth of the tree is reached. The first call is executed from the `fit()`
    method with a depth of zero.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: This method is the heart of building the trees and I will explain it step by
    step. First, when entering the method, it is checked if the max depth stopping
    criterion is met.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: 'If the current depth is equal to or greater than the `max_depth`, a node of
    the type leaf will be returned. The value of the leaf corresponds to the majority
    class of the data. This is calculated as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: To get the majority class, the count of rows per target is determined by grouping
    over the target column and aggregating with `len()`. The target instance, which
    is present in most of the rows, is returned as the majority class.
  prefs: []
  type: TYPE_NORMAL
- en: Information Gain as Splitting Criteria
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To find a good split of the data, the information gain is used.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/dd943094f7715f8f60f6208a92c4524c.png)'
  prefs: []
  type: TYPE_IMG
- en: Equation 1 — Calculation of information gain. Image by author.
  prefs: []
  type: TYPE_NORMAL
- en: To get the information gain, the parent entropy and child entropy need to be
    calculated.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/18bbbc0e4605336d43ba50459bb5cd07.png)'
  prefs: []
  type: TYPE_IMG
- en: Equation 2 — Calculation of entropy. Image by author.
  prefs: []
  type: TYPE_NORMAL
- en: Calculating The Information Gain in Polars
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The information gain is calculated for each feature value that is present in
    a feature column.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: The feature values are grouped, and the count of each of the target values is
    assigned to it. Additionally, the total count of rows for that feature value is
    saved as `count_examples`. In the last step, the data is sorted by `feature_value`.
    This is needed to calculate the splits in the next step.
  prefs: []
  type: TYPE_NORMAL
- en: 'For the heart disease dataset, after the first calculation step, the data looks
    like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: Here, the feature `age_years` is processed. `Class 0` stands for “no heart disease,”
    and class 1 stands for “heart disease.” The data is sorted by the age of years
    feature, and the columns contain the count of `class 0`, `class 1`, and the total
    count of examples with the respective feature value.
  prefs: []
  type: TYPE_NORMAL
- en: In the next step, the cumulative sum over the count of classes is calculated
    for each feature value.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: The intuition behind it is that when a split is executed over a specific feature
    value, it includes the count of target values from smaller feature values. To
    be able to calculate the proportion, the total sum of the target values is calculated.
    The same procedure is repeated for `count_examples`, where the cumulative sum
    and the total sum are calculated as well.
  prefs: []
  type: TYPE_NORMAL
- en: 'After the calculation, the data looks like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: In the next step, the proportions are calculated for each feature value.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: To calculate the proportions, the results from the previous step can be used.
    For the left proportion, the cumulative sum of each target value is divided by
    the cumulative sum of the example count. For the right proportion, we need to
    know how many examples we have on the right side for each target value. That is
    calculated by subtracting the total sum for the target value from the cumulative
    sum of the target value. The same calculation is used to determine the total count
    of examples on the right side by subtracting the sum of the example count from
    the cumulative sum of the example count. Additionally, the parent proportion is
    calculated. This is done by dividing the sum of the target values counts by the
    total count of examples.
  prefs: []
  type: TYPE_NORMAL
- en: 'This is the result data after this step:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: Now that the proportions are available, the entropy can be calculated.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: For the calculation of the entropy, Equation 2 is used. The left entropy is
    calculated using the left proportion, and the right entropy uses the right proportion.
    For the parent entropy, the parent proportion is used. In this implementation,
    `pl.sum_horizontal()` is used to calculate the sum of the proportions to make
    use of possible optimizations from polars. This can also be replaced with the
    `python-native sum()` method.
  prefs: []
  type: TYPE_NORMAL
- en: 'The data with the entropy values look as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: Almost there! The final step is missing, which is calculating the child entropy
    and using that to get the information gain.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: For the child entropy, the left and right entropy are weighted by the count
    of examples for the feature values. The sum of both weighted entropy values is
    used as child entropy. To calculate the information gain, we simply need to subtract
    the child entropy from the parent entropy, as can be seen in Equation 1\. The
    best feature value is determined by sorting the data by information gain and selecting
    the first row. It is appended to a list that gathers all the best feature values
    from all features.
  prefs: []
  type: TYPE_NORMAL
- en: 'Before applying `.head(1)`, the data looks as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: Here, it can be seen that the age feature value of 54 has the highest information
    gain. This feature value will be collected for the age feature and needs to compete
    against the other features.
  prefs: []
  type: TYPE_NORMAL
- en: Selecting Best Split and Define Sub Trees
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To select the best split, the highest information gain needs to be found across
    all features.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE19]'
  prefs: []
  type: TYPE_PRE
- en: For that, the `pl.collect_all()` method is used on `information_gain_dfs`. This
    evaluates all LazyFrames in parallel, which makes the processing very efficient.
    The result is a list of polars DataFrames, which are concatenated and sorted by
    information gain.
  prefs: []
  type: TYPE_NORMAL
- en: 'For the heart disease example, the data looks like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE20]'
  prefs: []
  type: TYPE_PRE
- en: Out of all features, the ap_hi (Systolic blood pressure) feature value of 129
    results in the best information gain and thus will be selected for the first split.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE21]'
  prefs: []
  type: TYPE_PRE
- en: In some cases, `information_gain_dfs` might be empty, for example, when all
    splits result in having only examples on the left or right side. If this is the
    case, the information gain is zero. Otherwise, we get the feature value with the
    highest information gain.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE22]'
  prefs: []
  type: TYPE_PRE
- en: When the information gain is greater than zero, the sub-trees are defined. For
    that, the left mask is defined using the feature value that resulted in the best
    information gain. The mask is applied to the parent data to get the left data
    frame. The negation of the left mask is used to define the right data frame. Both
    left and right data frames are used to call the `_build_tree()` method again with
    an increased depth+1\. As the last step, the target distribution is calculated.
    This is used as additional information on the node and will be visible when plotting
    the tree along with the other information.
  prefs: []
  type: TYPE_NORMAL
- en: When information gain is zero, a leaf instance will be returned. This contains
    the majority class of the given data.
  prefs: []
  type: TYPE_NORMAL
- en: Make predictions
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: It is possible to make predictions in two different ways. If the input data
    is small, the `predict()` method can be used.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE23]'
  prefs: []
  type: TYPE_PRE
- en: Here, the data can be provided as an iterable of dicts. Each dict contains the
    feature names as keys and the feature values as values. By using the `_predict_sample()`
    method, the path in the tree is followed until a leaf node is reached. This contains
    the class that is assigned to the respective example.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE24]'
  prefs: []
  type: TYPE_PRE
- en: If a big example set should be predicted, it is more efficient to use the `predict_many()`
    method. This makes use of the advantages that polars provides in terms of parallel
    processing and memory efficiency.
  prefs: []
  type: TYPE_NORMAL
- en: The data can be provided as a polars DataFrame or LazyFrame. Similarly to the
    `_build_tree()` method in the training process, a `_predict_many()` method is
    called recursively. All examples in the data are filtered into sub-trees until
    the leaf node is reached. Examples that went the same path to the leaf node get
    the same prediction value assigned. At the end of the process, all sub-frames
    of examples are concatenated again. Since the order can not be preserved with
    that, a temporary prediction index is set at the beginning of the process. When
    all predictions are done, the original order is restored with sorting by that
    index.
  prefs: []
  type: TYPE_NORMAL
- en: Using the classifier on a dataset
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A usage example for the decision tree classifier can be found [here](https://github.com/tocab/efficient-trees/blob/main/examples/heart_disease.py).
    The decision tree is trained on a heart disease dataset. A train and test set
    is defined to test the performance of the implementation. After the training,
    the tree is plotted and saved to a file.
  prefs: []
  type: TYPE_NORMAL
- en: 'With a max depth of four, the resulting tree looks as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/76cf579cf830808d871987b968928b3b.png)'
  prefs: []
  type: TYPE_IMG
- en: Decision tree for heart disease dataset. Image by author.
  prefs: []
  type: TYPE_NORMAL
- en: It achieves a train and test accuracy of 73% on the given data.
  prefs: []
  type: TYPE_NORMAL
- en: Runtime comparison
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: One goal of using polars as a backend for decision trees is to explore the runtime
    and memory usage and compare it to other frameworks. For that, I created a memory
    profiling script that can be found [here](https://github.com/tocab/efficient-trees/blob/main/examples/memory_profiling.py).
  prefs: []
  type: TYPE_NORMAL
- en: The script compares this implementation, which is called “efficient-trees” against
    sklearn and lightgbm. For efficient-trees, the lazy streaming variant and non-lazy
    in-memory variant are tested.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/193abf00534e60ca312bb086dd86cf27.png)'
  prefs: []
  type: TYPE_IMG
- en: Comparison of runtime and memory usage. Image by author.
  prefs: []
  type: TYPE_NORMAL
- en: In the graph, it can be seen that lightgbm is the fastest and most memory-efficient
    framework. Since it introduced the possibility of using arrow datasets a while
    ago, the data can be processed efficiently. However, since the whole dataset still
    needs to be loaded and can’t be streamed, there are still potential scaling issues.
  prefs: []
  type: TYPE_NORMAL
- en: The next best framework is efficient-trees without and with streaming. While
    efficient-trees without streaming has a better runtime, the streaming variant
    uses less memory.
  prefs: []
  type: TYPE_NORMAL
- en: The sklearn implementation achieves the worst results in terms of memory usage
    and runtime. Since the data needs to be provided as a numpy array, the memory
    usage grows a lot. The runtime can be explained by using only one CPU core. Support
    for multi-threading or multi-processing doesn’t exist yet.
  prefs: []
  type: TYPE_NORMAL
- en: 'Deep dive: Streaming in polars'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As can be seen in the comparison of the frameworks, the possibility of streaming
    the data instead of having it in memory makes a difference to all other frameworks.
    However, the streaming engine is still considered an experimental feature, and
    not all operations are compatible with streaming yet.
  prefs: []
  type: TYPE_NORMAL
- en: 'To get a better understanding of what happens in the background, a look into
    the execution plan is useful. Let’s jump back into the training process and get
    the execution plan for the following operation:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE25]'
  prefs: []
  type: TYPE_PRE
- en: 'The execution plan for data can be created with the following command:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE26]'
  prefs: []
  type: TYPE_PRE
- en: This returns the execution plan for the LazyFrame.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE27]'
  prefs: []
  type: TYPE_PRE
- en: The keyword that is important here is `STREAMING`. It can be seen that the initial
    dataset loading happens in the streaming mode, but when shrinking the `dtypes`,
    the whole dataset needs to be loaded into memory. Since the `dtype` shrinking
    is not a necessary part, I remove it temporarily to explore until what operation
    streaming is supported.
  prefs: []
  type: TYPE_NORMAL
- en: The next problematic operation is assigning the categorical features.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE28]'
  prefs: []
  type: TYPE_PRE
- en: The replace expression doesn’t support the streaming mode. Even after removing
    the cast, streaming is not used which can be seen in the execution plan.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE29]'
  prefs: []
  type: TYPE_PRE
- en: Moving on, I also remove the support for categorical features. What happens
    next is the calculation of the information gain.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE30]'
  prefs: []
  type: TYPE_PRE
- en: Unfortunately, already in the first part of calculating, the streaming mode
    is not supported anymore. Here, using `pl.col().filter()` prevents us from streaming
    the data.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE31]'
  prefs: []
  type: TYPE_PRE
- en: Since this is not so easy to change, I will stop the exploration here. It can
    be concluded that in the decision tree implementation with polars backend, the
    full potential of streaming can’t be used yet since important operators are still
    missing streaming support. Since the streaming mode is under active development,
    it might be possible to run most of the operators or even the whole calculation
    of the decision tree in the streaming mode in the future.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this blog post, I presented my custom implementation of a decision tree using
    polars as a backend. I showed implementation details and compared it to other
    decision tree frameworks. The comparison shows that this implementation can outperform
    sklearn in terms of runtime and memory usage. But there are still other frameworks
    like lightgbm that provide a better runtime and more efficient processing. There
    is a lot of potential in the streaming mode when using polars backend. Currently,
    some operators prevent an end-to-end streaming approach due to a lack of streaming
    support, but this is under active development. When polars makes progress with
    that, it is worth revisiting this implementation and comparing it to other frameworks
    again.
  prefs: []
  type: TYPE_NORMAL
