- en: Nine Pico PIO Wats with MicroPython (Part 1)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用 MicroPython 的九个 Pico PIO Wats（第一部分）
- en: 原文：[https://towardsdatascience.com/nine-pico-pio-wats-with-micropython-part-1-82b80fb84473/](https://towardsdatascience.com/nine-pico-pio-wats-with-micropython-part-1-82b80fb84473/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/nine-pico-pio-wats-with-micropython-part-1-82b80fb84473/](https://towardsdatascience.com/nine-pico-pio-wats-with-micropython-part-1-82b80fb84473/)
- en: '![Pico PIO Surprises - Source: https://openai.com/dall-e-2/. All other figures
    from the author.](../Images/145c7af97ee3449b673a7ca702cf9fbc.png)'
  id: totrans-2
  prefs: []
  type: TYPE_IMG
  zh: '![Pico PIO 惊喜 - 来源：https://openai.com/dall-e-2/。所有其他图像来自作者。](../Images/145c7af97ee3449b673a7ca702cf9fbc.png)'
- en: 'Pico PIO Surprises – Source: [https://openai.com/dall-e-2/](https://openai.com/dall-e-2/).
    All other figures from the author.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: Pico PIO 惊喜 – 来源：[https://openai.com/dall-e-2/](https://openai.com/dall-e-2/)。所有其他图像来自作者。
- en: '*Also available: [A Rust version of this article](https://medium.com/towards-data-science/nine-pico-pio-wats-with-rust-part-1-9d062067dc25)*'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: '*也提供：[本文的Rust版本](https://medium.com/towards-data-science/nine-pico-pio-wats-with-rust-part-1-9d062067dc25)*'
- en: In JavaScript and other languages, we call [a surprising or inconsistent behavior
    a "Wat!"](https://www.destroyallsoftware.com/talks/wat) [that is, a "What!?"].
    For example, in JavaScript, an empty array plus an empty array produces an empty
    string, `[] + [] === ""`. Wat!
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在JavaScript和其他语言中，我们称[令人惊讶或不一致的行为为"Wat!"（即"What!?"]](https://www.destroyallsoftware.com/talks/wat)。例如，在JavaScript中，一个空数组加一个空数组产生一个空字符串，`[]
    + [] === ""`。Wat!
- en: Python, by comparison, is more consistent and predictable. However, one corner
    of MicroPython on the Raspberry Pi Pico microcontroller offers similar surprises.
    Specifically, the Pico’s **Programmable Input/Output (PIO)** subsystem, while
    incredibly powerful and versatile, comes with peculiarities.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 与之相比，Python更一致、更可预测。然而，在Raspberry Pi Pico微控制器上的MicroPython的一个角落提供了类似的惊喜。具体来说，Pico的**可编程输入/输出（PIO）**子系统，虽然功能强大且灵活，但也存在一些特殊性。
- en: 'PIO programming matters because it provides an ingenious solution to the challenge
    of precise, low-level hardware control. It is incredibly fast – even when programmed
    from MicroPython, PIO performs just as efficiently as it does from Rust or C/C++.
    Its flexibility is unparalleled: rather than relying on special-purpose hardware
    for the countless peripherals you might want to control, PIO allows you to define
    custom behaviors in software, seamlessly adapting to your needs without adding
    hardware complexity.'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: PIO编程很重要，因为它为精确、低级硬件控制挑战提供了一个巧妙的解决方案。它非常快——即使从MicroPython编程，PIO的表现也和从Rust或C/C++编程一样高效。它的灵活性无与伦比：而不是依赖于特殊用途的硬件来控制你可能想要控制的无数外围设备，PIO允许你在软件中定义自定义行为，无缝适应你的需求，而不会增加硬件复杂性。
- en: 'Consider this simple example: a $15 theremin-like musical instrument. By waving
    their hand in the air, the musician changes the pitch of (admittedly annoying)
    tones. Using PIO provides a simple way to program this device that ensures it
    reacts instantly to movement.'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑这个简单的例子：一个价值15美元的类似瑟琳娜的乐器。通过在空中挥动手臂，音乐家改变（诚然令人讨厌）的音调。使用PIO提供了一种简单的方式来编程这个设备，确保它能够即时响应运动。
- en: 'So, all is wonderful, except – to paraphrase Spider-Man:'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 所以，一切都很美好，除了——用蜘蛛侠的话来说：
- en: With great power comes… nine Wats!?
  id: totrans-10
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 权力越大，带来的惊喜也越多！九个Wats!？
- en: We’ll explore and illustrate those nine PIO Wats through the creation of this
    theremin.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将通过创建这个瑟琳娜来探索和展示这九个PIO Wats。
- en: '**Who Is This Article For?**'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '**本文面向谁？**'
- en: '**All Programmers**: Microcontrollers like the Pico cost under $7 and support
    high-level languages like Python, Rust, and C/C++. This article will show how
    microcontrollers let your programs interact with the physical world and introduce
    you to programming the Pico’s low-level, high-performance PIO hardware.'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**所有程序员**: 像Pico这样的微控制器价格低于7美元，并支持Python、Rust和C/C++等高级语言。本文将展示微控制器如何让您的程序与物理世界交互，并介绍如何编程Pico的低级、高性能PIO硬件。'
- en: '**MicroPython Pico Programmers**: Curious about the Pico’s hidden potential?
    Beyond its two main cores, it has eight tiny "state machines" dedicated to PIO
    programming. These state machines take over time-critical tasks, freeing up the
    main processors for other work and enabling surprising parallelism.'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**MicroPython Pico 程序员**: 对 Pico 的隐藏潜力感到好奇吗？除了其两个主要核心之外，它还拥有八个专门用于 PIO 编程的微型“状态机”。这些状态机接管了时间敏感的任务，为其他工作释放了主处理器，并实现了令人惊讶的并行性。'
- en: '**C/C++ Pico Programmers**: While this article uses MicroPython, PIO programming
    is – for good and bad – nearly identical across all languages. If you understand
    it here, you’ll be well-equipped to apply it in C/C++.'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**C/C++ Pico 程序员**：虽然这篇文章使用 MicroPython，但 PIO 编程——无论是好是坏——在所有语言中几乎都是相同的。如果你在这里理解了它，你将准备好在
    C/C++ 中应用它。'
- en: '***Rust Pico Programmers:** You may wish to read the [Rust version of this
    article.](https://medium.com/towards-data-science/nine-pico-pio-wats-with-rust-part-1-9d062067dc25)*'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***Rust Pico 程序员：** 你可能希望阅读 [Rust 版本的这篇文章。](https://medium.com/towards-data-science/nine-pico-pio-wats-with-rust-part-1-9d062067dc25)*'
- en: '**PIO Programmers**: The journey through nine Wats may not be as entertaining
    as JavaScript’s quirks (thankfully), but it will shed light on the peculiarities
    of PIO programming. If you’ve ever found PIO programming confusing, this article
    should reassure you that the problem isn’t (necessarily) you – it’s partly PIO
    itself. Most importantly, understanding these Wats will make writing PIO code
    simpler and more effective.'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**PIO 程序员**：通过九个 Wat 的旅程可能不如 JavaScript 的怪癖那么有趣（幸运的是），但它将揭示 PIO 编程的奇特之处。如果你曾经觉得
    PIO 编程令人困惑，这篇文章应该会让你放心，问题（不一定）是你——部分原因是 PIO 本身。最重要的是，理解这些 Wat 将使编写 PIO 代码变得更加简单和有效。'
- en: 'Finally, this article isn’t about "fixing" PIO programming. PIO excels at its
    primary purpose: efficiently and flexibly handling custom peripheral interfaces.
    Its design is purposeful and well-suited to its goals. Instead, this article focuses
    on understanding PIO programming and its quirks – starting with a bonus Wat.'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，这篇文章并不是关于 "修复" PIO 编程。PIO 在其主要目的上表现出色：高效且灵活地处理自定义外设接口。其设计是有目的的，非常适合其目标。相反，这篇文章专注于理解
    PIO 编程及其怪癖——从奖励 Wat 开始。
- en: 'Bonus Wat 0: "State Machines" Are Not State Machines – Except When They Are'
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '奖励 Wat 0: "状态机" 不是状态机——除非它们是'
- en: Despite their name, the eight "PIO state machines" in the Raspberry Pi Pico
    are not state machines in the strict, formal sense of computer science. A classical
    **[finite state machine (FSM)](https://en.wikipedia.org/wiki/Finite-state_machine)**
    consists of a finite set of states and transitions, driven purely by input symbols.
    In contrast, the Pico’s PIO state machines are tiny programmable processors with
    their own instruction set. Unlike a formal FSM, they have a program counter, **[registers](https://en.wikipedia.org/wiki/Register_machine)**,
    and **the ability to modify those registers** through shifting and decrementing,
    allowing them to store intermediate values and influence execution flow beyond
    fixed state transitions.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管它们的名称如此，树莓派 Pico 中的八个 "PIO 状态机" 并不是在计算机科学严格、正式意义上的状态机。一个经典的 **[有限状态机 (FSM)](https://en.wikipedia.org/wiki/Finite-state_machine)**
    由有限的状态和转换组成，完全由输入符号驱动。相比之下，Pico 的 PIO 状态机是具有自己指令集的小型可编程处理器。与正式的 FSM 不同，它们有一个程序计数器、**[寄存器](https://en.wikipedia.org/wiki/Register_machine)**，以及通过移位和递减来修改这些寄存器的**能力**，这使得它们能够存储中间值并影响执行流程，而不仅仅是固定的状态转换。
- en: 'That said, calling them **[programmable state machines](https://www.reddit.com/r/raspberrypipico/comments/1idteeq/comment/ma5kgy0/)**
    makes sense: rather than having a fixed set of predefined states, their behavior
    depends on the program they execute. And in most cases, that program will define
    a state machine or something similar – especially since PIO is often used to implement
    precise, state-driven I/O control.'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 话虽如此，称它们为 **[可编程状态机](https://www.reddit.com/r/raspberrypipico/comments/1idteeq/comment/ma5kgy0/)**
    是有道理的：它们的行为不是基于一组预定义的状态，而是取决于它们执行的程序。在大多数情况下，这个程序将定义一个状态机或类似的东西——特别是由于 PIO 经常用于实现精确、状态驱动的
    I/O 控制。
- en: Each PIO processes one instruction per clock cycle. The $4 Pico 1 runs at 125
    million cycles per second, while the $5 Pico 2 offers a faster 150 million cycles
    per second. Each instruction performs a simple operation, such as "move a value"
    or "jump to a label".
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 每个 PIO 在每个时钟周期处理一条指令。$4 Pico 1 以每秒 1.25 亿个周期的速度运行，而 $5 Pico 2 提供更快的每秒 1.5 亿个周期。每条指令执行一个简单的操作，例如
    "移动一个值" 或 "跳转到标签"。
- en: With that bonus Wat out of the way, let’s move to our first main Wat.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 在解决了那个奖励 Wat 之后，让我们转向我们的第一个主要 Wat。
- en: 'Wat 1: The Register Hunger Games'
  id: totrans-24
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 'Wat 1: 寄存器饥饿游戏'
- en: 'In PIO programming, a **register** is a small, fast storage location that acts
    like a variable for the state machine. You might dream of an abundance of variables
    to hold your counters, delays, and temporary values, but the reality is brutal:
    you only get two general-purpose registers, `x` and `y`. It’s like The Hunger
    Games, where no matter how many tributes enter the arena, only Katniss and Peeta
    emerge as victors. You’re forced to winnow down your needs to fit within these
    two registers, ruthlessly deciding what to prioritize and what to sacrifice. Also,
    like the Hunger Games, we can sometimes bend the rules.'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 在 PIO 编程中，一个 **寄存器** 是一个小型、快速的存储位置，它像变量一样作用于状态机。你可能梦想拥有大量的变量来存储你的计数器、延迟和临时值，但现实是残酷的：你只有两个通用寄存器，`x`
    和 `y`。这就像《饥饿游戏》，无论有多少贡品进入竞技场，只有凯特尼斯和皮塔能成为胜利者。你必须无情地削减你的需求，以适应这两个寄存器，决定什么要优先考虑，什么要牺牲。同样，就像《饥饿游戏》一样，我们有时可以弯曲规则。
- en: 'Let’s start with a challenge: create a backup beeper – 1000 Hz for ½ second,
    silence for ½ second, repeat. The result? "Beep Beep Beep…"'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从一项挑战开始：创建一个备用蜂鸣器 – 1000 Hz 持续 ½ 秒，然后静音 ½ 秒，重复。结果？ "哔哔哔……"
- en: 'We would like five variables:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 我们希望有五个变量：
- en: '`half_period:` The number of clock cycles to hold the voltage high and then
    low to create a 1000 Hz tone. This is 150,000,000 / 1000 / 2 = 75,000 cycles high
    and 75,000 cycles low.'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`half_period`：保持电压高然后低的时钟周期数，以创建 1000 Hz 的音调。这是 150,000,000 / 1000 / 2 = 75,000
    个周期高电平和 75,000 个周期低电平。'
- en: '![Voltage and timing (millisecond and clock cycles) to generate a 1000 Hz square
    tone.](../Images/da70a657d41cadffec4b04092947c0b8.png)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
  zh: '![生成 1000 Hz 方波所需的电压和时序（毫秒和时钟周期）](../Images/da70a657d41cadffec4b04092947c0b8.png)'
- en: Voltage and timing (millisecond and clock cycles) to generate a 1000 Hz square
    tone.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 生成 1000 Hz 方波所需的电压和时序（毫秒和时钟周期）。
- en: '`y`: Loop counter from 0 to `half_period` to create a delay.'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`y`：从 0 到 `half_period` 的循环计数器，以创建延迟。'
- en: '`period_count`: The number of repeated periods needed to fill ½ second of time.
    150,000,000 × 0.5 / (75,000 × 2) = 500.'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`period_count`：填充 ½ 秒时间的重复周期数。150,000,000 × 0.5 / (75,000 × 2) = 500。'
- en: '`x`: Loop counter from 0 to `period_count` to fill ½ second of time.'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`x`：从 0 到 `period_count` 的循环计数器，以填充 ½ 秒的时间。'
- en: '`silence_cycles`: The number of clock cycles for ½ second of silence. 150,000,000
    × 0.5 = 75,000,000.'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`silence_cycles`：½ 秒静音的时钟周期数。150,000,000 × 0.5 = 75,000,000。'
- en: '![](../Images/31eed07561daea2661cb712296a3647b.png)'
  id: totrans-35
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/31eed07561daea2661cb712296a3647b.png)'
- en: We want five registers but can only have two, so let the games begin! May the
    odds be ever in your favor.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 我们想要五个寄存器，但只能有两个，所以游戏开始了！愿好运永远在您这边。
- en: First, we can eliminate `silence_cycles` because it can be derived as `half_period
    × period_count × 2`. While PIO doesn’t support multiplication, it does support
    loops. By nesting two loops—where the inner loop delays for 2 clock cycles—we
    can create a delay of 75,000,000 clock cycles.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们可以消除 `silence_cycles`，因为它可以表示为 `half_period × period_count × 2`。虽然 PIO
    不支持乘法，但它支持循环。通过嵌套两个循环——其中内循环延迟 2 个时钟周期——我们可以创建 75,000,000 个时钟周期的延迟。
- en: 'One variable down, but how can we eliminate two more? Fortunately, we don’t
    have to. While PIO only provides two general-purpose registers, `x` and `y`, it
    also includes two special-purpose registers: `osr` (output shift register) and
    `isr` (input shift register).'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 一个变量已经确定，但我们如何消除另外两个？幸运的是，我们不必这样做。虽然 PIO 只提供两个通用寄存器，`x` 和 `y`，但它还包括两个专用寄存器：`osr`（输出移位寄存器）和
    `isr`（输入移位寄存器）。
- en: 'The PIO code that we’ll see in a moment implements the backup beeper. Here’s
    how it works:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 我们一会儿将看到的 PIO 代码实现了备用蜂鸣器。以下是其工作原理：
- en: '**Initialization**:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: '**初始化**：'
- en: The `pull(block)` instruction reads the half period of the tone (75,000 clock
    cycles) from a buffer and places the value into `osr`.
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`pull(block)` 指令从缓冲区读取音调的半周期（75,000 个时钟周期）并将其值放入 `osr`。'
- en: The value is then copied to `isr` for later use.
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 然后将该值复制到 `isr` 以供后续使用。
- en: The second `pull(block)` reads the period count (500 repeats) from a buffer
    and places the value in `osr`, where we leave it.
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 第二次 `pull(block)` 从缓冲区读取周期计数（500次重复）并将其放置在 `osr` 中，我们将其保留。
- en: '**Beep Loops**:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: '**蜂鸣循环**：'
- en: The `mov(x, osr)` instruction copies the period count into the `x` register,
    which serves as the outer loop counter.
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`mov(x, osr)` 指令将周期计数复制到 `x` 寄存器，该寄存器作为外循环计数器。'
- en: For the inner loops, `mov(y, isr)` repeatedly copies the half period into `y`
    to create delays for the high and low states of the tone.
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对于内循环，`mov(y, isr)` 重复将半周期复制到 `y` 以创建音调的高电平和低电平状态的延迟。
- en: '**Silence Loops**:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: '**静音循环**：'
- en: The silence loops mirror the structure of the beep loops but don’t set any pins,
    so they act solely as a delay.
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 静音循环与蜂鸣循环的结构相似，但不会设置任何引脚，因此它们仅作为延迟使用。
- en: '**Wrap and Continuous Execution**:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: '**包装和连续执行**：'
- en: The `wrap_target()` and `wrap()` instructions define the main loop of the state
    machine.
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`wrap_target()` 和 `wrap()` 指令定义了状态机的主循环。'
- en: After finishing both the beep and silence loops, the state machine jumps back
    near the start of the program, repeating the sequence indefinitely.
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 完成蜂鸣和静音循环后，状态机跳回到程序的开始附近，无限重复序列。
- en: With this outline in mind, here’s the PIO assembly code for generating the backup
    beeper signal.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个大纲的基础上，以下是生成备用蜂鸣器信号的 PIO 汇编代码。
- en: '[PRE0]'
  id: totrans-53
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: And here’s the MicroPython code to configure and run the PIO program for the
    backup beeper. This script initializes the state machine, calculates timing values
    (`half_period` and `period_count`), and sends them to the PIO. It plays the beeping
    sequence for 5 seconds and stops. If connected to a desktop machine via USB, you
    can stop it early with `Ctrl-C`.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 这是配置和运行备用蜂鸣器 PIO 程序的 MicroPython 代码。此脚本初始化状态机，计算计时值（`half_period` 和 `period_count`），并将它们发送到
    PIO。它播放蜂鸣序列 5 秒，然后停止。如果通过 USB 连接到桌面计算机，你可以使用 `Ctrl-C` 提前停止它。
- en: '[PRE1]'
  id: totrans-55
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'Here’s what happens when you run the program:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 当你运行程序时，会发生以下情况：
- en: 'Aside 1: **Running this yourself** The most popular Integrated Development
    Environment (IDE) for programming the Raspberry Pi Pico with MicroPython is [Thonny](https://thonny.org/)**.**
    Personally, I use the [PyMakr](https://marketplace.visualstudio.com/items?itemName=pycom.Pymakr)
    extension for VS Code, though the [MicroPico](https://marketplace.visualstudio.com/items?itemName=paulober.pico-w-go)
    extension is another popular choice. To hear sound, I connected a passive buzzer,
    a resistor, and a transistor to the Pico. For detailed wiring diagrams and a parts
    list, check out the [passive buzzer instructions](https://docs.sunfounder.com/projects/kepler-kit/en/latest/pyproject/py_pa_buz.html#py-pa-buz)
    in the SunFounder’s Kepler Kit.'
  id: totrans-57
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 旁白 1：**亲自运行** 使用 MicroPython 编程 Raspberry Pi Pico 的最流行集成开发环境（IDE）是 [Thonny](https://thonny.org/)**。**我个人使用
    VS Code 的 [PyMakr](https://marketplace.visualstudio.com/items?itemName=pycom.Pymakr)
    扩展，尽管 [MicroPico](https://marketplace.visualstudio.com/items?itemName=paulober.pico-w-go)
    扩展也是一个流行的选择。为了听到声音，我将一个无源蜂鸣器、一个电阻和一个晶体管连接到 Pico 上。有关详细的布线图和零件清单，请查看 SunFounder
    的 Kepler Kit 中的 [无源蜂鸣器说明](https://docs.sunfounder.com/projects/kepler-kit/en/latest/pyproject/py_pa_buz.html#py-pa-buz)。
- en: ''
  id: totrans-58
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Aside 2: If your only goal is to generate tones with the Pico, PIO isn’t necessary.
    MicroPython is fast enough to [toggle pins directly](https://docs.sunfounder.com/projects/kepler-kit/en/latest/pyproject/py_pa_buz.html#py-pa-buz),
    or you can use the Pico’s built-in [pulse width modulation (PWM) feature](https://docs.micropython.org/en/latest/library/machine.PWM.html).'
  id: totrans-59
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 旁白 2：如果你的唯一目标是使用 Pico 生成音调，则不需要 PIO。MicroPython 的速度足够快，可以直接 [切换引脚](https://docs.sunfounder.com/projects/kepler-kit/en/latest/pyproject/py_pa_buz.html#py-pa-buz)，或者你可以使用
    Pico 内置的 [脉冲宽度调制（PWM）功能](https://docs.micropython.org/en/latest/library/machine.PWM.html)。
- en: Alternative Endings to the Register Hunger Games
  id: totrans-60
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 寄存器饥饿游戏的替代结局
- en: 'We used four registers – two general and two special – to resolve the challenge.
    If this solution feels less than satisfying, here are alternative approaches to
    consider:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用了四个寄存器——两个通用和两个特殊——来解决这个挑战。如果这个解决方案感觉不够令人满意，这里有一些可以考虑的替代方法：
- en: '**Use Constants**: Why make `half_period`, `period_count`, and `silence_cycles`
    variables at all? Hardcoding the constants "75,000," "500," and "75,000,000" could
    simplify the design. However, PIO constants have limitations, which we’ll explore
    in **Wat 5**.'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: '**使用常量**：为什么要把 `half_period`、`period_count` 和 `silence_cycles` 作为变量？直接将常量 "75,000"、"500"
    和 "75,000,000" 编入代码可以简化设计。然而，PIO 常量有一些限制，我们将在 **Wat 5** 中探讨。'
- en: '**Pack Bits**: Registers hold 32 bits. Do we really need two registers (2×32=64
    bits) to store `half_period` and `period_count`? No. Storing 75,000 only requires
    17 bits, and 500 requires 9 bits. We could pack these into a single register and
    use the `out` instruction to shift values into `x` and `y`. This approach would
    free up either `osr` or `isr` for other tasks, but only one at a time—the other
    register must hold the packed value.'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: '**打包位**：寄存器包含 32 位。我们真的需要两个寄存器（2×32=64 位）来存储 `half_period` 和 `period_count`
    吗？不。存储 75,000 只需要 17 位，而 500 需要 9 位。我们可以将这些值打包到一个寄存器中，并使用 `out` 指令将值移位到 `x` 和
    `y`。这种方法可以释放 `osr` 或 `isr` 以供其他任务使用，但一次只能使用一个——另一个寄存器必须持有打包的值。'
- en: '**Slow Motion**: In MicroPython, you can configure a PIO state machine to run
    at a slower frequency by simply specifying your desired clock speed. MicroPython
    takes care of the details for you, allowing the state machine to run as slow as
    ~2290 Hz. Running the state machine at a slower speed means that values like `half_period`
    can be smaller, potentially as small as `2`. Small values are easier to hardcode
    as constants and more compactly bit-packed into registers.'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: '**慢动作**：在 MicroPython 中，你可以通过简单地指定你想要的时钟速度来配置一个 PIO 状态机以较慢的频率运行。MicroPython
    会为你处理细节，使状态机可以运行到 ~2290 Hz。以较慢的速度运行状态机意味着像 `half_period` 这样的值可以更小，可能小到 `2`。较小的值更容易作为常量硬编码，并且可以更紧凑地打包到寄存器中。'
- en: A Happy Ending to the Register Hunger Games
  id: totrans-65
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 注册饥饿游戏的快乐结局
- en: The Register Hunger Games demanded strategic sacrifices and creative workarounds,
    but we emerged victorious by leveraging PIO’s special registers and clever looping
    structures. If the stakes had been higher, alternative techniques could have helped
    us adapt and survive.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 注册饥饿游戏要求战略性的牺牲和创造性的解决方案，但通过利用 PIO 的特殊寄存器和巧妙的循环结构，我们最终取得了胜利。如果风险更高，其他技术可能有助于我们适应并生存。
- en: 'But victory in one arena doesn’t mean the challenges are over. In the next
    Wat, we face a new trial: PIO’s strict 32-instruction limit.'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 但在一个领域的胜利并不意味着挑战就此结束。在下一个 Wat 中，我们面临新的考验：PIO 的严格 32 指令限制。
- en: 'Wat 2: The 32-Instruction Carry-On Suitcase'
  id: totrans-68
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Wat 2：32 指令的持续手提箱
- en: Congratulations! You’ve purchased a trip around the world for just $4\. The
    catch? All your belongings must fit into a tiny carry-on suitcase. Likewise, PIO
    programs allow you to create incredible functionality, but every PIO program is
    limited to just 32 instructions.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 恭喜！你只需花费 4 美元就买了一张环游世界的机票。但是，有一个条件？你必须将所有物品都装入一个迷你手提箱中。同样，PIO 程序允许你创建令人难以置信的功能，但每个
    PIO 程序都限制在仅 32 条指令。
- en: '**Wat!** Only 32 instructions? That’s not much space to pack everything you
    need! But with clever planning, you can usually make it work.'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: '**Wat！** 只有 32 条指令？这空间实在太小，无法装下所有你需要的东西！但通过巧妙的规划，你通常可以使其工作。'
- en: '![](../Images/2ec13bfa2182e0bc45e4ede106e1d73b.png)'
  id: totrans-71
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/2ec13bfa2182e0bc45e4ede106e1d73b.png)'
- en: The Rules
  id: totrans-72
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 规则
- en: No PIO program can be longer than 32 instructions.
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 没有任何 PIO 程序可以超过 32 条指令。
- en: The `wrap_target`, `label`, and `wrap` instructions do not count.
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`wrap_target`、`label` 和 `wrap` 指令不计入。'
- en: A Pico 1 includes eight state machines, organized into two blocks of four. A
    Pico 2 includes twelve state machines, organized into three blocks of four. **Each
    block shares 32 instruction slots.** So, because all four state machines in a
    block draw from the same 32-instruction pool, if one machine’s program uses all
    32 slots, there’s no space left for the other three.
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Pico 1 包含八个状态机，分为两个四块。Pico 2 包含十二个状态机，分为三个四块。**每个块共享 32 条指令槽位**。因此，由于一个块中的四个状态机都从相同的
    32 条指令池中抽取，如果一个机器的程序使用了所有 32 个槽位，那么其他三个机器就没有空间了。
- en: Avoiding Turbulence
  id: totrans-76
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 避免动荡
- en: 'For a smooth flight**,** use MicroPython code to clean out any previous programs
    from the block before loading new ones. Here’s how to do it:'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 为了平稳飞行**，**使用 MicroPython 代码在加载新程序之前清理块中的任何先前程序。以下是操作方法：
- en: '[PRE2]'
  id: totrans-78
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: This ensures your instruction memory is fresh and ready for takeoff. Clearing
    the blocks is especially important when using the [PyMakr](https://marketplace.visualstudio.com/items?itemName=pycom.Pymakr)
    extension’s "development mode."
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 这确保了你的指令内存是新鲜的，并准备好起飞。清除块特别重要，当使用 [PyMakr](https://marketplace.visualstudio.com/items?itemName=pycom.Pymakr)
    扩展的 "开发模式" 时。
- en: When Your Suitcase Won’t Close
  id: totrans-80
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 当你的手提箱无法关闭时
- en: 'If your idea doesn’t fit in the PIO instruction slots, these packing tricks
    may help. *(Disclaimer: I haven’t tried all of these myself.)*'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的想法不适合 PIO 指令槽位，这些打包技巧可能有所帮助。**(免责声明：我并没有亲自尝试过所有这些。)*
- en: '**Swap PIO Programs on the Fly**: Instead of trying to cram everything into
    one program, consider swapping out programs mid-flight. Load only what you need,
    when you need it.'
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**动态交换 PIO 程序**：不要试图将所有内容都塞进一个程序中，考虑在飞行中交换程序。只加载你需要的东西，在你需要的时候。'
- en: '**Share Programs Across State Machines**: Multiple state machines can run the
    same program at the same time. Each state machine can make the shared program
    behave differently based on an input value.'
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**跨状态机共享程序**：多个状态机可以同时运行相同的程序。每个状态机可以根据输入值使共享程序表现出不同的行为。'
- en: '**Use MicroPython’s `exec` Command**: Save space by offloading instructions
    to MicroPython. For example, you can execute initialization steps directly from
    a string:'
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**使用MicroPython的`exec`命令**：通过将指令卸载到MicroPython中来节省空间。例如，你可以直接从字符串中执行初始化步骤：'
- en: '[PRE3]'
  id: totrans-85
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '**Use PIO’s exec commands:**Inside your state machine, you can execute instruction
    values stored in `osr` with `out(exec)` or use `mov(exec, x)` or `mov(exec, y)`
    for registers.'
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**使用PIO的exec命令**：在你的状态机中，你可以使用`out(exec)`执行存储在`osr`中的指令值，或者使用`mov(exec, x)`或`mov(exec,
    y)`对寄存器进行操作。'
- en: '**Offload to the Main Processors**: If all else fails, move more of your program
    to the Pico’s larger dual processors – think of this as shipping your extra baggage
    to your destination separately. The [Pico SDK](https://datasheets.raspberrypi.com/pico/raspberry-pi-pico-c-sdk.pdf)
    (section 3.1.4) calls this "bit banging".'
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**卸载到主处理器**：如果所有其他方法都失败了，将更多程序移动到Pico的大容量双处理器上——这可以想象为将你的额外行李分开运送到目的地。Pico
    SDK（[Pico SDK](https://datasheets.raspberrypi.com/pico/raspberry-pi-pico-c-sdk.pdf)部分3.1.4）称这为"位打"。'
- en: With your bags now packed, let’s join Dr. Dolittle’s search for a fabled creature.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 现在背包已经打包好，让我们加入多利特医生寻找传说中的生物的队伍。
- en: 'Bonus Wat 2.5: Dr. Dolittle’s PIO Pushmi-Pullyu'
  id: totrans-89
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 奖励Wat 2.5：多利特医生的PIO Pushmi-Pullyu
- en: '*Two readers pointed out an important PIO Wat that I missed – so here’s a bonus!*
    When programming PIO, you’ll notice something peculiar:'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: '*两位读者指出我遗漏了一个重要的PIO Wat——所以这里有一个奖励！* 当编程PIO时，你会注意到一些奇怪的事情：'
- en: The PIO **`pull`** instruction receives values from TX FIFO (**transmit** buffer)
    and inputs them into the **output** shift register (`osr`). So, it inputs into
    output and transmits from receive.
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: PIO的**`pull`**指令从TX FIFO（**发送**缓冲区）接收值并将它们输入到**输出**移位寄存器（`osr`）。因此，它从输出端输入并从接收端发送。
- en: Likewise, the PIO **`push`** instruction outputs values from the **input** shift
    register (`isr`) and transmits them to the RX FIFO (**receive** buffer). So, it
    outputs from input and receives from transmit.
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 同样，PIO的**`push`**指令从**输入**移位寄存器（`isr`）输出值并将它们传输到RX FIFO（**接收**缓冲区）。因此，它从输入端输出并从发送端接收。
- en: '**Wat!?** Like the two-headed [Pushmi-Pullyu](https://en.wikipedia.org/wiki/List_of_Doctor_Dolittle_characters#Pushmi-Pullyu)
    from the Dr. Dolittle stories, something seems backwards. But it starts to make
    sense when you realize PIO names most things from the **host’s perspective** (MicroPython,
    Rust, C/C++), not the point of view of the PIO program.'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: '**Wat!?** 就像来自《多利特医生》故事的两位头身的[Pushmi-Pullyu](https://en.wikipedia.org/wiki/List_of_Doctor_Dolittle_characters#Pushmi-Pullyu)一样，似乎有些事情是颠倒的。但当你意识到PIO命名大多数事物都是从**主机的视角**（MicroPython、Rust、C/C++）出发，而不是从PIO程序的角度出发时，它开始变得有道理。'
- en: This table summarizes the instructions, registers, and buffer names. ("FIFO"
    stands for first-in-first-out.)
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 此表总结了指令、寄存器和缓冲区名称。（"FIFO"代表先进先出。）
- en: '![](../Images/187f31b06be84ad62fbbab34f4961629.png)'
  id: totrans-95
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/187f31b06be84ad62fbbab34f4961629.png)'
- en: With the Pushmi-Pullyu in hand, we next move to the scene of a mystery.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 拿着Pushmi-Pullyu，我们接下来来到一个神秘的场景。
- en: 'Wat 3: The pull(noblock) “ Mystery'
  id: totrans-97
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 'Wat 3: pull(noblock) “神秘”'
- en: In **Wat 1**, we programmed our audio hardware as a backup beeper. But that’s
    not what we need for our musical instrument. Instead, we want a PIO program that
    plays a given tone indefinitely – until it’s told to play a new one. The program
    should also wait silently when given a special "rest" tone.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 在**Wat 1**中，我们将音频硬件编程为备用蜂鸣器。但这对我们的乐器来说不是我们需要的。相反，我们想要一个无限期播放给定音调的PIO程序——直到它被告知播放新的音调。程序还应等待特殊“休息”音调。
- en: Resting until a new tone is provided is easy to program with `pull(block)`—we’ll
    explore the details below. Playing a tone at a specific frequency is also straightforward,
    building on the work we did in **Wat 1**.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 等待新音调提供以使用`pull(block)`编程休息是很容易的——我们将在下面探讨细节。在特定频率上播放音调也很简单，这是基于我们在**Wat 1**中完成的工作。
- en: But how can we check for a new tone while continuing to play the current one?
    The answer lies in using "noblock" instead of "block" in `pull(noblock)`. Now,
    if there’s a new value, it will be loaded into `osr`, allowing the program to
    update seamlessly.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 但我们如何在继续播放当前音调的同时检查是否有新的音调？答案是使用`pull(noblock)`中的"noblock"而不是"block"。现在，如果有新值，它将被加载到`osr`中，使程序能够无缝更新。
- en: 'Here’s where the mystery begins: what happens to `osr` if `pull(noblock)` is
    called and there’s no new value?'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 这里神秘开始的地方：如果调用`pull(noblock)`而没有新值，`osr`会发生什么？
- en: 'I assumed it would keep its previous value. Wrong! Maybe it gets reset to 0?
    Wrong again! The surprising truth: it gets the value of `x`. Why? (No, not `y`
    – `x`.) Because the [Pico SDK](https://datasheets.raspberrypi.com/pico/raspberry-pi-pico-c-sdk.pdf)
    says so. Specifically, section 3.4.9.2 explains:'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 我假设它会保持其之前的值。错了！也许它被重置为0？再次错了！令人惊讶的真相：它得到`x`的值。为什么？（不，不是`y`——是`x`。）因为[Pico SDK](https://datasheets.raspberrypi.com/pico/raspberry-pi-pico-c-sdk.pdf)这么说。具体来说，3.4.9.2节解释了：
- en: A nonblocking PULL on an empty FIFO has the same effect as MOV OSR, X.
  id: totrans-103
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 在一个空的FIFO上进行的非阻塞PULL操作与MOV OSR, X的效果相同。
- en: Knowing how `pull(noblock)` works is important, but there’s a bigger lesson
    here. Treat the [Pico SDK documentation](https://datasheets.raspberrypi.com/pico/raspberry-pi-pico-c-sdk.pdf)
    like the back of a mystery novel. Don’t try to solve everything on your own—cheat!
    Skip to the "who done it" section, and in section 3.4, read the fine details for
    each command you use. Reading just a few paragraphs can save you hours of confusion.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 了解`pull(noblock)`的工作原理很重要，但这里有一个更大的教训。将[Pico SDK文档](https://datasheets.raspberrypi.com/pico/raspberry-pi-pico-c-sdk.pdf)像神秘小说的背面一样对待。不要试图独自解决所有问题——作弊！跳到“谁干的”部分，在3.4节中，阅读你使用的每个命令的详细说明。阅读几段内容可以节省你数小时的困惑。
- en: 'Aside: When even the SDK documentation feels unclear, turn to the [RP2040](https://datasheets.raspberrypi.com/rp2040/rp2040-datasheet.pdf)
    (Pico 1) and [RP2350](https://datasheets.raspberrypi.com/rp2350/rp2350-datasheet.pdf)
    (Pico 2) datasheets. These encyclopedias – 600 and 1,300 pages respectively –
    are like omnipotent narrators: they provide the ground truth.'
  id: totrans-105
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 顺便说一句：当即使是SDK文档都感觉不清楚时，转向[RP2040](https://datasheets.raspberrypi.com/rp2040/rp2040-datasheet.pdf)（Pico
    1）和[RP2350](https://datasheets.raspberrypi.com/rp2350/rp2350-datasheet.pdf)（Pico
    2）的数据表。这些百科全书——分别有600页和1300页——就像全能的叙述者：它们提供了事实真相。
- en: With this in mind, let’s look at a practical example. Below is the PIO program
    for playing tones and rests continuously. It uses `pull(block)` to wait for input
    during a rest and `pull(noblock)` to check for updates while playing a tone.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到这一点，让我们看看一个实际例子。下面是播放持续音调和休止符的PIO程序。它使用`pull(block)`在休止期间等待输入，并使用`pull(noblock)`在播放音调时检查更新。
- en: '[PRE4]'
  id: totrans-107
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: We’ll eventually use this PIO program in our theremin-like musical instrument.
    For now, let’s see the PIO program in action by playing a familiar melody. This
    demo uses "Twinkle, Twinkle, Little Star" to show how you can control a melody
    by feeding frequencies and durations to the state machine. With just a few lines
    of code, you can make the Pico sing!
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 我们最终会使用这个PIO程序在我们的类似 theremin 的乐器中。现在，让我们通过播放熟悉的旋律来查看PIO程序的实际效果。这个演示使用“Twinkle,
    Twinkle, Little Star”来展示你如何通过向状态机提供频率和持续时间来控制旋律。只需几行代码，你就可以让Pico唱歌！
- en: '[PRE5]'
  id: totrans-109
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'Here’s what happens when you run the program:'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 当你运行程序时，会发生以下情况：
- en: We’ve solved one mystery, but there’s always another challenge lurking around
    the corner. In **Wat 4**, we’ll explore what happens when your smart hardware
    comes with a catch – it’s also very cheap.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 我们解决了一个谜团，但总会有另一个挑战潜伏在拐角处。在**Wat 4**中，我们将探讨当你的智能硬件带有陷阱——它也非常便宜时会发生什么。
- en: 'Wat 4: Smart, Cheap Hardware: An Emotional Roller Coaster'
  id: totrans-112
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Wat 4：智能、便宜硬件：情感过山车
- en: With sound working, we turn next to measuring the distance to the musician’s
    hand using the HC-SR04+ ultrasonic range finder. This small but powerful device
    is available for less than two dollars.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 声音工作后，我们转向使用HC-SR04+超声波测距仪测量音乐家手的距离。这个小巧但强大的设备售价不到两美元。
- en: '![HC-SR04+ Range Finder (Pen added for scale.)](../Images/4aad258ba653a2931a66c390c9a5c3ae.png)'
  id: totrans-114
  prefs: []
  type: TYPE_IMG
  zh: '![HC-SR04+测距仪（笔用于比例尺。）](../Images/4aad258ba653a2931a66c390c9a5c3ae.png)'
- en: HC-SR04+ Range Finder (Pen added for scale.)
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: HC-SR04+测距仪（笔用于比例尺。）
- en: 'This little peripheral took me on an emotional roller coaster of "Wats!?":'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 这个小外围设备让我经历了“Wats!?！”的情感过山车。
- en: '**Up**: Amazingly, this $2 range finder includes its own microcontroller, making
    it smarter and easier to use.'
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**向上**：令人惊讶的是，这个2美元的测距仪包含了自己的微控制器，使其更智能且更容易使用。'
- en: '**Down**: Frustratingly, that same "smart" behavior is unintuitive.'
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**向下**：令人沮丧的是，那种相同的“智能”行为并不直观。'
- en: '**Up**: Conveniently, the Pico can supply peripherals with either 3.3V or 5V
    power.'
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**向上**：方便的是，Pico可以用3.3V或5V电源为外围设备供电。'
- en: '**Down**: Unpredictably, many range finders are unreliable – or fail outright
    – at 3.3V, and they can damage your Pico at 5V.'
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**向下**：不可预测的是，许多测距仪在3.3V时不可靠——或者直接失败——，在5V时它们可能会损坏你的Pico。'
- en: '**Up**: Thankfully, both damaged range finders and Picos are inexpensive to
    replace, and a dual-voltage version of the range finder solved my problems.'
  id: totrans-121
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**向上**：幸运的是，损坏的测距仪和 Pico 都很便宜，而且测距仪的双电压版本解决了我的问题。'
- en: Details
  id: totrans-122
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 详细信息
- en: I initially assumed the range finder would set the **Echo** pin high when the
    echo returned. I was wrong.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 我最初认为当回声返回时，测距仪会将 **Echo** 引脚置高。我错了。
- en: Instead, the range finder emits a pattern of 8 ultrasonic pulses at 40 kHz (think
    of it as a backup beeper for dogs). Immediately after, it sets **Echo** high.
    The Pico should then start measuring the time until **Echo** goes low, which signals
    that the sensor detected the pattern – or that it timed out.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 相反，测距仪以 40 kHz 的频率发射 8 个超声波脉冲（把它想象成狗的备用蜂鸣器）。紧接着，它将 **Echo** 置高。然后 Pico 应该开始测量
    **Echo** 下降的时间，这表示传感器检测到了模式——或者它超时了。
- en: As for voltage, the documentation specifies the range finder operates at 5V.
    It seemed to work at 3.3V – until it didn’t. Around the same time, my Pico stopped
    connecting to MicroPython IDEs, which rely on a special USB protocol.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 至于电压，文档指定测距仪在 5V 下运行。它似乎在 3.3V 下也能工作——直到它不能了。大约在同一时间，我的 Pico 停止连接到依赖特殊 USB 协议的
    MicroPython IDE。
- en: So, at this point both the Pico and the range finder were damaged.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，到目前为止，Pico 和测距仪都损坏了。
- en: 'After experimenting with various cables, USB drivers, programming languages,
    and even an older 5V-only range finder, I finally resolved the issue with:'
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 在尝试了各种电缆、USB 驱动程序、编程语言，甚至一个旧的 5V 只测距仪后，我终于解决了以下问题：
- en: A new Pico microcontroller that I already had on hand. (It was a Pico 2, but
    I don’t think the model matters.)
  id: totrans-128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我手头已经有一个新的 Pico 微控制器。（它是一个 Pico 2，但我认为型号并不重要。）
- en: A new [dual-voltage 3.3/5V range finder](https://www.amazon.com/dp/B0CRKHV4XY?ref=ppx_yo2ov_dt_b_fed_asin_title),
    still just $2 per piece.
  id: totrans-129
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个新的 [双电压 3.3/5V 测距仪](https://www.amazon.com/dp/B0CRKHV4XY?ref=ppx_yo2ov_dt_b_fed_asin_title)，仍然只要每件
    2 美元。
- en: 'Wat 4: Lessons Learned'
  id: totrans-130
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Wat 4：经验教训
- en: As the roller coaster return to the station, I learned two key lessons. First,
    thanks to microcontrollers, even simple hardware can behave in non-intuitive ways
    that require careful reading of the documentation. Second, while this hardware
    is clever, it’s also inexpensive – and that means it is prone to failure. When
    it fails, take a deep breath, remember it’s only a few dollars, and replace it.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 当过山车回到车站时，我学到了两个关键教训。首先，多亏了微控制器，即使是简单的硬件也可能以非直观的方式表现，这需要仔细阅读文档。其次，虽然这个硬件很聪明，但它也很便宜——这意味着它容易出故障。当它出故障时，深呼吸，记住它只值几美元，然后更换它。
- en: 'Hardware quirks, however, are only part of the story. In **Wat 5**, in [Part
    2](https://towardsdatascience.com/nine-pico-pio-wats-with-micropython-part-2-984a642f25a4),
    we’ll shift our focus back to software: the PIO programming language itself. We’ll
    uncover a behavior so unexpected, it might leave you questioning everything you
    thought you knew about constants.'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，硬件的怪癖只是故事的一部分。在 **Wat 5** 中，在 [第二部分](https://towardsdatascience.com/nine-pico-pio-wats-with-micropython-part-2-984a642f25a4)，我们将把注意力转回软件：PIO
    编程语言本身。我们将揭示一种如此出乎意料的行为，可能会让你质疑你所知道的一切关于常量的知识。
- en: '* * *'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Those are the first four Wats from programming the Pico PIO with MicroPython.
    You can find the [code for the project on GitHub](https://github.com/CarlKCarlK/pico_pio/).
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是使用 MicroPython 编程 Pico PIO 的前四个 Wat。你可以在 [GitHub 上的项目代码](https://github.com/CarlKCarlK/pico_pio/)
    中找到。
- en: In [Part 2](https://towardsdatascience.com/nine-pico-pio-wats-with-micropython-part-2-984a642f25a4),
    we explore Wats 5 through 9\. These cover inconstant constants, conditions through
    the looking glass, overshooting jumps, too many pins, and kludgy debugging. We’ll
    also unveil the code for the finished musical instrument.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 在 [第二部分](https://towardsdatascience.com/nine-pico-pio-wats-with-micropython-part-2-984a642f25a4)
    中，我们探讨了 Wat 5 到 9。这些包括不恒定的常量、透过玻璃的条件、跳过跳跃、过多的引脚和笨拙的调试。我们还将揭示完成乐器的代码。
- en: '*Please [follow Carl on Medium](https://medium.com/@carlmkadie). I write on
    scientific programming in Rust and Python, machine learning, and statistics. I
    tend to write about one article per month.*'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: '*请[在 Medium 上关注 Carl](https://medium.com/@carlmkadie)。我写关于 Rust 和 Python 中的科学编程、机器学习和统计学。我倾向于每月写一篇文章。*'
