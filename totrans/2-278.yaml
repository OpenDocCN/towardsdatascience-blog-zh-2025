- en: Pairwise Cross-Variance Classification
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 成对交叉方差分类
- en: 原文：[https://towardsdatascience.com/pairwise-cross-variance-classification/](https://towardsdatascience.com/pairwise-cross-variance-classification/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/pairwise-cross-variance-classification/](https://towardsdatascience.com/pairwise-cross-variance-classification/)
- en: Intro
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 简介
- en: This project is about getting better zero-shot classification of images and
    text using CV/LLM models without spending time and money fine-tuning in training,
    or re-running models in inference. It uses a novel dimensionality reduction technique
    on embeddings and determines classes using tournament style pair-wise comparison.
    It resulted in an increase in text/image agreement from 61% to 89% for a 50k dataset
    over 13 classes.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 这个项目是关于使用CV/LLM模型在不花费时间和金钱进行训练微调或在推理时重新运行模型的情况下，更好地实现图像和文本的零样本分类。它使用了一种新颖的降维技术对嵌入进行操作，并使用锦标赛风格的成对比较来确定类别。这导致在13个类别中的50k数据集上文本/图像一致率从61%提升到了89%。
- en: '[https://github.com/doc1000/pairwise_classification](https://github.com/doc1000/pairwise_classification)'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://github.com/doc1000/pairwise_classification](https://github.com/doc1000/pairwise_classification)'
- en: Where you will use it
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 你将如何使用它
- en: The practical application is in large-scale class search where speed of inference
    is important and model cost spend is a concern. It is also useful in finding errors
    in your annotation process — misclassifications in a large database.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 实际应用在于大规模类别搜索，其中推理速度很重要，且模型成本支出是一个关注点。它也有助于发现你在注释过程中的错误——在大数据库中的误分类。
- en: Results
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结果
- en: The weighted F1 score comparing the text and image class agreement went from
    61% to 88% for ~50k items across 13 classes. A visual inspection also validated
    the results.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 比较文本和图像类别一致性的加权F1分数从13个类别中的约50k个项目的61%提升到了88%。视觉检查也验证了这些结果。
- en: '| F1_score (weighted) | **base model** | **pairwise** |'
  id: totrans-9
  prefs: []
  type: TYPE_TB
  zh: '| F1_score (加权) | **基础模型** | **成对比较** |'
- en: '| **Multiclass** | 0.613 | 0.889 |'
  id: totrans-10
  prefs: []
  type: TYPE_TB
  zh: '| **多类别** | 0.613 | 0.889 |'
- en: '| **Binary** | 0.661 | 0.645 |'
  id: totrans-11
  prefs: []
  type: TYPE_TB
  zh: '| **二进制** | 0.661 | 0.645 |'
- en: '![Far closer agreement between text and image classification using the pairwise
    model](../Images/d94f68d80e1adea2dce73fdc8da13bf8.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![使用成对模型在文本和图像分类之间实现更接近的一致性](../Images/d94f68d80e1adea2dce73fdc8da13bf8.png)'
- en: Focusing on the multi-class work, class count cohesion improves with the model.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 在多类别工作中，模型提高了类别计数凝聚力。
- en: 'Left: Base, full embedding, argmax on cosine similarity model'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 左：基础模型，完整嵌入，基于余弦相似度的argmax模型
- en: 'Right: pairwise tourney model using feature sub-segments scored by crossratio'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 右：使用交叉比评分的特征子段成对锦标赛模型
- en: Image by author
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: 'Method: Pairwise comparison of cosine similarity of embedding sub-dimensions
    determined by mean-scale scoring'
  id: totrans-17
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 方法：通过平均尺度评分确定的嵌入子维度的余弦相似度成对比较
- en: A straightforward way to vector classification is to compare image/text embeddings
    to class embeddings using cosine similarity. It’s relatively quick and requires
    minimal overhead. You can also run a classification model on the embeddings (logistic
    regressions, trees, svm) and target the class without further embeddings.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 向量分类的一种直接方法是使用余弦相似度比较图像/文本嵌入与类别嵌入。这相对较快，且开销最小。你还可以在嵌入上运行分类模型（逻辑回归、树、svm），并针对类别进行目标分类，而无需进一步嵌入。
- en: My approach was to reduce the feature size in the embeddings determining which
    feature distributions were substantially different between two classes, and thus
    contributed information with less noise. For scoring features, I used a derivation
    of variance that encompasses two distributions, which I refer to as cross-variance
    (more below). I used this to get important dimensions for the ‘clothing’ category
    (one-vs-the rest) and re-classified using the sub-features, which showed some
    improvement in model power. However, the sub-feature comparison showed better
    results when comparing classes pairwise (one vs one/head to head). Separately
    for images and text, I constructed an array-wide ‘tournament’ style bracket of
    pairwise comparisons, until a final class was determined for each item. It ends
    up being fairly efficient. I then scored the agreement between the text and image
    classifications.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 我的做法是在嵌入中减少特征大小，确定两个类别之间哪些特征分布有显著差异，从而以更少的噪声贡献信息。在评分特征时，我使用了一种包含两个分布的方差推导，我称之为交叉方差（下面将进一步说明）。我使用这个方法获取了“服装”类别（一对多）的重要维度，并使用子特征重新分类，这显示出模型功率的一些改进。然而，当成对比较类别时（一对一/头对头），子特征比较显示出更好的结果。对于图像和文本分别，我构建了一个成对比较的全局“锦标赛”风格的对阵，直到为每个项目确定最终的类别。这最终证明是相当高效的。然后，我评分了文本和图像分类之间的协议。
- en: <mdspan datatext="el1748890603347" class="mdspan-comment">Overview of Zero Shot
    Class Assignment</mdspan>
  id: totrans-20
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1748890603347" class="mdspan-comment">零样本分类分配概述</mdspan>
- en: Using cross variance, pair specific feature selection and pairwise tourney assignment.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 使用交叉方差，对特定特征选择和成对锦标赛分配进行配对。
- en: '![](../Images/2b7c7395834bf35693d6cf22d2bf7ffa.png)'
  id: totrans-22
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/2b7c7395834bf35693d6cf22d2bf7ffa.png)'
- en: All images by author unless stated otherwise in captions
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 所有图片均为作者所有，除非标题中另有说明
- en: <mdspan datatext="el1748890701478" class="mdspan-comment">The Data</mdspan>
  id: totrans-24
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1748890701478" class="mdspan-comment">数据概述</mdspan>
- en: I am using a product image database that was readily available with pre-calculated
    CLIP embeddings (thank you [SQID (Cited below. This dataset is released under
    the MIT License](https://github.com/Crossing-Minds/shopping-queries-image-dataset/blob/main/README.md)),
    [AMZN](https://github.com/amazon-science/esci-data/tree/main/shopping_queries_dataset)
    (Cited below. This dataset is licensed under Apache License 2.0) and targeting
    the clothing images because that is where I first saw this effect (thank you DS
    team at Nordstrom). The dataset was narrowed down from 150k items/images/descriptions
    to ~50k clothing items using zero shot classification, then the augmented classification
    based on targeted subarrays.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 我正在使用一个产品图像数据库，该数据库易于获取，并带有预计算的 CLIP 嵌入（感谢 [SQID（以下引用。此数据集在 MIT 许可证下发布](https://github.com/Crossing-Minds/shopping-queries-image-dataset/blob/main/README.md))，[AMZN](https://github.com/amazon-science/esci-data/tree/main/shopping_queries_dataset)（以下引用。此数据集在
    Apache 许可证 2.0 下发布）），并针对服装图像进行目标定位，因为这是我第一次看到这种效果（感谢诺德斯特龙的数据科学团队）。数据集从 15 万个物品/图像/描述缩小到约
    5 万件服装，使用零样本分类，然后基于目标子数组的增强分类。
- en: '![](../Images/f00bc7f88bc77ba3464f01563c5d183c.png)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f00bc7f88bc77ba3464f01563c5d183c.png)'
- en: 'Test Statistic: Cross Variance'
  id: totrans-27
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 测试统计量：交叉方差
- en: This is a method to determine how different the distribution is for two different
    classes when targeting a single feature/dimension. It is a measure of the combined
    average variance if each element of both distributions is dropped into the other
    distribution. It is an expansion of the math of variance/standard deviation, but
    between two distributions (that can be of varying size). I have not seen it used
    before, although it may be listed under a different moniker.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个确定两个不同类别的分布在不同特征/维度上差异的方法。它是将每个分布的每个元素放入另一个分布时，综合平均方差的度量。它是方差/标准差数学的扩展，但发生在两个分布之间（可以有不同的尺寸）。我以前没有见过它的使用，尽管它可能以不同的名称列出。
- en: 'Cross Variance:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 交叉方差：
- en: '![](../Images/ed68ec167be3baefa81425571a88faad.png)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ed68ec167be3baefa81425571a88faad.png)'
- en: Similar to variance, except summing over both distributions and taking a difference
    of each value instead of the mean of the single distribution. If you input the
    same distribution as A and B, then it yields the same results as variance.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 与方差类似，但是对两个分布求和，并对每个值取差，而不是对单分布取平均值。如果您输入相同的分布作为 A 和 B，则它会产生与方差相同的结果。
- en: 'This simplifies to:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 这简化为：
- en: '![](../Images/9cbbe477ad6c28d2df8e3d1948fb2a0f.png)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/9cbbe477ad6c28d2df8e3d1948fb2a0f.png)'
- en: This is equivalent to the alternate definition of variance (the mean of the
    squares minus the square of the mean) for a single distribution when the distributions
    i and j are equal. Using this version is massively faster and more memory efficient
    than attempting to broadcast the arrays directly. I will provide the proof and
    go into more detail in another write-up. Cross deviation(ς) is the square root
    of undefined.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 这相当于当分布 i 和 j 相等时，单分布的方差（平方的平均值减去平均值的平方）的另一种定义。使用这个版本比直接广播数组快得多，且更节省内存。我将在另一篇文档中提供证明并详细介绍。交叉偏差（ς）是未定义的平方根。
- en: To score features, I use a ratio. The numerator is cross variance. The denominator
    is the product of ij, same as the denominator of Pearson correlation. Then I take
    the root (I could just as easily use cross variance, which would compare more
    directly with covariance, but I’ve found the ratio to be more compact and interpretable
    using cross dev).
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 为了评分特征，我使用一个比率。分子是交叉方差。分母是 i 和 j 的乘积，与皮尔逊相关系数的分母相同。然后我取根（我也可以使用交叉方差，这将更直接地与协方差进行比较，但我发现使用交叉偏差的比率更紧凑且易于解释）。
- en: '![](../Images/251096a2231178d8373433b2c42b238c.png)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/251096a2231178d8373433b2c42b238c.png)'
- en: I interpret this as the increased combined standard deviation if you swapped
    classes for each item. A large number means the feature distribution is likely
    quite different for the two classes.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为这表示如果你为每个项目交换类别，会增加组合标准差。一个大的数字意味着两个类别的特征分布很可能非常不同。
- en: '![](../Images/a9e7c7b7d972089d6f0b4de4a69cc717.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a9e7c7b7d972089d6f0b4de4a69cc717.png)'
- en: For an embedding feature with low cross gain, the difference in distributions
    will be minimal… there is very little information lost if you transfer an item
    from one class to the other. However, for a feature with high cross gain relative
    to these two classes, there is a large difference in the distribution of feature
    values… in this case both in mean and variance. The high cross gain feature provides
    much more information.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 对于具有低交叉增益的嵌入特征，分布差异将很小……如果你将一个项目从一个类别转移到另一个类别，损失的信息非常少。然而，对于与这两个类别相对的具有高交叉增益的特征，特征值的分布差异很大……在这种情况下，均值和方差都有很大差异。高交叉增益特征提供了更多的信息。
- en: Image by author
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: This is an alternative mean-scale difference Ks_test; Bayesian 2dist tests and
    Frechet Inception Distance are alternatives. I like the elegance and novelty of
    cross var. I will likely follow up by looking at other differentiators. I should
    note that determining distributional differences for a normalized feature with
    overall mean 0 and sd = 1 is its own challenge.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一种替代的均值-尺度差异Ks_test；贝叶斯2dist测试和Frechet Inception Distance是替代方案。我喜欢交叉方差的美感和新颖性。我可能会进一步研究其他不同的区分器。我应该指出，对于一个具有整体均值0和标准差sd
    = 1的归一化特征，确定分布差异是一项挑战。
- en: 'Sub-dimensions: dimensionality reduction of embedding space for classification'
  id: totrans-42
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 子维度：用于分类的嵌入空间的降维
- en: When you are trying to find a *particular* characteristic of an image, do you
    need the whole embedding? Is color or whether something is a shirt or pair of
    pants located in a narrow section of the embedding? If I’m looking for a shirt,
    I don’t necessarily care if it’s blue or red, so I just look at the dimensions
    that define ‘shirtness’ and throw out the dimensions that define color.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 当你试图找到一个图像的**特定**特征时，你是否需要整个嵌入？颜色或某物是否为衬衫或裤子是否位于嵌入的狭窄部分？如果我正在寻找衬衫，我并不一定关心它是蓝色还是红色，所以我只看定义“衬衫”的维度，并丢弃定义颜色的维度。
- en: '![](../Images/31234e9062c7d8db43f518bc6ba5c71b.png)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/31234e9062c7d8db43f518bc6ba5c71b.png)'
- en: The red highlighted dimensions demonstrate importance when determining if an
    image contains clothing. We focus on those dimensions when attempting to classify.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 红色高亮维度在确定图像是否包含衣物时显示出重要性。我们在尝试分类时关注这些维度。
- en: Image by author
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: 'I am taking a [n,768] dimensional embedding and narrowing it down to closer
    to 100 dimensions that actually matter for a particular class pair. Why? Because
    the cosine similarity metric (cosim) gets influenced by the noise of the relatively
    unimportant features. The embedding carries a tremendous amount of information,
    much of which you simply don’t care about in a classification problem. Get rid
    of the noise and the signal gets stronger: cosim increases with elimination of
    ‘unimportant’ dimensions.'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 我正在将一个[n,768]维度的嵌入缩小到更接近100维度的实际对特定类别对有意义的维度。为什么？因为余弦相似度度量（cosim）会受到相对不重要的特征噪声的影响。嵌入携带了大量的信息，其中许多在分类问题中你根本不关心。去除噪声，信号会更强：随着“不重要”维度的消除，余弦相似度增加。
- en: '![](../Images/c0465d90a7dc08ce8a13f31dc4c054d4.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c0465d90a7dc08ce8a13f31dc4c054d4.png)'
- en: In the above, you can see that the average cosine similarity rises as the minimum
    feature cross ratio increases (corresponding to fewer features on the right),
    until it collapses because there are too few features. I used a cross ratio of
    1.2 to balance increased fit with reduced information.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 在上述内容中，你可以看到随着最小特征交叉比的增加（对应于右侧特征更少），平均余弦相似度上升，直到因为特征太少而崩溃。我使用了1.2的交叉比来平衡增加的拟合度与减少的信息。
- en: Image by author
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: 'For a pairwise comparisons, first split items into classes using standard cosine
    similarity applied to the full embedding. I exclude some items that show very
    low cosim on the assumption that the model skill is low for those items (cosim
    limit). I also exclude items that show low differentiation between the two classes
    (cosim diff). The result is two distributions upon which to extract important
    dimensions that should define the ‘true’ difference between the classifications:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 对于成对比较，首先使用标准余弦相似度将项目分为类别，应用于完整的嵌入。我排除了显示非常低余弦相似度的项目，假设模型对这些项目的技能较低（余弦相似度限制）。我还排除了两个类别之间差异较小的项目（余弦相似度差异）。结果是两个分布，可以从中提取出定义分类之间“真实”差异的重要维度：
- en: '![](../Images/4d91dd0af05f0ebcaba4d818a0825e84.png)'
  id: totrans-52
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/4d91dd0af05f0ebcaba4d818a0825e84.png)'
- en: The light blue dots represent images that seem more likely to contain clothing.
    The dark blue dots are non-clothing. The peach line going down the middle is an
    area of uncertainty, and is excluded from the next steps. Similarly, the dark
    dots are excluded because the model does not have a lot of confidence in classifying
    them at all. Our objective is to isolate the two classes, extract the features
    that differentiate them, then determine if there is agreement between the image
    and text models.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 浅蓝色点代表可能包含服装的图像。深蓝色点是非服装。中间的桃色线是不确定性区域，并被排除在下一步之外。同样，深色点也被排除，因为模型对这些点进行分类的信心不足。我们的目标是隔离两个类别，提取区分它们的特征，然后确定图像和文本模型之间是否存在一致性。
- en: Image by author
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: Array Pairwise Tourney Classification
  id: totrans-55
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数组成对锦标赛分类
- en: Getting a global class assignment out of pairwise comparisons requires some
    thought. You can take the given assignment and compare just that class to all
    the others. If there was good skill in the initial assignment, this should work
    well, but if multiple alternate classes are superior, you run into trouble. A
    cartesian approach where you compare all vs all would get you there, but would
    get big quickly. I settled on an array-wide ‘tournament’ style bracket of pairwise
    comparisons.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 从成对比较中获得全局类别分配需要一些思考。你可以只比较给定分配的类别与其他所有类别。如果初始分配有很好的技能，这应该会很好，但如果多个替代类别更优越，你就会遇到麻烦。一个笛卡尔方法，即比较所有与所有，可以让你达到目标，但会很快变得庞大。我决定采用全局范围的“锦标赛”式成对比较。
- en: '![](../Images/837675ba73864e4736404aeb9f612cb8.png)'
  id: totrans-57
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/837675ba73864e4736404aeb9f612cb8.png)'
- en: 'This has log_2 (#classes) rounds and total number of comparisons maxing at
    summation_round(combo(#classes in round)*n_items) across some specified # of features.
    I randomize the ordering of ‘teams’ each round so the comparisons aren’t the same
    each time. It has some match up risk but gets to a winner quickly. It’s built
    to handle an array of comparisons at each round, rather than iterating over items.'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 这有log_2（类别数）轮次，总比较次数最多为summation_round（当前轮次类别组合数）*n_items，跨越一些指定的特征数。我每轮随机化“队伍”的顺序，以确保比较每次都不相同。它被设计来处理每轮的比较数组，而不是迭代项目。
- en: Scoring
  id: totrans-59
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 评分
- en: Finally, I scored the process by determining if the classification from text
    and images match. As long as the distribution isn’t heavily overweight towards
    a ‘default’ class (it is not), this should be a good assessment of whether the
    process is pulling real information out of the embeddings.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我通过确定文本和图像的分类是否匹配来评估整个过程。只要分布不是严重偏向“默认”类别（它不是），这应该是对过程是否从嵌入中提取真实信息的良好评估。
- en: I looked at the weighted F1 score comparing the classes assigned using the image
    vs the text description. The assumption the better the agreement, the more likely
    the classification is correct. For my dataset of ~50k images and text descriptions
    of clothing with 13 classes, the starting score of the simple full-embedding cosine
    similarity model went from 42% to 55% for the sub-feature cosim, to 89% for the
    pairwise model with sub-features.. A visual inspection also validated the results.
    The binary classification wasn’t the primary goal – it was largely to get a sub-segment
    of the data to then test multi-class boosting.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 我查看加权F1分数，比较使用图像与文本描述分配的类别。假设一致性越好，分类越可能正确。对于我的包含约50k张图像和13个类别服装文本描述的数据集，简单全嵌入余弦相似度模型的起始分数从42%提高到55%（子特征余弦相似度），到89%（具有子特征的成对模型）..
    视觉检查也验证了结果。二分类不是主要目标——主要是为了获取数据的一个子集，然后测试多类提升。
- en: '|  | **base model** | **pairwise** |'
  id: totrans-62
  prefs: []
  type: TYPE_TB
  zh: '|  | **基础模型** | **成对比较** |'
- en: '| **Multiclass** | 0.613 | 0.889 |'
  id: totrans-63
  prefs: []
  type: TYPE_TB
  zh: '| **多类别** | 0.613 | 0.889 |'
- en: '| **Binary** | 0.661 | 0.645 |'
  id: totrans-64
  prefs: []
  type: TYPE_TB
  zh: '| **二进制** | 0.661 | 0.645 |'
- en: '![](../Images/74dd7cce1b886d90a6a6fe7d3d961b18.png)'
  id: totrans-65
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/74dd7cce1b886d90a6a6fe7d3d961b18.png)'
- en: The combined confusion matrix shows tighter match between image and text. Note
    top end of scaling is higher in the right chart and there are fewer blocks with
    split assignments.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 结合混淆矩阵显示了图像和文本之间的更紧密匹配。注意右图中的缩放顶端更高，并且具有分割分配的块更少。
- en: Image by author
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: '![](../Images/49d9ed9b47ecd79d000983bceacb53cd.png)'
  id: totrans-68
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/49d9ed9b47ecd79d000983bceacb53cd.png)'
- en: Similarly, the combined confusion matrix shows tighter match between image and
    text. For a given text class (bottom), there is larger agreement with the image
    class in the pairwise model. This also highlights the size of the classes based
    on the width of the columns
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 同样，结合混淆矩阵显示了图像和文本之间的更紧密匹配。对于给定的文本类别（底部），在成对模型中与图像类别的协议更大。这也突出了基于列宽的类别大小
- en: Image by author using code from [Nils Flaschel](https://towardsdatascience.com/a-different-way-to-visualize-classification-results-c4d45a0a37bb/)
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者使用[Nils Flaschel](https://towardsdatascience.com/a-different-way-to-visualize-classification-results-c4d45a0a37bb/)的代码制作
- en: Final Thoughts…
  id: totrans-71
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最后的想法…
- en: This may be a good method for finding errors in large subsets of annotated data,
    or doing zero shot labeling without extensive extra GPU time for fine tuning and
    training. It introduces some novel scoring and approaches, but the overall process
    is not overly complicated or CPU/GPU/memory intensive.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 这可能是一个在大型标注数据子集中查找错误或在没有大量额外GPU时间进行微调和训练的情况下进行零样本标注的好方法。它引入了一些新颖的评分和途径，但整个过程并不过于复杂或CPU/GPU/内存密集。
- en: 'Follow up will be applying it to other image/text datasets as well as annotated/categorized
    image or text datasets to determine if scoring is boosted. In addition, it would
    be interesting to determine whether the boost in zero shot classification for
    this dataset changes substantially if:'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 后续将应用它到其他图像/文本数据集以及标注/分类的图像或文本数据集，以确定评分是否得到提升。此外，确定如果以下条件成立，该数据集的零样本分类的增强是否会有显著变化：
- en: Other scoring metrics are used instead of cross deviation ratio
  id: totrans-74
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用交叉偏差比以外的其他评分指标
- en: Full feature embeddings are substituted for targeted features
  id: totrans-75
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 全特征嵌入取代了目标特征
- en: Pairwise tourney is replaced by another approach
  id: totrans-76
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 成对锦标赛被另一种方法取代
- en: I hope you find it useful.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 希望您觉得它有用。
