- en: 'When Predictors Collide: Mastering VIF in Multicollinear Regression'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 当预测变量冲突时：掌握多重共线性回归中的VIF
- en: 原文：[https://towardsdatascience.com/when-predictors-collide-mastering-vif-in-multicollinear-regression/](https://towardsdatascience.com/when-predictors-collide-mastering-vif-in-multicollinear-regression/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/when-predictors-collide-mastering-vif-in-multicollinear-regression/](https://towardsdatascience.com/when-predictors-collide-mastering-vif-in-multicollinear-regression/)
- en: In <mdspan datatext="el1744829723173" class="mdspan-comment">regression</mdspan>
    models, the independent variables must be not or only slightly dependent on each
    other, i.e. that they are not correlated. However, if such a dependency exists,
    this is referred to as multicollinearity and leads to unstable models and results
    that are difficult to interpret. The variance inflation factor is a decisive metric
    for recognizing multicollinearity and indicates the extent to which the correlation
    with other predictors increases the variance of a regression coefficient. A high
    value of this metric indicates a high correlation of the variable with other independent
    variables in the model.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在<mdspan datatext="el1744829723173" class="mdspan-comment">回归模型</mdspan>中，自变量必须彼此不相关或只有轻微的相关性，即它们之间没有相关性。然而，如果存在这种相关性，这被称为多重共线性，会导致模型不稳定和难以解释的结果。方差膨胀因子是识别多重共线性的一个决定性指标，它表明与其他预测变量之间的相关性增加了回归系数的方差程度。这个指标的值越高，表明变量与模型中的其他自变量之间的相关性越高。
- en: In the following article, we look in detail at multicollinearity and the VIF
    as a measurement tool. We also show how the VIF can be interpreted and what measures
    can be taken to reduce it. We also compare the indicator with other methods for
    measuring multicollinearity.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在以下文章中，我们详细探讨了多重共线性以及VIF作为测量工具。我们还展示了如何解释VIF以及可以采取哪些措施来降低它。我们还比较了该指标与其他测量多重共线性的方法。
- en: What is Multicollinearity?
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是多重共线性？
- en: '[Multicollinearity](https://databasecamp.de/en/statistics/multicollinearity)
    is a phenomenon that occurs in regression analysis when two or more variables
    are strongly correlated with each other so that a change in one variable leads
    to a change in the other variable. As a result, the development of an independent
    variable can be predicted completely or at least partially by another variable.
    This complicates the prediction of linear regression to determine the influence
    of an independent variable on the dependent variable.'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: '[多重共线性](https://databasecamp.de/en/statistics/multicollinearity)是回归分析中的一种现象，当两个或更多变量彼此高度相关时发生，即一个变量的变化会导致另一个变量的变化。因此，一个自变量的发展可以完全或至少部分地由另一个变量预测。这使线性回归的预测复杂化，以确定自变量对因变量的影响。'
- en: 'A distinction can be made between two types of multicollinearity:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 可以区分两种类型的多重共线性：
- en: '**Perfect Multicollinearity**: a variable is an exact linear combination of
    another variable, for example when two variables measure the same thing in different
    units, such as weight in kilograms and pounds.'
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**完全多重共线性**：一个变量是另一个变量的精确线性组合，例如当两个变量以不同的单位测量同一事物时，例如以千克和磅计量的重量。'
- en: '**High Degree of Multicollinearity**: Here, one variable is strongly, but not
    completely, explained by at least one other variable. For example, there is a
    high correlation between a person’s education and their income, but it is not
    perfect multicollinearity.'
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**高度多重共线性**：在这种情况下，一个变量至少被另一个变量强烈解释，但不是完全解释。例如，一个人的教育与他们的收入之间存在高度相关性，但这不是完全多重共线性。'
- en: The occurrence of multicollinearity in regressions leads to serious problems
    as, for example, the regression coefficients become unstable and react very strongly
    to new data, so that the overall prediction quality suffers. Various methods can
    be used to recognize multicollinearity, such as the correlation matrix or the
    variance inflation factor, which we will look at in more detail in the next section.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 在回归中出现多重共线性会导致严重问题，例如，回归系数变得不稳定，对新数据反应非常强烈，从而使整体预测质量受损。可以使用各种方法来识别多重共线性，例如相关矩阵或方差膨胀因子，我们将在下一节中更详细地探讨。
- en: What is the Variance Inflation Factor (VIF)?
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是方差膨胀因子（VIF）？
- en: 'The variance inflation factor (VIF) describes a diagnostic tool for regression
    models that helps to detect multicollinearity. It indicates the factor by which
    the variance of a coefficient increases due to the correlation with other variables.
    A high VIF value indicates a strong multicollinearity of the variable with other
    independent variables. This negatively influences the regression coefficient estimate
    and results in high standard errors. It is therefore important to calculate the
    VIF so that multicollinearity is recognized at an early stage and countermeasures
    can be taken. <mdspan datatext="el1744829524858" class="mdspan-comment">The VIF
    for a single variable \(i\) is calculated using this formula</mdspan>:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 方差膨胀因子（VIF）描述了回归模型的诊断工具，有助于检测多重共线性。它表示由于与其他变量的相关性，系数的方差增加的因子。高VIF值表明变量与其他自变量之间存在强烈的多重共线性。这会负面影响回归系数的估计，并导致高标准误差。因此，重要的是要计算VIF，以便在早期识别多重共线性并采取对策。
    <mdspan datatext="el1744829524858" class="mdspan-comment">单个变量 \(i\) 的VIF使用此公式计算</mdspan>：
- en: \[\] \[VIF = \frac{1}{(1 – R^2)}\]
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: \[\] \[VIF = \frac{1}{(1 – R^2)}\]
- en: Here \(R^2\) is the so-called coefficient of determination of the regression
    of feature \(i\) against all other independent variables. A high \(R^2\) value
    indicates that a large proportion of the variables can be explained by the other
    features, so that multicollinearity is suspected.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 这里 \(R^2\) 是特征 \(i\) 对所有其他自变量的回归的所谓确定系数。一个高的 \(R^2\) 值表明，变量的大部分可以由其他特征解释，因此怀疑存在多重共线性。
- en: In a regression with the three independent variables \(X_1\), \(X_2\) and \(X_3\),
    for example, one would train a regression with \(X_1\) as the dependent variable
    and \(X_2\) and \(X_3\) as independent variables. With the help of this model,
    \(R_{1}^2\) could then be calculated and inserted into the formula for the VIF.
    This procedure would then be repeated for the remaining combinations of the three
    independent variables.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，在一个包含三个自变量 \(X_1\)、\(X_2\) 和 \(X_3\) 的回归中，人们会训练一个以 \(X_1\) 为因变量，\(X_2\) 和
    \(X_3\) 为自变量的回归。借助这个模型，可以计算出 \(R_{1}^2\) 并将其代入VIF的公式中。然后，将重复此过程，对三个自变量的剩余组合进行操作。
- en: A typical threshold value is VIF > 10, which indicates strong multicollinearity.
    In the following section, we look in more detail at the interpretation of the
    variance inflation factor.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 典型的阈值值是VIF > 10，这表明存在强烈的多重共线性。在下一节中，我们将更详细地探讨方差膨胀因子的解释。
- en: How can different Values of the Variance Inflation Factor be interpreted?
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何解释方差膨胀因子（VIF）的不同值？
- en: 'After calculating the VIF, it is important to be able to evaluate what statement
    the value makes about the situation in the model and to be able to deduce whether
    measures are necessary. The values can be interpreted as follows:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 计算VIF之后，重要的是能够评估该值对模型中情况的陈述，以及能够推断是否需要采取措施。这些值可以这样解释：
- en: '**VIF = 1**: This value indicates that there is no multicollinearity between
    the analyzed variable and the other variables. This means that no further action
    is required.'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**VIF = 1**：这个值表明，分析变量与其他变量之间没有多重共线性。这意味着不需要采取进一步行动。'
- en: '**VIF between 1 and 5**: If the value is in the range between 1 and 5, then
    there is multicollinearity between the variables, but this is not large enough
    to represent an actual problem. Rather, the dependency is still moderate enough
    that it can be absorbed by the model itself.'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**VIF在1到5之间**：如果值在这个范围内，那么变量之间存在多重共线性，但这并不足以表示一个真正的问题。相反，这种依赖性仍然足够适中，可以被模型本身吸收。'
- en: '**VIF > 5**: In such a case, there is already a high degree of multicollinearity,
    which requires intervention in any case. The standard error of the predictor is
    likely to be significantly excessive, so the regression coefficient may be unreliable.
    Consideration should be given to combining the correlated predictors into one
    variable.'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**VIF > 5**：在这种情况下，已经存在高度的多重共线性，无论如何都需要干预。预测器的标准误差可能显著过高，因此回归系数可能不可靠。应考虑将相关的预测变量合并为一个变量。'
- en: '**VIF > 10**: With such a value, the variable has serious multicollinearity
    and the regression model is very likely to be unstable. In this case, consideration
    should be given to removing the variable to obtain a more powerful model.'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**VIF > 10**：具有这样的值，变量存在严重多重共线性，回归模型很可能非常不稳定。在这种情况下，应考虑删除变量以获得更强大的模型。'
- en: Overall, a high VIF value indicates that the variable may be redundant, as it
    is highly correlated with other variables. In such cases, various measures should
    be taken to reduce multicollinearity.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 总体而言，高VIF值表明变量可能是冗余的，因为它与其他变量高度相关。在这种情况下，应采取各种措施来减少多重共线性。
- en: What measures help to reduce the VIF?
  id: totrans-23
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 有哪些措施有助于降低VIF？
- en: 'There are various ways to circumvent the effects of multicollinearity and thus
    also reduce the variance inflation factor. The most popular measures include:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 有各种方法可以规避多重共线性的影响，从而降低方差膨胀因子。最常用的措施包括：
- en: '**Removing highly correlated variables**: Especially with a high VIF value,
    removing individual variables with high multicollinearity is a good tool. This
    can improve the results of the regression, as redundant variables estimate the
    coefficients more unstable.'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**移除高度相关的变量**：特别是当VIF值很高时，移除具有高度多重共线性的单个变量是一个很好的工具。这可以提高回归的结果，因为冗余变量估计的系数更不稳定。'
- en: '**[Principal component analysis (PCA)](https://databasecamp.de/en/statistics/principal-component-analysis-en)**:
    The core idea of principal component analysis is that several variables in a data
    set may measure the same thing, i.e. be correlated. This means that the various
    dimensions can be combined into fewer so-called principal components without compromising
    the significance of the data set. Height, for example, is highly correlated with
    shoe size, as tall people often have taller shoes and vice versa. This means that
    the correlated variables are then combined into uncorrelated main components,
    which reduces multicollinearity without losing important information. However,
    this is also accompanied by a loss of interpretability, as the principal components
    do not represent real characteristics, but a combination of different variables.'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**[主成分分析 (PCA)](https://databasecamp.de/en/statistics/principal-component-analysis-en)**:
    主成分分析的核心思想是数据集中的多个变量可能测量同一事物，即它们是相关的。这意味着可以将各种维度组合成更少的所谓主成分，而不会降低数据集的重要性。例如，身高与鞋码高度相关，因为高个子的人通常穿鞋码更大的鞋，反之亦然。这意味着相关的变量随后被组合成不相关的主成分，这减少了多重共线性，而没有丢失重要信息。然而，这也伴随着可解释性的损失，因为主成分并不代表真实特征，而是不同变量的组合。'
- en: '**Regularization Methods**: Regularization comprises various methods that are
    used in statistics and machine learning to control the complexity of a model.
    It helps to react robustly to new and unseen data and thus enables the generalizability
    of the model. This is achieved by adding a penalty term to the model’s optimization
    function to prevent the model from adapting too much to the training data. This
    approach reduces the influence of highly correlated variables and lowers the VIF.
    At the same time, however, the accuracy of the model is not affected.'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**正则化方法**：正则化包括各种在统计学和机器学习中用于控制模型复杂性的方法。它有助于对新数据和未见数据做出稳健的反应，从而实现模型的泛化能力。这是通过向模型的优化函数添加惩罚项来实现的，以防止模型过度适应训练数据。这种方法减少了高度相关变量的影响，并降低了VIF。然而，同时，模型的准确性不会受到影响。'
- en: These methods can be used to effectively reduce the VIF and combat multicollinearity
    in a regression. This makes the results of the model more stable and the standard
    error can be better controlled.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 这些方法可以有效地降低VIF并对抗回归中的多重共线性。这使得模型的结果更稳定，并且可以更好地控制标准误差。
- en: How does the VIF compare to other methods?
  id: totrans-29
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: VIF与其他方法相比如何？
- en: The variance inflation factor is a widely used technique to measure multicollinearity
    in a data set. However, other methods can offer specific advantages and disadvantages
    compared to the VIF, depending on the application.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 方差膨胀因子是一种广泛使用的测量数据集中多重共线性的技术。然而，与其他方法相比，其他方法可以提供特定的优势和劣势，这取决于应用。
- en: '**Correlation Matrix**'
  id: totrans-31
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**相关矩阵**'
- en: The [correlation matrix](https://databasecamp.de/en/ml/correlation-matrix) is
    a statistical method for quantifying and comparing the relationships between different
    variables in a data set. The pairwise correlations between all combinations of
    two variables are shown in a tabular structure. Each cell in the matrix contains
    the so-called correlation coefficient between the two variables defined in the
    column and the row.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: '[相关矩阵](https://databasecamp.de/en/ml/correlation-matrix)是一种统计方法，用于量化并比较数据集中不同变量之间的关系。所有两个变量的组合之间的成对相关关系以表格结构显示。矩阵中的每个单元格包含列和行中定义的两个变量之间的所谓相关系数。'
- en: This value can be between -1 and 1 and provides information on how the two variables
    relate to each other. A positive value indicates a positive correlation, meaning
    that an increase in one variable leads to an increase in the other variable. The
    exact value of the correlation coefficient provides information on how strongly
    the variables move about each other. With a negative correlation coefficient,
    the variables move in opposite directions, meaning that an increase in one variable
    leads to a decrease in the other variable. Finally, a coefficient of 0 indicates
    that there is no correlation.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 这个值介于 -1 和 1 之间，提供了两个变量之间关系的详细信息。正值表示正相关，意味着一个变量的增加会导致另一个变量的增加。相关系数的确切值提供了关于变量如何相互移动的信息。负的相关系数表示变量朝相反方向移动，意味着一个变量的增加会导致另一个变量的减少。最后，系数为
    0 表示没有相关性。
- en: '![](../Images/9d27b36e60d44c83cb8cae997c57a0af.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/9d27b36e60d44c83cb8cae997c57a0af.png)'
- en: 'Example of a Correlation Matrix | Source: Author'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 相关矩阵示例 | 来源：作者
- en: A correlation matrix therefore fulfills the purpose of presenting the correlations
    in a data set in a quick and easy-to-understand way and thus forms the basis for
    subsequent steps, such as model selection. This makes it possible, for example,
    to recognize multicollinearity, which can cause problems with regression models,
    as the parameters to be learned are distorted.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，相关矩阵以快速、易于理解的方式呈现数据集中的相关性，从而成为后续步骤（如模型选择）的基础。这使得有可能识别出可能对回归模型造成问题的多重共线性，因为要学习的参数被扭曲。
- en: Compared to the VIF, the correlation matrix only offers a surface analysis of
    the correlations between variables. However, the biggest difference is that the
    correlation matrix only shows the pairwise comparisons between variables and not
    the simultaneous effects between several variables. In addition, the VIF is more
    useful for quantifying exactly how much multicollinearity affects the estimate
    of the coefficients.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 与 VIF 相比，相关矩阵只提供了变量之间相关性的表面分析。然而，最大的区别是相关矩阵只显示了变量之间的成对比较，而不是几个变量之间的同时效应。此外，VIF
    在量化多重共线性对系数估计的影响程度方面更有用。
- en: Eigenvalue Decomposition
  id: totrans-38
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 特征值分解
- en: Eigenvalue decomposition is a method that builds on the correlation matrix and
    mathematically helps to identify multicollinearity. Either the correlation matrix
    or the covariance matrix can be used. In general, small eigenvalues indicate a
    stronger, linear dependency between the variables and are therefore a sign of
    multicollinearity.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 特征值分解是一种基于相关矩阵的方法，从数学上帮助识别多重共线性。可以使用相关矩阵或协方差矩阵。一般来说，小的特征值表明变量之间存在更强的线性依赖性，因此是多重共线性的迹象。
- en: Compared to the VIF, the eigenvalue decomposition offers a deeper mathematical
    analysis and can in some cases also help to detect multicollinearity that would
    have remained hidden by the VIF. However, this method is much more complex and
    difficult to interpret.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 与 VIF 相比，特征值分解提供了更深入的数学分析，在某些情况下还可以帮助检测 VIF 可能隐藏的多重共线性。然而，这种方法更加复杂，也更难以解释。
- en: The VIF is a simple and easy-to-understand method for detecting multicollinearity.
    Compared to other methods, it performs well because it allows a precise and direct
    analysis that is at the level of the individual variables.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: VIF 是一种简单易懂的检测多重共线性（multicollinearity）的方法。与其他方法相比，它表现良好，因为它允许精确直接的分析，且分析水平达到个体变量。
- en: How to detect Multicollinearity in Python?
  id: totrans-42
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何在 Python 中检测多重共线性？
- en: Recognizing multicollinearity is a crucial step in data preprocessing in machine
    learning to train a model that is as meaningful and robust as possible. In this
    section, we therefore take a closer look at how the VIF can be calculated in Python
    and how the correlation matrix is created.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 在机器学习中，识别多重共线性是数据预处理中的关键步骤，以训练尽可能有意义和健壮的模型。因此，在本节中，我们将更详细地探讨如何在 Python 中计算 VIF
    以及如何创建相关矩阵。
- en: Calculating the Variance Inflation Factor in Python
  id: totrans-44
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在 Python 中计算方差膨胀因子
- en: The variance inflation factor can be easily used and imported in Python via
    the `statsmodels` library. Assuming we already have a Pandas DataFrame in a variable `X` that
    contains the independent variables, we can simply create a new, empty DataFrame
    for calculating the VIFs. The variable names and values are then saved in this
    frame.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 方差膨胀因子可以很容易地在Python中通过`statsmodels`库使用和导入。假设我们已经在变量`X`中有一个包含自变量的Pandas DataFrame，我们可以简单地创建一个新的空DataFrame来计算VIFs。然后，将变量名和值保存在这个框架中。
- en: '![Collinearity](../Images/151b85317e0ff418f6dac295017a26f6.png)'
  id: totrans-46
  prefs: []
  type: TYPE_IMG
  zh: '![多重共线性](../Images/151b85317e0ff418f6dac295017a26f6.png)'
- en: A new row is created for each independent variable in `X` in the `Variable` column.
    It is then iterated through all variables in the data set and the variance inflation
    factor is calculated for the values of the variables and again saved in a list.
    This list is then stored as column VIF in the DataFrame.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 在“变量”列中为`X`中的每个自变量创建一个新行。然后，遍历数据集中的所有变量，计算变量的值对应的方差膨胀因子，并将其再次保存到列表中。然后，将此列表存储为DataFrame中的VIF列。
- en: Calculating the Correlation Matrix
  id: totrans-48
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 计算相关矩阵
- en: In Python, a correlation matrix can be easily calculated using Pandas and then
    visualized as a heatmap using Seaborn. To illustrate this, we generate random
    data using NumPy and store it in a DataFrame. As soon as the data is stored in
    a DataFrame, the correlation matrix can be created using the `corr()` function.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 在Python中，可以使用Pandas轻松计算相关矩阵，然后使用Seaborn将其可视化成热图。为了说明这一点，我们使用NumPy生成随机数据并将其存储在DataFrame中。一旦数据存储在DataFrame中，就可以使用`corr()`函数创建相关矩阵。
- en: If no parameters are defined within the function, the Pearson coefficient is
    used by default to calculate the correlation matrix. Otherwise, you can also define
    a different correlation coefficient using the method parameter.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 如果函数内部没有定义任何参数，则默认使用皮尔逊相关系数来计算相关矩阵。否则，也可以使用方法参数定义不同的相关系数。
- en: '![Correlation Matrix / Korrelationsmatrix](../Images/e609f10ce44d792b5fd723b312a4a77c.png)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![相关矩阵 / Korrelationsmatrix](../Images/e609f10ce44d792b5fd723b312a4a77c.png)'
- en: Finally, the heatmap is visualized using `seaborn`. To do this, the `heatmap()` function
    is called and the correlation matrix is passed. Among other things, the parameters
    can be used to determine whether the labels should be added and the color palette
    can be specified. The diagram is then displayed with the help of `matplolib`.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，使用`seaborn`进行热图可视化。为此，调用`heatmap()`函数并将相关矩阵传递给它。除此之外，还可以使用参数确定是否添加标签以及指定颜色调色板。然后，借助`matplotlib`显示图表。
- en: This is what you should take with you
  id: totrans-53
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 这是你应该带走的内容
- en: The variance inflation factor is a key indicator for recognizing multicollinearity
    in a regression model.
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 方差膨胀因子是识别回归模型中多重共线性问题的关键指标。
- en: The coefficient of determination of the independent variables is used for the
    calculation. Not only the correlation between two variables can be measured, but
    also combinations of variables.
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用自变量的确定系数进行计算。不仅可以测量两个变量之间的相关性，还可以测量变量组合。
- en: In general, a reaction should be taken if the VIF is greater than five, and
    appropriate measures should be introduced. For example, the affected variables
    can be removed from the data set or the principal component analysis can be performed.
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通常情况下，如果方差膨胀因子（VIF）大于五，就应该采取相应的措施，并引入适当的措施。例如，可以将受影响的变量从数据集中移除，或者执行主成分分析。
- en: In Python, the VIF can be calculated directly using statsmodels. To do this,
    the data must be stored in a DataFrame. The correlation matrix can also be calculated
    using Seaborn to detect multicollinearity.
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在Python中，可以使用statsmodels直接计算VIF。为此，数据必须存储在DataFrame中。也可以使用Seaborn计算相关矩阵以检测多重共线性。
