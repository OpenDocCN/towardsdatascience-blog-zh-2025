- en: The Next Frontier in LLM Accuracy
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/the-next-frontier-in-llm-accuracy-cb2491a740d4/](https://towardsdatascience.com/the-next-frontier-in-llm-accuracy-cb2491a740d4/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![Image generated by DALL-E 3](../Images/7d01baed1d7bb1bffb4f15b868123d5a.png)'
  prefs: []
  type: TYPE_IMG
- en: Image generated by DALL-E 3
  prefs: []
  type: TYPE_NORMAL
- en: 'Accuracy is often critical for LLM applications, especially in cases such as
    API calling or summarisation of financial reports. Fortunately, there are ways
    to enhance precision. The best practices to improve accuracy include the following
    steps:'
  prefs: []
  type: TYPE_NORMAL
- en: You can start simply with **prompt engineering techniques** – adding more detailed
    instructions, using few-shot prompting, or asking the model to think step-by-step.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If accuracy is still insufficient, you can incorporate a **self-reflection step**,
    for example, to return errors from the API calls and ask the LLM to correct mistakes.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The next option is to provide the most relevant context to the LLM using **RAG
    (Retrieval-Augmented Generation)** to boost precision further.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'We’ve explored this approach in my previous TDS article, *["From Prototype
    to Production: Enhancing LLM Accuracy"](https://medium.com/towards-data-science/from-prototype-to-production-enhancing-llm-accuracy-791d79b0af9b).*
    In that project, we built an SQL Agent and went from 0% valid SQL queries to 70%
    accuracy. However, there are limits to what we can achieve with prompt. To break
    through this barrier and reach the next frontier of accuracy, we need to adopt
    more advanced techniques.'
  prefs: []
  type: TYPE_NORMAL
- en: The most promising option is fine-tuning. With fine-tuning, we can move from
    relying solely on information in prompts to embedding additional information directly
    into the model’s weights.
  prefs: []
  type: TYPE_NORMAL
- en: Fine-tuning
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let’s start by understanding what fine-tuning is. Fine-tuning is the process
    of refining pre-trained models by training them on smaller, task-specific datasets
    to enhance their performance in particular applications. Basic models are initially
    trained on vast amounts of data, which allows them to develop a broad understanding
    of language. Fine-tuning, however, tailors these models to specialized tasks,
    transforming them from general-purpose systems into highly targeted tools. For
    example, instruction fine-tuning taught GPT-2 to chat and follow instructions,
    and that’s how ChatGPT emerged.
  prefs: []
  type: TYPE_NORMAL
- en: Basic LLMs are initially trained to predict the next token based on vast text
    corpora. Fine-tuning typically adopts a supervised approach, where the model is
    presented with specific questions and corresponding answers, allowing it to adjust
    its weights to improve accuracy.
  prefs: []
  type: TYPE_NORMAL
- en: Historically, fine-tuning required updating all model weights, a method known
    as full fine-tuning. This process was computationally expensive since it required
    storing all the model weights, states, gradients and forward activations in memory.
    To address these challenges, parameter-efficient fine-tuning techniques were introduced.
    PEFT methods update only the small set of the model parameters while keeping the
    rest frozen. Among these methods, one of the most widely adopted is [LoRA](https://github.com/microsoft/LoRA)
    (Low-Rank Adaptation), which significantly reduces the computational cost without
    compromising performance.
  prefs: []
  type: TYPE_NORMAL
- en: Pros & cons
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Before considering fine-tuning, it’s essential to weigh its advantages and limitations.
  prefs: []
  type: TYPE_NORMAL
- en: '**Advantages:**'
  prefs: []
  type: TYPE_NORMAL
- en: Fine-tuning enables the model to learn and retain significantly more information
    than can be provided through prompts alone.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It usually gives higher accuracy, often exceeding 90%.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: During inference, it can reduce costs by enabling the use of smaller, task-specific
    models instead of larger, general-purpose ones.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Fine-tuned small models can often be deployed on-premises, eliminating reliance
    on cloud providers such as OpenAI or Anthropic. This approach reduces costs, enhances
    privacy, and minimizes dependency on external infrastructure.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Disadvantages:**'
  prefs: []
  type: TYPE_NORMAL
- en: Fine-tuning requires upfront investments for model training and data preparation.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It requires specific technical knowledge and may involve a steep learning curve.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The quality of results depends heavily on the availability of high-quality training
    data.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Since this project is focused on gaining knowledge, we will proceed with fine-tuning.
    However, in real-world scenarios, it’s important to evaluate whether the benefits
    of fine-tuning justify all the associated costs and efforts.
  prefs: []
  type: TYPE_NORMAL
- en: Execution
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The next step is to plan how we will approach fine-tuning. After listening
    to the ["Improving Accuracy of LLM Applications"](https://www.deeplearning.ai/short-courses/improving-accuracy-of-llm-applications/)
    course, I’ve decided to try [the Lamini platform](https://www.lamini.ai/) for
    the following reasons:'
  prefs: []
  type: TYPE_NORMAL
- en: It offers a simple one-line API call to fine-tune the model. It’s especially
    convenient since we’re just starting to learn a new technique.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Although it’s not free and can be quite expensive for toy projects (at $1 per
    tuning step), they offer free credits upon registration, which are sufficient
    for initial testing.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Lamini has implemented a new approach, Lamini Memory Tuning, which promises
    zero loss of factual accuracy while preserving general capabilities. This is a
    significant claim, and it’s worth testing out. We will discuss this approach in
    more detail shortly.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Of course, there are lots of other fine-tuning options you can consider:'
  prefs: []
  type: TYPE_NORMAL
- en: '[The Llama documentation](https://www.llama.com/docs/how-to-guides/fine-tuning/)
    provides numerous recipes for fine-tuning, which can be executed on a cloud server
    or even locally for smaller models.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: There are many step-by-step guides available online, including the tutorial
    on how to fine-tune Llama on Kaggle from [DataCamp](https://www.datacamp.com/tutorial/fine-tuning-llama-3-1).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can fine-tune not only open-sourced models. OpenAI also [offers](https://platform.openai.com/docs/guides/fine-tuning#which-models-can-be-fine-tuned)
    the capability to fine-tune their models.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Lamini Memory Tuning
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As I mentioned earlier, Lamini released a new approach to fine-tuning, and I
    believe it’s worth discussing it in more detail.
  prefs: []
  type: TYPE_NORMAL
- en: Lamini introduced the Mixture of Memory Experts (MoME) approach, which enables
    LLMs to learn a vast amount of factual information with almost zero loss, all
    while maintaining generalization capabilities and requiring a feasible amount
    of computational resources.
  prefs: []
  type: TYPE_NORMAL
- en: To achieve this, Lamini extended a pre-trained LLM by adding a large number
    (on the order of 1 million) of LoRA adapters along with a cross-attention layer.
    Each LoRA adapter is a memory expert, functioning as a type of memory for the
    model. These memory experts specialize in different aspects, ensuring that the
    model retains faithful and accurate information from the data it was tuned on.
    Inspired by information retrieval, these million memory experts are equivalent
    to indices from which the model intelligently retrieves and routes.
  prefs: []
  type: TYPE_NORMAL
- en: At inference time, the model retrieves a subset of the most relevant experts
    at each layer and merges back into the base model to generate a response to the
    user query.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure from the paper by Li et al. 2024 | source](../Images/8ca6a10ad49b82e53cb8061bb13802ab.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure from the paper by Li et al. 2024 | [source](https://arxiv.org/abs/2406.17642)
  prefs: []
  type: TYPE_NORMAL
- en: Lamini Memory Tuning is [said](https://www.lamini.ai/blog/lamini-memory-tuning)
    to be capable of achieving 95% accuracy. The key difference from traditional instruction
    fine-tuning is that instead of optimizing for average error across all tasks,
    this approach focuses on achieving zero error for the facts the model is specifically
    trained to remember.
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure from the paper by Li et al. 2024 | source](../Images/360a6e825c3f3ac9e89043185972c964.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure from the paper by Li et al. 2024 | [source](https://arxiv.org/abs/2406.17642)
  prefs: []
  type: TYPE_NORMAL
- en: So, this approach allows an LLM to preserve its ability to generalize with average
    error on everything else while recalling the important facts nearly perfectly.
  prefs: []
  type: TYPE_NORMAL
- en: For further details, you can refer to the research paper ["Banishing LLM Hallucinations
    Requires Rethinking Generalization"](https://arxiv.org/abs/2406.17642) by Li et
    al. (2024)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Lamini Memory Tuning holds great promise – let’s see if it delivers on its potential
    in practice.
  prefs: []
  type: TYPE_NORMAL
- en: Setup
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As always, let’s begin by setting everything up. As we discussed, we’ll be using
    [Lamini](https://docs.lamini.ai/) to fine-tune Llama, so the first step is to
    install the Lamini package.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Additionally, we need to set up the Lamini API Key on [their website](https://app.lamini.ai/account)
    and specify it as an environment variable.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: As I mentioned above, we will be improving the SQL Agent, so we need a database.
    For this example, we’ll continue using ClickHouse, but feel free to choose any
    database that suits your needs. You can find more details on the ClickHouse setup
    and the database schema in [the previous article](https://medium.com/towards-data-science/from-prototype-to-production-enhancing-llm-accuracy-791d79b0af9b).
  prefs: []
  type: TYPE_NORMAL
- en: Creating a training dataset
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To fine-tune an LLM, we first need a dataset – in our case, a set of pairs of
    questions and answers (SQL queries). The task of putting together a dataset might
    seem daunting, but luckily, we can leverage LLMs to do it.
  prefs: []
  type: TYPE_NORMAL
- en: 'The key factors to consider while preparing the dataset:'
  prefs: []
  type: TYPE_NORMAL
- en: '**The quality of the data** is crucial, as we will ask the model to remember
    these facts.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Diversity** in the examples is important so that a model can learn how to
    handle different cases.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It’s preferable to use **real data** rather than synthetically generated data
    since it better represents real-life questions.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The usual minimum size for a fine-tuning dataset is around **1,000 examples**,
    but the more high-quality data, the better.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Generating examples
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: All the information required to create question-and-answer pairs is present
    in the database schema, so it will be a feasible task for an LLM to generate examples.
    Additionally, I have a [representative set](https://github.com/miptgirl/miptgirl_medium/blob/main/sql_agent_accuracy/rag_set.json)
    of Q&A pairs that I used for RAG approach, which we can present to the LLM as
    examples of valid queries (using the few-shot prompting technique). Let’s load
    the RAG dataset.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: The idea is to iteratively provide the LLM with the schema information and a
    set of random examples (to ensure diversity in the questions) and ask it to generate
    a new, similar, but different Q&A pair.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s create a system prompt that includes all the necessary details about the
    database schema.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: The next step is to create a template for the user query.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: Since we need a high-quality dataset, I prefer using a more advanced model –
    `GPT-4o`— rather than Llama. As usual, I’ll initialize the model and create a
    dummy tool for structured output.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: Now, let’s combine everything into a function that will generate a Q&A pair
    and create a set of examples.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: I generated 2,000 examples, but in reality, I used a much smaller dataset for
    this toy project. Therefore, I recommend limiting the number of examples to 200–300.
  prefs: []
  type: TYPE_NORMAL
- en: Cleaning the dataset
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As we know, "*garbage in, garbage out*", so an essential step before fine-tuning
    is cleaning the data generated by the LLM.
  prefs: []
  type: TYPE_NORMAL
- en: The first – and most obvious – check is to ensure that each SQL query is valid.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: There are no invalid SQL queries, but some questions return over 1,000 rows.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b92fd819c5cd69c91d4c61a0ba5b7e7a.png)'
  prefs: []
  type: TYPE_IMG
- en: Although these cases are valid, we’re focusing on an [OLAP](https://en.wikipedia.org/wiki/Online_analytical_processing)
    scenario with aggregated stats, so I’ve retained only queries that return 100
    or fewer rows.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: I also eliminated cases with empty output – queries that return no rows or only
    the header.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: Another important check is for duplicate questions. The same question with different
    answers could confuse the model, as it won’t be able to tune to both solutions
    simultaneously. And in fact, we have such cases.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/dd1b54d7e4f00fd2cca8413cae07edd7.png)'
  prefs: []
  type: TYPE_IMG
- en: To resolve these duplicates, I’ve kept only one answer for each question.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: Although I generated around 2,000 examples, I’ve decided to use a smaller dataset
    of 200 question-and-answer pairs. Fine-tuning with a larger dataset would require
    more tuning steps and be more expensive.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: You can find the final training dataset on [GitHub](https://github.com/miptgirl/miptgirl_medium/blob/main/sql_agent_accuracy/small_sample_for_finetuning.csv).
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Now that our training dataset is ready, we can move on to the most exciting
    part – fine-tuning.
  prefs: []
  type: TYPE_NORMAL
- en: Fine-tuning
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The first iteration
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The next step is to generate the sets of requests and responses for the LLM
    that we will use to fine-tune the model.
  prefs: []
  type: TYPE_NORMAL
- en: Since we’ll be working with the Llama model, let’s create a helper function
    to construct a prompt for it.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: For requests, we will use the following system prompt, which includes all the
    necessary information about the data schema.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: Let’s create the responses in the format suitable for Lamini fine-tuning. We
    need to prepare a list of dictionaries with `input` and `output` keys.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: Now, we are fully prepared for fine-tuning. We just need to select a model and
    initiate the process. We will be fine-tuning the Llama 3.1 8B model.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: 'We can specify several hyperparameters, and you can find all the details in
    [the Lamini documentation](https://docs.lamini.ai/tuning/hyperparameters/). For
    now, I’ve passed only the most essential ones to the function:'
  prefs: []
  type: TYPE_NORMAL
- en: '`max_steps`: This determines the number of tuning steps. The documentation
    recommends using 50 steps for experimentation to get initial results without spending
    too much money.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`learning_rate`: This parameter determines the step size of each iteration
    while moving toward a minimum of a loss function ([Wikipedia](https://en.wikipedia.org/wiki/Learning_rate)).
    The default is 0.0009, but based on [the guidance](https://docs.lamini.ai/tuning/memory_tuning/#example-memory-tuning-settings),
    I’ve decided to use a smaller value.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Now, we just need to wait for 10–15 minutes while the model trains, and then
    we can test it.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: It’s worth noting that we’re using Lamini for inference as well and will have
    to pay for it. You can find up-to-date information about the costs [here](https://www.lamini.ai/pricing).
  prefs: []
  type: TYPE_NORMAL
- en: At first glance, the result looks promising, but we need a more robust accuracy
    evaluation to confirm it.
  prefs: []
  type: TYPE_NORMAL
- en: Additionally, it’s worth noting that since we’ve fine-tuned the model for our
    specific task, it now consistently returns SQL queries, meaning we may no longer
    need to use tool calls for structured output.
  prefs: []
  type: TYPE_NORMAL
- en: Evaluating the quality
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We’ve discussed LLM accuracy evaluation in detail in [my previous article](https://medium.com/towards-data-science/from-prototype-to-production-enhancing-llm-accuracy-791d79b0af9b),
    so here I’ll provide a brief recap.
  prefs: []
  type: TYPE_NORMAL
- en: We use a golden set of question-and-answer pairs to evaluate the model’s quality.
    Since this is a toy example, I’ve limited the set to just 10 pairs, which you
    can review on [GitHub](https://github.com/miptgirl/miptgirl_medium/blob/main/sql_agent_accuracy/golden_set.json).
  prefs: []
  type: TYPE_NORMAL
- en: 'The evaluation process consists of two parts:'
  prefs: []
  type: TYPE_NORMAL
- en: '**SQL Query Validity**: First, we check that the SQL query is valid, meaning
    ClickHouse doesn’t return errors during execution.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Query Correctness**: Next, we ensure that the generated query is correct.
    We compare the outputs of the generated and true queries using LLMs to verify
    that they provide semantically identical results.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/398cbafe1e17aa084a808d35892bec8c.png)'
  prefs: []
  type: TYPE_IMG
- en: 'The initial results are far from ideal, but they are significantly better than
    the base Llama model (which produced zero valid SQL queries). Here’s what we found:'
  prefs: []
  type: TYPE_NORMAL
- en: ClickHouse returned errors for two queries.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Three queries were executed, but the results were incorrect.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Five queries were correct.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: No surprises – there’s no silver bullet, and it’s always an iterative process.
    Let’s investigate what went wrong.
  prefs: []
  type: TYPE_NORMAL
- en: Diving into the errors
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The approach is straightforward. Let’s examine the errors one by one to understand
    why we got these results and how we can fix them. We’ll start with the first unsuccessful
    example.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '**Question:** Which country had the highest number of first-time users in 2024?'
  prefs: []
  type: TYPE_NORMAL
- en: '**Golden query:**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: '**Generated query:**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE19]'
  prefs: []
  type: TYPE_PRE
- en: The query is valid, but it returns an incorrect result. The issue lies in the
    model’s assumption that the first session for each user will always have `session_id
    = 1`. Since Lamini Memory Tuning allows the model to learn facts from the training
    data, let’s investigate why the model made this assumption. Likely, it’s in our
    data.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s review all the examples that mention `first`. I’ll use broad and simple
    search criteria to get a high-level view.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/7f0a509a3af33e8f6ce4abf2a815537f.png)'
  prefs: []
  type: TYPE_IMG
- en: 'As we can see, there are no examples mentioning `first-time users` – only references
    to the first quarter. It’s no surprise that the model wasn’t able to capture this
    concept. The solution is straightforward: we just need to add a set of examples
    with questions and answers specifically about first-time users.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/af751d2fc91cfb5a0273826dd90d228b.png)'
  prefs: []
  type: TYPE_IMG
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Let’s move on to the next problematic case.
  prefs: []
  type: TYPE_NORMAL
- en: '**Question:** What was the fraud rate in 2023, expressed as a percentage?'
  prefs: []
  type: TYPE_NORMAL
- en: '**Golden query:**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE20]'
  prefs: []
  type: TYPE_PRE
- en: '**Generated query:**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE21]'
  prefs: []
  type: TYPE_PRE
- en: 'Here’s another misconception: we assumed that the fraud rate is based on the
    share of users, while the model calculated it based on the share of sessions.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s check the examples related to the fraud rate in the data. There are two
    cases: one calculates the share of users, while the other calculates the share
    of sessions.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/55370657af5cabd466137a2c5a850bdd.png)'
  prefs: []
  type: TYPE_IMG
- en: To fix this issue, I corrected the incorrect answer and added more accurate
    examples involving fraud rate calculations.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/870232c46a33d586bc9087c5364a9839.png)'
  prefs: []
  type: TYPE_IMG
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: I’d like to discuss another incorrect case, as it will highlight an important
    aspect of the process of resolving these issues.
  prefs: []
  type: TYPE_NORMAL
- en: '**Question:** What are the median and interquartile range (IQR) of purchase
    revenue for each country?'
  prefs: []
  type: TYPE_NORMAL
- en: '**Golden query:**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE22]'
  prefs: []
  type: TYPE_PRE
- en: '**Generated query:**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE23]'
  prefs: []
  type: TYPE_PRE
- en: 'When inspecting the problem, it’s crucial to focus on the model’s misconceptions
    or incorrect assumptions. For example, in this case, there may be a temptation
    to add examples similar to those in the golden dataset, but that would be too
    specific. Instead, we should address the actual root cause of the model’s misconception:'
  prefs: []
  type: TYPE_NORMAL
- en: It understood the concepts of median and IQR quite well.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The split by country is also correct.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: However, it misinterpreted the concept of "purchase revenue", including sessions
    where there was no purchase at all (`revenue = 0`).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: So, we need to ensure that our datasets contain enough information related to
    purchase revenue. Let’s take a look at what we have now. There’s only one example,
    and it’s incorrect.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/3fb4315299029c51581aa2e8fa6b8189.png)'
  prefs: []
  type: TYPE_IMG
- en: Let’s fix this example and add more cases of purchase revenue calculations.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/1471fbd67e9a19f1a9c9223a9b59c5ed.png)'
  prefs: []
  type: TYPE_IMG
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Using a similar approach, I’ve added more examples for the two remaining incorrect
    queries and compiled an updated, cleaned version of the training dataset. You
    can find it on [GitHub](https://github.com/miptgirl/miptgirl_medium/blob/main/sql_agent_accuracy/small_sample_for_finetuning_cleaned.csv).
    With this, our data is ready to the next iteration.
  prefs: []
  type: TYPE_NORMAL
- en: Another iteration of fine-tuning
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Before diving into fine-tuning, it’s essential to double-check the quality of
    the training dataset by ensuring that all SQL queries are valid.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE24]'
  prefs: []
  type: TYPE_PRE
- en: Now that we’re confident in the data, we can proceed with fine-tuning. This
    time, I’ve decided to train it for 150 steps to achieve better accuracy.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE25]'
  prefs: []
  type: TYPE_PRE
- en: After waiting a bit longer than last time, we now have a new fine-tuned model
    with nearly zero loss after 150 tuning steps.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/8bc7e6143eb28997a8f38238fc7f432b.png)'
  prefs: []
  type: TYPE_IMG
- en: We can run the evaluation again and see much better results. So, our approach
    is working.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c36ab4c4cbdfcac01261b569368c5569.png)'
  prefs: []
  type: TYPE_IMG
- en: 'The result is astonishing, but it’s still worth examining the incorrect example
    to understand what went wrong. We got an incorrect result for the question we
    discussed earlier: *"What are the median and interquartile range (IQR) of purchase
    revenue for each country?"* However, this time, the model generated a query that
    is exactly identical to the one in the golden set.'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE26]'
  prefs: []
  type: TYPE_PRE
- en: So, the issue actually lies in our evaluation. In fact, if you try to execute
    this query multiple times, you’ll notice that the results are slightly different
    each time. The root cause is that the `quantile` function in [ClickHouse](https://clickhouse.com/docs/en/sql-reference/aggregate-functions/reference/quantile)
    computes approximate values using reservoir sampling, which is why we’re seeing
    varying results. We could have used `quantileExact` instead to get more consistent
    numbers.
  prefs: []
  type: TYPE_NORMAL
- en: That said, this means that fine-tuning has allowed us to achieve 100% accuracy.
    Even though our toy golden dataset consists of just 10 questions, this is a tremendous
    achievement. We’ve progressed all the way from zero valid queries with vanilla
    Llama to 70% accuracy with RAG and self-reflection, and now, thanks to Lamini
    Memory Tuning, we’ve reached 100% accuracy.
  prefs: []
  type: TYPE_NORMAL
- en: You can find the full code on [GitHub](https://github.com/miptgirl/miptgirl_medium/blob/main/sql_agent_accuracy/sql_agent_fine_tuning.ipynb).
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In this article, we continued exploring techniques to improve LLM accuracy:'
  prefs: []
  type: TYPE_NORMAL
- en: After trying RAG and self-reflection in [the previous article](https://medium.com/towards-data-science/from-prototype-to-production-enhancing-llm-accuracy-791d79b0af9b),
    we moved on to a more advanced technique – fine-tuning.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We experimented with Memory Tuning developed by Lamini, which enables a model
    to remember a large volume of facts with near-zero errors.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In our example, Memory Tuning performed exceptionally well, and we achieved
    100% accuracy on our evaluation set of 10 questions.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Thank you a lot for reading this article. I hope this article was insightful
    for you. If you have any follow-up questions or comments, please leave them in
    the comments section.
