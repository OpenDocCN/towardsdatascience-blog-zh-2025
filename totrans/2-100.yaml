  type: TYPE_IMG
  zh: '![](../Images/f54dff7111febfce27bff02bf71336e1.png)'
- en: The fine-tuned model now produces an output that closely matches the ground
    truth, correctly capturing the table structure and sub-headers — something the
    base model struggled with.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 微调后的模型现在生成的输出与真实值非常接近，正确地捕捉到了表格结构和子标题——这是基础模型难以做到的。
- en: 'Final **HTML Similarity** metrics:'
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 最终的**HTML相似度**指标：
- en: '[PRE11]'
  id: totrans-205
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: 'This example shows a clear quantitative improvement as well: from a score of
    0.36 to 0.96 on a complex table structure — confirming that fine-tuning on this
    specialized task dramatically boosts the model’s capability.'
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: 这个例子清楚地显示了明显的量化改进：在复杂表格结构上的得分从0.36提高到0.96——证实了在这个专业任务上进行微调可以显著提高模型的能力。
- en: Inference Speed
  id: totrans-207
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 推理速度
- en: One major advantage of using a smaller model — aside from the ability to fine-tune
    on consumer-grade hardware — is **inference speed**. Even if larger models offer
    competitive performance, latency and throughput remain key factors, especially
    in production settings.
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 使用较小模型的一个主要优势——除了能够在消费级硬件上进行微调的能力之外——是**推理速度**。即使较大的模型提供具有竞争力的性能，延迟和吞吐量仍然是关键因素，尤其是在生产环境中。
- en: 'Let’s compare the inference speed of the different models:'
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们比较不同模型的推理速度：
- en: '![](../Images/1c536955b6eae017f701faebac5faf98.png)'
  id: totrans-210
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/1c536955b6eae017f701faebac5faf98.png)'
- en: Inference SpeedM | Image by author from matplotlib
  id: totrans-211
  prefs: []
  type: TYPE_NORMAL
  zh: 推理速度M | 图像由作者来自matplotlib
- en: As shown in the plot, **Pix2Struct** is by far the fastest model. For some use
    cases — such as **batch-processing thousands of documents for table extraction** —
    this speed advantage could translate into **significant time savings** and lower
    compute costs.
  id: totrans-212
  prefs: []
  type: TYPE_NORMAL
  zh: 如图中所示，**Pix2Struct**是迄今为止最快的模型。对于某些用例——例如**批量处理数千份文档进行表格提取**——这种速度优势可以转化为**显著的时间节省**和更低的计算成本。
- en: However, the **fine-tuned Granite-Vision 2B** achieves a good balance when the
    amount of documents to process is not massive, having a superior accuracy on this
    specialized task and reasonably fast inference without the need for extremely
    large compute infrastructure.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，当需要处理的文档数量不是很大时，**微调后的Granite-Vision 2B**在准确性上具有优势，推理速度合理，无需极端庞大的计算基础设施。
- en: Conclusions
  id: totrans-214
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: This project demonstrated that with **LoRA-based fine-tuning** and a **targeted
    task** (table extraction → HTML), a **small vision-language model (Granite-Vision
    2B)** can **outperform much larger models** — even Meta’s 90B LLaMA Vision — while
    requiring only a **consumer GPU** and less than a day of training.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: 这个项目证明了使用基于**LoRA的微调**和**针对性任务**（表格提取→HTML），一个**小型视觉语言模型（Granite-Vision 2B）**可以**超越许多更大的模型**——甚至Meta的90B
    LLaMA Vision——同时只需要一个**消费级GPU**和不到一天的训练时间。
- en: 'A few key takeaways:'
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 一些关键要点：
- en: '**Small, specialized models matter** — you don’t always need 70B+ models to
    solve specific problems with high accuracy.'
  id: totrans-217
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**小型、专业化的模型很重要**——你并不总是需要70B+的模型来解决特定问题并获得高精度。'
- en: '**Parameter-efficient fine-tuning (LoRA)** is a game-changer: adapting large
    foundation models becomes accessible for most practitioners.'
  id: totrans-218
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**参数高效微调（LoRA）**是一个变革性的技术：适应大型基础模型对大多数从业者来说变得可行。'
- en: '**Prompt design and training targets** have a big influence — small changes
    (like switching to `lang_table_only` or refining the prompt) directly impacted
    performance.'
  id: totrans-219
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**提示设计和技术目标**对结果有重大影响——小的改动（如切换到`lang_table_only`或细化提示）直接影响了性能。'
- en: Having a **custom metric (HTML Similarity)** was critical to track meaningful
    progress beyond generic text-based metrics.
  id: totrans-220
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 拥有一个**自定义指标（HTML相似度）**对于跟踪超越通用文本指标的有意义进展至关重要。
- en: Smaller models not only train faster, but also **infer faster** — ideal for
    production pipelines with high volume.
  id: totrans-221
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 较小的模型不仅训练更快，而且**推理更快**——非常适合高吞吐量的生产流程。
- en: Finally — and maybe most importantly — this type of experimentation shows that **you
    can move fast and iterate** even with limited hardware. Fine-tuning powerful open
    models and adapting them to real-world tasks is **not reserved to big labs anymore**.
  id: totrans-222
  prefs: []
  type: TYPE_NORMAL
  zh: 最后——也许是最重要的——这种类型的实验表明，即使硬件有限，你也可以快速行动并迭代。微调强大的开源模型并将它们适应现实世界任务不再仅限于大型实验室。
- en: I hope this encourages other AI engineers to experiment with small VLMs and
    fine-tuning techniques for their own projects and solutions — and to see that
    powerful results are possible even without massive compute budgets!
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 我希望这能鼓励其他AI工程师在自己的项目和解决方案中尝试小型VLM和微调技术——并看到即使没有庞大的计算预算，也能取得强大的结果！
- en: What’s Next?
  id: totrans-224
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 接下来是什么？
- en: 'There are definitely some interesting follow-up ideas that can be explored
    next:'
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 肯定有一些有趣的后续想法可以探索：
- en: '**Prompt engineering refinements**: Final tests (while writing this blog) showed
    that separating prompts into *system message* (defining behavior) and *user message* (providing
    task instructions) significantly improved the base model’s performance. Applying
    this strategy during fine-tuning could further enhance the model’s ability to
    consistently generate accurate HTML. This will be tested in upcoming experiments.'
  id: totrans-226
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**提示工程优化**：在撰写此博客的最终测试中显示，将提示分为*系统消息*（定义行为）和*用户消息*（提供任务指令）显著提高了基础模型的表现。在微调过程中应用此策略可以进一步提高模型持续生成准确HTML的能力。这将在即将进行的实验中得到测试。'
- en: '**Training vision layers**: Currently, only the language layers are fine-tuned,
    as training the vision layers through text-only loss proved ineffective. A more
    advanced approach could involve adding an auxiliary vision loss — for example,
    contrastive learning between vision outputs and HTML structure — to better adapt
    the vision backbone for table extraction tasks.'
  id: totrans-227
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**训练视觉层**：目前，只有语言层被微调，因为仅通过文本损失训练视觉层已被证明无效。一种更先进的方法可能包括添加辅助视觉损失——例如，在视觉输出和HTML结构之间进行对比学习——以更好地适应表格提取任务的视觉骨干。'
- en: '**Improved generalization**: The current model is fine-tuned on a single dataset.
    Expanding training to include more diverse document layouts, table styles, and
    noisy OCR scenarios could improve robustness and transferability to real-world
    data.'
  id: totrans-228
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**提高泛化能力**：当前模型是在单个数据集上微调的。将训练扩展到包括更多样化的文档布局、表格样式和有噪声的OCR场景可以提高鲁棒性和对现实世界数据的迁移性。'
