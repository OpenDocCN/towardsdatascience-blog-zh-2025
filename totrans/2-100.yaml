- en: 'Now, let’s try the exact same test using the fine-tuned model:'
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们使用微调后的模型尝试完全相同的测试：
- en: '[PRE8]'
