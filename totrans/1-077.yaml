- en: 'PyTorch Tutorial for Beginners: Build a Multiple Regression Model from Scratch'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: PyTorch入门教程：从头开始构建多元回归模型
- en: 原文：[https://towardsdatascience.com/pytorch-tutorial-for-beginners-build-a-multiple-regression-model-from-scratch/](https://towardsdatascience.com/pytorch-tutorial-for-beginners-build-a-multiple-regression-model-from-scratch/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/pytorch-tutorial-for-beginners-build-a-multiple-regression-model-from-scratch/](https://towardsdatascience.com/pytorch-tutorial-for-beginners-build-a-multiple-regression-model-from-scratch/)
- en: <mdspan datatext="el1763492731328" class="mdspan-comment">For some time</mdspan>
    before LLMs became hyped, there was an *almost visible* *line* separating Machine
    Learning frameworks from Deep Learning frameworks.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1763492731328" class="mdspan-comment">在LLMs变得流行之前的一段时间里</mdspan>，机器学习框架和深度学习框架之间几乎有一条可见的线。
- en: The talk was concentrated on Scikit-Learn, XGBoost, and similar for ML, while
    PyTorch and TensorFlow dominated the scene when Deep Learning was the matter.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 讲座主要集中在Scikit-Learn、XGBoost等机器学习工具上，而PyTorch和TensorFlow在深度学习问题时占据了主导地位。
- en: After the AI explosion, though, I have been seeing PyTorch dominating the scene
    much more than TensorFlow. Both frameworks are really powerful, enabling Data
    Scientists to solve different kinds of problems, Natural Language Processing being
    one of them, therefore increasing the popularity of Deep Learning once again.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，在人工智能爆炸之后，我看到的PyTorch在场景中的主导地位远超过TensorFlow。这两个框架都非常强大，使数据科学家能够解决不同类型的问题，自然语言处理就是其中之一，因此再次提高了深度学习的普及率。
- en: 'Well, in this post, my idea is not to talk about NLP, but instead, I will work
    with a multivariable linear regression problem with two objectives in mind:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧，在这篇文章中，我的想法不是谈论自然语言处理，而是我将使用一个具有两个目标的多元线性回归问题：
- en: Teaching how to create a model using PyTorch
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 教你如何使用PyTorch创建模型
- en: Sharing knowledge about Linear Regression that is not always found in other
    tutorials.
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分享线性回归的知识，这在其他教程中并不常见。
- en: Let’s dive in.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们深入探讨。
- en: Preparing the Data
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据准备
- en: Alright, let me spare you from a fancy definition of Linear Regression. You
    probably saw that too many times in countless tutorials all over the Internet.
    So, enough to say that *when you have a variable Y that you want to predict and
    another variable X that can explain Y’s variation using a straight line, that
    is, in essence, Linear Regression.*
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 好的，让我免于给你一个关于线性回归的华丽定义。你可能已经在无数的教程中看过很多次了。所以，只需说，*当你有一个变量Y你想预测，另一个变量X可以用一条直线解释Y的变化，本质上就是线性回归。*
- en: Dataset
  id: totrans-11
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 数据集
- en: For this exercise, let’s use the Abalone dataset [[1](https://archive.ics.uci.edu/dataset/1/abalone)].
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这个练习，让我们使用鲍鱼数据集 [[1](https://archive.ics.uci.edu/dataset/1/abalone)]。
- en: Nash, W., Sellers, T., Talbot, S., Cawthorn, A., & Ford, W. (1994). Abalone
    [Dataset]. UCI Machine Learning Repository. https://doi.org/10.24432/C55C7W.
  id: totrans-13
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: Nash, W., Sellers, T., Talbot, S., Cawthorn, A., & Ford, W. (1994). 鲍鱼 [数据集].
    UCI 机器学习仓库. https://doi.org/10.24432/C55C7W.
- en: According to the dataset documentation, *the age of abalone is determined by
    cutting the shell through the cone, staining it, and counting the number of rings
    through a microscope, a boring and time-consuming task. Other measurements, which
    are easier to obtain, are used to predict the age.*
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 根据数据集文档，*鲍鱼的年龄是通过切割壳体通过圆锥体，染色，并通过显微镜计数环数来确定的，这是一项无聊且耗时的工作。其他更容易获得的测量值用于预测年龄。*
- en: So, let us go ahead and load the data. Additionally, we will One Hot Encode
    the variable `Sex`, since it is the only categorical one.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，让我们继续加载数据。此外，我们还将对变量`Sex`进行One Hot编码，因为它是最唯一的分类变量。
- en: '[PRE0]'
  id: totrans-16
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Here’s the dataset.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是数据集。
- en: '![](../Images/44de864864c57065e355b2ce773b60f9.png)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/44de864864c57065e355b2ce773b60f9.png)'
- en: Dataset header. Image by the author.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 数据集标题。图片由作者提供。
- en: So, in order to create a better model, let’s explore the data.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，为了创建更好的模型，让我们探索数据。
- en: Exploring the Data
  id: totrans-21
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 探索数据
- en: 'The first steps I like to perform when exploring a dataset are:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 在探索数据集时，我喜欢执行的第一个步骤是：
- en: 1\. Checking the target variable’s distribution.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 1. 检查目标变量的分布。
- en: '[PRE1]'
  id: totrans-24
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: The graphic shows that the target variable is not normally distributed. That
    can impact the regression, but usually can be corrected with a power transformation,
    such as log or Box-Cox.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 图表显示目标变量不是正态分布的。这可能会影响回归，但通常可以通过幂变换，如对数或Box-Cox来纠正。
- en: '![](../Images/c39eb9b11dda90eccb21c4c3308bce13.png)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/c39eb9b11dda90eccb21c4c3308bce13.png)'
- en: Target variable distribution. Image by the author.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 目标变量分布。图片由作者提供。
- en: 2\. Look at the statistical description.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 2. 查看统计描述。
- en: The stats can show us important information like mean, standard deviation, and
    easily spot some discrepancies in terms of minimum or maximum values. The explanatory
    variables are pretty much ok, within a smaller range, and same scale. The target
    variable (`Rings`) is in a different scale.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 统计数据可以显示重要信息，如平均值、标准差，并容易发现最小值或最大值方面的差异。解释变量在较小范围内相当不错，并且具有相同的尺度。目标变量（`Rings`）则处于不同的尺度。
- en: '[PRE2]'
  id: totrans-30
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '![](../Images/88e1902360c3ec8426ee5044aa865d44.png)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/88e1902360c3ec8426ee5044aa865d44.png)'
- en: Statistical description. Image by the author.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 统计描述。图片由作者提供。
- en: Next, let’s check the correlations.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，让我们检查相关性。
- en: '[PRE3]'
  id: totrans-34
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '![](../Images/48f3f4f8f8a689ae173e55a78d25e7a2.png)'
  id: totrans-35
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/48f3f4f8f8a689ae173e55a78d25e7a2.png)'
- en: Correlations. Image by the author.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 相关性。图片由作者提供。
- en: The explanatory variables have a moderate to strong correlation with `Rings`.
    We can also see that there is some collinearity between `Whole_weight` with `Shucked_weight`,
    `Viscera_weight`, and `Shell_weight`. `Length` and `Diameter` are also collinear.
    We can test removing them later.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 解释变量与`Rings`有中等至强的相关性。我们还可以看到`Whole_weight`与`Shucked_weight`、`Viscera_weight`和`Shell_weight`之间存在一些共线性。`Length`和`Diameter`也是共线的。我们可以在稍后测试移除它们。
- en: '[PRE4]'
  id: totrans-38
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: When we plot the pairs scatterplots and look at the relationship of the variables
    with `Rings`, we can quickly identify some problems
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们绘制成对的散点图并观察变量与`Rings`的关系时，我们可以迅速识别出一些问题。
- en: The assumption of homoscedasticity is violated. This means that the relationship
    is not homogeneous in terms of variance.
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 同方差性假设被违反。这意味着关系在方差方面不是均匀的。
- en: Look how the plots form a cone shape, increasing the variance of Y as the X
    values increase. When estimating the value of `Rings` for higher values of the
    X variables, the estimate will not be very accurate.
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 看看这些图形成了一个圆锥形，随着X值的增加，Y值的方差增加。当估计X变量较高值时的`Rings`值时，估计将不会非常准确。
- en: The variable `Height` has at least two outliers that are very visible when *Height
    > 0.3*.
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当`Height > 0.3`时，变量`Height`至少有两个非常明显的异常值。
- en: '![](../Images/33651e4fb3727ec01f8680c159048542.png)'
  id: totrans-43
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/33651e4fb3727ec01f8680c159048542.png)'
- en: Pairplots no transformation. Image by the author.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 对数散点图未进行转换。图片由作者提供。
- en: Removing the outliers and transforming the target variable to logarithms will
    result in the next plot of the pairs. It is better, but still doesn’t solve the
    homoscedasticity problem.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 移除异常值并将目标变量转换为对数将导致下一对数散点图。它更好，但仍然没有解决同方差性问题。
- en: '![](../Images/4a234754c0befe58e9113a60ee963223.png)'
  id: totrans-46
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/4a234754c0befe58e9113a60ee963223.png)'
- en: Pairplots after transformation. Image by the author.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 转换后的对数散点图。图片由作者提供。
- en: Another quick exploration we can do is plotting some graphics to check the relationship
    of the variables when grouped by the `Sex` variable.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以进行的另一个快速探索是绘制一些图形来检查变量在按`Sex`变量分组时的关系。
- en: The variable `Diameter` has the most linear relationship when `Sex=I`, but that’s
    all.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 当`Sex=I`时，变量`Diameter`与线性关系最为密切，但这仅此而已。
- en: '[PRE5]'
  id: totrans-50
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: '![](../Images/409a586207278a504922f8e55f64a82c.png)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/409a586207278a504922f8e55f64a82c.png)'
- en: Diameter x Rings. Image by the author.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 直径 x Rings。图片由作者提供。
- en: On the other hand, `Shell_weight` has too much dispersion for high values, distorting
    the linear relationship.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，`Shell_weight`对于高值来说分散度太大，扭曲了线性关系。
- en: '[PRE6]'
  id: totrans-54
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: '![](../Images/05f8c31675088c7a3aca306c1ea270dd.png)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/05f8c31675088c7a3aca306c1ea270dd.png)'
- en: Shell_weight x Rings. Image by the author.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 壳重 x Rings。图片由作者提供。
- en: All of this shows that a Linear Regression model would be really challenging
    for this dataset, and will probably fail. But we still want to do it.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些都表明，对于这个数据集来说，线性回归模型将极具挑战性，并且很可能会失败。但我们仍然想尝试。
- en: By the way, I don’t remember seeing a post where we actually go through what
    went wrong. So, by doing this, we can also learn valuable lessons.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 顺便说一下，我不记得看到过一篇帖子，其中我们真正地分析了出了什么问题。所以，通过这样做，我们也可以学到宝贵的经验教训。
- en: 'Modeling: Using Scikit-Learn'
  id: totrans-59
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 模型构建：使用Scikit-Learn
- en: Let’s run the sklearn model and evaluate it using Root Mean Squared Error.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们运行sklearn模型，并使用均方根误差对其进行评估。
- en: '[PRE7]'
  id: totrans-61
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: '[PRE8]'
  id: totrans-62
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: If we look at the header, we can confirm that the model struggles with estimates
    for higher values (e.g., rows 0, 6, 7, and 9).
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们查看标题，我们可以确认模型在估计较高值（例如，行0、6、7和9）时存在困难。
- en: '![](../Images/c6c52894be1e6128eb25b9963adc73d7.png)'
  id: totrans-64
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c6c52894be1e6128eb25b9963adc73d7.png)'
- en: Header with predictions. Image by the author.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 带预测的标题。图片由作者提供。
- en: 'One Step Back: Trying Other Transformations'
  id: totrans-66
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 退一步：尝试其他转换
- en: Alright. So what can we do now?
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧。那么我们现在能做什么？
- en: Probably remove more outliers and try again. Let’s try using an unsupervised
    algorithm to find some more outliers. We will apply the **Local Outlier Factor**,
    dropping 5% of the outliers.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 可能需要移除更多的异常值并再次尝试。让我们尝试使用无监督算法来找到更多的异常值。我们将应用 **局部异常因子**，移除 5% 的异常值。
- en: We will also remove the multicollinearity, dropping `Whole_weight` and `Length`.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还将消除多重共线性，移除 `Whole_weight` 和 `Length`。
- en: '[PRE9]'
  id: totrans-70
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: '[PRE10]'
  id: totrans-71
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Same result. Hmm….
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 同样的结果。嗯……
- en: Ok. we can keep playing with the variables and feature engineering, and we will
    start seeing some improvements here and there, like when we add the squared of
    `Height`, `Diameter`, and `Shell_weight`. That added to the outliers treatment
    will drop the RMSE to **2.196**.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 好的。我们可以继续玩变量和特征工程，我们将会看到一些改进，比如当我们添加 `Height`、`Diameter` 和 `Shell_weight` 的平方时。加上异常值处理，可以将
    RMSE 降低到 **2.196**。
- en: '[PRE11]'
  id: totrans-74
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: Certainly, it is fair to note that every variable added in Linear Regression
    models will impact the R² and sometimes inflate the result, giving a false idea
    that the model is improving, when it is not. In this case, the model is actually
    improving, since we are adding some non-linear components to it with the second
    order variables. We can prove that by calculating the adjusted R². It went from
    0.495 to 0.517.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，公平地说，在线性回归模型中添加的每个变量都会影响 R²，有时还会夸大结果，给人一种模型正在改进的错觉，而实际上并没有。在这种情况下，模型实际上是在改进的，因为我们向其中添加了一些二次变量作为非线性组件。我们可以通过计算调整后的
    R² 来证明这一点。它从 0.495 提高到 0.517。
- en: '[PRE12]'
  id: totrans-76
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: On the other hand, bringing back `Whole_weight` and `Length` can improve a little
    more the numbers, but I would not recommend it. If we do that, we are adding multicolinearity
    and inflating the importance of some variables’ coefficients, leading to potential
    estimation errors in the future.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，恢复 `Whole_weight` 和 `Length` 可以让数字提高一点，但我不会推荐这样做。如果我们这样做，我们就是在增加多重共线性，并夸大了一些变量系数的重要性，这可能导致未来的潜在估计误差。
- en: 'Modeling: Using PyTorch'
  id: totrans-78
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 建模：使用 PyTorch
- en: Ok. Now that we have a base model created, the idea is to create a Linear model
    using Deep Learning and try to beat the RMSE of 2.196.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 好的。现在我们已经创建了一个基础模型，我们的想法是创建一个使用深度学习的线性模型，并尝试击败 2.196 的 RMSE。
- en: 'Right. To start, let me state this upfront: Deep Learning models work better
    with scaled data. However, as our X variables are all in the same scale, we won’t
    need to worry about that. So let’s keep moving.'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 对。首先，让我明确指出：深度学习模型在缩放数据上表现更好。然而，由于我们的 X 变量都在相同的尺度上，我们不需要担心这一点。所以让我们继续前进。
- en: '[PRE13]'
  id: totrans-81
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: We need to prepare the data for modeling with PyTorch. Here, we need some adjustments
    to make the data acceptable by the PyTorch framework, as it won’t take regular
    pandas dataframes.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要准备数据以使用 PyTorch 进行建模。在这里，我们需要一些调整，以便数据能够被 PyTorch 框架接受，因为它不会接受常规的 pandas
    数据框。
- en: Let’s use the same data frame from our base model.
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 让我们使用基础模型中的相同数据框。
- en: Split X and Y
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分割 X 和 Y
- en: Transform the Y variable to log
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将 Y 变量转换为对数
- en: Transform both to numpy arrays, since PyTorch won’t take dataframes.
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将两者都转换为 numpy 数组，因为 PyTorch 不会接受数据框。
- en: '[PRE14]'
  id: totrans-87
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: Next, using `TensorDataset`, we make X and Y become a Tensor object, and print
    the result.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，使用 `TensorDataset`，我们将 X 和 Y 转换为 Tensor 对象，并打印结果。
- en: '[PRE15]'
  id: totrans-89
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: '[PRE16]'
  id: totrans-90
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: Then, using the DataLoader function, we can create batches of data. This means
    that the Neural Network will deal with a `batch_size` amount of data at a time.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，使用 DataLoader 函数，我们可以创建数据批次。这意味着神经网络将一次处理 `batch_size` 数量的数据。
- en: '[PRE17]'
  id: totrans-92
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: PyTorch models are best defined as classes.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: PyTorch 模型最好定义为类。
- en: The class is based on the `nn.Module`, which is PyTorch’s base class for neural
    networks.
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这个类基于 `nn.Module`，这是 PyTorch 的神经网络基础类。
- en: We define the **model layers we want to use in the init method**.
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们在初始化方法中定义了想要使用的 **模型层**。
- en: '`super().__init__()` ensures the class will behave like a torch object.'
  id: totrans-96
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`super().__init__()` 确保该类将表现得像一个 torch 对象。'
- en: The `forward` method describes **what happens to the input when passed to the
    model**.
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`forward` 方法描述了**输入传递到模型时发生了什么**。'
- en: Here, we pass it through Linear layers that we defined in the init method, and
    use ReLU activation functions to add some non-linearity to the model in the forward
    pass.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们将其通过我们在初始化方法中定义的线性层传递，并在前向传递中使用 ReLU 激活函数为模型添加一些非线性。
- en: '[PRE18]'
  id: totrans-99
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: Next, let’s try the model for the first time using a script that simulates a
    Random Search.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，让我们尝试使用一个模拟随机搜索的脚本来第一次尝试模型。
- en: Create an error criterion for model evaluation
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建一个用于模型评估的错误标准
- en: Create a list to hold the data from the best model and setup the `best_loss`
    as a high value, so it will be replaced by better loss numbers during the iteration.
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建一个列表来保存最佳模型的数据，并将 `best_loss` 设置为一个高值，这样在迭代过程中它将被更好的损失数值所取代。
- en: Setup the range for the learning rate. We will use power factors from -2 to
    -4 (e.g. from 0.01 to 0.0001).
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 设置学习率的范围。我们将使用从-2到-4的幂因子（例如，从0.01到0.0001）。
- en: Setup a range for the momentum from 0.9 to 0.99.
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 设置动量的范围为0.9到0.99。
- en: Get the data
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 获取数据
- en: Zero the gradient to clear gradient calculations from previous iterations.
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将梯度归零以清除前一次迭代的梯度计算。
- en: Fit the model
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 配置模型
- en: Compute the loss and register the best model’s numbers.
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 计算损失并记录最佳模型的数值。
- en: Compute the weights and biases with the backward pass.
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过反向传播计算权重和偏置。
- en: Iterate N times and print the best model.
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 迭代N次并打印最佳模型。
- en: '[PRE19]'
  id: totrans-111
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: '[PRE20]'
  id: totrans-112
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: Once we get the best learning rate and momentum, we can move on.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦我们得到了最佳的学习率和动量，我们就可以继续了。
- en: '[PRE21]'
  id: totrans-114
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: Then, we will re-train this model, using the same steps as before, but this
    time keeping the same learning rate and momentum.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们将使用与之前相同的步骤重新训练这个模型，但这次保持相同的学习率和动量。
- en: 'Fitting a PyTorch model needs a longer script than the regular `fit()` method
    from Scikit-Learn. But it is not a big deal. The structure will always be similar
    to these steps:'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 配置PyTorch模型需要比Scikit-Learn的常规 `fit()` 方法更长的脚本。但这不是什么大问题。结构始终与这些步骤相似：
- en: Activate the `model.train()` mode
  id: totrans-117
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 激活 `model.train()` 模式
- en: Create a loop for the number of iterations you want. Each iteration is called
    an epoch.
  id: totrans-118
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为你想要的迭代次数创建一个循环。每次迭代被称为一个epoch。
- en: Zero the gradients from previous passes with `optimizer.zero_grad()`.
  id: totrans-119
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用 `optimizer.zero_grad()` 将前一次迭代的梯度归零。
- en: Get the batches from the dataloader.
  id: totrans-120
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从数据加载器获取批次。
- en: Compute the predictions with `model(X)`
  id: totrans-121
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用 `model(X)` 计算预测。
- en: Calculate the loss using `criterion(y_pred, target)`.
  id: totrans-122
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用 `criterion(y_pred, target)` 计算损失。
- en: 'Do the Backward Pass to compute the weights and bias: `loss.backward()`'
  id: totrans-123
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 执行反向传播来计算权重和偏置：`loss.backward()`
- en: Update the weights and bias with `optimizer.step()`
  id: totrans-124
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用 `optimizer.step()` 更新权重和偏置。
- en: We will train this model for `1000` epochs (iterations). Here, we are only adding
    a step to get the best model at the end, so we make sure to use the model with
    the best loss.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将训练这个模型 `1000` 个epochs（迭代）。在这里，我们只添加一个步骤来获取最后的最佳模型，所以我们确保使用具有最佳损失的模型。
- en: '[PRE22]'
  id: totrans-126
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: '[PRE23]'
  id: totrans-127
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: Nice. The model is trained. Now it is time to evaluate.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 很好。模型已经训练好了。现在是时候进行评估了。
- en: Evaluation
  id: totrans-129
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 评估
- en: Let’s check if this model did better than the regular regression. For that,
    I will put the model in evaluation mode by using `model.eval()`, so PyTorch knows
    that it needs to change the behavior from training and get into inference mode.
    It will turn off layer normalization and dropouts, for example.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们检查一下这个模型是否比常规回归做得更好。为此，我将使用 `model.eval()` 将模型置于评估模式，这样PyTorch就知道它需要从训练模式切换到推理模式。例如，它将关闭层归一化和dropout。
- en: '[PRE24]'
  id: totrans-131
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: '[PRE25]'
  id: totrans-132
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: The improvement was modest, about **4%**.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 改进幅度适中，大约 **4%**。
- en: Let’s look at some predictions from each model.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看每个模型的预测结果。
- en: '![](../Images/9da784b78532642046448972e4fd940f.png)'
  id: totrans-135
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/9da784b78532642046448972e4fd940f.png)'
- en: Predictions from both models. Image by the author.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 两个模型的预测。图片由作者提供。
- en: Both models are getting very similar results. They struggle more as the number
    of Rings becomes higher. That is due to the cone shape of the target variable.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 两个模型都在得到非常相似的结果。随着环数的增加，它们的表现更加挣扎。这是由于目标变量的锥形形状。
- en: 'If we think that through for a moment:'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们稍微思考一下：
- en: As the number of Rings increases, there is more variance coming from the explanatory
    variable.
  id: totrans-139
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 随着环数的增加，解释变量带来的方差更多。
- en: An Abalone with 15 rings will be within a much wider range of values than another
    one with 4 rings.
  id: totrans-140
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个有15个环的鲍鱼将比一个有4个环的鲍鱼在一个更宽的值范围内。
- en: This confuses the model because it needs to draw a single line in the middle
    of the data that is not that linear.
  id: totrans-141
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这会令模型困惑，因为它需要在数据中间画一条非线性的单线。
- en: Before You Go
  id: totrans-142
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在你离开之前
- en: 'We learned a lot in this project:'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个项目中我们学到了很多：
- en: How to explore data.
  id: totrans-144
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何探索数据。
- en: How to check if the linear model would be a good option.
  id: totrans-145
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何检查线性模型是否是一个好的选择。
- en: How to create a PyTorch model for a multivariable Linear Regression.
  id: totrans-146
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何为多元线性回归创建PyTorch模型。
- en: In the end, we saw that a target variable that is not homogeneous, even after
    power transformations, can lead to a low-performing model. Our model is still
    better than shooting the average value for all the predictions, but the error
    is still high, staying about 20% of the mean value.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们发现即使经过幂变换，不均匀的目标变量也可能导致模型性能低下。我们的模型仍然比对所有预测的平均值进行射击要好，但误差仍然很高，大约是平均值的20%。
- en: We tried to use Deep Learning to improve the result, but all that power was
    not enough to lower the error considerably. I would probably go with the Scikit-Learn
    model, since it is simpler and more explainable.
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 我们尝试使用深度学习来提高结果，但所有的力量都不足以显著降低误差。我可能会选择 Scikit-Learn 模型，因为它更简单，更容易解释。
- en: Other options to try to improve the results would be creating a custom ensemble
    model with a Random Forest + Linear Regression. But that is a task that I leave
    to you, if you want.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试改善结果的其他选项包括创建一个自定义的集成模型，结合随机森林和线性回归。但这是一项我留给你的任务，如果你愿意的话。
- en: If you liked this content, find me on my website.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你喜欢这个内容，可以在我的网站上找到我。
