- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Here we discussed what a confusion matrix is and how it is used to calculate
    the different classification metrics like accuracy, precision, recall and f1-score.
  prefs: []
  type: TYPE_NORMAL
- en: We also explored when to prioritize which classification metric, using the Wisconsin
    cancer dataset as an example, where we preferred maximizing recall.
  prefs: []
  type: TYPE_NORMAL
- en: I hope you found this blog helpful in understanding confusion matrix and classification
    metrics more clearly.
  prefs: []
  type: TYPE_NORMAL
- en: Thanks for reading.
  prefs: []
  type: TYPE_NORMAL
