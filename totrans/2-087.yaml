- en: 'Confusion Matrix Made Simple: Accuracy, Precision, Recall & F1-Score'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/confusion-matrix-made-simple-accuracy-precision-recall-f1-score/](https://towardsdatascience.com/confusion-matrix-made-simple-accuracy-precision-recall-f1-score/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1753806682100" class="mdspan-comment">When</mdspan> we deal
    with **classification algorithms** in machine learning like Logistic Regression,
    K-Nearest Neighbors, Support Vector Classifiers, etc., we don’t use evaluation
    metrics like Mean Absolute Error (MAE), Mean Squared Error (MSE) or Root Mean
    Squared Error (RMSE).
  prefs: []
  type: TYPE_NORMAL
- en: Instead, we generate a confusion matrix, and based on the confusion matrix,
    a classification report.
  prefs: []
  type: TYPE_NORMAL
- en: In this blog, we aim to understand what a confusion matrix is, how to calculate
    Accuracy, Precision, Recall and F1-Score using it, and how to select the relevant
    metric based on the characteristics of the data.
  prefs: []
  type: TYPE_NORMAL
- en: To understand the confusion matrix and classification metrics, let’s use the
    [Breast Cancer Wisconsin Dataset](https://archive.ics.uci.edu/dataset/17/breast+cancer+wisconsin+diagnostic).
  prefs: []
  type: TYPE_NORMAL
- en: This dataset consists of 569 rows, and each row provides information on various
    features of a tumor along with its diagnosis, whether it is malignant (cancerous)
    or benign (non-cancerous).
  prefs: []
  type: TYPE_NORMAL
- en: Now let’s build a classification model for this data to classify the tumors
    based on their features.
  prefs: []
  type: TYPE_NORMAL
- en: We now apply Logistic Regression to train a model on this dataset.
  prefs: []
  type: TYPE_NORMAL
- en: '**Code:**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Here, after applying logistic regression to the data, we generated a confusion
    matrix and a classification report to evaluate the model’s performance.
  prefs: []
  type: TYPE_NORMAL
- en: First let’s understand the confusion matrix
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/49e747c9c0b9ae4d7a8694b55451b8e4.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: From the above confusion matrix
  prefs: []
  type: TYPE_NORMAL
- en: '**’60’** represents the **correctly predicted Malignant Tumors**, which we
    refer to as **“True Positives”.**'
  prefs: []
  type: TYPE_NORMAL
- en: '**‘4’** represents the **incorrectly predicted Benign Tumors which are actually
    Malignant Tumors**, which we refer to as **“False Negatives”**.'
  prefs: []
  type: TYPE_NORMAL
- en: '**‘1’** represents the **incorrectly predicted Malignant Tumors which are actually
    Benign Tumors**, which we refer to as **“False Positives”.**'
  prefs: []
  type: TYPE_NORMAL
- en: '**‘106’** represents the **correctly predicted Benign Tumors,** which we refer
    to as **“True Negatives”.**'
  prefs: []
  type: TYPE_NORMAL
- en: Now let’s see what we can do with these values.
  prefs: []
  type: TYPE_NORMAL
- en: For that we consider the classification report.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d3b021aa944da161a083e6062a887222.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: From the above classification report, we can say that
  prefs: []
  type: TYPE_NORMAL
- en: '**For Malignant:**'
  prefs: []
  type: TYPE_NORMAL
- en: – Precision is 0.98, which means when the model predicts the tumor as Malignant,
    it is correct 98% of the time.
  prefs: []
  type: TYPE_NORMAL
- en: – Recall is 0.94, which means the model correctly identified 94% of all Malignant
    Tumors.
  prefs: []
  type: TYPE_NORMAL
- en: – F1-score is 0.96, which balances both the precision and recall.
  prefs: []
  type: TYPE_NORMAL
- en: '**For Benign:**'
  prefs: []
  type: TYPE_NORMAL
- en: – Precision is 0.96, which means when the model predicts the tumor as Benign,
    it is correct 96% of the time.
  prefs: []
  type: TYPE_NORMAL
- en: – Recall is 0.99, which means the model correctly identified 99% of all Benign
    Tumors.
  prefs: []
  type: TYPE_NORMAL
- en: – F1-score is 0.98.
  prefs: []
  type: TYPE_NORMAL
- en: From the report we can observe that the accuracy of the model is 97%.
  prefs: []
  type: TYPE_NORMAL
- en: We also have Macro Average and Weighted Average, let’s see how these are calculated.
  prefs: []
  type: TYPE_NORMAL
- en: '**Macro Average**'
  prefs: []
  type: TYPE_NORMAL
- en: Macro Average calculates the average of all metrics (precision, recall and f1-score)
    across both classes giving equal weight to each class, regardless of how many
    samples each class contains.
  prefs: []
  type: TYPE_NORMAL
- en: We use macro average, when we want to know the performance of model across all
    classes, ignoring class imbalances.
  prefs: []
  type: TYPE_NORMAL
- en: 'For this data:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/7c8f219efbc73d28cff59dc484c28e95.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: '**Weighted Average**'
  prefs: []
  type: TYPE_NORMAL
- en: Weighted Average also calculates the average of all metrics but gives more weight
    to the class with more samples.
  prefs: []
  type: TYPE_NORMAL
- en: In the above code, we used `test_size = 0.3`, which means we set aside 30% for
    testing which means we are using 171 samples from a data of 569 samples for a
    test set.
  prefs: []
  type: TYPE_NORMAL
- en: The confusion matrix and classification report are based on this test set.
  prefs: []
  type: TYPE_NORMAL
- en: Out of 171 samples of test set, we have 64 Malignant tumors and 107 Benign tumors.
  prefs: []
  type: TYPE_NORMAL
- en: Now let’s see how this weighted average is calculated for all metrics.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/5cf0cafb77da702d5ccf040444008efb.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: Weighted average gives us a more realistic performance measure when we have
    the class imbalanced datasets.
  prefs: []
  type: TYPE_NORMAL
- en: We now got an idea of each and every term in the classification report and also
    how to calculate the macro and weighted averages.
  prefs: []
  type: TYPE_NORMAL
- en: Now let’s see what’s the use of confusion matrix for generating a classification
    report.
  prefs: []
  type: TYPE_NORMAL
- en: In classification report we have different metrics like accuracy, precision
    etc. and these metrics are calculated using the values in the confusion matrix.
  prefs: []
  type: TYPE_NORMAL
- en: From the confusion matrix we have
  prefs: []
  type: TYPE_NORMAL
- en: True Positives (TP) = 60
  prefs: []
  type: TYPE_NORMAL
- en: False Negatives (FN) = 4
  prefs: []
  type: TYPE_NORMAL
- en: False Positives (FP) = 1
  prefs: []
  type: TYPE_NORMAL
- en: True Negatives (TN) = 106
  prefs: []
  type: TYPE_NORMAL
- en: Now let’s calculate the classification metrics using these values.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/8fb5c9c621867c7a32e5a6b2e7d71906.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: This is how we calculate the classification metrics using a confusion matrix.
  prefs: []
  type: TYPE_NORMAL
- en: But why do we have four different classification metrics instead of one metric
    like accuracy? It’s because the different metrics show different strengths and
    weaknesses of the classifier based on the context of the data.
  prefs: []
  type: TYPE_NORMAL
- en: Now let’s come back to the Wisconsin Breast Cancer Dataset which we used here.
  prefs: []
  type: TYPE_NORMAL
- en: When we applied a logistic regression model to this data, we got an accuracy
    of 97% which is high, which may make us think that the model is efficient.
  prefs: []
  type: TYPE_NORMAL
- en: But let’s consider another metric called ‘recall’ which is 0.94 for this model,
    which means out of all the malignant tumors we have in the test set the model
    was able to identify 94% of them correctly.
  prefs: []
  type: TYPE_NORMAL
- en: Here the model missed 6% of malignant cases.
  prefs: []
  type: TYPE_NORMAL
- en: In real-world scenarios, mainly healthcare applications like cancer detection,
    if we miss a positive case, it might delay the diagnosis and treatment.
  prefs: []
  type: TYPE_NORMAL
- en: By this we can understand that even if we have an accuracy of 97%, we need to
    look deeper based on context of data by considering different metrics.
  prefs: []
  type: TYPE_NORMAL
- en: So, what we can do now, should we aim for a recall value of 1.0 which means
    all the malignant tumors are identified correctly, but if we push recall to 1.0
    then the precision drops because the model may classify more benign tumors as
    malignant.
  prefs: []
  type: TYPE_NORMAL
- en: When the model classifies more benign tumors as malignant, there would be unnecessary
    anxiety, and it may require additional tests or treatments.
  prefs: []
  type: TYPE_NORMAL
- en: Here we should aim to maximize ‘recall’ by keeping the ‘precision’ reasonably
    high.
  prefs: []
  type: TYPE_NORMAL
- en: We can do this by changing the thresholds set by classifiers to classify the
    samples.
  prefs: []
  type: TYPE_NORMAL
- en: Most of the classifiers set the threshold to 0.5, and if we change it 0.3, we
    are saying that even if it is 30% confident, classify it as malignant.
  prefs: []
  type: TYPE_NORMAL
- en: Now let’s use a custom threshold of 0.3.
  prefs: []
  type: TYPE_NORMAL
- en: '**Code:**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Here we applied a custom threshold of 0.3 and generated a confusion matrix and
    a classification report.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/8a5b50c540983d373746db93c1a3465d.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: 'Classification Report:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/9710eda86f21ea8ae013aa9539fe0537.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: Here, the accuracy increased to 98% and the recall for malignant increased to
    97% and the precision remained the same.
  prefs: []
  type: TYPE_NORMAL
- en: We earlier discussed that there might be a decrease in precision if we try to
    maximize the recall but here the precision remains same, this depends on the data
    (whether balanced or not), preprocessing steps and tuning the threshold.
  prefs: []
  type: TYPE_NORMAL
- en: For medical datasets like this, maximizing recall is often preferred over accuracy
    or precision.
  prefs: []
  type: TYPE_NORMAL
- en: When we consider datasets like spam detection or fraud detection, we prefer
    precision and same as in above method we try to improve precision by tuning threshold
    accordingly and also by balancing the tradeoff between precision and recall.
  prefs: []
  type: TYPE_NORMAL
- en: We use f1-score when the data is imbalanced, and when we prefer both precision
    and recall where neither false positives nor false negatives can be ignored.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
