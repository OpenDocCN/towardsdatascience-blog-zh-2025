- en: 'LangGraph 201: Adding Human Oversight to Your Deep Research Agent'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/langgraph-201-adding-human-oversight-to-your-deep-research-agent/](https://towardsdatascience.com/langgraph-201-adding-human-oversight-to-your-deep-research-agent/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1757378508250" class="mdspan-comment">Losing control of</mdspan>
    your AI agent in the middle of the workflow is a common pain point. If you have
    built your own agentic applications, you’ve most likely already seen this happen.
  prefs: []
  type: TYPE_NORMAL
- en: While LLMs nowadays are incredibly capable, they’re still not quite there yet
    to run fully autonomously in a complex workflow. For any practical agentic application,
    human inputs are still much needed for making critical decisions and necessary
    course correction.
  prefs: []
  type: TYPE_NORMAL
- en: This is where **human-in-the-loop** patterns come in. And the good news is,
    you can easily implement them in LangGraph.
  prefs: []
  type: TYPE_NORMAL
- en: '**In my previous post** (*[**LangGraph 101: Let’s build a deep research agent**](https://towardsdatascience.com/langgraph-101-lets-build-a-deep-research-agent/)*),
    we thoroughly explained the core concepts of LangGraph and walked through in detail
    how to use LangGraph to build a practical deep research agent. We showed how the
    research agent can autonomously search, evaluate results, and iterate until it
    finds sufficient evidence to reach a comprehensive answer.'
  prefs: []
  type: TYPE_NORMAL
- en: One loose end from that blog is that the agent ran completely autonomously from
    start to finish. There is no entry point for human guidance or feedback.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s fix that in this tutorial!
  prefs: []
  type: TYPE_NORMAL
- en: '**So, here’s our game plan**: we’ll take the same research agent and enhance
    it with **human-in-the-loop** functionalities. You’ll see exactly how to implement
    **checkpoints** that allow human feedback to make your agents more reliable and
    trustworthy.'
  prefs: []
  type: TYPE_NORMAL
- en: '*If you’re new to LangGraph or want a refresher on the core LangGraph conpcets,
    I highly encourage you to check out [my previous post](https://towardsdatascience.com/langgraph-101-lets-build-a-deep-research-agent/).
    I’ll try to make the current post self-contained, but may skip some explanation
    given the space constraint.* *You can find more detailed descriptions in my previous
    post.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '**1\. Problem Statement**'
  prefs: []
  type: TYPE_NORMAL
- en: In this post, we build upon the deep research agent we had from the previous
    post, where we add human-in-the-loop checkpoints so that the user can review the
    agent’s decision and provide feedback.
  prefs: []
  type: TYPE_NORMAL
- en: 'As a quick reminder, our deep research agent works like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '*It takes in a user query, autonomously searches the web, examines the search
    results it obtains, and then decide if enough information has been found. If that’s
    the case, it proceeds with creating a well-crafted mini-report with proper citations;
    Otherwise, it circles back to dig deeper with more searches.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'The illustration below shows the *delta* we’re building: the left depicts the
    workflow of the original deep research agent, the right represents the same agentic
    workflow but with human-in-the-loop augmentation.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/48d0ff62a0d8061f5b8e04ffd1cd9264.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Figure 1\. High-level flowcharts. Left: Without human-in-the-loop. Right: Two
    checkpoints where humans can provide inputs. (image by author)'
  prefs: []
  type: TYPE_NORMAL
- en: 'Notice that we’ve added two human-in-the-loop checkpoints in the enhanced workflow
    on the right:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Checkpoint 1** is introduced right after the agent generates its initial
    search queries. The objective here is to allow the user to review and refine the
    search strategy before any web searches start.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Checkpoint 2** happens during the iterative search loop. This is when the
    agent decides if it needs more information, i.e., conduct more searches. Adding
    a checkpoint here would give the user the opportunity to take a look at what the
    agent has found so far, determine if indeed sufficient information has already
    been gathered, and if not, what further search queries to use.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Simply by adding those two checkpoints, we effectively transform a fully autonomous
    agentic workflow into an LLM-human collaborative one. The agent still deals with
    the heavy lifting, e.g., generating queries, searching, synthesizing results,
    and proposing further queries, but now the user would have the intervention points
    to weave in their judgment.
  prefs: []
  type: TYPE_NORMAL
- en: This is a human-in-the-loop research workflow in action.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '**2\. Mental Model: Graphs, Edges, Nodes, and Human-in-the-Loop**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s first establish a solid mental model before checking out the code. We’ll
    briefly discuss LangGraph’s core and human-in-the-loop mechanism. For a more thorough
    discussion on LangGraph in general, please refer to [LangGraph 101: Let’s build
    a deep research agent](https://towardsdatascience.com/langgraph-101-lets-build-a-deep-research-agent/).'
  prefs: []
  type: TYPE_NORMAL
- en: '**2.1 Workflow Representation**'
  prefs: []
  type: TYPE_NORMAL
- en: LangGraph represents workflows as directed **graphs**. Each step in your agent’s
    workflow becomes a **node**. Essentially, a node is a function where all the actual
    work is done. To link the nodes, LangGraph uses **edges**, which basically define
    how the workflow moves from one step to the next.
  prefs: []
  type: TYPE_NORMAL
- en: Specific to our research agent, nodes would be those boxes in Figure 1, handling
    tasks such as “generate search queries,” “search the web,” or “reflect on results.”
    Edges are the arrows, determining the flow such as whether to continue searching
    or generate the final answer.
  prefs: []
  type: TYPE_NORMAL
- en: '**2.2 State Management**'
  prefs: []
  type: TYPE_NORMAL
- en: Now, as our research agent moves through different nodes, it needs to keep track
    of things it has learned and generated. LangGraph realizes this functionality
    by maintaining a **central state object**, which you can think of as a shared
    whiteboard that every node in the graph can look at and write on.
  prefs: []
  type: TYPE_NORMAL
- en: This way, each node can receive the current state, do its work, and return only
    the parts it wants to update. LangGraph would then automatically merge these updates
    into the main state, before passing it to the next node.
  prefs: []
  type: TYPE_NORMAL
- en: This approach allows LangGraph to handle all the state management at the framework
    level, so that individual nodes only need to focus on their specific tasks. It
    makes workflows highly modular—you can easily add, remove, or reorder nodes without
    breaking the state flow.
  prefs: []
  type: TYPE_NORMAL
- en: '**2.3 Human-in-the-Loop**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, let’s talk about human-in-the-loop. In LangGraph, this is achieved by
    introducing an interruption mechanism. Here is how this pattern works:'
  prefs: []
  type: TYPE_NORMAL
- en: Inside a node, you insert a checkpoint. When the graph execution reaches this
    designated checkpoint, LangGraph would pause the workflow and present relevant
    information to the human.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The human can then review this information and decide whether to edit/approve
    what the agent suggests.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Once the human provides the input, the workflow resumes the graph run (identified
    by an ID) exactly from the same node. The node restarts from the top, but when
    it reaches the inserted checkpoint, it fetches the human’s input instead of pausing.
    The graph execution continues from there.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: With this conceptual foundation in place, let’s see how to translate this human-in-the-loop
    augmented deep research agent into an actual implementation.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '**3\. From Concept to Code**'
  prefs: []
  type: TYPE_NORMAL
- en: In this post, we’ll build upon Google’s [open-sourced implementation](https://github.com/google-gemini/gemini-fullstack-langgraph-quickstart)
    built with LangGraph and Gemini (with Apache-2.0 license). It is a full-stack
    implementation, but for now, we’ll only focus on the backend logic (backend/src/agent/
    directory) where the research agent is defined.
  prefs: []
  type: TYPE_NORMAL
- en: 'Once you have forked the repo, you’ll see the following key files:'
  prefs: []
  type: TYPE_NORMAL
- en: 'configuration.py: defines the `Configuration` class that manages all configurable
    parameters for the research agent.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**graph.py**: the main orchestration file that defines the LangGraph workflow.
    We’ll mainly work with this file.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'prompts.py: contains all the prompt templates used by different nodes.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'state.py: defines the TypedDict classes that represent the state passed between
    graph nodes.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'tools_and_schemas.py: defines Pydantic models for LLMs to produce structured
    outputs.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'utils.py: utility functions for processing searched data, e.g., extract & format
    URLs, add citations, etc.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Let’s start with the graph.py and work from there.
  prefs: []
  type: TYPE_NORMAL
- en: '**3.1 Workflow**'
  prefs: []
  type: TYPE_NORMAL
- en: As a reminder, we aim to augment the existing deep research agent with human-in-the-loop
    verifications. Earlier, we mentioned that we want to add two checkpoints. In the
    flowchart below, you can see that two new nodes will be added to the existing
    workflow.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/68a742935d3dde6ad64f32da20ce2cca.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2\. Flowchart for the human-in-the-loop augmented deep research agent.
    Checkpoints are added as nodes to interrupt the workflow. (Image by author)
  prefs: []
  type: TYPE_NORMAL
- en: 'In LangGraph, the translation from flowchart to code is straightforward. Let’s
    start with creating the graph itself:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Here, we use `StateGraph` to define a **state-aware graph. **It accepts an`OverallState` class
    that defines what information can move between nodes, and a `Configuration` class
    that defines runtime-tunable parameters.
  prefs: []
  type: TYPE_NORMAL
- en: 'Once we have the graph container, we can add nodes to it:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: The `add_node()` method takes the first argument as the **node’s name** and
    the second argument as the **function** that will get executed when the node runs.
    Note that we have added two new **human-in-the-loop nodes** compared to the original
    implementation.
  prefs: []
  type: TYPE_NORMAL
- en: If you cross-compare the node names with the flowchart in Figure 2, you would
    see that essentially, we have one node reserved for every step. Later, we will
    examine the detailed implementation of those functions one by one.
  prefs: []
  type: TYPE_NORMAL
- en: 'Ok, now that we have the nodes defined, let’s add edges to connect them and
    define execution order:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: 'Note that we have wired the two human-in-the-loop checkpoints directly into
    the workflow:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Checkpoint 1**: after `generate_query`node, the initial search queries are
    routed to `review_initial_queries`. Here, humans can review and edit/approve the
    proposed search queries before any web searches begin.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Checkpoint 2**: after `reflection`node, the produced examination, including
    the sufficiency flag and (if any) the proposed follow-up search queries, is routed
    to `review_follow_up_plan`. Here, humans can evaluate whether the assessment is
    accurate and adjust the follow-up plan accordingly.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The routing functions, i.e., `continue_to_web_research` and `evaluate_research`,
    handle the routing logic based on human decisions at these checkpoints.
  prefs: []
  type: TYPE_NORMAL
- en: '*A quick note on `builder.add_conditional_edges()`: It’s used to add conditional
    edges so that the flow may jump to different branches at runtime. It requires
    three key arguments: **the source node**, **a routing function**, and **a list
    of possible destination nodes**. The routing function examines the current state
    and returns the name of the next node to visit. `continue_to_web_research` is
    special here, as it doesn’t actually perform “decision-making” but rather enable
    parallel searching, if there are multiple queries generated (or suggested by the
    human) in the first step. We’ll see its implementation later.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Finally, we put everything together and compile the graph into an executable
    agent:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: Note that we have added a `checkpointer` object here, which is crucial for achieving
    human-in-the-loop functionality.
  prefs: []
  type: TYPE_NORMAL
- en: When your graph execution gets interrupted, LangGraph would need to dump the
    current state of the graph somewhere. Those states might include things like all
    the work done so far, the data collected, and, of course, exactly where the execution
    paused. All the information is important to allow the graph to resume seamlessly
    when human input is provided.
  prefs: []
  type: TYPE_NORMAL
- en: To save this “snapshot”, we have a couple of options. For development and testing
    purposes, `InMemorySaver` is a perfect option. It simply stores the graph state
    in memory, making it fast and simple to work with.
  prefs: []
  type: TYPE_NORMAL
- en: For production deployment, however, you’ll want to use something more sophisticated.
    For those cases, a proper database-backed checkpointer like `PostgresSaver` or
    `SqliteSaver` would be good options.
  prefs: []
  type: TYPE_NORMAL
- en: LangGraph abstracts this away, so switching from development to production requires
    only changing this one line of code—the rest of your graph logic remains unchanged.
    For now, we’ll just stick with the in-memory persistence.
  prefs: []
  type: TYPE_NORMAL
- en: Next up, we’ll take a closer look at individual nodes and see what actions they
    take.
  prefs: []
  type: TYPE_NORMAL
- en: '*For the nodes that existed in the original implementation, I’ll keep the discussion
    brief since I have already covered them in detail in my [previous post](https://towardsdatascience.com/langgraph-101-lets-build-a-deep-research-agent/).
    In this post, our main focus will be on the two new human-in-the-loop nodes and
    how they implement the interrupt patterns we mentioned earlier.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**3.2 LLM Models**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Most of our nodes in the deep research agent are powered by LLMs. In the configuration.py,
    we have defined the following Gemini models to drive our nodes:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: Note that they might be different from the original implementation. I recommend
    the Gemini-2.5 series models.
  prefs: []
  type: TYPE_NORMAL
- en: '**3.3 Node #1: Generate Queries**'
  prefs: []
  type: TYPE_NORMAL
- en: 'The `generate_query` node is used to generate the initial search queries based
    on the user’s question. Here is how this node is implemented:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: 'The LLM’s output is enforced by using `SearchQueryList` schema:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: '**3.4 Node #2: Review Initial Queries**'
  prefs: []
  type: TYPE_NORMAL
- en: 'This is our first checkpoint. The idea here is that the user can review the
    initial queries proposed by the LLM and decide if they want to edit/approve the
    LLM’s output. Here is how we can implement it:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: 'Let’s break down what’s happening in this checkpoint node:'
  prefs: []
  type: TYPE_NORMAL
- en: First, we extract the search queries that were proposed by the previous `generate_query`
    node. These queries are what the human wants to review.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The `interrupt()` function is where the magic happens. When the node execution
    hits this function, the entire graph is paused and the payload is presented to
    the human. The payload is defined in the dictionary that is input to the `interrupt()`
    function. As shown in the code, there are three fields: the `kind`, which identifies
    the semantics associated with this checkpoint; `suggested`, which contains the
    list of LLM’s proposed search queries; and `instructions`, which is a simple text
    that gives guidance on what the human should do. Of course, the payload passed
    to `interrupt()` can be any dictionary structure you want. It’s mainly a UI/UX
    concern.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: At this point, your application’s frontend is able to display this content to
    the user. I’ll show you how to interact with it in the demo section later.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When the human provides their feedback, the graph resumes execution. A key thing
    to note is that the `interrupt()` call now returns the human’s input instead of
    pausing. The human feedback needs to provide a `queries` field that contains their
    approved list of search queries. That’s what the `review_initial_queries` node
    expects.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Finally, we apply the configured limits to prevent excessive searches.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: That’s it! Present LLM’s proposal, pause, incorporate human feedback, and resume.
    That’s the foundation of all human-in-the-loop nodes in LangGraph.
  prefs: []
  type: TYPE_NORMAL
- en: '**3.5 Parallel Web Searches**'
  prefs: []
  type: TYPE_NORMAL
- en: 'After the human approves the initial queries, we route them to the web research
    node. This is achieved via the following routing function:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: This function takes the approved query list and creates parallel `web_research`
    tasks, one for each query. Using LangGraph’s `Send` mechanism, we can launch multiple
    web searches concurrently.
  prefs: []
  type: TYPE_NORMAL
- en: '**3.6 Node #3: Web Research**'
  prefs: []
  type: TYPE_NORMAL
- en: 'This is where the actual web searching happens:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: The code is mostly self-explanatory. We first configure the search, then call
    Google’s Search API via Gemini with search tools enabled. Once we obtain the search
    results, we extract URLs, resolve citations, and then format the search results
    with proper citation markers. Finally, we update the state with gathered sources
    and formatted search results.
  prefs: []
  type: TYPE_NORMAL
- en: 'Note that we have *hardened* the URL resolving and citation retrieving against
    scenarios when the search results did not return any grounding data. Therefore,
    you would see that the implementation for getting the citations and adding them
    to the generated text is slightly different from the original version. Also, we
    have implemented an updated version of `resolve_urls` function:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: This updated version can be used as a drop-in replacement for the original `resolve_urls`
    function, as the original one does not handle edge cases properly.
  prefs: []
  type: TYPE_NORMAL
- en: '**3.7 Node #4: Reflection**'
  prefs: []
  type: TYPE_NORMAL
- en: The reflection node analyzes the gathered web research results to determine
    if more information is needed.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: This analysis feeds directly into our second human-in-the-loop checkpoint.
  prefs: []
  type: TYPE_NORMAL
- en: 'Note that we can update the `ReflectionState` schema in the state.py file:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: Instead of using an additive reducer, we use a plain list for `follow_up_queries`
    so that human input can directly overwrite what LLM has proposed.
  prefs: []
  type: TYPE_NORMAL
- en: '**3.8 Node #5: Review Follow-Up Plan**'
  prefs: []
  type: TYPE_NORMAL
- en: 'The purpose of this checkpoint is to allow humans to validate the LLM’s assessment
    and decide whether to continue researching:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: Following the same pattern, we first design the payload that will be shown to
    the human. This payload includes the kind of this interruption, a binary flag
    indicating if the research is sufficient, the knowledge gap identified by LLM,
    follow-up queries suggested by the LLM, and a small tip of what feedback the human
    should input.
  prefs: []
  type: TYPE_NORMAL
- en: Upon examination, the human can directly say that the research is sufficient.
    Or the human can keep the sufficiency flag to be False, and edit/approve what
    the reflection node LLM has proposed.
  prefs: []
  type: TYPE_NORMAL
- en: Either way, the results will be sent to the research evaluation function, which
    will route to the corresponding next node.
  prefs: []
  type: TYPE_NORMAL
- en: '**3.9 Routing Logic: Continue or Finalize**'
  prefs: []
  type: TYPE_NORMAL
- en: 'After the human review, this routing function will determine the next step:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: If the human concludes that the research is sufficient or we’ve already reached
    the maximum research loop limit, this function will route to `finalize_answer`.
    Otherwise, it will spawn new web research tasks (in parallel) using the human-approved
    follow-up queries.
  prefs: []
  type: TYPE_NORMAL
- en: '**3.10 Node #6: Finalize Answer**'
  prefs: []
  type: TYPE_NORMAL
- en: 'This is the final node of our graph, which synthesizes all the gathered information
    into a comprehensive answer with proper citations:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: With this, our human-in-the-loop research workflow is now complete.
  prefs: []
  type: TYPE_NORMAL
- en: '**4\. Running the Agent: Handling Interrupts and Resumptions**'
  prefs: []
  type: TYPE_NORMAL
- en: In this section, let’s take our newly enhanced deep research agent for a ride!
    We’ll walk through a complete interaction in Jupyter Notebook where a human guides
    the research process at both checkpoints.
  prefs: []
  type: TYPE_NORMAL
- en: '*To smoothly run our current agent, you need to obtain a Gemini API key. You
    can get the key from Google AI Studio. Once you have the key, remember to create
    the .env file and paste in your Gemini API key: GEMINI_API_KEY=”your_actual_api_key_here”.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**4.1 Starting the Research**'
  prefs: []
  type: TYPE_NORMAL
- en: 'As an example, in the first cell, let’s ask the agent about quantum computing
    developments:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: Note that we have supplied a thread ID in the configuration. In fact, this is
    a crucial piece for achieving human-in-the-loop workflows. Internally, LangGraph
    uses this ID to persist the states. Later, when we resume, LangGraph will know
    which execution to resume.
  prefs: []
  type: TYPE_NORMAL
- en: '**4.2 Checkpoint #1: Review Initial Queries**'
  prefs: []
  type: TYPE_NORMAL
- en: 'After running the first cell, the graph executes until it hits our first checkpoint.
    If you print the results in the next cell:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: 'You would see something like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: 'Notice that a new key is created: `__interrupt__`, that contains the payload
    sent back for the human to review. All the keys of the returned payload are exactly
    the ones we defined in the node.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, as a user, we can proceed to edit/approve the search queries. For now,
    let’s say we are happy with the LLM’s suggestions, so we can simply accept them.
    This can be achieved by simply re-sending what LLM’s suggestions back to the node:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE19]'
  prefs: []
  type: TYPE_PRE
- en: Running this cell would take a bit of time, as the graph will launch the searches
    and synthesize the research results. Afterward, the reflection node would review
    the results and propose follow-up queries.
  prefs: []
  type: TYPE_NORMAL
- en: '**4.3 Checkpoint #2: Review Follow-Up Queries**'
  prefs: []
  type: TYPE_NORMAL
- en: 'In a new cell, if we now run:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE20]'
  prefs: []
  type: TYPE_PRE
- en: 'You would see the payload with the keys defined in the corresponding node:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE21]'
  prefs: []
  type: TYPE_PRE
- en: 'Let’s say we agree with what the LLM has proposed. But we also want to add
