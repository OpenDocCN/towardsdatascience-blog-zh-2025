- en: 1\. <mdspan datatext="el1747163861411" class="mdspan-comment">Introduction</mdspan>
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Ever since the 1940s, when the first digital computers were invented, scientists
    have always dreamed of creating machines as smart as humans, what now became Artificial
    Intelligence (AI). Fast forward to November 2022, when ChatGPT — an AI model capable
    of listening and answering instantly — was released, it felt like a dream come
    true. Afterward, hundreds of new AI models have rushed into the race (take a look
    at the [timeline](https://nhlocal.github.io/AiTimeline/) here). Today, every single
    day, one billion messages are sent through ChatGPT (OpenAI Newsroom, 2024), highlighting
    the rapid AI adoption by users. Yet, few people stop to ask: What are the environmental
    costs behind this new convenience?'
  prefs: []
  type: TYPE_NORMAL
- en: 'Before users can ask AI questions, these models must first be trained. Training
    is the process where models, or algorithms, are fed datasets and try to find the
    best fit. Imagine a simple regression `y = ax + b`: training means feeding the
    algorithm `x` and `y` values and allowing it to find the best parameters `a` and
    `b`. Of course, AI models typically would not be as simple as a linear regression.
    They would contain tons of parameters, thus requiring massive amounts of computation
    and datasets. Moreover, they would need to run a substantial amount of specialized
    hardware that can handle that sheer amount of computation and complexity. All
    of that combined made AI consume much more energy than traditional software.'
  prefs: []
  type: TYPE_NORMAL
- en: In addition, AI training requires a stable and uninterrupted energy supply,
    which primarily comes from non-renewable energy sources like natural gas or coal-based,
    because solar and wind energy can fluctuate based on weather conditions (Calvert,
    2024). Moreover, due to the high intensity of energy use, data centers — buildings
    that store AI models — heat up rapidly, emitting significant carbon footprints
    and requiring large amounts of water for cooling. Therefore, AI models have broad
    environmental impacts that include not only energy usage but also water consumption
    and carbon emissions.
  prefs: []
  type: TYPE_NORMAL
- en: 'Unfortunately, there is not much official and disclosed data regarding energy,
    water, and carbon footprints of AI models. The public remains largely unaware
    of these environmental impacts and thus has not created strong pressure or motivations
    for tech companies to take more systematic changes. Furthermore, while some improvements
    have been made — especially in hardware energy efficiency — there remains little
    systematic or coordinated effort to effectively reduce the overall environmental
    impacts of AI. Therefore, I am hoping to ***increase public awareness of these
    hidden environmental costs*** and to ***explore whether recent improvements in
    energy efficiency are substantial***. More particularly, I’m seeking to address
    two research questions in this study:'
  prefs: []
  type: TYPE_NORMAL
- en: 'RQ1: Is there a significant relationship between AI models’ architectural and
    hardware choices and their resource consumption during training?'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'RQ2: Has AI training become energy-efficient over time?'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '2\. Methods:'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The paper used a dataset called *Notable AI Models* from Epoch AI (Epoch AI,
    2025), a research institute that investigates the trends of AI development. The
    models included were either historically relevant or represent cutting-edge advances
    in AI. Each model was recorded with key training information such as the number
    of parameters, dataset size, total compute, hardware type, and hardware quantity,
    all collected from various sources, including literature reviews, publications,
    and research papers. The dataset also reported the confidence level for these
    attributes. To produce a reliable analysis, I evaluated only models with a confidence
    rating of *“Confident”* or *“Likely”.*
  prefs: []
  type: TYPE_NORMAL
- en: 'As noted earlier, there was limited data regarding direct resource consumption.
    Fortunately, the dataset authors have estimated Total Power Draw (in watts, or
    W) based on several factors, including hardware type, hardware quantity, and some
    other data center efficiency rates and overhead. It is important to note that
    power and energy are different: **power** (W) refers to the amount of electricity
    used per unit of time, while **energy** (in kilowatt-hours, or kWh) measures the
    total cumulative electricity consumed over time.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Since this study investigated resource consumption and energy efficiency during
    the training phase of AI models, I constructed and estimated four environmental
    metrics: total energy used (kWh), total water used (liters, or L), total carbon
    emissions (kilograms of CO2e, or kgCO2e), and energy efficiency (FLOPS/W, to be
    explained later).'
  prefs: []
  type: TYPE_NORMAL
- en: a. Estimation methods
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'First, this study estimated energy consumption by selecting models with available
    total power draw (W) and training times (hours). Energy was computed as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: \[\text{Energy (kWh)} = \frac{\text{Total Power Draw (W)}}{1000} \times \text{Training
    Time (h)}\]
  prefs: []
  type: TYPE_NORMAL
- en: 'Next, water consumption and carbon emissions were estimated by rearranging
    the formulas of two standard rates used in data centers: Water Usage Effectiveness
    (WUE, in L/kWh) and Carbon Intensity (CI, in kgCO2e/kWh):'
  prefs: []
  type: TYPE_NORMAL
- en: \[\text{WUE (L/kWh)} = \frac{\text{Water (L)}}{\text{Energy (kWh)}}\ \Longrightarrow\
    \text{Water (L)} = \text{WUE (L/kWh)} \times \text{Energy (kWh)}\]
  prefs: []
  type: TYPE_NORMAL
- en: This study used the average WUE of *0.36 L/kWh* in 2023, reported by Lawrence
    Berkeley National Laboratory (2024).
  prefs: []
  type: TYPE_NORMAL
- en: \[\mathrm{CI\ \left( \frac{\mathrm{kgCO_2e}}{\mathrm{kWh}} \right)} = \frac{\mathrm{Carbon\
    (kgCO_2e)}}{\mathrm{Energy\ (kWh)}}\ \Longrightarrow\ \mathrm{Carbon\ (kgCO_2e)}
    = \mathrm{CI\ \left( \frac{\mathrm{kgCO_2e}}{\mathrm{kWh}} \right)} \times \mathrm{Energy\
    (kWh)}\]
  prefs: []
  type: TYPE_NORMAL
- en: This study used an average carbon intensity of *0.548 kg CO₂e/kWh*, reported
    by recent environmental research (Guidi et al, 2024).
  prefs: []
  type: TYPE_NORMAL
- en: 'Finally, this study estimated energy efficiency using the FLOPS/W metric. A
    floating-point operation (FLOP) is a basic arithmetic operation (e.g., addition
    or multiplication) with decimal numbers. FLOP per second (FLOPS) measures how
    many such operations a system can perform each second, and is commonly used to
    evaluate computing performance. FLOPS per Watt (FLOPS/W) measures how much computing
    performance is achieved per unit of power consumed:'
  prefs: []
  type: TYPE_NORMAL
- en: \[\text{Energy Efficiency (FLOPS/W)} = \frac{\text{Total Compute (FLOP)}}{\text{Training
    Time (h)} \times 3600 \times \text{Total Power Draw(W)}}\]
  prefs: []
  type: TYPE_NORMAL
- en: It is important to note that FLOPS/W is typically used to measure hardware-level
    energy efficiency. However, it’s possible that the actual efficiency during AI
    training may be different from the thereotical efficiency reported for the hardware
    used. I would like to investigate whether any of the training-related factors,
    beyond hardware alone, may contribute significantly to overall energy efficiency.
  prefs: []
  type: TYPE_NORMAL
- en: 'b**.** Analysis methods:'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'RQ1: Architectural and Hardware Choices vs Resource Consumption'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Among energy, water, and carbon consumption, I focused on modeling energy consumption,
    as both water and carbon are derived directly from energy using fixed conversion
    rates and all three response variables shared identical distributions. As a result,
    I believe we could safely assume that the best-fitting model of energy consumption
    can be applied to water and carbon. While the statistical models were the same,
    I would still report the results of all three to quantify how many kilowatt-hours
    of energy, liters of water, and kilograms of carbon are wasted for every unit
    increase in each significant factor. That way, I am hoping to communicate the
    environmental impacts of AI in a more holistic, concrete, and tangible terms.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/624108444caa4dac7ada855b7ac9d020.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2a. Histogram of Energy Consumption (kWh)
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f3ad61ffae5ed5edddefbd1364890f77.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2b. Histogram of log of Energy Consumption (kWh)
  prefs: []
  type: TYPE_NORMAL
- en: 'Based on Figure 1, the histogram of energy showed extreme right skew and the
    presence of some outliers. Therefore, I performed a log transformation on energy
    data, aiming to stabilize variance and move the distribution closer to normality
    (Fig. 2). A Shapiro-Wilk test confirmed the log-transformed energy data is approximately
    normal (p-value = 0.5). Based on this, two types of distributions were considered:
    the Gaussian (normal) and the Gamma distribution. While the Gaussian distribution
    is approriate for symmetric and normal data, the Gamma distribution is more suited
    for positive, skewed data — commonly used in engineering modeling where small
    values occur more frequently than larger values. For each distribution, the paper
    compared two approaches for incorporating the log transformation: directly log
    transforming the response variable versus using a log link function within a generalized
    linear model (GLM). I identified the best combination of distribution and log
    approach by evaluating their Akaike Information Criterion (AIC), diagnostic plots,
    along with prediction accuracy.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The candidate predictors included *Parameters, Training Compute, Dataset Size,
    Training Time, Hardware Quantity*, and *Hardware Type*. Architecture-related variables
    comprised *Parameters, Training Compute*, and *Dataset Size*, while hardware-related
    variables consisted of *Hardware Quantity* and *Hardware Type*. *Training Time*
    didn’t fall neatly into either category but was included due to its central role
    in training AI models. After fitting all candidate predictors into the selected
    GLM specification, I tested for multicollinearity to determine whether any variables
    should be excluded. Following this, I explored interaction terms, as each resource
    consumption may not have responded linearly to each independent variable. The
    following interactions were considered based on domain knowledge and various sources:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Model Size and Hardware Type*: Different hardware types have different memory
    designs. The larger and more complex the model is, the more memory it requires
    (Bali, 2025). Energy consumption can be different depending on how the hardware
    handles memory demands.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Dataset Size and Hardware Type*: Similarly, with different memory designs,
    hardware may access and read data at different data size (Krashinsky et al, 2020).
    As dataset size increases, energy consumption can vary depending on how the hardware
    handles large volumes of data.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Training Time with Hardware Quantity*: Running multiple hardware units at
    the same time adds extra overhead, like keeping everything in sync (HuggingFace,
    2025). As training goes on, these coordination costs can grow and put more strain
    on the system, leading to faster energy drain.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Training Time with Hardware Type*: As training time increases, energy use
    may vary across hardware types since some hardware types may manage heat better
    or maintain performance more consistently over time, while others may slow down
    or consume more energy.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**RQ2: Energy Efficiency over Time**'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b068867bda806d4a9efa9d3f0d6f0e14.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2c. Histogram of Energy Efficiency (FLOPS/W)
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/219d5c51f0cf687b70717edfd008e9ce.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2d. Histogram of Energy Efficiency (FLOPS/W)
  prefs: []
  type: TYPE_NORMAL
- en: The distribution of energy efficiency was highly skewed. Even after a log transformation,
    the distribution remained non-normal and overdispersed. To reduce distortion,
    I removed one extreme outlier with exceptionally high efficiency, as it was not
    a frontier model and likely less impactful. A Gamma GLM was then fitted using
    Publication Date as the primary predictor. If models using the same hardware exhibited
    wide variation in efficiency, it would suggest that other factors beyond the hardware
    may contribute to these differences. Therefore, architecture and hardware predictors
    from the first research question would be used to assess which variables significantly
    influence energy efficiency over time.
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Results
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**RQ1: Architectural and Hardware Choices vs Resource Consumption**'
  prefs: []
  type: TYPE_NORMAL
- en: I ultimately used a Gamma GLM with a log link to model resource consumption.
    This combination was chosen because it had a lower AIC value (1780.85) than the
    Gaussian log-link model (2005.83) and produced predictions that matched the raw
    data more closely than models using a log-transformed response variable. Those
    log-transformed models generated predictions that substantially underestimated
    the actual data on the original scale (*see [this article](https://towardsdatascience.com/log-link-vs-log-transformation-in-r-the-difference-that-misleads-your-entire-data-analysis/)
    on why log-transforming didn’t work in my case*).
  prefs: []
  type: TYPE_NORMAL
- en: Architecture Factors Don’t Hold Much Predictive Power as Hardware Ones
  prefs:
  - PREF_H6
  type: TYPE_NORMAL
- en: 'After fitting all candidate explanatory variables to a Gamma log-link GLM,
    we found that two architecture-related variables — *Parameters* and *Dataset Size* — do
    not exhibit a significant relationship with resource consumption (`p > 0.5`).
    A multicollinearity test also showed that *Dataset Size* and *Training Compute*
    were highly correlated with other predictors (`GVIF > 6`). Based on this, I hypothesized
    that all three architecture variables—*Parameters,* *Dataset Size*, and *Training
    Compute*) may not hold much predictive power. I then removed all three variables
    from the model and an ANOVA test confirmed that simplified models (Models 4 and
    5) are not significantly worse than the full model (Model 1), with `p > 0.05`:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'Moving on with Model 5, I found that *Training Time* and *Hardware Quantity*
    showed significant positive relationships with *Energy Consumption* (`GLM: training
    time, t = 9.70, p-value < 0.001; hardware quantity, t = 6.89, p-value < 0.001`).
    All hardware types were also statistically significant (`p-value < 0.001`), indicating
    strong variation in energy use across different types. Detailed results are presented
    below:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Final Model Selection
  prefs:
  - PREF_H6
  type: TYPE_NORMAL
- en: 'To better capture possible non-additive effects, various interaction terms
    were explored and their respective AIC scores (Table 1). The table below summarizes
    the tested models and their respective AIC scores:'
  prefs: []
  type: TYPE_NORMAL
- en: '| **Model** | **Predictors** | **AIC** |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| 5 | Training Time + Hardware Quantity + Hardware Type | 350.78 |'
  prefs: []
  type: TYPE_TB
- en: '| 6 | Training Time + Hardware Quantity + Hardware Type * Parameters | 357.97
    |'
  prefs: []
  type: TYPE_TB
- en: '| 7 | Training Time + Hardware Quantity + Hardware Type * Dataset Size | 335.89
    |'
  prefs: []
  type: TYPE_TB
- en: '| 8 | Training Time * Hardware Quantity + Hardware Type | 345.39 |'
  prefs: []
  type: TYPE_TB
- en: '| 9 | Training Time * Hardware Type + Hardware Quantity | 333.03 |'
  prefs: []
  type: TYPE_TB
- en: '*Table 1\. Summary of different GLM models and their respective AIC scores.*'
  prefs: []
  type: TYPE_NORMAL
- en: Although AIC scores did not vary drastically, meaning their model fits are similar,
    Model 8 was preferred as it was the only one with significant effects in both
    main terms and interaction. Interactions involved *Hardware Type* were not significant
    despite some exhibiting better AIC, likely due to limited sample size across 18
    hardware types.
  prefs: []
  type: TYPE_NORMAL
- en: 'In *Model 8*, both Training Time and Hardware Quantity showed a significant
    positive relationship with energy consumption (`GLM: t = 11.09, p < 0.001`), and
    between hardware quantity and energy consumption (`GLM: training time, t = 11.09,
    p < 0.001; hardware quantity, t = 7.32, p < 0.001; Fig. 3a`). Their interaction
    term was significantly negative (`GLM: t = –4.32, p < 0.001`), suggesting that
    energy consumption grows more slowly when training time increases alongside with
    a higher number of hardware units. All hardware types remained significant (`p
    < 0.001`). Detailed results are as below:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/ddd0e519d272553e50efd334c5993731.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3a. Relationship between hardware quantity and log of energy consumption
    across training time groups. Training time was originally a continuous variable.
    For the sake of visualization, training time was divided into three equal-sized
    levels and labeled as high, mid, and low.
  prefs: []
  type: TYPE_NORMAL
- en: Coefficients Interpretation
  prefs:
  - PREF_H6
  type: TYPE_NORMAL
- en: To further interpret the coefficients, we can exponentiate each coefficient
    and subtract one to estimate the percent change in the response variable for each
    additional unit in the predictor (Popovic, 2022). For energy consumption, each
    additional hour of training would increase energy use by 0.18%, each additional
    hardware unit would add 0.07%, and their interaction reduced their combined main
    effects by 0.00002%. Similarly, since water and carbon were directly proportional
    with energy, the percent change in training time, hardware quantity, and their
    interaction remained the same (Fig. 3b, Fig. 3c). However, since hardware types
    were categorical variables and functioned as baseline intercepts, their values
    differed across energy, water, and carbon models to reflect differences in overall
    scale.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f7072dc070de93fcacf608f01006b833.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3b. Relationship between hardware quantity and log of water consumption
    across training time groups.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/dc1a30640254475c514e1055da68e90e.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3c. Relationship between hardware quantity and log of carbon emissions
    across training time groups.
  prefs: []
  type: TYPE_NORMAL
- en: '**RQ2: Energy Efficiency over Time**'
  prefs: []
  type: TYPE_NORMAL
- en: 'I also used a log-linked Gamma model to examine the relationship between Energy
    Efficiency and Publication Date, as the Shapiro-Wilk test indicated that the log-transformed
    data was not normally distributed (`p < 0.001`). There was a positive relationship
    between *Publication Date* and *Energy Efficiency*, with an estimated improvement
    of 0.13% per year (`GLM: t = 8.005, p < 0.001, Fig. 3d`).'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/7351f0d235c52f9343bb532a11ad1f37.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3d. Relationship between publication year and log of energy efficiency
    (FLOPS/W). Each point represents a model, and the blue line shows a fitted trend
    using a linear model.
  prefs: []
  type: TYPE_NORMAL
- en: 'To further investigate, we examined the trends by individual hardware type
    and observed noticeable variation in efficiency among AI models using the same
    hardware (Fig. 3e). Among all architecture and hardware choices, *Training Time*
    was the only statistically significant factor influencing energy efficiency (`GLM:
    t = 8.581, p < 0.001`), with longer training time decreases energy efficiency
    by 0.03% per hour.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/3b92a7f8d7e2cca0b93a331dee78c967.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3e. Trends in log of energy efficiency (FLOPS/W) by hardware type over
    time. Each panel represents a specific hardware model, showing individual data
    points and fitted linear trends. Only hardware types used in at least three models
    are included.
  prefs: []
  type: TYPE_NORMAL
- en: 4\. Discussion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This study found that hardware choices — including *Hardware Type* and *Hardware
    Quantity* — along with *Training Time*, have a significant relationship with each
    resource consumption during AI model training, while architecture variables do
    not. I suspect that *Training Time* may have implicitly captured some of the underlying
    effects of those architecture-related factors. In addition, the interaction between
    *Training Time* and *Hardware* also contributes to the resource usage. However,
    this analysis is constrained by the small dataset (70 valid models) across 18
    hardware types, which likely limits the statistical power of hardware-involved
    interaction terms. Further research could explore these interactions with larger
    and more diverse datasets.
  prefs: []
  type: TYPE_NORMAL
- en: 'To illustrate how resource-intensive AI training can be, we use Model 8 to
    predict the baseline energy consumption for a single hour of training on one NVIDIA
    A100 chip. Here are the predictions for each type of resource under this simple
    setup:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Energy: The predicted energy use is 29,213 kWh, nearly ***three times*** the
    annual energy consumption of an average U.S. household (10,500 kWh/year) (U.S.
    Energy Information Administration, 2023), with each extra hour adding 5258 kWh
    more and each extra chip adding 2044 kWh.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Water: Similarly, the same training session would consume 10,521 liters of
    water, almost ***ten times*** the average U.S. household’s daily water use (300
    gallons or 1135 liters/day) (United States Environmental Protection Agency, 2024),
    with each extra hour adding 1,894 liters and each chip adding 736 liters.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Carbon: the predicted carbon emission is 16,009 kg, about ***four times***
    the annual emissions of a U.S. household (4000kg/year) (University of Michigan,
    2024), with each extra hour adding 2881 kg and each extra chip adding 1120 kg.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This study also found that AI models have become more energy-efficient over
    time, but only slightly, with an estimated improvement of 0.13% per year. This
    suggests that while newer hardware is more efficient, its adoption has not been
    widespread. While the environmental impact of AI may be mitigated over time as
    hardware hardware has become more efficient, this focus on hardware alone may
    overlook other contributors to overall energy consumption. In this dataset, both
    *Training Compute* and *Total Power Draw* are often estimated values and may include
    some system-level overhead beyond hardware alone. Therefore, the efficiency estimates
    in this study may reflect not just hardware performance, but potentially other
    training-related overhead. This study observed substantial variation in energy
    efficiency even among models using the same hardware. One key finding is that
    longer training time can “drain” energy efficiency, reducing it by approximately
    0.03%. Further studies should explore how training practices, beyond hardware
    selection, impact the environmental costs of AI development.
