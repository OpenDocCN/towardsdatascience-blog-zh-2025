- en: Rethinking the Environmental Costs of Training AI — Why We Should Look Beyond
    Hardware
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/rethinking-environmental-costs-of-training-ai-why-we-should-look-beyond-hardware/](https://towardsdatascience.com/rethinking-environmental-costs-of-training-ai-why-we-should-look-beyond-hardware/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>Summary
    of This Study</summary>
  prefs: []
  type: TYPE_NORMAL
- en: '**Hardware choices** – specifically hardware type and its quantity – along
    with **training time**, have a significant positive impact on energy, water, and
    carbon footprints during AI model training, whereas architecture-related factors
    do not.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The **interaction** between hardware quantity and training time **slows the
    growth** of energy, water, and carbon consumption slightly by 0.00002%.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Overall energy efficiency during AI model training has **improved slightly**
    over the years, around 0.13% per year.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Longer training time can gradually “drain” the overall energy efficiency by
    0.03% per hour.</details> <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>Outline</summary>
