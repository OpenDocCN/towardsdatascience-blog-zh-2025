- en: 'Extracting Structured Data with LangExtract: A Deep Dive into LLM-Orchestrated
    Workflows'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用LangExtract提取结构化数据：深入探讨LLM编排工作流程
- en: 原文：[https://towardsdatascience.com/extracting-structured-data-with-langextract-a-deep-dive-into-llm-orchestrated-workflows/](https://towardsdatascience.com/extracting-structured-data-with-langextract-a-deep-dive-into-llm-orchestrated-workflows/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/extracting-structured-data-with-langextract-a-deep-dive-into-llm-orchestrated-workflows/](https://towardsdatascience.com/extracting-structured-data-with-langextract-a-deep-dive-into-llm-orchestrated-workflows/)
- en: <mdspan datatext="el1756943484907" class="mdspan-comment">Introduction</mdspan>
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1756943484907" class="mdspan-comment">引言</mdspan>
- en: Having developed raw LLM workflows for structured extraction tasks, I have observed
    several pitfalls in them over time. In one of my projects, I developed two independent
    workflows using Grok and OpenAI to see which one performed better for structured
    extraction. This was when I noticed that both were omitting facts in random places.
    Moreover, the fields extracted did not align with the schema.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在开发用于结构化提取任务的原始LLM工作流程后，我逐渐发现其中存在几个陷阱。在我的一个项目中，我使用Grok和OpenAI开发了两个独立的工作流程，以查看哪一个在结构化提取方面表现更好。这时，我发现两者都在随机位置遗漏了事实。此外，提取的字段与模式不匹配。
- en: To counter these issues, I set up special handling and validation checks that
    would make the LLM revisit the document (like a second pass) so that missing facts
    could be caught and added back to the output document. However, multiple validation
    runs were causing me to exceed my API limits. Moreover, prompt fine-tuning was
    a real bottleneck. Every time I modified the prompt to ensure that the LLM didn’t
    miss a fact, a new issue would get introduced. An important constraint I noticed
    was that while one LLM worked well for a set of prompts, the other wouldn’t perform
    that well with the same set of instructions. These issues prompted me to look
    for an orchestration engine that could automatically fine-tune my prompts to match
    the LLM’s prompting style, handle fact omissions, and ensure that my output was
    aligned with my schema.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 为了解决这些问题，我设置了特殊处理和验证检查，使LLM重新访问文档（就像第二次遍历一样），以便可以捕捉并添加缺失的事实到输出文档中。然而，多次验证运行使我超过了我的API限制。此外，提示微调是一个真正的瓶颈。每次我修改提示以确保LLM不会错过任何事实时，都会引入新的问题。我注意到的一个重要约束是，虽然一个LLM对一组提示表现良好，但另一个LLM使用相同的指令表现就不会那么好。这些问题促使我寻找一个编排引擎，该引擎可以自动微调我的提示以匹配LLM的提示风格，处理事实遗漏，并确保我的输出与我的模式保持一致。
- en: I recently came across LangExtract and tried it out. The library addressed several
    issues I was facing, particularly around schema alignment and fact completeness.
    In this article, I explain the basics of LangExtract and how it can augment raw
    LLM workflows for structured extraction problems. I also aim to share my experience
    with LangExtract using an example.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 我最近发现了LangExtract并尝试了它。这个库解决了我在模式对齐和事实完整性方面遇到的一些问题。在这篇文章中，我解释了LangExtract的基本原理以及它如何增强原始LLM工作流程以解决结构化提取问题。我还旨在通过一个示例分享我的LangExtract使用经验。
- en: Why LangExtract?
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么选择LangExtract？
- en: It is a known fact that when you set up a raw LLM workflow (say, using OpenAI
    to gather structured attributes from your corpus), you would have to establish
    a chunking strategy to optimize token usage. You would also need to add special
    handling for missing values and formatting inconsistencies. When it comes to prompt
    engineering, you would have to add or remove instructions to your prompt with
    every iteration; in an attempt to fine-tune the results and to handle discrepancies.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 众所周知，当你设置一个原始LLM工作流程（例如，使用OpenAI从你的语料库中收集结构化属性）时，你需要建立一个分块策略来优化令牌的使用。你还需要添加对缺失值和格式不一致性的特殊处理。在提示工程方面，你需要在每次迭代中添加或删除提示中的指令；以尝试微调结果和处理差异。
- en: LangExtract helps manage the above by effectively orchestrating prompts and
    outputs between the user and the LLM. It fine-tunes the prompt before passing
    it to the LLM. In cases where the input text or documents are large, it chunks
    the data and feeds it to the LLM while ensuring that we stay within the token
    limits prescribed by each model (e.g., ~8000 tokens for GPT-4 vs ~10000 tokens
    in Claude). In cases where speed is crucial, parallelization can be set up. Where
    token limits are a constraint, sequential execution could be set up. I will try
    to break down the working of LangExtract along with its data structures in the
    next section.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: LangExtract 通过有效地协调用户和 LLM 之间的提示和输出，帮助管理上述内容。它在传递给 LLM 之前对提示进行微调。在输入文本或文档较大的情况下，它将数据分块并传递给
    LLM，同时确保我们保持在每个模型规定的令牌限制内（例如，GPT-4 的 ~8000 令牌与 Claude 的 ~10000 令牌）。在速度至关重要的场合，可以设置并行化。在令牌限制成为约束的情况下，可以设置顺序执行。我将在下一节尝试分解
    LangExtract 的工作原理及其数据结构。
- en: Data Structures and Workflow in LangExtract
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: LangExtract 中的数据结构和工作流程
- en: Below is a diagram showing the data structures in LangExtract and the flow of
    data from the input stream to the output stream.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是一个图表，展示了 LangExtract 中的数据结构和从输入流到输出流的流程。
- en: '![](../Images/6f6fc0205952df0999cde641d3b78e36.png)'
  id: totrans-11
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6f6fc0205952df0999cde641d3b78e36.png)'
- en: An Illustration of the Data Structures used by LangExtract
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: LangExtract 使用的数据结构示意图
- en: (Image by the Author)
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: （图片由作者提供）
- en: LangExtract stores examples as a list of custom class objects. Each example
    object has a property called ‘text’, which is the sample text from a news article.
    Another property is the ‘extraction_class’, which is the category assigned to
    the news article by the LLM during execution. As an example, a news article that
    talks about a cloud provider would be tagged under ‘Cloud Infrastructure’. The
    ‘extraction_text’ property is the reference output you provide to the LLM. This
    reference output guides the LLM in inferring the closest output you would expect
    for a similar news snippet. The ‘text_or_documents’ property stores the actual
    dataset that requires structured extraction (in my example, the input documents
    are news articles).
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: LangExtract 将示例存储为自定义类对象的列表。每个示例对象都有一个名为 ‘text’ 的属性，它是来自新闻文章的样本文本。另一个属性是 ‘extraction_class’，这是
    LLM 在执行期间分配给新闻文章的类别。例如，讨论云提供商的新闻文章会被标记为“云基础设施”。‘extraction_text’ 属性是您提供给 LLM 的参考输出。这个参考输出指导
    LLM 推断您期望的类似新闻片段的最近似输出。‘text_or_documents’ 属性存储需要结构化提取的实际数据集（在我的例子中，输入文档是新闻文章）。
- en: Few-shot prompting instructions are sent to the LLM of choice (model_id) through
    LangExtract. LangExtract’s core ‘extract()’ function gathers the prompts and passes
    them to the LLM after fine-tuning the prompt internally to match the prompt style
    of the chosen LLM, and to prevent model discrepancies. The LLM then returns the
    result one at a time (i.e., one document at a time) to LangExtract, which in turn
    yields the result in a generator object. The generator object is similar to a
    transient stream that yields the value extracted by the LLM. An analogy for a
    generator being a transient stream would be a digital thermometer, which gives
    you the current reading but doesn’t really store readings for future reference.
    If the value in the generator object isn’t captured immediately, it is lost.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 少样本提示指令通过 LangExtract 发送到选择的 LLM（model_id）。LangExtract 的核心 ‘extract()’ 函数收集提示并将其传递给
    LLM，在内部对提示进行微调以匹配所选 LLM 的提示风格，并防止模型差异。然后，LLM 逐个返回结果（即每次一个文档）给 LangExtract，LangExtract
    然后将结果以生成器对象的形式返回。生成器对象类似于一个短暂的流，它产生由 LLM 提取的值。将生成器视为短暂流的类比可以是数字温度计，它提供当前的读数，但实际上并不存储读数以供将来参考。如果生成器对象中的值没有立即捕获，它就会丢失。
- en: Note that the ‘max_workers’ and ‘extraction_pass’ properties have been discussed
    in detail in the section ‘Best Practices in using LangExtract’.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，‘max_workers’ 和 ‘extraction_pass’ 属性已在“LangExtract 使用最佳实践”部分进行了详细讨论。
- en: Now that we’ve seen how LangExtract works and the data structures used by it,
    let’s move on to applying LangExtract in a real-world scenario.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经了解了 LangExtract 的工作原理以及它使用的数据结构，让我们继续探讨在现实场景中应用 LangExtract。
- en: A Hands-on Implementation of LangExtract
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: LangExtract 的动手实现
- en: The use case involves gathering news articles from the “techxplore.com RSS Feeds”,
    related to the technology business domain (https://techxplore.com/feeds/). We
    use Feedparser and Trifaltura for URL parsing and extraction of article text.
    Prompts and examples are created by the user and fed to LangExtract, which performs
    orchestration to ensure that the prompt is tuned for the LLM that is being used.
    The LLM processes the data based on the prompt instructions along with the examples
    provided, and returns the data to LangExtract. LangExtract once again performs
    post-processing before displaying the results to the end user. Below is a diagram
    showing how data flows from the input source (RSS feeds) into LangExtract, and
    finally through the LLM to yield structured extractions.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 该用例涉及从“techxplore.com RSS Feeds”中收集与科技商业领域相关的新闻文章（https://techxplore.com/feeds/）。我们使用Feedparser和Trifaltura进行URL解析和文章文本提取。提示和示例由用户创建并输入到LangExtract中，LangExtract执行编排以确保提示针对所使用的LLM进行了调整。LLM根据提示指令和提供的示例处理数据，并将数据返回给LangExtract。LangExtract在向最终用户显示结果之前再次进行后处理。以下是一个图表，展示了数据如何从输入源（RSS源）流入LangExtract，最终通过LLM产生结构化提取。
- en: '![](../Images/74f98efb1f3116f833df4508d0b0ac88.png)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/74f98efb1f3116f833df4508d0b0ac88.png)'
- en: Below are the libraries that have been used for this demonstration.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是在此演示中使用的库。
- en: We begin by assigning the Tech Xplore RSS feed URL to a variable ‘feed_url’.
    We then define a ‘keywords’ list, which contains keywords related to tech-business.
    We define three functions to parse and scrape news articles from the news feed.
    The function ‘get_article_urls()’ parses the RSS feed and retrieves the article
    title and individual article URL (link). Feedparser is used to accomplish this.
    The ‘extract_text()’ function uses Trifaltura to extract the article text from
    the individual article URL returned by Feedparser. The function ‘filter_articles_by_keywords’
    filters the retrieved articles based on the keywords list defined by us.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 我们首先将Tech Xplore RSS源URL分配给一个变量‘feed_url’。然后定义一个包含与科技商业相关的关键词的‘keywords’列表。我们定义了三个函数来解析和抓取新闻源中的新闻文章。函数‘get_article_urls()’解析RSS源并检索文章标题和单个文章URL（链接）。Feedparser用于完成此操作。‘extract_text()’函数使用Trifaltura从Feedparser返回的单个文章URL中提取文章文本。函数‘filter_articles_by_keywords’根据我们定义的关键词列表过滤检索到的文章。
- en: Upon running the above, we get the output-
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 运行上述代码后，我们得到以下输出-
- en: “Found 30 articles in the RSS feed
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: “在RSS源中找到30篇文章”
- en: 'Filtered articles: 15″'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 过滤文章：15″
- en: Now that the list of ‘filtered_articles’ is available, we go ahead and set up
    the prompt. Here, we give instructions to let the LLM understand the type of news
    insights we are interested in. As explained in the section “Data Structures and
    Workflow in LangExtract”, we set up a list of custom classes using ‘data.ExampleData()’,
    which is an inbuilt data structure in LangExtract. In this case, we use few-shot
    prompting consisting of multiple examples.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 现在‘filtered_articles’列表已经可用，我们继续设置提示。在这里，我们给出指令让LLM理解我们感兴趣的新闻洞察类型。如“LangExtract中的数据结构和工作流程”部分所述，我们使用‘data.ExampleData()’设置了一个自定义类列表，这是LangExtract中的一个内置数据结构。在这种情况下，我们使用包含多个示例的少量提示。
- en: We initialize a list called ‘results’ and then loop through the ‘filtered_articles’
    corpus and perform the extraction one article at a time. The LLM output is available
    in a generator object. As seen earlier, being a transient stream, the output value
    in the ‘result_generator’ is immediately appended to the ‘results’ list. The ‘results’
    variable is a list of annotated documents.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 我们初始化一个名为‘results’的列表，然后遍历‘filtered_articles’语料库，逐篇文章进行提取。LLM的输出可用在生成器对象中。如前所述，由于是一个临时流，‘result_generator’中的输出值会立即追加到‘results’列表中。‘results’变量是一个标注文档的列表。
- en: We iterate through the results in a ‘for loop’ to write each annotated document
    to a jsonl file. Though this is an optional step, it can be used for auditing
    individual documents if required. It is worth mentioning that the official documentation
    of LangExtract offers a utility to visualize these documents.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 我们通过一个‘for循环’遍历结果，将每个标注文档写入jsonl文件。虽然这是一个可选步骤，但在需要审计单个文档时可以使用。值得一提的是，LangExtract的官方文档提供了一个可视化这些文档的实用工具。
- en: We loop through the ‘results’ list to gather every extraction from an annotated
    document one at a time. An extraction is nothing but one or more attributes requested
    by us in the schema. All such extractions are stored in the ‘all_extractions’
    list. This list is a flattened list of all extractions of the form [extraction_1,
    extraction_2, extraction_n].
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 我们遍历“results”列表，逐个收集标注文档中的每个提取。一个提取不过是我们在模式中请求的一个或多个属性。所有这样的提取都存储在“all_extractions”列表中。这个列表是所有提取的扁平化列表，形式为[extraction_1,
    extraction_2, extraction_n]。
- en: We get 55 extractions from the 15 articles that were gathered earlier.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 我们从之前收集的15篇文章中获得了55个提取结果。
- en: The final step involves iterating through the ‘all_extractions’ list to gather
    each extraction. The Extraction object is a custom data structure within LangExtract.
    The attributes are gathered from each extraction object. In this case, Attributes
    are dictionary objects that have the metric name and value. The attributes/metric
    names match the schema initially requested by us as part of the prompt (Refer
    to the ‘attributes’ dictionary provided ‘examples’ list in the ‘data.Extraction’
    object). The final results are made available in a dataframe, which can be used
    for further analysis.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 最后一步涉及遍历“all_extractions”列表以收集每个提取。提取对象是LangExtract中的一个自定义数据结构。属性是从每个提取对象中收集的。在这种情况下，属性是具有度量名称和值的字典对象。属性/度量名称与我们最初作为提示请求的模式相匹配（请参阅“data.Extraction”对象中提供的“examples”列表中的“attributes”字典）。最终结果以数据框的形式提供，可用于进一步分析。
- en: Below is the output showing the first five rows of the dataframe –
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是显示数据框前五行输出的结果——
- en: '![](../Images/ca9dd1d603f03ad9f013f03745b864ae.png)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/ca9dd1d603f03ad9f013f03745b864ae.png)'
- en: Best Practices for Using LangExtract Effectively
  id: totrans-34
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最佳使用LangExtract的有效实践
- en: Few-shot Prompting
  id: totrans-35
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 少样本提示
- en: LangExtract is designed to work with a one-shot or few-shot prompting structure.
    Few-Shot prompting requires you to give a prompt and a few examples that explain
    the output you expect the LLM to yield. This prompting style is especially useful
    in complex, multidisciplinary domains like trade and export where data and terminology
    in one sector can be vastly different from that of the other. Here’s an example
    – A news snippet reads, ‘The value of Gold went up by X’ and another snippet reads
    ‘The value of a particular type of semiconductor went up by Y’. Here, though both
    snippets say ‘value’, they mean very different things. When it comes to precious
    metals like Gold, the value is based on the market price per unit whereas with
    semiconductors, it could mean the market size or strategic worth. Providing domain-specific
    examples can help the LLM fetch the metrics with the nuance that the domain demands.
    The more the examples the better. A broad example set can help both the LLM model
    and LangExtract adapt to different writing styles (in articles) and avoid misses
    in extraction.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: LangExtract设计为与单次或少样本提示结构一起工作。少样本提示要求你提供一个提示和一些示例，这些示例解释了你期望LLM产生的输出。这种提示风格在复杂的多学科领域（如贸易和出口）中特别有用，在这些领域中，一个部门的数据和术语可能与另一个部门大相径庭。以下是一个例子——一条新闻片段写道，“黄金的价值上涨了X”，另一条片段写道，“某种特定类型半导体的价值上涨了Y”。在这里，尽管两个片段都说“价值”，但它们的意思非常不同。对于像黄金这样的贵金属，价值基于每单位的市场价格，而对于半导体，它可能意味着市场规模或战略价值。提供特定领域的示例可以帮助LLM获取该领域所需的细微差别。示例越多越好。一个广泛的示例集可以帮助LLM模型和LangExtract适应不同的写作风格（在文章中）并避免提取错误。
- en: Multi-Extraction Pass
  id: totrans-37
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 多提取遍历
- en: A Multi-Extraction pass is the act of having the LLM revisit the input dataset
    more than once to fill in details missing in your output at the end of the first
    pass. LangExtract guides the LLM to revisit the dataset (input) multiple times
    by fine-tuning the prompt during each run. It also effectively manages the output
    by merging the intermediate outputs from the first and subsequent runs. The number
    of passes that need to be added is provided using the ‘extraction_passes’ parameter
    in the extract() module. Though an extraction pass of ‘1’ would work here, anything
    beyond ‘2’ will help yield an output that is more fine-tuned and aligned with
    the prompt and the schema provided. Moreover, a multi-extraction pass of 2 or
    more ensures that the output schema is on par with the schema and attributes you
    provided in your prompt description.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 多提取过程是指LLM多次重新访问输入数据集以填补在第一次遍历输出结束时缺失的细节。LangExtract通过在每次运行期间微调提示来引导LLM多次重新访问数据集（输入）。它还通过合并第一次和后续运行的中间输出来有效地管理输出。需要添加的遍历次数是通过extract()模块中的‘extraction_passes’参数提供的。尽管提取过程设置为‘1’在这里也可以工作，但超过‘2’的任何设置都将有助于产生更精细调整且与提示和提供的模式对齐的输出。此外，2次或更多次的多提取过程确保输出模式与你在提示描述中提供的模式和属性相匹配。
- en: Parallelization
  id: totrans-39
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 并行化
- en: When you have large documents that could potentially consume the permissible
    number of tokens per request, it is ideal to go for a sequential extraction process.
    A sequential extraction process can be enabled by setting max_workers = 1\. This
    causes LangExtract to force the LLM to process the prompt in a sequential manner,
    one document at a time. If speed is key, parallelization can be enabled by setting
    max_workers = 2 or more. This ensures that multiple threads become available for
    the extraction process. Moreover, the time.sleep() module can be used when sequential
    execution is being performed to ensure that the request quotas of LLMs are not
    exceeded.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 当你拥有可能消耗每个请求允许的标记数的较大文档时，采用顺序提取过程是理想的。可以通过设置max_workers = 1来启用顺序提取过程。这会导致LangExtract强制LLM以顺序方式处理提示，一次处理一个文档。如果速度是关键，可以通过设置max_workers
    = 2或更多来启用并行化。这确保了有多个线程可用于提取过程。此外，当执行顺序执行时，可以使用time.sleep()模块来确保LLM的请求配额不会被超过。
- en: Both parallelization and multi-extraction pass can be set as below –
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 并行化和多提取过程都可以设置为以下选项 –
- en: Concluding Remarks
  id: totrans-42
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this article, we learnt how to use LangExtract for structured extraction
    use cases. By now, it should be clear that having an orchestrator such as LangExtract
    for your LLM can help with prompt fine-tuning, data chunking, output parsing,
    and schema alignment. We also saw how LangExtract operates internally by processing
    few-shot prompts to suit the chosen LLM and parsing the raw output from the LLM
    to a schema-aligned structure.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们学习了如何使用LangExtract进行结构化提取用例。到目前为止，应该很清楚，拥有像LangExtract这样的协调器可以帮助你的LLM进行提示微调、数据分块、输出解析和模式对齐。我们还看到了LangExtract如何通过处理少量提示来适应所选的LLM，并将LLM的原始输出解析为与模式对齐的结构。
