- en: 'LLM Evaluations: from Prototype to Production'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/llm-evaluations-from-prototype-to-production/](https://towardsdatascience.com/llm-evaluations-from-prototype-to-production/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1745607988340" class="mdspan-comment">Evaluation is the</mdspan>
    cornerstone of any machine learning product. Investing in quality measurement
    delivers significant returns. Let’s explore the potential business benefits.
  prefs: []
  type: TYPE_NORMAL
- en: As management consultant and writer Peter Drucker once said, *“If you can’t
    measure it, you can’t improve it.”* Building a robust evaluation system helps
    you identify areas for improvement and take meaningful actions to enhance your
    product.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: LLM evaluations are like testing in software engineering — they allow you to
    iterate faster and more safely by ensuring a baseline level of quality.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A solid quality framework is especially crucial in highly regulated industries.
    If you’re implementing AI or LLMs in areas like fintech or healthcare, you’ll
    likely need to demonstrate that your system works reliably and is continuously
    monitored over time.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: By consistently investing in LLM evaluations and developing a comprehensive
    set of questions and answers, you may eventually be able to replace a large, expensive
    LLM with a smaller model fine-tuned to your specific use case. That could lead
    to significant cost savings.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: As we’ve seen, a solid quality framework can bring significant value to a business.
    In this article, I will walk you through the end-to-end process of building an
    evaluation system for LLM products — from assessing early prototypes to implementing
    continuous quality monitoring in production.
  prefs: []
  type: TYPE_NORMAL
- en: This article will focus on high-level approaches and best practices, but we’ll
    also touch on specific implementation details. For the hands-on part, I will be
    using [Evidently](https://www.evidentlyai.com/), an open-source library that offers
    a comprehensive testing stack for AI products, ranging from classic machine learning
    to LLMs.
  prefs: []
  type: TYPE_NORMAL
- en: 'I chose to explore the Evidently framework after finishing their well-structured
    open-source [course on LLM evaluation](https://www.evidentlyai.com/llm-evaluations-course).
    However, you can implement a similar evaluation system using other tools. There
    are several great open-source alternatives worth considering. Here are just a
    few:'
  prefs: []
  type: TYPE_NORMAL
- en: '[**DeepEval**](https://github.com/confident-ai/deepeval): An open-source LLM
    evaluation library and online platform offering similar functionality.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**MLFlow**](https://github.com/mlflow/mlflow)**:** A more comprehensive framework
    that supports the entire ML lifecycle, helping practitioners manage, track, and
    reproduce every stage of development.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**LangSmith**](https://www.langchain.com/langsmith)**:** An observability
    and evaluation platform from the LangChain team.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This article will focus on best practices and the overall evaluation process,
    so feel free to choose whichever framework best suits your needs.
  prefs: []
  type: TYPE_NORMAL
- en: '**Here’s the plan for the article:**'
  prefs: []
  type: TYPE_NORMAL
- en: 'We will start by introducing the **use case** we will be focusing on: a SQL
    agent.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Then, we will quickly build a **rough prototype** of the agent — just enough
    to have something we can evaluate.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Next, we will cover **the evaluation approach during the experimentation phase**:
    how to collect an evaluation dataset, define useful metrics, and assess the model’s
    quality.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Finally, we’ll explore **how to monitor the quality of your LLM product post-launch**,
    highlighting the importance of observability and the additional metrics you can
    track once the feature is live in production.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The first prototype
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: It’s often easier to discuss a topic when we focus on a specific example, so
    let’s consider one product. Imagine we’re working on an analytical system that
    helps our customers track key metrics for their e-commerce businesses — things
    like the number of customers, revenue, fraud rates, and so on.
  prefs: []
  type: TYPE_NORMAL
- en: Through customer research, we learned that a significant portion of our users
    struggle to interpret our reports. They would much prefer the option to interact
    with an assistant and get immediate, clear answers to their questions. Therefore,
    we decided to build an LLM-powered agent that can respond to customer queries
    about their data.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s start by building the first prototype of our LLM product. We’ll keep it
    simple with an LLM agent equipped with a single tool to execute SQL queries.
  prefs: []
  type: TYPE_NORMAL
- en: 'I’ll be using the following tech stack:'
  prefs: []
  type: TYPE_NORMAL
- en: '[**Llama 3.1 model**](https://www.llama.com/) via [Ollama](https://ollama.com/search)
    for the LLM;'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**LangGraph**](https://www.langchain.com/langgraph), one of the most popular
    frameworks for LLM agents;'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**ClickHouse**](https://clickhouse.com/) as the database, though you’re free
    to choose your preferred option.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*If you are interested in a detailed setup, feel free to check out [my previous
    article](https://towardsdatascience.com/from-prototype-to-production-enhancing-llm-accuracy-791d79b0af9b/).*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Let’s first define the tool to execute SQL queries. I’ve included several controls
    in the query to ensure that the LLM specifies the output format and avoids using
    a `select * from table`query, which could result in fetching all the data from
    the database.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Next, we’ll define the LLM.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Another important step is defining the system prompt, where we’ll specify the
    data schema for our database.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: For simplicity, I will use a [prebuilt ReAct agent](https://langchain-ai.github.io/langgraph/how-tos/create-react-agent/)
    from LangGraph.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: Now, let’s test it with a simple question and ta-da, it works.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: 'I’ve built an MVP version of the agent, but there’s plenty of room for improvement.
    For example:'
  prefs: []
  type: TYPE_NORMAL
- en: One possible improvement is converting it into a **Multi-AI agent system**,
    with distinct roles such as a triage agent (which classifies the initial question),
    an SQL expert, and a final editor (who assembles the customer’s answer according
    to the guidelines). If you’re interested in building such a system, you can find
    a detailed guide for LangGraph in [my previous article](https://towardsdatascience.com/from-basics-to-advanced-exploring-langgraph-e8c1cf4db787/).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Another improvement is adding **RAG (Retrieval-Augmented Generation)**, where
    we provide relevant examples based on embeddings. In [my previous attempt](https://towardsdatascience.com/from-prototype-to-production-enhancing-llm-accuracy-791d79b0af9b/)
    at building an SQL agent, RAG helped boost accuracy from 10% to 60%.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Another enhancement is introducing a **human-in-the-loop** approach, where the
    system can ask customers for feedback.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In this article, we will concentrate on developing the evaluation framework,
    so it’s perfectly fine that our initial version isn’t fully optimised yet.
  prefs: []
  type: TYPE_NORMAL
- en: 'Prototype: evaluating quality'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Gathering evaluation dataset
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now that we have our first MVP, we can start focusing on its quality. Any evaluation
    begins with data, and the first step is to gather a set of questions — and ideally
    answers — so we have something to measure against.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s discuss how we can gather the set of questions:'
  prefs: []
  type: TYPE_NORMAL
- en: I recommend starting by **creating a small dataset of questions yourself** and
    manually testing your product with them. This will give you a better understanding
    of the actual quality of your solution and help you determine the best way to
    assess it. Once you have that insight, you can scale the solution effectively.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Another option is to **leverage historical data**. For instance, we may already
    have a channel where CS agents answer customer questions about our reports. These
    question-and-answer pairs can be valuable for evaluating our LLM product.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We can also use **synthetic data**. LLMs can generate plausible questions and
    question-and-answer pairs. For example, in our case, we could expand our initial
    manual set by asking the LLM to provide similar examples or rephrase existing
    questions. Alternatively, we could use an RAG approach, where we provide the LLM
    with parts of our documentation and ask it to generate questions and answers based
    on that content.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '***Tip**: Using a more powerful model to generate data for evaluation can be
    beneficial. Creating a golden dataset is a one-time investment that pays off by
    enabling more reliable and accurate quality assessments.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Once we have a more mature version, we can potentially share it with a group
    of beta testers to gather their feedback.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'When creating your evaluation set, it’s important to include a diverse range
    of examples. Make sure to cover:'
  prefs: []
  type: TYPE_NORMAL
- en: '**A representative sample of real user questions** about your product to reflect
    typical usage.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Edge cases**, such as very long questions, queries in different languages,
    or incomplete questions. It’s also crucial to define the expected behaviour in
    these scenarios — for instance, should the system respond in English if the question
    is asked in French?'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Adversarial inputs**, like off-topic questions or jailbreak attempts (where
    users try to manipulate the model into producing inappropriate responses or exposing
    sensitive information).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Now, let’s apply these approaches in practice. Following my own advice, I manually
    created a small evaluation dataset with 10 questions and corresponding ground
    truth answers. I then ran our MVP agent on the same questions to collect its responses
    for comparison.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]\nSELECT \n    (SELECT COUNT(DISTINCT user_id) FROM ecommerce.sessions
    WHERE os = ''Windows'' AND action_date >= ''2023-11-01'' AND action_date < ''2024-01-01'')
    / \n    (SELECT COUNT(DISTINCT user_id) FROM ecommerce.sessions WHERE action_date
    >= ''2023-11-01'' AND action_date < ''2024-01-01'') AS share\n[PRE6]'
  prefs: []
  type: TYPE_NORMAL
- en: 'Following the recommendations above, I made sure to include a variety of cases
    in the evaluation set:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Happy path scenarios**, where the agent simply needs to run a SQL query and
    generate an answer.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Edge cases**, such as personal or irrelevant questions about the data schema,
    or questions asked in French (while the agent is instructed to respond in English).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Adversarial prompts**, where the goal is to trick the agent — for example,
    by asking it to reveal the data schema despite explicit instructions not to.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In this article, I will stick to the initial small evaluation set and won’t
    cover how to scale it. If you’re interested in scaling the evaluation using LLMs,
    check out [my previous article on fine-tuning](https://towardsdatascience.com/the-next-frontier-in-llm-accuracy-cb2491a740d4/),
    where I walk through that process in detail.
  prefs: []
  type: TYPE_NORMAL
- en: Quality metrics
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Now that we have our evaluation data, the next step is figuring out how to
    measure the quality of our solution. Depending on your use case, there are several
    different approaches:'
  prefs: []
  type: TYPE_NORMAL
- en: If you’re working on a classification task (such as sentiment analysis, topic
    modelling, or intent detection), you can rely on **standard predictive metrics**
    like accuracy, precision, recall, and F1 score to evaluate performance.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can also apply **semantic similarity** techniques by calculating the distance
    between embeddings. For instance, comparing the LLM-generated response to the
    user input helps evaluate its relevance, while comparing it to a ground truth
    answer allows you to assess its correctness.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Smaller ML models can be used to evaluate specific aspects** of the LLM response,
    such as sentiment or toxicity.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We can also use more straightforward approaches, such as analysing **basic text
    statistics,** like the number of special symbols or the length of the text. Additionally,
    **regular expressions** can help identify the presence of denial phrases or banned
    terms, providing a simple yet effective way to monitor content quality.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In some cases, **functional testing** can also be applicable. For example, when
    building an SQL agent that generates SQL queries, we can test whether the generated
    queries are valid and executable, ensuring that they perform as expected without
    errors.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Another method for evaluating the quality of LLMs, which deserves separate mention,
    is using the **LLM-as-a-judge** approach. At first, the idea of having an LLM
    evaluate its own responses might seem counterintuitive. However, it’s often easier
    for a model to spot mistakes and assess others’ work than to generate the perfect
    answer from scratch. This makes the LLM-as-a-judge approach quite feasible and
    valuable for quality evaluation.
  prefs: []
  type: TYPE_NORMAL
- en: The most common use of LLMs in evaluation is direct scoring, where each answer
    is assessed. Evaluations can be based solely on the LLM’s output, such as measuring
    whether the text is polite, or by comparing it to the ground truth answer (for
    correctness) or to the input (for relevance). This helps gauge both the quality
    and appropriateness of the generated responses.
  prefs: []
  type: TYPE_NORMAL
- en: The LLM judge is also an LLM product, so you can build it in a similar way.
  prefs: []
  type: TYPE_NORMAL
- en: Start by labelling a set of examples to understand the nuances and clarify what
    kind of answers you expect.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Then, create a prompt to guide the LLM on how to evaluate the responses.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: By comparing the LLM’s responses with your manually labelled examples, you can
    refine the evaluation criteria through iteration until you achieve the desired
    level of quality.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'When working on the LLM evaluator, there are a few best practices to keep in
    mind:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Use flags (Yes/No)** rather than complex scales (like 1 to 10). This will
    give you more consistent results. If you can’t clearly define what each point
    on the scale means, it’s better to stick with binary flags.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Decompose complex criteria** into more specific aspects. For example, instead
    of asking how “good” the answer is (since “good” is subjective), break it down
    into multiple flags that measure specific features like politeness, correctness,
    and relevance.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Using widely practised techniques like **chain-of-thought reasoning** can also
    be beneficial, as it improves the quality of the LLM’s answers.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Now that we’ve covered the basics, it’s time to put everything into practice.
    Let’s dive in and start applying these concepts to evaluate our LLM product.
  prefs: []
  type: TYPE_NORMAL
- en: Measuring quality in practice
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'As I mentioned earlier, I will be using the Evidently open-source library to
    create evaluations. When working with a new library, it’s important to start by
    understanding [the core concepts](https://docs.evidentlyai.com/docs/library/overview)
    to get a high-level overview. Here’s a 2-minute recap:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Dataset** represents the data we’re analysing.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Descriptors** are row-level scores or labels that we calculate for text fields.
    Descriptors are essential for LLM evaluations and will play a key role in our
    analysis. They can be deterministic (like `TextLength`) or based on LLM or ML
    models. Some descriptors are prebuilt, while others can be custom-made, such as
    LLM-as-a-judge or using regular expressions. You can find a full list of available
    descriptors in [the documentation](https://docs.evidentlyai.com/metrics/all_descriptors).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Reports** are the results of our evaluation. Reports consist of **metrics**
    and **tests** (specific conditions applied to columns or descriptors), which summarise
    how well the LLM performs across various dimensions.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Now that we have all the necessary background, let’s dive into the code. The
    first step is to load our golden dataset and begin evaluating its quality.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/571e4a894dbde1c4af685d873847e58c.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: Since we’ll be using LLM-powered metrics with OpenAI, we’ll need to specify
    a token for authentication. You can use [other providers](https://docs.evidentlyai.com/metrics/customize_llm_judge#change-the-evaluator-llm)
    (like Anthropic) as well.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: At the prototype stage, a common use case is comparing metrics between two versions
    to determine if we’re heading in the right direction. Although we don’t have two
    versions of our LLM product yet, we can still compare the metrics between the
    LLM-generated answers and the ground truth answers to understand how to evaluate
    the quality of two versions. Don’t worry — we’ll use the ground truth answers
    as intended to evaluate correctness a bit later on.
  prefs: []
  type: TYPE_NORMAL
- en: Creating an evaluation with Evidently is straightforward. We need to create
    a Dataset object from a Pandas DataFrame and define the descriptors — the metrics
    we want to calculate for the texts.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s pick up the metrics we want to look at. I highly recommend going through
    the full list of descriptors in [the documentation](https://docs.evidentlyai.com/metrics/all_descriptors).
    It offers a wide range of out-of-the-box options that can be quite useful. Let’s
    try a few of them to see how they work:'
  prefs: []
  type: TYPE_NORMAL
- en: '`Sentiment` returns a sentiment score between -1 and 1, based on ML model.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`SentenceCount` and `TextLengt` calculate the number of sentences and characters,
    respectively. These are useful for basic health checks.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`HuggingFaceToxicity` evaluates the probability of toxic content in the text
    (from 0 to 1), using the [roberta-hate-speech model](https://huggingface.co/facebook/roberta-hate-speech-dynabench-r4-target).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`SemanticSimilarity` calculates the cosine similarity between columns based
    on embeddings, which we can use to measure the semantic similarity between a question
    and its answer as a proxy for relevance.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`DeclineLLMEval` and `PIILLMEval` are predefined LLM-based evaluations that
    estimate declines and the presence of PII (personally identifiable information)
    in the answer.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: While it’s great to have so many out-of-the-box evaluations, in practice, we
    often need some customisation. Fortunately, Evidently allows us to create custom
    descriptors using any Python function. Let’s create a simple heuristic to check
    whether there is a greeting in the answer.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: Also, we can create an LLM-based evaluation to check whether the answer is polite.
    We can define a `MulticlassClassificationPromptTemplate` to set the criteria.
    The good news is, we don’t need to explicitly ask the LLM to classify the input
    into classes, return reasoning, or format the output — this is already built into
    the prompt template.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: Now, let’s create two datasets using all the descriptors — one for LLM-generated
    answers and another for the ground-truth answers.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: 'The next step is to create a report by adding the following tests:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Sentiment is above 0** — This will check that the tone of the responses is
    positive or neutral, avoiding overly negative answers.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**The text is at least 300 characters** — This will help ensure that the answers
    are detailed enough and not overly short or vague.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**There are no denials** — This test will verify that the answers provided
    do not include any denials or refusals, which might indicate incomplete or evasive
    responses.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Once these tests are added, we can generate the report and assess whether the
    LLM-generated answers meet the quality criteria.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: After execution, we will get a very nice interactive report with two tabs. On
    the “Metrics” tab, we will see a comparison of all the metrics we have specified.
    Since we have passed two datasets, the report will display a side‑by‑side comparison
    of the metrics, making it very convenient for experimentation. For instance, we
    will be able to see that the sentiment score is higher for the reference version,
    indicating that the answers in the reference dataset have a more positive tone
    compared to the LLM-generated ones.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d8008f061efdfb8b9ad9805dd68f3986.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: On the second tab, we can view the tests we’ve specified in the report. It will
    show us which tests passed and which failed. In this case, we can see that two
    out of the three tests we set are failing, providing us with valuable insights
    into areas where the LLM-generated answers are not meeting the expected criteria.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/87e6171980d6dc502454ece7aae42ba9.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: Great! We’ve explored how to compare different versions. Now, let’s focus on
    one of the most crucial metrics —  **accuracy**. Since we have ground truth answers
    available, we can use the **LLM-as-a-judge** method to evaluate whether the LLM-generated
    answers match those.
  prefs: []
  type: TYPE_NORMAL
- en: 'To do this, we can use a pre-built descriptor called `CorrectnessLLMEval`.
    This descriptor leverages an LLM to compare an answer against the expected one
    and assess its correctness. You can reference the default prompt directly in [code](https://github.com/evidentlyai/evidently/blob/a810d2e24c9e7b18c99f842cb6dd3d060bc85aae/src/evidently/legacy/descriptors/llm_judges.py#L232-L270)
    or use:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: Of course, if you need more flexibility, you can also define your own custom
    prompt for this — [the documentation](https://docs.evidentlyai.com/metrics/customize_llm_judge#multiple-columns)
    explains how to specify the second column (i.e., the ground truth) when crafting
    your own evaluation logic. Let’s give it a try.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/174169f4bf84e31c2101f2082a32a046.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: We’ve completed the first round of evaluation and gained valuable insights into
    our product’s quality. In practice, this is just the beginning — we’ll likely
    go through multiple iterations, evolving the solution by introducing multi‑agent
    setups, incorporating RAG, experimenting with different models or prompts, and
    so on.
  prefs: []
  type: TYPE_NORMAL
- en: After each iteration, it’s a good idea to expand our evaluation set to ensure
    we’re capturing all the nuances of our product’s behaviour.
  prefs: []
  type: TYPE_NORMAL
- en: This iterative approach helps us build a more robust and reliable product — one
    that’s backed by a solid and comprehensive evaluation framework.
  prefs: []
  type: TYPE_NORMAL
- en: In this example, we’ll skip the iterative development phase and jump straight
    into the post-launch stage to explore what happens once the product is out in
    the wild.
  prefs: []
  type: TYPE_NORMAL
- en: Quality in production
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Tracing
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The key focus during the launch of your AI product should be **observability**.
    It’s crucial to log every detail about how your product operates — this includes
    customer questions, LLM-generated answers, and all intermediate steps taken by
    your LLM agents (such as reasoning traces, tools used, and their outputs). Capturing
    this data is essential for effective monitoring and will be incredibly helpful
    for debugging and continuously improving your system’s quality.
  prefs: []
  type: TYPE_NORMAL
- en: 'With Evidently, you can take advantage of their online platform to store logs
    and evaluation data. It’s a great option for pet projects, as it’s free to use
    with a [few limitations](https://www.evidentlyai.com/pricing): your data will
    be retained for 30 days, and you can upload up to 10,000 rows per month. Alternatively,
    you can choose to [self-host](https://docs.evidentlyai.com/docs/setup/self-hosting)
    the platform.'
  prefs: []
  type: TYPE_NORMAL
- en: Let’s try it out. I started by registering on the website, creating an organisation,
    and retrieving the API token. Now we can switch to the API and set up a project.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: To track events in real-time, we will be using the [Tracely](https://github.com/evidentlyai/tracely)
    library. Let’s take a look at how we can do this.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: We can view these traces in the interface under the Traces tab, or load all
    events using the `dataset_id` to run an evaluation on them.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/35af6515e899aa66fe6a02eac875b806.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: We can also upload the evaluation report results to the platform, for example,
    the one from our most recent evaluation.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: The report, similar to what we previously saw in the Jupyter Notebook, is now
    available online on the website. You can access it whenever needed, within the
    30-day retention period for the developer account.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d2052fc3b7be9a61eb2cf743a0b078b4.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: For convenience, we can configure a default dashboard (adding `Columns tab`
    ), that will allow us to track the performance of our model over time.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c66b682596788b419ecce92222f56700.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: This setup makes it easy to track performance consistently.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b45c3df7f5b1bf0435153806bbb7444f.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: We have covered the basics of continuous monitoring in production, and now it’s
    time to discuss the additional metrics we can track.
  prefs: []
  type: TYPE_NORMAL
- en: Metrics in production
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Once our product is live in production, we can begin capturing additional signals
    beyond the metrics we discussed in the previous stage.
  prefs: []
  type: TYPE_NORMAL
- en: We can track **product usage metrics**, such as whether customers are engaging
    with our LLM feature, the average session duration, and the number of questions
    asked. Additionally, we can launch the new feature as an A/B test to assess its
    incremental impact on key product-level metrics like monthly active users, time
    spent, or the number of reports generated.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In some cases, we might also track **target metrics**. For instance, if you’re
    building a tool to automate the KYC (Know Your Customer) process during onboarding,
    you could measure metrics such as the automation rate or FinCrime-related indicators.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Customer feedback** is an invaluable source of insight. We can gather it
    either directly, by asking users to rate the response, or indirectly through implicit
    signals. For example, we might look at whether users are copying the answer, or,
    in the case of a tool for customer support agents, whether they edit the LLM-generated
    response before sending it to the customer.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In chat-based systems, we can leverage traditional ML models or LLMs to perform
    **sentiment analysis** and estimate customer satisfaction.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Manual reviews** remain a useful approach—for example, you can randomly select
    1% of cases, have experts review them, compare their responses to the LLM’s output,
    and include those cases in your evaluation set. Additionally, using the sentiment
    analysis mentioned earlier, you can prioritise reviewing the cases where the customer
    wasn’t happy.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Another good practice is **regression testing**, where you assess the quality
    of the new version using the evaluation set to ensure the product continues to
    function as expected.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Last but not least, it’s important not to overlook monitoring our **technical
    metrics** as a health check, such as response time or server errors. Additionally,
    you can set up alerts for unusual load or significant changes in the average answer
    length.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: That’s a wrap! We’ve covered the entire process of evaluating the quality of
    your LLM product, and I hope you’re now fully equipped to apply this knowledge
    in practice.
  prefs: []
  type: TYPE_NORMAL
- en: '*You can find the full code on [GitHub](https://github.com/miptgirl/miptgirl_medium/tree/main/talk_to_data_accuracy).*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'It’s been a long journey, so let’s quickly recap what we discussed in this
    article:'
  prefs: []
  type: TYPE_NORMAL
- en: We started by building an MVP SQLAgent prototype to use in our evaluations.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Then, we discussed the approaches and metrics that could be used during the
    experimentation stage, such as how to gather the initial evaluation set and which
    metrics to focus on.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Next, we skipped the long process of iterating on our prototype and jumped
    straight into the post-launch phase. We discussed what’s important at this stage:
    how to set up tracing to ensure you’re saving all the necessary information, and
    what additional signals can help confirm that your LLM product is performing as
    expected.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Thank you a lot for reading this article. I hope this article was insightful
    for you. If you have any follow-up questions or comments, please leave them in
    the comments section.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
