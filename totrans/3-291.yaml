- en: How to Find Seasonality Patterns in Time Series
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/how-to-find-seasonality-patterns-in-time-series-c3b9f11e89c6/](https://towardsdatascience.com/how-to-find-seasonality-patterns-in-time-series-c3b9f11e89c6/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: In my professional life as a data scientist, I have encountered time series
    multiple times. Most of my knowledge comes from my academic experience, specifically
    my courses in Econometrics (I have a degree in Economics), where we studied statistical
    properties and models of time series.
  prefs: []
  type: TYPE_NORMAL
- en: Among the models I studied was **SARIMA**, which acknowledges the **seasonality**
    of a time series, however, we have never studied how to intercept and recognize
    seasonality patterns.
  prefs: []
  type: TYPE_NORMAL
- en: Most of the time I had to find seasonal patterns I simply relied on **visual**
    **inspections** of data. This was until I stumbled on [this YouTube video](https://www.youtube.com/watch?v=spUNpyF58BY&t=1s)
    on **Fourier transforms** and eventually found out what a **periodogram** is.
  prefs: []
  type: TYPE_NORMAL
- en: In this blog post, I will explain and apply simple concepts that will turn into
    useful tools that every DS who’s studying time series should know.
  prefs: []
  type: TYPE_NORMAL
- en: '**Table of Contents**'
  prefs: []
  type: TYPE_NORMAL
- en: What is a Fourier Transform?
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Fourier Transform in Python
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Periodogram
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Overview
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Let’s assume I have the following dataset ([AEP energy consumption](https://www.kaggle.com/datasets/robikscube/hourly-energy-consumption),
    CC0 license):'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: '![AEP hourly energy consumption | Image by Author](../Images/0c7bbea815860ba63ab180ba889539df.png)'
  prefs: []
  type: TYPE_IMG
- en: AEP hourly energy consumption | Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: It is very clear, just from a visual inspection, that **seasonal patterns are
    playing a role**, however it might be trivial to intercept them all.
  prefs: []
  type: TYPE_NORMAL
- en: 'As explained before, the discovery process I used to perform was mainly **manual**,
    and it could have looked something as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: '![AEP hourly energy consumption, smaller timeframe | Image by Author](../Images/86f0c378fe879f70a890fdbefd5ff399.png)'
  prefs: []
  type: TYPE_IMG
- en: AEP hourly energy consumption, smaller timeframe | Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: 'This is a more in-depth visualization of this time series. As we can see the
    following patterns are influencing the data: **- a 6 month cycle,'
  prefs: []
  type: TYPE_NORMAL
- en: a weekly cycle,
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: and a daily cycle.**
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'This dataset shows energy consumption, so these seasonal patterns are easily
    inferable just from domain knowledge. However, by relying only on a manual inspection
    we could **miss important informations.** These could be some of the main **drawbacks**:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Subjectivity:** We might miss less obvious patterns.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Time-consuming** : We need to test different timeframes one by one.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Scalability issues:** Works well for a few datasets, but inefficient for
    large-scale analysis.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: As a Data Scientist it would be useful to have a tool that gives us **immediate
    feedback** on the most important frequencies that compose the time series. This
    is where the **Fourier Transforms** come to help.
  prefs: []
  type: TYPE_NORMAL
- en: 1\. What is a Fourier Transform
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The Fourier Transform is a mathematical tool that allows us to "switch domain".
  prefs: []
  type: TYPE_NORMAL
- en: Usually, we visualize our data in the **time domain**. However, using a Fourier
    Transform, we can switch to the **frequency domain**, which shows the frequencies
    that are present in the signal and their relative contribution to the original
    time series.
  prefs: []
  type: TYPE_NORMAL
- en: Intuition
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Any well-behaved function f(x) can be written as a sum of sinusoids with different
    frequencies, amplitudes and phases. In simple terms, **every signal** (time series)
    is just a **combination** of **simple waveforms**.
  prefs: []
  type: TYPE_NORMAL
- en: '![Image by Author](../Images/3267315fd506baffeb8476beed2b3dc0.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: 'Where:'
  prefs: []
  type: TYPE_NORMAL
- en: F(f) represents the function in the **frequency domain**.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: f(x) is the original function in the **time domain**.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: exp(−i2πf(x)) is a complex exponential that acts as a "frequency filter".
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Thus, **F(f)** tells us **how much** frequency **f** is **present** in the original
    function.
  prefs: []
  type: TYPE_NORMAL
- en: '**Example**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Let’s consider a signal composed of three sine waves with frequencies 2 Hz,
    3 Hz, and 5 Hz:'
  prefs: []
  type: TYPE_NORMAL
- en: '![A Simple Signal in time domain | Image by Author](../Images/565fc29a6b91700b7ab3cb948cdd6c0e.png)'
  prefs: []
  type: TYPE_IMG
- en: A Simple Signal in time domain | Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, let’s apply a Fourier Transform to extract these frequencies from the
    signal:'
  prefs: []
  type: TYPE_NORMAL
- en: '![A Simple Signal in the frequency domain | Image by Author](../Images/ddb6bc8d1c7a4cc051d0b4c38091da6e.png)'
  prefs: []
  type: TYPE_IMG
- en: A Simple Signal in the frequency domain | Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: The graph above represents our signal expressed in the frequency domain instead
    of the classic time domain. From the resulting plot, we can see that our signal
    is decomposed in 3 elements of frequency 2 Hz, 3 Hz and 5 Hz as expected from
    the starting signal.
  prefs: []
  type: TYPE_NORMAL
- en: 'As said before, any well-behaved function can be written as a sum of sinusoids.
    With the information we have so far it is possible to decompose our signal into
    three sinusoids:'
  prefs: []
  type: TYPE_NORMAL
- en: '![A Simple Signal decomposition in its basic wavelength | Image by Author](../Images/9a08a761f3c8bcee65474da5c637d611.png)'
  prefs: []
  type: TYPE_IMG
- en: A Simple Signal decomposition in its basic wavelength | Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: The original signal (in blue) can be obtained by summing the three waves (in
    red). This process can easily be applied in any time series to evaluate the main
    frequencies that compose the time series.
  prefs: []
  type: TYPE_NORMAL
- en: 2 Fourier Transform in Python
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Given that it is quite easy to switch between the time domain and the frequency
    domain, let’s have a look at the AEP energy consumption time series we started
    studying at the beginning of the article.
  prefs: []
  type: TYPE_NORMAL
- en: 'Python provides the "numpy.fft" library to compute the Fourier Transform for
    discrete signals. FFT stands for Fast Fourier Transform which is an algorithm
    used to decompose a discrete signal into its frequency components:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: '![AEP hourly energy consumption in frequency domain | Image by Author](../Images/04509a2d82a71996546765dbc2230357.png)'
  prefs: []
  type: TYPE_IMG
- en: AEP hourly energy consumption in frequency domain | Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: This is the frequency domain visualization of the AEP_MW energy consumption.
    When we analyze the graph we can already see that at certain frequencies we have
    a higher magnitude, implying higher importance of such frequencies.
  prefs: []
  type: TYPE_NORMAL
- en: However, before doing so we add one more piece of theory that will allow us
    to build a **periodogram**, that will give us a better view of the most important
    frequencies.
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Periodogram
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The periodogram is a frequency-domain representation of the **power spectral
    density** (PSD) of a signal. While the Fourier Transform tells us which frequencies
    are present in a signal, the periodogram quantifies the power (or intensity) of
    those frequencies. This passage is usefull as it **reduces the noise** of less
    important frequencies.
  prefs: []
  type: TYPE_NORMAL
- en: 'Mathematically, the periodogram is given by:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Image by Author](../Images/650ab7c9c24ceb8adbb48f6a9961a4e5.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: 'Where:'
  prefs: []
  type: TYPE_NORMAL
- en: P(f) is the power spectral density (PSD) at frequency f,
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: X(f) is the Fourier Transform of the signal,
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: N is the total number of samples.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'This can be achieved in Python as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: '![AEP hourly energy consumption Periodogram | Image by Author](../Images/7c5c01c75dae0f733ccdd3e8dfef0bbc.png)'
  prefs: []
  type: TYPE_IMG
- en: AEP hourly energy consumption Periodogram | Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: 'From this periodogram, it is now possible to **draw conclusions**. As we can
    see the most powerful frequencies sit at:'
  prefs: []
  type: TYPE_NORMAL
- en: 24 Hz, corresponding to 24h,
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 4.380 Hz, corresponding to 6 months,
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: and at 168 Hz, corresponding to the weekly cycle.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'These three are the same seasonality components we found in the manual exercise
    done in the visual inspection. However, using this visualization, we can see **three
    other cycles**, weaker in power, but present:'
  prefs: []
  type: TYPE_NORMAL
- en: a 12 Hz cycle,
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: an 84 Hz cycle, correspondint to half a week,
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: an 8.760 Hz cycle, corresponding to a full year.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It is also possible to use the function "periodogram" present in scipy to obtain
    the same result.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: Conclusions
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: When we are dealing with time series one of the most important components to
    consider is seasonalities.
  prefs: []
  type: TYPE_NORMAL
- en: In this blog post, we’ve seen how to **easily discover seasonalities** within
    a time series using a periodogram. Providing us with a simple-to-implement tool
    that will become extremely useful in the exploratory process.
  prefs: []
  type: TYPE_NORMAL
- en: 'However, this is just a starting point of the possible implementations of Fourier
    Transform that we could benefit from, as there are many more:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Spectrogram**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Feature encoding**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Time series decomposition**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: …
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Please leave some claps if you enjoyed the article and feel free to comment,
    any suggestion and feedback is appreciated!
  prefs: []
  type: TYPE_NORMAL
