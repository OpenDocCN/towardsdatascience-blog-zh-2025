- en: Why Generative-AI Apps’ Quality Often Sucks and What to Do About It
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: Why Generative-AI Apps’ Quality Often Sucks and What to Do About It
- en: 原文：[https://towardsdatascience.com/why-generative-ai-apps-quality-often-sucks-and-what-to-do-about-it-f84407f263c3/](https://towardsdatascience.com/why-generative-ai-apps-quality-often-sucks-and-what-to-do-about-it-f84407f263c3/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/why-generative-ai-apps-quality-often-sucks-and-what-to-do-about-it-f84407f263c3/](https://towardsdatascience.com/why-generative-ai-apps-quality-often-sucks-and-what-to-do-about-it-f84407f263c3/)
- en: '![Image licensed from elements.envato.com, edit by Marcel Müller, 2025](../Images/adc610e7f7acb7996495095ce6fcbfe5.png)'
  id: totrans-2
  prefs: []
  type: TYPE_IMG
  zh: '![Image licensed from elements.envato.com, edit by Marcel Müller, 2025](../Images/adc610e7f7acb7996495095ce6fcbfe5.png)'
- en: Image licensed from elements.envato.com, edit by Marcel Müller, 2025
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: Image licensed from elements.envato.com, edit by Marcel Müller, 2025
- en: The generative AI hype has rolled through the business world in the past two
    years. This technology can make business process executions more efficient, reduce
    wait time, and reduce process defects. Some interfaces like ChatGPT make interacting
    with an LLM easy and accessible. Anyone with experience using a chat application
    can effortlessly type a query, and ChatGPT will always generate *a* response.
    Yet the **quality** and **suitability** for the **intended use** of your generated
    content may vary. This is especially true for **enterprises** that want to use
    generative AI technology in their business operations.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 过去两年中，生成式AI的热潮席卷了商业世界。这项技术可以使业务流程执行更高效，减少等待时间，并减少流程缺陷。一些界面，如ChatGPT，使与LLM交互变得简单易用。任何有使用聊天应用程序经验的用户都可以轻松地键入查询，ChatGPT总是会生成**一个**响应。然而，您生成的内容的**质量**和**适用性**对于**预期用途**可能会有所不同。这对于想要在其业务运营中使用生成式AI技术的**企业**尤其如此。
- en: 'I have spoken to countless managers and entrepreneurs who failed in their endeavors
    because they could not get high-quality generative AI applications to production
    and get reusable results from a non-deterministic model. On the other hand, I
    have also built more than three dozen AI applications and have realized one common
    misconception when people think about quality for generative AI applications:
    They think it is all about how powerful your underlying model is. But this is
    only 30% of the full story.'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 我与无数未能将高质量的生成式AI应用投入生产并从非确定性模型中获得可重复结果的经理和企业家交谈过。另一方面，我也构建了三十多个AI应用，并意识到人们在考虑生成式AI应用的质量时存在的一个共同误解：他们认为这完全取决于底层模型有多强大。但这只是整个故事的三分之一。
- en: But there are dozens of techniques, patterns, and architectures that help create
    impactful LLM-based applications of the quality that businesses desire. Different
    foundation models, fine-tuned models, architectures with retrieval augmented generation
    (RAG) and advanced processing pipelines are just the tip of the iceberg.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 但有数十种技术、模式和架构有助于创建具有影响力的基于LLM的应用程序，其质量符合企业需求。不同的基础模型、微调模型、具有检索增强生成（RAG）和高级处理管道的架构只是冰山一角。
- en: 'This article shows how we can **qualitatively** and **quantitatively** evaluate
    generative AI applications in **the context of concrete business processes**.
    We will not stop at generic benchmarks but introduce approaches to evaluating
    applications with generative AI. After a quick analysis of generative AI applications
    and their business processes, we will look into the following questions:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 本文展示了我们如何在**具体业务流程的背景下****定性**和**定量**地评估生成式AI应用。我们不会止步于通用的基准，而是介绍评估具有生成式AI的应用程序的方法。在对生成式AI应用及其业务流程进行快速分析后，我们将探讨以下问题：
- en: In **what context** do we need to evaluate generative AI applications to assess
    their end-to-end quality and utility in enterprise applications?
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在**什么情况下**我们需要评估生成式AI应用，以评估其在企业应用中的端到端质量和实用性？
- en: '**When** in the development life cycle of applications with generative AI,
    do we use different approaches for evaluation, and what are the objectives?'
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在具有生成式AI的应用程序的开发生命周期中**何时**，我们使用不同的评估方法，目标是什么？
- en: '**How** do we use different metrics in isolation and production to select,
    monitor and improve the quality of generative AI applications?'
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**我们**如何在不同情况下和在生产中单独使用不同的指标来选择、监控和改进生成式AI应用的质量？'
- en: This overview will give us an end-to-end evaluation framework for generative
    AI applications in enterprise scenarios that I call the PEEL (_p_erformance _e_valuation
    for _e_nterprise _L_LM applications). Based on the conceptual framework created
    in this article, we will introduce an implementation concept as an addition to
    the entAIngine Test Bed module as part of the entAIngine platform.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 这个概述将为我们提供一个生成式AI在企业场景中的应用的端到端评估框架，我称之为PEEL（_p_erformance _e_valuation for _e_nterprise
    _L_LM applications）。基于本文中创建的概念框架，我们将介绍一个实现概念，作为entAIngine平台的一部分，作为entAIngine测试床模块的补充。
- en: '1\. Background: Business Processes and Generative AI'
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1. 背景：业务流程和生成式AI
- en: An organization lives by its business processes. Everything in a company can
    be a business process, such as customer support, software development, and operations
    processes. Generative AI can improve our business processes by making them faster
    and more efficient, reducing wait time and improving the outcome quality of our
    processes. Yet, we can further divide each process activity that uses generative
    AI even more.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 一个组织依靠其业务流程生存。公司中的每一件事都可以是一个业务流程，例如客户支持、软件开发和运营流程。生成式AI可以通过使它们更快、更高效来改进我们的业务流程，减少等待时间并提高我们流程的结果质量。然而，我们可以进一步将每个使用生成式AI的业务流程活动进一步细分。
- en: '![Processes for generative AI applications. © 2025, Marcel Müller](../Images/32a48bc29370cc1a6b340c32df07f66b.png)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
  zh: '![生成式AI应用的流程。© 2025, Marcel Müller](../Images/32a48bc29370cc1a6b340c32df07f66b.png)'
- en: Processes for generative AI applications. © 2025, Marcel Müller
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式AI应用的流程。© 2025, Marcel Müller
- en: The illustration shows the start of a simple business that a telecommunications
    company’s customer support agent must go through. Every time a new customer support
    request comes in, the customer support agent has to give it a priority-level.
    When the work items on their list come to the point that the request has priority,
    the customer support agents must find the correct answer and write an answer email.
    Afterward, they need to send the email to the customers and wait for a reply,
    and they iterate until the request is solved.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 该插图显示了电信公司客户支持代理必须经历的简单业务开始。每当有新的客户支持请求进来时，客户支持代理必须给它一个优先级。当列表上的工作项达到请求具有优先级的时候，客户支持代理必须找到正确的答案并撰写答案电子邮件。之后，他们需要将电子邮件发送给客户并等待回复，他们迭代直到请求得到解决。
- en: We can use a generative AI workflow to make the "find and write answer" activity
    more efficient. Yet, this activity is often not a single call to ChatGPT or another
    LLM but a collection of different tasks. In our example, the telco company has
    built a pipeline using the entAIngine process platform that consists of the following
    steps.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以使用生成式AI工作流程来使“查找和撰写答案”活动更加高效。然而，这项活动通常不是一个对ChatGPT或其他LLM的单次调用，而是一系列不同的任务。在我们的例子中，电信公司使用entAIngine流程平台构建了一个管道，包括以下步骤。
- en: '**Extract the question and generate a query to the vector database**. The example
    company has a vector database as knowledge for retrieval augmented generation
    (RAG). We need to extract the essence of the customer’s question from their request
    email to have the best query and find the sections in the knowledge base that
    are semantically as close as possible to the question.'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**提取问题并向向量数据库生成查询**。示例公司有一个向量数据库作为检索增强生成（RAG）的知识库。我们需要从客户的请求电子邮件中提取客户问题的精髓，以获得最佳查询，并找到与问题在语义上尽可能接近的知识库部分。'
- en: '**Find context in the knowledge base**. The semantic search activity is the
    next step in our process. Retrieval-reranking structures are often used to get
    the top k context chunks relevant to the query and sort them with an LLM. This
    step aims to retrieve the correct context information to generate the best answer
    possible.'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**在知识库中查找上下文**。语义搜索活动是我们流程中的下一步。检索重排序结构通常用于获取与查询相关的最相关的k个上下文块，并使用LLM对它们进行排序。这一步骤的目的是检索正确的上下文信息，以生成最佳答案。'
- en: '**Use context to generate an answer**. This step orchestrates a large language
    model using a prompt and the selected context as input to the prompt.'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**使用上下文生成答案**。这一步骤通过提示和选定的上下文作为输入到提示中，协调使用大型语言模型。'
- en: '**Write an answer email**. The final step transforms the pre-formulated answer
    into a formal email with the correct intro and ending to the message in the company’s
    desired tone and complexity.'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**撰写答案电子邮件**。最后一步将预先制定的答案转换成公司期望的语气和复杂度的正式电子邮件，并包含正确的开头和结尾。'
- en: The execution of processes like this is called the **orchestration** of an advanced
    LLM workflow. There are dozens of other orchestration architectures in enterprise
    contexts. Using a chat interface that uses the current prompt and the chat history
    is also a simple type of orchestration. Yet, for **reproducible** enterprise workflows
    with sensitive company data, using a simple chat orchestration is not enough in
    many cases, and advanced workflows like those shown above are needed.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 这种流程的执行被称为高级LLM工作流的**编排**。在企业环境中还有数十种其他编排架构。使用当前提示和聊天历史的聊天界面也是一种简单的编排类型。然而，对于涉及敏感公司数据的可重复性企业工作流，在很多情况下，简单的聊天编排是不够的，需要像上面展示的高级工作流。
- en: Thus, when we evaluate complex processes for generative AI orchestrations in
    enterprise scenarios, looking purely at the capabilities of a foundational (or
    fine-tuned) model is, in many cases, just the start. The following section will
    dive deeper into what context and orchestration we need to evaluate generative
    AI applications.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，当我们评估企业场景中生成式AI编排的复杂过程时，仅仅关注基础模型（或微调模型）的能力，在很多情况下，只是开始。下一节将深入探讨我们需要评估哪些上下文和编排来生成AI应用。
- en: 2\. Concept
  id: totrans-24
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2. 概念
- en: The following sections introduce the core concepts for our approach.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 以下几节介绍了我们方法的核心概念。
- en: My team has built the [entAIngine](http://www.entaingine.com) platform that
    is, in that sense, quite unique in that it enables low-code generation of applications
    with generative AI tasks that are not necessarily a chatbot application. We have
    also implemented the following approach on entAIngine. If you want to try it out,
    message me. Or, if you want to build your own testbed functionality, feel free
    to get inspiration from the concept below.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 我的团队构建了[entAIngine](http://www.entaingine.com)平台，从这个意义上讲，它相当独特，因为它能够以低代码方式生成具有生成式AI任务的应用程序，这些任务不一定是聊天机器人应用程序。我们还在entAIngine上实现了以下方法。如果你想尝试它，给我发消息。或者，如果你想构建自己的测试平台功能，你可以从下面的概念中获取灵感。
- en: 2.1\. Context and Orchestration of Performance Evaluation for Generative AI
    Applications
  id: totrans-27
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2.1. 生成式AI应用性能评估的上下文和编排
- en: 'When evaluating the performance of generative AI applications in their orchestrations,
    we have the following choices: We can evaluate a foundational model in isolation,
    a fine-tuned model or either of those options as part of a larger orchestration,
    including several calls to different models and RAG. This has the following implications.'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 当评估生成式AI应用在编排中的性能时，我们有以下选择：我们可以独立评估基础模型，微调模型，或者将这两个选项之一作为更大编排的一部分，包括对多个模型和RAG的多次调用。这有以下影响。
- en: '![Context and orchestration for LLM-based applications. © Marcel Müller, 2025](../Images/7cf5dc286ea59018d4f915faa8fe188c.png)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
  zh: '![LLM应用中的上下文和编排。© Marcel Müller, 2025](../Images/7cf5dc286ea59018d4f915faa8fe188c.png)'
- en: Context and orchestration for LLM-based applications. © Marcel Müller, 2025
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: LLM应用的上下文和编排。© Marcel Müller, 2025
- en: Publicly available generative AI models like (for LLMs) GPT-4o, Llama 3.2 and
    many others were trained on the "public wisdom of the internet." Their training
    sets included a large corpus of knowledge from books, world literature, Wikipedia
    articles, and other Internet crawls from forums and block posts. There is no company
    internal knowledge encoded in foundational models. Thus, when we evaluate the
    capabilities of a foundational model in evaluation, we can only evaluate the general
    capabilities of *how* queries are answered. However, the extensiveness of company-specific
    knowledge bases that show "how much the model knows" cannot be judged. There is
    only company-specific knowledge in foundational models with advanced orchestration
    that inserts company-specific context.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 公共可用的生成式AI模型，如（针对LLM的）GPT-4o、Llama 3.2等许多其他模型，都是在“互联网的公共智慧”上训练的。它们的训练集包括来自书籍、世界文学、维基百科文章和其他来自论坛和块帖子的互联网爬虫的大量知识库。基础模型中没有任何公司内部知识编码。因此，当我们评估基础模型的能力时，我们只能评估查询回答的**一般能力**。然而，公司特定知识库的广泛性，即“模型知道多少”的量，是无法判断的。在具有高级编排的基础模型中，只有公司特定的知识被插入到公司特定的上下文中。
- en: For example, with a free account from ChatGPT, anyone can ask, "How did Goethe
    die?" The model will provide an answer because the key information about Goethe’s
    life and death is in the model’s knowledge base. Yet, the question "How much revenue
    did our company make last year in Q3 in EMEA?" will most likely lead to a heavily
    hallucinated answer which will seem plausible to inexperienced users. However,
    we can still evaluate the form and representation of the answers, including style
    and tone, as well as language capabilities and skills concerning reasoning and
    logical deduction. Synthetic benchmarks such as ARC, HellaSwag, and MMLU provide
    comparative metrics for those dimensions. We will take a deeper look into those
    benchmarks in a later section.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，使用ChatGPT的免费账户，任何人都可以问，“歌德是如何去世的？”模型将提供答案，因为关于歌德生平和死亡的关键信息在模型的知识库中。然而，对于“我们公司在去年第三季度在EMEA地区的收入是多少？”这样的问题，很可能会得到一个高度虚构的答案，这对于缺乏经验的用户来说似乎很有说服力。然而，我们仍然可以评估答案的形式和表达，包括风格和语气，以及与推理和逻辑推理相关的语言能力和技能。ARC、HellaSwag和MMLU等合成基准为这些维度提供了比较指标。我们将在下一节中更深入地探讨这些基准。
- en: Fine-tuned models build on foundational models. They use additional data sets
    to add foundational knowledge into a model that has not been there before by further
    training of the underlying machine learning model. Fine-tuned models have more
    context-specific knowledge. Suppose we orchestrate them in isolation without any
    other ingested data. In that case, we can evaluate the knowledge base concerning
    its suitability for real-world scenarios in a given business process. Fine-tuning
    is often used to focus on adding domain-specific vocabulary and sentence structures
    to a foundational model.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 微调模型建立在基础模型之上。它们使用额外的数据集，通过进一步训练底层机器学习模型，将基础知识添加到之前没有的知识库中。微调模型具有更多上下文特定的知识。假设我们在没有其他摄入数据的情况下单独编排它们。在这种情况下，我们可以评估知识库在特定业务流程中的适用性，以评估其实际场景的适用性。微调通常用于将特定领域的词汇和句子结构添加到基础模型中。
- en: Suppose, we train a model on a corpus of legal court rulings. In that case,
    a fine-tuned model will start using the vocabulary and reproducing the sentence
    structure that is common in the legal domain. The model can combine some excerpts
    from old cases but fails to quote the right sources.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我们在一个法律法院判决的语料库上训练一个模型。在这种情况下，一个微调后的模型将开始使用法律领域常见的词汇和句子结构。该模型可以结合一些旧案例的摘录，但无法正确引用来源。
- en: Orchestrating foundational models or fine-tuned models with retrieval-ation
    (RAG) produces highly context-dependent results. However, this also requires a
    more complex orchestration pipeline.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 使用检索增强（RAG）编排基础模型或微调模型会产生高度上下文相关的结果。然而，这也需要一个更复杂的编排管道。
- en: For example, a telco company, like in our example above, can use a language
    model to create embeddings of their customer support knowledge base and store
    them in a vector store. We can now efficiently query this knowledge base in a
    vector store with semantic search. By keeping track of the text segments that
    are retrieved, we can very precisely show the source of the retrieved text chunk
    and use it as context in a call to a large language model. This lets us answer
    our question end-to-end.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，像我们上面例子中的电信公司一样，可以使用语言模型创建其客户支持知识库的嵌入，并将它们存储在向量存储中。现在，我们可以通过语义搜索高效地查询向量存储中的知识库。通过跟踪检索到的文本片段，我们可以非常精确地显示检索到的文本块来源，并将其用作对大型语言模型调用的上下文。这使得我们能够端到端地回答我们的问题。
- en: We can evaluate how well our application serves its intended purpose end-to-end
    for such large orchestrations with different data processing pipeline steps.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以评估我们的应用程序在端到端服务其预期目的方面做得如何，对于这种具有不同数据处理管道步骤的大型编排。
- en: Evaluating those different types of setups gives us different insights that
    we can use in the development process of generative AI applications. We will look
    deeper into this aspect in the next section.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 评估这些不同类型的设置为我们提供了不同的见解，我们可以在生成式人工智能应用程序的开发过程中使用这些见解。我们将在下一节中更深入地探讨这一方面。
- en: 2.2 Evaluation of Generative AI Applications in the Development Lifecycle
  id: totrans-39
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2.2 生成式人工智能在开发生命周期中的应用评估
- en: 'We develop generative AI applications in different stages: 1) before building,
    2) during build and testing, and 3) in production. With an agile approach, these
    stages are not executed in a linear sequence but iteratively. Yet, the goals and
    methods of evaluation in the different stages remain the same regardless of their
    order.'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在不同的阶段开发生成式AI应用：1) 在构建之前，2) 在构建和测试期间，以及3) 在生产中。采用敏捷方法，这些阶段不是按线性顺序执行，而是迭代执行。然而，不同阶段的评估目标和方法是相同的，无论它们的顺序如何。
- en: '![](../Images/b377624818eac539dd9236db7c9ea66e.png)'
  id: totrans-41
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b377624818eac539dd9236db7c9ea66e.png)'
- en: '**Before building**, we need to evaluate which foundational model to choose
    or whether to create a new one from scratch. Therefore, we must first define our
    expectations and requirements, especially w.r.t. execution time, efficiency, price
    and quality. Currently, only very few companies decide to build their own foundational
    models from scratch due to cost and updating efforts. Fine-tuning and retrieval
    augmented generation are the standard tools to build highly personalized pipelines
    with traceable internal knowledge that leads to reproducible outputs. In this
    stage, synthetic benchmarks are the go-to approaches to achieve comparability.
    For example, if we want to build an application that helps lawyers prepare their
    cases, we need a model that is good at logical argumentation and understanding
    of a specific language.'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: '**在构建之前**，我们需要评估选择哪个基础模型，或者是否从头开始创建一个新的模型。因此，我们首先必须定义我们的期望和要求，特别是关于执行时间、效率、价格和质量。目前，由于成本和更新努力，只有极少数公司决定从头开始构建自己的基础模型。微调和检索增强生成是构建高度个性化的管道的标准工具，这些管道具有可追溯的内部知识，从而产生可重复的输出。在这个阶段，合成基准测试是实现可比性的首选方法。例如，如果我们想构建一个帮助律师准备案件的程序，我们需要一个擅长逻辑论证和特定语言理解的模型。'
- en: '**During building,** our evaluation needs to focus on satisfying the quality
    and performance requirements of the application’s example cases. In the case of
    building an application for lawyers, we need to make a representative selection
    of limited old cases. Those cases are the basis for defining **standard scenarios**
    of the application based on which we implement the application. For example, if
    the lawyer specializes in financial law and taxation, we would select a few of
    the standard cases for which this lawyer has to create scenarios. Every building
    and evaluation activity that we do in this phase has a *limited view* of representative
    scenarios and does not cover every instance. Yet, we need to evaluate the scenarios
    in the ongoing steps of application development.'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: '**在构建过程中**，我们的评估需要关注满足应用示例案例的质量和性能要求。在为律师构建应用的案例中，我们需要从有限的旧案例中进行代表性选择。这些案例是定义应用**标准场景**的基础，基于这些场景我们实现应用。例如，如果律师专长于金融法和税收，我们会选择几个标准案例，律师必须为这些案例创建场景。在这个阶段，我们进行的每一个构建和评估活动都只具有代表性场景的**有限视角**，并不涵盖每一个实例。然而，我们需要评估应用开发过程中的场景。'
- en: '**In production**, our evaluation approach focuses on quantitatively evaluating
    the real-world usage of our application with the expectations of live users. In
    production, we will find scenarios that are not covered in our building scenarios.
    The goal of the evaluation in this phase is to discover those scenarios and gather
    feedback from live users to improve the application further.'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: '**在生产中**，我们的评估方法侧重于定量评估真实世界应用的使用情况，以符合活用户的期望。在生产中，我们将找到在构建场景中未涵盖的场景。这一阶段评估的目标是发现这些场景，并从活用户那里收集反馈，以进一步改进应用。'
- en: The production phase should always feed back into the development phase to improve
    the application iteratively. Hence, the three phases are not in a linear sequence,
    but interleaving.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 生产阶段应始终反馈到开发阶段，以迭代改进应用。因此，这三个阶段不是线性序列，而是交错进行的。
- en: 2.3\. Benchmark Metrics for Evaluation
  id: totrans-46
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2.3. 评估基准指标
- en: 'With the "what" and "when" of the evaluation covered, we have to ask "how"
    we are going to evaluate our generative AI applications. Therefore, we have three
    different methods: Synthetic benchmarks, limited scenarios and feedback loop evaluation
    in production.'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 评估的“什么”和“何时”已经确定，我们必须问“如何”评估我们的生成式AI应用。因此，我们有三种不同的方法：合成基准测试、有限场景和在生产中的反馈循环评估。
- en: For synthetic benchmarks, we will look into the most commonly used approaches
    and compare them.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 对于合成基准测试，我们将探讨最常用的方法并进行比较。
- en: The **AI2 Reasoning Challenge (ARC)** tests an LLM’s knowledge and reasoning
    using a dataset of 7787 multiple-choice science questions. These questions range
    from 3rd to 9th grade and are divided into Easy and Challenge sets. ARC is useful
    for evaluating diverse knowledge types and pushing models to integrate information
    from multiple sentences. Its main benefit is comprehensive reasoning assessment,
    but it’s limited to scientific questions.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: '**AI2 Reasoning Challenge (ARC**) 通过一个包含 7787 个多项选择题的科学问题数据集来测试一个 LLM 的知识和推理能力。这些问题从
    3 年级到 9 年级不等，分为简单和挑战集。ARC 对于评估不同知识类型和推动模型整合多句信息非常有用。其主要优点是全面的推理评估，但它仅限于科学问题。'
- en: '**HellaSwag** tests commonsense reasoning and natural language inference through
    sentence completion exercises based on real-world scenarios. Each exercise includes
    a video caption context and four possible endings. This benchmark measures an
    LLM’s understanding of everyday scenarios. Its main benefit is the complexity
    added by adversarial filtering, but it primarily focuses on general knowledge,
    limiting specialized domain testing.'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: '**HellaSwag** 通过基于现实场景的句子完成练习来测试常识推理和自然语言推理。每个练习包括一个视频字幕上下文和四个可能的结尾。这个基准衡量一个
    LLM 对日常场景的理解。其主要优点是通过对立筛选增加的复杂性，但它主要关注一般知识，限制了专业领域的测试。'
- en: '**The MMLU (Massive Multitask Language Understanding) benchmark** measures
    an LLM’s natural language understanding across 57 tasks covering various subjects,
    from STEM to humanities. It includes 15,908 questions from elementary to advanced
    levels. MMLU is ideal for comprehensive knowledge assessment. Its broad coverage
    helps identify deficiencies, but limited construction details and errors may affect
    reliability.'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: '**MMLU (大规模多任务语言理解) 基准**衡量一个 LLM 在涵盖各种主题的 57 个任务中的自然语言理解能力，从 STEM 到人文科学。它包括从小学到高级水平的
    15,908 个问题。MMLU 对于全面的知识评估非常理想。其广泛的覆盖范围有助于识别缺陷，但有限的构建细节和错误可能影响可靠性。'
- en: '**TruthfulQA** evaluates an LLM’s ability to generate truthful answers, addressing
    hallucinations in language models. It measures how accurately an LLM can respond,
    especially when training data is insufficient or low quality. This benchmark is
    useful for assessing accuracy and truthfulness, with the main benefit of focusing
    on factually correct answers. However, its general knowledge dataset may not reflect
    truthfulness in specialized domains.'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: '**TruthfulQA** 评估一个 LLM 生成真实答案的能力，解决语言模型中的幻觉问题。它衡量一个 LLM 的响应准确性，尤其是在训练数据不足或质量低时。这个基准对于评估准确性和真实性很有用，主要优点是专注于事实正确的答案。然而，其通用知识数据集可能无法反映在专业领域的真实性。'
- en: The **RAGAS framework** is designed to evaluate Retrieval Augmented Generation
    (RAG) pipelines. It is a framework especially useful for a category of LLM applications
    that utilize external data to enhance the LLM’s context. The frameworks introduces
    metrics for faithfulness, answer relevancy, context recall, context precision,
    context relevancy, context entity recall and summarization score that can be used
    to assess in a differentiated view the quality of the retrieved outputs.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: '**RAGAS 框架**旨在评估检索增强生成（RAG）管道。这是一个特别适用于一类利用外部数据来增强 LLM 上下文的 LLM 应用框架。该框架引入了用于评估检索输出质量的忠实度、答案相关性、上下文召回、上下文精确度、上下文相关性、上下文实体召回和摘要得分的指标，可以用来从不同的视角评估检索输出的质量。'
- en: '**WinoGrande** tests an LLM’s commonsense reasoning through pronoun resolution
    problems based on the Winograd Schema Challenge. It presents near-identical sentences
    with different answers based on a trigger word. This benchmark is beneficial for
    resolving ambiguities in pronoun references, featuring a large dataset and reduced
    bias. However, annotation artifacts remain a limitation.'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: '**WinoGrande** 通过基于 Winograd Schema Challenge 的代词解析问题来测试一个 LLM 的常识推理能力。它展示了基于触发词的不同答案的几乎相同的句子。这个基准对于解决代词引用中的歧义有益，具有大量数据集和减少偏差的特点。然而，注释错误仍然是一个限制。'
- en: The **GSM8K** benchmark measures an LLM’s multi-step mathematical reasoning
    using around 8,500 grade-school-level math problems. Each problem requires multiple
    steps involving basic arithmetic operations. This benchmark highlights weaknesses
    in mathematical reasoning, featuring diverse problem framing. However, the simplicity
    of problems may limit their long-term relevance.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '**GSM8K** 基准通过大约 8,500 个小学水平的数学问题来衡量一个 LLM 的多步数学推理能力。每个问题都需要多个步骤，涉及基本的算术运算。这个基准突出了数学推理中的弱点，具有多样化的问题框架。然而，问题的简单性可能限制了它们的长期相关性。'
- en: '**SuperGLUE** enhances the GLUE benchmark by testing an LLM’s NLU capabilities
    across eight diverse subtasks, including Boolean Questions and the Winograd Schema
    Challenge. It provides a thorough assessment of linguistic and commonsense knowledge.
    SuperGLUE is ideal for broad NLU evaluation, with comprehensive tasks offering
    detailed insights. However, fewer models are tested compared to benchmarks similar
    to MMLU.'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: '**SuperGLUE** 通过测试一个LLM在八个不同的子任务上的NLU能力来增强GLUE基准，包括布尔问题和Winograd Schema挑战。它提供了对语言和常识知识的全面评估。SuperGLUE非常适合广泛的NLU评估，提供全面的任务，可以提供详细的见解。然而，与MMLU类似的基准相比，测试的模型较少。'
- en: '**HumanEval** measures an LLM’s ability to generate functionally correct code
    through coding challenges and unit tests. It includes 164 coding problems with
    several unit tests per problem. This benchmark assesses coding and problem-solving
    capabilities, focusing on functional correctness similar to human evaluation.
    However, it only covers some practical coding tasks, limiting its comprehensiveness.'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: '**HumanEval** 通过编码挑战和单元测试来衡量LLM生成功能正确代码的能力。它包括164个编码问题，每个问题有几个单元测试。这个基准评估编码和问题解决能力，重点关注与人类评估类似的功能正确性。然而，它只覆盖了一些实际编码任务，限制了其全面性。'
- en: '**MT-Bench** evaluates an LLM’s capability in multi-turn dialogues by simulating
    real-life conversational scenarios. It measures how effectively chatbots engage
    in conversations, following a natural dialogue flow. With a carefully curated
    dataset, MT-Bench is useful for assessing conversational abilities. However, its
    small dataset and the challenge of simulating real conversations still need to
    be improved.'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: '**MT-Bench** 通过模拟现实生活中的对话场景来评估LLM在多轮对话中的能力。它衡量聊天机器人如何有效地参与对话，遵循自然的对话流程。使用精心策划的数据集，MT-Bench对于评估对话能力很有用。然而，其小数据集和模拟真实对话的挑战仍需改进。'
- en: All those metrics are synthetic and aim to provide a relative comparison between
    different LLMs. However, their concrete impact for a use case in a company depends
    on the **classification** of the challenge in the scenario to the benchmark. For
    example, in use cases for tax accounts where a lot of math is needed, GSM8K would
    be a good candidate to evaluate that capability. HumanEval is the initial tool
    of choice for the use of an LLM in a coding-related scenario.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 所有这些指标都是合成的，旨在在不同LLM之间提供相对比较。然而，它们在一家公司中的具体影响取决于场景中挑战的**分类**与基准的关系。例如，在需要大量数学的税务会计用例中，GSM8K将是评估该能力的好候选。HumanEval是选择在编码相关场景中使用LLM的初始工具。
- en: 2.4\. Real-life Scenario-based Evaluation
  id: totrans-60
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2.4. 基于现实场景的评估
- en: However, the impact of those benchmarks is rather abstract and only gives an
    **indication** of their performance in an enterprise use case. This is where working
    with **real-life scenarios** is needed.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，这些基准的影响相当抽象，只能提供一个**指示**，说明它们在企业用例中的性能。这正是需要与**现实场景**合作的地方。
- en: 'Real-life scenarios consist of the following components:'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 现实场景由以下组件组成：
- en: case-specific context data (input),
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 案例特定的上下文数据（输入），
- en: case-independent context data,
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 案例无关的上下文数据，
- en: a sequence of tasks to complete and
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一系列要完成的任务，
- en: the expected output.
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 预期的输出。
- en: With real-life test scenarios, we can model different situations, like
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 通过现实测试场景，我们可以模拟不同的情况，如
- en: multi-step chat interactions with several questions and answers,
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 多步骤聊天交互，有几个问题和答案，
- en: complex automation tasks with multiple AI interactions,
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 需要多个AI交互的复杂自动化任务，
- en: processes that involve RAG and
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 涉及RAG的过程，
- en: multi-modal process interactions.
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 多模态过程交互。
- en: In other words, it does not help anyone to have the best model in the world
    if the **RAG pipeline** always returns mediocre results because your chunking
    strategy is not good. Also, if you do not have the right data to answer your queries,
    you will always get some hallucinations that may or may not be close to the truth.
    In the same way, your results will vary based on the hyperparameters of your chosen
    models (temperature, frequency penalty, etc.). And we cannot use the most powerful
    model for every use case, if this is an expensive model.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，如果因为你的分块策略不好，RAG管道总是返回平庸的结果，那么即使拥有世界上最好的模型对任何人都没有帮助。同样，如果你没有正确的数据来回答你的查询，你总是会得到一些可能或可能不接近真相的幻觉。同样，你的结果将根据你选择的模型（温度、频率惩罚等）的超参数而变化。而且，如果这是一个昂贵的模型，我们不可能为每个用例使用最强大的模型。
- en: Standard benchmarks focus on the individual models rather than on the big picture.
    That is why we introduce the PEEL framework for performance evaluation of enterprise
    LLM applications, which gives us an end-to-end view.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 标准基准主要关注单个模型而不是整体情况。这就是为什么我们引入PEEL框架来评估企业LLM应用的表现，它为我们提供了一个端到端视图。
- en: The core concept of PEEL is the **evaluation scenario**. We distinguish between
    an **evaluation scenario *definition*** and an **evaluation scenario *execution***.
    The conceptual illustration shows the overall concepts in black, an example definition
    in blue and the outcome of one instance of an execution in green.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: PEEL的核心概念是**评估场景**。我们区分**评估场景定义**和**评估场景执行**。概念图示用黑色表示整体概念，用蓝色表示一个示例定义，用绿色表示执行实例的结果。
- en: '![The concept of evaluation scenarios as introduced by the PEEL framework ©
    Marcel Müller](../Images/e642e8d6c71faa1b2dc423adb10dc118.png)'
  id: totrans-75
  prefs: []
  type: TYPE_IMG
  zh: '![PEEL框架中引入的评估场景概念 © Marcel Müller](../Images/e642e8d6c71faa1b2dc423adb10dc118.png)'
- en: The concept of evaluation scenarios as introduced by the PEEL framework © Marcel
    Müller
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: PEEL框架中引入的评估场景概念 © Marcel Müller
- en: An evaluation scenario definition consists of **input definitions**, an **orchestration
    definition** and an expected **output definition**.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 评估场景定义由**输入定义**、**编排定义**和预期的**输出定义**组成。
- en: 'For the input, we distinguish between case-specific and case-independent context
    data. Case-specific context data changes from case to case. For example, in the
    customer support use case, the question that a customer asks is different from
    customer case to customer case. In our example evaluation execution, we depicted
    one case where the email inquiry reads as follows:'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 对于输入，我们区分特定案例和独立案例的上下文数据。特定案例的上下文数据因案例而异。例如，在客户支持用例中，客户提出的问题因客户案例而异。在我们的示例评估执行中，我们描绘了一个案例，其中电子邮件询问如下：
- en: '"Dear customer support,'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: '"尊敬的客户支持，'
- en: my name is […]. How do I reset my router when I move to a different apartment?
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 我的名字是[……]。当我搬到不同的公寓时，我如何重置我的路由器？
- en: Kind regards, […] "
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 敬上，[……] "
- en: Yet, the knowledge base where the answers to the question are located in large
    documents is case-independent. In our example, we have a knowledge base with the
    pdf manuals for the routers AR83, AR93, AR94 and BD77 stored in a vector store.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，包含问题答案的知识库位于大型文档中，是独立案例的。在我们的示例中，我们有一个包含路由器AR83、AR93、AR94和BD77的pdf手册的知识库，这些手册存储在向量存储中。
- en: An evaluation scenario definition has an orchestration. An orchestration consists
    of a series of n >= 1 steps that get in the evaluation scenario execution executed
    in sequence. Each step has inputs that it takes from any of the previous steps
    or from the input to the scenario execution. Steps can be interactions with LLMs
    (or other models), context retrieval tasks (for example, from a vector db) or
    other calls to data sources. For each step, we distinguish between the prompt
    / request and the execution parameters. The execution parameters include the model
    or method that needs to be executed and hyperparameters. The prompt / request
    is a collection of different static or dynamic data pieces that get concatenated
    (see illustration).
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 评估场景定义有一个编排。编排由一系列n >= 1个步骤组成，这些步骤按顺序执行在评估场景中。每个步骤都有从任何前一个步骤或从场景执行的输入中获取的输入。步骤可以是与LLM（或其他模型）的交互、上下文检索任务（例如，从向量数据库中）或其他对数据源的调用。对于每个步骤，我们区分提示/请求和执行参数。执行参数包括需要执行的模式或方法以及超参数。提示/请求是一系列不同的静态或动态数据片段，这些数据片段被连接起来（见插图）。
- en: In our example, we have a three-step orchestration. In step 1, we extract a
    single question from the case-specific input context (the customer’s email inquiry).
    We use this question in step 2 to create a semantic search query in our vector
    database using the cosine similarity metric. The last step takes the search results
    and formulates an email using an LLM.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的示例中，我们有一个三步编排。在第1步中，我们从特定案例的输入上下文中提取一个问题（客户的电子邮件询问）。我们使用这个问题在第2步中，在我们的向量数据库中使用余弦相似度指标创建语义搜索查询。最后一步使用LLM（大型语言模型）根据搜索结果撰写电子邮件。
- en: 'In an evaluation scenario definition, we have an expected output and an evaluation
    method. Here, we define for every scenario how we want to evaluate the actual
    outcome vs. the expected outcome. We have the following options:'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 在评估场景定义中，我们有一个预期的输出和评估方法。在这里，我们定义对于每个场景，我们如何评估实际结果与预期结果。我们有以下选项：
- en: 'Exact match/regex match: We check for the occurrence of a specific series of
    terms/concepts and give as an answer a boolean where 0 means that the defined
    terms did not appear in the output of the execution and 1 means they did appear.
    For example, the core concept of installing a router at a new location is pressing
    the reset button for 3 seconds. If the terms "reset button" and "3 seconds" are
    not part of the answer, we would evaluate it as a failure.'
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 完全匹配/正则表达式匹配：我们检查特定一系列术语/概念的出现，并给出一个布尔值作为答案，其中0表示定义的术语没有出现在执行输出中，1表示它们确实出现了。例如，在新位置安装路由器的核心概念是按重置按钮3秒钟。如果“重置按钮”和“3秒钟”这些术语不是答案的一部分，我们将评估为失败。
- en: 'Semantic match: We check if the text is semantically close to what our expected
    answer is. Therefore, we use an LLM and task it to judge with a rational number
    between 0 and 1 how well the answer matches the expected answer.'
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 语义匹配：我们检查文本是否与我们期望的答案在语义上接近。因此，我们使用一个LLM并分配任务，用0到1之间的一个有理数来判断答案与期望答案匹配的程度。
- en: 'Manual match: Humans evaluate the output on a scale between 0 and 1.'
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 手动匹配：人类在0到1的范围内对输出进行评估。
- en: An **evaluation scenario should be executed many times because LLMs are non-deterministic
    models**. We want to have a reasonable number of executions so we can aggregate
    the scores and have a **statistically significant** output.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: '**评估场景应该执行多次，因为LLMs是非确定性模型**。我们希望有足够多的执行次数，以便我们可以汇总分数并得到一个**具有统计学意义**的输出。'
- en: The benefit of using such scenarios is that we can use them while building and
    debugging our orchestrations. When we see that we have in 80 out of 100 executions
    of the same prompt a score of less than 0,3, we use this input to tweak or prompts
    or to add other data to our fine-tuning before orchestration.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 使用此类场景的好处是，我们可以在构建和调试我们的编排时使用它们。当我们看到在100次相同的提示执行中，有80次得分为0.3以下时，我们使用这个输入来调整提示或添加其他数据到我们的微调中，在编排之前。
- en: 2.5\. Feedback Collection and Adjustment in Production
  id: totrans-91
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2.5. 生产中的反馈收集和调整
- en: The principle for collecting feedback in production is analogous to the scenario
    approach. We map each user interaction to a scenario. If the user has larger degrees
    of freedom of interaction, we might need to create new scenarios that we did not
    anticipate during the building phase.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 在生产中收集反馈的原则类似于场景方法。我们将每个用户交互映射到一个场景。如果用户有更大的交互自由度，我们可能需要创建在构建阶段没有预料到的新的场景。
- en: The user gets a slider between 0 and 1, where they can indicate how satisfied
    they were with the output of a result. From a user experience perspective, this
    number can also be simplified into different media, for example, a laughing, neutral
    and sad smiley. Thus, this evaluation is the manual match method that we introduced
    before.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 用户获得一个介于0和1之间的滑块，他们可以通过它来表示对结果输出的满意度。从用户体验的角度来看，这个数字也可以简化为不同的媒体，例如，一个笑的、中性的和悲伤的表情符号。因此，这种评估是我们之前介绍的手动匹配方法。
- en: In production, we have to create the same aggregations and metrics as before,
    just with live users and a potentially larger amount of data.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 在生产中，我们必须创建与之前相同的聚合和指标，只是使用实时用户和可能更大的数据量。
- en: 3\. Example Implementation as Part of entAIngine Test Bed
  id: totrans-95
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3. 作为entAIngine测试平台一部分的示例实现
- en: Together with the [entAIngine](http://www.entaingine.com) team, we have implemented
    the functionality on the platform. This section is to show you how things could
    be done and to give you inspiration. Or if you want to use what we have implemented
    , feel free to.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 与[entAIngine](http://www.entaingine.com)团队一起，我们在平台上实现了该功能。本节旨在向您展示如何完成这些操作，并为您提供灵感。或者，如果您想使用我们所实现的功能，请随意使用。
- en: We map our concepts for evaluation scenarios and evaluation scenario definitions
    and map them to classic concepts of software testing. The start point for any
    interaction to create a new test is via the entAIngine application dashboard.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将我们的评估场景和评估场景定义的概念映射到软件测试的经典概念。创建新测试的任何交互的起点都是通过entAIngine应用程序仪表板。
- en: '![entAIngine dashboard © Marcel Müller](../Images/defff80e304223ebb50b55bf34c9e673.png)'
  id: totrans-98
  prefs: []
  type: TYPE_IMG
  zh: '![entAIngine仪表板 © Marcel Müller](../Images/defff80e304223ebb50b55bf34c9e673.png)'
- en: entAIngine dashboard © Marcel Müller
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: entAIngine仪表板 © Marcel Müller
- en: In entAIngine, users can create many different applications. Each of the applications
    is a set of processes that define workflows in a no-code interface. Processes
    consist of input templates (variables), RAG components, calls to LLMs, TTS, Image
    and Audio modules, integration to documents and OCR. With these components, we
    build reusable processes that can be integrated via an API, used as chat flows,
    used in a text editor as a dynamic text-generating block, or in a knowledge management
    search interface that shows the sources of answers. This functionality is, at
    the moment, already completely implemented in the entAIngine platform and can
    be used as SaaS or is 100% deployed on-premise. It integrates to existing gateways,
    data sources and models via API. We will use the process template generator to
    evaluation scenario definitions.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 在entAIngine中，用户可以创建许多不同的应用程序。每个应用程序是一组定义无代码界面的工作流程的流程。流程由输入模板（变量）、RAG组件、对LLMs、TTS、图像和音频模块的调用、与文档和OCR的集成组成。使用这些组件，我们构建可重用的流程，可以通过API集成，用作聊天流程，用作文本编辑器中的动态文本生成块，或在显示答案来源的知识管理搜索界面中使用。目前，这一功能已经在entAIngine平台上完全实现，可以作为SaaS使用，或者100%部署在本地。它通过API与现有的网关、数据源和模型集成。我们将使用流程模板生成器来评估场景定义。
- en: When the user wants to create a new test, they go to "test bed" and "tests".
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 当用户想要创建一个新的测试时，他们前往“测试床”和“测试”。
- en: '![](../Images/c3202a7c33372e8e9886ea1717e2dbb8.png)'
  id: totrans-102
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c3202a7c33372e8e9886ea1717e2dbb8.png)'
- en: On the tests screen, the user can create new evaluation scenarios or edit existing
    ones. When creating a new evaluation scenario, the orchestration (an entAIngine
    process template) and a set of metrics must be defined. We assume we have a customer
    support scenario where we need to retrieve data with RAG to answer a question
    in the first step and then formulate an answer email in the second step. Then,
    we use the new module to name the test, define / select a process template and
    pick and evaluator that will create a score for every individual test case.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 在测试屏幕上，用户可以创建新的评估场景或编辑现有的场景。在创建新的评估场景时，必须定义编排（entAIngine流程模板）和一组指标。我们假设我们有一个需要使用RAG检索数据以回答问题的第一步的客户支持场景，然后在第二步中制定答案电子邮件。然后，我们使用新模块来命名测试，定义/选择一个流程模板，并选择一个评估者，该评估者将为每个单独的测试案例创建分数。
- en: '![Test definition © Marcel Müller, 2025](../Images/e66b842e6d806b7740288c42a2d547cd.png)'
  id: totrans-104
  prefs: []
  type: TYPE_IMG
  zh: '![测试定义 © Marcel Müller, 2025](../Images/e66b842e6d806b7740288c42a2d547cd.png)'
- en: Test definition © Marcel Müller, 2025
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 测试定义 © Marcel Müller, 2025
- en: '![Test case (process template) definition © Marcel Müller, 2025](../Images/74e3a234bbd15d1518eef253d4b2ee8f.png)'
  id: totrans-106
  prefs: []
  type: TYPE_IMG
  zh: '![测试案例（流程模板）定义 © Marcel Müller, 2025](../Images/74e3a234bbd15d1518eef253d4b2ee8f.png)'
- en: Test case (process template) definition © Marcel Müller, 2025
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 测试案例（流程模板）定义 © Marcel Müller, 2025
- en: 'The Metrics are as defined above: Regex match, semantic match and manual match.
    The screen with the process definition is already existing and functional, together
    with the orchestration. The functionality to define tests in bull as seen below
    is new.'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 指标定义如上所述：正则表达式匹配、语义匹配和人工匹配。包含流程定义的屏幕已经存在并且功能正常，包括编排。如下所示，在bull中定义测试的功能是新的。
- en: '![Test and test cases © Marcel Müller, 2025](../Images/5c9862d5e196cade2d80ec376609bd79.png)'
  id: totrans-109
  prefs: []
  type: TYPE_IMG
  zh: '![测试和测试案例 © Marcel Müller, 2025](../Images/5c9862d5e196cade2d80ec376609bd79.png)'
- en: Test and test cases © Marcel Müller, 2025
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 测试和测试案例 © Marcel Müller, 2025
- en: In the test editor, we work on an evaluation scenario definition ("evaluate
    how good our customer support answering RAG is") and we define in this scenario
    different test cases. A test case assigns data values to the variables in the
    test. We can try 50 or 100 different instances of test cases and evaluate and
    aggregate them. For example, if we evaluate our customer support answering, we
    can define 100 different customer support requests, define our expected outcome
    and then execute them and analyze how good the answers were. Once we designed
    a set of test cases, we can execute their scenarios with the right variables using
    the existing orchestration engine and evaluate them.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 在测试编辑器中，我们工作在评估场景定义（“评估我们的客户支持回答RAG的好坏”）上，并在该场景中定义不同的测试案例。测试案例将数据值分配给测试中的变量。我们可以尝试50或100个不同的测试案例实例，并对它们进行评估和汇总。例如，如果我们评估我们的客户支持回答，我们可以定义100个不同的客户支持请求，定义我们期望的结果，然后执行它们并分析答案的好坏。一旦我们设计了一套测试案例，我们可以使用现有的编排引擎和正确的变量执行它们的场景，并对它们进行评估。
- en: '![Metrics and evaluation © Marcel Müller, 2025](../Images/20c5a0e5f13b163c7e128aa2f97d4dfe.png)'
  id: totrans-112
  prefs: []
  type: TYPE_IMG
  zh: '![指标和评估 © Marcel Müller, 2025](../Images/20c5a0e5f13b163c7e128aa2f97d4dfe.png)'
- en: Metrics and evaluation © Marcel Müller, 2025
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 指标和评估 © Marcel Müller, 2025
- en: This testing is happening during the building phase. We have an additional screen
    that we use to evaluate real user feedback in the productive phase. The contents
    are collected from real user feedback (through our engine and API).
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 这种测试发生在构建阶段。我们有一个额外的屏幕，用于在生产阶段评估真实用户反馈。内容是从真实用户反馈（通过我们的引擎和API）收集的。
- en: '![](../Images/5c94926c36f632f404e1c506537ff9b0.png)'
  id: totrans-115
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/5c94926c36f632f404e1c506537ff9b0.png)'
- en: The metrics that we have available in the live feedback section are collected
    from a user through a star rating.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在实时反馈部分可用的指标是通过用户星级评分收集的。
- en: 'Conclusion: Testing and Quality'
  id: totrans-117
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论：测试和质量
- en: In this article, we have looked into advanced testing and quality engineering
    concepts for generative AI applications, especially those that are more complex
    than simple chat bots. The introduced PEEL framework is a new approach for scenario-based
    test that is closer to the implementation level than the generic benchmarks with
    which we test models. For good applications, it is important to not only test
    the model in isolation, but in orchestration.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我们探讨了生成式人工智能应用的先进测试和质量工程概念，特别是那些比简单的聊天机器人更复杂的。所介绍的 PEEL 框架是一种基于场景测试的新方法，它比我们测试模型的通用基准更接近实现层面。对于优秀应用来说，不仅要在隔离状态下测试模型，还要在协同中测试。
- en: '* * *'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Get in touch with me
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 联系我
- en: I am working in my day-real-world applications with generative AI, especially
    in the enterprise. If you want to connect, feel free to add me or send a message
    on [LinkedIn](https://www.linkedin.com/in/the-real-marcel-mueller/).
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 我正在我的日常现实世界应用中使用生成式人工智能，尤其是在企业领域。如果您想建立联系，请随意添加我或在 [LinkedIn](https://www.linkedin.com/in/the-real-marcel-mueller/)
    上发消息。
