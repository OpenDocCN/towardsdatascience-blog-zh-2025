- en: '[PRE25]'
  id: totrans-208
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: I really like how the agent is encouraged to reiterate on the initial task and
    stay focused on the main problem. Regular reflection like this is helpful in real
    life as well, as teams often get bogged down in the process and lose sight of
    the why behind what they’re doing. It’s pretty cool to see managerial best practices
    being integrated into agentic frameworks.
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 我真的很喜欢代理被鼓励重复初始任务并专注于主要问题。这种定期的反思在现实生活中也很有帮助，因为团队往往会在过程中陷入困境，失去对所做事情背后的原因的认识。看到管理最佳实践被整合到代理框架中，这真的很酷。
- en: That’s it! We’ve built a code agent capable of analysing KPI changes for simple
    metrics and explored all the key nuances of the process.
  id: totrans-210
  prefs: []
  type: TYPE_NORMAL
  zh: 那就是全部了！我们已经构建了一个能够分析简单指标KPI变化的代码代理，并探索了整个过程的全部关键细微差别。
- en: '*You can find the complete code and execution logs on [GitHub](https://github.com/miptgirl/miptgirl_medium/blob/main/growth_narrative_llm_agent/code_agents_mvp.ipynb).*'
  id: totrans-211
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*您可以在[GitHub](https://github.com/miptgirl/miptgirl_medium/blob/main/growth_narrative_llm_agent/code_agents_mvp.ipynb)上找到完整的代码和执行日志。*'
- en: Summary
  id: totrans-212
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: 'We’ve experimented a lot with code agents and are now ready to draw conclusions.
    For our experiments, we used the HuggingFace smolagents framework for code agents — a
    very handy toolset that offers:'
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 我们在代码代理上进行了大量实验，现在准备得出结论。对于我们的实验，我们使用了HuggingFace的smolagents框架，这是一个非常实用的工具集，它提供了：
- en: easy integration with different LLMs (from local models via Ollama to public
    providers like Anthropic or OpenAI),
  id: totrans-214
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与不同的LLM（从本地模型通过Ollama到公共提供商如Anthropic或OpenAI）轻松集成，
- en: outstanding logging that makes it easy to understand the whole thought process
    of the agent and debug issues,
  id: totrans-215
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 优秀的日志记录，使得理解代理整个思维过程和调试问题变得容易，
- en: ability to build complex systems leveraging multi-AI agent setups or planning
    features without much effort.
  id: totrans-216
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 能够通过多AI代理设置或规划功能轻松构建复杂系统。
- en: 'While smolagents is currently my favourite agentic framework, it has its limitations:'
  id: totrans-217
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然smolagents目前是我最喜欢的代理框架，但它有其局限性：
- en: It can lack flexibility at times. For example, I had to modify the prompt directly
    in the source code to get the behaviour I wanted.
  id: totrans-218
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它有时可能缺乏灵活性。例如，我不得不直接在源代码中修改提示来获得我想要的行为了。
- en: It only supports hierarchical multi-agent set-up (where one manager can delegate
    tasks to other agents), but doesn’t cover sequential workflow or consensual decision-making
    processes.
  id: totrans-219
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它仅支持分层多代理设置（其中一位管理者可以将任务委派给其他代理），但不涵盖顺序工作流程或共识决策过程。
- en: There’s no support for long-term memory out of the box, meaning you’re starting
    from scratch with every task.
  id: totrans-220
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 默认情况下没有长期记忆支持，这意味着你每次任务都是从零开始的。
- en: '*Thank you a lot for reading this article. I hope this article was insightful
    for you.*'
  id: totrans-221
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*非常感谢您阅读这篇文章。我希望这篇文章对您有所启发。*'
