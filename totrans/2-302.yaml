- en: 'From Data to Stories: Code Agents for KPI Narratives'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/from-data-to-stories-code-agents-for-kpi-narratives/](https://towardsdatascience.com/from-data-to-stories-code-agents-for-kpi-narratives/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '<mdspan datatext="el1748498929819" class="mdspan-comment">As product analysts</mdspan>,
    we often need to investigate what’s going on with KPIs: whether we’re reacting
    to anomalies on our dashboards or just routinely doing a numbers update. Based
    on my years of experience as a KPI analyst, I would estimate that more than 80%
    of these tasks are fairly standard and can be solved just by following a simple
    checklist.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s a high-level plan for investigating a KPI change (*you can find more
    details in the article* [*“Anomaly Root Cause Analysis 101”*](https://towardsdatascience.com/anomaly-root-cause-analysis-101-98f63dd12016/)):'
  prefs: []
  type: TYPE_NORMAL
- en: '**Estimate the top-line change in the metric** to understand the magnitude
    of the shift.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Check data quality** to ensure that the numbers are accurate and reliable.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Gather context** about internal and external events that might have influenced
    the change.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Slice and dice the metric** to identify which segments are contributing to
    the metric’s shift.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Consolidate your findings in an executive summary** that includes hypotheses
    and estimates of their impacts on the main KPI.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Since we have a clear plan to execute, such tasks can potentially be automated
    using AI agents. The code agents we recently [discussed](https://towardsdatascience.com/code-agents-the-future-of-agentic-ai/)
    could be a good fit there, as their ability to write and execute code will help
    them to analyse data efficiently, with minimal back-and-forth. So, let’s try building
    such an agent using the HuggingFace smolagents framework.
  prefs: []
  type: TYPE_NORMAL
- en: 'While working on our task, we will discuss more advanced features of the smolagents
    framework:'
  prefs: []
  type: TYPE_NORMAL
- en: Techniques for tweaking all kinds of prompts to ensure the desired behaviour.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Building a multi-agent system that can explain the KPI changes and link them
    to root causes.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Adding reflection to the flow with supplementary planning steps.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: MVP for explaining KPI changes
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As usual, we will take an iterative approach and start with a simple MVP, focusing
    on the slicing and dicing step of the analysis. We will analyse the changes of
    a simple metric (revenue) split by one dimension (country). We will use the dataset
    from my previous article, [“Making sense of KPI changes”](https://towardsdatascience.com/making-sense-of-kpi-changes/).
  prefs: []
  type: TYPE_NORMAL
- en: Let’s load the data first.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/8851022c4f429c00e6a5b745a094bf76.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: Next, let’s initialise the model. I’ve chosen the OpenAI GPT-4o-mini as my preferred
    option for simple tasks. However, the smolagents framework [supports](https://huggingface.co/docs/smolagents/guided_tour)
    all kinds of models, so you can use the model you prefer. Then, we just need to
    create an agent and give it the task and the dataset.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: The agent returned quite a plausible result. We got detailed statistics on the
    metric changes in each segment and their impact on the top-line KPI.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: Let’s take a look at the code generated by the agent. It is fine, but there’s
    one potential issue. The LLM recreated the dataframe based on the input data instead
    of referencing it directly. This approach is not ideal (especially when working
    with massive datasets), as it can lead to errors and higher token usage.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: It’s worth fixing this problem before moving on to building a more complex system.
  prefs: []
  type: TYPE_NORMAL
- en: Tweaking prompts
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Since the LLM is just following the instructions given to it, we will address
    this issue by tweaking the prompt.
  prefs: []
  type: TYPE_NORMAL
- en: Initially, I attempted to make the task prompt more explicit, clearly instructing
    the LLM to use the provided variable.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: It didn’t work. So, the next step is to examine the system prompt and see why
    it works this way.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]py'' sequence ending with ''[PRE6]'
  prefs: []
  type: TYPE_NORMAL
- en: At the end of the prompt, we have the instruction `"# 2\. Use only variables
    that you have defined!"`. This might be interpreted as a strict rule not to use
    any other variables. So, I changed it to `"# 2\. Use only variables that you have
    defined or ones provided in additional arguments! Never try to copy and parse
    additional arguments."`
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: This change alone didn’t help either. Then, I examined the task message.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: It has an instruction related the the usage of additional arguments `"You have
    been provided with these additional arguments, that you can access using the keys
    as variables in your python code"`. We can try to make it more specific and clear.
    Unfortunately, this parameter is not exposed externally, so I had to locate it
    in [the source code](https://github.com/huggingface/smolagents/blob/24df5adec79ab2e7d19db298a6f794825ae2e701/src/smolagents/agents.py#L326).
    To find the path of a Python package, we can use the following code.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: Then, I found the `agents.py` file and modified this line to include a more
    specific instruction.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: It was a bit of hacking, but that is sometimes what happens with the LLM frameworks.
    Don’t forget to reload the package afterwards, and we’re good to go. Let’s test
    whether it works now.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: Hooray! The problem has been fixed. The agent no longer copies the input variables
    and references `df` variable directly instead. Here’s the newly generated code.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: Now, we’re ready to move on to building the actual agent that will solve our
    task.
  prefs: []
  type: TYPE_NORMAL
- en: AI agent for KPI narratives
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Finally, it’s time to work on the AI agent that will help us explain KPI changes
    and create an executive summary.
  prefs: []
  type: TYPE_NORMAL
- en: 'Our agent will follow this plan for the root cause analysis:'
  prefs: []
  type: TYPE_NORMAL
- en: Estimate the top-line KPI change.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Slice and dice the metric to understand which segments are driving the shift.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Look up events in the change log to see whether they can explain the metric
    changes.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Consolidate all the findings in the comprehensive executive summary.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'After a lot of experimentation and several tweaks, I’ve arrived at a promising
    result. Here are the key adjustments I made (we will discuss them in detail later):'
  prefs: []
  type: TYPE_NORMAL
- en: I leveraged **the multi-agent setup** by adding another team member — the change
    log Agent, who can access the change log and assist in explaining KPI changes.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'I experimented with **more powerful models** like `gpt-4o` and `gpt-4.1-mini`
    since `gpt-4o-mini` wasn’t sufficient. Using stronger models not only improved
    the results, but also significantly reduced the number of steps: with `gpt-4.1-mini`I
    got the final result after just six steps, compared to 14–16 steps with `gpt-4o-mini`.
    This suggests that investing in more expensive models might be worthwhile for
    agentic workflows.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I provided the agent with **the complex tool** to analyse KPI changes for simple
    metrics. The tool performs all the calculations, while LLM can just interpret
    the results. I discussed the approach to KPI changes analysis in detail in [my
    previous article](https://towardsdatascience.com/making-sense-of-kpi-changes/).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I reformulated the prompt into a very **clear step-by-step guide** to help the
    agent stay on track.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I added **planning steps** that encourage the LLM agent to think through its
    approach first and revisit the plan every three iterations.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: After all the adjustments, I got the following summary from the agent, which
    is pretty good.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: The LLM agent also generated a bunch of illustrative charts (they were part
    of our growth explaining tool). For example, this one shows the impacts across
    the combination of country and maturity.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/16366c5047468765439c601452c80969.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: The results look really exciting. Now let’s dive deeper into the actual implementation
    to understand how it works under the hood.
  prefs: []
  type: TYPE_NORMAL
- en: Multi-AI agent setup
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We will start with our change log agent. This agent will query the change log
    and try to identify potential root causes for the metric changes we observe. Since
    this agent doesn’t need to do complex operations, we implement it as a ToolCallingAgent.
    Because this agent will be called by another agent, we need to define its `name`
    and `description` attributes.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: Since the manager agent will be calling this agent, we won’t have any control
    over the query it receives. Therefore, I decided to modify the system prompt to
    include additional context.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: To enable the primary agent to delegate tasks to the change log agent, we simply
    need to specify it in the `managed_agents` field.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: Let’s see how it works. First, we can look at the new system prompt for the
    primary agent. It now includes information about team members and instructions
    on how to ask them for help.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]python'
  prefs: []
  type: TYPE_NORMAL
- en: 'def change_log_agent("Your query goes here.") -> str:'
  prefs: []
  type: TYPE_NORMAL
- en: '"""Helps you find the relevant information in the change log that'
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: can explain changes on metrics. Provide the agent with all the context
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: to receive info"""
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: The execution log shows that the primary agent successfully delegated the task
    to the second agent and received the following response.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE19]'
  prefs: []
  type: TYPE_PRE
- en: Using the smolagents framework, we can easily set up a simple multi-agent system,
    where a manager agent coordinates and delegates tasks to team members with specific
    skills.
  prefs: []
  type: TYPE_NORMAL
- en: Iterating on the prompt
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We’ve started with a very high-level prompt outlining the goal and a vague direction,
    but unfortunately, it didn’t work consistently. LLMs are not smart enough yet
    to figure out the approach on their own. So, I created a detailed step-by-step
    prompt describing the whole plan and including the detailed specifications of
    the growth narrative tool we’re using.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE20]'
  prefs: []
  type: TYPE_PRE
- en: Explaining everything in such detail was quite a daunting task, but it’s necessary
    if we want consistent results.
  prefs: []
  type: TYPE_NORMAL
- en: Planning steps
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The smolagents framework lets you add planning steps to your agentic flow. This
    encourages the agent to start with a plan and update it after the specified number
    of steps. From my experience, this reflection is very helpful for maintaining
    focus on the problem and adjusting actions to stay aligned with the initial plan
    and goal. I definitely recommend using it in cases when complex reasoning is required.
  prefs: []
  type: TYPE_NORMAL
- en: Setting it up is as easy as specifying `planning_interval = 3` for the code
    agent.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE21]'
  prefs: []
  type: TYPE_PRE
- en: That’s it. Then, the agent provides reflections starting with thinking about
    the initial plan.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE22]'
  prefs: []
  type: TYPE_PRE
- en: 1\. Facts survey
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 1.1\. Facts given in the task
