  prefs: []
  type: TYPE_NORMAL
  zh: '[PRE17]python'
- en: 'def change_log_agent("Your query goes here.") -> str:'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 'def change_log_agent("您的查询内容在这里。") -> str:'
- en: '"""Helps you find the relevant information in the change log that'
  id: totrans-75
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"""帮助你找到变更日志中的相关信息'
- en: can explain changes on metrics. Provide the agent with all the context
  id: totrans-76
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 可以解释指标的变化。为智能体提供所有上下文
- en: to receive info"""
  id: totrans-77
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 以接收信息"""
- en: '[PRE18]'
  id: totrans-78
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: The execution log shows that the primary agent successfully delegated the task
    to the second agent and received the following response.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 执行日志显示主要代理成功将任务委派给第二代理，并收到了以下响应。
- en: '[PRE19]'
  id: totrans-80
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: Using the smolagents framework, we can easily set up a simple multi-agent system,
    where a manager agent coordinates and delegates tasks to team members with specific
    skills.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 使用smolagents框架，我们可以轻松设置一个简单的多代理系统，其中管理代理协调并将任务委派给具有特定技能的团队成员。
- en: Iterating on the prompt
  id: totrans-82
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在提示上进行迭代
- en: We’ve started with a very high-level prompt outlining the goal and a vague direction,
    but unfortunately, it didn’t work consistently. LLMs are not smart enough yet
    to figure out the approach on their own. So, I created a detailed step-by-step
    prompt describing the whole plan and including the detailed specifications of
    the growth narrative tool we’re using.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 我们从一个非常高级的提示开始，概述了目标和模糊的方向，但不幸的是，它并不总是有效。LLMs目前还不够聪明，可以自己找出方法。因此，我创建了一个详细的分步提示，描述了整个计划，并包括我们使用的增长叙事工具的详细规格。
- en: '[PRE20]'
  id: totrans-84
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: Explaining everything in such detail was quite a daunting task, but it’s necessary
    if we want consistent results.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 以如此详细的程度解释一切是一项相当艰巨的任务，但如果我们想要一致的结果，这是必要的。
- en: Planning steps
  id: totrans-86
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 规划步骤
- en: The smolagents framework lets you add planning steps to your agentic flow. This
    encourages the agent to start with a plan and update it after the specified number
    of steps. From my experience, this reflection is very helpful for maintaining
    focus on the problem and adjusting actions to stay aligned with the initial plan
    and goal. I definitely recommend using it in cases when complex reasoning is required.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: smolagents框架允许您向您的代理流程添加规划步骤。这鼓励代理从计划开始，并在指定步骤数之后更新它。根据我的经验，这种反思对于保持对问题的关注并调整行动以保持与初始计划和目标一致非常有帮助。我确实推荐在需要复杂推理的情况下使用它。
- en: Setting it up is as easy as specifying `planning_interval = 3` for the code
    agent.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 为代码代理指定 `planning_interval = 3` 设置它就像易事。
- en: '[PRE21]'
  id: totrans-89
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: That’s it. Then, the agent provides reflections starting with thinking about
    the initial plan.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 那就是全部了。然后，代理提供了从考虑初始计划开始的反思。
