- en: Heatmaps for Time Series
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/heatmaps-for-time-series/](https://towardsdatascience.com/heatmaps-for-time-series/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: In 2015, the *Wall Street Journal (WSJ)* published a highly effective series
    of heatmaps illustrating the impact of vaccines on infectious diseases in the
    United States. These visualizations showcased the power of blanket policies to
    drive widespread change. You can view the heatmaps [here](https://graphics.wsj.com/infectious-diseases-and-vaccines/).
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: Heatmaps are a versatile tool for data analysis. Their ability to facilitate
    comparative analysis, highlight temporal trends, and enable pattern recognition
    makes them invaluable for communicating complex information.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: In this *Quick Success Data Science* project, we’ll use Python’s Matplotlib
    graphing library to recreate the *WSJ’s* measles chart, demonstrating how to leverage
    heatmaps and carefully designed colorbars to influence data storytelling.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: The data
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The disease data comes from the University of Pittsburgh’s [Project Tycho](https://www.tycho.pitt.edu/).
    This organization works with national and global health institutes and researchers
    to make data easier to use to improve global health. The measles data is available
    under a Creative Commons Attribution 4.0 International Public [License](https://www.tycho.pitt.edu/accounts/register/).
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: For convenience, I’ve downloaded the data from Project Tycho’s [data portal](https://www.tycho.pitt.edu/search/)
    to a CSV file and stored it in this [Gist](https://gist.github.com/rlvaugh/fd6ce822c98e38849d3ec51e3fd3441d).
    Later, we’ll access it programmatically through the code.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: The measles heatmap
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We’ll use the Matplotlib pcolormesh() function to construct a close facsimile
    of the [WSJ measles heatmap](https://graphics.wsj.com/infectious-diseases-and-vaccines/).
    While other libraries, such as [Seaborn](https://seaborn.pydata.org/generated/seaborn.heatmap.html),
    [Plotly Express](https://plotly.com/python/2D-Histogram/), and [hvplot](https://hvplot.holoviz.org/reference/tabular/heatmap.html),
    include dedicated heatmap functions, these are built for *ease of use*, with most
    of the design decisions abstracted away. This makes it difficult to force their
    results to match the *WSJ* heatmap.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
- en: Besides `pcolormesh()`, Matplotlib’s `imshow()` function (for “image show”)
    can also produce heatmaps. The `pcolormesh` function, however, better aligns gridlines
    with cell edges.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: Here’s an example of a heatmap made with `imshow()` that you compare to the
    `pcolormesh()` results later. The main difference is the lack of gridlines.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/feca241f9bde7b82bc926f31177c4a25.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
- en: Measles incidence heatmap built with Matplotlib’s `imshow()`function (by the
    author)
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: In 1963, the measles vaccine was licensed and released across America with widespread
    uptake. Within five years, the incidence of the disease was greatly reduced. By
    2000, measles had been considered eradicated in the United States, with any new
    cases arriving from outside the country. Notice how well the visualization conveys
    this “big picture” while preserving the state-level details. This is due in no
    small part to the choice of colorbar.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: The colors used in the visualization are *biased*. More than 80% of the colorbar
    is composed of warm colors, and (light) blue is reserved for the smallest values.
    This makes it easy to demarcate the pre- and post-vaccination periods. White cells
    denote *missing data*, represented by NaN (Not a Number) values.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: 'Compare the previous heatmap to one built with a more balanced colorbar:'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: '![Heatmap](../Images/51b294268722aaf84ecad64e66f9e633.png)'
  id: totrans-17
  prefs: []
  type: TYPE_IMG
- en: The heatmap using a more balanced colorbar (by the author)
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: The darker blue color not only overpowers the plot, it’s hard on the eyes. And
    while it’s still possible to see the effect of the vaccine, the visual impact
    is far more subtle than in the plot with the biased colorbar. Alternately, it’s
    easier to parse higher values but at the expense of the overall theme.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: The code
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The following code was written in JupyterLab and is presented by cell.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: Importing libraries
  id: totrans-22
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The first cell imports the libraries we’ll need to complete the project. An
    online search for the library names will lead you to the installation instructions.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  id: totrans-24
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Creating the custom colormap
  id: totrans-25
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The following code closely reproduces the colormap used by the *WSJ*. I used
    the online [*Image Color Picker*](https://www.imgcolorpicker.com/) tool to identify
    the key colors from a screenshot of their measles heatmap and adjusted these based
    on colors chosen for a [similar tutorial](https://www.mikelee.co/posts/2017-06-28-wsj-measles-vaccination-chart)
    built for R.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  id: totrans-27
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'Here’s the generic colorbar produced by the code:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ef6b66f7e34ec67333706110d32362ea.png)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
- en: The colorbar based on the *WSJ* measles heatmap (by author)
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
- en: This code makes a *continuous* colormap using Matplotlib’s `LinearSegmentedColormap()`
    class. This class specifies colormaps using *anchor points* between which RGB(A)
    values are interpolated. That is, it generates colormap objects based on lookup
    tables using linear segments. It creates the lookup table using linear interpolation
    for each primary color, with the 0–1 domain divided into any number of segments.
    For more details, see this [short tutorial](https://towardsdatascience.com/customize-colormaps-with-matplotlib-df5b37d14662/)
    on making custom colormaps with Matplotlib.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
- en: Loading and prepping the disease data
  id: totrans-32
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Next, we load the CSV file into pandas and prep it for plotting. This file contains
    the *incidence of measles* (as the number of cases per 100,000 people) for each
    state (and the District of Columbia) *by week* from 1928 to 2003\. We’ll need
    to convert the values to a numeric data type, aggregate the data by year, and
    reshape the DataFrame for plotting.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  id: totrans-34
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'Here’s how the initial (raw) DataFrame looks, showing the first five rows and
    ten columns:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/74163da8d7c182339d32d3b6d828fb77.png)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
- en: Part of the head of the `df_raw` DataFrame (by author)
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
- en: '`NaN` values are represented by a dash (-).'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
- en: 'The final `df_pivot` DataFrame is in *wide format*, where each column represents
    a variable, and rows represent unique entities:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/9a128402873676f43eb7e7fd49511ccc.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
- en: Part of the head of the `dv_pivot` DataFrame (by author)
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
- en: While plotting is generally performed using [*long format*](https://www.statology.org/long-vs-wide-data/)
    data, as in the `df_raw` DataFrame, `pcolormesh()` prefers wide format when making
    heatmaps. This is because heatmaps are inherently designed to display a 2D matrix-like
    structure, where rows and columns represent distinct categories. In this case,
    the final plot will look much like the DataFrame, with states along the y-axis
    and years along the x-axis. Each cell of the heatmap will be colored based on
    the numerical values.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
- en: Handling missing values
  id: totrans-43
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The dataset contains a lot of missing values. We’ll want to distinguish these
    from 0 values in the heatmap by making a *mask* to identify and store these `NaN`
    values. Before applying this mask with NumPy, we’ll use Matplotlib’s `Normalize()`
    class to [*normalize*](https://en.wikipedia.org/wiki/Normalization_(statistics))the
    data. This way, we can directly compare the heatmap colors across states.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  id: totrans-45
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Plotting the heatmap
  id: totrans-46
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The following code creates the heatmap. The heart of it consists of the single
    line calling the `pcolormesh()` function. Most of the rest embellishes the plot
    so that it looks like the *WSJ* heatmap (with the exception of the x, y, and colorbar
    labels, which are greatly improved in our version).
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  id: totrans-48
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'Here’s the result:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/8e505c3124422ff5182ec89ea0c639f8.png)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
- en: Measles incidence heatmap built with Matplotlib’s `pcolormesh()` function (by
    the author)
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
- en: This is a close approximation of the [*WSJ* heatmap](https://graphics.wsj.com/infectious-diseases-and-vaccines/),
    with what I consider more legible labels and better separation of 0 and `NaN`
    (missing data) values.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
- en: Uses for heatmaps
  id: totrans-53
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Heatmaps are highly effective at demonstrating how a blanket policy or action
    impacts multiple geographic regions over time. Thanks to their versatility, they
    can be adapted for other purposes, such as tracking:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
- en: Air quality index levels in different cities before and after the [*Clean Air
    Act*](https://en.wikipedia.org/wiki/Clean_Air_Act_(United_States))
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Change in test scores for schools or districts after policies like [*No Child
    Left Behind*](https://en.wikipedia.org/wiki/No_Child_Left_Behind_Act)
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在实施如[*《不让一个孩子掉队法案》*](https://en.wikipedia.org/wiki/No_Child_Left_Behind_Act)等政策后，学校或地区的考试成绩变化
- en: Unemployment rates for different regions after economic stimulus packages
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 经济刺激计划后不同地区的失业率
- en: Product sales performance by region after local or nationwide ad campaigns
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 地方或全国性广告活动后按地区销售的产品表现
- en: 'Among the advantages of heatmaps is that they promote multiple analysis techniques.
    These include:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 在热图的优势中，它们促进了多种分析技术。这些包括：
- en: '**Comparative Analysis:** easily compare trends across different categories
    ( states, schools, regions, etc.).'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: '**比较分析：** 轻松比较不同类别（如州、学校、地区等）之间的趋势。'
- en: '**Temporal Trends:** elegantly show how values change over time.'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: '**时间趋势：** 精致地展示值随时间的变化。'
- en: '**Pattern Recognition:** identify patterns and anomalies in the data at a glance.'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: '**模式识别：** 一眼就能识别数据中的模式和异常。'
- en: '**Communication:** Provide a clear and concise way to communicate complex data.'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: '**沟通：** 提供一种清晰简洁的方式来传达复杂的数据。'
- en: Heatmaps are a great way to present a big-picture overview while preserving
    the data’s fine-scale granularity.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 热图是一种很好的方式来展示整体概览，同时保留数据的精细粒度。
