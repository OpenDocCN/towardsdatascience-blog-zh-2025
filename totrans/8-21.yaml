- en: Summary
  id: totrans-79
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 摘要
- en: Hopefully, you’ll take away two things from this article. The first is that
    vectorisation is an essential ingredient for performant Pandas code when dealing
    with medium to large data sets. The second is that even if the operations you
    need to apply to dataframe records are complex, they can still often be vectorised.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 希望你能从这个文章中带走两点。第一点是，当处理中等或大型数据集时，向量化是高效Pandas代码的必要组成部分。第二点是，即使你需要应用到dataframe记录上的操作很复杂，它们仍然经常可以被向量化。
- en: I explained why vectorisation in Pandas is essential for performant code and
    I showed serveral examples of how we can use vectorisation even in complex data
    processing scenarios
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 我解释了为什么在Pandas中进行向量化对于编写高效代码至关重要，并展示了我们如何在复杂的数据处理场景中使用向化的几个示例。
