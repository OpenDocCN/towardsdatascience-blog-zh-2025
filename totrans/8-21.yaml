  zh: 您的 URL 将与我的不同，但它应该看起来像这样：-
- en: '[PRE4]'
  id: totrans-37
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: The code
  id: totrans-38
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 代码
- en: To begin, let’s read our data set into a Pandas dataframe. We’ll time everything
    to get an idea of any speed-ups we gain.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们将数据集读入 Pandas 数据框中。我们将计时以了解我们获得的任何速度提升。
- en: '[PRE5]'
  id: totrans-40
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Example 1 – Setting the scene
  id: totrans-41
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例 1 – 设置场景
- en: So, many operations you do on a Pandas dataframe are inherently vectorised.
    For example, suppose we want to multiply the quantity field by 5 and update the
    total value column.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，您在 Pandas 数据框上执行的大多数操作本质上都是向量化。例如，假设我们想要将数量字段乘以 5 并更新总价值列。
- en: '[PRE6]'
  id: totrans-43
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: It took less than one-hundredth of a second to process 1 million records. How
    do we know the above was a vectorisation process? Apart from the minuscule amount
    of time it took to run, we can check to see how long it takes to do the same thing
    using a non-vectorised method—specifically, using the apply() method.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 处理 100 万条记录不到百分之一秒。我们如何知道上述是向量化过程？除了运行所需的时间极短之外，我们还可以检查使用非向量化方法（特别是使用 apply()
    方法）完成相同任务所需的时间。
- en: If you weren’t very experienced in coding Pandas, this is a method you might
    have devised to solve this problem in the first place.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您在 Pandas 编码方面不是很熟练，这可能是您最初解决此问题的方法。
- en: '**Using the Apply() method**'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: '**使用 Apply() 方法**'
- en: Apply() allows you to run a function that will be applied to every record in
    a dataframe. This should be quicker than using a for loop to iterate over the
    dataframe rows, but how does it compare to the original vectorised code?
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: Apply() 允许您运行一个函数，该函数将应用于数据框中的每一条记录。这应该比使用 for 循环遍历数据框行要快，但它与原始向量化代码相比如何？
- en: '[PRE7]'
  id: totrans-48
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: So, as you can see from the timng of ther above operation, we’ve established
    that vectorisation in Pandas coding is essential when processing large datasets
    and that it often just gets implemented "**behind the scenes"** for simpler code
    problems.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，正如您从上述操作的计时中可以看到的，我们已经确定在处理大型数据集时，Pandas 编码中的向量化是必不可少的，而且它通常只是为简单的代码问题在“幕后”实现。
- en: But what happens when our coding needs are slightly more complicated?
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 但当我们的编码需求稍微复杂一些时会发生什么？
- en: Example 2 -Vectorise an If/then/else condition
  id: totrans-51
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例 2 - 向量化 If/then/else 条件
- en: In this example, say we want to do the same operation as before (quantity *5),
    but this time only for Smartphone products. For any other products, we want (quantity*
    2).
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，假设我们想要执行之前的相同操作（数量 *5），但这次只为智能手机产品。对于任何其他产品，我们想要（数量* 2）。
- en: Here is the naive apply() implementation.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是 naive apply() 实现的示例。
- en: '[PRE8]'
  id: totrans-54
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: At almost 80 secs, the run time is wayyyy too long.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 几乎 80 秒的运行时间太长了。
- en: There are a couple of ways we can improve this using vectorisation. The first
    is the obvious way and probably what most experienced Pandas coders would turn
    to as it seems natural. It’s quick, too.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以通过向量化来提高这一点。第一种方法是显而易见的，也可能是大多数经验丰富的Pandas程序员会转向的方法，因为它看起来很自然。这也很快。
- en: '[PRE9]'
  id: totrans-57
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: The second way I’ll show uses a NumPy method you might not have encountered
    before – the NumPy **where()** function, and it’s even faster than regular vectorisation.
    Numpy.where() takes three arguments. The first argument is the condition you’re
    testing for. The second is what is returned if the test condition returns True,
    and the third is returned if the test condition is False.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 我将要展示的第二种方法使用的是你可能之前没有遇到过的NumPy方法——NumPy的**where()**函数，而且它的速度甚至比常规向量化还要快。Numpy.where()函数接受三个参数。第一个参数是你正在测试的条件。第二个参数是在测试条件返回True时返回的内容，第三个参数是在测试条件为False时返回的内容。
- en: '[PRE10]'
  id: totrans-59
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Using NumPy, in this case, was more than 5x times faster than the regular vectorisation
    speed and a whopping 3500x faster than using apply().
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，使用NumPy比常规向量化快5倍以上，比使用apply()快3500倍。
- en: Example 3 – vectorise multiple if/then/else conditions.
  id: totrans-61
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例 3 – 向量化多个if/then/else条件。
- en: Nested if/then/else conditions can be handled using nested Numpy.where conditions.
    But it gets harder to read and maintain such code when there are many such cases.
    If you’ve ever used nested IF statements in Excel, you’ll know what I mean.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 可以使用嵌套的Numpy.where条件来处理嵌套的if/then/else条件。但是，当存在许多此类情况时，代码的可读性和可维护性会变得困难。如果你曾经在Excel中使用过嵌套的IF语句，你就会明白我的意思。
- en: In this instance, we can use another pretty cool NumPy method not many people
    have heard of, which is called **select().**
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，我们可以使用另一个相当酷的NumPy方法，很多人可能都没有听说过，这个方法叫做**select()**。
- en: Like where(), select() also takes 3 arguments. The first is a Python list of
    **`conditions`** to test for. The second argument is a Python list of **`choices`**
    that tells NumPy what to return if the equivalent condition is met. The third
    argument is a **`default`** statement of what to return if none of the conditions
    are met.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 就像where()函数一样，select()函数也接受3个参数。第一个参数是一个Python列表，包含要测试的**`条件`**。第二个参数是一个Python列表，告诉NumPy在满足等价条件时应返回什么。第三个参数是**`默认`**语句，用于在没有任何条件满足时返回的内容。
- en: The order of these is important. The first item in the choices list goes with
    the first item in the conditions list, and so on.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 这些顺序很重要。choices列表中的第一个项目与conditions列表中的第一个项目相对应，依此类推。
- en: In a sense, it’s a bit like a case statement you would use if programming in
    Python, C, Java, etc …
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 在某种程度上，它就像在Python、C、Java等编程语言中使用的case语句一样。
- en: Take our previous example to an extreme. Say we want to multiply our initial
    quantity by a different amount for each different type of product.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 将我们之前的例子推向极端。比如说，我们想要根据不同类型的产品乘以不同的数量。
- en: '[PRE11]'
  id: totrans-68
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: Example 4 – Vectorise nested multiple if/then/else conditions
  id: totrans-69
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例 4 – 向量化嵌套的多个if/then/else条件
- en: My final example is similar to the previous one, but now the quantity for Smartphones
    only gets multiplied by 1.5 if the existing quantity for Smartphones is > 5\.
    Otherwise, the quantity gets multiplied by 2.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 我的最后一个例子与之前的例子类似，但现在只有当智能手机的现有数量大于5时，智能手机的数量才会乘以1.5。否则，数量会乘以2。
- en: The other conditions are unchanged. In other words, we have a nested if/then/else
    scenario. If this logic was in a function in a programming language like Python,
    it would look similar to this,
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 其他条件保持不变。换句话说，我们有一个嵌套的if/then/else场景。如果这个逻辑在一个像Python这样的编程语言中的函数里，它看起来会像这样，
- en: '[PRE12]'
  id: totrans-72
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: Can we vectorise this? Yes, we can by modifying the same method as before. This
    time, we add some extra boolean logical tests and the extra actions required to
    the `choices` list.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 我们能否向量化这个？是的，我们可以通过修改之前的方法来实现。这次，我们在`choices`列表中添加了一些额外的布尔逻辑测试和额外的操作。
- en: I won’t repeat the whole code, just the changes.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 我不会重复整个代码，只展示变化的部分。
- en: '[PRE13]'
  id: totrans-75
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: Running our new code, we get this output,
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 运行我们新的代码，我们得到以下输出，
- en: '[PRE14]'
  id: totrans-77
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
