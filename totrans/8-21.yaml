- en: Speed up Pandas code with Numpy
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用Numpy加速Pandas代码
- en: 原文：[https://towardsdatascience.com/speed-up-pandas-code-with-numpy-fdee76210794/](https://towardsdatascience.com/speed-up-pandas-code-with-numpy-fdee76210794/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/speed-up-pandas-code-with-numpy-fdee76210794/](https://towardsdatascience.com/speed-up-pandas-code-with-numpy-fdee76210794/)
