- en: 'Abstract Classes: A Software Engineering Concept Data Scientists Must Know
    To Succeed'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/abstract-classes-a-software-engineering-concept-data-scientists-must-know-to-succeed/](https://towardsdatascience.com/abstract-classes-a-software-engineering-concept-data-scientists-must-know-to-succeed/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1750111602668" class="mdspan-comment">Why</mdspan> you should
    read this article
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: If you are planning to go into data science, be it a graduate or a professional
    looking for a career change, or a manager in charge of establishing best practices,
    this article is for you.
  prefs: []
  type: TYPE_NORMAL
- en: 'Data science attracts a variety of different backgrounds. From my professional
    experience, I’ve worked with colleagues who were once:'
  prefs: []
  type: TYPE_NORMAL
- en: Nuclear physicists
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Post-docs researching gravitational waves
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: PhDs in computational biology
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Linguists
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: just to name a few.
  prefs: []
  type: TYPE_NORMAL
- en: It is wonderful to be able to meet such a diverse set of backgrounds and I have
    seen such a variety of minds lead to the growth of a creative and effective data
    science function.
  prefs: []
  type: TYPE_NORMAL
- en: 'However, I have also seen one big downside to this variety:'
  prefs: []
  type: TYPE_NORMAL
- en: '*Everyone has had different levels of exposure to key Software Engineering
    concepts, resulting in a patchwork of coding skills.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'As a result, I have seen work done by some data scientists that is brilliant,
    but is:'
  prefs: []
  type: TYPE_NORMAL
- en: Unreadable — you have no idea what they are trying to do.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Flaky — it breaks the moment someone else tries to run it.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Unmaintainable — code quickly becomes obsolete or breaks easily.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Un-extensible — code is single-use and its behaviour cannot be extended
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: which ultimately dampens the impact their work can have and creates all sorts
    of issues down the line.
  prefs: []
  type: TYPE_NORMAL
- en: So, in a series of articles, I plan to outline some core software engineering
    concepts that I have tailored to be necessities for data scientists.
  prefs: []
  type: TYPE_NORMAL
- en: They are simple concepts, but the difference between knowing them vs not knowing
    them clearly draws the line between amateur and professional.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/376920aae12c064aa2bafbd1d77d6e5d.png)'
  prefs: []
  type: TYPE_IMG
- en: Abstract Art, Photo by [Steve Johnson](https://unsplash.com/@steve_j?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on [Unsplash](https://unsplash.com/photos/orange-red-and-blue-abstract-painting-VCLNNMRl07k?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
  prefs: []
  type: TYPE_NORMAL
- en: 'Today’s concept: Abstract classes'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Abstract classes are an extension of class inheritance, and it can be a very
    useful tool for data scientists if used correctly.
  prefs: []
  type: TYPE_NORMAL
- en: '*If you need a refresher on class inheritance, see my article on it [here](https://towardsdatascience.com/inheritance-a-software-engineering-concept-data-scientists-must-know-to-succeed/)*.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Like we did for [class inheritance](https://towardsdatascience.com/inheritance-a-software-engineering-concept-data-scientists-must-know-to-succeed/),
    I won’t bother with a formal definition. Looking back to when I first started
    coding, I found it hard to decipher the vague and abstract (no pun intended) definitions
    out there in the Internet.
  prefs: []
  type: TYPE_NORMAL
- en: It’s much easier to illustrate it by going through a practical example.
  prefs: []
  type: TYPE_NORMAL
- en: So, let’s go straight into an example that a data scientist is likely to encounter
    to demonstrate how they are used, and why they are useful.
  prefs: []
  type: TYPE_NORMAL
- en: 'Example: Preparing data for ingestion into a feature generation pipeline'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![](../Images/87f1494e529ac6f925be314510faf722.png)'
  prefs: []
  type: TYPE_IMG
- en: Photo by [Scott Graham](https://unsplash.com/@amstram?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on [Unsplash](https://unsplash.com/photos/person-holding-pencil-near-laptop-computer-5fNmWej4tAA?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
  prefs: []
  type: TYPE_NORMAL
- en: Let’s say we are a consultancy that specialises in fraud detection for financial
    institutions.
  prefs: []
  type: TYPE_NORMAL
- en: We work with a number of different clients, and we have a set of features that
    carry a consistent signal across different client projects because they embed
    domain knowledge gathered from subject matter experts.
  prefs: []
  type: TYPE_NORMAL
- en: So it makes sense to build these features for each project, even if they are
    dropped during feature selection or are replaced with bespoke features built for
    that client.
  prefs: []
  type: TYPE_NORMAL
- en: The challenge
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We data scientists know that working across different projects/environments/clients
    means that the input data for each one is never the same;
  prefs: []
  type: TYPE_NORMAL
- en: 'Clients may provide different file types: `CSV`, `Parquet`, `JSON`, `tar`,
    to name a few.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Different environments may require different sets of credentials.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Most definitely each dataset has their own quirks and so each one requires different
    data cleaning steps.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Therefore, you may think that we would need to build a new feature generation
    pipeline for each and every client.
  prefs: []
  type: TYPE_NORMAL
- en: How else would you handle the intricacies of each dataset?
  prefs: []
  type: TYPE_NORMAL
- en: No, there is a better way
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Given that:'
  prefs: []
  type: TYPE_NORMAL
- en: We know we’re going to be building the *same* set of useful features for each
    client
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We can build one feature generation pipeline that can be reused for each client
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Thus, the only new problem we need to solve is cleaning the input data.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Thus, our problem can be formulated into the following stages:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/8a98072e48e7433d243900c23f4e8605.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author. Blue circles are datasets, yellow squares are pipelines.
  prefs: []
  type: TYPE_NORMAL
- en: Data Cleaning pipeline
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Responsible for handling any unique cleaning and processing that is required
    for a given client in order to format the dataset into a *standardised schema*
    dictated by the feature generation pipeline.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: The Feature Generation pipeline
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Implements the feature engineering logic assuming the input data will follow
    a fixed schema to output our useful set of features.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Given a fixed input data schema, building the feature generation pipeline is
    trivial.
  prefs: []
  type: TYPE_NORMAL
- en: 'Therefore, we have boiled down our problem to the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '*How do we ensure the quality of the data cleaning pipelines such that their
    outputs always adhere to the downstream requirements?*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The *real* problem we are solving
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Our problem of *‘ensuring the output always adhere to downstream requirements’*
    is not just about getting code to run. That’s the easy part.
  prefs: []
  type: TYPE_NORMAL
- en: 'The hard part is designing code that is robust to a myriad of external, non-technical
    factors such as:'
  prefs: []
  type: TYPE_NORMAL
- en: Human error
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: People naturally forget small details or prior assumptions. They may build a
    data cleaning pipeline whilst overlooking certain requirements.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Leavers
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Over time, your team inevitably changes. Your colleagues may have knowledge
    that they assumed to be obvious, and therefore they never bothered to document
    it. Once they have left, that knowledge is lost. Only through trial and error,
    and hours of debugging will your team ever recover that knowledge.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: New joiners
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Meanwhile, new joiners have no knowledge about prior assumptions that were once
    assumed obvious, so their code usually requires a lot of debugging and rewriting.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: This is where abstract classes really shine.
  prefs: []
  type: TYPE_NORMAL
- en: Input data requirements
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We mentioned that we can fix the schema for the feature generation pipeline
    input data, so let’s define this for our example.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s say that our pipeline expects to read in *parquet* files, containing
    the following columns:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Let’s also add in a requirement that the dataset must be ordered by `timestamp`.
  prefs: []
  type: TYPE_NORMAL
- en: The abstract class
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now, time to define our abstract class.
  prefs: []
  type: TYPE_NORMAL
- en: An abstract class is essentially a blueprint from which we can inherit from
    to create child classes, otherwise named ‘*concrete*‘ classes.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s spec out the different methods we may need for our data cleaning blueprint.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: You can see that we have imported the `ABC` class from the `abc` module, which
    allows us to create abstract classes in Python.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/4cb13b93f25787e07738eac3420a8f53.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author. Diagram of the abstract class and concrete class relationships
    and methods.
  prefs: []
  type: TYPE_NORMAL
- en: Pre-defined behaviour
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![](../Images/a608414e576763113b28d39c55a53641.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author. The methods to be pre-defined are circled red.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s now add some pre-defined behaviour to our abstract class.
  prefs: []
  type: TYPE_NORMAL
- en: Remember, this behaviour will be made available to all child classes which inherit
    from this class so this is where we bake in behaviour that you want to enforce
    for all future projects.
  prefs: []
  type: TYPE_NORMAL
- en: For our example, the behaviour that needs fixing across all projects are all
    related to how we output the processed dataset.
  prefs: []
  type: TYPE_NORMAL
- en: 1\. The `run` method
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: First, we define the `run` method. This is the method that will be called to
    run the data cleaning pipeline.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: The run method acts as a single point of entry for all future child classes.
  prefs: []
  type: TYPE_NORMAL
- en: This standardises how any data cleaning pipeline will be run, which enables
    us to then build new functionality around any pipeline without worrying about
    the underlying implementation.
  prefs: []
  type: TYPE_NORMAL
- en: You can imagine how incorporating such pipelines into some orchestrator or scheduler
    will be easier if all pipelines are executed through the same `run` method, as
    opposed to having to handle many different names such as `run`, `execute`, `process`,
    `fit`, `transform` etc.
  prefs: []
  type: TYPE_NORMAL
- en: 2\. The `save` method
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Next, we fix how we output the transformed data.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: We’re assuming we will use `polars` for data manipulation, and the output is
    saved as `parquet` files as per our specification for the feature generation pipeline.
  prefs: []
  type: TYPE_NORMAL
- en: 3\. The `validate` method
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Finally, we populate the `validate` method which will check that the dataset
    adheres to our expected output format before saving it down.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: We’ve created a property called `output_schema`. This ensures that all child
    classes will have this available, whilst preventing it from being accidentally
    removed or overridden if it was defined in, for example, `__init__`.
  prefs: []
  type: TYPE_NORMAL
- en: Project-specific behaviour
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![](../Images/e7fb5856e67fab33d399afedfaddd50d.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author. Project specific methods that need to be overridden are circled
    red.
  prefs: []
  type: TYPE_NORMAL
- en: In our example, the `load` and `transform` methods are where project-specific
    behaviour will be held, so we leave them blank in the base class – the implementation
    is deferred to the future data scientist in charge of writing this logic for the
    project.
  prefs: []
  type: TYPE_NORMAL
- en: You will also notice that we have used the `abstractmethod` decorator on the
    `transform` and `load` methods. This decorator enforces these methods to be defined
    by a child class. If a user forgets to define them, an error will be raised to
    remind them to do so.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s now move on to some example projects where we can define the `transform`
    and `load` methods.
  prefs: []
  type: TYPE_NORMAL
- en: Example project
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The client in this project sends us their dataset as CSV files with the following
    structure:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: 'We learn from them that:'
  prefs: []
  type: TYPE_NORMAL
- en: Each transaction is unique identified by the combination of `event_id` and `unix_timestamp`
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The `wallet_uuid` is the equivalent identifier for the ‘account’
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The `user_uuid` is the equivalent identifier for the ‘account holder’
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The `payment_value` is the transaction amount, denominated in Pound Sterling
    (or Dollar).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The CSV file is separated by `|` and has no header.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The concrete class
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now, we implement the `load` and `transform` functions to handle the unique
    complexities outlined above in a child class of `BaseRawDataPipeline`.
  prefs: []
  type: TYPE_NORMAL
- en: Remember, these methods are all that need to be written by the data scientists
    working on this project. All the aforementioned methods are pre-defined so they
    need not worry about it, reducing the amount of work your team needs to do.
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Loading the data
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'The `load` function is quite simple:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: We use polars’ `scan_csv` [method](https://docs.pola.rs/api/python/dev/reference/api/polars.scan_csv.html)
    to stream the data, with the appropriate arguments to handle the CSV file structure
    for our client.
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Transforming the data
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The transform method is also simple for this project, since we don’t have any
    complex joins or aggregations to perform. So we can fit it all into a single function.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: Thus, by overloading these two methods, we’ve implemented all we need for our
    client project.
  prefs: []
  type: TYPE_NORMAL
- en: The output we know conforms to the requirements of the downstream feature engineering
    pipeline, so we automatically have assurance that our outputs are compatible.
  prefs: []
  type: TYPE_NORMAL
- en: '***No debugging required. No hassle. No fuss.***'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Final summary: Why use abstract classes in data science pipelines?'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Abstract classes offer a powerful way to bring consistency, robustness, and
    improved maintainability to data science projects. By using Abstract Classes like
    in our example, our data science team sees the following benefits:'
  prefs: []
  type: TYPE_NORMAL
- en: 1\. No need to worry about compatibility
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: By defining a clear blueprint with abstract classes, the data scientist only
    needs to focus on implementing the `load` and `transform` methods specific to
    their client’s data.
  prefs: []
  type: TYPE_NORMAL
- en: As long as these methods conform to the expected input/output types, compatibility
    with the downstream feature generation pipeline is guaranteed.
  prefs: []
  type: TYPE_NORMAL
- en: This separation of concerns simplifies the development process, reduces bugs,
    and accelerates development for new projects.
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Easier to document
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The structured format naturally encourages in-line documentation through method
    docstrings.
  prefs: []
  type: TYPE_NORMAL
- en: This proximity of design decisions and implementation makes it easier to communicate
    assumptions, transformations, and nuances for each client’s dataset.
  prefs: []
  type: TYPE_NORMAL
- en: Well-documented code is easier to read, maintain, and hand over, reducing the
    knowledge loss caused by team changes or turnover.
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Improved code readability and maintainability
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: With abstract classes enforcing a consistent interface, the resulting codebase
    avoids the pitfalls of unreadable, flaky, or unmaintainable scripts.
  prefs: []
  type: TYPE_NORMAL
- en: Each child class adheres to a standardized method structure (`load`, `transform`,
    `validate`, `save`, `run`), making the pipelines more predictable and easier to
    debug.
  prefs: []
  type: TYPE_NORMAL
- en: 4\. Robustness to human factors
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Abstract classes help reduce risks from human error, teammates leaving, or learning
    new joiners by embedding essential behaviours in the base class. This ensures
    that critical steps are never skipped, even if individual contributors are unaware
    of all downstream requirements.
  prefs: []
  type: TYPE_NORMAL
- en: 5\. Extensibility and reusability
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: By isolating client-specific logic in concrete classes while sharing common
    behaviors in the abstract base, it becomes straightforward to extend pipelines
    for new clients or projects. You can add new data cleaning steps or support new
    file formats without rewriting the entire pipeline.
  prefs: []
  type: TYPE_NORMAL
- en: In summary, abstract classes levels up your data science codebase from ad-hoc
    scripts to scalable, and maintainable production-grade code. Whether you’re a
    data scientist, a team lead, or a manager, adopting these software engineering
    principles will significantly boost the impact and longevity of your work.
  prefs: []
  type: TYPE_NORMAL
- en: If You Want To Learn More
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: If you enjoyed this article, then have a look at some of my other related articles.
