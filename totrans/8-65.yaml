  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: '*Welcome to the seventh post in my "Plotly with code" series! If you missed
    the first one, you can check it out in the link below, or browse through my ["one
    post to rule them all"](https://medium.com/@joparga3/all-my-written-articles-in-one-place-24ccd6689f72)
    to follow along with the entire series or other topics I have previously written
    about.*'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: '[**Awesome Plotly with Code Series (Part 1): Alternatives to Bar Charts**](https://towardsdatascience.com/awesome-plotly-with-code-series-part-1-alternatives-to-bar-charts-125502587690)'
  id: totrans-5
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: A short summary on why I am writing this series
  id: totrans-6
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: My go-to tool for creating visualisations is Plotly. It’s incredibly intuitive,
    from layering traces to adding interactivity. However, whilst Plotly excels at
    functionality, it doesn’t come with a "data journalism" template that offers polished
    charts right out of the box.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: That’s where this series comes in – I’ll be sharing how to transform Plotly’s
    charts into sleek, professional-grade charts that meet data journalism standards.
  id: totrans-8
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*PS: All images are authored by myself unless otherwise specified.*'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
- en: Intro – A half truth is a whole lie.
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I don’t know if you have ever [seen the Fox news bar chart pruning "scandal"](https://imgur.com/gallery/fox-news-is-great-math-3zmMKat).
    Fox decided to scale the y-axis in order to make it seem as if Obamacare was gaining
    a lot of traction over time (needless to say that a time category should be a
    line plot, but that is beyond the scope of this post). By breaking the "best practice"
    rule of "always starting your bar charts at zero", the chart tailored to a story
    through a ‘half-truth’.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: Just to be clear, this is not a political statement, it is a bad visualisation
    practice statement.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
- en: Why is cropping the y-axis a bad practice? When the y-axis is cropped, the viewer
    loses context for the data. For example, cropping can make it unclear if the charted
    values are close to a "natural baseline" (like zero) or if the values themselves
    are relatively high or low.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: What will we cover in this blog?
  id: totrans-14
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Having understood that you should *always* start a bar chart at 0, there are
    instances where having the full range of y-axis values (from 0 to whatever value
    you want to show) can actually be harmful for the story to tell. So what can we
    do in these cases?
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: '**Scenario 1:** Where a bar chart ***doesn’t*** start at y=0.'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Scenario 2:** Deviation plots – where your baseline is not y=0.'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Scenario 3:** Where starting at y=0 would hide important differences.'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/bb630a101396afc720aaf91d2c1f015c.png)'
  id: totrans-19
  prefs: []
  type: TYPE_IMG
- en: '*As always, code and links to my GitHub repository will be provided along the
    way. Let’s get started!*'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: '*一如既往，代码和GitHub仓库的链接将在这个过程中提供。让我们开始吧！*'
- en: Scenario 1\. Can a bar not start at 0?
  id: totrans-21
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 场景1. 柱状图可以不从0开始吗？
- en: A bar in a bar chart tends to be read from bottom to top, as if it was a building.
    That is why, in our human minds – following the building analogy – we would expect
    a bar chart to begin at 0.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 柱状图中的柱状图通常是从底部到顶部读取的，就像一座建筑。这就是为什么在我们的脑海中——遵循建筑类比——我们期望柱状图从0开始。
- en: 'There are not many scenarios where a bar starts somewhere different that is
    not 0 and it still easily understood at a glance. I can think of 2:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 没有多少情况下柱状图从不是0的某个地方开始，但仍然可以一目了然地理解。我可以想到两个：
- en: Waterfall charts
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 瀑布图
- en: Bar charts that reference elements such as geographical metrics where the baseline
    can be different levels – sea level, stratosphere or the earth cortex.
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 柱状图引用了诸如地理度量等元素，其中基线可以是不同的水平——海平面、平流层或地球地壳。
- en: Let’s see some examples.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看一些例子。
- en: Example 1\. Waterfall chart
  id: totrans-27
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例1. 瀑布图
- en: Waterfall charts are super common in the financial world. You can see below
    a mock-up waterfall chart that I created with Plotly.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 瀑布图在金融界非常常见。你可以在下面看到一个我用Plotly创建的模拟瀑布图。
- en: '![Mock up data source](../Images/078ece2d8320f09d58f0f2e7f65fa97e.png)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
  zh: '![模拟数据源](../Images/078ece2d8320f09d58f0f2e7f65fa97e.png)'
- en: Mock up data source
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 模拟数据源
- en: '**What are the characteristics of waterfall charts?**'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: '**瀑布图的特点是什么？**'
- en: You can see that there are bars that are *not* starting at 0.
  id: totrans-32
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 你可以看到，有一些柱状图**不是**从0开始的。
- en: However, there is a continuous flow from bar to bar, which makes it very similar
    to a stacked bar chart.
  id: totrans-33
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 然而，从柱状图到柱状图之间存在连续的流动，这使得它非常类似于堆积柱状图。
- en: In addition, for every step there is a new baseline drawn (with a black line),
    which kind of makes each bar as if it started from a "0 type" baseline.
  id: totrans-34
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 此外，对于每一步，都会绘制一个新的基线（用黑色线表示），这使每个柱状图似乎都是从一种“0型”基线开始的。
- en: Finally, the overall chart does actually start at 0\. We are not breaking the
    rule that a bar chart should always start at 0.
  id: totrans-35
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 最后，整体图表实际上是从0开始的。我们没有打破柱状图应该始终从0开始的规则。
- en: Tips on how to create this plot
  id: totrans-36
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 如何创建此图的技巧
- en: '***How to build a waterfall chart in Plotly?***'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: '***如何在Plotly中构建瀑布图？***'
- en: '[PRE0]'
  id: totrans-38
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Example 2\. Geographical measurements
  id: totrans-39
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例2. 地理测量
- en: 'Now imagine that you are a geography teacher. You would like to challenge your
    students with the following questions: (1) What are the tallest natural structures
    on Earth? (2) What are the tallest mountains on Earth?'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 现在想象一下，你是一位地理老师。你希望用以下问题挑战你的学生：（1）地球上最高的自然结构是什么？（2）地球上最高的山是什么？
- en: You purposely want to ask these questions as most students would answer "Mount
    Everest" for both. But you would like to *shock* your students by presenting geographical
    elements such as trenches and mountains that are below sea level. This is the
    data you collate for them to plot.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 你故意提出这些问题，因为大多数学生都会对两个问题都回答“珠穆朗玛峰”。但你想通过展示低于海平面的地理元素（如海沟和山脉）来“震惊”你的学生。这是你为他们整理的数据。
- en: '![Data source manually collated](../Images/956e2449b796a9919f29eeb29f4a1a51.png)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![手动整理的数据源](../Images/956e2449b796a9919f29eeb29f4a1a51.png)'
- en: Data source manually collated
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 手动整理的数据源
- en: In the screenshot above, I have highlighted in green how Mauna Kea is the tallest
    mountain, but, it surfaces less over sea level than Mount Everest. How would you
    plot this data?
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 在上面的截图中，我用绿色突出显示了莫纳克亚山是最高的山，但它比珠穆朗玛峰在海平面以上的露出部分要少。你将如何绘制这些数据？
- en: You can see below my take on plotting all this information in 1 chart.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以看到，我将所有这些信息绘制在一张图中的方法。
- en: '![](../Images/e0691fed88af98bbf42952d02bcbeed1.png)'
  id: totrans-46
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/e0691fed88af98bbf42952d02bcbeed1.png)'
- en: '**What are the characteristics of this chart?**'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: '**这个图表的特点是什么？**'
- en: The chart does actually have a 0 line (representing sea level). In addition,
    I have added 2 auxiliary lines to represent the maximum values above and below
    this 0 line.
  id: totrans-48
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 该图表实际上确实有一条0线（代表海平面）。此外，我还添加了两条辅助线来表示这条0线以上和以下的最大值。
- en: The bars are ordered in descending order. You can easily detect that Mount Everest
    is the tallest mountain above sea level.
  id: totrans-49
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 柱状图按降序排列。你可以很容易地发现珠穆朗玛峰是海平面以上的最高山。
- en: By having bars with negative values, we make it easy for the reader to understand
    that there are geographical features that are below sea level.
  id: totrans-50
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 通过使用负值的柱状图，我们使读者很容易理解存在低于海平面的地理特征。
- en: 'I have paid double attention to Mauna kea. First, I added 2 data labels: where
    does the base start below sea level, but also, what is the total height. In addition,
    I included a grey box clearly mentioning that Mauna Kea is the tallest mountain.'
  id: totrans-51
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我对莫纳克亚山给予了双倍的关注。首先，我添加了2个数据标签：基准线在海拔以下的位置在哪里，以及总高度是多少。此外，我还包括了一个灰色框，清楚地指出莫纳克亚山是最高的山。
- en: 'Scenario 2: Deviation plots'
  id: totrans-52
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 场景2：偏差图
- en: 'Imagine a scenario where you want to compare categories, where the differences
    between them are small and, in addition, the values of the y-axis are big. Check
    the dataframe below:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一个场景，你想比较类别，它们之间的差异很小，而且y轴的值很大。查看下面的数据框：
- en: '![Data source: Our world in data](../Images/0e527618d73cab8750692f2178c002a1.png)'
  id: totrans-54
  prefs: []
  type: TYPE_IMG
  zh: '![数据来源：我们的世界数据](../Images/0e527618d73cab8750692f2178c002a1.png)'
- en: 'Data source: [Our world in data](https://ourworldindata.org/gender-ratio#:~:text=Among%20first%2Dborn%20children%2C%20the,likely%20to%20have%20another%20child.)'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 数据来源：[我们的世界数据](https://ourworldindata.org/gender-ratio#:~:text=Among%20first%2Dborn%20children%2C%20the,likely%20to%20have%20another%20child.)
- en: '**1st attempt: A simple bar chart with a benchmark baseline**'
  id: totrans-56
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**第一次尝试：带有基准基准线的简单柱状图**'
- en: I think the chart below is a solid starting point. However, because the bars
    start at 0 and the range of values are so big, the bars look like skyscrapers.
    The main point that we want to show in this chart are the differences between
    higher and lower countries, and with these skyscrapers, you don’t really feel
    the difference between China and Zambia.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为下面的图表是一个良好的起点。然而，由于柱状图从0开始，并且值范围很大，柱状图看起来像摩天大楼。我们想要展示的图表的主要点是高国家和低国家之间的差异，但是有了这些摩天大楼，你真的感觉不到中国和赞比亚之间的差异。
- en: '![](../Images/aa4fcb91bfd8fd3cb93b73449f849ca6.png)'
  id: totrans-58
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/aa4fcb91bfd8fd3cb93b73449f849ca6.png)'
- en: '**2nd attempt: A deviation plot using a bar chart (a.k.a. Flagpole chart)**'
  id: totrans-59
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**第二次尝试：使用柱状图（又称旗帜图）的偏差图**'
- en: Flagpole charts is a modified bar chart. Flagpole charts have a baseline (it
    can be 0 or different to 0), where the bars are elevated on top of (or below)
    the "flagpole". Flagpole charts make it easy to focus on relative differences
    between data points, especially useful for comparing incremental changes or to
    show deviations from a target or benchmark.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 旗帜图是一种修改后的柱状图。旗帜图有一个基准线（可以是0或不同于0），柱子位于“旗帜”之上（或之下）。旗帜图使得关注数据点之间的相对差异变得容易，特别适用于比较增量变化或显示与目标或基准的偏差。
- en: '![](../Images/3aabe94e82df7687fd0e68c10bb42007.png)'
  id: totrans-61
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/3aabe94e82df7687fd0e68c10bb42007.png)'
- en: Tips on how to create this plot
  id: totrans-62
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 如何创建此图的技巧
- en: '**1st**, plot a vertical baseline.'
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第一次**，绘制一个垂直基准线。'
- en: '[PRE1]'
  id: totrans-64
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '**2nd**, create a deviation feature.'
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第二次**，创建一个偏差特征。'
- en: '[PRE2]'
  id: totrans-66
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '**3rd**, plot a bar chart where the x-axis is ‘deviation’, but the text that
    you show is the actual ratio.'
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第三次**，绘制一个柱状图，其中x轴是“偏差”，但你显示的文本是实际比率。'
- en: '[PRE3]'
  id: totrans-68
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '**3rd attempt: A deviation plot using a dot chart**'
  id: totrans-69
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**第三次尝试：使用点图的偏差图**'
- en: The previous chart is, in my opinion, quite valid. However, given that we know
    that best practice indicates that bar charts should always start from 0, we are
    breaking this rule. In order to not break it, we can make a slight adjustment
    and transform the deviation plot from bars to using dots.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 在我看来，之前的图表相当有效。然而，鉴于我们知道最佳实践表明柱状图应该始终从0开始，我们正在打破这条规则。为了不打破这条规则，我们可以进行轻微的调整，将偏差图从柱状图转换为使用点。
- en: 'We actually presented a "lollipop" chart in *[Awesome Plotly with code series
    (Part 1): Alternatives to bar charts](https://medium.com/towards-data-science/awesome-plotly-with-code-series-part-1-alternatives-to-bar-charts-125502587690)*,
    so the idea is to use something similar here too. Instead of having big coloured
    bars, by using dot plots, our attention is focused on each individual dot, not
    on the whole length of the bar. In my opinion, this deviation scatter plot is
    much better.'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 我们实际上在*[神奇的Plotly代码系列（第一部分）：柱状图的替代方案](https://medium.com/towards-data-science/awesome-plotly-with-code-series-part-1-alternatives-to-bar-charts-125502587690)*中展示了一个“棒棒糖”图表，所以这里的想法也是使用类似的东西。通过使用点图，我们的注意力集中在每个单独的点，而不是整个柱子的长度。在我看来，这种偏差散点图要好得多。
- en: '![](../Images/c5725661c588a4dfab4ea098027d2190.png)'
  id: totrans-72
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c5725661c588a4dfab4ea098027d2190.png)'
- en: Tips on how to create this plot
  id: totrans-73
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 如何创建此图的技巧
- en: Good news… you do the same as the flagpole chart but instead of using `go.Bar()`,
    you use `go.Scatter()`!
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 好消息……你做的是和旗帜图一样，但不是使用`go.Bar()`，而是使用`go.Scatter()`！
- en: Scenario 3\. Hiding behind big numbers in bar charts.
  id: totrans-75
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 场景3：隐藏在柱状图大数字背后的内容。
- en: In scenario 2 we already saw how bar charts can hide small changes behind big
    numbers. In scenario 3 we cover the same idea but in this case where the change
    happens over time.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 在场景2中，我们已经看到柱状图如何隐藏在大的数字背后的微小变化。在场景3中，我们将覆盖相同的概念，但这次是关于变化随时间发生的情况。
- en: Imagine you are a consultant working for the NHS. You have been gathering data
    about the % of patients in A&E who wait 4 hours or less (as if 4 hours was a short
    waiting time…) You know that the NHS had a target of 95% back in 2018\. Therefore,
    you want to show the evolution of this % metric and it’s comparison against a
    benchmark. Here is the data you gather.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下，你是一名为NHS工作的顾问。你一直在收集关于A&E中等待4小时或更少（就像4小时是一个短的等待时间……）的患者的百分比数据。你知道NHS在2018年有一个95%的目标。因此，你想展示这个百分比指标的演变及其与基准的对比。以下是您收集的数据。
- en: '![Data source: Nuffield Trust](../Images/1fded576677b2367d1a0cf3d6ad5f7b6.png)'
  id: totrans-78
  prefs: []
  type: TYPE_IMG
  zh: '![数据来源：Nuffield Trust](../Images/1fded576677b2367d1a0cf3d6ad5f7b6.png)'
- en: 'Data source: [Nuffield Trust](https://www.nuffieldtrust.org.uk/resource/a-e-waiting-times)'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 数据来源：[Nuffield Trust](https://www.nuffieldtrust.org.uk/resource/a-e-waiting-times)
- en: '**1st attempt: If you want to be nice to the NHS, use a bar chart.**'
  id: totrans-80
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**第一次尝试：如果你想对NHS友好，请使用柱状图。**'
- en: You first go with a bar chart. You don’t want to mess up with the rule of not
    starting your bars at 0\. All in all, the chart does somehow show the decline
    over time. It also shows that you are now the furthest away from the 95% target.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 你首先使用柱状图。你不想违反不将柱子从0开始的规则。总的来说，图表确实以某种方式显示了随时间的下降。它还显示你现在离95%的目标最远。
- en: But it does not convey a dramatic change. Because they start at zero, the highest
    starting point (70%) already seems big. In other words, you are presenting the
    true data, but with a view of pleasing the NHS folks at the top.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 但它并没有传达出显著的变化。因为它们从零开始，最高的起始点（70%）已经看起来很大了。换句话说，你是在展示真实的数据，但同时也试图取悦顶层的NHS人士。
- en: '![](../Images/6c7bf15bccc89f492ffaa204de39bdd5.png)'
  id: totrans-83
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/6c7bf15bccc89f492ffaa204de39bdd5.png)'
- en: '**2nd attempt: If you want to show a dramatic change to the NHS, use a line
    chart.**'
  id: totrans-84
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**第二次尝试：如果你想向NHS展示显著的变化，请使用线形图。**'
- en: Lines and dot charts are not anchored on the need to start at y=0\. Because
    of this, we can zoom in to relevant value ranges to emphasise our story. Can you
    see the difference with the chart below?
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 线形图和点状图不需要锚定在y=0开始的需求。正因为如此，我们可以放大到相关的值范围，以强调我们的故事。你能看到下面图表中的区别吗？
- en: The change is much more dramatic, creating a sense of urgency to "stop the fall".
    By having the lowest % at the lowest part of the chart, we are evoking that we
    "hit the floor". In the bar chart, the floor was 0 and therefore, we were super
    far away from hitting it.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 变化非常显著，产生了一种迫切感去“阻止下跌”。通过将最低百分比放在图表的最低部分，我们唤起了我们“触底”的感觉。在柱状图中，底部是0，因此，我们离触底非常远。
- en: '![](../Images/99b010da81989efc4cede974b872af6f.png)'
  id: totrans-87
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/99b010da81989efc4cede974b872af6f.png)'
- en: Summary
  id: totrans-88
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: In this article, we explored the impact of y-axis manipulation on bar charts.
    The best practice rule is to start bar charts at zero for clarity and honesty.
    However, if you need to tell a specific story, you might need an alternative.
    For example, flagpole charts or deviation charts help with focusing on differences
    against a benchmark or between groups. In addition, line charts don’t require
    starting at y=0, which helps focusing on differences over a trend in time.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们探讨了y轴操作对柱状图的影响。最佳实践规则是柱状图从零开始，以保持清晰和诚实。然而，如果你需要讲述一个特定的故事，你可能需要一个替代方案。例如，旗帜图或偏差图有助于关注基准或组之间的差异。此外，线形图不需要从y=0开始，这有助于关注趋势中的差异。
- en: Nevertheless, the article should convey that…
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，文章应该传达的是……
- en: '*Bar charts should **always** start at 0.*'
  id: totrans-91
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*柱状图应该**始终**从0开始。*'
- en: ''
  id: totrans-92
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*If you are thinking about not starting at 0, then switch the type of chart.*'
  id: totrans-93
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*如果你在考虑不从0开始，那么就切换图表类型。*'
