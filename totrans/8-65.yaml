  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/awesome-plotly-with-code-series-part-7-cropping-the-y-axis-in-bar-charts-322fd7c7f792/](https://towardsdatascience.com/awesome-plotly-with-code-series-part-7-cropping-the-y-axis-in-bar-charts-322fd7c7f792/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![Image generated with Dall-e](../Images/40cf3e7c01d80264ceb176bf627d7e7e.png)'
  id: totrans-2
