  - PREF_UL
  type: TYPE_NORMAL
- en: '[An overview of Machine Learning System design by tryexponent](https://www.tryexponent.com/blog/machine-learning-system-design-interview-guide)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
