- en: 'Optimize for Impact: How to Stay Ahead of Gen AI and Thrive as a Data Scientist'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/optimize-for-impact-how-to-stay-ahead-of-gen-ai-and-thrive-as-a-data-scientist/](https://towardsdatascience.com/optimize-for-impact-how-to-stay-ahead-of-gen-ai-and-thrive-as-a-data-scientist/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: '*This article is an excerpt from my new book about how data scientists can
    not just survive the AI wave, but use it to level up their careers. If you’d like
    to learn more, [please check it out here](https://amzn.to/470s3YN)!*'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: <mdspan datatext="el1753384598901" class="mdspan-comment">Most of the work</mdspan>
    that junior and even mid-level data scientists take pride in—the stuff that makes
    them feel smart, technical, and irreplaceable—is now baseline automation. The
    uncomfortable question isn’t whether AI can do these things as good as a human,
    it’s whether a human is still adding value by doing them himself. AI is already
    good enough for most of the routine work that fills a typical data scientist’s
    day; and in business, good enough at 10% the cost and 1% the time usually wins.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: Most Data Scientists are Still Optimizing for Accuracy
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Clinging to your familiar workflows isn’t just inefficient, it’s soon to be
    a career risk. While you’re perfecting your pandas syntax, your peers are learning
    to ask better questions, influence real business decisions, and optimize for impact.
    They’re not trying to outrun the robots; they’re doing the work robots can’t do.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: Most data scientists are trained for academic rigor. In school or in Kaggle
    competitions, we got neat and tidy data sets, and set out to build ML models with
    incrementally better accuracy. We’d been trained to chase clean answers, statistical
    significance, and low error rates. Once we got our first job, we discovered that
    clean data rarely exists, and the first 90% of each project would be spent just
    setting up our data.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: Gen AI is forcing data scientists into another similar shift of mindset. Much
    of the work that has been our bread-and-butter can be done by AI now; maybe not
    as good as we could do it, but certainly good enough, and much faster at that.
    This isn’t a threat though, it’s an opportunity. What your manager is thinking,
    or maybe your manager’s manager, is that **business impact > technical precision**.
    Delivering a perfect visualization or insight isn’t enough anymore. If you’re
    not driving decisions, then you are replaceable.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
- en: The Shift from Outputs to Outcomes
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To thrive in this new AI era, data scientists must become more strategic. They
    must start to think like a product manager thinks. This is what I mean by “optimize
    for impact.” Start with the decision, not the deliverable, and work backward.
    Focus on actionability, even at the expense of exhaustiveness. Communicate tradeoffs,
    interpretations, and recommendations with each piece of work.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: 'PMs start from the business goal, and then start working towards a decision.
    As a data scientist, I would often start from the data and ask what questions
    I could answer with it—this isn’t the way forward anymore. A PM is a ruthless
    prioritizer: What actually moves the needle? What won’t get done if we spend time
    on this? A PM thinks in terms of tradeoffs, constraints, and leverage; they care
    more about impact than elegance. Data is a tool, not the destination.'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 产品经理从业务目标开始，然后开始朝着决策努力。作为一名数据科学家，我经常从数据开始，问自己可以用它回答什么问题——这不再是前进的方式了。产品经理是一个无情的优先级排序者：什么实际上推动了指针？如果我们花时间在这上面，什么不会完成？产品经理从权衡、约束和杠杆的角度思考；他们更关心影响而不是优雅。数据是工具，而不是目的地。
- en: I’ve identified five concrete changes of mindset that every data scientist can
    learn from PMs. A data scientist who becomes proficient in these skills will become
    defensible from encroachment by AI. This isn’t necessarily a playbook to a promotion
    to Staff+ levels (although it can be—there is a lot of overlap), but a framework
    to capitalize on AI’s weaknesses.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 我已经确定了每个数据科学家都可以从产品经理那里学习的五个具体的心态转变。一个在这些技能上变得熟练的数据科学家将能够抵御AI的侵犯。这不一定是一个晋升到Staff+级别的剧本（尽管它可以——有很多重叠），而是一个利用AI弱点的框架。
- en: Five Tactical Actions to Start Optimizing for Impact
  id: totrans-14
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 五项战术行动以开始优化影响
- en: 1\. Start with the Decision, Not the Data
  id: totrans-15
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 从决策开始，而不是从数据开始
- en: 'Most data scientists open a new project by pulling a dataset. It’s comforting
    to poke around the numbers, explore the shape of the data, and see what interesting
    trends emerge; it gives the satisfying feeling (or more accurately, the illusion)
    of progress at the start of an ambiguous project. But this is how you end up with
    dashboards no one looks at and models that never get used. If you want your work
    to matter, you need to start with three questions:'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数数据科学家通过拉取数据集来开启一个新项目。在数字中摸索，探索数据的形状，看看会出现什么有趣的趋势，这让人感到安慰（或者更准确地说，是进步的错觉），尤其是在一个模糊的项目开始时。但这就是你如何结束于无人关注的仪表板和从未被使用的模型。如果你想让你的工作有意义，你需要从以下三个问题开始：
- en: What decision will this inform?
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这将提供什么决策？
- en: What action might it change?
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它可能会改变什么行动？
- en: What happens if we do nothing?
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果我们什么都不做会发生什么？
- en: 'Imagine you’re asked to analyze a user drop-off funnel. A junior data scientist
    might build a beautiful funnel chart, break it down by platform and region, and
    maybe even segment it by monthly cohorts. But then what? What decision does that
    analysis support? What action can the team take? The better question might have
    been: “What would we do differently if we learned that Android users drop off
    more?” Maybe the right decision is whether to invest engineering time in fixing
    the Android onboarding flow. That’s the business context you need before writing
    a single line of SQL.'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下，有人要求你分析用户流失漏斗。一个初级数据科学家可能会构建一个漂亮的漏斗图表，按平台和地区分解，甚至可能按月度群体进行细分。但接下来呢？这项分析支持什么决策？团队可以采取什么行动？可能更好的问题是：“如果我们了解到安卓用户流失更多，我们会做些什么不同的事情？”可能正确的决策是是否投资工程时间来修复安卓的注册流程。这是你在写第一行SQL之前需要的业务背景。
- en: Before you run your first query, align with your stakeholders on the decision
    they’re trying to make. If your analysis doesn’t lead to a decision, it’s wasted
    time. Start at the end and work backward. The key is actionability.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 在你运行第一个查询之前，与你的利益相关者就他们试图做出的决策达成一致。如果你的分析没有导致决策，那就是浪费时间。从结果开始，逆向工作。关键是可操作性。
- en: '**Why it differentiates you from AI:** LLMs can analyze data, but they can’t
    understand org dynamics, anticipate political resistance, or choose which battles
    are worth fighting. That’s judgment—human territory.'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '**为什么它使你与AI区分开来：** LLMs可以分析数据，但它们无法理解组织动态，预测政治阻力，或选择哪些战斗值得打。这是判断——人类的领域。'
- en: 2\. Prioritize Projects That Move the Roadmap
  id: totrans-23
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 优先考虑推动路线图的项目
- en: Data scientists often fall into the trap of chasing interesting questions. But
    interesting is not the same as important. I once spent two weeks writing a 50-page
    analysis documenting user activity in an emerging line of behaviors; but although
    everyone in the org read it, no one did anything. I was proud of the result, but
    it wasn’t actionable. That was a wake-up call.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 数据科学家经常陷入追逐有趣问题的陷阱。但有趣并不等同于重要。我曾经花了两周时间写了一份50页的分析报告，记录了用户在新兴行为线上的活动；尽管组织中的每个人都阅读了它，但没有人为此采取任何行动。我为这个结果感到自豪，但它没有可操作性。这是一个警钟。
- en: If you want to be indispensable, get close to the roadmap. What are the 2–3
    bets the company is making this quarter? What’s the PM losing sleep over? What
    open question is blocking the next big initiative? Anchor your projects to these.
    If your work ties directly to a team’s goals, it’s far more likely to drive action—and
    far more likely to be seen by leadership.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想变得不可或缺，就要靠近路线图。公司这个季度要下注的2-3个赌注是什么？产品经理在为什么事情失眠？哪个未解决的问题阻碍了下一个重大举措？将你的项目锚定在这些点上。如果你的工作直接与团队的目标相关联，那么它更有可能推动行动——并且更有可能被领导层看到。
- en: 'A strategic project has five key characteristics:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 战略项目有五个关键特征：
- en: '**First, it influences a key product or business decision.** This isn’t just
    about providing data to inform a decision, it’s about providing data that actually
    changes what gets decided. Strategic projects surface insights that make stakeholders
    think, “We need to reconsider our approach here.”'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: '**第一，它影响了一个关键的产品或业务决策**。这不仅仅是提供数据来告知决策，而是提供实际改变决策的数据。战略项目揭示的见解使利益相关者思考：“我们需要重新考虑我们的方法。”'
- en: '**Second, it’s tied to roadmap planning or resourcing.** Strategic work feeds
    into quarterly planning cycles, annual budgeting processes, or major product launches.
    It’s the analysis that gets referenced in leadership meetings when teams are deciding
    what to build next.'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: '**第二，它与路线图规划或资源配置相关联**。战略工作融入季度规划周期、年度预算流程或重大产品发布。这是在团队决定下一步要构建什么时，领导层会议中引用的分析。'
- en: '**Third, it surfaces tradeoffs or uncertainty in product direction.** Strategic
    projects don’t just confirm what everyone already believes. They reveal hidden
    assumptions, quantify difficult tradeoffs, or expose blind spots in the team’s
    thinking. They make the invisible visible.'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: '**第三，它揭示了产品方向中的权衡或不确定性**。战略项目不仅确认了大家已经相信的事情，还揭示了隐藏的假设，量化了困难的权衡，或暴露了团队思维中的盲点。它们使无形的东西变得可见。'
- en: '**Fourth, it generates reusable artifacts.** Strategic projects create metrics,
    models, frameworks, or insights that get leveraged by other teams or in future
    decisions. They’re not one-time analyses that disappear into the ether.'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: '**第四，它产生了可重用的成果**。战略项目创建了指标、模型、框架或见解，这些被其他团队或未来的决策所利用。它们不是一次性分析，而是消失在虚空中。'
- en: '**Fifth, it raises the ceiling of decision-making for others.** Strategic work
    elevates conversations from tactical (“Should we change the button color?”) to
    strategic (“What does user engagement actually mean for our business?”).'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: '**第五，它提高了他人决策的上限**。战略工作将对话从战术层面（“我们应该改变按钮颜色吗？”）提升到战略层面（“用户参与度对我们业务实际上意味着什么？”）。'
- en: Smart data scientists don’t just answer interesting questions. They answer valuable
    ones. The difference between a junior analyst and a strategic data scientist is
    their ability to identify work that actually matters; work that influences decisions,
    changes minds, and moves the business forward.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 聪明的数据科学家不仅回答有趣的问题，还回答有价值的问题。初级分析师和战略数据科学家之间的区别在于他们识别真正重要工作的能力；那些影响决策、改变思维并推动业务向前发展的工作。
- en: '**Why it differentiates you from AI:** AI can surface insights, but only you
    can see the product landscape, navigate tradeoffs, and strategically insert yourself
    where real leverage lives.'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: '**为什么它使你与AI区分开来**：AI可以揭示见解，但只有你能看到产品格局，权衡利弊，并在真正有影响力的地方战略性地定位自己。'
- en: 3\. Define Metrics that Reflect the Business and Incentivize the Right Behaviors
  id: totrans-34
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. 定义反映业务并激励正确行为的指标
- en: 'Every metric encodes assumptions, priorities, and tradeoffs. The question isn’t
    “what can we measure?” but “what should we optimize for?” This distinction separates
    strategic data scientists from tactical ones. Tactical data scientists take metrics
    as given. “Marketing wants to improve conversion rates? Great, let’s measure conversion
    rates.” Strategic data scientists ask deeper questions: “What does the business
    actually care about? What behaviors do we want to encourage? What could backfire
    if we optimize for this?” Many shady subscription services (in)famously work to
    drive down cancellations… by making it harder to cancel. That’s not insight, it’s
    misaligned incentives.'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 每个指标都编码了假设、优先级和权衡。问题不是“我们能测量什么？”而是“我们应该优化什么？”这种区别将战略数据科学家与战术数据科学家区分开来。战术数据科学家将指标视为既定事实。“营销想提高转化率？太好了，让我们测量转化率。”战略数据科学家提出更深层次的问题：“业务实际上关心的是什么？我们想鼓励哪些行为？如果我们优化这一点，可能会产生什么反效果？”许多臭名昭著的订阅服务（in)famously）试图通过使取消变得更困难来降低取消率……这并不是见解，而是不匹配的激励措施。
- en: It’s your job to define metrics that guide good decisions. That means starting
    from the business objective and working backward. What does success actually look
    like? What behavior do we want to encourage? What leading indicator can we use
    to detect problems early? And what’s the dark side of optimizing for this metric?
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 你的工作是定义指导良好决策的指标。这意味着从业务目标开始，逆向工作。成功实际上是什么样子？我们希望鼓励什么行为？我们可以使用什么领先指标来早期发现问题？以及优化这个指标可能有什么负面影响？
- en: Sort your metrics into four layers. **North Star metrics** define long-term
    success and align the entire company—like YouTube tracking Weekly Active Creators
    to center their mission around content production. **Supporting metrics** break
    down and drive movement in the north star, surfacing where strategic action is
    most needed—like creator retention or uploads per creator. **Guardrail metrics**
    prevent unintended harm while optimizing, ensuring quality and trust stay intact
    even under aggressive growth. And **operational metrics** keep the system running
    day-to-day—essential for execution, but not where strategy lives.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 将你的指标分为四个层次。**北极星指标**定义了长期成功并使整个公司保持一致——比如YouTube跟踪每周活跃创作者，以将他们的使命集中在内容生产上。**支持性指标**分解并推动北极星指标的发展，揭示战略行动最需要的地方——比如创作者留存率或每位创作者的上传量。**护栏指标**在优化过程中防止意外损害，确保质量和信任即使在激进的增长下也能保持完整。而**运营指标**保持系统日常运行——对于执行至关重要，但战略并不在这里。
- en: 'Most data scientists will be devising the supporting metrics—these are the
    ones which provide signal in an experiment. A great supporting metric does three
    things: reflects reality, influences behavior, and is sensitive to change. Getting
    this right means working closely with PMs, engineers, and ops to understand the
    full system.'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数数据科学家将设计支持性指标——这些是提供实验信号的指标。一个出色的支持性指标做三件事：反映现实、影响行为，并对变化敏感。做对这件事意味着与产品经理、工程师和运营团队紧密合作，以了解整个系统。
- en: '**Why it differentiates you from AI:** AI can optimize a number, but only you
    can question whether it’s the right number. Defining success is a political, strategic,
    and human act influenced by the nuance of your specific business.'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: '**为什么它使你与AI不同：**AI可以优化一个数字，但只有你可以质疑这个数字是否正确。定义成功是一个政治、战略和人类行为，受到你特定业务细微差别的
    影响。'
- en: 4\. Match the Analytical Approach to the Decision Risk and Value
  id: totrans-40
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4. 将分析方法与决策风险和价值匹配
- en: 'Before you write a single line of code or draft an experimental design, step
    back and ask four strategic questions: How fast do we need an answer? How wrong
    can we afford to be? What constraints do we face? And what decision hangs on this
    analysis? These questions—timeline, precision, feasibility, and impact—form a
    mental model for choosing the right analytical approach for the situation at hand.'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 在你编写任何代码或制定实验设计之前，退后一步并问四个战略问题：我们需要多快得到答案？我们承担得起多大的错误？我们面临什么约束？以及这项分析取决于什么决策？这些问题——时间表、精度、可行性和影响力——形成了一个心理模型，用于选择适合当前情况的分析方法。
- en: '**Timeline** is often the dominant constraint. If leadership needs a decision
    by Friday, you’re not running a gold-standard experiment. You’re using historical
    data, descriptive metrics, or synthetic comparisons to make an informed call fast.'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: '**时间表**通常是主要的约束条件。如果领导要求周五做出决定，你并不是在进行一个金标准的实验。你是在使用历史数据、描述性指标或合成比较来快速做出明智的决策。'
- en: '**Precision** is about risk tolerance: bet-the-company decisions require rigorous
    testing and large samples; a button color change might only need a directional
    signal. Don’t over-engineer when stakes are low—and don’t under-engineer when
    stakes are high.'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: '**精度**关乎风险承受能力：涉及公司命运的决定需要严格的测试和大量样本；按钮颜色的改变可能只需要一个方向性的信号。当风险较低时不要过度设计，而当风险较高时不要低估设计。'
- en: '**Feasibility** reminds us that real-world analytics happens under constraints—traffic,
    tooling, org politics, data access. But those constraints aren’t blockers; they’re
    design parameters. Your workaround could become your competitive advantage.'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: '**可行性**提醒我们，现实世界的分析是在约束条件下进行的——流量、工具、组织政治、数据访问。但这些约束并不是障碍；它们是设计参数。你的解决方案可能成为你的竞争优势。'
- en: And finally, **Impact** is about ruthless prioritization. Your most sophisticated
    methods should support your most strategic decisions. If an analysis won’t affect
    what gets built, funded, or killed, you’re either wasting time or avoiding a harder
    conversation.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，**影响力**关乎无情的优先级排序。你最复杂的方法应该支持你最重要的决策。如果一项分析不会影响建设、资助或取消的项目，那么你要么是在浪费时间，要么是在避免一场更艰难的对话。
- en: 'There is no “best” method in the abstract. The best method is the one that
    fits your constraints and drives the decision forward. To match method to moment,
    ask yourself: What’s the cost of a false positive? A false negative? What decision
    will this analysis inform, and how reversible is that decision? A one-way door
    needs rigor. A two-way door needs speed. If it’s a million-dollar bet, get tight
    estimates. If it’s a UX tweak, ship it and monitor over the next week or two.'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 在抽象意义上，没有“最佳”方法。最佳方法是适合你的限制并推动决策向前发展的方法。为了使方法与时刻相匹配，问问自己：假阳性的成本是多少？假阴性的成本是多少？这项分析将告知什么决策，这个决策的可逆性如何？单行门需要严谨。双行门需要速度。如果是百万美元的赌注，就获得紧密的估计。如果是UX调整，就发货并在接下来的一个星期或两周内进行监控。
- en: Good analysis isn’t just accurate—it’s appropriately scoped for the decision
    it supports.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 优秀的分析不仅仅是准确的——它还需要适合支持决策的范围。
- en: '**Why it differentiates you from AI:** AI can calculate statistical significance,
    but it can’t weigh business risk or adjust for what’s at stake. You’re not just
    running tests, you’re managing consequences and you need business context from
    your experience.'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: '**为什么它能让你与AI区分开来：** AI可以计算统计显著性，但它无法权衡商业风险或调整所涉及的内容。你不仅仅是运行测试，你还需要管理后果，并且你需要从你的经验中获得商业背景。'
- en: 5\. Turn Insights Into Action, Not Just Understanding
  id: totrans-49
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5. 将洞察转化为行动，而不仅仅是理解
- en: 'The biggest sin in data science isn’t being wrong—it’s being irrelevant. A
    clever model or rich insight means nothing if it doesn’t change what the business
    does next. I’ve been guilty of this: presenting a polished analysis, getting polite
    nods, and walking away thinking I’d done my job. But the real test is whether
    your work moves someone to act.'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 数据科学中最大的罪过不是错误——而是无关紧要。一个巧妙的模型或丰富的洞察力，如果它不改变业务下一步的行动，就没有任何意义。我犯过这个错误：展示一个精炼的分析，得到礼貌的点头，然后离开，认为我已经完成了我的工作。但真正的考验是，你的工作是否促使某人采取行动。
- en: This means your work needs to come with a point of view. If you’re only showing
    what happened, then you’re not completing the task. You also need to recommend
    what to do next. Be clear about tradeoffs, risks, and confidence levels. Show
    how this insight ties to a decision the team is facing right now. Even better,
    co-create the action plan with your stakeholder before you ever open a slide deck.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着你的工作需要带有观点。如果你只是展示发生了什么，那么你就没有完成这项任务。你还需要建议下一步该做什么。明确权衡、风险和信心水平。展示这一洞察如何与团队目前面临的决策联系起来。更好的是，在与利益相关者打开幻灯片之前，与他们共同制定行动计划。
- en: 'One trick: write the recommendation slide before you start the analysis. If
    you can’t imagine what action would result from your work, don’t do it. Data science
    is only as valuable as the decisions it enables.'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 一个技巧：在开始分析之前先写好建议幻灯片。如果你无法想象你的工作会产生什么行动，就不要做。数据科学的价值仅在于它所启用的决策。
- en: '**Why it differentiates you from AI:** AI can find patterns. You connect them
    to strategy, urgency, and ownership—then get people to actually act. That’s what
    drives impact.'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: '**为什么它能让你与AI区分开来：** AI可以发现模式。你将它们与战略、紧迫性和所有权联系起来——然后让人们真正采取行动。这就是推动影响力的原因。'
- en: Strategy is Your New Job
  id: totrans-54
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 战略是你的新工作
- en: You have a choice to make. You can continue doing the same type of work you’ve
    always done, hoping that someone else will recognize your value and give you opportunities
    for strategic impact. Or you can proactively develop strategic capabilities, position
    yourself for high-impact work, and help define what the future of data science
    looks like.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 你有一个选择要做。你可以继续做你一直做的相同类型的工作，希望有人能认识到你的价值，给你提供战略影响的机会。或者你可以主动发展战略能力，为自己定位高影响力工作，并帮助定义数据科学的未来。
- en: The first path is comfortable but risky. The second path is challenging but
    rewarding.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 第一条路径很舒服但很危险。第二条路径具有挑战性但很值得。
- en: The five mindset shifts we’ve discussed aren’t just survival tactics. They’re
    career accelerators. Data scientists who master these skills don’t just become
    AI-proof; they become indispensable strategic partners who drive real business
    outcomes (and prime promotion candidates!).
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 我们讨论的五种心态转变不仅仅是生存策略。它们是职业加速器。掌握这些技能的数据科学家不仅成为AI免疫的，他们还成为不可或缺的战略合作伙伴，推动真正的业务成果（以及主要的晋升候选人！）。
- en: '**Start small, but start now**. Pick one project this quarter and apply the
    decision-first framework. Choose one metric you’re currently tracking and ask
    whether it’s driving the right behaviors. Take one analysis you’ve completed and
    ask yourself: “What action should we take based on this?”'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: '**从小处着手，但立即开始**。选择本季度的一个项目并应用决策优先框架。选择你目前正在跟踪的一个指标，并问自己：这个指标是否在推动正确的行为。选择你已完成的一个分析，并问自己：“基于这个分析，我们应该采取什么行动？”'
- en: Building strategic capabilities takes time. You won’t become a strategic data
    scientist overnight, and you shouldn’t expect to. But every month you spend developing
    business acumen, every quarter you spend building cross-functional relationships,
    every year you spend taking on more strategic work will compound over and over.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 建立战略能力需要时间。你不可能一夜之间成为战略数据科学家，也不应该有这样的期望。但每个月你投入于培养商业洞察力，每个季度你投入于构建跨职能关系，每年你投入于承担更多战略工作，这些都将不断累积。
- en: The AI revolution is already here. The question isn’t whether your role will
    change, but whether you’ll lead that change or let it happen to you. Your technical
    foundation is solid. Now it’s time to build strategic thinking on top of it. The
    future belongs to data scientists who can do both—and the future starts with your
    next project.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能革命已经到来。问题不在于你的角色是否会改变，而在于你是否会引领这种改变，还是让它发生在你身上。你的技术基础已经稳固。现在是你建立战略思维的时候了。未来属于那些能够做到这两点——并且未来从你的下一个项目开始。
- en: '* * *'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
