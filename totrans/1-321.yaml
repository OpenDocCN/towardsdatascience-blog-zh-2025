- en: Showcasing Your Work on HuggingFace Spaces
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/showcasing-your-work-on-huggingface-spaces/](https://towardsdatascience.com/showcasing-your-work-on-huggingface-spaces/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1757027384244" class="mdspan-comment">When we build an app</mdspan>,
    it’s only natural to want to share it. Some might remember when Heroku’s free
    tier made it possible to deploy apps instantly with almost no effort. That era
    is long gone, and the options for showcasing simple ML apps have become much more
    limited.
  prefs: []
  type: TYPE_NORMAL
- en: Why bother showcasing an app in the first place? The reasons are plenty. Putting
    your work out there allows you to gather real feedback from people who actually
    try it, which is far more valuable than keeping it to yourself. It also gives
    you the chance to build a portfolio that speaks louder than any CV. Sharing your
    app also opens doors for collaboration, helps you test whether your ideas solve
    real problems, and even creates opportunities you wouldn’t expect. Showcasing
    your work is about learning, improving, and building credibility.
  prefs: []
  type: TYPE_NORMAL
- en: If you’re looking to put your work online or build a small project portfolio,
    Hugging Face Spaces is one of the best places to start. It’s free, simple to use,
    and lets you deploy machine learning apps. You can spin up any kind of demo you
    want and share it with others in minutes.
  prefs: []
  type: TYPE_NORMAL
- en: There’s already a huge collection of apps running on Spaces, covering everything
    from text and image models to full interactive tools. Browsing through them at
    [huggingface.co/spaces](https://huggingface.co/spaces?utm_source=chatgpt.com)
    gives you a sense of what’s possible and plenty of inspiration for your own projects.
  prefs: []
  type: TYPE_NORMAL
- en: '[![](../Images/0435b44c5ab24a515891bd35f3b77cdd.png)](https://substackcdn.com/image/fetch/$s_!C2i6!,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F4ab4a77f-0909-42b6-b19f-c626f1fd6432_2652x924.png)'
  prefs: []
  type: TYPE_NORMAL
- en: HuggingFace Spaces of the Week – Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: In this blog post, I’ll walk you through a short tutorial on how to deploy your
    own Hugging Face Space. The goal is to show just how simple it can be to take
    a project from your local machine and make it accessible to anyone online.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Creating your Account
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: First, you need to create an account on [Hugging Face:](https://huggingface.co/)
  prefs: []
  type: TYPE_NORMAL
- en: '[![](../Images/9bd6f48bc027944694d8b969468f38cd.png)](https://substackcdn.com/image/fetch/$s_!Rf_R!,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2Fc9950761-bbb1-4581-afcb-1a47a1f7f792_1255x1265.png)'
  prefs: []
  type: TYPE_NORMAL
- en: Profile on HuggingFace – Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: Alright, now let’s head over to Hugging Face Spaces. This is where everything
    happens and you’ll set up your environment, choose the framework you want to work
    with, and start building the app you want to share.
  prefs: []
  type: TYPE_NORMAL
- en: 'Head over to Spaces on the menu:'
  prefs: []
  type: TYPE_NORMAL
- en: '[![](../Images/04cc4951b1e747750543cb707c391733.png)](https://substackcdn.com/image/fetch/$s_!yswG!,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F940b33a1-96a4-4ab1-a390-a8b97a5bdf02_1352x166.png)'
  prefs: []
  type: TYPE_NORMAL
- en: Hugging Face Menu – Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: Here you can explore countless apps built by other users – and this is also
    where our own app will appear once it’s deployed. For now, though, we’ll step
    away from Hugging Face, since we still need to build the app we plan to deploy.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Creating the app Locally
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: On my computer, I’ll start by setting up a local version of a simple Streamlit
    app that visualizes financial data for any stock. To keep things straightforward,
    the entire app will live in a single file called `app.py`.
  prefs: []
  type: TYPE_NORMAL
- en: This minimal setup makes it easy to follow along and focus on the essentials
    before we move on to deploying it.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'Let’s see this *streamlit* app locally:'
  prefs: []
  type: TYPE_NORMAL
- en: '[![](../Images/e3709e3a91354f0531c6371b778eb386.png)](https://substackcdn.com/image/fetch/$s_!qIaA!,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2Fa61fc661-fd5f-4ad6-8f12-cb5511d0fea7_2784x1324.png)'
  prefs: []
  type: TYPE_NORMAL
- en: Company Financial Dashboard App – Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: With the app running, I can type in the name or ticker of any stock and instantly
    pull up its financials. For example, if I enter Amazon’s ticker symbol, **AMZN**,
    the app will display the company’s financials in an easy-to-read format.
  prefs: []
  type: TYPE_NORMAL
- en: This makes it simple to explore key figures without digging through long financial
    reports or jumping between different websites.
  prefs: []
  type: TYPE_NORMAL
- en: '[![](../Images/67ebd4a5b060ac2ce664232208880102.png)](https://substackcdn.com/image/fetch/$s_!OmaA!,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2Fc975a387-9624-4d02-9869-17e59a17faf5_2670x1242.png)'
  prefs: []
  type: TYPE_NORMAL
- en: Amazon Income Statement in the App – Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: 'I’ve also prepared the app to draw a line plot for any metric I choose. If
    you scroll a bit down, you’ll see the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '[![](../Images/37fda21e4b66ff7abfb2108b3fed3ebf.png)](https://substackcdn.com/image/fetch/$s_!s4GV!,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2Fff615b6a-bd9d-40e1-8798-325d10b55ee1_2694x1134.png)'
  prefs: []
  type: TYPE_NORMAL
- en: EBITDA Plot of Amazon Financials – Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: You might be thinking, *“This looks interesting – I’d like to try it out myself.
    Can I?”* The answer, for now, is no.
  prefs: []
  type: TYPE_NORMAL
- en: 'The app is only running on my computer, which means you’d need access to my
    PC to use it. That’s why the address shows up as `localhost` visible only to me:'
  prefs: []
  type: TYPE_NORMAL
- en: '[![](../Images/a3ea1a08fecb58e233961a5d7696bb56.png)](https://substackcdn.com/image/fetch/$s_!exM6!,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F89afb124-a4ea-4544-b646-664700c8a65b_2126x78.png)'
  prefs: []
  type: TYPE_NORMAL
- en: App running on my computer – Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: And this is where Hugging Face will help us!
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Creating the HuggingFace Space
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now let’s go to [huggingface.co/spaces](https://huggingface.co/spaces?utm_source=chatgpt.com)
    and click on **“New Space”** to get started.
  prefs: []
  type: TYPE_NORMAL
- en: '[![](../Images/e78a6c0eab9cd31def1ea5962bf9b3c9.png)](https://substackcdn.com/image/fetch/$s_!Yo8c!,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F0942741e-27ba-4110-9590-2c51f9c2b88f_2054x140.png)'
  prefs: []
  type: TYPE_NORMAL
- en: Spaces Directory – Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: After clicking the “**New Space**” button, we can begin setting up the environment
    that will host our app.
  prefs: []
  type: TYPE_NORMAL
- en: '[![](../Images/4e3f56f4e862fde1ff6fae9d2c93946f.png)](https://substackcdn.com/image/fetch/$s_!vkZz!,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F38f63e02-f008-42d1-b066-2494225b6775_1490x1030.png)'
  prefs: []
  type: TYPE_NORMAL
- en: Space Configuration – Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: 'Here, I’ll name the project *financialexplore*, add a short description, and
    choose a license (in this case, Apache 2.0):'
  prefs: []
  type: TYPE_NORMAL
- en: '[![](../Images/28315c2cc3d0ea37a3fc19688fb20c1c.png)](https://substackcdn.com/image/fetch/$s_!D8_G!,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F5e952304-5f32-42db-a87a-2c3ebe301fbe_1432x380.png)'
  prefs: []
  type: TYPE_NORMAL
- en: Space Configuration – Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: Finally, since the app is built with Streamlit, I need to make sure that’s configured
    properly. In the setup screen, I’ll select**Docker** as the base and then choose
    **Streamlit** as the framework. This step tells Hugging Face how to run the app
    so everything works smoothly once it’s deployed.
  prefs: []
  type: TYPE_NORMAL
- en: '[![](../Images/fe3ee23483d089ad649ea877a4a5734b.png)](https://substackcdn.com/image/fetch/$s_!TIwJ!,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2Fec299433-42c5-4ea5-a3ec-5f4adda1d277_1556x950.png)'
  prefs: []
  type: TYPE_NORMAL
- en: Choosing Streamlit app in the Space – Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: If you’re using a different framework (like Shiny), be sure to select it here.
    That way, the Docker image created for your Space will include the right packages
    and libraries for your app to run correctly.
  prefs: []
  type: TYPE_NORMAL
- en: When it comes to computing, I’ll choose the basic version. Keep in mind that
    this is the only free hardware in huggingface spaces, if you need more computing
    power you may incur some costs.
  prefs: []
  type: TYPE_NORMAL
- en: '[![](../Images/b1b901b60c72b96244f6112bebeed3a5.png)](https://substackcdn.com/image/fetch/$s_!xOqh!,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F465b41ee-0b83-42c3-b7c4-5624cc9f32b7_1608x998.png)'
  prefs: []
  type: TYPE_NORMAL
- en: Configuring Hardware and Visibility – Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: I’ll keep my Space public so I can share it here in this blog post. With all
    the settings in place, I just hit **“*Create Space*”.**
  prefs: []
  type: TYPE_NORMAL
- en: Hugging Face then takes over and starts building the environment, getting everything
    ready for the app to run.
  prefs: []
  type: TYPE_NORMAL
- en: '[![](../Images/c2204c3fdabc745fc340c578c4444c85.png)](https://substackcdn.com/image/fetch/$s_!Ts-q!,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2Ff296ae01-c3a6-40a8-8ddd-72be7ea28166_2800x1134.png)'
  prefs: []
  type: TYPE_NORMAL
- en: Building the HuggingFace Space – Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: Once my Hugging Face Space is created, I can open it and see the default Streamlit
    template running. This template is a simple starting point, but it’s useful because
    it shows that the environment is working as expected.
  prefs: []
  type: TYPE_NORMAL
- en: '[![](../Images/ac315c6d1047a36757aa064226195a48.png)](https://substackcdn.com/image/fetch/$s_!4-N8!,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2Fa8e82433-6fcb-44d2-bc8b-82d1dac819e9_2566x808.png)'
  prefs: []
  type: TYPE_NORMAL
- en: Default Streamlit App – Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: With the Space ready, it’s now time to deploy our app to it.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Deploying our App on the Space
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'I can upload the files manually, but that would quickly get cumbersome and
    error prone. A better option is to treat the Space like a Git repository, which
    means I can clone it straight to my computer with a single command:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: By cloning the Space locally, I get all the files on my machine and can work
    with them just like any other project. From there, I simply drop in my `app.py`
    and any other files I need.
  prefs: []
  type: TYPE_NORMAL
- en: '[![](../Images/41097ee37c7368a4e00ef91d4d24ff1e.png)](https://substackcdn.com/image/fetch/$s_!Mx1b!,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2Fd7a86357-dd69-45b7-a1d8-7eb32fa476d9_1552x1078.png)'
  prefs: []
  type: TYPE_NORMAL
- en: Repo cloned on my Local Environment – Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: 'Now it’s time to bring everything together and get the app ready to deploy.
    First, we need to update a couple of files:'
  prefs: []
  type: TYPE_NORMAL
- en: '**– requirements.txt**: here I’ll add the extra libraries my app needs, like
    `plotly` and `yfinance`.'
  prefs: []
  type: TYPE_NORMAL
- en: '**– streamlit_app.py**: this is the main entry point. To keep things simple,
    I’ll just copy the code from my `app.py` into `src/streamlit_app.py`. (If you’d
    rather keep your own `app.py`, you’d need to adjust the Docker config accordingly
    to launch this file).'
  prefs: []
  type: TYPE_NORMAL
- en: With those changes in place, we’re ready! I’ll commit directly to the `main`
    branch, but you can set up your own versioning workflow if you prefer.
  prefs: []
  type: TYPE_NORMAL
- en: 'There’s one catch, though: your computer won’t yet have permission to push
    code to Hugging Face Spaces. To fix this, you’ll need an access token. Just head
    over to [huggingface.co/settings/tokens](https://huggingface.co/settings/tokens?utm_source=chatgpt.com),
    click **“New Token,”** and create one. **That token will allow you to authenticate
    and push your code to the Space.**'
  prefs: []
  type: TYPE_NORMAL
- en: 'I’ll call the token *personalpc* and give read/write permissions to all my
    repos on my huggingface account:'
  prefs: []
  type: TYPE_NORMAL
- en: '[![](../Images/1e1a2ac6297ff99990f93175999e1bae.png)](https://substackcdn.com/image/fetch/$s_!9FmI!,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2Fae987ece-f71c-4a00-9b61-47cf5fe57010_950x684.png)'
  prefs: []
  type: TYPE_NORMAL
- en: Creating Access Token – Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: Once you create the token, you’ll see it listed in your account. Mine’s hidden
    below for security reasons. Make sure to copy it right away and store it somewhere
    safe. I recommend you use a password manager such as 1Password, but any secure
    password manager will do. You’ll need this info later to connect your local setup
    to Hugging Face.
  prefs: []
  type: TYPE_NORMAL
- en: '[![](../Images/8d12e9d91b2f9caa974a1f6ae1ed1bab.png)](https://substackcdn.com/image/fetch/$s_!LxCh!,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F91b7e0e4-8a72-44c1-9066-b702092ac053_1295x708.jpeg)'
  prefs: []
  type: TYPE_NORMAL
- en: Access Token – Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: When you push your changes to the repo, Git Credential Manager will prompt you
    for a username and password.
  prefs: []
  type: TYPE_NORMAL
- en: '*Note: This prompt only appears if Git is installed on your machine itself,
    not just through the Visual Studio Code extension.*'
  prefs: []
  type: TYPE_NORMAL
- en: '[![](../Images/bbfffd31d01b44fe95e292082b67d20d.png)](https://substackcdn.com/image/fetch/$s_!r57P!,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2F447da5fe-49b1-4ce5-8597-62c53d5be7bb_838x640.png)'
  prefs: []
  type: TYPE_NORMAL
- en: Git Credential Manager – Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: Enter your GitHub username, and for the password, paste the token you just created.
  prefs: []
  type: TYPE_NORMAL
- en: Voilá! After committing, the changes are now live in your repo. From this point
    on, you can work with it just like you would with any other Git repository.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Viewing our app live
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'As shown below, our code has just been updated:'
  prefs: []
  type: TYPE_NORMAL
- en: '[![](../Images/e6d50293daefb0d8326c07c67353941d.png)](https://substackcdn.com/image/fetch/$s_!XLjo!,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2Fff00885b-9b46-4571-b516-822713bf1087_2598x648.png)'
  prefs: []
  type: TYPE_NORMAL
- en: Code Updated with our Commit – Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: 'But even better, let’s head over to the **App** menu:'
  prefs: []
  type: TYPE_NORMAL
- en: '[![](../Images/765d0543450925ab409a8683b62dccda.png)](https://substackcdn.com/image/fetch/$s_!dbaI!,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2Fec5150ee-cfd0-4da6-bc00-5661a4edf41c_2570x106.png)'
  prefs: []
  type: TYPE_NORMAL
- en: App Menu – Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: And just like that, the app is live, running online exactly as it did on my
    computer.
  prefs: []
  type: TYPE_NORMAL
- en: '[![](../Images/79d49d84e156f06fc303a75bb580d64f.png)](https://substackcdn.com/image/fetch/$s_!gtUL!,f_auto,q_auto:good,fl_progressive:steep/https%3A%2F%2Fsubstack-post-media.s3.amazonaws.com%2Fpublic%2Fimages%2Fdb32d4d2-22c9-4e97-9087-e6bc5be1ec07_2820x1428.png)'
  prefs: []
  type: TYPE_NORMAL
- en: Streamlit app is live! – Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: Follow this [link to see it live.](https://huggingface.co/spaces/ivopbernardo/financialexplore)
  prefs: []
  type: TYPE_NORMAL
- en: If you want to showcase your work or share your ideas, Hugging Face Spaces is
    one of the easiest and most effective ways to do it. You can start small with
    a single file, or build something more ambitious. The platform takes care of the
    hosting, so you can focus on building and sharing.
  prefs: []
  type: TYPE_NORMAL
- en: Don’t be afraid to experiment and play around. Even a simple demo can become
    the start of your own project portfolio. Feel free to share your apps in the comments
    of this post!
  prefs: []
  type: TYPE_NORMAL
