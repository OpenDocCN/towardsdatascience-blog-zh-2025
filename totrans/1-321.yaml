- en: Follow this [link to see it live.](https://huggingface.co/spaces/ivopbernardo/financialexplore)
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
- en: If you want to showcase your work or share your ideas, Hugging Face Spaces is
    one of the easiest and most effective ways to do it. You can start small with
    a single file, or build something more ambitious. The platform takes care of the
    hosting, so you can focus on building and sharing.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想展示你的作品或分享你的想法，Hugging Face Spaces 是最简单和最有效的方法之一。你可以从一个文件开始，或者构建更宏伟的项目。平台负责托管，这样你就可以专注于构建和分享。
- en: Don’t be afraid to experiment and play around. Even a simple demo can become
    the start of your own project portfolio. Feel free to share your apps in the comments
    of this post!
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 不要害怕尝试和探索。即使是一个简单的演示，也可能成为你个人项目组合的起点。请随意在本文的评论中分享你的应用！
