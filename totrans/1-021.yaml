- en: 'The Machine Learning “Advent Calendar” Day 4: k-Means in Excel'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/the-machine-learning-advent-calendar-day-4-k-means-in-excel/](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-4-k-means-in-excel/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Welcome to Day 4 of the [Machine Learning Advent Calendar](https://towardsdatascience.com/machine-learning-and-deep-learning-in-excel-advent-calendar-announcement/).
  prefs: []
  type: TYPE_NORMAL
- en: 'During the first three days, we explored **distance-based models** for supervised
    learning:'
  prefs: []
  type: TYPE_NORMAL
- en: the **[k-NN regressor](https://towardsdatascience.com/day-1-k-nn-regressor-in-excel-how-distance-drives-prediction/)**,
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: the **[k-NN classifier](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-2-k-nn-classifier-in-excel/)**,
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: and the **Nearest Centroid classifier**.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'In all these models, the idea was the same: **we measure distances, and we
    decide the output based on the nearest points or nearest centers.**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Today, we stay in this same family of ideas. But we use the distances in an
    unsupervised way: **k-means**.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, one question for those who already know this algorithm: **k-means looks
    more similar to which model, the k-NN classifier, or the Nearest Centroid classifier?**'
  prefs: []
  type: TYPE_NORMAL
- en: And if you remember, for all the models we have seen so far, there was not really
    a “training” phase or hyperparameter tuning.
  prefs: []
  type: TYPE_NORMAL
- en: For k-NN, there is no training at all.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For LDA, QDA, or GNB, training is just computing means and variances. And there
    are also no real hyperparameters.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Now, with k-means, we are going to implement a training algorithm that finally
    looks like “real” machine learning.
  prefs: []
  type: TYPE_NORMAL
- en: We start with a tiny 1D example. Then we move to 2D.
  prefs: []
  type: TYPE_NORMAL
- en: Goal of k-means
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In the training dataset, there are **no initial labels**.
  prefs: []
  type: TYPE_NORMAL
- en: The goal of k-means is to **create** meaningful labels by grouping points that
    are close to each other.
  prefs: []
  type: TYPE_NORMAL
- en: Let us look at the illustration below. You can clearly see two groups of points.
    Each centroid (the red square and the green square) is in the middle of its cluster,
    and every point is assigned to the closest one.
  prefs: []
  type: TYPE_NORMAL
- en: This gives a very intuitive picture of how k-means discovers structure using
    only distances.
  prefs: []
  type: TYPE_NORMAL
- en: And here, k means the number of centers we try to find.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/6396234abeac2d453d9298aa92e92286.png)'
  prefs: []
  type: TYPE_IMG
- en: k-means in Excel – image by author
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, let us answer the question: **Which algorithm is k-means closer to, the
    k-NN classifier or the Nearest Centroid classifier?**'
  prefs: []
  type: TYPE_NORMAL
- en: Do not be fooled by the **k** in k-NN and k-means.
  prefs: []
  type: TYPE_NORMAL
- en: 'They do not mean the same thing:'
  prefs: []
  type: TYPE_NORMAL
- en: in **k-NN**, *k* is the number of neighbors, not the number of classes;
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: in **k-means**, *k* is the number of centroids.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: K-means is much closer to the **Nearest Centroid classifier**.
  prefs: []
  type: TYPE_NORMAL
- en: Both models are represented by **centroids**, and for a new observation we simply
    compute the distance to each centroid to decide to which one it belongs.
  prefs: []
  type: TYPE_NORMAL
- en: The difference, of course, is that in the **Nearest Centroid classifier**, we
    already *know* the centroids because they come from labeled classes.
  prefs: []
  type: TYPE_NORMAL
- en: In **k-means**, we do not know the centroids. The whole goal of the algorithm
    is to *discover* suitable ones directly from the data.
  prefs: []
  type: TYPE_NORMAL
- en: 'The business problem is completely different: instead of predicting labels,
    we are trying to **create** them.'
  prefs: []
  type: TYPE_NORMAL
- en: And in k-means, the value of **k** (the number of centroids) is unknown. So
    it becomes a **hyperparameter** that we can tune.
  prefs: []
  type: TYPE_NORMAL
- en: k-means with only One feature
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We start with a tiny 1D example so that everything is visible on one axis. And
    we will choose the values in such a trivial way that we can instantly see the
    two centroids.
  prefs: []
  type: TYPE_NORMAL
- en: 1, 2, 3, 11, 12, 13
  prefs: []
  type: TYPE_NORMAL
- en: Yes, 2, and 12.
  prefs: []
  type: TYPE_NORMAL
- en: But how would the computer know? The machine will “learn” by guessing step by
    step.
  prefs: []
  type: TYPE_NORMAL
- en: Here comes the algorithm called **Lloyd’s algorithm**.
  prefs: []
  type: TYPE_NORMAL
- en: 'We will implement it in Excel with the following loop:'
  prefs: []
  type: TYPE_NORMAL
- en: choose initial centroids
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: compute the distance from each point to each centroid
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: assign each point to the nearest centroid
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: recompute the centroids as the average of the points in each cluster
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: repeat steps 2 to 4 until the centroids no longer move
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 1\. Choose initial centroids
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Pick two initial centers, for example:'
  prefs: []
  type: TYPE_NORMAL
- en: c_1 = 2.5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: c_2 = 3
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: They should be within the data range (between 1 and 13).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/fffc65fbf33547417581dea11023bbb6.png)'
  prefs: []
  type: TYPE_IMG
- en: k-means in Excel – image by author
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Compute distances
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'For each data point x:'
  prefs: []
  type: TYPE_NORMAL
- en: compute the distance to c_1,
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: compute the distance to c_2.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Typically, we use absolute distance in 1D.
  prefs: []
  type: TYPE_NORMAL
- en: We now have two distance values for each point.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/54e01d957721357f1ab4583dad6b260a.png)'
  prefs: []
  type: TYPE_IMG
- en: k-means in Excel – image by author
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Assign clusters
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'For each point:'
  prefs: []
  type: TYPE_NORMAL
- en: compare the two distances,
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: assign the cluster of the smallest one (1 or 2).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In Excel, this is a simple `IF` or `MIN` based logic.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/6d10eea7559fbea91b11a61aed64161b.png)'
  prefs: []
  type: TYPE_IMG
- en: k-means in Excel – image by author
  prefs: []
  type: TYPE_NORMAL
- en: 4\. Compute the new centroids
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'For each cluster:'
  prefs: []
  type: TYPE_NORMAL
- en: take the points assigned to that cluster,
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: compute their average,
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: this average becomes the new centroid.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/f360bbe37c6b7cdc5d71573df71b033c.png)'
  prefs: []
  type: TYPE_IMG
- en: k-means in Excel – image by author
  prefs: []
  type: TYPE_NORMAL
- en: 5\. Iterate until reaching convergence
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now in Excel, thanks to the formulas, we can simply **paste the new centroid
    values** into the cells of the initial centroids.
  prefs: []
  type: TYPE_NORMAL
- en: The update is immediate, and after doing this a few times, you will see that
    the values stop changing. That is when the algorithm has converged.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/3a76d61862e8869a59f1eceb6c9a90a7.png)'
  prefs: []
  type: TYPE_IMG
- en: k-means in Excel – image by author
  prefs: []
  type: TYPE_NORMAL
- en: We can also record each step in Excel, so we can see how the centroids and clusters
    evolve over time.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/9941b85518986e10aa6e1cef0ef6b9b2.png)'
  prefs: []
  type: TYPE_IMG
- en: k-means in Excel – image by author
  prefs: []
  type: TYPE_NORMAL
- en: k-means with Two Features
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now let us use two features. The process is exactly the same, we simply use
    the Euclidean distance in 2D.
  prefs: []
  type: TYPE_NORMAL
- en: You can either do the **copy-paste of the new centroids as values** (with just
    a few cells to update),
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/6a11dda5ea807221c748fd7e930dc10c.png)'
  prefs: []
  type: TYPE_IMG
- en: k-means in Excel – image by author
  prefs: []
  type: TYPE_NORMAL
- en: or you can display **all the intermediate steps** to see the full evolution
    of the algorithm.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/afeee8d3118cda53684e817844069a6d.png)'
  prefs: []
  type: TYPE_IMG
- en: k-means in Excel – image by author
  prefs: []
  type: TYPE_NORMAL
- en: Visualizing the Moving Centroids in Excel
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To make the process more intuitive, it is helpful to create plots that show
    how the centroids move.
  prefs: []
  type: TYPE_NORMAL
- en: Unfortunately, Excel or Google Sheets are not ideal for this kind of visualization,
    and the data tables quickly become a bit complex to organize.
  prefs: []
  type: TYPE_NORMAL
- en: If you want to see a full example with detailed plots, you can read [this article](https://medium.com/data-science/k-means-from-scratch-in-excel-bb60778d186e)
    I wrote almost three years ago, where each step of the centroid movement is shown
    clearly.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e1a018bcfb1b04286c828c9a0cacd88d.png)'
  prefs: []
  type: TYPE_IMG
- en: k-means in Excel – image by author
  prefs: []
  type: TYPE_NORMAL
- en: As you can see in this picture, the worksheet became quite unorganized, especially
    compared to the earlier table, which was very straightforward.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/3bac522c68353f73e715e8bf04182245.png)'
  prefs: []
  type: TYPE_IMG
- en: k-means in Excel – image by author
  prefs: []
  type: TYPE_NORMAL
- en: 'Choosing the optimal k: The Elbow Method'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: So now, it is possible to try **k = 2** and **k = 3** in our case, and compute
    the inertia for each one. Then we simply compare the values.
  prefs: []
  type: TYPE_NORMAL
- en: We can even begin with k=1.
  prefs: []
  type: TYPE_NORMAL
- en: 'For each value of k:'
  prefs: []
  type: TYPE_NORMAL
- en: we run k-Means until convergence,
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: compute the **inertia**, which is the sum of squared distances between each
    point and its assigned centroid.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'In Excel:'
  prefs: []
  type: TYPE_NORMAL
- en: For each point, take the distance to its centroid and square it.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Sum all these squared distances.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This gives the inertia for this k.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'For example:'
  prefs: []
  type: TYPE_NORMAL
- en: for k = 1, the centroid is just the overall mean of x1 and x2,
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: for k = 2 and k = 3, we take the converged centroids from the sheets where you
    ran the algorithm.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Then we can plot inertia as a function of k, for example for (k = 1, 2, 3).
  prefs: []
  type: TYPE_NORMAL
- en: For this dataset
  prefs: []
  type: TYPE_NORMAL
- en: from 1 to 2, the inertia drops a lot,
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: from 2 to 3, the improvement is much smaller.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The “elbow” is the value of k after which the decrease in inertia becomes marginal.
    In the example, it suggests that k = 2 is sufficient.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ed7a5dacd04299c674834d11d9ec4a01.png)'
  prefs: []
  type: TYPE_IMG
- en: k-means in Excel – image by author
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: K-means is a very intuitive algorithm once you see it step by step in Excel.
  prefs: []
  type: TYPE_NORMAL
- en: We start with simple centroids, compute distances, assign points, update the
    centroids, and repeat. Now, we can see how “machines learn”, right?
  prefs: []
  type: TYPE_NORMAL
- en: Well, this is only the beginning, we will see that different models “learn”
    in really different ways.
  prefs: []
  type: TYPE_NORMAL
- en: 'And here is the transition for tomorrow’s article: the unsupervised version
    of the **Nearest Centroid classifier** is indeed **k-means**.'
  prefs: []
  type: TYPE_NORMAL
- en: So what would be the unsupervised version of **LDA** or **QDA**? We will answer
    this in the next article.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/7521c491f5ac211a73a38cbd34a7df8d.png)'
  prefs: []
  type: TYPE_IMG
- en: k-means – image by author
  prefs: []
  type: TYPE_NORMAL
