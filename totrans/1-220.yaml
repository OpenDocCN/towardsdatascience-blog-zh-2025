- en: 'MobileNetV2 Paper Walkthrough: The Smarter Tiny Giant'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/mobilenetv2-paper-walkthrough-the-smarter-tiny-giant/](https://towardsdatascience.com/mobilenetv2-paper-walkthrough-the-smarter-tiny-giant/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Introduction
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '<mdspan datatext="el1759430128089" class="mdspan-comment">MobileNetV1</mdspan>
    was a breakthrough in the field of computer vision as it proved that deep learning
    models do not necessarily need to be computationally expensive to achieve high
    accuracy. Last month I posted an article where I explained everything about the
    model as well as its PyTorch implementation from scratch. Check the link at reference
    number [1] at the end of this article if you are interested in reading it. This
    first version of MobileNet was first proposed back in April 2017 in a paper titled
    *MobileNets: Efficient Convolutional Neural Networks for Mobile Vision Applications*
    [2] by Howard *et al*. from Google. Not long after — in January 2018 to be precise — Sandler
    *et al*. from the same institution introduced the successor of MobileNetV1 in
    a paper titled *MobileNetV2: Inverted Residuals and Linear Bottlenecks* [3], which
    brings significant improvement over the previous one in terms of both accuracy
    and efficiency. In this article, I am going to walk you through the ideas proposed
    in the MobileNetV2 paper and show you how to implement the architecture from scratch.'
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: The Improvements
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The first version of MobileNet relies solely on the so-called *depthwise separable
    convolution* layers. It is indeed necessary to acknowledge that using these layers
    as a replacement of standard convolutions allows the model to be extremely lightweight.
    However, authors thought that this architecture could still be improved even further.
    They came up with an idea where instead of only using depthwise separable convolutions,
    they also adopted the *inverted residual* and *linear bottleneck* mechanisms — which
    is where the title of the MobileNetV2 paper came from.
  prefs: []
  type: TYPE_NORMAL
- en: Inverted Residual
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: If you’re familiar with ResNet, I believe you know the so-called *bottleneck
    block*. For those who don’t, it is essentially a mechanism where the building
    block of the network works by following the *wide → narrow → wide* pattern. Figure
    1 below displays the illustration of a bottleneck block used in ResNet. Here we
    can see that it initially accepts a 256-channel tensor, shrink it to 64, and expands
    it back to 256.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e95a571184c04f54d6b18b2953b61fcc.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 1\. The building block of ResNet, commonly known as “bottleneck” [4].
  prefs: []
  type: TYPE_NORMAL
- en: The inverted version of the above block is commonly known as *inverted bottleneck*,
    which follows the *narrow → wide → narrow* structure. Figure 2 below shows an
    example from the ConvNeXt paper [5], where the number of channels in the input
    tensor is 96, expanded to 384, and compressed back to 96 by the last convolution
    layer. It is important to note that in MobileNetV2 an *inverted bottleneck* block
    is called *inverted residual* for some reasons. So, starting from now on, I will
    use the term to avoid confusion.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/fc6b76bdc703471fee269bf01e930ae0.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 2\. The inverted bottleneck block introduced in ConvNeXt [5].
  prefs: []
  type: TYPE_NORMAL
- en: At this point you might be wondering why we don’t just use the standard bottleneck
    for MobileNetV2\. The answer lies in the original purpose of the standard bottleneck
    design, where it was first introduced to reduce computational complexity. This
    was essentially done because ResNet is computationally expensive by nature yet
    rich in information. For this reason, ResNet authors proposed to reduce computational
    cost by shrinking the tensor size in the middle of each building block, which
    is how the bottleneck block was born.
  prefs: []
  type: TYPE_NORMAL
- en: This reduction in the number of channels does not hurt the model capacity that
    much since ResNet already has a large number of channels overall. On the other
    hand, MobileNetV2 is intended to be as lightweight as possible in the first place,
    which means the model capacity is not as high as ResNet. In order to increase
    model capacity, authors expand the tensor size in the middle to form the inverted
    residual block, which allows the model to learn more patterns while only slightly
    increasing complexity. So in short, the middle part of a bottleneck block (*narrow*)
    is used for efficiency, while the middle part of an inverted residual block (*wide*)
    is used to learn complex patterns. If we try to apply a standard bottleneck on
    MobileNetV2 instead, the computation is going to be even faster, but this might
    cause a drop in accuracy since the model will lose a significant amount of information.
  prefs: []
  type: TYPE_NORMAL
- en: Linear Bottleneck
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The next concept we need to understand is the so-called *linear bottleneck*.
    This one is actually pretty simple since what we essentially do here is just to
    omit the nonlinearity (i.e., the ReLU activation function) in the last layer of
    each inverted residual block. The use of activation functions in neural networks
    at the first place is to allow the network to capture complex patterns. However,
    it will destroy important information instead if we apply it on a low-dimensional
    tensor, especially in the context of MobileNetV2 where the inverted residual block
    projects a high dimensional tensor to a smaller one in the last convolution layer.
    By removing the activation function in the last convolution layer like this, we
    essentially prevent the model from losing important information. Figure 3 below
    shows what the inverted residual block used in MobileNetV2 looks like. Notice
    that ReLU is not applied in the last pointwise convolution, which essentially
    means that this layer behaves somewhat similarly to a standard linear regression
    layer. In addition to this figure, the variables *k* and *k’* denote the number
    of input and output channels, respectively. In the intermediate process, we essentially
    expand the number of channels by *t* before eventually shrink it to *k’*. I’ll
    go into more detail on these variables in the next section.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/91ab54ddaf9fe0de7740ec09a94ce199.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 3\. The inverted residual block used in MobileNetV2\. Notice that we
    don’t apply ReLU after the last pointwise convolution layer [3].
  prefs: []
  type: TYPE_NORMAL
- en: ReLU6
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: So why do we use ReLU6 instead of regular ReLU? In case you’re not yet familiar
    with it, this activation function is actually similar to ReLU, except that the
    output value is capped at 6\. So, any input greater than 6 will be mapped to that
    number. Meanwhile, the behavior for negative inputs is exactly the same. Thus,
    we can simply say that the output of ReLU6 will always be within the range of
    0 to 6 (inclusive). Look at Figure 4 below to better understand this idea.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e2f17bdfb96ffa5b9c7e16a4447317d7.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 4\. The ReLU6 activation function [6].
  prefs: []
  type: TYPE_NORMAL
- en: In standard ReLU, there is a possibility where the input — and therefore the
    output — value goes arbitrarily large, in which it potentially causes instability
    in low-precision environments. Remember that MobileNet is intended to be able
    to work on small devices, in which we know that such devices typically expect
    small numbers to save memory, say 8-bit integer. In this particular case, having
    very large activation values could lead to precision loss or clipping when quantized
    to low-bit representations. Thus, to keep the values small and within a manageable
    range, we can simply employ ReLU6 to do so.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: The Complete MobileNetV2 Architecture
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now let’s take a look at the complete MobileNetV2 architecture in Figure 5 below.
    Just like the first version of MobileNet which mostly consists of depthwise separable
    convolutions, most of the components inside MobileNetV2 are the inverted residual
    blocks with linear bottlenecks we discussed earlier. Every row in the following
    table labeled as *bottleneck* corresponds to a single *stage*, in which each of
    them consists of several inverted residual blocks. Talking about the columns in
    the table, *t* represents *expansion factor* used in the middle part of each block,
    *c* denotes the number of output channels of each block, *n* is the number of
    repeats of the block within that stage, and *s* indicates the stride of the first
    block within the stage.
  prefs: []
  type: TYPE_NORMAL
- en: To better understand this idea, let’s take a closer look at the stage which
    the input shape is 56×56×24\. Here you can see that the corresponding parameters
    of this stage are *t*=6, *c*=32, *n*=3, and *s*=2\. This essentially means that
    the inverted residual stage consists of 3 blocks. All these blocks are identical
    except that the first one uses stride 2, reducing the spatial dimension by half
    from 56×56 to 28×28\. Next, *c*=32 is pretty straightforward as it basically says
    that the number of output channel of each block within the stage is 32\. Meanwhile,
    *t*=6 indicates that the intermediate layer inside the blocks is 6 times wider
    than the input, forming the inverted bottleneck structure. So, in this case the
    number of channels in the process is going to be 32 → 192 → 32\. However, it is
    important to note that the first block within that stage is different, where it
    uses 24 → 144 → 32 structure thanks to the 24-channel input tensor. If we refer
    back to Figure 3, these two structures essentially follow the *k → kt → k’* pattern.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/85c21e25c4d18d73b54da99804f936c4.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 5\. The MobileNetV2 architecture we are about to implement [3].
  prefs: []
  type: TYPE_NORMAL
- en: In addition to the above architecture, here we also have skip-connections placed
    within the inverted residual blocks. This skip-connection will only be applied
    whenever the stride of the block is set to 1\. This is essentially because the
    spatial dimension of the image will change whenever we use stride 2, causing the
    output tensor to have different shape to that of the input. Such a difference
    in tensor shapes will effectively prevent us from performing element-wise summation
    between the original flow and the skip-connection. See Figure 6 below for the
    details. Note that the two illustrations in this figure are basically just the
    visualization of the table in Figure 3.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/40ccac6002dfb59522d5796431f87ac9.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 6\. We don’t implement skip-connection when the stride is set to 2 (i.e.,
    when the layer performs spatial downsampling) [3].
  prefs: []
  type: TYPE_NORMAL
- en: Parameter Tuning
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Similar to MobileNetV1, MobileNetV2 also has two adjustable parameters called
    *width multiplier* and *input resolution*. The former is used to adjust the width
    of the network, while the latter is for changing the resolution of the input image.
    The architecture you see in Figure 5 is the base configuration, where we set the
    width multiplier to 1 and the input resolution to 224×224\. With these two parameters,
    we can tune the model to find a sweet spot that balances accuracy and efficiency
    based on our needs.
  prefs: []
  type: TYPE_NORMAL
- en: We can technically choose arbitrary numbers for the two parameters, but authors
    already provided several predetermined numbers for their experiments. To the width
    multiplier, we can use 0.75, 0.5 or 0.35, in which all of them will make the model
    smaller. For instance, if we use 0.5 then all numbers in column *c* in Figure
    5 will be reduced to half of their defaults. To the input resolution, we can choose
    either 192×192, 160×160, 128×128 or 96×96 as a replacement for 224×224 if you
    want to lower the number of operations during inference.
  prefs: []
  type: TYPE_NORMAL
- en: Some Experimental Results
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Figure 7 below shows what the experimental results done by the authors look
    like. Even though MobileNetV1 is considered lightweight already, MobileNetV2 proved
    that its performance is even better in terms of all metrics compared to its predecessor.
    However, it is necessary to acknowledge that the base MobileNetV2 is not completely
    superior to other lightweight models especially when taking into account all aspects
    at once.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/0fd0244863334b554b1094562fda2017.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 7\. The performance of MobileNetV2 compared to other lightweight models
    on ImageNet dataset [3].
  prefs: []
  type: TYPE_NORMAL
- en: In order to achieve even better accuracy, authors also tried to enlarge the
    model instead by changing the width multiplier to 1.4 for the 224×224 input resolution,
    which in the above figure corresponds to the result in the last row. Doing this
    definitely causes the model complexity as well as the computation time to get
    higher, but in return it allows the model to obtain the highest accuracy. The
    results in Figure 8 also show the similar thing, where all MobileNetV2 variants
    completely outperform the MobileNetV1 counterpart, with the largest MobileNetV2
    obtaining the highest accuracy among all models.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a814f3f37ef7760a9639ffdc348efc8f.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 8\. More results showing the superiority of MobileNetV2 over the existing
    models and how input resolution affects accuracy [3].
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: MobileNetV2 Implementation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Every time I finished learning something, I always wonder if I really understand
    what I just learned. In the case of deep learning, I (almost) always try to implement
    the architecture on my own right after reading the paper just to prove to myself
    that I understand. And here’s the quote that drives me that way:'
  prefs: []
  type: TYPE_NORMAL
- en: '*What I cannot create, I do not understand.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*Richard Feynman*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: This is essentially the reason why I always include the code implementation
    of the paper I am explaining in my post.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: What an intermezzo that was. — Now let’s get back our focus to MobileNetV2\.
    In this section I am going to show you how we can implement the architecture from
    scratch. As always, the very first thing we need to do is to import the required
    modules.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Next, we also need to initialize some configuration variables so that we can
    easily rescale our model if we want to. The two variables I want to highlight
    in the Codeblock 2 below are the `WIDTH_MULTIPLIER` and `IMAGE_SIZE`, where these
    two essentially correspond to the *width multiplier* and *input resolution* parameters
    we discussed earlier. Here I set the two to 1.0 and 224 because I want to implement
    the base MobileNetV2 architecture.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: If we take a look at the architectural details in Figure 5, we can see that
    the rows labeled as *bottleneck* is a group of blocks, which we previously refer
    to as *stage*. Meanwhile, each row labeled as *conv2d* is basically just a standard
    convolution layer. I’ll start with the latter first because that one is easier
    to implement.
  prefs: []
  type: TYPE_NORMAL
- en: The Standard Convolution Layer
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Talking about the rows labeled with *conv2d*, you might be asking why we really
    need to wrap this single convolution layer in a separate class. Can’t we just
    directly use `nn.Conv2d` in the main class? — In fact, it is mentioned in the
    paper that every conv layer is always followed by a batch normalization layer
    before eventually being processed by the ReLU6 activation function. This is actually
    in accordance with MobileNetV1, where it uses the *conv-BN-ReLU* structure. In
    order to make the code cleaner, we can just wrap these layers within a single
    class so that we don’t necessarily need to define all of them repeatedly. Take
    a look at the Codeblock 3 below to see how I create the `Conv` class.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: Every time we want to instantiate a `Conv` instance, we need to pass a value
    for the `first` parameter as shown at the line marked with `#(1)` in the above
    code. If you take a look at the architecture, you will notice that this `Conv`
    layer will be used either before the sequence of inverted residuals or right after
    the sequence. The Figure 9 below displays the architecture again with the two
    convolutions highlighted in pink and green, respectively. Later in the main class,
    if we want to instantiate the pink layer, we can simply set the `first` flag to
    `True`, and if we want to instantiate the green one, we can run it without passing
    any arguments since I’ve set the flag to `False` by default.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/21b54431740ee9ebc11399c73785e5bb.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 9\. The **Conv** class will be used to instantiate these two convolution
    layers [3][6].
  prefs: []
  type: TYPE_NORMAL
- en: Using a flag like this helps us to apply different configurations for the two
    convolutions. When we use `first=True`, we set the convolution layer to accept
    3 input channels (`#(2)`) and produce a 32-channel tensor (`#(3)`). The kernel
    size used will be 3×3 (`#(4)`) with a stride of 2 (`#(5)`), effectively downsampling
    the spatial dimension by half. With this kernel size, we need to set the padding
    to 1 (`#(6)`) to prevent the convolution process from reducing the spatial dimension
    even further. All these configurations are essentially taken from the conv layer
    highlighted in pink.
  prefs: []
  type: TYPE_NORMAL
- en: Meanwhile, when we use `first=False`, this convolution layer will take a tensor
    of 320 channels for the input (`#(7)`) and produce another one having 1280 channels
    (`#(8)`). This green-highlighted layer is a pointwise convolution, hence we need
    to set the kernel size to 1 (`#(9)`). Since here we won’t perform spatial downsampling,
    the stride parameter must be set to 1 as shown at line `#(10)` (notice that the
    input size of this layer and the next one are both 7×7 spatially). Lastly, we
    set the padding to 0 (`#(11)`) because by nature a 1×1 kernel cannot reduce spatial
    dimensions on its own.
  prefs: []
  type: TYPE_NORMAL
- en: As the parameters for the convolution layer have been defined, the next thing
    we do in the `Conv` class above is to initialize the convolution layer itself
    using `nn.Conv2d` (`#(12)`) as well as the batch normalization layer (`#(13)`)
    and the ReLU6 activation function (`#(14)`). Lastly, we assemble these layers
    to form the *conv-BN-ReLU* structure in the `forward()` method (`#(15)`). In addition
    to the above code, don’t forget to apply `WIDTH_MULTIPLIER` when specifying the
    number of input and output channels, i.e., at line `#(3)`, `#(7)`, and `#(8)`,
    so that we can adjust the model size simply by changing the value of the variable.
  prefs: []
  type: TYPE_NORMAL
- en: Now let’s check if we have implemented the `Conv` class correctly by running
    the two test cases below. The one in Codeblock 4 demonstrates the pink layer while
    the Codeblock 5 shows the green one. The shape of the dummy tensor `x` used in
    both tests are set according to the input shapes required by each of the two layers.
    Based on the resulting outputs, we can confirm that our implementation is correct
    since the output tensor shapes match exactly with the expected input shapes of
    the corresponding subsequent layers.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Inverted Residual Block for Stride 2
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As we have completed the class for standard convolution layers, we will now
    talk about the one for the inverted residual blocks. Keep in mind that there are
    cases where we use either stride 1 or 2, which results in a slight difference
    in the block structure (see Figure 6). In this case I decided to implement them
    in two separate classes. In terms of practicality, it might indeed be cleaner
    if we just put them within the same class. However, for the sake of this tutorial
    I feel like breaking them down into two will make things easier to follow. I am
    going to implement the one with stride 2 first since this one is simpler thanks
    to the absence of the skip-connection. See the `InvResidualS2` class in Codeblock
    6 below for the details.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: 'The above class takes three parameters in order to work: `in_channels`, `out_channels`,
    and `t`, as written at line `#(1)`. The first two corresponds to the number of
    input and output channels of the inverted residual block, whereas `t` is the expansion
    factor for determining the channel count of the *wide* part of the block. So,
    what we basically do here is just to make the middle tensors to have `t` times
    more channels than the input. The number of input and output channels themselves
    are adjustable via the `WIDTH_MULTIPLIER` variable we initialized earlier as shown
    at line `#(2)` and `#(3)`.'
  prefs: []
  type: TYPE_NORMAL
- en: What we need to do next is to initialize the layers within the inverted residual
    block according to the structure in Figure 3 and 6\. Notice in the two figures
    that we have a depthwise convolution layer placed between two pointwise convolutions.
    The first pointwise convolution (`#(4)`) is used to expand the channel dimension
    from `in_channels` to `in_channels*t`. Subsequently, the depthwise convolution
    at line `#(5)` is responsible to capture information along the spatial dimension.
    Here we set the kernel size to 3×3 (`#(6)`), which allows the layer to capture
    spatial information from its neighboring pixels. Don’t forget to set the `groups`
    parameter to be the same as the number of input channels to this layer (`#(7)`)
    since we want the convolution operation to be performed independently of each
    channel. Next, we process the resulting tensor with the second pointwise convolution
    (`#(8)`), in which this layer is used to project the tensor to the expected number
    of output channels of the block.
  prefs: []
  type: TYPE_NORMAL
- en: In the `forward()` method, we place the layers one after another. Remember that
    we use the *conv-BN-ReLU* structure except for the last convolution, following
    the convention of linear bottleneck we discussed earlier. Additionally, here I
    also print out the output shape after each layer so that you can clearly see how
    the tensor transforms during the process.
  prefs: []
  type: TYPE_NORMAL
- en: Next, we are going to test whether the `InvResidualS2` class works properly.
    The following testing code simulates the first inverted residual block (*n=1*)
    of the third row in the architecture (i.e., the one having 16×112×112 input shape).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: You can see at the line marked with `#(1)` in the following output that the
    first pointwise convolution successfully expands the channel axis from 16 to 96\.
    The spatial dimension shrinks from 112×112 to 56×56 after the tensor being processed
    by the depthwise convolution layer in the middle (`#(2)`). Lastly, our second
    pointwise convolution compresses the number of channels to 24 as written at line
    `#(3)`. This final tensor dimension is now ready to be passed through the next
    inverted residual block within the same stage.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Inverted Residual Block for Stride 1
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The code used for implementing the inverted residual block with stride 1 is
    mostly similar to the one with stride 2\. See the `InvResidualS1` class in Codeblock
    8 below.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: The first difference we have here is definitely the `stride` parameter itself,
    especially the one belongs to the depthwise convolution layer at line `#(3)`.
    By setting the `stride` parameter to 1 like this, the spatial output dimension
    of this inverted residual block is going to be the same as the input.
  prefs: []
  type: TYPE_NORMAL
- en: Another thing that we didn’t do previously is creating instance attributes for
    `in_channels` and `out_channels` as shown at lines `#(1)` and `#(2)`. We do this
    now because later on we will need to access these values from the `forward()`
    method. This is actually just a basic OOP concept, where if we don’t assign them
    to `self`, then they will only exist locally within the `__init__()` method and
    won’t be available to other methods in the class.
  prefs: []
  type: TYPE_NORMAL
- en: Inside the `forward()` method itself, what we need to do first is to check whether
    the number of input and output channels are the same (`#(4)`). If so, we will
    keep the original input tensor (`#(5)`) to implement the skip-connection, in which
    this tensor will be element-wise summed with the one from the main flow (`#(6)`).
    This tensor dimensionality checking is performed because we need to ensure that
    the two tensors to be summed have the exact same size. We indeed have guaranteed
    the spatial dimension to remain unchanged since we have set all the three convolution
    layers to use stride 1\. However, there is still a possibility that the number
    of output channels differs from the input, just like the first block within the
    stages highlighted in purple, blue and orange in Figure 10 below. In such cases,
    skip-connection will not be applied because it’s just impossible to perform element-wise
    summation on tensors with different shapes.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b9ca904efbd438d4822ff2f472eeca10.png)'
  prefs: []
  type: TYPE_IMG
- en: Figure 10\. Despite not performing spatial downsampling, there is no skip-connection
    within the first block in the three highlighted stages since the number of input
    and output channels are different [3][6].
  prefs: []
  type: TYPE_NORMAL
- en: Now let’s test the `InvResidualS1` class by running the Codeblock 9 below. Here
    I am going to simulate the second inverted residual block (*n*=2) of the third
    row in the architecture, in which this is actually just the continuation of the
    previous test case. Here you can see that the dummy tensor we use has the exact
    same shape as the one we obtained from Codeblock 7, i.e., 24×56×56.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: And below is what the resulting output looks like. It is clearly seen here that
    the network indeed follows the *narrow → wide → narrow* structure, which in this
    case is 24 → 144 → 24\. In addition to this, since the spatial dimensions of the
    input and the output tensors are the same, we can technically stack this inverted
    residual block as many times as we want.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: The Entire MobileNetV2 Architecture
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As we have completed defining the `Conv`, `InvResidualS2` and `InvResidualS1`
    classes, we can now assemble them all to construct the entire MobileNetV2 architecture.
    Look at the Codeblock 10 below to see how I do that.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: Despite being quite long, I think the above code is pretty straightforward since
    what we basically do here is just to place the blocks according to the given architectural
    details. However, I really want you to pay attention to the number of block repeats
    within a single stage (*n*) as well as whether or not the first block in a stage
    performs downsampling (*s*). This is because the architecture doesn’t seem to
    follow a specific pattern. There is a case where the block is repeated four times,
    there are other cases where the repeats is done two or three times, and there
    is even a stage that consists of a single block only. Not only that, it is also
    unclear under what conditions authors decided to use stride 1 or 2 for the first
    block in the stage. However, I believe that this final architecture was obtained
    based on their internal design iterations and experiments that are not discussed
    in the paper.
  prefs: []
  type: TYPE_NORMAL
- en: Going back to the code, after the stages have been initialized, what we need
    to do next is to initialize the remaining layers, namely an average pooling layer
    (`#(1)`), a dropout layer (`#(2)`) and a linear layer (`#(3)`) for the classification
    head. If you go back to the architectural details, you will notice that the final
    layer should be a pointwise convolution, not a linear layer like this. In fact,
    in the case when the spatial dimension of the input tensor is 1×1, a pointwise
    convolution and a linear layer are equivalent. So, it’s basically fine to use
    either one.
  prefs: []
  type: TYPE_NORMAL
- en: To ensure our MobileNetV2 is working properly, we can run the Codeblock 11 below.
    Here we can see that this class instance runs without any errors. More importantly,
    the output shape also matches exactly with the architecture specified in the paper.
    This confirms that our implementation is correct, and thus ready for training — just
    don’t forget to adjust the output size of the final layer to match the number
    of classes in your dataset.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: Alternatively, it is also possible to test our MobileNetV2 model using the `summary()`
    function from `torchinfo`, which will also show us the number of parameters contained
    within each layer. If you scroll down all the way to the end of the output, you’ll
    see that this model with default *width multiplier* has 3,505,960 trainable params.
    This number is different from the one disclosed in the paper, where according
    to Figure 7 it should be 3.4 million. However, if we go to the official PyTorch
    documentation [7], it says that the parameter count of this model is 3,504,872,
    which is very close to our implementation. Let me know in the comments if you
    know which parts of the code I should change to make this number match exactly
    with the one from PyTorch.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Ending
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: And that’s pretty much everything about MobileNetV2\. I do encourage you to
    explore this architecture on your own — at least by actually training it on an
    image classification dataset. Don’t forget to play around with the *width multiplier*
    and the *input resolution* parameters to find the right balance between prediction
    accuracy and computational efficiency. You can also find the code used in this
    article in my GitHub repository [8] by the way.
  prefs: []
  type: TYPE_NORMAL
- en: I hope you learned something new today. Thanks for reading!
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
