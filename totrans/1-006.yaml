- en: How to Create an ML-Focused Newsletter
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/how-to-create-an-ml-focused-newsletter/](https://towardsdatascience.com/how-to-create-an-ml-focused-newsletter/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1764962074673" class="mdspan-comment">Newsletters are important</mdspan>
    resources you can utilize to follow all the latest trends within AI. Personally,
    I follow both TLDR AI and Alphasignal, which both provide daily summaries on the
    latest news within AI. However, I also recently started my own AI-focused newsletter,
    focusing on the latest trends within AI, and the topics I myself write articles
    on.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: In this article, I’ll provide a high-level overview of why and how I started
    my AI-focused newsletter, including both my motivation and reasoning for starting
    the newsletter, and the tools and approaches I use to create my newsletter. I
    aim to inspire you to create a newsletter, providing more resources to the AI
    community, which has experienced unprecedented development in the last few years.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/1fe42d2948c21ecd8ccde11090023fa4.png)'
  id: totrans-4
  prefs: []
  type: TYPE_IMG
- en: This infographic covers the main contents of this article. I’ll discuss why
    you should create a newsletter, how to create the newsletter, and how to acquire
    signups for your newsletter. I’ll be focusing on creating AI-focused newsletters.
    Image by Gemini
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: Why you should make a newsletter
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'I think newsletters are incredible resources for the AI community. You get
    to follow your favorite creators and pay attention to what they are working on.
    I think this is important for:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: Inspiration
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Learning
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Staying up to date
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I particularly think inspiration is one of the most important aspects. Reading
    different newsletters keeps me up to date, but most of all it gives me different
    ideas for what I want to implement, or allows me to see problems from different
    perspectives, which is incredibly important in my day-to-day work as a senior
    data scientist at a startup.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: 'I believe creating a good newsletter is beneficial both for the creator and
    the reader. The creator gets:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
- en: People follow them, becoming a thought leader on a topic
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Monetary benefits
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Learning: Writing about your experiences is super useful to deepen your understanding'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'While the reader gets:'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: Access to free or cheap high-quality resources
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Interact with a community
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Become inspired for their own work
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Thus, creating a good newsletter is positive for all sides, and something you
    should consider if you’re particularly interested in certain topics
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: AI-focused newsletter – How to create it
  id: totrans-21
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I’ve now covered why you should create a newsletter, highlighting how it’s beneficial
    for both the creator of the newsletter and the subscribed reader of the newsletter.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: Creating your own newsletter doesn’t have to be super difficult, and naturally,
    you should start simple and then iterate on your newsletter to improve it.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: 'I simply started my own newsletter by discussing previous articles I had written,
    providing a summary and taxonomy of the articles, and some of my own thoughts
    and reflections on the articles. I think reflecting on your previous content is
    very valuable, both reading feedback from readers, but also reading through older
    content, and noticing the improvements you’re making, to always strive to be a
    better writer or creator. Below you can see an outline of my first newsletter:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 我只是通过讨论我之前写过的文章、提供文章的摘要和分类，以及我对文章的一些个人思考和反思来开始我的新闻通讯。我认为反思你之前的内容非常有价值，不仅包括阅读读者的反馈，还包括阅读旧内容，注意到你正在取得的进步，并始终努力成为一个更好的作家或创作者。以下是我第一份新闻通讯的概要：
- en: '![](../Images/f86327c154c4939cf3d8c0797201e74e.png)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/f86327c154c4939cf3d8c0797201e74e.png)'
- en: This image shows part of my first newsletter. This newsletter consisted of all
    the articles I had written in the last month, where I divided the articles into
    different categories like AI Agents and Vision Language Models (and a particular
    favorite topic of mine). I provided the title and links to all my articles, and
    some of my own thoughts around AI agents and vision language models. Image by
    the author.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 这张图片展示了我第一份新闻通讯的一部分。这份新闻通讯包含了我上个月所写的所有文章，我将文章分为不同的类别，如AI代理和视觉语言模型（以及我特别喜欢的主题）。我提供了所有文章的标题和链接，以及我对AI代理和视觉语言模型的一些个人思考。图片由作者提供。
- en: '* * *'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: I’m creating my newsletter using [MailerLite](https://mailerlite.com/), which
    allows you to organize your list of subscribers (I’ll cover how to acquire subscribers
    in the next section) and create a newsletter you send out to your subscribers.
    They also provide forms you can use to have people sign up for your newsletter.
    I am not sponsored by MailerLite.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 我正在使用[MailerLite](https://mailerlite.com/)创建我的新闻通讯，它允许你组织你的订阅者列表（我将在下一节中介绍如何获取订阅者），并创建你发送给订阅者的新闻通讯。他们还提供了你可以用来让人们注册你的新闻通讯的表单。我不是MailerLite的赞助商。
- en: 'To create the actual newsletter, I create an HTML file in Cursor. I provide
    Cursor with:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 要创建实际的新闻通讯，我在Cursor中创建一个HTML文件。我为Cursor提供：
- en: Links to all the articles I want to refer to with titles
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 指向所有我想要引用的文章的链接，并附上标题
- en: The text I want to include in my newsletter (i.e., my thoughts on AI agents
    and vision language models)
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我想要包含在新闻通讯中的文本（即我对AI代理和视觉语言模型的看法）
- en: Paths to images I want to include, such as the image you see in my newsletter
    snippet above
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我想要包含的图片路径，例如我在上面的新闻通讯片段中看到的图片
- en: Cursor then takes care of setting up the outline of the newsletter, the bullet
    point lists, and the general design of the newsletter. Writing the newsletter
    in HTML locally is a lot faster.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 光标（Cursor）负责设置新闻通讯的大纲、项目符号列表以及新闻通讯的整体设计。在本地用HTML编写新闻通讯要快得多。
- en: 'This follows the same principle I follow for my own website as well:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 这也遵循了我为自己的网站所遵循的相同原则：
- en: 'Never use drag and drop editors. Instead: look for a way to code it up yourself
    using any AI agent'
  id: totrans-35
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 永远不要使用拖放编辑器。相反：寻找一种方法，使用任何AI代理自己编写代码
- en: Coding it yourself is so simple nowadays with tools like Claude Code or Cursor,
    that you should essentially avoid drag-and-drop editors at all costs
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 现在使用像Claude Code或Cursor这样的工具自己编写代码变得如此简单，以至于你应该不惜一切代价避免使用拖放编辑器
- en: I applied this same concept in my article on [How to Code Your Own Website with
    AI](https://towardsdatascience.com/how-to-code-your-own-website-with-ai/).
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 我在我的文章[如何用AI编写自己的网站](https://towardsdatascience.com/how-to-code-your-own-website-with-ai/)中应用了同样的概念。
- en: How to get signups
  id: totrans-38
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何获取注册用户
- en: 'Now that you know why you should make a newsletter and how to make it, you
    need to have people sign up for the newsletter. This can be challenging, but you
    should always strive to follow the main principle:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你已经知道了为什么你应该制作新闻通讯以及如何制作它，你需要让人们注册新闻通讯。这可能具有挑战性，但你应该始终努力遵循主要原则：
- en: If you create high quality content, the viewership will come by itself
  id: totrans-40
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果你创建高质量的内容，观众自然会来
- en: If you keep writing high-quality articles and directing your readers to continue
    following you through your newsletter, you’re essentially guaranteed increased
    viewership over time.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你持续撰写高质量的文章，并通过你的新闻通讯引导读者继续关注你，那么随着时间的推移，你基本上可以保证观众的增长。
- en: 'There are, however, also some specific techniques you can use to increase signups
    more:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，还有一些具体的技巧你可以使用来增加注册用户：
- en: Link to your newsletter on your online content (I recommend linking at the end
    of your articles, to ensure your content stays pure, and then show a CTA to your
    newsletter at the end of your content)
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在您的在线内容中链接到您的通讯（我建议在文章末尾链接，以确保您的内容保持纯净，然后在内容末尾展示对通讯的CTA）
- en: Provide other resources, such as Webinars and eBooks, and have people sign up
    for your newsletter for free access to your content
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提供其他资源，例如网络研讨会和电子书，并让人们免费注册您的通讯，以获取您内容的免费访问权限
- en: 'Guest posts: You can guest post some of your articles to attract readers from
    other channels'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 来宾文章：您可以将一些文章作为来宾文章发表，以吸引来自其他渠道的读者
- en: 'These are the approaches I use and recommend. Importantly, the techniques are:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是我使用并推荐的策略。重要的是，这些技术是：
- en: Not annoying, or in a way lowering the quality of your other content. If readers
    only want to read your article without distraction, there’s nothing preventing
    them from that
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 不会令人烦恼，或者以降低您其他内容质量的方式。如果读者只想阅读您的文章而不受干扰，没有任何东西阻止他们这样做
- en: The reader is benefiting from signing up, both through high-quality newsletter
    content and with free access to other content, such as eBooks and webinars
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 读者通过注册受益，既可以通过高质量的通讯内容，也可以通过免费访问其他内容，例如电子书和网络研讨会
- en: It’s incredibly important that you always make sure the user benefits from signing
    up for your newsletter.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 确保用户从注册您的通讯中受益是极其重要的。
- en: Conclusion
  id: totrans-50
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this article, I’ve discussed why and how to create a technical newsletter.
    Having a newsletter is good because both you, as the creator, and the reader benefit
    from the contents of the newsletter. It’s important to always keep in mind that
    the content you create, in some way, benefits your readers, for example, through
    easy access to high-quality resources. I also discussed how I make my newsletters
    through Cursor by creating HTML files and then pasting them into MailerLite to
    send them to my subscribers.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我讨论了为什么以及如何创建技术通讯。拥有一个通讯是好的，因为您作为创作者和读者都能从通讯的内容中受益。始终牢记您创建的内容以某种方式使读者受益是很重要的，例如，通过轻松访问高质量资源。我还讨论了我是如何通过Cursor创建HTML文件，然后将它们粘贴到MailerLite中发送给订阅者的方式来制作我的通讯。
- en: I believe having a newsletter is an incredible resource, both for creators and
    readers, and is something that will become more and more important when we enter
    a period of time where it’s harder and harder to separate AI content from real
    human-made content. Having an authentic newsletter with content written by humans
    is a good way to ensure authenticity.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为拥有一个通讯是创作者和读者都难以置信的资源，而且在我们进入一个越来越难以区分人工智能内容与真实人类创造内容的时代，它将变得越来越重要。拥有一个由人类撰写的真实通讯内容是确保真实性的好方法。
