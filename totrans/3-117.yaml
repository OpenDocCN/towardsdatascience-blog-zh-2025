- en: 'Linear Programming: Managing Multiple Targets with Goal Programming'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 线性规划：使用目标规划管理多个目标
- en: 原文：[https://towardsdatascience.com/linear-programming-managing-multiple-targets-with-goal-programming/](https://towardsdatascience.com/linear-programming-managing-multiple-targets-with-goal-programming/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/linear-programming-managing-multiple-targets-with-goal-programming/](https://towardsdatascience.com/linear-programming-managing-multiple-targets-with-goal-programming/)
- en: This is the <mdspan datatext="el1743707284969" class="mdspan-comment">sixth</mdspan>
    (and likely last) part of a linear programming series I’ve been writing. With
    the core concepts covered by the prior articles, this article focuses on goal
    programming which is a less frequent linear programming (LP) use case. Goal programming
    is a specific linear programming setup that can handle the optimization of multiple
    objectives in a single LP problem.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我一直在撰写的线性规划系列文章的第六部分（也可能是最后一部分）。在前面的文章中，我们已经覆盖了核心概念，这篇文章将重点介绍目标规划，这是一种较少见的线性规划（LP）用例。目标规划是一种特定的线性规划设置，可以在单个LP问题中处理多个目标的优化。
- en: 'By the end of this article, you’ll understand:'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 到这篇文章结束时，你将了解：
- en: '**1.** Definition of goal programming and when it should be used'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: '**1.** 目标规划的定义及其适用场景'
- en: '**2.** The weighted goal programming approach — illustrated with an example'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: '**2.** 加权目标规划方法——通过示例说明'
- en: '**3.** The preemptive goal programming approach — illustrated with an example'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: '**3.** 预先目标规划方法——通过示例说明'
- en: '**Definition and Use Case of Goal Programming**'
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**目标规划的定义和用例**'
- en: Goal programming is a special case of linear programming that allows for multiple — often
    conflicting — objectives to be balanced. With regular LP problems, you pick a
    single metric to optimize (minimize or maximize) and set constraints to ensure
    that the optimal solution is feasible. Goal programming is a technique that allows
    for multiple objective metrics to be targeted at the same time.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 目标规划是线性规划的一个特殊案例，允许平衡多个——通常是冲突的——目标。在常规的LP问题中，你选择一个单一指标进行优化（最小化或最大化）并设置约束以确保最优解是可行的。目标规划是一种技术，允许同时针对多个目标指标进行优化。
- en: The ‘mindset’ of goal programming is fundamentally different from plain vanilla
    LP problems. Basic LP searches for ways to get as little or as much of a **single**
    metric as possible — e.g., maximize profit or minimize waste  — subject to constraints.
    Often conflicting priorities will be found in the objective function *or* the
    constraints. For example, maximize profit (objective) subject to a maximum amount
    of waste (constraint). With goal programming, we can move important constraint
    metrics into the objective function so we can optimize on them rather than just
    constraining them. We can maximize profit and minimize waste at the same time!
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 目标规划的心态与普通的线性规划问题有根本的不同。基本的LP寻找尽可能少或尽可能多的**单一**指标的方法——例如，最大化利润或最小化浪费——在约束条件下。在目标函数或约束中经常会发现相互冲突的优先级。例如，在最大化的利润（目标）的同时，受到最大浪费量（约束）的限制。在目标规划中，我们可以将重要的约束指标移动到目标函数中，这样我们就可以对它们进行优化，而不仅仅是约束它们。我们可以同时最大化利润和最小化浪费！
- en: 'Now is a good time to establish the example we will explore for the rest of
    the article:'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 现在是建立我们将探索整篇文章的示例的好时机：
- en: Let’s imagine that we manage a factory that makes clothing. Our factory can
    make pants, shirts, and dresses. Each article of clothing has costs, profit, and
    waste associated with their production. We want to create a production plan that
    will make a certain level of profit and also waste below a certain quantity due
    to an environmental commitment. Let’s say that we want to make $150k a month in
    profit and we also want to waste less than 20k yards of fabric. In addition to
    our goals, we can’t spend more than $50k in materials and labor.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们设想我们管理一家服装制造工厂。我们的工厂可以生产裤子、衬衫和连衣裙。每件服装的生产都与成本、利润和浪费相关。我们希望制定一个生产计划，既能实现一定的利润水平，又能因环保承诺而将浪费控制在一定数量以下。比如说，我们希望每月实现15万美元的利润，同时希望浪费的布料不超过2万码。除了我们的目标外，我们也不能在材料和人工上花费超过5万美元。
- en: The example above sounds a lot like a regular linear programming problem right?
    Well, the twist is that we can’t make $150k in profit and waste less than 20k
    of yards at the same time. In other words, there would be no feasible solution
    if we were to plug this into a regular linear programming problem. Typically,
    the goals set in the problems cannot all be achieved with a single solution, otherwise
    there wouldn’t be a point in using goal programming. We would just use regular
    old linear programming with our goals as constraints. The real value of goal programming
    is that it can create a compromise between conflicting goals when regular linear
    programming would yield an infeasible solution.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 上述示例听起来很像一个常规线性规划问题，对吧？好吧，转折点是，我们无法同时赚取$150k的利润和浪费少于20k码的布料。换句话说，如果我们把这个放入一个常规线性规划问题中，将没有可行的解决方案。通常，问题中设定的目标不能通过单一解决方案实现，否则使用目标规划就没有意义了。我们只会使用常规的线性规划，并将目标作为约束。目标规划的实际价值在于，它可以在常规线性规划产生不可行解的情况下，在相互冲突的目标之间创造一种妥协。
- en: The real value of goal programming is that it can create a compromise between
    conflicting goals when regular linear programming would yield an infeasible solution.
  id: totrans-13
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 目标规划的实际价值在于，它可以在常规线性规划产生不可行解的情况下，在相互冲突的目标之间创造一种妥协。
- en: 'How does goal programming balance and compromise with conflicting goals? There
    are two popular approaches: (1) weighted and (2) preemptive. We’ll cover these
    in detail in the following sections.'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 目标规划如何平衡和妥协以解决冲突的目标？有两种流行的方法：（1）加权方法和（2）优先方法。我们将在接下来的章节中详细介绍这些方法。
- en: '**The weights approach**'
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**权重方法**'
- en: Here, we’ll dive into the details of the weights approach. The weights method
    has a single objective function and runs a single optimization based on (you guessed
    it) weights! The fact that only one optimization is run under the weights method
    may seem like a given — but the preemptive method actually runs multiple linear
    programming optimizations. We’ll get to that in the next section…
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们将深入了解权重方法的细节。权重方法有一个单一的目标函数，并基于（不出所料）权重运行单个优化！在权重方法下只运行一个优化可能看起来是理所当然的——但实际上，优先方法实际上运行多个线性规划优化。我们将在下一节中讨论这一点…
- en: The weights method has specific targets or goals for multiple metrics — e.g.,
    make at least $150k in profit selling clothes or waste no more than 20k yards
    of fabric. For regular LP, we want to fully optimize. For the weights method of
    goal programming, we want to get as close to hitting goals as possible — after
    we reach a goal, the optimization doesn’t see more benefit in further maximization
    or minimization, so it prioritizes hitting the next most important goal. If this
    seems confusing now, don’t worry it will make more sense as we get into the example.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 权重方法针对多个指标有特定的目标和目标——例如，通过卖衣服至少赚取$150k的利润或浪费不超过20k码的布料。对于常规线性规划（LP），我们希望实现完全优化。对于目标规划的权重方法，我们希望尽可能接近实现目标——一旦达到目标，优化过程就不会从进一步的最大化或最小化中获得更多收益，因此它优先考虑实现下一个最重要的目标。如果现在这听起来很困惑，别担心，随着我们进入示例，它将变得更加清晰。
- en: The **objective function** for the weights approach is specially formulated
    to minimize the *weighted* differences between a metric’s goal and the actual
    value of the metric. Let’s jump to our example from above — i.e., we want to make
    $150k in profit and waste less than 20k yards of raw material. Our objective is
    to minimize how far off we are from both of these goals.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 权重方法的**目标函数**专门制定，以最小化指标目标与指标实际值之间的**加权**差异。让我们回到我们上面的例子——即，我们希望赚取$150k的利润并浪费少于20k码的原材料。我们的目标是尽可能减少我们偏离这两个目标的情况。
- en: 'Here is the mathematical formulation for this objective:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是这个目标函数的数学公式：
- en: '![](../Images/4fca16786387085da61dde96bbd89c8d.png)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/4fca16786387085da61dde96bbd89c8d.png)'
- en: Where w1 and w2 are assigned weights and P and W are how far we miss our profit
    and waste goals respectively
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 其中，w1和w2被分配了权重，P和W分别表示我们偏离利润目标和浪费目标有多远。
- en: With our objective function set up, we need to define our constraints. We will
    have two types of constraints (1) goal related constraints and (2) regular linear
    programming constraints (the same kind of constraints you would find in plain
    vanilla LP). Let’s talk about the goal related constraints first.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 在设置我们的目标函数后，我们需要定义我们的约束条件。我们将有两种类型的约束（1）目标相关约束和（2）常规线性规划约束（你会在普通的线性规划中找到的相同类型的约束）。让我们首先谈谈目标相关约束。
- en: We will need to create two things to set up our goal related constraints, (1)
    profit and waste functions and (2) multiple **slack variables**. Let’s go through
    these one at a time.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要创建两个东西来设置与目标相关的约束，(1)利润和浪费函数和(2)多个**松弛变量**。让我们逐一讨论这些。
- en: 'The profit and waste functions are very straight forward. They combine our
    decision variables together to calculate total profit and total waste give a specific
    solution. Below are the formulas that tie profit and waste to the number of pants,
    shirts and dresses we produce:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 利润和浪费函数非常直接。它们将我们的决策变量结合起来，计算特定解决方案的总利润和总浪费。以下是将利润和浪费与生产的裤子、衬衫和裙子的数量联系起来的公式：
- en: '![](../Images/674cfe67c3e674dfdf7d54b76faaf25d.png)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/674cfe67c3e674dfdf7d54b76faaf25d.png)'
- en: profit and waste functions
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 利润和浪费函数
- en: 'With our profit and waste functions established, let’s start talking about
    our slack variables. In goal programming, slack variables are used to measure
    how far a solution is from hitting a goal. In our example, the variables *P* and
    *W* are both slack variables — they represent how much lower our profit is compared
    to our profit goal and how much higher our waste is compared to our waste goal.
    Slack variables are embedded in constraints. Below are the constraint functions
    for our profit and waste goals — again, the *P’s* and the *W’s* are our slack
    variables:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的利润和浪费函数建立之后，让我们开始讨论我们的松弛变量。在目标规划中，松弛变量用于衡量解决方案距离达到目标有多远。在我们的例子中，变量*P*和*W*都是松弛变量——它们代表我们的利润与利润目标相比降低了多少，以及我们的浪费与浪费目标相比增加了多少。松弛变量嵌入在约束条件中。以下是我们的利润和浪费目标的约束函数——同样，*P*和*W*是我们的松弛变量：
- en: '![](../Images/2416e9dc8da937adf48f1ae466dc4d2d.png)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/2416e9dc8da937adf48f1ae466dc4d2d.png)'
- en: P+, P-, W+ and W- are slack variables, profit and waste are functions established
    with the formulas above
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: P+，P-，W+和W-是松弛变量，利润和浪费是使用上述公式建立的功能
- en: 'Note that we have plus and minus slack variables — this allows us to miss the
    goal on either end. We only want to penalize the slack variable that goes in the
    opposite direction of our goal (e.g., we don’t want to penalize *more* profit
    than our goal, we only want to penalize *less* profit) — that is why only one
    slack variable per goal is in the objective function. With this new notation,
    let’s rewrite our objective function:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，我们有正松弛变量和负松弛变量——这允许我们在任一端错过目标。我们只想惩罚与我们目标方向相反的松弛变量（例如，我们不想惩罚超过我们目标的利润，我们只想惩罚利润较少的情况）——这就是为什么每个目标只有一个松弛变量在目标函数中。用这种新的表示法，让我们重写我们的目标函数：
- en: '![](../Images/0632fcd1e8bedff4ec9c32b652ec93d6.png)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0632fcd1e8bedff4ec9c32b652ec93d6.png)'
- en: Objective function with updated slack variable notation
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 更新松弛变量的目标函数表示
- en: We have now done all of the special work for goal programming. The last thing
    we need to do is quickly add our plain vanilla budget constraint. We are using
    a regular constraint for our budget because, in our example, it is a hard constraint.
    Unlike with profit and waste, we cannot violate the budget.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在已经完成了目标规划的所有特殊工作。最后我们需要做的是快速添加我们的普通预算约束。我们使用常规约束来处理预算，因为，在我们的例子中，它是一个硬约束。与利润和浪费不同，我们不能违反预算。
- en: '![](../Images/acd1bd8177dd35cf3483010025df4892.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/acd1bd8177dd35cf3483010025df4892.png)'
- en: Regular (not goal programming related) budget constraint
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 普通预算约束（与目标规划无关）
- en: Now, we have a fully specified goal programming problem. Let’s set it up in
    Python and solve!
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们已经完全指定了目标规划问题。让我们在Python中设置它并解决它！
- en: '[PRE0]'
  id: totrans-37
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'This optimization recommends we make 0 pants, 5,000 shirts and 0 dresses. We
    make $150k in profit which matches our goal exactly and we waste 50k yards of
    fabric which exceeds our max waste by 30k yards. The full results are printed
    by the code and shown below:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 这个优化建议我们生产0条裤子，5000件衬衫和0条裙子。我们赚取了15万美元的利润，正好符合我们的目标，但我们浪费了5万千克的布料，超过了最大浪费量3万千克。完整的成果由代码打印并如下所示：
- en: '![](../Images/b404c9f9b99559d9cc5a61567e7c93b8.png)'
  id: totrans-39
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b404c9f9b99559d9cc5a61567e7c93b8.png)'
- en: results of optimization run with equal weights
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 等权重优化运行的结果
- en: Now that we’ve got the basic structure of the weights approach down, let’s actually
    talk about the *weights*! In our first example, we gave equal weights to a dollar
    of profit and to a yard of waste. This probably doesn’t make a lot of sense because
    they are different units. Setting the weights is a subjective decision to be made
    by the practitioner. For our example, we’ll decide that wasting 1.5 yards of fabric
    is as bad as making $1 of profit is good. In other words, we’ll increase the weight
    of fabric waste to 1.5 in our objective function.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经掌握了加权方法的基本结构，让我们真正谈谈*权重*！在我们的第一个例子中，我们给利润和浪费的每一美元相同的权重。这可能没有太多意义，因为它们是不同的单位。设置权重是实践者需要做出的主观决定。在我们的例子中，我们将决定浪费1.5码的布料和赚取1美元的利润一样糟糕。换句话说，我们将布料浪费的权重增加到我们的目标函数中的1.5。
- en: '[PRE1]'
  id: totrans-42
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'The optimization with the updated rates recommends we make about 8,572 pants,
    7,143 shirts and 0 dresses. With this solution, we generate $107k in profit (which
    is a goal miss of $43k) and we waste 20,000 yards of fabric which matches our
    goal exactly. The full results are printed by the code and shown below:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 使用更新后的比率进行的优化建议我们制作大约8,572条裤子，7,143件衬衫和0件连衣裙。采用这种方案，我们产生了107k的利润（这比目标少了43k），并且浪费了20,000码的布料，这正好符合我们的目标。完整的成果由代码打印出来，如下所示：
- en: '![](../Images/b00249ac06f0c6def5df7a26e210aafd.png)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/b00249ac06f0c6def5df7a26e210aafd.png)'
- en: Results of optimization run with 1.5 weight on fabric waste
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 在布料浪费上使用1.5权重进行的优化结果
- en: Clearly, shifting the weights of the goals can have large impact on the optimization
    results. We need to carefully set our weights to adequately balance the relative
    importance of our goals!
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 显然，调整目标权重可以对优化结果产生重大影响。我们需要仔细设置我们的权重，以充分平衡我们目标之间的相对重要性！
- en: Now that we have a solid understanding of how the weighted approach works, let’s
    shift to talking about the goal programming with the preemptive approach.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经对加权方法的工作原理有了坚实的理解，让我们转向讨论带有预防性方法的目標规划。
- en: '**Preemptive Approach**'
  id: totrans-48
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**预防性方法**'
- en: While the weights method balances goals using weights in the objective function,
    the preemptive method gives hierarchical priority to goals through iterative optimizations.
    That’s a lot of words, don’t worry, we’ll break it down!
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然权重方法通过目标函数中的权重平衡目标，但预防性方法通过迭代优化给予目标层次优先级。这些话听起来很多，别担心，我们会一步步解释！
- en: 'Here are the steps to the preemptive approach:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是预防性方法的步骤：
- en: '**1\.** Run a regular linear programming optimization on your first goal — e.g.,
    maximize profit'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: '**1.** 对你的第一个目标运行常规线性规划优化——例如，最大化利润'
- en: '**2.** Save the objective value from that run'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: '**2.** 保存那次运行的目标值'
- en: '**3.** Run another regular linear programming on the next most important goal — e.g.,
    minimize waste — but, add the objective value from the last run as a constraint'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: '**3.** 对下一个最重要的目标运行另一个常规线性规划——例如，最小化浪费——但是，添加上一次运行的目标值作为约束'
- en: '**4.** Repeat the process until you have gone through all goal metrics'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: '**4.** 重复此过程，直到你已经完成了所有目标指标'
- en: Two important features of the preemptive method are (1) it prioritizes goals
    by rank and (2) the objective value of a higher importance goal cannot be decreased
    (because of the hard constraint) when optimizing lower priority goals. Let’s go
    over an example to build intuition.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 预防性方法有两个重要特性：(1)它通过排名优先考虑目标，(2)在优化较低优先级的目标时，较高重要性目标的客观值不能降低（因为硬约束）。让我们通过一个例子来建立直观理解。
- en: 'For our example, let’s say that profit is the most important goal and minimizing
    waste is the second. We’ll start out by running a plain vanilla optimization that
    maximizes profit:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我们的例子，让我们假设利润是最重要的目标，最小化浪费是第二重要的。我们将从运行一个简单的优化开始，该优化最大化利润：
- en: '[PRE2]'
  id: totrans-57
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'The results of the profit maximizing LP problem are below:'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 最大化利润的LP问题的结果如下：
- en: '![](../Images/66acfa8647636038210d74f01381c3d7.png)'
  id: totrans-59
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/66acfa8647636038210d74f01381c3d7.png)'
- en: Profit maximization
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 利润最大化
- en: So, our objective function says to make 50k shirts and collect a profit of $150k.
    This was only the first optimization we are going to run though! Following the
    algorithm outlined above, we will now run another LP that minimizes waste but,
    we will add a constraint of profit ≥ $150k to ensure we don’t get a worse profit.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们的目标函数表明要制作50k件衬衫并赚取150k美元的利润。这只是我们将要运行的第一个优化！按照上述算法，我们现在将运行另一个LP，该LP最小化浪费，但我们将添加利润≥150k的约束，以确保我们不会得到更差的利润。
- en: '[PRE3]'
  id: totrans-62
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'And here are the results of this final optimization:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是这次最终优化的结果：
- en: '![](../Images/4c60116f1c75d1c87bfdfa3308a5dbf2.png)'
  id: totrans-64
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/4c60116f1c75d1c87bfdfa3308a5dbf2.png)'
- en: results of waste minimizing optimization
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 最小化浪费的优化结果
- en: The astute observer will notice that the optimization is the exact same 😅. This
    can often be the case with the preemptive method. The constraint of previously
    optimized goals can be very restrictive. The only time when iterative optimizations
    are different is if there are multiple ways to get the optimal values for previous
    goals. For example, if there were two ways to get $150k in profit; one had more
    waste and the other had less, our second iteration would return the results of
    the solution with the lower waste. In the preemptive method, there is no trade
    off between the goals. Even if there was a solution that made $149k in profit
    with 0 yards of waste, the preemptive method would always choose $150k in profit
    with 50k yards of waste. The extra $1000 of profit is infinitely more important
    than any amount of wasted fabric.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 聪明的观察者会注意到优化过程是完全相同的 😅。这通常是先发制人方法的情况。先前优化目标约束可能非常限制性。迭代优化唯一不同的时间是在存在多种方式可以得到先前目标最优值时。例如，如果有两种方式可以得到15万美元的利润；一种方式浪费更多，另一种方式浪费更少，我们的第二次迭代将返回低浪费的解决方案的结果。在先发制人方法中，目标之间没有权衡。即使有一个解决方案可以赚取14.9万美元的利润且浪费0码布料，先发制人方法也会始终选择赚取15万美元的利润，浪费5万码布料。额外的1000美元利润比任何数量的浪费布料都更重要。
- en: The preemptive method should be used when goals are clearly prioritized, and
    there is no substitution between them — meaning no amount of success in lower
    priority goals can compensate for reduced optimization in higher priority ones.
    When used correctly, the preemptive method can help optimize a primary goal while
    trying to find good solutions for lower priority goals very effectively.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 当目标明确优先级，且它们之间没有替代关系时，应使用先发制人的方法——这意味着在低优先级目标中取得的任何成功都无法弥补高优先级目标优化减少的影响。当正确使用时，先发制人的方法可以非常有效地帮助优化主要目标，同时尝试为低优先级目标找到良好的解决方案。
- en: '**Conclusion**'
  id: totrans-68
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**结论**'
- en: Goal programming provides a framework that extends traditional linear programming
    to optimize multiple metrics at the same time. The weighted approach balances
    priorities via weights in the objective function and is appropriate when objective
    metrics have relative importance that can be quantified. The preemptive method
    is an iterative approach that gives priority to metrics based on hierarchy. It
    is appropriate when some objectives are wholly more important than others. Both
    approaches can be powerful optimization techniques when applied in the correct
    context!
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 目标规划提供了一个框架，它将传统的线性规划扩展到同时优化多个指标。加权方法通过目标函数中的权重平衡优先级，当目标指标具有可量化的相对重要性时适用。先发制人的方法是一种基于层次优先级的迭代方法。当某些目标完全比其他目标更重要时适用。在正确的情况下，这两种方法都可以是强大的优化技术！
- en: Happy optimizing!
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 快乐优化！
