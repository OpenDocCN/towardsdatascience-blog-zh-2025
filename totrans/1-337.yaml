- en: 'Step 4: Calling Functions'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Once our functions are defined, we will call them when needed. If the user
    wants to encrypt a message, we will call the `encode` function, and if they want
    to decrypt a message, we will call the `decode` function. Let us implement this
    in our code using conditional statements if, elif, and else:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: 'Step 5: Program Continuity'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The last step of this program is to ask the user whether they want to continue
    with the program of encryption and decryption or end. We will implement this with
    a variable `continue_program` that will be True at the beginning and will remain
    so when the user wants to continue with the program. If the user wants to end,
    the variable will change to False, and the program will end. We will include this
    condition in a `while` loop that will run as long as the variable remains `True`.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: With the inclusion of the `while` loop above, we have successfully implemented
    the Caesar cipher program in Python. This project explored conditional statements
    `if`, `elif`, and `else`, `for` and `while` loops, and defining and calling functions.
    Moreover, we also introduced the modulo operator in this program to handle exceptions.
  prefs: []
  type: TYPE_NORMAL
- en: You can find the complete source code of this project [here](https://github.com/MahnoorJaved98/Caesar-Cipher/blob/main/Caesar%20Cipher.py).
  prefs: []
  type: TYPE_NORMAL
- en: If you have any questions or want to share a different approach, feel free to
