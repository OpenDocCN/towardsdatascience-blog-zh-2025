- en: Implementing the Caesar Cipher in Python
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/implementing-the-caesar-cipher-in-python/](https://towardsdatascience.com/implementing-the-caesar-cipher-in-python/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1756848521975" class="mdspan-comment">Julius Caesar</mdspan>
    was a Roman ruler known for his military strategies and excellent leadership.
    Named after him, the Caesar Cipher is a fascinating cryptographic technique that
    Julius Caesar employed to send secret signals and messages to his military personnel.
  prefs: []
  type: TYPE_NORMAL
- en: The Caesar Cipher is quite basic in its working. It works by shifting all the
    letters of the message to be encrypted by a fixed number of places, called the
    key. The person receiving it is aware of the key and uses it to decrypt the message,
    thereby providing an easy and intelligent way of conducting private correspondence.
  prefs: []
  type: TYPE_NORMAL
- en: Understanding the Project
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this article, we will learn how to implement the Caesar Cipher in Python.
    This is a beginner-friendly project where we will be using conditional statements,
    loops and functions to encode and decode user input data.
  prefs: []
  type: TYPE_NORMAL
- en: '**Here is how the program will work**: The program asks the user for a message
    to be encoded or decoded. The user chooses either encryption or decryption. The
    program asks for the key by which the message will be encrypted. Once the user
    gives the key, the program will convert the message by converting each letter
    of the message according to the key, either by shifting the letters forward if
    encoding, or backward if decoding.'
  prefs: []
  type: TYPE_NORMAL
- en: Let us first define the project steps with the help of a flowchart.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/cc79d42c1c262f8b64795106f8e754ff.png)'
  prefs: []
  type: TYPE_IMG
- en: Flowchart (Image by Author)
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 1: Defining the Alphabet List'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: First of all, we will use the [List](https://docs.python.org/3/tutorial/datastructures.html#more-on-lists)
    datatype in Python to create a list of the letters in the alphabet. Python lists
    are a sequence of items in a specific order and have several built-in functions.
    The program will use this list as a reference to shift letters forward or backward
    according to the choice of encoding or decoding. Let us define the list, `alphabet`.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'Step 2: Ask User Input'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The next step is to take the user’s input. We will ask the user:'
  prefs: []
  type: TYPE_NORMAL
- en: Whether they want to encode or decode a message `encode_or_decode`
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The respective message `secret_message` which they want to encode or decode,
    and
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The shift number `key` by which the message will be encoded or decoded.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Make sure to convert the `key` into an `int` datatype, otherwise you might run
    into a problem in shifting the letter by the number of key as Python will consider
    the input as a string and not an integer type. Also remember to convert the user
    input `secret_message` and `encode_or_decode` to lowercase to match the items
    in the list alphabet and conditional statment that will come ahead.
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 3: Defining Functions and Using the Modulo Operator'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The next step is to define both the `encode` and `decode` functions which will
    be called later. The `encode` function will be called when the user chooses ‘encode’
    in the `encode_or_decode` input prompt, and the `decode` function will be called
    when the user types ‘decode’ in the `encode_or_decode` input prompt.
  prefs: []
  type: TYPE_NORMAL
- en: Both functions are quite straightforward to code. It will take the `secret_message`,
    loop through all the letters, and for all the letters in the alphabet list that
    we defined earlier, it will take their index position, add the `key` to it, and
    give the `shifted_position`. We will use this `shifted_position` as an index of
    the letters and add them to the `output_text` which will be the encoded or decoded
    message.
  prefs: []
  type: TYPE_NORMAL
- en: '**But we have one problem here!** What if by shifting the letters, the index
    position goes out of the alphabet list? Well the solution to this is using an
    interesting Python operator called the ‘**modulo**‘. The modulo is an operator
    that gives the remainder after division and is symbolized by ‘%’ in Python. So
    8 % 5 will equal 3, as 3 is the remainder left after 8 is divided by 5.'
  prefs: []
  type: TYPE_NORMAL
- en: We will use this operator in our encode and decode functions. So, considering
    the alphabet list has 26 items, and if the user gives a message to encode “vampire”
    and key as “10”, if we just add the key number to the index position of ‘v’, 22
    + 10 = 32, we will have an error as there is no item at the 32nd position in the
    alphabet list. However, if we want to restart the alphabet list after ‘z’ from
    ‘a’, the 32nd alphabet would fall on ‘f’, which is the 6th item in the alphabet
    list. The same letter and index position can be achieved using the modulo operator;
    for a shifted value of 32, the letter will be at the 32 % 26 = 6th position. So
    we will use the same logic in coding our encode and decode functions.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here is the encode function:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: 'So if I want to encode “I have a pet cat” with the key number ‘6’, I will get
    the following encoded message:'
