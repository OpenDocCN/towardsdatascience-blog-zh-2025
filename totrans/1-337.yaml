- en: Implementing the Caesar Cipher in Python
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 在 Python 中实现凯撒密码
- en: 原文：[https://towardsdatascience.com/implementing-the-caesar-cipher-in-python/](https://towardsdatascience.com/implementing-the-caesar-cipher-in-python/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/implementing-the-caesar-cipher-in-python/](https://towardsdatascience.com/implementing-the-caesar-cipher-in-python/)
- en: <mdspan datatext="el1756848521975" class="mdspan-comment">Julius Caesar</mdspan>
    was a Roman ruler known for his military strategies and excellent leadership.
    Named after him, the Caesar Cipher is a fascinating cryptographic technique that
    Julius Caesar employed to send secret signals and messages to his military personnel.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1756848521975" class="mdspan-comment">尤利乌斯·凯撒</mdspan> 是一位以军事策略和卓越领导力而闻名的罗马统治者。以他的名字命名的凯撒密码是一种迷人的加密技术，尤利乌斯·凯撒曾用它来向他的军事人员发送秘密信号和消息。
- en: The Caesar Cipher is quite basic in its working. It works by shifting all the
    letters of the message to be encrypted by a fixed number of places, called the
    key. The person receiving it is aware of the key and uses it to decrypt the message,
    thereby providing an easy and intelligent way of conducting private correspondence.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 凯撒密码在其工作方式上相当基础。它通过将待加密消息中的所有字母按固定数量（称为密钥）进行位移来实现。接收者知道密钥，并使用它来解密消息，从而提供了一种简单而智能的私人通信方式。
- en: Understanding the Project
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 理解项目
- en: In this article, we will learn how to implement the Caesar Cipher in Python.
    This is a beginner-friendly project where we will be using conditional statements,
    loops and functions to encode and decode user input data.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我们将学习如何在 Python 中实现凯撒密码。这是一个适合初学者的项目，我们将使用条件语句、循环和函数来编码和解码用户输入的数据。
- en: '**Here is how the program will work**: The program asks the user for a message
    to be encoded or decoded. The user chooses either encryption or decryption. The
    program asks for the key by which the message will be encrypted. Once the user
    gives the key, the program will convert the message by converting each letter
    of the message according to the key, either by shifting the letters forward if
    encoding, or backward if decoding.'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: '**以下是程序的工作方式**：程序会要求用户输入要编码或解码的消息。用户选择加密或解密。程序会要求用户输入用于加密消息的密钥。一旦用户提供了密钥，程序就会根据密钥将消息进行转换，通过将消息中的每个字母根据密钥进行转换，如果编码则向前移动字母，如果解密则向后移动字母。'
- en: Let us first define the project steps with the help of a flowchart.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们首先使用流程图来定义项目步骤。
- en: '![](../Images/cc79d42c1c262f8b64795106f8e754ff.png)'
  id: totrans-8
  prefs: []
  type: TYPE_IMG
  zh: '![流程图](../Images/cc79d42c1c262f8b64795106f8e754ff.png)'
- en: Flowchart (Image by Author)
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 流程图（图片由作者提供）
- en: 'Step 1: Defining the Alphabet List'
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第 1 步：定义字母表列表
- en: First of all, we will use the [List](https://docs.python.org/3/tutorial/datastructures.html#more-on-lists)
    datatype in Python to create a list of the letters in the alphabet. Python lists
    are a sequence of items in a specific order and have several built-in functions.
    The program will use this list as a reference to shift letters forward or backward
    according to the choice of encoding or decoding. Let us define the list, `alphabet`.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们将使用 Python 中的 [列表](https://docs.python.org/3/tutorial/datastructures.html#more-on-lists)
    数据类型来创建一个包含字母表中字母的列表。Python 列表是有序项的序列，并具有多个内置函数。程序将使用这个列表作为参考，根据编码或解码的选择向前或向后移动字母。让我们定义这个列表，`alphabet`。
- en: '[PRE0]'
  id: totrans-12
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'Step 2: Ask User Input'
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第 2 步：询问用户输入
- en: 'The next step is to take the user’s input. We will ask the user:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 下一步是获取用户的输入。我们将询问用户：
- en: Whether they want to encode or decode a message `encode_or_decode`
  id: totrans-15
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 他们是否想要编码或解码一条消息 `encode_or_decode`
- en: The respective message `secret_message` which they want to encode or decode,
    and
  id: totrans-16
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 他们想要编码或解码的相应消息 `secret_message`，以及
- en: The shift number `key` by which the message will be encoded or decoded.
  id: totrans-17
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将消息编码或解码的位移数 `key`。
- en: '[PRE1]'
  id: totrans-18
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Make sure to convert the `key` into an `int` datatype, otherwise you might run
    into a problem in shifting the letter by the number of key as Python will consider
    the input as a string and not an integer type. Also remember to convert the user
    input `secret_message` and `encode_or_decode` to lowercase to match the items
    in the list alphabet and conditional statment that will come ahead.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 确保将 `key` 转换为 `int` 数据类型，否则在根据键移动字母时可能会遇到问题，因为 Python 会将输入视为字符串而不是整数类型。同时，请记住将用户输入的
    `secret_message` 和 `encode_or_decode` 转换为小写，以匹配列表 `alphabet` 和即将到来的条件语句。
- en: 'Step 3: Defining Functions and Using the Modulo Operator'
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第 3 步：定义函数和使用取模运算符
- en: The next step is to define both the `encode` and `decode` functions which will
    be called later. The `encode` function will be called when the user chooses ‘encode’
    in the `encode_or_decode` input prompt, and the `decode` function will be called
    when the user types ‘decode’ in the `encode_or_decode` input prompt.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 下一步是定义`encode`和`decode`函数，这些函数将在稍后调用。当用户在`encode_or_decode`输入提示中选择`encode`时，将调用`encode`函数，当用户在`encode_or_decode`输入提示中键入`decode`时，将调用`decode`函数。
- en: Both functions are quite straightforward to code. It will take the `secret_message`,
    loop through all the letters, and for all the letters in the alphabet list that
    we defined earlier, it will take their index position, add the `key` to it, and
    give the `shifted_position`. We will use this `shifted_position` as an index of
    the letters and add them to the `output_text` which will be the encoded or decoded
    message.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 两个函数的编码都非常直接。它将获取`secret_message`，遍历所有字母，然后对于我们在前面定义的字母表列表中的所有字母，它将获取它们的索引位置，将其与`key`相加，并给出`shifted_position`。我们将使用这个`shifted_position`作为字母的索引，并将它们添加到`output_text`中，这将是我们编码或解码的消息。
- en: '**But we have one problem here!** What if by shifting the letters, the index
    position goes out of the alphabet list? Well the solution to this is using an
    interesting Python operator called the ‘**modulo**‘. The modulo is an operator
    that gives the remainder after division and is symbolized by ‘%’ in Python. So
    8 % 5 will equal 3, as 3 is the remainder left after 8 is divided by 5.'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: '**但是这里有一个问题！** 如果通过移动字母，索引位置超出了字母表列表怎么办？嗯，这个问题的解决方案是使用一个有趣的Python运算符，称为“**模**”。模运算符是一个在Python中表示为`%`的运算符，它给出除法后的余数。所以8
    % 5等于3，因为3是8除以5后的余数。'
- en: We will use this operator in our encode and decode functions. So, considering
    the alphabet list has 26 items, and if the user gives a message to encode “vampire”
    and key as “10”, if we just add the key number to the index position of ‘v’, 22
    + 10 = 32, we will have an error as there is no item at the 32nd position in the
    alphabet list. However, if we want to restart the alphabet list after ‘z’ from
    ‘a’, the 32nd alphabet would fall on ‘f’, which is the 6th item in the alphabet
    list. The same letter and index position can be achieved using the modulo operator;
    for a shifted value of 32, the letter will be at the 32 % 26 = 6th position. So
    we will use the same logic in coding our encode and decode functions.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将在编码和解码函数中使用这个运算符。所以，考虑到字母表有26个项目，如果用户要编码消息“vampire”和键“10”，如果我们只是将键号加到字母`v`的索引位置上，22
    + 10 = 32，我们将有一个错误，因为在字母表列表中没有第32个位置的项。然而，如果我们想从`z`之后重新开始字母表，第32个字母将落在`f`上，这是字母表中的第6个项目。我们可以使用模运算符达到相同的字母和索引位置；对于32的移动值，字母将位于32
    % 26 = 第6个位置。所以我们将使用相同的逻辑来编写我们的编码和解码函数。
- en: 'Here is the encode function:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是编码函数：
- en: '[PRE2]'
  id: totrans-26
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'So if I want to encode “I have a pet cat” with the key number ‘6’, I will get
    the following encoded message:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 所以如果我想用键号`6`来编码“我有只宠物猫”，我将得到以下编码消息：
- en: '![](../Images/b75ead3e41cc76051ae2239da486204c.png)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/b75ead3e41cc76051ae2239da486204c.png)'
- en: Encoded Message (Image by Author)
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 编码消息（图片由作者提供）
- en: '![](../Images/4339e5dba6afac777595326507170cfd.png)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/4339e5dba6afac777595326507170cfd.png)'
- en: Photo by [Bogdan Farca](https://unsplash.com/@bogdanf?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on [Unsplash](https://unsplash.com/photos/brown-tabby-cat-on-white-wooden-window-CEx86maLUSc?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由[Bogdan Farca](https://unsplash.com/@bogdanf?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)在[Unsplash](https://unsplash.com/photos/brown-tabby-cat-on-white-wooden-window-CEx86maLUSc?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)提供
- en: 'For the decode function, since we are decoding, we have to shift the letters
    by the `key` in the reverse order, that is, backwards. So if I want to decode
    the above message: ‘o ngbk g vkz igz’, I will have to multiply the key number
    by -1, so that instead of adding the key, it subtracts the `key`, and the `shifted_position`
    will be achieved by moving the index position backward.'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 对于解码函数，由于我们要解码，我们必须按`key`的相反顺序移动字母，即向后移动。所以如果我想解码上面的消息：“o ngbk g vkz igz”，我必须将键号乘以-1，这样就不是添加键，而是减去`key`，`shifted_position`将通过向后移动索引位置来获得。
- en: 'Let us define the decode function:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们定义解码函数：
- en: '[PRE3]'
  id: totrans-34
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'Here is our decoded message:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是我们的解码消息：
- en: '![](../Images/16462658e07827530217f531758a3268.png)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/16462658e07827530217f531758a3268.png)'
- en: Decoded Message (Image by Author)
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 解码消息（图片由作者提供）
- en: 'Step 4: Calling Functions'
  id: totrans-38
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第4步：调用函数
- en: 'Once our functions are defined, we will call them when needed. If the user
    wants to encrypt a message, we will call the `encode` function, and if they want
    to decrypt a message, we will call the `decode` function. Let us implement this
    in our code using conditional statements if, elif, and else:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦我们定义了函数，我们将在需要时调用它们。如果用户想要加密一条消息，我们将调用`encode`函数；如果他们想要解密一条消息，我们将调用`decode`函数。让我们使用条件语句if、elif和else在我们的代码中实现这一点：
- en: '[PRE4]'
  id: totrans-40
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'Step 5: Program Continuity'
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第5步：程序连续性
- en: The last step of this program is to ask the user whether they want to continue
    with the program of encryption and decryption or end. We will implement this with
    a variable `continue_program` that will be True at the beginning and will remain
    so when the user wants to continue with the program. If the user wants to end,
    the variable will change to False, and the program will end. We will include this
    condition in a `while` loop that will run as long as the variable remains `True`.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 这个程序的最后一步是询问用户他们是否想要继续进行加密和解密程序，还是结束。我们将使用一个变量`continue_program`来实现这一点，该变量初始为True，并且当用户想要继续程序时将保持True。如果用户想要结束，变量将变为False，程序将结束。我们将把这个条件包含在一个`while`循环中，只要变量保持`True`，循环就会运行。
- en: '[PRE5]'
  id: totrans-43
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Conclusion
  id: totrans-44
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: With the inclusion of the `while` loop above, we have successfully implemented
    the Caesar cipher program in Python. This project explored conditional statements
    `if`, `elif`, and `else`, `for` and `while` loops, and defining and calling functions.
    Moreover, we also introduced the modulo operator in this program to handle exceptions.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 通过包含上述的`while`循环，我们已经成功地在Python中实现了凯撒密码程序。这个项目探讨了条件语句`if`、`elif`和`else`、`for`和`while`循环，以及定义和调用函数。此外，我们还在这个程序中引入了取模运算符来处理异常。
- en: You can find the complete source code of this project [here](https://github.com/MahnoorJaved98/Caesar-Cipher/blob/main/Caesar%20Cipher.py).
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以在[这里](https://github.com/MahnoorJaved98/Caesar-Cipher/blob/main/Caesar%20Cipher.py)找到这个项目的完整源代码。
- en: If you have any questions or want to share a different approach, feel free to
    comment on this article. I will look forward to it. Happy coding! 🙂
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您有任何问题或想分享不同的方法，请随意在此文章下评论。我期待着您的反馈。祝您编码愉快！ 🙂
