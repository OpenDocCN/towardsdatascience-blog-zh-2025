  zh: 为了在探索阶段使一切变得简单，并在笔记本中提供最大的灵活性，而无需编写数百行代码。完成这一点的代码 [[data.py](https://github.com/PieroPaialungaAI/RareEvents/blob/main/data.py)]
    如下：
