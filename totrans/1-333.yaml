  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**请注意，数据集中有36列/城市，而不仅仅是4个**。我展示了4个以使表格格式良好。 :) '
- en: 'A few things to notice:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 几个需要注意的事项：
- en: Every column, except “datetime”, is a **city** and represents a time series,
    where every value corresponds to the datetime, which represents the time axis
  id: totrans-30
  prefs:
