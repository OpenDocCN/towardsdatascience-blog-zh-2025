  zh: '[PRE0]'
- en: 4\. Summary
  id: totrans-86
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4. 摘要
- en: Thank you for spending time with me so far, it means a lot ❤️
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢你一直陪伴我，这意义重大 ❤️
- en: 'Let’s recap what we did. Instead of hand-waving away “outliers,” we treated
    extremes as first-class signals. As an example:'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们回顾一下我们做了什么。我们不是简单地挥手告别“异常值”，而是将极端值视为一等信号。例如：
- en: We took a dataset representing the temperature of cities around the world
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们选取了一个代表世界各地城市温度的数据集
- en: We defined our extreme events using block maxima on a fixed window
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们使用固定窗口上的块最大值定义了我们的极端事件
- en: We modeled city-level temperature highs with three candidate families (GEV,
    Gumbel, and Weibull)
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们使用三个候选家族（GEV、Gumbel和Weibull）对城市级别的温度最高值进行建模
- en: We selected the best fit using log-likelihood, AIC, and BIC, then verified fits
    with Q-Q plots.
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们使用对数似然、AIC和BIC选择了最佳拟合，然后通过Q-Q图验证了拟合。
- en: 'Results show that “best” varies by city: for example, Dallas, Pittsburgh, and
    Kansas City leaned GEV, while New York fit a Weibull.'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 结果表明，“最佳”因城市而异：例如，达拉斯、匹兹堡和堪萨斯城倾向于GEV，而纽约适合Weibull。
- en: This kind of approach is very important when extreme values are of high importance
    in your system, and we need to reveal how it statistically behaves under rare
    and extreme conditions.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 当极端值在系统中非常重要时，这种方法非常重要，我们需要揭示它在罕见和极端条件下的统计行为。
