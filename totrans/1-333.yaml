  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们可以使用以下方式显示我们的分布：
- en: '![](../Images/017db910c51011f828ee78ea1cf9ba3a.png)'
  id: totrans-77
  prefs: []
  type: TYPE_IMG
  zh: '![由作者制作图像](../Images/017db910c51011f828ee78ea1cf9ba3a.png)'
- en: Image made by author
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 由作者制作图像
- en: 'Pretty good fit, right? While it visually looks good, we can be a little bit
    more quantitative and look at the Q-Q plot, which displays the quartile match
    between the data and the fitted distribution:'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 拟合得很好，对吧？虽然从视觉上看很好，但我们可以更量化一些，看看 Q-Q 图，它显示数据与拟合分布之间的四分位数匹配：
- en: '![](../Images/cb25d877878b4e0f493d91df38bda5d0.png)'
  id: totrans-80
  prefs: []
  type: TYPE_IMG
  zh: '![由作者制作图像](../Images/cb25d877878b4e0f493d91df38bda5d0.png)'
- en: Image made by author
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 由作者制作图像
- en: 'This displays that our distribution matches very well with the provided dataset.
    Now, you can notice how, if you had tried with a standard distribution (e.g. Gaussian
    curve), you would have surely failed: the distribution of the data is heavily
    skewed (as expected, because we are dealing with extreme values, and this requires
    extreme value distributions (this feels weirdly motivational 😁).'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 这表明我们的分布与提供的数据集匹配得非常好。现在，你可以注意到，如果你尝试使用标准分布（例如高斯曲线），你肯定会失败：数据分布严重偏斜（正如预期的那样，因为我们处理的是极端值，这需要极端值分布，这感觉有点激励人心
    😁）。
