- en: Hands On Time Series Modeling of Rare Events, with Python
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/hands-on-time-series-modeling-of-rare-events-with-python/](https://towardsdatascience.com/hands-on-time-series-modeling-of-rare-events-with-python/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '<mdspan datatext="el1756942924814" class="mdspan-comment">How many times</mdspan>
    have you heard this:'
  prefs: []
  type: TYPE_NORMAL
- en: We have those very large values in this timeseries, but those are just “**outliers**”
    and happen only [insert small number here]% of the time
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: During my Data Science years, I have heard that sentence a lot. In conferences,
    during product reviews, and during calls with clients, this sentence has been
    said to reassure that some very large (or small) unwanted values that might appear
    are not “standard”, they don’t belong to the “usual process” (all vague words
    I have heard of), and they do not constitute an issue for the system we are trying
    to build (for reason X, Y and Z).
  prefs: []
  type: TYPE_NORMAL
- en: In production settings, those very small or very large values (known as **extreme
    values**) are accompanied by guardrails to “fail gracefully” in case the extreme
    values are measured. This is usually enough for cases where you just need your
    system to work, and you want to be safe that it works at all times, even when
    the unwanted/not standard/rude, crazy, and annoying extreme values happen.
  prefs: []
  type: TYPE_NORMAL
- en: 'Nonetheless, when analyzing a timeseries, we can do something more than “fixing”
    the extreme value with guardrails and if/else threshold: we can actually monitor**extreme
    values** so that we can understand them.'
  prefs: []
  type: TYPE_NORMAL
- en: In timeseries, extreme values actually represent something in the system of
    interest. For example, if your time series describes the energy consumption of
    a city, an unreasonably high energy level might indicate a worrisome energy consumption
    in a specific area, which may require action. If you are dealing with financial
    data, the highs and lows have an obvious, crucial meaning, and understanding their
    behavior is extremely important.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this blog post, we will be dealing with **weather data**, where the time
    series will represent the temperature (in Kelvin). The data, as we will see, will
    have multiple cities, and every city yields a timeseries. If you select a specific
    city, you have a timeseries like the one you are seeing below:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f6e383e9573c9842a56a4fee6a8f0cb1.png)'
  prefs: []
  type: TYPE_IMG
- en: Image generated by author [[data source](https://www.kaggle.com/datasets/selfishgene/historical-hourly-weather-data?select=temperature.csv)]
  prefs: []
  type: TYPE_NORMAL
- en: So, in this kind of dataset, it is pretty important to model the maxima and
    minima, because they mean it’s either as hot as a furnace or extremely cold. Hopefully,
    at this point, you are asking yourself
  prefs: []
  type: TYPE_NORMAL
- en: “What do we mean by ***modelling*** the maxima and minima?”
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'When you are dealing with a time series dataset, it is reasonable to expect
    a Gaussian-like distribution, like the one you see here:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ef195cfbf3e2e5adc86a31f2a1bf3217.png)'
  prefs: []
  type: TYPE_IMG
- en: Image made by author [[data source](https://www.kaggle.com/datasets/selfishgene/historical-hourly-weather-data?select=temperature.csv)]
  prefs: []
  type: TYPE_NORMAL
- en: 'But if you consider only the extreme values, the distribution is far from that.
    And as you will see in a second, there are multiple layers of complexity associated
    with extracting the distribution of extreme values. Three of them are:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Defining an extreme value**: How do you know something is extreme? We will
    define the implementation of our extreme value as a first stage'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Defining the distributions that describe these events:** there are multiple
    possible distributions of extreme values. The three distributions that will be
    treated in this blog post are the ***Generalized Extreme Value (GEV), Weibull,***
    and ***Gumbel*** (a special case of GEV) **distributions**.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Choosing the best distribution:** There are multiple metrics we can use to
    determine the “best fitting” distributions. We will treat the ***Akaike Information,***
    the ***Log-likelihood***, and the ***Bayesian Information*** Criterion.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: All things we will talk about in this article 🥹
  prefs: []
  type: TYPE_NORMAL
- en: Looks like we have a lot of ground to cover. Let’s get started.
  prefs: []
  type: TYPE_NORMAL
- en: 0\. Data and Script Source
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The language we will use is **Python**. The code source can be found on this
    [PieroPaialungaAI/RareEvents folder](https://github.com/PieroPaialungaAI/RareEvents).
    The data source can be found in this *open source* [Kaggle Dataset](https://www.kaggle.com/datasets/selfishgene/historical-hourly-weather-data).
    Mind you, if you clone the GitHub folder, you won’t need to download the dataset.
    The dataset is inside the RawData folder inside the RareEvents GitHub main folder
    (you’re welcome 😉).
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Preliminary Data Exploration
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In order to make everything simple during the exploration phase, and give us
    the maximum versatility in the notebook without writing hundreds of lines of code.
    The code that does that [[data.py](https://github.com/PieroPaialungaAI/RareEvents/blob/main/data.py)]
    is the following:'
  prefs: []
  type: TYPE_NORMAL
- en: This code does all the dirty work data-wise; so we can do all the following
    steps in a very few lines of code.
  prefs: []
  type: TYPE_NORMAL
- en: 'The first thing we can do is just display some of the rows of the dataset.
    We can do it with this code:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Notice that there are 36 columns/cities, not just 4, in the dataset.** I
    displayed 4 to have a nicely formatted table. 🙂'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'A few things to notice:'
  prefs: []
  type: TYPE_NORMAL
- en: Every column, except “datetime”, is a **city** and represents a time series,
    where every value corresponds to the datetime, which represents the time axis
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Every value in the city column represents the Kelvin temperature for the date
    in the corresponding datetime column. For example, index = 3 for column = ‘Vancouver’
    tells us that, at datetime 2012-10-01 15:00:00, the temperature was 284.627 K
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'I also developed a function that allows you to plot the city column. For example,
    if you want to peek at what happens in New York, you can use this:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/33b56e6f731771c10c8b45f1b2085811.png)'
  prefs: []
  type: TYPE_IMG
- en: Image made by author using code above
  prefs: []
  type: TYPE_NORMAL
- en: Now, the datetime column is just a string column, but it would be actually helpful
    to have the specific month, day, and year in separate columns. Also, we have some
    NaN values that we should take care of. All these boring preprocessing steps are
    inside the `.clean_and_preprocess()`
  prefs: []
  type: TYPE_NORMAL
- en: 'This is the output:'
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Detecting Extreme Events
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Now, a crucial question:'
  prefs: []
  type: TYPE_NORMAL
- en: What is an extreme event? And how are we going to detect it?
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'There are two main ways to define an “extreme event”. For example, if we want
    to identify the **maxima**, we can apply:'
  prefs: []
  type: TYPE_NORMAL
- en: 'The first Definition: Peak Over Threshold (POT). Given a threshold, everything
    above that threshold is a maximum point (extreme event).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'The second definition: Extreme within a region. Given a window, we define the
    maximum value of the window as an extreme event.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In this blog post, we’ll use the second approach. For instance, if we use daily
    windows, we scan through the dataset and extract the highest value for each day.
    This would give you a lot of points, as our dataset spans more than 5 years. OR,
    we could do it with monthly windows or yearly windows. This would give you fewer
    points, but perhaps richer information.
  prefs: []
  type: TYPE_NORMAL
- en: 'This is exactly the power of this method: we have control over the number of
    points and their “quality”. For this study, arguably the best window size is the
    “daily-sized one. For another dataset, feel free to adjust based on the quantity
    of your points; for example, you might want to reduce the window size if you have
    a very short natural window (e.g., you collect data every second), or increase
    it if you have a very large dataset (e.g., you have 50+ years of data and a week
    window is more appropriate).'
  prefs: []
  type: TYPE_NORMAL
- en: This definition of maximum value is defined within the **RareEventsToolbox**
    class, in [[rare_events_toolbox.py](https://github.com/PieroPaialungaAI/RareEvents/blob/main/rare_events_processor.py)]
    script (look at the extract_block_max function).
  prefs: []
  type: TYPE_NORMAL
- en: 'And we can quickly display the distribution of rare event at different window
    sizes using the following block of code:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/8b5bd1358a47dc1c64e98fcbd82ac1b4.png)'
  prefs: []
  type: TYPE_IMG
- en: Image made by author using code above
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Extreme Events Distribution
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Before diving into code, let’s take a step back. In general, the extreme value
    distributions do not exhibit the beautiful gaussian bell behavior that you have
    seen earlier (the Gaussian distribution for San Francisco). From a theoretical
    perspective, the two distributions to know are the **Generalized Extreme Value
    (GEV)** distribution and the **Weibull** distribution.
  prefs: []
  type: TYPE_NORMAL
- en: '**GEV (Generalized Extreme Value)**'
  prefs: []
  type: TYPE_NORMAL
- en: The GEV is the foundation of extreme value theory and provides a family of distributions
    tailored for modeling block maxima or minima. A special case is the **Gumbel**
    distribution.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Its flexibility comes from a shape parameter that determines the “tail behavior.”
    Depending on this parameter, the GEV can mimic different kinds of extremes (e.g.,
    moderate, heavy-tailed).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The demonstration of the GEV distribution is very elegant: just like the Central
    Value Theory (CLT) says, “If you average a bunch of i.i.d. random variables, the
    distribution of the average tends to a Gaussian”, the EVT (Extreme Value Theory)
    says “if you take the *maximum* (or minimum) of a bunch of i.i.d. random variables,
    the distribution of that maximum tends to a GEV.”'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Weibull**'
  prefs: []
  type: TYPE_NORMAL
- en: The Weibull is one of the most widely used distributions in reliability engineering,
    meteorology, and environmental modeling.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It’s especially useful for describing data where there’s a sense of “bounded”
    or tapered-off extremes.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Unlike the GEV distribution(s), the Weibull formulation is **empirical**. Waloddi
    Weibull, a Swedish engineer, first proposed the distribution in 1939 to model
    the breaking strength of materials.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'So we have three possibilities: **GEV, Gumbel,** and **Weibull.** Now, which
    one is the best? The short answer is “it depends,” and another short answer is
    “it’s best just to try them all and see which one performs best”.'
  prefs: []
  type: TYPE_NORMAL
- en: 'So now we have another question:'
  prefs: []
  type: TYPE_NORMAL
- en: How do we evaluate the quality of a distribution function and a set of data?
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Three metrics to use are the following:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Three metrics to use are the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Log-Likelihood (LL)**. It measures how probable the observed data is under
    the fitted distribution: higher is better.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/bb7714baf75dcffbb349eace2a808648.png)'
  prefs: []
  type: TYPE_IMG
- en: Image made by author
  prefs: []
  type: TYPE_NORMAL
- en: where f is the probability density (or mass) function of the distribution with
    parameters θ and x_i is the i-th observed data point
  prefs: []
  type: TYPE_NORMAL
- en: '**Akaike Information Criterion (AIC)** AIC balances two forces: **fit quality**
    (via the log-likelihood = *L*) and **simplicity** (penalizes models with too many
    parameters, number of parameters = *k*).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/6cbe38ed700345b620a6bf3b094acc9b.png)'
  prefs: []
  type: TYPE_IMG
- en: Image made by author
  prefs: []
  type: TYPE_NORMAL
- en: '**Bayesian Information Criterion (BIC)**. Similar spirit to AIC, but harsher
    on complexity (dataset size = *n*).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/52382fb0d89622f33ee2522a16b750c4.png)'
  prefs: []
  type: TYPE_IMG
- en: Image made by author
  prefs: []
  type: TYPE_NORMAL
- en: The standard recommendation is to use one between AIC and BIC, as they consider
    the Log Likelihood and the complexity.
  prefs: []
  type: TYPE_NORMAL
- en: 'The implementation of the three distribution functions, and the corresponding
    L, AIC, and BIC values, is the following:'
  prefs: []
  type: TYPE_NORMAL
- en: 'And then we can display our distribution using the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/017db910c51011f828ee78ea1cf9ba3a.png)'
  prefs: []
  type: TYPE_IMG
- en: Image made by author
  prefs: []
  type: TYPE_NORMAL
- en: 'Pretty good fit, right? While it visually looks good, we can be a little bit
    more quantitative and look at the Q-Q plot, which displays the quartile match
    between the data and the fitted distribution:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/cb25d877878b4e0f493d91df38bda5d0.png)'
  prefs: []
  type: TYPE_IMG
- en: Image made by author
  prefs: []
  type: TYPE_NORMAL
- en: 'This displays that our distribution matches very well with the provided dataset.
    Now, you can notice how, if you had tried with a standard distribution (e.g. Gaussian
    curve), you would have surely failed: the distribution of the data is heavily
    skewed (as expected, because we are dealing with extreme values, and this requires
    extreme value distributions (this feels weirdly motivational 😁).'
  prefs: []
  type: TYPE_NORMAL
- en: 'Now the cool thing is that, as we made it structured, we can also run this
    for every city in the dataset using the following block of code:'
  prefs: []
  type: TYPE_NORMAL
- en: 'And the output will look like this:'
  prefs: []
  type: TYPE_NORMAL
