- en: How Microsoft Power BI Elevated My Data Analysis and Visualization Workflow
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何提升我的数据分析与可视化工作流程：Microsoft Power BI
- en: 原文：[https://towardsdatascience.com/how-microsoft-power-bi-elevated-my-data-analysis-and-visualization-workflow/](https://towardsdatascience.com/how-microsoft-power-bi-elevated-my-data-analysis-and-visualization-workflow/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/how-microsoft-power-bi-elevated-my-data-analysis-and-visualization-workflow/](https://towardsdatascience.com/how-microsoft-power-bi-elevated-my-data-analysis-and-visualization-workflow/)
- en: <mdspan datatext="el1748375884865" class="mdspan-comment">The majority</mdspan>,
    especially those new to the field, often think data science is only about collecting
    data from databases, working with algorithms, and deploying models.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1748375884865" class="mdspan-comment">大多数**人**，尤其是那些刚进入这个领域的人，通常认为数据科学只是从数据库中收集数据、处理算法和部署模型。
- en: However, it’s more than that. Data analysis and visualization are essential
    aspects of data science, which help you understand complex data, make sense of
    it, and create actionable insights.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，它不仅仅是这样。数据分析与可视化是数据科学的重要方面，有助于你理解复杂的数据，弄清楚其含义，并创建可操作的见解。
- en: During my early days in data science, I never saw the need for data visualization,
    and that was because I wasn’t exposed to and acquainted with the knowledge and
    appropriate tools for addressing visualization tasks effectively.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在我数据科学的早期，我从未看到数据可视化的必要性，那是因为我没有接触过，也不熟悉有效地处理可视化任务的知识和工具。
- en: I still remember the frustration of spending hours buried in Excel sheets, manually
    updating pivot tables, and endlessly adjusting the chart’s layout, just to build
    something that still didn’t tell the story I wanted.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 我仍然记得花费数小时埋头于Excel表格中，手动更新数据透视表，无尽地调整图表布局的挫败感，只是为了构建一个仍然无法讲述我想讲述的故事。
- en: Don’t get me wrong, Excel is great, but sometimes it just doesn’t cut it.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 请不要误解，Excel很棒，但有时它就是不够用。
- en: As a computer science major with a growing interest in data, I knew there had
    to be a better way — but I didn’t know what that was yet.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一名对数据越来越感兴趣的计算机科学专业的学生，我知道一定有更好的方法——但我当时还不知道那是什么。
- en: My first real struggle came during a university project where I had to analyze
    student performance data across multiple semesters.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 我第一次真正的挑战是在一个大学项目中，我必须分析多个学期学生的表现数据。
- en: I know what you’re thinking; that should be quite easy.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 我知道你在想什么；那应该相当简单。
- en: Well, yes, it is.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 嗯，是的，它确实如此。
- en: But to me back then, it wasn’t.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 但对我来说，当时并不是这样。
- en: I had rows upon rows of scores, attendance rates, course codes, and so on, but
    turning all that data into meaningful insights felt like trying to teach Tony
    Stark to be humble.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 我有成行成行的分数、出勤率、课程代码等等，但将所有这些数据转化为有意义的见解，感觉就像是在尝试教托尼·斯塔克谦逊一样。
- en: 'I tried everything: Excel formulas, conditional formatting, and even dabbled
    a little with matplotlib to generate some plots. Nothing clicked; it was overwhelming.'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 我尝试了所有方法：Excel公式、条件格式化，甚至稍微涉猎了一些matplotlib来生成一些图表。但都没有成功；这让人感到压倒性。
- en: That was when a senior colleague mentioned **[Microsoft Power BI](https://www.microsoft.com/en-us/power-platform/products/power-bi).**
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 那时，一位资深同事提到了**[Microsoft Power BI](https://www.microsoft.com/en-us/power-platform/products/power-bi)**。
- en: For those who don’t know, Power BI is a data visualization and business analytics
    tool developed by Microsoft that allows you to connect, transform, analyze, and
    most importantly, visualize data.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 对于那些不知道的人来说，Power BI是由微软开发的数据可视化和商业分析工具，它允许你连接、转换、分析，最重要的是，可视化数据。
- en: At first, it sounded like just another tool on a long list of software I hadn’t
    quite mastered. So I had to do some personal reading.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 起初，它听起来就像是我尚未完全掌握的软件列表上的另一个工具。所以我不得不进行一些个人阅读。
- en: 'I got my hands on “[Power BI Cookbook](https://www.goodreads.com/book/show/35965868-microsoft-power-bi-cookbook):
    Creating Business Intelligence Solutions of Analytical Data Models, Reports, and
    Dashboards,” a book written by Brett Powell, and that was the beginning of finer
    things.'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: '我得到了一本由Brett Powell撰写的书，“[Power BI食谱](https://www.goodreads.com/book/show/35965868-microsoft-power-bi-cookbook):
    创建分析数据模型、报告和仪表板的商业智能解决方案”，这标志着美好事物的开始。'
- en: It’s not just a book, it’s more like a comprehensive guide for understanding
    the whole concept of creating interactive visualizations using Power BI.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 这不仅仅是一本书籍，更像是一本全面指南，用于理解使用Power BI创建交互式可视化的整个概念。
- en: After a couple of days of learning the workings of Power BI, I had imported
    my dataset, cleaned it using Power Query, and built my first interactive dashboard.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 在学习了Power BI的工作原理几天后，我已经导入了我的数据集，使用Power Query进行了清理，并构建了我的第一个交互式仪表板。
- en: For me, I saw it as something more than a technical upgrade, it was a mindset
    shift I didn’t know I needed moving forward into data science. It changed how
    I thought about data itself.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 对我来说，我把它看作不仅仅是技术升级，更是一种我之前不知道自己需要的思维方式转变，这让我在进入数据科学领域时受益匪浅。它改变了我对数据本身的看法。
- en: Moving forward into this article, I will be sharing powerful ways Power BI helped
    me in my data analysis and visualization journey, as well as personal stories
    and actionable takeaways that can help you grow in professionalism as a data scientist.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我将分享Power BI如何帮助我在数据分析与可视化旅程中取得进展的强大方法，以及个人故事和可操作的经验教训，这些可以帮助你在数据科学家职业上取得进步。
- en: '* * *'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: The day I stopped Copy-Pasting and Started Living
  id: totrans-23
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我停止复制粘贴并开始生活的日子
- en: Yes, it was that big of a breakthrough.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，这是一个巨大的突破。
- en: 'When I started analyzing data, my workflow looked like a chaotic relay race:
    I opened an Excel file, copied data, opened a new window, pasted it into another
    sheet, crossed my fingers, and prayed to the heavens that nothing broke.'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 当我开始分析数据时，我的工作流程就像一场混乱的接力赛：我打开一个Excel文件，复制数据，打开一个新窗口，将其粘贴到另一个工作表上，然后交叉手指，向天祈祷一切都不会出错。
- en: And guess what, something always breaks.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 猜猜看，总是会有事情出错。
- en: After copying and pasting from one file to the other, I had folders filled with
    files named things like `Sales_Q4_FINAL_final2.xlsx`, and yet I still couldn’t
    keep track of everything.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 在从一份文件复制粘贴到另一份文件之后，我的文件夹里充满了像`Sales_Q4_FINAL_final2.xlsx`这样的文件，而我仍然无法跟踪所有这些信息。
- en: Power BI’s ability to pull data from literally [everywhere](https://news.microsoft.com/videos/power-bi-experience-your-data-any-data-any-way-anywhere/),
    databases, spreadsheets, and even cloud services, means I no longer have to play
    data Tetris. With just a few clicks, I connected my Excel sheets, SQL database,
    APIs, and even data files I stored locally.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: Power BI能够从实际上[任何地方](https://news.microsoft.com/videos/power-bi-experience-your-data-any-data-any-way-anywhere/)获取数据，包括数据库、电子表格，甚至云服务，这意味着我不再需要玩数据俄罗斯方块。只需几点击，我就连接了我的Excel表格、SQL数据库、API，甚至是我本地存储的数据文件。
- en: Don’t worry if you had challenges importing your datasets, or something didn’t
    just work as you expected. It’s easy, trust me, you just need more practice.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你遇到了导入数据集的挑战，或者某些事情没有按预期工作，不要担心。相信我，这很容易，你只需要更多的练习。
- en: Play around with the dashboard and understand what button does what and how
    to use them. There’s this satisfaction that comes with finding your way around.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 在仪表板上玩一玩，了解每个按钮的功能以及如何使用它们。当你找到自己的方法时，会有一种满足感。
- en: The first time I saw all my data update live, I just sat back and smiled. No
    copy-pasting, no chaos, just clean and connected data.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 第一次看到所有数据实时更新时，我只是坐下来微笑。没有复制粘贴，没有混乱，只有干净且连接的数据。
- en: Intuitive Visualizations with Customization Options
  id: totrans-32
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 具有自定义选项的直观可视化
- en: Like I said in the beginning, most people underestimate the power of good visuals,
    particularly when dealing with data. I find that absurd because let’s be honest,
    raw data doesn’t always tell a story.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 就像我在开头说的那样，大多数人低估了良好视觉信息的力量，尤其是在处理数据时。我觉得这很荒谬，因为说实话，原始数据并不总是能讲述一个故事。
- en: According to a study published in the journal *[Information Visualization](https://journals.sagepub.com/home/ivi)*,
    people process visuals 60,000 times faster than text.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 根据发表在期刊*[信息可视化](https://journals.sagepub.com/home/ivi)*上的一项研究，人们处理视觉信息的速度比处理文本快60,000倍。
- en: If that doesn’t do it for you, even MIT suggests that the human brain can identify
    images seen as little as [13 milliseconds](https://www.scienceabc.com/humans/how-fast-can-the-human-brain-process-images.html).
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 如果这还不能打动你，甚至麻省理工学院也建议，人脑可以识别在[13毫秒](https://www.scienceabc.com/humans/how-fast-can-the-human-brain-process-images.html)内看到的图像。
- en: In practical terms, these studies mean that your dashboard visuals are being
    absorbed and interpreted before someone finishes reading your chart title or even
    takes a look at the numbers you spent hours crunching.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 在实际应用中，这些研究意味着在有人读完你的图表标题甚至查看你花费数小时计算出的数字之前，你的仪表板视觉信息已经被吸收和解读。
- en: My favorite feature of Power BI has to be the interactive and advanced data
    visualization capabilities. With its intuitive drag-and-drop interface, you can
    turn the dullest (As much as I love data, it looks dull at times) datasets into
    dynamic dashboards.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 我最喜欢的Power BI功能必须是交互式和高级的数据可视化能力。凭借其直观的拖放界面，你可以将最枯燥的（尽管我爱数据，但有时它看起来很枯燥）数据集变成动态仪表板。
- en: 'With a wide array of visualization options ranging from:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 在广泛的可视化选项中，包括：
- en: Matrix & Table Visuals
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 矩阵和表格可视化
- en: Gauge and KPI Visuals
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 仪表和KPI可视化
- en: Slicers and Filters
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 切片器和过滤器
- en: Decomposition Tree
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分解树
- en: Waterfall Chart
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 演示图
- en: Map Visuals
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 地图可视化
- en: There are a lot more others, but I consider these my personal favorites.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 还有更多其他工具，但我认为这些是我的个人最爱。
- en: Data scientists and analysts need the ability to successfully interpret data,
    identify trends, and help businesses make better decisions.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 数据科学家和分析师需要能够成功解读数据，识别趋势，并帮助企业做出更好的决策。
- en: 'As computer science pioneer, [Ben Schneiderman](https://www.cs.umd.edu/users/ben/),
    rightly put:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 作为计算机科学先驱，[本·施奈德曼](https://www.cs.umd.edu/users/ben/)正确地指出：
- en: “Visualization gives you answers to questions you didn’t know you had”
  id: totrans-48
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “可视化为你提供了你不知道自己会问的问题的答案”
- en: 'Power Query: The Silent MVP Behind My Clean Data'
  id: totrans-49
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Power Query：我的干净数据的幕后英雄
- en: You might ask, What is Power Query?
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能会问，什么是Power Query？
- en: '**Power Query** is a data transformation wizard built into Power BI. It is
    a wonderful feature that allows you to clean, reshape, and prepare data before
    loading it into your model for analysis and visualization.'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: '**Power Query**是Power BI中内置的数据转换向导。这是一个非常棒的功能，允许你在将数据加载到模型进行分析和可视化之前，对数据进行清理、重塑和准备。'
- en: I see it as the engine that powers data preparation in Power BI.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为它是Power BI中数据准备的动力引擎。
- en: Data is messy. That’s just part of the job. Plus, with companies and businesses
    expanding, more and more data is being collected. It’s quite challenging for most
    data scientists and analysts to get hold of large sets of raw data.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 数据是杂乱的。这只是工作的一部分。此外，随着公司和企业的扩张，越来越多的数据被收集。对于大多数数据科学家和分析师来说，掌握大量原始数据是非常具有挑战性的。
- en: Remember the challenge I had with my university project?
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 记得我大学项目中的挑战吗？
- en: It turned out that one of the reasons why I was finding it difficult to perform
    analysis was that my datasets were all chaotic.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 结果表明，我之所以发现分析困难，其中一个原因是我的数据集都是混乱的。
- en: I was asked to analyze students’ performance, which pulled data from three different
    CSVs, each with its quirks. One had admission codes instead of names, another
    used inconsistent date formats, and the third had course titles listed in ALL
    CAPS (screaming at me).
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 我被要求分析学生的表现，这需要从三个不同的CSV文件中提取数据，每个文件都有其特点。一个文件使用入学代码而不是姓名，另一个使用不一致的日期格式，第三个文件中的课程标题全部大写（对我大喊大叫）。
- en: 'With Power Query, here is how I built a complete workflow:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Power Query，以下是我构建完整工作流程的方法：
- en: Replaced admission codes with readable names
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将入学代码替换为可读的名称
- en: Converted date formats
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 转换日期格式
- en: Standardized text formatting
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 标准化文本格式
- en: Merged everything into one organized table
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 将所有内容合并到一个有组织的表格中
- en: Data preparation takes up to [80%](https://www.dataversity.net/survey-shows-data-scientists-spend-time-cleaning-data/?utm_source=chatgpt.com)
    of a data analyst’s time. Imagine how much time you would save and how productive
    you’d become when you focus all that time and brainpower on generating better
    insights. Time reclaimed for coffee and yes, real analysis.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 数据准备占据了数据分析师时间的[80%](https://www.dataversity.net/survey-shows-data-scientists-spend-time-cleaning-data/?utm_source=chatgpt.com)。想象一下，当你将所有这些时间和脑力都集中在生成更好的洞察力上时，你会节省多少时间，你会变得多么高效。时间被用来喝咖啡，以及进行真正的分析。
- en: Collaborative Sharing and Cloud Accessibility
  id: totrans-63
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 协作共享和云访问
- en: 'I believe collaboration is a key player in the data science industry, and here
    is why: No single person usually has all the expertise required to take a project
    from raw data to real real-world project.'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为协作是数据科学行业的关键参与者，原因如下：通常没有一个人拥有从原始数据到真实世界项目的所有所需专业知识。
- en: Stay with me.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 请继续跟随我。
- en: Consider data science a process. It involves collecting data, storing it in
    a database, and creating algorithms and models that improve data quality, analysis,
    visualization, and other essentials.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 将数据科学视为一个过程。它涉及收集数据，将其存储在数据库中，并创建改进数据质量、分析、可视化和其他基本要素的算法和模型。
- en: To handle data effectively, these stages are often handled by various professionals
    specializing in diverse areas, all working together toward a shared goal. Hence,
    collaboration.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 为了有效地处理数据，这些阶段通常由各种专业于不同领域的专业人士处理，他们共同努力实现共同目标。因此，协作。
- en: Power BI, being a cloud-based platform, allows you to publish and share your
    analysis reports with other data professionals.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 作为基于云的平台，Power BI 允许你与其他数据专业人士发布和分享你的分析报告。
- en: Instead of emailing Excel files (which I’m sure we all did once or twice), with
    a few clicks, I was able to publish a dashboard and share a live link with my
    team. They can make changes, share their thoughts, or even update the data source
    in real time.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 与其通过电子邮件发送 Excel 文件（我相信我们每个人都至少做过一两次），只需几点击，我就能发布仪表板并与我的团队分享一个实时链接。他们可以实时进行更改，分享他们的想法，甚至更新数据源。
- en: In a remote/hybrid work world, having that sort of seamless collaboration is
    a real game-changer for data scientists.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 在远程/混合工作世界中，拥有这种无缝协作对于数据科学家来说确实是一个真正的游戏改变者。
- en: '* * *'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Applicable takeaways
  id: totrans-72
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 适用的要点
- en: If you have ever tried data analysis and visualization but found it difficult
    or complex to understand, maybe you haven’t been using the right tools.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你曾经尝试过数据分析与可视化，但发现它难以理解或复杂，可能你还没有使用正确的工具。
- en: Power BI didn’t just help me tackle the problems I encountered when I first
    started working with data, it transformed how I approached data altogether.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: Power BI不仅帮助我解决了我在最初开始处理数据时遇到的问题，它还彻底改变了我的数据处理方法。
- en: Most of us are already familiar with Power BI, while it’s a new adventure for
    others. Regardless of what category you fall into, I highly encourage constant
    learning of the tool and how to maximize its features.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 我们中的大多数人都已经熟悉Power BI，而对于其他人来说，它是一个新的冒险。无论你属于哪个类别，我都强烈鼓励你持续学习这个工具及其如何最大化其功能。
- en: I highly recommend checking out [Guy in a Cube](https://www.youtube.com/watch?v=udzsJqUZPrY&pp=0gcJCdgAo7VqN5tD)
    on YouTube, he teaches Power BI through his informative videos.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 我强烈推荐在YouTube上查看[Guy in a Cube](https://www.youtube.com/watch?v=udzsJqUZPrY&pp=0gcJCdgAo7VqN5tD)，他通过他的信息视频教授Power
    BI。
- en: For verbal learners, you can get a huge chunk of information from [Brett Powell’s
    book](https://www.goodreads.com/book/show/35965868-microsoft-power-bi-cookbook).
    I mentioned it at the introduction, and personally, for me, it’s hands down the
    best book on data visualization I’ve ever read.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 对于喜欢口头学习的人来说，你可以从[Brett Powell的书籍](https://www.goodreads.com/book/show/35965868-microsoft-power-bi-cookbook)中获得大量信息。我在介绍中提到了它，并且就我个人而言，这是我看过的关于数据可视化的最佳书籍。
- en: Familiarize yourself with these features and start improving your data analysis
    and visualization workflow.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 熟悉这些功能，并开始改进你的数据分析与可视化工作流程。
