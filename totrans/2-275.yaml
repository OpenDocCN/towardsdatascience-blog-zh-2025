- en: Building a Modern Dashboard with Python and Gradio
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/building-a-modern-dashboard-with-python-and-gradio/](https://towardsdatascience.com/building-a-modern-dashboard-with-python-and-gradio/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1749076278557" class="mdspan-comment">This is the</mdspan>
    second in a short series on developing data dashboards using the latest Python-based
    GUI development tools, Streamlit, Gradio, and Taipy.
  prefs: []
  type: TYPE_NORMAL
- en: The source dataset for each dashboard will be the same, but stored in different
    formats. As much as possible, I’ll also try to make the actual dashboard layouts
    for each tool resemble each other and have the same functionality.
  prefs: []
  type: TYPE_NORMAL
- en: In the first part of this series, I created a Streamlit version of the dashboard
    that retrieves its data from a local PostgreSQL database. You can view that article
    [here](https://towardsdatascience.com/building-a-data-dashboard-9441db646697/).
  prefs: []
  type: TYPE_NORMAL
- en: This time, we’re exploring the use of the Gradio library.
  prefs: []
  type: TYPE_NORMAL
- en: The data for this dashboard will be in a local CSV file, and Pandas will be
    our primary data processing engine.
  prefs: []
  type: TYPE_NORMAL
- en: If you want to see a quick demo of the app, I have deployed it to Hugging Face
    Spaces. You can run it using the link below, but note that the two input date
    picker pop-ups do not work due to a known bug in the Hugging Face environment.
    This is only the case for deployed apps on HF, you can still change the dates
    manually. Running the app locally works fine and doesn’t have this issue.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[**Dashboard demo on HuggingFace**](https://huggingface.co/spaces/taupirho/data-dashboard)'
  prefs: []
  type: TYPE_NORMAL
- en: What is Gradio?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Gradio is an open-source Python package that simplifies the process of building
    demos or web applications for machine learning models, APIs, or any Python function.
    With it, you can create demos or web applications without needing JavaScript,
    CSS, or web hosting experience. By writing just a few lines of Python code, you
    can unlock the power of Gradio and seamlessly showcase your machine-learning models
    to a broader audience.
  prefs: []
  type: TYPE_NORMAL
- en: Gradio simplifies the development process by providing an intuitive framework
    that eliminates the complexities associated with building user interfaces from
    scratch. Whether you are a machine learning developer, researcher, or enthusiast,
    Gradio allows you to create beautiful and interactive demos that enhance the understanding
    and accessibility of your machine learning models.
  prefs: []
  type: TYPE_NORMAL
- en: This open-source Python package helps you bridge the gap between your machine
    learning expertise and a broader audience, making your models accessible and actionable.
  prefs: []
  type: TYPE_NORMAL
- en: What we’ll develop
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We’re developing a data dashboard. Our source data will be a single CSV file
    containing 100,000 synthetic sales records.
  prefs: []
  type: TYPE_NORMAL
- en: The actual source of the data isn’t ***that*** important. It could just as easily
    be a text file, an Excel file, SQLite, or any database you can connect to.
  prefs: []
  type: TYPE_NORMAL
- en: This is what our final dashboard will look like.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/dc944caa9f9a88b969d8cef8ae5fde96.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: There are four main sections.
  prefs: []
  type: TYPE_NORMAL
- en: The top row enables the user to select specific start and end dates and/or product
    categories using date pickers and a drop-down list, respectively.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The second row — Key metrics — shows a top-level summary of the chosen data.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The Visualisation section allows the user to select one of three graphs to display
    the input dataset.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The raw data section is precisely what it claims to be. This tabular representation
    of the chosen data effectively shows a snapshot of the underlying CSV data file.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Using the dashboard is easy. Initially, stats for the whole data set are displayed.
    The user can then narrow the data focus using the three filter fields at the top
    of the display. The graphs, key metrics, and raw data sections dynamically update
    to reflect the user’s choices in the filter fields.
  prefs: []
  type: TYPE_NORMAL
- en: The underlying data
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As mentioned, the dashboard’s source data is contained in a single comma-separated
    values (CSV) file. The data consists of 100,000 synthetic sales-related records.
    Here are the first ten records of the file to give you an idea of what it looks
    like.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: And here is some Python code you can use to generate a similar dataset. Ensure
    that both the NumPy and Pandas libraries are installed first.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Installing and using Gradio
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Installing Gradio is easy using **pip**, but for coding, the best practice is
    to set up a separate Python environment for all your work. I use Miniconda for
    that purpose, but feel free to use whatever method suits your work practice.
  prefs: []
  type: TYPE_NORMAL
- en: '*If you want to go down the conda route and don’t already have it, you must
    install Miniconda (recommended) or Anaconda first. *'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*Please note that, at the time of writing,* Gradio needs at least Python 3.8
    installed to work correctly.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Once the environment is created, switch to it using the **‘activate’** command,
    and then run **‘pip install’** to install our required Python libraries.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: '**Key differences between Streamlit and Gradio**'
  prefs: []
  type: TYPE_NORMAL
- en: As I’ll demonstrate in this article, it’s possible to produce very similar data
    dashboards using Streamlit and Gradio. However, their ethos differs in several
    key ways.
  prefs: []
  type: TYPE_NORMAL
- en: '**Focus**'
  prefs: []
  type: TYPE_NORMAL
- en: Gradio specialises in creating interfaces for machine learning models, whilst
    Streamlit is more designed for general-purpose data applications and visualisations.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Ease of use**'
  prefs: []
  type: TYPE_NORMAL
- en: Gradio is known for its simplicity and rapid prototyping capabilities, making
    it easier for beginners to use. Streamlit offers more advanced features and customisation
    options, which may require a steeper learning curve.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Interactivity**'
  prefs: []
  type: TYPE_NORMAL
- en: Streamlit uses a reactive programming model where any input change triggers
    a complete script rerun, updating all components immediately. Gradio, by default,
    updates only when a user clicks a submit button, though it can be configured for
    live updates.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Customization**'
  prefs: []
  type: TYPE_NORMAL
- en: Gradio focuses on pre-built components for quickly demonstrating AI models.
    Streamlit provides more extensive customisation options and flexibility for complex
    projects.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Deployment**'
  prefs: []
  type: TYPE_NORMAL
- en: Having deployed both a Streamlit and a Gradio app, I would say it’s easier to
    deploy a Streamlit app than a Gradio app. In Streamlit, deployment can be done
    with a single click via the Streamlit Community Cloud. This functionality is built
    into any Streamlit app you create. Gradio offers deployment using Hugging Face
    Spaces, but it involves more work. Neither method is particularly complex, though.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Use cases**'
  prefs: []
  type: TYPE_NORMAL
- en: Streamlit excels in creating data-centric applications and interactive dashboards
    for complex projects. Gradio is ideal for quickly showcasing machine learning
    models and building simpler applications.
  prefs: []
  type: TYPE_NORMAL
- en: '**The Gradio Dashboard Code**'
  prefs: []
  type: TYPE_NORMAL
- en: I’ll break down the code into sections and explain each one as we proceed.
  prefs: []
  type: TYPE_NORMAL
- en: We begin by importing the required external libraries and loading the full dataset
    from the CSV file into a Pandas DataFrame.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: Next, we configure a time-to-live cache with a maximum of 128 items and an expiration
    of 300 seconds. This is used to store the results of expensive function calls
    and speed up repeated lookups
  prefs: []
  type: TYPE_NORMAL
- en: The **get_unique_categories** function returns a list of unique, cleaned (capitalised)
    categories from the `csv_data` DataFrame, caching the result for quicker access.
  prefs: []
  type: TYPE_NORMAL
- en: The **get_date_range** function returns the minimum and maximum order dates
    from the dataset, or None if the data is unavailable.
  prefs: []
  type: TYPE_NORMAL
- en: The **filter_data** function filters the csv_data DataFrame based on a specified
    date range and optional category, returning the filtered DataFrame.
  prefs: []
  type: TYPE_NORMAL
- en: The **get_dashboard_stats** function retrieves summary metrics — total revenue,
    total orders, average order value, and top category — for the given filters. Internally
    it uses `filter_data()` to scope the dataset and then calculate these key statistics.
  prefs: []
  type: TYPE_NORMAL
- en: The **get_data_for_table f**unction returns a detailed DataFrame of filtered
    sales data, sorted by **order_id** and **order_date**, including additional revenue
    for each sale.
  prefs: []
  type: TYPE_NORMAL
- en: The **get_plot_data** function formats data for generating a plot by summing
    revenue over time, grouped by date.
  prefs: []
  type: TYPE_NORMAL
- en: The **get_revenue_by_category** function aggregates and returns revenue by category,
    sorted by revenue, within the specified date range and category.
  prefs: []
  type: TYPE_NORMAL
- en: The **get_top_products** function returns the top 10 products by revenue, filtered
    by date range and category.
  prefs: []
  type: TYPE_NORMAL
- en: Based on the orientation argument, the **create_matplotlib_figure** function
    generates a bar plot from the data and saves it as an image file, either vertical
    or horizontal.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: The **update_dashboard** function retrieves key sales statistics (total revenue,
    total orders, average order value, and top category) by calling the`get_dashboard_stats`
    function. It gathers data for three distinct visualisations (revenue over time,
    revenue by category, and top products), then uses `create_matplotlib_figure` to
    generate plots. It prepares and returns a data table (via the `get_data_for_table()`
    function) along with all generated plots and stats so they can be displayed in
    the dashboard.
  prefs: []
  type: TYPE_NORMAL
- en: The **create_dashboard** function sets the date boundaries (minimum and maximum
    dates) and establishes the initial default filter values. It uses Gradio to construct
    a user interface (UI) featuring date pickers, category drop-downs, key metric
    displays, plot tabs, and a data table. It then wires up the filters so that changing
    any of them triggers a call to the **update_dashboard** function, ensuring the
    dashboard visuals and metrics are always in sync with the selected filters. Finally,
    it returns the assembled Gradio interface launched as a web application.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: Running the program
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Create a Python file, e.g. gradio_test.py, and insert all the above code snippets.
    Save it, and run it like this,
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: Click on the local URL shown, and the dashboard will open full screen in your
    browser.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This article provides a comprehensive guide to building an interactive sales
    performance dashboard using Gradio and a CSV file as its source data.
  prefs: []
  type: TYPE_NORMAL
- en: Gradio is a modern, Python-based open-source framework that simplifies the creation
    of data-driven dashboards and GUI applications. The dashboard I developed allows
    users to filter data by date ranges and product categories, view key metrics such
    as total revenue and top-performing categories, explore visualisations like revenue
    trends and top products, and navigate through raw data with pagination.
  prefs: []
  type: TYPE_NORMAL
- en: I also mentioned some key differences between developing visualisation tools
    using Gradio and Streamlit, another popular front-end Python library.
  prefs: []
  type: TYPE_NORMAL
- en: This guide provides a comprehensive implementation of a Gradio data dashboard,
    covering the entire process from creating sample data to developing Python functions
    for querying data, generating plots, and handling user input. This step-by-step
    approach demonstrates how to leverage Gradio’s capabilities to create user-friendly
    and dynamic dashboards, making it ideal for data engineers and scientists who
    want to build interactive data applications.
  prefs: []
  type: TYPE_NORMAL
- en: Although I used a CSV file for my data, modifying the code to use another data
    source, such as a relational database management system (RDBMS) like SQLite, should
    be straightforward. For example, in my other article in this series on creating
    a similar dashboard using Streamlit, the data source is a PostgreSQL database.
  prefs: []
  type: TYPE_NORMAL
