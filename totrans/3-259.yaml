- en: Should Data Scientists Care About Quantum Computing?
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 数据科学家是否应该关注量子计算？
- en: 原文：[https://towardsdatascience.com/should-data-scientists-care-about-quantum-computing/](https://towardsdatascience.com/should-data-scientists-care-about-quantum-computing/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/should-data-scientists-care-about-quantum-computing/](https://towardsdatascience.com/should-data-scientists-care-about-quantum-computing/)
- en: I am sure the quantum hype has reached every person in tech (and outside it,
    most probably). With some over-the-top claims, like “some company has proved quantum
    supremacy,” “the quantum revolution is here,” or my favorite, “quantum computers
    are here, and it will make classical computers obsolete.” I am going to be honest
    with you; most of these claims are intended as a marketing exaggeration, but I
    am entirely certain that many people believe that they are true.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 我相信量子炒作已经触及了科技领域的每个人（以及可能之外的人）。有一些夸张的声明，比如“某些公司已经证明量子霸权”，“量子革命已经到来”，或者我最喜欢的，“量子计算机已经到来，它将使传统计算机过时”。我要坦白地告诉你；大多数这些声明都是作为营销夸张而提出的，但我完全确信许多人相信它们是真的。
- en: The issue here is not whether or not these claims are accurate, but, as ML and
    AI professionals who need to keep up with what’s happening in the tech field,
    should you, if at all, care about quantum computing?
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 这里的问题不是这些声明是否准确，而是作为需要跟上科技领域发展动态的机器学习和人工智能专业人士，你是否应该关注量子计算？
- en: Because I am an engineer first before a quantum computing researcher, I thought
    to write this article to give everyone in data science an estimate of how much
    they should really care about quantum computing.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 因为我是工程师，而不是量子计算研究员，所以我想到写这篇文章，给数据科学领域的每个人一个关于他们应该真正关注量子计算多少的估计。
- en: 'Now, I understand that some ML and AI professionals are quantum enthusiasts
    and would like to learn more about quantum, regardless of whether or not they
    will use it in their daily job roles. At the same time, others are just curious
    about the field and want to be able to distinguish the actual progress from the
    hype. My intention in writing this article is to give a somewhat lengthy answer
    to two questions: Should data scientists care about quantum? And how much should
    you care?'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我明白了一些机器学习和人工智能专业人士是量子爱好者，并且无论他们是否会在日常工作中使用它，都希望了解更多关于量子知识。同时，其他人只是对这个领域感到好奇，并希望能够区分实际的进展和炒作。我写这篇文章的目的是对两个问题给出一个相对详细的回答：数据科学家是否应该关注量子？以及应该关注多少？
- en: Before I answer, I should emphasize that 2025 is the year of quantum information
    science, and so there will be a lot of hype everywhere; it is the best time to
    take a second as a person in tech or a tech enthusiast, to know some basics about
    the field so you can definitively know when something is pure hype or if it has
    hints of facts.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在回答之前，我应该强调2025年是量子信息科学的年份，因此到处都会有很多炒作；这是作为科技人员或科技爱好者，花点时间去了解这个领域的基础知识，以便你能够明确知道某件事是纯粹的炒作还是有一些事实依据的最佳时机。
- en: Now that we set the pace, let’s jump into the first question: *Should data scientists
    care about quantum computing? *
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 既然我们已经设定了节奏，让我们直接进入第一个问题：*数据科学家是否应该关注量子计算？*
- en: Here is the short answer, *“a little”*. The answer is that, although the current
    state of quantum computers is not optimal for building real-life applications,
    there is no minimal overlap between quantum computing and data science.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 简短的答案是，“一点”。答案是，尽管当前量子计算机的状态并不适合构建现实生活中的应用，但量子计算与数据科学之间没有最小重叠。
- en: That is, data science can aid in advancing quantum technology faster, and once
    we have better quantum computers, they will help make various data science applications
    more efficient.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 也就是说，数据科学可以帮助更快地推进量子技术，一旦我们有了更好的量子计算机，它们将帮助使各种数据科学应用更加高效。
- en: 'Read more: **[The State of Quantum Computing: Where Are We Today?](https://towardsdatascience.com/the-state-of-quantum-computing-where-are-we-today-17ee19f51b1d/) **'
  id: totrans-10
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 阅读更多：**[量子计算的状态：我们今天在哪里？](https://towardsdatascience.com/the-state-of-quantum-computing-where-are-we-today-17ee19f51b1d/)**
- en: '**The Intersection of Quantum Computing and Data Science **'
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**量子计算与数据科学的交汇点**'
- en: First, let’s discuss how data science, namely AI, helps advance quantum computing,
    and then we will talk about how quantum computing can enhance data science workflows.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们讨论数据科学，特别是人工智能，如何推进量子计算，然后我们将讨论量子计算如何增强数据科学工作流程。
- en: '**How can AI help advance quantum computing? **'
  id: totrans-13
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**AI如何帮助推进量子计算？**'
- en: AI can help quantum computing in several ways, from hardware to optimization,
    algorithm development, and error mitigation.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能可以从多个方面帮助量子计算，从硬件到优化、算法开发以及错误缓解。
- en: 'On the hardware side, AI can help in:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 在硬件方面，人工智能可以帮助：
- en: Optimizing circuits by minimizing gate counts, choosing efficient decompositions,
    and mapping circuits to hardware-specific constraints.
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过最小化门计数、选择高效的分解以及将电路映射到硬件特定的约束来优化电路。
- en: Optimizing control pulses to improve gate fidelity on real quantum processors.
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 优化控制脉冲以改善真实量子处理器上的门保真度。
- en: Analyzing experimental data on qubit calibration to reduce noise and improve
    performance.
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分析量子比特校准的实验数据以减少噪声并提高性能。
- en: 'Beyond the hardware, AI can help improve quantum algorithm design and implementation
    and aid in error correction and mitigation, for example:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 除了硬件之外，人工智能可以帮助改进量子算法的设计和实现，并在错误纠正和缓解方面提供帮助，例如：
- en: We can use AI to interpret results from quantum computations and design better
    feature maps for quantum machine learning (QML), which I will address in a future
    article.
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们可以使用人工智能来解释量子计算的结果，并为量子机器学习（QML）设计更好的特征映射，这些内容我将在未来的文章中讨论。
- en: AI can analyze quantum system noise and predict which errors are most likely
    to occur.
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 人工智能可以分析量子系统噪声并预测最可能发生的错误。
- en: We can also use different AI algorithms to adapt quantum circuits to noisy processors
    by selecting the best qubit layouts and error mitigation techniques.
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们还可以使用不同的AI算法通过选择最佳量子比特布局和错误缓解技术来适应有噪声的处理器。
- en: Also, one of the most interesting applications that includes three advanced
    technologies is using AI on HPC (high-performance computing, or supercomputers,
    in short) to optimize and simulate quantum algorithms and circuits efficiently.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，包括三种先进技术在内的最有趣的应用之一是使用人工智能在HPC（高性能计算，或简称为超级计算机）上高效优化和模拟量子算法和电路。
- en: '**How can quantum optimize data science workflows? **'
  id: totrans-24
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**量子如何优化数据科学工作流程？**'
- en: Okay, now that we have addressed some of the ways that AI can help take quantum
    technology to the next level, we can now address how quantum can help optimize
    data science workflows.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 好的，现在我们已经讨论了人工智能如何帮助将量子技术提升到下一个层次的一些方法，我们现在可以讨论量子如何帮助优化数据科学工作流程。
- en: 'Before we dive in, let me remind you that quantum computers are (or will be)
    very good at optimization problems. Based on that, we can say that some areas
    where quantum will help are:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们深入探讨之前，让我提醒您，量子计算机在优化问题上是非常擅长（或将会擅长）的。基于这一点，我们可以这样说，量子将帮助的一些领域包括：
- en: Solving complex optimization tasks faster, like supply chain problems.
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 更快地解决复杂的优化任务，如供应链问题。
- en: Quantum computing has the potential to process and analyze massive datasets
    exponentially faster (once we reach better quantum computers with lower error
    rates).
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 量子计算有潜力以指数级速度处理和分析大量数据集（一旦我们达到具有更低错误率的更好量子计算机）。
- en: 'Quantum machine learning (QML) algorithms will lead to faster training and
    improved models. Examples of QML algorithms that are currently being developed
    and tested are:'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 量子机器学习（QML）算法将导致训练速度更快和模型改进。目前正在开发和测试的QML算法示例包括：
- en: Quantum support vector machines (QSVMs).
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 量子支持向量机（QSVMs）。
- en: Quantum neural networks (QNNs).
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 量子神经网络（QNNs）。
- en: Quantum principal component analysis (QPCA).
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 量子主成分分析（QPCA）。
- en: We already know that quantum computers are different because of how they work.
    They will help classical computers by addressing the challenges of scaling algorithms
    to process large datasets faster. Address some NP-hard problems and bottlenecks
    in training deep learning models.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经知道量子计算机之所以不同，是因为它们的工作方式。它们将通过解决将算法扩展到处理大数据集的挑战来帮助经典计算机。解决一些NP难题和深度学习模型训练中的瓶颈。
- en: Okay, first, thank you for making it this far with me in this article; you might
    be thinking now, *“All of that is nice and cool, but you still haven’t answered
    why should I *a data scientist* care about quantum?” *
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 好的，首先，感谢您陪我走到这里，阅读这篇文章；现在您可能正在想，“所有这些都很好，很酷，但你还是没有回答为什么我应该作为一个数据科学家关心量子？”
- en: You are right; to answer this, let me put my marketing hat on!
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 您说得对；为了回答这个问题，让我戴上我的营销帽子！
- en: The way I describe quantum computing now is machine learning and AI algorithms
    from the 1970s and 1980s. We had ML and AI algorithms but not the hardware needed
    to utilize them fully!
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 我现在描述的量子计算方式是来自20世纪70年代和80年代的机器学习和AI算法。我们当时有ML和AI算法，但没有充分利用它们的硬件！
- en: 'Read more: **[Qubits Explained: Everything You Need to Know](https://towardsdatascience.com/qubits-explained-everything-you-need-to-know-1c510e6e9f06/) **'
  id: totrans-37
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 阅读更多：**[量子比特解释：你需要知道的一切](https://towardsdatascience.com/qubits-explained-everything-you-need-to-know-1c510e6e9f06/)**
- en: Being an early contributor to new technology means you get to be one of the
    people who help shape the future of the field. Today, the quantum field needs
    more quantum-aware data scientists in finance, healthcare, and tech industries
    to help move the field forward. So far, physicists and mathematicians have controlled
    the field, but we can’t move forward without engineers and data scientists now.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 成为新技术早期贡献者意味着你有机会成为帮助塑造该领域未来的人之一。如今，量子领域需要更多在金融、医疗和科技行业具有量子意识的科学家来推动该领域的发展。到目前为止，物理学家和数学家主导了该领域，但我们现在没有工程师和数据科学家的参与是无法前进的。
- en: The interesting part is that advancing the field from this point doesn’t always
    mean you need to have all the knowledge and understanding of quantum physics and
    mechanics, but rather how to use what you already know (aka ML and AI) to move
    the technology further.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 有趣的是，从这一点推动该领域的发展并不总是意味着你需要拥有所有量子物理和力学的知识和理解，而是如何利用你已有的知识（即机器学习和人工智能）来推动技术的发展。
- en: '**Final thoughts **'
  id: totrans-40
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**最后的思考**'
- en: One of the critical steps of any new technology is what I like to think of as
    the “last hurdle before the breakthrough.” All new technologies faced pushback
    or hurdles before they proved helpful, and their use exploded. It is often difficult
    to pinpoint that last hurdle, and as a person in tech, I am fully aware of how
    many new things keep popping up daily. It is humanly impossible to keep up with
    all new advances in technology in all fields! That is a full-time job by itself.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 任何新技术的关键步骤之一，我愿意称之为“突破前的最后一道难关”。所有新技术在证明其有用性之前都遇到了阻力或难关，其应用才得以爆炸式增长。通常很难确定最后一道难关，作为一个科技行业的人，我完全清楚每天都有多少新事物不断涌现。在所有领域跟上所有技术的新进展在人类层面上是不可能的！这本身就是一份全职工作。
- en: That being said, it is always an advantage to be ahead of the demand when it
    comes to new technology. As in, be in a field before it becomes “cool.” By no
    means am I telling data scientists to quit their field and jump on the quantum
    hype train, but I hope this article helps you decide how much or little involvement
    you, as an ML or AI professional, would want to have with quantum computing.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 话虽如此，在新技术方面领先于需求总是一个优势。也就是说，在它变得“酷”之前进入一个领域。我绝不是在告诉数据科学家放弃他们的领域而跳上量子炒作的列车，但我希望这篇文章能帮助你决定作为机器学习或人工智能专业人士，你希望参与量子计算的程度。
- en: So, should ML and AI professionals care about quantum? Only enough to be able
    to decide how it can affect/ help with their career progress.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，机器学习和人工智能专业人士应该关心量子吗？只需要足够了解它如何影响/帮助他们的职业发展。
