- en: 'Feature Detection, Part 2: Laplace & Gaussian Operators'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/feature-detection-part-2-laplace-gaussian-operators/](https://towardsdatascience.com/feature-detection-part-2-laplace-gaussian-operators/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1762808235695" class="mdspan-comment">Introduction</mdspan>
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Feature detection is a domain of computer vision that focuses on using tools
    to detect regions of interest in images. A significant aspect of most feature
    detection algorithms is that they do not employ machine learning under the hood,
    making the results more interpretable and even faster in some cases.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: '[In the previous article of this series](https://towardsdatascience.com/feature-detection-part-1-image-derivatives-gradients-and-sobel-operator/),
    we learned about **edges** — zones where the image intensity drastically changes.
    Edges usually represent local zones where an object of interest can be found.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: For example, consider an image of a blue sky with a small plane flying over
    it. The intensity difference across the entire image will be nearly zero, except
    for the small zone containing the intersection of the plane with the blue sky
    background. As a result, we can easily detect the zone where the plane is located
    and its shape using the image derivative or the Sobel filter.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d583271f9cd709a37d7009dffb11e206.png)'
  id: totrans-6
  prefs: []
  type: TYPE_IMG
- en: Edges are located in zones of substantial pixel intensity change. In this example,
    edges can be found near the border of the plane and clouds.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: '*In other words, **we can detect edges by taking the minimum/maximum peaks
    of the first derivative of the intensity function**, which is represented by the
    image in the middle.*'
  id: totrans-8
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Second image derivative
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let us return to the mentioned example and ask ourselves what will happen if
    we take the second derivative? The answer is shown on the right graph below. In
    this case, **the minimum/maximum peaks of the first derivative will correspond
    to zeros of the second derivative.**
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/39ec41642aaffb71157af3d891fb0b30.png)'
  id: totrans-11
  prefs: []
  type: TYPE_IMG
- en: Intensity values across the X-axis (image on the left).
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
- en: 'First derivative (image in the middle): local extrema indicate an edge.'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: 'Second derivative (image on the right): zero-crossing area indicates an edge.'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: Image adapted by the author. Source: [Laplace Operator (OpenCV documentation).](https://docs.opencv.org/3.4/d5/db5/tutorial_laplace_operator.html)
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: This means that we can now use zero values of the second derivative as an additional
    criterion for edge detection. However, it is essential to remain cautious, as
    other points on the image can also result in second derivatives being equal to
    0, yet not be edges themselves. For that, it is recommended to use other filters
    to eliminate such cases.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: '*Generally, image edges result in very sharp zero-crossing areas.*'
  id: totrans-17
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Definition
  id: totrans-18
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The Laplacian is formally defined by the formula below:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/8dd4a3710b3f293f62a46cd33ff6f54b.png)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
- en: Laplace formula
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: As we can see, the Laplacian is simply the sum of second derivatives with respect
    to x and y directions.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: '*The Laplacian does not provide information about edge direction.*'
  id: totrans-23
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Discrete approximation
  id: totrans-24
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Given the Laplacian formula above for the continuous case, let us try to obtain
    an approximation for the discrete case of images.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
- en: For that, let us suppose that for the image part below, we want to calculate
    the Laplacian for the pixel I₂₂. Let us compute a derivative in the X-axis direction.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/51cb88dcb0328edc5331dd3c832f7ac3.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
- en: In this example, we would like to approximate Laplace for the central pixel
    I₂₂
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
- en: 'For that, we reuse twice the derivative formula from the previous article by
    choosing two values for Δx: -1 and 1\. We get:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
- en: 'For Δx = -1: dI / dx = I₂₃ – I₂₂'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'For Δx = 1: dI / dx = I₂₂ – I₂₁'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: To calculate the first derivative, we basically calculate the difference between
    adjacent pixels. We can proceed with the same logic for the second derivative,
    which can be informally thought of as the difference of the difference.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
- en: 'Therefore, we can take the two differences we have just calculated and find
    their difference. More formally, it would be the same if we applied the standard
    derivative formula by setting Δx to -1\. So we get:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: d²I / dx = (I₂₃ – I₂₂) – (I₂₂ – I₂₁) = I₂₃ – 2I₂₂ + I₂₁
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Great! We have computed the second derivative in the X-direction. We can do
    the analogous procedure for the second derivative in the Y-direction. We will
    get the following expression:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: d²I / dy = (I₃₂ – I₂₂) – (I₂₂ – I₁₂) = I₃₂ – 2I₂₂ + I₁₂
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Finally, the only thing left to do is to sum up both derivatives. We get:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
- en: d²I / dx + d²I / dy = I₁₂ + I₂₁ + I₂₃ + I₃₂ – 4I₂₂
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The whole Laplacian computation process can be visualised by the diagram below:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/852299003743a410d68abb5cfec18322.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
- en: Obtaining a formula for the Laplace calculation in the discrete case
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
- en: 'Based on the achieved result, we can also construct a 3×3 convolutional kernel
    for the Laplacian:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/49c5a015c7cdbd00316d0a354225d8ba.png)'
  id: totrans-43
  prefs: []
  type: TYPE_IMG
- en: The Laplace kernel
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
- en: '*As an interesting fact, the sum of the elements of this kernel is 0, which
    means that if an input image is constant, then applying the filter will produce
    a matrix with zero elements. It is a logical result since there is no change in
    intensity.*'
  id: totrans-45
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: In comparison to Sobel and Scharr kernels, **the Laplace kernel detects intensity
    changes in both directions**. It is sufficient to apply the 3×3 kernel to any
    image, and the Laplace operator will output the final scalar values representing
    intensity changes.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
- en: '*As a reminder, with Sobel and Scharr operators, the kernels were applied separately
    to the X and Y axes, and then their magnitudes were calculated.*'
  id: totrans-47
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Diagonal edge detection
  id: totrans-48
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We have deducted a kernel that represents a sum of second derivatives across
    the X and Y axes. Therefore, this method would be well-suited for detecting both
    horizontal and vertical edges. *But what if an edge in the image has a diagonal
    direction?* We have not taken it into account yet.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
- en: 'For that reason, the kernel above is usually slightly adjusted to account for
    the diagonal direction. One of the most popular options is to use the following
    kernel:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/544912e7daf0581b21935b998ef97199.png)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
- en: An alternative to Laplace kernel which is symmetric horizontally, vertically
    and diagonally.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
- en: Isotropy
  id: totrans-53
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We can observe that the Laplace matrix is symmetric, which makes it isotropic.
    **Isotropy** is a property according to which the kernel is rotation-invariant,
    meaning that the output resulting from applying an isotropic filter to an image
    and its rotated version is the same.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
- en: Noise
  id: totrans-55
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The Laplace kernel we saw above works well for edge detection. However, we
    didn’t take into account another aspect that would prevent us from efficiently
    applying that filter in real life: **noise**.'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
- en: We saw several graphs of image intensity change along the X-axis at the beginning
    of this article, where we plotted the first and second derivatives of the image
    intensity. In fact, these plots were constructed for a perfect image where there
    is no noise.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
- en: If the noise is present, we might end up in a situation like the one depicted
    in the diagram below.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/028fe32cfe8142c1e49f83e487c58ddb.png)'
  id: totrans-59
  prefs: []
  type: TYPE_IMG
- en: Given the fact that noise is present on the input image (on the left), intensity
    values along the X-axis result in oscillations making the first derivative (on
    the right) (and as a result, the second one) hard to analyse.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
- en: The graph on the left illustrates a more realistic scenario of intensity values
    along an axis in the image. Although the noise is not very strong, it still fluctuates
    rapidly in local areas. At the same time, we use derivatives to detect the same
    rapid changes, which creates a problem.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
- en: Ultimately, taking the first derivative would result in the change in intensity,
    as shown on the graph on the right. Obviously, normal edge detection using derivatives
    is not possible in the presence of such oscillations.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
- en: Gaussian filter
  id: totrans-63
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A **Gaussian filter** is a method for suppressing noise in an image, allowing
    the Laplacian or another edge detection operator to be applied without constraints.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
- en: 'Formally, the Gaussian distribution is given by the formula below (where μ
    = 0):'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/2b5c719edc8322d45c28978254dccbef.png)'
  id: totrans-66
  prefs: []
  type: TYPE_IMG
- en: Gaussian formula. μ is the mean (in our case μ = 0), and σ represents the standard
    deviation, which can be tuned for a given problem.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
- en: 'The Gaussian function g(x) is plotted below on the top-right graph:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c30ac9baacb91fb900a7259241a9350d.png)'
  id: totrans-69
  prefs: []
  type: TYPE_IMG
- en: 'Top-left: Intensity function.'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
- en: 'Top-right: Gaussian function.'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
- en: 'Bottom-left: the product between intensity and the Gaussian functions.'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
- en: 'Bottom-right: derivative of a product.'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
- en: '**Multiplying the intensity function I(x) by the Gaussian g(x) tends to smooth
    the intensity in general, which results in easier analysis.** The example is shown
    in the bottom-left diagram.'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
- en: Given the smooth function form, we can then take the first derivative, whose
    extrema points will indicate edges (bottom-right diagram).
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
- en: Derivative of Gaussian
  id: totrans-76
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'We can notice that that taking the first image derivative is a linear operation,
    thus we can decompose our computations in the following manner:'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e82811ad75c8393bb3811eb77c63e546.png)'
  id: totrans-78
  prefs: []
  type: TYPE_IMG
- en: Instead of calculating the derivative of a product, we can precompute the derivative
    of the Gaussian and then multiply it by the intensity function; the result will
    be the same but will require less computations.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
- en: This allows us to pre-compute the first derivative of the Gaussian in advance
    and then multiply it by the intensity function, which optimizes calculations.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
- en: Laplacian of Gaussian
  id: totrans-81
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'We can apply the same trick to the second derivative, about which we discussed
    at the beginning of this article, for edge detection. As a result, we can compute
    the second Gaussian derivative in advance and then multiply it by the intensity
    function. The result is shown on the bottom-right graph:'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/cfb4491cdbd32647b54766d471c5fa66.png)'
  id: totrans-83
  prefs: []
  type: TYPE_IMG
- en: 'Top-left: Intensity function.'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
- en: 'Top-right: Gaussian function.'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
- en: 'Bottom-left: the second derivative of the Gaussian function (also known as
    the inverted Mexican sombrero).'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
- en: 'Bottom-right: the product between the second Gaussian derivative and the Intensity
    function.'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
- en: The resulting function is called the **Laplacian of Gaussian** and is used extensively
    in edge detection, while also being resilient to image noise.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
- en: The second derivative of a Gaussian (bottom-left image) is often referred to
    as an inverted **“Mexican sombrero”** because of its high shape similarity with
    a sombrero hat.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
- en: OpenCV
  id: totrans-90
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Having studied edge detection theory using second image derivatives, it is time
    to look at how Laplace filters can be implemented in OpenCV.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
- en: Laplacian of Gaussian
  id: totrans-92
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'First of all, let us import the necessary libraries and upload an input image:'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  id: totrans-94
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'We are going to use an image example containing several coins:'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/26a3c3972d4ffcf02815c7d986226441.png)'
  id: totrans-96
  prefs: []
  type: TYPE_IMG
- en: Input image
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
- en: 'Let us read the image:'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  id: totrans-99
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: We have converted the input image to grasycale format to be able to later take
    derivatives relative to intensity changes.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
- en: 'As discussed above, before using the Laplace operator, we are going to apply
    the Gaussian filter:'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  id: totrans-102
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: The second parameter (7, 7) refers to the kernel size.
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The third parameter is used to define the value of standard deviation σ from
    the Gaussian formula given above. Here, we set it to 0, which means that the standard
    deviation σ will be chosen automatically by OpenCV based on the provided kernel
    size.
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Now we are ready to apply the Laplace filter:'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  id: totrans-106
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Here we specify the output type as cv2.CV_16S, which is equivalent to the short
    type, with values in the range [-32768, 32767]. We do that since the Laplacian
    filter can produce values outside the standard pixel interval [0, 255]. If we
    had not done this, then the output values would have been clipped to [0, 255]
    and we would have lost information.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
- en: 'OpenCV also provides a useful function to map the raw Laplacian output (or
    any other resulting values) to the standard range [0, 255]:'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  id: totrans-109
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'The resulting variable **laplacian_absolute** has the same shape as **laplacian_signed**
    but with values clipped to [0, 255]. The mapping is done using the function ***cv2.convertScaleAbs()***
    in a way that preserves information about zero-crossings:'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
- en: The values whose absolute value is greater than 255 are clipped to 255.
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For the values between -255 and 255, the absolute value is taken.
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/f799dff652e0d7774fce671c7feb6764.png)'
  id: totrans-113
  prefs: []
  type: TYPE_IMG
- en: cv2.convertScaleAbs() function maps pixel values to the [0, 255] interval.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
- en: Zero-crossing detection
  id: totrans-115
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Unfortunately, the OpenCV documentation only shows an example of Laplacian
    application but does not demonstrate how to use its results for zero-cross edge
    detection. Below is a simple snippet example that implements that:'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  id: totrans-117
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: In simple terms, we create a **zero_crossings** variable that contains information
    on whether a pixel at position (x, y) is a zero-crossing candidate. In our code,
    we consider a pixel a zero-crossing if its sign (+ or -) differs from the sign
    of any shifted pixel by five positions in either horizontal or vertical direction.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
- en: '*We could have chosen another shift constant (not necessarily 5) or even combine
    several of them, and/or also take into account diagonal shifts as well.*'
  id: totrans-119
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*To exclude non-relevant zero-crossings, we then only keep those whose absolute
    laplacian value is greater than a defined threshold (20).*'
  id: totrans-120
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Visualization
  id: totrans-121
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Finally, let us plot the images we have retrieved throughout our analysis:'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  id: totrans-123
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'Here is the output result we get:'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/0b4277e68842a418306fade9ae0f23aa.png)'
  id: totrans-125
  prefs: []
  type: TYPE_IMG
- en: Output after applying Laplace filters. The right image is binary (containing
    only pixels with values of 0 or 255).
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
- en: As you can see, we successfully detected edges on the right binary image. The
    next step could, for example, involve applying the OpenCV method ***cv2.findContours()***
    to detect contours and further analyze them.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
- en: '*Given the simple form of the signed Laplacian output, we could have also used
    it to detect the borders of coins.*'
  id: totrans-128
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Conclusion
  id: totrans-129
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Using knowledge about image derivatives from the previous part, this article
    analyzes the role of the second derivative and zero-cross detection. It was also
    a great way to learn about the Laplace and Gaussian filters, which can be very
    easily implemented with OpenCV for edge detection.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
- en: Resources
  id: totrans-131
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '[Image Gradients | OpenCV](https://docs.opencv.org/4.x/da/d85/tutorial_js_gradients.html)'
  id: totrans-132
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Laplace Operator | OpenCV](https://docs.opencv.org/4.x/d5/db5/tutorial_laplace_operator.html)'
  id: totrans-133
