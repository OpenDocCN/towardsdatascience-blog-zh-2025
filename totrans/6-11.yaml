- en: What to Do If the Logit Decision Boundary Fails?
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如果对数决策边界失败，该怎么办？
- en: 原文：[https://towardsdatascience.com/what-to-do-if-the-logit-decision-boundary-fails-b8883e2abacc/](https://towardsdatascience.com/what-to-do-if-the-logit-decision-boundary-fails-b8883e2abacc/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/what-to-do-if-the-logit-decision-boundary-fails-b8883e2abacc/](https://towardsdatascience.com/what-to-do-if-the-logit-decision-boundary-fails-b8883e2abacc/)
- en: 'Logistic regression is by far the most widely used machine learning model for
    binary classification datasets. The model is relatively simple and is based on
    a key assumption: the existence of a linear **decision boundary** (a line or a
    surface in a higher-dimensional feature space) that can separate the classes of
    the target variable y based on the features in the model.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 逻辑回归是目前最广泛使用的机器学习模型，用于二元分类数据集。该模型相对简单，基于一个关键假设：存在一个线性**决策边界**（在更高维特征空间中的一条线或一个面），可以根据模型中的特征将目标变量
    y 的类别分开。
- en: In a nutshell, the decision boundary can be interpreted as a threshold at which
    the model assigns a data point to one class or the other, conditional on the predicted
    likelihood of belonging to a class.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，决策边界可以解释为模型根据预测属于某一类的可能性，将数据点分配到某一类或另一类的阈值。
- en: The figure below presents a schematic representation of the decision boundary
    that separates the target variable into two classes. In this case the model is
    based on a set of two features (x1 and x2). The target variable can be clearly
    separated into two classes based on the values of the features.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 下图展示了将目标变量分为两个类别的决策边界的示意图。在这种情况下，模型基于一组两个特征（x1 和 x2）。目标变量可以根据特征值清楚地分为两个类别。
- en: '![](../Images/f1cf62bd65e8eaf40a7a1cf534b83956.png)'
  id: totrans-5
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/f1cf62bd65e8eaf40a7a1cf534b83956.png)'
- en: However, in your daily modeling activities, the situation might look rather
    similar to the figure below.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，在你的日常建模活动中，情况可能看起来相当类似于下面的图。
- en: '![](../Images/a3764a8409048c0d24af1042610b013c.png)'
  id: totrans-7
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/a3764a8409048c0d24af1042610b013c.png)'
- en: Again, there are two features in this model. **However the estimated decision
    boundary does not separate the data based on the features.** This is one of the
    biggest issues related to the logistic model, whose impact is often highly underestimated
    among data scientists. The problem arises from significant overlap between the
    classes y=0 and y=1 in the feature space, making the decision boundary unable
    to cleanly separate them. This situation is commonly observed in imbalanced datasets,
    which can result in skewed decision boundaries.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 再次强调，这个模型中有两个特征。**然而，估计的决策边界并没有根据特征来区分数据。**这是与逻辑模型相关的一个最大问题，其影响在数据科学家中往往被高度低估。这个问题源于类别
    y=0 和 y=1 在特征空间中的显著重叠，使得决策边界无法干净地将其分开。这种情况在不平衡数据集中很常见，可能导致决策边界倾斜。
- en: '* * *'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'In such cases, logistic regression struggles because it assumes linear separability.
    The decision boundary will not cleanly divide the classes. **A major consequence
    of the problem concerns feature selection. During feature engineering, the features
    without strong separability may be deemed unimportant or insignificant by the
    model.** The typical recommendation for logistic regression feature selection,
    which can be found in many books and articles, points at recursive feature elimination.
    This is however pointless due to a simple fact: when some variables get removed
    from the model, the estimated parameters for the remaining variables will change
    accordingly, see:'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，逻辑回归会遇到困难，因为它假设线性可分性。决策边界不会干净地划分类别。**这个问题的一个主要后果是特征选择。在特征工程过程中，模型可能会认为没有强区分性的特征不重要或不显著。**许多书籍和文章中提到的逻辑回归特征选择的典型建议是递归特征消除。然而，这却是徒劳的，因为一个简单的事实：当某些变量从模型中移除时，剩余变量的估计参数将相应地改变，参见：
- en: '[**Integrating Feature Selection into the Model Estimation**](https://towardsdatascience.com/integrating-feature-selection-into-the-model-estimation-499c0732209d)'
  id: totrans-11
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[将特征选择集成到模型估计中](https://towardsdatascience.com/integrating-feature-selection-into-the-model-estimation-499c0732209d)'
- en: The relationships between predictors and the target variable are often interconnected.
    The coefficients in the reduced model will no longer reflect their values from
    the full model, what in the end effect might be leading to biased interpretations
    of the model parameters or predictions. **Moreover, under the scenario of weak
    separability by the decision boundary, the recursive feature elimination or even
    regularization will not help.**
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 预测变量和目标变量之间的关系通常是相互关联的。简化模型中的系数将不再反映它们在完整模型中的值，最终可能导致对模型参数或预测的偏差解释。**此外，在决策边界弱分离的情况下，递归特征消除甚至正则化也无法帮助。**
- en: What is the remedy for this problem?
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 这个问题的补救措施是什么？
- en: '* * *'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: With nearly 20 years of experience in modeling categorical data, I would suggest
    that the most effective solution to this issue is to perform feature engineering
    using probit regression rather than logistic regression (logit model). This approach
    has proven to be highly effective, and I have tested it many times in practice
    !
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 在建模分类数据方面拥有近20年的经验，我建议解决这个问题的最有效方法是使用概率单位回归而不是逻辑回归（logit模型）。这种方法已被证明非常有效，我在实践中多次测试过它！
- en: Similarly to the logistic regression, the probit model can be used to categorical
    data modeling. Instead of logistic function
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 与逻辑回归类似，概率单位模型可以用于分类数据建模。而不是逻辑函数
- en: '![](../Images/ec82ab4dc6f128ee0a7a0d61f04aac02.png)'
  id: totrans-17
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ec82ab4dc6f128ee0a7a0d61f04aac02.png)'
- en: it uses normal cumulative distribution function
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 它使用正常的累积分布函数
- en: '![](../Images/599bb8cc263fedc566888c7bb63426b5.png)'
  id: totrans-19
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/599bb8cc263fedc566888c7bb63426b5.png)'
- en: The models are quite similar, although training a probit model is often preferred
    over a logit model in terms of the decision boundary because the probit model
    assumes a normal cumulative distribution, which can lead to a more natural and
    smoother boundary. In contrast, the logit model’s logistic function may produce
    decision boundaries that are less flexible and more prone to overshooting or underfitting,
    especially when the data is not well-suited for a logistic transformation.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 这些模型相当相似，尽管在决策边界方面，通常更倾向于使用概率单位模型而不是logit模型，因为概率单位模型假设正态累积分布，这可以导致更自然和更平滑的边界。相比之下，logit模型的逻辑函数可能会产生不太灵活的决策边界，更容易过拟合或欠拟合，尤其是在数据不适合逻辑转换时。
- en: As a result, the probit model can better capture the nuances in the data, leading
    to more accurate and meaningful decision boundaries even for nonlinear and non
    normal data.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，概率单位模型能够更好地捕捉数据中的细微差别，即使在非线性和非正态数据中，也能导致更准确和有意义的决策边界。
- en: '* * *'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: Let us consider the following latent variable representation of the probit model
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们考虑以下概率单位模型的潜在变量表示
- en: '![](../Images/bce9812a5cf90e3daa58cf1dc1c39092.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/bce9812a5cf90e3daa58cf1dc1c39092.png)'
- en: where the value of the binary variable y_i is observed, as are the values of
    the explanatory variables x_i. The latent data z_i, however, are unobserved.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 其中观察到二元变量y_i的值，以及解释变量x_i的值。然而，潜在数据z_i是不可观察的。
- en: The model training can be performed by drawing sequentially from two distributions
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 模型训练可以通过从两个分布中依次抽取来实现
- en: '![](../Images/c9ed96dd13a4d32c6a41128d2b2b4ff2.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c9ed96dd13a4d32c6a41128d2b2b4ff2.png)'
- en: where
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 其中
- en: '![](../Images/0bb7ecc5a874af9df489083167aa8389.png)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0bb7ecc5a874af9df489083167aa8389.png)'
- en: and
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 和
- en: '![](../Images/6123e6c37dee2b0599206a66c5fcfe5a.png)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6123e6c37dee2b0599206a66c5fcfe5a.png)'
- en: with the notation TN for a truncated normal.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 使用TN表示截断正态分布。
- en: The model is implemented in the code attached to this post. The implementation
    shows how well the feature selection mechanism in-built in the model is able to
    identify the features irrespective of a decision boundary which is not separating
    the classes in the feature domain.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 该模型在本文附带的代码中实现。实现展示了模型内置的特征选择机制如何能够识别特征，而不管决策边界是否在特征域中分离类。
- en: In the code, the set of features is created by sampling from a normal distribution.
    Then, a mask vector is created to simulate the situation where only a subset of
    the features are relevant for the data-generating process. In this case, features
    1, 3, and 7 are selected. The latent variable z is simulated using the selected
    features based on the mask and their corresponding coefficients from the β vector.
    The observed variable y is derived from the latent variable z. A threshold of
    0 is used, such that if z is greater than 0, y is set to 1 (class 1), and if z
    is less than or equal to 0, yyy is set to 0 (class 0). The result is a binary
    outcome (0 or 1), which is typical for a categorical model, where the outcome
    is determined by whether the latent variable crosses a threshold.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 在代码中，特征集是通过从正态分布中进行采样创建的。然后，创建一个掩码向量来模拟只有特征子集对数据生成过程相关的情景。在这种情况下，选择了特征1、3和7。使用掩码和β向量中相应的系数，通过选择的特征模拟潜在变量z。观察变量y是从潜在变量z导出的。使用0作为阈值，这样如果z大于0，y被设置为1（类别1），如果z小于或等于0，yyy被设置为0（类别0）。结果是二元结果（0或1），这对于分类模型来说是典型的，其中结果由潜在变量是否跨越阈值决定。
- en: We make it difficult for the model to identify the relevant features within
    the larger set of variables by using features with unclear separability, as shown
    in the figure below. Boxplots show highly overlapping classes for x1 and x3.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 我们通过使用具有不明确可分性的特征，使得模型难以在更大的变量集中识别相关特征，如图所示。箱线图显示了x1和x3的高度重叠的类别。
- en: '![](../Images/d5104c8be58d0c7e91264d5152eb81c2.png)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
  zh: '![图像](../Images/d5104c8be58d0c7e91264d5152eb81c2.png)'
- en: Similar conclusions can be made based on density and scatter plots.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 可以根据密度和散点图得出类似的结论。
- en: '![](../Images/fb2c4f9c77aa54aa21fc0fff7ab5c92b.png)![](../Images/ed1f66ff5970076e5a075df83038194c.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![图像](../Images/fb2c4f9c77aa54aa21fc0fff7ab5c92b.png)![图像](../Images/ed1f66ff5970076e5a075df83038194c.png)'
- en: As explained above, the code simulates data for a binary classification problem
    using a subset of explanatory variables and tests whether the model selection
    procedure can identify the relevant features. The feature engineering procedure
    based on stochastic search has been [previously described in case of linear regression
    model](https://medium.com/dev-genius/bayesian-variable-selection-for-linear-regression-based-on-stochastic-search-in-r-applicable-to-ml-5936d804ba4a)
    and then successfully applied [in context of an advanced model of mixture of regressions](https://towardsdatascience.com/integrating-feature-selection-into-the-model-estimation-499c0732209d#177b-118209053f3c).
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 如上所述，该代码使用解释变量的一部分模拟二元分类问题的数据，并测试模型选择过程是否能够识别相关特征。基于随机搜索的特征工程过程已在[线性回归模型的情况下进行了描述](https://medium.com/dev-genius/bayesian-variable-selection-for-linear-regression-based-on-stochastic-search-in-r-applicable-to-ml-5936d804ba4a)，并且随后成功应用于[混合回归的高级模型中](https://towardsdatascience.com/integrating-feature-selection-into-the-model-estimation-499c0732209d#177b-118209053f3c)。
- en: In this case, the results are just as good as before!
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，结果与之前一样好！
- en: The model is able to identify the proper features among the broader dataset,
    as shown in the figure below. The inclusion probability MCMC sampling trajectory
    for x1, x3, and x7 is either exactly 1, or mostly 1, whereas for all the others
    features is rather 0\. (The individual probabilities computed over the full trajectory
    comprising of 10000 MCMC draws are given by **1.0000** 0.1624 **0.9752** 0.1269
    0.2757 0.1839 **1.0000** 0.1220).
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 模型能够从更广泛的数据集中识别出适当的特征，如图所示。对于x1、x3和x7的包含概率MCMC采样轨迹要么正好是1，要么主要是1，而对于所有其他特征则相对较低。
    (在全轨迹中计算的个体概率，包括10000次MCMC抽取，给出为**1.0000** 0.1624 **0.9752** 0.1269 0.2757 0.1839
    **1.0000** 0.1220)。
- en: '![](../Images/4072216ee80b565a076e9e4354531dfa.png)'
  id: totrans-42
  prefs: []
  type: TYPE_IMG
  zh: '![图像](../Images/4072216ee80b565a076e9e4354531dfa.png)'
- en: The results have been achieved despite of weak separability for x1 and x3\.
    As shown in the figure below, all of the parameters beyond the truly selected
    features, oscillate around 0 indicating no impact of those variables on our target!
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管x1和x3的分离性较弱，但仍然取得了这些结果。如图所示，所有真正选择的特征之外的参数都在0附近振荡，表明这些变量对我们的目标没有影响！
- en: '![](../Images/f3a85a8e2b9a540f7b5b99d0385fd449.png)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
  zh: '![图像](../Images/f3a85a8e2b9a540f7b5b99d0385fd449.png)'
- en: The full code is presented below.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 完整的代码如下所示。
