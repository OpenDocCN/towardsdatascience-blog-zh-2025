- en: I Won’t Change Unless You Do
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/i-wont-change-unless-you-do/](https://towardsdatascience.com/i-wont-change-unless-you-do/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: In game theory, how can players ever come to an end if there still might be
    a better option to decide for? Maybe one player still wants to change their decision.
    But if they do, maybe the other player wants to change too. How can they ever
    hope to escape from this vicious circle? To solve this problem, the concept of
    a Nash equilibrium, which I will explain in this article, is fundamental to game
    theory.
  prefs: []
  type: TYPE_NORMAL
- en: This article is the second part of a four-chapter series on game theory. If
    you haven’t checked out [the first chapter](https://towardsdatascience.com/talking-about-games/)
    yet, I’d encourage you to do that to get familiar with the main terms and concepts
    of game theory. If you did so, you are prepared for the next steps of our journey
    through game theory. Let’s go!
  prefs: []
  type: TYPE_NORMAL
- en: '**Finding the solution**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '![](../Images/1cd39dd630181c3e575c807cdfa9bcbb.png)'
  prefs: []
  type: TYPE_IMG
- en: Finding a solution to a game in game theory can be tricky sometimes. Photo by
    [Mel Poole](https://unsplash.com/@melpoole?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  prefs: []
  type: TYPE_NORMAL
- en: 'We will now try to find a solution for a game in game theory. A **solution**
    is a set of actions, where each player **maximizes their utility** and therefore
    behaves rationally. That does not necessarily mean, that each player wins the
    game, but that they do the best they can do, given that they don’t know what the
    other players will do. Let’s consider the following game:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/856879c4fb115ecc3ad4143c8a2bf401.png)'
  prefs: []
  type: TYPE_IMG
- en: If you are unfamiliar with this matrix-notation, you might want to take a look
    back at Chapter 1 and refresh your memory. Do you remember that this matrix gives
    you the reward for each player given a specific pair of actions? For example,
    if player 1 chooses action Y and player 2 chooses action B, player 1 will get
    a reward of 1 and player 2 will get a reward of 3.
  prefs: []
  type: TYPE_NORMAL
- en: 'Okay, what actions should the players decide for now? Player 1 does not know
    what player 2 will do, but they can still try to find out what would be the best
    action depending on player 2’s choice. If we compare the utilities of actions
    Y and Z (indicated by the blue and red boxes in the next figure), we notice something
    interesting: If player 2 chooses action A (first column of the matrix), player
    1 will get a reward of 3, if they choose action Y and a reward of 2, if they choose
    action Z, so action Y is better in that case. But what happens, if player 2 decides
    for action B (second column)? In that case, action Y gives a reward of 1 and action
    Z gives a reward of 0, so Y is better than Z again. And if player 2 chooses action
    C (third column), Y is still better than Z (reward of 2 vs. reward of 1). That
    means, that player 1 should never use action Z, because action Y is always better.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/59a80218f2467e125e77bc17f5363e88.png)'
  prefs: []
  type: TYPE_IMG
- en: We compare the rewards for player 1for actions Y and Z.
  prefs: []
  type: TYPE_NORMAL
- en: With the aforementioned considerations, player 2 can anticipate, that player
    1 would never use action Z and hence player 2 doesn’t have to care about the rewards
    that belong to action Z. This makes the game much smaller, because now there are
    only two options left for player 1, and this also helps player 2 decide for their
    action.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b45c62892ec320f9ea45f0172b0bceb8.png)'
  prefs: []
  type: TYPE_IMG
- en: We found out, that for player 1 Y is always better than Z, so we don’t consider
    Z anymore.
  prefs: []
  type: TYPE_NORMAL
- en: If we look at the truncated game, we see, that for player 2, option B is always
    better than action A. If player 1 chooses X, action B (with a reward of 2) is
    better than option A (with a reward of 1), and the same applies if player 1 chooses
    action Y. Note that this would not be the case if action Z was still in the game.
    However, we already saw that action Z will never be played by player 1 anyway.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a8b156a270851ecb415de3f11588ac37.png)'
  prefs: []
  type: TYPE_IMG
- en: We compare the rewards for player 2 for actions A and B.
  prefs: []
  type: TYPE_NORMAL
- en: As a consequence, player 2 would never use action A. Now if player 1 anticipates
    that player 2 never uses action A, the game becomes smaller again and fewer options
    have to be considered.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/2f4d71b8a89a42265365f42e9e286309.png)'
  prefs: []
  type: TYPE_IMG
- en: We saw, that for player 2 action B is always better than action A, so we don’t
    have to consider A anymore.
  prefs: []
  type: TYPE_NORMAL
- en: 'We can easily continue in a likewise fashion and see that for player 1, X is
    now always better than Y (2>1 and 4>2). Finally, if player 1 chooses action A,
    player 2 will choose action B, which is better than C (2>0). In the end, only
    the action X (for player 1) and B (for player 2) are left. That is the solution
    of our game:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/0966f3d7cca205bf2c9c6ee353408471.png)'
  prefs: []
  type: TYPE_IMG
- en: In the end, only one option remains, namely player 1 using X and player 2 using
    B.
  prefs: []
  type: TYPE_NORMAL
- en: It would be rational for player 1 to choose action X and for player 2 to choose
    action B. Note that we came to that conclusion without exactly *knowing* what
    the other player would do. We just anticipated that some actions would never be
    taken, because they are always worse than other actions. Such actions are called
    **strictly dominated**. For example, action Z is strictly dominated by action
    Y, because Y is always better than Z.
  prefs: []
  type: TYPE_NORMAL
- en: '**The best answer**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '![](../Images/81fe169d654739c451b1945bd753d6cf.png)'
  prefs: []
  type: TYPE_IMG
- en: Scrabble is one of those games, where searching for the best answer can take
    ages. Photo by [Freysteinn G. Jonsson](https://unsplash.com/@freys?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  prefs: []
  type: TYPE_NORMAL
- en: 'Such strictly dominated actions do not always exist, but there is a similar
    concept that is of importance for us and is called a **best answer.** Say we know
    which action the other player chooses. In that case, deciding on an action becomes
    very easy: We just take the action that has the highest reward. If player 1 knew
    that player 2 chose option A, the best answer for player 1 would be Y, because
    Y has the highest reward in that column. Do you see how we always searched for
    the best answers before? For each possible action of the other player we searched
    for the best answer, if the other player chose that action. More formally, player
    i’s best answer to a given set of actions of all other players is the action of
    player 1 which maximises the utility given the other players’ actions. Also be
    aware, that a strictly dominated action can never be a best answer.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Let us come back to a game we introduced in the first chapter: The prisoners’
    dilemma. What are the best answers here?'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f71b82e4a0a051773ffbc6ed5a85d358.png)'
  prefs: []
  type: TYPE_IMG
- en: Prisoners’ dilemma
  prefs: []
  type: TYPE_NORMAL
- en: How should player 1 decide, if player 2 confesses or denies? If player 2 confesses,
    player 1 should confess as well, because a reward of -3 is better than a reward
    of -6\. And what happens, if player 2 denies? In that case, confessing is better
    again, because it would give a reward of 0, which is better than a reward of -1
    for denying. That means, for player 1 confessing is the best answer for both actions
    of player 2\. Player 1 doesn’t have to worry about the other player’s actions
    at all but should always confess. Because of the game’s symmetry, the same applies
    to player 2\. For them, confessing is also the best answer, no matter what player
    1 does.
  prefs: []
  type: TYPE_NORMAL
- en: '**The Nash Equilibrium**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '![](../Images/5a3b00fe6c473ebb2ca12c3d82bcb41e.png)'
  prefs: []
  type: TYPE_IMG
- en: The Nash equilibrium is somewhat like the master key that allows us to solve
    game-theoretic problems. Researchers were very happy when they found it. Photo
    by [rc.xyz NFT gallery](https://unsplash.com/@moneyphotos?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  prefs: []
  type: TYPE_NORMAL
- en: 'If all players play their best answer, we have reached a solution of the game
    that is called a **Nash equilibrium**. This is a key concept in game theory, because
    of an important property: In a Nash Equilibrium, no player has any reason to change
    their action, **unless any other player does**. That means all players are as
    happy as they can be in the situation and they wouldn’t change, even if they could.
    Consider the prisoner’s dilemma from above: The Nash equilibrium is reached when
    both confess. In this case, no player would change his action without the other.
    They could become better if **both** changed their action and decided to deny,
    but since they can’t communicate, they don’t expect any change from the other
    player and so they don’t change themselves either.'
  prefs: []
  type: TYPE_NORMAL
- en: 'You may wonder if there is always a single Nash equilibrium for each game.
    Let me tell you there can also be multiple ones, as in the Bach vs. Stravinsky
    game that we already got to know in [Chapter 1](https://towardsdatascience.com/talking-about-games/):'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/88d5d7effaf423b5f899987bc90a44f9.png)'
  prefs: []
  type: TYPE_IMG
- en: Bach vs. Stravinsky
  prefs: []
  type: TYPE_NORMAL
- en: 'This game has two Nash equilibria: (Bach, Bach) and (Stravinsky, Stravinsky).
    In both scenarios, you can easily imagine that there is no reason for any player
    to change their action in isolation. If you sit in the Bach concerto with your
    friend, you would not leave your seat to go to the Stravinsky concerto alone,
    even if you favour Stravinsky over Bach. In a likewise fashion, the Bach fan wouldn’t
    go away from the Stravinsky concerto if that meant leaving his friend alone. In
    the remaining two scenarios, you would think differently though: If you were in
    the Stravinsky concerto alone, you would want to get out there and join your friend
    in the Bach concerto. That is, you would change your action even if the other
    player doesn’t change theirs. This tells you, that the scenario you have been
    in was **not** a Nash equilibrium.'
  prefs: []
  type: TYPE_NORMAL
- en: 'However, there can also be games that have no Nash equilibrium at all. Imagine
    you are a soccer keeper during a penalty shot. For simplicity, we assume you can
    jump to the left or to the right. The soccer player of the opposing team can also
    shoot in the left or right corner, and we assume, that you catch the ball if you
    decide for the same corner as they do and that you don’t catch it if you decide
    for opposing corners. We can display this game as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/02d71be9b8c7353d0826262119b22832.png)'
  prefs: []
  type: TYPE_IMG
- en: A game matrix for a penalty shooting.
  prefs: []
  type: TYPE_NORMAL
- en: You won’t find any Nash equilibrium here. Each scenario has a clear winner (reward
    1) and a clear loser (reward -1), and hence one of the players will always want
    to change. If you jump to the right and catch the ball, your opponent will wish
    to change to the left corner. But then you again will want to change your decision,
    which will make your opponent choose the other corner again and so on.
  prefs: []
  type: TYPE_NORMAL
- en: '**Summary**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '![](../Images/e32e645fadd3f71c581635c780b708b5.png)'
  prefs: []
  type: TYPE_IMG
- en: We learned about finding a point of balance, where nobody wants to change anymore.
    That is a Nash equilibrium. Photo by [Eran Menashri](https://unsplash.com/@chesnutt?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  prefs: []
  type: TYPE_NORMAL
- en: 'This chapter showed how to find solutions for games by using the concept of
    a Nash equilibrium. Let us summarize, what we have learned so far:'
  prefs: []
  type: TYPE_NORMAL
- en: A solution of a game in game theory maximizes every player’s utility or reward.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: An action is called **strictly dominated** if there is another action that is
    always better. In this case, it would be irrational to ever play the strictly
    dominated action.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The action that yields the highest reward given the actions taken by the other
    players is called a **best answer**.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A **Nash equilibrium** is a state where every player plays their best answer.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In a Nash Equilibrium, no player wants to change their action unless any other
    play does. In that sense, Nash equilibria are optimal states.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Some games have **multiple** Nash equilibria and some games have **none.**
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If you were saddened by the fact that there is no Nash equilibrium in some games,
    don’t despair! In the [next chapter](https://towardsdatascience.com/when-you-just-cant-decide-on-a-single-action/),
    we will introduce probabilities of actions and this will allow us to find more
    equilibria. Stay tuned!
  prefs: []
  type: TYPE_NORMAL
- en: '**References**'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The topics introduced here are typically covered in standard textbooks on game
    theory. I mainly used this one, which is written in German though:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Bartholomae, F., & Wiens, M. (2016). *Spieltheorie. Ein anwendungsorientiertes
    Lehrbuch*. Wiesbaden: Springer Fachmedien Wiesbaden.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'An alternative in English language could be this one:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Espinola-Arredondo, A., & Muñoz-Garcia, F. (2023). *Game Theory: An Introduction
    with Step-by-step Examples*. Springer Nature.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Game theory is a rather young field of research, with the first main textbook
    being this one:'
  prefs: []
  type: TYPE_NORMAL
- en: Von Neumann, J., & Morgenstern, O. (1944). Theory of games and economic behavior.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Like this article?* [*Follow me*](https://medium.com/@doriandrost) *to be
