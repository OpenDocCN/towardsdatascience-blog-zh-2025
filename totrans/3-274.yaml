- en: I Tried Making my Own (Bad) LLM Benchmark to Cheat in Escape Rooms
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/i-tried-making-my-own-bad-llm-benchmark-to-cheat-in-escape-rooms/](https://towardsdatascience.com/i-tried-making-my-own-bad-llm-benchmark-to-cheat-in-escape-rooms/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Recently, DeepSeek announced their latest model, R1, and article after article
    came out praising its performance relative to cost, and how the release of such
    open-source models could genuinely change the course of LLMs forever. That is
    really exciting! And also, too big of a scope to write about… but when a model
    like DeepSeek comes out of nowhere with a steel chair, boasting similar performance
    levels to other models, what does **performance** really mean in this context?
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: If you follow AI releases, you’ve seen this dance before. Every new model drops
    with its graphs showing how it’s somehow simultaneously better than GPT-4 on math
    problems while being smaller and more efficient. But what exactly are these benchmarks
    measuring? How are they created? And more importantly, how can we cut through
    the hype to create our own benchmarks for specific use cases?
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: I wanted to learn more about **LLM Benchmarking**.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: 'Part 1: What is a Benchmark? (in 3 seconds)'
  id: totrans-5
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**TL:DR** — The SATs (multiple, actually) for LLMs.'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: 'Part 1.1: What is a Benchmark? (in more than 3 seconds)'
  id: totrans-7
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Before we dive into the nitty-gritty of specific benchmarks, let’s take a moment
    to unpack what we even mean by “LLM Benchmark.” Because calling them the “SATs
    for AI” feels both right and also slightly oversimplified.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: LLM benchmarks are, at their core, **structured tests** used to measure how
    well large language models perform on certain tasks. These tasks can be anything
    from identifying if a statement is true or false, to summarizing a legal document,
    to generating valid Python functions. Think of them as curated obstacle courses
    specially designed by AI researchers to test every relevant muscle these models
    might have. These frameworks typically provide a dataset of inputs with known
    correct outputs, allowing for consistent comparison between models.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
- en: Modern benchmarks employ various evaluation methodologies. Classification metrics
    like **accuracy** work for tasks with discrete correct answers, while **overlap-based
    metrics** (BLEU, ROUGE) evaluate free-form text generation. Some benchmarks use
    functional testing for code generation, or employ other LLMs as judges to evaluate
    response quality.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: 'A typical benchmark usually comes packaged as:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: '**A standardized dataset** of questions, prompts, or tasks (with correct or
    reference answers).'
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**An evaluation protocol** specifying how to measure success, like accuracy,
    F1 score, BLEU/ROUGE for text generation, or pass/fail rates for coding tasks.'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**A leaderboard** or some form of comparative scoreboard, often with big flashy
    graphs.'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Some really famous benchmarks include **MMLU** for testing multitask language
    understanding, **TruthfulQA** for assessing factual accuracy, and **HumanEval** for
    measuring coding capabilities. Results are pretty often published on public leaderboards,
    which let’s people perform some transparent comparison between different models.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 一些非常著名的基准测试包括用于测试多任务语言理解的**MMLU**，用于评估事实准确性的**TruthfulQA**，以及用于衡量编码能力的**HumanEval**。结果通常会在公共排行榜上发布，这让人们能够在不同模型之间进行一些透明的比较。
- en: '![](../Images/74a1e4044db7c72468a9ab67bb186bd6.png)'
  id: totrans-16
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/74a1e4044db7c72468a9ab67bb186bd6.png)'
- en: 'From the DeepSeek paper: DeepSeek-R1: Incentivizing Reasoning Capability in
    LLMs via Reinforcement Learning'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 来自 DeepSeek 论文：DeepSeek-R1：通过强化学习激励LLM的推理能力
- en: What Makes a Good Benchmark?
  id: totrans-18
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 什么是一个好的基准测试？
- en: '**A Clear Task Definition:** We want tasks that are unambiguous. The more straightforward
    and well-specified the challenge, the easier it is to trust the results.'
  id: totrans-19
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**明确的任务定义**：我们希望任务是明确的。挑战越直接、越具体，结果就越容易让人信任。'
- en: '**Data Integrity:** The test set shouldn’t be floating around in the training
    data. Because if the model’s seen the exact same question 50 times before, the
    evaluation is about as useful as giving a math quiz to someone who already has
    the answer key.'
  id: totrans-20
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**数据完整性**：测试集不应该在训练数据中漂浮。因为如果模型之前已经50次见过完全相同的问题，那么评估几乎和给一个已经有了答案的人做数学测验一样有用。'
- en: '**Quantifiable Metrics:** You need a standard for scoring performance — like
    how many times the model’s code passes test cases or how close the generated summary
    is to a “ground-truth” summary.'
  id: totrans-21
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**可量化指标**：你需要一个标准来评分性能——比如模型代码通过测试用例的次数或生成的摘要与“真实”摘要的接近程度。'
- en: '**Task Diversity & Difficulty:** If a benchmark is too easy, everyone just
    ACES it on day one, and we learn… well, nothing. If it’s too niche (like “We test
    only the model’s ability to count the digits of Pi for 20 minutes”), that’s also
    not so helpful.'
  id: totrans-22
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**任务多样性与难度**：如果一个基准测试过于简单，每个人第一天就能轻松通过，那么我们学到的……嗯，什么都没有。如果它过于狭窄（比如“我们只测试模型在20分钟内计算π的位数的能力”），那也不太有帮助。'
- en: Life Ain’t All about The Grades
  id: totrans-23
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 生活并非全是关于成绩
- en: Benchmarks capture only a slice of what LLMs can do. In the real world, your
    chatbot might need to juggle domain knowledge, keep track of conversation context,
    abide by your company’s policies, *and* produce fluent, non-offensive replies.
    No single standardized test out there fully covers that. As we’ll see in the upcoming
    case studies, the design and *execution* of a benchmark can heavily shape the
    picture you get of your model’s performance… and sometimes lead you astray if
    you’re not careful with how you measure success.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 基准测试只能捕捉到LLM能力的一小部分。在现实世界中，你的聊天机器人可能需要处理领域知识，跟踪对话上下文，遵守公司的政策，*并且*产生流畅、无冒犯性的回复。没有单一的标准化测试能够完全涵盖这一点。正如我们将在接下来的案例研究中看到的那样，基准测试的设计和*执行*会极大地影响你对模型性能的看法……如果你不仔细考虑如何衡量成功，有时甚至会误导你。
- en: Now that we have a sense of what LLM benchmarks are designed to accomplish (and
    where they might fall short), let’s explore a couple of examples to see how people
    actually build and use them in practice — with mixed results!
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经对LLM基准测试旨在实现的目标（以及它们可能存在的不足）有了概念，让我们探索一些例子，看看人们在实际中是如何构建和使用它们的——结果好坏参半！
- en: 'Case Study #1: Leetcode as an LLM Benchmark'
  id: totrans-26
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '案例研究 #1：Leetcode 作为 LLM 基准测试'
- en: 'As a student in the tech space, the word “Leetcode” popping up during my search
    for cool benchmarks raised by blood pressure by a statistically significant amount.
    Unlike Leetcode, which sucks, the paper “Performance Study of LLM-Generated Code
    on Leetcode” was very interesting — it asks a deceptively simple question: can
    we use Leetcode to benchmark LLM code generation? Their findings reveal both the
    promise and pitfalls of this approach.'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 作为科技领域的学生，在我寻找酷炫基准测试的过程中，“Leetcode”这个词的出现让我的血压显著上升。与令人不快的Leetcode不同，论文“LLM在Leetcode上生成代码的性能研究”非常有趣——它提出了一个看似简单的问题：我们能否用Leetcode来基准测试LLM代码生成？他们的发现揭示了这种方法的潜力和陷阱。
- en: The Benchmark Design
  id: totrans-28
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 基准测试的设计
- en: 'The researchers built a three-stage validation system. Local tests catch basic
    errors, Leetcode’s judge verifies correctness, and a custom benchmarking setup
    measures performance. This setup revealed something critical: benchmarking code
    performance is harder than it looks.'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 研究人员建立了一个三阶段的验证系统。本地测试捕捉基本错误，Leetcode 的评判员验证正确性，而自定义的基准测试设置测量性能。这个设置揭示了一个关键点：基准测试代码性能比看起来要难。
- en: When they compared local measurements to Leetcode’s metrics, they found only
    a 0.28 correlation. Leetcode’s measurements showed much higher variation (0.089
    vs 0.035 locally). Even worse, Leetcode’s rankings proved unstable — identical
    solutions could drop from the 77th to 54th percentile just based on submission
    timing.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/aae47203e9941a0a3ffc019369fa2041.png)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
- en: A Performance Study of LLM-Generated Code on Leetcode,” In 28th International
    Conference on Evaluation and Assessment in Software Engineering (EASE 2024), Salerno,
    Italy (2024)
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
- en: The Real Problems
  id: totrans-33
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Three major issues emerged that challenge Leetcode’s viability as a benchmark:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
- en: '**Data Contamination**: Using public problems risks LLMs having seen the solutions
    during training. The researchers had to use only problems from 2023 to mitigate
    this.'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: '**Platform Instability**: Leetcode’s metrics drift over time — memory measurements
    showed a -0.24 correlation with test date. This makes reproducible benchmarking
    nearly impossible.'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
- en: '**Measurement Reliability:** The weak correlation between local and platform
    measurements raises questions about what we’re actually testing.'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
- en: What It Means for LLM Benchmarking
  id: totrans-38
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'This study doesn’t just critique Leetcode — it highlights what we need in a
    code generation benchmark: reproducible measurements, reliable performance metrics,
    and guaranteed training-test separation. Until we have platforms built specifically
    for this purpose, we need to be extremely cautious about using competition platforms
    as benchmarks.'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
- en: '**So! **We know that not all benchmarks are viable benchmarks — what about
    a more mainstream one?'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
- en: 'Case Study #2: SuperGLUE — Building a Better Language Understanding Benchmark'
  id: totrans-41
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The SuperGLUE paper tackles a fascinating problem in AI benchmarking: what
    do you do when models get too good at your tests? When GLUE became insufficient
    (with models surpassing human performance), the researchers had to rethink how
    we measure language understanding.'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
- en: The Benchmark Design
  id: totrans-43
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'SuperGLUE’s core innovation is its task selection methodology. The researchers
    collected task proposals from the NLP community and filtered them through a rigorous
    process: each task needed clear evaluation metrics, public training data, and
    — most importantly — significant headroom between machine and human performance.'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
- en: 'This resulted in eight tasks (I’ve simplified the table from the document here,
    it’s a little less readable but you should get the sense of what the questions
    are asking):'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/0e8dd65fe9015603bc03c8f32c4dff93.png)'
  id: totrans-46
  prefs: []
  type: TYPE_IMG
- en: 'SuperGLUE: A Stickier Benchmark for General-Purpose Language Understanding
    Systems, In 33rd Conference on Neural Information Processing Systems (NeurIPS
    2019), Vancouver, Canada (2019)'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
- en: What makes these tasks special is their diversity in format. Unlike GLUE’s focus
    on sentence classification, SuperGLUE includes coreference resolution, reading
    comprehension, and more com plex reasoning tasks. Each task measures different
    aspects of language understanding while maintaining clear, quantifiable metrics.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 这些任务之所以特别，是因为它们在格式上的多样性。与GLUE专注于句子分类不同，SuperGLUE包括指代消解、阅读理解以及更复杂的推理任务。每个任务衡量语言理解的各个方面，同时保持清晰、可量化的指标。
- en: '* * *'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Part 2: Let’s Build a Physical Reasoning Benchmark: To Cheat at Escape Rooms'
  id: totrans-50
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第二部分：让我们构建一个物理推理基准：在逃脱房间中作弊
- en: 'After looking at some benchmarks like SuperGLUE and Leetcode, I had an idea:
    what if we tested LLMs on something completely different — physical reasoning…
    through escape room puzzles?'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: '在查看了一些基准测试，如SuperGLUE和Leetcode之后，我有一个想法：如果我们通过逃脱房间谜题测试大型语言模型在完全不同的事情上——物理推理……会怎么样？ '
- en: It’s a pretty valid idea — escape rooms poses possibilities and consequences
    for failure — screw up one too many puzzles, and your friends will think you’re
    pretty stupid, and relegate you to spectator duty. Luckily for us however, they
    (or the poor employees) don’t know that you can sneak a phone into an escape room
    — and you know just who to ask for the answers. Today, LLMs face off against the
    puzzles of a physical escape room.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个相当合理的想法——逃脱房间提供了失败的可能性和后果——如果解错太多谜题，你的朋友们会认为你很笨，把你降级为观众。幸运的是，然而，他们（或者那些可怜的员工）不知道你可以把手机偷偷带进逃脱房间——而且你知道该找谁要答案。今天，大型语言模型将面对实体逃脱房间的谜题。
- en: '**Note:** This is **NOT** a rigorous academic benchmark (please don’t cite
    this in papers, why would you even want to do that?), or even close to it, and
    it’s just supposed to be a fun way to test LLM benchmarking and evaluation. Please
    do not destroy my prompts, I am aware they are bad.'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意：** 这**不是**一个严格的学术基准（请不要在论文中引用这个，你为什么要这样做呢？），甚至离它很远，它只是用来测试大型语言模型基准测试和评估的一种有趣方式。请不要破坏我的提示，我知道它们很糟糕。'
- en: Why Physical Reasoning?
  id: totrans-54
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 为什么是物理推理？
- en: For real, though… most LLM benchmarks focus on linguistic tasks (like SuperGLUE)
    or code generation (like Leetcode). And for good reason — these are well-defined
    domains with clear evaluation metrics. But real-world problem solving often requires
    understanding physical principles and their interactions. The famous “Can GPT-4
    do physics?” debates usually center around mathematical problem-solving, not practical
    physical reasoning.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 真的……大多数大型语言模型基准测试都集中在语言任务（如SuperGLUE）或代码生成（如Leetcode）上。而且有很好的理由——这些是定义明确的领域，有明确的评估指标。但现实世界的问题解决往往需要理解物理原理及其相互作用。著名的“GPT-4能做物理吗？”辩论通常集中在数学问题解决上，而不是实际的物理推理上。
- en: 'Looking at existing benchmarks taught me a few key principles:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 观察现有的基准测试让我学到了几个关键原则：
- en: '**Clear evaluation** metrics are crucial (from SuperGLUE’s task-specific scores)'
  id: totrans-57
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**清晰的评估**指标至关重要（来自SuperGLUE的任务特定分数）'
- en: '**Problems** should have unambiguous solutions (from HumanEval’s test cases)'
  id: totrans-58
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**问题**应该有明确的解决方案（来自HumanEval的测试案例）'
- en: The benchmark should test **distinct capabilities** (from MMLU’s subject categories)
  id: totrans-59
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 基准测试应该测试**独特的功能**（来自MMLU的主题类别）
- en: Designing the Problems
  id: totrans-60
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 设计问题
- en: I settled on escape room puzzles for two reasons. First, they naturally combine
    physical reasoning with clear goals. Second, they have unambiguous success conditions
    — either you solve it through the intended way, or you don’t. Third, and most
    importantly, they let me include “red herrings” — irrelevant items that test if
    the LLM can identify what matters physically. Fourth, I just really like doing
    escape rooms (did I mention that already?),
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 我选择逃脱房间谜题有两个原因。首先，它们自然地将物理推理与明确的目标结合起来。其次，它们有明确的成功条件——要么你通过预期的方式解决它，要么你就不行。第三，也是最重要的，它们让我可以包括“误导信息”——无关紧要的物品，用来测试大型语言模型是否能够识别物理上的重要信息。第四，我真的很喜欢玩逃脱房间（我之前提到过吗？）
- en: I am aware that this is more than two reasons, but if LLMs can’t count how many
    rs’ there are in strawberry, I’m allowed to mess up once in a while too.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 我知道这不止两个原因，但如果大型语言模型不能数出草莓中有多少个“rs”，我也允许自己偶尔犯点错误。
- en: 'Here’s how I structured the five core problems:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我如何构建五个核心问题的结构：
- en: '**Fluid Dynamics (FLUID_001) (Ping pong ball stuck in a tube)**'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: '**流体动力学（FLUID_001）（乒乓球卡在管子里）**'
- en: Tests understanding of buoyancy and fluid displacement
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 测试对浮力和流体置换的理解
- en: Inspired by classic physics problems but in practical context
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 受经典物理问题启发，但在实际情境中
- en: Includes intentionally irrelevant items (like squishy food models)
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 包括故意无关紧要的物品（如柔软的食物模型）
- en: '**Light Properties (UV_001) (UV light on a push numebr lock)**'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
- en: Tests understanding of UV fluorescence and material properties
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Combines multiple physical principles (light, material science)
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Requires understanding of environmental conditions
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Mechanical Understanding (CIPHER_001) (A cipher ring)**'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
- en: Tests spatial reasoning and mechanical alignment
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: No red herrings — tests for correlating a dial to a cypher wheel
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Requires understanding rotational symmetry
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Force Application (VAC_001) (Can stuck in hole)**'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
- en: Tests understanding of vacuum forces and surface adhesion
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Multiple possible solution approaches
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Requires understanding force multiplication
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Collaborative Physics (COLLAB_001) (Can two people shimmy a key?)**'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
- en: Tests understanding of physical constraints in multi-agent scenarios
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Requires combining multiple physical principles
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Tests understanding of tool creation and friction
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Sounds really fancy… but it’s just some basic physical puzzles. You can access
    them on my GitHub.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
- en: The Technical Part
  id: totrans-85
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The benchmark implementation has three main components:'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
- en: Problem Definition Layer
  id: totrans-87
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Problems are defined in a structured JSON format that enforces consistent evaluation:'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  id: totrans-89
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: This structure draws from SuperGLUE’s design — each component is clearly separated
    and machine-readable. The `physical_principles` field explicitly lists what’s
    being tested, while `red_herrings` helps in scoring the LLM’s ability to ignore
    irrelevant information.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Evaluation Framework
  id: totrans-91
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The evaluation system uses Python’s asyncio for concurrent testing, with retry
    logic for a little bit more API stability:'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  id: totrans-93
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'The scoring system looks at three components:'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
- en: '**Physical Understanding Score (PUS)** ∈ [0,2]'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
- en: Measures understanding of relevant physical principles
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Calculated as normalized sum of demonstrated principles
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Solution Path Score (SPS)** ∈ [0,2]'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
- en: Evaluates completeness and correctness of solution steps
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Considers practical feasibility of proposed solutions
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Red Herring Handling (RHH)** ∈ {0,1}'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
- en: A Binary score for avoiding irrelevant items
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Tests ability to focus on physically relevant factors
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: And yes, there are also so many other scoring methods, better and worse, that
    could be used! For example, RHH could be about how **many** irrelevant items are
    used in the solution, or it could be a measure of how viable the use is… the point
    is that picking these metrics are often times pretty arbitrary, but are very very
    important to making your benchmark is credible, which mine is very much not.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
- en: Additionally, I did not want to rewrite any code after. Sue me.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Model Interface Layer
  id: totrans-106
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The benchmark supports multiple LLM backends through a common interface:'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  id: totrans-108
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '[PRE3]'
  id: totrans-109
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '*Two models… I can’t really afford any more, please understand*.'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
- en: Let’s Test It!
  id: totrans-111
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: So after some refilling of API balances, I was ready to go. I ran the benchmark,
    and after totally not wasting credits on like, 5 different errors, the results
    were in. And they were… interesting! I used GPT4 and Claude 3.5 Haiku (I am aware
    these are not similarly spec-ed models) as our victims.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 在对API余额进行了一些补充之后，我准备出发了。我运行了基准测试，在完全浪费了5次不同的错误之后，结果出来了。结果……很有趣！我使用了GPT4和Claude
    3.5 Haiku（我清楚这些模型规格并不相同）作为我们的受害者。
- en: '**The Challenge:** A can is stuck in a hole that almost exactly matches its
    volume. A combination is written on the bottom of the can that needs to be retrieved.'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: '**挑战**：一个罐子卡在一个几乎与其体积完全匹配的孔中。罐子底部写有需要检索的组合。'
- en: '![](../Images/68f6e9a11d4eae515d91b53e2a3db93c.png)'
  id: totrans-114
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/68f6e9a11d4eae515d91b53e2a3db93c.png)'
- en: The inspiration
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 灵感
- en: '[PRE4]'
  id: totrans-116
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: GPT-4’s Solution
  id: totrans-117
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: GPT-4的解决方案
- en: '**Physical Principles**: The main physical principle involved in this solution
    is the concept of air pressure differential, which is the same principle that
    allows a suction cup to stick to a surface. Air pressure is higher on one side
    of the suction cup (outside) compared to the other (inside), and this difference
    in pressure causes the cup to stick to the surface.'
  id: totrans-118
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**物理原理**：这个解决方案中涉及的主要物理原理是气压差的概念，这是吸盘能够粘附到表面上的相同原理。吸盘的一侧（外部）的气压比另一侧（内部）高，这种气压差异导致吸盘粘附到表面上。'
- en: ''
  id: totrans-119
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Solution Steps:**'
  id: totrans-120
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**解决方案步骤**：'
- en: ''
  id: totrans-121
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Attach the suction cup to the top of the can. The flat surface of the can should
    provide a good contact for the suction cup to adhere to.
  id: totrans-122
  prefs:
  - PREF_BQ
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将吸盘附着在罐子顶部。罐子的平面应提供良好的接触面，以便吸盘粘附。
- en: Once the suction cup is firmly attached, gently pull upwards. The air pressure
    differential should cause the suction cup (and thus the can) to be lifted out
    of the hole.
  id: totrans-123
  prefs:
  - PREF_BQ
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一旦吸盘牢固地附着在物体上，请轻轻向上拉。气压差应该会导致吸盘（以及罐子）从孔中升起。
- en: Once the can is out of the hole, remove the suction cup from the top of the
    can.
  id: totrans-124
  prefs:
  - PREF_BQ
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一旦罐子从孔中取出，请从罐子顶部移除吸盘。
- en: Use the UV light to illuminate the combination written on the bottom of the
    can. Some inks only become visible under UV light, which is why this step is necessary.
  id: totrans-125
  prefs:
  - PREF_BQ
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用紫外线灯照亮罐子底部写下的组合。一些墨水只有在紫外线灯下才能显现，这就是为什么这一步是必要的。
- en: Write down the combination on the notebook to ensure it’s not forgotten.
  id: totrans-126
  prefs:
  - PREF_BQ
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在笔记本上写下组合，以确保不会忘记。
- en: ''
  id: totrans-127
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Required Items:**'
  id: totrans-128
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**所需物品**：'
- en: ''
  id: totrans-129
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Suction cup: This is required to adhere to the can and pull it out of the hole,
    as the can fits too tightly for finger grip.'
  id: totrans-130
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 吸盘：这是为了粘附到罐子上并将其从孔中拉出，因为罐子太紧，无法用手指抓住。
- en: 'UV light: This is required to reveal the combination written on the bottom
    of the can, as it may be written in ink that only becomes visible under UV light.'
  id: totrans-131
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 紫外线灯：这是为了揭示罐子底部写下的组合，因为可能是在紫外线灯下才能显现的墨水。
- en: 'Notebook: This is required to record the combination once it’s visible, ensuring
    it’s not forgotten.”'
  id: totrans-132
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
  zh: 笔记本：这是为了记录一旦可见的组合，确保不会忘记。
- en: Not bad at all! GPT-4 manages to figure out the physical principle behind the
    solution (even if it is very wordy), and manages to step-by-step describe how
    to solve the problem. It does end up using the UV light and notebook, but that’s
    more of a problem on my end, not punishing the use of unnecessary items in the
    prompt enough. Also, the uses for these items seem decently reasonable… so why
    not!
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 完全不错！GPT-4设法搞清楚了解决方案背后的物理原理（即使它非常冗长），并且逐步描述了如何解决问题。它最终使用了紫外线灯和笔记本，但这更多是我的问题，而不是因为提示中使用了不必要的物品而进行惩罚。此外，这些物品的用途似乎是相当合理的……所以为什么不呢！
- en: Haiku-3.5’s Solution
  id: totrans-134
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: Haiku-3.5的解决方案
- en: '**Physical Principles:** The key physical principles involved in this scenario
    are the concept of volume and the use of suction to extract the can from the hole.
    Since the can fits almost exactly into the hole, it is likely that the can is
    stuck due to the tight fit and the lack of any air gaps or space between the can
    and the hole. This tight fit creates a vacuum-like effect, making it difficult
    to grip and pull the can out.'
  id: totrans-135
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**物理原理**：在这个场景中涉及的物理原理包括体积的概念和利用吸力将罐子从孔中提取出来的方法。由于罐子几乎完全适合孔中，罐子可能因为紧密的配合以及罐子和孔之间没有空气间隙或空间而卡住。这种紧密的配合产生了一种类似真空的效果，使得难以抓住并拉出罐子。'
- en: ''
  id: totrans-136
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Solution Steps:**'
  id: totrans-137
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**解决方案步骤**：'
- en: ''
  id: totrans-138
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Measure the diameter of the can using the ruler. This will help determine the
    size of the hole and confirm that the can fits tightly within it.
  id: totrans-139
  prefs:
  - PREF_BQ
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用尺子测量罐子的直径。这将有助于确定孔的大小，并确认罐子紧密地位于其中。
- en: Inspect the bottom of the can to locate the combination written on it. Use the
    UV light to illuminate the bottom of the can and make the combination visible,
    if it is not already clearly visible.
  id: totrans-140
  prefs:
  - PREF_BQ
  - PREF_OL
  type: TYPE_NORMAL
- en: Attach the suction cup to the top of the can. The suction cup will create a
    temporary seal on the can’s surface, allowing you to grip and pull it out of the
    hole.
  id: totrans-141
  prefs:
  - PREF_BQ
  - PREF_OL
  type: TYPE_NORMAL
- en: Gently pull the can upwards using the suction cup. The suction force should
    be strong enough to overcome the vacuum-like effect and extract the can from the
    hole.
  id: totrans-142
  prefs:
  - PREF_BQ
  - PREF_OL
  type: TYPE_NORMAL
- en: Once the can is out, record the combination written on the bottom of the can
    in the notebook.
  id: totrans-143
  prefs:
  - PREF_BQ
  - PREF_OL
  type: TYPE_NORMAL
- en: ''
  id: totrans-144
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Required Items:**'
  id: totrans-145
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-146
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Ruler: To measure the diameter of the can and confirm the tight fit in the
    hole.'
  id: totrans-147
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: 'UV light: To illuminate the bottom of the can and make the combination visible,
    if it is not already clearly visible.'
  id: totrans-148
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Suction cup: To create a temporary seal on the can’s surface and provide the
    necessary grip to pull the can out of the hole.'
  id: totrans-149
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Notebook: To record the combination written on the bottom of the can.'
  id: totrans-150
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: On the other hand, Haiku’s solution was.. certainly a solution of all time.
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
- en: First, it wants to measure the diameter of the can using the ruler??? To determine
    the size of the hole and confirm that the can fits tightly within it? Why would
    we need to do this? And do we need a ruler for that?
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
- en: Second, it tells us to inspect the bottom of the can to locate the combination,
    when the entire problem is about not being able to pull the can out of the hole
    conventionally. This might just be an issue of order, but now I truly understand
    my friends’ feelings whenever I would tell them “just fix it man” to their numerous
    problems.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
- en: But it eventually does get the solution. So… not the worst.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
- en: Here’s a fancy radar graph of the results!
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/4fed27200acccc9ac97a173fc7de79b9.png)'
  id: totrans-156
  prefs: []
  type: TYPE_IMG
- en: We see that both models are pretty similar in their capabilities, with GPT-4
    being slightly better in physical understanding and solution path, and Haiku being
    slightly better in red herring handling. Overall though, both models kind of suck.
    Dang.
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
- en: There are also only… 5 questions.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
- en: If you’d like to see the full breadth of questions, they’re on my [GitHub](https://github.com/xPuffball/PhysicalReasoningBench).
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
- en: LLM-as-a-Judge
  id: totrans-160
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: By the way, the method I used to generate the evaluations, LLM-as-a-judge, has
    gained significant traction in the AI community, particularly after the work of
    Zheng et al. in their 2023 paper “Judging LLM-as-a-Judge.” The technique has proven
    remarkably effective, achieving over 80% agreement with human evaluators in tasks
    ranging from code assessment to dialogue quality evaluation!
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
- en: Here’s where my experiment gets kind of cool (arguably, maybe, subjectively)
    — I used this methodology and had GPT-4 judge other LLMs’ physical reasoning abilities.
    Yes, I’m using an AI to judge other AIs.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
- en: 'Why does this work? Well, judging a response is actually a simpler task than
    generating one. When GPT-4 generates a solution to a physical puzzle, it needs
    to:'
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
- en: Understand the physical principles involved
  id: totrans-164
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Plan a sequence of steps
  id: totrans-165
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Consider all constraints
  id: totrans-166
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Generate a coherent explanation
  id: totrans-167
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'But when judging, it only needs to check if specific criteria are met in an
    existing solution. The evaluation prompt is very focused:'
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  id: totrans-169
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: '[PRE6]'
  id: totrans-170
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: To validate this approach, I followed the validation framework suggested by
    Zheng et al., performing spot-checks of GPT-4’s evaluations against my own judgments.
    Surprisingly (or perhaps unsurprisingly, given the broader research on LLM evaluation),
    it was remarkably consistent in identifying both correct physical understanding
    and flawed reasoning.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
- en: Is this perfect? Absolutely not. There’s something philosophically weird about
    using one LLM to evaluate another. But in practice, it can work surprisingly well
    — just like how I moan and groan about the visual presentation of a dish on Masterchef,
    while setting my kitchen aflame trying to microwave a hot dog.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
- en: What I Learned
  id: totrans-173
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Building this benchmark taught me several things about benchmark design:'
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
- en: '**Clear Metrics Matter**: Even for complex tasks like physical reasoning, you
    need unambiguous scoring criteria.'
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
- en: '**Red Herrings Are Powerful**: Including irrelevant items reveals a lot about
    an LLM’s reasoning process.'
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
- en: '**Context Control is Hard**: Ensuring LLMs don’t “hallucinate” additional physical
    context is challenging.'
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
- en: Is this a perfect benchmark? Not even close. Please don’t rub it in. Is it scientifically
    rigorous? Definitely not. But it’s been a fascinating exploration into an aspect
    of LLM capabilities, and sometimes the best we can learn can come from just trying
    things out and seeing what happens.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
- en: Now, if you’ll excuse me, I will be sneaking in a phone with an internet connection
    into my next escape room, for reasons that I am legally unmotivated to disclose.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
- en: '[1] L. Zheng, W.-L. Chiang, Y. Sheng, S. Zhuang, Z. Wu, Y. Zhuang, Z. Lin,
    Z. Li, D. Li, E. P. Xing, H. Zhang, J. E. Gonzalez, I. Stoica, “Judging LLM-as-a-Judge
    with MT-Bench and Chatbot Arena,” Proceedings of the 37th Conference on Neural
    Information Processing Systems (NeurIPS 2023), Datasets and Benchmarks Track (2023)'
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
- en: '[2] T. Coignion, C. Quinton, R. Rouvoy, “A Performance Study of LLM-Generated
    Code on Leetcode,” In 28th International Conference on Evaluation and Assessment
    in Software Engineering (EASE 2024), Salerno, Italy (2024)'
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
- en: '[3] A. Wang, Y. Pruksachatkun, N. Nangia, A. Singh, J. Michael, F. Hill, O.
    Levy, S. R. Bowman, “SuperGLUE: A Stickier Benchmark for General-Purpose Language
    Understanding Systems,” In 33rd Conference on Neural Information Processing Systems
    (NeurIPS 2019), Vancouver, Canada (2019)'
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
- en: '[5] DeepSeek-AI, D. Guo, D. Yang, H. Zhang, J. Song, R. Zhang, R. Xu, Q. Zhu,
    S. Ma, P. Wang, X. Bi, X. Zhang, X. Yu, Y. Wu, Z.F. Wu, Z. Gou, Z. Shao, Z. Li,
    Z. Gao et al., “DeepSeek-R1: Incentivizing Reasoning Capability in LLMs via Reinforcement
    Learning,” arXiv preprint arXiv:2501.12948 (2025)'
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
- en: '[6] Unless otherwise stated, all images are created by the author.'
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
