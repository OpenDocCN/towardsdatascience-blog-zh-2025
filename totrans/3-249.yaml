- en: How I Became A Machine Learning Engineer (No CS Degree, No Bootcamp)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何成为机器学习工程师（没有计算机科学学位，没有训练营）
- en: 原文：[https://towardsdatascience.com/how-i-became-a-machine-learning-engineer-no-cs-degree-no-bootcamp/](https://towardsdatascience.com/how-i-became-a-machine-learning-engineer-no-cs-degree-no-bootcamp/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/how-i-became-a-machine-learning-engineer-no-cs-degree-no-bootcamp/](https://towardsdatascience.com/how-i-became-a-machine-learning-engineer-no-cs-degree-no-bootcamp/)
- en: Machine learning and AI are among the most popular topics nowadays, especially
    within the tech space. I am fortunate enough to work and develop with these technologies
    every day as a machine learning engineer!
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习和人工智能是目前最受欢迎的话题之一，尤其是在科技领域。我很幸运，作为一名机器学习工程师，每天都能与这些技术一起工作和开发！
- en: In this article, I will walk you through my journey to becoming a machine learning
    engineer, shedding some light and advice on how you can become one yourself!
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我将带你了解我成为机器学习工程师的旅程，为你提供一些关于如何成为机器学习工程师的建议和启示！
- en: '**My Background**'
  id: totrans-4
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**我的背景**'
- en: In one of my previous articles, I extensively wrote about my journey from school
    to securing my first data science job. I recommend you [check out that article](https://medium.com/towards-data-science/how-i-became-a-data-scientist-no-cs-degree-no-bootcamp-82c321904986),
    but I will summarise the key timeline here.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在我之前的一篇文章中，我详细地写了我从学校到获得第一份数据科学工作的经历。我建议你[查看这篇文章](https://medium.com/towards-data-science/how-i-became-a-data-scientist-no-cs-degree-no-bootcamp-82c321904986)，但我会在这里总结关键的时间线。
- en: Pretty much everyone in my family studied some sort of STEM subject. My great-grandad
    was an engineer, both my grandparents studied physics, and my mum is a maths teacher.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 几乎我家的每个人都学习过某种STEM科目。我的曾祖父是一位工程师，我的祖父母都学习过物理学，我妈妈是一位数学老师。
- en: '*So, my path was always paved for me.*'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: '*所以，我的道路一直为我铺平了道路。*'
- en: '![](../Images/c945386e79438aec12b321ad30f96199.png)'
  id: totrans-8
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/c945386e79438aec12b321ad30f96199.png)'
- en: Me at age 11
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 11岁的我
- en: I chose to study physics at university after watching The Big Bang Theory at
    age 12; it’s fair to say everyone was very proud!
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 在12岁时，我看了《生活大爆炸》，决定在大学学习物理学；可以说，每个人都为此感到非常自豪！
- en: At school, I wasn’t dumb by any means. I was actually relatively bright, but
    I didn’t fully apply myself. I got decent grades, but definitely not what I was
    fully capable of.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 在学校，我绝对不笨。实际上，我相当聪明，但我没有完全发挥自己的潜力。我得到了不错的成绩，但绝对不是我完全能够达到的。
- en: I was very arrogant and thought I would do well with zero work.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 我非常傲慢，认为我可以不用努力就能做得很好。
- en: I applied to top universities like Oxford and Imperial College, but given my
    work ethic, I was delusional thinking I had a chance. On results day, I ended
    up in clearing as I missed my offers. This was probably one of the saddest days
    of my life.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 我申请了牛津大学和帝国理工学院等顶尖大学，但鉴于我的工作态度，我过于自以为是地认为我有机会。在结果公布那天，我最终进入了补录，因为我错过了我的录取通知。这可能是我一生中最悲伤的一天之一。
- en: Clearing in the UK is where universities offer places to students on certain
    courses where they have space. It’s mainly for students who don’t have a university
    offer.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 英国大学的录取主要是指大学在特定课程中为学生提供空余名额，这主要面向那些尚未收到大学录取通知的学生。
- en: I was lucky enough to be offered a chance to study physics at the University
    of Surrey, and I went on to earn a first-class master’s degree in physics!
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 我很幸运，有机会在萨里大学学习物理学，并最终获得了物理学一等硕士学位！
- en: There is genuinely no substitute for hard work. It is a cringy cliche, but it
    is true!
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 真正的替代品是没有的。这是一个令人尴尬的陈词滥调，但它是真的！
- en: My original plan was to do a PhD and be a full-time researcher or professor,
    but during my degree, I did a research year, and I just felt a career in research
    was not for me. Everything moved so slowly, and it didn’t seem there was much
    opportunity in the space.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 我最初计划是攻读博士学位，成为一名全职研究员或教授，但在我的学位期间，我完成了一年的研究，我只是觉得研究职业不适合我。一切进展得太慢，而且在这个领域似乎没有太多机会。
- en: During this time, DeepMind released their [***AlphaGo — The Movie***](https://www.youtube.com/watch?v=WXuK6gekU1Y&t=1539s)documentary
    on YouTube, which popped up on my home feed.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 在这段时间里，DeepMind在YouTube上发布了[***AlphaGo — The Movie***](https://www.youtube.com/watch?v=WXuK6gekU1Y&t=1539s)纪录片，它出现在我的家庭动态中。
- en: From the video, I started to understand how AI worked and learn about neural
    networks, reinforcement learning, and deep learning. To be honest, to this day
    I am still not an expert in these areas.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 从视频中，我开始了解人工智能的工作原理，并学习了神经网络、强化学习和深度学习。说实话，时至今日，我在这几个领域仍然不是专家。
- en: Naturally, I dug deeper and found that a data scientist uses AI and machine
    learning algorithms to solve problems. I immediately wanted in and started applying
    for data science graduate roles.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 自然地，我深入挖掘并发现数据科学家使用人工智能和机器学习算法来解决问题。我立刻想加入其中，并开始申请数据科学研究生职位。
- en: I spent countless hours coding, taking courses, and working on projects. I applied
    to **300+ jobs** and eventually landed my first data science graduate scheme in
    September 2021.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 我投入了无数小时进行编码、上课和项目工作。我申请了**300多个职位**，最终在2021年9月获得了我的第一个数据科学研究生职位。
- en: '*You can hear more about my journey from a [podcast](https://tobeadatascientist.substack.com/p/overcoming-rejection-lessons-from-egor-howell).*'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '*你可以在[podcast](https://tobeadatascientist.substack.com/p/overcoming-rejection-lessons-from-egor-howell)中了解更多关于我的经历。*'
- en: '**Data Science Journey**'
  id: totrans-23
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**数据科学之旅**'
- en: I started my career in an insurance company, where I built various supervised
    learning models, mainly using gradient boosted tree packages like CatBoost, XGBoost,
    and [generalised linear models (GLMs)](https://medium.com/towards-data-science/breaking-down-generalized-linear-models-d9212526e51d?sk=fda0298cebcb8e9e0c20cb6af8ed4f06).
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 我在一家保险公司开始了我的职业生涯，在那里我构建了各种监督学习模型，主要使用梯度提升树包，如CatBoost、XGBoost和[广义线性模型（GLMs）](https://medium.com/towards-data-science/breaking-down-generalized-linear-models-d9212526e51d?sk=fda0298cebcb8e9e0c20cb6af8ed4f06)。
- en: 'I built models to predict:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 我构建了以下模型进行预测：
- en: '**Fraud** — Did someone fraudulently make a claim to profit.'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**欺诈**—某人是否通过欺诈性索赔获利。'
- en: '**Risk Prices **— What’s the premium we should give someone.'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**风险价格**—我们应该给某人多少保险费。'
- en: '**Number of Claims **— How many claims will someone have.'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**索赔数量**—某人将有多少索赔。'
- en: '**Average Cost of Claim** — What’s the average claim value someone will have.'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**平均索赔成本**—某人将有多少平均索赔价值。'
- en: I made around six models spanning the regression and classification space. I
    learned so much here, especially in statistics, as I worked very closely with
    Actuaries, so my maths knowledge was excellent.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 我构建了大约六个模型，涵盖了回归和分类领域。我在这里学到了很多，尤其是在统计学方面，因为我与精算师合作非常紧密，所以我的数学知识非常出色。
- en: However, due to the company’s structure and setup, it was difficult for my models
    to advance past the PoC stage, so I felt I lacked the “tech” side of my toolkit
    and understanding of how companies use machine learning in production.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，由于公司的结构和设置，我的模型很难超越PoC阶段，所以我感觉我在工具包的“技术”方面和公司如何在生产中使用机器学习的理解上有所欠缺。
- en: After a year, my previous employer reached out to me asking if I wanted to apply
    to a junior data scientist role that specialises in [time series forecasting](https://medium.com/@egorhowell/list/time-series-00bbfb9f5359)
    and [optimisation](https://medium.com/@egorhowell/list/optimisation-algorithms-069bf9c6c8d5)
    problems. I really liked the company, and after a few interviews, I was offered
    the job!
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 一年后，我的前雇主联系我，问我是否想申请一个专注于[时间序列预测](https://medium.com/@egorhowell/list/time-series-00bbfb9f5359)和[优化](https://medium.com/@egorhowell/list/optimisation-algorithms-069bf9c6c8d5)问题的初级数据科学家职位。我非常喜欢这家公司，经过几次面试，我得到了这份工作！
- en: I worked at this company for about 2.5 years, where I became an expert in forecasting
    and combinatorial optimisation problems.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 我在这家公司工作了大约2.5年，期间我成为了预测和组合优化问题的专家。
- en: I developed many algorithms and deployed my models to production through AWS
    using software engineering best practices, such as unit testing, lower environment,
    shadow system, CI/CD pipelines, and much more.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 我开发了多个算法，并通过AWS使用软件工程最佳实践（如单元测试、低级环境、影子系统、CI/CD管道等）将我的模型部署到生产环境中。
- en: '*Fair to say I learned a lot. *'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: '*可以说我学到了很多。*'
- en: I worked very closely with software engineers, so I picked up a lot of engineering
    knowledge and continued self-studying machine learning and statistics on the side.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 我与软件工程师合作非常紧密，因此我学到了很多工程知识，并在业余时间继续自学机器学习和统计学。
- en: I even [earned a promotion](https://medium.com/towards-data-science/how-to-get-promoted-in-data-science-b857ad73d020)
    from junior to mid-level in that time!
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 我甚至在那时从初级职位晋升到了中级职位！[查看晋升过程](https://medium.com/towards-data-science/how-to-get-promoted-in-data-science-b857ad73d020)。
- en: '**Transitioning To MLE**'
  id: totrans-38
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**过渡到机器学习工程师**'
- en: Over time, I realised the actual value of data science is using it to make live
    decisions. There is a good quote by [Pau Labarta Bajo](https://www.linkedin.com/posts/pau-labarta-bajo-4432074b_machinelearning-mlops-realworldml-activity-7195694289178214400-gZyw)
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 随着时间的推移，我意识到数据科学的实际价值在于用它来做出实际决策。[Pau Labarta Bajo](https://www.linkedin.com/posts/pau-labarta-bajo-4432074b_machinelearning-mlops-realworldml-activity-7195694289178214400-gZyw)
    有一个很好的引用。
- en: ML models inside Jupyter notebooks have a business value of $0
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: Jupyter笔记本中的ML模型具有0美元的商业价值
- en: There is no point in building a really complex and sophisticated model if it
    will not produce results. Seeking out that extra 0.1% accuracy by staking multiple
    models is often not worth it.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 如果一个复杂的模型不会产生结果，那么构建它就没有意义。通过堆叠多个模型来寻求额外的0.1%的准确性通常是不值得的。
- en: You are better off building something simple that you can deploy, and that will
    bring real financial benefit to the company.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 你最好构建一些简单的东西，你可以部署它，这将为公司带来真正的经济利益。
- en: 'With this in mind, I started thinking about the future of data science. In
    my head, there are two avenues:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到这一点，我开始思考数据科学的未来。在我的脑海中，有两个途径：
- en: '**Analytics** -> You work primarily to gain insight into what the business
    should be doing and what it should be looking into to boost its performance.'
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**分析** -> 你主要工作是为了深入了解业务应该做什么，以及它应该关注什么来提升其性能。'
- en: '**Engineering** -> You ship solutions (models, decision algorithms, etc.) that
    bring business value.'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**工程** -> 你提供（模型、决策算法等）能够带来商业价值的服务。'
- en: I feel the data scientist who analyses and builds PoC models will become extinct
    in the next few years because, as we said above, they don’t provide tangible value
    to a business.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 我觉得那些分析和构建PoC模型的数据科学家将在未来几年内消失，因为，正如我们上面所说的，他们没有为业务提供有形的价值。
- en: That’s not to say they are entirely useless; you have to think of it from the
    business perspective of their return on investment. Ideally, the value you bring
    in should be more than your salary.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 这并不是说它们完全没有用；你必须从它们投资回报的商业角度来考虑。理想情况下，你带来的价值应该超过你的薪水。
- en: You want to say that you did “X that produced Y”, which the above two avenues
    allow you to do.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 你想说“我做了X，产生了Y”，上述两个途径允许你做到这一点。
- en: The engineering side was the most interesting and enjoyable for me. I genuinely
    enjoy coding and building stuff that benefits people, and that they can use, so
    naturally, that’s where I gravitated towards.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我来说，工程方面是最有趣和最令人愉快的。我真正喜欢编码和构建对人们有益的东西，他们可以使用，所以自然而然地，我就朝这个方向发展。
- en: To move to the ML engineering side, I asked my line manager if I could deploy
    the algorithms and ML models I was building myself. I would get help from software
    engineers, but I would write all the production code, do my own system design,
    and set up the deployment process independently.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 为了过渡到ML工程方面，我向我的直线经理询问，我是否可以部署我自己构建的算法和ML模型。我会从软件工程师那里得到帮助，但我将独立编写所有生产代码，进行自己的系统设计，并独立设置部署流程。
- en: '*And that’s exactly what I did.*'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: '*这正是我所做的。*'
- en: I basically became a machine learning engineer. I was developing my algorithms
    and then shipping them to production.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 我基本上成为了一名机器学习工程师。我开发我的算法，然后将它们部署到生产环境中。
- en: I also took [NeetCode’s data structures and algorithms course](https://neetcode.io/courses)
    to improve my fundamentals of computer science and started [blogging about software
    engineering concepts](https://medium.com/@egorhowell/list/ba5d20c877b8).
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 我还参加了[NeetCode的数据结构和算法课程](https://neetcode.io/courses)，以提高我的计算机科学基础知识，并开始[在博客上撰写软件工程概念](https://medium.com/@egorhowell/list/ba5d20c877b8)。
- en: Coincidentally, my current employer contacted me around this time and asked
    if I wanted to apply for a machine learning engineer role that specialises in
    general ML and optimisation at their company!
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 意外的是，我的现任雇主在这个时候联系了我，问我是否想申请他们公司一个专注于通用ML和优化的机器学习工程师职位！
- en: Call it luck, but clearly, the universe was telling me something. After several
    interview rounds, I was offered the role, and I am now a fully fledged machine
    learning engineer!
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 称之为运气吧，但显然，宇宙在告诉我一些事情。经过几轮面试，我被提供了这个角色，现在我已经是一名全职的机器学习工程师了！
- en: Fortunately, a role kind of “fell to me,” but I created my own luck through
    up-skilling and documenting my learning. That is why I always tell people to show
    their work — you don’t know what may come from it.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 幸运的是，一个角色“掉”到了我的头上，但我通过提升技能和记录我的学习经历创造了我的运气。这就是为什么我总是告诉人们要展示你的工作——你不知道它可能带来什么。
- en: '**My Advice**'
  id: totrans-57
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**我的建议**'
- en: I want to share the main bits of advice that helped me transition from a machine
    learning engineer to a data scientist.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 我想分享一些主要建议，这些建议帮助我从机器学习工程师过渡到数据科学家。
- en: '**Experience** — A machine learning engineer is *not* an entry-level position
    in my opinion. You need to be well-versed in data science, machine learning, software
    engineering, etc. You don’t need to be an expert in all of them, but have good
    fundamentals across the board. That’s why I recommend having a couple of years
    of experience as either a software engineer or data scientist and self-study other
    areas.'
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**经验**—在我看来，机器学习工程师不是一个入门级职位。你需要对数据科学、机器学习、软件工程等有很好的了解。你不需要在所有这些领域都是专家，但需要在各个领域都有良好的基础。这就是为什么我建议有几年作为软件工程师或数据科学家的经验，并自学其他领域。'
- en: '**Production Code** — If you are from data science, you must learn to write
    good, well-tested production code. You must know things like typing, linting,
    unit tests, formatting, mocking and CI/CD. It’s not too difficult, but it just
    requires some practice. I recommend asking your current company to work with software
    engineers to gain this knowledge, it worked for me!'
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**生产代码**—如果你来自数据科学领域，你必须学会编写良好的、经过良好测试的生产代码。你必须了解诸如类型检查、代码检查、单元测试、格式化、模拟和CI/CD等方面。这并不太难，但需要一些实践。我建议向你的当前公司提出与软件工程师合作以获得这些知识，这对我就很有帮助！'
- en: '**Cloud Systems** — Most companies nowadays deploy many of their architecture
    and systems on the cloud, and machine learning models are no exception. So, it’s
    best to get practice with these tools and understand how they enable models to
    go live. I learned most of this on the job, to be honest, but there are courses
    you can take.'
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**云系统**—如今，大多数公司都将许多架构和系统部署在云端，机器学习模型也不例外。因此，最好熟悉这些工具并了解它们如何使模型上线。坦白说，我大部分都是通过工作学到的，但也有一些课程你可以参加。'
- en: '**Command Line** — I am sure most of you know this already, but every tech
    professional should be proficient in the command line. You will use it extensively
    when deploying and writing production code. I have a basic guide you can checkout
    [here](https://medium.com/towards-data-science/an-introduction-to-the-shell-676ee5b899df?sk=0c6e101165b4314b98ab39d11525366c).'
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**命令行**—我相信你们中的大多数人已经知道了这一点，但每个技术专业人士都应该精通命令行。在部署和编写生产代码时，你会广泛地使用它。我有一个基本的指南你可以查看[这里](https://medium.com/towards-data-science/an-introduction-to-the-shell-676ee5b899df?sk=0c6e101165b4314b98ab39d11525366c)。'
- en: '**Data Structures & Algorithms **— Understanding the fundamental algorithms
    in computer science are very useful for MLE roles. Mainly because you will likely
    be asked about it in interviews. It’s not too hard to learn compared to machine
    learning; it just takes time. Any course will do the trick.'
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据结构与算法**—理解计算机科学中的基本算法对于机器学习工程师职位非常有用。主要是因为你可能会在面试中被问到这个问题。与机器学习相比，它并不太难学，只是需要时间。任何课程都可以解决问题。'
- en: '**Git & GitHub** — Again, most tech professionals should know Git, but as an
    MLE, it is essential. How to squash commits, do code reviews, and write outstanding
    pull requests are musts.'
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Git & GitHub**—同样，大多数技术专业人士都应该了解Git，但作为一个机器学习工程师，它是必不可少的。如何合并提交、进行代码审查和编写出色的拉取请求是必须掌握的。'
- en: '**Specialise** — Many MLE roles I saw required you to have some specialisation
    in a particular area. I specialise in time series forecasting, optimisation, and
    general ML based on my previous experience. This helps you stand out in the market,
    and most companies are looking for specialists nowadays.'
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**专业化**—我看到的大多数机器学习工程师职位都需要你在某个特定领域有所专长。根据我的先前经验，我专注于时间序列预测、优化和基于通用机器学习的专业领域。这有助于你在市场上脱颖而出，而且如今大多数公司都在寻找专业人士。'
- en: The main theme here is that I basically up-skilled my software engineering abilities.
    This makes sense as I already had all the math, stats, and machine learning knowledge
    from being a data scientist.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 这里的主要主题是，我基本上提高了我的软件工程能力。这很合理，因为我已经从数据科学家的身份获得了所有的数学、统计学和机器学习知识。
- en: If I were a software engineer, the transition would likely be the reverse. This
    is why securing a machine learning engineer role can be quite challenging, as
    it requires proficiency across a wide range of skills.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我是一个软件工程师，转变可能正好相反。这就是为什么获得机器学习工程师职位可能相当具有挑战性，因为它需要掌握广泛技能的熟练度。
