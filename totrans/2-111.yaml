- en: NumPy API on a GPU?
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/numpy-api-on-a-gpu/](https://towardsdatascience.com/numpy-api-on-a-gpu/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Is <mdspan datatext="el1753244423653" class="mdspan-comment">this the</mdspan>
    future of Python numerical computation?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Late last year, NVIDIA made a significant announcement regarding the future
    of Python-based numerical computing. I wouldn’t be surprised if you missed it.
    After all, every other announcement from every AI company, then and now, seems
    mega-important.
  prefs: []
  type: TYPE_NORMAL
- en: That announcement introduced the **cuNumeric** library**,** a drop-in replacement
    for the ubiquitous NumPy library built on top of the **Legate** framework.
  prefs: []
  type: TYPE_NORMAL
- en: Who are Nvidia?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Most people will probably know Nvidia from their ultra-fast chips that power
    computers and data centres all over the world. You may also be familiar with Nvidia’s
    charismatic, leather jacket-loving CEO, Jensen Huang, who seems to pop up on the
    stage of every AI conference these days.
  prefs: []
  type: TYPE_NORMAL
- en: What many people don’t know is that Nvidia also designs and creates innovative
    device architectures and associated software. One of its most prized products
    is the **Compute Unified Device Architecture**(CUDA). CUDAis NVIDIA’s proprietary
    parallel-computing platform and programming model. Since its launch in 2007, it
    has evolved into a comprehensive ecosystem comprising drivers, runtime, compilers,
    math libraries, debugging and profiling tools, and container images. The result
    is a neatly tuned hardware and software loop that keeps NVIDIA GPUs at the centre
    of modern high-performance and AI workloads.
  prefs: []
  type: TYPE_NORMAL
- en: What is Legate?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Legate is an NVIDIA-led open-source runtime layer that lets you run familiar
    Python data-science libraries (NumPy, cuNumeric, Pandas-style APIs, sparse linear-algebra
    kernels, …) on multi-core CPUs, single or multi-GPU nodes, and even multi-node
    clusters without changing your Python code. It translates high-level array operations
    into a graph of fine-grained tasks and hands that graph to the C++ **Legion**
    runtime, which schedules the tasks, partitions the data, and moves tiles between
    CPUs, GPUs and network links for you.
  prefs: []
  type: TYPE_NORMAL
- en: In a nutshell, Legate lets familiar single-node Python libraries scale transparently
    to multi-GPU, multi-node machines.
  prefs: []
  type: TYPE_NORMAL
- en: What is cuNumeric?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: cuNumeric is a drop-in replacement for NumPy whose array operations are executed
    by Legate’s task engine and accelerated on one or many NVIDIA GPUs (or, if no
    GPU is present, on all CPU cores). In practice, you install it and need only change
    one import line to start using it in place of your regular NumPy code. For example
    …
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: … and run your script on the terminal with the legate command.
  prefs: []
  type: TYPE_NORMAL
- en: Behind the scenes, cuNumeric converts each NumPy call you make, for example,
    np.sin, np.linalg.svd, fancy indexing, broadcasting, reductions, etc, into Legate
    tasks. Those tasks will,
  prefs: []
  type: TYPE_NORMAL
- en: '**Partition** your arrays into tiles sized to fit GPU memory.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Schedule** each tile on the best available device (GPU or CPU).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Overlap** compute with communication when the workload spans multiple GPUs
    or nodes.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Spill** tiles to NVMe/SSD automatically when your dataset outruns GPU RAM.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Because the API of cuNumeric mirrors NumPy’s nearly 1-for-1, existing scientific
    or data-science code can scale from a laptop to a multi-GPU cluster without a
    rewrite.
  prefs: []
  type: TYPE_NORMAL
- en: Performance benefits
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: So, this all seems great, right? But it only makes sense if it results in tangible
    performance improvements over using NumPy, and Nvidia is making some strong claims
    that this is the case. As data scientists, machine learning engineers and data
    engineers typically use NumPy a lot, we can appreciate that this can be a crucial
    aspect of the systems we write and maintain.
  prefs: []
  type: TYPE_NORMAL
- en: Now, I don’t have a cluster of GPUs or a supercomputer to test this on, but
    my desktop PC does have an Nvidia GeForce RTX 4070 GPU, and we’re going to use
    that to test out some of Nvidia’s claims.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: I’ll install cuNumeric and NumPy on my PC to conduct comparative tests. This
    will help us assess whether Nvidia’s claims are accurate and understand the performance
    differences between the two libraries.
  prefs: []
  type: TYPE_NORMAL
- en: Setting up a development environment.
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As always, I like to set up a separate development environment to run my tests.
    That way, nothing I do in that environment will affect any of my other projects.
    At the time of writing, cuNumeric is not available to install on Windows, so I’ll
    be using WSL2 Ubuntu for Windows instead.
  prefs: []
  type: TYPE_NORMAL
- en: I’ll be using Miniconda to set up my environment, but feel free to use whichever
    tool you’re comfortable with.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: Code example 1 — A simple matrix multiplication
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Matrix multiplication is the bread and butter of mathematical operations that
    underpin so many AI systems, so it makes sense to try that operation out first.
  prefs: []
  type: TYPE_NORMAL
- en: '*Note that in all my examples, I will run the NumPy and cuNumeric code snippets
    five times in a row and average the time taken for each.* *I also perform a “warm-up
    step on the GPU before the timing run to take into account overheads such as just-in-time
    (JIT) compilation.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: Running the NumPy side of things uses the regular **python example1.py** command
    line syntax. For running using Legate, the syntax is more complex. What it does
    is disable Legate’s automatic configuration and then launch the example1.py script
    under Legate with one CPU, one GPU, and zero OpenMP threads using the cuNumeric
    backend.
  prefs: []
  type: TYPE_NORMAL
- en: Here is the output.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: Well, that’s an impressive start. cuNumeric is registering a 10x speedup over
    NumPy.
  prefs: []
  type: TYPE_NORMAL
- en: The warnings that Legate is outputting can be ignored. These are informational,
    indicating Legate couldn’t find details about the machine’s CPU/memory layout
    (NUMA) or enough CPU cores to manage the GPU.
  prefs: []
  type: TYPE_NORMAL
- en: Code example 2 — Logistic regression
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Logistic regression is a foundational tool in data science because it provides
    a simple, interpretable way to model and predict binary outcomes (yes/no, pass/fail,
    click/no-click). In this example, we’ll measure how long it takes to train a simple
    binary classifier on synthetic data. For each of the five runs, it first generates
    **N** samples with **D** features (X), and a corresponding random 0/1 label vector
    (Y). It initialises the weight vector `w` to zeros, then performs **500** iterations
    of batch gradient descent: computing the linear predictions **z = X.dot(w)**,
    applying the sigmoid **p = 1/(1+exp(–z))**, computing the gradient **grad = X.T.dot(p
    – y) / N**, and updating the weights with **w -= 0.1 * grad**. The script records
    the elapsed time for each run, cleans up memory, and finally prints the average
    training time.'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: And the outputs.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: Not quite as impressive as our first example, but a 5x to 6x speedup on an already
    fast NumPy program is not to be sniffed at.
  prefs: []
  type: TYPE_NORMAL
- en: Code example 3 — solving linear equations
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This script benchmarks how long it takes to solve a dense 3000×3000 linear algebra
    equation system. This is a fundamental operation in linear algebra used to solve
    the equation of type **Ax = b,** whereA is a giant grid of numbers (a 3000×3000
    matrix in this case), and b is a list of numbers (a vector).
  prefs: []
  type: TYPE_NORMAL
- en: The goal is to find the unknown list of numbers x that makes the equation true.
    This is a computationally intensive task that is at the heart of many scientific
    simulations, engineering problems, financial models, and even some AI algorithms.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: The outputs.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: That is a tremendous result. The Nvidia cuNumeric run is 100x faster than the
    NumPy run.
  prefs: []
  type: TYPE_NORMAL
- en: Code example 4 — Sorting
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Sorting is such a fundamental part of everything that happens in computing,
    and modern computers are so fast that most developers don’t even think about it.
    But let’s see how much of a difference using cuNumeric can make to this ubiquitous
    operation. We’ll sort a large (30,000,000) 1D array of numbers
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: The outputs.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: Yet another hugely impressive performance from cuNumeric and Legate.
  prefs: []
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This article introduced **cuNumeric**, an NVIDIA library designed as a high-performance,
    **drop-in** replacement for **NumPy**. The key takeaway is that data scientists
    can accelerate their existing Python code on NVIDIA GPUs with minimal effort,
    often by simply changing a single import line and running the script with the
    **‘legate’** command.
  prefs: []
  type: TYPE_NORMAL
- en: 'Two main components power the technology:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Legate:** An open-source runtime layer from NVIDIA that automatically translates
    high-level Python operations into tasks. It intelligently manages distributing
    these tasks across single or multiple GPUs, handling data partitioning, memory
    management (even spilling to disk if needed), and optimising communication.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**cuNumeric:** The user-facing library that mirrors the NumPy API. When you
    make a call like np.matmul(), cuNumeric converts it into a task for the Legate
    engine to execute on the GPU.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: I was able to validate Nvidia’s performance claims by running four benchmark
    tests on my desktop PC (with an NVIDIA RTX 4070 Ti GPU), comparing standard NumPy
    on the CPU against cuNumeric on the GPU.
  prefs: []
  type: TYPE_NORMAL
- en: 'The results demonstrate significant performance gains for cuNumeric:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Matrix Multiplication:** **~10x** faster than NumPy.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Logistic Regression Training:** **~6x** faster.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Solving Linear Equations:** A massive **100x+** speedup.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Sorting a Large Array:** Another huge improvement, running approximately
    **70x** faster.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In conclusion, I showed that cuNumeric successfully delivers on its promise,
    making the immense computational power of GPUs accessible to the broader Python
    data science community without requiring a steep learning curve or a complete
    code rewrite.
  prefs: []
  type: TYPE_NORMAL
- en: For more information and links to related resources, check out the original
    Nvidia announcement on cuNumeric [here](https://developer.nvidia.com/blog/nvidia-announces-availability-for-cunumeric-public-alpha/).
  prefs: []
  type: TYPE_NORMAL
