- en: 'Landing your First Machine Learning Job: Startup vs Big Tech vs Academia'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/landing-your-first-machine-learning-job-startup-vs-big-tech-vs-academia/](https://towardsdatascience.com/landing-your-first-machine-learning-job-startup-vs-big-tech-vs-academia/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: This guide is for **early-stage Machine Learning practitioners** who have just
    graduated from university and are now looking for full-time roles in the Machine
    Learning field. Most of the experiences shared here come from companies and universities
    based in the **United States**. Keep in mind that this is blog post is inspired
    by my **personal journey**, so not everything may apply to your specific case.
    Use your best judgment and enjoy the read. 🙂
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1748978718269" class="mdspan-comment">In 2021</mdspan>,
    I had just completed my Master’s Degree in Physics of Complex Systems and Big
    Data at the University of Rome, graduating with full marks. My master’s degree
    progressed fairly smoothly, and during my studies, I completed two internships
    and numerous practical Machine Learning projects. I also completed my Master’s
    Degree in 1.5 years instead of 2\. *I felt confident. I genuinely believed that
    people would be knocking at my door.* I thought my master’s degree was a clear
    indication that I was capable of working and succeeding. Turns out I was not just
    “wrong”; I was **terribly** wrong.
  prefs: []
  type: TYPE_NORMAL
- en: Unfortunately, the ability to “sell” your skills and get through the recruiting
    process is a skill in itself. Throughout the years after my Master’s Degree, I
    had to learn a set of soft skills and techniques that were not taught by my university
    classes, but they were crucial to finding a job. In particular, I learned that
    finding a job for a **Research Lab**/**University*** is completely different than
    finding a job in a **Startup**, and finding a job in a Startup is completely different
    than finding a job in a **Big Tech** Company.
  prefs: []
  type: TYPE_NORMAL
- en: 'After finishing my PhD, I went through several hiring processes and ended up
    with **offers from three very different places**: a ***startup***, a ***research
    lab***, and a ***large tech company***. Getting noticed, passing the interviews,
    and getting these offers wasn’t easy; it was the result of several mistakes and
    good choices I made along the way. This article wants to share my experience so
    that an early-stage Machine Learning practitioner can shine in the job-hunting
    process, whatever path they decide. Before going on, I’d like to be clear on two
    points:'
  prefs: []
  type: TYPE_NORMAL
- en: This article is just ***my experience***. While I do believe that sharing it
    could be helpful to a lot of people, please consider what applies to you and use
    your best judgment.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: This article is not a “***do your best, be yourself***” kind of article. It
    is meant to be a no-fluff, no-hype, **specific** **guide** on what to do in order
    to succeed in the job-hunting process for Machine Learning roles.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'In order to get your Machine Learning job, there are 4 specific steps to follow:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/801217fa2b9ae8af6a471c42831f42dc.png)'
  prefs: []
  type: TYPE_IMG
- en: Image generated by author
  prefs: []
  type: TYPE_NORMAL
- en: In the next chapters, I’ll break down each of these four steps so you’ll have
    a clear idea of how to approach every stage of the process. Let’s get started!
    🚀
  prefs: []
  type: TYPE_NORMAL
- en: '* Throughout this article, when I refer to a “Research Lab,” I don’t mean R&D
    roles at companies like Google or Meta. Instead, I’m talking about research positions
    in academic institutions, national laboratories, or public-sector research centers:
    places like MIT, Lawrence Livermore, or university-affiliated research groups.
    These roles are typically more focused on publishing, grants, and long-term scientific
    contributions than on product-driven innovation.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 0\. Do your homework.
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Before discussing the 4 main points of landing a job, I believe that there is
    an important point to make. The Machine Learning job market is ***very*** competitive,
    and facing it without a solid understanding of **linear algebra, statistics, algorithms,
    data science models,** and **strong coding skills** is basically impossible. Recruiters
    can quickly tell when someone is bluffing, and it’s surprisingly easy for them
    to spot when you don’t know what you’re talking about. I strongly suggest not
    trying to cheat the process.
  prefs: []
  type: TYPE_NORMAL
- en: The rest of the guide assumes that you already have a strong Machine Learning
    foundation, both theoretical and practical, and that your coding skills are in
    good shape. Now, let’s go back to the process.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Know the job market.
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 1.1 Introduction
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The job hunting process starts with asking yourself some questions. Which path
    is best for you? Are you looking for ***startups***? ***University/Research Lab
    positions***? Or are you trying ***bigger companies***? This part of the article
    explains the difference between these three sectors so you can have a clearer
    understanding of the job market and you can make your decision.
  prefs: []
  type: TYPE_NORMAL
- en: 1.2\. Working In a Startup
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: When you work in a startup, you usually wear **multiple hats**. You will take
    care of a lot of things, like MLOps, Model Deployment, Data Acquisition, and all
    the software engineering that is in the middle. You will also learn how to communicate
    with investors, approach problems from different angles, and sharpen your soft
    skills in ways that more structured environments rarely allow. For these reasons,
    startups are usually considered a great place to start your career.
  prefs: []
  type: TYPE_NORMAL
- en: 'The downside is that your employment in a startup is much **more unstable**
    than the one you would have in big tech companies or research labs. The reason
    is simple: startups are more prone to failure. In 2021, [Harvard Business Review](https://hbr.org/2021/05/why-start-ups-fail)
    estimated that **more than two-thirds of them never deliver a positive return
    to investors**. In January 2024, **[Stripe](https://stripe.com/resources/more/startup-statistics-you-should-know#:~:text=The%20failure%20rate%20is%20high,industry%2C%20funding%2C%20and%20spending.)**
    confirmed that more than 90% of startups fail. Even **[Growthlist](https://growthlist.co/startup-failure-statistics/)**
    tells us that less than 50% of startups manage to survive.'
  prefs: []
  type: TYPE_NORMAL
- en: Startups also usually offer lower salaries than Big Tech. **[Wellfound](https://wellfound.com/hiring-data/r/machine-learning-engineer-2)**
    tells us that the average salary in the USA is slightly below $130k/yr. Given
    the lower salary and the abovementioned risks associated with a startup, they
    usually provide you with a pretty decent **[equity package](https://topstartups.io/startup-salary-equity-database/?title=Machine%20learning%20engineer)**
    (0.5%-3% of the company).
  prefs: []
  type: TYPE_NORMAL
- en: 1.3\. Working In a Big Tech Company
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In contrast to startups, employment in a big tech company, such as Google, Meta,
    Amazon, Apple, or Microsoft, offers significantly **more stability** and **structure**.
    These companies have established business models, mature engineering practices,
    and the resources to support large-scale, long-term research and development.
    From a **compensation** perspective, big tech companies are among the highest-paying
    employers in the industry. According to [Levels.fyi](https://www.levels.fyi/),
    entry-level Machine Learning Engineers (e.g., L3 at Google or E3 at Meta) typically
    earn $180k to $220k/year in total compensation, including base salary, bonuses,
    and stock options. These companies also offer generous benefits, including wellness
    stipends, retirement matching, parental leave, and internal mobility opportunities.
  prefs: []
  type: TYPE_NORMAL
- en: A thing to consider about working in a big tech company is that **the “structured”
    setup of a Big Tech Company allows you to grow in your specific area**, but it
    might not be the best if you like to wear multiple hats and learn from multiple
    areas. For example, if you work on the LLaMA team at Meta, it’s highly unlikely
    that you’ll ever interact with the teams building the company’s virtual reality
    products. Your focus will be deep, but narrow.
  prefs: []
  type: TYPE_NORMAL
- en: 1.4\. Working in a Research Lab/University
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Ok, on this one, I want to be brutally honest. For the same seniority, academia
    will pay you way less than the industry. Even very successful professors with
    great publications would earn much more if they joined the board of a big tech
    company, for obvious reasons. Even if you become a professor in Machine Learning,
    you will still earn way less than you would as a Senior Machine Learning Engineer
    (check out the report from [HigherEdJobs](https://www.higheredjobs.com/salary/salaryDisplay.cfm?SurveyID=39)).
    On top of that, the academic world can be extremely competitive, as the academic
    track for prestigious universities puts you in direct competition with some of
    the most driven and talented researchers in the world.
  prefs: []
  type: TYPE_NORMAL
- en: 'If you are still reading, that means that you **really** like academia. And
    if that’s the case, then it is worth exploring the other side of the moon. Because
    here’s the truth: despite the lower pay and intense competition, academia offers
    something incredibly rare: **intellectual freedom**. In the U.S., you can build
    your own lab, apply for grants, propose bold research directions, and explore
    questions that may have no immediate commercial value. That freedom is something
    industry often can’t offer. There are usually two kinds of Machine Learning research:
    you can either **apply** Machine Learning to existing research problems or **perform**
    research specifically on Machine Learning, creating new algorithms, neural networks,
    and optimization techniques.'
  prefs: []
  type: TYPE_NORMAL
- en: 1.5 Summary
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A quick comparison between the three settings, summarizing what we have said
    before, can be found in the picture below.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d36f8937cf659ef351fa31333e1f102d.png)'
  prefs: []
  type: TYPE_IMG
- en: Image made by author. The sources of the salary are [here](https://www.glassdoor.com/Salary/Meta-Machine-Learning-Engineer-New-York-City-Salaries-EJI_IE40772.0,4_KO5,30_IL.31,44_IM615.htm)
    and [here](https://wellfound.com/hiring-data/r/machine-learning-engineer-2). Numbers
    relate to NYC as of May 2025.
  prefs: []
  type: TYPE_NORMAL
- en: I want to reiterate a concept. Let’s say you don’t really know if you want to
    work in a startup, a big company, or a research environment. Maybe you had a couple
    of startup experiences, but you don’t know how life would be in a big company
    or a research laboratory. Is it bad? ***Not at all.*** At the beginning of your
    career, when you’re still figuring things out, the most important thing is to
    **get started**. Gain experience. Try things. You don’t need to have it all mapped
    out from day one. It’s fine not to know exactly where you want to end up.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Stand Out
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 2.1 Introduction
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A very important thing to worry about is **how to stand out**. ***Machine Learning
    is an extremely hot topic.*** You will find yourself competing with a pool of
    very well-prepared people, and somehow you will be the one who stands out. The
    goal of this part of the chapter is to provide some techniques for you to be appealing
    in the Machine Learning job market.
  prefs: []
  type: TYPE_NORMAL
- en: 2.2 Your authenticity is your best weapon
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'I’m going to say something that may sound a little weird, as we are all Machine
    Learning enthusiasts: **please don’t blindly trust AI to generate resumes**/**cover
    letters**/**messages to recruiters**. Let me be more precise. It is completely
    ok to ask ChatGPT to improve your “**summary**” section of the resume, for example.
    What I’m suggesting is to try to modify ChatGPT’s text to make it personal and
    let your personality shine. This is because recruiters are getting tired of seeing
    the same resume in 10,000 candidates. Your authenticity will distinguish you from
    the pool of candidates.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/51e7e95d144cf41933665e636ea9ac67.png)'
  prefs: []
  type: TYPE_IMG
- en: Photo by [Brett Jordan](https://unsplash.com/@brett_jordan?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on [Unsplash](https://unsplash.com/photos/brown-wooden-blocks-with-number-6-zVkL5L7eGrw?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
  prefs: []
  type: TYPE_NORMAL
- en: 2.3 Build a good resume
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The resume is your business card. If your resume is messy, full of columns,
    full of meaningless information (e.g., pictures or “fun facts”), the impression
    the recruiter will have of you it’s that of an unprofessional character. My most
    successful resume (the one that got me the most job offers) is this one:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/71745f43246a3dfc10d11f27df6742d7.png)'
  prefs: []
  type: TYPE_IMG
- en: Image made by author
  prefs: []
  type: TYPE_NORMAL
- en: Simple, no picture, no fluff. Every time you write something, try to be **quantitative**
    (e.g. “improving AUC by 14%” is better than “improving classification performance”),
    and make the formatting simple such that you don’t get filtered out by bots. Avoid
    putting information that is not related to the job you are applying for, and try
    not to exceed one page.
  prefs: []
  type: TYPE_NORMAL
- en: 2.4 Build a portfolio
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'One of the hardest parts after graduating is convincing recruiters that you’re
    not just someone who studied the theory, but you’re someone who can build **real
    things.** The best way to do so is to pick a topic you are passionate about, create
    your synthetic data or extract it from Kaggle (if you need a dataset), and build
    your Machine Learning project on top of the dataset. A smart thing to do is to
    build projects that you can link to a specific recruiter. For example, if you’d
    like to work at Meta, you could start a project about using LLama to solve a real-world
    problem. They don’t have to be paper-quality pieces. They just need to be captivating
    enough to impress a recruiter. Once you have the code, you can:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Showcase the project on a blog post**. This is my favorite way to do it because
    it allows you to explain, in plain English, the problem you had to face and how
    you managed to solve it.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Add it to your own GitHub Page/website**. This is also excellent. One could
    argue that a GitHub page gives more of the “software engineer” vibe, while a blog
    post is more “recruiter-friendly”. The reality is that both work very well to
    stand out.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Also, every time you publish a project, it’s a great idea to share it with your
    LinkedIn network. This is how my portfolio looks.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/2cb6962306ca8a480c551a8aa27236d7.png)'
  prefs: []
  type: TYPE_IMG
- en: Screenshot made by the author on [Towards Data Science](https://towardsdatascience.com/author/piero-paialunga/).
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Get the interview
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 3.1 Introduction
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Ok, so we have our resume, and we have our portfolio. This means that if a recruiter
    looks at my profile, they find a very well-organized portfolio, and they can reach
    out. Now, how do we **actively** look for a job? Let’s give a look.
  prefs: []
  type: TYPE_NORMAL
- en: 3.2 Looking in person (Career Fair and Conferences)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Throughout my career, the only way I found full-time opportunities was through
    my network, either my virtual network (LinkedIn) or my in-person network (through
    people I knew and career fairs). If you are still in university and you are looking
    for **startups/big tech companies,** don’t sleep on **career fairs**. **Prepare**
    1-page resumes, **study** the companies beforehand, and **rehearse** your one-liner
    introduction so you own the conversation from the beginning. For example:'
  prefs: []
  type: TYPE_NORMAL
- en: “Hello, my name is [**Your Name**], it’s very nice to meet you. I noticed the
    job opening for [**X**]. I think I am a good fit for the role [**Y**], as I have
    developed projects [**I,J,K**]. This is my resume ***hand your resume***“
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Again, don’t feel discouraged if you leave the career fair without any immediate
    job interview. I left the career fairs with no interviews and, after a few months,
    I started receiving messages like these.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/690800c89485e620dea00ef55273c849.png)'
  prefs: []
  type: TYPE_IMG
- en: Screenshot made by author
  prefs: []
  type: TYPE_NORMAL
- en: If you are looking for Research Lab opportunities, your **academic advisor**
    is the best person to ask, and the best places where you can actively look are
    the **conferences** where you present your work. After the conference, invest
    some of your time in talking with presenters and see if they are hiring **postdocs**
    or **visiting scholars**. It’s usually not necessary to hand your resume, as they
    are not technically HR and they can evaluate your research by talking with you,
    reading your paper, and listening to your presentation. **Remember to provide
    your email, and collect researchers’ emails and business cards** so you can reach
    out.
  prefs: []
  type: TYPE_NORMAL
- en: 3.3 Looking online
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This is a secret-not-so-secret routine I used to find jobs online.
  prefs: []
  type: TYPE_NORMAL
- en: '**0\.** (On LinkedIn only) On the LinkedIn search bar, search for “**Hiring
    Machine Learning Engineer in [Location]**” and filter for “***more recent***”
    and “***posts***” (see screenshot below). You will see the contact of the recruiter
    posting the job application, and you will see the job application before LinkedIn
    promotes it in the job section.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c9d661dc69c2de81ca19062332bee3e1.png)'
  prefs: []
  type: TYPE_IMG
- en: Screenshot made by author.
  prefs: []
  type: TYPE_NORMAL
- en: Apply for the position with a tailored cover letter (not more than 1 page).
    By “tailored”, I mean that you should look at the company’s website and find overlaps
    with your work. You should explicitly mention this overlap in your cover letter.
    You can prepare a template cover letter and tweak it based on the specific application
    to make things quicker.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Find the recruiter who has posted that position (if you can)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Send them a message/an email, saying something like (if you can):'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: “Hello, my name is [**Your Name**], a Machine Learning Engineer graduating from
    [**School**]. I hope this message finds you well. I’m writing you this message
    regarding the [**X**] job post, as I think I am a great fit. Througout my career
    I did [**J, K (make sure J and K are somehow related to X**)]. I would love to
    borrow 15 minutes of your time to discuss about this. Please find my resume and
    porfolio attached [**Attach Resume, Attach Portoflio/GitHub**]” + Send Connection
    Request
  prefs:
  - PREF_BQ
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**If you are applying at startups, most of the time** you can directly talk
    to the CEO of the company. This is a huge plus, and it helps speed up the hiring
    process by a lot. A similar thing happens in **research labs**, where most of
    the time you can talk directly with the professor of the department that will
    eventually (hopefully) hire you. Please, keep this in mind. 9 people out of 10
    will leave you on read. Maybe even 19 out of 20\. The only thing you need is **one**
    person who is willing to give you a shot. Don’t get discouraged and trust the
    process.'
  prefs: []
  type: TYPE_NORMAL
- en: '**I strongly discourage** using software to generate thousands of cover letters
    in seconds and apply to thousands of jobs. The ***quality*** of your application
    will be terribly low: your application will be exactly like the other 1000 full
    of em dashes job applications. Think about it. Why would the recruiter choose
    you? Would you choose yourself if you were the recruiter? 20 good applications
    a day, with a tailored cover letter and a personalized message to the recruiter,
    are **way better** than 1000 AI-generated ones. Please trust me on this one.'
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 4\. Pass the Interview
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 4.1 Introduction
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Ok, so there is a recruiter who feels like you could be a good fit. How do we
    get to the stage where they send us the job offer? Let’s give a look.
  prefs: []
  type: TYPE_NORMAL
- en: 4.2 The Startup Interview
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Defining **the startup interview** is incredibly tough because it **dramatically
    depends on the specific company.** It is fair to assume **coding** exercises,
    questions about your **previous work experience,** and an informal talk about
    your work ethic, where they try to see if you are “fit” for the startup world.
    From my experience, the startup interviews are usually pretty short (one/two rounds).
    The best way to prepare for them is to study the startup mission and try to find
    an overlap between your past projects and the startup mission. Also, startups
    tend to close this process very quickly, so if you are interviewed, you are probably
    on a very short list of candidates. In other words, it’s an extremely good sign.
  prefs: []
  type: TYPE_NORMAL
- en: 4.3 The Big Tech Interview
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Ok, this one is **long** and **hard**, and it is best to be prepared for a
    tough process. You typically have a main recruiter who helps you prepare and gives
    you advice. Throughout my experience, I have always found amazing people there.
    Remember: no one is there to see you fail. You can expect at least 2 coding rounds,
    at least 1 Machine Learning System Design round, and at least 1 behavioral round.
    This process usually takes between 1 and 2 months to complete. Sadly, getting
    interviewed is a good sign, but it is not a ***great***sign. Rejections happen
    even at the last round.'
  prefs: []
  type: TYPE_NORMAL
- en: 4.4 The Academia/Research Interview
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In my opinion, this is the easiest of the three. If you have studied the research
    project enough, you are probably good to go. Try to approach the interview with
    an open-minded approach. Most of the time, the professor/interviewer will ask
    you questions without a precise answer in mind. So don’t panic if you are not
    able to answer. If you are able to provide a somewhat impressive and plausible
    suggestion, you have already aced it. I would not expect more than 2 rounds, maybe
    the first one online and the second one on-site. It is very important that you
    study the research project beforehand.
  prefs: []
  type: TYPE_NORMAL
- en: 4.5 How to prepare
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Each round requires a different kind of preparation. Let’s talk about it.
  prefs: []
  type: TYPE_NORMAL
- en: About the **coding round.** I’m not being paid by [LeetCode](https://leetcode.com/),
    but if you can, I strongly suggest getting the premium version, at least for a
    short amount of time. Look for the typical questions the company asks (e.g. Glassdoor),
    prepare on **breadth** more than **depth**. **time yourself,** and practice **thinking
    out loud**. My impression is that nobody asks “easy” questions anymore. I would
    practice Medium and Hard level questions. With the premium LeetCode profile, you
    can also **select** the specific company (e.g., Meta) and prepare for the specific
    coding questions. Some standard coding questions I have been asked are **binary
    trees, graphs, lists, string manipulation, recursion, dynamic programming, sliding
    windows, greedy, and heaps.** When you prepare, make sure you are making it as
    realistic as possible. Don’t practice on your couch with your jazz playlist on.
    Make it challenging and real. These rounds are usually 30-45 minutes.
  prefs: []
  type: TYPE_NORMAL
- en: In the **system design round**, a big company (which I won’t say the name of)
    recommended preparing on [ByteByteGo](https://bytebytego.com/). That is a good
    starting point. There are also a bunch of YouTube videos [(this guy is incredibly
    good and funny)](https://www.youtube.com/watch?v=9U48NlbOzCU) that are great to
    see how the interview should look. During these rounds, I have used **embeddings**,
    **recommendation systems**, **two tower networks**, **latency vs accuracy vs size**,
    **recommendation metrics like MAP, precision@k, recall@k, and NDCG.** The usual
    question is about an end-to-end recommendation system, but the specific considerations
    depend on the problem. Start by asking questions, keep your interviewer in the
    loop at all times, think out loud, and make sure you follow the hints. This is
    also 35-40 minutes.
  prefs: []
  type: TYPE_NORMAL
- en: About the **behavioral round.** Be prepared to apply the STAR method (Situation,
    Task, Action, Result). Start describing a **situation**, say what your **task
    was**, what **action** you applied to achieve the task, and what the result of
    it was. Look at your resume and think of 4-5 stories like those. My advice is
    not to oversell your skills, it is ok to say that you have made some mistakes
    and you have learned from them. Actually, it is a good sign that you acknowledged
    and grew.
  prefs: []
  type: TYPE_NORMAL
- en: It’s not a great sign if you don’t ask questions after the interview. Study
    your interviewer, follow them on LinkedIn, and prepare some questions for them.
  prefs: []
  type: TYPE_NORMAL
- en: 5\. The Elephant in The Room
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Following the steps of the process, I ended up **signing for a Big Tech Company
    I really like**, on **a project that excites me**, in **New York City**, which
    is a place I am in love with. Now, it would be very dishonest of my end to pretend
    that it was easy. I had impostor syndrome, felt like I wasn’t enough and worth
    it, countless sleepless nights, even more days when I didn’t even feel like getting
    out of bed, and when everything felt pointless and useless. I hope you won’t go
    through what I did, but if you are (or you will) go through this phase, **just
    know that you are not alone**. The Machine Learning market can be brutal at times.
    Remember, you are not doing anything wrong. The rejections are not a reflection
    of you not being good enough. You might **not be a good fit for THAT specific**
    company, you might be **filtered out by a biased algorithm**, they **might have
    canceled the role**, or they **might have fired the recruiter.** You have no control
    over those things. Reflect on your mistakes, grow, and do better next time.
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, a very important thing: you need to trust the process diligently. Looking
    for a job is a job per se. Set a fixed schedule and follow it. I know it’s hard,
    but try not to be **emotional**, stay **rational,** and keep yourself aligned
    with the daily goal. Finding a job is the result of a prolonged search, not the
    outcome of a one-shot trial.'
  prefs: []
  type: TYPE_NORMAL
- en: 6\. Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Thank you very much for being with me ❤️. I hope this article is helpful to
    you. Let’s wrap things up with the key takeaways from this guide.
  prefs: []
  type: TYPE_NORMAL
- en: '**Start by understanding the three job paths**: **Research labs, startups,
    and big tech companies** each offer something different. Research gives you intellectual
    freedom, but pays less. Startups give you fast growth but come with instability.
    Big tech pays the most and offers structure, but it is highly competitive and
    specialized.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Don’t underestimate your foundation**: You need strong coding, solid ML knowledge,
    and a good understanding of math and stats. Don’t skip the fundamentals. Recruiters
    are trained to catch cheaters.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Stand out with clarity and authenticity**: You will need a clean, well-organized
    resume, a portfolio with your work, and an impactful LinkedIn profile. Please
    don’t use AI-em-dashes-obsessed text. Show your personality, especially in how
    you communicate your work.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Build strong applications**: You don’t need to apply to 1,000 jobs. Use Cover
    Letters, send messages to recruiters, network a bunch, and create tailored job
    applications. The work will pay off.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Preparation is non-negotiable**: Know what kind of interviews you’re facing.
    The three fundamentals for ML interviews are **coding**, **system design**, and
    **behavioral**. Prepare accordingly, use the tools available (LeetCode, ByteByteGo,
    STAR method), and practice under real conditions.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Rejection is not failure**: You will face no’s. You will feel impostor syndrome.
    Remember, one yes is all it takes. Stick to your schedule, trust the process,
    and take care of your mental health along the way.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 7\. Conclusions
  prefs:
  - PREF_H3
