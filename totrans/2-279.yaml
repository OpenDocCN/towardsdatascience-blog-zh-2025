  id: totrans-108
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0c5430e219c906f69a60578e6620b560.png)'
- en: Image made by author
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者制作
- en: 'I am a Ph.D. candidate at the University of Cincinnati Aerospace Engineering
    Department. I talk about AI and Machine Learning in my blog posts and on LinkedIn,
    and here on TDS. If you liked the article and want to know more about machine
    learning and follow my studies, you can:'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 我是美国辛辛那提大学航空航天工程系的博士候选人。我在博客文章和LinkedIn上，以及在这里的TDS上谈论人工智能和机器学习。如果你喜欢这篇文章，并想了解更多关于机器学习的内容，以及跟随我的研究，你可以：
- en: A. Follow me on [**Linkedin**](https://www.linkedin.com/in/pieropaialunga/),
    where I publish all my stories
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: A. 在[**LinkedIn**](https://www.linkedin.com/in/pieropaialunga/)上关注我，我在那里发布所有故事
- en: B. Follow me on [**GitHub**](https://github.com/PieroPaialungaAI), where you
    can see all my code
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: B. 在[**GitHub**](https://github.com/PieroPaialungaAI)上关注我，在那里你可以看到我所有的代码
- en: C. For questions, you can send me an email at ***[[email protected]](/cdn-cgi/l/email-protection)***
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: C. 对于问题，你可以通过以下邮箱联系我 ***[[邮箱地址](/cdn-cgi/l/email-protection)***
- en: Ciao!
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: Ciao!
