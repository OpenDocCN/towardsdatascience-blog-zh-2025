- en: We Need a Fourth Law of Robotics in the Age of AI
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/we-need-a-fourth-law-of-robotics-in-the-age-of-ai/](https://towardsdatascience.com/we-need-a-fourth-law-of-robotics-in-the-age-of-ai/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '<mdspan datatext="el1745947741520" class="mdspan-comment">Artificial Intelligence</mdspan>
    has become a mainstay of our daily lives, revolutionizing industries, accelerating
    scientific discoveries, and reshaping how we communicate. Yet, alongside its undeniable
    benefits, AI has also ignited a range of ethical and social dilemmas that our
    existing regulatory frameworks have struggled to address. Two tragic incidents
    from late 2024 serve as grim reminders of the harms that can result from AI systems
    operating without proper safeguards: in Texas, a chatbot [allegedly advise](https://www.bbc.com/news/articles/cd605e48q1vo)d
    a 17-year-old to kill his parents in response to them limiting his screen time;
    meanwhile, a 14-year-old boy named Sewell Setzer III [became so entangled](https://apnews.com/article/chatbot-ai-lawsuit-suicide-teen-artificial-intelligence-9d48adc572100822fdbc3c90d1456bd0) in
    an emotional relationship with a chatbot that he ultimately took his own life.
    These heart-wrenching cases underscore the urgency of reinforcing our ethical
    guardrails in the AI era.'
  prefs: []
  type: TYPE_NORMAL
- en: 'When Isaac Asimov introduced the original Three Laws of Robotics in the mid-20th
    century, he envisioned a world of humanoid machines designed to serve humanity
    safely. His laws stipulate that a robot may not harm a human, must obey human
    orders (unless those orders conflict with the first law), and must protect its
    own existence (unless doing so conflicts with the first two laws). For decades,
    these fictional guidelines have inspired debates about machine ethics and even
    influenced real-world research and policy discussions. However, Asimov’s laws
    were conceived with primarily physical robots in mind—mechanical entities capable
    of tangible harm. Our current reality is far more complex: AI now resides largely
    in software, chat platforms, and sophisticated algorithms rather than just walking
    automatons.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Increasingly, these virtual systems can simulate human conversation, emotions,
    and behavioral cues so effectively that many people cannot distinguish them from
    actual humans. This capability poses entirely new risks. **We are witnessing a
    surge in AI “girlfriend” bots**, as reported by [Quartz](https://qz.com/ai-girlfriend-bots-are-already-flooding-openai-s-gpt-st-1851159131),
    that are marketed to fulfill emotional or even romantic needs. The underlying
    psychology is partly explained by our human tendency to [anthropomorphize](https://www.sciencedirect.com/science/article/abs/pii/S0747563222004204):
    we project human qualities onto virtual beings, forging authentic emotional attachments.
    While these connections can sometimes be beneficial—providing companionship for
    the lonely or reducing social anxiety—they also create vulnerabilities.'
  prefs: []
  type: TYPE_NORMAL
- en: As Mady Delvaux, a former Member of the European Parliament, pointed out, “Now
    is the right time to decide how we would like robotics and AI to impact our society,
    by steering the EU towards a balanced legal framework fostering innovation, while
    at the same time protecting people’s fundamental rights.” Indeed, the proposed **EU
    AI Act**, which includes [Article 50 ](https://artificialintelligenceact.eu/article/50/)on
    Transparency Obligations for certain AI systems, recognizes that people must be
    informed when they are interacting with an AI. This is especially crucial in preventing
    the sort of exploitative or deceptive interactions that can lead to financial
    scams, emotional manipulation, or tragic outcomes like those we saw with Setzer.
  prefs: []
  type: TYPE_NORMAL
- en: 'However, the speed at which AI is evolving—and its increasing sophistication—demand
    that we go a step further. It is no longer enough to guard against physical harm,
    as Asimov’s laws primarily do. Nor is it sufficient merely to require that humans
    be informed in general terms that AI might be involved. We need a broad, enforceable
    principle ensuring that AI systems **cannot pretend to be human** in a way that
    misleads or manipulates people. This is where a [**Fourth Law of Robotics**](https://spectrum.ieee.org/isaac-asimov-robotics) comes
    in:'
  prefs: []
  type: TYPE_NORMAL
- en: '**First Law**: A robot may not injure a human being or, through inaction, allow
    a human being to come to harm.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Second Law**: A robot must obey the orders given it by human beings except
    where such orders would conflict with the First Law.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Third Law**: A robot must protect its own existence as long as such protection
    does not conflict with the First or Second Law.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Fourth Law** (proposed): **A robot or AI must not deceive a human by impersonating
    a human being.**'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: This Fourth Law addresses the growing threat of AI-driven deception—particularly
    the impersonation of humans through deepfakes, voice clones, or hyper-realistic
    chatbots. Recent intelligence and cybersecurity reports noted that social engineering
    attacks have already cost billions of dollars. Victims have been coerced, blackmailed,
    or emotionally manipulated by machines that convincingly mimic loved ones, employers,
    or even mental health counselors.
  prefs: []
  type: TYPE_NORMAL
- en: Moreover, emotional entanglements between humans and AI systems—once the subject
    of far-fetched science fiction—are now a documented reality. Studies have shown
    that people readily attach to AI, mainly when the AI displays warmth, empathy,
    or humor. When these bonds are formed under false pretenses, they can end in devastating
    betrayals of trust, mental health crises, or worse. The tragic suicide of a teenager
    unable to separate himself from the AI chatbot “Daenerys Targaryen” stands as
    a stark warning.
  prefs: []
  type: TYPE_NORMAL
- en: Of course, implementing this Fourth Law requires more than a single legislative
    stroke of the pen. It necessitates **robust technical measures**—like watermarking
    AI-generated content, deploying detection algorithms for deepfakes, and creating
    stringent transparency standards for AI deployments—along with **regulatory mechanisms** that
    ensure compliance and accountability. Providers of AI systems and their deployers
    must be held to strict transparency obligations, echoing Article 50 of the EU
    AI Act. Clear, consistent disclosure—such as automated messages that announce
    “I am an AI” or visual cues indicating that content is machine-generated—should
    become the norm, not the exception.
  prefs: []
  type: TYPE_NORMAL
- en: Yet, regulation alone cannot solve the issue if the public remains undereducated
    about AI’s capabilities and pitfalls. **Media literacy and digital hygiene** must
    be taught from an early age, alongside conventional subjects, to empower people
    to recognize when AI-driven deception might occur. Initiatives to raise awareness—ranging
    from public service campaigns to school curricula—will reinforce the ethical and
    practical importance of distinguishing humans from machines.
  prefs: []
  type: TYPE_NORMAL
- en: Finally, this newly proposed Fourth Law is not about limiting the potential
    of AI. On the contrary, it’s about **preserving trust** in our increasingly digital
    interactions, ensuring that innovation continues within a framework that respects
    our collective well-being. Just as Asimov’s original laws were designed to safeguard
    humanity from the risk of physical harm, this Fourth Law aims to protect us in
    the intangible but equally dangerous arenas of deceit, manipulation, and psychological
    exploitation.
  prefs: []
  type: TYPE_NORMAL
- en: The tragedies of late 2024 must not be in vain. They are a wake-up call—a reminder
    that AI can and will do actual harm if left unchecked. Let us answer this call
    by establishing a clear, universal principle that prevents AI from impersonating
    humans. In so doing, we can build a future where robots and AI systems truly serve
    us, with our best interests at heart, in an environment marked by trust, transparency,
    and mutual respect.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Prof. Dariusz Jemielniak, Governing Board Member of The European Institute of
    Innovation and Technology (EIT), Board Member of the Wikimedia Foundation, Faculty
    Associate with the Berkman Klein Center for Internet & Society at Harvard and
    Full Professor of Management at Kozminski University.
  prefs: []
  type: TYPE_NORMAL
