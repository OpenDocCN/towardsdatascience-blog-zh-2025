- en: When running any bash command in a code cell in Kaggle, it is assumed that the
    current working directory is `/kaggle/working/`. Any previous `cd` commands are
    ignored. You have to specify the path from `/kaggle/working/` in all your commands
    or start your commands with `cd PATH &&` to change the directory before running
    the rest of the command.
  prefs:
  - PREF_OL
