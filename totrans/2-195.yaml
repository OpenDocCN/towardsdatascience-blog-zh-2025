- en: Testing our MCP server locally
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We can use a Gitbash command terminal and curl for this. Make sure your server
    is up and running first. Let’s try our temperature checker tool first. The output
    can always be post-processed to bring out exactly the content you want in a more
