- en: An Introduction to Remote Model Context Protocol Servers
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/an-introduction-to-remote-model-context-protocol-servers/](https://towardsdatascience.com/an-introduction-to-remote-model-context-protocol-servers/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I last wrote about the Model Context Protocol (MCP) in <mdspan datatext="el1751376232219"
    class="mdspan-comment">early</mdspan> December 2024, shortly before the topic’s
    exponential growth into what it is today. I recall thinking at the time that one
    of the key things I felt had to happen to MCP to make the technology a game changer
    was the ability for MCP clients to access non-local MCP servers. That’s already
    happening, of course, but what if you want a piece of this action? How do you
    go about writing a remote MCP server, crafting useful tools for it, testing it,
    then deploying it to the cloud, for example, so that anyone can access the tools
    it exposes from any supported client anywhere in the world?
  prefs: []
  type: TYPE_NORMAL
- en: I’ll show you how to do all of those things in this article.
  prefs: []
  type: TYPE_NORMAL
- en: A quick recap on what an MCP server is
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: There are dozens of definitions for what an MCP server is. In my view, which
    is probably a bit of an oversimplification, an MCP server enables MCP-enabled
    clients, such as Cursor and Claude code, to call useful functions that the MCP
    server contains.
  prefs: []
  type: TYPE_NORMAL
- en: How is that different from you just writing a bunch of valuable tools and calling
    them in your code?
  prefs: []
  type: TYPE_NORMAL
- en: Well, the key is that*you’re* writing those tools. What about the potential
    universe of tools that exist that *someone else* has written? I’m sure you’ve
    heard the expression **“… there’s an app for that”**. In the not-too-distant future,
    that might become “**… there’s an MCP server for that**“. Ok, not as snappy but
    just as groundbreaking.
  prefs: []
  type: TYPE_NORMAL
- en: Until now, the vast majority of MCP servers have been written with the STDIO
    transport type in mind. This means that the onus is on *you* to host the server
    on your local system. That can sometimes be tricky and prone to error. Moreover,
    only you can access that server. And that is where remote (or Streamable HTTP)
    MCP servers come into their own. Hosted remotely, you only need to know the URL
    of the server and the names of the tools it provides, and you’re up and running
    with it in seconds.
  prefs: []
  type: TYPE_NORMAL
- en: So, if you’ve written something that others might find truly helpful, why not
    make a remote MCP server of it, host it in the cloud and let others use it too?
  prefs: []
  type: TYPE_NORMAL
- en: Ok, let’s do this.
  prefs: []
  type: TYPE_NORMAL
- en: My setup
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I’ll be developing the code for the MCP server and its tools using Windows and
    Microsoft Visual Studio Code. I’ll be using Git Bash for my command line as it
    comes with some handy utilities that I’ll use, such as **curl** and **sed**. You’ll
    also need to install **Node.js** and the **uv** Python package utility. If you
    want to deploy the finished MCP server to the cloud, you’ll also need to store
    your code on GitHub, so you’ll need an account for that.
  prefs: []
  type: TYPE_NORMAL
- en: The first thing you should do is initialise a new project for your code, etc.
    Use the **uv** tool with the init flag for this. Next, we add an environment,
    switch to it and add all the external libraries that our code will use.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: What we’ll develop
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We will develop an MCP server and two distinct tools for our MCP server to utilise.
    The first will be a Nobel Prize checker. You provide a Year, e.g, 1935, and a
    subject, e.g, Physics, and the MCP server will return information about who won
    the prize that year in that subject. The second tool will return the maximum recorded
    temperature for a city in the past week
  prefs: []
  type: TYPE_NORMAL
- en: First off, we’ll code our two tools and test them locally. Next, we will incorporate
    the tools into an MCP server running locally and test that setup. If it works
    as expected, we can deploy the MCP server and its tools to a remote cloud server
    and verify that it continues to function correctly.
  prefs: []
  type: TYPE_NORMAL
- en: Code Example 1— Getting Nobel prize information
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'The services of the Nobel Prize website are licensed under the Creative Commons
    zero license. You can see the details using the link below:'
  prefs: []
  type: TYPE_NORMAL
- en: '[https://www.nobelprize.org/about/terms-of-use-for-api-nobelprize-org-and-data-nobelprize-org](https://www.nobelprize.org/about/terms-of-use-for-api-nobelprize-org-and-data-nobelprize-org)'
  prefs: []
  type: TYPE_NORMAL
- en: Here is the base function we’ll use. Open up your code editor and save this
    content in a file called **prize_tool.py**.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: This script defines a small “nobel-checker” MCP (Model Context Protocol) tool
    that can be run either locally or inside a FastMCP server. After trying to import
    `FastMCP` from the `mcp.server` package, and falling back to a sibling `fastmcp`
    module if that import fails. It then constructs an MCP instance named **nobelChecker**
    with the stateless_http=True flag, meaning that FastMCP will automatically expose
    a plain HTTP endpoint for one-shot calls. The decorated function **nobel_checker**
    becomes an MCP tool. When invoked, it constructs a query to the Rest API using
    the supplied year and subject matter, and returns the name(s) of the prize winner
    for that year and subject (or a helpful message if not).
  prefs: []
  type: TYPE_NORMAL
- en: If we run the above code locally, we obtain output similar to the following,
    which indicates that the function is working correctly and performing its intended
    task.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: Code Example 2— Getting city temperature information
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: For our second base function, we’ll write a tool that returns the highest temperature
    for a city over the last week. The weather data is provided by Open-Meteo.com.
    On their license page (“[https://open-meteo.com/en/license](https://open-meteo.com/en/license)),
    it states,
  prefs: []
  type: TYPE_NORMAL
- en: “API data are offered under [Attribution 4.0 International (CC BY 4.0)](https://creativecommons.org/licenses/by/4.0/)
  prefs: []
  type: TYPE_NORMAL
- en: You are free to **share:** copy and redistribute the material in any medium
    or format and **adapt:** remix, transform, and build upon the material. “
  prefs: []
  type: TYPE_NORMAL
- en: I have given the correct attribution and link to their license, which fulfills
    the terms of their license.
  prefs: []
  type: TYPE_NORMAL
- en: Create the Python file **temp_tool.py** and enter this code.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: This function takes a city name and returns the highest recorded temperature
    in the city for the last week.
  prefs: []
  type: TYPE_NORMAL
- en: Here is a typical output when running locally.
