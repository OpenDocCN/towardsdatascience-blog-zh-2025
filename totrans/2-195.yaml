- en: And now we can test the prize checker tool.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: Albert Einstein did indeed win the Nobel Prize for Physics in 1921.
  prefs: []
  type: TYPE_NORMAL
- en: Deploying our MCP server remotely
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now that we’re satisfied with our code and that the MCP server is working as
    expected locally, the next stage is to deploy it remotely, allowing anyone in
    the world to use it. There are a few options to do this, but perhaps the easiest
    (and initially the cheapest) is to use a service like **Render.**
  prefs: []
  type: TYPE_NORMAL
- en: Render is a modern cloud hosting platform — like a simpler alternative to AWS,
    Heroku, or Vercel — that lets you deploy full-stack apps, APIs, databases, background
    workers, and more, with minimal DevOps overhead. More to the point is that it’s
    free to get started and is more than enough for our needs. So head over to their
    [website](https://render.com/) and sign up.
  prefs: []
  type: TYPE_NORMAL
- en: Before deploying with Render, you must commit and send your code to a GitHub
    (or a GitLab/Bitbucket) repository. After that, on the Render website, choose
    to create a New web server,
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a4130fb1b4388691fb0e7d0e80b711f1.png)'
  prefs: []
  type: TYPE_IMG
- en: Image from the Render website
  prefs: []
  type: TYPE_NORMAL
- en: The first time, Render will ask for access to your GitHub (or Bitbucket/GitLab)
    account.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/9b2038c811e737dccb98d16d6c2f0756.png)'
  prefs: []
  type: TYPE_IMG
- en: Image from the Render website
  prefs: []
  type: TYPE_NORMAL
- en: After that, you need to provide the commands to build your deployment and start
    your server. For example ….
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/6b0a5966d62d788547485b57815e5c15.png)'
  prefs: []
  type: TYPE_IMG
- en: Image from the Render website
  prefs: []
  type: TYPE_NORMAL
- en: Back on the ***Settings*** screen, click the ***Manual*** ***Deploy* *-> Deploy
    latest commit***menu item, and a log of the build and deployment process will
    be displayed. After a few minutes, you should see the following messages indicating
    your deployment was successful.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: The vital address you need is the one marked as the primary URL. In our case,
    this is [https://remote-mcp-syp1.onrender.com](https://remote-mcp-syp1.onrender.com)
  prefs: []
  type: TYPE_NORMAL
- en: Testing our remote MCP server
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: We can do this in the same way we tested the local running, i.e using curl.
    First, check on max temperature, this time Chicago. Note the change of URL to
    our new remote one.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: And our output?
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: The sharp-eyed among you may have noticed that we have included an extra flag
    **( — ssl-no-revoke)** in the above curl command compared to the one we used locally.
    This is simply due to a quirk in the way curl works under Windows. If you’re using
    WSL2 for Windows or Linux, you don’t need this extra flag.
  prefs: []
  type: TYPE_NORMAL
- en: Next, we test our remote Nobel prize checker. This time for Chemistry in 2024.
  prefs: []
  type: TYPE_NORMAL
