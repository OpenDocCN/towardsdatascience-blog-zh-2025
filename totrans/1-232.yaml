  zh: 本博客使用的数据集是[德国信用数据集](https://archive.ics.uci.edu/dataset/144/statlog+german+credit+data)，该数据集在UCI机器学习库上公开可用。它是在[Creative
    Commons Attribution 4.0 国际（CC BY 4.0）许可](https://creativecommons.org/licenses/by/4.0/legalcode)下提供的。这意味着它可以自由使用和分享，只要适当注明出处。
