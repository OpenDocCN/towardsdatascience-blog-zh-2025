- en: 'The Gini Coefficient: From Lorenz Curves to Model Evaluation'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/beyond-roc-auc-and-ks-gini-coefficient-explained-simply/](https://towardsdatascience.com/beyond-roc-auc-and-ks-gini-coefficient-explained-simply/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1759191862708" class="mdspan-comment">We have already</mdspan>
    discussed about classification metrics like ROC-AUC and Kolmogorov-Smirnov (KS)
    Statistic in previous blogs.
  prefs: []
  type: TYPE_NORMAL
- en: In this blog, we will explore another important classification metric called
    the **Gini Coefficient**.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Why do we have multiple classification metrics?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Every classification metric tells us the model performance from a different
    angle. We know that ROC-AUC gives us the overall ranking ability of a model, while
    KS Statistic shows us where the maximum gap between two groups occurs.
  prefs: []
  type: TYPE_NORMAL
- en: '**When it comes to the Gini Coefficient, it tells us how much better our model
    is than random guessing at ranking the positives higher than the negatives.**'
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: First, let’s see how the Gini Coefficient is calculated.
  prefs: []
  type: TYPE_NORMAL
- en: For this, we again use the [German Credit Dataset](https://archive.ics.uci.edu/dataset/144/statlog+german+credit+data).
  prefs: []
  type: TYPE_NORMAL
- en: Let’s use the same sample data that we used to understand the calculation of
    Kolmogorov-Smirnov (KS) Statistic.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/55f161aba2ee1868138b68a5f83ba6ff.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: This sample data was obtained by applying logistic regression on the German
    Credit dataset.
  prefs: []
  type: TYPE_NORMAL
- en: Since the model outputs probabilities, we selected a sample of 10 points from
    those probabilities to demonstrate the calculation of the Gini coefficient.
  prefs: []
  type: TYPE_NORMAL
- en: Calculation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Step 1: Sort the data by predicted probabilities.'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The sample data is already sorted ascending by predicting probabilities.
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 2: Compute Cumulative Population and Cumulative Positives.'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**Cumulative Population:** The cumulative number of records considered up to
    that row.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Cumulative Population (%):** The percentage of the total population covered
    so far.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Cumulative Positives:** How many actual positives (class 2) we’ve seen up
    to this point.'
  prefs: []
  type: TYPE_NORMAL
- en: '****C**umulative Positives (%):** The percentage of positives captured so far.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/3193aae319edd13bf5d2a8e27cce5bf3.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 3: Plot X and Y values'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: X = Cumulative Population (%)
  prefs: []
  type: TYPE_NORMAL
- en: Y = Cumulative Positives (%)
  prefs: []
  type: TYPE_NORMAL
- en: Here, let’s use Python to plot these X and Y values.
  prefs: []
  type: TYPE_NORMAL
- en: '**Code:**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: '**Plot:**'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/87c5eb9901ab268889bd25a76c128139.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: The curve we get when we plot Cumulative Population (%) and Cumulative Positives
    (%) is called the **Lorenz curve.**
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 4: Calculate the area under the Lorenz curve.'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: When we discussed ROC-AUC, we found the area under the curve using the trapezoid
    formula.
  prefs: []
  type: TYPE_NORMAL
- en: Each region between two points was treated as a trapezoid, its area was calculated,
    and then all areas were added together to get the final value.
  prefs: []
  type: TYPE_NORMAL
- en: The same method is applied here to calculate the area under the Lorenz curve.
  prefs: []
  type: TYPE_NORMAL
- en: '**Area under the Lorenz curve**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Area of Trapezoid:'
  prefs: []
  type: TYPE_NORMAL
- en: $$
  prefs: []
  type: TYPE_NORMAL
- en: \text{Area} = \frac{1}{2} \times (y_1 + y_2) \times (x_2 – x_1)
  prefs: []
  type: TYPE_NORMAL
- en: $$
  prefs: []
  type: TYPE_NORMAL
- en: \[
  prefs: []
  type: TYPE_NORMAL
- en: \begin{aligned}
  prefs: []
  type: TYPE_NORMAL
- en: A_1 &= \tfrac{1}{2}(0 + 0)(0.1 – 0.0) = 0.0000 \\[6pt]
  prefs: []
  type: TYPE_NORMAL
- en: A_2 &= \tfrac{1}{2}(0 + 0)(0.2 – 0.1) = 0.0000 \\[6pt]
  prefs: []
  type: TYPE_NORMAL
- en: A_3 &= \tfrac{1}{2}(0 + 0)(0.3 – 0.2) = 0.0000 \\[6pt]
  prefs: []
  type: TYPE_NORMAL
- en: A_4 &= \tfrac{1}{2}(0 + 0)(0.4 – 0.3) = 0.0000 \\[6pt]
  prefs: []
  type: TYPE_NORMAL
- en: A_5 &= \tfrac{1}{2}(0 + 0)(0.5 – 0.4) = 0.0000 \\[6pt]
  prefs: []
  type: TYPE_NORMAL
- en: A_6 &= \tfrac{1}{2}(0 + 0.25)(0.6 – 0.5) = 0.0125 \\[6pt]
  prefs: []
  type: TYPE_NORMAL
- en: A_7 &= \tfrac{1}{2}(0.25 + 0.25)(0.7 – 0.6) = 0.0250 \\[6pt]
  prefs: []
  type: TYPE_NORMAL
- en: A_8 &= \tfrac{1}{2}(0.25 + 0.50)(0.8 – 0.7) = 0.0375 \\[6pt]
  prefs: []
  type: TYPE_NORMAL
- en: A_9 &= \tfrac{1}{2}(0.50 + 0.75)(0.9 – 0.8) = 0.0625 \\[6pt]
  prefs: []
  type: TYPE_NORMAL
- en: A_{10} &= \tfrac{1}{2}(0.75 + 1.00)(1.0 – 0.9) = 0.0875 \\[8pt]
  prefs: []
  type: TYPE_NORMAL
- en: '\text{Total Area Under Lorenz Curve: }'
  prefs: []
  type: TYPE_NORMAL
- en: A &= 0.0000 + 0.0000 + 0.0000 + 0.0000 + 0.0000 \\[6pt]
  prefs: []
  type: TYPE_NORMAL
- en: '&\quad + 0.0125 + 0.0250 + 0.0375 + 0.0625 + 0.0875 \\[6pt]'
  prefs: []
  type: TYPE_NORMAL
- en: '&= 0.2250'
  prefs: []
  type: TYPE_NORMAL
- en: \end{aligned}
  prefs: []
  type: TYPE_NORMAL
- en: \]
  prefs: []
  type: TYPE_NORMAL
- en: We calculated the area under the Lorenz curve, which is 0.225.
  prefs: []
  type: TYPE_NORMAL
- en: Here, we plotted the cumulative population on the X-axis and the cumulative
    positives on the Y-axis.
  prefs: []
  type: TYPE_NORMAL
- en: The Lorenz curve helps us understand how the positives (class 2) are distributed
    across the population as we move from the lowest to the highest predicted probability.
  prefs: []
  type: TYPE_NORMAL
- en: When the curve remains flat for a long stretch and then rises sharply near the
    end, it means most of the positives are concentrated among the highest-scoring
    observations. This is exactly what a good model is expected to do.
  prefs: []
  type: TYPE_NORMAL
- en: In our sample dataset, there are four positives (class 2) and six negatives
    (class 1). The shape of the curve shows how effectively the model separates the
    two classes.
  prefs: []
  type: TYPE_NORMAL
- en: A model that pushes positives toward the higher predicted probabilities will
    create a more curved Lorenz plot, which indicates stronger separation and better
    ranking ability.
  prefs: []
  type: TYPE_NORMAL
- en: If the model were perfect, all the positives would appear only in the highest
    predicted probability region.
  prefs: []
  type: TYPE_NORMAL
- en: In that case, the Lorenz curve would stay at zero for most of the population
    and then suddenly rise to 100 percent right near the end. This steep jump shows
    perfect separation.
  prefs: []
  type: TYPE_NORMAL
- en: The curve looks like this for a perfect model.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a00104d716ccfc1c5857027790a68e8f.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: Area under the lorenz curve for the perfect model.
  prefs: []
  type: TYPE_NORMAL
- en: \[
  prefs: []
  type: TYPE_NORMAL
- en: \begin{aligned}
  prefs: []
  type: TYPE_NORMAL
- en: \text{Perfect Area} &= \tfrac{1}{2} \times \text{base} \times \text{height}
    \\[6pt]
  prefs: []
  type: TYPE_NORMAL
- en: '&= \tfrac{1}{2} \times (1.0 – 0.6) \times 1.0 \\[6pt]'
  prefs: []
  type: TYPE_NORMAL
- en: '&= \tfrac{1}{2} \times 0.4 \\[6pt]'
  prefs: []
  type: TYPE_NORMAL
- en: '&= 0.2'
  prefs: []
  type: TYPE_NORMAL
- en: \end{aligned}
  prefs: []
  type: TYPE_NORMAL
- en: \]
  prefs: []
  type: TYPE_NORMAL
- en: We also have another method to calculate the Area under the curve for the perfect
    model.
  prefs: []
  type: TYPE_NORMAL
- en: \[
  prefs: []
  type: TYPE_NORMAL
- en: \text{Let } \pi \text{ be the proportion of positives in the dataset.}
  prefs: []
  type: TYPE_NORMAL
- en: \]
  prefs: []
  type: TYPE_NORMAL
- en: \[
  prefs: []
  type: TYPE_NORMAL
- en: \text{Perfect Area} = \frac{1}{2} (1 – (1 – \pi)) \times 1
  prefs: []
  type: TYPE_NORMAL
- en: \] \[
  prefs: []
  type: TYPE_NORMAL
- en: = \frac{1}{2} \pi
  prefs: []
  type: TYPE_NORMAL
- en: \] \[
  prefs: []
  type: TYPE_NORMAL
- en: = \frac{1}{2} \times 0.4
  prefs: []
  type: TYPE_NORMAL
- en: \] \[
  prefs: []
  type: TYPE_NORMAL
- en: = 0.2
  prefs: []
  type: TYPE_NORMAL
- en: \]
  prefs: []
  type: TYPE_NORMAL
- en: 'For our dataset:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Here, we have 4 positives out of 10 records, so: π = 4/10 = 0.4.'
  prefs: []
  type: TYPE_NORMAL
- en: We calculated the area under the lorenz curve for our sample dataset and also
    for the perfect model with same number of positives and negatives.
  prefs: []
  type: TYPE_NORMAL
- en: Now, if we go through the dataset without sorting, the positives are evenly
    spread out. This means the rate at which we collect positives is the same as the
    rate at which we move through the population.
  prefs: []
  type: TYPE_NORMAL
- en: This is the random model, and it always gives an area under the curve of 0.5.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a0e154a625154bf83dcdfbb46d17376b.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 5: Calculate the Gini Coefficient'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: \[
  prefs: []
  type: TYPE_NORMAL
- en: A_{\text{model}} = 0.225
  prefs: []
  type: TYPE_NORMAL
- en: \]
  prefs: []
  type: TYPE_NORMAL
- en: \[
  prefs: []
  type: TYPE_NORMAL
- en: A_{\text{random}} = 0.5
  prefs: []
  type: TYPE_NORMAL
- en: \] \[
  prefs: []
  type: TYPE_NORMAL
- en: A_{\text{perfect}} = 0.2
  prefs: []
  type: TYPE_NORMAL
- en: \] \[
  prefs: []
  type: TYPE_NORMAL
- en: \text{Gini} = \frac{A_{\text{random}} – A_{\text{model}}}{A_{\text{random}}
    – A_{\text{perfect}}}
  prefs: []
  type: TYPE_NORMAL
- en: \] \[
  prefs: []
  type: TYPE_NORMAL
- en: = \frac{0.5 – 0.225}{0.5 – 0.2}
  prefs: []
  type: TYPE_NORMAL
- en: \] \[
  prefs: []
  type: TYPE_NORMAL
- en: = \frac{0.275}{0.3}
  prefs: []
  type: TYPE_NORMAL
- en: \] \[
  prefs: []
  type: TYPE_NORMAL
- en: \approx 0.92
  prefs: []
  type: TYPE_NORMAL
- en: \]
  prefs: []
  type: TYPE_NORMAL
- en: We got Gini = 0.92, which means almost all the positives are concentrated at
    the top of the sorted list. This shows that the model does a very good job of
    separating positives from negatives, coming close to perfect.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: As we have seen how the Gini Coefficient is calculated, let’s look at what we
    actually did during the calculation.
  prefs: []
  type: TYPE_NORMAL
- en: We considered a sample of 10 points consisting of output probabilities from
    logistic regression.
  prefs: []
  type: TYPE_NORMAL
- en: We sorted the probabilities in ascending order.
  prefs: []
  type: TYPE_NORMAL
- en: Next, we calculated Cumulative Population (%) and Cumulative Positives (%) and
    then plotted them.
  prefs: []
  type: TYPE_NORMAL
- en: We got a curve called the Lorenz curve, and we calculated the area under it,
    which is 0.225.
  prefs: []
  type: TYPE_NORMAL
- en: Now let’s understand what is 0.225?
  prefs: []
  type: TYPE_NORMAL
- en: Our sample consists of 4 positives (class 2) and 6 negatives (class 1).
  prefs: []
  type: TYPE_NORMAL
- en: The output probabilities are for class 2, which means the higher the probability,
    the more likely the customer belongs to class 2.
  prefs: []
  type: TYPE_NORMAL
- en: In our sample data, there are four positives (class 2) and six negatives (class
    1). The Lorenz curve shows how these positives are distributed as we move from
    the lowest to the highest predicted probability.
  prefs: []
  type: TYPE_NORMAL
- en: In a perfect model, all four positives would appear only at the highest predicted
    scores, which means the curve would remain at zero for most of the population
    and then jump to 100 percent near the end.
  prefs: []
  type: TYPE_NORMAL
- en: In that case, the positives would be captured entirely within the final 40 percent
    of the population, and the area under the Lorenz curve would be 0.2.
  prefs: []
  type: TYPE_NORMAL
- en: For our model, the area under the Lorenz curve is 0.225, which is very close
    to the perfect value.
  prefs: []
  type: TYPE_NORMAL
- en: 'This means the model is doing a good job of ranking the observations: most
    of the positives are concentrated among the highest scores, and the model is effectively
    separating the two classes.'
  prefs: []
  type: TYPE_NORMAL
- en: The smaller the area under the Lorenz curve, the more efficiently the model
    captures positives, which indicates stronger predictive performance.
  prefs: []
  type: TYPE_NORMAL
- en: Next, we calculated the Gini Coefficient, which is 0.92.
  prefs: []
  type: TYPE_NORMAL
- en: \[
  prefs: []
  type: TYPE_NORMAL
- en: \text{Gini} = \frac{A_{\text{model}} – A_{\text{random}}}{A_{\text{perfect}}
    – A_{\text{random}}}
  prefs: []
  type: TYPE_NORMAL
- en: \]
  prefs: []
  type: TYPE_NORMAL
- en: The numerator tells us how much better our model is than random guessing.
  prefs: []
  type: TYPE_NORMAL
- en: The denominator tells us the maximum possible improvement over random.
  prefs: []
  type: TYPE_NORMAL
- en: The ratio puts these two together, so the Gini coefficient always falls between
    0 (random) and 1 (perfect).
  prefs: []
  type: TYPE_NORMAL
- en: Gini is used to measure how close the model is to being perfect in separating
    positive and negative classes.
  prefs: []
  type: TYPE_NORMAL
- en: But we may get a doubt about why we calculated Gini and why we didn’t stop after
    0.225.
  prefs: []
  type: TYPE_NORMAL
- en: 0.225 is the area under the Lorenz curve for our model. It doesn’t tell us how
    close the model is to being perfect without comparing it to 0.2, which is the
    area for the perfect model.
  prefs: []
  type: TYPE_NORMAL
- en: So, we calculate Gini to standardize it so that it falls between 0 and 1, which
    makes it easy to compare models.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: In economics, the diagonal is often called the line of equality, and the Lorenz
    curve is usually interpreted based on how close it is to that line.
  prefs: []
  type: TYPE_NORMAL
- en: If the curve is very close, it means income is distributed more evenly across
    the population, which is considered a good thing.
  prefs: []
  type: TYPE_NORMAL
- en: But in our case, we are not measuring income inequality. We are trying to see
    how well a model can separate defaulters from non-defaulters.
  prefs: []
  type: TYPE_NORMAL
- en: Here, we actually want the Lorenz curve to stay far away from the line of equality.
  prefs: []
  type: TYPE_NORMAL
- en: The farther it bends away, the better the model is at distinguishing between
    the two classes, and the stronger its predictive performance will be.
  prefs: []
  type: TYPE_NORMAL
- en: A Gini coefficient of 0.92 would usually be seen as a bad thing in economics
    because it means there is a lot of inequality and most of the income is concentrated
    among a small group of people.
  prefs: []
  type: TYPE_NORMAL
- en: But in machine learning, the meaning is completely different. A Gini of 0.92
    is considered very good because it shows that the model is doing an excellent
    job of separating the two classes.
  prefs: []
  type: TYPE_NORMAL
- en: It means most defaulters and non-defaulters are being ranked correctly, and
    the model is achieving about 92 percent of the best possible separation.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Banks also use Gini Coefficient to evaluate credit risk models alongside ROC-AUC
    and KS Statistic. Together, these measures give a complete picture of model performance.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Now, let’s calculate ROC-AUC for our sample data.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: We got AUC = 0.9583
  prefs: []
  type: TYPE_NORMAL
- en: Now, Gini = (2 * AUC) – 1 = (2 * 0.9583) – 1 = 0.92
  prefs: []
  type: TYPE_NORMAL
- en: This is the relation between Gini & ROC-AUC.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Now let’s calculate Gini Coefficient on a full dataset.
  prefs: []
  type: TYPE_NORMAL
- en: '**Code:**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/b104e89588ccc29267143e60ee3b938a.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: We got Gini = 0.60, which means the model is good at ranking positives above
    negatives and achieves about 60% of the separation that a perfect model would.
  prefs: []
  type: TYPE_NORMAL
- en: 'Interpretation (ML / Credit Scoring context):'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: A Gini score below 0.5 usually indicates a weak model that is not much better
    than random guessing.
  prefs: []
  type: TYPE_NORMAL
- en: A score between 0.5 and 0.6 suggests the model is acceptable and has some predictive
    power.
  prefs: []
  type: TYPE_NORMAL
- en: A range between 0.6 and 0.7 is considered good, showing the model can reliably
    distinguish between the classes.
  prefs: []
  type: TYPE_NORMAL
- en: A Gini above 0.8 is considered excellent and is rarely achieved in real-world
    scenarios.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Dataset
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The dataset used in this blog is the [German Credit dataset](https://archive.ics.uci.edu/dataset/144/statlog+german+credit+data),
    which is publicly available on the UCI Machine Learning Repository. It is provided
    under the [Creative Commons Attribution 4.0 International (CC BY 4.0) License](https://creativecommons.org/licenses/by/4.0/legalcode).
    This means it can be freely used and shared with proper attribution.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: I hope you found this article helpful and clear.
  prefs: []
  type: TYPE_NORMAL
- en: If you haven’t read my earlier blogs on [ROC-AUC](https://towardsdatascience.com/roc-auc-explained-a-beginners-guide-to-evaluating-classification-models/)
    and [Kolmogorov Smirnov Statistic](https://towardsdatascience.com/kolmogorov-smirnov-statistic-explained-measuring-model-power-in-credit-risk-modeling/),
    you can check them out here.
  prefs: []
  type: TYPE_NORMAL
- en: If you’d like to read more of my writing, you can also find it on [Medium](https://medium.com/@dasarinikhil076)
    and [LinkedIn](https://www.linkedin.com/in/nikhildasari-dataanalyst/).
  prefs: []
  type: TYPE_NORMAL
- en: '**Note:** I made a small mistake in my earlier explanation of this part. I’ve
    corrected it now, so the concept is clearer and more accurate.'
  prefs: []
  type: TYPE_NORMAL
- en: Thanks for reading!
  prefs: []
  type: TYPE_NORMAL
