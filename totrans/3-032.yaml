- en: 'Agentic AI 101: Starting Your Journey Building AI Agents'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/agentic-ai-101-starting-your-journey-building-ai-agents/](https://towardsdatascience.com/agentic-ai-101-starting-your-journey-building-ai-agents/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1746162647083" class="mdspan-comment">Introduction</mdspan>
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The Artificial Intelligence industry is moving fast. It is impressive and many
    times overwhelming.
  prefs: []
  type: TYPE_NORMAL
- en: I have been studying, learning, and building my foundations in this area of
    Data Science because I believe that the future of Data Science is strongly correlated
    with the development of Generative AI.
  prefs: []
  type: TYPE_NORMAL
- en: It was just the other day when I built my first AI Agent, and then a couple
    of weeks after that, there were several Python packages to choose from, not to
    mention the no-code options that are doing very well, like *n8n*.
  prefs: []
  type: TYPE_NORMAL
- en: From “mere” models that could just chat with us to a *tsunami* of AI Agents
    that are everywhere, searching the Internet, handling files, and making whole
    Data Science projects (from EDA to modeling and evaluation), all of that happened
    in just a couple of years.
  prefs: []
  type: TYPE_NORMAL
- en: '**What?**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Seeing all of that, my thought was: *“I need to get on board as soon as possible”*.
    After all, it’s better to surf the wave than be swallowed by it.'
  prefs: []
  type: TYPE_NORMAL
- en: For that reason, I decided to start this series of posts where I plan to go
    from the fundamentals to build our first AI Agent, until more complex concepts.
  prefs: []
  type: TYPE_NORMAL
- en: Enough talk, let’s dive in.
  prefs: []
  type: TYPE_NORMAL
- en: The Basics of AI Agents
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: An AI Agent is created when we give the LLM the power to interact with tools
    and perform useful actions for us. So, instead of being just a chatbot, now it
    can schedule appointments, take care of our calendar, search the internet, write
    social media posts, and the list goes on…
  prefs: []
  type: TYPE_NORMAL
- en: AI Agents can do useful things, not just chat.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: But how can we give that power to an LLM?
  prefs: []
  type: TYPE_NORMAL
- en: 'The simple answer is to use an API to interact with the LLM. There are several
    Python packages for that nowadays. If you follow my blog, you will see that I
    have already tried a couple of packages to build agents: Langchain, Agno (former
    PhiData), and CrewAI, for instance. For this series, I will stick with Agno [1].'
  prefs: []
  type: TYPE_NORMAL
- en: First, set up a virtual environment using `uv`, Anaconda, or the environment
    handler of your preference. Next, install the packages.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Quick note before we continue. Don’t forget to get a Google Gemini API Key [2].
  prefs: []
  type: TYPE_NORMAL
- en: 'Creating a simple agent is very simple. All the packages are very similar.
    They have a class `Agent` or something similar that allows us to select a model
    and start interacting with the LLM of our choice. Here are the main components
    of this class:'
  prefs: []
  type: TYPE_NORMAL
- en: '`model`: the connection with the LLM. Here we will choose between OpenAI, Gemini,
    Llama, Deepseek etc.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`description`: This argument lets us describe the behavior of the agent. This
    is added to the `system_message`, which is a similar argument.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`instructions`: I like to think of an agent like an employee or an assistant
    that we’re managing. In order to have a task done, we must provide the instructions
    of what needs to be done. Here is where you can do that.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`expected_output`: Here we can give instructions about the expected output.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`tools`: This is what makes the LLM an Agent, enabling it to interact with
    the real world using these tools.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Now, let’s create a simple agent that has no tools, but will serve to build
    our intuition around the structure of the code.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: That is great. We are using the Gemini 1.5 model. Notice how it responds based
    on the data it was trained on. If we ask it to tell us the weather today, we’ll
    see a response saying it can’t access the internet.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s explore the `instructions` and `expected_output` arguments. We now want
    a table with the month, season and average temperature for NYC.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: And there’s the result.
  prefs: []
  type: TYPE_NORMAL
- en: '| Month | Season | Average Temperature (°F) |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| January | Winter | 32 |'
  prefs: []
  type: TYPE_TB
- en: '| February | Winter | 35 |'
  prefs: []
  type: TYPE_TB
- en: '| March | Spring | 44 |'
  prefs: []
  type: TYPE_TB
- en: '| April | Spring | 54 |'
  prefs: []
  type: TYPE_TB
- en: '| May | Spring | 63 |'
  prefs: []
  type: TYPE_TB
- en: '| June | Summer | 72 |'
  prefs: []
  type: TYPE_TB
- en: '| July | Summer | 77 |'
  prefs: []
  type: TYPE_TB
- en: '| August | Summer | 76 |'
  prefs: []
  type: TYPE_TB
- en: '| September | Autumn | 70 |'
  prefs: []
  type: TYPE_TB
- en: '| October | Autumn | 58 |'
  prefs: []
  type: TYPE_TB
- en: '| November | Autumn | 48 |'
  prefs: []
  type: TYPE_TB
- en: '| December | Winter | 37 |'
  prefs: []
  type: TYPE_TB
- en: Tools
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The previous responses are nice. But we naturally don’t want to use powerful
    models such as LLMs to play with a chatbot or tell us old news, right?
  prefs: []
  type: TYPE_NORMAL
- en: 'We want them to be a bridge to automation, productivity, and knowledge. So,
    the **Tools** will add capabilities to our AI Agents, building, therefore, the
    bridge with the real world. Common examples of tools for agents are: searching
    the web, running SQL, sending an email or calling APIs.'
  prefs: []
  type: TYPE_NORMAL
- en: But more than that, we can create custom capabilities to our agents by using
    any Python function as a tool.
  prefs: []
  type: TYPE_NORMAL
- en: '**Tools** are functions that an Agent can run to achieve tasks.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: In terms of code, adding a tool to the Agent is just a matter of using the argument
    `tools` in the `Agent` class.
  prefs: []
  type: TYPE_NORMAL
- en: Imagine a solopreneur (one-person company) in the healthy living business who
    wants to automate their content generation. This person posts tips about healthy
    habits every day. I know for a fact that content generation is not as straightforward
    as it looks like. It demands creativity, research, and copywriting skills. So,
    if this could be automated, or at least part of it, that’s time saved.
  prefs: []
  type: TYPE_NORMAL
- en: So we write this code to create a very simple agent that can generate a simple
    Instagram post and save it to a markdown file for our review. We reduced the process
    from thinking > researching > writing > reviewing > posting to reviewing > posting.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: As a result, we have the following.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: Certainly, we could make it much more fancy by creating a crew with other agents
    to search a list of websites for content, a content checker and reviewer, and
    another one to generate an image for the post. But I believe you got the general
    idea of how to add a `tool` to an `Agent`.
  prefs: []
  type: TYPE_NORMAL
- en: Another type of tool we can add is the **function** **tool**. We can use a Python
    function to serve as a tool for the LLM. Just don’t forget to add the type hints
    like `video_id:str`, so the model knows what to use as the function’s input. Otherwise,
    you might see an error.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s see briefly how that works.
  prefs: []
  type: TYPE_NORMAL
- en: We now want our Agent to be able to get a given YouTube video and summarize
    it. To perform such a task, we simply create a function that downloads the transcript
    of the video from YT and passes it to the model to summarize.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: And then you have a result.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/fb5d325f274ea68cbc63acd9a4815fa7.png)'
  prefs: []
  type: TYPE_IMG
- en: Result of the summarization requested. Image by the author.
  prefs: []
  type: TYPE_NORMAL
- en: Agents with Reasoning
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Another cool option from the Agno package is allowing us to easily create agents
    that can analyze the situation before answering a question. That’s the reasoning
    tool.
  prefs: []
  type: TYPE_NORMAL
- en: We will create a reasoning agent with Alibaba’s Qwen-qwq-32b model. Notice that
    the only difference here, besides the model, is that we’re adding the tool `ReasoningTools()`.
  prefs: []
  type: TYPE_NORMAL
- en: The `adding_instructions=True` means providing detailed instructions to the
    agent, which enhances the reliability and accuracy of its tool usage, while setting
    this to `False` forces the agent to depend on its own reasoning, which can be
    more prone to errors.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: Follows the output.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/9d823f7032a5e400b13125a143b090da.png)'
  prefs: []
  type: TYPE_IMG
- en: Output of the reasoning model. Image by the author.
  prefs: []
  type: TYPE_NORMAL
- en: Agent with Knowledge
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This tool is the easiest way for me to create a Retrieval Augmented Generation
    (RAG). With this feature, you can point the agent to a website or a list of websites,
    and it will add the content to a vector database. Then, it becomes searchable.
    Once asked, the agent can use the content as part of the answer.
  prefs: []
  type: TYPE_NORMAL
- en: In this simple example, I added one page of my website and asked the agent what
    books are listed there.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/4a7e924569c5461aada9561c554d087b.png)'
  prefs: []
  type: TYPE_IMG
- en: Response from the agent after searching the knowledge base. Image by the author.
  prefs: []
  type: TYPE_NORMAL
- en: Agent with Memory
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The last type we will go over in this post is the agent with memory.
  prefs: []
  type: TYPE_NORMAL
- en: This type of agent can store and retrieve information about users from previous
    interactions, allowing it to learn user preferences and personalize its responses.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s see this example where I will tell a couple of things to the agent and
    ask for recommendations based on that interaction.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/a71463ef0b9f84f930e6113dfc8261ca.png)'
  prefs: []
  type: TYPE_IMG
- en: Example of AI Agent with memory. Image by the author.
  prefs: []
  type: TYPE_NORMAL
- en: And here we end this first post about AI Agents.
  prefs: []
  type: TYPE_NORMAL
- en: Before You Go
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: There’s a lot of content in this post. We climbed the first step in this ladder
    of learning about AI agents. I know, it is overwhelming. There is so much information
    out there that it becomes harder and harder to know where to start and what to
    study.
  prefs: []
  type: TYPE_NORMAL
- en: My suggestion is to take the same road I am taking. One step at a time, choosing
    just a couple of packages like Agno, CrewAI, and going deep on those, learning
    how to create more complex agents each time.
  prefs: []
  type: TYPE_NORMAL
- en: In this post, we started from scratch, learning how to simply interact with
    an LLM to creating agents with memory, or even creating a simple RAG for an AI
    Agent.
  prefs: []
  type: TYPE_NORMAL
- en: Obviously, there is much more you can do just with a single agent. Check out
    the Reference [4].
  prefs: []
  type: TYPE_NORMAL
- en: With these simple skills, be sure that you are ahead of a lot of people, and
    there is a lot you can do already. Just use the creativity and (why not?) ask
    for the help of an LLM to build something cool!
  prefs: []
  type: TYPE_NORMAL
- en: In the next post, we will learn more about agents and evaluation. Stay tuned!
  prefs: []
  type: TYPE_NORMAL
