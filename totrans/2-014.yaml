- en: 'Cracking the Density Code: Why MAF Flows Where KDE Stalls'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/cracking-the-density-code-why-maf-flows-where-kde-stalls/](https://towardsdatascience.com/cracking-the-density-code-why-maf-flows-where-kde-stalls/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '<mdspan datatext="el1755881187756" class="mdspan-comment">Part 1: Introduction</mdspan>'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: One of the main problems that arises in high-dimensional density estimation
    is that as our dimension increases, our data becomes more sparse. Therefore, for
    models that rely on local neighborhood estimation we need exponentially more data
    as our dimension increases to continue getting meaningful results. This is referred
    to as the curse of dimensionality.
  prefs: []
  type: TYPE_NORMAL
- en: 'In my [previous article](https://towardsdatascience.com/the-math-behind-kernel-density-estimation-5deca75cba38/)
    on density estimation, I demonstrated how the kernel density estimator (KDE) can
    be effectively used for one-dimensional data. However, its performance deteriorates
    significantly in higher dimensions. To illustrate this, I ran a simulation to
    determine how many samples are required for KDE to achieve a mean relative error
    of 0.2 when estimating the density of a multivariate Gaussian distribution across
    various dimensions. Bandwidth was selected using Scott’s rule. The results are
    as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/11733f1ab03ac27343c65eb30e58c880.png)'
  prefs: []
  type: TYPE_IMG
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'That’s right: in my simulation, to match the accuracy of just 22 data points
    in one dimension, you would need more than 360,000 data points in six dimensions!
    Even more astonishingly, in his book Multivariate Density Estimation, David W.
    Scott shows that, depending on the metric, over a million data points are required
    in eight dimensions to achieve the same accuracy as just 50 data points in one
    dimension.'
  prefs: []
  type: TYPE_NORMAL
- en: Hopefully, this is enough to convince you that the kernel density estimator
    is not ideal for estimating densities in higher dimensions. But what’s the alternative?
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 'Part 2: Introduction to Normalizing Flows'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: One promising alternative is Normalizing Flows, and the specific model I will
    focus on is the Masked Autoregressive Flow (MAF).
  prefs: []
  type: TYPE_NORMAL
- en: 'This section draws in part on the work of George Papamakarios and Balaji Lakshminarayanan,
    as presented in Chapter 23 of [Probabilistic Machine Learning: Advanced Topics](https://probml.github.io/pml-book/book2.html)
    by Kevin P. Murphy (see the book for further details).'
  prefs: []
  type: TYPE_NORMAL
- en: The core idea behind normalizing flows is that a distribution p(x) can be modeled
    by starting with random variables sampled from a simple base distribution, (such
    as a Gaussian) and then passing them through a sequence of differentiable, invertible
    transformations (diffeomorphisms). Each transformation incrementally reshapes
    the distribution, gradually mapping the base distribution into the target distribution.
    A visual illustration of this process is shown below.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/afe58da63a166ce4fb9b7000f9954750.png)'
  prefs: []
  type: TYPE_IMG
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 'More formally, assume the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/08a90ac7bfcd07f96cd75fc3257f1e44.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Then our target distribution is defined by the following change of variables
    formula:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/6479b19961c3f5bd36e217ad42a0246a.png)'
  prefs: []
  type: TYPE_IMG
- en: Where J_{f^{-1}}(x), the Jacobian of f^{-1} evaluated at x.
  prefs: []
  type: TYPE_NORMAL
- en: 'Since we need to compute the determinant, there is also a computational consideration;
    our transformation functions should ideally have Jacobians whose determinants
    are easy to calculate. Designing a diffeomorphic function that both models a complex
    distribution and yields a tractable determinant is a challenging task. The way
    this is addressed in practice is by constructing the target distribution through
    a flow of simpler functions. Thus, f is defined as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/649c61fa2ca33f0ab6bcebd956069d85.png)'
  prefs: []
  type: TYPE_IMG
- en: Then, as the composition of diffeomorphic functions is also diffeomorphic, f
    will be invertible and differentiable.
  prefs: []
  type: TYPE_NORMAL
- en: There are a few typical candidates for f. Listed below are popular choices.
  prefs: []
  type: TYPE_NORMAL
- en: Affine Flows
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Affine flows are given by the following function:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/9169b074b1734a943ece7b7d89942d30.png)'
  prefs: []
  type: TYPE_IMG
- en: We need to restrict **A** tobeing an invertible square matrix so that f is invertible.
    Affine flows are not very good at modelling data on their own, but they are useful
    when mixed with other functions.
  prefs: []
  type: TYPE_NORMAL
- en: Elementwise Flows
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Elementwise flows transform the vector u element wise. Let h be a scalar bijection,
    we can create a vector-valued bijection f defined as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/563cd6a82f6b374006780e87c80191c7.png)'
  prefs: []
  type: TYPE_IMG
- en: 'The determinant of the Jacobian is then given by:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/538c90ce51180197425fd3496095fa1f.png)'
  prefs: []
  type: TYPE_IMG
- en: Similar to affine flows, elementwise flows are not very effective at modeling
    data on their own, since they do not capture interactions between dimensions.
    However, they are often used in combination with other transformations to build
    more complex flows.
  prefs: []
  type: TYPE_NORMAL
- en: Coupling Flows
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Coupling flows, introduced by Dinh et al. (2015), differ from the flows discussed
    earlier in that they allow the use of non-linear functions to better capture the
    structure of the data. Apologies for using an image here, but to avoid confusion
    I needed inline LaTeX.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/2d31496c862f54163e55b4e76b4b9f78.png)'
  prefs: []
  type: TYPE_IMG
- en: Here, the parameters of f-hat are calculated by sending the subset b of u through
    Θ, where Θ is a general function referred to as the conditioner. This setup contrasts
    with affine flows, which only mix dimensions linearly, and elementwise flows,
    which keep each dimension isolated. Coupling flows allow for a non-linear mixing
    of dimensions through the conditioner. If you are interested in the type of coupling
    layers that have been proposed, see Kobyzev, Ivan & Prince, Simon & Brubaker,
    Marcus. (2020).
  prefs: []
  type: TYPE_NORMAL
- en: 'The determinant is quite simple to calculate as the partial derivative of x-b
    with respect to u-b is 0\. Hence, the Jacobian is the following upper block triangular
    matrix:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/07883ab0b929356ef1b38e1189db635a.png)'
  prefs: []
  type: TYPE_IMG
- en: 'The determinant of the Jacobian is then given by:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/34f454a67761270a81cffccdee5aeca5.png)'
  prefs: []
  type: TYPE_IMG
- en: The following showcases visually how each of these functions could effect the
    distribution.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/80225664ae3e5870bde6c61cc5b9795d.png)'
  prefs: []
  type: TYPE_IMG
- en: Masked Autoregressive Flows
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Assume that **u** is a vector containing **d** elements. An autoregressive
    bijection function, which outputs a vector **x** with **d** elements, is defined
    as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b156ce7bf81dc9746530df1e76298d9d.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Here, h is a scalar bijection parameterized by Θ, where Θ is an arbitrary non-linear
    function, typically a neural network. As a result of the autoregressive structure,
    each element x_i depends only on the elements of u up to the i-th index. Consequently,
    the Jacobian matrix will be triangular, and its determinant will be the product
    of the diagonal entries, as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b8218e5107f1a7ed375c6714ac584c3e.png)![](../Images/396885906f52e6eb11cdcb00c75a265b.png)'
  prefs: []
  type: TYPE_IMG
- en: If we were to use multiple autoregressive bijection functions as our f, we would
    need to train d different neural networks, which can be quite computationally
    expensive. So instead, to address this, a more efficient approach in practice
    is to share parameters between the conditioners by combining them into a single
    model Θ that takes in a shared input x and outputs the set of parameters (Θ1,
    Θ2,…, Θd). However, to keep the autoregressive structure, we have to ensure that
    each Θi depends only on x1​,x2​,…,xi−1.
  prefs: []
  type: TYPE_NORMAL
- en: Masked Autoregressive Flows (MAF) use a multi-layer perceptron as the non-linear
    function, and then apply masking to zero out any computational paths that would
    violate the autoregressive structure. By doing so, MAF ensures that each output
    Θi​ is conditionally dependent only on the previous inputs x1​,x2​,…,xi−1 and
    allowing for efficient training.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Part 3: Showdown
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To determine whether KDE or MAF better models distributions in higher dimensions,
    I designed an experiment that is similar to my introductory analysis of KDE. I
    trained both models on progressively larger datasets until each achieved a KL
    divergence of 0.5.
  prefs: []
  type: TYPE_NORMAL
- en: 'For those unfamiliar with this metric, KL divergence quantifies how one probability
    distribution differs from a reference distribution. Specifically, it measures
    the expected excess ‘surprise’ from using one distribution to approximate another.
    A KL divergence of 0.0 indicates perfect alignment between distributions, while
    higher values signify greater discrepancy. To provide visual intuition, the figure
    below illustrates what .5 KL divergence looks like when comparing two three-dimensional
    distributions:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/9c1827c256c5c3909c340740684a2988.png)'
  prefs: []
  type: TYPE_IMG
- en: .5 KL Divergence Visual
  prefs: []
  type: TYPE_NORMAL
- en: The experimental design encompassed three distinct distribution families, each
    chosen to test different aspects of the models’ capabilities. First, I examined
    Conditional Gaussian Distributions, which represent the simplest case with unimodal,
    symmetric probability mass. Second, I tested Conditional Mixture of Gaussians,
    introducing multimodality to challenge the models’ ability to capture multiple
    distinct modes in the data. Finally, I included Conditional Skew Normal distributions
    to assess performance on asymmetric distributions.
  prefs: []
  type: TYPE_NORMAL
- en: For the Kernel Density Estimation model, selecting appropriate bandwidth parameters
    was challenging for the larger dimensions. I ended up employing Leave-One-Out
    Cross-Validation (LOOCV), a technique where each data point is held out while
    the remaining points are used to estimate the optimal bandwidth. This process,
    while computationally expensive, requiring n separate model fits for n data points,
    was necessary for achieving reliable results in higher dimensions. In my previous
    versions of this experiments with alternative bandwidth selection methods, all
    demonstrated inferior performance, requiring substantially more training data
    to achieve the same KL divergence threshold.
  prefs: []
  type: TYPE_NORMAL
- en: The Masked Autoregressive Flow model required a different optimization strategy.
    Like most neural network based models, MAF depends on a number of hyperparameters.
    I developed a scaling strategy where these hyperparameters were adjusted proportionally
    to the input dimensionality. It’s important to note that this scaling was based
    on reasonable heuristics rather than an exhaustive optimization. The hyperparameter
    search was kept minimal to establish baseline performance, more sophisticated
    tuning would likely give large performance improvements for the MAF model.
  prefs: []
  type: TYPE_NORMAL
- en: 'The complete codebase, including data generation, model implementations, training
    procedures, and evaluation metrics, is available in [this repository](https://github.com/ZackNay/KDE-VS-MAF)
    for reproducibility and further experimentation. Here are the results:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/46217672ca5fcd1ea3bd3e37b108f4b7.png)'
  prefs: []
  type: TYPE_IMG
- en: The experimental results show a striking a difference in relative performance
    of KDE and MAF! As shown by the graphs, a transition occurs around the fifth dimension.
    Below this threshold, KDE showed better performance, however, beyond five dimensions,
    MAF begins to vastly outperform KDE by increasingly dramatic margins.
  prefs: []
  type: TYPE_NORMAL
- en: The magnitude of this difference becomes stark at dimension 7, where our results
    demonstrate a profound disparity in data efficiency. Across all three distribution
    types tested KDE consistently required more than 100,000 data points to achieve
    satisfactory performance. In contrast, MAF reached the same performance threshold
    with a maximum of merely a maximum of 2,000 data points across all distributions.
    This represents an improvement factor ranging from 50x to 100x!
  prefs: []
  type: TYPE_NORMAL
- en: Apart from sample efficiency, the computational performance differences are
    equally compelling as the KDE required approximately 12 times longer to train
    than MAF at these higher dimensions.
  prefs: []
  type: TYPE_NORMAL
- en: The combination of superior data efficiency and faster training times makes
    MAF the clear winner for high dimensional tasks. KDE is still certainly a valuable
    tool for low-dimensional problems, but if you are working on an application involving
    more than five dimensions, I highly recommend trying the MAF approach.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Part 4: Why does MAF Crush KDE?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To understand this why KDE suffers in high dimension, we must first examine
    how KDE actually works under the hood. As discussed in my previous article, Kernel
    Density Estimation uses local neighborhood estimation, where for any point where
    we want to evaluate the density, KDE looks at nearby data points and uses their
    proximity to estimate the local probability density. Each kernel function creates
    a neighborhood around each data point, and the density estimate at any location
    is the sum of contributions from all kernels whose neighborhoods include that
    location.
  prefs: []
  type: TYPE_NORMAL
- en: This local approach works well in low dimensions. However, as the dimensions
    increase, the data becomes sparser, causing the estimator to need exponentially
    more data points to fill the space with the same density.
  prefs: []
  type: TYPE_NORMAL
- en: In contrast, MAF doesn’t use local neighborhood based estimation. Instead of
    estimating density by looking at nearby points, MAF learns functions that map
    previous variables to conditional distribution parameters. The neural network’s
    weights are shared across the entire input space, allowing it to generalize from
    training data without needing to populate local neighborhoods. This architectural
    difference enables MAF to scale far better then KDE with dimension.
  prefs: []
  type: TYPE_NORMAL
- en: This distinction between local and global approaches explains the dramatic performance
    gap observed in my experiment. While KDE must populate an exponentially expanding
    space with data points to maintain accurate local neighborhoods, MAF can exploit
    the compositional structure of neural networks to learn global patterns using
    far fewer samples.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The Kernel Density Estimator is great at nonparametrically analyzing data in
    low dimensions; it’s intuitive, fast, and requires far less tuning. However, for
    high dimensional data, or when computational time is a concern, I’d recommend
    trying out normalizing flows. While the model isn’t nearly as battle tested as
    KDE, they’re a solid alternative to try out, and might just end up being your
    new favorite density estimator.
  prefs: []
  type: TYPE_NORMAL
- en: '*Unless otherwise noted, all images are by the author. The code for the main
    experiment is located in this* [*repository*](https://github.com/ZackNay/KDE-VS-MAF)*. *'
  prefs: []
  type: TYPE_NORMAL
