- en: We can observe from the above results that the mean of the p1 estimate equals
    0.2051 which is very close to the true parameter p1 = 0.2\. This mean gets even
    closer to the true parameter as the sample size increases. Thus, we have numerically
    shown that the estimator is **unbiased** as confirmed by the theoretical results
    done earlier.
  prefs: []
  type: TYPE_NORMAL
- en: Moreover, the sample variance of the p1 estimator (0.001876) is almost identical
    to the theoretical variance (0.001897) which is beautiful.
  prefs: []
  type: TYPE_NORMAL
- en: It is always a happy moment when theory matches practice!
