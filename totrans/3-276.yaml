  type: TYPE_NORMAL
- en: '![](../Images/0bb2377d86ad61e683385a14a5a36413.png)'
  prefs: []
  type: TYPE_IMG
- en: We can then proceed to derive the variance of our estimator as follows.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/378749c950afbd9fea44de98e4247ce3.png)'
  prefs: []
  type: TYPE_IMG
- en: It is also clear from the above analysis that the estimator is consistent since
    it is unbiased and also its variance decreases when the sample size (N) increases.
    We will also use the above formula of the p1 estimator variance in our Python
    numerical example (shown in detail later in this article) when comparing theory
    with practical numerical results.
  prefs: []
  type: TYPE_NORMAL
