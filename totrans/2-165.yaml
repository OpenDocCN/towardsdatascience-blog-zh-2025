- en: Recap of all types of LLM Agents
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: LLM代理所有类型的回顾
- en: 原文：[https://towardsdatascience.com/recap-of-all-types-of-llm-agents/](https://towardsdatascience.com/recap-of-all-types-of-llm-agents/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://towardsdatascience.com/recap-of-all-types-of-llm-agents/](https://towardsdatascience.com/recap-of-all-types-of-llm-agents/)'
- en: <mdspan datatext="el1751917916233" class="mdspan-comment">Intro</mdspan>
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1751917916233" class="mdspan-comment">简介</mdspan>
- en: 'At the heart of every successful AI Agent lies one essential skill: **prompting**
    (or “prompt engineering”). It is the method of instructing LLMs to perform tasks
    by carefully designing the input text.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 每个成功的AI代理的核心都隐藏着一个基本技能：**提示**（或“提示工程”）。这是通过精心设计输入文本来指导LLM执行任务的方法。
- en: Prompt engineering is the evolution of the inputs for the first **text-to-text
    NLP models** (2018). At the time, developers typically focused more on the modeling
    side and feature engineering. After the creation of large GPT models (2022), we
    all started using mostly pre-trained tools, so the focus has shifted on the input
    formatting. Hence, the **“prompt engineering” discipline** was born, and now (2025)
    it has matured into a blend of art and science, as NLP is blurring the line between
    code and prompt.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 提示工程是第一代**文本到文本NLP模型**（2018年）输入的演变。当时，开发者通常更关注建模方面和特征工程。在创建大型GPT模型（2022年）之后，我们开始主要使用预训练的工具，因此重点转向了输入格式。因此，**“提示工程”学科**应运而生，现在（2025年）它已经成熟为艺术和科学的结合，因为NLP正在模糊代码和提示之间的界限。
- en: 'Different types of prompting techniques create different types of Agents. Each
    method enhances a specific skill: logic, planning, memory, accuracy, and Tool
    integration. Let’s see them all with a very simple example.'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 不同的提示技术创造了不同类型的代理。每种方法都增强了一种特定的技能：逻辑、规划、记忆、准确性和工具集成。让我们用一个非常简单的例子来看看它们。
- en: '[PRE0]'
  id: totrans-6
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Main techniques
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 主要技术
- en: 1) “**Regular” prompting** – just ask a question and get a straightforward answer.
    Also called “Zero-Shot” prompting specifically when the model is given a task
    without any prior examples of how to solve it. This basic technique is designed
    for **One-Step Agents** that execute the task without intermediate reasoning,
    especially early models.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 1) “**常规提示**” – 只需提出一个问题，就能得到直接的答案。在模型被赋予任务但没有解决该任务的先例时，这种基本技术被称为“零样本提示”。这种技术是为**单步代理**设计的，这些代理执行任务而不进行中间推理，尤其是在早期模型中。
- en: '![](../Images/601bcbcab70d8b6c0ae81bf3480c7b8e.png)'
  id: totrans-9
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/601bcbcab70d8b6c0ae81bf3480c7b8e.png)'
- en: '[PRE1]'
  id: totrans-10
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '![](../Images/eff8afb161a71ad27e389d9a718064b7.png)'
  id: totrans-11
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/eff8afb161a71ad27e389d9a718064b7.png)'
- en: 2) [**ReAct (Reason+Act)**](https://arxiv.org/abs/2210.03629) – a combination
    of reasoning and action. The model not only thinks through a problem but also
    takes action based on its reasoning. So, it’s more interactive as the model alternates
    between reasoning steps and actions, refining its approach iteratively. Basically,
    it’s a loop of thought-action-observation. Used for **more complicated tasks**,
    like searching the web and making decisions based on the findings, and typically
    designed for **Multi-Step Agents** that perform a series of reasoning steps and
    actions to arrive at a final result. They can break down complex tasks into smaller,
    more manageable parts that progressively build upon one another.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 2) [**ReAct (Reason+Act)**](https://arxiv.org/abs/2210.03629) – 推理和行动的结合。模型不仅思考问题，而且根据其推理采取行动。因此，它更具互动性，因为模型在推理步骤和行动之间交替，迭代地改进其方法。基本上，它是一个思想-行动-观察的循环。用于**更复杂的任务**，如搜索网络和基于发现做出决策，通常设计用于**多步代理**，这些代理执行一系列推理步骤和行动以得出最终结果。它们可以将复杂任务分解成更小、更易于管理的部分，并逐步构建。
- en: Personally, I really like ReAct Agents as I find them more similar to humans
    because they “f*ck around and find out” just like us.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 个人而言，我真的很喜欢ReAct代理，因为我觉得它们更类似于人类，因为它们“乱搞一气，找出答案”就像我们一样。
- en: '![](../Images/65f9c9898670d07a999a73292edbfba3.png)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/65f9c9898670d07a999a73292edbfba3.png)'
- en: '[PRE2]'
  id: totrans-15
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '![](../Images/92d6e028124b3407f043e58f0d1b8951.png)'
  id: totrans-16
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/92d6e028124b3407f043e58f0d1b8951.png)'
- en: 3) [**Chain-of-Thought (CoT)**](https://arxiv.org/abs/2201.11903) – a reasoning
    pattern that involves generating the process to reach a conclusion. The model
    is pushed to “think out loud” by explicitly laying out the logical steps that
    lead to the final answer. Basically, it’s a plan without feedback. CoT is the
    most used for **advanced tasks**, like solving a math problem that might need
    step-by-step reasoning, and typically designed for **Multi-Step Agents**.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 3) [**思维链（CoT）](https://arxiv.org/abs/2201.11903)** – 一种涉及生成达到结论过程的推理模式。模型通过明确列出导致最终答案的逻辑步骤来“大声思考”。基本上，它是一个没有反馈的计划。CoT最常用于**高级任务**，如解决可能需要逐步推理的数学问题，并且通常设计用于**多步智能体**。
- en: '![](../Images/7ade9808718294ab35189ffe8e5744b6.png)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/7ade9808718294ab35189ffe8e5744b6.png)'
- en: '[PRE3]'
  id: totrans-19
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '![](../Images/6229d1992f71b244179e64e46d41da18.png)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/6229d1992f71b244179e64e46d41da18.png)'
- en: CoT extensions
  id: totrans-21
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: CoT扩展
- en: From the Chain-of-Technique derived several other new prompting approaches.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 从思维链衍生出几种其他新的提示方法。
- en: 4) **[Reflexion prompting](https://arxiv.org/abs/2303.11366)** that adds an
    iterative self-check or self-correction phase on top of the initial CoT reasoning,
    where the model reviews and critiques its own outputs (spotting mistakes, identifying
    gaps, suggesting improvements).
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 4) **[反思提示](https://arxiv.org/abs/2303.11366)**，在初始CoT推理之上添加一个迭代自我检查或自我纠正阶段，其中模型审查和批评自己的输出（发现错误、识别差距、提出改进）。
- en: '[PRE4]'
  id: totrans-24
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: '![](../Images/af7975162a62b7ba14f9c3270d4f81a1.png)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/af7975162a62b7ba14f9c3270d4f81a1.png)'
- en: 5) **[Tree-of-Thoughts (ToT)](https://arxiv.org/abs/2305.10601)** that generalizes
    CoT into a tree, exploring multiple reasoning chains simultaneously.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: '5) **[思维树（ToT）](https://arxiv.org/abs/2305.10601)** 将CoT推广到树的形式，同时探索多个推理链。 '
- en: '[PRE5]'
  id: totrans-27
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: '![](../Images/0b15f621b0bb878a89b7514f3a4534d2.png)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/0b15f621b0bb878a89b7514f3a4534d2.png)'
- en: 6) [Graph‑of‑Thoughts (GoT)](https://arxiv.org/abs/2308.09687) that generalizes
    CoT into a graph, considering also interconnected branches.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 6) [思维图（GoT）](https://arxiv.org/abs/2308.09687) 将CoT推广到图的形式，同时考虑相互连接的分支。
- en: '[PRE6]'
  id: totrans-30
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: '![](../Images/612badf8cca536d8a4c7061ac837021b.png)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/612badf8cca536d8a4c7061ac837021b.png)'
- en: 7) **[Program‑of‑Thoughts (PoT)](https://arxiv.org/abs/2211.12588)** that specializes
    in programming, where the reasoning happens via executable code snippets.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 7) **[思维程序（PoT）](https://arxiv.org/abs/2211.12588)**，专注于编程，其中的推理通过可执行代码片段进行。
- en: '[PRE7]python(.*?)[PRE8]python ... [PRE9]'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: '[PRE7]python(.*?)[PRE8]python ... [PRE9]'
- en: '![](../Images/f37f6438004477615f8ac6a50603e2bf.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/f37f6438004477615f8ac6a50603e2bf.png)'
- en: Conclusion
  id: totrans-35
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: This article has been a tutorial to **recap all the major prompting techniques
    for AI Agents**. There’s no single “best” prompting technique as it depends heavily
    on the task and the complexity of the reasoning needed.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 本文已作为教程**回顾了AI智能体所有主要的提示技术**。没有单一的“最佳”提示技术，因为它在很大程度上取决于任务和所需推理的复杂性。
- en: For example, simple tasks, like **summarization and translation**, are easiy
    performed with a Zero-Shot/Regular prompting, while CoT works well for **math
    and logic** tasks. On the other hand, **Agents with Tools** are typically created
    with ReAct mode. Moreover, Reflexion is most appropriate when learning from mistakes
    or iterations improves results, like **gaming**.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，简单的任务，如**摘要和翻译**，可以通过Zero-Shot/Regular提示轻松完成，而CoT对于**数学和逻辑**任务效果良好。另一方面，**带有工具的智能体**通常使用ReAct模式创建。此外，反思在从错误或迭代改进结果时最为合适，如**游戏**。
- en: In terms of **versatility** for complex tasks,PoT is the real winner because
    it is solely based on code generation and execution. In fact, PoT Agents are getting
    closer to **replace humans** in several office taks.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 在复杂任务的**通用性**方面，PoT是真正的赢家，因为它完全基于代码生成和执行。实际上，PoT智能体在多个办公任务中正逐渐接近**取代人类**。
- en: I believe that, in the near future, prompting won’t just be about “what you
    say to the model”, but about orchestrating an interactive loop between human intent,
    machine reasoning, and external action.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: '我相信，在不久的将来，提示不仅将关于“你对模型说了什么”，还将关于协调人类意图、机器推理和外部行动之间的交互式循环。 '
