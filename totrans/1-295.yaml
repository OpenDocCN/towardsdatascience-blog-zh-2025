- en: Generalists Can Also Dig Deep
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/generalists-can-also-dig-deep/](https://towardsdatascience.com/generalists-can-also-dig-deep/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*In the Author Spotlight series, TDS Editors chat with members of our community
    about their career path in data science and AI, their writing, and their sources
    of inspiration. Today, we’re thrilled to share our conversation with* [*Ida Silfverskiöld*](http://towardsdatascience.com/author/ilsilfverskiold)*.*'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: '*Ida is a generalist, educated as an economist and self-taught in software
    engineering. She has a professional background in product and marketing management,
    which means she has a rare blend of product, marketing and development skills.
    Over the past few years, she’s been teaching and building in the LLM, NLP, and
    computer vision space, digging into areas such as agentic AI, chain‑of‑thought
    strategies, and the economics of hosting models.*'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: '**You studied economics, then learned to code and moved through product, growth,
    and now hands-on AI building. What perspective does that generalist path give
    you that specialists sometimes miss?**'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: I’m not sure.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: People see generalists as having shallow knowledge, but generalists can also
    dig deep.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: I see generalists as people with multiple interests and a drive to understand
    the whole, not just one part. As a generalist you look at the tech, the customer,
    the data, the market, the cost of the architecture, and so on. It gives you an
    edge to move across topics and still do good work.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: I’m not saying specialists can’t do this, but generalists tend to adapt faster
    because they’re used to picking things up quickly.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
- en: '**You’ve been writing a lot about agentic systems lately. When do “agents”
    actually outperform simpler LLM + RAG patterns, and when are we overcomplicating
    things?**'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: It depends on the use case, but in general we throw AI into a lot of things
    that probably don’t need it. If you can control the system programmatically, you
    should. LLMs are great for translating human language into something a computer
    can understand, but they also introduce unpredictability.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: As for RAG, adding an agent means adding costs, so doing it just for the sake
    of having an agent isn’t a great idea. You can work around it by using smaller
    models as routers (but this adds work). I’ve added an agent to a RAG system once
    because I knew there would be questions about building it out to also “act.” So
    again, it depends on the use case.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
- en: '**When you say Agentic AI needs “**[**evaluations**](https://towardsdatascience.com/agentic-ai-evaluation-playbook/)**”
    what’s your list of go-to metrics? And how do you decide which one to use?**'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: I wouldn’t say you always need evals, but companies will ask for them, so it’s
    good to know what teams measure for product quality. If a product will be used
    by a lot of people, make sure you have some in place. I did quite a lot of research
    here to understand the frameworks and metrics that have been defined.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: Generic metrics are probably not enough though. You need a few custom ones for
    your use case. So the evals differ by application.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: For a coding copilot, you could track what percent of completions a developer
    accepts (acceptance rate) and whether the full chat reached the goal (completeness).
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: For commerce agents, you might  measure whether the agent picked the right products
    and whether answers are grounded in the store’s data.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
- en: Security and safety related metrics are important too, such as bias, toxicity,
    and how easy it is to break the system (jailbreaks, data leaks).
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: For RAG, see my article where I break down the usual metrics. Personally, I
    have only set up metrics for RAG so far.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: It could be interesting to map how different AI apps set up evals in an article.
    For example, Shopify Sidekick for commerce agents and other tools such as legal
    research assistants.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: '**In your** [**Agentic RAG Applications**](https://towardsdatascience.com/agentic-rag-applications-company-knowledge-slack-agents/)
    **article, you built a Slack agent that takes company knowledge into account (with
    LlamaIndex and Modal). What design choice ended up mattering more than expected?**'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: The retrieval part is where you’ll get stuck, specifically chunking. When you
    work with RAG applications, you split the process into two. The first part is
    about fetching the correct information, and getting it right is important because
    you can’t overload an agent with too much irrelevant information. To make it precise
    the chunks need to be quite small and relevant to the search query.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: However, if you make the chunks too small, you risk giving the LLM too little
    context. With chunks that are too large, the search system may become imprecise.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: I set up a system that chunked based on the type of document, but right now
    I have an idea for using context expansion after retrieval.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
- en: Another design choice you need to keep in mind is that although retrieval often
    benefits from hybrid search, it may not be enough. Semantic search can connect
    things that answer the question without using the exact wording, whereas sparse
    methods can identify exact keywords. But sparse methods like BM25 are token-based
    by default, so plain BM25 won’t match substrings.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
- en: So, if you also want to search for substrings (part of product IDs, that kind
    of thing), you need to add a search layer that supports partial matches as well.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
- en: There is more, but I risk this becoming an entire article if I keep going.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
- en: '**Across your consulting projects over the past two years, what problems have
    come up most often for your clients, and how do you address them? **'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
- en: The issues I see are that most companies are looking for something custom, which
    is great for consultants, but building in-house is riddled with complexities,
    especially for people who haven’t done it before. I saw that 95% number from the
    [MIT study](https://mlq.ai/media/quarterly_decks/v0.1_State_of_AI_in_Business_2025_Report.pdf)
    about projects failing, and I’m not surprised. I think consultants should get
    good at certain use cases where they can quickly implement and tweak the product
    for clients, having already learnt how to do it. But we’ll see what happens.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 我看到的问题在于，大多数公司都在寻找定制化的解决方案，这对顾问来说很好，但内部构建充满了复杂性，尤其是对于那些以前没有做过的人来说。我从[麻省理工学院的研究](https://mlq.ai/media/quarterly_decks/v0.1_State_of_AI_in_Business_2025_Report.pdf)中看到了95%的项目失败率，这并不让我感到惊讶。我认为顾问应该擅长某些用例，在这些用例中，他们可以快速为客户实施和调整产品，因为他们已经学会了如何这样做。但我们将拭目以待。
- en: '**You’ve written on TDS about so many different topics. Where do your article
    ideas come from? Client work, tools you want to try, or your own experiments?
    And what topic or problem is top of mind for you right now?**'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: '**你在TDS上写了关于许多不同主题的文章。你的文章想法从何而来？客户工作、你想尝试的工具，还是你自己的实验？目前你最关心的话题或问题是什么？**'
- en: A bit of everything, frankly. The articles also help me ground my own knowledge,
    filling in missing pieces I may not have researched myself yet. Right now I’m
    researching a bit on how smaller models (mid-sized, around 3B–7B) can be used
    in agent systems, security, and specifically how to improve RAG.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 实际上，是各种各样的事情。这些文章也帮助我巩固了自己的知识，填补了我可能还没有自己研究过的空白。现在，我正在研究如何在小型模型（中等规模，大约3B-7B）中应用代理系统、安全和特别是如何改进RAG。
- en: '**Zooming out: what’s one non-obvious capability teams should cultivate in
    the next 12–18 months (technical or cultural) to become genuinely AI-productive
    rather than just AI-busy?**'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: '**缩小视角：在接下来的12-18个月内，团队应该培养哪些非显而易见的技能（技术或文化），以真正实现AI生产力，而不是仅仅成为AI忙碌的人？**'
- en: 'Probably learn to build in the space (especially for business people): just
    getting an LLM to do something consistently is a way to understand how unpredictable
    LLMs are. It makes you a bit more humble.'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 可能学会在这个领域（尤其是对商业人士来说）构建：仅仅让一个大型语言模型持续做某事，就是了解LLMs不可预测性的方式。这让你变得稍微谦虚一些。
- en: To learn more about Ida‘s work and stay up-to-date with her latest articles,
    you can follow her on [TDS](http://towardsdatascience.com/author/ilsilfverskiold)
    or [LinkedIn](https://www.linkedin.com/in/ida-silfverskiold/).
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 要了解更多关于伊达的工作并关注她最新的文章，您可以在[TDS](http://towardsdatascience.com/author/ilsilfverskiold)或[LinkedIn](https://www.linkedin.com/in/ida-silfverskiold/)上关注她。
