- en: The Crucial Role of NUMA Awareness in High-Performance Deep Learning
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 高性能深度学习中 NUMA 意识的关键作用
- en: 原文：[https://towardsdatascience.com/the-crucial-role-of-numa-awareness-in-high-performance-deep-learning/](https://towardsdatascience.com/the-crucial-role-of-numa-awareness-in-high-performance-deep-learning/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/the-crucial-role-of-numa-awareness-in-high-performance-deep-learning/](https://towardsdatascience.com/the-crucial-role-of-numa-awareness-in-high-performance-deep-learning/)
- en: <mdspan datatext="el1752124468783" class="mdspan-comment">In the intricate</mdspan>
    world of deep learning training, the role of the ML developer can be likened to
    that of the conductor of an orchestra. Just as a conductor must time the entry
    of each instrument to produce the perfect harmony, so must the ML practitioner
    orchestrate a multitude of hardware components — CPUs and GPUs with their associated
    memory, high-speed storage, network controllers, various communication buses,
    etc. — to work together seamlessly to maximize runtime performance. Just as a
    single off-key note can disrupt an entire musical production, a bottleneck or
    inefficiency in any one of these components can severely hamper the overall training
    process.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1752124468783" class="mdspan-comment">在深度学习训练错综复杂的领域中，ML
    开发者的角色可以比作一个乐队的指挥。正如指挥必须准确把握每个乐器的进入时机以产生完美的和声一样，ML 实践者必须协调众多硬件组件——包括与其相关的内存、高速存储、网络控制器、各种通信总线等——以无缝协作，最大化运行时性能。正如一个走调的音符可以破坏整个音乐表演一样，任何一个组件的瓶颈或不效率都可能严重阻碍整体训练过程。
- en: In this complex landscape, it’s of critical importance that you have an intimate
    understanding of your system’s underlying topology and that you know how to apply
    it toward optimal runtime performance. In a [previous post](https://towardsdatascience.com/smart-distributed-training-on-amazon-sagemaker-with-smd-part-2-c833e7139b5f/),
    we explored the critical role of topology awareness in a distributed training
    setting and discussed the advantage of topology-aware gradient sharing algorithms
    in minimizing cross-node communication and boosting performance.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个复杂的领域中，了解你系统底层的拓扑结构并且知道如何将其应用于最优运行时性能至关重要。在[之前的帖子](https://towardsdatascience.com/smart-distributed-training-on-amazon-sagemaker-with-smd-part-2-c833e7139b5f/)中，我们探讨了拓扑意识在分布式训练环境中的关键作用，并讨论了拓扑感知梯度共享算法在最小化跨节点通信和提升性能方面的优势。
- en: In this post, the tenth in our series on PyTorch model analysis and optimization,
    we zoom in on the collaboration between the CPU and GPU in training and running
    AI/ML models. In a typical training pipeline, the CPU is responsible for preparing
    and pre-processing data, for loading GPU kernels, and for processing output, while
    the GPU is responsible for the model execution. This cooperation isn’t merely
    a hand-off — it’s a constant, high-speed exchange of data and commands, in what
    can be likened to an intricate dance — where precision timing and physical proximity
    are crucial. For this dance to be performed optimally, it must be choreographed
    in a manner that accounts for the underlying system topology. In particular, it
    must take into account the system’s [Non-Uniform Memory Access (NUMA)](https://en.wikipedia.org/wiki/Non-uniform_memory_access) architecture.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在本篇帖子中，这是我们关于 PyTorch 模型分析和优化的系列文章中的第十篇，我们聚焦于训练和运行 AI/ML 模型时 CPU 和 GPU 之间的协作。在一个典型的训练流程中，CPU
    负责准备和预处理数据，加载 GPU 内核，以及处理输出，而 GPU 负责模型执行。这种合作不仅仅是交接——它是一种持续的高速数据与命令交换，可以比作一场复杂的舞蹈——其中精确的时间和物理接近性至关重要。为了使这场舞蹈能够最优地表演，它必须以考虑到底层系统拓扑的方式编排。特别是，它必须考虑到系统的[非一致性内存访问
    (NUMA)](https://en.wikipedia.org/wiki/Non-uniform_memory_access) 架构。
- en: NUMA Architecture
  id: totrans-5
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: NUMA 架构
- en: The NUMA architecture is designed to optimize memory transactions by associating
    local memory banks directly with specific CPU sockets. Most modern multi-GPU High-Performance
    Computing (HPC) systems consist of two or more NUMA nodes, where CPUs and GPUs
    are divided into disjoint groups, each attached to one node. NUMA is most efficient
    when memory banks are accessed from within the same node. Accessing memory on
    a remote node requires data traversal over a dedicated NUMA interconnect, which
    is significantly slower than accessing local memory. In memory-intensive applications
    like AI/ML workloads, cross-NUMA memory accesses can introduce performance bottlenecks.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: NUMA 架构旨在通过将本地内存银行直接与特定的 CPU 插槽关联来优化内存事务。大多数现代的多 GPU 高性能计算（HPC）系统由两个或更多 NUMA
    节点组成，其中 CPU 和 GPU 被分为不相交的组，每个组连接到一个节点。当内存银行在同一节点内访问时，NUMA 最有效。在远程节点上访问内存需要通过专用的
    NUMA 互连进行数据传输，这比访问本地内存慢得多。在内存密集型应用程序，如 AI/ML 工作负载中，跨 NUMA 内存访问可能会引入性能瓶颈。
- en: Unfortunately, popular AI/ML frameworks — most notably PyTorch — do not account
    for NUMA architecture by default. However, as we will demonstrate in this post,
    you can introduce NUMA-awareness into your PyTorch script without much difficulty.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 不幸的是，流行的 AI/ML 框架——最著名的是 PyTorch——默认情况下并没有考虑 NUMA 架构。然而，正如我们将在本文中展示的那样，你可以在
    PyTorch 脚本中轻松地引入 NUMA 意识。
- en: In the next section, we will explore the NUMA architecture of the popular [Amazon
    EC2 p4d.96xlarge](https://aws.amazon.com/ec2/instance-types/p4/) instance (containing
    8 NVIDIA A100 GPUs and 96 vCPUs) running a [PyTorch (2.6) Deep Learning AMI](https://aws.amazon.com/releasenotes/aws-deep-learning-ami-gpu-pytorch-2-6-ubuntu-22-04/) (DLAMI).
    We will then demonstrate how to implement a NUMA-aware PyTorch script and evaluate
    its impact on runtime performance.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一节中，我们将探索流行的 [Amazon EC2 p4d.96xlarge](https://aws.amazon.com/ec2/instance-types/p4/)
    实例（包含 8 个 NVIDIA A100 GPU 和 96 个 vCPU）的 NUMA 架构（运行 [PyTorch (2.6) 深度学习 AMI](https://aws.amazon.com/releasenotes/aws-deep-learning-ami-gpu-pytorch-2-6-ubuntu-22-04/)（DLAMI））。然后，我们将展示如何实现一个
    NUMA 意识的 PyTorch 脚本并评估其对运行时性能的影响。
- en: Disclaimers
  id: totrans-9
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 免责声明
- en: 'The NUMA architecture is a complex and nuanced topic. In this post, we explore
    just one of its implications: its impact on deep learning. For more comprehensive
    details on the topic, please refer to other authoritative resources.'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: NUMA 架构是一个复杂且微妙的话题。在本博文中，我们探讨其影响的一个方面：其对深度学习的影响。有关该主题的更全面细节，请参考其他权威资源。
- en: The code we will share is intended for demonstrative purposes and should not
    be relied on for correctness or optimality. Please do not interpret our choice
    of platform, framework, or any other tool or library as an endorsement for its
    use.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将分享的代码旨在演示目的，不应依赖于其正确性或最优性。请勿将我们对平台、框架或任何其他工具或库的选择解释为对其使用的认可。
- en: NUMA Architecture Discovery
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: NUMA 架构发现
- en: There are multiple ways to detect the NUMA architecture of the system you are
    running on. In this section, we will demonstrate how to explore the NUMA layout
    of an [Amazon EC2 p4d.96xlarge](https://aws.amazon.com/ec2/instance-types/p4/) instance
    using commonly available Linux command-line tools.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 有多种方法可以检测你正在运行的系统的 NUMA 架构。在本节中，我们将演示如何使用常用的 Linux 命令行工具来探索 [Amazon EC2 p4d.96xlarge](https://aws.amazon.com/ec2/instance-types/p4/)
    实例的 NUMA 布局。
- en: CPU NUMA Node Discovery
  id: totrans-14
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: CPU NUMA 节点发现
- en: 'The [*lscpu*](https://man7.org/linux/man-pages/man1/lscpu.1.html)command provides
    information about the CPU architecture of a Linux system, including a section
    describing the NUMA layout. By running the command on an [Amazon EC2 p4d.96xlarge](https://aws.amazon.com/ec2/instance-types/p4/) instance
    we learn that it consists of 96 vCPUs divided between two NUMA nodes:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: '`[*lscpu*](https://man7.org/linux/man-pages/man1/lscpu.1.html)` 命令提供了有关 Linux
    系统的 CPU 架构信息，包括一个描述 NUMA 布局的章节。通过在 [Amazon EC2 p4d.96xlarge](https://aws.amazon.com/ec2/instance-types/p4/)
    实例上运行该命令，我们了解到它由 96 个 vCPU 分为两个 NUMA 节点：'
- en: '[PRE0]'
  id: totrans-16
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: GPU NUMA Node Discovery
  id: totrans-17
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: GPU NUMA 节点发现
- en: 'To determine which NUMA node each GPU is attached to, we use a two-step process:
    First, we identify the PCI ID associated with each GPU, and then we look up the
    NUMA node associated with that PCI ID.'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 为了确定每个 GPU 所连接的 NUMA 节点，我们使用两步过程：首先，我们识别与每个 GPU 相关的 PCI ID，然后查找与该 PCI ID 相关的
    NUMA 节点。
- en: 'The PCI ID is one of the properties of the GPUs reported by the [*nvidia-smi*](https://docs.nvidia.com/deploy/nvidia-smi/index.html) utility.
    In the following snippet, we see the PCI Bus IDs of the first two out of the eight
    GPUs on our Amazon EC2 p4d.96xlarge instance:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: PCI ID是[*nvidia-smi*](https://docs.nvidia.com/deploy/nvidia-smi/index.html)实用程序报告的GPU属性之一。在以下片段中，我们看到我们的Amazon
    EC2 p4d.96xlarge实例上八个GPU中的前两个的PCI总线ID：
- en: '[PRE1]'
  id: totrans-20
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'Next, we use these PCI IDs to determine the corresponding NUMA node by reading
    from the `/sys/bus/pci/devices/` path:'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们使用这些PCI IDs通过从`/sys/bus/pci/devices/`路径读取来确定相应的NUMA节点：
- en: '[PRE2]'
  id: totrans-22
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: This indicates that GPUs 0 and 1 are connected to NUMA node 0.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 这表明GPU 0和1连接到NUMA节点0。
- en: Additional Tools
  id: totrans-24
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 其他工具
- en: 'An alternative method for finding the NUMA node assignment of the PCI IDs is
    using [*lstopo*](https://linux.die.net/man/1/lstopo)— a command-line utility that
    reports the topology of a computer system. Though it isn’t included by default
    in the DLAMI, it can be easily installed by running:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 使用[*lstopo*](https://linux.die.net/man/1/lstopo)——一个报告计算机系统拓扑的命令行工具——是查找PCI
    IDs的NUMA节点分配的另一种方法。尽管它默认不包括在DLAMI中，但可以通过运行以下命令轻松安装：
- en: '[PRE3]'
  id: totrans-26
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Here is a small segment of its command-line output which reports four PCI IDs
    on NUMA node 0\. These are marked with “(3D)” tags—common identifiers of 3D accelerators,
    otherwise known as GPUs.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是它命令行输出的一个片段，报告了NUMA节点0上的四个PCI IDs。这些用“(3D)”标签标记——这是3D加速器的常见标识符，也称为GPU。
- en: '[PRE4]'
  id: totrans-28
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'Another useful tool is [*numactl *](https://man7.org/linux/man-pages/man3/numa.3.html)—
    a command-line utility in Linux inspecting and managing NUMA policies. To install *numactl*,
    run:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个有用的工具是[*numactl*](https://man7.org/linux/man-pages/man3/numa.3.html)——一个Linux中的命令行实用程序，用于检查和管理NUMA策略。要安装*numactl*，请运行：
- en: '[PRE5]'
  id: totrans-30
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'You can inspect the NUMA configuration by running:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以通过运行以下命令来检查NUMA配置：
- en: '[PRE6]'
  id: totrans-32
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'On our Amazon EC2 p4d.96xlarge instance this produces the following output:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的Amazon EC2 p4d.96xlarge实例上，这会产生以下输出：
- en: '[PRE7]'
  id: totrans-34
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: This provides useful information such as memory sizes and CPU assignments per
    NUMA node, as well as inter-node memory access costs (higher numbers = greater
    latency).
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 这提供了有用的信息，例如每个NUMA节点的内存大小和CPU分配，以及节点间内存访问成本（数字越大=延迟越大）。
- en: NUMA Topology Summary
  id: totrans-36
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: NUMA拓扑摘要
- en: 'To summarize the topology we’ve discovered, here is a Python representation
    of the CPU and GPU layout:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 为了总结我们发现的拓扑，以下是CPU和GPU布局的Python表示：
- en: '[PRE8]'
  id: totrans-38
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: We will use this later to implement NUMA-aware training.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用这个工具来实现对NUMA感知的训练。
- en: The Impact of NUMA Placement on Data Loading
  id: totrans-40
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: NUMA放置对数据加载的影响
- en: Memory transactions between CPU and GPU occur at various stages during model
    execution — for example, when offloading tensors to CPU memory, or when executing
    certain model components (e.g., sequential algorithms such as non-maximum suppression)
    on the CPU. In this post, we’ll focus on the transfer of input data from the CPU
    to the GPU — a critical part of every AI/ML workflow.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 在模型执行期间，CPU和GPU之间的内存事务发生在各种阶段——例如，在将张量卸载到CPU内存时，或者在CPU上执行某些模型组件（例如，非最大值抑制等顺序算法）时。在这篇文章中，我们将关注从CPU到GPU的数据输入传输——这是每个AI/ML工作流程的关键部分。
- en: The CPU Processes in a Typical Distributed Training Job
  id: totrans-42
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在典型的分布式训练作业中的CPU进程
- en: 'In a typical distributed training setting, new CPU processes are created on
    two occasions:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 在典型的分布式训练设置中，在两种情况下会创建新的CPU进程：
- en: '**At startup**: A separate training process is created for each GPU. These
    processes handle model setup and training execution on their assigned GPUs. In
    the script we’ll introduce later, these are launched via [torch.multiprocessing.spawn](https://docs.pytorch.org/docs/stable/multiprocessing.html#spawning-subprocesses).'
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**启动时**：为每个GPU创建一个单独的训练进程。这些进程处理其分配的GPU上的模型设置和训练执行。在稍后我们将介绍的脚本中，这些进程通过[torch.multiprocessing.spawn](https://docs.pytorch.org/docs/stable/multiprocessing.html#spawning-subprocesses)启动。'
- en: '**Per dataloader**: Each training process creates its own [DataLoader](https://docs.pytorch.org/tutorials/beginner/basics/data_tutorial.html) instance
    to provide data batches for its GPU. Each dataloader typically creates multiple
    worker processes, which generate individual training samples. These samples are
    then grouped by the main process into batches.'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**每个数据加载器**：每个训练进程为其GPU创建自己的[DataLoader](https://docs.pytorch.org/tutorials/beginner/basics/data_tutorial.html)实例，以提供数据批次。每个数据加载器通常创建多个工作进程，这些进程生成单个训练样本。然后，这些样本由主进程分组到批次中。'
- en: In the case of our Amazon EC2 p4d.96xlarge instance, each of these processes
    is assigned to a CPU, which resides on one of the two NUMA nodes.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的Amazon EC2 p4d.96xlarge实例的情况下，这些进程中的每一个都被分配到一个CPU，该CPU位于两个NUMA节点之一。
- en: Why NUMA Placement Matters
  id: totrans-47
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 为什么NUMA放置很重要
- en: Ideally, the main training process for a given GPU — and all of its associated
    dataloader worker processes — will be located on the same NUMA node as the GPU.
    Otherwise, we may end up seeing a considerable amount of traffic on the NUMA interconnects,
    which could result in performance bottlenecks.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 理想情况下，给定GPU的主要训练过程——以及所有相关的数据加载器工作进程——都将位于与GPU相同的NUMA节点上。否则，我们可能会在NUMA互连上看到相当多的流量，这可能导致性能瓶颈。
- en: 'Let’s imagine a particularly bad setup:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们想象一个特别糟糕的设置：
- en: GPU *i* is located on NUMA node 0.
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: GPU *i* 位于NUMA节点0。
- en: The main training process assigned to GPU *i* is scheduled on a CPU on NUMA
    node 1.
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分配给GPU *i* 的主要训练过程在NUMA节点1上的CPU上调度。
- en: The worker processes spawned by the training process are all assigned to CPUs
    on NUMA node 0.
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 由训练过程产生的所有工作进程都被分配到NUMA节点0上的CPU。
- en: 'This results in the following inefficient sequence:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 这导致以下低效的序列：
- en: Individual samples are created and grouped into batches by workers on NUMA node
    0.
  id: totrans-54
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 单个样本由NUMA节点0上的工作进程创建并分组到批次中。
- en: Each batch is transmitted through the interconnect to the main process on node
    1.
  id: totrans-55
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 每个批次都通过互连传输到节点1上的主进程。
- en: The batch is sent back across the interconnect to node 0, where it is fed to
    the GPU.
  id: totrans-56
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 批次被发送回互连到节点0，在那里它被喂给GPU。
- en: Sounds horrendous, right??
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 听起来很糟糕，对吧？？？
- en: While this exact scenario may be rare, it illustrates how the default Linux
    scheduler — if left unmanaged — can result in inefficient placement and redundant
    traffic over the NUMA interconnect. And with the high cost of GPU training, relying
    on the “luck of the scheduler” is not recommended.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然这种确切场景可能很少见，但它说明了默认的Linux调度器——如果未进行管理——可能导致NUMA互连上的低效放置和冗余流量。鉴于GPU训练的高成本，依赖“调度器的运气”是不推荐的。
- en: When NUMA Placement Matters Most
  id: totrans-59
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 当NUMA放置最为重要时
- en: The performance impact of poor NUMA placement depends heavily on the workload
    characteristics. Specifically, training steps that consist of a large number of
    large data transactions will suffer more than training steps with few transactions
    and small data sizes.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 糟糕的NUMA放置的性能影响在很大程度上取决于工作负载的特性。具体来说，由大量大型数据交易组成的训练步骤将比交易少且数据量小的训练步骤遭受更多的影响。
- en: When it comes to dataloading, the impact of inefficient NUMA Placement will
    also depend on the size of the model. Recall that AI/ML workloads are designed
    to run the dataloading on the CPU in parallel with model execution on the GPU.
    Thus, if the GPU execution takes significantly longer than the dataloading, inefficient
    NUMA placement might go unnoticed. But if dataloading time is similar to or longer
    than GPU execution time — or if you’re already experiencing GPU starvation — the
    impact can be significant.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 当涉及到数据加载时，低效的NUMA放置的影响也将取决于模型的大小。回想一下，AI/ML工作负载旨在在CPU上并行运行数据加载，同时GPU上执行模型。因此，如果GPU执行时间明显长于数据加载时间，低效的NUMA放置可能不会被注意到。但如果数据加载时间与GPU执行时间相似或更长——或者如果你已经经历了GPU饥饿——影响可能是显著的。
- en: Benchmark Impact of NUMA Pinning
  id: totrans-62
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: NUMA Pinning的基准影响
- en: Because the effect of NUMA-aware pinning can vary widely, it’s essential to
    benchmark its impact on a per-workload basis.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 由于NUMA感知的固定效果可能差异很大，因此根据每个工作负载基准其影响是至关重要的。
- en: In some situations, NUMA pinning could even hurt performance. For instance,
    in systems where CPUs on one NUMA node are designated for other tasks, or systems
    where one NUMA node contains CPUs bit no GPUs, NUMA pinning could limit access
    to CPU power, ultimately straining throughput performance.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 在某些情况下，NUMA固定甚至可能损害性能。例如，在指定CPU用于其他任务的NUMA节点上，或者在一个NUMA节点包含CPU但没有GPU的系统上，NUMA固定可能会限制对CPU功率的访问，最终影响吞吐量性能。
- en: A Toy PyTorch Experiment
  id: totrans-65
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 一个PyTorch实验玩具
- en: To demonstrate the impact of NUMA awareness on runtime performance, we design
    a toy distributed training experiment. Our baseline implementation simply reports
    the NUMA assignment of each spawned process. We then apply NUMA-based CPU and
    memory affinity and measure the impact on throughput.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 为了展示NUMA意识对运行时性能的影响，我们设计了一个玩具分布式训练实验。我们的基线实现简单地报告每个生成的进程的NUMA分配。然后我们应用基于NUMA的CPU和内存亲和性，并测量对吞吐量的影响。
- en: NUMA Discovery and Pinning Utilities
  id: totrans-67
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: NUMA发现和固定实用工具
- en: We begin by defining utility functions for NUMA node discovery and pinning.
    The implementation shown here uses the hardcoded NUMA topology we summarized earlier.
    A more robust version would dynamically discover topology by parsing the output
    of system utilities such as *lscpu *and *nvidia-smi*.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 我们首先定义了用于 NUMA 节点发现和固定的效用函数。这里展示的实现使用了我们之前总结的硬编码的 NUMA 拓扑。一个更健壮的版本会通过解析系统实用程序（如
    *lscpu* 和 *nvidia-smi*）的输出动态发现拓扑。
- en: The following code block contains utilities for looking up NUMA placement. For
    each process we report both the NUMA node of the host CPU and the NUMA node of
    its allocated memory it is bound to. We use `numactl --show` to detect the memory
    binding of the current process.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 以下代码块包含用于查找 NUMA 放置的实用程序。对于每个进程，我们报告其宿主 CPU 的 NUMA 节点和其分配的内存所绑定的 NUMA 节点。我们使用
    `numactl --show` 来检测当前进程的内存绑定。
- en: '[PRE9]'
  id: totrans-70
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: One common method for setting CPU affinity in Python is via the [os.sched_setaffinity](https://docs.python.org/3/library/os.html#os.sched_setaffinity) function.
    However, this method is insufficient for our purposes because it only pins the
    CPU — it does not bind the memory it uses. To bind both CPU and memory binding
    we use the [numa_bind](https://linux.die.net/man/3/numa_bind) function from the *libnuma* library.
    (Run `sudo apt install libnuma-dev` to install).
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Python 中设置 CPU 亲和性的一个常见方法是使用 [os.sched_setaffinity](https://docs.python.org/3/library/os.html#os.sched_setaffinity)
    函数。然而，这种方法对我们来说是不够的，因为它只固定了 CPU — 它没有绑定它使用的内存。为了绑定 CPU 和内存绑定，我们使用来自 *libnuma*
    库的 [numa_bind](https://linux.die.net/man/3/numa_bind) 函数。（运行 `sudo apt install
    libnuma-dev` 来安装）。
- en: '[PRE10]'
  id: totrans-72
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: Model Definition
  id: totrans-73
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 模型定义
- en: Next, we define a simple distributed training script using a ResNet-18 image
    classification model and a synthetic dataset. Each synthetic sample is a randomly
    generated 1024×1024 image, simulating large memory transactions. On the GPU, images
    are downscaled to 224×224 before being passed to the model. This setup is intentionally
    designed to result in a bottleneck in the input data pipeline. The bottleneck
    can be detected by comparing throughput (in steps per second) during normal training
    versus when running on a cached batch. For more on identifying dataloader bottlenecks,
    see our earlier posts (e.g., [here](https://towardsdatascience.com/a-caching-strategy-for-identifying-bottlenecks-on-the-data-input-pipeline/) and [here](https://towardsdatascience.com/solving-bottlenecks-on-the-data-input-pipeline-with-pytorch-profiler-and-tensorboard-5dced134dbe9/#7fbd-af822198c08)).
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们定义了一个简单的分布式训练脚本，使用 ResNet-18 图像分类模型和合成数据集。每个合成样本是一个随机生成的 1024×1024 图像，模拟大内存事务。在
    GPU 上，图像在传递给模型之前被下采样到 224×224。这种设置故意设计成在输入数据管道中产生瓶颈。可以通过比较正常训练期间和运行缓存批次的吞吐量（以每秒步数计）来检测瓶颈。有关识别数据加载器瓶颈的更多信息，请参阅我们之前的帖子（例如，[这里](https://towardsdatascience.com/a-caching-strategy-for-identifying-bottlenecks-on-the-data-input-pipeline/)
    和 [这里](https://towardsdatascience.com/solving-bottlenecks-on-the-data-input-pipeline-with-pytorch-profiler-and-tensorboard-5dced134dbe9/#7fbd-af822198c08)）。
- en: Each time a new process is started, it reports its NUMA assignment using the
    utilities we defined above. For the dataloader workers this is done using a custom *worker_init_fn* function.
    We include a *numa_aware *control flag that determines whether to apply NUMA pinning.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 每次启动新的进程时，它都会使用我们定义的上述实用程序报告其 NUMA 分配。对于数据加载器工作器，这是通过自定义的 *worker_init_fn* 函数完成的。我们包括一个
    *numa_aware* 控制标志，以确定是否应用 NUMA 固定。
- en: It’s important to note that when applying NUMA-binding using *numa_bind* inside
    a process*, *the CPU-binding is not always inherited by subprocesses. It is therefore
    essential to reapply NUMA binding explicitly within the dataloader workers.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 需要注意的是，当在进程内部使用 *numa_bind* 应用 NUMA 绑定时，*CPU 绑定并不总是由子进程继承。因此，在数据加载器工作器中显式重新应用
    NUMA 绑定是至关重要的。
- en: '[PRE11]'
  id: totrans-77
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: Observing NUMA Placement
  id: totrans-78
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 观察 NUMA 放置
- en: 'Here is a sample output from running the script on a single GPU with four dataloader
    workers and no NUMA binding. In this run, all processes were scheduled on NUMA
    node 1, while the GPU resides on NUMA node 0:'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是运行脚本在单个 GPU 上且具有四个数据加载器工作器且没有 NUMA 绑定的示例输出。在这个运行中，所有进程都调度在 NUMA 节点 1 上，而
    GPU 位于 NUMA 节点 0。
- en: '[PRE12]'
  id: totrans-80
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: Baseline Results
  id: totrans-81
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 基线结果
- en: NUMA placement can vary between runs, so we repeated the baseline experiment
    ten times. The resultant average throughput was **1.04 **steps per second.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: NUMA 放置可能在不同的运行之间有所不同，因此我们重复进行了十次基线实验。结果平均吞吐量为 **1.04** 步每秒。
- en: NUMA-Aware Training
  id: totrans-83
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: NUMA 感知训练
- en: To enable NUMA-aware training, we set the *numa_aware *flag to *True*. This
    causes each training process to run on a CPU from the same NUMA node as its assigned
    GPU and allocate memory on that same NUMA node. This configuration ensures NUMA-locality
    across CPU, memory, and GPU, reducing the traffic over the NUMA interconnect.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 为了启用NUMA感知训练，我们将*numa_aware*标志设置为*True*。这导致每个训练进程在其分配的GPU相同的NUMA节点上的CPU上运行，并在该NUMA节点上分配内存。这种配置确保了CPU、内存和GPU之间的NUMA局部性，减少了NUMA互连上的流量。
- en: The average throughput in this setting increased to **1.24** steps per second
    — a **19%** improvement over the baseline experiment.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种设置下的平均吞吐量增加到每秒**1.24**步——比基线实验提高了**19%**。
- en: CPU Binding with numactl
  id: totrans-86
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 使用numactl进行CPU绑定
- en: An alternative approach to NUMA pinning is to launch each training process from
    the command-line via the *numactl *command. The advantage of this method is that
    the binding is applied before the process is started rather than on entry. This
    avoids the possibility of early memory allocations on the wrong node before pinning.
    Another advantage is that the NUMA placement is inherited by subprocesses, making
    it unnecessary to re-pin dataloader workers manually. Note, that the inheritance
    behavior may vary between systems, so you should confirm it on your specific setup
    before relying on it.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: NUMA固定的另一种方法是使用命令行通过*numactl*命令启动每个训练过程。这种方法的优势在于绑定是在进程启动之前而不是在进入时应用的。这避免了在固定之前在错误节点上进行早期内存分配的可能性。另一个优势是NUMA放置由子进程继承，使得手动重新固定dataloader工作器变得不必要。请注意，继承行为可能在不同的系统之间有所不同，因此在依赖它之前，你应该在你的特定设置上确认它。
- en: One downside of this method is that it cannot be easily integrated with PyTorch’s
    launch utilities like [torch.multiprocessing.spawn](https://docs.pytorch.org/docs/stable/multiprocessing.html#spawning-subprocesses) or [torchrun](https://docs.pytorch.org/docs/stable/elastic/run.html).
    If your code depends on those utilities, you may need to replicate some of their
    logic manually. Furthermore, some high-level frameworks (e.g., Lightning) may
    not expose control over process initialization, preventing the use of binding
    via *numactl*.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法的缺点是它不能轻易地与PyTorch的启动工具如[torch.multiprocessing.spawn](https://docs.pytorch.org/docs/stable/multiprocessing.html#spawning-subprocesses)或[torchrun](https://docs.pytorch.org/docs/stable/elastic/run.html)集成。如果你的代码依赖于这些工具，你可能需要手动复制它们的一些逻辑。此外，一些高级框架（例如，Lightning）可能不会公开控制进程初始化，这阻止了通过*numactl*进行绑定。
- en: 'Here’s a sample Bash script that wraps our training script with NUMA pinning
    using *numactl*:'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是一个示例Bash脚本，它使用*numactl*将我们的训练脚本包装起来，以实现NUMA固定：
- en: '[PRE13]'
  id: totrans-90
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: 'Results:'
  id: totrans-91
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 结果：
- en: The table below summarizes the results of our experiments.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 下表总结了我们的实验结果。
- en: '![](../Images/b967c1b7ceb9425700430b5564f170d6.png)'
  id: totrans-93
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b967c1b7ceb9425700430b5564f170d6.png)'
- en: Experiment Results (by Author)
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 实验结果（作者）
- en: In this toy example, the benefits of NUMA-aware training are clear. However,
    as noted earlier, the actual impact can vary depending on your model architecture,
    data loading characteristics, and system configuration.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个玩具示例中，NUMA感知训练的好处是显而易见的。然而，正如之前所提到的，实际的影响可能会根据你的模型架构、数据加载特性和系统配置而有所不同。
- en: Summary
  id: totrans-96
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 摘要
- en: In our constant pursuit of AI/ML workload optimization, topology awareness —
    including NUMA node placement — is critical.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们不断追求AI/ML工作负载优化的过程中，拓扑感知——包括NUMA节点放置——是至关重要的。
- en: In this post, we continued our exploration of PyTorch model profiling and optimization
    by demonstrating how NUMA pinning can improve throughput performance. We hope
    you will find this method useful in your own AI/ML projects.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们继续探索PyTorch模型分析和优化，通过展示如何使用NUMA固定来提高吞吐量性能。我们希望你会觉得这个方法对你的AI/ML项目有帮助。
- en: For more tips, tricks, and techniques for optimizing PyTorch model development,
    be sure to check out the other posts in [this series](https://towardsdatascience.com/pytorch-model-performance-analysis-and-optimization-10c3c5822869/).
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 想要更多关于优化PyTorch模型开发的技巧、窍门和技术，请务必查看本系列中的其他文章 [这个系列](https://towardsdatascience.com/pytorch-model-performance-analysis-and-optimization-10c3c5822869/)。
