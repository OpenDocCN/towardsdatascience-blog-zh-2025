- en: 'TDS Newsletter: What You Need to Know About LLMs for Data Science'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/tds-newsletter-what-you-need-to-know-about-llms-for-data-science/](https://towardsdatascience.com/tds-newsletter-what-you-need-to-know-about-llms-for-data-science/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Never miss a new edition of *The Variable*, our weekly newsletter featuring
    a top-notch selection of editors’ picks, deep dives, community news, and more.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[Subscribe today](https://newsletter.towardsdatascience.com/subscription-to-the-newsletter)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: More and more data professionals now encounter [large language models](https://towardsdatascience.com/category/large-language-models/) as
    integral components in core data science workflows. From basic data analysis to
    complex extraction processes, LLMs play an increasingly visible role in areas
    where they used to have a minimal footprint (if any).
  prefs: []
  type: TYPE_NORMAL
- en: How should you navigate this rapid change? What can data scientists do to avoid
    human-LLM turf wars and instead leverage their powers to produce better, more
    streamlined results? This week, we zoom in on data-specific use cases with articles
    that show how agents, prompts, and other LLM-powered tools can enhance, rather
    than jeopardize, the value of your work.
  prefs: []
  type: TYPE_NORMAL
- en: 'Before we jump in: in case you missed it, we recently published our latest
    Author Spotlight, an [insight-filled Q&A with longtime TDS contributor Egor Howell](https://towardsdatascience.com/writing-is-thinking/) discussing
    his career journey and offering advice for aspiring ML engineers.'
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 'LangChain for EDA: Build a CSV Sanity-Check Agent in Python'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Tired of performing the same exploratory data-analysis chores time after time? [Sarah
    Schürch](https://towardsdatascience.com/author/schuerch_sarah/) walks us through
    an automation project — powered by Python and LangChain — that produces agents
    with the ability to display columns, detect missing values, and retrieve descriptive
    statistics, among other time-saving benefits.
  prefs: []
  type: TYPE_NORMAL
- en: '[LangChain for EDA: Build a CSV Sanity-Check Agent in Python](https://towardsdatascience.com/langchain-for-eda-build-a-csv-sanity-check-agent-in-python/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The End-to-End Data Scientist’s Prompt Playbook
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: If you’re skeptical about LLMs’ place in data scientists’ toolkit, Sara Nobrega’s
    latest exploration of prompting techniques — especially in the area of stakeholder
    communication — might just change your mind.
  prefs: []
  type: TYPE_NORMAL
- en: '[The End-to-End Data Scientist’s Prompt Playbook](https://towardsdatascience.com/the-end-to-end-data-scientists-prompt-playbook/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Extracting Structured Data with LangExtract: A Deep Dive into LLM-Orchestrated
    Workflows'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Subha Ganapathi offers a hands-on guide to building modular workflows for structured
    intelligence, ensuring schema alignment and fact completeness.
  prefs: []
  type: TYPE_NORMAL
- en: '[Extracting Structured Data with LangExtract: A Deep Dive into LLM-Orchestrated
    Workflows](https://towardsdatascience.com/extracting-structured-data-with-langextract-a-deep-dive-into-llm-orchestrated-workflows/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
