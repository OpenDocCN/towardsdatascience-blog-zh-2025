- en: '[James Gibbins](https://towardsdatascience.com/author/james-gibbins/) is a
    data scientist with a multidisciplinary background, and has been publishing a
    popular series on hyperparameter tuning.'
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[詹姆斯·吉本斯](https://towardsdatascience.com/author/james-gibbins/)是一位具有跨学科背景的数据科学家，并一直在发表关于超参数调整的流行系列文章。'
- en: '[A Visual Guide to Tuning Random Forest Hyperparameters](https://towardsdatascience.com/a-visual-guide-to-tuning-random-forest-hyperparameters/)'
  id: totrans-44
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[随机森林超参数调优的视觉指南](https://towardsdatascience.com/a-visual-guide-to-tuning-random-forest-hyperparameters/)'
- en: '[Erika G. Gonçalves](https://towardsdatascience.com/author/erika-g-goncalves/) joins
    us with expertise in applied math and statistics, as well as deep industry experience;
    her first article looks under the hood of AI applications.'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Erika G. Gonçalves](https://towardsdatascience.com/author/erika-g-goncalves/)凭借其在应用数学和统计学方面的专业知识以及深厚的行业经验加入我们；她的第一篇文章深入探讨了人工智能应用的内幕。'
- en: '[AI Operations Under the Hood: Challenges and Best Practices](https://towardsdatascience.com/ai-operations-under-the-hood-challenges-and-best-practices/)'
  id: totrans-46
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[AI运维内幕：挑战和最佳实践](https://towardsdatascience.com/ai-operations-under-the-hood-challenges-and-best-practices/)'
- en: '[Sean Moran](https://towardsdatascience.com/author/sean-moran/) has led multiple
    AI/ML initiatives at large-scale enterprises. His TDS debut looks into a potential
    future where scientific innovation might be heavily AI-assisted.'
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[肖恩·莫兰](https://towardsdatascience.com/author/sean-moran/) 在大型企业中领导了多个AI/ML项目。他的TDS首篇文章探讨了科学创新可能被AI大量辅助的潜在未来。'
