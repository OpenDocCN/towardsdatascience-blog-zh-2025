- en: Fighting Back Against Attacks in Federated Learning
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 反击联邦学习中的攻击
- en: 原文：[https://towardsdatascience.com/fighting-back-against-attacks-in-federated-learning/](https://towardsdatascience.com/fighting-back-against-attacks-in-federated-learning/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/fighting-back-against-attacks-in-federated-learning/](https://towardsdatascience.com/fighting-back-against-attacks-in-federated-learning/)
- en: '[Federated Learning](https://www.scaleoutsystems.com/resources/what-is-federated-learning)
    (FL) is <mdspan datatext="el1757374396022" class="mdspan-comment">transforming
    the way</mdspan> we train AI models. Instead of sending all your sensitive data
    to a central location, FL keeps the data where it is, and only shares model updates.
    This preserves privacy and enables AI to run closer to where the data is generated.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '[联邦学习](https://www.scaleoutsystems.com/resources/what-is-federated-learning)
    (FL) 正在 <mdspan datatext="el1757374396022" class="mdspan-comment">改变我们训练 AI 模型的方式。</mdspan>
    与将所有敏感数据发送到中央位置不同，FL 将数据保留在原地，只共享模型更新。这保护了隐私，并使 AI 能够在数据生成的地方运行得更近。'
- en: '*However, with computation and data spread across many devices, new security
    challenges arise.* Attackers can join the training process and subtly influence
    it, leading to degraded accuracy, biased outputs or hidden backdoors in the model.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: '*然而，随着计算和数据分散到许多设备上，新的安全挑战也随之而来。攻击者可以加入训练过程并微妙地影响它，导致准确性下降、输出偏差或模型中隐藏的后门。*'
- en: In this project, we set out to investigate how we can detect and mitigate such
    attacks in FL. To do this, we built a multi node simulator that enables researchers
    and industry professionals to reproduce attacks and test defences more efficiently.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个项目中，我们着手研究如何在联邦学习中检测和减轻此类攻击。为此，我们构建了一个多节点模拟器，使研究人员和行业专业人士能够更有效地重现攻击和测试防御措施。
- en: Why This Matters
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 这为什么很重要
- en: '**A non-technical Example:** Think of a shared recipe book that chefs from
    many restaurants contribute to. Each chef updates a few recipes with their own
    improvements. A dishonest chef could deliberately add the wrong ingredients to
    sabotage the dish, or quietly insert a special flavour that only they know how
    to fix. If no one checks the recipes carefully, all future diners across all restaurants
    could end up with ruined or manipulated meals.'
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**非技术性示例：** 想象一下一本由许多餐厅厨师共同贡献的共享食谱书。每位厨师都会更新一些食谱，加入自己的改进。一个不诚实的厨师可能会故意添加错误的配料来破坏菜肴，或者悄悄加入只有他们知道如何修复的特殊风味。如果没有人仔细检查食谱，所有餐厅的未来食客都可能吃到被破坏或被操纵的饭菜。'
- en: '**A Technical Example:** The same concept appears in FL as data poisoning (manipulating
    training examples) and model poisoning (altering weight updates). These attacks
    are especially damaging when the federation has non IID data distributions, imbalanced
    data partitions or late joining clients. Contemporary defences such as [Multi
    KRUM](https://arxiv.org/abs/2409.17754), [Trimmed Mean](https://arxiv.org/pdf/1803.01498)
    and [Divide and Conquer](https://www.ndss-symposium.org/wp-content/uploads/ndss2021_6C-3_24498_paper.pdf)
    can still fail in certain scenarios.'
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**技术性示例：** 与数据中毒（操纵训练示例）和模型中毒（更改权重更新）相同的概念出现在联邦学习中。当联盟具有非 IID 数据分布、不平衡数据分区或晚加入的客户端时，这些攻击尤其具有破坏性。当代防御措施，如
    [Multi KRUM](https://arxiv.org/abs/2409.17754)、[Trimmed Mean](https://arxiv.org/pdf/1803.01498)
    和 [Divide and Conquer](https://www.ndss-symposium.org/wp-content/uploads/ndss2021_6C-3_24498_paper.pdf)，在某些情况下仍然可能失败。'
- en: Building the Multi Node FL Attack Simulator
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 构建多节点联邦学习攻击模拟器
- en: To evaluate the resilience of federated learning against real-world threats,
    we built a multi-node attack simulator on top of the [Scaleout Systems FEDn framework](https://www.scaleoutsystems.com/resources/scalable-federated-learning-with-fedn).
    This simulator makes it possible to reproduce attacks, test defences, and scale
    experiments with hundreds or even thousands of clients in a controlled environment.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 为了评估联邦学习对现实世界威胁的弹性，我们在 [Scaleout Systems FEDn 框架](https://www.scaleoutsystems.com/resources/scalable-federated-learning-with-fedn)
    上构建了一个多节点攻击模拟器。这个模拟器使得在受控环境中重现攻击、测试防御措施以及扩展实验（拥有数百甚至数千个客户端）成为可能。
- en: '**Key capabilities: **'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: '**关键功能：**'
- en: '**Flexible deployment:** runs distributed FL jobs using Kubernetes, Helm and
    Docker.'
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**灵活部署：** 使用 Kubernetes、Helm 和 Docker 运行分布式联邦学习作业。'
- en: '**Realistic data settings:** Supports IID/non-IID label distributions, imbalanced
    data partitions and late joining clients.'
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**现实数据设置：** 支持IID/非IID标签分布、不平衡数据分区和晚加入的客户端。'
- en: '**Attack injection:** Includes implementation of common poisoning attacks (Label
    Flipping, Little is Enough) and allows new attacks to be defined with ease.'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**攻击注入：** 包括实施常见的中毒攻击（标签翻转、少即是多）并允许轻松定义新的攻击。'
- en: '**Defense benchmarking:** Integrates existing aggregation strategies (FedAvg,
    Trimmed Mean, Multi-KRUM, Divide and Conquer) and allows for experimentation and
    testing of  a range of defensive strategies and aggregation rules.'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**防御基准测试：** 集成现有的聚合策略（FedAvg、修剪均值、多KRUM、分而治之）并允许对一系列防御策略和聚合规则进行实验和测试。'
- en: '**Scalable experimentation:** Simulation parameters such as number of clients,
    malicious share and participation patterns can be tuned from one single configuration
    file.'
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可扩展实验：** 可以从单个配置文件中调整模拟参数，如客户端数量、恶意份额和参与模式。'
- en: Using [FEDn’s architecture](https://www.scaleoutsystems.com/resources/scalable-federated-learning-with-fedn)
    means that the simulations benefit from the robust training orchestration, client
    management and enables visual monitoring through the [Studio web interface](https://fedn.scaleoutsystems.com/).
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 使用[FEDn的架构](https://www.scaleoutsystems.com/resources/scalable-federated-learning-with-fedn)意味着模拟可以从强大的训练编排、客户端管理和通过[Studio网页界面](https://fedn.scaleoutsystems.com/)进行可视化监控中受益。
- en: '*It is also important to note that the FEDn framework supports [Server Functions](https://docs.scaleoutsystems.com/en/stable/serverfunctions.html).
    This feature makes it possible to implement new aggregation strategies and evaluate
    them using the attack simulator.*'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: '*值得注意的是，FEDn框架支持[服务器功能](https://docs.scaleoutsystems.com/en/stable/serverfunctions.html)。这一特性使得通过攻击模拟器实现新的聚合策略并对其进行评估成为可能。*'
- en: To start with the first example project using FEDn, [here is the quickstart
    guide](https://docs.scaleoutsystems.com/en/stable/quickstart.html).
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 要开始使用FEDn的第一个示例项目，[这里是快速入门指南](https://docs.scaleoutsystems.com/en/stable/quickstart.html)。
- en: '**The FEDn framework is free for all academic and research projects, as well
    as for industrial testing and trials.**'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '**FEDn框架对所有学术和研究项目免费，以及工业测试和试验。**'
- en: '[The attack simulator is available and ready to use as an open source software](https://github.com/Dackeval/fedn_atttack_simulator/tree/K8).'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: '[攻击模拟器已可用并作为开源软件准备就绪](https://github.com/Dackeval/fedn_atttack_simulator/tree/K8)'
- en: The Attacks We Studied
  id: totrans-21
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我们研究过的攻击
- en: '**Label Flipping (Data Poisoning)** – Malicious clients flip labels in their
    local datasets, such as changing “cat” to “dog” to reduce accuracy.'
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**标签翻转（数据中毒）** – 恶意客户端在其本地数据集中翻转标签，例如将“猫”改为“狗”以降低准确性。'
- en: '**Little is Enough (Model Poisoning)** – Attackers make small but targeted
    adjustments to their model updates to shift the global model output toward their
    own goals. In this thesis we applied the Little is Enough attack every 3rd round.'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**少即是多（模型中毒）** – 攻击者对其模型更新进行小但针对性的调整，以将全局模型输出推向自己的目标。在本论文中，我们每3轮应用一次少即是多攻击。'
- en: Beyond Attacks — Understanding Unintentional Impact
  id: totrans-24
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 超越攻击——理解无意影响
- en: While this study focuses on deliberate attacks, it is equally valuable for understanding
    the effects of marginal contributions caused by misconfigurations or device malfunctions
    in large-scale federations.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然这项研究侧重于故意的攻击，但它对于理解大规模联邦中由于配置错误或设备故障引起的边缘贡献的影响同样有价值。
- en: In our recipe example, even an honest chef might accidentally use the wrong
    ingredient because their oven is broken or their scale is inaccurate. The mistake
    is unintentional, but it still changes the shared recipe in ways that could be
    harmful if repeated by many contributors.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的食谱示例中，即使是一个诚实的厨师也可能因为烤箱损坏或秤不准确而意外使用错误的原料。错误是无意的，但它仍然以可能对许多贡献者重复时造成危害的方式改变了共享食谱。
- en: In cross-device or fleet learning setups, where thousands or millions of heterogeneous
    devices contribute to a shared model, faulty sensors, outdated configurations
    or unstable connections can degrade model performance in similar ways to malicious
    attacks. Studying attack resilience also reveals how to make aggregation rules
    robust to such unintentional noise.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 在跨设备或车队学习设置中，数千或数百万异构设备向共享模型贡献时，故障传感器、过时的配置或不稳定的连接可能会以类似恶意攻击的方式降低模型性能。研究攻击弹性也揭示了如何使聚合规则对这种无意噪声具有鲁棒性。
- en: Mitigation Strategies Explained
  id: totrans-28
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 缓解策略详解
- en: 'In FL, aggregation rules decide how to combine model updates from clients.
    Robust aggregation rules aim to reduce the influence of outliers, whether caused
    by malicious attacks or faulty devices. Here are the strategies we tested:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 在联邦学习（FL）中，聚合规则决定了如何组合来自客户端的模型更新。鲁棒的聚合规则旨在减少异常值的影响，无论这些异常值是由恶意攻击还是故障设备引起的。以下是我们在测试中使用的策略：
- en: '**FedAvg (baseline)** – Simply averages all updates without filtering. Very
    vulnerable to attacks.'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**FedAvg（基线）** – 简单地平均所有更新，不进行过滤。非常容易受到攻击。'
- en: '**Trimmed Mean (TrMean)** – Sorts each parameter across clients, then discards
    the highest and lowest values before averaging. Reduces extreme outliers but can
    miss subtle attacks.'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Trimmed Mean（TrMean）** – 对每个客户端的每个参数进行排序，然后在平均之前丢弃最高和最低的值。减少了极端异常值，但可能会错过细微的攻击。'
- en: '**Multi KRUM** – Scores each update by how close it is to its nearest neighbours
    in parameter space, keeping only those with the smallest total distance. Very
    sensitive to the number of updates selected (k).'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Multi KRUM** – 根据更新与参数空间中最近邻居的接近程度对每个更新进行评分，仅保留总距离最小的那些。对选择的更新数量（k）非常敏感。'
- en: '**EE Trimmed Mean (Newly developed)** – An adaptive version of TrMean that
    uses epsilon–greedy scheduling to decide when to test different client subsets.
    More resilient to changing client behaviour, late arrivals and non IID distributions.'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**EE Trimmed Mean（新开发）** – TrMean的适应性版本，使用epsilon-greedy调度来决定何时测试不同的客户端子集。对客户端行为的改变、迟到和non
    IID分布更具弹性。'
- en: <mdspan datatext="el1757455673626" class="mdspan-comment">The images,</mdspan>
    tables and plots presented in this post were originally designed by the Scaleout
    team.
  id: totrans-34
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1757455673626" class="mdspan-comment">本文中展示的图像、表格和图表最初由Scaleout团队设计。
- en: Experiments
  id: totrans-35
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 实验
- en: Across 180 experiments we evaluated different aggregation strategies under varying
    attack types, malicious client ratios and data distributions. For further details,
    please read the [full thesis here](https://github.com/Dackeval/fedn_atttack_simulator/tree/K8)
    .
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 在180次实验中，我们评估了不同聚合策略在变化攻击类型、恶意客户端比例和数据分布下的表现。有关更多详细信息，请参阅[完整论文](https://github.com/Dackeval/fedn_atttack_simulator/tree/K8)。
- en: '![](../Images/fae580c4db7bb6d3cfe5df977e0a2919.png)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/fae580c4db7bb6d3cfe5df977e0a2919.png)'
- en: The table above shows one of the series of experiments using label-flipping
    attack with non-IID label distributed and partially imbalanced data partitions.
    The table shows **Test Accuracy** and **Test Loss AUC**, computed over all participating
    clients. Each aggregation strategy’s results are shown in two rows, corresponding
    to the two **late-policies** (benign clients participating from the 5th round
    or malicious clients participating from the 5th round). Columns separate the results
    at the three malicious proportions, yielding six experiment configurations per
    aggregation strategy. The best result in each configuration is shown in **bold. **
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 上表展示了使用非IID标签分布和部分不平衡数据分区进行标签翻转攻击的一系列实验之一。表中显示了**测试准确率**和**测试损失AUC**，这些指标是在所有参与客户端上计算的。每个聚合策略的结果以两行显示，对应于两种**后期策略**（从第5轮开始参与的良性客户端或从第5轮开始参与的恶意客户端）。列将结果分为三个恶意比例，每个聚合策略产生六个实验配置。每个配置中的最佳结果以**粗体**显示。
- en: While the table shows a relatively homogeneous response across all defense strategies,
    the individual plots present a completely different view. In FL, although a federation
    may reach a certain level of accuracy, it is equally important to examine client
    participation—specifically, which clients successfully contributed to the training
    and which were rejected as malicious. The following plots illustrate client participation
    under different defense strategies.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然表格显示所有防御策略的响应相对一致，但个别图表呈现了完全不同的视角。在FL中，虽然联盟可能达到一定的准确度，但同样重要的是要检查客户端的参与情况——具体来说，哪些客户端成功参与了训练，哪些被拒绝为恶意。以下图表展示了不同防御策略下的客户端参与情况。
- en: '![](../Images/fff1025415c4feeb020bada0e58ce67d.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/fff1025415c4feeb020bada0e58ce67d.png)'
- en: '*Fig-1: TrMean – Label Flipping – non-IID Partially Imbalanced – 20% Malicious
    activity*'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: '*图1：TrMean – 标签翻转 – 非IID部分不平衡 – 20%恶意活动*'
- en: With 20% malicious clients under a label-flipping attack on non-IID, partially
    imbalanced data, Trimmed Mean (*Fig-1*) maintained overall accuracy but never
    fully blocked any client from contributing. While coordinate trimming reduced
    the impact of malicious updates, it filtered parameters individually rather than
    excluding entire clients, allowing both benign and malicious participants to remain
    in the aggregation throughout training.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: '在20%恶意客户端的标签翻转攻击下，对非独立同分布、部分不平衡数据，Trimmed Mean（*图1*）保持了整体准确率，但从未完全阻止任何客户端的贡献。虽然坐标修剪减少了恶意更新的影响，但它单独过滤参数而不是排除整个客户端，允许良性和恶意参与者在整个训练过程中保持聚合。 '
- en: In a scenario with 30% late-joining malicious clients and non-IID , imbalanced
    data, Multi-KRUM (*Fig-2*) mistakenly selected a malicious update from round 5
    onward. High data heterogeneity made benign updates appear less similar, allowing
    the malicious update to rank as one of the most central and persist in one-third
    of the aggregated model for the rest of training.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 在有30%晚加入的恶意客户端和非独立同分布、不平衡数据的情况下，Multi-KRUM（*图2*）从第5轮开始错误地选择了恶意更新。高数据异质性使得良性更新看起来不太相似，允许恶意更新被评为最中心之一，并在剩余的训练过程中持续存在于三分之一的聚合模型中。
- en: '![](../Images/ff84daf7991ec2ea5baf88b38449bc6a.png)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/ff84daf7991ec2ea5baf88b38449bc6a.png)'
- en: '*Fig-2: Multi-KRUM – Label Flipping Attack – non-IID Imbalanced – 30% Malicious
    Activity (k=3)**'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: '*图2：Multi-KRUM – 标签翻转攻击 – 非独立同分布不平衡 – 30%恶意活动（k=3）**'
- en: Why we need adaptive aggregation strategies
  id: totrans-46
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么我们需要自适应聚合策略
- en: Existing robust aggregation rules, generally rely on static thresholds to decide
    which client update to include in aggregating the new global model. This highlights
    a shortcoming of current aggregation strategies, which can make them vulnerable
    to late participating clients, non-IID data distributions or data volume imbalances
    between clients. **These insights led us to develop EE-Trimmed Mean (EE-TrMean).**
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 现有的鲁棒聚合规则通常依赖于静态阈值来决定哪些客户端更新应包含在聚合新的全局模型中。这突出了当前聚合策略的不足，这些不足可能使它们容易受到晚加入的客户端、非独立同分布数据分布或客户端之间数据量不平衡的影响。**这些见解促使我们开发了EE-Trimmed
    Mean (EE-TrMean)。**
- en: 'EE-TrMean: An epsilon greedy aggregation strategy'
  id: totrans-48
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: EE-TrMean：一种epsilon贪婪聚合策略
- en: EE-TrMean build on the classical Trimmed Mean, but adds an exploration vs. exploitation,
    epsilon greedy layer for client selection.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: EE-TrMean基于经典的Trimmed Mean，但增加了用于客户端选择的探索与利用、epsilon贪婪层。
- en: '**Exploration phase:** All clients are allowed to contribute and a normal Trimmed
    Mean aggregation round is executed.'
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**探索阶段**：所有客户端都被允许贡献，并执行一个正常的Trimmed Mean聚合轮次。'
- en: '**Exploitation phase:** The clients that have been trimmed the least will be
    included into the exploitation phase, through an average score system based on
    previous rounds it participated.'
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**探索阶段**：最少被修剪的客户端将通过基于之前参与轮次的平均分数系统被纳入探索阶段。'
- en: The switch between the two phases is controlled by the epsilon-greedy policy
    with a decaying epsilon and an alpha ramp.
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 两个阶段的切换由具有衰减epsilon和alpha渐变的epsilon-greedy策略控制。
- en: Each client earns a score based on whether its parameters survive trimming in
    each round. Over time the algorithm will increasingly favor the highest scoring
    clients, while occasionally exploring others to detect changes in behaviour. This
    adaptive approach allows EE-TrMean to increase resilience in cases where the data
    heterogeneity and malicious activity is high.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 每个客户端根据其参数在每一轮修剪中是否存活来获得分数。随着时间的推移，算法将越来越倾向于选择得分最高的客户端，同时偶尔探索其他客户端以检测行为的变化。这种自适应方法允许EE-TrMean在数据异质性和恶意活动较高的情况下提高弹性。
- en: '![](../Images/8e12fd6e521420792449a232164153e8.png)'
  id: totrans-54
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/8e12fd6e521420792449a232164153e8.png)'
- en: '*Fig-3: EE-TrMean – Label Flipping – non-IID Partially Imbalanced – 20% Malicious
    activity*'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '*图3：EE-TrMean – 标签翻转 – 非独立同分布部分不平衡 – 20%恶意活动*'
- en: In a label-flipping scenario with 20% malicious clients and late benign joiners
    on non-IID, partially imbalanced data, EE-TrMean *(Fig-3)* alternated between
    exploration and exploitation phases—initially allowing all clients, then selectively
    blocking low-scoring ones. While it occasionally excluded a benign client due
    to data heterogeneity (still much better than the known strategies), it successfully
    identified and minimized the contributions of malicious clients during training.
    This simple yet powerful modification improves the client’s contributions. The
    literature reports that as long as the majority of clients are honest, the model’s
    accuracy remains reliable.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 在一个标签翻转场景中，有20%的恶意客户端和后期良性的非独立同分布（non-IID）、部分不平衡的数据加入者，EE-TrMean *(图-3)* 在探索和利用阶段之间交替——最初允许所有客户端，然后选择性地阻止得分低的客户端。虽然偶尔由于数据异质性（仍然比已知策略好得多）排除了一个良性客户端，但它成功地在训练过程中识别并最小化了恶意客户端的贡献。这种简单而强大的修改提高了客户端的贡献。文献报告称，只要大多数客户端是诚实的，模型的准确性就保持可靠。
