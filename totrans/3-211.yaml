- en: Unraveling Large Language Model Hallucinations
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 揭秘大型语言模型幻觉
- en: 原文：[https://towardsdatascience.com/unraveling-large-language-model-hallucinations/](https://towardsdatascience.com/unraveling-large-language-model-hallucinations/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/unraveling-large-language-model-hallucinations/](https://towardsdatascience.com/unraveling-large-language-model-hallucinations/)
- en: Introduction
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 简介
- en: In a YouTube video titled [*Deep Dive into LLMs like ChatGPT*](https://www.youtube.com/watch?v=7xTGNNLPyMI),
    former Senior Director of AI at Tesla, [Andrej Karpathy](https://karpathy.ai/) discusses
    the psychology of Large Language Models (LLMs) as emergent cognitive effects of
    the training pipeline. This article is inspired by his explanation of LLM hallucinations
    and the information presented in the video.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在一个名为 [*Deep Dive into LLMs like ChatGPT*](https://www.youtube.com/watch?v=7xTGNNLPyMI)
    的 YouTube 视频中，特斯拉前高级 AI 导演 [Andrej Karpathy](https://karpathy.ai/) 讨论了大型语言模型（LLMs）的心理，这是训练流程中出现的认知效应。本文受到了他对
    LLM 幻觉和视频中展示的信息的解释的启发。
- en: You might have seen model hallucinations. They are the instances where LLMs
    generate incorrect, misleading, or entirely fabricated information that appears
    plausible. These hallucinations happen because LLMs do not “know” facts in the
    way humans do; instead, they predict words based on patterns in their training
    data. Early models released a few years ago struggled significantly with hallucinations.
    Over time, mitigation strategies have improved the situation, though hallucinations
    haven’t been fully eliminated.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能见过模型产生的幻觉。这些是 LLMs 生成不正确、误导性或完全虚构的信息的实例，这些信息看起来似乎合理。这些幻觉发生是因为 LLMs 并不像人类那样“知道”事实；相反，它们根据训练数据中的模式预测单词。几年前发布的早期模型在幻觉方面存在重大问题。随着时间的推移，缓解策略已经改善了这种情况，尽管幻觉尚未完全消除。
- en: '![](../Images/0a5525260c7a63c28366f05585ebdbbe.png)'
  id: totrans-5
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/0a5525260c7a63c28366f05585ebdbbe.png)'
- en: An illustrative example of LLM hallucinations (Image by Author)
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: LLM 幻觉的示例（图片由作者提供）
- en: Zyler Vance is a completely fictitious name I came up with. When I input the
    prompt “Who is Zyler Vance?” into the falcon-7b-instruct model, it generates fabricated
    information. Zyler Vance is not a character in The *Cloverfield Paradox* (2018)movie.
    This model, being an older version, is prone to hallucinations.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: Zyler Vance 是我凭空想出的一个完全虚构的名字。当我将提示“Zyler Vance 是谁？”输入 falcon-7b-instruct 模型时，它生成了虚构的信息。Zyler
    Vance 并不是 2018 年电影《*Cloverfield Paradox*》中的角色。这个模型是较老版本，容易产生幻觉。
- en: LLM Training Pipeline
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: LLM 训练流程
- en: To understand where these hallucinations originate from, you have to be familiar
    with the training pipeline. Training LLMs typically involve three major stages.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 要了解这些幻觉的起源，你必须熟悉训练流程。训练大型语言模型（LLMs）通常涉及三个主要阶段。
- en: Pretraining
  id: totrans-10
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 预训练
- en: 'Post-training: Supervised Fine-Tuning (SFT)'
  id: totrans-11
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 训练后：监督微调（SFT）
- en: 'Post-training: Reinforcement Learning with Human Feedback (RLHF)'
  id: totrans-12
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 训练后：基于人类反馈的强化学习（RLHF）
- en: '**Pretraining**'
  id: totrans-13
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**预训练**'
- en: This is the initial stage of the training for LLMs. During pretraining the model
    is exposed to a huge quantity of very high-quality and diverse text crawled from
    the internet. Pretraining helps the model learn general language patterns, grammar,
    and facts. The output of this training phase is called the base model. It is a
    token simulator that predicts the next word in a sequence.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 这是 LLM 训练的初始阶段。在预训练期间，模型接触到从互联网上爬取的大量非常高质量和多样化的文本。预训练有助于模型学习通用语言模式、语法和事实。这个训练阶段的输出称为基础模型。它是一个标记模拟器，可以预测序列中的下一个单词。
- en: To get a sense of what the pretraining dataset might look like you can see the [FineWeb](https://huggingface.co/spaces/HuggingFaceFW/blogpost-fineweb-v1) dataset.
    FineWeb dataset is fairly representative of what you might see in an enterprise-grade
    language model. All the major LLM providers like OpenAI, Google, or Meta will
    have some equivalent dataset internally like the FineWeb dataset.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 要了解预训练数据集可能的样子，你可以查看 [FineWeb](https://huggingface.co/spaces/HuggingFaceFW/blogpost-fineweb-v1)
    数据集。FineWeb 数据集相当典型，你可能会在企业级语言模型中看到。像 OpenAI、Google 或 Meta 这样的主要 LLM 提供商内部都将有一些类似于
    FineWeb 数据集的等效数据集。
- en: '**Post-Training: Supervised Fine-Tuning**'
  id: totrans-16
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**训练后：监督微调**'
- en: As I mentioned before, the base model is a token simulator. It simply samples
    internet text documents. We need to turn this base model into an assistant that
    can answer questions. Therefore, the pretrained model is further refined using
    a dataset of conversations. These conversation datasets have hundreds of thousands
    of conversations that are multi-term and very long covering a diverse breadth
    of topics.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 如我之前提到的，基础模型是一个标记模拟器。它只是简单地采样互联网文本文档。我们需要将这个基础模型转变为能够回答问题的助手。因此，预训练模型进一步使用对话数据集进行细化。这些对话数据集包含数十万个多词长且覆盖广泛主题的对话。
- en: '![](../Images/91c7b01a736b57e6d1c268508999fe05.png)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/91c7b01a736b57e6d1c268508999fe05.png)'
- en: Illustrative human assistant conversations from [InstructGPT](https://arxiv.org/pdf/2203.02155) distribution
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 来自 [InstructGPT](https://arxiv.org/pdf/2203.02155) 分发的说明性人类助手对话
- en: These conversations come from human labelers. Given conversational context human
    lablers write out ideal responses for an assistant in any situation. Later, we
    take the base model that is trained on internet documents and substitute the dataset
    with the dataset of conversations. Then continue the model training on this new
    dataset of conversations. This way, the model adjusts rapidly and learns the statistics
    of how this assistant responds to queries. At the end of training the model is
    able to imitate human-like responses.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 这些对话来自人类标注员。在对话背景下，人类标注员为助手在任何情况下编写理想的响应。后来，我们将训练在互联网文档上训练的基础模型，并用对话数据集替换数据集。然后在这个新的对话数据集上继续模型训练。这样，模型能够快速调整并学习助手如何响应查询的统计信息。训练结束时，模型能够模仿类似人类的响应。
- en: '[OpenAssistant/oasst1](https://huggingface.co/datasets/OpenAssistant/oasst1) is
    one of the open-source conversations dataset available at hugging face. This is
    a human-generated and human-annotated assistant-style conversation corpus consisting
    of 161,443 messages in 35 different languages.'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: '[OpenAssistant/oasst1](https://huggingface.co/datasets/OpenAssistant/oasst1)
    是在hugging face上可用的开源对话数据集之一。这是一个由人类生成和标注的助手风格对话语料库，包含35种不同语言中的161,443条消息。'
- en: '**Post-training: Reinforcement Learning with Human Feedback**'
  id: totrans-22
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**训练后：带有人类反馈的强化学习**'
- en: Supervised Fine-Tuning makes the model capable. However, even a well-trained
    model can generate misleading, biased, or unhelpful responses. Therefore, Reinforcement
    Learning with Human Feedbackis required to align it with human expectations.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 监督微调使模型变得能够胜任。然而，即使是训练良好的模型也可能生成误导性、有偏见或无用的响应。因此，需要使用带有人类反馈的强化学习来使其与人类期望保持一致。
- en: We start with the assistant model, trained by SFT. For a given prompt we generate
    multiple model outputs. Human labelers rank or score multiple model outputs based
    on quality, safety, and alignment with human preferences. We use these data to
    train a whole separate neural network that we call a reward model.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 我们从由SFT训练的辅助模型开始。对于给定的提示，我们生成多个模型输出。人类标注员根据质量、安全性和与人类偏好的契合度对多个模型输出进行排名或评分。我们使用这些数据来训练一个完全独立的神经网络，我们称之为奖励模型。
- en: The reward model imitates human scores. It is a simulator of human preferences.
    It is a completely separate neural network, probably with a transformer architecture,
    but it is not a language model in the sense that it generates diverse language.
    It’s just a scoring model.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 奖励模型模仿人类评分。它是一个人类偏好的模拟器。它是一个完全独立的神经网络，可能采用transformer架构，但它不是一个生成多样化语言的模型。它只是一个评分模型。
- en: Now the LLM is fine-tuned using reinforcement learning, where the reward model
    provides feedback on the quality of the generated outputs. So instead of asking
    a real human, we’re asking a simulated human for their score of an output. The
    goal is to maximize the reward signal, which reflects human preferences.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 现在LLM使用强化学习进行微调，其中奖励模型对生成的输出的质量提供反馈。所以我们不是询问真实的人类，而是询问模拟的人类对输出的评分。目标是最大化奖励信号，这反映了人类偏好。
- en: Why Hallucinations?
  id: totrans-27
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么会有幻觉？
- en: Now that we have a clearer understanding of the training process of large language
    models, we can continue with our discussion on hallucinations.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们对大型语言模型的训练过程有了更清晰的理解，我们可以继续讨论关于幻觉的话题。
- en: Hallucinations originate from the Supervised Fine-Tuning stage of the training
    pipeline. The following is a specific example of three potential conversations
    you might have on your training set.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 幻觉起源于训练流程中的监督微调阶段。以下是在您的训练集中可能发生的三个潜在对话的具体示例。
- en: '![](../Images/4cff061655d5778e3b035c9498fa9983.png)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
- en: Examples of human-assistant conversations (Image by Author)
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
- en: As I have shown earlier, this is what human-assistant conversations would look
    like in the training time. These conversations are created by human labelers under
    strict guidelines. When a labeler is writing the correct answer for the assistant
    in each one of these cases either they know this person or they research them
    on the internet. After that, they write the assistant response that has a confident
    tone of an answer.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
- en: At test time, if the model is asked about an individual it has not seen during
    training, it does not simply respond with an acknowledgment of ignorance. Simply
    put it does not reply with “Oh, I don’t know”. Instead, the model statistically
    imitates the training set.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: In the training set, the questions in the form “Who is X?” are confidently answered
    with the correct answer. Therefore at the test time, the model replies with the
    style of the answer and it gives the statistically most likely guess. So it just
    makes stuff up that is statistically consistent with the style of the answer in
    its training set.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
- en: Model Interrogation
  id: totrans-35
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Our question now is how to mitigate the hallucinations. It is evident that our
    dataset should include examples where the correct answer for the assistant is
    that the model does not know about some particular fact. However, these answers
    must be produced only in instances where the model actually does not know. So
    the key question is how do we know what the model knows and what it does not?
    We need to probe the model to figure that out empirically.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
- en: The task is to figure out the boundary of the model’s knowledge. Therefore,
    we need to interrogate the model to figure out what it knows and doesn’t know.
    Then we can add examples to the training set for the things that the model doesn’t
    know. The correct response, in such cases, is that the model does not know them.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/79a2fbcc283c8b59a73f5ac48c52d9a2.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
- en: An example of a training instance where the model doesn’t know the answer to
    a particular question
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
- en: Let’s take a look at how Meta dealt with hallucinations using this concept for
    the Llama 3 series of models.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
- en: 'In their 2024 paper titled “[The Llama 3 Herd of Models](https://arxiv.org/abs/2407.21783)”,
    Touvron et al. describe how they have developed a knowledge-probing technique
    to achieve this. Their primary approach involves generating data that aligns model
    generations with subsets of factual data present in the pre-training data. They
    describe the following procedure for the data generation process:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
- en: '*Extract a data snippet from the pre-training data.*'
  id: totrans-42
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-43
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*Generate a factual question about these snippets (context) by prompting Llama
    3.*'
  id: totrans-44
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-45
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*Sample responses from Llama 3 to the question.*'
  id: totrans-46
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-47
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*Score the correctness of the generations using the original context as a reference
    and Llama 3 as a judge.*'
  id: totrans-48
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-49
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*Score the informativeness of the generations using Llama 3 as a judge.*'
  id: totrans-50
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  id: totrans-51
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*Generate a refusal for responses which are consistently informative and incorrect
    across the generations, using Llama 3\. (p. 27)*'
  id: totrans-52
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*使用Llama 3\. (p. 27)*生成对多代持续提供信息但错误一致的拒绝回复。'
- en: After that data generated from the knowledge probe is used to encourage the
    model to only answer the questions for which it knows about, and refrain from
    answering questions that it is unsure about. Implementing this technique has improved
    the hallucination issue over time.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 之后，从知识探测中生成数据用于鼓励模型只回答它知道的问题，并避免回答它不确定的问题。实施这项技术随着时间的推移改善了幻觉问题。
- en: Using Web Search
  id: totrans-54
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用网络搜索
- en: We have better mitigation strategies than just saying we do not know. We can
    provide the LLM with an opportunity to generate factual responses and accurately
    address the question. What would you do, in a case where I ask you a factual question
    that you don’t have an answer to? How do you answer the question? You could do
    some research and search the internet to figure out the answer to the question.
    Then tell me the answer to the question. We can do the same thing with LLMs.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 我们有比仅仅说我们不知道更好的缓解策略。我们可以给LLM一个机会来生成事实性的回复并准确回答问题。当我不确定答案时，你会怎么做？你如何回答问题？你可以做一些研究，在网上搜索以找出问题的答案。然后告诉我问题的答案。我们可以用LLM做同样的事情。
- en: You can think of the knowledge inside the parameters of the trained neural network
    as a vague recollection of things that the model has seen during pretraining a
    long time ago. Knowledge in the model parameters is analogous to something in
    your memory that you read a month ago. You can remember things that you read continuously
    over time than something you read rarely. If you don’t have a good recollection
    of information that you read, what you do is go and look it up. When you look
    up information, you are essentially refreshing your working memory with information,
    allowing you to retrieve and discuss it.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以将训练好的神经网络参数内的知识视为模型在长时间预训练期间所见事物的模糊回忆。模型参数中的知识类似于你在一个月前读过的东西。你可以记住你连续阅读的东西，比那些你很少阅读的东西记得更清楚。如果你没有很好地回忆起你阅读的信息，你所做的就是去查找它。当你查找信息时，你实际上是在用信息刷新你的工作记忆，这让你能够检索和讨论它。
- en: We need some equivalent mechanism to allow the model to refresh its memory or
    recollection of information. We can achieve this by introducing tools for the
    model. The model can use web search tools instead of just replying with “I am
    sorry, I don’t know the answer”. To achieve this we need to introduce special
    tokens, such as `<SEARCH_START>` and `<SEARCH_END>` along with a protocol that
    defines how the model is allowed to use these tokens. In this mechanism, the language
    model can emit special tokens. Now in a case where the model doesn’t know the
    answer, it has the option to emit the special token `<SEARCH_START>` instead of
    replying with “I am sorry, I don’t know the answer”. After that, the model will
    emit the query and `<SEARCH_END>`.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要一些等效机制来允许模型刷新其信息或回忆。我们可以通过引入模型工具来实现这一点。模型可以使用网络搜索工具，而不仅仅是回复“我很抱歉，我不知道答案”。为了实现这一点，我们需要引入特殊的标记，例如`<SEARCH_START>`和`<SEARCH_END>`，以及一个定义模型如何使用这些标记的协议。在这个机制中，语言模型可以发出特殊的标记。现在，在模型不知道答案的情况下，它可以选择发出特殊标记`<SEARCH_START>`而不是回复“我很抱歉，我不知道答案”。之后，模型将发出查询和`<SEARCH_END>`。
- en: Here when the program that is sampling from the model encounters the special
    token `<SEARCH_START>` during inference, it will pause the generation process
    instead of sampling the next token in the sequence. It will initiate a session
    with the search engine, input the search query into the search engine, and retrieve
    all the extracted text from the results. Then it will insert that text inside
    the context window.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，当从模型中采样的程序在推理过程中遇到特殊标记`<SEARCH_START>`时，它将暂停生成过程，而不是在序列中采样下一个标记。它将启动一个与搜索引擎的会话，将搜索查询输入到搜索引擎中，并检索所有从结果中提取的文本。然后，它将把这段文本插入到上下文窗口中。
- en: The extracted text from the web search is now within the context window that
    will be fed into the neural network. Think of the context window as the working
    memory of the model. The data inside the context window is directly accessible
    by the model. It is directly fed into the neural network. Therefore it is no longer
    a vague recollection of information. Now, when sampling new tokens, it can very
    easily reference the data that has been copy-pasted there. Thus, this is a general
    overview of how these web search tools function.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 从网络搜索中提取的文本现在位于上下文窗口中，该窗口将被输入到神经网络中。将上下文窗口视为模型的短期记忆。上下文窗口内的数据可以直接被模型访问。它直接输入到神经网络中。因此，它不再是模糊的信息回忆。现在，当采样新的标记时，它可以非常容易地引用已经复制粘贴到那里的数据。因此，这是这些网络搜索工具功能的一般概述。
- en: '![](../Images/5660b9fc3a6a01aee4f393f6984b0eec.png)'
  id: totrans-60
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/5660b9fc3a6a01aee4f393f6984b0eec.png)'
- en: An example of a training instance with special tokens. The […] notation indicates
    the placeholder for the extracted content
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 一个具有特殊标记的训练实例示例。[...] 符号表示提取内容的占位符
- en: 'How can we teach the model to correctly use these tools like web search? Again
    we accomplish this through training sets. We now need enough data and numerous
    conversations that demonstrate, by example, how the model should use web search.
    We need to illustrate with examples aspects such as: “What are the settings where
    you are using the search? What does it look like? How do you start a search?”
    Because of the pretraining stage, it possesses a native understanding of what
    a web search is and what constitutes a good search query. Therefore, if your training
    set contains several thousand examples, the model will be able to understand clearly
    how the tool works.'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 我们如何教会模型正确使用这些工具，比如网络搜索？我们再次通过训练集来完成这项任务。我们现在需要足够的数据和许多对话，通过实例展示模型应该如何使用网络搜索。我们需要用实例来说明一些方面，例如：“你在什么设置下使用搜索？它看起来像什么？你如何开始搜索？”由于预训练阶段，它对网络搜索是什么以及构成一个好的搜索查询有天然的理解。因此，如果你的训练集包含数千个示例，模型将能够清楚地理解这个工具的工作方式。
- en: Conclusion
  id: totrans-63
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: Large language model hallucinations are inherent consequences of the training
    pipeline, particularly arising from the supervised fine-tuning stage. Since language
    models are designed to generate statistically probable text, they often produce
    responses that appear plausible but lack a factual basis.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 大型语言模型的幻觉是训练流程的固有后果，尤其是起源于监督微调阶段。由于语言模型被设计成生成统计上可能性的文本，它们经常产生看似合理但缺乏事实基础的回应。
- en: Early models were prone to hallucinations significantly. However, the problem
    has improved with the implementation of various mitigation strategies. Knowledge
    probing techniques and training the model to use web search tools have been proven
    effective in mitigating the problem. Despite these improvements, completely eliminating
    hallucinations remains an ongoing challenge. As LLMs continue to evolve, mitigating
    hallucinations to a large extent is crucial to ensuring their reliability as a
    trustworthy knowledge base.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 早期模型容易产生显著的幻觉。然而，随着各种缓解策略的实施，这个问题已经得到了改善。知识探测技术和训练模型使用网络搜索工具已被证明是缓解问题的有效方法。尽管有这些改进，完全消除幻觉仍然是一个持续性的挑战。随着大型语言模型继续发展，在很大程度上缓解幻觉对于确保它们作为可信知识库的可靠性至关重要。
