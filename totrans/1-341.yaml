- en: 'The Generalist: The New All-Around Type of Data Professional?'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/the-generalist-the-new-all-around-type-of-data-professional/](https://towardsdatascience.com/the-generalist-the-new-all-around-type-of-data-professional/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1756513086615" class="mdspan-comment">The early-2000s</mdspan>
    (or 2010s to be more precise) big-data boom brought the emergence of specialization
    in data roles. What used to be solely described as “Business Intelligence Engineer”
    was further broken down into Business Intelligence Engineers/Analysts, Data Engineers/Analysts,
    Data Scientists etc. The reason for this? The abundance of data, and the multidisciplinary
    responsibilities that come with it, which could not be tamed by one generic job
    description. So, there was a need to break it down to smaller pieces because of
    the variety of day-to-day tasks. Approaching the end of 2025 though, are we now
    going back to more generalized data roles?
  prefs: []
  type: TYPE_NORMAL
- en: The Rise of the Data Generalist
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Let’s take it from the start. What do I mean by Data Generalists? If you Google
    “generalist definition”, it gives you the following definition:'
  prefs: []
  type: TYPE_NORMAL
- en: '*“A person competent in several different fields or activities”*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Take the above definition and apply it to the data sector. The more experience
    I get in the data field, the greater is the extent that I see an increase in demand
    for data generalists.
  prefs: []
  type: TYPE_NORMAL
- en: Nowadays, a data engineer is not only expected to know how to implement data
    pipelines in order to transfer data from point A to point B. You expect them to
    know how to spin up cloud resources, implement CI/CD pipelines and best practices,
    and also develop AI/ML models. That means that cloud, DevOps and machine learning
    engineering are all part of the modern data engineer’s tech stack now.
  prefs: []
  type: TYPE_NORMAL
- en: Similarly, a data scientist doesn’t just develop models in a notebook that will
    never end up somewhere in production. They have to know how to work in production
    and serve the AI/ML models by possibly using containers or APIs. That is an overlap
    of data science, machine learning engineering, and cloud all over again.
  prefs: []
  type: TYPE_NORMAL
- en: So, you see where this is going? What could be the reasons that these roles
    are nowadays getting all mixed up and overlapped with each other? Why are data
    roles more demanding now and the tech stack required includes multiple disciplines?
    Is this indeed the era where the data generalist is on the rise?
  prefs: []
  type: TYPE_NORMAL
- en: 'My personal opinion to why data generalists are now flourishing is due to the
    3 main reasons:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Emergence of Cloud Services**'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Explosion of Startup Companies**'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Evolution of Artificial Intelligence Tools**'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Let’s evaluate.
  prefs: []
  type: TYPE_NORMAL
- en: Emergence of Cloud Services
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![](../Images/5cc5c7953152505444219f9ffe5000b9.png)'
  prefs: []
  type: TYPE_IMG
- en: Photo by [Growtika](https://unsplash.com/@growtika?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on [Unsplash](https://unsplash.com/photos/diagram-TKAg3WignSw?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
  prefs: []
  type: TYPE_NORMAL
- en: Cloud services have come a long way since 2010, bringing everything to a single
    platform. AWS, Google and Azure are making it much easier and accessible now for
    professionals to have access to resources and services that can be used to deploy
    applications. This means some of the over-specified roles, that operated these
    functions, are now offloaded to the cloud providers and the data professionals
    stick to data side of things.
  prefs: []
  type: TYPE_NORMAL
- en: For example, if you use a Platform as a Service (PaaS) data warehouse, you don’t
    need to worry about the virtual machine it runs on, the operating system, updates
    etc. A data engineer can immediately take over database administrator or system
    engineer tasks without too much burden on their day to day tasks. Instead of having
    2-3 people maintaining the data warehouse, 1 is enough. That also means that the
    data engineer needs to have an understanding of infrastructure and database administration
    on top of the usual data engineering tasks.
  prefs: []
  type: TYPE_NORMAL
- en: The way that the industry is evolving, with more Software as a Service (SaaS)
    products being developed (such as Databricks, Snowflake and Fabric), I think that
    this trend is going to be the new norm. These products now make it easy for a
    data professional to handle the whole end-to-end data pipeline from a single platform.
    Of course, this comes with a price.
  prefs: []
  type: TYPE_NORMAL
- en: Explosion of Startup Companies
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![](../Images/fdb7295361778e0a347838e98541c5c2.png)'
  prefs: []
  type: TYPE_IMG
- en: Photo by [Daria Nepriakhina 🇺🇦](https://unsplash.com/@epicantus?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on [Unsplash](https://unsplash.com/photos/pile-of-assorted-title-books-xY55bL5mZAM?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
  prefs: []
  type: TYPE_NORMAL
- en: Startups are increasingly critical and economical driving forces for each country.
    An astonishing number of over 150 million startups exist worldwide, as reported
    in this [study,](https://techstartups.com/2025/03/03/startup-statistics-20-surprising-facts-you-need-to-know-in-2025/#:~:text=Top%2020%20Startup%20Statistics%20for,are%20now%20a%20global%20phenomenon.)
    with about 50 million new business launching each year. Of these, there are more
    than 1,200 unicorn startups worldwide. Based on these figures, no one can argue
    with us living in an era of startup dominance.
  prefs: []
  type: TYPE_NORMAL
- en: Say you have an idea that you want to turn into a startup company, what type
    of people are you looking to surround yourself with? Are you going for people
    with a niche expertise on data or individuals with more generic knowledge that
    know how to navigate around the whole end-to-end data pipeline? I would think
    it’s the latter one.
  prefs: []
  type: TYPE_NORMAL
- en: Deep expertise is good for multinational companies where you get to work on
    very specific things everyday but being a data generalist is your passport to
    startups. At least, that’s what I noticed from my experience.
  prefs: []
  type: TYPE_NORMAL
- en: Artificial Intelligence Tools
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![](../Images/281b4b0dc5f75d887d719bda1ed89ae0.png)'
  prefs: []
  type: TYPE_IMG
- en: Photo by [Igor Omilaev](https://unsplash.com/@omilaev?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on [Unsplash](https://unsplash.com/photos/a-computer-chip-with-the-letter-a-on-top-of-it-eGGFZ5X2LnA?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
  prefs: []
  type: TYPE_NORMAL
- en: '**November 2022** – a month in the history books for the technology world where
    everything changed. **The release of ChatGPT**. ChatGPT brought the revolution
    in the AI world. From that day, every day is different in the tech sector. The
    impact on the industry? Huge. AI tools being released every day, each with its
    own strengths and weaknesses.'
  prefs: []
  type: TYPE_NORMAL
- en: Long gone are the days where in order to write a piece of code or to gain some
    knowledge you had to go to stack overflow and read whether anyone had a similar
    issue with you in the past and has solved it. This was the way that things used
    to be in order to start developing a solution. Now, every data professional writes
    code with an AI buddy all day long. AI can answer questions, make you work more
    efficiently but also get a relatively easy head start on things you have never
    done before. Of course it still makes mistakes, but if you prompt it correctly
    and ask the right questions you get amazing help from it.
  prefs: []
  type: TYPE_NORMAL
- en: How is this related to data generalists? Nowadays, if you know the right questions
    for ChatGPT or Gemini or Copilot (or whatever other AI exists out there) you can
    do things incredibly fast. So if a data engineer wants to get a quick overview
    of how to develop a linear regression model, AI can help. If a data scientist
    wants help in creating a cloud resource, AI can help.
  prefs: []
  type: TYPE_NORMAL
- en: This is how this industry is developing and where things are heading. This is
    also the reason why I think if you are a good data generalist these days and you
    know how to ask the right questions, you can achieve anything. The expertise will
    come later, depending on the repetition of a task and the errors you encounter
    on the way.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We are living in a time where the data landscape evolves at an incredible pace.
    Each day brings new challenges and new tools to learn. Yet, I believe that focusing
    on the bigger picture and developing as a data generalist will be the key to long-term
    success.
  prefs: []
  type: TYPE_NORMAL
- en: By nailing the fundamentals and understanding the architecture of the entire
    data pipeline end-to-end, you position yourself as someone who will remain highly
    demanded in the future. In many ways, the industry seems to be shifting back towards
    valuing versatile data generalists over narrowly specialized roles.
  prefs: []
  type: TYPE_NORMAL
- en: Of course, this is just my opinion—but I’d love to hear yours.
  prefs: []
  type: TYPE_NORMAL
