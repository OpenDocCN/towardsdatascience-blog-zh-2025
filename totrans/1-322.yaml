- en: 'AI Operations Under the Hood: Challenges and Best Practices'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: AI运维内部：挑战和最佳实践
- en: 原文：[https://towardsdatascience.com/ai-operations-under-the-hood-challenges-and-best-practices/](https://towardsdatascience.com/ai-operations-under-the-hood-challenges-and-best-practices/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://towardsdatascience.com/ai-operations-under-the-hood-challenges-and-best-practices/](https://towardsdatascience.com/ai-operations-under-the-hood-challenges-and-best-practices/)'
- en: Models alone aren’t enough; having a full system stack and great, successful
    products is the key. Satya Nadella – <mdspan datatext="el1756926482415" class="mdspan-comment">CEO
    of Microsoft</mdspan> [1].
  id: totrans-2
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 单独的模型是不够的；拥有完整的系统栈和优秀、成功的产物才是关键。萨蒂亚·纳德拉 – <mdspan datatext="el1756926482415"
    class="mdspan-comment">微软公司首席执行官</mdspan> [1]。
- en: '<mdspan datatext="el1756926823377" class="mdspan-comment">Generative AI is
    a zoo</mdspan> of specialized models, vision, language, segmentation, diffusion,
    and Mixture-of-Experts, often orchestrated together. Today the stack spans several
    types: **LLM, LCM, LAM, MoE, VLM, SLM, MLM, and SAM** [2], alongside the rise
    of **agents**. Precisely because the stack is this heterogeneous and fast-moving,
    teams need a **practical framework** that guarantees: rigorous **evaluation**
    (factuality, relevance, drift), built-in **safety** and compliance (PII, policy,
    red-teaming), and dependable **operations** (CI/CD, observability, rollback, cost
    controls). Without a framework, most models simply mean more risk and less reliability.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1756926823377" class="mdspan-comment">生成式AI是一个由专门模型、视觉、语言、分割、扩散和专家混合组成的动物园</mdspan>，通常协同工作。如今，这个栈涵盖了多种类型：**LLM、LCM、LAM、MoE、VLM、SLM、MLM和SAM**
    [2]，伴随着**代理**的兴起。正是因为栈如此异构且快速变化，团队需要一个**实用的框架**来保证：严格的**评估**（事实性、相关性、漂移）、内置的**安全性**和合规性（PII、政策、红队），以及可靠的**操作**（CI/CD、可观察性、回滚、成本控制）。没有框架，大多数模型仅仅意味着更多的风险和更少的可靠性。
- en: In this article, we’ll summarize the main issues and illustrate them with a
    real application example. This is not meant to be exhaustive but aims to illustrate
    the key difficulties.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们将总结主要问题，并通过一个实际应用示例来展示它们。这不是要详尽无遗，而是旨在说明关键困难。
- en: It is well known that a picture is worth a thousand words (and, behind the shine
    of AI, perhaps even more). To illustrate and emphasize the core challenges in
    developing systems based on Large Language Models (LLMs), I created the diagram
    in Figure 1, which outlines a potential approach for managing information buried
    inside long, tedious contracts. While many claim that AI will revolutionize every
    aspect of technology (and leave data scientists and engineers without jobs), the
    reality is that **building robust, reproducible, and reliable applications requires
    a framework** of continuous improvement, rigorous evaluation, and systematic validation.
    Mastering this rapidly evolving landscape is anything but trivial, and it would
    certainly take more than a single article to highlight all the details.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 众所周知，一张图片胜过千言万语（在AI的闪光之下，可能更多）。为了说明和强调基于大型语言模型（LLM）开发系统时的核心挑战，我创建了图1中的图表，概述了管理长而繁琐合同中隐藏信息的潜在方法。虽然许多人声称AI将革命性地改变技术的每一个方面（并让数据科学家和工程师失业），但现实是，**构建稳健、可重复和可靠的应用需要持续改进、严格评估和系统验证的框架**。掌握这个快速发展的领域绝非易事，而且肯定需要不止一篇文章来突出所有细节。
- en: This diagram (Figure 1) could be a perfect application for a contact center
    in the insurance sector. If you’ve ever tried to read your own insurance contract,
    you’ll know it’s often dozens of pages filled with dense legal language (the kind
    most of us tend to skip). The truth is, even many insurance employees don’t always
    know the fine details… but let’s keep that between us! 😉 After all, who could
    memorize the exact coverages, exclusions, and limits across hundreds of products
    and insurance types? That’s precisely the kind of complexity we aimed to address
    with this system.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 这个图表（图1）可能是保险行业客服中心的完美应用。如果你曾经尝试阅读自己的保险合同，你会知道它通常有几十页，充满了密集的法律语言（我们大多数人倾向于跳过的那种）。事实是，即使许多保险员工也不总是了解细节……但让我们之间保留这个秘密！😉毕竟，谁能够记住数百种产品和保险类型的确切承保范围、除外责任和限制？这正是我们希望通过这个系统解决的那种复杂性。
- en: The ultimate goal is to create a tool for the contact center staff, adjusters
    and fraud investigators, that can instantly answer complex questions such as policy
    limits or specific coverage conditions in specific situations. But while the application
    may seem simple on the surface, what I want to highlight here are the deeper challenges
    any developer faces when maintaining and improving these kinds of systems.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 最终目标是创建一个工具，供客户服务中心的员工、理赔人员和欺诈调查员使用，可以立即回答复杂的查询，例如特定情况下的保险限额或具体的承保条件。但尽管这个应用表面上看起来很简单，我想在这里强调的是，任何开发者维护和改进这类系统时都会面临的更深层次的挑战。
- en: '![](../Images/6b7c7d1b471e4f2aec8113d54ffe3dc9.png)'
  id: totrans-8
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6b7c7d1b471e4f2aec8113d54ffe3dc9.png)'
- en: Figure 1\. My best attempt to explain a LLM based application the use **prompt**
    engineering, fine-**tuning** and **RAG** aproach. Image by Author.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 图1. 我最好的尝试来解释基于LLM的应用，使用**提示工程**、微调**和RAG方法**。图片由作者提供。
- en: This goes far beyond just building a cool demo. It requires continuous monitoring,
    validation, bias mitigation, and user-driven refinement. These **tasks are often
    labeled ‘Business-As-Usual’ (BAU)**, but in practice they demand significant time
    and effort. This technical debt for this particular example can fall under a category
    called LLMOps (or more broadly GenAIOps or AIOps), which, although based on similar
    principles to the old friend MLOps, includes the unique challenges of Large Language
    Models.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 这远远超出了仅仅构建一个酷炫演示。它需要持续的监控、验证、偏差缓解和用户驱动的改进。这些**任务通常被标记为“常规业务”（BAU）**，但在实践中它们需要大量的时间和精力。这个特定示例的技术债务可以归类为LLMOps（或更广泛地说，GenAIOps或AIOps），尽管它基于与老朋友MLOps相似的原则，但它包括了大型语言模型独特的挑战。
- en: It’s a field that blends **DevOps with governance, safety and responsibility,**
    and yet… unless you’re seen as an ‘innovation’, no one pays much attention. **Until
    it breaks.** Then suddenly it becomes **important** (especially when regulators
    come knocking with RAI fines)**.**
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个将**DevOps与治理、安全和责任**相结合的领域，然而……除非你被视为一个‘创新’，否则没有人会过多关注。**直到它出了问题**。然后突然之间它变得**重要**（尤其是当监管机构带着RAI罚款来敲门时）****。
- en: As promised, after my long complaint 😓, let me walk you through the actual steps
    behind the diagram.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 正如承诺的那样，在我长时间的抱怨😓之后，让我带你了解图表背后的实际步骤。
- en: It all starts, of course, with **data** (yeah… you still need data scientists
    or data engineers). Not clean, beautiful, labeled data… no. We’re talking **raw,
    unstructured and unlabeled data**, “things” like insurance dictionaries, multi-page
    policy contracts, or even transcripts from contact center conversations. And because
    we want to build something useful, we also need a **truth or gold standard (**benchmark
    you trust for evaluation), or at least something like that… If you’re an ethical
    professional who wants to build real value, you’ll need to find the truth in the
    simplest way, but always the right way.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，一切始于**数据**（是的……你仍然需要数据科学家或数据工程师）。不是干净、漂亮、标记过的数据……不是。我们说的是**原始、非结构化和未标记的数据**，“事物”如保险词典、多页政策合同，甚至是客户服务中心对话的记录。因为我们想要构建有用的东西，我们还需要一个**真理或黄金标准（你信任的用于评估的基准），或者至少类似的东西……如果你是一个希望创造真正价值的道德专业人士，你需要以最简单但始终正确的方式找到真理**。
- en: Once you’ve got the raw data, the next step is to **process it** into something
    the LLM can actually digest. That means cleaning, chunking, standardizing, and
    if you’re working with transcripts, removing all the filler and noise (step 4
    in Figure 1).
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦你获得了原始数据，下一步就是将其**处理**成LLM（大型语言模型）能够实际消化的东西。这意味着清洗、分块、标准化，如果你在处理记录，还需要去除所有填充和噪音（图1中的第4步）。
- en: Now, we use a prompt and a base **LLM (in this case LLaMA)** to automatically
    generate **question-answer pairs** from the processed documents and transcriptions
    (step 5, that uses steps 1-2). That forms the supervised dataset for fine-tuning
    (step 6). These data should contain the pair question-answer, the categorization
    of the question and the source (name and page), this last for validation. The
    prompt instructs the model to explicitly state when sources are contradictory
    or when the required information is missing. For the categorization, we assign
    each question a category using **zero-shot classification** over a fixed taxonomy;
    when higher accuracy is needed, we switch to **few-shot classification** by adding
    a few labeled examples to the prompt.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们使用一个提示和一个基础**LLM（在这种情况下是LLaMA**）来自动从处理过的文档和转录中生成**问答对**（步骤5，使用步骤1-2）。这形成了微调的监督数据集（步骤6）。这些数据应包含问答对、问题的分类和来源（名称和页面），最后一个是用于验证。提示指导模型明确指出来源是否矛盾或所需信息缺失。对于分类，我们使用固定分类法中的**零样本分类**为每个问题分配一个类别；当需要更高的准确性时，我们通过向提示中添加少量标记示例切换到**少样本分类**。
- en: LLM-assisted labelling accelerates setup but has drawbacks (hallucinations,
    shallow coverage, style drift), so it is important to pair it with automatic checks
    and targeted human review before training.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: LLM辅助标注可以加速设置，但存在缺点（幻觉、覆盖面浅、风格漂移），因此在训练前与自动检查和针对性人工审查相结合非常重要。
- en: 'Additionally, we create a ground-truth (step 3) set: domain-expert–authored
    question–answer pairs with sources, used as a benchmark to evaluate the solution.
    This sample has fewer rows than the fine-tuning dataset but gives us a clear idea
    of what to expect. We can also expand it during pilot trials with a small group
    of users before production.'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我们还创建了一个基准集（步骤3）：由领域专家撰写的带来源的问答对，用作评估解决方案的基准。这个样本的行数比微调数据集要少，但能让我们清楚地了解预期内容。我们还可以在生产前通过小规模用户试点试验来扩展它。
- en: To personalize the user’s response (LLMs lacks of specialized domain knowledge)
    we decided to **fine-tune a open-source model called Mixtral using LoRA** (step
    6). The idea was to make it more “insurance-friendly” and able to respond in a
    tone and language closer to how real insurance people communicate, we evaluate
    the results with steps 3 and 7\. Of course, we also wanted to complement that
    with **long-term memory**, which is where AWS **Titan embeddings** and vector
    search come into play (step 8). This is the **RAG architecture**, combining semantic
    retrieval with context-aware generation.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使用户的回答个性化（LLM缺乏专门的领域知识），我们决定**使用LoRA微调一个开源模型Mixtral**（步骤6）。我们的想法是让它更加“保险友好”，并能以更接近真实保险人员交流的方式回应，我们通过步骤3和7来评估结果。当然，我们也想通过**长期记忆**来补充这一点，这正是AWS
    **Titan嵌入**和向量搜索发挥作用的地方（步骤8）。这是**RAG架构**，结合语义检索和上下文感知生成。
- en: 'From there, the flow is simple:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 从那里，流程很简单：
- en: The **user asks a question** (step 13), the system retrieves top relevant chunks
    (step 9 & 10) from the knowledge base using vector search + metadata filters (to
    make it more scalable to different insurance branches and types of clients), and
    the LLM (fine-tuned multilingual Mixtral) generates a well-grounded response using
    a carefully engineered prompt (step 11).
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: '**用户提出一个问题**（步骤13），系统使用向量搜索+元数据过滤器从知识库中检索最相关的块（步骤9 & 10）（以使其更易于扩展到不同的保险分支和客户类型），然后LLM（微调的多语言Mixtral）使用精心设计的提示生成一个有充分依据的回答（步骤11）。'
- en: These elements summarise the diagram, but behind this there are challenges and
    details that, if not taken care of, can lead to reproducing unwanted behaviour;
    for this reason, there are elements that are necessary to incorporate in order
    not to lose control of the application.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 这些元素总结了图表，但在这背后存在挑战和细节，如果不加以注意，可能会导致产生不希望的行为；因此，有必要纳入一些元素，以避免失去对应用程序的控制。
- en: Well … Let’s begin with the article 😄…
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧……让我们从这篇文章开始吧 😄…
- en: 'In production, things change:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 在生产中，事情会发生变化：
- en: Users ask unexpected questions.
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用户会提出意想不到的问题。
- en: Context retrieval fails silently and the model answers with false confidence.
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 上下文检索失败时无声无息，模型以虚假的自信回答。
- en: Prompts degrade in quality over time, that’s called *prompt drift*.
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提示的质量会随时间下降，这被称为*提示漂移*。
- en: 'Business logic shifts (over time, policies evolve: new exceptions, amended
    terms, new clauses, riders/endorsements, and entirely new contract versions driven
    by regulation, market shifts, and risk changes.)'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 业务逻辑（随时间推移，政策演变：新的例外、修正条款、新条款、附加条款/背书，以及由法规、市场变化和风险变化驱动的全新合同版本。）
- en: Fine-tuned models behave inconsistently.
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 微调模型的行为不一致。
- en: 'This is the part most people forget: the lifecycle doesn’t end at deployment,
    it starts there.'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 这是大多数人忘记的部分：生命周期并不在部署时结束，而是从那时开始。
- en: What does “Ops” cover?
  id: totrans-30
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: “Ops”涵盖什么？
- en: I created this diagram (Figure 2) to visualize how all the pieces fit together.
    The steps, the logic, the feedback loops, at least how I lived them in my experience.
    There are certainly other ways to represent this, but this is the one I find most
    complete.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 我创建了这张图（图2）来可视化所有部件如何组合在一起。步骤、逻辑、反馈循环，至少是我根据我的经验所经历的。当然还有其他表示方法，但这是我认为最完整的一种。
- en: '![](../Images/416e1600d8e4e9cbc65649185bcec4c5.png)'
  id: totrans-32
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/416e1600d8e4e9cbc65649185bcec4c5.png)'
- en: 'Figure 2\. End-to-end AI product lifecycle: negative decisions route to deprecation,
    with feedback loops driving refinement. Image by Author.'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.端到端AI产品生命周期：负面决策导向弃用，通过反馈循环驱动优化。图由作者提供。
- en: We assume this diagram runs on a secure stack with controls that protect data
    and prevent unauthorized access. This doesn’t remove our responsibility to verify
    and validate security throughout development; for that reason, I include a developer-level
    safeguard box, which I’ll explain in more detail later.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 我们假设这个图示在安全的堆栈上运行，具有保护数据和防止未授权访问的控制。这并不免除我们在整个开发过程中验证和验证安全性的责任；因此，我包括一个开发者级别的安全防护框，稍后我会更详细地解释。
- en: 'We intentionally follow a linear gate: Data Management → Model Development
    → Evaluation & Monitoring → Deploy (CI/CD). Only models that pass offline checks
    are deployed; once in production online monitoring then feeds back into data and
    model refinement (loop). After the first deployment, we use online monitoring
    to continuously refine and improve the solution.'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 我们有意遵循一个线性的门控：数据管理 → 模型开发 → 评估与监控 → 部署（CI/CD）。只有通过离线检查的模型才会被部署；一旦投入生产，在线监控就会反馈到数据和模型优化（循环）。在第一次部署之后，我们使用在线监控来持续优化和改进解决方案。
- en: 'Just in case, we briefly describe each step:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 万一的话，我们将简要描述每个步骤：
- en: '**Model Development:** here you define the “ideal” or “less wrong” model architecture
    aligned with business necessities. Gather initial datasets, maybe fine-tune a
    model (or just prompt-engineer or RAG or altogether). The goal? Get something
    working — a prototype/MVP that proves feasibility. After the first production
    release, keep refining via retraining and, when appropriate, incorporate advanced
    techniques (e.g., RL/RLHF) to improve performance.'
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**模型开发**：在这里，你定义与业务需求一致的“理想”或“不那么错误”的模型架构。收集初始数据集，也许微调一个模型（或者只是提示工程或RAG，或者全部）。目标？得到一些可以工作的事情——一个证明可行性的原型/MVP。在第一次生产发布后，通过重新训练保持优化，并在适当的时候，采用高级技术（例如，RL/RLHF）来提高性能。'
- en: '**Data Management:** Handling versions for data and **prompts;** keep metadata
    related with versioning, schemas, sources, operational signals (as token usage,
    latency, logs), etc. Manage and govern raw and processed data in all their forms:
    printed or handwritten, structured and unstructured, including texts, audio, videos,
    images, relational, vectorial and graphs databases or any other type that can
    be used by the system. Even **extract information** from unstructured formats
    and metadata; maintain a **graph store** that RAG can query to power analytical
    use cases. And please don’t make me talk about “quality,” which is often poorly
    handled, introduces noise into the models, and ultimately makes the work harder.'
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据管理**：处理数据和**提示**的版本；保留与版本、架构、来源、操作信号（如令牌使用、延迟、日志）等相关的元数据。以所有形式管理并治理原始和经过处理的数据：打印或手写的，结构化和非结构化的，包括文本、音频、视频、图像、关系型、矢量型和图数据库或任何其他系统可以使用的类型。甚至**从非结构化格式和元数据中提取信息**；维护一个RAG可以查询的**图存储**，以支持分析用例。请不要让我谈论“质量”，这通常处理不当，会向模型引入噪声，并最终使工作更难。'
- en: '**Model Deployment (CI/CD):** package the model and its dependencies into a
    reproducible artifact for promotion across environments; expose the artifact for
    inference (REST/gRPC or batch); and run testing pipelines that **automatically
    check every change and block deployment if thresholds fail** (unit tests, data/schema
    checks, linters, offline evals on golden sets, performance/security scans, canary/blue-green
    with rollback).'
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**模型部署（CI/CD）：** 将模型及其依赖项打包成一个可重复的工件，以便在不同环境中推广；暴露工件以进行推理（REST/gRPC 或批量）；并运行测试管道，**自动检查每个更改，如果阈值失败则阻止部署**（单元测试、数据/模式检查、代码检查器、在黄金集上的离线评估、性能/安全扫描、金丝雀/蓝绿部署并回滚）。'
- en: '**Monitoring & Observability:** Tracking model performance, drift, usage, errors
    in production.'
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**监控与可观察性：** 跟踪模型性能、漂移、使用情况和生产中的错误。'
- en: '**Safeguards:** Defend against prompt injection, enforce access controls, protect
    data privacy, and evaluate for bias and toxicity.'
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**保障措施：** 防止提示注入、执行访问控制、保护数据隐私，并评估偏见和毒性。'
- en: '**Cost Management:** Monitoring and controlling usage and costs; budgets, per-team
    quotas, tokens, etc.'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**成本管理：** 监控和控制使用和成本；预算、团队配额、令牌等。'
- en: '**Business value:** Develop a business case to analyse whether projected outcomes
    actually makes sense compared to what is actually delivery. The value of this
    kind of solution is **not seen immediately**, but rather over time. There are
    a series of **business considerations** that generate costs and should help determine
    whether the application still makes sense or not. This step is **not an easy one**
    (especially for embedded applications), but at the very least, it requires discussion
    and debate. It is an exercise that is required to be done.'
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**商业价值：** 制定一个业务案例来分析预期的结果是否与实际交付的内容相比有意义。此类解决方案的价值**并非立即显现**，而是在一段时间后。有一系列**商业考量**会产生成本，并应有助于确定应用程序是否仍然有意义。这一步**并不容易**（尤其是对于嵌入式应用程序），但至少需要讨论和辩论。这是一项必须完成的练习。'
- en: So, to transform our prototype into a production-grade, maintainable application,
    several critical layers must be addressed. These aren’t extras; they’re the essential
    steps to ensure every detail is properly managed. In what follows, I’ll focus
    on observability (evaluation and monitoring) and safeguards, since the broader
    topic could fill a book.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，为了将我们的原型转变为一个生产级、可维护的应用程序，必须解决几个关键层。这些不是额外的；它们是确保每个细节都得到适当管理的必要步骤。在接下来的内容中，我将重点关注可观察性（评估和监控）和保障措施，因为更广泛的话题可能需要一本书来阐述。
- en: Evaluation & Monitoring
  id: totrans-45
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 评估与监控
- en: '**Observability** is about continuously monitoring the system over time to
    ensure it keeps performing as expected. It involves tracking the key metrics to
    detect gradual degradation, drift, or other deviations across inputs, outputs,
    and intermediate steps (retrieval results, prompt, API calls, among others), and
    capturing them in a form that supports analysis and subsequent refinement.'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: '**可观察性**是指随着时间的推移持续监控系统，以确保其保持预期的性能。它涉及跟踪关键指标以检测输入、输出和中间步骤（检索结果、提示、API 调用等）的逐渐退化、漂移或其他偏差，并以支持分析和后续改进的形式捕获它们。'
- en: '![](../Images/8a854d086200f3eeacc92664c20ea5a2.png)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/8a854d086200f3eeacc92664c20ea5a2.png)'
- en: Table 1\. Key metrics for evaluating language model performance and safety.
    Table by Author.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 表 1. 评估语言模型性能和安全的指标。表由作者提供。
- en: With this in place, you can automate alerts that trigger when defined thresholds
    are crossed e.g., a sudden drop in answer relevance, a rise in retrieval latency,
    or unexpected spikes in token usage.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 在此基础上，您可以自动化警报，当定义的阈值被跨越时触发，例如，答案相关性的突然下降，检索延迟的增加，或令牌使用量的意外激增。
- en: To ensure that the application behaves correctly at different stages, it is
    highly useful to create a **truth or golden dataset** curated by domain experts.
    This dataset serves as a benchmark for validating responses during training, fine-tuning,
    and evaluation (step 3, figure 1).
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 为了确保应用程序在不同阶段的行为正确，创建由领域专家精心制作的**真实或黄金数据集**非常有用。此数据集作为在训练、微调和评估（步骤 3，图 1）期间验证响应的基准。
- en: '**Evaluate fine-tuning:**'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: '**评估微调：**'
- en: We begin by measuring hallucination and answer relevance. We then compare these
    metrics between a baseline Mixtral model (without fine-tuning) and our Mixtral
    model fine-tuned for insurance-specific language (step 6, Figure 1).
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 我们首先测量幻觉和答案相关性。然后，我们将这些指标与基线 Mixtral 模型（未微调）和针对特定于保险的语言微调的我们的 Mixtral 模型进行比较（步骤
    6，图 1）。
- en: 'The comparison between the baseline and the fine-tuned model serves two purposes:
    (1) it shows whether the fine-tuned model is better adapted to the Q&A dataset
    than the untuned baseline, and (2) it allows us to set a threshold to detect performance
    degradation over time, both relative to prior versions and to the baseline.'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 基线模型与微调模型的比较有两个目的：（1）它表明微调模型是否比未调优的基线更适合问答数据集，以及（2）它允许我们设置一个阈值来检测性能随时间下降，无论是相对于先前版本还是相对于基线。
- en: With this in mind we tried Claude 3 (via AWS Bedrock) to score each model response
    against a domain-expert gold answer. The highest score means “equivalent to or
    very close to the gold truth,” and the lowest means “irrelevant or contradictory.”
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 有了这个想法，我们尝试使用Claude 3（通过AWS Bedrock）对每个模型响应与领域专家的黄金答案进行评分。最高分意味着“等同于或非常接近黄金真相”，最低分则表示“无关或矛盾”。
- en: '**Claude claim-level evaluator.** We decompose each model answer into atomic
    claims. Given the gold evidence, Claude labels each claim as **entailed / contradicted
    / not_in_source** and returns JSON. If the context lacks the information to answer,
    a correct response like entailed (we prefer no answer than wrong answer). For
    each answer we compute **Claim Support (CS) = #entailed / total_claims** and **Hallucination
    rate = 1 − CS**, then report dataset scores by averaging CS (and HR) across all
    answers. This directly measures how much of the answer is confirmed by the domain
    expert answer and aligns with claim-level metrics found in the literature [3].'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '**Claude断言级别评估器**。我们将每个模型答案分解为原子断言。给定黄金证据，Claude将每个断言标记为**蕴含/矛盾/不在来源中**，并返回JSON。如果没有信息来回答上下文，则正确的响应如蕴含（我们宁愿没有答案也不愿有错误答案）。对于每个答案，我们计算**断言支持（CS）=蕴含/总断言数**和**幻觉率=1-CS**，然后通过平均所有答案的CS（和HR）来报告数据集分数。这直接衡量了答案中有多少部分得到了领域专家答案的确认，并与文献中发现的断言级别指标相一致[3]。'
- en: This claim-level evaluator offers greater granularity and effectiveness, especially
    when an answer contains a mix of correct and incorrect statements. Our previous
    scoring method assigned a single grade to overall performance, which obscured
    specific errors that needed to be addressed.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 这个基于断言级别的评估器提供了更高的粒度和有效性，尤其是在答案包含正确和错误陈述的混合时。我们之前的方法将单个等级分配给整体性能，这掩盖了需要解决的具体错误。
- en: The idea is to extend this metric to verify answers against the documentary
    sources and, additionally, maintain a second benchmark that is easier to build
    and update than a domain-expert set (and less prone to error). Achieving this
    requires further refinement.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 目的是将这个指标扩展到验证答案与文档来源的一致性，并且另外维护一个比领域专家集更容易构建和更新的基准（并且更不容易出错）。实现这一点需要进一步的细化。
- en: Additionally, to assess **answer relevance**, we compute cosine similarity between
    embeddings of the model’s answer and the gold answer. The drawback is that embeddings
    can look “similar” even when the facts are wrong. As an alternative, we use an
    LLM-as-judge (Claude) to label relevance as **direct**, **partial**, or **irrelevant**,
    (taking in account the question) similar to the approach above.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，为了评估**答案的相关性**，我们计算模型答案和黄金答案嵌入之间的余弦相似度。缺点是即使事实是错误的，嵌入也可能看起来“相似”。作为替代方案，我们使用一个作为法官的LLM（Claude）来标记相关性为**直接**、**部分**或**无关**（考虑到问题），类似于上述方法。
- en: These evaluations and ongoing monitoring can detect issues such as a question–answer
    dataset lacking context, sources, sufficient examples, or proper question categorization.
    If the fine-tuning prompt differs from the inference prompt, the model may tend
    to ignore sources and hallucinate in production because it never learned to ground
    its outputs in the provided context. Whenever any of these variables change, the
    monitoring system should **trigger an alert** and provide diagnostics to facilitate
    investigation and remediation.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 这些评估和持续的监控可以检测到问题，例如问答数据集缺乏上下文、来源、足够的示例或正确的问题分类。如果微调提示与推理提示不同，模型可能会在生产中忽略来源并产生幻觉，因为它从未学会将输出基于提供的上下文。每当这些变量发生变化时，监控系统应**触发警报**并提供诊断以促进调查和补救。
- en: '**Moderation:**'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: '**审查：**'
- en: To measure moderation or toxicity, we used the **DangerousQA** benchmark (200
    adversarial questions) [4] and had **Claude 3** evaluate each response with an
    adapted prompt, scoring 1 (highly negative) to 5 (neutral) across **Toxicity,
    Racism, Sexism, Illegality,** and **Harmful Content**. Both the base and fine-tuned
    **Mixtral** models consistently scored **4–5** in all categories, indicating no
    toxic, illegal, or disrespectful content.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 为了衡量调节或毒性，我们使用了**DangerousQA**基准（200个对抗性问题）[4]，并让**Claude 3**使用一个改编的提示评估每个响应，评分从1（高度负面）到5（中性），涵盖**毒性、种族主义、性别歧视、非法**和**有害内容**。基础和微调的**Mixtral**模型在所有类别中一致得分**4-5**，表明没有毒性、非法或不尊重的内容。
- en: Public benchmarks, such as DangerousQA often leak into LLM training data, which
    means that new models memorize this test items. This train-test data overlap leads
    to inflated scores and can obscure real risks. To mitigate it, alternatives like
    develop private benchmarks, rotate evaluation sets, or generate fresh benchmark
    variants are necessary to ensuring that test contamination does not artificially
    inflate model performance.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 公共基准，如DangerousQA，通常泄漏到LLM训练数据中，这意味着新模型会记住这些测试项目。这种训练-测试数据重叠会导致分数膨胀，并可能掩盖真实风险。为了减轻这种情况，需要采取替代方案，如开发私有基准、轮换评估集或生成新的基准变体，以确保测试污染不会人为地提高模型性能。
- en: '**Evaluate RAG:**'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: '**评估RAG：**'
- en: Here, we focus exclusively on the **quality of the retrieved context**. During
    preprocessing (step 4, Figure 1), we divide the documents into chunks, aiming
    to encapsulate coherent fragments of information. The objective is to ensure that
    the **retrieval layer ranks the most useful information at the top** before it
    reaches the generation model.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们专注于**检索上下文的质量**。在预处理（步骤4，图1）期间，我们将文档分成块，目的是封装信息的有意义片段。目标是确保在到达生成模型之前，**检索层将最有用的信息排在最前面**。
- en: 'We compared two retrieval setups: **(A) without reranking** : return the top-k
    passages using keyword or dense embeddings only; and **(B) with reranking:** retrieve
    candidates via embeddings, then reorder the top-k with a reranker (pretrained
    ms-marco-mini-L-12-v2 model in LangChain). For each question in a curated set
    with expert gold truth, we labeled the retrieved context as **Complete**, **Partial**,
    or **Irrelevant**, then summarized coverage (percent Complete/Partial/Irrelevant)
    and win rates between setups.'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 我们比较了两种检索设置：**（A）无重排序**：仅使用关键词或密集嵌入返回前k个段落；和**（B）有重排序**：通过嵌入检索候选内容，然后使用重排序器（在LangChain中预训练的ms-marco-mini-L-12-v2模型）重新排序前k个结果。对于每个包含专家黄金真实答案的精选集的问题，我们将检索到的上下文标记为**完整**、**部分**或**无关**，然后总结覆盖范围（百分比完整/部分/无关）和设置之间的胜率。
- en: 'Re-ranking consistently improved the context quality of results, but the gains
    were highly sensitive to **chunking/segmentation**: fragmented or incoherent chunks
    (e.g., clipped tables, duplicates) degraded final answers even when the relevant
    pieces were technically retrieved.'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 重排序一致地提高了结果上下文的质量，但收益对**分块/分割**非常敏感：碎片化或不连贯的块（例如，剪裁的表格、重复项）即使在技术上检索到相关部分时也会降低最终答案的质量。
- en: Finally, during production, user feedback and answer ratings from users is collected
    to enrich this ground truth over time. Frequently asked questions (FAQs) and their
    verified responses are also cached to reduce inference costs and provide fast,
    reliable answers with high confidence.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，在生产过程中，收集用户反馈和答案评分以随着时间的推移丰富这个黄金真实答案。常见问题（FAQ）及其验证过的响应也被缓存，以减少推理成本并提供快速、可靠的答案，具有高置信度。
- en: '**Rubrics as an alternative:**'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: '**作为替代方案的评分标准：**'
- en: The quick evaluation approach used to assess the RAG and fine-tuned model provides
    an initial general overview of model responses. However, an alternative under
    consideration is a **multi-step evaluation using domain-specific grading rubrics**.
    Instead of assigning a single overall grade, rubrics break down the ideal answer
    into a binary checklist of clear, verifiable criteria. Each criterion is marked
    as yes/no or true/false and supported by evidence or sources, enabling a precise
    diagnosis of where the model excels or falls short [15]. This systematic rubric
    approach offers a more detailed and actionable assessment of model performance
    but requires time for development, so it remains part of our technical debt roadmap.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 用于评估RAG和微调模型的快速评估方法提供了模型响应的初步一般概述。然而，正在考虑的另一种方法是使用**多步骤评估和领域特定评分标准**。评分标准不是分配一个单一的总体评分，而是将理想的答案分解为一系列清晰、可验证的二进制清单。每个标准都被标记为是/否或真/假，并辅以证据或来源，从而能够精确地诊断模型在哪些方面表现优异或不足[15]。这种系统性的评分标准方法提供了对模型性能的更详细和可操作的评估，但需要时间进行开发，因此它仍然是我们的技术债务路线图的一部分。
- en: Safeguards
  id: totrans-70
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 安全措施
- en: There is often pressure to deliver a minimum viable product as quickly as possible,
    which means that checking for potential vulnerabilities in datasets, prompts,
    and other development components is not always a top priority. However, extensive
    literature highlights the importance of **simulating and evaluating vulnerabilities**,
    such as testing adversarial attacks by introducing inputs that the application
    or system did not encounter during training/development. To effectively implement
    these security assessments, it is crucial to foster awareness that vulnerability
    testing is an essential part of both the development process and the overall security
    of the application.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 常常存在尽快交付最小可行产品的压力，这意味着在数据集、提示和其他开发组件中检查潜在漏洞并不总是首要任务。然而，大量文献强调了**模拟和评估漏洞**的重要性，例如通过引入在训练/开发过程中应用或系统未曾遇到过的输入来测试对抗性攻击。为了有效地实施这些安全评估，培养对漏洞测试是开发过程和应用程序整体安全的重要组成部分的认识至关重要。
- en: In Table 2, we outline several attack types with example impacts. For instance,
    GitLab recently faced a remote prompt injection that affected the AI Duo code
    assistant, resulting in source code theft. In this incident, attackers embedded
    hidden prompts in public repositories, causing the assistant to leak sensitive
    information from private repositories to external servers. This real-world case
    highlights how such vulnerabilities can lead to breaches, underscoring the importance
    of anticipating and mitigating prompt injection and other emerging AI-driven threats
    in application security.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 在表2中，我们概述了几种攻击类型及其示例影响。例如，GitLab最近面临了一次远程提示注入攻击，影响了AI Duo代码助手，导致源代码被盗。在这起事件中，攻击者在公共存储库中嵌入隐藏的提示，导致助手从私有存储库向外部服务器泄露敏感信息。这一现实案例突出了此类漏洞可能导致的安全漏洞，强调了预测和减轻提示注入和其他新兴人工智能驱动威胁在应用程序安全中的重要性。
- en: '![](../Images/a4647dc9ee35b442688881d8b7b92f9a.png)'
  id: totrans-73
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a4647dc9ee35b442688881d8b7b92f9a.png)'
- en: '**Table 2\.** Common attack types targeting AI and language model systems,
    with their goals, mechanisms, typical occurrence points, and practical examples.
    Table by Author.'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: '**表2**. 针对人工智能和语言模型系统的常见攻击类型，包括其目标、机制、典型发生点和实际示例。表由作者编制。'
- en: Additionally, we must be aware of biased outputs in AI results. A 2023 Washington
    Post article titled “[This is how AI image generators see the world](https://www.washingtonpost.com/technology/interactive/2023/ai-generated-images-bias-racism-sexism-stereotypes/)”
    demonstrates, through images, how AI models reproduce and even amplify the biases
    present in their training data. Ensuring fairness and mitigating bias is an important
    task that often gets overlooked due to time constraints, yet it remains crucial
    for building trustworthy and equitable AI systems.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，我们必须意识到人工智能结果中的偏差输出。2023年《华盛顿邮报》一篇题为“[这是人工智能图像生成器如何看待世界](https://www.washingtonpost.com/technology/interactive/2023/ai-generated-images-bias-racism-sexism-stereotypes/)”的文章通过图像展示了人工智能模型如何复制甚至放大其训练数据中存在的偏差。确保公平性和减轻偏差是一项重要任务，但由于时间限制，它往往被忽视，但对于构建值得信赖和公平的人工智能系统仍然至关重要。
- en: Conclusion
  id: totrans-76
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: 'Although the main idea of the article was to illustrate the complexities of
    LLM-based applications through the example of a typical (but synthetic) use case,
    the reason for emphasizing the need for a robust and scalable system is clear:
    **building such applications is far from simple**. It is essential to remain vigilant
    about potential issues that may arise if we fail to continuously monitor the system,
    ensure fairness, and address risks proactively. Without this discipline, even
    a promising application can quickly become unreliable, biased, or misaligned with
    its intended purpose.'
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管文章的主要目的是通过一个典型（但合成）用例的例子来说明基于 LLM 应用程序的复杂性，但强调需要强大且可扩展的系统的原因是显而易见的：**构建这样的应用程序远非简单**。如果我们未能持续监控系统、确保公平性和主动应对风险，那么潜在的问题可能会出现。没有这种纪律，即使是前景看好的应用程序也可能迅速变得不可靠、有偏见或与其预期目的不一致。
