- en: 'LangGraph 101: Let’s Build A Deep Research Agent'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: LangGraph 101：让我们构建一个深度研究代理
- en: 原文：[https://towardsdatascience.com/langgraph-101-lets-build-a-deep-research-agent/](https://towardsdatascience.com/langgraph-101-lets-build-a-deep-research-agent/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/langgraph-101-lets-build-a-deep-research-agent/](https://towardsdatascience.com/langgraph-101-lets-build-a-deep-research-agent/)
- en: <mdspan datatext="el1755215230074" class="mdspan-comment">Building LLM agents</mdspan>
    that actually work in practice is not an easy task.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1755215230074" class="mdspan-comment">构建真正在实践工作中起作用的LLM代理并不容易。
- en: You need to consider how to orchestrate the multi-step workflow, keep track
    of the agents’ states, implement necessary guardrails, and monitor decision processes
    as they happen.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 你需要考虑如何编排多步骤工作流程，跟踪代理的状态，实施必要的护栏，并监控决策过程。
- en: Fortunately, **LangGraph** addresses exactly those pain points for you.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 幸运的是，**LangGraph**正好解决了你这些痛点。
- en: Recently, Google just demonstrated this perfectly by open-sourcing a full-stack
    implementation of a **Deep Research Agent** built with LangGraph and Gemini (with
    Apache-2.0 license).
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 最近，谷歌通过开源使用LangGraph和Gemini（Apache-2.0许可证）构建的**深度研究代理**的全栈实现，完美地展示了这一点。
- en: 'This isn’t a toy implementation: the agent can not only search, but also dynamically
    evaluate the results to decide if more information is needed by doing further
    searches. This iterative workflow is exactly the kind of thing where LangGraph
    really shines.'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 这不是一个玩具实现：这个代理不仅能搜索，还能动态评估结果，决定是否需要通过进一步的搜索来获取更多信息。这种迭代工作流程正是LangGraph真正发光的地方。
- en: So, if you want to learn how LangGraph works in practice, what better place
    to start than a real, working agent like this?
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，如果你想了解LangGraph在实际中的工作方式，还有什么比从这样一个真实、工作着的代理开始更好的地方呢？
- en: '**Here’s our game plan for this tutorial post**: We’ll adopt a “**problem-driven**”
    learning approach. Instead of starting with lengthy, abstract concepts, we’ll
    jump right into the code and examine Google’s implementation. After that, we’ll
    connect each piece back to the core concepts of LangGraph.'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: '**以下是本教程帖子的游戏计划**：我们将采用“**问题驱动**”的学习方法。我们不会从冗长、抽象的概念开始，而是直接进入代码，并检查谷歌的实现。然后，我们将每个部分都与LangGraph的核心概念联系起来。'
- en: By the end, you’ll not only have a working research agent but also enough LangGraph
    knowledge to build whatever comes next.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 到最后，你不仅将拥有一个工作研究代理，而且还将拥有足够的LangGraph知识来构建接下来的一切。
- en: '*All the code we’ll be discussing in this post comes from the official Google
    Gemini repository, which you can find [here](https://github.com/google-gemini/gemini-fullstack-langgraph-quickstart).
    Our focus will be on the backend logic (backend/src/agent/ directory) where the
    research agent is defined.*'
  id: totrans-10
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*我们将在本帖中讨论的所有代码都来自官方谷歌Gemini仓库，你可以在这里找到[它](https://github.com/google-gemini/gemini-fullstack-langgraph-quickstart)。我们的重点是后端逻辑（backend/src/agent/目录），其中定义了研究代理。*'
- en: 'Here is the visual roadmap for this post:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 这是本帖的视觉路线图：
- en: '![](../Images/b650c207ac282ca5a34fe932f94a044c.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/b650c207ac282ca5a34fe932f94a044c.png)'
- en: Figure 1\. Table of Contents for this post. (Image by author)
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 图1. 本帖目录。（图片由作者提供）
- en: '* * *'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 1\. The Big Picture — Modeling the Workflow with Graphs, Nodes, and Edges
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1. 整体概念——使用图、节点和边建模工作流程
- en: 🎯 The problem
  id: totrans-16
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 🎯 问题
- en: 'In this case study, we’ll build something exciting: an **LLM-based** **research-agumented**
    **agent**, the minimal replication of the *Deep Research* features you’ve already
    seen in ChatGPT, Gemini, Claude, or Perplexity. That’s what we’re aiming for here.'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个案例研究中，我们将构建一些令人兴奋的东西：一个**基于LLM的** **研究增强型**代理，这是你在ChatGPT、Gemini、Claude或Perplexity中已经看到的*深度研究*功能的最低限度的复制。这正是我们在这里的目标。
- en: 'Specifically, our agent will work like this:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 具体来说，我们的代理将这样工作：
- en: '*It takes in a user query, autonomously searches the web, examines the search
    results it obtains, and then decide if enough information has been found. If that’s
    the case, it proceeds with creating a well-crafted mini-report with proper citations;
    Otherwise, it circles back to dig deeper with more searches.*'
  id: totrans-19
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*它接受用户查询，自主搜索网络，检查它获得的结果，然后决定是否已经找到了足够的信息。如果是这样，它将继续创建一个精心制作的迷你报告，并附上适当的引用；否则，它将回到更深层次的搜索中。*'
- en: 'First things first, let’s sketch out a high-level flowchart so that we are
    clear what we’re building here:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们绘制一个高级流程图，以便我们清楚我们在这里要构建什么：
- en: '![](../Images/3dee0c602e2d64afd37ae504db9aa2e7.png)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/3dee0c602e2d64afd37ae504db9aa2e7.png)'
- en: Figure 2\. High-level flowchart (Image by author)
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 图2. 高级流程图（图片由作者提供）
- en: 💡LangGraph’s solution
  id: totrans-23
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 💡LangGraph的解决方案
- en: Now, how should we model this workflow in LangGraph? Well, as the name suggests,
    LangGraph uses **graph** representations. Ok, but why use graphs?
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们应该如何在 LangGraph 中建模这个工作流程呢？嗯，正如其名所示，LangGraph 使用 **图** 表示。好吧，但为什么使用图呢？
- en: 'The short answer is this: graphs are great for modeling complex, stateful flows,
    just like the application we aim to build here. When you have branching decisions,
    loops that need to circle back, and all the other messy realities that real-world
    agentic workflow would throw at you, graphs give you one of the most natural ways
    to represent them all.'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 简短的回答是：图非常适合建模复杂的状态流，就像我们在这里旨在构建的应用程序一样。当你有分支决策、需要回环的循环，以及所有其他现实世界代理工作流程会向你抛出的其他混乱现实时，图为你提供了表示它们的最自然方式之一。
- en: Technically, a graph is composed of **nodes** and **edges.** In LangGraph’s
    world, **nodes are individual processing steps** in the workflow, and **edges
    define transitions between steps**, that is, defining how control and state flow
    through the system.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 从技术上讲，一个图由 **节点** 和 **边** 组成。在 LangGraph 的世界中，**节点是工作流程中的单个处理步骤**，而 **边定义了步骤之间的转换**，即定义控制流和状态如何通过系统流动。
- en: </> Let’s see some code!
  id: totrans-27
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: </> 让我们看看一些代码！
- en: In LangGraph, the translation from flowchart to code is straightforward. Let’s
    look at `agent/graph.py` from the Google repository to see how this is done.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 在 LangGraph 中，从流程图到代码的转换是直接的。让我们看看来自 Google 仓库的 `agent/graph.py`，看看这是如何实现的。
- en: 'The first step is to create the graph itself:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 第一步是创建图本身：
- en: '[PRE0]'
  id: totrans-30
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Here, `StateGraph` is LangGraph’s builder class for a **state-aware graph.**
    It accepts an`OverallState` class that defines what information can move between
    nodes (this is the agent memory part we will discuss in the next section), and
    a `Configuration` class that defines runtime-tunable parameters, such as which
    LLM to call at individual steps, the number of initial queries to generate, etc.
    More details on this will follow in the next sections.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 这里，`StateGraph` 是 LangGraph 为 **状态感知图** 提供的构建器类。它接受一个 `OverallState` 类，该类定义了可以在节点之间移动的信息（这是我们将在下一节讨论的代理记忆部分），以及一个
    `Configuration` 类，该类定义了运行时可调整的参数，例如在各个步骤中调用哪个 LLM、要生成的初始查询数量等。更多细节将在下一节中介绍。
- en: 'Once we have the graph container, we can add nodes to it:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦我们有了图容器，我们就可以向其中添加节点：
- en: '[PRE1]'
  id: totrans-33
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: The `add_node()` method takes the first argument as the **node’s name** and
    the second argument as the **callable** that is executed when the node runs.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: '`add_node()` 方法将第一个参数作为 **节点的名称**，第二个参数作为当节点运行时执行的 **可调用函数**。'
- en: Generally, this callable can be a plain function, an async function, a LangChain
    `Runnable`, or even another compiled StateGraph.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，这个可调用函数可以是一个普通函数、一个异步函数、一个 LangChain `Runnable`，甚至另一个编译后的 StateGraph。
- en: 'In our specific case:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的特定情况下：
- en: '`generate_query` generates search queries based on the user’s question.'
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`generate_query` 根据用户的问题生成搜索查询。'
- en: '`web_search` performs web research using the native Google Search API tool.'
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`web_search` 使用原生的 Google Search API 工具进行网络研究。'
- en: '`reflection` identifies knowledge gaps and generates potential follow-up queries.'
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`reflection` 识别知识差距并生成潜在的后续查询。'
- en: '`finalize_answer` finalizes the research summary.'
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`finalize_answer` 用于最终确定研究摘要。'
- en: We will examine the detailed implementation of those functions later.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将在稍后详细检查这些函数的实现。
- en: 'Ok, now that we have the nodes defined, the next step is to add edges to connect
    them and define execution order:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧，现在我们已经定义了节点，下一步是添加边来连接它们并定义执行顺序：
- en: '[PRE2]'
  id: totrans-43
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'A couple of things are worth pointing out here:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有几个值得指出的事情：
- en: Notice how those node names we defined earlier (e.g., “generate_query”, “web_research”,
    etc.) now come in handy—we can reference them directly in our edge definitions.
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 注意我们之前定义的那些节点名称（例如，“generate_query”，“web_research”等）现在派上了用场——我们可以在我们的边定义中直接引用它们。
- en: We see that two types of edges are used, i.e., the **static edge** and the **conditional
    edge**.
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们看到使用了两种类型的边，即 **静态边** 和 **条件边**。
- en: When `builder.add_edge()` is used, a direct, unconditional connection between
    two nodes is created. In our case, `builder.add_edge("web_research", "reflection")`
    basically means that after web research is completed, the flow will *always* move
    to the reflection step.
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当使用 `builder.add_edge()` 时，会在两个节点之间创建一个直接的无条件连接。在我们的情况下，`builder.add_edge("web_research",
    "reflection")`基本上意味着在完成网络研究后，流程将 *始终* 移动到反思步骤。
- en: 'On the other hand, when `builder.add_conditional_edges()` is used, the flow
    may jump to different branches at runtime. We need three key arguments when creating
    a conditional edge: **the source node**, **a **routing** function**, and **a list
    of possible destination nodes**. The routing function examines the current state
    and returns the name of the next node to visit. For example, the `evaluate_research()`
    function determines whether the agent needs more research (in that case, go to
    the `"web_research"` node) or if the information is already sufficient that the
    agent can finalize the answer (go to the `"finalize_answer" node`).'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 另一方面，当使用`builder.add_conditional_edges()`时，流程可能在运行时跳转到不同的分支。创建条件边时，我们需要三个关键参数：**源节点**、**一个**路由**函数**和**一个可能的目标节点列表**。路由函数检查当前状态，并返回要访问的下一个节点的名称。例如，`evaluate_research()`函数确定代理是否需要更多研究（在这种情况下，转到“web_research”节点）或者信息已经足够，代理可以最终确定答案（转到“finalize_answer”节点）。
- en: '*But why do we need a conditional edge between “generate_query” and “web_research”?
    Shouldn’t it be a static edge since we always want to search after generating
    queries? Good catch! That actually has something to do with how LangGraph enables
    parallelization. We will discuss that later in-depth.*'
  id: totrans-49
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*但为什么我们需要在“generate_query”和“web_research”之间设置一个条件边？难道它不应该是一个静态边，因为我们总是希望在生成查询后进行搜索吗？这是一个很好的发现！这实际上与LangGraph如何实现并行化有关。我们将在稍后深入讨论。*'
- en: 'We also notice two special nodes: `START` and `END`. These are LangGraph’s
    built-in entry and exit points. Every graph needs exactly one starting point (where
    execution begins), but can have multiple ending points (where execution terminates).'
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们还注意到两个特殊节点：`START`和`END`。这些是LangGraph的内置入口和出口点。每个图恰好需要一个起点（执行开始的地方），但可以有多个终点（执行终止的地方）。
- en: 'Finally, it’s time to put everything together and compile the graph into an
    executable agent:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，是时候将所有内容组合起来，将图编译成一个可执行的代理：
- en: '[PRE3]'
  id: totrans-52
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: And that’s it! We’ve successfully translated our flowchart into a LangGraph
    implementation.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 就这样！我们已经成功将我们的流程图转换成了LangGraph的实现。
- en: '🎁 Bonus Read: Why Do Graphs Truly Shine?'
  id: totrans-54
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 🎁 奖励阅读：为什么图真正闪耀？
- en: 'Beyond being a natural fit for nonlinear workflows, LangGraph’s node/edge/graph
    representation brings several additional practical benefits that make building
    and managing agents easy in the real world:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 除了适合非线性工作流程之外，LangGraph的节点/边/图表示法还带来了几个额外的实用好处，这使得在现实世界中构建和管理代理变得容易：
- en: '**Fine-grained control & observability**. Because every node/edge has its own
    identity, you can easily checkpoint your progress and examine under the hood when
    something unexpected happens. This makes debugging and evaluation simple.'
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**细粒度控制与可观察性**。因为每个节点/边都有自己的标识，你可以轻松地检查点你的进度，并在出现意外情况时检查内部。这使得调试和评估变得简单。'
- en: '**Modularity & reuse**. You can bundle individual steps into *reusable subgraphs*,
    justlike Lego bricks. Talking about software best practices in action.'
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**模块化与复用**。你可以将单个步骤捆绑成*可重用子图*，就像乐高积木一样。这就是软件最佳实践在行动中的体现。'
- en: '**Parallel paths.** When parts of your workflow are independent, graphs easily
    let them run concurrently. Obviously, this helps address latency issues and makes
    your system more robust to faults, which is especially critical when your pipelines
    are complex.'
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**并行路径**。当你的工作流程中的部分是独立的，图可以轻松地让它们并行运行。显然，这有助于解决延迟问题，并使你的系统对故障更加健壮，这在你的管道复杂时尤其关键。'
- en: '**Easily visualizable**. Whether it’s debugging or presenting the approach,
    it’s always nice to be able to see the workflow logic. Graphs are just natural
    for visualization.'
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**易于可视化**。无论是调试还是展示方法，能够看到工作流程逻辑总是很棒的。图对于可视化来说很自然。'
- en: 📌Key takeaways
  id: totrans-60
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 📌关键要点
- en: 'Let’s recap what we’ve covered in this foundational section:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们回顾一下在本节基础部分我们所学到的内容：
- en: LangGraph uses graphs to describe the agentic workflow, as graphs elegantly
    handle branching, looping, and other nonlinear procedures.
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: LangGraph使用图来描述代理工作流程，因为图优雅地处理分支、循环和其他非线性过程。
- en: In LangGraph, nodes represent processing steps and edges define transitions
    between steps.
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在LangGraph中，节点表示处理步骤，边定义步骤之间的转换。
- en: 'LangGraph implements two types of edges: static edges and conditional edges.
    When you have fixed transitions between nodes, use static edges. If the transition
    may change in runtime based on dynamic decision, use conditional edges.'
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: LangGraph实现了两种类型的边：静态边和条件边。当你有节点之间的固定转换时，使用静态边。如果转换可能在运行时根据动态决策而改变，则使用条件边。
- en: Building a graph in LangGraph is simple. You first create a StateGraph, then
    add nodes (with their functions), connect them with edges. Finally, you compile
    the graph. Done!
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在LangGraph中构建图很简单。你首先创建一个StateGraph，然后添加节点（及其函数），用边连接它们。最后，编译图。完成！
- en: '![](../Images/b3713124be64528ca479b01639cb6200.png)'
  id: totrans-66
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/b3713124be64528ca479b01639cb6200.png)'
- en: Figure 3\. Building agentic graph in LangGraph. (Image by author)
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 图3.在LangGraph中构建代理图。（图片由作者提供）
- en: 'Now that we understand the basic structure, you’re probably wondering: how
    does information flow between these nodes? This brings us to one of LangGraph’s
    most important concepts: **state management**.'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经了解了基本结构，你可能想知道：这些节点之间是如何传递信息的？这把我们带到了LangGraph最重要的概念之一：**状态管理**。
- en: Let’s check that out.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们来看看。
- en: '* * *'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 2\. The Agent’s Memory — How Nodes Share Information with State
  id: totrans-71
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2. 代理的记忆——节点如何通过状态共享信息
- en: '![](../Images/0aebf3b85d22e94f4b5664cba599d3a3.png)'
  id: totrans-72
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/0aebf3b85d22e94f4b5664cba599d3a3.png)'
- en: Figure 4\. The current progress. (Image by Author)
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 图4.当前进度。（图片由作者提供）
- en: 🎯 The problem
  id: totrans-74
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 🎯 问题
- en: 'As our agent walks through the graph we defined earlier, it needs to keep track
    of things it has generated/learned. For example:'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们的代理遍历我们之前定义的图时，它需要跟踪它生成/学习的内容。例如：
- en: The original question from the user.
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用户提出的问题原文。
- en: The list of search queries it has generated.
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它生成的搜索查询列表。
- en: The content it has retrieved from the web.
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它从网络上检索到的内容。
- en: Its own internal reflections about whether the gathered information is sufficient.
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它对自己收集的信息是否足够充分的内部反思。
- en: The final, polished answer.
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 最终，经过打磨的答案。
- en: So, how should we maintain that information so that our nodes do not work in
    isolation but instead collaborate and build upon each other’s work?
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，我们应该如何维护这些信息，以便我们的节点不是独立工作，而是协作并建立在彼此的工作之上？
- en: 💡 LangGraph’s solution
  id: totrans-82
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 💡 LangGraph的解决方案
- en: The LangGraph way of solving this problem is by introducing a central **state
    object**, a shared whiteboard that every node in the graph can look at and write
    on.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: LangGraph解决这个问题的方法是通过引入一个中央**状态对象**，一个每个图中的节点都可以查看并写入的共享白板。
- en: 'Here’s how it works:'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 这是它的工作方式：
- en: When a node is executed, it receives the current state of the graph.
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当节点执行时，它接收图的当前状态。
- en: The node performs its task (e.g., calls an LLM, runs a tool) using information
    from the state.
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 节点使用状态中的信息执行其任务（例如，调用LLM，运行工具）。
- en: The node then returns a dictionary containing only the parts of the state it
    wants to **update or add**.
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 然后，节点返回一个只包含它想要**更新或添加**的状态部分的字典。
- en: LangGraph then takes this output and automatically merges it into the main state
    object, before passing it to the next node.
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: LangGraph随后将这个输出自动合并到主状态对象中，然后再传递给下一个节点。
- en: Since the state passing and merging are handled at the framework level by LangGraph,
    individual nodes don’t need to worry about how to access or update shared data.
     They just need to focus on their specific task logic.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 由于状态传递和合并由LangGraph在框架级别处理，因此单个节点不需要担心如何访问或更新共享数据。它们只需要专注于它们特定的任务逻辑。
- en: Also, this pattern makes your agent workflows highly modular. You can easily
    add, remove, or reorder nodes without breaking the state flow.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，这种模式使你的代理工作流程高度模块化。你可以轻松地添加、删除或重新排序节点，而不会破坏状态流。
- en: </> Let’s see some code!
  id: totrans-91
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: </> 让我们看看一些代码！
- en: Remember this line from the last section?
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 记住上一节中的这句话？
- en: '[PRE4]'
  id: totrans-93
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: We mentioned that `OverallState` defines the agent’s memory, but does not yet
    show how exactly it is implemented. Now it’s a good time to open the black box.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 我们提到`OverallState`定义了代理的记忆，但尚未展示其具体实现方式。现在正是打开黑盒子的好时机。
- en: 'In the repo, `OverallState` is defined in`agent/state.py`:'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 在仓库中，`OverallState`在`agent/state.py`中定义：
- en: '[PRE5]'
  id: totrans-96
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'Essentially, we can see that the so-called state is a `TypedDict`that serves
    as a **contract**. It defines every field your workflow cares about and how those
    fields should be merged when multiple nodes write to them. Let’s break that down:'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 实质上，我们可以看到所谓的状态是一个`TypedDict`，它充当一个**合约**。它定义了你的工作流程关心的每个字段以及当多个节点写入这些字段时，这些字段应该如何合并。让我们来分解一下：
- en: '**Field purposes**: `messages`stores conversation history, `search_query`,`web_search_result` ,
    and `source_gathered` track the agent’s research process. The other fields control
    agent behavior by setting limits and tracking progress.'
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**字段用途**：`messages`存储对话历史，`search_query`、`web_search_result`和`source_gathered`跟踪代理的研究过程。其他字段通过设置限制和跟踪进度来控制代理的行为。'
- en: '**The Annotated pattern**: We see some fields use `Annotated[list, add_messages]`or
    `Annotated[list, operator.add]`. This is meant to tell LangGraph **how to do the
    merge update** when multiple nodes modify the same field. Specifically, `add_messages`
    is LangGraph’s built-in function for intelligently merging conversation messages,
    while `operator.add` concatenates lists when nodes add new items.'
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**注解模式**：我们看到一些字段使用`Annotated[list, add_messages]`或`Annotated[list, operator.add]`。这是为了告诉LangGraph**如何进行合并更新**，当多个节点修改同一字段时。具体来说，`add_messages`是LangGraph的内置函数，用于智能合并对话消息，而`operator.add`在节点添加新项目时连接列表。'
- en: '**Merge behavior**: Fields like `research_loop_count: int` simply replace the
    old value when updated. Annotated fields, on the other hand, are *cumulative*.
     They build up over time as different nodes dump information into it.'
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**合并行为**：例如`research_loop_count: int`这样的字段在更新时只是简单地替换旧值。另一方面，注解字段是*累积的*。它们随着时间的推移而积累，因为不同的节点将信息倒入其中。'
- en: While `OverallState` serves as the global memory, probably it is better to also
    define smaller, node-specific states to act as a clear “API contract” for what
    a node needs and produces. After all, it is often the case that one specific node
    will not require all the information from the entire `OverallState`, nor modify
    all the content in `OverallState`.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然`OverallState`充当全局内存，但也许定义更小、针对特定节点的状态作为节点所需和产生的清晰“API合约”会更好。毕竟，通常情况下，一个特定的节点不会需要整个`OverallState`中的所有信息，也不会修改`OverallState`中的所有内容。
- en: This is exactly what LangGraph did.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 这正是LangGraph所做的事情。
- en: 'In`agent/state.py`, besides defining `OverallState`, three other states are
    also defined:'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 在`agent/state.py`中，除了定义`OverallState`外，还定义了三个其他状态：
- en: '[PRE6]'
  id: totrans-104
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'Those states are used by the nodes in the following way (`agent/graph.py`):'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 这些状态是以下方式由节点使用的（`agent/graph.py`）：
- en: '[PRE7]'
  id: totrans-106
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'Take the`reflection` node as an example: It reads from the `OverallState` but
    returns a dictionary that matches the `ReflectionState` contract. Afterward, LangGraph
    will handle the job of merging them into the main `OverallState`, making them
    available for the next nodes in the graph.'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 以`reflection`节点为例：它从`OverallState`中读取，但返回一个与`ReflectionState`合约匹配的字典。之后，LangGraph将处理将它们合并到主`OverallState`中的工作，使它们对图中的下一个节点可用。
- en: '🎁 Bonus Read: Where Did My State Go?'
  id: totrans-108
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 🎁 奖励阅读：我的状态去哪了？
- en: A common confusion when working with LangGraph is how `OverallState` and these
    smaller, node-specific states interact. Let’s clear that confusion here.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 在使用LangGraph时，一个常见的混淆是`OverallState`和这些较小的、针对特定节点的状态如何交互。让我们在这里澄清这个混淆。
- en: 'The crucial mental model we need to have is this: there is only **one** state
    dictionary at runtime, the `OverallState`.'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要拥有的关键心智模型是：在运行时只有一个状态字典，即`OverallState`。
- en: Node-specific `TypedDict`s are not extra runtime data stores. Instead, they
    are just typed “views” onto the one underlying dictionary (`OverallState`), that
    temporarily zoom in on the parts a node should see or produce. The purpose of
    their existence is that the type checker and the LangGraph runtime can enforce
    clear contracts.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 节点特定的`TypedDict`不是额外的运行时数据存储。相反，它们只是对单个基础字典（`OverallState`）的带类型“视图”，暂时放大节点应看到或产生的部分。它们存在的目的是让类型检查器和LangGraph运行时可以强制执行清晰的合约。
- en: '![](../Images/9670213883ae6f2165e25be7a0c5786c.png)'
  id: totrans-112
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/9670213883ae6f2165e25be7a0c5786c.png)'
- en: Figure 5\. A quick comparison of the two state types. (Image by Author)
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 图5.两种状态类型的快速比较。（图片由作者提供）
- en: Before a node runs, LangGraph can use its type hints to create a “slice” of
    the `OverallState` containing only the inputs that the node needs.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 在节点运行之前，LangGraph可以使用其类型提示来创建一个包含节点所需输入的“切片”，即`OverallState`的“切片”。
- en: The node runs its logic and returns its small, specific output dictionary (e.g.,
    a `ReflectionState` dict).
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 节点运行其逻辑并返回其小型、特定输出字典（例如，一个`ReflectionState`字典）。
- en: LangGraph takes the returned dictionary and runs `OverallState.update(return_dict)`.
    If any keys were defined with an aggregator (like `operator.add`), that logic
    is applied. The updated `OverallState` is then passed to the next node.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: LangGraph接收返回的字典并运行`OverallState.update(return_dict)`。如果有任何键是用聚合器（如`operator.add`）定义的，则应用该逻辑。然后，更新的`OverallState`传递给下一个节点。
- en: 'So why has LangGraph embraced this two-level state definition? Besides enforcing
    a clear contract for the node and making node operations self-documenting, there
    are two other benefits also worth mentioning:'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，为什么LangGraph采用了这种两级状态定义？除了为节点强制执行清晰的合约并使节点操作自我文档化之外，还有两个其他好处也值得提及：
- en: '**Drop-in reusability**: Because a node only advertises the small slice of
    state it needs and produces, it becomes a modular, plug-and-play component. For
    example, a `generate_query` node that only needs `{user_query}` from the state
    and outputs `{queries}` can be dropped into another, completely different graph,
    so long as that graph’s `OverallState` can provide a `user_query`. If the node
    were coded against the *entire* global state (i.e., typed with `OverallState` for
    both its input and output), you can easily break the workflow if you rename any
    unrelated key. This modularity is quite essential for building complex systems.'
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**即插即用可重用性**：因为节点只宣传它需要和产生的状态的小部分，它成为一个模块化、即插即用的组件。例如，一个只需要从状态中获取`{user_query}`并输出`{queries}`的`generate_query`节点可以被放入另一个完全不同的图中，只要那个图的`OverallState`可以提供一个`user_query`。如果节点针对的是整个全局状态（即，输入和输出都使用`OverallState`类型），那么如果你重命名任何无关的键，你很容易破坏工作流程。这种模块化对于构建复杂系统至关重要。'
- en: '**Efficiency in parallel flows**: Imagine our agent needs to run 10 web searches
    simultaneously. If we are using a node-specific state as a small payload, we then
    just need to send the search query to each parallel branch. This is way more efficient
    than sending a copy of the entire agent memory (remember the full chat history
    is also stored in `OverallState`!) to all ten branches. This way, we can dramatically
    cut down on memory and serialization overhead.'
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**并行流中的效率**：想象一下，我们的智能体需要同时运行10个网络搜索。如果我们使用节点特定的状态作为一个小负载，那么我们只需要将搜索查询发送到每个并行分支。这比将整个智能体内存的副本（记住完整的聊天历史也存储在`OverallState`中！）发送到所有十个分支要高效得多。这样，我们可以显著减少内存和序列化开销。'
- en: So what does this mean for us in practice?
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 那么这对我们在实际操作中意味着什么呢？
- en: '**✔** Declare in `OverallState` every key that needs to persist or to be visible
    to multiple different nodes.'
  id: totrans-121
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**✔** 在`OverallState`中声明所有需要持久化或对多个不同节点可见的关键键。'
- en: '**✔** Make the node-specific states as small as possible. They should contain *only* the
    fields that the node is responsible for producing.'
  id: totrans-122
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**✔** 尽可能使节点特定的状态保持最小。它们应该只包含节点负责生成的字段。'
- en: '**✔** Every key you write must be declared in **some** state schema; otherwise,
    LangGraph raises `InvalidUpdateError` when the node tries to write it.'
  id: totrans-123
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**✔** 你写入的每个键必须在某个状态模式中声明；否则，当节点尝试写入时，LangGraph会引发`InvalidUpdateError`。'
- en: 📌Key takeaways
  id: totrans-124
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 📌关键要点
- en: 'Let’s recap what we’ve covered in this section:'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们回顾一下本节中我们所学到的内容：
- en: 'LangGraph maintains states at two levels: At the global level, there is the
    OverallState object that serves as the central memory. At the individual node
    level, small, TypedDict-based objects store node-specific inputs/outputs. This
    keeps the state management clean and organized.'
  id: totrans-126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: LangGraph在两个级别上维护状态：在全局级别，有一个OverallState对象作为中央内存。在单个节点级别，基于TypedDict的小型对象存储节点特定的输入/输出。这保持了状态管理的整洁和组织。
- en: After each step, nodes would return minimal output dicts, which is then merged
    back into the central memory (`OverallState`). This merging is done according
    to your custom rules (e.g., `operator.add` for lists).
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在每一步之后，节点会返回最小的输出字典，然后将其合并回中央内存（`OverallState`）。这种合并是根据你的自定义规则（例如，`operator.add`用于列表）进行的。
- en: Nodes are self-contained and modular. You can easily resue them like building
    blocks to create new workflows.
  id: totrans-128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 节点是自包含和模块化的。你可以像积木一样轻松地重用它们来创建新的工作流程。
- en: '![](../Images/f10a853a5ea8e9dcfce7f5ff7f98884c.png)'
  id: totrans-129
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/f10a853a5ea8e9dcfce7f5ff7f98884c.png)'
- en: Figure 6\. Key points to remember in LangGraph state management. (Image by author)
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 图6. LangGraph状态管理中需要记住的关键点。（图片由作者提供）
- en: Now we’ve understood the graph’s structure and how state flows through it, but
    what happens *inside* each node? Let’s now turn to the node operations.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经了解了图的结构以及状态是如何通过它的，但每个节点内部发生了什么？现在让我们转向节点操作。
- en: '* * *'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 3\. Node Operations — Where The Real Work Happens
  id: totrans-133
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3. 节点操作 — 真正的工作发生的地方
- en: '![](../Images/4685c5d473831ba08dea399f145b00cc.png)'
  id: totrans-134
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/4685c5d473831ba08dea399f145b00cc.png)'
- en: Figure 7\. The current progress. (Image by Author)
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 图7. 当前进度。（图片由作者提供）
- en: 'Our graph can route messages and hold state, but inside each node, we still
    need to:'
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的可视化图可以路由消息并保持状态，但每个节点内部，我们仍然需要：
- en: Make sure the LLM outputs the right format.
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确保LLM输出正确的格式。
- en: Call external APIs.
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 调用外部API。
- en: Run multiple searches in parallel.
  id: totrans-139
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 并行运行多个搜索。
- en: Decide when to stop the loop.
  id: totrans-140
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 决定何时停止循环。
- en: Luckily, LangGraph has your back with several solid approaches for tackling
    these challenges. Let’s meet them one by one, each through a slice of our working
    codebase.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 幸运的是，LangGraph有几种可靠的方法来应对这些挑战。让我们一一介绍，每个都通过我们工作代码库的一个片段。
- en: 3.1 Structured output
  id: totrans-142
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.1 结构化输出
- en: 🎯 The problem
  id: totrans-143
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 🎯 问题
- en: Getting an LLM to return a JSON object is easy, but parsing free-text JSON is
    just unreliable in practice. As soon as LLMs use a different phrase, add unexpected
    formatting, or change the key order, our workflow can easily go off the rails.
    In short, we need guaranteed, validatable output structures at each processing
    step.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 让一个LLM返回一个JSON对象很容易，但解析自由文本JSON在实践中并不可靠。一旦LLM使用不同的短语、添加意外的格式或更改键的顺序，我们的工作流程很容易脱轨。简而言之，我们需要在每个处理步骤中保证、可验证的输出结构。
- en: 💡 LangGraph’s solution
  id: totrans-145
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 💡 LangGraph的解决方案
- en: We constrain the LLM to generate output that conforms to a predefined schema.
    This can be done by attaching a **Pydantic** schema to the LLM call using `llm.with_structured_output()`,
    which is a helper method that is provided by every LangChain chat-model wrapper
    (e.g., `ChatGoogleGenerativeAI`, `ChatOpenAI`, etc.).
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 我们限制LLM生成符合预定义模式的输出。这可以通过使用 `llm.with_structured_output()` 将 **Pydantic** 模式附加到LLM调用来实现，这是一个由每个LangChain聊天模型包装器提供的辅助方法（例如，`ChatGoogleGenerativeAI`、`ChatOpenAI`
    等）。
- en: </> Let’s see some code!
  id: totrans-147
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: </> 让我们看看一些代码！
- en: 'Let’s look at the `generate_query` node, whose job is to create a list of search
    queries. Since we need this list to be a clean Python object, not a messy string,
    for the next node to parse, it would be a good idea to enforce the output schema,
    with `SearchQueryList` (defined in `agent/tools_and_schemas.py`):'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看 `generate_query` 节点，其任务是创建一个搜索查询列表。由于我们需要这个列表是一个干净的Python对象，而不是一个混乱的字符串，以便下一个节点进行解析，因此强制执行输出模式，使用
    `SearchQueryList`（在 `agent/tools_and_schemas.py` 中定义）是一个好主意：
- en: '[PRE8]'
  id: totrans-149
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'And here is how this schema is used in the `generate_query` node:'
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是如何在 `generate_query` 节点中使用此模式：
- en: '[PRE9]'
  id: totrans-151
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Here, `llm.with_structured_output(SearchQueryList)` wraps the Gemini model with
    LangChain’s structured-output helper. Under the hood, it uses the model’s preferred
    structured-output feature (JSON mode for Gemini 2.0 Flash) and automatically parses
    the reply into a `SearchQueryList` Pydantic instance, so `result` is already validated
    Python data.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: 这里，`llm.with_structured_output(SearchQueryList)` 使用LangChain的结构化输出辅助程序包装了Gemini模型。在底层，它使用模型首选的结构化输出功能（Gemini
    2.0 Flash的JSON模式）并自动将回复解析为 `SearchQueryList` Pydantic实例，因此 `result` 已经是经过验证的Python数据。
- en: 'It’s also interesting to check out the system prompt Google used for this node:'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 也很有趣的是查看Google为这个节点使用的系统提示：
- en: '[PRE10]json'
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: '[PRE10]json'
- en: '{{'
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: '{{'
- en: '"rationale": "To answer this comparative growth question accurately,'
  id: totrans-156
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"rationale": "为了准确回答这个比较增长问题，'
- en: we need specific data points on Apple's stock performance and iPhone sales
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要关于苹果股价表现和iPhone销售的具体数据点
- en: 'metrics. These queries target the precise financial information needed:'
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 指标。这些查询针对所需的精确财务信息：
- en: company revenue trends, product-specific unit sales figures, and stock price
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
  zh: 公司收入趋势、特定产品的单位销售数据以及股价
- en: movement over the same fiscal period for direct comparison.",
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 在同一财期内进行直接比较的移动。",
- en: '"query": ["Apple total revenue growth fiscal year 2024", "iPhone unit'
  id: totrans-161
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: '"query": ["2024财年苹果总收入增长", "iPhone单位'
- en: sales growth fiscal year 2024", "Apple stock price growth fiscal year 2024"],
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 2024财年销售增长", "2024财年苹果股价增长"],
- en: '}}'
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
  zh: '}}'
- en: '[PRE11]'
  id: totrans-164
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: We see some prompt engineering best practices in action, like defining the model’s
    role, specifying constraints, providing an example for illustration, etc.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以看到一些提示工程的最佳实践，例如定义模型的角色、指定约束、提供示例进行说明等。
- en: 3.2 Tool calling
  id: totrans-166
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.2 工具调用
- en: 🎯 The problem
  id: totrans-167
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 🎯 问题
- en: For our research agent to succeed, it needs up-to-date information from the
    web. To realize that, it needs a “tool” to search the web.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 为了我们的研究代理能够成功，它需要来自网络的最新信息。为了实现这一点，它需要一个“工具”来搜索网络。
- en: 💡 LangGraph’s solution
  id: totrans-169
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 💡 LangGraph的解决方案
- en: Nodes can execute tools. These can be native LLM tool-calling features (like
    in Gemini) or integrated through LangChain’s tool abstractions. Once the tool-calling
    results are gathered, they can be placed back into the agent’s state.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 节点可以执行工具。这些可以是本地的LLM工具调用功能（如Gemini）或通过LangChain的工具抽象集成。一旦收集到工具调用结果，它们可以放回代理的状态中。
- en: </> Let’s see some code!
  id: totrans-171
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: </> 让我们看看一些代码！
- en: For the tool-calling usage pattern, let’s look at the `web_research` node. This
    node uses Gemini’s native tool-calling feature to perform Google searches. Notice
    how the tool is specified directly in the model’s configuration.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 对于工具调用的使用模式，让我们看看`web_research`节点。这个节点使用Gemini的本地工具调用功能来执行Google搜索。注意工具是如何直接在模型的配置中指定的。
- en: '[PRE12]'
  id: totrans-173
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: The LLM sees the `Google Search` tool and understands that it can use the tool
    to fulfill the prompt. A key benefit of this native integration is the `grounding_metadata`
    returned with the response. That metadata contains *grounding chunks* — essentially,
    snippets of the answer paired with the URL that justified them. This basically
    gives us citations for free.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: LLM看到`Google Search`工具并理解它可以使用这个工具来满足提示。这种本地集成的一个关键好处是响应中返回的`grounding_metadata`。这些元数据包含*grounding
    chunks*——基本上，是与支持它们的URL配对的答案片段。这基本上为我们提供了免费的引用。
- en: 3.3 Conditional routing
  id: totrans-175
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.3 条件路由
- en: 🎯 The problem
  id: totrans-176
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 🎯 问题
- en: After the initial research, how does the agent know whether to stop or continue?
    We need a control mechanism to create a research loop that can terminate itself.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 在初步研究之后，代理如何知道是否停止或继续？我们需要一个控制机制来创建一个可以自我终止的研究循环。
- en: 💡 LangGraph’s solution
  id: totrans-178
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 💡 LangGraph的解决方案
- en: 'Conditional routing is handled by a special type of node: instead of returning
    state, this node returns the name of the *next* node to visit. Effectively, this
    node implements a routing function that inspects the current state and makes a
    decision regarding how to direct the traffic within the graph.'
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 条件路由由一种特殊的节点处理：而不是返回状态，这个节点返回要访问的*下一个*节点的名称。实际上，这个节点实现了一个路由功能，它检查当前状态并做出关于如何在图中引导流量的决定。
- en: </> Let’s see some code!
  id: totrans-180
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: </> 让我们看看一些代码！
- en: The `evaluate_research` node is our agent’s decision-maker. It checks the `is_sufficient`
    flag set by the `reflection` node and compares the current `research_loop_count`
    value against a pre-configured maximum threshold value.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: '`evaluate_research`节点是我们代理的决策者。它检查由`reflection`节点设置的`is_sufficient`标志，并将当前的`research_loop_count`值与预配置的最大阈值值进行比较。'
- en: '[PRE13]'
  id: totrans-182
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: If the condition to stop is met, it returns the string `"finalize_answer"`,
    and LangGraph proceeds to that node. If not, it returns a new list of `Send` objects
    containing the `follow_up_queries`, which spins up another parallel wave of web
    research, continuing the loop.
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 如果满足停止条件，它返回字符串`"finalize_answer"`，LangGraph随后进入该节点。如果不满足，它返回一个包含`follow_up_queries`的新`Send`对象列表，这会启动另一波并行的网络研究，继续循环。
- en: '`Send` object…What is it then?'
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: '`Send`对象…那它是什么呢？'
- en: Well, it is LangGraph’s way of triggering parallel execution. Let’s turn to
    that now.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 嗯，这是LangGraph触发并行执行的方式。现在让我们转向这一点。
- en: 3.4 Parallel processing
  id: totrans-186
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.4 并行处理
- en: 🎯 The problem
  id: totrans-187
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 🎯 问题
- en: To answer the user’s query as comprehensively as possible, we would need our
    `generate_query` node to produce multiple search queries. However, we don’t want
    to run those search queries one by one, as it would be very slow and inefficient.
    What we want is to execute the web searches for all queries concurrently.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 为了尽可能全面地回答用户的查询，我们需要我们的`generate_query`节点生成多个搜索查询。然而，我们不想逐个运行这些搜索查询，因为这会非常慢且效率低下。我们想要的执行所有查询的并行网络搜索。
- en: 💡 LangGraph’s solution
  id: totrans-189
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 💡 LangGraph的解决方案
- en: To trigger parallel execution, a node can return a list of `Send` objects. `Send`
    is a special directive that tells the LangGraph scheduler to dispatch these tasks
    to the specified node (e.g.,`"web_research"`) concurrently, each with its own
    piece of state.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 要触发并行执行，一个节点可以返回一个`Send`对象列表。`Send`是一个特殊的指令，告诉LangGraph调度器并发地将这些任务调度到指定的节点（例如`"web_research"`），每个任务都有自己的状态。
- en: </> Let’s see some code!
  id: totrans-191
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: </> 让我们看看一些代码！
- en: To enable the parallel search, Google’s implementation introduces the `continue_to_web_research`
    node to act as a dispatcher. It takes the `query_list` from the state and creates
    a separate `Send` task for each query.
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: 为了启用并行搜索，Google的实现引入了`continue_to_web_research`节点作为调度器。它从状态中获取`query_list`并为每个查询创建一个单独的`Send`任务。
- en: '[PRE14]'
  id: totrans-193
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: And that’s all the code you need. The magic lives in what happens *after* this
    node returns.
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 那就是你需要的所有代码。魔法在于这个节点返回之后发生的事情。
- en: 'When LangGraph receives this list, it’s smart enough not to simply loop through
    it. In fact, it triggers a sophisticated fan-out/fan-in process under the hood
    to handle things concurrently:'
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 当LangGraph接收到这个列表时，它足够聪明，不会简单地遍历它。实际上，它在幕后触发了复杂的扇出/扇入过程来并发处理事情：
- en: To begin with, each `Send` object carries only the tiny payload you gave it
    (`{"search_query": ..., "id": ...}`), not the entire `OverallState`. The purpose
    here is to have fast serialization.
  id: totrans-196
  prefs: []
  type: TYPE_NORMAL
  zh: '首先，每个`Send`对象只携带你给它的小型有效负载（`{"search_query": ..., "id": ...}`），而不是整个`OverallState`。这里的目的是快速序列化。'
- en: Then, the graph scheduler spins off an `asyncio` task for every item in the
    list. This concurrency happens automatically, you as the workflow builder don’t
    need to worry anything about writing `async def` or managing a thread pool.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，图调度器为列表中的每个项目启动一个`asyncio`任务。这种并发是自动发生的，作为工作流程构建者，你不需要担心编写`async def`或管理线程池。
- en: 'Finally, after all the parallel `web_research` branches are completed, their
    individually returned dictionaries are automatically merged back into the main
    `OverallState`. Remember the `Annotated[list, operator.add]` we discussed in the
    beginning? Now it becomes crucial: fields defined with this type of reducer, like
    `sources_gathered`, will have their results concatenated into a single list.'
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，在所有并行`web_research`分支完成后，它们各自返回的字典会自动合并回主`OverallState`。还记得我们一开始讨论的`Annotated[list,
    operator.add]`吗？现在它变得至关重要：使用这种类型定义的字段，如`sources_gathered`，将它们的结果连接成一个单一的列表。
- en: 'You may want to ask: what happens if one of the parallel searches **fails or
    times out**? This is exactly why we added a custom `id` to each `Send` payload.
    This ID flows directly into the trace logs, allowing you to pinpoint and debug
    the exact branch that failed.'
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能想知道：如果并行搜索中的任何一个**失败或超时**会发生什么？这正是我们为每个`Send`有效负载添加自定义`id`的原因。这个ID直接流入跟踪日志，允许你定位和调试失败的分支。
- en: 'If you remember from earlier, we have the following line in our graph definition:'
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你还记得之前的内容，我们在图定义中有以下一行：
- en: '[PRE15]'
  id: totrans-201
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: 'You might be wondering: why do we need to declare `continue_to_web_research`
    node as part of a conditional edge?'
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能会想知道：为什么我们需要将`continue_to_web_research`节点声明为条件边的一部分？
- en: 'The crucial thing to realize is that: `continue_to_web_research` isn’t just
    another step in the pipeline—it’s a **routing function**.'
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 关键要认识到的是：`continue_to_web_research`不仅仅是在管道中的另一个步骤——它是一个**路由函数**。
- en: The `generate_query` node can return *zero* queries (when the user asks something
    trivial) or twenty. A static edge would force the workflow to invoke `web_research`
    exactly once, even if there’s nothing to do. By implementing as a *conditional*
    edge `continue_to_web_research` decides at runtime, whether to dispatch—and, thanks
    to `Send`, how many parallel branches to spawn. If `continue_to_web_research`
    returns an empty list, LangGraph simply doesn’t follow the edge. That saves the
    round-trip to the search API.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: '`generate_query`节点可以返回*零*个查询（当用户询问一些琐碎的问题时）或者二十个。静态边会强制工作流程恰好调用一次`web_research`，即使没有任何事情要做。通过实现为*条件*边`continue_to_web_research`，在运行时决定是否分发，以及，多亏了`Send`，可以生成多少个并行分支。如果`continue_to_web_research`返回一个空列表，LangGraph就简单地不会跟随这条边。这样就节省了往返搜索API的往返。'
- en: 'Finally, this is again the software engineering best practice in action: `generate_query`
    focuses on *what to search*, `continue_to_web_research` on *whether and how to
    search*, and `web_research` on *doing the search*, aclean separation of concerns.'
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，这又是软件工程最佳实践的体现：`generate_query`关注*搜索什么*，`continue_to_web_research`关注*是否以及如何搜索*，而`web_research`关注*执行搜索*，这是一个清晰的关注点分离。
- en: 3.5 Configuration management
  id: totrans-206
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.5 配置管理
- en: 🎯 The problem
  id: totrans-207
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 🎯 问题
- en: 'For nodes to properly do their jobs, they need to know, for example:'
  id: totrans-208
  prefs: []
  type: TYPE_NORMAL
  zh: 为了节点能够正确地完成它们的工作，它们需要知道，例如：
- en: Which LLM to use with what parameter settings (e.g., temperature)?
  id: totrans-209
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 应该使用哪个LLM以及什么参数设置（例如，温度）？
- en: How many initial search queries should be generated?
  id: totrans-210
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 应该生成多少个初始搜索查询？
- en: What’s the cap on total research loops and on per-run concurrency?
  id: totrans-211
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 研究循环的总数和每个运行并发数有什么限制？
- en: And many others…
  id: totrans-212
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 以及许多其他内容…
- en: In short, we need a clean, centralized way to manage these settings without
    cluttering our core logic.
  id: totrans-213
  prefs: []
  type: TYPE_NORMAL
  zh: 简而言之，我们需要一种干净、集中的方式来管理这些设置，而不会使我们的核心逻辑变得杂乱。
- en: 💡 LangGraph’s Solution
  id: totrans-214
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 💡 LangGraph的解决方案
- en: LangGraph solves this by passing a single, standardized `config` into every
    node that needs it. This object acts as a universal container for run-specific
    settings.
  id: totrans-215
  prefs: []
  type: TYPE_NORMAL
  zh: LangGraph通过将单个、标准化的`config`传递给每个需要它的节点来解决此问题。这个对象充当运行特定设置的通用容器。
- en: 'Inside the node, LangGraph then uses a custom, typed helper class to intelligently
    parse this `config` object. This helper class implements a clear hierarchy for
    fetching values:'
  id: totrans-216
  prefs: []
  type: TYPE_NORMAL
  zh: 在节点内部，LangGraph随后使用一个自定义的、有类型的辅助类来智能地解析这个`config`对象。这个辅助类实现了一个清晰的层次结构来获取值：
- en: It first looks for overrides passed in the `config` object for the current run.
  id: totrans-217
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它首先查找当前运行中`config`对象中传递的覆盖值。
- en: If not found, it falls back to checking for environment variables.
  id: totrans-218
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果未找到，它将回退到检查环境变量。
- en: If still not found, it uses the defaults defined directly in this helper class.
  id: totrans-219
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果仍然未找到，它将使用直接定义在这个辅助类中的默认值。
- en: </> Let’s see some code!
  id: totrans-220
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: </> 让我们看看一些代码！
- en: Let’s look at the implementation of the `reflection` node to see it in action.
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看`反射`节点的实现，看看它是如何工作的。
- en: '[PRE16]'
  id: totrans-222
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: 'Just one line of boilerplate is required in the node:'
  id: totrans-223
  prefs: []
  type: TYPE_NORMAL
  zh: 在节点中只需要一行样板代码：
- en: '[PRE17]'
  id: totrans-224
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: 'There are quite a few “*config*-ish” terms floating around. Let’s unpack them
    one by one, starting with `Configuration`:'
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
  zh: 有很多“*config*-ish”术语在流传。让我们逐一解开它们，从`Configuration`开始：
- en: '[PRE18]'
  id: totrans-226
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: This is the custom helper class we mentioned earlier. You can see Pydantic is
    heavily used to define all the parameters for the agent. One thing to notice is
    that this class also defines an alternative constructor method `from_runnable_config()`.
    This constructor method creates a `Configuration` instance by pulling values from
    different sources while enforcing the overriding hierarchy we discussed in “💡
    LangGraph’s Solution” above.
  id: totrans-227
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我们之前提到的自定义辅助类。您可以看到Pydantic被大量用于定义代理的所有参数。需要注意的是，这个类还定义了一个替代构造方法`from_runnable_config()`。这个构造方法通过从不同来源拉取值，同时强制执行我们在“💡
    LangGraph的解决方案”中讨论的覆盖层次结构，创建一个`Configuration`实例。
- en: '`config` is the input to `from_runnable_config()` method. Technically, it’s
    a `RunnableConfig` type, but it’s really just a dictionary with optional metadata.
    In LangGraph, it’s mainly used as a structured way to carry contextual information
    across the graph. For example, it can carry things like tags, tracing options,
    and — most importantly—a nested dictionary of overrides under the `"configurable"`
    key.'
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
  zh: '`config`是`from_runnable_config()`方法的输入。技术上，它是一个`RunnableConfig`类型，但实际上它只是一个带有可选元数据的字典。在LangGraph中，它主要用于以结构化的方式在图中传递上下文信息。例如，它可以携带诸如标签、跟踪选项，以及最重要的在`"configurable"`键下的嵌套覆盖字典。'
- en: 'Finally, by calling in every node:'
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，通过在每个节点中调用：
- en: '[PRE19]'
  id: totrans-230
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: 'we create an instance of the `Configuration` class by combining data from three
    sources: first, the `config["configurable"]`, then environment variables, and
    finally the class defaults. So `configurable` is a fully initialized, ready-to-use
    object that gives the node access to all relevant settings, such as `configurable.reflection_model`.'
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
  zh: 我们通过结合三个来源的数据来创建`Configuration`类的实例：首先，`config["configurable"]`，然后是环境变量，最后是类默认值。因此，`configurable`是一个完全初始化、准备好使用的对象，它使节点能够访问所有相关设置，例如`configurable.reflection_model`。
- en: '*There is a bug in Google’s original code (both in reflection node & finalize_answer
    node):*'
  id: totrans-232
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*Google原始代码（在反射节点和最终答案节点中）存在一个错误：*'
- en: '[PRE20]'
  id: totrans-233
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: '*However, `reasoning_model` is never defined in the configuration.py. Instead,
    `reflect_model` and `answer_model` should be used per configuration.py definitions.
    Details see PR #46.*'
  id: totrans-234
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*然而，`reasoning_model`在configuration.py中从未定义过。相反，应该根据configuration.py的定义使用`reflect_model`和`answer_model`。详细信息请见PR
    #46。*'
- en: 'To recap: `Configuration` is the definition, `config` is the runtime input,
    and `configurable` is the result, i.e., the parsed configuration object your node
    uses.'
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
  zh: 总结一下：`配置`是定义，`config`是运行时输入，而`configurable`是结果，即节点使用的解析后的配置对象。
- en: '🎁 Bonus Read: What Didn’t We Cover?'
  id: totrans-236
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 🎁 奖励阅读：我们没有涵盖什么？
- en: 'LangGraph has a lot more to offer than what we can cover in this tutorial.
    As you build more complex agents, you’ll probably find yourself asking questions
    like these:'
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
  zh: LangGraph提供的功能远不止我们在这个教程中能涵盖的。随着您构建更复杂的代理，您可能会发现自己提出像这些问题：
- en: 1\. **Can I make my application more responsive?**
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
  zh: 1\. **我能否使我的应用程序更响应？**
- en: LangGraph supports **streaming**, so you can output results token by token for
    a real-time user experience.
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
  zh: LangGraph支持**流式传输**，因此您可以逐个输出结果，以提供实时用户体验。
- en: 2\. **What happens when an API call fails?**
  id: totrans-240
  prefs: []
  type: TYPE_NORMAL
  zh: 2\. **当API调用失败时会发生什么？**
- en: LangGraph implements **retry and fallback mechanisms** to handle errors.
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
  zh: LangGraph实现了**重试和回退机制**来处理错误。
- en: 3\. **How to avoid re-running expensive computations?**
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
  zh: 3\. **如何避免重新运行昂贵的计算？**
- en: If some of your nodes need to conduct expensive processing, you can use LangGraph’s
    **caching** mechanism to cache the node outputs. Also, LangGraph supports **checkpoints**.
    This feature lets you save your graph’s state and pick up where you left off.
    This is especially important if you have a long-running process and you want to
    pause it and resume it later.
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的一些节点需要进行昂贵的处理，你可以使用LangGraph的**缓存**机制来缓存节点输出。此外，LangGraph支持**检查点**。此功能允许你保存图的状态并在你停止的地方继续。这对于你有长时间运行的过程并且想要暂停并在以后恢复尤为重要。
- en: 4\. **Can I implement **human-in-the-loop** workflows?**
  id: totrans-244
  prefs: []
  type: TYPE_NORMAL
  zh: 4. **我可以实现**人机交互**工作流程吗？**
- en: Yes. LangGraph has built-in support for **human-in-the-loop** workflows. This
    enables you to pause the graph and wait for user input or approval before proceeding.
  id: totrans-245
  prefs: []
  type: TYPE_NORMAL
  zh: 是的。LangGraph内置了对**人机交互**工作流程的支持。这使你能够在继续之前暂停图并等待用户输入或批准。
- en: 5\. **How can I trace my agent’s behavior?**
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
  zh: 5. **我如何跟踪我的代理行为？**
- en: LangGraph integrates natively with **LangSmith**, which provides detailed traces
    and observability into your agent’s behaviors with minimal setup.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
  zh: LangGraph与**LangSmith**原生集成，它提供了详细的跟踪和可观察性，以最小的设置深入了解你的代理行为。
- en: 6\. **How can my agent automatically discover and use new tools?**
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
  zh: 6. **我的代理如何自动发现并使用新工具？**
- en: LangGraph supports **MCP** (Model Context Protocol)integrations. This allows
    it to auto-discover and use tools that follow this open standard.
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
  zh: LangGraph支持**MCP**（模型上下文协议）集成。这允许它自动发现并使用遵循此开放标准的工具。
- en: Check out the LangGraph [official docs](https://langchain-ai.github.io/langgraph/concepts/why-langgraph/)
    for more details.
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
  zh: 查看LangGraph[官方文档](https://langchain-ai.github.io/langgraph/concepts/why-langgraph/)获取更多详细信息。
- en: 📌Key takeaways
  id: totrans-251
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 📌关键要点
- en: 'Let’s recap what we’ve covered in this section:'
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们回顾一下本节中我们涵盖的内容：
- en: '**Structured output**: Use .`with_structured_output` to force the AI’s response
    to fit a specific structure you define. This makes sure you always get clean,
    reliable data that your downstream steps can easily parse.'
  id: totrans-253
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**结构化输出**：使用`.with_structured_output`强制AI的响应符合你定义的特定结构。这确保你总是得到干净、可靠的数据，下游步骤可以轻松解析。'
- en: '**Tool calling**: You can embed tools in the model calls so that the agent
    can interact with the outside world.'
  id: totrans-254
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**工具调用**：你可以在模型调用中嵌入工具，使代理能够与外部世界交互。'
- en: '**Conditional routing**: This is how you build “choose your own adventure”
    logic. A node can decide where to go next simply by returning the name of the
    next node. This way, you can dynamically create loops and decision points, making
    your agent’s workflow much more intelligent.'
  id: totrans-255
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**条件路由**：这是构建“选择你的冒险”逻辑的方法。一个节点可以通过简单地返回下一个节点的名称来决定下一步去哪里。这样，你可以动态地创建循环和决策点，使你的代理工作流程变得更加智能。'
- en: '**Parallel processing**: LangGraph allows you to trigger multiple steps to
    run at the same time. All the heavy lifting of fanning out the jobs and fanning
    back in to collect the results are automatically handled by LangGraph.'
  id: totrans-256
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**并行处理**：LangGraph允许你同时触发多个步骤运行。所有将工作扇出和收集结果的繁重工作都由LangGraph自动处理。'
- en: '**Configuration management**: Instead of scattering settings throughout your
    code, you can use a dedicated Configuration class to manage runtime settings,
    environment variables, defaults, etc., in one clean, central place.'
  id: totrans-257
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**配置管理**：你不需要在代码中分散设置，可以使用专门的配置类来管理运行时设置、环境变量、默认值等，在一个干净、集中的地方。'
- en: '![](../Images/58e3a166631d7a6b1d09a6e828f640ab.png)'
  id: totrans-258
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/58e3a166631d7a6b1d09a6e828f640ab.png)'
- en: Figure 8\. Various aspects of enhancing LLM agent capabilities. (Image by author)
  id: totrans-259
  prefs: []
  type: TYPE_NORMAL
  zh: 图8.增强LLM代理能力各个方面。（图片由作者提供）
- en: '* * *'
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 4\. Conclusions
  id: totrans-261
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4. 结论
- en: 'We have covered a lot of ground in this post! Now we’ve seen how LangGraph’s
    core concepts come together to build a real-world research agent, let’s conclude
    our journey with a few key takeaways:'
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们覆盖了很多内容！现在我们已经看到LangGraph的核心概念是如何结合在一起构建一个现实世界的研究代理，让我们通过一些关键要点来结束我们的旅程：
- en: '**Graphs naturally describe agentic workflows.** Real-world workflows involve
    loops, branches, and dynamic decisions. LangGraph’s graph-based architecture (nodes,
    edges, and state) provides a clean and intuitive way to represent and manage this
    complexity.'
  id: totrans-263
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**图自然描述代理工作流程**。现实世界的工作流程涉及循环、分支和动态决策。LangGraph基于图架构（节点、边和状态）提供了一个干净直观的方式来表示和管理这种复杂性。'
- en: '**State is the agent’s memory.** The central `OverallState` object is a shared
    whiteboard that every node in the graph can look at and write on. Together with
    node-specific state schemas, they create the agent’s memory system.'
  id: totrans-264
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**状态是代理的记忆**。中心的`OverallState`对象是一个共享的白板，图中的每个节点都可以查看并写入。与节点特定的状态模式一起，它们构成了代理的记忆系统。'
- en: '**Nodes are modular components that are reusable.** In LangGraph, you should
    build nodes with clear responsibilities, e.g., generating queries, calling tools,
    or routing logic. This makes the agentic system easier to test, maintain, and
    extend.'
  id: totrans-265
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**节点是可重用的模块化组件**。在LangGraph中，你应该构建具有明确职责的节点，例如生成查询、调用工具或路由逻辑。这使得代理系统更容易测试、维护和扩展。'
- en: '**Control is in your hands.** In LangGraph, you can direct the logical flow
    with **conditional edges**, enforce data reliability with **structured outputs**,
    use **centralized configuration** to tune parameters globally, or use `Send` to
    achieve parallel execution of tasks. Their combination gives you the power to
    build smart, efficient, and reliable agents.'
  id: totrans-266
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**控制权在你手中**。在LangGraph中，你可以通过**条件边**来引导逻辑流程，通过**结构化输出**来确保数据可靠性，使用**集中配置**来全局调整参数，或者使用`Send`来实现任务的并行执行。它们的组合赋予你构建智能、高效和可靠的代理的能力。'
- en: Now with all the knowledge you have about LangGraph, what do you want to build
    next?
  id: totrans-267
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你已经了解了关于LangGraph的所有知识，接下来你想要构建什么？
