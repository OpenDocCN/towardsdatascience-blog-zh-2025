- en: Nine Pico PIO Wats with MicroPython (Part 2)
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/nine-pico-pio-wats-with-micropython-part-2-984a642f25a4/](https://towardsdatascience.com/nine-pico-pio-wats-with-micropython-part-2-984a642f25a4/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![Pico PIO Surprises, Part 2 - Source: https://openai.com/dall-e-2/. All other
    figures from the author.](../Images/fbe9558191420d908432118a1ff89518.png)'
  id: totrans-2
  prefs: []
  type: TYPE_IMG
- en: 'Pico PIO Surprises, Part 2 – Source: [https://openai.com/dall-e-2/](https://openai.com/dall-e-2/).
    All other figures from the author.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: This is Part 2 of an exploration into the unexpected quirks of programming the
    Raspberry Pi Pico PIO with MicroPython. If you missed [Part 1](https://medium.com/towards-data-science/nine-pico-pio-wats-with-micropython-part-1-82b80fb84473),
    we uncovered four Wats that challenge assumptions about register count, instruction
    slots, the behavior of `pull(noblock)`, and smart yet cheap hardware.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: Now, we continue our journey toward crafting a theremin-like musical instrument
    – a project that reveals some of the quirks and perplexities of PIO programming.
    Prepare to challenge your understanding of constants in a way that brings to mind
    a Shakespearean tragedy.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: 'Wat 5: Inconstant Constants'
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In the world of PIO programming, constants should be reliable, steadfast, and,
    well, *constant*. But what if they’re not? This brings us to a puzzling Wat about
    how the `set` instruction in PIO works—or doesn’t—when handling larger constants.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: Much like Juliet doubting Romeo’s constancy, you might find yourself wondering
    if PIO constants will, as she says, "prove likewise variable."
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: 'The Problem: Constants Are Not as Big as They Seem'
  id: totrans-9
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Imagine you’re programming an ultrasonic range finder and need to count down
    from 500 while waiting for the Echo signal to drop from high to low. To set up
    this wait time in PIO, you might naively try to load the constant value directly
    using `set`:'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  id: totrans-11
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'Aside: Don’t try to understand the crazy `jmp` operations here. We’ll discuss
    those next in **Wat 6**.'
  id: totrans-12
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'But here’s the tragic twist: the `set` instruction in PIO is limited to constants
    between `0` and `31`. Moreover, MicroPython’s star-crossed `set` instruction doesn’t
    report an error. Instead, [it silently corrupts the entire PIO instruction](https://forums.raspberrypi.com/viewtopic.php?p=2289656#p2289173).
    (PIO from Rust shows a similar problem.) This produces a nonsense result.'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: Workarounds for Inconstant Constants
  id: totrans-14
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'To address this limitation, consider the following approaches:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: '**Read Values and Store Them in a Register:** We saw this approach in **Wat
    1**. You can load your constant in the `osr` register, then transfer it to `y`.
    For example:'
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE1]'
  id: totrans-17
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '**Shift and Combine Smaller Values:** Using the `isr` register and the `in_`
    instruction, you can build up a constant of any size. This, however, consumes
    time and operations from your 32-operation budget (see [Part 1](https://medium.com/towards-data-science/nine-pico-pio-wats-with-micropython-part-1-82b80fb84473),
    **Wat 2**).'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE2]'
  id: totrans-19
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '**Slow Down the Timing**: Reduce the frequency of the state machine to stretch
    delays over more system clock cycles. For example, lowering the state machine
    speed from 150 MHz to 343 kHz reduces the timeout constant `218,659` to `500`.'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**减慢计时速度**：降低状态机的频率，以便在更多的系统时钟周期中扩展延迟。例如，将状态机速度从 150 MHz 降低到 343 kHz，将超时常数
    `218,659` 降低到 `500`。'
- en: '**Use Extra Delays and (Nested) Loops:** All instructions support an optional
    delay, allowing you to add up to 31 extra cycles. (To generate even longer delays,
    use loops – or even nested loops.)'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**使用额外的延迟和（嵌套）循环**：所有指令都支持可选的延迟，允许你添加多达 31 个额外的周期。（要生成更长的延迟，请使用循环——甚至嵌套循环。）'
- en: '[PRE3]'
  id: totrans-22
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '**Use the "Subtraction Trick" to Generate the Maximum 32-bit Integer**: ****
    In** Wat** 7, we’ll explore a way to generate `4,294,967,295` (the maximum unsigned
    32-bit integer) via subtraction.'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**使用“减法技巧”生成最大的 32 位整数**：在 Wat 7 中，我们将探讨一种通过减法生成 `4,294,967,295`（最大的无符号 32
    位整数）的方法。'
- en: Much like Juliet cautioning against swearing by the inconstant moon, we’ve discovered
    that PIO constants are not always as steadfast as they seem. Yet, just as their
    story takes unexpected turns, so too does ours, moving from the inconstancy of
    constants to the uneven nature of conditions. In the next Wat, we’ll explore how
    PIO’s handling of conditional jumps can leave you questioning its loyalty to logic.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 就像朱丽叶警告不要向不稳定的月亮发誓一样，我们发现 PIO 常数并不总是像看起来那样坚定不移。然而，就像他们的故事有意外转折一样，我们的故事也是如此，从常数的不可靠性转向条件的非均匀性。在下一个
    Wat 中，我们将探讨 PIO 处理条件跳转的方式可能会让你对其对逻辑的忠诚度产生怀疑。
- en: 'Wat 6: Conditions Through the Looking-Glass'
  id: totrans-25
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Wat 6：通过镜中奇遇的条件
- en: 'In most programming environments, logical conditions feel balanced: you can
    test if a pin is high or low, or check registers for equality or inequality. In
    PIO, this symmetry breaks down. You can jump on pin high, but not pin low, and
    on `x_not_y`, but not `x_eq_y`. The rules are whimsical – like Humpty Dumpty in
    *Through the Looking-Glass*: "When I offer a condition, it means just what I choose
    it to mean – neither more nor less."'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 在大多数编程环境中，逻辑条件感觉是平衡的：你可以测试引脚是高还是低，或者检查寄存器是否相等或不等。在 PIO 中，这种对称性被打破了。你可以对引脚高进行跳转，但不能对引脚低进行跳转，也不能对
    `x_not_y` 进行跳转，但不能对 `x_eq_y` 进行跳转。规则是任性的——就像《爱丽丝镜中奇遇记》中的 Humpty Dumpty：“当我提出一个条件时，它意味着我选择的意思——不多也不少。”
- en: These quirks force us to rewrite our code to fit the lopsided logic, creating
    a gulf between how we wish the code could be written and how we must write it.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 这些怪癖迫使我们重写代码以适应不平衡逻辑，从而在我们希望代码如何编写和我们必须如何编写代码之间产生鸿沟。
- en: 'The Problem: Lopsided Conditions in Action'
  id: totrans-28
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 问题：不平衡条件在实际中的应用
- en: 'Consider a simple scenario: using a range finder, you want to count down from
    a maximum wait time (`y`) until the ultrasonic echo pin goes low. Intuitively,
    you might write the logic like this:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑一个简单的场景：使用测距仪，你想要从最大等待时间（`y`）开始倒计时，直到超声波回声引脚变低。直观地，你可能会这样编写逻辑：
- en: '[PRE4]'
  id: totrans-30
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'And when processing the measurement, if we only wish to output values that
    differ from the previous value, we would write:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 在处理测量时，如果我们只想输出与上一个值不同的值，我们会这样编写：
- en: '[PRE5]'
  id: totrans-32
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Unfortunately, PIO doesn’t let you test `not_pin` or `x_eq_y` directly. You
    must restructure your logic to accommodate the available conditions, such as `pin`
    and `x_not_y`.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 不幸的是，PIO 不允许你直接测试 `not_pin` 或 `x_eq_y`。你必须重新构建你的逻辑以适应可用的条件，例如 `pin` 和 `x_not_y`。
- en: 'The Solution: The Way It Must Be'
  id: totrans-34
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 解决方案：必须这样做的方式
- en: 'Given PIO’s limitations, we adapt our logic with a two-step approach that ensures
    the desired behavior despite the missing conditions:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到 PIO 的限制，我们采用两步方法来适应逻辑，以确保即使缺少条件也能实现所需的行为：
- en: Jump on the opposite condition to skip two instructions forward.
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 跳转到相反的条件以跳过两个指令。
- en: Next use an unconditional jump to reach the desired target.
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 接下来使用无条件跳转以到达目标位置。
- en: This workaround adds one extra jump (affecting the instruction limit), but the
    additional label is cost-free.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 这种解决方案增加了一个额外的跳转（影响指令限制），但额外的标签是免费的。
- en: 'Here is the rewritten code for counting down until the pin goes low:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是重新编写的代码，用于倒计时直到引脚变低：
- en: '[PRE6]'
  id: totrans-40
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'And here is the code for processing the measurement such that it will only
    output differing values:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是处理测量的代码，以确保它只输出不同的值：
- en: '[PRE7]'
  id: totrans-42
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: Lessons from Humpty Dumpty’s Conditions
  id: totrans-43
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 从 Humpty Dumpty 的条件中汲取的教训
- en: In *Through the Looking-Glass*, Alice learns to navigate Humpty Dumpty’s peculiar
    world – just as you’ll learn to navigate PIO’s Wonderland of lopsided conditions.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 在《爱丽丝镜中奇遇记》中，爱丽丝学会了在 Humpty Dumpty 的奇特世界中导航——就像你将学会在 PIO 的不平衡条件奇境中导航。
- en: But as soon as you master one quirk, another reveals itself. In the next Wat,
    we’ll uncover a surprising behavior of `jmp` that, if it were an athlete, would
    shatter world records.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，一旦你掌握了一个怪癖，另一个就会暴露出来。在下一个Wat中，我们将揭示`jmp`的一个令人惊讶的行为，如果它是一名运动员，将会打破世界纪录。
- en: 'Wat 7: Overshooting Jumps'
  id: totrans-46
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Wat 7：越界跳跃
- en: In [Part 1’s](https://medium.com/towards-data-science/nine-pico-pio-wats-with-micropython-part-1-82b80fb84473)
    **Wat 1** and **Wat 3**, we saw how `jmp x_dec` or `jmp y_dec` is often used to
    loop a fixed number of times by decrementing a register until it reaches 0\. Straightforward
    enough, right? But what happens when `y` is 0 and we run the following instruction?
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 在[第1部分的](https://medium.com/towards-data-science/nine-pico-pio-wats-with-micropython-part-1-82b80fb84473)
    **Wat 1** 和 **Wat 3** 中，我们看到了`jmp x_dec`或`jmp y_dec`通常是如何通过递减一个寄存器直到它达到0来循环固定次数的。这很简单，对吧？但是当`y`为0时，我们运行以下指令会发生什么呢？
- en: '[PRE8]'
  id: totrans-48
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'If you guessed that it does **not** jump to `measure_echo_loop` and instead
    falls through to the next instruction, you’re absolutely correct. But for full
    credit, answer this: **What value does `y` have after the instruction?**'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你猜到它**不会**跳转到`measure_echo_loop`，而是直接跳到下一条指令，你完全正确。但为了满分，回答这个问题：**指令执行后`y`的值是多少？**
- en: 'The answer: **4,294,967,295.** Why? Because `y` is decremented **after** it
    is tested for zero. *Wat!?*'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 答案：**4,294,967,295**。为什么？因为`y`在测试为零之后才会递减。*哇！*
- en: This value, 4,294,967,295, is the maximum for a 32-bit unsigned integer. It’s
    as if a track-and-field long jumper launches off the takeoff board but, instead
    of landing in the sandpit, overshoots and ends up on another continent.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 这个值，4,294,967,295，是32位无符号整数的最大值。这就像田径长跑运动员从起跑板起跳，但不是落在沙坑里，而是越过了沙坑，最终落在另一个大陆上。
- en: 'Aside: **** As foreshadowed in** Wat** 5, we can use this behavior intentionally
    to set a register to the value 4,294,967,295.'
  id: totrans-52
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 旁白：****正如在Wat 5中预示的那样，我们可以有意使用这种行为来将寄存器设置为4,294,967,295的值。
- en: Now that we’ve learned how to stick the landing with `jmp`, let’s see if we
    can avoid getting stuck by the pins that PIO reads and sets.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经学会了如何使用`jmp`来成功着陆，让我们看看我们是否可以避免被PIO读取和设置的引脚卡住。
- en: 'Wat 8: Too Many "Pins"'
  id: totrans-54
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Wat 8：引脚过多
- en: In Dr. Seuss’s *Too Many Daves*, Mrs. McCave had 23 sons, all named Dave, leading
    to endless confusion whenever she called out their name. In PIO programming, `pin`
    and `pins` can refer to completely different ranges of pins depending on the context.
    It’s hard to know which Dave or Daves you’re talking to.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 在苏斯博士的《太多的大卫》中，麦克凯夫夫人有23个儿子，他们都叫大卫，每当她叫他们的名字时，就会引起无尽的混乱。在PIO编程中，`pin`和`pins`可以根据上下文指代完全不同的引脚范围。很难知道你在和哪个大卫或大卫们说话。
- en: 'The Problem: Pin Ranges and Bases'
  id: totrans-56
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 问题：引脚范围和基
- en: 'In PIO, both `pin` and `pins` depend on **base pins** defined outside the program.
    Each instruction interacts with a specific base pin, and some instructions also
    operate on a range of pins starting from that base. To clarify PIO’s behavior,
    I created this table:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 在PIO中，`pin`和`pins`都依赖于程序外部定义的**基引脚**。每条指令都与一个特定的基引脚交互，一些指令还操作从该基引脚开始的引脚范围。为了阐明PIO的行为，我创建了这个表格：
- en: '![](../Images/0caf7b5a64e9ab7bd1e1f08ab6c6c289.png)'
  id: totrans-58
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/0caf7b5a64e9ab7bd1e1f08ab6c6c289.png)'
- en: Table showing how PIO interprets ‘pin’ and ‘pins’ in different instructions,
    with their associated contexts and configurations.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 表格显示了PIO如何在不同指令中解释“pin”和“pins”，以及它们相关的上下文和配置。
- en: 'Example: Distance Program for the Range Finder'
  id: totrans-60
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 示例：测距仪的距离程序
- en: 'Here’s a PIO program for measuring the distance to an object using **Trigger**
    and **Echo** pins. The key features of this program are:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个使用**触发**和**回声**引脚测量物体距离的PIO程序。此程序的关键特性包括：
- en: '**Continuous Operation**: The range finder runs in a loop as fast as possible.'
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**连续运行**：测距仪尽可能快地循环运行。'
- en: '**Maximum Range Limit**: Measurements are capped at a given distance, with
    a return value of `4,294,967,295` if no object is detected.'
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**最大范围限制**：测量值被限制在给定距离，如果未检测到物体，则返回值为`4,294,967,295`。'
- en: '**Filtered Outputs**: Only measurements that differ from their immediate predecessor
    are sent, reducing the output rate.'
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**过滤输出**：只有与直接前驱不同的测量值才会发送，从而降低输出速率。'
- en: Glance over the program and notice that although it is working with two pins
    – **Trigger** and **Echo** – throughout the program we only see `pin` and `pins`.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 快速浏览程序，注意尽管它在整个程序中都在使用两个引脚——**触发**和**回声**——但我们只看到了`pin`和`pins`。
- en: '[PRE9]'
  id: totrans-66
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: Configuring Pins
  id: totrans-67
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 配置引脚
- en: 'To ensure the PIO program behaves as intended:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 为了确保PIO程序按预期运行：
- en: '`set(pins, 0b1)` should control the **Trigger** pin.'
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`set(pins, 0b1)`应控制**触发器**引脚。'
- en: '`wait(1, pin, 0)` should monitor the **Echo** pin.'
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`wait(1, pin, 0)`应监控**回声**引脚。'
- en: '`jmp(pin, "echo_active")` should also monitor the **Echo** pin.'
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`jmp(pin, "echo_active")`也应监控**回声**引脚。'
- en: 'Here’s how you can configure this in MicroPython:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是你在MicroPython中配置此方法的方式：
- en: '[PRE10]'
  id: totrans-73
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: 'The key here is the optional **`in_base`, `set_base`, and `jmp_pin`** inputs
    to the `StateMachine` constructor:'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 关键在于`StateMachine`构造函数的可选**`in_base`、`set_base`和`jmp_pin`**输入：
- en: '`in_base`: Specifies the starting pin for **input operations**, such as `wait(1,
    pin, ...)`.'
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`in_base`: 指定**输入操作**的起始引脚，例如 `wait(1, pin, ...)`.'
- en: '`set_base`: Configures the starting pin for **set operations**, like `set(pins,
    1)`.'
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`set_base`: 配置**设置操作**的起始引脚，如 `set(pins, 1)`.'
- en: '`jmp_pin`: Defines the pin used in **conditional jumps**, such as `jmp(pin,
    ...)`.'
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`jmp_pin`: 定义用于**条件跳转**的引脚，例如 `jmp(pin, ...)`.'
- en: 'As described in the table, other optional inputs include:'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 如表格中所述，其他可选输入包括：
- en: '`out_base`: Sets the starting pin for **output operations**, such as `out(pins,
    ...)`.'
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`out_base`: 设置**输出操作**的起始引脚，例如 `out(pins, ...)`.'
- en: '`sideset_base`: Configures the starting pin for **sideset operations**, which
    allow simultaneous pin toggling during other instructions.'
  id: totrans-80
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`sideset_base`: 配置**sideset操作**的起始引脚，这允许在执行其他指令时同时切换引脚。'
- en: Configuring Multiple Pins
  id: totrans-81
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 配置多个引脚
- en: Although not required for this program, you can configure a range of pins in
    PIO using a tuple that specifies the **initial states** for each pin. Unlike what
    you might expect, the range is not defined by specifying a base pin and a count
    (or end). Instead, the tuple determines the pins’ initial values and implicitly
    sets the range, starting from the `set_base` pin.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然此程序不需要，但你可以在PIO中使用元组配置一系列引脚，该元组指定每个引脚的**初始状态**。与你的预期不同，范围不是通过指定基引脚和计数（或结束）来定义的。相反，元组确定引脚的初始值，并隐式设置范围，从`set_base`引脚开始。
- en: 'For example, the following PIO decorator configures two pins with initial states
    of `OUT_LOW`:'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，以下PIO装饰器配置了两个初始状态为`OUT_LOW`的引脚：
- en: '[PRE11]'
  id: totrans-84
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: 'If `set_base` is set to pin 17, this tuple designates pin 17 and the next consecutive
    pin (pin 18) as "set pins." A single instruction can then control both pins:'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 如果`set_base`设置为引脚17，则此元组指定引脚17和下一个连续的引脚（引脚18）为“设置引脚”。然后，单个指令可以控制这两个引脚：
- en: '[PRE12]'
  id: totrans-86
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: This approach lets you efficiently apply bit patterns to multiple pins simultaneously,
    streamlining control for applications involving multiple outputs.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法允许你有效地将位模式应用于多个引脚，从而简化涉及多个输出的应用的控件。
- en: '**Aside: The Word "Set" in Programming** In programming, the word "set" is
    notoriously overloaded with multiple meanings. In the context of PIO, "set" refers
    to something to which you can assign a value – such as a pin’s state. It does
    **not** mean a collection of things, as it often does in other programming contexts.
    When PIO refers to a collection, it usually uses the term "range" instead. This
    distinction is crucial for avoiding confusion as you work with PIO.'
  id: totrans-88
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**旁白：编程中的“设置”一词** 在编程中，“设置”一词因其多重含义而臭名昭著。在PIO的上下文中，“设置”指的是你可以分配值的东西——例如引脚的状态。它**不**意味着事物集合，正如它在其他编程上下文中经常做的那样。当PIO提到集合时，它通常使用“范围”一词。这种区别对于避免混淆至关重要，尤其是在你使用PIO时。'
- en: Lessons from Mrs. McCave
  id: totrans-89
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 从麦克凯夫夫人的经验教训
- en: In *Too Many Daves*, Mrs. McCave lamented not giving her 23 Daves more distinct
    names. You can avoid her mistake by clearly documenting your pins with meaningful
    names – like **Trigger** and **Echo** – in your comments.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 在《太多戴夫》中，麦克凯夫夫人哀叹没有给她的23个戴夫起更独特的名字。你可以通过在注释中清晰地记录具有意义名称的引脚（如**触发器**和**回声**）来避免她的错误。
- en: But if you think handling these pin ranges is tricky, debugging a PIO program
    adds an entirely new layer of challenge. In the next Wat, we’ll dive into the
    kludgy debugging methods available. Let’s see just how far we can push them.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 但如果你认为处理这些引脚范围很棘手，调试PIO程序则增加了全新的挑战层。在下一节Wat中，我们将深入了解可用的粗糙调试方法。让我们看看我们能将它们推进多远。
- en: 'Wat 9: Kludgy Debugging'
  id: totrans-92
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 'Wat 9: 粗糙的调试'
- en: I like to debug with interactive breakpoints in VS Code. MicroPython does not
    support that.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 我喜欢在VS Code中使用交互式断点进行调试。MicroPython不支持这一点。
- en: The fallback is **`print` debugging**, where you insert temporary print statements
    to see what the code is doing and the values of variables. MicroPython supports
    this, but PIO does not.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 备用方案是**`print`调试**，其中你插入临时打印语句以查看代码正在做什么以及变量的值。MicroPython支持这一点，但PIO不支持。
- en: The fallback to the fallback is **push-to-print debugging**. In PIO, you temporarily
    output integer values of interest. Then, in MicroPython, you print those values
    for inspection.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 回退到回退的是**按打印调试**。在PIO中，你暂时输出感兴趣的整数值进行调试。然后在MicroPython中，你打印这些值以进行检查。
- en: For example, in the following PIO program, we temporarily add instructions to
    push the value of `x` for debugging. We also include `set` and `out` to push a
    constant value, such as 7, which must be between 0 and 31 inclusive.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，在下面的PIO程序中，我们暂时添加指令以推送`x`的值进行调试。我们还包括`set`和`out`以推送一个常数，例如7，这个值必须在0到31之间（包括0和31）。
- en: '[PRE13]'
  id: totrans-97
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: 'Back in MicroPython, you can read and print these values to help understand
    what’s happening in the PIO code:'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 在MicroPython中，你可以读取并打印这些值以帮助理解PIO代码中发生的情况：
- en: '[PRE14]'
  id: totrans-99
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: 'Outputs:'
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 输出：
- en: '[PRE15]'
  id: totrans-101
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: When push-to-print debugging isn’t enough, you can turn to hardware tools. I
    bought my first oscilloscope (a **FNIRSI DSO152**, for $37). With it, I was able
    to confirm the **Echo** signal was working. The **Trigger** signal, however, was
    too fast for this inexpensive oscilloscope to capture clearly.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 当按打印调试不足以解决问题时，你可以转向硬件工具。我买了我第一台示波器（**FNIRSI DSO152**，售价37美元）。有了它，我能够确认**Echo**信号是正常工作的。然而，**触发**信号对于这个廉价的示波器来说太快，无法清晰地捕捉。
- en: Using these methods – especially push-to-print debugging – you can trace the
    flow of your PIO program, even without a traditional debugger.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 使用这些方法——特别是按打印调试——你可以在没有传统调试器的情况下追踪你的PIO程序流程。
- en: Aside**:** In C/C++ (and potentially Rust), you can get closer to a full debugging
    experience for PIO, for example, by using the **piodebug** project.
  id: totrans-104
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 旁注：在C/C++（以及可能Rust）中，你可以通过使用**piodebug**项目等方式，更接近于完整的PIO调试体验。
- en: That concludes the nine Wats, but let’s bring everything together in a bonus
    Wat.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 这样就完成了九个Wats，但让我们在额外的Wats中将所有内容汇总在一起。
- en: 'Bonus Wat 10: Putting It All Together'
  id: totrans-106
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 奖励Wats 10：将所有内容汇总在一起
- en: Now that all the components are ready, it’s time to combine them into a working
    theremin-like musical instrument. We need a MicroPython monitor program. This
    program starts both PIO state machines – one for measuring distance and the other
    for generating tones. It then waits for a new distance measurement, maps that
    distance to a tone, and sends the corresponding tone frequency to the tone-playing
    state machine. If the distance is out of range, it stops the tone.
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 现在所有组件都已准备就绪，是时候将它们组合成一个可以工作的类似瑟琳的音乐仪器了。我们需要一个MicroPython监控程序。这个程序启动了两个PIO状态机——一个用于测量距离，另一个用于生成音调。然后它等待新的距离测量值，将该距离映射到音调，并将相应的音调频率发送到播放音调的状态机。如果距离超出范围，它将停止音调。
- en: '**MicroPython’s Place**: At the heart of this system is a function that maps
    distances (from 0 to 50 cm) to tones (approximately **B2** to **F5**). This function
    is simple to write in MicroPython, leveraging Python’s floating-point math and
    exponential operations. Implementing this in PIO would be virtually impossible
    due to its limited instruction set and lack of floating-point support.'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: '**MicroPython的位置**：在这个系统的核心是一个将距离（从0到50厘米）映射到音调（大约**B2**到**F5**）的功能。在MicroPython中编写这个功能很简单，利用Python的浮点数数学和指数运算。由于其有限的指令集和缺乏浮点数支持，在PIO中实现这一点几乎是不可能的。'
- en: 'Here’s the monitor program to run the theremin:'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是运行瑟琳的监控程序：
- en: '[PRE16]'
  id: totrans-110
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: Notice how using two PIO state machines and a MicroPython monitor program lets
    us run three programs at once. This approach combines simplicity with responsiveness,
    achieving a level of performance that would otherwise be difficult to realize
    in MicroPython alone.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，使用两个PIO状态机和MicroPython监控程序，我们能够同时运行三个程序。这种方法将简单性与响应性结合起来，实现了在MicroPython中单独难以实现的高性能水平。
- en: Now that we’ve assembled all the components, let’s watch the video again of
    me "playing" the musical instrument. On the monitor screen, you can see the debugging
    prints displaying the distance measurements and the corresponding tones. This
    visual connection highlights how the system responds in real time.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经组装了所有组件，让我们再次观看我“演奏”这个音乐仪器的视频。在监控屏幕上，你可以看到调试打印显示距离测量值和相应的音调。这种视觉连接突出了系统如何实时响应。
- en: Conclusion
  id: totrans-113
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: PIO programming on the Raspberry Pi Pico is a captivating blend of simplicity
    and complexity, offering unparalleled hardware control while demanding a shift
    in mindset for developers accustomed to higher-level programming. Through the
    nine Wats we’ve explored, PIO has both surprised us with its limitations and impressed
    us with its raw efficiency.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Raspberry Pi Pico 上进行 PIO 编程是简单与复杂的迷人结合，提供了无与伦比的硬件控制，同时要求开发者改变习惯于高级编程的思维模式。通过我们探索的九个方面，PIO
    既有其局限性让我们感到惊讶，也有其原始效率让我们印象深刻。
- en: 'While we’ve covered significant ground – managing state machines, pin assignments,
    timing intricacies, and debugging – there’s still much more you can learn as needed:
    DMA, IRQ, side-set pins, differences between PIO on the Pico 1 and Pico 2, autopush
    and autopull, FIFO join, and more.'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然我们已经覆盖了大量的内容——包括状态机管理、引脚分配、时序复杂性以及调试，但在需要时，您还可以学习到更多：DMA、IRQ、旁路设置引脚、Pico 1
    和 Pico 2 上 PIO 的区别、自动推送和自动拉取、FIFO 联接等。
- en: '**Recommended Resources**'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: '**推荐资源**'
- en: '[Code for this project on GitHub](https://github.com/CarlKCarlK/pico_pio/)'
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[GitHub 上的此项目代码](https://github.com/CarlKCarlK/pico_pio/)'
- en: '[MicroPython PIO documentation](https://docs.micropython.org/en/latest/library/rp2.PIO.html)'
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[MicroPython PIO 文档](https://docs.micropython.org/en/latest/library/rp2.PIO.html)'
- en: '[The Pico SDK manual](https://datasheets.raspberrypi.com/pico/raspberry-pi-pico-c-sdk.pdf),
    Chapter 3'
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Pico SDK 手册](https://datasheets.raspberrypi.com/pico/raspberry-pi-pico-c-sdk.pdf)，第三章'
- en: The [RP2040](https://datasheets.raspberrypi.com/rp2040/rp2040-datasheet.pdf)
    (Pico 1) and [RP2350](https://datasheets.raspberrypi.com/rp2350/rp2350-datasheet.pdf)
    (Pico 2) datasheets
  id: totrans-120
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[RP2040](https://datasheets.raspberrypi.com/rp2040/rp2040-datasheet.pdf)（Pico
    1）和 [RP2350](https://datasheets.raspberrypi.com/rp2350/rp2350-datasheet.pdf)（Pico
    2）数据手册'
- en: At its core, PIO’s quirks reflect a design philosophy that prioritizes low-level
    hardware control with minimal overhead. By embracing these characteristics, PIO
    will not only meet your project’s demands but also open doors to new possibilities
    in embedded systems programming.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 在其核心，PIO 的特性反映了优先考虑低级别硬件控制且开销最小化的设计理念。通过拥抱这些特性，PIO 不仅能够满足您项目的需求，还能为嵌入式系统编程开辟新的可能性。
- en: '*Please [follow Carl on Medium](https://medium.com/@carlmkadie). I write on
    scientific programming in Rust and Python, machine learning, and statistics. I
    tend to write about one article per month.*'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: '*请[在 Medium 上关注 Carl](https://medium.com/@carlmkadie)。我撰写有关 Rust 和 Python 中的科学编程、机器学习和统计学方面的文章。我倾向于每月撰写一篇文章。*'
