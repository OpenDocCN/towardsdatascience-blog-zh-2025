- en: Beautiful, at this stage, your environment is ready. Now, let me share some
    quick ways to get your hands on 3D datasets.
  prefs: []
  type: TYPE_NORMAL
- en: '**Data Preparation for 3D Visualization**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'At the end of the article, I share with you the datasets as well as the code.
    However, in order to ensure you are fully independent, here are three reliable
    sources I regularly use to get my hands on point cloud data:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f15d1d7d88970c6e6c4adf9bc9161fc4.png)'
  prefs: []
  type: TYPE_IMG
- en: The LiDAR Data Download Process. © [F. Poux](https://learngeodata.eu/)
