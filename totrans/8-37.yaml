- en: LLM Evaluation, Parallel Computing, Demand Forecasting, and Other Hands-On Data
    Science Approaches
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: LLM评估、并行计算、需求预测以及其他动手数据科学方法
- en: 原文：[https://towardsdatascience.com/llm-evaluation-parallel-computing-demand-forecasting-and-other-hands-on-data-science-approaches-445f684b01dc/](https://towardsdatascience.com/llm-evaluation-parallel-computing-demand-forecasting-and-other-hands-on-data-science-approaches-445f684b01dc/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/llm-evaluation-parallel-computing-demand-forecasting-and-other-hands-on-data-science-approaches-445f684b01dc/](https://towardsdatascience.com/llm-evaluation-parallel-computing-demand-forecasting-and-other-hands-on-data-science-approaches-445f684b01dc/)
- en: Feeling inspired to write your first TDS post? [We’re always open to contributions
    from new authors](http://bit.ly/write-for-tds).
  id: totrans-2
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 感受到撰写你的第一篇TDS文章的灵感了吗？[我们始终欢迎新作者的贡献](http://bit.ly/write-for-tds)。
- en: As we all settle into the sometimes hectic rhythm of a new year, we hope you’ve
    been enjoying the excitement of kicking off projects, learning about new topics,
    and exploring your next career moves. We’re definitely seeing a flurry of activity
    among our authors—both longstanding contributors and recent additions—and are
    thrilled to share all the great work they’ve been cooking up over the holidays.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们所有人逐渐适应新年的有时繁忙的节奏时，我们希望你在享受启动项目、学习新主题和探索你的下一步职业发展的兴奋中。我们确实看到了作者们（包括长期贡献者和新加入的成员）的活跃，我们很高兴与他们分享他们在假期期间准备的所有优秀作品。
- en: Our lineup of top-notch reads this week has a distinctly actionable, hands-on
    flavor to it—after all, what better way to harness all this energy than by tinkering
    with some datasets, models, and code? Whether you’re interested in learning more
    about cutting-edge evaluation methods or building agentic-AI tools, we’ve got
    you covered with a diverse selection of tutorials and practical overviews. Ready
    to dive in?
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 本周我们精选的顶级阅读内容具有明显的实用性和动手操作风格——毕竟，还有什么比动手摆弄一些数据集、模型和代码更能利用这些能量呢？无论你对了解前沿评估方法还是构建代理人工智能工具感兴趣，我们都为你提供了一系列多样化的教程和实用概述。准备好深入探索了吗？
- en: '* * *'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '**[Paradigm Shifts of Eval in the Age of LLMs](https://towardsdatascience.com/paradigm-shifts-of-eval-in-the-age-of-llm-7afd58e55b29)**
    Is it time to reevaluate the way we approach evaluations? [Lili Jiang](None) believes
    it is: "I’ve come to recognize that LLMs requires some subtle, conceptually simple,
    yet important changes in the way we think about evaluation." Her latest article
    offers high-level insights into what a new paradigm might look like.'
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**[LLM时代评估的范式转变](https://towardsdatascience.com/paradigm-shifts-of-eval-in-the-age-of-llm-7afd58e55b29)**
    是否是时候重新评估我们对待评估的方式了？[李莉·江](None)认为这是时候了：“我逐渐认识到，LLM需要我们在评估思考方式上做出一些微妙、概念上简单但重要的改变。”她的最新文章提供了对可能的新范式的高层次见解。'
- en: '**[The Next Frontier in LLM Accuracy](https://towardsdatascience.com/the-next-frontier-in-llm-accuracy-cb2491a740d4)**
    Staying thematically close to LLM optimization, [Mariya Mansurova](None)‘s new
    deep dive unpacks in great detail several methods we can use to increase models’
    accuracy, and zooms in on advanced fine-tuning techniques.'
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**[LLM准确性的下一个前沿](https://towardsdatascience.com/the-next-frontier-in-llm-accuracy-cb2491a740d4)**
    与LLM优化主题保持一致，[玛丽亚·曼苏罗娃](None)的新深入分析详细介绍了我们可以用来提高模型准确性的几种方法，并聚焦于高级微调技术。'
- en: '![Photo by Vishal Banik on Unsplash](../Images/f9252c2eb24c836ba4865ce93397c214.png)'
  id: totrans-8
  prefs: []
  type: TYPE_IMG
  zh: '![由Vishal Banik在Unsplash上的照片](../Images/f9252c2eb24c836ba4865ce93397c214.png)'
- en: Photo by [Vishal Banik](https://unsplash.com/@vishalbanik16?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 由[Vishal Banik](https://unsplash.com/@vishalbanik16?utm_source=medium&utm_medium=referral)在[Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)上的照片
- en: '**[How to Build a Graph RAG App](https://towardsdatascience.com/how-to-build-a-graph-rag-app-b323fc33ba06)**
    Ready to roll up your sleeves and dig deep into some code? [Steve Hedden](None)‘s
    thorough tutorial on creating your first graph RAG app is a great option for anyone
    who’s interested in this trending topic but needs guidance and context to ensure
    they’re starting off on the right foot.'
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**[如何构建一个图RAG应用](https://towardsdatascience.com/how-to-build-a-graph-rag-app-b323fc33ba06)**
    准备好卷起袖子深入代码了吗？[史蒂夫·赫登](None)关于创建你的第一个图RAG应用的全面教程是任何对这一热门话题感兴趣但需要指导和背景以确保正确起步的人的好选择。'
- en: '**[Multi-Agentic RAG with Hugging Face Code Agents](https://towardsdatascience.com/multi-agentic-rag-with-hugging-face-code-agents-005822122930)**
    Agent-based systems gained enormous steam (and buzz) last year, and it doesn’t
    seem like that’s about to change in 2025\. Curious to learn more about them? [Gabriele
    Sgroi, PhD](None)‘s patient, step-by-step guide may be long, but it remains accessible
    and clear as it outlines the process of leveraging a "small" LLM to power a multi-agentic
    system—and produce good results, even on consumer-grade hardware.'
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**[使用 Hugging Face Code Agents 的多智能体 RAG](https://towardsdatascience.com/multi-agentic-rag-with-hugging-face-code-agents-005822122930)**
    基于代理的系统去年获得了巨大的势头（和关注），看起来在 2025 年这种情况不会改变。好奇想了解更多关于它们的信息？[Gabriele Sgroi, PhD](None)
    的耐心、逐步指南可能很长，但它仍然易于理解且清晰，概述了利用一个“小型”LLM 来驱动多智能体系统并产生良好结果的过程——即使在消费级硬件上也能做到。'
- en: '**[Demand Forecasting with Darts: A Tutorial](https://towardsdatascience.com/demand-forecasting-with-darts-a-tutorial-480ba5c24377)**LLMs
    may be grabbing much of our collective attention these days, but business-focused
    workflows remain the bread and butter of industry data scientists. [Sandra E.G.](None)‘s
    debut TDS article provides a robust, hands-on introduction to one such essential
    task: demand forecasting in the context of retail sales.'
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**[使用 Darts 进行需求预测：教程](https://towardsdatascience.com/demand-forecasting-with-darts-a-tutorial-480ba5c24377)**
    尽管这些天大型语言模型（LLMs）吸引了我们集体的注意力，但以业务为中心的工作流程仍然是行业数据科学家的工作重点。[Sandra E.G.](None) 的首篇
    TDS 文章提供了一次稳健的、实用的介绍，介绍了一个这样的基本任务：在零售销售背景下进行需求预测。'
- en: '**[Distributed Parallel Computing Made Easy with Ray](https://towardsdatascience.com/distributed-parallel-computing-made-easy-with-ray-f9043bb121b9)**
    It’s crucial for data and ML practitioners to experiment with new tools and frameworks,
    as seemingly small improvements can accumulate into major cost and efficiency
    benefits. [Betty LD](None) walks us through her recent foray into the AI-focused
    Ray library for distributed data processing, and demonstrates its power through
    the use case of scalable offline batch inference.'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**[使用 Ray 简化分布式并行计算](https://towardsdatascience.com/distributed-parallel-computing-made-easy-with-ray-f9043bb121b9)**
    对于数据和机器学习从业者来说，尝试新的工具和框架至关重要，因为看似微小的改进可以积累成重大的成本和效率效益。[Betty LD](None) 带我们了解她最近对专注于人工智能的
    Ray 库进行分布式数据处理的研究，并通过可扩展的离线批量推理用例展示了其功能。'
- en: '* * *'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'If you’re ready to branch out into other topics this week, we’re here to help—whether
    your interests lie at the intersection of music and AI, quantum computing, or
    linear algebra (among others), we hope you explore some of these excellent articles:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你本周准备拓展到其他主题，我们在这里帮助你——无论你的兴趣在于音乐和人工智能、量子计算、线性代数（以及其他），我们都希望你能探索一些这些优秀的文章：
- en: Presenting her team’s cutting-edge research, [Tula Masterman](None) explains
    how we can [leverage the hidden state from an intermediate Transformer layer](https://towardsdatascience.com/introducing-layer-enhanced-classification-lec-4972f4f1c79f)
    for efficient and robust content safety and prompt injection classification.
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Tula Masterman](None) 呈现她团队的前沿研究，解释了我们可以如何[利用中间 Transformer 层的隐藏状态](https://towardsdatascience.com/introducing-layer-enhanced-classification-lec-4972f4f1c79f)来实现高效和健壮的内容安全性和提示注入分类。'
- en: Music-centered AI tools continue to make strides; [Max Hilsdorf](None) devotes
    his latest exploration of the topic to [mono-to-stereo upmixing, a technique for
    enriching](https://towardsdatascience.com/mono-to-stereo-how-ai-is-breathing-new-life-into-music-4180f1357db4)
    or improving our music-listening experience.
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 以音乐为中心的人工智能工具持续取得进展；[Max Hilsdorf](None) 将他对这一主题的最新探索献给了[单声道到立体声提升，一种丰富或改善我们音乐聆听体验的技术](https://towardsdatascience.com/mono-to-stereo-how-ai-is-breathing-new-life-into-music-4180f1357db4)。
- en: With seven first-author publications under her belt, [Malak Sadek](None) is
    well-positioned to [offer concrete insights for other researchers](https://towardsdatascience.com/a-design-researchers-guide-to-publishing-151b0b70d80d)
    who’d like to grow their publishing footprint.
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 拥有七篇第一作者出版物，[Malak Sadek](None) 在为那些希望扩大其出版足迹的研究者[提供具体见解](https://towardsdatascience.com/a-design-researchers-guide-to-publishing-151b0b70d80d)方面处于有利位置。
- en: Continuing his ongoing series on key linear algebra concepts, [Rohit Pandey](None)
    recently shared a new, comprehensive explainer that looks at [the inner workings
    of orthonormal matrices](https://towardsdatascience.com/a-birds-eye-view-of-linear-algebra-orthonormal-matrices-856a2ca040aa).
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 继续他关于关键线性代数概念的系列文章，[Rohit Pandey](None) 最近分享了一个新的、全面的解释，探讨了[正交矩阵的内部工作原理](https://towardsdatascience.com/a-birds-eye-view-of-linear-algebra-orthonormal-matrices-856a2ca040aa)。
- en: Quantum computing has been a hot topic for some time now, though discussions
    of its promise can sometimes feel almost sci-fi-adjacent. Here to [help us make
    sense of the field and where things stand at the moment](https://towardsdatascience.com/the-state-of-quantum-computing-where-are-we-today-17ee19f51b1d)
    is [Sara A. Metwalli](None), whose primer comes right as the UN has declared 2025
    the international year of quantum science and technology.
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 量子计算已经是一个热门话题一段时间了，尽管对其前景的讨论有时几乎感觉像是科幻小说的邻近。以下是[Sara A. Metwalli](None)，她的入门指南正好在联合国宣布2025年为国际量子科学和技术年之际发布，[帮助我们理解这个领域以及目前的情况](https://towardsdatascience.com/the-state-of-quantum-computing-where-are-we-today-17ee19f51b1d)。
- en: While we’re on the topic, let’s round out this week’s selection with [Benjamin
    Assel](None)‘s nuanced discussion of [error-rate measurement in IBM quantum processors](https://towardsdatascience.com/measuring-quantum-noise-in-ibm-quantum-computers-60a6b739a547),
    which also includes code examples, using Qiskit.
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当我们谈论这个话题时，让我们用[Benjamin Assel](None)对[IBM量子处理器中的错误率测量](https://towardsdatascience.com/measuring-quantum-noise-in-ibm-quantum-computers-60a6b739a547)的细致讨论来结束本周的选择，其中还包括使用Qiskit的代码示例。
- en: '* * *'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Thank you for supporting the work of our authors! As we mentioned above, we
    love publishing articles from new authors, so if you’ve recently written an interesting
    project walkthrough, tutorial, or theoretical reflection on any of our core topics,
    don’t hesitate to [share it with us](http://bit.ly/write-for-tds).
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢您对我们作者工作的支持！正如我们上面提到的，我们喜欢发表新作者的文章，所以如果您最近撰写了一篇有趣的项目演练、教程或对我们核心主题的任何理论反思，请不要犹豫，[与我们分享](http://bit.ly/write-for-tds)。
- en: Until the next Variable,
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 直到下一个变量，
- en: TDS Team
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: TDS团队
