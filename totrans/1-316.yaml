- en: 'The Beauty of Space-Filling Curves: Understanding the Hilbert Curve'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 填充曲线之美：理解希尔伯特曲线
- en: 原文：[https://towardsdatascience.com/the-beauty-of-space-filling-curves-understanding-the-hilbert-curve/](https://towardsdatascience.com/the-beauty-of-space-filling-curves-understanding-the-hilbert-curve/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/the-beauty-of-space-filling-curves-understanding-the-hilbert-curve/](https://towardsdatascience.com/the-beauty-of-space-filling-curves-understanding-the-hilbert-curve/)
- en: 0\. Introduction
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 0. 简介
- en: <mdspan datatext="el1757106707102" class="mdspan-comment">Space-filling curves</mdspan>
    (SFC) are fascinating mathematical constructs with many practical applications
    in data science and data engineering. While they may sound abstract, they’re often
    hiding in plain sight—behind terms like Z-ordering or Liquid Clustering (used,
    for example, in platforms like Databricks). If you’ve worked with large-scale
    data platforms, chances are you’ve already used SFCs without realizing it.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1757106707102" class="mdspan-comment">填充曲线</mdspan>（SFC）是迷人的数学结构，在数据科学和数据工程中有许多实际应用。虽然它们可能听起来很抽象，但它们通常隐藏在显而易见的地方——例如在Z排序或液态聚类（例如在Databricks等平台上使用）等术语背后。如果你已经与大规模数据平台合作过，那么你很可能已经在不经意间使用了SFCs。
- en: Despite its relevance in modern systems, information on this topic is often
    fragmented, making it difficult to bridge theory and practice. This article aims
    to bridge that gap, while focusing on the Hilbert curve.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管在现代系统中具有重要意义，但关于这个主题的信息往往是零散的，这使得理论与实践之间的桥梁难以搭建。本文旨在弥合这一差距，同时聚焦于希尔伯特曲线。
- en: 'My goal is to offer a condensed and accessible overview of SFCs: starting with
    their mathematical origins, moving through practical implementation techniques,
    and ending with real-world applications in data processing and optimization. It’s
    not the plan to replace existing sources but rather reference them for more detailed
    information. Further sources for terminology and details will be referenced throughout
    the text.'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 我的目的是提供一个浓缩且易于理解的SFCs概述：从它们的数学起源开始，经过实际实施技术，最后到数据处理和优化的实际应用。这不是要取代现有的资源，而是为了提供更详细信息的参考。术语和细节的进一步来源将在全文中引用。
- en: '**You might ask: What is so fascinating about curves?** After all, a regular
    curve is easy to understand and probably not the first topic I would pick up a
    book about. But SFCs are different. They traverse every point in a continuous
    space, have fractal properties, and produce visually striking patterns when plotted
    in 2D or 3D-especially in lower iterations. So, let us take a closer look.'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: '**你可能会问：曲线有什么如此迷人的地方？** 毕竟，一条常规曲线很容易理解，可能不是我会首先选择的书籍主题。但是SFCs是不同的。它们穿越连续空间中的每一个点，具有分形特性，当在2D或3D中绘制时会产生视觉上引人注目的图案——尤其是在低迭代次数时。因此，让我们更深入地了解一下。'
- en: (If you want to start with visualization and animations directly, check out
    my [GitHub repository](https://github.com/PaulFroehling/Hilbert-Curve-Animation))
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: （如果你想直接从可视化动画开始，请查看我的[GitHub仓库](https://github.com/PaulFroehling/Hilbert-Curve-Animation)）
- en: 1\. History and Theory of Space-Filling Curves
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1. 填充曲线的历史与理论
- en: The study of SFCs dates back to the 19th century, when Georg Cantor made a groundbreaking
    discovery. He showed that ”two finite-dimensional smooth manifolds have the same
    cardinality, regardless of their dimensions.” [1]
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: SFCs的研究可以追溯到19世纪，当时乔治·康托尔做出了开创性的发现。他表明，“两个有限维光滑流形具有相同的基数，无论它们的维度如何。” [1]
- en: To illustrate this, consider the unit interval [0, 1] ⊂ R and the unit square
    [0, 1]² ⊂ R². Intuitively, one might expect the square to have a larger cardinality
    than the line segment. However, Cantor demonstrated that both sets actually have
    the same cardinality, using his method of interleaving decimals.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 为了说明这一点，考虑单位区间[0, 1] ⊂ R和单位正方形[0, 1]² ⊂ R²。直观上，人们可能会预期正方形的基数大于线段。然而，康托尔通过交错小数的方法证明了这两个集合实际上具有相同的基数。
- en: 'This result implies the existence of a bijection between the interval and the
    square, meaning there is a one-to-one correspondence between their elements. Following
    Cantor’s discovery, a natural question arose: Is there also a continuous bijection
    between these sets? Eugen Netto answered this question in the negative.'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 这个结果意味着区间和正方形之间存在双射，这意味着它们的元素之间存在一一对应关系。在康托尔的发现之后，一个自然的问题出现了：这些集合之间也存在连续的双射吗？尤根·内托对此问题给出了否定的答案。
- en: 'In this context, continuity can be interpreted geometrically: a continuous
    mapping would allow one to “draw” the image in 2D or 3D without lifting the pen
    – forming a curve. This insight laid the groundwork for the later development
    of SFCs — curves that, while continuous, can come arbitrarily close to filling
    a higher-dimensional'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个背景下，连续性可以几何地解释：一个连续映射将允许一个人在 2D 或 3D 中“绘制”图像，而无需抬起笔——形成一个曲线。这一洞察为后来 SFCs
    的发展奠定了基础——这些曲线虽然连续，但可以任意接近填充更高维的空间。
- en: space.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 空间。
- en: '2\. Peano Curve: The Discovery of Space-Filling Curves'
  id: totrans-14
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2. Peano 曲线：空间填充曲线的发现
- en: After Netto’s sobering discovery, the question arose as to whether such a mapping,
    if not bijective, could be surjective. The first one who was able to define such
    a mapping was G. Peano, constructing the so-called Peano curve.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Netto 令人清醒的发现之后，人们开始质疑，如果这样的映射不是双射，它是否可以是满射。第一个能够定义这种映射的人是 G. Peano，他构建了所谓的
    Peano 曲线。
- en: The Peano curve is defined recursively. Its domain is the unit interval [0,
    1] ⊂ R, and its image lies in the unit square [0, 1]² ⊂ R². By repeatedly subdividing
    the interval [0, 1] into thirds, and correspondingly partitioning the square in
    R² into a 3 × 3 grid, the construction converges to the actual space-filling curve
    as the number of iterations tends to infinity. [1]
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: Peano 曲线是递归定义的。其定义域是单位区间 [0, 1] ⊂ R，其像位于单位正方形 [0, 1]² ⊂ R²。通过将区间 [0, 1] 重复三等分，并相应地将
    R² 中的正方形划分为 3 × 3 的网格，随着迭代次数趋向于无穷大，构造会收敛到实际的空间填充曲线。[1]
- en: '![](../Images/174267d70abe0e1eb9b28237a6b38c07.png)'
  id: totrans-17
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/174267d70abe0e1eb9b28237a6b38c07.png)'
- en: 'Figure 1: Peano curve of order 1,2 and 3 (from left to right).'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1：一阶、二阶和三阶 Peano 曲线（从左到右）。
- en: The image of the Peano curve of order 1 is copied and mirrored in higher orders.
    It can be observed that the basic pattern of the first-order Peano curve reappears
    in higher orders, but is mirrored in every second iteration. This alternating
    process of mirroring and rotating the basic element is a feature shared by other
    SFCs as well.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 一阶 Peano 曲线的像在更高阶中被复制并镜像。可以观察到，一阶 Peano 曲线的基本模式在更高阶中重新出现，但在每第二次迭代时被镜像。这种交替的镜像和旋转基本元素的过程是其他
    SFCs 共有的特征。
- en: ([Image from Wikipedia](https://de.wikipedia.org/wiki/Peano-Kurve#/media/Datei:Peano_curve_shaded.svg)
    under public domain license, modified by author)
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: ([来自维基百科的图片](https://de.wikipedia.org/wiki/Peano-Kurve#/media/Datei:Peano_curve_shaded.svg)
    在公共领域许可下，作者修改)
- en: Thus, the graphs of the Peano curve at finite iterations (Figure 1) do not represent
    the “final” SFC. Only in the limit, as the number of iterations of this recursive
    mapping approaches infinity, does the actual SFC emerge, which traverses every
    point in [0, 1]². Visually, in this limit, the curve would essentially appear
    as a filled square spanning from (0, 0) to (1, 1)
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，有限迭代次数的 Peano 曲线图（图 1）并不代表“最终”的 SFC。只有当这个递归映射的迭代次数趋向于无穷大时，实际的 SFC 才会出现，它遍历
    [0, 1]² 中的每一个点。从视觉上看，在这个极限下，曲线基本上会呈现出一个从 (0, 0) 到 (1, 1) 的填充正方形。
- en: 'This observation raises an initially counterintuitive question: By definition,
    a curve is one-dimensional. While it can be embedded in a higher-dimensional space
    (n > 1), its intrinsic parameter domain remains one-dimensional. Yet, if the Peano
    curve passes through every point in [0, 1]² and thus completely fills the plane,
    can its image still be regarded as one-dimensional? The answer is no: the image
    of the Peano curve has [Hausdorff dimension](https://de.wikipedia.org/wiki/Hausdorff-Dimension)
    2\. Another characteristic of an SFC is that its image has positive Jordan content
    ([Peano-Jordan Measure](https://en.wikipedia.org/wiki/Peano%E2%80%93Jordan_measure)).
    These facts may seem surprising, but it aligns with the properties of fractals:
    many such sets have Hausdorff dimensions greater than 1, and some even non-integer
    Hausdorff dimensions.'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 这个观察引发了一个最初令人反直觉的问题：根据定义，曲线是一维的。虽然它可以嵌入到更高维的空间（n > 1）中，但其内在参数域仍然是一维的。然而，如果 Peano
    曲线穿过 [0, 1]² 中的每一个点并因此完全填满平面，它的像是否还可以被视为一维的？答案是：不：Peano 曲线的像有 [豪斯多夫维度](https://de.wikipedia.org/wiki/Hausdorff-Dimension)
    2。SFC 的另一个特征是其像有正的 Jordan 内容（[Peano-Jordan 度量](https://en.wikipedia.org/wiki/Peano%E2%80%93Jordan_measure)）。这些事实可能看起来令人惊讶，但它们与分形属性相一致：许多这样的集合具有大于
    1 的豪斯多夫维度，甚至有些具有非整数的豪斯多夫维度。
- en: 3\. The Hilbert Curve – Popular till today!
  id: totrans-23
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3. 希尔伯特曲线——至今仍受欢迎！
- en: Although Peano was the first to construct an SFC, a much more famous example
    is the Hilbert curve, defined by David Hilbert in 1891\. Its definition is slightly
    simpler and begins with a 2 x 2 grid. Like the Peano curve, the mapping of the
    Hilbert curve recursively subdivides each interval in [0, 1] and each square in
    [0, 1]² into four smaller intervals/squares at each step. As with the Peano curve,
    the Hilbert curve converges to a true SFC in the limit as the number of iterations
    approaches infinity.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然佩亚诺是第一个构造SFC的人，但一个更为著名的例子是希尔伯特曲线，由大卫·希尔伯特在 1891 年定义。其定义稍微简单一些，从 2x2 网格开始。像佩亚诺曲线一样，希尔伯特曲线的映射递归地将
    [0, 1] 区间内的每个区间以及 [0, 1]² 中的每个正方形在每一步划分为四个更小的区间/正方形。与佩亚诺曲线一样，希尔伯特曲线在迭代次数趋于无穷大时收敛到真正的SFC。
- en: '![](../Images/532c8468388fdde77381ebb4a3a4cc1b.png)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/532c8468388fdde77381ebb4a3a4cc1b.png)'
- en: 'Figure 2: The basic unit on the left (order 1) is repeated to build higher-order
    Hilbert curves. However, the necessary transformations (such as mirroring and
    rotation) are more complex than in the case of the Peano curve.'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2：左侧的基本单元（阶数为 1）被重复用于构建更高阶的希尔伯特曲线。然而，必要的变换（如镜像和旋转）比佩亚诺曲线的情况更复杂。
- en: '*(Image by author)*'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: '*(图片由作者提供)*'
- en: For the purposes of this article, we will focus on the Hilbert curve, as its
    properties make it a valuable tool in modern data platforms.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 为了本文的目的，我们将重点关注希尔伯特曲线，因为其属性使其成为现代数据平台中的宝贵工具。
- en: 3.1 Formal Definition of the Hilbert Curve
  id: totrans-29
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3.1 希尔伯特曲线的正式定义
- en: 'Starting with the interval [0,1] as the domain of the Hilbert curve, each recursion
    step divides the current interval into four equal subintervals: ***a*** is the
    left endpoint and ***h*** the interval width, the subintervals are:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 从希尔伯特曲线的定义域区间 [0,1] 开始，每个递归步骤将当前区间划分为四个相等的子区间：***a*** 是左端点，***h*** 是区间宽度，子区间如下：
- en: '![](../Images/c47d2c8e0e360a5831efe77ae9f2bb47.png)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c47d2c8e0e360a5831efe77ae9f2bb47.png)'
- en: Splitting intervals in [0,1]. (Formular from [2], Image by author)
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 在 [0,1] 区间内分割区间。（公式来自 [2]，图片由作者提供）
- en: 'For any chosen point in [0, 1], exactly one of these subintervals contains
    the point. This interval can then be subdivided again using the same rule, producing
    a finer interval that still contains the point. This process can be continued
    infinitely, yielding an arbitrarily precise location of the point along the curve.
    The same recursive subdivision is applied in [0, 1]² in parallel, splitting each
    square into four smaller squares:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 对于 [0, 1] 中任意选择的点，恰好有一个子区间包含该点。然后可以使用相同的规则再次细分该区间，产生一个更细的区间，该区间仍然包含该点。这个过程可以无限进行下去，从而得到曲线上的任意精确位置。相同的递归细分也应用于
    [0, 1]²，将每个正方形分割成四个更小的正方形：
- en: '![](../Images/e0ba92feb9e4010a1880e53857762323.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e0ba92feb9e4010a1880e53857762323.png)'
- en: Splitting quadrants in [0,1]² . (Formular from [2], Image by author)
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 在 [0,1]² 中分割象限。（公式来自 [2]，图片由作者提供）
- en: 'General properties:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 一般属性：
- en: '**Surjective**: From its recursive definition it follows that the Hilbert curve
    is surjective: every point in [0, 1]² is covered in the limit. The nested intervals
    are compact, and adjacent intervals share boundary points (e.g., a + h/4 is both
    the right endpoint of the first subinterval and the left endpoint of the second).'
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**满射**: 从其递归定义中可以得出，希尔伯特曲线是满射的：在极限情况下，[0, 1]² 中的每个点都被覆盖。嵌套区间是紧致的，相邻区间共享边界点（例如，a
    + h/4 既是第一个子区间的右端点，也是第二个子区间的左端点）。'
- en: Thus the entire square is filled. The mapping, however, is not injective—attempts
    to enforce bijectivity (e.g., by opening intervals) break continuity.
  id: totrans-38
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 因此整个正方形被填满。然而，映射不是单射——尝试强制双射（例如，通过打开区间）会破坏连续性。
- en: '**Continuous**: This property is clear from visual representations: the curve
    can be drawn without lifting the pen. Formally, it can be established by showing
    that the Hilbert curve arises as the uniform limit of continuous functions, and
    uniform convergence preserves continuity.'
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**连续**: 从直观表示中可以清楚地看出这个属性：曲线可以不提笔地绘制。形式上，可以通过证明希尔伯特曲线是连续函数的均匀极限来建立，而均匀收敛保持连续性。'
- en: '**Nowhere differentiable**: By looking at graphs of the Hilbert Curve it is
    obvious that this curve is not'
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**不可微**: 通过观察希尔伯特曲线的图形，很明显这条曲线是不可微的。'
- en: differentiable. A proof for this property was given by H.Sagan using the difference
    quotient.
  id: totrans-41
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 可微。H.Sagan 使用差商给出了这个属性的证明。
- en: '**Locality preserving**: In contrast to simpler mappings such as the Z-order
    curve, the Hilbert curve tends to preserve locality: points that are close in
    the one-dimensional parameter are often mapped to nearby. This aspect is crucial
    for applications in big data platforms.'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**局部保持性**：与Z-order曲线等更简单的映射相比，希尔伯特曲线倾向于保持局部性：在一维参数中靠近的点通常会被映射到附近。这一特性对于大数据平台的应用至关重要。'
- en: '**Positive Jordan Content**: In the limit of infinitely many iterations, the
    image of the Hilbert curve has positive Jordan measure, meaning that it occupies
    a nonzero area of the plane. ([Peano-Jordan Measure](https://en.wikipedia.org/wiki/Peano%E2%80%93Jordan_measure))'
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**正Jordan内容**：在无限多次迭代的过程中，希尔伯特曲线的图像具有正Jordan测度，这意味着它占据了平面上的非零面积。（[佩亚诺-乔丹测度](https://en.wikipedia.org/wiki/Peano%E2%80%93Jordan_measure)）'
- en: '**Hausdorff Dimension of 2**: Correspondingly, the Hilbert curve does not behave
    like a usual one-dimensional line, but has [Hausdorff dimension](https://de.wikipedia.org/wiki/Hausdorff-Dimension)
    2, reflecting that it fully fills the unit square.'
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**二维的豪斯多夫维度**：相应地，希尔伯特曲线不像通常的一维线那样表现，而是具有[Hausdorff维度](https://de.wikipedia.org/wiki/Hausdorff-Dimension)
    2，这反映了它完全填充了单位正方形。'
- en: Even though, early definitions of the Hilbert Curve are approached in 2D, higher
    dimensions are also feasible. The algorithm we discuss in the next section works
    in any finite dimension.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管希尔伯特曲线的早期定义是在二维空间中进行的，但更高维度也是可行的。我们将在下一节讨论的算法可以在任何有限维度中工作。
- en: 4 Computing the Hilbert Curve With Skilling’s Algorithm
  id: totrans-46
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4 使用斯金林算法计算希尔伯特曲线
- en: 'The definition of the Hilbert Curve was given in a geometrical manner without
    an algebraic definition for computing coordinates on a given grid, for a given
    point in I. It took almost 100 years after Hilbert released his idea before mathematicians
    thought about ways how to compute points for a given Hilbert index. Who could
    blame them? After all, for a long time there were no computers that could draw
    curves with hundreds or thousands of points. While researching I discovered multiple
    ways how to compute the Hilbert curve – from complex numbers to L-Systems. While
    some are super extensive, others preserve the iterative approach for computing
    single points of the curve. What I was looking for was something simple:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 希尔伯特曲线的定义是以几何方式给出的，没有给出在给定网格上计算坐标的代数定义，对于I中的给定点。在希尔伯特发布他的想法后近100年，数学家们才开始考虑如何计算给定希尔伯特索引的点。谁又能责怪他们呢？毕竟，长期以来，没有计算机能够绘制包含数百或数千个点的曲线。在研究过程中，我发现有多种计算希尔伯特曲线的方法——从复数到L-系统。有些方法非常复杂，而有些则保留了计算曲线单一点的迭代方法。我所寻找的是简单的东西：
- en: A function that takes a Hilbert index (i.e. any numbers like 1,2,3 in 1D space)
    and returns its coordinates. You can consider the Hilbert index as the number
    of the interval from left to right for Hilbert Curve of order < infinity.
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个函数，它接受一个希尔伯特索引（即1D空间中的任何数字，如1、2、3）并返回其坐标。你可以将希尔伯特索引视为从左到右的区间编号，对于无限阶的希尔伯特曲线。
- en: A function that does the inverse, mapping a coordinate back to its Hilbert index.
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个执行逆映射的函数，将坐标映射回其希尔伯特索引。
- en: While searching the internet for possible implementations I came across a [Github
    repository of Princeton University](https://github.com/PrincetonLIPS/numpy-hilbert-curve)
    implementing the algorithm of John Skilling, that was published in a paper from
    2004 called [Programming the Hilbert Curve](https://pubs.aip.org/aip/acp/article-abstract/707/1/381/719611/Programming-the-Hilbert-curve?redirectedFrom=PDF).
    Unfortunately, this paper is not freely available for the public, so I decided
    to analyze the code from the Princeton repository.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 在互联网上搜索可能的实现方法时，我偶然发现了一个普林斯顿大学的[GitHub仓库](https://github.com/PrincetonLIPS/numpy-hilbert-curve)，该仓库实现了约翰·斯金林在2004年发表的一篇名为[编程希尔伯特曲线](https://pubs.aip.org/aip/acp/article-abstract/707/1/381/719611/Programming-the-Hilbert-curve?redirectedFrom=PDF)的论文中的算法。不幸的是，这篇论文对公众并不免费，所以我决定分析普林斯顿仓库中的代码。
- en: 4.1 Skilling’s Algorithm – Overview
  id: totrans-51
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.1 斯金林算法 – 概述
- en: 'Skilling observed that mapping Hilbert indices to coordinates can be expressed
    elegantly in terms of binary operations. For example, consider the indices 0,
    1, 2, 3 in one dimension. These correspond to the coordinates (0, 0), (1, 0),
    (1, 1), (0, 1) in a 2 × 2 grid. Here, the values 0, 1, 2, 3 no longer represent
    fractional points in the unit interval (like 1/3), but instead discrete interval
    numbers. With a 2 × 2 grid, there are exactly four intervals in [0, 1] and four
    corresponding squares in [0, 1]². Skilling’s algorithm generalizes this idea.
    It computes the mapping from a Hilbert index to its corresponding coordinate (and
    vice versa) in any finite dimension using binary transformations. The essential
    steps are:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: Skilling观察到，将希尔伯特索引映射到坐标可以用二进制运算优雅地表达。例如，考虑一维中的索引0，1，2，3。这些对应于2×2网格中的坐标（0，0），（1，0），（1，1），（0，1）。在这里，值0，1，2，3不再代表单位区间中的分数点（如1/3），而是离散的区间数。在2×2网格中，[0,
    1]中有四个区间，以及四个对应的[0, 1]²中的正方形。Skilling算法将这个想法推广。它使用二进制变换计算从希尔伯特索引到其对应坐标的映射（反之亦然），适用于任何有限维度。基本步骤如下：
- en: Convert the Hilbert index **from decimal to binary**.
  id: totrans-53
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将希尔伯特索引**从十进制转换为二进制**。
- en: Transform the **binary number into its Gray code** representation.
  id: totrans-54
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将**二进制数转换为其格雷码表示**。
- en: '**Disentangle the Gray code** into a coordinate structure.'
  id: totrans-55
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**将格雷码解开**成坐标结构。'
- en: '**Apply rotations and reflections** using XOR operations.'
  id: totrans-56
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**使用XOR操作应用旋转和反射**。'
- en: Convert the binary coordinates **back to decimal**
  id: totrans-57
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将二进制坐标**转换回十进制**
- en: 4.2 Binary Representation
  id: totrans-58
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.2 二进制表示
- en: 'To understand why binaries are much better suited for computing points of the
    Hilbert Curve from Hilbert Indices and vice versa the following examples might
    help (we discuss everything in 2D, but the algorithm works in any dimensional
    space):'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 为了理解为什么二进制更适合从希尔伯特索引和逆过来计算希尔伯特曲线的点，以下示例可能会有所帮助（我们讨论的是二维空间中的所有内容，但算法适用于任何维度的空间）：
- en: The Hilbert Curve is defined on a 2×2, 4×4, 8×8, 16×16…etc. grid. (Remember
    the definition above and its recursive approach).
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 希尔伯特曲线定义在2×2，4×4，8×8，16×16等网格上。（记住上面的定义及其递归方法）。
- en: 'By looking at the numbers, one might discover that the number of intervals
    grow with 2^n, where n is the order of the curve. This matches perfectly with
    binary encoding: for an n-th order curve, we'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 通过观察数字，人们可能会发现间隔的数量随着2^n增长，其中n是曲线的阶数。这与二进制编码完美匹配：对于一个n阶曲线，我们
- en: need exactly n bits per axis to describe the grid.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 每个轴需要恰好n位来描述网格。
- en: 'Take the 4 × 4 grid (second order) as an example. Two bits per axis are sufficient:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 以4×4网格（第二阶）为例。每个轴上两个比特就足够了：
- en: The first bit identifies the major quadrant (lower left, upper left, lower right,
    or upper right).
  id: totrans-64
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 第一个比特标识主要象限（左下，左上，右下或右上）。
- en: The second bit specifies the position inside that quadrant.
  id: totrans-65
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 第二个比特指定该象限内的位置。
- en: 'For instance, Hilbert index 2 has the binary form 0010\. Interpreting this:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，希尔伯特索引2的二进制形式为0010。解释如下：
- en: 00 selects the lower-left quadrant.
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 00选择左下象限。
- en: 10 selects the upper-right subquadrant inside it.
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 10选择其内部的右上子象限。
- en: '![](../Images/9153416c17b0e247b11651d8fefb9862.png)'
  id: totrans-69
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/9153416c17b0e247b11651d8fefb9862.png)'
- en: 'Figure 3: Mapping binaries to grid cells. The first two bits encode the major
    quadrant, the last two bits the'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 图3：将二进制映射到网格单元。前两个比特编码主要象限，最后两个比特编码
- en: subquadrant. Consider the repetitive pattern of 00, 01, 10, 11 in every quadrant,
    forming a Hilbert curve of
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 子象限。考虑每个象限中重复出现的模式00，01，10，11，形成一个希尔伯特曲线。
- en: order 1\. (Image by author)
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 阶数1\. （图片由作者提供）
- en: 'However, if we continue this process for indices greater than 3, we encounter
    a challenge: the orientation of the curve changes from one quadrant to the next.
    Correctly handling these rotations and reflections is exactly where Gray code
    and XOR operations (as in Skilling’s algorithm) become essential.'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，如果我们继续对大于3的索引进行此过程，我们会遇到一个挑战：曲线的方向从一个象限变为下一个象限。正确处理这些旋转和反射正是格雷码和XOR操作（如Skilling算法中所示）变得至关重要的地方。
- en: 4.3 Gray Code Representation
  id: totrans-74
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.3 格雷码表示
- en: 'The next step in Skilling’s algorithm is a transformation from binary to Gray
    code. The key difference is that in [Gray code](https://www.geeksforgeeks.org/dsa/gray-to-binary-and-binary-to-gray-conversion/),
    consecutive numbers differ in only one bit. This property is crucial: It ensures
    that the curve moves smoothly from one quadrant to the next (even though the orientation
    of the curve in each quadrant is still not correct)'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: Skilling算法的下一步是从二进制到格雷码的转换。关键区别在于[格雷码](https://www.geeksforgeeks.org/dsa/gray-to-binary-and-binary-to-gray-conversion/)中，连续的数字只在一个位上不同。这一属性至关重要：它确保曲线可以平滑地从一个个象限移动到下一个（即使曲线在每个象限中的取向仍然不正确）。
- en: By looking at the binary numbers and the orientation of the different sections
    of the curve, we can see that the curve is still not correct, but the end of each
    quadrant now connects to the beginning of the next.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 通过观察二进制数和曲线不同部分的取向，我们可以看到曲线仍然不正确，但现在每个象限的末端现在连接到下一个象限的起始处。
- en: '![](../Images/921db479d340d831771124ee54e5397c.png)'
  id: totrans-77
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/921db479d340d831771124ee54e5397c.png)'
- en: 'Figure 4: After transforming binary values to Gray code, the last cell of a
    current quadrant has the same value'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 图4：将二进制值转换为格雷码后，当前象限的最后一个单元格具有相同的值
- en: as the first cell of the next (Image by author)
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 作为下一个单元格的第一个单元格（图片由作者提供）
- en: 4.4 Disentanglement of the Bits
  id: totrans-80
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.4 位的解缠
- en: The real “magic” of Skilling’s method begins with a reordering of the Gray-coded
    bits—a step called *disentanglement*. In our 4 × 4 example, we originally interpreted
    the four bits as *(bitx[1], bity*[1]*, bitx*[2]*, bity**[2]**)* where the first
    pair encodes the major quadrant and the second pair the sub-quadrant. However,
    for coordinate computation we need a structure of the form (bitx*[1]*, bitx**[2]**,
    bity*[1]*, bity**[2]**) so that all x-bits and y-bits can later be combined into
    the respective decimal coordinates (x, y). This step is called disentanglement
    of the bits.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: Skilling方法的真正“魔法”始于对格雷编码位的重新排序——这一步被称为*解缠*。在我们的4×4示例中，我们最初将四个位解释为*(bitx[1],
    bity[1], bitx[2], bity[2]*)，其中第一对编码主象限，第二对编码子象限。然而，对于坐标计算，我们需要一种形式为(bitx[1], bitx[2],
    bity[1], bity[2]*)的结构，以便所有x位和y位都可以稍后组合成相应的十进制坐标(x, y)。这一步被称为位的解缠。
- en: '![](../Images/7aaf11f5f3262f31400baa59d9259601.png)'
  id: totrans-82
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/7aaf11f5f3262f31400baa59d9259601.png)'
- en: 'Figure 5: Orientation of subquadrants in a 4×4 grid after Gray code disentanglement
    (Image by author)'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 图5：格雷码解缠后4×4网格中子象限的取向（图片由作者提供）
- en: 4.5 Corrective Transformations
  id: totrans-84
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4.5 纠正变换
- en: After disentangling the bits, the final step of Skilling’s algorithm is to rotate
    and mirror the subcurves within each quadrant so that they connect seamlessly
    into the Hilbert curve of order n.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 在位解缠之后，Skilling算法的最终一步是在每个象限内旋转和镜像子曲线，以便它们无缝地连接到n阶Hilbert曲线。
- en: 'Figure 6 illustrates this process for the 4 × 4 case. The table on the left
    shows how Gray-coded coordinates are converted into standard binary numbers by
    applying simple transformations: **swaps** and **bit-flips**.'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 图6说明了4×4情况下的这个过程。左侧的表格显示了如何通过应用简单的变换（**交换**和**位翻转**）将格雷编码坐标转换为标准二进制数。
- en: 'The diagram on the right visualizes the effect: the upper quadrants are rotated
    by 180◦, the lower quadrants are mirrored along the diagonal, and in some cases
    (e.g. the yellow quadrant) no transformation is needed at all.'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 右侧的图表可视化了这个效果：上象限旋转了180°，下象限沿对角线镜像，在某些情况下（例如，黄色象限）甚至不需要任何变换。
- en: The key insight is that after these corrective transformations, the coordinates
    are once again in standard binary form. This means that the output of Skilling’s
    algorithm can be converted directly to decimal coordinates in the format (x, y),
    without further adjustment
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 关键的洞察力在于，经过这些纠正变换后，坐标再次处于标准二进制形式。这意味着Skilling算法的输出可以直接转换为(x, y)格式的十进制坐标，无需进一步调整。
- en: '![](../Images/742e08ab9da99545a38d298cfa899c2a.png)'
  id: totrans-89
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/742e08ab9da99545a38d298cfa899c2a.png)'
- en: 'Figure 6: Final transformations to convert gray code to binary coordinates
    (Image by author)'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 图6：将灰度码转换为二进制坐标的最终转换（图片由作者提供）
- en: 'Skilling algorithm key transformations: Input: Gray code formatted (bitx*[1]*,
    bitx**[2]**, bity*[1]*, bity**[2]**) In python the format would be: [-1, ndims,
    nbits]. Example: The number 4 would be represented as the following list/np-array:
    [[01],[10]]. For the x-Dimension 1 is the least significant bit (LSB), and 0 the
    most significant bit'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
- en: (MSB).
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
- en: Loop from the most significant bit (MSB) to least significant bit (LSB)
  id: totrans-93
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Innerloop from highest dimension (y in 2D) to lowest dimension
  id: totrans-94
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: ': Look at the current bit. If 1: Flip every lower bit in dimension 0 (usually
    x) If 0: Swap values between'
  id: totrans-95
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: lower bits in current dimension and dimension 0 (if they differ).
  id: totrans-96
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: Step 3 can be easily computed with numpy using XOR operations. The whole process
    of flipping and swapping bits in each iteration is visualized in the following
    animations.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/cc2a0a29f6f63bbbb035862f5a0b5dfe.png)'
  id: totrans-98
  prefs: []
  type: TYPE_IMG
- en: 'Figure 7: Creation process of a 2D Hilbert curve using the algorithm of John
    Skilling (Image by author)'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/28a5049bd6eccfd50548154335867850.png)'
  id: totrans-100
  prefs: []
  type: TYPE_IMG
- en: 'Figure 8: Creation process of a 3D Hilbert curve using the algorithm of John
    Skilling (Image by author)'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
- en: If you want to analyze the algorithm in more detail or simply generate your
    own animations in 2D or 3D, check out my GitHub Repository
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
- en: 5 Applications of Space Filling Curves
  id: totrans-103
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: After discussing theoretical aspects and implementation details of the Hilbert
    Curve, the question arises, where it can be applied. During the implementation
    we saw how to transform Hilbert Indices into coordinates. For the following application,
    the inverse of this process is more interesting.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
- en: One valuable aspect of the Hilbert Curve is that it maps a 1D ordered set (i.e.
    1,2,3…) to coordinates in an n-dimensional space. It gives an order to the points
    it traverses and it can live in vector spaces of arbitrary size. Thus, the Hilbert
    Curve is used for data partitioning and cluster, image compression and also for
    building features in machine learning, when dealing with spatial data.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
- en: 5.1 Data Partitioning/Clustering using SFCs
  id: totrans-106
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'One of the most prominent applications of SFCs is data partitioning. For example,
    in Databricks, Z-ordering is based on the Z-curve, while liquid clustering relies
    on the Hilbert Curve. The reason is simple:'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
- en: the Hilbert curve preserves locality better than the Z-curve, which is crucial
    when indexing and partitioning multidimensional data. In figure 9 you can see
    how some exemplary data points are mapped to points of the Hilbert curve, by assigning
    each point to one partition given by the curve.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f2329bc386b8682dc218328718306556.png)'
  id: totrans-109
  prefs: []
  type: TYPE_IMG
- en: 'Figure 9: Mapping of data to points of the Hilbert Curve. The red dashed arrows
    indicate some mappings'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
- en: exemplarily (Image by author)
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
- en: When a query is applied to the data (e.g. SELECT * FROM table WHERE x in (1,2)
    and y in (2,3), all points in this range ((1,2), (1,3), (2,2), (2,3)) are converted
    to Hilbert indices and the system can directly retrieve all matching entries.
    The key advantage is that this mapping enables fast and flexible data retrieval.
    Unlike traditional indexing, the Hilbert-based partitioning adapts naturally to
    updates or growth in the dataset — without requiring the entire index to be recomputed.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 当查询应用于数据时（例如，SELECT * FROM table WHERE x in (1,2) and y in (2,3)，所有在这个范围内的点（（1,2），（1,3），（2,2），（2,3））都被转换为希尔伯特索引，系统可以直接检索所有匹配的条目。关键优势是这种映射使得数据检索既快又灵活。与传统索引不同，基于希尔伯特的分区可以自然地适应数据集的更新或增长，而无需重新计算整个索引。
- en: '5.2 Data Indexing: Hilbert Curve vs. Z-Curve'
  id: totrans-113
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5.2 数据索引：希尔伯特曲线与Z曲线
- en: To highlight the practical advantages of the Hilbert curve, I compared its performance
    with the Z-curve on a set of synthetic range queries.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 为了突出希尔伯特曲线的实际优势，我将其性能与一组合成范围查询中的Z曲线进行了比较。
- en: 'For the experiment, I generated 100 random range queries of fixed size. For
    each query, I computed the Hilbert and Z-curve indices and counted the number
    of clusters, while a cluster is a set of consecutive indices. For example, if
    the query returned the indices [1,2,3,5,6,8,9], this would form three clusters:
    [1,2,3], [5,6], and [8,9].'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 对于实验，我生成了100个固定大小的随机范围查询。对于每个查询，我计算了希尔伯特曲线和Z曲线的索引，并计算了簇的数量，其中簇是一组连续的索引。例如，如果查询返回的索引为[1,2,3,5,6,8,9]，这将形成三个簇：[1,2,3]，[5,6]和[8,9]。
- en: If the data is stored in index order, clusters correspond to sequential reads,
    whereas gaps between clusters imply costly jumps to new storage addresses.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 如果数据按索引顺序存储，簇对应于顺序读取，而簇之间的间隙意味着昂贵的跳转到新的存储地址。
- en: '![](../Images/119ab17adb21e8e0adf546c5e1108150.png)'
  id: totrans-117
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/119ab17adb21e8e0adf546c5e1108150.png)'
- en: 'Figure 10: 100 random queries for a 2D setup using Hilbert curve and Z-curve.
    As you can see, you can’t see anything! 😉'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 图10：使用希尔伯特曲线和Z曲线的2D设置的100个随机查询。如图所示，您什么也看不到！😉
- en: (Image by author)
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: （图片由作者提供）
- en: 'To quantify performance, I used two metrics:'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 为了量化性能，我使用了两个指标：
- en: '**Cluster count**: Fewer clusters imply less fragmentation and fewer storage
    jumps.'
  id: totrans-121
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**簇计数**：簇越少，意味着碎片化越少，存储跳跃越少。'
- en: '**Intra-cluster spread**: The average number of indices per cluster'
  id: totrans-122
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**簇内扩散**：每个簇的平均索引数'
- en: 'The worst-case scenario would be extreme fragmentation: every point forming
    a cluster of its own. Figure 11 compares the performance for the Z-curve and Hilbert
    curve for two, three and four dimensions, a query size of 7 (7×7 in 2D, 7x7x7
    in 3D etc.) and 6 bits per axis (i.e. 64 values per axis)'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 最坏的情况将是极端碎片化：每个点都形成一个自己的簇。图11比较了Z曲线和希尔伯特曲线在二维、三维和四维中的性能，查询大小为7（2D中的7×7，3D中的7x7x7等），每轴6位（即每轴64个值）
- en: '![](../Images/837613c0c1c3ba7b5d3b9253069f6243.png)'
  id: totrans-124
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/837613c0c1c3ba7b5d3b9253069f6243.png)'
- en: 'Figure 11: Comparison of Hilbert and Z curve based on number of clusters and
    intra-cluster spread for 2,3 and 4 dimensions. The results clearly show that the
    Hilbert curve preserves locality much better than the Z-curve (Image by author)'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 图11：基于簇数和簇内扩散的希尔伯特曲线与Z曲线的比较（2，3和4维）。结果清楚地表明，希尔伯特曲线比Z曲线更好地保留了局部性（图片由作者提供）
- en: The results clearly show that the Hilbert curve preserves locality much better
    than the Z-curve. Across all tested dimensions, queries result in fewer clusters
    and thus higher intra-cluster density with Hilbert indices. In practice, this
    translates into more efficient data retrieval and reduced I/O costs, particularly
    for multidimensional range queries.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 结果清楚地表明，希尔伯特曲线比Z曲线更好地保留了局部性。在所有测试的维度中，查询结果导致簇的数量更少，因此使用希尔伯特索引的簇内密度更高。在实践中，这转化为更有效的数据检索和降低I/O成本，尤其是对于多维范围查询。
- en: 6 Beyond Space-Filling Curves
  id: totrans-127
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 6 超越空间填充曲线
- en: The goal of this article was to illustrate the elegance of SFCs and to give
    a glimpse into their applications in data indexing. However, the latest research
    in this field goes beyond classical SFCs.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 本文的目标是展示SFCs的优雅性，并对其在数据索引中的应用给出一个概览。然而，该领域的最新研究已经超越了经典SFCs。
- en: The main limitation of all space-filling curves is their fixed mechanism. Once
    defined, their structure offers little room for adaptation to different datasets
    or workload patterns. In practice, this rigidity can limit performance.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 所有空间填充曲线的主要局限性在于它们的固定机制。一旦定义，它们的结构为适应不同的数据集或工作负载模式提供了很少的适应空间。在实践中，这种刚性可能会限制性能。
- en: To overcome this, researchers such as Chen et al. (University of Electronic
    Science and Technology of China & Huawei) have proposed AdaCurve, a machine learning–based
    approach. Instead of relying on a predetermined mapping, AdaCurve trains a model
    to generate a one-dimensional index directly from high-dimensional data points,
    optimized according to both the dataset and the query workload. [3]
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 为了克服这一点，像陈等研究人员（中国电子科技大学与华为）已经提出了AdaCurve，这是一种基于机器学习的方法。AdaCurve不是依赖于预定的映射，而是训练一个模型，直接从高维数据点生成一维索引，根据数据集和查询负载进行优化。[3]
- en: 'This idea is highly promising: while Hilbert and other SFCs offer elegant but
    rigid mappings, AdaCurve adapts dynamically, producing an indexing system that
    is tailored to the data and queries at hand. Such adaptability could pave the
    way for significantly more efficient indexing in large-scale data platforms in
    the future.'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 这个想法非常有前景：虽然希尔伯特和其他SFCs提供了优雅但刚性的映射，但AdaCurve能够动态适应，生成一个针对当前数据和查询定制的索引系统。这种适应性可能为未来大规模数据平台上的显著更高效索引铺平道路。
