- en: A Farewell to APMs — The Future of Observability is MCP tools
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 《告别APM——可观察性的未来是MCP工具》
- en: 原文：[https://towardsdatascience.com/a-farewell-to-apms-the-future-of-observability-is-mcp-tools/](https://towardsdatascience.com/a-farewell-to-apms-the-future-of-observability-is-mcp-tools/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[原文链接](https://towardsdatascience.com/a-farewell-to-apms-the-future-of-observability-is-mcp-tools/)'
- en: The past <mdspan datatext="el1746145673076" class="mdspan-comment">years</mdspan>
    have been an absolute rollercoaster (or joyride) of rapidly evolving generative
    AI technologies. In the twenty-five years I’ve counted myself a software developer,
    I cannot recall a tectonic shift of a similar magnitude, one that is already fundamentally
    changing how software is being written.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 过去的几年是一段绝对刺激的过山车（或欢乐之旅），生成AI技术迅速发展。在我作为软件开发者的25年里，我无法回忆起类似规模的构造性变革，它已经在本质上改变了软件的编写方式。
- en: It would be shortsighted to believe that this revolution stops at simply generating
    code, however. With AI agents on the loose and the ecosystem opening up to new
    integrations, the foundations of how we monitor, understand, and optimize software
    are being upended as well. The tools that served us well in a human-centric world,
    built around concepts such as manual alerts, datagrids, and dashboards, are becoming
    irrelevant and obsolete. Application Performance Monitoring (APM) platforms and,
    in particular, how they leverage logs, metrics, and traces, will need to acknowledge
    that the human user possessing the time resources required to browse, filter,
    and set thresholds is no longer available, the team has already delegated much
    of that work to AI.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 认为这场革命仅仅停留在生成代码上，这种看法是短视的。随着AI代理的活跃和生态系统向新的集成开放，我们监控、理解和优化软件的基础也在被颠覆。在以人为中心的世界中，围绕手动警报、数据网格和仪表板等概念构建的工具已经变得无关紧要和过时。应用性能监控（APM）平台，尤其是它们如何利用日志、指标和跟踪，将需要认识到，拥有浏览、过滤和设置阈值所需时间资源的用户不再可用，团队已经将大量工作委托给了AI。
- en: Intelligent agents are becoming integral to the SDLC (Software Development Lifecycle),
    autonomously analyzing, diagnosing, and improving systems in real time. This emerging
    paradigm requires a new take on an old problem. For observability data to be incorporated
    to make agents and teams more productive, it must be structured for machines,
    not for humans. One recent technology that makes this possible is also one that
    has rightfully received a lot of buzz lately, the **Model Context Protocol (MCP).**
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 智能代理正成为SDLC（软件开发生命周期）的组成部分，它们能够自主分析、诊断和实时改进系统。这种新兴范式需要对一个老问题有新的看法。为了使代理和团队更高效，可观察性数据必须为机器而不是人类而结构化。最近的一项技术使得这一点成为可能，它也理应最近获得了大量的关注，那就是**模型上下文协议（MCP）**。
- en: '![Source: https://github.com/modelcontextprotocol](../Images/84332e129f47d643ba328cee6e53599a.png)'
  id: totrans-5
  prefs: []
  type: TYPE_IMG
  zh: '![来源：https://github.com/modelcontextprotocol](../Images/84332e129f47d643ba328cee6e53599a.png)'
- en: MCPs in a nutshell
  id: totrans-6
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: MCPs概述
- en: Initially introduced by [**Anthropic**](https://www.anthropic.com/news/model-context-protocol),
    the Model Context Protocol (MCP) represents a communication tier between AI agents
    and other applications, allowing agents to access additional data sources and
    perform actions as they see fit. More importantly, MCPs open up new horizons for
    the agent to intelligently choose to act beyond its immediate scope and thereby
    broaden the range of use cases it can address.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 模型上下文协议（MCP）最初由[**Anthropic**](https://www.anthropic.com/news/model-context-protocol)引入，它代表了AI代理和其他应用程序之间的通信层，允许代理访问额外的数据源并执行他们认为合适的行为。更重要的是，MCPs为代理开辟了新的视野，使其能够智能地选择在超出其直接范围之外采取行动，从而扩大其可以解决的使用案例范围。
- en: The technology is not new, but the ecosystem is. In my mind, it is the equivalent
    of evolving from custom mobile application development to having an app store.
    It is not by chance that it is currently experiencing growth of Cambrian proportions,
    as simply having a rich and standardized ecosystem opens up the market for new
    opportunities. More broadly speaking, MCPs represent an agent-centric model for
    creating new products that can transform how applications are built and the way
    in which they deliver value to end users.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 技术本身并不新颖，但生态系统是。在我看来，这相当于从定制移动应用开发发展到拥有应用商店。它目前正经历着寒武纪比例的增长，这并非偶然，因为仅仅拥有丰富和标准化的生态系统就为新的机会打开了市场。更广泛地说，MCPs代表了一种以代理为中心的模型，用于创建新产品，可以改变应用程序的构建方式以及它们向最终用户交付价值的方式。
- en: The limitations of a human-centric model
  id: totrans-9
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 以人为中心的模型的局限性
- en: Most software applications are built around humans as their primary users. Generally
    speaking, a vendor decides to invest in developing certain product features, which
    it believes will be a good match to the requirements and needs of end users. The
    users then try to make use of that given set of features to try to fulfill their
    specific needs.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数软件应用程序都是围绕人类作为其主要用户来构建的。一般来说，供应商决定投资开发某些产品功能，它认为这将很好地匹配最终用户的需求和需求。然后，用户试图利用该给定的功能集来尝试满足他们的特定需求。
- en: '![Image by author](../Images/fd61f6e4bf885ea7cfd72947f2690053.png)'
  id: totrans-11
  prefs: []
  type: TYPE_IMG
  zh: '![作者图片](../Images/fd61f6e4bf885ea7cfd72947f2690053.png)'
- en: Image by author
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 作者图片
- en: 'There are three main limitations to this approach, which are becoming more
    of an impediment as teams adopt AI agents to streamline their processes:'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法有三个主要局限性，随着团队采用AI代理以简化其流程，这些局限性正变得越来越阻碍：
- en: '**Fixed interface**— Product managers have to anticipate and generalize the
    use case to create the right interfaces in the application. The UI or API set
    is fixed and cannot adapt itself to each unique need. Consequently, users may
    find that some features are completely useless to their specific requirements.
    Other times, even with a combination of features, the user can’t get everything
    they need.'
  id: totrans-14
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**固定界面**—产品经理必须预测和概括用例，以在应用程序中创建正确的界面。UI或API集是固定的，不能适应每个独特的需求。因此，用户可能会发现某些功能对他们特定的需求来说完全没有用。有时，即使结合了功能，用户也可能无法获得他们所需的一切。'
- en: '**Cognitive load **— The process of interacting with the application data to
    get to the information the user needs requires manual effort, resources, and sometimes
    expertise. Taking APMs as an example, understanding the root cause of a performance
    issue and fixing it might take some investigation, as each issue is different.
    Lack of automation and reliance on voluntary manual processes often means that
    the data is not utilized at all.'
  id: totrans-15
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**认知负荷**—与应用程序数据交互以获取用户所需信息的过程需要手动努力、资源和有时需要专业知识。以APM（应用程序性能管理）为例，理解性能问题的根本原因并修复它可能需要一些调查，因为每个问题都是不同的。缺乏自动化和依赖自愿的手动过程通常意味着数据根本未被利用。'
- en: '**Limited scope **— Each product often only holds a part of the picture needed
    to solve the specific requirement. For example, the APM might have the tracing
    data, but no access to the code, the GitHub history, Jira trends, infrastructure
    data, or customer tickets. It is left to the user to triage using multiple sources
    to get to the root of each problem.'
  id: totrans-16
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**范围有限**—每个产品通常只包含解决特定需求所需的部分信息。例如，APM可能拥有跟踪数据，但没有访问代码、GitHub历史记录、Jira趋势、基础设施数据或客户票据。用户必须使用多个来源进行分类，以找到每个问题的根源。'
- en: Agent-centric MCPs — The inverted application
  id: totrans-17
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 以代理为中心的MCPs — 倒置的应用程序
- en: With the advent of MCPs, software developers now have the choice of adopting
    a different model for developing software. Instead of focusing on a specific use
    case, trying to nail the right UI elements for hard-coded usage patterns, applications
    can transform into a resource for AI-driven processes. This describes a shift
    from supporting a handful of predefined interactions to supporting numerous **emergent**
    use cases. Rather than investing in a specific feature, an application can now
    choose to lend its domain expertise to the AI agent via **data** and **actions**
    that can be used opportunistically whenever they are relevant, even if indirectly
    so.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 随着MCP（微服务容器）的出现，软件开发者现在可以选择采用不同的软件开发模型。不再专注于特定的用例，试图为硬编码的使用模式确定正确的UI元素，应用程序可以转变为AI驱动过程的资源。这描述了从支持少量预定义交互到支持众多**新兴**用例的转变。而不是投资于特定的功能，应用程序现在可以选择通过**数据**和**操作**将其领域专业知识借给AI代理，这些数据和行为可以在相关时（即使间接相关）有选择地使用。
- en: '![](../Images/e06b084594d19e7778bdb4f55cec1791.png)'
  id: totrans-19
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/e06b084594d19e7778bdb4f55cec1791.png)'
- en: Image by author
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 作者图片
- en: As this model scales, the agent can seamlessly consolidate data and actions
    from different applications and domains, such as GitHub, Jira, observability platforms,
    analytics tools, and the codebase itself. The agent can then automate the analysis
    process itself as a part of **synthesizing** the data, removing the manual steps
    and the need for specialized expertise.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 随着这种模型的扩展，代理可以无缝地整合来自不同应用程序和领域的数据和操作，例如GitHub、Jira、可观察性平台、分析工具以及代码库本身。然后，代理可以作为数据综合的一部分自动执行分析过程，从而消除手动步骤和需要专业知识的需要。
- en: Observability is not a web application; it’s data expertise
  id: totrans-22
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 可观察性不是一个网络应用程序；它是数据专业知识
- en: '![Image generated using Midjourney](../Images/1cbb0b70a927c27b46dca9c353a5e626.png)'
  id: totrans-23
  prefs: []
  type: TYPE_IMG
  zh: '![使用Midjourney生成的图片](../Images/1cbb0b70a927c27b46dca9c353a5e626.png)'
- en: Image generated using Midjourney
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Midjourney生成的图片
- en: Let’s take a look at a practical example that can illustrate how an agent-centric
    model opens up new neural pathways in the engineering process**.**
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们来看一个实际例子，这个例子可以说明一个以代理为中心的模型如何在工程过程中开辟新的神经通路**。**
- en: Every developer knows **code reviews** require a lot of effort; to make matters
    worse, the reviewer is often context-switched away from their other tasks, further
    draining the team’s productivity. On the surface, this would seem like an opportunity
    for observability applications to shine. After all, the code under review has
    already accumulated meaningful data running in testing and pre-production environments.
    Theoretically, this information can help decipher more about the changes, what
    they are impacting, and how they have possibly altered the system behavior. Unforunately,
    the high cost of making sense of all of that data across multiple applications
    and data stream, makes it next to useless.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 每个开发者都知道**代码审查**需要大量努力；更糟糕的是，审查者经常被切换到其他任务，进一步消耗团队的生产力。表面上，这似乎是可观察性应用程序大放异彩的机会。毕竟，正在审查的代码已经在测试和预生产环境中积累了有意义的运行数据。理论上，这些信息可以帮助更深入地了解更改，它们影响的内容，以及它们可能如何改变系统行为。不幸的是，在多个应用程序和数据流中理解所有这些数据的成本很高，使得它几乎毫无用处。
- en: In an agent-centric flow, however, whenever an engineer asks an AI agent to
    assist in reviewing the new code, that entire process becomes completely autonomous.
    In the background, the agent will orchestrate the investigative steps across multiple
    applications and MCPs, including observability tools, to bring back actionable
    insights about the code changes. The agent can access relevant runtime data (e.g.,
    traces and logs from staging runs), analytics on feature usage, GitHub commit
    metadata, and even Jira ticket history. It then correlates the diff with the relevant
    runtime spans, flags latency regressions or failed interactions, and points out
    recent incidents that might relate to the modified code.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，在一个以代理为中心的流程中，每当工程师要求人工智能代理协助审查新代码时，整个过程就变得完全自动化。在幕后，代理将协调跨多个应用程序和MCPs的调查步骤，包括可观察性工具，以提供关于代码更改的可操作见解。代理可以访问相关的运行时数据（例如，来自预发布运行的跟踪和日志），功能使用分析，GitHub提交元数据，甚至Jira票务历史。然后，它将差异与相关的运行时跨度相关联，标记延迟回归或失败的交互，并指出可能与修改的代码相关的最近事件。
- en: '![Image by author](../Images/52d33972729f5cc072f967a42379ca71.png)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
  zh: '![图片由作者提供](../Images/52d33972729f5cc072f967a42379ca71.png)'
- en: Image by author
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: 'In this scenario, the developer doesn’t need to sift through different tools
    or tabs or spend time trying to connect the dots— the agent brings it all together
    behind the scenes, identifying issues as well as possible fixes. As response itself
    is dynamically generated: it may begin with a concise textual summary, expand
    into a table showing metrics over time, include a link to the affected file in
    GitHub with highlighted changes, and even embed a chart visualizing the timeline
    of errors before and after the release.'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，开发者不需要在不同的工具或标签之间筛选，也不需要花费时间尝试连接点——代理在幕后将所有这些整合在一起，识别问题以及可能的解决方案。因为响应本身是动态生成的：它可能从一个简洁的文本摘要开始，扩展到显示随时间变化的指标的表格，包括指向受影响文件的GitHub链接，并突出显示更改，甚至嵌入一个图表，可视化发布前后错误的时序。
- en: '![image by author](../Images/2089c83d0b096153384381003953022a.png)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
  zh: '![图片由作者提供](../Images/2089c83d0b096153384381003953022a.png)'
- en: image by author
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: While the above workflow was organically produced by an agent, some AI clients
    will allow the user to cement a desired workflows by adding rules to the agent’s
    memory. For example, this is is a memory file I am currenting using with Cursor
    to ensure that all code review prompts will consistently trigger checks to the
    test environment and check for usage based on production.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然上述工作流程是由代理自然产生的，但一些AI客户端允许用户通过向代理的记忆中添加规则来巩固期望的工作流程。例如，这是我目前正在Cursor中使用的内存文件，以确保所有代码审查提示都会一致地触发对测试环境的检查，并基于生产进行检查。
- en: Death by a thousand use cases
  id: totrans-34
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 千种用例的死亡
- en: The code review scenario is just one ofmany **emergent** use cases that demonstrate
    how AI can quietly make use of relevant MCP data to assist the user accomplish
    their goals. More importantly, the user does not need to be aware of the applications
    that were being used autonomously by the agent. From the user’s perspective, they
    just need to describe their need.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 代码审查场景只是许多**突现**用例之一，展示了AI如何悄无声息地利用相关的MCP数据来协助用户实现目标。更重要的是，用户不需要意识到代理正在自主使用的应用程序。从用户的角度来看，他们只需要描述他们的需求。
- en: 'Emergent use cases can enhance user productivity across the board with data
    that cannot be made accessible otherwise. Here are a few other examples where
    observability data can make a huge difference, without anyone having to visit
    a single APM web page:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 突现的使用案例可以通过无法通过其他方式访问的数据来提高用户的生产力。以下是一些其他示例，说明可观察性数据如何在不让任何人访问单个APM网页的情况下产生巨大影响：
- en: '**Test generation** based on real usage'
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**基于实际使用情况生成的测试**'
- en: Selecting the right areas to **refactor** based on code issues affecting performance
    the most
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据影响性能最严重的代码问题选择正确的**重构**区域
- en: Preventing **breaking changes** when code is still checked out
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 当代码仍在签出时防止**破坏性变更**
- en: Detecting **unused code**
  id: totrans-40
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 检测**未使用代码**
- en: Products need to change
  id: totrans-41
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 产品需要改变
- en: Making observability useful to the agent, however, is a little more involved
    than slapping on an MCP adapter to an APM. Indeed, many of the current generation
    tools, in rushing to support the new technology took that very route, not taking
    into consideration that AI agents also have their limitations.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，使可观察性对代理有用比仅仅将MCP适配器添加到APM上要复杂得多。事实上，许多当前一代的工具在匆忙支持新技术时采取了那条路线，没有考虑到AI代理也有其局限性。
- en: While smart and powerful, agents cannot instantly replace any application interacting
    with any data, on demand. In their current iteration, at least, they are bound
    by the size of the dataset and stop short of applying more complex ML algorithms
    or even higher-order math. If the observability tool is to become an effective
    data provider to the agent, it must prepare the data in advance in lieu of these
    limitations. More broadly speaking, this defines the role of products in the age
    of AI — providing islands of nontrivial domain expertise to be utilized in an
    AI-driven process.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然智能且强大，但代理不能立即替换与任何数据交互的任何应用程序，按需进行。在其当前版本中，至少它们受限于数据集的大小，并且无法应用更复杂的ML算法或甚至更高阶的数学。如果可观察性工具要成为代理的有效数据提供者，它必须提前准备数据以弥补这些限制。更广泛地说，这定义了AI时代产品的角色——提供非平凡领域专业知识岛屿，以便在AI驱动过程中使用。
- en: '![](../Images/c2b1299def6cab6b13af2e3ee92f73e0.png)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/c2b1299def6cab6b13af2e3ee92f73e0.png)'
- en: Image by author
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: 'There are many posts on the topic on the best way to prepare data for use by
    generative AI agents, and I have included some links at the end of this post.
    However, we can describe some of the requirements of a good MCP output in broad
    strokes:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 关于如何为生成式AI代理准备数据的帖子有很多，我在本文末尾包含了一些链接。然而，我们可以大致描述一个好的MCP输出的要求：
- en: '**Structured** (schema-consistent, typed entities)'
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**结构化**（模式一致、类型实体）'
- en: '**Preprocessed** (aggregated, deduplicated, tagged)'
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**预处理**（聚合、去重、标记）'
- en: '**Contextualized** (grouped by session, lifecycle, or intent)'
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**上下文化**（按会话、生命周期或意图分组）'
- en: '**Linked** (references across code spans, logs, commits, and tickets)'
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**链接**（跨代码范围、日志、提交和工单的引用）'
- en: Instead of surfacing raw telemetry an **MCP must feed a coherent data narrative**
    to the agent, post-analysis. The agent is not just a dashboard view to be rendered.
    At the same time, it must also make the **relevant** raw data available on demand
    to allow further investigation, to support the agent’s autonomous reasoning actions.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 代替展示原始遥测数据，**MCP必须在分析后向代理提供连贯的数据叙事**。代理不仅仅是一个要渲染的仪表板视图。同时，它还必须根据需要提供**相关**的原始数据，以便进行进一步调查，支持代理的自主推理操作。
- en: Given simple access to raw data it would be next to impossible for an agent
    to identify an issue manifesting in the trace internals of only 5% of the millions
    of available traces, let alone prioritize that problem based on its system impact,
    or make the determination of whether that pattern is anomalous.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 即使有简单的原始数据访问权限，代理也很难识别出仅在数百万可用跟踪中5%的跟踪内部表现出来的问题，更不用说根据其系统影响来优先处理该问题，或者确定该模式是否异常。
- en: To bridge that gap, many products will likely evolve into ‘AI preposessors’,
    bringing forth dedicated ML processes and high level statistical analysis as well
    as domain expertise.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 为了弥合这一差距，许多产品可能会演变成“AI预处理器”，提供专门的ML（机器学习）流程、高级统计分析以及领域专业知识。
- en: Farewell to APMs
  id: totrans-54
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 再见，APM
- en: Ultimately, APMs are not legacy tools — they are representative of a **legacy
    mindset** that is slowly but surely being replaced. It might take more time for
    the industry to realign, but it will ultimately impact many of the products we
    currently use, especially in the software industry, which is racing to adopt generative
    AI.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 最终，APM（应用性能管理）工具并非过时工具——它们代表了一种正在缓慢但肯定被取代的**过时思维模式**。行业重新调整可能需要更多时间，但它最终将影响我们目前使用的许多产品，尤其是在竞相采用生成式AI的软件行业。
- en: As AI becomes more dominant in developing software, it will also no longer be
    limited to human-initiated interactions. Generative AI reasoning will be used
    as a part of the CI process, and in some cases, even run indefinitely as background
    processes continuously checking data and performing actions. With that in mind,
    more and more tools will come up with their agent-centric model complement and
    sometimes replace their direct-to-human approach, or risk being left out of their
    clients new AI SLDC stack.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 随着AI在软件开发中的主导地位日益增强，它也不再局限于由人类发起的交互。生成式AI推理将被用作CI（持续集成）过程的一部分，在某些情况下，甚至可以无限期地作为后台进程持续检查数据和执行操作。考虑到这一点，越来越多的工具将推出以代理为中心的模型补充，有时甚至取代直接面向人类的方法，否则可能会被排除在客户新的AI
    SLDC（软件生命周期开发协作）堆栈之外。
- en: Links and resources
  id: totrans-57
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 链接和资源
- en: '[**Airbyte**](https://airbyte.com/blog/data-normalization-for-gen-ai-applications):
    Normalization is key — schema consistency and relational linking improve cross-source
    reasoning.'
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[**Airbyte**](https://airbyte.com/blog/data-normalization-for-gen-ai-applications)：标准化是关键——模式一致性和关系链接提高了跨源推理。'
- en: '[**Harrison Clarke**](https://www.harrisonclarke.com/blog/mastering-data-preprocessing-for-ai-elevating-model-performance):
    Preprocessing must hit the sweet spot — rich enough for inference, structured
    enough for precision.'
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[**Harrison Clarke**](https://www.harrisonclarke.com/blog/mastering-data-preprocessing-for-ai-elevating-model-performance)：预处理必须击中甜蜜点——足够丰富以进行推理，足够结构化以实现精确。'
- en: '[**DigitalOcean**](https://www.digitalocean.com/community/conceptual-articles/send-data-to-genai-agents):
    Aggregation by semantic boundaries (user sessions, flows) unlocks better chunking
    and story-based reasoning.'
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[**DigitalOcean**](https://www.digitalocean.com/community/conceptual-articles/send-data-to-genai-agents)：通过语义边界（用户会话、流量）进行聚合，可以解锁更好的分块和基于故事推理。'
