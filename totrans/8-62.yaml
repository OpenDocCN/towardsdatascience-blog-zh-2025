- en: Measuring The Execution Times of C Versus Rust
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/measuring-the-execution-times-of-c-versus-rust-bc45c577052a/](https://towardsdatascience.com/measuring-the-execution-times-of-c-versus-rust-bc45c577052a/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Comparing two of the fastest programming languages
  id: totrans-2
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '![Photo by Aron Visuals on Unsplash](../Images/01c4e4fd745322daba2aa2a8d6381f8c.png)'
  id: totrans-3
  prefs: []
  type: TYPE_IMG
- en: Photo by [Aron Visuals](https://unsplash.com/@aronvisuals?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: Is C is faster than Rust? I had always assumed the answer to that question to
    be yes, but I recently felt the need to test my assumptions. I tried searching
    for information on the subject but I wasn’t able to find information that compared
    the two languages side by side, so I did my own testing. What I found were cases
    where Rust could be seen as faster than C.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: '**C vs Rust**'
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: C and Rust are both similar (low-level) system programming languages designed
    for high performance; where they differ is in their design philosophy and features.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: '**C** is about simplicity and giving the programmer complete control over memory.
    With this freedom can come potential issues such as buffer overflows, null pointer
    dereferencing, and memory leaks if the programmer does not handle these properly
    in their code. It lacks built-in safety features to prevent these, and the user
    has to make them manually.'
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Rust** is the polar opposite of this and it emphasizes memory safety while
    trying to sacrifice as little performance as possible. It uses a borrow checker
    and ownership system to enforce rules at compile-time to ensure that memory is
    accessed safely.'
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: While Rust’s main feature is automatic memory safety, if the programmer needs
    to turn this off it allows it, which can make it very versatile.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: '**Comparing The speed**'
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'For testing I used:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
- en: Debian 10
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Clang 7.0.1
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: GCC 8.3.0
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Clang 13.0.1
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Cargo 1.83.0
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Rustc 1.83.0
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The first thing I did was make a hello world program in each language.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: '**C**'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  id: totrans-21
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '**Rust**'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  id: totrans-23
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: This is just default experience for both programs. I didn’t add any optimizations
    to either.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  id: totrans-25
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '[PRE3]'
  id: totrans-26
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: When I had both binaries I then used the valgrind massif tool to get the time
    and memory usage of each program.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
- en: '**C Hello World Execution**'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
- en: '![valgrind - - tool=massif ./helloc for C](../Images/ed2bf1d4ba0cd3942495c1f5db985417.png)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
- en: valgrind – – tool=massif ./helloc for C
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
- en: How Valgrind works is by taking snapshots throughout the program execution then
    printing out the total amount of memory used in bytes at that time, as well as
    the current time elapsed. Time in this case (i) is measured in CPU instructions.
    We can see that the C code took 4 total snapshots and 131,349 CPU instructions
    to print hello world.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
- en: Why do we care about CPU instruction count? CPU speed is generally measured
    in clock speed. These days usually Gigahertz, meaning a 3.0 GHz processor can
    execute 3 billion cock cycles per second. One clock cycle is not equal to one
    instruction though. It is a very architecture dependent problem how many clock
    cycles it takes to execute an instruction. Many processors can now even execute
    multiple instructions on one cycle. On the same platform though, like I am doing
    here, we can use the amount of instructions the CPU takes to execute the program
    in order to gain a understanding of which one took less work for the CPU to complete.
    Time to complete and amount of work to complete have a rough relationship.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 我们为什么关心 CPU 指令数？CPU 速度通常以时钟速度来衡量。如今通常是千兆赫兹，这意味着 3.0 GHz 处理器每秒可以执行 30 亿个时钟周期。但一个时钟周期并不等于一个指令。执行一个指令所需的时钟周期数量是一个非常架构相关的问题。许多处理器现在甚至可以在一个周期内执行多个指令。但在同一平台上，比如我这里所做的那样，我们可以使用
    CPU 执行程序所需的指令数量来了解哪个程序对 CPU 完成的工作更少。完成时间和完成工作量有一个大致的关系。
- en: '**Rust Hello World Execution**'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: '**Rust Hello World 执行**'
- en: '![output of valgrind - - tool=massif ./hello for Rust](../Images/10d529336a3378dd7120bb2d360daf13.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![valgrind 输出 - - tool=massif ./hello for Rust](../Images/10d529336a3378dd7120bb2d360daf13.png)'
- en: output of valgrind – – tool=massif ./hello for Rust
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: valgrind 输出 – – tool=massif ./hello for Rust
- en: Unlike the C program, the Rust program took 14 total snapshots and 508,165 total
    CPU instructions to print hello world. From this we can tell that the Rust program
    took more work to print hello than the C program.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 与 C 程序不同，Rust 程序打印 "hello world" 需要了 14 个总快照和 508,165 个总 CPU 指令。从这个结果我们可以看出，Rust
    程序打印 "hello world" 所需的工作量比 C 程序多。
- en: The Rust Program also used more ram, and while it is not shown here I also noticed
    a large difference in the size of the binaries with the Rust program taking 412k,
    while the C program took 16k.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: Rust 程序也使用了更多的 RAM，虽然这里没有展示，但我还注意到 Rust 程序的二进制文件大小为 412k，而 C 程序仅为 16k。
- en: This test does not mean that C is faster than Rust yet though, as there are
    ways to reduce the amount of time it takes Rust to print to screen. I just did
    this first to see, because I was curious before I started optimizing and performing
    operations.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管如此，这个测试并不意味着 C 比 Rust 快，因为还有方法可以减少 Rust 打印到屏幕所需的时间。我只是先这样做，因为我开始优化和执行操作之前很好奇。
- en: 'I managed to reduce it further by adding this to my Cargo.toml:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 我通过在 Cargo.toml 中添加以下内容进一步减少了它：
- en: '[PRE4]'
  id: totrans-40
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: And using std::io::Write instead of println to reduce a little overhead.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 并且使用 std::io::Write 代替 println 以减少一点开销。
- en: '[PRE5]'
  id: totrans-42
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: By doing this I managed to reduce the time by a little, still nowhere near the
    C program, but I am sure it can be reduced further.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 通过这样做，我设法减少了时间，但仍然远远不及 C 程序，但我确信它可以进一步减少。
- en: '![output 2 of valgrind - - tool=massif ./hello for Rust new optimized hello](../Images/287816e9f7ec9a9c880fdf05d912b539.png)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
  zh: '![valgrind 输出 2 - - tool=massif ./hello for Rust new optimized hello](../Images/287816e9f7ec9a9c880fdf05d912b539.png)'
- en: output 2 of valgrind – – tool=massif ./hello for Rust new optimized hello
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: valgrind 输出 2 – – tool=massif ./hello for Rust new optimized hello
- en: '**QuickSort**'
  id: totrans-46
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**快速排序**'
- en: One of the things that matters a lot in a program is how quickly it can perform
    mathematical functions.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 在一个程序中，很重要的一点是它执行数学函数的速度有多快。
- en: To test this I wrote a simple quick sort program in Rust and C.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 为了测试这一点，我分别用 Rust 和 C 编写了一个简单的快速排序程序。
- en: To avoid random number generation contributing to the amount of time I used
    the same array of 1000 numbers in both programs.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 为了避免随机数生成对时间的影响，我在两个程序中都使用了相同的 1000 个数字数组。
- en: 'Rust Code:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: Rust 代码：
- en: '[PRE6]'
  id: totrans-51
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'C Code:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: C 代码：
- en: '[PRE7]'
  id: totrans-53
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'I then built both programs with the following arguments:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 我随后用以下参数构建了这两个程序：
- en: '[PRE8]'
  id: totrans-55
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: '[PRE9]'
  id: totrans-56
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: What I expected, based on the first test, was for the C code to perform faster,
    but to my surprise the Rust code said it was performing faster.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 根据第一次测试，我预期 C 代码会更快地执行，但令我惊讶的是，Rust 代码显示它执行得更快。
- en: '![Output of C quicksort](../Images/27bb37ffde04cd0a2dc2880d1686bcd7.png)'
  id: totrans-58
  prefs: []
  type: TYPE_IMG
  zh: '![C 快速排序输出](../Images/27bb37ffde04cd0a2dc2880d1686bcd7.png)'
- en: Output of C quicksort
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: C 快速排序输出
- en: '![Output of Rust Quicksort](../Images/2cea7e2bba9698600b99b94b8b7ae723.png)'
  id: totrans-60
  prefs: []
  type: TYPE_IMG
  zh: '![Rust 快速排序输出](../Images/2cea7e2bba9698600b99b94b8b7ae723.png)'
- en: Output of Rust Quicksort
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: Rust 快速排序输出
- en: What confused me is then I ran both binaries through valgrind, and it reported
    that the C binary was still using less instructions.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 让我感到困惑的是，当我将这两个二进制文件通过 valgrind 运行时，它报告说 C 二进制文件仍在使用更少的指令。
- en: '![Output of C valgrind showing a time of 434,078 for total execution](../Images/62624dc6e848a6c6d498c25146edaeb0.png)'
  id: totrans-63
  prefs: []
  type: TYPE_IMG
  zh: '![C valgrind 输出，显示总执行时间为 434,078](../Images/62624dc6e848a6c6d498c25146edaeb0.png)'
- en: Output of C valgrind showing a time of 434,078 for total execution
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: C valgrind输出的输出，显示总执行时间为434,078
- en: '![Output of Rust Valgrind showing a time of 656,647 for total execution](../Images/02ffa40633aea4836b53c79edb8e41c4.png)'
  id: totrans-65
  prefs: []
  type: TYPE_IMG
  zh: '![Rust Valgrind输出，显示总执行时间为656,647](../Images/02ffa40633aea4836b53c79edb8e41c4.png)'
- en: Output of Rust Valgrind showing a time of 656,647 for total execution
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: Rust Valgrind输出，显示总执行时间为656,647
- en: Since valgrind was just measuring the total amount of instructions used for
    execution this made me wonder if it had something to do with how Rust was optimizing
    the binary. It led me to try different compilers and optimization flags with C
    to see if that was the issue.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 由于valgrind只是测量执行过程中使用的总指令数，这让我想知道这是否与Rust优化二进制文件的方式有关。这促使我尝试不同的编译器和优化标志来查看是否是这个问题。
- en: '[PRE10]'
  id: totrans-68
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: '![Attempts with optimized gcc](../Images/10714c9d99168aca1b50e3dced9483bd.png)'
  id: totrans-69
  prefs: []
  type: TYPE_IMG
  zh: '![使用优化后的gcc尝试](../Images/10714c9d99168aca1b50e3dced9483bd.png)'
- en: Attempts with optimized gcc
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 使用优化后的gcc尝试
- en: '[PRE11]'
  id: totrans-71
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: '![Attempts with optimized clang](../Images/dfa04e908a53cc668087acbea4150a4c.png)'
  id: totrans-72
  prefs: []
  type: TYPE_IMG
  zh: '![使用优化后的clang尝试](../Images/dfa04e908a53cc668087acbea4150a4c.png)'
- en: Attempts with optimized clang
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 使用优化后的clang尝试
- en: '[PRE12]'
  id: totrans-74
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: '![Attempts with optimized clang 13](../Images/1ab7a7be0f2dd1d592da887bbf18f16d.png)'
  id: totrans-75
  prefs: []
  type: TYPE_IMG
  zh: '![使用优化后的clang 13尝试](../Images/1ab7a7be0f2dd1d592da887bbf18f16d.png)'
- en: Attempts with optimized clang 13
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 使用优化后的clang 13尝试
- en: Everything I tried showed the Rust binary beating the C binary.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 我尝试的所有东西都显示Rust二进制文件击败了C二进制文件。
- en: This made me wonder if the Rust timer was faster than the C timer, so I wrote
    a simple program to just iterate a number as high as it could in a second to test
    this.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 这让我想知道Rust计时器是否比C计时器更快，所以我编写了一个简单的程序，只迭代一秒内尽可能高的数字来测试这一点。
- en: '**C code:**'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: '**C代码：**'
- en: '[PRE13]'
  id: totrans-80
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: '**Rust code:**'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: '**Rust代码：**'
- en: '[PRE14]'
  id: totrans-82
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: '**Compile flags:**'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: '**编译标志：**'
- en: '[PRE15]'
  id: totrans-84
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: '[PRE16]'
  id: totrans-85
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: What I found was that the Rust program’s number was always larger than the C’s.
    This showed Rust completing the loop faster than the C program.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 我发现Rust程序中的数字总是比C的大。这表明Rust比C程序更快地完成循环。
- en: '![C timer completing loop](../Images/97fef8a831e1af7832ffe25961cb84dd.png)'
  id: totrans-87
  prefs: []
  type: TYPE_IMG
  zh: '![C计时器完成循环](../Images/97fef8a831e1af7832ffe25961cb84dd.png)'
- en: C timer completing loop
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: C计时器完成循环
- en: '![Rust timer completing loop](../Images/ee43d882409f5713278d07dce030d1e6.png)'
  id: totrans-89
  prefs: []
  type: TYPE_IMG
  zh: '![Rust计时器完成循环](../Images/ee43d882409f5713278d07dce030d1e6.png)'
- en: Rust timer completing loop
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: Rust计时器完成循环
- en: No matter what I tried this always seemed to be the case. The only way to get
    an answer to why this was happening at this point was to look at the actual assembly.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 无论我尝试什么，这似乎总是如此。此时，要找到为什么会出现这种情况的唯一方法就是查看实际的汇编代码。
- en: I disassembled both programs in Ghidra, and I found the function that iterated
    the number for a second.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 我在Ghidra中反汇编了这两个程序，并找到了迭代一秒数字的函数。
- en: 'The loop in Rust Assembly:'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: Rust汇编中的循环：
- en: '![Rust timer disassembled](../Images/b25b806c1dc448d44fd0d0f4b7c585e8.png)'
  id: totrans-94
  prefs: []
  type: TYPE_IMG
  zh: '![Rust计时器反汇编](../Images/b25b806c1dc448d44fd0d0f4b7c585e8.png)'
- en: Rust timer disassembled
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: Rust计时器反汇编
- en: 'The loop in C Assembly:'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: C汇编中的循环：
- en: '![C timer disassembled](../Images/7cf01f7f9c8cf215adf2f64786c91054.png)'
  id: totrans-97
  prefs: []
  type: TYPE_IMG
  zh: '![C计时器反汇编](../Images/7cf01f7f9c8cf215adf2f64786c91054.png)'
- en: C timer disassembled
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: C计时器反汇编
- en: Each line in the disassembled output corresponds to one instructions that the
    CPU will have to execute.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 反汇编输出中的每一行都对应CPU必须执行的一条指令。
- en: What I found was how Rust and C were handling the time was different. Rust was
    way better optimized.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 我发现Rust和C处理时间的方式不同。Rust的优化要好得多。
- en: The C code had to perform a lot more instructions in the one loop to calculate
    if the current time was still less than a second than the Rust code did.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: C代码必须在一个循环中执行更多的指令来计算当前时间是否仍然小于一秒，而Rust代码则不需要。
- en: Looking at the Rust assembly made me realize that my C code should be optimized
    further, but by me not the compiler.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 查看Rust汇编让我意识到我的C代码应该进一步优化，但不是由编译器，而是由我来优化。
- en: Here is the new C counter.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是新的C计数器。
