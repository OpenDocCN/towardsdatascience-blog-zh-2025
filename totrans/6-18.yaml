- en: 'Data Note: Mock Energy Production Dataset'
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In **Part 1**, we used a mock energy production dataset with 10-minute intervals
    from January 1, 2023, to March 1, 2023\. About 10% of the data points are missing
    values to simulate a realistic scenario for imputation.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
- en: 'Here is the data:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  id: totrans-29
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '![Figure 1: Mock Energy Production Data with Missing values. | Image by author.](../Images/121d866d41bc520a302619ef707cec05.png)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
- en: 'Figure 1: Mock Energy Production Data with Missing values. | Image by author.'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
- en: Why and When to Use Non-Linear Machine Learning for Imputation?
  id: totrans-32
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'K-Nearest Neighbors takes advantage of the proximity between data points. These
    methods have especially proved useful when:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: '**Nonlinear Patterns Exist:** KNN handle unusual or periodic trends better
    than simple polynomials or basic smoothing.'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**More Data Features:** If you have several correlated features (temperature,
    humidity, day-of-week indicators), KNN can take advantage of those.'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Larger Gaps:** These models capture a wider context and, therefore, are extendable
    for longer missing intervals.'
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
- en: '**Working with time-series data? Then you need key techniques to master its
    analysis:**'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
- en: '[**5 Must-Know Techniques for Mastering Time-Series Analysis**](https://towardsdatascience.com/5-must-know-techniques-for-mastering-time-series-analysis-a23ccf4d053a)'
  id: totrans-39
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
- en: K-Nearest Neighbors for Time-Series Imputation
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'We will use **`KNNImputer`** from **`scikit-learn`** to fill in missing values
    based on the nearest neighbors’ known observations. Below is an example of how
    to do it:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  id: totrans-43
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '![Figure 2: A comparative line plot showing original energy production data
    (with missing values) in red and KNN-imputed data in purple. This chart highlights
    the seamless integration of imputed values into the dataset for January 2023 |
    Image by author.](../Images/54a075a3fafbc56a3e564c52dbe787fa.png)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
- en: 'Figure 2: A comparative line plot showing original energy production data (with
    missing values) in red and KNN-imputed data in purple. This chart highlights the
    seamless integration of imputed values into the dataset for January 2023 | Image
    by author.'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
- en: '**In Figure 2**, we can see how missing values have been replaced with realistic
    estimates based on patterns in the data.'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
- en: This code preprocesses the dataset in order to fill in missing energy production
    values, using the time-related patterns present in the data.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
- en: '**Features are created for the hour of day and day of week** and are encoded
    to represent their natural cycle, for example, midnight being closer to 11PM.'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
- en: '**Cyclical encoding** is a transformation that takes any feature related to
    time, such as the hour of the day or day of the week, and represents that feature
    in such a way that the natural cycle in these variables is captured.'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
- en: Consider, for instance, that the hour of the day cycles from 0, representing
    midnight, to 23, representing 11 PM; these two hours are actually quite proximal
    to each other in terms of time.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
- en: '**These features are helpful in capturing meaningful time-based trends.**'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
- en: In preparation for imputation, **all features are standardized** so that they
    contribute equally in the KNN algorithm, which fills missing values based on the
    most similar data points.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
- en: '**Observations**'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
- en: '**Local Adaptation**: KNN is based on the distances among points depending
    on features like Time_Index and Hour; it does capture day-night cycles provided
    that this cycling is reflected in the Hour feature.'
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Nonlinear Preservation**: Unlike a straight line, KNN predictions take the
    shape of the data and will retain peaks and troughs if neighbor points show such
    patterns.'
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**For now, it seems the KNN imputation method fairly restored missing values
    using the surrounding time-series pattern!** We need, however, more advanced methods
    than just that plot.'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
- en: '**Next, let’s evaluate the results of this KNN imputation.**'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
- en: Statistical Comparison
  id: totrans-58
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Just as in Part 1, we evaluate mean, std, min, max, and quartiles:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  id: totrans-60
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '![Figure 3: Statistical Comparison| Image by Author.](../Images/c99981b8e1b7968597aa27f87c5c70be.png)'
  id: totrans-61
  prefs: []
  type: TYPE_IMG
- en: 'Figure 3: Statistical Comparison| Image by Author.'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
- en: 'We can see that the **descriptive statistics of the imputed data closely resemble
    the distribution of the original data**, with the overall characteristics preserved.
    That is a good news: the imputed data keeps realistic variability in energy production
    values!'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
- en: Autocorrelation, STL Decomposition and Residual Analysis
  id: totrans-64
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We will create **Autocorrelation Functions (ACF) plots and perform STL decomposition**,
    as in part 1, to assess the underlying **seasonal patterns, trends, and autocorrelations**
    in the time series data that provide a deeper understanding of the imputation
    results.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  id: totrans-66
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '![Figure 4: Side-by-side ACF plots comparing temporal dependencies in the original
    (interpolated) and KNN-imputed datasets. Both charts show similar periodic patterns,
    validating the preservation of temporal dependencies. | Image by author](../Images/216a8c920f850d028c35d6f9269b62fc.png)'
  id: totrans-67
  prefs: []
  type: TYPE_IMG
- en: 'Figure 4: Side-by-side ACF plots comparing temporal dependencies in the original
    (interpolated) and KNN-imputed datasets. Both charts show similar periodic patterns,
    validating the preservation of temporal dependencies. | Image by author'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
- en: Figure 4 displays the [ACF plots](https://www.geeksforgeeks.org/autocorrelation-and-partial-autocorrelation/)
    of the original and imputed datasets. We can see that both plots show very similar
    patterns, confirming that the imputation indeed preserved temporal dependencies!
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
- en: We can conclude from these plots that the imputed dataset captured well the
    periodic nature of the original data.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 5: A trend analysis plot comparing the STL decomposition trends of
    the original (interpolated) and KNN-imputed datasets. The chart shows minimal
    differences, indicating the imputed data maintains long-term trends. | Image by
    author](../Images/d57b14bbd7739208a4612dd74399d6a5.png)'
  id: totrans-71
  prefs: []
  type: TYPE_IMG
- en: 'Figure 5: A trend analysis plot comparing the STL decomposition trends of the
    original (interpolated) and KNN-imputed datasets. The chart shows minimal differences,
    indicating the imputed data maintains long-term trends. | Image by author'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
- en: '![Figure 6: Seasonal Component plot comparing the original and imputed data.
    | Image by author](../Images/132170683a024039ab0d0a85e777ca26.png)'
  id: totrans-73
  prefs: []
  type: TYPE_IMG
- en: 'Figure 6: Seasonal Component plot comparing the original and imputed data.
    | Image by author'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
- en: '**Figure 5: The trend component extracted by STL** decomposition on the KNN-imputed
    data **follows the original data very closely,** reflecting little deviation.
    This confirms that long-term patterns in energy production a were well retained
    in the imputation process!'
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Figure 6:** Similarly, we cannot even visually see any difference in **seasonal
    components** between the original and imputed datasets. This shows that the inherent
    daily and weekly periodicity of energy production cycles was really well preserved.
    **Indeed, this aspect is very important from the point of view of time-series
    analysis and forecasting tasks in case further downstream works are required.**'
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Residual Analysis
  id: totrans-77
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '![Figure 7: Dual visualizations showcasing seasonal components and residuals
    for original (interpolated) and KNN-imputed datasets. Seasonal patterns are nearly
    identical, while residuals demonstrate consistent noise levels across both datasets.
    | Image by author](../Images/561b3bd98972d50639e374ab09e5e3a7.png)'
  id: totrans-78
  prefs: []
  type: TYPE_IMG
- en: 'Figure 7: Dual visualizations showcasing seasonal components and residuals
    for original (interpolated) and KNN-imputed datasets. Seasonal patterns are nearly
    identical, while residuals demonstrate consistent noise levels across both datasets.
    | Image by author'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
- en: Indeed, **the residuals from the STL decomposition** of the KNN-imputed data
    **do show a noise pattern similar to the original dataset** interpolated for this
    analysis, showing that very few extra irregularities or artifacts were introduced
    in the imputation process to the dataset.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
- en: As the residual variance remains similar across both data sets, it indicates
    that the imputation method preserved the randomness inherent in the original time-series
    data.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
- en: '**How to handle outliers in time-series data? Save this article for later:**'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
- en: '[**The Ultimate Guide to Finding Outliers in Your Time-Series Data (Part 1)**](https://towardsdatascience.com/the-ultimate-guide-to-finding-outliers-in-your-time-series-data-part-1-1bf81e09ade4)'
  id: totrans-84
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
- en: Potential Limitations of KNN
  id: totrans-86
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'We have seen that KNN is actually a useful model to perform time-series imputation.
    Of course, every model comes with its limitations:'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
- en: '**Can Become Computational Complex:** KNN requires calculating distances for
    all observations, which can of course become computationally expensive if you
    are working with large datasets or high-dimensional feature spaces.'
  id: totrans-88
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Sensitive to Parameters:** The choice of **`n_neighbors`** and weighting
    scheme significantly affects results.'
  id: totrans-89
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Assumes Similarity:** KNN assumes that missing values can be inferred by
    proximity to other observations in feature space. When there is too little similarity
    in the data, or if it’s too noisy, this may break down.'
  id: totrans-90
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Stationarity Assumption:** **KNN does not natively support non-stationary**
    **data** – time-series data with shifting trends or seasonalities – apart from
    perhaps additional preprocessing. Our data used here is stationary.'
  id: totrans-91
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Scalability:** KNN does not scale well for very large data sets or time-series
    streaming data.'
  id: totrans-92
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: When to Use KNN for Time-Series Data Imputation
  id: totrans-93
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'KNN imputation is useful when certain criteria are met in time-series data:'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
- en: '**Moderate Levels of Missing Data:**'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
- en: '**KNN performs well when the proportion of missing values is moderate (e.g.,
    5–20%).** If the missing data exceeds these levels, the model might struggle.'
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Cyclic or Periodic Data:**'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
- en: It is best applied to those datasets featuring distinct periodic patterns (say,
    daily, weekly, or yearly cycles). Energy production, traffic flow, or seasonal
    sales data are examples of such. The performance of KNN is improved by this cyclic
    feature engineering.
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Limited Non-Stationarity:**'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
- en: KNN will do well where the dataset is fairly stationary or preprocessed for
    the removal of non-stationarity, such as detrending or deseasonalizing.
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Small to Medium Dataset Sizes:**'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
- en: It provides a good trade-off between computational feasibility and model accuracy
    for non-excessively large time-series datasets.
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Missing Not at Random (MNAR):**'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
- en: If the missing data are related to the presence of certain temporal patterns
    or periodic events, then KNN can exploit those relationships effectively, especially
    when the features contain time indices or cyclical components.
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
- en: '**The application of KNN to impute the missing values in time-series data was
    very effective.**'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
- en: '**The imputation preserved the nature of the statistics** – central tendency,
    variability, distribution shape-along with main temporal features like trend,
    seasonality, and autocorrelation patterns. Residual analysis confirmed that no
    significant irregularities or distortions were introduced in the imputation process.'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
- en: We saw it is important to fabricate new cyclical features (if not already present
    on the dataset) so that the KNN imputer can preserve the inherent periodic nature
    of the energy production dataset, so that are new imputed values integrate well
    into the data. **These results demonstrate that KNN can be a robust and reliable
    method for handling missing data in time-series datasets.**
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
