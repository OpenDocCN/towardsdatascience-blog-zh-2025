- en: The End-to-End Data Scientist’s Prompt Playbook
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/the-end-to-end-data-scientists-prompt-playbook/](https://towardsdatascience.com/the-end-to-end-data-scientists-prompt-playbook/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1757129029805" class="mdspan-comment">Ever feel proud</mdspan>
    of your **code**, your **modeling**, and the **accuracy** you’ve achieved, knowing
    it could really make a **difference** for your team but then you **struggle**
    to **share** those findings with your team and stakeholders?
  prefs: []
  type: TYPE_NORMAL
- en: That’s a very common feeling among data scientists and ML engineers.
  prefs: []
  type: TYPE_NORMAL
- en: In this article, I’m sharing my go-to prompts, workflows, and tiny tricks that
    turn dense, sometimes abstract, model **outputs** into sharp and clear **business
    narratives** people actually care about.
  prefs: []
  type: TYPE_NORMAL
- en: If you work with **stakeholders** or **managers** who don’t live in notebooks
    all day, this is for you. And just like my other guides, I’ll keep it practical
    and copy-pasteable.
  prefs: []
  type: TYPE_NORMAL
- en: This article is the third and last part of **3-article series** regarding prompt
    engineering for data scientists.
  prefs: []
  type: TYPE_NORMAL
- en: 'The **End-to-End** Data Science Prompt Engineering Series is:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Part 1: **[Prompt Engineering for Planning, Cleaning, and EDA](https://towardsdatascience.com/become-a-better-data-scientist-with-these-prompt-engineering-hacks/)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**Part 2:** Prompt Engineering for Features, Modeling, and Evaluation](https://towardsdatascience.com/advanced-prompt-engineering-for-data-science-projects/)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Part 3: Prompts for Docs, DevOps, and Stakeholder Communication** (this article)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 👉 All the **prompts **in this article are available at the** end** of this article
    as a cheat sheet 😉
  prefs: []
  type: TYPE_NORMAL
- en: 'In this article:'
  prefs: []
  type: TYPE_NORMAL
- en: Why LLMs Are a Game-Changer for Data Storytelling
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The Communication Lifecycle, Reimagined with LLMs
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Prompts for Docs, DevOps, and Stakeholder Communication
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Prompt Engineering cheat sheet
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 1) Why LLMs Are a Game-Changer for Data Storytelling
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'LLMs mix fluent **writing** with **contextual** reasoning. In practice, that
    means they can:'
  prefs: []
  type: TYPE_NORMAL
- en: rephrase tricky **metric**s in plain English (or any other language),
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: draft executive-level **summaries** in seconds, and
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: adapt **tone** and **format** for any audience—board, product, legal, you name
    it.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Early research is showing that GPT-style models can actually boost **understanding**
    for **non-technical** readers by double digits. That’s a pretty big jump compared
    to just staring at raw charts or graphs.
  prefs: []
  type: TYPE_NORMAL
- en: And because LLMs “**speak stakeholder**,” they help you defend decisions without
    drowning folks in jargon.
  prefs: []
  type: TYPE_NORMAL
- en: 'If prompt engineering felt like hype before, here it becomes a real edge: **clear
    stories**, fewer meetings, faster buy-in.'
  prefs: []
  type: TYPE_NORMAL
- en: 2) The Communication Lifecycle, Reimagined with LLMs
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'After training an evaluating a model, you will probably:'
  prefs: []
  type: TYPE_NORMAL
- en: Interpret model results (SHAP, coefficients, confusion matrices).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Summarize EDA and call out caveats.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Draft executive briefs, slide scripts, and “what to do next.”
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Standardize tone across memos and decks.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Close the loop with versioned prompts and quick updates.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Now: imagine a **helper** that writes the first draft, explains **trade-offs**,
    calls out missing context, and keeps voice **consistent** across authors.'
  prefs: []
  type: TYPE_NORMAL
- en: That’s what LLMs can be, if you prompt them well!
  prefs: []
  type: TYPE_NORMAL
- en: 3) Prompts & Patterns for Interpretation, Reporting, and Stakeholder Engagement
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 3.1 SHAP & Feature-Importance Narratives
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: '**Best practice:** Feed the model a structured table and ask for an executive-ready
    summary plus actions.'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: '**Why it works:** The structure forces ranking → narrative → action. Stakeholders
    get the “so what?” not just bars on a chart.'
  prefs: []
  type: TYPE_NORMAL
- en: 3.2 Confusion-Matrix Clarifications
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Imagine your project is all about **fraud detection** for a financial platform.
  prefs: []
  type: TYPE_NORMAL
- en: You’ve trained a good model, your precision and recall scores look great, and
    you feel proud of how it’s performing. But now comes the part where you need to
    explain those results to your **team**, or worse, to a room full of **stakeholders**
    who don’t really understand about model metrics.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s a handy table that explains the confusion-matrix terms into simple English
    explanations:'
  prefs: []
  type: TYPE_NORMAL
- en: '| Metric | Plain-English Translation | Prompt Snippet |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| False Positive | “Alerted but not actually fraud” | *Explain FP as wasted
    review cost.* |'
  prefs: []
  type: TYPE_TB
- en: '| False Negative | “Missed the real fraud” | *Frame FN as revenue loss/risk
    exposure.* |'
  prefs: []
  type: TYPE_TB
- en: '| Precision | “How many alerts were right” | *Relate to QA false alarms.* |'
  prefs: []
  type: TYPE_TB
- en: '| Recall | “How many real cases we caught” | *Use a ‘fishing-net holes’ analogy.*
    |'
  prefs: []
  type: TYPE_TB
- en: '**Prompt to Explain Model Results Simply**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 3.3 ROC & AUC—Make the Trade-off Concrete
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: ROC curves and AUC scores are one of the favorite metrics of DSs, great for
    evaluating model performance, but they are generally too abstract for business
    conversations.
  prefs: []
  type: TYPE_NORMAL
- en: 'To make things real, tie model **sensitivity** and **specificity** to actual
    business limits: like time, money, or human workload.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Prompt:**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: This kind of framing turns abstract metrics into concrete, operational decisions.
  prefs: []
  type: TYPE_NORMAL
- en: 3.4 Regression Metrics Cheat-Sheet
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: When you’re working with regression models, the metrics can feel like a set
    of random letters (MAE, RMSE, R²). Great for model tuning, but not so great for
    storytelling.
  prefs: []
  type: TYPE_NORMAL
- en: 'That’s why it helps to reframe these numbers using simple business analogies:'
  prefs: []
  type: TYPE_NORMAL
- en: '| Metric | Business Analogy | One-liner Template |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| MAE | “Average dollars off per quote” | *“Our MAE of $2 means the typical
    quote error is $2.”* |'
  prefs: []
  type: TYPE_TB
- en: '| RMSE | “Penalty grows for big misses” | *“RMSE 3.4 → rare but costly misses
    matter.”* |'
  prefs: []
  type: TYPE_TB
- en: '| R² | “Share of variance we explain” | *“We capture 84% of price drivers.”*
    |'
  prefs: []
  type: TYPE_TB
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 💥Don´t forget to check [**Part 2** of this series](https://towardsdatascience.com/advanced-prompt-engineering-for-data-science-projects/),
    where you will learn how to improve your **modeling** and **feature engineering**.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 4) Summarizing EDA—With Caveats Up Front
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'EDA is where the real detective work begins. But let’s face it: those auto-generated
    profiling reports (like `pandas-profiling` or summary JSONs) can be overwhelming.'
  prefs: []
  type: TYPE_NORMAL
- en: The next prompt is useful to change EDA outputs into short and human-friendly
    summaries.
  prefs: []
  type: TYPE_NORMAL
- en: '**Guided EDA narrator (pandas-profile or summary JSON in, brief out):**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: 5) Executive Summaries, Visual Outlines & Slide Narratives
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'After the data modeling and generation of insights, there’s one final challenge:
    telling your data **story** in a way decision-makers actually **care about**.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Framework snapshots**'
  prefs: []
  type: TYPE_NORMAL
- en: '**Executive Summary Guide prompt:** Intro, Key Points, Recommendations (≤500
    words).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Storytell-style summary:** Main points, key stats, trend lines (≈200 words).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Weekly “Power Prompt”:** Two short paragraphs + “Next Steps” bullets.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Composite prompt**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: 6) Tone, Clarity, and Formatting
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: You’ve got the insights and conclusions. It’s time to make them clear, confident,
    and easy to understand.
  prefs: []
  type: TYPE_NORMAL
- en: Experienced data scientists know what how you say something is sometimes even
    more important than what you’re saying!
  prefs: []
  type: TYPE_NORMAL
- en: '| Tool/Prompt | What it’s for | Typical Use |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| “Tone Rewriter” | Formal ↔ casual, or “board-ready” | Customer updates, exec
    memos |'
  prefs: []
  type: TYPE_TB
- en: '| Hemingway-style edit | Shorten, punch up verbs | Slide copy, emails |'
  prefs: []
  type: TYPE_TB
- en: '| “Tone & Clarity Review” | Assertive voice, fewer hedges | Board materials,
    PRR summaries |'
  prefs: []
  type: TYPE_TB
- en: '**Universal rewrite prompt**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: 7) End-to-End LLM Communication Pipeline
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: '**Model outputs →** SHAP/metrics → explanation prompts.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**EDA findings →** summarization prompts or LangChain chain.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Self-check →** ask the model to flag unclear features or missing KPIs.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Tone & format pass →** dedicated rewrite prompt.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Version control →** store `.prompty` files alongside notebooks for reproducibility.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 8) Case Studies
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: '| Org / Project | LLM Use | Outcome |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| Fintech credit scoring | SHAP-to-narrative (“SHAPstories”) inside dashboards
    | +20% stakeholder understanding; 10× faster docs |'
  prefs: []
  type: TYPE_TB
- en: '| Healthcare startup | ROC interpreter in a Shiny app | Clinicians aligned
    on a 92% sensitivity cut-off in minutes |'
  prefs: []
  type: TYPE_TB
- en: '| Retail analytics | Embedded table summaries | 3-hour write-ups reduced to
    ~12 minutes |'
  prefs: []
  type: TYPE_TB
- en: '| Large wealth desk | Research Q&A assistant | 200k monthly queries; ≈90% satisfaction
    |'
  prefs: []
  type: TYPE_TB
- en: '| Global CMI team | Sentiment roll-ups via LLM | Faster cross-market reporting
    for 30 regions |'
  prefs: []
  type: TYPE_TB
- en: 9) Best-Practice Checklist
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Define audience, length, and tone in the **first two lines** of every prompt.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Feed **structured inputs** (JSON/tables) to reduce hallucinations.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Embed **self-evaluation** (“rate clarity 0–1”; “flag missing KPI”).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Keep **temperature ≤0.3** for deterministic summaries; raise it for creative
    storyboards.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Never paraphrase numbers** without units; keep the original metrics visible.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Version-control prompts + outputs; tie them to **model versions** for audit
    trails.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 10) Common Pitfalls & Guardrails
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: '| Pitfall | Symptom | Mitigation |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| Invented drivers | Narrative claims features not in SHAP | Pass a strict
    **feature whitelist** |'
  prefs: []
  type: TYPE_TB
- en: '| Overly technical | Stakeholders tune out | Add “grade-8 reading level” +
    business analogy |'
  prefs: []
  type: TYPE_TB
- en: '| Tone mismatch | Slides/memos don’t sound alike | Run a batch tone-rewrite
    pass |'
  prefs: []
  type: TYPE_TB
- en: '| Hidden caveats | Execs miss small-N or sampling bias | Force a **Limitations**
    bullet in every prompt |'
  prefs: []
  type: TYPE_TB
- en: This “pitfalls first” habit mirrors how I close my DS-lifecycle pieces, because
    misuse almost always happens early, at the time of prompting.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '**Steal-this-workflow takeaway:** Treat every metric as a story waiting to
    be told, then use prompts to standardize how you tell it. Keep the actions close,
    the caveats closer, and your voice unmistakably yours.'
  prefs: []
  type: TYPE_NORMAL
- en: Thank you for reading!
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
