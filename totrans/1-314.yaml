- en: The End-to-End Data Scientist’s Prompt Playbook
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 端到端数据科学家的提示手册
- en: 原文：[https://towardsdatascience.com/the-end-to-end-data-scientists-prompt-playbook/](https://towardsdatascience.com/the-end-to-end-data-scientists-prompt-playbook/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/the-end-to-end-data-scientists-prompt-playbook/](https://towardsdatascience.com/the-end-to-end-data-scientists-prompt-playbook/)
- en: <mdspan datatext="el1757129029805" class="mdspan-comment">Ever feel proud</mdspan>
    of your **code**, your **modeling**, and the **accuracy** you’ve achieved, knowing
    it could really make a **difference** for your team but then you **struggle**
    to **share** those findings with your team and stakeholders?
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1757129029805" class="mdspan-comment">你是否曾为自己的**代码**、**建模**和取得的**准确性**感到自豪，知道这真的可以为你的团队带来**差异**，但你却**挣扎**着与团队和利益相关者分享这些发现？
- en: That’s a very common feeling among data scientists and ML engineers.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一种数据科学家和机器学习工程师中非常常见的感受。
- en: In this article, I’m sharing my go-to prompts, workflows, and tiny tricks that
    turn dense, sometimes abstract, model **outputs** into sharp and clear **business
    narratives** people actually care about.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我将分享我的常用提示、工作流程和微小的技巧，这些技巧可以将密集、有时抽象的模型**输出**转化为清晰和明确的、人们真正关心的**商业叙事**。
- en: If you work with **stakeholders** or **managers** who don’t live in notebooks
    all day, this is for you. And just like my other guides, I’ll keep it practical
    and copy-pasteable.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你与**利益相关者**或**经理**合作，他们并非整天都生活在笔记本中，那么这篇文章就是为你准备的。就像我的其他指南一样，我会让它既实用又可复制粘贴。
- en: This article is the third and last part of **3-article series** regarding prompt
    engineering for data scientists.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 本文是关于数据科学家提示工程的3篇文章系列的第三部分和最后一部分。
- en: 'The **End-to-End** Data Science Prompt Engineering Series is:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: '**端到端**数据科学提示工程系列包括：'
- en: '**Part 1: **[Prompt Engineering for Planning, Cleaning, and EDA](https://towardsdatascience.com/become-a-better-data-scientist-with-these-prompt-engineering-hacks/)'
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第1部分：**[规划、清理和EDA的提示工程](https://towardsdatascience.com/become-a-better-data-scientist-with-these-prompt-engineering-hacks/)'
- en: '[**Part 2:** Prompt Engineering for Features, Modeling, and Evaluation](https://towardsdatascience.com/advanced-prompt-engineering-for-data-science-projects/)'
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[**第2部分：**特征、建模和评估的提示工程](https://towardsdatascience.com/advanced-prompt-engineering-for-data-science-projects/)'
- en: '**Part 3: Prompts for Docs, DevOps, and Stakeholder Communication** (this article)'
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**第3部分：文档、DevOps和利益相关者沟通的提示**（本文）'
- en: 👉 All the **prompts **in this article are available at the** end** of this article
    as a cheat sheet 😉
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 👉 本文中的所有**提示**都可在文章末尾作为速查表获取 😉
- en: 'In this article:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中：
- en: Why LLMs Are a Game-Changer for Data Storytelling
  id: totrans-13
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为什么LLM对数据故事讲述是一个颠覆性的变革
- en: The Communication Lifecycle, Reimagined with LLMs
  id: totrans-14
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用LLM重新构想的沟通生命周期
- en: Prompts for Docs, DevOps, and Stakeholder Communication
  id: totrans-15
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 文档、DevOps和利益相关者沟通的提示
- en: Prompt Engineering cheat sheet
  id: totrans-16
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提示工程速查表
- en: '* * *'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 1) Why LLMs Are a Game-Changer for Data Storytelling
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1) 为什么LLM对数据故事讲述是一个颠覆性的变革
- en: 'LLMs mix fluent **writing** with **contextual** reasoning. In practice, that
    means they can:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: LLM将流畅的**写作**与**情境推理**相结合。在实践中，这意味着它们可以：
- en: rephrase tricky **metric**s in plain English (or any other language),
  id: totrans-20
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 用简单的英语（或任何其他语言）重新表述棘手的**指标**，
- en: draft executive-level **summaries** in seconds, and
  id: totrans-21
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 几秒钟内起草高层**摘要**，
- en: adapt **tone** and **format** for any audience—board, product, legal, you name
    it.
  id: totrans-22
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为任何受众——董事会、产品、法律等——调整**语气**和**格式**。
- en: Early research is showing that GPT-style models can actually boost **understanding**
    for **non-technical** readers by double digits. That’s a pretty big jump compared
    to just staring at raw charts or graphs.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 早期研究表明，GPT风格的模型实际上可以通过两位数的提升来增强**非技术**读者的**理解**。与仅仅盯着原始图表或图形相比，这是一个相当大的飞跃。
- en: And because LLMs “**speak stakeholder**,” they help you defend decisions without
    drowning folks in jargon.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 由于LLM“**会说利益相关者的语言**”，它帮助你在不使人们淹没在术语中时捍卫决策。
- en: 'If prompt engineering felt like hype before, here it becomes a real edge: **clear
    stories**, fewer meetings, faster buy-in.'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 如果提示工程之前感觉像是炒作，那么现在它成为了一个真正的优势：**清晰的故事**、更少的会议、更快的认可。
- en: 2) The Communication Lifecycle, Reimagined with LLMs
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2) 使用LLM重新构想沟通生命周期
- en: 'After training an evaluating a model, you will probably:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 在训练和评估模型之后，你可能：
- en: Interpret model results (SHAP, coefficients, confusion matrices).
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 解释模型结果（SHAP、系数、混淆矩阵）。
- en: Summarize EDA and call out caveats.
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 总结EDA并指出注意事项。
- en: Draft executive briefs, slide scripts, and “what to do next.”
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 起草高层简报、幻灯片脚本和“下一步要做什么”。
- en: Standardize tone across memos and decks.
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在备忘录和演示文稿中统一语气。
- en: Close the loop with versioned prompts and quick updates.
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用版本化的提示和快速更新来闭环。
- en: 'Now: imagine a **helper** that writes the first draft, explains **trade-offs**,
    calls out missing context, and keeps voice **consistent** across authors.'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 现在：想象一个**助手**，它能撰写初稿，解释**权衡**，指出缺失的上下文，并保持作者声音的**一致性**。
- en: That’s what LLMs can be, if you prompt them well!
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是大型语言模型（LLM）能够做到的，如果你正确地提示它们的话！
- en: 3) Prompts & Patterns for Interpretation, Reporting, and Stakeholder Engagement
  id: totrans-35
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3) 解释、报告和利益相关者参与的提示与模式
- en: 3.1 SHAP & Feature-Importance Narratives
  id: totrans-36
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 3.1 SHAP & 特征重要性叙述
- en: '**Best practice:** Feed the model a structured table and ask for an executive-ready
    summary plus actions.'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: '**最佳实践**：向模型提供结构化表格，并请求一份可供执行摘要以及行动方案。'
- en: '[PRE0]'
  id: totrans-38
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '**Why it works:** The structure forces ranking → narrative → action. Stakeholders
    get the “so what?” not just bars on a chart.'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: '**为什么它有效**：结构迫使进行排名→叙述→行动。利益相关者得到的是“那又如何？”而不是图表上的条形图。'
- en: 3.2 Confusion-Matrix Clarifications
  id: totrans-40
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 3.2 混淆矩阵澄清
- en: Imagine your project is all about **fraud detection** for a financial platform.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下你的项目是针对一个金融平台的**欺诈检测**。
- en: You’ve trained a good model, your precision and recall scores look great, and
    you feel proud of how it’s performing. But now comes the part where you need to
    explain those results to your **team**, or worse, to a room full of **stakeholders**
    who don’t really understand about model metrics.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 你已经训练了一个好的模型，你的精确度和召回率得分看起来很棒，你对它的表现感到自豪。但现在是你需要向你的**团队**解释这些结果的时候了，或者更糟糕的是，向一个对模型指标不太了解的**利益相关者**满屋子的听众解释。
- en: 'Here’s a handy table that explains the confusion-matrix terms into simple English
    explanations:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个方便的表格，将混淆矩阵术语解释成简单的英文说明：
- en: '| Metric | Plain-English Translation | Prompt Snippet |'
  id: totrans-44
  prefs: []
  type: TYPE_TB
  zh: '| 指标 | 平实的翻译 | 提示片段 |'
- en: '| --- | --- | --- |'
  id: totrans-45
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| False Positive | “Alerted but not actually fraud” | *Explain FP as wasted
    review cost.* |'
  id: totrans-46
  prefs: []
  type: TYPE_TB
  zh: '| 假阳性 | “警报了但实际上不是欺诈” | *解释 FP 为浪费的审查成本。* |'
- en: '| False Negative | “Missed the real fraud” | *Frame FN as revenue loss/risk
    exposure.* |'
  id: totrans-47
  prefs: []
  type: TYPE_TB
  zh: '| 假阴性 | “错过了真实欺诈” | *将 FN 视为收入损失/风险暴露。* |'
- en: '| Precision | “How many alerts were right” | *Relate to QA false alarms.* |'
  id: totrans-48
  prefs: []
  type: TYPE_TB
  zh: '| 精确度 | “有多少警报是正确的” | *与 QA 假警报相关。* |'
- en: '| Recall | “How many real cases we caught” | *Use a ‘fishing-net holes’ analogy.*
    |'
  id: totrans-49
  prefs: []
  type: TYPE_TB
  zh: '| Recall | “我们抓住了多少真实案例” | *使用“渔网孔洞”的类比。* |'
- en: '**Prompt to Explain Model Results Simply**'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示以简单解释模型结果**'
- en: '[PRE1]'
  id: totrans-51
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 3.3 ROC & AUC—Make the Trade-off Concrete
  id: totrans-52
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 3.3 ROC & AUC—使权衡具体化
- en: ROC curves and AUC scores are one of the favorite metrics of DSs, great for
    evaluating model performance, but they are generally too abstract for business
    conversations.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: ROC 曲线和 AUC 分数是数据科学家最喜欢的一些指标之一，非常适合评估模型性能，但它们通常对于商业对话来说过于抽象。
- en: 'To make things real, tie model **sensitivity** and **specificity** to actual
    business limits: like time, money, or human workload.'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 为了让事情变得真实，将模型的**灵敏度**和**特异性**与实际业务限制（如时间、金钱或人力工作量）联系起来。
- en: '**Prompt:**'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '**提示**：'
- en: '[PRE2]'
  id: totrans-56
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: This kind of framing turns abstract metrics into concrete, operational decisions.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 这种框架将抽象的指标转化为具体的、可操作的决策。
- en: 3.4 Regression Metrics Cheat-Sheet
  id: totrans-58
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 3.4 回归指标速查表
- en: When you’re working with regression models, the metrics can feel like a set
    of random letters (MAE, RMSE, R²). Great for model tuning, but not so great for
    storytelling.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 当你与回归模型一起工作时，这些指标可能会感觉像是一组随机的字母（MAE、RMSE、R²）。这对于模型调整很好，但对于讲故事来说就不那么好了。
- en: 'That’s why it helps to reframe these numbers using simple business analogies:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是为什么使用简单的商业类比重新解释这些数字很有帮助：
- en: '| Metric | Business Analogy | One-liner Template |'
  id: totrans-61
  prefs: []
  type: TYPE_TB
  zh: '| 指标 | 商业类比 | 一句话模板 |'
- en: '| --- | --- | --- |'
  id: totrans-62
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| MAE | “Average dollars off per quote” | *“Our MAE of $2 means the typical
    quote error is $2.”* |'
  id: totrans-63
  prefs: []
  type: TYPE_TB
  zh: '| MAE | “每份报价的平均美元误差” | *“我们的 MAE 为 2 美元意味着典型的报价误差是 2 美元。”* |'
- en: '| RMSE | “Penalty grows for big misses” | *“RMSE 3.4 → rare but costly misses
    matter.”* |'
  id: totrans-64
  prefs: []
  type: TYPE_TB
  zh: '| RMSE | “大失误的惩罚增加” | *“RMSE 3.4 → 稀有但代价高昂的失误很重要。”* |'
- en: '| R² | “Share of variance we explain” | *“We capture 84% of price drivers.”*
    |'
  id: totrans-65
  prefs: []
  type: TYPE_TB
  zh: '| R² | “我们解释的方差份额” | *“我们捕捉了 84% 的价格驱动因素。”* |'
- en: '* * *'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 💥Don´t forget to check [**Part 2** of this series](https://towardsdatascience.com/advanced-prompt-engineering-for-data-science-projects/),
    where you will learn how to improve your **modeling** and **feature engineering**.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 💥不要忘记检查本系列的[**第二部分**](https://towardsdatascience.com/advanced-prompt-engineering-for-data-science-projects/)，在那里你将学习如何改进你的**建模**和**特征工程**。
- en: '* * *'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 4) Summarizing EDA—With Caveats Up Front
  id: totrans-69
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 4) 总结 EDA—提前提出警告
- en: 'EDA is where the real detective work begins. But let’s face it: those auto-generated
    profiling reports (like `pandas-profiling` or summary JSONs) can be overwhelming.'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: EDA 是真正的侦探工作开始的地方。但让我们面对现实：那些自动生成的配置文件报告（如 `pandas-profiling` 或摘要 JSON）可能会令人不知所措。
- en: The next prompt is useful to change EDA outputs into short and human-friendly
    summaries.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 下一个提示有助于将 EDA 输出转换为简短且易于理解的人类友好型摘要。
- en: '**Guided EDA narrator (pandas-profile or summary JSON in, brief out):**'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: '**引导式 EDA 叙事者（pandas-profile 或摘要 JSON 输入，简要输出）：**'
- en: '[PRE3]'
  id: totrans-73
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 5) Executive Summaries, Visual Outlines & Slide Narratives
  id: totrans-74
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5) 执行摘要、视觉大纲和幻灯片叙述
- en: 'After the data modeling and generation of insights, there’s one final challenge:
    telling your data **story** in a way decision-makers actually **care about**.'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 在数据建模和洞察力生成之后，还有一个最后的挑战：以决策者真正**关心**的方式讲述你的数据**故事**。
- en: '**Framework snapshots**'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: '**框架快照**'
- en: '**Executive Summary Guide prompt:** Intro, Key Points, Recommendations (≤500
    words).'
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**执行摘要指南提示：** 简介，要点，建议（≤500 字）。'
- en: '**Storytell-style summary:** Main points, key stats, trend lines (≈200 words).'
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**故事风格摘要：** 主要观点，关键统计数据，趋势线（≈200 字）。'
- en: '**Weekly “Power Prompt”:** Two short paragraphs + “Next Steps” bullets.'
  id: totrans-79
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**每周“强力提示”：** 两段简短段落 + “下一步”项目符号。'
- en: '**Composite prompt**'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: '**复合提示**'
- en: '[PRE4]'
  id: totrans-81
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 6) Tone, Clarity, and Formatting
  id: totrans-82
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 6) 语气、清晰度和格式
- en: You’ve got the insights and conclusions. It’s time to make them clear, confident,
    and easy to understand.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 你已经有了洞察力和结论。现在是时候使它们清晰、自信且易于理解。
- en: Experienced data scientists know what how you say something is sometimes even
    more important than what you’re saying!
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 经验丰富的数据科学家知道，你如何表达某事有时甚至比你说什么更重要！
- en: '| Tool/Prompt | What it’s for | Typical Use |'
  id: totrans-85
  prefs: []
  type: TYPE_TB
  zh: '| 工具/提示 | 它的作用 | 典型用途 |'
- en: '| --- | --- | --- |'
  id: totrans-86
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| “Tone Rewriter” | Formal ↔ casual, or “board-ready” | Customer updates, exec
    memos |'
  id: totrans-87
  prefs: []
  type: TYPE_TB
  zh: '| “语气重写器” | 正式 ↔ 非正式，或“董事会准备” | 客户更新，执行备忘录 |'
- en: '| Hemingway-style edit | Shorten, punch up verbs | Slide copy, emails |'
  id: totrans-88
  prefs: []
  type: TYPE_TB
  zh: '| 海明威式编辑 | 缩短，增强动词 | 演示文稿副本，电子邮件 |'
- en: '| “Tone & Clarity Review” | Assertive voice, fewer hedges | Board materials,
    PRR summaries |'
  id: totrans-89
  prefs: []
  type: TYPE_TB
  zh: '| “语气与清晰度审查” | 断言性语气，较少的保留 | 董事会材料，PRR 摘要 |'
- en: '**Universal rewrite prompt**'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: '**通用重写提示**'
- en: '[PRE5]'
  id: totrans-91
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 7) End-to-End LLM Communication Pipeline
  id: totrans-92
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 7) 端到端 LLM 通信管道
- en: '**Model outputs →** SHAP/metrics → explanation prompts.'
  id: totrans-93
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**模型输出 →** SHAP/指标 → 解释提示。'
- en: '**EDA findings →** summarization prompts or LangChain chain.'
  id: totrans-94
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**EDA 发现 →** 摘要提示或 LangChain 链。'
- en: '**Self-check →** ask the model to flag unclear features or missing KPIs.'
  id: totrans-95
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**自我检查 →** 让模型标记不清晰的特性或缺失的 KPI。'
- en: '**Tone & format pass →** dedicated rewrite prompt.'
  id: totrans-96
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**语气与格式通过 →** 专用重写提示。'
- en: '**Version control →** store `.prompty` files alongside notebooks for reproducibility.'
  id: totrans-97
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**版本控制 →** 将 `.prompty` 文件与笔记本一起存储以实现可重复性。'
- en: 8) Case Studies
  id: totrans-98
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 8) 案例研究
- en: '| Org / Project | LLM Use | Outcome |'
  id: totrans-99
  prefs: []
  type: TYPE_TB
  zh: '| 组织 / 项目 | LLM 使用 | 结果 |'
- en: '| --- | --- | --- |'
  id: totrans-100
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| Fintech credit scoring | SHAP-to-narrative (“SHAPstories”) inside dashboards
    | +20% stakeholder understanding; 10× faster docs |'
  id: totrans-101
  prefs: []
  type: TYPE_TB
  zh: '| 金融科技信用评分 | SHAP 到叙事（“SHAPstories”）在仪表板内 | 增加了对利益相关者的理解 +20%；文档速度提高 10 倍 |'
- en: '| Healthcare startup | ROC interpreter in a Shiny app | Clinicians aligned
    on a 92% sensitivity cut-off in minutes |'
  id: totrans-102
  prefs: []
  type: TYPE_TB
  zh: '| 医疗保健初创公司 | Shiny 应用程序中的 ROC 解释器 | 临床医生在几分钟内就 92% 的敏感性截止点达成一致 |'
- en: '| Retail analytics | Embedded table summaries | 3-hour write-ups reduced to
    ~12 minutes |'
  id: totrans-103
  prefs: []
  type: TYPE_TB
  zh: '| 零售分析 | 嵌入式表格摘要 | 3 小时撰写缩短到 ~12 分钟 |'
- en: '| Large wealth desk | Research Q&A assistant | 200k monthly queries; ≈90% satisfaction
    |'
  id: totrans-104
  prefs: []
  type: TYPE_TB
  zh: '| 大型财富部门 | 研究问答助手 | 每月 200k 查询；≈90% 满意度 |'
- en: '| Global CMI team | Sentiment roll-ups via LLM | Faster cross-market reporting
    for 30 regions |'
  id: totrans-105
  prefs: []
  type: TYPE_TB
  zh: '| 全球 CMI 团队 | 通过 LLM 进行情感汇总 | 30 个地区的跨市场报告速度更快 |'
- en: 9) Best-Practice Checklist
  id: totrans-106
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 9) 最佳实践清单
- en: Define audience, length, and tone in the **first two lines** of every prompt.
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在每个提示的前两行中定义受众、长度和语气。
- en: Feed **structured inputs** (JSON/tables) to reduce hallucinations.
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提供结构化输入（JSON/表格）以减少幻觉。
- en: Embed **self-evaluation** (“rate clarity 0–1”; “flag missing KPI”).
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 嵌入 **自我评估**（“评分清晰度 0–1”；“标记缺失 KPI”）。
- en: Keep **temperature ≤0.3** for deterministic summaries; raise it for creative
    storyboards.
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 保持 **温度 ≤0.3** 以获得确定性的摘要；提高它以进行创意故事板。
- en: '**Never paraphrase numbers** without units; keep the original metrics visible.'
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**永远不要在没有单位的情况下改写数字**；保持原始指标可见。'
- en: Version-control prompts + outputs; tie them to **model versions** for audit
    trails.
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 版本控制提示 + 输出；将它们与 **模型版本** 相关联以进行审计跟踪。
- en: '* * *'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 10) Common Pitfalls & Guardrails
  id: totrans-114
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 10) 常见陷阱与防护措施
- en: '| Pitfall | Symptom | Mitigation |'
  id: totrans-115
  prefs: []
  type: TYPE_TB
  zh: '| 障碍 | 症状 | 缓解措施 |'
- en: '| --- | --- | --- |'
  id: totrans-116
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| Invented drivers | Narrative claims features not in SHAP | Pass a strict
    **feature whitelist** |'
  id: totrans-117
  prefs: []
  type: TYPE_TB
  zh: '| 发明驱动因素 | 叙事声称 SHAP 中没有的特征 | 通过严格的**特征白名单** |'
- en: '| Overly technical | Stakeholders tune out | Add “grade-8 reading level” +
    business analogy |'
  id: totrans-118
  prefs: []
  type: TYPE_TB
  zh: '| 过于技术化 | 利益相关者失去兴趣 | 添加“8级阅读水平”+商业类比 |'
- en: '| Tone mismatch | Slides/memos don’t sound alike | Run a batch tone-rewrite
    pass |'
  id: totrans-119
  prefs: []
  type: TYPE_TB
  zh: '| 语气不匹配 | 演示文稿/备忘录听起来不一样 | 运行批量语气重写流程 |'
- en: '| Hidden caveats | Execs miss small-N or sampling bias | Force a **Limitations**
    bullet in every prompt |'
  id: totrans-120
  prefs: []
  type: TYPE_TB
  zh: '| 隐藏的警告 | 高管忽略小样本或抽样偏差 | 在每个提示中强制添加**限制**项目 |'
- en: This “pitfalls first” habit mirrors how I close my DS-lifecycle pieces, because
    misuse almost always happens early, at the time of prompting.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 这种“先讲错误”的习惯反映了我是如何结束我的数据科学生命周期作品的，因为误用几乎总是发生在早期，即在提示的时候。
- en: '* * *'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: '**Steal-this-workflow takeaway:** Treat every metric as a story waiting to
    be told, then use prompts to standardize how you tell it. Keep the actions close,
    the caveats closer, and your voice unmistakably yours.'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: '**偷取此工作流程要点**：将每个指标视为一个等待讲述的故事，然后使用提示来标准化你的讲述方式。保持行动贴近，警告更近，让你的声音独一无二。'
