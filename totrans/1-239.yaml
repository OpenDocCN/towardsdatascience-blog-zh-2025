- en: 'Eulerian Melodies: Graph Algorithms for Music Composition'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 欧拉旋律：音乐作曲的图算法
- en: 原文：[https://towardsdatascience.com/eulerian-melodies-graph-algorithms-for-music-composition/](https://towardsdatascience.com/eulerian-melodies-graph-algorithms-for-music-composition/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/eulerian-melodies-graph-algorithms-for-music-composition/](https://towardsdatascience.com/eulerian-melodies-graph-algorithms-for-music-composition/)
- en: <mdspan datatext="el1758814015495" class="mdspan-comment">Musical</mdspan> composers
    are known to reuse motifs (i.e., characteristic note progressions or melodic fragments)
    across their works. For example, famous Hollywood composers such as John Williams
    (**Superman**, *Star Wars*, *Harry Potter*) and Hans Zimmer (*Inception*, *Interstellar*,
    *The Dark Knight*) deftly recycle motifs to create instantly recognizable, signature
    soundtracks.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1758814015495" class="mdspan-comment">音乐</mdspan>作曲家通常会在他们的作品中重复使用主题（即特征音符进行或旋律片段）。例如，著名的好莱坞作曲家如约翰·威廉姆斯（**超人**，*星球大战*，*哈利·波特*）和汉斯·季默（*盗梦空间*，*星际穿越*，*黑暗骑士*）巧妙地回收主题以创造立即可识别的标志性配乐。
- en: In this article, we show how to do something similar using data science. Specifically,
    we will compose music by drawing on the graph-theoretic concept of Eulerian paths
    to assemble stochastically generated musical motifs into acoustically pleasing
    melodies. After providing an overview of theoretical concepts and a canonical
    use case to ground our understanding of the fundamentals, we will walk through
    an end-to-end Python implementation of the algorithmic music composition procedure.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我们展示了如何使用数据科学来完成类似的事情。具体来说，我们将通过利用图论中的欧拉路径概念来组装随机生成的音乐主题，从而创作出悦耳的旋律。在提供理论概念概述和典型用例以巩固我们对基础知识的理解之后，我们将逐步介绍算法音乐作曲过程的端到端Python实现。
- en: '**Note:** All figures in the following sections have been created by the author
    of this article.'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意**：以下各节中的所有图表均由本文作者创建。'
- en: A Primer on Eulerian Paths
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 欧拉路径入门
- en: Suppose we have a graph consisting of nodes and edges. The degree of a node
    in an undirected graph refers to the number of edges connected to that node. The
    in-degree and out-degree of a node in a directed graph refer to the number of
    incoming and outgoing edges for that node, respectively. A *Eulerian path* is
    defined as a walk along the nodes and edges of a graph that starts at some node
    and ends at some node, and visits each edge exactly once; if we start and end
    at the same node, this is called a *Eulerian circuit*.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我们有一个由节点和边组成的图。在无向图中，一个节点的度数指的是连接到该节点的边的数量。在有向图中，一个节点的入度和出度分别指的是该节点的进入和出去的边的数量。一个**欧拉路径**是指沿着图的节点和边进行的一次遍历，它从一个节点开始，到达另一个节点，并且恰好访问每条边一次；如果我们从同一个节点开始和结束，这被称为**欧拉回路**。
- en: In an undirected graph, a Eulerian path exists if and only if zero or two nodes
    have an odd degree, and all nodes with nonzero degree are part of a single connected
    component in the graph. Meanwhile, in a directed graph, a Eulerian path exists
    if and only if at most one node (the starting node) has one more outgoing edge
    than incoming edge, at most one node (the ending node) has one more incoming edge
    than outgoing edge, all other nodes have equal incoming and outgoing edges, and
    all nodes with nonzero in-degree or out-degree are part of a single connected
    component. The constraints related to being part of a single connected component
    ensure that all edges in the graph are reachable.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 在无向图中，如果且仅当零个或两个节点具有奇数度数，并且所有非零度数的节点都是图中单个连通分量的一部分时，才存在欧拉路径。同时，在有向图中，如果且仅当最多一个节点（起始节点）的出度比入度多一条边，最多一个节点（结束节点）的入度比出度多一条边，所有其他节点的入度和出度相等，并且所有非零入度或出度的节点都是单个连通分量的一部分时，才存在欧拉路径。与单个连通分量相关的约束确保了图中所有边都是可达的。
- en: Figures 1 and 2 below show graphical representations of the [Seven Bridges of
    Königsberg](https://en.wikipedia.org/wiki/Seven_Bridges_of_K%C3%B6nigsberg) and
    the [House of Nikolaus](https://de.wikipedia.org/wiki/Haus_vom_Nikolaus), respectively.
    These are two famous puzzles that involve finding a Eulerian path.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 下面的图1和图2分别显示了[柯尼斯堡七桥](https://en.wikipedia.org/wiki/Seven_Bridges_of_K%C3%B6nigsberg)和[尼古拉斯之家](https://de.wikipedia.org/wiki/Haus_vom_Nikolaus)的图形表示。这两个都是涉及寻找欧拉路径的著名谜题。
- en: '![](../Images/4c163cce0b557798a6411ac3ec1524ea.png)'
  id: totrans-9
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/4c163cce0b557798a6411ac3ec1524ea.png)'
- en: 'Figure 1: The Königsberg Problem'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 图1：柯尼斯堡问题
- en: 'In Figure 1, two islands (Kneiphof and Lomse) are connected to each other and
    the two mainland parts (Altstadt and Vorstadt) of the city of Königsberg in Prussia
    by a total of seven bridges. The question is whether there is any way to visit
    all four parts of the city using each bridge exactly once; in other words, we
    want to know whether a Eulerian path exists for the undirected graph shown in
    Figure 1\. In 1736, the famous mathematician Leonhard Euler — after whom Eulerian
    paths and circuits get their name — showed that such a path cannot exist for this
    particular problem. We can see why using the definitions outlined previously:
    all four parts (nodes) of the city of Königsberg have an odd number of bridges
    (edges), i.e., it is not the case that zero or two nodes have an odd degree.'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 在图1中，两个岛屿（Kneiphof和Lomse）通过普鲁士柯尼斯堡城市的七个桥梁连接到彼此和两个大陆部分（Altstadt和Vorstadt）。问题是是否有可能通过每个桥梁恰好一次访问城市的所有四个部分；换句话说，我们想知道图1中所示的无向图是否存在欧拉路径。1736年，著名的数学家莱昂哈德·欧拉——欧拉路径和回路以此命名——表明对于这个问题，这样的路径是不可能存在的。我们可以使用之前概述的定义来理解这一点：柯尼斯堡城市的所有四个部分（节点）都有奇数个桥梁（边），即不是零个或两个节点具有奇数度数。
- en: '![](../Images/dc8ddad5c8c3c80bcd2efde76ce5dede.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/dc8ddad5c8c3c80bcd2efde76ce5dede.png)'
- en: 'Figure 2: The House of Nikolaus Puzzle'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 图2：尼古劳斯之家谜题
- en: 'In Figure 2, the objective is to draw the House of Nikolaus starting at any
    of the five corners (nodes marked 1-5) and tracing each of the lines (edges) exactly
    once. Here, we see that two nodes have a degree of four, two nodes have a degree
    of three, and one node has a degree of two, so a Eulerian path must exist. In
    fact, as the following animation shows, it is apparently possible to construct
    44 distinct Eulerian paths for this puzzle:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 在图2中，目标是从一个任意角落（标记为1-5的节点）开始绘制尼古劳斯之家，并精确地追踪每条线（边）。在这里，我们可以看到有两个节点具有四个度数，有两个节点具有三个度数，并且有一个节点具有两个度数，因此必须存在一条欧拉路径。实际上，正如以下动画所示，对于这个谜题，显然可以构建44条不同的欧拉路径：
- en: <https://upload.wikimedia.org/wikipedia/commons/f/f0/Haus_vom_Nikolaus_eulerian_hori.webm?_=1>
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: <https://upload.wikimedia.org/wikipedia/commons/f/f0/Haus_vom_Nikolaus_eulerian_hori.webm?_=1>
- en: '[https://upload.wikimedia.org/wikipedia/commons/f/f0/Haus_vom_Nikolaus_eulerian_hori.webm](https://upload.wikimedia.org/wikipedia/commons/f/f0/Haus_vom_Nikolaus_eulerian_hori.webm)'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://upload.wikimedia.org/wikipedia/commons/f/f0/Haus_vom_Nikolaus_eulerian_hori.webm](https://upload.wikimedia.org/wikipedia/commons/f/f0/Haus_vom_Nikolaus_eulerian_hori.webm)'
- en: 'Source: Wikipedia (CC0 1.0 Universal)'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 来源：维基百科（CC0 1.0通用）
- en: 'Eulerian paths can be derived programmatically using Hierholzer’s algorithm
    as explained in the video below:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 如下视频所述，可以使用Hierholzer算法通过编程方式推导出欧拉路径：
- en: Hierholzer’s algorithm uses a search technique called *backtracking*, which
    [this article](https://towardsdatascience.com/a-gentle-introduction-to-backtracking/)
    covers in more detail.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: Hierholzer算法使用了一种称为*回溯*的搜索技术，该技术在这篇文章[https://towardsdatascience.com/a-gentle-introduction-to-backtracking/](https://towardsdatascience.com/a-gentle-introduction-to-backtracking/)中有更详细的介绍。
- en: Eulerian Paths for Fragment Assembly
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 片段组装的欧拉路径
- en: Given a set of nodes that represent fragments of information, we can use the
    concept of Eulerian paths to piece the fragments together in a meaningful way.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 给定一组代表信息片段的节点，我们可以使用欧拉路径的概念以有意义的方式将这些片段拼接在一起。
- en: 'To see how this could work, let us start by considering a problem that does
    not require much domain know-how: given a list of positive two-digit integers,
    is it possible to arrange these integers in a sequence *x[1]*, *x[2]*, …, *x[n]*
    such that the tens digit of integer **x[i]** matches the units digit of integer
    **x[i+1]**? Suppose we have the following list: [22, 23, 25, 34, 42, 55, 56, 57,
    67, 75, 78, 85]. By inspection, we note that, for example, if *x[i]* = 22 (with
    units digit 2), then *x[i+1]* can be 23 or 25 (tens digit 2), whereas if *x[i]*
    = 78, then *x[i+1]* can only be 85\. Now, if we translate the list of integers
    into a directed graph, where each digit is a node, and each two-digit integer
    is modeled as a directed edge from its tens digit to its units digit, then finding
    a Eulerian path in this directed graph will give us one possible solution to our
    problem as required. A Python implementation of this approach is shown below:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 为了了解这如何工作，让我们先考虑一个不需要太多领域知识的问题：给定一个正两位整数的列表，是否可以排列这些整数，形成一个序列 *x[1]*, *x[2]*,
    …, *x[n]*，使得整数 **x[i]** 的十位数字与整数 **x[i+1]** 的个位数字相匹配？假设我们有以下列表：[22, 23, 25, 34,
    42, 55, 56, 57, 67, 75, 78, 85]。通过检查，我们发现，例如，如果 *x[i]* = 22（个位数为2），则 *x[i+1]*
    可以是23或25（十位数为2），而如果 *x[i]* = 78，则 *x[i+1]* 只能是85。现在，如果我们把整数列表转换成一个有向图，其中每个数字是一个节点，每个两位整数被建模为从其十位数到个位数的有向边，那么在这个有向图中找到欧拉路径将给出我们所需问题的一个可能解。下面是这种方法的Python实现：
- en: '[PRE0]'
  id: totrans-23
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'Result:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 结果：
- en: '[PRE1]'
  id: totrans-25
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'DNA fragment assembly is a canonical use case of the above procedure in the
    area of bioinformatics. Essentially, during DNA sequencing, scientists obtain
    several short DNA fragments that must be stitched together to derive viable candidates
    for the full DNA sequence, and this can potentially be done relatively efficiently
    using the concept of a Eulerian path (see [this](https://arep.med.harvard.edu/pdf/pevzner%20euler%20method%20for%20assembly.pdf)
    paper for more details). Each DNA fragment, known as a *k*-mer, consists of *k*
    letters drawn from the set { *A*, *C*, *G*, *T* } denoting the nucleotide bases
    that can make up a DNA molecule; e.g., *ACT* and *CTG* would be 3-mers. A so-called
    *de Bruijn graph* can now be constructed with nodes representing (*k*-1)-mer prefixes
    (e.g., *AC* for *ACT* and *CT* for *CTG*), and directed edges denoting an overlap
    between the source and destination nodes (e.g., there would be an edge going from
    *AC* to *CT* due to the overlapping letter *C*). Deriving a viable candidate for
    the full DNA sequence amounts to finding a Eulerian path in the de Bruijn graph.
    The video below shows a worked example:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: DNA片段组装是生物信息学领域中上述过程的一个典型用例。本质上，在DNA测序过程中，科学家们获得几个短的DNA片段，这些片段必须拼接起来以获得完整的DNA序列的可行候选者，这可以通过使用欧拉路径的概念相对高效地完成（有关更多详细信息，请参阅[这篇](https://arep.med.harvard.edu/pdf/pevzner%20euler%20method%20for%20assembly.pdf)论文）。每个DNA片段，称为*k*-mer，由从集合
    { *A*, *C*, *G*, *T* } 中选取的*k*个字母组成，表示可以组成DNA分子的核苷酸基础；例如，*ACT*和*CTG*是3-mer。现在可以构建一个所谓的*德布鲁因图*，其中节点代表(*k*-1)-mer前缀（例如，*AC*代表*ACT*，*CT*代表*CTG*），有向边表示源节点和目标节点之间的重叠（例如，由于重叠字母*C*，会有从*AC*到*CT*的边）。推导出完整的DNA序列的可行候选者相当于在德布鲁因图中找到欧拉路径。下面的视频展示了工作示例：
- en: An Algorithm for Generating Melodies
  id: totrans-27
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 生成旋律的算法
- en: If we have a set of fragments that represent musical motifs, we can use the
    approach outlined in the previous section to arrange the motifs in a sensible
    sequence by translating them to a de Bruijn graph and identifying a Eulerian path.
    In the following, we will walk through an end-to-end implementation of this in
    Python. The code has been tested on macOS Sequoia 15.6.1.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们有一组代表音乐动机的片段，我们可以使用上一节中概述的方法，通过将它们转换为德布鲁因图并识别欧拉路径，以合理的顺序排列这些动机。在下面的内容中，我们将通过Python的端到端实现来展示这一过程。代码已在macOS
    Sequoia 15.6.1上测试过。
- en: 'Part 1: Installation and Project Setup'
  id: totrans-29
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第一部分：安装和项目设置
- en: 'First, we need to install [FFmpeg](https://ffmpeg.org/download.html) and [FluidSynth](https://github.com/FluidSynth/fluidsynth/wiki/Download),
    two tools that are useful for processing audio data. Here is how to install both
    using Homebrew on a Mac:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们需要安装[FFmpeg](https://ffmpeg.org/download.html)和[FluidSynth](https://github.com/FluidSynth/fluidsynth/wiki/Download)，这两个工具对于处理音频数据非常有用。以下是在Mac上使用Homebrew安装这两个工具的方法：
- en: '[PRE2]'
  id: totrans-31
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: We will also be using `uv` for Python project management. Installation instructions
    can be found [here](https://docs.astral.sh/uv/getting-started/installation/).
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还将使用`uv`进行Python项目管理。安装说明可以在[这里](https://docs.astral.sh/uv/getting-started/installation/)找到。
- en: 'Now we will create a project folder called `eulerian-melody-generator`, a `main.py`
    file to hold the melody-generation logic, and a virtual environment based on Python
    3.12:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们将创建一个名为 `eulerian-melody-generator` 的项目文件夹，一个 `main.py` 文件来存放旋律生成逻辑，以及一个基于
    Python 3.12 的虚拟环境：
- en: '[PRE3]'
  id: totrans-34
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'Next, we need to create a `requirements.txt` file with the following dependencies,
    and place the file in the `eulerian-melody-generator` directory:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们需要创建一个包含以下依赖关系的 `requirements.txt` 文件，并将其放置在 `eulerian-melody-generator`
    目录中：
- en: '[PRE4]'
  id: totrans-36
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'The packages `midi2audio` and `midiutil` are needed for audio processing, while
    `matplotlib` and `networkx` will be used to visualize the de Bruijn graph. We
    can now install these packages in our virtual environment:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 需要的包有 `midi2audio` 和 `midiutil`，用于音频处理，而 `matplotlib` 和 `networkx` 将用于可视化 de
    Bruijn 图。现在我们可以在我们的虚拟环境中安装这些包：
- en: '[PRE5]'
  id: totrans-38
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Execute `uv pip list` to verify that the packages have been installed.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 执行 `uv pip list` 以验证已安装的包。
- en: Finally, we will need a SoundFont file to render the audio output in response
    to MIDI data. For the purposes of this article, we will use the file `TimGM6mb.sf2`,
    which can be found on [this](https://musescore.org/en/handbook/3/soundfonts-and-sfz-files#list)
    MuseScore site or downloaded directly from [here](https://sourceforge.net/p/mscore/code/HEAD/tree/trunk/mscore/share/sound/TimGM6mb.sf2?format=raw).
    We will place the file next to `main.py` in the `eulerian-melody-generator` directory.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们需要一个 SoundFont 文件来根据 MIDI 数据渲染音频输出。为了本文的目的，我们将使用文件 `TimGM6mb.sf2`，该文件可以在
    [这个](https://musescore.org/en/handbook/3/soundfonts-and-sfz-files#list) MuseScore
    网站上找到或直接从 [这里](https://sourceforge.net/p/mscore/code/HEAD/tree/trunk/mscore/share/sound/TimGM6mb.sf2?format=raw)下载。我们将文件放在
    `eulerian-melody-generator` 目录中与 `main.py` 文件相邻：
- en: 'Part 2: Melody Generation Logic'
  id: totrans-41
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第二部分：旋律生成逻辑
- en: 'Now, we will implement the melody generation logic in `main.py`. Let us start
    by adding the relevant import statements and defining some useful lookup variables:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们将在 `main.py` 中实现旋律生成逻辑。让我们先添加相关的导入语句并定义一些有用的查找变量：
- en: '[PRE6]'
  id: totrans-43
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'We will also define a couple of helper functions to create a dictionary of
    scales in all twelve keys:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还将定义一些辅助函数来创建所有十二个键的音阶字典：
- en: '[PRE7]'
  id: totrans-45
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'Next, we will implement functions to generate *k*-mers and their corresponding
    de Bruijn graph. Note that the *k*-mer generation is constrained to guarantee
    a Eulerian path in the de Bruijn graph. We also use a random seed during *k*-mer
    generation to ensure reproducibility:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将实现生成 *k*-mers 和它们对应的 de Bruijn 图的函数。请注意，*k*-mer 的生成是受约束的，以保证 de Bruijn
    图中的欧拉路径。我们还在 *k*-mer 生成过程中使用随机种子以确保可重复性：
- en: '[PRE8]'
  id: totrans-47
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'We will implement a function to visualize and save the de Bruijn graph for
    later use:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将实现一个函数来可视化和保存 de Bruijn 图以供以后使用：
- en: '[PRE9]'
  id: totrans-49
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: 'Next, we will implement functions to derive a Eulerian path in the de Bruijn
    graph, and flatten the path into a sequence of notes. In a departure from the
    DNA fragment assembly approach discussed earlier, we will not deduplicate the
    overlapping portions of the *k*-mers during the flattening process to allow for
    a more aesthetically pleasing melody:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将实现函数以在 de Bruijn 图中推导出欧拉路径，并将路径展平成一系列音符。与之前讨论的 DNA 片段组装方法不同，我们在展平过程中不会去重重叠的
    *k*-mers，以允许更美观的旋律：
- en: '[PRE10]'
  id: totrans-51
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: 'Now, we will write some functions to compose and export the melody as an MP3
    file. The key function is `compose_and_export`, which adds variation to the rendering
    of the notes that make up the Eulerian path (e.g., different note lengths and
    octaves) to ensure that the resulting melody does not sound too monotonous. We
    also suppress/redirect verbose output from FFmpeg and FluidSynth:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们将编写一些函数来创作并导出旋律为 MP3 文件。关键函数是 `compose_and_export`，它为 Eulerian 路径组成的音符添加变化（例如，不同的音符长度和八度），以确保生成的旋律不会听起来太单调。我们还将抑制/重定向
    FFmpeg 和 FluidSynth 的冗余输出：
- en: '[PRE11]'
  id: totrans-53
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: 'Finally, we will demonstrate how the melody generator can be used in the `if
    name == "main"` section of the `main.py`. Several parameters — the scale, tempo,
    *k*-mer length, number of *k*-mers, number of repetitions (or loops) of the Eulerian
    path, and the random seed — can be varied to produce different melodies:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们将演示如何在 `main.py` 的 `if name == "main"` 部分使用旋律生成器。我们可以通过改变以下参数来产生不同的旋律：音阶、节奏、*k*-mer
    长度、*k*-mer 的数量、欧拉路径的重复次数（或循环次数）以及随机种子：
- en: '[PRE12]'
  id: totrans-55
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: 'Executing `uv run main.py` produces the following output:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 执行 `uv run main.py` 产生以下输出：
- en: '[PRE13]'
  id: totrans-57
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: 'As a simpler alternative to following the steps above, the author of this article
    has created a Python library called `emg` to achieve the same result, assuming
    FFmpeg and FluidSynth have already been installed (see details [here](https://pypi.org/project/emg/)).
    Install the library with `pip install emg` or `uv add emg` and use it as shown
    below:'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 作为上述步骤的一个更简单的替代方案，本文作者创建了一个名为 `emg` 的 Python 库来实现相同的结果，前提是已经安装了 FFmpeg 和 FluidSynth（详细信息请见[此处](https://pypi.org/project/emg/))。使用
    `pip install emg` 或 `uv add emg` 安装库，并按以下示例使用：
- en: '[PRE14]'
  id: totrans-59
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: '(Optional) Part 3: Converting MP3 to MP4'
  id: totrans-60
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: （可选）第 3 部分：将 MP3 转换为 MP4
- en: 'We can use FFmpeg to convert the MP3 file to an MP4 file (taking the PNG export
    of the de Bruijn graph as cover art), which can be uploaded to platforms such
    as YouTube. The option `-loop 1` repeats the PNG image for the whole audio length,
    `-tune stillimage` optimizes the encoding for static images, `-shortest` makes
    sure that the video stops roughly when the audio ends, and `-pix_fmt yuv420p`
    ensures that the output pixel format is compatible with most players:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以使用 FFmpeg 将 MP3 文件转换为 MP4 文件（使用德布鲁因图的 PNG 导出作为封面艺术），然后上传到 YouTube 等平台。选项
    `-loop 1` 使 PNG 图像在整个音频长度内重复，`-tune stillimage` 优化了对静态图像的编码，`-shortest` 确保视频在大约音频结束时停止，`-pix_fmt
    yuv420p` 确保输出像素格式与大多数播放器兼容：
- en: '[PRE15]'
  id: totrans-62
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: 'Here is the end result uploaded to YouTube:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 这是上传到 YouTube 的最终结果：
- en: The Wrap
  id: totrans-64
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 总结
- en: In this article, we have seen how an abstract subject like graph theory can
    have a practical application in the seemingly unrelated area of algorithmic music
    composition. Interestingly, our use of stochastically generated musical fragments
    to construct the Eulerian path, and the random variations in note length and octave,
    echo the practice of *aleatoric* music composition (*alea* being the Latin word
    for “dice”), in which some aspects of the composition and its performance are
    left to chance.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我们看到了像图论这样的抽象主题如何在看似无关的算法音乐作曲领域得到实际应用。有趣的是，我们使用随机生成的音乐片段来构建欧拉路径，以及音符长度和八度的随机变化，与
    *aleatoric* 音乐作曲的实践相呼应（*alea* 是拉丁语中“骰子”的意思），在这种作曲和表演中，某些作曲和表演的方面被留给机遇。
- en: Beyond music, the concepts discussed in the above sections have practical data
    science applications in a number of other areas, such as bioinformatics (e.g.,
    DNA fragment assembly), archeology (e.g., reconstructing ancient artifacts from
    scattered fragments at excavation sites), and logistics (e.g., optimal scheduling
    of parcel delivery). As technology continues to evolve and the world becomes increasingly
    digitalized, Eulerian paths and related graph‑theoretic concepts will likely find
    many more innovative applications across diverse domains.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 除了音乐之外，上述章节中讨论的概念在许多其他领域具有实际的数据科学应用，例如生物信息学（例如，DNA 片段组装）、考古学（例如，从挖掘现场的散乱碎片中重建古代文物）和物流（例如，包裹递送的优化调度）。随着技术的不断发展和世界的日益数字化，欧拉路径和相关图论概念可能会在众多领域找到更多创新的应用。
