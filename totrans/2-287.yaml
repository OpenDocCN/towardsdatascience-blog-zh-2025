- en: 'Grammar as an Injectable: A Trojan Horse to NLP'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/grammar-as-a-trojan-horse-to-nlp-and-computer-science/](https://towardsdatascience.com/grammar-as-a-trojan-horse-to-nlp-and-computer-science/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I want to discuss a never-so-mentioned topic, that being how we can make sense
    of grammar in a **non-statistical** way. Many AI models, such as DeepMind’s GEM,
    and Google’s PARSEVAL don’t rely purely on statistical learning to make sense
    of grammar. Instead, these **hybrid models** reintroduce formal grammars, such
    as Combinatory Categorial Grammar **(CCG)**, into their architecture. This allows
    these models to make use of decades of Linguistic analysis in just a few lines
    of code. Theoretically, allowing them to reach the same level of competence in
    less time and at less cost. But how can we turn grammar into something a computer
    can work with?
  prefs: []
  type: TYPE_NORMAL
- en: To understand this, we will talk about how words turn into functions, the algebra
    behind their combination, and how a program returning a TypeError is, in many
    ways, equivalent to a sentence with bad grammar.
  prefs: []
  type: TYPE_NORMAL
- en: Listen, undefined might bring back some bad memories — words crossed out in
    red, ruler to the wrist, or a blank stare in the face of “***preposition***”.
  prefs: []
  type: TYPE_NORMAL
- en: 'To a grammarian, this is aided through a set of prescriptive rules. Commands
    like:'
  prefs: []
  type: TYPE_NORMAL
- en: Thou shalt not use “whom” as a subject.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Thou shalt have a **subject** and an **object** in a sentence.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Thou shalt not end sentences with ***prepositions*** (at, by, into,…).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'As a writer, I have always found the commandments a bit restrictive—part pain,
    part medicine. And while I can admit this grammar can clarify your writing, it
    does not help machines understand sentence structure. To do this, we will need
    to discuss Combinatory Categorial Grammar (CCG), if you’re acquainted. However,
    we cannot abandon *prescriptive grammar*. And in this article we will use the
    **2nd Commandment**: Every sentence must contain a clear **subject** and **predicate**.'
  prefs: []
  type: TYPE_NORMAL
- en: From NLP to Proof Nets
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In the early 2000s, statistical CCG parsers were leaders in providing wide coverage
    and high-accuracy syntactic parsing by capturing **long-distance dependencies**
    and complex coordination. While not the current hot topic in LLMs, it has helped
    shape question-answering, logical inference, and machine translation systems where
    structural transparency is desired.
  prefs: []
  type: TYPE_NORMAL
- en: 'While grammar can now be inferred from sheer data alone, no need for hand-coded
    rules, still, many state-of-the-art models re-inject syntactic signals because:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Implicit learning alone can miss corner-case phenomena.** A parsercan be
    made to handle triple-negatives in legalese or enjambment in poetry, but only
    if you explicitly encode those patterns.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Provide faster learning with less data.** Learning grammar from data alone
    requires billions of records and is computationally costly.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Interpretability and control.** When analyzing syntactic errors, it is easier
    to look at parse-based features than opaque attention weights.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Consistency in generation.** Purely emergent models can drift, flipping verb
    tenses mid-sentence, mismatching pronouns and antecedents. A syntax-aware parser
    or grammar module can enforce this explicitly.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Low-resource language constraints.** Swahili or Welsh may have less available
    data for conventional large-scale training. Hand-coded grammar rules make up for
    that.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/91c9543bdee025a1f017443939bc6113.png)'
  prefs: []
  type: TYPE_IMG
- en: Proof Nets
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Another reason CCG continues to matter is its deep connection to **proof nets**
    (Girard 1987). Proof nets are a graph-based way of representing proofs in linear
    logic that strip away bureaucratic details to reveal the core logical structure.
    Morrill (1994) and Moot & Retoré (2012) proved that every CCG parse can be translated
    into one of these canonical proof-net graphs, giving a direct, formal bridge between
    CCG’s syntactic derivations and linear-logic proofs. Long-distance dependencies
    emerge as explicit paths, derivational redundancies are eliminated, and semantic
    composition follows graph contractions. When we say **linear logic**, every formula
    must be used exactly once in a derivation.
  prefs: []
  type: TYPE_NORMAL
- en: 'Think of it this way: as you build a CCG parse (or its proof net), each syntactic
    combination (e.g. a **verb phrase** combining with its **subject**) tells you
    exactly which semantic operation to perform (function‐application, function‐composition,
    etc.). That sequence of syntax‐guided steps then composes the meanings of individual
    words into the meaning of the whole sentence in a formally precise manner.'
  prefs: []
  type: TYPE_NORMAL
- en: '*The C&C parser and EasyCCG (Lewis & Steedman, 2014) are prominent tools in
    the field of CCG parsing. While both are widely used, EasyCCG is generally recognized
    for its speed, often achieving faster parsing times, whereas the C&C parser is
    frequently noted for its accuracy, particularly on complex sentences.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Where are we exactly?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Formally **Type-1** on Chomsky Hierarchy, right below Turing Machines, right
    above Pushdown Automata. Type-1 is **Context-Sensitive**. The deeper the language
    is in the Chomsky Hierarchy, the higher the generative power, structural complexity,
    and computational resources **required to parse it.**
  prefs: []
  type: TYPE_NORMAL
- en: '**Parse:** to determine if a string can be built given the grammar rules.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Language ( 𝑳)** is a finite set of words composed by taking elements from
    an Alphabet (𝚺) set, which contains all the symbols for that language.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: With the broader definition, “words” don’t have to be words. For example, our
    “words” could be email addresses, and our alphabet can be numbers, letters, and
    symbols.
  prefs: []
  type: TYPE_NORMAL
- en: '*In English, If we want to talk about whole sentences, we can let our alphabet
    Σ be the set of all words (our vocabulary). Then a sentence is any finite string
    in Σ*, and a language L⊆Σ* is just the set of “well-formed” sentences we care
    about.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![Photo of the Chomsky Hierarchy by Marco Hening Tallarico](../Images/bdfd9bd680fb25883dba4da6e43ae76f.png)'
  prefs: []
  type: TYPE_IMG
- en: Chomsky’s Hierarchy. Image made with the help of Chat GPT
  prefs: []
  type: TYPE_NORMAL
- en: 'Given this abstract definition for language, we can talk about esoteric constructions
    such as languages where all words are things like (ab, aab, aaabbbb, abb, etc.)
    Formally described as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Math Language Equation of all As AAA and Bs BBB by Marco Hening Tallarico](../Images/b4c2ec989404706b848bd69b8d350514.png)'
  prefs: []
  type: TYPE_IMG
- en: Here exponentiation looks more like appending things to the end of a string
    so 3² = 33 ≠ 9
  prefs: []
  type: TYPE_NORMAL
- en: 'This language is **Type-3** on the hierarchy, a **Regular Expression **. While
    it might be hard to find practical uses for the above language, the most ubiquitous
    examples of **Regular Expressions** coming to use in the real world is email-address
    validation on web forms: behind the scenes, the form uses a regex like…'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: this@[[email protected]](/cdn-cgi/l/email-protection)@😡grammar.in_the_email_language.ca
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Here the sole purpose of our grammar is to make sure you input a valid email
    address. In CCG our grammar has a more liguistic purpose, it checks if words combine
    gramatically.
  prefs: []
  type: TYPE_NORMAL
- en: Chomsky’s Hierarchy in NLP
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As you move from Type-3 to Type-0, you decrease the constraints on what you
    can produce. This increases the **expressive power** at the cost of additional
    computation.
  prefs: []
  type: TYPE_NORMAL
- en: '**Type-0 (Recursively enumerable grammars):** Full semantic parsing or generation
    in a Turing-complete formalism (e.g. Prolog DCGs with arbitrary extra arguments,
    or neural seq2seq models that in principle can simulate any Turing machine).'
  prefs: []
  type: TYPE_NORMAL
- en: '**Type-1 (Context-sensitive grammars):** Swiss-German uses [cross-serial dependency](https://en.wikipedia.org/wiki/Cross-serial_dependencies),
    where you need more information about the surrounding words before rewriting.
    This would require more computational steps to parse.'
  prefs: []
  type: TYPE_NORMAL
- en: '![Photo of Swiss German cross serial dependency ](../Images/e3c15a1c9d3389b84e2525bc60ae0e95.png)'
  prefs: []
  type: TYPE_IMG
- en: '*When we cover the Algrbra of CCG later come back and see how using only one
    forward and *backward** *application might encounter an issue with Swiss-German*
    (Hint: you have to combine adjacent categories)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Type-2 (Context-free grammars):** A CCG becomes a pure Type-II (context-free)
    grammar exactly when you **only** allow the two application rules and **no** higher-order
    combinators (type‐raising or composition).'
  prefs: []
  type: TYPE_NORMAL
- en: '**Type-3 (Regular grammars):** Tokenization, simple pattern–based tagging (e.g.
    recognizing dates, email addresses, or part-of-speech tags using regular expressions
    or finite‐state transducers)'
  prefs: []
  type: TYPE_NORMAL
- en: The Algebra of CCG
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Let’s say we have **categories** A and B, then **forward application** and
    **backward application** work as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: A/B says that if we have a B to the **right** of A/B, then the resulting product
    is A
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A\B says that if we have a B to the **left** of A\B, then the resulting product
    is A.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![Photo of the algebra of categorical combinatorial grammar by Marco Hening
    Tallarico](../Images/4dd15e6c5d069106f4d5fa38e1e500b2.png)'
  prefs: []
  type: TYPE_IMG
- en: '*in practice A and B become parts of sheach *'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The algebra of CCG looks a lot like the multiplication of fractions; notice
    how “numerators” cancel with “denominators”. However, unlike multiplication, the
    order matters. This algebra is **not** **commutative**. Don’t remember this as
    a rule, but a direct consequence of word order. This lack of commutativity is
    necessary to differentiate between “We go there.” As a sentence, and “Go we there.”
    as nonsense.
  prefs: []
  type: TYPE_NORMAL
- en: 'Combining two atomic categories using \ or /, (e.g: NP/N) creates a **complex
    category** that classifies a word and describes how it can be combined.'
  prefs: []
  type: TYPE_NORMAL
- en: In the following illustration, “The” combines with “Dog”**(Noun (N))** to make
    the **Noun Phrase (NP)** “The dog”. Similarly, the Noun Phrase“The dog” can combine
    with “ran”**(verb(S\NP))** to make the **sentence (S)** “The dog ran”.
  prefs: []
  type: TYPE_NORMAL
- en: '![Forward and Backward slash operation in CCG by Marco Hening Tallarico](../Images/ac0d11c725adb28315b19a37121974fd.png)![](../Images/0ac13a0947fde274467c988214911c3d.png)'
  prefs: []
  type: TYPE_IMG
- en: Constructing Full Sentences
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Take something like the word “a”—clearly not a Noun, Noun Phrase, or Sentence,
    but we could describe it in these terms by saying “a” is a word that expects a
    noun on the right to become a noun phrase:'
  prefs: []
  type: TYPE_NORMAL
- en: “a” = NP/N
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: This is how “a ball” (NP/N N → NP) becomes a noun phrase.
  prefs: []
  type: TYPE_NORMAL
- en: Do you see how we can cleverly describe **articles** (a, an, the) in terms of
    NP and N to create a category that describes how they function, how they interact
    with the words around them? *Why call “the” an article when we can call it a function
    that expects a noun to become a noun phrase?*
  prefs: []
  type: TYPE_NORMAL
- en: We can do the same thing with verbs. To form a sentence **S**, we need a subject
    and a predicate.
  prefs: []
  type: TYPE_NORMAL
- en: The Subject **(RED)** does the action.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The action is the verb.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The Predicate **(BLUE)** receives the action.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![Complete sentences by Marco Hening Tallarico](../Images/19a689a207a607a8c11c66b95a80f775.png)'
  prefs: []
  type: TYPE_IMG
- en: By splitting the sentence this way, we can see that the verb acts as a fulcrum
    between two necessary parts of sentence construction, so you shouldn’t be surprised
    to see that the verb and adverb take a very special role in CCG, as they are categories
    that contain the atomic category S.
  prefs: []
  type: TYPE_NORMAL
- en: We can describe a Verb as something that takes a Noun Phrase to the left, and
    a Noun Phrase to the right to become a sentence. (S\NP)/NP. No additional atomic
    categories needed.
  prefs: []
  type: TYPE_NORMAL
- en: “After debugging for hours” is a subordinate (dependent) adverbial clause. Parsable
    by *C&C or EasyCCG*
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: How This Relates to Programming
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The thing I find most elegant about CCG is how it turns the verb “write” into
    a **function (S\NP)/NP** that takes a Noun Phrase to the left and right as input
    to output a sentence. By treating words as functions, the CCG parser type-checks
    a sentence the same way a compiler type-checks a program.
  prefs: []
  type: TYPE_NORMAL
- en: A dreaded **TypeError** willensue if you try to make a sentence like **“run
    write walk.”** This will not compile the same way **sum(“word”)** would not compile.
    In the first case, you input a verb where a Noun Phrase was expected, and in the
    second, you input a string where a number was expected. **TypeError**
  prefs: []
  type: TYPE_NORMAL
- en: 'In Lambda calculus, we could write:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: In CCG, every lexical item carries not only a syntactic category but also a
    small lambda-term encoding its meaning — e.g. **write** might be assigned (S\(S\NP)/NP
    with semantics *λo. λs.write(s, o)* to indicate it first takes an object (o),
    then a subject (s). As you apply CCG’s combinatory rules (like function application),
    you simultaneously apply these lambda-terms, composing the meanings of words step
    by step into a complete logical form for the whole sentence.
  prefs: []
  type: TYPE_NORMAL
- en: '**Lambda calculus** is a *very small* formal language that does one thing:
    ***It describes how to build functions and how to run them.*** Everything else — numbers,
    Booleans, data structures, even whole programs — can be encoded in terms of those
    functions. As a result, the lambda calculus serves as a precise mathematical model
    of computation itself.'
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The power of CCG lies in its ability to transform language into an algebraic
    system, providing a clear set of compositional instructions. This is incredibly
    useful for revealing the connections between human language and formal computation.
    Admittedly, the CCG explained here is not comprehensive enough to parse sentences
    like:'
  prefs: []
  type: TYPE_NORMAL
- en: '[CCG isn’t just a powerful way for computers to understand sentence structure;
    it also appears to mirror how our brains process language](https://arxiv.org/html/2403.13368v1#:~:text=These%20findings%20advocate%20for%20CCG,during%20standard%20human%20language%20comprehension.)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Parsing these sentences requires far more. When you try to build a comprehensive
    CCG system to handle real-world English at scale, you need over 1,200 different
    grammatical categories, revealing how much hidden complexity exists in what seems
    like “ordinary” language use.
  prefs: []
  type: TYPE_NORMAL
- en: 'Even the following construction is a simplified model:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: 'At its core, CCG provides a methodical and rigorous approach to separating
    sentences, reassembling them, and ensuring grammatical consistency. All the while
    avoiding incomplete sentences like:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/852950080350d1f352d5994d8b33a514.png)'
  prefs: []
  type: TYPE_IMG
- en: '* * *'
  prefs: []
