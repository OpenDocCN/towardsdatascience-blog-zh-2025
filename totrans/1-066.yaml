- en: 'Modern DataFrames in Python: A Hands-On Tutorial with Polars and DuckDB'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/modern-dataframes-in-python-a-hands-on-tutorial-with-polars-and-duckdb/](https://towardsdatascience.com/modern-dataframes-in-python-a-hands-on-tutorial-with-polars-and-duckdb/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: If <mdspan datatext="el1763694736348" class="mdspan-comment">you have worked</mdspan>
    with Python for data, you have probably experienced the frustration of waiting
    minutes for a Pandas operation to finish.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: At first, everything seems fine, but as your dataset grows and your workflows
    become more complex, your laptop suddenly feels like it’s preparing for lift-off.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: A couple of months ago, I worked on a project analyzing e-commerce transactions
    with over 3 million rows of data.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: It was a pretty interesting experience, but most of the time, I watched simple
    groupby operations that normally ran in seconds suddenly stretch into minutes.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: At that point, I realized Pandas is amazing, but it is not always enough.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: This article explores modern alternatives to Pandas, including Polars and DuckDB,
    and examines how they can simplify and improve the handling of large datasets.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: For clarity, let me be upfront about a few things before we begin.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: This article is not a deep dive into Rust memory management or a proclamation
    that Pandas is obsolete.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
- en: Instead, it is a practical, hands-on guide. You will see real examples, personal
    experiences, and actionable insights into workflows that can save you time and
    sanity.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: Why Pandas Can Feel Slow
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Back when I was on the e-commerce project, I remember working with CSV files
    over two gigabytes, and every filter or aggregation in Pandas often took several
    minutes to complete.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: During that time, I would stare at the screen, wishing I could just grab a coffee
    or binge a few episodes of a show while the code ran.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: The main pain points I encountered were speed, memory, and workflow complexity.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
- en: We all know how large CSV files consume enormous amounts of RAM, sometimes more
    than what my laptop could comfortably handle. On top of that, chaining multiple
    transformations also made code harder to maintain and slower to execute.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: Polars and DuckDB address these challenges in different ways.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
- en: Polars, built in Rust, uses multi-threaded execution to process large datasets
    efficiently.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: DuckDB, on the other hand, is designed for analytics and executes SQL queries
    without needing you to load everything into memory.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: Basically, each of them has its own superpower. Polars is the speedster, and
    DuckDB is kind of like the memory magician.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: And the best part? Both integrate seamlessly with Python, allowing you to enhance
    your workflows without a complete rewrite.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: Setting Up Your Environment
  id: totrans-22
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Before we start coding, make sure your environment is ready. For consistency,
    I used Pandas 2.2.0, Polars 0.20.0, and DuckDB 1.9.0.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: Pinning versions can save you headaches when following tutorials or sharing
    code.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  id: totrans-25
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'In Python, import the libraries:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  id: totrans-27
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: For example, I will use an e-commerce sales dataset with columns such as order
    ID, product ID, region, country, revenue, and date. You can download similar datasets
    from [Kaggle](https://www.kaggle.com/datasets) or generate synthetic data.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
- en: Loading Data
  id: totrans-29
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Loading data efficiently sets the tone for the rest of your workflow. I remember
    a project where the CSV file had nearly 5 million rows.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
- en: Pandas handled it, but the load times were long, and the repeated reloads during
    testing were painful.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
- en: It was one of those moments where you wish your laptop had a “fast forward”
    button.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
- en: Switching to Polars and DuckDB completely improved everything, and suddenly,
    I could access and manipulate the data almost instantly, which honestly made the
    testing and iteration processes far more enjoyable.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: 'With Pandas:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  id: totrans-35
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'With Polars:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  id: totrans-37
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'With DuckDB:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: DuckDB can query CSVs directly without loading the entire datasets into memory,
    making it much easier to work with large files.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
- en: Filtering Data
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The problem here is that filtering in Pandas can be slow when dealing with millions
    of rows. I once needed to analyze European transactions in a massive sales dataset.
    Pandas took minutes, which slowed down my analysis.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
- en: 'With Pandas:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  id: totrans-44
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'Polars is faster and can process multiple filters efficiently:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  id: totrans-46
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'DuckDB uses SQL syntax:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  id: totrans-48
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: Now you can filter through large datasets in seconds instead of minutes, leaving
    you more time to focus on the insights that really matter.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
- en: Aggregating Large Datasets Quickly
  id: totrans-50
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Aggregation is often where Pandas starts to feel slow. Imagine calculating total
    revenue per country for a marketing report.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
- en: 'In Pandas:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  id: totrans-53
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'In Polars:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  id: totrans-55
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: 'In DuckDB:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  id: totrans-57
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: I remember running this aggregation on a 10 million-row dataset. In Pandas,
    it took nearly half an hour. Polars completed the same operation in under a minute.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
- en: The sense of relief was almost like finishing a marathon and realizing your
    legs still work.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
- en: Joining Datasets at Scale
  id: totrans-60
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Joining datasets is one of those things that sounds simple until you are actually
    knee-deep in the data.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
- en: In real projects, your data usually lives in multiple sources, so you have to
    combine them using shared columns like customer IDs.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
- en: I learned this the hard way while working on a project that required combining
    millions of customer orders with an equally large demographic dataset.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
- en: Each file was big enough on its own, but merging them felt like trying to force
    two puzzle pieces together while your laptop begged for mercy.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
- en: Pandas took so long that I began timing the joins the same way people time how
    long it takes their microwave popcorn to finish.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
- en: 'Spoiler: the popcorn won every time.'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
- en: Polars and DuckDB gave me a way out.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
- en: 'With Pandas:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  id: totrans-69
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: 'Polars:'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  id: totrans-71
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: 'DuckDB:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  id: totrans-73
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: '[Joins](https://urbizedge.com/understanding-sql-joins/) on large datasets that
    used to freeze your workflow now run smoothly and efficiently.'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
- en: Lazy Evaluation in Polars
  id: totrans-75
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: One thing I didn’t appreciate early in my data science journey was how much
    time gets wasted while running transformations line by line.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
- en: Polars approaches this differently.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
- en: It uses a technique called lazy evaluation, which essentially waits until you
    have completed defining your transformations before executing any operations.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 它使用一种称为“懒加载”的技术，本质上是在你完成定义所有转换之前，不会执行任何操作。
- en: It examines the entire pipeline, determines the most efficient path, and executes
    everything simultaneously.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 它检查整个管道，确定最有效的路径，并同步执行所有操作。
- en: It’s like having a friend who listens to your entire order before walking to
    the kitchen, instead of one who takes each instruction separately and keeps going
    back and forth.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 这就像有一个朋友在你给出完整订单后再去厨房，而不是一个一个指令地执行并来回跑的人。
- en: This [TDS article](https://towardsdatascience.com/understanding-lazy-evaluation-in-polars-b85ccb864d0c/)
    indepthly explains lazy evaluation.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 这篇 [TDS 文章](https://towardsdatascience.com/understanding-lazy-evaluation-in-polars-b85ccb864d0c/)
    深入解释了懒加载。
- en: 'Here’s what the flow looks like:'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是这个流程的示意图：
- en: 'Pandas:'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 'Pandas:'
- en: '[PRE14]'
  id: totrans-84
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: 'Polars Lazy Mode:'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: Polars 懒模式：
- en: '[PRE15]'
  id: totrans-86
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: The first time I used lazy mode, it felt strange not seeing instant results.
    But once I ran the final `.collect()`, the speed difference was obvious.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 我第一次使用懒模式时，没有看到即时结果感觉有点奇怪。但一旦我运行了最后的 `.collect()`，速度差异就很明显了。
- en: Lazy evaluation won’t magically solve every performance issue, but it brings
    a level of efficiency that Pandas wasn’t designed for.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 懒加载不会神奇地解决每个性能问题，但它带来了 Pandas 没有设计到的效率级别。
- en: '* * *'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Conclusion and takeaways
  id: totrans-90
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论与收获
- en: Working with large datasets doesn’t have to feel like wrestling with your tools.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 与大型数据集打交道不必感觉像是在与你的工具搏斗。
- en: Using Polars and DuckDB showed me that the problem wasn’t always the data. Sometimes,
    it was the tool I was using to handle it.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 Polars 和 DuckDB 让我意识到问题并不总是数据。有时，问题是我用来处理它的工具。
- en: 'If there is one thing you take away from this tutorial, let it be this: you
    don’t have to abandon Pandas, but you can reach for something better when your
    datasets start pushing their limits.'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你从这个教程中学到了一点，让它成为这一点：你不必放弃 Pandas，但当你的数据集开始超出其限制时，你可以寻求更好的东西。
- en: Polars gives you speed as well as smarter execution, then DuckDB lets you query
    huge files like they’re tiny. Together, they make working with large data feel
    more manageable and less tiring.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: Polars 不仅提供速度，还提供更智能的执行，然后 DuckDB 让你查询大文件就像它们很小一样。它们一起使处理大型数据集感觉更加可控和省力。
- en: If you want to go deeper into the ideas explored in this tutorial, the official
    documentation of [Polars](https://docs.pola.rs/) and [DuckDB](https://duckdb.org/docs/stable/)
    are good places to start.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要深入了解本教程中探讨的思想，[Polars](https://docs.pola.rs/) 和 [DuckDB](https://duckdb.org/docs/stable/)
    的官方文档是很好的起点。
