  type: TYPE_NORMAL
  zh: DuckDB使用SQL语法：
- en: '[PRE7]'
  id: totrans-48
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: Now you can filter through large datasets in seconds instead of minutes, leaving
    you more time to focus on the insights that really matter.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，你可以在几秒钟内而不是几分钟内过滤大型数据集，这样你就有更多时间专注于真正重要的见解。
- en: Aggregating Large Datasets Quickly
  id: totrans-50
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 快速聚合大型数据集
- en: Aggregation is often where Pandas starts to feel slow. Imagine calculating total
    revenue per country for a marketing report.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 聚合通常是Pandas开始感觉缓慢的地方。想象一下为营销报告计算每个国家的总收入。
- en: 'In Pandas:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 在Pandas中：
- en: '[PRE8]'
  id: totrans-53
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'In Polars:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 在Polars中：
- en: '[PRE9]'
  id: totrans-55
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: 'In DuckDB:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 在DuckDB中：
- en: '[PRE10]'
  id: totrans-57
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: I remember running this aggregation on a 10 million-row dataset. In Pandas,
    it took nearly half an hour. Polars completed the same operation in under a minute.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 我记得在一个包含1000万行数据的集上运行这个聚合操作。在Pandas中，这几乎花了半小时。Polars在不到一分钟内完成了相同的操作。
- en: The sense of relief was almost like finishing a marathon and realizing your
    legs still work.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 减轻压力的感觉几乎就像完成了一场马拉松，意识到你的腿还能工作。
- en: Joining Datasets at Scale
  id: totrans-60
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 规模化数据集的连接
- en: Joining datasets is one of those things that sounds simple until you are actually
    knee-deep in the data.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 将数据集合并是那些听起来很简单，直到你真正陷入数据泥潭的事情之一。
- en: In real projects, your data usually lives in multiple sources, so you have to
    combine them using shared columns like customer IDs.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 在实际项目中，你的数据通常存在于多个来源，因此你必须使用共享列，如客户ID，将它们结合起来。
- en: I learned this the hard way while working on a project that required combining
    millions of customer orders with an equally large demographic dataset.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 我是在一个需要将数百万个客户订单与同样庞大的人口统计数据集相结合的项目中艰难地学到这一点的。
- en: Each file was big enough on its own, but merging them felt like trying to force
    two puzzle pieces together while your laptop begged for mercy.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 每个文件本身就足够大了，但合并它们感觉就像是在你的笔记本电脑恳求饶命的同时，试图把两个拼图碎片拼在一起。
- en: Pandas took so long that I began timing the joins the same way people time how
    long it takes their microwave popcorn to finish.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: Pandas花费了如此长的时间，以至于我开始像人们计时微波爆米花完成所需时间一样计时连接操作。
- en: 'Spoiler: the popcorn won every time.'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 揭秘：爆米花每次都赢了。
- en: Polars and DuckDB gave me a way out.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: Polars和DuckDB给了我一条出路。
- en: 'With Pandas:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Pandas：
