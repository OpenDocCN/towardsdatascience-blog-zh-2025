- en: DuckDB can query CSVs directly without loading the entire datasets into memory,
    making it much easier to work with large files.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: DuckDB可以直接查询CSV文件，而无需将整个数据集加载到内存中，这使得处理大型文件变得容易得多。
- en: Filtering Data
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 过滤数据
- en: The problem here is that filtering in Pandas can be slow when dealing with millions
    of rows. I once needed to analyze European transactions in a massive sales dataset.
    Pandas took minutes, which slowed down my analysis.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 这里的问题是，当处理数百万行数据时，Pandas的过滤可能会很慢。我曾经需要分析一个庞大的销售数据集中的欧洲交易。Pandas花费了数分钟，这减缓了我的分析。
- en: 'With Pandas:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 使用Pandas：
- en: '[PRE5]'
  id: totrans-44
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'Polars is faster and can process multiple filters efficiently:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: Polars更快，并且可以高效地处理多个过滤器：
- en: '[PRE6]'
  id: totrans-46
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
