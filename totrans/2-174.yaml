- en: 'The Five-Second Fingerprint: Inside Shazam’s Instant Song ID'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/the-five-second-fingerprint-inside-shazams-instant-song-id/](https://towardsdatascience.com/the-five-second-fingerprint-inside-shazams-instant-song-id/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '***This post continues Behind the Tap, a series exploring the hidden mechanics
    of everyday tech — from Uber to Spotify to search engines. I’ll dive under the
    hood to demystify the systems shaping your digital world.***'
  prefs: []
  type: TYPE_NORMAL
- en: '<mdspan datatext="el1751301811205" class="mdspan-comment">My</mdspan> first
    relationship with music listening started at 6, rotating through the albums in
    the living room’s Onkyo 6-disc player. *Cat Stevens*, *Groove* *Armada*, *Sade*.
    There was always one song I kept rewinding to, though I didn’t know its name.
    10 years on, moments of the song returned to memory. I searched through forums,
    ‘*old saxophone melody’*, ‘*vintage song about sand dunes*’, looking for years
    with no success. Then, one day at university, I was in my friend Pegler’s dorm
    room when he played it:'
  prefs: []
  type: TYPE_NORMAL
- en: That long search taught me how important it is to be able to find the music
    you love.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Before streaming and smart assistants, music discovery relied on memory, luck,
    or a friend with good music taste. That one catchy chorus could be lost to the
    ether.
  prefs: []
  type: TYPE_NORMAL
- en: Then came a music-lover’s miracle.
  prefs: []
  type: TYPE_NORMAL
- en: A few seconds of sound. A button press. And a name on your screen.
  prefs: []
  type: TYPE_NORMAL
- en: Shazam made music recognisable.
  prefs: []
  type: TYPE_NORMAL
- en: The Origin: 2580
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Shazam launched in 2002, long before apps were a thing. Back then it worked
    like this:'
  prefs: []
  type: TYPE_NORMAL
- en: You’d dial **2580#** on your mobile (UK only).
  prefs: []
  type: TYPE_NORMAL
- en: Hold your phone up to the speaker.
  prefs: []
  type: TYPE_NORMAL
- en: …Wait in silence…
  prefs: []
  type: TYPE_NORMAL
- en: And receive a **SMS** telling you the name of the song.
  prefs: []
  type: TYPE_NORMAL
- en: It felt like magic. The founding team, Chris Barton, Philip Inghelbrecht, Avery
    Wang, and Dhiraj Mukherjee, spent years building that illusion.
  prefs: []
  type: TYPE_NORMAL
- en: To build its first database, [Shazam hired 30 young workers](https://www.youtube.com/watch?v=b6xeOLjeKs0&list=LL&index=3&t=185s)
    to run 18-hour shifts, manually loading 100,000 CDs into computers and using custom
    software. Because CD’s don’t contain metadata they had to type the names of the
    songs manually, referring to the CD sleeve, to eventually create the company’s
    first million audio fingerprints — a painstaking process that took months.
  prefs: []
  type: TYPE_NORMAL
- en: In an era before smartphones or apps, when Nokia’s and Blackberry’s couldn’t
    handle the processing or memory demands, Shazam had to stay alive long enough
    for the technology to catch up to their idea. This was a lesson in market timing.
  prefs: []
  type: TYPE_NORMAL
- en: This post is about what happens in the moment between the tap and the title,
    the signal processing, hashing, indexing, and pattern matching that lets Shazam
    hear what you can’t quite name.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 'The Algorithm: Audio Fingerprinting'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'In 2003, Shazam co-founder Avery Wang [published](https://www.ee.columbia.edu/~dpwe/papers/Wang03-shazam.pdf)
    the blueprint for an algorithm that still powers the app today. The paper’s central
    idea: If humans can understand music by **superimposing** layers of sound, a machine
    could do it too.'
  prefs: []
  type: TYPE_NORMAL
- en: Let’s walk through how Shazam breaks sound down to something a machine can recognise
    instantly.
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Capturing Audio Sample
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '*It starts with a tap.*'
  prefs: []
  type: TYPE_NORMAL
- en: When you hit the Shazam button, the app records a 5–10 second snippet of the
    audio around you. This is long enough to identify most songs, though we’ve all
    waited minutes holding our phones in the air (or hiding in our pockets) for the
    ID.
  prefs: []
  type: TYPE_NORMAL
- en: 'But Shazam doesn’t store that recording. Instead, it reduces it to something
    far smaller and smarter: a **fingerprint**.'
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Generating the Spectrogram
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Before Shazam can recognise a song, it needs to understand whatfrequencies are
    in the sound and when they occur. To do this, it uses a mathematical tool called
    the [Fast Fourier Transform (FFT)](https://www.sciencedirect.com/topics/engineering/fast-fourier-transform).
  prefs: []
  type: TYPE_NORMAL
- en: The **FFT** breaks an audio signal into its component frequencies, revealing
    which notes or tones make up the sound at any moment.
  prefs: []
  type: TYPE_NORMAL
- en: '**Why it matters:** Waveforms are fragile, sensitive to noise, pitch changes,
    and device compression. But frequency relationships over time remain stable. That’s
    the gold.'
  prefs: []
  type: TYPE_NORMAL
- en: If you studied Mathematics at Uni, you would remember the struggles of learning
    the [Discrete Fourier Transform process.](https://www.robots.ox.ac.uk/~sjrob/Teaching/SP/l7.pdf)**Fast
    Fourier Transform (FFT**) is a more efficient version that lets us decompose a
    complex signal into its frequency components, like hearing all the notes in a
    chord.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Music isn’t static. Notes and harmonics change over time. So Shazam doesn’t
    just run FFT once, it runs it repeatedly over small, overlapping windows of the
    signal. This process is known as the **Short-Time Fourier Transform (STFT)** and
    forms the basis of the **spectrogram**.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b09371794cfdd18c106804e81d2c0acf.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Image by Author: Fast Fourier Transformation Visualised'
  prefs: []
  type: TYPE_NORMAL
- en: The resulting **spectrogram** is a transformation of sound from the **amplitude-time
    domain** (waveform) into the **frequency-time domain**.
  prefs: []
  type: TYPE_NORMAL
- en: Think of this as turning a messy audio waveform into a musical heatmap.
  prefs: []
  type: TYPE_NORMAL
- en: Instead of showing how loud the sound is, a spectrogram shows **what frequencies**
    are present **at what times**.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/3e6380a06299e3517db475ba9cd5167d.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Image by Author: A visualisation of the transition from a waveform to a spectrogram
    using FFT'
  prefs: []
  type: TYPE_NORMAL
- en: A spectrogram moves analysis from the **amplitude-time domain** to **frequency-time
    domain**. It displays time on the horizontal axis, frequency on the vertical axis,
    and uses brightness to indicate the amplitude (or volume) of each frequency at
    each moment. This allows you to see not just which frequencies are present, but
    also how their intensity evolves, making it possible to identify patterns, transient
    events, or changes in the signal that are not visible in a standard time-domain
    waveform.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[Spectrograms](https://en.wikipedia.org/wiki/Spectrogram) are widely used in
    fields such as audio analysis, speech processing, seismology, and music, providing
    a powerful tool for understanding the temporal and spectral characteristics of
    signals.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 3\. From Spectrogram to Constellation Map
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Spectrograms are dense and contain too much data to compare across millions
    of songs. Shazam filters out low-intensity frequencies, leaving just the loudest
    peaks.
  prefs: []
  type: TYPE_NORMAL
- en: This creates a constellation map, a visual scatterplot of standout frequencies
    over time, similar to sheet music, although it reminds me of a mechanical music-box.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/19d27ae0e7fee77255666d3aba9ea6d3.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Image by Author: A visualisation of the transition into a Constellation Map'
  prefs: []
  type: TYPE_NORMAL
- en: 4\. Creating the Audio Fingerprint
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now comes the magic, turning points into a signature.
  prefs: []
  type: TYPE_NORMAL
- en: Shazam takes each anchor point (a dominant peak) and pairs it with target peaks
    in a small time window ahead — forming a connection that encodes both frequency
    pair and timing difference.
  prefs: []
  type: TYPE_NORMAL
- en: 'Each of these becomes a hash tuple:'
  prefs: []
  type: TYPE_NORMAL
- en: (anchor_frequency, target_frequency, time_delta)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![](../Images/e42b3bcda07a607e8ebff1274694776a.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Image by Author: Hash Generation Process'
  prefs: []
  type: TYPE_NORMAL
- en: What is a Hash?
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: A hash is the output of a mathematical function, called a hash function, that
    transforms input data into a fixed-length string of numbers and/or characters.
    It’s a way of turning complex data into a short, unique identifier.
  prefs: []
  type: TYPE_NORMAL
- en: '[Hashing](https://www.codecademy.com/resources/blog/what-is-hashing/) is widely
    used in computer science and cryptography, especially for tasks like data lookup,
    verification, and indexing.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/98abbff68aea106d110e596ac59972a2.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Image by Author: Refer to this [source](https://medium.com/nybles/hashing-algorithms-d10171ca2e89)
    understand Hashing'
  prefs: []
  type: TYPE_NORMAL
- en: 'For Shazam, a typical **hash is 32 bits** long, and it *might* be structured
    like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '**10 bits** for the anchor frequency'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**10 bits** for the target frequency'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**12 bits** for the time delta between them'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/100f513170379fa338b4c141055852f9.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Image by Author: A visualisation of the hashing example from above'
  prefs: []
  type: TYPE_NORMAL
- en: This tiny fingerprint captures the relationship between two sound peaks and
    how far apart they are in time, and is strong enough to identify the song and
    small enough to transmit quickly, even on low-bandwidth connections.
  prefs: []
  type: TYPE_NORMAL
- en: 5\. Matching Against the Database
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Once Shazam creates a fingerprint from your snippet, it needs to quickly find
    a match in its database containing millions of songs.
  prefs: []
  type: TYPE_NORMAL
- en: Although Shazam has no idea where in the song your clip came from — intro, verse,
    chorus, bridge — doesn’t matter, it looks for relative timing between hash pairs.
    This makes the system robust to time offsets in the input audio.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/3e7c2f6e7fdb0f8b120007bd76cdd5f7.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Image by Author: Visualisation of matching hashes to a database song'
  prefs: []
  type: TYPE_NORMAL
- en: Shazam compares your recording’s hashes against its database and identifies
    the song with the highest number of matches, the fingerprint that best lines up
    with your sample, even if it’s not an exact match due to background noise.
  prefs: []
  type: TYPE_NORMAL
- en: How it Searches So Fast
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: To make this lightning-fast, Shazam uses a [**hashmap**](https://www.masaischool.com/blog/understanding-hashmap-data-structure-with-examples/)**,**
    a data structure that allows for near-instant lookup.
  prefs: []
  type: TYPE_NORMAL
- en: A hashmap can find a match in O(1) time, that means the lookup time stays constant,
    even if there are millions of entries.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: In contrast, a sorted index (like B-tree on disk) takes O(log n) time, which
    grows slowly as the database grows.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: This balance of time and space complexity is known as [Big O Notation](https://medium.com/@DevChy/introduction-to-big-o-notation-time-and-space-complexity-f747ea5bca58),
    theory I am not prepared of bothered to teach. Please refer to a Computer Scientist.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 6\. Scaling the System
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'To maintain this speed at global scale, Shazam does more than just use fast
    data structures, it optimises how and where the data lives:'
  prefs: []
  type: TYPE_NORMAL
- en: '[Shards](https://aws.amazon.com/what-is/database-sharding/) the database — dividing
    it by time range, hash prefix, or geography'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Keeps hot shards in memory (RAM) for instant access
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Offloads colder data to disk, which is slower but cheaper to store
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Distributes the system by region (e.g., US East, Europe, Asia ) so recognition
    is fast no matter where you are
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This design supports **23,000+ recognitions per minute**, even at global scale.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Impact & Future Applications
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The obvious application is music discovery on your phone, but there is another
    major application of Shazam’s process.
  prefs: []
  type: TYPE_NORMAL
- en: Shazam facilitates **Market Insights.** Every time a user tags a song, Shazam
    collects anonymised, geo-temporal metadata (where, when, and how often a song
    is being ID’d.)
  prefs: []
  type: TYPE_NORMAL
- en: 'Labels, artists, and promoters use this to:'
  prefs: []
  type: TYPE_NORMAL
- en: Spot breakout tracks before they hit the charts.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Identify regional trends (a remix gaining traction in Tokyo before LA).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Guide marketing spend based on organic attraction.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Unlike Spotify, which uses user listening behaviour to refine recommendations,
    Shazam provides real-time data on songs people actively identify, offering the
    music industry early insights into emerging trends and popular tracks.
  prefs: []
  type: TYPE_NORMAL
- en: '[**What Spotify Hears Before You Do**'
  prefs: []
  type: TYPE_NORMAL
- en: '*The Data Science of Music Recommendation*medium.com](https://medium.com/@ashton.gribble/what-spotify-hears-before-you-do-ca7a86be3e20)'
  prefs: []
  type: TYPE_NORMAL
- en: On December 2017, **Apple** bought Shazam for a reported **$400 million**. Apple
    reportedly uses Shazam’s data to augment Apple Music’s recommendation engine**,**
    and record labels now monitor Shazam trends like they used to monitor *radio spins*.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/7c84c1864d74a8afba76ce7f3d5c510d.png)'
  prefs: []
  type: TYPE_IMG
- en: Photo by [Rachel Coyne](https://unsplash.com/@rachelcoyne?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  prefs: []
  type: TYPE_NORMAL
- en: 'In the future, there is expected evolution in areas like:'
  prefs: []
  type: TYPE_NORMAL
- en: '[**Visual Shazam:**](https://thenextweb.com/news/shazam-can-now-scan-physical-objects-for-augmented-reality-and-exclusive-video-content)Already
    piloted, point you camera at an object or artwork to identify it, useful for an
    Augmented Reality future.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Concert Mode:** Identify songs live during gigs and sync to a real-time setlist.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**Hyper-local trends**](https://www.digitaltrends.com/mobile/shazam-now-shows-the-worlds-fastest-growing-songs/)**:**
    Surface what’s trending ‘on this street’ or ‘in this venue’, expanding community-shared
    music taste.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Generative AI integration: P**air audio snippets with lyric generation, remix
    suggestions, or visual accompaniment.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Outro: The Algorithm That Endures'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In a world of ever-shifting tech stacks, it’s rare for an algorithm to stay
    relevant for over 20 years.
  prefs: []
  type: TYPE_NORMAL
- en: But Shazam’s fingerprinting method hasn’t just endured, it’s scaled, evolved,
    and become a blueprint for audio recognition systems across industries.
  prefs: []
  type: TYPE_NORMAL
- en: The magic isn’t just that Shazam can name a song. It’s how it does it, turning
    messy sound into elegant math, and doing it reliably, instantly, and globally.
  prefs: []
  type: TYPE_NORMAL
- en: 'So next time you’re in a loud, trashy bar holding your phone up to the speaker
    playing *Lola Young’s ‘Messy’* just remember: behind that tap is a beautiful stack
    of signal processing, hashing, and search, designed so well it barely had to change.'
  prefs: []
  type: TYPE_NORMAL
