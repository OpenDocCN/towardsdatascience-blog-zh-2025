- en: Contextual Topic Modelling in Chinese Corpora with KeyNMF
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 基于KeyNMF的中文语料库上下文主题建模
- en: 原文：[https://towardsdatascience.com/contextual-topic-modelling-in-chinese-corpora-with-keynmf-9a1d02f02648/](https://towardsdatascience.com/contextual-topic-modelling-in-chinese-corpora-with-keynmf-9a1d02f02648/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/contextual-topic-modelling-in-chinese-corpora-with-keynmf-9a1d02f02648/](https://towardsdatascience.com/contextual-topic-modelling-in-chinese-corpora-with-keynmf-9a1d02f02648/)
- en: With our [recent paper](https://arxiv.org/abs/2410.12791) on discourse dynamics
    in European Chinese diaspora media, our team has tapped into an almost unanimous
    frustration with the quality of topic modelling approaches when applied to Chinese
    data. In this article, I will introduce you to our novel topic modelling method,
    KeyNMF, and how to apply it most effectively to Chinese textual data.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们关于欧洲华人社区媒体话语动态的[最近论文](https://arxiv.org/abs/2410.12791)中，我们的团队已经触及到当应用于中文数据时，主题建模方法质量普遍存在的不满。在这篇文章中，我将向您介绍我们新颖的主题建模方法KeyNMF，以及如何最有效地将其应用于中文文本数据。
- en: Topic Modelling with Matrix Factorization
  id: totrans-3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 基于矩阵分解的主题建模
- en: Before diving into practicalities, I would like to give you a brief introduction
    to topic modelling theory, and motivate the advancements introduced in our paper.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在深入实际之前，我想简要介绍一下主题建模理论，并说明我们论文中引入的进步。
- en: Topic modelling is a discipline of Natural Language Processing for uncovering
    latent topical information in textual corpora in an unsupervised manner, that
    is then presented to the user in a human-interpretable way (usually 10 keywords
    for each topic).
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 主题建模是自然语言处理的一个分支，它以无监督的方式在文本语料库中揭示潜在的主题信息，然后将这些信息以人类可解释的方式呈现给用户（通常每个主题有10个关键词）。
- en: 'There are many ways to formalize this task in mathematical terms, but one rather
    popular conceptualization of topic discovery is matrix factorization. This is
    a rather natural and intuitive way to tackle the problem, and in a minute, you
    will see why. The primary insight behind topic modelling as matrix factorization
    is the following: Words that frequently occur together, are likely to belong to
    the same latent structure. In other words: Terms, the occurrence of which are
    highly correlated, are part of the same topic.'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 有许多方法可以用数学术语来形式化这个任务，但主题发现的一个相当流行的概念化是矩阵分解。这是一种相当自然和直观的方式来处理这个问题，您很快就会看到原因。主题建模作为矩阵分解背后的主要洞察是以下内容：经常一起出现的单词很可能属于同一潜在结构。换句话说：那些出现高度相关的术语是同一主题的一部分。
- en: 'You can discover topics in a corpus, by first constructing a bag-of-words matrix
    of documents. A bag-of-words matrix represents documents in the following way:
    Each row corresponds to a document, while each column to a unique word from the
    model’s vocabulary. The values in the matrix are then the number of times a word
    occurs in a given document.'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以通过首先构建文档的词袋矩阵来在一个语料库中发现主题。词袋矩阵以以下方式表示文档：每一行对应一个文档，而每一列对应模型词汇表中的一个独特单词。矩阵中的值是单词在给定文档中出现的次数。
- en: '![Schematic Overview of Non-negative Matrix Factorization](../Images/f1b84dd5a2f4c5ce6b0d85e8d052d37e.png)'
  id: totrans-8
  prefs: []
  type: TYPE_IMG
  zh: '![非负矩阵分解的示意图](../Images/f1b84dd5a2f4c5ce6b0d85e8d052d37e.png)'
- en: Schematic Overview of Non-negative Matrix Factorization
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 非负矩阵分解的示意图
- en: This matrix can be decomposed into the linear combination of a *topic-term matrix,*
    which indicates how important a word is for a given topic, __ and a *document-topic
    matrix,* which indicates how important a given topic is for a given document.
    A method for this decomposition is Non-negative Matrix Factorization, where we
    decompose a non-negative matrix to two other strictly non-negative matrices, instead
    of allowing arbitrary signed values.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 这个矩阵可以分解为*主题-词矩阵*的线性组合，该矩阵表示一个单词对于给定主题的重要性，以及*文档-主题矩阵*，该矩阵表示一个给定主题对于给定文档的重要性。这种分解的方法是非负矩阵分解，其中我们将一个非负矩阵分解为两个其他严格非负矩阵，而不是允许任意有符号的值。
- en: 'NMF is not the only method one can use for decomposing the bag-of-words matrix.
    A method of high historical significance, Latent Semantic Analysis, utilizes Truncated
    Singular-Value Decomposition for this purpose. NMF, however, is generally a better
    choice, as:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: NMF并不是唯一可以用来分解词袋矩阵的方法。一种具有高度历史意义的方法，潜在语义分析，利用截断奇异值分解来完成这个目的。然而，NMF通常是一个更好的选择，因为：
- en: The discovered latent factors are of different quality from other decomposition
    methods. NMF typically discovers **localized patterns** or **parts** in the data,
    which are easier to interpret.
  id: totrans-12
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 发现的潜在因子与其他分解方法的质量不同。NMF通常在数据中发现**局部化模式**或**部分**，这些更容易解释。
- en: '**Non-negative** topic-term and document-topic relations are easier to interpret
    than signed ones.'
  id: totrans-13
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**非负**的主题-术语和文档-主题关系比有符号的更容易解释。'
- en: 'Using NMF with just BoW matrices, however attractive and simple it may be,
    does come with its setbacks:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管使用仅BoW矩阵的NMF可能很有吸引力且简单，但它确实有其缺点：
- en: NMF typically minimizes the Frobenius norm of the error matrix. This entails
    an **assumption of Gaussianity** of the outcome variable, which is obviously false,
    as we are modelling word counts.
  id: totrans-15
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: NMF通常最小化误差矩阵的Frobenius范数。这涉及到结果变量的**高斯性**假设，这显然是错误的，因为我们正在对词频进行建模。
- en: BoW representations are **just word counts**. This means that words won’t be
    interpreted in context, and syntactical information will be ignored.
  id: totrans-16
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: BoW表示仅仅是**词频**。这意味着单词将不会在上下文中被解释，并且句法信息将被忽略。
- en: KeyNMF
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: KeyNMF
- en: To account for these limitations, and with the help of new transformer-based
    language representations, we can significantly improve NMF for our purposes.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 为了解决这些限制，并在新基于transformer的语言表示的帮助下，我们可以显著提高NMF的适用性。
- en: The key intuition behind KeyNMF is that most words in a document are *semantically
    insignificant*, and we can get an overview of topical information in the document
    by highlighting the top N most relevant terms. We will select these terms by using
    **contextual embeddings** from sentence-transformer models.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: KeyNMF背后的关键直觉是，文档中的大多数词在**语义上不显著**，我们可以通过突出显示前N个最相关的术语来获得文档中主题信息的概览。我们将通过使用sentence-transformer模型的**上下文嵌入**来选择这些术语。
- en: '![A Schematic Overview of the KeyNMF Model](../Images/6aa400d034eea1243bdf37ea2445961d.png)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
  zh: '![KeyNMF模型的关键概述](../Images/6aa400d034eea1243bdf37ea2445961d.png)'
- en: A Schematic Overview of the KeyNMF Model
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: KeyNMF模型的关键概述
- en: 'The KeyNMF algorithm consists of the following steps:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: KeyNMF算法包括以下步骤：
- en: Embed each document using a sentence-transformer, along with all words in the
    document.
  id: totrans-23
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用sentence-transformer对每个文档以及文档中的所有单词进行嵌入。
- en: Calculate cosine similarities of word embeddings to document embeddings.
  id: totrans-24
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 计算词嵌入与文档嵌入的余弦相似度。
- en: For each document, keep the highest N words with positive cosine similarities
    to the document.
  id: totrans-25
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对于每份文档，保留与文档具有最高正余弦相似度的前N个词。
- en: Arrange cosine similarities into a **keyword-matrix**, where each row is a document,
    each column is a keyword, and values are cosine similarities of the word to the
    document.
  id: totrans-26
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将余弦相似度排列成一个**关键词矩阵**，其中每一行是一个文档，每一列是一个关键词，值是单词与文档的余弦相似度。
- en: Decompose the keyword matrix with NMF.
  id: totrans-27
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用NMF分解关键词矩阵。
- en: This formulation helps us in multiple ways. a) We substantially reduce the model’s
    vocabulary, thereby having less parameters, resulting in faster and better model
    fit b) We get continuous distribution, which is a better fit for NMF’s assumptions
    and c) We incorporate contextual information into our topic model.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 这种公式以多种方式帮助我们。a) 我们显著减少了模型的词汇量，因此参数更少，从而实现更快的模型拟合；b) 我们得到了连续分布，这对于NMF的假设来说是一个更好的拟合；c)
    我们将上下文信息纳入我们的主题模型。
- en: Chinese Topic Modelling with KeyNMF
  id: totrans-29
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用KeyNMF进行中文主题建模
- en: Now that you understand how KeyNMF works, let’s get our hands dirty and apply
    the model in a practical context.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 现在你已经了解了KeyNMF的工作原理，让我们动手在一个实际场景中应用这个模型。
- en: Preparation and Data
  id: totrans-31
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 准备和数据
- en: 'First, let’s install the packages we are going to use in this demonstration:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们安装在这个演示中将要使用的包：
- en: '[PRE0]'
  id: totrans-33
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Then let’s get some openly available data. I chose to go with the [SIB200](https://huggingface.co/datasets/Davlan/sib200)
    corpus, as it is freely available under the CC-BY-SA 4.0 open license. This piece
    of code will fetch us the corpus.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，让我们获取一些公开可用的数据。我选择了[SIB200](https://huggingface.co/datasets/Davlan/sib200)语料库，因为它在CC-BY-SA
    4.0开源许可下免费提供。以下代码将为我们获取语料库。
- en: '[PRE1]'
  id: totrans-35
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Building a Chinese Topic Model
  id: totrans-36
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 构建中文主题模型
- en: There are a number of tricky aspects to applying language models to Chinese,
    since most of these systems are developed and tested on English data. When it
    comes to KeyNMF, there are two aspects that need to be taken into account.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 将语言模型应用于中文存在许多棘手的问题，因为这些系统大多数都是在英语数据上开发和测试的。当涉及到KeyNMF时，有两个方面需要考虑。
- en: '![Elements of a Topic Modelling Pipeline in Turftopic](../Images/d3d8a4de665c0b8f5f56e07328a4baa9.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![Turftopic中主题建模管道的元素](../Images/d3d8a4de665c0b8f5f56e07328a4baa9.png)'
- en: Elements of a Topic Modelling Pipeline in Turftopic
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: Turftopic中主题建模管道的元素
- en: Firstly, we will need to figure out how to tokenize texts in Chinese. Luckily,
    the [Turftopic](https://github.com/x-tabdeveloping/turftopic) library, which contains
    our implementation of KeyNMF (among other things), comes prepackaged with tokenization
    utilities for Chinese. Normally, you would use a CountVectorizer object from sklearn
    to extract words from text. We added a ChineseCountVectorizer object that uses
    the Jieba tokenizer in the background, and has an optionally usable Chinese stop
    word list.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们需要弄清楚如何对中文文本进行分词。幸运的是，包含我们的KeyNMF实现（以及其他功能）的[Turftopic](https://github.com/x-tabdeveloping/turftopic)库预先包装了中文分词工具。通常，您会使用sklearn中的CountVectorizer对象从文本中提取单词。我们添加了一个ChineseCountVectorizer对象，它在后台使用Jieba分词器，并有一个可选的中文停用词列表。
- en: '[PRE2]'
  id: totrans-41
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Then we will need a Chinese embedding model for producing document and word
    representations. We will use the paraphrase-multilingual-MiniLM-L12-v2 model for
    this, as it is quite compact and fast, and was specifically trained to be used
    in multilingual retrieval contexts.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们需要一个中文嵌入模型来生成文档和单词表示。我们将使用 paraphrase-multilingual-MiniLM-L12-v2 模型，因为它相当紧凑且快速，并且专门训练用于多语言检索环境。
- en: '[PRE3]'
  id: totrans-43
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: We can then build a fully Chinese KeyNMF model! I will initialize a model with
    20 topics and N=25 (a maximum of 15 keywords will be extracted for each document)
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们可以构建一个完全的中文KeyNMF模型！我将使用20个主题和N=25（每个文档将提取最多15个关键词）初始化模型
- en: '[PRE4]'
  id: totrans-45
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: We can then fit the model to the corpus and see what results we get!
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我们可以将模型拟合到语料库中，看看我们得到什么结果！
- en: '[PRE5]'
  id: totrans-47
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: '[PRE6]'
  id: totrans-48
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: As you see, we’ve already gained a sensible overview of what there is in our
    corpus! You can see that the topics are quite distinct, with some of them being
    concerned with scientific topics, such as astronomy (8), chemistry (5) or animal
    behaviour (9), while others were oriented at leisure (e.g. 0, 1, 12), or politics
    (19, 11).
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，我们已经在我们的语料库中获得了合理的概述！您可以看到，主题相当明显，其中一些与科学主题有关，例如天文学（8）、化学（5）或动物行为（9），而其他则倾向于休闲（例如0、1、12）或政治（19、11）。
- en: Visualization
  id: totrans-50
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 可视化
- en: To gain further aid in understanding the results, we can use the topicwizard
    library to visually investigate the topic model’s parameters.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 为了进一步帮助理解结果，我们可以使用topicwizard库来可视化调查主题模型的参数。
- en: Since topicwizard uses wordclouds, we will need to tell the library that it
    should be using a font that is compatible with Chinese. I took a font from the
    [ChineseWordCloud](https://github.com/shangjingbo1226/ChineseWordCloud) repo,
    that we will download and then pass to topicwizard.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 由于topicwizard使用词云，我们需要告诉库它应该使用与中文兼容的字体。我从[ChineseWordCloud](https://github.com/shangjingbo1226/ChineseWordCloud)存储库中取了一个字体，我们将下载并将其传递给topicwizard。
- en: '[PRE7]'
  id: totrans-53
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'This will open the topicwizard web app in a notebook or in your browser, with
    which you can interactively investigate your topic model:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 这将在笔记本或浏览器中打开topicwizard网络应用，您可以使用它交互式地调查您的主题模型：
- en: '![Investigating the relations of topic, documents and words in your corpus
    using topicwizard](../Images/90dcc2c1cbabde6afd22ba4fad696a15.png)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
  zh: '![使用topicwizard调查您语料库中主题、文档和单词之间的关系](../Images/90dcc2c1cbabde6afd22ba4fad696a15.png)'
- en: Investigating the relations of topic, documents and words in your corpus using
    topicwizard
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 使用topicwizard调查您语料库中主题、文档和单词之间的关系
- en: Conclusion
  id: totrans-57
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this article, we’ve looked at what KeyNMF is, how it works, what it’s motivated
    by and how it can be used to discover high-quality topics in Chinese text, as
    well as how to visualize and interpret your results. I hope this tutorial will
    prove useful to those who are looking to explore Chinese textual data.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们探讨了KeyNMF是什么，它是如何工作的，它是由什么激发的，以及它是如何用于在中文文本中发现高质量主题的，以及如何可视化和解释您的结果。我希望这篇教程将对那些想要探索中文文本数据的人有所帮助。
- en: For further information on the models, and how to improve your results, I encourage
    you to check out our [Documentation](https://x-tabdeveloping.github.io/turftopic/).
    If you should have any questions or encounter issues, feel free to submit an [issue
    on Github](https://github.com/x-tabdeveloping/turftopic/issues), or reach out
    in the comments :))
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 关于模型的信息以及如何改进您的结果，我鼓励您查看我们的[文档](https://x-tabdeveloping.github.io/turftopic/)。如果您有任何问题或遇到问题，请随时在Github上提交[问题](https://github.com/x-tabdeveloping/turftopic/issues)，或在评论中联系我
    :)。
- en: All figures presented in the article were produced by the author.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 文章中展示的所有图表均由作者制作。
