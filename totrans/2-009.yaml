- en: Non-uniform Memory Access (NUMA) Awareness
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Memory access is non-uniform on multi-core, multi-socket CPUs. This means the
    latency and bandwidth of memory operations depend on which CPU core is accessing
    which region of memory. If you don’t control for NUMA, you’re benchmarking the
    scheduler, not the CPU and the results can appear inconsistent. **Memory affinity**
    is exactly what eliminates that problem by controlling which CPU cores access
    which memory regions. The Linux scheduler is aware of the NUMA topology of the
    platform and attempts to improve performance by scheduling threads on processors
    that are in the same node as the memory being used, rather than letting the scheduler
    randomly assign work across the system. However, without explicit affinity controls,
    you can’t guarantee consistent placement for reliable benchmarking.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s do a hands-on NUMA experiment with XGBoost and a synthetic dataset that
    is large enough to stress memory.
  prefs: []
  type: TYPE_NORMAL
- en: First, provision a VM that spans multiple NUMA nodes, SSH into the instance,
    and install the dependencies.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Then create and activate a Python virtual environment to install `scikit-learn`,
    `numpy`, and `xgboost`. Save the script below as `xgb_bench.py`.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Next, run this script in three modes (`baseline / numa0 / interleave`). Repeat
    each experiment at least 5 times and report the mean and standard deviation. (This
    calls for another simple script!)
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: When assigning tasks to specific physical cores, use the `--physcpubind` or
    `-C` option rather than `--cpunodebind`.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: Which experiment had the smallest mean? How about the standard deviation? For
    interpreting these numbers, keep in mind that
  prefs: []
  type: TYPE_NORMAL
- en: Lower standard deviation for `numa0` indicates more stable locality.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Lower mean for `numa0` vs `baseline` suggests cross-node traffic was hurting
    you, and
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If `interleave` narrows the gap vs `baseline`, your workload is bandwidth sensitive
    and benefits from spreading pages—at potential cost to latency.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If none of these apply to a benchmark, the workload may be compute-bound (e.g.,
    shallow trees, small dataset), or the VM might expose a single NUMA node.
  prefs: []
  type: TYPE_NORMAL
- en: Choosing the Right Benchmarks
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: When benchmarking classical machine learning algorithms on CPUs, you should
    build your own testing framework, or leverage existing benchmark suites, or use
    a hybrid approach if appropriate.
  prefs: []
  type: TYPE_NORMAL
- en: Existing test suites such as [scikit-learn_bench](https://github.com/IntelPython/scikit-learn_bench)
    and [Phoronix Test Suite (PTS)](https://github.com/phoronix-test-suite/phoronix-test-suite)
    are helpful when you need standardized, reproducible results that others can validate
    and compare against. They work particularly well if you’re evaluating well-established
    algorithms like random forest, SVM, or XGBoost where standard datasets provide
    meaningful insights. Custom benchmarks excel at revealing implementation-specific
    performance characteristics. For instance, they can measure how different sparse
    matrix formats affect SVM training times, or how feature preprocessing pipelines
    impact overall throughput on your specific CPU architecture. The datasets you
    use directly influence what your benchmark reveals. Feel free to consult the official
    [scikit-learn benchmarks](https://github.com/scikit-learn/scikit-learn/tree/main/benchmarks)
    for inspiration. Here’s also a sample set that you can use to create a custom
    test.
  prefs: []
  type: TYPE_NORMAL
- en: '| **Dataset** | **Size** | **Task** | **Source** |'
  prefs: []
  type: TYPE_TB
- en: '| Higgs | 11M rows | Binary classification | [UCI ML Repo](https://archive.ics.uci.edu/dataset/280/higgs)
    |'
  prefs: []
  type: TYPE_TB
- en: '| Airline Delay | Variable | Multi-class classification | [BTS](https://www.transtats.bts.gov/ot_delay/ot_delaycause1.asp)
    |'
  prefs: []
  type: TYPE_TB
- en: '| California Housing | 20K rows | Regression | `sklearn.datasets.fetch_california_housing`
    |'
  prefs: []
  type: TYPE_TB
- en: '| Synthetic | Variable | Scaling tests | `sklearn.datasets.make_classification`
    |'
  prefs: []
  type: TYPE_TB
- en: Synthetic scaling datasets are especially useful to expose differences in cache,
    memory bandwidth, and I/O.
  prefs: []
  type: TYPE_NORMAL
- en: In the rest of this blog, we illustrate how you can run experiments using the
    open source scikit-learn_bench which currently supports scikit-learn, cuML, and
    XGBoost frameworks.
  prefs: []
  type: TYPE_NORMAL
