- en: 'At this point, you should be able to run a benchmark using the [sklbench module](https://github.com/IntelPython/scikit-learn_bench/tree/main/sklbench)
    and a specific configuration:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: By default, `sklbench` benchmarks both the standard scikit-learn implementations
    and their optimized counterparts provided by **sklearnex** (Intel’s accelerated
    extension)—or other supported frameworks like cuML or XGBoost—and logs results
    along with hardware and software metadata into `result.json`. You can customize
    the output file with `--result-file`, and include `--report` to produce an Excel
    report (`report.xlsx`). For a list of all supported options, see the [documentation](https://github.com/IntelPython/scikit-learn_bench/blob/main/sklbench/report/README.md#arguments).
  prefs: []
  type: TYPE_NORMAL
- en: 'As discussed earlier, you can use `numactl` to pin a process and its child
