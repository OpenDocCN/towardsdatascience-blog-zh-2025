- en: How to Benchmark Classical Machine Learning Workloads on Google Cloud
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/benchmarking-classical-machine-learning-workloads-on-google-cloud/](https://towardsdatascience.com/benchmarking-classical-machine-learning-workloads-on-google-cloud/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1755898002223" class="mdspan-comment">Why Classical</mdspan>
    Machine Learning Still Matters
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In an era of GPU supremacy, why do real-world business cases depend so much
    on classical machine learning and CPU-based training? The answer is that the data
    most important to real-world business applications is still overwhelmingly **tabular,
    structured, and relational**—think fraud detection, insurance risk scoring, churn
    prediction, and operational telemetry. Empirical results (e.g., [Grinsztajn et
    al*.,* *Why do tree-based models still outperform deep learning on typical tabular
    data?* (2022), NeurIPS 2022 Track on Datasets and Benchmarks](https://papers.neurips.cc/paper_files/paper/2022/file/0378c7692da36807bdec87ab043cdadc-Paper-Datasets_and_Benchmarks.pdf))
    show that for these domains **random forest**, **gradient boosting**, and **logistic
    regression** outperform neural nets in both accuracy and reliability. They also
    offer explainability which is critical in regulated industries like banking and
    healthcare.
  prefs: []
  type: TYPE_NORMAL
- en: GPUs often lose their edge here due to **data transfer latency** ([PCIe](https://www.intel.com/content/www/us/en/gaming/resources/what-is-pcie-4-and-why-does-it-matter.html)
    overhead) and **poor scaling** of some tree-based algorithms. Consequently, **CPU-based
    training** remains the most cost-effective choice for small-medium structured
    data workloads on cloud platforms.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this article, I’ll walk you through the steps for benchmarking traditional
    machine learning algorithms on [Google Cloud Platform (GCP)](https://cloud.google.com/)
    CPU offerings, including the [Intel® Xeon® 6](https://www.intel.com/content/www/us/en/products/details/processors/xeon.html)
    that was recently made generally available. (Full disclosure: I am affiliated
    with Intel as a Senior AI Software Solutions Engineer.)'
  prefs: []
  type: TYPE_NORMAL
- en: By systematically comparing runtime, scalability, and cost across algorithms,
    we can make evidence-based decisions about which approaches deliver the best trade-off
    between accuracy, speed, and operational cost.
  prefs: []
  type: TYPE_NORMAL
- en: Machine Configuration on Google Cloud
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Go to [console.cloud.google.com](https://console.cloud.google.com/), set up
    your billing, and head to “Compute Engine.” Then click on “Create instance” to
    configure your virtual machine (VM). The figure below shows the [C4 VM series](https://cloud.google.com/compute/docs/general-purpose-machines#c4_series)
    powered by Intel® Xeon® 6 (code-named Granite Rapids) and the 5th Gen Intel® Xeon®
    (code-named Emerald Rapids) CPUs.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/cdf48f4b9a3b9d5b1f90e2e54dda8027.png)'
  prefs: []
  type: TYPE_IMG
- en: Setting up a virtual machine on Google Cloud
  prefs: []
  type: TYPE_NORMAL
- en: Hyperthreading can introduce performance variability because two threads compete
    for the same core’s execution resources. For consistent benchmark results, setting
    “vCPUs to core ratio” to 1 eliminates that variable—more on this in the next section.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/fb4eb1a69d476ab0b80e2f11230ff163.png)'
  prefs: []
  type: TYPE_IMG
- en: vCPUs to core ratio and visible core counts can be set under “Advanced configurations”
  prefs: []
  type: TYPE_NORMAL
- en: Before creating the VM, increase the boot disk size from the left-hand panel—200
    GB will be more than enough to install the packages needed for this blog.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/9a6fcae3c1ca194239f5b10497a291fc.png)'
  prefs: []
