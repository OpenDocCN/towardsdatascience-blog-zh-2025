- en: Interpreting Results and Best Practices
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The [report generator](https://github.com/IntelPython/scikit-learn_bench/tree/main/sklbench/report)
    allows you to combine the result files of multiple runs.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: The real metric for cloud decision-making is the cost per task, namely,
  prefs: []
  type: TYPE_NORMAL
- en: '*Cost per task = runtime in hours x hourly price*.'
  prefs: []
  type: TYPE_NORMAL
- en: Real-world deployments rarely behave like single benchmark runs. To accurately
    model the cost per task, it’s useful to account for CPU boost behavior, cloud
    infrastructure variability, and memory topology, as they can all influence performance
    in ways that aren’t captured by a one-off measurement. To better reflect actual
    runtime characteristics, I recommend starting with warm-up iterations to stabilize
    CPU frequency scaling. Then run each experiment multiple times to account for
    system noise and transient effects. Reporting the mean and standard deviation
    helps surface consistent trends, while using medians can be more robust when variance
    is high, especially in cloud environments where noisy neighbors or resource contention
    can skew averages. For reproducibility, it’s important to fix package versions
    and use consistent VM image snapshots. Including NUMA configuration in your results
    helps others understand memory locality effects, which can significantly impact
    performance. Tools like scikit-learn_bench automate many of these steps, making
    it easier to produce benchmarks that are both representative and repeatable.
  prefs: []
  type: TYPE_NORMAL
