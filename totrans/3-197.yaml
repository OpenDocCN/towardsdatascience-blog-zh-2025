- en: One-Tailed Vs. Two-Tailed Tests
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 单尾与双尾检验
- en: 原文：[https://towardsdatascience.com/one-tailed-vs-two-tailed-tests/](https://towardsdatascience.com/one-tailed-vs-two-tailed-tests/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/one-tailed-vs-two-tailed-tests/](https://towardsdatascience.com/one-tailed-vs-two-tailed-tests/)
- en: Introduction
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 简介
- en: 'If you’ve ever analyzed data using built-in t-test functions, such as those
    in R or SciPy, here’s a question for you: have you ever adjusted the default setting
    for the alternative hypothesis? If your answer is no—or if you’re not even sure
    what this means—then this blog post is for you!'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你曾经使用内置的t检验函数分析数据，例如R或SciPy中的函数，那么这里有一个问题给你：你是否曾经调整过备择假设的默认设置？如果你的答案是“没有”——或者你甚至不确定这是什么意思——那么这篇博客文章就是为你准备的！
- en: The alternative hypothesis parameter, commonly referred to as “one-tailed” versus
    “two-tailed” in statistics, defines the expected direction of the difference between
    control and treatment groups. In a two-tailed test, we assess whether there is
    any difference in mean values between the groups, without specifying a direction.
    A one-tailed test, on the other hand, posits a specific direction—whether the
    control group’s mean is either less than or greater than that of the treatment
    group.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 备择假设参数，在统计学中通常被称为“单尾”与“双尾”，定义了控制组和处理组之间差异的预期方向。在双尾测试中，我们评估两组之间是否存在任何均值差异，而不指定方向。另一方面，单尾测试则提出一个特定的方向——控制组的均值是否小于或大于处理组的均值。
- en: 'Choosing between one- and two-tailed hypotheses might seem like a minor detail,
    but it affects every stage of A/B testing: from test planning to data analysis
    and results interpretation. This article builds a theoretical foundation on why
    the hypothesis direction matters and explores the pros and cons of each approach.'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 选择单尾和双尾假设可能看起来像是一个小细节，但它影响A/B测试的每个阶段：从测试规划到数据分析以及结果解释。本文构建了一个理论基础，解释为什么假设方向很重要，并探讨了每种方法的优缺点。
- en: 'One-tailed vs. two-tailed hypothesis testing: Understanding the difference'
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 单尾与双尾假设检验：理解差异
- en: 'To understand the importance of choosing between one-tailed and two-tailed
    hypotheses, let’s briefly review the basics of the t-test, the commonly used method
    in A/B testing. Like other hypothesis testing methods, the t-test begins with
    a conservative assumption: there is no difference between the two groups (the
    null hypothesis). Only if we find strong evidence against this assumption can
    we reject the null hypothesis and conclude that the treatment has had an effect.'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 为了理解选择单尾和双尾假设的重要性，让我们简要回顾一下t检验的基础知识，这是A/B测试中常用的方法。与其他假设检验方法一样，t检验从一个保守的假设开始：两组之间没有差异（零假设）。只有当我们找到强烈反对这个假设的证据时，我们才能拒绝零假设，并得出治疗有影响的结论。
- en: But what qualifies as “strong evidence”? To that end, a rejection region is
    determined under the null hypothesis and all results that fall within this region
    are deemed so unlikely that we take them as evidence against the feasibility of
    the null hypothesis. The size of this rejection region is based on a predetermined
    probability, known as alpha (α), which represents the likelihood of incorrectly
    rejecting the null hypothesis.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 但什么算是“强烈证据”？为了这个目的，在零假设下确定了一个拒绝区域，所有落在这个区域内的结果都被认为是不太可能的，我们将它们作为反对零假设可行性的证据。这个拒绝区域的大小基于一个预定的概率，称为alpha（α），它代表错误拒绝零假设的可能性。
- en: What does this have to do with the direction of the alternative hypothesis?
    Quite a bit, actually. While the alpha level determines the size of the rejection
    region, the alternative hypothesis dictates its placement. In a one-tailed test,
    where we hypothesize a specific direction of difference, the rejection region
    is situated in only one tail of the distribution. For a hypothesized positive
    effect (e..g., that the treatment group mean is higher than the control group
    mean), the rejection region would lie in the right tail, creating a right-tailed
    test. Conversely, if we hypothesize a negative effect (e.g., that the treatment
    group mean is less than the control group mean), the rejection region would be
    placed in the left tail, resulting in a left-tailed test.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 这与备择假设的方向有什么关系？实际上关系很大。虽然α水平决定了拒绝区域的大小，但备择假设决定了其位置。在单尾测试中，当我们假设一个特定的差异方向时，拒绝区域只位于分布的一个尾部。对于假设的正效应（例如，治疗组的均值高于对照组的均值），拒绝区域将位于右尾，形成右尾测试。相反，如果我们假设负效应（例如，治疗组的均值低于对照组的均值），拒绝区域将被放置在左尾，从而形成左尾测试。
- en: In contrast, a two-tailed test allows for the detection of a difference in either
    direction, so the rejection region is split between both tails of the distribution.
    This accommodates the possibility of observing extreme values in either direction,
    whether the effect is positive or negative.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 相比之下，双尾测试允许检测任一方向上的差异，因此拒绝区域分布在分布的两个尾部之间。这允许观察任一方向上的极端值，无论是正效应还是负效应。
- en: 'To build intuition, let’s visualize how the rejection regions appear under
    the different hypotheses. Recall that according to the null hypothesis, the difference
    between the two groups should center around zero. Thanks to the central limit
    theorem, we also know this distribution approximates a normal distribution. Consequently,
    the rejection areas corresponding to the different alternative hypothesis look
    like that:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 为了建立直观理解，让我们可视化在不同假设下拒绝区域是如何出现的。回想一下，根据零假设，两组之间的差异应该围绕零中心。得益于中心极限定理，我们还知道这种分布近似于正态分布。因此，对应于不同备择假设的拒绝区域看起来是这样的：
- en: '![](../Images/a1881574e685d803d5b2cd23b1e4de0f.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a1881574e685d803d5b2cd23b1e4de0f.png)'
- en: Why does it make a difference?
  id: totrans-13
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 这为什么很重要？
- en: The choice of direction for the alternative hypothesis impacts the entire A/B
    testing process, starting with the planning phase—specifically, in determining
    the sample size. Sample size is calculated based on the desired power of the test,
    which is the probability of detecting a true difference between the two groups
    when one exists. To compute power, we examine the area under the alternative hypothesis
    that corresponds to the rejection region (since power reflects the ability to
    reject the null hypothesis when the alternative hypothesis is true).
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 备择假设方向的选择会影响整个A/B测试过程，从规划阶段开始——特别是在确定样本量时。样本量是根据测试所需的功效计算的，这是在存在真实差异时检测两组之间差异的概率。为了计算功效，我们检查备择假设下对应于拒绝区域的面积（因为功效反映了在备择假设为真时拒绝零假设的能力）。
- en: 'Since the direction of the hypothesis affects the size of this rejection region,
    power is generally lower for a two-tailed hypothesis. This is due to the rejection
    region being divided across both tails, making it more challenging to detect an
    effect in any one direction. The following graph illustrates the comparison between
    the two types of hypotheses. Note that the purple area is larger for the one-tailed
    hypothesis, compared to the two-tailed hypothesis:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 由于假设的方向会影响这个拒绝区域的大小，因此双尾假设的功效通常较低。这是因为拒绝区域被分在两个尾部，使得检测任何单一方向上的效应变得更加困难。以下图表说明了两种假设类型的比较。请注意，与双尾假设相比，单尾假设的紫色区域更大：
- en: '![](../Images/203e08fe2a98c069fe3db00a9ade2f62.png)'
  id: totrans-16
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/203e08fe2a98c069fe3db00a9ade2f62.png)'
- en: In practice, to maintain the desired power level, we compensate for the reduced
    power of a two-tailed hypothesis by increasing the sample size (Increasing sample
    size raises power, though the mechanics of this can be a topic for a separate
    article). Thus, the choice between one- and two-tailed hypotheses directly influences
    the required sample size for your test.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 在实践中，为了保持所需的功效水平，我们通过增加样本量来补偿双尾假设的降低功效（增加样本量可以提高功效，尽管这一过程的机制可能是一个单独文章的主题）。因此，单尾和双尾假设的选择直接影响了测试所需的样本量。
- en: 'Beyond the planning phase, the choice of alternative hypothesis directly impacts
    the analysis and interpretation of results. There are cases where a test may reach
    significance with a one-tailed approach but not with a two-tailed one, and vice
    versa. Reviewing the previous graph can help illustrate this: for example, a result
    in the left tail might be significant under a two-tailed hypothesis but not under
    a right one-tailed hypothesis. Conversely, certain results might fall within the
    rejection region of a right one-tailed test but lie outside the rejection area
    in a two-tailed test.'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 超过规划阶段，备择假设的选择将直接影响结果的分析和解释。有些情况下，一个测试可能使用单尾方法达到显著性，但使用双尾方法则不行，反之亦然。回顾之前的图表可以帮助说明这一点：例如，在双尾假设下，左尾的结果可能显著，但在右尾单尾假设下则不显著。相反，某些结果可能落在右尾单尾测试的拒绝域内，但在双尾测试的拒绝区域外。
- en: How to decide between a one-tailed and two-tailed hypothesis
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何决定选择单尾还是双尾假设
- en: 'Let’s start with the bottom line: there’s no absolute right or wrong choice
    here. Both approaches are valid, and the primary consideration should be your
    specific business needs. To help you decide which option best suits your company,
    we’ll outline the key pros and cons of each.'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从底线开始：这里没有绝对的对或错的选择。两种方法都是有效的，主要考虑因素应该是您的具体商业需求。为了帮助您决定哪种选项最适合您的公司，我们将概述每种选择的优缺点。
- en: At first glance, a one-tailed alternative may appear to be the clear choice,
    as it often aligns better with business objectives. In industry applications,
    the focus is typically on improving specific metrics rather than exploring a treatment’s
    impact in both directions. This is especially relevant in A/B testing, where the
    goal is often to optimize conversion rates or enhance revenue. If the treatment
    doesn’t lead to a significant improvement the examined change won’t be implemented.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 初看之下，单尾备择假设可能看起来是明显的选择，因为它通常与商业目标更吻合。在工业应用中，重点通常在于提高特定的指标，而不是探索治疗方法在两个方向上的影响。这在A/B测试中尤为重要，其目标通常是优化转化率或增加收入。如果治疗方法没有导致显著的改进，那么所考察的变化就不会被实施。
- en: 'Beyond this conceptual advantage, we have already mentioned one key benefit
    of a one-tailed hypothesis: it requires a smaller sample size. Thus, choosing
    a one-tailed alternative can save both time and resources. To illustrate this
    advantage, the following graphs show the required sample sizes for one- and two-tailed
    hypotheses with different power levels (alpha is set at 5%).'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 除了这个概念优势之外，我们已提到单尾假设的一个关键好处：它需要的样本量更小。因此，选择单尾备择假设可以节省时间和资源。为了说明这一优势，以下图表显示了不同功效水平（α设置为5%）下单尾和双尾假设所需的样本量。
- en: '![](../Images/8b06138081c8b746630c66b11434fab7.png)'
  id: totrans-23
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/8b06138081c8b746630c66b11434fab7.png)'
- en: In this context, the decision between one- and two-tailed hypotheses becomes
    particularly important in sequential testing—a method that allows for ongoing
    data analysis without inflating the alpha level. Here, selecting a one-tailed
    test can significantly reduce the duration of the test, enabling faster decision-making,
    which is especially valuable in dynamic business environments where prompt responses
    are essential.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，单尾和双尾假设之间的选择在顺序测试中尤为重要——这是一种允许持续数据分析而不增加α水平的方法。在这里，选择单尾测试可以显著缩短测试时间，从而实现更快决策，这在需要迅速响应的动态商业环境中尤其有价值。
- en: However, don’t be too quick to dismiss the two-tailed hypothesis! It has its
    own advantages. In some business contexts, the ability to detect “negative significant
    results” is a major benefit. As one client once shared, he preferred negative
    significant results over inconclusive ones because they offer valuable learning
    opportunities. Even if the outcome wasn’t as expected, he could conclude that
    the treatment had a negative effect and gain insights into the product.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，不要急于否定双尾假设！它有其自身的优势。在某些商业环境中，能够检测到“负显著结果”的能力是一个主要优势。正如一位客户曾经分享的，他更喜欢负显著结果而不是不确定的结果，因为它们提供了宝贵的学习机会。即使结果并不如预期，他也可以得出结论，治疗方法有负面影响，并深入了解产品。
- en: Another benefit of two-tailed tests is their straightforward interpretation
    using confidence intervals (CIs). In two-tailed tests, a CI that doesn’t include
    zero directly indicates significance, making it easier for practitioners to interpret
    results at a glance. This clarity is particularly appealing since CIs are widely
    used in A/B testing platforms. Conversely, with one-tailed tests, a significant
    result might still include zero in the CI, potentially leading to confusion or
    mistrust in the findings. Although one-sided confidence intervals can be employed
    with one-tailed tests, this practice is less common.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 双尾检验的另一个好处是它们可以使用置信区间（CIs）进行直接解释。在双尾检验中，一个不包括零的置信区间直接表明显著性，这使得从业者可以一目了然地解释结果。这种清晰度特别吸引人，因为置信区间在A/B测试平台上被广泛使用。相反，在单尾检验中，一个显著的结果可能仍然包括置信区间中的零，这可能导致对发现结果的困惑或不信任。尽管在一尾检验中可以使用单侧置信区间，但这种做法并不常见。
- en: Conclusions
  id: totrans-27
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: 'By adjusting a single parameter, you can significantly impact your A/B testing:
    specifically, the sample size you need to collect and the interpretation of the
    results. When deciding between one- and two-tailed hypotheses, consider factors
    such as the available sample size, the advantages of detecting negative effects,
    and the convenience of aligning confidence intervals (CIs) with hypothesis testing.
    Ultimately, this decision should be made thoughtfully, taking into account what
    best fits your business needs.'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 通过调整单个参数，你可以显著影响你的A/B测试：具体来说，你需要收集的样本量和结果解释。在决定使用单尾还是双尾假设时，考虑因素如可用的样本量、检测负面效应的优势以及将置信区间（CIs）与假设检验对齐的便利性。最终，这个决定应该经过深思熟虑，考虑到最适合你的业务需求。
