- en: 'How to Evaluate Retrieval Quality in RAG Pipelines: Precision@k, Recall@k,
    and F1@k'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何评估RAG管道中的检索质量：Precision@k、Recall@k和F1@k
- en: 原文：[https://towardsdatascience.com/how-to-evaluate-retrieval-quality-in-rag-pipelines-precisionk-recallk-and-f1k/](https://towardsdatascience.com/how-to-evaluate-retrieval-quality-in-rag-pipelines-precisionk-recallk-and-f1k/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/how-to-evaluate-retrieval-quality-in-rag-pipelines-precisionk-recallk-and-f1k/](https://towardsdatascience.com/how-to-evaluate-retrieval-quality-in-rag-pipelines-precisionk-recallk-and-f1k/)
- en: <mdspan datatext="el1760576831852" class="mdspan-comment">In my previous posts</mdspan>,
    I have walked you through [putting together a very basic RAG pipeline in Python](https://towardsdatascience.com/hitchhikers-guide-to-rag-with-chatgpt-api-and-langchain/),
    as well as [chunking large text documents](https://towardsdatascience.com/hitchhikers-guide-to-rag-from-tiny-files-to-tolstoy-with-openais-api-and-langchain/).
    We’ve also looked into [how documents are transformed into embeddings](https://towardsdatascience.com/rag-explained-understanding-embeddings-similarity-and-retrieval/),
    allowing us to quickly search for similar documents within a vector database,
    along with [how reranking is used](https://towardsdatascience.com/rag-explained-reranking-for-better-answers/)
    to identify the most appropriate documents for answering the user’s query.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1760576831852" class="mdspan-comment">在我的之前的文章中</mdspan>，我已经向您介绍了如何在Python中构建一个非常基本的RAG管道([putting
    together a very basic RAG pipeline in Python](https://towardsdatascience.com/hitchhikers-guide-to-rag-with-chatgpt-api-and-langchain/))，以及[如何对大型文本文档进行分块](https://towardsdatascience.com/hitchhikers-guide-to-rag-from-tiny-files-to-tolstoy-with-openais-api-and-langchain/)。我们还探讨了[如何将文档转换为嵌入](https://towardsdatascience.com/rag-explained-understanding-embeddings-similarity-and-retrieval/)，使我们能够快速在向量数据库中搜索相似文档，以及[如何使用重排序](https://towardsdatascience.com/rag-explained-reranking-for-better-answers/)来识别回答用户查询的最合适的文档。
- en: So, now that we’ve retrieved the relevant documents, it’s time to pass them
    into the LLM for the generation step. But before that, it is important to be able
    to tell if the retrieval mechanism works well and can successfully identify relevant
    results. After all, retrieving the chunks that contain the answer to the user’s
    query is the very first step for being able to generate a meaningful answer.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们已经检索到了相关文档，是时候将它们传递给LLM进行生成步骤了。但在那之前，能够判断检索机制是否工作良好并且能够成功识别相关结果是很重要的。毕竟，检索到包含用户查询答案的块是生成有意义的答案的第一步。
- en: Therefore, this is exactly what we are going to explore in today’s post. In
    particular, we are going to take a look at some of the most popular metrics for
    evaluating retrieval and reranking performance.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，这正是我们今天要探讨的内容。特别是，我们将探讨一些用于评估检索和重排序性能的最流行指标。
- en: 🍨*[**DataCream**](https://datacream.substack.com/) is a newsletter offering
    stories and tutorials on AI, data, tech. If you are interested in these topics,
    **[subscribe here](https://datacream.substack.com/).***
  id: totrans-5
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 🍨*[**DataCream**](https://datacream.substack.com/) 是一个提供关于AI、数据、技术的故事和教程的通讯。如果你对这些主题感兴趣，**[在此订阅](https://datacream.substack.com/).***
- en: '**. . .**'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: '**. . .**'
- en: Why care about measuring retrieval performance
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么关注度量检索性能
- en: So, our goal is to evaluate how well our embedding model and vector database
    bring back candidate text chunks. Essentially, what we are trying to find out
    here is “*Are the right documents somewhere in the top-k retrieved set*?”, or
    does our vector search return complete garbage? 🙃 There are several different
    measures we can utilize to answer this question. Most of them originate from the
    [Information Retrieval](https://en.wikipedia.org/wiki/Information_retrieval) field.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们的目标是评估我们的嵌入模型和向量数据库检索候选文本块的效果如何。本质上，我们在这里试图弄清楚的是“*在检索到的前k个文档中是否有正确的文档*？”，或者我们的向量搜索是否返回了完全无用的信息？🙃我们可以利用几种不同的度量标准来回答这个问题。其中大部分源自[信息检索](https://en.wikipedia.org/wiki/Information_retrieval)领域。
- en: Before we begin, it’s useful to distinguish between two types of measures —
    these are **binary** and **graded** relevance measures. More specifically, binary
    measures characterize a retrieved text chunk either as relevant or irrelevant
    for answering the user’s query — there is no in between. On the contrary, graded
    measures assign a relevance value to each text chunk that is retrieved, somewhere
    in a spectrum ranging from complete irrelevance to complete relevance.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们开始之前，区分两种类型的度量标准是有用的——这些是**二元**和**分级**的相关性度量标准。更具体地说，二元度量标准将检索到的文本块描述为对回答用户查询相关或不相关——没有中间状态。相反，分级度量标准为检索到的每个文本块分配一个相关性值，这个值在从完全不相关到完全相关的一系列范围内。
- en: 'In general, binary measures characterize each chunk as relevant or irrelevant,
    a hit or a miss, a positive or a negative. As a result, when considering binary
    retrieval measures, we can end up in one of the following situations:'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，二进制度量将每个片段描述为相关或不相关，命中或未命中，正面或负面。因此，在考虑二进制检索度量时，我们可能会遇到以下情况之一：
- en: True Positive ➔ A result is retrieved in the top k and is indeed relevant to
    the user’s query; it is correctly retrieved.
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 真实正例 ➔ 一个结果被检索到前k个位置，并且确实与用户的查询相关；它被正确检索。
- en: False Positive ➔ A result is retrieved in the top k, but is in fact irrelevant;
    it is wrongly retrieved.
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 假正例 ➔ 一个结果被检索到前k个位置，但实际上并不相关；它被错误地检索。
- en: True Negative ➔ A result is not retrieved in the top k and is indeed not relevant
    to the user’s query; it is correctly not retrieved.
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 真实负例 ➔ 一个结果没有被检索到前k个位置，并且确实与用户的查询不相关；它被正确地未检索。
- en: False Negative ➔ A result is not retrieved in the top k, but it was in fact
    relevant; it is wrongly not retrieved.
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 假负例 ➔ 一个结果没有被检索到前k个位置，但实际上它是相关的；它被错误地未检索。
- en: '![](../Images/78febed1d9c027fa054d631acfea325f.png)'
  id: totrans-15
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/78febed1d9c027fa054d631acfea325f.png)'
- en: Image by author
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: As you can imagine, True situations — True Positive and True Negative — are
    what we are looking for. On the flip side, False situations — False Negative and
    False Positive — are what we are trying to minimize, but this is a rather conflicting
    goal. More specifically, in order to include all relevant results that exist (that
    is, minimize the False Negatives), we need to make our search more inclusive,
    but by making the search more inclusive, we also risk increasing the False Positives.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所想，真实情况——真实正例和真实负例——是我们所寻求的。另一方面，虚假情况——假负例和假正例——是我们试图最小化的，但这是一个相当矛盾的目标。更具体地说，为了包含所有存在的相关结果（即，最小化假负例），我们需要使我们的搜索更加全面，但通过使搜索更加全面，我们也冒着增加假正例的风险。
- en: Another distinction we can make is between order-unaware and order-aware relevance
    measures. As their names indicate, order-unaware measures only express whether
    a relevant result exists in the top k retrieved text chunks, or not. On the flip
    side, order-aware measures also take into account the ranking in which a text
    chunk appears, apart from whether it just makes an appearance on the top k chunks.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还可以区分无序相关度量与有序相关度量。正如它们的名称所暗示的，无序度量只表达是否有一个相关结果存在于前k个检索到的文本片段中，或者不。另一方面，有序度量还考虑了文本片段出现的排名，而不仅仅是它是否出现在前k个片段中。
- en: All retrieval evaluation measures can be calculated for different values of
    k, thus, we denote them as ‘*some measure’@k*, like HitRate@k or Precision@k (duh!).
    Anyways, in the rest of this post, I’ll be exploring some basic binary, order-unaware,
    retrieval evaluation metrics.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 所有检索评估指标都可以针对不同的k值进行计算，因此我们用“*某个度量’@k*”来表示它们，如HitRate@k或Precision@k（当然！）。无论如何，在本文的其余部分，我将探讨一些基本的二进制无序检索评估指标。
- en: '**. . .**'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: '**. . .**'
- en: Some order-unaware, binary measures
  id: totrans-21
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 一些无序二进制度量
- en: Binary order-unaware measures for evaluating retrieval are the most straightforward
    and intuitive to understand. Thus, they are a great starting point for getting
    our heads around what exactly we are trying to measure and evaluate. Some common
    and useful binary, order-unaware measures are **HitRate@k,** **Recall@k**, **Precision@k,
    and F1@k**. But let’s see all these in some more detail.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 用于评估检索的二进制无序度量是最直接且最直观易懂的。因此，它们是我们理解我们试图测量和评估的内容的绝佳起点。一些常见且有用的二进制无序度量包括 **HitRate@k**、**Recall@k**、**Precision@k
    和 F1@k**。但让我们更详细地看看所有这些。
- en: 🎯 HitRate@K
  id: totrans-23
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 🎯 HitRate@K
- en: 'HitRate@K is the simplest of all measures for evaluating the retrieval evaluation.
    It is a binary measure indicating whether there is at least one relevant result
    in the top k retrieved chunks, or not. Thus, it can only take two values: either
    1 (if at least one relevant doc exists in the retrieved set), or 0 (if none of
    the retrieved documents is in reality relevant). It really is the most basic measure
    of success one can imagine — at least hitting the target with something. For a
    single query and the respective retrieved set of results, HitRate@k can be calculated
    as follows:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: HitRate@K 是所有检索评估指标中最简单的一个。它是一个二元指标，表示是否在前k个检索到的片段中至少有一个相关结果。因此，它只能取两个值：要么是1（如果检索集中至少有一个相关文档），要么是0（如果检索到的文档实际上都不相关）。这真的是可以想象的最基本的成功指标——至少用某物击中目标。对于一个查询及其相应的检索结果集，HitRate@k
    可以按以下方式计算：
- en: '![](../Images/d180b049d761e2f5426b40417aab1e88.png)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/d180b049d761e2f5426b40417aab1e88.png)'
- en: Image by author
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: In this way, we can calculate different Hit Rates for all queries and retrieved
    results in a test set, and finally, calculate the average HitRate@K of the entire
    test set.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 这样，我们可以计算测试集中所有查询和检索结果的不同的命中率，并最终计算整个测试集的平均HitRate@K。
- en: '![](../Images/d6b8ee69c9df96a5ed24c5c9b966064c.png)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/d6b8ee69c9df96a5ed24c5c9b966064c.png)'
- en: Image by author
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: Arguably, Hit Rate is the simplest, most straightforward, and easiest to calculate
    retrieval metric; thus, it provides a good starting point for evaluating the retrieval
    step of our RAG pipeline.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 争议性地讲，命中率可能是最简单、最直接且最容易计算的检索指标；因此，它为我们RAG管道的检索步骤提供了一个良好的起点。
- en: 🎯 Recall@K
  id: totrans-31
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 🎯 回收率@K
- en: 'Recall@K expresses how often the *relevant* documents appear within the top
    k retrieved documents. In essence, it evaluates how good we did with avoiding
    False Negatives. Recall@k is calculated as follows:'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 回收率@K表示相关文档在检索到的前k个文档中出现的频率。本质上，它评估了我们避免错误负例的表现。回收率@k的计算方式如下：
- en: '![](../Images/898f9ef1c8f2a9895ef055ebb24ed962.png)'
  id: totrans-33
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/898f9ef1c8f2a9895ef055ebb24ed962.png)'
- en: Image by author
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: Thus, it can range from 0 to 1, with 0 indicating that we only retrieved irrelevant
    results, and 1 indicating that we only retrieved relevant results (no False Negatives).
    It is like asking ‘*Out of all the items that existed, how many did we get?*‘.
    It indicates how many out of the top k results are truly relevant.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，它可以从0到1变化，0表示我们只检索到了不相关的结果，1表示我们只检索到了相关的结果（没有错误负例）。这就像问“*在所有存在的项目中，我们得到了多少？*”。它表示在top
    k结果中有多少是真正相关的。
- en: Recall focuses on the quantity of the retrieved results — how many out of all
    the relevant results did we manage to find? Thus, it functions well as a retrieval
    measure for scenarios where we need to find as many relevant results as possible,
    even by retrieving some irrelevant ones along with them.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 回收率关注检索到的结果的数量——在所有相关结果中，我们找到了多少？因此，它作为在需要尽可能找到尽可能多的相关结果，即使这意味着检索到一些不相关结果的场景下的检索度量非常有效。
- en: Thus, the higher a Recall@k we achieve, the more relevant documents we have
    retrieved with the vector search, out of all the relevant documents that truly
    exist. On the contrary, retrieving documents with a bad Recall@k score is a rather
    bad start for the retrieval step of our RAG pipeline — if the appropriate relevant
    documents and relevant information aren’t there in the first place, no magical
    reranking or LLM model is going to fix the situation.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们实现的回收率@k越高，通过向量搜索检索到的相关文档就越多，相对于真正存在的所有相关文档。相反，如果检索到的文档的回收率@k得分很低，那么对于我们RAG管道检索步骤来说是一个相当糟糕的开始——如果一开始就没有适当的相关文档和相关信息，那么任何神奇的重新排序或LLM模型都无法解决这个问题。
- en: 🎯 Precision@k
  id: totrans-38
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 🎯 精确率@k
- en: 'Precision@k indicates how many of the top k retrieved documents are indeed
    relevant. In essence, it evaluates how good we did with not including False Positives.
    Precision@k can be calculated as follows:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 精确率@k表示在检索到的前k个文档中有多少确实是相关的。本质上，它评估了我们不包括错误正例的表现。精确率@k可以按以下方式计算：
- en: '![](../Images/f478f0f6db5e8828f31ccb0c37d4448a.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/f478f0f6db5e8828f31ccb0c37d4448a.png)'
- en: Image by author
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: In other words, precision is the answer to the question “*Out of the items that
    we retrieved, how many are correct?*“. It indicates how many of all the truly
    relevant results were successfully retrieved in the top k. As a result, it can
    range from 0 to 1, with 0 indicating that we only retrieved irrelevant results,
    and 1 indicating that we only retrieved relevant results (no irrelevant results
    retrieved — no False Positives).
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 换句话说，精确率是回答“*在我们检索到的项目中有多少是正确的？*”的问题的答案。它表示在所有真正相关的结果中，有多少在top k中被成功检索。因此，它可以从0到1变化，0表示我们只检索到了不相关的结果，1表示我们只检索到了相关的结果（没有检索到不相关的结果——没有错误正例）。
- en: Thereby, Precision@k largely emphasizes each retrieved result being valid, rather
    than exhaustively finding each and every result. In other words, Precision@k can
    serve well as a retrieval measure for scenarios valuing the quality of retrieved
    results over quantity. That is, retrieving results that we are sure are relevant,
    even if this means we mistakenly reject some relevant results.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，精确率@k主要强调每个检索到的结果的有效性，而不是全面地找到每一个结果。换句话说，精确率@k可以很好地作为在重视检索结果质量而非数量的场景下的检索度量。也就是说，检索出我们确信相关的结果，即使这意味着我们错误地拒绝了某些相关结果。
- en: 🎯 F1@K
  id: totrans-44
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 🎯 F1@K
- en: 'But what if we need both correct and complete results — what if we need the
    retrieved set to score high both in Recall and Precision? To achieve this, Recall@K
    and Precision@K can be combined into a single measure called F1@K, allowing us
    to create a score that simultaneously balances the validity and completeness of
    the retrieved results. In particular, F1@k can be calculated as follows:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 但如果我们需要正确且完整的结果——如果我们需要检索集在召回率和精确度上都得分高呢？为了实现这一点，可以将Recall@K和Precision@K合并成一个单一指标，称为F1@K，这样我们就可以创建一个同时平衡检索结果的有效性和完整性的分数。特别是，F1@k可以按以下方式计算：
- en: '![](../Images/754486d299c504610f1eb942ab454838.png)'
  id: totrans-46
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/754486d299c504610f1eb942ab454838.png)'
- en: Image by author
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: Again, F1@k can range from 0 to 1\. An F1@k value close to 1 means that both
    Precision@k and Recall@k are high, meaning the retrieved results are both accurate
    and comprehensive. On the flip side, an F1@k value close to zero means that either
    Recall@k or Recall@k is low, or even both. In this way, F1@k serves as an effective
    single metric to evaluate balanced retrieval, since it will only be high when
    both precision and recall are high.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 再次强调，F1@k的值可以从0到1。F1@k值接近1意味着Precision@k和Recall@k都很高，意味着检索到的结果既准确又全面。另一方面，F1@k值接近零意味着Recall@k或Precision@k很低，甚至两者都低。这样，F1@k作为一个有效的单一指标，可以用来评估平衡检索，因为它只有在精确度和召回率都很高时才会很高。
- en: '****. . .****'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: '****. . .****'
- en: So, is our vector search any good?
  id: totrans-50
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 那么，我们的向量搜索效果如何呢？
- en: 'So now let’s see how all these play out in the *‘War and Peace’* example by
    answering one more time my favorite question — ‘*Who is Anna Pávlovna*?’. As in
    my previous posts, I will once again be using the *[War and Peace](https://www.gutenberg.org/cache/epub/2600/pg2600.txt)* text
    as an example, licensed as Public Domain and easily accessible through [Project
    Gutenberg](https://www.gutenberg.org/). Our code thus far looks like this:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们通过再次回答我最喜欢的问题——“*谁是安娜·帕夫洛夫娜*？”来查看所有这些在“*战争与和平*”示例中的表现。正如我之前的帖子一样，我将继续使用*[战争与和平](https://www.gutenberg.org/cache/epub/2600/pg2600.txt)*文本作为示例，该文本作为公共领域作品发布，并通过[Project
    Gutenberg](https://www.gutenberg.org/)轻松访问。到目前为止，我们的代码如下所示：
- en: '[PRE0]'
  id: totrans-52
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Let’s tweak it a little bit to calculate some retrieval measures.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们稍作调整来计算一些检索指标。
- en: 'First of all, we can add the following section at the beginning of our script,
    in order to define the retrieval evaluation metrics we want to calculate:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们可以在脚本的开头添加以下部分，以定义我们想要计算的检索评估指标：
- en: '[PRE1]'
  id: totrans-55
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: In order to calculate any of those evaluation metrics, we need to first define
    a set of queries and the respective truly relevant chunks. This is a rather copious
    exercise; thus, I will be only demonstrating the process for one query — ‘*Who
    is Anna Pávlovna*? — and the respective relevant text chunks that should ideally
    be retrieved. In any case, this information — either for just one query or for
    a real-life evaluation set — can be defined in the form of a ***ground truth dictionary***,
    allowing us to map various test queries to the expected relevant text chunks.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 为了计算任何这些评估指标，我们首先需要定义一组查询和相应的真正相关片段。这是一个相当繁重的练习；因此，我将只演示一个查询的过程——“*谁是安娜·帕夫洛夫娜*？”以及应该理想地检索的相关文本片段。无论如何，这些信息——无论是针对单个查询还是针对现实生活中的评估集——都可以以**真实字典**的形式定义，使我们能够将各种测试查询映射到预期的相关文本片段。
- en: 'In particular, we can consider that the relevant chunks that should be included
    in the ground truth dictionary for our query ‘*Who is Anna Pávlovna*?’ are the
    following:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 尤其是对于我们的查询“*谁是安娜·帕夫洛夫娜*？”而言，应该包含在真实字典中的相关片段如下：
- en: '“It was in July 1805, and the speaker was the well-known Anna Pávlovna Schérer,
    maid of honor and favorite of the Empress Márya Fëdorovna. With these words, she
    greeted Prince Vasíli Kurágin, a man of high rank and importance, who was the
    first to arrive at her reception. Anna Pávlovna had had a cough for some days.
    She was, as she said, suffering from la grippe; grippe being then a new word in
    St. Petersburg, used only by the elite. All her invitations without exception,
    written in French, and delivered by a scarlet-liveried footman that morning, ran
    as follows: “If you have nothing better to do, Count (or Prince), and if the prospect
    of spending an evening with a poor invalid is not too terrible, I shall be very
    charmed to see you tonight between 7 and 10—Annette Schérer.” “'
  id: totrans-58
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: “那是1805年7月，说话者是著名的安娜·帕夫洛夫娜·谢耶尔，是女王的荣誉侍女和玛利亚·费多罗夫娜女皇的宠儿。用这些话，她向第一个到达她接待会的瓦西里·库拉金公爵，一个地位高、重要的人物致意。安娜·帕夫洛夫娜已经咳嗽了好几天。她说，她正在忍受流感；流感在当时是圣彼得堡的一个新词，只有精英阶层使用。她所有的邀请函，无一例外，都是用法语写的，由那天早上穿着猩红色制服的仆人递送，内容如下：“如果您没有什么更好的事情可做，伯爵（或公爵），如果您觉得和一个可怜的病人共度一个晚上并不太可怕，我将非常高兴在今晚7点到10点之间见到您——安妮特·谢耶尔。”
    “
- en: “Anna Pávlovna’s “At Home” was like the former one, only the novelty she offered
    her guests this time was not Mortemart, but a diplomatist fresh from Berlin with
    the very latest details of the Emperor Alexander’s visit to Potsdam, and of how
    the two august friends had pledged themselves in an indissoluble alliance to uphold
    the cause of justice against the enemy of the human race. Anna Pávlovna received
    Pierre with a shade of melancholy, evidently relating to the young man’s recent
    loss by the death of Count Bezúkhov (everyone constantly considered it a duty
    to assure Pierre that he was greatly afflicted by the death of the father he had
    hardly known), and her melancholy was just like the august melancholy she showed
    at the mention of her most august Majesty the Empress Márya Fëdorovna. Pierre
    felt flattered by this. Anna Pávlovna arranged the different groups in her drawing
    room with her habitual skill. The large group, in which were”
  id: totrans-59
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: “安娜·帕夫洛夫娜的‘在家’就像以前一样，但她这次提供给客人的新东西不是莫尔特马尔，而是一位刚从柏林来的外交官，他带来了关于皇帝亚历山大访问波茨坦的最新细节，以及两位尊贵的朋友如何承诺结成不可解的联盟，维护正义的事业，反对人类公敌。安娜·帕夫洛夫娜带着一丝忧郁接待皮埃尔，显然这与年轻人最近因贝祖霍夫伯爵去世而遭受的损失有关（每个人都认为向皮埃尔保证他深受父亲去世之痛是一种责任），她的忧郁就像她在提到她最尊贵的玛利亚·费多罗夫娜女皇时表现出的那种庄严的忧郁。皮埃尔为此感到受宠若惊。安娜·帕夫洛夫娜用她习惯的技巧在她的客厅里安排了不同的群体。其中有一大群人，包括”
- en: “drawing room with her habitual skill. The large group, in which were Prince
    Vasíli and the generals, had the benefit of the diplomat. Another group was at
    the tea table. Pierre wished to join the former, but Anna Pávlovna—who was in
    the excited condition of a commander on a battlefield to whom thousands of new
    and brilliant ideas occur which there is hardly time to put in action—seeing Pierre,
    touched his sleeve with her finger, saying:”
  id: totrans-60
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: “用她习惯的技巧画室。其中有一大群人，包括瓦西里公爵和将军们，他们得益于外交官。另一群人在茶桌旁。皮埃尔想加入前者，但安娜·帕夫洛夫娜——她正处于战场指挥官的兴奋状态，成千上万的新鲜而精彩的想法不断涌现，几乎没有时间付诸行动——看到皮埃尔，用手指碰了碰他的袖子，说：”
- en: 'In this way, we can define the ground truth for this one query and the respective
    chunks that contain the information that can answer the question as follows:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 这样，我们可以定义这个查询的ground truth以及包含可以回答问题的信息的相应块，如下所示：
- en: '[PRE2]'
  id: totrans-62
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'Finally, we can also add the following section to our `main()` function in
    order to appropriately calculate and display the evaluation metrics:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们还可以将以下部分添加到我们的`main()`函数中，以便适当地计算和显示评估指标：
- en: '[PRE3]'
  id: totrans-64
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Notice that we run the evaluation **after reranking**. Since the metrics we
    calculate— like Precision@K, Recall@K, and F1@K — **are order-unaware, evaluating
    them on the top k retrieved chunks before or after reranking yields the same results,
    as long as the set of top k items remains the same.**
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 注意到我们在**重排序**之后运行评估。因为我们计算的指标——如Precision@K、Recall@K和F1@K——**是无序的，所以在重排序前后对前k个检索到的块进行评估，只要前k个项的集合保持不变，结果都是相同的。**
- en: 'So, for our question ‘*Who is Anna Pávlovna*?’ and @k = 10, we get the following
    scores:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，对于我们的问题“*谁是安娜·帕夫洛夫娜*？”和@k = 10，我们得到以下分数：
- en: '![](../Images/7478c61297f65ef77c31465220eb39ce.png)'
  id: totrans-67
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/7478c61297f65ef77c31465220eb39ce.png)'
- en: Image by author
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: But what is the meaning of this?
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 但这个意义是什么？
- en: '@k = 10, meaning that we calculate all evaluation metrics on the top 10 retrieved
    chunks.'
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '@k = 10，意味着我们在检索到的前10个块上计算所有评估指标。'
- en: Hit@10 = True, meaning that at least one of the correct (ground truth) chunks
    was found in the top 10 retrieved chunks.
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Hit@10 = True，意味着在检索到的前10个块中至少找到了一个正确的（真实）块。
- en: Precision@10 = 0.20, meaning that out of the 10 retrieved chunks, only 2 were
    correct (0.20 = 2/10). In other words, the retriever also brought back irrelevant
    information; only 20% of what it retrieved was actually useful.
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Precision@10 = 0.20，意味着在检索到的10个块中，只有2个是正确的（0.20 = 2/10）。换句话说，检索器也带回了不相关信息；它检索到的只有20%是有用的。
- en: Recall@10 = 0.67, meaning that we retrieved 67% of all relevant chunks available
    in the ground truth within the top 10 documents.
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Recall@10 = 0.67，意味着我们在前10个文档中检索到了所有相关块中67%的块。
- en: F1@10 = 0.31, indicating the overall retrieval quality combining both precision
    and recall. An F1 score of 0.31 indicates moderate performance, and we know that
    this is due to decent recall but low precision.
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: F1@10 = 0.31，这表明结合了精确度和召回率的整体检索质量。F1得分为0.31表示中等性能，我们知道这是由于召回率尚可但精确度较低造成的。
- en: As mentioned earlier, we can calculate those metrics for any k — it makes sense
    to calculate only for values of k larger than the number of chunks per query in
    the ground truth. In this way, we can experiment with different values of k and
    understand how our retrieval system performs as we expand or narrow the scope
    of retrieved results.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 如前所述，我们可以为任何k值计算这些指标——只计算大于真实查询中每个查询块数的k值是有意义的。这样，我们可以尝试不同的k值，并了解随着检索结果范围的扩大或缩小，我们的检索系统是如何表现的。
- en: On my mind
  id: totrans-76
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在我心中
- en: While metrics like Precision@K, Recall@K, and F1@K can be computed for asingle
    query and its corresponding set of retrieved chunks (like wedid here), in a real-world
    evaluation, they are typically evaluated over a collection of queries, known as
    the test set. More precisely, each query in the test set is associated with its
    own set of ground truth relevant chunks. We then calculate the retrieval metrics
    individually for each query, and then average the results across all queries.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然，Precision@K、Recall@K和F1@K等指标可以针对单个查询及其对应的检索块集（如我们这里所做的那样）进行计算，但在现实世界的评估中，它们通常是在查询集合上评估的，这个集合被称为测试集。更精确地说，测试集中的每个查询都与它自己的真实相关块集相关联。然后我们为每个查询单独计算检索指标，然后对所有查询的结果进行平均。
- en: Ultimately, understanding the meaning of various retrieval metrics that can
    be calculated is really important for effectively evaluating and fine-tuning a
    RAG pipeline. Most importantly, an effective retrieval mechanism — finding the
    appropriate documents — is the foundation for generating meaningful answers with
    a RAG setup.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 最终，理解可以计算的各种检索指标的意义对于有效地评估和微调一个RAG管道来说非常重要。最重要的是，一个有效的检索机制——找到适当的文档——是使用RAG设置生成有意义的答案的基础。
