- en: A Data Scientist’s Guide to Docker Containers
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/a-data-scientists-guide-to-docker-containers/](https://towardsdatascience.com/a-data-scientists-guide-to-docker-containers/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1744091632793" class="mdspan-comment">For</mdspan> a ML
    <mdspan datatext="el1744142294300" class="mdspan-comment">model</mdspan> to be
    useful it needs to run somewhere. This somewhere is most likely not your local
    machine. A not-so-good model that runs in a production environment is better than
    a perfect model that never leaves your local machine.
  prefs: []
  type: TYPE_NORMAL
- en: However, the production machine is usually different from the one you developed
    the model on. So, you ship the model to the production machine, but somehow the
    model doesn’t work anymore. That’s weird, right? You tested everything on your
    local machine and it worked fine. You even wrote unit tests.
  prefs: []
  type: TYPE_NORMAL
- en: What happened? Most likely the production machine differs from your local machine.
    Perhaps it does not have all the needed dependencies installed to run your model.
    Perhaps installed dependencies are on a different version. There can be many reasons
    for this.
  prefs: []
  type: TYPE_NORMAL
- en: How can you solve this problem? One approach could be to exactly replicate the
    production machine. But that is very inflexible as for each new production machine
    you would need to build a local replica.
  prefs: []
  type: TYPE_NORMAL
- en: A much nicer approach is to use Docker containers.
  prefs: []
  type: TYPE_NORMAL
- en: Docker is a tool that helps us to create, manage, and run code and applications
    in containers. A container is a small isolated computing environment in which
    we can package an application with all its dependencies. In our case our ML model
    with all the libraries it needs to run. With this, we do not need to rely on what
    is installed on the host machine. A Docker container enables us to separate applications
    from the underlying infrastructure.
  prefs: []
  type: TYPE_NORMAL
- en: For example, we package our ML model locally and push it to the cloud. With
    this, Docker helps us to ensure that our model can run anywhere and anytime. Using
    Docker has several advantages for us. It helps us to deliver new models faster,
    improve reproducibility, and make collaboration easier. All because we have exactly
    the same dependencies no matter where we run the container.
  prefs: []
  type: TYPE_NORMAL
- en: As Docker is widely used in the industry Data Scientists need to be able to
    build and run containers using Docker. Hence, in this article, I will go through
    the basic concept of containers. I will show you all you need to know about Docker
    to get started. After we have covered the theory, I will show you how you can
    build and run your own Docker container.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: What is a container?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A container is a small, isolated environment in which everything is self-contained.
    The environment packages up all code and dependencies.
  prefs: []
  type: TYPE_NORMAL
- en: A container has five main features.
  prefs: []
  type: TYPE_NORMAL
- en: '**self-contained**: A container isolates the application/software, from its
    environment/infrastructure. Due to this isolation, we do not need to rely on any
    pre-installed dependencies on the host machine. Everything we need is part of
    the container. This ensures that the application can always run regardless of
    the infrastructure.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**isolated**: The container has a minimal influence on the host and other containers
    and vice versa.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**independent**: We can manage containers independently. Deleting a container
    does not affect other containers.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**portable**: As a container isolates the software from the hardware, we can
    run it seamlessly on any machine. With this, we can move it between machines without
    a problem.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**lightweight**: Containers are lightweight as they share the host machine’s
    OS. As they do not require their own OS, we do not need to partition the hardware
    resource of the host machine.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: This might sound similar to virtual machines. But there is one big difference.
    The difference is in how they use their host computer’s resources. Virtual machines
    are an abstraction of the physical hardware. They partition one server into multiple.
    Thus, a VM includes a full copy of the OS which takes up more space.
  prefs: []
  type: TYPE_NORMAL
- en: In contrast, containers are an abstraction at the application layer. All containers
    share the host’s OS but run in isolated processes. Because containers do not contain
    an OS, they are more efficient in using the underlying system and resources by
    reducing overhead.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ae1f5115e9816861e47a04cf459eeb18.png)'
  prefs: []
  type: TYPE_IMG
- en: Containers vs. Virtual Machines (Image by the author based on [docker.com](https://www.docker.com/resources/what-container/))
  prefs: []
  type: TYPE_NORMAL
- en: Now we know what containers are. Let’s get some high-level understanding of
    how Docker works. I will briefly introduce the technical terms that are used often.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: What is Docker?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To understand how Docker works, let’s have a brief look at its architecture.
  prefs: []
  type: TYPE_NORMAL
- en: 'Docker uses a client-server architecture containing three main parts: A Docker
    client, a Docker daemon (server), and a Docker registry.'
  prefs: []
  type: TYPE_NORMAL
- en: The Docker client is the primary way to interact with Docker through commands.
    We use the client to communicate through a REST API with as many Docker daemons
    as we want. Often used commands are docker run, docker build, docker pull, and
    docker push. I will explain later what they do.
  prefs: []
  type: TYPE_NORMAL
- en: The Docker daemon manages Docker objects, such as images and containers. The
    daemon listens for Docker API requests. Depending on the request the daemon builds,
    runs, and distributes Docker containers. The Docker daemon and client can run
    on the same or different systems.
  prefs: []
  type: TYPE_NORMAL
- en: The Docker registry is a centralized location that stores and manages Docker
    images. We can use them to share images and make them accessible to others.
  prefs: []
  type: TYPE_NORMAL
- en: Sounds a bit abstract? No worries, once we get started it will be more intuitive.
    But before that, let’s run through the needed steps to create a Docker container.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/4ea036e156b80297e50dadd63c93fa9d.png)'
  prefs: []
  type: TYPE_IMG
- en: Docker Architecture (Image by author based on [docker.com](https://docs.docker.com/get-started/docker-overview/))
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: What do we need to create a Docker container?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'It is simple. We only need to do three steps:'
  prefs: []
  type: TYPE_NORMAL
- en: create a Dockerfile
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: build a Docker Image from the Dockerfile
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: run the Docker Image to create a Docker container
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Let’s go step-by-step.
  prefs: []
  type: TYPE_NORMAL
- en: A Dockerfile is a text file that contains instructions on how to build a Docker
    Image. In the Dockerfile we define what the application looks like and its dependencies.
    We also state what process should run when launching the Docker container. The
    Dockerfile is composed of layers, representing a portion of the image’s file system.
    Each layer either adds, removes, or modifies the layer below it.
  prefs: []
  type: TYPE_NORMAL
- en: Based on the Dockerfile we create a Docker Image. The image is a read-only template
    with instructions to run a Docker container. Images are immutable. Once we create
    a Docker Image we cannot modify it anymore. If we want to make changes, we can
    only add changes on top of existing images or create a new image. When we rebuild
    an image, Docker is clever enough to rebuild only layers that have changed, reducing
    the build time.
  prefs: []
  type: TYPE_NORMAL
- en: A Docker Container is a runnable instance of a Docker Image. The container is
    defined by the image and any configuration options that we provide when creating
    or starting the container. When we remove a container all changes to its internal
    states are also removed if they are not stored in a persistent storage.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 'Using Docker: An example'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: With all the theory, let’s get our hands dirty and put everything together.
  prefs: []
  type: TYPE_NORMAL
- en: As an example, we will package a simple ML model with Flask in a Docker container.
    We can then run requests against the container and receive predictions in return.
    We will train a model locally and only load the artifacts of the trained model
    in the Docker Container.
  prefs: []
  type: TYPE_NORMAL
- en: 'I will go through the general workflow needed to create and run a Docker container
    with your ML model. I will guide you through the following steps:'
  prefs: []
  type: TYPE_NORMAL
- en: build model
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: create `requirements.txt` file containing all dependencies
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: create `Dockerfile`
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: build docker image
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: run container
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Before we get started, we need to install Docker Desktop. We will use it to
    view and run our Docker containers later on.
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Build a model
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: First, we will train a simple RandomForestClassifier on `scikit-learn`’s Iris
    dataset and then store the trained model.
  prefs: []
  type: TYPE_NORMAL
- en: 'Second, we build a script making our model available through a Rest API, using
    Flask. The script is also simple and contains three main steps:'
  prefs: []
  type: TYPE_NORMAL
- en: extract and convert the data we want to pass into the model from the payload
    JSON
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: load the model artifacts and create an onnx session and run the model
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: return the model’s predictions as json
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: I took most of the code from [here](https://onnx.ai/sklearn-onnx/index.html)
    and [here](https://github.com/docker/awesome-compose/tree/master/flask) and made
    only minor changes.
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Create requirements
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Once we have created the Python file we want to execute when the Docker container
    is running, we must create a `requirements.txt` file containing all dependencies.
    In our case, it looks like this:'
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Create Dockerfile
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The last thing we need to prepare before being able to build a Docker Image
    and run a Docker container is to write a Dockerfile.
  prefs: []
  type: TYPE_NORMAL
- en: The Dockerfile contains all the instructions needed to build the Docker Image.
    The most common instructions are
  prefs: []
  type: TYPE_NORMAL
- en: '`FROM <image>` — this specifies the base image that the build will extend.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`WORKDIR <path>` — this instruction specifies the “working directory” or the
    path in the image where files will be copied and commands will be executed.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`COPY <host-path><image-path>` — this instruction tells the builder to copy
    files from the host and put them into the container image.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`RUN <command>` — this instruction tells the builder to run the specified command.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`ENV <name><value>` — this instruction sets an environment variable that a
    running container will use.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`EXPOSE <port-number>` — this instruction sets the configuration on the image
    that indicates a port the image would like to expose.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`USER <user-or-uid>` — this instruction sets the default user for all subsequent
    instructions.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`CMD ["<command>", "<arg1>"]` — this instruction sets the default command a
    container using this image will run.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'With these, we can create the Dockerfile for our example. We need to follow
    the following steps:'
  prefs: []
  type: TYPE_NORMAL
- en: Determine the base image
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Install application dependencies
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Copy in any relevant source code and/or binaries
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Configure the final image
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Let’s go through them step by step. Each of these steps results in a layer in
    the Docker Image.
  prefs: []
  type: TYPE_NORMAL
- en: First, we specify the base image that we then build upon. As we have written
    in the example in Python, we will use a Python base image.
  prefs: []
  type: TYPE_NORMAL
- en: Second, we set the working directory into which we will copy all the files we
    need to be able to run our ML model.
  prefs: []
  type: TYPE_NORMAL
- en: Third, we refresh the package index files to ensure that we have the latest
    available information about packages and their versions.
  prefs: []
  type: TYPE_NORMAL
- en: Fourth, we copy in and install the application dependencies.
  prefs: []
  type: TYPE_NORMAL
- en: Fifth, we copy in the source code and all other files we need. Here, we also
    expose port 8080, which we will use for interacting with the ML model.
  prefs: []
  type: TYPE_NORMAL
- en: Sixth, we set a user, so that the container does not run as the root user
  prefs: []
  type: TYPE_NORMAL
- en: Seventh, we define that the `example.py` file will be executed when we run the
    Docker container. With this, we create the Flask server to run our requests against.
  prefs: []
  type: TYPE_NORMAL
- en: Besides creating the Dockerfile, we can also create a `.dockerignore` file to
    improve the build speed. Similar to a `.gitignore` file, we can exclude directories
    from the build context.
  prefs: []
  type: TYPE_NORMAL
- en: If you want to know more, please go to [docker.com](https://docs.docker.com/get-started/docker-concepts/building-images/writing-a-dockerfile/).
  prefs: []
  type: TYPE_NORMAL
- en: 4\. Create Docker Image
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: After we created all the files we needed to build the Docker Image.
  prefs: []
  type: TYPE_NORMAL
- en: To build the image we first need to open Docker Desktop. You can check if Docker
    Desktop is running by running `docker ps` in the command line. This command shows
    you all running containers.
  prefs: []
  type: TYPE_NORMAL
- en: To build a Docker Image, we need to be at the same level as our Dockerfile and
    `requirements.txt` file. We can then run `docker build -t our_first_image .` The
    `-t` flag indicates the name of the image, i.e., `our_first_image`, and the `.`
    tells us to build from this current directory.
  prefs: []
  type: TYPE_NORMAL
- en: Once we built the image we can do several things. We can
  prefs: []
  type: TYPE_NORMAL
- en: view the image by running `docker image ls`
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: view the history or how the image was created by running `docker image history
    <image_name>`
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: push the image to a registry by running `docker push <image_name>`
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 5\. Run Docker Container
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Once we have built the Docker Image, we can run our ML model in a container.
  prefs: []
  type: TYPE_NORMAL
- en: For this, we only need to execute `docker run -p 8080:8080 <image_name>` in
    the command line. With `-p 8080:8080` we connect the local port (8080) with the
    port in the container (8080).
  prefs: []
  type: TYPE_NORMAL
- en: If the Docker Image doesn’t expose a port, we could simply run `docker run <image_name>`.
    Instead of using the `image_name`, we can also use the `image_id`.
  prefs: []
  type: TYPE_NORMAL
- en: Okay, once the container is running, let’s run a request against it. For this,
    we will send a payload to the endpoint by running `curl` `X POST http://localhost:8080/invocations
    -H "Content-Type:application/json" -d @.path/to/sample_payload.json`
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this article, I showed you the basics of Docker Containers, what they are,
    and how to build them yourself. Although I only scratched the surface it should
    be enough to get you started and be able to package your next model. With this
    knowledge, you should be able to avoid the “it works on my machine” problems.
  prefs: []
  type: TYPE_NORMAL
- en: I hope that you find this article useful and that it will help you become a
    better Data Scientist.
  prefs: []
  type: TYPE_NORMAL
- en: See you in my next article and/or leave a comment.
  prefs: []
  type: TYPE_NORMAL
