- en: 'AI Agents for Supply Chain Optimisation: Production Planning'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/ai-agents-for-supply-chain-optimisation-production-planning/](https://towardsdatascience.com/ai-agents-for-supply-chain-optimisation-production-planning/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1755743746662" class="mdspan-comment">AI agents</mdspan>,
    when combined with analytics products, can transform into powerful tools for supply
    chain optimisation.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: '*In manufacturing, the real challenge is not producing goods, but deciding
    when and how much to produce.*'
  id: totrans-3
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: This quote is from a plant director who contacted us for the implementation
    of an algorithm to improve their **Master Production Schedule (MPS).**
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a826065544c6068dacb923b31c47ccdf.png)'
  id: totrans-5
  prefs: []
  type: TYPE_IMG
- en: Production Planning Process (Image by Samir Saci)
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: The objective was to generate production schedules that balance economies of
    scale with minimal inventory.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: Our initial solution was a **web application** connected to the factory systems.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d426dc527a917decb708066b89883024.png)'
  id: totrans-9
  prefs: []
  type: TYPE_IMG
- en: Screenshot of the web application with some of the parameters to select (Image
    by Samir Saci)
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: While it generated optimal production plans, it still required planners to navigate
    dashboards and export results.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: '*How to improve the user experience with an AI layer on top?*'
  id: totrans-12
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: As an experiment, we packaged the optimisation engine into a FastAPI microservice
    embedded within an **AI workflow built using n8n. **
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: The tool evolved into an AI assistant (integrated in the planners’ workflow)
    that can understand inputs, run the algorithm and deliver optimised plans with
    explanations in plain English.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/4bbb48614cc747d177d33f4184ec6166.png)'
  id: totrans-15
  prefs: []
  type: TYPE_IMG
- en: Example of outputs from the AI Agent – (Image by Samir Saci)
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: In this article, I present how we conducted this experiment of using **AI Agents
    for Supply Chain Optimisation with n8n.**
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
- en: This will be the first of a long series of experiments trying to build a Supply
    Chain Optimisation “super-agent” equipped with algorithms packaged in FastAPI
    microservices.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: Production Planning with Python
  id: totrans-19
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Scenario
  id: totrans-20
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Let us assume that we are supporting a medium-sized factory in Europe.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: The master production schedule is the primary communication tool between the
    commercial team and production.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: In our client’s factory, customers send purchase orders (PO) with quantities
    and expected delivery dates to their planning team.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/99f0892a57766b06b34247c05e775934.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
- en: Demand Forecasts for the next 12 months – (Image by Samir Saci)
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
- en: For example,
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
- en: Expected delivery quantity in `Month 2` is `150 boxes`
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Initial Solution
  id: totrans-28
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The objective of the planning team is to find the optimal production plan to
    minimise production costs, considering:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
- en: '**Setup Costs**: fixed costs you have each time you set up a production line'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Example: 500 $ per production batch*'
  id: totrans-31
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: '**Holding Costs**: cost of storage per unit per time'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Example: 1 $/unit/month*'
  id: totrans-33
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: If **you produce only the quantity needed per month**, you can minimise the
    holding costs.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/10993befc99c11398ee2f3300b5c2836.png)'
  id: totrans-35
  prefs: []
  type: TYPE_IMG
- en: 'Extreme Case 1: Producing only the quantity needed each month (Image by Samir
    Saci)'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
- en: But setup costs will explode as you have to set up the production line **12
    times.**
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
- en: On the contrary, if you produce the total quantity in the first month, you will
    only have one setup, but your holding costs will explode.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/6c06bb6cf883b4528bf206eade5e7c2c.png)'
  id: totrans-39
  prefs: []
  type: TYPE_IMG
- en: 'Extreme Case 2: Producing the total quantity in a single batch (Image by Samir
    Saci)'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
- en: You build an inventory of 2,000 boxes in the first month, which will be **slowly
    consumed** over the 12 months.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
- en: There is an optimal scenario between these two edge cases.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
- en: '*How to find the right balance?*'
  id: totrans-43
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[In another article](https://towardsdatascience.com/production-fixed-horizon-planning-with-python-8dd38b468e86/),
    I explain how to use the **Wagner-Within algorithm** to generate an optimised
    plan.'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
- en: This is a dynamic programming method for production planning that finds the
    cost-optimal schedule over multiple periods.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/09da86eb6795b8f3c82ad7ffc709407f.png)'
  id: totrans-46
  prefs: []
  type: TYPE_IMG
- en: Wagner-Within Implementation explained [in this article](https://towardsdatascience.com/production-fixed-horizon-planning-with-python-8dd38b468e86/)
    – (Image by Samir Saci)
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
- en: It finds the best balance between setup and holding costs by evaluating all
    feasible production plans.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/fa8217ea59b45405b315ddf6d5826ddd.png)'
  id: totrans-49
  prefs: []
  type: TYPE_IMG
- en: Optimal Production Plan generated by Wagner Within Algorithm (Image by Samir
    Saci)
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
- en: 'The output is an optimal plan:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
- en: '4 months (only) of productions: Month 1, 6, 9 and 11 ;'
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The inventory is consumed between each production batch.
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In the animated GIF below, you can visualise a demo of the deployed solution
    on a web application.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/9b2147f9a0ae8c6eac97633da12a4a2a.png)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
- en: Demo of the Production Module (Image by Samir Saci)
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
- en: Users can
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
- en: Upload their demand forecasts per month, week or day
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Select the parameters (setup costs, holding costs, …)
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Can we improve the user experience with the support of AI?*'
  id: totrans-60
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: To improve the productivity of planners, we aim to eliminate the UI and directly
    integrate the solution into their workflow using AI.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
- en: In the next section, I will share the experiments we conducted using a prototype
    of this AI-powered workflow built with n8n.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
- en: 👉 Check the video linked below for a live demo of the workflow
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
- en: AI Workflow with FastAPI and n8n
  id: totrans-64
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: From the feedback received during the User Acceptance Tests (UAT), we understood
    that they would need the tool to be better integrated into their current processes
    and workflows.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
- en: AI Agents equipped with tools
  id: totrans-66
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The planning optimisation algorithm has been packaged in a FastAPI backend with
    multiple endpoints
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
- en: '**/upload_prod**: this endpoint receives a POST request with the demand dataset
    included to upload it to the backend'
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**/launch_plan**: this endpoint receives a GET request with parameters like
    setup cost, holding cost, and time unit'
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/06a9343d11dd97ba19f27e1826ec7df6.png)'
  id: totrans-70
  prefs: []
  type: TYPE_IMG
- en: FastAPI Backend that can be connected to n8n workflows – (Image by Samir Saci)
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
- en: How to connect this backend with an AI Agent?
  id: totrans-72
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: We will use an AI Agent node in n8n, equipped with a tool node that can send
    and receive HTTP requests.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/45d464126e3e2bc566f6b1f14f2a3ab6.png)'
  id: totrans-74
  prefs: []
  type: TYPE_IMG
- en: AI Agent Node Equipped with API Tool Node – (Image by Samir Saci)
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
- en: 'For all usages, the architecture of this AI Agent node will be identical:'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
- en: 'Large Language Model: In the example above, we use an OpenAI model'
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: HTTP request node with a system message that explains how to connect to the
    API and what type of data to expect as outputs
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This node will be used to generate a summary of the optimal production plan,
    which will be sent via email.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
- en: 'AI Workflow: Automated Email Reply'
  id: totrans-80
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Production planners typically receive their requests from the commercial team
    via email, which includes details in the body and requested volumes by period
    in the attachment.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/8b20871fc576b90ad71197cf056cb764.png)'
  id: totrans-82
  prefs: []
  type: TYPE_IMG
- en: Example of Email received by the planning team (Image by Samir Saci)
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
- en: They wanted to automatically answer these requests without manually downloading
    the attachment, uploading it to the UI and generating an email based on the results
    shown in the UI.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
- en: 'It has been agreed with them that they will follow a specific format of emails
    to ensure that all information required is included:'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
- en: '**Attachment**: demand dataset in (.csv) format'
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Email body**: all the parameters needed, like holding costs, setup costs,
    currency'
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/13e3279f2100ae2c34e598389981a296.png)'
  id: totrans-88
  prefs: []
  type: TYPE_IMG
- en: Example of Request Received by Email – (Image by Samir Saci)
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
- en: The AI Agent presented before will receive data from another agent that will
    parse the email to extract the relevant parameters.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/53f55b2ffc3524b91ec1ec1a2ceab5bf.png)'
  id: totrans-91
  prefs: []
  type: TYPE_IMG
- en: AI Workflow for fully automated email reply (Image by Samir Saci)
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 1: Collect Email and Download the Attachment'
  id: totrans-93
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The Gmail trigger node collects the email body and downloads the attachment.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/7b7314851077f72ab155274e0399a9b3.png)'
  id: totrans-95
  prefs: []
  type: TYPE_IMG
- en: Focus on the upload of demand data – (Image by Samir Saci)
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
- en: The (.csv) file is converted into JSON and sent via POST request to the backend.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
- en: Now that the dataset is uploaded, we can provide the email body to the first
    AI Agent node.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 2: Generating the Optimal Production Plan'
  id: totrans-99
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We have two AI agent nodes in this workflow
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
- en: '**The AI Agent Parser** parses the email content to extract the parameters,
    which are returned in JSON format.'
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**The AI Agent API Request** ingests these parameters and queries the FastAPI
    backend to retrieve the outputs used to generate the written analysis.'
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/531f174aee5f22b643d36eb3899b21ba.png)'
  id: totrans-103
  prefs: []
  type: TYPE_IMG
- en: Focus on the agentic part of the workflow – (Image by Samir Saci)
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
- en: In the system prompt of the first AI Agent node, we detail how to parse the
    email to collect the proper parameters.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a7859bbdbfefcf4926f60a503ddb70ac.png)'
  id: totrans-106
  prefs: []
  type: TYPE_IMG
- en: System Prompt – (Image by Samir Saci)
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
- en: The outputs of this AI Agent Parser are sent to the second AI Agent that will
    query the backend.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/37def9eac106a1704d41044784325c45.png)'
  id: totrans-109
  prefs: []
  type: TYPE_IMG
- en: Outputs of the AI Agent Parser from the email shared above – (Image by Samir
    Saci)
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
- en: In a minimal system prompt, we instruct the **AI Agent API Request** on how
    to use the tool.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
- en: 'We provide an overview of the parameters available:'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/4ef9b57e392d91f5db20d9b72f8a2d2a.png)'
  id: totrans-113
  prefs: []
  type: TYPE_IMG
- en: Overview of parameters in the system prompt – (Image by Samir Saci)
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
- en: 'We list the outputs of the API’s endpoint:'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/15fe9b1fe6121622de03584afc3b7a73.png)'
  id: totrans-116
  prefs: []
  type: TYPE_IMG
- en: List of the outputs in the system prompt – (Image by Samir Saci)
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
- en: 'We detail the task expected:'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a460916c4837ed99aa06b7f8debf62cb.png)'
  id: totrans-119
  prefs: []
  type: TYPE_IMG
- en: Task detailed in the system prompt – (Image by Samir Saci)
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
- en: The output of the second agent is sent back to the commercial team via email
    using the last Gmail node.
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/14b14e83a8fa24fbcf88a75e66837052.png)'
  id: totrans-122
  prefs: []
  type: TYPE_IMG
- en: Example of Summary Provided by the AI Agent – (Image by Samir Saci)
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
- en: The summary includes the minimal set of information (costs, production batches)
    needed by the commercial to provide a quotation to the customer.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  id: totrans-125
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This workflow has been deployed as a POC with two users who provided encouraging
    feedback.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
- en: We are looking for business cases to productize this approach and propose the
    feature for all our analytics products.
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
- en: So far, it has been decided that this feature would be used **for orders with
    non-critical items.**
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
- en: AI Workflows as enablers
  id: totrans-129
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Based on my experience in designing and implementing analytics products, the
    primary obstacle to the rapid adoption of a tool is its integration into existing
    processes and workflows.
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
- en: For product planners who manage 100+ references with dozens of customers and
    internal stakeholders, it is preferable to avoid learning a new tool with a specific
    interface and additional manual steps.
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
- en: Therefore, AI agents can be utilised to integrate a tool into any existing workflow
    with minimal impact and additional workload for users.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
- en: With the support of n8n, we have experimented with integrating our analytics
    products with Jira for workforce planning, as well as utilising Telegram for transportation
    routing and ERP modules used by our customers.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
- en: What’s next?
  id: totrans-134
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This workflow can be enhanced to leverage the full potential of large language
    models (LLMs).
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
- en: For instance, we can ask the agents to simulate multiple scenarios of volumes
    to advise the customer on whether to increase or reduce their ordered quantity
    to obtain a better price.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
- en: As long as we have explained to the agent how to use the tool (i.e., our analytic
    product, packaged in a FastAPI microservice), we can work with it as if we have
    an analyst who can run scenarios.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
- en: About Me
  id: totrans-138
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let’s connect on [Linkedin](https://www.linkedin.com/in/samir-saci/) and [Twitter](https://twitter.com/Samir_Saci_).
    I am a Supply Chain Engineer who uses data analytics to improve logistics operations
    and reduce costs.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
- en: For consulting or advice on analytics and sustainable supply chain transformation,
    feel free to contact me via [Logigreen Consulting](https://www.logi-green.com/).
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 如需咨询或获取关于分析和可持续供应链转型的建议，请通过[Logigreen Consulting](https://www.logi-green.com/)联系我。
- en: If you are interested in Data Analytics and Supply Chain, look at my website.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你对数据分析和供应链感兴趣，请查看我的网站。
