- en: Data Tokenization
  id: totrans-42
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据标记化
- en: 'Data tokenization is a security technique where sensitive data, such as credit
    card numbers or social security numbers, is replaced with randomized tokens. SQL
    itself doesn’t inherently support tokenization, but it can work with tokenized
    data through:'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 数据标记化是一种安全技术，其中敏感数据，如信用卡号或社会保险号，被随机标记符所替代。SQL 本身并不固有地支持标记化，但它可以通过以下方式与标记化数据协同工作：
- en: '**Lookup Tables**: A mapping table associates tokens with their original values.'
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**查找表**：映射表将标记与它们的原始值关联起来。'
- en: '**Encryption or Hash Functions**: While not true tokenization, these methods
    can obfuscate data.'
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**加密或哈希函数**：虽然这不是真正的标记化，但这些方法可以混淆数据。'
- en: Data tokenization is not considered as a typical methodology to clean up an
    unstructured dataset. But it’s an important technique for text-mining especially
    more and more
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 数据标记化通常不被视为清理非结构化数据集的典型方法。但它是文本挖掘中一个重要的技术，尤其是随着越来越多的
- en: Data tokenization is not typically considered a methodology for cleaning unstructured
    datasets. However, it is an important technique for text mining, especially as
    data privacy are increasingly breached and data security become serious risks
    in data usage.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 数据分词通常不被视为清理非结构化数据集的方法。然而，它是对文本挖掘非常重要的技术，尤其是在数据隐私越来越受到侵犯，数据安全成为数据使用中的严重风险时。
- en: '* * *'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
