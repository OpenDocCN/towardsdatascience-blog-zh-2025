  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: Table_1（作者模拟数据）
- en: 'However, the datasets that we encounter in reality are mostly like Table_2:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我们在现实中遇到的数据集大多像 Table_2：
- en: '![Table_2: customer support log (mock data by the author)](../Images/d4ce74a5414c2ff101c6bcde356f4bd8.png)'
