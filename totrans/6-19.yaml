  id: totrans-62
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 处理非结构化数据的SQL示例
- en: 'Let’s revisit Table_2: the customer support logs table, and use the techniques
    mentioned above to convert the unstructured data into a structured data table
    which is ready for analysis.'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们重新审视Table_2：客户支持日志表，并使用上述技术将非结构化数据转换为结构化数据表，以便进行分析。
- en: '![Table_2: customer support log (mock data by the author)](../Images/d4ce74a5414c2ff101c6bcde356f4bd8.png)'
  id: totrans-64
  prefs: []
  type: TYPE_IMG
  zh: '![Table_2：客户支持日志（作者模拟数据）](../Images/d4ce74a5414c2ff101c6bcde356f4bd8.png)'
- en: 'Table_2: customer support log (mock data by the author)'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: Table_2：客户支持日志（作者模拟数据）
- en: 'Here are the tasks that we aim to accomplish:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是我们旨在完成的任务：
- en: Extract customer name and age from the `customer_data` column.
  id: totrans-67
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从`customer_data`列中提取客户姓名和年龄。
- en: Handle the missing values in the `issue_description` column.
  id: totrans-68
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 处理`issue_description`列中的缺失值。
- en: Extract the priority and status of each ticket from the `extra_info` column
    to help the IT team prioritize workloads and track status of each ticket.
  id: totrans-69
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 从`extra_info`列中提取每个票证的优先级和状态，以帮助IT团队优先处理工作负载并跟踪每个票证的状态。
- en: Extract the resolution time (in hours) for further analysis.
  id: totrans-70
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提取解决时间（以小时为单位）以进行进一步分析。
- en: Rank tickets by the length of the `issue_description` .
  id: totrans-71
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 按照问题描述的长度对票证进行排序。
- en: Tokenize phone numbers to protect customer privacy.
  id: totrans-72
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对电话号码进行分词以保护客户隐私。
