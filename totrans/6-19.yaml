  prefs: []
  type: TYPE_NORMAL
  zh: COALESCE()函数是一个返回一系列表达式中的第一个非空值的函数。它在处理不完整或不一致的数据时非常有用，这在非结构化数据集中非常常见。COALESCE()函数的语法如下：
