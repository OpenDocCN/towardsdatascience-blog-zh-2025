  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Text Analytics with Window Functions
  id: totrans-35
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 基于窗口函数的文本分析
- en: Window functions perform calculations across a specified set of rows, known
    as a "window", from a query and return a single value related to the current row.
    You can refer to my another article ***‘The Most Useful Advanced SQL Techniques
    to Succeed in the Tech Industry’*** to have a thorough understanding of the syntax,
    benefits and use cases of window functions.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 窗口函数在查询的指定行集（称为“窗口”）上执行计算，并返回与当前行相关的单个值。您可以参考我的另一篇文章 ***‘在技术行业中取得成功的最有用的高级 SQL
    技巧’***，以深入了解窗口函数的语法、优势和用例。
- en: '[**The Most Useful Advanced SQL Techniques to Succeed in the Tech Industry**](https://towardsdatascience.com/the-most-useful-advanced-sql-techniques-to-succeed-in-the-tech-industry-0f0690e8386c)'
  id: totrans-37
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[**在技术行业中取得成功的最有用的高级 SQL 技巧**](https://towardsdatascience.com/the-most-useful-advanced-sql-techniques-to-succeed-in-the-tech-industry-0f0690e8386c)'
- en: Besides the capability of computing metrics across partitions, window functions
    can be used for text-based analysis as well, which very few people have realised.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 除了在分区上计算指标的能力之外，窗口函数还可以用于基于文本的分析，这是很少有人意识到的。
