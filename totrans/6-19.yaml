  prefs: []
  type: TYPE_IMG
  zh: '![Table_2: 客户支持日志（作者模拟数据）](../Images/d4ce74a5414c2ff101c6bcde356f4bd8.png)'
- en: 'Table_2: customer support log (mock data by the author)'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 'Table_2: 客户支持日志（作者模拟数据）'
- en: The main differences between these two tables are whether the data is well organized
    with rows and column and only presented in numbers or text. Due to these differences,
    the data in Table_1 is called **structured data** while the data in Table_2 is
    categorized as **unstructured data**.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 这两个表的主要区别在于数据是否组织得很好，有行和列，并且只以数字或文本形式呈现。由于这些差异，Table_1 中的数据被称为**结构化数据**，而 Table_2
    中的数据被归类为**非结构化数据**。
- en: '**Unstructured data** refers to information that doesn’t have a predetermined
    structure or format. It’s difficult to store and manage in relational database.
    But it often contains valuable information which is useful for generating data
    insights, training machine learning models, or performing natural language processing
    (NLP).'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: '**非结构化数据**指的是没有预定结构或格式的信息。它在关系型数据库中难以存储和管理。但它通常包含有价值的信息，这些信息对于生成数据洞察、训练机器学习模型或执行自然语言处理（NLP）非常有用。'
- en: In this article, I’ll introduce 7 advanced SQL techniques used to hand unstructured
    data. Although we called these techniques ‘advanced’ in SQL, they actually construct
    the foundation of data parsing or texting mining.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我将介绍用于处理非结构化数据的 7 种高级 SQL 技术。虽然我们在 SQL 中将这些技术称为“高级”，但它们实际上构成了数据解析或文本挖掘的基础。
- en: '* * *'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: JSON Parsing
  id: totrans-14
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: JSON 解析
- en: 'JSON data is the short form of "JavaScript Object Notation" data. It is a text-based
    format used in web development to exchange information between a server and a
    web application. JSON data is widely used because of its advantages like ease
    of use, platform independence and flexibility. But we can never directly analyze
    and obtain insights from JSON data due to its complex structure and varying levels
    of nesting for data storage. The syntax for JSON parsing is as follows:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: JSON 数据是“JavaScript 对象表示法”数据的简称。它是一种基于文本的格式，用于在 Web 开发中在服务器和 Web 应用程序之间交换信息。JSON
    数据因其易用性、平台独立性和灵活性等优势而得到广泛应用。但由于其复杂的结构和数据存储的嵌套级别不同，我们无法直接分析和从 JSON 数据中获得洞察。JSON
    解析的语法如下：
- en: '[PRE0]'
  id: totrans-16
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: In Table_2, column `customer_data` is JSON data, which can be converted to two
    columns `name` and `age` .
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Table_2 中，`customer_data` 列是 JSON 数据，可以转换为两个列 `name` 和 `age`。
