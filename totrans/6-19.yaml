- en: Photo by [Etienne Girardet](https://unsplash.com/@etiennegirardet?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  prefs: []
  type: TYPE_NORMAL
- en: 'The ideal dataset for data analysis is like Table_1:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Table_1 (mock data by the author)](../Images/38c0a07502f6bfb852d26b7f163dfb21.png)'
  prefs: []
  type: TYPE_IMG
- en: Table_1 (mock data by the author)
  prefs: []
  type: TYPE_NORMAL
- en: 'However, the datasets that we encounter in reality are mostly like Table_2:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Table_2: customer support log (mock data by the author)](../Images/d4ce74a5414c2ff101c6bcde356f4bd8.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Table_2: customer support log (mock data by the author)'
  prefs: []
  type: TYPE_NORMAL
- en: The main differences between these two tables are whether the data is well organized
    with rows and column and only presented in numbers or text. Due to these differences,
    the data in Table_1 is called **structured data** while the data in Table_2 is
    categorized as **unstructured data**.
  prefs: []
  type: TYPE_NORMAL
- en: '**Unstructured data** refers to information that doesn’t have a predetermined
    structure or format. It’s difficult to store and manage in relational database.
    But it often contains valuable information which is useful for generating data
    insights, training machine learning models, or performing natural language processing
    (NLP).'
  prefs: []
  type: TYPE_NORMAL
- en: In this article, I’ll introduce 7 advanced SQL techniques used to hand unstructured
    data. Although we called these techniques ‘advanced’ in SQL, they actually construct
    the foundation of data parsing or texting mining.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: JSON Parsing
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'JSON data is the short form of "JavaScript Object Notation" data. It is a text-based
    format used in web development to exchange information between a server and a
    web application. JSON data is widely used because of its advantages like ease
    of use, platform independence and flexibility. But we can never directly analyze
    and obtain insights from JSON data due to its complex structure and varying levels
    of nesting for data storage. The syntax for JSON parsing is as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: In Table_2, column `customer_data` is JSON data, which can be converted to two
    columns `name` and `age` .
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: '![Output of JSON parsing (screenshot by the author)](../Images/4c64138e6058f31cbdb335a4c93e8e32.png)'
  prefs: []
  type: TYPE_IMG
- en: Output of JSON parsing (screenshot by the author)
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Regular Expression
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'A regular expression(regex) is a sequence of characters used to define a search
    pattern. Regex allows developers to find and manipulate complex string data within
    a database by matching specific patterns within text. The syntax for regex in
    SQL is:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: Regex is widely used for flexible search, data validation and data extraction.
    A typical use case is to ***extract emails from text***.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: Sometimes people tend to confuse `REGEXP` operator with `LIKE` operator. Both
    operators are used in SQL to perform pattern matching within strings. But `LIKE`
    only supports basic wildcards while `REGEXP` allows for complex pattern using
    regular expression syntax and offers greater flexibility for advanced pattern
    matching scenarios duo to its more robust syntax. Meanwhile, Regex requires more
    understanding of the structure of the original data, which may be challenging.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Key-Value Pair Parsing
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: When using JSON parsing, the format is comparably standardized. If the string
    data has more complex structures but the key and value are separated by a delimiter
    like a colon, a semicolon or an equal sign, JSON parsing may not be enough for
    data extraction. Instead, we should use **Key-Value Pair Parsing**.
  prefs: []
  type: TYPE_NORMAL
- en: '**Key-Value Pair Parsing** is the process of extracting and separating data
    stored in a format where each piece of information is represented as a "key" paired
    with its corresponding "value". This method is implemented with string functions
    or regular expressions (regex).'
  prefs: []
  type: TYPE_NORMAL
- en: String functions like `SUBSTRING` , `SUBSTRING_INDEX`, `POSITION` and `REPLACE`
    are frequently used to extract key and values parts based on the delimiters. An
    example of using `SUBSTRING_INDEX` function for paring key-value pairs is as follows.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Text Analytics with Window Functions
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Window functions perform calculations across a specified set of rows, known
    as a "window", from a query and return a single value related to the current row.
    You can refer to my another article ***‘The Most Useful Advanced SQL Techniques
    to Succeed in the Tech Industry’*** to have a thorough understanding of the syntax,
    benefits and use cases of window functions.
  prefs: []
  type: TYPE_NORMAL
- en: '[**The Most Useful Advanced SQL Techniques to Succeed in the Tech Industry**](https://towardsdatascience.com/the-most-useful-advanced-sql-techniques-to-succeed-in-the-tech-industry-0f0690e8386c)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Besides the capability of computing metrics across partitions, window functions
    can be used for text-based analysis as well, which very few people have realised.
  prefs: []
  type: TYPE_NORMAL
- en: 'The applications of window functions for text-based analysis are versatile.
    For example, if we’d like to rank the text by length, we can use the syntax below:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Data Tokenization
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Data tokenization is a security technique where sensitive data, such as credit
    card numbers or social security numbers, is replaced with randomized tokens. SQL
    itself doesn’t inherently support tokenization, but it can work with tokenized
    data through:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Lookup Tables**: A mapping table associates tokens with their original values.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Encryption or Hash Functions**: While not true tokenization, these methods
    can obfuscate data.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Data tokenization is not considered as a typical methodology to clean up an
    unstructured dataset. But it’s an important technique for text-mining especially
    more and more
  prefs: []
  type: TYPE_NORMAL
- en: Data tokenization is not typically considered a methodology for cleaning unstructured
    datasets. However, it is an important technique for text mining, especially as
    data privacy are increasingly breached and data security become serious risks
    in data usage.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: COALESCE()
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'COALESCE() is a function that returns the first non-null value from a list
    of expressions. It’s useful for handling incomplete or inconsistent data, which
    are very common in unstructured dataset. The syntax of COALESCE() function is:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: COALESCE() is widely used for replacing null values, selecting the first available
    value or fallback logic.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
