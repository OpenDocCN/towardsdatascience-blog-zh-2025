- en: Regular Expression
  id: totrans-22
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 正则表达式
- en: 'A regular expression(regex) is a sequence of characters used to define a search
    pattern. Regex allows developers to find and manipulate complex string data within
    a database by matching specific patterns within text. The syntax for regex in
    SQL is:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 正则表达式（regex）是一系列用于定义搜索模式的字符。正则表达式允许开发者在数据库中通过匹配文本中的特定模式来查找和操作复杂的字符串数据。SQL 中正则表达式的语法如下：
- en: '[PRE2]'
  id: totrans-24
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Regex is widely used for flexible search, data validation and data extraction.
    A typical use case is to ***extract emails from text***.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 正则表达式广泛应用于灵活搜索、数据验证和数据提取。一个典型的用例是从文本中**提取电子邮件**。
- en: '[PRE3]'
  id: totrans-26
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Sometimes people tend to confuse `REGEXP` operator with `LIKE` operator. Both
    operators are used in SQL to perform pattern matching within strings. But `LIKE`
    only supports basic wildcards while `REGEXP` allows for complex pattern using
    regular expression syntax and offers greater flexibility for advanced pattern
    matching scenarios duo to its more robust syntax. Meanwhile, Regex requires more
    understanding of the structure of the original data, which may be challenging.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 有时人们容易将 `REGEXP` 操作符与 `LIKE` 操作符混淆。这两个操作符都用于 SQL 中在字符串内执行模式匹配。但 `LIKE` 只支持基本的通配符，而
    `REGEXP` 允许使用正则表达式语法进行复杂的模式匹配，由于其更健壮的语法，它为高级模式匹配场景提供了更大的灵活性。同时，正则表达式需要更多理解原始数据结构，这可能具有挑战性。
- en: '* * *'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Key-Value Pair Parsing
  id: totrans-29
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 键值对解析
- en: When using JSON parsing, the format is comparably standardized. If the string
    data has more complex structures but the key and value are separated by a delimiter
    like a colon, a semicolon or an equal sign, JSON parsing may not be enough for
    data extraction. Instead, we should use **Key-Value Pair Parsing**.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 在使用 JSON 解析时，格式相对标准化。如果字符串数据具有更复杂的结构，但键和值由冒号、分号或等号等分隔符分隔，那么 JSON 解析可能不足以进行数据提取。相反，我们应该使用
    **键值对解析**。
- en: '**Key-Value Pair Parsing** is the process of extracting and separating data
    stored in a format where each piece of information is represented as a "key" paired
    with its corresponding "value". This method is implemented with string functions
    or regular expressions (regex).'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: '**键值对解析**是从以“键”与其对应的“值”配对的形式存储的数据格式中提取和分离数据的过程。这种方法通过字符串函数或正则表达式（regex）实现。'
- en: String functions like `SUBSTRING` , `SUBSTRING_INDEX`, `POSITION` and `REPLACE`
    are frequently used to extract key and values parts based on the delimiters. An
    example of using `SUBSTRING_INDEX` function for paring key-value pairs is as follows.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 常用的字符串函数如 `SUBSTRING`、`SUBSTRING_INDEX`、`POSITION` 和 `REPLACE` 被频繁使用，基于分隔符提取键和值部分。以下是一个使用
    `SUBSTRING_INDEX` 函数来配对键值对的示例。
- en: '[PRE4]'
  id: totrans-33
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
