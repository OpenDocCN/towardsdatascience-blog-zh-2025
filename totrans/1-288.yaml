- en: Learn How to Use Transformers with HuggingFace and SpaCy
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/mastering-nlp-with-spacy-part-4/](https://towardsdatascience.com/mastering-nlp-with-spacy-part-4/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Introduction
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <mdspan datatext="el1756944594177" class="mdspan-comment">The Trasnformer is
    currently</mdspan> the the state of the art architecture for NLP and not only.
    Modern models like ChatGPT, Llama, and Gemma are based on this architecture introduced
    in 2017 in the Attention Is All You Need paper from Vaswani et al.
  prefs: []
  type: TYPE_NORMAL
- en: In the [previous article](https://towardsdatascience.com/mastering-nlp-with-spacy-part-3/),
    we saw how to use spaCy to accomplish several tasks, and you might have noticed
    that we never had to train anything, but we leveraged spaCy capabilities, which
    are mainly rule-based approaches.
  prefs: []
  type: TYPE_NORMAL
- en: SpaCy also offers to insert in the NLP pipeline trainable components or to use
    models off the shelf from the 🤗 HuggingFace Hub, which is an online platform that
    provides open-source models for AI developers to use.
  prefs: []
  type: TYPE_NORMAL
- en: So let’s learn how to use SpaCy with Hugging Face’s models!
  prefs: []
  type: TYPE_NORMAL
- en: Why Transformers?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Before transformers the SOTA architecture to create vector representations of
    words was **word vectors** techniques. A word vector is a dense representation
    of a word, which we can use to perform some mathematical calculation on it.
  prefs: []
  type: TYPE_NORMAL
- en: For example, we can observe that two words that have a similar meaning also
    have similar vectors. The most famous techniques of this kind are **GloVe** and
    **FastText**.
  prefs: []
  type: TYPE_NORMAL
- en: These methods, though, have introduced a big problem, a word is represented
    always by the same vector. But a word doesn’t always have the same meaning.
  prefs: []
  type: TYPE_NORMAL
- en: 'For example:'
  prefs: []
  type: TYPE_NORMAL
- en: “She went to the **bank** to withdraw some money.”
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: “He sat by the **bank** of the river, watching the water flow.”
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In these two sentences, the word bank assumes two different meanings, so it
    does not make sense to always represent the word with the same vector.
  prefs: []
  type: TYPE_NORMAL
- en: With transformer-based architecture, we are able today to create **models that
    take into consideration the entire context** to generate the vectorial representation
    of a word.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/6efd359213fb289849b0f8ddabfa5ae3.png)'
  prefs: []
  type: TYPE_IMG
- en: 'src: [https://arxiv.org/abs/1706.03762](https://arxiv.org/abs/1706.03762)'
  prefs: []
  type: TYPE_NORMAL
- en: 'The main innovation introduced by this network is the **multi-head attention
    block**. If you are not familiar with it, I recently wrote an article about this:
    [https://towardsdatascience.com/a-simple-implementation-of-the-attention-mechanism-from-scratch/](https://towardsdatascience.com/a-simple-implementation-of-the-attention-mechanism-from-scratch/)'
  prefs: []
  type: TYPE_NORMAL
- en: The transformer is made up of two parts. The left part, which is the **encoder**
    which creates the vectorial representation of texts, and the right part, the **decoder**,
    is used to generate new text. For example, GPT is based on the right part, because
    it generates text as a chatbot.
  prefs: []
  type: TYPE_NORMAL
- en: In this article, we are interested in the encoder part, which is able to capture
    the semantics of the text we give as input.
  prefs: []
  type: TYPE_NORMAL
- en: BERT and RoBERTa
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This won’t be a course about these models, but let’s recap some main topics.
  prefs: []
  type: TYPE_NORMAL
- en: While ChatGPT is built on the decoder side of the transformer architecture,
    BERT and RoBERTa are based on the encoder side.
  prefs: []
  type: TYPE_NORMAL
- en: 'BERT was introduced by Google in 2018 and you can read more about it here:
    [https://arxiv.org/abs/1810.04805](https://arxiv.org/abs/1810.04805)'
  prefs: []
  type: TYPE_NORMAL
- en: BERT is a stack of encoder layers. There are two sizes of this model. BERT base
    contains 12 encoders while BERT large contains 24 encoders
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b42fc656fbfaea6329010bc22db3ae6d.png)'
  prefs: []
  type: TYPE_IMG
- en: 'src: [https://iq.opengenus.org/content/images/2021/01/bert-base-bert-large-encoders.png](https://iq.opengenus.org/content/images/2021/01/bert-base-bert-large-encoders.png)'
  prefs: []
  type: TYPE_NORMAL
- en: BERT base generates a vector of size 768, while the large one a vector of size
    1024\. Both take an input of size 512 tokens.
  prefs: []
  type: TYPE_NORMAL
- en: The tokenizer used by the BERT model is called [WordPiece](https://huggingface.co/learn/llm-course/chapter6/6).
  prefs: []
  type: TYPE_NORMAL
- en: 'BERT is trained on two objectives:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Masked Language Modeling (MLM):** Predicts missing (masked) tokens within
    a sentence.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Next Sentence Prediction (NSP):** Determines whether a given second sentence
    logically follows the first one.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'RoBERTa model builds on top of BERT with some key differences: [https://arxiv.org/abs/1907.11692](https://arxiv.org/abs/1907.11692).'
  prefs: []
  type: TYPE_NORMAL
- en: RoBERTa uses a dynamic masking, so masked tokens change at every iteration during
    the training, and doesn’t use the NSP as training objectives.
  prefs: []
  type: TYPE_NORMAL
- en: Use RoBERTa with SpaCy
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The `TextCategorizer` is a spaCy component that predicts one or more labels
    for an entire document. It can work in two modalities:'
  prefs: []
  type: TYPE_NORMAL
- en: '**exclusive_classes = true**: one label per text (e.g., *positive* or *negative*)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**exclusive_classes = false**: multiple labels per text (e.g., *spam*, *urgent*,
    *billing*)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'spaCy can combine this with different embeddings:'
  prefs: []
  type: TYPE_NORMAL
- en: Classic word vectors (`tok2vec`)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Transformer models like **RoBERTa**, which we use here
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In this way we can lavarage the RoBERTa understanding of the english language,
    and integrate it in the spacy pipeline to make it production ready.
  prefs: []
  type: TYPE_NORMAL
- en: If you have a dataset, you can further train the RoBERTa model using spaCy to
    fine-tune it on the specific downstream task you’re trying to solve.
  prefs: []
  type: TYPE_NORMAL
- en: Dataset preparation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'In this article I am going to use the TREC dataset, which contains short **questions**.
    Each question is labelled with the **type of answer it expects**, such as:'
  prefs: []
  type: TYPE_NORMAL
- en: '|  Label | Meaning |'
  prefs: []
  type: TYPE_TB
- en: '| --- | --- |'
  prefs: []
  type: TYPE_TB
- en: '| ABBR | Abbreviation |'
  prefs: []
  type: TYPE_TB
- en: '| DESC | Description / Definition |'
  prefs: []
  type: TYPE_TB
- en: '| ENTY | Entity (thing, object) |'
  prefs: []
  type: TYPE_TB
- en: '| HUM | Human (person, group) |'
  prefs: []
  type: TYPE_TB
- en: '| LOC | Location (place) |'
  prefs: []
  type: TYPE_TB
- en: '| NUM | Numeric (count, date, etc) |'
  prefs: []
  type: TYPE_TB
- en: 'This is an example, where we expect as answer a human name:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Q (text): “Who wrote the Iliad?”'
  prefs: []
  type: TYPE_NORMAL
- en: 'A (label): “HUM”'
  prefs: []
  type: TYPE_NORMAL
- en: As usual we start by installing the libraries.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Now we need to load prepare the dataset.
  prefs: []
  type: TYPE_NORMAL
- en: With `spacy.blank("en"`) we can create a **blank spaCy pipeline** for English.
    It doesn’t include any components (like the tagger or the parser),. It’s lightweight
    and perfect for converting raw text to `Doc` objects without loading a full language
    model like we do with `en_core_web_sm`.
  prefs: []
  type: TYPE_NORMAL
- en: '`DocBin` is a special spaCy class that efficiently stores many `Doc` objects
    in binary format. This is how spaCy expects training data to be saved.'
  prefs: []
  type: TYPE_NORMAL
- en: Once converted and saved as `.spacy` files, these can be passed directly into
    `spacy train`, which is much faster than using plain JSON or text files.
  prefs: []
  type: TYPE_NORMAL
- en: So now this script to prepare the train and dev dataset should be pretty straightforward.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: We are going to firther train RoBERTa on this dataset using a sapCy CLI command.
    The command expects a *config.cfg* file where we describe the type of training,
    the model we are using, the number of epohchs etc.
  prefs: []
  type: TYPE_NORMAL
- en: Here is the config file I used for my training pourposes.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: Make sure you have a GPU at your disposal and launch the training CLI command!
  prefs: []
  type: TYPE_NORMAL
- en: '`python —m spacy train config.cfg --output ./output --gpu-id 0`'
  prefs: []
  type: TYPE_NORMAL
- en: You will see the training starting with and you can monitor the loss of the
    TextCategorizer component.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a3ef9102e2a48fe9994eb58e3d8b62b2.png)'
  prefs: []
  type: TYPE_IMG
- en: Just to be clear, we are **training** here the **TextCategorizer** component,
    which is a small neural network head that receives the document representation
    and learns to predict the correct label.
  prefs: []
  type: TYPE_NORMAL
- en: But we are also **fine-tuning RoBERTa** during this training. That means the
    RoBERTa weights are updated using the TREC dataset, so it learns how to represent
    input questions in a way that’s more useful for classification.
  prefs: []
  type: TYPE_NORMAL
- en: Once the model is trained and saved, we can use it in inference!
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: The output should be something similar to the following
  prefs: []
  type: TYPE_NORMAL
- en: '`{''LOC'': 0.98, ''HUM'': 0.01, ''NUM'': 0.0, …}`'
  prefs: []
  type: TYPE_NORMAL
- en: Final Thoughts
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To recap, in this post we saw how to:Use a Hugging Face dataset with spaCy
  prefs: []
  type: TYPE_NORMAL
- en: Convert text classification data into `.spacy` format
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Configure a full pipeline using RoBERTa and `textcat`
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Train and test your model using spaCy CLI
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This method works for any short text classification task, emails, support tickets,
    product reviews, FAQs, or even chatbot intents.
  prefs: []
  type: TYPE_NORMAL
