- en: Six Organizational Models for Data Science
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 数据科学六大组织模型
- en: 原文：[https://towardsdatascience.com/six-organizational-models-for-data-science/](https://towardsdatascience.com/six-organizational-models-for-data-science/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/six-organizational-models-for-data-science/](https://towardsdatascience.com/six-organizational-models-for-data-science/)
- en: Introduction
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 简介
- en: Data science teams can operate in myriad ways within a company. These organizational
    models influence the type of work that the team does, but also the team’s culture,
    goals, impact, and overall value to the company.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 数据科学团队可以在公司内部以多种方式运作。这些组织模型影响团队所做的工作类型，也影响团队的文化、目标、影响以及对公司整体价值的贡献。
- en: Adopting the wrong organizational model can limit impact, cause delays, and
    compromise the morale of a team. As a result, leadership should be aware of these
    different organizational models and explicitly select models aligned to each project’s
    goals and their team’s strengths.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 采用错误组织模型可能会限制影响、造成延误并损害团队的士气。因此，领导层应该了解这些不同的组织模型，并明确选择与每个项目目标及其团队优势相一致的模式。
- en: This article explores six distinct models we’ve observed across numerous organizations.
    These models are primarily differentiated by who initiates the work, what output
    the data science team generates, and how the data science team is evaluated. We
    note common pitfalls, pros, and cons of each model to help you determine which
    might work best for your organization.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 本文探讨了我们在众多组织中观察到的六个不同模型。这些模型主要区别在于谁发起工作，数据科学团队产生什么产出，以及如何评估数据科学团队。我们指出每个模型的常见陷阱、优点和缺点，以帮助您确定哪种模式可能最适合您的组织。
- en: 1\. The scientist
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1. 科学家
- en: Prototypical scenario
  id: totrans-7
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 典型场景
- en: A scientist at a university studies changing ocean temperatures and subsequently
    publishes peer-reviewed journal articles detailing their findings. They hope that
    policymakers will one day recognize the importance of changing ocean temperatures,
    read their papers, and take action based on their research.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 一位大学科学家研究海洋温度的变化，随后发表了同行评审的期刊文章，详细介绍了他们的发现。他们希望政策制定者有一天会认识到海洋温度变化的重要性，阅读他们的论文，并根据他们的研究采取行动。
- en: Who initiates
  id: totrans-9
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 谁是发起者
- en: Data scientists working within this model typically initiate their own projects,
    driven by their intellectual curiosity and desire to advance knowledge within
    a field.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种模式下工作的数据科学家通常由他们的知识好奇心和希望在某个领域内推进知识的愿望来驱动他们自己的项目。
- en: How is the work judged
  id: totrans-11
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 工作如何评判
- en: A scientist’s output is often assessed by how their work impacts the thinking
    of their peers. For instance, did their work draw other experts’ attention to
    an area of study, did it resolve fundamental open questions, did it enable subsequent
    discoveries, or lay the groundwork for subsequent applications?
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 科学家的工作产出通常通过他们的工作如何影响同行的思考来评估。例如，他们的工作是否引起了其他专家对某个研究领域的关注，是否解决了基本未解决的问题，是否促进了后续发现，或者为后续应用奠定了基础？
- en: Common pitfalls to avoid
  id: totrans-13
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 需要避免的常见陷阱
- en: Basic scientific research pushes humanity’s knowledge forward, delivering foundational
    knowledge that enables long term societal progress. However, data science projects
    that use this model risk focusing on questions that have large long term implications,
    but limited opportunities for near term impact. Moreover, the model encourages
    decoupling of scientists from decision makers and thus it may not cultivate the
    shared context, communication styles, or relationships that are necessary to drive
    action (e.g., regrettably little action has resulted from all the research on
    climate change).
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 基础科学研究推动人类知识向前发展，提供基础性知识，这些知识能够促进长期的社会进步。然而，使用这种模式的数据科学项目可能会专注于那些具有长期重大影响但近期影响有限的问题。此外，该模型鼓励科学家与决策者脱钩，因此可能无法培养推动行动所需的共同背景、沟通风格或关系（例如，遗憾的是，气候变化的所有研究几乎没有导致任何行动）。
- en: Pros
  id: totrans-15
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 优点
- en: The opportunity to develop deep expertise at the forefront of a field
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在一个领域的最前沿发展深厚专业知识的机遇
- en: Potential for groundbreaking discoveries
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 具有突破性发现的潜力
- en: Attracts strong talent that values autonomy
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 吸引重视自主性的优秀人才
- en: Cons
  id: totrans-19
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 缺点
- en: May struggle to drive outcomes based on findings
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可能难以根据发现推动结果
- en: May lack alignment with organizational priorities
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可能与组织优先事项不一致
- en: Many interesting questions don’t have large commercial implications
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 许多有趣的问题没有大的商业影响
- en: 2\. The business intelligence
  id: totrans-23
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 2. 商业智能
- en: Prototypical scenario
  id: totrans-24
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 典型场景
- en: A marketing team requests data about the Open and Click Through Rates for each
    of their last emails. The Business Intelligence team responds with a spreadsheet
    or dashboard that displays the requested data.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 市场营销团队请求关于他们最后几封电子邮件的打开率和点击率的详细数据。商业智能团队以电子表格或仪表板的形式响应，显示所需的数据。
- en: Who initiates
  id: totrans-26
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 谁发起
- en: An operational (Marketing, Sales, etc) or Product team submits a ticket or makes
    a request directly to a data science team member.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 运营（营销、销售等）或产品团队直接向数据科学团队成员提交工单或提出请求。
- en: How the DS team is judged
  id: totrans-28
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 如何评判DS团队
- en: The BI team’s contribution will be judged by how quickly and accurately they
    service inbound requests.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: BI团队的贡献将根据他们服务入站请求的速度和准确性来评判。
- en: Common pitfalls to avoid
  id: totrans-30
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 避免的常见陷阱
- en: BI teams can efficiently execute against well specified inbound requests. Unfortunately,
    requests won’t typically include substantial context about a domain, the decisions
    being made, or the company’s larger goals. As a result, BI teams often struggle
    to drive innovation or strategically meaningful levels of impact. In the worst
    situations, the BI team’s work will be used to justify decisions that were already
    made.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: BI团队可以高效地执行对明确入站请求的响应。不幸的是，请求通常不会包含关于领域、正在做出的决策或公司更大目标的实质性背景信息。因此，BI团队往往难以推动创新或具有战略意义的重大影响。在最糟糕的情况下，BI团队的工作将被用来证明已经做出的决策。
- en: Pros
  id: totrans-32
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**优点**'
- en: Clear roles and responsibilities for the data science team
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据科学团队有明确的角色和责任
- en: Rapid execution against specific requests
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对特定请求的快速执行
- en: Direct fulfillment of stakeholder needs (Happy partners!)
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 直接满足利益相关者的需求（快乐的合作伙伴！）
- en: Cons
  id: totrans-36
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 缺点
- en: Rarely capitalizes on the non-executional skills of data scientists
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 很少利用数据科学家的非执行技能
- en: Unlikely to drive substantial innovation
  id: totrans-38
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 很可能无法推动实质性的创新
- en: Top talent will typically seek a broader and less executional scope
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 顶尖人才通常会寻求更广泛且非执行性的范围
- en: 3\. The analyst
  id: totrans-40
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 3. 分析师
- en: Prototypical scenario
  id: totrans-41
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 典型场景
- en: A product team requests an analysis of the recent spike in customer churn. The
    data science team studies how churn spiked and what might have driven the change.
    The analyst presents their findings in a meeting, and the analysis is persisted
    in a slide deck that is shared with all attendees.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 产品团队请求分析最近客户流失率激增的原因。数据科学团队研究流失率激增的原因以及可能驱动变化的因素。分析师在会议上展示他们的发现，并将分析结果保存在一个与所有与会者共享的幻灯片集中。
- en: Who initiates
  id: totrans-43
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 谁发起
- en: Similar to the BI model, the Analyst model typically begins with an operational
    or product team’s request.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 与BI模型类似，分析师模型通常从运营或产品团队的需求开始。
- en: How the DS team is judged
  id: totrans-45
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 如何评判DS团队
- en: The Analyst’s work is typically judged by whether the requester feels they received
    useful insights. In the best cases, the analysis will point to an action that
    is subsequently taken and yields a desired outcome (e.g., an analysis indicates
    that the spike in client churn occurred just as page load times increased on the
    platform. Subsequent efforts to decrease page load times return churn to normal
    levels).
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 分析师的工作通常根据请求者是否觉得他们获得了有用的洞察力来评判。在最好的情况下，分析将指向随后采取的行动，并产生预期的结果（例如，分析表明客户流失率的激增与平台页面加载时间增加同时发生。随后降低页面加载时间的努力使流失率恢复正常水平）。
- en: '**Common Pitfalls To Avoid**'
  id: totrans-47
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**常见陷阱**'
- en: Analyst’s insights can guide critical strategic decisions, while helping the
    data science team develop invaluable domain expertise and relationships. However,
    if an analyst doesn’t sufficiently understand the operational constraints in a
    domain, then their analyses may not be directly actionable.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 分析师的洞察力可以指导关键的战略决策，同时帮助数据科学团队发展宝贵的领域专业知识和关系。然而，如果分析师对某个领域的运营约束理解不足，那么他们的分析可能无法直接执行。
- en: '**Pros**'
  id: totrans-49
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**优点**'
- en: Analyses can provide substantive and impactful learnings
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分析可以提供实质性和有影响力的学习成果
- en: Capitalizes on the data science team’s strengths in interpreting data
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 充分利用数据科学团队在解读数据方面的优势
- en: Creates opportunity to build deep subject matter expertise
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 有机会建立深厚的专业知识
- en: '**Cons**'
  id: totrans-53
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**缺点**'
- en: Insights may not always be directly actionable
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 洞察力可能并不总是可以直接执行的
- en: May not have visibility into the impact of an analysis
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可能无法看到分析的影响
- en: Analysts at risk of becoming “Armchair Quarterbacks”
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 分析师有成为“沙发评论员”的风险
- en: 4\. The recommender
  id: totrans-57
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4. 推荐者
- en: Prototypical scenario
  id: totrans-58
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 典型场景
- en: A product manager requests a system that ranks products on a website. The Recommender
    develops an algorithm and conducts A/B testing to measure its impact on sales,
    engagement, etc. The Recommender iteratively improves their algorithm via a series
    of A/B tests.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 产品经理要求一个在网站上对产品进行排名的系统。推荐者开发了一个算法，并通过A/B测试来衡量其对销售、参与度等方面的影响。推荐者通过一系列A/B测试迭代改进他们的算法。
- en: Who initiates
  id: totrans-60
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 由谁发起
- en: A product manager typically initiates this type of project, recognizing the
    need for a recommendation engine to improve the users’ experience or drive business
    metrics.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 产品经理通常发起此类项目，认识到需要推荐引擎来改善用户体验或推动业务指标。
- en: How the DS team is judged
  id: totrans-62
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 如何评估DS团队
- en: The Recommender is ideally judged by their impact on key performance indicators
    like sales efficiency or conversion rates. The precise form that this takes will
    often depend on whether the recommendation engine is client or back office facing
    (e.g., lead scores for a sales team).
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 推荐者理想情况下应通过其对关键绩效指标（如销售效率或转化率）的影响来评估。这种具体形式通常取决于推荐引擎是面向客户还是面向后台办公室（例如，销售团队的潜在客户评分）。
- en: Common pitfalls to avoid
  id: totrans-64
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 需要避免的常见陷阱
- en: Recommendation projects thrive when they are aligned to high frequency decisions
    that each have low incremental value (e.g., What song to play next). Training
    and assessing recommendations may be challenging for low frequency decisions,
    because of low data volume. Even assessing if recommendation adoption is warranted
    can be challenging if each decision has high incremental value.  To illustrate,
    consider efforts to develop and deploy computer vision systems for medical diagnoses.
    Despite their objectively strong performance, adoption has been slow because cancer
    diagnoses are relatively low frequency and have very high incremental value.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 当推荐项目与高频决策对齐，每个决策的增量价值较低（例如，播放下一首歌曲）时，它们会蓬勃发展。对于低频决策，由于数据量低，培训和评估推荐可能具有挑战性。即使每个决策的增量价值很高，评估是否需要采用推荐也可能具有挑战性。例如，考虑开发并部署用于医疗诊断的计算机视觉系统。尽管它们的客观性能很强，但由于癌症诊断相对低频且增量价值很高，其采用速度缓慢。
- en: Pros
  id: totrans-66
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 优点
- en: Clear objectives and opportunity for measurable impact via A/B testing
  id: totrans-67
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 明确的目标和通过A/B测试实现可衡量影响的机遇
- en: Potential for significant ROI if the recommendation system is successful
  id: totrans-68
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果推荐系统成功，将有可能获得显著的回报率
- en: Direct alignment with customer-facing outcomes and the organization’s goals
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 与面向客户的成果和组织目标直接对齐
- en: Cons
  id: totrans-70
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 缺点
- en: Errors will directly hurt client or financial outcomes
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 错误将直接损害客户或财务结果
- en: Internally facing recommendation engines may be hard to validate
  id: totrans-72
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 面向内部的使用推荐引擎可能难以验证
- en: Potential for algorithm bias and negative externalities
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 算法偏差和负面外部性的可能性
- en: 5\. The automator
  id: totrans-74
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 5. 自动化者
- en: Prototypical scenario
  id: totrans-75
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 典型场景
- en: A self-driving car takes its owner to the airport. The owner sits in the driver’s
    seat, just in case they need to intervene, but they rarely do.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 一辆自动驾驶汽车将车主带到机场。车主坐在驾驶座上，以防万一需要干预，但他们很少这么做。
- en: Who initiates
  id: totrans-77
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 由谁发起
- en: An operational, product, or data science team can see the opportunity to automate
    a task.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 运营、产品或数据科学团队可以看到自动化一项任务的机遇。
- en: How the DS team is judged
  id: totrans-79
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 如何评估DS团队
- en: The Automator is evaluated on whether their system produces better or cheaper
    outcomes than when a human was executing the task.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 自动化者被评估的是他们的系统是否比人类执行任务时产生更好的或更便宜的结果。
- en: Common pitfalls to avoid
  id: totrans-81
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 需要避免的常见陷阱
- en: Automation can deliver super-human performance or remove substantial costs.
    However, automating a complex human task can be very challenging and expensive,
    particularly, if it is embedded in a complex social or legal system. Moreover,
    framing a project around automation encourages teams to mimic human processes,
    which may prove challenging because of the unique strengths and weaknesses of
    the human vs the algorithm.
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 自动化可以提供超越人类的表现或消除大量成本。然而，自动化一个复杂的人类任务可能非常具有挑战性和昂贵，尤其是如果它嵌入在一个复杂的社会或法律体系中。此外，围绕自动化制定项目会鼓励团队模仿人类流程，这可能会因为人类与算法的独特优势和劣势而具有挑战性。
- en: Pros
  id: totrans-83
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 优点
- en: May drive substantial improvements or cost savings
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可能带来显著的改进或成本节约
- en: Consistent performance without the variability intrinsic to human decisions
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 具有与人类决策固有的可变性无关的一致性能
- en: Frees up human resources for higher-value more strategic activities
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 释放人力资源，用于更高价值、更具战略性的活动
- en: Cons
  id: totrans-87
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 缺点
- en: Automating complex tasks can be resource-intensive, and thus low ROI
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自动化复杂任务可能资源密集，因此回报率低
- en: Ethical considerations around job displacement and accountability
  id: totrans-89
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 关于就业替代和责任问题的伦理考量
- en: Challenging to maintain and update as conditions evolve
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 随着条件的演变，维护和更新具有挑战性。
- en: 6\. The decision supporter
  id: totrans-91
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 6. 决策支持者
- en: Prototypical scenario
  id: totrans-92
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 典型场景
- en: An end user opens Google Maps and types in a destination. Google Maps presents
    multiple possible routes, each optimized for different criteria like travel time,
    avoiding highways, or using public transit. The user reviews these options and
    selects the one that best aligns with their preferences before they drive along
    their chosen route.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 一个终端用户打开Google Maps并输入目的地。Google Maps展示了多条可能的路线，每条路线都针对不同的标准进行了优化，如旅行时间、避免高速公路或使用公共交通。用户审查这些选项，并在开车之前选择与他们偏好最一致的路线。
- en: Who initiates
  id: totrans-94
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 谁发起
- en: The data science team often recognizes an opportunity to assist decision-makers,
    by  distilling a large space of possible actions into a small set of high quality
    options that each optimize for a different outcomes (e.g., shortest route vs fastest
    route)
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 数据科学团队经常认识到帮助决策者的机会，通过将大量可能的行为空间提炼成一小套高质量选项，每个选项都针对不同的结果进行优化（例如，最短路线与最快路线）。
- en: How the DS team is judged
  id: totrans-96
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 如何评估DS团队
- en: The Decision Supporter is evaluated based on whether their system helps users
    select good options and then experience the promised outcomes (e.g., did the trip
    take the expected time, and did the user avoid highways as promised).
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 决策支持者根据其系统是否帮助用户选择好的选项并体验到承诺的结果（例如，旅行是否花费了预期的时间，用户是否避免了承诺的高速公路）来评估。
- en: Common pitfalls to avoid
  id: totrans-98
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 需要避免的常见陷阱
- en: Decision support systems capitalize on the respective strengths of humans and
    algorithms. The success of this system will depend on how well the humans and
    algorithms collaborate. If the human doesn’t want or trust the input of the algorithmic
    system, then this kind of project is much less likely to drive impact.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 决策支持系统利用人类和算法各自的优势。该系统的成功将取决于人类和算法协作的好坏。如果人类不希望或信任算法系统的输入，那么这种项目就很难产生影响力。
- en: Pros
  id: totrans-100
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 优点
- en: Capitalizes on the strengths of machines to make accurate predictions at large
    scale, and the strengths of humans to make strategic trade offs
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 利用机器的优势在大规模上做出准确的预测，以及人类的优势做出战略性的权衡。
- en: Engagement of the data science team in the project’s inception and framing increase
    the likelihood that it will produce an innovative and strategically differentiating
    capability for the company
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 数据科学团队在项目启动和规划阶段的参与度提高，这将增加项目为公司产生创新和战略差异化能力的可能性。
- en: Provides transparency into the decision-making process
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 提供决策过程的透明度。
- en: Cons
  id: totrans-104
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 缺点
- en: Requires significant effort to model and quantify various trade-offs
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 需要大量努力来模拟和量化各种权衡。
- en: Users may struggle to understand or weigh the presented trade-offs
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 用户可能难以理解或权衡所呈现的权衡。
- en: Complex to validate that predicted outcomes match actual results
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 验证预测结果与实际结果是否匹配复杂。
- en: A portfolio of projects
  id: totrans-108
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 项目组合
- en: Under- or overutilizing particular models can prove detrimental to a team’s
    long term success. For instance, we’ve observed teams avoiding BI projects, and
    suffer from a lack of alignment about how goals are quantified. Or, teams that
    avoid Analyst projects may struggle because they lack critical domain expertise.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 过度或不足使用特定模型可能对团队的长期成功产生不利影响。例如，我们观察到一些团队避免BI项目，并因缺乏关于目标如何量化的共识而受到影响。或者，避免分析师项目的团队可能因为缺乏关键领域专业知识而陷入困境。
- en: 'Even more frequently, we’ve observed teams over utilize a subset of models
    and become entrapped by them. This process is illustrated in a case study, that
    we experienced:'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 更频繁地，我们观察到团队过度使用模型的一个子集，并陷入其中。这个过程在一个案例研究中得到了说明，我们亲身体验了：
- en: A new data science team was created to partner with an existing operational
    team. The operational team was excited to become “data driven” and so they submitted
    many requests for data and analysis. To keep their heads above water, the data
    science team over utilize the BI and Analyst models. This reinforced the operational
    team’s tacit belief that the data team existed to service their requests.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 一个新的数据科学团队被创建，以与现有的运营团队合作。运营团队渴望成为“数据驱动”的，因此他们提交了许多关于数据和数据分析的请求。为了保持竞争力，数据科学团队过度使用了BI和分析模型。这强化了运营团队的一种隐性信念，即数据团队的存在是为了服务他们的请求。
- en: Eventually, the data science team became frustrated with their inability to
    drive innovation or directly quantify their impact. They fought to secure the
    time and space to build an innovative Decision Support system. But after it was
    launched, the operational team chose not to utilize it at a high rate.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 最终，数据科学团队因无法推动创新或直接量化他们的影响而感到沮丧。他们努力争取时间和空间来构建一个创新的决策支持系统。但推出后，运营团队选择不大量使用它。
- en: 'The data science team had trained their cross functional partners to view them
    as a supporting org, rather than joint owners of decisions. So their latest project
    felt like an “armchair quarterback”: It expressed strong opinions, but without
    sharing ownership of execution or outcome.'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 数据科学团队已经培训了跨职能合作伙伴，让他们将自己视为支持性组织，而不是决策的共同所有者。因此，他们的最新项目感觉像是一个“板凳上的四分卫”：它表达了强烈的观点，但没有分享执行或结果的所有权。
- en: Over reliance on the BI and Analyst models had entrapped the team. Launching
    the new Decision Support system had proven a time consuming and frustrating process
    for all parties. A tops-down mandate was eventually required to drive enough adoption
    to assess the system. It worked!
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 过度依赖BI和分析模型使团队陷入了困境。推出新的决策支持系统对各方来说都是一个耗时且令人沮丧的过程。最终需要自上而下的命令来推动足够的采用率以评估该系统。它成功了！
- en: In hindsight, adopting a broader portfolio of project types earlier could have
    prevented this situation. For instance, instead of culminating with an insight
    some Analysis projects should have generated strong Recommendations about particular
    actions. And the data science team should have partnered with the operational
    team to see this work all the way through execution to final assessment.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 事后看来，更早采用更广泛的项目类型组合本可以防止这种情况发生。例如，一些分析项目本应产生关于特定行动的强烈建议，而不是以洞察力结束。而且数据科学团队应该与运营团队合作，确保这项工作从执行到最终评估的整个过程。
- en: Conclusion
  id: totrans-116
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: Data Science leaders should intentionally adopt an organizational model for
    each project based on its goals, constraints, and the surrounding organizational
    dynamics. Moreover, they should be mindful to build self reinforcing portfolios
    of different project types.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 数据科学领导者应根据每个项目的目标、限制和周围的组织动态，有意采用适合每个项目的组织模型。此外，他们应该注意构建不同项目类型的自我强化的投资组合。
- en: 'To select a model for a project, consider:'
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: 要为项目选择一个模型，请考虑：
- en: '**The nature of the problems you’re solving**: Are the motivating questions
    exploratory or well-defined?'
  id: totrans-119
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**您正在解决的问题的性质**：激励问题是探索性的还是定义良好的？'
- en: '**Desired outcomes**: Are you seeking incremental improvements or innovative
    breakthroughs?'
  id: totrans-120
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**期望的结果**：您是在寻求渐进式改进还是创新突破？'
- en: '**Organizational hunger**: How much support will the project receive from relevant
    operating teams?'
  id: totrans-121
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**组织需求**：项目将获得多少来自相关运营团队的支持？'
- en: '**Your team’s skills and interests**: How strong are your team’s communication
    vs production coding skills?'
  id: totrans-122
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**您的团队技能和兴趣**：您的团队在沟通和生产力编码技能方面有多强？'
- en: '**Available resources**: Do you have the bandwidth to maintain and extend a
    system in perpetuity?'
  id: totrans-123
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**可用资源**：您是否有足够的带宽来永久维护和扩展一个系统？'
- en: '**Are you ready**: Does your team have the expertise and relationships to make
    a particular type of project successful?'
  id: totrans-124
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**您是否准备好了**：您的团队是否有足够的专长和关系来使特定类型的项目成功？'
