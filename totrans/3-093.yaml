    ‘Furniture’]”,'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: '“violation”: “类别应该是以下之一[‘Books’，‘Electronics’，‘Food’，‘Clothing’，‘Furniture’]”,'
- en: '“substitute”: “Food”'
