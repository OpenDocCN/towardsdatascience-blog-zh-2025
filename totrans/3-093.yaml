- en: The remaining steps are similar to the iteration process used during the validation
    of column data types. Once all violations are resolved and no further issues are
    detected, the data frame is fully validated.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 剩余步骤与在验证列数据类型时使用的迭代过程类似。一旦所有违规问题得到解决且没有进一步的问题被发现，数据框就完全验证了。
- en: '![](../Images/84c3caa95e2882650f42b6792a14063e.png)'
  id: totrans-173
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/84c3caa95e2882650f42b6792a14063e.png)'
- en: You can test the feature described in this article on your own dataset using
    the [CleanMyExcel.io](https://cleanmyexcel.io/) service, which is free and requires
    no registration.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以使用[CleanMyExcel.io](https://cleanmyexcel.io/)服务在自己的数据集上测试本文中描述的功能，该服务免费且无需注册。
- en: Conclusion
  id: totrans-175
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: Expectations may sometimes lack domain expertise — integrating human input can
    help surface more diverse, specific, and reliable expectations.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 有时期望可能缺乏领域专业知识——整合人工输入可以帮助揭示更多样化、具体和可靠的期望。
- en: A key challenge lies in automation during the resolution process. A human-in-the-loop
    approach could introduce more transparency, particularly in the selection of substitute
    or imputed values.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 在解决过程中的自动化是一个关键挑战。人工介入的方法可以增加透明度，尤其是在选择替代或估计值时。
- en: 'This article is part of a series of articles on automating data cleaning for
    any tabular dataset:'
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 本文是关于自动化任何表格数据集数据清洗的一系列文章之一：
- en: '[Effortless Spreadsheet Normalisation With LLM](https://towardsdatascience.com/effortless-spreadsheet-normalisation-with-llm/)'
  id: totrans-179
