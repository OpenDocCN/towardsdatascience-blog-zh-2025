- en: Replace Non-convertible Values
  id: totrans-99
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 替换不可转换的值
- en: At this point, a programmatic function is applied to replace the problematic
    values with the proposed substitutes. The column is then tested again to ensure
    all values can now be converted into the estimated data type. If successful, the
    workflow proceeds to the expectations module. Otherwise, the previous steps are
    repeated until the column is validated.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 此时，将程序函数应用于替换有问题的值与建议的替代值。然后再次测试该列，以确保所有值现在都可以转换为估计的数据类型。如果成功，工作流程将进入期望模块。否则，重复之前的步骤，直到列得到验证。
- en: Validate Column Data Expectations
  id: totrans-101
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 验证列数据期望
- en: Generate Expectations for All Columns
  id: totrans-102
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 生成所有列的期望
- en: 'The following elements are provided:'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 以下元素提供：
- en: '**Data dictionary**: column name, a short description, and the expected data
    type'
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**数据字典**：列名，简短描述和预期数据类型'
- en: '**Representative rows** from the dataset, randomly sampled'
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**代表性行**从数据集中随机抽取'
- en: '**Column statistics**, such as number of unique values and proportion of top
    values'
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**列统计**，例如唯一值的数量和最高值的比例'
- en: 'Based on each column’s semantic meaning and statistical properties, the goal
    is to define validation rules and expectations that ensure data quality and integrity.
    These expectations should fall into one of the following categories related to
    standardisation:'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 根据每列的语义意义和统计特性，目标是定义验证规则和期望，以确保数据质量和完整性。这些期望应属于以下与标准化相关的以下类别：
- en: Valid ranges or intervals
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 有效范围或区间
- en: Expected formats (e.g. for emails or phone numbers)
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 预期格式（例如，对于电子邮件或电话号码）
- en: Allowed values (e.g. for categorical fields)
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 允许的值（例如，对于分类字段）
- en: Column data standardisation (e.g. ‘Mr’, ‘Mister’, ‘Mrs’, ‘Mrs.’ becomes [‘Mr’,
    ‘Mrs’])
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 列数据标准化（例如，‘Mr’，‘Mister’，‘Mrs’，‘Mrs。’变为 [‘Mr’，‘Mrs’])
- en: '*Example*:'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: '*示例*：'
- en: '| Column name: date'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: '| 列名：日期'
- en: '• Expectation: Value must be a valid datetime.'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: • 期望：值必须是一个有效的日期时间。
- en: '- Reasoning: The column represents date and time information so each entry
    should follow a standard datetime format (for example, ISO 8601).'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: '- 理由：该列表示日期和时间信息，因此每个条目应遵循标准日期时间格式（例如，ISO 8601）。'
- en: '• Expectation: Datetime values should include timezone information (preferably
    UTC).'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: • 期望：日期时间值应包含时区信息（最好是UTC）。
- en: '- Reasoning: The provided sample timestamps include explicit UTC timezone information.
    This ensures consistency in time-based analyses.'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: '- 理由：提供的样本时间戳包含显式的UTC时区信息。这确保了基于时间分析的一致性。'
- en: ──────────────────────────────
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
  zh: ──────────────────────────────
- en: 'Column name: category'
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 列名：category
- en: '• Expectation: Allowed values should be standardized to a predefined set.'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: • 期望：允许的值应标准化为预定义的集合。
- en: '- Reasoning: Based on the semantic meaning, valid categories might include
    “Books”, “Electronics”, “Food”, “Clothing”, and “Furniture”. (Note: The sample
    includes “Fod”, which likely needs correcting to “Food”.)'
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: '- 理由：根据语义意义，有效的类别可能包括“书籍”、“电子产品”、“食品”、“服装”和“家具”。（注意：样本中包含“Fod”，可能需要更正为“Food”。）'
- en: '• Expectation: Entries should follow a standardized textual format (e.g., Title
    Case).'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: • 期望：条目应遵循标准化的文本格式（例如，标题大小写）。
- en: '- Reasoning: Consistent capitalization and spelling will improve downstream
    analyses and reduce data cleaning issues.'
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: '- 理由：一致的字母大小写和拼写将提高下游分析并减少数据清理问题。'
- en: ──────────────────────────────
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: ──────────────────────────────
- en: 'Column name: price'
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 列名：价格
- en: '• Expectation: Value must be a numeric float.'
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: • 期望：值必须是一个数值浮点数。
- en: '- Reasoning: Since the column holds monetary amounts, entries should be stored
    as numeric values (floats) for accurate calculations.'
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: '- 理由：由于该列包含货币金额，条目应以数值（浮点数）形式存储，以确保准确计算。'
- en: '• Expectation: Price values should fall within a valid non-negative numeric
    interval (e.g., price ≥ 0).'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: • 期望：价格值应在有效的非负数值区间内（例如，价格 ≥ 0）。
- en: '- Reasoning: Negative prices generally do not make sense in a pricing context.
    Even if the minimum observed value in the sample is 9.99, allowing zero or positive
    values is more realistic for pricing data.'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: '- 理由：在定价环境中，负价格通常没有意义。即使样本中观察到的最小值为9.99，允许零或正值对于定价数据来说更现实。'
- en: ──────────────────────────────
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: ──────────────────────────────
- en: 'Column name: image_url'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 列名：image_url
- en: '• Expectation: Value must be a valid URL with the expected format.'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: • 期望：值必须是一个有效的URL，具有预期的格式。
- en: '- Reasoning: Since the column stores image web addresses, each URL should adhere
    to standard URL formatting patterns (e.g., including a proper protocol schema).'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: '- 理由：由于该列存储图像网页地址，每个URL应遵循标准的URL格式化模式（例如，包括正确的协议方案）。'
- en: '• Expectation: The URL should start with “https://”.'
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: • 期望：URL应以“https://”开头。
- en: '- Reasoning: The sample shows that one URL uses “htp://”, which is likely a
    typo. Enforcing a secure (https) URL standard improves data reliability and user
    security.'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: '- 理由：样本显示一个URL使用“htp://”，这可能是拼写错误。强制执行安全的（https）URL标准可以提高数据可靠性和用户安全性。'
- en: ──────────────────────────────
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: ──────────────────────────────
- en: 'Column name: rating'
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 列名：rating
- en: '• Expectation: Value must be an integer.'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: • 期望：值必须是一个整数。
- en: '- Reasoning: The evaluation score is numeric, and as seen in the sample the
    rating is stored as an integer.'
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
  zh: '- 理由：评估分数是数值的，并且如样本所示，评分以整数形式存储。'
- en: '• Expectation: Rating values should fall within a valid interval, such as between
    1 and 5.'
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: • 期望：评分值应在有效的区间内，例如在1到5之间。
- en: '- Reasoning: In many contexts, ratings are typically on a scale of 1 to 5\.
    Although the sample includes a value of 10, it is likely a data quality issue.
    Enforcing this range standardizes the evaluation scale. |'
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
  zh: '- 理由：在许多情况下，评分通常在1到5的范围内。尽管样本包含10的值，但可能是数据质量问题。强制执行这个范围标准可以标准化评估尺度。|'
- en: Generate Validation Code
  id: totrans-142
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 生成验证代码
- en: Once expectations have been defined, the goal is to create a structured code
    that checks the data against these constraints. The code format may vary depending
    on the chosen validation library, such as [Pandera](https://pandera.readthedocs.io/)
    (used in [CleanMyExcel.io](https://cleanmyexcel.io/)), [Pydantic](https://docs.pydantic.dev/latest/),
    [Great Expectations](https://greatexpectations.io/), [Soda](https://www.soda.io/),
    etc.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦定义了期望，目标就是创建一个结构化的代码，该代码检查数据是否符合这些约束。代码格式可能取决于选择的验证库，例如[Pandera](https://pandera.readthedocs.io/)（用于[CleanMyExcel.io](https://cleanmyexcel.io/)）、[Pydantic](https://docs.pydantic.dev/latest/)、[Great
    Expectations](https://greatexpectations.io/)、[Soda](https://www.soda.io/)等。
- en: To make debugging easier, the validation code should apply checks elementwise
    so that when a failure occurs, the row index and column name are clearly identified.
    This helps to pinpoint and resolve issues effectively.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 为了使调试更容易，验证代码应该逐元素应用检查，以便在失败发生时，行索引和列名可以清楚地识别。这有助于有效地定位和解决问题。
- en: Analyse Violations and Propose Substitutes
  id: totrans-145
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 分析违规并提出替代方案
- en: When a violation is detected, it must be resolved. Each issue is flagged with
    a short explanation and a precise location (row index + column name). An LLM is
    used to estimate the best possible replacement value based on the violation’s
    description. Again, this proves useful due to the variety and unpredictability
    of data issues. If the appropriate substitute is unclear, a sentinel value is
    applied, depending on the data frame package in use.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 当检测到违规时，必须解决。每个问题都会用简短的解释和精确的位置（行索引+列名）标记。使用LLM根据违规描述估计最佳可能的替换值。同样，这由于数据问题的多样性和不可预测性而非常有用。如果适当的替代方案不明确，则根据所使用的数据框包应用哨兵值。
