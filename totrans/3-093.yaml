- en: An LLM-Based Workflow for Automated Tabular Data Validation
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/an-llm-based-workflow-for-automated-tabular-data-validation/](https://towardsdatascience.com/an-llm-based-workflow-for-automated-tabular-data-validation/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '<mdspan datatext="el1744658426682" class="mdspan-comment">This article</mdspan>
    is part of a series of articles on automating data cleaning for any tabular dataset:'
  prefs: []
  type: TYPE_NORMAL
- en: '[Effortless Spreadsheet Normalisation With LLM](https://towardsdatascience.com/effortless-spreadsheet-normalisation-with-llm/)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can test the feature described in this article on your own dataset using
    the [CleanMyExcel.io](https://cleanmyexcel.io/) service, which is free and requires
    no registration.
  prefs: []
  type: TYPE_NORMAL
- en: What is Data Validity?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Data validity refers to data conformity to expected formats, types, and value
    ranges. This standardisation within a single column ensures the uniformity of
    data according to implicit or explicit requirements.
  prefs: []
  type: TYPE_NORMAL
- en: 'Common issues related to data validity include:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Inappropriate variable types: Column data types that are not suited to analytical
    needs, e.g., temperature values in text format.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Columns with mixed data types: A single column containing both numerical and
    textual data.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Non-conformity to expected formats: For instance, invalid email addresses or
    URLs.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Out-of-range values: Column values that fall outside what is allowed or considered
    normal, e.g., negative age values or ages greater than 30 for high school students.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Time zone and DateTime format issues: Inconsistent or heterogeneous date formats
    within the dataset.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Lack of measurement standardisation or uniform scale: Variability in the units
    of measurement used for the same variable, e.g., mixing Celsius and Fahrenheit
    values for temperature.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Special characters or whitespace in numeric fields: Numeric data contaminated
    by non-numeric elements.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: And the list goes on.
  prefs: []
  type: TYPE_NORMAL
- en: Error types such as **duplicated records or entities** and **missing values**
    do not fall into this category.
  prefs: []
  type: TYPE_NORMAL
- en: But what is the typical strategy to identifying such data validity issues?
  prefs: []
  type: TYPE_NORMAL
- en: When data meets expectations
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Data cleaning, while it can be very complex, can generally be broken down into
    two key phases:'
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Detecting data errors
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Correcting these errors.
  prefs: []
  type: TYPE_NORMAL
- en: At its core, data cleaning revolves around identifying and resolving discrepancies
    in datasets—specifically, values that violate predefined constraints, which are
    from expectations about the data..
  prefs: []
  type: TYPE_NORMAL
- en: 'It’s important to acknowledge a fundamental fact: it’s almost impossible, in
    real-world scenarios, to be exhaustive in identifying all potential data errors—the
    sources of data issues are virtually infinite, ranging from human input mistakes
    to system failures—and thus impossible to predict entirely. However, what we *can*
    do is define what we consider reasonably regular patterns in our data, known as
    data expectations—reasonable assumptions about what “correct” data should look
    like. For example:'
  prefs: []
  type: TYPE_NORMAL
- en: If working with a dataset of high school students, we might expect ages to fall
    between 14 and 18 years old.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A customer database might require email addresses to follow a standard format
    (e.g., [[email protected]](/cdn-cgi/l/email-protection)).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: By establishing these expectations, we create a structured framework for detecting
    anomalies, making the data cleaning process both manageable and scalable.
  prefs: []
  type: TYPE_NORMAL
- en: 'These expectations are derived from both semantic and statistical analysis.
    We understand that the column name “age” refers to the well-known concept of time
    spent living. Other column names may be drawn from the lexical field of high school,
    and column statistics (e.g. minimum, maximum, mean, etc.) offer insights into
    the distribution and range of values. Taken together, this information helps determine
    our expectations for that column:'
  prefs: []
  type: TYPE_NORMAL
- en: Age values should be integers
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Values should fall between 14 and 18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Expectations tend to be as accurate as the time spent analysing the dataset.
    Naturally, if a dataset is used regularly by a team daily, the likelihood of discovering
    subtle data issues — and therefore refining expectations — increases significantly.
    That said, even simple expectations are rarely checked systematically in most
    environments, often due to time constraints or simply because it’s not the most
    enjoyable or high-priority task on the to-do list.
  prefs: []
  type: TYPE_NORMAL
- en: Once we’ve defined our expectations, the next step is to check whether the data
    actually meets them. This means applying data constraints and looking for violations.
    For each expectation, one or more constraints can be defined. These data quality
    rules can be translated into programmatic functions that return a binary decision
    — a Boolean value indicating whether a given value violates the tested constraint.
  prefs: []
  type: TYPE_NORMAL
- en: This strategy is commonly implemented in many data quality management tools,
    which offer ways to detect all data errors in a dataset based on the defined constraints.
    An iterative process then begins to address each issue until all expectations
    are satisfied — i.e. no violations remain.
  prefs: []
  type: TYPE_NORMAL
- en: This strategy may seem straightforward and easy to implement in theory. However,
    that’s often not what we see in practice — data quality remains a major challenge
    and a time-consuming task in many organisations.
  prefs: []
  type: TYPE_NORMAL
- en: An LLM-based workflow to generate data expectations, detect violations, and
    resolve them
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![](../Images/b06cd39f6db11a324963f78ed21550f7.png)'
  prefs: []
  type: TYPE_IMG
- en: 'This validation workflow is split into two main components: the validation
    of column data types and the compliance with expectations.'
  prefs: []
  type: TYPE_NORMAL
- en: One might handle both simultaneously, but in our experiments, properly converting
    each column’s values in a data frame beforehand is a crucial preliminary step.
    It facilitates data cleaning by breaking down the entire process into a series
    of sequential actions, which improves performance, comprehension, and maintainability.
    This strategy is, of course, somewhat subjective, but it tends to avoid dealing
    with all data quality issues at once wherever possible.
  prefs: []
  type: TYPE_NORMAL
- en: 'To illustrate and understand each step of the whole process, we’ll consider
    this generated example:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/8f194ecc1815d537f664f28f2f3b674f.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Examples of data validity issues are spread across the table. Each row intentionally
    embeds one or more issues:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Row 1:** Uses a non‑standard date format and an invalid URL scheme (non‑conformity
    to expected formats).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Row 2:** Contains a price value as text (“twenty”) instead of a numeric value
    (inappropriate variable type).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Row 3:** Has a rating given as “4 stars” mixed with numeric ratings elsewhere
    (mixed data types).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Row 4:** Provides a rating value of “10”, which is out‑of‑range if ratings
    are expected to be between 1 and 5 (out‑of‑range value). Additionally, there is
    a typo in the word “Food”.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Row 5:** Uses a price with a currency symbol (“20€”) and a rating with extra
    whitespace (“5 ”), showing a lack of measurement standardisation and special characters/whitespace
    issues.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Validate Column Data Types
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Estimate column data types
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'The task here is to determine the most appropriate data type for each column
    in a data frame, based on the column’s semantic meaning and statistical properties.
    The classification is limited to the following options: string, int, float, datetime,
    and boolean. These categories are generic enough to cover most data types commonly
    encountered.'
  prefs: []
  type: TYPE_NORMAL
- en: 'There are multiple ways to perform this classification, including deterministic
    approaches. The method chosen here leverages a large language model (LLM), prompted
    with information about each column and the overall data frame context to guide
    its decision:'
  prefs: []
  type: TYPE_NORMAL
- en: The list of **column names**
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Representative rows** from the dataset, randomly sampled'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Column statistics** describing each column (e.g. number of unique values,
    proportion of top values, etc.)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Example*:'
  prefs: []
  type: TYPE_NORMAL
- en: '| 1\. Column Name: date    Description: Represents the date and time information
    associated with each record.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Suggested Data Type: datetime'
  prefs: []
  type: TYPE_NORMAL
- en: '2\. Column Name: category'
  prefs: []
  type: TYPE_NORMAL
- en: 'Description: Contains the categorical label defining the type or classification
    of the item.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Suggested Data Type: string'
  prefs: []
  type: TYPE_NORMAL
- en: '3\. Column Name: price'
  prefs: []
  type: TYPE_NORMAL
- en: 'Description: Holds the numeric price value of an item expressed in monetary
    terms.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Suggested Data Type: float'
  prefs: []
  type: TYPE_NORMAL
- en: '4\. Column Name: image_url'
  prefs: []
  type: TYPE_NORMAL
- en: 'Description: Stores the web address (URL) pointing to the image of the item.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Suggested Data Type: string'
  prefs: []
  type: TYPE_NORMAL
- en: '5\. Column Name: rating'
  prefs: []
  type: TYPE_NORMAL
- en: 'Description: Represents the evaluation or rating of an item using a numeric
    score.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Suggested Data Type: int |'
  prefs: []
  type: TYPE_NORMAL
- en: Convert Column Values into the Estimated Data Type
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Once the data type of each column has been predicted, the conversion of values
    can begin. Depending on the table framework used, this step might differ slightly,
    but the underlying logic remains similar. For instance, in the [CleanMyExcel.io](https://cleanmyexcel.io/)
    service, Pandas is used as the core data frame engine. However, other libraries
    like Polars or PySpark are equally capable within the Python ecosystem.
  prefs: []
  type: TYPE_NORMAL
- en: All non-convertible values are set aside for further investigation.
  prefs: []
  type: TYPE_NORMAL
- en: Analyse Non-convertible Values and Propose Substitutes
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: This step can be viewed as an imputation task. The previously flagged non-convertible
    values violate the column’s expected data type. Because the potential causes are
    so diverse, this step can be quite challenging. Once again, an LLM offers a helpful
    trade-off to interpret the conversion errors and suggest possible replacements.
  prefs: []
  type: TYPE_NORMAL
- en: Sometimes, the correction is straightforward—for example, converting an age
    value of twenty into the integer 20\. In many other cases, a substitute is not
    so obvious, and tagging the value with a sentinel (placeholder) value is a better
    choice. In Pandas, for instance, the special object pd.NA is suitable for such
    cases.
  prefs: []
  type: TYPE_NORMAL
- en: '*Example*:'
  prefs: []
  type: TYPE_NORMAL
- en: '| {   “violations”: ['
  prefs: []
  type: TYPE_NORMAL
- en: '{'
  prefs: []
  type: TYPE_NORMAL
- en: '“index”: 2,'
  prefs: []
  type: TYPE_NORMAL
- en: '“column_name”: “rating”,'
  prefs: []
  type: TYPE_NORMAL
- en: '“value”: “4 stars”,'
  prefs: []
  type: TYPE_NORMAL
- en: '“violation”: “Contains non-numeric text in a numeric rating field.”,'
  prefs: []
  type: TYPE_NORMAL
- en: '“substitute”: “4”'
  prefs: []
  type: TYPE_NORMAL
- en: '},'
  prefs: []
  type: TYPE_NORMAL
- en: '{'
  prefs: []
  type: TYPE_NORMAL
- en: '“index”: 1,'
  prefs: []
  type: TYPE_NORMAL
- en: '“column_name”: “price”,'
  prefs: []
  type: TYPE_NORMAL
- en: '“value”: “twenty”,'
  prefs: []
  type: TYPE_NORMAL
- en: '“violation”: “Textual representation that cannot be directly converted to a
    number.”,'
  prefs: []
  type: TYPE_NORMAL
- en: '“substitute”: “20”'
  prefs: []
  type: TYPE_NORMAL
- en: '},'
  prefs: []
  type: TYPE_NORMAL
- en: '{'
  prefs: []
  type: TYPE_NORMAL
- en: '“index”: 4,'
  prefs: []
  type: TYPE_NORMAL
- en: '“column_name”: “price”,'
  prefs: []
  type: TYPE_NORMAL
- en: '“value”: “20€”,'
  prefs: []
  type: TYPE_NORMAL
- en: '“violation”: “Price value contains an extraneous currency symbol.”,'
  prefs: []
  type: TYPE_NORMAL
- en: '“substitute”: “20”'
  prefs: []
  type: TYPE_NORMAL
- en: '}'
  prefs: []
  type: TYPE_NORMAL
- en: ']'
  prefs: []
  type: TYPE_NORMAL
- en: '} |'
  prefs: []
  type: TYPE_NORMAL
- en: Replace Non-convertible Values
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: At this point, a programmatic function is applied to replace the problematic
    values with the proposed substitutes. The column is then tested again to ensure
    all values can now be converted into the estimated data type. If successful, the
    workflow proceeds to the expectations module. Otherwise, the previous steps are
    repeated until the column is validated.
  prefs: []
  type: TYPE_NORMAL
- en: Validate Column Data Expectations
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Generate Expectations for All Columns
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'The following elements are provided:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Data dictionary**: column name, a short description, and the expected data
    type'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Representative rows** from the dataset, randomly sampled'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Column statistics**, such as number of unique values and proportion of top
    values'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Based on each column’s semantic meaning and statistical properties, the goal
    is to define validation rules and expectations that ensure data quality and integrity.
    These expectations should fall into one of the following categories related to
    standardisation:'
  prefs: []
  type: TYPE_NORMAL
- en: Valid ranges or intervals
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Expected formats (e.g. for emails or phone numbers)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Allowed values (e.g. for categorical fields)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Column data standardisation (e.g. ‘Mr’, ‘Mister’, ‘Mrs’, ‘Mrs.’ becomes [‘Mr’,
    ‘Mrs’])
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*Example*:'
  prefs: []
  type: TYPE_NORMAL
- en: '| Column name: date'
  prefs: []
  type: TYPE_NORMAL
- en: '• Expectation: Value must be a valid datetime.'
  prefs: []
  type: TYPE_NORMAL
- en: '- Reasoning: The column represents date and time information so each entry
    should follow a standard datetime format (for example, ISO 8601).'
  prefs: []
  type: TYPE_NORMAL
- en: '• Expectation: Datetime values should include timezone information (preferably
    UTC).'
  prefs: []
  type: TYPE_NORMAL
- en: '- Reasoning: The provided sample timestamps include explicit UTC timezone information.
    This ensures consistency in time-based analyses.'
  prefs: []
  type: TYPE_NORMAL
- en: ──────────────────────────────
  prefs: []
  type: TYPE_NORMAL
- en: 'Column name: category'
  prefs: []
  type: TYPE_NORMAL
- en: '• Expectation: Allowed values should be standardized to a predefined set.'
  prefs: []
  type: TYPE_NORMAL
- en: '- Reasoning: Based on the semantic meaning, valid categories might include
    “Books”, “Electronics”, “Food”, “Clothing”, and “Furniture”. (Note: The sample
    includes “Fod”, which likely needs correcting to “Food”.)'
  prefs: []
  type: TYPE_NORMAL
- en: '• Expectation: Entries should follow a standardized textual format (e.g., Title
    Case).'
  prefs: []
  type: TYPE_NORMAL
- en: '- Reasoning: Consistent capitalization and spelling will improve downstream
    analyses and reduce data cleaning issues.'
  prefs: []
  type: TYPE_NORMAL
- en: ──────────────────────────────
  prefs: []
  type: TYPE_NORMAL
- en: 'Column name: price'
  prefs: []
  type: TYPE_NORMAL
- en: '• Expectation: Value must be a numeric float.'
  prefs: []
  type: TYPE_NORMAL
- en: '- Reasoning: Since the column holds monetary amounts, entries should be stored
    as numeric values (floats) for accurate calculations.'
  prefs: []
  type: TYPE_NORMAL
- en: '• Expectation: Price values should fall within a valid non-negative numeric
    interval (e.g., price ≥ 0).'
  prefs: []
  type: TYPE_NORMAL
- en: '- Reasoning: Negative prices generally do not make sense in a pricing context.
    Even if the minimum observed value in the sample is 9.99, allowing zero or positive
    values is more realistic for pricing data.'
  prefs: []
  type: TYPE_NORMAL
- en: ──────────────────────────────
  prefs: []
  type: TYPE_NORMAL
- en: 'Column name: image_url'
  prefs: []
  type: TYPE_NORMAL
- en: '• Expectation: Value must be a valid URL with the expected format.'
  prefs: []
  type: TYPE_NORMAL
- en: '- Reasoning: Since the column stores image web addresses, each URL should adhere
    to standard URL formatting patterns (e.g., including a proper protocol schema).'
  prefs: []
  type: TYPE_NORMAL
- en: '• Expectation: The URL should start with “https://”.'
  prefs: []
  type: TYPE_NORMAL
- en: '- Reasoning: The sample shows that one URL uses “htp://”, which is likely a
    typo. Enforcing a secure (https) URL standard improves data reliability and user
    security.'
  prefs: []
  type: TYPE_NORMAL
- en: ──────────────────────────────
  prefs: []
  type: TYPE_NORMAL
- en: 'Column name: rating'
  prefs: []
  type: TYPE_NORMAL
- en: '• Expectation: Value must be an integer.'
  prefs: []
  type: TYPE_NORMAL
- en: '- Reasoning: The evaluation score is numeric, and as seen in the sample the
    rating is stored as an integer.'
  prefs: []
  type: TYPE_NORMAL
- en: '• Expectation: Rating values should fall within a valid interval, such as between
    1 and 5.'
  prefs: []
  type: TYPE_NORMAL
- en: '- Reasoning: In many contexts, ratings are typically on a scale of 1 to 5\.
    Although the sample includes a value of 10, it is likely a data quality issue.
    Enforcing this range standardizes the evaluation scale. |'
  prefs: []
  type: TYPE_NORMAL
- en: Generate Validation Code
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Once expectations have been defined, the goal is to create a structured code
    that checks the data against these constraints. The code format may vary depending
    on the chosen validation library, such as [Pandera](https://pandera.readthedocs.io/)
    (used in [CleanMyExcel.io](https://cleanmyexcel.io/)), [Pydantic](https://docs.pydantic.dev/latest/),
    [Great Expectations](https://greatexpectations.io/), [Soda](https://www.soda.io/),
    etc.
  prefs: []
  type: TYPE_NORMAL
- en: To make debugging easier, the validation code should apply checks elementwise
    so that when a failure occurs, the row index and column name are clearly identified.
    This helps to pinpoint and resolve issues effectively.
  prefs: []
  type: TYPE_NORMAL
- en: Analyse Violations and Propose Substitutes
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: When a violation is detected, it must be resolved. Each issue is flagged with
    a short explanation and a precise location (row index + column name). An LLM is
    used to estimate the best possible replacement value based on the violation’s
    description. Again, this proves useful due to the variety and unpredictability
    of data issues. If the appropriate substitute is unclear, a sentinel value is
    applied, depending on the data frame package in use.
  prefs: []
  type: TYPE_NORMAL
- en: '*Example*:'
  prefs: []
  type: TYPE_NORMAL
- en: '| {   “violations”: ['
  prefs: []
  type: TYPE_NORMAL
- en: '{'
  prefs: []
  type: TYPE_NORMAL
- en: '“index”: 3,'
  prefs: []
  type: TYPE_NORMAL
- en: '“column_name”: “category”,'
  prefs: []
  type: TYPE_NORMAL
- en: '“value”: “Fod”,'
  prefs: []
  type: TYPE_NORMAL
- en: '“violation”: “category should be one of [‘Books’, ‘Electronics’, ‘Food’, ‘Clothing’,
    ‘Furniture’]”,'
  prefs: []
  type: TYPE_NORMAL
- en: '“substitute”: “Food”'
  prefs: []
  type: TYPE_NORMAL
- en: '},'
  prefs: []
  type: TYPE_NORMAL
- en: '{'
  prefs: []
  type: TYPE_NORMAL
- en: '“index”: 0,'
  prefs: []
  type: TYPE_NORMAL
- en: '“column_name”: “image_url”,'
  prefs: []
  type: TYPE_NORMAL
- en: '“value”: “htp://imageexample.com/pic.jpg”,'
  prefs: []
  type: TYPE_NORMAL
- en: '“violation”: “image_url should start with ‘https://’”,'
  prefs: []
  type: TYPE_NORMAL
- en: '“substitute”: “https://imageexample.com/pic.jpg”'
  prefs: []
  type: TYPE_NORMAL
- en: '},'
  prefs: []
  type: TYPE_NORMAL
- en: '{'
  prefs: []
  type: TYPE_NORMAL
- en: '“index”: 3,'
  prefs: []
  type: TYPE_NORMAL
- en: '“column_name”: “rating”,'
  prefs: []
  type: TYPE_NORMAL
- en: '“value”: “10”,'
  prefs: []
  type: TYPE_NORMAL
- en: '“violation”: “rating should be between 1 and 5”,'
  prefs: []
  type: TYPE_NORMAL
- en: '“substitute”: “5”'
  prefs: []
  type: TYPE_NORMAL
- en: '}'
  prefs: []
  type: TYPE_NORMAL
- en: ']'
  prefs: []
  type: TYPE_NORMAL
- en: '} |'
  prefs: []
  type: TYPE_NORMAL
- en: The remaining steps are similar to the iteration process used during the validation
    of column data types. Once all violations are resolved and no further issues are
    detected, the data frame is fully validated.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/84c3caa95e2882650f42b6792a14063e.png)'
  prefs: []
  type: TYPE_IMG
- en: You can test the feature described in this article on your own dataset using
    the [CleanMyExcel.io](https://cleanmyexcel.io/) service, which is free and requires
    no registration.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Expectations may sometimes lack domain expertise — integrating human input can
    help surface more diverse, specific, and reliable expectations.
  prefs: []
  type: TYPE_NORMAL
- en: A key challenge lies in automation during the resolution process. A human-in-the-loop
    approach could introduce more transparency, particularly in the selection of substitute
    or imputed values.
