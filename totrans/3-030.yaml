- en: Want Better Clusters? Try DeepType
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/want-better-clusters-try-deeptype/](https://towardsdatascience.com/want-better-clusters-try-deeptype/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '<mdspan datatext="el1746163342586" class="mdspan-comment">On the surface</mdspan>,
    neural networks and clustering algorithms seem worlds apart. Neural networks are
    typically used in supervised learning, where the goal is to label new data based
    on patterns learned from a labeled dataset. Clustering, by contrast, is usually
    an unsupervised task: we try to uncover relationships in data without access to
    ground truth labels.'
  prefs: []
  type: TYPE_NORMAL
- en: 'As it turns out, deep learning can be incredibly useful for clustering problems.
    Here’s the key idea: suppose we train a neural network using a loss function that
    reflects something we care about — say, how well we can classify or separate examples.
    If the network achieves low loss, we can infer that the **representations** it
    learns (especially in the second-to-last layer) capture meaningful structure in
    the data. In other words, these intermediate representations encode what the network
    has learned about the task.'
  prefs: []
  type: TYPE_NORMAL
- en: So, what happens if we run a clustering algorithm (like KMeans) on those representations?
    Ideally, we end up with clusters that reflect the same underlying structure the
    network was trained to capture.
  prefs: []
  type: TYPE_NORMAL
- en: '*Ahh, that’s a lot!* Here’s a picture:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/1077b38fccef0f730c2ada8407c982fa.png)'
  prefs: []
  type: TYPE_IMG
- en: Graph showing how the input flows through our neural net
  prefs: []
  type: TYPE_NORMAL
- en: As seen in the image, when we run our inputs through until the second-to-last
    layer, we get a vector out with Kₘ values, which is presumably a lot lower than
    the amount of inputs we started with if we did everything right. Because the output
    layer *solely looks at this vector when making predictions*, if our predictions
    are good, we can conclude that this vector encapsulates some important information
    about our data. Clustering in this space is more meaningful than clustering raw
    data, since we’ve filtered for the features that actually matter.
  prefs: []
  type: TYPE_NORMAL
- en: This is the fundamental idea behind **DeepType** — a neural network approach
    to clustering. Rather than clustering raw data directly, DeepType first learns
    a task-relevant representation through supervised training and then performs clustering
    in that learned space.
  prefs: []
  type: TYPE_NORMAL
- en: This does raise a question, however — if we already have ground-truth labels,
    why would we need to run clustering? After all, if we just clustered using our
    labels, wouldn’t that create a perfect clustering? Then, for new data points,
    we could simply run our neural net, predict the label, and cluster the point appropriately.
  prefs: []
  type: TYPE_NORMAL
- en: As it turns out, in some contexts, **we care more about the relationships between
    our data points than the labels themselves**. In the [paper that introduced DeepType](https://pubmed.ncbi.nlm.nih.gov/31603461/),
    for instance, the authors used the idea described to find different groupings
    of patients with breast cancer based on genetic data, which is very useful in
    a biological context. They then found that these groups correlated very highly
    to survival rates, which makes sense given that the representations they clustered
    on were ingrained with biological knowledge¹.
  prefs: []
  type: TYPE_NORMAL
- en: 'Refining the Idea: DeepType’s Loss Function'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'At this point, we understand the core idea: train a neural network to learn
    a task-relevant representation, then cluster in that space. However, we can make
    some slight modifications to make this process better.'
  prefs: []
  type: TYPE_NORMAL
- en: 'For starters, we’d like the clusters that we produce to be compact if possible.
    In other words, we’d much rather have the situation in the picture on the left
    than on the right:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/498d2a90389055e7e19352e3985d1f1f.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Fig 2: Compact (nice) clusters on the left, and more spread apart clusters
    on the right'
  prefs: []
  type: TYPE_NORMAL
- en: In order to do this, we want to push the representations of data points in the
    same clusters to be as close together as possible. To do this, we add a term to
    our loss function that penalizes the distance between our input’s representation
    and the center of the cluster its been assigned to. Thus, our loss function becomes
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/7fac1e2e62e67fc045e7f8bef2c1b5d6.png)'
  prefs: []
  type: TYPE_IMG
- en: DeepType loss including representation. MSE can be replaced with the loss of
    choice, e.g. BCE
  prefs: []
  type: TYPE_NORMAL
- en: Where *d* is a distance function between vectors, i.e. the square of the norm
    of the difference between the vectors (as is used in the original paper).
  prefs: []
  type: TYPE_NORMAL
- en: 'But wait, how do we get the cluster centers if we haven’t trained the network
    yet? In order to get around that, DeepType does the following procedure:'
  prefs: []
  type: TYPE_NORMAL
- en: Train a model on just the primary loss
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Create clusters in the representation space (using e.g. KMeans or your favorite
    algorithm)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Train the model using the modified loss
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Go back to step 2 and repeat until we converge
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Eventually, this procedure produces compact clusters that hopefully correspond
    to our loss of interest.
  prefs: []
  type: TYPE_NORMAL
- en: Finding Important Inputs
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: In contexts where DeepType is useful, in addition to caring about clusters,
    we also care about which inputs are the most informative/important. The paper
    that introduced DeepType, for instance, was interested in determining which genes
    were the most important in determining someone’s cancer subtype — such information
    is certainly useful for a biologist. Plenty of other contexts would also find
    such information interesting — in fact, it’s hard to dream up one that wouldn’t.
  prefs: []
  type: TYPE_NORMAL
- en: In a deep learning context, we can consider an input to be important if the
    magnitude of the weights assigned to it by the nodes in the first layer are high.
    In contrast, if most of our nodes have a weight close to 0 for the input, it won’t
    contribute much to our final prediction, and hence likely isn’t all that important.
  prefs: []
  type: TYPE_NORMAL
- en: We thus introduce one final loss term — a **sparsity loss — **that will encourage
    our neural net to push as many input weights to 0 as possible. With that, our
    final modified DeepType loss becomes
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/9d3c9792cd5c96a1c8eaffd773580106.png)'
  prefs: []
  type: TYPE_IMG
- en: DeepType loss including representation. MSE can be replaced with the loss of
    choice, e.g. BCE
  prefs: []
  type: TYPE_NORMAL
- en: Where the beta term is the distance term we had before, and the alpha term effectively
    penalizes a high “magnitude” of the first-layer weight matrix².
  prefs: []
  type: TYPE_NORMAL
- en: 'We also modify the four-step procedure from the previous section slightly.
    Instead of just training on the MSE in the first step, we train on both the MSE
    and the sparsity loss in the pretraining step. Per the authors, our final DeepType
    structure looks like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/58c6500833c30557eba212cee3c53356.png)'
  prefs: []
  type: TYPE_IMG
- en: Overall view of DeepType. [Source](https://pmc.ncbi.nlm.nih.gov/articles/PMC8215925/pdf/btz769.pdf)
  prefs: []
  type: TYPE_NORMAL
- en: Playing with DeepType
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As part of my research, I’ve posted an [open-source implementation of DeepType
    here](https://github.com/PhysBoom/torch-deeptype). You can additionally download
    it from pip by doing `pip install torch-deeptype` .
  prefs: []
  type: TYPE_NORMAL
- en: 'The DeepType package uses a fairly simple infrastructure to get everything
    tested. As an example, we’ll create a synthetic dataset with four clusters and
    20 inputs, only 5 of which actually contribute to the output:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'Here’s what our data looks like when we plot a PCA:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/43ed3bb164ae9cf3297b1838b1ff7e2f.png)'
  prefs: []
  type: TYPE_IMG
- en: PCA plot of our synthetic dataset
  prefs: []
  type: TYPE_NORMAL
- en: 'We’ll then define a `DeeptypeModel` — It can be any infrastructure as long
    as it implements the `forward` , `get_input_layer_weights` , and `get_hidden_representations`
    functions:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 'Then, we create a `DeeptypeTrainer` and train:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: After training, we can then easily extract the important inputs
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: Which is awesome, we got back the 5 important inputs as expected!
  prefs: []
  type: TYPE_NORMAL
- en: 'We can also easily extract the clusters using the representation layer and
    plot them:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/33d8b5c7e6d8327c5f7ba40bec3e4067.png)'
  prefs: []
  type: TYPE_IMG
- en: Plot of our recovered clusters
  prefs: []
  type: TYPE_NORMAL
- en: And boom, that’s all!
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Though DeepType won’t be the right tool for every problem, it offers a powerful
    way to integrate domain knowledge into the clustering process. So if you find
    yourself with a meaningful loss function and a desire to uncover structure in
    your data—give DeepType a shot!
  prefs: []
  type: TYPE_NORMAL
- en: '*Please contact [[email protected]](/cdn-cgi/l/email-protection) for any inquiries.
    All images by author unless stated otherwise.*'
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Biologists have determined a set of cancer subtypes for the broader category
    breast cancer. Though I’m no expert, it’s safe to assume that these subtypes were
    identified by biologists for a reason. The the authors trained their model to
    predict the subtype for a patient, which provided the biological context necessary
    to produce novel, interesting clusters. Given the goal, though, I’m not sure why
    the authors chose to predict on subtypes instead of patient outcomes directly,
    though — in fact, I bet the results from such an experiment would be interesting.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The norm presented is defined as
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![](../Images/d95fd131e04a930dc924ca4ef1227295.png)'
  prefs: []
  type: TYPE_IMG
- en: L 2,1 Norm Definition
  prefs: []
  type: TYPE_NORMAL
- en: We transpose w since we want to penalize the columns of the weight matrix rather
    than the rows. This is important because in a fully connected neural network layer,
    **each column of the weight matrix corresponds to an input feature**. By applying
    the ℓ2,1​ norm to the transposed matrix, we encourage entire input features to
    be zeroed out, promoting feature-level sparsity
  prefs: []
  type: TYPE_NORMAL
- en: '*Cover image source: [here](https://unsplash.com/photos/a-cluster-of-stars-in-the-night-sky-pFX99i3Ge4A)*'
  prefs: []
  type: TYPE_NORMAL
