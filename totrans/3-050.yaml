- en: AI Agents for a More Sustainable World
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/ai-agents-for-a-more-sustainable-world/](https://towardsdatascience.com/ai-agents-for-a-more-sustainable-world/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1745952186363" class="mdspan-comment">As political support</mdspan>
    for sustainability weakens, the need for long-term sustainable practices has never
    been more critical.
  prefs: []
  type: TYPE_NORMAL
- en: How can we use analytics, boosted by agentic AI, to support companies in their
    green transformation?
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: For years, the focus of my blog was always on using Supply Chain Analytics methodologies
    and tools to solve specific problems.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ae13940bfcde72b41a0a38c587ce7675.png)'
  prefs: []
  type: TYPE_IMG
- en: '[Four Types of Supply Chain Analytics](https://towardsdatascience.com/what-is-supply-chain-analytics-42f1b2df4a2/)
    – (Image by Samir Saci)'
  prefs: []
  type: TYPE_NORMAL
- en: At [Logi](https://www.logi-green.com/)[G](https://www.logi-green.com/)[reen](https://www.logi-green.com/),
    the startup I founded, we deploy these analytics solutions to help retailers,
    manufacturers, and logistics companies meet their sustainability targets.
  prefs: []
  type: TYPE_NORMAL
- en: In this article, I will demonstrate how we can supercharge these existing solutions
    with AI agents.
  prefs: []
  type: TYPE_NORMAL
- en: The objective is to make it easier and faster for companies to implement sustainability
    initiatives across their supply chains.
  prefs: []
  type: TYPE_NORMAL
- en: Obstacles for Green Transformations of Companies
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As political and financial pressures shift focus away from sustainability, making
    the green transformation easier and more accessible has never been more urgent.
  prefs: []
  type: TYPE_NORMAL
- en: Last week, I attended the global **ChangeNOW** conference, held in my hometown,
    Paris.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/6fa65e3298a39c63b8e2a9a254ded217.png)'
  prefs: []
  type: TYPE_IMG
- en: ChangeNOW in Grand Palais of Paris – (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: This conference brought together innovators, entrepreneurs and decision-makers
    committed to building a better future, despite the challenging context.
  prefs: []
  type: TYPE_NORMAL
- en: It was an excellent opportunity to meet some of my readers and connect with
    leaders driving change across industries.
  prefs: []
  type: TYPE_NORMAL
- en: Through these discussions, one clear message emerged.
  prefs: []
  type: TYPE_NORMAL
- en: 'Companies face three main obstacles when driving sustainable transformation:'
  prefs: []
  type: TYPE_NORMAL
- en: A lack of visibility on operational processes,
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The complexity of sustainability reporting requirements,
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The challenge of designing and implementing initiatives across the value chain.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/6869adef7c56a1a59928e10f32ccf051.png)'
  prefs: []
  type: TYPE_IMG
- en: Examples of Challenges Faced by Companies – (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: 'In the following sections, I will explore how we can leverage **Agentic AI**
    to overcome two of these major obstacles:'
  prefs: []
  type: TYPE_NORMAL
- en: Improving reporting to respect the regulations
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Accelerating the design and execution of sustainable initiatives
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Solving Reporting Challenges with AI Agents
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The first step in any sustainable roadmap is to build the reporting foundation.
  prefs: []
  type: TYPE_NORMAL
- en: Companies must measure and publish their current environmental footprint before
    taking action.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![](../Images/c99c2e4097fffc7e60511ba4ff831de2.png)'
  prefs: []
  type: TYPE_IMG
- en: '[Environmental Social, and Governance Reporting](https://towardsdatascience.com/what-is-esg-reporting-d610535eed9c/)
    – (Image by Samir Saci)'
  prefs: []
  type: TYPE_NORMAL
- en: For example, ESG reporting communicates a company’s environmental performance
    **(E)**, social responsibility **(S)**, and governance structures’strength **(G)**.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s start by tackling the problem of data preparation.
  prefs: []
  type: TYPE_NORMAL
- en: 'Issue 1: Data Collection and Processing'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: However, many companies face significant challenges right from the start, beginning
    with **data collection**.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/eb1b9f5ce03dbf5d919c61c1e37b85cd.png)'
  prefs: []
  type: TYPE_IMG
- en: Type of Information to Collect for [Life Cycle Assessment](https://towardsdatascience.com/what-is-a-life-cycle-assessment-lca-e32a5078483a/)
    – (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: In a previous article, I introduced the concept of [Life Cycle Assessment](https://towardsdatascience.com/what-is-a-life-cycle-assessment-lca-e32a5078483a/)
    (LCA) — a method for evaluating a product’s environmental impacts from raw material
    extraction to disposal.
  prefs: []
  type: TYPE_NORMAL
- en: This requires a complex data pipeline to connect to multiple systems, extract
    raw data, process it and store it in a data warehouse.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/927e61382182620b5c11f7f7469a5f56.png)'
  prefs: []
  type: TYPE_IMG
- en: '[Example of Data Infrastructure for a Life Cycle Assessment](https://towardsdatascience.com/what-is-a-life-cycle-assessment-lca-e32a5078483a/)
    – (Image by Samir Saci)'
  prefs: []
  type: TYPE_NORMAL
- en: These pipelines serve to generate reports and provide harmonised data sources
    for analytics and business teams.
  prefs: []
  type: TYPE_NORMAL
- en: How can we help non-technical teams navigate this complex landscape?
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: In [LogiGreen](https://www.logi-green.com/), we explore the usage of an AI Agent
    for text-to-SQL applications.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/fda00bca4a19e6222dd99537ea1ca3c2.png)'
  prefs: []
  type: TYPE_IMG
- en: Text-to-SQL applications for Supply Chain – (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: The great added value is that business and operational teams no longer rely
    on analytics experts to build tailored solutions.
  prefs: []
  type: TYPE_NORMAL
- en: As a Supply Chain Engineer myself, I understand the frustration of operations
    managers who must create support tickets just to extract data or calculate a new
    indicator.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ef3b82f2403fd443ab6379782cd6e782.png)'
  prefs: []
  type: TYPE_IMG
- en: Example of Interaction with an Agent – (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: With this AI agent, we provide an Analytics-as-a-Service experience for all
    users, allowing them to formulate their demand in plain English.
  prefs: []
  type: TYPE_NORMAL
- en: For instance, we help reporting teams build specific prompts to collect data
    from multiple tables to feed a report.
  prefs: []
  type: TYPE_NORMAL
- en: “Please generate a table showing the sum of CO₂ emissions per day for all deliveries
    from warehouse XXX.”
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: For more information on how I implemented this agent, [check this article](https://towardsdatascience.com/automate-supply-chain-analytics-workflows-with-ai-agents-using-n8n/)
    👇.
  prefs: []
  type: TYPE_NORMAL
- en: '[Automate Supply Chain Analytics Workflows with AI Agents using n8n | Towards
    Data Science↗](https://towardsdatascience.com/automate-supply-chain-analytics-workflows-with-ai-agents-using-n8n/)'
  prefs: []
  type: TYPE_NORMAL
- en: 'Issue 2: Reporting Format'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Even after collecting the data, companies face another challenge: **generating
    the report in the required formats**.'
  prefs: []
  type: TYPE_NORMAL
- en: In Europe, the new **Corporate Sustainability Reporting Directive (CSRD)** provides
    a framework for companies to disclose their environmental, social, and governance
    impacts.
  prefs: []
  type: TYPE_NORMAL
- en: Under CSRD, companies must submit structured reports in **XHTML format**.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/5a29875dc5964068d226a41e2c8d088c.png)'
  prefs: []
  type: TYPE_IMG
- en: Simple Example of an xHTML report that is not compliant – (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: This document, enriched with detailed **ESG taxonomies**, requires a process
    that can be highly technical and prone to errors, especially for companies with
    low data maturity.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/19339cd4ad2a4bedf0f4afbdc5b6c74c.png)'
  prefs: []
  type: TYPE_IMG
- en: AI Agent for CSRD Report Format Audit – (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: Therefore, we have experimented with using an AI Agent to automatically audit
    the report and provide a summary to non-technical users.
  prefs: []
  type: TYPE_NORMAL
- en: How does it work?
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Users send their report by Email.**'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/88b1cbe006d5b7103ef953e61201a39d.png)'
  prefs: []
  type: TYPE_IMG
- en: Email with the report in attachment – (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: The endpoint automatically downloads the attached file, performs an audit of
    the content and format, searching for errors or missing values.
  prefs: []
  type: TYPE_NORMAL
- en: The results are then sent to an AI Agent, which generates a clear summary of
    the audit in English.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/04a51eeb706d614fa48ab948573875d6.png)'
  prefs: []
  type: TYPE_IMG
- en: Example of System Prompt of the AI Agent – (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: '**The agent sends a report back to the sender**.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/2eaf6913a01e0ceb383b00e313f41c6b.png)'
  prefs: []
  type: TYPE_IMG
- en: We have developed a fully automated service to audit reports created by sustainability
    consultants *(our customer is a consultancy firm)* that anyone can use without
    requiring technical skills.
  prefs: []
  type: TYPE_NORMAL
- en: Interested in implementing a similar solution?
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: I built this project using the no-code platform n8n.
  prefs: []
  type: TYPE_NORMAL
- en: You can find the ready-to-deploy template in [my n8n creator profile.](https://n8n.io/creators/samirsaci/)
  prefs: []
  type: TYPE_NORMAL
- en: 'Now that we have explored solutions for reporting, we can move on to the core
    of green transformations: **designing and implementing sustainable initiatives.**'
  prefs: []
  type: TYPE_NORMAL
- en: Agentic AI for Supply Chain Analytics Products
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Analytics Products for Sustainability
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: My focus over the last two years has been on building analytics products, including
    web applications, APIs and automated workflows.
  prefs: []
  type: TYPE_NORMAL
- en: What is a sustainability roadmap?
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: In my previous experience, it often started with a push from top management.
  prefs: []
  type: TYPE_NORMAL
- en: For example, leadership would ask the supply chain department to measure the
    company’s CO₂ emissions for the baseline year of 2021.
  prefs: []
  type: TYPE_NORMAL
- en: I was responsible for estimating the **Scope 3 emissions** of the distribution
    chain.
  prefs: []
  type: TYPE_NORMAL
- en: '[![](../Images/4e9781f98492708eba93eb1abc45fb88.png)](https://towardsdatascience.com/supply-chain-sustainability-reporting-with-python-161c1f63f267/)'
  prefs: []
  type: TYPE_NORMAL
- en: Suppl[y Chain Sustainability Reporting](https://towardsdatascience.com/supply-chain-sustainability-reporting-with-python-161c1f63f267/)
    – (Image by Samir Saci)
  prefs: []
  type: TYPE_NORMAL
- en: This is why I implemented the methodology presented in the article linked above.
  prefs: []
  type: TYPE_NORMAL
- en: Once a baseline is established, a **reduction target** is defined with a clear
    deadline.
  prefs: []
  type: TYPE_NORMAL
- en: For instance, your management can commit to a 30% reduction by 2030.
  prefs: []
  type: TYPE_NORMAL
- en: The role of the supply chain department is then to design and implement initiatives
    that reduce CO2 emissions.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c2983ea2d880a4e1af11eb39aed2d558.png)'
  prefs: []
  type: TYPE_IMG
- en: '[Example of a roadmap with initiatives](https://www.logi-green.com/) – (Image
    by Samir Saci)'
  prefs: []
  type: TYPE_NORMAL
- en: In the example above, the company reaches a 30% reduction by year N through
    initiatives across manufacturing, logistics, retail operations and carbon offsetting.
  prefs: []
  type: TYPE_NORMAL
- en: To support this journey, we develop analytics products that simulate the impact
    of different initiatives, helping teams to design optimal sustainability strategies.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/5563d34ba7dee54c67b48948ae9b8863.png)'
  prefs: []
  type: TYPE_IMG
- en: '[Example of analytics products to support sustainability roadmaps](https://logi-green.com)
    – (Image by Samir Saci)'
  prefs: []
  type: TYPE_NORMAL
- en: So far, the products have been in the form of web applications with a user interface
    and a backend connected to their data sources.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/570c1363f419704dc4adb6e9dde9b2f3.png)'
  prefs: []
  type: TYPE_IMG
- en: '[Example of UI for the Supply Chain Optimisation Module](https://logi-green.com)
    – (Image by Samir Saci)'
  prefs: []
  type: TYPE_NORMAL
- en: Each module provides key insights to support operational decision-making.
  prefs: []
  type: TYPE_NORMAL
- en: “Based on the outputs, we could achieve a 32% CO₂ emissions reduction by relocating
    our factory from Brazil to the USA.”
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: However, for an audience unfamiliar with data analytics, interacting with these
    applications can still feel overwhelming.
  prefs: []
  type: TYPE_NORMAL
- en: How can we use AI agents to better support these users?
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Agentic AI for Analytics Products
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We are now evolving these solutions by embedding autonomous AI agents that interact
    directly with analytics models and tools through API endpoints.
  prefs: []
  type: TYPE_NORMAL
- en: 'These agents are designed to **guide non-technical users** through the entire
    journey, starting from a simple question:'
  prefs: []
  type: TYPE_NORMAL
- en: '*“How can I reduce the CO₂ emissions of my transportation network?”*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'The AI agent then takes charge of:'
  prefs: []
  type: TYPE_NORMAL
- en: Formulating the correct queries,
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Connecting to the optimisation models,
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Interpreting the results,
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: And providing actionable recommendations.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The user doesn’t need to understand how the backend works.
  prefs: []
  type: TYPE_NORMAL
- en: 'They receive a direct, business-oriented output like:'
  prefs: []
  type: TYPE_NORMAL
- en: '*“Implement Solution XXX with an investment budget of YYY euros to achieve
    a CO₂ emissions reduction of ZZZ tons CO₂eq.”*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: By combining optimisation models, APIS, and AI-driven guidance, we offer an
    Analytics-as-a-Service experience.
  prefs: []
  type: TYPE_NORMAL
- en: We want to make sustainability analytics accessible to all teams, not just technical
    experts.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Using AI Responsibly
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Before closing, a word about minimising the environmental footprint of the solutions
    we develop.
  prefs: []
  type: TYPE_NORMAL
- en: We are fully aware of the environmental impacts of using LLMs.
  prefs: []
  type: TYPE_NORMAL
- en: Therefore, the core of our products remains built on **deterministic optimisation
    models**, **carefully designed by us**.
  prefs: []
  type: TYPE_NORMAL
- en: Large Language Models (LLMS) are used only when they provide real added value,
    primarily to simplify user interaction or automate non-critical tasks.
  prefs: []
  type: TYPE_NORMAL
- en: 'This allows us to:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Guarantee robustness and reliability**: for the same input, users consistently
    receive the same output, avoiding stochastic behaviours typical of pure AI models'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Minimise energy consumption:** by reducing the number of tokens used in our
    API calls and optimising every prompt to be as efficient as possible.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In short, we are committed to building solutions that are sustainable by their
    design.
  prefs: []
  type: TYPE_NORMAL
- en: AI Agents are a game changer for Supply Chain Analytics
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: For me, AI agents are becoming powerful allies in helping our customers accelerate
    their sustainability roadmaps.
  prefs: []
  type: TYPE_NORMAL
- en: As I interact with a non-technical target audience, this is a competitive advantage,
    as it allows me to provide Analytics-as-a-Service solutions that empower operational
    teams.
  prefs: []
  type: TYPE_NORMAL
- en: This simplifies one of the biggest obstacles companies face when starting their
    green transformation.
  prefs: []
  type: TYPE_NORMAL
- en: By **communicating insights in plain language** and **guiding users through
    their journey, AI agents help** bridge the gap between data-driven solutions and
    operational execution.
  prefs: []
  type: TYPE_NORMAL
- en: About Me
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: Let’s connect on [Linkedin](https://www.linkedin.com/in/samir-saci/) and [Twitter](https://twitter.com/Samir_Saci_);
    I am a Supply Chain Engineer using data analytics to improve [Logistics](https://towardsdatascience.com/tag/logistics/) operations
    and reduce costs.
  prefs: []
  type: TYPE_NORMAL
- en: For consulting or advice on analytics and sustainable [Supply Chain](https://towardsdatascience.com/tag/supply-chain/) transformation,
    feel free to contact me via [Logigreen Consulting](https://www.logi-green.com/).
  prefs: []
  type: TYPE_NORMAL
