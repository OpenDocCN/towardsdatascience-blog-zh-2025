  type: TYPE_NORMAL
  zh: 欢迎在 [LinkedIn](https://www.linkedin.com/in/maxime-wolf/) 上与我联系！
- en: Follow me on [GitHub](https://github.com/maxime7770) and visit [my website](http://maximewolf.com)
