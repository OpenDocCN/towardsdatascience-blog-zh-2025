    获取更多内容。
- en: '* * *'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Model pruning
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 模型剪枝
- en: 'Pruning is probably the most intuitive compression technique. The idea is very
    simple: remove some of the weights of the network, either randomly or **remove
    the “less important” ones**. Of course, when we talk about “removing” weights
    in the context of neural networks, it means **setting the weights to zero**.'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 剪枝可能是最直观的压缩技术。其想法非常简单：移除网络中的一些权重，要么随机移除，要么**移除“不那么重要”的权重**。当然，当我们谈论神经网络中的“移除”权重时，这意味着**将权重设置为0**。
- en: '![](../Images/b46bec96c5f9b48557a44a42c9f304ee.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/b46bec96c5f9b48557a44a42c9f304ee.png)'
- en: 'Model pruning (Image by the author and ChatGPT | Inspiration: [3])'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 模型剪枝（图片由作者和ChatGPT提供 | 灵感来源：[3]）
- en: Structured vs unstructured pruning
  id: totrans-14
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 结构化剪枝与无结构剪枝
- en: 'Let’s start with a **simple heuristic**: removing weights smaller than a threshold.'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从**简单的启发式方法**开始：移除小于阈值的权重。
- en: \[ w’_{ij} = \begin{cases} w_{ij} & \text{if } |w_{ij}| \ge \theta_0 \\
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: \[ w’_{ij} = \begin{cases} w_{ij} & \text{if } |w_{ij}| \ge \theta_0 \\
- en: 0 & \text{if } |w_{ij}| < \theta_0
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 0 & \text{if } |w_{ij}| < \theta_0
- en: \end{cases} \]
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: \end{cases} \]
- en: 'Of course, this is not ideal because we would need to find a way to **find
    the right threshold** for our problem! A more practical approach is to remove
    a specified proportion of weights with **the smallest magnitudes** (norm) within
    one layer. There are 2 common ways of implementing pruning in one layer:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，这并不理想，因为我们需要找到一种方法来**找到合适阈值**！一个更实际的方法是移除一层中**幅度最小**的指定比例的权重。在单层中实现剪枝有2种常见方法：
- en: '**Structured pruning**: remove entire components of the network (e.g. a random
    row from the weight tensor, or a random channel in a convulational layer)'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**结构化剪枝**：移除网络中的整个组件（例如，权重张量中的随机行，或卷积层中的随机通道）'
- en: '**Unstructured pruning**: remove individual weights regardless of their positions
    and of the structure of the tensor'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**无结构剪枝**：无论权重位置如何，无论张量结构如何，都移除单个权重'
- en: We can also use **global pruning** with either of the two above methods. This
    will remove the chosen proportion of weights across multiple layers, and potentially
    have different removal rates depending on the number of parameters in each layer.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 我们也可以使用**全局剪枝**与上述两种方法中的任何一种。这将移除多个层中选择的权重比例，并且可能根据每层的参数数量具有不同的移除率。
- en: PyTorch makes this pretty straightforward (by the way, you can find all code
    snippets in [my GitHub repo](https://github.com/maxime7770/Model-Compression)).
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: PyTorch使这个过程非常直接（顺便说一句，你可以在我的GitHub仓库 [我的GitHub仓库](https://github.com/maxime7770/Model-Compression)
    中找到所有代码片段）。
- en: '[PRE0]'
  id: totrans-24
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: '*Note: if you have taken statistics classes, you probably learned regularization-induced
    methods that also implicitly prune some weights during training, by using L0 or
    L1 norm regularization. Pruning differs from that because it is applied as a **post-model
    compression** technique*'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: '*注意：如果你上过统计学课程，你可能学过正则化诱导的方法，这些方法在训练过程中也隐式地剪枝了一些权重，通过使用 L0 或 L1 范数正则化。剪枝与它不同，因为它是一种**模型压缩后的后处理技术***'
- en: Why does pruning work? The Lottery Ticket Hypothesis
  id: totrans-26
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 为什么剪枝有效？彩票假设
- en: '![](../Images/1b815d1cfc5a7a67f29baa8c511d3e92.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/1b815d1cfc5a7a67f29baa8c511d3e92.png)'
- en: Image generated by ChatGPT
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 由 ChatGPT 生成的图片
- en: I would like to conclude that section with a quick mention of the **Lottery
    Ticket Hypothesis**, which is both an application of pruning and an interesting
    explanation of how removing weights can often improve a model. I recommend reading
    the associated paper ([7]) for more details.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 我想用对彩票假设的简要提及来结束这一节，彩票假设既是剪枝的应用，也是对去除权重如何经常提高模型的一个有趣的解释。我建议阅读相关的论文（[7]）以获取更多细节。
- en: 'Authors use the following procedure:'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 作者使用了以下程序：
- en: Train the full model to convergence
  id: totrans-31
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 训练完整模型直到收敛
- en: Prune the smallest-magnitude weights (say 10%)
  id: totrans-32
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 剪枝最小幅度的权重（比如 10%）
- en: Reset the remaining weights to their original initialization values
  id: totrans-33
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将剩余的权重重置为其原始初始化值
- en: Retrain this pruned network
  id: totrans-34
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 重新训练这个剪枝网络
- en: Repeat the process multiple times
  id: totrans-35
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 重复这个过程多次
- en: After doing this 30 times, you end up with only 0.9^(30) ~ 4% of the original
    parameters. And surprisingly, **this network can do as well as the original one**.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 经过 30 次这样的操作后，你最终只剩下原始参数的 0.9^(30) ~ 4%。而且令人惊讶的是，**这个网络的表现可以和原始网络一样好**。
- en: This suggests that there is important parameter redundancy. In other words,
    there exists a **sub-network** (“a lottery ticket”) that actually does most of
    the work!
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 这表明存在重要的参数冗余。换句话说，存在一个**子网络**（“一张彩票”）实际上做了大部分工作！
- en: Pruning is one way to unveil this sub-network.
  id: totrans-38
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 剪枝是揭示这个子网络的一种方法。
- en: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>I
    recommend this very good video that covers the topic!</summary></details>
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>我推荐这个非常好的视频，它涵盖了这一主题！</summary></details>
- en: Quantization
  id: totrans-40
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 量化
- en: 'While pruning focuses on removing parameters entirely, quantization takes a
    different approach: **reducing the precision** of each parameter.'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然剪枝侧重于完全删除参数，但量化采取不同的方法：**降低每个参数的精度**。
- en: Remember that every number in a computer is stored as a sequence of bits. A
    float32 value uses 32 bits (see example picture below), whereas an 8-bit integer
    (int8) uses just 8 bits.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 记住，计算机中存储的每个数字都是一个位序列。float32 值使用 32 位（见下面的示例图片），而 8 位整数（int8）仅使用 8 位。
- en: '![](../Images/a0a18364d84b44b0752166a07648838d.png)'
  id: totrans-43
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/a0a18364d84b44b0752166a07648838d.png)'
- en: 'An example of how float32 numbers are represented with 32 bits (Image by the
    author and ChatGPT | Inspiration: [2])'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 一个如何用 32 位表示 float32 数字的例子（图片由作者和 ChatGPT 提供 | 灵感来源：[2]）
- en: Most deep learning models are trained using 32-bit floating-point numbers (FP32).
    Quantization converts these high-precision values to **lower-precision formats**
    like 16-bit floating-point (FP16), 8-bit integers (INT8), or even 4-bit representations.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 大多数深度学习模型都是使用 32 位浮点数（FP32）进行训练的。量化将这些高精度值转换为**低精度格式**，如 16 位浮点数（FP16）、8 位整数（INT8）或甚至
    4 位表示。
- en: 'The savings here are obvious: **INT8 requires 75% less memory than FP32**.
    But how do we actually perform this conversion without destroying our model’s
    performance?'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 这里的节省是显而易见的：**INT8 相比于 FP32 需要 75% 更少的内存**。但我们是如何实际进行这种转换而不破坏模型性能的呢？
- en: The math behind quantization
  id: totrans-47
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 量化背后的数学原理
- en: To convert from floating-point to integer representation, we need to map the
    continuous range of values to a **discrete set of integers**. For INT8 quantization,
    we’re mapping to 256 possible values (from -128 to 127).
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 要将浮点数转换为整数表示，我们需要将值的连续范围映射到一组**离散的整数**。对于 INT8 量化，我们映射到 256 个可能值（从 -128 到 127）。
- en: 'Suppose our weights are normalized between -1.0 and 1.0 (common in deep learning):'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 假设我们的权重被归一化在 -1.0 和 1.0 之间（这在深度学习中很常见）：
- en: \[ \text{scale} = \frac{\text{float_max} – \text{float_min}}{\text{int8_max}
    – \text{int8_min}} = \frac{1.0 – (-1.0)}{127 – (-128)} = \frac{2.0}{255} \]
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: \[ \text{scale} = \frac{\text{float\_max} – \text{float\_min}}{\text{int8\_max}
    – \text{int8\_min}} = \frac{1.0 – (-1.0)}{127 – (-128)} = \frac{2.0}{255} \]
- en: Then, the quantized value is given by
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，量化值由以下公式给出
- en: \[\text{quantized_value} = \text{round}(\frac{\text{original_value}}{\text{scale}}
    \] + \text{zero_point})
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: \[\text{quantized_value} = \text{round}(\frac{\text{original_value}}{\text{scale}}
    \] + \text{zero_point})
- en: Here, `zero_point=0` because we want 0 to be mapped to 0\. We can then round
    this value to the nearest integer to get integers between -127 and 128.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 这里，`zero_point=0`因为我们希望0映射到0。然后我们可以将此值四舍五入到最接近的整数，以获得介于-127和128之间的整数。
- en: 'And, you guessed it: to get integers back to float, we can use the inverse
    operation: \[\text{float_value} = \text{integer_value} \times \text{scale} – \text{zero_point}
    \]'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 并且，正如你所猜到的：要将整数转换回浮点数，我们可以使用逆操作：\[\text{float_value} = \text{integer_value}
    \times \text{scale} – \text{zero_point} \]
- en: '*Note: in practice, the scaling factor is determined based on the range values
    we quantize.*'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '*注意：在实际应用中，缩放因子是基于我们量化的范围值确定的。*'
- en: How to apply quantization?
  id: totrans-56
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 如何应用量化？
- en: 'Quantization can be applied at **different stages** and with **different strategies**.
    Here are a few techniques worth knowing about: *(below, the word “activation”
    refers to the output values of each layer)*'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 量化可以在**不同阶段**和**不同策略**下应用。以下是一些值得了解的技术：（以下，“激活”一词指每一层的输出值）
- en: '**Post-training quantization (PTQ):**'
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**训练后量化（PTQ）**：'
- en: '**Static Quantization**: quantize both weights and activations **offline**
    (after training and before inference)'
  id: totrans-59
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**静态量化**：在训练后和推理前离线量化权重和激活'
- en: '**Dynamic Quantization**: quantize **weights offline**, but **activations on-the-fly**
    during inference. This is different from offline quantization because the scaling
    factor is determined based on the values seen so far during inference.'
  id: totrans-60
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**动态量化**：离线量化**权重**，但在推理过程中**实时**量化激活。这与离线量化不同，因为缩放因子是基于推理过程中看到的值确定的。'
- en: '**Quantize-aware training (QAT):** simulate quantization during training by
    rounding values, but calculations are still done with floating-point numbers.
    This makes the model learn weights that are more robust to quantization, which
    will be applied after training. Under the hood, the idea is to **add “fake” operations**:
    `x -> dequantize(quantize(x))`: this new value is close to x, but it still helps
    the model **tolerate the 8-bit rounding and clipping noise.**'
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**量化感知训练（QAT）**：通过四舍五入值在训练期间模拟量化，但计算仍然使用浮点数。这使得模型学习到对量化更鲁棒的权重，这些权重将在训练后应用。在底层，这个想法是**添加“假”操作**：`x
    -> dequantize(quantize(x))`：这个新值接近x，但它仍然有助于模型**容忍8位舍入和截断噪声**。'
- en: '[PRE1]'
  id: totrans-62
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '**Quantization is very flexible!** You can apply different precision levels
    to different parts of the model. For instance, you might quantize most linear
    layers to 8-bit for maximum speed and memory savings, while leaving critical components
    (e.g. attention heads, or batch-norm layers) at 16-bit or full-precision.'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: '**量化非常灵活**！你可以将不同的精度级别应用于模型的各个部分。例如，你可能会将大多数线性层量化为8位以实现最大速度和内存节省，同时将关键组件（例如注意力头或批归一化层）保留在16位或全精度。'
- en: Low-Rank Factorization
  id: totrans-64
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 低秩分解
- en: Now let’s talk about low-rank factorization — a method that has been popularized
    with the rise of LLMs.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们谈谈低秩分解——这是一种随着LLMs的兴起而流行起来的方法。
- en: 'The key observation: many weight matrices in neural networks have effective
    ranks much lower than their dimensions suggest. In plain English, that means there
    is a lot of **redundancy** in the parameters.'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 关键观察：神经网络中的许多权重矩阵的有效秩远低于其维度所暗示的。用简单的话说，这意味着参数中存在大量的**冗余**。
- en: '*Note: if you have ever used PCA for dimensionality reduction, you have already
    encountered a form of low-rank approximation. PCA decomposes large matrices into
    products of smaller, lower-rank factors that retain as much information as possible.*'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: '*注意：如果你曾经使用PCA进行降维，你已经在某种程度上遇到了低秩近似的形态。PCA将大矩阵分解为较小、低秩因子的乘积，尽可能保留信息。*'
- en: The linear algebra behind low-rank factorization
  id: totrans-68
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 低秩分解背后的线性代数
- en: 'Take a weight matrix W. Every real matrix can be represented using a **Singular
    Value Decomposition** (SVD):'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 以权重矩阵W为例。每个实矩阵都可以使用**奇异值分解**（SVD）来表示：
- en: \[ W = U\Sigma V^T \]
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: \[ W = U\Sigma V^T \]
- en: where Σ is a diagonal matrix with singular values in non-increasing order. The
    number of positive coefficients actually corresponds to the rank of the matrix
    W.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 其中Σ是一个对角矩阵，其奇异值按非递增顺序排列。正系数的数量实际上对应于矩阵W的秩。
- en: '![](../Images/031074294096431dbe455677efb1cb73.png)'
  id: totrans-72
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/031074294096431dbe455677efb1cb73.png)'
- en: 'SVD visualized for a matrix of rank r (Image by the author and ChatGPT | Inspiration:
    [5])'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: SVD可视化矩阵秩为r（图片由作者和ChatGPT提供 | 灵感来源：[5]）
- en: 'To approximate W with a matrix of rank k < r, **we can select the k greatest
    elements of sigma**, and the corresponding first k columns and first k rows of
    U and V respectively:'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 为了用秩为 k < r 的矩阵近似 W，**我们可以选择 sigma 的 k 个最大元素**，以及 U 和 V 的对应的前 k 列和前 k 行：
- en: \[ \begin{aligned} W_k &= U_k\,\Sigma_k\,V_k^T
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: \[ \begin{aligned} W_k &= U_k\,\Sigma_k\,V_k^T
- en: \\[6pt] &= \underbrace{U_k\,\Sigma_k^{1/2}}_{A\in\mathbb{R}^{m\times k}} \underbrace{\Sigma_k^{1/2}\,V_k^T}_{B\in\mathbb{R}^{k\times
    n}}. \end{aligned} \]
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: \\[6pt] &= \underbrace{U_k\,\Sigma_k^{1/2}}_{A\in\mathbb{R}^{m\times k}} \underbrace{\Sigma_k^{1/2}\,V_k^T}_{B\in\mathbb{R}^{k\times
    n}}. \end{aligned} \]
- en: See how the new matrix can be **decomposed as the product of A and B**, with
    the total number of parameters now being `m * k + k * n = k*(m+n)` instead of
    `m*n`! This is a **huge improvement**, especially when k is much smaller than
    `m` and `n`.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 看看新的矩阵如何**分解为 A 和 B 的乘积**，此时参数总数现在为 `m * k + k * n = k*(m+n)` 而不是 `m*n`！这是一个**巨大的改进**，尤其是当
    k 远小于 `m` 和 `n` 时。
- en: 'In practice, it’s equivalent to replacing a linear layer x → Wx with 2 consecutive
    ones: x → A(Bx).'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 在实践中，这相当于用两个连续的线性层替换一个线性层 x → Wx：x → A(Bx)。
- en: In PyTorch
  id: totrans-79
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 在 PyTorch
- en: We can either apply low-rank factorization **before training** (parameterizing
    each linear layer as **two smaller matrices** – not really a compression method,
    but a design choice) or **after training** (applying a **truncated SVD** on weight
    matrices). The second approach is by far the most common one and is implemented
    below.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以在**训练前**应用低秩分解（将每个线性层参数化为**两个较小的矩阵**——这实际上不是一个压缩方法，而是一种设计选择）或**训练后**（在权重矩阵上应用**截断奇异值分解**）。第二种方法是最常见的，下面将进行实现。
- en: '[PRE2]'
  id: totrans-81
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'LoRA: an application of low-rank approximation'
  id: totrans-82
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: LoRA：低秩近似的应用
- en: '![](../Images/4d0de28e59cafce6a605a48ccfdb5f6a.png)'
  id: totrans-83
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/4d0de28e59cafce6a605a48ccfdb5f6a.png)'
- en: 'LoRA fine-tuning: W is fixed, A and B are trained (source: [1])'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: LoRA微调：W 是固定的，A 和 B 是训练的（来源：[1]）
- en: 'I think it’s crucial to mention **LoRA**: you have probably heard of LoRA (Low-Rank
    Adaptation) if you have been following **LLM fine-tuning developments**. Though
    not strictly a compression technique, LoRA has become extremely popular for efficiently
    adapting large language models and **making fine-tuning very efficient**.'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为提到**LoRA**非常重要：如果你一直在关注**LLM微调发展**，你可能已经听说过LoRA（低秩自适应）。虽然它不是一个严格的压缩技术，但LoRA已经变得非常流行，可以有效地适应大型语言模型，并使微调变得非常高效。
- en: 'The idea is simple: during fine-tuning, rather than modifying the original
    model weights W, LoRA freezes them and **learn trainable low-rank updates**:'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 这个想法很简单：在微调期间，而不是修改原始模型权重 W，LoRA 冻结它们并**学习可训练的低秩更新**：
- en: $$W’ = W + \Delta W = W + AB$$
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: $$W’ = W + \Delta W = W + AB$$
- en: where A and B are low-rank matrices. This allows for task-specific adaptation
    with just a fraction of the parameters.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 其中 A 和 B 是低秩矩阵。这允许通过仅使用一小部分参数进行特定任务的适应。
- en: 'Even better: **QLoRA** takes this further by combining quantization with low-rank
    adaptation!'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 更好的是：**QLoRA** 通过结合量化与低秩自适应进一步扩展了这一概念！
- en: Again, this is a very flexible technique and can be applied at **various stages**.
    Usually, LoRA is applied only on specific layers (for example, Attention layers’
    weights).
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 再次强调，这是一个非常灵活的技术，可以在**各种阶段**应用。通常，LoRA 只应用于特定的层（例如，注意力层的权重）。
- en: Knowledge Distillation
  id: totrans-91
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 知识蒸馏
- en: '![](../Images/891102d780246633fbd6e6bf0221fa85.png)'
  id: totrans-92
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/891102d780246633fbd6e6bf0221fa85.png)'
- en: 'Knowledge distillation process (Image by the author and ChatGPT | Inspiration:
    [4])'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 知识蒸馏过程（图片由作者和 ChatGPT 提供 | 灵感来源：[4]）
- en: Knowledge distillation takes a fundamentally different approach from what we
    have seen so far. Instead of modifying an existing model’s parameters, it **transfers
    the “knowledge”** from a **large**, complex model (the “teacher”) to a **smaller**,
    more efficient model (the “student”). The goal is to train the student model to
    **mimic the behavior** and replicate the performance of the teacher, often an
    easier task than solving the original problem from scratch.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 知识蒸馏采取了与我们迄今为止所看到的不同方法。它不是修改现有模型的参数，而是**从**一个**大**、**复杂**的模型（“教师”）**转移**到**一个**较小、更高效的模型（“学生”）的“知识”。目标是训练学生模型来**模仿**教师的行为并复制其性能，这通常比从头开始解决原始问题更容易。
- en: The distillation loss
  id: totrans-95
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 蒸馏损失
- en: 'Let’s explain some concepts in the case of a classification problem:'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们以分类问题为例解释一些概念：
- en: The **teacher model** is usually a large, complex model that achieves high performance
    on the task at hand
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**教师模型**通常是一个大型、复杂的模型，在手头的任务上取得了高性能'
- en: The **student model** is a second, smaller model with a different architecture,
    but tailored to the same task
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**学生模型**是一个第二、更小的模型，具有不同的架构，但针对相同任务进行了定制。'
- en: '**Soft targets**: these are the teacher’s model predictions (**probabilities**,
    and not labels!). They will be used by the student model to mimic the teacher’s
    behaviors. Note that we use raw predictions and not labels because they also contain
    information about the confidence of the predictions'
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**软目标**：这些是教师模型的预测（**概率**，而不是标签！）它们将被学生模型用来模仿教师的行为。请注意，我们使用原始预测而不是标签，因为它们也包含了关于预测置信度的信息。'
- en: '**Temperature**: in addition to the teacher’s prediction, we also use a coefficient
    T (called temperature) in the softmax function to extract more information from
    the soft targets. Increasing T softens the distribution and helps the student
    model give more importance to wrong predictions.'
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**温度**：除了教师的预测外，我们还在softmax函数中使用一个系数T（称为温度）来从软目标中提取更多信息。增加T会软化分布，并帮助学生模型更加重视错误的预测。'
- en: 'In practice, it is pretty straightforward to train the student model. We **combine
    the usual loss** (standard cross-entropy loss based on hard labels) **with the
    “distillation” loss** (based on the teacher’s soft targets):'
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 在实践中，训练学生模型相当直接。我们**结合了常规损失**（基于硬标签的标准交叉熵损失）**和“蒸馏”损失**（基于教师的软目标）：
- en: $$ L_{\text{total}} = \alpha L_{\text{hard}} + (1 – \alpha) L_{\text{distill}}
    $$
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: $$ L_{\text{total}} = \alpha L_{\text{hard}} + (1 – \alpha) L_{\text{distill}}
    $$
- en: The distillation loss is nothing but the **KL divergence** between the teacher
    and student distribution (*you can see it as a measure of the distance between
    the 2 distributions*).
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 蒸馏损失仅仅是教师和学生分布之间的**KL散度**（你可以将其视为两个分布之间距离的度量）。
- en: $$ L_{\text{distill}} = D{KL}(q_{\text{teacher}} | | q_{\text{student}}) = \sum_i
    q_{\text{teacher}, i} \log \left( \frac{q_{\text{teacher}, i}}{q_{\text{student},
    i}} \right) $$
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: $$ L_{\text{distill}} = D{KL}(q_{\text{teacher}} | | q_{\text{student}}) = \sum_i
    q_{\text{teacher}, i} \log \left( \frac{q_{\text{teacher}, i}}{q_{\text{student},
    i}} \right) $$
- en: 'As for the other methods, it is possible and encouraged to **adapt this framework
    depending on the use case**: for example, one can also compare logits and activations
    from **intermediate layers** in the network between the student and teacher model,
    instead of only comparing the final outputs.'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 至于其他方法，根据用例**调整此框架**是可能且鼓励的：例如，也可以比较学生和教师模型在网络中间层之间的logits和激活，而不仅仅是比较最终输出。
- en: Knowledge distillation in practice
  id: totrans-106
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 知识蒸馏实践
- en: 'Similar to the previous techniques, there are two options:'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 与之前的技术类似，有两种选择：
- en: '**Offline distillation**: the pre-trained teacher model is fixed, and a separate
    student model is trained to mimic it. Both models are completely separate, and
    the **teacher’s weights remain frozen** during the distillation process.'
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**离线蒸馏**：预训练的教师模型是固定的，并单独训练一个学生模型来模仿它。这两个模型完全独立，在蒸馏过程中**教师的权重保持冻结**。'
- en: '**Online distillation**: both models are trained **simultaneously**, with knowledge
    transfer happening during the joint training process.'
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**在线蒸馏**：两个模型同时训练，知识迁移发生在联合训练过程中。'
- en: 'And below, an easy way to apply offline distillation (the last code block of
    this article 🙂):'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一个应用离线蒸馏的简单方法（本文的最后一个代码块哦 :)）：
- en: '[PRE3]'
  id: totrans-111
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Conclusion
  id: totrans-112
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: Thanks for reading this article! In the era of LLMs, with billions or even trillions
    of parameters, model compression has become a fundamental concept, essential in
    almost every scenario to make models more efficient and easily deployable.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢阅读这篇文章！在LLMs的时代，随着数十亿甚至数万亿参数的出现，模型压缩已成为一个基本概念，在几乎每个场景中都是使模型更高效和易于部署的必要条件。
- en: But as we have seen, model compression isn’t just about reducing the model size
    – it’s about making thoughtful **design decisions**. Whether choosing between
    online and offline methods, compressing the entire network, or targeting specific
    layers or channels, each choice **significantly impacts performance and usability**.
    Most models now **combine** several of these techniques (check out [this model](https://huggingface.co/RedHatAI/DeepSeek-R1-Distill-Llama-8B-quantized.w4a16),
    for instance).
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 但正如我们所看到的，模型压缩不仅仅是关于减小模型大小——它关乎深思熟虑的设计决策。无论是选择在线和离线方法，压缩整个网络，还是针对特定层或通道，每个选择都会**显著影响性能和可用性**。现在大多数模型**结合**了这些技术中的几种（例如，查看[这个模型](https://huggingface.co/RedHatAI/DeepSeek-R1-Distill-Llama-8B-quantized.w4a16)）。
- en: Beyond introducing you to the main methods, I hope this article also inspires
    you to **experiment and develop your own creative solutions**!
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 除了介绍主要方法之外，我希望这篇文章也能激发你**进行实验并开发自己的创新解决方案**！
- en: Don’t forget to check out the [GitHub repository](https://github.com/maxime7770/Model-Compression),
    where you’ll find all the code snippets **and a side-by-side comparison of the
    four compression methods** discussed in this article.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 不要忘记查看 [GitHub仓库](https://github.com/maxime7770/Model-Compression)，在那里你可以找到所有代码片段**以及本文讨论的四种压缩方法的并排比较**。
