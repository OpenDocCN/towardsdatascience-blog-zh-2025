- en: 'Model Compression: Make Your Machine Learning Models Lighter and Faster'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 模型压缩：让您的机器学习模型更轻、更快
- en: 原文：[https://towardsdatascience.com/model-compression-make-your-machine-learning-models-lighter-and-faster/](https://towardsdatascience.com/model-compression-make-your-machine-learning-models-lighter-and-faster/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/model-compression-make-your-machine-learning-models-lighter-and-faster/](https://towardsdatascience.com/model-compression-make-your-machine-learning-models-lighter-and-faster/)
- en: <mdspan datatext="el1746560110734" class="mdspan-comment">Introduction</mdspan>
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1746560110734" class="mdspan-comment">引言</mdspan>
- en: Whether you’re preparing for interviews or building Machine Learning systems
    at your job, model compression has become a must-have skill. In the era of LLMs,
    where models are getting larger and larger, the challenges around compressing
    these models to make them more efficient, smaller, and usable on lightweight machines
    have never been more relevant.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 无论您是在准备面试还是在工作中构建机器学习系统，模型压缩已经成为一项必备技能。在LLMs时代，模型越来越大，将这些模型压缩以使其更高效、更小，并能在轻量级机器上使用，这些挑战从未如此相关。
- en: In this article, I will go through four fundamental compression techniques that
    every ML practitioner should understand and master. I explore pruning, quantization,
    low-rank factorization, and knowledge distillation, each offering unique advantages.
    I will also add some minimal PyTorch code samples for each of these methods.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我将介绍每个机器学习从业者都应该理解和掌握的四种基本压缩技术。我将探讨剪枝、量化、低秩分解和知识蒸馏，每种方法都提供了独特的优势。我还会为这些方法添加一些最小的PyTorch代码示例。
- en: I hope you enjoy the article!
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 希望您喜欢这篇文章！
- en: '* * *'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Feel free to connect on [LinkedIn](https://www.linkedin.com/in/maxime-wolf/)!
  id: totrans-7
  prefs:
