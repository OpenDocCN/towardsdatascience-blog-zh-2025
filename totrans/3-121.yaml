- en: 'PyScript vs. JavaScript: A Battle of Web Titans'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/pyscript-vs-javascript-a-battle-of-web-titans/](https://towardsdatascience.com/pyscript-vs-javascript-a-battle-of-web-titans/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '<mdspan datatext="el1743466709098" class="mdspan-comment">We’re delving</mdspan>
    into frontend web development today, and you might be thinking: what does this
    have to do with data science? Why is Towards Data Science publishing a post related
    to web dev?'
  prefs: []
  type: TYPE_NORMAL
- en: 'Well, because data science isn’t only about building powerful models, engaging
    in advanced analytics, or cleaning and transforming data—**presenting the results
    is also a key part of our job**. And there are several ways to do it: PowerPoint
    presentations, interactive dashboards (like Tableau), or, as you’ve guessed, through
    a website.'
  prefs: []
  type: TYPE_NORMAL
- en: Speaking from personal experience, I work daily on developing the website we
    use to present our data-driven results. Using a website instead of PowerPoints
    or Tableau has many advantages, with **freedom and customization** being the biggest
    ones.
  prefs: []
  type: TYPE_NORMAL
- en: Even though I’ve come to (kind of) enjoy JavaScript, it will never match the
    fun of coding in Python. Luckily, at FOSDEM, I learned about **PyScript**, and
    to my surprise, it’s not as alpha as I initially thought.
  prefs: []
  type: TYPE_NORMAL
- en: But is that enough to call it a potential JavaScript replacement? That’s exactly
    what we’re going to explore today.
  prefs: []
  type: TYPE_NORMAL
- en: 'JavaScript has been the king of web development for decades. It’s everywhere:
    from simple button clicks to complex web apps like Gmail and Netflix. But now,
    there’s a challenger stepping into the ring—**PyScript**—a framework that lets
    you run **Python in the browser** without needing a backend.Sounds like a dream,
    right? Let’s break it down in an entertaining **head-to-head battle** between
    these two web technologies to see if PyScript is a true competitor!'
  prefs: []
  type: TYPE_NORMAL
- en: 'Round 1: What Are They?'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'This is like the Jake Paul vs Mike Tyson battle: the new challenger (PyScript)
    vs the veteran champion (JS). Don’t worry, I’m not saying today’s battle will
    be a disappointment as well.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s start with the veteran: **JavaScript**.'
  prefs: []
  type: TYPE_NORMAL
- en: Created in 1995, JavaScript is the **backbone of web development**.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Runs natively in browsers, controlling everything from user interactions to
    animations.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Supported by **React, Vue, Angular**, and a massive ecosystem of frameworks.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Can directly **manipulate the DOM**, making web pages dynamic.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Now onto the novice: **PyScript**.'
  prefs: []
  type: TYPE_NORMAL
- en: Built on **Pyodide** (a Python-to-WebAssembly project), PyScript lets you write
    **Python inside an HTML file**.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: No need for **backend servers**—your Python code runs directly in the browser.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Can import Python libraries like NumPy, Pandas, and Matplotlib.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**But…** it’s still evolving and has limitations.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This last *but* is a big one, so JavaScript wins the first round!
  prefs: []
  type: TYPE_NORMAL
- en: 'Round 2: Performance Battle'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: When it comes to speed, JavaScript is like Usain Bolt—optimized and **blazing
    fast**. It runs natively in the browser and is fine-tuned for performance. On
    the other hand, PyScript runs Python via WebAssembly, which means **extra overhead**.
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s use a real mini-project: a simple counter app. We’ll build it using both
    alternatives and see which one performs better.'
  prefs: []
  type: TYPE_NORMAL
- en: JavaScript
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: PyScript
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 'Putting them to the test:'
  prefs: []
  type: TYPE_NORMAL
- en: JavaScript runs instantly.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: PyScript has a noticeable delay.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'End of round: JS increases its advantage making it 2-0!'
  prefs: []
  type: TYPE_NORMAL
- en: 'Round 3: Ease of Use & Readability'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Neither of both languages is perfect (for example, neither includes static
    typing), but their syntax is very different. **JavaScript** can be quite messy:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: 'While **Python** is far easier to understand:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: The fact that PyScript lets us use the Python syntax makes it the round winner
    without a doubt. Even though I’m clearly biased towards Python, the fact that
    it’s beginner-friendly and usually more concise and simple than JS makes it better
    in terms of usability.
  prefs: []
  type: TYPE_NORMAL
- en: The problem for PyScript is that JavaScript is already deeply integrated into
    browsers, making it more practical. Despite this, PyScript wins the round making
    it 2-1.
  prefs: []
  type: TYPE_NORMAL
- en: One more round to go…
  prefs: []
  type: TYPE_NORMAL
- en: 'Round 4: Ecosystem & Libraries'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: JavaScript has countless frameworks like React, Vue, and Angular, making it
    a powerhouse for building dynamic web applications. Its libraries are specifically
    optimized for the web, providing tools for everything from UI components to complex
    animations.
  prefs: []
  type: TYPE_NORMAL
- en: On the other hand, PyScript benefits from Python’s vast ecosystem of scientific
    computing and data science libraries, such as NumPy, Pandas, and Matplotlib. While
    these tools are excellent for data visualization and analysis, they aren’t optimized
    for frontend web development. Additionally, PyScript requires workarounds to interact
    with the DOM, which JavaScript handles natively and efficiently.
  prefs: []
  type: TYPE_NORMAL
- en: While PyScript is an exciting tool for embedding Python into web applications,
    it’s still in its early stages. JavaScript remains the more practical choice for
    general web development, whereas PyScript shines in scenarios where Python’s computational
    power is needed within the browser.
  prefs: []
  type: TYPE_NORMAL
- en: Here’s a table summarizing some of the key components
  prefs: []
  type: TYPE_NORMAL
- en: '| Feature | JavaScript | PyScript |'
  prefs: []
  type: TYPE_TB
- en: '| DOM Control | Direct & instant | Requires JavaScript workarounds |'
  prefs: []
  type: TYPE_TB
- en: '| Performance | Optimized for browsers | WebAssembly overhead |'
  prefs: []
  type: TYPE_TB
- en: '| Ecosystem | Huge (React, Vue, Angular) | Limited, still growing |'
  prefs: []
  type: TYPE_TB
- en: '| Libraries | Web-focused (Lodash, D3.js) | Python-focused (NumPy, Pandas)
    |'
  prefs: []
  type: TYPE_TB
- en: '| Use Cases | Full web apps | Data-heavy apps, interactive widgets |'
  prefs: []
  type: TYPE_TB
- en: 'Round’s verdict: JavaScript dominates in general web dev, but PyScript shines
    for Python-centric projects.'
  prefs: []
  type: TYPE_NORMAL
- en: Final Verdict
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This was a quick fight! We still don’t know who won though…
  prefs: []
  type: TYPE_NORMAL
- en: 'Time to reveal it:'
  prefs: []
  type: TYPE_NORMAL
- en: If you’re building a full web app,  JavaScript is the clear winner.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If you’re adding Python-powered interactivity (e.g., data visualization), PyScript
    could be useful.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'With that said, it’s fair to say that **JavaScript (and its derivatives) still
    remains the web’s frontend best option**. However, the future of PyScript is one
    to watch: If performance improves and it gets better browser integration, PyScript
    could become a strong hybrid tool for Python developers willing to incorporate
    more data-related tasks on the frontend.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Winner: JavaScript.**'
  prefs: []
  type: TYPE_NORMAL
