- en: Multi-Headed Cross Attention – By Hand
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 多头交叉注意力 – 手动实现
- en: 原文：[https://towardsdatascience.com/multi-headed-cross-attention-by-hand-37c07b3ee8f2/](https://towardsdatascience.com/multi-headed-cross-attention-by-hand-37c07b3ee8f2/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/multi-headed-cross-attention-by-hand-37c07b3ee8f2/](https://towardsdatascience.com/multi-headed-cross-attention-by-hand-37c07b3ee8f2/)
- en: '!["Crossing" By Daniel Warfield using MidJourney and Affinity Design 2\. All
    images by the author unless otherwise specified. Article originally made available
    on Intuitively and Exhaustively Explained.](../Images/85dfef673bbddcb5f4f99d3f7154a22c.png)'
  id: totrans-2
  prefs: []
  type: TYPE_IMG
  zh: '!["Crossing" By Daniel Warfield using MidJourney and Affinity Design 2\. All
    images by the author unless otherwise specified. Article originally made available
    on Intuitively and Exhaustively Explained.](../Images/85dfef673bbddcb5f4f99d3f7154a22c.png)'
- en: '"Crossing" By Daniel Warfield using MidJourney and Affinity Design 2\. All
    images by the author unless otherwise specified. Article originally made available
    on [Intuitively and Exhaustively Explained](https://iaee.substack.com/).'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: “交叉”由Daniel Warfield使用MidJourney和Affinity Design 2创作。除非另有说明，所有图像均为作者所有。文章最初在[直观且详尽解释](https://iaee.substack.com/)上发布。
- en: Cross Attention is a fundamental tool in creating AI models that can understand
    multiple forms of data simultaneously. Think language models that can understand
    images like the ones used in ChatGPt, or models that generate video based on text
    like Sora.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 交叉注意力是创建能够同时理解多种数据形式的AI模型的基本工具。例如，可以理解ChatGPt中使用的图像的语言模型，或者根据文本生成视频的Sora模型。
- en: This summary goes over all critical mathematical operations within cross attention,
    allowing you to understand its inner workings at a fundamental level.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 这个总结涵盖了交叉注意力中的所有关键数学运算，使你能够从基本层面理解其内部工作原理。
- en: '* * *'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Step 1: Defining the Inputs'
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第1步：定义输入
- en: '* * *'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Cross attention is used when modeling with a variety of data types, each of
    which might format the input differently. For natural language data one would
    likely use a word to vector embedding, paired with positional encoding, to calculate
    a vector that represents each word.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 当使用多种数据类型进行建模时，每种数据类型可能会以不同的方式格式化输入，这时会使用交叉注意力。对于自然语言数据，可能会使用词向量嵌入，并结合位置编码，来计算表示每个单词的向量。
- en: '![](../Images/cdeeab6c6e97c7e1ffebf4ce9115b6ba.png)'
  id: totrans-10
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/cdeeab6c6e97c7e1ffebf4ce9115b6ba.png)'
- en: For visual data, one might pass the image through an encoder specifically designed
    to summarize the image into a vector representation.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 对于视觉数据，可能会将图像通过一个专门设计的编码器传递，以将图像总结为向量表示。
- en: '![](../Images/e873eeca4ad2af37ad5607bf9fbb525e.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/e873eeca4ad2af37ad5607bf9fbb525e.png)'
- en: In cross attention, I like to think of one of the inputs being used to filter
    the other input, thus allowing the data of both inputs to interact with one another
    in an AI model.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 在交叉注意力中，我喜欢将其中一个输入视为用于过滤另一个输入，从而使得两个输入的数据在AI模型中相互交互。
- en: '![](../Images/ad76027f604d6b4bceaafbd012ed6ff6.png)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/ad76027f604d6b4bceaafbd012ed6ff6.png)'
- en: In this example, we might refer to the image data as the "query source input",
    as it will be used to construct the "query" within the attention mechanism, and
    the textual data as the "key-value source input", as it will be used to construct
    the "key" and "value" within the attention mechanism.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，我们可能会将图像数据称为“查询源输入”，因为它将在注意力机制中用于构建“查询”，而文本数据则称为“键-值源输入”，因为它将在注意力机制中用于构建“键”和“值”。
- en: '* * *'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Step 2: Defining the Learnable Parameters'
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第2步：定义可学习参数
- en: '* * *'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Multi headed self-attention essentially learns three weight matrices. These
    are used to construct the "query", "key", and "value", which are used later in
    the cross attention mechanism. These would be initially randomly defined and then
    updated throughout the training process.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 多头自注意力机制本质上学习了三个权重矩阵。这些矩阵用于构建“查询”、“键”和“值”，这些在后续的交叉注意力机制中将被使用。这些矩阵最初是随机定义的，然后在训练过程中进行更新。
- en: '![](../Images/0981140ea3e5616441f37f66370695e6.png)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/0981140ea3e5616441f37f66370695e6.png)'
- en: '* * *'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Step 3: Defining the Query, Key, and Value'
  id: totrans-22
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第3步：定义查询、键和值
- en: '* * *'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Now that we have weight matrices for our model, we can multiply them by our
    inputs to generate our query, key, and value. In this example we’ll multiply the
    weight matrix for the query with the image data to generate the query, and the
    key and value weight matrices by the text data to generate the key and value.
    Recall that in matrix multiplication, every value in a row of the first matrix
    is multiplied by the corresponding values in a column in the second matrix. Those
    multiplied values are summed to represent one value in the output.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们有了模型的权重矩阵，我们可以将它们乘以我们的输入来生成我们的查询、键和值。在这个例子中，我们将乘以查询的权重矩阵与图像数据以生成查询，以及键和值的权重矩阵与文本数据以生成键和值。回想一下，在矩阵乘法中，第一个矩阵每一行的每个值都乘以第二个矩阵中相应列的值。这些乘积值相加来表示输出中的一个值。
- en: '![](../Images/a966fd8f0de77a7cffc38f008a4e286e.png)'
  id: totrans-25
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a966fd8f0de77a7cffc38f008a4e286e.png)'
- en: Once the image data has been multiplied by the query weights, and the text data
    has been multiplied by the key and value weights, we have our query, key, and
    value.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦图像数据乘以查询权重，文本数据乘以键和值权重，我们就得到了查询、键和值。
- en: '![](../Images/7cd128e3417c0432403a376c31fa2a05.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7cd128e3417c0432403a376c31fa2a05.png)'
- en: '* * *'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: 'Step 4: Dividing into Heads'
  id: totrans-29
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第4步：分割成头部
- en: '* * *'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: In this example we’ll use two attention heads, meaning we’ll do cross attention
    with two sub-representations of the input. We’ll set that up by dividing the query,
    key, and value in two.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，我们将使用两个注意力头，这意味着我们将使用输入的两个子表示进行交叉注意力。我们将通过将查询、键和值分成两部分来设置它。
- en: '![](../Images/3fd2457f63fa98b3022068f1df3e8564.png)'
  id: totrans-32
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/3fd2457f63fa98b3022068f1df3e8564.png)'
- en: The Query, Key, & Value with label 1 will be passed to the first attention head,
    and the Query, Key, & Value with label 2 will be passed to the second attention
    head. Essentially, this allows multi-headed cross attention to reason about the
    same inputs in various different ways in parallel.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 带有标签1的查询、键和值将被传递到第一个注意力头，带有标签2的查询、键和值将被传递到第二个注意力头。本质上，这允许多头交叉注意力并行以各种不同的方式对相同的输入进行推理。
- en: '* * *'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: 'Step 5: Calculating the Z Matrix'
  id: totrans-35
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第5步：计算Z矩阵
- en: '* * *'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: To construct the attention matrix, we’ll first multiply the query and key together
    to construct what’s commonly referred to as the "Z" matrix. We’ll only be doing
    this for attention head 1, but keep in mind all of these calculations are also
    going on in attention head 2.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 为了构建注意力矩阵，我们首先将查询和键相乘，构建通常称为“Z”矩阵的内容。我们只会对注意力头1这样做，但请记住，所有这些计算也在注意力头2中进行。
- en: '![](../Images/2f6c3d701d337f03fb366ec15d911f0f.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/2f6c3d701d337f03fb366ec15d911f0f.png)'
- en: Because of the way the math shakes out, the "Z" matrix values have a tendency
    to grow as the size of the query and key grow. This is counteracted by dividing
    the values in the "Z" matrix by the square root of the sequence length.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 由于数学计算的方式，随着查询和键的大小增长，“Z”矩阵的值有增长的趋势。这可以通过将“Z”矩阵中的值除以序列长度的平方根来抵消。
- en: '![](../Images/b4fff1760cba0ae56d6453007c896279.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b4fff1760cba0ae56d6453007c896279.png)'
- en: '* * *'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: 'Step 6 (optional): Masking'
  id: totrans-42
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第6步（可选）：掩码
- en: '* * *'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: Depending on the application, a mask might be applied to cross attention so
    that only certain query source input tokens can interact with certain key-value
    source input tokens. We won’t be doing that in this example because we want all
    image data to interact with all text data, but you can get an idea of how masking
    works from [another one of my by-hand articles](https://towardsdatascience.com/multi-headed-self-attention-by-hand-d2ce1ae031db).
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 根据应用的不同，可能会对交叉注意力应用掩码，以便只有某些查询源输入标记可以与某些键-值源输入标记交互。在这个例子中，我们不会这样做，因为我们希望所有图像数据都与所有文本数据交互，但你可以从[我的另一篇手写文章](https://towardsdatascience.com/multi-headed-self-attention-by-hand-d2ce1ae031db)中了解掩码的工作原理。
- en: '* * *'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: 'Step 7: Calculating the Attention Matrix'
  id: totrans-46
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第7步：计算注意力矩阵
- en: '* * *'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: 'The whole point of calculating the "Z" matrix, and optionally applying a mask,
    was to create an attention matrix. This can be done by softmaxing each row in
    the "Z" matrix. The equation for calculating softmax is as follows:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 计算整个“Z”矩阵，并可选地应用掩码，目的是创建一个注意力矩阵。这可以通过对“Z”矩阵中的每一行进行softmax操作来实现。计算softmax的方程如下：
- en: '![](../Images/105aedd6fa07ff83f2eb8b9ee3849f40.png)'
  id: totrans-49
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/105aedd6fa07ff83f2eb8b9ee3849f40.png)'
- en: 'Meaning a value in a row is equal to e raised to that value, divided by the
    sum of e raised to all values in that row. We can softmax the first row of the
    Z matrix:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 意味着一行中的值等于e的该值次幂，除以该行中所有值e的次幂之和。我们可以对Z矩阵的第一行进行softmax操作：
- en: '![](../Images/7319060905273182e5c16a60e4b7670e.png)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/7319060905273182e5c16a60e4b7670e.png)'
- en: And in such a way we can calculate the softmax for each row in the z matrix,
    thus calculating the attention matrix
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 以这种方式，我们可以计算z矩阵中每一行的softmax，从而计算注意力矩阵
- en: '![](../Images/0f651a224dc4ffcb2e0744a21cabeabc.png)'
  id: totrans-53
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/0f651a224dc4ffcb2e0744a21cabeabc.png)'
- en: '* * *'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Step 8: Calculating the Output of the Attention Head'
  id: totrans-55
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 步骤8：计算注意力头的输出
- en: '* * *'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Now that we’ve calculated the attention matrix, we can multiply it by the value
    matrix to construct the output of the attention head.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经计算了注意力矩阵，我们可以将其与值矩阵相乘，以构建注意力头的输出。
- en: '![](../Images/f7f7e507c8b3df66b63babb7b2b658fa.png)'
  id: totrans-58
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/f7f7e507c8b3df66b63babb7b2b658fa.png)'
- en: '* * *'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'Step 9: Concatenating the Output'
  id: totrans-60
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 步骤9：连接输出
- en: '* * *'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Both attention heads create a distinct output, which are concatenated together
    to produce the final output of multi-headed cross attention.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 两个注意力头都创建了一个独特的输出，这些输出被连接起来，以产生多头交叉注意力的最终输出。
- en: '![](../Images/eaea98ae92fa8a64fee1f37cf9a96a90.png)'
  id: totrans-63
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/eaea98ae92fa8a64fee1f37cf9a96a90.png)'
- en: Conclusion
  id: totrans-64
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: 'And that’s it. In this article we covered the major steps to computing the
    output of Multi Headed cross Attention:'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 就这样。在这篇文章中，我们介绍了计算多头交叉注意力输出的主要步骤：
- en: defining the input
  id: totrans-66
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定义输入
- en: defining the learnable parameters of the mechanism
  id: totrans-67
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定义机制的可学习参数
- en: calculating the Query, Key, and Value
  id: totrans-68
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 计算查询、键和值
- en: diving into multiple heads
  id: totrans-69
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 深入多个头
- en: calculating the Z matrix
  id: totrans-70
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 计算Z矩阵
- en: (optionally) masking
  id: totrans-71
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: （可选）掩码
- en: calculating the attention matrix
  id: totrans-72
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 计算注意力矩阵
- en: calculating the output of the attention head
  id: totrans-73
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 计算注意力头的输出
- en: concatenating the output
  id: totrans-74
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 连接输出
- en: While we used the example of cross attending an image with text, ultimately
    what we really cross attended was a matrix of values with another matrix of values.
    If you can turn some form of data (like audio, video, robot sensor data, etc.)
    into a similar matrix, you can use that data in cross attention!
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然我们使用了将图像与文本交叉注意力的例子，但最终我们真正交叉注意的实际上是一个值矩阵与另一个值矩阵。如果你能将某种形式的数据（如音频、视频、机器人传感器数据等）转换成类似的矩阵，你就可以在交叉注意力中使用这些数据！
- en: 'If you’d like to learn more about the intuition behind this topic, check out
    these IAEE articles:'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想了解更多关于这个主题背后的直觉，请查看这些IAEE文章：
- en: '[**Transformers – Intuitively and Exhaustively Explained**](https://towardsdatascience.com/transformers-intuitively-and-exhaustively-explained-58a5c5df8dbb)'
  id: totrans-77
