  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[**Transformer – 直观且全面解释**](https://towardsdatascience.com/transformers-intuitively-and-exhaustively-explained-58a5c5df8dbb)'
- en: ''
  id: totrans-78
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[**Flamingo – Intuitively and Exhaustively Explained**](https://towardsdatascience.com/flamingo-intuitively-and-exhaustively-explained-bf745611238b)'
  id: totrans-79
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[**Flamingo – 直观且全面解释**](https://towardsdatascience.com/flamingo-intuitively-and-exhaustively-explained-bf745611238b)'
- en: ''
  id: totrans-80
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[**Sora – Intuitively and Exhaustively Explained**](https://towardsdatascience.com/sora-intuitively-and-exhaustively-explained-a54f83ea9c21)'
  id: totrans-81
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[**Sora – 直观且全面解释**](https://towardsdatascience.com/sora-intuitively-and-exhaustively-explained-a54f83ea9c21)'
- en: ''
  id: totrans-82
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[**Multi-Headed Self Attention – By Hand**](https://towardsdatascience.com/multi-headed-self-attention-by-hand-d2ce1ae031db)'
  id: totrans-83
