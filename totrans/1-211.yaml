- en: How to Perform Effective Agentic Context Engineering
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何进行有效的代理上下文工程
- en: 原文：[https://towardsdatascience.com/how-to-perform-effective-agentic-context-engineering/](https://towardsdatascience.com/how-to-perform-effective-agentic-context-engineering/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/how-to-perform-effective-agentic-context-engineering/](https://towardsdatascience.com/how-to-perform-effective-agentic-context-engineering/)
- en: '*<mdspan datatext="el1759820433744" class="mdspan-comment">Context engineering</mdspan>*
    has received serious attention with the rise of LLMs capable of handling complex
    tasks. Initially, most discussions on this talk revolved around *prompt engineering*:
    Tuning a single prompt for optimized performance on a single task. However, as
    LLMs grow more capable, prompt engineering has turned into *context engineering*:
    Optimizing all data you feed into your LLM, for maximum performance on complex
    tasks.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '*<mdspan datatext="el1759820433744" class="mdspan-comment">上下文工程</mdspan>*
    随着能够处理复杂任务的LLM的兴起而受到严重关注。最初，关于这次讨论的大部分讨论都集中在 *提示工程*：为单个任务优化单个提示的性能。然而，随着LLM能力的增强，提示工程已经转变为
    *上下文工程*：优化你输入LLM的所有数据，以在复杂任务上实现最佳性能。'
- en: In this article, I’ll dive deeper into agentic context engineering, which is
    about optimizing the context specifically for agents. This differs from traditional
    context engineering in that agents typically perform sequences of tasks for a
    longer period of time. Since agentic context engineering is a large topic, I’ll
    dive deeper into the topics listed below in this article and write a follow-up
    article covering more topics.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我将深入探讨代理上下文工程，这是针对代理优化上下文的过程。这与传统的上下文工程不同，因为代理通常会在较长时间内执行一系列任务。由于代理上下文工程是一个大主题，我将在本文中深入探讨以下主题，并撰写后续文章来涵盖更多主题。
- en: Specific context engineering tips
  id: totrans-4
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 专门的上下文工程提示
- en: Shortening/summarizing the context
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 缩短/总结上下文
- en: Tool usage
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 工具使用
- en: Why care about agentic context engineering
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么应该关注代理上下文工程
- en: '![Agentic context engineering](../Images/93383cd899438ae6295f5d555ba5507f.png)'
  id: totrans-8
  prefs: []
  type: TYPE_IMG
  zh: '![代理上下文工程](../Images/93383cd899438ae6295f5d555ba5507f.png)'
- en: This infographic highlights the main contents of this article. I’ll first discuss
    why you should care about agentic context engineering. Then I’ll move to specific
    topics within agentic context engineering, such as shortening the context, context
    engineering short tips, and tool usage. Image by ChatGPT.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 这张信息图突出了本文的主要内容。我首先会讨论为什么你应该关注代理上下文工程。然后我会转向代理上下文工程中的具体主题，例如缩短上下文、上下文工程短提示和工具使用。图片由ChatGPT提供。
- en: 'Before diving deeper into the specifics of context engineering, I’ll cover
    why agentic context engineering is important. I’ll cover this in two parts:'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 在深入探讨上下文工程的细节之前，我会介绍为什么代理上下文工程很重要。我会从两个方面来讨论这个问题：
- en: Why we use agents
  id: totrans-11
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为什么我们使用代理
- en: Why agents need context engineering
  id: totrans-12
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 为什么代理需要上下文工程
- en: Why we use agents
  id: totrans-13
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 为什么我们使用代理
- en: 'First of all, we use agents because they are more capable of performing tasks
    that static LLM calls. Agents can receive a query from a user, for example:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我们使用代理是因为它们比静态LLM调用更有能力执行任务。代理可以接收用户的查询，例如：
- en: '*Fix this user-reported bug {bug report}*'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: '*修复这个用户报告的错误 {错误报告}*'
- en: This would not be feasible within a single LLM call, since you need to understand
    the bug better (maybe ask the person who reported the bug), you need to understand
    where in the code the bug occurs, and maybe fetch some of the error messages.
    This is where agents come in.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 在单个LLM调用中，这是不可行的，因为你需要更好地理解这个错误（可能需要询问报告错误的人），你需要了解错误发生在代码的哪个位置，可能还需要获取一些错误信息。这就是代理发挥作用的地方。
- en: 'An agent can look at the bug, call a tool asking the user a follow-up question,
    for example: Where in the application does this bug occur? The agent can then
    find that location in the codebase, run the code itself to read error logs, and
    implement the fix. This all requires a series of LLM calls and tools calls before
    solving the issue.'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 代理可以查看错误，调用工具向用户提出后续问题，例如：这个错误发生在应用程序的哪个位置？然后代理可以在代码库中找到那个位置，运行代码本身来读取错误日志，并实施修复。这一切都需要在解决问题之前进行一系列的LLM调用和工具调用。
- en: Why agents need context engineering
  id: totrans-18
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 为什么代理需要上下文工程
- en: So we now know why we need agents, but why do agents need context engineering?
    The main reason is that LLMs always perform better when their context contains
    more relevant information and less noise (irrelevant information). Furthermore,
    agents’ context quickly adds up when they perform a series of tool calls, for
    example, fetching the error logs when a bug happens. This creates context bloat,
    which is when the context of an LLM contains a lot of irrelevant information.
    We need to remove this noisy information from the LLMs context, and also ensure
    all relevant information is present in the LLMs context.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们现在知道为什么我们需要代理，但为什么代理需要上下文工程呢？主要原因在于，当LLM的上下文包含更多相关信息和更少的噪声（无关信息）时，它们的表现总是更好。此外，当代理执行一系列工具调用时，例如在出现错误时获取错误日志，他们的上下文会迅速累积。这会导致上下文膨胀，即LLM的上下文中包含大量无关信息。我们需要从LLM的上下文中移除这些噪声信息，并确保所有相关信息都存在于LLM的上下文中。
- en: Specific context engineering tips
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 特定的上下文工程技巧
- en: Agentic context engineering builds on top of traditional context engineering.
    I thus include a few important points to improve your context.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 代理上下文工程建立在传统上下文工程之上。因此，我包括一些重要点来提高您的上下文。
- en: Few-shot learning
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 少样本学习
- en: Structured prompts
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 结构化提示
- en: Step-by-step reasoning
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 步骤推理
- en: These are three commonly used techniques within context engineering that often
    improve LLM performance.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 这些是在上下文工程中常用的三种技术，它们通常能提高大型语言模型（LLM）的性能。
- en: Few-shot learning
  id: totrans-26
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 少样本学习
- en: Few-shot learning is a commonly used approach where you include examples of
    a similar task before feeding the agent the task it is to perform. This helps
    the model understand the task better, which usually increases performance.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 少样本学习是一种常用的方法，在向代理提供它需要执行的任务之前，先包含一些类似任务的示例。这有助于模型更好地理解任务，通常会增加性能。
- en: Below you can see two prompt examples. The first example shows a zero-shot prompt,
    where we directly ask the LLM the question. Considering this is a simple task,
    the LLM will likely get the right answer; however, few-shot learning will have
    a greater effect on more difficult tasks. In the second prompt, you see that I
    provide a few examples on how to do the math, where the examples are also wrapped
    in XML tags. This not only helps the model understand what task it is performing,
    but it also helps ensure a consistent answer format, since the model will often
    respond in the same format as provided in the few-shot examples.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 下面你可以看到两个提示示例。第一个示例显示了一个零样本提示，其中我们直接向LLM提问。考虑到这是一个简单的任务，LLM很可能会得到正确答案；然而，在更困难的任务上，少样本学习将产生更大的影响。在第二个提示中，你可以看到我提供了几个数学操作的示例，这些示例也被包裹在XML标签中。这不仅有助于模型理解它正在执行的任务，还有助于确保一致的答案格式，因为模型通常会以与提供的少样本示例相同的格式进行响应。
- en: '[PRE0]'
  id: totrans-29
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Structured prompts
  id: totrans-30
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 结构化提示
- en: Having structured prompts is also an incredibly important part of context engineering.
    In the code examples above, you can see me using XML tags with *<example> … </example>.*
    You can also use Markdown formatting to enhance the structure of your prompts.
    I often find that writing a general outline of my prompt first, then feeding it
    to an LLM for optimization and proper structuring, is a great way of designing
    good prompts.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 结构化提示也是上下文工程中极其重要的一个部分。在上面的代码示例中，你可以看到我使用了XML标签 *<example> … </example>.* 你也可以使用Markdown格式来增强提示的结构。我经常发现，首先写一个提示的一般大纲，然后将其输入到LLM中进行优化和适当的结构化，是设计良好提示的好方法。
- en: You can use designated tools like Anthropic’s prompt optimizer, but you can
    also simply feed your unstructured prompt into ChatGPT and ask it to improve your
    prompt. Furthermore, you’ll get even better prompts if you describe scenarios
    where your current prompt is struggling.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以使用指定的工具，如Anthropic的提示优化器，但您也可以简单地将您的非结构化提示输入到ChatGPT中，并要求它改进您的提示。此外，如果您描述了当前提示难以应对的场景，您将获得更好的提示。
- en: For example, if you have a math agent that is doing really well in addition,
    subtraction, and division, but struggling with multiplication, you should add
    that information to your prompt optimizer.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果你有一个数学代理，它在加法、减法和除法方面做得很好，但在乘法方面有困难，你应该将这一信息添加到你的提示优化器中。
- en: Step-by-step reasoning
  id: totrans-34
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 步骤推理
- en: 'Step-by-step reasoning is another powerful context engineering approach. You
    prompt the LLM to think step by stepabout how to solve the problem, before attempting
    to solve the problem. For even better context engineering, you can combine all
    three approaches covered in this section, as seen in the example below:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 步骤推理是另一种强大的上下文工程方法。在尝试解决问题之前，你提示LLM逐步思考如何解决问题。为了获得更好的上下文工程，你可以结合本节中涵盖的所有三种方法，如下面的示例所示：
- en: '[PRE1]'
  id: totrans-36
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: This will help the model understand the examples even better, which often increases
    model performance even further.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 这将帮助模型更好地理解示例，这通常还会进一步提高模型性能。
- en: Shortening the context
  id: totrans-38
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 缩短上下文
- en: When your agent has operated for a few steps, for example, asking for user input,
    fetching some information, and so on, you might experience the LLM context filling
    up. Before reaching the context limit and losing all tokens over this limit, you
    should shorten the context.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 当你的代理操作了几步，例如，请求用户输入，获取一些信息等，你可能会遇到LLM上下文填满的情况。在达到上下文限制并丢失所有超出限制的标记之前，你应该缩短上下文。
- en: Summarization is a great way of shortening the context; however, summarization
    can sometimes cut out important pieces of your context. The first half of your
    context might not contain any useful information, while the second half includes
    several paragraphs that are required. This is part of why agentic context engineering
    is difficult.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 摘要是缩短上下文的绝佳方式；然而，摘要有时会裁剪掉上下文中的重要部分。你的上下文的前半部分可能不包含任何有用的信息，而后半部分则包含几个必要的段落。这也是为什么代理上下文工程困难的部分原因。
- en: 'To perform context shortening, you’ll typically use another LLM, which I’ll
    call the *Shortening LLM.* This LLM receives the context and returns a shortened
    version of it. The simplest version of the Shortening LLM simply summarizes the
    context and returns it. However, you can employ the following techniques to improve
    the shortening:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 要执行上下文缩短，你通常会使用另一个LLM，我将称之为*缩短LLM*。这个LLM接收上下文并返回其缩短版本。缩短LLM最简单的版本只是总结上下文并返回。然而，你可以采用以下技术来提高缩短效果：
- en: Determine if some whole parts of the context can be cut out (specific documents,
    previous tool calls, etc)
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 确定上下文中的一些整体部分是否可以被裁剪掉（特定的文档、之前的工具调用等）
- en: A prompt-tuned Shortening LLM, optimized for analyzing the task at hand, all
    relevant information available, and returns only the information that will be
    relevant to solving the task
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个针对当前任务优化的提示调整缩短LLM，分析所有相关可用信息，并仅返回与解决任务相关的信息
- en: Determine if whole parts can be cut out
  id: totrans-44
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 确定是否可以裁剪掉整体部分
- en: The first thing you should do when attempting to shorten the context is to find
    areas of the context that can be completely cut out.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 当你尝试缩短上下文时，首先应该找到可以完全裁剪掉的上下文区域。
- en: For example, if the LLM might’ve previously fetched a document, used to solve
    a previous task, where you have the task results. This means the document is not
    relevant anymore and should be removed from the context. This might also occur
    if the LLM has fetched other information, for example via keyword search, and
    the LLM has itself summarized the output of the search. In this instance, you
    should remove the old output from the keyword search.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果LLM可能之前获取了一个文档，用于解决之前的任务，其中你有任务结果。这意味着文档不再相关，应该从上下文中移除。这也可能发生在LLM通过关键词搜索获取其他信息的情况下，LLM已经总结了搜索的输出。在这种情况下，你应该从关键词搜索中移除旧输出。
- en: Simply removing such whole parts of the context can get you far in shortening
    the context. However, you need to keep in mind that removing context that can
    be relevant for later tasks can be detrimental to the agent’s performance.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 简单地移除这些整体上下文部分可以在缩短上下文方面取得很大进展。然而，你需要记住，移除可能对后续任务相关的上下文可能会对代理的性能产生不利影响。
- en: Thus, as Anthropic points out in their article on [context engineering](https://www.anthropic.com/engineering/effective-context-engineering-for-ai-agents),
    you should first optimize for recall, where you ensure the LLM shortener never
    removes context that is relevant in the future. When you achieve almost perfect
    recall, you can start focusing on precision, where you remove more and more context
    that is not relevant anymore to solving the task at hand.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，正如Anthropic在其关于[上下文工程](https://www.anthropic.com/engineering/effective-context-engineering-for-ai-agents)的文章中指出的，你应该首先优化召回率，确保LLM缩短器永远不会删除未来相关的上下文。当你几乎达到完美的召回率时，你就可以开始关注精确度，即删除更多不再与解决当前任务相关的上下文。
- en: '![](../Images/5577e67e1ee91978b7aaaf8233841d08.png)'
  id: totrans-49
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/5577e67e1ee91978b7aaaf8233841d08.png)'
- en: This figure highlights how to optimize your prompt tuning. First you focus on
    optimizing recall, by ensuring all relevant context remain after summarization.
    Then in phase two, you start focusing on precision by removing less relevant context,
    from the memory of the agent. Image by Google Gemini.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 这张图突出了如何优化你的提示调整。首先，你专注于优化召回率，确保所有相关上下文在总结后仍然保留。然后在第二阶段，你开始专注于精确度，从代理的记忆中删除不那么相关的上下文。图片由Google
    Gemini提供。
- en: Prompt-tuned shortening LLM
  id: totrans-51
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 提示调整的缩短LLM
- en: I also recommend creating a prompt-tuned shortening LLM. To do this, you first
    need to create a test set of contexts and the desired shortened context, given
    a task at hand. These examples should preferably be fetched from real user interactions
    with your agent.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 我还建议创建一个提示调整的缩短LLM。为此，你首先需要创建一个测试集，包括上下文和所需的缩短上下文，给定一个任务。这些示例最好是从与你的代理的真实用户交互中获取的。
- en: Continuing, you can prompt optimize (or even fine-tune) the shortening LLM for
    the task of summarizing the LLM’s context, to keep important parts of the context,
    while removing other parts of the context that are not relevant anymore.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 继续来说，你可以提示优化（甚至微调）用于总结LLM上下文的缩短LLM，以保留重要的上下文部分，同时删除不再相关的上下文部分。
- en: Tools
  id: totrans-54
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 工具
- en: 'One of the main points separating agents from one-off LLM calls is their use
    of tools. We typically provide agents with a series of tools they can use to increase
    the agent’s ability to solve a task. Examples of such tools are:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 将代理与一次性的LLM调用区分开来的主要点之一是它们使用工具。我们通常为代理提供一系列他们可以使用来提高代理解决任务能力的工具。此类工具的例子包括：
- en: Perform a keyword search on a document corpus
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在文档语料库上执行关键词搜索
- en: Fetch information about a user given their email
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据用户的电子邮件获取用户信息
- en: A calculator to add numbers together
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个用于相加数字的计算器
- en: These tools simplify the problem the agent has to solve. The agent can perform
    a keyword search to fetch additional (often required) information, or it can use
    a calculator to add numbers together, which is much more consistent than adding
    numbers using next-token prediction.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 这些工具简化了代理需要解决的问题。代理可以进行关键词搜索以获取额外的（通常所需的）信息，或者可以使用计算器来相加数字，这比使用下一个标记预测来加数字更一致。
- en: 'Here are some techniques to keep in mind to ensure proper tool usage when providing
    tools in the agent’s context:'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一些技巧要记住，以确保在代理的上下文中提供工具时正确使用工具：
- en: Well-described tools (can a human understand it?)
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 描述良好的工具（人类能否理解？）
- en: Create specific tools
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建特定的工具
- en: Avoid bloating
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 避免膨胀
- en: Only show relevant tools
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 只显示相关的工具
- en: Informative error handling
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 信息的错误处理
- en: Well-described agentic tools
  id: totrans-66
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 描述良好的代理工具
- en: 'The first, and probably most important note, is to have well-described tools
    in your system. The tools you define should have type annotations for all input
    parameters and a return type. It should also have a good function name and a description
    in the docstring. Below you can see an example of a poor tool definition, vs a
    good tool definition:'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 第一，也许是最重要的注意事项，是在你的系统中拥有描述良好的工具。你定义的工具应该对所有输入参数有类型注解，并有一个返回类型。它还应该有一个好的函数名和docstring中的描述。以下是一个差的工具定义示例，与一个好的工具定义示例：
- en: '[PRE2]'
  id: totrans-68
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: The second function in the code above is much easier for the agent to understand.
    Properly describing tools will make the agent much better at understanding when
    to use the tool, and when other approaches is better.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 上述代码中的第二个函数对代理来说更容易理解。正确描述工具将使代理更好地理解何时使用工具，以及何时其他方法更好。
- en: 'The go-to benchmark for a well-described tool is:'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 描述良好的工具的基准是：
- en: Can a human who has never seen the tools before, understand the tools, just
    from looking at the functions and their definitions?
  id: totrans-71
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 一个以前从未见过这些工具的人类，能否仅通过查看函数及其定义就理解这些工具？
- en: Specific tools
  id: totrans-72
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 特定的工具
- en: You should also try to keep your tools as specific as possible. When you define
    vague tools, it’s difficult for the LLM to understand when to use the tool and
    to ensure the LLM uses the tool properly.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 你还应该尽量使你的工具尽可能具体。当你定义模糊的工具时，LLM很难理解何时使用该工具，并确保LLM正确使用该工具。
- en: For example, instead of defining a generic tool for the agent to fetch information
    from a database, you should provide specific tools to extract specific info.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，与其为代理定义一个从数据库中检索信息的通用工具，不如提供特定的工具来提取特定的信息。
- en: 'Bad tool:'
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 差的工具：
- en: Fetch information from database
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从数据库中获取信息
- en: Input
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 输入
- en: Columns to retrieve
  id: totrans-78
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 要检索的列
- en: Database index to find info by
  id: totrans-79
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 通过数据库索引查找信息
- en: 'Better tools:'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 更好的工具：
- en: Fetch info about all users from the database (no input parameters)
  id: totrans-81
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从数据库中检索所有用户的信息（无输入参数）
- en: Get a sorted list of documents by date belonging to a given customer ID
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 获取属于给定客户ID的按日期排序的文档列表
- en: Get an aggregate list of all users and the actions they have taken in the last
    24 hours
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 获取过去24小时内所有用户及其所采取行动的汇总列表
- en: You can then define more specific tools when you see the need for them. This
    makes it easier for the agent to fetch relevant information into its context.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 当你需要更具体的工具时，你可以定义它们。这使得代理更容易将其相关信息的上下文检索出来。
- en: Avoid bloating
  id: totrans-85
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 避免膨胀
- en: 'You should also avoid bloating at all costs. There are two main approaches
    to achieving this with functions:'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 你应该不惜一切代价避免膨胀。有两种主要方法可以通过函数来实现这一点：
- en: Functions should return structured outputs, and optionally, only return a subset
    of results
  id: totrans-87
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 函数应返回结构化输出，并且可选地只返回结果的一个子集
- en: Avoid irrelevant tools
  id: totrans-88
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 避免无关的工具
- en: For the first point, I’ll again use the example of a keyword search. When performing
    a keyword search, for example, against AWS Elastic Search, you’ll receive back
    a lot of information, sometimes not that structured.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 对于第一个要点，我再次以关键词搜索为例。当执行关键词搜索时，例如，针对AWS Elastic Search，你会收到很多信息，有时结构不是那么清晰。
- en: '[PRE3]'
  id: totrans-90
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: In the bad example, we simply stringify the raw list of dicts returned from
    the keyword search. The better approach is to have a separate helper function
    to structure the results into a structured string.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 在不好的例子中，我们只是将关键词搜索返回的原始字典列表转换为字符串。更好的方法是有一个单独的辅助函数来将结果结构化为有结构的字符串。
- en: You should also ensure the model can return only a subset of results, as shown
    with the *max_results* parameter. This helps the model a lot, especially with
    functions like keyword search, that can potentially return 100’s of results, immediately
    filling up the LLM’s context.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 你还应该确保模型只能返回结果的一个子集，例如使用 *max_results* 参数所示。这对模型帮助很大，尤其是对于像关键词搜索这样的功能，它可能会返回100多个结果，立即填满LLM的上下文。
- en: '* * *'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: My second point was on avoiding irrelevant tools. You’ll probably encounter
    situations where you have a lot of tools, many of which will only be relevant
    for the agent to use at specific steps. If you know a tool is not relevant for
    an agent at a given time, you should keep the tool out of the context.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 我的第二个要点是避免无关的工具。你可能遇到的情况是，你有许多工具，其中许多工具可能只适用于代理在特定步骤中使用。如果你知道某个工具在某个特定时间对代理不相关，你应该将工具排除在上下文之外。
- en: Informative error handling
  id: totrans-95
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 信息丰富的错误处理
- en: Informative error handling is critical when providing agents with tools. You
    need to help the agent understand what it’s doing wrong. Usually, the raw error
    messages provided by Python are bloated and not that easy to understand.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 当为代理提供工具时，信息丰富的错误处理至关重要。你需要帮助代理理解它做错了什么。通常，Python提供的原始错误消息膨胀且不易理解。
- en: Below is a good example of error handling in tools, where the agent is told
    what the error was and how to deal with it. For example, when encountering rate
    limit errors, we tell the agent to specifically sleep before trying again. This
    simplifies the problem a lot for the agent, as it doesn’t have to reason itself
    that it has to sleep.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是工具中错误处理的一个很好的例子，其中代理被告知错误是什么以及如何处理它。例如，当遇到速率限制错误时，我们告诉代理在再次尝试之前具体地暂停。这大大简化了代理的问题，因为它不需要自己推理出它需要暂停。
- en: '[PRE4]'
  id: totrans-98
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'You should have such error handling for all functions, keeping the following
    points in mind:'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 你应该为所有函数都具备这样的错误处理，同时注意以下要点：
- en: Error messages should be informative of what happened
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 错误消息应该提供有关发生情况的信息
- en: 'If you know the fix (or potential fixes) for a specific error, inform the LLM
    how to act if the error occurs (for example: if a rate limit error, tell the model
    to run time.sleep())'
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果你知道特定错误的修复方法（或潜在修复方法），告诉LLM在发生错误时如何行动（例如：如果发生速率限制错误，告诉模型运行time.sleep()）
- en: Agentic context engineering going forward
  id: totrans-102
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 未来的代理上下文工程
- en: 'In this article, I’ve covered three main topics: Specific context engineering
    tips, shortening the agents’ context, and how to provide your agents with tools.
    These are all foundational topics you need to understand to build a good AI agent.
    There are also further topics that you should learn more about, such as the consideration
    of pre-computed information or inference-time information retrieval. I’ll cover
    this topic in a future article. Agentic context engineering will continue to be
    a super relevant topic, and understanding how to handle the context of an agent
    is, and will be, fundamental to future AI agent developments.'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我涵盖了三个主要主题：特定上下文工程技巧、缩短代理的上下文，以及如何为你的代理提供工具。这些都是你需要了解的基础性主题，以构建一个优秀的AI代理。还有一些其他主题你应该了解更多，例如预先计算信息或推理时信息检索的考虑。我将在未来的文章中介绍这个主题。代理上下文工程将继续是一个超级相关的话题，理解如何处理代理的上下文，现在和将来都是未来AI代理发展的基础。
