- en: 'Deep Reinforcement Learning: 0 to 100'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 深度强化学习：从 0 到 100
- en: 原文：[https://towardsdatascience.com/deep-reinforcement-learning-for-dummies/](https://towardsdatascience.com/deep-reinforcement-learning-for-dummies/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/deep-reinforcement-learning-for-dummies/](https://towardsdatascience.com/deep-reinforcement-learning-for-dummies/)
- en: <mdspan datatext="el1761635988548" class="mdspan-comment">Ever wondered</mdspan>
    how you’d teach a robot to land a drone without programming every single move?
    That’s exactly what I set out to explore. I spent weeks building a game where
    a virtual drone has to figure out how to land on a platform—not by following pre-programmed
    instructions, but by learning from trial and error, just like how you learned
    to ride a bike.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1761635988548" class="mdspan-comment">你是否想过</mdspan>如何教机器人降落无人机而不需要为每一个动作编程？这正是我着手探索的事情。我花了几周时间构建了一个游戏，在这个游戏中，一个虚拟无人机必须找出如何降落在平台上——不是通过遵循预先编程的指令，而是通过从试错中学习，就像你学习骑自行车一样。
- en: 'This is **Reinforcement Learning (RL)**, and it’s fundamentally different from
    other machine learning approaches. Instead of showing the AI thousands of examples
    of “correct” landings, you give it feedback: “Hey, that was pretty good, but maybe
    try being more gentle next time?” or “Yikes, you crashed—probably don’t do that
    again.” Through countless attempts, the AI figures out what works and what doesn’t.'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是**强化学习（RL）**，它与其他机器学习方法有根本的不同。你不需要向 AI 展示成千上万次“正确”降落的例子，而是给它反馈：“嘿，那还不错，但也许下次可以更温柔一些？”或者“哎呀，你撞了——可能下次不要这么做。”通过无数次的尝试，AI
    找出什么有效，什么无效。
- en: In this post, I’m documenting my journey from RL basics to building a working
    system that (mostly!) teaches a drone to land. You’ll see the successes, the failures,
    and all the weird behaviors I had to debug along the way.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我记录了我从强化学习基础到构建一个（大部分！）教无人机降落的实际系统的旅程。你会看到成功、失败以及我必须调试的所有奇怪行为。
- en: '1\. Reinforcement learning: Overview'
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1. 强化学习：概述
- en: A lot of the idea can be related to Pavlov’s dog and Skinner’s rat experiments.
    The idea is that you give the subject a ‘*reward*‘ when it does something you
    want it to do (positive reinforcement) and a ‘*penalty*‘ when it does something
    bad (negative reinforcement). Through many repeated attempts, your subject learns
    from this feedback, gradually discovering which actions lead to success—similar
    to how Skinner’s rat learned which lever presses produced food rewards.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 许多想法都可以与巴甫洛夫的狗和斯金纳的老鼠实验联系起来。这个想法是，当受试者做你希望它做的事情时，你给它一个‘*奖励*’（正强化），而当它做坏事时，你给它一个‘*惩罚*’（负强化）。通过许多重复尝试，受试者从这种反馈中学习，逐渐发现哪些行为会导致成功——这就像斯金纳的老鼠学习哪些杠杆按压会产生食物奖励一样。
- en: '![Pavlov''s classical conditioning experiment](../Images/b506b3d7063cd8c7e5040be5cbdbdafc.png)'
  id: totrans-7
  prefs: []
  type: TYPE_IMG
  zh: '![巴甫洛夫的经典条件反射实验](../Images/b506b3d7063cd8c7e5040be5cbdbdafc.png)'
- en: Fig 1\. Pavlov’s classical conditioning experiment (AI-generated image by Google’s
    Gemini)
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1. 巴甫洛夫的经典条件反射实验（由谷歌的 Gemini 生成的 AI 图像）
- en: In the same fashion, we want a system that will learn to do things (or tasks)
    such that it can maximize the reward and minimize the penalty. Note this fact
    about maximizing reward, which will come in later.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 同样地，我们希望有一个系统可以学习做事情（或任务），以便它可以最大化奖励并最小化惩罚。注意这个关于最大化奖励的事实，它将在后面出现。
- en: 1.1 Core Concepts
  id: totrans-10
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1.1 核心概念
- en: 'When talking about systems that can be implemented programmatically on computers,
    the best practice is to write clear definitions for ideas that can be abstracted.
    In the study of AI (and more specifically, Reinforcement learning), the core ideas
    can be boiled down to the following:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 当谈论可以在计算机上编程实现的系统时，最佳实践是为可以抽象化的想法编写清晰的定义。在人工智能（特别是强化学习）的研究中，核心思想可以简化为以下内容：
- en: '**Agent (or Actor)**: This is our *subject* from the previous section. This
    can be the dog, a robot trying to navigate a huge factory, a video game [NPC](https://en.wikipedia.org/wiki/Non-player_character),
    etc.'
  id: totrans-12
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**代理（或行动者）**：这是我们上一节中的*受试者*。这可以是狗、试图在大型工厂中导航的机器人、视频游戏中的[NPC](https://en.wikipedia.org/wiki/Non-player_character)等。'
- en: '**Environment (or the world)**: This can be a place, a simulation with restrictions,
    a video game’s virtual game world, etc. I think of this like, “A box, real or
    virtual, where the agent’s entire life is confined to; it only knows of what happens
    within the box. We, as the overlords, can alter this box, while the agent will
    think that god is exacting his will on his world.”'
  id: totrans-13
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Policy**: Just like in governments, companies, and many more similar entities,
    ‘*policies*’ dictate “What actions should be taken when given a certain situation”.'
  id: totrans-14
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**State**: This is what the agent “sees” or “knows” about its current situation.
    Think of it as the agent’s snapshot of reality at any given moment—like how you
    see the traffic light color, your speed, and the distance to the intersection
    when driving.'
  id: totrans-15
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Action**: Now that our agent can ‘see’ things in its environment, it may
    want to do something about its state. Maybe it just woke up from a long night’s
    slumber, and now it wants to get a cup of coffee. In this case, the first thing
    it will do is **get out of bed**. This is an action that the agent will take to
    achieve its goal, i.e., GET SOME COFFEE!'
  id: totrans-16
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Reward**: Every time the actor executes an action (of its own volition),
    something may change in the world. For example, our agent got out of bed and started
    walking towards the kitchen, but then, because it is so bad at walking, it tripped
    and fell. In this situation, the god (us) rewards it with a punishment for being
    bad at walking (negative reward). But then the agent makes it to the kitchen and
    gets the coffee, so the god (us) rewards it with a cookie (positive reward).'
  id: totrans-17
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![Illustration of a theoretical RL system](../Images/61bb9da4f98d8583897c2b2d9a20ee30.png)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
- en: Fig. 2 Illustration of a theoretical RL system
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: As you can imagine, most of these **key components** need to be tailored for
    the specific task/problem that we want the agent to solve.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: 2\. The Gym
  id: totrans-21
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now that we understand the basics, you might be wondering: **how do we actually
    build one of these systems?** Let me show you the game I built.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: For this post, I have written a bespoke video game that anyone can access and
    use to train their own machine learning agent to play the game.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: The full code repository can be found on [GitHub](https://www.github.com/vedant-jumle/reinforcement-learning-101) (please
    star this). I intend to use this repository for more games and simulation code,
    along with more advanced techniques that I will implement in my next installments
    of posts on RL.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
- en: Delivery Drone
  id: totrans-25
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The delivery drone is a game where the objective is to fly a drone (likely
    containing deliveries) onto a platform. To win the game, we have to land. To land,
    we have to meet the following criteria:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
- en: Be in landing proximity to the platform
  id: totrans-27
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Be slow enough
  id: totrans-28
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Be upright (Landing upside down is more like crashing than landing)
  id: totrans-29
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: All information on how to run the game can be found in the GitHub repository.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
- en: Here’s what the game looks like
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
- en: '![Sample screenshot of the game](../Images/feb0902f881281e6471954db6fb831a1.png)'
  id: totrans-32
  prefs: []
  type: TYPE_IMG
- en: Fig. 3 A screenshot of the game that I made for this project
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: If the drone flies off the screen or touches the ground, it will be considered
    a ‘*crash*’ case and thus lead to a failure.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
- en: State description
  id: totrans-35
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The drone observes 15 continuous values that completely describe its situation:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b2f52b81f23497b528a07c396a9f903f.png)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
- en: '**Landing Success Criteria:** The drone must simultaneously achieve:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
- en: 'Horizontal alignment: within platform bounds (|dx| < 0.0625)'
  id: totrans-39
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Safe approach speed: less than 0.3'
  id: totrans-40
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Level orientation: tilt less than 20° (|angle| < 0.111)'
  id: totrans-41
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Correct altitude: bottom of drone touching platform top'
  id: totrans-42
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: It’s like parallel parking—you need the right position, right angle, and moving
    slowly enough to not crash!
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
- en: How can someone design a policy?
  id: totrans-44
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: There are many ways to design a policy. It can be Bayesian (maintaining probability
    distributions over beliefs), it can be a simple lookup table for discrete states,
    a hand-coded rule system (“if distance < 10, then brake”), a [decision tree](https://en.wikipedia.org/wiki/Decision_tree),
    or—as we’ll explore—a [neural network](https://en.wikipedia.org/wiki/Neural_network_(machine_learning)) that
    learns the mapping from states to actions through gradient descent.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
- en: Effectively, we want something that takes in the aforementioned **state**, performs
    some computation using this state, and returns what action should be performed.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
- en: Deep Learning to build a policy?
  id: totrans-47
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: So how do we design a policy that can handle continuous states (like exact drone
    positions) and learn complex behaviors? **This is where neural networks come in.**
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
- en: 'In case of neural networks (or in deep learning), it is generally best to work
    with action probabilities, i.e., **“What action is likely the best given the current
    state?”**. So, we can define a neural network that will take in the state as a
    ‘vector’ or ‘collection of vectors’ as input. This vector or collection of vectors
    has to be constructed from the observed state. For our delivery drone game, the
    state vector is:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
- en: '**State vector (from our 2D drone game)**'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
- en: 'The drone observes its absolute position, velocities, orientation, fuel, platform
    position, and derived metrics. Our continuous state is:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/16ce384c6556e2de9ce1263b34d65a2a.png)'
  id: totrans-52
  prefs: []
  type: TYPE_IMG
- en: 'Where each component represents:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/7d4ac341fbdf37fb42831208dc91ddb3.png)'
  id: totrans-54
  prefs: []
  type: TYPE_IMG
- en: All components are normalized to roughly [0,1] or [-1,1] ranges for stable neural
    network training.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
- en: '**Action space (three independent binary thrusters)**'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
- en: 'Instead of discrete action combinations, we treat each thruster independently:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
- en: Main thruster (upward thrust)
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Left thruster (clockwise rotation)
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Right thruster (counter-clockwise rotation)
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Each action is sampled from a Bernoulli distribution, giving us 3 independent
    binary decisions per timestep.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
- en: '**Neural-network policy (probabilistic with Bernoulli sampling)**'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
- en: 'Let f[θ](s) be the network outputs after sigmoid activation. The policy uses
    independent Bernoulli distributions:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 令 f[θ](s) 为经过 sigmoid 激活后的网络输出。策略使用独立的伯努利分布：
- en: '![](../Images/e55e3f7987b267a614f6bf61e61d8426.png)'
  id: totrans-64
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e55e3f7987b267a614f6bf61e61d8426.png)'
- en: Minimal Python sketch (from our implementation)
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 最小 Python 草稿（来自我们的实现）
- en: '[PRE0]'
  id: totrans-66
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: This shows how we map the game’s physical observations into a 15-dimensional
    normalized state vector and produce independent binary decisions for each thruster.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 这显示了我们将游戏的物理观察映射到 15 维归一化状态向量，并为每个推进器产生独立的二元决策。
- en: 'Code setup (part 1): Imports and game socket setup'
  id: totrans-68
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 代码设置（第 1 部分）：导入和游戏套接字设置
- en: 'We first want our game’s socket listener to start. For this, you can navigate
    to the delivery_drone directory in my repository and run the following command:'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 我们首先希望我们的游戏套接字监听器开始工作。为此，您可以导航到我的仓库中的 delivery_drone 目录并运行以下命令：
- en: '[PRE1]'
  id: totrans-70
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '**NOTE: You will need PyTorch to** **run the code. Please make sure that you
    have set it up beforehand**'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: '**注意**：您需要 PyTorch 来运行代码。请确保您事先已设置好'
- en: '[PRE2]'
  id: totrans-72
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: How to design a reward function?
  id: totrans-73
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 如何设计奖励函数？
- en: '**So what makes a good reward function?** This is arguably the hardest part
    of RL (and where I spent a LOT of my debugging time 🫠).'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: '**那么，什么使一个好的奖励函数？** 这可以说是强化学习中最困难的部分（而且我在调试上花了很多时间 🫠）。'
- en: The reward function is the **soul of any RL implementation** (and trust me,
    get this wrong and your agent will do the weirdest things). In theory, it should
    define what ‘*good*’ behaviour should be learnt and what ‘*bad*’ behaviour should
    not be learnt. Each action taken by our agent is characterized by the total accumulated
    reward for each behaviour trait exhibited by the action. For example, if you want
    the drone to land gently, you might give positive rewards for being close to the
    platform and moving slowly, while penalizing crashes or running out of fuel—the
    agent then learns to maximize the sum of all these rewards over time.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 奖励函数是任何强化学习实现的**灵魂**（而且相信我，搞错了这一点，你的智能体将会做出最奇怪的事情）。在理论上，它应该定义应该学习什么“*好*”行为以及不应该学习什么“*坏*”行为。我们的智能体采取的每个动作都由该动作展示的每个行为特征的累积奖励来表征。例如，如果你想无人机平稳着陆，你可以为接近平台和缓慢移动给予正奖励，同时惩罚坠毁或耗尽燃料——智能体随后会学习在一段时间内最大化所有这些奖励的总和。
- en: '**Advantage: A better way to measure effective reward**'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: '**优势：衡量有效奖励的更好方式**'
- en: When training our policy, we don’t just want to know if an action rewarded us—we
    want to know if it was *better than usual*. This is the intuition behind the **advantage**.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 当训练我们的策略时，我们不仅想知道动作是否被奖励——我们想知道它是否比通常更好。这是**优势**背后的直觉。
- en: 'The advantage tells us: “Was this action better or worse than what we typically
    expect?”'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 优势告诉我们：“这个动作比我们通常预期的更好还是更差？”
- en: '![](../Images/628f471cd793dca0b163b68d0abbdaa4.png)'
  id: totrans-79
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/628f471cd793dca0b163b68d0abbdaa4.png)'
- en: 'In our implementation, we:'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的实现中，我们：
- en: Collect multiple episodes and calculate their returns (total discounted rewards)
  id: totrans-81
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 收集多个剧集并计算它们的回报（总折现奖励）
- en: Compute the **baseline** as the mean return across all episodes
  id: totrans-82
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 计算所有剧集的平均回报作为**基准**
- en: Calculate **advantage** = return – baseline for each timestep
  id: totrans-83
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 计算每个时间步的**优势**= 返回值 – 基准值
- en: Normalize advantages to have mean=0 and std=1 (for stable training)
  id: totrans-84
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 将优势归一化，使其均值为 0 和标准差为 1（以稳定训练）
- en: '**Why this helps:**'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: '**为什么这有帮助：**'
- en: Actions with positive advantage → better than average → increase their probability
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 具有正优势的动作 → 比平均更好 → 增加它们的概率
- en: Actions with negative advantage → worse than average → decrease their probability
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 具有负优势的动作 → 比平均更差 → 减少它们的概率
- en: Reduces variance in gradient updates (more stable learning)
  id: totrans-88
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 减少梯度更新的方差（更稳定的学习）
- en: This simple baseline already gives us much better training than raw returns!
    It tries to weigh the full sequence of actions against the outcomes (crashed or
    landed) such that the policy learns to take actions that lead to better advantage.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 这个简单的基线已经比原始回报提供了更好的训练！它试图权衡整个动作序列与结果（坠毁或着陆）的对比，从而使策略学会采取导致更好优势的动作。
- en: After a lot of trial and error, I have designed the following reward function.
    The key insight was to **condition rewards on both proximity AND vertical position** –
    the drone must be above the platform to receive positive rewards, preventing exploitation
    strategies like hovering below the platform.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 经过大量的尝试和错误，我设计了以下奖励函数。关键洞察是**在接近度和垂直位置上同时条件化奖励**——无人机必须位于平台上方才能获得正奖励，防止像在平台下方悬停这样的利用策略。
- en: '![](../Images/28038272c85e716bce1ac6168e739b49.png)'
  id: totrans-91
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/28038272c85e716bce1ac6168e739b49.png)'
- en: '**Short note on inversely (and non-linearly) scaling reward**'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: '**关于反向（和非线性）缩放奖励的简短说明**'
- en: 'Often, we want to reward behaviors inversely proportional to certain state
    values. For example, distance to the platform ranges from 0 to ~1.41 (normalized
    by window width). We want a high reward when the distance ≈ 0 and a low reward
    when far away. I use various scaling functions for this:'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，我们希望奖励与某些状态值成反比的行为。例如，到平台的距离从0到约1.41（通过窗口宽度归一化）。当距离≈0时，我们希望获得高奖励，而当距离较远时，我们希望获得低奖励。我为此使用了各种缩放函数：
- en: '![Plot showing an exponentially decaying function](../Images/f66e399ee981609d233a5e31aff778d0.png)'
  id: totrans-94
  prefs: []
  type: TYPE_IMG
  zh: '![展示指数衰减函数的图表](../Images/f66e399ee981609d233a5e31aff778d0.png)'
- en: Fig. 4 Gaussian scalar function
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 图4 高斯标量函数
- en: '[Examples for other useful scaling functions](https://www.desmos.com/calculator/uof8m0oldo)'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: '[其他有用缩放函数的示例](https://www.desmos.com/calculator/uof8m0oldo)'
- en: '**Helper functions:**'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: '**辅助函数**：'
- en: '[PRE3]'
  id: totrans-98
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'Code for the current reward function:'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 当前奖励函数的代码：
- en: '[PRE4]'
  id: totrans-100
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: And yes, those magic numbers like `4.5`, `0.065`, and `4.0`? They came from *a
    lot* of trial and error. Welcome to RL, where hyperparameter tuning is half art,
    half science, and half luck (yes, I know that’s three halves).
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 是的，那些像`4.5`、`0.065`和`4.0`这样的魔法数字？它们来自**大量**的试错。欢迎来到强化学习，在这里超参数调整一半是艺术，一半是科学，一半是运气（是的，我知道那是三个一半）。
- en: '[PRE5]'
  id: totrans-102
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: The important thing to note is that reward functions are subject to careful
    trial and error. One mistake or over-reward here, and the agent goes off in optimizing
    behaviour that exploits the mistakes. This leads us to reward hacking.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 需要注意的重要一点是，奖励函数需要经过仔细的试错。这里的任何一个错误或过度奖励，都可能导致智能体偏离优化行为，利用这些错误。这导致我们面临奖励黑客行为。
- en: Reward hacking
  id: totrans-104
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 奖励黑客
- en: '**Reward hacking** occurs when an agent finds an unintended way to maximize
    reward without actually solving the task you wanted it to solve. The agent isn’t
    “cheating” on purpose—it’s doing exactly what you told it to do, just not what
    you *meant* for it to do.'
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 当一个智能体找到一种未经预期的方式来最大化奖励，而实际上并没有解决你希望它解决的问题时，就会发生**奖励黑客行为**。智能体并不是故意“作弊”——它正在做你告诉它做的事情，只是不是你**真正希望**它做的事情。
- en: '**Classic example**: If you reward a cleaning robot for “no visible dirt,”
    it might learn to turn off its camera instead of cleaning!'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: '**经典例子**：如果你奖励清洁机器人“没有可见的灰尘”，它可能会学会关闭摄像头而不是清洁！'
- en: '**My painful learning experience**: I found this out the hard way. In an early
    version of my drone landing reward function, I gave the drone points for being
    “stable and slow” anywhere near the platform. Sounds reasonable, right? Wrong!
    Within 50 training episodes, my drone learned to just hover in place forever,
    racking up free points. It was technically optimal for my badly-designed reward
    function—but actually landing? Nope! I watched it hover for 5 minutes straight
    before I realized what was happening.'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: '**我痛苦的学习经历**：我是通过艰难的方式得知这一点的。在我早期版本的无人机着陆奖励函数中，我给无人机在平台附近“稳定且缓慢”飞行时加分。听起来合理，对吧？错了！在50次训练周期内，我的无人机学会了永远停留在原地悬停，累积了免费分数。对于我设计的糟糕奖励函数来说，这在技术上是最优的——但实际上着陆呢？没有！我看着它连续悬停了5分钟，才意识到发生了什么。'
- en: 'Here’s the problematic code I wrote:'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我在代码中遇到的问题：
- en: '[PRE6]'
  id: totrans-109
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'An example of reward hacking in action:'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: '**奖励黑客行为**的实例：'
- en: '![](../Images/c608e242a9a97685b793bc6b73e90da3.png)'
  id: totrans-111
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c608e242a9a97685b793bc6b73e90da3.png)'
- en: Fig. 5 The drone learnt to hover around the platform and farm rewards
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 图5 无人机学会了在平台周围悬停并获取奖励
- en: '![Plot showing hacked rewards](../Images/11404fd39ccb4019ae45423c226c015b.png)'
  id: totrans-113
  prefs: []
  type: TYPE_IMG
  zh: '![展示被黑客攻击的奖励的图表](../Images/11404fd39ccb4019ae45423c226c015b.png)'
- en: Fig. 6 Plot that shows that the drone is clearly reward hacking
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 图6 展示无人机明显进行奖励黑客行为的图表
- en: Making a policy network
  id: totrans-115
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 制定策略网络
- en: 'As discussed above, we are going to use a neural network as the policy that
    powers the brain of our agent. Here’s a simple implementation that takes in the
    state vector and computes a probability distribution over **3 independent** actions:'
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 如上所述，我们将使用神经网络作为驱动我们智能体大脑的策略。以下是一个简单的实现，它接受状态向量并计算在**3个独立**动作上的概率分布：
- en: Activate the main thruster
  id: totrans-117
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 激活主推进器
- en: Activate the left thruster
  id: totrans-118
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 激活左侧推进器
- en: Activate the right thruster
  id: totrans-119
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 激活右侧推进器
- en: '[PRE7]'
  id: totrans-120
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: Effectively, instead of the action space being a 2³ = 8 space, I reduced it
    to decisions over the three independent thrusters using Bernoulli sampling. This
    reduction makes optimization easier by treating each thruster independently rather
    than as one big categorical choice (at least that is what I think—I may be wrong,
    but it worked for me!).
  id: totrans-121
  prefs: []
  type: TYPE_NORMAL
  zh: 实际上，而不是动作空间是一个2³ = 8的空间，我将其减少到使用伯努利采样对三个独立推进器的决策。这种减少通过独立处理每个推进器而不是作为一个大的分类选择（至少我认为是这样——我可能错了，但对我有效！）来简化了优化。
- en: '* * *'
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Training a policy with policy gradients
  id: totrans-123
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用策略梯度的策略训练
- en: 'Learning Strategies: When Should We Update?'
  id: totrans-124
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 学习策略：我们应该何时更新？
- en: Here’s a question that tripped me up early on: **should we update the policy
    after every single action, or wait and see how the whole episode plays out?** Turns
    out, this choice matters a lot.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有一个早期让我困惑的问题：**我们应该在每次单独的动作后更新策略，还是等待整个集锦结束后再更新？** 结果表明，这个选择非常重要。
- en: When you try to optimize based purely on the reward received for an action,
    it leads to a high variance problem (basically, the training signal is super noisy
    and the gradients point in random directions!). What I mean by “high variance”
    is that the optimization algorithm receives extremely mixed signals in the gradient
    that is used to update the parameters in our policy network. For the same action,
    the system may emit a specific gradient direction, but then for a slightly different
    state (but same action) might yield something completely opposite. This leads
    to slow, and potentially no, training.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 当你试图仅基于动作获得的奖励进行优化时，会导致高方差问题（基本上，训练信号非常嘈杂，梯度指向随机方向！）。我所说的“高方差”是指优化算法在梯度中接收极其混合的信号，该梯度用于更新我们的策略网络中的参数。对于同一动作，系统可能会发出一个特定的梯度方向，但对于稍微不同的状态（但相同动作）可能会产生完全相反的结果。这导致训练缓慢，甚至可能无法训练。
- en: 'There are three ways we could update our policy:'
  id: totrans-127
  prefs: []
  type: TYPE_NORMAL
  zh: 我们有三种方法可以更新我们的策略：
- en: '**Learning after every action (Per-Step Updates)**'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: '**每一步后的学习（每步更新）**'
- en: The drone fires its thruster once, gets a small reward, and immediately updates
    its entire strategy. This is like adjusting your basketball form after every single
    shot—way too reactive! One lucky action that increases the reward doesn’t necessarily
    mean that the agent did good, and one unlucky action doesn’t mean the agent did
    bad. The learning signal is just too noisy.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 无人机发动一次推进器，获得一小笔奖励，并立即更新其整个策略。这就像每次投篮后都调整你的篮球姿势——反应过度！一次幸运的动作增加了奖励，并不一定意味着代理做得好，一次不幸的动作也不一定意味着代理做得不好。学习信号太嘈杂了。
- en: '**My first attempt**: I tried this approach early on. The drone would wiggle
    around randomly, make one lucky move that got a tiny bit more reward, immediately
    overfit to that exact move, and then crash repeatedly trying to reproduce it.
    It was painful to watch—like watching someone learn the wrong lesson from pure
    chance.'
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: '**我的第一次尝试**：我早期尝试了这个方法。无人机会随机摆动，做出一次幸运的动作，获得一点额外的奖励，然后立即过度拟合到那个特定的动作，并反复尝试重现它。看着它痛苦地尝试，就像看着某人从纯粹的偶然中学习错误的教训。'
- en: '**Learning after one complete attempt (Per-Episode Updates)**'
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: '**完成整个尝试后的学习（每集更新）**'
- en: 'Better! Now we let the drone try to land (or crash), see how the whole attempt
    went, and then update. This is like finishing an episode and then thinking about
    what to improve. At least now we see the full consequences of our actions. But
    here’s the problem: what if that one landing was just lucky? Or unlucky? We’re
    still basing our learning on a single data point.'
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 更好！现在我们让无人机尝试降落（或坠毁），看看整个尝试过程如何，然后进行更新。这就像完成一集后思考如何改进。至少现在我们看到了我们行动的全部后果。但问题是：如果那次降落只是幸运的？或者不幸的？我们仍然基于单一的数据点进行学习。
- en: '**Learning from multiple attempts (Multi-Episode Batch Updates)**'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: '**从多次尝试中学习（多集批量更新）**'
- en: This is the sweet spot. We run multiple (6 in my case) drone landing attempts
    simultaneously, see how they all went, and then update our policy based on the
    average performance. Some attempts might get lucky, some unlucky, but averaged
    together, we get a much clearer picture of what actually works. Although this
    is quite heavy on the computer, if you can run it, it works way better than any
    of the previous methods. Of course, this method is certainly not the best, but
    it is quite simple to understand and implement; there are other (and better) methods.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s the code to collect multiple episodes in the drone game:'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  id: totrans-136
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: The Maximization-Minimization Puzzle
  id: totrans-137
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'In typical deep learning (supervised learning), we **minimize** a loss function:'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/6673edfa9f176c2a4b73a1a741ec762e.png)'
  id: totrans-139
  prefs: []
  type: TYPE_IMG
- en: We want to go “downhill” toward lower loss (better predictions).
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
- en: 'But in reinforcement learning, we want to **maximize** total reward! Our goal
    is:'
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/4957c6137b6fa00f0f3e241fed56e2a7.png)'
  id: totrans-142
  prefs: []
  type: TYPE_IMG
- en: '**The problem:** Deep learning frameworks are built for minimization, not maximization.
    How do we turn “maximize reward” into “minimize loss”?'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
- en: '**The simple trick:** Maximize J(θ) = Minimize -J(θ)'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
- en: 'So our loss function becomes:'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ac8e8fadda249433daf12915a2351fd9.png)'
  id: totrans-146
  prefs: []
  type: TYPE_IMG
- en: Now, gradient descent will climb **up** (more like Gradient Ascend) the reward
    landscape (because we’re going down the negative reward)!
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
- en: The REINFORCE Algorithm (Policy Gradient)
  id: totrans-148
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The **policy gradient theorem** (Williams, 1992) tells us how to compute the
    gradient of expected reward:'
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/1b36fc56274aa5dadfaed90b9a21d7f6.png)'
  id: totrans-150
  prefs: []
  type: TYPE_IMG
- en: (I know, I know—this looks intimidating. But stick with me, it’s actually quite
    elegant once you see what’s happening!)
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
- en: 'Where:'
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/8ccde03ae890338e3d7f92026c42a3de.png)'
  id: totrans-153
  prefs: []
  type: TYPE_IMG
- en: '**In plain English (because that formula is dense):**'
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
- en: If action **a[t]** led to a high return **G[t]**, increase its probability
  id: totrans-155
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If action **a[t]** led to a low return **G[t]**, decrease its probability
  id: totrans-156
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The gradient tells us which direction to adjust the neural network weights
  id: totrans-157
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Adding a Baseline (Variance Reduction)
  id: totrans-158
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Using raw returns **G[t]** leads to high variance (noisy gradients). We improve
    this by subtracting a **baseline** b(s[t]):'
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/9f72405a6cf004bdd2182446aef3e4e2.png)'
  id: totrans-160
  prefs: []
  type: TYPE_IMG
- en: 'The simplest baseline is the **mean return**:'
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/21e4615d34080924c792a6f87f4bd7b5.png)'
  id: totrans-162
  prefs: []
  type: TYPE_IMG
- en: 'This gives us the **advantage**: A[t]=G[t]-b'
  id: totrans-163
  prefs: []
  type: TYPE_NORMAL
- en: Positive advantage → action was better than average → increase probability
  id: totrans-164
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Negative advantage → action was worse than average → decrease probability
  id: totrans-165
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Why this helps:** Instead of “this action gave reward 100” (is that good?),
    we have “this action gave 100 when the average is 50” (that’s great!). Relative
    performance is clearer than absolute.'
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
- en: Our Implementation
  id: totrans-167
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'In our drone landing code, we use **REINFORCE with baseline**:'
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  id: totrans-169
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: We repeat the above loop as many times as we want or till the drone learns to
    land properly. Have a look at [this](https://github.com/vedant-jumle/reinforcement-learning-101/blob/main/Policy_Gradients_Baseline.ipynb) notebook
    for more code!
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以重复上述循环，直到我们想要或直到无人机学会正确着陆。查看这个[链接](https://github.com/vedant-jumle/reinforcement-learning-101/blob/main/Policy_Gradients_Baseline.ipynb)笔记本以获取更多代码！
- en: Current Results (reward function is still quite flawed)
  id: totrans-171
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 当前结果（奖励函数仍然相当有缺陷）
- en: 'After countless hours of tweaking rewards, adjusting hyperparameters, and watching
    my drone crash in creative new ways, I finally got it working (mostly!). Even
    though my designed reward function is not perfect, I do think that it is able
    to teach a policy network. Here’s a successful landing:'
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 经过无数小时的调整奖励、调整超参数，并看着我的无人机以各种创新的方式坠毁，我终于让它工作了（大部分！）！尽管我设计的奖励函数并不完美，但我认为它能够教会策略网络。以下是一个成功的着陆示例：
- en: '![Gif showing a good run of the agent](../Images/5a070c3ab08d5583d94b363e7172fd08.png)'
  id: totrans-173
  prefs: []
  type: TYPE_IMG
  zh: '![展示代理良好运行的Gif](../Images/5a070c3ab08d5583d94b363e7172fd08.png)'
- en: Fig. 6 The drone learnt something!
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 图6 无人机学到了一些东西！
- en: Pretty cool, right? But here’s where things get interesting (and frustrating)…
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 真的很酷，对吧？但这里才是事情变得有趣（并且令人沮丧）的地方…
- en: '* * *'
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'The persistent hovering problem: A fundamental limitation'
  id: totrans-177
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 持续的悬停问题：一个基本限制
- en: Even with the improved reward function that conditions rewards on vertical position
    (`dy_to_platform > 0`). The trained policy still exhibits a frustrating behavior: **when
    the drone misses the platform, it learns to descend toward it but then hovers
    below the platform rather than attempting to land**.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 即使是改进的奖励函数，该奖励函数基于垂直位置条件（`dy_to_platform > 0`），训练策略仍然表现出令人沮丧的行为：**当无人机错过平台时，它会学会向平台下降，但然后在平台下方悬停而不是尝试着陆**。
- en: I spent over a week staring at reward plots (and altering reward functions),
    wondering why my “fixed” reward function was still producing this hovering behavior.
    When I finally plotted the accumulated rewards, the pattern became crystal clear—and
    honestly, I couldn’t even be mad at the agent for finding this strategy.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 我花了一周多的时间盯着奖励图（并修改奖励函数），想知道为什么我的“固定”奖励函数仍然产生这种悬停行为。当我最终绘制累积奖励时，模式变得非常清晰——而且老实说，我甚至不能因为代理找到这种策略而生气。
- en: '**What’s happening?**'
  id: totrans-180
  prefs: []
  type: TYPE_NORMAL
  zh: '**发生了什么？**'
- en: 'By analyzing the accumulated rewards over an episode where the drone hovers
    below the platform, I discovered something interesting:'
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 通过分析无人机在平台下方悬停的情节中累积的奖励，我发现了一些有趣的事情：
- en: '![](../Images/86cfdf4cfe1b54d3b40326b8a2f6b671.png)'
  id: totrans-182
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/86cfdf4cfe1b54d3b40326b8a2f6b671.png)'
- en: Fig. 7 Gif showing “hovering below platform” problem
  id: totrans-183
  prefs: []
  type: TYPE_NORMAL
  zh: 图7显示“在平台下方悬停”问题的Gif
- en: '![](../Images/e84300d7e7c9be34a659a5ecfafba03f.png)'
  id: totrans-184
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/e84300d7e7c9be34a659a5ecfafba03f.png)'
- en: Fig. 8 Plot that shows that the drone is clearly reward hacking
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 图8展示了无人机明显在进行奖励黑客攻击的图示
- en: 'The plots reveal that:'
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 这些图显示：
- en: '**Distance reward** (orange): Accumulates to ~+70 early, then plateaus (no
    more rewards)'
  id: totrans-187
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**距离奖励**（橙色）：早期累积至约+70，然后达到平台期（不再有奖励）'
- en: '**Velocity alignment** (green): Accumulates to ~+30 early, then plateaus'
  id: totrans-188
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**速度对齐**（绿色）：早期累积至约+30，然后达到平台期'
- en: '**Time penalty** (blue): Steadily accumulates to ~-250 (keeps getting worse)'
  id: totrans-189
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**时间惩罚**（蓝色）：稳步累积至约-250（持续变差）'
- en: '**Vertical position** (brown): Steadily accumulates to ~-200 (penalty for being
    below)'
  id: totrans-190
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**垂直位置**（棕色）：稳步累积至约-200（位于下方的惩罚）'
- en: '**Total reward**: Ends around -400 to -600 (after timeout)'
  id: totrans-191
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**总奖励**：在超时后结束在-400到-600之间'
- en: '**The key insight:** The drone descends from above the platform (collecting
    distance and velocity rewards on the way down), passes through the platform height,
    and then **settles into hovering below** instead of completing the landing. Once
    below, it stops getting positive rewards (notice how the distance and velocity
    lines plateau around step 50-60) but continues accumulating time penalties and
    vertical position penalties. However, this strategy is still viable because attempting
    to land risks an immediate -200 crash penalty, whereas hovering below “only” costs
    ~-400 to -600 over the full episode.'
  id: totrans-192
  prefs: []
  type: TYPE_NORMAL
  zh: '**关键洞察**：无人机从平台上方下降（在下降过程中收集距离和速度奖励），穿过平台高度，然后**在平台下方悬停**而不是完成着陆。一旦在下方，它就不再获得正奖励（注意距离和速度线在步骤50-60左右达到平台期），但继续累积时间惩罚和垂直位置惩罚。然而，这种策略仍然可行，因为尝试着陆会立即面临-200的碰撞惩罚，而悬停在下方“仅”需要-400到-600的整个情节成本。'
- en: '**Why does this happen?**'
  id: totrans-193
  prefs: []
  type: TYPE_NORMAL
  zh: '**为什么会发生这种情况？**'
- en: 'The fundamental issue is that our reward function `r(s'', a)` can only see
    the **current state**, not the trajectory. Think about it: at any single timestep,
    the reward function can’t tell the difference between:'
  id: totrans-194
  prefs: []
  type: TYPE_NORMAL
  zh: 基本问题是我们的奖励函数`r(s', a)`只能看到**当前状态**，而不是轨迹。想想看：在任何单一的时间步长，奖励函数无法区分：
- en: A drone making **progress toward landing** (approaching from above with controlled
    descent)
  id: totrans-195
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一架无人机**向着陆前进**（从上方以可控下降的方式接近）
- en: A drone **exploiting the reward structure** (oscillating to farm rewards)
  id: totrans-196
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一架**利用奖励结构**的无人机（振荡以获取奖励）
- en: Both might have `dy_to_platform > 0` at a given moment, so they receive identical
    rewards! The agent isn’t dumb—it’s just optimizing exactly what you told it to
    optimize.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 它们可能在某个时刻都有`dy_to_platform > 0`，因此它们获得相同的奖励！智能体并不愚蠢——它只是在优化你告诉它优化的东西。
- en: '**So what would actually fix this?**'
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: '**那么真正解决这个问题是什么？**'
- en: 'To truly solve this problem, I personally think that rewards should depend
    on **state transitions**: `r(s, a, s'')` instead of just `r(s, a)`. This would
    let you reward based on (s being the current state, and s’ prime being the next
    state):'
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 要真正解决这个问题，我个人认为奖励应该依赖于**状态转移**：`r(s, a, s')`而不是仅仅`r(s, a)`。这样你就可以根据以下情况给予奖励（s是当前状态，s’
    prime是下一个状态）：
- en: '**Progress**: Only reward if `distance(s'') < distance(s)` (actually getting
    closer!)'
  id: totrans-200
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**进展**：只有当`distance(s'') < distance(s)`（实际上更接近！）时才给予奖励'
- en: '**Vertical improvement**: Only reward if the drone is consistently moving upward
    relative to the platform'
  id: totrans-201
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**垂直提升**：只有当无人机相对于平台持续向上移动时才给予奖励'
- en: '**Trajectory consistency**: Penalize rapid direction changes that indicate
    oscillation'
  id: totrans-202
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**轨迹一致性**：惩罚快速方向变化，这表明振荡'
- en: This is a more principled solution than trying to patch the current reward function
    with increasingly harsh penalties (which is basically what I tried for a while,
    and it didn’t really work). The oscillation exploit exists because we’re fundamentally **missing
    information about the trajectory**.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 这比试图通过不断增加严厉的惩罚来修补当前的奖励函数（这基本上是我尝试了一段时间的方法，但并没有真正奏效）更为根本。振荡利用存在是因为我们从根本上**缺少关于轨迹的信息**。
- en: In the next post, I’ll explore **Actor-Critic methods** and techniques that
    can incorporate temporal information to prevent these exploitation strategies.
    Stay tuned!
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一篇文章中，我将探讨**演员-评论家方法**和可以结合时间信息以防止这些利用策略的技术。敬请期待！
- en: If you find a way to fix this, please reach out to me!
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你找到解决这个问题的方法，请与我联系！
- en: This brings us to the end of this post on “the simplest way to do Deep Reinforcement
    Learning.”
  id: totrans-206
  prefs: []
  type: TYPE_NORMAL
  zh: '这就结束了关于“进行深度强化学习最简单的方法”的这篇文章。 '
