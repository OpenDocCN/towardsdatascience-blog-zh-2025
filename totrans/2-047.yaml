- en: 'Coconut: A Framework for Latent Reasoning in LLMs'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: Coconut：LLM中潜在推理的框架
- en: 原文：[https://towardsdatascience.com/coconut-a-framework-for-latent-reasoning-in-llms/](https://towardsdatascience.com/coconut-a-framework-for-latent-reasoning-in-llms/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/coconut-a-framework-for-latent-reasoning-in-llms/](https://towardsdatascience.com/coconut-a-framework-for-latent-reasoning-in-llms/)
- en: 'Paper link: [https://arxiv.org/abs/2412.06769](https://arxiv.org/abs/2412.06769)'
  id: totrans-2
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 论文链接：[https://arxiv.org/abs/2412.06769](https://arxiv.org/abs/2412.06769)
- en: ''
  id: totrans-3
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Released: 9th of December 2024'
  id: totrans-4
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 发布日期：2024年12月9日
- en: '![](../Images/e1bfe83663362f1b014e3110e079f4e9.png)'
  id: totrans-5
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/e1bfe83663362f1b014e3110e079f4e9.png)'
- en: '**Figure 1.** The two reasoning modes of Coconut. In **Language Mode** (left),
    the model uses output text tokens as inputs for the next reasoning step. In **Latent
    Mode** (right), the model instead feeds its previous hidden state (the output
    of the last hidden layer) back into itself as input. Figure taken from [1]'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: '**图1**. Coconut的两种推理模式。在**语言模式**（左）中，模型使用输出文本标记作为下一个推理步骤的输入。在**潜在模式**（右）中，模型将其先前的隐藏状态（最后隐藏层的输出）作为输入反馈给自己。图来自[1]'
- en: <mdspan datatext="el1755021152317" class="mdspan-comment">Recently, there has
    been</mdspan> a high focus on LLMs with reasoning capabilities, and for a good
    reason. Reasoning enhances the LLMs’ power to tackle complex issues, fosters stronger
    generalization, and introduces an interpretable layer that sheds light on a model’s
    internal thought process.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1755021152317" class="mdspan-comment">最近，对具有推理能力的LLM的关注度很高，这是有充分理由的。推理增强了LLM解决复杂问题的能力，促进了更强的泛化，并引入了一个可解释的层，揭示了模型内部思维过程的光芒。
- en: A Major milestone in LLM reasoning is the introduction of Chain-of-Thought Reasoning
    (CoT)[2], which proved that guiding models to reason step-by-step leads to significant
    improvements on arithmetic and symbolic reasoning tasks.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 在LLM推理中的一个重要里程碑是引入了思维链推理（CoT）[2]，这证明了引导模型逐步推理可以显著提高算术和符号推理任务的表现。
- en: Despite their power, reasoning models still operate primarily within the confines
    of natural language, which can limit their effectiveness. Much of the token space
    is devoted to maintaining linguistic coherence rather than facilitating abstract
    reasoning. Addressing this limitation, an intriguing paper from Meta, **Training
    Large Language Models to Reason in a Continuous Latent Space[1]***,* proposes
    redeeming the chain of thought out of natural language entirely, only translating
    back to language when necessary.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管推理模型具有强大的功能，但它们仍然主要在自然语言的框架内运作，这可能会限制它们的有效性。大部分的标记空间都用于保持语言连贯性，而不是促进抽象推理。为了解决这一限制，Meta发布的一篇引人入胜的论文**《在连续潜在空间中训练大型语言模型进行推理[1]**)*，提出将思维链完全从自然语言中提取出来，仅在必要时才翻译回语言。
- en: 'Their contribution can be summarized in three key points:'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 他们的贡献可以总结为三个关键点：
- en: '**Chain of Continuous Thought (Coconut):** An enhanced reasoning paradigm that
    builds on CoT. Instead of relying on the final text output, Coconut utilizes the
    model’s last embedding layer latent representations.'
  id: totrans-11
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**连续思维链（Coconut）**：一个基于CoT的增强推理范式。它不是依赖于最终的文本输出，而是利用模型的最后一个嵌入层潜在表示。'
- en: 'An exploration of Coconut’s capabilities: indicating how multiple next steps
    in reasoning can be encoded simultaneously in the latent space.'
  id: totrans-12
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 探索Coconut的能力：表明如何在潜在空间中同时编码推理的多个后续步骤。
- en: A deeper analysis of the latent reasoning process itself, so that we can understand
    Coconut’s internal representation of information.
  id: totrans-13
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对潜在推理过程本身的更深入分析，以便我们理解Coconut对信息的内部表示。
- en: '* * *'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Coconut, Simplified
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Coconut，简化版
- en: Before delving into the implementation details of Continuous Chain of Thought,
    it’s important to first establish some foundational grounds.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 在深入探讨连续思维链的实现细节之前，首先建立一些基础概念是很重要的。
- en: 'Given an input of sequence **x = [x(1),x(2),x(3) … ,x(T)]** , a Chain-Of-Thought
    LLM **(M)**, which predicts the next token **x(t+1)** based on the sequence of
    previous tokens **x(≤t)** can be formally described as:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 给定一个输入序列**x = [x(1),x(2),x(3) ... x(T)]**，一个思维链LLM**（M**），它根据先前标记的序列**x(≤t)**预测下一个标记**x(t+1)**，可以形式化地描述为：
- en: $$M_{CoT}(x_{t+1}|x<=t) = softmax(Wx_{t})$$
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: $$M_{CoT}(x_{t+1}|x<=t) = softmax(Wx_{t})$$
- en: Where **W** is the weight matrix of our LLM, and **x(t)** is the input tokens
    at step **t**.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 其中**W**是我们LLM的权重矩阵，**x(t)**是步骤**t**的输入标记。
- en: 'Coconut extends this formulation by removing the dependency on textual input
    tokens and instead using the model’s last hidden state **h(t)** as input. This
    adaptation modifies the LLM’s predictive function into:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: Coconut通过移除对文本输入标记的依赖，并使用模型的最后一个隐藏状态**h(t)**作为输入来扩展这个公式。这种调整将LLM的预测函数修改为：
- en: $$M_{Coconut}(x_{t+1}|x<=t) = softmax(Wh_{t})$$
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: $$M_{Coconut}(x_{t+1}|x<=t) = softmax(Wh_{t})$$
- en: $$H_{t} = Transformer(E_{t})$$
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: $$H_{t} = Transformer(E_{t})$$
- en: Where **E(t) = [e(x1), e(x2), … e(xt)]** represents the sequence of token embeddings,
    with **e(⋅)** denoting the embedding function. **H(t)​** captures the sequence
    of hidden states for all tokens up to position **t**.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 其中**E(t) = [e(x1), e(x2), … e(xt)]**代表标记嵌入的序列，**e(⋅)**表示嵌入函数。**H(t)​**捕捉了所有标记直到位置**t**的隐藏状态序列。
- en: 'This new formulation allows Coconut to operate in two distinct modes: **Language
    Mode** and **Latent Mode**, as illustrated in Figure 1 (left and right, respectively).
    In Language Mode, the model functions like a standard LLM, processing textual
    tokens as input, while in Latent mode, it operates on the internal hidden states
    instead.'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 这种新的公式允许Coconut以两种不同的模式运行：**语言模式**和**潜在模式**，如图1（左和右分别所示）。在语言模式下，模型像一个标准的LLM一样，处理文本标记作为输入，而在潜在模式下，它操作于内部隐藏状态。
- en: 'Mode switching plays a critical role in Coconut’s training process. It not
    only enables the model to learn how to generate meaningful latent representations
    but also facilitates the decoding of these latent thoughts. Mode transitions are
    controlled using two special placeholder tokens: `<bot>` (begin-of-thought) and
    `<eot>` (end-of-thought). Inserting `<bot>` at position *i* and `<eot>` at position
    *j* signals the model to operate in Latent Mode for tokens between positions i<t<j
    (note here that e(xi) =`<bot>`, and e(xj)= `<eot>`).'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 模式切换在Coconut的训练过程中起着关键作用。它不仅使模型能够学习如何生成有意义的潜在表示，还促进了这些潜在思维的解码。模式转换使用两个特殊的占位符标记进行控制：`<bot>`（思维开始）和`<eot>`（思维结束）。在位置*i*插入`<bot>`，在位置*j*插入`<eot>`，信号模型在位置i<t<j之间的标记上以潜在模式运行（注意这里e(xi)
    =`<bot>`，e(xj)= `<eot>`）。
- en: $$E_{t}=[e_{x_{1}},e_{x_{2}},….,e_{x_{i}},h_{i},h_{i+1},..,h_{j-1},e_{x_{j}},e_{x_{j+1}},…,e_{x_{t}}]$$
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: $$E_{t}=[e_{x_{1}},e_{x_{2}},….,e_{x_{i}},h_{i},h_{i+1},..,h_{j-1},e_{x_{j}},e_{x_{j+1}},…,e_{x_{t}}]$$
- en: '![](../Images/bcdc5b6c0793dfc2f85335f544716cfd.png)'
  id: totrans-27
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/bcdc5b6c0793dfc2f85335f544716cfd.png)'
- en: '**Figure 2\.** Training process of Coconut, where at each training stage one
    language reasoning step is removed and replaced with c latent reasoning steps.
    Here, c is equal to 1\. Figure taken from [1].'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: '**图2**. Coconut的训练过程，其中在每个训练阶段，移除一个语言推理步骤，并用c个潜在推理步骤替换。在这里，c等于1。图来自[1]。'
- en: Inspired by [3], Coconut employs a multi-stage training curriculum. At each
    stage k, k language-based reasoning steps are replaced with L latent steps, where
    L=k⋅c, and c is a hyperparameter determining how many latent steps substitute
    a single language reasoning step. This progression is visualized in Figure 2,
    where at stage k=0, the model trains purely on standard CoT examples.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 受[3]的启发，Coconut采用多阶段训练课程。在每个阶段k，用k个基于语言的推理步骤替换L个潜在步骤，其中L=k⋅c，c是一个超参数，决定了多少个潜在步骤可以替代一个语言推理步骤。这种进展在图2中得到了可视化，其中在阶段k=0，模型完全基于标准的CoT例子进行训练。
- en: The author’s decision to apply multi-stage training is to decompose the training
    process into easier objectives, leading to better results. This pattern is already
    suggested and backed up in [3], where they proved that intermediately removing
    tokens enabled deeper internalization of reasoning.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 作者决定采用多阶段训练的决定是将训练过程分解成更易实现的目标，从而获得更好的结果。这种模式在[3]中已经提出并得到证实，他们证明了中间移除标记可以促进推理的更深入内化。
- en: Using latent thought enables end-to-end gradient-based training by replacing
    token-level transitions between reasoning steps with continuous hidden representations,
    as with this change, the network is fully differentiable. Beyond that, it also
    allows the model to encode multiple possible next steps concurrently, refining
    the reasoning path as it advances. A deeper exploration of this mechanism is provided
    in the *Understanding Latent Reasoning* section.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 使用潜在思维可以通过替换推理步骤之间的标记级转换与连续的隐藏表示来实现端到端基于梯度的训练，因为这种变化使得网络完全可微分。除此之外，它还允许模型同时编码多个可能的下一步，随着推理路径的推进进行细化。关于这一机制的更深入探讨可以在*理解潜在推理*部分找到。
- en: To illustrate, let’s examine a simple example drawn from GSM8K[4], one of the
    datasets used to train Coconut.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 为了说明，让我们考察一个来自GSM8K[4]的简单例子，这是用于训练Coconut的数据集之一。
- en: '**Question:**'
  id: totrans-33
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**问题**：'
- en: ''
  id: totrans-34
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: “Betty is saving money for a new wallet, which costs $100\. Betty has only half
    of the money she needs. Her parents decided to give her $15 for that purpose,
    and her grandparents twice as much as her parents. How much more money does Betty
    need to buy the wallet? “
  id: totrans-35
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “贝蒂正在为一个新的钱包存钱，这个钱包需要 100 美元。贝蒂只有她需要的钱的一半。她的父母决定给她 15 美元用于这个目的，而她的祖父母给她的钱是父母的两倍。贝蒂还需要多少钱才能买到这个钱包？”
- en: ''
  id: totrans-36
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Reasoning steps:**'
  id: totrans-37
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**推理步骤**：'
- en: ''
  id: totrans-38
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 1.Betty has only 100 / 2 = $<<100/2=50>>50.
  id: totrans-39
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 1. 贝蒂只有 100 / 2 = $<<100/2=50>>50。
- en: ''
  id: totrans-40
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 2.Betty’s grandparents gave her 15 * 2 = $<<15*2=30>>30.
  id: totrans-41
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 2. 贝蒂的祖父母给了她 15 * 2 = $<<15*2=30>>30 美元。
- en: ''
  id: totrans-42
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 3.This means, Betty needs 100–50–30–15 = $<<100–50–30–15=5>>5 more.
  id: totrans-43
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 3. 这意味着，贝蒂还需要 100–50–30–15 = $<<100–50–30–15=5>>5 美元。
- en: ''
  id: totrans-44
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '4\. Answer: 5'
  id: totrans-45
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 4. 答案：5
- en: 'This question is then incorporated into the training dataset and used across
    three distinct stages:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 这个问题随后被纳入训练数据集，并在三个不同的阶段中使用：
- en: '![](../Images/50223d77178c3aea793790077e8ef9cc.png)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/50223d77178c3aea793790077e8ef9cc.png)'
- en: '**Figure 3\.** An example of the training process of Coconut. Figure by writer
    based on example taken from GSM8k[4].'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: '**图 3**. Coconut 训练过程的示例。图由作者根据 GSM8k[4] 中的示例绘制。'
- en: As shown in Figure 3, at stage 0, no latent thoughts are present, only language-based
    reasoning steps followed by the final answer. In subsequent stages 1 and 2, one
    language reasoning step is progressively replaced by one latent thought (since
    c=1), until stage 3, where all reasoning steps are latent. This procedure is applied
    to each training example in the dataset.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 如图 3 所示，在阶段 0，没有潜在思维，只有基于语言的推理步骤，随后是最终答案。在随后的阶段 1 和 2，一个语言推理步骤逐渐被一个潜在思维（由于 c=1）所取代，直到阶段
    3，所有推理步骤都是潜在的。此过程应用于数据集中的每个训练示例。
- en: '* * *'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Key Findings & Analysis
  id: totrans-51
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关键发现与分析
- en: 'Three datasets were used to evaluate Coconut’s effectiveness. One focused on
    mathematical reasoning (**GSM8K[4])** and two on logical reasoning: **ProntoQA[5]**
    and **ProsQA**. **ProsQA** (Proof with Search Question-Answering) is a modified
    version of ProntoQA, featuring randomly generated directed acyclic graphs (DAGs)
    of reasoning steps, designed to challenge the model with more complex planning
    tasks. All models were fine-tuned using GPT-2 as the base model, with c=1 for
    most datasets, except for GSM8K, where two latent thoughts were used (c=2).'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 三组数据集被用来评估 Coconut 的有效性。其中一组专注于数学推理（**GSM8K[4]**），另外两组则专注于逻辑推理：**ProntoQA[5]**
    和 **ProsQA**。**ProsQA**（带有搜索的证明问答）是 ProntoQA 的一个修改版本，它具有随机生成的推理步骤的有向无环图（DAGs），旨在通过更复杂的规划任务挑战模型。所有模型都使用
    GPT-2 作为基础模型进行微调，对于大多数数据集，c=1，除了 GSM8K，其中使用了两个潜在思维（c=2）。
- en: 'Below is a simplified summary of the results reported in the paper:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是论文中报告的结果的简化总结：
- en: '![](../Images/92bf017ecd5a9e396f2fbff50625a377.png)'
  id: totrans-54
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/92bf017ecd5a9e396f2fbff50625a377.png)'
- en: '**Table 1**. Accuracy results on three datasets. Results taken from [1].'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '**表 1**. 在三个数据集上的准确率结果。结果来自 [1]。'
- en: 'The models used for comparison with the Coconut architecture are:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 用于与 Coconut 架构进行比较的模型是：
- en: '**CoT**: Model trained with Chain-of-Thought reasoning, utilizing full reasoning
    chains during training.'
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**CoT**: 在训练中使用思维链推理的模型，在训练期间利用完整的推理链。'
- en: '**No-CoT**: Model trained without any reasoning chains; standard language modeling
    without intermediate reasoning steps.'
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**无-CoT**: 没有任何推理链的模型进行训练；标准的语言建模，没有中间推理步骤。'
- en: '**Coconut**: The full implementation proposed in this paper.'
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**Coconut**: 本论文中提出的完整实现。'
- en: '**w/o curriculum**: The Coconut model trained without the multi-stage curriculum;
    i.e., no gradual introduction of latent thoughts.'
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**无课程表**: Coconut 模型在无多阶段课程表的情况下进行训练；即没有逐步引入潜在思维。'
- en: '**w/o thought**: Coconut with multi-stage training retained, but without introducing
    latent thoughts. Language reasoning steps are simply removed over stages instead.'
  id: totrans-61
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**无思维**: 保留了多阶段训练的 Coconut，但没有引入潜在思维。语言推理步骤简单地分阶段移除。'
- en: '**Pause as thought [6]**: Model trained without latent thoughts entirely, but
    special <pause> tokens are inserted in place of each removed thought. These tokens
    allow the model additional computation steps before generating an answer. Prior
    studies [7] have reported improved performance using this approach.'
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**暂停思考[6]**：完全无潜在思维训练的模型，但在每个移除的思维位置插入特殊的 <暂停> 标记。这些标记允许模型在生成答案之前进行额外的计算步骤。先前的研究[7]报告了使用这种方法提高了性能。'
- en: A close examination of the previous table reveals three key insights into the
    Coconut training paradigm.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 仔细检查前表揭示了 Coconut 训练范式中的三个关键见解。
- en: '**First,** latent reasoning demonstrates superior performance over Chain-of-Thought
    on logical reasoning tasks, outperforming it on benchmarks such as ProntoQA[5]
    and ProsQA. The substantial accuracy gain observed in ProsQA (97.0% vs 77.5%)
    highlights Coconut’s effectiveness in handling more complex reasoning challenges.
    Unfortunately, the authors didn’t explain the accuracy loss between CoT and Coconut
    (42.9% vs. 34.9%). This could be due to the mathematical nature of GSM8k, which,
    unlike ProsQA, requires less reasoning prowess.'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: '**首先**，潜在推理在逻辑推理任务上表现出比思维链更优越的性能，在基准测试如 ProntoQA[5] 和 ProsQA 上超过了思维链。在 ProsQA
    中观察到的显著准确率提升（97.0% 对 77.5%）突出了 Coconut 在处理更复杂的推理挑战方面的有效性。不幸的是，作者没有解释 CoT 和 Coconut
    之间准确率损失的原因（42.9% 对 34.9%）。这可能是因为 GSM8k 的数学性质，与 ProsQA 不同，它需要较少的推理能力。'
- en: '**Second,** comparing Coconut with its non-multi-stage training counterpart,
    we reach the same findings suggested by [3]: breaking down the training process
    into simpler, more manageable tasks significantly enhances model performance.
    Furthermore, through comparing “w/o curriculum” with “w/o thought” implementation,
    it is clear that the effect of gradual multi-stage training is actually more prominent
    than just replacing language steps with latent thoughts in a single step. This
    is an interesting finding showing how crucial gradual training is to the final
    results.'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: '**其次**，将 Coconut 与其非多阶段训练的对应版本进行比较，我们得到了与 [3] 中提出的相同发现：将训练过程分解成更简单、更易管理的任务可以显著提高模型性能。此外，通过比较“无课程”与“无思维”实现，很明显，逐步多阶段训练的效果实际上比单步替换语言步骤为潜在思维更为突出。这是一个有趣的发现，表明逐步训练对最终结果是多么关键。'
- en: '**Lastly,** even when supplying the model with multi-stage training and enough
    computational capacity with the *pause as thought* model, the LLM still falls
    short compared to the main Coconut implementation. This is more apparent when
    comparing their GSM8K results, reinforcing the hypothesis that incorporating latent
    thoughts still boosts training effectiveness.'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: '**最后**，即使给模型提供多阶段训练和足够的计算能力，以及带有“暂停思考”模型的训练，与主要的 Coconut 实现相比，LLM 仍然有所不足。这一点在比较他们的
    GSM8K 结果时更为明显，这强化了引入潜在思维仍然可以提升训练有效性的假设。'
- en: '* * *'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Understanding Latent Reasoning
  id: totrans-68
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 理解潜在推理
- en: 'One of the advantages of Coconut is that, unlike language-based thoughts, latent
    thoughts have the ability to consider several directions or outputs in their consideration.
    This leads to a different reasoning process than normal chaining, allowing us
    to interpret the reasoning process as a hypothetical tree search. Each depth layer
    is the result of a respective latent step k, and each node is a calculated probability
    of a specific option. This will be covered more in Example #2.'
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 'Coconut 的一个优点是，与基于语言的想法不同，潜在思维有能力在其考虑中考虑几个方向或输出。这导致了一个与正常链式推理不同的推理过程，使我们能够将推理过程解释为假设树搜索。每个深度层是相应潜在步骤
    k 的结果，每个节点是特定选项的计算概率。这将在示例 #2 中进一步介绍。'
- en: Two main examples of this phenomenon are presented in the paper. We will cover
    both of them briefly to illustrate the latent reasoning power of this new thought
    paradigm.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 论文中提出了两个这种现象的主要示例。我们将简要介绍这两个示例，以说明这种新思维范式所具有的潜在推理能力。
- en: '**Example #1:**'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: '**示例 #1：**'
- en: The first example demonstrates how a latent thought can contain multiple possible
    outcomes within its reasoning tree. To explore this, the continuous thought generated
    by the model was decoded using an LLM head, a process done solely for testing
    purposes, allowing us to probe the continuous thought and verify whether these
    latent thoughts were being learned correctly.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个示例演示了潜在思维如何在推理树中包含多个可能的输出。为了探索这一点，使用 LLM 头解码了模型生成的连续思维，这是一个仅用于测试的过程，使我们能够探测连续思维并验证这些潜在思维是否被正确学习。
- en: '**Question**:'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: '**问题**：'
- en: James decides to run 3 sprints 3 times a week. He runs 60 meters each sprint.
    How many meters does he run a week?
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: James 决定每周进行 3 次冲刺，每次冲刺跑 60 米。他每周跑了多少米？
- en: '**Reasoning Steps:**'
  id: totrans-75
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**推理步骤：**'
- en: ''
  id: totrans-76
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 1\. He runs 3*3=9 sprints a week
  id: totrans-77
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 1. 他每周进行 3*3=9 次冲刺
- en: ''
  id: totrans-78
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 2\. So he runs 9*60=540
  id: totrans-79
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 2. 因此他跑了 9*60=540
- en: ''
  id: totrans-80
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Answer: 540'
  id: totrans-81
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 答案：540
- en: ''
  id: totrans-82
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Alternative Solution:**'
  id: totrans-83
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**替代方案：**'
- en: ''
  id: totrans-84
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 1\. He runs 3*60=180 meters a week
  id: totrans-85
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 1. 他每周跑了 3*60=180 米
- en: ''
  id: totrans-86
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 2\. So he runs 3*180=540
  id: totrans-87
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 2. 因此他跑了 3*180=540
- en: 'When we decode the first latent thought generated by the model, we find that
    the top three possible outputs are:'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们解码模型生成的第一个潜在思维时，我们发现前三个可能的输出是：
- en: 1.”180” with a probability of 0.22
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 1. “180” 概率为 0.22
- en: 2.” 180” ( with a space) with prob. of 0.20
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 2. “180” （带空格）概率为 0.20
- en: 3.”90” with prob. of 0.13
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 3. “90” 概率为 0.13
- en: This shows that the model is indeed considering the first step in the two viable
    solutions mentioned above.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 这表明模型确实在考虑上述两种可行解决方案中的第一步。
- en: '**Example #2:**'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: '**示例 #2：**'
- en: The second example gives a clearer illustration of how the tree search is constructed
    as the number of thoughts increases, pruning older branches that are no longer
    relevant to the reasoning process and prioritizing more “sound” nodes.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 第二个示例更清楚地说明了随着思考数量的增加，如何构建树搜索，剪枝不再与推理过程相关的旧分支，并优先考虑更“合理”的节点。
- en: '![](../Images/4a2b9875a04a839c7809bbd5a2690772.png)'
  id: totrans-95
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/4a2b9875a04a839c7809bbd5a2690772.png)'
- en: '**Figure 4.** Latent search tree for example #2\. On the left are the results
    of decoding the first latent reasoning step, and on the right are the results
    of the second latent step. Figure taken from [1].'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: '**图 4.** 示例 #2 的潜在搜索树。左侧是解码第一个潜在推理步骤的结果，右侧是第二个潜在步骤的结果。图来自 [1]。'
- en: '**Question**:'
  id: totrans-97
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**问题**：'
- en: ''
  id: totrans-98
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: “Every grimpus is a yimpus. Every worpus is a jelpus. Every zhorpus is a sterpus.
    Every impus is a hilpus. Every jompus is a …grimpus is a gwompus. Every rempus
    is a gorpus. Alex is a sterpus. Every zhorpus is a rompus. Is Alex a gorpus or
    bompus?”
  id: totrans-99
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: “每个 grimpus 都是一个 yimpus。每个 worpus 都是一个 jelpus。每个 zhorpus 都是一个 sterpus。每个 impus
    都是一个 hilpus。每个 jompus 都是一个 ...grimpus 是一个 gwompus。每个 rempus 都是一个 gorpus。亚历克斯是一个
    sterpus。每个 zhorpus 都是一个 rompus。亚历克斯是 gorpus 还是 bompus？”
- en: ''
  id: totrans-100
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**Reasoning Steps:**'
  id: totrans-101
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**推理步骤：**'
- en: ''
  id: totrans-102
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 1.”Alex is a grimpus.”
  id: totrans-103
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 1. “亚历克斯是一个 grimpus。”
- en: ''
  id: totrans-104
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 2\. “Every grimpus is a rorpus.”
  id: totrans-105
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 2. “每个 grimpus 都是一个 rorpus。”
- en: ''
  id: totrans-106
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 3.”Every rorpus is a bompus.”
  id: totrans-107
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 3. “每个 rorpus 都是一个 bompus。”
- en: ''
  id: totrans-108
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Answer: “Alex is a bompus.”'
  id: totrans-109
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 答案：“亚历克斯是一个笨蛋。”
- en: The probability for each option can be obtained through the multiplication of
    every token’s probability, as depicted in Figure 4\. Here we show the state of
    the search tree after one latent thought (left), and after two (right).
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 每个选项的概率可以通过每个标记的概率相乘获得，如图 4 所示。这里我们展示了经过一次潜在思考后的搜索树状态（左侧），以及经过两次（右侧）。
- en: We can see from the total calculated probabilities that in step one, the least
    probable option (0.01) is sterpus, while the second probable option is grimpus
    (0.32), which is the correct first step of reasoning in this case. When the search
    tree is updated with information from the second thought, the node for sterpus
    is completely disregarded, and the new node with the highest probability is rorpus,
    which is the correct second reasoning step.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以从总计算概率中看到，在第一步中，最不可能的选项（0.01）是 sterpus，而第二个可能的选项是 grimpus（0.32），这是在这种情况下正确的推理第一步。当搜索树更新为来自第二次思考的信息时，sterpus
    的节点被完全忽略，具有最高概率的新节点是 rorpus，这是正确的第二步推理步骤。
- en: This proves that Coconut has the power of including various next steps in its
    reasoning process, prioritizing more important steps as we go (similar to grimpus
    in step one) and disregarding less relevant ones (sterpus in step one). This shows
    that Coconut has the ability to navigate several thoughts in a tree manner, until
    it reaches its final conclusion.
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 这证明了椰子在其推理过程中具有包含各种后续步骤的能力，随着推理的进行，优先考虑更重要的步骤（类似于第一步中的 grimpus），并忽略不那么相关的步骤（第一步中的
    sterpus）。这表明椰子能够以树状方式导航多个思考，直到得出最终结论。
- en: '* * *'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Conclusion
  id: totrans-114
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this post, we have discussed Coconut, a new reasoning paradigm elevating
    LLMs from the necessity of “thinking” in language space, and utilizing the latent
    space instead. We have discussed Coconut’s significant performance compared to
    other reasoning methods, covered the importance of multi-stage training, and given
    examples to prove and understand how the latent reasoning process works under
    the hood.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们讨论了椰子（Coconut），一种新的推理范式，它将 LLM 从语言空间中“思考”的必要性提升到利用潜在空间。我们讨论了椰子与其他推理方法相比的显著性能，涵盖了多阶段训练的重要性，并举例说明了如何理解潜在推理过程的工作原理。
- en: In my opinion, Coconut addresses an interesting research topic, sparking new
    exploration into latent reasoning approaches, paving the way for the creation
    of more sophisticated machine reasoning models that are not bound by language
    syntax.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 在我看来，椰子解决了一个有趣的研究课题，激发了对潜在推理方法的新探索，为创建不受语言语法限制的更复杂的机器推理模型铺平了道路。
- en: '* * *'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
