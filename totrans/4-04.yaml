- en: The Cultural Backlash Against Generative AI
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 生成式AI的文化抵制
- en: 原文：[https://towardsdatascience.com/the-cultural-backlash-against-generative-ai-30372d3b9080/](https://towardsdatascience.com/the-cultural-backlash-against-generative-ai-30372d3b9080/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/the-cultural-backlash-against-generative-ai-30372d3b9080/](https://towardsdatascience.com/the-cultural-backlash-against-generative-ai-30372d3b9080/)
- en: '![Photo by Joshua Hoehne on Unsplash](../Images/8160559e2e88f6e090a2ddac950c8180.png)'
  id: totrans-2
  prefs: []
  type: TYPE_IMG
  zh: '![由Joshua Hoehne在Unsplash上的照片](../Images/8160559e2e88f6e090a2ddac950c8180.png)'
- en: Photo by [Joshua Hoehne](https://unsplash.com/@joshua_hoehne?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 由[Joshua Hoehne](https://unsplash.com/@joshua_hoehne?utm_source=medium&utm_medium=referral)在[Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)上的照片
- en: The recent reveal of DeepSeek-R1, the large scale LLM developed by a Chinese
    company (also named DeepSeek), has been a very interesting event for those of
    us who spend time observing and analyzing the cultural and social phenomena around
    AI. [Evidence suggests that R1 was trained for a fraction of the price that it
    cost to train ChatGPT](https://www.bbc.com/news/articles/c5yv5976z9po) (any of
    their recent models, really), and there are a few reasons that might be true.
    But that’s not really what I want to talk about here – tons of [thoughtful](https://www.wheresyoured.at/deep-impact/)
    [writers](https://www.wired.com/story/deepseek-china-model-ai/) [have](https://arstechnica.com/ai/2025/01/how-does-deepseek-r1-really-fare-against-openais-best-reasoning-models/)
    [commented](https://www.theguardian.com/commentisfree/2025/jan/28/deepseek-r1-ai-world-chinese-chatbot-tech-world-western)
    on what DeepSeek-R1 is, and what really happened in the training process.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 最近，中国一家公司（也名为DeepSeek）开发的深度学习模型DeepSeek-R1的公布，对我们这些花费时间观察和分析AI周围文化和社会现象的人来说，是一个非常有趣的事件。[证据表明，R1的训练成本仅为训练ChatGPT（实际上是其任何最近模型）的一小部分](https://www.bbc.com/news/articles/c5yv5976z9po)，并且有几个原因可能是真实的。但这并不是我想在这里讨论的真正问题——许多[深思熟虑的](https://www.wheresyoured.at/deep-impact/)
    [作家](https://www.wired.com/story/deepseek-china-model-ai/) [已经](https://arstechnica.com/ai/2025/01/how-does-deepseek-r1-really-fare-against-openais-best-reasoning-models/)
    [评论](https://www.theguardian.com/commentisfree/2025/jan/28/deepseek-r1-ai-world-chinese-chatbot-tech-world-western)了DeepSeek-R1是什么，以及训练过程中真正发生了什么。
- en: What I’m more interested in at the moment is how this news shifted some of the
    momentum in the AI space. [Nvidia and other related stocks dropped precipitously
    when the news of DeepSeek-R1 came out](https://www.cnbc.com/2025/01/27/nvidia-sheds-almost-600-billion-in-market-cap-biggest-drop-ever.html),
    largely (it seems) because it didn’t require the newest GPUs to train, and by
    training more efficiently, it required less power than an OpenAI model. I had
    already been thinking about the cultural backlash that Big Generative AI was facing,
    and something like this opens up even more space for people to be critical of
    the practices and promises of generative AI companies.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 我目前更感兴趣的是这条新闻如何改变了AI领域的一些动力。当DeepSeek-R1的新闻发布时，[英伟达和其他相关股票大幅下跌](https://www.cnbc.com/2025/01/27/nvidia-sheds-almost-600-billion-in-market-cap-biggest-drop-ever.html)，这似乎主要是因为它不需要最新的GPU进行训练，并且通过更有效的训练，所需的电力比OpenAI模型要少。我已经在思考大型生成式AI面临的文化抵制，而类似的事情为人们批判生成式AI公司的实践和承诺开辟了更多的空间。
- en: Where are we in terms of the critical voices against generative AI as a business
    or as a technology? Where is that coming from, and why might it be occurring?
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在批判生成式AI作为商业或技术方面，我们目前处于什么位置？这种批判从何而来，为什么可能发生？
- en: Schools of Thought
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 思想流派
- en: The two often overlapping angles of criticism that I think are most interesting
    are first, the social or community good perspective, and second, the practical
    perspective. From a social good perspective, critiques of generative AI as a business
    and an industry are myriad, and [I’ve talked a lot about them in my writing here](https://medium.com/towards-data-science/environmental-implications-of-the-ai-boom-279300a24184).
    Making generative AI into something ubiquitous comes at extraordinary costs, from
    the environmental to the economic and beyond.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 我认为最有趣的两个经常重叠的批评角度是首先，社会或社区利益视角，其次，实用视角。从社会利益的角度来看，对生成式AI作为商业和行业的批判多种多样，[我在这里的写作中已经谈了很多关于它们的内容](https://medium.com/towards-data-science/environmental-implications-of-the-ai-boom-279300a24184)。将生成式AI变成一种无处不在的东西，代价是巨大的，从环境到经济，以及更多。
- en: As a practical matter, it might be simplest to boil it down to "this technology
    doesn’t work the way we were promised". Generative AI lies to us, or "hallucinates",
    and it performs poorly on many of the kinds of tasks that we have most need for
    technological help on. We are led to believe we can trust this technology, but
    it fails to meet expectations, while simultaneously being used for such misery-inducing
    and criminal things as synthetic CSAM and deepfakes to undermine democracy.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 实际上，可能最简单的方法就是将其归结为“这项技术并没有按照我们承诺的方式工作”。生成式AI对我们撒谎，或者说“产生幻觉”，并且在许多我们需要技术帮助的任务上表现不佳。我们被引导相信可以信任这项技术，但它未能达到期望，同时被用于合成CSAM和深度伪造等令人痛苦和犯罪的事情，以破坏民主。
- en: 'So when we look at these together, you can develop a pretty strong argument:
    this technology is not living up to the overhyped expectations, and in exchange
    for this underwhelming performance, we’re giving up electricity, water, climate,
    money, culture, and jobs. Not a worthwhile trade, in many people’s eyes, to put
    it mildly!'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 所以当我们一起看这些时，你可以发展出一个相当有力的论点：这项技术并没有达到过度炒作的期望，为了这种令人失望的表现，我们放弃了电力、水、气候、金钱、文化和工作。这并不是许多人眼中值得的交易，至少可以说是不值得的！
- en: I do like to bring a little nuance to the space, because I think when we accept
    the limitations on what generative AI can do, and the harm it can cause, and don’t
    play the overhype game, we can find a passable middle ground. I don’t think we
    should be paying the steep price for training and for inference of these models
    unless the results are really, REALLY worth it. Developing new molecules for medical
    research? Maybe, yes. Helping kids cheat (poorly) on homework? No thanks. I’m
    not even sure it’s worth the externality cost to help me write code a little bit
    more efficiently at work, unless I’m doing something really valuable. We need
    to be honest and realistic about the true price of both creating and using this
    technology.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 我确实喜欢在这个领域带来一点细微差别，因为我认为当我们接受生成式AI能做什么以及它可能造成的伤害的限制，并且不玩过度炒作的游戏时，我们可以找到一个可接受的折中点。我认为，除非结果真的非常、非常值得，否则我们不应该为这些模型的训练和推理支付高昂的价格。为医学研究开发新分子？也许，是的。帮助孩子们（拙劣地）作弊作业？不，谢谢。我甚至不确定帮助我在工作中更高效地编写代码是否值得，除非我正在做真正有价值的事情。我们需要对创造和使用这项技术的真实成本保持诚实和现实。
- en: How we got here
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我们是如何走到这一步的
- en: So, with that said, I’d like to dive in and look at how this situation came
    to be. I wrote way back in September 2023 that machine learning had a public perception
    problem, and in the case of generative AI, I think that has been proven out by
    events. Specifically, if people don’t have realistic expectations and understanding
    of what LLMs are good for and what they’re not good for, they’re going to bounce
    off, and backlash will ensue.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，话虽如此，我想深入探讨一下这种情况是如何形成的。我在2023年9月就写过，机器学习有一个公共认知问题，在生成式AI的情况下，我认为这一点已经被事件证明。具体来说，如果人们对LLMs擅长什么以及不擅长什么没有现实期望和理解，他们就会反弹，随之而来的是反冲。
- en: '*"My argument goes something like this:*'
  id: totrans-14
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*"我的论点大致如下：*'
- en: ''
  id: totrans-15
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*1\. People are not naturally prepared to understand and interact with machine
    learning.*'
  id: totrans-16
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*1. 人们并不天生准备好理解和与机器学习互动。*'
- en: ''
  id: totrans-17
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*2\. Without understanding these tools, some people may avoid or distrust them.*'
  id: totrans-18
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*2. 如果不了解这些工具，一些人可能会避免或怀疑它们。*'
- en: ''
  id: totrans-19
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*3\. Worse, some individuals may misuse these tools due to misinformation,
    resulting in detrimental outcomes.*'
  id: totrans-20
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*3. 更糟糕的是，一些人可能由于错误信息而误用这些工具，导致不良后果。*'
- en: ''
  id: totrans-21
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*4\. After experiencing the negative consequences of misuse, people might become
    reluctant to adopt future machine learning tools that could enhance their lives
    and communities."*'
  id: totrans-22
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*4. 经历了误用的负面后果后，人们可能会不愿意采用未来可能增强他们生活和社区生活的机器学习工具。“*'
- en: ''
  id: totrans-23
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: me, in [Machine Learning’s Public Perception Problem, Sept 2023](https://medium.com/towards-data-science/machine-learnings-public-perception-problem-48daf587e7a8)
  id: totrans-24
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[《机器学习的公共认知问题，2023年9月》](https://medium.com/towards-data-science/machine-learnings-public-perception-problem-48daf587e7a8)'
- en: So what happened? Well, the generative AI industry dove head first into the
    problem and we’re seeing the repercussions.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，发生了什么事？好吧，生成式AI行业一头扎进了这个问题，我们现在看到了后果。
- en: Generative AI applications don’t meet people’s needs
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 生成式AI应用未能满足人们的需求
- en: Part of the problem is that [generative AI really can’t effectively do everything
    the hype claims](https://hbr.org/2023/06/the-ai-hype-cycle-is-distracting-companies).
    An LLM can’t be reliably used to answer questions, because it’s not a "facts machine".
    It’s a "probable next word in a sentence machine". But we’re seeing promises of
    all kinds that ignore these limitations, and tech companies are forcing generative
    AI features into every kind of software you can think of. People hated Microsoft’s
    Clippy because it wasn’t any good and they didn’t want to have it shoved down
    their throats – and one might say [they’re doing the same basic thing with an
    improved version, and we can see that some people still understandably resent
    it](https://www.theverge.com/2025/1/16/24345051/microsoft-365-personal-family-copilot-office-ai-price-rises).
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 问题的一部分在于[生成式AI实际上并不能有效地做到炒作中所声称的每一件事](https://hbr.org/2023/06/the-ai-hype-cycle-is-distracting-companies)。一个LLM不能可靠地用来回答问题，因为它不是一个“事实机器”。它是一个“句子中可能的下一个词机器”。但我们看到的各种承诺都忽略了这些限制，科技公司正在将生成式AI功能强加到你能想到的每一种软件中。人们讨厌微软的Clippy，因为它不好用，他们不希望有人把这种东西强加给他们——有人可能会说[他们正在用改进版做同样的事情，我们可以看到有些人仍然可以理解地对此表示反感](https://www.theverge.com/2025/1/16/24345051/microsoft-365-personal-family-copilot-office-ai-price-rises)。
- en: When someone goes to an LLM today and asks for the price of ingredients in a
    recipe at their local grocery store right now, there’s absolutely no chance that
    model can answer that correctly, reliably. That is not within its capabilities,
    because the true data about those prices is not available to the model. The model
    might accidentally guess that a bag of carrots is $1.99 at Publix, but it’s just
    that, an accident. In the future, with chaining models together in agentic forms,
    there’s a chance we could develop a narrow model to do this kind of thing correctly,
    but right now it’s absolutely bogus.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 当有人今天去LLM询问他们当地杂货店现在食谱中食材的价格时，模型绝对没有机会正确、可靠地回答这个问题。这不在它的能力范围内，因为关于这些价格的真实数据对模型是不可用的。模型可能会意外地猜测在Publix超市一袋胡萝卜的价格是1.99美元，但这只是个意外。在未来，通过以代理形式将模型链在一起，我们有可能开发出能够正确完成这类任务的窄模型，但到目前为止，这绝对是胡说八道。
- en: But people are asking LLMs these questions today! And when they get to the store,
    they’re very disappointed about being lied to by a technology that they thought
    was a magic answer box. If you’re OpenAI or Anthropic, you might shrug, because
    if that person was paying you a monthly fee, well, you already got the cash. And
    if they weren’t, well, you got the user number to tick up one more, and that’s
    growth.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 但如今人们却在向LLMs提出这些问题！当他们到达商店时，他们对被这种他们认为能提供神奇答案的技术欺骗感到非常失望。如果你是OpenAI或Anthropic，你可能会耸耸肩，因为如果那个人在向你支付月费，那么，你已经得到了现金。如果他们没有，那么，你得到了用户数量增加一个，这就是增长。
- en: However, this is actually a major business problem. When your product fails
    like this, in an obvious, predictable (inevitable!) way, you’re beginning to singe
    the bridge between that user and your product. It may not burn it all at once,
    but it’s gradually tearing down the relationship the user has with your product,
    and you only get so many chances before someone gives up and goes from a user
    to a critic. In the case of generative AI, it seems to me like you don’t get many
    chances at all. Plus, failure in one mode can make people mistrust the entire
    technology in all its forms. Is that user going to trust or believe you in a few
    years when you’ve hooked up the LLM backend to realtime price APIs and can in
    fact correctly return grocery store prices? I doubt it. That user might not even
    let your model help revise emails to coworkers after it failed them on some other
    task.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，这实际上是一个重大的商业问题。当你的产品以这种明显、可预测（不可避免！）的方式失败时，你开始烧毁用户与你的产品之间的桥梁。它可能不会一次性烧毁，但它正在逐渐破坏用户与你的产品之间的关系，在你失去用户之前，你只有这么多的机会。在生成式AI的情况下，在我看来，你几乎没有任何机会。此外，一种模式的失败可能会使人们对所有形式的技术都产生怀疑。几年后，当你的LLM后端连接到实时价格API并实际上可以正确返回杂货店的价格时，那个用户会信任或相信你吗？我不这么认为。那个用户甚至可能不会让你在它未能完成其他任务后帮助修改与同事的电子邮件。
- en: From what I can see, tech companies think they can just wear people down, forcing
    them to accept that generative AI is an inescapable part of all their software
    now, whether it works or not. Maybe they can, but I think this is a self defeating
    strategy. Users may trudge along and accept the state of affairs, but they won’t
    feel positive towards the tech or towards your brand as a result. Begrudging acceptance
    is not the kind of energy you want your brand to inspire among users!
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 从我所见到的来看，科技公司认为他们可以仅仅通过消耗人们的耐心，迫使他们接受生成式AI现在是他们所有软件中不可避免的一部分，无论它是否有效。也许他们可以，但我认为这是一种自毁长城的策略。用户可能会勉强接受现状，但因此他们不会对技术或你的品牌持积极态度。勉强的接受并不是你希望你的品牌在用户中激发的能量！
- en: What Silicon Valley has to do with it
  id: totrans-32
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 硅谷与此有何关系
- en: You might think, well, that’s clear enough -let’s back off on the generative
    AI features in software, and just apply it to tasks where it can wow the user
    and works well. They’ll have a good experience, and then as the technology gets
    better, we’ll add more where it makes sense. And this would be somewhat reasonable
    thinking (although, as I mentioned before, the externality costs will be extremely
    high to our world and our communities).
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能会想，嗯，这已经很明确了——让我们减少软件中的生成式AI功能，只将其应用于可以给用户带来震撼且效果良好的任务。他们会有良好的体验，然后随着技术的进步，我们将在合理的地方添加更多功能。这将会是一种相对合理的思考（尽管，如我之前提到的，对我们世界和社区的外部成本将会非常高）。
- en: However, I don’t think the big generative AI players can really do that, and
    here’s why. Tech leaders have spent a truly exorbitant amount of money on creating
    and trying to improve this technology – [from investing in companies that develop
    it](https://www.reuters.com/technology/artificial-intelligence/openai-talks-investment-round-valuing-it-up-340-billion-wsj-reports-2025-01-30/),
    to [building power plants and data centers](https://www.cnn.com/2025/01/21/tech/openai-oracle-softbank-trump-ai-investment/index.html),
    to lobbying to avoid copyright laws, there are hundreds of billions of dollars
    sunk into this space already with more soon to come.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我认为大型生成式AI玩家真的做不到这一点，原因如下。科技领导者们已经投入了巨额资金来创造和尝试改进这项技术——从投资开发它的公司[《路透社》：OpenAI融资轮估值达3400亿美元，WSJ报道2025年1月30日](https://www.reuters.com/technology/artificial-intelligence/openai-talks-investment-round-valuing-it-up-340-billion-wsj-reports-2025-01-30/)，到[建设发电厂和数据中心](https://www.cnn.com/2025/01/21/tech/openai-oracle-softbank-trump-ai-investment/index.html)，再到游说以规避版权法，已经有数百亿美元的资金投入到这个领域，而且还有更多的资金即将到来。
- en: In the tech industry, profit expectations are quite different from what you
    might encounter in other sectors – [a VC funded software startup has to make back
    10–100x what’s invested (depending on stage) to look like a really standout success](https://kruzeconsulting.com/blog/what-vcs-return-expectations/).
    So investors in tech push companies, explicitly or implicitly, to take bigger
    swings and bigger risks in order to make higher returns plausible. [This starts
    to develop into what we call a "bubble" – valuations become out of alignment with
    the real economic possibilities, escalating higher and higher with no hope of
    ever becoming reality.](https://www.washingtonpost.com/technology/2024/07/24/ai-bubble-big-tech-stocks-goldman-sachs/)
    [As Gerrit De Vynck in the Washington Post noted](https://www.washingtonpost.com/technology/2024/07/24/ai-bubble-big-tech-stocks-goldman-sachs/),
    "… Wall Street analysts are expecting Big Tech companies to spend around $60 billion
    a year on developing AI models by 2026, but reap only around $20 billion a year
    in revenue from AI by that point… Venture capitalists have also poured billions
    more into thousands of AI start-ups. The AI boom has helped contribute to the
    $55.6 billion that venture investors put into U.S. start-ups in the second quarter
    of 2024, the highest amount in a single quarter in two years, according to venture
    capital data firm PitchBook."
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 在科技行业，盈利预期与其他行业相比有很大不同——[一家风险投资支持的软件初创公司必须收回10-100倍的投资（取决于阶段）才能被视为真正的成功](https://kruzeconsulting.com/blog/what-vcs-return-expectations/)。因此，科技行业的投资者会明确或隐性地推动公司采取更大的赌注和更大的风险，以使更高的回报变得可行。[这开始发展成我们所说的“泡沫”——估值与实际经济可能性脱节，越来越高，没有任何希望成为现实。](https://www.washingtonpost.com/technology/2024/07/24/ai-bubble-big-tech-stocks-goldman-sachs/)
    [正如华盛顿邮报的Gerrit De Vynck指出](https://www.washingtonpost.com/technology/2024/07/24/ai-bubble-big-tech-stocks-goldman-sachs/)，“……华尔街分析师预计，到2026年，大型科技公司每年将在开发AI模型上投入约600亿美元，但到那时仅从AI中获得约200亿美元的年收入……风险投资家还向数千家AI初创公司投入了数十亿美元。AI的繁荣有助于推动风险投资公司在美国初创公司上的投资达到556亿美元，这是两年内单季度的最高金额，据风险投资数据公司PitchBook的数据显示。”
- en: '[So, given the billions invested, there are serious arguments to be made that
    the amount invested in developing generative AI to date is impossible to match
    with returns.](https://www.wheresyoured.at/oai-business/) There just isn’t that
    much money to be made here, by this technology, certainly not in comparison to
    the amount that’s been invested. But, companies are certainly going to try. I
    believe that’s part of the reason why we’re seeing generative AI inserted into
    all manner of use cases where it might not actually be particularly helpful, effective,
    or welcomed. In a way, "we’ve spent all this money on this technology, so we have
    to find a way sell it" is kind of the framework. Keep in mind, too, that the investments
    are continuing to be sunk in to try and make the tech work better, but any LLM
    advancement these days is proving very slow and incremental.'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: '[因此，考虑到投入的数十亿美元，有严重的论点可以提出，迄今为止投入开发生成式AI的金额是无法与回报相匹配的。](https://www.wheresyoured.at/oai-business/)
    在这里通过这项技术赚取的金钱并不多，当然与已经投入的金额相比更是微不足道。但是，公司肯定会尝试。我认为这就是为什么我们看到生成式AI被应用到各种可能并不特别有帮助、有效或受欢迎的使用场景中的部分原因。从某种意义上说，“我们在这项技术上投入了这么多钱，所以我们必须找到一种方法来销售它”似乎是一种框架。同时，也要记住，投资仍在继续，试图让这项技术工作得更好，但任何LLM的进步在当今都证明是非常缓慢和渐进的。'
- en: Where to now?
  id: totrans-37
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 接下来该怎么做？
- en: Generative AI tools are not proving essential to people’s lives, so the economic
    calculus is not working to make a product available and convince folks to buy
    it. So, we’re seeing companies move to the "feature" model of generative AI, which
    [I theorized could happen in my article from August 2024](https://medium.com/towards-data-science/economics-of-generative-ai-75f550288097).
    However, the approach is taking a very heavy hand, as with Microsoft adding generative
    AI to Office365 and making the features and the accompanying price increase both
    mandatory. I admit I hadn’t made the connection between the public image problem
    and the feature vs product model problem until recently – but now we can see that
    they are intertwined. Giving people a feature that has the functionality problems
    we’re seeing, and then upcharging them for it, is still a real problem for companies.
    Maybe when something just doesn’t work for a task, it’s neither a product nor
    a feature? If that turns out to be the case, then investors in generative AI will
    have a real problem on their hands, so companies are committing to generative
    AI features, whether they work well or not.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式AI工具并没有证明对人们的生活是必需的，因此经济计算并没有促使产品上市并说服人们购买它。因此，我们看到公司正在转向生成式AI的“功能”模式，正如我在2024年8月发表的文章中[理论化可能会发生的情况](https://medium.com/towards-data-science/economics-of-generative-ai-75f550288097)。然而，这种方法采取了非常强硬的手段，就像微软将生成式AI添加到Office365中，并使功能和相应的价格增加都成为强制性的。我承认我直到最近才意识到公共形象问题与功能与产品模式问题之间的联系——但现在我们可以看到它们是相互交织的。提供人们具有功能问题的功能，然后对其收费，这对公司来说仍然是一个真正的问题。也许当某件事根本不适合一项任务时，它既不是产品也不是功能？如果这种情况成立，那么生成式AI的投资者将面临真正的问题，因此公司承诺提供生成式AI功能，无论它们是否有效。
- en: I’m going to be watching with great interest to see how things progress in this
    space. I do not expect any great leaps in generative AI functionality, although
    depending on how things turn out with DeepSeek, we may see some leaps in efficiency,
    at least in training. If companies listen to their users’ complaints and pivot,
    to target generative AI at the applications it’s actually useful for, they may
    have a better chance of weathering the backlash, for better or for worse. However,
    that to me seems highly, highly unlikely to be compatible with the desperate profit
    incentive they’re facing. Along the way, we’ll end up wasting tremendous resources
    on foolish uses of generative AI, instead of focusing our efforts on advancing
    the applications of the technology that are really worth the trade.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 我将非常关注这个领域的发展。我不期望生成式AI功能有大的飞跃，尽管根据DeepSeek的结果，我们可能会看到一些效率上的飞跃，至少是在训练方面。如果公司倾听用户的投诉并转型，将生成式AI应用于它真正有用的应用，他们可能更有机会应对反击，无论好坏。然而，对我来说，这似乎与公司面临的绝望的利润动机高度不兼容。在这个过程中，我们将浪费大量资源在生成式AI的愚蠢用途上，而不是将我们的努力集中在真正值得交易的技术应用上。
