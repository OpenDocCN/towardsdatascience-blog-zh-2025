- en: Designing, Building & Deploying an AI Chat App from Scratch (Part 2)
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/designing-building-deploying-an-ai-chat-app-from-scratch-part-2-c75f712eebe5/](https://towardsdatascience.com/designing-building-deploying-an-ai-chat-app-from-scratch-part-2-c75f712eebe5/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![Photo by Alex wong on Unsplash](../Images/b083d7f918d12fb35c5938c4332855e0.png)'
  prefs: []
  type: TYPE_IMG
- en: Photo by [Alex wong](https://unsplash.com/@killerfvith?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Introduction
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In the [previous post](https://towardsdatascience.com/designing-building-deploying-an-ai-chat-app-from-scratch-part-1-f1ebf5232d4d),
    we built an AI-powered chat application on our local computer using microservices.
    Our stack included FastAPI, Docker, Postgres, Nginx and llama.cpp. The goal of
    this post is to learn more about the fundamentals of cloud deployment and scaling
    by deploying our app to Azure, making it available to real users. We’ll use Azure
    because they offer a [free education account](https://azure.microsoft.com/en-us/free/students),
    but the process is similar for other platforms like AWS and GCP.
  prefs: []
  type: TYPE_NORMAL
- en: You can check a live demo of the app at [chat.jorisbaan.nl](http://chat.jorisbaan.nl/).
    Now, obviously, this demo isn’t very large-scale, because the costs ramp up very
    quickly. With the tight scaling limits I configured I reckon it can handle about
    10–40 concurrent users until I run out of Azure credits. However, I do hope it
    demonstrates the principles behind a scalable production system. We could easily
    configure it to scale to many more users with a higher budget.
  prefs: []
  type: TYPE_NORMAL
- en: I give a complete breakdown of our infrastructure and the costs at the end.
    The codebase is at [https://github.com/jsbaan/ai-app-from-scratch](https://github.com/jsbaan/ai-app-from-scratch).
  prefs: []
  type: TYPE_NORMAL
- en: '![A quick demo of the app at chat.jorisbaan.nl. We start a new chat, come back
    to that same chat, and start another chat.](../Images/114434b7f4457b1b57c9d8baf16a75dc.png)'
  prefs: []
  type: TYPE_IMG
- en: A quick demo of the app at [chat.jorisbaan.nl](http://chat.jorisbaan.nl). We
    start a new chat, come back to that same chat, and start another chat.
  prefs: []
  type: TYPE_NORMAL
- en: '1.1\. Recap: local application'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Let’s recap how we [built our local app](https://towardsdatascience.com/designing-building-deploying-an-ai-chat-app-from-scratch-part-1-f1ebf5232d4d):
    A user can start or continue a chat with a language model by sending an HTTP request
    to [http://localhost](http://localhost). An Nginx reverse proxy receives and forwards
    the request to a UI over a private Docker network. The UI stores a session cookie
    to identify the user, and sends requests to the backend: the language model API
    that generates text, and the database API that queries the database server.'
  prefs: []
  type: TYPE_NORMAL
- en: '![Local architecture of the app. See part 1 for more details. Made by author
    in draw.io.](../Images/6a327310808396833592bff41f3535cd.png)'
  prefs: []
  type: TYPE_IMG
- en: Local architecture of the app. See [part 1](https://towardsdatascience.com/designing-building-deploying-an-ai-chat-app-from-scratch-part-1-f1ebf5232d4d)
    for more details. Made by author in draw.io.
  prefs: []
  type: TYPE_NORMAL
