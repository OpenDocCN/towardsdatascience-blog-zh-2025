- en: 2\. Cloud architecture
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Conceptually, our cloud architecture will not be too different from our local
    application: a bunch of containers in a private network with a gateway to the
    outside world, our users.'
  prefs: []
  type: TYPE_NORMAL
- en: However, instead of running containers on our local computer with Docker Compose,
    we will deploy them to a computing environment that automatically scales across
    virtual or psychical machines to many concurrent users.
  prefs: []
  type: TYPE_NORMAL
- en: 2.1 Scaling
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Scaling is a central concept in cloud architectures. It means being able to
    dynamically handle varying numbers of users (i.e., HTTP requests). Uvicorn, the
    web server running our UI and database API, can already handle about 40 concurrent
    requests. It’s even possible to use another web server called Gunicorn as a process
    manager that employs multiple Uvicorn workers in the same container, further increasing
    concurrency.
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, if we want to support even more concurrent request, we could give each
    container more resources, like CPUs or memory (**vertical scaling**). However,
    a more reliable approach is to dynamically create copies (**replicas**) of a container
    based on the number of incoming HTTP requests or memory/CPU usage, and distribute
    the incoming traffic across replicas (**horizontal scaling**). Each replica container
    will be assigned an IP address, so we also need to think about networking: how
    to centrally receive all requests and distribute them over the container replicas.'
  prefs: []
  type: TYPE_NORMAL
- en: 'This "prism" pattern is important: requests arrive centrally in some server
    (a **load balancer**) and fan out for parallel processing to multiple other servers
    (e.g., several identical UI containers)**.**'
  prefs: []
  type: TYPE_NORMAL
- en: '![Photo of two prisms by Fernando @cferdophotography on Unsplash](../Images/a66033528810a28da352a7a5504ead6f.png)'
  prefs: []
  type: TYPE_IMG
- en: Photo of two prisms by [Fernando @cferdophotography](https://unsplash.com/@cferdo?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  prefs: []
  type: TYPE_NORMAL
- en: 2.2 Kubernetes Concepts
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '[Kubernetes](https://kubernetes.io/) is the industry standard system for automating
    deployment, scaling and management of containerized applications. Its core concepts
    are crucial to understand modern cloud architectures, including ours, so let’s
    quickly review the basics.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Node**: A physical or virtual machine to run containerized app or manage
    the cluster.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Cluster**: A set of Nodes managed by Kubernetes.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Pod**: The smallest deployable unit in Kubernetes. Runs one main app container
    with optional secondary containers that share storage and networking.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Deployment**: An abstraction that manages the desired state of a set of Pod
    replicas by deploying, scaling and updating them.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Service**: An abstraction that manages a stable entrypoint (the service’s
    DNS name) to expose a set of Pods by distributing incoming traffic over the various
    dynamic Pod IP addresses. A Service has multiple types:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A **ClusterIP** Service exposes Pods within the Cluster
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A **LoadBalancer** Service exposes Pods to outside the Cluster. It triggers
    the cloud provider to provision an external public IP and load balancer outside
    the cluster that can be used to reach the cluster. These external requests are
    then routed via the Service to individual Pods.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Ingress**: An abstraction that defines more complex rules for a cluster’s
    entrypoint. It can route traffic to multiple Services; give Services externally-reachable
    URLs; load balance traffic; and handle secure HTTPS.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Ingress Controller**: Implements the Ingress rules. For example, an Nginx-based
    controller runs an Nginx server ([like in our local app](https://github.com/jsbaan/ai-app-from-scratch/blob/main/compose.yaml#L60))
    under the hood that is dynamically configured to route traffic according to Ingress
    rules. To expose the Ingress Controller itself to the outside world, you can use
    a LoadBalancer Service. This architecture is often used.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 2.3 Azure Container Apps
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Armed with these concepts, instead of deploying our app with Kubernetes directly,
    I wanted to experiment a little by using Azure Container Apps (ACA). This is a
    serverless platform built on top of Kubernetes that abstracts away some of its
    complexity.
  prefs: []
  type: TYPE_NORMAL
- en: With a single command, we can create a Container App Environment, which, under
    the hood, is an invisible Kubernetes Cluster managed by Azure. Within this Environment,
    we can run a container as a Container App that Azure internally manages as Kubernetes
    Deployments, Services, and Pods. See [article 1](https://techcommunity.microsoft.com/blog/startupsatmicrosoftblog/aca-vs-aks-which-azure-service-is-better-for-running-containers/3815164)
    and [article 2](https://techcommunity.microsoft.com/blog/fasttrackforazureblog/azure-container-apps-networking-a-condensed-view-of-concepts/3634304)
    for detailed comparisons.
  prefs: []
  type: TYPE_NORMAL
- en: 'A Container App Environment also auto-creates:'
  prefs: []
  type: TYPE_NORMAL
- en: An invisible **[Envoy Ingress Controller](https://learn.microsoft.com/en-us/azure/container-apps/networking?tabs=workload-profiles-env%2Cazure-cli#http-edge-proxy-behavior)**
    that routes requests to internal Apps and handles HTTPS and App auto-scaling based
    on request volume.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: An external **Public IP address** and **Azure Load Balancer** that routes external
    traffic to the Ingress Controller that in turn routes it to Apps (sounds similar
    to a Kubernetes LoadBalancer Service, eh?).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: An Azure-generated URL for each Container App that is publicly accessible over
    the internet or internal, based on its Ingress config.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: This gives us everything we need to run our containers at scale. The only thing
    missing is a database. We will use an Azure-managed PostgreSQL server instead
    of deploying our own container, because it’s easier, more reliable and scalable.
    Our local Nginx reverse proxy container is also obsolete because ACA automatically
    deploys an Envoy Ingress Controller.
  prefs: []
  type: TYPE_NORMAL
- en: It’s interesting to note that we literally don’t have to change a single line
    of [code](https://github.com/jsbaan/ai-app-from-scratch/tree/main) in our local
    application, we can just treat it as a bunch of containers!
  prefs: []
  type: TYPE_NORMAL
- en: '2.4 Azure architecture: putting it all together'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Here is a diagram of the full cloud architecture for our chat application that
    contains all our Azure resources. Let’s take a high level look at how a user request
    flows through the system.
  prefs: []
  type: TYPE_NORMAL
- en: '![Azure architecture diagram. Made by author in draw.io.](../Images/34cdf0d4a0a70853e6b31ecf22e1e143.png)'
  prefs: []
  type: TYPE_IMG
- en: Azure architecture diagram. Made by author in draw.io.
  prefs: []
  type: TYPE_NORMAL
- en: User sends HTTPS request to [chat.jorisbaan.nl](http://chat.jorisbaan.nl).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: A Public DNS server like Google DNS resolves this domain name to an Azure Public
    IP address.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The Azure Load Balancer on this IP address routes the request to the (for us
    invisible) Envoy Ingress Controller.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The Ingress Controller routes the request to UI Container App, who routes it
    to one of its Replicas where a UI web server is running.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The UI web server makes requests to the database API and language model API
    Apps, who both route it to one of their Replicas.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: A database API replica queries the PostgreSQL server hostname. The Azure Private
    DNS Zone resolves the hostname to the PostgreSQL server’s IP address.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 3\. Deployment
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: So, how do we actually create all this? Rather than clicking around in the Azure
    Portal, infrastructure-as-code tools like [Terraform](https://www.terraform.io/)
    are best to create and manage cloud resources. However, for simplicity, I will
    instead use the Azure CLI to create a bash script that deploys our entire application
    step by step. You can find the full deployment script including environment variables
    [here 🤖.](https://github.com/jsbaan/ai-app-from-scratch/blob/main/azure-deployment/deploy_app.sh)
    We will go through it step by step now.
  prefs: []
  type: TYPE_NORMAL
- en: 3.1 Setting up
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We need an Azure account (I’m using a [free education account](https://azure.microsoft.com/en-us/free/students)),
    a clone of the [https://github.com/jsbaan/ai-app-from-scratch](https://github.com/jsbaan/ai-app-from-scratch)
    repo, Docker to build and push the container images, the [downloaded model](https://github.com/jsbaan/ai-app-from-scratch/blob/main/lm-api/README.md),
    and the Azure CLI to start creating cloud resources.
  prefs: []
  type: TYPE_NORMAL
- en: We first create a resource group so our resources are easier to find, manage
    and delete. The `--location` parameter refers to the physical datacenter we’ll
    use to deploy our app’s infrastructure. Ideally, it is close to our users. We
    then create a private virtual network with 256 IP addresses to isolate, secure
    and connect our database server and Container Apps.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 3.2 PostgreSQL server deployment
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Depending on the hardware, an Azure-managed PostgreSQL database server costs
    about $13 to $7000 a month. To communicate with Container Apps, we put the DB
    server within the same private virtual network but in its own subnet. A subnet
    is a dedicated range of IP addresses that can have its own security and routing
    rules.
  prefs: []
  type: TYPE_NORMAL
- en: We create the Azure PostgreSQL Flexible Server with private access. This means
    only resources within the same virtual network can reach it. Azure automatically
    creates a Private DNS Zone that manages a hostname for the database that resolves
    to its IP address. The database API will later use this hostname to connect to
    the database server.
  prefs: []
  type: TYPE_NORMAL
- en: 'We will randomly generate the database credentials and store them in a secure
    place: Azure KeyVault.'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 3.3 Azure Container App Environment deployment
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: With the network and database in place, let’s deploy the infrastructure to run
    containers – the Container App Environment (recall, this is a Kubernetes cluster
    under the hood).
  prefs: []
  type: TYPE_NORMAL
- en: We create another subnet with 128 IP addresses and delegate its management to
    the Container App Environment. The subnet should be big enough for [every ten
    new replicas to get a new IP address](https://learn.microsoft.com/en-us/azure/container-apps/networking?tabs=workload-profiles-env%2Cazure-cli#subnet)
    in the subrange. We can then create the Environment. This is just a single command
    without much configuration.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: 3.4 Azure Container Apps deployment
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Each Container App needs a Docker image to run. Let’s first setup a Container
    Registry, and then build all our images locally and push them to the registry.
    Note that we simply copied the model file into the language model image using
    its [Dockerfile](https://github.com/jsbaan/ai-app-from-scratch/blob/main/lm-api/Dockerfile),
    so we don’t need to mount external storage like we did for [local deployment in
    part 1](https://github.com/jsbaan/ai-app-from-scratch/blob/main/compose.yaml#L54).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: Now, onto deployment. To create Container Apps we specify their Environment,
    container registry, image, and the port they will listen to for requests. The
    ingress parameter regulates whether Container Apps can be reached from the outside
    world. Our two APIs are internal and therefore completely isolated, with no public
    URL and no traffic ever routed from the Envoy Ingress Controller. The UI is external
    and has a public URL, but sends internal HTTP requests over the virtual network
    to our APIs. We pass these internal hostnames and db credentials as environment
    variables.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: 3.5 Scaling our Container Apps
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let’s take a look at how our Container Apps they scale. Container Apps can scale
    to zero, which means they have zero replicas and stop running (and stop incurring
    costs). This is a feature of the serverless paradigm, where infrastructure is
    provisioned on demand. [The invisible Envoy proxy handles scaling](https://techcommunity.microsoft.com/blog/startupsatmicrosoftblog/from-chaos-to-clarity-simplifying-your-networking-with-azure-container-apps/4034625)
    based on triggers, like concurrent HTTP requests. Spawning new replicas may take
    some time, which is called cold-start. We set the minimum number of replicas to
    1 to avoid cold starts and the resulting timeout errors for first requests.
  prefs: []
  type: TYPE_NORMAL
- en: The default scaling rule creates a new replica whenever an existing replica
    receives 10 concurrent HTTP requests. This applies to the UI and the database
    API. To test whether this scaling rule makes sense, we would have to perform load
    testing to simulate real user traffic and see what each Container App replica
    can handle individually. My guess is that they can handle a lot more concurrent
    request than 10, and we could relax the rule.
  prefs: []
  type: TYPE_NORMAL
- en: 3.5.1 Scaling language model inference.
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Even with our small, quantized language model, inference requires much more
    compute than a simple FastAPI app. The inference server handles incoming requests
    sequentially, and the default Container App resources of 0.5 virtual CPU cores
    and 1GB memory result in very slow response times: up to 30 seconds for generating
    128 tokens with a context window of 1024 (these parameters are defined in the
    [LM API’s Dockerfile](https://github.com/jsbaan/ai-app-from-scratch/blob/main/lm-api/Dockerfile)).'
  prefs: []
  type: TYPE_NORMAL
- en: Increasing vCPU to 2 and memory to 4GB gives much better inference speed, and
    handles about 10 requests within 30 seconds. I configured the http scaling rule
    very tightly at 2 concurrent requests, so whenever 2 users chat at the same time,
    the LM API will scale out.
  prefs: []
  type: TYPE_NORMAL
- en: With 5 maximum replicas, I think this will allow for roughly 10–40 concurrent
    users, depending on the length of the chat histories. Now, obviously, this isn’t
    very large-scale, but with a higher budget, we could increase vCPUs, memory and
    the number of replicas. Ultimately we would need to move to GPU-based inference.
    More on that later.
  prefs: []
  type: TYPE_NORMAL
- en: 3.6 Custom domain name & HTTPS
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The automatically generated URL from the UI App looks like [https://chat-ui.purplepebble-ac46ada4.germanywestcentral.azurecontainerapps.io/](https://chat-ui.purplepebble-ac46ada4.germanywestcentral.azurecontainerapps.io/).
    This isn’t very memorable, so I want to make our app available as subdomain on
    my website: [chat.jorisbaan.nl](http://chat.jorisbaan.nl).'
  prefs: []
  type: TYPE_NORMAL
- en: I simply add two DNS records on my domain registrar portal (like GoDaddy). A
    CNAME record that links my `chat` subdomain to the UI’s URL, and TXT record to
    prove ownership of the subdomain to Azure and obtain a TLS certificate.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: Container Apps manages a free TLS certificate for my subdomain as long as the
    CNAME record points directly to the container’s domain name.
  prefs: []
  type: TYPE_NORMAL
- en: The public URL for the UI changes whenever I tear down and redeploy an Environment.
    We could use a fancier service like [Azure Front Door](https://learn.microsoft.com/en-us/azure/frontdoor/front-door-overview)
    or [Application Gateway](https://learn.microsoft.com/en-us/azure/application-gateway/overview)
    to get a stable URL and act as reverse proxy with additional security, global
    availability, and edge caching.
  prefs: []
  type: TYPE_NORMAL
- en: 4\. Resources & costs overview
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now that the app is deployed, let’s look at an overview of all the Azure resources
    it app uses. We created most of them ourselves, but Azure also automatically created
    a Load balancer, Public IP, Private DNS Zone, Network Watcher and Log Analytics
    workspace.
  prefs: []
  type: TYPE_NORMAL
- en: '![Screenshot of all resources from Azure Portal.](../Images/c5fc9c6bf6e0de5fb9e162e23f460037.png)'
  prefs: []
  type: TYPE_IMG
- en: Screenshot of all resources from Azure Portal.
  prefs: []
  type: TYPE_NORMAL
- en: 'Some resources are free, others are free up to a certain time or compute budget,
    which is part of the reason I chose them. The following resources incur the highest
    costs:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Load Balancer (standard Tier)**: free for 1 month, then $18/month.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Container Registry (standard Tier):** free for 12 months, then $19/month.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**PostgreSQL Flexible Server (Burstable B1MS Compute Tier)**: free for 12 months,
    then at least $13/month.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Container App**: Free for 50 CPU hours/month or 2M requests/month, then $10/month
    for an App with a single replica, 0.5 vCPUs and 1GB memory. The LM API with 2vCPUs,
    4GB memory costs about $50 per month for a single replica.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can see that the costs of this small (but scalable) app can quickly add
    up to hundreds of dollars per month, even without a GPU server to run a stronger
    language model! That’s the reason why the app probably won’t be up when you’re
    reading this.
  prefs: []
  type: TYPE_NORMAL
- en: 'It also becomes clear that Azure Container Apps is more expensive then I initially
    thought: it requires a standard-Tier Load balancer for automatic external ingress,
    HTTPS and auto-scaling. We could get around this by disabling external ingress
    and deploying a cheaper alternative – like a VM with a custom reverse proxy, or
    a basic-Tier Load balancer. Still, a standard-tier Kubernetes cluster would have
    cost at least $150/month, so ACA can be cheaper at small scale.'
  prefs: []
  type: TYPE_NORMAL
- en: 5\. Roadmap
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now, before we wrap up, let’s look at just a few of the many directions to improve
    this deployment.
  prefs: []
  type: TYPE_NORMAL
- en: '**Continuous Integration & Continuous Deployment.** I would set up a CI/CD
    pipeline that runs unit and integration tests and redeploys the app upon code
    changes. It might be triggered by a new git commit or merged pull request. This
    will also make it easier to see when a service isn’t deployed properly. I would
    also set up monitoring and alerting to be aware of issues quickly (like a crashing
    Container App instance).'
  prefs: []
  type: TYPE_NORMAL
- en: '**Lower latency: the language model server.** I would load test the whole app
    – simulating real-world user traffic – with something like [Locust](https://locust.io/)
    or [Azure Load Testing](https://azure.microsoft.com/en-us/products/load-testing).
    Even without load testing, we have an obvious bottleneck: the LM server. Small
    and quantized as it is, it can still take up quite a while for lengthy answers,
    with no concurrency. For more users it would be faster and more efficient to run
    a GPU inference server with a batching mechanism that collects multiple generation
    requests in a queue – perhaps with [Kafka](https://kafka.apache.org/) – and runs
    batch inference on chunks.'
  prefs: []
  type: TYPE_NORMAL
- en: With even more users, we might want several GPU-based LM servers that consume
    from the same queue. For GPU infrastructure I’d look into Azure Virtual Machines
    or something more fancy like Azure Machine Learning.
  prefs: []
  type: TYPE_NORMAL
- en: The llama.cpp inference engine is good for single-user CPU-based inference.
    When moving to a GPU-server, I would look into inference engines more suitable
    to batch inference, like [vLLM](https://github.com/vllm-project/vllm) or [Huggingface
    TGI](https://huggingface.co/docs/text-generation-inference/en/index). And, obviously,
    a better (bigger) model for increased response quality – depending on the use
    case.
  prefs: []
  type: TYPE_NORMAL
- en: 6\. Final thoughts
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I hope this project offers a glimpse of what an AI-powered web app in production
    may look like. I tried to balance realistic engineering with cutting about every
    corner to keep it simple, cheap, understandable, and limit my time and compute
    budget. Sadly, I cannot keep the app live for long since it would quickly cost
    hundreds of dollars per month. If someone can help with Azure credits to keep
    the app running, let me know!
  prefs: []
  type: TYPE_NORMAL
- en: 'Some closing thoughts about using managed services: Although Azure Container
    Apps abstracts away some of the Kubernetes complexity, it’s still extremely useful
    to have an understanding of the lower-level Kubernetes concepts. The automatically
    created invisible infrastructure like Public IPs, Load balancers and ingress controllers
    add unforeseen costs and make it difficult to understand what’s going on. Also,
    ACA documentation is limited compared to Kubernetes. However, if you know what
    you’re doing, you can set something up very quickly.'
  prefs: []
  type: TYPE_NORMAL
- en: Acknowledgements
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I heavily relied on the [Azure docs](https://learn.microsoft.com/en-us/azure/),
    and the [ACA docs](https://learn.microsoft.com/en-us/azure/container-apps/) in
    particular. Thanks to Dennis Ulmer for proofreading and Lucas de Haas for useful
    discussion.
  prefs: []
  type: TYPE_NORMAL
- en: AI usage
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I experimented a bit more with AI tools compared to [part 1](https://towardsdatascience.com/designing-building-deploying-an-ai-chat-app-from-scratch-part-1-f1ebf5232d4d).
    I used Pycharm’s CoPilot plugin for code completion and had quite some back-and-forth
    with ChatGPT to learn about the Azure or Kubernetes ecosystem, and to spar about
    bugs. I double-checked everything in the docs and most of the information was
    solid. Like part 1, I did not use AI to write this post, though I did use ChatGPT
    to paraphrase some bad-running sentences.
  prefs: []
  type: TYPE_NORMAL
