- en: 7\. Choose the model
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I chose **gemini-2.0-flash** for this project because I think it’s a great model
    with a generous free tier. However, you can explore other model options that also
    offer free tiers and choose your preferred one.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/6673a1d94588ab6aa74503e2c280c799.png)'
  prefs: []
  type: TYPE_IMG
- en: Screenshot by the author from [https://aistudio.google.com/plan_information](https://aistudio.google.com/plan_information)
  prefs: []
  type: TYPE_NORMAL
- en: '**Pro**: models designed for **high**–**quality** outputs, including reasoning
    and creativity. Generally used for complex tasks, problem-solving, and content
    generation. They are multimodal — this means they can process text, image, video,
    and audio for input and output.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Flash**: models projected for **speed** and **cost efficiency.** Can have
    lower-quality answers compared to the Pro for complex tasks. Generally used for
    chatbots, assistants, and real-time applications like automatic phrase completion.
    They are multimodal for input, and for output is currently just text, other features
    are in development.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Lite**: even faster and cheaper than Flash, but with some reduced capabilities,
    such as it is multimodal only for input and text-only output. Its main characteristic
    is that it is **more economical** than the Flash, ideal for generating large amounts
    of text within cost restrictions.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This [link](https://ai.google.dev/gemini-api/docs/models#gemini-2.0-flash) has
    plenty of details about the models and their differences.
  prefs: []
  type: TYPE_NORMAL
- en: Here we are setting up the model. Just replace “gemini-2.0-flash” with the model
    you’ve chosen.
  prefs: []
  type: TYPE_NORMAL
- en: '→ Add this to your `app.py`:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 8\. Build the chat
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'First, let’s discuss the key concepts we’ll use:'
  prefs: []
  type: TYPE_NORMAL
- en: '**`st.session_state`**: this works like a **memory** for your app. Streamlit
    reruns your script from top to bottom every time something changes — when you
    send a message or click a button —  so normally, all the variables would be reset.
    This allows Streamlit to remember values between reruns. However, if you refresh
    your web page you’ll lose the `session_state`.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**`st.chat_message(name, avatar)`**: Creates a chat bubble for a message in
    the interface. The first parameter is the **name** of the message author, whichcan
    be *“user”, “human”, “assistant”, “ai”, or str.* If you use user/human and assistant/ai,
    it already has default **avatars** of user and bot icons. You can change this
    if you want to. Check out the [documentation](https://docs.streamlit.io/develop/api-reference/chat/st.chat_message)
    for more details.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**`st.chat_input(placeholder)`**: Displays an input box at the bottom for the
    user to type messages. It has many parameters, so I recommend you check out the
    [documentation](https://docs.streamlit.io/develop/api-reference/chat/st.chat_input).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: First, I’ll explain each part of the code separately, and after I’ll show you
    the whole code together.
  prefs: []
  type: TYPE_NORMAL
- en: This initial step initializes your **`session_state`**, the app’s “memory”,
    to keep all the messages within one session.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: Next, we’ll set the first default message. This is optional, but I like to add
    it. You could add some initial instructions if suitable for your context. Every
    time Streamlit runs the page and `st.session_state.chat_history` is empty, it’ll
    append this message to the history with the role “assistant”.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: 'In my app bordAI, I added this initial message giving context and instructions
    for my app:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/3cdf78ff0d85d7155aab29ba2312fd80.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  prefs: []
  type: TYPE_NORMAL
- en: For the **user** part, the first line creates the input box. If `user_message`
    contains content, it writes it to the interface and then appends it to `chat_history`.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: 'Now let’s add the **assistant** part:'
  prefs: []
  type: TYPE_NORMAL
- en: '**`system_prompt`** is the prompt sent to the model. You could just send the
    `user_message` in place of `full_input` (look at the code below). However, the
    output might not be precise. A prompt provides context and instructions about
    **how** you want the model to behave, not just **what** you want it to answer.
    **A good prompt makes the model’s response more accurate, consistent, and aligned
    with your goals.** In addition, without telling how our model should behave, it’s
    vulnerable to **prompt injections**.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '***Prompt injection** is when someone tries to manipulate the model’s prompt
    in order to alter its behavior. One way to mitigate this is to structure prompts
    clearly and delimit the user’s message within triple quotes. *'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: We’ll start with a simple and unclear **`system_prompt`** and in the next session
    we’ll make it better to compare the difference.
  prefs: []
  type: TYPE_NORMAL
- en: '**`full_input`**: here, we’re organizing the input, delimiting the user message
    with triple quotes (“””). This doesn’t prevent all prompt injections, but it is
    one way to create better and more reliable interactions.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**`response`**: sends a request to the API, storing the output in response.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**`assistant_reply`**: extracts the text from the response.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Finally, we use `st.chat_message()` combined to `write()` to display the assistant
    reply and append it to the `st.session_state.chat_history`, just like we did with
    the user.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: Now let’s see everything together!
  prefs: []
  type: TYPE_NORMAL
- en: '→ Add this to your `app.py`:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  prefs: []
  type: TYPE_PRE
- en: To run and test your app locally, first navigate to the project folder, then
    execute the following command.
  prefs: []
  type: TYPE_NORMAL
- en: '→ Execute in your terminal:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  prefs: []
  type: TYPE_PRE
- en: '**Yay!** You now have a chat running in Streamlit!'
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 9\. Prompt Engineering
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Prompt Engineering is a process of writing instructions to get the best possible
    output from an AI model.
  prefs: []
  type: TYPE_NORMAL
- en: 'There are plenty of techniques for prompt engineering. Here are 5 tips:'
  prefs: []
  type: TYPE_NORMAL
- en: Write clear and specific instructions.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Define a role, expected behavior, and rules for the assistant.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Give the right amount of context.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Use the delimiters to indicate user input (as I explained in part 8).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Ask for the output in a specified format.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: These tips can be applied to the `system_prompt` or when you’re writing a prompt
    to interact with the chat assistant.
  prefs: []
  type: TYPE_NORMAL
- en: 'Our current system prompt is:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE19]'
  prefs: []
  type: TYPE_PRE
- en: It is super vague and provides no guidance to the model.
  prefs: []
  type: TYPE_NORMAL
- en: No clear direction for the assistant, what kind of help it should provide
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: No specification of the role or what is the topic of the assistance
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: No guidelines for structuring the output
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: No context on whether it should be technical or casual
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Lack of boundaries
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We can improve our prompt based on the tips above. Here’s an example.
  prefs: []
  type: TYPE_NORMAL
- en: '→ Change the `system_prompt` in the `app.py`:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE20]'
  prefs: []
  type: TYPE_PRE
- en: 'If we ask “What is python?” to the old prompt, it just gives a generic short
    answer:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c5d35a08bdd552b5e137fa82281f7563.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  prefs: []
  type: TYPE_NORMAL
- en: 'With the new prompt, it provides a more detailed response with examples:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/1449c92a3eb76f1384cbb3ce8f5d9255.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/318d2c6f776fde4fbc98aa217caa8f5c.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  prefs: []
  type: TYPE_NORMAL
- en: Try changing the **`system_prompt`** yourself to see the difference in the model
    outputs and craft the ideal prompt for your context!
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 10\. Choose Generate Content Parameters
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: There are many parameters you can configure when generating content. Here I’ll
    demonstrate how **`temperature`** and **`maxOutputTokens`** work. Check the [documentation](https://ai.google.dev/api/generate-content#v1beta.GenerationConfig)
    for more details.
  prefs: []
  type: TYPE_NORMAL
- en: '**`temperature`**: controls the randomness of the output, ranging from 0 to
    2\. The default is 1\. Lower values produce more deterministic outputs, while
    higher values produce more creative ones.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**`maxOutputTokens`**: the maximum number of tokens that can be generated in
    the output. A token is approximately four characters.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: To change the temperature dynamically and test it, you can create a sidebar
    slider to control this parameter.
  prefs: []
  type: TYPE_NORMAL
- en: '→ Add this to `app.py`:'
