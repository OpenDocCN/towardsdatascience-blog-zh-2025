- en: 5\. Get API Key
  id: totrans-41
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 5. 获取API密钥
- en: An API Key is like a password that tells a service you have permission to use
    it. In this project, we’ll use the Gemini API because they have a free tier, so
    you can play around with it without spending money.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: API密钥就像一个密码，告诉服务你有权使用它。在这个项目中，我们将使用Gemini API，因为他们有一个免费层，所以你可以免费尝试它，而不必花钱。
- en: Go to [https://aistudio.google.com/](https://aistudio.google.com/)
  id: totrans-43
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 前往 [https://aistudio.google.com/](https://aistudio.google.com/)
- en: Create or log in to your account.
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 创建或登录到你的账户。
- en: Click on “**Create API Key**“, create it, and copy it.
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 点击“**创建API密钥**”，创建它，并复制它。
- en: 'Don’t set up billing if you just want to use the free tier. It should say “Free”
    under “Plan”, just like here:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你只想使用免费层，不要设置账单。在“计划”下应该显示“免费”，就像这里一样：
- en: '![](../Images/ce590e1c9271f930085d80a8b2e66dca.png)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/ce590e1c9271f930085d80a8b2e66dca.png)'
