  id: totrans-67
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: '→ Add this to your `app.py`:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: '**→ 将此添加到你的`app.py`文件中：**'
