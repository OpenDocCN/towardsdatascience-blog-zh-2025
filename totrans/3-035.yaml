- en: 12\. Chat with memory
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Besides having messages stored in `chat_history`, our model isn’t aware of the
    context of our conversation. It is stateless, each transaction is independent.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/30ef6a5851f8c35fafafba8bcabe5fc9.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  prefs: []
  type: TYPE_NORMAL
- en: To solve this, we have to pass all this context inside our prompt so the model
    can reference previous messages exchanged.
  prefs: []
  type: TYPE_NORMAL
- en: Create **`context`** which is a list containing all the messages exchanged until
    that moment. Adding lastly the most recent user message, so it doesn’t get lost
    in the context.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE24]'
  prefs: []
  type: TYPE_PRE
- en: Now, I told the assistant that I was working on a project to analyze weather
    data. Then I asked what the theme of my project was and it correctly answered
    “weather data analysis”, as it now has the context of the previous messages.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/94776a2d7afe0af6acaa2150cb818fdf.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  prefs: []
  type: TYPE_NORMAL
- en: If your context gets too long, **you can consider summarizing it** to save costs,
    since the more tokens you send to the API, the more you’ll pay.
  prefs: []
