  type: TYPE_NORMAL
  zh: 确保您在公共存储库上没有 API 密钥。
- en: First, save and push your code to the repository.
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，保存并将您的代码推送到存储库。
- en: '→ Execute in your terminal:'
  id: totrans-198
  prefs: []
  type: TYPE_NORMAL
  zh: → 在您的终端中执行：
- en: '[PRE28]'
  id: totrans-199
  prefs: []
  type: TYPE_PRE
