  type: TYPE_NORMAL
  zh: 前往您在本地上运行的 streamlit 应用。
- en: Click on “Deploy” at the top right.
  id: totrans-202
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 点击右上角的“部署”。
- en: In Streamlit Community Cloud, click “Deploy now”.
  id: totrans-203
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在 Streamlit Community Cloud 中，点击“立即部署”。
- en: Fill out the information.
