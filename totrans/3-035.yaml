- en: Step-by-Step Guide to Build and Deploy an LLM-Powered Chat with Memory in Streamlit
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 逐步指南：在Streamlit中构建和部署具有记忆功能的LLM聊天
- en: 原文：[https://towardsdatascience.com/step-by-step-guide-to-build-and-deploy-an-llm-powered-chat-with-memory-in-streamlit/](https://towardsdatascience.com/step-by-step-guide-to-build-and-deploy-an-llm-powered-chat-with-memory-in-streamlit/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/step-by-step-guide-to-build-and-deploy-an-llm-powered-chat-with-memory-in-streamlit/](https://towardsdatascience.com/step-by-step-guide-to-build-and-deploy-an-llm-powered-chat-with-memory-in-streamlit/)
- en: <mdspan datatext="el1746144864726" class="mdspan-comment">In this post</mdspan>,
    I’ll show you step by step how to build and deploy a chat powered with LLM — **Gemini **—in
    Streamlit and monitor the API usage on Google Cloud Console. Streamlit is a Python
    framework that makes it super easy to turn your Python scripts into interactive
    web apps, with almost no front-end work.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1746144864726" class="mdspan-comment">在这篇文章中</mdspan>，我将逐步向您展示如何在Streamlit中构建和部署一个由LLM（Gemini）驱动的聊天，并在Google
    Cloud控制台上监控API的使用情况。Streamlit是一个Python框架，它使得将Python脚本转换为交互式Web应用变得非常容易，几乎不需要前端工作。
- en: Recently, I built a project, [bordAI](https://medium.com/p/c01cdc077bfa) — a
    chat assistant powered by LLM integrated with tools I developed to support embroidery
    projects. After that, I decided to start this series of posts to share tips I’ve
    learned along the way.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 最近，我开发了一个项目，[bordAI](https://medium.com/p/c01cdc077bfa) — 一个由LLM（大型语言模型）驱动的聊天助手，集成了我开发的用于支持刺绣项目的工具。之后，我决定开始这个系列帖子，分享我在过程中学到的技巧。
- en: 'Here’s a quick summary of the post:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是这篇文章的简要总结：
