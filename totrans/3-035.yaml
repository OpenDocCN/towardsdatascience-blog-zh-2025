  id: totrans-81
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: '* * *'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 8\. Build the chat
  id: totrans-83
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 8. 构建聊天
- en: 'First, let’s discuss the key concepts we’ll use:'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，让我们讨论我们将使用的关键概念：
- en: '**`st.session_state`**: this works like a **memory** for your app. Streamlit
    reruns your script from top to bottom every time something changes — when you
    send a message or click a button —  so normally, all the variables would be reset.
    This allows Streamlit to remember values between reruns. However, if you refresh
    your web page you’ll lose the `session_state`.'
  id: totrans-85
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**`st.session_state`**：这就像是你应用的**记忆**。Streamlit 每次发生变化时（例如发送消息或点击按钮）都会从头到尾重新运行你的脚本，所以通常，所有变量都会重置。这允许
    Streamlit 在重新运行之间记住值。然而，如果你刷新网页，你将丢失 `session_state`。'
- en: '**`st.chat_message(name, avatar)`**: Creates a chat bubble for a message in
    the interface. The first parameter is the **name** of the message author, whichcan
    be *“user”, “human”, “assistant”, “ai”, or str.* If you use user/human and assistant/ai,
    it already has default **avatars** of user and bot icons. You can change this
    if you want to. Check out the [documentation](https://docs.streamlit.io/develop/api-reference/chat/st.chat_message)
    for more details.'
  id: totrans-86
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**`st.chat_message(name, avatar)`**：在界面中创建一个消息的聊天气泡。第一个参数是消息作者的**名称**，可以是 *“user”，“human”，“assistant”，“ai”，或
    str*。如果你使用 user/human 和 assistant/ai，它已经具有默认的用户和机器人图标。如果你想改变，可以这样做。更多详情请查看[文档](https://docs.streamlit.io/develop/api-reference/chat/st.chat_message)。'
- en: '**`st.chat_input(placeholder)`**: Displays an input box at the bottom for the
    user to type messages. It has many parameters, so I recommend you check out the
    [documentation](https://docs.streamlit.io/develop/api-reference/chat/st.chat_input).'
  id: totrans-87
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**`st.chat_input(placeholder)`**：在底部显示一个输入框，供用户输入消息。它有许多参数，所以我建议你查看[文档](https://docs.streamlit.io/develop/api-reference/chat/st.chat_input)。'
- en: First, I’ll explain each part of the code separately, and after I’ll show you
    the whole code together.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，我将分别解释代码的每一部分，然后我会展示整个代码。
- en: This initial step initializes your **`session_state`**, the app’s “memory”,
    to keep all the messages within one session.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 这个初始步骤初始化了你的 **`session_state`**，应用的“记忆”，以保持会话中所有的消息。
- en: '[PRE13]'
  id: totrans-90
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: Next, we’ll set the first default message. This is optional, but I like to add
    it. You could add some initial instructions if suitable for your context. Every
    time Streamlit runs the page and `st.session_state.chat_history` is empty, it’ll
    append this message to the history with the role “assistant”.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将设置第一条默认消息。这是可选的，但我喜欢添加它。如果你适合你的上下文，可以添加一些初始指令。每次 Streamlit 运行页面且 `st.session_state.chat_history`
    为空时，它都会将此消息以“assistant”的角色追加到历史记录中。
- en: '[PRE14]'
  id: totrans-92
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: 'In my app bordAI, I added this initial message giving context and instructions
    for my app:'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 在我的应用 bordAI 中，我添加了这条初始信息，以提供应用上下文和说明：
- en: '![](../Images/3cdf78ff0d85d7155aab29ba2312fd80.png)'
  id: totrans-94
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/3cdf78ff0d85d7155aab29ba2312fd80.png)'
- en: Image by the author
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: For the **user** part, the first line creates the input box. If `user_message`
    contains content, it writes it to the interface and then appends it to `chat_history`.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 对于**用户**部分，第一行创建输入框。如果 `user_message` 包含内容，它将内容写入界面，并将其追加到 `chat_history`。
- en: '[PRE15]'
  id: totrans-97
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: 'Now let’s add the **assistant** part:'
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们添加**助手**部分：
- en: '**`system_prompt`** is the prompt sent to the model. You could just send the
    `user_message` in place of `full_input` (look at the code below). However, the
    output might not be precise. A prompt provides context and instructions about
    **how** you want the model to behave, not just **what** you want it to answer.
    **A good prompt makes the model’s response more accurate, consistent, and aligned
    with your goals.** In addition, without telling how our model should behave, it’s
    vulnerable to **prompt injections**.'
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**`system_prompt`** 是发送给模型的提示。你可以用 `user_message` 替换 `full_input`（查看下面的代码）。然而，输出可能不会很精确。提示提供了关于**如何**你想模型表现出的上下文和指令，而不仅仅是**什么**你想它回答。**一个好的提示可以使模型响应更准确、一致，并与你的目标保持一致**。此外，如果不告诉模型应该如何表现，它就很容易受到**提示注入**的攻击。'
- en: '***Prompt injection** is when someone tries to manipulate the model’s prompt
    in order to alter its behavior. One way to mitigate this is to structure prompts
    clearly and delimit the user’s message within triple quotes. *'
  id: totrans-100
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '**提示注入**是指有人试图操纵模型的提示以改变其行为。一种减轻这种影响的方法是清晰地结构化提示，并在三重引号内限定用户的消息。 *'
- en: We’ll start with a simple and unclear **`system_prompt`** and in the next session
    we’ll make it better to compare the difference.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将从简单且不明确的**`system_prompt`**开始，在下一节课中我们将使其变得更好以便比较差异。
- en: '**`full_input`**: here, we’re organizing the input, delimiting the user message
    with triple quotes (“””). This doesn’t prevent all prompt injections, but it is
    one way to create better and more reliable interactions.'
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**`full_input`**：在这里，我们正在组织输入，用三重引号（“””）限定用户消息。这并不能防止所有的提示注入，但这是创建更好和更可靠的交互的一种方法。'
- en: '**`response`**: sends a request to the API, storing the output in response.'
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**`response`**：向API发送请求，将输出存储在响应中。'
- en: '**`assistant_reply`**: extracts the text from the response.'
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**`assistant_reply`**：从响应中提取文本。'
- en: Finally, we use `st.chat_message()` combined to `write()` to display the assistant
    reply and append it to the `st.session_state.chat_history`, just like we did with
    the user.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们使用`st.chat_message()`结合`write()`来显示助手的回复，并将其附加到`st.session_state.chat_history`中，就像我们处理用户信息一样。
- en: '[PRE16]'
  id: totrans-106
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: Now let’s see everything together!
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们一起看看所有这些内容！
- en: '→ Add this to your `app.py`:'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: → 将此添加到你的`app.py`中：
- en: '[PRE17]'
  id: totrans-109
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: To run and test your app locally, first navigate to the project folder, then
    execute the following command.
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 要在本地运行和测试你的应用程序，首先导航到项目文件夹，然后执行以下命令。
- en: '→ Execute in your terminal:'
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: → 在你的终端中执行：
- en: '[PRE18]'
  id: totrans-112
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: '**Yay!** You now have a chat running in Streamlit!'
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: '**Yay!** 你现在在Streamlit中运行了一个聊天程序！'
- en: '* * *'
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 9\. Prompt Engineering
  id: totrans-115
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 9. 提示工程
- en: Prompt Engineering is a process of writing instructions to get the best possible
    output from an AI model.
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: 提示工程是一个编写指令以从AI模型获得最佳可能输出的过程。
- en: 'There are plenty of techniques for prompt engineering. Here are 5 tips:'
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 提示工程有许多技巧。以下有5个提示：
- en: Write clear and specific instructions.
  id: totrans-118
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 写出清晰和具体的指令。
- en: Define a role, expected behavior, and rules for the assistant.
  id: totrans-119
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 定义一个角色，期望的行为和助手的规则。
- en: Give the right amount of context.
  id: totrans-120
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 提供适当数量的上下文。
- en: Use the delimiters to indicate user input (as I explained in part 8).
  id: totrans-121
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用分隔符来表示用户输入（如我在第8部分中解释的）。
- en: Ask for the output in a specified format.
  id: totrans-122
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 以指定的格式请求输出。
- en: These tips can be applied to the `system_prompt` or when you’re writing a prompt
    to interact with the chat assistant.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 这些提示可以应用于`system_prompt`或当你编写与聊天助手交互的提示时。
- en: 'Our current system prompt is:'
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 我们当前的系统提示是：
- en: '[PRE19]'
  id: totrans-125
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: It is super vague and provides no guidance to the model.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 它非常模糊，并为模型提供不了任何指导。
- en: No clear direction for the assistant, what kind of help it should provide
  id: totrans-127
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 没有明确的方向给助手，它应该提供什么样的帮助
- en: No specification of the role or what is the topic of the assistance
  id: totrans-128
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 没有指定角色或辅助的主题是什么
- en: No guidelines for structuring the output
  id: totrans-129
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 没有关于如何结构化输出的指南
- en: No context on whether it should be technical or casual
  id: totrans-130
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 没有关于它应该是技术性还是非正式性的上下文
- en: Lack of boundaries
  id: totrans-131
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 缺乏边界
- en: We can improve our prompt based on the tips above. Here’s an example.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以根据上面的提示来改进我们的提示。以下是一个例子。
- en: '→ Change the `system_prompt` in the `app.py`:'
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: → 在`app.py`中更改`system_prompt`：
- en: '[PRE20]'
  id: totrans-134
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: 'If we ask “What is python?” to the old prompt, it just gives a generic short
    answer:'
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们用旧的提示问“什么是python？”它只会给出一个通用的简短答案：
- en: '![](../Images/c5d35a08bdd552b5e137fa82281f7563.png)'
  id: totrans-136
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/c5d35a08bdd552b5e137fa82281f7563.png)'
- en: Image by the author
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: 'With the new prompt, it provides a more detailed response with examples:'
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 使用新的提示，它提供了更详细的响应，并附有示例：
- en: '![](../Images/1449c92a3eb76f1384cbb3ce8f5d9255.png)'
  id: totrans-139
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/1449c92a3eb76f1384cbb3ce8f5d9255.png)'
- en: Image by the author
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: '![](../Images/318d2c6f776fde4fbc98aa217caa8f5c.png)'
  id: totrans-141
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/318d2c6f776fde4fbc98aa217caa8f5c.png)'
- en: Image by the author
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: Try changing the **`system_prompt`** yourself to see the difference in the model
    outputs and craft the ideal prompt for your context!
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试自己更改**`system_prompt`**以查看模型输出的差异，并为你的上下文制定理想的提示！
- en: '* * *'
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 10\. Choose Generate Content Parameters
  id: totrans-145
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 10. 选择生成内容参数
- en: There are many parameters you can configure when generating content. Here I’ll
    demonstrate how **`temperature`** and **`maxOutputTokens`** work. Check the [documentation](https://ai.google.dev/api/generate-content#v1beta.GenerationConfig)
    for more details.
  id: totrans-146
  prefs: []
  type: TYPE_NORMAL
  zh: 在生成内容时，你可以配置许多参数。在这里，我将演示**`temperature`**和**`maxOutputTokens`**是如何工作的。查看[文档](https://ai.google.dev/api/generate-content#v1beta.GenerationConfig)获取更多详细信息。
- en: '**`temperature`**: controls the randomness of the output, ranging from 0 to
    2\. The default is 1\. Lower values produce more deterministic outputs, while
    higher values produce more creative ones.'
  id: totrans-147
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**`temperature`**：控制输出的随机性，范围从0到2。默认值为1。较低的值产生更确定的输出，而较高的值产生更具创造性的输出。'
- en: '**`maxOutputTokens`**: the maximum number of tokens that can be generated in
    the output. A token is approximately four characters.'
  id: totrans-148
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**`maxOutputTokens`**：输出中可以生成的最大标记数。一个标记大约是四个字符。'
- en: To change the temperature dynamically and test it, you can create a sidebar
    slider to control this parameter.
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
  zh: 要动态更改温度并测试它，你可以创建一个侧边栏滑块来控制这个参数。
- en: '→ Add this to `app.py`:'
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: → 将以下内容添加到`app.py`中：
- en: '[PRE21]'
  id: totrans-151
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: '→ Change the `response` variable to:'
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
  zh: → 将`response`变量更改为：
- en: '[PRE22]'
  id: totrans-153
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: 'The sidebar will look like this:'
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 侧边栏将看起来像这样：
- en: '![](../Images/589ceb5c7fb65d5950d1d3b7dae62b40.png)'
  id: totrans-155
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/589ceb5c7fb65d5950d1d3b7dae62b40.png)'
- en: Image by the author
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: Try adjusting the temperature to see how the output changes!
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: 尝试调整温度以查看输出如何变化！
- en: '* * *'
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 11\. Display chat history
  id: totrans-159
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 11. 显示聊天历史
- en: This step ensures that you keep track of all the exchanged messages in the chat,
    so you can see the chat history. Without this, you’d only see the latest messages
    from the assistant and user each time you send something.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 这一步确保你跟踪所有在聊天中交换的消息，这样你就可以看到聊天历史。如果没有这个，每次你发送消息时，你只会看到助手和用户的最新消息。
- en: This code accesses everything appended to `chat_history` and displays it in
    the interface.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 这段代码访问了附加到`chat_history`的所有内容，并在界面上显示它。
- en: '→ Add this before the `if user_message` in `app.py`:'
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: → 在`app.py`中的`if user_message`之前添加以下内容：
- en: '[PRE23]'
  id: totrans-163
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: 'Now, all the messages within one session are kept visible in the interface:'
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，一个会话中的所有消息都保存在界面上可见：
- en: '![](../Images/d351ae08a9d9476d65d54a56f18d5e70.png)'
  id: totrans-165
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/d351ae08a9d9476d65d54a56f18d5e70.png)'
- en: Image by the author
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: 'Obs: I tried to ask a non-programming question, and the assistant tried to
    change the subject back to programming. Our prompt is working!'
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: Obs：我尝试提出一个非编程问题，助手试图将话题转回编程。我们的提示正在起作用！
- en: '* * *'
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 12\. Chat with memory
  id: totrans-169
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 12. 使用记忆进行聊天
- en: Besides having messages stored in `chat_history`, our model isn’t aware of the
    context of our conversation. It is stateless, each transaction is independent.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 除了在`chat_history`中存储消息外，我们的模型并不了解我们对话的上下文。它是无状态的，每次交易都是独立的。
- en: '![](../Images/30ef6a5851f8c35fafafba8bcabe5fc9.png)'
  id: totrans-171
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/30ef6a5851f8c35fafafba8bcabe5fc9.png)'
- en: Image by the author
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: To solve this, we have to pass all this context inside our prompt so the model
    can reference previous messages exchanged.
  id: totrans-173
  prefs: []
  type: TYPE_NORMAL
  zh: 为了解决这个问题，我们必须在提示中传递所有这些上下文，以便模型可以参考之前交换的消息。
- en: Create **`context`** which is a list containing all the messages exchanged until
    that moment. Adding lastly the most recent user message, so it doesn’t get lost
    in the context.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 创建**`context`**，这是一个包含直到那一刻交换的所有消息的列表。最后添加最新的用户消息，这样它就不会在上下文中丢失。
- en: '[PRE24]'
  id: totrans-175
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: Now, I told the assistant that I was working on a project to analyze weather
    data. Then I asked what the theme of my project was and it correctly answered
    “weather data analysis”, as it now has the context of the previous messages.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我告诉助手我正在做一个分析天气数据的项目。然后我问我的项目主题是什么，它正确地回答了“天气数据分析”，因为它现在有了之前消息的上下文。
- en: '![](../Images/94776a2d7afe0af6acaa2150cb818fdf.png)'
  id: totrans-177
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/94776a2d7afe0af6acaa2150cb818fdf.png)'
- en: Image by the author
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供
- en: If your context gets too long, **you can consider summarizing it** to save costs,
    since the more tokens you send to the API, the more you’ll pay.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的上下文太长，**你可以考虑总结它以节省成本**，因为你发送给API的标记越多，你将支付的费用就越多。
