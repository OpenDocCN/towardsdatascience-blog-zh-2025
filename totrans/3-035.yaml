- en: 15\. Monitor API usage on Google Console
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The last part of this post shows you how to monitor API usage on the Google
    Cloud Console. This is important if you deploy your app publicly, so you don’t
    have any surprises.
  prefs: []
  type: TYPE_NORMAL
- en: Access [Google Cloud Console](https://console.cloud.google.com/).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Go to “APIs and services”.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Click on “Generative Language API”.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![](../Images/1bb5f881fd94e051d4ef1fc60f0619a2.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by the author
  prefs: []
  type: TYPE_NORMAL
- en: '**Requests:** how many times your API was called. In our case, the API is called
    each time we run **`model.generate_content(context)`**.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Error (%):** the percentage of requests that failed. Errors can have the
    code **4xx** which is usually the user’s/requester’s fault — for instance, **400**
    for **bad input,** and **429** means you’re **hitting the API too frequently**.
    In addition, errors with the code **5xx** are usually the system’s/server’s fault
    and are less common. Google typically retries internally or recommends retrying
    after a few seconds — e.g. **500** for **Internal Server Error** and **503** for
    **Service Unavailable.**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Latency, median (ms)**: This shows how long (in milliseconds) it takes for
    your service to respond, at the 50th percentile — meaning half the requests are
    faster and half are slower. It’s a good general measure of your service’s speed,
    answering the question, “How fast is it normally?”.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Latency, 95% (ms)**: This shows the response time at the 95th percentile — meaning
    95% of requests are faster than this time, and only 5% slower. It helps to identify
    how your system behaves under heavy load or with slower cases, answering the question,
    “How bad is it getting for some users?”.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**A quick example of the difference between Latency median and Latency p95:**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Imagine your service usually responds in **200ms**:'
  prefs: []
  type: TYPE_NORMAL
- en: Median latency = 200ms (good!)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: p95 latency = 220ms (also good)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Now under heavy load:'
  prefs: []
  type: TYPE_NORMAL
- en: Median latency = 220ms (still looks OK)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: p95 latency = 1200ms (**not** **good**)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The metric p95 shows that **5% of your users are waiting more than 1.2 seconds** — a
    much worse experience. If we had looked just at the median, we’d assume everything
    was fine, but p95 shows hidden problems.
  prefs: []
  type: TYPE_NORMAL
- en: Continuing in the “Metrics” page, you’ll find graphs and, at the bottom, the
    methods called by the API. Also, in “Quotas & System Limits”, you can monitor
    the API usage compared to the free tier limit.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c20992c99f127691e31bb75c2cc2ddfe.png)'
