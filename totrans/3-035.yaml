  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将在本项目中使用**gemini-2.0-flash**。它提供了一个免费套餐，如以下表格所示：
- en: '![](../Images/ee5b54b93c6cede5b84fe9f4d9a57e3a.png)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/ee5b54b93c6cede5b84fe9f4d9a57e3a.png)'
- en: Screenshot by the author from [https://aistudio.google.com/plan_information](https://aistudio.google.com/plan_information)
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 作者截图自[https://aistudio.google.com/plan_information](https://aistudio.google.com/plan_information)
- en: 15 RPM = 15 Requests per minute
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 15 RPM = 每分钟请求15次
- en: 1,000,000 TPM = 1 Million Tokens Per Minute
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 1,000,000 TPM = 每分钟1百万个令牌
- en: 1,500 RPD = 1,500 Requests Per Day
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 1,500 RPD = 每天请求1,500次
- en: '*Note: These limits are accurate as of April 2025 and may change over time. *'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '*注意：这些限制截至2025年4月准确无误，可能会随时间变化。*'
- en: 'Just a heads up: if you are using the free tier, Google may use your prompts
    to improve their products, including human reviews, so it’s not recommended to
    send sensitive information. If you want to read more about this, check this [link](https://ai.google.dev/gemini-api/terms).'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 提前提醒：如果你正在使用免费套餐，谷歌可能会使用你的提示来改进他们的产品，包括人工审查，因此不建议发送敏感信息。如果你想了解更多关于这一点的内容，请查看这个[链接](https://ai.google.dev/gemini-api/terms)。
- en: '* * *'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 6\. Store your API Key
  id: totrans-58
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 6. 存储你的API密钥
- en: We’ll store our API Key inside a `.env` file. A **`.env`** file is a simple
    text file where you store secret information, so you don’t write it directly in
    your code. We don’t want it going to GitHub, so we have to add it to our **`.gitignore`**
    file. This file determines which files git should literally ignore when you push
    your changes to the repository. I’ve already mentioned this in part 4, “Project
    Structure”, but just in case you missed it, I’m repeating it here.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将API密钥存储在`.env`文件中。一个**`.env`**文件是一个简单的文本文件，用于存储秘密信息，因此你不需要直接将其写入代码。我们不希望它出现在GitHub上，因此我们必须将其添加到我们的**`.gitignore`**文件中。此文件确定在将更改推送到存储库时git应实际忽略哪些文件。我在第4部分“项目结构”中已经提到过这一点，但以防你错过了，我在这里再次重复。
- en: This step is really important, don’t forget it!
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 这一步非常重要，不要忘记它！
- en: '**→ Add this to `.gitignore`: **'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: '**→ 将此添加到`.gitignore`文件中：**'
- en: '[PRE8]'
  id: totrans-62
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: '→ Add the API Key to `.env`:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: → 将API密钥添加到`.env`文件中：
- en: '[PRE9]'
  id: totrans-64
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: If you’re running locally, `.env` works fine. However, if you’re deploying in
    Streamlit later, you will have to use `st.secrets`. Here I’ve included a code
    that can work in both scenarios.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你是在本地运行，`.env`文件可以正常工作。然而，如果你稍后使用Streamlit部署，你将不得不使用`st.secrets`。这里我包含了一段可以在两种情况下工作的代码。
