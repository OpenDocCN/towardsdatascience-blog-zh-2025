- en: If your repository is public, you can deploy with Streamlit for free.
  id: totrans-195
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你的仓库是公开的，你可以免费使用Streamlit进行部署。
- en: MAKE SURE YOU DO NOT HAVE API KEYS ON YOUR PUBLIC REPOSITORY.
  id: totrans-196
  prefs:
