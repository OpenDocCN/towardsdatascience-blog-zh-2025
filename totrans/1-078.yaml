- en: 'Making Smarter Bets: Towards a Winning AI Strategy with Probabilistic Thinking'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 聪明下注：利用概率思维走向胜利的AI策略
- en: 原文：[https://towardsdatascience.com/making-smarter-bets-towards-a-winning-ai-strategy-with-probabilistic-thinking/](https://towardsdatascience.com/making-smarter-bets-towards-a-winning-ai-strategy-with-probabilistic-thinking/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://towardsdatascience.com/making-smarter-bets-towards-a-winning-ai-strategy-with-probabilistic-thinking/](https://towardsdatascience.com/making-smarter-bets-towards-a-winning-ai-strategy-with-probabilistic-thinking/)'
- en: In a [previous article](https://towardsdatascience.com/expected-value-analysis-in-ai-product-management/),
    we covered key theoretical concepts that underpin *expected value analysis* —
    which involves probabilistic weighting of uncertain outcomes — and focused on
    the relevance to AI product management. <mdspan datatext="el1763386501854" class="mdspan-comment">In
    this article</mdspan>, we will zoom out and consider the bigger picture, looking
    at how probabilistic thinking based on expected values can help AI teams tackle
    broader strategic problems such as opportunity identification and selection, product
    portfolio management, and countering behavioral biases that lead to irrational
    decision making. The target audience of this article includes AI business sponsors
    and executives, AI product leaders, data scientists and engineers, and any other
    stakeholders engaged in the conception and execution of AI strategies.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在[之前的文章](https://towardsdatascience.com/expected-value-analysis-in-ai-product-management/)中，我们介绍了支撑*预期价值分析*——涉及不确定结果的概率加权——的关键理论概念，并关注了其在AI产品管理中的相关性。在本篇文章中，我们将放宽视野，考虑更广阔的背景，探讨基于预期值的概率思维如何帮助AI团队解决更广泛的战略问题，如机会识别和选择、产品组合管理以及对抗导致非理性行为决策的行为偏见。本文的目标受众包括AI商业赞助商和高级管理人员、AI产品领导者、数据科学家和工程师，以及任何参与AI战略构思和执行的利益相关者。
- en: Identifying and Selecting AI Opportunities
  id: totrans-3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 识别和选择AI机会
- en: How to spot value-creating opportunities to invest scarce resources, and then
    optimally select among these, is an age-old problem. Advances in the theory and
    practice of investment analysis over the past five hundred years have given us
    such useful tools and concepts as *net present value (NPV)*, *discounted cash
    flow (DCF)* analysis, *return on invested capital (ROIC)*, and *real options*,
    to name but a few. All these tools acknowledge the uncertainty inherent in making
    decisions about the future and try to account for this uncertainty using educated
    assumptions and — unsurprisingly — the notion of expected value. For example,
    NPV, DCF, and ROIC all require us to forecast expected returns (or cash flows)
    over some future time period. This fundamentally involves estimating the probabilities
    of potential business outcomes along with their associated returns in that time
    period and combining these estimates to compute the expected value.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 如何发现创造价值的投资机会，并在这些机会中优化选择，这是一个古老的问题。在过去五百年中，投资分析理论和实践的发展为我们提供了诸如*净现值（NPV）*、*折现现金流（DCF）分析*、*投资资本回报率（ROIC）*和*实物期权*等有用的工具和概念，仅举几个例子。所有这些工具都承认在做出关于未来的决策时固有的不确定性，并试图通过有根据的假设——不出所料——以及预期价值的观念来解释这种不确定性。例如，NPV、DCF和ROIC都要求我们预测未来某个时间段的预期回报（或现金流）。这本质上涉及到估计该时间段潜在商业结果及其相关回报的概率，并将这些估计结合起来计算预期价值。
- en: With an understanding of expected value, powerful, field-tested methods of investment
    analysis such as those mentioned above can be leveraged by AI product teams to
    identify and select investment opportunities (e.g., projects to work on and features
    to ship to customers). In [this](https://www.appliedai.de/uploads/files/Value-Assessment-of-AI-Products-and-Applications.pdf)
    publication by *appliedAI*, a European institute fostering industry-academic collaboration
    and the promotion of responsible AI, the authors outline an approach to computing
    the ROIC of AI products using expected values. They show a tree diagram of the
    ROIC calculation, which breaks down the “return” term of the formula into the
    “benefits” of the AI product (based on the quantity and quality of model predictions)
    and the uncertainty/expected costs of these benefits. They set these returns against
    the cost of investment, i.e., the total cost of the resources needed (IT, labor,
    and so on) to develop, operate, and maintain the AI product. Calculating the ROIC
    of different AI investment opportunities using expected values can help product
    teams identify and select promising opportunities despite the inherent uncertainty
    involved.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 通过理解期望值，AI产品团队能够利用上述提到的强大、经过实战检验的投资分析方法来识别和选择投资机会（例如，要工作的项目和要向客户交付的功能）。在*appliedAI*的这篇[出版物](https://www.appliedai.de/uploads/files/Value-Assessment-of-AI-Products-and-Applications.pdf)中，*appliedAI*是一家欧洲机构，致力于促进产业与学术合作以及负责任AI的推广，作者们概述了一种使用期望值计算AI产品ROIC的方法。他们展示了一个ROIC计算的树状图，将公式的“回报”术语分解为AI产品的“收益”（基于模型预测的数量和质量）以及这些收益的不确定性/期望成本。他们将这些回报与投资成本相对比，即开发、运营和维护AI产品所需资源的总成本。使用期望值计算不同AI投资机会的ROIC可以帮助产品团队能够在固有的不确定性中识别和选择有希望的机会。
- en: The use of real options can give teams even more flexibility in their decision
    making (see more information on real options [here](https://corporatefinanceinstitute.com/resources/derivatives/real-options/)
    and [here](https://www.investopedia.com/terms/r/realoption.asp)). Common types
    of real options include the option to *expand* (e.g., increasing the functionality
    of an AI product, offering the product to a broader set of customers), the option
    to *contract* or reduce (e.g., only offering the product to premium customers
    in the future), the option to *switch* (e.g., having the flexibility to move AI
    workloads from one hyperscaler to another), the option to *wait* (e.g., deferring
    the decision to build an AI product until market readiness can be ascertained),
    and the option to *abandon* (e.g., sunsetting a product). In order to decide whether
    to invest in one or more of these options, product teams can estimate the expected
    value of each option and proceed accordingly.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 实际期权的使用可以为团队在决策中提供更大的灵活性（更多关于实际期权的信息请参阅[这里](https://corporatefinanceinstitute.com/resources/derivatives/real-options/)和[这里](https://www.investopedia.com/terms/r/realoption.asp)）。常见的实际期权类型包括*扩展*期权（例如，增加AI产品的功能，向更广泛的客户群体提供产品），*缩减*或减少期权（例如，未来仅向高端客户提供产品），*切换*期权（例如，具有将AI工作负载从一个超大规模云服务提供商转移到另一个的能力），*等待*期权（例如，推迟决定构建AI产品，直到市场准备就绪），以及*放弃*期权（例如，淘汰产品）。为了决定是否投资于这些期权中的一个或多个，产品团队能够估算每个期权的期望值并据此行动。
- en: 'Check out the video below for hands-on examples of how standard frameworks
    (NPV, DCF) and real option analysis can lead to different conclusions about the
    attractiveness of investment decisions:'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 以下视频展示了标准框架（NPV、DCF）和实际期权分析如何导致关于投资决策吸引力的不同结论的实战示例：
- en: AI Portfolio Management
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: AI投资组合管理
- en: At any given time, businesses (especially large ones) tend to be active on multiple
    fronts, launching new products, expanding or streamlining existing products, and
    sunsetting others. Product leaders are thus faced with the never-ending and non-trivial
    challenge of *product portfolio management*, which involves allocating scarce
    resources (budget, staffing, and so on) across an evolving portfolio of products
    that may be at different stages of their lifecycle, with due consideration of
    internal factors (e.g., the company’s strengths and weaknesses) and external factors
    (e.g., threats and opportunities pertaining to macroeconomic trends and changes
    in the competitive landscape). The challenge becomes especially daunting as new
    AI products fight for space in the product portfolio with other essential products
    and initiatives (e.g., related to overdue technology migrations, modernization
    of user interfaces, and improvements targeting the reliability and security of
    core services).
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 在任何给定时间，企业（尤其是大型企业）往往在多个方面活跃，推出新产品、扩展或精简现有产品，以及淘汰其他产品。因此，产品领导者面临着永无止境且非同小可的挑战，即*产品组合管理*，这涉及到在可能处于其生命周期不同阶段的产品组合中分配稀缺资源（预算、人员等），同时考虑到内部因素（例如，公司的优势和劣势）和外部因素（例如，与宏观经济趋势和竞争格局变化相关的威胁和机遇）。当新的AI产品与其他关键产品和创新（例如，与过时的技术迁移、用户界面现代化以及针对核心服务可靠性和安全性的改进）争夺产品组合中的空间时，挑战变得更加艰巨。
- en: Although primarily associated with the field of finance, *modern portfolio theory*
    (MPT) is a concept that relies on expected value analysis and can be used to manage
    AI product portfolios. In essence, MPT can help product leaders construct portfolios
    that combine different types of assets (products) to maximize expected returns
    (e.g., revenue, usage, and customer satisfaction over a future time period) while
    minimizing risk (e.g., due to mounting technical debt, threats from competitors,
    and regulatory pushback). Probabilistic thinking in the form of expected value
    analysis can be used to estimate expected returns and account for risks, allowing
    a more sophisticated, data-driven assessment of the portfolio’s overall risk-return
    profile; this assessment, in turn, can lead to actionable recommendations for
    optimally allocating resources across the different products.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管主要与金融领域相关联，*现代投资组合理论*（MPT）是一个依赖于预期价值分析的概念，并且可以用于管理人工智能产品组合。本质上，MPT可以帮助产品领导者构建组合，将不同类型的资产（产品）结合起来，以最大化预期回报（例如，在未来一段时间内的收入、使用率和客户满意度）同时最小化风险（例如，由于不断增长的技术债务、竞争对手的威胁和监管的反对）。以预期价值分析形式出现的概率性思维可以用来估计预期回报并考虑风险，从而对投资组合的整体风险回报特征进行更复杂、数据驱动的评估；这种评估反过来又可能导致针对在不同产品之间优化资源配置的具体建议。
- en: 'See this video for a deeper explanation of MPT:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 有关MPT的更深入解释，请观看此视频：
- en: Countering Behavioral Biases
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 对抗行为偏差
- en: 'Suppose you have won a game and are presented with the following three prize
    options: (1) a guaranteed $100, (2) a 50% chance of winning $200, and (3) a 10%
    chance of winning $1100\. Which prize would you choose, and how would you rank
    the prizes overall? Whereas the first prize guarantees a certain return, the latter
    two come with varying degrees of risk. However, the expected return of the second
    prize is $200*0.5 + $0*0.5 = $100, so we ought to (at least in theory) be indifferent
    to receiving either of the first two prizes; after all, their expected returns
    are the same. Meanwhile, the third prize offers an expected return of $1100*0.1
    + $0*0.9 = $110, so clearly, we should (in theory) choose this prize option over
    the others. In terms of ranking, we would give the third prize option the top
    rank, and jointly give the other two prize options the second rank. Readers who
    wish to gain a deeper understanding of the above discussion are encouraged to
    review the theory section and selected case studies in [this](https://towardsdatascience.com/expected-value-analysis-in-ai-product-management/)
    article.'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 假设你赢得了一场比赛，面前有三个奖品选项：（1）保证$100，（2）50%的机会赢得$200，和（3）10%的机会赢得$1100。你会选择哪个奖品，你会如何整体排名这些奖品？虽然一等奖保证了一定的回报，但后两个选项带有不同程度的风险。然而，二等奖的预期回报是$200*0.5
    + $0*0.5 = $100，所以（至少在理论上）我们应该对接受前两个奖品无动于衷；毕竟，它们的预期回报是相同的。同时，三等奖的预期回报是$1100*0.1
    + $0*0.9 = $110，所以（在理论上）我们应该选择这个奖品选项，而不是其他选项。在排名方面，我们会将三等奖选项排在首位，并将其他两个奖品选项并列排在第二位。希望对上述讨论有更深入理解的读者被鼓励去回顾这篇文章中的理论部分和选定的案例研究[这篇文章](https://towardsdatascience.com/expected-value-analysis-in-ai-product-management/)。
- en: The preceding analysis assumes that we are what economists might refer to as
    *perfectly rational agents*, always making optimal choices based on the available
    information. But in reality, of course, we tend to be anything but perfectly rational.
    As human beings, we are plagued by a number of so-called *behavioral biases* (or
    *cognitive biases*), which — despite their potential evolutionary rationale —
    can often impair our judgment and lead to suboptimal decisions. One important
    behavioral bias that may have affected your choice of prize in the above example
    is called *loss aversion*, which is about having greater sensitivity to losses
    than gains. Since the first prize option represents a certain gain of $100 (i.e.,
    no feeling of loss), whereas the third prize option comes with a 90% possibility
    of gaining nothing, loss aversion (or risk aversion) may lead you to opt for the
    first — theoretically suboptimal — prize option. In fact, even the way the prize
    options are framed or presented can affect your decision. Framing the third prize
    option as “a 10% chance of winning $1100” may make it seem more attractive than
    framing it as “a 90% risk of getting nothing and a 10% chance of getting $1100,”
    since the latter framing suggests the possibility of a loss (compared to the guaranteed
    $100), and makes no explicit mention of “winning.”
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 前面的分析假设我们是经济学家可能称之为**完全理性代理人**的，总是基于可用信息做出最优选择。但在现实中，当然，我们往往远非完全理性。作为人类，我们受到许多所谓的**行为偏差**（或**认知偏差**）的困扰，尽管它们可能有潜在的进化合理性，但往往会影响我们的判断，导致次优决策。一个可能影响你在上述例子中选择奖品的重要行为偏差被称为**损失厌恶**，它是指对损失比收益更敏感。由于一等奖选项代表一定的$100（即没有损失的感觉），而三等奖选项有90%的可能性一无所获，因此损失厌恶（或风险厌恶）可能会让你选择一等奖——理论上次优的奖品选项。事实上，奖品选项的表述或呈现方式也可能影响你的决定。将三等奖选项表述为“有10%的机会赢得$1100”可能比表述为“有90%的风险一无所获和10%的机会赢得$1100”更有吸引力，因为后者表述暗示了损失的可能性（与保证的$100相比），并且没有明确提到“赢得”。
- en: Guarding against suboptimal decisions resulting from behavioral biases is vital
    when developing and executing a sound AI strategy, especially given the hype surrounding
    generative AI since ChatGPT was released to the public in late 2022\. Nowadays,
    the topic of AI has board-level attention at companies across industry sectors
    and calling a company “AI-first” is likely to boost its stock price. The potentially
    game-changing impact of AI (which could significantly bring down the cost of creating
    many goods and services) is often compared to pivotal moments in history such
    as the emergence of the Internet (which reduced the cost of distribution), and
    cloud computing (which reduced the cost of IT ownership). The hype around AI,
    even if it may be justified in some cases, puts tremendous pressure on decision
    makers in leadership positions to jump on the AI bandwagon despite often being
    ill-prepared to do so effectively. Many companies lack access to the kind of data
    and AI talent that would let them build competitive AI products. Piggybacking
    on third-party providers may seem expedient in the short-term, but entails long-term
    risks due to vendor lock-in.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 在开发和执行稳健的AI战略时，防范由行为偏差导致的次优决策至关重要，尤其是在ChatGPT于2022年底向公众发布后，围绕生成式AI的炒作日益升温。如今，AI的话题在各个行业公司的董事会层面都受到关注，将公司称为“AI优先”可能会提升其股价。AI可能带来的颠覆性影响（可能显著降低许多商品和服务的创造成本）常被比作历史上的关键时刻，如互联网的出现（降低了分销成本），以及云计算（降低了IT拥有成本）。尽管在某些情况下可能是合理的，但围绕AI的炒作给领导层中的决策者带来了巨大的压力，使他们不得不跳上AI的列车，尽管他们通常没有准备好有效地这样做。许多公司缺乏构建具有竞争力的AI产品所需的数据和AI人才。短期内依赖第三方提供商可能看似方便，但会因供应商锁定而带来长期风险。
- en: 'Against this backdrop, company leaders can use probabilistic thinking — and
    the concept of expected value, in particular — to counter common behavioral biases
    such as:'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 在这样的背景下，公司领导者可以利用概率思维——特别是预期价值的概念——来对抗常见的认知偏差，例如：
- en: '**Herd mentality**: Decision makers tend to follow the crowd. If a CEO sees
    her counterparts at other companies making substantial investments in generative
    AI, she may feel compelled to do the same, even though the risks and limitations
    of the new technology have not been thoroughly evaluated, and her product teams
    may not yet be ready to properly take on the challenge. This bias is closely related
    to the so-called fear of missing out (FOMO). Product leaders can help steer colleagues
    in the C-suite away from potentially misguided “follow the herd,” FOMO-driven
    decisions by arguing in favor of creating a diverse set of real options and prioritizing
    these options based on expected value.'
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**羊群效应**：决策者往往倾向于跟随大众。如果一位CEO看到其他公司的同行在生成式AI上进行了大量投资，她可能会感到不得不做同样的事情，即使新技术的风险和局限性尚未得到充分评估，而且她的产品团队可能还没有准备好妥善应对这一挑战。这种偏见与所谓的“错失恐惧症”（FOMO）密切相关。产品领导者可以通过主张创建一个多样化的真实选项集，并根据预期价值对这些选项进行优先排序，来帮助引导C级管理层同事避免可能误导性的“跟随羊群”、由FOMO驱动的决策。'
- en: '**Overconfidence**: Product leaders may overestimate their ability to predict
    the success of new AI-powered products. They might think that they understand
    the underlying technology and the likely receptiveness of customers to the new
    AI products better than they actually do, leading to unwarranted confidence in
    their investment decisions. Overconfidence can lead to excessive risk-taking,
    especially when dealing with unproven technologies such as generative AI. Expected
    value analysis can help temper this confidence and lead to more prudent decision
    making.'
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**过度自信**：产品领导者可能会高估他们预测新AI产品成功的能力。他们可能认为他们比实际情况更了解底层技术和客户对新AI产品的可能接受度，这导致他们对投资决策的不当自信。过度自信可能导致过度冒险，尤其是在处理未经证实的如生成式AI等技术时。预期价值分析可以帮助缓和这种自信，并导致更谨慎的决策。'
- en: '**Sunk cost fallacy**: This logical fallacy is often referred to as “throwing
    good money after bad.” It happens when product leaders and teams believe that
    past investments in something justify additional future investments, even if the
    return on all these investments may be negative. For example, product leaders
    today may feel compelled to allocate more and more resources to products built
    using generative AI, even though the expected returns may be negative due to issues
    related to hallucinations, data privacy, safety and security. Thinking in terms
    of expected value can help guard against this fallacy.'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**沉没成本谬误**：这种逻辑谬误通常被称为“将好钱扔进坏水里”。它发生在产品领导和团队认为对某事物的过去投资可以证明未来进行更多投资的合理性，即使所有这些投资的回报可能为负。例如，今天的产品领导可能会感到有必要继续为使用生成式AI构建的产品分配越来越多的资源，即使由于幻觉、数据隐私、安全和安保等问题，预期的回报可能是负的。从预期值的角度思考可以帮助防范这种谬误。'
- en: '**Confirmation bias**: Company leaders and managers may tend to seek out information
    that confirms their existing beliefs, leaving them blind to vital information
    that might counter these beliefs. For instance, when evaluating (generative) AI,
    product managers might selectively focus on success stories and findings from
    user research that align with their preconceptions, making it harder to objectively
    assess limitations and risks. By analyzing the expected value of AI investments,
    product managers can challenge unfounded assumptions, and make rational decisions
    without being swayed by prior beliefs or selective information. Crucially, the
    concept of expected value allows beliefs to be updated based on new information
    and encourages a prudent, long-term view of decision making.'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**确认偏差**：公司领导和经理可能倾向于寻找证实他们现有信念的信息，使他们无法看到可能反驳这些信念的重要信息。例如，在评估（生成式）AI时，产品经理可能会选择性地关注与他们的先入之见一致的成功故事和用户研究结论，这使得客观评估局限性和风险变得更加困难。通过分析AI投资的预期值，产品经理可以挑战无根据的假设，并做出不受先前信念或选择性信息影响的理性决策。关键的是，预期值的概念允许根据新信息更新信念，并鼓励决策的谨慎、长期视角。'
- en: See [this](https://en.wikipedia.org/wiki/List_of_cognitive_biases) Wikipedia
    article for a more exhaustive list of such biases.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 请参阅[这篇](https://en.wikipedia.org/wiki/List_of_cognitive_biases)维基百科文章，以获取此类偏差的更详尽列表。
- en: The Wrap
  id: totrans-22
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 封面
- en: As this article demonstrates, probabilistic thinking in terms of expected values
    can help shape a company’s AI strategy in several ways, from discovering real
    options and constructing robust product portfolios to guarding against behavioral
    biases. The relevance of probabilistic thinking is perhaps not entirely surprising,
    given that most companies today operate in a so-called “VUCA” business environment,
    which is characterized by varying degrees of volatility, uncertainty, complexity,
    and ambiguity. In this context, expected value analysis encourages decision makers
    to recognize and quantify the uncertainty of future pay-offs, and act prudently
    to capture value while mitigating risks. Overall, probabilistic thinking as a
    strategic toolkit is likely to gain importance in a future where uncertain technologies
    such as AI play an outsized role in shaping company growth and shareholder value.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 如本文所示，从预期值的角度进行概率性思考可以帮助以多种方式塑造公司的AI战略，从发现真实选项和构建稳健的产品组合到防范行为偏差。考虑到大多数公司今天都在所谓的“VUCA”商业环境中运营，这种环境以不同程度的波动性、不确定性、复杂性和模糊性为特征，概率性思考的相关性可能并不完全令人惊讶。在这种情况下，预期值分析鼓励决策者识别和量化未来收益的不确定性，并谨慎行事以捕捉价值同时减轻风险。总体而言，概率性思考作为一种战略工具包，在不确定技术如AI在未来扮演重要角色塑造公司增长和股东价值的世界中可能会变得更加重要。
