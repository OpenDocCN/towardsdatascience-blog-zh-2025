- en: 'The Reinforcement Learning Handbook: A Guide to Foundational Questions'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/the-handbook-of-reinforcement-learning-guide-to-the-foundational-questions/](https://towardsdatascience.com/the-handbook-of-reinforcement-learning-guide-to-the-foundational-questions/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1762406740493" class="mdspan-comment">This article will
    explain</mdspan> the fundamental concepts you need to know to understand Reinforcement
    Learning!
  prefs: []
  type: TYPE_NORMAL
- en: We will progress from the absolute basics of “*what even is RL*” to more advanced
    topics, including agent exploration, values and policies, and distinguish between
    popular training approaches. Along the way, we will also learn about the various
    challenges in RL and how researchers have tackled them.
  prefs: []
  type: TYPE_NORMAL
- en: At the end of the article, I will also share a YouTube video I made that explains
    all the concepts in this article in a visually engaging way. If you are not much
    of a reader, you can check out that companion video instead!
  prefs: []
  type: TYPE_NORMAL
- en: '*Note: All images are produced by the author unless otherwise specified.*'
  prefs: []
  type: TYPE_NORMAL
- en: Reinforcement Learning Basics
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Suppose you want to train an AI model to learn how to navigate an obstacle course.
    RL is a branch of Machine Learning where our models learn by collecting experiences
    – taking actions and observing what happens. More formally, RL consists of two
    components – the agent and the environment.
  prefs: []
  type: TYPE_NORMAL
- en: The Agent
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The learning process involves two key activities that happen over and over
    again: **exploration** and **training**. During exploration, the agent collects
    experiences in the environment by taking actions and finding out what happens.
    And then, during the training activity, the agent uses these collected experiences
    to improve itself.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/2794ed2ee3c955d39c3b09ef728aa9e6.png)'
  prefs: []
  type: TYPE_IMG
- en: The agent collects experiences in the environment, and uses these experience
    to train a policy
  prefs: []
  type: TYPE_NORMAL
- en: The Environment
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Once the agent selects an action, the environment updates. It also returns a
    reward depending on how well the agent is doing. The environment designer programs
    how the reward is structured.
  prefs: []
  type: TYPE_NORMAL
- en: For example, suppose you are working on an environment that teaches an AI to
    avoid obstacles and reach the goal. You can program your environment to return
    a positive reward when the agent is moving closer to the goal. But if the agent
    collides with an obstacle, you can program it to receive a large negative reward.
  prefs: []
  type: TYPE_NORMAL
- en: In other words, the environment provides a *positive reinforcement* (a high
    positive reward, for example) when the agent does something *good* and a *punishment*
    (a negative reward for example) when it does something *bad.*
  prefs: []
  type: TYPE_NORMAL
- en: Although the agent is oblivious to how the environment actually operates, it
    can still determine from its reward patterns how to pick optimal actions that
    lead to maximum rewards.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/48b6867e9f3564dfe3ac81de783b10f8.png)'
  prefs: []
  type: TYPE_IMG
- en: The environment and the agent are at the center of RL
  prefs: []
  type: TYPE_NORMAL
- en: Policy
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: At each step, the agent AI observes the current state of the environment and
    selects an action. The goal of RL is to learn a mapping from observations to actions,
    i.e. **“given the state I am observing, what action should I choose”?**
  prefs: []
  type: TYPE_NORMAL
- en: '**In RL terms, this mapping from the state to action is also called a policy.**'
  prefs: []
  type: TYPE_NORMAL
- en: This policy defines how the agent behaves in different states, and in *deep*
    reinforcement learning we learn this function by training some kind of a *deep*
    neural network.
  prefs: []
  type: TYPE_NORMAL
- en: Reinforcement Learning
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '![](../Images/e9cd1a517645675a4be87bd73e005554.png)'
  prefs: []
  type: TYPE_IMG
- en: The agent observes state S, queries a network to generate action A. The environment
    executes the action and returns a reward r and the next state s’. This continues
    until the episode terminates. Each step the agent takes is later used to train
    the agent’s policy network.
  prefs: []
  type: TYPE_NORMAL
- en: Understanding the distinctions and interplay between the agent, the policy,
    and the environment is very integral to understand Reinforcement Learning.
  prefs: []
  type: TYPE_NORMAL
- en: The Agent is the learner that explores and takes actions within the environment
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The Policy is the strategy (often a neural network) that the agent uses to determine
    which action to take given a state. In RL, our ultimate goal is to train this
    strategy.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The Environment is the external system that the agent interacts with, which
    provides feedback in the form of rewards and new states.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Here is a quick one-liner definition you should remember:'
  prefs: []
  type: TYPE_NORMAL
- en: In Reinforcement Learning, the **agent** follows a **policy** to select actions
    within the **environment**.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Observations and Actions
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The agent explores the environment by taking a sequence of “steps”. Each step
    is one decision. The agent *observes* the environment’s state. Decideson an *action*.
    Receives a *reward*. Observes the *next state*. In this section, let’s understand
    what observations and actions are.
  prefs: []
  type: TYPE_NORMAL
- en: Observation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Observation is what the agent sees from the environment – the information it
    receives about the environment’s current state. In an obstacle navigation environment,
    the observation might be LiDAR projections to detect the obstacles. For Atari
    games, it might be a history of the last few pixel frames. For text generation,
    it might be the context of the generated tokens so far. In chess, it is the position
    of all the pieces, whose move it is, etc.
  prefs: []
  type: TYPE_NORMAL
- en: The observation ideally contains all the information the agent needs to take
    an action.
  prefs: []
  type: TYPE_NORMAL
- en: The action space is all the available decisions the agent can take. Actions
    can be discrete or continuous. A discrete action space is when the agent has to
    choose between a specific set of categorical decisions. For example, in Atari
    games, the actions might be the buttons of an Atari controller. For text generation,
    it is to choose between all the tokens present in the model’s vocabulary. In chess,
    it could be a list of available moves.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/3108ebf8b24d914b1ddc0a25c6006b7c.png)'
  prefs: []
  type: TYPE_IMG
- en: Example of an observation and action picked by an RL agent learning to navigate
    an obstacle course
  prefs: []
  type: TYPE_NORMAL
- en: The environment designer can also choose a continuous action space – where the
    agent generates continuous values to take a “step” in the environment. For example,
    in our obstacle navigation example, the agent can choose the x and y velocities
    to get a fine grain control of the movement. In a human character control task,
    the action is often to output the torque or target angle for every joint in the
    character’s skeleton.
  prefs: []
  type: TYPE_NORMAL
- en: The most important lesson
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'But here is something very important to understand: To the agent and the policy
    – the environment and its specifics can be a complete black box. The agent will
    receive vector-state information as an observation, generate an action, receive
    a reward, and later learn from it.'
  prefs: []
  type: TYPE_NORMAL
- en: So in your mind, you can consider the agent and the environment as two separate
    entities. The environment defines the state space, the action space, the reward
    strategies, and the rules.
  prefs: []
  type: TYPE_NORMAL
- en: These rules are decoupled from how the agent explores and how the policy is
    trained on the collected experiences.
  prefs: []
  type: TYPE_NORMAL
- en: When studying a research paper, it is important to clarify in our mind which
    aspect of RL we are reading about. Is it about a new environment? Is it about
    a new policy training method? Is it about an exploration strategy? Depending on
    the answer, you can treat other things as a black box.
  prefs: []
  type: TYPE_NORMAL
- en: Exploration
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: How does the agent explore and collect experiences?
  prefs: []
  type: TYPE_NORMAL
- en: Every RL algorithm must solve one of the largest dilemmas in training RL agents
    – exploration vs exploitation.
  prefs: []
  type: TYPE_NORMAL
- en: '**Exploration means trying out new actions to gather information about the
    environment.** Imagine you are learning to fight a boss in a difficult video game.
    At first, you are going to try different approaches, different weapons, spells,
    random things just to see what sticks and what doesn’t.'
  prefs: []
  type: TYPE_NORMAL
- en: However, once you start seeing some rewards, like consistently deal damage to
    the boss, you will stop exploring and start exploiting the strategy you have already
    acquired. **Exploitation means greedily picking actions you think will get the
    best rewards.**
  prefs: []
  type: TYPE_NORMAL
- en: A good RL exploration strategy must balance exploration and exploitation.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: A popular exploration strategy is **Epsilon-Greedy**, where the agent explores
    with a random action a fraction of the time (defined by a parameter epsilon),
    and exploits its best-known action the rest of the time. This epsilon value is
    usually high at the start and is gradually decreased to favor exploitation as
    the agent learns.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c80472940d86e61c54d8fa1455d83505.png)'
  prefs: []
  type: TYPE_IMG
- en: Epsilon Greedy is an exploration method where the RL Agent selects a random
    action from time to time
  prefs: []
  type: TYPE_NORMAL
- en: Epsilon greedy only works in discrete action spaces. In continuous spaces, exploration
    is often handled in two popular ways. One way is to add a bit of random noise
    to the action the agent decides to take. Another popular technique is to add an
    **entropy bonus** to the loss function, which encourages the policy to be less
    certain about its choices, naturally leading to more varied actions and exploration.
  prefs: []
  type: TYPE_NORMAL
- en: 'Some other ways to encourage exploration are:'
  prefs: []
  type: TYPE_NORMAL
- en: Design the environment to use random initialization of states at the beginning
    of the episodes.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Intrinsic exploration methods where the agent acts out of its own “curiosity.”
    Algorithms like Curiosity and RND reward the agent for visiting novel states or
    taking actions where the outcome is hard to predict.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I cover these fascinating methods in my Agentic Curiosity video, so be sure
    to check that out!
  prefs: []
  type: TYPE_NORMAL
- en: Training Algorithms
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A majority of research papers and academic topics in Reinforcement Learning
    are about optimizing the agent’s strategy to pick actions. The goal of optimization
    algorithms is to learn actions that maximize the long-term expected rewards.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s take a look at the different algorithmic choices one by one.
  prefs: []
  type: TYPE_NORMAL
- en: Model-Based vs Model-Free
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Alright, so our agent has explored the environment and collected a ton of experience.
    Now what?
  prefs: []
  type: TYPE_NORMAL
- en: Does the agent learn to act directly from these experiences? Or does it first
    try to model the environment’s dynamics and physics?
  prefs: []
  type: TYPE_NORMAL
- en: One approach is **model-based learning.** Here, the agent first uses its experience
    to build its own internal simulation, or a world model. This model learns to predict
    the consequences of its actions, i.e., given a state and action, what is the resulting
    next state and reward? Once it has this model, it can practice and plan entirely
    within its own imagination, running thousands of simulations to find the best
    strategy without ever taking a risky step in the real world.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/757cbe7c16cc41024e93569a1b6cc06a.png)'
  prefs: []
  type: TYPE_IMG
- en: Model-based RL learns a separate model to learn how the environment works
  prefs: []
  type: TYPE_NORMAL
- en: 'This is particularly useful in environments where collecting real world experience
    can be expensive – like robotics or self-driving cars. Examples of Model-Based
    RL are: [Dyna-Q](https://arxiv.org/abs/1801.06176), [World Models](https://arxiv.org/abs/1803.10122),
    [Dreamer](https://arxiv.org/abs/2301.04104), etc. I’ll write a separate article
    someday to cover these models in more detail.'
  prefs: []
  type: TYPE_NORMAL
- en: The second is called **model-free learning**. This is what the rest of the article
    is going to cover. Here, the agent treats the environment as a black box and learns
    a policy directly from the collected experiences. Let’s talk more about Model-free
    RL in the next section.
  prefs: []
  type: TYPE_NORMAL
- en: Value-Based Learning
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: There are two main approaches to model-free RL algorithms.
  prefs: []
  type: TYPE_NORMAL
- en: Value-based algorithms learn to evaluate how good each state is. Policy-based
    algorithms learn directly how to act in each state.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b40bc2ff29ee935d69de850252ba80a3.png)'
  prefs: []
  type: TYPE_IMG
- en: Value Based vs Policy Based methods
  prefs: []
  type: TYPE_NORMAL
- en: In value-based methods, the RL agent learns the *“value”* of being in a specific
    state. The value of a state literally means how good the state is. The intuition
    is that if the agent knows which states are good, it can pick actions that lead
    to those states more regularly.
  prefs: []
  type: TYPE_NORMAL
- en: And thankful there is a mathematical way of doing this – **the Bellman Equation**.
  prefs: []
  type: TYPE_NORMAL
- en: '**V(s) = r + γ * max V(s’).**'
  prefs: []
  type: TYPE_NORMAL
- en: This recurrence equation basically says the **value** **V(s)** of *state s*
    is equal to the immediate **reward r** of being in the state plus the **value**of
    the best *next-state s*‘ the agent can reach from s. Gamma (**γ**) is a discounted
    factor (between 0 and 1) that nerfs the goodness of the next state. It essentially
    decides how much the agent cares about rewards in the distant future versus immediate
    rewards. A **γ** close to **1** makes the agent “far-sighted,” whereas a **γ**
    close to **0** makes the agent “short-sighted,” greedily caring almost only about
    the very next reward.
  prefs: []
  type: TYPE_NORMAL
- en: Q-Learning
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We learnt the intuition behind state values, but how do we use that information
    to learn actions? The Q-Learning equation answers this.
  prefs: []
  type: TYPE_NORMAL
- en: '**Q(s, a) = r + γ * max_a Q(s’, a’)**'
  prefs: []
  type: TYPE_NORMAL
- en: 'The Q-value Q(s,a) is the ***q**uality-value* of the action a in state s. The
    above equation basically states: The quality of an action a in state s is the
    immediate reward **r** you get from being in state s, plus the discounted quality
    value of the next best action.'
  prefs: []
  type: TYPE_NORMAL
- en: 'So in summary:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Q-values** are the quality values of each action in each state.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**V-values** are the value of a specific state; it is equal to the maximum
    Q-value of all actions in that state.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Policy π** at a specific state is the action that has the highest Q-value
    in that state.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/9e7ac8d6798ed309f12dcc3eb44298ad.png)'
  prefs: []
  type: TYPE_IMG
- en: Q-values, State values, and Policy are deeply interconnected
  prefs: []
  type: TYPE_NORMAL
- en: To learn more about Q-Learning, you can research [Deep Q Networks](https://arxiv.org/abs/1312.5602),
    and their descendants, like [Double Deep Q Networks](https://arxiv.org/abs/1509.06461)
    and [Dueling Deep Q Networks.](https://arxiv.org/abs/1511.06581)
  prefs: []
  type: TYPE_NORMAL
- en: Value-based learning trains RL agents by learning the value of being in specific
    states. However, is there a direct way to learn optimal actions without needing
    to learn state values? Yes.
  prefs: []
  type: TYPE_NORMAL
- en: Policy learning methods directly learn optimal action strategies without explicitly
    learning state values. Before we learn how, we must learn another important concept
    first. Temporal Difference Learning vs Monte Carlo Sampling.
  prefs: []
  type: TYPE_NORMAL
- en: TD Learning vs MC Sampling
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: How does the agent consolidate future experiences to learn?
  prefs: []
  type: TYPE_NORMAL
- en: In Temporal Difference (TD) Learning, the agent updates its value estimates
    after every single step using the Bellman equation. And it does so by seeing its
    own estimate of the Q-value in the next state. This strategy is called 1-step
    TD Learning, or one-step Temporal Difference Learning. You take one step and update
    your learning based on your past estimates.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/fd71e3285696b187e38d206ac9c99e9b.png)'
  prefs: []
  type: TYPE_IMG
- en: In TD Learning, we take one step and use the value estimates of the next state
  prefs: []
  type: TYPE_NORMAL
- en: 'The second option is called Monte-Carlo sampling. Here, the agent waits for
    the entire episode to finish before updating anything. And then it uses the complete
    return from the episode:'
  prefs: []
  type: TYPE_NORMAL
- en: Q(s,a) = r₁ + γr₂ + γ²r₃ + … + γⁿrₙ
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/768bcadb26c5a2d940af4857113d57fd.png)'
  prefs: []
  type: TYPE_IMG
- en: In MC Sampling, we complete the entire episode to compute the estimates from
    actual rewards
  prefs: []
  type: TYPE_NORMAL
- en: Trade-offs between TD Learning and MC Sampling
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: TD Learning is pretty cool coz the agent can learn something from every single
    step, even before it completes an episode. Meaning you can save your collected
    experiences for a long time and keep training even on old experiences, but with
    new Q-values.  However, TD learning is heavily biased by the agent’s current estimate
    of the state. So if the agent’s estimates are wrong, it will keep reinforcing
    those wrong estimates. This is called the “*bootstrapping problem*.”
  prefs: []
  type: TYPE_NORMAL
- en: On the other hand, Monte Carlo learning is always accurate because it uses the
    true returns from actual episodes. But in most RL environments, rewards and state
    transitions can be random. Also, as the agent explores the environment, its own
    actions can be random, so the states it visits during rollout are also random.
    This results in the pure TD-Learning method suffering from high variance issues
    as returns can vary dramatically between episodes.
  prefs: []
  type: TYPE_NORMAL
- en: Policy Gradients
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Alright, now that we have understood the concept of TD-Learning vs MC Sampling,
    it’s time to get back to Policy-Based Learning methods.
  prefs: []
  type: TYPE_NORMAL
- en: Recall that value-based methods like DQN first have to explicitly calculate
    the value, or Q-value, for every single possible action, and then they pick the
    best one. But it is possible to skip this step, and Policy Gradient methods like
    **REINFORCE** do exactly that.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d809460068f311630238f6edc79592bb.png)'
  prefs: []
  type: TYPE_IMG
- en: Policy gradient methods input the state and output the probability of actions
    to take
  prefs: []
  type: TYPE_NORMAL
- en: In REINFORCE, the policy network outputs probabilities for each action, and
    we train it to increase the probability of actions that lead to good outcomes.
    For discrete spaces, PG methods output the probability of each action as a categorical
    distribution. For continuous spaces, PG methods output as Gaussian distributions,
    predicting the mean and standard deviation of each element in the action vector.
  prefs: []
  type: TYPE_NORMAL
- en: So the question is, how exactly do you train such a model that directly predicts
    action probabilities from states?
  prefs: []
  type: TYPE_NORMAL
- en: Here is where the **Policy Gradient Theorem** comes in. In this article, I will
    explain the core idea intuitively.
  prefs: []
  type: TYPE_NORMAL
- en: Our policy gradient model is often denoted in the literature as pi_theta(a|s).
    Here, theta denotes the weights of the neural network. pi_theta(a|s) is the predicted
    probability of action a in state s by neural network theta.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: From a newly initialized policy network, we let the agent play out a full episode
    and collect all the rewards.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For every action it took, figure out the total discounted return that came after
    it. This is done using the Monte Carlo approach.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Finally, to actually train the model, the policy gradient theorem asks us to
    maximize the formula provided in the figure below.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If the return was high, this update will make that action more probable in the
    future by increasing pi(a|s). If the return was negative, this update will make
    the action less probable by reducing the pi(a|s).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/93e7e8ca98426f0b38d10f5bca28c2f2.png)'
  prefs: []
  type: TYPE_IMG
- en: Policy Gradients
  prefs: []
  type: TYPE_NORMAL
- en: '**The distinction between Q-Learning and REINFORCE**'
  prefs: []
  type: TYPE_NORMAL
- en: One of the core differences between Q-Learning and REINFORCE is that Q-Learning
    uses 1-step TD Learning, and REINFORCE uses Monte Carlo Sampling.
  prefs: []
  type: TYPE_NORMAL
- en: By using 1-step TD, Q-learning must determine the quality value Q of each state-action
    possibility. Because recall that in 1-step TD the agent can take just one step
    in the environment and determine a quality score of the state.
  prefs: []
  type: TYPE_NORMAL
- en: On the other hand, with Monte Carlo sampling, the agent does not need to rely
    on an estimator to learn. Instead, it uses actual returns observed during exploration.
    This makes REINFORCE “unbiased” with the caveat that it requires multiple samples
    to correctly estimate the value of a trajectory. Furthermore, the agent cannot
    train until it fully finishes a trajectory (that is reach a terminal state), and
    it cannot reuse trajectories after the policy network updates.
  prefs: []
  type: TYPE_NORMAL
- en: In practice, REINFORCE often leads to stability issues and sample inefficiency.
    Let’s talk about how Actor Critic addresses these limitations.
  prefs: []
  type: TYPE_NORMAL
- en: Advantage Actor Critic
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: If you try to use vanilla REINFORCE on most complex problems, it will struggle,
    and the reason why is twofold.
  prefs: []
  type: TYPE_NORMAL
- en: The first is because it suffers from high variance coz it’s a Monte Carlo sampling
    method. Second, it has no sense of baseline. Like, imagine an environment that
    always gives you a positive reward, then the returns will never be negative, so
    REINFORCE will increase the probabilities of all actions, albeit in a disproportionate
    way.
  prefs: []
  type: TYPE_NORMAL
- en: We don’t want to reward actions just for getting a positive score. We want to
    reward them for being **better than average**.
  prefs: []
  type: TYPE_NORMAL
- en: 'And that is where the concept of *advantage* becomes important. Instead of
    just using the raw return to update our policy, we’ll subtract the expected return
    for that state. So our new update signal becomes:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Advantage = The Return you got – The Return you expected**'
  prefs: []
  type: TYPE_NORMAL
- en: While Advantage gives us a baseline for our observed returns, let’s also discuss
    the concept of Actor Critic methods.
  prefs: []
  type: TYPE_NORMAL
- en: '**Actor Critic** combines the best of Value-Based Methods (like DQN) and the
    best of Policy-Based Methods (like REINFORCE). Actor Critic methods train a separate
    “critic” neural network that is only trained to evaluate states, much like the
    Q-Network from earlier.'
  prefs: []
  type: TYPE_NORMAL
- en: The actor method, on the other hand, learns the policy.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/4e64288b37a8f984a521c63c06b266d4.png)'
  prefs: []
  type: TYPE_IMG
- en: Advantage Actor Critic
  prefs: []
  type: TYPE_NORMAL
- en: 'Combining Advantage and Actor critics, we can understand how the [popular A2C
    algorithm](https://arxiv.org/abs/1602.01783) works:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Initialize 2 neural networks: the policy or actor network, and the value or
    critic network. The actor network inputs a state and outputs action probabilities.
    The critic network inputs a state and outputs a single float representing the
    state’s value.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We generate some rollouts in the environment by querying the actor
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We update the critic network using either TD Learning or Monte Carlo Learning.
    There are more advanced approaches, like [Generalized Advantage Estimates](https://arxiv.org/abs/1506.02438)
    as well, that combine the two approaches for more stable learning.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We evaluate the advantage by subtracting the observed return from the average
    return generated by the Critic Network
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Finally, we update the Policy network by using the advantage and the policy
    gradient equation.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Actor-critic methods solve the variance problem in policy gradients by using
    a value function as a baseline. PPO (Proximal Policy Optimization) extends A2C
    by adding the concepts of “trust regions” into the learning algorithm, which prevents
    excessive changes to the network weights during learning. We won’t get into details
    about [PPO](https://arxiv.org/abs/1707.06347) in this article; maybe someday we
    will open that Pandora’s box.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This article is a companion piece to the YouTube video below I made. Feel free
    to check it out, if you enjoyed this read.
  prefs: []
  type: TYPE_NORMAL
- en: Every algorithm makes specific choices for each question, and these choices
    cascade through the entire system, affecting everything from sample efficiency
    to stability to real-world performance.
  prefs: []
  type: TYPE_NORMAL
- en: In the end, creating an RL algorithm is about answering these problems by making
    your choices. DQNs choose to learn values. policy methods directly learns a **policy**.
    Monte Carlo methods update after a full episode using actual returns – this makes
    them unbiased, but they have high variance because of the stochastic nature of
    RL exploration. TD Learning instead chooses to learn at every step based on the
    agent’s own estimates. Actor Critic methods combine DQNs and Policy Gradients
    by learning an actor and a critic network separately.
  prefs: []
  type: TYPE_NORMAL
- en: Note that there’s a lot we didn’t cover today. But this is a good base to get
    you started with Reinforcement Learning.
  prefs: []
  type: TYPE_NORMAL
- en: That’s the end of this article, see you in the next one! You can use the links
    below to discover more of my work.
