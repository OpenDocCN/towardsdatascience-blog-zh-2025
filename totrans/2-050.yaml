- en: 'Estimating from No Data: Deriving a Continuous Score from Categories'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 从无数据中估计：从类别中推导出连续分数
- en: 原文：[https://towardsdatascience.com/estimating-from-no-data-deriving-a-continuous-score-from-categories/](https://towardsdatascience.com/estimating-from-no-data-deriving-a-continuous-score-from-categories/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/estimating-from-no-data-deriving-a-continuous-score-from-categories/](https://towardsdatascience.com/estimating-from-no-data-deriving-a-continuous-score-from-categories/)
- en: '<mdspan datatext="el1754947735246" class="mdspan-comment">Imagine that a country</mdspan>
    has collected data on the outcomes of patients who have acquired “Pathogen A”
    responsible for an infectious respiratory illness. Available are 8 features of
    each patient and the outcome: (a) treated at home and recovered, (b) hospitalized
    and recovered, or (c) died.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1754947735246" class="mdspan-comment">想象一个国家</mdspan>收集了感染了导致呼吸道传染病的“病原体A”的患者结果数据。每个患者都有8个特征和结果：（a）在家治疗并康复，（b）住院并康复，或（c）死亡。
- en: 'It has proven trivial to train a neural net to predict one of the three outcomes
    from the 8 features with almost complete accuracy. However, the health authorities
    would like to predict something that was not captured: From the patients who can
    be treated at home, who are the ones who are most at danger of having to go to
    hospital? And from the patients who are predicted to be hospitalized, who are
    the ones who are most at danger of not surviving the infection? Can we get a numeric
    score that represents how serious the infection will be?'
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 已经证明，训练一个神经网络从8个特征中几乎完全准确地预测三种结果之一是非常简单的。然而，卫生当局希望预测一些未被捕捉到的东西：对于那些可以在家中治疗的病人，谁是最有可能需要住院的？对于那些预测需要住院的病人，谁是最有可能无法从感染中幸存下来的？我们能否得到一个数值分数，表示感染将有多严重？
- en: In this note I will cover a neural net with a bottleneck and a special head
    to learn a scoring system from a few categories, and cover some properties of
    small neural networks one is likely to encounter. The accompanying code can be
    found at [https://codeberg.org/csirmaz/category-scoring](https://codeberg.org/csirmaz/category-scoring).
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇笔记中，我将介绍一个具有瓶颈和特殊头部的神经网络，从几个类别中学习评分系统，并介绍一些可能会遇到的小神经网络的一些属性。相关的代码可以在[https://codeberg.org/csirmaz/category-scoring](https://codeberg.org/csirmaz/category-scoring)找到。
- en: The dataset
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 数据集
- en: 'To be able to illustrate the work, I developed a toy example, which is a non-linear
    but [deterministic piece of code](https://codeberg.org/csirmaz/category-scoring/src/tag/v1.0/generate_data.py#L56)
    calculating the outcome from the 8 features. The calculation is for illustration
    only — it is not supposed to be faithful to the science; the names of the features
    used were chosen merely to be in keeping with the medical example. The 8 features
    used in this note are:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 为了能够说明这项工作，我开发了一个玩具示例，这是一个非线性但[确定性代码块](https://codeberg.org/csirmaz/category-scoring/src/tag/v1.0/generate_data.py#L56)，从8个特征计算结果。这个计算只是为了说明——它并不打算忠实于科学；所使用的特征名称仅是为了与医学示例保持一致。本笔记中使用的8个特征是：
- en: Previous infection with Pathogen A (boolean)
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 前期感染过病原体A（布尔值）
- en: Previous infection with Pathogen B (boolean)
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 前期感染过病原体B（布尔值）
- en: Acute / current infection with Pathogen B (boolean)
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 急性/当前感染病原体B（布尔值）
- en: Cancer diagnosis (boolean)
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 癌症诊断（布尔值）
- en: Weight deviation from average, arbitrary unit (-100 ≤ x ≤ 100)
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 体重偏离平均值，任意单位（-100 ≤ x ≤ 100）
- en: Age, years (0 ≤ x ≤ 100)
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 年龄，年数（0 ≤ x ≤ 100）
- en: Blood pressure deviation from average, arbitrary unit (0 ≤ x ≤ 100)
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 血压偏离平均值，任意单位（0 ≤ x ≤ 100）
- en: Years smoked (0 ≤ x ≤ ~88)
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 吸烟年数（0 ≤ x ≤ ~88）
- en: When generating sample data, the features are chosen independently and from
    a uniform distribution, except for years smoked, which depends on the age, and
    a cohort of non-smokers (50%) was built in. We checked that with this sampling
    the three outcomes occur with roughly equal probability, and measured the mean
    and variance of the number of years smoked so we could normalize all the inputs
    to zero mean unit variance.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 在生成样本数据时，特征是独立且从均匀分布中选择的，除了吸烟年数，它取决于年龄，并且建立了一个非吸烟者队列（50%）。我们检查了使用这种采样，三种结果发生的概率大致相等，并测量了吸烟年数的平均值和方差，以便我们可以将所有输入归一化到零均值单位方差。
- en: As an illustration of the toy example, below is a plot of the outcomes with
    the weight on the horizontal axis and age on the vertical axis, and other parameters
    fixed. “o” stands for hospitalization and “+” for death.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 以下是一个玩具示例的说明，展示了一个以权重为横坐标、年龄为纵坐标的图表，其他参数保持不变。“o”代表住院，“+”代表死亡。
- en: '[PRE0]'
  id: totrans-17
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: A classic classifier
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 一个经典的分类器
- en: The data is nonlinear but very neat, and so it is no surprise that a small classifier
    network can learn it to 98-99% validation accuracy. Launch `**train.py --classifier**`
    to train a simple neural network with 6 layers (each 8 wide) and ReLU activation,
    defined in `**[ScoringModel.build_classifier_model()](https://codeberg.org/csirmaz/category-scoring/src/tag/v1.0/scoring_model.py#L71)**`.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 数据是非线性的但非常整洁，因此一个小型分类器网络可以将其学习到98-99%的验证准确率并不令人惊讶。启动`**train.py --classifier**`来训练一个简单的神经网络，具有6层（每层8个神经元）和ReLU激活，定义在`**[ScoringModel.build_classifier_model()](https://codeberg.org/csirmaz/category-scoring/src/tag/v1.0/scoring_model.py#L71)**`中。
- en: But how to train a scoring system?
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 但如何训练一个评分系统呢？
- en: Our aim is then to train a system that, given the 8 features as inputs, can
    produce a score corresponding to the danger the patient is in when infected with
    Pathogen A. The complication is that we have no scores available in our training
    data, only the three outcomes (categories). To ensure that the scoring system
    is meaningful, we would like certain score ranges to correspond to the three main
    outcomes.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的目标是训练一个系统，给定8个特征作为输入，可以产生一个与患者感染病原体A时的危险程度相对应的评分。复杂性在于，我们的训练数据中没有评分，只有三个结果（类别）。为了确保评分系统有意义，我们希望某些评分范围对应于三个主要结果。
- en: The first thing someone may try is to assign a numeric value to each category,
    like 0 to home treatment, 1 to hospitalization and 2 to death, and use it as the
    target. Then set up a neural network with a single output, and train it with e.g.
    MSE loss.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 第一个人可能会尝试为每个类别分配一个数值，例如，将0分配给家庭治疗，1分配给住院，2分配给死亡，并将其用作目标。然后设置一个具有单个输出的神经网络，并用例如MSE损失进行训练。
- en: The problem with this approach is that the model will learn to contort (condense
    and expand) the projection of the inputs around the three targets, so ultimately
    the model will always return a value close to 0, 1 or 2\. You can try this by
    running `**train.py --predict-score**` which trains a model with 2 dense layers
    with ReLU activations and a final dense layer with a single output, defined in
    `**[ScoringModel.build_predict_score_model()](https://codeberg.org/csirmaz/category-scoring/src/tag/v1.0/scoring_model.py#L88)**`.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法的问题在于，模型会学会扭曲（压缩和扩展）三个目标周围的输入投影，因此最终模型总是会返回一个接近0、1或2的值。你可以通过运行`**train.py
    --predict-score**`来尝试，这将训练一个具有2个具有ReLU激活的密集层和单个输出的密集层，定义在`**[ScoringModel.build_predict_score_model()](https://codeberg.org/csirmaz/category-scoring/src/tag/v1.0/scoring_model.py#L88)**`中。
- en: '![Neural network diagram showing two dense layers with ReLU activations and
    a dense layer with one output](../Images/a1ccf385e5a58f3df06c48e81ce69e1d.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![展示具有ReLU激活的两个密集层和一个输出密集层的神经网络图](../Images/a1ccf385e5a58f3df06c48e81ce69e1d.png)'
- en: First attempt at learning a score (see build_predict_score_model). Image by
    author
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 第一次尝试学习评分（见`build_predict_score_model`）。图由作者提供
- en: As can be seen in the following histogram of the output of the model on a random
    batch of inputs, it is indeed what is happening – and this is with 2 layers only.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 如下所示，在随机输入批次上模型输出的直方图中，确实发生了这种情况——而且这仅仅使用了2层。
- en: '[PRE1]'
  id: totrans-27
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'Step 1: A low-capacity network'
  id: totrans-28
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第一步：一个低容量网络
- en: To avoid this from happening and get a more continuous score, we want to drastically
    reduce the capacity of the network to contort the inputs. We will go to the extreme
    and use a linear regression — in a [previous TDS article](https://medium.com/data-science/linear-and-logistic-regressions-as-degenerate-neural-networks-in-keras-c9b309cbd80a)
    I already described how to use the components offered by Keras to “train” one.
    We will reuse that idea here — and build a “degenerate” neural network out of
    a single dense layer with no activation. This will allow the score to move more
    in line with the inputs, and also has the advantage that the resulting network
    is highly interpretable, as it simply provides a weight for each input with the
    resulting score being their linear combination.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 为了避免这种情况并得到一个更连续的评分，我们希望大大减少网络扭曲输入的能力。我们将采取极端措施并使用线性回归——在[之前的TDS文章](https://medium.com/data-science/linear-and-logistic-regressions-as-degenerate-neural-networks-in-keras-c9b309cbd80a)中，我已经描述了如何使用Keras提供的组件“训练”一个。我们将重用这个想法——并使用单个密集层（无激活）构建一个“退化”神经网络。这将允许评分更符合输入，而且还有一个优点，即生成的网络高度可解释，因为它简单地为每个输入提供一个权重，而最终的评分是它们的线性组合。
- en: However, with this simplification, the model loses all ability to condense and
    expand the result to match the target scores for each category. It will try to
    do so, but especially with more output categories, there is no guarantee that
    they will occur at regular intervals in any linear combination of the inputs.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，随着这种简化的实施，模型失去了将结果压缩和扩展以匹配每个类别目标分数的所有能力。它将尝试这样做，但特别是在有更多输出类别的情况下，没有任何保证它们会在输入的任何线性组合中以规律的时间间隔发生。
- en: We want to enable the model to determine the best thresholds between the categories,
    that is, to make the thresholds trainable parameters. This is where the “category
    approximator head” comes in.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 我们希望使模型能够确定类别之间的最佳阈值，即使阈值成为可训练的参数。这就是“类别近似器头”发挥作用的地方。
- en: 'Step 2: A category approximator head'
  id: totrans-32
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第2步：类别近似器头
- en: In order to be able to train the model using the categories as targets, we add
    a head that learns to predict the category based on the score. Our aim is to simply
    establish two thresholds (for our three categories), t0 and t1 such that
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 为了能够使用类别作为目标来训练模型，我们添加了一个学习根据分数预测类别的头部。我们的目标是简单地建立两个阈值（对于我们的三个类别），t0 和 t1，使得
- en: if the score < t0, then we predict treatment at home and recovery,
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果分数 < t0，则我们预测在家接受治疗和康复，
- en: if t0 < score < t1, then we predict treatment in hospital and recovery,
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果 t0 < 分数 < t1，则我们预测在医院接受治疗和康复，
- en: if t1 < score, then we predict that the patient does not survive.
  id: totrans-36
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果 t1 < 分数，则我们预测患者无法存活。
- en: The model takes the shape of an encoder-decoder, where the encoder part produces
    the score, and the decoder part allows comparing and training the score against
    the categories.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 该模型采用编码器-解码器结构，其中编码器部分生成分数，解码器部分允许比较和训练分数与类别。
- en: '![Neural network diagram showing a dense layer with a single output, another
    dense layer expanding this to three outputs and a softmax layer](../Images/47a538b1bf2075e39d81788cfe9084ac.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![展示具有单个输出的密集层，另一个将此扩展到三个输出的密集层和softmax层的神经网络图](../Images/47a538b1bf2075e39d81788cfe9084ac.png)'
- en: 'Second attempt: linear regression and decoder. Image by author'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 第二次尝试：线性回归和解码器。图由作者提供
- en: One approach is to add a dense layer on top of the score, with a single input
    and as many outputs as the categories. This can learn the thresholds, and predict
    the probabilities of each category via softmax. Training then can happen as usual
    using a categorical cross-entropy loss.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 一种方法是在分数之上添加一个密集层，具有单个输入和与类别数量相同的输出。这可以学习阈值，并通过softmax预测每个类别的概率。训练可以使用分类交叉熵损失像往常一样进行。
- en: Clearly, the dense layer won’t learn the thresholds directly; instead, it will
    learn N weights and N biases given N output categories. So let’s figure out how
    to get the thresholds from these.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 显然，密集层不会直接学习阈值；相反，它将学习 N 个权重和 N 个偏差，给定 N 个输出类别。因此，让我们弄清楚如何从这些中获取阈值。
- en: 'Step 3: Extracting the thresholds'
  id: totrans-42
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第3步：提取阈值
- en: Notice that the output of the softmax layer is the vector of probabilities for
    each category; the predicted category is the one with the highest probability.
    Furthermore, [softmax](https://en.wikipedia.org/wiki/Softmax_function) works in
    a way that it always maps the largest input value to the largest probability.
    Therefore, the largest output of the dense layer corresponds to the category that
    it predicts based on the incoming score.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 注意，softmax层的输出是每个类别的概率向量；预测的类别是概率最高的那个。此外，[softmax](https://en.wikipedia.org/wiki/Softmax_function)
    以一种方式工作，它总是将最大的输入值映射到最大的概率。因此，密集层的最大输出对应于它根据传入的分数预测的类别。
- en: If the dense layer has learnt the weights `[w1, w2, w3]` and the biases `[b1,
    b2, b3]`, then its outputs are
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 如果密集层已经学习到权重 `[w1, w2, w3]` 和偏差 `[b1, b2, b3]`，那么其输出为
- en: '`o1 = w1*score + b1 o2 = w2*score + b2 o3 = w3*score + b3`'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: '`o1 = w1*score + b1 o2 = w2*score + b2 o3 = w3*score + b3`'
- en: 'These are all just straight lines as a function of the incoming score (e.g.
    `y = w1*x + b1`), and whichever is at the top at a given score is the winning
    category. Here is a quick illustration:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 这些都是作为输入分数的函数的直线（例如，`y = w1*x + b1`），在给定分数时位于顶部的是获胜类别。以下是一个快速说明：
- en: '![2D chart showing three lines coloured according to which is the largest at
    a given x](../Images/e29a0ca127c007b7dc90dff91198f651.png)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
  zh: '![显示给定x值时哪条线最大的二维图表](../Images/e29a0ca127c007b7dc90dff91198f651.png)'
- en: Three linear functions mapping the single score to the raw likelihood of each
    category. Image by author
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 三个线性函数将单个分数映射到每个类别的原始似然。图由作者提供
- en: The thresholds are then the intersection points between the neighboring lines.
    Assuming the order of categories to be o1 (home) → o2 (hospital) → o3 (death),
    we need to solve the o1 = o2 and o2 = o3 equations, yielding
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 阈值是相邻线之间的交点。假设类别的顺序为 o1（家庭）→ o2（医院）→ o3（死亡），我们需要解 o1 = o2 和 o2 = o3 的方程，得到
- en: '`t0 = (b2 – b1) / (w1 – w2) t1 = (b3 – b2) / (w2 – w3)`'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: '`t0 = (b2 – b1) / (w1 – w2) t1 = (b3 – b2) / (w2 – w3)`'
- en: This is implemented in `**[ScoringModel.extract_thresholds()](https://codeberg.org/csirmaz/category-scoring/src/tag/v1.0/scoring_model.py#L183)**`
    (though there is some additional logic there explained below).
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 这在 `**[ScoringModel.extract_thresholds()](https://codeberg.org/csirmaz/category-scoring/src/tag/v1.0/scoring_model.py#L183)**`
    中实现（尽管那里还有一些额外的逻辑，下面会解释）。
- en: 'Step 4: Ordering the categories'
  id: totrans-52
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第4步：对类别进行排序
- en: But how do we know what is the right order of the categories? Clearly we have
    a preferred order (home → hospital → death), but what will the model say?
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 但我们如何知道类别的正确顺序呢？显然我们有一个首选顺序（家庭 → 医院 → 死亡），但模型会说什么呢？
- en: 'It is worth noting a couple of things about the lines that represent which
    category wins at each score. As we are interested in whichever line is the highest,
    we are talking about the boundary of the region that is above all lines:'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 值得注意的是，关于代表每个分数下哪个类别获胜的线，有几个需要注意的地方。由于我们感兴趣的是哪条线是最高的，我们谈论的是所有线之上的区域的边界：
- en: '![2D chart showing three lines coloured according to which is the largest at
    a given x](../Images/ef5ff0abc126539f26a76d24028904ab.png)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
  zh: '![2D图表显示三条线根据在给定x处的最大值着色](../Images/ef5ff0abc126539f26a76d24028904ab.png)'
- en: The winning (largest) line segments are the boundaries of the highlighted convex
    region. Image by author
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 获胜（最大）的线段是高亮凸区域的边界。图由作者提供
- en: Since this area is the intersection of all half-planes that are above each line,
    it is necessarily convex. (Note that no line can be vertical.) This means that
    each category wins over exactly one range of scores; it cannot get back to the
    top again later.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 由于这个区域是所有在每条线之上的半平面的交集，它必然是凸的。（注意，没有线可以是垂直的。）这意味着每个类别恰好在一个分数范围内获胜；它不能在之后再次回到顶部。
- en: It also means that these ranges are necessarily in the order of the slopes of
    the lines, which are the weights. The biases influence the values of the thresholds,
    but not the order. We first have negative slopes, followed by small and then big
    positive slopes.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 这也意味着这些范围必然按照线的斜率顺序排列，即权重。偏差影响阈值的值，但不影响顺序。我们首先有负斜率，然后是小正斜率，最后是大正斜率。
- en: This is because given any two lines, towards negative infinity the one with
    the smaller slope (weight) will win, and towards positive infinity, the other.
    Algebraically speaking, given two lines
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 这是因为对于任意两条线，当向负无穷大方向延伸时，斜率（权重）较小的一条线将获胜，而当向正无穷大方向延伸时，另一条线将获胜。从代数上来说，给定两条线
- en: '`f1(x) = w1*x + b1` and `f2(x) = w2*x + b2` where `w2 > w1`,'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: '`f1(x) = w1*x + b1` 和 `f2(x) = w2*x + b2` 其中 `w2 > w1`，'
- en: we already know they intersect at `(b2 – b1) / (w1 – w2)`, and below this, if
    `x < (b2 – b1) / (w1 – w2)`, then
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 我们已经知道它们在 `(b2 – b1) / (w1 – w2)` 处相交，并且在此以下，如果 `x < (b2 – b1) / (w1 – w2)`，那么
- en: '`(w1 – w2)x > b2 – b1`   (w1 – w2 is negative!)'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: '`(w1 – w2)x > b2 – b1` （w1 – w2 是负数！）'
- en: '`w1*x + b1 > w2*x – b2`'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: '`w1*x + b1 > w2*x – b2`'
- en: '`f1(x) > f2(x)`,'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: '`f1(x) > f2(x)`,'
- en: and so f1 wins. The same argument holds in the other direction.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 因此 f1 获胜。同样的论点也适用于另一个方向。
- en: 'Step 4.5: We messed up (propagate-sum)'
  id: totrans-66
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第4.5步：我们搞砸了（传播求和）
- en: 'And here lies a problem: the scoring model is more or less free to decide what
    order to put the categories in. That’s not good: a score that predicts death at
    0, home treatment at 10, and hospitalization at 20 is clearly nonsensical. However,
    with certain inputs (especially if one feature dominates a category) this can
    happen even with extremely simple scoring models like a linear regression.'
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 这里就存在一个问题：评分模型可以自由地决定将类别放在什么顺序。这并不好：一个预测死亡为0分，家庭治疗为10分，住院为20分的评分显然是没有意义的。然而，在某些输入下（特别是如果某个特征主导了一个类别），即使是非常简单的评分模型，如线性回归，也可能发生这种情况。
- en: 'There is a way to protect against this though. Keras allows adding a kernel
    constraint to a dense layer to force all weights to be non-negative. We could
    take this code and implement a kernel constraint that forces the weights to be
    in increasing order (`w1 ≤ w2 ≤ w3`), but it is simpler if we stick to the available
    tools. Fortunately, Keras tensors support slicing and concatenation, so we can
    split the outputs of the dense layer into components (say, `d1, d2, d3`) and use
    the following as the input into the softmax:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管如此，有一种方法可以防止这种情况。Keras允许向密集层添加核约束，以强制所有权重都为非负。我们可以使用这段代码并实现一个核约束，强制权重按递增顺序排列（`w1
    ≤ w2 ≤ w3`），但如果我们坚持使用现有工具会更简单。幸运的是，Keras张量支持切片和连接，因此我们可以将密集层的输出拆分为组件（例如，`d1, d2,
    d3`），并将其用作softmax的输入：
- en: '`o1 = d1`'
  id: totrans-69
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`o1 = d1`'
- en: '`o2 = d1 + d2`'
  id: totrans-70
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`o2 = d1 + d2`'
- en: '`o3 = d1 + d2 + d3`'
  id: totrans-71
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`o3 = d1 + d2 + d3`'
- en: In the code, this is referred to as “propagate sum.”
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 在代码中，这被称为“传播求和”。
- en: '![Neural network diagram showing two dense layers in an encoder-decoder relationship
    followed by porpagate-sum and softmax operations](../Images/c6f8b3d5c525f0175699e73f0e4d6c6c.png)'
  id: totrans-73
  prefs: []
  type: TYPE_IMG
  zh: '![展示两个密集层在编码器-解码器关系后跟随porpagate-sum和softmax操作的神经网络图](../Images/c6f8b3d5c525f0175699e73f0e4d6c6c.png)'
- en: 'Final model: linear regression and a category approximator head enforcing increasing
    order of weights (see build_linear_bottleneck_model). Image by author'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 最终模型：线性回归和一个强制权重递增顺序的类别近似头（见`build_linear_bottleneck_model`）。图由作者提供
- en: Substituting the weights and biases into the above we get
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 将权重和偏差代入上述公式中，我们得到
- en: '`o1 = w1*score + b1`'
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`o1 = w1*score + b1`'
- en: '`o2 = (w1+w2)*score + b1+b2`'
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`o2 = (w1+w2)*score + b1+b2`'
- en: '`o3 = (w1+w2+w3)*score + b1+b2+b3`'
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`o3 = (w1+w2+w3)*score + b1+b2+b3`'
- en: Since `w1, w2, w3` are all non-negative, we have now ensured that the effective
    weights used to decide the winning category are in increasing order.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 由于`w1, w2, w3`都是非负的，我们现在确保了用于决定获胜类别的有效权重是递增的。
- en: 'Step 5: Training and evaluating'
  id: totrans-80
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 第5步：训练和评估
- en: All the components are now together to train the linear regression. The model
    is implemented in `**[ScoringModel.build_linear_bottleneck_model()](https://codeberg.org/csirmaz/category-scoring/src/tag/v1.0/scoring_model.py#L38)**`
    and can be trained by running `**train.py --linear-bottleneck**`. The code also
    automatically extracts the thresholds and the weights of the linear combination
    after each epoch. Note that as a final calculation, we need to shift each threshold
    by the bias in the encoder layer.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 所有组件现在一起用于训练线性回归。该模型在`**[ScoringModel.build_linear_bottleneck_model()](https://codeberg.org/csirmaz/category-scoring/src/tag/v1.0/scoring_model.py#L38)**`中实现，可以通过运行`**train.py
    --linear-bottleneck**`进行训练。代码还自动在每一轮后提取阈值和线性组合的权重。请注意，作为最终计算，我们需要将每个阈值向编码器层的偏差进行偏移。
- en: '[PRE2]'
  id: totrans-82
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: The linear regression can approximate the toy example with an accuracy of 80%,
    which is pretty good. Naturally, the maximum achievable accuracy depends on whether
    the system to be modeled is close to linear or not. If not, one can consider using
    a more capable network as the encoder; for example, a few dense layers with nonlinear
    activations. The network should still not have enough capacity to condense the
    projected score too much.
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 线性回归可以以80%的准确度近似玩具示例，这相当不错。自然地，可达到的最大准确度取决于要建模的系统是否接近线性。如果不是，可以考虑使用更强大的网络作为编码器；例如，几个具有非线性激活的密集层。网络仍然不应该有足够的容量来过度压缩投影得分。
- en: It is also worth noting that with the linear combination, the dimensionality
    of the weight space the training happens in is minuscule compared to regular neural
    networks (just N where N is the number of input features, compared to millions,
    billions or more). There is a frequently described intuition that on high-dimensional
    error surfaces, genuine local minima and maxima are very rare – there is almost
    always a direction in which training can continue to reduce loss. That is, most
    areas of zero gradient are saddle points. We do not have this luxury in our 8-dimensional
    weight space, and indeed, training can get stuck in local extrema even with optimizers
    like Adam. Training is extremely fast though, and running multiple training sessions
    can solve this problem.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 还值得注意的是，与线性组合相比，训练发生的权重空间维度与常规神经网络相比非常小（只是N，其中N是输入特征的数量，与数百万、数十亿或更多相比）。有一个经常描述的直觉是，在高维误差表面上，真正的局部最小值和最大值非常罕见——几乎总是有一个方向，训练可以继续减少损失。也就是说，大多数零梯度的区域是鞍点。在我们的8维权重空间中，我们没有这种奢侈，实际上，即使使用Adam这样的优化器，训练也可能陷入局部极值。尽管如此，训练速度非常快，运行多个训练会话可以解决这个问题。
- en: 'To illustrate how the learnt linear model functions, `**[ScoringModel.try_linear_model()](https://codeberg.org/csirmaz/category-scoring/src/tag/v1.0/scoring_model.py#L234)**`
    tries it on a set of random inputs. In the output, the target and predicted outcomes
    are noted by their index number (0: treatment at home, 1: hospitalized, 2: death):'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 为了说明学到的线性模型是如何工作的，`**[ScoringModel.try_linear_model()](https://codeberg.org/csirmaz/category-scoring/src/tag/v1.0/scoring_model.py#L234)**`
    在一组随机输入上尝试它。在输出中，目标和预测结果通过它们的索引号标注（0：在家治疗，1：住院，2：死亡）：
- en: '[PRE3]'
  id: totrans-86
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'And `**[ScoringModel.visualize_linear_model()](https://codeberg.org/csirmaz/category-scoring/src/tag/v1.0/scoring_model.py#L245)**`
    generates a histogram of the score from a batch of random inputs. As above, “.”
    notes home treatment, “o” stands for hospitalization, and “+” death. For example:'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: '`**[ScoringModel.visualize_linear_model()](https://codeberg.org/csirmaz/category-scoring/src/tag/v1.0/scoring_model.py#L245)**`
    从一批随机输入中生成分数的直方图。如上所述，“.”表示家庭治疗，“o”代表住院，“+”代表死亡。例如：'
- en: '[PRE4]'
  id: totrans-88
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: The histogram is spiky due to the boolean inputs, which (before normalization)
    are either 0 or 1 in the linear combination, but the overall histogram is still
    much smoother than the results we got with the 2-layer neural network above. Many
    input vectors are mapped to scores that are at the thresholds between the outcomes,
    allowing us to predict if a patient is dangerously close to getting hospitalized,
    or should be admitted to intensive care as a precaution.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 由于布尔输入，直方图呈现尖峰状，这些输入（在归一化之前）在线性组合中要么是0要么是1，但整体直方图仍然比上面提到的双层神经网络的结果要平滑得多。许多输入向量被映射到介于结果之间的阈值分数，这使得我们能够预测患者是否危险地接近住院，或者应该作为预防措施被收入重症监护室。
- en: Conclusion
  id: totrans-90
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: Simple models like linear regressions and other low-capacity networks have desirable
    properties in a number of applications. They are highly interpretable and verifiable
    by humans – for example, from the results of the toy example above we can clearly
    see that previous infections protect patients from worse outcomes, and that age
    is the most important factor in determining the severity of an ongoing infection.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 线性回归和其他低容量网络等简单模型在许多应用中具有可取的特性。它们高度可解释且可由人类验证——例如，从上面的玩具示例中我们可以清楚地看到，以前的感染可以保护患者免受更坏的结果，而年龄是确定持续感染严重程度的最重要因素。
- en: Another property of linear regressions is that their output moves roughly in
    line with their inputs. It is this feature that we used to acquire a relatively
    smooth, continuous score from just a few anchor points offered by the limited
    information available in the training data. Moreover, we did so based on well-known
    network components available in major frameworks including Keras. Finally, we
    used a bit of math to extract the information we need from the trainable parameters
    in the model, and to ensure that the score learnt is meaningful, that is, that
    it covers the outcomes (categories) in the desired order.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 线性回归的另一个特性是它们的输出大致与它们的输入保持一致。正是这一特性使我们能够从训练数据中有限信息提供的少数几个锚点中获取一个相对平滑、连续的分数。此外，我们这样做是基于在主要框架（包括Keras）中可用的知名网络组件。最后，我们使用一点数学来从模型的可训练参数中提取所需的信息，并确保学到的分数是有意义的，也就是说，它按照所需的顺序覆盖了结果（类别）。
- en: Small, low-capacity models are still powerful tools to solve the right problems.
    With quick and cheap training, they can also be implemented, tested and iterated
    over extremely quickly, fitting nicely into agile approaches to development and
    engineering.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 小型、低容量的模型仍然是解决正确问题的强大工具。通过快速且低成本的训练，它们也可以被实施、测试和快速迭代，非常适合敏捷的开发和工程方法。
