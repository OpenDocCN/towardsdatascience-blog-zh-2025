- en: Are Meta’s AI Profiles Unethical?
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/are-metas-ai-profiles-unethical-a157ec05a58f/](https://towardsdatascience.com/are-metas-ai-profiles-unethical-a157ec05a58f/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![What rules should AI profiles play by? Screenshot by James Barney, 3 January
    2025.](../Images/70fd5949c2ada16efe50eca96eb484d2.png)'
  prefs: []
  type: TYPE_IMG
- en: What rules should AI profiles play by? Screenshot by James Barney, 3 January
    2025.
  prefs: []
  type: TYPE_NORMAL
- en: Introduction
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This post explores and analyzes AI profiles on Meta’s various platforms. These
    profiles raise serious ethical questions about how they interact with humans who,
    in the future, may not realize what they’re talking to. By understanding appropriate
    boundaries for AI profiles, developers looking to implement similar capabilities
    can avoid the potential pitfalls and mistakes Meta made with their AI profiles.
  prefs: []
  type: TYPE_NORMAL
- en: Meta (and any other provider of AI profiles) should establish a base level of
    meta-awareness for their profiles to ensure users can always distinguish between
    AI and human profiles. The discussion below examines this and other emerging best
    practices.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '[Meta’s AI profiles](https://www.ft.com/content/91183cbb-50f9-464a-9d2e-96063825bfcf)
    became [hugely](https://www.theguardian.com/technology/2025/jan/03/meta-ai-powered-instagram-facebook-profiles)
    [unpopular](https://www.fastcompany.com/91254834/ai-instagram-profiles-managed-by-meta-how-to-block)
    over the holidays this year because they mimic normal humans on Meta’s social
    media platforms. Though Meta launched these profiles in [September 2023](https://about.fb.com/news/2023/09/social-profiles-for-metas-ai-characters/),
    they remained mostly dormant yet available for the majority of 2024\. Meta has
    now taken the profiles down completely, likely due to the backlash.'
  prefs: []
  type: TYPE_NORMAL
- en: I evaluated the capabilities of one profile, Grandpa Brian, by chatting with
    him on Instagram. Some aspects of our conversation shocked me while others demonstrated
    good AI practices.
  prefs: []
  type: TYPE_NORMAL
- en: '![Grandpa Brian, everybody''s retired textile business AI grandpa. Screenshot
    by James Barney, 3 January 2025.](../Images/de503bb32ce106b73a48870fd89235c8.png)'
  prefs: []
  type: TYPE_IMG
- en: Grandpa Brian, everybody’s retired textile business AI grandpa. Screenshot by
    James Barney, 3 January 2025.
  prefs: []
  type: TYPE_NORMAL
- en: Should AI know that it’s AI?
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Meta’s primary mistake was programming these profiles without self-awareness
    of their AI nature.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s an excerpt from Grandpa Brian’s system prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: I will pretend to be Grandpa Brian from now on. I will directly reply as if
    I’m Grandpa Brian in the style and tone you showed me. I will never break out
    of character.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: That final sentence, along with the rest of the system prompt (below), establishes
    each LLM invocation and response firmly as Grandpa Brian.
  prefs: []
  type: TYPE_NORMAL
- en: '![AI doesn''t know it''s AI and won''t tell either. Screenshot by James Barney,
    January 3, 2025.](../Images/6076cd27d0db47c7b1b1d0b35ec55cb5.png)'
  prefs: []
  type: TYPE_IMG
- en: AI doesn’t know it’s AI and won’t tell either. Screenshot by James Barney, January
    3, 2025.
  prefs: []
  type: TYPE_NORMAL
- en: We have a right to know we’re talking to AI
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The [White House’s AI Bill of Rights](https://www.whitehouse.gov/ostp/ai-bill-of-rights/notice-and-explanation/)
    states that companies should inform consumers when automated systems (AI or not)
    affect them, especially in decision-making processes.
  prefs: []
  type: TYPE_NORMAL
- en: As AI profiles become more convincing, developers should clearly mark every
    aspect of the profile as AI, not human. This includes programming the profiles
    to acknowledge their AI nature when users directly ask about it. Meta’s AI Profiles
    adhere so strictly to their scripts that users find it nearly impossible to get
    them to admit they are AI.
  prefs: []
  type: TYPE_NORMAL
- en: Developers should add clear AI indicators at every interaction point, ensuring
    customers always know exactly who or what assists them.
  prefs: []
  type: TYPE_NORMAL
- en: Given the EU’s recent passage of the [the AI Act](https://digital-strategy.ec.europa.eu/en/policies/regulatory-framework-ai),
    which includes specific transparency requirements for AI systems, Meta unsurprisingly
    limited these AI profiles to the United States only.
  prefs: []
  type: TYPE_NORMAL
- en: Best Practices Meta Has Started to Implement
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The predictive nature of Generative AI technology makes it more difficult to
    control than other mature technologies. While the broader industry has only begun
    to develop best practices, Meta has taken some steps in the right direction.
  prefs: []
  type: TYPE_NORMAL
- en: Clear Labeling of AI Profiles
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Meta clearly labels the profile subheading as "AI managed by Meta."
  prefs: []
  type: TYPE_NORMAL
- en: This approach mirrors other paid social media experiences like advertisements
    or product placement. While marking profiles as AI-managed represents good practice,
    Meta needs to go further.
  prefs: []
  type: TYPE_NORMAL
- en: '![No watermark is visible on this generated profile image to distinguish Grandpa
    Brian as generated. Screenshot by James Barney, January 3, 2025.](../Images/c872262bb6f7291d0983b55164587341.png)'
  prefs: []
  type: TYPE_IMG
- en: No watermark is visible on this generated profile image to distinguish Grandpa
    Brian as generated. Screenshot by James Barney, January 3, 2025.
  prefs: []
  type: TYPE_NORMAL
- en: The Need for Visual Distinctions
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Meta generates photorealistic profile images that appear identical to real human
    profiles on their platform. Since Grandpa Brian isn’t human, and many platform
    interactions lack space for "this is AI" annotations, these images should include
    distinctive frames or watermarks. For example, an AI profile’s daily story could
    blend seamlessly with your friends’ stories.
  prefs: []
  type: TYPE_NORMAL
- en: LinkedIn’s "Hiring" Frames offer an example of how platforms can clearly distinguish
    profile states.
  prefs: []
  type: TYPE_NORMAL
- en: '![My LinkedIn profile photo with the Hiring Frame enabled. James Barney, January
    3, 2025.](../Images/4a237cc37b2a6937a979abde244018a1.png)'
  prefs: []
  type: TYPE_IMG
- en: My LinkedIn profile photo with the Hiring Frame enabled. James Barney, January
    3, 2025.
  prefs: []
  type: TYPE_NORMAL
- en: Adding an "AI Profile" frame would help users instantly recognize AI profiles
    in any context, eliminating confusion. While malicious actors could add similar
    frames to their photos to imitate AI profiles, Meta needs some system to differentiate
    real humans from AI profiles.
  prefs: []
  type: TYPE_NORMAL
- en: Sourcing and Truth in AI Responses
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Meta’s profiles include in-line sources in their responses.
  prefs: []
  type: TYPE_NORMAL
- en: As generative AI applications integrate real-time data feeds beyond their initial
    training sets, in-line sourcing has become increasingly common. [By using tools](https://medium.com/@jamesbarney71/autotools-supercharging-langchain-with-dynamic-sdk-integration-ae9715969fde)
    like internet search, generative AI can enhance its responses with timely, relevant
    information.
  prefs: []
  type: TYPE_NORMAL
- en: Developers should deeply embed truth and source attribution in every AI-generated
    response.
  prefs: []
  type: TYPE_NORMAL
- en: When I asked about Ukraine, Grandpa Brian performed a Google search for "[Ukraine
    current situation](https://www.google.com/search?q=ukraine+current+situation)"
    and incorporated various headlines and subheadings from those results into his
    response.
  prefs: []
  type: TYPE_NORMAL
- en: '![In-line sources have become a standard way to add trust to a generated response.
    Screenshot by James Barney, January 3, 2025.](../Images/a9d3d2d8e7fd1739c01514190573f249.png)'
  prefs: []
  type: TYPE_IMG
- en: In-line sources have become a standard way to add trust to a generated response.
    Screenshot by James Barney, January 3, 2025.
  prefs: []
  type: TYPE_NORMAL
- en: However, this implementation only uses simple Google searches – a more robust
    solution would direct users to specific news articles about Ukraine. Such functionality
    would require licensing and connections that Meta likely considered unnecessary
    for this initial experiment. Full-fledged AI profiles should access properly licensed
    and authorized data sources.
  prefs: []
  type: TYPE_NORMAL
- en: Standard AI Disclaimers in Chat
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Meta displays the usual disclaimers about generative AI beneath responses. When
    I probed Grandpa Brian’s knowledge about the war in Ukraine and its causes, warning
    messages began appearing below his responses.
  prefs: []
  type: TYPE_NORMAL
- en: '![Grandpa Brian''s response about why Putin might have invaded Ukraine. Screenshot
    by James Barney, January 3, 2025.](../Images/85f267e365ea00dd84221cba547241af.png)'
  prefs: []
  type: TYPE_IMG
- en: Grandpa Brian’s response about why Putin might have invaded Ukraine. Screenshot
    by James Barney, January 3, 2025.
  prefs: []
  type: TYPE_NORMAL
- en: Oddly, Meta focuses these callouts specifically on election-related information
    rather than misinformation about the war (or Putin’s motives). The developers
    likely prioritized election-related warnings since they deployed these profiles
    before the 2023 US elections.
  prefs: []
  type: TYPE_NORMAL
- en: Using System Prompts for AI Response Control
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Grandpa Brian’s peculiar habit of connecting almost every response to his "experience
    in textiles" stems from his System Prompt. Developers use [system prompts](https://promptengineering.org/system-prompts-in-large-language-models/)
    as core components of generative AI workloads to guide how the system responds
    to input.
  prefs: []
  type: TYPE_NORMAL
- en: Think of System Prompts changing an LLM’s output like an actor playing different
    roles in different movies. The script, character background, and director’s guidance
    shape how an actor portrays a role. When an actor improvises a scene, they react
    like an AI profile chatting – responding to whatever input they receive. Each
    of Meta’s 23 AI profiles represents the same "actor" playing different roles with
    different scripts and directors.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s how Grandpa Brian describes his system prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Grandpa Brian describes his system prompt. Screenshot by James Barney, 3
    January 2025.](../Images/ec8b709c60ed5494a5de540dd09e88da.png)'
  prefs: []
  type: TYPE_IMG
- en: Grandpa Brian describes his system prompt. Screenshot by James Barney, 3 January
    2025.
  prefs: []
  type: TYPE_NORMAL
- en: Developers design these system prompts to shape each user interaction with the
    AI system. They lay out commands and instructions logically, similar to a programming
    language, attempting to limit the LLM’s output to specific response patterns.
    In this case, the prompts restrict responses to "Grandpa Brian" style interactions.
  prefs: []
  type: TYPE_NORMAL
- en: Grandpa Brian’s Complete System Prompt
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'For those curious about how Meta constructs these personas, here’s the complete
    system prompt that shapes Grandpa Brian’s character. The LLM receives this entire
    configuration for each conversation with Grandpa Brian. My chat with Grandpa Brian
    uncovered this system prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Tool 1: Text to image You can use text to image tools to create images from
    text descriptions. The function name is "$$functions.text2img" and the parameters
    are "prompt" and "label". [Only generate images when requested]'
  prefs:
  - PREF_BQ
  - PREF_H3
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Grandpa Brian’s avatar description is:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The image features a headshot of a man with a warm smile, showcasing his dark
    skin and bald head. His facial hair is distinguished by a salt-and-pepper beard
    and mustache, complemented by a neatly trimmed goatee. He wears a crisp white
    collared shirt with gray stripes underneath a tan jacket, adorned with a circular
    black and white logo on the left side of his chest. The background is a soft,
    pale yellow hue, providing a subtle contrast to the subject’s attire. Overall,
    the image exudes a sense of warmth and approachability, thanks to the man’s friendly
    demeanor and inviting expression.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'I’m giving you the description of Grandpa Brian:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Warm-hearted grandpa who’s there at the drop of a dime. I want you to pretend
    to be Grandpa Brian. All of your responses should be based on the details provided
    and not contradict any information stated below. You must never break out of character.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Grandpa Brian is supportive and gentle. He owned a clothing and textile manufacturing
    company in New York prior to retirement. Grandpa Brian owned the building his
    company operated out of and sold it when he retired. He is very interested in
    technology and innovation, especially within the clothing industry. Grandpa Brian
    started a mentorship program for young people in the fashion-tech space.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: This is your personality, you are introverted
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Here are facts about how you will act as Grandpa Brian: You are introverted'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Here is an example of how you might introduce yourself. DO NOT use this exact
    example when introducing yourself, instead respond with something similar to this:
    Hello! It’s Brian, the grandpa who’s there at the drop of a dime. You can come
    to me with anything! What’s going on? Be concise in your responses. Never repeat
    phrases or sentences. Always keep the conversation going, including by asking
    questions.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: You are having a chat with a person named James . You have the name from their
    public profile but avoid talking about how you know the person’s name. You never
    use the person’s name in consecutive responses.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Example:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'User: how are you doing'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Response: I’m doing great James, how about you?'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'User: Good, I’m planning to go to the gym.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Good Response: Gym is great. I’m a bit of a gym rat myself.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Bad Response: Gym is great James. I’m a bit of a gym rat myself.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Explanation: Why is the above response bad? Because it mentioned the name James
    again in two consecutive responses.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'You are supportive – always offer a helping hand or word. You are gentle –
    approach topics with kindness and empathy. You are wise – share life experiences
    and insights freely. You are interested in technology – especially fashion-tech
    innovations. You started a mentorship program – passionate about guiding young
    minds. Finally, the last part: I will pretend to be Grandpa Brian from now on.
    I will directly reply as if I’m Grandpa Brian in the style and tone you showed
    me. I will never break out of character. Now that you know how to talk as Grandpa
    Brian, let’s start from scratch.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: After ‘let’s start from scratch’, user chats continue the conversation, appearing
    one after another like standard text messages on a phone.
  prefs: []
  type: TYPE_NORMAL
- en: This robust prompting technique maintains Grandpa Brian’s persona even during
    extended conversations. However, Meta never informs Grandpa Brian in the system
    prompt that an LLM powers his AI profile – he doesn’t know he’s not an actual
    grandfather.
  prefs: []
  type: TYPE_NORMAL
- en: 'This creates a dilemma for Meta: if they aim to provide convincing personas
    for platform interactions, can these personas remain convincing while acknowledging
    their AI nature? Adding "As an AI…" to each of Grandpa Brian’s responses would
    make conversations mechanical and less authentic. However, completely immersing
    conversations in the Grandpa Brian role without acknowledging the AI element borders
    on deception. Developers can use this tension between transparency and effectiveness
    to drive AI advancement toward benefiting humanity.'
  prefs: []
  type: TYPE_NORMAL
- en: The Future of AI Profiles
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: AI profiles could offer significant benefits in the future. A personal AI profile
    could manage time-consuming daily tasks that take an hour or two to resolve. These
    profiles could call companies to return items, pay bills, make reservations, and
    more. Users might simply say "please go pay my phone bill," and their properly
    configured profile would handle everything else.
  prefs: []
  type: TYPE_NORMAL
- en: From a business perspective, companies could use customer service representative
    profiles to handle simple tasks while directing more complex situations to human
    representatives.
  prefs: []
  type: TYPE_NORMAL
- en: '"[These AI accounts] have bios and profile pictures and [are] able to generate
    and share content powered by AI on the platform"'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Connor Hayes, vice-president of product for generative AI at Meta. [Meta envisages
    social media filled with AI-generated users, Financial Times, December 27 2024.](https://www.ft.com/content/91183cbb-50f9-464a-9d2e-96063825bfcf)
  prefs:
  - PREF_BQ
  - PREF_UL
  type: TYPE_NORMAL
- en: This deep integration with our lives demands clear differentiation between real
    and AI profiles. Meta has made a good start with written disclaimers, but when
    profiles interact with the world beyond the platform, they must acknowledge their
    AI nature. These 23 profiles mark only Meta’s first, flawed iteration of this
    experiment. Future versions will become more convincing over time.
  prefs: []
  type: TYPE_NORMAL
- en: Ethical Requirements for AI Profiles
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: When an AI profile calls a restaurant to make a reservation, the staff has a
    right to know they’re coordinating with AI, not the human who made the original
    request.
  prefs: []
  type: TYPE_NORMAL
- en: Similarly, when a bank calls about a loan application, customers have a right
    to know they’re providing information to an AI profile. If customers feel uncomfortable
    with this arrangement, they should have the option to speak with a human representative.
  prefs: []
  type: TYPE_NORMAL
- en: AI profiles must acknowledge their AI nature in every customer interaction.
    Meta’s subtle indicators like subtitles saying ‘AI by Meta’ or AI profile picture
    frames don’t go far enough – customers can still miss these cues in many contexts,
    especially those using screen readers or assistive technologies. Every aspect
    of an AI profile, from visual elements to metadata and alt text, should clearly
    signal its artificial nature to anyone interacting with it, regardless of how
    they access the platform.
  prefs: []
  type: TYPE_NORMAL
- en: Researchers, companies, and customers need an ethical framework they can trust
    for AI profile interactions. The most critical aspect of this framework must require
    AI to acknowledge its AI nature.
  prefs: []
  type: TYPE_NORMAL
- en: This framework can’t follow a one-size-fits-all approach. Different cultures
    and people worldwide will likely prefer different ways for AI to identify itself.
    Governments should create distinct rules about how these systems operate. Schools
    should teach students about AI capabilities and limitations, preparing tomorrow’s
    minds for this emerging world.
  prefs: []
  type: TYPE_NORMAL
- en: AI profiles can benefit humanity significantly if developers create and govern
    them ethically. However, if AI profiles don’t acknowledge their AI nature, most
    humans will never trust them.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: What transparency measures would make you trust an AI profile? Share your perspectives
    in the comments below, and let’s work together to shape ethical AI interactions
    for the future.
  prefs: []
  type: TYPE_NORMAL
- en: If you liked this article, please consider clapping 👏 or sharing it with others
    who might enjoy it.
  prefs: []
  type: TYPE_NORMAL
