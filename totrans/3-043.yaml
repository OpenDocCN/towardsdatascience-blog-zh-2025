- en: Reinforcement Learning from One Example?
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 从一个例子中进行强化学习？
- en: 原文：[https://towardsdatascience.com/rl-from-one-example-why-1-shot-rlvr-might-be-the-breakthrough-weve-been-waiting-for/](https://towardsdatascience.com/rl-from-one-example-why-1-shot-rlvr-might-be-the-breakthrough-weve-been-waiting-for/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/rl-from-one-example-why-1-shot-rlvr-might-be-the-breakthrough-weve-been-waiting-for/](https://towardsdatascience.com/rl-from-one-example-why-1-shot-rlvr-might-be-the-breakthrough-weve-been-waiting-for/)
- en: <mdspan datatext="el1746057297011" class="mdspan-comment">Prompt</mdspan> engineering
    alone won’t get us to production. Fine-tuning is expensive. And reinforcement
    learning? That’s been reserved for well-funded labs with massive datasets until
    now.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1746057297011" class="mdspan-comment">提示工程本身并不能使我们达到生产阶段。微调成本高昂。而强化学习？直到现在，它一直被保留在资金充足且数据量庞大的实验室中。
- en: New research from Microsoft and academic collaborators has overturned that assumption.
    Using **Reinforcement Learning with Verifiable Rewards (RLVR)** and just a **single
    training example**, researchers achieved results *on par with models trained on
    over a thousand examples*, sometimes even better.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 微软和学术合作伙伴的新研究颠覆了这一假设。使用**可验证奖励的强化学习（RLVR）**和**单个训练示例**，研究人员实现了与在超过一千个示例上训练的模型相当的结果，有时甚至更好。
- en: This improvement isn’t just incremental progress. It’s a rethinking of how we
    fine-tune large language models (LLMs) for reasoning tasks. In this post, we’ll
    unpack what 1-shot RLVR is, how it works, and what it means for developers building
    math agents, automated tutors, and reasoning copilots.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 这种改进不仅仅是渐进式的进步。它是对我们如何微调大型语言模型（LLMs）以进行推理任务的重新思考。在这篇文章中，我们将解开1-shot RLVR是什么，它是如何工作的，以及它对构建数学代理、自动导师和推理副驾驶的开发者意味着什么。
- en: '![](../Images/b7021950e0a7346a87f5943fb85d58da.png)'
  id: totrans-5
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/b7021950e0a7346a87f5943fb85d58da.png)'
- en: '*RLVR with 1 example (green) can perform as well as using datasets with thousands
    of examples (blue).* [From the Paper](https://arxiv.org/pdf/2504.20571).'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: '*使用1个例子（绿色）的RLVR可以与使用数千个示例的数据集（蓝色）表现相当。[来自论文](https://arxiv.org/pdf/2504.20571)。'
- en: '1-Shot RLVR: What Is It?'
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1-Shot RLVR：它是什么？
- en: RLVR is a flavor of reinforcement learning where the model is trained using
    **verifiable reward signals,** typically 0/1 based on whether the output is correct.
    In contrast to reward models used in RLHF, RLVR uses hard ground truth.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: RLVR是一种强化学习类型，其中模型使用**可验证的奖励信号**进行训练，通常是基于输出是否正确而基于0/1。与RLHF中使用的奖励模型相比，RLVR使用硬的真实值。
- en: What the authors discovered is that if you apply RLVR to a base model (e.g.,
    Qwen2.5-Math-1.5B) and train it on **just one carefully selected math example**,
    performance on benchmark tasks can **nearly double**.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 作者发现，如果你将RLVR应用于基础模型（例如，Qwen2.5-Math-1.5B）并在**仅一个精心挑选的数学示例**上对其进行训练，基准任务上的性能可以**几乎翻倍**。
- en: The Numbers That Stun
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 令人震惊的数字
- en: 'Here’s what happens when you train Qwen2.5-Math-1.5B on just *one* example:'
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 当你在仅一个例子上训练Qwen2.5-Math-1.5B时，会发生以下情况：
- en: '**MATH500 Accuracy:** Jumps from **36.0% → 73.6%**'
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**MATH500准确率**：从**36.0% → 73.6**%提升'
- en: '**Avg. Across 6 Math Benchmarks:** Improves from **17.6% → 35.7%**'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**平均跨越6个数学基准**：从**17.6% → 35.7**%提升'
- en: Even using **two examples** yielded **74.8%** on MATH500 and **36.6%** average,
    slightly **outperforming the full 1.2k dataset** the example was selected from.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 即使使用**两个例子**，在MATH500上的准确率也达到了**74.8**%，平均准确率为**36.6**%，略优于所选示例的完整1.2k数据集。
- en: This result wasn’t limited to a fluke. Many different examples produced ~30%
    or more gains when used individually.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 这个结果并非偶然。当单独使用时，许多不同的例子产生了30%或更多的增益。
- en: Why Does This Approach Work?
  id: totrans-16
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 为什么这种方法有效？
- en: 'The paper introduces several hypotheses and findings:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 这篇论文介绍了几个假设和发现：
- en: '**Policy Gradient Loss Does the Heavy Lifting:** Removing this from the training
    pipeline causes gains to disappear, showing it’s the main driver of improvements.'
  id: totrans-18
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**策略梯度损失承担重任**：从训练流程中移除它会导致增益消失，表明它是改进的主要驱动因素。'
- en: '**Entropy Loss Encourages Exploration:** Adding entropy regularization, even
    without reward, boosts performance by over 25%.'
  id: totrans-19
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**熵损失鼓励探索**：即使没有奖励，添加熵正则化也能将性能提升超过25%。'
- en: '**Post-Saturation Generalization:** Accuracy on the training example quickly
    hits 100%, yet generalization on test sets *keeps improving*.'
  id: totrans-20
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**后饱和泛化**：在训练示例上的准确率迅速达到100%，但测试集上的泛化能力仍在提高。'
- en: '**Cross-Domain Effects:** A geometry example improved performance on algebra
    and number theory, too.'
  id: totrans-21
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**跨域效应**：一个几何示例也提高了代数和数论的性能。'
- en: '**Self-Reflection Increases:** Models trained via 1-shot RLVR show more frequent
    use of “rethink,” “recheck,” and “recalculate.”'
  id: totrans-22
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**自我反思增加**：通过1次RLVR训练的模型更频繁地使用“重新思考”、“重新检查”和“重新计算”。'
- en: Implications for Developers
  id: totrans-23
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 对开发者的启示
- en: 'If you’re building LLM-powered reasoning tools, math solvers, science tutors,
    or data agents, this technique offers enormous leverage:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您正在构建由LLM驱动的推理工具、数学求解器、科学导师或数据代理，这项技术提供了巨大的杠杆作用：
- en: '**You don’t need big data**: A single example can go a long way.'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**您不需要大数据**：一个示例就能走得很远。'
- en: '**You don’t need OpenAI access**: It works with open models like Qwen and LLaMA.'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**您不需要OpenAI的访问权限**：它可以使用像Qwen和LLaMA这样的开源模型。'
- en: '**You don’t need human labels**: Many examples already exist in curated math
    datasets like MATH or DeepScaleR.'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**您不需要人工标签**：许多示例已经存在于MATH或DeepScaleR等精心整理的数学数据集中。'
- en: Imagine building an AI tutor that learns from a single problem and generalizes
    across the curriculum. That future just got closer.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 想象一下构建一个从单个问题中学习并跨课程泛化的AI导师。那个未来已经更近了。
- en: 'Beyond Math: Early Signs of Transfer'
  id: totrans-29
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 不仅仅是数学：早期迁移迹象
- en: The authors evaluated on the ARC-Challenge and ARC-Easy, non-mathematical reasoning
    benchmarks.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 作者在ARC-Challenge和ARC-Easy非数学推理基准上进行了评估。
- en: 'Here’s what they found for Qwen2.5-Math-1.5B:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 他们为Qwen2.5-Math-1.5B找到了以下结果：
- en: '**Base model:** 48.0 (ARC-E), 30.2 (ARC-C)'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**基础模型**：48.0（ARC-E），30.2（ARC-C）'
- en: '**After 1-shot RLVR (π13):** 55.8 (ARC-E), 33.4 (ARC-C)'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**在1次RLVR（π13）之后**：55.8（ARC-E），33.4（ARC-C）'
- en: That’s a gain over even full-dataset RLVR. Training on a math problem helped
    the model become a better commonsense reasoner.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 这甚至超过了全数据集RLVR的收益。在数学问题上训练有助于模型成为更好的常识推理者。
- en: What Makes a Good Example?
  id: totrans-35
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是一个好的示例？
- en: Using historical training variance to select high-impact examples (π1 and π13)
    worked well. But surprisingly, **many examples work**, even those with low variance.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 使用历史训练方差来选择高影响示例（π1和π13）效果良好。但令人惊讶的是，**许多示例都有效**，即使那些方差较低的示例。
- en: 'There’s no perfect recipe yet, but the early insight is promising:'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 尚无完美配方，但早期洞察很有希望：
- en: “Almost all examples improve performance when used in 1-shot RLVR.”
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: “几乎所有示例在1次RLVR中使用时都能提高性能。”
- en: When One Isn’t Enough
  id: totrans-39
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 当一个不够用时
- en: For some models, particularly distilled ones like DeepSeek-R1-Distill-Qwen-1.5B,
    performance gains from 1-shot RLVR were more modest (~6.9%). But moving to 4-shot
    or 16-shot setups showed steady improvement.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 对于某些模型，尤其是像DeepSeek-R1-Distill-Qwen-1.5B这样的蒸馏模型，1次RLVR的性能提升更为温和（约6.9%）。但转向4次或16次设置则显示出稳定的改进。
- en: 'This implies that **model family and training history matter,** but the general
    trend holds: *you need far less data than we thought*.'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着**模型家族和训练历史很重要**，但总体趋势是：*您需要的比我们想象的要少得多*。
- en: 'The Role of Entropy: Why Exploration Matters'
  id: totrans-42
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 熵的作用：为什么探索很重要
- en: One of the paper’s most surprising discoveries is that **entropy loss alone**,
    even without rewards, can yield large gains.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 论文中最令人惊讶的发现之一是，**仅熵损失**，即使没有奖励，也能带来巨大的收益。
- en: 'Example: Training Qwen2.5-Math-1.5B with only entropy loss improves MATH500
    from **36.0% to 63.4%** in 20 steps.'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 示例：仅使用熵损失训练Qwen2.5-Math-1.5B，将MATH500在20步内从**36.0%提高到63.4%**。
- en: 'This reveals a powerful principle:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 这揭示了强大的原则：
- en: Letting models explore more freely helps them generalize even from one example.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 让模型更自由地探索有助于它们从单个示例中泛化。
- en: 1-Shot ≠ Grokking
  id: totrans-47
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 1次RLVR ≠ 掌握
- en: Post-saturation generalization may remind some of grokking, where models suddenly
    generalize after long periods of overfitting.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 过度拟合后的泛化可能让人联想到“掌握”，即模型在长时间过度拟合后突然泛化。
- en: 'But ablation studies show 1-shot RLVR isn’t the same:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 但消融研究表明1次RLVR并不相同：
- en: It doesn’t rely on weight decay.
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它不依赖于权重衰减。
- en: Gains are immediate and sustained.
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 收益是即时且持续的。
- en: It appears tied to policy gradients and entropy-driven exploration.
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它似乎与策略梯度和熵驱动的探索有关。
- en: 'The Future: Smarter Data, Smaller Footprints'
  id: totrans-53
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 未来：更智能的数据，更小的足迹
- en: This paper serves as a timely reminder. More data isn’t always the answer. Better
    data, better selection, and reinforcement learning, even from one example, can
    unlock powerful capabilities in your base models.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 这篇论文是一个及时的提醒。更多的数据并不总是答案。更好的数据、更好的选择和强化学习，即使是从一个示例开始，也能在您的基模型中解锁强大的能力。
- en: '**For developers**, this means'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: '**对于开发者来说**，这意味着'
- en: You can build performant math agents with minimal compute.
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您可以用最少的计算构建性能良好的数学代理。
- en: You can use RLVR to fine-tune open models with cheap, verifiable rewards.
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您可以使用RLVR使用廉价、可验证的奖励微调开源模型。
- en: You can beat massive datasets with a single, well-chosen problem.
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 您可以用一个精心选择的问题击败庞大的数据集。
