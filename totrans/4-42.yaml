- en: Extracting Structured Vehicle Data from Images
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/extracting-structured-vehicle-data-from-images-794128aa8696/](https://towardsdatascience.com/extracting-structured-vehicle-data-from-images-794128aa8696/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![Image was generated by author on PicLumen](../Images/932568c7ace9146f604a52eeac2b760a.png)'
  prefs: []
  type: TYPE_IMG
- en: Image was generated by author on [PicLumen](https://www.piclumen.com/)
  prefs: []
  type: TYPE_NORMAL
- en: Introduction
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Imagine there is a camera monitoring cars at an inspection point, and your mission
    is to document complex vehicle details – type, license plate number, make, model
    and color. The task is challenging – classic computer vision methods struggle
    with varied patterns, while supervised deep learning requires integrating multiple
    specialized models, extensive labeled data, and tedious training. Recent advancements
    in the pre-trained **Multimodal LLMs** (MLLMs) field offer fast and flexible solutions,
    but adapting them for structured outputs requires adjustments.
  prefs: []
  type: TYPE_NORMAL
- en: In this tutorial, we’ll build a vehicle documentation system that extracts essential
    details from vehicle images. These details will be extracted in a structured format,
    making it accessible for further downstream use. We’ll use **OpenAI**‘s GPT-4
    to extract the data, **Pydantic** to structure the outputs, and **LangChain**
    to orchestrate the pipeline. By the end, you’ll have a practical pipeline for
    transforming raw images into structured, actionable data.
  prefs: []
  type: TYPE_NORMAL
- en: This tutorial is aimed at computer vision practitioners, data scientists, and
    developers who are interested in using LLMs for visual tasks. The full code is
    provided in an easy-to-use Colab notebook to help you follow along step-by-step.
  prefs: []
  type: TYPE_NORMAL
- en: Technology Stack
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**GPT-4 Vision Model:** GPT-4 is a multimodal model developed by OpenAI, capable
    of understanding both text and images [1]. Trained on vast amounts of multimodal
    data, it can generalize across a wide variety of tasks in a zero-shot manner,
    often without the need for fine-tuning. While the exact architecture and size
    of GPT-4 have not been publicly disclosed, its capabilities are among the most
    advanced in the field. GPT-4 is available via the OpenAI API on a paid token basis.
    In this tutorial, we use GPT-4 for its excellent zero-shot performance, but the
    code allows for easy swapping with other models based on your needs.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**LangChain:** For building the pipeline, we will use LangChain. LangChain
    is a powerful framework that simplifies complex workflows, ensures consistency
    in the code, and makes it easy to switch between LLM models [2]. In our case,
    Langchain will help us to link the steps of loading images, generating prompts,
    invoking the GPT model, and parsing the output into structured data.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Pydantic:** Pydantic is a powerful library for data validation in Python
    [3]. We’ll use Pydantic to define the structure of the expected output from the
    GPT-4 model. This will help us ensure that the output is consistent and easy to
    work with.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Dataset Overview**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'To simulate data from a vehicle inspection checkpoint, we’ll use a sample of
    vehicle images from the ‘Car Number plate’ Kaggle dataset [4]. This dataset is
    available under the [Apache 2.0 License](https://www.apache.org/licenses/LICENSE-2.0).
    You can view the images below:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Vehicle images from Car Number plate'' Kaggle dataset](../Images/804deb59858bb1433626bbe54dc4d5eb.png)'
  prefs: []
  type: TYPE_IMG
- en: Vehicle images from [Car Number plate](https://www.kaggle.com/datasets/alihassanml/car-number-plate)‘
    Kaggle dataset
  prefs: []
  type: TYPE_NORMAL
- en: Lets Code!
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Before diving into the practical implementation, we need to take care of some
    preparations:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Generate an OpenAI API key**— The OpenAI API is a paid service. To use the
    API, you need to sign up for an OpenAI account and generate a secret API key linked
    to the paid plan ([learn more](https://platform.openai.com/docs/quickstart)).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Configure your OpenAI** – In Colab, you can securely store your API key as
    an environment variables (secret), found on the left sidebar (🔑 ). Create a secret
    named `OPENAI_API_KEY`, paste your API key into the `value` field, and toggle
    ‘Notebook access’ on.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Install and import** the required libraries.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Pipeline Architecture
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'In this implementation we will use LangChain’s `chain` abstraction to link
    together a sequence of steps in the pipeline. Our pipeline chain is composed of
    4 components: an image loading component, a prompt generation component, an MLLM
    invoking component and a parser component to parse the LLM’s output into structured
    format. The inputs and outputs for each step in a chain are typically structured
    as dictionaries, where the keys represent the parameter names, and the values
    are the actual data. Let’s see how it works.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Image Loading Component**'
  prefs: []
  type: TYPE_NORMAL
- en: The first step in the chain is loading the image and converting it into base64
    encoding, since GPT-4 requires the image be in a text-based (base64) format.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: The `inputs` parameter is a dictionary containing the image path, and the output
    is a dictionary containing the based64-encoded image.
  prefs: []
  type: TYPE_NORMAL
- en: '**Define the output structure with Pydantic**'
  prefs: []
  type: TYPE_NORMAL
- en: 'We begin by specifying the required output structure using a class named `Vehicle`
    which inherits from Pydantic’s `BaseModel`. Each field (e.g., `Type`, `Licence`,
    `Make`, `Model`, `Color`) is defined using `Field`, which allows us to:'
  prefs: []
  type: TYPE_NORMAL
- en: Specify the output data type (e.g., `str`, `int`, `list`, etc.).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Provide a description of the field for the LLM.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Include examples to guide the LLM.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The `...` (ellipsis) in each `Field` indicates that the field is required and
    cannot be omitted.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s how the class looks:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: '**Parser Component**'
  prefs: []
  type: TYPE_NORMAL
- en: To make sure the LLM output matches our expected format, we use the `JsonOutputParser`
    initialized with the `Vehicle` class. This parser validates that the output follows
    the structure we’ve defined, verifying the fields, types, and constrains. If the
    output does not match the expected format, the parser will raise a validation
    error.
  prefs: []
  type: TYPE_NORMAL
- en: The `parser.get_format_instructions()` method generates a string of instructions
    based on the schema from the `Vehicle` class. These instructions will be part
    of the prompt and will guide the model on how to structure its output so it can
    be parsed. You can view the `instructions` variable content in the Colab notebook.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: '**Prompt Generation component**'
  prefs: []
  type: TYPE_NORMAL
- en: 'The next component in our pipeline is constructing the prompt. The prompt is
    composed of a system prompt and a human prompt:'
  prefs: []
  type: TYPE_NORMAL
- en: '**System prompt:** Defined in the `SystemMessage` , and we use it to establish
    the AI’s role.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Human prompt:** Defined in the `HumanMessage` and consists of 3 parts: 1)
    Task description 2) Format instructions which we pulled from the parser, and 3)
    the image in a base64 format, and the image quality `detail` parameter.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The `detail` parameter controls how the model processes the image and generates
    its textual understanding [5]. It has three options: `low`, `high` or `auto` :'
  prefs: []
  type: TYPE_NORMAL
- en: '`low`: The model processes a low resolution (512 x 512 px) version of the image,
    and represents the image with a budget of 85 tokens. This allows the API to return
    faster responses and consume fewer input tokens.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`high` : The model first analyses a low resolution image (85 tokens) and then
    creates detailed crops using 170 tokens per 512 x 512px tile.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`auto` : The default setting, where the `low` or `high` setting is automatically
    chosen by the image size.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For our setup, `low` resolution is sufficient, but other application may benefit
    from `high` resolution option.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s the implementation for the prompt creation step:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: The @chain decorator is used to indicate that this function is part of a LangChain
    pipeline, where the results of this function can be passed to the step in the
    workflow.
  prefs: []
  type: TYPE_NORMAL
- en: '**MLLM Component**'
  prefs: []
  type: TYPE_NORMAL
- en: The next step in the pipeline is invoking the MLLM to produce the information
    from the image, using the `MLLM_response` function.
  prefs: []
  type: TYPE_NORMAL
- en: 'First we initialize a multimodal GTP-4 model with `ChatOpenAI`, with the following
    configurations:'
  prefs: []
  type: TYPE_NORMAL
- en: '`model` specifies the exact version of the GPT-4 model.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`temperature` set to 0.0 to ensure a deterministic response.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`max_token` Limits the maximum length of the output to 1024 tokens.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Next, we invoke the GPT-4 model using `model.invoke` with the assembled inputs,
    which include the image and prompt. The model processes the inputs and returns
    the information from the image.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: '**Constructing** **the pipeline Chain**'
  prefs: []
  type: TYPE_NORMAL
- en: After all of the components are defined, we connect them with the `|` operator
    to construct the pipeline chain. This operator sequentially links the outputs
    of one step to the inputs of the next, creating a smooth workflow.
  prefs: []
  type: TYPE_NORMAL
- en: Inference on a Single Image
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Now comes the fun part! We can extract information from a vehicle image by
    passing a dictionary containing the image path, to the `pipeline.invoke` method.
    Here’s how it works:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: 'The output is a dictionary with the vehicle details:'
  prefs: []
  type: TYPE_NORMAL
- en: '![Left: The input image. Right: The output dictionary.](../Images/a115e6a49fe0018ad422dc74941438af.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Left: The input image. Right: The output dictionary.'
  prefs: []
  type: TYPE_NORMAL
- en: 'For further integration with databases or API responses, we can easily convert
    the output dictionary to JSON:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: Inference on a Batch of Images
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'LangChain simplifies batch inference by allowing you to process multiple images
    simultaneously. To do this, you should pass a list of dictionaries containing
    image paths, and invoking the pipeline using `pipeline.batch`:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: 'The resulting output dictionary can be easily converted into tabular data,
    such as a Pandas DataFrame:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: '![Left: The output vehicle data as a DataFrame. Right: The input images.](../Images/431bcced41194d95dd0c32ac92a48e5f.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Left: The output vehicle data as a DataFrame. Right: The input images.'
  prefs: []
  type: TYPE_NORMAL
- en: As we can see, the GPT-4 model correctly identified the vehicle type, licence
    plate, make, model and color, providing accurate and structured information. Where
    the details were not clearly visible, as in the motorcycle image, it returned
    ‘None’ as instructed in the prompt.
  prefs: []
  type: TYPE_NORMAL
- en: Concluding Remarks
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this tutorial we learned how to extract structured data from images and used
    it to build a vehicle documentation system. The same principles can be adapted
    to a wide range of other applications as well. We utilized the GPT-4 model, which
    showed strong performance in identifying vehicle details. However, our LangChain
    based implementation is flexible, allowing for easy integration with other MLLM
    models. While we achieved good results, it is important to remain mindful of potential
    allocations, which can be arise with LLM based models.
  prefs: []
  type: TYPE_NORMAL
- en: Practitioners should also consider potential privacy and safety risks when implementing
    similar systems. Though data in the OpenAI API platform is not used to train models
    by default [6], handling sensitive data requires adherence to proper regulations.
  prefs: []
  type: TYPE_NORMAL
