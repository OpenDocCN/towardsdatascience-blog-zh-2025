- en: As we can see, the GPT-4 model correctly identified the vehicle type, licence
    plate, make, model and color, providing accurate and structured information. Where
    the details were not clearly visible, as in the motorcycle image, it returned
    ‘None’ as instructed in the prompt.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 如我们所见，GPT-4模型正确地识别了车辆类型、车牌、制造商、型号和颜色，提供了准确和结构化的信息。在细节不明显的情况下，例如摩托车图像，它按照提示返回了‘None’。
- en: Concluding Remarks
  id: totrans-77
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this tutorial we learned how to extract structured data from images and used
    it to build a vehicle documentation system. The same principles can be adapted
    to a wide range of other applications as well. We utilized the GPT-4 model, which
    showed strong performance in identifying vehicle details. However, our LangChain
    based implementation is flexible, allowing for easy integration with other MLLM
    models. While we achieved good results, it is important to remain mindful of potential
    allocations, which can be arise with LLM based models.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 在本教程中，我们学习了如何从图像中提取结构化数据，并将其用于构建车辆文档系统。同样的原理也可以应用于广泛的其它应用。我们使用了GPT-4模型，它在识别车辆细节方面表现出色。然而，我们的基于LangChain的实现是灵活的，允许轻松集成其他MLLM模型。虽然我们取得了良好的结果，但重要的是要留意潜在的分配问题，这些问题可能会在基于LLM的模型中出现。
- en: Practitioners should also consider potential privacy and safety risks when implementing
    similar systems. Though data in the OpenAI API platform is not used to train models
    by default [6], handling sensitive data requires adherence to proper regulations.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 实践者还应考虑在实施类似系统时可能存在的隐私和安全风险。尽管OpenAI API平台中的数据默认不用于训练模型 [6]，但处理敏感数据需要遵守适当的法规。
