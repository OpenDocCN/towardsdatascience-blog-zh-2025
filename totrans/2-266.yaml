- en: How to Transition From Data Analyst to Data Scientist
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/how-to-transition-from-data-analyst-to-data-scientist/](https://towardsdatascience.com/how-to-transition-from-data-analyst-to-data-scientist/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1749510409887" class="mdspan-comment">Transitioning</mdspan>
    from data analyst to data science is a viable way to break into the data science
    field, and this article aims to explain how you can make that transition.
  prefs: []
  type: TYPE_NORMAL
- en: Why be a data analyst first?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I often recommend becoming a data analyst first and then transitioning to a
    data scientist.
  prefs: []
  type: TYPE_NORMAL
- en: Now, why do I do this, given I have never worked as a data analyst? Well, it’s
    for the following reasons.
  prefs: []
  type: TYPE_NORMAL
- en: Becoming a data analyst is easier than becoming a data scientist.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You truly learn and understand the business impact data can have — beginner
    data scientists often focus on building fancy models instead of solving business
    problems.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: At some companies, you may even do the same job as the data scientist despite
    the title differences.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Time in beats timing. So, being in the industry is always better in my opinion.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A comprehensive roadmap to becoming a data analyst is beyond the scope of this
    article, but I’d be happy to create one if that’s something that interests you.
  prefs: []
  type: TYPE_NORMAL
- en: What is the difference between data analyst and scientist?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Even though data analysts and scientists can be similar at some companies, the
    roles do differ in most cases.
  prefs: []
  type: TYPE_NORMAL
- en: 'In general, a data analyst is more business decision-focussed and will work
    with tools like:'
  prefs: []
  type: TYPE_NORMAL
- en: '[Excel](https://excel.cloud.microsoft/en-gb/)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[SQL](https://en.wikipedia.org/wiki/SQL)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Python](https://www.python.org/) (beginner level)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Statistics
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Tableau](https://www.tableau.com/en-gb)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'A data scientist will pretty much be able to do everything a data analyst can
    and will have more advanced abilities in:'
  prefs: []
  type: TYPE_NORMAL
- en: Python
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Machine learning](https://towardsdatascience.com/the-ultimate-ai-ml-roadmap-for-beginners/)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Predictive statistics
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Software engineering](https://medium.com/@egorhowell/list/software-engineering-ba5d20c877b8)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Cloud systems](https://aws.amazon.com/?nc2=h_lg)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can think of it as data analysts are more concerned with looking at what
    happened, and data scientists are more concerned about what will happen, e.g.
    predicting the future.
  prefs: []
  type: TYPE_NORMAL
- en: You don’t have to transition to data science from data analytics; I know many
    people who are fantastic analysts and are happy in their current role, getting
    a lot of fulfilment and being compensated very well.
  prefs: []
  type: TYPE_NORMAL
- en: However, I also know many people who want to move to data science and are using
    the data analyst position as a stepping stone.
  prefs: []
  type: TYPE_NORMAL
- en: Neither is right or wrong; it just comes down to what your goal is. Chances
    are, if you are reading this article, then you want to make the jump, so let’s
    go over why becoming a data analyst first is not a bad thing at all.
  prefs: []
  type: TYPE_NORMAL
- en: Skills to develop to transition
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: To move from data analyst to data scientist, you need to learn the following.
  prefs: []
  type: TYPE_NORMAL
- en: Maths
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: If you are working as a data analyst, you likely already possess decent statistics
    skills, so the primary areas you need to focus on are linear algebra and calculus.
  prefs: []
  type: TYPE_NORMAL
- en: Differentiation and the derivatives of standard functions.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Partial derivatives and multivariable calculus.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Chain and product rule.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Matrices and their operations, including features such as trace, determinant,
    and transpose.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Coding
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As a data analyst, your SQL skills are probably already excellent, so the main
    thing you need to improve is Python and general software engineering.
  prefs: []
  type: TYPE_NORMAL
- en: Advanced Python concepts like unit testing, classes and object-oriented programming.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Data structures and algorithms, and system design.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: An understanding of cloud systems like [AWS](https://aws.amazon.com/?nc2=h_lg),
    [Azure](https://azure.microsoft.com/en-gb) or [GCP](https://cloud.google.com/).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: ML libraries such as [scikit-learn](https://scikit-learn.org/stable/), [XGBoost](https://xgboost.readthedocs.io/en/stable/),
    [TensorFlow](https://www.tensorflow.org/), and [PyTorch](https://pytorch.org/).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Machine learning
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: You don’t need to be an ML expert, but you should understand the basics pretty
    well.
  prefs: []
  type: TYPE_NORMAL
- en: '[Supervised learning](https://en.wikipedia.org/wiki/Supervised_learning) (linear
    regression, logistics regression, tree models etc.)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Unsupervised learning](https://en.wikipedia.org/wiki/Unsupervised_learning)
    (clustering and dimensionality reduction).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Basics of [neural networks](https://medium.com/gitconnected/intro-perceptron-architecture-neural-networks-101-2a487062810c?sk=a738fb46cf55825c3dd47f91b26ad5e7)
    and some knowledge of [recurrent](https://towardsdatascience.com/recurrent-neural-networks-an-introduction-to-sequence-modelling-478e0e07c4ec/)
    and [convolutional](https://towardsdatascience.com/convolution-explained-introduction-to-convolutional-neural-networks-5babc47fbcaa/)
    neural networks.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How to learn?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Self-study
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The most straightforward and intuitive approach is to study in your spare time,
    either after work or on weekends.
  prefs: []
  type: TYPE_NORMAL
- en: Some people may not like that, but if you want to make a change in your career,
    you need to put in time and effort; that’s the brutal truth. Loads of people want
    to be data scientists, so it’s no walk in the park.
  prefs: []
  type: TYPE_NORMAL
- en: There are numerous resources available to learn about the above topics, and
    I have written several blog posts on the exact books and courses you should use.
  prefs: []
  type: TYPE_NORMAL
- en: I will leave them linked below, and I highly recommend you check them out!
  prefs: []
  type: TYPE_NORMAL
- en: '[Maths for machine learning](https://towardsdatascience.com/how-to-learn-the-math-needed-for-machine-learning/)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Maths for data science](https://towardsdatascience.com/how-to-learn-the-math-needed-for-data-science-86c6643b0c59/)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The pros of self-study are:'
  prefs: []
  type: TYPE_NORMAL
- en: Very cost-effective and can even be completely free.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Learn on your own schedule.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Custom learning path.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'And the cons:'
  prefs: []
  type: TYPE_NORMAL
- en: There are no clear structures, so it’s easy to go wrong.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: No formal credentials.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Requires high discipline and motivation.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Degrees
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: You can always return to school and pursue a formal degree in data science or
    machine learning.
  prefs: []
  type: TYPE_NORMAL
- en: 'The pros of this approach are:'
  prefs: []
  type: TYPE_NORMAL
- en: Emphasis on mathematics, statistics, computer science, and algorithmic understanding.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A degree (especially from a top university) carries more weight with some employers.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Access to faculty, alum networks, research projects, and internships.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The cons are:'
  prefs: []
  type: TYPE_NORMAL
- en: It may be too theory-heavy and lacks real-world projects and data.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Takes 2–4 years (Bachelor’s) or 1–2 years (Master’s).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Can be expensive
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Need strong academic record, possibly GRE, letters of recommendation, or prerequisite
    coursework.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Bootcamps
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: These have emerged everywhere in recent years due to the growing demand for
    data and machine learning roles.
  prefs: []
  type: TYPE_NORMAL
- en: In general, they offer a cheaper alternative to degrees, with more hands-on
    projects and practical lessons.
  prefs: []
  type: TYPE_NORMAL
- en: 'The pros are:'
  prefs: []
  type: TYPE_NORMAL
- en: Most boot camps are 3–6 months long, focusing only on data science skills.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Heavy focus on real-world projects, coding, and tools (Python, SQL, machine
    learning libraries).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Many offer career coaching, resume reviews, mock interviews, and job placement
    support.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Cheaper than a degree.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'And the cons:'
  prefs: []
  type: TYPE_NORMAL
- en: Shallow theoretical depth.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It can be too fast-paced.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Quality can vary, so be sure to do your research before participating.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Limited credibility to employers.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: At your current job
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This is my favourite, and it’s the most effective and worthwhile.
  prefs: []
  type: TYPE_NORMAL
- en: You can learn everything in your current job if you work on the right projects
    and also express interest to your manager about the skills and tools you want
    to develop.
  prefs: []
  type: TYPE_NORMAL
- en: Managers love it when their direct reports take the initiative and show passion
    for their work because it also benefits them as a byproduct.
  prefs: []
  type: TYPE_NORMAL
- en: 'The pros are:'
  prefs: []
  type: TYPE_NORMAL
- en: Getting paid to learn, what a win!
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Access to real-world data and business problems.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Real life data science experience to add to your portfolio.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It might even allow you to transition full-time to data science.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The cons are:'
  prefs: []
  type: TYPE_NORMAL
- en: This could lead to more workload.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Role expectations may be fixed, and there may be little to no internal mobility.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Creating your portfolio
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: During and after your studies, you need to create some evidence of the work
    you can do as a data scientist, basically making a portfolio.
  prefs: []
  type: TYPE_NORMAL
- en: 'I’m planning to release a more in-depth video soon on what a strong data science
    portfolio should include. But for now, here’s the short version:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Kaggle competitions** — Do one or two. It’s not about placing high; it’s
    about showing you can work with real datasets and follow through.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**4–5 simple projects** — These should be quick builds you can complete in
    a day or two. Upload them to GitHub. Even better, write short blog posts to explain
    your process and decisions.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Blog posts** — Aim for around five. They can cover anything data science-related:
    tutorials, insights, lessons learned — just show that you’re thinking critically
    and communicating well.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**One solid personal project** — This is your centerpiece. Something more in-depth
    that you work on over a month, an hour or two each day. It should showcase end-to-end
    thinking and be something you’re genuinely interested in.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: That’s it.
  prefs: []
  type: TYPE_NORMAL
- en: People overcomplicate this step way too much. Just start building — and keep
    showing up.
  prefs: []
  type: TYPE_NORMAL
- en: Getting the job
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As I said above, the easiest way is to transition internally.
  prefs: []
  type: TYPE_NORMAL
- en: If this is not an option, then you need to get busy applying!
  prefs: []
  type: TYPE_NORMAL
- en: You need to align your CV/resume, LinkedIn profile, and GitHub account with
    the data scientist job role. Ensure you start referring to yourself as a data
    scientist, not “aspiring.”
  prefs: []
  type: TYPE_NORMAL
- en: I studied physics at university, but I have never been paid to practise physics;
    I am still a physicist. The same applies to data science.
  prefs: []
  type: TYPE_NORMAL
- en: Utilise your portfolio everywhere you can to demonstrate your abilities. Your
    GitHub profile should link to your LinkedIn profile, which should then link to
    your blog posts and other relevant content. Get an ecosystem that traps people
    so they “spend” more time with you.
  prefs: []
  type: TYPE_NORMAL
- en: After everything is sufficiently prepared, start applying for more analytics-focused
    roles with the title data scientist. You can, of course, go for the more machine-learning
    ones, but they will be harder to get.
  prefs: []
  type: TYPE_NORMAL
- en: Leverage your network as well for referrals. If you have been working in the
    data field for some time, there must be at least one person you know who can refer
    you to a data science job.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: The beauty of transitioning from a data analyst to a data scientist is that
    you can take your time, as you are already earning money and in the field, which
    takes the pressure off. Just make sure you stick to it and make consistent progress!
  prefs: []
  type: TYPE_NORMAL
- en: Another thing!
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I offer 1:1 coaching calls where we can chat about whatever you need — whether
    it’s projects, career advice, or just figuring out your next step. I’m here to
    help you move forward!
  prefs: []
  type: TYPE_NORMAL
