- en: 'A Bird’s-Eye View of Linear Algebra: Measure of a Map — Determinants'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/a-birds-eye-view-of-linear-algebra-measure-of-a-map-determinants/](https://towardsdatascience.com/a-birds-eye-view-of-linear-algebra-measure-of-a-map-determinants/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '<mdspan datatext="el1749531389648" class="mdspan-comment">This is the second</mdspan>
    chapter in the in-progress book on linear algebra. The table of contents so far:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Chapter-1: [The basics](https://towardsdatascience.com/a-birds-eye-view-of-linear-algebra-the-basics/)'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Chapter-2: Measure of a map (current)'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Stay tuned for future chapters.
  prefs: []
  type: TYPE_NORMAL
- en: Linear algebra is the tool of many dimensions. No matter what you might be doing,
    as soon as you scale to \( n \) dimensions, linear algebra comes into the picture.
  prefs: []
  type: TYPE_NORMAL
- en: In the [previous chapter,](https://towardsdatascience.com/a-birds-eye-view-of-linear-algebra-the-basics/) we
    described abstract linear maps. In this one, we roll up our sleeves and start
    to deal with matrices. Practical considerations like numerical stability, efficient
    algorithms, etc. will now start to be explored.
  prefs: []
  type: TYPE_NORMAL
- en: 'Note: all images in this article, unless otherwise stated are by the author.'
  prefs: []
  type: TYPE_NORMAL
- en: I) How to quantify a linear map
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Determinants are one of the most ancient concepts in linear algebra. The roots
    of the subject lay in solving systems of linear equations. And determinants would
    “determine” if there even was a solution worth looking for. But in most of the
    cases, where the system does have a solution, it provides further useful information.
    In the modern framework of linear maps, determinants provide a single quantification
    of linear maps.
  prefs: []
  type: TYPE_NORMAL
- en: We discussed in the [previous chapter](https://towardsdatascience.com/a-birds-eye-view-of-linear-algebra-the-basics/) the
    concept of vector spaces (basically n-dimensional collections of numbers — and
    more generally collections of [fields](https://en.wikipedia.org/wiki/Field_(mathematics)))
    and linear maps that operate on two of those vector spaces, taking objects in
    one to the other.
  prefs: []
  type: TYPE_NORMAL
- en: As an example of these kinds of maps, one vector space could be the surface
    of the planet you’re sitting on and the other could be the surface of the table
    you might be sitting at. Literal maps of the world are also maps in this sense
    since they “map” every point on the surface of the Earth to a point on a paper
    or surface of a table, although they aren’t linear maps since they don’t preserve
    relative areas (Greenland appears much larger than it is for example in some of
    the projections).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/126494de4135e2854cf566d683411904.png)'
  prefs: []
  type: TYPE_IMG
- en: An actual map of the surface of the Earth is also a map in the sense of linear
    algebra, but it is not a linear map. Image by midjourney.
  prefs: []
  type: TYPE_NORMAL
- en: Once we pick a [basis](https://en.wikipedia.org/wiki/Basis_(linear_algebra)) for
    the vector space (a collection of *n* “independent” vectors in the space; there
    could be infinite choices in general), all linear maps on that vector space get
    unique matrices assigned to them.
  prefs: []
  type: TYPE_NORMAL
- en: For the time being, let’s restrict our attention to maps that take vectors from
    an *𝑛*-dimensional space back to the *𝑛*-dimensional space (we’ll generalize later).
    The matrices corresponding to these linear maps are *𝑛×𝑛* (see section III of
    chapter 1). It might be useful to “quantify” such a linear map, express its effect
    on the vector space, *ℝⁿ* in a single number. The kind of map we’re dealing with,
    effectively takes vectors from *ℝⁿ* and “distorts” them into some other vectors
    in the same space. Both the original vector *𝑣* and the vector *𝑢* that the map
    converted it into have some lengths (say *|𝑣|* and *|𝑢|*). We can think about
    how much the length of the vector is changed by the map, *|𝑢|∕|𝑣|*. Maybe that
    can quantify the impact of the map? How much it “stretches” vectors?
  prefs: []
  type: TYPE_NORMAL
- en: This approach has a fatal flaw. The ratio depends not just on the linear map,
    but also on the vector *𝑣* it acts on. It is therefore not strictly a property
    of the linear map itself.
  prefs: []
  type: TYPE_NORMAL
- en: What if we take two vectors instead now, *𝑣₁* and *𝑣₂* which are converted by
    the linear map into the vectors *𝑢₁* and *𝑢₂*. Just as the measure of the single
    vector, *𝑣* was its length, the measure of two vectors is the area of the parallelogram
    contained between them.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/efb1dd89ee05d76f23cfa12b9f33f3a1.png)'
  prefs: []
  type: TYPE_IMG
- en: The area of the parallelogram formed by two vectors. Image by midjourney.
  prefs: []
  type: TYPE_NORMAL
- en: Just as we considered the amount by which the length of *𝑣* changed, we can
    now talk in terms of the amount by which the area between *𝑣₁* and *𝑣₂* changes
    once they pass through the linear map and become *𝑢₁*, *𝑢₂*. And alas, this again
    depends not just on the linear map, but also the vectors chosen.
  prefs: []
  type: TYPE_NORMAL
- en: Next, we can go to three vectors and consider the change in volume of the [parallelepiped](https://en.wikipedia.org/wiki/Parallelepiped) between
    them and run into the same problem of the initial vectors having a say.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/20639e7c092754b74504508564e75b0c.png)'
  prefs: []
  type: TYPE_IMG
- en: A three dimensional region in three dimensional space. If a linear map acts
    on these three vectors, the volume changes by the same amount no matter what the
    initial choice of the vectors. Image by midjourney.
  prefs: []
  type: TYPE_NORMAL
- en: But now consider an n-dimensional region in the original vector space. This
    region will have some “n-dimensional measure”. To understand this, a two dimensional
    measure is an area (measured in square kilometers). A three dimensional measure
    is the volume used for measuring water (in liters). A four dimensional measure
    has no counterpart in the physical world we’re used to, but is just as mathematically
    sound, a measure of the amount of four dimensional space enclosed within a parallelepiped
    formed of four 4- d vectors and so on.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f2af93db78df3d58c8c96912ff7fdf72.png)'
  prefs: []
  type: TYPE_IMG
- en: The measure in a 2-d space is area and that in 3-d space is volume. These notions
    can be extended to 4-d space and up. Image by midjourney
  prefs: []
  type: TYPE_NORMAL
- en: 'The *𝑛* original vectors (*𝑣₁, 𝑣₂, …, 𝑣ₙ*) form a parallelepiped which is transformed
    by the linear map into *𝑛* new vectors, *𝑢₁, 𝑢₂, …, 𝑢ₙ* which form their own parallelepiped.
    We can then ask about the *𝑛*-dimensional measure of the new region in relation
    to the original one. And this ratio, it turns out, is indeed a function only of
    the linear map. Regardless of what the original region looked like, where it was
    placed and so on, the ratio of its measure once the linear map acted on it to
    its measure before will be the same — a function purely of the linear map. This
    ratio of *𝑛*-dimensional measures (after to before) then is what we’ve been looking
    for: an *exclusive property* of the linear map that quantifies its effect in one
    number.'
  prefs: []
  type: TYPE_NORMAL
- en: This ratio by which the measure of *any* *𝑛*-dimensional patch of space is changed
    by the linear map is a good way to quantify the effect it has on the space it
    acts on. It is called the **determinant** of the linear map (the reason for that
    name will become apparent in section V).
  prefs: []
  type: TYPE_NORMAL
- en: For now, we simply stated the fact that the amount by which a linear map from
    *ℝⁿ* to *ℝⁿ* “stretches” any patch of *𝑛*-dimensional space depends only on the
    map without offering a proof since the purpose here was motivation. We’ll cover
    a proof later (section VI), once we arm ourselves with some weapons.
  prefs: []
  type: TYPE_NORMAL
- en: II) Calculating determinants
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now, how do we find this determinant given a linear map from the vector space
    *ℝⁿ* back to *ℝⁿ*? We can take any *𝑛* vectors, find the measure of the parallelepiped
    between them and the measure of the new parallelepiped once the linear map has
    acted on all of them. Finally, divide the latter by the former.
  prefs: []
  type: TYPE_NORMAL
- en: We need to make these steps more concrete. First, let’s start playing around
    in this *ℝⁿ* vector space.
  prefs: []
  type: TYPE_NORMAL
- en: 'The *ℝⁿ* vector space is just a collection of *𝑛* real numbers. The simplest
    vector is just *𝑛* zeros — *[0, 0, …, 0]*. This is the zero vector. If we multiply
    a scalar with it, we just get the zero vector back. Not interesting. For the next
    simplest vector, we can replace the first *0* with a *1.* This leads to the vector:
    *𝑒₁ = [1, 0, 0, …, 0]*. Now, multiplying by a scalar, *𝑐* gives us a different
    vector.'
  prefs: []
  type: TYPE_NORMAL
- en: $$c.[1, 0, 0,.., 0] = [c, 0, 0, …, 0]$$
  prefs: []
  type: TYPE_NORMAL
- en: We can “span” an infinite number of vectors with *𝑒₁* depending on the scalar
    *𝑐* we choose.
  prefs: []
  type: TYPE_NORMAL
- en: If *𝑒₁* is the vector with just the first element being *1* and the rest being
    *0*, then what is *𝑒₂*? The second element being *1* and the rest being *0* seems
    like a logical choice.
  prefs: []
  type: TYPE_NORMAL
- en: $$e_2 = [0,1,0,0,\dots 0]$$
  prefs: []
  type: TYPE_NORMAL
- en: 'Taking this to its logical conclusion, we get a collection of *n* vectors:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ef0c65c185b1b6e4f9c7703f12c1f65b.png)'
  prefs: []
  type: TYPE_IMG
- en: 'These vectors form a basis of the vector space that is *ℝⁿ*. What does this
    mean? Any vector *𝑣* in *ℝⁿ* can be expressed as a linear combination of these
    *𝑛* vectors. Which means that for some scalars *𝑐₁, 𝑐₂, …, 𝑐ₙ*:'
  prefs: []
  type: TYPE_NORMAL
- en: $$v = c_1.e_1+c_2.e_2+\dots +c_n.e_n$$
  prefs: []
  type: TYPE_NORMAL
- en: All vectors, *𝑣* are “spanned” by the set of vectors *𝑒₁, 𝑒₂, …, 𝑒ₙ*.
  prefs: []
  type: TYPE_NORMAL
- en: This particular collection of vectors isn’t the only basis. Any set of *𝑛* vectors
    works. The only caveat is that none of the *𝑛* vectors should be “spanned” by
    the rest. In other words, all the *𝑛* vectors should be linearly independent.
    If we choose *𝑛* random numbers from most continuous distributions and repeat
    the process *𝑛* times to create the *𝑛* vectors, you will get a set of linearly
    independent vectors with 100% probability (“almost surely” in probability terms).
    It’s just very, very unlikely that a random vector happens to be “spanned” by
    some other *𝑘 < 𝑛* random vectors.
  prefs: []
  type: TYPE_NORMAL
- en: Going back to our recipe at the beginning of this section to find the determinant
    of a linear map, we now have a basis to express our vectors in. Fixing the basis
    also means our linear map can be expressed as a matrix (see section III of chapter
    1). Since this linear map is taking vectors from *ℝⁿ* back to *ℝⁿ*, the corresponding
    matrix is *𝑛 × 𝑛*.
  prefs: []
  type: TYPE_NORMAL
- en: Next, we needed *𝑛* vectors to form our parallelepiped. Why not take the *𝑒₁,
    𝑒₂, …, 𝑒ₙ* standard basis we defined before? The measure of the patch of space
    contained between these vectors happens to be *1*, by very definition. The picture
    below for *ℝ³* will hopefully make this clear.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/31831cd8d153220184bf83cd8e9b3e50.png)'
  prefs: []
  type: TYPE_IMG
- en: The standard patch of space contained between vectors e1, e2, e3, …, en. In
    this case, we have three vectors since the space is 3-dimensional. Image created
    with midjourney
  prefs: []
  type: TYPE_NORMAL
- en: 'If we collect these vectors from the standard basis into a matrix (rows or
    columns), we get the identity matrix (1’s on the main diagonal, 0’s everywhere
    else):'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c63883e94cc264a141bc9ead6e291128.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Eq (0): The identity matrix'
  prefs: []
  type: TYPE_NORMAL
- en: When we said we could apply our linear transform to any n-dimensional patch
    of space, we might as well apply it to this “standard” patch.
  prefs: []
  type: TYPE_NORMAL
- en: But, it’s easy to show that multiplying any matrix with the identity matrix
    results in the same matrix. So, the resulting vectors after the linear map is
    applied are the columns of the matrix representing the linear map itself. So,
    the amount by which the linear map changed the volume of the “standard patch”
    is the same as the n-dimensional measure of the parallelepiped between the column
    vectors of the matrix representing the map itself.
  prefs: []
  type: TYPE_NORMAL
- en: To recap, we started by motivating the determinant as the ratio by which a linear
    map changes the measure of an n-dimensional patch of space. And now, we showed
    that this ratio itself is an n-dimensional measure. In particular, the measure
    contained between the column vectors of any matrix representing the linear map.
  prefs: []
  type: TYPE_NORMAL
- en: III) Motivating the basic properties
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We described in the previous section how a determinant of a linear map should
    simply be the measure contained between the vectors of any of its matrix representations.
    In this section, we use two dimensional space (where measures are areas) to motivate
    some fundamental properties a determinant must have.
  prefs: []
  type: TYPE_NORMAL
- en: 'The first property is multi-linearity. A determinant is a function that takes
    a bunch of vectors (collected in a matrix) and maps them to a single scalar. Since
    we’re restricting to two-dimensional space, we’ll consider two vectors, both two
    dimensional. Our determinant (since we’ve motivated it to be the area of the parallelogram
    between the vectors) can be expressed as:'
  prefs: []
  type: TYPE_NORMAL
- en: $$det = A(v_1, v_2)$$
  prefs: []
  type: TYPE_NORMAL
- en: 'How should this function behave if we add a vector to one of the two vectors?
    The multi-linearity property requires:'
  prefs: []
  type: TYPE_NORMAL
- en: $$A(v_1+v_3, v_2) = A(v_1,v_2)+A(v_3,v_2)\tag{1}$$
  prefs: []
  type: TYPE_NORMAL
- en: This is apparent from the moving picture below (note the new area getting added).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c6f5cfa2b9a3448c4c646f2f0ca41fa6.png)'
  prefs: []
  type: TYPE_IMG
- en: The additive property of a determinant. Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 'And this visualization can also be used to see (by scaling one of the vectors
    instead of adding another vector to it):'
  prefs: []
  type: TYPE_NORMAL
- en: $$A(c.v_1, v_2) = c.A(v_1, v_2) \tag{2}$$
  prefs: []
  type: TYPE_NORMAL
- en: This second property has an important implication. What if we plug a negative *c* into
    the equation?
  prefs: []
  type: TYPE_NORMAL
- en: The area, *𝐴(𝑣₁, 𝑣₂)* should then be the opposite sign to *𝐴(𝑐·𝑣₁, 𝑣₂)*.
  prefs: []
  type: TYPE_NORMAL
- en: Which means we need to introduce the notion of negative area and a negative
    determinant.
  prefs: []
  type: TYPE_NORMAL
- en: This makes a lot of sense if we’re okay with the concept of negative lengths.
    If lengths — measures in 1-D space — can be positive or negative, then it stands
    to reason that areas — measures in 2-D space — should also be allowed to be negative.
    And so, measures in space of any dimensionality should as well.
  prefs: []
  type: TYPE_NORMAL
- en: Together, equations (1) and (2) are the *multi-linearity* property.
  prefs: []
  type: TYPE_NORMAL
- en: 'Another important property that has to do with the sign of the determinant
    is the *alternating property*. It requires:'
  prefs: []
  type: TYPE_NORMAL
- en: $$A(v_1, v_2) = -A(v_2, v_1)$$
  prefs: []
  type: TYPE_NORMAL
- en: Swapping the order of two vectors negates the sign of the determinant (or measure
    between them). If you learned about the [cross product](https://en.wikipedia.org/wiki/Cross_product#:~:text=The%20cross%20product%20a%20%C3%97,parallelogram%20that%20the%20vectors%20span.)
    of 3-D vectors, this property will be very natural. To motivate it, let’s think
    first of the one-dimensional distance between two position vectors, *𝑑(𝑣₁, 𝑣₂)*.
    It’s clear that *𝑑(𝑣₁, 𝑣₂) = −𝑑(𝑣₂, 𝑣₁)* since when we go from *𝑣₂* to *𝑣₁*, we’re
    traveling in the opposite direction to when we go from *𝑣₁* to *𝑣₂*. Similarly,
    if the area spanned between vectors *𝑣₁* and *𝑣₂* is positive, then that between
    *𝑣₂* and *𝑣₁* must be negative. This property holds in *𝑛*-dimensional space as
    well. If in *𝐴(𝑣₁, 𝑣₂, …, 𝑣ₙ)* we swap two of the vectors, it causes the sign
    to switch.
  prefs: []
  type: TYPE_NORMAL
- en: 'The alternating property also implies that if one of the vectors is simply
    a scalar multiple of the other, the determinant must be *0*. This is because swapping
    the two vectors should negate the determinant:'
  prefs: []
  type: TYPE_NORMAL
- en: $$\begin{align}A(v_1, v_1) = -A(v_1, v_1)\
  prefs: []
  type: TYPE_NORMAL
- en: => 2 A(v_1, v_1) = 0\
  prefs: []
  type: TYPE_NORMAL
- en: => A(v_1, v_1) = 0\end{align}$$
  prefs: []
  type: TYPE_NORMAL
- en: 'We also have by multi-linearity (equation 2):'
  prefs: []
  type: TYPE_NORMAL
- en: $$A(v_1, c.v_1) = c A(v_1, v_1) = 0$$
  prefs: []
  type: TYPE_NORMAL
- en: This makes sense geometrically since if two vectors are parallel to each other,
    the area between them is \( 0 \).
  prefs: []
  type: TYPE_NORMAL
- en: The [video [6]](https://www.youtube.com/watch?v=9IswLDsEWFk) covers the geometric
    motivation of these properties with really good visualizations and [video [4]](https://www.youtube.com/watch?v=Ip3X9LOh2dk&t=295s) visualizes
    the alternating property quite well.
  prefs: []
  type: TYPE_NORMAL
- en: 'IV) Getting algebraic: Deriving the Leibniz formula'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this section, we move away from geometric intuition and approach the topic
    of determinants from an alternate route — that of cold, algebraic calculations.
  prefs: []
  type: TYPE_NORMAL
- en: See, the *multi-linearity* and *alternating* properties which we motivated in
    the last section with geometry are (remarkably) enough to give us a very specific
    algebraic formula for the determinant, called the *Leibniz formula*.
  prefs: []
  type: TYPE_NORMAL
- en: That formula helps us see properties of the determinant that would be really,
    really hard to observe from the geometric approach or with other algebraic formulas.
  prefs: []
  type: TYPE_NORMAL
- en: The Leibniz formula can then be reduced to the *Laplace expansion*, involving
    going along a row or column and calculating *cofactors* — which many people see
    in high school.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s derive the Leibniz formula. We need a function that takes the *𝑛* column
    vectors, *𝛼₁, 𝛼₂, …, 𝛼ₙ* of the matrix as input and converts them into a scalar,
    *𝑐*.
  prefs: []
  type: TYPE_NORMAL
- en: $$c=f(\vec{a_1}, \vec{a_2}, \dots \vec{a_n})$$
  prefs: []
  type: TYPE_NORMAL
- en: We can express each column vector in terms of the standard basis of the space.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f7caa755cc373a34932f45c5698af0e8.png)'
  prefs: []
  type: TYPE_IMG
- en: Now, we can apply the property of multi-linearity. For now, to the first column,
    *𝛼₁*.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/142557b468284022ff6c5ceda60ded55.png)'
  prefs: []
  type: TYPE_IMG
- en: We can do the same for the second column. Let’s take just the first term from
    the summation above and take a look at the resulting terms.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/3a461349ae0f30134480d9bb0db8e3fa.png)'
  prefs: []
  type: TYPE_IMG
- en: Note that in the first term, we get the vector *𝑒₁* appearing twice. And by
    the *alternating property*, the function *𝑓* for that term becomes *0*.
  prefs: []
  type: TYPE_NORMAL
- en: In order for two *𝑒₁*’s to appear, the second indices of the two *𝑎*’s in the
    product must each become *1*.
  prefs: []
  type: TYPE_NORMAL
- en: So, once we do this for all the columns, the terms that won’t become zero by
    the alternating property will be the ones where the second indices of the *𝑎*’s
    don’t have any repetition — so all distinct numbers from *1* to *𝑛*. In other
    words, we’re looking for *permutations* of *1* to *𝑛* to appear in the second
    indices of the *𝑎*’s.
  prefs: []
  type: TYPE_NORMAL
- en: What about the first indices of the *𝑎*’s? Those are simply the numbers *1*
    to *𝑛* in order since we pull out the *𝑎₁ₓ*’s first, then the *𝑎₂ₓ*’s, and so
    on. In more compact algebraic notation,
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/1c675704db721a6fba5ef7af95f967d3.png)'
  prefs: []
  type: TYPE_IMG
- en: In the expression on the right, the areas *𝑓(𝑒_{𝑗₁}, 𝑒_{𝑗₂}, …, 𝑒_{𝑗ₙ})* can
    either be *+1*, *−1*, or *0* since the *𝑒ⱼ*’s are all unit vectors orthogonal
    to each other. We already established that any term that has any repeated *𝑒ⱼ*’s
    will become *0*, leaving us with just permutations (no repetition). Among those
    permutations, we will sometimes get *+1* and sometimes *−1*.
  prefs: []
  type: TYPE_NORMAL
- en: 'The concept of permutations carries with it [signs](https://en.wikipedia.org/wiki/Parity_of_a_permutation#:~:text=The%20sign%2C%20signature%2C%20or%20signum,1%20if%20%CF%83%20is%20odd.).
    The signs of the areas are equivalent to the signs of the permutations. If we
    denote by *𝑆ₙ* the set of all permutations of *[1, 2, …, 𝑛]*, then we get the
    *Leibniz formula* of the determinant:'
  prefs: []
  type: TYPE_NORMAL
- en: $$\det([\vec{a_1}, \vec{a_2}, \dots \vec{a_n}]) = |A| = \sum\limits_{\sigma
    \in S_n} sgn(\sigma) \prod \limits_{i=1}^n a_{i,\sigma(i)} \tag{3}$$
  prefs: []
  type: TYPE_NORMAL
- en: This formula is also described in detail in [mathexchange post, [3]](https://math.stackexchange.com/questions/319321/understanding-the-leibniz-formula-for-determinants#:~:text=The%20formula%20says%20that%20det,permutation%20get%20a%20minus%20sign.&text=where%20the%20minus%20signs%20correspond%20to%20the%20odd%20permutations%20from%20above).
    And to make things concrete, here is some simple Python code that implements it
    (along with a test case).
  prefs: []
  type: TYPE_NORMAL
- en: One shouldn’t actually use this formula to calculate the determinant of a matrix
    (unless it’s just for fun or exposition). It works, but is comically inefficient
    given the sum over all permutations (which is *𝑛!*, which is super-exponential).
  prefs: []
  type: TYPE_NORMAL
- en: 'However, many theoretical properties of the determinant become trivial to see
    with the *Leibniz formula* when they would be very hard to decipher or prove if
    we started from another of its forms. For example:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Proposition-1:** With this formula it becomes apparent that a matrix and
    its transpose have the same determinant: *|𝐴| = |𝐴ᵀ|*. It’s a simple consequence
    of the symmetry of the formula.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Proposition-2:** A very similar derivation to the above can be used to show
    that for two matrices *𝐴* and *𝐵*, *|𝐴𝐵| = |𝐴| ⋅ |𝐵|*. See [this answer](https://math.stackexchange.com/a/60293/155881)
    in the [mathexchange post, [8]](https://math.stackexchange.com/questions/60284/how-to-show-that-detab-deta-detb).
    This is a very convenient property since [matrix multiplication](https://en.wikipedia.org/wiki/Matrix_multiplication)
    comes up all the time in various decompositions of matrices, and reasoning about
    the determinants of those decompositions can be a powerful tool.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Proposition-3:** With the *Leibniz formula*, we can easily see that if the
    matrix is upper triangular or lower triangular (lower triangular means every element
    of the matrix above the diagonal is zero), the determinant is simply the product
    of the entries on the diagonal. This is because all permutations bar one: *(𝑎₁₁
    ⋅ 𝑎₂₂ ⋯ 𝑎ₙₙ)* (the main diagonal) get some zero term or the other and make their
    terms in the summation *0*.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![](../Images/d144f980b6c42a33bee90b70f7bb8a10.png)'
  prefs: []
  type: TYPE_IMG
- en: An upper triangular matrix. All entries below the main diagonal are 0.
  prefs: []
  type: TYPE_NORMAL
- en: The third fact actually leads to the most efficient algorithm for calculating
    a determinant that most linear algebra libraries use. A matrix can be decomposed
    efficiently into lower and upper triangular matrices (called the LU decomposition
    which we’ll cover in the next chapter). After doing this decomposition, the third
    fact is used to multiply the diagonals of those lower and upper matrices to get
    their determinants. And finally, the second fact is used to multiply those two
    determinants and get the determinant of the original matrix.
  prefs: []
  type: TYPE_NORMAL
- en: A lot of people in high school or university when first exposed to the determinant,
    learn about the Laplace expansion, which involves expanding about a row or column,
    finding co-factors for each element and summing. That can be derived from the
    above Leibniz expansion by collecting similar terms. See [this answer](https://math.stackexchange.com/a/4225580/155881) to
    the [mathexchange post, [2]](https://math.stackexchange.com/a/4225580/155881).
  prefs: []
  type: TYPE_NORMAL
- en: V) Historic motivation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The determinant was first discovered in the context of linear systems of equations.
    Say we have *𝑛* equations in *𝑛* variables *(𝑥₀, 𝑥₁, …, 𝑥ₙ)*.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/479939cadabc912c7dabd9baf70eabbb.png)'
  prefs: []
  type: TYPE_IMG
- en: 'This system can be expressed in matrix form:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ff7e1d4bf788c1f542e6151e19bc7e9f.png)'
  prefs: []
  type: TYPE_IMG
- en: 'And more compactly:'
  prefs: []
  type: TYPE_NORMAL
- en: $$A.x = b$$
  prefs: []
  type: TYPE_NORMAL
- en: An important question is whether or not the system above has a unique solution, *x*.
    And the determinant is a function that “determines” this. There is a unique solution
    if and only if the determinant of *A* is non-zero.
  prefs: []
  type: TYPE_NORMAL
- en: This historically inspired approach motivates the determinant as a polynomial
    that arises when we try to solve a linear system of equations associated with
    the linear map. We will cover this in more depth in chapter 5.
  prefs: []
  type: TYPE_NORMAL
- en: For more on this, see the excellent answer in the [mathexchange post, [8]](https://math.stackexchange.com/a/4782557/155881).
  prefs: []
  type: TYPE_NORMAL
- en: VI) Proof of the property we motivated with
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We started this chapter by motivating the determinant as the amount by which
    the *ℝⁿ → ℝⁿ* linear map changes the measure of an *n*-dimensional patch of space.
    We also said that this doesn’t work for 1, 2, … *n − 1* dimensional measures.
    Below is a proof of this where we use some of the properties we encountered in
    the rest of the sections.
  prefs: []
  type: TYPE_NORMAL
- en: Define *(𝑉, 𝑈)* as *𝑛 × 𝑘* matrices, where
  prefs: []
  type: TYPE_NORMAL
- en: $$ V = (v_1, v_2, \dots, v_k) $$
  prefs: []
  type: TYPE_NORMAL
- en: By definition,
  prefs: []
  type: TYPE_NORMAL
- en: $$|v_1, v_2, \dots, v_k| = \sqrt{\det(V^t V)} $$ and
  prefs: []
  type: TYPE_NORMAL
- en: $$ |u_1, u_2, \dots, u_k| = \sqrt{\det(U^t U)} = \sqrt{\det((AV)^t (AV))} =
    \sqrt{\det(V^t A^t A V)} $$
  prefs: []
  type: TYPE_NORMAL
- en: Only when *n = k* is *V* is a square matrix, so
  prefs: []
  type: TYPE_NORMAL
- en: $$|v_1, v_2, \dots, v_k| = \sqrt{\det(V^t A^t A V)}$$
  prefs: []
  type: TYPE_NORMAL
- en: $$= \sqrt{\det(V^t) \det(A^t) \det(A) \det(V)} $$
  prefs: []
  type: TYPE_NORMAL
- en: $$= \det(A) \sqrt{\det(V^t V)} = \det(A) |v_1, v_2, \dots, v_k| $$
  prefs: []
  type: TYPE_NORMAL
- en: References
