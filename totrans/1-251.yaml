- en: 'PyTorch Explained: From Automatic Differentiation to Training Custom Neural
    Networks'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/the-basics-of-deep-learning-with-pytorch-in-1-hour/](https://towardsdatascience.com/the-basics-of-deep-learning-with-pytorch-in-1-hour/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1758673513409" class="mdspan-comment">Deep learning</mdspan>
    is shaping our world as we speak. In fact, it has been slowly revolutionizing
    software since the early 2010s. In 2025, PyTorch is at the forefront of this revolution,
    emerging as one of the most important libraries to train neural networks.
  prefs: []
  type: TYPE_NORMAL
- en: Whether you are working with computer vision, building large language models
    (LLMs), training a reinforcement learning agent, or experimenting with graph neural
    networks – your path is going to cross through PyTorch once you enter deep learning
    city.
  prefs: []
  type: TYPE_NORMAL
- en: '*All images provided in this article have been produced by the author.*'
  prefs: []
  type: TYPE_NORMAL
- en: This guide will provide a whirlwind tour of PyTorch’s methodologies and design
    principles. Over the next hour, we’re going to cut through the noise and get straight
    to the heart of how neural networks are actually trained.
  prefs: []
  type: TYPE_NORMAL
- en: This article is about PyTorch’s foundational concepts and *how* to compose and
    train models — **from simple linear regression all the way to a modern transformer
    block**.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: More importantly than the specific code examples presented here, the goal of
    this article is to teach the main ideas, project-level architectures, and abstractions
    to work with PyTorch.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**In other words, how to think “the PyTorch way”.**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Before we get that far, it is important to understand the basics. PyTorch is
    built on two core abstractions: tensors and automatic differentiation. Master
    these two — how tensors store data, and how gradients are used to train neural
    networks — and the rest of PyTorch will feel natural. Let’s discuss Tensors first.'
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Basics of Tensors
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'A tensor is a **multidimensional array** with a dtype, a device, and optional
    gradient tracking. If you know NumPy arrays, think of tensors as numpy arrays
    with a few major benefits:'
  prefs: []
  type: TYPE_NORMAL
- en: '**GPU utilization**: Tensors can perform massively parallel operations in the
    GPU. Matrix multiplications, additions, and even conditional statements are all
    supported.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Computation Graph:** Instead of imagining tensors as an isolated block of
    data, think of it as a node on a computation graph. (Shown below)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Automatic Differentiation:** PyTorch automatically calculates partial derivatives
    of each differentiable operation it performs. We will discuss what this actually
    means, and why this is a huge deal for training neural networks very shortly.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/79c2252f55ba63d31a6b51fc0001e120.png)'
  prefs: []
  type: TYPE_IMG
- en: 'A simple computation graph. Pytorch doesn’t just calculate the output, but
    it also stores information about what nodes the data flows through to generate
    the output. (Source: Author)'
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Automatic Differentiation (Autograd)
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Neural networks in PyTorch construct a dynamic computation graph, and use it
    to compute gradients automatically. Let’s see a simple example to learn this.
  prefs: []
  type: TYPE_NORMAL
- en: Let us begin with a clean, scalar example so that shapes and values are easy
    to reason about. The following code computes `z = x^2 + y^3` for scalar x and
    y, then calls backward to obtain `dz/dx` and `dz/dy`.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'What is happening:'
  prefs: []
  type: TYPE_NORMAL
- en: We created two tensors `x` and `y` with `requires_grad=True`. This tells autograd
    to track their operations.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The forward computation constructs a small graph for z.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`z.backward()` triggers the reverse-mode autodiff: PyTorch computes the gradients
    and places them in `x.grad` and `y.grad`.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Here is what the results of the above block of code will look like:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/4a358e5e40dd5f0836bb57bf49ad5492.png)'
  prefs: []
  type: TYPE_IMG
- en: 'If you did some mental math, here’s what the partial derivatives look like
    for that equation when calculated analytically (spoiler: it works!):'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/6bdfa122a7133538da30e5d458b7fa7f.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Analytical Solution (Source: Author)'
  prefs: []
  type: TYPE_NORMAL
- en: Chain Rule
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '[Chain Rule](https://en.wikipedia.org/wiki/Chain_rule) in calculus is a fundamental
    formula for differentiating composite functions, which are essentially functions
    within other functions. In simpler terms, you work from the outside in, taking
    the derivative of each “layer” of the function and multiplying them together.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s take a simple example of how the chain rule works in PyTorch. Let’s say
    you have the following three-step equation:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Eqn 1: `y = x^2`'
  prefs: []
  type: TYPE_NORMAL
- en: 'Eqn 2: `z = y + 1`'
  prefs: []
  type: TYPE_NORMAL
- en: 'Eqn 3: `w = z^2`'
  prefs: []
  type: TYPE_NORMAL
- en: Basically, `w` depends on `z`, `z` depends on `y`, `y` depends on `x`. *A basic
    chain of compositionality.* And let’s say you want to find the derivative of `w`
    with respect to `x`
  prefs: []
  type: TYPE_NORMAL
- en: 'The chain rule in calculus states that to find `dw/dx` we calculate the gradients
    up the chain of dependencies and multiply them. So:'
  prefs: []
  type: TYPE_NORMAL
- en: '`dw/dx = dw/dz * dz/dy * dy/dx`'
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s see how PyTorch does this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: And that’s it! *It just works*.
  prefs: []
  type: TYPE_NORMAL
- en: What’s even more special is that instead of defining x as a scalar like we did
    above, we can also define it as a multi-dimensional tensor.
  prefs: []
  type: TYPE_NORMAL
- en: Here’s what happens when we change the first line from initializing a scalar
    with `torch.tensor(2)` to a 1D-tensor with `torch.tensor([-1, 2])`
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b75b0ea5f319fef90482d436717c9b6d.png)'
  prefs: []
  type: TYPE_IMG
- en: Notice how when x is a vector, Pytorch calculates the gradients for each element
    of x
  prefs: []
  type: TYPE_NORMAL
- en: This is what makes PyTorch *so* *cool*. You can simultaneously (or parallely)
    compute gradients for multiple elements *just like that*.
  prefs: []
  type: TYPE_NORMAL
- en: When working on deep learning projects, our inputs are generally multi-dimensional,
    so PyTorch does a lot of heavy lifting in the background by parallelizing the
    gradient computation!
  prefs: []
  type: TYPE_NORMAL
- en: The Pytorch formula
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: As seen in the previous example, the PyTorch game plan is pretty simple.
  prefs: []
  type: TYPE_NORMAL
- en: Define the “forward pass” of your equation, i.e., how is your *dependent* variable
    derived from your *independent* variables?
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: PyTorch automatically computes the backward propagation (provided your equations
    are differentiable)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![](../Images/942a7b36011c11f798b9e9f9c066998d.png)'
  prefs: []
  type: TYPE_IMG
- en: 'We define the forward function of the computation graph. PyTorch automatically
    computes the gradients. (Source: Author)'
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Training models
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now that we understand the basics of auto differentiation, let’s see how [linear
    regression](https://en.wikipedia.org/wiki/Linear_regression) works in PyTorch.
    The code below constructs a small housing-style dataset with two features (area
    and age), normalizes them to the range of [-1, 1], and prepares us for some good
    old-fashioned linear regression.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: To do anything with PyTorch, we must first transfer the data into tensors! Notice
    how the data tensors X and Y do not require gradients because they are constants
    (i.e., they don’t change during training).
  prefs: []
  type: TYPE_NORMAL
- en: The weights `W` and `B` are trainable, though. We will update them to *fit*
    our dataset. To make it trainable through backpropagation, we need to set `requires_grad=True`
    for these declarations.
  prefs: []
  type: TYPE_NORMAL
- en: 'Look at the code below:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: Next, let’s generate a prediction! The forward pass uses the idiomatic matrix
    multiplication and addition, i.e. `X @ W + B`.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: The `@` operator basically does matrix multiplication between X and W. The `X
    @ W + B` model performs a “[linear transformation](https://en.wikipedia.org/wiki/Linear_map)”
    of X. Our goal is to tune the trainable weights W and B so that the prediction
    is closer to our target ground truth.
  prefs: []
  type: TYPE_NORMAL
- en: Next, we calculate the error as the mean square error loss. It calculates the
    distance between our current prediction and the ground truth. If we call `loss.backward()`
    we will also get the gradients of the trainable variables in the graph (i.e.,
    W and B).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: '`dW` and `dB` are the gradients of W and B with respect to the loss function.
    We can apply “[gradient descent](https://en.wikipedia.org/wiki/Gradient_descent)”
    to nudge these trainable parameters in the direction indicated by the gradient.'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: Understanding linear regression, loss calculation, and gradient descent are
    some of the pillars of machine learning, and by extension, deep learning. While
    updating the weights manually by subtracting the gradients is possible, it is
    infeasible in practice for deep neural networks with multiple layers of weights.
    If only there had been a way to automatically update weights without worrying
    about keeping track like this!
  prefs: []
  type: TYPE_NORMAL
- en: '**Side note**'
  prefs: []
  type: TYPE_NORMAL
- en: The above technique of taking small steps in the optimization space to iteratively
    learn the weights is called Gradient Descent. *Note that there are better ways
    to learn the optimal W and B for small datasets. Like the **Normal equation**,
    which gives us an analytical solution that doesn’t require any steps or iteration.
    It is however, computationally expensive for large datasets. For large matrices,
    the standard approach is to divide the data into minibatches and apply gradient
    descent individually. This technique is known as [Stochastic Gradient Descent](https://en.wikipedia.org/wiki/Stochastic_gradient_descent)
    (SGD).*
  prefs: []
  type: TYPE_NORMAL
- en: Optimizers
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: PyTorch optimizers are algorithms (like SGD, Adam, or RMSprop) that adjust the
    model’s weights and biases based on the computed gradients to minimize the loss
    function.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s check how the above Linear Regression code will look if we replaced the
    manual weight updates with PyTorch optimizers.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: 'The core loop for training models in PyTorch looks like this:'
  prefs: []
  type: TYPE_NORMAL
- en: Forward pass to compute `pred`
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Calculate`loss` by finding the error between the prediction (pred) and the ground
    truth (Y)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Backward pass with `loss.backward()` to populate `W.grad` and `B.grad.`
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Step with `optimizer.step()` to update parameters.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Zero gradients with `optimizer.zero_grad()` to avoid accumulation.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'SGD is a solid baseline for linear regression. As you scale up or face noisier
    gradients, adaptive optimizers can help. This is where PyTorch’s suite of open
    source optimizers comes into play. This includes adaptive optimizers, like Adam,
    that use techniques such as momentum and per-parameter learning rates to achieve
    faster and more stable convergence on these challenging tasks. Here is a flashcard
    comparing various popular ones:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f51e5581da2e6987756dd6d47aaa8e6a.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Some common PyTorch optimizers! (Source: Author)'
  prefs: []
  type: TYPE_NORMAL
- en: 'Not just optimizers, because Torch also provides a host of different loss functions
    too! Here are some examples:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/2c898373a74ffe16920abc7a76d63782.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Some common PyTorch loss functions (Source: Author)'
  prefs: []
  type: TYPE_NORMAL
- en: 4\. Layers and Modules
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Just like we don’t need to write our own optimizers, we don’t need to declare
    raw tensors and matrix multiplication logic on our own (for the most part). Pytorch
    modules have us covered.
  prefs: []
  type: TYPE_NORMAL
- en: 'A PyTorch Module is the fundamental building block for all neural networks
    in PyTorch, acting as a container for layers, learnable parameters, and the logic
    for how data flows through them. For example, that linear layer we wrote earlier,
    where we manually declared the weights and biases, we can instead use these lines
    of code:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: We learned how to make linear models (yay!), but what we really need to learn
    is how to train larger and deeper neural networks. The simplest type of neural
    network is the **[multi-layer perceptron](https://en.wikipedia.org/wiki/Multilayer_perceptron)**
    (MLP). An MLP is basically multiple linear layers with non-linear functions in
    between.
  prefs: []
  type: TYPE_NORMAL
- en: 'Creating MLPs is pretty straightforward in Torch. `nn.Sequential`is a common
    PyTorch module that is used to *sequentially* pass the input through multiple
    layers. Here is the code:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: Multi-layer perceptrons can learn compositional and non-linear functions! Here
    is an example of a zig-zag function and how a 2-layer MLP with RELU learns it.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/5a10368a72d0b26eaf17b2deb9947d4a.png)'
  prefs: []
  type: TYPE_IMG
- en: 'A 2 layer MLP training on a piecewise linear function (Source: Author)'
  prefs: []
  type: TYPE_NORMAL
- en: 5\. Writing custom networks
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Torch has a vast array of awesome layers and modules that have inspired entire
    research papers. You can think about these as lego blocks that you can fit into
    and compose any neural network.
  prefs: []
  type: TYPE_NORMAL
- en: Want a convolutional network layer for images? Use `nn.Conv2d`.
  prefs: []
  type: TYPE_NORMAL
- en: A GRU layer to process sequential tokens? Use `nn.GRU`
  prefs: []
  type: TYPE_NORMAL
- en: 'But most often in research, you would want to write a custom neural network
    architecture from scratch. The recipe for this process is as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: Subclass from `nn.Module`
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In the `__init__` constructor function, initialize all your layers and weights
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Define a `forward()` where you write the logic of the forward pass
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Here is an example where we implement the classic [ResNet](https://arxiv.org/abs/1512.03385)
    architecture:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: That’s it! You just initialize your layers and define the forward pass computation
    graph, and Torch will directly do the backward pass on its own.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/fb755e2780bcfa2e55cc6498c41a668b.png)'
  prefs: []
  type: TYPE_IMG
- en: A standard ResNet Block passes embeddings through a short stack of neural network
    layers (like convolution) and then adds the original embeddings back to the final
    output
  prefs: []
  type: TYPE_NORMAL
- en: Of course, you can use your custom layers and modules as parts of a much larger
    network! For example, here is an example of writing a single transformer block.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: Notice how the first module `AttentionLayer` computes [the scaled-dot-product
    attention](https://arxiv.org/abs/1706.03762). `TransformerBlock` applies layer
    norms and feedforward networks on top of it. And finally, the `TransformerEncoder`
    module applies multiple Transformer blocks in a sequence! And just like that,
    we have a [BERT model](https://arxiv.org/abs/1810.04805) that incorporates multiple
    stacks of bidirectional attention layers, along with various optimizations such
    as layer norms and residual connections.
  prefs: []
  type: TYPE_NORMAL
- en: '**If you are a beginner and this part overwhelms you, this is very much expected!**
    The cool thing with PyTorch is you get to choose the level of complexity you want
    to work with depending on your skill level.'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: When you are beginning, you may want to stick to the hundreds of readymade modules
    Pytorch offers out of the box. You will slowly find the need to branch out and
    customizing them for your own use-case. And as you write a couple of custom ones
    on your own, you will grow more and more confident and proficient.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'The goal of this section was to show you the capabilities and infinite customization
    you can do by combining modules together. Remember: you write the forward pass,
    and as long as the full graph is differentiable, Torch will always be able to
    do the auto-differentiation for you!'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Next steps
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The features and concepts covered in this article were handpicked to provide
    a whirlwind tour of some of Torch’s most important capabilities. I have a YouTube
    video that explains all of these concepts, along with some additional ones like
    model deployment, dataloaders, distributions, and training methods.
  prefs: []
  type: TYPE_NORMAL
- en: That’s it for this article! Here are some links where you can learn more about
    my work. Thanks for the read!
