- en: 'Introducing ShaTS: A Shapley-Based Method for Time-Series Models'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 介绍ShaTS：基于Shapley的时间序列模型方法
- en: 原文：[https://towardsdatascience.com/introducing-shats-a-shapley-based-method-for-time-series-models/](https://towardsdatascience.com/introducing-shats-a-shapley-based-method-for-time-series-models/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/introducing-shats-a-shapley-based-method-for-time-series-models/](https://towardsdatascience.com/introducing-shats-a-shapley-based-method-for-time-series-models/)
- en: Introduction
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 简介
- en: <mdspan datatext="el1763169001459" class="mdspan-comment">Shapley-based methods</mdspan>
    are among the most popular tools for explaining Machine Learning (ML) and Deep
    Learning (DL) models. However, for time-series data, these methods often fall
    short because they do not account for the temporal dependencies inherent in such
    datasets. In a recent article, we ([Ángel Luis Perales Gómez](https://scholar.google.com/citations?user=ZF7l9QcAAAAJ),
    [Lorenzo Fernández Maimó](https://scholar.google.com/citations?&user=NJcxK4QAAAAJ)
    and [me](https://scholar.google.com/citations?&user=IKzgARsAAAAJ)) introduced
    [ShaTS](https://doi.org/10.1016/j.future.2025.108178), a novel Shapley-based explainability
    method specifically designed for time-series models. ShaTS addresses the limitations
    of traditional Shapley methods by incorporating grouping strategies that enhance
    both computational efficiency and explainability.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1763169001459" class="mdspan-comment">基于Shapley的方法</mdspan>是解释机器学习（ML）和深度学习（DL）模型最受欢迎的工具之一。然而，对于时间序列数据，这些方法通常不足，因为它们没有考虑到此类数据集中固有的时间依赖性。在最近的一篇文章中，我们（[Ángel
    Luis Perales Gómez](https://scholar.google.com/citations?user=ZF7l9QcAAAAJ)，[Lorenzo
    Fernández Maimó](https://scholar.google.com/citations?&user=NJcxK4QAAAAJ) 和 [我](https://scholar.google.com/citations?&user=IKzgARsAAAAJ)）介绍了[ShaTS](https://doi.org/10.1016/j.future.2025.108178)，这是一种专为时间序列模型设计的新的基于Shapley的解释方法。ShaTS通过结合提高计算效率和可解释性的分组策略来解决传统Shapley方法的局限性。
- en: 'Shapley values: The foundation'
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: Shapley值：基础
- en: '[Shapley values](https://www.rand.org/content/dam/rand/pubs/papers/2021/P295.pdf)
    originate in cooperative game theory and fairly distribute the total gain among
    players based on their individual contributions to a collaborative effort. The
    Shapley value for a player is calculated by considering all possible coalitions
    of players and determining the marginal contribution of that player to each coalition.'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: '[Shapley值](https://www.rand.org/content/dam/rand/pubs/papers/2021/P295.pdf)起源于合作博弈论，并基于玩家对协作努力的个体贡献公平地分配总收益。玩家Shapley值的计算是通过考虑所有可能的玩家联盟，并确定该玩家对每个联盟的边际贡献。'
- en: 'Formally, the Shapley value *φ[i]* for player *i* is:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 正式来说，玩家 *i* 的Shapley值 *φ[i]* 是：
- en: \[ \varphi_i(v) = \sum_{S \subseteq N \setminus {i}}
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: \[ \varphi_i(v) = \sum_{S \subseteq N \setminus {i}} \]
- en: \frac{|S|! (|N| – |S| – 1)!}{|N|!} (v(S \cup {i}) – v(S)) \]
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: \[ \frac{|S|! (|N| – |S| – 1)!}{|N|!} (v(S \cup {i}) – v(S)) \]
- en: 'where:'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 其中：
- en: '*N* is the set of all players.'
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*N* 是所有玩家的集合。'
- en: '*S* is a coalition of players not including *i*.'
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*S* 是不包括 *i* 的玩家联盟。'
- en: '*v(S)* is the value function that assigns a value to each coalition (i.e.,
    the total gain that coalition *S* can achieve).'
  id: totrans-12
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*v(S)* 是分配每个联盟价值的值函数（即联盟 *S* 可以实现的总收益）。'
- en: This formula averages the marginal contributions of player *i* across all possible
    coalitions, weighted by the likelihood of each coalition forming.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 这个公式平均了玩家 *i* 在所有可能的联盟中的边际贡献，并按每个联盟形成的可能性进行加权。
- en: 'From Game Theory to xAI: Shapley values in Machine Learning'
  id: totrans-14
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 从博弈论到xAI：机器学习中的Shapley值
- en: In the context of explainable AI (xAI), Shapley values attribute a model’s output
    to its input features. This is particularly useful for understanding complex models,
    such as deep neural networks, where the relationship between input and output
    is not always clear.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 在可解释人工智能（xAI）的背景下，Shapley值将模型的输出归因于其输入特征。这对于理解复杂模型，如深度神经网络，其中输入和输出之间的关系并不总是清晰的，特别有用。
- en: Shapley-based methods can be computationally expensive, especially as the number
    of features increases, because the number of possible coalitions grows exponentially.
    However, approximation methods, particularly those implemented in the popular
    [SHAP library](https://doi.org/10.48550/arXiv.1705.07874), have made them feasible
    in practice. These methods estimate the Shapley values by sampling a subset of
    coalitions rather than evaluating all possible combinations, significantly reducing
    the computational burden.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 基于Shapley的方法可能在计算上很昂贵，尤其是随着特征数量的增加，因为可能的联盟数量呈指数增长。然而，近似方法，尤其是那些在流行的[SHAP库](https://doi.org/10.48550/arXiv.1705.07874)中实现的方法，使它们在实际中变得可行。这些方法通过采样联盟的子集而不是评估所有可能的组合来估计Shapley值，从而显著减少了计算负担。
- en: 'Consider an industrial scenario with three components: a water tank, a thermometer,
    and an engine. Suppose we have an Anomaly Detection (AD) ML/DL model that detects
    malicious activity based on the readings from these components. Using SHAP, we
    can determine how much each component contributes to the model’s prediction of
    whether the activity is malicious or benign.'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑一个包含三个组件的工业场景：一个水箱、一个温度计和一个发动机。假设我们有一个基于这些组件读数的异常检测（AD）机器学习/深度学习模型，该模型根据这些组件的读数检测恶意活动。使用
    SHAP，我们可以确定每个组件对模型预测活动是恶意还是良性的贡献程度。
- en: '![](../Images/857c21f635c765fc216bfbbc41e1f352.png)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/857c21f635c765fc216bfbbc41e1f352.png)'
- en: Integration of SHAP in an industrial Anomaly Detection scenario. Image created
    by the authors
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 在工业异常检测场景中集成 SHAP。图像由作者创建
- en: However, in more realistic scenarios the model uses not only the current reading
    from each sensor but also previous readings (a temporal window) to make predictions.
    This approach allows the model to capture temporal patterns and trends, thereby
    improving its performance. Applying SHAP in this scenario to assign responsibility
    to each physical component becomes more challenging because there is no longer
    a one-to-one mapping between features and sensors. Each sensor now contributes
    multiple features associated with different time steps. The common approach here
    is to calculate the Shapley value of each feature at each time step and then post-hoc
    aggregate these values.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，在更现实的场景中，模型不仅使用每个传感器的当前读数，还使用之前的读数（时间窗口）来做出预测。这种方法允许模型捕捉时间模式和趋势，从而提高其性能。在应用
    SHAP 到这个场景以分配每个物理组件的责任时，由于特征和传感器之间不再是一对一映射，因此变得更加具有挑战性。每个传感器现在贡献了与不同时间步相关的多个特征。这里常用的方法是在每个时间步计算每个特征的
    Shapley 值，然后事后汇总这些值。
- en: '![](../Images/5d4492505f9120badb54b79e43f5af0d.png)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/5d4492505f9120badb54b79e43f5af0d.png)'
- en: Integration of SHAP in an industrial Anomaly Detection scenario with windowed
    sensor data and post-hoc aggregation. Image created by the authors.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 在具有窗口化传感器数据和事后汇总的工业异常检测场景中集成 SHAP。图像由作者创建。
- en: 'This approach has two main drawbacks:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法有两个主要缺点：
- en: '**Computational Complexity**: The computational cost increases exponentially
    with the number of features, making it impractical for large time-series datasets.'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**计算复杂度**：随着特征数量的指数增长，计算成本增加，对于大型时间序列数据集来说不切实际。'
- en: '**Ignoring Temporal Dependencies**: SHAP explainers are designed for tabular
    data without temporal dependencies. Post-hoc aggregation can lead to inaccurate
    explanations because it fails to capture temporal relationships between features.'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**忽略时间依赖性**：SHAP 解释器是为没有时间依赖性的表格数据设计的。事后汇总可能导致不准确的解释，因为它未能捕捉特征之间的时间关系。'
- en: 'The ShaTS Approach: Grouping Before Computing Importance'
  id: totrans-26
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: ShaTS 方法：在计算重要性之前进行分组
- en: 'In the Shapley framework, a player’s value is determined solely by comparing
    the performance of a coalition with and without that player. Although the method
    is defined at the individual level, nothing prevents applying it to groups of
    players rather than to single individuals. Thus, if we consider a set of players
    *N* divided into *p* groups *G = {G[1], … , G[p]}*, we can compute the Shapley
    value for each group *G[i]* by evaluating the marginal contribution of the entire
    group to all possible coalitions of the remaining groups. Formally, the Shapley
    value for group *G[i]* can be expressed as:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 在 Shapley 框架中，一个玩家的价值仅通过比较包含和不包含该玩家的联盟的性能来确定。尽管该方法是在个体层面定义的，但没有任何阻止将其应用于玩家组而不是单个个体的。因此，如果我们考虑一个分为
    *p* 个组 *G = {G[1], … , G[p]}* 的玩家集 *N*，我们可以通过评估整个组对所有可能剩余组联盟的边际贡献来计算每个组 *G[i]*
    的 Shapley 值。形式上，组 *G[i]* 的 Shapley 值可以表示为：
- en: \[ \varphi(G_i) = \sum_{T \subseteq G \setminus G_i} \frac{|T|! (|G| – |T| –
    1)!}{|G|!} \left( v(T \cup G_i) – v(T) \right) \]
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: \[ \varphi(G_i) = \sum_{T \subseteq G \setminus G_i} \frac{|T|! (|G| – |T| –
    1)!}{|G|!} \left( v(T \cup G_i) – v(T) \right) \]
- en: 'where:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 其中：
- en: '*G* is the set of all groups.'
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*G* 是所有群组的集合。'
- en: '*T* is a coalition of groups not including *G[i]*.'
  id: totrans-31
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*T* 是不包括 *G[i]* 的群组合并。'
- en: '*v(T)* is the value function that assigns a value to each coalition of groups.'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '*v(T)* 是一个将值分配给每个群组合并的价值函数。'
- en: 'Building on this idea, ShaTS operates on time windows and provides three distinct
    levels of grouping, depending on the explanatory goal:'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 基于这个想法，ShaTS 在时间窗口上操作，并根据解释目标提供三个不同的分组级别：
- en: Temporal
  id: totrans-34
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 时间
- en: Each group contains all measurements recorded at a specific instant within the
    time window. This strategy is useful for identifying critical instants that significantly
    influence the model’s prediction.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 每个组包含在时间窗口内特定时刻记录的所有测量值。这种策略有助于识别对模型预测有显著影响的临界时刻。
- en: '![](../Images/c9fcd1c3bfa51a581189a6eef27f94eb.png)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
  zh: '![图像](../Images/c9fcd1c3bfa51a581189a6eef27f94eb.png)'
- en: Example of temporal grouping strategy. Image created by the authors.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 时间分组策略的示例。图像由作者创建。
- en: Feature
  id: totrans-38
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 特征
- en: Each group represents the measurements of an individual feature over the time
    window. This strategy isolates the impact of specific features on the model’s
    decisions.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 每个组代表单个特征在时间窗口内的测量值。这种策略隔离了特定特征对模型决策的影响。
- en: '![](../Images/590e6eec1fd1435f4a96ca664afe1a97.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
  zh: '![图像](../Images/590e6eec1fd1435f4a96ca664afe1a97.png)'
- en: Example of feature grouping strategy. Image created by the authors.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 特征分组策略的示例。图像由作者创建。
- en: Multi-Feature
  id: totrans-42
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 多特征
- en: Each group includes the combined measurements over the time window of features
    that share a logical relationship or represent a cohesive functional unit. This
    approach analyzes the collective impact of interdependent features, ensuring their
    combined influence is captured.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 每个组包含具有逻辑关系或代表统一功能单元的特征在时间窗口内的综合测量值。这种方法分析相互依赖特征的集体影响，确保其综合影响被捕捉。
- en: '![](../Images/1ecebb1aebfd1f5807a929f6b35ad6fd.png)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
  zh: '![图像](../Images/1ecebb1aebfd1f5807a929f6b35ad6fd.png)'
- en: Example of multi-feature grouping strategy. Image created by the authors.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 多特征分组策略的示例。图像由作者创建。
- en: Once groups are defined, Shapley values are computed exactly as in the individual
    case, but using group-level marginal contributions instead of per-feature contributions.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦定义了组，Shapley 值的计算方法与单个情况完全相同，但使用组级边际贡献而不是每个特征的贡献。
- en: '![](../Images/6e3c31249215e1dd07f1f561796beb1e.png)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
  zh: '![图像](../Images/6e3c31249215e1dd07f1f561796beb1e.png)'
- en: ShaTS methodology overview. Image created by the authors.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: ShaTS 方法概述。图像由作者创建。
- en: ShaTS custom visualization
  id: totrans-49
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: ShaTS 定制可视化
- en: ShaTS includes a visualization designed specifically for sequential data and
    for the three grouping strategies above. The horizontal axis shows consecutive
    windows. The left vertical axis lists the groups, and the right vertical axis
    overlays the model’s anomaly score for each window. Each heatmap cell at *(i,
    G[j])* represents the importance of group *G[j]* for window *i*. Warmer reds indicate
    a stronger positive contribution to the anomaly, cooler blues indicate a stronger
    negative contribution, and near-white means negligible influence. A purple dashed
    line traces the anomaly score across windows, and a horizontal dashed line at
    0.5 marks the decision threshold between anomalous and normal windows.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: ShaTS 包含专为顺序数据和上述三种分组策略设计的可视化。水平轴显示连续窗口。左侧垂直轴列出组，右侧垂直轴叠加每个窗口的模型异常分数。每个热图单元格在
    *(i, G[j])* 处代表组 *G[j]* 对窗口 *i* 的重要性。较暖的红色表示对异常的更强正向贡献，较冷的蓝色表示更强的负向贡献，接近白色表示可忽略的影响。紫色虚线追踪窗口之间的异常分数，水平虚线在
    0.5 处标记异常窗口和正常窗口之间的决策阈值。
- en: To illustrate, imagine a model that processes windows of length 10 built from
    three features, *X*, *Y*, and *Z*. When an operator receives an alert and wants
    to know which signal triggered it, they inspect the feature grouping results.
    In the next figure, around windows 10–11 the anomaly score rises above the threshold,
    while the attribution for *X* intensifies. This pattern indicates that the decision
    is being driven primarily by *X*.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 为了说明，想象一个处理由三个特征 *X*、*Y* 和 *Z* 构成的长度为 10 的窗口的模型。当操作员收到警报并想知道哪个信号触发了它时，他们会检查特征分组结果。在下一图中，大约在窗口
    10-11 之间，异常分数超过阈值，而 *X* 的归因增强。这种模式表明决策主要是由 *X* 驱动的。
- en: '![](../Images/b0b7a13d935c3d1f6d0b9f80e2e7d1fd.png)'
  id: totrans-52
  prefs: []
  type: TYPE_IMG
  zh: '![图像](../Images/b0b7a13d935c3d1f6d0b9f80e2e7d1fd.png)'
- en: ShaTS custom visualization for Feature Strategy. Image generated by ShaTS library.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: ShaTS 为特征策略定制的可视化。由 ShaTS 库生成。
- en: If the next question is when, within each window, the anomaly occurs, the operator
    switches to the temporal grouping view. The next figure shows that the final instant
    of each window (*t[9]*) consistently carries the strongest positive attribution,
    revealing that the model has learned to rely on the last time step to classify
    the window as anomalous.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 如果下一个问题是每个窗口中异常发生的时间，操作员将切换到时间分组视图。下一图显示，每个窗口的最终时刻（*t[9]*）始终具有最强的正向归因，表明模型已经学会了依赖最后一个时间步来将窗口分类为异常。
- en: '![](../Images/7d13c8e7fa542c53c1a836a49111fd8b.png)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7d13c8e7fa542c53c1a836a49111fd8b.png)'
- en: ShaTS custom visualization for Temporal Strategy. The left y-axis lists the
    window’s time slots $t_0$ (earliest) to $t_9$ (most recent). Image generated by
    ShaTS library.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: ShaTS针对时间策略的定制可视化。左侧y轴列出了窗口的时间槽$t_0$（最早）到$t_9$（最近）。由ShaTS库生成的图像。
- en: 'Experimental Results: Testing ShaTS on the SWaT Dataset'
  id: totrans-57
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实验结果：在SWaT数据集上测试ShaTS
- en: 'In [our recent publication](https://doi.org/10.1016/j.future.2025.108178),
    we validated ShaTS on the Secure Water Treatment ([SWaT](https://doi.org/10.1109/CySWater.2016.7469060))
    testbed, an industrial water facility with 51 sensors/actuators organized into
    six plant stages (P1–P6). A stacked Bi-LSTM trained on windowed signals served
    as the detector, and we compared ShaTS with post hoc KernelSHAP using three viewpoints:
    Temporal (which instant in the window matters), Sensor/Actuator (which device),
    and Process (which of the six stages).'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 在[我们最近发表的论文](https://doi.org/10.1016/j.future.2025.108178)中，我们验证了ShaTS在安全水处理([SWaT](https://doi.org/10.1109/CySWater.2016.7469060))测试平台上的有效性，该平台是一个拥有51个传感器/执行器的工业水处理设施，这些传感器/执行器被组织成六个工厂阶段（P1–P6）。一个在窗口信号上训练的堆叠Bi-LSTM模型作为检测器，我们使用三个观点比较了ShaTS与后处理KernelSHAP：时间（窗口中的哪个瞬间很重要）、传感器/执行器（哪个设备）和过程（六个阶段中的哪一个）。
- en: 'Across attacks, ShaTS yielded tight, interpretable bands that pinpointed the
    true source—down to the sensor/actuator or plant stage—whereas post hoc SHAP tended
    to diffuse importance across many groups, complicating root-cause analysis. ShaTS
    was also faster and more scalable: grouping shrinks the player set, so the coalition
    space drops dramatically; run time stays nearly constant as the window length
    grows because the number of groups does not change; and GPU execution further
    accelerates the method, making near-real-time use practical.'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 在攻击中，ShaTS产生了紧凑、可解释的带，精确地指出了真正的来源——从传感器/执行器或工厂阶段——而后处理SHAP往往将重要性扩散到许多组中，复杂了根本原因分析。ShaTS还更快、更可扩展：分组缩小了玩家集，因此联盟空间大幅下降；运行时间几乎保持不变，因为组数不会随窗口长度的增加而改变；GPU执行进一步加速了该方法，使近实时使用成为可能。
- en: 'Hands-on Example: Integrating ShaTS into Your Workflow'
  id: totrans-60
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 实践示例：将ShaTS集成到您的流程中
- en: 'This walkthrough shows how to plug ShaTS into a typical Python workflow: import
    the library, choose a grouping strategy, initialize the explainer with your trained
    model and background data, compute group-wise Shapley values on a test set, and
    visualize the results. The example assumes a PyTorch time-series model and that
    your data is windowed (e.g., shape [window_len, n_features] per sample).'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 本指南展示了如何将ShaTS集成到典型的Python工作流程中：导入库，选择分组策略，使用您的训练模型和背景数据初始化解释器，在测试集上计算分组Shapley值，并可视化结果。示例假设使用PyTorch时间序列模型，并且您的数据是窗口化的（例如，每个样本的形状为[window_len,
    n_features]）。
- en: 1\. Import ShaTS and configure the Explainer
  id: totrans-62
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1. 导入ShaTS并配置解释器
- en: In your Python script or notebook, begin by importing the necessary components
    from the ShaTS library. While the repository exposes the abstract ShaTS class,
    you will typically instantiate one of its concrete implementations (e.g., FastShaTS).
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 在您的Python脚本或笔记本中，首先从ShaTS库导入必要的组件。虽然存储库公开了抽象的ShaTS类，但您通常会实例化其具体实现之一（例如，FastShaTS）。
- en: '[PRE0]'
  id: totrans-64
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 2\. Initialize the Model and Data
  id: totrans-65
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2. 初始化模型和数据
- en: Assume you have a pre-trained time series PyTorch model and a background dataset,
    which should be a list of tensors representing typical data samples that the model
    has seen during training. If you want to better undestand the background dataset
    check [this](https://mindfulmodeler.substack.com/p/shap-interpretations-depend-on-background)
    blog from Cristoph Molnar.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 假设您有一个预训练的时间序列PyTorch模型和一个背景数据集，该数据集应是一个张量列表，代表模型在训练期间看到的典型数据样本。如果您想更好地理解背景数据集，请查看Cristoph
    Molnar的[这篇](https://mindfulmodeler.substack.com/p/shap-interpretations-depend-on-background)博客。
- en: '[PRE1]'
  id: totrans-67
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 3\. Compute Shapley Values
  id: totrans-68
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. 计算Shapley值
- en: Once the explainer is initialized, compute the ShaTS values for your test dataset.
    The test dataset should be formatted similarly to the background dataset.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦初始化了解释器，就计算测试数据集的ShaTS值。测试数据集的格式应类似于背景数据集。
- en: '[PRE2]'
  id: totrans-70
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 4\. Visualize Results
  id: totrans-71
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4. 可视化结果
- en: Finally, use the built-in visualization function to plot the ShaTS values. You
    can specify which class (e.g., anomalous or normal) you want to explain.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，使用内置的可视化函数绘制ShaTS值。您可以指定您想要解释的类别（例如，异常或正常）。
- en: '[PRE3]'
  id: totrans-73
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Key Takeaways
  id: totrans-74
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关键要点
- en: '**Focused Attribution**: ShaTS provides more focused attributions than post
    hoc SHAP, making it easier to identify the root cause in time-series models.'
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**聚焦归因**：与后处理SHAP相比，ShaTS提供了更聚焦的归因，这使得在时间序列模型中及时识别根本原因变得更加容易。'
- en: '**Efficiency**: By reducing the number of players to groups, ShaTS significantly
    decreases the coalitions to evaluate, leading to faster computation times.'
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**效率**：通过将玩家数量分组，ShaTS显著减少了需要评估的联盟数量，从而缩短了计算时间。'
- en: '**Scalability**: ShaTS maintains consistent performance even as window size
    increases, thanks to its fixed group structure.'
  id: totrans-77
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**可扩展性**：由于ShaTS具有固定的组结构，即使窗口大小增加，它也能保持一致的性能。'
- en: '**GPU Acceleration**: ShaTS can leverage GPU resources, further enhancing its
    speed and efficiency.'
  id: totrans-78
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**GPU加速**：ShaTS可以利用GPU资源，进一步提高其速度和效率。'
- en: Try it yourself
  id: totrans-79
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 试试看
- en: Interactive demo
  id: totrans-80
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 交互式演示
- en: Compare ShaTS with post hoc SHAP on synthetic time-series [here](https://shats-lab.ovh).
    You can find a tutorial on the following video.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 在[这里](https://shats-lab.ovh)比较ShaTS与后处理SHAP在合成时间序列上的表现。您可以在下面的视频中找到教程。
- en: Open source
  id: totrans-82
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 开源
- en: The ShaTS module is fully documented and ready to plug into your ML/DL pipeline.
    Find the code on [Github](https://www.github.com/CyberDataLab/ShaTS).
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: ShaTS模块已完全文档化，并准备好插入到您的ML/DL管道中。您可以在[GitHub](https://www.github.com/CyberDataLab/ShaTS)上找到代码。
- en: I hope you liked it! You’re welcome to [contact me](https://www.linkedin.com/in/manuel-francop/)
    if you have questions, want to share feedback, or simply feel like showcasing
    your own projects.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 希望您喜欢！如果您有任何问题，想要分享反馈，或者只是想展示您自己的项目，欢迎[联系我](https://www.linkedin.com/in/manuel-francop/)。
