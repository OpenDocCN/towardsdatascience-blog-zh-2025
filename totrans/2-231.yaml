  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/core-machine-learning-skills-revisited/](https://towardsdatascience.com/core-machine-learning-skills-revisited/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Never miss a new edition of *The Variable*, our weekly newsletter featuring
    a top-notch selection of editors’ picks, deep dives, community news, and more.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[Subscribe today](https://newsletter.towardsdatascience.com/subscription-to-the-newsletter)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: With all the buzz around agents, LLMs, and the tools they power, it’s sometimes
    easy (or at least tempting) to think that fundamental machine learning workflows—feature
    selection, model monitoring, and the like—will soon become obsolete.
  prefs: []
  type: TYPE_NORMAL
- en: The articles we selected for you this week paint a different and more nuanced
    picture. Sure, practitioners have powerful new toys to play with, but the inherent
    value in understanding how models work (and break) isn’t going anywhere. Read
    on to learn how you can continue to develop as a data or ML professional in the
    “AI is everywhere!” age.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: I Won $10,000 in a Machine Learning Competition — Here’s My Complete Strategy
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Walking us through the process she followed to excel at a recent competition, [Claudia
    Ng](https://towardsdatascience.com/author/ds-claudia/) highlights how “success
    in machine learning isn’t about having the fanciest tools or the most complex
    algorithms,” but rather all about “understanding your problem, applying solid
    fundamentals, and focusing on what actually moves the needle.”
  prefs: []
  type: TYPE_NORMAL
- en: '[I Won $10,000 in a Machine Learning Competition — Here’s My Complete Strategy](https://towardsdatascience.com/i-won-10000-in-a-machine-learning-competition-heres-my-complete-strategy/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Grad-CAM from Scratch with PyTorch Hooks
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In a new hands-on tutorial, Conor O’Sullivan zooms in on a powerful explainable-AI
    technique for convolutional neural networks.
  prefs: []
  type: TYPE_NORMAL
- en: '[Grad-CAM from Scratch with PyTorch Hooks](https://towardsdatascience.com/grad-cam-from-scratch-with-pytorch-hooks/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Data Drift Is Not the Actual Problem: Your Monitoring Strategy Is'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: “I think the real concern is that most organizations monitor data without understanding
    it.” Mahe Jabeen Abdul explains why it’s so tricky to know what to monitor.
  prefs: []
  type: TYPE_NORMAL
- en: '[Data Drift Is Not the Actual Problem: Your Monitoring Strategy Is](https://towardsdatascience.com/data-drift-is-not-the-actual-problem-your-monitoring-strategy-is/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: How to Measure Real Model Accuracy When Labels Are Noisy
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Leveraging Bayesian methods and Python, Erdogan Taskesen’s deep dive focuses
    on effectively determining causality across variables.
  prefs: []
  type: TYPE_NORMAL
- en: '[A Practical Starters’ Guide to Causal Structure Learning with Bayesian Methods
    in Python](https://towardsdatascience.com/a-practical-starters-guide-to-causal-structure-learning-with-bayesian-methods-in-python/)'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
