- en: 'May Must-Reads: Math for Machine Learning Engineers, LLMs, Agent Protocols,
    and More'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 五月必读：机器学习工程师的数学、LLM、代理协议等
- en: 原文：[https://towardsdatascience.com/may-must-reads-math-for-machine-learning-engineers-llms-agent-protocols-and-more/](https://towardsdatascience.com/may-must-reads-math-for-machine-learning-engineers-llms-agent-protocols-and-more/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/may-must-reads-math-for-machine-learning-engineers-llms-agent-protocols-and-more/](https://towardsdatascience.com/may-must-reads-math-for-machine-learning-engineers-llms-agent-protocols-and-more/)
- en: Never miss a new edition of *The Variable*, our weekly newsletter featuring
    a top-notch selection of editors’ picks, deep dives, community news, and more.
  id: totrans-2
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 不要错过我们每周的精选编辑推荐、深度分析、社区新闻等内容的**《变量》**新版本。
- en: ''
  id: totrans-3
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[Subscribe today](https://newsletter.towardsdatascience.com/subscription-to-the-newsletter)'
  id: totrans-4
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[立即订阅](https://newsletter.towardsdatascience.com/subscription-to-the-newsletter)'
- en: 'We’re wrapping up another eventful month, one in which we published dozens
    of new articles on cutting-edge and evergreen topics alike: from math for machine
    learning engineers to the inner workings of the [Model Context Protocol](https://towardsdatascience.com/tag/mcp/).'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 我们即将结束又一个充满活力的一月，这个月我们发布了数十篇关于前沿和永恒主题的新文章：从机器学习工程师所需的数学到[模型上下文协议](https://towardsdatascience.com/tag/mcp/)的内部运作。
- en: Read on to explore our most-read stories in May—the articles our community found
    the most useful, actionable, and thought-provoking.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 继续阅读，了解我们五月份最受欢迎的故事——社区认为最有用、可操作和引人深思的文章。
- en: 'In case you feel inspired to write about your own passion projects or recent
    discoveries, don’t hesitate to share your work with us: we’re always [open for
    submissions from new authors](https://towardsdatascience.com/questions-96667b06af5/),
    and our Author Payment Program [just became considerably more streamlined](https://towardsdatascience.com/tds-authors-can-now-receive-payments-via-stripe/) this
    month.'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您受到启发想要撰写关于自己的激情项目或最新发现，请不要犹豫与我们分享您的工作：我们始终[欢迎新作者投稿](https://towardsdatascience.com/questions-96667b06af5/)，而且我们的作者支付计划这个月变得更加简化。
- en: '* * *'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: '***'
- en: How to Learn the Math Needed for Machine Learning
  id: totrans-9
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 如何学习机器学习所需的数学
- en: Everybody loves a good roadmap. Case in point: [Egor Howell](https://towardsdatascience.com/author/egorhowell/)‘s
    actionable guide for ML practitioners, outlining the best approaches and resources
    for mastering the baseline knowledge they need in linear algebra, statistics,
    and calculus.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 每个人都喜欢一个好的路线图。以[Egor Howell](https://towardsdatascience.com/author/egorhowell/)为ML实践者编写的可操作指南为例，概述了掌握线性代数、统计学和微积分所需的基础知识的最佳方法和资源。
- en: '[How to Learn the Math Needed for Machine Learning](https://towardsdatascience.com/how-to-learn-the-math-needed-for-machine-learning/)'
  id: totrans-11
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[如何学习机器学习所需的数学](https://towardsdatascience.com/how-to-learn-the-math-needed-for-machine-learning/)'
- en: New to LLMs? Start Here
  id: totrans-12
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 新手学习LLM？从这里开始
- en: We were delighted to publish another excellent guide this month: [Alessandra
    Costa](https://towardsdatascience.com/author/alessandra-costa/)‘s beginner-friendly
    intro to all things RAG, fine-tuning, agents, and more.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 我们很高兴在这个月又发布了一篇优秀的指南：[Alessandra Costa](https://towardsdatascience.com/author/alessandra-costa/)编写的关于RAG、微调、代理等内容的入门介绍。
- en: '[New to LLMs? Start Here ](https://towardsdatascience.com/new-to-llms-start-here/)'
  id: totrans-14
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[新手学习LLM？从这里开始](https://towardsdatascience.com/new-to-llms-start-here/)'
- en: 'Inheritance: A Software Engineering Concept Data Scientists Must Know To Succeed'
  id: totrans-15
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 继承：数据科学家必须了解的软件工程概念，以成功
- en: Still on the theme of core skills, [Benjamin Lee](https://towardsdatascience.com/author/bl3e967/) shared
    a thorough primer on inheritance, an essential coding concept.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 在核心技能的主题上，[Benjamin Lee](https://towardsdatascience.com/author/bl3e967/)分享了一个关于继承的详尽入门指南，这是一个基本的编码概念。
- en: '[Inheritance: A Software Engineering Concept Data Scientists Must Know To Succeed](https://towardsdatascience.com/inheritance-a-software-engineering-concept-data-scientists-must-know-to-succeed/)'
  id: totrans-17
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[继承：数据科学家必须了解的软件工程概念，以成功](https://towardsdatascience.com/inheritance-a-software-engineering-concept-data-scientists-must-know-to-succeed/)'
- en: Other May Highlights
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 五月亮点
- en: 'Explore more of our most popular and widely circulated articles of the past
    month, spanning diverse topics like data engineering, healthcare data, and time
    series forecasting:'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 探索我们过去一个月最受欢迎和广泛传播的文章，涵盖数据工程、医疗数据和时间序列预测等多样化的主题：
- en: '[Sandi Besen](https://towardsdatascience.com/author/sandibesen/) introduced
    us to the Agent Communication Protocol, an innovative framework that enables AI
    agents to collaborate “across teams, frameworks, technologies, and organizations.”'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Sandi Besen](https://towardsdatascience.com/author/sandibesen/) 介绍了代理通信协议，这是一个创新的框架，它使人工智能代理能够在“跨团队、框架、技术和组织”之间协作。'
- en: '[ACP: The Internet Protocol for AI Agents](https://towardsdatascience.com/acp-the-internet-protocol-for-ai-agents/)'
  id: totrans-21
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[ACP: 人工智能代理的互联网协议](https://towardsdatascience.com/acp-the-internet-protocol-for-ai-agents/)'
- en: Staying on the ever-trending topic of agentic AI, [Hailey Quach](https://towardsdatascience.com/author/hailey-quach/) put
    together a *very* handy resource for anyone who’d like to learn more about MCP (Model
    Context Protocol).
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 始终关注着热门话题——代理人工智能，[Hailey Quach](https://towardsdatascience.com/author/hailey-quach/)
    为那些想要了解更多关于MCP（模型上下文协议）的人准备了一份**非常**实用的资源。
- en: '[How I Finally Understood MCP — and Got It Working in Real Life](https://towardsdatascience.com/how-i-finally-understood-mcp-and-got-it-working-irl-2/)'
  id: totrans-23
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[我终于理解了 MCP —— 并在现实生活中让它工作](https://towardsdatascience.com/how-i-finally-understood-mcp-and-got-it-working-irl-2/)'
- en: How should you go about implementing multiple linear regression analysis on
    real-world data? [Junior Jumbong](https://towardsdatascience.com/author/jumbongjunior1999/) walks
    us through the process in a patient tutorial.
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何在现实世界数据上实施多重线性回归分析？[Junior Jumbong](https://towardsdatascience.com/author/jumbongjunior1999/)
    在一个耐心的教程中引导我们完成这个过程。
- en: '[Multiple Linear Regression Analysis](https://towardsdatascience.com/multiple-linear-regression-analysis/)'
  id: totrans-25
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[多重线性回归分析](https://towardsdatascience.com/multiple-linear-regression-analysis/)'
- en: Learn how a machine learning library can accelerate non-ML computations: [Thomas
    Reid](https://towardsdatascience.com/author/thomas_reid/) unpacks some of PyTorch’s
    less-known (but very powerful) use cases.
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 了解如何使用机器学习库加速非机器学习计算：[Thomas Reid](https://towardsdatascience.com/author/thomas_reid/)
    解析了 PyTorch 一些不太为人所知（但非常强大）的使用案例。
- en: '[Use PyTorch to Easily Access Your GPU](https://towardsdatascience.com/use-pytorch-to-easily-access-your-gpu/)'
  id: totrans-27
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[使用 PyTorch 轻松访问您的 GPU](https://towardsdatascience.com/use-pytorch-to-easily-access-your-gpu/)'
- en: In one of last month’s best deep dives, [Yagmur Gulec](https://towardsdatascience.com/author/yagmur-gulec/) walked
    us through a preventive-healthcare project that leverages machine learning approaches.
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在上个月的最佳深入分析之一中，[Yagmur Gulec](https://towardsdatascience.com/author/yagmur-gulec/)
    带我们了解了一个利用机器学习方法进行预防性健康护理的项目。
- en: '[Clustering Eating Behaviors in Time: A Machine Learning Approach to Preventive
    Health](https://towardsdatascience.com/clustering-eating-behaviors-in-time-a-machine-learning-approach-to-preventive-health/)'
  id: totrans-29
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[时间序列中聚类饮食习惯：一种预防性健康问题的机器学习方法](https://towardsdatascience.com/clustering-eating-behaviors-in-time-a-machine-learning-approach-to-preventive-health/)'
- en: From simple averages to blended strategies, the latest installment in [Nikhil
    Dasari](https://towardsdatascience.com/author/nikhil-dasari/)‘s series focuses
    on the ways you can customize model baselines for time series forecasting.
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 从简单的平均值到混合策略，[Nikhil Dasari](https://towardsdatascience.com/author/nikhil-dasari/)
    系列的最新作品关注了您可以如何自定义时间序列预测的模型基线。
- en: '[Time Series Forecasting Made Simple (Part 2): Customizing Baseline Models](https://towardsdatascience.com/time-series-forecasting-made-simple-part-2-customizing-baseline-models/)'
  id: totrans-31
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[时间序列预测简化（第二部分）：自定义基线模型](https://towardsdatascience.com/time-series-forecasting-made-simple-part-2-customizing-baseline-models/)'
- en: '* * *'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Meet Our New Authors
  id: totrans-33
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 认识我们的新作者
- en: 'Every month, we’re thrilled to welcome a fresh cohort of data science, machine
    learning, and AI experts. Don’t miss the work of some of our newest contributors:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 每个月，我们都非常高兴欢迎一批新的数据科学、机器学习和人工智能专家。不要错过我们一些新贡献者的作品：
- en: '[Kuriko Iwai](https://towardsdatascience.com/author/kuriko-iwai/) is a machine
    learning engineer—and a founder and CEO in the agentic-AI space.'
  id: totrans-35
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Kuriko Iwai](https://towardsdatascience.com/author/kuriko-iwai/) 是一名机器学习工程师，同时也是代理人工智能领域的创始人兼首席执行官。'
- en: '[Prototyping Gradient Descent in Machine Learning](https://towardsdatascience.com/prototyping-gradient-descent-in-machine-learning/)'
  id: totrans-36
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[在机器学习中原型化梯度下降](https://towardsdatascience.com/prototyping-gradient-descent-in-machine-learning/)'
- en: '[Mehdi Yazdani](https://towardsdatascience.com/author/myjahromi/), an AI researcher
    in Florida, shares his latest work on training neural networks with two objectives.'
  id: totrans-37
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Mehdi Yazdani](https://towardsdatascience.com/author/myjahromi/)，佛罗里达州的一名人工智能研究员，分享了他关于使用两个目标训练神经网络的最新工作。'
- en: '[Why Regularization Isn’t Enough: A Better Way to Train Neural Networks with
    Two Objectives](https://towardsdatascience.com/why-regularization-isnt-enough-a-better-way-to-train-neural-networks-with-two-objectives/)'
  id: totrans-38
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[为什么正则化还不够：以两个目标训练神经网络的更好方法](https://towardsdatascience.com/why-regularization-isnt-enough-a-better-way-to-train-neural-networks-with-two-objectives/)'
- en: '[Joshua Nishanth A](https://towardsdatascience.com/author/joshuanishanth-a/) joins
    the TDS community with a wealth of experience in data science, deep learning,
    and engineering.'
  id: totrans-39
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Joshua Nishanth A](https://towardsdatascience.com/author/joshuanishanth-a/)
    以其在数据科学、深度学习和工程领域的丰富经验加入TDS社区。'
- en: '[Demystifying Policy Optimization in RL: An Introduction to PPO and GRPO](https://towardsdatascience.com/demystifying-policy-optimization-in-rl-an-introduction-to-ppo-and-grpo/)'
  id: totrans-40
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[揭秘强化学习中的策略优化：PPO和GRPO简介](https://towardsdatascience.com/demystifying-policy-optimization-in-rl-an-introduction-to-ppo-and-grpo/)'
- en: We love publishing articles from new authors, so if you’ve recently written
    an interesting project walkthrough, tutorial, or theoretical reflection on any
    of our core topics, [why not share it with us](https://towardsdatascience.com/questions-96667b06af5)?
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 我们热爱发布新作者的文章，所以如果你最近写了一个有趣的项目演练、教程或对我们核心主题的任何理论反思，[为什么不与我们分享呢](https://towardsdatascience.com/questions-96667b06af5)?
- en: '* * *'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
