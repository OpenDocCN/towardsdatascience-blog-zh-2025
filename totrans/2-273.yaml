- en: Get Ready for Your Next Career Move
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 准备好你的下一次职业转变
- en: 原文：[https://towardsdatascience.com/get-ready-for-your-next-career-move/](https://towardsdatascience.com/get-ready-for-your-next-career-move/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/get-ready-for-your-next-career-move/](https://towardsdatascience.com/get-ready-for-your-next-career-move/)
- en: Never miss a new edition of *The Variable*, our weekly newsletter featuring
    a top-notch selection of editors’ picks, deep dives, community news, and more.
  id: totrans-2
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 不要错过《The Variable》的最新一期，我们的每周通讯精选了编辑们的精选内容、深度分析、社区新闻等。
- en: ''
  id: totrans-3
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '[Subscribe today](https://newsletter.towardsdatascience.com/subscription-to-the-newsletter)'
  id: totrans-4
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[立即订阅](https://newsletter.towardsdatascience.com/subscription-to-the-newsletter)'
- en: Are you planning to switch roles in the near future? On the lookout for your
    first data science or machine learning position? Regardless of your [career stage](https://towardsdatascience.com/tag/career-advice/),
    change and growth are likely on your mind — and we’re here to help.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 你是否计划在不久的将来转换角色？正在寻找你的第一份数据科学或机器学习职位？无论你的 [职业阶段](https://towardsdatascience.com/tag/career-advice/)
    如何，变化和成长可能已经在你的脑海中——我们在这里帮助你。
- en: At the core of this week’s Variable are articles that center the skills and
    knowledge base you should master to set yourself up for success. Grounded in the
    authors’ personal experiences, you’ll find hands-on advice and sharp insights
    that you can apply across a wide range of disciplines and settings.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 本周《The Variable》的核心是围绕你应该掌握的技能和知识库的文章，以作者的亲身经历为基础，你将找到可以应用于广泛学科和环境的实用建议和深刻见解。
- en: '* * *'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: 'I Transitioned from Data Science to AI Engineering: Here’s Everything You Need
    to Know'
  id: totrans-8
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我从数据科学转向AI工程：你需要知道的一切
- en: Part practical guide, part personal reflection, [Sara Nobrega](https://towardsdatascience.com/author/saranobregafn/) presents
    a compelling account of the skills, tools, and strategies that powered her successful
    switch to the competitive field of AI engineering.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 部分是实用指南，部分是个人反思，[Sara Nobrega](https://towardsdatascience.com/author/saranobregafn/)
    展示了她成功转向竞争激烈的AI工程领域的技能、工具和策略。
- en: '[I Transitioned from Data Science to AI Engineering: Here’s Everything You
    Need to Know](https://towardsdatascience.com/i-transitioned-from-data-science-to-ai-engineering-heres-everything-you-need-to-know/)'
  id: totrans-10
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[我从数据科学转向AI工程：你需要知道的一切](https://towardsdatascience.com/i-transitioned-from-data-science-to-ai-engineering-heres-everything-you-need-to-know/)'
- en: 'Landing your First Machine Learning Job: Startup vs Big Tech vs Academia'
  id: totrans-11
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在初创公司、大科技公司和学术界找到你的第一份机器学习工作
- en: No more cookie-cutter resumés and cover letters: [Piero Paialunga](https://towardsdatascience.com/author/piero-paialunga/) stresses
    that you should tailor you job-search approach to the type of role and work environment
    you’re looking for.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 不要再使用千篇一律的简历和求职信了：[Piero Paialunga](https://towardsdatascience.com/author/piero-paialunga/)
    强调你应该根据你寻找的角色和工作环境来定制你的求职方法。
- en: '[Landing your First Machine Learning Job: Startup vs Big Tech vs Academia](https://towardsdatascience.com/landing-your-first-machine-learning-job-startup-vs-big-tech-vs-academia/)'
  id: totrans-13
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[在初创公司、大科技公司和学术界找到你的第一份机器学习工作](https://towardsdatascience.com/landing-your-first-machine-learning-job-startup-vs-big-tech-vs-academia/)'
- en: 5 Statistical Concepts You Need to Know Before Your Next Data Science Interview
  id: totrans-14
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在下一次数据科学面试之前你需要了解的5个统计概念
- en: For [Haden Pelletier](https://towardsdatascience.com/author/pelletierhaden/),
    nailing your job interview isn’t really about knowledge; it’s about the ability
    to explain what you know and how to apply abstract concepts in real-world situations.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 对于 [Haden Pelletier](https://towardsdatascience.com/author/pelletierhaden/)
    来说，成功通过工作面试并不是真的关于知识；而是关于解释你所知道的内容以及如何在现实世界情境中应用抽象概念的能力。
- en: '[5 Statistical Concepts You Need to Know Before Your Next Data Science Interview](https://towardsdatascience.com/5-statistical-concepts-you-need-to-know-before-your-next-data-science-interview/)'
  id: totrans-16
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[在下次数据科学面试之前你需要了解的5个统计概念](https://towardsdatascience.com/5-statistical-concepts-you-need-to-know-before-your-next-data-science-interview/)'
