- en: Meet Our New Authors
  id: totrans-40
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 认识我们的新作者
- en: 'Every week, we’re thrilled to welcome a fresh cohort of data science, machine
    learning, and AI experts. Don’t miss the work of some of our newest contributors:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 每周，我们都非常高兴欢迎一批新的数据科学、机器学习和AI专家。不要错过我们一些新贡献者的作品：
- en: '[Mahe Jabeen Abdul](https://towardsdatascience.com/author/mahejabeen-abdul/) devotes
    her debut TDS article to the challenges of landing on the right data-monitoring
    strategy.'
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[马赫·贾比恩·阿卜杜勒](https://towardsdatascience.com/author/mahejabeen-abdul/)将她的首篇TDS文章献给了选择正确的数据监控策略的挑战。'
- en: '[Data Drift Is Not the Actual Problem: Your Monitoring Strategy Is](https://towardsdatascience.com/data-drift-is-not-the-actual-problem-your-monitoring-strategy-is/)'
  id: totrans-43
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[数据漂移并非真正问题：你的监控策略是](https://towardsdatascience.com/data-drift-is-not-the-actual-problem-your-monitoring-strategy-is/)'
- en: '[Toluwase Babalola](https://towardsdatascience.com/author/toluwase-babalola/) presents
    a patient tutorial on implementing AI-powered webpage detection applications into
    production.'
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[托卢瓦塞·巴巴洛拉](https://towardsdatascience.com/author/toluwase-babalola/)介绍了一篇关于将AI驱动的网页检测应用程序投入生产的耐心教程。'
- en: '[Detecting Malicious URLs Using LSTM and Google’s BERT Models](https://towardsdatascience.com/detecting-malicious-urls-using-lstm-and-googles-bert-models/)'
  id: totrans-45
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[使用 LSTM 和 Google 的 BERT 模型检测恶意 URL](https://towardsdatascience.com/detecting-malicious-urls-using-lstm-and-googles-bert-models/)'
- en: '[Julian Mendel](https://towardsdatascience.com/author/julian-mendel/) unpacks
    the promise of evolutionary coding agents, based on recent work out of Google
    DeepMind.'
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '[Julian Mendel](https://towardsdatascience.com/author/julian-mendel/) 解析了基于
    Google DeepMind 最近工作的进化编码代理的承诺。'
- en: '[Google’s AlphaEvolve: Getting Started with Evolutionary Coding Agents](https://towardsdatascience.com/googles-alphaevolve-getting-started-with-evolutionary-coding-agents/)'
  id: totrans-47
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[Google 的 AlphaEvolve：进化编码代理的入门](https://towardsdatascience.com/googles-alphaevolve-getting-started-with-evolutionary-coding-agents/)'
- en: We love publishing articles from new authors, so if you’ve recently written
    an interesting project walkthrough, tutorial, or theoretical reflection on any
    of our core topics, [why not share it with us](https://towardsdatascience.com/questions-96667b06af5)?
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 我们热爱发布新作者的文章，所以如果你最近写了一个有趣的项目演练、教程或对我们核心主题的理论反思，[为什么不与我们分享呢](https://towardsdatascience.com/questions-96667b06af5)?
