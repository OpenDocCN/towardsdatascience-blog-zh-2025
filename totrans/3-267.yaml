- en: '4-Dimensional Data Visualization: Time in Bubble Charts'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 四维数据可视化：气泡图中的时间
- en: 原文：[https://towardsdatascience.com/4-dimensional-data-visualization-time-in-bubble-charts/](https://towardsdatascience.com/4-dimensional-data-visualization-time-in-bubble-charts/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/4-dimensional-data-visualization-time-in-bubble-charts/](https://towardsdatascience.com/4-dimensional-data-visualization-time-in-bubble-charts/)
- en: Bubble charts elegantly compress large amounts of information into a single
    visualization, with bubble size adding a third dimension. However, comparing “before”
    and “after” states is often crucial. To address this, we propose adding a transition
    between these states, creating an intuitive user experience.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 气泡图优雅地将大量信息压缩到单个可视化中，气泡大小增加了第三个维度。然而，比较“之前”和“之后”的状态通常至关重要。为了解决这个问题，我们提出在这些状态之间添加一个过渡，以创造直观的用户体验。
- en: Since we couldn’t find a ready-made solution, we developed our own. The challenge
    turned out to be fascinating and required refreshing some mathematical concepts.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们找不到现成的解决方案，我们开发了我们的解决方案。挑战证明是迷人的，需要刷新一些数学概念。
- en: Without a doubt, the most challenging part of the visualization is the transition
    between two circles — before and after states. To simplify, we focus on solving
    a single case, which can then be extended in a loop to generate the necessary
    number of transitions.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 毫无疑问，可视化中最具挑战性的部分是两个圆之间的过渡——“之前”和“之后”的状态。为了简化，我们专注于解决一个单一案例，然后可以通过循环扩展来生成所需数量的过渡。
- en: '![](../Images/0fb614fdee2331a279f683b5d55966cb.png)'
  id: totrans-5
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0fb614fdee2331a279f683b5d55966cb.png)'
- en: Base element, image by Author
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 基础元素，图片由作者提供
- en: 'To build such a figure, let’s first decompose it into three parts: two circles
    and a polygon that connects them (in gray).'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 要构建这样的图形，让我们首先将其分解为三个部分：两个圆以及连接它们的（灰色）多边形。
- en: '![](../Images/4b85108bde06768595d297e77c75e735.png)'
  id: totrans-8
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/4b85108bde06768595d297e77c75e735.png)'
- en: Base element decomposition, image by Author
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 基础元素分解，图片由作者提供
- en: 'Building two circles is quite simple — we know their centers and radii. The
    remaining task is to construct a quadrilateral polygon, which has the following
    form:'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 构建两个圆相当简单——我们知道它们的中心和半径。剩下的任务是构造一个四边形多边形，其形式如下：
- en: '![](../Images/b6d7ef8801763e464ce0a91fffbac94a.png)'
  id: totrans-11
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b6d7ef8801763e464ce0a91fffbac94a.png)'
- en: Polygon, image by Author
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 多边形，图片由作者提供
- en: The construction of this polygon reduces to finding the coordinates of its vertices.
    This is the most interesting task, and we will solve it further.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 构造这个多边形归结为找到其顶点的坐标。这是最有趣的任务，我们将进一步解决它。
- en: '![](../Images/aaf153297592eaf99db5195ffaa1ea1e.png)'
  id: totrans-14
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/aaf153297592eaf99db5195ffaa1ea1e.png)'
- en: From polygon to tangent lines, image by Author
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 从多边形到切线，图片由作者提供
- en: 'To calculate the distance from a point *(x1, y1)* to the line *ax+y+b=0*, the
    formula is:'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 要计算点 *(x1, y1)* 到直线 *ax+y+b=0* 的距离，公式是：
- en: '![](../Images/363225c413d0ac4146071bbd0ce6166f.png)'
  id: totrans-17
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/363225c413d0ac4146071bbd0ce6166f.png)'
- en: Distance from point to a line, image by Author
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 点到直线的距离，图片由作者提供
- en: In our case, distance (*d*) is equal to circle radius (*r*). Hence,
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的情况下，距离 (*d*) 等于圆的半径 (*r*)。因此，
- en: '![](../Images/fc99adedb3b1a1304bbd46e30ae01bb9.png)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/fc99adedb3b1a1304bbd46e30ae01bb9.png)'
- en: Distance to radius, image by Author
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 到半径的距离，图片由作者提供
- en: 'After multiplying both sides of the equation by *a**2+1*, we get:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 将方程的两边乘以 *a**2+1*，我们得到：
- en: '![](../Images/d8245b767b3820381b381e56c8c12275.png)'
  id: totrans-23
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d8245b767b3820381b381e56c8c12275.png)'
- en: Base math, image by Author
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 基础数学，图片由作者提供
- en: 'After moving everything to one side and setting the equation equal to zero,
    we get:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 将所有内容移到一边并将方程设为零，我们得到：
- en: '![](../Images/abc614da283cd3b426e21537b5de2ab5.png)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/abc614da283cd3b426e21537b5de2ab5.png)'
- en: Base math, image by Author
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 基础数学，图片由作者提供
- en: 'Since we have two circles and need to find a tangent to both, we have the following
    system of equations:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们有两个圆并且需要找到两个圆的切线，所以我们有以下方程组：
- en: '![](../Images/c7b77b7a4067cb3eda2c4500b987ba85.png)'
  id: totrans-29
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c7b77b7a4067cb3eda2c4500b987ba85.png)'
- en: System of equations, image by Author
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 方程组，图片由作者提供
- en: 'This works great, but the problem is that we have 4 possible tangent lines
    in reality:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 这效果很好，但问题是现实中我们有 4 条可能的切线：
- en: '![](../Images/7241f646b02a37e29f65fc5f09b4966c.png)'
  id: totrans-32
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7241f646b02a37e29f65fc5f09b4966c.png)'
- en: All possible tangent lines, image by Author
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 所有可能的切线，图片由作者提供
- en: And we need to choose just 2 of them — external ones.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 我们只需要选择其中的两个——外部的。
- en: 'To do this we need to check each tangent and each circle center and determine
    if the line is above or below the point:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 要做到这一点，我们需要检查每个切线和每个圆心，并确定该线是在点上方还是下方：
- en: '![](../Images/a5771af799278f407cbc1e885704333b.png)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
  zh: '![图表](../Images/a5771af799278f407cbc1e885704333b.png)'
- en: Check if line is above or below the point, image by Author
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 检查线是否在点上方或下方，图片由作者提供
- en: We need the two lines that both pass above or both pass below the centers of
    the circles.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 我们需要两条都通过圆心上方或都通过圆心下方的线。
- en: 'Now, let’s translate all these steps into code:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们将这些步骤转换为代码：
- en: '[PRE0]'
  id: totrans-40
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Now, we just need to find the intersections of the tangents with the circles.
    These 4 points will be the vertices of the desired polygon.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我们只需要找到切线与圆的交点。这4个点将是所需多边形的顶点。
- en: 'Circle equation:'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 圆的方程：
- en: '![](../Images/b13530aa1bcbb263b3b771a2d82d2e7c.png)'
  id: totrans-43
  prefs: []
  type: TYPE_IMG
  zh: '![图表](../Images/b13530aa1bcbb263b3b771a2d82d2e7c.png)'
- en: Circle equation, image by Author
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 圆的方程，图片由作者提供
- en: 'Substitute the line equation* y=ax+b* into the circle equation:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 将直线方程*y=ax+b*代入圆的方程：
- en: '![](../Images/ae779867cfd7b6bb9f247d6b02a4f2eb.png)'
  id: totrans-46
  prefs: []
  type: TYPE_IMG
  zh: '![图表](../Images/ae779867cfd7b6bb9f247d6b02a4f2eb.png)'
- en: Base math, image by Author
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 基础数学，图片由作者提供
- en: Solution of the equation is the *x* of the intersection.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 方程的解是交点的*x*。
- en: 'Then, calculate *y* from the line equation:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，根据直线方程计算*y*：
- en: '![](../Images/bd5d222a6c4a3002555152ae09f1a92f.png)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![图表](../Images/bd5d222a6c4a3002555152ae09f1a92f.png)'
- en: Calculating y, image by Author
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 计算y，图片由作者提供
- en: 'How it translates to the code:'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 这如何转换为代码：
- en: '[PRE1]'
  id: totrans-53
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Now we want to generate sample data to demonstrate the whole chart compositions.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们想要生成示例数据来展示整个图表的组成。
- en: Imagine we have 4 users on our platform. We know how many purchases they made,
    generated revenue and activity on the platform. All these metrics are calculated
    for 2 periods (let’s call them pre and post period).
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 想象我们有4个用户在我们的平台上。我们知道他们各自做了多少次购买，产生了多少收入，以及平台上的活动。所有这些指标都计算了两个时期（让我们称它们为前和后时期）。
- en: '[PRE2]'
  id: totrans-56
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: '![](../Images/5be58c06af16327e5f36e17a4315c3ff.png)'
  id: totrans-57
  prefs: []
  type: TYPE_IMG
  zh: '![图表](../Images/5be58c06af16327e5f36e17a4315c3ff.png)'
- en: Data sample, image by Author
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 数据样本，图片由作者提供
- en: Let’s assume that “activity” is the area of the bubble. Now, let’s convert it
    into the radius of the bubble. We will also scale the y-axis.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 假设“活动”是气泡的面积。现在，让我们将其转换为气泡的半径。我们还将调整y轴的比例。
- en: '[PRE3]'
  id: totrans-60
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Now let’s build the chart — 2 circles and the polygon.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们来构建图表——两个圆和多边形。
- en: '[PRE4]'
  id: totrans-62
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'The output looks as expected:'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 输出看起来符合预期：
- en: '![](../Images/0a92c4b8b174c93fb6a17e0befc8a83d.png)'
  id: totrans-64
  prefs: []
  type: TYPE_IMG
  zh: '![图表](../Images/0a92c4b8b174c93fb6a17e0befc8a83d.png)'
- en: Output, image by Author
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 输出，图片由作者提供
- en: 'Now we want to add some styling:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们想要添加一些样式：
- en: '[PRE5]'
  id: totrans-67
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'Pre-post legend in the right bottom corner to give viewer a hint, how to read
    the chart:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 在右下角添加前后图例，为观众提供如何阅读图表的提示：
- en: '[PRE6]'
  id: totrans-69
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: '![](../Images/5bcdb443f552b78b9bc72b3fc5882f80.png)'
  id: totrans-70
  prefs: []
  type: TYPE_IMG
  zh: '![图表](../Images/5bcdb443f552b78b9bc72b3fc5882f80.png)'
- en: Adding styling and legend, image by Author
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 添加样式和图例，图片由作者提供
- en: 'And finally bubble-size legend:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，添加气泡大小图例：
- en: '[PRE7]'
  id: totrans-73
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'Our final chart looks like this:'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的最终图表看起来是这样的：
- en: '![](../Images/43fa458936543ceedc25206322b140ed.png)'
  id: totrans-75
  prefs: []
  type: TYPE_IMG
  zh: '![图表](../Images/43fa458936543ceedc25206322b140ed.png)'
- en: Adding second legend, image by Author
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 添加第二个图例，图片由作者提供
- en: The visualization looks very stylish and concentrates quite a lot of information
    in a compact form.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 可视化看起来非常时尚，并在紧凑的格式中集中了大量的信息。
- en: 'Here is the full code for the graph:'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 这是图表的完整代码：
- en: '[PRE8]'
  id: totrans-79
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: Adding a time dimension to bubble charts enhances their ability to convey dynamic
    data changes intuitively. By implementing smooth transitions between “before”
    and “after” states, users can better understand trends and comparisons over time.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 向气泡图添加时间维度可以增强其直观传达动态数据变化的能力。通过实现“之前”和“之后”状态之间的平滑过渡，用户可以更好地理解趋势和时间上的比较。
- en: While no ready-made solutions were available, developing a custom approach proved
    both challenging and rewarding, requiring mathematical insights and careful animation
    techniques. The proposed method can be easily extended to various datasets, making
    it a valuable tool for data visualization in business, science, and analytics.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然没有现成的解决方案，但开发定制方法既具有挑战性又富有成效，需要数学洞察力和细致的动画技术。提出的方法可以轻松扩展到各种数据集，使其成为商业、科学和数据分析中数据可视化的宝贵工具。
