- en: '4-Dimensional Data Visualization: Time in Bubble Charts'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/4-dimensional-data-visualization-time-in-bubble-charts/](https://towardsdatascience.com/4-dimensional-data-visualization-time-in-bubble-charts/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Bubble charts elegantly compress large amounts of information into a single
    visualization, with bubble size adding a third dimension. However, comparing “before”
    and “after” states is often crucial. To address this, we propose adding a transition
    between these states, creating an intuitive user experience.
  prefs: []
  type: TYPE_NORMAL
- en: Since we couldn’t find a ready-made solution, we developed our own. The challenge
    turned out to be fascinating and required refreshing some mathematical concepts.
  prefs: []
  type: TYPE_NORMAL
- en: Without a doubt, the most challenging part of the visualization is the transition
    between two circles — before and after states. To simplify, we focus on solving
    a single case, which can then be extended in a loop to generate the necessary
    number of transitions.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/0fb614fdee2331a279f683b5d55966cb.png)'
  prefs: []
  type: TYPE_IMG
- en: Base element, image by Author
  prefs: []
  type: TYPE_NORMAL
- en: 'To build such a figure, let’s first decompose it into three parts: two circles
    and a polygon that connects them (in gray).'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/4b85108bde06768595d297e77c75e735.png)'
  prefs: []
  type: TYPE_IMG
- en: Base element decomposition, image by Author
  prefs: []
  type: TYPE_NORMAL
- en: 'Building two circles is quite simple — we know their centers and radii. The
    remaining task is to construct a quadrilateral polygon, which has the following
    form:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b6d7ef8801763e464ce0a91fffbac94a.png)'
  prefs: []
  type: TYPE_IMG
- en: Polygon, image by Author
  prefs: []
  type: TYPE_NORMAL
- en: The construction of this polygon reduces to finding the coordinates of its vertices.
    This is the most interesting task, and we will solve it further.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/aaf153297592eaf99db5195ffaa1ea1e.png)'
  prefs: []
  type: TYPE_IMG
- en: From polygon to tangent lines, image by Author
  prefs: []
  type: TYPE_NORMAL
- en: 'To calculate the distance from a point *(x1, y1)* to the line *ax+y+b=0*, the
    formula is:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/363225c413d0ac4146071bbd0ce6166f.png)'
  prefs: []
  type: TYPE_IMG
- en: Distance from point to a line, image by Author
  prefs: []
  type: TYPE_NORMAL
- en: In our case, distance (*d*) is equal to circle radius (*r*). Hence,
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/fc99adedb3b1a1304bbd46e30ae01bb9.png)'
  prefs: []
  type: TYPE_IMG
- en: Distance to radius, image by Author
  prefs: []
  type: TYPE_NORMAL
- en: 'After multiplying both sides of the equation by *a**2+1*, we get:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d8245b767b3820381b381e56c8c12275.png)'
  prefs: []
  type: TYPE_IMG
- en: Base math, image by Author
  prefs: []
  type: TYPE_NORMAL
- en: 'After moving everything to one side and setting the equation equal to zero,
    we get:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/abc614da283cd3b426e21537b5de2ab5.png)'
  prefs: []
  type: TYPE_IMG
- en: Base math, image by Author
  prefs: []
  type: TYPE_NORMAL
- en: 'Since we have two circles and need to find a tangent to both, we have the following
    system of equations:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c7b77b7a4067cb3eda2c4500b987ba85.png)'
  prefs: []
  type: TYPE_IMG
- en: System of equations, image by Author
  prefs: []
  type: TYPE_NORMAL
- en: 'This works great, but the problem is that we have 4 possible tangent lines
    in reality:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/7241f646b02a37e29f65fc5f09b4966c.png)'
  prefs: []
  type: TYPE_IMG
- en: All possible tangent lines, image by Author
  prefs: []
  type: TYPE_NORMAL
- en: And we need to choose just 2 of them — external ones.
  prefs: []
  type: TYPE_NORMAL
- en: 'To do this we need to check each tangent and each circle center and determine
    if the line is above or below the point:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a5771af799278f407cbc1e885704333b.png)'
  prefs: []
  type: TYPE_IMG
- en: Check if line is above or below the point, image by Author
  prefs: []
  type: TYPE_NORMAL
- en: We need the two lines that both pass above or both pass below the centers of
    the circles.
  prefs: []
  type: TYPE_NORMAL
- en: 'Now, let’s translate all these steps into code:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Now, we just need to find the intersections of the tangents with the circles.
    These 4 points will be the vertices of the desired polygon.
  prefs: []
  type: TYPE_NORMAL
- en: 'Circle equation:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b13530aa1bcbb263b3b771a2d82d2e7c.png)'
  prefs: []
  type: TYPE_IMG
- en: Circle equation, image by Author
  prefs: []
  type: TYPE_NORMAL
- en: 'Substitute the line equation* y=ax+b* into the circle equation:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ae779867cfd7b6bb9f247d6b02a4f2eb.png)'
  prefs: []
  type: TYPE_IMG
- en: Base math, image by Author
  prefs: []
  type: TYPE_NORMAL
- en: Solution of the equation is the *x* of the intersection.
  prefs: []
  type: TYPE_NORMAL
- en: 'Then, calculate *y* from the line equation:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/bd5d222a6c4a3002555152ae09f1a92f.png)'
  prefs: []
  type: TYPE_IMG
- en: Calculating y, image by Author
  prefs: []
  type: TYPE_NORMAL
- en: 'How it translates to the code:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Now we want to generate sample data to demonstrate the whole chart compositions.
  prefs: []
  type: TYPE_NORMAL
- en: Imagine we have 4 users on our platform. We know how many purchases they made,
    generated revenue and activity on the platform. All these metrics are calculated
    for 2 periods (let’s call them pre and post period).
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/5be58c06af16327e5f36e17a4315c3ff.png)'
  prefs: []
  type: TYPE_IMG
- en: Data sample, image by Author
  prefs: []
  type: TYPE_NORMAL
- en: Let’s assume that “activity” is the area of the bubble. Now, let’s convert it
    into the radius of the bubble. We will also scale the y-axis.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: Now let’s build the chart — 2 circles and the polygon.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: 'The output looks as expected:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/0a92c4b8b174c93fb6a17e0befc8a83d.png)'
  prefs: []
  type: TYPE_IMG
- en: Output, image by Author
  prefs: []
  type: TYPE_NORMAL
- en: 'Now we want to add some styling:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: 'Pre-post legend in the right bottom corner to give viewer a hint, how to read
