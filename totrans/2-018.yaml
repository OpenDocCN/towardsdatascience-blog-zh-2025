- en: 'Designing Trustworthy ML Models: Alan & Aida Discover Monotonicity in Machine
    Learning'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/designing-trustworthy-ml-models-alan-aida-discover-monotonicity-in-machine-learning/](https://towardsdatascience.com/designing-trustworthy-ml-models-alan-aida-discover-monotonicity-in-machine-learning/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1755805211291" class="mdspan-comment">Introduction</mdspan>
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Machine learning models are powerful, but sometimes they produce predictions
    that break human intuition.
  prefs: []
  type: TYPE_NORMAL
- en: 'Imagine this: you’re predicting house prices. A 2,000 sq. ft. home is predicted
    cheaper than a 1,500 sq. ft. home. Sounds wrong, right?'
  prefs: []
  type: TYPE_NORMAL
- en: This is where **monotonicity constraints** step in. They make sure models follow
    the logical business rules we expect.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s follow two colleagues, **Alan** and **Aida**, on their journey to discover
    why monotonicity matters in machine learning.
  prefs: []
  type: TYPE_NORMAL
- en: 'The Story: Alan & Aida’s Discovery'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Alan is a practical engineer. Aida is a principled scientist. Together, they’re
    building a house price prediction model.
  prefs: []
  type: TYPE_NORMAL
- en: 'Alan proudly shows Aida his model results:'
  prefs: []
  type: TYPE_NORMAL
- en: “Look! R² is great, the error is low. We’re ready to deploy!”
  prefs: []
  type: TYPE_NORMAL
- en: 'Aida takes the model out for testing:'
  prefs: []
  type: TYPE_NORMAL
- en: For a house with **1500 sq ft** → Model predicts **$300,000**
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For a house with **2000 sq ft** → Model predicts **$280,000** 😮
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Aida frowns as she looks at the predictions:'
  prefs: []
  type: TYPE_NORMAL
- en: “Wait a second… Why is this 2,000 sq. ft. home predicted cheaper than a 1,500
    sq. ft. home? That doesn’t make sense.”
  prefs: []
  type: TYPE_NORMAL
- en: 'Alan shrugs:'
  prefs: []
  type: TYPE_NORMAL
- en: “That’s because the model found noise in the training data. It’s not always
    logical. But, the accuracy is good overall. Isn’t that enough?”
  prefs: []
  type: TYPE_NORMAL
- en: 'Aida shakes her head:'
  prefs: []
  type: TYPE_NORMAL
- en: “Not really. A trustworthy model must not only be accurate but also follow logic
    people can trust. Customers won’t trust us if bigger homes sometimes look cheaper.
    We need a guarantee. This is a **monotonicity problem**.”
  prefs: []
  type: TYPE_NORMAL
- en: 'And just like that, Alan learns his next big ML lesson: metrics aren’t everything.'
  prefs: []
  type: TYPE_NORMAL
- en: What is Monotonicity in ML?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Aida explains:'
  prefs: []
  type: TYPE_NORMAL
- en: '**“Monotonicity** means predictions move in a consistent direction as inputs
    change. It is like telling the model: as square footage goes up, price should
    never go down. We call it **Monotone increasing.** Or, as another example, as
    a house age gets older, predicted prices should not go up. We call this **Monotone
    decreasing**.”'
  prefs: []
  type: TYPE_NORMAL
- en: 'Alan concludes that:'
  prefs: []
  type: TYPE_NORMAL
- en: '“So monotonicity here matters because it:'
  prefs: []
  type: TYPE_NORMAL
- en: Aligns with **business logic**, and
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Improves **trust & interpretability**.”
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Aida nodded:'
  prefs: []
  type: TYPE_NORMAL
- en: “Yes, Plus, it helps meet **fairness & regulatory expectations**.”
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Visualizing the Problem
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Aida creates a toy dataset in Pandas to show the problem:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: 'And then she plots the violations:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/8e3e01d295323f7a7982cf54a94f2dbd.png)'
  prefs: []
  type: TYPE_IMG
- en: 'Aida points to the Dips: “Here’s the problem: **1,800 sq. ft. is priced lower
    than 1,500 sq. ft. and 2,250 sq. ft. is priced lower than 2,200 sq. ft.**”'
  prefs: []
  type: TYPE_NORMAL
- en: Fixing It with Monotonicity Constraints in XGBoost
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Alan retrains the model and sets a **monotonic increasing constraint** on *square
    footage* and **monotonic decreasing constraint** on*house age*.
  prefs: []
  type: TYPE_NORMAL
- en: This forces the model to always
  prefs: []
  type: TYPE_NORMAL
- en: increase (or stay the same) when *square footage* increases given all other
    features are fixed.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: decrease (or stay the same) when house age increases given all other features
    are fixed.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'He uses XGBoost that makes it easy to enforce monotonicity:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: Alan hands over the new model to Aida. “Now the model respects domain knowledge.
    Predictions for larger houses **will never dip below** smaller ones.”
  prefs: []
  type: TYPE_NORMAL
- en: 'Aida tests the model again:'
  prefs: []
  type: TYPE_NORMAL
- en: 1500 sq ft → $300,000
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 2000 sq ft → $350,000
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 2500 sq ft → $400,000
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Now she sees a smoother plot of house prices vs square footage.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/4cc445c9110d18aedf9745caa6cf8b37.png)'
  prefs: []
  type: TYPE_IMG
- en: '**Aida:** “Perfect! When homes are of the same age, a larger size consistently
    leads to a higher or equal price. Conversely, homes of the same square footage
    will always be priced lower if they are older.”'
  prefs: []
  type: TYPE_NORMAL
- en: '**Alan:** “Yes — we gave the model *guardrails* that align with domain knowledge.”'
  prefs: []
  type: TYPE_NORMAL
- en: Real-World Examples
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**Alan:** what other domains can benefit from monotonicity constraints?'
  prefs: []
  type: TYPE_NORMAL
- en: '**Aida:** Anywhere **customers or money** are involved, monotonicity can impact
    trust. Some domains where monotonicity really matters are:'
  prefs: []
  type: TYPE_NORMAL
- en: '**House pricing** → Larger homes should not be priced lower.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Loan approvals** → Higher income should not reduce approval probability.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Credit scoring** → Longer repayment history should not lower the score.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Customer lifetime value (CLV)** → More purchases shouldn’t lower CLV predictions.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Insurance pricing** → More coverage should not reduce the premium.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Takeaways
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Accuracy alone doesn’t guarantee **trustworthiness**.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Monotonicity ensures predictions align with **common sense and business rules**.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Customers, regulators, and stakeholders are more likely to accept and use models
    that are both **accurate and logical**.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'As Aida reminds Alan:'
  prefs: []
  type: TYPE_NORMAL
- en: “Make models not just smart, but sensible.”
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Closing Thoughts
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Next time you build a model, don’t just ask: *How accurate is it?* Also ask:
    *Does it make sense to the people who’ll use it?*'
  prefs: []
  type: TYPE_NORMAL
- en: Monotonicity constraints are one of many tools for **designing trustworthy ML
    models** — alongside explainability, fairness constraints, and transparency.
  prefs: []
  type: TYPE_NORMAL
- en: . . .
  prefs: []
  type: TYPE_NORMAL
- en: Thanks for reading! I often share insights on practical AI/ML techniques—let’s
    connect on [LinkedIn](https://linkedin.com/in/mehdimo) if you’d like to continue
    the conversation.
  prefs: []
  type: TYPE_NORMAL
