- en: 'The Kolmogorov–Smirnov Statistic, Explained: Measuring Model Power in Credit
    Risk Modeling'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/kolmogorov-smirnov-statistic-explained-measuring-model-power-in-credit-risk-modeling/](https://towardsdatascience.com/kolmogorov-smirnov-statistic-explained-measuring-model-power-in-credit-risk-modeling/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1758574447927" class="mdspan-comment">These</mdspan> days,
    people are taking more loans than ever. For anyone who wants to build their own
    house, home loans are available and if you own a property, you can get a property
    loan. There are also agriculture loans, education loans, business loans, gold
    loans, and many more.
  prefs: []
  type: TYPE_NORMAL
- en: In addition to these, for buying items like televisions, refrigerators, furniture
    and mobile phones, we also have EMI options.
  prefs: []
  type: TYPE_NORMAL
- en: But does everyone get their loan application approved?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Banks don’t give loans to every person who applies; there is a process they
    follow to approve loans.
  prefs: []
  type: TYPE_NORMAL
- en: We know that machine learning and data science are now applied across industries,
    and banks also make use of them.
  prefs: []
  type: TYPE_NORMAL
- en: When a customer applies for a loan, banks need to know the likelihood that the
    customer will repay on time.
  prefs: []
  type: TYPE_NORMAL
- en: For this, banks use predictive models, mainly based on logistic regression or
    other machine learning methods,
  prefs: []
  type: TYPE_NORMAL
- en: We already know that by applying these methods, each applicant is assigned a
    probability.
  prefs: []
  type: TYPE_NORMAL
- en: This is a classification model, and we need to classify defaulters and non-defaulters.
  prefs: []
  type: TYPE_NORMAL
- en: '**Defaulters**: Customers who fail to repay their loan (miss payments or stop
    paying altogether).'
  prefs: []
  type: TYPE_NORMAL
- en: '**Non-defaulters**: Customers who repay their loans on time.'
  prefs: []
  type: TYPE_NORMAL
- en: We already [discussed accuracy and ROC-AUC](https://towardsdatascience.com/roc-auc-explained-a-beginners-guide-to-evaluating-classification-models/)
    to evaluate the classification models.
  prefs: []
  type: TYPE_NORMAL
- en: In this article, we are going to discuss the **Kolmogorov-Smirnov Statistic
    (KS Statistic)** which is used to evaluate classification models especially in
    the banking sector.
  prefs: []
  type: TYPE_NORMAL
- en: To understand the KS Statistic, we will use the German Credit Dataset.
  prefs: []
  type: TYPE_NORMAL
- en: This dataset contains information about 1000 loan applicants, describe by 20
    features such as such as account status, loan duration, credit amount, employment,
    housing, and personal status etc.
  prefs: []
  type: TYPE_NORMAL
- en: The target variable indicates whether the applicant is non-defaulter (represented
    by 1) or defaulter (represented by 2).
  prefs: []
  type: TYPE_NORMAL
- en: You can find the information about dataset [here](https://archive.ics.uci.edu/dataset/144/statlog+german+credit+data).
  prefs: []
  type: TYPE_NORMAL
- en: Now we need to build a classification model to classify the applicants. Since
    it is a binary classification problem, we will apply logistic regression on this
    dataset.
  prefs: []
  type: TYPE_NORMAL
- en: '**Code:**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: We already know that when we apply logistic regression, we get predicted probabilities.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f00ee587378869e0e92d9ac827ce67c3.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: Now to understand how KS Statistic is calculated, let’s consider a sample of
    10 points from this output.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c76eb34200972b6d28ae10e7bb28e1c9.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: Here the highest predicted probability is 0.92, which means there is 92% chance
    that this applicant will default.
  prefs: []
  type: TYPE_NORMAL
- en: Now let’s proceed with KS Statistic calculation.
  prefs: []
  type: TYPE_NORMAL
- en: First, we will sort the applicants by their predicted probabilities in descending
    order, so that higher risk applicants will be at the top.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/4dd1ea3ee3edb6f991827d271a98d8b4.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: '**We already know that ‘1’ represents non-defaulters and ‘2’ represents defaulters.**'
  prefs: []
  type: TYPE_NORMAL
- en: In next step, we calculate the cumulative count of non-defaulters and defaulters
    at each step.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f1bea7eed9e417b5a4e98a8251fcca8e.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: In next step, we convert cumulative counts of defaulters and non-defaulters
    into cumulative rates.
  prefs: []
  type: TYPE_NORMAL
- en: We divide the cumulative defaulters by the total number of defaulters, and the
    cumulative non-defaulters by the total number of non-defaulters.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/dc1dac2437437ea557d2127a5ac1de1f.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: Next, we calculate the absolute difference between the cumulative defaulter
    rate and cumulative non-defaulter rate.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/de93cece397b5738096ab8adcc906472.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: '**The maximum difference between cumulative defaulter rate and cumulative non-defaulter
    rate is 0.83, which is the KS Statistic for this sample.**'
  prefs: []
  type: TYPE_NORMAL
- en: Here the KS Statistic is 0.83, occurred at a probability of 0.29.
  prefs: []
  type: TYPE_NORMAL
- en: This means the model captures defaulters 83% more effectively than non-defaulters
    at this threshold.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 'Here, we can observe that:'
  prefs: []
  type: TYPE_NORMAL
- en: Cumulative Defaulter Rate = True Positive Rate (how many actual defaulters we
    have captured so far).
  prefs: []
  type: TYPE_NORMAL
- en: Cumulative Non-Defaulter Rate = False Positive Rate (how many non-defaulters
    are incorrectly captured as defaulters).
  prefs: []
  type: TYPE_NORMAL
- en: But as we haven’t fixed any threshold here, how can we get True Positive and
    False Positive rates?
  prefs: []
  type: TYPE_NORMAL
- en: Let’s see how cumulative rates are equal to TPR and FPR.
  prefs: []
  type: TYPE_NORMAL
- en: First, we consider every probability as a threshold and calculate TPR and FPR.
  prefs: []
  type: TYPE_NORMAL
- en: \[
  prefs: []
  type: TYPE_NORMAL
- en: \begin{aligned}
  prefs: []
  type: TYPE_NORMAL
- en: \mathbf{At\ threshold\ 0.92:} & \\[4pt]
  prefs: []
  type: TYPE_NORMAL
- en: TP &= 1,\quad FN = 3,\quad FP = 0,\quad TN = 6\\[6pt]
  prefs: []
  type: TYPE_NORMAL
- en: TPR &= \tfrac{1}{4} = 0.25\\[6pt]
  prefs: []
  type: TYPE_NORMAL
- en: FPR &= \tfrac{0}{6} = 0\\[6pt]
  prefs: []
  type: TYPE_NORMAL
- en: \Rightarrow (\mathrm{FPR},\,\mathrm{TPR}) &= (0,\,0.25)
  prefs: []
  type: TYPE_NORMAL
- en: \end{aligned}
  prefs: []
  type: TYPE_NORMAL
- en: \]
  prefs: []
  type: TYPE_NORMAL
- en: \[
  prefs: []
  type: TYPE_NORMAL
- en: \begin{aligned}
  prefs: []
  type: TYPE_NORMAL
- en: \mathbf{At\ threshold\ 0.63:} & \\[4pt]
  prefs: []
  type: TYPE_NORMAL
- en: TP &= 2,\quad FN = 2,\quad FP = 0,\quad TN = 6\\[6pt]
  prefs: []
  type: TYPE_NORMAL
- en: TPR &= \tfrac{2}{4} = 0.50\\[6pt]
  prefs: []
  type: TYPE_NORMAL
- en: FPR &= \tfrac{0}{6} = 0\\[6pt]
  prefs: []
  type: TYPE_NORMAL
- en: \Rightarrow (\mathrm{FPR},\,\mathrm{TPR}) &= (0,\,0.50)
  prefs: []
  type: TYPE_NORMAL
- en: \end{aligned}
  prefs: []
  type: TYPE_NORMAL
- en: \] \[
  prefs: []
  type: TYPE_NORMAL
- en: \begin{aligned}
  prefs: []
  type: TYPE_NORMAL
- en: \mathbf{At\ threshold\ 0.51:} & \\[4pt]
  prefs: []
  type: TYPE_NORMAL
- en: TP &= 3,\quad FN = 1,\quad FP = 0,\quad TN = 6\\[6pt]
  prefs: []
  type: TYPE_NORMAL
- en: TPR &= \tfrac{3}{4} = 0.75\\[6pt]
  prefs: []
  type: TYPE_NORMAL
- en: FPR &= \tfrac{0}{6} = 0\\[6pt]
  prefs: []
  type: TYPE_NORMAL
- en: \Rightarrow (\mathrm{FPR},\,\mathrm{TPR}) &= (0,\,0.75)
  prefs: []
  type: TYPE_NORMAL
- en: \end{aligned}
  prefs: []
  type: TYPE_NORMAL
- en: \] \[
  prefs: []
  type: TYPE_NORMAL
- en: \begin{aligned}
  prefs: []
  type: TYPE_NORMAL
- en: \mathbf{At\ threshold\ 0.39:} & \\[4pt]
  prefs: []
  type: TYPE_NORMAL
- en: TP &= 3,\quad FN = 1,\quad FP = 1,\quad TN = 5\\[6pt]
  prefs: []
  type: TYPE_NORMAL
- en: TPR &= \tfrac{3}{4} = 0.75\\[6pt]
  prefs: []
  type: TYPE_NORMAL
- en: FPR &= \tfrac{1}{6} \approx 0.17\\[6pt]
  prefs: []
  type: TYPE_NORMAL
- en: \Rightarrow (\mathrm{FPR},\,\mathrm{TPR}) &= (0.17,\,0.75)
  prefs: []
  type: TYPE_NORMAL
- en: \end{aligned}
  prefs: []
  type: TYPE_NORMAL
- en: \] \[
  prefs: []
  type: TYPE_NORMAL
- en: \begin{aligned}
  prefs: []
  type: TYPE_NORMAL
- en: \mathbf{At\ threshold\ 0.29:} & \\[4pt]
  prefs: []
  type: TYPE_NORMAL
- en: TP &= 4,\quad FN = 0,\quad FP = 1,\quad TN = 5\\[6pt]
  prefs: []
  type: TYPE_NORMAL
- en: TPR &= \tfrac{4}{4} = 1.00\\[6pt]
  prefs: []
  type: TYPE_NORMAL
- en: FPR &= \tfrac{1}{6} \approx 0.17\\[6pt]
  prefs: []
  type: TYPE_NORMAL
- en: \Rightarrow (\mathrm{FPR},\,\mathrm{TPR}) &= (0.17,\,1.00)
  prefs: []
  type: TYPE_NORMAL
- en: \end{aligned}
  prefs: []
  type: TYPE_NORMAL
- en: \] \[
  prefs: []
  type: TYPE_NORMAL
- en: \begin{aligned}
  prefs: []
  type: TYPE_NORMAL
- en: \mathbf{At\ threshold\ 0.20:} & \\[4pt]
  prefs: []
  type: TYPE_NORMAL
- en: TP &= 4,\quad FN = 0,\quad FP = 2,\quad TN = 4\\[6pt]
  prefs: []
  type: TYPE_NORMAL
- en: TPR &= \tfrac{4}{4} = 1.00\\[6pt]
  prefs: []
  type: TYPE_NORMAL
- en: FPR &= \tfrac{2}{6} \approx 0.33\\[6pt]
  prefs: []
  type: TYPE_NORMAL
- en: \Rightarrow (\mathrm{FPR},\,\mathrm{TPR}) &= (0.33,\,1.00)
  prefs: []
  type: TYPE_NORMAL
- en: \end{aligned}
  prefs: []
  type: TYPE_NORMAL
- en: \] \[
  prefs: []
  type: TYPE_NORMAL
- en: \begin{aligned}
  prefs: []
  type: TYPE_NORMAL
- en: \mathbf{At\ threshold\ 0.13:} & \\[4pt]
  prefs: []
  type: TYPE_NORMAL
- en: TP &= 4,\quad FN = 0,\quad FP = 3,\quad TN = 3\\[6pt]
  prefs: []
  type: TYPE_NORMAL
- en: TPR &= \tfrac{4}{4} = 1.00\\[6pt]
  prefs: []
  type: TYPE_NORMAL
- en: FPR &= \tfrac{3}{6} = 0.50\\[6pt]
  prefs: []
  type: TYPE_NORMAL
- en: \Rightarrow (\mathrm{FPR},\,\mathrm{TPR}) &= (0.50,\,1.00)
  prefs: []
  type: TYPE_NORMAL
- en: \end{aligned}
  prefs: []
  type: TYPE_NORMAL
- en: \] \[
  prefs: []
  type: TYPE_NORMAL
- en: \begin{aligned}
  prefs: []
  type: TYPE_NORMAL
- en: \mathbf{At\ threshold\ 0.10:} & \\[4pt]
  prefs: []
  type: TYPE_NORMAL
- en: TP &= 4,\quad FN = 0,\quad FP = 4,\quad TN = 2\\[6pt]
  prefs: []
  type: TYPE_NORMAL
- en: TPR &= \tfrac{4}{4} = 1.00\\[6pt]
  prefs: []
  type: TYPE_NORMAL
- en: FPR &= \tfrac{4}{6} \approx 0.67\\[6pt]
  prefs: []
  type: TYPE_NORMAL
- en: \Rightarrow (\mathrm{FPR},\,\mathrm{TPR}) &= (0.67,\,1.00)
  prefs: []
  type: TYPE_NORMAL
- en: \end{aligned}
  prefs: []
  type: TYPE_NORMAL
- en: \] \[
  prefs: []
  type: TYPE_NORMAL
- en: \begin{aligned}
  prefs: []
  type: TYPE_NORMAL
- en: \mathbf{At\ threshold\ 0.05:} & \\[4pt]
  prefs: []
  type: TYPE_NORMAL
- en: TP &= 4,\quad FN = 0,\quad FP = 5,\quad TN = 1\\[6pt]
  prefs: []
  type: TYPE_NORMAL
- en: TPR &= \tfrac{4}{4} = 1.00\\[6pt]
  prefs: []
  type: TYPE_NORMAL
- en: FPR &= \tfrac{5}{6} \approx 0.83\\[6pt]
  prefs: []
  type: TYPE_NORMAL
- en: \Rightarrow (\mathrm{FPR},\,\mathrm{TPR}) &= (0.83,\,1.00)
  prefs: []
  type: TYPE_NORMAL
- en: \end{aligned}
  prefs: []
  type: TYPE_NORMAL
- en: \] \[
  prefs: []
  type: TYPE_NORMAL
- en: \begin{aligned}
  prefs: []
  type: TYPE_NORMAL
- en: \mathbf{At\ threshold\ 0.01:} & \\[4pt]
  prefs: []
  type: TYPE_NORMAL
- en: TP &= 4,\quad FN = 0,\quad FP = 6,\quad TN = 0\\[6pt]
  prefs: []
  type: TYPE_NORMAL
- en: TPR &= \tfrac{4}{4} = 1.00\\[6pt]
  prefs: []
  type: TYPE_NORMAL
- en: FPR &= \tfrac{6}{6} = 1.00\\[6pt]
  prefs: []
  type: TYPE_NORMAL
- en: \Rightarrow (\mathrm{FPR},\,\mathrm{TPR}) &= (1.00,\,1.00)
  prefs: []
  type: TYPE_NORMAL
- en: \end{aligned}
  prefs: []
  type: TYPE_NORMAL
- en: \]
  prefs: []
  type: TYPE_NORMAL
- en: '**From the above calculations, we can see that the cumulative defaulter rate
    corresponds to the True Positive Rate (TPR), and the cumulative non-defaulter
    rate corresponds to the False Positive Rate (FPR).**'
  prefs: []
  type: TYPE_NORMAL
- en: '**When calculating the cumulative default rate and cumulative non-default rate,
    each row represents a threshold, and the rate is calculated up to that row.**'
  prefs: []
  type: TYPE_NORMAL
- en: '**Here we can observe that KS Statistic = Max (|TPR – FPR|)**'
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Now let’s calculate the KS Statistic for full dataset.
  prefs: []
  type: TYPE_NORMAL
- en: '**Code:**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: '**Plot:**'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e63077694fa11b80c4772bb8e6fd0e55.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  prefs: []
  type: TYPE_NORMAL
- en: The maximum gap is 0.530 at probability of 0.2928.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: As we understood how to calculate the KS Statistic, let’s discuss the significance
    of this statistic.
  prefs: []
  type: TYPE_NORMAL
- en: Here we built a classification model and evaluated it using the KS Statistic,
    but we also have other classification metrics like accuracy, ROC-AUC, etc.
  prefs: []
  type: TYPE_NORMAL
- en: We already know that accuracy is specific to one threshold, and it changes according
    to the threshold.
  prefs: []
  type: TYPE_NORMAL
- en: ROC-AUC gives us a number which shows the overall ranking ability of the model.
  prefs: []
  type: TYPE_NORMAL
- en: But why is the KS Statistic used in Banks?
  prefs: []
  type: TYPE_NORMAL
- en: The KS statistic gives a single number, which represents the maximum gap between
    the cumulative distributions of defaulters and non-defaulters.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s go back to our sample data.
  prefs: []
  type: TYPE_NORMAL
- en: We got KS Statistic 0.83 at probability of 0.29.
  prefs: []
  type: TYPE_NORMAL
- en: We already discussed that each row acts as a threshold.
  prefs: []
  type: TYPE_NORMAL
- en: So, what happened at 0.29?
  prefs: []
  type: TYPE_NORMAL
- en: Threshold = 0.29 means the probabilities are greater than or equal to 0.29 are
    flagged as defaulters.
  prefs: []
  type: TYPE_NORMAL
- en: At 0.29, the top 5 rows flagged as defaulters. Among those five, four are actual
    defaulters and one is non-defaulter incorrectly predicted as defaulter.
  prefs: []
  type: TYPE_NORMAL
- en: Here True Positives = 4 and False Positive = 1.
  prefs: []
  type: TYPE_NORMAL
- en: The remaining 5 rows will be predicted as non-defaulters.
  prefs: []
  type: TYPE_NORMAL
- en: At this point, the model has captured all the four defaulters and one non-defaulter
    incorrectly flagged as defaulter.
  prefs: []
  type: TYPE_NORMAL
- en: Here TPR is maxed out at 1 and FPR is 0.17.
  prefs: []
  type: TYPE_NORMAL
- en: So, KS Statistic = 1-0.17 = 0.83.
  prefs: []
  type: TYPE_NORMAL
- en: If we go further and calculate for other probabilities as we done earlier, we
    can observe that there will be no change in TPR but there will be increase in
    FPR, which results in flagging more non-defaulters as defaulters.
  prefs: []
  type: TYPE_NORMAL
- en: This reduces the gap between two groups.
  prefs: []
  type: TYPE_NORMAL
- en: Here we can say that at 0.29, model denied all defaulters and 17% of non-defaulters
    (according to sample data) and approved 83% of defaulters.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Do banks decide the threshold based on the KS Statistic?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: While the KS Statistic shows the maximum gap between two groups, banks do not
    decide threshold based on this statistic.
  prefs: []
  type: TYPE_NORMAL
- en: The KS Statistic is used to validate the model strength, while the actual threshold
    is decided by considering risk, profitability and regulatory guidelines.
  prefs: []
  type: TYPE_NORMAL
- en: If KS is below 20, it is considered as a weak model.
  prefs: []
  type: TYPE_NORMAL
- en: If it is between 20-40, it is considered acceptable.
  prefs: []
  type: TYPE_NORMAL
- en: If KS is in the range of 50-70, it is considered as a good model.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '**Dataset**'
  prefs: []
  type: TYPE_NORMAL
- en: The dataset used in this blog is the [German Credit dataset](https://archive.ics.uci.edu/dataset/144/statlog+german+credit+data),
    which is publicly available on the UCI Machine Learning Repository. It is provided
    under the [Creative Commons Attribution 4.0 International (CC BY 4.0) License](https://creativecommons.org/licenses/by/4.0/legalcode).
    This means it can be freely used and shared with proper attribution.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: I hope this blog post has given you a basic understanding of the Kolmogorov–Smirnov
    statistic. I’d love to hear your thoughts.
  prefs: []
  type: TYPE_NORMAL
- en: If you haven’t read my recent blog on the [Gini Coefficient](https://towardsdatascience.com/beyond-roc-auc-and-ks-gini-coefficient-explained-simply/)
    in the context of ML and finance yet, you can check it out here.
  prefs: []
  type: TYPE_NORMAL
- en: If you’d like to read more of my writing, you can also find it on [Medium](https://medium.com/@dasarinikhil076)
    and [LinkedIn](https://www.linkedin.com/in/nikhildasari-dataanalyst/).
  prefs: []
  type: TYPE_NORMAL
- en: Thanks for reading!
  prefs: []
  type: TYPE_NORMAL
