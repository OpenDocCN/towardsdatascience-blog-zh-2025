  prefs: []
  type: TYPE_NORMAL
  zh: TPR &= \tfrac{1}{4} = 0.25\\[6pt]
- en: FPR &= \tfrac{0}{6} = 0\\[6pt]
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: FPR &= \tfrac{0}{6} = 0\\[6pt]
- en: \Rightarrow (\mathrm{FPR},\,\mathrm{TPR}) &= (0,\,0.25)
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: \Rightarrow (\mathrm{FPR},\,\mathrm{TPR}) &= (0,\,0.25)
- en: \end{aligned}
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: \end{aligned}
- en: \]
