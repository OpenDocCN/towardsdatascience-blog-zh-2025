  zh: \mathbf{在阈值 0.51 时：} & \\[4pt]
- en: TP &= 3,\quad FN = 1,\quad FP = 0,\quad TN = 6\\[6pt]
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: TP &= 3,\quad FN = 1,\quad FP = 0,\quad TN = 6\\[6pt]
- en: TPR &= \tfrac{3}{4} = 0.75\\[6pt]
