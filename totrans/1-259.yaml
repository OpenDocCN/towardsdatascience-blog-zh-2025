  zh: \begin{aligned}
- en: \mathbf{At\ threshold\ 0.20:} & \\[4pt]
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: \mathbf{在阈值0.20时：} & \\[4pt]
- en: TP &= 4,\quad FN = 0,\quad FP = 2,\quad TN = 4\\[6pt]
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: TP &= 4,\quad FN = 0,\quad FP = 2,\quad TN = 4\\[6pt]
- en: TPR &= \tfrac{4}{4} = 1.00\\[6pt]
