  type: TYPE_NORMAL
  zh: TPR &= \tfrac{4}{4} = 1.00\\[6pt]
- en: FPR &= \tfrac{5}{6} \approx 0.83\\[6pt]
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: FPR &= \tfrac{5}{6} \approx 0.83\\[6pt]
- en: \Rightarrow (\mathrm{FPR},\,\mathrm{TPR}) &= (0.83,\,1.00)
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: \Rightarrow (\mathrm{FPR},\,\mathrm{TPR}) &= (0.83,\,1.00)
