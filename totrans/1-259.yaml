  zh: FPR &= \tfrac{0}{6} = 0\\[6pt]
- en: \Rightarrow (\mathrm{FPR},\,\mathrm{TPR}) &= (0,\,0.50)
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: \Rightarrow (\mathrm{FPR},\,\mathrm{TPR}) &= (0,\,0.50)
- en: \end{aligned}
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: \end{aligned}
- en: \] \[
  id: totrans-71
  prefs: []
