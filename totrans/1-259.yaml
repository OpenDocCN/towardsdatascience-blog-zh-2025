  zh: \begin{aligned}
- en: \mathbf{At\ threshold\ 0.63:} & \\[4pt]
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: \mathbf{在阈值 0.63 时：} & \\[4pt]
- en: TP &= 2,\quad FN = 2,\quad FP = 0,\quad TN = 6\\[6pt]
