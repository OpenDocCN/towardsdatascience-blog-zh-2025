- en: 'Building Successful AI Apps: The Dos and Don’ts'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/building-successful-ai-apps-the-dos-and-donts-3e0fa027efe9/](https://towardsdatascience.com/building-successful-ai-apps-the-dos-and-donts-3e0fa027efe9/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'As businesses and organizations scramble to find good use cases for AI, several
    crucial questions consistently emerge: do you even *need* AI-powered tools? How
    should you go about building or integrating them into your existing workflows?
    And how will you know if the effort was worth it?'
  prefs: []
  type: TYPE_NORMAL
- en: Whether you’re an independent practitioner or part of a larger team trying to
    make sense of this emerging technology, you’ll find concrete and actionable insights
    in the lineup of articles we’ve selected this week. They each tackle the nuts
    and bolts of building AI apps and leveraging their potential for well-defined
    goals, while avoiding common pain points.
  prefs: []
  type: TYPE_NORMAL
- en: While these posts zoom in on specific topics and business problems, they all
    offer a pragmatic, accessible approach, making them useful for readers across
    a wide spectrum of backgrounds and experience levels. Let’s dive in.
  prefs: []
  type: TYPE_NORMAL
- en: '**[What Did I Learn from Building LLM Applications in 2024? – Part 2](https://towardsdatascience.com/what-did-i-learn-from-building-llm-applications-in-2024-part-2-86433ef437a7)**So
    you’ve built a prototype of an LLM-based app that looks promising. What’s next?
    [Satwiki De](None) offers a comprehensive roadmap based on the takeaways she’s
    accumulated over a year of experimentation—the main thrust being to "develop your
    AI-enabled application keeping the business objectives in mind."'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**[Why Generative-AI Apps’ Quality Often Sucks and What to Do About it](https://towardsdatascience.com/why-generative-ai-apps-quality-often-sucks-and-what-to-do-about-it-f84407f263c3)**Having
    observed countless enterprise AI initiatives deliver underwhelming results (if
    not fail altogether) [Dr. Marcel Müller](None) focuses on the importance of robust
    assessment, and shows "how we can qualitatively and quantitatively evaluate generative
    AI applications in the context of concrete business processes."'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**[Designing, Building & Deploying an AI Chat App from Scratch (Part 1)](https://towardsdatascience.com/designing-building-deploying-an-ai-chat-app-from-scratch-part-1-f1ebf5232d4d)**If
    you’re ready to roll up your sleeves (real or proverbial) and start implementing
    an AI chat app, [Joris Baan](None)‘s patient guide is a great resource to help
    you stay on the right track. Part 1 outlines the microservices architecture and
    local development needs you’ll want to think about, while [part 2](https://towardsdatascience.com/designing-building-deploying-an-ai-chat-app-from-scratch-part-2-c75f712eebe5)
    moves on to a detailed discussion of cloud deployment and scaling.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![Photo by Krišjānis Kazaks on Unsplash](../Images/9ec6bd8c97a0b78674826e3c86ca19c8.png)'
  prefs: []
  type: TYPE_IMG
- en: Photo by [Krišjānis Kazaks](https://unsplash.com/@kazaks?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  prefs: []
  type: TYPE_NORMAL
- en: '**[Learn to Build Advanced AI Image Applications](https://towardsdatascience.com/learn-to-build-advanced-ai-image-applications-9c98d0f1f930)**Moving
    beyond chatbots, [Ida Silfverskiöld](None) explores the possibilities that visual
    generative-AI tools open up for real-world businesses and professionals—in this
    case, an interior design app based entirely on open-source models and frameworks.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**[How to Build an AI Agent for Data Analytics Without Writing SQL](https://towardsdatascience.com/how-to-build-an-ai-agent-for-data-analytics-without-writing-sql-eba811115c1f)**Why
    not harness the power of AI to streamline common data-analytics workflows that
    would typically require numerous SQL queries? [Chengzhi Zhao](None) aims to accomplish
    just that with the aid of an AI agent, and shows how you can build one yourself
    with LangChain and DuckDB.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**[AI-Powered Information Extraction and Matchmaking](https://towardsdatascience.com/ai-powered-information-extraction-and-matchmaking-0408c93ec1b9)**For
    another promising use case where an AI app can help you and your team save time
    and become more efficient, don’t miss [Umair Ali Khan](None)‘s patient tutorial
    on building AI-based match-making tools (in this case, helping job seekers find
    positions that fit their skills and interests).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Branching out into the world beyond AI apps, we’ve selected a few more recommended
    reads we thought you’d enjoy—from a beginner-friendly intro to LLMs to an in-depth
    analysis of data strategies.
  prefs: []
  type: TYPE_NORMAL
- en: If your less tech-savvy colleagues could use a clear and accessible primer on
    [what LLMs are and how they work](https://towardsdatascience.com/large-language-models-a-short-introduction-bb8366118ad0),
    just send them [Carolina Bento](None)‘s top-notch introduction.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: For a more advanced exploration of LLMs’ inner workings, head right over to
    [Jaemin Han](None)‘s fascinating look at [models’ shortcomings in generating and
    interpreting ASCII art](https://towardsdatascience.com/why-llms-suck-at-ascii-art-a9516cb880d5)—and
    the surprising security risks the latter might suggest.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Quick and focused, [Clara Chong](None)‘s guide to variable scoping explains
    why [this particular aspect of your code can have far-reaching consequences](https://towardsdatascience.com/why-variable-scoping-can-make-or-break-your-data-science-workflow-5b449291ac73)
    for your data science workflows.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What rules should we have in place to [protect humans from unknowingly interacting
    with AI profiles](https://towardsdatascience.com/are-metas-ai-profiles-unethical-a157ec05a58f)
    on social platforms? [James Barney](None) unpacks the fallout from the recent
    controversy around Meta’s (now-suspended) experiment.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'The rise of code-generating chatbots leads [Murtaza Ali](None) to wonder if
    the age of [human-written programming tutorials is coming to an end](https://towardsdatascience.com/the-death-of-human-written-code-tutorials-in-the-chatgpt-era-or-not-9a437a58a0b2).
    (Spoiler alert / sigh of relief: not just yet!)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If you’d like to make sense of the gap you observe between between predictions
    and real-world outcomes, [Hennie de Harder](None)‘s new post walks us through
    [the basics of prediction probabilities, calibration, and how to interpret](https://towardsdatascience.com/you-think-80-means-80-why-prediction-probabilities-need-a-second-look-ebc8b650cf21)
    these numbers in a practical context.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In the mood for a deep dive? [Jens Linden, PhD](None) just shared the latest
    installment in his *Demystify Data Strategy* series, focusing this time on [the
    common pitfalls of data and AI strategies](https://towardsdatascience.com/how-most-organizations-get-data-strategy-wrong-and-how-to-fix-it-b8afa59f1533)—and
    how organizations can avoid them.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: To round out this week’s lineup, we invite you to learn about [MicroPython and
    its potential relevance for data scientists](https://towardsdatascience.com/what-is-micropython-do-i-need-to-know-it-as-a-data-scientist-5b4567a21b99);
    [Sarah Lea](None)‘s concise guide will get you up to speed on all the essential
    details.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Thank you for supporting the work of our authors! As we mentioned above, we
    love publishing articles from new authors, so if you’ve recently written an interesting
    project walkthrough, tutorial, or theoretical reflection on any of our core topics,
    don’t hesitate to [share it with us](http://bit.ly/write-for-tds).
  prefs: []
  type: TYPE_NORMAL
- en: Until the next Variable,
  prefs: []
  type: TYPE_NORMAL
- en: TDS Team
  prefs: []
  type: TYPE_NORMAL
