- en: Building Research Agents for Tech Insights
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/building-research-agents-for-tech-insights/](https://towardsdatascience.com/building-research-agents-for-tech-insights/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '<mdspan datatext="el1757617275563" class="mdspan-comment">If you’ve ever asked</mdspan>
    ChatGPT something like: “Please scout all of tech for me and summarize trends
    and patterns based on what you think I would be interested in,” you know that
    you’d get something generic, where it searches a few websites and news sources
    and hands you those.'
  prefs: []
  type: TYPE_NORMAL
- en: This is because ChatGPT is built for general use cases. It applies normal search
    methods to fetch information, often limiting itself to a few web pages.
  prefs: []
  type: TYPE_NORMAL
- en: '![Simple illustration of using ChatGPT search to build a report | Image by
    author](../Images/3dbeb45cc8f8c05ed1ddf9b35f13cf5d.png)'
  prefs: []
  type: TYPE_IMG
- en: This article will show you how to build a niche agent that can scout all of
    tech, aggregate millions of texts, filter data based on a persona, and find patterns
    and themes you can act on.
  prefs: []
  type: TYPE_NORMAL
- en: The point of this workflow is to avoid sitting and scrolling through forums
    and social media on your own. The agent should do it for you, grabbing whatever
    is useful.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/456a5df08c05ab408a10272179a82b5f.png)'
  prefs: []
  type: TYPE_IMG
- en: We’ll be able to pull this off using a unique data source, a controlled workflow,
    and some prompt chaining techniques.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/21225202134a1f10ee76e0d24fd4b3d9.png)'
  prefs: []
  type: TYPE_IMG
- en: The three different processes, the API, fetching/filtering data, summarizing
    | Image by author
  prefs: []
  type: TYPE_NORMAL
- en: By caching data, we can keep the cost down to a few cents per report.
  prefs: []
  type: TYPE_NORMAL
- en: If you want to try the bot without booting it up yourself, you can join this
    [Discord](https://discord.gg/v6BV49DCpp) channel. You’ll find the repository [here](https://github.com/ilsilfverskiold/ai-personalized-tech-reports-discord)
    if you want to build it on your own.
  prefs: []
  type: TYPE_NORMAL
- en: This article focuses on the general architecture and how to build it, not the
    smaller coding details as you can find those in [Github](https://github.com/ilsilfverskiold/ai-personalized-tech-reports-discord).
  prefs: []
  type: TYPE_NORMAL
- en: Notes on building
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: If you’re new to building with agents, you might feel like this one isn’t groundbreaking
    enough.
  prefs: []
  type: TYPE_NORMAL
- en: Still, if you want to build something that works, you will need to apply quite
    a lot of software engineering to your AI applications. Even if LLMs can now act
    on their own, they still need guidance and guardrails.
  prefs: []
  type: TYPE_NORMAL
- en: For workflows like this, where there is a clear path the system should take,
    you should build more structured “workflow-like” systems. If you have a human
    in the loop, you can work with something more dynamic.
  prefs: []
  type: TYPE_NORMAL
- en: The reason this workflow works so well is because I have a very good data source
    behind it. Without this data moat, the workflow wouldn’t be able to do better
    than ChatGPT.
  prefs: []
  type: TYPE_NORMAL
- en: Preparing and caching data
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Before we can build an agent, we need to prepare a data source it can tap into.
  prefs: []
  type: TYPE_NORMAL
- en: Something I think a lot of people get wrong when they work with LLM systems
    is the belief that AI can process and aggregate data entirely on its own.
  prefs: []
  type: TYPE_NORMAL
- en: At some point, we might be able to give them enough tools to build on their
    own, but we’re not there yet in terms of reliability.
  prefs: []
  type: TYPE_NORMAL
- en: So when we build systems like this, we need data pipelines to be just as clean
    as for any other system.
  prefs: []
  type: TYPE_NORMAL
- en: The system I’ve built here uses a data source I already had available, which
    means I understand how to teach the LLM to tap into it.
  prefs: []
  type: TYPE_NORMAL
- en: It ingests thousands of texts from tech forums and websites per day and uses
    small NLP models to break down the main keywords, categorize them, and analyze
    sentiment.
  prefs: []
  type: TYPE_NORMAL
- en: This lets us see which keywords are trending within different categories over
    a specific time period.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/41efad34d0b4e4089e17d9a87a324de1.png)'
  prefs: []
  type: TYPE_IMG
- en: To build this agent, I added another endpoint that collects “facts” for each
    of these keywords.
  prefs: []
  type: TYPE_NORMAL
- en: This endpoint receives a keyword and a time period, and the system sorts comments
    and posts by engagement. Then it process the texts in chunks with smaller models
    that can decide which “facts” to keep.
  prefs: []
  type: TYPE_NORMAL
- en: '![The “facts” extracting process for each keyword | Image by author](../Images/323d86e99c8143727cb29b8178f5cda1.png)'
  prefs: []
  type: TYPE_IMG
- en: We apply a last LLM to summarize which facts are most important, keeping the
    source citations intact.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b16e1383f1f302f98fa5adf112dd5466.png)'
  prefs: []
  type: TYPE_IMG
- en: This is a kind of prompt chaining process, and I built it to mimic LlamaIndex’s
    citation engine.
  prefs: []
  type: TYPE_NORMAL
- en: The first time the endpoint is called for a keyword, it can take up to half
    a minute to complete. But since the system caches the result, any repeat request
    takes just a few milliseconds.
  prefs: []
  type: TYPE_NORMAL
- en: As long as the models are small enough, the cost of running this on a few hundred
    keywords per day is minimal. Later, we can have the system run several keywords
    in parallel.
  prefs: []
  type: TYPE_NORMAL
- en: You can probably imagine now that we can build a system to fetch these keywords
    and facts to build different reports with LLMs.
  prefs: []
  type: TYPE_NORMAL
- en: When to work with small vs larger models
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Before moving on, let’s just mention that choosing the right model size matters.
  prefs: []
  type: TYPE_NORMAL
- en: I think this is on everyone’s mind right now.
  prefs: []
  type: TYPE_NORMAL
- en: There are quite advanced models you can use for any workflow, but as we start
    to apply more and more LLMs to these applications, the number of calls per run
    adds up quickly and this can get expensive.
  prefs: []
  type: TYPE_NORMAL
- en: So, when you can, use smaller models.
  prefs: []
  type: TYPE_NORMAL
- en: You saw that I used smaller models to cite and group sources in chunks. Other
    tasks that are great for small models include routing and parsing natural language
    into structured data.
  prefs: []
  type: TYPE_NORMAL
- en: If you find that the model is faltering, you can break the task down into smaller
    problems and use prompt chaining, first do one thing, then use that result to
    do the next, and so on.
  prefs: []
  type: TYPE_NORMAL
- en: You still want to use larger LLMs when you need to find patterns in very large
    texts, or when you’re communicating with humans.
  prefs: []
  type: TYPE_NORMAL
- en: In this workflow, the cost is minimal because the data is cached, we use smaller
    models for most tasks, and the only unique large LLM calls are the final ones.
  prefs: []
  type: TYPE_NORMAL
- en: How this agent works
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let’s go through how the agent works under the hood. I built the agent to run
    inside Discord, but that’s not the focus here. We’ll focus on the agent architecture.
  prefs: []
  type: TYPE_NORMAL
- en: 'I split the process into two parts: one setup, and one news. The first process
    asks the user to set up their profile.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c3c98f6278ab6a6e1f4c0c7aac9d4a97.png)'
  prefs: []
  type: TYPE_IMG
- en: Since I already know how to work with the data source, I’ve built a fairly extensive
    system prompt that helps the LLM translate those inputs into something we can
    fetch data with later.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'I’ve also defined a schema for the outputs I need:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Without having domain knowledge of the API and how it works, it’s unlikely that
    an LLM would figure out how to do this on its own.
  prefs: []
  type: TYPE_NORMAL
- en: '*You could try building a more extensive system where the LLM first tries to
    learn the API or the systems it is supposed to use, but that would make the workflow
    more unpredictable and costly.*'
  prefs: []
  type: TYPE_NORMAL
- en: For tasks like this, I try to always use structured outputs in JSON format.
    That way we can validate the result, and if validation fails, we re-run it.
  prefs: []
  type: TYPE_NORMAL
- en: This is the easiest way to work with LLMs in a system, especially when there’s
    no human in the loop to check what the model returns.
  prefs: []
  type: TYPE_NORMAL
- en: Once the LLM has translated the user profile into the properties we defined
    in the schema, we store the profile somewhere. I used MongoDB, but that’s optional.
  prefs: []
  type: TYPE_NORMAL
- en: Storing the personality isn’t strictly required, but you do need to translate
    what the user says into a form that lets you generate data.
  prefs: []
  type: TYPE_NORMAL
- en: Generating the reports
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Let’s look at what happens in the second step when the user triggers the report.
  prefs: []
  type: TYPE_NORMAL
- en: When the user hits the `/news` command, with or without a time period set, we
    first fetch the user profile data we’ve stored.
  prefs: []
  type: TYPE_NORMAL
- en: This gives the system the context it needs to fetch relevant data, using both
    categories and keywords tied to the profile. The default time period is weekly.
  prefs: []
  type: TYPE_NORMAL
- en: From this, we get a list of top and trending keywords for the selected time
    period that may be interesting to the user.
  prefs: []
  type: TYPE_NORMAL
- en: '![Example of trending keywords that can come up from the system in two different
    categories | Image by author'
  prefs: []
  type: TYPE_NORMAL
- en: '](../Images/2cc0f2934eb820a867f28229f634b216.png)'
  prefs: []
  type: TYPE_NORMAL
- en: Without this data source, building something like this would have been difficult.
    The data needs to be prepared in advance for the LLM to work with it properly.
  prefs: []
  type: TYPE_NORMAL
- en: After fetching keywords, it could make sense to add an LLM step that filters
    out keywords irrelevant to the user. I didn’t do that here.
  prefs: []
  type: TYPE_NORMAL
- en: '*The more unnecessary information an LLM is handed, the harder it becomes for
    it to focus on what really matters. Your job is to make sure that whatever you
    feed it is relevant to the user’s actual question.*'
  prefs: []
  type: TYPE_NORMAL
- en: Next, we use the endpoint prepared earlier, which contains cached “facts” for
    each keyword. This gives us already vetted and sorted information for each one.
  prefs: []
  type: TYPE_NORMAL
- en: We run keyword calls in parallel to speed things up, but the first person to
    request a new keyword still has to wait a bit longer.
  prefs: []
  type: TYPE_NORMAL
- en: Once the results are in, we combine the data, remove duplicates, and parse the
    citations so each fact links back to a specific source via a keyword number.
  prefs: []
  type: TYPE_NORMAL
- en: We then run the data through a prompt-chaining process. The first LLM finds
    5 to 7 themes and ranks them by relevance, based on the user profile. It also
    pulls out the key points.
  prefs: []
  type: TYPE_NORMAL
- en: '![Short chain of prompting, breaking the task into smaller ones | Image by
    author](../Images/9d2db70d1e76b511cc014a3b2dacb319.png)'
  prefs: []
  type: TYPE_IMG
- en: The second LLM pass uses both the themes and original data to generate two different
    summary lengths, along with a title.
  prefs: []
  type: TYPE_NORMAL
- en: We can do this to make sure to reduce cognitive load on the model.
  prefs: []
  type: TYPE_NORMAL
- en: This last step to build the report takes the most time, since I chose to use
    a reasoning model like GPT-5.
  prefs: []
  type: TYPE_NORMAL
- en: You could swap it for something faster, but I find advanced models are better
    at this last stuff.
  prefs: []
  type: TYPE_NORMAL
- en: The full process takes a few minutes, depending on how much has already been
    cached that day.
  prefs: []
  type: TYPE_NORMAL
- en: Check out the finished result below.
  prefs: []
  type: TYPE_NORMAL
- en: '![How the tech scounting bot works in Discord | Image by author](../Images/3f34a983e88cdbf8a902f3dae42d5ebc.png)'
  prefs: []
  type: TYPE_IMG
- en: If you want to look at the code and build this bot yourself, you can find it
    [here](https://github.com/ilsilfverskiold/ai-personalized-tech-reports-discord).
    If you just want to generate a report, you can join this [channel](https://discord.gg/v6BV49DCpp).
  prefs: []
  type: TYPE_NORMAL
- en: I have some plans to improve it, but I’m happy to hear feedback if you find
    it useful.
  prefs: []
  type: TYPE_NORMAL
- en: And if you want a challenge, you can rebuild it into something else, like a
    content generator.
  prefs: []
  type: TYPE_NORMAL
- en: Notes on building agents
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Every agent you build will be different, so this is by no means a blueprint
    for building with LLMs. But you can see the level of software engineering this
    demands.
  prefs: []
  type: TYPE_NORMAL
- en: LLMs, at least for now, do not remove the need for good software and data engineers.
  prefs: []
  type: TYPE_NORMAL
- en: For this workflow, I’m mostly using LLMs to translate natural language into
    JSON and then move that through the system programmatically. It’s the easiest
    way to control the agent process, but also not what people usually imagine when
    they think of AI applications.
  prefs: []
  type: TYPE_NORMAL
- en: There are situations where using a more free-moving agent is ideal, especially
    when there is a human in the loop.
  prefs: []
  type: TYPE_NORMAL
- en: Nevertheless, hopefully you learned something, or got inspiration to build something
    on your own.
  prefs: []
  type: TYPE_NORMAL
- en: If you want to follow my writing, follow me here, my [website](https://www.ilsilfverskiold.com/),
    [Substack](https://howtouseai.substack.com/), or [LinkedIn](https://www.linkedin.com/in/ida-silfverskiold/).
  prefs: []
  type: TYPE_NORMAL
- en: ❤
  prefs: []
  type: TYPE_NORMAL
