- en: The Difference between Duplicate and Reference in Power Query
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: Power Query 中重复和引用的区别
- en: 原文：[https://towardsdatascience.com/the-difference-between-duplicate-and-reference-in-power-query/](https://towardsdatascience.com/the-difference-between-duplicate-and-reference-in-power-query/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/the-difference-between-duplicate-and-reference-in-power-query/](https://towardsdatascience.com/the-difference-between-duplicate-and-reference-in-power-query/)
- en: '*<mdspan datatext="el1746126525957" class="mdspan-comment">Sometimes</mdspan>
    we must load a copy of the same data into Power Query. Power Query offers two
    ways to get the same data twice: Duplicate and Reference. Let’s look at the difference
    between these two features and when to use one over the other.*'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '*<mdspan datatext="el1746126525957" class="mdspan-comment">有时</mdspan>我们必须将相同的数据副本加载到
    Power Query 中。Power Query 提供了两种方法来获取相同的数据两次：重复和引用。让我们看看这两个功能之间的区别以及何时使用其中一个而不是另一个。*'
- en: Introduction
  id: totrans-3
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 简介
- en: I may need to load the same data twice into Power Query and subsequently into
    Power BI.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我可能需要将相同的数据两次加载到 Power Query 中，然后加载到 Power BI 中。
- en: This can happen when I must split the data columns or perform other transformations
    on the data, or when I need to extract data from a table in two different ways.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 这可能发生在必须拆分数据列或对数据进行其他转换时，或者当需要以两种不同的方式从表中提取数据时。
- en: 'Power Query offers us two features to accomplish this:'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: Power Query 提供了两个功能来完成这项任务：
- en: 'Duplicate:'
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 重复：
- en: This duplicates the M-Code for the table and creates a new table.
  id: totrans-8
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这会复制表的 M-代码并创建一个新的表。
- en: 'Reference:'
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 引用：
- en: This takes the output of a table and creates a new table. All changes made to
    the source table are also visible in the referencing table.
  id: totrans-10
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 这会将表的结果创建为一个新的表。对源表所做的所有更改在引用表中也都可见。
- en: You might argue that when I use Reference, the data is read once from the source,
    as I take the output of one table and reuse it for a different output.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 你可能会争辩说，当我使用引用时，数据只从源读取一次，因为我将一个表的结果重复用于不同的输出。
- en: 'This is what this article is about: Is this true or false?'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是本文要讨论的内容：这是真的还是假的？
- en: Preparing the Tools
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 准备工具
- en: I use SQL Server as the data source and SQL Profiler to analyze what happens
    in the database.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 我使用 SQL Server 作为数据源，SQL Profiler 来分析数据库中发生的事情。
- en: SQL Profiler is a Tool that can intercept all the traffic on a SQL Server instance.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: SQL Profiler 是一个可以拦截 SQL Server 实例上所有流量的工具。
- en: Fortunately, SQL Profiler is part of [SQL Server Management Studio (SSMS)](https://learn.microsoft.com/en-us/ssms/download-sql-server-management-studio-ssms)
    and is free to use.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 幸运的是，SQL Profiler 是 SQL Server Management Studio (SSMS) 的一部分，并且免费使用。
- en: 'You can read this piece on Medium for a more detailed description of SQL Server
    Profiler: [Mastering SQL Server Profiler: A Step-by-Step Guide to Unlocking Database
    Insights](https://medium.com/@dotnetfullstackdev/mastering-sql-server-profiler-a-step-by-step-guide-to-unlocking-database-insights-c51235ebdde0)'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以在 Medium 上阅读这篇关于 SQL Server Profiler 的更详细描述：[掌握 SQL Server Profiler：解锁数据库洞察的逐步指南](https://medium.com/@dotnetfullstackdev/mastering-sql-server-profiler-a-step-by-step-guide-to-unlocking-database-insights-c51235ebdde0)
- en: Another way to analyze the behavior of these two Features is Power Query Diagnostics.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 分析这两个功能行为的另一种方法是 Power Query 诊断。
- en: 'I wrote this piece on Medium about Power Query Diagnostics: [Analyzing Power
    Query with Load Traces](https://medium.com/microsoft-power-bi/analyzing-power-query-with-load-traces-0ccb2cc843a3)'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 我在 Medium 上写了关于 Power Query 诊断的文章：[使用加载跟踪分析 Power Query](https://medium.com/microsoft-power-bi/analyzing-power-query-with-load-traces-0ccb2cc843a3)
- en: I invite you to read it to find out more about this tool.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 我邀请您阅读它以了解更多关于这个工具的信息。
- en: But let’s return to SQL Server Profiler and how to start it and prepare it for
    our specific scenario.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 但让我们回到 SQL Server Profiler，以及如何启动它并为其特定场景做准备。
- en: 'I can start SQL profile from the Start Menu or directly from SSMS:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 我可以从开始菜单或直接从 SSMS 启动 SQL Profiler：
- en: '![](../Images/261aca06ac7e7ae03c33d1c8abc22282.png)'
  id: totrans-23
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/261aca06ac7e7ae03c33d1c8abc22282.png)'
- en: Figure 1 – Start SQL Profiler from SSMS (Figure by the Author)
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 图 1 – 从 SSMS 启动 SQL Profiler（图由作者提供）
- en: 'After starting it, I must select the connection to my local SQL Server Instance:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 启动后，我必须选择连接到我的本地 SQL Server 实例：
- en: '![](../Images/efc27aeba96abc5dab2880fdc49d45aa.png)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/efc27aeba96abc5dab2880fdc49d45aa.png)'
- en: Figure 2 – Connect to SQL Server (Figure by the Author)
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 图 2 – 连接到 SQL Server（图由作者提供）
- en: Next, I set up the Trace.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我设置跟踪。
- en: I give it a Name and select the TSQL template to track the queries coming from
    Power Query.
  id: totrans-29
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我给它一个名称并选择 TSQL 模板来跟踪来自 Power Query 的查询。
- en: I activate the “Save to File” option and select the folder for the Trace file.
  id: totrans-30
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我激活了“保存到文件”选项并选择跟踪文件的文件夹。
- en: I can later open this trace file in Profiler and look into it in more detail
    if I wish.
  id: totrans-31
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 如果我想的话，我可以在Profiler中打开这个跟踪文件并更详细地查看它。
- en: I switch to the second page, “Event Selection”
  id: totrans-32
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我切换到第二页，“事件选择”。
- en: I activate the two options “Show all events”.
  id: totrans-33
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我激活了两个选项“显示所有事件”。
- en: In the list of all Events, I select SQL:StmtStarting and SQL:StmtCompleted to
    get the SQL code from the queries.
  id: totrans-34
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在所有事件列表中，我选择SQL:StmtStarting和SQL:StmtCompleted以获取查询的SQL代码。
- en: I deselect all events, except the three below SQL.
  id: totrans-35
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我取消选择所有事件，除了以下三个SQL。
- en: I deselect most columns except those to track the Query Text, Start and End
    Time, Duration, and other statistics.
  id: totrans-36
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 我取消选择大多数列，除了跟踪查询文本、开始和结束时间、持续时间和其他统计信息。
- en: 'This is how it looks after the setup (With the option “Show all events” deactivated):'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是设置后的样子（“显示所有事件”选项已禁用）：
- en: '![](../Images/cdc5cdefb07c5d1d41563890e7b7ee32.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/cdc5cdefb07c5d1d41563890e7b7ee32.png)'
- en: Figure 3 – Setup of the Trace in SQL Profiler (Figure by the Author)
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 图3 – SQL Profiler中的跟踪设置（图由作者）
- en: 'Lastly, I set up a filter on my source database to trace only the traffic on
    that database:'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我在我的源数据库上设置了一个过滤器，以跟踪该数据库上的流量：
- en: '![](../Images/3b75bc3171cce9add4a382adc9f1bd7b.png)'
  id: totrans-41
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/3b75bc3171cce9add4a382adc9f1bd7b.png)'
- en: Figure 4 – Set up a filter on my source database, ContosoRetailDW_Big (Figure
    by the Author)
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 图4 – 在我的源数据库ContosoRetailDW_Big上设置过滤器（图由作者）
- en: Without this filter, I will get the traffic on all databases. This will be overwhelming
    for a production instance as there will be a lot of traffic from other applications
    and users. I might even add a filter to restrict the trace to watch only for traffic
    from my NTUserName (My Windows User ID) to exclude all other traffic on the database.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 没有这个过滤器，我将获取所有数据库上的流量。对于生产实例来说，这将是压倒性的，因为会有来自其他应用程序和用户的很多流量。我甚至可能添加一个过滤器来限制跟踪只查看来自我的NTUserName（我的Windows用户ID）的流量，以排除数据库上的所有其他流量。
- en: Now I click on Run to start the Trace.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我点击运行以开始跟踪。
- en: Importing the Data into Power Query
  id: totrans-45
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 将数据导入Power Query
- en: I use a View in the database named FactOnlineSales_withCustomer as my source.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 我使用数据库中名为FactOnlineSales_withCustomer的视图作为我的源。
- en: I import this View into Power Query without any other transformation steps.
    This will cause Power Query to get the data with a simple SQL Query from the database.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 我将这个视图导入Power Query，不进行任何其他转换步骤。这将导致Power Query从数据库中通过简单的SQL查询获取数据。
- en: I can find this query without difficulty in the Trace Log.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 我可以在跟踪日志中轻松找到这个查询。
- en: Create a Duplicate and check what happens.
  id: totrans-49
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建一个副本并检查发生了什么。
- en: 'After importing the data into Power Query, I create a Duplicate of the imported
    table and load the data into Power BI:'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 在将数据导入Power Query后，我创建了导入表的副本并将其数据加载到Power BI中：
- en: '![](../Images/b3c3282c835b8265fee389eaf17238d0.png)'
  id: totrans-51
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b3c3282c835b8265fee389eaf17238d0.png)'
- en: Figure 5 – Create a Duplicate of a table in Power Query (Figure by the Author)
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 图5 – 在Power Query中创建表的副本（图由作者）
- en: 'As expected, I see the same Query executed twice in SQL Profiler:'
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 如预期的那样，我在SQL Profiler中看到了相同的查询执行了两次：
- en: '![](../Images/3299098b39e363abb46d8cae16f76ac8.png)'
  id: totrans-54
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/3299098b39e363abb46d8cae16f76ac8.png)'
- en: Figure 6 – The trace result of Duplicate (Figure by the Author)
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 图6 – Duplicate的跟踪结果（图由作者）
- en: You can see that the data has been retrieved twice with the same number of rows
    (The last two lines in the trace.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以看到数据被检索了两次，行数相同（跟踪的最后两行）。
- en: I expected this to happen, as Duplicate copies the M-Code to create a new table.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 我预期会发生这种情况，因为Duplicate会复制M-Code来创建一个新的表。
- en: Another key column is SPID. This is the internal session ID on the SQL Server
    instance. Two different SPIDs indicate that Power Query started to separate connections
    to get the data twice.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个关键列是SPID。这是SQL Server实例上的内部会话ID。两个不同的SPID表明Power Query开始分别连接两次以获取数据。
- en: This column will be important when analyzing the traffic from a Referencing
    table.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 当分析引用表的流量时，这个列将非常重要。
- en: Create a Reference and check what happens.
  id: totrans-60
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 创建一个引用并检查发生了什么。
- en: Now, I try the Reference feature.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，我尝试引用功能。
- en: 'I first delete the table “FactOnlineSales_WithCustomer_Duplicate” and create
    a Reference from the original “FactOnlineSales_WithCustomer” table:'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 我首先删除了“FactOnlineSales_WithCustomer_Duplicate”表，并从原始的“FactOnlineSales_WithCustomer”表创建了一个引用：
- en: '![](../Images/a4b362652145e9f147deb18b5623a43f.png)'
  id: totrans-63
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/a4b362652145e9f147deb18b5623a43f.png)'
- en: Figure 7 – After deleting the duplicated table, I create a Reference from the
    original table (Figure by the Author)
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 图7 – 删除复制的表后，我从原始表创建引用（图由作者绘制）
- en: 'In SQL Profiler, I can clear the view to see only new entries by clicking on
    the eraser button to clear the trace (This will not delete any data from the saved
    Trace file):'
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 在SQL Profiler中，我可以通过点击橡皮擦按钮清除跟踪来清除视图，以仅查看新条目（这将不会从保存的跟踪文件中删除任何数据）：
- en: '![](../Images/23eb9a01d00905b452797b4051ede435.png)'
  id: totrans-66
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/23eb9a01d00905b452797b4051ede435.png)'
- en: Figure 8 – Clear the Trace Windows to see only new entries (Figure by the Author)
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 图8 – 清除跟踪窗口以仅查看新条目（图由作者绘制）
- en: 'After refreshing the Data from Power BI, I get this result in SQL Profiler:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 在刷新Power BI中的数据后，我在SQL Profiler中得到了这个结果：
- en: '![](../Images/a2b83aa3d110a2eb2844ba63dc6a908f.png)'
  id: totrans-69
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/a2b83aa3d110a2eb2844ba63dc6a908f.png)'
- en: Figure 9 – Result in SQL Profiler after refreshing the data from both the original
    and the referenced table (Figure by the Author)
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 图9 – 刷新原始表和引用表中的数据后SQL Profiler的结果（图由作者绘制）
- en: Astonishingly, the data was read twice in the database.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 令人惊讶的是，数据库中读取了两次数据。
- en: I can see that there are definitely two connections, as the column SPID (Session
    ID) has two different numbers for the two SQL:StmtCompleted entries.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 我可以看到确实有两个连接，因为列SPID（会话ID）在两个SQL:StmtCompleted条目中有两个不同的数字。
- en: This means that, from the load traffic perspective, there is no difference between
    duplicating and referencing a table.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 这意味着，从加载流量角度来看，复制和引用表之间没有区别。
- en: But when both cause the same traffic on the source, why should I use Duplicate
    over Reference in Power Query?
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 但当两者都导致源上的相同流量时，为什么我应该在Power Query中使用复制而不是引用？
- en: When using Reference and when Duplicate
  id: totrans-75
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 当使用引用和复制时
- en: 'Some time ago, I wrote an article about converting a flat table to a Star Schema
    with Power Query: [Converting a Flat Table to a Good Data Model in Power Query](https://towardsdatascience.com/converting-a-flat-table-to-a-good-data-model-in-power-query-46208215f17a/)'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 一些时间以前，我写了一篇关于使用Power Query将平面表转换为星型模式的文章：[使用Power Query将平面表转换为良好的数据模型](https://towardsdatascience.com/converting-a-flat-table-to-a-good-data-model-in-power-query-46208215f17a/)
- en: In this article, I described that some operations are not possible when creating
    a new table by referencing an existing table.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 在本文中，我描述了当通过引用现有表创建新表时，某些操作是不可能的。
- en: For example, Power Query does not allow merging a referencing table with the
    original table because of a circular reference.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，Power Query不允许合并引用表与原始表，因为存在循环引用。
- en: In such a case, I must duplicate the original table.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，我必须复制原始表。
- en: This is because a referencing table is always based on the last step of the
    referenced table.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 这是因为引用表始终基于被引用表的最后一步。
- en: 'This is the key difference between “Duplicate” and “Reference” in Power Query:'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 这是Power Query中“复制”和“引用”之间的关键区别：
- en: Duplicate is an entirely new load without dependency on the original table.
    Changes to the original table do not affect the duplicated table.
  id: totrans-82
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 复制是一个全新的加载，不依赖于原始表。原始表的更改不会影响复制的表。
- en: A Referencing table is based on the outcome of the referenced table. Consequently,
    changes applied to the referenced table are automatically applied to the referencing
    table.
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 引用表基于被引用表的结果。因此，应用于引用表的更改将自动应用于引用表。
- en: To be precise, the changes are not applied, but the input table changes because
    of the change in the referenced table.
  id: totrans-84
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
  zh: 更准确地说，更改并未应用，但由于引用表的变化，输入表发生了变化。
- en: But when you need to extract a subset from the original table without changing
    the original table, Reference is the way to go, especially when it’s vital to
    always get the output from the referencing table.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 但是，当你需要从原始表中提取子集而不更改原始表时，引用是最佳选择，尤其是在始终需要从引用表中获取输出时至关重要。
- en: If you want a table from the same source but don’t want changes to the original
    table applied to the new table, then you must duplicate the original table.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想要来自同一源但不想将原始表的变化应用到新表中的表，那么你必须复制原始表。
- en: Be aware that Duplicate means a duplication of the Load logic. This means that
    when you apply a change to the original table, you might need to copy the logic
    to the duplicated table as well.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 请注意，复制意味着加载逻辑的复制。这意味着当你对原始表应用更改时，你可能还需要将逻辑复制到复制的表中。
- en: Potential for Conflicts during load
  id: totrans-88
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 加载过程中的潜在冲突
- en: Another potential issue is that load conflicts can occur when loading data from
    some sources. Excel is one of these sources that can cause problems.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 另一个潜在问题是，在从某些源加载数据时可能会发生加载冲突。Excel就是这些可能引起问题的源之一。
- en: The source of the problem is that Power Query tries to load the data in parallel.
    Some sources are not able to handle parallel connections.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 问题根源在于Power Query试图并行加载数据。某些源无法处理并行连接。
- en: 'In such a case, you must change a parameter to avoid parallel loading:'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，你必须更改一个参数以避免并行加载：
- en: '![](../Images/95616d411e19e26f7bcd59176e2d625e.png)'
  id: totrans-92
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/95616d411e19e26f7bcd59176e2d625e.png)'
- en: Figure 10 – Setting the parameter for parallel loading. You might need to set
    this to “One (disable parallel loading)” to turn off parallel loading entirely
    (Figure by the Author)
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 图10 – 设置并行加载的参数。你可能需要将其设置为“一个（禁用并行加载）”以完全关闭并行加载（图由作者提供）
- en: The default value is four.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 默认值是四。
- en: If problems occur, you might need to set either a lower Custom value or set
    it to “One (disable parallel loading)” to avoid any issues altogether.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 如果出现问题，你可能需要设置一个较低的定制值或将它设置为“一个（禁用并行加载）”以避免任何问题。
- en: Conclusion
  id: totrans-96
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In Power Query, there is no difference between “Duplicate” and “Reference” regarding
    load performance or network traffic.
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 在Power Query中，“复制”和“引用”在加载数据性能或网络流量方面没有区别。
- en: Both load the data independently from the source with a separate connection.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 两者都使用单独的连接独立从源加载数据。
- en: Therefore, I debunked the myth that “Reference” can increase load performance.
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我驳斥了“引用”可以提高加载数据性能的神话。
- en: However, knowing these two features’ differences is essential, as they offer
    distinct possibilities when loading and transforming data.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，了解这两个特性的区别是至关重要的，因为它们在加载数据和转换数据时提供了不同的可能性。
- en: Anyway, when loading data from a relational database, I would create two queries
    or two views for the two tables, instead of offloading any transformation to Power
    Query.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 无论如何，当从关系型数据库加载数据时，我会为两个表创建两个查询或两个视图，而不是将任何转换卸载到Power Query。
- en: 'According to Roche’s maxim of Data transformation:'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 根据罗氏数据转换法则：
- en: '*Data should be transformed as far upstream as possible, and as far downstream
    as necessary.*'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: '*数据应尽可能在上游进行转换，在必要时尽可能在下游进行转换。*'
- en: But when loading text, Excel files, or other sources to which I cannot send
    a query to get the data in the way I need it, I must use either “Duplicate” or
    “Reference” according to the required outcome.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
  zh: 但当加载文本、Excel文件或其他我无法发送查询以获取所需数据的源时，我必须根据所需结果使用“复制”或“引用”。
- en: References
  id: totrans-105
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 参考文献
- en: Like in my previous articles, I use the Contoso sample dataset. You can download
    the ContosoRetailDW Dataset for free from Microsoft [here](https://www.microsoft.com/en-us/download/details.aspx?id=18279).
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 如同我之前的文章，我使用Contoso样本数据集。您可以从微软[这里](https://www.microsoft.com/en-us/download/details.aspx?id=18279)免费下载ContosoRetailDW数据集。
- en: The Contoso Data can be freely used under the MIT License, as described [in
    this document](https://github.com/microsoft/Power-BI-Embedded-Contoso-Sales-Demo).
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 根据本文件所述，Contoso数据可以在MIT许可下自由使用。[在此处](https://github.com/microsoft/Power-BI-Embedded-Contoso-Sales-Demo)。
- en: I changed the dataset to shift the data to contemporary dates.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 我更改了数据集以将数据转移到当代日期。
