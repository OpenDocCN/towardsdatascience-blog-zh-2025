- en: Announcing the Towards Data Science Author Payment Program
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: '**宣布《数据科学趋势》作者支付计划**'
- en: 原文：[https://towardsdatascience.com/announcing-the-towards-data-science-author-payment-program/](https://towardsdatascience.com/announcing-the-towards-data-science-author-payment-program/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/announcing-the-towards-data-science-author-payment-program/](https://towardsdatascience.com/announcing-the-towards-data-science-author-payment-program/)
- en: At TDS, we see value in every article we publish and recognize that authors
    share their work with us for a wide range of reasons — some wish to spread their
    knowledge and help other learners, others aim to grow their public profile and
    advance in their career, and some look at writing as an additional income stream.
    In many cases, it’s a combination of all of the above.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在TDS，我们每发表一篇文章都认为它有价值，并认识到作者与我们分享他们的工作有多种原因——有些人希望传播他们的知识并帮助其他学习者，有些人希望扩大他们的公众形象并在职业生涯中取得进步，有些人将写作视为额外的收入来源。在许多情况下，这些都是上述所有因素的组合。
- en: Historically, there was no direct monetization involved in contributing to TDS
    (unless authors chose to join the partner program at our former hosting platform).
    As we establish TDS as [an independent, self-sustaining publication](https://towardsdatascience.com/towards-data-science-is-launching-as-an-independent-publication/),
    we’ve decided to change course, as it was important for us to reward the articles
    that help us reach our business goals in proportion to their impact.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 从历史上看，在TDS（除非作者选择加入我们以前的主机平台的合作伙伴计划）的贡献中，没有直接货币化。随着我们将TDS确立为[一个独立、自给自足的出版物](https://towardsdatascience.com/towards-data-science-is-launching-as-an-independent-publication/)，我们决定改变方向，因为对我们来说，根据文章的影响力奖励帮助我们实现商业目标是很重要的。
- en: How it works
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 它是如何工作的
- en: '**The TDS Author Payment Program is structured around a 30-day window. Articles
    are eligible for payment based on the number of readers who engage with them in
    the first 30 days after publication.'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: '**TDS作者支付计划围绕30天窗口构建。文章根据发布后前30天内与之互动的读者数量有资格获得报酬**。'
- en: '**Authors are paid based on four earning tiers:**'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: '**作者根据四个收益层获得报酬：**'
- en: '**→ Updated March 2, 2026: We’ve restructured key elements in the TDS Author
    Payment Program, including new earning tiers and a higher monthly article cap.
    The information in this post is no longer accurate, so [check out our latest announcement](https://towardsdatascience.com/exciting-changes-are-coming-to-the-tds-author-payment-program/)
    for the most up-to-date details. **'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: '**→ 更新于2026年3月2日：我们对TDS作者支付计划的关键要素进行了重组，包括新的收益层和更高的每月文章上限。本帖中的信息已不再准确，因此请[查看我们最新的公告](https://towardsdatascience.com/exciting-changes-are-coming-to-the-tds-author-payment-program/)以获取最新详情。**'
- en: '**25,000+ Views:** The article will earn $0.1 per view within 30 days of publication:
    a minimum of $2,500, and up to $7,500, which is the cap for earnings per article.'
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**25,000+次观看**：文章将在发布后的30天内每观看一次获得0.1美元：最低2,500美元，最高7,500美元，这是每篇文章收益的上限。'
- en: '**10,000-24,999 Views:** The article will earn $0.05 per view within 30 days
    of publication: a minimum of $500, and up to $1,249.'
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**10,000-24,999次观看**：文章将在发布后的30天内每观看一次获得0.05美元：最低500美元，最高1,249美元，这是每篇文章收益的上限。'
- en: '**5,000-9,999 Views:** The article will earn $0.025 per view within 30 days
    of publication: a minimum of $125, and up to $249.'
  id: totrans-10
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**5,000-9,999次观看**：文章将在发布后的30天内每观看一次获得0.025美元：最低125美元，最高249美元。'
- en: '**500-4,999 Views**: The article will earn $100.'
  id: totrans-11
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**500-4,999次观看**：文章将获得100美元。'
- en: '**A few important points to keep in mind: **'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: '**以下几点需要注意：**'
- en: Views are counted only if a reader stays on the page for at least 30 seconds,
    ensuring that the payouts reflect real engagement, not clicks.
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 只有当读者在页面上停留至少30秒时，观看次数才会被计算，以确保支付反映了真实参与，而不是点击。
- en: Articles with fewer than 500 views in 30 days will not qualify for payment.
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在30天内观看次数少于500篇文章将不符合支付资格。
- en: During these 30 days, articles must remain exclusive to Towards Data Science.
    After that, authors are free to republish or remove their articles.
  id: totrans-15
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在这30天内，文章必须仅限于《数据科学趋势》。之后，作者可以自由重新发布或删除他们的文章。
- en: Payout amounts are all in USD.
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 支付金额均为美元。
- en: Payouts are converted by Stripe into your local currency, using the exchange
    rate at the time of transfer.
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Stripe会将支付转换为您的当地货币，使用转账时的汇率。
- en: Who can participate?
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 谁可以参加？
- en: '**This program is available to every current TDS contributor, and to any new
    author who becomes eligible once an article reaches the first earning tier.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '**此计划对所有当前TDS贡献者以及任何一旦文章达到第一个收益层即可符合条件的作者开放**。'
- en: Participation in the program is subject to approval to ensure authentic traffic.
    We reserve the right to pause or decline participation if we detect unusual spikes
    or fraudulent activity. Additionally, payments are only available to authors who
    live in countries supported by **Stripe**.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 程序参与需经批准以确保真实流量。如果我们检测到异常波动或欺诈活动，我们保留暂停或拒绝参与的权利。此外，付款仅限于居住在由**Stripe**支持的国家/地区的作者。
- en: Authors can submit up to four articles per month for paid participation.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 作者每月可以提交最多四篇文章以参与付费活动。
- en: Why we’re doing this
  id: totrans-22
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 我们为何这样做
- en: '**We built this program to create a transparent and sustainable system that
    pays contributors for the time and effort required to write great articles that
    attract a wide audience of data science and machine learning professionals. By
    tracking genuine engagement, we ensure that the best work gets recognized and
    rewarded while keeping the system simple and transparent.'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: '**我们建立这个项目是为了创建一个透明且可持续的系统，该系统为撰写吸引广泛数据科学和机器学习专业人士的优质文章所需的时间和精力支付贡献者。通过跟踪真实参与度，我们确保最佳作品得到认可和奖励，同时保持系统简单透明。**'
- en: We’re excited to offer this opportunity and look forward to supporting our contributors
    who keep Towards Data Science the leading destination in the data science community.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 我们非常高兴提供这个机会，并期待支持那些使《数据科学之道》成为数据科学社区领先目的地的贡献者。
- en: How to contribute
  id: totrans-25
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 如何贡献
- en: To become a writer, please have a look at our [guidelines](https://towardsdatascience.com/questions-96667b06af5/).
    These will help you to prepare your article for publication.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 要成为作家，请查看我们的[指南](https://towardsdatascience.com/questions-96667b06af5/)。这些指南将帮助您准备您的文章以供发表。
- en: '**Once ready, please send your article [through the Contributor Portal](https://contributor.insightmediagroup.io/) ✨**'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: '**一旦准备就绪，请通过[贡献者门户](https://contributor.insightmediagroup.io/)发送您的文章✨**'
- en: We aim to respond to authors as quickly as possible and to let them know whether
    or not we’ve accepted their articles. We look forward to reading your work!******
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的目标是尽可能快地回应作者，并告知他们是否已接受他们的文章。我们期待阅读您的工作！******
