- en: Implementing the Rock Paper Scissors Game in Python
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/implementing-the-rock-paper-scissors-game-in-python/](https://towardsdatascience.com/implementing-the-rock-paper-scissors-game-in-python/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Introduction to the Game
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '<mdspan datatext="el1764052087647" class="mdspan-comment">Rock Paper Scissors</mdspan>
    has been an interesting and on-the-go game since our childhood, one we could play
    anywhere when bored. The game is simple. It involves two players, and each player
    has to choose one of the 3 options: Rock, Paper, or Scissors. Rock is expressed
    using a fist, Scissors with the two fingers spread out, and Paper with the hand
    opened flat.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The following are the different scenarios that can happen and what they would
    mean:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Rock vs Paper: The Paper covers the Rock. Paper wins.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Rock vs Scissors: The Rock breaks the Scissors. Rock wins.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Paper vs Scissors: The Scissors cut the Paper. Scissors wins.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Same signs: draw!'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '<mdspan datatext="el1764142457642" class="mdspan-comment">In this article,</mdspan>
    we will use our understanding of the game, as well as our beginner’s knowledge
    of Python, to code this game into a computer program. This will be done with the
    help of Python conditional statements: ‘if’, ‘elif’, and ‘else’, as well as the
    use of the random module, which is an in-built Python module. We will learn to
    import it and use its function to include the element of randomness in our game.'
  prefs: []
  type: TYPE_NORMAL
- en: Implementing the Game in Python
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now we will implement the game in Python. We will use the concepts of Python
    Lists and Randomisation using the Python random module to achieve our goal.
  prefs: []
  type: TYPE_NORMAL
- en: 'This is how the program will proceed:'
  prefs: []
  type: TYPE_NORMAL
- en: The program will ask you to choose Rock, Paper or Scissors. The computer will
    randomly choose one of the 3 choices. Based on the different scenarios above,
    the program will decide who won the game and will give an option to play again.
  prefs: []
  type: TYPE_NORMAL
- en: Defining the List & Generating the ASCII Art
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: First, we will generate the ASCII Art for Rock Paper Scissors. We will store
    these inside variables named correspondingly, which are further stored inside
    a Python List `rps_list`.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: '![](../Images/b768c7242daeb7baa0c95ef9b36368cd.png)'
  prefs: []
  type: TYPE_IMG
- en: Photo by [Fadilah Im](https://unsplash.com/@imanitor?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText)
    on [Unsplash](https://unsplash.com/photos/person-showing-peace-sign-hand-gesture-2HkXcDPnGh4?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText)
  prefs: []
  type: TYPE_NORMAL
- en: Asking for Input from the User
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The next step is to get the input from the user. We will use the variable `user_choice`
    to store what the user chooses to play the game with, as well as print it out
    for the user to see. Notice that the variable `user_choice` will store the input
    as a string. This key point will be useful to remember when we use conditionals
    to compare both the user’s and the computer’s choices in our article ahead.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Computer’s Random Choice
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Once the user has decided their choice, next we will make the computer make
    a random choice. We will use the random module for this purpose. You can check
    more about this through the following link:'
  prefs: []
  type: TYPE_NORMAL
- en: '[`random` — Generate pseudo-random numbers](https://docs.python.org/3/library/random.html)'
  prefs: []
  type: TYPE_NORMAL
- en: The random module’s `choice()` function allows us to randomly make a choice
    from a given Python list that has been given as a parameter to it. We will store
    this random choice in the variable `computer_choice` and print it out.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: 'Moreover, you can also check this article, that tells you how to include randomisation
    in our code using Python’s random module. It includes an easy explanation of the
    different functions with easy-to-understand examples:'
  prefs: []
  type: TYPE_NORMAL
- en: '[How to Implement Randomization with the Python Random Module](https://towardsdatascience.com/implementing-randomisation-with-the-python-random-module/)'
  prefs: []
  type: TYPE_NORMAL
- en: Scenarios using Conditionals
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now we will define all the different scenarios that we mentioned in the beginning
    in code form. We will use if, elif, and else, which are Python’s conditional statements,
    for this purpose.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: As can be seen from the code above, we have utilized each and every scenario,
    comparing the computer’s choice with the user’s choice that had been stored as
    a string as can be understood from the inverted comma, and then printed out the
    results, whether the user wins, or the computer wins or it has resulted in a draw
    between them both.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The above program is a simple Python code, which is easy to understand and gives
    an introduction to Python’s conditionals and the use of the random module, specifically
    its choice function.
  prefs: []
  type: TYPE_NORMAL
- en: Although there are a number of ways in which the scenarios could have been coded,
    the above was an explicit and beginner-friendly code involving the if, elif and
    else conditionals. Can you think about any other way this game could have been
    coded?
  prefs: []
  type: TYPE_NORMAL
