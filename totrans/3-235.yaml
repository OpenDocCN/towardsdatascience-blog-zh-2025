  zh: 如果你随后打开 Docker Hub 并进入你的个人资料中的仓库，应该可以看到该镜像。
- en: This was a very simple example to get started with Docker. If you want to dive
    a little deeper, you can deploy a trained ML model with FastAPI via a container.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个非常简单的Docker入门示例。如果你想深入了解，你可以通过容器部署一个训练好的ML模型。
- en: '4 — Your 101 Cheatsheet: The most important Docker commands & concepts at a
    glance'
  id: totrans-93
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 4 — 你的101速查表：一瞥最重要的Docker命令和概念
- en: You can actually think of a container like a shipping container. Regardless
    of whether you load it onto a ship (local computer), a truck (cloud server) or
    a train (data center) — the content always remains the same.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 实际上，你可以把容器想象成货柜。无论你把它装上船（本地计算机）、卡车（云服务器）还是火车（数据中心）——内容总是相同的。
- en: The most important Docker terms
  id: totrans-95
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 最重要的Docker术语
- en: 'Container: Lightweight, isolated environment for applications that contains
    all dependencies.'
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 容器：包含所有依赖项的轻量级、隔离的应用程序环境。
- en: 'Docker: The most popular container platform that allows you to create and manage
    containers.'
  id: totrans-97
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Docker：允许你创建和管理容器的最受欢迎的容器平台。
- en: 'Docker Image: A read-only template that contains code, dependencies and system
    libraries.'
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Docker镜像：包含代码、依赖项和系统库的只读模板。
- en: 'Dockerfile: Text file with commands to create a Docker image.'
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Dockerfile：包含创建Docker镜像的命令的文本文件。
- en: 'Kubernetes: Orchestration tool to manage many containers automatically.'
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Kubernetes：自动管理许多容器的编排工具。
- en: The basic concepts behind containers
  id: totrans-101
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 容器背后的基本概念
- en: 'Isolation: Each container contains its own processes, libraries and dependencies'
  id: totrans-102
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 隔离：每个容器都包含自己的进程、库和依赖项
- en: 'Portability: Containers run wherever a container runtime is installed.'
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可移植性：容器可以在安装了容器运行时的地方运行。
- en: 'Reproducibility: You can create a container once and it runs exactly the same
    everywhere.'
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 可重复性：你可以创建一个容器一次，它会在任何地方以完全相同的方式运行。
- en: '**The most basic Docker commands**'
  id: totrans-105
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: '**最基本的Docker命令**'
- en: '[PRE6]'
  id: totrans-106
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'Final Thoughts: Key takeaways as a data scientist'
  id: totrans-107
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最后的想法：作为数据科学家的重要收获
- en: 👉 With Containers you can solve the “It works on my machine” problem. Containers
    ensure that ML models, data pipelines, and environments run identically everywhere,
    independent of OS or dependencies.
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 👉 使用容器可以解决“在我的机器上运行”的问题。容器确保ML模型、数据管道和环境在不受操作系统或依赖项影响的情况下在任何地方都能以相同的方式运行。
- en: 👉 Containers are more lightweight and flexible than virtual machines. While
    VMs come with their own operating system and consume more resources, containers
    share the host operating system and start faster.
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: 👉 容器比虚拟机更轻量级和灵活。虽然虚拟机有自己的操作系统并消耗更多资源，但容器共享宿主操作系统并且启动更快。
- en: '👉 There are three key steps when working with containers: Create a Dockerfile
    to define the environment, use docker build to create an image, and run it with
    docker run — optionally pushing it to a registry with docker push.'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 👉 在处理容器时有三个关键步骤：创建一个Dockerfile来定义环境，使用docker build来创建镜像，然后使用docker run运行它——可选地使用docker
    push将其推送到注册表。
- en: And then there’s Kubernetes.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 然后是Kubernetes。
- en: 'A term that comes up a lot in this context: An orchestration tool that automates
    container management, ensuring scalability, load balancing and fault recovery.
    This is particularly useful for microservices and cloud applications.'
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个背景下经常出现的一个术语：一个自动化容器管理的编排工具，确保可伸缩性、负载均衡和故障恢复。这对于微服务和云应用特别有用。
- en: Before Docker, VMs were the go-to solution (see more in ‘[Virtualization & Containers
    for Data Science Newbiews](https://towardsdatascience.com/virtualization-containers-for-data-science-newbies/)’.)
    VMs offer strong isolation, but require more resources and start slower.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 在Docker出现之前，虚拟机是首选的解决方案（更多内容请参阅‘[虚拟化与数据科学新手容器](https://towardsdatascience.com/virtualization-containers-for-data-science-newbies/)’）。虚拟机提供了强大的隔离性，但需要更多资源并且启动较慢。
- en: So, Docker was developed in 2013 by Solomon Hykes to solve this problem. Instead
    of virtualizing entire operating systems, containers run independently of the
    environment — whether on your laptop, a server or in the cloud. They contain all
    the necessary dependencies so that they work consistently everywhere.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，Docker是在2013年由Solomon Hykes开发的，以解决这个问题。它不是虚拟化整个操作系统，而是容器独立于环境运行——无论是在你的笔记本电脑上、服务器上还是在云中。它们包含所有必要的依赖项，以确保它们在任何地方都能一致地工作。
- en: I simplify tech for curious minds🚀 If you enjoy my tech insights on Python,
    data science, data engineering, machine learning and AI, consider subscribing
    to my [substack](https://sarahleaschrch.substack.com/).
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 我为好奇心强的人简化技术🚀 如果你喜欢我在Python、数据科学、数据工程、机器学习和AI方面的技术洞察，请考虑订阅我的 [substack](https://sarahleaschrch.substack.com/)。
