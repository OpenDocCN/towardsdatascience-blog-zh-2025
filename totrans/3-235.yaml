  type: TYPE_NORMAL
  zh: 5. 终止容器
- en: At the end, we end the container either with ‘CTRL + C’ in the terminal or in
    Docker Desktop.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，我们可以在终端中使用 ‘CTRL + C’ 或在 Docker Desktop 中结束容器。
- en: 'With `docker ps` we can check in the terminal whether containers are still
    running and with `docker ps -a` we can display the container that has just been
    terminated:'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 `docker ps` 我们可以在终端中检查容器是否仍在运行，使用 `docker ps -a` 我们可以显示刚刚终止的容器：
- en: '![](../Images/bc1b36a7f1afacf01bdf3129038726dc.png)'
  id: totrans-86
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/bc1b36a7f1afacf01bdf3129038726dc.png)'
