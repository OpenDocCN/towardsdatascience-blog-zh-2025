- en: Why Data Scientists Should Care about Containers — and Stand Out with This Knowledge
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/why-data-scientists-should-care-about-containers-and-stand-out-with-this-knowledge/](https://towardsdatascience.com/why-data-scientists-should-care-about-containers-and-stand-out-with-this-knowledge/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: “I train models, analyze data and create dashboards — why should I care about
    containers?”
  prefs: []
  type: TYPE_NORMAL
- en: Many people who are new to the world of data science ask themselves this question.
    But imagine you have trained a model that runs perfectly on your laptop. However,
    error messages keep popping up in the cloud when others access it — for example
    because they are using different library versions.
  prefs: []
  type: TYPE_NORMAL
- en: 'This is where containers come into play: They allow us to make machine learning
    models, data pipelines and development environments stable, portable and scalable — regardless
    of where they are executed.'
  prefs: []
  type: TYPE_NORMAL
- en: Let’s take a closer look.
  prefs: []
  type: TYPE_NORMAL
- en: '**Table of Content**s'
  prefs:
