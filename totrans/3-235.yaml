  type: TYPE_IMG
  zh: '![图片](../Images/b50a5f06a171b044131cc47b8e56d527.png)'
- en: Screenshot taken by the author
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 作者截图
- en: We use `docker images` to check whether the image exists. If the output `my-jupyter`
    appears, the creation was successful.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用 `docker images` 来检查镜像是否存在。如果输出中出现 `my-jupyter`，则创建成功。
- en: '[PRE2]'
  id: totrans-65
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'If yes, we see the data for the created Docker image:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 如果是的话，我们可以看到创建的 Docker 镜像的数据：
- en: '![](../Images/8f5abed2c2c6614891f563caaa623f14.png)'
  id: totrans-67
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/8f5abed2c2c6614891f563caaa623f14.png)'
- en: Screenshot taken by the author
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 作者截图
- en: 3\. Start Jupyter container
  id: totrans-69
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3. 启动 Jupyter 容器
- en: 'Next, we want to start the container and use this command to do so:'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们想要启动容器，并使用以下命令来执行：
- en: '[PRE3]'
  id: totrans-71
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: We start a container with `docker run`. First, we enter the specific name of
    the container that we want to start. And with `-p 8888:8888` we connect the local
    port (8888) with the port in the container (8888). Jupyter runs on this port.
    I do not understand.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用 `docker run` 启动一个容器。首先，我们输入我们想要启动的容器的特定名称。然后，使用 `-p 8888:8888` 我们将本地端口（8888）与容器中的端口（8888）连接起来。Jupyter
    就运行在这个端口上。我不明白。
- en: 'Alternatively, you can also perform this step in Docker desktop:'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 或者，你也可以在 Docker Desktop 中执行此步骤：
- en: '![](../Images/377a9af24f177f0e1fe9fad5fd70ab2b.png)'
