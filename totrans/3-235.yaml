  id: totrans-88
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 6. 分享你的 Docker 镜像
- en: If you now want to upload your Docker image to a registry, you can do this with
    the following command. This will upload your image to Docker Hub (you need a Docker
    Hub account for this). You can also upload it to a private registry of AWS Elastic
