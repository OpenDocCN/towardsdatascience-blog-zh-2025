- en: 'The Machine Learning “Advent Calendar” Day 5: Gaussian Mixture Model in Excel'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/the-machine-learning-advent-calendar-day-5-gmm-in-excel/](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-5-gmm-in-excel/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: In [the previous article](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-4-k-means-in-excel/),
    we explored distance-based clustering with K-Means.
  prefs: []
  type: TYPE_NORMAL
- en: 'Today, we go one step further: to improve how the distance can be measured
    we add variance, in order to get the Mahalanobis distance.'
  prefs: []
  type: TYPE_NORMAL
- en: 'So, if k-Means is the unsupervised version of the **Nearest Centroid classifier**,
    then the natural question is:'
  prefs: []
  type: TYPE_NORMAL
- en: '**What is the unsupervised version of QDA?**'
  prefs: []
  type: TYPE_NORMAL
- en: This means that like QDA, each cluster now has to be described not only by its
    **mean**, but also by its **variance** (and we also have to add covariance if
    the number of features is higher than 2). But here everything is learned *without
    labels*.
  prefs: []
  type: TYPE_NORMAL
- en: So you see the idea, right?
  prefs: []
  type: TYPE_NORMAL
- en: And well, the name of this model is the **Gaussian Mixture Model (GMM)**…
  prefs: []
  type: TYPE_NORMAL
- en: GMM and the names of these models…
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: As it is often the case, the names of the models come from historical reasons.
    They are not always designed to highlight the connections between models, if they
    are not found together.
  prefs: []
  type: TYPE_NORMAL
- en: Different researchers, different periods, different use cases… and we end up
    with names that sometimes hide the true structure behind the ideas.
  prefs: []
  type: TYPE_NORMAL
- en: Here, the name “Gaussian Mixture Model” simply means that the data is represented
    as a **mixture of several Gaussian distributions**.
  prefs: []
  type: TYPE_NORMAL
- en: If we follow the same naming logic as *k-Means*, it would have been clearer
    to call it something like **k-Gaussian Mixture**
  prefs: []
  type: TYPE_NORMAL
- en: Because, in practice, instead of only using the means, we add the variance.
    And we could just use the Mahalanobis distance, or another weighted distance using
    both means and variance. But Gaussian distribution gives us probabilities that
    are easier to interpret.
  prefs: []
  type: TYPE_NORMAL
- en: So we choose a number *k* of Gaussian components.
  prefs: []
  type: TYPE_NORMAL
- en: And by the way, GMM is not the only one.
  prefs: []
  type: TYPE_NORMAL
- en: In fact, the entire **machine learning framework** is actually much more recent
    than many of the models it contains. Most of these techniques were originally
    developed in statistics, signal processing, econometrics, or pattern recognition.
  prefs: []
  type: TYPE_NORMAL
- en: Then, much later, the field we now call “machine learning” emerged and regrouped
    all these models under one umbrella. But the names did not change.
  prefs: []
  type: TYPE_NORMAL
- en: So today we use a mixture of vocabularies coming from different eras, different
    communities, and different intentions.
  prefs: []
  type: TYPE_NORMAL
- en: This is why the relationships between models are not always obvious when you
    look only at the names.
  prefs: []
  type: TYPE_NORMAL
- en: 'If we had to rename everything with a modern, unified **machine-learning style**,
    the landscape would actually be much clearer:'
  prefs: []
  type: TYPE_NORMAL
- en: '**GMM** would become **k-Gaussian Clustering**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**QDA** would become **Nearest Gaussian Classifier**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: LDA, well, **Nearest Gaussian Classifier** with the same variance across classes.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'And suddenly, all the links appear:'
  prefs: []
  type: TYPE_NORMAL
- en: k-Means ↔ Nearest Centroid
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: GMM ↔ Nearest Gaussian (QDA)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This is why GMM is so natural after K-Means. If K-Means groups points by their
    closest centroid, then GMM groups them by their closest **Gaussian shape**.
  prefs: []
  type: TYPE_NORMAL
- en: Why this entire section to discuss the names?
  prefs: []
  type: TYPE_NORMAL
- en: Well, the truth is that, since we already covered the k-means algorithm, and
    we already did the transition from Nearest Centroids Classifier to QDA, we already
    know all about this algorithm, and the training algorithm will not change…
  prefs: []
  type: TYPE_NORMAL
- en: And what is the NAME of this training algorithm?
  prefs: []
  type: TYPE_NORMAL
- en: Oh, Lloyd’s algorithm.
  prefs: []
  type: TYPE_NORMAL
- en: Actually, before k-means was called so, it was simply known as Lloyd’s algorithm,
    published by **Stuart Lloyd** in **1957**. Only later, the machine learning community
    changed it to “k-means”.
  prefs: []
  type: TYPE_NORMAL
- en: And this algorithm manipulated only the means, so we need another name, right?
  prefs: []
  type: TYPE_NORMAL
- en: 'You see where this is going: the Expectation-Maximizing algorithm!'
  prefs: []
  type: TYPE_NORMAL
- en: 'EM is simply the general form of Lloyd’s idea. Lloyd updates the means, EM
    updates *everything*: means, variances, weights, and probabilities.'
  prefs: []
  type: TYPE_NORMAL
- en: So, you already know everything about GMM!
  prefs: []
  type: TYPE_NORMAL
- en: But since my article is called “GMM in Excel”, I cannot end my article here…
  prefs: []
  type: TYPE_NORMAL
- en: GMM in 1 Dimension
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Let us start with this simple dataset, the same we used for k-means: `1, 2,
    3, 11, 12, 13`'
  prefs: []
  type: TYPE_NORMAL
- en: Hmm, the two Gaussians will have the same variances. So think about playing
    with other numbers in Excel!
  prefs: []
  type: TYPE_NORMAL
- en: And we naturally want **2 clusters**.
  prefs: []
  type: TYPE_NORMAL
- en: Here are the different steps.
  prefs: []
  type: TYPE_NORMAL
- en: Initialization
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We start with guesses for means, variances, and weights.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/dde7afc02ad01dfa6f5f41365efd94cb.png)'
  prefs: []
  type: TYPE_IMG
- en: GMM in Excel – initialization step- image by author
  prefs: []
  type: TYPE_NORMAL
- en: Expectation step (E-step)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: For each point, we compute how likely it is to belong to each Gaussian.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/11779e1d796a8f545a2e527c03b915a6.png)'
  prefs: []
  type: TYPE_IMG
- en: GMM in Excel – expectation step – image by author
  prefs: []
  type: TYPE_NORMAL
- en: Here, we can see the formulas and the plots that represent the initialized Gaussian
    distributions, we can see that the two clusters are close.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/bbdc450590a7848ab071d74bce1cad4d.png)'
  prefs: []
  type: TYPE_IMG
- en: Maximization step (M-step)
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Using these probabilities, we update the means, variances, and weights.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/2b2dfc36c6cd672162c5e58e518d5973.png)'
  prefs: []
  type: TYPE_IMG
- en: GMM in Excel – maximization step – image by author
  prefs: []
  type: TYPE_NORMAL
- en: Now, can see how the distributions move with the updates
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/3083f6e6392fe66a013d6c8cd9aff680.png)'
  prefs: []
  type: TYPE_IMG
- en: Iteration
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We repeat E-step and M-step until the parameters stabilize.
  prefs: []
  type: TYPE_NORMAL
- en: For our example, we can see that after two updates, we can see that the two
    clusters are already stable.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/06f18a26d8ba785f05862fb13000250f.png)'
  prefs: []
  type: TYPE_IMG
- en: Each step is extremely simple once the formulas are visible.
  prefs: []
  type: TYPE_NORMAL
- en: You will see that EM is nothing more than updating averages, variances, and
    probabilities.
  prefs: []
  type: TYPE_NORMAL
- en: We can also do some visualization to see how the Gaussian curves move during
    the iterations.
  prefs: []
  type: TYPE_NORMAL
- en: At the beginning, the two Gaussian curves overlap heavily because the initial
    means and variances are just guesses.
  prefs: []
  type: TYPE_NORMAL
- en: The curves slowly separate, adjust their widths, and finally settle exactly
    on the two groups of points.
  prefs: []
  type: TYPE_NORMAL
- en: 'By plotting the Gaussian curves at each iteration, you can literally *watch*
    the model learn:'
  prefs: []
  type: TYPE_NORMAL
- en: the means slide toward the centers of the data
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: the variances shrink to match the spread of each group
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: the overlap disappears
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: the final shapes match the structure of the dataset
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This visual evolution is extremely helpful for intuition. Once you see the curves
    move, EM is no longer an abstract algorithm. It becomes a dynamic process you
    can follow step by step.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f51d186ac780930a636c8986f7b36d2c.png)'
  prefs: []
  type: TYPE_IMG
- en: GMM in Excel – image by author
  prefs: []
  type: TYPE_NORMAL
- en: GMM in 2 Dimensions
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The logic is exactly the same as in 1D. Nothing new conceptually. We simply
    extend the formulas…
  prefs: []
  type: TYPE_NORMAL
- en: Instead of having one feature per point, we now have **two**.
  prefs: []
  type: TYPE_NORMAL
- en: 'Each Gaussian must now learn:'
  prefs: []
  type: TYPE_NORMAL
- en: a mean for x1
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: a mean for x2
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: a variance for x1
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: a variance for x2
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: AND a covariance term between the two features.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Once you write the formulas in Excel, you will see that the process stays exactly
    the same:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Well, the truth is that if you look at the screenshot, you might think: *“Wow,
    the formula is so long!*” And this is not all of it.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/2e256cb4303534d84067a8e570bff15f.png)'
  prefs: []
  type: TYPE_IMG
- en: 2D GMM in Excel – image by author
  prefs: []
  type: TYPE_NORMAL
- en: 'But do not be fooled. The formula is long only because we write out the **2-dimensional
    Gaussian density** explicitly:'
  prefs: []
  type: TYPE_NORMAL
- en: one part for the distance in x1
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: one part for the distance in x2
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: the covariance term
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: the normalization constant
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Nothing more.
  prefs: []
  type: TYPE_NORMAL
- en: It is simply the density formula expanded cell by cell.
  prefs: []
  type: TYPE_NORMAL
- en: 'Long to type, but perfectly understandable once you see the structure: a weighted
    distance, inside an exponential, divided by the determinant.'
  prefs: []
  type: TYPE_NORMAL
- en: So yes, the formula looks big… but the idea behind it is extremely simple.
  prefs: []
  type: TYPE_NORMAL
- en: Comparison with k-Means
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now, how does GMM compare to [K-Means](https://towardsdatascience.com/the-machine-learning-advent-calendar-day-4-k-means-in-excel/)?
  prefs: []
  type: TYPE_NORMAL
- en: And more importantly, in which situations do their results actually differ?
  prefs: []
  type: TYPE_NORMAL
- en: 'The answer is simple: **as soon as variance matters**.'
  prefs: []
  type: TYPE_NORMAL
- en: GMM has more parameters than K-Means. Even in one dimension, each cluster is
    no longer defined only by a mean, but also by a variance. This single addition
    is enough to change the behavior of the model.
  prefs: []
  type: TYPE_NORMAL
- en: Let us take a simple example with two clusters. One group of points is very
    tight, with a small variance. The other group is much more spread out, with a
    large variance.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/dbf7f9b48c902eb7f8ed39a51553f887.png)'
  prefs: []
  type: TYPE_IMG
- en: K-Means does not see this difference. It only looks at distances to centroids,
    and implicitly assumes that both clusters have the same spread. As a result, the
    boundary between the clusters is fixed at the midpoint between the two centers.
  prefs: []
  type: TYPE_NORMAL
- en: K-Means does not see this difference. It only looks at distances to centroids,
    and implicitly assumes that both clusters have the same spread. As a result, the
    boundary between the clusters is fixed at the midpoint between the two centers.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a22ce59cb9baa552698b545d0f744bae.png)'
  prefs: []
  type: TYPE_IMG
- en: GMM, on the other hand, adapts to the structure of the data. The tight cluster
    remains narrow. The wide cluster remains wide. The separation between them is
    no longer symmetric, because distance is now scaled by variance.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/895954e24b110b956d884506c71f67d4.png)'
  prefs: []
  type: TYPE_IMG
- en: This is where the results start to differ.
  prefs: []
  type: TYPE_NORMAL
- en: Points that are “far” from a tight cluster may still be perfectly normal for
    a wide one. GMM captures this naturally, while K-Means cannot, because it has
    no notion of spread.
  prefs: []
  type: TYPE_NORMAL
- en: This is exactly the situation where GMM becomes more expressive than K-Means.
    Not because it is more complex, but because it allows the model to describe what
    the data actually looks like.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: K-Means gives hard boundaries.
  prefs: []
  type: TYPE_NORMAL
- en: GMM gives probabilities.
  prefs: []
  type: TYPE_NORMAL
- en: 'Once the EM formulas are written in Excel, the model becomes simple to follow:
    the means move, the variances adjust, and the Gaussian naturally settle around
    the data.'
  prefs: []
  type: TYPE_NORMAL
- en: GMM is just the next logical step after k-Means, offering a more flexible way
    to represent clusters and their shapes.
  prefs: []
  type: TYPE_NORMAL
