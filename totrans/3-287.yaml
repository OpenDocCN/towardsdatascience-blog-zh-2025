- en: Towards Data Science is Launching as an Independent Publication
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/towards-data-science-is-launching-as-an-independent-publication/](https://towardsdatascience.com/towards-data-science-is-launching-as-an-independent-publication/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '**QUICK LINKS**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[How To Submit Your Work](#Submission1)'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Frequently Asked Questions](#FAQ1)'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '[Contact TDS Editors with questions or concerns](#questions)'
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Since founding Towards Data Science in 2016, we’ve built the largest publication
    on Medium with a dedicated community of readers and contributors focused on data
    science, machine learning, and AI. Medium built a fantastic platform, and we wouldn’t
    have been able to reach our audience without its help.
  prefs: []
  type: TYPE_NORMAL
- en: As of Monday, February 3, 2025, Towards Data Science will become an independent
    publication, and we believe this transition will help us better serve our contributors
    and readers.
  prefs: []
  type: TYPE_NORMAL
- en: By moving off Medium we can maintain complete control over our editorial vision,
    protect the domain authority we’ve built, and guide our future growth on our own
    terms.
  prefs: []
  type: TYPE_NORMAL
- en: 'Today, we’re launching our new WordPress site, though some parts of the migration
    are still a work in progress. We’re in close communication with our contributors
    to ensure a smooth transition. Despite the move, our mission remains unchanged:
    We’ll continue to provide the same in-depth coverage of data science, machine
    learning, and AI – only now on a platform where we can further support authors
    by utilizing exciting new promotional tools, advanced analytics, and dynamic community
    features that open up fresh opportunities for engagement and growth.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Why Independence Makes Sense for TDS**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We’ve long recognized that Medium provides valuable hosting, distribution and
    monetization tools – resources that have helped many writers and publishers (like
    us!) reach a wide audience. However,we believe our long term-term goals – as well
    as those of our readers and contributors – are best supported on an independent
    platform.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s why we believe an independent platform is the right move:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Improved Accessibility for Readers** – We believe in open access to all articles,
    not in paywalls. Moving to our own platform ensures that all of our content is
    available without charge to readers.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Ongoing Support for Authors** – Our independent platform gives authors greater
    flexibility to promote their work. This means authors can amplify their voices
    and engage with new audiences.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Ownership of our Domain Authority** – Operating independently allows us to
    preserve and grow Towards Data Science by not only retaining our search visibility,
    but also allowing us to experiment with novel content formats and create deeper
    connections with readers.'
  prefs: []
  type: TYPE_NORMAL
- en: For current TDS authors, expect an email soon with details on how to join the
    new platform.
  prefs: []
  type: TYPE_NORMAL
- en: For new contributors, we’re opening up submissions and would love to feature
    your work on our new site. More details will follow in the coming days.
  prefs: []
  type: TYPE_NORMAL
- en: '**Content Rights Note**'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We want to be clear that we will only migrate content to our new site if we
    have the appropriate rights to do so in accordance with Towards Data Science’s
    [terms and conditions](https://towardsdatascience.com/author-terms-and-conditions-of-use-b9b3935ff999/).
    Your work remains under your control, and we’re committed to honoring any prior
    agreements regarding its use. Only content for which we have the necessary permissions
    will be transferred, ensuring that your intellectual property is respected throughout
    this transition.
  prefs: []
  type: TYPE_NORMAL
- en: 'If you have any questions or concerns about how your content will be handled
    during this migration, or wish to remove it from our new website, please don’t
    hesitate to reach out to our editorial team – you can email us here: [[email protected]](/cdn-cgi/l/email-protection).
    We’re here to provide any additional clarification you might need and to address
    any issues that arise.'
  prefs: []
  type: TYPE_NORMAL
- en: How To Submit Your Work
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**To become a writer, please send your article using [our form](https://contributor.insightmediagroup.io/).**'
  prefs: []
  type: TYPE_NORMAL
- en: You can also find our [guidelines and FAQ here](https://towardsdatascience.com/questions-96667b06af5/).
  prefs: []
  type: TYPE_NORMAL
- en: 'FAQ: Transition for Authors & Contributors'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We understand many TDS contributors have questions about how our move off Medium
    affects your work. Thank you for sticking with us through this change.
  prefs: []
  type: TYPE_NORMAL
- en: In the next few days, current and past authors will receive an email with instructions
    to set up a new account on our platform. This will let you update existing articles
    and submit new work for consideration.
  prefs: []
  type: TYPE_NORMAL
- en: Below are answers to some of the most pressing questions we’ve received so far,
    along with details about new features coming to Towards Data Science.
  prefs: []
  type: TYPE_NORMAL
- en: '**Why did Towards Data Science leave Medium?**'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Medium has been instrumental for our growth, but recent changes in Medium policies
    showed us that our priorities have diverged. By moving to our own platform, we
    gain full control over our editorial direction and policies. This independence
    allows us to provide free access to our articles, and better support you, our
    contributors, with a full set of publishing tools–including advanced analytics,
    enhanced social media capabilities, and more flexible content management–to help
    you reach a wider audience.
  prefs: []
  type: TYPE_NORMAL
- en: '**Why now?**'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: At the end of January 2025, Medium began redirecting content from our custom
    domain, which immediately impacted our site traffic and search rankings. To protect
    our long-term vision and maintain the site’s hard-earned visibility, we fast-tracked
    a plan to launch an independent WordPress site.
  prefs: []
  type: TYPE_NORMAL
- en: '**When is the new platform launching?**'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Our new site launched on Monday, February 3, 2025\. While we’re still refining
    some features on the backend, the site is fully operational with the paywall removed
    from all content. We’re working closely with contributors to ensure the transition
    is as smooth as possible.
  prefs: []
  type: TYPE_NORMAL
- en: '**What do I need to do as a contributor during this transition?**'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: For now, simply [email your article](/cdn-cgi/l/email-protection#037376616f6a6062776a6c6d43776c74627167706762776270606a666d60662d606c6e)
    to us in a PDF or Google Doc. We’ll handle the rest by importing your work into
    the new CMS and publishing it on the site. You don’t need to set up a new account
    right away–though current and past contributors will soon receive an email with
    instructions to create an account for managing and updating your content.
  prefs: []
  type: TYPE_NORMAL
- en: '**How will my existing content be handled?**'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'We want to be clear: We only migrated content to our new site if we had the
    appropriate rights to do so in accordance with Towards Data Science’s [terms and
    conditions](https://medium.com/towards-data-science/author-terms-and-conditions-of-use-b9b3935ff999).
    Your work remains under your control, and we’re committed to honoring any prior
    agreements regarding its use. Only content for which we have the necessary permissions
    will be transferred, ensuring that your intellectual property is respected throughout
    this transition.'
  prefs: []
  type: TYPE_NORMAL
- en: 'If you have any questions or concerns about how your content will be handled
    during this migration, please don’t hesitate to reach out to our editorial team
    – you can email us here: [[email protected]](/cdn-cgi/l/email-protection).'
  prefs: []
  type: TYPE_NORMAL
- en: We’re here to provide any additional clarification you might need and to address
    any issues that arise.
  prefs: []
  type: TYPE_NORMAL
- en: '**Can I continue to publish on Medium during this transition?**'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Yes, absolutely. Towards Data Science leaving Medium doesn’t mean you have to
    leave Medium.
  prefs: []
  type: TYPE_NORMAL
- en: Please keep in mind that to publish on TDS, you’ll need to send us your article
    directly. We will no longer accept submissions through, or published on, Medium.
  prefs: []
  type: TYPE_NORMAL
- en: '**What are the benefits of publishing on the new TDS?**'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Moving to our own platform opens up several exciting opportunities for our contributors,
    including
  prefs: []
  type: TYPE_NORMAL
- en: 'Unlimited Reach: Your articles will be completely free to read, free from Medium’s
    paywall. This means your work can reach a wider, more diverse audience.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Advanced Promotional Tools: Our new site comes with enhanced features to empower
    authors to better promote their work. This flexibility will make it easier to
    use TDS to build your personal brand and connect with new readers.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Greater Editorial Control: We’re excited to launch new article formats that
    will allow authors greater control over how their content is presented to the
    reader.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Better Visibility & Control: Content on TowardsDataScience.com will maintain
    its search rankings without being dependent on Medium’s policies.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Who do I contact if I have questions?**'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: We’re here to help. If you have any additional questions or need further clarification,
    please email our editorial team at [[email protected]](/cdn-cgi/l/email-protection).
  prefs: []
  type: TYPE_NORMAL
- en: Your feedback is important as we finalize our migration to the new platform.
  prefs: []
  type: TYPE_NORMAL
- en: We hope these answers clarify our transition process. We’re thrilled about the
    future of Towards Data Science, and we’re committed to making this transition
    a smooth and positive experience for our authors and readers. Thank you for being
    a vital part of Towards Data Science as we take the publication to the next level!
  prefs: []
  type: TYPE_NORMAL
- en: '**– TDS Editorial Team**'
  prefs: []
  type: TYPE_NORMAL
