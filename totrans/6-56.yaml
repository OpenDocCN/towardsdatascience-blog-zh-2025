- en: How to Stand Out in The Data Science Job Market
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/how-to-stand-out-in-the-data-science-job-market-81253228f010/](https://towardsdatascience.com/how-to-stand-out-in-the-data-science-job-market-81253228f010/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![Photo by Nick Fewings on Unsplash](../Images/25ed3cdade7f45af9d273f16ccd6fb45.png)'
  prefs: []
  type: TYPE_IMG
- en: Photo by [Nick Fewings](https://unsplash.com/@jannerboy62?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Applying for jobs right now can feel a bit difficult, sending countless applications
    with little to no responses. The problem is that you are probably not differentiating
    yourself significantly from other candidates, so in this article, I want to go
    over several ways you can make yourself stand out.
  prefs: []
  type: TYPE_NORMAL
- en: What is standing out?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Standing out is actually a relatively simple concept to get your head around.
  prefs: []
  type: TYPE_NORMAL
- en: All you need to do is be different to other applicants. You must be an outlier.
  prefs: []
  type: TYPE_NORMAL
- en: Sounds simple, right?
  prefs: []
  type: TYPE_NORMAL
- en: Like everything in life, it’s simple to understand but much harder to do.
  prefs: []
  type: TYPE_NORMAL
- en: The primary way to be an outlier is to do things other people are not doing.
    By definition, you will become an outlier.
  prefs: []
  type: TYPE_NORMAL
- en: Notice I am not saying you need to be better, although this is sometimes a by-product
    of being an outlier.
  prefs: []
  type: TYPE_NORMAL
- en: You just need to be different, and it only really needs to be in one dimension.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s now go over some ways you can stand out.
  prefs: []
  type: TYPE_NORMAL
- en: Online Presence
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'There is a saying from Brazilian poet Mario Quintana:'
  prefs: []
  type: TYPE_NORMAL
- en: Don’t waste your time chasing butterflies. Mend your garden, and the butterflies
    will come.
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: It’s essentially saying it’s better to create something to attract what you
    want rather than expend energy chasing it. There is a trade-off, but if I think
    back to my career, my biggest leverage has always been my online presence.
  prefs: []
  type: TYPE_NORMAL
- en: Apart from my first job, I never actually went looking for a role; recruiters
    always reached out to me via LinkedIn.
  prefs: []
  type: TYPE_NORMAL
- en: A good, polished resume is still great, but how are your other profiles looking?
    Is your LinkedIn and personal website active and optimised? How often are you
    posting?
  prefs: []
  type: TYPE_NORMAL
- en: The term “personal brand” is often thrown around, but it is so important. I
    know people find it a bit cringy, but the leverage it creates is insane.
  prefs: []
  type: TYPE_NORMAL
- en: In every mentoring session, I always tell the person to start an online presence;
    honestly, not many of them do. So, if you are that person who does it, by definition,
    you will stand out.
  prefs: []
  type: TYPE_NORMAL
- en: At a minimum, I recommend having a nice-looking LinkedIn aligned with your resume
    / CV. They should complement each other nicely. See my LinkedIn [for](https://www.linkedin.com/in/egorhowell/)
    inspiration and my CV / Resume template [here](https://contributor.insightmediagroup.io/the-data-science-resume-that-got-me-jobs-interviews-9039505b9a15?sk=0ff9a6a87c01f37fb5c55fe53faada22).
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The next stage is to start posting stuff. It can literally be anything, but
    it should ideally be related to your work. I would also add a personal website/portfolio
    to really bolster your online presence. [Here](https://egorhowell.com/) is my
    website if you want some inspiration.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The final stage is having something like a blog, YouTube channel, or newsletter
    that you post consistently. This is how you grow an “audience” and build an online
    presence of people who trust you and really show off your work.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: As I said, applying for jobs directly is one way, but recruiters spend a lot
    of time looking for candidates as well, so having a strong online presence increases
    your chances of being approached.
  prefs: []
  type: TYPE_NORMAL
- en: I know many people reading this probably won’t do this, and that’s fine. But
    that’s precisely why building an online presence will make you stand out!
  prefs: []
  type: TYPE_NORMAL
- en: Unfair Advantages
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Everyone has some unfair advantages they can use to increase their chances in
    the job market.
  prefs: []
  type: TYPE_NORMAL
- en: 'These are some of the most common ones you can probably use:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Networking** **—** It is well known, yet I still think it’s criminally underrated.
    Use that connection if you know anyone working in the field through family, friends,
    or even from past jobs. Obviously, don’t use the person, but the worst they can
    say is no, and you move on. Also, often, it is in their best interest due to the
    referral bonus.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Educational / Job Background** – If you have a background in marketing, finance,
    medicine or anything that’s not directly related to tech, that’s your advantage.
    You already have the domain knowledge in a specific area, which will complement
    your data skills. So, apply for jobs in that business industry, and you will stand
    out as you have domain knowledge.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Where You Live** – Hear me out; everyone wants to work in a big city for
    a big company, and it is great to have those aspirations. However, if you are
    starting out, there is nothing wrong with going for a smaller company nearby.
    There will be less competition, and you will still learn a lot. I did this for
    my first job, where I had to spend half my time in London and half in Sussex.
    My parents live in Sussex, which made it much easier for me!'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: There are so many more things I can think of, like speaking a different language,
    playing a particular sport, being really good at one bit of software, etc. The
    list is truly endless.
  prefs: []
  type: TYPE_NORMAL
- en: You have to find the things you are better at than most people and use that
    in the job market. It can be tricky, but if done well, it can really benefit you.
  prefs: []
  type: TYPE_NORMAL
- en: Build Something Cool
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: I regretted having too many “easy” projects when applying for my first data
    science job. It was good that I had projects, but they were mostly the same, and
    I just changed out an algorithm.
  prefs: []
  type: TYPE_NORMAL
- en: In reality, what works well is having one significant quality item that can
    “wow” the interviewers and be a great talking point during the interview – it
    could even take up the whole interview!
  prefs: []
  type: TYPE_NORMAL
- en: My primary approach would be to develop a project you don’t think you can do,
    but do it anyway. You will soon learn that everything is figure-outable.
  prefs: []
  type: TYPE_NORMAL
- en: To be more concrete, I am saying don’t just build a model in a Jupyter Notebook;
    make it way more interactive. You should
  prefs: []
  type: TYPE_NORMAL
- en: Deploy the model on a cloud provider like AWS.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Add some unit tests and make them align with software engineering best practices.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Figure out a way for it to make live predictions.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Build a monitoring dashboard that can accessed online.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Store historical predictions in a database.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: I am essentially describing deploying and monitoring your model end-to-end,
    which is still only one approach. However, you can see how this type of project
    is of significant difficulty and quality compared to a static model in a notebook.
  prefs: []
  type: TYPE_NORMAL
- en: So, think of a project that would take a couple of months to complete and is
    something you are likely to struggle with.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: If you are serious about becoming a data scientist, I have just released my
    definitive guide on breaking into data science.
  prefs: []
  type: TYPE_NORMAL
- en: Over the past 3.5 years, I’ve worked as a data scientist in insurance, e-commerce,
    and the supply chain industries.
  prefs: []
  type: TYPE_NORMAL
- en: But my journey here wasn’t straightforward.
  prefs: []
  type: TYPE_NORMAL
- en: While pursuing a master’s in physics, I explored careers in finance, consultancy,
    and even research.
  prefs: []
  type: TYPE_NORMAL
- en: Then, I discovered data science, and everything changed. I was captivated by
    the ability to use machine learning and statistics to solve real-world problems.
  prefs: []
  type: TYPE_NORMAL
- en: I poured countless hours into coding, courses, and projects, applied to over
    300 jobs, and eventually landed my first graduate data science role in 2021!
  prefs: []
  type: TYPE_NORMAL
- en: This e-book distils what I’ve learned from my experience into a practical guide
    for breaking into data science.
  prefs: []
  type: TYPE_NORMAL
- en: While I can’t guarantee you’ll land a job, following this advice will significantly
    improve your chances of success.
  prefs: []
  type: TYPE_NORMAL
