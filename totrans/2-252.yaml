- en: 'Agentic AI 103: Building Multi-Agent Teams'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/agentic-ai-103-building-multi-agent-teams/](https://towardsdatascience.com/agentic-ai-103-building-multi-agent-teams/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Introduction
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <mdspan datatext="el1749756741667" class="mdspan-comment">In my last two</mdspan>
    articles here in TDS, we explored the fundamentals of Agentic AI. I have been
    sharing with you some concepts that will help you navigate through this sea of
    content we have been seeing out there.
  prefs: []
  type: TYPE_NORMAL
- en: 'In the last two articles, we explored things like:'
  prefs: []
  type: TYPE_NORMAL
- en: How to create your first agent
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What are tools and how to implement them in your agent
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Memory and reasoning
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Guardrails
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Agent evaluation and monitoring
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Nice! If you want to read about it, I suggest you look at the articles [[1]](https://towardsdatascience.com/agentic-ai-101-starting-your-journey-building-ai-agents/)
    and [[2]](https://towardsdatascience.com/agentic-ai-102-guardrails-and-agent-evaluation/)
    from the References section.
  prefs: []
  type: TYPE_NORMAL
- en: Agentic AI is one of the hottest subjects at the moment, and there are several
    frameworks you can choose from. Fortunately, one thing that I have seen from my
    experience learning about agents is that these fundamental concepts can be carried
    over from one to another.
  prefs: []
  type: TYPE_NORMAL
- en: For example, the class `Agent` from one framework becomes `chat` in another,
    or even something else, but usually with similar arguments and the very same objective
    of connecting with a Large Language Model (LLM).
  prefs: []
  type: TYPE_NORMAL
- en: So let’s take another step in our learning journey.
  prefs: []
  type: TYPE_NORMAL
- en: In this post, we will learn how to create multi-agent teams, opening opportunities
    for us to let AI perform more complex tasks for us.
  prefs: []
  type: TYPE_NORMAL
- en: For the sake of consistency, I will continue to use **[Agno](https://docs.agno.com/introduction)**
    as our framework.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s do this.
  prefs: []
  type: TYPE_NORMAL
- en: Multi-Agent Teams
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'A multi-agent team is nothing more than what the word means: a team with more
    than one agent.'
  prefs: []
  type: TYPE_NORMAL
- en: '*But why do we need that?*'
  prefs: []
  type: TYPE_NORMAL
- en: Well, I created this simple rule of thumb for myself that, if an agent needs
    to use more than 2 or 3 tools, it is time to create a team. The reason for this
    is that two *specialists* working together will do much better than a *generalist*.
  prefs: []
  type: TYPE_NORMAL
- en: When you try to create the “swiss-knife agent”, the probability of seeing things
    going backwards is high. The agent will become too overwhelmed with different
    instructions and the quantity of tools to deal with, so it ends up throwing an
    error or returning a poor result.
  prefs: []
  type: TYPE_NORMAL
- en: On the other hand, when you create agents with a single purpose, they will need
    just one tool to solve that problem, therefore increasing performance and improving
    the result.
  prefs: []
  type: TYPE_NORMAL
- en: To coordinate this team of specialists, we will use the class `Team` from Agno,
    which is able to assign tasks to the proper agent.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s move on and understand what we will build next.
  prefs: []
  type: TYPE_NORMAL
- en: Project
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Our project will be focused on the social media content generation industry.
    We will build a team of agents that generates an Instagram post and suggests an
    image based on the topic provided by the user.
  prefs: []
  type: TYPE_NORMAL
- en: The user sends a prompt for a post.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The coordinator sends the task to the **Writer**
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: It goes to the internet and searches for that topic.
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: The **Writer** returns text for the social media post.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Once the coordinator has the first result, it routes that text to the **Illustrator**
    agent, so it can create a prompt for an image for the post.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![](../Images/125a20484bc90e53e2206dc79104f19a.png)'
  prefs: []
  type: TYPE_IMG
- en: Workflow of the Team of agents. Image by the author.
  prefs: []
  type: TYPE_NORMAL
- en: Notice how we are separating the tasks very well, so each agent can focus solely
    on their job. The coordinator will make sure that each agent does their work,
    and they will collaborate for a good final result.
  prefs: []
  type: TYPE_NORMAL
- en: To make our team even more performant, I will restrict the subject for the posts
    to be created about **Wine & Fine Foods**. This way, we narrow down even more
    the scope of knowledge needed from our agent, and we can make its role clearer
    and more focused.
  prefs: []
  type: TYPE_NORMAL
- en: Let’s code that now.
  prefs: []
  type: TYPE_NORMAL
- en: Code
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: First, install the necessary libraries.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: Create a file for environment variables `.env` and add the needed API Keys for
    Gemini and any search mechanism you are using, if needed. DuckDuckGo does not
    require one.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: Import the libraries.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: Creating the Agents
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Next, we will create the first agent. It is a sommelier and specialist in gourmet
    food.
  prefs: []
  type: TYPE_NORMAL
- en: It needs a `name` for easier identification by the team.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The `role` telling it what its specialty is.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A `description` to tell the agent how to behave.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The `tools` that it can use to perform the task.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`add_name_to_instructions` is to send along with the response the name of the
    agent who worked on that task.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: We describe the `expected_output`.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The `model` is the brain of the agent.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`exponential_backoff` and `delay_between_retries` are to avoid too many requests
    to LLMs (error 429).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: Now, let us create the Illustrator agent. The arguments are the same.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: Creating the Team
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: To make these two specialized agents work together, we need to use the class
    `Agent`. We give it a name and use the `argument` to determine the type of interaction
    that the team will have. Agno makes available the modes `coordinate`, `route`
    or `collaborate`.
  prefs: []
  type: TYPE_NORMAL
- en: Also, don’t forget to use `share_member_interactions=True` to make sure that
    the responses will flow smoothly among the agents. You can also use `enable_agentic_context`,
    that enables team context to be shared with team members.
  prefs: []
  type: TYPE_NORMAL
- en: The argument `monitoring` is nice if you want to use Agno’s built-in monitor
    dashboard, available at [https://app.agno.com/](https://app.agno.com/)
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: Let’s run it.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: This is the response.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/4044e84f7906a7d81bdefc3d1b246718.png)'
  prefs: []
  type: TYPE_IMG
- en: Image of the Team’s response. Image by the author.
  prefs: []
  type: TYPE_NORMAL
- en: This is how the text file looks like.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: After we have this text file, we can go to whatever LLM we like better to create
    images, and just copy and paste the `Prompt to generate an image`.
  prefs: []
  type: TYPE_NORMAL
- en: And here is a mockup of how the post would be.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/045e6e415db4a57382061897f0c801c3.png)'
  prefs: []
  type: TYPE_IMG
- en: Mockup of the post generated by the Multi-agent team. Image by the author.
  prefs: []
  type: TYPE_NORMAL
- en: Pretty good, I’d say. What do you think?
  prefs: []
  type: TYPE_NORMAL
- en: Before You Go
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this post, we took another step in learning about Agentic AI. This topic
    is hot, and there are many frameworks available in the market. I just stopped
    trying to learn them all and chose one to start actually building something.
  prefs: []
  type: TYPE_NORMAL
- en: Here, we were able to semi-automate the creation of social media posts. Now,
    all we have to do is choose a topic, adjust the prompt, and run the Team. After
    that, it is all about going to social media and creating the post.
  prefs: []
  type: TYPE_NORMAL
- en: Certainly, there is more automation that can be done in this flow, but it is
    out of scope here.
  prefs: []
  type: TYPE_NORMAL
- en: Regarding building agents, I recommend that you take the easier frameworks to
    start, and as you need more customization, you can move on to LangGraph, for example,
    which allows you that.
  prefs: []
  type: TYPE_NORMAL
