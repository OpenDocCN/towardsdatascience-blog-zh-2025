- en: 'Agentic AI 103: Building Multi-Agent Teams'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 智能体AI 103：构建多智能体团队
- en: 原文：[https://towardsdatascience.com/agentic-ai-103-building-multi-agent-teams/](https://towardsdatascience.com/agentic-ai-103-building-multi-agent-teams/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/agentic-ai-103-building-multi-agent-teams/](https://towardsdatascience.com/agentic-ai-103-building-multi-agent-teams/)
- en: Introduction
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 简介
- en: <mdspan datatext="el1749756741667" class="mdspan-comment">In my last two</mdspan>
    articles here in TDS, we explored the fundamentals of Agentic AI. I have been
    sharing with you some concepts that will help you navigate through this sea of
    content we have been seeing out there.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1749756741667" class="mdspan-comment">在我的最后两篇</mdspan>在TDS的文章中，我们探讨了智能体AI的基础知识。我一直在与您分享一些可以帮助您在这个内容海洋中航行的概念。
- en: 'In the last two articles, we explored things like:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 在前两篇文章中，我们探讨了如下内容：
- en: How to create your first agent
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如何创建您的第一个智能体
- en: What are tools and how to implement them in your agent
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 工具是什么以及如何在您的智能体中实现它们
- en: Memory and reasoning
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 记忆与推理
- en: Guardrails
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 约束条件
- en: Agent evaluation and monitoring
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 智能体评估和监控
- en: Nice! If you want to read about it, I suggest you look at the articles [[1]](https://towardsdatascience.com/agentic-ai-101-starting-your-journey-building-ai-agents/)
    and [[2]](https://towardsdatascience.com/agentic-ai-102-guardrails-and-agent-evaluation/)
    from the References section.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 太好了！如果您想了解更多，我建议您查看参考文献部分的以下文章：[[1]](https://towardsdatascience.com/agentic-ai-101-starting-your-journey-building-ai-agents/)
    和 [[2]](https://towardsdatascience.com/agentic-ai-102-guardrails-and-agent-evaluation/)。
- en: Agentic AI is one of the hottest subjects at the moment, and there are several
    frameworks you can choose from. Fortunately, one thing that I have seen from my
    experience learning about agents is that these fundamental concepts can be carried
    over from one to another.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 智能体AI是目前最热门的主题之一，您可以选择多个框架。幸运的是，从我学习智能体的经验中，我看到了一件事，那就是这些基本概念可以从一个框架转移到另一个框架。
- en: For example, the class `Agent` from one framework becomes `chat` in another,
    or even something else, but usually with similar arguments and the very same objective
    of connecting with a Large Language Model (LLM).
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，一个框架中的`Agent`类在另一个框架中变成了`chat`，或者甚至是其他东西，但通常具有相似的参数和与大型语言模型（LLM）连接的相同目标。
- en: So let’s take another step in our learning journey.
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 所以让我们在学习之旅中再迈出一步。
- en: In this post, we will learn how to create multi-agent teams, opening opportunities
    for us to let AI perform more complex tasks for us.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们将学习如何创建多智能体团队，为我们打开让AI执行更复杂任务的机会。
- en: For the sake of consistency, I will continue to use **[Agno](https://docs.agno.com/introduction)**
    as our framework.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 为了保持一致性，我将继续使用 **[Agno](https://docs.agno.com/introduction)** 作为我们的框架。
- en: Let’s do this.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们开始吧。
- en: Multi-Agent Teams
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 多智能体团队
- en: 'A multi-agent team is nothing more than what the word means: a team with more
    than one agent.'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 多智能体团队无非就是字面上的意思：由多个智能体组成的团队。
- en: '*But why do we need that?*'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: '*但为什么我们需要那个呢？*'
- en: Well, I created this simple rule of thumb for myself that, if an agent needs
    to use more than 2 or 3 tools, it is time to create a team. The reason for this
    is that two *specialists* working together will do much better than a *generalist*.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 嗯，我为自己制定了一个简单的经验法则，如果一个智能体需要使用2个或3个以上的工具，那么是时候创建一个团队了。这样做的原因是，两个 *专家* 一起工作会比一个
    *通才* 做得更好。
- en: When you try to create the “swiss-knife agent”, the probability of seeing things
    going backwards is high. The agent will become too overwhelmed with different
    instructions and the quantity of tools to deal with, so it ends up throwing an
    error or returning a poor result.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 当您试图创建“瑞士军刀智能体”时，事情出现倒退的概率很高。智能体将因为不同的指令和工具的数量而变得过于复杂，最终导致错误或返回较差的结果。
- en: On the other hand, when you create agents with a single purpose, they will need
    just one tool to solve that problem, therefore increasing performance and improving
    the result.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 另一方面，当您创建具有单一目的的智能体时，它们只需要一个工具来解决问题，因此可以提高性能并改善结果。
- en: To coordinate this team of specialists, we will use the class `Team` from Agno,
    which is able to assign tasks to the proper agent.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 为了协调这个专家团队，我们将使用Agno中的`Team`类，该类能够将任务分配给适当的智能体。
- en: Let’s move on and understand what we will build next.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们继续前进，了解我们将要构建的内容。
- en: Project
  id: totrans-25
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 项目
- en: Our project will be focused on the social media content generation industry.
    We will build a team of agents that generates an Instagram post and suggests an
    image based on the topic provided by the user.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的项目将专注于社交媒体内容生成行业。我们将构建一个团队，该团队生成Instagram帖子并根据用户提供的主题建议图片。
- en: The user sends a prompt for a post.
  id: totrans-27
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 用户发送一个帖子提示。
- en: The coordinator sends the task to the **Writer**
  id: totrans-28
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 协调员将任务发送给 **作者**。
- en: It goes to the internet and searches for that topic.
  id: totrans-29
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它会上网搜索该主题。
- en: The **Writer** returns text for the social media post.
  id: totrans-30
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**作者**返回社交媒体帖子的文本。'
- en: Once the coordinator has the first result, it routes that text to the **Illustrator**
    agent, so it can create a prompt for an image for the post.
  id: totrans-31
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 一旦协调员得到第一个结果，它将文本路由到 **插画师** 代理，以便为帖子创建一个图像提示。
- en: '![](../Images/125a20484bc90e53e2206dc79104f19a.png)'
  id: totrans-32
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/125a20484bc90e53e2206dc79104f19a.png)'
- en: Workflow of the Team of agents. Image by the author.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 代理团队的流程图。图片由作者提供。
- en: Notice how we are separating the tasks very well, so each agent can focus solely
    on their job. The coordinator will make sure that each agent does their work,
    and they will collaborate for a good final result.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 注意我们如何很好地分离任务，这样每个代理都可以专注于自己的工作。协调员将确保每个代理完成工作，他们将合作以获得良好的最终结果。
- en: To make our team even more performant, I will restrict the subject for the posts
    to be created about **Wine & Fine Foods**. This way, we narrow down even more
    the scope of knowledge needed from our agent, and we can make its role clearer
    and more focused.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 为了让我们的团队表现更加出色，我将限制要创建的关于 **葡萄酒与美食** 的帖子主题。这样，我们可以进一步缩小从我们的代理所需的知识范围，并使其角色更加清晰和专注。
- en: Let’s code that now.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们现在编写代码。
- en: Code
  id: totrans-37
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 代码
- en: First, install the necessary libraries.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，安装必要的库。
- en: '[PRE0]'
  id: totrans-39
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: Create a file for environment variables `.env` and add the needed API Keys for
    Gemini and any search mechanism you are using, if needed. DuckDuckGo does not
    require one.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 创建一个环境变量文件 `.env` 并添加Gemini和任何所需搜索机制的API密钥，如果需要的话。DuckDuckGo不需要。
- en: '[PRE1]'
  id: totrans-41
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Import the libraries.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 导入库。
- en: '[PRE2]'
  id: totrans-43
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Creating the Agents
  id: totrans-44
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建代理
- en: Next, we will create the first agent. It is a sommelier and specialist in gourmet
    food.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 接下来，我们将创建第一个代理。它是一个品酒师和美食专家。
- en: It needs a `name` for easier identification by the team.
  id: totrans-46
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它需要一个 `name` 以便团队更容易识别。
- en: The `role` telling it what its specialty is.
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`role` 告诉它其专业是什么。'
- en: A `description` to tell the agent how to behave.
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个 `description` 来告诉代理如何行动。
- en: The `tools` that it can use to perform the task.
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 它可以用来执行任务的 `tools`。
- en: '`add_name_to_instructions` is to send along with the response the name of the
    agent who worked on that task.'
  id: totrans-50
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`add_name_to_instructions` 是为了在响应中附带处理该任务的代理人的名字。'
- en: We describe the `expected_output`.
  id: totrans-51
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 我们描述了 `expected_output`。
- en: The `model` is the brain of the agent.
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`model` 是代理的大脑。'
- en: '`exponential_backoff` and `delay_between_retries` are to avoid too many requests
    to LLMs (error 429).'
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`exponential_backoff` 和 `delay_between_retries` 是为了避免对LLM发出过多的请求（错误429）。'
- en: '[PRE3]'
  id: totrans-54
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Now, let us create the Illustrator agent. The arguments are the same.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，让我们创建插画师代理。参数是相同的。
- en: '[PRE4]'
  id: totrans-56
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Creating the Team
  id: totrans-57
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建团队
- en: To make these two specialized agents work together, we need to use the class
    `Agent`. We give it a name and use the `argument` to determine the type of interaction
    that the team will have. Agno makes available the modes `coordinate`, `route`
    or `collaborate`.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 为了让这两个专业代理协同工作，我们需要使用 `Agent` 类。我们给它一个名字，并使用 `argument` 来确定团队将具有的交互类型。Agno提供了
    `coordinate`、`route` 或 `collaborate` 模式。
- en: Also, don’t forget to use `share_member_interactions=True` to make sure that
    the responses will flow smoothly among the agents. You can also use `enable_agentic_context`,
    that enables team context to be shared with team members.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 此外，别忘了使用 `share_member_interactions=True` 来确保响应在代理之间流畅流动。您还可以使用 `enable_agentic_context`，这允许团队上下文与团队成员共享。
- en: The argument `monitoring` is nice if you want to use Agno’s built-in monitor
    dashboard, available at [https://app.agno.com/](https://app.agno.com/)
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 如果您想使用Agno内置的监控仪表板，可以使用 `monitoring` 参数，该仪表板位于 [https://app.agno.com/](https://app.agno.com/)。
- en: '[PRE5]'
  id: totrans-61
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Let’s run it.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们运行它。
- en: '[PRE6]'
  id: totrans-63
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: This is the response.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 这是响应。
- en: '![](../Images/4044e84f7906a7d81bdefc3d1b246718.png)'
  id: totrans-65
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/4044e84f7906a7d81bdefc3d1b246718.png)'
- en: Image of the Team’s response. Image by the author.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 团队响应的图片。图片由作者提供。
- en: This is how the text file looks like.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是文本文件的样子。
- en: '[PRE7]'
  id: totrans-68
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: After we have this text file, we can go to whatever LLM we like better to create
    images, and just copy and paste the `Prompt to generate an image`.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们有了这个文本文件后，我们可以去我们更喜欢哪个LLM来创建图像，只需复制和粘贴 `生成图像的提示`。
- en: And here is a mockup of how the post would be.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是帖子原型的示例。
- en: '![](../Images/045e6e415db4a57382061897f0c801c3.png)'
  id: totrans-71
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/045e6e415db4a57382061897f0c801c3.png)'
- en: Mockup of the post generated by the Multi-agent team. Image by the author.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 多代理团队生成的帖子原型。图片由作者提供。
- en: Pretty good, I’d say. What do you think?
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 我觉得相当不错。你呢？
- en: Before You Go
  id: totrans-74
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 在你离开之前
- en: In this post, we took another step in learning about Agentic AI. This topic
    is hot, and there are many frameworks available in the market. I just stopped
    trying to learn them all and chose one to start actually building something.
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们又向前迈出了一步，了解代理人工智能。这个话题很热门，市场上有很多框架可用。我只是停止了尝试学习所有这些框架，而是选择了一个来开始实际构建一些东西。
- en: Here, we were able to semi-automate the creation of social media posts. Now,
    all we have to do is choose a topic, adjust the prompt, and run the Team. After
    that, it is all about going to social media and creating the post.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，我们能够半自动化地创建社交媒体帖子。现在，我们只需要选择一个主题，调整提示，然后运行团队。之后，就完全是去社交媒体上创建帖子的事了。
- en: Certainly, there is more automation that can be done in this flow, but it is
    out of scope here.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，在这个流程中还可以进行更多自动化，但这里不涉及。
- en: Regarding building agents, I recommend that you take the easier frameworks to
    start, and as you need more customization, you can move on to LangGraph, for example,
    which allows you that.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 关于构建代理，我建议你从更容易的框架开始，随着你需要更多定制，你可以转向 LangGraph，例如，它允许你这样做。
- en: Contact and Online Presence
  id: totrans-79
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 联系方式和在线存在
- en: 'If you liked this content, find more of my work and social media in my website:'
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你喜欢这个内容，可以在我的网站上找到更多我的工作和社交媒体：
- en: '[https://gustavorsantos.me](https://gustavorsantos.me)'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://gustavorsantos.me](https://gustavorsantos.me)'
- en: GitHub Repository
  id: totrans-82
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: GitHub 仓库
- en: '[https://github.com/gurezende/agno-ai-labs](https://github.com/gurezende/agno-ai-labs)'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: '[https://github.com/gurezende/agno-ai-labs](https://github.com/gurezende/agno-ai-labs)'
- en: References
  id: totrans-84
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 参考文献
- en: '**[1\. Agentic AI 101: Starting Your Journey Building AI Agents]** [https://towardsdatascience.com/agentic-ai-101-starting-your-journey-building-ai-agents/](https://towardsdatascience.com/agentic-ai-101-starting-your-journey-building-ai-agents/)'
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: '**[1. 代理人工智能 101：开始你的 AI 代理构建之旅]** [https://towardsdatascience.com/agentic-ai-101-starting-your-journey-building-ai-agents/](https://towardsdatascience.com/agentic-ai-101-starting-your-journey-building-ai-agents/)'
- en: '**[2\. Agentic AI 102: Guardrails and Agent Evaluation]** [https://towardsdatascience.com/agentic-ai-102-guardrails-and-agent-evaluation/](https://towardsdatascience.com/agentic-ai-102-guardrails-and-agent-evaluation/)'
  id: totrans-86
