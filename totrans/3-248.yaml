- en: On-Device Machine Learning in Spatial Computing
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/on-device-machine-learning-in-spatial-computing/](https://towardsdatascience.com/on-device-machine-learning-in-spatial-computing/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: The landscape of computing is undergoing a profound transformation with the
    emergence of spatial computing platforms(VR and AR). As we step into this new
    era, the intersection of virtual reality, augmented reality, and on-device machine
    learning presents unprecedented opportunities for developers to create experiences
    that seamlessly blend digital content with the physical world.
  prefs: []
  type: TYPE_NORMAL
- en: The introduction of **visionOS** marks a significant milestone in this evolution.
    Apple’s spatial computing platform combines sophisticated hardware capabilities
    with powerful development frameworks, enabling developers to build applications
    that can understand and interact with the physical environment in real time. This
    convergence of spatial awareness and on-device machine learning capabilities opens
    up new possibilities for object recognition and tracking applications that were
    previously challenging to implement.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: What We’re Building
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this guide, we’ll be building an app that showcases the power of on-device
    machine learning in visionOS. We’ll create an app that can recognize and track
    a diet soda can in real time, overlaying visual indicators and information directly
    in the user’s field of view.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c31cc0ae26b135d3f7f8df2511809082.png)'
  prefs: []
  type: TYPE_IMG
- en: Our app will leverage several key technologies in the visionOS ecosystem. When
    a user runs the app, they’re presented with a window containing a rotating 3D
    model of our target object along with usage instructions. As they look around
    their environment, the app continuously scans for diet soda cans. Upon detection,
    it displays dynamic bounding lines around the can and places a floating text label
    above it, all while maintaining precise tracking as the object or user moves through
    space.
  prefs: []
  type: TYPE_NORMAL
- en: 'Before we begin development, let’s ensure we have the necessary tools and understanding
    in place. This tutorial requires:'
  prefs: []
  type: TYPE_NORMAL
- en: The latest version of Xcode 16 with visionOS SDK installed
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: visionOS 2.0 or later running on an Apple Vision Pro device
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Basic familiarity with SwiftUI and the Swift programming language
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The development process will take us through several key stages, from capturing
    a 3D model of our target object to implementing real-time tracking and visualization.
    Each stage builds upon the previous one, giving you a thorough understanding of
    developing features powered by on-device machine learning for visionOS.
  prefs: []
  type: TYPE_NORMAL
- en: 'Building the Foundation: 3D Object Capture'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The first step in creating our object recognition system involves capturing
    a detailed 3D model of our target object. Apple provides a powerful app for this
    purpose: [**RealityComposer**](https://apps.apple.com/us/app/reality-composer/id1462358802),
    available for iOS through the App Store.
  prefs: []
  type: TYPE_NORMAL
- en: When capturing a 3D model, environmental conditions play a crucial role in the
    quality of our results. Setting up the capture environment properly ensures we
    get the best possible data for our machine learning model. A well-lit space with
    consistent lighting helps the capture system accurately detect the object’s features
    and dimensions. The diet soda can should be placed on a surface with good contrast,
    making it easier for the system to distinguish the object’s boundaries.
  prefs: []
  type: TYPE_NORMAL
- en: The capture process begins by launching the **RealityComposer** app and selecting
    “Object Capture” from the available options. The app guides us through positioning
    a bounding box around our target object. This bounding box is critical as it defines
    the spatial boundaries of our capture volume.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/bb8d0e259b2004a20bf85d89a307e849.png)'
  prefs: []
  type: TYPE_IMG
- en: RealityComposer — Object Capture Flow — Image By Author
  prefs: []
  type: TYPE_NORMAL
- en: Once we’ve captured all the details of the soda can with the help of the in-app
    guide and processed the images, a **.usdz** file containing our 3D model will
    be created. This file format is specifically designed for AR/VR applications and
    contains not just the visual representation of our object, but also important
    information that will be used in the training process.
  prefs: []
  type: TYPE_NORMAL
- en: Training the Reference Model
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'With our 3D model in hand, we move to the next crucial phase: training our
    recognition model using **Create ML**. Apple’s **Create ML** application provides
    a straightforward interface for training machine learning models, including specialized
    templates for spatial computing applications.'
  prefs: []
  type: TYPE_NORMAL
- en: To begin the training process, we launch **Create ML** and select the “Object
    Tracking” template from the spatial category. This template is specifically designed
    for training models that can recognize and track objects in three-dimensional
    space.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b070aab69a9e7ab2d8973b632453efa7.png)'
  prefs: []
  type: TYPE_IMG
- en: CreateML Project Setup — Image By Author
  prefs: []
  type: TYPE_NORMAL
- en: After creating a new project, we import our **.usdz **file into Create ML. The
    system automatically analyzes the 3D model and extracts key features that will
    be used for recognition. The interface provides options for configuring how our
    object should be recognized in space, including viewing angles and tracking preferences.
  prefs: []
  type: TYPE_NORMAL
- en: Once you’ve imported the 3d model and analyzed it in various angles, go ahead
    and click on “Train”. **Create ML** will process our model and begin the training
    phase. During this phase, the system learns to recognize our object from various
    angles and under different conditions. The training process can take several hours
    as the system builds a comprehensive understanding of our object’s characteristics.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/05935a60856abca8aa58551aaacbc852.png)'
  prefs: []
  type: TYPE_IMG
- en: Create ML Training Process — Image By Author
  prefs: []
  type: TYPE_NORMAL
- en: The output of this training process is a **.referenceobject** file, which contains
    the trained model data optimized for real-time object detection in visionOS. This
    file encapsulates all the learned features and recognition parameters that will
    enable our app to identify diet soda cans in the user’s environment.
  prefs: []
  type: TYPE_NORMAL
- en: The successful creation of our reference object marks an important milestone
    in our development process. We now have a trained model capable of recognizing
    our target object in real-time, setting the stage for implementing the actual
    detection and visualization functionality in our visionOS application.
  prefs: []
  type: TYPE_NORMAL
- en: Initial Project Setup
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now that we have our trained reference object, let’s set up our visionOS project.
    Launch **Xcode** and select “Create a new Xcode project”. In the template selector,
    choose visionOS under the platforms filter and select “App”. This template provides
    the basic structure needed for a visionOS application.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f589fb702e1ca22631fabdadcb3fc6f1.png)'
  prefs: []
  type: TYPE_IMG
- en: Xcode visionOS Project Setup — Image By Author
  prefs: []
  type: TYPE_NORMAL
- en: 'In the project configuration dialog, configure your project with these primary
    settings:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Product Name: SodaTracker'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Initial Scene: Window'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Immersive Space Renderer: RealityKit'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Immersive Space: Mixed'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: After project creation, we need to make a few essential modifications. First,
    delete the file named **ToggleImmersiveSpaceButton.swift** as we won’t be using
    it in our implementation.
  prefs: []
  type: TYPE_NORMAL
- en: Next, we’ll add our previously created assets to the project. In Xcode’s Project
    Navigator, locate the “**RealityKitContent.rkassets**” folder and add the 3D object
    file (“**SodaModel.usdz**” file). This 3D model will be used in our informative
    view. Create a new group named “**ReferenceObjects**” and add the “**Diet Soda.referenceobject**”
    file we generated using Create ML.
  prefs: []
  type: TYPE_NORMAL
- en: The final setup step is to configure the necessary permission for object tracking.
    Open your project’s **Info.plist** file and add a new key: **NSWorldSensingUsageDescription**.
    Set its value to “Used to track diet sodas”. This permission is required for the
    app to detect and track objects in the user’s environment.
  prefs: []
  type: TYPE_NORMAL
- en: With these setup steps complete, we have a properly configured visionOS project
    ready for implementing our object tracking functionality.
  prefs: []
  type: TYPE_NORMAL
- en: Entry Point Implementation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Let’s start with **SodaTrackerApp.swift**, which was automatically created
    when we set up our visionOS project. We need to modify this file to support our
    object tracking functionality. Replace the default implementation with the following
    code:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'The key aspect of this implementation is the initialization and management
    of our object detection system. When the app launches, we initialize our **AppModel** which
    handles the **ARKit** session and object tracking setup. The initialization sequence
    is crucial:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: This asynchronous initialization loads our trained reference object and prepares
    the **ARKit** session for object tracking. We ensure this happens before opening
    the immersive space where the actual detection will occur.
  prefs: []
  type: TYPE_NORMAL
- en: 'The immersive space configuration is particularly important for object tracking:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: The mixed immersion style is essential for our object tracking implementation
    as it allows **RealityKit** to blend our visual indicators (bounding boxes and
    labels) with the real-world environment where we’re detecting objects. This creates
    a seamless experience where digital content accurately aligns with physical objects
    in the user’s space.
  prefs: []
  type: TYPE_NORMAL
- en: With these modifications to **SodaTrackerApp.swift**, our app is ready to begin
    the object detection process, with ARKit, RealityKit, and our trained model working
    together in the mixed reality environment. In the next section, we’ll examine
    the core object detection functionality in **AppModel.swift**, another file that
    was created during project setup.
  prefs: []
  type: TYPE_NORMAL
- en: Core Detection Model Implementation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**AppModel.swift**, created during project setup, serves as our core detection
    system. This file manages the **ARKit** session, loads our trained model, and
    coordinates the object tracking process. Let’s examine its implementation:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: At the core of our implementation is **ARKitSession**, visionOS’s gateway to
    spatial computing capabilities. The **@MainActor** attribute ensures our object
    detection operations run on the main thread, which is crucial for synchronizing
    with the rendering pipeline.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: The **ObjectTrackingProvider** is a specialized component in visionOS that handles
    real-time object detection. It works in conjunction with **ReferenceObject** instances,
    which contain the spatial and visual information from our trained model. We maintain
    these as private properties to ensure proper lifecycle management.
  prefs: []
  type: TYPE_NORMAL
- en: 'The initialization process is particularly important:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: Here, we load our trained model (the .referenceobject file we created in Create
    ML) into a **ReferenceObject** instance. This process is asynchronous because
    the system needs to parse and prepare the model data for real-time detection.
  prefs: []
  type: TYPE_NORMAL
- en: 'The beginDetection method sets up the actual tracking process:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: When we create the **ObjectTrackingProvider**, we pass in our reference objects.
    The provider uses these to establish the detection parameters — what to look for,
    what features to match, and how to track the object in 3D space. The **ARKitSession.run** call
    activates the tracking system, beginning the real-time analysis of the user’s
    environment.
  prefs: []
  type: TYPE_NORMAL
- en: Immersive Experience Implementation
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**ImmersiveView.swift**, provided in our initial project setup, manages the
    real-time object detection visualization in the user’s space. This view processes
    the continuous stream of detection data and creates visual representations of
    detected objects. Here’s the implementation:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: 'The core of our object tracking visualization lies in the detector’s **anchorUpdates** stream.
    This **ARKit** feature provides a continuous flow of object detection events:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: Each **ObjectAnchor **contains crucial spatial data about the detected soda
    can, including its position, orientation, and bounding box in 3D space. When a
    new object is detected (.added event), we create a visualization that **RealityKit **will
    render in the correct position relative to the physical object. As the object
    or user moves, the .updated events ensure our virtual content stays perfectly
    aligned with the real world.
  prefs: []
  type: TYPE_NORMAL
- en: Visual Feedback System
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Create a new file named **ObjectVisualization.swift** for handling the visual
    representation of detected objects. This component is responsible for creating
    and managing the bounding box and text overlay that appears around detected soda
    cans:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: 'The bounding box creation is a key aspect of our visualization. Rather than
    using a single box mesh, we construct 12 individual edges that form a wireframe
    outline. This approach provides better visual clarity and allows for more precise
    control over the appearance. The edges are positioned using SIMD3 vectors for
    efficient spatial calculations:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: This mathematical positioning ensures each edge aligns perfectly with the detected
    object’s dimensions. The calculation uses the object’s extent (width, height,
    depth) and creates a symmetrical arrangement around its center point.
  prefs: []
  type: TYPE_NORMAL
- en: This visualization system works in conjunction with our **ImmersiveView** to
    create real-time visual feedback. As the ImmersiveView receives position updates
    from ARKit, it calls refreshTracking on our visualization, which updates the transform
    matrices to maintain precise alignment between the virtual overlays and the physical
    object.
  prefs: []
  type: TYPE_NORMAL
- en: Informative View
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![](../Images/1a04542c955b7492c04177c12ca43854.png)'
  prefs: []
  type: TYPE_IMG
- en: ContentView With Instructions — Image By Author
  prefs: []
  type: TYPE_NORMAL
- en: '**ContentView.swift**, provided in our project template, handles the informational
    interface for our app. Here’s the implementation:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: This implementation displays our 3D-scanned soda model (SodaModel.usdz) with
    a rotating animation, providing users with a clear reference of what the system
    is looking for. The rotation helps users understand how to present the object
    for optimal detection.
  prefs: []
  type: TYPE_NORMAL
- en: With these components in place, our application now provides a complete object
    detection experience. The system uses our trained model to recognize diet soda
    cans, creates precise visual indicators in real-time, and provides clear user
    guidance through the informational interface.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![](../Images/e175dffe6af8153eec56069ab794be5e.png)'
  prefs: []
  type: TYPE_IMG
- en: Our Final App — Image By Author
  prefs: []
  type: TYPE_NORMAL
- en: In this tutorial, we’ve built a complete object detection system for visionOS
    that showcases the integration of several powerful technologies. Starting from
    3D object capture, through ML model training in Create ML, to real-time detection
    using ARKit and RealityKit, we’ve created an app that seamlessly detects and tracks
    objects in the user’s space.
  prefs: []
  type: TYPE_NORMAL
- en: This implementation represents just the beginning of what’s possible with on-device
    machine learning in spatial computing. As hardware continues to evolve with more
    powerful Neural Engines and dedicated ML accelerators and frameworks like Core
    ML mature, we’ll see increasingly sophisticated applications that can understand
    and interact with our physical world in real-time. The combination of spatial
    computing and on-device ML opens up possibilities for applications ranging from
    advanced AR experiences to intelligent environmental understanding, all while
    maintaining user privacy and low latency.
  prefs: []
  type: TYPE_NORMAL
