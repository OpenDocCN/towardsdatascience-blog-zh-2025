- en: How We Reduced LLM Costs by 90% with 5 Lines of Code
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 如何用5行代码将LLM成本降低90%
- en: 原文：[https://towardsdatascience.com/how-we-reduced-llm-cost-by-90-with-5-lines-of-code/](https://towardsdatascience.com/how-we-reduced-llm-cost-by-90-with-5-lines-of-code/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/how-we-reduced-llm-cost-by-90-with-5-lines-of-code/](https://towardsdatascience.com/how-we-reduced-llm-cost-by-90-with-5-lines-of-code/)
- en: <mdspan datatext="el1755803155887" class="mdspan-comment">You know that</mdspan>
    feeling when everything *seems* to be working just fine, until you look under
    the hood and realize your system is burning 10× more fuel than it needs to?
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1755803155887" class="mdspan-comment">你知道那种感觉吗</mdspan>，当一切*似乎*都在正常工作，直到你揭开盖子，才发现你的系统比它需要的燃烧了10倍多的燃料？
- en: We had a client script firing off requests to validate our prompts, built with
    async Python code and running smoothly in a Jupyter notebook. Clean, simple, and
    fast. We ran it regularly to test our models and collect evaluation data. No red
    flags. No warnings.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 我们有一个客户端脚本在发送请求以验证我们的提示，使用异步Python代码构建，并在Jupyter笔记本中运行顺畅。干净、简单、快速。我们定期运行它来测试我们的模型并收集评估数据。没有红旗。没有警告。
- en: But beneath that polished surface, something was quietly going wrong.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 但在这光鲜亮丽的表面之下，某些东西正在悄然出错。
- en: We weren’t seeing failures. We weren’t getting exceptions. We weren’t even noticing
    slowness. But our system was doing a lot more work than it needed to, and we didn’t
    realize it.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 我们没有看到失败。我们没有收到异常。我们甚至没有注意到缓慢。但我们的系统做了比它需要的更多的工作，而我们没有意识到这一点。
- en: In this post, we’ll walk through how we discovered the issue, what caused it,
    and how a **simple structural change in our async code reduced LLM traffic and
    cost by 90%,** with virtually no loss in speed or functionality.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们将介绍我们是如何发现这个问题，是什么原因导致的，以及我们如何通过在异步代码中进行**简单的结构改变**，将LLM流量和成本降低了90%，几乎没有任何速度或功能上的损失。
- en: 'Now, fair warning, **reading this post won’t magically slash your LLM costs
    by 90%**. But the takeaway here is broader: **small, overlooked design decisions,
    sometimes just a few lines of code, can lead to massive inefficiencies.** And
    being intentional about how your code runs can save you time, money, and frustration
    in the long run.'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，公平警告，**阅读这篇文章并不能神奇地将你的LLM成本降低90%**。但这里得到的启示更广泛：**小的、被忽视的设计决策，有时只是几行代码，可能导致巨大的低效。**并且有意识地关注代码的运行方式，从长远来看可以为你节省时间、金钱和挫败感。
- en: The fix itself might feel niche at first. It involves the subtleties of Python’s
    asynchronous behavior, how tasks are scheduled and dispatched. If you’re familiar
    with Python and `async`/`await`, you’ll get more out of the code examples, but
    even if you’re not, there’s still plenty to take away. Because the real story
    here isn’t just about LLMs or Python, it’s about **responsible, efficient engineering**.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 修复本身可能一开始感觉有些狭隘。它涉及到Python异步行为的微妙之处，任务是如何被安排和分发的。如果你熟悉Python和`async`/`await`，你将能从代码示例中获得更多收获，但即使你不熟悉，也有许多东西可以吸取。因为这里真正的故事不仅仅是关于LLM或Python，它是关于**负责任、高效的工程**。
- en: Let’s dig in.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们深入探讨。
- en: The Setup
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 设置
- en: To automate validation, we use a predefined dataset and trigger our system through
    a client script. The validation focuses on a **small subset** of the dataset,
    so the client code only stops after receiving a certain number of responses.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 为了自动化验证，我们使用一个预定义的数据集，并通过客户端脚本来触发我们的系统。验证主要集中在数据集的**一小部分**上，因此客户端代码只有在接收到一定数量的响应后才会停止。
- en: 'Here’s a simplified version of our client in Python:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 这是我们的客户端在Python中的简化版本：
- en: '[PRE0]'
  id: totrans-13
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: This script reads requests from a dataset, fires them concurrently, and stops
    once we collect enough `true` responses for our evaluation. In production, the
    logic is more complex and based on the diversity of responses we need. But the
    structure is the same.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 这个脚本从数据集中读取请求，并发地执行它们，一旦我们收集到足够的`true`响应来进行评估，就会停止。在生产中，逻辑更复杂，基于我们需要的响应多样性。但结构是相同的。
- en: 'Let’s use a dummy FastAPI server to simulate real behavior:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们使用一个模拟真实行为的虚拟FastAPI服务器：
- en: '[PRE1]'
  id: totrans-16
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: 'Now let’s fire up that dummy server and run the client. You’ll see something
    like this from the client terminal:'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们启动这个虚拟服务器并运行客户端。你将在客户端终端看到类似以下内容：
- en: '![](../Images/cbc447468800550dedd3e4c28dcaedc0.png)'
  id: totrans-18
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/cbc447468800550dedd3e4c28dcaedc0.png)'
- en: The progress bar stopped after receiving 10 responses
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 进度条在收到10个响应后停止
- en: Can You Spot the Problem?
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 你能找出问题吗？
- en: '![](../Images/c707900ee9507a9ccea492894a033ce2.png)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/c707900ee9507a9ccea492894a033ce2.png)'
- en: Photo by [Keiteu Ko](https://unsplash.com/@keiteu_ko?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由[Keiteu Ko](https://unsplash.com/@keiteu_ko?utm_source=medium&utm_medium=referral)在[Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)提供
- en: Nice! Fast, clean, and… wait is everything working as expected?
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 很好！快速、干净，等等，等等，一切是否按预期工作？
- en: 'On the surface, it *seems* like the client is doing the right thing: sending
    requests, getting 10 `true` responses, then stopping.'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 表面上看，客户似乎正在做正确的事情：发送请求，得到10个`true`响应，然后停止。
- en: But is it?
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 但这是否正确呢？
- en: 'Let’s add a few print statements to our server to see what it’s actually doing
    under the hood:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们在服务器中添加一些打印语句，看看它实际上在底层做了什么：
- en: '[PRE2]'
  id: totrans-27
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Now re-run everything.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 现在重新运行一切。
- en: 'You’ll start seeing logs like this:'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 你会看到这样的日志：
- en: '[PRE3]'
  id: totrans-30
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: 'Take a closer look at the server logs. You’ll notice something unexpected:
    **instead of processing just 14 requests like we see in the progress bar, the
    server handles all 100**. Even though the client stops after receiving 10 `true`
    responses, it still sends every request up front. As a result, the server must
    process all of them.'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 仔细查看服务器日志。你会注意到一些意想不到的事情：**服务器处理的请求数量不是我们进度条上看到的14个，而是所有100个**。即使客户端在收到10个`true`响应后停止，它仍然会提前发送每个请求。因此，服务器必须处理所有这些请求。
- en: '**It’s an easy mistake to miss**, especially because everything appears to
    be working correctly from the client’s perspective: responses come in quickly,
    the progress bar advances, and the script exits early. But behind the scenes,
    all 100 requests are sent immediately, regardless of when we decide to stop listening.
    This results in **10× more traffic** than needed, driving up costs, increasing
    load, and risking rate limits.'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: '**这是一个容易忽视的错误**，尤其是因为从客户端的角度看，一切似乎都在正常工作：响应迅速到来，进度条前进，脚本提前退出。但在幕后，所有100个请求立即发送，无论我们决定何时停止监听。这导致**比所需的流量多10倍**，增加了成本，增加了负载，并冒着超出速率限制的风险。'
- en: 'So the key question becomes: why is this happening, and how can we make sure
    we only send the requests we actually need? The answer turned out to be a small
    but powerful change.'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，关键问题变成了：为什么会出现这种情况，我们如何确保只发送我们实际需要的请求？答案最终证明是一个小但强大的变化。
- en: '**The root of the issue lies in how the tasks are scheduled**. In our original
    code, we create a list of 100 tasks all at once:'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: '**问题的根源在于任务的调度方式**。在我们的原始代码中，我们一次性创建了一个包含100个任务的列表：'
- en: '[PRE4]'
  id: totrans-35
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: When you pass a list of coroutines to `as_completed`, Python immediately wraps
    each coroutine in a `Task` and schedules it on the event loop. This happens before
    you start iterating over the loop body. Once a coroutine becomes a `Task`, the
    event loop starts running it in the background right away.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 当你将协程列表传递给`as_completed`时，Python会立即将每个协程包装在一个`Task`中，并在事件循环中对其进行调度。这发生在你开始迭代循环体之前。一旦协程成为`Task`，事件循环就会立即在后台运行它。
- en: '`as_completed` itself doesn’t control concurrency, it simply **waits for tasks
    to finish and yields them one by one in the order they complete**. Think of it
    as an iterator over completed futures, not a traffic controller. This means that
    by the time you start looping, **all 100 requests are already in progress**. Breaking
    out after 10 `true` results stops you from processing the rest, but it doesn’t
    stop them from being sent.'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: '`as_completed`本身并不控制并发，它只是**等待任务完成并按完成顺序逐个产生它们**。把它想象成完成未来的迭代器，而不是交通控制器。这意味着在你开始循环之前，**所有100个请求已经全部开始**。在得到10个`true`结果后退出，阻止你处理剩余的请求，但它不会阻止它们被发送。'
- en: To fix this, we introduced **a** [**semaphore**](https://docs.python.org/3/library/asyncio-sync.html#asyncio.Semaphore)
    **to limit concurrency**. The semaphore adds a lightweight lock inside `fetch`
    so that only a fixed number of requests can start at the same time. The rest remain
    paused, waiting for a slot. Once we hit our stopping condition, the paused tasks
    never acquire the lock, so they never send their requests.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 为了解决这个问题，我们引入了**一个** [**信号量**](https://docs.python.org/3/library/asyncio-sync.html#asyncio.Semaphore)
    **来限制并发**。信号量在`fetch`函数内部添加了一个轻量级锁，这样只有固定数量的请求可以同时开始。其余的请求保持暂停状态，等待一个空位。一旦我们达到停止条件，暂停的任务永远不会获取锁，因此它们永远不会发送请求。
- en: 'Here’s the adjusted version:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是调整后的版本：
- en: '[PRE5]'
  id: totrans-40
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: With this change, we still define 100 requests upfront, but **only a small group
    is allowed to run at the same time**, 15 in that example. If we reach our stopping
    condition early, the event loop stops before launching more requests. This keeps
    the behavior responsive while reducing unnecessary calls.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 通过这个变化，我们仍然预先定义了100个请求，但**只有一小部分可以同时运行**，例如示例中的15个。如果我们提前达到停止条件，事件循环会在启动更多请求之前停止。这保持了行为的响应性，同时减少了不必要的调用。
- en: Now, the server logs will display only around 20 `"Got a request/Returning response"`
    entries. On the client side, the progress bar will appear identical to the original.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 现在，服务器日志将只显示大约20条 `"收到请求/返回响应"` 条目。在客户端，进度条将看起来与原始版本相同。
- en: '![](../Images/0f50cca6da59ff72ded05c9ee4e4e5af.png)'
  id: totrans-43
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/0f50cca6da59ff72ded05c9ee4e4e5af.png)'
- en: The progress bar stopped after receiving 10 responses
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 进度条在收到10个响应后停止
- en: 'With this change in place, we saw immediate impact: **90% reduction in request
    volume and LLM cost**, with no noticeable degradation in client experience. It
    also improved throughput across the team, reduced queuing, and eliminated rate-limit
    issues from our LLM providers.'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 实施这一变化后，我们看到了立即的影响：**请求量减少了90%，LLM成本没有明显下降**，客户端体验没有明显下降。它还提高了团队的整体吞吐量，减少了排队时间，并消除了来自我们的LLM提供商的速率限制问题。
- en: This small structural adjustment made our validation pipeline dramatically more
    efficient, without adding much complexity to the code. It’s a good reminder that
    in async systems, control flow doesn’t always behave the way you assume unless
    you’re explicit about how tasks are scheduled and when they should run.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 这一小次结构调整使我们的验证流程显著提高了效率，而不会给代码增加太多复杂性。这是一个很好的提醒，在异步系统中，除非你明确任务如何调度以及何时运行，否则控制流并不总是按照你想象的方式行事。
- en: 'Bonus Insight: Closing the Event Loop'
  id: totrans-47
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 奖励洞察：关闭事件循环
- en: If we had run the original client code without `asyncio.run`, we might have
    noticed the problem earlier.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 如果我们没有使用 `asyncio.run()` 运行原始客户端代码，我们可能早就注意到了这个问题。
- en: 'For example, if we had used manual event loop management like this:'
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果我们像这样使用手动事件循环管理：
- en: '[PRE6]'
  id: totrans-50
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'Python would have printed warnings such as:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: Python会打印出如下警告：
- en: '![](../Images/dbd33fdab24a696f30cd9897f8996225.png)'
  id: totrans-52
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/dbd33fdab24a696f30cd9897f8996225.png)'
- en: Task was destroyed but it is pending!
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 任务已销毁但仍有挂起！
- en: These warnings appear when the program exits while there are still unfinished
    async tasks scheduled in the loop. If we had seen a screen full of those warnings,
    it likely would’ve triggered a red flag much sooner.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 当程序退出时，循环中仍有未完成的异步任务调度，这些警告就会出现。如果我们看到满屏的这些警告，可能会更早地触发红旗。
- en: So why didn’t we see that warning when using `asyncio.run()`?
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 那么为什么在使用 `asyncio.run()` 时我们没有看到那个警告呢？
- en: Because `asyncio.run()` takes care of cleanup behind the scenes. It doesn’t
    just run your coroutine and exit, it also cancels any remaining tasks, waits for
    them to finish, and only then shuts down the event loop. This built-in safety
    net prevents those “pending task” warnings from showing up, even if your code
    quietly launched more tasks than it needed to.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 因为 `asyncio.run()` 在幕后处理清理工作。它不仅运行你的协程并退出，还取消任何剩余的任务，等待它们完成，然后才关闭事件循环。这个内置的安全网防止了“挂起任务”警告的出现，即使你的代码默默地启动了比所需更多的任务。
- en: As a result, it **suppresses those “pending task” warnings** when you manually
    close the loop with `loop.close()` after `run_until_complete()`, any leftover
    tasks that haven’t been awaited will still be hanging around. Python detects that
    you’re forcefully shutting down the loop while work is still scheduled, and warns
    you about it.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，当你使用 `loop.close()` 手动关闭循环后，在 `run_until_complete()` 之后，任何未完成的任务仍然会挂起。Python会检测到你正在强制关闭循环，而工作仍在计划中，并会警告你。
- en: 'This isn’t to say that every async Python program should avoid `asyncio.run()`
    or always use `loop.run_until_complete()` with a manual `loop.close()`. But it
    does highlight something important: you should be aware of what tasks are still
    running when your program exits. **At the very least, it’s a good idea to monitor
    or log any pending tasks before shutdown.**'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 这并不是说每个异步Python程序都应该避免使用 `asyncio.run()` 或总是使用 `loop.run_until_complete()` 并手动
    `loop.close()`。但它确实强调了很重要的一点：你应该意识到程序退出时还有哪些任务正在运行。**至少，在关闭之前监控或记录任何挂起的任务是个好主意。**
- en: Final Thoughts
  id: totrans-59
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最后的想法
- en: By stepping back and rethinking the control flow, we were able to make our validation
    process dramatically more efficient — **not by adding more infrastructure, but
    by using what we already had more carefully.** A few lines of code change led
    to a **90% cost reduction** with almost no added complexity. It resolved rate-limit
    errors, reduced system load, and allowed the team to run evaluations more frequently
    without causing bottlenecks.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 通过退后一步重新思考控制流程，我们能够使我们的验证过程显著提高效率——**不是通过增加更多基础设施，而是通过更谨慎地使用我们已有的资源**。几行代码的更改导致了**90%的成本降低**，几乎没有增加复杂性。它解决了速率限制错误，减少了系统负载，并允许团队更频繁地运行评估而不会造成瓶颈。
- en: 'It is an important reminder that **“clean” async code doesn’t always mean efficient
    code, being intentional about how we use system resources is crucial.** Responsible,
    efficient engineering is about more than just writing code that works. It’s about
    designing systems that respect time, money, and shared resources, especially in
    collaborative environments. When you treat compute as a shared asset instead of
    an infinite pool, everyone benefits: systems scale better, teams move faster,
    and costs stay predictable.'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个重要的提醒，**“干净的”异步代码并不总是意味着高效的代码，有意识地使用系统资源至关重要**。负责任且高效的工程不仅仅是编写出工作的代码。它关乎设计尊重时间、金钱和共享资源的系统，尤其是在协作环境中。当你将计算视为共享资产而不是无限池时，每个人都能受益：系统扩展得更好，团队行动更快，成本保持可预测。
- en: 'So, whether you’re making LLM calls, launching Kubernetes jobs, or processing
    data in batches, pause and ask yourself: am I only using what I *really need*?'
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，无论你是在进行LLM调用、启动Kubernetes作业，还是在批量处理数据，请暂停一下并问问自己：我是否只使用了**我真正需要的**？
- en: Often, the answer and the improvement are just one line of code away.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 通常，答案和改进只需一行代码即可实现。
