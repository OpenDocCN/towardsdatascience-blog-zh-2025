- en: Neural Networks Are Blurry, Symbolic Systems Are Fragmented. Sparse Autoencoders
    Help Us Combine Them.
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 神经网络模糊不清，符号系统支离破碎。稀疏自编码器帮助我们结合它们。
- en: 原文：[https://towardsdatascience.com/neuro-symbolic-systems-the-art-of-compromise-2/](https://towardsdatascience.com/neuro-symbolic-systems-the-art-of-compromise-2/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://towardsdatascience.com/neuro-symbolic-systems-the-art-of-compromise-2/](https://towardsdatascience.com/neuro-symbolic-systems-the-art-of-compromise-2/)'
- en: 'Long before we built computers and Artificial Intelligence, we had established
    institutions designed to reason systematically about human behavior — the court.
    The legal system is one of humanity’s oldest reasoning engines, where facts and
    evidence are taken as input, relevant *laws* are used as reasoning rules and verdicts
    are the system’s output. The laws, however, have been consistently evolving from
    the very beginning of human civilization. The earliest **Codified Law** – the
    *Code of Hammurabi* (circa 1750 BCE) – represents one of the first large-scale
    attempts to formalize moral and social reasoning into explicit symbolic rules.
    Its beauty lies in clarity and uniformity — yet it is also rigid, incapable of
    adaptation to context. Centuries later, **Common Law** traditions like those shaped
    by the *Case of Donoghue v Stevenson (1932)*, introduced the opposite philosophy:
    reasoning based on precedential experience and cases. Today’s legal systems, as
    we know, are usually a combination of both, while the proportions vary across
    different countries.'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们建造计算机和人工智能之前，我们已经建立了旨在系统地推理人类行为的机构——法院。法律体系是人类最古老的推理引擎之一，其中事实和证据被视为输入，相关的*法律*被用作推理规则，而判决则是系统的输出。然而，法律从人类文明开始就已经一直在不断演变。最早的**法典**——《汉谟拉比法典》（约公元前1750年）——代表了将道德和社会推理正式化为明确符号规则的第一大规模尝试。它的美在于清晰和统一——然而它也是僵化的，无法适应语境。几个世纪之后，像由*唐纳休诉史蒂文森案（1932年）*塑造的**普通法**传统，引入了相反的哲学：基于先例经验和案例的推理。正如我们所知，今天的法律体系通常是两者的结合，而比例在不同国家之间有所不同。
- en: In contrast to the cohesive combination in legal systems, a similar paradigm
    pair in AI — **Symbolism** and **Connectionism** — seem to be significantly harder
    to unite. The latter has dominated the surge of AI development in recent years,
    where everything is implicitly learned with enormous amounts of data and computing
    resources and encoded across parameters in neural networks. And this direction,
    indeed, has been proven very effective in terms of benchmark performance. So,
    do we really need a symbolic component in our AI systems?
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 与法律体系中的一致性组合相比，在人工智能领域，类似的范式对——**符号主义**和**连接主义**——似乎要困难得多，难以统一。后者在近年来人工智能发展的激增中占据了主导地位，其中所有内容都是通过大量数据和计算资源隐式学习，并在神经网络参数中进行编码。确实，这一方向在基准性能方面已被证明非常有效。那么，我们真的需要在我们的AI系统中包含符号组件吗？
- en: 'Symbolic Systems v.s. Neural Networks: A Perspective of Information Compression'
  id: totrans-4
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 符号系统与神经网络：信息压缩的视角
- en: To answer the question above, we need to take a closer look at both systems.
    From a computational standpoint, both symbolic systems and neural networks can
    be seen as machines of compression — they reduce the vast complexity of the world
    into compact representations that enable reasoning, prediction, and control. Yet
    they do so through fundamentally different mechanisms, guided by opposite philosophies
    of what it means to “understand”.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 要回答上述问题，我们需要更仔细地观察这两个系统。从计算的角度来看，符号系统和神经网络都可以被视为压缩机器——它们将世界的巨大复杂性简化为紧凑的表示，从而实现推理、预测和控制。然而，它们通过根本不同的机制实现，受制于相反的“理解”哲学。
- en: In essence, both paradigms can be imagined as filters applied to raw reality.
    Given input \(X\), each learns or defines a transformation \(H(\cdot)\) that yields
    a compressed representation \(Y = H(X)\), preserving information that it considers
    meaningful and discarding the rest. But the shape of this filtering is different.
    Generally speaking, symbolic systems behave like **high-pass filters** — they
    extract the sharp, rule-defining contours of the world while ignoring its smooth
    gradients. Neural networks, by contrast, resemble **low-pass filters**, smoothing
    local fluctuations to capture global structure. The difference is not in what
    they see, but in what they choose to forget.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 本质上，这两种范例都可以想象成应用于原始现实的过滤器。给定输入 \(X\)，每个都学习或定义一个变换 \(H(\cdot)\)，它产生一个压缩表示 \(Y
    = H(X)\)，保留它认为有意义的部分，丢弃其余部分。但这个过滤器的形状是不同的。一般来说，符号系统表现得像**高通滤波器**——它们提取世界的锐利、规则定义的轮廓，而忽略其平滑的梯度。相比之下，神经网络更像是**低通滤波器**，平滑局部波动以捕捉全局结构。区别不在于它们看到了什么，而在于它们选择忘记什么。
- en: 'Symbolic systems compress by **discretization**. They carve the continuous
    fabric of experience into distinct categories, relations, and rules: a legal code,
    a grammar or an ontology. Each symbol acts as a *crisp boundary*, a handle for
    manipulation within a pre-defined schema. The process resembles projecting a noisy
    signal onto a set of human-designed basis vectors — a space spanned by concepts
    such as Entity and Relation. A knowledge graph, for instance, might read the sentence
    “UIUC is an extraordinary university and I love it”, and retain only *(UIUC, is_a,
    Institution)*, discarding everything that falls outside its schema. The result
    is clarity and composability, but also rigidity: meaning outside the ontological
    frame simply evaporates.'
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 符号系统通过**离散化**来压缩。它们将经验的连续织物切割成不同的类别、关系和规则：一部法律代码、一种语法或一个本体。每个符号都充当一个*清晰的边界*，在预定义的方案中操作的把手。这个过程类似于将一个有噪声的信号投影到一组人类设计的基础向量上——一个由实体和关系等概念构成的空间。例如，一个知识图谱可能会读取句子“UIUC是一所非凡的大学，我非常喜欢它”，并且只保留
    *(UIUC, is_a, Institution)*，丢弃其方案之外的所有内容。结果是清晰和可组合性，但也带来了刚性：本体框架之外的意义简单地消失了。
- en: 'Neural networks, in contrast, compress by **smoothing**. They forgo discrete
    categories in favor of smooth manifolds where nearby inputs yield similar activations
    (usually bounded by some Lipschitz constant in modern LLMs). Rather than mapping
    data to predefined coordinates, they learn a latent geometry that encodes correlations
    implicitly. The world, in this view, is not a set of rules but a field of gradients.
    This makes neural representations remarkably adaptive: they can interpolate, analogize,
    and generalize across unseen examples. But the same smoothness that grants flexibility
    also breeds opacity. Information is entangled, semantics become distributed, and
    interpretability is lost in the very act of generalization.'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 与之相反，神经网络通过**平滑**来压缩。它们放弃离散类别，转而选择平滑流形，其中附近的输入产生相似的激活（在现代大型语言模型中通常由某个Lipschitz常数界定）。它们不是将数据映射到预定义的坐标，而是学习一个潜在的几何结构，该结构隐式地编码相关性。在这个观点中，世界不是一个规则集，而是一个梯度场。这使得神经表示非常适应性强：它们可以在未见过的例子之间进行插值、类比和泛化。但正是这种灵活性带来的平滑性也产生了不透明性。信息变得纠缠，语义变得分散，在泛化的过程中，可解释性也随之丧失。
- en: '| **Property** | **Symbolic Systems** | **Neural Networks** |'
  id: totrans-9
  prefs: []
  type: TYPE_TB
  zh: '| **属性** | **符号系统** | **神经网络** |'
- en: '| --- | --- | --- |'
  id: totrans-10
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| **Survived Information** | Discrete, schema-defined facts | Frequent, continuous
    statistical patterns |'
  id: totrans-11
  prefs: []
  type: TYPE_TB
  zh: '| **存活信息** | 离散、模式定义的事实 | 频繁、连续的统计模式 |'
- en: '| **Source of Abstraction** | Human-defined ontology | Data-driven manifold
    |'
  id: totrans-12
  prefs: []
  type: TYPE_TB
  zh: '| **抽象来源** | 人类定义的本体 | 数据驱动流形 |'
- en: '| **Robustness** | Brittle at rule edges | Locally robust but globally fuzzy
    |'
  id: totrans-13
  prefs: []
  type: TYPE_TB
  zh: '| **鲁棒性** | 在规则边缘脆弱 | 局部鲁棒但全局模糊 |'
- en: '| **Error Mode** | Missed facts *(coverage gaps)* | Smoothed facts *(hallucinations)*
    |'
  id: totrans-14
  prefs: []
  type: TYPE_TB
  zh: '| **错误模式** | 缺失事实 *(覆盖缺口)* | 平滑事实 *(幻觉)* |'
- en: '| **Interpretability** | High | Low |'
  id: totrans-15
  prefs: []
  type: TYPE_TB
  zh: '| **可解释性** | 高 | 低 |'
- en: 'In conclusion, we can summarize the difference between the two systems from
    the information compression perspective in one sentence: “***Neural Networks are
    blurry images of the world, while symbolic systems are high-resolution pictures
    with missing patches.***” This actually indicates the reason why neuro-symbolic
    systems are an art of compromise: they can harness knowledge from both paradigms
    by using them collaboratively at different scales, with neural networks providing
    a global, low-resolution backbone and symbolic components supplying high-resolution
    local details.'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 总之，我们可以从信息压缩的角度用一句话总结两种系统之间的差异：“**神经网络是世界模糊的图像，而符号系统是带有缺失补丁的高分辨率图片。**”这实际上表明了神经符号系统是一种折衷的艺术：它们可以通过在不同尺度上协作使用两种范式来利用两种范式中的知识，神经网络提供全局的低分辨率骨干，而符号组件提供高分辨率局部细节。
- en: The Challenge of Scalability
  id: totrans-17
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 规模化挑战
- en: Though it is very tempting to add symbolic components into neural networks to
    harness benefits from both, scalability is a big problem getting in the way of
    our attempts, especially in the era of Foundation Models. Traditional neuro-symbolic
    systems rely on a set of expert-defined ontology / schema / symbols, which is
    assumed to be able to cover all possible input cases. This is acceptable for domain-specific
    systems (for example, a pizza order chatbot); however, you cannot apply similar
    approaches to open-domain systems, where you will need experts to construct trillions
    of symbols and their relations.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: '虽然将符号组件添加到神经网络中以利用两种方法的好处非常诱人，但可扩展性是我们尝试中的一个重大问题，尤其是在基础模型时代。传统的神经符号系统依赖于一组专家定义的本体/模式/符号，这被认为可以涵盖所有可能的输入情况。这对于特定领域的系统是可以接受的（例如，披萨订购聊天机器人）；然而，你不能将类似的方法应用于开放域系统，在那里你需要专家构建数万亿个符号及其关系。 '
- en: 'A natural reaction is to go fully data-driven: instead of asking humans to
    handcraft an ontology, we let the model induce its own “symbols” from internal
    activations. **Sparse autoencoders (SAEs)** are a prominent incarnation of this
    idea. By factorizing hidden states into a large set of sparse features, they appear
    to give us a **dictionary of neural concepts**: each feature fires on a particular
    pattern, is (often) human-interpretable, and behaves like a discrete unit that
    can be turned on or off. At first glance, this looks like a perfect escape from
    the expert bottleneck: we no longer design the symbol set; we learn it.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 一个自然的反应是完全数据驱动：我们不再要求人类手工制作本体，而是让模型从内部激活中诱导出它自己的“符号”。**稀疏自编码器（SAEs）**是这个想法的一个显著体现。通过将隐藏状态分解成大量稀疏特征，它们似乎为我们提供了一个**神经概念字典**：每个特征在特定模式上触发，通常是可解释的，并且表现得像一个可以开启或关闭的离散单元。乍一看，这似乎是一个完美的解决方案，可以摆脱专家瓶颈：我们不再设计符号集；我们学习它。
- en: '![](../Images/acd4bed1437bb4f39b4aa54d6a635f01.png)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/acd4bed1437bb4f39b4aa54d6a635f01.png)'
- en: Here \(D\) is called the *dictionary matrix* where each column stores a semantically
    meaningful concept; the first term is the *reconstruction loss* of the hidden
    state \(h\), while the second is a *sparsity penalty* encouraging minimal activated
    neurons in the code.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里，\(D\) 被称为**字典矩阵**，其中每一列存储一个具有语义意义的概念；第一个项是隐藏状态 \(h\) 的**重建损失**，而第二个项是一个**稀疏惩罚**，鼓励代码中激活的最小神经元。
- en: '![](../Images/f1de786c31fbd788ac7ecc99fe75e984.png)'
  id: totrans-22
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f1de786c31fbd788ac7ecc99fe75e984.png)'
- en: 'However, an SAE-only approach runs into two fundamental issues. The first is
    computational: using SAEs as a live symbolic layer would require multiplying every
    hidden state by an enormous dictionary matrix, paying a dense computation cost
    even if the resulting code is sparse. This makes them impossible for deployment
    at Foundation Model scales. The second is conceptual: SAE features are symbol-like
    representations, but they are not a symbolic system — they lack an explicit formal
    language, compositional operators, and executable rules. **They tell us what concepts
    exist in the model’s latent space, but not how to reason with them.**'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，仅采用SAE（自编码器）的方法会遇到两个基本问题。第一个是计算上的：将SAE作为实时符号层，需要将每个隐藏状态乘以一个巨大的字典矩阵，即使最终代码是稀疏的，这也将带来密集的计算成本。这使得它们在基础模型规模下无法部署。第二个是概念上的：SAE特征是符号类表示，但它们不是一个符号系统——它们缺乏显式的形式语言、组合运算符和可执行规则。**它们告诉我们模型潜在空间中存在哪些概念，但并没有告诉我们如何对这些概念进行推理。**
- en: 'This does not mean we should abandon SAEs altogether — they provide ingredients,
    not a finished meal. Rather than asking SAEs to be the symbolic system, we can
    treat them as a bridge between the model’s internal concept space and the many
    symbolic artefacts we already have: knowledge graphs, ontologies, rule bases,
    taxonomies, where reasoning can happen by definition. And a high-quality SAE trained
    on a large model’s hidden states then becomes a shared “concept coordinate system”:
    different symbolic systems can then be aligned within this coordinate system by
    associating their symbols with the SAE features that are consistently activated
    when those symbols are invoked in context.'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 这并不意味着我们应该完全放弃SAE——它们提供的是配料，而不是成品。我们不必要求SAE成为符号系统，我们可以将它们视为模型内部概念空间和许多我们已有的符号工件（如知识图谱、本体、规则库、分类法）之间的桥梁：推理可以通过定义发生。然后，在大型模型的隐藏状态上训练的高质量SAE成为共享的“概念坐标系”：不同的符号系统可以在这个坐标系内通过将它们的符号与SAE特征关联起来进行对齐，这些特征在符号在上下文中被调用时始终被激活。
- en: 'Doing this has several advantages over simply placing symbolic systems side
    by side and querying them independently. First, it enables **symbol merging and
    aliasing across systems**: if two symbols from different formalisms repeatedly
    light up almost the same set of SAE features, we have strong evidence that they
    correspond to the same underlying neural concept, and can be linked or even unified.
    Second, it supports **cross-system relation discovery**: symbols that are far
    apart in our hand-designed schemas but consistently close in SAE space point to
    bridges we failed to encode — new relations, abstractions, or mappings between
    domains. Third, SAE activations give us a model-centric notion of salience: symbols
    that never find a clear counterpart in the neural concept space are candidates
    for pruning or refactoring, while strong SAE features with no matching symbol
    in any system highlight blind spots shared by all of our current abstractions.'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 这样做与简单地将符号系统并排放置并独立查询相比，具有几个优势。首先，它实现了**跨系统符号合并和别名**：如果来自不同公理的两个符号反复激活几乎相同的SAE特征集，我们就有了强有力的证据表明它们对应于相同的潜在神经概念，并且可以相互链接或甚至统一。其次，它支持**跨系统关系发现**：在我们手工设计的模式中相隔甚远的符号，但在SAE空间中始终靠近，指向我们未能编码的桥梁——新关系、抽象或领域之间的映射。第三，SAE激活为我们提供了一个以模型为中心的显著性概念：那些在神经概念空间中找不到明确对应物的符号是剪枝或重构的候选者，而没有任何系统中匹配符号的强大SAE特征则突显了我们所有当前抽象共有的盲点。
- en: Crucially, this use of SAEs remains scalable. The expensive SAE is trained offline,
    and the symbolic systems themselves do not need to grow to “Foundation Model size”
    — they can remain as small or as large as their respective tasks require. At inference
    time, the neural network continues to do the heavy lifting in its continuous latent
    space; the symbolic artefacts only shape, constrain, or audit behaviour at the
    points where explicit structure and accountability are most valuable. SAEs help
    by tying all these heterogeneous symbolic views back to a single learned conceptual
    map of the model, making it possible to compare, merge, and improve them without
    ever constructing a monolithic, expert-designed symbolic twin.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 关键的是，这种SAE的使用仍然是可扩展的。昂贵的SAE是在离线状态下训练的，而符号系统本身不需要增长到“基础模型大小”——它们可以保持与各自任务需求一样小或大。在推理时间，神经网络继续在其连续潜在空间中承担繁重的工作；符号工件只在显式结构和问责制最有价值的点上塑造、约束或审计行为。SAE通过将这些异构的符号视图全部关联到模型学习到的单一概念图，使得比较、合并和改进它们成为可能，而无需构建一个统一的、专家设计的符号孪生体。
- en: When Can an SAE Serve as a Symbolic Bridge?
  id: totrans-27
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 当SAE可以作为符号桥梁时？
- en: 'The picture above quietly assumes that our SAE is “good enough” to serve as
    a meaningful coordinate system. What does that actually require? We do not need
    perfection, nor do we need the SAE to outperform human symbolic systems on every
    axis. Instead, we need a few more modest but crucial properties:'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: 上面的图片默默地假设我们的SAE“足够好”，可以作为有意义的坐标系。这实际上需要什么？我们不需要完美，也不需要SAE在每一个轴上超越人类的符号系统。相反，我们需要一些更多、但至关重要的属性：
- en: '– **Semantic Continuity**: Inputs that express the same underlying concept
    should induce similar *support patterns* in the sparse code: the same subset of
    SAE features should tend to be non-zero, rather than flickering on and off under
    small paraphrases or context shifts. In other words, semantic equivalence should
    be reflected in a stable pattern of active concepts.'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: – **语义连续性**：表达相同底层概念的输入应该在稀疏代码中诱导出相似的支持模式：相同的SAE特征子集应该倾向于非零，而不是在小的改写或上下文转换下闪烁。换句话说，语义等价性应该在活跃概念的稳定模式中得到反映。
- en: '– **Partial Interpretability**: We do not have to understand every feature,
    but a nontrivial fraction of them should admit robust human descriptions, so that
    merging and debugging are possible at the concept level.'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: – **部分可解释性**：我们不必理解每个特征，但其中相当一部分应该允许稳健的人类描述，以便在概念级别进行合并和调试。
- en: '– **Behavioral Relevance**: The features that the SAE discovers must actually
    matter for the model’s outputs: intervening on them, or conditioning on their
    presence, should change or predict the model’s decisions in systematic ways.'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: – **行为相关性**：SAE发现的特征必须对模型的输出真正重要：干预它们或根据它们的存在进行条件化，应该以系统的方式改变或预测模型的决策。
- en: '– **Capacity and Grounding**: An SAE can only refactor whatever structure already
    exists in the base model; it cannot conjure rich concepts out of a weak backbone.
    For the “concept coordinate system” picture to make sense, the base model itself
    has to be large and well-trained enough that its hidden states already encode
    a diverse, non-trivial set of abstractions. Meanwhile, the SAE must have sufficient
    dimensionality and overcompleteness: if the code space is too small, many distinct
    concepts will be forced to share the same features, leading to entangled and unstable
    representations.'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: – **容量和基础**：SAE只能重构基础模型中已经存在的结构；它不能从薄弱的骨架中创造丰富的概念。为了使“概念坐标系”图有意义，基础模型本身必须足够大且训练良好，以至于其隐藏状态已经编码了一个多样化的、非平凡的抽象集合。同时，SAE必须具有足够的维度和过度完备性：如果代码空间太小，许多不同的概念将被迫共享相同的特征，导致纠缠和不稳定的表示。
- en: Now we discuss the first three properties in detail.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们详细讨论前三个属性。
- en: Semantic Continuity
  id: totrans-34
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 语义连续性
- en: 'At the level of pure function approximation, a deep neural network with ReLU-
    or GELU-type activations implements a Lipschitz-continuous map: small perturbations
    in the input cannot cause arbitrarily unbounded jumps in the output logits. But
    this kind of continuity is very different from what we need in a sparse autoencoder.'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 在纯函数逼近级别，具有ReLU或GELU类型激活的深度神经网络实现了一个Lipschitz连续映射：输入的小扰动不会导致输出logits的任意无界跳跃。但这种连续性与我们在稀疏自编码器中需要的连续性非常不同。
- en: 'For the base model, a few neurons flipping on or off can easily be absorbed
    by downstream layers and redundancy; as long as the final logits change smoothly,
    we are satisfied. In an SAE, by contrast, we are no longer just looking at a smooth
    output — **we are treating the support pattern of the sparse code reconstructed
    over the residual stream as a proto-symbolic object**. A “concept” is identified
    with a particular code subset being active. That makes the geometry much more
    brittle: if a small change in the underlying representation pushes a pre-activation
    across the ReLU threshold in the SAE layer, a neuron in the code will suddenly
    flip from off to on (or vice versa), and from the symbolic point of view the concept
    has appeared or disappeared. There is no downstream network to average this out;
    the code itself is the representation we care about.'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 对于基础模型，少数神经元开启或关闭很容易被下游层和冗余吸收；只要最终的logits变化平滑，我们就满意了。相比之下，在SAE中，我们不再只是看一个平滑的输出——**我们将残差流上重建的稀疏代码的支持模式视为一个原符号对象**。一个“概念”与一个特定的激活代码子集相关联。这使得几何结构变得更加脆弱：如果底层表示的微小变化将预激活推过SAE层的ReLU阈值，代码中的一个神经元会突然从关闭变为开启（或反之），从符号的角度来看，概念已经出现或消失。没有下游网络来平均这一点；代码本身是我们关心的表示。
- en: 'Sparsity penalty in constructing the SAE even exacerbates this. The usual SAE
    objective combines a reconstruction loss with an \(\ell_1\) penalty on the activations,
    which explicitly encourages most neuron values to be as close to zero as possible.
    As a result, even many useful neurons end up sitting near the activation boundary:
    just above zero when they are needed, just below zero when they are not — this
    is known as “activation shrinkage” in SAEs. This is bad for semantic continuity
    at the support pattern level: tiny perturbations in the input can change non-zero
    neurons, even if the underlying meaning has barely changed. Therefore, Lipschitz
    continuity of the base model does not automatically give us a stable non-zero
    subset of code in the SAE space, and support-level stability has to be treated
    as a separate design target and evaluated explicitly.'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 在构建SAE时，稀疏惩罚甚至加剧了这种情况。通常的SAE目标函数结合了一个重建损失和一个对激活的\(\ell_1\)惩罚，这明确鼓励大多数神经元值尽可能接近零。因此，即使许多有用的神经元最终也位于激活边界附近：当它们被需要时略高于零，当它们不被需要时略低于零——这被称为SAE中的“激活收缩”。这在支持模式级别的语义连续性方面是糟糕的：输入中的微小扰动可能会改变非零神经元，即使基本意义几乎没有改变。因此，基础模型的Lipschitz连续性并不能自动给我们一个在SAE空间中稳定的非零代码子集，支持级别的稳定性必须被视为一个独立的设计目标并明确评估。
- en: Partial Interpretability
  id: totrans-38
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 部分可解释性
- en: 'SAE defines an *overcomplete* dictionary to store possible features learned
    from data. Therefore, *we only need a subset of these dictionary entries to be
    interpretable features*. Even for that subset, *meanings of the features are only
    required to be approximately accurate.* When we align existing symbols to the
    SAE space, it is the **activation patterns** in the SAE layer that we rely upon:
    we probe the model in contexts where a symbol is “in play”, record the resulting
    sparse codes, and use the aggregated code as an embedding for that symbol. Symbols
    from different systems whose embeddings are close can be linked or merged, even
    if we never assign human-readable semantics to every individual feature.'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: SAE定义了一个*过度完备*的字典来存储从数据中学习到的可能特征。因此，*我们只需要这些字典条目的一个子集是可解释的特征*。即使对于这个子集，*特征的意义只需要是近似准确的*。当我们将现有符号对齐到SAE空间时，我们依赖的是SAE层的**激活模式**：我们在符号“在游戏中”的上下文中探测模型，记录产生的稀疏代码，并使用聚合代码作为该符号的嵌入。来自不同系统且嵌入接近的符号可以链接或合并，即使我们从未为每个特征分配可读的语义。
- en: 'Interpretable features then play a more focused role: they provide **human-facing
    anchors** inside this activation geometry. If a particular feature has a reasonably
    accurate description, all symbols that load heavily on it inherit a shared semantic
    hint (e.g. “these are all duty-of-care-like things”), making it easier to inspect,
    debug, and organize the merged symbolic space. In other words, we do not need
    a perfect, fully named dictionary. We need (i) enough capacity so that important
    concepts can get their own directions, and (ii) a sizeable, behaviorally relevant
    subset of features whose approximate meanings are stable enough to serve as anchors.
    The rest of the overcomplete code can remain as anonymous background; it still
    contributes to distances and clusters in the SAE space, even if we never name
    it.'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 可解释的特征随后扮演了一个更专注的角色：它们在这个激活几何中提供了**面向人类的锚点**。如果一个特定的特征有一个相当准确的描述，那么所有对其有重载的符号都会继承一个共享的语义提示（例如，“这些都是类似职责关怀的事情”），这使得检查、调试和组织合并的符号空间变得更加容易。换句话说，我们不需要一个完美的、完全命名的字典。我们需要（i）足够的容量，以便重要概念可以得到它们自己的方向，以及（ii）一个足够大、与行为相关的特征子集，其近似意义足够稳定，可以作为锚点。其余的过度完备代码可以保持匿名背景；它仍然在SAE空间中的距离和聚类中做出贡献，即使我们从未为每个特征分配可读的语义。
- en: Behavioral Relevance via Counterfactuals
  id: totrans-41
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 通过反事实进行行为相关性
- en: 'A feature is only interesting, as part of a bridge, if it actually influences
    the model’s behavior — not just if it correlates with a pattern in the data. In
    causal terms, we care about whether the feature lies on a *causal path* in the
    network’s computation from input to output: if we perturb the feature while holding
    everything else fixed, does the model’s behaviour change in the way that its believed
    meaning would predict?'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 一个特征只有在作为桥梁的一部分并实际影响模型的行为时才有意义——而不仅仅是如果它与数据中的某个模式相关。在因果的术语中，我们关心的是该特征是否位于网络从输入到输出的计算中的*因果路径*上：如果我们扰动该特征而保持其他一切不变，模型的行为是否会按照其被认为的意义所预测的方式改变？
- en: Formally, changing a feature is similar to an intervention of the form \(\text{do}(z
    = c)\) in the causal sense, where we overwrite that internal variable and rerun
    the computation. But unlike classical causal inference modeling, we do not really
    need Pearl’s *do-calculus* to identify \(P(y \mid \text{do}(z = c))\). The neural
    network is a **fully observable and intervenable system**, so we can simply execute
    the intervention on the internal nodes and observe the new output. In this sense,
    neural networks give us the luxury of performing idealized interventions that
    are impossible in most real-world social or economic systems.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 形式上，改变特征类似于在因果意义上形式为 \(\text{do}(z = c)\) 的干预，其中我们覆盖那个内部变量并重新运行计算。但与经典因果推断建模不同，我们实际上并不真的需要Pearl的*do-calculus*来识别
    \(P(y \mid \text{do}(z = c))\)。神经网络是一个**完全可观察和可干预的系统**，因此我们可以简单地执行对内部节点的干预并观察新的输出。从这个意义上说，神经网络为我们提供了在大多数现实世界的社会或经济系统中不可能的理想化干预的奢侈。
- en: 'Intervening on SAE features is conceptually similar but implemented slightly
    differently. We typically do not know the meaning of an arbitrary value in the
    feature space, so the *hard intervention* mentioned above (value assignment) may
    not be meaningful. Instead, we amplify or suppress the magnitude of an existing
    feature, which behaves more like a *soft intervention*: the structural graph is
    left untouched, but the feature’s influence magnitude is changed. Because SAE
    reconstructs hidden activations as a linear combination of a small number of semantically
    meaningful features, we can change the coefficients of those features to implement
    meaningful, localized soft interventions without affecting other features.'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 对SAE特征进行干预在概念上相似，但实现方式略有不同。我们通常不知道特征空间中任意值的含义，因此上述提到的*硬干预*（值赋值）可能没有意义。相反，我们放大或抑制现有特征的幅度，这更像是一种*软干预*：结构图保持不变，但特征的影响幅度发生了变化。因为SAE将隐藏激活表示为少数具有语义意义的特征的线性组合，我们可以改变这些特征的系数，以实现有意义、局部化的软干预，而不会影响其他特征。
- en: '![](../Images/23ec76a51219dc9616b16258cddf9be5.png)'
  id: totrans-45
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/23ec76a51219dc9616b16258cddf9be5.png)'
- en: Symbolic-System Based Compression as an Alignment Process
  id: totrans-46
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 基于符号系统的压缩作为对齐过程
- en: Now let’s take a slightly different view. While neural networks compress the
    world into some highly abstract, continuous manifolds, *symbolic systems compress
    it into a human-defined space with semantically meaningful axes along which the
    system’s behaviors can be judged*. From this perspective, compressing information
    into the symbolic space is an **alignment process**, where a messy, high-dimensional
    world is projected onto a space whose coordinates reflect human concepts, interests,
    and values.
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 现在让我们换一个稍微不同的视角。虽然神经网络将世界压缩成一些高度抽象、连续的流形，*符号系统则将其压缩成一个人为定义的空间，其中包含具有语义意义的轴，系统行为可以据此进行判断*。从这个角度来看，将信息压缩到符号空间是一个**对齐过程**，在这个过程中，一个混乱、高维的世界被投射到一个空间中，其坐标反映了人类的概念、兴趣和价值观。
- en: 'When we introduce symbols like “duty of care”, “threat of violence”, or “protected
    attribute” into a symbolic system, we are not just inventing labels. This compression
    process does three things at once:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 当我们将“注意义务”、“暴力威胁”或“受保护属性”等符号引入符号系统时，我们不仅仅是发明标签。这个压缩过程同时做三件事：
- en: – It selects which aspects of the world the system is **obliged to care about**
    (and which it is supposed to ignore).
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: – 它选择系统必须关注世界的哪些方面（以及它应该忽略哪些方面）。
- en: – It creates a **shared vocabulary** so that different stakeholders can reliably
    point to “the same thing” in disputes and audits.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: – 它创建了一个**共享词汇表**，以便不同的利益相关者可以在争议和审计中可靠地指向“同一事物”。
- en: '– It turns those symbols into **commitment points**: once written down, they
    can be cited, challenged, and reinterpreted, but not quietly erased.'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: – 它将这些符号转化为**承诺点**：一旦写下来，它们可以被引用、挑战和重新解释，但不能悄无声息地被删除。
- en: By contrast, a purely neural compression lives entirely inside the model. Its
    latent axes are unnamed, its geometry is private, and its content can drift as
    training data or fine-tuning objectives change. Such a representation is excellent
    for generalization, but poor as a locus of obligation. It is hard to say, in that
    space alone, what the system *owes* to anyone, or which distinctions it is supposed
    to treat as invariant. In other words, **neural compression serves prediction,
    while symbolic compression serves alignment with a human normative frame**.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 相比之下，纯神经压缩完全存在于模型内部。其潜在轴是无名的，其几何形状是私有的，其内容会随着训练数据或微调目标的改变而漂移。这种表示非常适合泛化，但在义务中心方面却很糟糕。在仅有的那个空间中，很难说系统*欠*任何人什么，或者它应该将哪些区别视为不变。换句话说，**神经压缩服务于预测，而符号压缩服务于与人类规范性框架的对齐**。
- en: Once you see symbolic systems as alignment maps rather than mere rule lists,
    the connection to *accountability* becomes direct. To say “the model must not
    discriminate on protected attributes”, or “the model must apply a duty-of-care
    standard”, is to insist that certain symbolic distinctions be reflected, in a
    stable way, inside its internal concept space — and that we be able to locate,
    probe, and, if necessary, correct those reflections. And this accountability is
    usually desired, even at the cost of compromising part of the model capability.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦将符号系统视为对齐图而不是简单的规则列表，与*问责制*的联系就变得直接。说“模型不得基于受保护属性进行歧视”，或者“模型必须遵守谨慎行事的标准”，就是坚持某些符号区别必须以稳定的方式反映在其内部概念空间中——并且我们能够定位、探测，并在必要时纠正这些反映。这种问责制通常是期望的，即使是以牺牲模型部分能力为代价。
- en: From Hidden Law to Shared Symbols
  id: totrans-54
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 从隐藏法则到共享符号
- en: 'In *Zuo Zhuan*, the Jin statesman Shu-Xiang once wrote to Zi-Chan of Zheng:
    “*When punishment is unknown, deterrence becomes unfathomable.*” For centuries,
    the ruling class maintained order through secrecy, believing that fear thrived
    where understanding ended. That’s why it became a milestone in ancient Chinese
    history when Zi-Chan shattered that tradition, cast the criminal code onto bronze
    tripods and displayed it publicly in 536 BCE. Now AI systems are facing a similar
    problem. Who will be the next Zi-Chan?'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 在《左传》中，晋国政治家叔向曾写信给郑国的子产：“*当惩罚未知时，威慑变得难以捉摸。*”几个世纪以来，统治阶级通过保密来维持秩序，认为在理解结束的地方恐惧繁荣。这就是为什么在公元前536年，子产打破了这个传统，将刑法铸在铜鼎上，并公之于众，成为了中国古代历史的一个里程碑。现在，人工智能系统也面临着类似的问题。下一个子产会是谁？
- en: '*[Xiaocong Yang](https://xiaocong-yang.github.io/personal-website/) is a PhD
    student in Computer Science at University of Illinois Urbana-Champaign and the
    founder of [AI Interpretability @ Illinois](https://interpretability.web.illinois.edu/).
    To cite this work, please refer to the [archived](https://xiaocong-yang.github.io/personal-website/posts/2025/11/symbolic-system/)
    [version](https://xiaocong-yang.github.io/personal-website/posts/2025/11/symbolic-system/)
    on my personal website.*'
  id: totrans-56
