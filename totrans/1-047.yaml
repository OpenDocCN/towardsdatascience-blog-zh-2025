  zh: '*[杨晓聪](https://xiaocong-yang.github.io/personal-website/) 是伊利诺伊大学厄巴纳-香槟分校计算机科学专业的博士生，也是[AI
    Interpretability @ Illinois](https://interpretability.web.illinois.edu/)的创始人。要引用这项工作，请参考我个人网站上的[存档版本](https://xiaocong-yang.github.io/personal-website/posts/2025/11/symbolic-system/)
