- en: How Likely Is a Six Nations Grand Slam in 2025?
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 2025年六国赛Grand Slam的可能性有多大？
- en: 原文：[https://towardsdatascience.com/how-likely-is-a-six-nations-grandslam-in-2025-91aadb47963e/](https://towardsdatascience.com/how-likely-is-a-six-nations-grandslam-in-2025-91aadb47963e/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/how-likely-is-a-six-nations-grandslam-in-2025-91aadb47963e/](https://towardsdatascience.com/how-likely-is-a-six-nations-grandslam-in-2025-91aadb47963e/)
- en: Quantifying uncertainty in sports fixtures
  id: totrans-2
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 对体育赛事的不确定性进行量化
- en: '![Photo by Thomas Serer on Unsplash](../Images/a494045e89337b29b46b740d023cdc7c.png)'
  id: totrans-3
  prefs: []
  type: TYPE_IMG
  zh: '![由Thomas Serer在Unsplash提供的图片](../Images/a494045e89337b29b46b740d023cdc7c.png)'
- en: Photo by [Thomas Serer](https://unsplash.com/@jesusance?utm_source=medium&utm_medium=referral)
    on [Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由[Thomas Serer](https://unsplash.com/@jesusance?utm_source=medium&utm_medium=referral)在[Unsplash](https://unsplash.com?utm_source=medium&utm_medium=referral)提供
- en: '**Introduction**'
  id: totrans-5
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**引言**'
- en: For rugby fans the long wait is nearly over, like Christmas the Six Nations
    comes once a year to lift our spirits in the cold winter months. If you’re not
    very familiar with rugby, the Six Nations is an annual tournament where the top
    national sides in Europe (England, France, Ireland, Italy, Scotland, Wales) each
    play five fixtures alternating who plays at home or away each year. All teams
    compete to win, but the most coveted prize is a ‘Grandslam’ – where a team wins
    all 5 of their fixtures. Given how competitive the tournament is a Grandslam is
    reasonably rare, and since the tournament was expanded to six sides in 2000 there
    have only been 13 Grandslams of a possible 25.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 对于橄榄球迷来说，漫长的等待即将结束，就像圣诞节一样，六国赛一年一度地来到寒冷的冬季，提振我们的精神。如果你对橄榄球不太熟悉，六国赛是一个年度赛事，欧洲顶级国家队（英格兰、法国、爱尔兰、意大利、苏格兰、威尔士）每年进行五场比赛，每年轮流主客场。所有队伍都为了赢得比赛而竞争，但最渴望的奖项是“Grand
    Slam”——一支队伍赢得所有5场比赛。鉴于赛事的竞争性，Grand Slam相对罕见，自从2000年赛事扩大到六支队伍以来，可能的25次Grand Slam中只有13次。
- en: This year, in the 2025 tournament, Ireland come into the competition competing
    for a third consecutive series win with stiff competition from France, who’s domestic
    league (The Top 14) has been electric this year in the European Champions Cup.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 今年，在2025年的比赛中，爱尔兰队带着连续三次系列赛胜利的势头进入比赛，面临着来自法国的激烈竞争，法国的国内联赛（Top 14）今年在欧洲冠军杯中表现非常出色。
- en: With that in mind, and given that roughly half of tournaments have led to a
    Grandslam, how likely is a Grandslam in 2025? In this short article we’ll explore
    how we can use previous fixture results and other information to make a best guess
    at how likely a Grandslam is. We’ll be focusing on linear models, and we’ll explore
    this from both the Frequentist and Bayesian Perspective. The models are built
    using SciKit-Learn and the Bayesian modelling library Bambi (which is built on
    top of the *excellent* PyMC framework).
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑到这一点，并且鉴于大约一半的赛事都导致了Grand Slam，2025年发生Grand Slam的可能性有多大？在这篇简短的文章中，我们将探讨如何利用以往的比赛结果和其他信息来对Grand
    Slam的可能性做出最佳猜测。我们将重点关注线性模型，并从频率派和贝叶斯的角度来探讨这个问题。这些模型是使用SciKit-Learn和贝叶斯建模库Bambi（它建立在*优秀的*PyMC框架之上）构建的。
- en: Read on to understand how and why I estimate the likelihood of a Six Nations
    Grandslam to be around *30–40%* in 2025.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 继续阅读以了解我为什么估计2025年六国赛Grand Slam的可能性大约在*30-40%*。
- en: '**Quantifying Uncertainty**'
  id: totrans-10
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**量化不确定性**'
- en: In the age of AI people are increasingly used to mapping inputs to outputs with
    highly accurate predictions. Whether this is using LLMs to generate natural language
    responses, Computer Vision models to tag images or even Auto ML to predict tabular
    datasets it is increasingly taken for granted that these models *just work*.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 在人工智能时代，人们越来越习惯于将输入映射到输出，并做出高度准确的预测。无论是使用LLM生成自然语言响应，计算机视觉模型标记图像，甚至是Auto ML预测表格数据集，人们越来越认为这些模型*只是工作*。
- en: In spite of this, the relationship between inputs and outputs naturally involves
    a level of uncertainty – and when you are working with small or noisy datasets,
    like you often see in sports, it is important to attach an estimate of uncertainty
    to your predictions. For example, the opening fixture of the 2025 Six Nations
    France host Wales at home – we may predict that France will win, but how confident
    are we about this?
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 尽管如此，输入和输出之间的关系自然涉及一定程度的不确定性——当你处理像体育中经常看到的小型或噪声数据集时，给你的预测附加一个不确定性的估计是很重要的。例如，2025年六国赛的首场比赛法国队主场对阵威尔士——我们可能会预测法国队会赢，但我们对此有多大的信心？
- en: '**Our Dataset**'
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**我们的数据集**'
- en: The dataset used for this analysis is sourced from publicly available resources,
    such as [Wikipedia](https://en.wikipedia.org/wiki/2024_Six_Nations_Championship).
    The challenge with predicting 2025 fixture results is that the out-of-sample predictions
    are based on panel data, and team form generally fluctuates across the years as
    squads and managers change.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 用于此分析的数据集来源于公开资源，例如 [维基百科](https://en.wikipedia.org/wiki/2024_Six_Nations_Championship)。预测2025年比赛结果的一个挑战是，基于面板数据的预测是基于样本外数据，并且队伍的表现通常在几年间波动，因为队伍和管理层发生变化。
- en: 'In our publicly sourced data we gather stats from 2020–2024 including:'
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们公开获取的数据中，我们收集了2020-2024年的统计数据，包括：
- en: The age profile of squads
  id: totrans-16
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 队伍的年龄结构
- en: The experience of squads (i.e. number of international caps)
  id: totrans-17
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 队伍的经验（即国际出场次数）
- en: The number of distinct club sides that make up a national squad
  id: totrans-18
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 构成国家队的不同俱乐部队伍数量
- en: Previous table position
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 前一赛季排名
- en: Previous fixture result
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 前一赛季比赛结果
- en: Whether there is a change of coach since the previous tournament
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 自上次锦标赛以来是否有教练更换
- en: 'The data preparation here is done using Pandas. Figure 1 shows how we merge
    the data on a fixture level basis, incorporating information about the squad for
    each year of the tournament. Looking at this we can see that in 2025:'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 这里的数据准备使用Pandas完成。图1显示了我们在比赛层面合并数据的方式，包括每年锦标赛队伍的信息。通过观察我们可以看到，在2025年：
- en: '***Ireland*** have the oldest squad with a proportionally high number of caps
    on average. This tells us that the squad is highly established and, since Irish
    rugby is provincial, the squad is made up of only four sides. Given the age profile
    of the side and that they have a new coach for this tournament there may be uncertainty
    over whether they may be at or near the ‘peak’ as a squad'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***爱尔兰*** 拥有最老的队伍，平均出场次数比例较高。这告诉我们队伍非常稳定，由于爱尔兰橄榄球是地方性的，队伍由仅四支球队组成。考虑到队伍的年龄结构和他们今年有新教练，关于他们是否处于或接近“顶峰”状态存在不确定性'
- en: '***France*** have one of the youngest squads on average and, on average, the
    lowest number of caps. Despite this they have been performing exceptionally well,
    and came second in the 2024 tournament suggesting their squad is on the rise'
  id: totrans-24
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***法国*** 平均年龄最小的队伍之一，平均出场次数也最低。尽管如此，他们表现异常出色，在2024年锦标赛中排名第二，这表明他们的队伍正在崛起'
- en: '***England*** have the second youngest squad, but proportionally more caps
    on average suggesting they are trying to balance youth with experience in the
    2025 tournament'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***英格兰*** 是第二年轻的队伍，但平均出场次数比例较高，这表明他们在2025年锦标赛中试图在年轻和经验之间取得平衡'
- en: '***Scotland*** have the second oldest and one of the most capped squads in
    the tournament. They have an established side and, arguably, underperformed in
    2024 where they came in fourth place. Their side may be nearing its peak before
    they go through a period of rebuilding'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***苏格兰*** 是锦标赛中第二老和出场次数最多的队伍之一。他们有一支稳定的队伍，并且可能在2024年表现不佳，排名第四。他们的队伍可能在达到顶峰之前将经历一段重建期'
- en: '***Italy*** are in a similar position to Scotland in terms of average number
    of caps, but with a slightly younger age profile. There has been a number of changes
    in management over the years but come into the competition this year with an established
    squad and the same coach. They might surprise people this year'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***意大利*** 在平均出场次数方面与苏格兰处于相似位置，但年龄结构略年轻。多年来管理层的变动不少，但今年他们带着一支稳定的队伍和同一教练参赛。他们今年可能会让人感到意外'
- en: '***Wales*** are in a period of rebuilding and have a young and inexperienced
    squad and underperformed in the 2024 tournament where they came in last place'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '***威尔士*** 处于重建期，拥有年轻且缺乏经验的队伍，并在2024年锦标赛中表现不佳，排名最后'
- en: Since we’re using linear methods to predict results, I created a binary flag
    for whether or not the home side won the fixture, and for each fixture we’ll predict
    the probabilities of the home side winning (i.e. yes/no). The probability of not
    winning at home is, implicitly, the same as predicting that the away side win.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我们使用线性方法来预测结果，我创建了一个二元标志来表示主队是否赢得了比赛，对于每一场比赛，我们将预测主队获胜的概率（即是否）。主队未获胜的概率，隐含地，等同于预测客队获胜。
- en: '![Figure 1 - Tournament History and 2025 Fixtures prepared using Pandas](../Images/309348f568da021b5d63c7573c0631d4.png)'
  id: totrans-30
  prefs: []
  type: TYPE_IMG
  zh: '![图1 - 使用Pandas准备的锦标赛历史和2025年比赛](../Images/309348f568da021b5d63c7573c0631d4.png)'
- en: Figure 1 – Tournament History and 2025 Fixtures prepared using Pandas
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 图1 – 使用Pandas准备的锦标赛历史和2025年比赛
- en: '**Exploring the Data**'
  id: totrans-32
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**探索数据**'
- en: Before building a predictive model, it is important to do some exploratory analysis.
    Figure 2 shows the correlation plot for the features.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 在构建预测模型之前，进行一些探索性分析是很重要的。图2显示了特征的关联图。
- en: As you might expect, where you finished last year is highly correlated to winning
    this year. Likewise, your squad profile is highly correlated with winning. Having
    a change of coach is correlated, but not as strongly – though this may be because
    there are proportionally fewer instances where this happens between tournaments.
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所预期的那样，去年您所处的位置与今年获胜高度相关。同样，您的球队档案也与获胜高度相关。更换教练也有相关性，但不是那么强烈——这可能是因为在锦标赛之间发生这种情况的实例相对较少。
- en: An important consideration here is whether there is correlation amongst the
    inputs (features) of the model, since autocorrelation can negatively impact model
    reliability. We can see here that there is a strong correlation to the age and
    number of caps, this is intuitive since older players will (on average) have more
    caps. To accommodate this we replace these inputs with a composite feature which
    represents the proportion of caps to age. We also remove a few of the less correlated
    inputs from the model, since often less is more when fitting a model to avoid
    overfitting.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 在这里的一个重要考虑因素是模型输入（特征）之间是否存在相关性，因为自相关性可能会对模型可靠性产生负面影响。我们可以看到，年龄和出场次数之间存在强烈的关联，这是直观的，因为年龄较大的球员（平均而言）会有更多的出场次数。为了适应这一点，我们用表示出场次数与年龄比例的复合特征替换这些输入，我们还从模型中移除了一些相关性较低的输入，因为在拟合模型以避免过拟合时，通常“少即是多”。
- en: '![Figure 2 - Correlation plot on historic results](../Images/a0bf1a6c7bd66c501cc4357ec55ee653.png)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
  zh: '![图2 - 历史结果的关联图](../Images/a0bf1a6c7bd66c501cc4357ec55ee653.png)'
- en: Figure 2 – Correlation plot on historic results
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 图2 – 历史结果的关联图
- en: '**Preparing the Data**'
  id: totrans-38
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**准备数据**'
- en: Once we have identified the features of our model we can prepare the data for
    training. Since this is a panel data problem we split the data as below.
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦我们确定了模型的特征，我们就可以准备训练数据。由于这是一个面板数据问题，我们按以下方式分割数据。
- en: '***Model Validation:*** We start by validating the model and getting an estimate
    of out-of-sample accuracy. To do this we back-test on previous tournaments'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: '***模型验证：*** 我们首先验证模型并估计样本外准确性。为此，我们在之前的锦标赛上进行回测'
- en: Train dataset – fixture results 2020–2023
  id: totrans-41
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 训练数据集 – 2020–2023赛季的赛程结果
- en: Test dataset – fixture results in 2024 tournament
  id: totrans-42
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 测试数据集 – 2024年锦标赛的赛程结果
- en: '***Model Predictions:*** We can create our predictive model for 2025 for out-of-sample
    predictions as'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: '***模型预测：*** 我们可以为2025年的样本外预测创建预测模型'
- en: Train dataset – fixture results from 2020–2024
  id: totrans-44
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 训练数据集 – 2020–2024年的赛程结果
- en: Prediction dataset – upcoming fixtures for 2025
  id: totrans-45
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 预测数据集 – 2025年的即将到来的赛程
- en: 'We prepare the dataset for modelling using:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用以下方法准备用于建模的数据集：
- en: One-hot encoding for fixtures
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 赛程的一元编码
- en: MinMax scaling for numeric features
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 对数值特征进行MinMax缩放
- en: It is important to apply the scaling on each dataset separately to mitigate
    the risk of _[data leakage](https://scikit-learn.org/stable/common_pitfalls.html#data-leakage)_.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 在每个数据集上应用缩放是很重要的，以减轻_[数据泄露](https://scikit-learn.org/stable/common_pitfalls.html#data-leakage)_的风险。
- en: '**Point Estimates with Logistic Regression**'
  id: totrans-50
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**逻辑回归的点估计**'
- en: We can create our Frequentist model using SciKit-Learn’s Logistic Regression
    classifier. Figure 3 shows the Confusion Matrix for the back-testing on 2020–2024
    fixtures
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以使用SciKit-Learn的逻辑回归分类器创建我们的频率主义模型。图3显示了在2020–2024年赛程上的回测混淆矩阵
- en: '![Figure 3 - Confusion Matrix for Backtesting](../Images/7808a71b926169f9af1a22f4e043444c.png)'
  id: totrans-52
  prefs: []
  type: TYPE_IMG
  zh: '![图3 - 回测的混淆矩阵](../Images/7808a71b926169f9af1a22f4e043444c.png)'
- en: Figure 3 – Confusion Matrix for Backtesting
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 图3 – 回测的混淆矩阵
- en: In Figure 3 we can see that the accuracy of the model is around 73%. You may
    be wondering why there is a total of 30 fixtures for the 2024 predictions when
    there’s only 15 fixtures each tournament? The reason for this is, in order to
    improve model accuracy, we stack the data so that we get a Home and Away result
    for each fixture. This is because sides only play each other once per year and
    swap home and away each tournament. We, as humans, understand that France v Wales
    is the same as Wales v France, but the model cannot directly understand this.
    To do this we swap home and away, and then swap the binary flag for home win,
    preserving the integrity of the data.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 在图3中，我们可以看到模型的准确率大约为73%。您可能会想知道为什么2024年的预测有总共30场比赛，而每个锦标赛只有15场比赛？这是因为为了提高模型准确率，我们堆叠了数据，以便为每场比赛获得主客场结果。这是因为球队每年只相互比赛一次，并在每个锦标赛中交换主客场。我们作为人类，理解法国对阵威尔士与威尔士对阵法国是相同的，但模型无法直接理解这一点。为了做到这一点，我们交换了主客场，然后交换了主胜的二进制标志，以保持数据的完整性。
- en: 'For example:'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 例如：
- en: 2024 Wales v France → HomeWin = 0 [original]
  id: totrans-56
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 2024年威尔士对阵法国 → 主胜 = 0 [原始]
- en: 2024 France v Wales → HomeWin = 1 [inverted]
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 2024年法国对阵威尔士 → 主胜 = 1 [倒置]
- en: Using our out-of-sample predictions for 2025 we get the below win probabilities
    for the upcoming 2025 tournament.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 使用我们对2025年的外样本预测，我们得到了以下2025年即将到来的赛事的胜率。
- en: '![Table 1 - Point Estimates for 2025](../Images/368503261ecbc36332863bde28ce6136.png)'
  id: totrans-59
  prefs: []
  type: TYPE_IMG
  zh: '![表1 – 2025年的点估计](../Images/368503261ecbc36332863bde28ce6136.png)'
- en: Table 1 – Point Estimates for 2025
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 表1 – 2025年的点估计
- en: 'In Table 1 we see that:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 在表1中，我们可以看到：
- en: Ireland are expected to do well based on previous form and a chance to get a
    ‘three-peat’ (third consecutive title)
  id: totrans-62
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 根据以往的表现和获得“三连冠”（第三个连续冠军）的机会，爱尔兰队预计会表现得很好。
- en: France are expected to do very well, particularly at home
  id: totrans-63
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 预计法国将表现得非常好，尤其是在主场
- en: England have a reasonably strong chance, but in all likelihood will finish mid-table
  id: totrans-64
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 英格兰有相当强的机会，但很可能会以中游的成绩结束
- en: Scotland are expected to have the slight edge in the Calcutta cup again this
    year, but it will be tight
  id: totrans-65
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 苏格兰预计在今年再次在加尔各答杯中略占优势，但竞争将非常激烈
- en: Italy and Wales will be expected to compete to avoid the wooden spoon, with
    Italy expected to be slight favourites
  id: totrans-66
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 意大利和威尔士预计将竞争以避免获得“木勺”（最差成绩），预计意大利将是轻微的青睐方
- en: '**Simulating Fixture Results from our Estimated Probabilities**'
  id: totrans-67
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**模拟基于我们估计概率的赛事结果**'
- en: Once we’ve estimated the probabilities for the fixtures, we can use Monte Carlo
    methods to simulate the tournament and estimate the likelihood of a Six Nations
    Grandslam. Monte Carlo methods use random sampling to estimate probabilities and
    quantify uncertainty.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦我们估计了赛事的概率，我们可以使用蒙特卡洛方法来模拟锦标赛并估计六国赛冠军的可能性。蒙特卡洛方法使用随机抽样来估计概率并量化不确定性。
- en: To do this we run 10,000 tournament simulations making a random choice seeded
    with our win probabilities. To do this we use Numpy’s random choice method for
    our set of home and away fixtures with the corresponding win probabilities. Figure
    4 shows us a violin plot for the simulated number of wins per tournament per side
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 为了做到这一点，我们运行了10,000次锦标赛模拟，并使用我们的胜率进行随机选择。为此，我们使用Numpy的随机选择方法为我们的一组主客场赛事和相应的胜率。图4显示了每个球队在每个锦标赛中模拟的获胜次数的提琴图
- en: '![Figure 4 - Simulated Tournament Results from Frequentist Probabilities](../Images/c07d4730022d78d44c563d9136d26fc8.png)'
  id: totrans-70
  prefs: []
  type: TYPE_IMG
  zh: '![图4 - 基于频率主义概率的模拟锦标赛结果](../Images/c07d4730022d78d44c563d9136d26fc8.png)'
- en: Figure 4 – Simulated Tournament Results from Frequentist Probabilities
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 图4 – 基于频率主义概率的模拟锦标赛结果
- en: 'It’s worth noting that these points are jittered to improve the aesthetics
    of the plot, but overall, we can see from Figure 4 that:'
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 值得注意的是，这些点被抖动以改善图表的美观，但总体而言，我们可以从图4中看到：
- en: France and Ireland are clear favourites to win, though based on past form Ireland
    might be expected to be more likely to win a Grandslam
  id: totrans-73
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 法国和爱尔兰是夺冠的明显热门，尽管根据过去的表现，爱尔兰可能更有可能赢得冠军赛
- en: It’s important to note that past form doesn’t always predict current form, for
    example Ireland have a new head coach, the oldest team and are looking at a rebuild
    phase following the retirement of their key playmaker, Jonny Sexton
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 重要的是要注意，过去的表现并不总是预示着当前的表现，例如爱尔兰队有新的主教练，是最老的球队，并且在关键球员乔尼·塞顿退役后正处于重建阶段
- en: England and Scotland could cause some upsets, but are likely to be battling
    it out for the upper-mid table position. Based on recent form Scotland are more
    likely to get 3 wins and England 2 wins, but there is more uncertainty on how
    England could do in the competition
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 英格兰和苏格兰可能会引起一些意外，但很可能会为争夺中上游位置而战。根据最近的表现，苏格兰更有可能赢得3场胜利，英格兰赢得2场胜利，但英格兰在比赛中可能的表现存在更多不确定性。
- en: Wales and Italy are likely to be scrapping it out for the bottom of the table,
    with both teams fairly likely to pick up at least one win in the tournament, though
    this may be the Italy-Wales fixture, which Italy are possible favourites for given
    home advantage in 2025
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 威尔士和意大利很可能会在积分榜底部展开争夺，两队都有很大可能在本届锦标赛中至少赢得一场胜利，尽管这可能是一场意大利对阵威尔士的比赛，鉴于2025年的主场优势，意大利可能是可能的夺冠热门。
- en: Overall, this model appears in-line with what many pundits have said about their
    expectations for the tournament. One limitation of this approach is that we’re
    making the assumption that the win probabilities of the fixtures are normally
    distributed around the point estimates from the Logistic Regression model. This
    may be a strong assumption.
  id: totrans-77
  prefs: []
  type: TYPE_NORMAL
  zh: 总体而言，这个模型与许多专家对本届锦标赛的期望相符。这种方法的一个局限性是我们假设比赛的获胜概率围绕逻辑回归模型中的点估计呈正态分布。这可能是一个强烈的假设。
- en: Another assumption of the model is that the outcome of a win in one fixture
    doesn’t affect the win probabilities in other fixtures, i.e. that fixtures are
    independent. Personally, I don’t think this is entirely unreasonable since this
    is professional sport, and sides are coached to have a winning mindset in each
    fixture – and often sides are inconsistent between fixtures. For example, Scotland
    performed very well against England in 2024 but went on to lose subsequent fixtures
    and England went on to beat Ireland who ultimately won the tournament.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 模型的另一个假设是，一场比赛中获胜的结果不会影响其他比赛中获胜的概率，即比赛是独立的。我个人认为这并不完全不合理，因为这是职业体育，各队都会被训练在每场比赛中保持获胜心态——而且各队之间的表现往往不一致。例如，苏格兰在2024年对英格兰的表现非常好，但随后输掉了后续的比赛，而英格兰随后击败了爱尔兰，最终赢得了锦标赛。
- en: '**Predicting 2025 with a Bayesian Logistic Regression**'
  id: totrans-79
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**使用贝叶斯逻辑回归预测2025年**'
- en: We can avoid making strong assumptions on the distribution of win probabilities
    across the tournament by instead sampling these directly. To do this we can use
    Markov Chain Monte Carlo (MCMC) methods – which provide a Bayesian approach to
    estimating the distribution of model parameters through random sampling. Essentially,
    the models work by updating their prior beliefs on the distribution of model parameters
    as the sampler observes real data. Once the model converges around the ‘true’
    distributions it samples directly from the posterior distribution of the model
    parameters. In the case of a Logistic Regression model, we model the target variable
    as a Bernoulli distribution.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以通过直接采样来避免对整个锦标赛中获胜概率分布的强烈假设。为此，我们可以使用马尔可夫链蒙特卡洛（MCMC）方法——它提供了一种通过随机采样来估计模型参数分布的贝叶斯方法。本质上，这些模型通过观察真实数据来更新对模型参数分布的先验信念。一旦模型围绕“真实”分布收敛，它就会直接从模型参数的后验分布中进行采样。在逻辑回归模型的情况下，我们将目标变量建模为伯努利分布。
- en: There are potential drawbacks to using Bayesian Logistic Regression models,
    for example they can be sensitive to the priors that the model assumes, the prediction
    probabilities may not be well calibrated (depending on the prior assumptions)
    and, in the case of a hierarchical model, there may be ‘shrinkage’. Shrinkage
    occurs where hierarchy levels are pulled the mean of the parent level – in sports
    modelling the impact of this is that teams that are at the top and bottom of the
    table may have their estimates pulled up or down towards the mean of the table.
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
  zh: 使用贝叶斯逻辑回归模型可能存在潜在缺点，例如它们可能对模型假设的先验值敏感，预测概率可能没有很好地校准（取决于先验假设），在层次模型的情况下，可能存在‘收缩’现象。收缩发生在层级水平被拉向父级水平的平均值——在体育建模中，这种影响是，位于表格顶部和底部的队伍的估计值可能会被拉向表格的平均值。
- en: '![Figure 5 - Estimating Grandslam probabilities as samples directly from the
    predictive posterior distribution](../Images/cf0964d06c1e29a7b5d48df5e26e3f89.png)'
  id: totrans-82
  prefs: []
  type: TYPE_IMG
  zh: '![图5 - 直接从预测后验分布中估计大满贯概率](../Images/cf0964d06c1e29a7b5d48df5e26e3f89.png)'
- en: Figure 5 – Estimating Grandslam probabilities as samples directly from the predictive
    posterior distribution
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 图5 – 直接从预测后验分布中估计大满贯概率的样本
- en: Figure 5 shows the violin plot for the estimated distribution of wins taken
    directly from the predictive posterior distribution. The distributions look a
    little more spread out than from our Logistic Regression, possibly indicating
    the higher spread of uncertainty in our model. Looking at the plot there may be
    some shrinkage as both Wales and Italy are expected to do better than in the Logistic
    Regression model, and Ireland appear to have less chance of a Grandslam.
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 图5显示了直接从预测后验分布中估计的获胜分布的提琴图。分布看起来比我们的逻辑回归更分散，这可能表明我们模型中的不确定性更高。观察图表，可能存在一些收缩，因为威尔士和意大利预计会比逻辑回归模型表现更好，而爱尔兰似乎大满贯的机会更小。
- en: '**What Does our Analysis Tell Us?**'
  id: totrans-85
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**我们的分析告诉我们什么？**'
- en: We can use our samples to directly estimate the probability of a Grandslam by
    simply taking the number of Grandslams over the number of tournaments, this is
    shown in Figure 6.
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以直接通过将大满贯次数除以赛事次数来使用我们的样本直接估计大满贯的概率，这如图6所示。
- en: '![Figure 6 - Estimating probabilities from Monte Carlo and MCMC Samples](../Images/53ad95b04d7fa804d9cd2046a910daa7.png)'
  id: totrans-87
  prefs: []
  type: TYPE_IMG
  zh: '![图6 – 从蒙特卡洛和MCMC样本中估计概率](../Images/53ad95b04d7fa804d9cd2046a910daa7.png)'
- en: Figure 6 – Estimating probabilities from Monte Carlo and MCMC Samples
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 图6 – 从蒙特卡洛和MCMC样本中估计概率
- en: 'We can then compare our model results to published odds. I found some odds
    published by a bet maker on January 1st that gave the following odds:'
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以将我们的模型结果与公开发布的赔率进行比较。我发现1月1日一位投注者发布的赔率如下：
- en: No Winner 5/6 [this implies Any Winner odds of 6/5]
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 没有赢家 5/6 [这暗示任何赢家的赔率为6/5]
- en: Ireland 10/3
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 爱尔兰 10/3
- en: France 9/2
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 法国 9/2
- en: England 9/1
  id: totrans-93
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 英格兰 9/1
- en: Scotland 14/1
  id: totrans-94
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 苏格兰 14/1
- en: Wales 500/1
  id: totrans-95
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 威尔士 500/1
- en: Italy 2000/1
  id: totrans-96
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 意大利 2000/1
- en: 'We can convert the published odds to approximate probabilities using the below
    formula:'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以使用以下公式将发布的赔率转换为近似概率：
- en: '![](../Images/02b8bd1005f69a6e48f4f00af32dd9b1.png)'
  id: totrans-98
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/02b8bd1005f69a6e48f4f00af32dd9b1.png)'
- en: 'There are two things to consider here:'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 这里有两个方面需要考虑：
- en: Firstly, betting companies publish *implied odds* rather than *true odds* since
    they factor in a profit margin for the odds they publish (i.e. *the house always
    wins*)
  id: totrans-100
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 首先，博彩公司发布的是*隐含赔率*而不是*真实赔率*，因为他们在发布的赔率中考虑了利润空间（即*庄家总是赢*）。
- en: Secondly, odds change as new information becomes available. Our analysis is
    relatively simple and doesn’t factor in injuries or other factors. This is important
    since there have been notable injuries and withdrawals ahead of the start of the
    tournament so the odds will have changed. This is why I’m comparing the odds we’ve
    estimated to ones published at the start of the year where recent injuries won’t
    affect the published odds.
  id: totrans-101
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 其次，随着新信息的出现，赔率会发生变化。我们的分析相对简单，没有考虑伤病或其他因素。这很重要，因为比赛开始前有明显的伤病和退赛情况，因此赔率已经发生变化。这就是为什么我比较的是我们估计的赔率与年初发布的赔率，因为近期伤病不会影响发布的赔率。
- en: '**How do our models compare to published betting odds?**'
  id: totrans-102
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**我们的模型与公开发布的投注赔率相比如何？**'
- en: So how do our models compare to published odds? Our Frequentist model was surprisingly
    close, and our Bayesian model implied there was less certainty on the likelihood
    of a Six Nations Grandslam. In Table 2 you can see a comparison of the converted
    odds and our estimated probabilities
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 那么，我们的模型与公开发布的赔率相比如何？我们的频率主义模型出奇地接近，而我们的贝叶斯模型暗示对六国赛大满贯可能性的确定性较低。在表2中，您可以看到转换后的赔率和我们估计的概率比较。
- en: '![Table 2 - Comparison of our model to published odds](../Images/e2989b4323aff9c67da0f42344dda6cd.png)'
  id: totrans-104
  prefs: []
  type: TYPE_IMG
  zh: '![表2 – 我们模型与公开发布赔率的比较](../Images/e2989b4323aff9c67da0f42344dda6cd.png)'
- en: Table 2 – Comparison of our model to published odds
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 表2 – 我们模型与公开发布赔率的比较
- en: Overall, our estimates don’t look unreasonable despite the relatively small
    and sparse dataset we were using.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 总体而言，尽管我们使用的样本相对较小且稀疏，我们的估计看起来并不不合理。
- en: '**Conclusions**'
  id: totrans-107
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**结论**'
- en: 'Our analysis found that:'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
  zh: 我们的分析发现：
- en: In the 2025 Six Nations France likely to end up punching above their weight
    given the relatively youthful side they’ve got
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 在2025年六国赛中，法国队由于阵容相对年轻，有可能表现得超出预期。
- en: Ireland look the most likely to get a Grandslam, but this is based on past performance.
    With a new coach, aging squad and changing of playmakers the outlook is less certain
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 爱尔兰看起来最有可能获得大满贯，但这基于过去的成绩。随着新教练的加入、老将阵容和战术核心的更迭，前景变得不太确定。
- en: England’s True Odds are likely to be worse than their Implied Odds and based
    on past performance should aim for a strong mid-table position. They have one
    of the youngest squads but with more caps than other strong sides relative to
    their age profile. They have the potential to be disruptive in the tournament
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 英格兰的真实赔率可能比他们的隐含赔率更差，并且根据过去的表现，应该争取一个强劲的中游位置。他们拥有最年轻的队伍之一，但相对于他们的年龄结构，拥有比其他强队更多的出场次数。他们有潜力在比赛中造成破坏。
- en: Scotland have a better chance of a Grandslam than England and are likely to
    be also competing for a strong mid-table position. They have the second oldest
    and most experienced team after Ireland and may be at or near their peak as a
    squad. Could it be now or never for this squad?
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 苏格兰赢得大满贯的机会比英格兰更大，并且很可能也在争夺一个强劲的中游位置。他们在爱尔兰之后拥有第二老和经验最丰富的队伍，并且可能正处于或接近作为一支队伍的巅峰状态。对于这个队伍来说，现在是时候还是永远不再了呢？
- en: Wales and Italy are unlikely to be high performers in the 2025 Six Nations,
    and Italy will be vying to finish above Wales for the second year running
  id: totrans-113
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 威尔士和意大利不太可能在2025年的六国赛中表现出色，并且意大利将力争连续第二年排在威尔士之上。
- en: There is a reasonably strong chance of a Grandslam by any team, around a 30–40%
    chance
  id: totrans-114
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 任何一支球队赢得大满贯的可能性相当大，大约有30-40%的机会。
- en: This could be a very competitive tournament overall with many sides having a
    good chance of winning
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 这可能是一场非常具有竞争力的锦标赛，许多队伍都有赢得比赛的好机会。
- en: '**Summary**'
  id: totrans-116
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: '**总结**'
- en: In this article we’ve seen how we can leverage Frequentist and Bayesian methods
    to quantify uncertainty around the likely winners of the Six Nations in 2025\.
    Whilst our models were relatively simple and constrained to using a small dataset
    our probabilities were not too dissimilar from published odds, though these have
    since changed as events have developed (injuries, call-ups, etc.).
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
