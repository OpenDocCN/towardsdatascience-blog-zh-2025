- en: Using LangGraph and MCP Servers to Create My Own Voice Assistant
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/using-langgraph-and-mcp-servers-to-create-my-own-voice-assistant/](https://towardsdatascience.com/using-langgraph-and-mcp-servers-to-create-my-own-voice-assistant/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Why?
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: <mdspan datatext="el1756963416264" class="mdspan-comment">I have an Amazon Alexa</mdspan>,
    but I don’t like it. Why? It fails to do anything more complicated than basic
    voice commands.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: 'I end up using it for three things:'
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: Get the current date or time
  id: totrans-5
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Get weather information for today
  id: totrans-6
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Turn on or off connected devices (e.g. TV, lights, robot vacuum)
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: which are the only things that I can use it for reliably. Anything else, I get
    a polite and unhelpful “*I can’t help with that”*.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: Given the rise of LLM Agents and MCP servers, it’s become easier than ever to
    create personal assistants and chatbots. And I ask myself,
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
- en: '***“Why stop at a chatbot? Why not take this one step further and create my
    own voice assistant?”***'
  id: totrans-10
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: This is my attempt to do just that.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: Goals
  id: totrans-12
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: So I think, what exactly do I want my voice assistant to be able to do?
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: 'This is my list of initial goals:'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Run on my local computer
  id: totrans-15
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: I don’t want to pay for a subscription to use an LLM, and in fact, I don’t want
    to pay for anything.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
- en: Everything I build should just run on my local computer without having to worry
    about costs or how much free credit I have left at the end of each month.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Replicate Alexa functionality
  id: totrans-18
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Let’s take baby steps — first I simply want to replicate the functionality I
    already have with Alexa. This will be a good milestone to work towards, before
    I add more complex, extravagant features.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: 'It should be able to:'
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
- en: Get the current date or time
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Get weather information for today
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Turn on or off connected devices (e.g. TV, lights, robot vacuum)
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: before we start building this out into a fully-fledged Tony Stark’s Jarvis-esque
    voice assistant that can compute how to travel back in time.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Be quick
  id: totrans-25
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: If the responses aren’t fast enough, the voice assistant is as good as being
    silent.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
- en: Asking a question and waiting over a minute for a response is unacceptable.
    I want to be able to ask a question and get a response in a reasonable amount
    of time.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
- en: However, I know that running anything locally on my cute little Macbook Air
    is going to be slow, regardless of how many tweaks and refactorings I do.
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
- en: So for now, I’m not going to expect millisecond-level response times. Instead
    the response times should be quicker than the time it takes me to execute the
    task/query myself. At least in this way I know that I’m saving time.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
- en: In future articles, we’ll delve deeper into the optimisations I do to get this
    down to millisecond response times without paying for subscriptions.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
- en: My Device Specs
  id: totrans-31
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Device:** Macbook Air'
  id: totrans-32
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Chip:** Apple M3'
  id: totrans-33
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Memory:** 16GB'
  id: totrans-34
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 1\. Overall Structure
  id: totrans-35
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'I’ve structured the project as follows:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/4b897d968c461f41c9167011d79ed890.png)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
- en: Image by author, Diagram of overall project structure
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
- en: Voice Assistant
  id: totrans-39
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 1\. Speech-to-Text & Text-to-speech
  id: totrans-40
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: We make use of `RealtimeSTT` for wakeword detection (e.g. *“Alexa”, “Hey Jarvis”,
    “Hey Siri”*), speech detection and real-time speech-to-text transcription.
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
- en: The transcribed text is then sent to the *Agent* for processing, after which
    its response is then streamed to a `Kokoro` text-to-speech model. The output is
    then sent to the speaker.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Agent
  id: totrans-43
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: We use `Ollama` to run LLMs locally. The agent and the workflow that it takes
    is implemented in `LangGraph`.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
- en: The agent is responsible for taking a user query, understand it, and call on
    the tools it thinks are required to provide an appropriate response.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
- en: 'Our voice assistant will require the following tools to meet our goals:'
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
- en: A function to get the current date.
  id: totrans-47
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: A function to get the current time.
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It also needs tools to interact with smart-home devices, but the implementation
    for this can get quite involved so we implement this in a separate MCP server.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
- en: 3\. MCP Server for smart-home Connection
  id: totrans-50
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The MCP server is where we encapsulate the complexity of finding, connecting
    to, and managing the devices.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
- en: A SQL database keeps track of devices, their connection information and their
    names.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
- en: Meanwhile, tools are the interface through which an agent finds the connection
    information for a given device, and then uses it to turn the device on or off.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
- en: Let’s now dive deeper into the implementation details of each component.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
- en: Want access to the code repository?
  id: totrans-55
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: For those of you who wish to get access to the voice-assistant code that accompanies
    this article, check out my Patreon page [here](http://patreon.com/BenjaminLeeDataScience)
    to get access PLUS exclusive access to community chats where you can talk directly
    with me about this project.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Implementation Details
  id: totrans-57
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Text-to-speech (TTS) Implementation
  id: totrans-58
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![](../Images/b8ba054564d0521ce579e7e7097294a3.png)'
  id: totrans-59
  prefs: []
  type: TYPE_IMG
- en: Photo by [Oleg Laptev](https://unsplash.com/@snowshade?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on [Unsplash](https://unsplash.com/photos/orange-megaphone-on-orange-wall-QRKJwE6yfJo?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
- en: The text-to-speech layer was perhaps the easiest to implement.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
- en: Given some string we assume comes from the agent, pass it through a pre-trained
    text-to-speech model and stream it to the device speaker.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
- en: Firstly, let’s define a class called `Voice` that will be responsible for this.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
- en: We know upfront that apart from the model that we use for speech synthesis,
    receiving text and streaming it to the speaker will be the same and can remain
    decoupled from anything model related.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  id: totrans-65
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: so we can implement the `speak` function to stream the text to the speaker upfront.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
- en: Now, we can figure out which model is out there, which one to use, and how to
    use it, and then wire it up into our `Voice` class.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
- en: TTS Models Testing
  id: totrans-68
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Below, I list the various different TTS models that I experimented with, and
    the code you can use to replicate the results.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
- en: 1\. BarkModel ([Link](https://huggingface.co/suno/bark))
  id: totrans-70
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Quickstart code to run the model yourself:'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  id: totrans-72
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: '**Summary**'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
- en: '**Good**: Very realistic voice synthesis with natural sounding ‘umm’, ‘ahh’
    filler words.'
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Bad**: Quality is worse with shorter sentences. The end of the sentence is
    spoken as though a follow up sentence will quickly follow.'
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Bad**: Very slow. Takes 13 seconds to generate the speech for “The time is
    3:10 PM.”'
  id: totrans-76
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 2\. Coqui TTS ([Link](https://github.com/coqui-ai/TTS))
  id: totrans-77
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Install using:'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  id: totrans-79
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: Test code
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  id: totrans-81
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: '**Summary**'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
- en: '**Good**: Fast. Takes 0.3 seconds to generate the speech for “The time is 3:10
    PM.”'
  id: totrans-83
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Bad**: Text normalisation is not up to scratch. When it comes to time related
    queries, the pronunciation of “PM” is off. When the time is set to “13:10 PM”,
    the pronunciation of “13” is unrecognisable.'
  id: totrans-84
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 3\. Elevenlabs ([Link](https://elevenlabs.io/app/home))
  id: totrans-85
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Install using:'
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  id: totrans-87
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 'and run using:'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE5]'
  id: totrans-89
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: '**Summary**'
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
- en: By far the best in terms of quality and response times, which obviously it should
    be given it is a paid service.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
- en: They also provide some free credits without a subscription, but I’d rather not
    become dependent on it at all when developing my voice assistant so we skip it
    for now.
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
- en: 4\. Kokoro ([Link](https://github.com/hexgrad/kokoro))
  id: totrans-93
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We leave the best til last.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
- en: 'Install using:'
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  id: totrans-96
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 'Test code:'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  id: totrans-98
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: '**Summary**'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
- en: Firstly, it’s quick — it’s on par with Elevenlabs, only marginally slower, not
    really noticeable given the example text.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
- en: Secondly, the quality of the speech is also good. Sure, it could be better,
    there are occasions where it sounds slightly clunky.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
- en: But on average the quality of the outputs are spot on.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
- en: Defining the `Voice` Class
  id: totrans-103
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: So, we decide to use Kokoro for our text-to-speech implementation. Let’s now
    fill in the blanks for our `Voice` class. Also keep in mind that this is a first
    implementation, and I know in the future I will want to try other models.
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
- en: So instead of implementing the model specific code directly into the `Voice`
    class, I’ll create a child class that inherits from `Voice`.
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
- en: This way, I can do a quick switcharoo between different models without having
    to change the `Voice` class or unravel code that has become coupled.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  id: totrans-107
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'Now, this implementation allows us to simply import and instantiate this class
    at the point where we receive text from the agent, and stream it to the device
    speaker using:'
  id: totrans-108
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  id: totrans-109
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: SmartHome MCP Server Implementation
  id: totrans-110
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![](../Images/9a74cef65c286f6218dd28f9dbebb55a.png)'
  id: totrans-111
  prefs: []
  type: TYPE_IMG
- en: Photo by [Fajrul Islam](https://unsplash.com/@mfajruli?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on [Unsplash](https://unsplash.com/photos/icon-9sO9CKo37Rg?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
  id: totrans-112
  prefs: []
  type: TYPE_NORMAL
- en: This MCP server is dedicated to finding, connecting and managing smarthome devices.
    It lives in a separate repository, nicely separated from the voice assistant.
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
- en: At the time of writing, the only smarthome device I have is a Tapo Smart Plug.
    You can interact with Tapo devices by using the `python-kasa` library.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
- en: 'Our server needs to do the following:'
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
- en: Given a device name, turn it on or off.
  id: totrans-116
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Discover new devices and add them to the database.
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Update the device database with the latest device information — this includes
    the name of the device, the IP address and the MAC address.
  id: totrans-118
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 1\. Database
  id: totrans-119
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Firstly, let’s look at how we will store the device information in a SQL database.
    For simplicity I will choose `duckdb` as the database backend.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
- en: Devices Table
  id: totrans-121
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: We firstly define the schema for our first (and only) table called `device`.
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  id: totrans-123
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: The `device_id` is the primary key, and by definition need to uniquely identify
    all devices in our home. Luckily, each Tapo device has a unique device-id that
    we can use.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
- en: The `name` is what the user would be referencing as the device name. For example,
    in our case, the Tapo Smart Plug is connected to our living room light, and is
    named `lights`. This name is assigned via thee Tapo App.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
- en: Finally, the `ip_address` column will be the IP Address that is used to connect
    to the device in order to control it.
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
- en: DB Initialisation
  id: totrans-127
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: We create some helper functions like `get_create_table_if_not_exists_query`
    and `initialise_database` functions that we can call to invoke to create the DB
    on first startup.
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
- en: 'For brevity, I show just the `initialise_database` function since the former
    is self-explanatory:'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  id: totrans-130
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: Device management
  id: totrans-131
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Finally, we implement the code that will be interacting with the devices and
    updating the database.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  id: totrans-133
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: The three methods above will be the public methods that we register as tools
    for our Voice Assistant.
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
- en: We’ve omitted the private methods for brevity.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
- en: One thing that I’ve realised since writing this code is that `DeviceManager`
    is very `Tapo` specific. After having looked at integrating non-Tapo devices,
    I realised I’ve been naive to think that other smart device APIs would follow
    the same, standardised pattern.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
- en: So in the future, this class will need to be changed to `TapoDeviceManager`,
    and further abstractions will need to be made to accommodate this variability.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
- en: For example, recently I’ve got some Wiz lightbulbs for my bedroom. Turns out,
    the API does not fetch the names assigned to each device via the app, which was
    available in Tapo by default.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
- en: Therefore, I will need to think of some way to fetch this in the backend, or
    use the voice-assistant to populate it when it doesn’t exist.
  id: totrans-139
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Expose the tools to Voice-Assistant using FastMCP
  id: totrans-140
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Finally, we need to expose the methods we’ve written as tools for our voice
    assistant to use.
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  id: totrans-142
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: '`initialise_server` is where we initialise and pre-populate the database, and
    run the server.'
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
- en: Notice we populate the database on startup each time. This is necessary since
    device names could have been updated via the Tapo app between runs, so this is
    an attempt to fetch the most up-to-date information for all devices.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
- en: Now, I know there are some holes in the implementation — it’s a first attempt
    and an ongoing project, so if you see any issues or potential improvements please
    let me know via my Patreon account (see end of article).
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
- en: Server Entry Point
  id: totrans-146
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We use `typer` to make our server into a CLI app.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE14]'
  id: totrans-148
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: 'We then run the server `python3 -m smarthome_mcp_server`:'
  id: totrans-149
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  id: totrans-150
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: 4\. Using the SmartHome Tools
  id: totrans-151
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now that the server has been implemented, we can now define some methods that
    will interact with the server via a client. This client will be used to register
    the tools for the Voice Assistant to use.
  id: totrans-152
  prefs: []
  type: TYPE_NORMAL
- en: 'Coming back to the voice-assistant repo:'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  id: totrans-154
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: This method uses the convenient `MultiServerMCPClient` class to register our
    smarthome MCP server for tool usage.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
- en: The returned client object then exposes a `get_tools` method which returns all
    the tools that the registered servers expose.
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]'
  id: totrans-157
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: Note how we use `await` here given the `get_tools` method is asynchronous.
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
- en: 'By defining a function called `get_mcp_server_tools`:'
  id: totrans-159
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]'
  id: totrans-160
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: this single function can be imported into wherever we define our agent and register
    the tools for use.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
- en: Speech-to-text Implementation
  id: totrans-162
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![](../Images/a857b2b8a19ea775e81dedabb6e829c7.png)'
  id: totrans-163
  prefs: []
  type: TYPE_IMG
- en: Photo by [Franco Antonio Giovanella](https://unsplash.com/@francogio?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on [Unsplash](https://unsplash.com/photos/brown-donut-on-white-table-PVDWaEhSIAg?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
- en: Speech-to-text (STT) is where a lot of complexity comes in as it requires realtime
    IO processing.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
- en: STT itself is simple enough to achieve — there are plenty of models out there
    that we can use. But what makes it complex is the need to be able to *constantly*
    listen for a user’s voice input, which consists of a wakeword and a query.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
- en: A wakeword is what you normally use to trigger a voice assistant to start listening
    to you. For example, *“Hey Google”* or *“Hey Siri”*, or *“Alexa”*.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
- en: I could write this code entirely myself, but to make things simpler, I had a
    quick dig around just in case there was something pre-built that I could use.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
- en: And to my surprise, I found the package `RealtimeSTT` (link [here](https://github.com/KoljaB/RealtimeSTT))
    and it works perfectly.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
- en: How it works in a nutshell
  id: totrans-170
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Create a thread for listening to the user’s voice input. Another for transcribing,
    which runs the STT model.
  id: totrans-171
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: If a wakeword is detected, start recording the user’s voice input.
  id: totrans-172
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The recorded audio is then sent to the STT model for transcribing, and returns
    the transcribed text as a string.
  id: totrans-173
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'To use this package, all we need to do is use the `AudioToTextRecorder` class
    as a context manager like below:'
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE19]'
  id: totrans-175
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: We will come back to `get_response_stream` and `stream_voice` methods in the
    next section, since this also involves how we define our agent.
  id: totrans-176
  prefs: []
  type: TYPE_NORMAL
- en: But simply putting together the `AudioToTextRecorder` context manager in the
    way we have, we’ve got a working speech -> text -> response mechanism implemented.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
- en: If you were to simply replace the `get_response_stream` with any LLM agent,
    and replace the `stream_voice` with any text-to-speech agent, you would have a
    working voice assistant.
  id: totrans-178
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你将`get_response_stream`替换为任何LLM代理，并将`stream_voice`替换为任何文本到语音代理，你将拥有一个工作的语音助手。
- en: You could also use a simple `print` statement and you would have a rudimentary
    chat bot with voice input.
  id: totrans-179
  prefs: []
  type: TYPE_NORMAL
  zh: 你也可以使用简单的`print`语句，这样你就有了一个基本的语音输入聊天机器人。
- en: Agent Implementation
  id: totrans-180
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 代理实现
- en: Finally, the good stuff — the agent implementation.
  id: totrans-181
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，是好的东西 — 代理实现。
- en: I’ve left this as last since it’s a bit more involved. Let’s get stuck in.
  id: totrans-182
  prefs: []
  type: TYPE_NORMAL
  zh: 我把它放在最后，因为它稍微复杂一些。让我们深入探讨。
- en: LangGraph — What is it?
  id: totrans-183
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: LangGraph — 它是什么？
- en: LangGraph is a framework for building stateful, graph-based workflows with language
    model agents.
  id: totrans-184
  prefs: []
  type: TYPE_NORMAL
  zh: LangGraph是一个用于构建具有语言模型代理的状态化、基于图的流程框架。
- en: Nodes encapsulate any logic related to an action an LLM agent can take.
  id: totrans-185
  prefs: []
  type: TYPE_NORMAL
  zh: 节点封装了与LLM代理可以采取的动作相关的任何逻辑。
- en: Edges encapsulate the logic which determines how to transition from one node
    to another.
  id: totrans-186
  prefs: []
  type: TYPE_NORMAL
  zh: 边封装了确定如何从一个节点转换到另一个节点的逻辑。
- en: '`LangGraph` implements a prebuilt graph that we can get via the `create_react_agent`
    method. The graph looks like this:'
  id: totrans-187
  prefs: []
  type: TYPE_NORMAL
  zh: '`LangGraph`实现了一个预构建的图，我们可以通过`create_react_agent`方法获取它。图看起来像这样：'
- en: '![](../Images/6ddf3a06cf22c0081776a9039175130f.png)'
  id: totrans-188
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6ddf3a06cf22c0081776a9039175130f.png)'
- en: Image by author. Graph returned by `create_react_agent` method
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 图片由作者提供。由`create_react_agent`方法返回的图
- en: Let’s use this as an example to explain better how nodes and edges work.
  id: totrans-190
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们用这个例子来更好地解释节点和边是如何工作的。
- en: 'As you can see, the graph is very simple:'
  id: totrans-191
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，图非常简单：
- en: Given a query (the `__start__` node)
  id: totrans-192
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 给定一个查询（`__start__`节点）
- en: The `agent` node will receive the query and determine whether it needs to call
    a tool to be able to respond appropriately.
  id: totrans-193
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`agent`节点将接收查询并确定它是否需要调用工具才能适当地响应。'
- en: If it does, we transition to the `tool` node. Once the tool response is received,
    we go back to the `agent` node.
  id: totrans-194
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 如果是，我们转换到`tool`节点。一旦收到工具响应，我们就回到`agent`节点。
- en: The agent will repeatedly call the appropriate tools until it determines it
    has everything it needs.
  id: totrans-195
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: 代理将反复调用适当的工具，直到确定它拥有所需的一切。
- en: Then, it will return its response (the `__end__` node)
  id: totrans-196
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 然后，它将返回其响应（`__end__`节点）
- en: 'The conditional transition between the `agent`, `tools` and `__end__` node
    is represented as dashed lines. Then, the question is:'
  id: totrans-197
  prefs: []
  type: TYPE_NORMAL
  zh: '`agent`、`tools`和`__end__`节点之间的条件转换表示为虚线。那么问题是：'
- en: '*How do we determine which node to go to next?*'
  id: totrans-198
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '*我们如何确定下一个要访问的节点？*'
- en: Well, Langgraph maintains a log of the messages that have been sent, and this
    represents the state of the graph.
  id: totrans-199
  prefs: []
  type: TYPE_NORMAL
  zh: 好吧，Langgraph维护了已发送的消息日志，这代表了图的状态。
- en: The messages can come from the user, the agent, or a tool. In this example,
    the `agent` node will create a message that explicitly states that it will call
    a tool (exactly how will be revealed in the next section).
  id: totrans-200
  prefs: []
  type: TYPE_NORMAL
  zh: 消息可以来自用户、代理或工具。在这个例子中，`agent`节点将创建一个明确表示它将调用工具的消息（具体方法将在下一节中揭晓）。
- en: The presence of this tool call is what triggers the transition from the `agent`
    node to the `tools` node.
  id: totrans-201
  prefs: []
  type: TYPE_NORMAL
  zh: 这个工具调用的存在触发了从`agent`节点到`tools`节点的转换。
- en: If no tools are called, then the transition from the `agent` node to the `__end__`
    node is triggered.
  id: totrans-202
  prefs: []
  type: TYPE_NORMAL
  zh: 如果没有调用任何工具，则触发从`agent`节点到`__end__`节点的转换。
- en: It is this check for the presence of tool calls that is implemented in the conditional
    edge between the `agent`, `tools` and `__end__` nodes.
  id: totrans-203
  prefs: []
  type: TYPE_NORMAL
  zh: 这是在`agent`、`tools`和`__end__`节点之间的条件边中实现的工具调用存在性检查。
- en: In a future article, I’ll go into an example of how I created a custom agent
    graph to optimise for latency, and demonstrate how exactly these conditional edges
    and nodes are implemented.
  id: totrans-204
  prefs: []
  type: TYPE_NORMAL
  zh: 在未来的文章中，我将介绍如何创建一个定制的代理图以优化延迟，并展示这些条件边和节点是如何实现的。
- en: For now, we don’t need to go into too much detail about this since the prebuilt
    graph is good enough for the scope of this article.
  id: totrans-205
  prefs: []
  type: TYPE_NORMAL
  zh: 目前，我们不需要对此进行太多细节说明，因为预构建的图已经足够满足本文的范围。
- en: Our Agent Implementation
  id: totrans-206
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 我们的代理实现
- en: 'So, we define a function called `get_new_agent` like below:'
  id: totrans-207
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我们定义了一个名为`get_new_agent`的函数，如下所示：
- en: '[PRE20]'
  id: totrans-208
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: 'which is responsible for:'
  id: totrans-209
  prefs: []
  type: TYPE_NORMAL
  zh: 它负责：
- en: '**Initialising the LLM**'
  id: totrans-210
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: '**初始化LLM**'
- en: '`init_chat_model` returns the LLM from the specified provider. In our case,
    we use Ollama as our provider, and `llama3.2:latest` as our model type.'
  id: totrans-211
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`init_chat_model`返回指定提供者的LLM。在我们的案例中，我们使用Ollama作为我们的提供者，并使用`llama3.2:latest`作为我们的模型类型。'
- en: '**Defining the full set of tools that the agent will use.**'
  id: totrans-212
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: We have a function called `get_datetime_tools()` which returns a `list` of `StructuredTool`
    objects.
  id: totrans-213
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: We also have `server_tools`, which are the list of tools that our previously
    mentioned MCP server provides for home automation.
  id: totrans-214
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Additionally, If we wish to extend the set of tools the agent can use, this
    is the place to add them.
  id: totrans-215
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Construct the agent workflow given the LLM and its tools.**'
  id: totrans-216
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Here we call the `create_react_agent` function from LangGraph.
  id: totrans-217
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: The function can also take in `checkpointer` and `store` objects which are used
    to persist the state of the agent, acting as a short term and long term memory.
  id: totrans-218
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: In the future, if we want to use a custom graph, we can replace the `create_react_agent`
    function call with our own implementation.
  id: totrans-219
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Handling the Agent Response
  id: totrans-220
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now, we’ve so far implemented all the components that we need to
  id: totrans-221
  prefs: []
  type: TYPE_NORMAL
- en: Get the user query
  id: totrans-222
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Get the tools
  id: totrans-223
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Create the agent
  id: totrans-224
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: The next step is to run the agent to get a response for the query, and output
    it via the `Voice` method we defined earlier.
  id: totrans-225
  prefs: []
  type: TYPE_NORMAL
- en: 'Given the user query text that we’ve received from our STT implementation,
    we format it into a dictionary:'
  id: totrans-226
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE21]'
  id: totrans-227
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: This dictionary tells the agent that the message is from the user.
  id: totrans-228
  prefs: []
  type: TYPE_NORMAL
- en: 'We also add a system prompt to set the context and give instructions to the
    agent:'
  id: totrans-229
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE22]'
  id: totrans-230
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: 'These two messages are then passed into the agent to get a response:'
  id: totrans-231
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE23]'
  id: totrans-232
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: 'The response is a dictionary of messages (for brevity we omit any superfluous
    content):'
  id: totrans-233
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE24]'
  id: totrans-234
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: As you can see, the output is a list of all the messages that have been created
    throughout the graph execution.
  id: totrans-235
  prefs: []
  type: TYPE_NORMAL
- en: The first message will always be a `HumanMessage` or a `SystemMessage` since
    this is what we provided to the agent as input (i.e. the `__start__` node).
  id: totrans-236
  prefs: []
  type: TYPE_NORMAL
- en: The remaining are the messages that the agent or tools returned, in the order
    they were called.
  id: totrans-237
  prefs: []
  type: TYPE_NORMAL
- en: For example, you can see the first `AIMessage`, the message type generated by
    the LLM, has a tool call within it which uses a `get_current_time` tool.
  id: totrans-238
  prefs: []
  type: TYPE_NORMAL
- en: The presence of a `tool_calls` property in the `AIMessage` is what triggers
    the conditional transition from the `agent` node to the `tools` node.
  id: totrans-239
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/62e2eca712ea2928da72262f5cd9a76d.png)'
  id: totrans-240
  prefs: []
  type: TYPE_IMG
- en: Image by author. Graph with conditional edge from `agent` and `tools` highlighted
    in red.
  id: totrans-241
  prefs: []
  type: TYPE_NORMAL
- en: Then you see the `ToolMessage` which is the response that was returned by the
    `get_current_time` tool.
  id: totrans-242
  prefs: []
  type: TYPE_NORMAL
- en: Finally, the model responds with the actual response to the user query. The
    lack of a `tool_calls` property in the `AIMessage` means that the graph should
    transition to the `__end__` node and return the response.
  id: totrans-243
  prefs: []
  type: TYPE_NORMAL
- en: Reducing Latency
  id: totrans-244
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '![](../Images/abd2028fa97e5ed0b4c0b3f45d5d63f0.png)'
  id: totrans-245
  prefs: []
  type: TYPE_IMG
- en: Photo by [Lukas Blazek](https://unsplash.com/@goumbik?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on [Unsplash](https://unsplash.com/photos/person-holding-white-mini-bell-alarmclock-UAvYasdkzq8?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
  id: totrans-246
  prefs: []
  type: TYPE_NORMAL
- en: Coming back to invoking the agent to get a response, the issue with using the
    `invoke` method is that we wait for the entire workflow to complete before we
    get a response.
  id: totrans-247
  prefs: []
  type: TYPE_NORMAL
- en: This can take a long time, especially if the agent is addressing a complex query.
    Meanwhile, the user is waiting idly for the agent to respond, which results in
    a poor user experience.
  id: totrans-248
  prefs: []
  type: TYPE_NORMAL
- en: So to improve on this, we can use the `stream` mode in `LangGraph` to stream
    the response as they are generated.
  id: totrans-249
  prefs: []
  type: TYPE_NORMAL
- en: This allows us to start voicing the response as they come, rather than waiting
    for the entire response to be generated and then voicing it all in one go.
  id: totrans-250
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE25]'
  id: totrans-251
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: Here, `output_stream` is a generator that will yield a tuple of messages and
    message metadata, as they come.
  id: totrans-252
  prefs: []
  type: TYPE_NORMAL
- en: Note, there is an asynchronous version of this method called `astream`, which
    does exactly the same thing but returns an `AsyncIterator` instead.
  id: totrans-253
  prefs: []
  type: TYPE_NORMAL
- en: 'If we look at the messages we get after this change:'
  id: totrans-254
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE26]'
  id: totrans-255
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: You can now see the tokens are being returned as they are generated.
  id: totrans-256
  prefs: []
  type: TYPE_NORMAL
- en: But this poses a new problem!
  id: totrans-257
  prefs: []
  type: TYPE_NORMAL
- en: We can’t just give the TTS model individual tokens, since it will just pronounce
    each token one by one, i.e. `"It"`, `"'s"` will be pronounced separately, which
    is definitely not what we want.
  id: totrans-258
  prefs: []
  type: TYPE_NORMAL
- en: '**So, there is a tradeoff that we need to make**'
  id: totrans-259
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: While we need to stream the response to minimise user wait time, will still
    need to wait to accumulate enough tokens that form a meaningful chunk, before
    sending them to the TTS model.
  id: totrans-260
  prefs: []
  type: TYPE_NORMAL
- en: Building Output Chunks
  id: totrans-261
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: We therefore handle this complexity by defining an `OutputChunkBuilder`. So
    what constitutes a *meaningful* chunk?
  id: totrans-262
  prefs: []
  type: TYPE_NORMAL
- en: The first thing that comes to mind is to wait until a full sentence, i.e. append
    all the tokens until it ends with one of `.`, `?`, `;`, `!`.
  id: totrans-263
  prefs: []
  type: TYPE_NORMAL
- en: From trial and error, it has also proven wise to include `\n` in this list as
    well, when we get a particularly long response from the agent that uses bullet
    points.
  id: totrans-264
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE27]'
  id: totrans-265
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: We achieve this with the above code, consisting of one function that appends
    message chunks together into a buffer called `_msg`, and one to check if the collated
    messages are ready (i.e. is it a full sentence or does it end with a new line).
  id: totrans-266
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE28]'
  id: totrans-267
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: We also implement the `get_output_chunk` function which will return the messages
    collated so far, and also reset the message buffer to an empty string so that
    it is ready for collating the next set of chunks.
  id: totrans-268
  prefs: []
  type: TYPE_NORMAL
- en: 'This enables us to use logic like below to stream the response, sentence by
    sentence:'
  id: totrans-269
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE29]'
  id: totrans-270
  prefs: []
  type: TYPE_PRE
  zh: '[PRE29]'
- en: Tools Implementation
  id: totrans-271
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '![](../Images/adb3bf4aad5a3c93e6ce005286f6cab0.png)'
  id: totrans-272
  prefs: []
  type: TYPE_IMG
- en: Photo by [Barn Images](https://unsplash.com/@barnimages?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
    on [Unsplash](https://unsplash.com/photos/assorted-handheld-tools-in-tool-rack-t5YUoHW6zRo?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash)
  id: totrans-273
  prefs: []
  type: TYPE_NORMAL
- en: Lastly, let’s look at how we can implement the tools required to get the current
    date and time.
  id: totrans-274
  prefs: []
  type: TYPE_NORMAL
- en: This is very straightforward, by far the easiest implementation. Any function
    that you create can be used as a tool as long as the docstrings are well-written
    and formatted clearly.
  id: totrans-275
  prefs: []
  type: TYPE_NORMAL
- en: 'There are two main ways to mark a function as a tool:'
  id: totrans-276
  prefs: []
  type: TYPE_NORMAL
- en: Using the `@tool` decorator from `langchain_core.tools`
  id: totrans-277
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Using the `StructuredTool` class from `langchain_core.tools.structured`
  id: totrans-278
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: For easier unit testing of our tools, we opt for the second option since the
    first option does not allow us to import the tool function into our tests.
  id: totrans-279
  prefs: []
  type: TYPE_NORMAL
- en: 'First, write the functions to get the time and date as we would do normally:'
  id: totrans-280
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE30]'
  id: totrans-281
  prefs: []
  type: TYPE_PRE
  zh: '[PRE30]'
- en: Additionally, we write a simple wrapper function called `get_now_datetime` that
    returns the current `datetime`, which also makes it easier to mock in our unit
    tests.
  id: totrans-282
  prefs: []
  type: TYPE_NORMAL
- en: Next, a function for getting the current date.
  id: totrans-283
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE31]'
  id: totrans-284
  prefs: []
  type: TYPE_PRE
  zh: '[PRE31]'
- en: We have to be careful here — different text-to-speech (TTS) models have varying
    abilities when it comes to text normalisation.
  id: totrans-285
  prefs: []
  type: TYPE_NORMAL
- en: '**Example**'
  id: totrans-286
  prefs: []
  type: TYPE_NORMAL
- en: If the function `get_current_date` returns the string `01-01-2025`, the TTS
    model may pronounce this as ‘*oh one oh one twenty twenty five*‘.
  id: totrans-287
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: To make our implementation robust to such differences, we normalise the date
    string to be clearer in how the date should be pronounced using the `_convert_date_to_words`
    function.
  id: totrans-288
  prefs: []
  type: TYPE_NORMAL
- en: In doing so, we convert a `datetime` object like `datetime(2025, 1, 1)` into
    `January 1st, 2025`.
  id: totrans-289
  prefs: []
  type: TYPE_NORMAL
- en: 'Finally, we write a `get_tools` function which will wrap up the `get_current_time`
    and `get_current_date` methods into a `StructuredTool`, and return them in a list:'
  id: totrans-290
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE32]'
  id: totrans-291
  prefs: []
  type: TYPE_PRE
  zh: '[PRE32]'
- en: thereby allowing us to import this function and callling it when we create the
    agent, as we saw in the agent implementation section.
  id: totrans-292
  prefs: []
  type: TYPE_NORMAL
- en: Putting it all together to build our Agent
  id: totrans-293
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Now, we’ve gone through the individual components that make up our voice assistant,
    time to assemble them together.
  id: totrans-294
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE33]'
  id: totrans-295
  prefs: []
  type: TYPE_PRE
  zh: '[PRE33]'
- en: 'Firstly, we load in our Yaml config file using `OmegaConf` (link [here](https://omegaconf.readthedocs.io/en/2.3_branch/)).
    The `settings` module and the `load_config` implementation is like below:'
  id: totrans-296
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE34]'
  id: totrans-297
  prefs: []
  type: TYPE_PRE
  zh: '[PRE34]'
- en: Secondly, we use SQL databases to store our short and long term memory — this
    is done using the `AsyncSqliteSaver` and `AsyncSqliteStore` classes from the `checkpoint`
    and `store` modules in `langgraph`.
  id: totrans-298
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE35]'
  id: totrans-299
  prefs: []
  type: TYPE_PRE
  zh: '[PRE35]'
- en: Then, in a while loop, the STT thread records the user’s voice input after a
    wakeword is detected, which is then passed to the agent for processing.
  id: totrans-300
  prefs: []
  type: TYPE_NORMAL
- en: The agent response is returned as an AsyncIterator, which we then stream to
    the device speakers using the `stream_voice` function.
  id: totrans-301
  prefs: []
  type: TYPE_NORMAL
- en: 'The `stream_voice` function looks like this:'
  id: totrans-302
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE36]'
  id: totrans-303
  prefs: []
  type: TYPE_PRE
  zh: '[PRE36]'
- en: Which is the same logic as we already discussed before in the `Building Output
    Chunks` section, but with some small tweaks.
  id: totrans-304
  prefs: []
  type: TYPE_NORMAL
- en: It turns out, not all responses end with a punctuation mark.
  id: totrans-305
  prefs: []
  type: TYPE_NORMAL
- en: For example, when the LLM uses bullet points in their response, I’ve found they
    omit the punctuation for each bullet point.
  id: totrans-306
  prefs: []
  type: TYPE_NORMAL
- en: So, we make sure to flush our buffer at the end if it isn’t empty.
  id: totrans-307
  prefs: []
  type: TYPE_NORMAL
- en: We also filter out any messages that are not from the agent, as we don’t want
    to stream the user’s input or the tool responses back to the device speakers.
    We do this by checking the `langgraph_node` metadata key, and only speaking the
    message if it comes from the agent.
  id: totrans-308
  prefs: []
  type: TYPE_NORMAL
  zh: 我们还过滤掉任何不是来自代理的消息，因为我们不想将用户的输入或工具的响应流回设备扬声器。我们通过检查`langgraph_node`元数据键来完成这项工作，并且只有当消息来自代理时才说话。
- en: And turns out, that’s all you need to build a fully functioning voice assistant.
  id: totrans-309
  prefs: []
  type: TYPE_NORMAL
  zh: 结果证明，这就是构建一个完全功能化的语音助手所需的一切。
- en: Final Remarks
  id: totrans-310
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 最后的话
- en: Overall, I’ve been pleasantly surprised at how easy it was to build this out.
  id: totrans-311
  prefs: []
  type: TYPE_NORMAL
  zh: 总体来说，我对构建这个系统如此容易感到非常惊喜。
- en: Sure, there are certainly more optimisations that can be made, but given I’ve
    been able to get the full functionality working within two weeks (whilst working
    a full-time job), I’m happy with the results.
  id: totrans-312
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，还有更多的优化可以做出，但考虑到我能够在两周内（同时全职工作）使所有功能正常工作，我对结果感到满意。
- en: But we’re not done yet.
  id: totrans-313
  prefs: []
  type: TYPE_NORMAL
  zh: 但我们还没有完成。
- en: There are a whole load of things I couldn’t discuss to stop this article becoming
    an entire book, such as the additional optimisations I’ve had to make to make
    the voice assistant quicker, so this will be covered in my next article.
  id: totrans-314
  prefs: []
  type: TYPE_NORMAL
  zh: 有很多事情我无法讨论，以免这篇文章变成一本书，例如我为了使语音助手更快而必须做出的额外优化，这些内容将在我的下一篇文章中介绍。
- en: For those of you who enjoyed this article, check out my other articles on Medium,
    at [https://medium.com/@bl3e967](https://medium.com/@bl3e967)
  id: totrans-315
  prefs: []
  type: TYPE_NORMAL
  zh: 对于喜欢这篇文章的你们，可以在Medium上查看我的其他文章，请访问[https://medium.com/@bl3e967](https://medium.com/@bl3e967)
