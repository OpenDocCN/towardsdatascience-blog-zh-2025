- en: 'GraphRAG in Action: A Simple Agent for Know-Your-Customer Investigations'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/graphrag-in-action/](https://towardsdatascience.com/graphrag-in-action/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1751568872317" class="mdspan-comment">In</mdspan> the world
    of financial services, Know-Your-Customer (KYC) and Anti-Money Laundering (AML)
    are critical defense lines against illicit activities. KYC is naturally modelled
    as a graph problem, where customers, accounts, transactions, IP addresses, devices,
    and locations are all interconnected nodes in a vast network of relationships.
    Investigators sift through these complex webs of connections, trying to connect
    seemingly disparate dots to uncover fraud, sanctions violations, and money laundering
    rings.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
- en: This is a great use case for AI grounded by a knowledge graph (GraphRAG). The
    intricate web of connections requires capabilities beyond standard document-based
    RAG (typically based on vector similarity search and reranking techniques).
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: Disclosure
  id: totrans-4
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: I am a [Senior Product Manager for AI at Neo4j](https://www.linkedin.com/in/edsandovaluk/),
    the graph database featured in this post. Although the snippets focus on Neo4j,
    the same patterns can be applied with any graph database. My main aim is to share
    practical guidance on building GraphRAG agents with the AI/ML community. All code
    in the [linked repository](https://github.com/neo4j-product-examples/graphrag-kyc-agent)
    is open-source and free for you to explore, experiment with, and adapt.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: All <mdspan datatext="el1751569449252" class="mdspan-comment">images</mdspan>
    in this blog post were created by the author.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: A GraphRAG KYC Agent
  id: totrans-7
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: This blog post provides a hands-on guide for AI engineers and developers on
    how to build an initial KYC agent prototype with the [OpenAI Agents SDK](https://openai.github.io/openai-agents-python/). We’ll
    explore how to equip our agent with a suite of tools to uncover and investigate
    potential fraud patterns.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: The diagram below illustrates the agent processing pipeline to answer questions
    raised during a KYC investigation.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
- en: '![Image by the Author, generated with Napkin AI](../Images/227447a55a10b3cd3b2e8ea4ac7d46ef.png)'
  id: totrans-10
  prefs: []
  type: TYPE_IMG
- en: Image by the Author generated using [Napkin AI](https://www.napkin.ai/)
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s walk through the major components:'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
- en: '**The KYC Agent**: It leverages the OpenAI Agents SDK and acts as the “brain,”
    deciding which tool to use based on the user’s query and the conversation history.
    It plays the role of MCP Host and MCP client to the [Neo4j MCP Cypher Server](https://neo4j.com/developer/genai-ecosystem/model-context-protocol-mcp/#_mcp_neo4j_cypher).
    Most importantly, it runs a very simple loop that takes a question from the user,
    invokes the agent, and processes the results, while keeping the conversation history.'
  id: totrans-13
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**The Toolset.** A collection of tools available to the agent.'
  id: totrans-14
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'GraphRAG Tools: These are Graph data retrieval functions that wrap a very specific
    Cypher query. For example:'
  id: totrans-15
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Get Customer Details: A graph retrieval tool that given a Customer ID, it retrieves
    information about a customer, including their accounts and recent transaction
    history.'
  id: totrans-16
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Neo4j MCP Server: [A Neo4j MCP Cypher Server](https://neo4j.com/developer/genai-ecosystem/model-context-protocol-mcp/#_mcp_neo4j_cypher)
    exposing tools to interact with a Neo4j database. It provides three essential
    tools:'
  id: totrans-17
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Get Schema from the Database.
  id: totrans-18
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Run a READ Cypher Query against the database
  id: totrans-19
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: Run a WRITE Cypher QUery against the database
  id: totrans-20
  prefs:
  - PREF_IND
  - PREF_IND
  - PREF_OL
  type: TYPE_NORMAL
- en: 'A Text-To-Cypher tool: A python function wrapping a fine-tuned Gemma3-4B model
    running locally via Ollama. The tool translates natural language questions into
    Cypher graph queries.'
  id: totrans-21
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'A Memory Creation tool: This tool enables investigators to document their findings
    directly in the knowledge graph. It creates a “memory” (of an investigation) in
    the knowledge graph and links it to all relevant customers, transactions, and
    accounts. Over time, this helps build an invaluable knowledge base for future
    investigations.'
  id: totrans-22
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 'A KYC Knowledge Graph: A Neo4j database storing a knowledge graph of 8,000
    fictitious customers, their accounts, transactions, devices and IP addresses.
    It is also used as the agent’s long-term memory store.'
  id: totrans-23
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Want to try out the agent now?** Just follow the [instructions on the project
    repo](https://github.com/neo4j-product-examples/graphrag-kyc-agent). You can come
    back and read how the agent was built later.'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
- en: Why GraphRAG for KYC?
  id: totrans-25
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Traditional RAG systems focus on finding information within large bodies of
    text that are chunked up into fragments. KYC investigations rely on finding interesting
    patterns in a complex web of interconnected data – customers linked to accounts,
    accounts connected through transactions, transactions tied to IP addresses and
    devices, and customers associated with personal and employer addresses.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
- en: Understanding these relationships is key to uncovering sophisticated fraud patterns.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
- en: “Does this customer share an IP address with someone on a watchlist?”
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: “Is this transaction part of a circular payment loop designed to obscure the
    source of funds?”
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: “Are multiple new accounts being opened by individuals working for the same,
    newly-registered, shell company?”
  id: totrans-30
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These are questions of connectivity. A knowledge graph, where customers, accounts,
    transactions, and devices are nodes and their relationships are explicit edges,
    is the ideal data structure for this task. GraphRAG (data retrieval) tools make
    it simple to identify unusual patterns of activity.
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
- en: '![Image by the Author generated with Napkin AI](../Images/a05f8a7903245fe8b98ee0b8e8003d89.png)'
  id: totrans-32
  prefs: []
  type: TYPE_IMG
- en: Image by the Author generated using [Napkin AI](https://www.napkin.ai/)
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
- en: A Synthetic KYC Dataset
  id: totrans-34
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: For the purposes of this blog, I have created a synthetic dataset with 8,000
    fictitious customers and their accounts, transactions, registered addresses, devices
    and IP addresses.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: 'The image below shows the “schema” of the database after the dataset is loaded
    into Neo4j. In Neo4j, a schema describes the type of entities and relationships
    stored in the database. In our case, the main entities are: Customer, Address,
    Accounts, Device, IP Address, Transactions. The main relationships amongst them
    are as illustrated below.'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
- en: '![Image by the Author](../Images/cb9b99d906d6c3a37327f648a5bc8806.png)'
  id: totrans-37
  prefs: []
  type: TYPE_IMG
- en: The dataset contains a few anomalies. Some customers are involved in suspicious
    transaction rings. There are a few isolated devices and IP addresses (not linked
    to any customer or account). There are some addresses shared by a large number
    of customers. Feel free to explore the synthetic [dataset generation script](https://github.com/neo4j-product-examples/graphrag-kyc-agent/blob/main/generate_kyc_dataset.py),
    if you want to understand or modify the dataset to your requirements.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
- en: A Basic Agent with OpenAI Agents SDK
  id: totrans-39
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let’s walk through the **key parts** of our KYC Agent.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
- en: The implementation is mostly within [kyc_agent.py](https://github.com/neo4j-product-examples/graphrag-kyc-agent/blob/main/kyc_agent.py).
    The full source code and step-by-step instructions on how to run the agent are
    available on [Github](https://github.com/neo4j-product-examples/graphrag-kyc-agent).).
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
- en: First, let’s define the agent’s core identity with suitable instructions.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  id: totrans-43
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: The **instructions** are crucial. They set the agent’s persona and provide a
    high-level strategy for how to approach problems, especially when a pre-defined
    tool doesn’t fit the user’s request.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
- en: Now, let’s start with a minimal agent. No tools. Just the instructions.
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  id: totrans-46
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: Let’s add some tools to our KYC Agent
  id: totrans-47
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: An agent is only as good as its tools. Let’s examine five tools we’re giving
    our KYC analyst.
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
- en: 'Tool 1 & 2: Pre-defined Cypher Queries'
  id: totrans-49
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: For common and critical queries, it’s best to have optimized, pre-written Cypher
    queries wrapped in Python functions. You can use the **@function_tool** decorator
    from the OpenAI Agent SDK to make these functions available to the agent.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
- en: 'Tool 1: `find_customer_rings`'
  id: totrans-51
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: This tool is designed to detect recursive patterns characteristic of money laundering,
    specifically ‘circular transactions’ where funds cycle through multiple accounts
    to disguise their origin.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
- en: In KYC graph, this translates directly to finding cycles or paths that return
    to or near their starting point within a directed transaction graph. Implementing
    such detection involves complex graph traversal algorithms, often utilizing variable-length
    paths to explore connections up to a certain ‘hop’ distance.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
- en: 'The code snippet below shows a **find_customer_rings** function that executes
    a Cypher Query against the KYC database and returns up to 10 potential customer
    rings. For each rings, the following information is returned: the customers accounts
    and transactions involved in those rings.'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  id: totrans-55
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: It is worth noting that the documentation string (doc string) is automatically
    used by OpenAI Agents SDK as the tool description! So good Python function documentation
    pays off!.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 值得注意的是，文档字符串（doc string）被OpenAI Agents SDK自动用作工具描述！所以好的Python函数文档是值得的！
- en: 'Tool 2: `get_customer_and_accounts`'
  id: totrans-57
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 工具 2：`get_customer_and_accounts`
- en: A simple, yet essential, tool for retrieving a customer’s profile, including
    their accounts and most recent transactions. This is the bread-and-butter of any
    investigation. The code is similar to our previous tool – a function that takes
    a customer ID and wraps around a simple Cypher query.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 一个简单但至关重要的工具，用于检索客户的资料，包括他们的账户和最近的交易。这是任何调查的基础。代码与我们之前的工具类似——一个接受客户ID并围绕简单的Cypher查询包装的函数。
- en: Once again, the function is decorated with **@function_tool** to make it available
    to the agent.
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 再次强调，该函数被装饰为**@function_tool**，以便可供代理使用。
- en: The Cypher query wrapped by this Python is shown below
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 下面展示了由Python包装的Cypher查询
- en: '[PRE3]'
  id: totrans-61
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: A notable aspect of this tool’s design is the use of Pydantic to specify the
    function’s output. The OpenAI AgentsSDK uses Pydantic models returned by the function
    to automatically generate a text description of the output parameters.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 该工具设计的一个显著方面是使用Pydantic来指定函数的输出。OpenAI AgentsSDK使用函数返回的Pydantic模型自动生成输出参数的文本描述。
- en: If you look carefully, the function returns
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你仔细观察，该函数返回
- en: '[PRE4]'
  id: totrans-64
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: The *CustomerModel* and *AccountModel*include each of the properties returned
    for each Customer, its accounts and a list of recent transactions. You can see
    their definition in [schemas.py](https://github.com/neo4j-product-examples/graphrag-kyc-agent/blob/main/schemas.py).
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: '*CustomerModel*和*AccountModel*包括每个客户返回的属性，其账户以及最近交易列表。你可以在[schemas.py](https://github.com/neo4j-product-examples/graphrag-kyc-agent/blob/main/schemas.py)中看到它们的定义。'
- en: 'Tools 3 & 4: Where Neo4j MCP Server meets Text-To-Cypher'
  id: totrans-66
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 工具 3 & 4：Neo4j MCP服务器与Text-To-Cypher的相遇
- en: This is where our KYC agent gets some more interesting powers.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是我们的KYC代理获得更多有趣能力的地方。
- en: A significant challenge in building versatile AI agents is enabling them to
    interact dynamically with complex data sources, beyond pre-defined, static functions.
    Agents need the ability to perform general-purpose querying where new insights
    might require spontaneous data exploration without requiring *a priori* Python
    wrappers for every possible action.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 在构建多才多艺的AI代理时，一个重大挑战是使它们能够与复杂的数据源动态交互，而不仅仅是预定义的静态函数。代理需要执行通用查询的能力，新的见解可能需要即兴的数据探索，而不需要为每个可能的行为提供先验的Python包装器。
- en: This section explores a common architectural pattern to address this. A tool
    to translate natural language question into Cypher coupled with another tool to
    allow dynamic query execution.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 本节探讨了处理此问题的常见架构模式。一个将自然语言问题翻译成Cypher的工具，以及另一个允许动态查询执行的工具。
- en: We demonstrate this mechanism using the **[Neo4 MCP Server](https://neo4j.com/developer/genai-ecosystem/model-context-protocol-mcp/#_mcp_neo4j_cypher)**
    to expose dynamic graph query execution and a **Google [Gemma3-4B fine-tuned](https://neo4j.com/blog/news/text2cypher-vertex-ai/)
    model** for Text-to-Cypher translation.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 我们使用**[Neo4 MCP服务器](https://neo4j.com/developer/genai-ecosystem/model-context-protocol-mcp/#_mcp_neo4j_cypher)**来展示动态图查询执行，以及一个**Google
    [Gemma3-4B微调](https://neo4j.com/blog/news/text2cypher-vertex-ai/)模型**用于Text-to-Cypher翻译。
- en: 'Tool 3: Adding the Neo4j MCP server toolset'
  id: totrans-71
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 工具 3：添加Neo4j MCP服务器工具集
- en: For a robust agent to operate effectively with a knowledge graph, it needs to
    understand the graph’s structure and to execute Cypher queries. These capabilities
    enable the agent to introspect the data and execute dynamic ad-hoc queries.
  id: totrans-72
  prefs: []
  type: TYPE_NORMAL
  zh: 对于一个健壮的代理能够有效地与知识图谱操作，它需要理解图的结构并执行Cypher查询。这些能力使代理能够内省数据并执行动态的即兴查询。
- en: 'The MCP Neo4j Cypher server provides the basic tools: `get-neo4j-schema` (to
    retrieve graph schema dynamically), `read-neo4j-cypher` (for executing arbitrary
    read queries), and `write-neo4j-cypher` (for create, update, delete queries).'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: MCP Neo4j Cypher服务器提供了基本工具：`get-neo4j-schema`（用于动态检索图模式），`read-neo4j-cypher`（用于执行任意读取查询），以及`write-neo4j-cypher`（用于创建、更新、删除查询）。
- en: Fortunately, the OpenAI Agents SDK has support for MCP. The code snippet below
    shows how easy it is to add the Neo4j MCP Server to our KYC Agent.
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: 幸运的是，OpenAI Agents SDK支持MCP。下面的代码片段显示了将Neo4j MCP服务器添加到我们的KYC代理是多么简单。
- en: '[PRE5]'
  id: totrans-75
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: You can learn more [about how MCP is supported in OpenAI Agents SDK here](https://openai.github.io/openai-agents-python/mcp/).
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在[这里](https://openai.github.io/openai-agents-python/mcp/)了解更多关于MCP在OpenAI
    Agents SDK中支持的信息。
- en: 'Tool 4: A Text-To-Cypher Tool'
  id: totrans-77
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The ability to dynamically translate natural language into powerful graph queries
    often relies on **specialized Large Language Models (LLMs)** – finetuned with
    schema-aware query generation.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
- en: We can use open weights, publicly available Text-to-Cypher models available
    on Huggingface, such as [neo4j/text-to-cypher-Gemma-3-4B-Instruct-2025.04.0](https://huggingface.co/neo4j/text-to-cypher-Gemma-3-4B-Instruct-2025.04.0).
    This model was specifically finetuned to generate accurate Cypher queries from
    user question and a schema.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
- en: In order to run this model on a local device, we can turn to Ollama. Using [Llama.cpp](https://github.com/ggml-org/llama.cpp),
    it is relatively straightforward to convert any HuggingFace models to GGUF format,
    which is required to run a model in Ollama. Using the [‘convert-hf-to-GGUF’](https://github.com/ggml-org/llama.cpp/blob/master/convert_hf_to_gguf.py)
    python script, I generated a GGUF version of the Gemma3-4B finetuned model and
    uploaded it to Ollama.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
- en: 'If you are an Ollama user, you can download this model to your local device
    with:'
  id: totrans-81
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE6]'
  id: totrans-82
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: What happens when a user asks a question that doesn’t match any of our pre-defined
    tools?
  id: totrans-83
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: For example, “For customer CUST_00001, find his addresses and check if they
    are shared with other customers”
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
- en: Instead of failing, our agent can generate a Cypher query on the fly…
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE7]'
  id: totrans-86
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: The `generate_cypher` tool addresses the challenge of Cypher query generation,
    but how does the agent know when to use this tool? The answer lies in the agent
    instructions.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
- en: 'You may remember that at the start of the blog, we defined the instructions
    for the agent as follows:'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  id: totrans-89
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: This time, note the specific instructions to handle ad-hoc queries that can
    not be answered by the graph retrieval based tools.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
- en: 'When the agent goes down this path, it goes through following steps:'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
- en: The agent gets a novel question.
  id: totrans-92
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: It first calls **`neo4j-mcp-server.get-neo4j-schema`** to get the schema of
    the database.
  id: totrans-93
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: It then feeds the schema and the user’s question to the **`generate_cypher`**
    tool. This will generate a Cypher query.
  id: totrans-94
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Finally, it takes the generated Cypher query and run it using **`neo4j-mcp-server.read-neo4j-cypher`.**
  id: totrans-95
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: If there are errors, in either the cypher generation or the execution of the
    cypher, the agent retries to generate Cypher and rerun it.
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
- en: 'As you can see, the above approach is not bullet-proof. It relies heavily on
    the Text-To-Cypher model to produce valid and correct Cypher. In most cases, it
    works. However, in cases where it doesn’t, you should consider:'
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
- en: Defining explicit Cypher retrieval tools for this type of questions.
  id: totrans-98
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Adding some form of end user feedback (thumbs up / down) in your UI/UX. This
    will help flag questions that the agent is struggling with. You can then decide
    best approach to handle this class of questions. (e.g cypher retrieval tool, better
    instructions, improvement to text2cypher model, guardrails or just get your agent
    to politely decline to answer the question).
  id: totrans-99
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Tool 5 – Adding Memory to the KYC Agent
  id: totrans-100
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: The topic of agent memory is getting lots of attention lately.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
- en: While agents inherently manage *short-term memory* through conversational history,
    complex, multi-session tasks like financial investigations demand a more persistent
    and evolving *long-term memory*.
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
- en: This long-term memory isn’t just a log of past interactions; it’s a dynamic
    knowledge base that can accumulate insights, track ongoing investigations, and
    provide context across different sessions and even different agents.
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
- en: The `create_memory` tool implements a form of explicit knowledge graph memory,
    where summaries of investigations are stored as dedicated nodes and explicitly
    linked to relevant entities (customers, accounts, transactions).
  id: totrans-104
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  id: totrans-105
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: 'Additional considerations for implementing “agent memory” include:'
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
- en: Memory Architectures: Exploring different types of memory (episodic, semantic,
    procedural) and their common implementations (vector databases for semantic search,
    relational databases, or knowledge graphs for structured insights).
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Contextualization: How the knowledge graph structure allows for rich contextualization
    of memories, enabling powerful retrieval based on relationships and patterns,
    rather than just keyword matching.
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Update and Retrieval Strategies: How memories are updated over time (e.g., appended,
    summarized, refined) and how they are retrieved by the agent (e.g., through graph
    traversal, semantic similarity, or fixed rules).
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Challenges: The complexities of managing memory consistency, handling conflicting
    information, preventing ‘hallucinations’ in memory retrieval, and ensuring the
    memory remains relevant and up-to-date without becoming overly large or noisy.”
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This is an area of active development and rapidly evolving with many frameworks
    addressing some of the considerations above.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
- en: Putting it all together – An Example Investigation
  id: totrans-112
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Let’s see how our agent handles a typical workflow. You can run this yourself
    (or feel free to follow along step-by-step instructions on the [KYC agent github
    repo](https://github.com/neo4j-product-examples/graphrag-kyc-agent))
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
- en: 1. **“Get me the schema of the database**“
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
- en: 'Agent Action: The agent identifies this as a schema query and uses the Neo4j
    MCP Server’s ***`get-neo4j-schema`*** tool.'
  id: totrans-115
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 2. “**Show me 5 watchlisted customers involved in suspicious rings**“
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
- en: 'Agent Action: This directly matches the purpose of our custom tool. The agent
    calls **`*find_customer_rings*`** with ***`customer_in_watchlist=True`***.'
  id: totrans-117
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 3. **“For each of these customers, find their addresses and find out if they
    are shared with other customers**“.
  id: totrans-118
  prefs: []
  type: TYPE_NORMAL
- en: 'Agent Action: This is a question that can’t be answered with any of the GraphRAG
    tools. The agent should follow its instructions:'
  id: totrans-119
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: It already has the schema (from our first interaction above).
  id: totrans-120
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: It calls ***`generate_cypher`*** with the question and schema. The tool returns
    a Cypher query that tries to answer the investigator’s question.
  id: totrans-121
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: It executes this Cypher query using the Neo4j MCP Cypher Server ***`read-neo4j-cypher`***
    tool.
  id: totrans-122
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: 4. “**For the customer whose address is shared , can you get me more details**“
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
- en: 'Agent Action: The agent determines that the ***`get_customer_and_accounts`***
    tool is the perfect fit and calls it with the customer’s ID.'
  id: totrans-124
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 5. “**Write a 300-word summary of this investigation. Store it as a memory.
    Make sure to link it to every account and transaction belonging to this customer**“.
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
- en: Agent Action: The agent first uses its internal LLM capabilities to generate
    the summary. Then, it calls the ***`create_memory`*** tool, passing the summary
    text and the list of all customer, account, and transaction IDs it has encountered
    during the conversation.
  id: totrans-126
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Key Takeaways
  id: totrans-127
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'If you got this far, I hope you enjoyed the journey of getting familiar with
    a basic implementation of a KYC GraphRAG Agent. Lots of cool technologies here:
    OpenAI Agent SDK, MCP, Neo4j, Ollama and a Gemma3-4B finetuned Text-To-Cypher
    model!'
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
- en: 'I hope you gained some appreciation for:'
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
- en: GraphRAG, or more specifically Graph-powered data retrieval as an essential
    for connected-data problems. It allows agents to answer questions on heavily connected
    data that would be impossible to answer with standard RAG.
  id: totrans-130
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The importance of a balanced toolkit is powerful. Combine MCP Server tools with
    your own optimized tools.
  id: totrans-131
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: MCP Servers are a game-changer. They allow you to connect your agents to an
    increasing set of MCP servers.
  id: totrans-132
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Experiment with [more MCP Servers](https://github.com/modelcontextprotocol/servers)
    so you get a better sense of the possibilities.
  id: totrans-133
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Agents should be able to write back to your data store in a controlled way.
  id: totrans-134
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In our example we saw how an analyst can persist its findings (e.g., adding
    **Memory** nodes to the knowlege graph) and in the process creating a virtuous
    cycle where the agent improves the underlying knowledge base for entire teams
    of investigators.
  id: totrans-135
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: The agent adds information to the knowledge graph and it never updates or deletes
    existing information.
  id: totrans-136
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: The patterns and tools discussed here are not limited to KYC. They can be applied
    to supply chain analysis, digital twin management, drug discovery, and any other
    domain where the relationships between data points are as important as the data
    itself.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
- en: The era of graph-aware AI agents is here.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
- en: What’s Next?
  id: totrans-139
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: You have built a simple AI agent on top of OpenAI Agents SDK with MCP, Neo4j
    and a Text-to-Cypher model. **All running on a single device**.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
- en: 'While this initial agent provides a strong foundation, transitioning to a production-level
    system involves addressing several additional requirements, such as:'
  id: totrans-141
  prefs: []
  type: TYPE_NORMAL
- en: 'Agent UI/UX: This is the central part for your users to interact with your
    agent. This will ultimately be a key driver of the adoption and success of your
    agent.'
  id: totrans-142
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Long running tasks and multiagent systems: Some tasks are valuable but take
    a significant amount of time to run. In these cases, agents should be able to
    offload parts of their workload to other agents.'
  id: totrans-143
  prefs:
  - PREF_IND
  type: TYPE_NORMAL
- en: OpenAI does provide some support for handing off to subagents but it might not
    be suitable for long-running agents.
  id: totrans-144
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: Agent Guardrails – OpenAI Agents SDK provides some support for Guardrails.
  id: totrans-145
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Agent Hosting – It exposes your agent to your users.
  id: totrans-146
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Securing comms to your agent – End user authentication and authorization to
    your agent.
  id: totrans-147
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Database access controls – Managing access control to the data stored in the
    KYC Knowledge Graph.
  id: totrans-148
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Conversation History.
  id: totrans-149
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Agent Observability.
  id: totrans-150
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Agent Memory.
  id: totrans-151
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Agent Evaluation – What is the impact of changing agent instruction and or adding/removing
    a tool?.
  id: totrans-152
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: And more…
  id: totrans-153
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: In the meantime, I hope this has inspired you to keep learning and experimenting!.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
