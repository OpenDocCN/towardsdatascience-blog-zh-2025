- en: A Visual Guide to Tuning Random Forest Hyperparameters
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/a-visual-guide-to-tuning-random-forest-hyperparameters/](https://towardsdatascience.com/a-visual-guide-to-tuning-random-forest-hyperparameters/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1756964008715" class="mdspan-comment">Introduction</mdspan>
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In my [previous post](https://towardsdatascience.com/visualising-decision-trees/) I
    looked at the impact of different hyperparameters on decision trees, both their
    performance and how they appear visually.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: The natural next step, then, is random forests, using `sklearn.ensemble.RandomForestRegressor`.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: Again, I won’t go into how the random forests work, areas such as bootstrapping
    and feature selection and majority voting. Fundamentally, a random forest is a
    huge number of trees working together (hence a forest), and that’s all we care
    about.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: I’ll use the same data (California housing dataset via scikit-learn, CC-BY)
    and the same general process, so if you haven’t seen my previous post, I’d suggest
    reading that first, as it goes over some of the functions and metrics I’m using
    here.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: Code for this is in the same repo as before: [https://github.com/jamesdeluk/data-projects/tree/main/visualising-trees](https://github.com/jamesdeluk/data-projects/tree/main/visualising-trees)
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: As before, all images below are created by me.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: A basic forest
  id: totrans-9
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: First, let’s see how a basic random forest performs, i.e. `rf = RandomForestRegressor(random_state=42)`.
    The default model has an unlimited max depth, and 100 trees. Using the average-of-ten
    method, it took ~6 seconds to fit and ~0.1 seconds to predict – given it’s a forest
    and not a single tree, it’s not surprising it took 50 to 150 times longer than
    the deep decision tree. And the scores?
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: '| Metric | max_depth=None |'
  id: totrans-11
  prefs: []
  type: TYPE_TB
- en: '| --- | --- |'
  id: totrans-12
  prefs: []
  type: TYPE_TB
- en: '| **MAE** | 0.33 |'
  id: totrans-13
  prefs: []
  type: TYPE_TB
- en: '| **MAPE** | 0.19 |'
  id: totrans-14
  prefs: []
  type: TYPE_TB
- en: '| **MSE** | 0.26 |'
  id: totrans-15
  prefs: []
  type: TYPE_TB
- en: '| **RMSE** | 0.51 |'
  id: totrans-16
  prefs: []
  type: TYPE_TB
- en: '| **R²** | 0.80 |'
  id: totrans-17
  prefs: []
  type: TYPE_TB
- en: It predicted 0.954 for my chosen row, compared with the actual value of 0.894.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: Yes, the out-of-the-box random forest performed better than the Bayes-search-tuned
    decision tree from my previous post!
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: Visualising
  id: totrans-20
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: There are a few ways to visualise a random forest, such as the trees, the predictions,
    and the errors. Feature importances can also be used to compare the individual
    trees in a forest.
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: '**Individual tree plots**'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: 'Fairly obviously, you can plot an individual decision tree. They can be accessed
    using `rf.estimators_`. For example, this is the first one:'
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/fab7a1ad697268643334e61833d5a376.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
- en: This one has a depth of 34, 9,432 leaves, and 18,863 nodes. And this random
    forest has 100 similar trees!
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
- en: '**Individual predictions**'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
- en: 'One way I like to visualise random forests is plotting the individual predictions
    for each tree. For example, I can do so for my chosen row with `[tree.predict(chosen[features].values)
    for tree in rf.estimators_]`, and plot the results on a scatter:'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/2ecfc79cff9b78227ffd858064968b4e.png)'
  id: totrans-28
  prefs: []
  type: TYPE_IMG
- en: As a reminder, the true value is 0.894\. You can easily see how, while some
    trees were way off, the mean of all the predictions is pretty close — similar
    to the central limit theorem (CLT). This is my favourite way of seeing the magic
    of random forests.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 提醒一下，真实值是0.894。你可以很容易地看到，虽然有些树的预测偏差很大，但所有预测的平均值相当接近——类似于中心极限定理（CLT）。这是我最喜欢的观察随机森林魔力的方式。
- en: '**Individual errors**'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: '**个别误差**'
- en: 'Taking this one step further, you can iterate through all the trees, have them
    make predictions for the entire dataset, then calculate an error statistic. In
    this case, for MSE:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 进一步来说，你可以遍历所有树，让它们对整个数据集进行预测，然后计算误差统计量。在这个例子中，对于MSE：
- en: '![](../Images/f2e24e08b745ca1c238090e6d0fafeb5.png)'
  id: totrans-32
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/f2e24e08b745ca1c238090e6d0fafeb5.png)'
- en: The mean MSE was ~0.30, so slightly higher than the overall random forest —
    again showing the advantage of a forest over a single tree. The best tree was
    number 32, with an MSE of 0.27; the worst, 74, was 0.34 — although still pretty
    decent. They both have depths of 34±1, with ~9400 leaves and ~18000 nodes — so,
    structurally, very similar.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 平均MSE为~0.30，略高于整体随机森林——再次显示出森林相对于单棵树的优点。最好的树是编号32，MSE为0.27；最差的，编号74，为0.34——尽管仍然相当不错。它们的深度都是34±1，有约9400个叶子节点和约18000个节点——所以，在结构上非常相似。
- en: '**Feature importances**'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: '**特征重要性**'
- en: 'Clearly a plot with all the trees would be difficult to see, so this is the
    importances for the overall forest, with the best and worst tree:'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 显然，如果展示所有树的话，图表会很难看，所以这里展示的是整个森林的重要性，包括最好和最差的树：
- en: '![](../Images/99cc9808d4c972f3210ef1ba5907e549.png)'
  id: totrans-36
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/99cc9808d4c972f3210ef1ba5907e549.png)'
- en: The best and worst trees still have similar importances for the different features
    — although the order is not necessarily the same. Median income is by far the
    most important factor based on this analysis.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 最好和最差的树对于不同特征的重要性仍然相似——尽管顺序不一定相同。根据这个分析，中位数收入是最重要的因素。
- en: Hyperparameter tuning
  id: totrans-38
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 超参数调整
- en: 'The same hyperparameters that apply to individual decision trees do, of course,
    apply to random forests made up of decision trees. For comparison’s sake, I created
    some RFs with the values I’d used in the previous post:'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 适用于单个决策树的超参数当然也适用于由决策树组成的随机森林。为了比较，我创建了一些RF，其值与之前文章中使用的值相同：
- en: '| Metric | max_depth=3 | ccp_alpha=0.005 | min_samples_split=10 | min_samples_leaf=10
    | max_leaf_nodes=100 |'
  id: totrans-40
  prefs: []
  type: TYPE_TB
  zh: '| **指标** | max_depth=3 | ccp_alpha=0.005 | min_samples_split=10 | min_samples_leaf=10
    | max_leaf_nodes=100 |'
- en: '| --- | --- | --- | --- | --- | --- |'
  id: totrans-41
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- | --- | --- | --- |'
- en: '| **Time to fit (s)** | 1.43 | 25.04 | 3.84 | 3.77 | 3.32 |'
  id: totrans-42
  prefs: []
  type: TYPE_TB
  zh: '| **拟合时间（秒）** | 1.43 | 25.04 | 3.84 | 3.77 | 3.32 |'
- en: '| **Time to predict (s)** | 0.006 | 0.013 | 0.028 | 0.029 | 0.020 |'
  id: totrans-43
  prefs: []
  type: TYPE_TB
  zh: '| **预测时间（秒）** | 0.006 | 0.013 | 0.028 | 0.029 | 0.020 |'
- en: '| **MAE** | 0.58 | 0.49 | 0.37 | 0.37 | 0.41 |'
  id: totrans-44
  prefs: []
  type: TYPE_TB
  zh: '| **MAE** | 0.58 | 0.49 | 0.37 | 0.37 | 0.41 |'
- en: '| **MAPE** | 0.37 | 0.30 | 0.22 | 0.22 | 0.25 |'
  id: totrans-45
  prefs: []
  type: TYPE_TB
  zh: '| **MAPE** | 0.37 | 0.30 | 0.22 | 0.22 | 0.25 |'
- en: '| **MSE** | 0.60 | 0.45 | 0.29 | 0.30 | 0.34 |'
  id: totrans-46
  prefs: []
  type: TYPE_TB
  zh: '| **MSE** | 0.60 | 0.45 | 0.29 | 0.30 | 0.34 |'
- en: '| **RMSE** | 0.78 | 0.67 | 0.54 | 0.55 | 0.58 |'
  id: totrans-47
  prefs: []
  type: TYPE_TB
  zh: '| **RMSE** | 0.78 | 0.67 | 0.54 | 0.55 | 0.58 |'
- en: '| **R²** | 0.54 | 0.66 | 0.78 | 0.77 | 0.74 |'
  id: totrans-48
  prefs: []
  type: TYPE_TB
  zh: '| **R²** | 0.54 | 0.66 | 0.78 | 0.77 | 0.74 |'
- en: '| **Chosen prediction** | 1.208 | 1.024 | 0.935 | 0.920 | 0.969 |'
  id: totrans-49
  prefs: []
  type: TYPE_TB
  zh: '| **选择的预测** | 1.208 | 1.024 | 0.935 | 0.920 | 0.969 |'
- en: The first thing we see — none performed better than the default tree (`max_depth=None`)
    above. This is different from the individual decision trees, where the ones with
    constraints performed better — again demonstrating that the power of a CLT-powered
    imperfect forest over one “perfect” tree. However, similar to before, `ccp_alpha` takes
    a long time, and shallow trees are pretty rubbish.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 我们首先看到的是——没有一种表现优于默认的树（`max_depth=None`）。这与单个决策树不同，有约束的决策树表现更好——再次证明了CLT（中心极限定理）驱动的非完美森林相对于一棵“完美”树的强大之处。然而，与之前类似，`ccp_alpha`需要很长时间，浅层树相当糟糕。
- en: Beyond these, there are some hyperparameters that RFs have that DTs don’t. The
    most important one is `n_estimators` — in other words, the number of trees!
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 除了这些，RF（随机森林）还有一些DT（决策树）没有的超参数。其中最重要的一个是`n_estimators`——换句话说，就是树的数量！
- en: '**n_jobs**'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: '**n_jobs**'
- en: But first, `n_jobs`. This is how many jobs to run in parallel. Doing things
    in parallel is typically faster than in serial/sequentially. The resulting RF
    will be the same, with the same error etc scores (assuming `random_state` is set),
    but it should be done quicker! To test this, I added `n_jobs=-1` to the default
    RF — in this context, `-1` means “all”.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
- en: Remember how the default one took almost 6 seconds to fit and 0.1 to predict?
    Parallelised, it took only 1.1 seconds, and 0.03 to predict — a 3~6x improvement.
    I’ll definitely be doing this from now on!
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
- en: '**n_estimators**'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
- en: OK, back to the number of trees. The default RF has 100 estimators; let’s try
    1000\. It took ~10 times as long (9.7 seconds to fit, 0.3 to predict, when parallelised),
    as one might have predicted. The scores?
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
- en: '| Metric | n_estimators=1000 |'
  id: totrans-57
  prefs: []
  type: TYPE_TB
- en: '| --- | --- |'
  id: totrans-58
  prefs: []
  type: TYPE_TB
- en: '| **MAE** | 0.328 |'
  id: totrans-59
  prefs: []
  type: TYPE_TB
- en: '| **MAPE** | 0.191 |'
  id: totrans-60
  prefs: []
  type: TYPE_TB
- en: '| **MSE** | 0.252 |'
  id: totrans-61
  prefs: []
  type: TYPE_TB
- en: '| **RMSE** | 0.502 |'
  id: totrans-62
  prefs: []
  type: TYPE_TB
- en: '| **R²** | 0.807 |'
  id: totrans-63
  prefs: []
  type: TYPE_TB
- en: Very little difference; MSE and RMSE are 0.01 lower, and R² is 0.01 higher.
    So better, but worth the 10x time investment?
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
- en: Let’s cross-validate, just to check.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
- en: 'Rather than use my custom loop, I’ll use `sklearn.model_selection.cross_validate`,
    as touched on in the previous post:'
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  id: totrans-67
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: I’m using `RepeatedKFold` as the splitting strategy, which is more stable but
    slower than `KFold`; as the dataset isn’t that big, I’m not too concerned about
    the additional time it will take.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
- en: As there is no standard RMSE scorer, so I had to create one with `sklearn.metrics.make_scorer` and
    a lambda function.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
- en: For the decision trees, I did 1000 loops. However, given the default random
    forest contains 100 trees, 1000 loops would be a *lot* of trees, and therefore
    take a *lot* of time. I’ll try 100 (20 repeats of 5 splits) — still a lot, but
    thanks to parallelisation it wasn’t *too* bad — the 100 trees version took 2mins
    (1304 seconds of unparallelised time), and the 1000 one took 18mins (10254s!)
    Almost 100% CPU across all cores, and it got pretty toasty — it’s not often my
    MacBook fans turn on, but this maxed them out!
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
- en: 'How do they compare? The 100-tree one:'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
- en: '| Metric | Mean | Std |'
  id: totrans-72
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  id: totrans-73
  prefs: []
  type: TYPE_TB
- en: '| MAE | -0.328 | 0.006 |'
  id: totrans-74
  prefs: []
  type: TYPE_TB
- en: '| MAPE | -0.184 | 0.005 |'
  id: totrans-75
  prefs: []
  type: TYPE_TB
- en: '| MSE | -0.253 | 0.010 |'
  id: totrans-76
  prefs: []
  type: TYPE_TB
- en: '| RMSE | -0.503 | 0.009 |'
  id: totrans-77
  prefs: []
  type: TYPE_TB
- en: '| R² | 0.810 | 0.007 |'
  id: totrans-78
  prefs: []
  type: TYPE_TB
- en: 'and the 1000-tree one:'
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
- en: '| Metric | Mean | Std |'
  id: totrans-80
  prefs: []
  type: TYPE_TB
- en: '| --- | --- | --- |'
  id: totrans-81
  prefs: []
  type: TYPE_TB
- en: '| MAE | -0.325 | 0.006 |'
  id: totrans-82
  prefs: []
  type: TYPE_TB
- en: '| MAPE | -0.183 | 0.005 |'
  id: totrans-83
  prefs: []
  type: TYPE_TB
- en: '| MSE | -0.250 | 0.010 |'
  id: totrans-84
  prefs: []
  type: TYPE_TB
- en: '| RMSE | -0.500 | 0.010 |'
  id: totrans-85
  prefs: []
  type: TYPE_TB
- en: '| R² | 0.812 | 0.006 |'
  id: totrans-86
  prefs: []
  type: TYPE_TB
- en: Very little difference — probably not worth the extra time/power.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
- en: Bayes searching
  id: totrans-88
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Finally, let’s do a Bayes search. I used a wide hyperparameter range.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  id: totrans-90
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: The only hyperparameter we haven’t seen so far is `bootstrap`; this determines
    whether to use the whole dataset when building a tree, or using a bootstrap-based
    (sample with replacement) approach. Most commonly this is set to `True`, but let’s
    try `False` anyway.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
- en: 'I did 200 iterations, which took 66 (!!) minutes. It gave:'
  id: totrans-92
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  id: totrans-93
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: See how `max_depth` was similar to the simple ones above, but `n_estimators` and `max_leaf_nodes` were
    very high (note `max_leaf_nodes` is not the actual number of leaf nodes, just
    the maximum allowed value; the mean number of leaves was 14,954). `min_samples_` were
    both the minimum — similar to before when we compared the constrained forests
    to the unconstrained one. Also interesting how it didn’t bootstrap.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 看一下`max_depth`与上面简单的那些相似，但`n_estimators`和`max_leaf_nodes`都非常高（注意`max_leaf_nodes`不是实际叶子节点的数量，只是允许的最大值；平均叶子节点数为14,954）。`min_samples_`都是最小值——与我们之前比较受约束的森林和不受约束的森林时相似。而且它没有进行自助采样也很有趣。
- en: What does that give us (the quick test, not the cross validated one)?
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 这给我们带来了什么（快速测试，而不是交叉验证）？
- en: '| Metric | Value |'
  id: totrans-96
  prefs: []
  type: TYPE_TB
  zh: '| 指标 | 值 |'
- en: '| --- | --- |'
  id: totrans-97
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- |'
- en: '| MAE | 0.313 |'
  id: totrans-98
  prefs: []
  type: TYPE_TB
  zh: '| MAE | 0.313 |'
- en: '| MAPE | 0.181 |'
  id: totrans-99
  prefs: []
  type: TYPE_TB
  zh: '| MAPE | 0.181 |'
- en: '| MSE | 0.229 |'
  id: totrans-100
  prefs: []
