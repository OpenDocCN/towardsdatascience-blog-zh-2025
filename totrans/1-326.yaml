- en: 'The best so far, although only just. For consistency, I also cross validated:'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: 目前为止最好的，尽管只是刚刚好。为了保持一致性，我也进行了交叉验证：
- en: '| Metric | Mean | Std |'
  id: totrans-104
  prefs: []
  type: TYPE_TB
  zh: '| 指标 | 平均值 | 标准差 |'
- en: '| --- | --- | --- |'
  id: totrans-105
  prefs: []
  type: TYPE_TB
  zh: '| --- | --- | --- |'
- en: '| MAE | -0.309 | 0.005 |'
  id: totrans-106
  prefs: []
  type: TYPE_TB
  zh: '| MAE | -0.309 | 0.005 |'
- en: '| MAPE | -0.174 | 0.005 |'
  id: totrans-107
