- en: 'Data Science: From School to Work, Part IV'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 数据科学：从学校到工作，第四部分
- en: 原文：[https://towardsdatascience.com/data-science-from-school-to-work-part-iv/](https://towardsdatascience.com/data-science-from-school-to-work-part-iv/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/data-science-from-school-to-work-part-iv/](https://towardsdatascience.com/data-science-from-school-to-work-part-iv/)
- en: <mdspan datatext="el1745436793378" class="mdspan-comment">Introduction</mdspan>
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1745436793378" class="mdspan-comment">简介</mdspan>
- en: Let’s start with a simple example that will appeal to most of us. If you want
    to check if the blinkers of your car are working properly, you sit in the car,
    turn on the ignition and test a turn signal to see if the front and rear lights
    work. But if the lights don’t work, it’s hard to tell why. The bulbs may be dead,
    the battery may be dead, the turn signal switch may be faulty. In short, there’s
    a lot to check. This is exactly what the tests are for. Every part of a function
    such as the blinker must be tested to find out what is going wrong. A test of
    the bulbs, a test of the battery, a test of the communication between the control
    unit and the indicators, and so on.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们从大多数人都感兴趣的简单例子开始。如果你想检查你的汽车转向灯是否正常工作，你坐在车里，打开点火开关，测试转向信号灯，看看前后灯是否工作。但如果灯不亮，很难判断原因。可能是灯泡坏了，电池没电了，转向信号开关可能故障。简而言之，有很多东西需要检查。这正是测试的目的。必须测试函数的每个部分，如转向灯，以找出哪里出了问题。测试灯泡、测试电池、测试控制单元和指示器之间的通信等等。
- en: To test all this, there are different types of tests, often presented in the
    form of a pyramid, from the fastest to the slowest and from the most isolating
    to the most integrated. This test pyramid can vary depending on the specifics
    of the project (database connection test, authentication test, etc.).
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 为了测试所有这些，存在不同类型的测试，通常以金字塔的形式呈现，从最快到最慢，从最隔离到最集成。这个测试金字塔可能因项目的具体要求而有所不同（数据库连接测试、认证测试等）。
- en: '![](../Images/cd928016294f281ce5a0c56e1134035f.png)'
  id: totrans-5
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/cd928016294f281ce5a0c56e1134035f.png)'
- en: Tests pyramid | Image from author.
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 测试金字塔 | 图片来自作者。
- en: 'The Base of the Pyramid: Unit Tests'
  id: totrans-7
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 金字塔的底部：单元测试
- en: 'Unit tests form the basis of the test pyramid, regardless of the type of project
    (and language). Their purpose is to test a unit of code, e.g. a method or a function.
    For a unit test to be truly considered as such, it must adhere to a basic rule:
    A unit test must not depend on functionalities outside the unit under test. They
    have the advantage of being fast and automatable.'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 单元测试是测试金字塔的基础，无论项目类型（和语言）如何。它们的目的在于测试代码单元，例如方法或函数。为了真正将单元测试视为单元测试，它必须遵守一个基本规则：单元测试不得依赖于测试单元外的功能。它们的优势在于速度快且可自动化。
- en: '**Example:** Consider a function that extracts even numbers from an iterable.
    To test this function, we’d need to create several types of iterable with integers
    and check the output. But we’d also need to check the behavior in the case of
    empty iterables, element types other than int, and so on.'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: '**示例**：考虑一个从可迭代对象中提取偶数的函数。为了测试这个函数，我们需要创建几种不同类型的整数可迭代对象并检查输出。但我们也需要检查空可迭代对象、非整数类型的元素等情况下的行为。'
- en: 'Intermediate Level: Integration and Functional Tests'
  id: totrans-10
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 中级水平：集成和功能测试
- en: Just above the unit tests are the integration tests. Their purpose is to detect
    errors that cannot be detected by unit tests. These tests check that the addition
    of a new feature does not cause problems when it is integrated into the application.
    The functional tests are similar but aim at testing one precise functionality
    (e.g an authentication process).
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 在单元测试之上的是集成测试。它们的目的在于检测单元测试无法检测到的错误。这些测试会检查添加新功能时，将其集成到应用程序中是否会导致问题。功能测试与此类似，但目的是测试一个精确的功能（例如认证过程）。
- en: In a project, especially in a team environment, many functions are developed
    by different developers. Integration/functional tests ensure that all these features
    work well together. They are also run automatically, making them fast and reliable.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 在一个项目中，尤其是在团队环境中，许多功能是由不同的开发者开发的。集成/功能测试确保所有这些功能能够良好地协同工作。它们也是自动运行的，这使得它们快速且可靠。
- en: '**Example**: Consider an application that displays a bank balance. When a withdrawal
    operation is carried out, the balance is modified. An integration test would be
    to check that with a balance initialized at 1000 euros, then a withdrawal of 500
    euros, the balance changes to 500 euros.'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: '**示例**：考虑一个显示银行余额的应用程序。当执行取款操作时，余额会发生变化。集成测试将检查在余额初始化为1000欧元的情况下，进行500欧元的取款后，余额变为500欧元。'
- en: 'The Top of the Pyramid: End-to-End Tests'
  id: totrans-14
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 金字塔的顶端：端到端测试
- en: End-to-end (E2E) tests are tests at the top of the pyramid. They verify that
    the application functions as expected from end to end, i.e. from the user interface
    to the database or external services. They are generally long and complicated
    to set up, but there’s no need for a lot of tests.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 端到端（E2E）测试是金字塔顶端的测试。它们验证应用程序从端到端是否按预期工作，即从用户界面到数据库或外部服务。它们通常设置起来既长又复杂，但不需要很多测试。
- en: '**Example**: Consider a forecasting application based on new data. This can
    be very complex, involving data retrieval, variable transformations, learning
    and so on. The aim of the End-to-End test is to check that, given the new data
    selected, the forecasts correspond to expectations.'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: '**示例**：考虑一个基于新数据的预测应用程序。这可能非常复杂，涉及数据检索、变量转换、学习等。端到端测试的目的是检查给定的新数据选择后，预测是否符合预期。'
- en: '* * *'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: The Unit Tests with Doctest
  id: totrans-18
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 带有Doctest的单元测试
- en: 'A fast and simple way of making unit tests is to use `docstring`. Let’s take
    the example of a script `calculate_stats.py` with two functions: `calculate_mean()`
    with a complete docstring, which was presented in [Python best practices](https://towardsdatascience.com/data-science-from-school-to-work-part-ii/),
    and the function `calculate_std()`with a usual one.'
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 使用`docstring`是一种快速简单的创建单元测试的方法。让我们以一个包含两个函数的脚本`calculate_stats.py`为例：`calculate_mean()`具有完整的文档字符串，这在[Python最佳实践](https://towardsdatascience.com/data-science-from-school-to-work-part-ii/)中有所介绍，以及具有常规文档字符串的函数`calculate_std()`。
- en: '[PRE0]'
  id: totrans-20
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'The test is included in the “Examples” section at the end of the docstring
    of the function `calculate_mean()`. A doctest follows the layout of a terminal:
    three chevrons at the beginning of a line with the command to be executed and
    the expected result just below. To run the tests, simply type the command'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 测试包含在函数`calculate_mean()`文档字符串的“示例”部分中。Doctest遵循终端布局：每行开始处的三个箭头表示要执行的命令和下面预期的结果。要运行测试，只需输入以下命令
- en: '[PRE1]'
  id: totrans-22
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: or if you use [uv](https://towardsdatascience.com/data-scientist-from-school-to-work-part-i/)
    (what I encourage)
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 或者如果你使用[uv](https://towardsdatascience.com/data-scientist-from-school-to-work-part-i/)（我鼓励使用）
- en: '[PRE2]'
  id: totrans-24
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'The `-v` argument permits to display the following output:'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: '`-v`参数允许显示以下输出：'
- en: '![](../Images/494f27f396e656aa83741c04f3153274.png)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/494f27f396e656aa83741c04f3153274.png)'
- en: As you can see, there have been two tests and no failures, and `doctest` has
    the intelligence to point out all the methods that don’t have a test (as with
    `calculate_std()`).
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: 如您所见，有两个测试且没有失败，`doctest`具有智能，可以指出所有没有测试的方法（如`calculate_std()`）。
- en: '* * *'
  id: totrans-28
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: The Unit Tests with Pytest
  id: totrans-29
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 使用Pytest的单元测试
- en: 'Using `doctest` is interesting, but quickly becomes limited. For a truly comprehensive
    testing process, we use a specific framework. There are two main frameworks for
    testing: `unittest` and `pytest`. The latter is generally considered simpler and
    more intuitive.'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 使用`doctest`很有趣，但很快就会变得有限。为了真正全面的测试过程，我们使用特定的框架。有两个主要的测试框架：`unittest`和`pytest`。后者通常被认为更简单、更直观。
- en: 'To install the package, simply type:'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: 要安装包，只需输入以下命令：
- en: '[PRE3]'
  id: totrans-32
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: or
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 或者
- en: '[PRE4]'
  id: totrans-34
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: 1 – Write your first test
  id: totrans-35
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1 – 编写你的第一个测试
- en: 'Let’s take the `calculate_stats.py`script and write a test for the `calculate_mean()`
    function. To do this, we create a script `test_calculate_stats.py` containing
    the following lines:'
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们以`calculate_stats.py`脚本为例，为`calculate_mean()`函数编写测试。为此，我们创建一个包含以下行的脚本`test_calculate_stats.py`：
- en: '[PRE5]'
  id: totrans-37
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: 'Tests are based on the assert command. This instruction is used with the following
    syntax:'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 测试基于断言命令。此指令使用以下语法：
- en: assert expression1 [, expression2]
  id: totrans-39
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: assert expression1 [, expression2]
- en: The expression1 is the condition to be tested, and the optional expression2
    is the error message if the condition is not verified.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: expression1是要测试的条件，而可选的expression2是在条件未验证时显示的错误消息。
- en: 'The Python interpreter transforms each assert statement into:'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: Python解释器将每个断言语句转换为：
- en: '[PRE6]'
  id: totrans-42
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: 2 – Run a test
  id: totrans-43
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2 – 运行测试
- en: 'To run the test, we use the following command:'
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 要运行测试，我们使用以下命令：
- en: '[PRE7]'
  id: totrans-45
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: or
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 或者
- en: '[PRE8]'
  id: totrans-47
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: 'The result is as follows:'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 结果如下：
- en: '![](../Images/b446c9b1a5a38573aa29bdc9d326c9e0.png)'
  id: totrans-49
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b446c9b1a5a38573aa29bdc9d326c9e0.png)'
- en: 3 – Analyse the output
  id: totrans-50
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 3 – 分析输出
- en: 'One of the great advantages of `pytest` is the quality of its feedback. For
    each test, you get:'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: '`pytest`的一个巨大优点是其反馈的质量。对于每个测试，你都会得到：'
- en: A green dot (.) for success;
  id: totrans-52
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 成功的标志是一个绿色点（.）
- en: An F for a failure;
  id: totrans-53
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: F表示失败；
- en: An E for an error;
  id: totrans-54
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: E表示错误；
- en: An s for a skipped test (with the decorator `@pytest.mark.skip(reason="message")`).
  id: totrans-55
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: s表示跳过的测试（使用装饰器`@pytest.mark.skip(reason="message")`）。
- en: 'In the event of failure, pytest provides:'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 在失败的情况下，pytest 提供了：
- en: The exact name of the failed test;
  id: totrans-57
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 失败测试的确切名称；
- en: The problematic line of code;
  id: totrans-58
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 有问题的代码行；
- en: Expected and obtained values;
  id: totrans-59
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 预期和获取的值；
- en: A complete trace to facilitate debugging.
  id: totrans-60
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 一个完整的跟踪以方便调试。
- en: 'For example, if we replace the == 3.5 with == 4, we obtain the following output:'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，如果我们将 == 3.5 替换为 == 4，我们将得到以下输出：
- en: '![](../Images/dffdf14d27dab56138c593bc73108421.png)'
  id: totrans-62
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/dffdf14d27dab56138c593bc73108421.png)'
- en: 4 – Use parametrize
  id: totrans-63
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4 – 使用参数化
- en: To test a function properly, you need to test it exhaustively. In other words,
    test it with different types of inputs and outputs. The problem is that very quickly
    you end up with a succession of assert and test functions that get longer and
    longer, which is not easy to read.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 为了正确测试一个函数，你需要彻底测试它。换句话说，用不同类型的输入和输出测试它。问题是很快你就会得到一系列越来越长的 assert 和 test 函数，这不容易阅读。
- en: To overcome this problem and test several data sets in a single unit test, we
    use the `parametrize`. The idea is to create a list containing all the datasets
    you wish to test in tuple form, then use the `@pytest.mark.parametrize` decorator.
    The last test can read write as follows
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 为了克服这个问题并在单个单元测试中测试多个数据集，我们使用 `parametrize`。想法是创建一个包含所有要测试的数据集的列表，然后使用 `@pytest.mark.parametrize`
    装饰器。最后一个测试可以如下所示
- en: '[PRE9]'
  id: totrans-66
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: If you wish to add a test set, simply add a tuple to testdata.
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 如果你想添加一个测试集，只需向 testdata 添加一个元组即可。
- en: 'It is also advisable to create another type of test to check whether errors
    are raised, using the context with `pytest.raises(Exception)`:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 还建议创建另一种类型的测试来检查是否引发了错误，使用 `pytest.raises(Exception)` 的上下文：
- en: '[PRE10]'
  id: totrans-69
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: In this case, the test will be a success on the function returns an error with
    the *testdata_fail* data.
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 在此情况下，如果函数返回一个包含 *testdata_fail* 数据的错误，测试将成功。
- en: '![](../Images/1959ce1d9c1977e110fc1ee1a7b64b62.png)'
  id: totrans-71
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/1959ce1d9c1977e110fc1ee1a7b64b62.png)'
- en: 5 – Use mocks
  id: totrans-72
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5 – 使用模拟
- en: As mentioned in the introduction, the purpose of a unit test is to test a single
    unit of code and, above all, it must not depend on external components. This is
    where **mocks** come in.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 如介绍中所述，单元测试的目的是测试单个代码单元，并且最重要的是它不能依赖于外部组件。这就是 **mocks** 发挥作用的地方。
- en: 'Mocks simulate the behavior of a constant, a function or even a class. To create
    and use mocks, we’ll use the `pytest-mock`package. To install it:'
  id: totrans-74
  prefs: []
  type: TYPE_NORMAL
  zh: Mocks 模拟常量、函数甚至类的行为。为了创建和使用 mocks，我们将使用 `pytest-mock` 包。要安装它：
- en: '[PRE11]'
  id: totrans-75
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: or
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 或者
- en: '[PRE12]'
  id: totrans-77
  prefs: []
  type: TYPE_PRE
  zh: '[PRE12]'
- en: a) Mock a function
  id: totrans-78
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: a) 模拟函数
- en: To illustrate the use of a mock, let’s take our`test_calculate_stats.py`script
    and implement the test for the `calculate_std()` function. The problem is that
    it depends on the `calculate_mean()` function. So we’re going to use the `mocker.patch`
    method to mock its behavior.
  id: totrans-79
  prefs: []
  type: TYPE_NORMAL
  zh: 为了说明 mock 的使用，让我们以我们的 `test_calculate_stats.py` 脚本为例，并实现 `calculate_std()` 函数的测试。问题是它依赖于
    `calculate_mean()` 函数。因此，我们将使用 `mocker.patch` 方法来模拟其行为。
- en: The test for the `calculate_std()` function is written as follows
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: '`calculate_std()` 函数的测试编写如下'
- en: '[PRE13]'
  id: totrans-81
  prefs: []
  type: TYPE_PRE
  zh: '[PRE13]'
- en: Executing the pytest command yields
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 执行 pytest 命令会产生
- en: '![](../Images/5013e6af00521aaf2ba7afcca04234d7.png)'
  id: totrans-83
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/5013e6af00521aaf2ba7afcca04234d7.png)'
- en: '**Explanation**:'
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: '**解释**：'
- en: The `mocker.patch("calculate_stats.calculate_mean", return_value=0)` line assigns
    the output `0` to the `calculate_mean()` return in `calculate_stats.py`. The calculation
    of the standard deviation of the series [2, 2] is distorted because we mock the
    behavior of `calculate_mean()` by always returning `0`. The calculation is correct
    if the mean of the series is really `0`, as shown by the second assertion.
  id: totrans-85
  prefs: []
  type: TYPE_NORMAL
  zh: '`mocker.patch("calculate_stats.calculate_mean", return_value=0)` 这行代码将 `0`
    赋值给 `calculate_stats.py` 中的 `calculate_mean()` 函数的返回值。由于我们通过总是返回 `0` 来模拟 `calculate_mean()`
    的行为，因此对序列 [2, 2] 的标准差计算被扭曲了。如果序列的平均值确实是 `0`，则计算是正确的，如第二个断言所示。'
- en: b) Mock a class
  id: totrans-86
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: b) 模拟类
- en: In a similar way, you can mock the behavior of a class and simulate its methods
    and/or attributes. To do this, you need to implement a `Mock` class with the methods/attributes
    to be modified.
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 以类似的方式，你可以模拟类的行为并模拟其方法和/或属性。为此，你需要实现一个 `Mock` 类，其中包含要修改的方法/属性。
- en: 'Consider a function, `need_pruning()`, which tests whether or not a decision
    tree should be pruned according to the minimum number of points in its leaves:'
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: 考虑一个函数，`need_pruning()`，它测试是否应该根据其叶子中的最小点数修剪决策树：
- en: '[PRE14]'
  id: totrans-89
  prefs: []
  type: TYPE_PRE
  zh: '[PRE14]'
- en: Testing this function can be complicated, since it depends on a class, `DecisionTree`,
    from the `scikit-learn` package. What’s more, you’d need data to train a `DecisionTree`
    before testing the function.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: 测试这个函数可能很复杂，因为它依赖于`scikit-learn`包中的`DecisionTree`类。更重要的是，在测试函数之前，你需要数据来训练一个`DecisionTree`。
- en: To get around all these difficulties, we need to mock the attributes of a `DecisionTree`‘s
    `tree_` object.
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 为了克服所有这些困难，我们需要模拟`DecisionTree`的`tree_`对象的属性。
- en: '[PRE15]'
  id: totrans-92
  prefs: []
  type: TYPE_PRE
  zh: '[PRE15]'
- en: '**Explanation**:'
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: '**说明**：'
- en: The `MockTree` class can be used to mock the *n_node_samples*, *children_left*
    and *children_right* attributes of a `tree_`object. In the test, we create a `DecisionTreeRegressor`
    object whose `tree_` attribute is replaced by the `MockTree`. This controls the
    *n_node_samples*, *children_left* and *children_right* attributes required for
    the `need_pruning()` function.
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: '`MockTree`类可以用来模拟`tree_`对象的`n_node_samples`、`children_left`和`children_right`属性。在测试中，我们创建一个`DecisionTreeRegressor`对象，其`tree_`属性被`MockTree`替换。这控制了`need_pruning()`函数所需的`n_node_samples`、`children_left`和`children_right`属性。'
- en: 4 – Use fixtures
  id: totrans-95
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 4 – 使用固定配置
- en: 'Let’s complete the previous example by adding a function, `get_predictions()`,
    to retrieve the average of the variable of interest in each of the tree’s leaves:'
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们通过添加一个函数`get_predictions()`来完成前面的例子，以检索每个树叶中感兴趣变量的平均值：
- en: '[PRE16]'
  id: totrans-97
  prefs: []
  type: TYPE_PRE
  zh: '[PRE16]'
- en: One way of testing this function would be to repeat the first two lines of the
    `test_need_pruning()` test. But a simpler solution is to use the `pytest.fixture`
    decorator to create a fixture.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 测试这个函数的一种方法是将`test_need_pruning()`测试的前两行重复一遍。但一个更简单的解决方案是使用`pytest.fixture`装饰器创建一个固定配置。
- en: 'To test this new function, we need the `MockTree` we created earlier. But,
    to avoid repeating code, we use a fixture. The test script then becomes:'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: 为了测试这个新功能，我们需要之前创建的`MockTree`。但是，为了避免代码重复，我们使用一个固定配置。然后测试脚本变为：
- en: '[PRE17]'
  id: totrans-100
  prefs: []
  type: TYPE_PRE
  zh: '[PRE17]'
- en: In our case, the fixture allows us to have a `DecisionTreeRegressor` object
    whose `tree_` attribute is our `MockTree`.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们的例子中，固定配置允许我们拥有一个`DecisionTreeRegressor`对象，其`tree_`属性就是我们的`MockTree`。
- en: 'The advantage of a fixture is that it provides a fixed development environment
    for configuring a set of tests with the same context or dataset. This can be used
    to:'
  id: totrans-102
  prefs: []
  type: TYPE_NORMAL
  zh: 固定配置的优势在于它为具有相同上下文或数据集的一组测试提供了一个固定的开发环境。这可以用于：
- en: Prepare objects;
  id: totrans-103
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 准备对象；
- en: Start or stop services;
  id: totrans-104
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 启动或停止服务；
- en: Initialize the database with a dataset;
  id: totrans-105
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 使用数据集初始化数据库；
- en: Create test client for web project;
  id: totrans-106
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 为Web项目创建测试客户端；
- en: Configure mocks.
  id: totrans-107
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 配置模拟对象。
- en: 5 – Organize the tests directory
  id: totrans-108
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 5 – 组织测试目录
- en: '`pytest` will run tests on all files beginning with test_ or ending with _test.
    With this method, you can simply use the `pytest` command to run all the tests
    in your project.'
  id: totrans-109
  prefs: []
  type: TYPE_NORMAL
  zh: '`pytest`将对所有以test_或_test结尾的文件运行测试。使用这种方法，你可以简单地使用`pytest`命令来运行项目中的所有测试。'
- en: 'As with the rest of a Python project, the test directory must be structured.
    We recommend:'
  id: totrans-110
  prefs: []
  type: TYPE_NORMAL
  zh: 与Python项目的其余部分一样，测试目录必须是有结构的。我们建议：
- en: Break down your tests by package
  id: totrans-111
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 按包分解你的测试
- en: Test no more than one module per script
  id: totrans-112
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每个脚本测试不超过一个模块
- en: '![](../Images/7f2d97ac9e7a2c65b584d0bdbb5ce26c.png)'
  id: totrans-113
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7f2d97ac9e7a2c65b584d0bdbb5ce26c.png)'
- en: Image from author
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 图片来自作者
- en: However, you can also run only the tests of a script by specifying the path
    of the .py script.
  id: totrans-115
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，你也可以通过指定.py脚本的路径来仅运行脚本的测试。
- en: '[PRE18]'
  id: totrans-116
  prefs: []
  type: TYPE_PRE
  zh: '[PRE18]'
- en: or
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 或者
- en: '[PRE19]'
  id: totrans-118
  prefs: []
  type: TYPE_PRE
  zh: '[PRE19]'
- en: 6 – Analyze your test coverage
  id: totrans-119
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 6 – 分析你的测试覆盖率
- en: 'Once the tests have been written, it’s worth looking at the test coverage rate.
    To do this, we install the following two packages: `coverage` and `pytest-cov`
    and run a coverage measure.'
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 一旦编写了测试，查看测试覆盖率率就值得了。为此，我们安装以下两个包：`coverage`和`pytest-cov`并运行覆盖率度量。
- en: '[PRE20]'
  id: totrans-121
  prefs: []
  type: TYPE_PRE
  zh: '[PRE20]'
- en: or
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: 或者
- en: '[PRE21]'
  id: totrans-123
  prefs: []
  type: TYPE_PRE
  zh: '[PRE21]'
- en: The tool then measures coverage by counting the number of lines tested. The
    following output is obtained.
  id: totrans-124
  prefs: []
  type: TYPE_NORMAL
  zh: 工具随后通过计数测试的行数来度量覆盖率。以下输出是得到的。
- en: '![](../Images/1b91f730088b300cbd2ab98f1f5a97f2.png)'
  id: totrans-125
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/1b91f730088b300cbd2ab98f1f5a97f2.png)'
- en: 'The 92% obtained for the `calculate_stats.py`script comes from the line where
    the squares of the deviations from the mean are calculated:'
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: '`calculate_stats.py`脚本获得的92%来自计算平均偏差平方的行：'
- en: '[PRE22]'
  id: totrans-127
  prefs: []
  type: TYPE_PRE
  zh: '[PRE22]'
- en: To prevent certain scripts from being analyzed, you can specify exclusions in
    a `.coveragerc` configuration file at the root of the project. For example, to
    exclude the two test files, write
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 为了防止某些脚本被分析，你可以在项目根目录的`.coveragerc`配置文件中指定排除项。例如，要排除两个测试文件，写入
- en: '[PRE23]'
  id: totrans-129
  prefs: []
  type: TYPE_PRE
  zh: '[PRE23]'
- en: And we get
  id: totrans-130
  prefs: []
  type: TYPE_NORMAL
  zh: 我们得到
- en: '![](../Images/cb037663e647752c6ad1b36675be7241.png)'
  id: totrans-131
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/cb037663e647752c6ad1b36675be7241.png)'
- en: Finally, for larger projects, you can manage an html report of the coverage
    analysis by typing
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 最后，对于更大的项目，您可以通过输入以下命令来管理覆盖率分析的 html 报告
- en: '[PRE24]'
  id: totrans-133
  prefs: []
  type: TYPE_PRE
  zh: '[PRE24]'
- en: or
  id: totrans-134
  prefs: []
  type: TYPE_NORMAL
  zh: 或者
- en: '[PRE25]'
  id: totrans-135
  prefs: []
  type: TYPE_PRE
  zh: '[PRE25]'
- en: 7 – Some useful packages
  id: totrans-136
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 7 – 一些有用的包
- en: '`pytest-xdist`: Speed up test execution by using multiple CPUs'
  id: totrans-137
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`pytest-xdist`: 通过使用多个 CPU 加速测试执行。'
- en: '`pytest-randomly`: Randomly mix the order of test items. Reduces the risk of
    surprising inter-test dependencies.'
  id: totrans-138
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`pytest-randomly`: 随机混合测试项的顺序。减少测试之间意外依赖的风险。'
- en: '`pytest-instafail`: Displays failures and errors immediately instead of waiting
    for all tests to complete.'
  id: totrans-139
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`pytest-instafail`: 立即显示失败和错误，而不是等待所有测试完成。'
- en: '`pytest-tldr`: The default pytest outputs are chatty. This plugin limits the
    output to only traces of failed tests.'
  id: totrans-140
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`pytest-tldr`: 默认的 pytest 输出很啰嗦。此插件将输出限制为仅失败的测试的痕迹。'
- en: '`pytest-mlp`: Allows you to test Matplotlib results by comparing images.'
  id: totrans-141
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`pytest-mlp`: 允许您通过比较图像来测试 Matplotlib 的结果。'
- en: '`pytest-timeout`: Ends tests that take too long, probably due to infinite loops.'
  id: totrans-142
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`pytest-timeout`: 结束耗时过长的测试，这可能是由于无限循环造成的。'
- en: '`freezegun`: Allows to mock datetime module with the decorator `@freeze_time()`.'
  id: totrans-143
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '`freezegun`: 允许使用装饰器 `@freeze_time()` 模拟 datetime 模块。'
- en: Special thanks to [Banias Baabe](https://www.linkedin.com/in/banias/?originalSubdomain=de)
    for this list.
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 特别感谢 [Banias Baabe](https://www.linkedin.com/in/banias/?originalSubdomain=de)
    提供了这个列表。
- en: '* * *'
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Integration and functional tests
  id: totrans-146
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 集成和功能测试
- en: Now that the unit tests have been written, most of the work is done. Courage,
    we’re almost there!
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 现在单元测试已经编写完成，大部分工作已经完成。加油，我们几乎成功了！
- en: As a reminder, unit tests aim to test a unit of code without it interacting
    with another function. This way we know that each function/method does what it
    was developed for. It is time to test how they work together!
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 作为提醒，单元测试旨在在不与另一个函数交互的情况下测试代码单元。这样我们就知道每个函数/方法都做了它被开发时应该做的事情。现在是时候测试它们如何协同工作了！
- en: 1 – Integration tests
  id: totrans-149
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 1 – 集成测试
- en: Integration tests are used to check the combinations of different code units,
    their interactions and the way in which subsystems are combined to form a common
    system.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 集成测试用于检查不同代码单元的组合、它们的交互以及子系统如何组合成通用系统。
- en: The way we write integration tests is no different from the way we write unit
    tests. To illustrate it we create a very simple `FastApi` application to get or
    to set the couple Login/Password in a “database”. To simplify the example, the
    database is just a `dict` named users. We create a `main.py` script with the following
    code
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: 我们编写集成测试的方式与编写单元测试的方式没有区别。为了说明这一点，我们创建了一个非常简单的 `FastApi` 应用程序，用于在“数据库”中获取或设置登录/密码对。为了简化示例，数据库只是一个名为
    users 的 `dict`。我们创建了一个包含以下代码的 `main.py` 脚本
- en: '[PRE26]'
  id: totrans-152
  prefs: []
  type: TYPE_PRE
  zh: '[PRE26]'
- en: 'To test this application, you have to use `httpx` and `fastapi.testclient`
    packages to make requests to your endpoints and verify the responses. The script
    of tests is as follows:'
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 要测试此应用程序，您必须使用 `httpx` 和 `fastapi.testclient` 包向您的端点发送请求并验证响应。测试脚本如下：
- en: '[PRE27]'
  id: totrans-154
  prefs: []
  type: TYPE_PRE
  zh: '[PRE27]'
- en: In this example, the tests depend on the application created in the `main.py`
    script. These are therefore not unit tests. We test different scenarios to check
    whether the application works well.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个例子中，测试依赖于在 `main.py` 脚本中创建的应用程序。因此，这些不是单元测试。我们测试不同的场景以检查应用程序是否运行良好。
- en: 'Integration tests determine whether independently developed code units work
    correctly when they are linked together. To implement an integration test, we
    need to:'
  id: totrans-156
  prefs: []
  type: TYPE_NORMAL
  zh: 集成测试确定独立开发的代码单元在链接在一起时是否正确工作。要实现集成测试，我们需要：
- en: write a function that contains a scenario
  id: totrans-157
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 编写包含场景的功能
- en: add assertions to check the test case
  id: totrans-158
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 添加断言以检查测试用例
- en: 2 – Functional tests
  id: totrans-159
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 2 – 功能测试
- en: Functional testing ensures that the application’s functionality complies with
    the specification. They differ from integration tests and unit tests because you
    don’t need to know the code to perform them. Indeed, a good knowledge of the functional
    specification will suffice.
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 功能测试确保应用程序的功能符合规范。它们与集成测试和单元测试不同，因为您不需要了解代码就可以执行它们。实际上，对功能规范的良好了解就足够了。
- en: The project manager can write all the specifications of the application and
    developers can write tests to test these specifications.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: 项目经理可以编写应用程序的所有规范，开发者可以编写测试来测试这些规范。
- en: In our previous example of a FastApi application, one of the specifications
    is to be able to add a new user and then check that this new user is in the database.
    Thus, we test the functionality “adding a user” with this test
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们之前关于FastApi应用程序的例子中，一个规格是能够添加新用户并检查该新用户是否在数据库中。因此，我们使用这个测试来测试“添加用户”的功能。
- en: '[PRE28]'
  id: totrans-163
  prefs: []
  type: TYPE_PRE
  zh: '[PRE28]'
- en: The End-to-End tests
  id: totrans-164
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 端到端测试
- en: The end is near! End-to-end (E2E) tests focus on simulating real-world scenarios,
    covering a range of flows from simple to complex. In essence, they can be thought
    of as functional tests with multiple steps.
  id: totrans-165
  prefs: []
  type: TYPE_NORMAL
  zh: 结束在即！端到端（E2E）测试专注于模拟现实世界场景，涵盖从简单到复杂的各种流程。本质上，它们可以被视为具有多个步骤的功能测试。
- en: However, E2E tests are the most time-consuming to execute, as they require building,
    deploying, and launching a browser to interact with the application.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，E2E测试执行起来最耗时，因为它们需要构建、部署和启动浏览器来与应用程序交互。
- en: When E2E tests fail, identifying the issue can be challenging due to the broad
    scope of the test, which encompasses the entire application. So you can now see
    why the testing pyramid has been designed in this way.
  id: totrans-167
  prefs: []
  type: TYPE_NORMAL
  zh: 当E2E测试失败时，由于测试范围广泛，涵盖了整个应用程序，因此识别问题可能具有挑战性。因此，你现在可以理解为什么测试金字塔被设计成这样。
- en: E2E tests are also the most difficult to write and maintain, owing to their
    extensive scope and the fact that they involve the entire application.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 由于其广泛的范围和涉及整个应用程序的事实，E2E测试也是最难编写和维护的。
- en: It’s essential to understand that E2E testing is not a replacement for other
    testing methods, but rather a complementary approach. E2E tests should be used
    to validate specific aspects of the application, such as button functionality,
    form submissions, and workflow integrity.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 理解E2E测试不是替代其他测试方法，而是一种补充方法至关重要。E2E测试应用于验证应用程序的特定方面，例如按钮功能、表单提交和工作流程完整性。
- en: Ideally, tests should detect bugs as early as possible, closer to the base of
    the pyramid. E2E testing serves to verify that the overall workflow and key interactions
    function correctly, providing a final layer of assurance.
  id: totrans-170
  prefs: []
  type: TYPE_NORMAL
  zh: 理想情况下，测试应尽可能早地检测到错误，接近金字塔的底部。E2E测试旨在验证整体工作流程和关键交互是否正确运行，提供最后一层保障。
- en: In our last example, if the user database is connected to an authentication
    service, an E2E test would consist of creating a new user, selecting their username
    and password, and then testing authentication with that new user, all through
    the graphical interface.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 在我们上一个例子中，如果用户数据库连接到身份验证服务，E2E测试将包括创建新用户、选择用户名和密码，然后通过图形界面测试使用该新用户的身份验证。
- en: '* * *'
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Conclusion
  id: totrans-173
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: To summarize, a balanced testing strategy is essential for any production project.
    By implementing a system of unit tests, integration tests, functional tests and
    E2E tests, you can ensure that your application meets the specifications. And,
    by following best practice and using the right testing tools, you can write more
    reliable, maintainable and efficient code and deliver high quality software to
    your users. Finally, it also simplifies future development and ensures that new
    features don’t break the code.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 总结来说，平衡的测试策略对于任何生产项目都是必不可少的。通过实施单元测试、集成测试、功能测试和E2E测试的系统，你可以确保你的应用程序符合规格。并且，通过遵循最佳实践和使用正确的测试工具，你可以编写更可靠、可维护和高效的代码，并向用户交付高质量的软件。最后，这也简化了未来的开发，并确保新功能不会破坏代码。
