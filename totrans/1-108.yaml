- en: 'AI Hype: Don’t Overestimate the Impact of AI'
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/the-ai-hype-dont-overestimate-the-impact-of-ai/](https://towardsdatascience.com/the-ai-hype-dont-overestimate-the-impact-of-ai/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: <mdspan datatext="el1762805187069" class="mdspan-comment">Have you ever taken</mdspan>
    a flight?
  prefs: []
  type: TYPE_NORMAL
- en: Chances are high that at some point — maybe for vacation, maybe for work — you
    have. At the airport, as you hand over your luggage, it disappears into the hidden
    world of baggage handling. Then, in most cases, your luggage magically reappears
    at your destination. Not much to say about this, actually.
  prefs: []
  type: TYPE_NORMAL
- en: But *before* you reach the service counter, you have to get your luggage *there*.
    And airports are large. If you ever had to walk across any major hub such as Dubai,
    Frankfurt, Heathrow, Istanbul, or Beijing while dragging bags, you know what that
    feels like.
  prefs: []
  type: TYPE_NORMAL
- en: Now imagine doing that *without* a trolley bag.
  prefs: []
  type: TYPE_NORMAL
- en: At some point, somebody had the idea of putting small wheels on a suitcase and
    added a handle. That’s it; nothing fancy. No machine learning, no distributed
    systems, no “world’s hardest problem”-level problems. *Just wheels on a bag*.
    Yet, this simple idea changed how millions of people move through the world, not
    just when flying.
  prefs: []
  type: TYPE_NORMAL
- en: We almost never think of the trolley bag as an “innovation.” In our minds, innovations
    always seem to be transforming the world, going zero to one in an instant. But
    the trolley *is* an invention — and, like many others, an important one.
  prefs: []
  type: TYPE_NORMAL
- en: The Trolley Bag Problem
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: What does the trolley have to do with AI? Well, right now, AI is often hailed
    as the missing ingredient to solving humanity’s biggest and hardest challenges.
  prefs: []
  type: TYPE_NORMAL
- en: 'X ([Google’s moonshot factory](https://x.company)) and similar organizations
    advertise theirs focus on renewable energies, clean drinking water, reliable and
    healthy foods. In many of these pitches, AI shows as an essential tool: optimizing
    energy grids, modeling crop yields, improving medical diagnosis. These are noble
    goals and I don’t doubt the sincerity or technical depth behind many of these
    efforts*.'
  prefs: []
  type: TYPE_NORMAL
- en: But there’s a gap.
  prefs: []
  type: TYPE_NORMAL
- en: 'Much of the AI narrative lives in the realm of **moonshots**: spectacular,
    press-ready, “this could change everything” stories. That is appealing, and we
    want to believe in such announcements. Just think about [*bringing a man to the
    moon*](https://en.wikipedia.org/wiki/We_choose_to_go_to_the_Moon).'
  prefs: []
  type: TYPE_NORMAL
- en: 'Yet the inventions that quietly move society forward are often those that are
    **mundane, nearly invisible improvements**:'
  prefs: []
  type: TYPE_NORMAL
- en: Wheels on luggage
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The barrow
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The zipper
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The lighter
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Standardized plugs
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Road signs
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These are boring inventions, yes, and nobody considers them as such. But they
    are also massive. They reduce friction for billions of people every day.
  prefs: []
  type: TYPE_NORMAL
- en: 'Most AI projects today don’t target this level of, well, boring usefulness.
    They either:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Optimize experiences we probably don’t want to optimize** much further (“better”
    content recommendations, slightly faster ad click prediction), or'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Aim at huge global challenges where impact is real but slow**, uncertain,
    or heavily constrained by non-technical factors.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'What is missing from this listing is the AI-days equivalent of the trolley
    bag: simple, reliable, inventions that day-in, day-out remove friction for you
    and me in ways we barely notice — but would miss immediately if taken away.'
  prefs: []
  type: TYPE_NORMAL
- en: Overestimating AI’s Everyday Impact
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'For most people, I’d wager that the following fundamentals still matter more
    than the latest AI model releases (even if they go from 100 billion to 500 billion
    parameters):'
  prefs: []
  type: TYPE_NORMAL
- en: '**Good relationships.'
  prefs: []
  type: TYPE_NORMAL
- en: Good food.
  prefs: []
  type: TYPE_NORMAL
- en: A safe and stable home.
  prefs: []
  type: TYPE_NORMAL
- en: Good health.**
  prefs: []
  type: TYPE_NORMAL
- en: At the current stage, AI doesn’t dramatically improve these in the way the hype
    sometimes suggests. Not for the majority of people, and not yet at the “wheels-on-a-bag”
    level.
  prefs: []
  type: TYPE_NORMAL
- en: 'Sure, AI systems can:'
  prefs: []
  type: TYPE_NORMAL
- en: Tell you when to water your plants.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Suggest a new YouTube video.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Draft an email or summarize a document.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These are nice, but mostly marginal and often require additional human re-tweaking.
    **You don’t fundamentally upgrade your life by having a model remind you to water
    your plants**. On your deathbed, you (hopefully) won’t think: *“I wish I’d had
    better content recommendations.”*
  prefs: []
  type: TYPE_NORMAL
- en: 'This doesn’t mean AI is useless. It’s already valuable in many workflows, including
    mine (think about coding assistance, for example!). But we should rethink our
    expectations: such **tooling improvements are not the same as civilization-shaping
    inventions**. And right now, a lot of AI attention is biased towards spectacular
    narratives, and away from the quiet, structural, boring improvements.'
  prefs: []
  type: TYPE_NORMAL
- en: What We Miss When We Only Chase Moonshots
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'When research, funding, and talent all converge around the “world’s hardest
    problems”, three things can happen:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Boring problems stay unsolved.** Annoying paperwork processes, hospital workflows,
    municipal services, accessibility issues, logistics quirks — areas where small,
    robust AI tools could remove daily pain — get less attention.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Potential is mistaken for presence.** We talk as if transformative AI impact
    has already fully arrived, when much of it is still conditional: on policy, infrastructure**,
    economics, adoption.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**We overestimate how much AI matters for a good life.** We risk treating AI
    literacy or AI enthusiasm as more important than basic, human, offline things
    that actually drive wellbeing (such as friendship or food).'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'The trolley bag metaphor can serve as a sanity check: if an AI system disappeared
    tomorrow, would people *feel* it like losing wheels on their luggage? In some
    narrow cases***: yes. In most cases: no, not at all.'
  prefs: []
  type: TYPE_NORMAL
- en: What Does This Mean for You?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'To anchor this perspective in your day-to-day thinking, I suggest three ways:'
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Be cautious with AI claims
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'When you see bold AI promises — containing “revolutionize,” “disrupt,” “solve
    X forever” style claims — do a quick mental check:'
  prefs: []
  type: TYPE_NORMAL
- en: Does this improve something concrete in daily life, or is it mostly a demo?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Is the bottleneck here really intelligence (which could be solved by an advanced
    AI system), or is it policy, incentives, logistics, or basic infrastructure?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If this system vanished, who would *actually* be worse off, and how?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Keep in mind: you do not need to be a cynic; just have well-intended skepticism.'
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Compare AI to mundane, boring inventions
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Use everyday inventions as a reference class:'
  prefs: []
  type: TYPE_NORMAL
- en: Does this AI system simplify life as clearly as, for example, lighter vs. matches,
    zipper vs. buttons, trolley bag vs. carrying?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Is it robust, cheap, and potentially boring enough that people will rely on
    it without thinking?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'If the answer is “not even close,” treat the announcement accordingly: interesting,
    maybe useful, but probably not world-reordering.'
  prefs: []
  type: TYPE_NORMAL
- en: 3\. When choosing your own AI projects, consider going anti-hype
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'If you’re working in ML or AI:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Look for problems that are **unsexy but real**: scheduling, documentation,
    accessibility, internal tools, error reduction, safety checks, forms, billing,
    routing, maintenance.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Aim for tools that people stop noticing because *they just work*.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Optimize for reliability over impressiveness.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Ask yourself: *Is this closer to a trolley bag or to a launch trailer?* If it’s
    the former, you’re probably on a good track.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Closing Thoughts
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'I’m not arguing against ambitious AI research. That would be counterproductive
    to my own work. We should definitely explore what’s possible and apply it to hard
    problems. But we should also recognize a gap here:'
  prefs: []
  type: TYPE_NORMAL
- en: Right now, most AI hype lives far away from the quiet, structural improvements
    that shape everyday life.
  prefs: []
  type: TYPE_NORMAL
- en: As individuals — researchers, engineers, users — we can respond by staying skeptical
    of inflated promises, by valuing mundane but meaningful improvements, and by intentionally
    building tools are more like a set of wheels on a bag.
  prefs: []
  type: TYPE_NORMAL
- en: Those are the kinds of changes that, over time, move the world forward.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '* In fact, behind such inventions, are easily 10+ years until notable improvements,
    not considering the many proverbial shoulders upon which these years are built
    themselves. From what I recall, David Silver started researching Reinforcement
    Learning around 2000 — but it would take a decade and more until we heard about
    AlphaGo!'
  prefs: []
  type: TYPE_NORMAL
- en: '** If you ever had to deploy a model, you know that infrastructure really is
    a paint point. Or, think about the energy costs used to train these models. The
    money spent on training the AI could probably already have solved the problem
    without needing AI…'
  prefs: []
  type: TYPE_NORMAL
- en: '*** Mostly work, I suppose. For day-to-day interaction with people, AI is not
    needed.'
  prefs: []
  type: TYPE_NORMAL
