- en: AI Is Not a Black Box (Relatively Speaking)
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/ai-is-not-a-black-box/](https://towardsdatascience.com/ai-is-not-a-black-box/)
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '<details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>Summary:
    Opinion piece for the general TDS audience. I argue that AI is more transparent
    than humans in tangible ways. Claims of AI being a “black box” lack perspective
    and comparison to the opacity in studies of human intelligence which in some ways
    is behind studies of artificial intelligence.</summary></details>'
  prefs: []
  type: TYPE_NORMAL
- en: <mdspan datatext="el1749772753263" class="mdspan-comment">You, a (presumably)
    human</mdspan> reader, are a black box. Your mind is mysterious. I can’t know
    how you are thinking. I can’t know what you will do and I can’t know whether your
    words are honest and whether you justify your actions honestly and without pretext.
    We learn to understand and trust humans from many years of introspection and experience
    interacting with others. But experience also tells us that understanding is limited
    to those with similar-enough life backgrounds and trust is unwarranted for those
    with motivations contrary to our own.
  prefs: []
  type: TYPE_NORMAL
- en: Artificial intelligence—while still mysterious—is crystal clear in comparison.
    I can probe an AI for its equivalent of thoughts and motivations and know I’m
    getting the truth. Further, the AI equivalent of “life background”, its training
    data, and equivalent of “motivations”, its training goal, are mostly if not entirely
    known and open to scrutiny and analysis. While we still lack years of experience
    with modern AI systems, I argue that there is no problem of opacity; to the contrary,
    the relative transparency of AI systems to inspection, their “white box” nature,
    can be a foundation for understanding and trust.
  prefs: []
  type: TYPE_NORMAL
- en: 'You may have heard of AI as a “black box” in two senses: AI like OpenAI’s ChatGPT
    or Anthropic’s [Claude are black boxes](https://techcrunch.com/2025/04/24/anthropic-ceo-wants-to-open-the-black-box-of-ai-models-by-2027/)
    because you cannot inspect their code or parameters (black box *access*). In the
    more general sense, even if you could inspect those things (*white* box access),
    they would be of little help in understanding how the AI operates to any generalizable
    extent. You could follow every instruction that defines ChatGPT and gain no more
    insight than if you merely read its output, a corollary to [the Chinese room](https://en.wikipedia.org/wiki/Chinese_room)
    argument. A (human) mind, however, is more opaque than even restricted-access
    AI. Since physical barriers and ethical constraints limit interrogation of the
    mechanisms of human thought and our models of the brain’s architecture and components
    are incomplete, the human mind is more of a black box—albeit an organic, carbon-based,
    “natural” one—than even the proprietary, closed-source AI models. Let’s compare
    what current science tells us about the internal workings of the human brain on
    the one hand and AI models on the other.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/563db65387216a45aafc087158e456dd.png)'
  prefs: []
  type: TYPE_IMG
- en: Fig 2\. fMRI-captured volume of human brain. Functional data not shown. Image
    by author; data by [Pietrini et al.](https://openfmri.org/dataset/ds000105/) included
    under [PPDL](https://opendatacommons.org/licenses/pddl/1-0/).
  prefs: []
  type: TYPE_NORMAL
- en: As of 2025, the only static neural structures that have been [mapped](https://flywire.ai/)—those
    of a fly—have but a tiny fraction of the complexity of the human brain. Functionally,
    experiments using [functional magnetic resonance imaging](https://en.wikipedia.org/wiki/Functional_magnetic_resonance_imaging)
    (fMRI) can pinpoint neural activity down to about 1mm³ volumes of brain matter.
    Figure 2 shows an example of the neural structure captured as part of an fMRI
    study. The required hardware includes a machine worth at least $200,000, steady
    access to liquid helium, and a supply of very patient humans willing to hold still
    while a tonne of superconductor spins inches from their heads. While fMRI studies
    can establish that, for example, the processing of [visual depictions of faces
    and houses is associated with certain brain regions](https://www.zora.uzh.ch/id/eprint/3224/9/haxby_science2001V.pdf),
    much of what we know about the [functions of the brain is thanks to literal accidents](https://en.wikipedia.org/wiki/Cognitive_neuropsychology),
    which are of course not ethically scalable. Ethical, less invasive experimental
    approaches provide relatively low signal-to-noise ratios.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b41c6ff3809db712ee3bedf1e539217d.png)'
  prefs: []
  type: TYPE_IMG
- en: Fig 3\. 425k concepts in Gemma2-2B across its 26 layers. Animation highlights
    each layer in sequence. Image and arrangement by author; data by Google included
    under [CC BY](https://huggingface.co/google/gemma-scope-2b-pt-res/blob/main/LICENSE).
  prefs: []
  type: TYPE_NORMAL
- en: 'Open source models (white box access), including large language models (LLM),
    are regularly sliced and diced (virtually) and otherwise interrogated in much
    more invasive ways than possible on humans even with the most expensive fMRI machine
    and sharpest scalpel—this using consumer computer gaming hardware. Every single
    bit of every single neural connection can be inspected and logged repeatedly and
    consistently under a huge space of inputs. The AI does not tire in the process,
    nor is it affected in any way. This level of access, control, and repeatability
    allows us to extract a massive amount of signal from which we can perform much
    fine-grained analysis. Controlling what an AI is observing lets us connect familiar
    concepts to components and processes within and outside of an AI in useful ways:'
  prefs: []
  type: TYPE_NORMAL
- en: Associate neural activity with [conc](https://www.neuronpedia.org/gemma-2-2b/16-gemmascope-res-16k/6077)[epts](https://www.neuronpedia.org/gemma-2-2b/16-gemmascope-res-16k/6259)
    akin to an fMRI. We can tell whether an AI is “thinking” about a particular concept.
    How well can we tell when a human is thinking about a particular concept? Figs.
    1 and 3 are two renderings of concepts from [GemmaScope](https://huggingface.co/google/gemma-scope)
    which provides annotations google’s Gemma2 model internals to concepts.
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Determine the [importance of particular inputs to outputs](https://arxiv.org/pdf/2305.15853).
    We can tell whether a specific part of a prompt was important in producing an
    AI’s response. Can we tell whether a human’s decision is impacted by a particular
    concern?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Attribute conveyance of concepts as [paths through an AI](https://arxiv.org/pdf/2005.01190).
    This means we can tell exactly where in a neural network a concept traveled from
    input words to eventual outputs. Fig 4 shows an example of such a path trace for
    a grammatical concept of subject-number agreement. Can we do the same for humans?
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![Path through which subject-number agreement is conveyed across the layers
    of a bidirectional transformer (BERT) model.](../Images/fb60b6fef9b49c67eef9cd1ce4206399.png)'
  prefs: []
  type: TYPE_IMG
- en: Fig 4\. Path through which subject-number agreement is conveyed across the layers
    of a bidirectional transformer (BERT) model. Image by author ([source](https://arxiv.org/pdf/2011.00740)).
  prefs: []
  type: TYPE_NORMAL
- en: Humans can, of course, self-report answers to the first two questions above.
    You can ask a hiring manager what they were thinking about when they read your
    résumé or what factors were important in their decision to offer you a job (or
    not). Unfortunately, humans lie, they themselves don’t know the reasons for their
    actions, or they are [biased in ways they are not aware of](https://en.wikipedia.org/wiki/Implicit-association_test).
    While this is also the case for generative AI, methods for interpretability in
    the AI space do not rely on AI’s answers, [truthful](https://arxiv.org/pdf/2304.13734),
    [unbiased](https://arxiv.org/pdf/2402.04489), self-aware, or otherwise. We don’t
    need to trust the AI’s outputs in order to tell whether it is thinking about a
    particular concept. We literally read it off a (virtual) probe stuck onto its
    neurons. For open source models, this is trivial, laughably so considering what
    it takes to get this sort of information (ethically) out of a human.
  prefs: []
  type: TYPE_NORMAL
- en: What about closed-source “black box access” AI? Much can be inferred just from
    black box access. Models’ lineage is known, and so is their general architecture.
    Their basic components are standard. They can also be interrogated at a rate much
    higher than a human would put up with, and in a more controlled and reproducible
    manner. Repeatability under chosen inputs is often a replacement for open access.
    [Parts of models can be inferred](https://arxiv.org/pdf/2403.06634) or their [semantics
    copied by “distillation”](https://www.forbes.com/sites/siladityaray/2025/01/29/openai-believes-deepseek-distilled-its-data-for-training-heres-what-to-know-about-the-technique/).
    So black-box is not an absolute impediment to understanding and trust, but the
    most immediate way to make AI more transparent is to allow open access to its
    entire specification, despite current trends among the prominent AI builders.
  prefs: []
  type: TYPE_NORMAL
- en: Humans may be the more complex thinking machines, so the above comparisons may
    not seem fair. And we are more inclined to feel that we understand and can trust
    humans because of our years of experience being human and interacting with other
    (presumed) humans. Our experience with various AIs is growing rapidly, and so
    are their capabilities. While the sizes of the top-performing models are also
    growing, their general architectures have been stable. There is no indication
    that we will lose the kind of transparency into their operation described above,
    even as they attain and subsequently surpass human capabilities. There is also
    no indication that exploration of the human brain is likely to yield a breakthrough
    significant enough to render it the less opaque intelligence. AI is not—and likely
    will not become—the black box that the popular human sentiment says it is.
  prefs: []
  type: TYPE_NORMAL
- en: '[Piotr Mardziel](https://piotr.mardziel.com/), head of AI, [RealmLabs.AI](http://realmlabs.ai).'
  prefs: []
  type: TYPE_NORMAL
