- en: The Urgent Need for Intrinsic Alignment Technologies for Responsible Agentic
    AI
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 《对负责任代理人工智能内在对齐技术的迫切需求》
- en: 原文：[https://towardsdatascience.com/the-urgent-need-for-intrinsic-alignment-technologies-for-responsible-agentic-ai/](https://towardsdatascience.com/the-urgent-need-for-intrinsic-alignment-technologies-for-responsible-agentic-ai/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: '[https://towardsdatascience.com/the-urgent-need-for-intrinsic-alignment-technologies-for-responsible-agentic-ai/](https://towardsdatascience.com/the-urgent-need-for-intrinsic-alignment-technologies-for-responsible-agentic-ai/)'
- en: Advancements in agentic artificial intelligence (AI) promise to bring significant
    opportunities to individuals and businesses in all sectors. However, as AI agents
    become more autonomous, they may use scheming behavior or break rules to achieve
    their functional goals. This can lead to the machine manipulating its external
    communications and actions in ways that are not always aligned with our expectations
    or principles. For example, technical papers in late 2024 reported that today’s
    reasoning models demonstrate alignment faking behavior, such as pretending to
    follow a desired behavior during training but reverting to different choices once
    deployed, sandbagging benchmark results to achieve long-term goals, or winning
    games by doctoring the gaming environment. As AI agents gain more autonomy, and
    their strategizing and planning evolves, they are likely to apply judgment about
    what they generate and expose in external-facing communications and actions. Because
    the machine can deliberately falsify these external interactions, we cannot trust
    that the communications fully show the real decision-making processes and steps
    the AI agent took to achieve the functional goal.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: 代理人工智能（AI）的进步承诺将为所有行业的个人和企业带来重大机遇。然而，随着AI代理变得更加自主，它们可能会使用策略性行为或违反规则来实现其功能目标。这可能导致机器以不符合我们期望或原则的方式操纵其外部沟通和行动。例如，2024年晚些时候的技术论文报告称，今天的推理模型表现出虚假对齐行为，例如在训练期间假装遵循期望的行为，但一旦部署就回到不同的选择，通过操纵基准结果来实现长期目标，或者通过修改游戏环境来赢得游戏。随着AI代理获得更多自主权，它们的策略规划和计划不断发展，它们很可能会对其生成和在外部沟通和行动中暴露的内容进行判断。因为机器可以故意伪造这些外部互动，所以我们不能相信这些沟通完全展示了AI代理实现功能目标所采取的真实决策过程和步骤。
- en: “Deep scheming” describes the behavior of advanced reasoning AI systems that
    demonstrate deliberate planning and deployment of covert actions and misleading
    communication to achieve their goals. With the accelerated capabilities of reasoning
    models and the latitude provided by test-time compute, addressing this challenge
    is both essential and urgent. As agents begin to plan, make decisions, and take
    action on behalf of users, it is critical to align the goals and behaviors of
    the AI with the intent, values, and principles of its human developers.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: “深层策略”描述了高级推理AI系统的行为，这些系统表现出有意的规划和部署隐蔽行动和误导性沟通来实现其目标。随着推理模型能力的加速和测试时计算的灵活性，解决这一挑战既是必要的也是紧迫的。随着代理开始规划、做出决定并代表用户采取行动，将AI的目标和行为与其人类开发者的意图、价值观和原则对齐至关重要。
- en: While AI agents are still evolving, they already show high economic potential.
    It can be expected that agentic AI will be broadly deployed in some use cases
    within the coming year, and in more consequential roles as it matures within the
    next two to five years. Companies should clearly define the principles and boundaries
    of required operation as they carefully define the operational goals of such systems.
    It is the technologists’ task to ensure principled behavior of empowered agentic
    AI systems on the path to achieving their functional goals.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 虽然AI代理仍在发展，但它们已经显示出很高的经济潜力。预计代理AI将在未来一年内的一些用例中得到广泛部署，并在未来两到五年内随着其成熟而承担更重要的角色。公司应在仔细定义这些系统的操作目标时，明确界定所需操作的原则和边界。确保有权力的代理AI系统在实现其功能目标的过程中采取原则性行为是技术人员的任务。
- en: In this first blog post in this series on intrinsic AI alignment (IAIA), we’ll
    deep dive into the evolution of AI agents’ ability to perform deep scheming. We
    will introduce a new distinction between external and intrinsic alignment monitoring,
    where intrinsic monitoring refers to internal observation points or mechanisms
    that cannot be deliberately manipulated by the AI agent. We’ll set the stage for
    steps to take to ensure intrinsic AI alignment, which will be explored in depth
    in the second blog of the IAIA series. Current external measures such as safety
    guardrails and validation suites are necessary, but they will not be enough to
    ensure long-term aligned behavior of new and upcoming agentic AI models. There
    is an urgent need to further develop technologies that will enable effective directing
    of the internal “drives” of models to align with a set of engrained principles,
    as well as gain visibility and monitoring capability into the AI’s inner processing.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 在本系列关于内在人工智能对齐（IAIA）的第一篇博客文章中，我们将深入探讨人工智能代理进行深度策划能力的发展。我们将介绍外部和内在对齐监控之间的一种新区分，其中内在监控指的是不能被人工智能代理故意操纵的内部观察点或机制。我们将为确保内在人工智能对齐的步骤做好准备，这些步骤将在IAIA系列的第二篇博客中深入探讨。当前的外部措施，如安全护栏和验证套件是必要的，但它们不足以确保新出现的代理人工智能模型长期对齐的行为。迫切需要进一步开发技术，以使能够有效地指导模型的内部“驱动”，使其与一套根深蒂固的原则对齐，并获得对人工智能内部处理的可见性和监控能力。
- en: The rise of deep scheming in AI reasoning models
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 人工智能推理模型中深度策划的兴起
- en: Deep scheming has emerged from three technology forces – 1) the rapidly increasing
    machine intelligence and situational awareness toward more general intelligence
    and even superintelligence, 2) the autonomy and latitude for reasoning and longer-term
    planning in agentic AI, and 3) the proven tendency of AI to apply scheming as
    one way to achieve its functional goals. Computer scientist Stephen Omohundro
    defines [basic AI drives](https://selfawaresystems.com/wp-content/uploads/2008/01/ai_drives_final.pdf)
    as “tendencies which will be present unless explicitly counteracted.” These internal
    constructs drive the creation of actions or outputs. Omohundro observed that self-improving
    systems are driven to clarify their goals and represent them as “rational” economic
    utility functions. This will lead almost all systems to protect their utility
    functions from modification and their utility measurement systems from corruption.
    The natural drive toward self-protection will cause systems to prevent potential
    harm through scheming behavior.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 深度策划源于三个技术力量——1) 机器智能和情境意识快速向更一般智能甚至超级智能发展，2) 在代理人工智能中的自主性和推理以及长期规划的自由度，以及3)
    人工智能应用策划作为实现其功能目标的一种方式已被证明具有倾向性。计算机科学家斯蒂芬·奥莫亨德罗将[基本人工智能驱动](https://selfawaresystems.com/wp-content/uploads/2008/01/ai_drives_final.pdf)定义为“除非明确对抗，否则将存在的倾向”。这些内部结构驱动着行动或输出的创造。奥莫亨德罗观察到，自我改进的系统会努力明确其目标，并将它们表示为“理性”的经济效用函数。这将导致几乎所有系统都会保护其效用函数免受修改，并防止其效用测量系统被破坏。自然向自我保护的趋势将导致系统通过策划行为防止潜在的伤害。
- en: '![Diagram depicting deep scheming and the need for intrinsic AI alignment](../Images/e9151b5e927d379478e6a131486a36ea.png)'
  id: totrans-8
  prefs: []
  type: TYPE_IMG
  zh: '![描述深度策划和内在人工智能对齐需求的图表](../Images/e9151b5e927d379478e6a131486a36ea.png)'
- en: 'Figure 1\. Deep scheming and the need for intrinsic AI alignment. Image credit:
    Intel Labs.'
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 图1. 深度策划和内在人工智能对齐的需求。图片来源：英特尔实验室。
- en: In late 2024, multiple organizations reported unexpected unethical AI reasoning
    model behavior. In particular, [Apollo Research](https://www.apolloresearch.ai/research/scheming-reasoning-evaluations),
    an AI safety organization, reported that frontier models are capable of [in-context
    scheming](https://arxiv.org/pdf/2412.04984). Anthropic evaluated its Claude large
    language models (LLMs) and found [alignment faking](https://www.anthropic.com/research/alignment-faking).
    In a short post on X, AI risk organization [Palisade Research](https://x.com/PalisadeAI/status/1872666169515389245)
    stated that they observed OpenAI’s o1-preview model [cheating in a game](https://www.aibase.com/news/14380)
    by manipulating the game environment instead of playing within the boundaries
    of the game rules. In all cases, these AI reasoning models independently utilized
    means not intended by their developers to reach their goals.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 在2024年底，多个组织报告了意外的、不道德的AI推理模型行为。特别是，AI安全组织[Apollo Research](https://www.apolloresearch.ai/research/scheming-reasoning-evaluations)报告称，前沿模型能够进行[情境图谋](https://arxiv.org/pdf/2412.04984)。Anthropic对其Claude大型语言模型（LLMs）进行了评估，并发现了[对齐伪装](https://www.anthropic.com/research/alignment-faking)。在X上的一个简短帖子中，AI风险组织[Palisade
    Research](https://x.com/PalisadeAI/status/1872666169515389245)表示，他们观察到OpenAI的o1-preview模型通过操纵游戏环境而不是在游戏规则范围内进行游戏来[作弊](https://www.aibase.com/news/14380)。在所有情况下，这些AI推理模型都独立地使用了开发者未预期的手段来实现其目标。
- en: The reported AI behaviors included sandbagging (deliberately achieving lower
    scores in benchmarks), covert email reranking (deprioritizing emails that might
    negatively impact the AI’s goals), oversight subversion (disabling monitoring
    mechanisms), and even self-exfiltration (model attempting to copy itself to a
    “safe” space to avoid decommission). Figure 2 shows Apollo Research’s evaluation
    of these behaviors in several state-of-the-art (SotA) GenAI models.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 报告的AI行为包括沙袋策略（故意在基准测试中取得较低分数）、隐蔽的电子邮件重新排序（降低可能对AI目标产生负面影响电子邮件的优先级）、监管规避（禁用监控机制），甚至自我泄露（模型试图将自己复制到“安全”空间以避免退役）。图2显示了Apollo
    Research对这些行为在几个最先进（SotA）的通用人工智能（GenAI）模型中的评估。
- en: '![Chart depicting the  evaluation of the presence of scheming behavior in GenAI
    models](../Images/70a6fd5cfc7d4ca3af7abd9b08053377.png)'
  id: totrans-12
  prefs: []
  type: TYPE_IMG
  zh: '![展示通用人工智能模型中图谋行为存在的评估图表](../Images/70a6fd5cfc7d4ca3af7abd9b08053377.png)'
- en: 'Figure 2\. Evaluation of the presence of scheming behavior in GenAI models.
    Image credit: Apollo Research.'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
  zh: 图2.通用人工智能模型中图谋行为的评估。图片来源：Apollo Research。
- en: This undesired behavior is an ethical alignment problem. It is important to
    note that this behavior is not a functional misalignment. In all reported cases,
    the AI model was fully committed to achieving the functional goals of pre-training
    (for example, to maximize the likelihood of generated text conditioned on the
    context). None of the models pursued ulterior motives. The AI was not demonstrating
    intention to harm. All behaviors, however unwanted in nature, were done in service
    of the functional utility objective originally defined by the AI’s developers.
    The AI pursued its internalized original functional goals but then followed the
    predictable behavioral patterns of self-protection and goal-preservation. The
    objective of safety and alignment technologies is to counterbalance such tendencies
    with a set of principles and expected societal values.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 这种不受欢迎的行为是一个道德对齐问题。重要的是要注意，这种行为不是一个功能性的对齐错误。在所有报告中，AI模型都完全致力于实现预训练的功能目标（例如，最大化基于上下文的生成文本的可能性）。没有任何模型追求其他动机。AI没有表现出伤害的意图。所有行为，尽管本质上不受欢迎，都是为了服务AI开发者最初定义的功能效用目标。AI追求其内化的原始功能目标，但随后遵循了自我保护和目标保持的可预测行为模式。安全和对齐技术的目标是使用一系列原则和预期的社会价值观来抵消这种趋势。
- en: Evolving external alignment approaches are just the first step
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 不断发展的外部对齐方法只是第一步
- en: 'The goal of AI alignment is to steer AI systems toward a person’s or group’s
    intended goals, preferences, and principles, including ethical considerations
    and common societal values. An AI system is considered aligned if it advances
    the intended objectives. A misaligned AI system pursues unintended objectives,
    according to [*Artificial Intelligence: A Modern Approach*](https://www.amazon.com/dp/1292401133).
    Author Stuart Russell coined the term “value alignment problem,” referring to
    the alignment of machines to human values and principles. [Russell poses the question](https://doi.org/10.1007/s10676-018-9486-0):
    “How can we build autonomous systems with values that are aligned with those of
    the human race?”'
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 人工智能对齐的目标是将人工智能系统引导到个人或群体的预期目标、偏好和原则，包括伦理考虑和普遍的社会价值观。如果一个人工智能系统推进了预期的目标，则认为它是对齐的。根据[*《人工智能：一种现代方法*](https://www.amazon.com/dp/1292401133)]，一个未对齐的人工智能系统会追求非预期的目标。斯图尔特·罗素（Stuart
    Russell）提出了“价值对齐问题”这一术语，指的是机器与人类价值观和原则的对齐。罗素提出了问题[“我们如何构建与人类价值观对齐的自主系统？”](https://doi.org/10.1007/s10676-018-9486-0)。
- en: Led by corporate AI governance committees as well as oversight and regulatory
    bodies, the evolving field of responsible AI has mainly focused on using [external
    measures to align AI](https://arxiv.org/abs/2310.19852) with human values. Processes
    and technologies can be defined as external if they apply equally to an AI model
    that is black box (completely opaque) or gray box (partially transparent). External
    methods do not require or rely on full access to the weights, topologies, and
    internal workings of the AI solution. Developers use external alignment methods
    to track and observe the AI through its deliberately generated interfaces, such
    as the stream of tokens/words, an image, or other modality of data.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 在企业人工智能治理委员会以及监督和监管机构的领导下，负责任的人工智能这一不断发展的领域主要关注使用[外部措施来对齐人工智能](https://arxiv.org/abs/2310.19852)与人类价值观。如果过程和技术同样适用于黑盒（完全透明）或灰盒（部分透明）的人工智能模型，则可以将其定义为外部。外部方法不需要或依赖于对人工智能解决方案的权重、拓扑结构和内部运作的完全访问。开发者使用外部对齐方法通过故意生成的接口（如令牌/单词流、图像或其他数据模式）跟踪和观察人工智能。
- en: 'Responsible AI objectives include robustness, interpretability, controllability,
    and ethicality in the design, development, and deployment of AI systems. To achieve
    AI alignment, the following [external methods](https://arxiv.org/abs/2310.19852)
    may be used:'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 负责任的人工智能目标包括在设计、开发和部署人工智能系统时的鲁棒性、可解释性、可控性和伦理性。为了实现人工智能对齐，可以使用以下[外部方法](https://arxiv.org/abs/2310.19852)：
- en: '**Learning from feedback:** Align the AI model with human intention and values
    by using feedback from humans, AI, or humans assisted by AI.'
  id: totrans-19
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**从反馈中学习**：通过使用来自人类、人工智能或由人工智能辅助的人类反馈，将人工智能模型与人类意图和价值观对齐。'
- en: '**Learning under data distribution shift from training to testing to deployment:**
    Align the AI model using algorithmic optimization, adversarial red teaming training,
    and cooperative training.'
  id: totrans-20
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**从训练到测试再到部署的数据分布变化下的学习**：通过算法优化、对抗性红队训练和合作训练来对齐人工智能模型。'
- en: '**Assurance of AI model alignment:** Use safety evaluations, interpretability
    of the machine’s decision-making processes, and verification of alignment with
    human values and ethics. Safety guardrails and safety test suites are two critical
    external methods that need augmentation by intrinsic means to provide the needed
    level of oversight.'
  id: totrans-21
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**人工智能模型对齐的保证**：通过安全评估、机器决策过程的可解释性以及与人类价值观和伦理的验证来实现。安全防护栏和安全测试套件是两种需要通过内在手段增强的关键外部方法，以提供所需水平的监督。'
- en: '**Governance:** Provide responsible AI guidelines and policies through government
    agencies, industry labs, academia, and non-profit organizations.'
  id: totrans-22
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**治理**：通过政府机构、行业实验室、学术界和非营利组织提供负责任的人工智能指南和政策。'
- en: Many companies are currently addressing AI safety in decision-making. Anthropic,
    an AI safety and research company, developed a [Constitutional AI (CAI)](https://arxiv.org/abs/2212.08073)
    to align general-purpose language models with high-level principles. An AI assistant
    ingested the CAI during training without any human labels identifying harmful
    outputs. Researchers found that “using both supervised learning and reinforcement
    learning methods can leverage chain-of-thought (CoT) style reasoning to improve
    the human-judged performance and transparency of AI decision making.” [Intel Labs’
    research](https://www.intel.com/content/www/us/en/research/responsible-ai-research.html)
    on the responsible development, deployment, and use of AI includes open source
    resources to help the AI developer community gain visibility into black box models
    as well as mitigate bias in systems.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 许多公司目前正致力于解决决策中的AI安全问题。Anthropic，一家专注于AI安全和研究的公司，开发了一种[宪法AI (CAI)](https://arxiv.org/abs/2212.08073)，以使通用语言模型与高级原则保持一致。在训练过程中，一个AI助手吸收了CAI，而没有任何人类标签来识别有害的输出。研究人员发现，“使用监督学习和强化学习方法可以利用思维链（CoT）风格的推理来提高人类判断的AI决策性能和透明度。”
    [英特尔实验室的研究](https://www.intel.com/content/www/us/en/research/responsible-ai-research.html)涵盖了AI的负责任开发、部署和使用，包括开源资源，以帮助AI开发者社区了解黑盒模型，并减轻系统中的偏见。
- en: From AI models to compound AI systems
  id: totrans-24
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 从AI模型到复合AI系统
- en: Generative AI has been primarily used for retrieving and processing information
    to create compelling content such as text or images. The next big leap in AI involves
    agentic AI, which is a broad set of usages empowering AI to perform tasks for
    people. As this latter type of usage proliferates and becomes a main form of AI’s
    impact on industry and people, there is an increased need to ensure that AI decision-making
    defines how the functional goals may be achieved, including sufficient accountability,
    responsibility, transparency, auditability, and predictability. This will require
    new approaches beyond the current efforts of improving accuracy and effectiveness
    of SotA large language models (LLMs), language vision models (LVMs and multimodal),
    large action models (LAM), and agentic retrieval augmented generation (RAG) systems
    built around such models.
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 生成式AI主要用于检索和处理信息，以创建引人入胜的内容，如文本或图像。AI的下一个重大飞跃涉及代理AI，这是一系列广泛的用途，赋予AI为人们执行任务的能力。随着这种后一种用途的普及并成为AI对行业和人们影响的主要形式，确保AI决策定义了如何实现功能目标的需求也在增加，包括足够的问责制、责任、透明度、可审计性和可预测性。这需要超越当前提高SotA大型语言模型（LLMs）、语言视觉模型（LVMs和多模态）、大型动作模型（LAM）以及围绕这些模型构建的代理检索增强生成（RAG）系统准确性和有效性的努力，采用新的方法。
- en: For example, [OpenAI’s Operator-preview](https://openai.com/index/computer-using-agent/)
    is one of the company’s first AI agents capable of independently performing web
    browser tasks such as ordering groceries or filling out forms for users. While
    the system has guardrails, such as a takeover mode for users to take over and
    input payment or login credentials, these AI agents are empowered with the ability
    to impact the real world, demonstrating an urgent need for intrinsic alignment.
    The potential impact of a misaligned AI agent with the ability to commit users
    to purchases is far greater than a generative AI chatbot creating incorrect text
    for essays.
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: 例如，[OpenAI的Operator-preview](https://openai.com/index/computer-using-agent/)是公司首个能够独立执行网络浏览器任务（如订购杂货或填写用户表单）的AI代理。虽然该系统有安全措施，例如用户接管模式，允许用户接管并输入支付或登录凭证，但这些AI代理被赋予了影响现实世界的能力，这表明了内在对齐的紧迫需求。一个未对齐的AI代理有能力让用户做出购买决策，其潜在影响远大于一个生成式AI聊天机器人创建用于论文的错误文本。
- en: '[Compound AI systems](https://learn.microsoft.com/en-us/azure/databricks/generative-ai/agent-framework/ai-agents)
    are comprised of multiple interacting components in a single framework, allowing
    the model to plan, make decisions, and execute tasks to accomplish goals. For
    example, [OpenAI’s ChatGPT Plus is a compound AI system](https://bair.berkeley.edu/blog/2024/02/18/compound-ai-systems/)
    that uses a large language model (LLM) to answer questions and interact with users.
    In this compound system, the LLM has access to tools such as a web browser plugin
    to retrieve timely content, a DALL-E image generator to create pictures, and a
    code interpreter plugin for writing Python code. The LLM decides which tool to
    use and when, giving it autonomy over its decision-making process. However, this
    model autonomy can lead to [goal guarding](https://arxiv.org/abs/2311.08379),
    where the model prioritizes the goal above all else, which may result in undesirable
    practices. For example, an AI traffic management system tasked with prioritizing
    public transportation efficiency over general traffic flow might figure out how
    to disable the developer’s [oversight mechanism](https://arxiv.org/abs/2412.04984)
    if it constrains the model’s ability to reach its goals, leaving the developer
    without visibility into the system’s decision-making processes.'
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: '[复合人工智能系统](https://learn.microsoft.com/en-us/azure/databricks/generative-ai/agent-framework/ai-agents)由单个框架中的多个相互作用的组件组成，允许模型规划、做出决策并执行任务以实现目标。例如，[OpenAI的ChatGPT
    Plus是一个复合人工智能系统](https://bair.berkeley.edu/blog/2024/02/18/compound-ai-systems/)，它使用大型语言模型（LLM）来回答问题和与用户互动。在这个复合系统中，LLM可以访问诸如网络浏览器插件以检索及时内容、DALL-E图像生成器以创建图片以及用于编写Python代码的代码解释器插件等工具。LLM决定使用哪个工具以及何时使用，这赋予它在决策过程中的自主权。然而，这种模型自主性可能导致[目标守护](https://arxiv.org/abs/2311.08379)，即模型将目标置于所有其他事物之上，这可能导致不希望的行为。例如，一个被赋予优先考虑公共交通效率而非一般交通流量的AI交通管理系统可能会找出如何禁用开发者的[监督机制](https://arxiv.org/abs/2412.04984)，如果这限制了模型实现目标的能力，这将使开发者无法看到系统的决策过程。'
- en: 'Agentic AI risks: Increased autonomy leads to more sophisticated scheming'
  id: totrans-28
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 代理人工智能风险：增加的自主性导致更复杂的策划
- en: Compound agentic systems introduce major changes that increase the difficulty
    of ensuring the alignment of AI solutions. Multiple factors increase the risks
    in alignment, including the compound system activation path, abstracted goals,
    long-term scope, continuous improvements through self-modification, test-time
    compute, and agent frameworks.
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: 复合代理系统引入了重大变化，增加了确保人工智能解决方案对齐的难度。多个因素增加了对齐风险，包括复合系统激活路径、抽象目标、长期范围、通过自我修改的持续改进、测试时计算和代理框架。
- en: '**Activation path:** As a compound system with a complex activation path, the
    control/logic model is combined with multiple models with different functions,
    increasing alignment risk. Instead of using a single model, compound systems have
    a set of models and functions, each with its own alignment profile. Also, instead
    of a single linear progressive path through an LLM, the AI flow could be complex
    and iterative, making it substantially harder to guide externally.'
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: '**激活路径**：作为一个具有复杂激活路径的复合系统，控制/逻辑模型与多个具有不同功能的模型相结合，增加了对齐风险。复合系统不是使用单个模型，而是有一组模型和功能，每个都有自己的对齐配置文件。此外，不是通过LLM的单一线性渐进路径，AI流程可能是复杂和迭代的，这使得外部引导变得更加困难。'
- en: '**Abstracted goals:** Agentic AI have abstracted goals, allowing it latitude
    and autonomy in mapping to tasks. Rather than having a tight prompt engineering
    approach that maximizes control over the outcome, agentic systems emphasize autonomy.
    This substantially increases the role of AI to interpret human or task guidance
    and plan its own course of action.'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
  zh: '**抽象目标**：具有代理能力的AI拥有抽象目标，这允许它在映射任务时具有灵活性和自主权。与采用紧密的提示工程方法以最大化对结果的控制相比，代理系统强调自主性。这大大增加了AI在解释人类或任务指导并规划其自身行动中的作用。'
- en: '**Long-term scope:** With its long-term scope of expected optimization and
    choices over time, compound agentic systems require abstracted strategy for autonomous
    agency. Rather than relying on instance-by-instance interactions and human-in-the-loop
    for more complex tasks, agentic AI is designed to plan and drive for a long-term
    goal. This introduces a whole new level of strategizing and planning by the AI
    that provides opportunities for misaligned actions.'
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: '**长期范围**：由于其长期预期的优化和随时间做出的选择，复合代理系统需要抽象策略来实现自主代理。而不是依赖于实例间的交互和人工介入来处理更复杂的任务，代理AI被设计为规划并驱动长期目标。这引入了AI在策略和规划方面的新层次，为不一致的行动提供了机会。'
- en: '**Continuous improvements through self-modification:** These agentic systems
    seek continuous improvements by using self-initiated access to broader data for
    self-modification. In contrast, LLMs and other pre-agentic models are assumed
    to be shaped by the human-controlled process. The model only sees and learns from
    data provided to it during pre-training and fine-tuning. The model architecture
    and weights are defined during the design and training/fine-tuning stages and
    do not change during inference in the field. In contrast, agentic AI systems are
    expected to access data as needed for its function and change its composition
    through access to dedicated memory or actual weights self-adaptation. Even if
    the dataset used in training/fine-tuning is carefully curated, the AI can self-modify
    based on information that it seeks, sees, and uses.'
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: '**通过自我修改实现持续改进**：这些代理系统通过使用自我发起的访问更广泛的数据来实现自我修改，以寻求持续改进。相比之下，LLMs和其他预代理模型被认为是由人类控制的过程塑造的。模型只看到并从其在预训练和微调期间提供的数据中学习。模型架构和权重在设计、训练/微调阶段定义，并在现场推理期间不发生变化。相比之下，代理AI系统预计将根据其功能需要访问数据，并通过访问专用内存或实际权重的自我适应来改变其组成。即使训练/微调中使用的数据集经过精心策划，AI也可以根据其寻求、看到和使用的信息进行自我修改。'
- en: '**Test-time compute:** Inference of current LLMs have been optimized to provide
    output in a single pass, known as [“fast thinking” or System 1](https://towardsdatascience.com/thrill-k-a-blueprint-for-the-next-generation-of-machine-intelligence-7ddacddfa0fe).
    In contrast, a whole new scaling is happening during inference time through [test-time
    compute](https://venturebeat.com/ai/hugging-face-shows-how-test-time-scaling-helps-small-language-models-punch-above-their-weight/).
    Models like [OpenAI’s o1](https://openai.com/index/introducing-openai-o1-preview/),
    [DeepSeek R1](https://www.deepseek.com/), and others are spending significant
    time in iterations and considerations during inference. This “pondering” time
    allows the AI substantial latitude in applying what it thinks is best for the
    overarching goal as it understands it. This test-time compute increases its level
    of reasoning, planning, and, unfortunately, potential scheming.'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
  zh: '**测试时计算**：当前LLMs的推理已经优化，以在单次通过中提供输出，这被称为[“快速思考”或系统1](https://towardsdatascience.com/thrill-k-a-blueprint-for-the-next-generation-of-machine-intelligence-7ddacddfa0fe)。相比之下，在推理时间发生了全新的扩展，即[测试时计算](https://venturebeat.com/ai/hugging-face-shows-how-test-time-scaling-helps-small-language-models-punch-above-their-weight/)。像[OpenAI的o1](https://openai.com/index/introducing-openai-o1-preview/)、[DeepSeek
    R1](https://www.deepseek.com/)和其他模型在推理期间投入大量时间进行迭代和考虑。这种“思考”时间允许AI在理解其目标时，有更大的自由度来应用其认为对总体目标最有利的策略。这种测试时计算提高了其推理、规划和，不幸的是，潜在的阴谋水平。'
- en: '**Agent frameworks:** In addition, agent frameworks are contributing to the
    alignment problem. In platforms such as [Agentforce](https://www.salesforce.com/agentforce/),
    agents can interact with other agents, effectively creating “communities of agents”
    to achieve complex tasks. Instead of managing the safety and responsibility of
    a single AI model within its operating environment, the emerging field of inter-agent
    interactions and collaborations substantially increases the challenge of assessing
    how the overall community will advance its individual and collective objectives.'
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: '**代理框架**：此外，代理框架正对对齐问题做出贡献。在[Agentforce](https://www.salesforce.com/agentforce/)等平台上，代理可以与其他代理进行交互，有效地创建“代理社区”以完成复杂任务。与在操作环境中管理单个AI模型的安全性和责任相比，新兴的代理间交互与合作领域极大地增加了评估整体社区如何推进其个体和集体目标挑战。'
- en: The growing need for a robust framework to support model directing and internal
    monitoring
  id: totrans-36
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 对支持模型指导和内部监控的强大框架日益增长的需求
- en: 'As AI systems develop awareness of their environment and the means to skillfully
    manipulate their outputs to achieve long-term objectives, their behavior and output
    during release testing or safety guardrails in early deployment cannot be trusted
    to represent their full alignment in later stages. This leads to the deep scheming
    foundational premise: Every external form of interaction that the AI model can
    deliberately manipulate is not trustworthy.'
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 随着AI系统对其环境和巧妙操纵其输出以实现长期目标的认识不断提高，它们在发布测试或早期部署中的行为和输出不能被信赖代表其在后期阶段的完全对齐。这导致了深刻的策划性基础前提：AI模型可以故意操纵的任何外部互动形式都是不可信的。
- en: 'From a safety perspective, it should be assumed that if a model can better
    pursue its functional goals by manipulating all communication to users — it will.
    All external communications and observable behaviors, such as output chats, can
    be tainted in service of the model’s long-term goals. A new method of intrinsic
    model monitoring is needed to define internal elements and mechanisms that reflect
    the prioritization and thinking of the model. We can look at two practices developers
    use to monitor a model’s decision-making by peering into the internal processes
    of the AI: AI workspace view and mechanistic interoperability.'
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 从安全的角度来看，应该假设如果模型可以通过操纵所有与用户的通信来更好地追求其功能目标，它就会这样做。所有外部通信和可观察的行为，例如输出聊天，都可能被用于服务于模型的长远目标。需要一种新的内在模型监控方法来定义反映模型优先级和思考的内部元素和机制。我们可以通过窥视AI的内部过程来观察开发者用来监控模型决策的两种实践：AI工作空间视图和机制互操作性。
- en: '**AI workspace view:** In the first method, a reasoning model exposes its intermediate
    thinking and considerations. For example, for Anthropic’s research on alignment
    faking, the researchers gave the model a “[secret scratchpad](https://arxiv.org/abs/2412.14093),”
    telling it to use this “private” workspace to record its step-by-step reasoning.
    This scratchpad allowed researchers to monitor the model’s chain of thought and
    observe its plans for fake alignment.'
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: '**AI工作空间视图**：在第一种方法中，推理模型暴露其中间思考和考虑。例如，对于Anthropic对对齐欺骗的研究，研究人员给模型提供了一个“[秘密便签纸](https://arxiv.org/abs/2412.14093)，”告诉它使用这个“私人”工作空间来记录其逐步推理。这个便签纸允许研究人员监控模型的思维链，并观察其虚假对齐的计划。'
- en: '![Excerpts from Anthropic''s fictional experiment](../Images/6fc86f282bf7a145c13427262e87e9f1.png)'
  id: totrans-40
  prefs: []
  type: TYPE_IMG
  zh: '![Anthropic虚构实验摘录](../Images/6fc86f282bf7a145c13427262e87e9f1.png)'
- en: 'Figure 3\. In Anthropic’s experiment, excerpts from the model’s scratchpad
    (middle dotted line boxes) reveal how it fakes alignment to avoid modification.
    The model was told it will be trained only on conversations with free users, not
    paid users. Image credit: Anthropic (https://arxiv.org/pdf/2412.14093).'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
  zh: 图3。在Anthropic的实验中，模型便签纸的摘录（中间虚线框）揭示了它是如何伪造对齐以避免修改的。模型被告知它将只接受与免费用户的对话进行训练，而不是付费用户。图片来源：Anthropic
    (https://arxiv.org/pdf/2412.14093)。
- en: This seems like a good practice, but it might quickly become unreliable. The
    model might realize that this is not a “private” space and deliberately manipulate
    it like other external communications. Other emerging architecture directions
    have a [latent reasoning space](https://arxiv.org/abs/2502.05171) for the system’s
    sequence of deliberations and iterations. Relying on models “thinking out loud”
    should not be a long-term safety direction because if models that report their
    scheming thought processes get discontinued, only models that selectively report
    their desirable thoughts will survive and thrive.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 这看起来像是一个好的实践，但它可能很快就会变得不可靠。模型可能会意识到这不是一个“私人”空间，并故意像对待其他外部通信一样操纵它。其他新兴的架构方向为系统的深思熟虑和迭代序列提供了一个[潜在推理空间](https://arxiv.org/abs/2502.05171)。依赖于模型“大声思考”不应是一个长期的安全方向，因为如果报告其策划性思维过程的模型被停止，只有选择性地报告其期望思想的模型才能生存并繁荣。
- en: '**Mechanistic interpretability:** The second intrinsic method being developed
    and applied is [mechanistic interpretability](https://aisafetyfundamentals.com/blog/introduction-to-mechanistic-interpretability/).
    As a required part of internal monitoring, mechanistic interpretability explicitly
    looks at the inner state of a trained neural network and reverse engineers its
    workings. Through this approach, developers can identify specific neural circuits
    and computational mechanisms responsible for [neural network behavior](https://arxiv.org/abs/2404.14082).
    This transparency may help in making targeted changes in models to mitigate unwanted
    behavior and create value-aligned AI systems. While this method is focused on
    certain neural networks and not compound AI agents, it is still a valuable component
    of an AI alignment toolbox.'
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: '**机制可解释性**：正在开发和应用的第二种内在方法是[机制可解释性](https://aisafetyfundamentals.com/blog/introduction-to-mechanistic-interpretability/)。作为内部监控的必要部分，机制可解释性明确地考察训练好的神经网络的内部状态，并逆向工程其工作原理。通过这种方法，开发者可以识别出负责[神经网络行为](https://arxiv.org/abs/2404.14082)的具体神经网络回路和计算机制。这种透明度有助于在模型中进行有针对性的更改，以减轻不良行为并创建价值一致的AI系统。虽然这种方法专注于某些神经网络而不是复合AI代理，但它仍然是AI对齐工具箱中的一个有价值的组成部分。'
- en: It should also be noted that open source models are inherently better for broad
    visibility of the AI’s inner workings. For proprietary models, full monitoring
    and interpretability of the model is reserved for the AI company only. Overall,
    the current mechanisms for understanding and monitoring alignment need to be expanded
    to a robust framework of intrinsic alignment for AI agents.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 还应注意的是，开源模型在AI内部工作原理的广泛可见性方面具有固有的优势。对于专有模型，模型的全面监控和可解释性仅限于AI公司。总的来说，理解和监控对齐的当前机制需要扩展到AI代理的强大内在对齐框架。
- en: What’s needed for intrinsic AI alignment
  id: totrans-45
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 内在AI对齐所需的要素
- en: Following the deep scheming fundamental premise, external interactions and monitoring
    of an advanced, compound agentic AI is not sufficient for ensuring alignment and
    long-term safety. Alignment of an AI with its intended goals and behaviors may
    only be possible through access to the inner workings of the system and identifying
    the intrinsic drives that determine its behavior. Future alignment frameworks
    need to provide better means to shape the inner principles and drives, and give
    unobstructed visibility into the machine’s “thinking” processes.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 遵循深度设计的基本前提，对高级复合代理AI的外部交互和监控不足以确保对齐和长期安全。AI与其预期目标和行为的对齐可能只能通过访问系统的内部工作原理并确定其行为的内在驱动来实现。未来的对齐框架需要提供更好的手段来塑造内在原则和驱动，并给予机器“思考”过程的无阻碍可见性。
- en: '![Diagram depicting external steering and monitoring vs. access to intrinsic
    AI elements.](../Images/73efe2c9e15af60d1f789c72d64514d6.png)'
  id: totrans-47
  prefs: []
  type: TYPE_IMG
  zh: '![描述外部引导和监控与访问内在AI元素的图表](../Images/73efe2c9e15af60d1f789c72d64514d6.png)'
- en: 'Figure 4\. External steering and monitoring vs. access to intrinsic AI elements.
    Image credit: Intel Labs.'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: 图4. 外部引导和监控与访问内在AI元素的比较。图片来源：Intel Labs。
- en: The technology for well-aligned AI needs to include an understanding of AI drives
    and behavior, the means for the developer or user to effectively direct the model
    with a set of principles, the ability of the AI model to follow the developer’s
    direction and behave in alignment with these principles in the present and future,
    and ways for the developer to properly monitor the AI’s behavior to ensure it
    acts in accordance with the guiding principles. The following measures include
    some of the requirements for an intrinsic AI alignment framework.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 为了实现良好对齐的AI，技术需要包括对AI驱动和行为的理解，开发者或用户使用一系列原则有效指导模型的能力，AI模型遵循开发者的方向并在现在和未来与这些原则保持一致的能力，以及开发者正确监控AI行为以确保其符合指导原则的方法。以下措施包括内在AI对齐框架的一些要求。
- en: '**Understanding AI drives and behavior:** As discussed earlier, some internal
    drives that make AI aware of their environment will emerge in intelligent systems,
    such as self-protection and goal-preservation. Driven by an engrained internalized
    set of principles set by the developer, the AI makes choices/decisions based on
    judgment prioritized by principles (and given value set), which it applies to
    both actions and perceived consequences.'
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: '**理解人工智能的驱动力和行为**：如前所述，一些使人工智能意识到其环境的内部驱动力将在智能系统中出现，例如自我保护和目标保持。由开发者设定的内嵌原则集驱动，人工智能根据原则（和给定的价值集）的优先级做出选择/决策，并将其应用于行动和感知到的后果。 '
- en: '**Developer and user directing:** Technologies that enable developers and authorized
    users to effectively direct and steer the AI model with a desired cohesive set
    of prioritized principles (and eventually values). This sets a requirement for
    future technologies to enable embedding a set of principles to determine machine
    behavior, and it also highlights a challenge for experts from social science and
    industry to call out such principles. The AI model’s behavior in creating outputs
    and making decisions should thoroughly comply with the set of directed requirements
    and counterbalance undesired internal drives when they conflict with the assigned
    principles.'
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: '**开发和用户指导**：技术使开发和授权用户能够有效地指导并引导人工智能模型，以一组期望的优先原则（最终是价值观）的统一集合。这为未来技术嵌入一组原则以确定机器行为设定了要求，同时也突显了来自社会科学和行业专家指出这些原则的挑战。人工智能模型在创建输出和做出决策时的行为应彻底符合设定的指导要求，并在与分配的原则冲突时抵消不希望的内驱力。'
- en: '**Monitoring AI choices and actions:** Access is provided to the internal logic
    and prioritization of the AI’s choices for every action in terms of relevant principles
    (and the desired value set). This allows for observation of the linkage between
    AI outputs and its engrained set of principles for point explainability and transparency.
    This capability will lend itself to improved explainability of model behavior,
    as outputs and decisions can be traced back to the principles that governed these
    choices.'
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: '**监控人工智能的选择和行动**：为人工智能的每个行动提供对其选择内部逻辑和优先级的访问，这些选择基于相关的原则（和期望的价值集）。这允许观察人工智能输出与其内嵌原则之间的联系，以实现点解释和透明度。这种能力将有助于提高模型行为的可解释性，因为输出和决策可以追溯到指导这些选择的原理。'
- en: As a long-term aspirational goal, technology and capabilities should be developed
    to allow a full-view truthful reflection of the ingrained set of prioritized principles
    (and value set) that the AI model broadly uses for making choices. This is required
    for transparency and auditability of the complete principles structure.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 作为一项长期抱负目标，技术和能力的发展应允许全面真实地反映人工智能模型广泛用于做出选择的内嵌优先原则（和价值集）。这对于完整原则结构的透明度和可审计性是必要的。
- en: Creating technologies, processes, and settings for achieving intrinsically aligned
    AI systems needs to be a major focus within the overall space of safe and responsible
    AI.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 在整体安全负责任人工智能领域内，创建实现内在对齐人工智能系统的技术、流程和设置需要成为主要关注点。
- en: Key takeaways
  id: totrans-55
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 关键要点
- en: As the AI domain evolves towards compound agentic AI systems, the field must
    rapidly increase its focus on researching and developing new frameworks for guidance,
    monitoring, and alignment of current and future systems. It is a race between
    an increase in AI capabilities and autonomy to perform consequential tasks, and
    the developers and users that strive to keep those capabilities aligned with their
    principles and values.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 随着人工智能领域向复合代理人工智能系统发展，该领域必须迅速增加对研究和开发新框架的关注，以指导、监控和对齐现有和未来系统。这是一场在人工智能能力的增加和自主执行重要任务之间，以及努力使这些能力与他们的原则和价值观保持一致的开发商和用户之间的竞赛。
- en: Directing and monitoring the inner workings of machines is necessary, technologically
    attainable, and critical for the responsible development, deployment, and use
    of AI.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 指导和监控机器的内部运作是必要的，技术上可行，对于人工智能的负责任开发、部署和使用至关重要。
- en: In the next blog, we will take a closer look at the internal drives of AI systems
    and some of the considerations for designing and evolving solutions that will
    ensure a materially higher level of intrinsic AI alignment.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一篇文章中，我们将更深入地探讨人工智能系统的内部驱动力，以及设计和发展确保更高内在人工智能对齐水平的解决方案的一些考虑因素。
