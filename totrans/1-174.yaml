- en: Is RAG Dead? The Rise of Context Engineering and Semantic Layers for Agentic
    AI
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
- en: 原文：[https://towardsdatascience.com/beyond-rag/](https://towardsdatascience.com/beyond-rag/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Introduction
  id: totrans-2
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Retrieval-Augmented Generation (RAG) may have been necessary for the first wave
    of enterprise AI, but it’s quickly evolving into something much larger. Over the
    past two years, organizations have realized that simply retrieving text snippets
    using vector search isn’t enough. Context has to be governed, explainable, and
    adaptive to an agent’s purpose.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
- en: This post explores how that evolution is taking shape and what it means for
    data and AI leaders building systems that can reason responsibly.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
- en: 'You’ll come away with answers to a few key questions:'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
- en: '**How do knowledge graphs improve RAG?**'
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
- en: They provide structure and meaning to enterprise data, linking entities and
    relationships across documents and databases to make retrieval more accurate and
    explainable for both humans and machines.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
- en: '**How do semantic layers help LLMs retrieve better answers?**'
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
- en: Semantic layers standardize data definitions and governance policies so AI agents
    can understand, retrieve, and reason over all kinds of data as well as AI tools,
    memories, and other agents.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
- en: '**How is RAG evolving in the age of agentic AI?**'
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
- en: Retrieval is becoming one step in a broader reasoning loop (increasingly being
    called “context engineering”) where agents dynamically write, compress, isolate,
    and select context across data and tools.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
- en: '**TL;DR**'
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
- en: '<mdspan datatext="el1761022579113" class="mdspan-comment">Retrieval-Augmented
    Generation</mdspan> (RAG) rose to prominence following the launch of ChatGPT and
    the realization that there is a limit on the context window: you can’t just copy
    all your data into the chat interface. Teams used RAG, and its variants like GraphRAG
    (RAG using a graph database) to bring additional context into prompts at query
    time. RAG’s popularity soon exposed its weaknesses: putting incorrect, irrelevant,
    or just too much information into the context window can actually degrade rather
    than improve results. New techniques like re-rankers were developed to overcome
    those limitations but RAG wasn’t built to survive in the new agentic world.'
  id: totrans-13
  prefs: []
  type: TYPE_NORMAL
- en: As AI shifts from single prompts to autonomous agents, retrieval and its variants
    are just one tool in an agent’s toolbelt, alongside writing, compressing, and
    isolating context. As the complexity of workflows and the information required
    to complete those workflows grows, retrieval will continue to evolve (though it
    may be called context engineering, RAG 2.0, or agentic retrieval). The next era
    of retrieval (or context engineering) will require metadata management across
    data structures (not just relational) as well as tools, memories, and agents themselves.
    We will evaluate retrieval not just for accuracy but also relevance, groundedness,
    provenance, coverage, and recency. Knowledge graphs will be key for retrieval
    that is context-aware, policy-aware, and semantically grounded.
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
- en: The Rise of RAG
  id: totrans-15
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: What is RAG?
  id: totrans-16
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '*RAG, or Retrieval-Augmented Generation, is a technique for retrieving relevant
    information to augment a prompt that is sent to an LLM in order to improve the
    model’s response. *'
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
- en: Shortly after ChatGPT went mainstream in November 2022, users realized that
    LLMs weren’t (hopefully) trained on their own data. To bridge that gap, teams
    began developing ways to retrieve relevant data at query time to augment the prompt
    – an approach known as retrieval-augmented generation (RAG). The term came from
    a 2020 [Meta paper](https://dl.acm.org/doi/abs/10.5555/3495724.3496517), but the
    popularity of the GPT models brought the term and the practice into the limelight.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
- en: Tools like LangChain and LlamaIndex helped developers build these retrieval
    pipelines. [LangChain](https://www.pinecone.io/learn/series/langchain/langchain-intro)
    was launched at around the same time as ChatGPT as a way of chaining different
    components like prompt templates, LLMs, agents, and memory together for generative
    AI applications. [LlamaIndex](https://www.llamaindex.ai/blog/llamaindex-turns-1-f69dcdd45fe3)
    was also launched at the same time as a way to address the limited context window
    in GPT3 and thus enabling RAG. As developers experimented, they realized that
    vector databases provide a fast and scalable way to power the retrieval part of
    RAG, and vector databases like Weaviate, Pinecone, and Chroma become standard
    parts of the RAG architecture.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
- en: What is GraphRAG?
  id: totrans-20
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '*GraphRAG is a variation of RAG where the underlying database used for retrieval
    is a knowledge graph or a graph database. *'
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
- en: 'One variation of RAG became especially popular: GraphRAG. The idea here is
    that the underlying data to supplement LLM prompts is stored in a knowledge graph.
    This allows the model to reason over entities and relationships rather than flat
    text chunks. In early 2023, researchers began publishing [papers](https://arxiv.org/abs/2306.08302)
    exploring how knowledge graphs and LLMs could complement each other. In late 2023,
    Juan Sequeda, Dean Allemang, and Bryon Jacob from data.world released a [paper](https://arxiv.org/pdf/2311.07509)
    demonstrating how knowledge graphs can improve LLM accuracy and explainability.
    In July 2024, Microsoft open-sourced its [GraphRAG](https://www.microsoft.com/en-us/research/blog/graphrag-new-tool-for-complex-data-discovery-now-on-github/)
    framework, which made graph-based retrieval accessible to a wider developer audience
    and solidified GraphRAG as a recognizable category within RAG.'
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
- en: The rise of GraphRAG reignited interest in knowledge graphs akin to when Google
    launched its Knowledge Graph in 2012\. The sudden demand for structured context
    and explainable retrieval gave them new relevance.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
- en: 'From **2023–2025**, the market responded quickly:'
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
- en: '**January 23, 2023 – Digital Science** [**acquired**](https://www.digital-science.com/blog/2023/01/digital-science-acquires-metaphacts/)
    **metaphacts**, creators of the metaphactory platform: “a platform that supports
    customers in accelerating their adoption of knowledge graphs and driving knowledge
    democratization.”'
  id: totrans-25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**February 7, 2023 – Progress** [**acquired**](https://investors.progress.com/news-releases/news-release-details/progress-completes-acquisition-marklogic)
    **MarkLogic in February of 2023\.** MarkLogic is a multimodal NoSQL database,
    with a particular strength in managing RDF data, the core data format for graph
    technology.'
  id: totrans-26
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**July 18, 2024 – Samsung** [**acquired**](https://news.samsung.com/global/samsung-electronics-announces-acquisition-of-oxford-semantic-technologies-uk-based-knowledge-graph-startup)
    **Oxford Semantic Technologies**, makers of the RDFox graph database, to power
    on-device reasoning and personal knowledge capabilities.'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**October 23, 2024 – Ontotext and Semantic Web Company** [**merged**](https://www.ontotext.com/company/news/semantic-web-company-and-ontotext-merge-to-create-knowledge-graph-and-ai-powerhouse-graphwise/)
    **to form Graphwise**, explicitly positioning around GraphRAG. “The announcement
    is significant for the graph industry, as it elevates Graphwise as the most comprehensive
    knowledge graph AI organization and establishes a clear path towards democratizing
    the evolution of Graph RAG as a category.”'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**May 7, 2025 – ServiceNow announced its** [**acquisition**](https://news.samsung.com/global/samsung-electronics-announces-acquisition-of-oxford-semantic-technologies-uk-based-knowledge-graph-startup)
    **of data.world**, integrating a graph-based data catalog and semantic layer into
    its enterprise workflow platform.'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: These are just the events related to knowledge graph and related semantic technology.
    If we expand this to include metadata management and/or semantic layers more broadly
    then there are more deals, most notably the $8 billion acquisition of metadata
    leader Informatica by Salesforce.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
- en: 'These moves mark a clear shift: knowledge graphs are no longer just metadata
    management tools—they’ve become the semantic backbone for AI and closer to their
    origins as expert systems. GraphRAG made knowledge graphs relevant again by giving
    them a critical role in retrieval, reasoning, and explainability.'
  id: totrans-31
  prefs: []
  type: TYPE_NORMAL
- en: In my day job as the product lead for a [semantic data and AI company](https://www.topquadrant.com/),
    we work to solve the gap between data and its actual meaning for some of the world’s
    biggest companies. Making their data AI-ready is a mix of making it interoperable,
    discoverable, and usable so it can feed LLMs contextually relevant information
    in order to produce safe, accurate results. This is no small order for large,
    highly regulated, and complex enterprises managing exponential amounts of data.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
- en: The fall of RAG and the rise of context engineering
  id: totrans-33
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Is RAG dead? No, but it has evolved. The original version of RAG relied on
    a single dense vector search and took the top results to feed directly into an
    LLM. GraphRAG built on this by adding in some graph analytics and entity and/or
    relationship filters. Those implementations almost immediately ran into constraints
    around relevance, scalability, and noise. These constraints pushed RAG forward
    into new evolutions known by many names: [agentic retrieval](https://www.llamaindex.ai/blog/rag-is-dead-long-live-agentic-retrieval),
    [RAG 2.0](https://contextual.ai/research/introducing-rag2), and most recently,
    [context engineering](https://rlancemartin.github.io/2025/06/23/context_engineering/).
    The original, naive implementation is largely dead, but its descendants are thriving
    and the term itself is still incredibly popular.'
  id: totrans-34
  prefs: []
  type: TYPE_NORMAL
- en: Following the RAG hype cycle in 2024, there was inevitable disillusionment.
    While it is possible to build a RAG demo in minutes, and many people did, getting
    your app to scale in an enterprise becomes quite a bit dicier. “People think that
    RAG is easy because you can build a nice RAG demo on a single document very quickly
    now and it will be pretty nice. But getting this to actually work at scale on
    real world data where you have enterprise constraints is a very different problem,”
    [said Douwe Kiela](https://open.spotify.com/episode/1x2LGmp2XxF3NnIOCZvnOV?si=dab35acc539f49b7)
    of [Contextual AI](https://contextual.ai/) and one of the authors of the original
    RAG paper from Meta in 2020.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
- en: One issue with scaling a RAG app is the volume of data needed at retrieval time.
    “I think the trouble that people get into with it is scaling it up. It’s great
    on 100 documents, but now all of a sudden I have to go to 100,000 or 1,000,000
    documents” says [Rajiv Shah](https://open.spotify.com/episode/3NBOA7jKCKxmHuvJsapWY1?si=dd9e9c54bceb4923).
    But as LLMs matured, their context windows grew. The size of context windows was
    the original pain point that RAG was built to address, raising the question if
    RAG is still necessary or useful. As Dr. Sebastian Gehrmann from Bloomberg [points
    out](https://open.spotify.com/episode/0LsaFcX2AE90Bpga1rziAN?si=eb6fe6c817a844e7),
    “If I am able to just paste in more documents or more context, I don’t need to
    rely on as many tricks to narrow down the context window. I can just rely on the
    large language model. There is a tradeoff here though” he notes, “where longer
    context usually comes at a cost of significantly increased latency and cost.”
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
- en: It isn’t just cost and latency that you risk by arbitrarily dumping more information
    into the context window, you can also degrade performance. RAG can improve responses
    from LLMs, *provided the retrieved context is relevant to the initial prompt.*
    If the context is not relevant, you can get worse results, something called “context
    poisoning” or “context clash”, where misleading or contradictory information contaminates
    the reasoning process. Even if you are retrieving relevant context, you can overwhelm
    the model with sheer volume, leading to “context confusion” or “context distraction.”
    While terminology varies, multiple studies show that model accuracy tends to decline
    beyond a certain context size. This was found in a [Databricks paper](https://www.databricks.com/blog/long-context-rag-performance-llms)
    back in August of 2024 and reinforced through [recent research](https://research.trychroma.com/context-rot)
    from [Chroma](https://www.trychroma.com/), something they termed “context rot”.
    Drew Breuning’s [post](https://www.dbreunig.com/2025/06/22/how-contexts-fail-and-how-to-fix-them.html)
    usefully categorizes these issues as distinct “context fails”.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
- en: To address the problem of overwhelming the model, or providing incorrect, or
    irrelevant information, re-rankers have grown in popularity. As Nikolaos Vasiloglou
    from RelationalAI [states](https://open.spotify.com/episode/3u9MbffwCelnRx6lWXzsPN?si=be84424c725f4f43),
    “a re-ranker is, after you bring the facts, how do you decide what to keep and
    what to throw away, [and that] has a big impact.” Popular re-rankers are Cohere
    Rerank, Voyage AI Rerank, Jina Reranker, and BGE Reranker. Re-ranking is not enough
    in today’s agentic world. The newest generation of RAG has become embedded into
    agents–something increasingly known as context engineering.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
- en: What is Context Engineering?
  id: totrans-39
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '*“the art and science of filling the context window with just the right information
    at each step of an agent’s trajectory.”* [*Lance Martin*](https://rlancemartin.github.io/2025/06/23/context_engineering/)
    *of LangChain.*'
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
- en: 'I want to focus on context engineering for two reasons: the originators of
    the terms RAG 2.0 and Agentic Retrieval (Contextual AI and LlamaIndex, respectively)
    have started using the term context engineering; and it is a far more popular
    term based on Google search trends. Context engineering can also be thought of
    as an evolution of prompt engineering. Prompt engineering is about crafting a
    prompt in a way that gets you the results you want, context engineering is about
    supplementing that prompt with the appropriate context'
  id: totrans-41
  prefs: []
  type: TYPE_NORMAL
- en: 'RAG grew to prominence in 2023, eons ago in the timeline of AI. Since then,
    everything has become ‘agentic’. RAG was created under the assumption that the
    prompt would be generated by a human, and the response would be read by a human.
    With agents, we need to rethink how this works. Lance Martin breaks down context
    engineering into four categories: **write, compress, isolate, and select**. Agents
    need to **write** (or persist or remember) information from task to task, just
    like humans. Agents will often have too much context as they go from task to task
    and need to **compress** or condense it somehow, usually through summarization
    or ‘pruning’. Rather than giving all of the context to the model, we can **isolate**
    it or split it across agents so they can, [as Anthropic describes it](https://www.anthropic.com/engineering/multi-agent-research-system),
    “explore different parts of the problem simultaneously”. Rather than risk context
    rot and degraded results, the idea here is to not give the LLM enough rope to
    hang itself.'
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
- en: Agents have to use their memories when needed or call upon tools to retrieve
    additional information, i.e. they need to **select** (retrieve) what context to
    use. One of those tools could be vector-based retrieval i.e. traditional RAG.
    But that is just one tool in the agent’s toolbox. As Mark Brooker from AWS [put
    it](https://open.spotify.com/episode/4VWQKGvgoOYxeZJ8yclfix?si=4ae802515a5744e1),
    “I do expect what we’re going to see is some of the flashy newness around vector
    kind of settle down and us go to a world where we have this new tool in our toolbox,
    but a lot of the agents we’re building are using relational interfaces. They’re
    using those document interfaces. They’re using lookup by primary key, lookup by
    secondary index. They’re using lookup by geo. All of these things that have existed
    in the database space for decades, now we also have this one more, which is kinda
    lookup by semantic meaning, which is very exciting and new and powerful.”
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
- en: Those at the forefront are already doing this. Martin quotes Varun Mohan of
    Windsurf who [says](https://x.com/_mohansolo/status/1899630200780153274), “we
    […] rely on a combination of techniques like grep/file search, knowledge graph
    based retrieval, and … a re-ranking step where [context] is ranked in order of
    relevance.”
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
- en: 'Naive RAG may be dead, and we are still figuring out what to call the modern
    implementations, but one thing seems certain: the future of **retrieval** is bright.
    How can we ensure agents are able to retrieve different datasets across an enterprise?
    From relational data to documents? The answer is increasingly being called the
    semantic layer.'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
- en: Context engineering needs a semantic layer
  id: totrans-46
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: What is a Semantic Layer?
  id: totrans-47
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '*A semantic layer is a way of attaching metadata to all data in a form that
    is both human and machine readable, so that people and computers can consistently
    understand, retrieve, and reason over it.*'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
- en: There is a recent push from those in the relational data world to build a semantic
    layer over relational data. Snowflake even created an [Open Semantic Interchange](https://www.snowflake.com/en/blog/open-semantic-interchange-ai-standard/)
    (OSI) initiative to attempt to standardize the way companies are documenting their
    data to make it ready for AI.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
- en: But focusing solely on relational data is a narrow view of semantics. What about
    unstructured data and semi-structured data? That’s the kind of data that large
    **language** models excel at and what started all the RAG rage. If only there
    was a precedent for retrieving relevant search results across a ton of unstructured
    data 🤔.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
- en: Google has been retrieving relevant information across the entire internet for
    decades using structured data. By structured data, here, I mean machine-readable
    metadata, or as Google [describes it](https://developers.google.com/search/docs/appearance/structured-data/intro-structured-data),
    “a standardized format for providing information about a page and classifying
    the page content.” Librarians, information scientists, and SEO practitioners have
    been tackling the unstructured data retrieval problem through knowledge organization,
    information retrieval, structured metadata, and Semantic Web technologies. Their
    methods for describing, linking, and governing unstructured data underpin today’s
    search and discovery systems, both publicly and at the enterprise. The future
    of the semantic layer will bridge the relational and the structured data worlds
    by combining the rigor of relational data management with the contextual richness
    of library sciences and knowledge graphs.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/7787a0fdc010ec79b106c5dd9e11a446.png)'
  id: totrans-52
  prefs: []
  type: TYPE_IMG
- en: Image by Author
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
- en: The future of RAG
  id: totrans-54
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Here are my predictions for the future of RAG.
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
- en: '**RAG will continue to evolve into more agentic patterns.** This means that
    retrieval of context is just one part of a reasoning loop which also includes
    writing, compressing, and isolating context. Retrieval becomes an iterative process,
    rather than one-shot. Anthropic’s [Model Context Protocol (MCP)](https://www.anthropic.com/news/model-context-protocol)
    treats retrieval as a tool that can be given via MCP to an agent. OpenAI offers
    [File search](https://platform.openai.com/docs/guides/tools-file-search) as a
    tool that agents can call. LangChain’s agent framework LangGraph lets you build
    agents using a node and edge pattern (like a graph). In their [quickstart guide](https://langchain-ai.github.io/langgraph/tutorials/get-started/2-add-tools/)
    here, you can see that retrieval (in this case a web search) is just one of the
    tools that the agent can be given to do its job. [Here](https://docs.langchain.com/oss/python/langgraph/workflows-agents)
    they list retrieval as one of the actions an agent or workflow can take. Wikidata
    also [has an MCP](https://www.wikidata.org/wiki/Wikidata:MCP) that enables users
    to interact directly with public data.'
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
- en: '**Retrieval will broaden and include all kinds of data (aka multimodal retrieval):**
    relational, content, and then images, audio, geodata, and video. LlamaIndex offers
    four [‘retrieval modes’](https://developers.llamaindex.ai/python/cloud/llamacloud/retrieval/modes/):
    chunks, files_via_metadata, files_via_content, auto_routed. They also offer [composite
    retrieval](https://developers.llamaindex.ai/python/cloud/llamacloud/retrieval/composite/),
    allowing you to retrieve from multiple sources at once. Snowflake offers [Cortex
    Search](https://docs.snowflake.com/en/user-guide/snowflake-cortex/cortex-search/cortex-search-overview)
    for content and [Cortex Analyst](https://docs.snowflake.com/en/user-guide/snowflake-cortex/cortex-analyst)
    for relational data. LangChain offers [retrievers](https://python.langchain.com/docs/concepts/retrievers/)
    over relational data, graph data (Neo4j), lexical, and vector.'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
- en: '**Retrieval will broaden to include metadata about tools themselves, as well
    as “memories”.** Anthropic’s MCP standardized how agents call tools using a [registry
    of tools](https://modelcontextprotocol.io/docs/learn/architecture) i.e. tool metadata.
    [OpenAI](https://platform.openai.com/docs/guides/function-calling), [LangChain](https://python.langchain.com/docs/concepts/tools/),
    [LlamaIndex](https://developers.llamaindex.ai/python/framework/module_guides/deploying/agents/tools/),
    [AWS Bedrock](https://docs.aws.amazon.com/bedrock/latest/userguide/agents-api-schema.html),
    [Azure](https://learn.microsoft.com/en-us/azure/ai-foundry/agents/how-to/tools/overview),
    [Snowflake](https://docs.snowflake.com/en/user-guide/snowflake-cortex/cortex-agents),
    and [Databricks](https://docs.databricks.com/aws/en/generative-ai/agent-framework/agent-tool)
    all have capabilities for managing tools, some via MCP directly, others via their
    own registries. On the memory side, both [LlamaIndex](https://developers.llamaindex.ai/python/examples/memory/memory/)
    and [LangChain](https://docs.langchain.com/oss/python/concepts/memory) treat memories
    as retrievable data (short term and long term) that agents can query during workflows.
    Projects like [Cognee](https://www.cognee.ai/) push this further with dedicated,
    queryable agent memory.'
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
- en: '**Knowledge graphs will play a key role as a metadata layer between relational
    and unstructured data, replacing the narrow definition of semantic layer currently
    in use with a more robust metadata management framework.** The market consolidation
    we’ve seen over the past couple years and described above, I believe, is an indication
    of the market’s growing acknowledgement that knowledge graphs and metadata management
    are going to be crucial as agents are asked to do more complicated tasks across
    enterprise data. Gartner’s May 2025 report *“[Pivot Your Data Engineering Discipline
    to Efficiently Support AI Use Cases](https://www.gartner.com/en/documents/6509371),”*
    recommends data engineering teams adopt semantic techniques (such as ontologies
    and knowledge graphs) to support AI use cases. Knowledge graphs, metadata management,
    and reference data management are already ubiquitous in large life sciences and
    financial services companies, largely because they are highly regulated and require
    fact-based, grounded data to power their AI initiatives. Other industries are
    going to start adopting the tried and true methods of semantic technology as their
    use cases become more mature and require explainable answers.'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
- en: '**Evaluation metrics on context retrieval will gain popularity.** [Ragas](https://docs.ragas.io/en/stable/howtos/applications/evaluate-and-improve-rag/),
    [Databricks](https://docs.databricks.com/aws/en/generative-ai/agent-evaluation/)
    Mosaic AI Agent Evaluation, and [TruLens](https://www.trulens.org/getting_started/core_concepts/rag_triad/)
    all provide frameworks for evaluating RAG. [Evidently](https://www.evidentlyai.com/llm-guide/rag-evaluation)
    offers open source libraries and instructional material on RAG evaluation. LangChain’s
    evaluation product LangSmith has a [module](https://docs.langchain.com/langsmith/evaluate-rag-tutorial)
    focused on RAG. What is important is that these frameworks are not just evaluating
    the accuracy of the answer given the prompt, they evaluate context relevance and
    groundedness (how well the response is supported by the context). Some vendors
    are building out metrics to evaluate provenance (citations and sourcing) of the
    retrieved context, coverage (did we retrieve enough?) and freshness or recency.'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
- en: '**Policy-as-code guardrails** ensure retrieval respects access control, policies,
    regulations, and best practices. Snowflake and Databricks enable [row](https://docs.snowflake.com/en/user-guide/security-row-intro)
    level access control and [column](https://docs.databricks.com/aws/en/data-governance/unity-catalog/filters-and-masks/)
    [masking](https://docs.snowflake.com/en/user-guide/security-column-ddm-use) already.
    Policy engines like [Open Policy Agent (OPA)](https://www.openpolicyagent.org/)
    and [Oso](https://www.osohq.com/) are embedding access control into agentic workflows.
    As Dr. Sebastian Gehrmann of Bloomberg [has found](https://open.spotify.com/episode/0LsaFcX2AE90Bpga1rziAN?si=eb6fe6c817a844e7),
    “RAG is not necessarily safer,” and can introduce new governance risks. I expect
    the need for guardrails to grow to include more complicated governance rules (beyond
    access control), policy requirements, and best practices.'
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  id: totrans-62
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'RAG was never the end goal, just the starting point. As we move into the agentic
    era, retrieval is evolving into a part of a full discipline: context engineering.
    Agents don’t just need to find documents; they need to understand which data,
    tools, and memories are relevant for each step in their reasoning. This understanding
    requires a semantic layer–a way to understand, retrieve, and govern over the entire
    enterprise. Knowledge graphs, ontologies, and semantic models will provide that
    connective tissue. The next generation of retrieval won’t just be about speed
    and accuracy; it will also be about explainability and trust. The future of RAG
    is not retrieval alone, but retrieval that’s context-aware, policy-aware, and
    semantically grounded.'
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
- en: '**About the author:** Steve Hedden is the Head of Product Management at [TopQuadrant](https://www.topquadrant.com/),
    where he leads the strategy for TopBraid EDG, a platform for knowledge graph and
    metadata management. His work focuses on bridging enterprise data governance and
    AI through ontologies, taxonomies, and semantic technologies. Steve writes and
    speaks regularly about knowledge graphs, and the evolving role of semantics in
    AI systems.'
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: '**关于作者：**Steve Hedden是[TopQuadrant](https://www.topquadrant.com/)的产品管理负责人，他领导着TopBraid
    EDG平台的战略规划，这是一个知识图谱和元数据管理的平台。他的工作专注于通过本体、分类法和语义技术将企业数据治理与人工智能连接起来。Steve经常撰写和发表关于知识图谱以及语义在人工智能系统演变中的角色的文章和演讲。'
