- en: Run Python Up to 150× Faster with C
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用C将Python运行速度提高150倍
- en: 原文：[https://towardsdatascience.com/make-python-up-to-150x-faster-with-c/](https://towardsdatascience.com/make-python-up-to-150x-faster-with-c/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/make-python-up-to-150x-faster-with-c/](https://towardsdatascience.com/make-python-up-to-150x-faster-with-c/)
- en: <mdspan datatext="el1762803060797" class="mdspan-comment">If you are a Python
    programmer</mdspan>, sooner or later, you’re going to hit a block when it comes
    to your code execution speed. If you’ve ever written a computationally heavy algorithm
    in Python, such as string distance, matrix math, or cryptographic hashing, you’ll
    know what I mean.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1762803060797" class="mdspan-comment">如果你是Python程序员</mdspan>，迟早你会遇到代码执行速度的瓶颈。如果你曾经用Python编写过计算密集型的算法，比如字符串距离、矩阵数学或加密散列，你就会知道我的意思。
- en: Sure, there are times when external libraries like NumPy can come to your rescue,
    but what happens when the algorithm is *inherently sequential*? That was precisely
    my problem when I wanted to benchmark a particular algorithm, which determines
    the number of edits required to transform one string into another.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 当然，有时外部库如NumPy可以救你于水火之中，但算法本身是**本质上是顺序的**时会发生什么呢？这正是我想对某个特定算法进行基准测试时遇到的问题，该算法确定将一个字符串转换为另一个字符串所需的编辑次数。
- en: I tried Python. I tried NumPy. And then I turned to C, a language I first learned
    at college decades ago but hadn’t used in anger for about 15 years. That’s where
    things got interesting.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 我尝试了Python。我尝试了NumPy。然后我转向C语言，这是我几十年前在大学里学的，但大约15年来一直没有使用过。从这里开始变得有趣。
- en: I first had to answer the question, “Can you call C from Python?”. After some
    research, it quickly became clear that the answer was indeed **yes**. In fact,
    it turns out you can do it in several ways, and in this article, I’ll look at
    three of the most common ways of doing so.
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: 我首先必须回答这个问题，“你能从Python调用C语言吗？”。经过一番研究，答案很快就变得清晰，确实**可以**。实际上，你可以用几种方法来实现，在这篇文章中，我将探讨其中三种最常见的方法。
- en: From easiest to most complex, we’ll look at using,
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 从最简单到最复杂，我们将探讨使用，
- en: a subprocess
  id: totrans-7
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: a subprocess
- en: ctypes
  id: totrans-8
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: ctypes
- en: Python C extensions
  id: totrans-9
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Python C扩展
- en: The algorithm that we’ll be testing with is called the **Levenshtein Distance
    (LD)** algorithm. The Levenshtein distance between two words is the minimum number
    of single-character edits (insertions, deletions or substitutions) required to
    change one word into the other. It is named after Soviet mathematician Vladimir
    Levenshtein, who defined the metric in 1965\. It has applications in various tools,
    such as spell checkers and optical character recognition systems.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将要测试的算法被称为**Levenshtein距离（LD）算法**。两个单词之间的Levenshtein距离是将一个单词转换为另一个单词所需的最小单字符编辑数（插入、删除或替换）。它是以苏联数学家弗拉基米尔·莱文斯坦的名字命名的，他在1965年定义了这个度量。它在各种工具中有应用，例如拼写检查器和光学字符识别系统。
- en: To give you a clearer picture of what we’re talking about, here are a couple
    of examples.
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 为了更清楚地说明我们正在讨论的内容，这里有一些例子。
- en: Calculate the LD between the words “book” and “black”.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 计算单词“book”和“black”之间的LD。
- en: book → baok (substitution of “a” for “o”),
  id: totrans-13
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: book → baok（将“o”替换为“a”）
- en: baok → back (substitution of “c” for “o”)
  id: totrans-14
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: baok → back（将“c”替换为“o”）
- en: back → black (add the letter “l”)
  id: totrans-15
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: back → black（添加字母“l”）
- en: So, the LD in this case is three.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，在这种情况下，LD是三个。
- en: Calculate the LD between the words “superb” and “super”.
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 计算单词“superb”和“super”之间的LD。
- en: superb → super (remove letter “b”)
  id: totrans-18
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: superb → super（删除字母“b”）
- en: The LD in this case is simply one.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 在这种情况下，LD简单地为一个是。
- en: We’ll code up the LD algorithm in Python and C, then set up benchmarks to test
    how long it takes to run it using pure Python code versus the time it takes to
    run it in C code called from Python.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将用Python和C编写LD算法，然后设置基准测试来测试使用纯Python代码运行它所需的时间与从Python中调用C代码运行它所需的时间。
