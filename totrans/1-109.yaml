- en: But what about NumPy?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Some of you may be wondering why NumPy wasn’t used. Well, NumPy is fantastic
    for vectorised numeric array operations, such as dot products, but not all algorithms
    map cleanly to vectorisation. Calculating Levenshtein distances is an inherently
    sequential process, so NumPy doesn’t provide much help. In those cases, dropping
    into C via **subprocess**, **ctypes**, or a **native C extension** provides real
    runtime speedups while still being callable from Python.
  prefs: []
  type: TYPE_NORMAL
- en: '*PS. I ran some additional tests using code that was amenable to using NumPy,
    and it was no surprise that NumPy was as fast as the called C code. That’s to
    be expected as NumPy uses C under the hood and has many years of development and
    optimisation behind it.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: Summary
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The article explores how Python developers can overcome performance bottlenecks
    in computationally intensive tasks, such as calculating the **Levenshtein distance** — a
    string similarity algorithm —by integrating C code into Python. While libraries
    like NumPy accelerate vectorised operations, sequential algorithms like Levenshtein
    often remain impervious to NumPy’s optimisations.
  prefs: []
  type: TYPE_NORMAL
- en: To address this, I demonstrated **three integration patterns**, ranging from
    simplest to most advanced, that allow you to call fast C code from Python.
  prefs: []
  type: TYPE_NORMAL
- en: '**Subprocess.** Compile the C code into an executable (e.g., with gcc or Visual
    Studio Build Tools) and run it from Python using the subprocess module. This is
    easy to set up and already shows a huge speedup compared to pure Python.'
  prefs: []
  type: TYPE_NORMAL
- en: '**ctypes.** Using ctypes lets Python directly load and call functions from
    C shared libraries without needing to write a full Python extension module. This
    makes it much simpler and faster to integrate performance-critical C code into
    Python, avoiding the overhead of running external processes while still keeping
    your code mostly in Python.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Python C Extensions**. Write a full Python extension in C using the CPython
    API (python.h). This requires more setup but offers the fastest performance and
    smoothest integration, allowing you to call C functions as if they were native
    Python functions.'
  prefs: []
  type: TYPE_NORMAL
- en: The benchmarks show that C implementations of the Levenshtein algorithm run
    **over 100× faster** than pure Python. While an external library such as **NumPy**
    excels at vectorised numeric operations, it doesn’t significantly improve performance
    for inherently sequential algorithms like Levenshtein, making C integration a
    better choice in such cases.
  prefs: []
  type: TYPE_NORMAL
- en: If you hit performance limits in Python, offloading heavy computation to C can
    provide massive speed improvements and is worth considering. You can start simple
    with subprocess, then move to ctypes or full C extensions for tighter integration
    and better performance.
  prefs: []
  type: TYPE_NORMAL
- en: I’ve only outlined three of the most popular ways to integrate C code with Python,
    but there are a few other methods which I recommend you read up on if this topic
    interests you.
  prefs: []
  type: TYPE_NORMAL
