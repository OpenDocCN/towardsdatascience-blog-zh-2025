- en: '**2\. ctypes: lev.c**'
  id: totrans-48
  prefs: []
  type: TYPE_NORMAL
  zh: '**2\. ctypes: lev.c**'
- en: ctypes is a **foreign function interface (FFI)** library built right into Python’s
    standard library. It lets you load and call functions from shared libraries written
    in C (DLLs on Windows, `.so` files on Linux, `.dylib` on macOS) **directly from
    Python**, without needing to write a complete extension module in C.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: ctypes是一个直接集成在Python标准库中的**外部函数接口（FFI）库**。它允许你从C（Windows上的DLL，Linux上的.so文件，macOS上的.dylib）编写的共享库中加载和调用函数，**直接从Python中调用**，无需编写完整的C扩展模块。
- en: First, here is our C version of the LD algorithm, utilising ctypes. It’s almost
    identical to our subprocess C function, with the addition of a line that enables
    us to use Python to call the DLL after it has been compiled.
  id: totrans-50
  prefs: []
  type: TYPE_NORMAL
  zh: 首先，这是我们的LD算法的C版本，使用ctypes。它与我们的子进程C函数几乎相同，只是增加了一行，使我们能够在编译后使用Python调用DLL。
- en: '[PRE7]'
  id: totrans-51
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
