  prefs: []
  type: TYPE_NORMAL
  zh: 由于我在MS Windows上运行这个程序，我需要一种编译C程序的方法。我发现最简单的方法是下载2022年的Visual Studio构建工具。这允许你在命令行上编译C程序。
- en: To install, first go to the main [Visual Studio downloads page](https://visualstudio.microsoft.com/downloads/).
    On the second screen, you’ll see a search box. Type **“Build Tools”** into the
