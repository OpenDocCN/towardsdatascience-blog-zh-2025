    dynamic link library (DLL) rather than an executable. Here is the build command
    you need for that.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 当使用ctypes在Python中调用C时，我们需要将我们的C代码转换为动态链接库（DLL），而不是可执行文件。以下是构建所需的命令。
