- en: '**3/ Python C extensions: lev_cext.c**'
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: '**3/ Python C扩展: lev_cext.c**'
- en: When using Python C extensions, there’s slightly more work involved. First,
    let’s examine the C code. The basic algorithm is unchanged. It’s just that we
    need to add a bit more scaffolding to enable the code to be called from Python.
    It uses CPython’s API (`Python.h`) to parse Python arguments, run the C code,
    and return the result as a Python integer.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 当使用 Python C 扩展时，需要做更多的工作。首先，让我们检查 C 代码。基本算法没有改变。只是我们需要添加更多的脚手架，以便代码可以从 Python
    中调用。它使用 CPython 的 API (`Python.h`) 来解析 Python 参数，运行 C 代码，并将结果作为 Python 整数返回。
- en: The function **levext_lev** acts as a wrapper. It parses two string arguments
    from Python (PyArg_ParseTuple), calls the C function **lev_impl** to compute the
    distance, handles memory errors, and returns the result as a Python integer (PyLong_FromLong).
    The Methods table registers this function under the name “levenshtein”, so it
    can be called from Python code. Finally, PyInit_levext defines and initialises
    the module **levext**, making it importable in Python with the import levext command.
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 函数 **levext_lev** 作为包装器。它从 Python 中解析两个字符串参数（PyArg_ParseTuple），调用 C 函数 **lev_impl**
    来计算距离，处理内存错误，并将结果作为 Python 整数（PyLong_FromLong）返回。方法表将此函数注册为“levenshtein”名称，因此可以从
    Python 代码中调用它。最后，PyInit_levext 定义并初始化模块 **levext**，使其可以通过 import levext 命令在 Python
    中导入。
- en: '[PRE11]'
  id: totrans-63
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: Because we aren’t just building an executable this time but a native Python
    extension module, we have to build the C code differently.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: 由于这次我们不仅构建一个可执行文件，还要构建一个本地的 Python 扩展模块，因此我们必须以不同的方式构建 C 代码。
- en: This type of module must be compiled against Python’s headers and appropriately
    linked to Python’s runtime so it behaves like a built-in Python module.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 这种类型的模块必须针对 Python 的头文件进行编译，并适当地链接到 Python 的运行时，以便它表现得像内置的 Python 模块。
