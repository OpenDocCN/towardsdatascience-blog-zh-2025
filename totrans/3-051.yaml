- en: 'Graph Neural Networks Part 4: Teaching Models to Connect the Dots'
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 图神经网络第四部分：教模型连接点
- en: 原文：[https://towardsdatascience.com/graph-neural-networks-part-4-teaching-graphs-to-connect-the-dots/](https://towardsdatascience.com/graph-neural-networks-part-4-teaching-graphs-to-connect-the-dots/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/graph-neural-networks-part-4-teaching-graphs-to-connect-the-dots/](https://towardsdatascience.com/graph-neural-networks-part-4-teaching-graphs-to-connect-the-dots/)
- en: '**<mdspan datatext="el1745951325198" class="mdspan-comment">Have you</mdspan>
    ever wondered how it’s possible that Facebook knows who you might know? Or why
    it sometimes suggests a total stranger? This problem is called link prediction.
    In a social network graph, people are nodes and friendships are edges, the goal
    is to predict if a connection should exist between two nodes.**'
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: '**<mdspan datatext="el1745951325198" class="mdspan-comment">你是否**）曾想过Facebook是如何知道你可能认识谁？或者为什么它有时会建议一个完全陌生的人？这个问题被称为链接预测。在社会网络图中，人们是节点，友谊是边，目标是预测两个节点之间是否应该存在连接。'
- en: Link prediction is a very popular topic! It can be used to recommend friends
    in social networks, suggest products on e-commerce sites or movies on Netflix,
    or predict protein interactions in biology. In this post, you will explore how
    link prediction works. First you will learn simple heuristics, and we end with
    powerful GNN-based methods like SEAL.
  id: totrans-3
  prefs: []
  type: TYPE_NORMAL
  zh: 链接预测是一个非常热门的话题！它可以用于在社交网络中推荐朋友，在电子商务网站上建议产品或在Netflix上推荐电影，或者预测生物中的蛋白质相互作用。在这篇文章中，你将探索链接预测是如何工作的。首先，你将学习简单的启发式方法，然后我们以基于GNN的强大方法SEAL作为结束。
- en: The previous posts explained [GCNs](https://towardsdatascience.com/graph-neural-networks-part-1-graph-convolutional-networks-explained-9c6aaa8a406e/),
    [GATs](https://towardsdatascience.com/graph-neural-networks-part-2-graph-attention-networks-vs-gcns-029efd7a1d92/),
    and [GraphSage](https://towardsdatascience.com/graph-neural-networks-part-3-how-graphsage-handles-changing-graph-structure/).
    They mainly covered predicting node properties, so you can read this article standalone,
    because this time we shift focus to predicting edges. If you want to dive a bit
    deeper into node representations, I recommend to revisit the previous posts. The
    code setup can be found [here](https://towardsdatascience.com/graph-neural-networks-part-1-graph-convolutional-networks-explained-9c6aaa8a406e/).
  id: totrans-4
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 前几篇文章解释了[GCNs](https://towardsdatascience.com/graph-neural-networks-part-1-graph-convolutional-networks-explained-9c6aaa8a406e/)、[GATs](https://towardsdatascience.com/graph-neural-networks-part-2-graph-attention-networks-vs-gcns-029efd7a1d92/)和[GraphSage](https://towardsdatascience.com/graph-neural-networks-part-3-how-graphsage-handles-changing-graph-structure/)。它们主要涵盖了预测节点属性，所以你可以单独阅读这篇文章，因为这次我们将重点转向预测边。如果你想更深入地了解节点表示，我建议重新阅读之前的文章。代码设置可以在[这里](https://towardsdatascience.com/graph-neural-networks-part-1-graph-convolutional-networks-explained-9c6aaa8a406e/)找到。
- en: '* * *'
  id: totrans-5
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: What is Link Prediction?
  id: totrans-6
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 什么是链接预测？
- en: Link prediction is the task of forecasting missing or future connections (edges)
    between nodes in a graph. Given a graph *G = (V, E)*, the goal is to predict whether
    an edge should exist between two nodes (*u, v*) ∉ *E*.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 链接预测是预测图中节点之间缺失或未来连接（边）的任务。给定一个图 *G = (V, E)*，目标是预测是否存在一条边连接两个节点 (*u, v*) ∉
    *E*。
- en: To evaluate link prediction models, you can create a test set by hiding a portion
    of the existing edges and ask the model to predict them. Of course, the test set
    should have positive samples (real edges), and negative samples (random node pairs
    that are not connected). You can train the model on the remaining graph.
  id: totrans-8
  prefs: []
  type: TYPE_NORMAL
  zh: 为了评估链接预测模型，你可以通过隐藏现有边的一部分来创建一个测试集，并要求模型预测它们。当然，测试集应该包含正样本（真实边），以及负样本（随机节点对，它们之间没有连接）。你可以在剩余的图上训练模型。
- en: The output of the model is a link score or probability for each node pair. You
    can evaluate this with metrics like AUC or average precision.
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 模型的输出是每个节点对的链接得分或概率。你可以用AUC或平均精度等指标来评估这些。
- en: We will take a look at simple heuristic-based methods, and then we move on to
    more complex methods.
  id: totrans-10
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将探讨简单的基于启发式的方法，然后我们转向更复杂的方法。
- en: '![](../Images/5f71ebe20f81d2d85bc73f816008706b.png)'
  id: totrans-11
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/5f71ebe20f81d2d85bc73f816008706b.png)'
- en: Graph with nodes and edges. We will use this graph as example for the heuristic-based
    methods. Image by author.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 节点和边的图。我们将使用这个图作为启发式方法的示例。图片由作者提供。
- en: Heuristic-Based Methods
  id: totrans-13
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 基于启发式的方法
- en: 'We can divide these ‘easy’ methods into two categories: local and global. Local
    heuristics are based on local structure, while global heuristics use the whole
    graph. These approaches are rule-based and work well as baselines for link prediction
    tasks.'
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以将这些“简单”的方法分为两类：本地和全局。本地启发式算法基于局部结构，而全局启发式算法使用整个图。这些方法基于规则，并且作为链接预测任务的基线效果良好。
- en: Local Heuristics
  id: totrans-15
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 本地启发式算法
- en: As the name says, local heuristics rely on the *immediate neighborhood* of the
    two nodes you are testing for a potential link. And actually they can be surprisingly
    effective. Benefits of local heuristics are that they are fast and interpretable.
    But they only look at the close neighborhood, so capturing the complexity of relationships
    is limited.
  id: totrans-16
  prefs: []
  type: TYPE_NORMAL
  zh: 正如其名所示，本地启发式算法依赖于你正在测试潜在链接的两个节点的*直接邻域*。实际上，它们可以非常有效。本地启发式算法的优点是它们速度快且可解释。但它们只关注紧密邻域，因此捕捉关系的复杂性是有限的。
- en: Common Neighbors
  id: totrans-17
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 共同邻居
- en: 'The idea is simple: if two nodes share many common neighbors, they are more
    likely to be connected.'
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 理念很简单：如果两个节点共享许多共同邻居，它们更有可能连接在一起。
- en: For calculation you count the number of neighbors the nodes have in common.
    One issue here is that it does not take into account the relative number of common
    neighbors.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 对于计算，你统计节点共有的邻居数。这里的一个问题是，它没有考虑到共有邻居的相对数量。
- en: In the examples below, the number of common neighbors between A and B is 3,
    and the number of common neighbors between C and D is 1.
  id: totrans-20
  prefs: []
  type: TYPE_NORMAL
  zh: 在下面的示例中，A和B之间的共同邻居数是3，C和D之间的共同邻居数是1。
- en: '![](../Images/9f95f985717d23ad20a40362dd08f076.png)'
  id: totrans-21
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/9f95f985717d23ad20a40362dd08f076.png)'
- en: Jaccard Coefficient
  id: totrans-22
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: Jaccard系数
- en: The Jaccard Coefficient fixes the issue of common neighbors and computes the
    relative number of neighbors in common.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: Jaccard系数解决了共同邻居的问题，并计算了共有邻居的相对数量。
- en: You take the common neighbors and divide this by the total number of unique
    neighbors of the two nodes.
  id: totrans-24
  prefs: []
  type: TYPE_NORMAL
  zh: 你将共有邻居数除以两个节点的总唯一邻居数。
- en: 'So now things change a bit: the Jaccard coefficient of nodes A and B is 3/5
    = 0.6 (they have 3 common neighbors and 5 total unique neighbors), while the Jaccard
    coefficient of nodes C and D is 1/1 = 1 (they have 1 common neighbor and 1 unique
    neighbor). In this case the connection between C and D is more likely, because
    they only have 1 neighbor, and it’s also a common neighbor.'
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 所以现在情况有点变化：节点A和B的Jaccard系数是3/5 = 0.6（它们有3个共同邻居和5个总唯一邻居），而节点C和D的Jaccard系数是1/1
    = 1（它们有1个共同邻居和1个唯一邻居）。在这种情况下，C和D之间的连接更有可能，因为它们只有1个邻居，而且它也是一个共同邻居。
- en: '![](../Images/4616f937d5ca3b32dff875d6ecd50483.png)'
  id: totrans-26
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/4616f937d5ca3b32dff875d6ecd50483.png)'
- en: Jaccard coefficient for 2 different edges. Image by author.
  id: totrans-27
  prefs: []
  type: TYPE_NORMAL
  zh: Jaccard系数对于两条不同边。图片由作者提供。
- en: Adamic-Adar Index
  id: totrans-28
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: Adamic-Adar指数
- en: 'The Adamic-Adar index goes one step further than common neighbors: it uses
    the popularity of a common neighbor and gives less weight to more popular neighbors
    (they have more connections). The intuition behind this is that if a node is connected
    to everyone, it doesn’t tell us much about a specific connection.'
  id: totrans-29
  prefs: []
  type: TYPE_NORMAL
  zh: Adamic-Adar指数比共同邻居更进一步：它使用共同邻居的受欢迎程度，并给更受欢迎的邻居（它们有更多连接）赋予更少的权重。背后的直觉是，如果一个节点与所有人连接，它并不能告诉我们关于特定连接的太多信息。
- en: What does that look like in a formula?
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 这在公式中看起来是什么样子？
- en: '![](../Images/58d12293e24fa54f2b619543a8239798.png)'
  id: totrans-31
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/58d12293e24fa54f2b619543a8239798.png)'
- en: So for each common neighbor *z*, we add a score of 1 divided by the log of the
    number of neighbors from *z*. By doing this, the more popular the common neighbor,
    the smaller its contribution.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，对于每个共同邻居*z*，我们添加一个分数，即1除以*z*的邻居数对数。通过这样做，共同邻居越受欢迎，其贡献就越小。
- en: Let’s calculate the Adamic-Adar index for our examples.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们计算一下我们的示例中的Adamic-Adar指数。
- en: '![](../Images/d3b618db0d2c7e7e744d19bc38323b4f.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d3b618db0d2c7e7e744d19bc38323b4f.png)'
- en: Adamic-Adar index. If a common neighbor is popular, its contribution decreases.
    Image by author.
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: Adamic-Adar指数。如果一个共同邻居很受欢迎，它的贡献就会减少。图片由作者提供。
- en: Preferential Attachment
  id: totrans-36
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 优先连接
- en: A different approach is preferential attachment. The idea behind it is that
    nodes with higher degrees are more likely to form links. Calculation is super
    easy, you just multiply the degrees (number of connections) of the two nodes.
  id: totrans-37
  prefs: []
  type: TYPE_NORMAL
  zh: 另一种方法是优先连接。其背后的理念是，度数较高的节点更有可能形成链接。计算非常简单，你只需将两个节点的度数（连接数）相乘。
- en: For A and B, the degrees are respectively 5 and 3, so the score is 5*3 = 15\.
    C and D have a score of 1*1 = 1\. In this case A and B are more likely to have
    a connection, because they have more neighbors in general.
  id: totrans-38
  prefs: []
  type: TYPE_NORMAL
  zh: 对于A和B，度数分别是5和3，所以得分是5*3=15。C和D的得分是1*1=1。在这种情况下，A和B更有可能建立连接，因为它们在一般情况下有更多的邻居。
- en: '![](../Images/3faf4659b2bbbdbf48cb345fd2e4f279.png)'
  id: totrans-39
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/3faf4659b2bbbdbf48cb345fd2e4f279.png)'
- en: Preferential attachment score for the examples. Image by author.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 示例中的优先连接得分。图片由作者提供。
- en: Global Heuristics
  id: totrans-41
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 全局启发式
- en: Global heuristics consider paths, walks, or the entire graph structure. They
    can capture richer patterns, but are more computationally expensive.
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 全局启发式方法考虑路径、游走或整个图结构。它们可以捕捉更丰富的模式，但计算成本更高。
- en: Katz Index
  id: totrans-43
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: Katz指数
- en: The most well-known global heuristic for link prediction is the Katz Index.
    It takes all the different paths between two nodes (usually only paths up to three
    steps). Each path gets a weight that decays exponentially with its length. This
    makes sense intuitively, because the shorter a path, the more important it is
    (friends in common means a lot). On the other hand, indirect paths matter as well!
    They can hint at potential links.
  id: totrans-44
  prefs: []
  type: TYPE_NORMAL
  zh: 链接预测中最著名的全局启发式方法是Katz指数。它考虑两个节点之间所有不同的路径（通常只有最多三步的路径）。每条路径都会根据其长度以指数方式衰减得到一个权重。这在直观上是有意义的，因为路径越短，它就越重要（共同的朋友意味着很多）。另一方面，间接路径也很重要！它们可以暗示潜在的链接。
- en: 'The Katz Formula:'
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: Katz公式：
- en: '![](../Images/29e56f087dbd49f917c9ba3e2c21f2f4.png)'
  id: totrans-46
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/29e56f087dbd49f917c9ba3e2c21f2f4.png)'
- en: 'We take two nodes, C and E, and count the paths between them. There are three
    paths with up to three steps: one path with two steps (orange), and two paths
    with three steps (blue and green). Now we can calculate the Katz index, let’s
    choose 0.1 for beta:'
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 我们取两个节点，C和E，并计算它们之间的路径。有三条路径，最多有三步：一条两步的路径（橙色），和两条三步的路径（蓝色和绿色）。现在我们可以计算Katz指数，让我们选择0.1作为beta值：
- en: '![](../Images/cd50f6ea777a2ff3fbd550968d3a355a.png)'
  id: totrans-48
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/cd50f6ea777a2ff3fbd550968d3a355a.png)'
- en: Katz index calculation for nodes C and E. Shorter paths add more weight. Image
    by author.
  id: totrans-49
  prefs: []
  type: TYPE_NORMAL
  zh: 对节点C和E进行Katz指数计算。较短路径增加更多权重。图片由作者提供。
- en: Rooted PageRank
  id: totrans-50
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
  zh: 根节点PageRank
- en: This method uses random walks to determine how likely it is that a random walk
    from the first node, will end up in the second node. So you start in the first
    node, then you either walk to a random neighbor, or you jump back to the first
    node. The probability that you end up at the second node tells how closely the
    two nodes are. If the probability is high, there is a good chance the nodes should
    be linked.
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 这种方法使用随机游走来确定从第一个节点开始的随机游走最终结束在第二个节点的可能性。所以你从第一个节点开始，然后你可以走到一个随机邻居，或者跳回到第一个节点。你最终到达第二个节点的概率告诉你两个节点有多接近。如果概率很高，那么节点之间应该有很好的链接机会。
- en: ML-Based Link Prediction
  id: totrans-52
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 基于机器学习的链接预测
- en: Machine learning approaches take link prediction beyond heuristics by learning
    patterns directly from the data. Instead of relying on predefined rules, ML models
    can learn complex features that signal whether a link should exist.
  id: totrans-53
  prefs: []
  type: TYPE_NORMAL
  zh: 机器学习方法通过直接从数据中学习模式将链接预测超越了启发式方法。与依赖于预定义规则不同，ML模型可以学习复杂的特征，这些特征表明是否存在链接。
- en: 'A basic approach is to treat link prediction as a binary classification task:
    for each node pair (u, v), we create a feature vector and train a model to predict
    1 (link exists) or 0 (link doesn’t exist). You can add the heuristics we calculated
    before as features. The heuristics didn’t agree all the time on likelihood of
    edges, sometimes the edge between A and B was more likely, while for others the
    edge between C and D was the better choice. By including multiple scores as features
    we don’t have to choose one heuristic. Of course depending on the problem some
    heuristics might work better than others.'
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 一种基本的方法是将链接预测视为一个二元分类任务：对于每个节点对（u，v），我们创建一个特征向量，并训练一个模型来预测1（存在链接）或0（不存在链接）。你可以添加我们之前计算出的启发式方法作为特征。启发式方法并不总是同意边的可能性，有时A和B之间的边更有可能，而其他时候C和D之间的边是更好的选择。通过包括多个分数作为特征，我们不必选择一个启发式方法。当然，根据问题，某些启发式方法可能比其他启发式方法更有效。
- en: 'Another type of features you can add are aggregated features: for example node
    degree, node embeddings, attribute averages, etc.'
  id: totrans-55
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以添加的另一种类型的功能是聚合特征：例如节点度数、节点嵌入、属性平均值等。
- en: Then use any classifier (e.g., logistic regression, random forest, XGBoost)
    to predict links. This already performs better than heuristics alone, especially
    when combined.
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 然后使用任何分类器（例如，逻辑回归、随机森林、XGBoost）来预测链接。这已经比单独使用启发式方法表现更好，尤其是当它们结合使用时。
- en: 'In this post we will use the Cora dataset to test different approaches to link
    prediction. The [Cora dataset](https://paperswithcode.com/dataset/cora) contains
    scientific papers. The edges represent citations between papers. Let’s train a
    machine learning model as baseline, where we only add the Jaccard coefficient:'
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们将使用 Cora 数据集来测试不同的链接预测方法。[Cora 数据集](https://paperswithcode.com/dataset/cora)包含科学论文。边表示论文之间的引用。让我们训练一个机器学习模型作为基线，其中我们只添加
    Jaccard 系数：
- en: '[PRE0]'
  id: totrans-58
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: 'We evaluate with AUC. This is the result:'
  id: totrans-59
  prefs: []
  type: TYPE_NORMAL
  zh: 我们用 AUC 来评估。这是结果：
- en: '[PRE1]'
  id: totrans-60
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: We can go a step further and use neural networks that operate directly on the
    graph structure.
  id: totrans-61
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以更进一步，并使用直接在图结构上操作的神经网络。
- en: 'VGAE: Encoding and Decoding'
  id: totrans-62
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: VGAE：编码和解码
- en: A [Variational Graph Auto-Encoder](https://arxiv.org/abs/1611.07308) is like
    a neural network that learns to guess the hidden structure of the graph. It can
    then use that hidden knowledge to predict missing links.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: '[变分图自动编码器](https://arxiv.org/abs/1611.07308)就像一个神经网络，它学习猜测图的隐藏结构。然后，它可以利用这些隐藏知识来预测缺失的链接。'
- en: A VGAE is actually a combination of a GAE (Graph Auto-Encoder) and a [VAE](https://en.wikipedia.org/wiki/Variational_autoencoder)
    (Variational Auto-Encoder). I’ll get back to the difference between a GAE and
    a VGAE later on.
  id: totrans-64
  prefs: []
  type: TYPE_NORMAL
  zh: VGAE 实际上是 GAE（图自动编码器）和 [VAE](https://en.wikipedia.org/wiki/Variational_autoencoder)（变分自动编码器）的结合。我稍后会回到
    GAE 和 VGAE 之间的区别。
- en: The steps of a VGAE are as follows. First, the VGAE **encodes nodes into latent
    vectors**, and then it **decodes node pairs** to **predict whether an edge exists**
    between them.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: VGAE 的步骤如下。首先，VGAE **将节点编码为潜在向量**，然后它 **解码节点对**以 **预测它们之间是否存在边**。
- en: How does the encoding work? Each node is mapped to a latent variable, that is
    a point in some hidden space. The encoder is a [Graph Convolutional Network](https://towardsdatascience.com/graph-neural-networks-part-1-graph-convolutional-networks-explained-9c6aaa8a406e/)
    (GCN) that produces a mean and a variance vector for each node. It uses the node
    features and the adjacency matrix as input. Using the vectors, the VGAE samples
    a latent embedding from a normal distribution. It’s important to note that each
    node isn’t just mapped to a single point, but to a distribution! This is the difference
    between a GAE and a VGAE, in a GAE each node is mapped to one single point.
  id: totrans-66
  prefs: []
  type: TYPE_NORMAL
  zh: 编码是如何工作的？每个节点被映射到一个潜在变量，即某个隐藏空间中的一个点。编码器是一个 [图卷积网络](https://towardsdatascience.com/graph-neural-networks-part-1-graph-convolutional-networks-explained-9c6aaa8a406e/)（GCN），它为每个节点生成一个均值和方差向量。它使用节点特征和邻接矩阵作为输入。使用这些向量，VGAE
    从正态分布中采样一个潜在嵌入。重要的是要注意，每个节点不仅仅被映射到一个单一点，而是到一个分布！这是 GAE 和 VGAE 之间的区别，在 GAE 中，每个节点被映射到一个单一点。
- en: '![](../Images/acdea5774216f3b6f46a4e16215803c3.png)'
  id: totrans-67
  prefs: []
  type: TYPE_IMG
  zh: '![图像](../Images/acdea5774216f3b6f46a4e16215803c3.png)'
- en: 'The next step is the decoding step. The VGAE will guess if there is an edge
    between two nodes. It does this by calculating the inner product between the embeddings
    of the two nodes:'
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 下一步是解码步骤。VGAE 将猜测两个节点之间是否存在边。它是通过计算两个节点的嵌入之间的内积来做到这一点的：
- en: '![](../Images/86a8211f282050a18b030ca1b14cec93.png)'
  id: totrans-69
  prefs: []
  type: TYPE_IMG
  zh: '![图像](../Images/86a8211f282050a18b030ca1b14cec93.png)'
- en: 'The thought behind it is: if the nodes are closer together in the hidden space,
    it’s more likely they are connected.'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: 其背后的想法是：如果节点在隐藏空间中更靠近，那么它们更有可能连接在一起。
- en: 'VGAE visualized:'
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: VGAE 可视化：
- en: '![](../Images/95f647fa7e13c092cd172b32ad4d3061.png)'
  id: totrans-72
  prefs: []
  type: TYPE_IMG
  zh: '![图像](../Images/95f647fa7e13c092cd172b32ad4d3061.png)'
- en: 'How does the model learn? It optimizes two things:'
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 模型是如何学习的？它优化了两件事：
- en: 'Reconstruction Loss: Do the predicted edges match the real ones?'
  id: totrans-74
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 重建损失：预测的边是否与真实边匹配？
- en: 'KL Divergence Loss: Is the latent space nice and regular?'
  id: totrans-75
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: KL 散度损失：潜在空间是否良好且规则？
- en: 'Let’s test the VGAE on the Cora dataset:'
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们在 Cora 数据集上测试 VGAE：
- en: '[PRE2]'
  id: totrans-77
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: 'And the result (ML model added for comparison):'
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 并且结果是（添加了机器学习模型以进行比较）：
- en: '[PRE3]'
  id: totrans-79
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: Wow! Massive improvement compared to the ML model!
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 哇！与机器学习模型相比，有巨大的改进！
- en: 'SEAL: Learning from Subgraphs'
  id: totrans-81
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: SEAL：从子图中学习
- en: 'One of the most powerful GNN-based approaches is [SEAL](https://proceedings.neurips.cc/paper_files/paper/2018/file/53f0d7c537d99b3824f0f99d62ea2428-Paper.pdf)
    (Subgraph Embedding-based Link prediction). The idea is simple and elegant: instead
    of looking at global node embeddings, SEAL looks at the **local subgraph** around
    each node pair.'
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 最强大的基于 GNN 的方法之一是 [SEAL](https://proceedings.neurips.cc/paper_files/paper/2018/file/53f0d7c537d99b3824f0f99d62ea2428-Paper.pdf)（基于子图嵌入的链接预测）。其想法简单而优雅：SEAL
    不像全局节点嵌入那样看，而是查看每个节点对的 **局部子图**。
- en: 'Here’s a step by step explanation:'
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 下面是逐步解释：
- en: For each node pair (u, v), extract a small enclosing subgraph. E.g., neighbors
    only (1-hop neighborhood) or neighbors and neighbors from neighbors (2-hop neighborhood).
  id: totrans-84
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 对于每个节点对（u，v），提取一个小包围子图。例如，仅邻居（1跳邻域）或邻居及其邻居（2跳邻域）。
- en: 'Label the nodes in this subgraph to reflect their role: which ones are u, v,
    and which ones are neighbors.'
  id: totrans-85
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 在此子图中标记节点以反映其角色：哪些是u，v，哪些是邻居。
- en: Use a GNN (like DGCNN or GCN) to learn from the subgraph and predict if a link
    should exist.
  id: totrans-86
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
  zh: 使用一个GNN（如DGCNN或GCN）从子图中学习并预测是否存在链接。
- en: 'Visualization of the steps:'
  id: totrans-87
  prefs: []
  type: TYPE_NORMAL
  zh: 步骤的可视化：
- en: '![](../Images/95ccdf44e351db8cb79cca03f3f50b4a.png)'
  id: totrans-88
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/95ccdf44e351db8cb79cca03f3f50b4a.png)'
- en: Three steps of SEAL. Image by author.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: SEAL的三个步骤。图由作者提供。
- en: SEAL is very powerful because it learns structural patterns directly from examples,
    instead of relying on handcrafted rules. It also works well with sparse graphs
    and generalizes across different types of networks.
  id: totrans-90
  prefs: []
  type: TYPE_NORMAL
  zh: SEAL非常强大，因为它直接从示例中学习结构模式，而不是依赖于手工规则。它还与稀疏图很好地工作，并且可以跨不同类型的网络进行泛化。
- en: 'Let’s see if SEAL can improve the results of the VGAE on the Cora dataset.
    For the SEAL code, I took the [sample code from PyTorch geometric](https://github.com/pyg-team/pytorch_geometric/blob/master/examples/seal_link_pred.py)
    (check it out by following the link), since SEAL requires quite some processing.
    You can recognize the different steps in the code (preparing the data, extracting
    the subgraphs, labeling the nodes). Training for 50 epochs gives the following
    result:'
  id: totrans-91
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看SEAL能否提高Cora数据集上VGAE的结果。对于SEAL代码，我使用了[PyTorch geometric的示例代码](https://github.com/pyg-team/pytorch_geometric/blob/master/examples/seal_link_pred.py)（通过链接查看），因为SEAL需要相当多的处理。你可以在代码中识别出不同的步骤（准备数据、提取子图、标记节点）。训练50个epoch后得到以下结果：
- en: '[PRE4]'
  id: totrans-92
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: Almost exactly the same result as the VGAE. So for this problem, VGAE might
    be the best choice (VGAE is significantly faster than SEAL). Of course this can
    vary, depending on your problem.
  id: totrans-93
  prefs: []
  type: TYPE_NORMAL
  zh: 几乎与VGAE完全相同的结果。因此，对于这个问题，VGAE可能是最佳选择（VGAE比SEAL快得多）。当然，这可能会因问题而异。
- en: '* * *'
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: '* * *'
- en: Conclusion
  id: totrans-95
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 结论
- en: In this post, we dived into the topic of link prediction, from heuristics to
    SEAL. Heuristic methods are fast and interpretable and can serve as good baselines,
    but ML and GNN-based methods like VGAE and SEAL can learn richer representations
    and offer better performance. Depending on your dataset size and task complexity,
    it’s worth exploring both!
  id: totrans-96
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我们深入探讨了链接预测的主题，从启发式方法到SEAL。启发式方法速度快，可解释性强，可以作为良好的基线，但基于ML和GNN的方法，如VGAE和SEAL，可以学习更丰富的表示并提供更好的性能。根据你的数据集大小和任务复杂性，探索两者都值得！
- en: Thanks for reading, until next time!
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 感谢阅读，下次再见！
