- en: '<mdspan datatext="el1745428604481" class="mdspan-comment">Introduction</mdspan>:
    Why I Wrote This'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'I will be honest. When I first saw the term “Model Context Protocol (MCP),”
    I did what most developers do when confronted with yet another new acronym: I
    skimmed a tutorial, saw some JSON, and quietly moved on. “Too abstract,” I thought.
    Fast-forward to when I actually tried to integrate some custom tools with Claude
    Desktop— something that needed memory or access to external tools — and suddenly,
    MCP wasn’t just relevant. It was essential.'
  prefs: []
  type: TYPE_NORMAL
- en: The problem? None of the tutorials I came across felt beginner-friendly. Most
    jumped straight into building a custom MCP server without explaining in details
    *why* you’d need a server in the first place — let alone mentioning that prebuilt
    MCP servers already exist and work out of the box. So, I decided to learn it from
    the ground up.
  prefs: []
  type: TYPE_NORMAL
- en: I read everything I could, experimented with both prebuilt and custom servers,
    integrated it with Claude Desktop and tested whether I could explain it to my
    friends —people with zero prior context. When I finally got the nod from them,
    I knew I could break it down for anyone, even if you’ve never heard of MCP until
    five minutes ago.
  prefs: []
  type: TYPE_NORMAL
- en: This article breaks down what MCP is, why it matters, and how it compares to
    other popular architectures like RAG. We’ll go from “what even is this?” to spinning
    up your own working Claude integration — no prior MCP knowledge required. If you’ve
    ever struggled to get your AI model to feel a little less like a goldfish, this
    is for you.
  prefs: []
  type: TYPE_NORMAL
- en: The Evolution of Tool Integration with LLMs
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Before diving into MCP, let’s understand the progression of how we connect
    Large Language Models (LLMs) to external tools and data:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/c2331593785a7b5fbdda4368af3ba35d.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: '**Standalone LLMs**: Initially, models like GPT and Claude operated in isolation,
    relying solely on their training data. They couldn’t access real-time information
    or interact with external systems.'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**Tool Binding:** As LLMs advanced, developers created methods to “bind” tools
    directly to models. For example, with LangChain or similar frameworks, you could
    do something like:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: This works well for individual scripts but doesn’t scale easily across applications.
    ***Why?*** Because tool binding in frameworks like LangChain is typically designed
    around **single-session, stateless interactions**, meaning every time you spin
    up a new agent or function call, you’re often re-defining which tools it can access.
    There’s no centralized way to manage tools across multiple interfaces or user
    contexts.
  prefs: []
  type: TYPE_NORMAL
- en: '**3\. Application Integration Challenge**: The real complexity arises when
    you want to integrate tools with AI-powered applications like IDEs (Cursor, VS
    Code), chat interfaces (Claude Desktop), or other productivity tools. Each application
    would need custom connectors for every possible tool or data source, creating
    a tangled web of integrations.'
  prefs: []
  type: TYPE_NORMAL
- en: This is where MCP enters the picture — providing a standardized layer of abstraction
    for connecting AI applications to external tools and data sources.
  prefs: []
  type: TYPE_NORMAL
- en: What Is Model Context Protocol (MCP), Really?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Let’s break it down:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Model**: The LLM at the heart of your application — GPT, Claude, whatever.
    It’s a powerful reasoning engine but limited by what it was trained on and how
    much context it can hold.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Context**: The extra information your model needs to do its job — documents,
    search results, user preferences, recent history. Context extends the model’s
    capabilities beyond its training set.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Protocol**: A standardized way of communicating between components. Think
    of it as a common language that lets your model interact with tools and data sources
    in a predictable way.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Put those three together, and **MCP** becomes a framework that connects models
    to contextual information and tools through a consistent, modular, and interoperable
    interface.
  prefs: []
  type: TYPE_NORMAL
- en: Much like HTTP enabled the web by standardizing how browsers talk to servers,
    MCP standardizes how AI applications interact with external data and capabilities.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '**Pro tip!** An easy way to visualize MCP is to think of it like **tool binding
    for the entire AI stack**, not just a single agent. **That’s why** [**Anthropic
    describes MCP**](https://docs.anthropic.com/en/docs/agents-and-tools/mcp) **as
    “a USB-C port for AI applications.”**'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '![](../Images/529b7158fd9b854a9952db3626a21562.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author, inspired by [Understanding MCP From Scratch](https://www.youtube.com/watch?v=CDjjaTALI68&t=467s)
    by LangChain
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Wait, MCP sounds like RAG… but is it?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: A lot of people ask, “How is this different from RAG?” Great question.
  prefs: []
  type: TYPE_NORMAL
- en: 'At a glance, both MCP and RAG aim to solve the same problem: give language
    models access to relevant, external information. But how they do it — and how
    maintainable they are — differs significantly.'
  prefs: []
  type: TYPE_NORMAL
- en: In an MCP-based setup
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Your AI app (host/client) connects to an MCP document server
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You interact with context using a standardized protocol
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You can add new documents or tools without modifying the app
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Everything works via the same interface, consistently
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/413762f85908cec2f71ba93f9aa7cd00.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author, inspired by [MCP Documentation](https://modelcontextprotocol.io/introduction).
  prefs: []
  type: TYPE_NORMAL
- en: In a traditional RAG system
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Your app manually builds and queries a vector database
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You often need custom embedding logic, retrievers, and loaders
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Adding new sources means rewriting part of your app code
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Every integration is bespoke, tightly coupled to your app logic
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**The key distinction is abstraction:** The *Protocol* in Model Context Protocol
    is nothing but a *standardized abstraction layer* that defines **bidirectional
    communication** between MCP Client/Host and MCP Servers.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ae0887983a56742a6acbf9e439bbbc3b.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author, inspired by [MCP Documentation](https://modelcontextprotocol.io/introduction).
  prefs: []
  type: TYPE_NORMAL
- en: MCP gives your app the ability to ask, “Give me information about X,” without
    knowing *how* that info is stored or retrieved. RAG systems require your app to
    manage all of that.
  prefs: []
  type: TYPE_NORMAL
- en: '**With MCP, your application logic stays the same, even as your document sources
    evolve.**'
  prefs: []
  type: TYPE_NORMAL
- en: 'Let’s look at some high-level codes to see how these approaches differ:'
  prefs: []
  type: TYPE_NORMAL
- en: Traditional RAG Implementation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'In a traditional RAG implementation, your application code directly manages
    connections to document sources:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE1]'
  prefs: []
  type: TYPE_PRE
- en: With tool binding, you define tools and bind them to an LLM, but still need
    to modify the tool implementation to incorporate new data sources. You still need
    to update the tool implementation when your backend changes.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE2]'
  prefs: []
  type: TYPE_PRE
- en: MCP Implementation
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'With MCP, your application connects to a standardized interface, and the server
    handles the specifics of document sources:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE3]'
  prefs: []
  type: TYPE_PRE
- en: Then, you configure the host or client (like Claude Desktop) to use the server
    by updating its configuration file.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE4]'
  prefs: []
  type: TYPE_PRE
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: If you change where or how the resources/documents are stored, **you update
    the server — not the client.**
  prefs: []
  type: TYPE_NORMAL
- en: '***That’s the magic of abstraction.***'
  prefs: []
  type: TYPE_NORMAL
- en: 'And for many use cases — especially in production environments like IDE extensions
    or commercial applications — you *can’t* touch the client code at all. MCP’s decoupling
    is more than just a nice-to-have: it’s a necessity. It isolates the application
    code so that only the server-side logic (tools, data sources, or embeddings) needs
    to evolve. The host application remains untouched. This enables rapid iteration
    and experimentation without risking regression or violating application constraints.'
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: Quick recap!
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Hopefully, by now, it’s clear why MCP actually matters.
  prefs: []
  type: TYPE_NORMAL
- en: 'Imagine you’re building an AI assistant that needs to:'
  prefs: []
  type: TYPE_NORMAL
- en: Tap into a knowledge base
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Execute code or scripts
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Keep track of past user conversations
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Without MCP, you’re stuck writing custom glue code for every single integration.
    Sure, it works — until it doesn’t. It’s fragile, messy, and a nightmare to maintain
    at scale.
  prefs: []
  type: TYPE_NORMAL
- en: '**MCP fixes this** by acting as a universal adapter between your model and
    the outside world. You can plug in new tools or data sources without rewriting
    your model logic. That means **faster iteration, cleaner code, fewer bugs**, and
    AI applications that are actually modular and maintainable.'
  prefs: []
  type: TYPE_NORMAL
- en: 'And I hope you were paying attention when I said **MCP enables bidirectional
    communication** between the host (client) and the server — because this unlocks
    one of MCP’s most powerful use cases: **persistent memory**.'
  prefs: []
  type: TYPE_NORMAL
- en: 'Out of the box, LLMs are goldfish. They forget everything unless you manually
    stuff the entire history into the context window. But with MCP, you can:'
  prefs: []
  type: TYPE_NORMAL
- en: Store and retrieve past interactions
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Keep track of long-term user preferences
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Build assistants that actually “remember” full projects or ongoing sessions
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: No more clunky prompt-chaining hacks or fragile memory workarounds. **MCP gives
    your model a brain that lasts longer than a single chat.**
  prefs: []
  type: TYPE_NORMAL
- en: Core Capabilities of an MCP Server
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'With all that in mind, it’s pretty clear: **the MCP server is the MVP of the
    whole protocol.**'
  prefs: []
  type: TYPE_NORMAL
- en: 'It’s the central hub that defines the capabilities your model can actually
    use. There are three main types:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Resources:** Think of these as external data sources — PDFs, APIs, databases.
    The model can pull them in for context, but it can’t change them. Read-only.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Tools:** These are the actual functions the model can call — run code, search
    the web, generate summaries, you name it.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Prompts:** Predefined templates that guide the model’s behavior or structure
    its responses. Like giving it a playbook.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: What makes MCP powerful is that all of these are exposed through a **single,
    consistent protocol**. That means the model can request, invoke, and incorporate
    them without needing custom logic for each one. Just plug into the MCP server,
    and everything’s ready to go.
  prefs: []
  type: TYPE_NORMAL
- en: 'Real-World Example: Claude Desktop + MCP (Pre-built Servers)'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Out of the box, **Anthropic offers a bunch of pre-built MCP servers** you can
    plug into your AI apps — things like Claude Desktop, Cursor, and more. Setup is
    super quick and painless.
  prefs: []
  type: TYPE_NORMAL
- en: For the full list of available servers, head over to the [MCP Servers Repository.](https://github.com/modelcontextprotocol/servers)
    It’s your buffet of ready-to-use integrations.
  prefs: []
  type: TYPE_NORMAL
- en: 'In this section, I’ll walk you through a practical example: **extending Claude
    Desktop** so it can read from your computer’s file system, write new files, move
    them around, and even search through them.'
  prefs: []
  type: TYPE_NORMAL
- en: This walkthrough is based on the [Quickstart](https://modelcontextprotocol.io/quickstart/user)
    guide from the official docs, but honestly, that guide skips a few key details
    — especially if you’ve never touched these settings before. So I’m filling in
    the gaps and sharing the extra tips I picked up along the way to save you the
    headache.
  prefs: []
  type: TYPE_NORMAL
- en: 1\. Download Claude Desktop
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: First things first — grab [**Claude Desktop**](https://claude.ai/download).
    Choose the version for **macOS** or **Windows** (sorry Linux folks, no support
    just yet).
  prefs: []
  type: TYPE_NORMAL
- en: Follow the installation steps as prompted.
  prefs: []
  type: TYPE_NORMAL
- en: Already have it installed? Make sure you’re on the latest version by clicking
    the **Claude menu** on your computer and selecting **“Check for Updates…”**
  prefs: []
  type: TYPE_NORMAL
- en: 2\. Check the Prerequisites
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: You’ll need **Node.js** installed on your machine to get this running smoothly.
  prefs: []
  type: TYPE_NORMAL
- en: 'To check if you already have Node installed:'
  prefs: []
  type: TYPE_NORMAL
- en: '**On macOS**: Open the **Terminal** from your Applications folder.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**On Windows**: Press `Windows + R`, type `cmd`, and hit Enter.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Then run the following command in your terminal:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE5]'
  prefs: []
  type: TYPE_PRE
- en: If you see a version number, you’re good to go. If not, head over to [nodejs.org](https://nodejs.org)
    and install the latest **LTS version**.
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Enable Developer Mode
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Open Claude Desktop and click on the “Claude” menu in the top-left corner of
    your screen. From there, select **Help**.
  prefs: []
  type: TYPE_NORMAL
- en: 'On macOS, it should look something like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ed663480f2a788538fff4621d2923fda.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: From the drop-down menu, select **“Enable Developer Mode.”**
  prefs: []
  type: TYPE_NORMAL
- en: If you’ve already enabled it before, it won’t show up again — but if this is
    your first time, it should be right there in the list.
  prefs: []
  type: TYPE_NORMAL
- en: 'Once **Developer Mode** is turned on:'
  prefs: []
  type: TYPE_NORMAL
- en: Click on **“Claude”** in the top-left menu again.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Select **“Settings.”**
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: A new pop-up window will appear — look for the **“Developer”** tab in the left-hand
    navigation bar. That’s where all the good stuff lives.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '![](../Images/0006d4c40ed5f573e4761eed3d0e2e8f.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 4\. Set Up the Configuration File
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Still in the **Developer** settings, click on **“Edit Config.”**
  prefs: []
  type: TYPE_NORMAL
- en: This will create a configuration file if one doesn’t already exist and open
    it directly in your file system.
  prefs: []
  type: TYPE_NORMAL
- en: 'The file location depends on your OS:'
  prefs: []
  type: TYPE_NORMAL
- en: '**macOS:** `~/Library/Application\ Support/Claude/claude_desktop_config.json`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Windows:** `%APPDATA%\Claude\claude_desktop_config.json`'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This is where you’ll define the servers and capabilities you want Claude to
    use — so keep this file open, we’ll be editing it next.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/73f4817d98d8e9083bbd3ae6f2b692d4.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 'Open the config file (`claude_desktop_config.json`) in any text editor. Replace
    its contents with the following, depending on your OS:'
  prefs: []
  type: TYPE_NORMAL
- en: 'For macOS:'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: '[PRE6]'
  prefs: []
  type: TYPE_PRE
- en: 'For Windows:'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: '[PRE7]'
  prefs: []
  type: TYPE_PRE
- en: '**Make sure to replace** `"username"` **with your actual system username.**
    The paths listed here should point to valid folders on your machine—this setup
    gives Claude access to your **Desktop** and **Downloads**, but you can add more
    paths if needed.'
  prefs: []
  type: TYPE_NORMAL
- en: What This Does
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: This config tells **Claude Desktop** to automatically start an MCP server called
    `"filesystem"` every time the app launches. That server runs using `npx` and spins
    up `@modelcontextprotocol/server-filesystem`, which is what lets Claude interact
    with your file system—read, write, move files, search directories, etc.
  prefs: []
  type: TYPE_NORMAL
- en: ⚠️ Command Privileges
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'Just a heads-up: Claude will run these commands with your user account’s permissions,
    meaning it can access and modify local files. Only add commands to the config
    file if you understand and trust the server you’re hooking up — no random packages
    from the internet!'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 5\. Restart Claude
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Once you’ve updated and saved your configuration file, **restart Claude Desktop**
    to apply the changes.
  prefs: []
  type: TYPE_NORMAL
- en: After it boots up, you should see a **hammer icon** in the bottom-left corner
    of the input box. That’s your signal that the developer tools — and your custom
    MCP server — are up and running.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/7e2be0df6558db1e67d3f406c40aca08.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: After clicking the **hammer icon**, you should see the list of tools exposed
    by the **Filesystem MCP Server** — things like reading files, writing files, searching
    directories, and so on.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/78589cd1f9c15d09cca7adb5049954c3.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: If you don’t see your server listed or nothing shows up, don’t worry. Jump over
    to the [**Troubleshooting**](https://modelcontextprotocol.io/quickstart/user#troubleshooting)
    section in the official documentation for some quick debugging tips to get things
    back on track.
  prefs: []
  type: TYPE_NORMAL
- en: 6\. Try It Out!
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now that everything’s set up, you can start chatting with Claude about your
    file system — **and it should know when to call the right tools**.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here are a few things you can try asking:'
  prefs: []
  type: TYPE_NORMAL
- en: '*“Can you write a poem and save it to my Desktop?”*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*“What are some work-related files in my Downloads folder?”*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '*“Can you take all the images on my Desktop and move them to a new folder called
    ‘Images’?”*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: When needed, Claude will automatically invoke the appropriate tools and **ask
    for your approval** before doing anything on your system. You stay in control,
    and Claude gets the job done.
  prefs: []
  type: TYPE_NORMAL
- en: 'Build Your Own: Custom MCP Server from Scratch'
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: '**Alright, ready to level up?**'
  prefs: []
  type: TYPE_NORMAL
- en: In this section, you’ll go from user to builder. We’re going to write a custom
    MCP server that Claude can talk to — specifically, a tool that lets it search
    the latest documentation from AI libraries like LangChain, OpenAI, MCP (yes, we’re
    using MCP to learn MCP), and LlamaIndex.
  prefs: []
  type: TYPE_NORMAL
- en: Because let’s be honest — how many times have you watched Claude confidently
    spit out deprecated code or reference libraries that haven’t been updated since
    2021?
  prefs: []
  type: TYPE_NORMAL
- en: This tool uses real-time search, scrapes live content, and gives your assistant
    fresh knowledge on demand. Yes, it’s as cool as it sounds.
  prefs: []
  type: TYPE_NORMAL
- en: The project is built using the official MCP SDK from Anthropic. If you’re comfortable
    with Python and the command line, you’ll be up and running in no time. And even
    if you’re not — don’t worry. We’ll walk through everything step by step, including
    the parts most tutorials just assume you already know.
  prefs: []
  type: TYPE_NORMAL
- en: Prerequisites
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Before we dive in, here are the things you need installed on your system:'
  prefs: []
  type: TYPE_NORMAL
- en: '**Python 3.10 or higher** — this is the programming language we’ll use'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '**MCP SDK (v1.2.0 or higher)** — this gives you all the tools to create a Claude-compatible
    server (which will be installed in upcoming parts)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[**uv**](https://github.com/astral-sh/uv) **(package manager)** — think of
    it like a modern version of pip, but much faster and easier to use for projects
    (which will be installed in upcoming parts)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Step 1: Install `uv` (the Package Manager)'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: I<mdspan datatext="el1746803343129" class="mdspan-comment">f you’ve used Python
    before, you might be used to `pip`. `uv` is like pip’s cooler, more modern cousin.
    We’ll use it to set up and manage our project. Run the command below in your terminal
    to install `uv`:</mdspan>
  prefs: []
  type: TYPE_NORMAL
- en: '**On macOS/Linux:**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE8]'
  prefs: []
  type: TYPE_PRE
- en: '**On Windows:**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE9]'
  prefs: []
  type: TYPE_PRE
- en: This will download and install `uv` on your machine. Once it’s done, **close
    and reopen your terminal** to make sure the `uv` command is recognized. (If you’re
    on Windows, you can use WSL or follow their Windows instructions.)
  prefs: []
  type: TYPE_NORMAL
- en: 'To check that it’s working, run this command in your terminal:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE10]'
  prefs: []
  type: TYPE_PRE
- en: If you see a version number, you’re good to go.
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 2: Set Up Your Project'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Now we’re going to create a folder for our MCP server and get all the pieces
    in place. In your terminal, run these commands:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE11]'
  prefs: []
  type: TYPE_PRE
- en: '**Wait — what’s all this?**'
  prefs: []
  type: TYPE_NORMAL
- en: '`uv init mcp-server` sets up a blank Python project named `mcp-server` .'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`uv venv` creates a virtual environment (your private sandbox for this project).'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`source .venv/bin/activate` turns on that environment so everything you install
    stays inside it.'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Step 3: Install the Required Packages'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Inside your virtual environment, install the tools you’ll need:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE12]'
  prefs: []
  type: TYPE_PRE
- en: 'Here’s what each package does:'
  prefs: []
  type: TYPE_NORMAL
- en: '`mcp[cli]`: The core SDK that lets you build servers Claude can talk to'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`httpx`: Used to make HTTP requests (like fetching data from websites)'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`beautifulsoup4`: Helps us extract readable text from messy HTML'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '`python-dotenv`: Lets us load API keys from a `.env` file'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Before we start writing code, it’s a good idea to open the project folder in
    a text editor so you can see all your files in one place and edit them easily.
  prefs: []
  type: TYPE_NORMAL
- en: 'If you’re using **VS Code** (which I highly recommend if you’re not sure what
    to use), just run this from inside your `mcp-server` folder:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE13]'
  prefs: []
  type: TYPE_PRE
- en: This command tells VS Code to open the **current folder** (`.` just means “right
    here”).
  prefs: []
  type: TYPE_NORMAL
- en: '*🛠️ If the* `code` *command doesn’t work, you probably need to enable it*:'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*1\. Open VS Code*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*2\. Press* `Cmd+Shift+P` *(or* `Ctrl+Shift+P` *on Windows)*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*3\. Type:* `Shell Command: Install ''code'' command in PATH`'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*4\. Hit Enter, then restart your terminal*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: ''
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '*If you’re using another editor like PyCharm or Sublime Text, you can just
    open the* `mcp-server` *folder manually from within the app.*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'Step 3.5: Get Your Serper API Key (for Web Search)'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: To power our real-time documentation search, we’ll use [Serper](https://serper.dev)
    — a simple and fast Google Search API that works great for AI agents.
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s how to set it up:'
  prefs: []
  type: TYPE_NORMAL
- en: Head over to [serper.dev](https://serper.dev) and click **Sign Up:** It’s free
    for basic usage and works perfectly for this project.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Once signed in, go to your **Dashboard:** You’ll see your **API Key** listed
    there. Copy it.
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: In your project folder, create a file called `.env:<br>`This is where we’ll
    store the key securely (so we’re not hardcoding it).
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: 'Add this line to your `.env` file:'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '[PRE14]'
  prefs: []
  type: TYPE_PRE
- en: Replace `your-api-key-here` with the actual key you copied
  prefs: []
  type: TYPE_NORMAL
- en: That’s it — now your server can talk to Google via Serper and pull in fresh
    docs when Claude asks.
  prefs: []
  type: TYPE_NORMAL
- en: 'Step 4: Write the Server Code'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Now that your project is set up and your virtual environment is running, it’s
    time to actually write the server.
  prefs: []
  type: TYPE_NORMAL
- en: 'This server is going to:'
  prefs: []
  type: TYPE_NORMAL
- en: 'Accept a question like: *“How do I use retrievers in LangChain?”*'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Know which documentation site to search (e.g., LangChain, OpenAI, etc.)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Use a web search API (Serper) to find the best links from that site
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Visit those pages and scrape the actual content
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Return that content to Claude
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This is what makes your Claude smarter — it can look things up from real docs
    instead of making things up based on old data.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: ⚠️ Quick Reminder About Ethical Scraping
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: '**Always respect the site you’re scraping.** Use this responsibly. Avoid hitting
    pages too often, don’t scrape behind login walls, and check the site’s `robots.txt`
    file to see what’s allowed. You can read more about it [here.](https://developers.google.com/search/docs/crawling-indexing/robots/intro)'
  prefs: []
  type: TYPE_NORMAL
- en: Your tool is only as useful as it is respectful. That’s how we build AI systems
    that are not just smart — but sustainable too.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: '**1\. Create Your Server File**'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'First, run this from inside your `mcp-server` folder to create a new file:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE15]'
  prefs: []
  type: TYPE_PRE
- en: 'Then open that file in your editor (if it isn’t open already). Replace the
    code there with the following:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE16]'
  prefs: []
  type: TYPE_PRE
- en: '**2\. How The Code Works**'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: First, we set up the foundation of our custom MCP server. It pulls in all the
    libraries you’ll need — like tools for making web requests, cleaning up webpages,
    and loading secret API keys. It also creates your server and names it `"docs"`
    so Claude knows what to call. Then, it lists the documentation sites (like LangChain,
    OpenAI, MCP, and LlamaIndex) your tool will search through. Finally, it sets the
    URL for the Serper API, which is what the tool will use to send Google search
    queries. Think of it as prepping your workspace before actually building the tool.
  prefs: []
  type: TYPE_NORMAL
- en: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>Click
    here to see the revelant code snippet</summary>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE17]</details>'
  prefs: []
  type: TYPE_NORMAL
- en: Then, we define a function that lets our tool talk to the **Serper API**, which
    we’ll use as a wrapper around Google Search.
  prefs: []
  type: TYPE_NORMAL
- en: This function, `search_web`, takes in a query string, builds a request, and
    sends it off to the search engine. It includes your API key for authentication,
    tells Serper we’re sending JSON, and limits the number of search results to 2
    for speed and focus. The function returns a dictionary containing the structured
    results, and it also gracefully handles timeouts or any errors that might come
    from the API. This is the part that helps Claude figure out *where* to look before
    we even fetch the content.
  prefs: []
  type: TYPE_NORMAL
- en: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>Click
    here to see the relevant code snippet</summary>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE18]</details>'
  prefs: []
  type: TYPE_NORMAL
- en: Once we’ve found a few promising links, we need a way to extract just the **useful
    content** from those web pages. That’s what `fetch_url` does. It visits each URL,
    grabs the full HTML of the page, and then uses BeautifulSoup to filter out just
    the readable parts—things like paragraphs, headings, and examples. We try to prioritize
    sections like `<main>`, `<article>`, or containers with a `.content` class, which
    usually hold the good stuff. If the page is super long, we also trim it down to
    avoid flooding the output. Think of this as the “reader mode” for Claude—it turns
    cluttered webpages into clean text it can understand.
  prefs: []
  type: TYPE_NORMAL
- en: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>Click
    here to see the relevant code snippet</summary>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE19]</details>'
  prefs: []
  type: TYPE_NORMAL
- en: 'Now comes the main act: the actual tool function that Claude will call.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The `get_docs` function is where everything comes together. Claude will pass
    it a **query** and the name of a **library** (like `"llama-index"`), and this
    function will:'
  prefs: []
  type: TYPE_NORMAL
- en: Check if that library is supported
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Build a site-specific search query (e.g., `site:docs.llamaindex.ai "vector store"`)
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Use `search_web()` to get the top results
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Use `fetch_url()` to visit and extract the content
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: Format everything into a nice, readable string that Claude can understand and
    return
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: We also include titles, URLs, and some visual separators between each result,
    so Claude can reference or cite them if needed.
  prefs: []
  type: TYPE_NORMAL
- en: <details class="wp-block-details is-layout-flow wp-block-details-is-layout-flow"><summary>Click
    here to see the relevant code snippet</summary>
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE20]</details>'
  prefs: []
  type: TYPE_NORMAL
- en: Finally, this line kicks everything off. It tells the MCP server to start listening
    for input from Claude using standard input/output (which is how Claude Desktop
    talks to external tools). This line always lives at the bottom of your script.
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE21]'
  prefs: []
  type: TYPE_PRE
- en: 'Step 5: Test and Run Your Server'
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Alright, your server is coded and ready to go — now let’s run it and see it
    in action. There are two main ways to test your MCP server:'
  prefs: []
  type: TYPE_NORMAL
- en: Development Mode (Recommended for Building & Testing)
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'The easiest way to test your server during development is to use:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE22]'
  prefs: []
  type: TYPE_PRE
- en: This command launches the [**MCP Inspector**](https://modelcontextprotocol.io/docs/tools/inspector),
    which opens up a local web interface in your browser. It’s like a control panel
    for your server.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/106e358775720c6b7ac566b061b79bb2.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: 'Here’s what you can do with it:'
  prefs: []
  type: TYPE_NORMAL
- en: Interactively test your tools (like `get_docs`)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: View detailed logs and error messages in real time
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Monitor performance and response times
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Set or override environment variables temporarily
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Use this mode while building and debugging. You’ll be able to see exactly what
    Claude would see and quickly fix any issues before integrating with the full Claude
    Desktop app.
  prefs: []
  type: TYPE_NORMAL
- en: Claude Desktop Integration (For Regular Use)
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'Once your server works and you’re happy with it, you can install it into Claude
    Desktop:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE23]'
  prefs: []
  type: TYPE_PRE
- en: 'This command will:'
  prefs: []
  type: TYPE_NORMAL
- en: Add your server into Claude’s configuration file (the JSON file we fiddled with
    earlier) automatically
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Enable it to run every time you launch Claude Desktop
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Make it available through the Developer Tools (🔨 hammer icon)
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '***But hold on — there’s one small catch…***'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: '⚠️ Current Issue: `uv` Command Is Hardcoded'
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'Right now, there’s an open issue in the `mcp` library: when it writes your
    server into Claude’s config file, it **hardcodes** the command as just `"uv"`.
    That works *only* if `uv` is globally available in your PATH — which isn’t always
    the case, especially if you installed it locally with pipx or a custom method.'
  prefs: []
  type: TYPE_NORMAL
- en: 'So we need to fix it manually. Here’s how:'
  prefs: []
  type: TYPE_NORMAL
- en: Manually Update Claude’s Config File
  prefs:
  - PREF_H5
  type: TYPE_NORMAL
- en: '**Open your Claude config file:**'
  prefs:
  - PREF_OL
  type: TYPE_NORMAL
- en: '**On MacOS:**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE24]'
  prefs: []
  type: TYPE_PRE
- en: '**On Windows:**'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE25]'
  prefs: []
  type: TYPE_PRE
- en: 💡 If you’re not using VS Code, replace `code` with your text editor of choice
    (like `open`, `nano`, or `subl`).
  prefs: []
  type: TYPE_NORMAL
- en: 2\. **Find the section that looks like this:**
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE26]'
  prefs: []
  type: TYPE_PRE
- en: 3. **Update the** `"command"` **value to the absolute path of** `uv` **on your
    system.**
  prefs: []
  type: TYPE_NORMAL
- en: 'To find it, run this in your terminal:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE27]'
  prefs: []
  type: TYPE_PRE
- en: 'It’ll return something like:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE28]'
  prefs: []
  type: TYPE_PRE
- en: 'Now replace `"uv"` in the config with that full path:'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '[PRE29]'
  prefs: []
  type: TYPE_PRE
- en: 4\. **Save the file and restart Claude Desktop.**
  prefs: []
  type: TYPE_NORMAL
- en: ✅ **That’s It!**
  prefs: []
  type: TYPE_NORMAL
- en: 'Now Claude Desktop will recognize your custom `docs` tool, and anytime you
    open the Developer Tools (🔨), it’ll show up. You can chat with Claude and ask
    things like:'
  prefs: []
  type: TYPE_NORMAL
- en: '*“Can you check the latest MCP docs for how to build a custom server?”*'
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: And Claude will call your server, search the docs, pull the content, and use
    it in its response — live. You can view a quick demo [here.](https://drive.google.com/file/d/1xFqx0KfviGcor7Fnzk8MdmQJUDjQsfLW/view?usp=sharing)
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/87a050b35cd59a0df87e2f2ba33b9ce6.png)'
  prefs: []
  type: TYPE_IMG
- en: Image by author
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
  type: TYPE_NORMAL
- en: 🎉 Congrats, You’ve Mastered MCP!
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: You did it. You’ve gone from zero to building, testing, and integrating your
    **very own Claude-compatible MCP server** — and that is *no* small feat.
  prefs: []
  type: TYPE_NORMAL
- en: Take a moment. Stretch. Sip some coffee. Pat yourself on the back. You didn’t
    just write some Python — you built a real, production-grade tool that extends
    an LLM’s capabilities in a modular, secure, and powerful way.
  prefs: []
  type: TYPE_NORMAL
- en: 'Seriously, most devs don’t get this far. You now understand:'
  prefs: []
  type: TYPE_NORMAL
- en: How MCP works under the hood
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How to build and expose tools Claude can use
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How to wire up real-time web search and content extraction
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: How to debug, test, and integrate the whole thing with Claude Desktop
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You didn’t just learn it — you shipped it.
  prefs: []
  type: TYPE_NORMAL
- en: Want to go even deeper? There’s a whole world of **agentic workflows**, **custom
    tools**, and **collaborative LLMs** waiting to be built. But for now?
  prefs: []
  type: TYPE_NORMAL
- en: '**Take the win. You earned it.** 🏆'
  prefs: []
  type: TYPE_NORMAL
- en: Now go ask Claude something fun and let your new tool flex.
  prefs: []
  type: TYPE_NORMAL
- en: '* * *'
  prefs: []
