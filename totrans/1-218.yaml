- en: Why build a deep research system?
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'The first question you might ask yourself is:'
  prefs: []
  type: TYPE_NORMAL
- en: Why do I need a deep research system?
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
- en: 'This is a fair question, because there are other alternatives that are viable
    in many situations:'
  prefs: []
  type: TYPE_NORMAL
- en: Feed all data into an LLM
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: RAG
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Keyword search
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: If you can get away with these simpler systems, you should almost always do
    that. The by far easiest approach is simply feeding all the data into an LLM.
    If your information is contained in fewer than 1 million tokens, this is definitely
    a good option.
  prefs: []
  type: TYPE_NORMAL
- en: Furthermore, if traditional RAG works well, or you can find relevant information
    with a keyword search, you should also choose those options. However, sometimes,
    neither of these solutions is strong enough to solve your problem. Maybe you need
    to deeply analyze many sources, and chunk retrieval from similarity (RAG) isn’t
    good enough. Or you can’t use keyword search because you’re not familiar enough
    with the dataset to know which keywords to use. In which case, you should consider
    using a deep research system.
  prefs: []
  type: TYPE_NORMAL
- en: How to build a deep research system
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: You can naturally utilize the deep research system from providers such as OpenAI,
    which provides a [Deep Research API](https://platform.openai.com/docs/guides/deep-research).
    This can be a good alternative if you want to keep things simple. However, in
    this article, I’ll discuss in more detail how a deep research system is built
    up, and why it’s useful. Anthropic wrote a very good article on their [Multi Agent
    Research System](https://www.anthropic.com/engineering/multi-agent-research-system)
    (which is deep research), which I recommend reading to understand more details
    about the topic.
  prefs: []
  type: TYPE_NORMAL
- en: Gathering and indexing information
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The first step for any information finding system is to gather all your information
    in one place. Maybe you have information in apps like:'
  prefs: []
  type: TYPE_NORMAL
- en: Google Drive
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Notion
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Salesforce
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: You then either need to gather this information in one place (convert it all
    to PDFs, for example, and store them in the same folder), or you can connect with
    these apps, like ChatGPT has done in its application.
  prefs: []
  type: TYPE_NORMAL
- en: 'After gathering the information, we now need to index it to make it easily
    available. The two main indices you should create are:'
  prefs: []
  type: TYPE_NORMAL
- en: Keyword search index. For example BM25
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: 'Vector similarity index: Chunk up your text, embed it, and store it in a vectorDB
    like Pinecone'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: This makes the information easily accessible from the tools I’ll describe in
    the next session.
  prefs: []
  type: TYPE_NORMAL
- en: Tools
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'The agents we’ll be using later on need tools to fetch relevant information.
    You should thus make a series of functions that make it easy for the LLM to fetch
    the relevant information. For example, if the user queries for a Sales report, the
    LLM might want to make a keyword search for that and analyse the retrieved documents.
    These tools can look like this:'
  prefs: []
  type: TYPE_NORMAL
- en: '[PRE0]'
  prefs: []
  type: TYPE_PRE
- en: 'You can also allow the agent access to other functions, such as:'
  prefs: []
  type: TYPE_NORMAL
- en: Internet search
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Filename only search
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: And other potentially relevant functions
  prefs: []
  type: TYPE_NORMAL
- en: Putting it all together
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'A deep research system typically consists of an orchestrator agent and many
    subagents. The approach is usually as follows:'
  prefs: []
  type: TYPE_NORMAL
- en: An orchestrator agent receives the user query and plans approaches to take
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: Many subagents are sent to fetch relevant information and feed the summarized
    information back to the orchestrator
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The orchestrator determines if it has enough information to answer the user
    query. If no, we go back to the last bullet point; if yes, we can provide for
    the final bullet point
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: The orchestrator puts all the information together and provides the user with
    an answer
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: '![](../Images/d99842f2cd1b7a73a02b24259d25dc56.png)'
  prefs: []
  type: TYPE_IMG
- en: This figure highlights the deep research system I discussed. You input the user
    query, an orchestrator agent processes it, and sends subagents to fetch info from
    the document corpus. The orchestrator agent then determines if it has enough information
    to respond to the user query. If the answer is no, it fetches more information,
    and if it has enough information, it generates a response for the user. Image
    by the author.
  prefs: []
  type: TYPE_NORMAL
- en: Furthermore, you might also have a clarifying question, if the user’s question
    is vague, or just to narrow down the scope of the user’s query. You’ve probably
    experienced this if you used any deep research system from a frontier lab, where
    the deep research system always starts off by asking a clarifying question.
  prefs: []
  type: TYPE_NORMAL
- en: Usually, the orchestrator is a larger/better model, for example, Claude Opus,
    or GPT-5 with high reasoning effort. The subagents are typically smaller, such
    as GPT-4.1 and Claude Sonnet.
  prefs: []
  type: TYPE_NORMAL
- en: The main advantage of this approach (over traditional RAG, especially) is that
    you allow the system to scan and analyze more information, lowering the chance
    of missing information that is relevant to respond to the user query. The fact
    that you have to scan more documents also typically makes the system slower. Naturally,
    this is a trade-off between time and quality of responses.
  prefs: []
  type: TYPE_NORMAL
- en: Conclusion
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: In this article, I have discussed how to build a deep research system. I first
    covered the motivation for building such a system, and in which scenarios you
    should instead focus on building simpler systems, such as RAG or keyword search.
    Continuing, I discussed the foundation for what a deep research system is, which
    essentially takes in a user query, plans for how to answer it, sends sub-agents
    to fetch relevant information, aggregates that information, and responds to the
    user.
  prefs: []
  type: TYPE_NORMAL
