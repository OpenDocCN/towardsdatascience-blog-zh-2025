- en: 1\. Introduction
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: Pollen classification is an interesting domain in visual image recognition,
    with a broad range of use cases across ecology and biotechnology, such as studies
    of plant populations, climate change, and pollen structure. Despite this, the
    subject is relatively unexplored, as few datasets have been composed of images
    of such pollens, and those that exist are often lackluster or otherwise insufficient
    for the training of a proper visual classifier or object detector, especially
    for images containing mixtures of various pollens. Besides providing a sophisticated
    visual identification model, our project aims to fill this gap with a custom-made
    dataset. Visual pollen classification is often complicated to solve without machine
    vision, as modern biologists are often incapable of differentiating between pollen
    of different plant species based on images alone. This makes the task of quickly
    and efficiently recognising harvested pollens extremely challenging, provided
    the pollen particles’ source is unknown beforehand.
  prefs: []
  type: TYPE_NORMAL
- en: 1.1 Available Datasets of Pollen Images
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: This section highlights the parameters of several freely available datasets
    and compares them to the properties of our custom set.
  prefs: []
  type: TYPE_NORMAL
- en: Dataset 1
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: '**Link:** [https://www.kaggle.com/datasets/emresebatiyolal/pollen-image-dataset](https://www.kaggle.com/datasets/emresebatiyolal/pollen-image-dataset)
    **Number of classes:** 193'
  prefs: []
  type: TYPE_NORMAL
- en: '**Images per class:** 1-16'
  prefs: []
  type: TYPE_NORMAL
- en: '**Image quality:** Separated, clear images, sometimes with labelings'
  prefs: []
  type: TYPE_NORMAL
- en: '**Image colour:** Various'
  prefs: []
  type: TYPE_NORMAL
- en: '**Notes:** The dataset seems composed of incongruent images taken from multiple
    sources. While broad in classes, each contains only several photos, insufficient
    for training any image detection model.'
  prefs: []
  type: TYPE_NORMAL
- en: Dataset 2
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: '**Link:** [https://www.kaggle.com/datasets/andrewmvd/pollen-grain-image-classification](https://www.kaggle.com/datasets/andrewmvd/pollen-grain-image-classification)
    **Number of classes:** 23'
  prefs: []
  type: TYPE_NORMAL
- en: '**Images per class:** 35, 1 class 20'
  prefs: []
  type: TYPE_NORMAL
- en: '**Image quality:** Well separated, slightly blurry, no text on images'
  prefs: []
  type: TYPE_NORMAL
- en: '**Image colour:** Uncoloured, consistent'
  prefs: []
  type: TYPE_NORMAL
- en: '**Notes:** Localised, well-prepared dataset for the classification of Brazilian
    Savannah pollen. Consistent image source, yet the number of images per class may
    pose issues when aiming for high accuracy.'
  prefs: []
  type: TYPE_NORMAL
- en: Dataset 3
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: '**Link:** [https://www.kaggle.com/datasets/nataliakhanzhina/pollen20ldet](https://www.kaggle.com/datasets/nataliakhanzhina/pollen20ldet)
    **Number of classes:** 20'
  prefs: []
  type: TYPE_NORMAL
- en: '**Images per class: Exorbitant****Image quality:** Self-explanatory images,
    with separated and joined pollen images.'
  prefs: []
  type: TYPE_NORMAL
- en: '**Image colour:** Dyed, consistent'
  prefs: []
  type: TYPE_NORMAL
- en: '**Notes:** An insurmountable amount of well-labeled, consistent, and high-quality
    images make this dataset of the highest quality. However, the colouring present
    may be an issue in specific applications. Additionally, the magnification and
    ability of the pollens to intersect may pose problems in mixed-pollen scenarios.'
  prefs: []
  type: TYPE_NORMAL
- en: 2\. New Dataset of Pollen Images
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 'Our dataset is a collection of high-quality microscope images of 4 different
    classes of pollens belonging to common fruit plants: the European gooseberry,
    the haskap berry, the blackcurrant, and the shadbush. These plant species have
    not been part of any previous dataset, so our dataset contributes new data towards
    visual pollen classification.'
  prefs: []
  type: TYPE_NORMAL
- en: Each class contains 200 images of multiple grains of pollen, each image without
    dye. It was obtained in collaboration with the National Institute of Horticultural
    Research in Skierniewice, Poland.
  prefs: []
  type: TYPE_NORMAL
- en: '**Number of classes:** 5 (4 pollens + mixed)'
  prefs: []
  type: TYPE_NORMAL
- en: '**Images per class:** ~200'
  prefs: []
  type: TYPE_NORMAL
- en: '**Image quality:** Clear images, images contain multiple pollen fragments,
    mixed images present'
  prefs: []
  type: TYPE_NORMAL
- en: '**Image colour:** Undyed, consistent'
  prefs: []
  type: TYPE_NORMAL
- en: Our dataset focuses on locally available pollens, class balance, and an abundance
    of images to train on without added dye, which may make the classifier unsuitable
    for some tasks. Additionally, our proposed solution contains images with mixtures
    of different pollen types, aiding in training detection models for field-collection
    applications. Exemplary images from the dataset are represented as Figures 1-4.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/7df6eea547ab101b2eeb318bc69e19f8.png)'
  prefs: []
  type: TYPE_IMG
- en: '**Fig. 1** — An example image in the dataset – gooseberry class.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/bf6f2cdc95d3388efe2247adb83b0da4.png)'
  prefs: []
  type: TYPE_IMG
- en: '**Fig. 2** — An example image in the dataset — haskap berry class.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/f4caeb336555549c4649e8f54344be2e.png)'
  prefs: []
  type: TYPE_IMG
- en: '**Fig. 3** — An example image in the dataset —blackcurrant.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/5b022579d053b7a906ac3c3a98a837d0.png)'
  prefs: []
  type: TYPE_IMG
- en: '**Fig. 4** — An example image in the dataset —shadbush class.'
  prefs: []
  type: TYPE_NORMAL
- en: The full dataset is available from the corresponding author on reasonable request.
    The data acquisition steps are composed of the sample preparation and taking microscopic
    images, which were prepared by Professor Agnieszka Marasek-Ciołakowska and Ms.
    Aleksandra Machlańska from the Department of Applied Biology at The National Institute
    of Horticultural Research, for which we are very thankful. Their efforts have
    proven invaluable for the success of our project.
  prefs: []
  type: TYPE_NORMAL
- en: 3\. Extraction of Individual Pollen Images
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We first extracted images of individual pollens from the photos in our datasets
    to train various models to recognize pollens. Each of those photos contained multiple
    pollens and other lifeforms and pollution, making identifying the pollen species
    far more difficult. We used the YOLOv12 model, a cutting-edge attention-centric
    real-time object detection model developed by Ultralytics.
  prefs: []
  type: TYPE_NORMAL
- en: 3.1 Fine-Tuning YOLOv12
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'Thanks to YOLOv12’s innovative nature, it can be trained even on tiny datasets.
    We experienced this phenomenon firsthand. To prepare our own dataset, we manually
    labeled the pollens’ locations on ten images in each of the four classes of our
    dataset using [CVAT](https://www.cvat.ai/), later exporting the labels into .txt
    files corresponding to individual images. Then, we organized our data into a YOLOv12-appropriate
    format: we divided our data into a training set (7 image-label pairs per class,
    in total 28) and a validation set (3 image-label pairs per class, in total 12).
    We added a .yaml file pointing towards our dataset. It can be noticed that the
    dataset was truly very small. The resulting image in prediction mode with detected
    individual pollens with the confidence overlay is represented as Fig. 5\. We also
    downloaded the model (YOLO12s) from the [YOLOv12 website](https://docs.ultralytics.com/models/yolo12/).
    Then we started the training.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ed8f05bbbe0d9e6e432f820934c3e054.png)'
  prefs: []
  type: TYPE_IMG
- en: '**Fig. 5** — The model’s output for an example image from the dataset.'
  prefs: []
  type: TYPE_NORMAL
- en: 'The model proved to detect pollens with very high accuracy, but there was one
    more thing to consider: the model’s confidence. For every detected pollen, the
    model also outputted a value of how specific its prediction is. We had to decide
    whether to use a lower threshold for confidence (more images, but higher risk
    of malformed or non-pollen photos) or a higher one (fewer images, but lower chance
    of non-pollen). We eventually settled on trying out two thresholds, 0.8 and 0.9
    to evaluate which one would work better when training classification models.'
  prefs: []
  type: TYPE_NORMAL
- en: 3.2 Exporting the individual-pollen datasets
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'To do this, we launched the model’s prediction on all of the class-specific
    images in our dataset. This worked very well, but after exporting, we encountered
    another issue — some photos were cropped, even on higher thresholds. For this
    reason, we added another step before exporting our individual pollens: we eliminated
    images with a disproportionate aspect ratio (see example as Fig. 6). Specifically,
    0.8, dividing the smaller dimension by the larger one.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/8ccfe4f3d9ac71240839a5a62f906615.png)'
  prefs: []
  type: TYPE_IMG
- en: '**Fig. 6** – An example of a badly cropped image. Such images in the dataset
    would negatively impact the performance of classification models.'
  prefs: []
  type: TYPE_NORMAL
- en: Then, we resized all the images into 224×224, the standard dimension for input
    images for deep learning models.
  prefs: []
  type: TYPE_NORMAL
- en: 3.3 Individual-pollen datasets — a short analysis
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'We ended up with two datasets, one made with a confidence threshold of 0.8
    and the other with 0.9:'
  prefs: []
  type: TYPE_NORMAL
- en: '**0.8 Threshold:**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: gooseberry — 7788 images
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: haskap berry — 3582 images
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: blackcurrant — 4637 images
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: shadbush — 4140 images
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Total — 20147 images**'
  prefs: []
  type: TYPE_NORMAL
- en: '**0.9 Threshold:**'
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
- en: gooseberry — 2301 images
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: haskap berry — 2912 images
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: blackcurrant — 2438 images
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: shadbush —1432 images
  prefs:
  - PREF_IND
  - PREF_UL
  type: TYPE_NORMAL
- en: '**Total — 9083 images**'
  prefs: []
  type: TYPE_NORMAL
- en: A quick look at the numbers shows that the 0.9 threshold dataset is over **twice
    as small** as the 0.8 threshold one. Both datasets are **not balanced** — the
    0.8 one due to gooseberry and the 0.9 one due to shadbush.
  prefs: []
  type: TYPE_NORMAL
- en: YOLOv12 was an effective tool for segmenting our images into two single-pollen
    image datasets, even though we encountered some difficulties. The newly created
    datasets may be unbalanced, yet their size should compensate for this drawback,
    mainly since every class is widely represented. There is a lot of potential in
    them for future training of classification models, but we will have to see for
    ourselves.
  prefs: []
  type: TYPE_NORMAL
- en: 4\. Classification of Individual Pollen Images
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: 4.1 An Overview of Model Rating Metrics
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: One must devise metrics to measure performance to properly approach training
    models, whether classical ones working on statistical features, or more complex
    approaches, such as convolutional neural networks or vision transformers. Through
    the years, many methods have been devised for accomplishing these tasks — from
    statistical measures such as F1, precision, or recall, to more visual metrics
    such as GradCAM, that allow a deeper insight into the model’s inner workings.
    This article explores the grading methods used by our models, without going into
    unnecessary detail.
  prefs: []
  type: TYPE_NORMAL
- en: Recall
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Recall is described as the ratio of accurate guesses of one class to the total
    guesses of that class (see Eq. 1). It measures what percentage of images marked
    as a class belong to it. Working on separate classes makes it functional in both
    balanced and imbalanced datasets.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/6197fb2d685bc619355700d770502828.png)'
  prefs: []
  type: TYPE_IMG
- en: '**Eq. 1**— Formula for recall.'
  prefs: []
  type: TYPE_NORMAL
- en: Precision
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: As opposed to recall, precision is the percentage of correctly marked items
    among all items belonging to the class (see Eq. 2). It measures the percentage
    of items in a class that were guessed correctly. This metric performs similarly
    to recall.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/dcd8709fc5d731d0cdaf6173b30cb6fa.png)'
  prefs: []
  type: TYPE_IMG
- en: '**Eq. 2** — Formula for precision.'
  prefs: []
  type: TYPE_NORMAL
- en: F1 Score
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The F1 Score is simply the harmonic mean of precision and recall (see Eq. 3).
    It helps combine precision and recall into a concise measurement. Hence, it still
    performs excellently even on unbalanced datasets.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/e676f8ee5bd640c0dd96355136966a48.png)'
  prefs: []
  type: TYPE_IMG
- en: '**Eq. 3** — Formula for F1.'
  prefs: []
  type: TYPE_NORMAL
- en: Confusion Matrix
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The confusion matrix is a visual measure comparing the number of guesses made
    for one class to the actual number of images in this class. It helps to illustrate
    mistakes made by the model, which may have trouble with only specific courses
    (see Fig. 7).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/b5a062e5b5bd48d4538a319a3875b3fd.png)'
  prefs: []
  type: TYPE_IMG
- en: '**Fig. 7** — An example of a confusion matrix.'
  prefs: []
  type: TYPE_NORMAL
- en: GradCAM
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: GradCAM is a measure of CNN performance that visualises which areas of the image
    influence the prediction. To do this, the method computes the gradients from 1
    convolutional layer and determines an activation map that visually layers on top
    of the image. It greatly aids in understanding and explaining the model’s “reasons”
    for labelling a particular image as a specific class (see example in Fig. 8).
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ddaaefb9cb660dd7090054325946ed4c.png)'
  prefs: []
  type: TYPE_IMG
- en: '**Fig. 8** — An example of a GradCAM featuring an image of a dog.'
  prefs: []
  type: TYPE_NORMAL
- en: These metrics are only a few of a vast sea of measurements and visualisation
    methods used in machine learning. Yet, they have proven sufficient for measuring
    the performance of the model. In further articles, metrics will be brought up
    accordingly as new classifiers are used and introduced in the project.
  prefs: []
  type: TYPE_NORMAL
- en: 4.2 Individual Pollen Classification with Standard Models
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'With our images preprocessed, we could move on to the next stage: classifying
    individual pollen into species. We tried three approaches - standard, simple classifiers
    based on features extracted from images, Convolutional Neural Networks, and Vision
    Transformers. This article outlines our work on standard models, including the
    kNN classifier, SVMs, MLPs, and Random Forests.'
  prefs: []
  type: TYPE_NORMAL
- en: Feature extraction
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 'To make our classifiers work, we first had to obtain features on which they
    could base their predictions. We settled for two main types of features. One was
    statistical measures based on the presence of pixels with a particular colour
    (one from the RGB model) for a specific image, such as the mean, standard deviation,
    median, quantiles, skew, and kurtosis — we extracted them for every color layer.
    The other was GLCM (Gray Level Co-Occurrence Matrix) features: contrast, dissimilarity,
    homogeneity, energy, and correlation. Those were obtained from grayscale-converted
    images, and we extracted each at different angles. Every single image had 21 statistical
    features and 20 GLCM-based features, which amounts to 41 features per image.'
  prefs: []
  type: TYPE_NORMAL
- en: k-Nearest-Neighbors (kNN)
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The kNN is a classifier that uses a spatial representation of data to classify
    data by detecting the k nearest neighbours of a feature to predict its label.
    The said classifier is fast, yet other methods outperform it.
  prefs: []
  type: TYPE_NORMAL
- en: '**kNN Metrics: **'
  prefs: []
  type: TYPE_NORMAL
- en: '**0.8 Dataset:**'
  prefs: []
  type: TYPE_NORMAL
- en: 'F1: 0.6454'
  prefs: []
  type: TYPE_NORMAL
- en: 'Precision: 0.6734'
  prefs: []
  type: TYPE_NORMAL
- en: 'Recall: 0.6441'
  prefs: []
  type: TYPE_NORMAL
- en: '**0.9 Dataset:**'
  prefs: []
  type: TYPE_NORMAL
- en: 'F1: 0.6961'
  prefs: []
  type: TYPE_NORMAL
- en: 'Precision: 0.7197'
  prefs: []
  type: TYPE_NORMAL
- en: 'Recall: 0.7151'
  prefs: []
  type: TYPE_NORMAL
- en: Support Vector Machine (SVM)
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Like the kNN, the SVM represents data as points in a multi-dimensional space.
    Still, instead of finding nearest neighbours, it tries algorithmically separating
    the data with a hyperplane. This yields better results than the kNN, but introduces
    randomness and is still outclassed by other solutions.
  prefs: []
  type: TYPE_NORMAL
- en: '**SVM Metrics:**'
  prefs: []
  type: TYPE_NORMAL
- en: '**0.8 Dataset:**'
  prefs: []
  type: TYPE_NORMAL
- en: 'F1: 0.6952'
  prefs: []
  type: TYPE_NORMAL
- en: 'Precision: 0.7601'
  prefs: []
  type: TYPE_NORMAL
- en: 'Recall: 0.7025'
  prefs: []
  type: TYPE_NORMAL
- en: '**0.9 Dataset:**'
  prefs: []
  type: TYPE_NORMAL
- en: 'F1: 0.8556'
  prefs: []
  type: TYPE_NORMAL
- en: 'Precision: 0.8687'
  prefs: []
  type: TYPE_NORMAL
- en: 'Recall: 0.8597'
  prefs: []
  type: TYPE_NORMAL
- en: Multi-Layered Perceptron (MLP)
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The Multi-Layered Perceptron is a model inspired by the human brain and its
    neurons. It passes inputs through a network of layers of neurons with their own
    individual weights, which are altered during training. When well-optimized, this
    model can sometimes achieve great results for a standard classifier. Still, pollen
    recognition was not one of them - it performed poorly compared to other solutions
    and was not consistent.
  prefs: []
  type: TYPE_NORMAL
- en: '**MLP Metrics:**'
  prefs: []
  type: TYPE_NORMAL
- en: '**0.8 Dataset:**'
  prefs: []
  type: TYPE_NORMAL
- en: 'F1: 0.8131'
  prefs: []
  type: TYPE_NORMAL
- en: 'Precision: 0.8171'
  prefs: []
  type: TYPE_NORMAL
- en: 'Recall: 0.8173'
  prefs: []
  type: TYPE_NORMAL
- en: '**0.9 Dataset:**'
  prefs: []
  type: TYPE_NORMAL
- en: 'F1: 0.7841'
  prefs: []
  type: TYPE_NORMAL
- en: 'Precision: 0.8095'
  prefs: []
  type: TYPE_NORMAL
- en: 'Recall: 0.7940'
  prefs: []
  type: TYPE_NORMAL
- en: Random Forest
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: The random forest is a model famous for its explainability - it is based on
    decision trees, which classify data based on thresholds, which humans can analyze
    far more easily than, for instance, weights in neural networks. The Random Forest
    performed fairly well and consistently - we found that 200 trees was optimal.
    Still, it was outclassed by more complex classifiers.
  prefs: []
  type: TYPE_NORMAL
- en: '**RF Metrics:**'
  prefs: []
  type: TYPE_NORMAL
- en: '**0.8 Dataset:**'
  prefs: []
  type: TYPE_NORMAL
- en: 'F1: 0.8211'
  prefs: []
  type: TYPE_NORMAL
- en: 'Precision: 0.8210'
  prefs: []
  type: TYPE_NORMAL
- en: 'Recall: 0.8233'
  prefs: []
  type: TYPE_NORMAL
- en: '**0.9 Dataset:**'
  prefs: []
  type: TYPE_NORMAL
- en: 'F1: 0.8150'
  prefs: []
  type: TYPE_NORMAL
- en: 'Precision: 0.8202'
  prefs: []
  type: TYPE_NORMAL
- en: 'Recall: 0.8216'
  prefs: []
  type: TYPE_NORMAL
- en: The classical models exhibited varied performance levels- some performed worse
    than expected, whereas others delivered fairly good metrics. However, this is
    not yet the end. We still have advanced deep learning models to try out, such
    as Convolutional Neural Networks and Vision Transformers. We expect that they
    will perform significantly better.
  prefs: []
  type: TYPE_NORMAL
- en: 4.3 Individual Pollen Classification with Convolutional Neural Networks
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: Classical models such as MLPs, Random Forests, or SVMs in individual pollen
    classification yielded mediocre to pretty good results. However, the next approach
    we decided to try was Convolutional Neural Networks (CNNs). They are models that
    generate features by processing images and are known for their effectiveness.
  prefs: []
  type: TYPE_NORMAL
- en: Instead of training CNNs from scratch, we used a transfer learning technique
    — we took pre-trained models, specifically ResNet50 and ResNet152, and fine-tuned
    them to our dataset. This approach makes training significantly faster and less
    resource-demanding. It also allows for far more effective classification due to
    the models’ already being professionally trained on large datasets. Before training,
    we also had to normalize the images.
  prefs: []
  type: TYPE_NORMAL
- en: In terms of metrics, we used Grad-CAM, a method that attempts to highlight the
    areas of an image that influenced a model’s prediction the most, in addition to
    standard metrics such as F1 score, precision, and recall. We also included confusion
    matrices to see if our CNNs struggle with any particular class.
  prefs: []
  type: TYPE_NORMAL
- en: ResNet50
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: ResNet50 is a CNN architecture developed by Microsoft Research Asia in 2015,
    which was a significant step towards creating far deeper and more efficient neural
    networks. It is a residual network (hence the name ResNet) that uses skip connections
    to allow direct data flow. This, in turn, mitigates the vanishing gradient problem.
  prefs: []
  type: TYPE_NORMAL
- en: We expected this model to perform worse than ResNet152\. Our expectations were
    quickly subverted as the model delivered predictions on the same level as ResNet152
    on both datasets, as represented in the below-listed metrics and confusion metrics
    (see Fig. 9 and Fig. 10), as well as Grad-Cam visualization (see Fig. 11).
  prefs: []
  type: TYPE_NORMAL
- en: '**ResNet50 Metrics: **'
  prefs: []
  type: TYPE_NORMAL
- en: '**0.8 Dataset:**'
  prefs: []
  type: TYPE_NORMAL
- en: 'F1: 0.98'
  prefs: []
  type: TYPE_NORMAL
- en: 'Precision: 0.98'
  prefs: []
  type: TYPE_NORMAL
- en: 'Recall: 0.98'
  prefs: []
  type: TYPE_NORMAL
- en: '**0.9 Dataset:**'
  prefs: []
  type: TYPE_NORMAL
- en: 'F1: 0.99'
  prefs: []
  type: TYPE_NORMAL
- en: 'Precision: 0.99'
  prefs: []
  type: TYPE_NORMAL
- en: 'Recall: 0.99'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/554c78004f619ed3df089addc883ec68.png)'
  prefs: []
  type: TYPE_IMG
- en: '**Fig. 9** — ResNet50’s confusion matrix for the 0.8 dataset.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/d2608d96fb80f6d157eedd865cdaffe9.png)'
  prefs: []
  type: TYPE_IMG
- en: '**Fig. 10** — ResNet50’s confusion matrix for the 0.9 dataset. As demonstrated,
    there were negligible issues with misclassifying Gooseberry as Blackcurrant in
    both datasets.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/658d71ee5bbf5c75ef02bcb208fb8923.png)'
  prefs: []
  type: TYPE_IMG
- en: '**Fig. 11** — The results of Grad-CAM on a random image from the 0.8 and 0.9
    datasets, respectively.'
  prefs: []
  type: TYPE_NORMAL
- en: Regarding Grad-CAM, it did not provide any valuable insights about the model’s
    inner workings - the highlighted zones included the background and seemingly random
    places. Because it achieves very high accuracy, the network appears to notice
    patterns undetectable by the human eye.
  prefs: []
  type: TYPE_NORMAL
- en: ResNet152
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: Also a development of Microsoft’s researchers, the ResNet152 is a residual network
    and a CNN architecture with significant depth and deep learning capabilities far
    exceeding those of the ResNet50.
  prefs: []
  type: TYPE_NORMAL
- en: Therefore, our expectations for this model were higher than for ResNet50\. We
    were disappointed to see that it performed on par with it. It performed excellently
    (see Fig. 12 and Fig. 13 with confusion matrices and Fig. 14 with Grad-Cam visualizations).
  prefs: []
  type: TYPE_NORMAL
- en: '**ResNet152 Metrics: **'
  prefs: []
  type: TYPE_NORMAL
- en: '**0.8 Dataset:**'
  prefs: []
  type: TYPE_NORMAL
- en: 'F1: 0.98'
  prefs: []
  type: TYPE_NORMAL
- en: 'Precision: 0.98'
  prefs: []
  type: TYPE_NORMAL
- en: 'Recall: 0.98'
  prefs: []
  type: TYPE_NORMAL
- en: '**0.9 Dataset:**'
  prefs: []
  type: TYPE_NORMAL
- en: 'F1: 0.99'
  prefs: []
  type: TYPE_NORMAL
- en: 'Precision: 0.99'
  prefs: []
  type: TYPE_NORMAL
- en: 'Recall: 0.99'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a861cb8bdc4e8c4066f7cc10b39ad0ac.png)'
  prefs: []
  type: TYPE_IMG
- en: '**Fig. 12** — ResNet50’s confusion matrix for the 0.8 dataset.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/862fe54abe8ae01ff07bd5b8a72769b3.png)'
  prefs: []
  type: TYPE_IMG
- en: '**Fig. 13** — ResNet50’s confusion matrix for the 0.8 dataset. ResNet152 had
    minor issues with multiple classes on the 0.8 dataset, but on the 0.9 dataset,
    it only had the same issue as ResNet50.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/fcd702b0f6c4733d6933fdc500756206.png)'
  prefs: []
  type: TYPE_IMG
- en: '**Fig. 14** — The results of Grad-CAM on a random image from the 0.8 and 0.9
    datasets, respectively.'
  prefs: []
  type: TYPE_NORMAL
- en: Grad-CAM was not helpful for ResNet152 either - we experienced the enigmatic
    nature of deep learning models, which achieve high accuracy but cannot be explained
    easily.
  prefs: []
  type: TYPE_NORMAL
- en: We were surprised that the more complex ResNet152 did not outperform the ResNet50
    on the 0.9 dataset. Both achieved the highest metrics out of any models we have
    tried so far - they trumped the classical models, with the difference between
    the best classical model and the CNNs exceeding 10 percentage points. It is time
    to test the most innovative model - the Vision Transformer.
  prefs: []
  type: TYPE_NORMAL
- en: 4.4 Individual Pollen Classification with Vision Transformers
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: For individual pollen classification, we tried out simple models, which provided
    a varied level of performance, from insufficient to satisfactory. Then, we implemented
    convolutional neural networks, which completely trumped their performance. Now
    it is time for us to try out the innovative model known as the Vision Transformer.
  prefs: []
  type: TYPE_NORMAL
- en: Transformers, in general, originate from the famous 2017 paper “Attention Is
    All You Need” by researchers at Google, but they were initially used mainly for
    natural language processing. In 2020, the transformer architecture was applied
    in computer vision, yielding the ViT — Vision Transformer. Its excellent performance
    marked the beginning of the end for Convolutional Neural Networks’ reign in the
    area.
  prefs: []
  type: TYPE_NORMAL
- en: 'Our approach here was similar to what we used when training CNNs. We imported
    a pre-trained model: vit-base-patch16–224-in21k, a model trained on ImageNet-21k.
    Then, we normalized our dataset images, fine-tuned them, and noted down the results
    of metrics and confusion matrices (see Fig. 15 and Fig. 16).'
  prefs: []
  type: TYPE_NORMAL
- en: '**vit-base-patch16–224-in21k results: **'
  prefs: []
  type: TYPE_NORMAL
- en: '**0.8 Dataset:**'
  prefs: []
  type: TYPE_NORMAL
- en: 'F1: 0.98'
  prefs: []
  type: TYPE_NORMAL
- en: 'Precision: 0.98'
  prefs: []
  type: TYPE_NORMAL
- en: 'Recall: 0.98'
  prefs: []
  type: TYPE_NORMAL
- en: '**0.9 Dataset:**'
  prefs: []
  type: TYPE_NORMAL
- en: 'F1: 1.00'
  prefs: []
  type: TYPE_NORMAL
- en: 'Precision: 1.00'
  prefs: []
  type: TYPE_NORMAL
- en: 'Recall: 1.00'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/21f9ffe53ffda390687c8201eb644f48.png)'
  prefs: []
  type: TYPE_IMG
- en: '**Fig. 15** — The ViT’s confusion matrix for the 0.8 dataset.'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/a59d90eb16be15bdeb89a139d399e491.png)'
  prefs: []
  type: TYPE_IMG
- en: '**Fig. 16** — The ViT’s confusion matrix for the 0.9 dataset.'
  prefs: []
  type: TYPE_NORMAL
- en: In the 0.8 dataset, the Vision Transformer presented a level of performance
    that did not exceed that of the Residual Networks, and it struggled with similar
    problems — it misclassified Gooseberry as Blackcurrant. However, on the 0.9 dataset,
    it achieved a nearly perfect score. We witnessed innovation triumph over more
    dated solutions, which urged us to save the model and designate it as our model
    of choice for more demanding tasks.
  prefs: []
  type: TYPE_NORMAL
- en: 4.5 Comparison of Metrics for Various Models
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
- en: 'For our pollen classification tasks, we have used many models: traditional
    models, including the kNN, SVM, MLP, and Random Forest; Convolutional Neural Networks
    (ResNet50 and ResNet152), and a Vision Transformer (vit-base-patch16–224-in21k).
    This article serves as an overview and a performance ranking (see Tab. 1).'
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/ac8258b137846e961f4da11cfed5f6a3.png)'
  prefs: []
  type: TYPE_IMG
- en: '**Tab. 1** — Metrics for all the models that we tried out.'
  prefs: []
  type: TYPE_NORMAL
- en: Ranking
  prefs:
  - PREF_H4
  type: TYPE_NORMAL
- en: 6\. kNN (k-Nearest-Neighbors)
  prefs: []
  type: TYPE_NORMAL
- en: The simplest classifier. As expected, it trained quickly, but performed the
    worst.
  prefs: []
  type: TYPE_NORMAL
- en: 5\. MLP (Multi-Layered Perceptron)
  prefs: []
  type: TYPE_NORMAL
- en: The model’s architecture is based on the human nervous system. The MLP was outperformed
    by other standard models, which we did not expect.
  prefs: []
  type: TYPE_NORMAL
- en: 4\. RF (Random Forest)
  prefs: []
  type: TYPE_NORMAL
- en: The Random Forest classifier performed with the highest consistency of all models,
    but its metrics were far from ideal.
  prefs: []
  type: TYPE_NORMAL
- en: 3\. SVM (Support Vector Machine)
  prefs: []
  type: TYPE_NORMAL
- en: The unexpected winner among the typical classifiers. Its performance was random
    but yielded good results for a standard classifier on the 0.9 dataset.
  prefs: []
  type: TYPE_NORMAL
- en: 2\. ResNet50 and ResNet152 (Residual Networks)
  prefs: []
  type: TYPE_NORMAL
- en: Both architectures achieved the same high results thanks to their complexity,
    far exceeding the capabilities of any standard classifier on both datasets.
  prefs: []
  type: TYPE_NORMAL
- en: 1\. ViT (Vision Transformer)
  prefs: []
  type: TYPE_NORMAL
- en: The most innovative solution we have tried trumped the classical models and
    caught up to the Residual Networks on the 0.8 dataset. Yet the real challenge
    was the 0.9 dataset, where the CNNs reached an insurmountable accuracy of 0.99\.
    To our surprise, the Vision Transformer’s results were so high that they were
    rounded to 1.00 - a perfect score. Its results are a true testament to the power
    of innovation.
  prefs: []
  type: TYPE_NORMAL
- en: 'Note: the classification report rounded up the model’s metrics - they are not
    exactly equal to 1, as that would mean that all images without exception were
    classified correctly. We settled for this value because only a marginal five images
    (0.27%) were misclassified.'
  prefs: []
  type: TYPE_NORMAL
- en: Through comparing different classifiers in the domain of visual pollen recognition,
    we were able to experience the history and evolution of machine learning personally.
    We tested models with varying degrees of innovation, starting with the simplest
    classifiers and the attention-based Vision Transformer, and noticed how their
    results increased along with their novelty. Based on this comparison, we unanimously
    elected the ViT as our model of choice for working with pollen.
  prefs: []
  type: TYPE_NORMAL
- en: 5\. Conclusions
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: The task of visually classifying pollen, which has eluded biologists around
    the world and lay outside the grasp of human ability, has finally been proven
    possible thanks to the power of machine learning. The models presented in our
    publication have all shown potential to classify the pollens, with varying degrees
    of accuracy. Some models, such as CNNs or the Vision Transformer, have reached
    near perfection, recognising pollen with precision unseen in humans.
  prefs: []
  type: TYPE_NORMAL
- en: To better understand why this accomplishment is so impressive, we illustrate
    it in Fig. 17.
  prefs: []
  type: TYPE_NORMAL
- en: '![](../Images/29a1220bda5fca56e9eb119ae6717ea0.png)'
  prefs: []
  type: TYPE_IMG
- en: '**Fig. 17** — The exemplary images of the pollen of a different class that
    presents the complexity of the task we faced in the article.'
  prefs: []
  type: TYPE_NORMAL
- en: It is highly likely that most readers cannot correctly classify these images
    into the four classes mentioned previously. On the other hand, our models have
    proven to recognise them with almost perfect accuracy, reaching a top F1 score
    of over 99%.
  prefs: []
  type: TYPE_NORMAL
- en: One may wonder what such a classifier could be used for, or why it was trained
    in the first place. The applications of this approach are numerous, from tracking
    plant populations to measuring airborne allergen levels on a local scale. We constructed
    the models to not only provide a tool for palynologists to use to classify pollens
    they might collect, but also to provide a research platform for other machine
    learning enthusiasts to build off of, and to demonstrate the ever-expanding applications
    of this field.
  prefs: []
  type: TYPE_NORMAL
- en: On that note, this is the end of this publication. We sincerely hope the reader
    finds this helpful information in their research endeavours and that our articles
    have sparked ideas for projects using this technology.
  prefs: []
  type: TYPE_NORMAL
- en: 6\. Acknowledgments
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
- en: We are very thankful to Professor Agnieszka Marasek-Ciołakowska from the National
    Institute of Horticultural Research, Skierniewice, Poland, for preparing samples
    and taking microscopic images of them using the Keyence VHX-5000 microscope. The
    authors possess the complete, non-restricted copyrights to the dataset used in
    this research and all images used within this article.
  prefs: []
  type: TYPE_NORMAL
