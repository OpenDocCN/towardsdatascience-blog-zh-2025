- en: Deploy Your AI Assistant to Monitor and Debug n8n Workflows Using Claude and
    MCP
  id: totrans-0
  prefs:
  - PREF_H1
  type: TYPE_NORMAL
  zh: 使用 Claude 和 MCP 部署您的 AI 助手以监控和调试 n8n 工作流程
- en: 原文：[https://towardsdatascience.com/deploy-your-ai-assistant-to-monitor-and-debug-n8n-workflows-using-claude-and-mcp/](https://towardsdatascience.com/deploy-your-ai-assistant-to-monitor-and-debug-n8n-workflows-using-claude-and-mcp/)
  id: totrans-1
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 原文：[https://towardsdatascience.com/deploy-your-ai-assistant-to-monitor-and-debug-n8n-workflows-using-claude-and-mcp/](https://towardsdatascience.com/deploy-your-ai-assistant-to-monitor-and-debug-n8n-workflows-using-claude-and-mcp/)
- en: <mdspan datatext="el1762979931296" class="mdspan-comment">If you’ve ever deployed</mdspan>
    n8n workflows in production, you know the stress of hearing that a process failed
    and needing to dig through logs to find the root cause.
  id: totrans-2
  prefs: []
  type: TYPE_NORMAL
  zh: <mdspan datatext="el1762979931296" class="mdspan-comment">如果您曾经在生产中部署过</mdspan>
    n8n 工作流程，您知道听到一个流程失败并需要挖掘日志以找到根本原因的压力。
- en: 'User: Samir, your automation does not work anymore, I did not receive my notification!'
  id: totrans-3
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 用户：Samir，你的自动化不再工作，我没有收到通知！
- en: The first step is to open your n8n interface and review the last executions
    to identify the issues.
  id: totrans-4
  prefs: []
  type: TYPE_NORMAL
  zh: 第一步是打开你的 n8n 界面并回顾最近的执行以识别问题。
- en: '![](../Images/1f39c3f12982f0e888ea330064fec942.png)'
  id: totrans-5
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/1f39c3f12982f0e888ea330064fec942.png)'
- en: Example of key workflows that failed during the night – (Image by Samir Saci)
  id: totrans-6
  prefs: []
  type: TYPE_NORMAL
  zh: 夜间失败的典型工作流程示例 – (图片由 Samir Saci 提供)
- en: After a few minutes, you find yourself jumping between executions, comparing
    timestamps and reading JSON errors to understand where things broke.
  id: totrans-7
  prefs: []
  type: TYPE_NORMAL
  zh: 几分钟后，你发现自己正在在不同的执行之间跳转，比较时间戳并阅读 JSON 错误，以了解问题出在哪里。
- en: '![](../Images/d91714fed5904ee2a2698c0d1f9c17a0.png)'
  id: totrans-8
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/d91714fed5904ee2a2698c0d1f9c17a0.png)'
- en: Example of debugging a failed execution – (Image by Samir Saci)
  id: totrans-9
  prefs: []
  type: TYPE_NORMAL
  zh: 失败执行的调试示例 – (图片由 Samir Saci 提供)
- en: What if an agent could tell you why your workflow failed at 3 AM without you
    having to dig through the logs?
  id: totrans-10
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果代理能够告诉你为什么你的工作流程在凌晨 3 点失败，而你不必挖掘日志，那会怎么样？
- en: It is possible!
  id: totrans-11
  prefs: []
  type: TYPE_NORMAL
  zh: 这是可能的！
- en: As an experiment, I connected the n8n API, which provides access to execution
    logs of my instance, to an MCP server powered by Claude.
  id: totrans-12
  prefs: []
  type: TYPE_NORMAL
  zh: 作为实验，我将提供访问我的实例执行日志的 n8n API 连接到由 Claude 驱动的 MCP 服务器。
- en: '![](../Images/c3107ffadd653b7dc54e545f0d25e57e.png)'
  id: totrans-13
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c3107ffadd653b7dc54e545f0d25e57e.png)'
- en: n8n workflow with a webhook to collect information from my instance – (Image
    by Samir Saci)
  id: totrans-14
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 webhook 从我的实例收集信息的 n8n 工作流程 – (图片由 Samir Saci 提供)
- en: The result is an AI assistant that can monitor workflows, analyse failures,
    and explain what went wrong in natural language.
  id: totrans-15
  prefs: []
  type: TYPE_NORMAL
  zh: 结果是一个能够监控工作流程、分析失败并使用自然语言解释发生什么错误的 AI 助手。
- en: '![](../Images/7173c95f9874649bed5728e1306ada7a.png)'
  id: totrans-16
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7173c95f9874649bed5728e1306ada7a.png)'
- en: Example of root cause analysis performed by the agent – (Image by Samir Saci)
  id: totrans-17
  prefs: []
  type: TYPE_NORMAL
  zh: 代理执行的根本原因分析示例 – (图片由 Samir Saci 提供)
- en: In this article, I will walk you through the step-by-step process of building
    this system.
  id: totrans-18
  prefs: []
  type: TYPE_NORMAL
  zh: 在这篇文章中，我将逐步引导你构建这个系统。
- en: The first section will show a real example from my own n8n instance, where several
    workflows failed during the night.
  id: totrans-19
  prefs: []
  type: TYPE_NORMAL
  zh: 第一部分将展示我自己的 n8n 实例的一个真实示例，其中几个工作流程在夜间失败了。
- en: '![](../Images/2356c8c9d1003d31c4d99c28ea0d9f34.png)'
  id: totrans-20
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/2356c8c9d1003d31c4d99c28ea0d9f34.png)'
- en: Failed executions listed by hour – (Image by Samir Saci)
  id: totrans-21
  prefs: []
  type: TYPE_NORMAL
  zh: 按小时列出失败的执行 – (图片由 Samir Saci 提供)
- en: We’ll use this case to see how the agent identifies issues and explains their
    root causes.
  id: totrans-22
  prefs: []
  type: TYPE_NORMAL
  zh: 我们将使用这个案例来了解代理如何识别问题并解释其根本原因。
- en: Then, I’ll detail how I connected my n8n instance’s API to the MCP server using
    a webhook to enable Claude Desktop to fetch execution data for natural-language
    debugging.
  id: totrans-23
  prefs: []
  type: TYPE_NORMAL
  zh: 然后，我将详细说明我是如何通过 webhook 将我的 n8n 实例的 API 连接到 MCP 服务器，以使 Claude 桌面能够获取执行数据以进行自然语言调试。
- en: '![](../Images/b9f34ab2aed857a4c8dd1dd67d8e9f00.png)'
  id: totrans-24
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b9f34ab2aed857a4c8dd1dd67d8e9f00.png)'
- en: Workflow with webhook to connect to my instance – (Image by Author)
  id: totrans-25
  prefs: []
  type: TYPE_NORMAL
  zh: 使用 webhook 连接到我的实例的工作流程 – (图片由作者提供)
- en: 'The webhook includes three functions:'
  id: totrans-26
  prefs: []
  type: TYPE_NORMAL
  zh: Webhook 包含三个功能：
- en: '**Get Active Workflows**: which provides the list of all active workflows'
  id: totrans-27
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**获取活动工作流程**：提供所有活动工作流程的列表'
- en: '**Get Last Executions**: includes information about the last n executions'
  id: totrans-28
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**获取最后执行**：包括最后 n 次执行的信息'
- en: '**Get Executions Details (Status = Error)**: details of failed executions formatted
    to support root cause analyses'
  id: totrans-29
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: '**获取执行详情（状态=错误）**：格式化的失败执行详情，以支持根本原因分析'
- en: You can find the complete tutorial, along with the n8n workflow template and
    the MCP server source code, linked in this article.
  id: totrans-30
  prefs: []
  type: TYPE_NORMAL
  zh: 您可以在本文中找到完整的教程，包括 n8n 工作流程模板和 MCP 服务器源代码。
- en: 'Demonstration: Using AI to Analyse Failed n8n Executions'
  id: totrans-31
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 演示：使用 AI 分析失败的 n8n 执行
- en: Let us look together at one of my n8n instances, which runs several workflows
    (some of which are [shared in these tutorials](https://youtube.com/playlist?list=PLvINVddGUMQWK6JVR35KPXu-GmOfcd0RP&si=70dP03wuQZP3lcp0))
    that fetch event information from cities around the world.
  id: totrans-32
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们一起看看我的一个n8n实例，它运行了多个工作流程（其中一些在以下教程中[共享](https://youtube.com/playlist?list=PLvINVddGUMQWK6JVR35KPXu-GmOfcd0RP&si=70dP03wuQZP3lcp0)），这些工作流程从世界各地的城市获取事件信息。
- en: These workflows help business and networking communities discover interesting
    events to attend and learn from.
  id: totrans-33
  prefs: []
  type: TYPE_NORMAL
  zh: 这些工作流程帮助商业和网络社区发现有趣的活动，从中学习和参加。
- en: '![](../Images/61cec49902071998e268549ff4399f9c.png)'
  id: totrans-34
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/61cec49902071998e268549ff4399f9c.png)'
- en: Example of Automated Notifications received on Telegram using these workflows
    – (Image by Samir Saci)
  id: totrans-35
  prefs: []
  type: TYPE_NORMAL
  zh: 使用这些工作流程在Telegram上收到的自动通知示例 – (图片由Samir Saci提供)
- en: To test the solution, I will start by asking the agent to list the active workflows.
  id: totrans-36
  prefs: []
  type: TYPE_NORMAL
  zh: 为了测试解决方案，我将首先要求代理列出活动流程。
- en: 'Step 1: How many workflows are active?'
  id: totrans-37
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第1步：有多少个工作流程处于活动状态？
- en: '![](../Images/2e496d0589d9c4835e95f35b19f843c6.png)'
  id: totrans-38
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/2e496d0589d9c4835e95f35b19f843c6.png)'
- en: Initial Question – (Image by Samir Saci)
  id: totrans-39
  prefs: []
  type: TYPE_NORMAL
  zh: 初始问题 – (图片由Samir Saci提供)
- en: Based on the question alone, Claude understood that it needed to interact with
    the **n8n-monitor** tool, which was built using an MCP server.
  id: totrans-40
  prefs: []
  type: TYPE_NORMAL
  zh: 仅根据问题，Claude理解它需要与使用MCP服务器构建的**n8n-monitor**工具交互。
- en: '![](../Images/6bb1a4820cb3e96177935a1e0d898f05.png)'
  id: totrans-41
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6bb1a4820cb3e96177935a1e0d898f05.png)'
- en: Here is the n8n-monitor tool that is available for Claude – (Image by Samir
    Saci)
  id: totrans-42
  prefs: []
  type: TYPE_NORMAL
  zh: 这是Claude可用的n8n-monitor工具 – (图片由Samir Saci提供)
- en: From there, it automatically selected the corresponding function, **Get Active
    Workflows**, to retrieve the list of active automations from my n8n instance.
  id: totrans-43
  prefs: []
  type: TYPE_NORMAL
  zh: 从那里，它自动选择了相应的功能，**获取活动流程**，以从我的n8n实例中检索活动自动化列表。
- en: '![](../Images/90c68363f6a7a17b51fb6c6658e142ab.png)'
  id: totrans-44
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/90c68363f6a7a17b51fb6c6658e142ab.png)'
- en: All the active workflows – (Image by Samir Saci)
  id: totrans-45
  prefs: []
  type: TYPE_NORMAL
  zh: 所有活动工作流程 – (图片由Samir Saci提供)
- en: This is where you start to sense the power of the model.
  id: totrans-46
  prefs: []
  type: TYPE_NORMAL
  zh: 这就是您开始感受到模型力量的地方。
- en: It automatically categorised the workflows based on their names
  id: totrans-47
  prefs: []
  type: TYPE_NORMAL
  zh: 它根据名称自动对工作流程进行了分类
- en: 8 workflows to connect to fetch events from APIs and process them
  id: totrans-48
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 8个工作流程用于连接以从API获取事件并处理它们
- en: 3 other workflows that are work-in-progress, including the one used to fetch
    the logs
  id: totrans-49
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 3个其他正在进行中的工作流程，包括用于获取日志的工作流程
- en: '![](../Images/f79c50d8117313d4a69472fa49a767fd.png)'
  id: totrans-50
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f79c50d8117313d4a69472fa49a767fd.png)'
- en: Short unrequested analysis of the agent based on the data extracted – (Image
    by Samir Saci)
  id: totrans-51
  prefs: []
  type: TYPE_NORMAL
  zh: 基于提取的数据对代理进行的简短未请求分析 – (图片由Samir Saci提供)
- en: This marks the beginning of the analysis; all these insights will be utilised
    in the root cause analysis.
  id: totrans-52
  prefs: []
  type: TYPE_NORMAL
  zh: 这标志着分析的开始；所有这些见解都将用于根本原因分析。
- en: 'Step 2: Analyse the last n executions'
  id: totrans-53
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第2步：分析最后n次执行
- en: At this stage, we can begin asking Claude to retrieve the latest executions
    for analysis.
  id: totrans-54
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个阶段，我们可以开始要求Claude检索最新的执行以进行分析。
- en: '![](../Images/4a2b95877b925586bda692c96dd1a9f7.png)'
  id: totrans-55
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/4a2b95877b925586bda692c96dd1a9f7.png)'
- en: Request to analyse the last 25 executions – (Image by Samir Saci)
  id: totrans-56
  prefs: []
  type: TYPE_NORMAL
  zh: 请求分析最后25次执行 – (图片由Samir Saci提供)
- en: Thanks to the context provided in the doc-strings, which I will explain in the
    next section, Claude understood that it needed to call the get workflow executions.
  id: totrans-57
  prefs: []
  type: TYPE_NORMAL
  zh: 多亏了在doc-strings中提供的上下文，我将在下一节中解释，Claude理解它需要调用获取工作流程执行。
- en: It will receive a **summary of the executions**, with the percentage of failures
    and the number of workflows impacted by these failures.
  id: totrans-58
  prefs: []
  type: TYPE_NORMAL
  zh: 它将接收一个**执行摘要**，包括失败百分比和受这些失败影响的流程数量。
- en: '[PRE0]'
  id: totrans-59
  prefs: []
  type: TYPE_PRE
  zh: '[PRE0]'
- en: This is the first thing it will share with you; it provides a clear overview
    of the situation.
  id: totrans-60
  prefs: []
  type: TYPE_NORMAL
  zh: 这是它将首先与您分享的内容；它提供了对情况的清晰概述。
- en: '![](../Images/6bba64bb1cf798e985081e326557618a.png)'
  id: totrans-61
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/6bba64bb1cf798e985081e326557618a.png)'
- en: Part I – Overall Analysis and Alerting (Image by Samir Saci)
  id: totrans-62
  prefs: []
  type: TYPE_NORMAL
  zh: 第一部分 – 总体分析与警报（图片由Samir Saci提供）
- en: In the second part of the outputs, you can find a detailed breakdown of the
    failures for each workflow impacted.
  id: totrans-63
  prefs: []
  type: TYPE_NORMAL
  zh: 在输出的第二部分，您可以找到受影响每个工作流程的失败详细分解。
- en: '[PRE1]'
  id: totrans-64
  prefs: []
  type: TYPE_PRE
  zh: '[PRE1]'
- en: As a user, you now have visibility into the impacted workflows, along with details
    of the failure occurrences.
  id: totrans-65
  prefs: []
  type: TYPE_NORMAL
  zh: 作为用户，您现在可以看到受影响的工作流程，以及失败发生的详细信息。
- en: '![](../Images/016ad8e0d0996d2889d197c446b7ab13.png)'
  id: totrans-66
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/016ad8e0d0996d2889d197c446b7ab13.png)'
- en: Part II – Failure Analysis & Alerting – (Image by Samir Saci)
  id: totrans-67
  prefs: []
  type: TYPE_NORMAL
  zh: 第二部分 – 故障分析与警报 – (图片由Samir Saci提供)
- en: For this specific case, the workflow “Bangkok Meetup” is triggered every hour.
  id: totrans-68
  prefs: []
  type: TYPE_NORMAL
  zh: 对于这个特定案例，工作流程“曼谷聚会”每小时触发一次。
- en: What we could see is that we had issues three times (out of five) during the
    last five hours.
  id: totrans-69
  prefs: []
  type: TYPE_NORMAL
  zh: 我们可以看到，在过去五小时内，我们遇到了三次问题（五次中的三次）。
- en: '*Note: We can ignore the last sentence as the agent does not yet have access
    to the* *execution details.*'
  id: totrans-70
  prefs: []
  type: TYPE_NORMAL
  zh: '*注意：我们可以忽略最后一句话，因为代理还没有访问到执行细节。*'
- en: The last section of the outputs includes an analysis of the overall performance
    of the workflows.
  id: totrans-71
  prefs: []
  type: TYPE_NORMAL
  zh: 输出的最后一部分包括对工作流程整体性能的分析。
- en: '[PRE2]'
  id: totrans-72
  prefs: []
  type: TYPE_PRE
  zh: '[PRE2]'
- en: This detailed breakdown can help you prioritise the maintenance in case you
    have multiple workflows failing.
  id: totrans-73
  prefs: []
  type: TYPE_NORMAL
  zh: 这项详细的分析可以帮助你在有多个工作流程失败的情况下确定维护的优先级。
- en: '![](../Images/cc8c55f80e81fcbea0c46f5d2921d7c9.png)'
  id: totrans-74
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/cc8c55f80e81fcbea0c46f5d2921d7c9.png)'
- en: Part III – Performance Ranking – (Image by Samir Saci)
  id: totrans-75
  prefs: []
  type: TYPE_NORMAL
  zh: 第三部分 – 性能排名 – (图片由 Samir Saci 提供)
- en: In this specific example, I have only a single failing workflow, which is the
    **Ⓜ️ Bangkok Meetup**.
  id: totrans-76
  prefs: []
  type: TYPE_NORMAL
  zh: 在这个特定例子中，我只有一个失败的流程，那就是 **Ⓜ️ 曼谷 Meetup**。
- en: What if I want to know when issues started?
  id: totrans-77
  prefs:
  - PREF_BQ
  type: TYPE_NORMAL
  zh: 如果我想知道问题何时开始？
- en: Don’t worry, I’ve added a section with the details of the execution hour by
    hour.
  id: totrans-78
  prefs: []
  type: TYPE_NORMAL
  zh: 别担心，我已经添加了一个按小时提供执行详情的部分。
- en: '[PRE3]'
  id: totrans-79
  prefs: []
  type: TYPE_PRE
  zh: '[PRE3]'
- en: You just have to let Claude create a nice visual like the one you have below.
  id: totrans-80
  prefs: []
  type: TYPE_NORMAL
  zh: 你只需要让 Claude 创建一个像下面这样的漂亮视觉效果。
- en: '![](../Images/2356c8c9d1003d31c4d99c28ea0d9f34.png)'
  id: totrans-81
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/2356c8c9d1003d31c4d99c28ea0d9f34.png)'
- en: Analysis by Hour – (Image by Samir Saci)
  id: totrans-82
  prefs: []
  type: TYPE_NORMAL
  zh: 按小时分析 – (图片由 Samir Saci 提供)
- en: Let me remind you here that I did not provide any suggestion of results presentation
    to Claude; this is all from its own initiative!
  id: totrans-83
  prefs: []
  type: TYPE_NORMAL
  zh: 我在这里提醒你，我没有向 Claude 提供任何关于结果展示的建议；这完全是它自己的主动行为！
- en: Impressive, no?
  id: totrans-84
  prefs: []
  type: TYPE_NORMAL
  zh: 非常棒，不是吗？
- en: 'Step 3: Root Cause Analysis'
  id: totrans-85
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 第 3 步：根本原因分析
- en: Now that we know which workflows have issues, we should search for the root
    cause(s).
  id: totrans-86
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们知道了哪些工作流程存在问题，我们应该寻找根本原因。
- en: '![](../Images/efdb58bac4ed603166c15524a1fe9088.png)'
  id: totrans-87
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/efdb58bac4ed603166c15524a1fe9088.png)'
- en: Claude should generally call the **Get Error** **Executions**function to retrieve
    details ofexecutions with failures.
  id: totrans-88
  prefs: []
  type: TYPE_NORMAL
  zh: Claude 通常会调用 **Get Error Executions** 函数来检索失败执行的详细信息。
- en: For your information, the failure of this workflow is due to an error in the
    node **`JSON Tech`** that processes the output of the API call.
  id: totrans-89
  prefs: []
  type: TYPE_NORMAL
  zh: 供你参考，这个工作流程的失败是由于处理 API 调用输出的节点 **`JSON Tech`** 中存在错误。
- en: Meetup Tech is sending an HTTP query to the Meetup API
  id: totrans-90
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: Meetup Tech 正在向 Meetup API 发送 HTTP 查询
- en: Processed by Result Tech Node
  id: totrans-91
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 由结果 Tech 节点处理
- en: JSON Tech is supposed to transform this output into a transformed JSON
  id: totrans-92
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: JSON Tech 应该将此输出转换为转换后的 JSON
- en: '![](../Images/9144608407a19a8462a69401f10e1699.png)'
  id: totrans-93
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/9144608407a19a8462a69401f10e1699.png)'
- en: Workflow with the failing node JSON Tech – (Image by Samir Saci)
  id: totrans-94
  prefs: []
  type: TYPE_NORMAL
  zh: 失败节点的 JSON Tech 的工作流程 – (图片由 Samir Saci 提供)
- en: Here is what happens when everything goes well.
  id: totrans-95
  prefs: []
  type: TYPE_NORMAL
  zh: 当一切顺利时，情况是这样的。
- en: '![](../Images/16f9a4b266e2d77184d567d245ee58d3.png)'
  id: totrans-96
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/16f9a4b266e2d77184d567d245ee58d3.png)'
- en: Example of good inputs for the node JSON Tech – (Image by Samir Saci)
  id: totrans-97
  prefs: []
  type: TYPE_NORMAL
  zh: 节点 JSON Tech 的良好输入示例 – (图片由 Samir Saci 提供)
- en: However, it can happen that the API call sometimes fails and the JavaScript
    node receives an error, as the input is not in the expected format.
  id: totrans-98
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，有时 API 调用可能会失败，JavaScript 节点会收到错误，因为输入不是预期的格式。
- en: '*Note: This issue has been corrected in production since then (the code node
    is now more robust), but I kept it here for the demo.*'
  id: totrans-99
  prefs: []
  type: TYPE_NORMAL
  zh: '*注意：自那时以来，这个问题已在生产中得到了纠正（代码节点现在更健壮），但我还是保留在这里以供演示。*'
- en: Let us see if Claude can locate the root cause.
  id: totrans-100
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们看看 Claude 是否能定位到根本原因。
- en: Here is the output of the **Get Error Executions** function.
  id: totrans-101
  prefs: []
  type: TYPE_NORMAL
  zh: 这里是 **Get Error Executions** 函数的输出。
- en: '[PRE4]'
  id: totrans-102
  prefs: []
  type: TYPE_PRE
  zh: '[PRE4]'
- en: '**Claude now has access to the details of the executions with the error mess**age
    and the impacted nodes.'
  id: totrans-103
  prefs: []
  type: TYPE_NORMAL
  zh: '**Claude 现在可以访问带有错误消息和受影响节点的执行详情。**'
- en: '![](../Images/cfdb9540b3efc899b667502c6bfc63d7.png)'
  id: totrans-104
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/cfdb9540b3efc899b667502c6bfc63d7.png)'
- en: Analysis of the errors on the last five executions – (Image by Samir Saci)
  id: totrans-105
  prefs: []
  type: TYPE_NORMAL
  zh: 对最后五次执行的错误分析 – (图片由 Samir Saci 提供)
- en: In the response above, you can see that Claude summarised the outputs of multiple
    executions in a single analysis.
  id: totrans-106
  prefs: []
  type: TYPE_NORMAL
  zh: 在上面的响应中，你可以看到 Claude 在一个分析中总结了多次执行的输出。
- en: 'We know now that:'
  id: totrans-107
  prefs: []
  type: TYPE_NORMAL
  zh: 我们现在知道：
- en: Errors occurred every hour except at 08:00 am
  id: totrans-108
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 除了早上 08:00 之外，每小时都会发生错误
- en: Each time, the same node, called “JSON Tech”, is impacted
  id: totrans-109
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 每次都是同一个节点，称为“JSON Tech”，受到影响
- en: The error occurs quickly after the workflow is triggered
  id: totrans-110
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 工作流程触发后很快就会发生错误
- en: This descriptive analysis is completed by the beginning of a diagnostic.
  id: totrans-111
  prefs: []
  type: TYPE_NORMAL
  zh: 这项描述性分析在诊断开始之前就完成了。
- en: '![](../Images/7173c95f9874649bed5728e1306ada7a.png)'
  id: totrans-112
  prefs: []
  type: TYPE_IMG
  zh: '![](../Images/7173c95f9874649bed5728e1306ada7a.png)'
- en: Diagnosis – (Image by Samir Saci)
  id: totrans-113
  prefs: []
  type: TYPE_NORMAL
  zh: 诊断 – (图片由 Samir Saci 提供)
- en: This assertion is not incorrect, as evidenced by the error message on the n8n
    UI.
  id: totrans-114
  prefs: []
  type: TYPE_NORMAL
  zh: 这个断言并不错误，正如n8n UI上的错误消息所示。
- en: '![](../Images/f45dede84c59b783f978ea2381c35d41.png)'
  id: totrans-115
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/f45dede84c59b783f978ea2381c35d41.png)'
- en: Wrong Inputs for JSON Tech node – (Image by Samir Saci)
  id: totrans-116
  prefs: []
  type: TYPE_NORMAL
  zh: JSON技术节点输入错误 – (图片由Samir Saci提供)
- en: However, due to the limited context, Claude starts to provide recommendations
    to fix the workflow that are not correct.
  id: totrans-117
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，由于上下文有限，Claude开始提供不正确的修复工作流程的建议。
- en: '![](../Images/1ad1b1d8ccc6d5abd076128593e05fa5.png)'
  id: totrans-118
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/1ad1b1d8ccc6d5abd076128593e05fa5.png)'
- en: Proposed fix in the JSON Tech Node – (Image by Samir Saci)
  id: totrans-119
  prefs: []
  type: TYPE_NORMAL
  zh: 在JSON技术节点中提出的修复方案 – (图片由Samir Saci提供)
- en: In addition to the code correction, it provides an action plan.
  id: totrans-120
  prefs: []
  type: TYPE_NORMAL
  zh: 除了代码修正外，它还提供了一个行动计划。
- en: '![](../Images/2ec855838d56ab973f979d33a90fc278.png)'
  id: totrans-121
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/2ec855838d56ab973f979d33a90fc278.png)'
- en: Actions Items prepared by Claude – (Image by Samir Saci)
  id: totrans-122
  prefs: []
  type: TYPE_NORMAL
  zh: Claude准备的行动项目 – (图片由Samir Saci提供)
- en: As I know that the issue is not (only) on the code node, I wanted to guide Claude
    in the root cause analysis.
  id: totrans-123
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我知道问题不仅仅在于代码节点，我想引导Claude进行根本原因分析。
- en: '![](../Images/7a3b94b154f4defa1d594c3bce484579.png)'
  id: totrans-124
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/7a3b94b154f4defa1d594c3bce484579.png)'
- en: Challenge its conclusion – (Image by Samir Saci)
  id: totrans-125
  prefs: []
  type: TYPE_NORMAL
  zh: 挑战其结论 – (图片由Samir Saci提供)
- en: It finally challenged the initial proposal of the resolution and began to share
    assumptions about the root cause(s).
  id: totrans-126
  prefs: []
  type: TYPE_NORMAL
  zh: 它最终挑战了最初的解决方案提议，并开始分享关于根本原因（们）的假设。
- en: '![](../Images/b62b6b752a3bf80482988cd5c2d6ae21.png)'
  id: totrans-127
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/b62b6b752a3bf80482988cd5c2d6ae21.png)'
- en: Corrected Analysis – (Image by Samir Saci)
  id: totrans-128
  prefs: []
  type: TYPE_NORMAL
  zh: 修正后的分析 – (图片由Samir Saci提供)
- en: This begins to get closer to the actual root cause, providing enough insights
    for us to start exploring the workflow.
  id: totrans-129
  prefs: []
  type: TYPE_NORMAL
  zh: 这开始接近实际的根本原因，为我们提供了足够的洞察力，以便开始探索工作流程。
- en: '![](../Images/e0f86d1630555ad28c7bfa50424de3f4.png)'
  id: totrans-130
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/e0f86d1630555ad28c7bfa50424de3f4.png)'
- en: Fix proposed – (Image by Samir Saci)
  id: totrans-131
  prefs: []
  type: TYPE_NORMAL
  zh: 提出的修复方案 – (图片由Samir Saci提供)
- en: The revised fix is now better as it considers the possibility that the issue
    comes from the node input data.
  id: totrans-132
  prefs: []
  type: TYPE_NORMAL
  zh: 修正后的修复方案现在更好，因为它考虑了问题可能来自节点输入数据的可能性。
- en: For me, this is the best I could expect from Claude, considering the limited
    information that he has on hand.
  id: totrans-133
  prefs: []
  type: TYPE_NORMAL
  zh: 对于我来说，考虑到Claude手头有限的信息，这是我能期望的最好的结果。
- en: 'Conclusion: Value Proposition of This Tool'
  id: totrans-134
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 结论：此工具的价值主张
- en: This simple experiment demonstrates how an AI agent powered by Claude can extend
    beyond basic monitoring to deliver genuine operational value.
  id: totrans-135
  prefs: []
  type: TYPE_NORMAL
  zh: 这个简单的实验展示了由Claude驱动的AI代理如何超越基本的监控，提供真正的运营价值。
- en: Before manually checking executions and logs, you can first converse with your
    automation system to ask what failed, why it failed, and receive context-aware
    explanations within seconds.
  id: totrans-136
  prefs: []
  type: TYPE_NORMAL
  zh: 在手动检查执行和日志之前，您可以先与您的自动化系统交谈，询问失败的原因，为什么失败，并在几秒钟内收到上下文感知的解释。
- en: This will not replace you entirely, but it can accelerate the root cause analysis
    process.
  id: totrans-137
  prefs: []
  type: TYPE_NORMAL
  zh: 这不会完全取代您，但它可以加速根本原因分析过程。
- en: In the next section, I will briefly introduce how I set up the MCP Server to
    connect Claude Desktop to my instance.
  id: totrans-138
  prefs: []
  type: TYPE_NORMAL
  zh: 在下一节中，我将简要介绍我是如何设置MCP服务器以连接Claude桌面到我的实例的。
- en: Building a local MCP Server to connect Claude Desktop to a FastAPI Microservice
  id: totrans-139
  prefs:
  - PREF_H2
  type: TYPE_NORMAL
  zh: 构建本地MCP服务器以连接Claude桌面到FastAPI微服务
- en: To equip Claude with the three functions available in the webhook (**Get Active
    Workflows,** **Get Workflow Executions** and **Get Error Executions**), I have
    implemented an MCP Server.
  id: totrans-140
  prefs: []
  type: TYPE_NORMAL
  zh: 为了让Claude具备webhook中可用的三个功能（**获取活动工作流程**、**获取工作流程执行**和**获取错误执行**），我实现了一个MCP服务器。
- en: '![](../Images/639f9546fcc860d30c84cd722045f3b0.png)'
  id: totrans-141
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/639f9546fcc860d30c84cd722045f3b0.png)'
- en: MCP Server Connecting Claude Desktop UI to our workflow – (Image by Samir Saci)
  id: totrans-142
  prefs: []
  type: TYPE_NORMAL
  zh: MCP服务器连接Claude桌面UI到我们的工作流程 – (图片由Samir Saci提供)
- en: In this section, I will briefly introduce the implementation, focusing only
    on Get Active Workflows and Get Workflows Executions, to demonstrate how I explain
    the usage of these tools to Claude.
  id: totrans-143
  prefs: []
  type: TYPE_NORMAL
  zh: 在本节中，我将简要介绍实现方法，仅关注**获取活动工作流程**和**获取工作流程执行**，以展示我是如何向Claude解释这些工具的使用的。
- en: For a comprehensive and detailed introduction to the solution, including instructions
    on how to deploy it on your machine, I invite you to watch [this tutorial on my
    YouTube Channel](https://youtu.be/oJzNnHIusZs).
  id: totrans-144
  prefs: []
  type: TYPE_NORMAL
  zh: 对于一个全面和详细的解决方案介绍，包括如何在您的机器上部署它的说明，我邀请您观看[我在YouTube频道上的这个教程](https://youtu.be/oJzNnHIusZs)。
- en: You will also find the MCP Server source code and the n8n workflow of the webhook.
  id: totrans-145
  prefs: []
  type: TYPE_NORMAL
  zh: 您还可以找到MCP服务器的源代码和webhook的n8n工作流程。
- en: Create a Class to Query the Workflow
  id: totrans-146
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 创建一个查询工作流程的类
- en: Before examining how to set up the three different tools, let me introduce the
    utility class, which is defined with all the functions needed to interact with
    the webhook.
  id: totrans-147
  prefs: []
  type: TYPE_NORMAL
  zh: 在检查如何设置三个不同工具之前，让我先介绍这个实用类，它定义了所有与webhook交互所需的函数。
- en: 'You can find it in the Python file: `./utils/n8n_monitory_sync.py`'
  id: totrans-148
  prefs: []
  type: TYPE_NORMAL
  zh: 你可以在Python文件中找到它：`./utils/n8n_monitory_sync.py`
- en: '[PRE5]'
  id: totrans-149
  prefs: []
  type: TYPE_PRE
  zh: '[PRE5]'
- en: Essentially, we retrieve the webhook URL from an environment variable and set
    a query timeout of 30 seconds.
  id: totrans-150
  prefs: []
  type: TYPE_NORMAL
  zh: 实质上，我们从环境变量中检索webhook URL，并设置30秒的查询超时。
- en: 'The first function `get_active_workflows` is querying the webhook passing as
    a parameter: `"action": get_active_workflows"`.'
  id: totrans-151
  prefs: []
  type: TYPE_NORMAL
  zh: '第一个函数`get_active_workflows`正在查询作为参数传递的webhook："action": get_active_workflows"。'
- en: '[PRE6]'
  id: totrans-152
  prefs: []
  type: TYPE_PRE
  zh: '[PRE6]'
- en: I have added many checks, as the API sometimes fails to return the expected
    data format.
  id: totrans-153
  prefs: []
  type: TYPE_NORMAL
  zh: 我添加了许多检查，因为API有时无法返回预期的数据格式。
- en: This solution is more robust, providing Claude with all the information to understand
    why a query failed.
  id: totrans-154
  prefs: []
  type: TYPE_NORMAL
  zh: 这个解决方案更健壮，为Claude提供了所有了解查询失败原因的信息。
- en: Now that the first function is covered, we can focus on getting all the last
    n executions with `get_workflow_executions`.
  id: totrans-155
  prefs: []
  type: TYPE_NORMAL
  zh: 现在第一个函数已经覆盖了，我们可以专注于使用`get_workflow_executions`获取所有最后n次执行。
- en: '[PRE7]'
  id: totrans-156
  prefs: []
  type: TYPE_PRE
  zh: '[PRE7]'
- en: 'The only parameter here is the number **n** of executions you want to retrieve:
    `"limit": n`.'
  id: totrans-157
  prefs: []
  type: TYPE_NORMAL
  zh: '这里的唯一参数是你想要检索的执行次数**n**："limit": n。'
- en: The outputs include a summary with a health status that is generated by the
    code node `Processing Audit`. *([more details in the tutorial](https://youtu.be/oJzNnHIusZs))*
  id: totrans-158
  prefs: []
  type: TYPE_NORMAL
  zh: 输出包括由代码节点`Processing Audit`生成的摘要和健康状态。*([更多详情请看教程](https://youtu.be/oJzNnHIusZs))*
- en: '![](../Images/c3107ffadd653b7dc54e545f0d25e57e.png)'
  id: totrans-159
  prefs: []
  type: TYPE_IMG
  zh: '![图片](../Images/c3107ffadd653b7dc54e545f0d25e57e.png)'
- en: n8n workflow with a webhook to collect information from my instance – (Image
    by Samir Saci)
  id: totrans-160
  prefs: []
  type: TYPE_NORMAL
  zh: 带有webhook的n8n工作流程，用于从我的实例收集信息 – (图片由Samir Saci提供)
- en: The function `get_workflow_executions` only retrieves the outputs for formatting
    before sending them to the agent.
  id: totrans-161
  prefs: []
  type: TYPE_NORMAL
  zh: '`get_workflow_executions`函数仅在发送到代理之前检索输出以进行格式化。'
- en: Now that we have defined our core functions, we can create the tools to equip
    Claude via the MCP server.
  id: totrans-162
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经定义了核心函数，我们可以通过MCP服务器创建工具来装备Claude。
- en: Set up an MCP Server with Tools
  id: totrans-163
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 设置带有工具的MCP服务器
- en: Now it is the time to create our MCP server with tools and resources to equip
    (and teach) Claude.
  id: totrans-164
  prefs: []
  type: TYPE_NORMAL
  zh: 现在是时候创建我们的MCP服务器，并配备工具和资源来装备（和教授）Claude了。
- en: '[PRE8]'
  id: totrans-165
  prefs: []
  type: TYPE_PRE
  zh: '[PRE8]'
- en: It is a basic implementation using FastMCP and importing `n8n_monitor_sync.py`
    with the functions defined in the previous section.
  id: totrans-166
  prefs: []
  type: TYPE_NORMAL
  zh: 这是一个使用FastMCP的基本实现，并导入`n8n_monitor_sync.py`，其中包含上一节中定义的函数。
- en: '[PRE9]'
  id: totrans-167
  prefs: []
  type: TYPE_PRE
  zh: '[PRE9]'
- en: As the tool is complex to apprehend, we include a prompt, in the form of an
    MCP resource, to summarise the objective and features of the n8n workflow connected
    via webhook.
  id: totrans-168
  prefs: []
  type: TYPE_NORMAL
  zh: 由于工具复杂难懂，我们包括了一个提示，以MCP资源的形式总结通过webhook连接的n8n工作流程的目标和功能。
- en: Now we can define the first tool to get all the active workflows.
  id: totrans-169
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们可以定义第一个工具来获取所有活动工作流程。
- en: '[PRE10]'
  id: totrans-170
  prefs: []
  type: TYPE_PRE
  zh: '[PRE10]'
- en: The docstring, used to explain to the MCP server how to use the tool, is relatively
    brief, as there are no input parameters for `get_active_workflows()`.
  id: totrans-171
  prefs: []
  type: TYPE_NORMAL
  zh: 用于向MCP服务器解释如何使用工具的文档字符串相对简短，因为`get_active_workflows()`没有输入参数。
- en: Let us do the same for the second tool to retrieve the last n executions.
  id: totrans-172
  prefs: []
  type: TYPE_NORMAL
  zh: 让我们为第二个工具做同样的事情，以检索最后n次执行。
- en: '[PRE11]'
  id: totrans-173
  prefs: []
  type: TYPE_PRE
  zh: '[PRE11]'
- en: Unlike the previous tool, we need to specify the input data with the default
    value.
  id: totrans-174
  prefs: []
  type: TYPE_NORMAL
  zh: 与之前的工具不同，我们需要指定默认值来指定输入数据。
- en: We have now equipped Claude with these two tools that can be used as in the
    example presented in the previous section.
  id: totrans-175
  prefs: []
  type: TYPE_NORMAL
  zh: 现在我们已经为Claude配备了这两个工具，它们可以像上一节中展示的示例那样使用。
- en: What’s next? Deploy it on your machine!
  id: totrans-176
  prefs:
  - PREF_H3
  type: TYPE_NORMAL
  zh: 接下来是什么？在你的机器上部署它！
- en: As I wanted to keep this article short, I will only introduce these two tools.
  id: totrans-177
  prefs: []
  type: TYPE_NORMAL
  zh: 由于我想保持这篇文章简短，所以我只会介绍这两个工具。
- en: For the rest of the functionalities, I invite you to watch [this complete tutorial
    on my YouTube channel](https://youtu.be/oJzNnHIusZs).
  id: totrans-178
  prefs: []
