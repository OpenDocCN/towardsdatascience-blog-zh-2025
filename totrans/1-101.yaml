  id: totrans-187
  prefs:
  - PREF_UL
  type: TYPE_NORMAL
  zh: 利用 n8n API 的其他端点进行更精确的分析
- en: However, I don’t think I can, as a full-time startup founder and CEO, develop
    such a comprehensive tool on my own.
  id: totrans-188
  prefs: []
  type: TYPE_NORMAL
  zh: 然而，我认为作为一个全职的初创公司创始人和首席执行官，我无法独自开发这样一个全面的工具。
- en: Therefore, I wanted to share that with the Towards Data Science and n8n community
    as an open-source solution available on my GitHub profile.
  id: totrans-189
  prefs: []
  type: TYPE_NORMAL
  zh: 因此，我想与 Towards Data Science 和 n8n 社区分享这个开源解决方案，该解决方案可在我的 GitHub 个人资料上找到。
