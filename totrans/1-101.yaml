  zh: 对于其余的功能，我邀请你观看我YouTube频道上的[这个完整的教程](https://youtu.be/oJzNnHIusZs)。
- en: I include step-by-step explanations on how to deploy this on your machine with
    a detailed review of the source code shared on my GitHub (MCP Server) and n8n
    profile (workflow).
